<body>
<div class="quiz-container">

        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 8, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What are the primary meanings associated with the root forms \"leg\" and \"lect\"?", "options": [{"text": "To write, to speak, to build", "isCorrect": false, "rationale": "These meanings (to write, to speak, to build) are not mentioned in the text for these roots."}, {"text": "To read, to choose/gather, law", "isCorrect": true, "rationale": "The text explicitly states \"Meaning: to read; to choose, gather; law\" for the root forms \"leg, lect.\""}, {"text": "To hear, to see, to touch", "isCorrect": false, "rationale": "These meanings (to hear, to see, to touch) are related to sensory perception, not the given roots."}, {"text": "To stand, to walk, to run", "isCorrect": false, "rationale": "These meanings (to stand, to walk, to run) relate to locomotion, which is not associated with \"leg\" or \"lect\" in this context."}]}, {"question": "From which language do the root forms \"leg\" and \"lect\" primarily originate?", "options": [{"text": "Greek", "isCorrect": false, "rationale": "While many roots come from Greek, the text specifically identifies Latin for these roots."}, {"text": "Old English", "isCorrect": false, "rationale": "Old English is not mentioned as the origin for these specific roots."}, {"text": "Latin", "isCorrect": true, "rationale": "The text states \"Origin: Latin legere (to read, choose, gather), past participle lectus; Latin lex, legis (law).\""}, {"text": "French", "isCorrect": false, "rationale": "French words often derive from Latin, but the direct origin given in the text is Latin, not specifically French."}]}, {"question": "Which variant form of the root \"leg\" is mentioned in the text for some derivatives?", "options": [{"text": "lax", "isCorrect": false, "rationale": "\"lax\" is not mentioned as a variant form in the provided text."}, {"text": "lug", "isCorrect": false, "rationale": "\"lug\" is not mentioned as a variant form in the provided text."}, {"text": "lig", "isCorrect": true, "rationale": "The text explicitly states \"Variant Forms: lig (in some derivatives like diligent).\""}, {"text": "log", "isCorrect": false, "rationale": "\"log\" is not mentioned as a variant form in the provided text."}]}, {"question": "A student is told their handwriting is \"legible.\" Based on the root \"leg,\" what does this imply about their handwriting?", "options": [{"text": "It is very artistic.", "isCorrect": false, "rationale": "While legible handwriting can be artistic, the core meaning derived from \"leg\" is about readability, not aesthetic quality."}, {"text": "It is difficult to understand.", "isCorrect": false, "rationale": "If handwriting is \"legible,\" it is easy to read, not difficult. This contradicts the meaning."}, {"text": "It is able to be read.", "isCorrect": true, "rationale": "The root \"leg\" means \"to read,\" and \"legible\" means \"capable of being read.\" This directly applies the \"to read\" meaning."}, {"text": "It follows a strict set of rules.", "isCorrect": false, "rationale": "The word \"legible\" pertains to readability, not adherence to legal or arbitrary rules, which would relate to the 'law' meaning of 'leg.'"}]}, {"question": "When a committee \"selects\" a new member, which meaning of the root \"lect\" is being used?", "options": [{"text": "To read", "isCorrect": false, "rationale": "\"To read\" is another meaning of the root \"leg/lect,\" but it doesn't fit the context of selecting a member."}, {"text": "To choose/gather", "isCorrect": true, "rationale": "The word \"select\" means to choose or pick out from a group, directly corresponding to the \"to choose, gather\" meaning of the root \"lect.\""}, {"text": "To enforce law", "isCorrect": false, "rationale": "\"To enforce law\" relates to the \"law\" meaning of \"leg,\" which is distinct from \"select.\""}, {"text": "To write", "isCorrect": false, "rationale": "\"To write\" is not a meaning associated with the roots \"leg\" or \"lect\" in the text."}]}, {"question": "The root \"leg\" has two distinct origins related to \"legere\" and \"lex, legis.\" How does the word \"legal\" primarily derive its meaning compared to \"legible\"?", "options": [{"text": "\"Legal\" relates to \"reading,\" while \"legible\" relates to \"law.\"", "isCorrect": false, "rationale": "This statement reverses the correct meanings. \"Legal\" is about law, \"legible\" is about reading."}, {"text": "Both \"legal\" and \"legible\" relate primarily to \"choosing.\"", "isCorrect": false, "rationale": "Neither word primarily relates to \"choosing\" in their most direct sense, though \"legere\" includes \"choose.\" \"Legal\" is specifically from \"law.\""}, {"text": "\"Legal\" relates to \"law,\" while \"legible\" relates to \"reading.\"", "isCorrect": true, "rationale": "The text specifies \"Latin lex, legis (law)\" as an origin for \"leg\" (leading to \"legal\"), and \"Latin legere (to read, choose, gather)\" as an origin for \"leg\" and \"lect\" (leading to \"legible\")."}, {"text": "Both words solely derive their meaning from the past participle \"lectus.\"", "isCorrect": false, "rationale": "While \"lectus\" is a past participle, \"legal\" comes directly from \"lex, legis\" (law), and \"legible\" from \"legere\" (to read). They do not solely derive from \"lectus.\""}]}, {"question": "If someone wants to form a word meaning \"chosen out of a group,\" which root form and meaning would be most appropriate to build upon?", "options": [{"text": "\"leg\" from \"legere\" (to read)", "isCorrect": false, "rationale": "While \"legere\" includes 'to choose,' the direct meaning 'to read' doesn't convey 'chosen out of a group' as effectively as 'lect' (chosen)."}, {"text": "\"lect\" from \"lectus\" (chosen)", "isCorrect": true, "rationale": "The meaning \"chosen out of a group\" directly aligns with the \"to choose\" meaning of the root, and \"lectus\" is specifically identified as the past participle of \"legere\" (to choose, gather), implying a completed action of choosing."}, {"text": "\"leg\" from \"lex, legis\" (law)", "isCorrect": false, "rationale": "\"leg\" from \"lex, legis\" refers to \"law,\" which is unrelated to the concept of being chosen from a group."}, {"text": "\"lig\" from \"diligent\" (to gather with care)", "isCorrect": false, "rationale": "While \"lig\" is a variant form, and \"diligent\" might involve careful gathering, the most direct root form for the concept of 'chosen' is \"lect\" from \"legere/lectus.\""}]}, {"question": "The text states \"lect\" is the past participle of \"legere.\" What does this imply about the relationship between \"leg\" and \"lect\" when forming derivatives?", "options": [{"text": "They are unrelated roots with coincidental similarities.", "isCorrect": false, "rationale": "The text explicitly links them, stating \"lect\" is the past participle of \"legere,\" indicating a direct relationship, not unrelatedness."}, {"text": "\"Lect\" is a more ancient form, while \"leg\" is a modern adaptation.", "isCorrect": false, "rationale": "There is no information in the text to suggest \"lect\" is more ancient than \"leg\"; rather, it's a grammatical form of the same verb."}, {"text": "\"Lect\" often appears in derivatives where the action is completed or the result of choosing/reading.", "isCorrect": true, "rationale": "As a past participle, \"lect\" signifies a completed action (e.g., chosen, read). This explains its use in words like \"select\" (chosen out) or \"collection\" (a group gathered)."}, {"text": "\"Leg\" is exclusively used for verbs, and \"lect\" for nouns.", "isCorrect": false, "rationale": "This is an oversimplification and not universally true. Many words use \"lect\" as part of a verb or adjective (e.g., \"elect,\" \"selective\"), and \"leg\" can be in nouns (e.g., \"legacy\")."}]}, {"question": "Which of the following example derivatives explicitly reflects the \"law\" meaning of the root?", "options": [{"text": "Elect", "isCorrect": false, "rationale": "\"Elect\" means to choose by vote, relating to the \"to choose\" meaning."}, {"text": "Select", "isCorrect": false, "rationale": "\"Select\" means to choose from a group, relating to the \"to choose\" meaning."}, {"text": "Legal", "isCorrect": true, "rationale": "The word \"legal\" directly pertains to law, derived from Latin \"lex, legis,\" which means law."}, {"text": "Legible", "isCorrect": false, "rationale": "\"Legible\" means able to be read, relating to the \"to read\" meaning."}]}, {"question": "The root \"leg\" (and its forms) is versatile because it encompasses meanings related to:", "options": [{"text": "Sensory perception and emotional states.", "isCorrect": false, "rationale": "Sensory perception (like hearing, seeing) and emotional states are not listed as meanings for these roots."}, {"text": "Communication (to read), decision-making (to choose/gather), and societal rules (law).", "isCorrect": true, "rationale": "The text lists \"to read,\" \"to choose, gather,\" and \"law\" as the meanings. These can be categorized as communication (reading), decision-making (choosing/gathering), and societal rules (law)."}, {"text": "Physical movement and architectural structures.", "isCorrect": false, "rationale": "Physical movement and architectural structures are not meanings associated with these roots."}, {"text": "Abstract philosophical concepts and mathematical principles.", "isCorrect": false, "rationale": "Abstract philosophical concepts and mathematical principles are too broad and not directly linked to the specific meanings provided for 'leg'/'lect'."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
