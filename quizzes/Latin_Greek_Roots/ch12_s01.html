<script>
var QUESTIONS = [{"question": "What is the central message conveyed by the Latin phrase \"Faber est suae quisque fortunae\" as translated in the epigraph?", "options": [{"text": "Fate predetermines a person's life outcomes.", "isCorrect": false, "rationale": "This option contradicts the core message, which emphasizes individual agency rather than predetermined fate."}, {"text": "Every individual is responsible for shaping their own destiny and circumstances.", "isCorrect": true, "rationale": "The translation 'Each person is the maker of their own fortune' directly asserts individual responsibility and agency over one's life, which is the core message."}, {"text": "Fortune is a capricious force beyond human control.", "isCorrect": false, "rationale": "This option suggests a lack of control, directly opposing the idea that a person 'makes' their own fortune."}, {"text": "Wealth is the ultimate goal every person should pursue.", "isCorrect": false, "rationale": "While 'fortune' can imply wealth, in this context, it broadly refers to one's entire life situation or destiny, not solely material riches. The message is about creation, not just acquisition of wealth."}]}, {"question": "Which philosophical principle is most strongly supported by the statement, \"Each person is the maker of their own fortune\"?", "options": [{"text": "Determinism, where external forces dictate one's future.", "isCorrect": false, "rationale": "Determinism suggests that all events, including human actions, are ultimately determined by causes external to the will, directly conflicting with the idea of individual 'making' of fortune."}, {"text": "Individual agency and self-determination.", "isCorrect": true, "rationale": "The phrase emphasizes that each person is the 'maker' of their own fortune, highlighting personal responsibility, choices, and the power to shape one's life, which aligns perfectly with individual agency and self-determination."}, {"text": "Fatalism, the belief that all events are predetermined and inevitable.", "isCorrect": false, "rationale": "Fatalism is the opposite of the epigraph's message, as it posits that one's destiny is unchangeable and not within individual control."}, {"text": "Collectivism, where group efforts dictate individual success.", "isCorrect": false, "rationale": "While group efforts are important in many contexts, the phrase 'suae quisque' (each person's own) explicitly focuses on individual rather than collective responsibility for fortune."}]}, {"question": "The mention of Appius Claudius Caecus as the author and Sallust as the citer implies what about the quote?", "options": [{"text": "Sallust was the original author, and Appius Claudius Caecus merely popularized it.", "isCorrect": false, "rationale": "The phrase 'as cited by Sallust' clearly indicates that Appius Claudius Caecus is the original source, and Sallust is the one who preserved and transmitted it."}, {"text": "The quote's authenticity is questionable due to multiple attributions.", "isCorrect": false, "rationale": "Multiple attributions typically refer to different individuals claiming authorship, not one person citing another. This citation strengthens rather than questions authenticity within its historical context."}, {"text": "Appius Claudius Caecus originated the thought, and Sallust recorded or transmitted it to posterity.", "isCorrect": true, "rationale": "This is the correct interpretation. Appius Claudius Caecus is credited as the speaker/author, and Sallust, a later historian, is the source through whom we know the quote, meaning he cited or recorded it."}, {"text": "Both Appius Claudius Caecus and Sallust were contemporaries who collaborated on philosophical texts.", "isCorrect": false, "rationale": "Appius Claudius Caecus lived in the 4th-3rd century BCE, while Sallust lived in the 1st century BCE. They were not contemporaries, making collaboration impossible."}]}, {"question": "What is the most probable reason for including this specific epigraph at the beginning of a textbook section?", "options": [{"text": "To introduce a historical overview of Roman proverbs.", "isCorrect": false, "rationale": "While it is a Roman proverb, the primary purpose of an epigraph is typically to set the theme or tone for the *following* content, not to provide a historical overview of proverbs themselves."}, {"text": "To emphasize the role of luck in achieving success.", "isCorrect": false, "rationale": "The quote emphasizes individual 'making' or agency, which contrasts with the idea of relying on luck. It suggests active creation of fortune rather than passive reception."}, {"text": "To establish a foundational theme of personal responsibility and agency for the subsequent content.", "isCorrect": true, "rationale": "Epigraphs typically serve to introduce or encapsulate the main idea, theme, or underlying philosophy of the chapter or section. This quote strongly conveys personal responsibility and agency, making it a suitable thematic opener."}, {"text": "To showcase the linguistic beauty of classical Latin.", "isCorrect": false, "rationale": "While the Latin is part of its presentation, the primary function of an epigraph in an educational context is usually thematic, not merely an appreciation of language for its own sake, especially with an accompanying translation."}]}, {"question": "In the context of the epigraph, the term \"fortune\" (fortunae) is best understood as encompassing:", "options": [{"text": "Exclusively monetary wealth and financial success.", "isCorrect": false, "rationale": "While wealth can be a component, 'fortune' in this broader philosophical context refers to one's entire life condition, circumstances, and destiny, not just money."}, {"text": "Only predetermined events that unfold independently of human will.", "isCorrect": false, "rationale": "This contradicts the idea that one 'makes' their own fortune. If it were predetermined, individuals would not be its makers."}, {"text": "A person's overall life path, destiny, and conditions, shaped by their actions and choices.", "isCorrect": true, "rationale": "This definition aligns with the active role of 'making' one's fortune, encompassing all aspects of life that result from individual effort, choices, and agency, which is a common interpretation of 'fortuna' in classical philosophy."}, {"text": "Random occurrences and unforeseen advantages.", "isCorrect": false, "rationale": "This implies a passive recipient of fortune, whereas the quote emphasizes an active creator. While randomness can exist, the core message points to agency."}]}, {"question": "If a student were to apply the philosophy of this epigraph to their academic life, what would be the most consistent approach?", "options": [{"text": "Waiting for inspiration or good luck to achieve high grades.", "isCorrect": false, "rationale": "This approach relies on passive waiting or external factors, which is contrary to the active 'making' of one's fortune."}, {"text": "Blaming external factors or teachers for poor academic performance.", "isCorrect": false, "rationale": "This shifts responsibility away from the individual, directly opposing the principle that each person is the maker of their own fortune."}, {"text": "Actively engaging in study, seeking help, and taking ownership of their learning outcomes.", "isCorrect": true, "rationale": "This approach demonstrates personal agency, proactive effort, and taking responsibility for one's academic success, which is a direct application of 'making their own fortune'."}, {"text": "Focusing primarily on group projects to ensure shared responsibility for success.", "isCorrect": false, "rationale": "While group projects are valuable, the epigraph's emphasis on 'each person' (quisque) points to individual responsibility, which might be diluted by an exclusive focus on shared responsibility without individual accountability."}]}, {"question": "The worldview conveyed by the epigraph most closely contrasts with which of the following perspectives?", "options": [{"text": "Existentialism, which stresses individual freedom and responsibility.", "isCorrect": false, "rationale": "Existentialism shares similarities with the epigraph's message by emphasizing individual freedom, choice, and responsibility for one's life, thus it does not contrast."}, {"text": "Stoicism, which advocates for controlling one's reactions and inner state.", "isCorrect": false, "rationale": "Stoicism emphasizes control over what is within one's power (reactions, choices) and acceptance of what is not, which aligns with taking agency over one's fortune rather than contrasting with it."}, {"text": "Pre-destination or predestination, where one's ultimate fate is divinely ordained.", "isCorrect": true, "rationale": "Pre-destination implies that one's destiny is already determined by a higher power or cosmic plan, leaving little room for individual 'making' of fortune, thus directly contrasting with the epigraph's message of self-authorship."}, {"text": "Humanism, which values human agency and individual potential.", "isCorrect": false, "rationale": "Humanism strongly aligns with the epigraph's emphasis on human agency and potential, so it does not represent a contrast."}]}, {"question": "What does the epigraph suggest about the nature of human will and capacity?", "options": [{"text": "Human will is largely irrelevant in the face of grand cosmic forces.", "isCorrect": false, "rationale": "This contradicts the core message, which implies that human will and action are crucial in shaping destiny."}, {"text": "Humans possess a fundamental capacity to influence and determine their life's trajectory.", "isCorrect": true, "rationale": "The phrase 'maker of their own fortune' directly attributes significant power and capacity to the individual to actively shape their life path."}, {"text": "External societal structures are the sole determinants of individual success.", "isCorrect": false, "rationale": "While societal structures play a role, the epigraph places primary emphasis on individual agency, not external structures as the 'sole' determinants."}, {"text": "Ignorance of one's future is a blessing, as it removes the burden of choice.", "isCorrect": false, "rationale": "The epigraph speaks to making choices and shaping one's future, implying that knowledge or foresight enables action, rather than ignorance being a blessing."}]}, {"question": "How might the wisdom of this ancient Roman quote remain relevant in a modern, complex society?", "options": [{"text": "It serves as a historical curiosity with limited practical application today.", "isCorrect": false, "rationale": "The theme of personal responsibility and agency is a timeless concept that remains highly relevant across different eras and societal structures."}, {"text": "It encourages a passive acceptance of one's circumstances, regardless of the challenges.", "isCorrect": false, "rationale": "The quote encourages active 'making' or shaping of circumstances, not passive acceptance."}, {"text": "It provides a foundational principle for personal motivation, resilience, and goal setting.", "isCorrect": true, "rationale": "In a modern context, understanding oneself as the 'maker of one's fortune' can empower individuals to set goals, overcome obstacles through personal effort, and take responsibility for their path, directly influencing motivation and resilience."}, {"text": "It validates the idea that individual success is solely a matter of inherent talent.", "isCorrect": false, "rationale": "The quote emphasizes 'making' or effort, not just innate talent. While talent can contribute, the focus is on active creation rather than passive possession of attributes."}]}, {"question": "Considering the philosophical weight of the quote, what is the most significant takeaway for a reader encountering it?", "options": [{"text": "The importance of memorizing Latin phrases for cultural literacy.", "isCorrect": false, "rationale": "While knowing the phrase is part of it, the primary 'takeaway' of such a profound statement is its meaning and implication, not merely its linguistic form."}, {"text": "An understanding that external events are the primary determinants of success.", "isCorrect": false, "rationale": "This contradicts the core message of individual agency. The quote emphasizes internal action rather than external determination."}, {"text": "A call to reflect on one's own role and responsibility in shaping their life's direction.", "isCorrect": true, "rationale": "The quote functions as a powerful prompt for introspection, urging individuals to consider how their actions, choices, and efforts contribute to their overall life outcomes. This is the most significant philosophical takeaway."}, {"text": "A realization that all individuals start with equal opportunities in life.", "isCorrect": false, "rationale": "The quote speaks to making one's fortune from their given starting point, not necessarily that all starting points are equal. It's about agency, not initial conditions."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
