    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 6, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the epigraph, what is the fundamental nature of perception?", "options": [{"text": "It is an act of pure, detached observation.", "isCorrect": false, "rationale": "The phrase 'to be affected' directly contradicts the idea of pure, detached observation, suggesting involvement and influence."}, {"text": "It involves being influenced or acted upon by something external.", "isCorrect": true, "rationale": "The translation 'to perceive is to be affected' clearly states that perception involves undergoing an influence or impact from outside the perceiver."}, {"text": "It is solely an internal, mental process independent of external stimuli.", "isCorrect": false, "rationale": "The concept of 'being affected' implies an interaction with something external, rather than an entirely independent internal process."}, {"text": "It signifies complete control over one's sensory experiences.", "isCorrect": false, "rationale": "'To be affected' implies a degree of passivity or receptiveness, which is contrary to the idea of complete control over experiences."}]}, {"question": "The Latin word 'pati' in 'Sentire est pati' primarily suggests that the act of perception is:", "options": [{"text": "Active and commanding.", "isCorrect": false, "rationale": "'Pati' means 'to suffer,' 'to undergo,' or 'to be affected,' which denotes a passive rather than an active or commanding role."}, {"text": "Passive and receptive.", "isCorrect": true, "rationale": "'Pati' highlights the receptive nature of perception, where the perceiver is acted upon or undergoes an experience, rather than initiating it fully."}, {"text": "Independent and self-initiated.", "isCorrect": false, "rationale": "The meaning of 'pati' indicates dependence on an external influence, contrasting with independence or self-initiation."}, {"text": "Creative and constructive.", "isCorrect": false, "rationale": "While perception can involve interpretation, 'pati' itself focuses on the experience of being acted upon, not on the creative aspect of the perceiver."}]}, {"question": "If 'to perceive is to be affected,' what must be true about the relationship between the perceiver and the perceived object?", "options": [{"text": "The perceiver remains entirely separate and unaffected by the object.", "isCorrect": false, "rationale": "The core statement 'to be affected' directly contradicts the notion of remaining entirely separate and unaffected."}, {"text": "The perceived object is a creation of the perceiver's mind.", "isCorrect": false, "rationale": "Being 'affected' implies that the object has a real impact on the perceiver, rather than being solely a mental construct."}, {"text": "The perceiver undergoes some change or influence due to the object.", "isCorrect": true, "rationale": "The phrase 'to be affected' means to experience an alteration or impact, indicating that the perceiver is changed or influenced by the interaction with the object."}, {"text": "The perceiver actively imposes their will upon the object.", "isCorrect": false, "rationale": "'To be affected' describes a passive experience, where the perceiver is subject to influence, rather than actively imposing will upon something else."}]}, {"question": "Based on the epigraph, which of the following best describes the character of sensory experience?", "options": [{"text": "It is a one-way process where the perceiver merely observes.", "isCorrect": false, "rationale": "The statement 'to be affected' implies an interaction and impact, not just a passive, one-way observation."}, {"text": "It involves an interaction where the perceiver is impacted by the world.", "isCorrect": true, "rationale": "The phrase 'to be affected' signifies that the external world makes an impact on the perceiver, highlighting an interactive and reciprocal relationship."}, {"text": "It is purely an internal projection with no external correlation.", "isCorrect": false, "rationale": "Being 'affected' by something suggests an external reality that causes the effect, not an internal projection without correlation."}, {"text": "It allows the perceiver to remain untouched by external reality.", "isCorrect": false, "rationale": "The very meaning of 'to be affected' is to be touched or influenced, directly contradicting the idea of remaining untouched."}]}, {"question": "As an epigraph for a chapter, 'To perceive is to be affected' most likely serves to introduce a theme emphasizing:", "options": [{"text": "The purely objective nature of scientific inquiry.", "isCorrect": false, "rationale": "The concept of 'being affected' implies a subjective experience or interaction, which contrasts with a purely objective, disengaged approach."}, {"text": "The reciprocal relationship between a subject and its environment in understanding.", "isCorrect": true, "rationale": "The epigraph suggests that understanding (perception) involves a dynamic interaction where the subject is influenced by its surroundings, indicating a reciprocal relationship."}, {"text": "The supremacy of rational thought over sensory input.", "isCorrect": false, "rationale": "The epigraph focuses on the nature of 'perceive' (sensory input), not on the superiority of rational thought over it."}, {"text": "The illusionary nature of all sensory experience.", "isCorrect": false, "rationale": "The quote defines perception as being affected, implying a real interaction with reality, not that reality or sensory experience is inherently illusory."}]}, {"question": "The statement 'To perceive is to be affected' most directly challenges which alternative view of perception?", "options": [{"text": "Perception is a process of interpreting sensory data.", "isCorrect": false, "rationale": "Interpretation can follow being affected; this view isn't necessarily challenged but might be complemented."}, {"text": "Perception involves passive reception of information.", "isCorrect": false, "rationale": "The idea of being 'affected' is consistent with passive reception, so this view is not challenged."}, {"text": "Perception is an entirely active and self-generated mental construct.", "isCorrect": true, "rationale": "This view posits perception as purely internal and active, which is directly contrasted by 'to be affected,' implying external influence and a passive component."}, {"text": "Perception relies on external stimuli.", "isCorrect": false, "rationale": "The idea of being 'affected' is consistent with relying on external stimuli, so this view is not challenged."}]}, {"question": "Given that the quote is from Aristotle's 'De Anima' (On the Soul), the epigraph hints that Aristotle's conception of the soul likely involves:", "options": [{"text": "A complete detachment from all bodily and sensory experiences.", "isCorrect": false, "rationale": "If the soul is that which perceives, and perception means 'to be affected,' then the soul cannot be completely detached from sensory experiences."}, {"text": "A close relationship with and responsiveness to the external world through sensation.", "isCorrect": true, "rationale": "If the soul is the faculty that perceives, and perception inherently involves being 'affected' by the external world, then the soul must be intimately connected to and responsive to that world."}, {"text": "An existence entirely independent of any external influence.", "isCorrect": false, "rationale": "The statement 'to be affected' explicitly indicates influence, negating the idea of complete independence from external factors."}, {"text": "A faculty that solely directs and controls the body without being influenced by it.", "isCorrect": false, "rationale": "While the soul might direct the body, the epigraph emphasizes that perception—a function of the soul—also involves being 'affected,' suggesting influence rather than a one-way control."}]}, {"question": "When Aristotle states 'to perceive is to be affected,' he implies that perception is not merely about noticing, but also about:", "options": [{"text": "Actively shaping the environment to fit one's desires.", "isCorrect": false, "rationale": "Being 'affected' denotes a passive reception of influence, not an active imposition of will or shaping of the environment."}, {"text": "Experiencing an impact or change as a result of sensory input.", "isCorrect": true, "rationale": "'To be affected' means to undergo an impact or change, indicating that sensory input causes a real experience or alteration within the perceiver."}, {"text": "Exercising one's will over external phenomena.", "isCorrect": false, "rationale": "The phrase emphasizes being acted upon, which is the opposite of exercising one's will or control over external phenomena."}, {"text": "Achieving a state of absolute, unchanging internal stability.", "isCorrect": false, "rationale": "Being 'affected' implies a dynamic interaction that can lead to change, which is contrary to achieving an unchanging internal stability."}]}, {"question": "The universality of the phrase 'To perceive is to be affected' suggests that Aristotle views this characteristic of perception as:", "options": [{"text": "Limited to humans only.", "isCorrect": false, "rationale": "The statement is presented as a general definition, not explicitly limited to humans, implying a broader, fundamental truth about perception itself."}, {"text": "A fundamental and inherent quality of any act of perception.", "isCorrect": true, "rationale": "The phrasing 'to perceive *is* to be affected' presents it as an essential, definitional characteristic, meaning it's inherent to the very act of perceiving."}, {"text": "A temporary state that can be overcome with training.", "isCorrect": false, "rationale": "Presenting it as 'is to be affected' defines perception, rather than describing a temporary state or a flaw that can be overcome."}, {"text": "A flaw in the process of understanding reality.", "isCorrect": false, "rationale": "The epigraph states this as a definition, not a defect or flaw in perception."}]}, {"question": "The Latin 'Sentire' typically refers to sensing or feeling. In the context of the epigraph, what does this choice of word emphasize about perception?", "options": [{"text": "Its purely intellectual and rational dimension.", "isCorrect": false, "rationale": "'Sensing' and 'feeling' are distinct from purely intellectual or rational thought and often imply direct experience."}, {"text": "Its grounding in direct, embodied experience and susceptibility to impact.", "isCorrect": true, "rationale": "'Sentire' emphasizes the direct, often bodily or experiential aspect of perception, which is inherently tied to being 'affected' or impacted by stimuli."}, {"text": "Its capacity for abstract thought, detached from the physical world.", "isCorrect": false, "rationale": "Sensing and feeling are typically connected to the physical world and direct experience, not abstract thought detached from it."}, {"text": "Its ability to create an entirely new reality within the mind.", "isCorrect": false, "rationale": "While the mind interprets, 'sentire' combined with 'pati' emphasizes the reception of influence from an existing reality rather than the creation of an entirely new one."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
