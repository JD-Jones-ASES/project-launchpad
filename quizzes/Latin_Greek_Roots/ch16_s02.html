    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 16, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary meaning of the Latin root \"tempor\" or \"tempus\"?", "options": [{"text": "Earth", "isCorrect": false, "rationale": "The text explicitly states the meaning of the root is 'time', not 'earth'."}, {"text": "Time", "isCorrect": true, "rationale": "The text clearly states: \"Meaning: time\" for the root 'tempor / tempus'."}, {"text": "Life", "isCorrect": false, "rationale": "The text explicitly states the meaning of the root is 'time', not 'life'."}, {"text": "Space", "isCorrect": false, "rationale": "The text explicitly states the meaning of the root is 'time', not 'space'."}]}, {"question": "From which language does the root \"tempor/tempus\" originate?", "options": [{"text": "Greek", "isCorrect": false, "rationale": "The text explicitly states the origin is Latin, not Greek."}, {"text": "French", "isCorrect": false, "rationale": "The text explicitly states the origin is Latin, not French."}, {"text": "Latin", "isCorrect": true, "rationale": "The text states: \"Origin: Latin tempus (time), temporis (genitive: of time)\"."}, {"text": "German", "isCorrect": false, "rationale": "The text explicitly states the origin is Latin, not German."}]}, {"question": "Under what specific condition is the variant \"temp\" used for this root?", "options": [{"text": "When referring to very short periods.", "isCorrect": false, "rationale": "The text specifies 'shortened compounds', not the duration of time being referred to."}, {"text": "In shortened compounds.", "isCorrect": true, "rationale": "The text explicitly states: \"Variants: temp (in shortened compounds)\"."}, {"text": "When combined with Greek roots.", "isCorrect": false, "rationale": "The text does not mention combination with Greek roots as a condition for using 'temp'."}, {"text": "At the beginning of a word.", "isCorrect": false, "rationale": "The text specifies 'shortened compounds', not its position within a word."}]}, {"question": "Which of the following example words most clearly demonstrates the meaning of the root \"tempor/tempus\" as 'time'?", "options": [{"text": "Temperature", "isCorrect": false, "rationale": "While sounding similar, 'temperature' relates to heat, not time, and is not derived from 'tempor/tempus'."}, {"text": "Tempo", "isCorrect": true, "rationale": "'Tempo' (as in musical tempo) directly relates to the speed or rate of time, perfectly aligning with the root's meaning of 'time'."}, {"text": "Temptation", "isCorrect": false, "rationale": "'Temptation' derives from Latin 'temptare' (to try, test), which is unrelated to the root 'tempor/tempus' meaning time."}, {"text": "Temple", "isCorrect": false, "rationale": "'Temple' refers to a place of worship or a part of the head, unrelated to time."}]}, {"question": "Considering the meaning of \"tempor/tempus,\" which of the following words *does not* derive from this root?", "options": [{"text": "Contemporary", "isCorrect": false, "rationale": "'Contemporary' means 'existing, occurring, or living at the same time', directly derived from 'con-' (with) and 'tempor' (time)."}, {"text": "Temporal", "isCorrect": false, "rationale": "'Temporal' means 'relating to worldly as opposed to spiritual affairs' or 'relating to time', directly derived from 'tempor' (time)."}, {"text": "Temperament", "isCorrect": true, "rationale": "'Temperament' refers to a person's character or disposition and derives from Latin 'temperare' (to mix, moderate), which is unrelated to the root 'tempor/tempus' meaning time."}, {"text": "Temporary", "isCorrect": false, "rationale": "'Temporary' means 'lasting for only a limited period of time', directly derived from 'tempor' (time)."}]}, {"question": "If someone is described as \"living in contemporary society,\" what does \"contemporary\" imply about their relation to society, based on the root's meaning?", "options": [{"text": "They live in a very old, traditional society.", "isCorrect": false, "rationale": "This would be the opposite of 'contemporary'. 'Contemporary' implies being current or modern."}, {"text": "They live in a society focused on space travel.", "isCorrect": false, "rationale": "This is an unrelated concept. 'Contemporary' relates to time, not specifically space or a focus on space travel."}, {"text": "They live at the same time as the current period.", "isCorrect": true, "rationale": "'Contemporary' combines the prefix 'con-' (meaning with, together) and the root 'tempor' (meaning time), thus signifying 'at the same time' or 'of the present time'."}, {"text": "They live in a temporary dwelling.", "isCorrect": false, "rationale": "'Contemporary' refers to the timing of existence, not the permanence or impermanence of a dwelling."}]}, {"question": "The word \"temporal\" can refer to things relating to worldly life as opposed to spiritual life, or simply to time. Given the root's meaning, which aspect of \"temporal\" is most directly supported by its etymology?", "options": [{"text": "Its connection to earthly pleasures.", "isCorrect": false, "rationale": "While 'temporal' can be contrasted with 'spiritual', the direct link from the root 'time' is not specifically to 'pleasures'."}, {"text": "Its relation to physical space.", "isCorrect": false, "rationale": "The root means 'time', not 'space'. Any association with space would be indirect."}, {"text": "Its association with the finite nature of time.", "isCorrect": true, "rationale": "'Temporal' (from 'time') refers to things that exist within the bounds of time, implying a finite, worldly existence as opposed to an eternal or spiritual one. This directly stems from the root's meaning."}, {"text": "Its emphasis on spiritual matters.", "isCorrect": false, "rationale": "'Temporal' is typically contrasted with 'spiritual', meaning it refers to non-spiritual or worldly matters, not an emphasis on spiritual ones."}]}, {"question": "If you were forming a word to describe something that occurs or lasts for a limited duration, which form of the root would you most likely use, similar to 'temporary'?", "options": [{"text": "Tempus", "isCorrect": false, "rationale": "'Tempus' is the original noun form, but 'tempor' is the combining form typically used in adjectives like 'temporary'."}, {"text": "Tempor", "isCorrect": true, "rationale": "The word 'temporary' uses the 'tempor' form of the root. This is the common combining form for creating adjectives and related nouns from this root."}, {"text": "Temp", "isCorrect": false, "rationale": "'Temp' is specified for 'shortened compounds', not for the general formation of words like 'temporary'."}, {"text": "Temporis", "isCorrect": false, "rationale": "'Temporis' is the genitive form ('of time') and is not typically used to form adjectives like 'temporary'."}]}, {"question": "The text states \"temporis\" is the genitive form of \"tempus\" and translates it as \"of time.\" What does this parenthetical information primarily suggest about the function of the genitive case in Latin?", "options": [{"text": "It indicates the direct object of a verb.", "isCorrect": false, "rationale": "The direct object is typically indicated by the accusative case, not the genitive. The phrase 'of time' clearly indicates a different function."}, {"text": "It indicates possession or a relationship of 'of X'.", "isCorrect": true, "rationale": "The translation 'of time' directly illustrates that the genitive case often indicates possession, origin, or a close relationship, typically translated with 'of'."}, {"text": "It indicates the subject of a sentence.", "isCorrect": false, "rationale": "The subject of a sentence is typically indicated by the nominative case, not the genitive."}, {"text": "It indicates an indirect object.", "isCorrect": false, "rationale": "The indirect object is typically indicated by the dative case, not the genitive."}]}, {"question": "The text mentions \"temp\" as a variant used in \"shortened compounds.\" Which of the following hypothetical scenarios would most appropriately use the \"temp\" variant?", "options": [{"text": "A formal scientific term for measuring time accurately, like 'Tempometer'.", "isCorrect": false, "rationale": "Formal scientific terms often use full root forms or established prefixes/suffixes. 'Tempometer' sounds like a standard compound that would likely use 'temporo-' or a similar full form rather than the shortened 'temp'."}, {"text": "A descriptor for a device that reacts quickly to changes in time, like 'Temp-responsive'.", "isCorrect": true, "rationale": "'Temp-responsive' fits the description of a 'shortened compound' where 'temp' serves as a concise, abbreviated form for 'time' in a compound word, similar to how 'time-sensitive' might be shortened."}, {"text": "A verb describing the act of prolonging something in time, like 'Temporize'.", "isCorrect": false, "rationale": "The word 'temporize' (meaning to delay or gain time) uses the full 'tempor' root, not the shortened 'temp' variant, indicating it's not a 'shortened compound'."}, {"text": "A noun referring to a trial or test of endurance, like 'Temptation'.", "isCorrect": false, "rationale": "'Temptation' is unrelated to the 'tempor/tempus' root and does not fit the description of using the 'temp' variant in a 'shortened compound'."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
