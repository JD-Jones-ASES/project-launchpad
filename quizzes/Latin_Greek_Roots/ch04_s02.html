        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 4, Section 2</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary meaning of the Latin root \"scrib\" or \"script\"?", "options": [{"text": "To speak", "isCorrect": false, "rationale": "The root for 'to speak' often comes from Latin 'loqui' (e.g., loquacious) or 'dicere' (e.g., dictate), not 'scrib'."}, {"text": "To draw", "isCorrect": false, "rationale": "While writing involves forming shapes, the specific and primary meaning of 'scrib' is 'to write', not the broader 'to draw'."}, {"text": "To write", "isCorrect": true, "rationale": "The ROOT_PROFILE explicitly states that the meaning of 'scrib/script' is 'to write', directly linking to its Latin origin 'scribere'."}, {"text": "To read", "isCorrect": false, "rationale": "The root for 'to read' often comes from Latin 'legere' (e.g., legible), which is distinct from 'scrib'."}]}, {"question": "A doctor *prescribes* medicine. Based on the root 'scrib' and common prefixes, what does 'prescribe' most accurately mean?", "options": [{"text": "To write down instructions *before*", "isCorrect": true, "rationale": "The prefix 'pre-' means 'before', and 'scrib' means 'to write'. Therefore, 'prescribe' means to write down instructions or orders in advance, typically for treatment."}, {"text": "To write a detailed report *about*", "isCorrect": false, "rationale": "While it involves writing, the prefix 'pre-' does not convey the meaning of 'about' or 'detailed report'."}, {"text": "To write an explanation *through*", "isCorrect": false, "rationale": "The meaning 'through' is typically conveyed by prefixes like 'trans-' or 'per-', not 'pre-'. Also, 'explanation' is not the primary meaning here."}, {"text": "To write an agreement *with*", "isCorrect": false, "rationale": "The meaning 'with' or 'together' is usually conveyed by prefixes like 'con-' or 'co-', not 'pre-'. A prescription is an order, not an agreement in this sense."}]}, {"question": "The root appears in two main forms, 'scrib' and 'script'. How does their Latin origin, 'scribere' (to write) and 'scriptum' (written), best explain this duality?", "options": [{"text": "'Scribere' is for nouns, 'scriptum' for adjectives.", "isCorrect": false, "rationale": "'Scribere' is an infinitive verb ('to write'), and 'scriptum' is a past participle ('written'), neither of which exclusively forms nouns or adjectives in English word derivation."}, {"text": "'Scribere' reflects the *action* of writing, while 'scriptum' refers to something *already written* or the result.", "isCorrect": true, "rationale": "'Scribere' is the Latin infinitive verb, emphasizing the ongoing act of writing (e.g., 'describe'). 'Scriptum' is the past participle, referring to the completed act or the written product (e.g., 'manuscript', 'script')."}, {"text": "'Scribere' is for informal writing, 'scriptum' for formal writing.", "isCorrect": false, "rationale": "The distinction between formal and informal writing is not based on the Latin verb and participle forms."}, {"text": "'Scribere' is exclusively for English words, 'scriptum' for Latin words.", "isCorrect": false, "rationale": "Both 'scribere' and 'scriptum' are sources for numerous English words, demonstrating their role in word derivation across languages."}]}, {"question": "The word 'manuscript' is often defined as a document written by hand. What does the prefix 'manu-' specifically add to the root 'script' in this context?", "options": [{"text": "It indicates the document's age.", "isCorrect": false, "rationale": "While many manuscripts are old, the prefix 'manu-' itself (from Latin 'manus') specifically means 'hand', not 'old' or 'aged'."}, {"text": "It specifies the *method* or *agent* of writing.", "isCorrect": true, "rationale": "The prefix 'manu-' derives from the Latin word for 'hand'. Combined with 'script' (written), it explicitly specifies that the writing was done by hand."}, {"text": "It denotes the *location* where the writing occurred.", "isCorrect": false, "rationale": "'Manu-' refers to the hand, not a geographical or physical location of writing."}, {"text": "It suggests the *purpose* of the writing is secret.", "isCorrect": false, "rationale": "There is no etymological basis for 'manu-' to imply secrecy in the context of writing."}]}, {"question": "If you ask for a 'transcript' of a recording, what fundamental process does the root 'script' combined with the prefix 'trans-' (across, over) suggest has occurred?", "options": [{"text": "The recording was orally summarized for brevity.", "isCorrect": false, "rationale": "The root 'script' implies writing, not an oral summary. 'Transcribe' is about converting to written form."}, {"text": "The original audio was converted into a *written document*.", "isCorrect": true, "rationale": "The prefix 'trans-' means 'across' or 'to change from one state to another', and 'script' means 'written'. A transcript is the written form of spoken or recorded words, effectively changing its medium across forms."}, {"text": "The recording was translated into a different language.", "isCorrect": false, "rationale": "While translation might involve transcription, 'transcribe' specifically refers to converting spoken words into written text, not necessarily changing the language."}, {"text": "The recording was digitally enhanced for clarity.", "isCorrect": false, "rationale": "Digital enhancement relates to audio manipulation, not the process of creating a written version of the content."}]}, {"question": "When you 'describe' something, you are providing a detailed account of its characteristics. Which common prefix, when combined with 'scrib', best contributes the idea of thoroughly detailing or writing down completely?", "options": [{"text": "'trans-' (across, through)", "isCorrect": false, "rationale": "The prefix 'trans-' typically implies movement or change, not necessarily thorough detailing in the context of 'describe'."}, {"text": "'pre-' (before)", "isCorrect": false, "rationale": "The prefix 'pre-' means 'before', which does not convey the sense of providing a detailed account."}, {"text": "'de-' (down, completely, thoroughly)", "isCorrect": true, "rationale": "The prefix 'de-' can mean 'down', 'completely', or 'thoroughly'. When combined with 'scrib' ('to write'), it forms 'describe', meaning to write down completely or thoroughly detail something."}, {"text": "'re-' (again, back)", "isCorrect": false, "rationale": "The prefix 're-' means 'again' or 'back', suggesting repetition or reversal, not thorough description."}]}, {"question": "The section mentions 'scrip' as a shortened variant. In the word 'conscription,' combining 'con-' (with, together) and 'scrip,' what is the most logical interpretation related to the root's meaning?", "options": [{"text": "A written note exchanged between individuals.", "isCorrect": false, "rationale": "While a 'scrip' can be a small piece of paper, 'conscription' refers to a more formal and collective act, not just an exchanged note."}, {"text": "The act of writing names down *together* for a collective enrollment or service.", "isCorrect": true, "rationale": "The prefix 'con-' means 'with' or 'together', and 'scrip' (from 'scrib') means 'to write'. Conscription historically involved 'writing names together' onto a list for mandatory service."}, {"text": "A short, unwritten command issued to a group.", "isCorrect": false, "rationale": "The root 'scrip' implies writing, so an 'unwritten' command is contradictory to its meaning."}, {"text": "A detailed description of a collective event.", "isCorrect": false, "rationale": "While 'con-' implies collective, the core action of 'conscription' is the enrollment by writing names, not merely describing an event."}]}, {"question": "Given the primary meaning of the root 'scrib/script' is 'to write', which of the following professions would *most frequently* use or interact with words derived from this root in their daily work?", "options": [{"text": "Carpenter", "isCorrect": false, "rationale": "Carpenters primarily work with constructing objects from wood, an activity not directly related to writing."}, {"text": "Sculptor", "isCorrect": false, "rationale": "Sculptors create three-dimensional art, which involves shaping materials rather than writing."}, {"text": "Author", "isCorrect": true, "rationale": "Authors are inherently involved in the act of writing (e.g., creating manuscripts, writing descriptions, drafting scripts), making them the profession most closely aligned with the root's meaning."}, {"text": "Chef", "isCorrect": false, "rationale": "Chefs prepare food, and while they might follow or write recipes, their core professional activity is cooking, not writing."}]}, {"question": "If a new word were coined, 'superscription,' combining the prefix 'super-' (above, over) and the root 'script,' what would it most logically refer to?", "options": [{"text": "A writing placed *underneath* the main text.", "isCorrect": false, "rationale": "The prefix 'super-' means 'above' or 'over', making 'underneath' incorrect."}, {"text": "A writing placed *above* or *on the surface* of something.", "isCorrect": true, "rationale": "The prefix 'super-' means 'above' or 'over', and 'script' means 'writing'. Therefore, a 'superscription' would be writing placed above or on the surface, such as an address on an envelope."}, {"text": "The act of rewriting something multiple times.", "isCorrect": false, "rationale": "The prefix 'super-' does not imply repetition or multiple occurrences."}, {"text": "A very long and detailed piece of writing.", "isCorrect": false, "rationale": "While 'super-' can imply superiority, it does not inherently mean 'long' or 'detailed' in this context of placement."}]}, {"question": "In a broader sense, how does the word 'script' (referring to the text of a play or movie) directly embody the primary meaning of its root?", "options": [{"text": "It refers to the *verbal improvisation* performed by actors.", "isCorrect": false, "rationale": "A script is a prepared written text, the opposite of verbal improvisation."}, {"text": "It represents the *visual aesthetics* and scenery of a production.", "isCorrect": false, "rationale": "While a script might describe visual elements, its core function is the written dialogue and stage directions, not the visual aesthetics themselves."}, {"text": "It is the *written dialogue and stage directions* that guide the production and performance.", "isCorrect": true, "rationale": "The 'script' of a play or movie is precisely the written document that contains all the dialogue, character actions, and scene descriptions, directly reflecting the root's meaning 'to write' and 'something written'."}, {"text": "It signifies the *financial budget* allocated for the production.", "isCorrect": false, "rationale": "The financial budget is a separate document and does not relate to the 'written text for performance' meaning of 'script'."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
