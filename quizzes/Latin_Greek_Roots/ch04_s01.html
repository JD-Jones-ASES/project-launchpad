<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'Verba volant, scripta manent' mean?", "options": [{"text": "Words are powerful, writing is weak.", "isCorrect": false, "rationale": "The proverb elevates writing."}, {"text": "Spoken words fly away, written words remain.", "isCorrect": true, "rationale": "The translation is provided directly in the text."}, {"text": "Flying words are better.", "isCorrect": false, "rationale": "Contrasts impermanence of speech with permanence of writing."}, {"text": "Writers are more important.", "isCorrect": false, "rationale": "Addresses durability of the medium, not people."}]}, {"question": "'Scripta' shares which root with the chapter?", "options": [{"text": "voc (voice)", "isCorrect": false, "rationale": "'Scripta' contains 'scrib/script.'"}, {"text": "aud (hear)", "isCorrect": false, "rationale": "'Scripta' derives from 'to write.'"}, {"text": "scrib (to write)", "isCorrect": true, "rationale": "From Latin scribere (to write)."}, {"text": "man (hand)", "isCorrect": false, "rationale": "'manent' comes from manere (to remain)."}]}, {"question": "What is the primary message for a chapter on 'scrib'?", "options": [{"text": "Speaking is preferable.", "isCorrect": false, "rationale": "The proverb shows writing endures."}, {"text": "Writing has lasting power that speech does not.", "isCorrect": true, "rationale": "Written words remain while spoken words fly away."}, {"text": "Latin is superior.", "isCorrect": false, "rationale": "Universal claim about speech vs. writing."}, {"text": "Words lose meaning over time.", "isCorrect": false, "rationale": "Contrasts durability, not meaning loss."}]}, {"question": "'Volant' means 'they fly.' Which English word shares this root?", "options": [{"text": "Volume", "isCorrect": false, "rationale": "From 'volvere' (to roll), not 'volare' (to fly)."}, {"text": "Volatile", "isCorrect": true, "rationale": "From 'volatilis,' from 'volare' (to fly)."}, {"text": "Voluntary", "isCorrect": false, "rationale": "From 'voluntas' (will)."}, {"text": "Volcano", "isCorrect": false, "rationale": "From Vulcanus, Roman god of fire."}]}, {"question": "Why is this proverb appropriate for 'scrib'?", "options": [{"text": "Latin proverbs are hard to translate.", "isCorrect": false, "rationale": "The proverb is clearly translated. Its relevance is thematic."}, {"text": "It celebrates writing as enduring communication.", "isCorrect": true, "rationale": "Written words persist -- directly celebrating writing."}, {"text": "It warns against trusting documents.", "isCorrect": false, "rationale": "Affirms durability of writing."}, {"text": "Romans preferred oral communication.", "isCorrect": false, "rationale": "Highlights advantage of writing."}]}, {"question": "'Manent' means 'they remain.' Which word shares this root?", "options": [{"text": "Manuscript", "isCorrect": false, "rationale": "From 'manu' (hand) + 'scriptus' (written)."}, {"text": "Permanent", "isCorrect": true, "rationale": "From 'permanere' (per- + manere = remain throughout)."}, {"text": "Manual", "isCorrect": false, "rationale": "From 'manus' (hand)."}, {"text": "Manner", "isCorrect": false, "rationale": "From Old French 'maniere.'"}]}, {"question": "What does 'verba' refer to?", "options": [{"text": "Written texts", "isCorrect": false, "rationale": "Written = 'scripta.' 'Verba' = spoken words."}, {"text": "Spoken words", "isCorrect": true, "rationale": "Contrasted with 'scripta,' referring to spoken words that fly away."}, {"text": "Verbs", "isCorrect": false, "rationale": "Here 'verba' means words generally, not grammatical verbs."}, {"text": "Promises", "isCorrect": false, "rationale": "Means words generally."}]}, {"question": "A lawyer says contracts are more reliable than oral agreements. Which part supports this?", "options": [{"text": "'Scripta manent'", "isCorrect": true, "rationale": "Written records endure and can be referenced."}, {"text": "'Verba volant'", "isCorrect": false, "rationale": "Explains why oral is unreliable, but the lawyer favors written."}, {"text": "Both equally", "isCorrect": false, "rationale": "The positive claim is best supported by 'scripta manent.'"}, {"text": "Neither", "isCorrect": false, "rationale": "The proverb is highly relevant to law."}]}, {"question": "The contrast between 'volant' and 'manent' represents what device?", "options": [{"text": "Metaphor", "isCorrect": false, "rationale": "The overall structure is antithesis."}, {"text": "Antithesis", "isCorrect": true, "rationale": "Contrasting ideas in parallel structure."}, {"text": "Alliteration", "isCorrect": false, "rationale": "Primary device is the contrast."}, {"text": "Hyperbole", "isCorrect": false, "rationale": "A proportional claim, not exaggeration."}]}, {"question": "If 'scrib' means 'to write,' what is 'scripta'?", "options": [{"text": "Plural past participle: 'things written.'", "isCorrect": true, "rationale": "Neuter plural past participle of 'scribere.'"}, {"text": "A verb meaning 'to write quickly.'", "isCorrect": false, "rationale": "It is a participial form, not a verb here."}, {"text": "Specifically sacred texts.", "isCorrect": false, "rationale": "'Scripta' here means any written words."}, {"text": "An adjective meaning 'beautiful.'", "isCorrect": false, "rationale": "Relates to writing, not beauty."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
