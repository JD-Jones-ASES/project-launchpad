<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 19</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What do the Latin roots jus and jur mean?", "options": [{"text": "power and strength", "isCorrect": false, "rationale": "Power and strength are not the core meanings of jus/jur."}, {"text": "law and right", "isCorrect": true, "rationale": "Jus (genitive juris) means 'law' or 'right' in Latin, giving English words like justice, jury, and jurisdiction."}, {"text": "king and ruler", "isCorrect": false, "rationale": "King and ruler are not the meanings of jus/jur."}, {"text": "truth and knowledge", "isCorrect": false, "rationale": "Truth and knowledge are not the core meanings of jus/jur."}], "id": "q01"}, {"question": "What was the significance of the Twelve Tables in Roman history?", "options": [{"text": "They were twelve stone tablets listing the Roman gods.", "isCorrect": false, "rationale": "The Twelve Tables were about law, not religion."}, {"text": "They were twelve bronze tablets displaying the fundamental laws of the Republic for all citizens to see.", "isCorrect": true, "rationale": "Around 450 BCE, Romans created the Twelve Tables so that laws (jus) would be public, knowable, and applied equally — a turning point in Western civilization."}, {"text": "They were twelve marble tables used by senators for dining.", "isCorrect": false, "rationale": "The Twelve Tables were a legal document, not furniture."}, {"text": "They were twelve lists of crimes punishable by death.", "isCorrect": false, "rationale": "While the Twelve Tables contained laws, they were not specifically a list of capital crimes."}], "id": "q02"}, {"question": "The word jury comes from the Latin jurare. What did jurare mean?", "options": [{"text": "to judge", "isCorrect": false, "rationale": "To judge comes from judex/judicare, not jurare."}, {"text": "to swear an oath", "isCorrect": true, "rationale": "Jurare meant 'to swear.' A jury is a group of citizens who swear an oath to judge a case honestly."}, {"text": "to punish", "isCorrect": false, "rationale": "To punish is not the meaning of jurare."}, {"text": "to write down", "isCorrect": false, "rationale": "To write down relates to graph/gram, not jur."}], "id": "q03"}, {"question": "The root judic comes from judex, which is built from jus + dicere. What does this tell us about what a judge does?", "options": [{"text": "A judge rules over a territory.", "isCorrect": false, "rationale": "Ruling territory is not what judex's etymology emphasizes."}, {"text": "A judge declares or says what the law is.", "isCorrect": true, "rationale": "Judex = jus (law) + dicere (to say): a judge is literally 'one who says what the law is.'"}, {"text": "A judge writes down the laws.", "isCorrect": false, "rationale": "Writing is the role of a scribe; a judge interprets and declares law."}, {"text": "A judge enforces the law with force.", "isCorrect": false, "rationale": "Force is not part of the etymology of judex."}], "id": "q04"}, {"question": "What does jurisdiction mean?", "options": [{"text": "the study of law and legal philosophy", "isCorrect": false, "rationale": "The study of law and legal philosophy is jurisprudence, not jurisdiction."}, {"text": "the authority to declare and apply the law within a territory", "isCorrect": true, "rationale": "Jurisdiction = juris (of law) + dict (to say) + -ion: the authority to 'say the law' within a certain territory."}, {"text": "the punishment given by a court", "isCorrect": false, "rationale": "A punishment is a sentence, not jurisdiction."}, {"text": "the oath taken by a witness", "isCorrect": false, "rationale": "An oath is related to jur (to swear), but jurisdiction refers to territorial authority."}], "id": "q05"}, {"question": "Perjury is the crime of lying under oath. The prefix per- in perjury means:", "options": [{"text": "before", "isCorrect": false, "rationale": "Before is the meaning of pre-, as in prejudice."}, {"text": "again", "isCorrect": false, "rationale": "Again is the meaning of re-, not per-."}, {"text": "wrongly or to destruction", "isCorrect": true, "rationale": "In perjury, per- means 'through' in the sense of 'wrongly' — a corrupted or destroyed oath."}, {"text": "through in the sense of completing", "isCorrect": false, "rationale": "While per- can mean through, in perjury it carries a negative sense of corrupting, not completing."}], "id": "q06"}, {"question": "Which word means 'to make a formal judgment on a dispute'?", "options": [{"text": "adjudicate", "isCorrect": true, "rationale": "Adjudicate = ad- (toward) + judic (judge) + -ate: to judge toward a decision, settling a dispute formally."}, {"text": "jurisdiction", "isCorrect": false, "rationale": "Jurisdiction refers to the authority to apply the law, not the act of judging a specific dispute."}, {"text": "judicial", "isCorrect": false, "rationale": "Judicial is an adjective meaning relating to courts or judges, not a verb meaning to judge a dispute."}, {"text": "prejudice", "isCorrect": false, "rationale": "Prejudice means a judgment made before knowing the facts, not a formal decision on a dispute."}], "id": "q07"}, {"question": "The word prejudice combines pre- + judicium. What does it literally mean?", "options": [{"text": "to judge fairly", "isCorrect": false, "rationale": "Prejudice means the opposite of judging fairly."}, {"text": "to judge someone before knowing the facts", "isCorrect": true, "rationale": "Pre- means 'before' and judicium means 'judgment,' so prejudice is literally to prejudge someone before examining the evidence."}, {"text": "to refuse to judge at all", "isCorrect": false, "rationale": "Refusing to judge is not the meaning of prejudice."}, {"text": "to judge someone after gathering evidence", "isCorrect": false, "rationale": "After gathering evidence would be post-judgment, not prejudice."}], "id": "q08"}, {"question": "Jurisprudence is the philosophy of law. Which two Latin parts combine to make this word?", "options": [{"text": "juri (oath) + prudence (caution)", "isCorrect": false, "rationale": "While close, jurisprudence combines juris (of law) + prudentia (wisdom), not caution."}, {"text": "juris (of law) + prudentia (wisdom)", "isCorrect": true, "rationale": "Jurisprudence literally means 'wisdom about the law' — Roman jurists who studied jurisprudentia were considered among the wisest citizens."}, {"text": "jus (right) + prudence (money)", "isCorrect": false, "rationale": "Prudence does not mean money; it means wisdom or foresight."}, {"text": "judic (judge) + prudence (wisdom)", "isCorrect": false, "rationale": "Jurisprudence is built from juris (of law), not judic (judge)."}], "id": "q09"}, {"question": "Which word describes something relating to courts and the legal system?", "options": [{"text": "judicial", "isCorrect": true, "rationale": "Judicial = judic (judge) + -ial (relating to): describing anything relating to courts, judges, or the law."}, {"text": "justice", "isCorrect": false, "rationale": "Justice is a noun meaning fairness; judicial is an adjective describing legal institutions."}, {"text": "perjury", "isCorrect": false, "rationale": "Perjury is a specific crime (lying under oath), not a general adjective for the legal system."}, {"text": "jurisprudence", "isCorrect": false, "rationale": "Jurisprudence is the philosophy of law, not an adjective for courts and judges."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
