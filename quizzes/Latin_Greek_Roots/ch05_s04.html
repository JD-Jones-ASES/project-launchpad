        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 5, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary meaning of the Latin root 'vis' or 'vid' as presented in this section?", "options": [{"text": "To hear", "isCorrect": false, "rationale": "The root for hearing is 'aud', not 'vis/vid'."}, {"text": "To speak", "isCorrect": false, "rationale": "The roots for speaking are 'voc' or 'dict', not 'vis/vid'."}, {"text": "To see", "isCorrect": true, "rationale": "The section explicitly states that 'vis/vid — the root for seeing'."}, {"text": "To write", "isCorrect": false, "rationale": "The root for writing is 'scrib', not 'vis/vid'."}]}, {"question": "How does the prefix 'super-' alter the meaning of the root 'vis' in the word 'supervise'?", "options": [{"text": "It makes the action happen 'again'.", "isCorrect": false, "rationale": "The prefix 're-' means 'again', not 'super-'."}, {"text": "It indicates an action of 'seeing out'.", "isCorrect": false, "rationale": "The prefix 'e-' means 'out', not 'super-'."}, {"text": "It suggests 'seeing over or above' to direct.", "isCorrect": true, "rationale": "The word 'supervise' is defined as 'to watch over and direct the work of others', directly reflecting 'super-' meaning 'over, above' and 'vis' meaning 'see'."}, {"text": "It implies 'seeing ahead' for preparation.", "isCorrect": false, "rationale": "The prefix 'pro-' means 'ahead, before', not 'super-'."}]}, {"question": "Which of the following best describes the difference between 'visible' and 'visual'?", "options": [{"text": "'Visible' means relating to sight, while 'visual' means able to be seen.", "isCorrect": false, "rationale": "This statement reverses the correct definitions. 'Visual' relates to sight, and 'visible' means able to be seen."}, {"text": "'Visible' refers to the ability to see, while 'visual' refers to a mental image.", "isCorrect": false, "rationale": "While 'vision' (not 'visible') can refer to the ability to see or a mental image, 'visible' means 'able to be seen' and 'visual' means 'relating to sight or seeing'."}, {"text": "'Visible' means able to be seen, while 'visual' relates to sight or seeing.", "isCorrect": true, "rationale": "The section defines 'visible' as 'able to be seen' and 'visual' as 'relating to sight or seeing'. This option accurately differentiates the two terms based on their definitions and suffixes."}, {"text": "'Visible' is a noun, and 'visual' is an adjective.", "isCorrect": false, "rationale": "Both 'visible' and 'visual' can function as adjectives, although 'visual' can also be a noun (e.g., 'the visuals'). Their primary difference lies in their specific meanings derived from their suffixes."}]}, {"question": "A student is told to 'revise' their essay. Based on the etymology provided, what is the core action the student is expected to perform?", "options": [{"text": "To write the essay from scratch.", "isCorrect": false, "rationale": "While revision might lead to significant changes, the etymology ('re-' meaning again, 'vis' meaning see) specifically points to looking at the existing work, not necessarily starting anew."}, {"text": "To speak about their essay to an audience.", "isCorrect": false, "rationale": "The word 'revise' is related to seeing, not speaking ('voc/dict')."}, {"text": "To look at the essay again in order to correct or improve it.", "isCorrect": true, "rationale": "The definition of 'revise' is given as 'to look at again in order to correct or improve', directly applying its etymological components 're-' (again) and 'vis' (see)."}, {"text": "To provide the essay to someone else for review.", "isCorrect": false, "rationale": "This describes sharing the essay, not the act of revision itself. 'Provide' has a different etymology ('pro-' meaning ahead, 'vid' meaning see)."}]}, {"question": "If a company needs to 'provide' for its employees' future, what action does the word's etymology suggest the company should take?", "options": [{"text": "To look back at past employee benefits.", "isCorrect": false, "rationale": "The prefix 'pro-' means 'ahead, before', implying a forward-looking action, not backward."}, {"text": "To see ahead and prepare for future needs.", "isCorrect": true, "rationale": "The definition of 'provide' is 'to see ahead and prepare; to supply what is needed', which directly incorporates 'pro-' (ahead) and 'vid' (see) in the context of preparation for the future."}, {"text": "To visibly demonstrate its commitment.", "isCorrect": false, "rationale": "While demonstrating commitment is good, the word 'provide' focuses on preparation and supply, not merely visibility ('visible')."}, {"text": "To create a mental image of employee well-being.", "isCorrect": false, "rationale": "Creating a mental image relates to 'vision', but 'provide' involves concrete action and preparation based on foresight."}]}, {"question": "The word 'evident' means 'clearly seen; obvious.' How do its root and prefix contribute to this meaning?", "options": [{"text": "'e-' means 'in' and 'vid' means 'hear,' so it's 'heard within.'", "isCorrect": false, "rationale": "This option incorrectly identifies both the meaning of 'e-' and 'vid'."}, {"text": "'e-' means 'out' and 'vid' means 'see,' suggesting something 'seen out' or revealed.", "isCorrect": true, "rationale": "The section states 'evident: e- (out) + vid (see) + -ent (having the quality of) — clearly seen; obvious.' This etymology precisely explains how 'seeing out' leads to something being clearly visible and obvious."}, {"text": "'e-' means 'again' and 'vid' means 'write,' meaning 'written again.'", "isCorrect": false, "rationale": "This option incorrectly identifies the meaning of 'e-' ('re-' means again) and 'vid' ('scrib' means write)."}, {"text": "'e-' means 'before' and 'vid' means 'speak,' meaning 'spoken before.'", "isCorrect": false, "rationale": "This option incorrectly identifies the meaning of 'e-' ('pro-' means before) and 'vid' ('voc/dict' means speak)."}]}, {"question": "According to the 'rootconnection' section, how does the 'vis/vid' root complement the 'voc/dict', 'aud', and 'scrib' roots?", "options": [{"text": "It represents the only root directly related to sensory input.", "isCorrect": false, "rationale": "All listed roots relate to sensory input or expression ('aud' for hearing, 'voc/dict' for speaking, 'scrib' for writing/seeing)."}, {"text": "It covers the act of hearing, while others cover speaking, writing, and seeing.", "isCorrect": false, "rationale": "The 'aud' root covers hearing. 'Vis/vid' covers seeing."}, {"text": "Together, these roots encompass the major ways humans take in and share information (speaking, listening, writing, seeing).", "isCorrect": true, "rationale": "The 'rootconnection' section states: 'Together, these roots cover the major ways humans take in and share information: we speak, we listen, we write, and we see.' This option accurately summarizes this idea."}, {"text": "It is an alternative way to express information that is primarily written.", "isCorrect": false, "rationale": "While visual information can complement written, 'vis/vid' is a distinct primary method of information exchange, not just an alternative to writing."}]}, {"question": "A team leader's main role is to 'supervise' their team. What does this primarily entail?", "options": [{"text": "Only checking finished products.", "isCorrect": false, "rationale": "Supervising involves ongoing oversight and direction, not just a final check."}, {"text": "Delegating all tasks without oversight.", "isCorrect": false, "rationale": "Delegation is part of a leader's role, but 'supervise' implies actively watching over and guiding, not just handing off tasks."}, {"text": "Watching over and directing the work of others.", "isCorrect": true, "rationale": "The definition provided for 'supervise' is 'to watch over and direct the work of others', directly translating its etymology 'super-' (over, above) and 'vis' (see)."}, {"text": "Participating directly in every task the team performs.", "isCorrect": false, "rationale": "While a leader might sometimes participate, 'supervise' specifically focuses on oversight and direction, not necessarily direct involvement in every task."}]}, {"question": "Which word is formed from the idea of 'seeing ahead and preparing' or 'supplying what is needed'?", "options": [{"text": "Visible", "isCorrect": false, "rationale": "'Visible' means 'able to be seen', not related to preparation."}, {"text": "Vision", "isCorrect": false, "rationale": "While 'vision' can mean a mental image of the future, 'provide' specifically includes the aspect of 'supplying what is needed' based on foresight."}, {"text": "Provide", "isCorrect": true, "rationale": "The definition of 'provide' is explicitly given as 'to see ahead and prepare; to supply what is needed', making this the correct answer."}, {"text": "Evident", "isCorrect": false, "rationale": "'Evident' means 'clearly seen; obvious', not related to future preparation or supply."}]}, {"question": "The text states that 'video' comes from the Latin for 'I see.' What does this origin highlight about the initial concept of video?", "options": [{"text": "Its primary purpose was for recording sound.", "isCorrect": false, "rationale": "The origin 'I see' clearly indicates a visual medium, not primarily audio."}, {"text": "It emphasizes the active experience of the viewer or the machine 'seeing' images.", "isCorrect": true, "rationale": "The Latin verb ending '-eo' for 'I' combines with 'vid' (see) to form 'I see', highlighting an active, first-person visual experience, whether from the perspective of a person watching or the recording device capturing images."}, {"text": "It suggests a passive state of being seen.", "isCorrect": false, "rationale": "The phrase 'I see' is active, not passive ('I am seen' or 'it is seen')."}, {"text": "It points to its use in creating mental images of the future.", "isCorrect": false, "rationale": "While video can show future concepts, its etymology 'I see' directly refers to the act of perceiving images, not necessarily 'vision' in the prophetic sense."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
