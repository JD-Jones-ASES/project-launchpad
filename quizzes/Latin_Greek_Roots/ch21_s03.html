</div>

<script>
var QUESTIONS = [{"question": "According to the text, how did Greek roots primarily enter the English language, distinguishing them from Latin roots?", "options": [{"text": "Through soldiers and senators, similar to Latin roots.", "isCorrect": false, "rationale": "The text explicitly states that Latin roots often entered through soldiers and senators, but Greek roots did not enter this way."}, {"text": "Through scholars, scientists, and philosophers.", "isCorrect": true, "rationale": "The text states, 'Greek roots entered English not through soldiers and senators, as Latin ones often did, but through scholars, scientists, and philosophers.'"}, {"text": "Through trade and commerce routes across the Aegean Sea.", "isCorrect": false, "rationale": "While trade routes existed, the text specifically identifies scholars, scientists, and philosophers as the primary conduit for Greek roots into English, not general commerce."}, {"text": "Through religious missionaries spreading ancient texts.", "isCorrect": false, "rationale": "The text does not mention religious missionaries as the primary means of entry for Greek roots; it focuses on academic and intellectual figures."}]}, {"question": "What are the two primary meanings of the Greek root 'bios' as stated in the text?", "options": [{"text": "'word' or 'reason'", "isCorrect": false, "rationale": "The text attributes 'word' or 'reason' to the root 'logos', not 'bios'."}, {"text": "'life' or 'way of living'", "isCorrect": true, "rationale": "The text clearly states, 'The Greek word bios meant “life” or “way of living.”'"}, {"text": "'earth' or 'ground'", "isCorrect": false, "rationale": "The text does not provide 'earth' or 'ground' as meanings for 'bios'."}, {"text": "'good' or 'beautiful'", "isCorrect": false, "rationale": "The text uses 'eu' for 'good' in the word 'eulogy', not 'bios'."}]}, {"question": "A historian is writing a detailed account of a famous person's existence and experiences, aiming for an academic publication. Based on the pattern described in the 'rootconnection' section, which Greek root would be most appropriate to form the core of the title of such a work, reflecting its specialized nature?", "options": [{"text": "vit", "isCorrect": false, "rationale": "The 'rootconnection' section states that Latin 'vit/viv' gave us everyday words like 'vital' and 'vivid', making it less suited for an academic title compared to Greek 'bio'."}, {"text": "bio", "isCorrect": true, "rationale": "The 'rootconnection' section highlights that Greek roots, like 'bio', gave us scientific and academic terms like 'biology' and 'biography'. An 'account of a life' for an academic publication aligns with the specialized knowledge characteristic of Greek roots."}, {"text": "viv", "isCorrect": false, "rationale": "Similar to 'vit', Latin 'viv' is associated with everyday words according to the 'rootconnection' section, not specialized academic terms."}, {"text": "logos", "isCorrect": false, "rationale": "While 'logos' can mean 'account' and is part of 'biography', the question asks for the root representing 'existence and experiences' in an academic context, which is 'bio'. 'Logos' would be the 'account' part, not the 'life' part itself."}]}, {"question": "The Greek root 'logos' is described as 'one of the most versatile roots.' Which of the following examples best illustrates this versatility in forming new English words related to distinct fields of study?", "options": [{"text": "Its combination with 'bios' to form 'biologia'.", "isCorrect": false, "rationale": "While 'biologia' is an important combination, it primarily shows 'logos' in one specific role (study of life). The text emphasizes its versatility through multiple fields of study."}, {"text": "Its use as the suffix '-logy' to name disciplines like theology and ecology.", "isCorrect": true, "rationale": "The text explicitly states that 'When attached to the end of another root as -logy, it creates the name of a field of study: theology is the study of the divine, ecology is the study of living things in their environments, and zoology is the study of animals.' This clearly demonstrates its versatility in forming multiple distinct fields of study."}, {"text": "Its standalone use to form 'logic'.", "isCorrect": false, "rationale": "Forming 'logic' shows one aspect of its meaning ('reason'), but does not illustrate its versatility in naming multiple distinct fields of study as effectively as the '-logy' suffix."}, {"text": "Its role in 'dialogue' meaning 'conversation between'.", "isCorrect": false, "rationale": "'Dialogue' showcases 'logos' meaning 'speech' or 'word', but like 'logic', it doesn't demonstrate the breadth of its use in naming various academic disciplines as well as the '-logy' suffix."}]}, {"question": "Given the meanings of 'bios' ('life' or 'way of living') and 'logos' ('word' or 'reason'), what is the literal translation of the Greek term 'biologia'?", "options": [{"text": "'the word of life'", "isCorrect": false, "rationale": "While 'logos' can mean 'word', 'biologia' specifically refers to the *study* of life, incorporating 'reason' or 'account' in the context of academic inquiry."}, {"text": "'the study of life'", "isCorrect": true, "rationale": "The text explicitly states that Greek thinkers combined 'bios' with 'logos' to create 'biologia', literally 'the study of life,' which 'Today, biology remains the science devoted to understanding living things.'"}, {"text": "'the reason for living'", "isCorrect": false, "rationale": "This interpretation captures aspects of 'bios' and 'logos' but misses the academic/scientific context of 'biologia' as a field of study."}, {"text": "'the good life'", "isCorrect": false, "rationale": "This translation is incorrect. 'Good' is from 'eu', not 'bios' or 'logos' in this context, and it misses the 'study' aspect."}]}, {"question": "The 'rootconnection' section highlights a key difference in how Greek 'bio' and Latin 'vit/viv' are typically applied in English vocabulary. Which statement accurately characterizes this distinction?", "options": [{"text": "Latin roots are exclusively for physical life, while Greek roots are for spiritual life.", "isCorrect": false, "rationale": "The text does not make this distinction; both can relate to physical life. The difference lies in their domain of usage (everyday vs. specialized)."}, {"text": "Latin roots often yield everyday words, while Greek roots contribute to scientific and academic terms.", "isCorrect": true, "rationale": "The text states: 'Latin gave us everyday words like vital and vivid. Greek gave us scientific and academic terms like biology and biography. Recognizing this pattern — Latin for daily life, Greek for specialized knowledge — will help you decode unfamiliar words...'"}, {"text": "Greek roots entered English earlier than Latin roots.", "isCorrect": false, "rationale": "The text indicates that Latin roots often entered through soldiers and senators, implying an earlier or different historical pathway, but doesn't claim Greek roots entered earlier overall."}, {"text": "Latin roots are more versatile in word formation than Greek roots.", "isCorrect": false, "rationale": "The text specifically mentions 'logos' as 'one of the most versatile roots in all of Greek,' contradicting this statement."}]}, {"question": "A university department focuses on understanding the interactions between living organisms and their physical surroundings. Based on the provided examples, the name of this field of study would logically include which root combination?", "options": [{"text": "bio + graph", "isCorrect": false, "rationale": "'Bio' means life, and 'graph' means to write, leading to 'biography' (written account of a life), which is not the study of organisms and their environment."}, {"text": "eco + -logy", "isCorrect": true, "rationale": "The text states, 'ecology is the study of living things in their environments,' directly matching the description of the field and illustrating the use of '-logy' for fields of study."}, {"text": "zoo + logos", "isCorrect": false, "rationale": "The text defines 'zoology' as the study of animals, which is a specific subset and not the broader study of organisms in their environment. Also, 'logos' usually becomes '-logy' as a suffix for fields of study."}, {"text": "theos + vita", "isCorrect": false, "rationale": "'Theos' means divine (as in 'theology'), and 'vita' is a Latin root for life. Neither combination directly corresponds to the described field of study nor uses the Greek root pattern for environmental studies."}]}, {"question": "Which English word, derived directly from 'logos' standing on its own, best embodies the meaning of 'logos' as 'the art of reasoning'?", "options": [{"text": "dialogue", "isCorrect": false, "rationale": "The text defines 'dialogue' as a 'conversation between' two speakers, representing 'speech' or 'word', not primarily 'the art of reasoning'."}, {"text": "logic", "isCorrect": true, "rationale": "The text explicitly states, 'Standing on its own, logos gave us logic — the art of reasoning — and dialogue...'"}, {"text": "biology", "isCorrect": false, "rationale": "'Biology' is a combination of 'bios' and 'logos', not 'logos' standing on its own, and its primary meaning is the 'study of life'."}, {"text": "eulogy", "isCorrect": false, "rationale": "'Eulogy' means 'good words' and is a specific type of speech, not 'the art of reasoning' as a standalone concept derived from 'logos'."}]}, {"question": "The text defines a 'eulogy' as a speech of 'good words.' Which specific Greek prefix within 'eulogy' conveys the meaning of 'good'?", "options": [{"text": "log", "isCorrect": false, "rationale": "'Log' or 'logos' means 'word' or 'speech' in this context, not 'good'."}, {"text": "eu", "isCorrect": true, "rationale": "The text states, 'A eulogy is a speech of “good words” (eu, good + logos),' clearly identifying 'eu' as meaning 'good'."}, {"text": "y", "isCorrect": false, "rationale": "'-y' is a suffix indicating a state or quality, not the meaning 'good'."}, {"text": "gy", "isCorrect": false, "rationale": "'-gy' is part of the '-logy' suffix structure, but doesn't independently mean 'good'."}]}, {"question": "Based on the overall discussion in the section, Greek roots 'bio' and 'log' are primarily woven into the language of which domains?", "options": [{"text": "Everyday conversation and common expressions.", "isCorrect": false, "rationale": "The text contrasts Greek roots with Latin roots, stating Latin is for 'daily life' and Greek is for 'specialized knowledge', indicating they are not primarily for everyday conversation."}, {"text": "Military strategy and political discourse.", "isCorrect": false, "rationale": "The text explicitly states Greek roots entered through scholars, scientists, and philosophers, not through military or political avenues, which were more characteristic of Latin roots."}, {"text": "Scholarly, scientific, and philosophical thought.", "isCorrect": true, "rationale": "The text introduces Greek roots as shaping words for scholars, scientists, and philosophers. It discusses 'biology' as a science, 'theology' as a field of study, 'logic' as the art of reasoning, and contrasts them with Latin roots for 'daily life', reinforcing their role in specialized, intellectual domains."}, {"text": "Artistic expression and emotional narratives.", "isCorrect": false, "rationale": "While words derived from these roots might be *used* in such contexts, the primary emphasis in the text is on their contribution to systematic study, reasoning, and academic accounts, rather than artistic or emotional expression."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
