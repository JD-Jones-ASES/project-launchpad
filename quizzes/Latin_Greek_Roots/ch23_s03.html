</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 23, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The English root 'phon' originates from the Greek word 'phone'. What did 'phone' encompass for the ancient Greeks?", "options": [{"text": "Only the human singing voice.", "isCorrect": false, "rationale": "This option is too narrow. While choruses sang, the text states 'phone' encompassed voice, sound, and tone in a broader sense."}, {"text": "Time and its duration.", "isCorrect": false, "rationale": "This option describes the Greek root 'chronos', not 'phone'."}, {"text": "Voice, sound, and tone in a broad sense.", "isCorrect": true, "rationale": "The text explicitly states: 'The Greek word for all of this — voice, sound, tone — was phone.'"}, {"text": "Written communication and symbols.", "isCorrect": false, "rationale": "'Phone' relates to auditory phenomena, not written communication or symbols."}]}, {"question": "Based on its Greek roots, which device literally means 'far-sound'?", "options": [{"text": "Microphone", "isCorrect": false, "rationale": "A 'microphone' is a 'small-sound' device, picking up small sounds and amplifying them (micro- + phone)."}, {"text": "Symphony", "isCorrect": false, "rationale": "A 'symphony' means 'sounding together' (syn- + phone), describing the harmonious blending of instruments."}, {"text": "Euphony", "isCorrect": false, "rationale": "'Euphony' means 'good sound' (eu- + phone), referring to the pleasing quality of words."}, {"text": "Telephone", "isCorrect": true, "rationale": "The text states 'telephone, literally a “far-sound” device (tele-, far + phone, sound)'."}]}, {"question": "The text describes a 'microphone' as a 'small-sound' device. What does this etymology imply about its function?", "options": [{"text": "It creates sounds that are physically small in volume.", "isCorrect": false, "rationale": "The text explicitly clarifies that it's 'not because it makes sounds small'."}, {"text": "It makes large sounds appear small for recording.", "isCorrect": false, "rationale": "The text indicates the opposite: it makes small sounds louder, not large sounds smaller."}, {"text": "It amplifies faint or small sounds to be heard clearly.", "isCorrect": true, "rationale": "The text explains a microphone 'picks up small sounds and makes them louder', fitting the 'small-sound' description by virtue of its sensitivity."}, {"text": "It reduces the amplitude of loud noises.", "isCorrect": false, "rationale": "Reducing loud noises is not the primary function implied by the 'small-sound' etymology as explained in the text."}]}, {"question": "According to the 'rootconnection' section, how did Greek 'phon' and Latin 'voc/vox' divide the work in contributing to English vocabulary?", "options": [{"text": "'phon' focused on calling and speaking, while 'voc/vox' focused on musical sounds.", "isCorrect": false, "rationale": "This option reverses the roles described in the text for these roots."}, {"text": "'phon' covered scientific time measurements, and 'voc/vox' covered everyday time.", "isCorrect": false, "rationale": "This option confuses the 'phon'/'voc' distinction with the 'chron'/'tempor' distinction for time."}, {"text": "'phon' contributed words about sound as a physical phenomenon, and 'voc/vox' contributed words about calling and speaking.", "isCorrect": true, "rationale": "The text states: 'Latin voc produced words about calling and speaking (vocal, invoke), while Greek phon produced words about sound as a physical phenomenon (microphone, phonics)'."}, {"text": "'phon' created words for pleasant sounds, and 'voc/vox' for harsh sounds.", "isCorrect": false, "rationale": "This distinction is not mentioned in the text as the division of work for these roots."}]}, {"question": "A poet carefully selects words for their smooth flow and pleasing sound when read aloud. This quality is best described by which term?", "options": [{"text": "Anachronism", "isCorrect": false, "rationale": "An 'anachronism' is something out of its proper time period, unrelated to sound quality."}, {"text": "Symphony", "isCorrect": false, "rationale": "A 'symphony' refers to the 'sounding together' of musical instruments, not the pleasing quality of spoken words."}, {"text": "Euphony", "isCorrect": true, "rationale": "The text defines 'euphony' as 'good sound' — 'the pleasing quality of words that flow smoothly together'."}, {"text": "Chronology", "isCorrect": false, "rationale": "A 'chronology' is an arrangement of events by time, unrelated to sound quality."}]}, {"question": "The Greek word 'chronos', which forms the root 'chron' in English, primarily refers to what aspect of time?", "options": [{"text": "The emotional impact of a moment.", "isCorrect": false, "rationale": "This is not the primary meaning of 'chronos' as described; 'kairos' is closer to the concept of a significant moment."}, {"text": "Duration and sequence of events.", "isCorrect": true, "rationale": "The text states 'chronos meant “time” in the sense of duration and sequence'."}, {"text": "The measurement of space.", "isCorrect": false, "rationale": "'Chronos' is explicitly about time, not space."}, {"text": "The subjective experience of time passing quickly or slowly.", "isCorrect": false, "rationale": "'Chronos' is more about measurable, sequential time rather than subjective experience."}]}, {"question": "A historian is creating a timeline of major events in the Roman Empire, arranging them strictly from the earliest occurrence to the latest. Which term best describes the historian's method of organization?", "options": [{"text": "Synchronization", "isCorrect": false, "rationale": "To 'synchronize' is to make things happen 'at the same time', not to arrange them sequentially from past to present."}, {"text": "Anachronism", "isCorrect": false, "rationale": "An 'anachronism' is something 'out of time', which is the opposite of arranging events in their correct historical order."}, {"text": "Chronology", "isCorrect": true, "rationale": "The text defines a 'chronology' as a 'time-account' — 'a list of events arranged in the order they occurred'."}, {"text": "Kairos", "isCorrect": false, "rationale": "'Kairos' refers to the opportune or right moment, not the sequential arrangement of events over time."}]}, {"question": "Which of the following scenarios best exemplifies an 'anachronism' as defined in the text?", "options": [{"text": "A watch designed with both analog and digital displays.", "isCorrect": false, "rationale": "This is a design feature, not an object misplaced in time."}, {"text": "A historical novel depicting a knight in medieval England using a smartphone to communicate.", "isCorrect": true, "rationale": "This is a classic example of an 'anachronism' – something 'out of time' – as smartphones did not exist in medieval England, similar to the text's example of a Roman drama character with a wristwatch."}, {"text": "Two clocks in different time zones displaying the current time simultaneously.", "isCorrect": false, "rationale": "This describes 'synchronization' across different time zones, not something out of place in time."}, {"text": "A diary entry recording daily events in the order they happened.", "isCorrect": false, "rationale": "This describes a 'chronicle' or 'chronology', which is an organization *by* time, not something *out of* time."}]}, {"question": "The 'etymnote' distinguishes between 'chronos' and 'kairos'. What is the primary distinction between these two Greek concepts of time?", "options": [{"text": "'chronos' refers to future events, while 'kairos' refers to past events.", "isCorrect": false, "rationale": "The distinction is not about past vs. future but the nature of the moment itself."}, {"text": "'chronos' denotes measurable, sequential time, while 'kairos' signifies the opportune or right moment.", "isCorrect": true, "rationale": "The text explicitly states: 'chronos (measurable, sequential time) and kairos (the right or opportune moment)'."}, {"text": "'chronos' is used in scientific contexts, while 'kairos' is used in artistic contexts.", "isCorrect": false, "rationale": "While 'chronos' leads to scientific terms, 'kairos' is specifically mentioned in the context of rhetoric, not generally artistic contexts."}, {"text": "'chronos' became a major English root, while 'kairos' did not influence English at all.", "isCorrect": false, "rationale": "The text states 'kairos survives in rhetoric', indicating it *did* influence English, albeit not as a major root."}]}, {"question": "The 'rootconnection' sections highlight that Greek roots often contribute scientific and technical vocabulary, while Latin roots provide more everyday terms. Which pair of words best illustrates this pattern for the concept of time?", "options": [{"text": "phonics (Greek) and vocal (Latin)", "isCorrect": false, "rationale": "This pair illustrates the distinction for sound roots, not time roots."}, {"text": "telephone (Greek) and invoke (Latin)", "isCorrect": false, "rationale": "This pair also illustrates the distinction for sound roots, not time roots."}, {"text": "chronology (Greek) and temporary (Latin)", "isCorrect": true, "rationale": "The text states 'Greek gave us chronology... — the scientific and technical vocabulary of time' and 'Latin gave us temporary', which is a common, everyday term for time."}, {"text": "symphony (Greek) and contemporary (Latin)", "isCorrect": false, "rationale": "'Symphony' is a word from the 'phon' root (sound), not 'chron' (time). While 'contemporary' fits the Latin 'everyday' description for time, 'symphony' does not fit the Greek 'scientific/technical time' description."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
