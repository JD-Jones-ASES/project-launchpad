        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 17, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The words 'vital,' 'vivid,' 'revive,' and 'survive' all share a common root. What is the primary meaning of this root?", "options": [{"text": "To see", "isCorrect": false, "rationale": "'To see' is related to roots like 'vis' or 'spec', not 'vit/viv'."}, {"text": "To live", "isCorrect": true, "rationale": "The root 'vit' or 'viv' is consistently defined in the word family as meaning 'life' or 'to live', making this the correct primary meaning for all listed words."}, {"text": "To breathe", "isCorrect": false, "rationale": "'To breathe' is related to roots like 'spir', not 'vit/viv'."}, {"text": "To overcome", "isCorrect": false, "rationale": "'To overcome' is more associated with prefixes like 'sur-' when combined with 'viv' to form 'survive', but it's not the meaning of the root itself."}]}, {"question": "In the word 'revive,' how does the prefix 're-' contribute to its overall meaning?", "options": [{"text": "It intensifies the action, meaning 'to live very strongly.'", "isCorrect": false, "rationale": "The prefix 're-' does not generally intensify the meaning of a verb; it typically denotes repetition or a return."}, {"text": "It indicates a reversal or repetition, meaning 'to bring back to life.'", "isCorrect": true, "rationale": "The prefix 're-' means 'again' or 'back', and combined with 'viv' (to live), it forms 'revive' meaning 'to bring back to life or consciousness'."}, {"text": "It suggests an action done quickly, meaning 'to live swiftly.'", "isCorrect": false, "rationale": "'Re-' does not inherently suggest speed; its primary function is about repetition or reversal."}, {"text": "It implies an internal state, meaning 'to live within oneself.'", "isCorrect": false, "rationale": "'Re-' does not typically imply an internal state; prefixes like 'intro-' or 'endo-' might do so."}]}, {"question": "A new startup company is seeking investors. Which statement best reflects the concept of the company being 'viable'?", "options": [{"text": "The company has a flashy new logo and an impressive marketing campaign.", "isCorrect": false, "rationale": "A flashy logo and marketing relate to presentation, not necessarily the fundamental capability of the business model to succeed."}, {"text": "The company's business model is well-researched, financially sound, and has a strong potential for success and growth.", "isCorrect": true, "rationale": "'Viable' means capable of living or working successfully. A business model that is well-researched, financially sound, and has strong potential demonstrates this capability."}, {"text": "The company's founder is very charismatic and has many connections.", "isCorrect": false, "rationale": "A charismatic founder and connections can be helpful, but they don't inherently make the company or its model capable of long-term success without a sound foundation."}, {"text": "The company operates in a very competitive market with many established players.", "isCorrect": false, "rationale": "Operating in a competitive market can make viability harder to achieve, not an indicator of it."}]}, {"question": "A journalist describing a significant event would most likely use which word to emphasize its extreme importance and necessity?", "options": [{"text": "Vivid", "isCorrect": false, "rationale": "'Vivid' means intensely bright, clear, or lifelike, often used for descriptions or memories, not for expressing importance."}, {"text": "Vivacious", "isCorrect": false, "rationale": "'Vivacious' describes a person as lively and animated, not the importance of an event."}, {"text": "Vital", "isCorrect": true, "rationale": "'Vital' means absolutely necessary; essential to life or, by extension, extremely important and crucial. This fits the description of emphasizing extreme importance."}, {"text": "Viable", "isCorrect": false, "rationale": "'Viable' means capable of living or working successfully; it refers to potential or feasibility, not immediate importance."}]}, {"question": "Which of the following words from the list uses its suffix to explicitly convey the meaning 'capable of'?", "options": [{"text": "Convivial", "isCorrect": false, "rationale": "The suffix '-ial' in 'convivial' means 'relating to', not 'capable of'."}, {"text": "Vivacious", "isCorrect": false, "rationale": "The suffix '-acious' in 'vivacious' means 'full of', not 'capable of'."}, {"text": "Viable", "isCorrect": true, "rationale": "The suffix '-able' in 'viable' means 'capable of' or 'able to be', directly conveying the meaning 'capable of living or working successfully'."}, {"text": "Vital", "isCorrect": false, "rationale": "The suffix '-al' in 'vital' means 'relating to', not 'capable of'."}]}, {"question": "A party host who is described as 'convivial' would most likely be characterized by which of the following traits?", "options": [{"text": "Quiet and reserved, preferring to observe guests from a distance.", "isCorrect": false, "rationale": "'Convivial' means friendly, lively, and enjoyable, which is the opposite of being quiet and reserved."}, {"text": "Organized and efficient, ensuring all aspects of the event run smoothly.", "isCorrect": false, "rationale": "While organization is a good trait for a host, it doesn't specifically define 'convivial,' which focuses on the social and lively atmosphere."}, {"text": "Friendly, lively, and engaging with guests, creating an enjoyable atmosphere.", "isCorrect": true, "rationale": "The definition of 'convivial' is 'friendly, lively, and enjoyable,' which perfectly describes a host who is engaging and creates a pleasant social atmosphere."}, {"text": "Serious and intellectual, initiating deep philosophical discussions.", "isCorrect": false, "rationale": "'Convivial' relates to lively and friendly social interaction, not necessarily serious intellectual discussion."}]}, {"question": "How does the etymological origin of the word 'vitamin' (vit + amine) reflect its biological function?", "options": [{"text": "It suggests that vitamins are synthetic compounds created in a lab.", "isCorrect": false, "rationale": "The etymology 'vit + amine' (life + chemical compound) refers to its inherent nature as a chemical necessary for life, not its origin as synthetic. Many vitamins are naturally occurring."}, {"text": "It implies vitamins are complex organic molecules that store energy for the body.", "isCorrect": false, "rationale": "While some vitamins are complex organic molecules, the 'vit' part of the etymology specifically points to 'life,' not directly to energy storage."}, {"text": "It highlights that vitamins are chemical compounds essential for life and health.", "isCorrect": true, "rationale": "The word 'vitamin' combines 'vit' (life) with 'amine' (a chemical compound), directly indicating that it is a chemical compound essential for life and health, aligning with its biological function."}, {"text": "It indicates that vitamins are primarily found in animal products, not plants.", "isCorrect": false, "rationale": "The etymology provides no information about the primary sources of vitamins (animal vs. plant)."}]}, {"question": "If a character in a novel is described as lethargic, dull, and lacking energy, they are the antithesis of a person who is:", "options": [{"text": "Vivid", "isCorrect": false, "rationale": "'Vivid' relates to clarity or brightness of an image or description, not a person's energy level."}, {"text": "Vital", "isCorrect": false, "rationale": "'Vital' refers to something being essential or necessary, not directly to a person's animation or energy level in this context."}, {"text": "Vivacious", "isCorrect": true, "rationale": "'Vivacious' means attractively lively and animated. A character described as lethargic and dull is the direct opposite of vivacious."}, {"text": "Viable", "isCorrect": false, "rationale": "'Viable' refers to the capability of something to live or work successfully, not a personal energy trait."}]}, {"question": "After a harrowing experience of being lost in a dense forest for days with limited supplies, a hiker eventually found their way back to civilization. Which word best describes the hiker's accomplishment?", "options": [{"text": "Revived", "isCorrect": false, "rationale": "'Revived' implies being brought back from unconsciousness or near-death, often with external help. While the hiker was in danger, 'survive' better fits the continued living through hardship."}, {"text": "Vitamized", "isCorrect": false, "rationale": "'Vitamized' is not a standard English word describing an achievement; it sounds like it might relate to adding vitamins."}, {"text": "Convivial", "isCorrect": false, "rationale": "'Convivial' refers to being friendly and lively, which is entirely unrelated to overcoming a dangerous situation."}, {"text": "Survived", "isCorrect": true, "rationale": "'Survive' means to continue living after a danger or hardship, which perfectly describes the hiker's experience of enduring and overcoming being lost."}]}, {"question": "Among the words provided, which one specifically refers to something that is absolutely necessary for the continuation of physical life and healthy bodily function?", "options": [{"text": "Convivial", "isCorrect": false, "rationale": "'Convivial' refers to social interactions and atmosphere, not directly to physical necessity for life."}, {"text": "Vivacious", "isCorrect": false, "rationale": "'Vivacious' describes a personal quality (liveliness), not a substance essential for physical existence."}, {"text": "Vitamin", "isCorrect": true, "rationale": "A 'vitamin' is defined as 'a nutrient essential for life and health,' directly referring to something physically necessary for the body's continuation and proper function."}, {"text": "Vivid", "isCorrect": false, "rationale": "'Vivid' refers to clarity or intensity of perception or description, not a physical requirement for life."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
