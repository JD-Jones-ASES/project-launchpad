</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 8, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary meaning of the root 'leg' in the word 'legal'?", "options": [{"text": "to read", "isCorrect": false, "rationale": "While 'leg' can mean 'to read' (as in 'legible' or 'legend'), in the specific context of 'legal,' it takes on a different primary meaning."}, {"text": "law", "isCorrect": true, "rationale": "According to the text, 'legal' is formed from 'leg (law) + -al (relating to),' directly indicating 'law' as its primary meaning in this instance."}, {"text": "to choose", "isCorrect": false, "rationale": "'To choose' is a meaning associated with the root 'lect' (as in 'select' or 'elect'), not primarily with 'leg' in 'legal'."}, {"text": "to gather", "isCorrect": false, "rationale": "'To gather' is also associated with the root 'lect' (as in 'collect' or 'lecture'), not primarily with 'leg' in 'legal'."}]}, {"question": "In the word 'legible,' what does the suffix '-ible' contribute to its meaning?", "options": [{"text": "an action or process", "isCorrect": false, "rationale": "Suffixes indicating an action or process are typically like '-ion' or '-ing', not '-ible'."}, {"text": "relating to", "isCorrect": false, "rationale": "Suffixes like '-al' or '-ic' often mean 'relating to,' but '-ible' has a different function."}, {"text": "able to be", "isCorrect": true, "rationale": "The text explicitly defines 'legible' as 'leg (read) + -ible (able to be) — able to be read,' directly stating the meaning of '-ible'."}, {"text": "a state of being", "isCorrect": false, "rationale": "While a state of being might be implied by the result, the direct meaning of '-ible' is about capacity or possibility, 'able to be'."}]}, {"question": "How do the prefixes 'se-', 'e-', and 'col-' primarily modify the core meaning of 'lect' (choose/gather) in words like 'select,' 'elect,' and 'collect'?", "options": [{"text": "They specify the time when the choosing or gathering occurs.", "isCorrect": false, "rationale": "These prefixes do not convey temporal information. Their roles are spatial or directional."}, {"text": "They indicate the manner or direction of the choosing or gathering.", "isCorrect": true, "rationale": "The prefixes 'se-' (apart), 'e-' (out), and 'col-' (together) explicitly describe the direction or manner in which something is chosen or gathered, modifying the action of the root."}, {"text": "They change the number of items being chosen or gathered.", "isCorrect": false, "rationale": "The prefixes do not quantify the items; they describe the action's direction or separation/combination."}, {"text": "They determine the quality of the items being chosen or gathered.", "isCorrect": false, "rationale": "These prefixes are not evaluative and do not describe the quality of the items. Other types of prefixes or suffixes would serve this purpose."}]}, {"question": "A librarian finds several old, dusty books left unattended on a shelf, their covers faded and pages yellowing. Which word from the family best describes the state of these books?", "options": [{"text": "Legible", "isCorrect": false, "rationale": "Legible means 'able to be read,' which refers to clarity of text, not the state of being uncared for."}, {"text": "Neglected", "isCorrect": true, "rationale": "The text defines 'neglect' as 'to fail to care for; to not pick up or attend to.' The scenario perfectly describes books that have been neglected."}, {"text": "Collected", "isCorrect": false, "rationale": "Collected means 'brought together' or 'gathered,' which is the opposite of being left unattended."}, {"text": "Elected", "isCorrect": false, "rationale": "Elected means 'chosen by voting' or 'picked out,' which is irrelevant to the books' condition."}]}, {"question": "The root 'leg' appears in both 'legal' and 'legend.' What does this demonstrate about the root 'leg'?", "options": [{"text": "It consistently refers to written documents in all its forms.", "isCorrect": false, "rationale": "While 'legend' relates to things to be read (written), 'legal' relates to law, which is not exclusively about written documents in its root meaning."}, {"text": "It can have distinct primary meanings depending on the word family context.", "isCorrect": true, "rationale": "The text clearly shows 'leg' meaning 'law' in 'legal' and 'read' in 'legend,' illustrating that roots can have multiple primary meanings or be homographs, adapting to different semantic fields."}, {"text": "It always implies a connection to authority or tradition.", "isCorrect": false, "rationale": "While 'legal' relates to authority and 'legend' to tradition, this is not a universal characteristic of the root itself, but rather a context-specific implication."}, {"text": "It suggests that all stories are legally binding.", "isCorrect": false, "rationale": "This statement makes an incorrect and illogical connection between the two words; the root's dual meaning does not imply this."}]}, {"question": "The 'rootconnection' section compares 'leg/lect' (read, choose) with 'scrib/script' (write). What central idea does this comparison emphasize about written communication?", "options": [{"text": "Writing is inherently more complex than reading.", "isCorrect": false, "rationale": "The text emphasizes their interdependence, not a hierarchy of complexity."}, {"text": "Reading and writing are sequential, independent activities.", "isCorrect": false, "rationale": "The phrase 'two sides of the same coin' implies deep interdependence, not independence."}, {"text": "They represent complementary and interdependent stages of communication.", "isCorrect": true, "rationale": "The text states, 'Reading and writing are two sides of the same coin: a scribe writes the words, and a reader “gathers” (legere) them from the page. Together, these roots capture the entire cycle of written communication.' This highlights their complementary and interdependent nature."}, {"text": "Ancient languages used different roots for these concepts.", "isCorrect": false, "rationale": "The comparison is about the relationship between the *actions* of reading and writing, not about the specific linguistic history of different languages."}]}, {"question": "A historian is preparing a detailed presentation on newly discovered ancient texts to deliver to an audience. Based on the root meanings, which word best describes this activity?", "options": [{"text": "Electing", "isCorrect": false, "rationale": "Electing means to choose by voting, which is not what a historian does when presenting findings."}, {"text": "Selecting", "isCorrect": false, "rationale": "Selecting means to choose carefully, which might be part of the preparation, but not the act of delivering the presentation itself."}, {"text": "Lecturing", "isCorrect": true, "rationale": "The text defines 'lecture' as 'a talk or presentation on a subject; a reading aloud.' This perfectly fits the description of a historian presenting findings."}, {"text": "Legible", "isCorrect": false, "rationale": "Legible describes the clarity of text, not the act of giving a presentation."}]}, {"question": "Which characteristic is *most central* to the meaning of 'legend' as defined in the text?", "options": [{"text": "It is always a factual historical account.", "isCorrect": false, "rationale": "While legends can have historical roots, they are often traditional stories that may not be strictly factual. The definition emphasizes 'traditional story' rather than factual accuracy."}, {"text": "It refers to something 'to be read' or a traditional story.", "isCorrect": true, "rationale": "The text defines 'legend' as 'leg (read) + -end (thing to be) — a traditional story; an extraordinary person; something “to be read”.' The 'to be read' aspect is integral to its etymology and meaning."}, {"text": "It must involve a supernatural element.", "isCorrect": false, "rationale": "While many legends do, the definition provided in the text does not list a supernatural element as a central, mandatory characteristic."}, {"text": "It is an academic presentation of facts.", "isCorrect": false, "rationale": "This describes a 'lecture' or a scholarly article, not a 'legend,' which is a form of traditional narrative."}]}, {"question": "The text states that 'Reading and writing are two sides of the same coin,' and further explains that a reader 'gathers' (legere) words from the page. Which word in the provided family directly incorporates the meaning of 'gather' in its formation?", "options": [{"text": "Legible", "isCorrect": false, "rationale": "Legible uses 'leg' meaning 'read' and '-ible' meaning 'able to be,' not 'gather'."}, {"text": "Select", "isCorrect": false, "rationale": "Select uses 'lect' meaning 'choose,' which is related but not synonymous with 'gather' in the context of bringing items together."}, {"text": "Collect", "isCorrect": true, "rationale": "The text defines 'collect' as 'col-/con- (together) + lect (gather) — to bring together; to gather items into a group,' directly using the meaning of 'gather.'"}, {"text": "Legend", "isCorrect": false, "rationale": "Legend uses 'leg' meaning 'read' for 'thing to be read,' not 'gather.'"}]}, {"question": "If someone is tasked with choosing a small group of items *out* of a larger collection, which word from the family best describes this specific action, emphasizing the direction of the choice?", "options": [{"text": "Neglect", "isCorrect": false, "rationale": "Neglect means to fail to care for, which is unrelated to the act of choosing items out of a group."}, {"text": "Elect", "isCorrect": true, "rationale": "The text defines 'elect' as 'e- (out) + lect (choose) — to choose by voting; to pick out.' This perfectly matches the action of choosing items 'out' of a larger group."}, {"text": "Collect", "isCorrect": false, "rationale": "Collect means to bring items 'together,' which is the opposite of picking a few 'out' of a larger group."}, {"text": "Select", "isCorrect": false, "rationale": "Select means 'se- (apart) + lect (choose) — to choose carefully from a group.' While it involves choosing, 'elect' specifically emphasizes choosing 'out' with its 'e-' prefix, which is more precise for the question's emphasis on direction ('out of')."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
