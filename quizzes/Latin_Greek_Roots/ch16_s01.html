<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 16, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central message conveyed by Virgil's epigraph?", "options": [{"text": "Time is constant and unchanging, providing stability.", "isCorrect": false, "rationale": "The epigraph states that time 'flees,' which contradicts the idea of it being constant and unchanging."}, {"text": "Time passes quickly and, once gone, cannot be recovered or reversed.", "isCorrect": true, "rationale": "The phrases 'fugit' (flees) and 'irretrievabile tempus' (irretrievable time) directly convey that time moves rapidly and is lost forever once passed."}, {"text": "Time is a valuable resource that can be stored and saved for later use.", "isCorrect": false, "rationale": "The word 'irretrievably' implies the opposite of being able to save or store time; it means it's gone for good."}, {"text": "Time only seems to pass quickly when one is idle or not engaged in productive activity.", "isCorrect": false, "rationale": "The epigraph makes a universal statement about time's passage without specifying conditions for its perceived speed."}]}, {"question": "The repetition of 'fugit' (flees) in the original Latin ('Sed fugit interea, fugit irreparabile tempus') primarily serves to:", "options": [{"text": "Indicate a pause for dramatic effect before the final statement.", "isCorrect": false, "rationale": "While repetition can have dramatic effect, its primary function here is not to create a pause but to build emphasis."}, {"text": "Emphasize the relentless, continuous, and rapid passage of time.", "isCorrect": true, "rationale": "Repetition in poetry, known as anaphora here, is often used to add emphasis and reinforce the idea of time's persistent and quick flight."}, {"text": "Suggest that time is literally running away from something or someone.", "isCorrect": false, "rationale": "The use of 'flees' is metaphorical, referring to the abstract concept of time passing, not a literal entity running."}, {"text": "Differentiate between two distinct types or aspects of time.", "isCorrect": false, "rationale": "The repetition uses the same word, referring to a singular concept of time's flight, not differentiating between types."}]}, {"question": "Which of the following best describes the overall tone or feeling evoked by the epigraph?", "options": [{"text": "Optimistic and hopeful about future possibilities.", "isCorrect": false, "rationale": "The word 'irretrievably' and the idea of time 'fleeing' suggest a sense of loss or urgency, not optimism."}, {"text": "Serene and contemplative, encouraging slow reflection.", "isCorrect": false, "rationale": "The active verb 'flees' and the finality of 'irretrievably' indicate urgency and finality rather than serene contemplation."}, {"text": "Urgent and reflective of the transient nature of existence.", "isCorrect": true, "rationale": "The epigraph conveys a sense of urgency through 'flees' and highlights the temporary, unrecoverable quality of time through 'irretrievably,' reflecting on life's transience."}, {"text": "Indifferent and detached towards the passage of time.", "isCorrect": false, "rationale": "The strong language used ('flees irretrievably') indicates a significant, impactful observation, not indifference."}]}, {"question": "Given that time 'flees irretrievably,' what implication can be drawn for human endeavors?", "options": [{"text": "One should prioritize extensive planning for future opportunities over decisive present actions.", "isCorrect": false, "rationale": "The irretrievable nature of time suggests the importance of present action, as future opportunities may also pass quickly."}, {"text": "It is futile to attempt to make the most of time, as it will pass regardless of effort.", "isCorrect": false, "rationale": "While time passes regardless, the 'irretrievable' aspect often serves as a reminder to value and utilize the present, rather than surrender to futility."}, {"text": "Each moment holds significance and cannot be regained once lost, encouraging mindful action.", "isCorrect": true, "rationale": "The finality implied by 'irretrievably' underscores the unique value of each passing moment, prompting a call for mindful engagement."}, {"text": "Time is an endless resource, allowing for the postponement of important tasks.", "isCorrect": false, "rationale": "This statement directly contradicts the meaning of 'flees irretrievably,' which emphasizes time's finite and non-renewable nature."}]}, {"question": "Why might this particular quote be chosen as an epigraph for a chapter, especially one potentially related to 'tempor' (time)?", "options": [{"text": "To introduce a lighthearted discussion about leisure activities and relaxation.", "isCorrect": false, "rationale": "The serious and profound nature of the quote about the irretrievable passage of time does not align with a lighthearted introduction to leisure."}, {"text": "To establish a profound theme about the ephemeral nature of existence and the preciousness of time.", "isCorrect": true, "rationale": "Epigraphs often set the tone or central theme of a text. This quote perfectly introduces the gravity and importance of time and its fleeting quality."}, {"text": "To provide a historical fun fact about ancient Roman agricultural practices.", "isCorrect": false, "rationale": "While from Virgil's Georgics (about agriculture), the quote itself is a universal philosophical observation about time, not a specific agricultural fact."}, {"text": "To challenge the reader's understanding of chronological order or linear time.", "isCorrect": false, "rationale": "The quote affirms linear time ('flees'), it does not challenge the concept of chronological order."}]}, {"question": "The word 'irretrievably' in the translation 'time flees irretrievably' emphasizes that:", "options": [{"text": "Time can be stopped or reversed with significant effort or advanced technology.", "isCorrect": false, "rationale": "'Irretrievably' means something cannot be recovered or undone, directly contradicting the idea of stopping or reversing time."}, {"text": "Past moments are permanently gone and cannot be recovered or relived.", "isCorrect": true, "rationale": "This option accurately captures the meaning of 'irretrievably'—that which is lost forever and cannot be brought back or undone."}, {"text": "The speed of time's passage is variable and dependent on one's perception.", "isCorrect": false, "rationale": "'Irretrievably' refers to the inability to recover, not the variability of speed or perception."}, {"text": "Time is an abstract concept with no real, tangible impact on human experience.", "isCorrect": false, "rationale": "The quote highlights a very real and significant impact of time's passage on human experience, suggesting its profound importance."}]}, {"question": "The opening phrase 'Sed fugit interea' ('But meanwhile it flees') most strongly suggests:", "options": [{"text": "A contrast with a preceding state of stillness or ongoing discussion, highlighting time's continued motion.", "isCorrect": true, "rationale": "'Sed' (but) implies a contrast or transition from something else, and 'interea' (meanwhile) indicates that time is passing concurrently with other events or thoughts."}, {"text": "A condition under which time's flight is notably accelerated.", "isCorrect": false, "rationale": "The phrase doesn't imply an acceleration of time, but rather its continuous, perhaps unnoticed, passage during other activities."}, {"text": "A sense of relief that time is moving forward, allowing for new beginnings.", "isCorrect": false, "rationale": "The overall tone of the epigraph, especially with 'irretrievably,' does not suggest relief but rather a sober observation."}, {"text": "The cyclical nature of time's movement, always returning to a starting point.", "isCorrect": false, "rationale": "The phrasing 'flees irretrievably' emphasizes linear, irreversible progression, not a cyclical return."}]}, {"question": "The statement 'time flees irretrievably' can be considered a universal truth because it:", "options": [{"text": "Applies only to the human lifespan, not to geological or cosmic time scales.", "isCorrect": false, "rationale": "The concept of time passing irreversibly is generally applicable to all scales of observation, not just human life."}, {"text": "Reflects a fundamental aspect of existence and experience shared by all living beings.", "isCorrect": true, "rationale": "The passage of time and its unrecoverable nature is a fundamental, universally recognized truth about existence for all beings aware of time."}, {"text": "Is a specific cultural belief unique to ancient Roman philosophical thought.", "isCorrect": false, "rationale": "While expressed by a Roman poet, the sentiment is a widely recognized truth across cultures and ages, not unique to Roman philosophy."}, {"text": "Describes a scientific phenomenon that can be reversed under certain theoretical conditions.", "isCorrect": false, "rationale": "From a practical and observable human experience, time is 'irretrievable' and irreversible, regardless of theoretical physics."}]}, {"question": "Which philosophical concept is most closely aligned with the sentiment expressed in Virgil's epigraph?", "options": [{"text": "Eternal recurrence, where all events repeat infinitely.", "isCorrect": false, "rationale": "The epigraph emphasizes the *irretrievable* nature of time, meaning each moment is unique and lost forever, which is contrary to eternal recurrence."}, {"text": "Stoicism, which advocates for emotional detachment from the passage of time.", "isCorrect": false, "rationale": "While Stoicism encourages acceptance, the epigraph itself highlights the *impact* and significance of time's loss, rather than promoting detachment from it."}, {"text": "The transient nature of life and the importance of seizing the present moment ('carpe diem').", "isCorrect": true, "rationale": "The idea that time 'flees irretrievably' directly underpins the 'carpe diem' philosophy, urging one to make the most of the present because it will soon be gone forever."}, {"text": "Determinism, where all events are predetermined and unchangeable.", "isCorrect": false, "rationale": "The quote focuses on the *passage* and *loss* of time, not on whether events within that time are predetermined."}]}, {"question": "Although the quote itself is philosophical, its original context in Virgil's *Georgics* (a poem about agriculture) suggests that the epigraph:", "options": [{"text": "Is an unrelated philosophical interjection from the author, separated from the poem's main themes.", "isCorrect": false, "rationale": "Authors typically choose epigraphs or include profound statements that resonate with or provide a deeper layer to their work, even if seemingly tangential."}, {"text": "Highlights that even amidst practical, earthly labors like farming, the relentless passage of time is a universal truth.", "isCorrect": true, "rationale": "This option connects the practical world of agriculture (Georgics) to the universal truth of time's passage, suggesting that even in daily work, one must acknowledge time's fleeting nature."}, {"text": "Was intended as a literal warning about the short growing season and the need for quick harvesting.", "isCorrect": false, "rationale": "While applicable, reducing the profound philosophical statement to a literal farming instruction misses its broader metaphorical and existential significance."}, {"text": "Implies that agricultural cycles are immune to the effects of time and will endlessly repeat.", "isCorrect": false, "rationale": "Agricultural cycles are precisely *defined* by the passage of time, making them highly susceptible, not immune, to its effects."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
