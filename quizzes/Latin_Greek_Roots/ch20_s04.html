<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 20, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'credulous' mean?", "options": [{"text": "Hard to convince", "isCorrect": false, "rationale": "The opposite."}, {"text": "Too willing to believe; gullible", "isCorrect": true, "rationale": "cred + -ulous (tending to)."}, {"text": "Extremely trustworthy", "isCorrect": false, "rationale": "Describes the believer, not the believed."}, {"text": "Unable to speak", "isCorrect": false, "rationale": "Different roots."}]}, {"question": "How does 'dis-' change 'discredit'?", "options": [{"text": "Intensifies trust", "isCorrect": false, "rationale": "dis- = away/apart."}, {"text": "Damages or removes trust", "isCorrect": true, "rationale": "dis- (away) + cred (believe) = damage trust."}, {"text": "Redirects trust", "isCorrect": false, "rationale": "Removes, not redirects."}, {"text": "Makes trust permanent", "isCorrect": false, "rationale": "Negates."}]}, {"question": "What does 'accredit' mean?", "options": [{"text": "Remove trust; ac- = away from", "isCorrect": false, "rationale": "ac- (from ad-) = toward."}, {"text": "Officially recognize; ac- = toward", "isCorrect": true, "rationale": "ac- (toward) + cred (trust) = officially recognize."}, {"text": "Doubt claims; ac- = against", "isCorrect": false, "rationale": "ac- = toward."}, {"text": "Write about trust", "isCorrect": false, "rationale": "ac- is directional prefix."}]}, {"question": "In 'credential,' which suffix means 'relating to'?", "options": [{"text": "-ible", "isCorrect": false, "rationale": "That is 'able to be.'"}, {"text": "-ential", "isCorrect": true, "rationale": "cred + -ential (relating to)."}, {"text": "-ulous", "isCorrect": false, "rationale": "That is 'tending to.'"}, {"text": "-it", "isCorrect": false, "rationale": "Different suffix."}]}, {"question": "How does 'credit' connect to 'cred'?", "options": [{"text": "No connection", "isCorrect": false, "rationale": "Direct derivation."}, {"text": "Extending credit = trusting someone to pay later", "isCorrect": true, "rationale": "Trust for future payment."}, {"text": "Writing down numbers", "isCorrect": false, "rationale": "Writing = scrib."}, {"text": "Physical coins", "isCorrect": false, "rationale": "About trust, not currency."}]}, {"question": "How do 'credible' and 'credulous' differ?", "options": [{"text": "Synonyms", "isCorrect": false, "rationale": "Different meanings."}, {"text": "Credible = believable thing; credulous = gullible person", "isCorrect": true, "rationale": "Different suffixes target different aspects."}, {"text": "One positive, one negative", "isCorrect": false, "rationale": "Key difference is what they describe."}, {"text": "Different roots", "isCorrect": false, "rationale": "Both from 'cred.'"}]}, {"question": "What is a 'creed'?", "options": [{"text": "A financial report", "isCorrect": false, "rationale": "That is credit."}, {"text": "A statement of beliefs", "isCorrect": true, "rationale": "From credo (I believe)."}, {"text": "A legal contract", "isCorrect": false, "rationale": "Not a contract."}, {"text": "A hypothesis", "isCorrect": false, "rationale": "A belief statement."}]}, {"question": "How does 'in-' work in 'incredible'?", "options": [{"text": "Means 'into'", "isCorrect": false, "rationale": "Means 'not' here."}, {"text": "Means 'not': not able to be believed", "isCorrect": true, "rationale": "in- (not) + cred + -ible."}, {"text": "Means 'very'", "isCorrect": false, "rationale": "Means 'not.'"}, {"text": "Means 'again'", "isCorrect": false, "rationale": "Again = re-."}]}, {"question": "A school gets 'accreditation.' What happened?", "options": [{"text": "Shut down", "isCorrect": false, "rationale": "Accredit = official recognition."}, {"text": "Officially recognized as meeting standards", "isCorrect": true, "rationale": "ac- (toward) + cred (trust)."}, {"text": "Lost funding", "isCorrect": false, "rationale": "That would be discredit."}, {"text": "Changed name", "isCorrect": false, "rationale": "Unrelated."}]}, {"question": "Which 'cred' pair are antonyms?", "options": [{"text": "Credit and creed", "isCorrect": false, "rationale": "Different applications, not opposites."}, {"text": "Credible and incredible", "isCorrect": true, "rationale": "Direct antonyms via in- (not)."}, {"text": "Credential and credulous", "isCorrect": false, "rationale": "Not opposites."}, {"text": "Accredit and credit", "isCorrect": false, "rationale": "Both involve granting trust."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
