<script>
var QUESTIONS = [{"question": "What is the primary meaning of the root \"terr/terra\" as described in the section?", "options": [{"text": "Water; sea", "isCorrect": false, "rationale": "The root 'terr/terra' means 'earth; land,' not 'water; sea.'"}, {"text": "Earth; land", "isCorrect": true, "rationale": "The section explicitly states that the meaning of 'terr/terra' is 'earth; land.'"}, {"text": "Air; sky", "isCorrect": false, "rationale": "The root 'terr/terra' means 'earth; land,' not 'air; sky.'"}, {"text": "Fire; heat", "isCorrect": false, "rationale": "The root 'terr/terra' means 'earth; land,' not 'fire; heat.'"}]}, {"question": "From which language does the root \"terr/terra\" originate?", "options": [{"text": "Greek", "isCorrect": false, "rationale": "While many English roots come from Greek, the section specifies the origin of 'terr/terra' as Latin."}, {"text": "Old English", "isCorrect": false, "rationale": "The root 'terr/terra' is not identified as originating from Old English in the provided text."}, {"text": "Latin", "isCorrect": true, "rationale": "The section clearly states the origin of 'terr/terra' is 'Latin terra (earth, land, ground).'"}, {"text": "Sanskrit", "isCorrect": false, "rationale": "The section does not list Sanskrit as the origin for the root 'terr/terra.'"}]}, {"question": "Which of the following words does NOT contain a form of the root \"terr/terra\"?", "options": [{"text": "territory", "isCorrect": false, "rationale": "'Territory' is listed as an example and clearly contains the 'terr' root."}, {"text": "terrible", "isCorrect": true, "rationale": "'Terrible' sounds similar but is derived from the root 'terror,' meaning 'fright' or 'dread,' and does not relate to 'earth; land.'"}, {"text": "terrain", "isCorrect": false, "rationale": "'Terrain' is listed as an example and clearly contains the 'terr' root."}, {"text": "terrestrial", "isCorrect": false, "rationale": "'Terrestrial' is listed as an example and clearly contains the 'terr' root."}]}, {"question": "Based on the root's meaning, what does the word \"subterranean\" primarily refer to?", "options": [{"text": "Something floating above the clouds.", "isCorrect": false, "rationale": "The prefix 'sub-' means 'under,' and 'terr' means 'earth,' so 'subterranean' would not mean 'above the clouds.'"}, {"text": "Something that exists under the earth's surface.", "isCorrect": true, "rationale": "Combining the prefix 'sub-' (meaning under) with the root 'terr' (meaning earth/land), 'subterranean' logically describes something located under the earth's surface."}, {"text": "A creature that lives in the deepest oceans.", "isCorrect": false, "rationale": "'Subterranean' relates to land, not water, even deep water."}, {"text": "A structure built high into the sky.", "isCorrect": false, "rationale": "The root 'terr' signifies 'earth/land,' so it would not refer to something high in the sky."}]}, {"question": "The section states that \"ter\" is a variant of the root in some compounds. Which of the following words uses the \"ter\" variant to convey a meaning related to \"earth\" or \"land\"?", "options": [{"text": "interfere", "isCorrect": false, "rationale": "In 'interfere,' 'inter-' means 'between,' and 'fere' relates to 'strike' or 'carry,' not 'earth' or 'land.'"}, {"text": "determine", "isCorrect": false, "rationale": "In 'determine,' 'term' means 'end' or 'boundary,' not 'earth' or 'land.'"}, {"text": "terrene", "isCorrect": true, "rationale": "'Terrene' directly means 'of the earth' or 'earthly,' and uses the 'ter' variant, aligning with the root's meaning of 'earth; land.'"}, {"text": "terminal", "isCorrect": false, "rationale": "In 'terminal,' 'term' means 'end,' not 'earth' or 'land.'"}]}, {"question": "Given the root \"terr/terra\" means \"earth; land,\" what characteristic would you expect a \"terrestrial\" animal to primarily possess?", "options": [{"text": "Ability to fly", "isCorrect": false, "rationale": "While some terrestrial animals can fly, the defining characteristic implied by 'terrestrial' (from 'earth; land') relates to where they live, not their mode of locomotion in the air."}, {"text": "Lives exclusively in water", "isCorrect": false, "rationale": "An animal living exclusively in water would be 'aquatic,' not 'terrestrial,' as 'terr' refers to land."}, {"text": "Primarily lives on land", "isCorrect": true, "rationale": "An animal described as 'terrestrial' (derived from 'terr' meaning 'earth; land') is one that primarily lives on land."}, {"text": "Capable of photosynthesis", "isCorrect": false, "rationale": "Photosynthesis is a process used by plants and some microorganisms, unrelated to the meaning of 'terrestrial' as defined by the root 'terr/terra.'"}]}, {"question": "In the word \"subterranean,\" which part specifically carries the core meaning of \"earth\" or \"land\"?", "options": [{"text": "sub-", "isCorrect": false, "rationale": "The prefix 'sub-' means 'under' or 'below,' not 'earth' or 'land.'"}, {"text": "-an", "isCorrect": false, "rationale": "'-an' is an adjectival suffix, indicating 'belonging to' or 'relating to,' but it does not carry the core meaning of 'earth' or 'land.'"}, {"text": "terr-", "isCorrect": true, "rationale": "The root 'terr-' is the part of the word 'subterranean' that directly corresponds to the meaning 'earth' or 'land,' as per the section content."}, {"text": "-ean", "isCorrect": false, "rationale": "'-ean' is part of an adjectival suffix, but it does not carry the core meaning of 'earth' or 'land.'"}]}, {"question": "If a new word is coined using the root \"terr\" and its meaning \"earth; land,\" which of the following would be a logical thematic association for this new word?", "options": [{"text": "Orbital mechanics", "isCorrect": false, "rationale": "Orbital mechanics deals with motion in space, which is not directly related to 'earth' or 'land' in the context of this root."}, {"text": "Geological formations", "isCorrect": true, "rationale": "Geological formations directly pertain to the structure and features of the 'earth' or 'land,' making it a logical thematic association for a word using the 'terr' root."}, {"text": "Aquatic biology", "isCorrect": false, "rationale": "Aquatic biology focuses on life in water, which is not the meaning conveyed by the root 'terr/terra.'"}, {"text": "Atmospheric phenomena", "isCorrect": false, "rationale": "Atmospheric phenomena relate to the air and weather, not directly to 'earth' or 'land.'"}]}, {"question": "Among the provided examples (territory, terrain, terrestrial, subterranean), which root form (terr or terra) is primarily used?", "options": [{"text": "The 'terra' form is used throughout.", "isCorrect": false, "rationale": "None of the provided examples explicitly use the 'terra' form; they all use 'terr'."}, {"text": "The 'terr' form is used throughout.", "isCorrect": true, "rationale": "All the examples listed (territory, terrain, terrestrial, subterranean) utilize the 'terr' form of the root."}, {"text": "Both 'terr' and 'terra' forms are used equally.", "isCorrect": false, "rationale": "Only the 'terr' form is evident in the given examples, not both equally."}, {"text": "Only the 'ter' variant is used.", "isCorrect": false, "rationale": "While 'ter' is a variant, the primary form used in these examples is 'terr', which is part of the main root form listed."}]}, {"question": "A group of scientists is preparing a mission to study the soil composition and geological features of an unexplored continent. Which term, derived from the given root, would best describe their primary area of study related to the land itself?", "options": [{"text": "Atmospheric research", "isCorrect": false, "rationale": "Atmospheric research pertains to the air, not the land or its geological features."}, {"text": "Oceanography", "isCorrect": false, "rationale": "Oceanography is the study of oceans, not land or its geological features."}, {"text": "Terrestrial analysis", "isCorrect": true, "rationale": "Given that 'terr' means 'earth; land,' 'terrestrial analysis' accurately describes the study of soil composition and geological features of a continent, which are aspects of the land."}, {"text": "Celestial mechanics", "isCorrect": false, "rationale": "Celestial mechanics is the study of the motion of celestial bodies, unrelated to the study of a continent's land features."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
