<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 7, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What do 'cogn' and 'gnosc/gnos' mean?", "options": [{"text": "To feel", "isCorrect": false, "rationale": "Feeling = sens/sent."}, {"text": "To know, to recognize", "isCorrect": true, "rationale": "Stated in the section."}, {"text": "To speak", "isCorrect": false, "rationale": "Speaking = voc/dict."}, {"text": "To write", "isCorrect": false, "rationale": "Writing = scrib."}]}, {"question": "From which Latin verb does 'cogn' originate?", "options": [{"text": "cogitare", "isCorrect": false, "rationale": "The section identifies 'cognoscere.'"}, {"text": "cognoscere (to get to know)", "isCorrect": true, "rationale": "Stated in the text."}, {"text": "credere", "isCorrect": false, "rationale": "Origin of 'cred.'"}, {"text": "scribere", "isCorrect": false, "rationale": "Origin of 'scrib.'"}]}, {"question": "What is the Greek relative?", "options": [{"text": "graphein", "isCorrect": false, "rationale": "Different root."}, {"text": "gignoskein (to know, perceive)", "isCorrect": true, "rationale": "Stated in the text."}, {"text": "phonein", "isCorrect": false, "rationale": "Relates to sound."}, {"text": "logos", "isCorrect": false, "rationale": "Different root."}]}, {"question": "What variant comes from 'cognitus'?", "options": [{"text": "gnosc", "isCorrect": false, "rationale": "From Greek."}, {"text": "gnit", "isCorrect": true, "rationale": "'gnit (from Latin cognitus, past participle).'"}, {"text": "cogn", "isCorrect": false, "rationale": "Main root form."}, {"text": "gnos", "isCorrect": false, "rationale": "From Greek gnosis."}]}, {"question": "Which is a derivative of cogn/gnosc?", "options": [{"text": "Consensus", "isCorrect": false, "rationale": "From 'sent.'"}, {"text": "Prognosis", "isCorrect": true, "rationale": "Listed as example."}, {"text": "Audition", "isCorrect": false, "rationale": "From 'aud.'"}, {"text": "Inscription", "isCorrect": false, "rationale": "From 'scrib.'"}]}, {"question": "'Gnos' comes from which word?", "options": [{"text": "gignoskein", "isCorrect": false, "rationale": "'gnos' specifically from 'gnosis' (noun)."}, {"text": "gnosis (knowledge)", "isCorrect": true, "rationale": "Stated in text."}, {"text": "graphein", "isCorrect": false, "rationale": "Unrelated."}, {"text": "logos", "isCorrect": false, "rationale": "Different root."}]}, {"question": "How many ancient languages contribute?", "options": [{"text": "One", "isCorrect": false, "rationale": "Both Latin and Greek."}, {"text": "Two -- Latin and Greek", "isCorrect": true, "rationale": "Both listed as origins."}, {"text": "Three", "isCorrect": false, "rationale": "Only two."}, {"text": "Four", "isCorrect": false, "rationale": "Only two."}]}, {"question": "Which word shows Latin form 'cogn'?", "options": [{"text": "Diagnose", "isCorrect": false, "rationale": "Uses Greek 'gnos.'"}, {"text": "Recognize", "isCorrect": true, "rationale": "Contains re- + cogn + -ize."}, {"text": "Prognosis", "isCorrect": false, "rationale": "Uses Greek 'gnos.'"}, {"text": "Genesis", "isCorrect": false, "rationale": "Different root."}]}, {"question": "Which word shows Greek form 'gnos'?", "options": [{"text": "Cognition", "isCorrect": false, "rationale": "Uses Latin 'cogn.'"}, {"text": "Diagnose", "isCorrect": true, "rationale": "dia- + gnos."}, {"text": "Recognize", "isCorrect": false, "rationale": "Uses Latin 'cogn.'"}, {"text": "Incognito", "isCorrect": false, "rationale": "Uses Latin 'cognit.'"}]}, {"question": "What do the Latin and Greek roots share historically?", "options": [{"text": "Borrowed from Egyptian.", "isCorrect": false, "rationale": "Share Indo-European ancestor."}, {"text": "Both trace to Indo-European root meaning 'to know.'", "isCorrect": true, "rationale": "Shared ancient ancestor root."}, {"text": "Invented independently.", "isCorrect": false, "rationale": "Historically connected."}, {"text": "Greek borrowed from Latin.", "isCorrect": false, "rationale": "Both developed independently from shared ancestor."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
