<head>

    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the core meaning associated with the root forms 'sens' and 'sent'?", "options": [{"text": "to see", "isCorrect": false, "rationale": "While sight is a form of perception, 'to see' is not the comprehensive core meaning provided for this root."}, {"text": "to feel, to perceive", "isCorrect": true, "rationale": "The text explicitly states 'Meaning: to feel, to perceive' for the root forms 'sens' and 'sent'."}, {"text": "to hear", "isCorrect": false, "rationale": "Hearing is a sensory input, but 'to hear' is not the overarching core meaning of this root."}, {"text": "to speak", "isCorrect": false, "rationale": "The meaning 'to speak' is unrelated to the etymology of the 'sens/sent' root."}]}, {"question": "The variant form 'sens' primarily derives from which grammatical form of the Latin *sentire*?", "options": [{"text": "the infinitive form", "isCorrect": false, "rationale": "The infinitive form *sentire* is the direct source for the 'sent' variant, not 'sens'."}, {"text": "the past participle *sensus*", "isCorrect": true, "rationale": "The text states 'Variant Forms: sens (from sensus)', with *sensus* being the past participle of *sentire*."}, {"text": "the present active participle", "isCorrect": false, "rationale": "The text does not indicate that 'sens' derives from the present active participle."}, {"text": "the future tense form", "isCorrect": false, "rationale": "The text specifies the origin from the past participle, not a future tense form."}]}, {"question": "Which part of the Latin *sentire* verb is the direct source of the 'sent' variant form?", "options": [{"text": "its infinitive form", "isCorrect": true, "rationale": "The text states 'Variant Forms: sent (from sentire)', and *sentire* is the infinitive form of the verb."}, {"text": "its noun form", "isCorrect": false, "rationale": "The text does not identify a specific noun form as the direct source for 'sent'."}, {"text": "its adverbial form", "isCorrect": false, "rationale": "The text does not mention an adverbial form as the source for 'sent'."}, {"text": "its perfect passive participle", "isCorrect": false, "rationale": "The perfect passive participle (*sensus*) is the origin for 'sens', not 'sent'."}]}, {"question": "Given the root's meaning 'to feel, to perceive' and the additional nuance 'to judge' from its Latin origin, which of the following example derivatives most directly relates to the expression of a judgment or opinion?", "options": [{"text": "sense", "isCorrect": false, "rationale": "'Sense' primarily refers to a faculty of perception or a feeling, not directly to a formal judgment."}, {"text": "sentence", "isCorrect": true, "rationale": "Historically, a 'sentence' is a judgment or opinion expressed, often by a legal authority, which aligns with the 'judge' aspect of *sentire*."}, {"text": "consent", "isCorrect": false, "rationale": "'Consent' means to agree or feel together, which relates to feeling but not primarily to expressing a formal judgment."}, {"text": "sentiment", "isCorrect": false, "rationale": "'Sentiment' refers to a feeling or emotion, rather than a formal judgment or declaration."}]}, {"question": "In the context of the root 'sens/sent,' what does 'to perceive' most closely imply?", "options": [{"text": "To physically touch an object", "isCorrect": false, "rationale": "While touch is a sense used for perception, 'to perceive' is a broader concept that includes mental awareness beyond just physical contact."}, {"text": "To acquire understanding or awareness through the senses or intellect", "isCorrect": true, "rationale": "To perceive means to become aware or conscious of something, often through one's senses (sight, hearing, etc.) or mental faculties."}, {"text": "To make a loud noise", "isCorrect": false, "rationale": "This describes an action of sound production, not the act of becoming aware or feeling."}, {"text": "To move quickly", "isCorrect": false, "rationale": "This describes motion and is unrelated to the meaning of feeling or perceiving."}]}, {"question": "The word 'consent' is listed as an example derivative. Given its structure (con- meaning 'with, together') and the root's meaning, what does 'consent' fundamentally mean?", "options": [{"text": "To disagree strongly", "isCorrect": false, "rationale": "This meaning is the opposite of 'consent'; the prefix 'con-' denotes togetherness, not opposition."}, {"text": "To feel together or agree", "isCorrect": true, "rationale": "The prefix 'con-' means 'with' or 'together', and 'sent' means 'to feel/perceive'. Thus, 'consent' means to 'feel together' or 'agree'."}, {"text": "To send a message", "isCorrect": false, "rationale": "This answer incorrectly links 'sent' to the verb 'to send' rather than the root 'sens/sent' from *sentire*."}, {"text": "To perceive a boundary", "isCorrect": false, "rationale": "This interpretation is not supported by the combined meaning of the prefix 'con-' and the root 'sens/sent'."}]}, {"question": "Which of the following concepts is LEAST likely to be associated with a word derived from the 'sens/sent' root?", "options": [{"text": "Emotional understanding", "isCorrect": false, "rationale": "Emotional understanding directly relates to the root's meaning 'to feel'."}, {"text": "Sensory input", "isCorrect": false, "rationale": "Sensory input is fundamental to 'to perceive', which is a core meaning of the root."}, {"text": "Rational judgment", "isCorrect": false, "rationale": "The Latin *sentire* includes the meaning 'to judge', which can involve rational processes."}, {"text": "Physical measurement of an object's dimension", "isCorrect": true, "rationale": "This concept pertains to size, quantity, or spatial extent, which has no direct connection to feeling, perceiving, or judging, the core meanings of 'sens/sent'."}]}, {"question": "A student encounters an unfamiliar word, 'resensitize.' Based on the 'sens' root and common prefixes (re- meaning 'again'), what would be the most logical inference about its meaning?", "options": [{"text": "To send something back", "isCorrect": false, "rationale": "This incorrectly assumes 'sens' is related to 'send', which is a different root."}, {"text": "To feel again or make sensitive again", "isCorrect": true, "rationale": "The prefix 're-' means 'again', and 'sensitize' (from 'sens') means 'to make sensitive or able to feel/perceive'. Therefore, 'resensitize' means to restore sensitivity or feeling."}, {"text": "To perceive something for the first time", "isCorrect": false, "rationale": "The prefix 're-' indicates a repetition or return, not a first-time experience."}, {"text": "To remove all feeling", "isCorrect": false, "rationale": "This would typically be conveyed by a prefix like 'de-' (e.g., desensitize), not 're-'."}]}, {"question": "Which word below is least likely to have its primary root origin in Latin *sentire* ('to feel, perceive, judge')?", "options": [{"text": "sensory", "isCorrect": false, "rationale": "'Sensory' pertains to the senses, which are faculties of perception, directly related to the 'sens' root."}, {"text": "present (as in 'a gift')", "isCorrect": true, "rationale": "The word 'present' (meaning a gift or current time) derives from Latin *prae-esse* ('to be before'), which is unrelated to *sentire*."}, {"text": "sentimentality", "isCorrect": false, "rationale": "'Sentimentality' refers to excessive tender feelings, directly derived from 'sentiment', an example derivative of the root."}, {"text": "sensitive", "isCorrect": false, "rationale": "'Sensitive' describes the ability to feel or perceive keenly, clearly stemming from the 'sens' root."}]}, {"question": "Beyond 'to feel' and 'to perceive,' what additional nuance does the original Latin *sentire* add to the understanding of words derived from 'sens/sent'?", "options": [{"text": "To run", "isCorrect": false, "rationale": "The meaning 'to run' is not listed as part of the Latin *sentire*'s definition."}, {"text": "To build", "isCorrect": false, "rationale": "The meaning 'to build' is not listed as part of the Latin *sentire*'s definition."}, {"text": "To judge", "isCorrect": true, "rationale": "The text explicitly states 'Origin: Latin sentire (to feel, perceive, judge)...', indicating 'to judge' as an additional meaning."}, {"text": "To hide", "isCorrect": false, "rationale": "The meaning 'to hide' is not listed as part of the Latin *sentire*'s definition."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
