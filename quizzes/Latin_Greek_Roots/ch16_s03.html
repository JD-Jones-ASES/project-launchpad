    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 16, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary meaning of the Latin root tempus (from which tempor derives)?", "options": [{"text": "Speed", "isCorrect": false, "rationale": "While 'tempo' relates to speed, the fundamental root 'tempus' primarily means time, from which concepts like speed and duration are derived."}, {"text": "Change", "isCorrect": false, "rationale": "Though time brings change, 'change' is not the primary direct meaning of the root 'tempus.'"}, {"text": "Time", "isCorrect": true, "rationale": "The text explicitly states: 'The Latin word tempus meant “time,” and from its stem temporis grew an entire family of English words about when things happen, how long they last, and how fast they move.'"}, {"text": "Season", "isCorrect": false, "rationale": "While 'tempestas' originally meant 'season,' the fundamental root 'tempus' itself means 'time.'"}]}, {"question": "Which pair of words best illustrates the contrast between existing for a limited duration and existing alongside something else in the same period?", "options": [{"text": "Tempest and Tempo", "isCorrect": false, "rationale": "Tempest refers to a storm, and tempo to musical speed; they do not represent the contrast of limited duration versus shared era."}, {"text": "Temporal and Extemporaneous", "isCorrect": false, "rationale": "Temporal relates to the earthly world, and extemporaneous means without preparation; they do not directly represent the specified contrast."}, {"text": "Temporary and Contemporary", "isCorrect": true, "rationale": "The text states 'Something temporary exists only “for a time”—it is not meant to last forever. ... In contrast, a contemporary is someone who lives “with the time” ... or events that happened during the same period.' This directly contrasts a limited duration with existing in the same era."}, {"text": "Tempus and Temporis", "isCorrect": false, "rationale": "Tempus is the noun and temporis is its stem/genitive form; they are variations of the same word and do not represent a contrast of meaning."}]}, {"question": "If a historian describes the invention of the printing press and the exploration of the Americas as \"contemporary events,\" what does this imply?", "options": [{"text": "Both events were equally significant.", "isCorrect": false, "rationale": "Significance is not implied by the term 'contemporary.'"}, {"text": "One event caused the other.", "isCorrect": false, "rationale": "Causation is not implied by the term 'contemporary'; events can be contemporary without being causally linked."}, {"text": "They occurred in roughly the same historical era.", "isCorrect": true, "rationale": "The text explains: 'When historians call two events contemporary, they mean those events happened during the same period.' This aligns with occurring in the same historical era."}, {"text": "They were both temporary occurrences.", "isCorrect": false, "rationale": "The term 'contemporary' does not relate to an event's temporary nature, but rather its shared time period with another event."}]}, {"question": "In philosophy, when Roman thinkers distinguished between \"temporal pleasures\" and \"lasting virtues,\" what aspect of \"temporal\" were they emphasizing?", "options": [{"text": "Their speed of occurrence.", "isCorrect": false, "rationale": "The speed of occurrence is not the defining characteristic of 'temporal' in this philosophical context."}, {"text": "Their connection to spiritual beliefs.", "isCorrect": false, "rationale": "The text states 'temporal describes anything related to time or to the earthly, passing world—as opposed to the eternal or spiritual,' indicating it is distinct from, not connected to, spiritual beliefs in this context."}, {"text": "Their impermanent and earthly nature.", "isCorrect": true, "rationale": "The text states: 'The word temporal describes anything related to time or to the earthly, passing world—as opposed to the eternal or spiritual. Roman philosophers often distinguished between temporal pleasures and lasting virtues. The idea of the temporal as fleeting and impermanent shaped Western thought for centuries.' This emphasizes the impermanent and earthly nature."}, {"text": "Their ability to happen without preparation.", "isCorrect": false, "rationale": "This describes 'extemporaneous,' not 'temporal.'"}]}, {"question": "Which of the following best exemplifies something described as \"temporal\" according to the text's definition?", "options": [{"text": "The concept of an immortal soul.", "isCorrect": false, "rationale": "An immortal soul represents something eternal, which is explicitly contrasted with 'temporal.'"}, {"text": "A belief in an afterlife.", "isCorrect": false, "rationale": "An afterlife relates to the spiritual or eternal, not the temporal (earthly, passing world)."}, {"text": "A fleeting trend in fashion.", "isCorrect": true, "rationale": "The text defines 'temporal' as 'related to time or to the earthly, passing world—as opposed to the eternal or spiritual' and 'fleeting and impermanent.' A fleeting fashion trend perfectly embodies this concept."}, {"text": "A fundamental moral principle.", "isCorrect": false, "rationale": "Fundamental moral principles are often considered lasting virtues or eternal truths, contrasting with the fleeting nature of the temporal."}]}, {"question": "What does it mean for a speech to be \"extemporaneous\"?", "options": [{"text": "It is delivered with extensive preparation and a detailed script.", "isCorrect": false, "rationale": "This describes a prepared speech, the opposite of 'extemporaneous.'"}, {"text": "It focuses on historical events from a specific time period.", "isCorrect": false, "rationale": "This relates to the content, not the manner of delivery, and doesn't align with 'extemporaneous.'"}, {"text": "It is given spontaneously, without prior planning or a script.", "isCorrect": true, "rationale": "The text states: 'extemporaneous, which describes something done “out of the time”—that is, without preparation. An extemporaneous speech is delivered on the spot, with no script.'"}, {"text": "It addresses the temporary nature of human existence.", "isCorrect": false, "rationale": "This might be a topic, but not the definition of 'extemporaneous' delivery."}]}, {"question": "A teacher asks a student to immediately share their thoughts on a current event, without allowing any time to write notes or rehearse. This scenario best illustrates which concept?", "options": [{"text": "A temporary arrangement.", "isCorrect": false, "rationale": "While the discussion might be temporary, the prompt specifically emphasizes the lack of preparation, not merely its duration."}, {"text": "A contemporary discussion.", "isCorrect": false, "rationale": "It might be a discussion about a contemporary event, but the core of the scenario is the spontaneous nature of the student's response."}, {"text": "An extemporaneous response.", "isCorrect": true, "rationale": "The scenario describes an 'on-the-spot' delivery 'without preparation,' which is the definition of 'extemporaneous' given in the text."}, {"text": "A temporal philosophy.", "isCorrect": false, "rationale": "This relates to the philosophical concept of time and earthly existence, not a spontaneous speech delivery."}]}, {"question": "The evolution of the word tempest from \"a period of time\" to \"a violent storm\" demonstrates what linguistic phenomenon?", "options": [{"text": "Broadening of meaning.", "isCorrect": false, "rationale": "Broadening would mean it covers a wider range of concepts, not a more specific one."}, {"text": "Semantic amelioration (meaning improvement).", "isCorrect": false, "rationale": "Amelioration refers to a word's meaning becoming more positive, which isn't the primary change here."}, {"text": "Narrowing of meaning (specialization).", "isCorrect": true, "rationale": "The text states 'tempestas gradually narrowed to mean “storm”.' This is a classic example of semantic narrowing or specialization, where a general term becomes more specific."}, {"text": "Complete reversal of meaning.", "isCorrect": false, "rationale": "While it changed, 'a period of time' to 'a violent storm' isn't a direct reversal, but a specification within the broader context of 'time' related to weather."}]}, {"question": "If someone described a mild, pleasant autumn day as a \"tempest\" in its original Latin sense, what would they be referring to?", "options": [{"text": "The strong winds associated with autumn.", "isCorrect": false, "rationale": "This describes the modern meaning of 'tempest' (storm), not its original sense."}, {"text": "A specific period or season of the year.", "isCorrect": true, "rationale": "The text explicitly states: 'But the Latin word tempestas originally meant simply “a period of time” or “a season.”' A mild autumn day is a specific season."}, {"text": "An unexpected and sudden change in weather.", "isCorrect": false, "rationale": "While a storm can be sudden, the original meaning was simply a period of time/season, irrespective of weather suddenness."}, {"text": "The intensity of the beautiful weather.", "isCorrect": false, "rationale": "The original meaning does not refer to intensity of weather, but simply the period/season."}]}, {"question": "How does the musical term tempo relate to the Latin root tempus?", "options": [{"text": "Tempo refers to the temporary nature of a musical performance.", "isCorrect": false, "rationale": "While a performance is temporary, 'tempo' specifically refers to the speed, not the impermanence of the performance itself."}, {"text": "Tempo directly translates to \"storm\" in Italian music.", "isCorrect": false, "rationale": "'Tempest' relates to storm, not 'tempo.' The text clarifies 'Italian borrowed tempus directly,' leading to 'tempo' for speed, not storm."}, {"text": "Tempo measures the passage or speed of time within music.", "isCorrect": true, "rationale": "The text states: 'The musical term tempo—the speed at which a piece of music is played—comes from the same root as temporary. Both are about measuring time! When a conductor adjusts the tempo, she is controlling how time flows through the music.' This directly links tempo to measuring the speed/flow of time."}, {"text": "Tempo describes the earthly, rather than spiritual, aspect of music.", "isCorrect": false, "rationale": "This describes 'temporal' in a philosophical sense, not the musical term 'tempo.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
