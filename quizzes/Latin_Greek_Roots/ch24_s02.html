<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 24, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'psych' mean?", "options": [{"text": "Body", "isCorrect": false, "rationale": "Different."}, {"text": "Mind, soul, spirit", "isCorrect": true, "rationale": "From Greek psyche."}, {"text": "Water", "isCorrect": false, "rationale": "Water = hydr."}, {"text": "Heat", "isCorrect": false, "rationale": "Heat = therm."}]}, {"question": "What does 'path' mean?", "options": [{"text": "Road or walkway", "isCorrect": false, "rationale": "Greek root means feeling/suffering/disease."}, {"text": "Feeling, suffering, disease", "isCorrect": true, "rationale": "From Greek pathos."}, {"text": "Sound", "isCorrect": false, "rationale": "Sound = phon."}, {"text": "Time", "isCorrect": false, "rationale": "Time = chron."}]}, {"question": "What does 'hydr' mean?", "options": [{"text": "Fire", "isCorrect": false, "rationale": "Fire = pyro."}, {"text": "Water", "isCorrect": true, "rationale": "From Greek hydor."}, {"text": "Air", "isCorrect": false, "rationale": "Different."}, {"text": "Earth", "isCorrect": false, "rationale": "Earth = geo."}]}, {"question": "What does 'therm' mean?", "options": [{"text": "Cold", "isCorrect": false, "rationale": "Therm = heat."}, {"text": "Heat, warmth", "isCorrect": true, "rationale": "From Greek therme."}, {"text": "Light", "isCorrect": false, "rationale": "Light = photos."}, {"text": "Sound", "isCorrect": false, "rationale": "Sound = phon."}]}, {"question": "'Psych' originates from?", "options": [{"text": "Pathos", "isCorrect": false, "rationale": "Gives path."}, {"text": "Psyche (soul, mind, breath of life)", "isCorrect": true, "rationale": "Stated in text."}, {"text": "Hydor", "isCorrect": false, "rationale": "Gives hydr."}, {"text": "Therme", "isCorrect": false, "rationale": "Gives therm."}]}, {"question": "What variant in 'sympathy'?", "options": [{"text": "patho", "isCorrect": false, "rationale": "In sympathy the variant is pathy."}, {"text": "pathy", "isCorrect": true, "rationale": "Stated in text."}, {"text": "pathic", "isCorrect": false, "rationale": "Not listed."}, {"text": "paths", "isCorrect": false, "rationale": "English plural, not variant."}]}, {"question": "Which is a derivative of 'hydr'?", "options": [{"text": "Psychology", "isCorrect": false, "rationale": "From psych."}, {"text": "Dehydrate", "isCorrect": true, "rationale": "Listed as example."}, {"text": "Thermometer", "isCorrect": false, "rationale": "From therm."}, {"text": "Empathy", "isCorrect": false, "rationale": "From path."}]}, {"question": "Which is a derivative of 'therm'?", "options": [{"text": "Hydrogen", "isCorrect": false, "rationale": "From hydr."}, {"text": "Thermostat", "isCorrect": true, "rationale": "Listed as example."}, {"text": "Sympathy", "isCorrect": false, "rationale": "From path."}, {"text": "Psychiatry", "isCorrect": false, "rationale": "From psych."}]}, {"question": "All four roots originate from?", "options": [{"text": "Latin", "isCorrect": false, "rationale": "All Greek."}, {"text": "Greek", "isCorrect": true, "rationale": "psyche, pathos, hydor, therme."}, {"text": "Mix of Latin and Greek", "isCorrect": false, "rationale": "All Greek."}, {"text": "Old English", "isCorrect": false, "rationale": "All Greek."}]}, {"question": "'Psyche' meant 'soul, mind, breath of life.' What does this suggest?", "options": [{"text": "Mind is purely physical.", "isCorrect": false, "rationale": "'Soul' and 'breath of life' suggest spiritual dimension."}, {"text": "Greeks connected mind with soul and life force.", "isCorrect": true, "rationale": "Deep connections between mind, soul, and life force."}, {"text": "Mind is in the heart.", "isCorrect": false, "rationale": "Connects mind, soul, and breath, not organs."}, {"text": "Mind is unimportant.", "isCorrect": false, "rationale": "A dedicated word shows profound importance."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
