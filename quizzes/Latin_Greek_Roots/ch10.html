    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 10</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the Latin root 'duc / duct' mean?", "options": [{"text": "to build", "isCorrect": false, "rationale": "Building is associated with roots like 'struct,' not 'duc/duct.'"}, {"text": "to lead", "isCorrect": true, "rationale": "Duc/duct comes from the Latin 'ducere,' meaning 'to lead.' A Roman military commander called a dux was the one who led the army."}, {"text": "to speak", "isCorrect": false, "rationale": "Speaking is associated with roots like 'dict' or 'loc,' not 'duc/duct.'"}, {"text": "to carry", "isCorrect": false, "rationale": "Carrying is the meaning of 'port' (Chapter 9). The root 'duc/duct' means to lead, not to carry."}], "id": "q01"}, {"question": "To 'educate' someone literally means to:", "options": [{"text": "Fill their mind with facts", "isCorrect": false, "rationale": "The literal meaning of 'educate' is not to fill. The prefix 'e-' means out, suggesting drawing knowledge out."}, {"text": "Lead them out (draw out their knowledge)", "isCorrect": true, "rationale": "Educate = e- (out) + duc (lead) + -ate. The Romans believed education meant leading out knowledge that was already inside the student."}, {"text": "Put them in a building called a school", "isCorrect": false, "rationale": "The word 'school' comes from a Greek root. 'Educate' comes from e- (out) + ducere (lead)."}, {"text": "Train them to follow orders", "isCorrect": false, "rationale": "Following orders relates more to 'conduct,' but even there the meaning is 'lead together,' not obey commands."}], "id": "q02"}, {"question": "What does the prefix 'pro-' mean in the word 'produce'?", "options": [{"text": "Back", "isCorrect": false, "rationale": "'Back' is the meaning of the prefix 're-,' not 'pro-.'"}, {"text": "Away", "isCorrect": false, "rationale": "'Away' is the meaning of 'ab-,' not 'pro-.'"}, {"text": "Forward", "isCorrect": true, "rationale": "Pro- means forward. Produce = pro- (forward) + duce (lead): to lead something forward into existence — to create or make."}, {"text": "Under", "isCorrect": false, "rationale": "'Under' is the meaning of 'sub-,' not 'pro-.'"}], "id": "q03"}, {"question": "A detective who 'deduces' a conclusion is:", "options": [{"text": "Guessing randomly", "isCorrect": false, "rationale": "Deduction is the opposite of guessing; it is a logical process of leading down from evidence to conclusions."}, {"text": "Following a trail of evidence to reach a logical conclusion", "isCorrect": true, "rationale": "Deduce = de- (down) + duce (lead): to lead down from general evidence to a specific conclusion. This is careful logical reasoning, not guessing."}, {"text": "Carrying physical evidence to court", "isCorrect": false, "rationale": "Carrying evidence would involve the root 'port,' not 'duc.' Deduction is a mental process of reasoning."}, {"text": "Leading witnesses into the courtroom", "isCorrect": false, "rationale": "Leading people is related to the root meaning, but 'deduce' specifically means to reason downward to a conclusion, not to escort people."}], "id": "q04"}, {"question": "The word 'aqueduct' combines two Latin roots. What does the 'duct' part mean?", "options": [{"text": "Water", "isCorrect": false, "rationale": "Water is the meaning of 'aqua,' not 'duct.' Aqueduct = aqua (water) + duct (lead)."}, {"text": "Stone", "isCorrect": false, "rationale": "Stone is not the meaning of 'duct.' The word comes from 'ducere,' meaning to lead."}, {"text": "Leading (as in carrying or channeling)", "isCorrect": true, "rationale": "Duct = ductus (led), from ducere (to lead). In aqueduct, the 'duct' part means the structure leads or channels the water."}, {"text": "Bridge", "isCorrect": false, "rationale": "While aqueducts were often built as bridge-like structures, the word 'duct' itself means to lead, not bridge."}], "id": "q05"}, {"question": "Which word means 'to lead inward' and is used when meeting someone new?", "options": [{"text": "conduct", "isCorrect": false, "rationale": "Conduct means to lead together or to manage. It does not specifically mean to lead inward or to present someone new."}, {"text": "introduce", "isCorrect": true, "rationale": "Introduce = intro- (inward) + duce (lead): to lead someone inward into a group or situation. We introduce people when we bring them into a new context."}, {"text": "abduct", "isCorrect": false, "rationale": "Abduct means to lead away by force — the opposite of bringing someone in."}, {"text": "deduce", "isCorrect": false, "rationale": "Deduce means to reason downward to a conclusion. It does not mean to bring someone new into a group."}], "id": "q06"}, {"question": "The noble title 'duke' traces back to which Latin word?", "options": [{"text": "ducere (to carry)", "isCorrect": false, "rationale": "Ducere means to lead, not to carry. The title duke does trace back to ducere, but the meaning is to lead, not carry."}, {"text": "dux (leader)", "isCorrect": true, "rationale": "Duke comes from the Latin dux, meaning leader — a military commander. Over time, European kingdoms used the title for their highest-ranking nobles."}, {"text": "ductus (a pipe)", "isCorrect": false, "rationale": "While ductus is the past participle of ducere and gives us words like 'duct,' the noble title duke traces specifically to dux (leader)."}, {"text": "dominus (lord)", "isCorrect": false, "rationale": "Dominus gives us words like 'dominate' and 'dominion,' not the title 'duke.'"}], "id": "q07"}, {"question": "To 'abduct' someone means to:", "options": [{"text": "Educate them in a special way", "isCorrect": false, "rationale": "Education involves 'educate' (e- + duc), not 'abduct.' The prefix 'ab-' means away, not out toward learning."}, {"text": "Lead them away by force; kidnap", "isCorrect": true, "rationale": "Abduct = ab- (away) + duct (lead): to lead someone away by force against their will."}, {"text": "Introduce them to a new leader", "isCorrect": false, "rationale": "Introduction involves 'intro-' (inward), not 'ab-' (away). Abduct specifically means taking someone away by force."}, {"text": "Conduct them safely home", "isCorrect": false, "rationale": "Conducting means leading together or managing. Abducting means forcibly taking away — the opposite of a safe escort."}], "id": "q08"}, {"question": "The Venetian ruler called the 'Doge' is related to which Latin word?", "options": [{"text": "aqua (water)", "isCorrect": false, "rationale": "Aqua means water and relates to Venice's canals, but the title 'Doge' does not come from this root."}, {"text": "porta (gate)", "isCorrect": false, "rationale": "Porta relates to the carrying/gate root from Chapter 9, not the leading root of Chapter 10."}, {"text": "dux (leader)", "isCorrect": true, "rationale": "The Venetian title 'Doge' is the same word as Latin 'dux,' just pronounced the Venetian way. Venice's ruler was literally 'the leader.'"}, {"text": "terra (land)", "isCorrect": false, "rationale": "Terra means land or earth. The title 'Doge' comes from the leadership root 'dux,' not from terra."}], "id": "q09"}, {"question": "Which sentence uses a word from the 'duc/duct' family correctly?", "options": [{"text": "The scientist deducted the chemicals in the lab.", "isCorrect": false, "rationale": "'Deducted' is used incorrectly here. Deducted means subtracted (as in taxes). 'Deduce' means to reason toward a conclusion — mixing up related-sounding but distinct words."}, {"text": "The orchestra conductor led the musicians through the symphony.", "isCorrect": true, "rationale": "Conductor = con- (together) + duct (lead) + -or (one who). A conductor literally leads the musicians together — a perfect use of the root."}, {"text": "She produced the heavy boxes across the room.", "isCorrect": false, "rationale": "Moving boxes physically would use 'transport' (port = carry). Produce means to lead something into existence or creation, not to move objects."}, {"text": "He was educated away from the country for bad behavior.", "isCorrect": false, "rationale": "Being expelled from a country is 'deported,' not educated. Educate means to lead out knowledge, not to remove someone from a place."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
