<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 11, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the provided definitions, what is the primary meaning of the word \"proceed\"?", "options": [{"text": "To move back or withdraw", "isCorrect": false, "rationale": "This definition corresponds to 'recede', not 'proceed'."}, {"text": "To achieve a specific goal", "isCorrect": false, "rationale": "This definition is associated with 'succeed', which means to achieve a goal."}, {"text": "To go forward; to continue", "isCorrect": true, "rationale": "The text defines 'proceed' as 'to go forward — to move forward; to continue'."}, {"text": "To go past a limit or surpass", "isCorrect": false, "rationale": "This definition aligns with 'exceed', which means to go beyond a limit."}]}, {"question": "A company's quarterly profits have been steadily decreasing over the past year. Which word best describes this trend?", "options": [{"text": "Proceeding", "isCorrect": false, "rationale": "'Proceeding' implies moving forward or continuing, which contradicts a decrease in profits."}, {"text": "Exceeding", "isCorrect": false, "rationale": "'Exceeding' means going beyond or surpassing a limit, not decreasing."}, {"text": "Receding", "isCorrect": true, "rationale": "'Recede' means to go back — to move back or withdraw; to become more distant. This accurately describes a decrease or withdrawal of profits."}, {"text": "Conceding", "isCorrect": false, "rationale": "'Conceding' means to admit something is true or surrender a point, which is unrelated to profit trends."}]}, {"question": "In a negotiation, if one party decides to \"concede\" a point, what action are they taking?", "options": [{"text": "They are going beyond the previously agreed-upon terms.", "isCorrect": false, "rationale": "Going beyond terms is related to 'exceed', not 'concede'."}, {"text": "They are admitting that the other party's point is true or valid.", "isCorrect": true, "rationale": "The text states 'concede' means 'to admit that something is true; to surrender a point'."}, {"text": "They are initiating a new series of actions to reach a result.", "isCorrect": false, "rationale": "Initiating a series of actions is related to a 'process'."}, {"text": "They are moving forward with their own arguments without compromise.", "isCorrect": false, "rationale": "This describes the opposite of conceding; conceding involves yielding."}]}, {"question": "An individual is described as a \"predecessor\" in a job role. What does this tell us about their relationship to the current holder of the role?", "options": [{"text": "They are the person who will take over the role next.", "isCorrect": false, "rationale": "This describes a 'successor', not a 'predecessor'."}, {"text": "They are the person currently performing a series of steps in the role.", "isCorrect": false, "rationale": "This describes the current occupant or the 'process' of the role, not a 'predecessor'."}, {"text": "They are the person who held the position before the current holder.", "isCorrect": true, "rationale": "The text defines 'predecessor' as 'one who went before — a person who held a position before the current holder'."}, {"text": "They are a person who went beyond the requirements of the role.", "isCorrect": false, "rationale": "Going beyond requirements is related to 'exceed', not 'predecessor'."}]}, {"question": "If a student manages to \"exceed\" their personal best time in a race, what have they done?", "options": [{"text": "They have failed to meet their previous performance.", "isCorrect": false, "rationale": "Failing to meet performance is the opposite of 'exceeding'."}, {"text": "They have admitted their previous best time was incorrect.", "isCorrect": false, "rationale": "Admitting something is true relates to 'concede'."}, {"text": "They have gone past or surpassed their previous best time.", "isCorrect": true, "rationale": "The text defines 'exceed' as 'to go beyond — to go past a limit; to surpass'."}, {"text": "They have simply continued to run at their usual pace.", "isCorrect": false, "rationale": "Simply continuing relates to 'proceed', not 'exceed'."}]}, {"question": "Which of the following scenarios best illustrates the concept of 'access' as defined in the text?", "options": [{"text": "A committee debates whether to move forward with a proposal.", "isCorrect": false, "rationale": "Debating to move forward relates to 'proceed'."}, {"text": "A student gaining permission and a key card to enter a restricted laboratory.", "isCorrect": true, "rationale": "The text defines 'access' as 'a going toward — the ability to approach or enter; a way in'."}, {"text": "A scientist observing a phenomenon that is slowly fading from view.", "isCorrect": false, "rationale": "Something fading from view relates to 'recede'."}, {"text": "A manager outlining the steps for a new project completion.", "isCorrect": false, "rationale": "Outlining steps for a project relates to a 'process'."}]}, {"question": "What is the key distinguishing factor between 'succeed' and 'proceed' based on their definitions?", "options": [{"text": "'Succeed' implies a backward movement, while 'proceed' implies forward.", "isCorrect": false, "rationale": "'Succeed' does not imply backward movement; 'recede' does."}, {"text": "'Succeed' specifically means to achieve a goal or follow after, whereas 'proceed' means to simply move forward or continue.", "isCorrect": true, "rationale": "The text defines 'succeed' as 'to achieve a goal; to come after another' and 'proceed' as 'to go forward — to move forward; to continue', highlighting 'succeed's' additional emphasis on achievement or sequence."}, {"text": "'Succeed' always refers to physical movement, and 'proceed' to abstract concepts.", "isCorrect": false, "rationale": "Both words can be used for physical and abstract contexts."}, {"text": "'Succeed' means to go beyond a limit, while 'proceed' means to admit a truth.", "isCorrect": false, "rationale": "Going beyond a limit is 'exceed', and admitting a truth is 'concede'."}]}, {"question": "Which of the following actions represents a 'process' according to its definition?", "options": [{"text": "The act of a manager admitting a mistake to their team.", "isCorrect": false, "rationale": "This action is an example of 'conceding'."}, {"text": "The previous leader of an organization.", "isCorrect": false, "rationale": "This describes a 'predecessor'."}, {"text": "A series of sequential steps involved in manufacturing a product.", "isCorrect": true, "rationale": "The text defines 'process' as 'a going forward — a series of steps or actions leading to a result'."}, {"text": "The ability of an authorized user to log into a computer system.", "isCorrect": false, "rationale": "This describes 'access'."}]}, {"question": "Based on the given information, which word is formed from the root 'cede' meaning 'to go' and a prefix meaning 'back'?", "options": [{"text": "Proceed", "isCorrect": false, "rationale": "'Pro-' means forward."}, {"text": "Exceed", "isCorrect": false, "rationale": "'Ex-' means beyond."}, {"text": "Recede", "isCorrect": true, "rationale": "'Re-' means back, and 'cede' means to go, making 'recede' mean 'to go back'."}, {"text": "Concede", "isCorrect": false, "rationale": "'Con-' means completely or with, but the primary meaning here is to yield."}]}, {"question": "Imagine a project manager planning a new initiative. They need to lay out the sequential tasks (A), acknowledge a constraint (B), and ensure the team has entry to necessary resources (C). Which words from the list best fit A, B, and C respectively?", "options": [{"text": "A: succeed, B: exceed, C: recede", "isCorrect": false, "rationale": "This option misapplies all three words. 'Succeed' is about achieving, not laying out tasks; 'exceed' is going beyond, not acknowledging constraints; 'recede' is going back, not having access."}, {"text": "A: process, B: concede, C: access", "isCorrect": true, "rationale": "'Process' (A series of steps or actions) fits laying out sequential tasks. 'Concede' (to admit something is true) fits acknowledging a constraint. 'Access' (the ability to approach or enter) fits ensuring entry to resources."}, {"text": "A: proceed, B: recede, C: predecessor", "isCorrect": false, "rationale": "'Proceed' is to go forward, not specifically laying out steps. 'Recede' is to go back, not acknowledge. 'Predecessor' is a person, not access to resources."}, {"text": "A: exceed, B: access, C: succeed", "isCorrect": false, "rationale": "'Exceed' is going beyond, not laying out tasks. 'Access' is ability to enter, not acknowledging constraints. 'Succeed' is achieving, not having entry."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
