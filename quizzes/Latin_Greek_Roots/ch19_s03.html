        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 19, Section 3</div>

        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what was the primary problem Roman citizens faced with unwritten laws prior to the Twelve Tables?", "options": [{"text": "Laws were too complex for ordinary citizens to understand.", "isCorrect": false, "rationale": "While complexity might be a factor with unwritten laws, the text specifically highlights the problem of fairness and knowledge, not inherent complexity."}, {"text": "Patrician judges could interpret laws arbitrarily, leading to unfair treatment for ordinary citizens.", "isCorrect": true, "rationale": "The text states, 'Until then, the laws had been unwritten customs interpreted by patrician judges, and ordinary citizens had no way to know whether they were being treated fairly.' This directly addresses the primary problem."}, {"text": "The laws were frequently changed without public announcement.", "isCorrect": false, "rationale": "The text does not mention frequent changes to the laws; it focuses on their unwritten nature and the arbitrary interpretation by judges."}, {"text": "Only oral traditions, not written records, existed for legal reference.", "isCorrect": false, "rationale": "While the laws were unwritten, the core problem presented was the lack of public access and equal application resulting from this, not merely the absence of written records themselves."}]}, {"question": "The text describes the Twelve Tables as a 'turning point in Western civilization.' Which statement best explains this significance?", "options": [{"text": "It established Rome as the dominant legal power in the ancient world.", "isCorrect": false, "rationale": "While the Twelve Tables were significant for Rome, their 'turning point' status, according to the text, is about a conceptual shift, not geopolitical dominance."}, {"text": "It introduced the concept of professional legal representation for all citizens.", "isCorrect": false, "rationale": "The text does not mention the introduction of professional legal representation in relation to the Twelve Tables."}, {"text": "It enshrined the idea that law should be public, knowable, and applied equally to everyone.", "isCorrect": true, "rationale": "The text explicitly states: 'This was a turning point in Western civilization: the idea that law (jus) should be public, knowable, and applied equally.'"}, {"text": "It marked the beginning of democratic governance in the Roman Republic.", "isCorrect": false, "rationale": "While the demand for the Twelve Tables arose from citizen demands, the text frames the 'turning point' specifically in terms of legal principles (public, knowable, equal application), not the general form of government."}]}, {"question": "Considering the Latin root *jus* means 'law' or 'right,' which of the following English legal concepts most directly reflects the idea of an inherent entitlement or moral principle?", "options": [{"text": "Jurisdiction", "isCorrect": false, "rationale": "Jurisdiction refers to the authority to 'declare the law' within a territory, focusing on legal power and scope rather than inherent entitlement."}, {"text": "Justice", "isCorrect": true, "rationale": "The text states 'Justice comes from justitia, the quality of being just or fair,' which directly aligns with the idea of a moral principle of 'rightness' or fairness derived from 'jus'."}, {"text": "Jury", "isCorrect": false, "rationale": "A jury is a group of citizens who swear an oath to judge, which relates to the process of judgment, not an inherent entitlement itself."}, {"text": "Judicial", "isCorrect": false, "rationale": "Judicial describes anything relating to courts and judges, which refers to the legal system's operations rather than an inherent right."}]}, {"question": "Based on its Latin roots, what does the term 'jurisdiction' fundamentally mean in a legal context?", "options": [{"text": "The act of swearing an oath in court.", "isCorrect": false, "rationale": "This describes the action related to a 'jury' (from 'jurare,' to swear), not 'jurisdiction'."}, {"text": "The authority to declare or 'say the law' within a specific domain.", "isCorrect": true, "rationale": "The text explains 'Jurisdiction — from jus + dicere (to say) — is the authority to 'declare the law' within a certain territory.'"}, {"text": "The wisdom or philosophy regarding legal principles.", "isCorrect": false, "rationale": "This describes 'jurisprudence' (from 'juris' + 'prudentia'), not 'jurisdiction'."}, {"text": "The formal process of settling a legal dispute.", "isCorrect": false, "rationale": "This describes the act of 'adjudicating,' not 'jurisdiction'."}]}, {"question": "The text states that *judex* (a judge) is built from *jus* (law) + *dicere* (to say). How does this etymology highlight the primary role of a judge?", "options": [{"text": "It emphasizes the judge's responsibility to create new laws.", "isCorrect": false, "rationale": "The role of 'saying what the law is' refers to interpreting and applying existing law, not creating new legislation."}, {"text": "It indicates the judge's ability to pardon criminals.", "isCorrect": false, "rationale": "While a judge may have sentencing powers, the etymology specifically points to declaring the law, not pardoning."}, {"text": "It underscores the judge's function as 'one who declares what the law is.'", "isCorrect": true, "rationale": "The text explicitly states, 'a judge is literally 'one who says what the law is'' and 'A judge is literally 'one who declares the law.''"}, {"text": "It suggests the judge must always follow precedents without personal interpretation.", "isCorrect": false, "rationale": "To 'declare the law' implies interpreting it within legal frameworks, not simply rote application without any interpretation."}]}, {"question": "In 'perjury' and 'prejudice,' the prefixes *per-* and *pre-* respectively transform the root meanings. Which analysis correctly explains this transformation?", "options": [{"text": "*Per-* adds intensity, while *pre-* adds a sense of reversal.", "isCorrect": false, "rationale": "This is an incorrect interpretation of both prefixes as explained in the text."}, {"text": "*Per-* means 'wrongly' or 'to destruction,' and *pre-* means 'before,' indicating a flawed or premature action.", "isCorrect": true, "rationale": "The text states, 'the prefix per- here means 'through' in the sense of 'wrongly' or 'to destruction,' so perjury is a corrupted oath.' For prejudice, it explains 'pre- (before) with judicium (judgment): to prejudge someone is to judge them before knowing the facts.'"}, {"text": "*Per-* implies completeness, and *pre-* denotes a preceding event.", "isCorrect": false, "rationale": "While 'pre-' can mean a preceding event, 'per-' in this context specifically means 'wrongly' or 'to destruction,' not completeness."}, {"text": "Both prefixes indicate a repetition or recurrence of the action.", "isCorrect": false, "rationale": "This interpretation is incorrect for both prefixes as defined in the text."}]}, {"question": "While both are involved in legal proceedings, what is the key etymological distinction between a 'jury' and a 'judge' as presented in the text?", "options": [{"text": "A jury is derived from 'swearing an oath,' while a judge is derived from 'declaring the law.'", "isCorrect": true, "rationale": "The text explains a 'jury is a group of citizens who take an oath (jurare, 'to swear')' and a 'judge is literally 'one who says what the law is'' (from *jus* + *dicere*)."}, {"text": "A jury focuses on facts, while a judge focuses on legal theory.", "isCorrect": false, "rationale": "While these can be practical roles, the question asks for the *etymological* distinction as presented, not a functional one."}, {"text": "A jury is a temporary group, while a judge is a permanent official.", "isCorrect": false, "rationale": "This describes the organizational structure, not the etymological roots of the words."}, {"text": "A jury determines guilt, while a judge determines sentencing.", "isCorrect": false, "rationale": "This describes the division of labor in some legal systems, not the etymological origin provided by the text."}]}, {"question": "What is the primary focus of 'jurisprudence' as defined in the text?", "options": [{"text": "The practical application of laws in courtrooms.", "isCorrect": false, "rationale": "While related to law, jurisprudence focuses on the theoretical and philosophical aspect, not merely practical application."}, {"text": "The historical evolution of legal systems.", "isCorrect": false, "rationale": "Historical study might be part of jurisprudence, but the definition given is more specific than just evolution."}, {"text": "The philosophical study and 'wisdom about the law.'", "isCorrect": true, "rationale": "The etymnote states, 'The word jurisprudence — the philosophy of law — combines juris (of law) + prudentia (wisdom, foresight). It literally means 'wisdom about the law.''"}, {"text": "The specific procedures for drafting new legislation.", "isCorrect": false, "rationale": "Jurisprudence is about the underlying principles and philosophy of law, not legislative drafting procedures."}]}, {"question": "A local court is tasked with 'adjudicating' a dispute between two neighbors over property lines. Based on the text's explanation of *adjudicate*, what action is the court taking?", "options": [{"text": "Providing informal mediation services to the neighbors.", "isCorrect": false, "rationale": "The text describes adjudication as 'settling a dispute formally,' which implies a binding decision rather than informal mediation."}, {"text": "Recording the existing property deeds without intervention.", "isCorrect": false, "rationale": "This is a passive administrative action, whereas adjudication involves actively judging and settling a dispute."}, {"text": "Formally settling the dispute by 'judging toward' a decision.", "isCorrect": true, "rationale": "The text states, 'to adjudicate is to 'judge toward' a decision, settling a dispute formally.' This perfectly matches the court's action."}, {"text": "Offering legal advice to one of the parties involved.", "isCorrect": false, "rationale": "A court's role in adjudicating is to be impartial and settle the dispute, not to offer legal advice to one party."}]}, {"question": "Which statement best synthesizes the long-term impact of the Roman concept of *jus* on modern legal systems, as described throughout the text?", "options": [{"text": "It primarily led to the development of a complex system of international treaties.", "isCorrect": false, "rationale": "While 'jus' might influence international law, the text does not highlight this as its *primary* long-term impact on modern legal systems."}, {"text": "It laid the groundwork for the fundamental principles of public, fair, and equally applied law, influencing a vast legal vocabulary.", "isCorrect": true, "rationale": "This statement combines the 'turning point' idea of law being 'public, knowable, and applied equally' with the fact that 'English inherited an enormous legal vocabulary' from *jus*, encompassing the full breadth of the text's discussion."}, {"text": "It introduced the idea that all citizens should serve as judges in legal matters.", "isCorrect": false, "rationale": "The text mentions citizens serving in a 'jury,' but not as individual 'judges' in the sense of 'judex.'"}, {"text": "Its main contribution was establishing the specific procedural rules for court trials.", "isCorrect": false, "rationale": "The text emphasizes the philosophical concepts and vocabulary derived from 'jus,' not specific procedural rules for trials."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
