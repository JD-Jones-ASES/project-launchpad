<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 23, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'telephone' mean?", "options": [{"text": "Far writing instrument", "isCorrect": false, "rationale": "Writing = graph."}, {"text": "Device for transmitting speech over distances", "isCorrect": true, "rationale": "tele- (far) + phon (sound)."}, {"text": "Distant time measurement", "isCorrect": false, "rationale": "Time = chron."}, {"text": "Far picture", "isCorrect": false, "rationale": "Pictures = photos."}]}, {"question": "What does 'symphony' mean?", "options": [{"text": "Solo performance", "isCorrect": false, "rationale": "Solo = alone."}, {"text": "Long musical composition for orchestra", "isCorrect": true, "rationale": "syn- (together) + phon (sound)."}, {"text": "Recording device", "isCorrect": false, "rationale": "Different."}, {"text": "Written notation", "isCorrect": false, "rationale": "Writing = graph."}]}, {"question": "What does 'euphony' mean?", "options": [{"text": "Unpleasant sound", "isCorrect": false, "rationale": "That is cacophony."}, {"text": "Pleasing, harmonious sound", "isCorrect": true, "rationale": "eu- (good) + phon (sound)."}, {"text": "Study of sound waves", "isCorrect": false, "rationale": "Study = -logy."}, {"text": "Happiness", "isCorrect": false, "rationale": "Feelings = path."}]}, {"question": "What does 'chronology' mean?", "options": [{"text": "Study of sound", "isCorrect": false, "rationale": "Sound = phon."}, {"text": "Arrangement of events in time order", "isCorrect": true, "rationale": "chron (time) + logy (account)."}, {"text": "Study of colors", "isCorrect": false, "rationale": "Color = chroma."}, {"text": "Distance measurement", "isCorrect": false, "rationale": "Different roots."}]}, {"question": "What is an 'anachronism'?", "options": [{"text": "Old music", "isCorrect": false, "rationale": "Music = phon."}, {"text": "Something in the wrong time period", "isCorrect": true, "rationale": "ana- (against) + chron (time)."}, {"text": "Time-measuring device", "isCorrect": false, "rationale": "That is chronometer."}, {"text": "Person arriving on time", "isCorrect": false, "rationale": "That is synchronous."}]}, {"question": "What does 'synchronize' mean?", "options": [{"text": "Harmonize sounds", "isCorrect": false, "rationale": "That is symphony."}, {"text": "Cause things to happen at the same time", "isCorrect": true, "rationale": "syn- (together) + chron (time)."}, {"text": "Record events", "isCorrect": false, "rationale": "That is chronicling."}, {"text": "Travel backward in time", "isCorrect": false, "rationale": "Fictional concept."}]}, {"question": "What does a 'microphone' do?", "options": [{"text": "Makes objects larger", "isCorrect": false, "rationale": "That is microscope."}, {"text": "Picks up and amplifies sound", "isCorrect": true, "rationale": "micro- (small) + phon (sound)."}, {"text": "Measures distances", "isCorrect": false, "rationale": "Distance = metron."}, {"text": "Records images", "isCorrect": false, "rationale": "Images = graph/photos."}]}, {"question": "What is a 'chronicle'?", "options": [{"text": "Musical composition", "isCorrect": false, "rationale": "Music = phon."}, {"text": "Historical account in time order", "isCorrect": true, "rationale": "chron (time) + -icle (record)."}, {"text": "Sound measurement", "isCorrect": false, "rationale": "Sound = phon."}, {"text": "Ancient clock", "isCorrect": false, "rationale": "That is chronometer."}]}, {"question": "Which prefix means 'together' in both a phon and chron word?", "options": [{"text": "tele-", "isCorrect": false, "rationale": "Means far."}, {"text": "syn-", "isCorrect": true, "rationale": "Symphony and synchronize."}, {"text": "ana-", "isCorrect": false, "rationale": "Means against/back."}, {"text": "eu-", "isCorrect": false, "rationale": "Means good/pleasant."}]}, {"question": "Ancient Rome movie shows a wristwatch. This is?", "options": [{"text": "Euphony", "isCorrect": false, "rationale": "Pleasant sound."}, {"text": "Anachronism", "isCorrect": true, "rationale": "Wrong time period."}, {"text": "Chronicle", "isCorrect": false, "rationale": "Time-ordered record."}, {"text": "Synchronization", "isCorrect": false, "rationale": "Making times match."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
