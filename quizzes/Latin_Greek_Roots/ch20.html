<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 20</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the Latin root cred mean?", "options": [{"text": "to rule or command", "isCorrect": false, "rationale": "To rule or command is not the meaning of cred."}, {"text": "to believe or to trust", "isCorrect": true, "rationale": "Cred comes from Latin credere, meaning 'to believe' or 'to trust.'"}, {"text": "to create or to build", "isCorrect": false, "rationale": "To create or build is not the meaning of cred."}, {"text": "to speak or to declare", "isCorrect": false, "rationale": "To speak or declare is the meaning of dict/dic, not cred."}]}, {"question": "Which word means 'able to be believed' or 'convincing'?", "options": [{"text": "credulous", "isCorrect": false, "rationale": "Credulous means too willing to believe things (gullible), not convincing to others."}, {"text": "incredible", "isCorrect": false, "rationale": "Incredible means impossible to believe (though now used loosely to mean amazing)."}, {"text": "credible", "isCorrect": true, "rationale": "Credible = cred (to believe) + -ible (able to be): able to be believed; convincing."}, {"text": "accredit", "isCorrect": false, "rationale": "Accredit means to officially recognize as meeting standards, not simply believable."}]}, {"question": "A person who is credulous is best described as:", "options": [{"text": "highly educated and critical", "isCorrect": false, "rationale": "Credulous is the opposite of critical thinking."}, {"text": "too willing to believe things without enough evidence", "isCorrect": true, "rationale": "Credulous = cred (to believe) + -ulous (tending to): tending to believe too easily; gullible."}, {"text": "a trustworthy and reliable witness", "isCorrect": false, "rationale": "A trustworthy witness is credible, not credulous."}, {"text": "extremely skeptical of everything", "isCorrect": false, "rationale": "Skeptical is the opposite of credulous."}]}, {"question": "The word creed comes from Latin credo, meaning 'I believe.' In what context is a creed typically used?", "options": [{"text": "As a legal document proving someone's qualifications", "isCorrect": false, "rationale": "A legal proof of qualifications is a credential, not a creed."}, {"text": "As a statement of religious or personal beliefs and principles", "isCorrect": true, "rationale": "A creed is a formal statement of beliefs, from credo ('I believe'), the opening word of ancient statements of faith."}, {"text": "As a financial record of trusted transactions", "isCorrect": false, "rationale": "Financial records are related to credit, not creed."}, {"text": "As a court judgment on a disputed matter", "isCorrect": false, "rationale": "Court judgments relate to judic (judge), not cred."}]}, {"question": "When a school is accredited, what does that mean?", "options": [{"text": "The school has been closed for failing standards.", "isCorrect": false, "rationale": "Closing a school would be the opposite of accrediting it."}, {"text": "The school has been officially recognized as meeting quality standards.", "isCorrect": true, "rationale": "Accredit = ac- (toward) + cred (to trust) + -it: to officially declare worthy of trust, recognizing the school meets standards."}, {"text": "The school has received government funding.", "isCorrect": false, "rationale": "Funding is not the same as accreditation, though they may relate."}, {"text": "The school has been given credit for its achievements.", "isCorrect": false, "rationale": "While close, accredit specifically means meeting official standards, not recognition for achievement."}]}, {"question": "The word credential refers to a document that proves you are:", "options": [{"text": "innocent of a crime", "isCorrect": false, "rationale": "Proving innocence is not what a credential does."}, {"text": "trustworthy and qualified for a position", "isCorrect": true, "rationale": "Credential = cred (to trust) + -ential (relating to): a document proving you are trustworthy and qualified."}, {"text": "a citizen of a particular country", "isCorrect": false, "rationale": "Citizenship documents are passports or birth certificates, not credentials in this sense."}, {"text": "owed money by a creditor", "isCorrect": false, "rationale": "Being owed money relates to credit/creditor, not the word credential."}]}, {"question": "To discredit someone means to:", "options": [{"text": "grant them official recognition", "isCorrect": false, "rationale": "Granting official recognition is accrediting, not discrediting."}, {"text": "believe everything they say", "isCorrect": false, "rationale": "Believing everything someone says relates to being credulous, not discrediting."}, {"text": "damage the trust and reputation others have in them", "isCorrect": true, "rationale": "Discredit = dis- (away, apart) + cred (to believe) + -it: to take away belief in someone, destroying their reputation."}, {"text": "remove their credit card privileges", "isCorrect": false, "rationale": "While using the same root, discredit as a verb means to damage reputation, not a financial action."}]}, {"question": "When a store gives you credit, the word's Latin root tells us the store is saying:", "options": [{"text": "Here is a gift, with no repayment needed.", "isCorrect": false, "rationale": "Credit must be repaid; it is not a gift."}, {"text": "I trust you to pay for this later.", "isCorrect": true, "rationale": "Credit comes from credere (to trust): giving credit means 'I trust you to pay later,' reflecting the root meaning directly."}, {"text": "Your money is welcome here anytime.", "isCorrect": false, "rationale": "This does not capture the 'trust' meaning embedded in the word credit."}, {"text": "You have proven yourself by paying promptly before.", "isCorrect": false, "rationale": "While past payment builds trust, the root meaning of credit is simply 'I believe/trust you.'"}]}, {"question": "The word incredible originally meant 'not believable.' Today, people often use it to mean something else. What?", "options": [{"text": "terrifying and dangerous", "isCorrect": false, "rationale": "Incredible does not mean terrifying in modern usage."}, {"text": "amazing or extraordinary", "isCorrect": true, "rationale": "Incredible = in- (not) + cred (believe) + -ible: originally 'not believable,' but today often means something so amazing it is hard to believe."}, {"text": "very small or minor", "isCorrect": false, "rationale": "Incredible does not mean small."}, {"text": "perfectly reliable and trustworthy", "isCorrect": false, "rationale": "Perfectly reliable and trustworthy would be credible, not incredible."}]}, {"question": "How do the root families cred (to believe) and jus/jur (law, oath) connect thematically?", "options": [{"text": "Both relate to writing and record-keeping.", "isCorrect": false, "rationale": "Writing and record-keeping relate to graph/gram, not cred or jus/jur."}, {"text": "The legal system depends on trust: witnesses swear oaths (jur) and the court must believe (cred) their testimony.", "isCorrect": true, "rationale": "A credible witness gives trustworthy testimony; perjury destroys that trust. Law (jus) and belief (cred) are deeply connected."}, {"text": "Both roots entered English from Greek rather than Latin.", "isCorrect": false, "rationale": "Both cred and jus/jur entered English from Latin."}, {"text": "Both relate to death and its consequences.", "isCorrect": false, "rationale": "Death relates to mort/mor, not cred or jus/jur."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
