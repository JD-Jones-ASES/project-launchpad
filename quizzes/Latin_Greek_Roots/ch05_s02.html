<script>
var QUESTIONS = [{"question": "What is the primary meaning of the Latin root forms \"vis\" and \"vid\"?", "options": [{"text": "To hear", "isCorrect": false, "rationale": "The root 'aud' means 'to hear'. The text explicitly states 'vis' and 'vid' mean 'to see'."}, {"text": "To see", "isCorrect": true, "rationale": "The section clearly defines the meaning of 'vis' and 'vid' as 'to see', originating from Latin 'videre'."}, {"text": "To speak", "isCorrect": false, "rationale": "The root 'loqu' or 'dict' relates to speaking. The text specifies 'to see' for 'vis' and 'vid'."}, {"text": "To touch", "isCorrect": false, "rationale": "The root 'tang' or 'tact' relates to touching. The text specifies 'to see' for 'vis' and 'vid'."}]}, {"question": "From which language do the root forms \"vis\" and \"vid\" originate?", "options": [{"text": "Greek", "isCorrect": false, "rationale": "While many English roots come from Greek, the text explicitly states the origin of 'vis' and 'vid' is Latin."}, {"text": "Old French", "isCorrect": false, "rationale": "Old French is mentioned as an intermediate step for the variant form 'view', but not as the direct origin of 'vis' and 'vid'. Old French is a derivative language from Latin."}, {"text": "Latin", "isCorrect": true, "rationale": "The section clearly states: 'Origin: Latin videre (to see), past participle visus'."}, {"text": "Germanic", "isCorrect": false, "rationale": "The text does not mention Germanic as the origin. The specified origin is Latin."}]}, {"question": "The variant form \"view\" developed from the original Latin root through an intermediate language. Which language facilitated this transformation?", "options": [{"text": "Ancient Greek", "isCorrect": false, "rationale": "Ancient Greek is not mentioned in the etymology of 'view' in the provided text."}, {"text": "Old English", "isCorrect": false, "rationale": "Old English played a role in many English words, but the text specifies Old French for 'view'."}, {"text": "Old French", "isCorrect": true, "rationale": "The text states: 'Variant Forms: view (via Old French veoir)', indicating Old French as the intermediate language through which 'view' was derived."}, {"text": "Proto-Indo-European", "isCorrect": false, "rationale": "While the ultimate ancestor of many languages, the text specifies the immediate linguistic path for 'view' as Old French."}]}, {"question": "If you encounter a new English word that contains the root 'vis' or 'vid', what is the most reasonable initial assumption about its core meaning?", "options": [{"text": "It relates to sound or hearing.", "isCorrect": false, "rationale": "This describes roots like 'aud' or 'phon'. The given root 'vis'/'vid' explicitly means 'to see'."}, {"text": "It relates to light or illumination.", "isCorrect": false, "rationale": "While seeing often requires light, the root itself means 'to see', not 'light'. Roots like 'phot' or 'lumin' relate to light. The connection to 'seeing' is more direct than 'light'."}, {"text": "It relates to sight or observation.", "isCorrect": true, "rationale": "The fundamental meaning of 'vis' and 'vid' is 'to see'. Therefore, any derivative will generally revolve around sight, vision, or observation."}, {"text": "It relates to knowledge or understanding.", "isCorrect": false, "rationale": "While seeing can lead to understanding, the direct meaning of the root is 'to see', not 'to know'. Roots like 'cogn' or 'sci' relate to knowledge."}]}, {"question": "Which of the following words, not explicitly listed in the examples (visible, evidence, video, supervise), is also a direct derivative of the root 'vis' or 'vid'?", "options": [{"text": "Invisible", "isCorrect": true, "rationale": "'Invisible' directly incorporates the root 'vis' and means 'not able to be seen', perfectly aligning with the root's meaning of 'to see'."}, {"text": "Revive", "isCorrect": false, "rationale": "'Revive' comes from Latin 're-vivere' ('to live again'), where 'viv' means 'life', not 'to see'."}, {"text": "Invincible", "isCorrect": false, "rationale": "'Invincible' comes from Latin 'in-vincere' ('to conquer'), where 'vinc' means 'conquer', not 'to see'."}, {"text": "Provoke", "isCorrect": false, "rationale": "'Provoke' comes from Latin 'pro-vocare' ('to call forth'), where 'voc' means 'to call', not 'to see'."}]}, {"question": "The text mentions \"videre (to see)\" and its \"past participle visus\" as the origin. What does this grammatical relationship tell us about the 'vis' and 'vid' forms?", "options": [{"text": "That 'vis' is exclusively used for plural forms and 'vid' for singular forms.", "isCorrect": false, "rationale": "The text describes a past participle relationship, not a singular/plural distinction for the roots in English derivatives."}, {"text": "That 'vid' typically derives from the verb stem, and 'vis' from the past participle stem.", "isCorrect": true, "rationale": "Latin verbs often form roots for English words from different parts of their conjugation. 'Videre' is the infinitive (verb stem), while 'visus' is the past participle, explaining the two distinct but related root forms 'vid' and 'vis' appearing in derivatives."}, {"text": "That 'vis' is an older form of the root than 'vid'.", "isCorrect": false, "rationale": "The text indicates 'visus' is a past participle of 'videre', not necessarily an older form. Both are aspects of the same Latin verb."}, {"text": "That 'vid' relates to future actions of seeing, and 'vis' to past actions.", "isCorrect": false, "rationale": "This implies a temporal distinction, which is not supported by the 'verb' and 'past participle' relationship in the context of English word formation from these roots."}]}, {"question": "A team of researchers develops a new camera that can clearly capture images in complete darkness. Which of the provided example derivatives best describes the primary function of this camera?", "options": [{"text": "Visible", "isCorrect": false, "rationale": "'Visible' describes something that *can be seen*. The camera's function is to *make* things seeable, or to *enable seeing* in darkness, not just to be seen."}, {"text": "Evidence", "isCorrect": false, "rationale": "'Evidence' refers to facts or information that indicate whether a belief is true, which is a conceptual result, not the camera's primary function of enabling sight."}, {"text": "Video", "isCorrect": true, "rationale": "'Video' (from Latin 'videre') refers to the recording, reproducing, or broadcasting of moving visual images. Capturing images in darkness directly relates to the function of a 'video' device for seeing or making seen."}, {"text": "Supervise", "isCorrect": false, "rationale": "'Supervise' means 'to oversee a person, project, or activity'. While it uses the 'vis' root, it's about management and oversight, not the technical function of capturing images."}]}, {"question": "The existence of a variant form like 'view' (via Old French veoir) in addition to 'vis' and 'vid' primarily illustrates what about language development?", "options": [{"text": "That English words exclusively come from Latin and Old French.", "isCorrect": false, "rationale": "English has roots from many languages. This example only illustrates one specific etymological path, not exclusivity."}, {"text": "That all Latin roots have multiple variant forms in English.", "isCorrect": false, "rationale": "Not all Latin roots have multiple variant forms. This is a specific instance, not a universal rule."}, {"text": "The influence of other languages and historical linguistic pathways on English vocabulary.", "isCorrect": true, "rationale": "The derivation of 'view' through Old French 'veoir' demonstrates how English vocabulary is enriched and shaped by borrowing and adapting words across different languages and historical periods, creating variant forms from a common origin."}, {"text": "That the original meaning of a root always remains unchanged over time.", "isCorrect": false, "rationale": "Meanings can shift over time, although the core 'to see' meaning is retained in 'view', the existence of variant forms shows linguistic evolution, not a guarantee of semantic stasis."}]}, {"question": "Which of the following scenarios best demonstrates the application of the 'vid' root in a modern context?", "options": [{"text": "A musician composing a symphony.", "isCorrect": false, "rationale": "Composing music relates to 'sound' (roots like 'aud', 'phon'), not 'seeing' (vis, vid)."}, {"text": "A historian interpreting ancient texts.", "isCorrect": false, "rationale": "Interpreting texts relates to 'reading' or 'understanding' (roots like 'leg', 'cogn'), not directly 'seeing' in the context of 'vid'."}, {"text": "A person watching a live stream of an event.", "isCorrect": true, "rationale": "Watching a live stream directly involves 'seeing' visual content, and 'video' (a direct derivative of 'vid') is the medium. This is a prime application of the root's meaning."}, {"text": "An architect designing a building blueprint.", "isCorrect": false, "rationale": "Designing relates to 'drawing' or 'planning' (roots like 'graph', 'plan'), not directly 'seeing' in the sense of the 'vid' root, though blueprints are visual aids."}]}, {"question": "Given the root forms 'vis' and 'vid' both mean 'to see', what is a key difference in how they typically manifest in English words, as suggested by the example derivatives provided (visible, evidence, video, supervise) and their Latin origins?", "options": [{"text": "'Vis' forms nouns, while 'vid' forms verbs.", "isCorrect": false, "rationale": "This is too rigid. 'Visible' is an adjective, 'evidence' is a noun, 'video' can be a noun or a verb, and 'supervise' is a verb. The examples don't support such a strict grammatical division."}, {"text": "'Vid' is often associated with the process or medium of seeing, while 'vis' can describe the state or object of being seen.", "isCorrect": true, "rationale": "'Video' clearly relates to the medium or process of seeing/recording images (from Latin 'videre', the verb to see). 'Visible' (able to be seen) and 'evidence' (what is seen/presented) relate to the state or object of sight (from Latin 'visus', the past participle 'having been seen'). This distinction aligns well with the examples and their Latin origins."}, {"text": "'Vis' primarily comes from Greek, and 'vid' from Latin.", "isCorrect": false, "rationale": "Both roots are explicitly stated to be from Latin."}, {"text": "There is no discernible difference; they are interchangeable in English derivatives.", "isCorrect": false, "rationale": "While both mean 'to see', their distinct Latin origins (verb stem vs. past participle) often lead to subtle but consistent differences in nuance or common usage in English words, as evident in 'video' (process/medium) versus 'visible' (state/object)."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
