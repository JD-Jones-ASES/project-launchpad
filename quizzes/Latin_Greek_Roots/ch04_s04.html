<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 4, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental meaning of the root 'scrib' or 'script' as evidenced across all words in this family?", "options": [{"text": "To speak", "isCorrect": false, "rationale": "The root 'scrib' relates to written communication, not oral communication."}, {"text": "To read", "isCorrect": false, "rationale": "While related to text, the root itself refers to the act of producing text, not consuming it."}, {"text": "To write", "isCorrect": true, "rationale": "Every word in the family—describe, manuscript, inscribe, prescribe, postscript, scripture, transcript, scribe—involves an action or result related to writing."}, {"text": "To carve", "isCorrect": false, "rationale": "While 'inscribe' can involve carving, it is a specific method of writing onto a surface, not the general meaning of the 'scrib' root."}]}, {"question": "A journalist is tasked with providing a comprehensive account of a recent political event, including key speeches, actions taken, and public reactions. Which word best describes the journalist's primary goal?", "options": [{"text": "Inscribe", "isCorrect": false, "rationale": "To inscribe means to write or carve words into a surface, which is not the journalist's goal here."}, {"text": "Prescribe", "isCorrect": false, "rationale": "To prescribe means to write instructions in advance, especially medical orders, which does not fit the context of reporting on an event."}, {"text": "Describe", "isCorrect": true, "rationale": "To describe means to write about or give a detailed account of something, which perfectly matches the journalist's objective of providing a comprehensive report."}, {"text": "Transcribe", "isCorrect": false, "rationale": "To transcribe means to make a written copy of spoken or recorded words. While a journalist might do this for speeches, their overall goal for the event is broader than just transcribing."}]}, {"question": "An ancient document is discovered, clearly showing hand-written text and illustrations. Based on its etymology, which term most accurately identifies this type of document?", "options": [{"text": "Postscript", "isCorrect": false, "rationale": "A postscript is an addition written after the main body of a letter, not an original handwritten document."}, {"text": "Transcript", "isCorrect": false, "rationale": "A transcript is a written copy of spoken or recorded words, not necessarily an original handwritten document in this context."}, {"text": "Scripture", "isCorrect": false, "rationale": "Scripture refers to sacred or holy writings; while they can be handwritten, the term doesn't specifically highlight the 'by hand' aspect of its creation like 'manuscript' does."}, {"text": "Manuscript", "isCorrect": true, "rationale": "The word 'manuscript' comes from 'manu' (by hand) + 'script' (written), literally meaning a document written by hand, which fits the description of an ancient, hand-written text."}]}, {"question": "A sculptor wants to permanently mark their unique symbol and initials onto the base of a new statue. Which action best describes what the sculptor will do?", "options": [{"text": "Describe the statue.", "isCorrect": false, "rationale": "To describe means to give a detailed account of something, not to mark it permanently."}, {"text": "Prescribe on the statue.", "isCorrect": false, "rationale": "To prescribe means to write instructions in advance, which is unrelated to marking a statue."}, {"text": "Inscribe the statue.", "isCorrect": true, "rationale": "To inscribe means to write or carve words into a surface, which accurately reflects the action of permanently marking a statue's base."}, {"text": "Transcribe the statue.", "isCorrect": false, "rationale": "To transcribe means to make a written copy of spoken or recorded words, which is irrelevant to marking a statue."}]}, {"question": "The prefix 'pre-' in 'prescribe' signifies 'before'. How does this meaning contribute to the definition of 'prescribe'?", "options": [{"text": "It means to write notes *about* something already decided.", "isCorrect": false, "rationale": "The 'pre-' prefix indicates an action happening in advance, not simply 'about' something."}, {"text": "It means to write instructions *after* an event has occurred.", "isCorrect": false, "rationale": "The prefix 'pre-' specifically means 'before', so 'after' is incorrect."}, {"text": "It means to write a copy of spoken words *prior* to their being recorded.", "isCorrect": false, "rationale": "This describes a specific timing for transcribing, not the meaning of 'prescribe' which involves giving orders/instructions."}, {"text": "It means to write instructions *in advance* of their implementation, often as orders.", "isCorrect": true, "rationale": "The prefix 'pre-' (before) combined with 'scrib' (to write) directly leads to the definition of writing instructions 'in advance', such as medical orders."}]}, {"question": "A speaker delivers an important address, and a court reporter is present to create a precise written record of every word spoken. The document produced by the court reporter is best described as a:", "options": [{"text": "Manuscript", "isCorrect": false, "rationale": "A manuscript is an author's original handwritten text; this document is a copy of spoken words."}, {"text": "Postscript", "isCorrect": false, "rationale": "A postscript is an addition to a letter written after the main body, not a record of a speech."}, {"text": "Transcript", "isCorrect": true, "rationale": "A transcript is a written copy of spoken or recorded words, which is precisely what a court reporter creates from an address."}, {"text": "Scripture", "isCorrect": false, "rationale": "Scripture refers to sacred or holy writings, not a direct record of an address."}]}, {"question": "In ancient civilizations, a 'scribe' was a highly valued professional. Based on the given definition, which statement accurately reflects the primary role of a scribe?", "options": [{"text": "They were responsible for leading religious ceremonies and rituals.", "isCorrect": false, "rationale": "This role is typically performed by priests or religious leaders, not primarily scribes."}, {"text": "They served as military commanders, leading armies into battle.", "isCorrect": false, "rationale": "Military leadership is distinct from the duties of a scribe."}, {"text": "They exclusively created original literary works and poems.", "isCorrect": false, "rationale": "While some scribes might have composed, their primary role was copying and writing documents, not exclusively original creative works."}, {"text": "They were skilled in copying and writing documents by hand, often for administrative or religious purposes.", "isCorrect": true, "rationale": "A 'scribe' is defined as 'a person who copies or writes documents by hand,' aligning with their historical role in administration, record-keeping, and reproducing texts."}]}, {"question": "Which of the following scenarios would be an example of a 'postscript'?", "options": [{"text": "A detailed report outlining the findings of a scientific experiment.", "isCorrect": false, "rationale": "This describes a main body of text or a 'description', not an addition to a letter."}, {"text": "A doctor's written instructions for a patient's treatment plan.", "isCorrect": false, "rationale": "This is an example of 'prescribing'."}, {"text": "An extra note added to the bottom of a completed letter after the signature.", "isCorrect": true, "rationale": "A 'postscript' (post- meaning 'after', script meaning 'written') is explicitly defined as an addition written after the main body of a letter."}, {"text": "A spoken speech converted into a written text for publication.", "isCorrect": false, "rationale": "This is an example of a 'transcript'."}]}, {"question": "Considering the suffix '-ure' means 'result of', how does 'scripture' align with its definition as 'sacred or holy writings'?", "options": [{"text": "It means the holiness is the *result* of the act of reading the texts.", "isCorrect": false, "rationale": "The suffix applies to the 'script' (writing), not the act of reading."}, {"text": "It suggests that the sacred texts are the *result* of being written down.", "isCorrect": true, "rationale": "The 'script' refers to the writing, and '-ure' indicates the result. Thus, 'scripture' refers to the 'result of writing' – specifically, the collection of sacred texts that have been written down."}, {"text": "It implies that the writing *resulted* in sacredness for the scribes.", "isCorrect": false, "rationale": "The suffix refers to the outcome (the writings themselves), not the effect on the individuals involved in writing."}, {"text": "It indicates that the texts were written *before* any other form of writing.", "isCorrect": false, "rationale": "The suffix '-ure' does not convey a temporal meaning of 'before'."}]}, {"question": "Which pair of words from the 'scrib' family is best exemplified by the concepts of writing instructions 'before' an action and adding a note 'after' a main communication?", "options": [{"text": "Inscribe and Describe", "isCorrect": false, "rationale": "'Inscribe' relates to writing on a surface, and 'describe' relates to giving an account, neither primarily indicating 'before' or 'after' in a temporal sense related to a main text or action."}, {"text": "Prescribe and Postscript", "isCorrect": true, "rationale": "'Prescribe' uses the prefix 'pre-' (before) to signify writing instructions in advance, and 'postscript' uses the prefix 'post-' (after) to signify an addition written after the main body of a letter, directly aligning with 'before' and 'after' concepts."}, {"text": "Manuscript and Transcript", "isCorrect": false, "rationale": "'Manuscript' refers to something written by hand, and 'transcript' is a written copy of spoken words; neither primarily focuses on the 'before' or 'after' aspect relative to a main event or text."}, {"text": "Scribe and Scripture", "isCorrect": false, "rationale": "'Scribe' is a person who writes, and 'scripture' refers to sacred writings; neither word is defined by a temporal relationship of 'before' or 'after' in this context."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
