<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 20, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'cred' mean?", "options": [{"text": "To create", "isCorrect": false, "rationale": "'cred' means 'to believe; to trust.'"}, {"text": "To believe; to trust", "isCorrect": true, "rationale": "Stated in the section."}, {"text": "To break", "isCorrect": false, "rationale": "Different root."}, {"text": "To run", "isCorrect": false, "rationale": "Different root."}]}, {"question": "From which Latin verb does 'cred' originate?", "options": [{"text": "crescere (grow)", "isCorrect": false, "rationale": "Gives 'increase.' 'Cred' = credere."}, {"text": "credere (to believe, trust, entrust)", "isCorrect": true, "rationale": "Stated in text."}, {"text": "currere (run)", "isCorrect": false, "rationale": "Different verb."}, {"text": "cogitare (think)", "isCorrect": false, "rationale": "Relates to thinking."}]}, {"question": "What variant form in past participle?", "options": [{"text": "creas", "isCorrect": false, "rationale": "Not listed."}, {"text": "credit", "isCorrect": true, "rationale": "'credit (in past participle forms).'"}, {"text": "crede", "isCorrect": false, "rationale": "Not listed."}, {"text": "creed", "isCorrect": false, "rationale": "A derivative, not a variant."}]}, {"question": "Which is a derivative of 'cred'?", "options": [{"text": "Cognition", "isCorrect": false, "rationale": "From 'cogn.'"}, {"text": "Incredible", "isCorrect": true, "rationale": "Listed as example."}, {"text": "Sensitive", "isCorrect": false, "rationale": "From 'sens.'"}, {"text": "Recognize", "isCorrect": false, "rationale": "From 'cogn.'"}]}, {"question": "Which concept connects most to 'cred'?", "options": [{"text": "Athletics", "isCorrect": false, "rationale": "Not related to belief/trust."}, {"text": "Financial credit and credibility", "isCorrect": true, "rationale": "Directly from 'cred.'"}, {"text": "Music", "isCorrect": false, "rationale": "Not connected."}, {"text": "Architecture", "isCorrect": false, "rationale": "Not connected."}]}, {"question": "What would 'credible' mean?", "options": [{"text": "Impossible to understand", "isCorrect": false, "rationale": "Understanding = cognition."}, {"text": "Able to be believed; convincing", "isCorrect": true, "rationale": "cred + -ible = able to be believed."}, {"text": "Difficult to create", "isCorrect": false, "rationale": "'cred' = believe, not create."}, {"text": "Too loud to hear", "isCorrect": false, "rationale": "Hearing = aud."}]}, {"question": "What part of speech is 'cred' originally?", "options": [{"text": "A noun", "isCorrect": false, "rationale": "'credere' is a verb."}, {"text": "A verb meaning 'to believe'", "isCorrect": true, "rationale": "Latin credere = verb."}, {"text": "An adjective", "isCorrect": false, "rationale": "It is a verb."}, {"text": "An adverb", "isCorrect": false, "rationale": "It is a verb."}]}, {"question": "'Credere' includes 'to entrust.' How does this extend beyond belief?", "options": [{"text": "Involves giving something valuable to someone's care.", "isCorrect": true, "rationale": "Adds dimension of active trust and reliance."}, {"text": "Belief is always religious.", "isCorrect": false, "rationale": "'Credere' is broadly about trust."}, {"text": "Requires written documentation.", "isCorrect": false, "rationale": "Writing = scrib."}, {"text": "Belief is temporary.", "isCorrect": false, "rationale": "Nothing suggests this."}]}, {"question": "How does 'creed' relate to 'cred'?", "options": [{"text": "A financial document", "isCorrect": false, "rationale": "That is credit."}, {"text": "A statement of beliefs, from 'credo' (I believe)", "isCorrect": true, "rationale": "From Latin credo."}, {"text": "A physical structure", "isCorrect": false, "rationale": "Creed is abstract."}, {"text": "A legal contract", "isCorrect": false, "rationale": "A statement of beliefs."}]}, {"question": "What does 'incredible' mean?", "options": [{"text": "Very believable", "isCorrect": false, "rationale": "in- = not."}, {"text": "Not able to be believed; extraordinary", "isCorrect": true, "rationale": "in- (not) + cred (believe) + -ible (able to be)."}, {"text": "Partially believable", "isCorrect": false, "rationale": "Complete negation."}, {"text": "Believed by everyone", "isCorrect": false, "rationale": "in- negates."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
