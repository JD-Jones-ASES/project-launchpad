<body>
<div class="quiz-container">

        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 18, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary meaning of the Latin root \"mort / mor\" as described in the provided section?", "options": [{"text": "Life", "isCorrect": false, "rationale": "The provided text explicitly states the meaning of the root 'mort / mor' is 'death', not 'life'."}, {"text": "Death", "isCorrect": true, "rationale": "The section clearly defines the meaning of the root 'mort / mor' as 'death'."}, {"text": "Love", "isCorrect": false, "rationale": "The provided text does not associate the root 'mort / mor' with the meaning of 'love'."}, {"text": "Light", "isCorrect": false, "rationale": "The provided text does not associate the root 'mort / mor' with the meaning of 'light'."}]}, {"question": "From which language does the root \"mort / mor\" originate?", "options": [{"text": "Greek", "isCorrect": false, "rationale": "The text explicitly states the origin as Latin, not Greek."}, {"text": "Old English", "isCorrect": false, "rationale": "The text explicitly states the origin as Latin, not Old English."}, {"text": "Latin", "isCorrect": true, "rationale": "The section clearly states the origin of the root 'mort / mor' is 'Latin mors, mortis (death), mori (to die)'."}, {"text": "French", "isCorrect": false, "rationale": "While French has Latin roots, the direct origin specified in the text is Latin."}]}, {"question": "If a new scientific term 'mortology' were created using the root 'mort', what would it most likely refer to?", "options": [{"text": "The study of living organisms", "isCorrect": false, "rationale": "The root 'mort' means death, so a term derived from it would not refer to life."}, {"text": "The study of ancient civilizations", "isCorrect": false, "rationale": "There is no information in the root profile to link 'mort' with ancient civilizations."}, {"text": "The study of death", "isCorrect": true, "rationale": "Given 'mort' means death and '-ology' typically denotes 'the study of', 'mortology' would logically refer to the study of death."}, {"text": "The study of celestial bodies", "isCorrect": false, "rationale": "There is no information in the root profile to link 'mort' with celestial bodies."}]}, {"question": "Which of the following words uses the root 'mort' to convey a sense of extreme shame or embarrassment, as if one could 'die' from the feeling?", "options": [{"text": "Mortal", "isCorrect": false, "rationale": "'Mortal' means subject to death, not causing shame."}, {"text": "Immortal", "isCorrect": false, "rationale": "'Immortal' means not subject to death, which is unrelated to shame."}, {"text": "Mortify", "isCorrect": true, "rationale": "'Mortify' means to cause someone to feel extremely embarrassed or ashamed, implying a metaphorical 'death' from humiliation, directly connecting to the root's meaning of death."}, {"text": "Mortgage", "isCorrect": false, "rationale": "'Mortgage' refers to a legal agreement involving property as security for a debt; its connection to 'death' is historical (a 'dead pledge') but not in the sense of causing shame."}]}, {"question": "The text mentions 'mori' as a variant 'in verbal forms' originating from 'to die'. Which of the following words reflects this 'to die' aspect in a process-oriented sense?", "options": [{"text": "Mortician", "isCorrect": false, "rationale": "'Mortician' refers to a person who prepares the dead for burial, not the act of dying itself, although related to death."}, {"text": "Moribund", "isCorrect": true, "rationale": "'Moribund' means being at the point of death; dying. The 'mori' component directly connects to the verbal form 'to die', describing the active process of dying."}, {"text": "Mortar", "isCorrect": false, "rationale": "'Mortar' (as in a building material) has a different etymology and is unrelated to the root 'mort' meaning death."}, {"text": "Mortuary", "isCorrect": false, "rationale": "'Mortuary' refers to a place for the dead, not the process of dying."}]}, {"question": "Considering the words 'mortal' and 'immortal' from the examples, what does the prefix 'im-' indicate when combined with the root 'mort'?", "options": [{"text": "It intensifies the meaning of death, making it more extreme.", "isCorrect": false, "rationale": "The prefix 'im-' (a form of 'in-') typically indicates negation or opposition, not intensification."}, {"text": "It implies a reversal, changing the meaning from 'death' to 'life'.", "isCorrect": false, "rationale": "The prefix 'im-' negates the state of being mortal, it doesn't entirely reverse the root's meaning to 'life'."}, {"text": "It negates the root's meaning, signifying 'not subject to death'.", "isCorrect": true, "rationale": "The prefix 'im-' acts as a negative, transforming 'mortal' (subject to death) into 'immortal' (not subject to death)."}, {"text": "It suggests something occurring before death.", "isCorrect": false, "rationale": "The prefix 'im-' does not convey a temporal meaning like 'before'."}]}, {"question": "A biologist discovers a species that has an incredibly long lifespan and shows no signs of biological aging. How would this species most accurately be described in relation to the root 'mort'?", "options": [{"text": "It is highly mortal.", "isCorrect": false, "rationale": "If the species has an incredibly long lifespan and no signs of aging, it is the opposite of highly mortal."}, {"text": "It exhibits traits of mortification.", "isCorrect": false, "rationale": "'Mortification' relates to shame or decay, not extended lifespan or lack of aging."}, {"text": "It is effectively immortal.", "isCorrect": true, "rationale": "If a species shows no signs of biological aging and has an incredibly long lifespan, it can be described as 'immortal' – not subject to death in the usual biological sense."}, {"text": "It is a form of mortgage.", "isCorrect": false, "rationale": "'Mortgage' is a financial term and completely unrelated to biological characteristics."}]}, {"question": "Understanding the root 'mort / mor' is most helpful for:", "options": [{"text": "Learning to speak Latin fluently.", "isCorrect": false, "rationale": "While the root is Latin, knowing one root does not lead to fluency in an entire language."}, {"text": "Identifying words that are visually similar but have completely different meanings.", "isCorrect": false, "rationale": "The purpose of root knowledge is to connect words by meaning, not to highlight superficial similarities."}, {"text": "Predicting the general meaning of unfamiliar English words related to death or dying.", "isCorrect": true, "rationale": "Knowledge of roots like 'mort / mor' allows learners to infer the likely meaning of new or unfamiliar words that contain the root, especially if the context points to 'death' or 'dying'."}, {"text": "Memorizing specific dates and historical events related to mortality.", "isCorrect": false, "rationale": "Root knowledge is about word meaning and etymology, not historical facts or dates."}]}, {"question": "Which of the following words is NOT derived from the Latin root 'mort / mor' meaning 'death'?", "options": [{"text": "Post-mortem", "isCorrect": false, "rationale": "'Post-mortem' means 'after death', directly using the root 'mort'."}, {"text": "Mortgage", "isCorrect": false, "rationale": "Though its modern meaning is financial, 'mortgage' historically derives from a 'dead pledge' (Old French mort gaige), connecting it to the root 'mort'."}, {"text": "Mortar (a bowl for grinding)", "isCorrect": true, "rationale": "'Mortar' (a bowl or a building material) comes from the Latin 'mortarium', referring to a vessel for pounding, and is etymologically unrelated to 'mors' (death)."}, {"text": "Mortality", "isCorrect": false, "rationale": "'Mortality' refers to the state of being subject to death, a direct derivation from the root 'mort'."}]}, {"question": "The meaning of 'mortgage' as a 'dead pledge' (as its etymology suggests) implies that:", "options": [{"text": "The debt becomes invalid upon the death of the borrower.", "isCorrect": false, "rationale": "The term 'dead pledge' historically referred to the pledge (property) being 'dead' or useless to the borrower once pledged, or to the debt being extinguished upon repayment, not the debt becoming invalid upon death."}, {"text": "The property pledged becomes 'dead' or useless to the borrower if the loan is not repaid.", "isCorrect": true, "rationale": "The 'dead' in 'mortgage' refers to the pledge (the property) becoming 'dead' or null to the borrower, or the interest ceasing (dying) when the debt is paid. It's not about literal death of a person, but the 'death' of the pledge's utility to the borrower or the debt itself."}, {"text": "The agreement is designed to last only until the death of the lender.", "isCorrect": false, "rationale": "The term 'dead pledge' does not specifically relate to the death of the lender."}, {"text": "The entire process is considered a 'dead' or failed transaction.", "isCorrect": false, "rationale": "While 'dead' implies cessation, it doesn't mean the entire transaction is inherently a failure, but rather refers to the status of the pledge or the debt."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
