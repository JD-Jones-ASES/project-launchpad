    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 3, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary message conveyed by the epigraph attributed to Zeno of Citium?", "options": [{"text": "Humans are naturally endowed with excellent auditory capabilities.", "isCorrect": false, "rationale": "While the epigraph mentions ears, its primary message is not about the quality of hearing itself, but rather the implication of having two ears versus one mouth for communication behavior."}, {"text": "We should prioritize listening and understanding over speaking.", "isCorrect": true, "rationale": "The Latin phrase 'ut plus audiamus quam loquamur' directly translates to 'so that we may hear more than we speak,' which is the core directive and primary message of the epigraph."}, {"text": "The act of speaking requires more effort than listening.", "isCorrect": false, "rationale": "The epigraph does not discuss the effort involved in speaking versus listening; it focuses on the quantity or proportion of each activity based on anatomical features."}, {"text": "Nature provides us with anatomical features for balanced and equal communication.", "isCorrect": false, "rationale": "The epigraph argues for an *imbalance* in favor of listening (two ears to one mouth), not an equal balance, suggesting a preference for listening more."}]}, {"question": "Who is credited as the originator of the wisdom expressed in the epigraph?", "options": [{"text": "Diogenes Laertius", "isCorrect": false, "rationale": "Diogenes Laertius is the chronicler or source through whom the quote is attributed, not the original author of the statement itself."}, {"text": "Zeno of Citium", "isCorrect": true, "rationale": "The epigraph explicitly states that the quote is 'attributed to Zeno of Citium,' identifying him as the philosopher who originated this particular piece of wisdom."}, {"text": "Natura Dedit", "isCorrect": false, "rationale": "'Natura dedit' is a Latin phrase meaning 'Nature gave,' and is part of the quote itself, not the name of the person who said it."}, {"text": "An anonymous Roman philosopher", "isCorrect": false, "rationale": "The epigraph provides a specific attribution to 'Zeno of Citium,' making it incorrect to label the author as anonymous."}]}, {"question": "Through what intermediary source is Zeno of Citium's quote preserved and attributed?", "options": [{"text": "Original texts written by Zeno himself", "isCorrect": false, "rationale": "The epigraph states 'via Diogenes Laertius,' indicating that Diogenes Laertius is the conduit for this attribution, rather than a direct original work of Zeno being cited."}, {"text": "Ancient Greek anatomical treatises", "isCorrect": false, "rationale": "While the quote references anatomy, the source mentioned is a chronicler of philosophers, not an anatomical text."}, {"text": "Diogenes Laertius", "isCorrect": true, "rationale": "The epigraph explicitly states 'via Diogenes Laertius,' indicating that he is the source through whom this quote from Zeno of Citium has been passed down and attributed."}, {"text": "Roman natural philosophy compilations", "isCorrect": false, "rationale": "The source is specifically named as Diogenes Laertius, not a general category of compilations."}]}, {"question": "The epigraph uses an observation about human anatomy to support its primary message. What is this observation?", "options": [{"text": "The human mouth is a more complex organ than the ear.", "isCorrect": false, "rationale": "The epigraph makes no claim about the complexity of these organs; its point is purely about their number."}, {"text": "We are naturally equipped with two ears but only one mouth.", "isCorrect": true, "rationale": "The quote 'Natura dedit nobis aures duas, os unum' translates directly to 'Nature gave us two ears, one mouth,' which is the anatomical observation used as the premise for the advice."}, {"text": "Our ears are physically larger than our mouths.", "isCorrect": false, "rationale": "The epigraph refers to the number of these organs, not their comparative size."}, {"text": "The human auditory system is functionally superior to its vocal apparatus.", "isCorrect": false, "rationale": "The epigraph doesn't make a statement about the functional superiority of either system, but rather uses the numerical ratio to advise on communication behavior."}]}, {"question": "Consider a scenario where a student is preparing for a debate. Based on Zeno's epigraph, what advice would be most beneficial for their preparation and performance?", "options": [{"text": "Focus primarily on crafting eloquent and persuasive arguments to win the debate.", "isCorrect": false, "rationale": "While eloquence is valuable in a debate, Zeno's quote emphasizes listening over speaking, suggesting that the primary focus shouldn't be solely on one's own speech."}, {"text": "Thoroughly research and understand the opposing viewpoints before articulating one's own arguments.", "isCorrect": true, "rationale": "This advice aligns with 'hearing more than speaking' by advocating for extensive listening and understanding of the 'other side' (opposing viewpoints) before actively speaking or presenting one's case."}, {"text": "Practice speaking clearly and concisely to maximize impact in the limited time available.", "isCorrect": false, "rationale": "This focuses on the *quality* of speaking, whereas Zeno's quote is about the *ratio* of listening to speaking."}, {"text": "Prepare a wide range of counter-arguments for every possible objection.", "isCorrect": false, "rationale": "While good for debate, this is still primarily focused on speaking and preparing one's own output, rather than emphasizing the input gained through listening."}]}, {"question": "What philosophical concept or approach does Zeno's quote primarily advocate for in communication?", "options": [{"text": "Eloquence, or the art of speaking beautifully and persuasively.", "isCorrect": false, "rationale": "The quote emphasizes listening more than speaking, which is distinct from focusing on the art or beauty of one's own speech."}, {"text": "Dialectical argumentation, where ideas are tested through reasoned dialogue.", "isCorrect": false, "rationale": "While dialectic involves both, Zeno's quote specifically prioritizes one over the other, advocating for a listening-first approach rather than an equal exchange."}, {"text": "Prudence and receptiveness in discourse.", "isCorrect": true, "rationale": "By advising one to 'hear more than speak,' Zeno promotes prudence (careful judgment) by first understanding through listening, and receptiveness to others' input before formulating one's own responses."}, {"text": "Rhetoric, the skill of effective and convincing speaking.", "isCorrect": false, "rationale": "Rhetoric focuses on effective speaking. Zeno's quote places a higher value on listening than speaking, making this an unsuitable primary concept."}]}, {"question": "Beyond a simple communication rule, what deeper human value might Zeno's epigraph implicitly promote?", "options": [{"text": "The pursuit of knowledge through empirical observation.", "isCorrect": false, "rationale": "While the quote *uses* an empirical observation (two ears, one mouth), the value promoted is not the act of observation itself, but the behavioral advice derived from it."}, {"text": "Humility and an openness to learning from others.", "isCorrect": true, "rationale": "To 'hear more than we speak' implies a willingness to hold one's own opinions in abeyance, listen to others, and be open to new information or perspectives, which are characteristics of humility and a learning mindset."}, {"text": "The importance of natural design as a guide for ethical living.", "isCorrect": false, "rationale": "While the quote uses natural design as a metaphor or rationale, its direct implicit promotion is a specific aspect of human interaction (listening), not the broader concept of natural design guiding all ethics."}, {"text": "The efficiency of concise and impactful speech.", "isCorrect": false, "rationale": "This value focuses on the *quality* of speaking, while the quote's emphasis is on the *quantity* and priority of listening over speaking."}]}, {"question": "Someone interprets Zeno's quote to mean, 'People should speak less to avoid saying something foolish.' Why is this an inaccurate interpretation?", "options": [{"text": "The quote is primarily about the *quality* of speech, not its quantity.", "isCorrect": false, "rationale": "The quote clearly addresses quantity ('more than we speak') and the *ratio* of listening to speaking, so this statement is inaccurate."}, {"text": "Zeno's original philosophy mainly focused on avoiding errors in judgment, not just speech.", "isCorrect": false, "rationale": "This delves into Zeno's broader philosophy, which is not provided in the epigraph itself. The rationale must be based on the given text."}, {"text": "The rationale given (two ears, one mouth) points to the *purpose* of listening—to understand—rather than merely limiting speech to prevent errors.", "isCorrect": true, "rationale": "The epigraph uses the anatomical ratio to suggest that listening should be prioritized for understanding and intake, not solely as a preventative measure against poor speech. The emphasis is on active reception."}, {"text": "The quote is an observation about human nature, not a directive for behavior.", "isCorrect": false, "rationale": "The phrase 'ut plus audiamus quam loquamur' ('so that we may hear more than we speak') clearly presents a directive or purpose for human behavior based on the observation."}]}, {"question": "Into which category of wisdom does Zeno's epigraph most appropriately fit?", "options": [{"text": "Metaphysical speculation, concerning the fundamental nature of reality.", "isCorrect": false, "rationale": "The epigraph provides practical guidance on human interaction, not an abstract discussion about the nature of existence."}, {"text": "Epistemological inquiry, dealing with the theory of knowledge.", "isCorrect": false, "rationale": "While listening can lead to knowledge, the quote itself is a behavioral prescription, not an exploration of how knowledge is acquired or validated in a theoretical sense."}, {"text": "Ethical or practical guidance, offering advice on how one should live or interact.", "isCorrect": true, "rationale": "The quote 'so that we may hear more than we speak' is a direct piece of advice or an ethical directive on how one should conduct themselves in communication, making it practical guidance."}, {"text": "Scientific theory, based on empirical observation and testable hypotheses.", "isCorrect": false, "rationale": "While it starts with an observation, it culminates in a behavioral recommendation, not a falsifiable scientific theory."}]}, {"question": "If an individual consistently disregards the principle put forth by Zeno, what is a likely negative consequence in their interactions?", "options": [{"text": "They might become an exceptionally eloquent public speaker.", "isCorrect": false, "rationale": "While speaking more might hone speaking skills, disregarding the *listening* aspect (as advised by Zeno) typically has negative consequences for understanding and relationships, not necessarily improving eloquence in a positive sense."}, {"text": "They will struggle to truly understand others' perspectives and build effective rapport.", "isCorrect": true, "rationale": "If one consistently speaks more than they listen, they are less likely to absorb and comprehend what others are saying, leading to misunderstandings and an inability to connect deeply or build trust."}, {"text": "They could develop a reputation for being exceptionally knowledgeable.", "isCorrect": false, "rationale": "Speaking more does not automatically equate to being more knowledgeable; in fact, less listening can hinder true learning and knowledge acquisition."}, {"text": "They will be perceived as highly assertive and decisive by their peers.", "isCorrect": false, "rationale": "While they might be perceived as assertive, the consistent disregard for listening is more likely to lead to perceptions of arrogance, inconsideration, or being a poor communicator, rather than solely positive traits like decisiveness."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
