    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 16</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the Latin root 'tempor / tempus' mean?", "options": [{"text": "light; brightness", "isCorrect": false, "rationale": "Light and brightness belong to the root 'luc/lum/lus' from Chapter 15. Tempor/tempus has a different meaning."}, {"text": "time", "isCorrect": true, "rationale": "Tempor/tempus comes from the Latin word tempus, meaning time. All words built on this root relate to when things happen, how long they last, or how fast they move."}, {"text": "earth; land", "isCorrect": false, "rationale": "Earth and land belong to the root 'terr/terra' from Chapter 13. Tempor/tempus means time."}, {"text": "to lead; to guide", "isCorrect": false, "rationale": "Leading and guiding belong to the root 'duc/duct' from Chapter 10. Tempor/tempus means time."}]}, {"question": "Something 'temporary' is described as:", "options": [{"text": "Built from permanent materials", "isCorrect": false, "rationale": "Permanent materials would create a permanent structure. Temporary means existing only for a limited time."}, {"text": "Lasting only for a limited time; not permanent", "isCorrect": true, "rationale": "Temporary = tempor (time) + -ary. Something temporary exists only for a period of time — it is not meant to last forever."}, {"text": "Related to the weather or seasons", "isCorrect": false, "rationale": "Weather and seasons connect more directly to 'tempest.' Temporary simply means lasting only for a time."}, {"text": "Able to keep perfect time, like a clock", "isCorrect": false, "rationale": "Keeping time is not the meaning of temporary. Temporary = lasting only for a time, then ending."}]}, {"question": "A 'contemporary' person is someone who:", "options": [{"text": "Lives in a very old building or historic place", "isCorrect": false, "rationale": "Living in a historic place has nothing to do with the root. Contemporary = con- (with, together) + tempor (time) + -ary."}, {"text": "Lives at the same time as you; shares your era", "isCorrect": true, "rationale": "Contemporary = con- (with, together) + tempor (time) + -ary. A contemporary lives 'with the time' — they share your era or historical period."}, {"text": "Lived in ancient Rome or Greece", "isCorrect": false, "rationale": "Ancient Romans and Greeks are not our contemporaries — they lived in a different era. Contemporary means sharing the same time period."}, {"text": "Works temporarily rather than permanently", "isCorrect": false, "rationale": "Working temporarily involves the same root, but contemporary specifically means living or occurring in the same time period as someone else."}]}, {"question": "What does 'temporal' mean?", "options": [{"text": "Moving very quickly through time", "isCorrect": false, "rationale": "Speed is not the meaning of temporal. Temporal = relating to time or to the earthly, passing world."}, {"text": "Relating to time; of the earthly, passing world", "isCorrect": true, "rationale": "Temporal = tempor (time) + -al. Temporal describes anything related to time or the temporary, earthly world — as opposed to the eternal or spiritual."}, {"text": "Belonging to a specific temperature", "isCorrect": false, "rationale": "Temperature is related to 'temperate' (related to climate), not to the time root. Temporal means relating to time."}, {"text": "Existing underground beneath the earth", "isCorrect": false, "rationale": "Underground relates to 'subterranean' (from terr, Chapter 13). Temporal relates to time and the passing world."}]}, {"question": "An 'extemporaneous' speech is one delivered:", "options": [{"text": "With careful preparation over many weeks", "isCorrect": false, "rationale": "Careful preparation is the opposite of extemporaneous. The prefix ex- (out) + tempor (time) means out of time — without prior preparation."}, {"text": "Without preparation; on the spot, in the moment", "isCorrect": true, "rationale": "Extemporaneous = ex- (out of) + tempor (time) + -aneous. A speech done 'out of time' has no prepared script — the speaker must think and speak in the very moment."}, {"text": "In a temporary location such as outdoors", "isCorrect": false, "rationale": "Location has nothing to do with extemporaneous. The word means without preparation — speaking out of the normal time for preparation."}, {"text": "About the history of time and seasons", "isCorrect": false, "rationale": "The word is not about the topic of time. Extemporaneous describes the method of delivery: without preparation, on the spot."}]}, {"question": "In music, 'tempo' refers to:", "options": [{"text": "The volume at which a piece is played", "isCorrect": false, "rationale": "Volume is dynamics, not tempo. Tempo comes from the Latin tempus (time) and refers to the speed of the music."}, {"text": "The speed at which a piece of music is played", "isCorrect": true, "rationale": "Tempo = tempus (time). In music, tempo measures how quickly or slowly time passes through a composition. The term entered English through Italian, which borrowed it directly from Latin."}, {"text": "The emotional feeling or mood of a piece", "isCorrect": false, "rationale": "Mood is communicated through dynamics, key, and melody — not tempo. Tempo specifically means the speed of the music's time."}, {"text": "The number of instruments playing at once", "isCorrect": false, "rationale": "The number of instruments is related to texture or orchestration. Tempo refers to the time-speed of the music."}]}, {"question": "The word 'tempest' originally meant a 'period of time' or 'season.' What does it mean today?", "options": [{"text": "A period of great happiness or celebration", "isCorrect": false, "rationale": "A tempest is not associated with happiness. The word has narrowed from 'a period of time' to specifically mean a violent, ferocious storm."}, {"text": "A violent storm; turbulent weather", "isCorrect": true, "rationale": "Tempest = temp- (time/season) + -est. The original meaning was 'a period of time' or 'season,' but because stormy seasons were most memorable, the word narrowed to mean a violent storm."}, {"text": "A temporary shelter from the rain", "isCorrect": false, "rationale": "A shelter would be a different concept. Tempest specifically refers to the violent storm itself, not something used for protection."}, {"text": "A long journey across a continent", "isCorrect": false, "rationale": "A journey is not the meaning of tempest. The word evolved from 'a period of weather' to specifically mean a violent storm."}]}, {"question": "What does 'extemporaneous' literally mean when broken into its morphemes?", "options": [{"text": "Completely outside of time", "isCorrect": false, "rationale": "While ex- does mean out and tempor means time, the specific meaning is 'out of the time' for preparation — done without a script, not existing outside of time itself."}, {"text": "Out of (preparation) time; spoken on the spot", "isCorrect": true, "rationale": "Extemporaneous = ex- (out of) + tempor (time) + -aneous. It describes something done without the time to prepare — the speaker goes 'out of' their prepared time and speaks in the moment."}, {"text": "Before the scheduled time; early", "isCorrect": false, "rationale": "Early would use a 'before' prefix like pre-. Extemporaneous uses ex- (out of) to mean without the benefit of preparation time."}, {"text": "Made during a temporary period", "isCorrect": false, "rationale": "Being made during a temporary period is captured by 'temporary.' Extemporaneous specifically describes a lack of preparation — being 'out of' prepared time."}]}, {"question": "How does the word 'tempo' connect music to the concept of time?", "options": [{"text": "It does not — tempo is from a different root meaning speed", "isCorrect": false, "rationale": "Tempo is directly from Latin tempus (time). Speed and time are related concepts — measuring how quickly time passes through a piece of music."}, {"text": "Tempo measures how quickly time flows through a piece of music", "isCorrect": true, "rationale": "Tempo = tempus (time). A musical tempo controls the rate at which time passes in the music. A fast tempo means time moves quickly; a slow tempo means it moves slowly."}, {"text": "Tempo refers to the temporary notes that change during a piece", "isCorrect": false, "rationale": "There are no 'temporary notes' in music theory. Tempo is from tempus (time) and refers strictly to the speed of the musical beat."}, {"text": "Tempo comes from the same root as transport and means to carry music across", "isCorrect": false, "rationale": "Transport uses the root port (carry, Chapter 9). Tempo comes from tempus (time, Chapter 16) and entered English through Italian."}]}, {"question": "A Roman philosopher might describe temporary pleasures and contrast them with eternal virtues. What does 'temporal' mean in this context?", "options": [{"text": "Pleasing to all people at all times", "isCorrect": false, "rationale": "Universal pleasure is not what temporal means. Temporal describes things that are limited by time — they belong to the passing world, not the eternal one."}, {"text": "Lasting, permanent, and unchanging", "isCorrect": false, "rationale": "This is the opposite. Temporal means belonging to the passing, time-limited world — as opposed to what is eternal."}, {"text": "Belonging to the passing, time-limited earthly world", "isCorrect": true, "rationale": "Temporal = tempor (time) + -al. Roman philosophers used 'temporal' to mean of this world, limited by time — as opposed to eternal virtues that last beyond any human lifetime."}, {"text": "Relating to the temperature of the season", "isCorrect": false, "rationale": "Temperature relates to climate, not to the philosophical distinction between time-bound and eternal. Temporal means of the time-limited, earthly world."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
