    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 15</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What meaning do the three root variants luc, lum, and lus all share?", "options": [{"text": "time; season", "isCorrect": false, "rationale": "Time and season belong to the root 'tempor/tempus' from Chapter 16. Luc/lum/lus all relate to light."}, {"text": "light", "isCorrect": true, "rationale": "All three variants — luc (from lux), lum (from lumen), and lus (from lustrare) — relate to light. They come from three Latin words that all described brightness."}, {"text": "water; flowing", "isCorrect": false, "rationale": "Water relates to the root 'aqua' from Chapter 14. Luc/lum/lus all describe light."}, {"text": "earth; land", "isCorrect": false, "rationale": "Earth and land relate to the root 'terr/terra' from Chapter 13. Luc/lum/lus all describe light."}]}, {"question": "A 'lucid' explanation is one that is:", "options": [{"text": "Very long and detailed", "isCorrect": false, "rationale": "Length and detail are not what makes something lucid. The root luc (light) suggests clarity — a lucid explanation is clear and easy to understand."}, {"text": "Clear and easy to understand, as if it shines", "isCorrect": true, "rationale": "Lucid = luc (light) + -id. The Romans connected brightness with clarity. A lucid explanation is so clear it seems to shine with understanding."}, {"text": "Supported by scientific evidence", "isCorrect": false, "rationale": "Scientific support is not the meaning of lucid. The root luc (light) means lucid = clear, bright, easy to understand."}, {"text": "Written in formal language", "isCorrect": false, "rationale": "Formality is not captured by the root luc. Lucid means clear and bright — easy to understand regardless of the register."}]}, {"question": "To 'illuminate' a room or an idea means to:", "options": [{"text": "Darken it to create a mood", "isCorrect": false, "rationale": "Darkening is the opposite of the root meaning. Illuminate = il- (in-) + lumin (light) + -ate: to shine light into."}, {"text": "Shine light into it; make it clear", "isCorrect": true, "rationale": "Illuminate = il- (in-) + lumin (light) + -ate. To illuminate physically means to light up a space; metaphorically, it means to make an idea clear or understandable."}, {"text": "Make it louder and more dramatic", "isCorrect": false, "rationale": "Volume and drama are not related to the root lumin (light). Illuminate means to bring light or clarity to something."}, {"text": "Carry it across to another location", "isCorrect": false, "rationale": "Carrying across belongs to the root fer or port. Illuminate uses the root lumin (light) to mean bringing brightness or clarity."}]}, {"question": "Something 'luminous' is described as:", "options": [{"text": "Very heavy and difficult to move", "isCorrect": false, "rationale": "Weight is not related to the root lumin (light). Luminous means giving off or full of light."}, {"text": "Giving off its own light; glowing brightly", "isCorrect": true, "rationale": "Luminous = lumin (light) + -ous (full of). Something luminous glows with its own light — like the moon or a firefly."}, {"text": "Clear and transparent like water", "isCorrect": false, "rationale": "Transparency is a quality of water-like materials. Luminous means actively giving off light, not just allowing light to pass through."}, {"text": "Related to the time of day", "isCorrect": false, "rationale": "Time relates to 'tempor.' Luminous means full of light — describing something that glows."}]}, {"question": "To 'illustrate' originally meant to:", "options": [{"text": "Draw pictures in the margins of a book", "isCorrect": false, "rationale": "While illustrations are now visual, the original meaning was not specifically about drawing. Illustrate comes from il- (in) + lus (light) + -trate: to light up."}, {"text": "Light up a text with pictures or examples, making it clearer", "isCorrect": true, "rationale": "Illustrate = il- (in-) + lus (light) + -trate. Originally it meant to 'light up' a text — illuminating the reader's understanding through examples or pictures."}, {"text": "Write a story about light and fire", "isCorrect": false, "rationale": "The root lus does mean light, but illustrate means to light up or clarify, not to write about light specifically."}, {"text": "Translate a text from Latin to another language", "isCorrect": false, "rationale": "Translation uses the root lat (carry, Chapter 12). Illustrate uses lus (light) to mean making something clear through examples."}]}, {"question": "To 'elucidate' a problem means to:", "options": [{"text": "Make it more complicated and difficult", "isCorrect": false, "rationale": "Complicating is the opposite of the root's meaning. Elucidate = e- (out) + lucid (light/clear) + -ate: to bring out of darkness into the light of understanding."}, {"text": "Bring it out of darkness into the light of reason; explain fully", "isCorrect": true, "rationale": "Elucidate = e- (out, away from) + lucid (bright/clear) + -ate. To elucidate is to take something out of confusion and bring it into clarity — full explanation."}, {"text": "Carry it back to an earlier starting point", "isCorrect": false, "rationale": "Carrying back uses the root 'fer' or 'port' with 're-.' Elucidate uses the root luc (light) to mean bringing clarity."}, {"text": "Lead someone through a dark underground area", "isCorrect": false, "rationale": "Leading through underground spaces would use the root duct (lead). Elucidate means to bring clarity using the root luc/lucid (light)."}]}, {"question": "What is a 'translucent' object, and how is it different from a transparent object?", "options": [{"text": "Translucent objects are completely opaque; transparent objects let some light through", "isCorrect": false, "rationale": "This is backwards. Translucent objects allow light through (but not clear vision); opaque objects block light entirely."}, {"text": "Translucent objects let light through but not clear vision; transparent objects let you see through them", "isCorrect": true, "rationale": "Translucent = trans- (through) + luc (light) + -ent. Light passes through but you cannot see clearly — like frosted glass. Transparent objects let you see completely through them."}, {"text": "There is no meaningful difference between translucent and transparent", "isCorrect": false, "rationale": "There is an important difference. Translucent allows light through but blurs vision; transparent allows both light and clear vision to pass."}, {"text": "Translucent means giving off light; transparent means absorbing light", "isCorrect": false, "rationale": "Giving off light is luminous. Translucent means light passes through (trans- = through + luc = light), but not clear visibility."}]}, {"question": "The word 'Lucifer' literally means 'light-bearer.' What did it refer to before it entered Christian tradition?", "options": [{"text": "The sun at noon, when it is brightest", "isCorrect": false, "rationale": "Lucifer was not associated with the midday sun. The chapter states it was the Roman name for the morning star."}, {"text": "The morning star (Venus), which appears before sunrise", "isCorrect": true, "rationale": "Lucifer = luci (light) + fer (carry). The Romans used this name for the planet Venus, which appears in the sky just before dawn, literally 'carrying light' into the new day."}, {"text": "A Roman god of fire and the forge", "isCorrect": false, "rationale": "The god of fire and the forge was Vulcan. Lucifer was a name for the morning star (Venus), meaning light-bearer."}, {"text": "A type of oil lamp used in Roman temples", "isCorrect": false, "rationale": "Lucifer was not a type of lamp. It was the name for the planet Venus as the morning star — meaning 'the one that carries light' before the sun rises."}]}, {"question": "Medieval monks who decorated manuscripts with gold leaf and bright colors were called 'illuminators.' Which root explains this title?", "options": [{"text": "luc (from lux, light) — they made the pages shine and glow", "isCorrect": false, "rationale": "While luc relates to light, the specific root in 'illuminate' and 'illuminators' is lumin (from lumen, a lamp/light source)."}, {"text": "lumin (from lumen, light/lamp) — they literally made the pages glow with light", "isCorrect": true, "rationale": "Illuminate = il- (in) + lumin (light, from lumen) + -ate. Illuminators added gold and vivid colors that made manuscripts physically glow — carrying the sense of light into their title."}, {"text": "lus (from lustrare, to shine) — they polished the pages to a high luster", "isCorrect": false, "rationale": "While luster relates to polished shine, the specific word 'illuminate' uses the lumin root (from lumen, lamp/light)."}, {"text": "port (to carry) — they carried the books through the monastery", "isCorrect": false, "rationale": "Carrying books uses the root port (Chapter 9). Illuminators are named for the root lumin (light) — they made the pages shine."}]}, {"question": "'Luster' describes the gentle shine of polished metal or a pearl. Which variant of the light root is used here?", "options": [{"text": "luc (from lux, light)", "isCorrect": false, "rationale": "Luc appears in words like lucid. Luster comes from a different variant of the light root."}, {"text": "lumin (from lumen, lamp)", "isCorrect": false, "rationale": "Lumin appears in words like luminous and illuminate. Luster comes from yet another variant."}, {"text": "lus (from lustrare, to brighten/shine)", "isCorrect": true, "rationale": "Luster = lus (from lustrare, to purify or make bright) + -ter. The lus root gives us luster, illustrate, and lustrous — all about a gentle, polished shine."}, {"text": "lat (from latus, carried)", "isCorrect": false, "rationale": "Lat is a root meaning to carry (Chapter 12), not related to light. Luster comes from lus (from lustrare, to shine)."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
