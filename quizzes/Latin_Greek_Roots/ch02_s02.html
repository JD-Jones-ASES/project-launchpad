        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 2, Section 2</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the provided ROOT PROFILE, what is the primary meaning of the Latin root \"dict/dic\"?", "options": [{"text": "To see or observe", "isCorrect": false, "rationale": "The meaning 'to see or observe' is typically associated with roots like 'vis' or 'spec', not 'dict/dic'."}, {"text": "To say, to tell, to declare", "isCorrect": true, "rationale": "The ROOT PROFILE explicitly states the meaning of 'dict/dic' as 'to say, to tell, to declare'."}, {"text": "To write or record", "isCorrect": false, "rationale": "The meaning 'to write or record' is associated with roots like 'scrib' or 'graph', not 'dict/dic'."}, {"text": "To lead or guide", "isCorrect": false, "rationale": "The meaning 'to lead or guide' is associated with roots like 'duc', not 'dict/dic'."}]}, {"question": "The root \"dict/dic\" primarily originates from which language, according to the ROOT PROFILE?", "options": [{"text": "Greek", "isCorrect": false, "rationale": "The text clearly states the origin is Latin, not Greek."}, {"text": "Old English", "isCorrect": false, "rationale": "The text specifies a Latin origin, not Old English."}, {"text": "Latin", "isCorrect": true, "rationale": "The ROOT PROFILE explicitly states the origin as 'Latin dicere (to say, tell), dictare (to dictate)'."}, {"text": "French", "isCorrect": false, "rationale": "While French has Latin roots, the direct origin of 'dict/dic' is stated as Latin in the profile."}]}, {"question": "Which of the following words does NOT derive its core meaning from the root \"dict/dic\" or its variant, as described in the section?", "options": [{"text": "Predict", "isCorrect": false, "rationale": "'Predict' contains the root 'dict' (to say/tell) and means 'to say beforehand', fitting the root's meaning. It is also an example given in the text."}, {"text": "Contradict", "isCorrect": false, "rationale": "'Contradict' contains the root 'dict' (to say/tell) and means 'to speak against', fitting the root's meaning. It is also an example given in the text."}, {"text": "Difficult", "isCorrect": true, "rationale": "'Difficult' is derived from Latin 'difficilis' (not easy) and does not contain the root 'dict/dic' or convey its meaning of 'to say, tell, or declare'."}, {"text": "Dictate", "isCorrect": false, "rationale": "'Dictate' directly uses the root 'dict' (to say/tell) and means 'to say or read aloud', fitting the root's meaning. It is also an example given in the text."}]}, {"question": "In the word \"predict,\" how does the root \"dict\" contribute to its overall meaning?", "options": [{"text": "It signifies the act of seeing something before it happens.", "isCorrect": false, "rationale": "This describes roots related to sight, such as 'vis' or 'spec', not 'dict'."}, {"text": "It suggests the action of writing down future events.", "isCorrect": false, "rationale": "This refers to roots related to writing, like 'scrib' or 'graph', not 'dict'."}, {"text": "It conveys the idea of stating or telling something in advance.", "isCorrect": true, "rationale": "The prefix 'pre-' means 'before', and the root 'dict' means 'to say, tell, or declare'. Therefore, 'predict' means 'to say or tell before something happens'."}, {"text": "It implies the ability to lead others into the future.", "isCorrect": false, "rationale": "This relates to roots concerning leadership, such as 'duc', not 'dict'."}]}, {"question": "Given that the prefix \"contra\" means \"against\" and the root \"dict\" means \"to say or tell,\" what is the most logical meaning of the word \"contradict\"?", "options": [{"text": "To agree with a statement.", "isCorrect": false, "rationale": "The prefix 'contra' means 'against', so it implies opposition, not agreement."}, {"text": "To follow instructions.", "isCorrect": false, "rationale": "This meaning does not align with 'contra' (against) or 'dict' (to say/tell)."}, {"text": "To speak against or assert the opposite of.", "isCorrect": true, "rationale": "Combining 'contra' (against) with 'dict' (to say/tell) logically leads to the meaning 'to speak against' or 'to assert the opposite of'."}, {"text": "To state something true.", "isCorrect": false, "rationale": "This meaning would involve a root for 'true' and 'dict', but 'contra' implies opposition, not truthfulness itself."}]}, {"question": "Besides \"dict\" and \"dic,\" what specific variant of the root is mentioned in the text as occurring in some English words?", "options": [{"text": "dat", "isCorrect": false, "rationale": "The text does not mention 'dat' as a variant of 'dict/dic'."}, {"text": "dit", "isCorrect": true, "rationale": "The ROOT PROFILE explicitly lists 'dit' as a variant of the root in some English words."}, {"text": "dec", "isCorrect": false, "rationale": "The text does not mention 'dec' as a variant of 'dict/dic'."}, {"text": "doc", "isCorrect": false, "rationale": "The text does not mention 'doc' as a variant of 'dict/dic'."}]}, {"question": "Considering the meaning of the root \"dict/dic\" (to say, to tell, to declare), which core function does it convey in the word \"dictionary\"?", "options": [{"text": "A place for observing things.", "isCorrect": false, "rationale": "This relates to observation, not the 'saying' or 'telling' nature of 'dict'."}, {"text": "A collection of written works.", "isCorrect": false, "rationale": "While dictionaries are written, the 'dict' root emphasizes the 'words' or 'sayings' themselves, not just any written work."}, {"text": "A book containing words and their meanings, essentially 'words spoken/listed'.", "isCorrect": true, "rationale": "A 'dictionary' is a compilation of 'words' or 'sayings' (dict-) with their definitions, allowing them to 'tell' or 'declare' their meanings. The word literally derives from 'diction' (manner of speaking) and 'dictio' (a saying, a word)."}, {"text": "A guide for leading conversations.", "isCorrect": false, "rationale": "This implies leadership or guidance, which is not the core meaning of 'dict'."}]}, {"question": "Based on the root \"dict/dic\" meaning \"to say, tell, or declare,\" which of the following best describes the shared characteristic of words like \"edict\" (a formal proclamation) and \"indict\" (to formally accuse or charge)?", "options": [{"text": "They both relate to seeing or observing.", "isCorrect": false, "rationale": "Neither 'edict' nor 'indict' relate to sight; their core involves communication."}, {"text": "They both involve leading or guiding.", "isCorrect": false, "rationale": "While an edict might guide actions, the core of both words is about making a formal statement, not primarily leading."}, {"text": "They both concern formal or official statements/declarations.", "isCorrect": true, "rationale": "An 'edict' is a 'declaration' (saying), and to 'indict' is to 'formally declare' charges against someone. Both demonstrate the 'to declare' aspect of the 'dict' root in a formal context."}, {"text": "They both describe a physical action.", "isCorrect": false, "rationale": "While speaking is a physical action, the core meaning is about the content and formality of the 'saying', not just any physical action."}]}, {"question": "If a new English word were to be formed combining a prefix \"veri-\" (meaning \"true\") with a root meaning \"to say or declare,\" which root from the text would be most appropriate?", "options": [{"text": "graph", "isCorrect": false, "rationale": "'Graph' means 'to write', not 'to say or declare'."}, {"text": "spec", "isCorrect": false, "rationale": "'Spec' means 'to see' or 'to look', not 'to say or declare'."}, {"text": "dict", "isCorrect": true, "rationale": "The root 'dict' means 'to say, tell, or declare', which perfectly fits the requirement for forming a word meaning 'to say something true' (e.g., 'veridict', though not a common word, illustrates the principle behind 'verdict')."}, {"text": "aud", "isCorrect": false, "rationale": "'Aud' means 'to hear', not 'to say or declare'."}]}, {"question": "How does the relationship between the root \"dict\" and the word \"dictate\" exemplify the information provided in the ROOT PROFILE?", "options": [{"text": "\"Dictate\" is an example of a word where the root \"dict\" has an entirely different meaning than stated.", "isCorrect": false, "rationale": "The meaning of 'dictate' (to say or read aloud for someone else to write) is consistent with the root's meaning 'to say, tell, declare'."}, {"text": "\"Dictate\" directly uses the root \"dict\" to mean \"to say or tell,\" demonstrating its core meaning in action.", "isCorrect": true, "rationale": "The word 'dictate' means 'to say or read aloud for transcription or recording', which directly applies the root's meaning 'to say, tell, declare' as described in the profile."}, {"text": "\"Dictate\" is a variant of the root, not a full word.", "isCorrect": false, "rationale": "'Dictate' is a full word, not a root variant. 'Dit' is mentioned as a variant."}, {"text": "The origin of \"dictate\" is different from the origin of the root \"dict.\"", "isCorrect": false, "rationale": "Both the root 'dict' and the word 'dictate' share the same Latin origin ('dicere', 'dictare')."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
