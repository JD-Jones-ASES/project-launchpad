<script>
var QUESTIONS = [{"question": "What is the primary function of an epigraph, as suggested by its placement and content in a textbook section?", "options": [{"text": "To provide a direct summary of the key findings discussed within the chapter.", "isCorrect": false, "rationale": "While an epigraph can relate to chapter content, its primary role is rarely a direct summary. It's more often thematic or illustrative."}, {"text": "To introduce a thematic idea, set a tone, or offer a relevant insight that foreshadows the chapter's content.", "isCorrect": true, "rationale": "Epigraphs typically serve to frame the reader's understanding, hint at the overarching theme, or provide a poignant thought related to the section's subject matter, rather than summarizing it."}, {"text": "To act as a mandatory preamble that must be read and understood before proceeding to the main text.", "isCorrect": false, "rationale": "Epigraphs are not typically 'mandatory preambles' in the sense of a required instructional step, but rather a thematic introduction."}, {"text": "To present an opposing viewpoint that the chapter will subsequently refute.", "isCorrect": false, "rationale": "While possible, it's not the primary or most common function of an epigraph, which usually aligns with or introduces the chapter's perspective."}]}, {"question": "The Latin proverb 'Omnes viae Romam ducunt' is translated as 'All roads lead to Rome.' What does this literal translation primarily emphasize about Rome in the context of its road-building tradition?", "options": [{"text": "Rome was the only city with well-maintained roads in the ancient world.", "isCorrect": false, "rationale": "The proverb implies centrality and connectivity, not exclusivity of road maintenance to Rome."}, {"text": "All travel in the Roman Empire was strictly regulated and directed towards the capital.", "isCorrect": false, "rationale": "While Rome was central, the proverb doesn't suggest strict regulation of all travel, but rather the extensive network leading there."}, {"text": "Rome served as the central hub of an extensive and interconnected network of transportation routes.", "isCorrect": true, "rationale": "The literal meaning, especially when 'rooted in Roman road-building tradition,' highlights Rome's status as the destination point for a vast and interconnected road system, signifying its political, economic, and cultural centrality."}, {"text": "Roman roads were primarily built for military purposes and led only to defensive fortifications.", "isCorrect": false, "rationale": "While Roman roads had military uses, they also served trade and communication, and the proverb emphasizes Rome as the ultimate destination for many paths, not just military ones."}]}, {"question": "The text states the proverb is 'rooted in Roman road-building tradition.' What can be inferred about the historical accuracy or basis of this proverb?", "options": [{"text": "The proverb is a purely symbolic phrase with no tangible historical connection to Roman infrastructure.", "isCorrect": false, "rationale": "The phrase 'rooted in' explicitly suggests a historical and physical basis, contradicting the idea of it being purely symbolic."}, {"text": "It implies that the Roman Empire invested heavily in creating a comprehensive road network with Rome as its focal point.", "isCorrect": true, "rationale": "Being 'rooted in Roman road-building tradition' strongly infers that the extensive and well-designed Roman road system indeed radiated from or converged upon Rome, making it a central point in their infrastructure."}, {"text": "The proverb originated from a Roman emperor's decree that all new roads must eventually reach Rome.", "isCorrect": false, "rationale": "While plausible, the text only states 'rooted in tradition,' not a specific imperial decree. This is a specific interpretation not supported by the minimal text."}, {"text": "It means the proverb was written on Roman road signs to guide travelers to Rome.", "isCorrect": false, "rationale": "The proverb being 'rooted in tradition' refers to the underlying reality of the road network, not its direct inscription on signs."}]}, {"question": "Beyond its literal historical context, the proverb 'All roads lead to Rome' often carries a metaphorical meaning. Which of the following best represents this broader interpretation?", "options": [{"text": "The most effective way to achieve any goal is by strictly following a single, established method.", "isCorrect": false, "rationale": "The proverb suggests multiple 'roads' or paths, not a single one, can lead to the same destination."}, {"text": "All significant achievements or discoveries throughout history ultimately originated from or were influenced by Roman civilization.", "isCorrect": false, "rationale": "This is an overgeneralization and misinterpretation of the proverb's metaphorical intent, which focuses on paths to a common goal, not a singular origin."}, {"text": "Different approaches, methods, or paths can ultimately lead to the same outcome or desired goal.", "isCorrect": true, "rationale": "Metaphorically, 'Rome' represents a common objective, and 'all roads' signify the variety of ways one can arrive at that objective, implying diversity of approach to a shared conclusion."}, {"text": "It is always necessary to take a circuitous route to reach an important destination.", "isCorrect": false, "rationale": "The proverb does not advocate for circuitous routes specifically, but rather acknowledges that multiple routes exist, some direct, some indirect, all leading to the same place."}]}, {"question": "Why might an educational content specialist choose a 'Medieval proverb, rooted in Roman road-building tradition' as an epigraph for a contemporary textbook chapter?", "options": [{"text": "To limit the chapter's scope exclusively to ancient Roman history and medieval studies.", "isCorrect": false, "rationale": "An epigraph sets a theme, but rarely restricts a modern textbook chapter to only the historical context of the epigraph itself."}, {"text": "To emphasize the enduring relevance of classical education and the Latin language in modern academic discourse.", "isCorrect": false, "rationale": "While it uses Latin and is historical, its primary purpose as an epigraph is thematic, not to solely advocate for classical education."}, {"text": "To suggest that the chapter will explore how diverse perspectives or methods can converge on a central concept or understanding.", "isCorrect": true, "rationale": "This choice would strategically use the proverb's metaphorical meaning (multiple paths to a single goal) to introduce a chapter that might deal with various theories, methodologies, or historical influences leading to a common conclusion or understanding."}, {"text": "To indicate that the chapter will primarily focus on geographical routes and historical maps.", "isCorrect": false, "rationale": "This is too literal an interpretation of the proverb's likely function as an epigraph, which tends to be more thematic than purely factual about geography."}]}, {"question": "The epigraph identifies the proverb as 'Medieval.' What does this classification imply about the proverb's lifespan and impact?", "options": [{"text": "The proverb was invented during the Middle Ages and has no connection to Roman times.", "isCorrect": false, "rationale": "The text explicitly states it's 'rooted in Roman road-building tradition,' contradicting the idea of no connection to Roman times."}, {"text": "It suggests the proverb gained prominence or was formally recorded during the medieval period, despite its ancient roots, indicating its enduring nature.", "isCorrect": true, "rationale": "Classifying it as 'Medieval proverb' while noting its 'Roman' roots indicates that the saying survived, was recognized, and likely spread during the Middle Ages, highlighting its lasting cultural impact across different historical eras."}, {"text": "The proverb's meaning is only relevant to medieval European history and has no modern application.", "isCorrect": false, "rationale": "Proverbs often transcend their original historical context and retain metaphorical relevance, as 'All roads lead to Rome' clearly does."}, {"text": "It means the proverb was used exclusively by medieval monks in their religious texts.", "isCorrect": false, "rationale": "While medieval, the text doesn't specify its usage was exclusive to monks or religious texts, but rather a general 'proverb.'"}]}, {"question": "If a student applies the metaphorical message of 'All roads lead to Rome' to their learning process, what strategy might they adopt?", "options": [{"text": "Exclusively rely on the learning method that has worked for them in the past, disregarding others.", "isCorrect": false, "rationale": "The proverb suggests multiple paths, so relying on only one method goes against its spirit."}, {"text": "Recognize that different study techniques or resources can all effectively contribute to understanding a complex topic.", "isCorrect": true, "rationale": "Applying the proverb means understanding that various 'roads' (study techniques, resources, perspectives) can all ultimately lead to the same 'Rome' (understanding, mastery of a topic)."}, {"text": "Focus solely on memorizing facts, assuming all knowledge eventually connects to core historical events.", "isCorrect": false, "rationale": "While facts are important, the proverb emphasizes diverse paths to a goal, not a specific learning style like rote memorization."}, {"text": "Insist on finding the single, 'correct' textbook or lecturer for every subject to avoid confusion.", "isCorrect": false, "rationale": "This contradicts the idea of multiple valid paths leading to understanding; it seeks a singular, definitive source rather than embracing diversity."}]}, {"question": "The epigraph uses a proverb to introduce the section. What does this choice imply about the nature of the content that might follow in the main chapter?", "options": [{"text": "The chapter will contain only definitive, unchallenged facts and figures.", "isCorrect": false, "rationale": "Proverbs often invite thought and interpretation, suggesting that the content might explore ideas, different perspectives, or complex concepts, not just 'definitive facts.'"}, {"text": "The chapter's themes might be broad, conceptual, or allow for multiple interpretations and approaches.", "isCorrect": true, "rationale": "Using a proverb, especially one with a strong metaphorical meaning like 'All roads lead to Rome,' suggests the chapter might delve into broad concepts, different perspectives, or complex problems that can be approached in various ways, aligning with the proverb's message of diverse paths to a common goal."}, {"text": "The chapter will strictly adhere to a chronological account of historical events related to ancient Rome.", "isCorrect": false, "rationale": "While possible, the proverb itself is a thematic, not chronological, introduction."}, {"text": "The chapter will primarily discuss the etymology and linguistic evolution of Latin phrases.", "isCorrect": false, "rationale": "While the epigraph includes a Latin phrase, its primary function is thematic, not to initiate a linguistic study."}]}, {"question": "Considering the brevity and nature of the epigraph, what analytical skill is most challenged when a reader tries to understand its full significance?", "options": [{"text": "Recall of specific historical dates related to the Roman Empire.", "isCorrect": false, "rationale": "The epigraph does not provide specific dates, so recalling them is not the primary challenge here."}, {"text": "Literal translation of the Latin phrase into English.", "isCorrect": false, "rationale": "The translation is already provided, so this is not a challenge."}, {"text": "The ability to infer meaning, historical context, and thematic implications from minimal textual cues.", "isCorrect": true, "rationale": "With very little text, understanding the epigraph's 'full significance' requires a strong ability to infer its historical roots, its literal and metaphorical meanings, and its likely purpose within the larger work."}, {"text": "Memorization of various medieval proverbs and their origins.", "isCorrect": false, "rationale": "The task is to understand this specific proverb, not to memorize many."}]}, {"question": "Which of the following scenarios best exemplifies the metaphorical application of 'All roads lead to Rome' in a real-world problem-solving context?", "options": [{"text": "A construction project where all materials must be sourced from a single, specific supplier to maintain quality.", "isCorrect": false, "rationale": "This scenario emphasizes a single source, which contradicts the 'multiple roads' aspect of the proverb."}, {"text": "A team developing a new product, where each member explores a different design approach, but all aim for the same core product functionality.", "isCorrect": true, "rationale": "This scenario perfectly illustrates the proverb's metaphorical meaning: different 'roads' (design approaches) can all lead to the same 'Rome' (core product functionality/goal)."}, {"text": "A student who discovers that the only way to pass a course is by attending every lecture and taking detailed notes.", "isCorrect": false, "rationale": "This represents a single, prescriptive path, not multiple approaches to the same goal."}, {"text": "A government mandating that all citizens use a specific transportation route for daily commuting to reduce traffic congestion.", "isCorrect": false, "rationale": "This describes a forced singular route, antithetical to the proverb's implication of diverse paths converging."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
