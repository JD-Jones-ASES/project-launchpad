<script>
var QUESTIONS = [{"question": "What is the primary meaning of the root \"voc/vox\"?", "options": [{"text": "To see", "isCorrect": false, "rationale": "The root 'voc/vox' does not mean 'to see'; roots like 'vid' or 'vis' relate to sight."}, {"text": "To speak; to sing", "isCorrect": false, "rationale": "While related, 'voice; to call' is the direct and comprehensive meaning provided in the text for the root 'voc/vox'."}, {"text": "Voice; to call", "isCorrect": true, "rationale": "The text explicitly states that the meaning of 'voc/vox' is 'voice; to call'."}, {"text": "To write", "isCorrect": false, "rationale": "The root 'voc/vox' does not mean 'to write'; roots like 'script' or 'graph' relate to writing."}]}, {"question": "From which language does the root \"voc/vox\" primarily originate?", "options": [{"text": "Greek", "isCorrect": false, "rationale": "The text specifies Latin as the origin, not Greek."}, {"text": "French", "isCorrect": false, "rationale": "French is mentioned as the source of a variant ('vok'), but Latin is the primary origin of the root itself."}, {"text": "Latin", "isCorrect": true, "rationale": "The text clearly states the origin of 'voc/vox' is 'Latin vocare (to call), vox (voice)'."}, {"text": "German", "isCorrect": false, "rationale": "The text does not mention German as the origin of this root."}]}, {"question": "The variant \"vok\" for the root \"voc/vox\" is primarily a result of adaptation through which language?", "options": [{"text": "Italian", "isCorrect": false, "rationale": "The text specifies French as the language of adaptation for the 'vok' variant."}, {"text": "Spanish", "isCorrect": false, "rationale": "The text specifies French as the language of adaptation for the 'vok' variant."}, {"text": "French", "isCorrect": true, "rationale": "The text explicitly states that 'vok' is a variant 'through French adaptation'."}, {"text": "German", "isCorrect": false, "rationale": "The text does not mention German in relation to the 'vok' variant."}]}, {"question": "Based on the root \"voc/vox,\" which of the following words inherently contains the meaning of \"calling together\"?", "options": [{"text": "Vision", "isCorrect": false, "rationale": "'Vision' is derived from a root meaning 'to see', not 'to call'."}, {"text": "Convoke", "isCorrect": true, "rationale": "The prefix 'con-' means 'together', and 'voke' (a variant of 'voc') means 'to call', thus 'convoke' means 'to call together'."}, {"text": "Auditor", "isCorrect": false, "rationale": "'Auditor' is derived from a root meaning 'to hear', not 'to call'."}, {"text": "Visualize", "isCorrect": false, "rationale": "'Visualize' is derived from a root meaning 'to see', not 'to call'."}]}, {"question": "In the word \"advocate,\" how does the root \"voc\" contribute to its meaning?", "options": [{"text": "It implies speaking on behalf of someone.", "isCorrect": true, "rationale": "The prefix 'ad-' means 'to' or 'toward', and 'voc' means 'voice' or 'to call'. An 'advocate' is someone who 'speaks to' or 'calls for' another, hence speaking on their behalf."}, {"text": "It suggests a journey or path taken.", "isCorrect": false, "rationale": "The root 'voc' does not relate to journeys or paths."}, {"text": "It refers to a written agreement.", "isCorrect": false, "rationale": "The root 'voc' does not relate to written agreements."}, {"text": "It indicates something done quickly.", "isCorrect": false, "rationale": "The root 'voc' does not indicate speed."}]}, {"question": "Which of the following words does NOT derive from the root \"voc/vox\"?", "options": [{"text": "Vocation", "isCorrect": false, "rationale": "'Vocation' is an example given in the text, meaning a 'calling' or purpose."}, {"text": "Evoke", "isCorrect": false, "rationale": "'Evoke' means 'to call forth' (e.g., a memory or emotion), directly using the root 'voc'."}, {"text": "Provoke", "isCorrect": false, "rationale": "'Provoke' means 'to call forth' or 'to stimulate' (e.g., a reaction), directly using the root 'voc'."}, {"text": "Novice", "isCorrect": true, "rationale": "'Novice' comes from the Latin 'novus' meaning 'new', and is unrelated to the root 'voc/vox'."}]}, {"question": "A community leader wants to gather citizens for an important discussion. Which action word, derived from the root \"voc,\" would best describe the leader's intention to call people together?", "options": [{"text": "Revoke", "isCorrect": false, "rationale": "'Revoke' means 'to call back' or 'cancel', which is not the intention of gathering people."}, {"text": "Invoke", "isCorrect": false, "rationale": "'Invoke' means 'to call upon' (e.g., a deity or law), not specifically to call people together for a discussion."}, {"text": "Convoke", "isCorrect": true, "rationale": "'Convoke' (con- 'together' + voc 'to call') precisely means 'to call together' or 'assemble' people for a meeting or discussion."}, {"text": "Provoke", "isCorrect": false, "rationale": "'Provoke' means 'to stimulate' or 'instigate', which does not fit the intention of a community leader gathering citizens for discussion."}]}, {"question": "The word \"vocation\" is listed as an example of the root \"voc.\" How does its meaning (\"a strong feeling of suitability for a particular career or occupation\") relate to \"voice\" or \"to call\"?", "options": [{"text": "It refers to the physical act of using one's voice in a job.", "isCorrect": false, "rationale": "While some jobs require voice use, the connection of 'vocation' to the root is deeper than just physical voice; it's about an internal sense of purpose."}, {"text": "It suggests an inner \"calling\" or impulse towards a particular purpose.", "isCorrect": true, "rationale": "The meaning of 'vocation' uses 'calling' metaphorically, signifying an internal summons or strong inclination towards a particular profession or life's work, aligning with the root's meaning 'to call'."}, {"text": "It denotes a job that requires extensive telephone communication.", "isCorrect": false, "rationale": "This interpretation is too literal and specific, not capturing the core metaphorical connection of 'vocation' to the root."}, {"text": "It implies a career path that is publicly announced or called out.", "isCorrect": false, "rationale": "The 'calling' in 'vocation' is typically an internal and personal one, not necessarily a public proclamation."}]}, {"question": "The section states that \"vok\" is a variant through French adaptation. What does this suggest about the journey of the Latin root into English words?", "options": [{"text": "The root directly entered English from Latin without any phonetic changes.", "isCorrect": false, "rationale": "The mention of 'French adaptation' for the variant 'vok' indicates that the root did not always enter English directly from Latin without changes."}, {"text": "French served as an intermediary language, often altering the root's spelling or pronunciation before it reached English.", "isCorrect": true, "rationale": "Linguistic adaptation 'through' another language (French in this case) typically means that language acted as a conduit, potentially modifying the root's form (spelling, pronunciation) before its adoption into English."}, {"text": "The \"k\" sound was exclusively introduced by French, as it was absent in Latin.", "isCorrect": false, "rationale": "The Latin 'c' often had a hard 'k' sound. The 'vok' variant refers to a spelling or phonetic shift influenced by French, not necessarily the introduction of the 'k' sound itself as entirely new."}, {"text": "This variant indicates that some words with the root \"vok\" have a completely different meaning from \"voc/vox.\"", "isCorrect": false, "rationale": "Variants of a root typically retain the core meaning, with changes primarily in form (spelling or pronunciation), not a complete change in semantic meaning."}]}, {"question": "The root is presented as \"voc / vox.\" What does the presence of two forms (\"voc\" and \"vox\") for the same root primarily indicate?", "options": [{"text": "They are distinct roots with entirely different meanings.", "isCorrect": false, "rationale": "The text explicitly states that 'voc / vox' is a single root with the meaning 'voice; to call', indicating they are not distinct roots with different meanings."}, {"text": "They represent phonetic variations of the same underlying concept.", "isCorrect": true, "rationale": "The most common reason for a root to have multiple forms (like 'voc' and 'vox') with the same meaning is due to phonetic evolution or different grammatical contexts within the source language, representing variations of the same core concept."}, {"text": "One form is always a misspelling of the other.", "isCorrect": false, "rationale": "Both 'voc' and 'vox' are presented as valid and recognized forms of the root, not one being a misspelling."}, {"text": "\"Vox\" is the older form, completely replaced by \"voc\" in modern English.", "isCorrect": false, "rationale": "The provided text does not offer historical details about which form is older or if one has completely replaced the other."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
