        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 15, Section 4</div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary meaning of the Latin root 'luc' or 'lumin' as consistently observed across the word family presented?", "options": [{"text": "To conceal or hide", "isCorrect": false, "rationale": "This is the opposite of the root's meaning, which is associated with making things visible or clear."}, {"text": "Light", "isCorrect": true, "rationale": "The definitions for all words in the family (illuminate, translucent, lucid, luminous, illustrate, elucidate, luster, Lucifer) are directly or metaphorically related to light, brightness, or clarity."}, {"text": "To speak or communicate", "isCorrect": false, "rationale": "While some words like 'elucidate' involve communication, the core root meaning is not about speech itself but about making something clear, like 'light'."}, {"text": "To move swiftly", "isCorrect": false, "rationale": "This root is unrelated to movement; it pertains to visibility and understanding."}]}, {"question": "A research scientist is presenting highly complex data to a non-specialist audience. She aims to ensure every intricate detail of her findings is fully understood. Which word best describes her objective for clarity and complete explanation?", "options": [{"text": "Illuminate", "isCorrect": false, "rationale": "To 'illuminate' means to light up or make easier to understand. While related, 'elucidate' more strongly emphasizes a full and thorough explanation of complex details."}, {"text": "Illustrate", "isCorrect": false, "rationale": "To 'illustrate' means to explain using pictures or examples. While helpful, it doesn't fully capture the goal of making *every intricate detail* deeply understood without necessarily relying solely on visual aids."}, {"text": "Elucidate", "isCorrect": true, "rationale": "'Elucidate' means 'to make something clear; to explain fully.' This precisely matches the scientist's goal of ensuring complete understanding of intricate details for a non-specialist audience."}, {"text": "Luster", "isCorrect": false, "rationale": "'Luster' refers to a shine or glow on a surface, which has no connection to explaining complex data."}]}, {"question": "A homeowner wants to install windows in a bathroom that will allow natural light into the room but prevent clear visibility from the outside for privacy. Which characteristic of materials from the 'luc' word family would be most suitable for this purpose?", "options": [{"text": "Opaque", "isCorrect": false, "rationale": "An opaque material would block all light, which goes against the goal of allowing natural light in."}, {"text": "Transparent", "isCorrect": false, "rationale": "A transparent material would allow clear visibility, defeating the purpose of privacy."}, {"text": "Translucent", "isCorrect": true, "rationale": "'Translucent' means 'allowing light to pass through but not transparent,' which perfectly fits the requirement for privacy while still admitting light."}, {"text": "Luminous", "isCorrect": false, "rationale": "'Luminous' means giving off light, which is not a characteristic of a window material designed to let external light in while ensuring privacy."}]}, {"question": "Consider the words 'illuminate' and 'illustrate'. Although they both use the prefix 'il-' (a form of 'in-'), how does the nuances of their definitions demonstrate the prefix's adaptability?", "options": [{"text": "In both words, 'il-' consistently means 'not' or 'opposite,' creating a negative connotation.", "isCorrect": false, "rationale": "The prefix 'il-' (from 'in-') generally means 'in, into, on, toward' or can intensify, not negate, in these contexts. Their meanings are positive, related to clarity."}, {"text": "The prefix 'il-' always signifies 'light' itself, irrespective of the root.", "isCorrect": false, "rationale": "The 'light' meaning comes from the roots 'lumin' and 'lus'. The prefix 'il-' modifies the action, indicating direction or intensification."}, {"text": "In 'illuminate,' 'il-' means 'into,' focusing on bringing light *into* something, while in 'illustrate,' it implies 'up,' meaning to 'light up' or make clear with examples.", "isCorrect": true, "rationale": "As the text indicates, 'illuminate' is 'to light into' (to light up), and 'illustrate' is 'to light up' (to explain by examples). This shows the prefix 'in-' adapting to 'into' or 'up' depending on the specific root and context, creating nuanced meanings of clarity or explanation."}, {"text": "The prefix 'il-' in both cases specifies that the action is purely physical, not abstract or figurative.", "isCorrect": false, "rationale": "Both words can be used figuratively (e.g., to illuminate an idea, to illustrate a concept), indicating the prefix doesn't restrict them to purely physical actions."}]}, {"question": "Which of the following situations best describes an object or phenomenon that is 'luminous'?", "options": [{"text": "A smooth, polished mirror reflecting sunlight into a room.", "isCorrect": false, "rationale": "A mirror reflects light; it does not produce or give off its own light, which is the characteristic of being luminous."}, {"text": "A dark cave where no external light can penetrate.", "isCorrect": false, "rationale": "A dark cave is the opposite of luminous, as it lacks light entirely."}, {"text": "A firefly emitting a soft glow as it flies through the night.", "isCorrect": true, "rationale": "'Luminous' means 'giving off light; glowing; bright.' A firefly produces its own light through bioluminescence, fitting this definition perfectly."}, {"text": "A thick, heavy curtain blocking all light from entering a window.", "isCorrect": false, "rationale": "A curtain blocking light is opaque, not luminous. It prevents light, rather than producing it."}]}, {"question": "A patient awakens from a coma and, within a short period, is able to engage in coherent conversation, recall recent events, and understand the medical staff's explanations. How would a doctor most accurately describe the patient's cognitive state?", "options": [{"text": "Confused", "isCorrect": false, "rationale": "Confusion implies disorientation and lack of clarity, which is the opposite of the patient's state of coherent conversation and understanding."}, {"text": "Delirious", "isCorrect": false, "rationale": "Delirium involves acute mental confusion and altered consciousness, contrasting with the patient's clear and rational state."}, {"text": "Lucid", "isCorrect": true, "rationale": "'Lucid' means 'bright, clear — easy to understand; clear and rational.' The patient's ability to speak coherently and understand exemplifies a clear and rational mental state."}, {"text": "Comatose", "isCorrect": false, "rationale": "The patient has awakened from a coma; 'comatose' describes the state of being in a coma, not the state after recovery."}]}, {"question": "Which two words from the provided list *primarily* utilize the concept of 'light' in a figurative sense, referring to clarity of understanding or explanation, rather than literal physical illumination?", "options": [{"text": "Luminous and Luster", "isCorrect": false, "rationale": "'Luminous' refers to giving off physical light, and 'luster' refers to a physical shine or glow."}, {"text": "Translucent and Lucifer", "isCorrect": false, "rationale": "'Translucent' refers to physical light passing through a material, and 'Lucifer' literally means 'light-bearer' in reference to a celestial body."}, {"text": "Illustrate and Elucidate", "isCorrect": true, "rationale": "'Illustrate' means 'to explain or make clear by using pictures or examples,' and 'elucidate' means 'to make something clear; to explain fully.' Both are inherently about making concepts clear to the mind, using 'light' metaphorically for understanding."}, {"text": "Illuminate and Lucid", "isCorrect": false, "rationale": "While both can be used figuratively, 'illuminate' can also refer to literally lighting a physical space. 'Lucid' can refer to a bright, clear sky as well as a clear mind. The pairing of 'Illustrate' and 'Elucidate' has a stronger, more exclusive figurative application of 'light' in their primary definitions as explanation-focused verbs."}]}, {"question": "After carefully polishing an old silver trophy, its surface developed a beautiful, soft sheen. What quality does the trophy now exhibit?", "options": [{"text": "Translucence", "isCorrect": false, "rationale": "Translucence refers to a material allowing light to pass through without transparency, which is unrelated to a surface shine."}, {"text": "Luminosity", "isCorrect": false, "rationale": "Luminosity means giving off light; the trophy is reflecting light, not producing its own light."}, {"text": "Luster", "isCorrect": true, "rationale": "'Luster' is defined as 'a gentle shine or glow on a surface; brilliance,' which perfectly describes the appearance of a polished silver trophy."}, {"text": "Opacity", "isCorrect": false, "rationale": "Opacity refers to a material blocking light from passing through, which is unrelated to a surface shine."}]}, {"question": "Based on its etymology as provided in the word family, what does the name 'Lucifer' literally mean?", "options": [{"text": "Prince of the Underworld", "isCorrect": false, "rationale": "This is a common association in religious and mythological contexts, but it is not the literal etymological meaning of the word itself."}, {"text": "Morning Star", "isCorrect": true, "rationale": "The text explicitly states 'Lucifer: luci-fer light-bearer — literally “light-bearer”; the morning star (Venus),' indicating its literal meaning and astronomical reference."}, {"text": "Eternal Flame", "isCorrect": false, "rationale": "This is a descriptive phrase, not the direct literal translation of the name's components."}, {"text": "Bringer of Darkness", "isCorrect": false, "rationale": "This is the antithesis of its literal meaning; 'Lucifer' is literally a 'light-bearer'."}]}, {"question": "The repeated association of the 'luc'/'lumin' root with concepts of clarity, understanding, and explanation (e.g., lucid, elucidate, illustrate) across different words in this family primarily suggests what about the development of language and human cognition?", "options": [{"text": "That the connection between 'light' and 'knowledge' is purely coincidental and has no deeper cognitive basis.", "isCorrect": false, "rationale": "The consistent use across multiple words points to a deliberate and meaningful connection, not a coincidence."}, {"text": "That ancient societies relied exclusively on visual demonstrations for all forms of teaching and learning.", "isCorrect": false, "rationale": "While 'illustrate' involves visual examples, the broader 'luc' words extend to abstract mental clarity and explanation, not just visual learning."}, {"text": "That human thought processes naturally analogize 'light' with intellectual clarity, making something 'clear' to the mind akin to 'lighting it up' for better perception.", "isCorrect": true, "rationale": "The recurring theme demonstrates a profound cognitive metaphor where physical light (illumination, brightness) is consistently used to represent intellectual light (understanding, clarity, explanation). This reflects how humans conceptualize knowledge acquisition."}, {"text": "That words containing the 'luc' or 'lumin' root are always used in a literal sense, never metaphorically.", "isCorrect": false, "rationale": "Many words like 'elucidate' and 'illustrate' use the concept of 'light' metaphorically to mean intellectual clarity, not just physical light."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
