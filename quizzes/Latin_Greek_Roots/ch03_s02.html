        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary meaning of the Latin root 'aud' or 'audit'?", "options": [{"text": "To see, to watch", "isCorrect": false, "rationale": "The roots related to seeing are typically 'vid' or 'spec', not 'aud'."}, {"text": "To hear, to listen", "isCorrect": true, "rationale": "The text explicitly states the meaning of 'aud / audit' as 'to hear, to listen'."}, {"text": "To speak, to tell", "isCorrect": false, "rationale": "Roots related to speaking or telling are usually 'loq' or 'dict'."}, {"text": "To touch, to feel", "isCorrect": false, "rationale": "Roots related to touch or feeling are typically 'tact' or 'sens'."}]}, {"question": "From which language does the root 'audire,' the origin of 'aud' and 'audit,' primarily derive?", "options": [{"text": "Greek", "isCorrect": false, "rationale": "While many English roots come from Greek, the text specifically identifies 'audire' as Latin."}, {"text": "Old English", "isCorrect": false, "rationale": "Old English is a Germanic language, and many modern English words have Germanic roots, but 'audire' is not one of them."}, {"text": "Latin", "isCorrect": true, "rationale": "The section explicitly states that the origin of the root is 'Latin audire (to hear)'."}, {"text": "French", "isCorrect": false, "rationale": "Many English words are borrowed from French, but the original root 'audire' is Latin, from which French also developed."}]}, {"question": "Based on the root 'aud,' which of the following words most directly describes the quality of being perceived by the ear?", "options": [{"text": "Audience", "isCorrect": false, "rationale": "An 'audience' is a group of people who listen or watch, referring to the listeners, not the quality of the sound itself."}, {"text": "Audible", "isCorrect": true, "rationale": "'Audible' means capable of being heard, directly reflecting the 'to hear' meaning as a quality."}, {"text": "Auditorium", "isCorrect": false, "rationale": "An 'auditorium' is a place where people gather to hear performances, referring to the venue, not the characteristic of sound."}, {"text": "Audit", "isCorrect": false, "rationale": "An 'audit' is a formal examination, which metaphorically involves 'listening' to data, but doesn't describe the quality of being heard."}]}, {"question": "If a new scientific instrument were named an 'Audioscope,' what would be its most probable primary function, based on the root 'aud'?", "options": [{"text": "To visually record images", "isCorrect": false, "rationale": "The root 'aud' relates to hearing, not seeing. 'Scope' implies observation, but 'audio' directs it to sound."}, {"text": "To measure or visualize sound waves", "isCorrect": true, "rationale": "Combining 'audio' (related to hearing/sound) with 'scope' (an instrument for observing or viewing) suggests a device for examining sound."}, {"text": "To create written reports", "isCorrect": false, "rationale": "The root 'aud' has no direct connection to writing or reporting."}, {"text": "To amplify physical vibrations", "isCorrect": false, "rationale": "While sound involves vibrations, the 'scope' part of the name points to observation/measurement rather than just amplification of physical force."}]}, {"question": "Which of the following words does NOT share the 'to hear' or 'to listen' meaning derived from the 'aud/audit' root?", "options": [{"text": "Audition", "isCorrect": false, "rationale": "An 'audition' is a try-out where a performer is 'heard' by judges or an audience, directly linked to the root's meaning."}, {"text": "Audiology", "isCorrect": false, "rationale": "'Audiology' is the study of hearing, directly incorporating the 'aud' root."}, {"text": "Audacious", "isCorrect": true, "rationale": "'Audacious' means bold or daring, deriving from the Latin 'audax' (bold), which is not related to 'audire' (to hear). Its similarity is purely coincidental in spelling."}, {"text": "Audio", "isCorrect": false, "rationale": "'Audio' refers to sound, especially recorded or transmitted sound, directly from the 'aud' root."}]}, {"question": "The text mentions 'audi' as a variant in compound forms. In which of these hypothetical terms would the 'audi' variant most likely be found?", "options": [{"text": "Audiobook (a book read aloud)", "isCorrect": true, "rationale": "'Audiobook' is a common compound word where 'audio' clearly refers to sound or hearing, fitting the description of 'audi' as a variant in compound forms."}, {"text": "Audimeter (a device to measure distance)", "isCorrect": false, "rationale": "A device to measure distance would likely use a root like 'metr' or 'dist' combined with 'geo' or similar, not 'audi'."}, {"text": "Audicard (a card game)", "isCorrect": false, "rationale": "There's no clear semantic connection between 'audi' and a card game."}, {"text": "Auditrail (a path for hikers)", "isCorrect": false, "rationale": "'Trail' implies a path, and 'audit' in this context doesn't relate to a physical route or hearing."}]}, {"question": "An 'auditorium' is a place designed for what primary purpose, specifically reflecting the 'aud' root?", "options": [{"text": "Exhibiting visual art", "isCorrect": false, "rationale": "While auditoriums may sometimes display visual elements, their primary design purpose, indicated by the 'aud' root, is not for visual art exhibition."}, {"text": "Public speaking, performances, and listening", "isCorrect": true, "rationale": "An 'auditorium' is fundamentally a space where an 'audience' (those who hear) gathers to 'hear' (aud) a performance, speech, or presentation."}, {"text": "Athletic competitions", "isCorrect": false, "rationale": "Spaces for athletic competitions are typically called arenas or stadiums, not auditoriums, as their focus is on physical activity, not listening."}, {"text": "Scientific research", "isCorrect": false, "rationale": "Laboratories or research centers are designed for scientific research, not auditoriums."}]}, {"question": "When a speaker's voice is described as 'audible,' what essential characteristic is being communicated about their voice?", "options": [{"text": "It is exceptionally loud and clear.", "isCorrect": false, "rationale": "While an audible voice can be loud and clear, 'audible' itself only means it can be heard, not necessarily that it possesses exceptional volume or clarity."}, {"text": "It can be heard or perceived by the ear.", "isCorrect": true, "rationale": "The definition of 'audible' is 'capable of being heard,' directly connecting to the root's meaning of 'to hear'."}, {"text": "It has a pleasant tone.", "isCorrect": false, "rationale": "The quality of pleasantness or tone is subjective and not inherent in the word 'audible'."}, {"text": "It is being recorded for later playback.", "isCorrect": false, "rationale": "Being recorded is a process, not an inherent characteristic of a sound being perceivable."}]}, {"question": "The word 'audit' is listed as an example. In the context of a financial audit, how does the root's meaning of 'to hear' or 'to listen' metaphorically apply?", "options": [{"text": "Auditors literally listen to financial data speak to them.", "isCorrect": false, "rationale": "This is a literal interpretation of 'listening' and not how the word 'audit' functions in a professional context."}, {"text": "It refers to the formal examination or 'listening' to accounts and records to verify their accuracy.", "isCorrect": true, "rationale": "Historically, an auditor would 'hear' accounts read aloud. In modern usage, it implies a thorough 'examination' or 'listening' to the information presented in records to verify its truthfulness."}, {"text": "It signifies that auditors must have exceptional hearing to detect discrepancies.", "isCorrect": false, "rationale": "The physical ability of the auditor is not the origin or meaning of the term 'audit'."}, {"text": "The process requires a quiet environment where one can 'hear' their own thoughts clearly.", "isCorrect": false, "rationale": "While a quiet environment may be helpful, this describes a condition for work, not the metaphorical meaning of the word 'audit' itself."}]}, {"question": "Considering the impact of the 'aud' root on English vocabulary, which statement best summarizes its contribution to terms related to sensory perception?", "options": [{"text": "It primarily contributes to words describing visual and spatial experiences.", "isCorrect": false, "rationale": "The 'aud' root is exclusively related to sound and hearing, not visual or spatial experiences."}, {"text": "It has exclusively generated terms for musical instruments.", "isCorrect": false, "rationale": "While some musical terms might contain 'aud' (e.g., 'auditory perception' in music), its scope is much broader than just instruments."}, {"text": "It forms the foundation for a wide range of words pertaining to sound, hearing, and the act of listening.", "isCorrect": true, "rationale": "The root 'aud' is fundamental to countless words in English that describe anything related to sound, the sense of hearing, and the act of actively listening, as seen in examples like 'audience,' 'audible,' 'auditorium,' and 'audit'."}, {"text": "It only influences words related to legal judgments and financial review.", "isCorrect": false, "rationale": "This is too narrow; 'audit' is one specific application, but the root's influence extends broadly to all aspects of hearing and sound."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
