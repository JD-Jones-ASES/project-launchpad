        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 9, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what was the most significant reason for the Roman Empire's extensive road system?", "options": [{"text": "To showcase the empire's advanced engineering capabilities.", "isCorrect": false, "rationale": "While the roads were an engineering feat, the text emphasizes their practical necessity for governance, not primarily for display."}, {"text": "To facilitate the efficient movement of people and products across vast territories.", "isCorrect": true, "rationale": "The text explicitly states that 'Without the ability to move people and products efficiently, Rome could never have governed so vast a territory,' making this the most significant reason."}, {"text": "To provide scenic routes for Roman citizens to travel and explore.", "isCorrect": false, "rationale": "The text does not mention recreational travel as a primary purpose; the focus is on military, commercial, and administrative movement."}, {"text": "To establish clear boundaries between Roman provinces and neighboring lands.", "isCorrect": false, "rationale": "Roads connected, rather than primarily delineated, territories. Their role was internal logistical support for governance."}]}, {"question": "The Latin verb 'portare' served as the foundation for a significant portion of Roman vocabulary related to movement. What was its core meaning?", "options": [{"text": "To build", "isCorrect": false, "rationale": "While Romans built roads, 'portare' specifically relates to the act of movement or carrying, not construction."}, {"text": "To conquer", "isCorrect": false, "rationale": "Conquest was a part of Roman expansion, but 'portare' means 'to carry,' not 'to conquer.'"}, {"text": "To carry", "isCorrect": true, "rationale": "The text clearly states, 'The Latin verb portare meant simply “to carry,”' and this meaning is preserved in its derivatives."}, {"text": "To trade", "isCorrect": false, "rationale": "Trade involved carrying goods, but 'portare' is the action of carrying itself, not the broader economic activity."}]}, {"question": "If a Roman province sent its unique agricultural produce to the capital city for consumption, how would these goods have been described using a Latin term derived from 'portare'?", "options": [{"text": "Exportata", "isCorrect": false, "rationale": "'Exportata' meant 'carried out' or 'sent out,' which would describe goods leaving the capital, not arriving."}, {"text": "Deportata", "isCorrect": false, "rationale": "'Deportata' referred to being 'carried away' in disgrace, typically applied to people, not goods in trade."}, {"text": "Importata", "isCorrect": true, "rationale": "'Importata' meant 'carried in' or 'brought into the city,' accurately describing goods arriving from a province."}, {"text": "Transportata", "isCorrect": false, "rationale": "While 'transportata' implies general carrying, 'importata' is the specific term for goods brought *into* a place for trade, as described in the text."}]}, {"question": "The text provides several English words (portable, portfolio, report) that stem from 'port'. What common characteristic or action do nearly all these words share, reflecting the original Latin meaning?", "options": [{"text": "They involve a written document or record.", "isCorrect": false, "rationale": "While 'portfolio' and 'report' involve documents, 'portable' does not, and the commonality is more fundamental."}, {"text": "They relate to official communication or government functions.", "isCorrect": false, "rationale": "This applies to 'report' and 'deport,' but not universally to 'portable' or 'portfolio' in its original sense."}, {"text": "They convey the idea of carrying or moving something from one place to another.", "isCorrect": true, "rationale": "The text explicitly states that 'nearly all of them preserve that original sense of carrying or moving,' providing examples like 'portable' (carry with you) and 'report' (carry back information)."}, {"text": "They are associated with advanced technology or innovation.", "isCorrect": false, "rationale": "Words like 'portfolio' are ancient in origin and not inherently linked to technology; the commonality is the 'carrying' action."}]}, {"question": "The word 'airport' is mentioned as containing the root 'port'. Analyzing its function, which definition best aligns with the original Roman understanding of 'portus'?", "options": [{"text": "A place for launching aerial vehicles.", "isCorrect": false, "rationale": "While true, this describes a modern function. The question asks for alignment with the *original Roman understanding* of 'portus'."}, {"text": "A hub for military defense and strategic operations.", "isCorrect": false, "rationale": "Some airports have military uses, but this isn't their primary function or what 'portus' conveyed."}, {"text": "A location where goods and people are carried to and from via a specific mode of transportation.", "isCorrect": true, "rationale": "The text defines 'portus' as 'places where things were carried to and from,' which perfectly describes an airport's role for air travel, mirroring the historical concept for sea travel."}, {"text": "A facility for refueling and maintenance of travel vehicles.", "isCorrect": false, "rationale": "Refueling and maintenance occur at airports, but the core 'port' meaning relates to the movement of goods and people."}]}, {"question": "A Roman soldier who 'misbehaved' could be 'deported' from his post 'in disgrace.' This specific usage highlights which aspect of the 'portare' root?", "options": [{"text": "The general movement of military personnel between camps.", "isCorrect": false, "rationale": "While it involves movement, 'deported' in this context specifically implies an involuntary, punitive 'carrying away' due to misconduct, not routine transfer."}, {"text": "The ability to transport goods efficiently across long distances.", "isCorrect": false, "rationale": "This relates to goods, not the punishment of a soldier, and misses the 'away in disgrace' aspect."}, {"text": "The forced carrying away of an individual due to negative circumstances.", "isCorrect": true, "rationale": "The text defines 'deported' as 'carried away' from his post 'in disgrace,' indicating a forceful, negative removal."}, {"text": "The process of importing foreign goods for the army.", "isCorrect": false, "rationale": "This relates to 'import' and goods, not the 'deportation' of a misbehaving soldier."}]}, {"question": "The word 'report' is said to mean 'to carry back information.' How does this modern usage still connect to the Roman understanding of 'portare'?", "options": [{"text": "It implies the physical delivery of documents by hand.", "isCorrect": false, "rationale": "While sometimes true, 'report' can also be verbal or electronic. The core is the transfer of information, not solely physical delivery."}, {"text": "It describes the act of physically transporting news articles or broadcasts.", "isCorrect": false, "rationale": "This focuses too narrowly on the medium; the essence is the 'carrying' of the *information* itself."}, {"text": "It conceptualizes information as something that can be moved or delivered from one source to another.", "isCorrect": true, "rationale": "The root 'port' signifies carrying. 'To report' means to 'carry back' information, treating information as a transferable entity, consistent with the original meaning of moving 'things'."}, {"text": "It suggests the official compilation of data by government authorities.", "isCorrect": false, "rationale": "While reports can be official, the underlying connection to 'portare' is about the 'carrying' or transmission of information, not the authority."}]}, {"question": "The text states that a 'portfolio' was originally 'a case for carrying loose papers'. This etymology best illustrates which common feature shared by words derived from 'port'?", "options": [{"text": "The use of specific materials for storage.", "isCorrect": false, "rationale": "While a portfolio is a case, the root 'port' emphasizes the *function* of carrying, not the material composition."}, {"text": "The necessity of preserving historical documents.", "isCorrect": false, "rationale": "A portfolio might hold important documents, but its original definition focuses on the act of carrying, not the historical significance."}, {"text": "The act of moving or containing items for transport.", "isCorrect": true, "rationale": "A portfolio's original purpose was literally 'to carry' (portare) sheets (folium), directly reflecting the 'carrying' aspect of the root."}, {"text": "The organization and presentation of collected works.", "isCorrect": false, "rationale": "This is a modern application of a portfolio; the original meaning was simply a device for 'carrying' papers."}]}, {"question": "Based on the text's description, what was the primary logistical challenge the Roman Empire overcame through its extensive road network and vocabulary built around 'portare'?", "options": [{"text": "Preventing cultural assimilation in newly conquered regions.", "isCorrect": false, "rationale": "The text focuses on governance and efficiency of movement, not cultural assimilation as a primary challenge addressed by roads."}, {"text": "Maintaining political stability across geographically diverse regions.", "isCorrect": true, "rationale": "The text states, 'Without the ability to move people and products efficiently, Rome could never have governed so vast a territory,' directly linking efficient movement to the maintenance of political control over diverse regions."}, {"text": "Developing new technologies for rapid communication.", "isCorrect": false, "rationale": "The focus is on physical movement along roads, not the development of new communication technologies beyond what roads enabled."}, {"text": "Establishing a unified system of currency and trade laws.", "isCorrect": false, "rationale": "While important, currency and trade laws are distinct from the logistical challenge of physical movement and governance that the roads addressed."}]}, {"question": "The final paragraph encourages readers to remember the 'original sense of carrying or moving' when using 'port' words. What broader understanding does this foster about language and history?", "options": [{"text": "That modern English vocabulary is largely stagnant and unchanging.", "isCorrect": false, "rationale": "The point is about enduring roots, not stagnation. Language evolves, but roots can persist."}, {"text": "That understanding etymology can reveal deep connections between ancient civilizations and contemporary life.", "isCorrect": true, "rationale": "By linking modern words to Roman concepts ('carry with you' understood by Roman merchants/soldiers), the text highlights how ancient linguistic roots continue to shape and inform our present-day language and understanding, thus connecting history and current usage."}, {"text": "That Latin is the only ancient language that significantly influenced English.", "isCorrect": false, "rationale": "While Latin is influential, the text does not claim it's the *only* one, nor is that the main point of the concluding statement."}, {"text": "That words are most meaningful when they refer to physical objects rather than abstract concepts.", "isCorrect": false, "rationale": "The text shows 'port' applying to both physical carrying (portable, portfolio) and abstract information (report), undermining this claim."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
