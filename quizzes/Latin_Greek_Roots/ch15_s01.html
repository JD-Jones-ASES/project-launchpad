<script>
var QUESTIONS = [{"question": "What is the core message conveyed by the translated epigraph?", "options": [{"text": "Gold is the most valuable resource, sought by all.", "isCorrect": false, "rationale": "This option is too literal and narrow. While gold is valuable, the epigraph's message extends beyond the literal metal to a broader theme of replacement and continuity."}, {"text": "When one valuable entity is lost or removed, another of similar quality or essence can emerge to take its place.", "isCorrect": true, "rationale": "This option accurately captures the essence of 'Primo avulso non deficit alter aureus, et simili frondescit virga metallo,' which speaks to succession, renewal, and the emergence of something comparably valuable after a loss."}, {"text": "Ancient trees possessed magical properties, allowing them to grow metallic branches.", "isCorrect": false, "rationale": "This misinterprets the 'golden branch' as a literal botanical phenomenon rather than a symbolic metaphor, which is typical for epic poetry."}, {"text": "The Aeneid is primarily a text about the extraction and use of precious metals.", "isCorrect": false, "rationale": "While the quote mentions 'golden' and 'ore,' the Aeneid is an epic poem, and an epigraph's purpose is thematic, not to describe the contents of the entire work literally."}]}, {"question": "In the context of the epigraph, the Latin phrase 'Primo avulso non deficit alter aureus' most directly implies what?", "options": [{"text": "The initial discovery of gold ensures an endless supply.", "isCorrect": false, "rationale": "The phrase 'Primo avulso' (when the first is torn away) indicates a loss, not an endless supply of the original. 'Non deficit' refers to the second."}, {"text": "After the first golden thing is forcefully removed, a second golden thing unfailingly appears.", "isCorrect": true, "rationale": "This is a precise translation and interpretation. 'Primo avulso' means 'when the first is torn away/removed,' and 'non deficit alter aureus' means 'a second golden one does not fail (to appear).'"}, {"text": "There is a significant and unavoidable shortage of primary gold.", "isCorrect": false, "rationale": "The phrase 'non deficit' means 'does not fail' or 'is not lacking,' directly contradicting the idea of a deficit."}, {"text": "One must first find a golden object before any other can be found.", "isCorrect": false, "rationale": "The focus is on what happens *after* the first is removed, implying succession or replacement, not a prerequisite for finding other items."}]}, {"question": "If this epigraph were introducing a chapter, which thematic focus would it most strongly suggest for the chapter's content?", "options": [{"text": "The historical evolution of currency and economic systems.", "isCorrect": false, "rationale": "This option focuses too literally on 'gold' and 'ore' rather than the symbolic message of renewal and succession."}, {"text": "Strategies for discovering and extracting valuable natural resources.", "isCorrect": false, "rationale": "Again, this interprets the language too literally, missing the metaphorical intent of an epigraph."}, {"text": "The resilience of systems, leadership, or ideals in the face of loss, and the potential for successful regeneration.", "isCorrect": true, "rationale": "The core message of 'when the first is torn away, a second golden branch grows forth, and its stem sprouts with the same ore' directly relates to themes of succession, resilience, and renewal after adversity or loss."}, {"text": "A detailed mythological account of a specific plant with golden properties.", "isCorrect": false, "rationale": "While the quote is from a myth, its function as an epigraph is to convey a broader theme, not to provide literal mythological details."}]}, {"question": "What does the phrase 'simili frondescit virga metallo' ('its stem sprouts with the same ore') imply about the replacement?", "options": [{"text": "The new branch is a superficial copy, lacking the true essence of the original.", "isCorrect": false, "rationale": "The phrase 'same ore' implies a fundamental similarity in quality or essence, not a superficial imitation."}, {"text": "The original branch was flawed, and the new one represents an improvement.", "isCorrect": false, "rationale": "The text only states the first was 'torn away,' not that it was flawed or that the second is superior, only that it is of 'the same ore' or quality."}, {"text": "The replacement possesses comparable intrinsic value, quality, or characteristics to the original.", "isCorrect": true, "rationale": "The emphasis on 'same ore' highlights continuity in value, essence, or fundamental nature, suggesting the replacement is as potent or significant as what was lost."}, {"text": "The growth process for the replacement is identical to that of the first branch.", "isCorrect": false, "rationale": "The phrase describes the *nature* of the new branch ('same ore'), not the mechanics of its growth process in comparison to the first."}]}, {"question": "Consider a situation where a long-standing tradition or institution faces an inevitable end. How does the epigraph's message apply to this scenario?", "options": [{"text": "The end of the tradition signifies an irreplaceable loss, leading to a permanent decline.", "isCorrect": false, "rationale": "This contradicts the epigraph's central message that a replacement, comparable in value, can emerge after something is 'torn away.'"}, {"text": "New traditions or institutions of similar value and essence can arise from the original's legacy, ensuring continuity.", "isCorrect": true, "rationale": "This option applies the epigraph's theme of succession and renewal directly. The 'second golden branch' and 'same ore' symbolize the emergence of new forms that uphold the value or spirit of the old, even after an end."}, {"text": "Any replacement will inherently be weaker or less significant than the original.", "isCorrect": false, "rationale": "The 'same ore' part of the epigraph explicitly suggests that the replacement holds comparable value and quality, not diminished significance."}, {"text": "Efforts should primarily focus on preventing the loss of the original, rather than preparing for succession.", "isCorrect": false, "rationale": "The phrase 'Primo avulso' ('when the first is torn away') implies the loss is a given, shifting focus to what happens next, not solely prevention."}]}, {"question": "What is the implied emotional tone or outlook conveyed by this epigraph regarding loss?", "options": [{"text": "One of despair and fatalism, as loss is inevitable and permanent.", "isCorrect": false, "rationale": "The phrase 'non deficit alter aureus' (a second golden one does not fail to appear) strongly suggests hope and continuity, rather than despair or permanence of loss."}, {"text": "A stoic acceptance of loss, without expectation of replacement.", "isCorrect": false, "rationale": "While it accepts loss, it explicitly states a replacement 'does not fail to appear,' which goes beyond mere stoic acceptance to an expectation of renewal."}, {"text": "An optimistic outlook, suggesting that loss can lead to renewal and continued value.", "isCorrect": true, "rationale": "The epigraph offers a hopeful perspective that even after something valuable is 'torn away,' a new, equally valuable successor 'grows forth,' implying renewal and continued prosperity."}, {"text": "A cautionary warning about the fragility of all valuable things.", "isCorrect": false, "rationale": "While the 'torn away' part acknowledges fragility, the overarching message is one of overcoming that fragility through renewal, not just warning against it."}]}, {"question": "Based on the attribution, what is the Aeneid?", "options": [{"text": "An ancient Roman philosophical treatise on ethics.", "isCorrect": false, "rationale": "Virgil was a poet, and the Aeneid is an epic poem, not a philosophical treatise."}, {"text": "A historical chronicle detailing the reigns of Roman emperors.", "isCorrect": false, "rationale": "The Aeneid is a foundational mythic epic, not a historical chronicle of emperors."}, {"text": "A work of natural history documenting unique botanical species.", "isCorrect": false, "rationale": "The 'golden branch' is symbolic within an epic poem, not a literal description from a natural history text."}, {"text": "An epic Latin poem by the Roman poet Virgil.", "isCorrect": true, "rationale": "The attribution '— Virgil, Aeneid, VI.143–144' correctly identifies Virgil as the author and the Aeneid as an epic poem, known to be a foundational work of Latin literature."}]}, {"question": "What does the use of an epigraph like this suggest about the style or approach of the textbook it introduces?", "options": [{"text": "The textbook will be primarily focused on the study of classical Latin literature.", "isCorrect": false, "rationale": "While it uses a classical quote, an epigraph primarily sets a theme, not necessarily the subject matter of the entire textbook. It might just be one chapter with that theme."}, {"text": "The textbook aims for a purely factual and objective presentation of information, devoid of metaphor.", "isCorrect": false, "rationale": "The use of a poetic, metaphorical quote directly contradicts the idea of a purely factual and objective presentation devoid of metaphor. It hints at deeper thematic layers."}, {"text": "The textbook might explore its subjects through thematic lenses, inviting deeper reflection and analysis.", "isCorrect": true, "rationale": "Epigraphs are typically used to introduce thematic ideas, set a mood, or provide a philosophical underpinning for the chapter's content, suggesting an approach that goes beyond mere factual recall."}, {"text": "The textbook will require extensive prior knowledge of Virgil's Aeneid to understand its content.", "isCorrect": false, "rationale": "An epigraph usually serves to introduce a theme accessible to a general audience, not to require deep prior knowledge of its source material."}]}, {"question": "The phrase 'Primo avulso' ('When the first is torn away') emphasizes what characteristic of the initial loss or removal?", "options": [{"text": "It was a voluntary and peaceful departure.", "isCorrect": false, "rationale": "'Torn away' implies a forceful, violent, or abrupt separation, not a peaceful or voluntary departure."}, {"text": "It was a gradual, natural process of decay.", "isCorrect": false, "rationale": "'Torn away' suggests a more sudden or impactful removal rather than a slow, natural decay."}, {"text": "It involved a forceful, perhaps painful, or significant separation.", "isCorrect": true, "rationale": "The Latin 'avulso' (torn away/plucked off) strongly conveys an act of forceful or violent removal, highlighting the impact or struggle associated with the loss."}, {"text": "It led to an immediate and complete void without any possibility of replacement.", "isCorrect": false, "rationale": "While it describes the initial loss, the rest of the quote ('non deficit alter aureus') explicitly states a replacement *does* appear, contradicting the idea of a complete void."}]}, {"question": "Beyond simple replacement, what deeper concept might the epigraph suggest about the nature of value or leadership?", "options": [{"text": "Value is inherently scarce and diminishes with each succession.", "isCorrect": false, "rationale": "The 'same ore' implies that the value is maintained or regenerated, not diminished."}, {"text": "True value or effective leadership is an inherent quality that can manifest in new forms or individuals.", "isCorrect": true, "rationale": "The 'second golden branch' with the 'same ore' suggests that essential qualities, whether of value or leadership, are not limited to a single entity but can regenerate or be passed on in new iterations, maintaining their fundamental essence."}, {"text": "Only the original source of value holds genuine importance.", "isCorrect": false, "rationale": "The quote directly challenges this by emphasizing the emergence and comparable value of the replacement."}, {"text": "Leadership is primarily about physical strength to overcome adversity.", "isCorrect": false, "rationale": "While 'torn away' implies adversity, the quote is more broadly about the succession and nature of value/leadership, not solely physical strength."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
