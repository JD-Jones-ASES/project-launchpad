    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to the text, what was the primary significance of the goddess Fides and the act of swearing oaths by her sacred right hand in Roman civilization?", "options": [{"text": "To symbolize military might and conquest.", "isCorrect": false, "rationale": "Fides (Faith/Trust) was not associated with military might or conquest, but rather with societal values of trust."}, {"text": "To underscore the fundamental value of trust and reliability in their society.", "isCorrect": true, "rationale": "The text explicitly states that 'Roman civilization ran on trust,' and Fides, along with oath-swearing, captured this essential Roman value."}, {"text": "To represent the Roman commitment to artistic expression.", "isCorrect": false, "rationale": "The text does not link Fides or oath-swearing to artistic expression."}, {"text": "To denote the importance of agricultural productivity.", "isCorrect": false, "rationale": "While important to Roman society, agricultural productivity is not connected to Fides or the act of swearing oaths in the provided text."}]}, {"question": "The text describes a 'spectrum' from credible to incredible to credulous. Which statement best captures the progression of this spectrum as explained in the passage?", "options": [{"text": "From being easily convinced, to being skeptical, then to being utterly disbelieving.", "isCorrect": false, "rationale": "This order is incorrect. 'Credulous' is easily convinced, 'incredible' (originally) is not believable, and 'credible' is worthy of belief."}, {"text": "From deserving trust, to being beyond trust, to giving trust too easily.", "isCorrect": true, "rationale": "This statement directly reflects the text's explanation: 'from deserving trust, to being beyond trust, to giving trust too easily' for credible, incredible (original meaning), and credulous, respectively."}, {"text": "From having belief, to losing belief, then to regaining belief.", "isCorrect": false, "rationale": "This does not accurately represent the meanings of credible, incredible, and credulous as a spectrum of belief/trustworthiness."}, {"text": "From being trustworthy, to being amazing, then to being gullible.", "isCorrect": false, "rationale": "'Amazing' is a modern, loose meaning of incredible, not its original position in the spectrum of trust described."}]}, {"question": "A friend tells you they've invested their life savings in a 'guaranteed' get-rich-quick scheme they saw advertised online, without checking any reviews or financial reports. Based on the text, which term best describes your friend's approach?", "options": [{"text": "Credible", "isCorrect": false, "rationale": "Credible means 'worthy of belief,' which the scheme itself likely isn't, nor is the friend acting in a way that is trustworthy."}, {"text": "Incredible", "isCorrect": false, "rationale": "Incredible (originally 'not believable') might describe the scheme itself, but it doesn't describe the friend's 'approach' to believing."}, {"text": "Credulous", "isCorrect": true, "rationale": "The text defines 'credulous' as 'too willing to believe, accepting claims without enough evidence,' which perfectly describes the friend's action."}, {"text": "Discredited", "isCorrect": false, "rationale": "Discredited means 'to destroy the trust others have in them,' which is not relevant to the friend's own willingness to believe something."}]}, {"question": "The etymnote explains that both academic 'credit' for an assignment and financial 'credit' from a store trace back to the same Latin root. What is the fundamental shared concept that connects these two meanings?", "options": [{"text": "The exchange of goods or services for money.", "isCorrect": false, "rationale": "This only applies to financial credit, not academic credit, and misses the underlying root meaning."}, {"text": "The act of validating or acknowledging completed work.", "isCorrect": false, "rationale": "While applicable to academic credit, it doesn't fully capture the 'trust' aspect of financial credit or the core meaning of 'credere'."}, {"text": "The underlying belief or trust that a person has fulfilled an obligation or will fulfill one.", "isCorrect": true, "rationale": "The text states 'I believe you did this work' for academic credit and 'I trust you to pay later' for financial credit, both stemming from the core meaning of 'credere' (to believe/trust)."}, {"text": "A system of reward and punishment for behavior.", "isCorrect": false, "rationale": "This is too broad and does not specifically address the common root meaning of belief or trust for 'credit'."}]}, {"question": "The word 'creed' is mentioned as entering religion from Latin credo ('I believe'). Based on this, what is the primary function of a creed?", "options": [{"text": "To establish laws and legal precedents.", "isCorrect": false, "rationale": "Laws and legal precedents relate more to 'jus/jur' roots, not 'creed,' which is about belief."}, {"text": "To provide a historical account of religious events.", "isCorrect": false, "rationale": "While a creed might reference historical events, its primary function is not simply historical narration, but a statement of current belief."}, {"text": "To articulate a formal statement of shared beliefs or principles.", "isCorrect": true, "rationale": "The text notes 'credo' means 'I believe' and refers to 'ancient statements of faith,' indicating its function as a formal declaration of beliefs."}, {"text": "To offer a personal prayer or meditation.", "isCorrect": false, "rationale": "A creed is a formal declaration of belief, not necessarily a personal prayer, though it might be recited as part of worship."}]}, {"question": "The text states that to 'discredit someone' was a 'social punishment the Romans would have understood perfectly.' Based on the passage, what specific consequence would a Roman likely face if they were discredited?", "options": [{"text": "They would be exiled from the Roman Empire.", "isCorrect": false, "rationale": "While losing trust was severe, the text specifies losing 'fides' and one's 'place in society,' not necessarily outright exile."}, {"text": "They would lose their fides, thereby losing their place in society and social standing.", "isCorrect": true, "rationale": "The text explicitly states: 'losing one's fides meant losing one's place in society,' which is the direct consequence of being discredited."}, {"text": "They would be forced to work as a slave.", "isCorrect": false, "rationale": "This is an extreme consequence not mentioned in the context of being discredited by the text."}, {"text": "They would be required to pay a large fine to the state.", "isCorrect": false, "rationale": "The text does not mention fines as the primary consequence of being discredited in Roman society."}]}, {"question": "How does the action of 'accrediting' a school differ from possessing a 'credential' as a professional, according0to the text's definitions?", "options": [{"text": "'Accrediting' refers to personal achievement, while 'credential' refers to institutional trust.", "isCorrect": false, "rationale": "This statement reverses the roles; accreditation is institutional, and a credential is a personal document."}, {"text": "'Accrediting' signifies an official declaration of institutional worthiness, while 'credential' is a document proving individual trustworthiness and qualification.", "isCorrect": true, "rationale": "The text states 'To accredit a school is to officially declare it worthy of trust,' and 'credential, a document that proves you are trustworthy and qualified,' clearly distinguishing between institutional endorsement and individual proof."}, {"text": "Both terms refer exclusively to financial trustworthiness.", "isCorrect": false, "rationale": "While related to trust, the context for 'accredit' is educational institutions and 'credential' is professional qualification, not exclusively financial."}, {"text": "'Accrediting' involves earning a degree, while 'credential' involves teaching at a school.", "isCorrect": false, "rationale": "These definitions are incorrect; earning a degree is part of receiving credentials, and accreditation applies to the institution, not the act of teaching."}]}, {"question": "A historian discovers an ancient scroll detailing a war hero's feats, including single-handedly defeating an entire army by summoning lightning. While acknowledging the story's dramatic flair, the historian concludes this specific feat is historically inaccurate. Which of the *original* meanings of 'incredible' best applies to the historian's conclusion about the lightning-summoning feat?", "options": [{"text": "Extremely impressive or astonishing.", "isCorrect": false, "rationale": "This is the modern, 'loose' meaning of incredible, not its original sense related to belief."}, {"text": "Beyond human capability.", "isCorrect": false, "rationale": "While true for the feat, this doesn't capture the essence of the historian's judgment of its believability, which is the core of 'incredible's' original meaning."}, {"text": "Not believable or trustworthy.", "isCorrect": true, "rationale": "The text states 'incredible, originally meant 'not believable'.' The historian's conclusion is that the feat cannot be believed as a factual historical event."}, {"text": "A miraculous event.", "isCorrect": false, "rationale": "This interprets the event as divine, rather than reflecting the historian's judgment on its factual credibility."}]}, {"question": "The 'rootconnection' section links 'cred' (to believe) with 'jus/jur' (law). What fundamental aspect of the legal system is highlighted by this connection?", "options": [{"text": "The historical origins of Roman law.", "isCorrect": false, "rationale": "While Roman law is mentioned, the connection emphasizes a functional relationship, not just historical origins."}, {"text": "The importance of written legal codes and documents.", "isCorrect": false, "rationale": "Written codes are important, but the connection specifically focuses on the interplay of belief and sworn testimony."}, {"text": "The necessity for courts to trust the testimony of witnesses who swear oaths.", "isCorrect": true, "rationale": "The text clearly states: 'The legal system depends on trust: witnesses swear oaths (jur) because the court must believe (cred) their testimony.'"}, {"text": "The process of appointing judges and legal officials.", "isCorrect": false, "rationale": "The text does not discuss the appointment process in relation to the 'cred' and 'jus/jur' connection."}]}, {"question": "Which of the following modern situations most directly reflects the core Latin meaning of 'credere' ('to believe' or 'to trust') as the foundation for its English derivatives?", "options": [{"text": "Reading a news report about a scientific discovery that challenges previous theories.", "isCorrect": false, "rationale": "While it involves assessing information, it's more about critical evaluation and updating knowledge rather than the foundational act of belief or trust in a person or statement."}, {"text": "A doctor's diagnosis, where the patient relies on the doctor's expertise and knowledge.", "isCorrect": true, "rationale": "This scenario directly involves the patient placing 'trust' and 'belief' in the doctor's competence and the validity of their diagnosis, aligning with the core meaning of 'credere' and its professional derivatives like 'credential' or 'accredit'."}, {"text": "A child learning to ride a bicycle by trial and error.", "isCorrect": false, "rationale": "This is primarily about skill acquisition through practice, not a direct act of belief or trust in someone or something else's word/statement."}, {"text": "An artist creating a new sculpture purely for aesthetic appeal.", "isCorrect": false, "rationale": "This situation relates to artistic expression and creativity, not the core concept of belief or trust as defined by 'credere'."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
