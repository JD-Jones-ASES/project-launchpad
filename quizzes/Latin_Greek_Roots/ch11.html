<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 11</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What are the two meanings of the Latin root 'ced / cede / cess'?", "options": [{"text": "to carry and to build", "isCorrect": false, "rationale": "Carrying belongs to the root 'port' and building to 'struct.' The root ced/cede/cess has a different pair of meanings."}, {"text": "to go and to yield", "isCorrect": true, "rationale": "The Latin cedere meant both 'to go or move' and 'to yield or give way.' This double meaning gives English words about movement and concession."}, {"text": "to lead and to follow", "isCorrect": false, "rationale": "Leading belongs to the root 'duc/duct.' The root ced/cede means to go and to yield, which are related but distinct ideas."}, {"text": "to speak and to write", "isCorrect": false, "rationale": "Speaking and writing belong to different Latin roots entirely. Ced/cede/cess is about movement and yielding."}], "id": "q01"}, {"question": "To 'proceed' means to:", "options": [{"text": "Go back to the beginning", "isCorrect": false, "rationale": "Going back is the meaning of 'recede' (re- + cede). The prefix 'pro-' means forward, not back."}, {"text": "Move forward; continue", "isCorrect": true, "rationale": "Proceed = pro- (forward) + ceed (go). To proceed is to go forward or continue with a task or journey."}, {"text": "Yield to someone else's opinion", "isCorrect": false, "rationale": "Yielding is the meaning of 'concede.' The prefix 'pro-' in 'proceed' means forward, indicating movement, not surrender."}, {"text": "Come before someone in rank", "isCorrect": false, "rationale": "Coming before is captured by 'predecessor.' Proceed simply means to go forward or continue."}], "id": "q02"}, {"question": "When the tide 'recedes,' it:", "options": [{"text": "Rises and floods the shore", "isCorrect": false, "rationale": "A rising tide would be moving forward. The prefix 're-' means back — recede means to go back."}, {"text": "Moves back or withdraws from shore", "isCorrect": true, "rationale": "Recede = re- (back) + cede (go). When a tide recedes, it moves back away from the shore."}, {"text": "Exceeds its normal boundary", "isCorrect": false, "rationale": "Exceeding a boundary means going beyond it (ex- + ceed). Receding means pulling back in the opposite direction."}, {"text": "Proceeds into the harbor", "isCorrect": false, "rationale": "Moving forward into a harbor would be proceeding. Receding is the opposite — moving back."}], "id": "q03"}, {"question": "To 'concede' a point in an argument means to:", "options": [{"text": "Argue more forcefully", "isCorrect": false, "rationale": "Arguing more forcefully is the opposite of conceding. To concede means to yield or give way."}, {"text": "Admit that the other side is right; yield", "isCorrect": true, "rationale": "Concede = con- (together/intensifying) + cede (yield). To concede is to fully yield a point, admitting the other side was correct."}, {"text": "Proceed to the next topic", "isCorrect": false, "rationale": "Moving to the next topic would use 'proceed.' Conceding means surrendering a point in argument."}, {"text": "Exceed the time limit", "isCorrect": false, "rationale": "Exceeding the time limit would use 'exceed' (ex- + ceed). Conceding means admitting defeat or yielding."}], "id": "q04"}, {"question": "What does the word 'access' literally mean based on its morphemes?", "options": [{"text": "A going away", "isCorrect": false, "rationale": "Going away would use the prefix 'de-' or 'ab-.' Access comes from 'ad-' (toward) + cessus (gone), meaning a going toward."}, {"text": "A going toward; a way to approach or enter", "isCorrect": true, "rationale": "Access = ac- (ad-, toward) + cess (go). Access is literally 'a going toward' — the ability to approach or enter something."}, {"text": "A going forward quickly", "isCorrect": false, "rationale": "Going forward quickly describes movement but not the meaning encoded in 'access.' The prefix 'ac-' (ad-) means toward, not forward."}, {"text": "A going beyond", "isCorrect": false, "rationale": "Going beyond is the meaning of 'exceed' (ex- + ceed). Access means a going toward."}], "id": "q05"}, {"question": "A 'predecessor' is someone who:", "options": [{"text": "Comes after you and takes over your role", "isCorrect": false, "rationale": "Someone who comes after you is your successor (suc- = after + cess = go). A predecessor is the opposite — they went before you."}, {"text": "Goes before you in the same role or position", "isCorrect": true, "rationale": "Predecessor = prae- (before) + de- (away) + cess (go) + -or (one who). A predecessor is someone who held your position before you arrived."}, {"text": "Precedes you in a physical race", "isCorrect": false, "rationale": "While 'pre-' does mean before, 'predecessor' specifically refers to holding a position or role before you — not running in a race."}, {"text": "Works alongside you as an equal", "isCorrect": false, "rationale": "Someone who works alongside you would be a colleague or peer. A predecessor is someone who went before you in a role."}], "id": "q06"}, {"question": "To 'succeed' at a goal means to:", "options": [{"text": "Come after it and achieve it", "isCorrect": true, "rationale": "Succeed = suc- (sub-, after) + ceed (go). To succeed literally means to go after — to come after a challenge and achieve the goal."}, {"text": "Exceed the goal by a large margin", "isCorrect": false, "rationale": "Exceeding means going beyond a limit. Succeeding means achieving a goal — the two are related but distinct."}, {"text": "Concede defeat gracefully", "isCorrect": false, "rationale": "Conceding means admitting defeat. Succeeding means achieving — the opposite outcome."}, {"text": "Proceed carefully without errors", "isCorrect": false, "rationale": "Proceeding carefully describes a method. Succeeding means achieving a desired result, from the root suc- (after) + ceed (go)."}], "id": "q07"}, {"question": "Which form of this root comes from the past participle 'cessus'?", "options": [{"text": "cede (as in recede)", "isCorrect": false, "rationale": "The '-cede' form comes from the present stem of cedere. The past participle is cessus, which gives a different branch of the family."}, {"text": "cess (as in access and process)", "isCorrect": true, "rationale": "The 'cess' form comes from the past participle cessus. Words like access, process, and predecessor use this form."}, {"text": "ceed (as in proceed)", "isCorrect": false, "rationale": "The '-ceed' spelling is an English variant of the present stem '-cede.' The past participle form is 'cess.'"}, {"text": "con- (as in concede)", "isCorrect": false, "rationale": "'Con-' is a prefix meaning together/intensifying, not a form of the root itself. The past participle stem is 'cess.'"}], "id": "q08"}, {"question": "A 'process' is best described as:", "options": [{"text": "A sudden stopping of movement", "isCorrect": false, "rationale": "Stopping would contradict the root meaning. Process = pro- (forward) + cess (go): a going forward."}, {"text": "A series of steps moving forward toward a result", "isCorrect": true, "rationale": "Process = pro- (forward) + cess (go). A process is a systematic going forward — a set of steps that advance toward an outcome."}, {"text": "A yielding to another's instructions", "isCorrect": false, "rationale": "Yielding is the meaning of 'concede.' A process uses the prefix 'pro-' (forward), not a yielding prefix."}, {"text": "A going back to review earlier work", "isCorrect": false, "rationale": "Going back would use the prefix 're-' (as in recede). Process moves forward: pro- + cess."}], "id": "q09"}, {"question": "To 'exceed' a limit means to:", "options": [{"text": "Stay safely within the limit", "isCorrect": false, "rationale": "Staying within the limit is the opposite of exceeding it. The prefix 'ex-' means out or beyond."}, {"text": "Recede from the limit", "isCorrect": false, "rationale": "Receding means pulling back. Exceeding means going past or beyond — in the opposite direction."}, {"text": "Go beyond the limit; surpass", "isCorrect": true, "rationale": "Exceed = ex- (out/beyond) + ceed (go). To exceed is to go beyond a set boundary or limit."}, {"text": "Yield to the limit's authority", "isCorrect": false, "rationale": "Yielding would be conceding. Exceeding means surpassing — going further than the limit allows."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
