    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The epigraph presents Aristotle's definition: “Music is an art of order and of time.” According to this statement, what are the two fundamental elements that define music?", "options": [{"text": "Melody and harmony", "isCorrect": false, "rationale": "While melody and harmony are crucial components of music, they are specific manifestations of 'order' and 'time,' rather than the fundamental elements themselves as stated in the definition."}, {"text": "Order and time", "isCorrect": true, "rationale": "The epigraph directly translates Aristotle's statement as 'Music is an art of order and of time,' explicitly identifying these two as its core defining elements."}, {"text": "Sound and silence", "isCorrect": false, "rationale": "Sound and silence are the raw materials of music, but 'order' and 'time' describe how these materials are organized and structured to become music, according to the definition."}, {"text": "Emotion and expression", "isCorrect": false, "rationale": "Emotion and expression are often outcomes or purposes of music, but Aristotle's definition focuses on its inherent structural and temporal characteristics, not its affective impact."}]}, {"question": "In the context of Aristotle's definition, 'Music is an art of order and of time,' what does the concept of 'order' primarily imply within a musical context?", "options": [{"text": "The specific instruments chosen for a performance.", "isCorrect": false, "rationale": "The choice of instruments relates to orchestration and performance practice, not the fundamental concept of 'order' as structure and organization inherent in the music itself."}, {"text": "The emotional impact music has on a listener.", "isCorrect": false, "rationale": "Emotional impact is a subjective response, whereas 'order' refers to the objective, structural arrangement of musical elements."}, {"text": "The structure, patterns, and organization of sounds.", "isCorrect": true, "rationale": "The term 'order' in music directly refers to the systematic arrangement of sounds, including elements like melody, harmony, rhythm, and form, which create discernible patterns and organization."}, {"text": "The speed at which a piece of music is played.", "isCorrect": false, "rationale": "The speed of music (tempo) is an aspect of 'time,' specifically how time is paced, rather than 'order' itself, which pertains to how elements are arranged."}]}, {"question": "Considering the epigraph's definition, 'Music is an art of order and of time,' what aspect of music does 'time' most fundamentally refer to?", "options": [{"text": "The historical period in which the music was composed.", "isCorrect": false, "rationale": "The historical period is external context, not an inherent element of music as defined by 'time' in this context."}, {"text": "The duration, sequence, and rhythmic progression of sounds.", "isCorrect": true, "rationale": "In music, 'time' is fundamental to how sounds unfold in succession, governing rhythm, tempo, duration, and the overall temporal flow and progression of a piece."}, {"text": "The amount of practice required to master an instrument.", "isCorrect": false, "rationale": "This relates to the practical skill of a musician, not the defining characteristic of music as an art of time."}, {"text": "The philosophical ideas embedded within the music's lyrics.", "isCorrect": false, "rationale": "While lyrics exist in time, 'time' in Aristotle's definition primarily refers to the temporal organization of the sound itself, not the intellectual content of words."}]}, {"question": "Aristotle's assertion that 'Music is an art of order and of time' implies what about the relationship between these two elements in music?", "options": [{"text": "'Order' is more important than 'time' in defining music.", "isCorrect": false, "rationale": "The use of 'and' suggests both elements are equally crucial and coordinate in defining music, with no implied hierarchy."}, {"text": "They are separate and distinct aspects that can exist independently in music.", "isCorrect": false, "rationale": "While distinct concepts, the conjunctive 'and' suggests they are inherently intertwined; musical order necessarily unfolds in time, and time in music is given structure by order."}, {"text": "They are inseparable and foundational components required for music's existence.", "isCorrect": true, "rationale": "The phrase 'an art of order and of time' strongly implies that both structure (order) and temporal unfolding (time) are essential and integrated for music to exist as defined."}, {"text": "One element is typically sacrificed to enhance the other in musical composition.", "isCorrect": false, "rationale": "No such trade-off or compromise is implied by Aristotle's definition; instead, it posits both as fundamental and co-existing."}]}, {"question": "If one were to apply Aristotle's definition of music as 'an art of order and of time,' which element would be *least* directly emphasized as a core defining characteristic of music *itself* in this particular philosophical statement?", "options": [{"text": "Rhythmic patterns", "isCorrect": false, "rationale": "Rhythmic patterns are a direct embodiment of both 'order' (predictable structure) and 'time' (duration and sequence)."}, {"text": "Melodic structure", "isCorrect": false, "rationale": "Melody is a prime example of 'order' in pitch relationships, unfolding over 'time'."}, {"text": "The visual spectacle of a live performance", "isCorrect": true, "rationale": "While a live performance may include visual elements, Aristotle's definition focuses on the intrinsic properties of music as an auditory art of structured sound existing in time, not its visual presentation."}, {"text": "Harmonic progression", "isCorrect": false, "rationale": "Harmonic progression is a clear demonstration of 'order' (relationships between chords) that unfolds over 'time'."}]}, {"question": "The epigraph attributes the definition of music to Aristotle. This suggests that the concept of music as an art of order and time emerged from which intellectual tradition?", "options": [{"text": "Renaissance humanism", "isCorrect": false, "rationale": "Renaissance humanism was a movement from the 14th to 17th centuries, much later than Aristotle."}, {"text": "Enlightenment philosophy", "isCorrect": false, "rationale": "The Enlightenment was an 18th-century movement, far removed from Aristotle's era."}, {"text": "Ancient Greek philosophy", "isCorrect": true, "rationale": "Aristotle was a prominent philosopher in ancient Greece (4th century BCE), making his ideas part of the ancient Greek philosophical tradition."}, {"text": "Medieval scholasticism", "isCorrect": false, "rationale": "Medieval scholasticism (roughly 9th-17th centuries) was influenced by Aristotle but emerged much later; the original thought belongs to ancient Greece."}]}, {"question": "By calling music an 'art' (τέχνη, 'techne' in Greek), Aristotle emphasizes its nature as something that requires:", "options": [{"text": "Unrestrained emotional outbursts.", "isCorrect": false, "rationale": "While art can involve emotion, 'techne' primarily refers to a craft or skill, implying a controlled and deliberate application of principles, which contrasts with unrestrained outbursts."}, {"text": "Purely spontaneous, unplanned expression.", "isCorrect": false, "rationale": "The concept of 'order' in the definition suggests structure and planning, which goes against purely spontaneous and unplanned expression."}, {"text": "Skill, craftsmanship, and intellectual design.", "isCorrect": true, "rationale": "The Greek term 'techne' (art) refers to a skilled craft or an applied science, emphasizing the human capacity for making or doing something according to principles, implying skill, craftsmanship, and intelligent design."}, {"text": "A large financial investment for production.", "isCorrect": false, "rationale": "The term 'art' in this philosophical context refers to the nature of the creative or constructive process, not the financial resources involved."}]}, {"question": "Consider a hypothetical musical composition that deliberately employs complete randomness, with no discernible patterns, fixed durations, or predictable sequences of sound. This approach would most directly challenge which part of Aristotle's definition of music?", "options": [{"text": "That music is an 'art.'", "isCorrect": false, "rationale": "Randomness can be utilized artistically, so it doesn't necessarily contradict the notion of 'art' itself, though it would challenge the 'techne' aspect of skill and order."}, {"text": "That music involves 'time.'", "isCorrect": false, "rationale": "Even random sounds unfold over a duration, so they still exist within 'time,' albeit without ordered temporal elements."}, {"text": "That music embodies 'order.'", "isCorrect": true, "rationale": "Complete randomness, by definition, lacks discernible patterns, structure, or organization, thereby directly contradicting Aristotle's assertion that music is fundamentally 'an art of order.'"}, {"text": "That music is composed of 'sounds.'", "isCorrect": false, "rationale": "Randomness still involves sounds, so this element is not challenged."}]}, {"question": "The fact that this definition comes from Aristotle's 'Politica' (a work on governance and society) provides a clue that Aristotle likely viewed music as having a significant role beyond mere entertainment, potentially in areas such as:", "options": [{"text": "Agricultural productivity.", "isCorrect": false, "rationale": "There is no direct philosophical connection between music and agricultural productivity in Aristotle's works."}, {"text": "Military strategy.", "isCorrect": false, "rationale": "While music might have roles in military contexts, the 'Politica' focuses on the broader civic and ethical development of citizens, not primarily military tactics."}, {"text": "Civic education and character formation.", "isCorrect": true, "rationale": "In the 'Politica,' Aristotle discusses the role of music in the education of citizens, believing it could shape character (ethos) and contribute to moral and intellectual development within a well-ordered society."}, {"text": "International diplomacy.", "isCorrect": false, "rationale": "This is outside the typical scope of music's role as discussed by Aristotle in the 'Politica'."}]}, {"question": "What is the most comprehensive philosophical statement about the nature of music that can be inferred from Aristotle's succinct definition, 'Music is an art of order and of time'?", "options": [{"text": "Music is solely a medium for expressing intense human emotions.", "isCorrect": false, "rationale": "While music can express emotion, Aristotle's definition primarily emphasizes its structural and temporal properties ('order' and 'time'), not solely its emotional function."}, {"text": "Music's essence lies in its structured organization and temporal progression, making it a product of skilled human design.", "isCorrect": true, "rationale": "This statement synthesizes all key components of the definition: 'order' (structured organization), 'time' (temporal progression), and 'art' (product of skilled human design), representing a comprehensive understanding of its essence."}, {"text": "Music is primarily a form of communal ritual or social gathering.", "isCorrect": false, "rationale": "While music often plays a role in communal activities, this definition speaks to the intrinsic nature of music itself, not primarily its social function."}, {"text": "Music is best understood as a mathematical phenomenon, independent of human experience.", "isCorrect": false, "rationale": "While 'order' and 'time' can have mathematical underpinnings, the term 'art' ('techne') implies human creation and experience, distinguishing it from a purely abstract mathematical concept."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
