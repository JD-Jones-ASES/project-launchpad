        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 8, Section 1</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Macrobius' epigraph, what is the primary relationship between 'good laws' and 'bad customs'?", "options": [{"text": "Good laws are designed to perpetuate bad customs.", "isCorrect": false, "rationale": "The epigraph states that good laws are 'born from' bad customs, implying they arise to correct or address them, not perpetuate them."}, {"text": "Good laws emerge as a direct response to the presence of bad customs within a society.", "isCorrect": true, "rationale": "The phrase 'born from bad customs' directly indicates that good laws originate as a consequence or reaction to problematic societal practices."}, {"text": "Bad customs are eradicated before good laws can be conceived.", "isCorrect": false, "rationale": "The epigraph suggests the bad customs are the *origin* of the good laws, meaning the customs must exist for the laws to be born, not be eradicated beforehand."}, {"text": "Good laws and bad customs exist independently without influence on each other.", "isCorrect": false, "rationale": "The epigraph explicitly links the two, stating one is 'born from' the other, which contradicts the idea of independence."}]}, {"question": "If a society has many 'good laws' according to Macrobius, what might one infer about its historical development?", "options": [{"text": "It has always been a perfectly moral and orderly society.", "isCorrect": false, "rationale": "The epigraph suggests that good laws arise from 'bad customs,' implying that the society must have experienced periods or instances of moral failings or disorder that necessitated these laws."}, {"text": "It has successfully learned from past mistakes and societal issues.", "isCorrect": true, "rationale": "If 'good laws are born from bad customs,' then the existence of these laws indicates that the society has recognized and responded to its imperfections, transforming them into regulatory principles."}, {"text": "Its legal system was established by a single, visionary leader who foresaw all future problems.", "isCorrect": false, "rationale": "The epigraph points to an organic, reactive development of laws based on societal customs, not a singular, proactive vision that anticipates all future issues."}, {"text": "Its citizens naturally adhere to moral principles without needing formal regulation.", "isCorrect": false, "rationale": "The need for 'good laws' implies that natural adherence to moral principles was insufficient, requiring formal rules to address 'bad customs.'"}]}, {"question": "Which of the following scenarios best exemplifies the principle articulated by Macrobius?", "options": [{"text": "A community creates new environmental protection laws before any pollution occurs.", "isCorrect": false, "rationale": "This scenario represents proactive lawmaking, whereas Macrobius' statement suggests laws are a reactive response to existing 'bad customs' or problems."}, {"text": "A nation institutes laws against fraud after a series of prominent financial scams.", "isCorrect": true, "rationale": "This aligns perfectly with the epigraph: 'bad customs' (financial scams/fraudulent behavior) lead to the creation of 'good laws' (anti-fraud legislation) to prevent recurrence and regulate behavior."}, {"text": "A parliament revises old laws to make them more concise and easier to understand.", "isCorrect": false, "rationale": "This describes legal reform for clarity, not the birth of new laws in response to detrimental customs."}, {"text": "A government establishes a new holiday to celebrate national unity.", "isCorrect": false, "rationale": "This is a celebratory act of legislation, not a law born from a 'bad custom' or societal problem."}]}, {"question": "What is the implied purpose of a 'good law' in the context of Macrobius' statement?", "options": [{"text": "To serve as a historical record of past societal failures.", "isCorrect": false, "rationale": "While laws reflect history, their primary purpose is usually to regulate current and future behavior, not merely to document the past."}, {"text": "To elevate a society's existing customs to a formal legal status.", "isCorrect": false, "rationale": "The epigraph suggests laws are born from *bad* customs to correct them, not to formalize existing ones, good or bad, without change."}, {"text": "To prevent undesirable societal practices from continuing or recurring.", "isCorrect": true, "rationale": "If good laws are 'born from bad customs,' their purpose is clearly to address, mitigate, or prevent those 'bad customs,' thereby improving societal order and conduct."}, {"text": "To establish a purely theoretical framework for ideal human behavior.", "isCorrect": false, "rationale": "The link to 'bad customs' implies a practical, reactive origin for laws, grounded in real-world problems, rather than a purely theoretical or idealistic creation."}]}, {"question": "The epigraph suggests that the evolution of law is primarily:", "options": [{"text": "Predictive and proactive, anticipating future social issues.", "isCorrect": false, "rationale": "The phrasing 'born from bad customs' indicates a reactive rather than a proactive or predictive process of law creation."}, {"text": "Revolutionary, involving sudden and complete overhauls of existing systems.", "isCorrect": false, "rationale": "While laws can change, 'born from' suggests a more organic, responsive development rather than necessarily a revolutionary one."}, {"text": "Organic and reactive, responding to established societal challenges.", "isCorrect": true, "rationale": "The concept that 'good laws are born from bad customs' strongly implies an organic process where laws emerge as solutions to existing problems, making them reactive."}, {"text": "Static, with laws rarely changing once established.", "isCorrect": false, "rationale": "The very idea of laws being 'born from' customs implies a dynamic process of change and adaptation in response to evolving societal conditions."}]}, {"question": "What does Macrobius' statement imply about the nature of 'customs' in society?", "options": [{"text": "All customs are inherently beneficial and moral.", "isCorrect": false, "rationale": "The epigraph explicitly distinguishes between 'bad customs' and the 'good laws' they inspire, indicating that not all customs are beneficial; some are problematic."}, {"text": "Customs are unchangeable and dictate all laws.", "isCorrect": false, "rationale": "While customs influence laws, the statement implies laws are created to *change* or correct 'bad customs,' not merely dictated by them unalterably."}, {"text": "Customs can be detrimental and necessitate formal legal intervention.", "isCorrect": true, "rationale": "The existence of 'bad customs' that lead to 'good laws' clearly shows that customs can be harmful enough to require legal action to regulate or prevent them."}, {"text": "Customs are always secondary to written laws in terms of societal impact.", "isCorrect": false, "rationale": "The statement shows customs precede laws in their influence, suggesting they have significant societal impact, potentially even leading to the need for formal law."}]}, {"question": "Which philosophical school of thought most closely aligns with the sentiment of Macrobius' epigraph regarding the origin of laws?", "options": [{"text": "Idealism, proposing that laws originate from perfect, abstract concepts of justice.", "isCorrect": false, "rationale": "Idealism suggests laws stem from abstract principles. Macrobius' statement, however, grounds laws in the very real, imperfect reality of 'bad customs,' making them a practical response rather than an idealist one."}, {"text": "Legal positivism, which asserts laws are rules established by human authority, independent of morality.", "isCorrect": false, "rationale": "While legal positivism deals with human-made laws, Macrobius' statement implies a direct connection between law and a moral/societal need ('bad customs' leading to 'good laws'), which isn't the primary focus of positivism's definition of law."}, {"text": "Social contract theory, where laws arise from a voluntary agreement among individuals for mutual protection.", "isCorrect": false, "rationale": "Social contract theory focuses on explicit or implicit agreements. Macrobius' statement is about an organic, reactive development from existing societal flaws, not necessarily a foundational agreement."}, {"text": "Legal realism, which emphasizes that law is shaped by societal factors and human behavior rather than abstract ideals.", "isCorrect": true, "rationale": "Legal realism posits that laws are practical responses to societal realities and human behavior. Macrobius' idea that 'good laws are born from bad customs' directly supports this, linking law to concrete societal phenomena and problems rather than pure ideals."}]}, {"question": "How might a legislative body, guided by Macrobius' wisdom, approach crafting new legislation?", "options": [{"text": "By ignoring existing societal behaviors and focusing solely on abstract legal principles.", "isCorrect": false, "rationale": "Macrobius' epigraph stresses the importance of societal behaviors ('bad customs') as the genesis of law, so ignoring them would contradict this wisdom."}, {"text": "By observing prevailing societal issues or harmful practices as the basis for new rules.", "isCorrect": true, "rationale": "To create 'good laws' from 'bad customs,' a legislative body would need to identify and analyze those 'bad customs' or societal issues that necessitate legal intervention."}, {"text": "By creating laws that are identical to those of other successful nations, regardless of local context.", "isCorrect": false, "rationale": "The epigraph suggests laws are a response to specific local 'customs,' implying that laws should be tailored to address the unique issues of a particular society, not blindly copied."}, {"text": "By establishing a legal framework based purely on theoretical ideals, without practical application.", "isCorrect": false, "rationale": "The epigraph grounds law in practical societal problems ('bad customs'), suggesting a practical, applied approach to legislation rather than a purely theoretical one."}]}, {"question": "What is the most significant challenge in applying Macrobius' insight in a modern, diverse society?", "options": [{"text": "The difficulty in finding enough 'bad customs' to justify new laws.", "isCorrect": false, "rationale": "Societies often face numerous challenges and undesirable practices, so finding 'bad customs' is rarely the main difficulty."}, {"text": "Defining what constitutes a 'bad custom' in a society with varied values and norms.", "isCorrect": true, "rationale": "In a diverse society, what one group considers a 'bad custom' requiring legal intervention, another might see as a harmless tradition or even a positive practice, making consensus challenging."}, {"text": "Lack of historical records to identify the origins of current customs.", "isCorrect": false, "rationale": "Macrobius' statement focuses on current 'bad customs' leading to new laws, not necessarily a detailed historical tracing of every custom."}, {"text": "The speed at which 'good laws' can be enacted, which is often too fast.", "isCorrect": false, "rationale": "Legislative processes are often slow, not too fast, and the challenge lies in the *definition* and *agreement* on 'bad customs,' not the speed of enactment."}]}, {"question": "The epigraph implicitly argues against the idea that laws are solely derived from:", "options": [{"text": "Rational deliberation among wise individuals.", "isCorrect": false, "rationale": "While rational deliberation is part of law-making, Macrobius' statement emphasizes the role of existing societal problems as the impetus, not just abstract reasoning."}, {"text": "Divine commandments or supernatural sources.", "isCorrect": true, "rationale": "By stating that laws are 'born from bad customs,' Macrobius grounds the origin of laws in human societal behavior and problems, implicitly contrasting with origins attributed solely to divine or supernatural decree."}, {"text": "The need for social order and stability.", "isCorrect": false, "rationale": "The creation of 'good laws' to address 'bad customs' directly serves the need for social order and stability, so the epigraph does not argue against this idea."}, {"text": "Pre-existing ethical principles.", "isCorrect": false, "rationale": "While 'good laws' might embody ethical principles, the epigraph suggests these principles are often invoked or formalized *in response* to the transgression of 'bad customs,' rather than laws being solely derived from them in isolation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
