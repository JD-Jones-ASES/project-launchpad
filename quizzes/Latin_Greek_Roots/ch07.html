        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 7</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the Latin root 'cogn' mean?", "options": [{"text": "to feel and perceive", "isCorrect": false, "rationale": "Feeling and perceiving are covered by the root 'sens/sent' (Ch. 6), not 'cogn.'"}, {"text": "to know, to recognize", "isCorrect": true, "rationale": "The root 'cogn' comes from Latin 'cognoscere' (to get to know, recognize), from 'co-' (thoroughly) + 'gnoscere' (to know)."}, {"text": "to see clearly", "isCorrect": false, "rationale": "Seeing is covered by the root 'vis/vid' (Ch. 5), not 'cogn.'"}, {"text": "to think and speak", "isCorrect": false, "rationale": "'Cogn' is specifically about knowing and recognizing, not speaking. Speaking relates to 'voc' and 'dict.'"}]}, {"question": "The word 'recognize' uses the prefix 're-.' Based on the root meaning, what does 'recognize' literally mean?", "options": [{"text": "To know again; to connect a face or thing to a previous memory", "isCorrect": true, "rationale": "'Recognize' = 're-' (again) + 'cogn' (know) + '-ize': to know again — your mind connects what you are seeing now to something you already knew before."}, {"text": "To know something for the first time", "isCorrect": false, "rationale": "Knowing for the first time would not use 're-' (again). Recognizing is specifically about re-encountering what you already knew."}, {"text": "To know something before it happens", "isCorrect": false, "rationale": "Knowing before would use 'pre-' (before), not 're-' (again). 'Recognize' is about knowing something again."}, {"text": "To know something through careful hearing", "isCorrect": false, "rationale": "Knowing through hearing involves 'aud,' not 'cogn.' Recognition is specifically mental re-identification, not about hearing."}]}, {"question": "If someone travels 'incognito,' they are traveling:", "options": [{"text": "Quickly and secretly", "isCorrect": false, "rationale": "Speed is not part of the meaning of 'incognito.' The word is specifically about identity being unknown, not the speed of travel."}, {"text": "With their identity hidden; unknown", "isCorrect": true, "rationale": "'Incognito' = 'in-' (not) + 'cognit' (known) + '-o' (Italian ending): going 'un-known,' with one's identity hidden. It entered English from Italian."}, {"text": "With a large group for protection", "isCorrect": false, "rationale": "Group travel has nothing to do with the word 'incognito.' The word is about being unknown, regardless of company."}, {"text": "On an official government mission", "isCorrect": false, "rationale": "An official mission is the opposite of incognito — official travel usually involves being known. Incognito means hiding who you are."}]}, {"question": "The chapter introduces two roots — 'cogn' (Latin) and 'gnosc/gnos' (Greek) — that both mean 'to know.' Where do you typically see the Greek-derived 'gnos' root?", "options": [{"text": "In everyday words about thinking and awareness", "isCorrect": false, "rationale": "Everyday thinking and awareness words (cognition, recognize, cognizant) tend to use the Latin 'cogn' root."}, {"text": "In scientific and medical words", "isCorrect": true, "rationale": "The Greek-derived 'gnosc/gnos' root tends to appear in scientific and medical vocabulary, like 'diagnose' and 'prognosis.'"}, {"text": "In legal and government words", "isCorrect": false, "rationale": "Legal and government words about knowing tend to use Latin-derived forms. Medical words like diagnose and prognosis use the Greek form."}, {"text": "In religious and philosophical texts only", "isCorrect": false, "rationale": "While Greek philosophy is important, the 'gnos' root's clearest English use is in science and medicine, not primarily in religious texts."}]}, {"question": "A doctor performs a 'diagnosis.' What does this word literally mean based on its Greek roots?", "options": [{"text": "To predict how long a patient will live", "isCorrect": false, "rationale": "Predicting the future course of illness is a 'prognosis,' not a 'diagnosis.' Diagnosis is about knowing through — identifying what is currently wrong."}, {"text": "To examine thoroughly and declare a patient cured", "isCorrect": false, "rationale": "A diagnosis is the identification of an illness, not a declaration of cure. The 'dia-' prefix means through, not cure."}, {"text": "To know through — to identify a disease by examining symptoms", "isCorrect": true, "rationale": "'Diagnosis' = 'dia-' (through) + 'gnos' (know) + '-is': knowing through — a doctor reasons through the symptoms to identify the disease."}, {"text": "To say something before — to forecast a medical event", "isCorrect": false, "rationale": "Saying before or forecasting describes 'prognosis' (pro- = before). Diagnosis uses 'dia-' meaning through."}]}, {"question": "What is the difference between 'diagnosis' and 'prognosis'?", "options": [{"text": "A diagnosis is about law; a prognosis is about medicine", "isCorrect": false, "rationale": "Both words are medical terms. The difference is timing: diagnosis identifies what is wrong now, prognosis predicts what will happen next."}, {"text": "A diagnosis identifies what is wrong now; a prognosis predicts how the illness will progress", "isCorrect": true, "rationale": "'Dia-' (through) in diagnosis = knowing through current symptoms. 'Pro-' (before/ahead) in prognosis = knowing before; predicting what comes next in the illness."}, {"text": "A diagnosis is Latin; a prognosis is English", "isCorrect": false, "rationale": "Both words are from Greek. 'Diagnosis' uses the Greek prefix 'dia-' and 'prognosis' uses 'pro-,' but both use the Greek root 'gnos.'"}, {"text": "A diagnosis is done by a nurse; a prognosis is done by a surgeon", "isCorrect": false, "rationale": "The difference between these words is not about who performs them, but about their meaning: diagnosis identifies illness, prognosis predicts its course."}]}, {"question": "What does 'cognizant' mean?", "options": [{"text": "Confused or unaware of what is happening", "isCorrect": false, "rationale": "Being confused or unaware is the opposite of cognizant. To be cognizant is to be aware and informed."}, {"text": "Aware; having come to know something", "isCorrect": true, "rationale": "'Cognizant' = 'cogn' (know) + '-izant' (being in a state of): aware; having knowledge of something. If you are cognizant of a risk, you know about it."}, {"text": "Able to think very quickly", "isCorrect": false, "rationale": "Speed of thinking is not the meaning of 'cognizant.' It is about awareness and being informed, not processing speed."}, {"text": "Skilled in science and medical diagnosis", "isCorrect": false, "rationale": "Medical skill is not what 'cognizant' means. It is a general word for being aware of something."}]}, {"question": "The chapter mentions that Latin 'cognoscere' and Greek 'gignoskein' share a common ancestor. What is that ancestor?", "options": [{"text": "An ancient Egyptian word for wisdom", "isCorrect": false, "rationale": "The shared ancestor is not Egyptian. It is an ancient Indo-European root — the parent language family of both Latin and Greek."}, {"text": "An ancient Indo-European root meaning 'to know'", "isCorrect": true, "rationale": "Both Latin 'cognoscere' and Greek 'gignoskein' descend from a common Proto-Indo-European root meaning 'to know.' This is why so many European languages have similar 'know' words."}, {"text": "A Hebrew word carried into Greek by philosophers", "isCorrect": false, "rationale": "The shared ancestor is not Hebrew. The Latin and Greek words share an Indo-European ancestor, not a Semitic one."}, {"text": "A medieval French root that combined both languages", "isCorrect": false, "rationale": "Medieval French came much later than either Latin or Greek. The shared ancestor of 'cogn' and 'gnosc' is ancient Indo-European, not French."}]}, {"question": "The word 'cognitive' describes something relating to the process of thinking and knowing. Which suffix makes it an adjective?", "options": [{"text": "-ion, meaning the act of", "isCorrect": false, "rationale": "'-ion' creates nouns (like cognition). '-itive' creates adjectives meaning 'relating to.'"}, {"text": "-itive, meaning relating to", "isCorrect": true, "rationale": "The suffix '-itive' means 'relating to.' So 'cognitive' means relating to the processes of knowing and thinking. The noun form is 'cognition.'"}, {"text": "-ment, meaning the result of", "isCorrect": false, "rationale": "'-ment' creates nouns (like sentiment). 'Cognitive' is an adjective formed with '-itive.'"}, {"text": "-ize, meaning to make or become", "isCorrect": false, "rationale": "'-ize' creates verbs (like recognize). 'Cognitive' is an adjective, not a verb."}]}, {"question": "Chapter 7 says that perceiving (vis/vid, sens/sent) and knowing (cogn/gnosc) form a chain. What is the correct order of this chain?", "options": [{"text": "We understand first, then we see and feel", "isCorrect": false, "rationale": "The order is reversed. We first perceive the world through our senses, and that perception leads to understanding."}, {"text": "We see and feel first (perceive), then we process and understand (know)", "isCorrect": true, "rationale": "The chapter describes a progression: we see (vis) and feel (sens), and that sensory input is processed into knowledge (cogn). Perception comes before understanding."}, {"text": "Knowing and perceiving happen at exactly the same moment", "isCorrect": false, "rationale": "The chapter presents these as a sequential chain, not simultaneous events — perception feeds into knowledge."}, {"text": "We hear (aud) first, then see (vis), then feel (sens), then know (cogn)", "isCorrect": false, "rationale": "The chapter does not rank senses in that order. The chain described is perception (vis/sens broadly) leading to understanding (cogn)."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
