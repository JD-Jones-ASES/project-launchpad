<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 13, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what did the Latin word *terra* encompass beyond its literal meaning of 'earth' or 'ground'?", "options": [{"text": "The specific geographical coordinates of a region.", "isCorrect": false, "rationale": "While related to land, the text emphasizes a broader conceptual meaning beyond mere coordinates."}, {"text": "The idea of place, belonging, and ownership.", "isCorrect": true, "rationale": "The text explicitly states that *terra* meant 'not just “earth” or “ground” but the very idea of place, belonging, and ownership.'"}, {"text": "The spiritual connection to the gods of the underworld.", "isCorrect": false, "rationale": "The text mentions the subterranean realm but does not link *terra* itself to a spiritual connection with underworld gods."}, {"text": "The architectural principles for constructing Roman buildings.", "isCorrect": false, "rationale": "The text does not discuss *terra* in the context of architectural principles."}]}, {"question": "The Roman *agrimensores* were crucial for the empire primarily because their work:", "options": [{"text": "Developed new agricultural techniques to increase crop yields.", "isCorrect": false, "rationale": "The *agrimensores* were surveyors, not agricultural innovators. Their role was mapping, not farming techniques."}, {"text": "Enabled the empire to effectively govern and control its owned lands.", "isCorrect": true, "rationale": "The text states they 'mapped every hill and valley so that the empire could govern what it owned,' highlighting their crucial role in administration and control."}, {"text": "Created elaborate decorative maps for Roman public buildings.", "isCorrect": false, "rationale": "While they created maps, their primary purpose was for governance and practical control, not decorative art."}, {"text": "Established trade routes to acquire exotic goods from distant lands.", "isCorrect": false, "rationale": "Their role was land surveying and boundary marking within conquered regions, not establishing trade routes."}]}, {"question": "The text states that 'A Roman citizen's worth was often measured by how much *terra* he held.' This best illustrates which aspect of Roman society?", "options": [{"text": "The emphasis on agricultural innovation and land productivity.", "isCorrect": false, "rationale": "While land was important for agriculture, the statement specifically links *terra* held to 'worth,' not productivity or innovation."}, {"text": "The egalitarian distribution of resources among all citizens.", "isCorrect": false, "rationale": "This statement implies a hierarchy based on land ownership, which contradicts egalitarian distribution."}, {"text": "The direct correlation between land ownership and social status or power.", "isCorrect": true, "rationale": "The phrase 'citizen's worth was often measured by how much *terra* he held' directly indicates that land ownership was a primary determinant of status and influence in Roman society."}, {"text": "The Roman preference for rural living over urban development.", "isCorrect": false, "rationale": "The text mentions great estates but does not make a general statement about preference for rural living over urban development."}]}, {"question": "The Romans named the great body of water at the heart of their empire the *Mare Mediterraneum*. What does this name signify?", "options": [{"text": "Its immense depth and vastness.", "isCorrect": false, "rationale": "The text provides a specific etymology, not a description of depth or vastness."}, {"text": "Its strategic importance as a naval battleground.", "isCorrect": false, "rationale": "While strategically important, the name itself does not convey this meaning according to the text."}, {"text": "Its position as 'the sea in the middle of the lands.'", "isCorrect": true, "rationale": "The text explicitly states: 'the Mediterranean, or “the sea in the middle of the lands.”'"}, {"text": "Its legendary creation by a Roman deity.", "isCorrect": false, "rationale": "The text gives a descriptive etymology, not a mythological origin."}]}, {"question": "Based on the descriptions in the text, which of the following Roman structures would be classified as part of the *subterranean* realm?", "options": [{"text": "A *latifundium* stretching across the countryside.", "isCorrect": false, "rationale": "*Latifundia* are great estates on the surface, part of the 'terrestrial world.'"}, {"text": "A *terrace* used for viewing the surrounding landscape.", "isCorrect": false, "rationale": "A *terrace* is a 'raised, flattened platform of earth,' meaning it is above ground."}, {"text": "An *aqueduct channel* carved through stone.", "isCorrect": true, "rationale": "The text defines the *subterranean realm* as including 'underground tunnels, catacombs, and aqueduct channels carved through stone.'"}, {"text": "A newly surveyed *territory* being marked with stakes.", "isCorrect": false, "rationale": "A *territory* is an area of land on the surface, and surveying occurs above ground."}]}, {"question": "If a modern historian were to state that a famous Roman general was 'interred' following his death, what event are they describing based on the etymology provided?", "options": [{"text": "His body was displayed publicly in the forum.", "isCorrect": false, "rationale": "The word 'inter' relates to burial, not public display."}, {"text": "His achievements were recorded in a historical document.", "isCorrect": false, "rationale": "The word 'inter' comes from 'in + terra' meaning to put into the ground, not to record achievements."}, {"text": "His remains were placed into the ground.", "isCorrect": true, "rationale": "The text explicitly states: 'The English word inter, meaning “to bury,” comes from the Latin in + terra: to put into the ground.'"}, {"text": "He was honored with a military parade.", "isCorrect": false, "rationale": "The word 'inter' refers to the act of burial, not a celebratory parade."}]}, {"question": "When Roman generals conquered a new region, their act of surveying the land and marking its boundaries had a fundamental impact. What was this primary impact?", "options": [{"text": "It encouraged immediate cultural assimilation of the conquered people.", "isCorrect": false, "rationale": "The text focuses on governance and ownership, not immediate cultural assimilation as the primary impact of surveying."}, {"text": "It formalized the integration of the area as a governed *territory* of the empire.", "isCorrect": true, "rationale": "The text states that 'The conquered area became a territory—literally, the “land belonging to” a city or state,' directly linking surveying to formalizing governance and ownership."}, {"text": "It facilitated the rapid construction of new Roman cities.", "isCorrect": false, "rationale": "While surveying might precede city building, the text highlights the creation of 'territory' and its governance as the direct impact."}, {"text": "It allowed for the establishment of diplomatic relations with neighboring states.", "isCorrect": false, "rationale": "Surveying and marking boundaries of *conquered* land is about control, not diplomatic relations with neighbors."}]}, {"question": "Which statement best encapsulates the central role of the root *terr* in Roman civilization as presented in the text?", "options": [{"text": "*Terr* primarily represented the challenges of agriculture in varied climates.", "isCorrect": false, "rationale": "While land is agricultural, the text covers a much broader scope for *terr* than just agricultural challenges."}, {"text": "*Terr* symbolized the transient nature of human endeavors on earth.", "isCorrect": false, "rationale": "The text emphasizes the permanence and foundational aspects of *terr* (ownership, governance, burial) rather than transience."}, {"text": "*Terr* was fundamental to concepts of identity, power, governance, and the physical world.", "isCorrect": true, "rationale": "The text connects *terra* to belonging/ownership (identity), citizen's worth (power), surveying/governance (governance), and terrestrial/subterranean realms (physical world), encompassing all these aspects."}, {"text": "*Terr* denoted the separation of Roman culture from other ancient civilizations.", "isCorrect": false, "rationale": "The text describes the internal significance of *terr* for Romans, not its role in distinguishing them from other cultures."}]}, {"question": "The text explains that *terracotta* comes from 'baked earth.' What characteristic would you expect a terracotta sculpture to possess based on this etymology?", "options": [{"text": "It would be made of highly polished metal.", "isCorrect": false, "rationale": "The etymology 'baked earth' implies clay, not metal."}, {"text": "It would be constructed from raw, unfired clay.", "isCorrect": false, "rationale": "The 'baked' part of 'baked earth' indicates it has been fired, not left raw."}, {"text": "It would exhibit a distinctive reddish-brown color and earthen texture.", "isCorrect": true, "rationale": "The text explicitly states 'reddish-brown pots and sculptures you see in gardens are literally made of cooked dirt,' linking the etymology to its common appearance and material."}, {"text": "It would be designed to float on water.", "isCorrect": false, "rationale": "The etymology provides no information about buoyancy."}]}, {"question": "The phrase *terra firma* is contrasted with 'the shifting deck of a ship.' This contrast highlights *terra firma*'s meaning as:", "options": [{"text": "A journey across a vast ocean.", "isCorrect": false, "rationale": "The contrast is with the *ship* itself, implying a stable alternative to the ship's motion, not the journey."}, {"text": "A state of instability and motion.", "isCorrect": false, "rationale": "The phrase *terra firma* is *contrasted* with instability, meaning it represents stability."}, {"text": "Solid, stable ground.", "isCorrect": true, "rationale": "The text defines *terra firma* as 'solid ground' and contrasts it with 'the shifting deck of a ship,' emphasizing its stability."}, {"text": "A complex architectural foundation.", "isCorrect": false, "rationale": "While foundations are stable, the definition provided is simply 'solid ground,' not specifically an architectural concept."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
