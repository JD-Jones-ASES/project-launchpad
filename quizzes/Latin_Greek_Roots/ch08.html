        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 8</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The Latin root 'leg/lect' has three related meanings. Which answer correctly lists all three?", "options": [{"text": "to speak, to hear, to write", "isCorrect": false, "rationale": "Those are the meanings of 'voc/dict,' 'aud,' and 'scrib/script.' The root 'leg/lect' means to gather, to read, and to choose."}, {"text": "to gather, to read, and to choose", "isCorrect": true, "rationale": "Latin 'legere' originally meant 'to gather,' expanded to 'to read' (gathering words from a page), and then to 'to choose' (selecting the best from a group)."}, {"text": "to know, to feel, and to see", "isCorrect": false, "rationale": "Those are the meanings of 'cogn,' 'sens/sent,' and 'vis/vid.' The 'leg/lect' root covers gathering, reading, and choosing."}, {"text": "to carry, to make, and to do", "isCorrect": false, "rationale": "Carrying is the meaning of 'ferre,' and making relates to 'fac/fact.' 'leg/lect' covers gathering, reading, and choosing."}], "id": "q01"}, {"question": "If a student's handwriting is 'legible,' what does that mean?", "options": [{"text": "The handwriting looks very beautiful and artistic", "isCorrect": false, "rationale": "Beauty is not what 'legible' means. The word is about whether the writing can be functionally read and understood."}, {"text": "The handwriting can be read; it is clear enough to gather meaning from", "isCorrect": true, "rationale": "'Legible' = 'leg' (read, gather) + '-ible' (able to be): handwriting that is able to be read — clear enough for the eye to gather meaning from."}, {"text": "The handwriting is perfectly spelled and grammatically correct", "isCorrect": false, "rationale": "Correct spelling and grammar are not what 'legible' measures. Legibility is purely about whether the letters are clear enough to be read."}, {"text": "The handwriting is written on official legal paper", "isCorrect": false, "rationale": "Legal paper is not related to 'legible.' 'Legible' and 'legal' share the same root, but 'legible' is about readability, not legal documents."}], "id": "q02"}, {"question": "When you 'select' something, you are literally:", "options": [{"text": "Reading a text carefully from beginning to end", "isCorrect": false, "rationale": "Reading from beginning to end is not 'selecting.' Select uses the prefix 'se-' (apart) + 'lect' (choose) — picking one apart from a group."}, {"text": "Choosing apart — picking one item from among many", "isCorrect": true, "rationale": "'Select' = 'se-' (apart) + 'lect' (choose): to choose something apart from a group; to single out one item as preferred."}, {"text": "Gathering all items and placing them in one location", "isCorrect": false, "rationale": "Gathering all together describes 'collect' (col- + lect), not 'select.' Select means to choose one out, not to bring everything together."}, {"text": "Voting for someone to represent a group", "isCorrect": false, "rationale": "Voting to choose a representative is 'elect' (e- + lect), not 'select.' Select is a more general choosing-apart action."}], "id": "q03"}, {"question": "At school, your teachers sometimes give 'lectures.' Based on the root, what is a lecture literally?", "options": [{"text": "A written test that measures student knowledge", "isCorrect": false, "rationale": "A lecture is not a written test. The root 'lect' means to read or gather — a lecture is a reading aloud to students."}, {"text": "A reading aloud; a professor gathers knowledge and presents it to students", "isCorrect": true, "rationale": "'Lecture' = 'lect' (read, gather) + '-ure' (act of): originally a reading aloud — a professor 'gathers' knowledge and presents it verbally to students."}, {"text": "A gathering of students in one room to take an exam", "isCorrect": false, "rationale": "An exam is not a lecture. A lecture is a presentation of knowledge by a professor, not a test of student knowledge."}, {"text": "A formal document listing the rules of a class", "isCorrect": false, "rationale": "A rules document is not a lecture. Lectures are oral presentations — the root 'lect' is about reading and gathering, not rule-making."}], "id": "q04"}, {"question": "How does 'elect' differ from 'select' even though both come from 'lect' (to choose)?", "options": [{"text": "There is no real difference — they mean the same thing", "isCorrect": false, "rationale": "They have different prefixes that create different nuances. 'Elect' uses 'e-' (out) and 'select' uses 'se-' (apart), giving each its own specific context."}, {"text": "'Elect' means to choose someone out by voting; 'select' means to choose someone apart carefully from a group", "isCorrect": true, "rationale": "'Elect' (e- + lect = choose out) is specifically about choosing by vote — choosing someone out to represent others. 'Select' (se- + lect = choose apart) is a more general careful picking from options."}, {"text": "'Elect' is Latin; 'select' is Greek", "isCorrect": false, "rationale": "Both 'elect' and 'select' are from Latin 'legere/lectus.' Neither comes from Greek."}, {"text": "'Elect' means to choose a book; 'select' means to choose a person", "isCorrect": false, "rationale": "This is not correct — 'elect' refers to voting, not choosing books, and 'select' applies to any careful choice, not just people."}], "id": "q05"}, {"question": "The word 'neglect' contains 'neg-/nec-' (not) + 'lect' (choose, gather). What does neglect mean?", "options": [{"text": "To read something very carefully and slowly", "isCorrect": false, "rationale": "Careful reading is not neglect — it is the opposite. Neglect means to NOT gather or attend to something."}, {"text": "To fail to care for or attend to something; to not pick it up", "isCorrect": true, "rationale": "'Neglect' = 'neg-' (not) + 'lect' (choose, gather): to not choose to pick something up; to fail to give something the attention it needs."}, {"text": "To gather too many things at once", "isCorrect": false, "rationale": "Gathering too much is not neglect. Neglect is the failure to gather or attend to something at all."}, {"text": "To choose the wrong person for a job", "isCorrect": false, "rationale": "Choosing wrongly is not neglect. Neglect means not choosing at all — failing to attend or care for something."}], "id": "q06"}, {"question": "A 'legend' was originally a Latin word meaning 'things to be read.' How did the word shift to its modern meaning of 'an extraordinary story'?", "options": [{"text": "Medieval monks borrowed the word to describe illustrated map keys", "isCorrect": false, "rationale": "While 'legend' does appear on maps today, the modern meaning of 'extraordinary story' developed separately from map usage. The word shifted through the idea of stories worth telling."}, {"text": "Stories so important they had to be read and passed on gradually became stories almost too wonderful to believe", "isCorrect": true, "rationale": "Latin 'legenda' meant 'things to be read.' Over centuries, the word shifted from 'a story worth reading' to 'a story so grand it seems almost too wonderful to be true' — an extraordinary tale."}, {"text": "The word was borrowed from Greek mythology directly", "isCorrect": false, "rationale": "'Legend' is not from Greek. It comes from Latin 'legenda' (things to be read), derived from 'legere' (to read)."}, {"text": "Roman senators used it to describe the speeches most worth memorizing", "isCorrect": false, "rationale": "This is not the word's historical development. 'Legenda' was used for stories to be read aloud, not specifically for Senate speeches."}], "id": "q07"}, {"question": "The word 'legal' comes from the related Latin noun 'lex' (law). How does 'lex' connect to the root 'leg' (to gather, to choose)?", "options": [{"text": "Laws are things you must read, so 'legal' comes from the reading meaning of 'leg'", "isCorrect": false, "rationale": "While laws must be read, the etymology connects 'lex' (law) to the idea of chosen or gathered rules, not specifically reading."}, {"text": "Laws are 'chosen rules' or 'gathered statutes' — rules selected and collected by society", "isCorrect": true, "rationale": "'Lex' (law) connects to 'legere' through the idea of gathering and choosing — laws are the rules chosen and collected by a society. 'Legal' = relating to those chosen/gathered rules."}, {"text": "'Legal' comes from a completely different Latin word with no connection to 'legere'", "isCorrect": false, "rationale": "The chapter specifically explains that the Latin noun 'lex' (law) connects to 'legere' through the idea of gathered and chosen rules."}, {"text": "'Legal' means able to be read — only written laws count as legal", "isCorrect": false, "rationale": "While legibility is connected to the 'leg' root, 'legal' relates to 'lex' (law) and the idea of chosen/gathered rules, not specifically to readability."}], "id": "q08"}, {"question": "What does 'collect' mean, and which prefix does it use?", "options": [{"text": "To choose one item carefully; uses 'col-' meaning single", "isCorrect": false, "rationale": "'Col-' is not 'single' — it is a form of 'con-' meaning together. Choosing carefully from one group is 'select.'"}, {"text": "To bring together; to gather items into a group; uses 'col-/con-' meaning together", "isCorrect": true, "rationale": "'Collect' = 'col-/con-' (together) + 'lect' (gather): to bring together into a group. 'Col-' is the form 'con-' takes before 'l.'"}, {"text": "To read all of something; uses 'col-' meaning all", "isCorrect": false, "rationale": "'Col-' means together (a form of 'con-'), not all. 'Collect' is about gathering together, not reading everything."}, {"text": "To choose a winner by voting; uses 'col-' meaning outward", "isCorrect": false, "rationale": "Choosing by voting is 'elect' (e- + lect). 'Collect' uses 'col-' (together) + 'lect' (gather) to mean bringing things into one place."}], "id": "q09"}, {"question": "Chapter 8 says 'scrib/script' (Ch. 4) and 'leg/lect' (Ch. 8) are two sides of the same coin. What is this coin?", "options": [{"text": "Both roots are about law — 'scrib' for writing laws and 'leg' for the laws themselves", "isCorrect": false, "rationale": "While both roots appear in legal vocabulary, the 'two sides of the same coin' refers to written communication, not law specifically."}, {"text": "Written communication: a scribe writes the words; a reader gathers them from the page", "isCorrect": true, "rationale": "'Scrib/script' is the act of writing and 'leg/lect' is the act of reading — together they complete the entire cycle of written communication: creating text and receiving it."}, {"text": "Both roots deal with speaking — one writes speeches and one reads them aloud", "isCorrect": false, "rationale": "While both have speech connections, the pairing the chapter emphasizes is writing (scrib) and reading (leg) as the two-way cycle of written communication."}, {"text": "Both are Greek roots with the same ultimate meaning", "isCorrect": false, "rationale": "Both are Latin roots, not Greek. And they have different meanings — writing vs. reading/gathering — that complement each other."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
