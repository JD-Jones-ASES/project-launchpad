<script>
var QUESTIONS = [{"question": "According to the text, what additional meaning did the Roman word \"sentire\" encompass beyond mere physical sensation?", "options": [{"text": "The act of remembering past events.", "isCorrect": false, "rationale": "The text does not mention 'sentire' carrying the meaning of remembering past events; it focuses on perception and judgment."}, {"text": "The process of forming a judgment or opinion through careful thought.", "isCorrect": true, "rationale": "The text explicitly states: 'For the Romans, to feel was also to form a judgment — to arrive at an opinion through careful thought.'"}, {"text": "The ability to communicate telepathically.", "isCorrect": false, "rationale": "The text does not attribute telepathic communication to the meaning of 'sentire'."}, {"text": "The capacity for artistic expression.", "isCorrect": false, "rationale": "While feeling can inspire art, 'sentire' itself, as described in the text, did not specifically mean artistic expression."}]}, {"question": "Based on the text, if someone is described as \"sensitive,\" how does this relate to the root \"sens\"?", "options": [{"text": "It means they rely primarily on their sense of smell.", "isCorrect": false, "rationale": "The text states 'sensitive' means feeling things deeply, not exclusively relying on one sense."}, {"text": "It indicates they perceive the world through limited senses.", "isCorrect": false, "rationale": "The text implies a heightened, not limited, capacity for feeling/perception."}, {"text": "It suggests they experience perceptions, both physical and emotional, with greater depth.", "isCorrect": true, "rationale": "The text explains, 'a sensitive person feels things deeply, whether physical touch or emotional experiences,' aligning with a greater depth of perception."}, {"text": "It implies they are easily distracted by sensory input.", "isCorrect": false, "rationale": "The description focuses on the depth of feeling, not the tendency to be distracted."}]}, {"question": "A group of scientists is debating a new theory. Dr. Elena *dissents*, Dr. Ben *consents*, and Dr. Chloe *assents*. Which statement accurately describes their positions based on the text's explanation of these words?", "options": [{"text": "Dr. Elena agrees, Dr. Ben feels neutral, Dr. Chloe disagrees.", "isCorrect": false, "rationale": "This option incorrectly defines the meanings of all three words relative to the text."}, {"text": "Dr. Elena feels apart from the group's opinion, Dr. Ben shares the same judgment, Dr. Chloe nods in agreement.", "isCorrect": true, "rationale": "The text explains: 'When you dissent, you 'feel apart'... to consent is to 'feel together'... To assent is to 'feel toward'... nodding in agreement.' This option accurately reflects these definitions."}, {"text": "Dr. Elena feels toward the theory, Dr. Ben feels apart from it, Dr. Chloe feels neutral.", "isCorrect": false, "rationale": "This option reverses the meanings of dissent and consent, and incorrectly defines assent."}, {"text": "Dr. Elena shares the same judgment, Dr. Ben holds a different opinion, Dr. Chloe feels hesitant.", "isCorrect": false, "rationale": "This option reverses the meanings of dissent and consent, and incorrectly defines assent."}]}, {"question": "Which of the following best exemplifies a 'sentiment' as described in the passage?", "options": [{"text": "The physical sensation of cold water on the skin.", "isCorrect": false, "rationale": "This is a physical sensation related to 'sensus,' not a 'sentiment' which is a feeling or opinion."}, {"text": "The numerical data from a scientific experiment.", "isCorrect": false, "rationale": "Numerical data represents facts, not a 'feeling or opinion' as described for 'sentiment'."}, {"text": "A deeply held belief about the importance of environmental protection.", "isCorrect": true, "rationale": "The text defines 'a sentiment' as 'a feeling or opinion,' making a deeply held belief an excellent example."}, {"text": "The act of measuring the intensity of a sound.", "isCorrect": false, "rationale": "This is an action of measurement or perception, not a 'sentiment' (feeling or opinion)."}]}, {"question": "How does the Latin origin 'sententia' (a considered opinion) logically connect the two modern English meanings of 'sentence' (a judge's punishment and a grammatical unit)?", "options": [{"text": "Both meanings involve a formal declaration made by an authority figure.", "isCorrect": false, "rationale": "While a judge is an authority figure, a grammatical sentence is not necessarily a formal declaration by one."}, {"text": "Both meanings represent a complete and 'felt out' expression of a thought or judgment.", "isCorrect": true, "rationale": "The text states: 'A grammatical sentence is a complete expression of a thought — a finished piece of meaning, fully 'felt out.' A judge's sentence is the opinion she delivers...' Both are complete expressions of judgment/thought."}, {"text": "Both meanings are derived from legal terminology in ancient Rome.", "isCorrect": false, "rationale": "While a judge's sentence has legal ties, a grammatical sentence is not inherently legal terminology."}, {"text": "Both meanings refer to a series of words spoken aloud.", "isCorrect": false, "rationale": "A judge's sentence or a grammatical sentence can be written, not necessarily spoken aloud, and this doesn't capture the 'considered opinion' connection."}]}, {"question": "A chef is developing a new dish. Which aspect of the dish would be considered 'sensory'?", "options": [{"text": "The cost of the ingredients.", "isCorrect": false, "rationale": "The cost of ingredients is financial, not directly related to the five senses."}, {"text": "The nutritional value per serving.", "isCorrect": false, "rationale": "Nutritional value is a scientific/health fact, not something perceived directly by the senses like taste or smell."}, {"text": "The aroma, texture, and visual presentation of the food.", "isCorrect": true, "rationale": "The text defines 'sensory' as relating to the senses. Aroma (smell), texture (touch), and visual presentation (sight) are all directly perceived by the senses."}, {"text": "The historical background of the recipe.", "isCorrect": false, "rationale": "The historical background is informational, not something perceived through the five senses."}]}, {"question": "What is the primary difference in origin between the root \"sens\" and the root \"sent\" as described in the text?", "options": [{"text": "\"Sens\" comes from a noun, while \"sent\" comes from an adjective.", "isCorrect": false, "rationale": "The text specifies grammatical forms, not general word classes in this way."}, {"text": "\"Sens\" derives from the past participle of \"sentire,\" while \"sent\" comes from the verb stem.", "isCorrect": true, "rationale": "The text explicitly states: 'The root sens comes from sensus, the past participle of sentire.' and 'The root sent comes directly from the verb stem.'"}, {"text": "\"Sens\" is Greek in origin, while \"sent\" is Latin.", "isCorrect": false, "rationale": "The entire section focuses on the Latin origins of both roots."}, {"text": "\"Sens\" is an older root than \"sent.\"", "isCorrect": false, "rationale": "The text does not provide information about which root is older, only their specific grammatical derivation from 'sentire'."}]}, {"question": "The Roman understanding of 'sentire' suggests a connection between emotion and intellect. Which modern concept most closely aligns with this Roman perspective?", "options": [{"text": "Intuition as a purely subconscious process.", "isCorrect": false, "rationale": "The Roman view of 'sentire' involves 'careful thought' and forming a 'judgment,' suggesting a more conscious, intellectual process than purely subconscious intuition."}, {"text": "The idea that all emotions are irrational and hinder clear thinking.", "isCorrect": false, "rationale": "The Roman perspective integrates feeling with judgment, implying feeling can be part of rational thought, not solely a hinderance."}, {"text": "Cognitive appraisal theories, where emotions are influenced by how one interprets or judges a situation.", "isCorrect": true, "rationale": "The Roman idea that 'to feel was also to form a judgment' strongly parallels cognitive appraisal, where our thoughts and judgments about events shape our emotional responses."}, {"text": "The belief that physical sensations are entirely separate from mental processes.", "isCorrect": false, "rationale": "The text emphasizes 'sentire' having a 'deeper meaning than mere physical sensation,' implying a connection rather than separation between physical and mental aspects of feeling."}]}, {"question": "If a politician is said to *dissent* from their party's official stance, what can be inferred about their position based on the etymology provided?", "options": [{"text": "They are attempting to unite the party members.", "isCorrect": false, "rationale": "To 'dissent' means to 'feel apart,' which is antithetical to uniting the party."}, {"text": "They share the same judgment as the party, but express it differently.", "isCorrect": false, "rationale": "The text states 'dissent' means 'holding a different opinion,' not just expressing the same one differently."}, {"text": "They hold an opinion that 'feels apart' or differs from the party's shared view.", "isCorrect": true, "rationale": "The text explains that 'When you dissent, you 'feel apart' (dis- + sentire), holding a different opinion,' directly supporting this inference."}, {"text": "They are encouraging others to 'feel toward' their own opinion.", "isCorrect": false, "rationale": "This describes 'assent' or persuasion, not the act of 'dissenting' itself."}]}, {"question": "What is the overarching lesson the author intends to convey by exploring the word family of 'sens' and 'sent' from 'sentire'?", "options": [{"text": "Latin is a dead language with no relevance to modern English.", "isCorrect": false, "rationale": "The entire passage demonstrates the direct and significant relevance of Latin roots to modern English words."}, {"text": "English words often have single, unambiguous meanings that rarely change.", "isCorrect": false, "rationale": "The discussion of 'sentence' having two different modern meanings directly contradicts this statement."}, {"text": "Etymology can reveal surprising and logical connections between seemingly disparate English words, highlighting the depth of their Latin roots.", "isCorrect": true, "rationale": "The passage consistently shows how words like 'sensitive,' 'consent,' and 'sentence' are linked by a common Latin logic, despite their varied modern uses, which is the core message of the section."}, {"text": "Most English words related to senses come from Greek, not Latin.", "isCorrect": false, "rationale": "The entire section focuses on the Latin root 'sentire' and its derivatives in English, not Greek."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
