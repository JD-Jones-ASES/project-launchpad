<script>
var QUESTIONS = [{"question": "What is the primary meaning of the Latin root \"luc / lum / lus\"?", "options": [{"text": "Sound", "isCorrect": false, "rationale": "The provided text explicitly states that the meaning of the root is 'light,' not 'sound'."}, {"text": "Light", "isCorrect": true, "rationale": "The text directly states, 'Meaning: light,' for the root 'luc / lum / lus'."}, {"text": "Water", "isCorrect": false, "rationale": "The provided text explicitly states that the meaning of the root is 'light,' not 'water'."}, {"text": "Earth", "isCorrect": false, "rationale": "The provided text explicitly states that the meaning of the root is 'light,' not 'earth'."}]}, {"question": "Which of the following words is explicitly listed as an example of the 'luc / lum / lus' root in the provided text?", "options": [{"text": "Labyrinth", "isCorrect": false, "rationale": "'Labyrinth' is not listed as an example and does not derive from the root 'luc / lum / lus'."}, {"text": "Luminous", "isCorrect": true, "rationale": "'Luminous' is one of the example words provided directly in the text, demonstrating the use of the 'lumin' variant."}, {"text": "Lush", "isCorrect": false, "rationale": "'Lush' is not listed as an example and does not derive from the root 'luc / lum / lus'."}, {"text": "Lullaby", "isCorrect": false, "rationale": "'Lullaby' is not listed as an example and does not derive from the root 'luc / lum / lus'."}]}, {"question": "Considering the root 'luc / lum / lus' and its meaning, what does the word 'elucidate' most likely mean?", "options": [{"text": "To make difficult", "isCorrect": false, "rationale": "'Elucidate' means to make clear, which is the opposite of making something difficult. The 'luc' variant implies bringing light or clarity."}, {"text": "To make clear or explain", "isCorrect": true, "rationale": "'Elucidate' uses the 'luc' variant, meaning 'light,' and 'e-' often signifies 'out.' Thus, to elucidate means to bring light to something, or to make it clear and explain it."}, {"text": "To darken or obscure", "isCorrect": false, "rationale": "To darken or obscure is the opposite of the meaning implied by the root 'luc' (light)."}, {"text": "To reflect sound", "isCorrect": false, "rationale": "The root 'luc / lum / lus' pertains to light, not sound."}]}, {"question": "Which of the following words does NOT derive from the 'luc / lum / lus' root, despite a superficial resemblance?", "options": [{"text": "Pellucid", "isCorrect": false, "rationale": "'Pellucid' means transparently clear, deriving from 'per-' (through) and 'lucidus' (clear, bright), thus using a form of the 'luc' root."}, {"text": "Illustrate", "isCorrect": false, "rationale": "'Illustrate' is given as an example in the text and comes from 'illustrare' (to enlighten or brighten), using the 'lustr' variant."}, {"text": "Allure", "isCorrect": true, "rationale": "'Allure' means to powerfully attract or charm and originates from Old French 'aleurier' (to entice), having no etymological connection to the 'luc / lum / lus' root or its meaning of light."}, {"text": "Translucent", "isCorrect": false, "rationale": "'Translucent' means allowing light to pass through but not clearly, combining 'trans-' (across) and 'lucere' (to shine), clearly using the 'luc' root."}]}, {"question": "A scientist invents a device called a 'luminometer.' Based on the root 'lum,' what would this device most likely measure?", "options": [{"text": "The amount of sound produced", "isCorrect": false, "rationale": "The root 'lum' (from 'lumen') relates to light, not sound."}, {"text": "The intensity of light", "isCorrect": true, "rationale": "The variant 'lumin' (from 'lumen' meaning light, lamp) combined with '-meter' (to measure) strongly suggests a device for measuring light intensity."}, {"text": "The flow of water", "isCorrect": false, "rationale": "The root 'lum' has no connection to water or its flow."}, {"text": "The density of a material", "isCorrect": false, "rationale": "The root 'lum' has no connection to material density."}]}, {"question": "The root 'luc / lum / lus' originates from Latin words like 'lux' (light), 'lumen' (light, lamp), and 'lustrare' (to brighten, to make shine). What common concept links these Latin origin words?", "options": [{"text": "Strength", "isCorrect": false, "rationale": "While light can be strong, 'strength' is not the unifying concept across all three origin words ('lux', 'lumen', 'lustrare')."}, {"text": "Motion", "isCorrect": false, "rationale": "The origin words primarily relate to light, not motion."}, {"text": "Illumination", "isCorrect": true, "rationale": "All three Latin origin words—'lux' (light), 'lumen' (light, lamp), and 'lustrare' (to brighten, to make shine)—are fundamentally connected by the concept of light and its emission or application, which is illumination."}, {"text": "Growth", "isCorrect": false, "rationale": "The origin words do not relate to the concept of growth."}]}, {"question": "The example word 'illustrate' uses which specific variant of the root 'luc / lum / lus'?", "options": [{"text": "luci", "isCorrect": false, "rationale": "While 'luci' is a variant, 'illustrate' specifically derives from the Latin 'illustrare' (to brighten, make shine), which aligns with the 'lustr' variant."}, {"text": "lumin", "isCorrect": false, "rationale": "While 'lumin' is a variant, 'illustrate' specifically derives from the Latin 'illustrare' (to brighten, make shine), which aligns with the 'lustr' variant."}, {"text": "lustr", "isCorrect": true, "rationale": "The word 'illustrate' is directly related to the Latin 'lustrare' (to brighten, to make shine), indicating it uses the 'lustr' variant of the root."}, {"text": "lux", "isCorrect": false, "rationale": "'Lux' is an origin word for the root, but 'lustr' is the specific variant form used in 'illustrate'."}]}, {"question": "How do the variants 'luci', 'lumin', and 'lustr' relate to the main root 'luc / lum / lus'?", "options": [{"text": "They are completely unrelated roots with different meanings.", "isCorrect": false, "rationale": "The text explicitly states these are 'Variants' of the 'Root: luc / lum / lus,' meaning they share the same core meaning."}, {"text": "They are alternative forms or spellings of the same core root.", "isCorrect": true, "rationale": "Variants of a root are different morphological forms or spellings that all carry the same fundamental meaning, adapting to different word constructions."}, {"text": "They are prefixes that can be attached to the root.", "isCorrect": false, "rationale": "These are forms of the root itself, not separate prefixes that attach to it. Prefixes typically precede a root or stem."}, {"text": "They are only used in very specific, archaic words.", "isCorrect": false, "rationale": "The examples provided (illuminate, lucid, luminous, illustrate) are common, modern words, indicating these variants are not limited to archaic usage."}]}, {"question": "If a new medical procedure is described as 'luminous,' what characteristic would it most likely possess?", "options": [{"text": "It is very painful.", "isCorrect": false, "rationale": "The root 'lum' relates to light, not pain. There is no linguistic basis to infer pain from 'luminous'."}, {"text": "It involves significant sound.", "isCorrect": false, "rationale": "The root 'lum' relates to light, not sound."}, {"text": "It emits light.", "isCorrect": true, "rationale": "'Luminous' directly means emitting or reflecting light, or glowing. Therefore, a luminous procedure would involve light emission."}, {"text": "It is highly experimental.", "isCorrect": false, "rationale": "While a new procedure might be experimental, the term 'luminous' itself only describes its light-emitting quality, not its experimental status."}]}, {"question": "The Latin origin words 'lux' (light) and 'lumen' (light, lamp) for the root 'luc / lum / lus' suggest that the variant 'lum' (as seen in 'luminous') often implies what specific nuance?", "options": [{"text": "A focus on passive light reception.", "isCorrect": false, "rationale": "'Lumen' includes 'lamp,' which is an active source, suggesting more than just passive reception."}, {"text": "A focus on an active source or object of light.", "isCorrect": true, "rationale": "The inclusion of 'lamp' in the definition of 'lumen' indicates that the 'lum' variant often points to an object or source that produces or embodies light, rather than just light in general ('lux')."}, {"text": "A preference for artistic expression.", "isCorrect": false, "rationale": "The specific nuance from 'lumen' (light, lamp) does not directly suggest a preference for artistic expression."}, {"text": "A connection to ancient Roman mythology.", "isCorrect": false, "rationale": "While the root is Latin, the specific distinction between 'lux' and 'lumen' does not point to mythology but to different aspects of light itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
