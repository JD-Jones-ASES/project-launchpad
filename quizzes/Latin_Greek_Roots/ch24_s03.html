    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary reason the textbook section introduces the four Greek roots (psyche, pathos, hydr, therm) together?", "options": [{"text": "To illustrate the complex history of Greek mythology in English literature.", "isCorrect": false, "rationale": "While the myth of Psyche is mentioned, the primary focus of introducing all four roots is not on mythology or literature, but on their contribution to scientific vocabulary."}, {"text": "To demonstrate how the ancient Greeks named and described the invisible forces of nature.", "isCorrect": true, "rationale": "The text explicitly states, 'Each of these roots shows how the ancient Greeks named the invisible forces of nature: the workings of the mind, the depths of human feeling, the flow of water, and the power of heat.'"}, {"text": "To contrast the Greek influence on English with that of Latin roots across various fields.", "isCorrect": false, "rationale": "While comparisons to Latin roots are made, the main reason for presenting these four Greek roots together is to highlight their collective impact on describing natural forces, not primarily for a contrast."}, {"text": "To explain the etymological origins of common words used in everyday conversation.", "isCorrect": false, "rationale": "The text emphasizes the Greek influence on 'English scientific vocabulary,' not just common everyday words, although some derived terms are common."}]}, {"question": "According to the section, what was the chronological progression of meanings for the Greek word 'psyche'?", "options": [{"text": "From 'mind' to 'soul' to 'breath'.", "isCorrect": false, "rationale": "This order is incorrect; 'breath' was the original meaning."}, {"text": "From 'breath' to 'soul' to 'mind'.", "isCorrect": true, "rationale": "The text states, 'The Greek word psyche originally meant “breath” — the sign that someone was alive. Over time, it came to mean “soul” and then “mind.”'"}, {"text": "From 'soul' to 'mind' to 'breath'.", "isCorrect": false, "rationale": "This order is incorrect; 'breath' was the original meaning, and 'soul' preceded 'mind'."}, {"text": "From 'mind' to 'breath' to 'soul'.", "isCorrect": false, "rationale": "This order is incorrect; 'breath' was the original meaning."}]}, {"question": "If a political candidate aims to win over an audience by telling a deeply personal story of struggle and resilience, they are primarily appealing to which rhetorical concept derived from Greek 'pathos'?", "options": [{"text": "Logos, by providing a logical reason to vote for them.", "isCorrect": false, "rationale": "Logos appeals to logic and reason, not personal stories and emotional responses."}, {"text": "Ethos, by establishing their credibility and character.", "isCorrect": false, "rationale": "Ethos relates to the speaker's credibility, while a personal story primarily aims to stir emotions rather than just establish character."}, {"text": "Pathos, by stirring the emotions of the audience.", "isCorrect": true, "rationale": "Aristotle used 'pathos' to describe how a speaker 'stirs the emotions of an audience,' which is precisely the goal of sharing a deeply personal story to gain support."}, {"text": "Psyche, by connecting with the audience's inner mental life.", "isCorrect": false, "rationale": "Psyche relates to the mind or soul; while a personal story might resonate, the primary rhetorical appeal to emotions is pathos."}]}, {"question": "A new industrial process uses a chemical reaction to combine hydrogen and oxygen, resulting in pure water as a byproduct. Based on the given etymology, which Greek-rooted term best describes the *nature* of hydrogen in this reaction?", "options": [{"text": "Hydrant, indicating its ability to store water.", "isCorrect": false, "rationale": "A hydrant is a water outlet, not a description of hydrogen's chemical nature related to water generation."}, {"text": "Hydroscope, implying its role in observing water.", "isCorrect": false, "rationale": "This term is not provided in the text, and 'scope' relates to viewing, not generating."}, {"text": "Hydrogen, meaning it 'generates water'.", "isCorrect": true, "rationale": "The text states, 'Hydrogen is the element that 'generates water' (hydor + genes, born) — when hydrogen burns, it produces water.' This directly describes its role in creating water."}, {"text": "Dehydrator, suggesting it removes water.", "isCorrect": false, "rationale": "A dehydrator removes water; hydrogen *generates* water in this context."}]}, {"question": "The 'rootconnection' section compares Greek 'path' with Latin 'sens/sent'. What is the key distinction the text highlights regarding their contributions to English vocabulary?", "options": [{"text": "Both Greek and Latin roots primarily contributed to scientific vocabulary without significant distinction.", "isCorrect": false, "rationale": "The text makes a clear distinction between the types of vocabulary derived from each root."}, {"text": "Latin roots contributed to medical and psychological terms, while Greek roots focused on personal feelings.", "isCorrect": false, "rationale": "This statement reverses the distinction made in the text."}, {"text": "Greek roots primarily enriched medical and psychological vocabulary, whereas Latin roots contributed words about personal feeling and perception.", "isCorrect": true, "rationale": "The text explicitly states: 'Greek gave us the medical and psychological vocabulary: pathology, empathy, apathy. Latin gave us sensitive and sentiment — words about personal feeling and perception.'"}, {"text": "Greek roots were mainly for engineering terms, and Latin roots for philosophical concepts.", "isCorrect": false, "rationale": "This distinction is not made in the context of 'path' vs. 'sens/sent' and is inaccurate regarding the given examples."}]}, {"question": "A clothing company markets a new line of winter wear designed with advanced materials that trap body heat to keep the wearer warm in extreme cold. Which Greek-rooted adjective would most appropriately describe this clothing line's primary function?", "options": [{"text": "Hydraulic.", "isCorrect": false, "rationale": "Hydraulic relates to water or fluid power, not heat retention."}, {"text": "Pathological.", "isCorrect": false, "rationale": "Pathological relates to disease or suffering, not heat."}, {"text": "Thermal.", "isCorrect": true, "rationale": "The text defines 'therm' as meaning 'heat' and states that 'thermal clothing is designed to hold in your body's heat,' perfectly matching the description."}, {"text": "Psychic.", "isCorrect": false, "rationale": "Psychic relates to the mind or soul, not physical heat."}]}, {"question": "The myth of Psyche, a mortal woman loved by Eros, added what specific dimension to the Greek word 'psyche'?", "options": [{"text": "Its original scientific meaning in psychology.", "isCorrect": false, "rationale": "The myth provided a poetic dimension, while the scientific application came later with '-logy'."}, {"text": "Its primary association with human suffering and disease.", "isCorrect": false, "rationale": "Suffering is associated with 'pathos', not 'psyche'."}, {"text": "A poetic dimension.", "isCorrect": true, "rationale": "The text explicitly states, 'The myth of Psyche... gave the word a poetic dimension.'"}, {"text": "Its practical application in engineering and measurements.", "isCorrect": false, "rationale": "Engineering and measurements are associated with 'hydr' and 'therm', not 'psyche' or its myth."}]}, {"question": "A scientist is working on a device that maintains a precise, constant temperature for sensitive experiments by automatically adjusting heating and cooling elements. Which Greek-rooted term best describes the function of this temperature-regulating device?", "options": [{"text": "Thermometer.", "isCorrect": false, "rationale": "A thermometer measures heat, it does not regulate or keep it at a set level."}, {"text": "Hydrant.", "isCorrect": false, "rationale": "A hydrant is a water outlet, unrelated to heat regulation."}, {"text": "Thermostat.", "isCorrect": true, "rationale": "The text states, 'A thermostat keeps heat 'standing' at a set level (therme + statos, standing),' which perfectly matches the device's function."}, {"text": "Hydrometer.", "isCorrect": false, "rationale": "A hydrometer measures the density of liquids, unrelated to heat regulation, and not directly mentioned in this context."}]}, {"question": "A charity organization launches a campaign showcasing vivid stories of poverty and hardship in a developing country, intending to foster a deep understanding and shared feeling for the experiences of those affected. Which Greek-rooted concept are they primarily trying to cultivate in their audience?", "options": [{"text": "Apathy.", "isCorrect": false, "rationale": "Apathy means a lack of feeling or interest, the opposite of the campaign's goal."}, {"text": "Pathology.", "isCorrect": false, "rationale": "Pathology is the study of disease or suffering, not the emotional response itself."}, {"text": "Sympathy.", "isCorrect": false, "rationale": "Sympathy means 'feeling with' someone. While related, the campaign aims for 'deep understanding and shared feeling for the experiences,' which is better captured by empathy."}, {"text": "Empathy.", "isCorrect": true, "rationale": "The text defines 'empathy' as 'feeling “into” another person's experience,' which aligns with fostering a 'deep understanding and shared feeling for the experiences' of those facing hardship."}]}, {"question": "The section concludes by emphasizing the 'extraordinary range of Greek influence on English scientific vocabulary' contributed by these four roots. Which pairing best exemplifies this broad influence as described in the final sentence?", "options": [{"text": "From the study of disease to the measurement of temperature.", "isCorrect": false, "rationale": "While true, this is a narrower interpretation than the broad statement in the text."}, {"text": "From the workings of the mind to the temperature of the air.", "isCorrect": true, "rationale": "The text concludes: 'With these four roots, the Greeks gave English much of its vocabulary for describing the natural world — from the life of the mind to the temperature of the air.' This option directly quotes and summarizes the breadth."}, {"text": "From the flow of water to the poetic dimension of words.", "isCorrect": false, "rationale": "The poetic dimension is specific to 'psyche' and its myth, not the overarching scientific vocabulary influence of all four roots combined in the concluding statement."}, {"text": "From creating scientific instruments to understanding human emotions.", "isCorrect": false, "rationale": "This is a reasonable summary, but the specific phrasing from the text (mind to air temperature) is more accurate to the question's requirement of 'best exemplifies this broad influence as described in the final sentence'."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
