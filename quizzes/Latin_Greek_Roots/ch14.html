    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 14</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the Latin root 'aqua / aqu' mean?", "options": [{"text": "earth; land", "isCorrect": false, "rationale": "Earth and land are the meanings of the root 'terr/terra' from Chapter 13. Aqua has a different meaning."}, {"text": "water", "isCorrect": true, "rationale": "The Latin word aqua meant water. This root appears in all its English derivatives, which relate to water or watery environments."}, {"text": "light; brightness", "isCorrect": false, "rationale": "Light and brightness belong to the root 'luc/lum/lus' from Chapter 15. Aqua means water."}, {"text": "to carry; to bear", "isCorrect": false, "rationale": "Carrying is the meaning of the root 'fer/lat' from Chapter 12. Aqua means water."}], "id": "q01"}, {"question": "An 'aqueduct' is a structure designed to:", "options": [{"text": "Channel water from one place to another", "isCorrect": true, "rationale": "Aqueduct = aqua (water) + duct (lead, from Chapter 10). An aqueduct leads or channels water — often over long distances from mountain springs to cities."}, {"text": "Dig wells to reach underground water", "isCorrect": false, "rationale": "Digging wells is a different engineering technique. An aqueduct is an above-ground (or bridge-like) structure that channels water."}, {"text": "Store drinking water in large tanks", "isCorrect": false, "rationale": "Storing water in tanks describes a reservoir, not an aqueduct. An aqueduct leads water across distances."}, {"text": "Measure the depth of a body of water", "isCorrect": false, "rationale": "Measuring water depth is not what an aqueduct does. An aqueduct = aqua (water) + duct (lead) — it leads water."}], "id": "q02"}, {"question": "Which previously-learned root is combined with 'aqua' in the word 'aqueduct'?", "options": [{"text": "port (to carry, Chapter 9)", "isCorrect": false, "rationale": "Port means to carry, which is related but not the root in 'aqueduct.' The second part is 'duct' from Chapter 10."}, {"text": "duc/duct (to lead, Chapter 10)", "isCorrect": true, "rationale": "Aqueduct = aqua (water) + duct (lead, Chapter 10). This word is a perfect combination of two roots: water-leading."}, {"text": "fer/lat (to carry, Chapter 12)", "isCorrect": false, "rationale": "Fer/lat is the carrying root from Chapter 12. The second root in aqueduct is duct (to lead) from Chapter 10."}, {"text": "terr/terra (earth, Chapter 13)", "isCorrect": false, "rationale": "Terra means earth/land from Chapter 13. Aqueduct combines aqua (water) with duct (lead) from Chapter 10."}], "id": "q03"}, {"question": "An 'aquifer' is an underground layer that holds and carries water. Which two roots make up this word?", "options": [{"text": "aqua (water) + terr (earth)", "isCorrect": false, "rationale": "While aquifers are underground (related to terra), the second root in aquifer is not terr. It comes from the root fer (to carry)."}, {"text": "aqua (water) + fer (to carry)", "isCorrect": true, "rationale": "Aquifer = aqui (water) + fer (to carry, Chapter 12). An aquifer is a geological formation that carries water underground."}, {"text": "aqua (water) + duct (to lead)", "isCorrect": false, "rationale": "Aqua + duct forms 'aqueduct.' An aquifer combines aqua (water) with fer (to carry) from Chapter 12."}, {"text": "aqua (water) + port (to carry)", "isCorrect": false, "rationale": "Port means to carry (Chapter 9), but the root in aquifer is fer (to carry, Chapter 12)."}], "id": "q04"}, {"question": "An 'aquarium' was originally any water vessel, and now means a place where fish are displayed. Which word best describes its root meaning?", "options": [{"text": "A container or place for water", "isCorrect": true, "rationale": "Aquarium = aqua (water) + -arium (a place or container for). It literally means a place for water — a container designed to hold water and water life."}, {"text": "A channel that leads water", "isCorrect": false, "rationale": "A channel that leads water is an aqueduct. An aquarium is a container that holds water, not a channel."}, {"text": "Land next to a water source", "isCorrect": false, "rationale": "Land next to water would involve the root terr (land). An aquarium is entirely about the water itself."}, {"text": "An underground water carrier", "isCorrect": false, "rationale": "An underground water carrier is an aquifer. An aquarium is a transparent container for displaying aquatic life."}], "id": "q05"}, {"question": "The gemstone 'aquamarine' gets its name because:", "options": [{"text": "It was found in Roman aqueducts", "isCorrect": false, "rationale": "Gemstones were not found in aqueducts. Aquamarine gets its name from its color, which resembles sea water."}, {"text": "Its blue-green color resembles sea water", "isCorrect": true, "rationale": "Aquamarine = aqua (water) + marina (of the sea). The gemstone is named for its color — the blue-green of sunlit seawater."}, {"text": "It was used to purify water in ancient Rome", "isCorrect": false, "rationale": "There is no evidence aquamarine was used to purify water. The name refers to its color resembling seawater."}, {"text": "It is found only in underwater caves", "isCorrect": false, "rationale": "The name comes from the gemstone's color resembling water, not from where it is found."}], "id": "q06"}, {"question": "Something 'aquatic' is described as:", "options": [{"text": "Relating to or living in water", "isCorrect": true, "rationale": "Aquatic = aqua (water) + -tic (relating to). Aquatic things live, grow, or occur in or near water — like aquatic plants or aquatic sports."}, {"text": "Located below the earth's surface", "isCorrect": false, "rationale": "Below the earth's surface is subterranean (from terr, Chapter 13). Aquatic means relating to water, not to underground depths."}, {"text": "Able to survive without water", "isCorrect": false, "rationale": "This is the opposite of the root meaning. Aquatic means relating to or living in water."}, {"text": "Made from baked earth", "isCorrect": false, "rationale": "Baked earth is terracotta (from terra, Chapter 13). Aquatic relates to water."}], "id": "q07"}, {"question": "'Subaqueous' means existing under water. What is the prefix in this word?", "options": [{"text": "aqua- (water)", "isCorrect": false, "rationale": "Aqua is the root, not the prefix. The prefix comes before the root and modifies its meaning. In subaqueous, 'sub-' is the prefix."}, {"text": "sub- (under)", "isCorrect": true, "rationale": "Subaqueous = sub- (under) + aque (water) + -ous. The prefix 'sub-' means under, giving us the meaning 'under water.' This mirrors subterranean (sub- + terr) from Chapter 13."}, {"text": "-ous (full of)", "isCorrect": false, "rationale": "'-ous' is a suffix meaning 'full of' or 'relating to,' not a prefix. The prefix that changes the meaning is 'sub-.'"}, {"text": "medi- (middle)", "isCorrect": false, "rationale": "Medi- (middle) appears in Mediterranean (Chapter 13). The prefix in subaqueous is sub- (under)."}], "id": "q08"}, {"question": "The chapter notes that Rome's famous public baths used millions of gallons of water daily. Which root from this chapter best describes the engineers' achievement?", "options": [{"text": "terr, because the baths were built on solid ground", "isCorrect": false, "rationale": "While the baths were on solid ground, the engineering achievement was the water supply system — described by the root aqua."}, {"text": "aqua, because the entire system was built around carrying and channeling water", "isCorrect": true, "rationale": "The Roman water supply — aqueducts, aquifers, aquatic facilities — all relate to the root aqua (water). The achievement was managing water on a massive scale."}, {"text": "fer, because the workers carried heavy stones to build the baths", "isCorrect": false, "rationale": "While construction involved carrying, the chapter focuses on the water engineering, best captured by aqua."}, {"text": "duct, because of the ducts inside the building", "isCorrect": false, "rationale": "While aqueducts (aqua + duct) were essential, the question asks which root best describes the achievement — and aqua (water) is the core concept here."}], "id": "q09"}, {"question": "How does the word 'aqueduct' demonstrate the power of combining two Latin roots?", "options": [{"text": "It shows that two roots cancel each other's meanings out", "isCorrect": false, "rationale": "Combining roots does not cancel meanings. It adds them together to create a precise, compound meaning."}, {"text": "It shows that knowing multiple roots lets you decode a word's precise meaning", "isCorrect": true, "rationale": "Aqueduct = aqua (water) + duct (lead). A student who knows both roots can immediately understand: it is a structure that leads water. This is the power of root knowledge."}, {"text": "It shows that Roman engineers invented most English words", "isCorrect": false, "rationale": "While Roman engineering inspired many English words, the chapter's point is about how root combinations create precise meanings, not credit for invention."}, {"text": "It shows that some words have no root and must be memorized", "isCorrect": false, "rationale": "The opposite is true — aqueduct is an excellent example of a word that can be decoded entirely from its roots without memorization."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
