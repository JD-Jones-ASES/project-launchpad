        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 10, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary meaning of the Latin root \"duc\" or \"duct\" as observed in the provided word family?", "options": [{"text": "To bring", "isCorrect": false, "rationale": "While some words imply bringing, 'bring' is not the most precise or fundamental meaning of the root. 'To lead' encompasses the various forms of bringing or moving described."}, {"text": "To create", "isCorrect": false, "rationale": "The word 'produce' involves creation, but 'to create' is a specific outcome, not the core meaning of the root 'duc/duct' itself across all words."}, {"text": "To lead", "isCorrect": true, "rationale": "The text explicitly states 'to lead' in the etymology for almost every word (e.g., 'to lead together,' 'to lead out,' 'to lead inward,' 'to lead forward,' 'to lead down,' 'to lead away,' 'leader,' 'water-leading'), making this the primary meaning."}, {"text": "To go", "isCorrect": false, "rationale": "The root implies directed movement ('to lead'), not simply undirected motion ('to go')."}]}, {"question": "A scientist carefully examines a series of experimental results and, through logical reasoning, arrives at a specific conclusion. Which word from the text best describes the scientist's action?", "options": [{"text": "Produce", "isCorrect": false, "rationale": "'Produce' means to bring forth or create, which does not accurately describe the act of arriving at a conclusion through reasoning."}, {"text": "Educate", "isCorrect": false, "rationale": "'Educate' means to teach or draw out knowledge from a learner. While the scientist learns, the specific action of reaching a conclusion via reasoning isn't 'educating' in this context."}, {"text": "Deduce", "isCorrect": true, "rationale": "The definition of 'deduce' is 'to lead down — to reach a conclusion through reasoning,' which perfectly matches the scenario described."}, {"text": "Conduct", "isCorrect": false, "rationale": "'Conduct' means to lead or direct, or to manage or carry out. While a scientist conducts research, the specific act of reaching a conclusion through reasoning is 'deducing'."}]}, {"question": "Considering the prefixes used in words like \"introduce\" and \"educate,\" what does the prefix \"intro-\" signify compared to \"e-\"?", "options": [{"text": "\"Intro-\" means 'out of,' while \"e-\" means 'inward.'", "isCorrect": false, "rationale": "This statement reverses the meanings of the prefixes as presented in the text."}, {"text": "\"Intro-\" means 'inward,' while \"e-\" means 'out of.'", "isCorrect": true, "rationale": "The text states 'intro-duc-e: to lead inward' and 'e-duc-ate: to lead out,' directly confirming these meanings for the prefixes."}, {"text": "Both prefixes mean 'together.'", "isCorrect": false, "rationale": "The prefix 'con-' (as in 'conduct') means 'together,' not 'intro-' or 'e-.'"}, {"text": "Both prefixes mean 'forward.'", "isCorrect": false, "rationale": "The prefix 'pro-' (as in 'produce') means 'forward,' not 'intro-' or 'e-.'"}]}, {"question": "Which of the following words describes a structure specifically designed to transport water over long distances, often involving a bridge-like construction?", "options": [{"text": "Aqueduct", "isCorrect": true, "rationale": "The text defines 'aqueduct' as 'aqu(a)-duct: water-leading — a channel or bridge built to carry water over a distance,' which precisely matches the description."}, {"text": "Conduct", "isCorrect": false, "rationale": "'Conduct' is a verb meaning to lead or direct, not a physical structure for carrying water."}, {"text": "Introduce", "isCorrect": false, "rationale": "'Introduce' means to bring in something new or present a person, not a water-carrying structure."}, {"text": "Produce", "isCorrect": false, "rationale": "'Produce' means to bring forth or create, not a type of infrastructure for water transport."}]}, {"question": "If you are asked to \"_______ a meeting,\" you are being asked to manage or direct it. Which word from the list correctly fills the blank?", "options": [{"text": "Abduct", "isCorrect": false, "rationale": "'Abduct' means to carry off by force, which is inappropriate and incorrect for managing a meeting."}, {"text": "Educate", "isCorrect": false, "rationale": "'Educate' means to teach or draw out knowledge. While a meeting might involve education, it does not mean 'to manage or direct' the meeting itself."}, {"text": "Produce", "isCorrect": false, "rationale": "While one might 'produce an event,' 'produce a meeting' is not the standard idiom for managing or directing it. 'Produce' focuses on creating or bringing forth."}, {"text": "Conduct", "isCorrect": true, "rationale": "The definition of 'conduct' includes 'to lead or direct; to manage or carry out,' which perfectly fits the context of managing or directing a meeting."}]}, {"question": "How does the act of \"educating\" differ fundamentally from \"introducing,\" based on their etymological roots?", "options": [{"text": "Educating focuses on bringing something new, while introducing focuses on drawing out knowledge.", "isCorrect": false, "rationale": "This statement incorrectly swaps the core meanings derived from the prefixes 'e-' (out) and 'intro-' (inward)."}, {"text": "Educating focuses on drawing out knowledge, while introducing focuses on bringing something new or presenting.", "isCorrect": true, "rationale": "The text states 'e-duc-ate: to lead out — to teach; to draw out knowledge from a learner' and 'intro-duc-e: to lead inward — to bring in something new; to present one person to another.' This option accurately reflects these distinct meanings."}, {"text": "Both words primarily describe the act of creating something.", "isCorrect": false, "rationale": "The act of creating is primarily associated with 'produce,' not 'educate' or 'introduce.'"}, {"text": "Educating relates to leadership, while introducing relates to force.", "isCorrect": false, "rationale": "While 'educate' involves a form of leadership, 'introduce' is not related to force. 'Abduct' relates to force."}]}, {"question": "The term \"duke\" originally referred to a military leader. How does this align with the root \"duc\"?", "options": [{"text": "It contradicts the root, as \"duc\" means to lead, not to fight.", "isCorrect": false, "rationale": "Leading troops is a fundamental aspect of a military leader's role, so it does not contradict the root's meaning."}, {"text": "It aligns perfectly, as a military leader's primary role is to \"lead\" troops.", "isCorrect": true, "rationale": "The text states 'duke: duc leader — originally a military leader,' directly connecting the role of a military leader (one who leads) to the root meaning 'duc' (leader/to lead)."}, {"text": "It suggests \"duc\" also means \"to rule,\" which is not explicitly stated.", "isCorrect": false, "rationale": "While leaders often rule, the direct connection given in the text is to 'leader' and 'to lead,' not 'to rule' as a primary root meaning."}, {"text": "The origin of \"duke\" is unrelated to the \"duc\" root.", "isCorrect": false, "rationale": "The text explicitly links 'duke' to 'duc leader,' indicating a clear relationship."}]}, {"question": "A student incorrectly uses the word \"abduct\" in a sentence: \"The director will abduct the new play next month.\" Which word should the student have used, and why?", "options": [{"text": "Deduce, because the director needs to reach a conclusion.", "isCorrect": false, "rationale": "'Deduce' means to reason to a conclusion; this is unrelated to staging a play."}, {"text": "Educate, because the director will teach the actors.", "isCorrect": false, "rationale": "While a director teaches, 'educate the play' is not the correct idiom for bringing a play to the stage. 'Educate' focuses on imparting knowledge."}, {"text": "Produce, because the director will bring forth or create the play.", "isCorrect": true, "rationale": "The definition of 'produce' is 'to lead forward — to bring forth; to make or create,' which accurately describes the act of staging or creating a play for public viewing."}, {"text": "Conduct, because the director will manage the play.", "isCorrect": false, "rationale": "While a director manages, 'conduct the play' is less precise for the act of staging or bringing it into existence than 'produce.'"}]}, {"question": "What is the shared core concept among \"conduct,\" \"educate,\" \"introduce,\" \"produce,\" \"deduce,\" and \"abduct\"?", "options": [{"text": "The act of creating something.", "isCorrect": false, "rationale": "Only 'produce' primarily involves creation. The other words have different core meanings, though they all stem from a common root."}, {"text": "The movement or guidance of something or someone.", "isCorrect": true, "rationale": "All these words are built on the root 'duc/duct' which means 'to lead.' Whether it's leading together (conduct), leading out (educate), leading inward (introduce), leading forward (produce), leading down (deduce), or leading away (abduct), the common thread is a form of movement or guidance."}, {"text": "The process of learning.", "isCorrect": false, "rationale": "Only 'educate' is directly related to learning from the perspective of the learner, not the shared concept across all listed words."}, {"text": "The act of bringing things together.", "isCorrect": false, "rationale": "Only 'conduct' (con- together) explicitly includes 'bringing together' as part of its etymology. Other words have different directional meanings."}]}, {"question": "Which word from the provided list uses a prefix meaning \"away\" to describe the act of forcibly taking someone?", "options": [{"text": "Deduce", "isCorrect": false, "rationale": "The prefix 'de-' in 'deduce' means 'down,' not 'away.'"}, {"text": "Introduce", "isCorrect": false, "rationale": "The prefix 'intro-' in 'introduce' means 'inward,' not 'away.'"}, {"text": "Abduct", "isCorrect": true, "rationale": "The text states 'ab-duct: to lead away — to carry off a person by force; to kidnap.' The prefix 'ab-' signifies 'away,' matching the definition."}, {"text": "Produce", "isCorrect": false, "rationale": "The prefix 'pro-' in 'produce' means 'forward,' not 'away.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
