<script>
var QUESTIONS = [{"question": "Which of the following best defines a 'suppletive pair' as illustrated by the Latin verbs ferre and latus?", "options": [{"text": "Two verbs that share similar spellings and meanings but belong to different tenses.", "isCorrect": false, "rationale": "A suppletive pair consists of forms that are unrelated in their root structure, not just similar in spelling, and specifically function as parts of the same verb, often across different tenses."}, {"text": "Two unrelated word forms that combine to function as a single verb, often for different tenses.", "isCorrect": true, "rationale": "The text explicitly states that 'suppletive pair—two unrelated forms that joined forces to act as one verb,' with ferre (present) and latus (past) as the primary example."}, {"text": "Verbs that can be used interchangeably in both present and past tenses without changing meaning.", "isCorrect": false, "rationale": "Suppletive pairs are distinct forms used for specific tenses or grammatical functions, not interchangeable, and they are not necessarily similar in form."}, {"text": "Words that have evolved to mean the opposite of their original root meaning over time.", "isCorrect": false, "rationale": "This describes semantic shift or antilogy, not a suppletive pair, which is about grammatical forms from different roots for a single verb."}]}, {"question": "The English word 'transfer' means 'carry across.' Based on the text, which Latin root is 'transfer' derived from, and how does its meaning reflect that root?", "options": [{"text": "Derived from 'latus,' meaning 'to be carried across' passively.", "isCorrect": false, "rationale": "The text states that 'transfer' comes from the 'fer' side, meaning 'carry across,' implying an active sense, not specifically passive, and it's not from 'latus'."}, {"text": "Derived from 'ferre,' directly meaning 'to carry across' or 'bear across.'", "isCorrect": true, "rationale": "The text explicitly states: 'From the fer side, we get transfer ('carry across').' The prefix 'trans-' means 'across,' perfectly matching the root 'ferre' (to carry)."}, {"text": "Derived from 'lex,' combining with 'ferre' to mean 'to move a law across.'", "isCorrect": false, "rationale": "'Lex' (law) is mentioned in 'legislate' (from 'latus'), but 'transfer' does not involve 'lex' and is from 'ferre,' not a combination with 'lex.'"}, {"text": "Derived from 'dis,' indicating that something is carried apart or separated.", "isCorrect": false, "rationale": "'Dis-' (apart) is used with 'ferre' to form 'different,' meaning 'carried apart.' While 'ferre' is present, the meaning 'carried across' for 'transfer' does not stem from 'dis-'."}]}, {"question": "Considering the root 'latus' (to carry) and its contributions to English words, which of the following words correctly identifies its root and its corresponding meaning as described in the text?", "options": [{"text": "Fertile, from 'latus,' meaning 'able to carry fruit.'", "isCorrect": false, "rationale": "'Fertile' is derived from the 'fer' side, not 'latus.' While its meaning 'able to bear fruit' aligns with the concept of carrying, the root origin is incorrect based on the text."}, {"text": "Suffer, from 'latus,' meaning 'to carry under a burden.'", "isCorrect": false, "rationale": "'Suffer' is derived from the 'fer' side ('carry under'), not 'latus.' The meaning is correct for 'suffer,' but the root origin is wrong."}, {"text": "Legislate, from 'latus' combined with 'lex,' meaning 'to carry law.'", "isCorrect": true, "rationale": "The text states: 'From the lat side, we get... legislate ('carry law,' from lex + latus),' directly matching this option."}, {"text": "Prefer, from 'latus,' meaning 'to carry something before another.'", "isCorrect": false, "rationale": "'Prefer' is derived from the 'fer' side ('carry before'), not 'latus.' The meaning is correct for 'prefer,' but the root origin is wrong."}]}, {"question": "The word 'different' is analyzed in the text as 'dis-' (apart) + 'ferre' (to carry). What does this etymology reveal about the core meaning of 'different'?", "options": [{"text": "It implies a process of actively moving things away from a central point.", "isCorrect": false, "rationale": "While 'moving things away' is related to 'carried apart,' the primary emphasis is on the state of being separated, rather than an active process."}, {"text": "It suggests that things are distinct because they have been separated or 'carried apart' from each other.", "isCorrect": true, "rationale": "The text explicitly states: 'dis- (apart) + ferre (to carry) means “carried apart”—things that are different have been separated from each other.' This perfectly captures the derived meaning."}, {"text": "It highlights the difficulty of bearing the weight of disparate ideas.", "isCorrect": false, "rationale": "This interpretation introduces a metaphorical 'bearing weight' that is not supported by the etymology provided, which focuses on physical or conceptual separation."}, {"text": "It refers to the act of carrying multiple distinct items simultaneously.", "isCorrect": false, "rationale": "This implies multiplicity within a single act of carrying, which doesn't align with 'carried apart' as defining 'different.' 'Different' is about the state of being separate, not the act of carrying many."}]}, {"question": "The text notes that Latin speakers used 'ferre' and 'latus' 'without complaint.' What does this suggest about the nature of language evolution and usage?", "options": [{"text": "Speakers are generally unaware of the etymological origins of the words they use.", "isCorrect": false, "rationale": "While true that speakers might not know specific etymologies, the point is more about the practical acceptance of functional language structures, regardless of their 'strangeness' to linguists."}, {"text": "The practicality and utility of words in communication often outweigh their logical consistency or historical origins.", "isCorrect": true, "rationale": "The 'strangeness' of the suppletive pair did not hinder its practical use for centuries. This highlights that if a linguistic structure serves its communicative purpose effectively, speakers adopt it without dwelling on its origins or 'illogical' nature."}, {"text": "Latin was a highly structured language where irregularities were rare and easily assimilated.", "isCorrect": false, "rationale": "The text explicitly calls this a 'strangest' quirk and an 'unusual partnership,' contradicting the idea of Latin being free of irregularities."}, {"text": "Linguists often overemphasize the 'quirks' of language that are normal for native speakers.", "isCorrect": false, "rationale": "While implied, the core suggestion is not about linguists' emphasis, but about how speakers perceive and utilize language despite its apparent 'messiness' from an analytical perspective."}]}, {"question": "The etymnote highlights that English has its own suppletive pairs like 'go' and 'went.' What broader principle about language does this illustrate?", "options": [{"text": "All languages universally borrow irregular verb forms from each other.", "isCorrect": false, "rationale": "While languages do borrow, the examples given are internal developments within English and Latin, not necessarily direct borrowing from other languages for these specific irregularities."}, {"text": "Irregularities and forms from unrelated roots are common and natural occurrences in language evolution.", "isCorrect": true, "rationale": "The text uses phrases like 'Languages are messy—and that is part of what makes them fascinating,' reinforcing that such 'quirks' and 'unrelated forms' are a natural part of language development across different languages, not just unique to Latin."}, {"text": "Modern English is becoming more irregular than ancient languages due to its global reach.", "isCorrect": false, "rationale": "The text compares ancient Latin to modern English, showing that such irregularities exist in both, not that modern English is uniquely or increasingly irregular compared to ancient languages."}, {"text": "Linguists often invent 'suppletive pairs' to categorize complex grammatical structures.", "isCorrect": false, "rationale": "Linguists identify and label existing phenomena; they do not invent them. The concept of suppletion describes a real linguistic feature."}]}, {"question": "If a new English word, 'interfer,' were coined to mean 'to carry between' or 'to bring into an intervening position,' based on the patterns discussed, what would be its most likely Latin root origin?", "options": [{"text": "From the 'latus' side, due to its emphasis on position and placement.", "isCorrect": false, "rationale": "Words like 'relate' (carry back) and 'translate' (carry across) from 'latus' do involve movement or connection, but 'interfer' specifically uses 'fer,' pointing to the 'ferre' root. 'Inter-' means 'between'."}, {"text": "From the 'ferre' side, combining with the prefix 'inter-' (between).", "isCorrect": true, "rationale": "The text clearly states that words like 'transfer' and 'prefer' come from 'ferre.' 'Inter-' means 'between,' so 'interfer' would logically derive from 'ferre' ('to carry') plus 'inter-' ('between')."}, {"text": "From a new, unrelated root, as 'interfer' suggests a unique action.", "isCorrect": false, "rationale": "The question asks to apply *patterns discussed*, and the pattern is combining prefixes with established roots like 'ferre' or 'latus'."}, {"text": "From the root 'go,' as it implies movement between places.", "isCorrect": false, "rationale": "'Go' is an example of an English suppletive pair for its past tense ('went'), but it's not a Latin root for coining new words in the manner described."}]}, {"question": "The two separate-looking families of words from 'ferre' and 'latus' both share a common core meaning. What is this shared meaning?", "options": [{"text": "To speak or to tell stories.", "isCorrect": false, "rationale": "The words discussed relate to carrying, bringing, or bearing, not primarily to speaking or telling stories."}, {"text": "To bring, bear, or carry.", "isCorrect": true, "rationale": "The text consistently defines 'ferre' as 'to carry' and describes words from both 'fer' and 'lat' sides with meanings like 'carry across,' 'bear fruit,' 'carry back,' and 'carry law,' all revolving around the concept of carrying or bearing."}, {"text": "To separate or distinguish.", "isCorrect": false, "rationale": "While 'different' (carried apart) involves separation, this is a specific derived meaning of one word, not the overarching shared meaning of the entire word family."}, {"text": "To create or to produce.", "isCorrect": false, "rationale": "While 'fertile' means 'able to bear fruit or offspring,' which is related to producing, this is a specific nuance, not the broad core meaning shared by all words from both roots."}]}, {"question": "Which of the following English verbs is presented in the 'etymnote' as an example of a suppletive pair, demonstrating how language forms can be unrelated?", "options": [{"text": "Run and Ran", "isCorrect": false, "rationale": "'Run' and 'ran' are related forms (strong verb conjugation) and do not come from entirely different, unrelated roots, unlike suppletive pairs."}, {"text": "Go and Went", "isCorrect": true, "rationale": "The etymnote explicitly states: 'The past tense of go is went (originally from the verb wend),' identifying it as an English suppletive pair."}, {"text": "See and Saw", "isCorrect": false, "rationale": "'See' and 'saw' are related forms (strong verb conjugation) and do not come from entirely different, unrelated roots."}, {"text": "Walk and Walked", "isCorrect": false, "rationale": "'Walk' and 'walked' are regular verb conjugations, clearly related, and not a suppletive pair."}]}, {"question": "The existence of suppletive pairs like 'ferre'/'latus' and 'go'/'went' challenges the notion that:", "options": [{"text": "All grammatical forms of a single verb must have a logically consistent and transparent etymological relationship.", "isCorrect": true, "rationale": "Suppletive pairs directly contradict this notion by showing that different forms of a single verb can originate from entirely unrelated roots, demonstrating that grammatical function can trump etymological consistency."}, {"text": "Language evolution is entirely random and unpredictable.", "isCorrect": false, "rationale": "While 'messy,' language evolution follows patterns; suppletion is a recognized pattern, not pure randomness. This option is too extreme."}, {"text": "Etymology is irrelevant to understanding the current meaning of words.", "isCorrect": false, "rationale": "Etymology, even of suppletive pairs, offers insights into how words acquired their present meaning, as seen with 'different' or the 'carry' concept. It's not irrelevant."}, {"text": "Latin and English are structurally dissimilar languages.", "isCorrect": false, "rationale": "The text highlights a *similarity* between Latin and English by showing both possess suppletive pairs, albeit with different examples."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
