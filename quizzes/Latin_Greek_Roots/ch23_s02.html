<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 23, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'phon' mean?", "options": [{"text": "Light", "isCorrect": false, "rationale": "Light = photos."}, {"text": "Sound, voice", "isCorrect": true, "rationale": "From Greek phone."}, {"text": "Time", "isCorrect": false, "rationale": "Time = chron."}, {"text": "Earth", "isCorrect": false, "rationale": "Earth = geo."}]}, {"question": "What does 'chron' mean?", "options": [{"text": "Sound", "isCorrect": false, "rationale": "Sound = phon."}, {"text": "Time", "isCorrect": true, "rationale": "From Greek chronos."}, {"text": "Color", "isCorrect": false, "rationale": "Color = chroma."}, {"text": "Writing", "isCorrect": false, "rationale": "Writing = graph."}]}, {"question": "'Phon' originates from?", "options": [{"text": "Chronos", "isCorrect": false, "rationale": "Gives chron."}, {"text": "Phone (sound, voice)", "isCorrect": true, "rationale": "Stated in text."}, {"text": "Photos", "isCorrect": false, "rationale": "Relates to light."}, {"text": "Pathos", "isCorrect": false, "rationale": "Gives path."}]}, {"question": "What variants does 'phon' take?", "options": [{"text": "phono, phony (as in cacophony)", "isCorrect": true, "rationale": "Listed in text."}, {"text": "chrono, chronic", "isCorrect": false, "rationale": "Variants of chron."}, {"text": "grapho, graphy", "isCorrect": false, "rationale": "Variants of graph."}, {"text": "photo, photic", "isCorrect": false, "rationale": "Relate to light."}]}, {"question": "Which is a derivative of 'phon'?", "options": [{"text": "Chronology", "isCorrect": false, "rationale": "From chron."}, {"text": "Symphony", "isCorrect": true, "rationale": "Listed as example."}, {"text": "Photograph", "isCorrect": false, "rationale": "From photos + graph."}, {"text": "Anachronism", "isCorrect": false, "rationale": "From chron."}]}, {"question": "'Chron' originates from?", "options": [{"text": "Phone", "isCorrect": false, "rationale": "Gives phon."}, {"text": "Chronos (time)", "isCorrect": true, "rationale": "Stated."}, {"text": "Chroma", "isCorrect": false, "rationale": "Relates to color."}, {"text": "Graphein", "isCorrect": false, "rationale": "Gives graph."}]}, {"question": "Which is a derivative of 'chron'?", "options": [{"text": "Telephone", "isCorrect": false, "rationale": "From phon."}, {"text": "Anachronism", "isCorrect": true, "rationale": "Listed as example."}, {"text": "Euphony", "isCorrect": false, "rationale": "From phon."}, {"text": "Microphone", "isCorrect": false, "rationale": "From phon."}]}, {"question": "What variant does 'chron' take in compounds?", "options": [{"text": "phono", "isCorrect": false, "rationale": "Variant of phon."}, {"text": "chrono", "isCorrect": true, "rationale": "Stated in text."}, {"text": "graphy", "isCorrect": false, "rationale": "Variant of graph."}, {"text": "chronic", "isCorrect": false, "rationale": "A derivative, not variant."}]}, {"question": "Both roots come from?", "options": [{"text": "Latin", "isCorrect": false, "rationale": "Both Greek."}, {"text": "Greek", "isCorrect": true, "rationale": "phone and chronos."}, {"text": "French", "isCorrect": false, "rationale": "Greek."}, {"text": "Arabic", "isCorrect": false, "rationale": "Greek."}]}, {"question": "Combining phon (sound) + chron (time) would describe?", "options": [{"text": "Capturing light over time", "isCorrect": false, "rationale": "Light = photos."}, {"text": "The timing or rhythm of sounds", "isCorrect": true, "rationale": "Sound + time = temporal aspect of sound."}, {"text": "Ancient earth formations", "isCorrect": false, "rationale": "Earth = geo."}, {"text": "Temperature records", "isCorrect": false, "rationale": "Temperature = therm."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
