<script>
var QUESTIONS = [{"question": "According to the text, what are the two primary Latin roots from which English has inherited words related to 'life' and 'to live'?", "options": [{"text": "mort and mor", "isCorrect": false, "rationale": "These roots mean 'death,' as explicitly mentioned in the 'rootconnection' section as a contrast to 'life,' not the roots for 'life' itself."}, {"text": "vita and vivere", "isCorrect": true, "rationale": "The first paragraph states, 'language wrapped the concept into two small but powerful roots: vita, meaning “life,” and vivere, meaning “to live.”'"}, {"text": "vitae and vivis", "isCorrect": false, "rationale": "While related, these are not the specific primary root forms for 'life' and 'to live' as identified in the text. The text explicitly names 'vita' and 'vivere'."}, {"text": "actus and contemplatus", "isCorrect": false, "rationale": "These are related to Cicero's concepts of 'active' and 'contemplative' life, but they are not the fundamental roots for 'life' and 'to live' themselves."}]}, {"question": "Which of the following scenarios best exemplifies a 'vital' decision as described in the text?", "options": [{"text": "Choosing a dessert at a restaurant.", "isCorrect": false, "rationale": "This is a minor personal preference and not 'essential to life' or having life-altering consequences."}, {"text": "Deciding whether to wear a red or blue shirt for a casual outing.", "isCorrect": false, "rationale": "This is a trivial decision with no significant impact on life or well-being."}, {"text": "A medical team determining the correct dosage for a life-saving medication.", "isCorrect": true, "rationale": "The text defines 'vital' as 'essential to life,' citing 'a vital decision.' A decision impacting life-saving medication directly relates to preserving life and is thus vital."}, {"text": "Selecting a new ringtone for a mobile phone.", "isCorrect": false, "rationale": "This is a non-essential personal customization and has no bearing on one's 'life' in the sense of being critical or essential."}]}, {"question": "Cicero's distinction between `vita activa` and `vita contemplativa` primarily emphasizes which Roman value?", "options": [{"text": "The importance of physical health over mental well-being.", "isCorrect": false, "rationale": "The distinction is about modes of living (public service vs. study), not a comparison of physical and mental health."}, {"text": "The belief that one must choose between public service and personal study as equally valid ways to live.", "isCorrect": true, "rationale": "The text states, 'For the Romans, choosing how to live was the most important question a person could face,' highlighting that both active public service and contemplative study were distinct, significant choices for a fulfilling life."}, {"text": "The preference for military conquest over philosophical debate.", "isCorrect": false, "rationale": "Military conquest is not mentioned in the context of Cicero's distinction; the contrast is between public service and study/reflection."}, {"text": "The idea that reflection is superior to active participation in society.", "isCorrect": false, "rationale": "The text presents them as two distinct, important choices, not implying one is superior to the other."}]}, {"question": "The `vit` and `viv` roots are explicitly contrasted with which other root family mentioned in the text?", "options": [{"text": "Act and con", "isCorrect": false, "rationale": "These are parts of 'active' and 'contemplative' but not a separate root family contrasted with 'life'."}, {"text": "Amin and ate", "isCorrect": false, "rationale": "These are parts of the word 'amine' and 'vitamin' but not a contrasting root family."}, {"text": "Mort and mor", "isCorrect": true, "rationale": "The 'rootconnection' section explicitly states, 'The roots vit and viv (life) pair naturally with mort and mor (death)... cover one of the oldest contrasts in human language: the living and the dead, the mortal and the immortal.'"}, {"text": "Sur and re", "isCorrect": false, "rationale": "These are prefixes (e.g., 'survive,' 'revive') that modify roots, not a separate contrasting root family for 'death'."}]}, {"question": "If an artist is described as having a 'vivid imagination,' what does this most likely mean about their creative process?", "options": [{"text": "They prefer to work with muted, dull colors.", "isCorrect": false, "rationale": "The text states 'vivid is so bright and intense that it seems alive,' which contradicts the idea of preferring muted or dull colors."}, {"text": "Their ideas are extraordinarily clear, intense, and full of life.", "isCorrect": true, "rationale": "The text defines 'vivid' as 'so bright and intense that it seems alive.' Applied to imagination, this means ideas are clear, intense, and lively."}, {"text": "They struggle to visualize new concepts.", "isCorrect": false, "rationale": "A 'vivid imagination' implies the opposite: a strong ability to visualize clearly and intensely."}, {"text": "They primarily focus on realistic and mundane subjects.", "isCorrect": false, "rationale": "While vividness can apply to realism, 'intense' and 'alive' suggest a capacity for striking, impactful, and often imaginative concepts, not necessarily mundane ones."}]}, {"question": "What is the fundamental difference in meaning between 'revive' and 'survive' as derived from the root `vivere`?", "options": [{"text": "'Revive' implies a continuation of life after a struggle, while 'survive' means to bring something back from a state of decline.", "isCorrect": false, "rationale": "This swaps the definitions. 'Revive' is to bring back to life, and 'survive' is to live beyond a danger."}, {"text": "'Revive' focuses on overcoming a danger independently, whereas 'survive' involves communal effort.", "isCorrect": false, "rationale": "The text does not specify independence or communal effort as defining features of either word's core meaning."}, {"text": "'Revive' means to restore life or vitality to something, while 'survive' means to continue to live or exist after a difficult experience.", "isCorrect": true, "rationale": "The text states: 'To revive is to bring something 'back to life'' and 'to survive is to 'live beyond' a danger, carrying on after others have fallen away.' This option accurately captures those distinct meanings."}, {"text": "'Revive' is about creating new life, while 'survive' is about preserving old traditions.", "isCorrect": false, "rationale": "'Revive' is about restoring, not creating new life. While 'survive' can apply to traditions, its primary meaning is to continue living or existing after a threat."}]}, {"question": "Casimir Funk included 'amine' in the original coining of 'vitamin' because he believed these substances were primarily what?", "options": [{"text": "A type of metal found in living organisms.", "isCorrect": false, "rationale": "The text states 'amine' is 'a type of chemical compound,' not a metal."}, {"text": "Specific chemical compounds that were essential for life.", "isCorrect": true, "rationale": "The text explains, 'He believed these substances were vital amines — chemicals essential for life,' directly linking the 'amine' part to their chemical nature and essential function."}, {"text": "Directly derived from animal products, specifically amines.", "isCorrect": false, "rationale": "The text identifies 'amine' as a chemical compound type, not as being specifically derived from animal products, although vitamins can be found in them."}, {"text": "Non-essential nutrients that enhanced vitality.", "isCorrect": false, "rationale": "He believed they were 'vital' and 'essential for life,' contradicting the idea of them being non-essential."}]}, {"question": "Which characteristic would most likely describe a 'vivacious' person at a social gathering?", "options": [{"text": "Quiet, reserved, and observant.", "isCorrect": false, "rationale": "These traits are opposite to the definition of 'vivacious,' which implies overflowing liveliness."}, {"text": "Energetic, lively, and full of enthusiasm.", "isCorrect": true, "rationale": "The text defines a 'vivacious' person as one who 'practically overflows with liveliness,' which is synonymous with being energetic, lively, and enthusiastic."}, {"text": "Moody, withdrawn, and easily bored.", "isCorrect": false, "rationale": "These characteristics describe someone lacking liveliness, directly contrary to 'vivacious.'"}, {"text": "Calm, stoic, and serious-minded.", "isCorrect": false, "rationale": "While these can be positive traits, they do not align with the 'overflowing with liveliness' aspect of being vivacious."}]}, {"question": "Based on the text, why would the Romans consider a 'convivial' gathering a significant way to celebrate life?", "options": [{"text": "It allowed individuals to demonstrate their wealth and status.", "isCorrect": false, "rationale": "While feasts might involve displays of wealth, the text's specific rationale for 'convivial' gatherings is about 'sharing food and drink' to 'celebrate being alive,' not status."}, {"text": "It provided an opportunity for quiet study and personal reflection.", "isCorrect": false, "rationale": "A 'convivial gathering' as a 'feast' implies social interaction and shared enjoyment, not quiet contemplation."}, {"text": "They believed that communal sharing of food and drink fostered a collective enjoyment of being alive.", "isCorrect": true, "rationale": "The 'etymnote' states, 'The Romans believed that sharing food and drink was one of the best ways to celebrate being alive!' This directly supports the idea of communal enjoyment."}, {"text": "Such gatherings were primarily for debating philosophical concepts.", "isCorrect": false, "rationale": "While Romans might debate at gatherings, the definition of 'convivial' and 'convivium' in the text emphasizes 'enjoy life together' and 'a feast,' not primarily debate."}]}, {"question": "Considering all the words derived from `vita` and `vivere` discussed, what does the text collectively suggest about the ancient Roman perspective on 'life'?", "options": [{"text": "Life was primarily a struggle for survival against external threats.", "isCorrect": false, "rationale": "While 'survive' implies overcoming threats, the text also highlights active choices, vibrant experiences, and communal enjoyment, suggesting a broader perspective than just struggle."}, {"text": "Life was a passive state, best experienced through quiet contemplation.", "isCorrect": false, "rationale": "The text includes 'vita activa' and words like 'vivid' and 'vivacious,' which contradict a purely passive or quiet view of life."}, {"text": "Life was a multifaceted concept encompassing essential needs, active engagement, vibrant experiences, and shared communal enjoyment.", "isCorrect": true, "rationale": "The text covers 'vital' (essential needs), 'vita activa' (active engagement), 'vivid'/'vivacious' (vibrant experiences), and 'convivial' (shared communal enjoyment), showing a rich, comprehensive Roman view of life."}, {"text": "Life was defined solely by one's contribution to public service.", "isCorrect": false, "rationale": "While 'vita activa' (public service) was important, the text explicitly mentions 'vita contemplativa' and words like 'vivid' and 'convivial,' demonstrating that life encompassed more than just public service."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
