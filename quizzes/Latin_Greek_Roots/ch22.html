<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 22</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the Greek root geo mean?", "options": [{"text": "water", "isCorrect": false, "rationale": "Water is the meaning of Greek hydr, not geo."}, {"text": "earth or land", "isCorrect": true, "rationale": "Geo comes from Greek ge, meaning 'earth.'"}, {"text": "life", "isCorrect": false, "rationale": "Life is the meaning of Greek bio, not geo."}, {"text": "measure", "isCorrect": false, "rationale": "Measure is the meaning of Greek metron, not geo."}]}, {"question": "The Greek scholar Eratosthenes called his work geographia. What does geography literally mean?", "options": [{"text": "the measurement of the earth", "isCorrect": false, "rationale": "Earth-measuring is geometry, not geography."}, {"text": "the study of the earth's rocks", "isCorrect": false, "rationale": "The study of rocks is geology, not geography."}, {"text": "earth-writing or a written description of the world", "isCorrect": true, "rationale": "Geography = geo (earth) + -graphy (writing, description): Eratosthenes was literally 'writing' a description of the world."}, {"text": "drawing a map of the stars", "isCorrect": false, "rationale": "Stars relate to astro-, not geo-."}]}, {"question": "Geometry was originally developed by Egyptian surveyors. What does the word geometry literally mean?", "options": [{"text": "earth-measuring", "isCorrect": true, "rationale": "Geometry = geo (earth) + metron (measure): surveyors developed it to re-draw property boundaries after the Nile flooded."}, {"text": "earth-writing", "isCorrect": false, "rationale": "Earth-writing is geography (geo + graphy), not geometry."}, {"text": "earth-studying", "isCorrect": false, "rationale": "Earth-studying would be geology (geo + logy), not geometry."}, {"text": "shape-drawing", "isCorrect": false, "rationale": "While geometry involves shapes, its literal meaning is earth-measuring."}]}, {"question": "What does the Greek root graph / graphein mean?", "options": [{"text": "to speak or to say", "isCorrect": false, "rationale": "To speak or say relates to phon or dic, not graph."}, {"text": "to write or to draw", "isCorrect": true, "rationale": "Graph comes from Greek graphein, meaning 'to write' or 'to draw.'"}, {"text": "to measure or to calculate", "isCorrect": false, "rationale": "To measure is the meaning of metron, not graph."}, {"text": "to study or to observe", "isCorrect": false, "rationale": "To study relates to -logy, not graph."}]}, {"question": "A photograph is literally 'light-writing.' Which Greek word provides the 'light' part of photograph?", "options": [{"text": "geo", "isCorrect": false, "rationale": "Geo means earth, not light."}, {"text": "photos", "isCorrect": true, "rationale": "Photograph = photos (light) + graphein (to write/draw): a photograph is created by capturing light."}, {"text": "tele", "isCorrect": false, "rationale": "Tele means far, as in telegram (far-writing)."}, {"text": "auto", "isCorrect": false, "rationale": "Auto means self, as in autograph."}]}, {"question": "An autograph is your own signature. The prefix auto- in autograph means:", "options": [{"text": "official", "isCorrect": false, "rationale": "Official is not the meaning of auto-."}, {"text": "self", "isCorrect": true, "rationale": "Auto- means 'self': autograph = auto- (self) + graph (to write) — your own personal handwriting or signature."}, {"text": "original", "isCorrect": false, "rationale": "Original is not the core meaning of auto-."}, {"text": "important", "isCorrect": false, "rationale": "Important is not the meaning of auto-."}]}, {"question": "A telegram was a message sent over great distances. The prefix tele- means:", "options": [{"text": "fast or quick", "isCorrect": false, "rationale": "Fast or quick is not the meaning of tele-."}, {"text": "electric", "isCorrect": false, "rationale": "Electric is not the meaning of tele-."}, {"text": "far", "isCorrect": true, "rationale": "Tele- means 'far': telegram = tele- (far) + gram (something written) — a written message sent over great distances."}, {"text": "small", "isCorrect": false, "rationale": "Small is the meaning of micro-, not tele-."}]}, {"question": "A diagram helps explain how something works. The prefix dia- in diagram means:", "options": [{"text": "between or through, across", "isCorrect": true, "rationale": "Dia- means 'through' or 'across': a diagram is something 'drawn across' to show relationships or processes."}, {"text": "two", "isCorrect": false, "rationale": "Two is the meaning of di- or bi-, not dia-."}, {"text": "above", "isCorrect": false, "rationale": "Above is the meaning of super- or hyper-, not dia-."}, {"text": "equal", "isCorrect": false, "rationale": "Equal is not the meaning of dia-."}]}, {"question": "How do Greek geo (earth) and Latin terr (earth) divide their territory in English vocabulary?", "options": [{"text": "Geo creates words about science; terr creates everyday words about land and landscape.", "isCorrect": true, "rationale": "Latin terr gave everyday words like terrain and territory; Greek geo gave scientific vocabulary like geography, geology, and geometry."}, {"text": "Geo creates words about water; terr creates words about soil.", "isCorrect": false, "rationale": "Both geo and terr relate to earth/land, not water."}, {"text": "Geo is older than terr and therefore creates more words.", "isCorrect": false, "rationale": "Age does not determine how many words a root produces."}, {"text": "Geo and terr produce identical word families in English.", "isCorrect": false, "rationale": "They produce different word families used in different contexts."}]}, {"question": "Which word means 'relating to visual art, drawing, or vivid description'?", "options": [{"text": "geography", "isCorrect": false, "rationale": "Geography is the study of Earth's surface, not an adjective for visual art."}, {"text": "autograph", "isCorrect": false, "rationale": "Autograph specifically means a personal signature, not a general term for visual art."}, {"text": "graphic", "isCorrect": true, "rationale": "Graphic = graph (to write, to draw) + -ic (relating to): relating to visual art, drawing, or vivid description."}, {"text": "diagram", "isCorrect": false, "rationale": "Diagram is a specific type of drawing used to explain something, not a general adjective."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
