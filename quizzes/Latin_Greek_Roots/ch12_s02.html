<div class="quiz-container">

        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 12, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary meaning of the Latin root pair \"fer / lat\"?", "options": [{"text": "To stand, to place", "isCorrect": false, "rationale": "The meaning 'to stand, to place' is associated with roots like 'sta' or 'pos', not 'fer / lat'."}, {"text": "To see, to look", "isCorrect": false, "rationale": "The meaning 'to see, to look' is associated with roots like 'vid' or 'spec', not 'fer / lat'."}, {"text": "To carry, to bear, to bring", "isCorrect": true, "rationale": "The section explicitly states that 'fer / lat' means 'to carry, to bear, to bring' from its Latin origin."}, {"text": "To speak, to tell", "isCorrect": false, "rationale": "The meaning 'to speak, to tell' is associated with roots like 'dic' or 'loq', not 'fer / lat'."}]}, {"question": "From which language does the root pair \"fer / lat\" originate?", "options": [{"text": "Greek", "isCorrect": false, "rationale": "While many English roots come from Greek, 'fer / lat' is explicitly identified as Latin."}, {"text": "Old English", "isCorrect": false, "rationale": "Old English is a Germanic language, and 'fer / lat' is a Latin root."}, {"text": "Latin", "isCorrect": true, "rationale": "The section clearly states 'Language of Origin: Latin (ferre, to carry; past participle latus, carried)'."}, {"text": "French", "isCorrect": false, "rationale": "French is a Romance language derived from Latin, but the direct origin of the root is Latin, not French."}]}, {"question": "The text describes \"fer\" and \"lat\" as a \"suppletive pair.\" What does this linguistic term imply about their relationship?", "options": [{"text": "They are synonyms derived from the same original word.", "isCorrect": false, "rationale": "While they share a meaning, being a suppletive pair means they come from *different* original words, not the same one."}, {"text": "They are antonyms that evolved from related but distinct sources.", "isCorrect": false, "rationale": "Suppletive pairs share meaning and function (e.g., present/past forms) rather than being antonyms."}, {"text": "They are different forms (present and past) that come from entirely different original words.", "isCorrect": true, "rationale": "The definition provided states they are 'a suppletive pair where the present and past forms come from different original words.' 'Fer' is the present stem and 'lat' is the past participle stem."}, {"text": "They are homophones that happen to share a similar meaning.", "isCorrect": false, "rationale": "Homophones are words that sound alike but may have different meanings and origins; 'fer' and 'lat' do not sound alike."}]}, {"question": "Based on the root \"fer\" and common prefixes, what is the most likely meaning of the word \"transfer\"?", "options": [{"text": "To stand firm in a place", "isCorrect": false, "rationale": "This meaning would involve a root related to 'stand' or 'place', not 'fer' (carry)."}, {"text": "To move or carry something across", "isCorrect": true, "rationale": "The prefix 'trans-' means 'across' and the root 'fer' means 'to carry', so 'transfer' means 'to carry across'."}, {"text": "To prefer one thing over another", "isCorrect": false, "rationale": "While 'prefer' uses 'fer', 'transfer' has a different prefix ('trans-' vs 'pre-') leading to a different specific meaning."}, {"text": "To bring something back to its origin", "isCorrect": false, "rationale": "This would involve a prefix like 're-' (back) with 'fer', leading to words like 'refer', not 'transfer'."}]}, {"question": "Considering the root \"lat\" and its meaning, which of the following best describes the core idea behind the word \"relate\"?", "options": [{"text": "To speak formally about an event.", "isCorrect": false, "rationale": "This meaning is associated with roots like 'narrate' or 'dictate', not 'lat'."}, {"text": "To bear or bring back a connection or story.", "isCorrect": true, "rationale": "The prefix 're-' means 'back' or 'again', and 'lat' means 'to bear' or 'to bring'. Thus, 'relate' means to bring back or bear a connection, story, or account."}, {"text": "To stand in a specific position.", "isCorrect": false, "rationale": "This meaning relates to roots of 'stand' or 'position', not 'lat'."}, {"text": "To carry a heavy burden for someone.", "isCorrect": false, "rationale": "While 'lat' means 'to carry' or 'to bear', the prefix 're-' does not imply 'for someone' or specifically a 'heavy burden'."}]}, {"question": "In the context of the \"fer / lat\" root, which statement accurately reflects their typical grammatical function as described?", "options": [{"text": "\"Fer\" is exclusively used for future tense actions, while \"lat\" is for present.", "isCorrect": false, "rationale": "The text specifies grammatical stems, not tenses like future or present; this is incorrect."}, {"text": "\"Fer\" generally indicates a passive voice, and \"lat\" an active voice.", "isCorrect": false, "rationale": "The text specifies grammatical stems (present, past participle), not voice; this is incorrect."}, {"text": "\"Fer\" functions as a present stem, and \"lat\" as a past participle stem.", "isCorrect": true, "rationale": "The section explicitly states this under 'Variant Forms', defining 'fer' as the present stem and 'lat' as the past participle stem."}, {"text": "\"Fer\" denotes an action in isolation, and \"lat\" an action requiring an object.", "isCorrect": false, "rationale": "The text specifies grammatical stems, not transitivity or isolation of actions; this is incorrect."}]}, {"question": "Which of the following words is LEAST likely to share the same Latin root \"fer / lat\"?", "options": [{"text": "Conifer", "isCorrect": false, "rationale": "Conifer (from Latin 'conus' + 'ferre') literally means 'cone-bearing', directly using the 'fer' root."}, {"text": "Collate", "isCorrect": false, "rationale": "Collate (from Latin 'com-' + 'latus') means 'to bring together', directly using the 'lat' root."}, {"text": "Suffer", "isCorrect": false, "rationale": "Suffer (from Latin 'sub-' + 'ferre') means 'to bear under' or 'endure', directly using the 'fer' root."}, {"text": "Reflect", "isCorrect": true, "rationale": "Reflect comes from the Latin root 'flectere', meaning 'to bend', which is distinct from 'fer / lat' ('to carry, bear, bring')."}]}, {"question": "The word \"prefer\" combines the prefix \"pre-\" (before) with the root \"fer\". Based on this, what is the best interpretation of \"prefer\"?", "options": [{"text": "To carry something forward with great effort.", "isCorrect": false, "rationale": "While 'fer' means 'carry', the prefix 'pre-' means 'before', not 'forward with great effort'."}, {"text": "To bring one thing before another, indicating a choice.", "isCorrect": true, "rationale": "Combining 'pre-' (before) and 'fer' (to bring/carry) logically leads to the meaning 'to bring (or choose) one thing before another'."}, {"text": "To bear a responsibility that was previously assigned.", "isCorrect": false, "rationale": "This interpretation of 'bear' is too specific and does not align perfectly with 'pre-' meaning 'before' in the context of choice."}, {"text": "To transport an item to a pre-arranged location.", "isCorrect": false, "rationale": "While 'transport' uses 'fer', 'pre-arranged location' is not implied by 'pre-' in this context; 'prefer' is about choice, not logistics."}]}, {"question": "Understanding that \"fer\" and \"lat\" are a suppletive pair is important because it explains why:", "options": [{"text": "They always appear together in compound words.", "isCorrect": false, "rationale": "They do not always appear together; words like 'transfer' use 'fer' alone, and 'translate' uses 'lat' alone."}, {"text": "Their spellings are so different despite sharing a meaning and origin in different forms.", "isCorrect": true, "rationale": "A suppletive pair means the present and past forms come from *different original words*, which accounts for their distinct spellings and sounds despite sharing a core meaning and belonging to the same verbal paradigm."}, {"text": "They are pronounced identically in all derivatives.", "isCorrect": false, "rationale": "'Fer' and 'lat' have distinctly different pronunciations."}, {"text": "One form is always stronger or more emphatic than the other.", "isCorrect": false, "rationale": "Suppletion refers to morphological irregularity, not intensity or emphasis of meaning."}]}, {"question": "A scholar is analyzing the etymology of the word \"collation,\" which refers to the act of bringing together or comparing texts. Given the information about the root \"lat,\" what insight does this provide into \"collation\"?", "options": [{"text": "It suggests the texts are physically carried long distances.", "isCorrect": false, "rationale": "While 'lat' means 'to carry', 'collation' implies intellectual assembly, not necessarily long-distance physical transport."}, {"text": "It highlights the idea of texts being \"borne\" or \"brought\" together for comparison.", "isCorrect": true, "rationale": "The root 'lat' means 'to bear, to bring', and 'collation' involves bringing items (texts) together, directly aligning with the root's meaning in a metaphorical or intellectual sense."}, {"text": "It implies the texts have stood side-by-side for a long time.", "isCorrect": false, "rationale": "This relates to roots like 'sta' or 'pos', not 'lat' ('to carry, bear, bring')."}, {"text": "It indicates the texts were originally written in Latin.", "isCorrect": false, "rationale": "While the root is Latin, 'collation' refers to an action, not the language of the texts themselves."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
