        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 24, Section 1</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the central assertion about the 'soul' (Psyches) in Heraclitus's fragment?", "options": [{"text": "The soul is a static entity, unchanging throughout life.", "isCorrect": false, "rationale": "The phrase 'increases itself' directly contradicts the idea of a static or unchanging soul, indicating a dynamic nature."}, {"text": "The soul possesses an inherent 'reason' (logos) that actively expands and develops itself.", "isCorrect": true, "rationale": "The translation 'The soul has a reason that increases itself' directly states that the soul's reason has an intrinsic capacity for self-augmentation and growth."}, {"text": "The soul's growth is entirely dependent on external influences and experiences.", "isCorrect": false, "rationale": "While external influences are important, the phrase 'increases itself' emphasizes an intrinsic, self-generating aspect of growth, rather than sole dependence on external factors."}, {"text": "The soul's 'reason' is a fixed, predetermined capacity that does not change.", "isCorrect": false, "rationale": "The word 'increases' explicitly implies development and change, rather than a fixed or predetermined capacity."}]}, {"question": "In the context of this fragment, what does 'logos' most likely represent as something that 'increases itself' within the soul?", "options": [{"text": "A set of unchangeable, universal truths.", "isCorrect": false, "rationale": "While 'logos' can refer to universal truth, the active phrase 'increases itself' suggests a dynamic, evolving understanding within the individual soul, not just a static set of truths."}, {"text": "An evolving principle of rational understanding, wisdom, or self-awareness.", "isCorrect": true, "rationale": "Given that 'logos' is coupled with 'increases itself,' it points to a dynamic, internal capacity for the soul to deepen its own understanding, wisdom, or awareness over time."}, {"text": "Purely emotional impulses that drive personal development.", "isCorrect": false, "rationale": "'Logos' in philosophical contexts typically refers to reason, word, or principle, which is distinct from 'emotional impulses' even if emotions play a role in development."}, {"text": "The physical metabolic processes that sustain the body.", "isCorrect": false, "rationale": "The fragment speaks of 'Psyches' (soul) and 'logos' (reason), placing it in the realm of the mind or spirit, not physical bodily processes."}]}, {"question": "What significant implication does the phrase 'heauton auxon' ('increases itself') suggest about the nature of human growth and development?", "options": [{"text": "Development is a linear process with a definite endpoint.", "isCorrect": false, "rationale": "The idea of something 'increasing itself' suggests an ongoing, potentially unending process, rather than a linear process with a fixed endpoint."}, {"text": "Personal growth and understanding are intrinsic, self-driven processes that unfold over time.", "isCorrect": true, "rationale": "'Increases itself' strongly implies an internal, self-propelled mechanism for growth, making it an intrinsic and continuous process."}, {"text": "Human beings are passive recipients of knowledge and wisdom.", "isCorrect": false, "rationale": "The active verb 'increases itself' indicates an active, internal agency in growth, not a passive reception."}, {"text": "All forms of personal development are entirely random and unpredictable.", "isCorrect": false, "rationale": "While development isn't always perfectly predictable, 'reason that increases itself' suggests an underlying principle and direction to this growth, not pure randomness."}]}, {"question": "Considering Heraclitus's broader philosophical emphasis on flux and change, how does this fragment align with his general worldview?", "options": [{"text": "It presents a contradictory view by suggesting a stable, unchanging aspect of the soul.", "isCorrect": false, "rationale": "The phrase 'increases itself' inherently denotes change and dynamism, which is entirely consistent with Heraclitus's philosophy of flux, rather than contradicting it."}, {"text": "It extends the concept of constant change and dynamic process to the internal realm of the individual soul.", "isCorrect": true, "rationale": "Heraclitus famously stated 'Everything flows.' This fragment applies that dynamic principle to the internal life of the soul, showing that even reason within is not static but continually developing."}, {"text": "It focuses solely on the physical aspects of change, not the psychological.", "isCorrect": false, "rationale": "The quote explicitly refers to 'Psyches' (soul) and 'logos' (reason), placing its focus squarely on the psychological or spiritual, not just the physical."}, {"text": "It implies that reason is a force that resists change.", "isCorrect": false, "rationale": "Reason that 'increases itself' is actively changing and developing, thus it embraces change rather than resisting it."}]}, {"question": "Why would this particular Heraclitean fragment be chosen as an epigraph for a 'psych' (psychology) chapter?", "options": [{"text": "To suggest that psychology is primarily concerned with static mental structures.", "isCorrect": false, "rationale": "The quote emphasizes growth and change ('increases itself'), which contrasts with the idea of static mental structures."}, {"text": "It highlights psychology's interest in self-development, personal growth, and the evolving nature of the mind/soul.", "isCorrect": true, "rationale": "The notion of a 'reason that increases itself' directly speaks to themes central to psychology, such as cognitive development, personal growth, self-actualization, and the dynamic nature of the human psyche."}, {"text": "To argue that psychological processes are solely determined by external environmental factors.", "isCorrect": false, "rationale": "The phrase 'increases itself' points to an intrinsic capacity, not exclusive external determination, although external factors certainly play a role in development."}, {"text": "To emphasize that psychological study is limited to ancient philosophical texts.", "isCorrect": false, "rationale": "While it uses an ancient text, its selection as an epigraph is for its thematic relevance to the field, not to limit the field itself to historical texts."}]}, {"question": "The phrase 'increases itself' implies a self-referential or autonomous process. What does this suggest about the ultimate source of the soul's development?", "options": [{"text": "The soul is merely a reflection of societal norms and expectations.", "isCorrect": false, "rationale": "While societal norms influence, 'increases itself' points to an internal drive or capacity, rather than being a mere reflection."}, {"text": "The primary impetus for the soul's growth originates from within the soul itself.", "isCorrect": true, "rationale": "'Increases itself' directly attributes the agency of growth to the soul's own internal mechanism, suggesting an endogenous source for its development."}, {"text": "Divine intervention is the sole cause of the soul's reason.", "isCorrect": false, "rationale": "The fragment does not mention divine intervention; it explicitly states that the 'reason' within the soul 'increases itself,' focusing on an inherent capability."}, {"text": "The development of reason is a random event without any internal structure.", "isCorrect": false, "rationale": "The presence of 'logos' (reason/principle) combined with self-increase suggests an organized, albeit dynamic, process, not a random one."}]}, {"question": "From an analytical perspective, how does Heraclitus's assertion differentiate the 'soul's reason' from simple cumulative knowledge?", "options": [{"text": "It suggests that the soul passively collects facts without integrating them.", "isCorrect": false, "rationale": "Passive collection is not 'increasing itself' in a meaningful, transformative sense; 'increases itself' implies an active, internal process."}, {"text": "It implies a qualitative transformation or deepening of understanding, beyond mere acquisition of information.", "isCorrect": true, "rationale": "To 'increase itself' implies an organic, self-generated growth of reason, which suggests a qualitative change in understanding, wisdom, or structure, rather than just adding more pieces of information."}, {"text": "It indicates that the soul's reason diminishes over time.", "isCorrect": false, "rationale": "The verb 'increases' directly contradicts the idea of diminishing reason."}, {"text": "It means the soul simply repeats existing knowledge without novelty.", "isCorrect": false, "rationale": "Self-increase suggests development and evolution, which implies novelty or a transformation of existing knowledge, not mere repetition."}]}, {"question": "If the soul's reason truly 'increases itself,' what might be a personal responsibility or implication for an individual based on this philosophical statement?", "options": [{"text": "To passively wait for reason to grow without effort.", "isCorrect": false, "rationale": "While the capacity is intrinsic, 'increasing itself' implies a dynamic process that often benefits from engagement and cultivation, rather than passive waiting."}, {"text": "To actively engage in self-reflection and practices that foster intellectual and spiritual development.", "isCorrect": true, "rationale": "Recognizing an inherent capacity for self-increase suggests a responsibility to cultivate and nurture that capacity through active engagement, introspection, and learning to realize its potential."}, {"text": "To reject all external knowledge as irrelevant to internal growth.", "isCorrect": false, "rationale": "External knowledge can certainly inform and stimulate the internal growth of reason; the statement emphasizes intrinsic capacity, not external exclusion."}, {"text": "To believe that once a certain level of reason is reached, no further growth is possible.", "isCorrect": false, "rationale": "The continuous nature implied by 'increases itself' suggests that growth is an ongoing process without a definitive ultimate limit."}]}, {"question": "The Heraclitean fragment presents the 'soul' (Psyches) as fundamentally:", "options": [{"text": "An entirely material and physical entity.", "isCorrect": false, "rationale": "The term 'Psyches' (soul) and 'logos' (reason) typically refer to non-material, psychological or spiritual aspects, not solely physical ones."}, {"text": "A dynamic and self-actualizing principle.", "isCorrect": true, "rationale": "The soul 'having a reason that increases itself' depicts it as an active, evolving, and self-improving entity, aligning with the concept of a dynamic and self-actualizing principle."}, {"text": "A blank slate (tabula rasa) upon which external experiences are merely inscribed.", "isCorrect": false, "rationale": "'Increases itself' suggests an internal, active processing and growth, not merely passive inscription on a blank slate."}, {"text": "Determined solely by genetic predisposition without influence from experience.", "isCorrect": false, "rationale": "The fragment does not touch on genetic predisposition; it highlights an intrinsic capacity for growth that interacts with experience, but isn't solely determined by genes."}]}, {"question": "Which of the following modern psychological concepts is most directly supported by the idea that 'The soul has a reason that increases itself'?", "options": [{"text": "Behaviorism, which focuses on observable behaviors and external stimuli.", "isCorrect": false, "rationale": "Behaviorism typically emphasizes external stimuli and responses, whereas the fragment highlights an intrinsic, internal process of growth."}, {"text": "Humanistic psychology's focus on self-actualization and personal growth potential.", "isCorrect": true, "rationale": "Humanistic psychology, particularly concepts like Maslow's self-actualization, centers on the inherent drive within individuals to realize their full potential and grow, which aligns perfectly with a 'reason that increases itself.'"}, {"text": "Psychoanalysis, with its emphasis on unconscious drives and early childhood experiences.", "isCorrect": false, "rationale": "While relevant to the 'soul,' psychoanalysis emphasizes unconscious and past determinants more than an explicit, intrinsic 'self-increasing reason.'"}, {"text": "Biological psychology, focusing on brain structures and neurochemistry.", "isCorrect": false, "rationale": "Biological psychology focuses on physiological mechanisms, while this fragment speaks of 'soul' and 'reason' in a more abstract, philosophical sense of potential and growth."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
