<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 6, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the core meaning of 'sens/sent'?", "options": [{"text": "To see", "isCorrect": false, "rationale": "Seeing is 'vis/vid.'"}, {"text": "To feel", "isCorrect": true, "rationale": "Every word derives from 'sens/sent,' meaning 'to feel.'"}, {"text": "To think", "isCorrect": false, "rationale": "Thinking is 'cogn.'"}, {"text": "To judge", "isCorrect": false, "rationale": "The root itself means 'to feel.'"}]}, {"question": "'Consent' = con- (together) + sent (feel). What does this suggest?", "options": [{"text": "Thinking the same thoughts", "isCorrect": false, "rationale": "Consent is rooted in feeling."}, {"text": "Feeling together with another person", "isCorrect": true, "rationale": "Literally 'to feel together.'"}, {"text": "Speaking the same words", "isCorrect": false, "rationale": "'sent' means feel, not speak."}, {"text": "Seeing the same evidence", "isCorrect": false, "rationale": "Seeing = 'vis/vid.'"}]}, {"question": "How does 'dis-' change 'dissent'?", "options": [{"text": "Intensifies feeling", "isCorrect": false, "rationale": "'dis-' means 'apart.'"}, {"text": "Creates 'disagree' by indicating separation", "isCorrect": true, "rationale": "dis- (apart) + sent (feel) = feel apart, disagree."}, {"text": "Removes feeling entirely", "isCorrect": false, "rationale": "Means feeling differently, not absence."}, {"text": "Redirects inward", "isCorrect": false, "rationale": "'dis-' means apart, not inward."}]}, {"question": "How does 'sentence' etymology connect to judgment?", "options": [{"text": "The judge writes by hand.", "isCorrect": false, "rationale": "Etymology relates to feeling."}, {"text": "The judge perceives and feels the proper punishment.", "isCorrect": true, "rationale": "Judges 'feel their way' to a declaration."}, {"text": "The judge speaks loudly.", "isCorrect": false, "rationale": "'sent' = feel, not speak."}, {"text": "Sentences are predetermined.", "isCorrect": false, "rationale": "Etymology suggests individual perception."}]}, {"question": "Which word uses '-ory' (relating to)?", "options": [{"text": "Sensitive", "isCorrect": false, "rationale": "Uses '-itive.'"}, {"text": "Sensory", "isCorrect": true, "rationale": "Sensory = sens + -ory (relating to)."}, {"text": "Sentiment", "isCorrect": false, "rationale": "Uses '-ment.'"}, {"text": "Sense", "isCorrect": false, "rationale": "Uses simple suffix '-e.'"}]}, {"question": "How do vis/vid and sens/sent differ?", "options": [{"text": "vis/vid covers all senses", "isCorrect": false, "rationale": "It is the reverse."}, {"text": "vis/vid = sight alone; sens/sent = all senses plus judgment", "isCorrect": true, "rationale": "The root connection explains this distinction."}, {"text": "They are identical", "isCorrect": false, "rationale": "They differ in scope."}, {"text": "sens/sent is Greek", "isCorrect": false, "rationale": "Both are Latin."}]}, {"question": "What does '-itive' contribute to 'sensitive'?", "options": [{"text": "Place for", "isCorrect": false, "rationale": "That is '-orium.'"}, {"text": "Having the quality of", "isCorrect": true, "rationale": "Sensitive = having the quality of feeling."}, {"text": "Act of", "isCorrect": false, "rationale": "That is '-ion.'"}, {"text": "Study of", "isCorrect": false, "rationale": "That is '-logy.'"}]}, {"question": "How does 'assent' compare to 'dissent'?", "options": [{"text": "Assent = feeling toward agreement; dissent = feeling apart", "isCorrect": true, "rationale": "ad- (toward) vs. dis- (apart)."}, {"text": "Both mean agree strongly", "isCorrect": false, "rationale": "They are opposites."}, {"text": "Assent = speak toward; dissent = speak against", "isCorrect": false, "rationale": "Both use 'sent' (feel)."}, {"text": "Assent is formal; dissent informal", "isCorrect": false, "rationale": "Difference is directional."}]}, {"question": "The root connection references seeing evidence and feeling to a sentence. What two roots?", "options": [{"text": "aud and scrib", "isCorrect": false, "rationale": "References seeing and feeling."}, {"text": "vis/vid and sens/sent", "isCorrect": true, "rationale": "Seeing evidence (vis/vid) and feeling to a sentence (sens/sent)."}, {"text": "cogn and dict", "isCorrect": false, "rationale": "Wrong roots."}, {"text": "sens/sent and cogn", "isCorrect": false, "rationale": "The passage pairs with vis/vid."}]}, {"question": "'Strong sentiments' means strong what?", "options": [{"text": "Logical arguments", "isCorrect": false, "rationale": "Sentiments are feelings."}, {"text": "Feelings, opinions, or attitudes", "isCorrect": true, "rationale": "Sentiment = sent (feel) + -ment (result of)."}, {"text": "Visual perceptions", "isCorrect": false, "rationale": "Visual = vis/vid."}, {"text": "Written records", "isCorrect": false, "rationale": "Written = scrib."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
