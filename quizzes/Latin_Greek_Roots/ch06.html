    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 6</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the Latin root 'sens/sent' mean?", "options": [{"text": "to think and reason", "isCorrect": false, "rationale": "Thinking and reasoning are covered by the root 'cogn' (Ch. 7), not 'sens/sent.'"}, {"text": "to feel, to perceive", "isCorrect": true, "rationale": "The root 'sens/sent' comes from Latin 'sentire' (to feel or perceive), with 'sens' from the past participle 'sensus' and 'sent' from the verb stem."}, {"text": "to move and act", "isCorrect": false, "rationale": "Moving and acting are not the meaning of 'sens/sent.' This root is about perceiving and feeling."}, {"text": "to see clearly", "isCorrect": false, "rationale": "Seeing is covered by the root 'vis/vid' (Ch. 5), not 'sens/sent.' Sensing covers all the senses, including but beyond sight."}], "id": "q01"}, {"question": "For the Romans, the verb 'sentire' meant more than just physical feeling. It also meant:", "options": [{"text": "To speak with authority", "isCorrect": false, "rationale": "Speaking with authority is covered by the 'dict' root. 'Sentire' was about feeling and forming judgments, not commanding."}, {"text": "To form a judgment or arrive at an opinion through thought", "isCorrect": true, "rationale": "For Romans, 'sentire' carried the deeper meaning of forming a judgment — to feel your way to an opinion through careful thought. This is why 'sentence' can mean both a group of words AND a judge's decision."}, {"text": "To write down one's observations carefully", "isCorrect": false, "rationale": "Writing is covered by 'scrib/script.' 'Sentire' is about feeling and perceiving, not writing."}, {"text": "To listen carefully to instructions", "isCorrect": false, "rationale": "Careful listening is covered by 'aud.' 'Sentire' is about the internal experience of feeling and forming opinion."}], "id": "q02"}, {"question": "What does 'consent' literally mean based on its morpheme parts?", "options": [{"text": "To feel strongly against something", "isCorrect": false, "rationale": "Feeling against is 'dissent' (dis- + sent), not 'consent.' 'Con-' means together, not against."}, {"text": "To feel together with another person; to agree", "isCorrect": true, "rationale": "'Consent' = 'con-' (together) + 'sent' (feel): to feel together with another person, sharing the same judgment or position."}, {"text": "To express a strong personal opinion", "isCorrect": false, "rationale": "Expressing a personal opinion without necessarily agreeing with others is more like 'sentiment' or 'dissent.' 'Consent' specifically means agreeing together."}, {"text": "To judge someone's feelings from the outside", "isCorrect": false, "rationale": "Judging from outside is not what 'consent' means. Consent is about sharing or agreeing with another's position — feeling together."}], "id": "q03"}, {"question": "If a member of a committee 'dissents' from the group's decision, she is:", "options": [{"text": "Enthusiastically agreeing with the decision", "isCorrect": false, "rationale": "Enthusiastic agreement would be 'assent' or 'consent.' 'Dissent' uses 'dis-' (apart), meaning the opposite."}, {"text": "Proposing a new idea to replace the decision", "isCorrect": false, "rationale": "Proposing a new idea is not exactly what 'dissent' means. Dissenting is specifically about holding a different opinion from the group."}, {"text": "Holding a different opinion; feeling apart from the group", "isCorrect": true, "rationale": "'Dissent' = 'dis-' (apart) + 'sent' (feel): to feel apart; to hold a different opinion from others. The committee member disagrees."}, {"text": "Refusing to participate in the meeting at all", "isCorrect": false, "rationale": "Refusing to participate is not dissenting. A person can dissent — state their disagreement — while still participating in the process."}], "id": "q04"}, {"question": "A 'sentimental' person is one who:", "options": [{"text": "Uses very precise and logical language", "isCorrect": false, "rationale": "Precise logical language is the opposite of sentimental. 'Sentimental' relates to feeling and emotion, from the root 'sent.'"}, {"text": "Thinks before acting in every situation", "isCorrect": false, "rationale": "Thinking before acting relates more to the 'cogn' root (Ch. 7). 'Sentimental' is about emotional feeling."}, {"text": "Is easily moved by feelings, emotions, or tender attachments", "isCorrect": true, "rationale": "'Sentimental' comes from 'sent' (feel) + '-i-' + '-ment' (result of) + '-al' (relating to). It describes someone who is particularly influenced by emotion and tender feelings."}, {"text": "Disagrees with most people around them", "isCorrect": false, "rationale": "Disagreeing with others is 'dissenting.' 'Sentimental' is about personal emotional tenderness, not disagreement."}], "id": "q05"}, {"question": "How can the same word 'sentence' mean both 'a complete group of words' AND 'a judge's punishment'?", "options": [{"text": "They are two completely different words that just happen to be spelled the same way", "isCorrect": false, "rationale": "They are not unrelated — both meanings trace back to the same Latin word 'sententia,' making the double meaning logical and connected."}, {"text": "Both meanings trace back to Latin 'sententia' meaning a considered opinion or judgment", "isCorrect": true, "rationale": "A grammatical 'sentence' is a complete expression of thought — a finished opinion. A judge's 'sentence' is the opinion she pronounces on the accused. Both come from Latin 'sententia' (considered opinion)."}, {"text": "The word 'sentence' was borrowed from two different languages at different times", "isCorrect": false, "rationale": "Both meanings come from the same Latin word 'sententia.' The double meaning is not the result of two separate borrowings."}, {"text": "Judges invented the grammar term 'sentence' by comparing it to their legal sentences", "isCorrect": false, "rationale": "The grammar term was not invented by judges. Both meanings descended naturally from the same Latin root about considered opinion."}], "id": "q06"}, {"question": "Which word best describes something relating to the body's five senses of sight, sound, touch, taste, and smell?", "options": [{"text": "sentiment", "isCorrect": false, "rationale": "'Sentiment' is a feeling or opinion — an emotional or mental experience. 'Sensory' is the word specifically for the five physical senses."}, {"text": "sensitive", "isCorrect": false, "rationale": "'Sensitive' means easily affected by feelings or stimuli — it describes a quality, not the category of physical senses themselves."}, {"text": "sensory", "isCorrect": true, "rationale": "'Sensory' = 'sens' (feel/perceive) + '-ory' (relating to). It specifically means relating to the senses — the channels through which the body perceives the world."}, {"text": "sentence", "isCorrect": false, "rationale": "'Sentence' comes from 'sententia' (considered opinion) and relates to grammar or law, not the body's physical senses."}], "id": "q07"}, {"question": "What does 'assent' mean, and which prefix does it use?", "options": [{"text": "To disagree; uses 'as-' meaning against", "isCorrect": false, "rationale": "'As-/ad-' means toward, not against. Disagreeing is 'dissent.' 'Assent' means to agree — to feel toward something."}, {"text": "To feel together with a group; uses 'as-' meaning together", "isCorrect": false, "rationale": "Feeling together is 'consent' (con- = together). 'As-/ad-' means toward, not together."}, {"text": "To agree or express approval; uses 'as-/ad-' meaning toward", "isCorrect": true, "rationale": "'Assent' = 'as-/ad-' (toward) + 'sent' (feel): to feel toward; to nod in agreement or express approval. It is a gentler agreement than 'consent.'"}, {"text": "To express a strong emotional opinion; uses 'as-' meaning strongly", "isCorrect": false, "rationale": "'As-/ad-' means toward, not strongly. Assent is about agreement, not the strength of feeling."}], "id": "q08"}, {"question": "What makes 'sens/sent' broader than the root 'vis/vid' (Chapter 5)?", "options": [{"text": "'vis/vid' covers only sound, while 'sens/sent' covers all the senses", "isCorrect": false, "rationale": "'vis/vid' covers sight (not sound). Sound is covered by 'aud.' 'Sens/sent' covers all five senses plus judgment."}, {"text": "'vis/vid' covers only sight, while 'sens/sent' covers all the senses AND extends into judgment and opinion", "isCorrect": true, "rationale": "'vis/vid' is limited to the visual sense. 'sens/sent' covers all five senses and goes further — into forming opinions, consenting, dissenting, and issuing sentences (judgments)."}, {"text": "'vis/vid' is a Latin root, while 'sens/sent' is a Greek root", "isCorrect": false, "rationale": "Both roots are Latin. 'vis/vid' from 'videre' and 'sens/sent' from 'sentire' are both Latin verbs."}, {"text": "They are interchangeable — both roots mean the same thing in English", "isCorrect": false, "rationale": "They are not interchangeable. 'vis/vid' is specifically about seeing, while 'sens/sent' is about all forms of perception and feeling."}], "id": "q09"}, {"question": "A 'sensitive' person is described as easily affected by feelings or physical stimuli. Which suffix makes 'sensitive' an adjective?", "options": [{"text": "-ive — meaning having the quality of", "isCorrect": true, "rationale": "The suffix '-itive/-ive' means 'having the quality of.' So 'sensitive' means 'having the quality of being easily moved by sense or feeling.'"}, {"text": "-ment — meaning the result of", "isCorrect": false, "rationale": "'-ment' means the result of something, as in 'sentiment.' 'Sensitive' ends in '-itive,' not '-ment.'"}, {"text": "-ion — meaning the act of", "isCorrect": false, "rationale": "'-ion' marks a noun meaning the act of something. 'Sensitive' is an adjective, ending in '-itive.'"}, {"text": "-ory — meaning relating to", "isCorrect": false, "rationale": "'-ory' appears in 'sensory.' 'Sensitive' ends in '-itive,' not '-ory.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
