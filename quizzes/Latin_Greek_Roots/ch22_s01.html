<script>
var QUESTIONS = [{"question": "What is the accurate English translation of the inscription 'Geometrias me eiston medeis eisito'?", "options": [{"text": "Know thyself.", "isCorrect": false, "rationale": "This is a famous ancient Greek maxim, but not the translation of the given inscription."}, {"text": "Let no one ignorant of geometry enter here.", "isCorrect": true, "rationale": "The provided text explicitly states this as the English translation of the Greek inscription."}, {"text": "The unexamined life is not worth living.", "isCorrect": false, "rationale": "This famous quote is attributed to Socrates, not a translation of the given inscription."}, {"text": "Knowledge is power.", "isCorrect": false, "rationale": "This aphorism is commonly attributed to Francis Bacon, much later than Plato's era, and is not the translation of the inscription."}]}, {"question": "According to the provided text, where was the inscription 'Let no one ignorant of geometry enter here' located?", "options": [{"text": "The Library of Alexandria", "isCorrect": false, "rationale": "The Library of Alexandria was a prominent center of learning, but the text specifies a different location for this inscription."}, {"text": "The Oracle of Delphi", "isCorrect": false, "rationale": "The Oracle of Delphi was a significant religious site in ancient Greece, but not associated with this inscription."}, {"text": "Plato's Academy, Athens", "isCorrect": true, "rationale": "The text explicitly states that the inscription was above Plato's Academy in Athens."}, {"text": "The Parthenon", "isCorrect": false, "rationale": "The Parthenon was a temple dedicated to the goddess Athena, not an educational institution with this specific inscription."}]}, {"question": "Based on Plato's requirement, what does the emphasis on 'geometry' at the Academy most likely suggest about the kind of intellectual training Plato valued?", "options": [{"text": "It was primarily a practical school for engineers and architects.", "isCorrect": false, "rationale": "While geometry has practical applications, Plato's Academy was primarily a philosophical institution, suggesting a deeper, foundational role for geometry."}, {"text": "Geometry was considered a fundamental discipline for developing logical reasoning and abstract thought necessary for philosophy.", "isCorrect": true, "rationale": "In Plato's philosophy, geometry served as an excellent training ground for the mind, preparing students for abstract thought and deductive reasoning crucial for philosophical inquiry."}, {"text": "Only those with innate mathematical genius were welcome at the Academy.", "isCorrect": false, "rationale": "The inscription states 'ignorant of geometry,' implying a lack of foundational knowledge, not necessarily a lack of genius. It was about preparedness."}, {"text": "Plato believed geometry was the sole path to enlightenment, superseding all other forms of knowledge.", "isCorrect": false, "rationale": "While highly valued, geometry was likely seen as a *precursor* or *tool* for philosophical enlightenment, not the exclusive path itself, as other studies would also be pursued."}]}, {"question": "The inscription 'Let no one ignorant of geometry enter here' implies that Plato's Academy sought students with which specific intellectual quality?", "options": [{"text": "A strong memory for historical facts and literary works.", "isCorrect": false, "rationale": "While useful, memory for facts and literature does not directly align with the specific prerequisite of geometry, which emphasizes logical structures."}, {"text": "A foundational understanding of logical principles and abstract concepts.", "isCorrect": true, "rationale": "Geometry, in Plato's view, trains the mind in deductive reasoning, understanding of axioms, and abstract thinking, which are foundational for philosophical inquiry."}, {"text": "Exceptional talent in artistic expression and rhetoric.", "isCorrect": false, "rationale": "Artistic expression and rhetoric, though valued in other contexts, are not directly addressed by the requirement of geometric knowledge."}, {"text": "Prior experience in political leadership and civic administration.", "isCorrect": false, "rationale": "While Plato's philosophy often touched upon governance, the entrance requirement focuses on a specific intellectual discipline, not practical political experience."}]}, {"question": "Considering the broader context of ancient Greek philosophy, how might 'geometry' in this inscription be interpreted metaphorically beyond its literal mathematical definition?", "options": [{"text": "It symbolizes the importance of physical fitness and athletic prowess.", "isCorrect": false, "rationale": "While physical culture was important in ancient Greece, geometry specifically refers to intellectual rigor, not physical attributes."}, {"text": "It represents the ability to memorize large volumes of information accurately.", "isCorrect": false, "rationale": "Geometry focuses on understanding principles and proofs, not primarily on rote memorization."}, {"text": "It stands for the discipline of rigorous, deductive reasoning and systematic thought.", "isCorrect": true, "rationale": "Plato saw geometry as the ideal training for the mind to move from the sensible world to the intelligible world, demanding clear definitions, axioms, and logical deductions, embodying systematic and rigorous thought."}, {"text": "It signifies a preference for practical crafts and vocational skills over theoretical knowledge.", "isCorrect": false, "rationale": "Plato's Academy was concerned with theoretical knowledge and philosophical inquiry, not primarily vocational training."}]}, {"question": "If a modern institution were to adopt a similar principle of foundational knowledge as a prerequisite, which contemporary skill set would best reflect the 'geometry' requirement of Plato's Academy for preparing students for advanced critical thinking?", "options": [{"text": "Proficiency in advanced coding languages and software development.", "isCorrect": false, "rationale": "While coding requires logic, it's a specialized skill. Plato's geometry was a more universal intellectual foundation."}, {"text": "A strong grasp of statistical analysis and data interpretation.", "isCorrect": false, "rationale": "Statistics are analytical, but geometry in Plato's time represented a fundamental approach to all rational thought, not just a specific analytical tool."}, {"text": "Competency in critical thinking, logical reasoning, and basic scientific literacy.", "isCorrect": true, "rationale": "These modern skills mirror the foundational role geometry played for Plato: equipping students with the tools for abstract thinking, problem-solving, and evaluating evidence, essential for advanced academic pursuits."}, {"text": "Extensive knowledge of current events and international relations.", "isCorrect": false, "rationale": "Knowledge of current events, while important for civic engagement, does not directly represent the foundational intellectual training that geometry provided in Plato's context."}]}, {"question": "What primary purpose did this inscription likely serve for potential entrants to Plato's Academy?", "options": [{"text": "To act as a deterrent for those who were not wealthy enough to afford geometry tutors.", "isCorrect": false, "rationale": "While access to education could be class-biased, the inscription's stated purpose is intellectual preparedness, not financial status."}, {"text": "To ensure that all individuals entering the Academy possessed the necessary intellectual groundwork for advanced philosophical inquiry.", "isCorrect": true, "rationale": "The inscription functioned as a clear statement of the intellectual standard and prerequisite skills deemed essential for engaging with the rigorous philosophical curriculum of the Academy."}, {"text": "To promote geometry as a practical skill for construction and military strategy.", "isCorrect": false, "rationale": "While geometry has practical uses, Plato's Academy was focused on higher philosophical and theoretical pursuits, not primarily vocational training."}, {"text": "To limit the number of students to a small, exclusive group for administrative convenience.", "isCorrect": false, "rationale": "While it would limit numbers, the criterion is intellectual, not arbitrary, indicating a qualitative rather than purely quantitative screening."}]}, {"question": "The fact that this inscription is positioned at the entrance suggests that Plato viewed geometry as:", "options": [{"text": "An elective subject that students could choose to study if they wished.", "isCorrect": false, "rationale": "An inscription at the entrance signifies a mandatory prerequisite, not an optional elective."}, {"text": "A specialized field of study only for those pursuing a career in mathematics.", "isCorrect": false, "rationale": "Plato's Academy was a school of philosophy; geometry was a universal foundation for philosophical thought, not just for future mathematicians."}, {"text": "A fundamental prerequisite and a gateway to higher philosophical understanding.", "isCorrect": true, "rationale": "Its placement at the entry signifies that without this basic understanding, one could not progress to the deeper philosophical studies offered within, making it a gateway and prerequisite."}, {"text": "A minor topic of interest, mainly for intellectual amusement.", "isCorrect": false, "rationale": "The strictness of the inscription 'Let no one ignorant... enter' indicates a serious and crucial requirement, far beyond mere amusement."}]}, {"question": "The provided text is labeled as an 'EPIGRAPH'. What does the term 'epigraph' most accurately describe in the context of a textbook section?", "options": [{"text": "A detailed historical narrative that forms the main content of the section.", "isCorrect": false, "rationale": "An epigraph is typically a short introductory quote, not the main body of a historical narrative."}, {"text": "A comprehensive summary of all the key concepts presented in the chapter.", "isCorrect": false, "rationale": "An epigraph sets a tone or theme, it does not summarize key concepts of an entire chapter."}, {"text": "A short quotation, phrase, or poem placed at the beginning of a document or chapter to suggest its theme.", "isCorrect": true, "rationale": "This is the precise definition of an epigraph, serving to introduce or set the tone for the content that follows."}, {"text": "A glossary of specialized terms used throughout the textbook.", "isCorrect": false, "rationale": "A glossary is a list of definitions, distinct from an introductory quotation."}]}, {"question": "What universal educational principle can be best inferred from Plato's inscription at the Academy?", "options": [{"text": "That ancient educational methods are inherently superior to modern ones.", "isCorrect": false, "rationale": "The inscription speaks to a principle, not a comparative judgment of educational eras."}, {"text": "That highly specialized knowledge is always more valuable than broad general knowledge.", "isCorrect": false, "rationale": "Geometry, in Plato's context, was a *foundational* general intellectual training, not a hyper-specialized field, aiming to prepare for broader philosophical understanding."}, {"text": "That a robust foundation of critical thinking and logical reasoning is essential before pursuing advanced studies.", "isCorrect": true, "rationale": "The inscription emphasizes that a specific intellectual preparation (represented by geometry) is non-negotiable for entry into higher learning, highlighting the universal principle of building upon a solid foundation of critical thought."}, {"text": "That access to advanced education should be restricted to a privileged intellectual elite.", "isCorrect": false, "rationale": "While the requirement might create exclusivity, the underlying principle is about *intellectual readiness*, not inherent privilege based on social status or a pre-determined elite."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
