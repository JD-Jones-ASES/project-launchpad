<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words from the Ancients: Latin &amp; Greek Roots &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Latin_Greek_Roots.html">&larr; Back to Words from the Ancients: Latin &amp; Greek Roots</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Words from the Ancients: Latin &amp; Greek Roots &mdash; Chapter 22, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does 'geo' mean?", "options": [{"text": "Life", "isCorrect": false, "rationale": "Life = bio."}, {"text": "Earth, land", "isCorrect": true, "rationale": "From Greek ge."}, {"text": "Water", "isCorrect": false, "rationale": "Water = hydr."}, {"text": "Sound", "isCorrect": false, "rationale": "Sound = phon."}]}, {"question": "What does 'graph/gram' mean?", "options": [{"text": "To know", "isCorrect": false, "rationale": "Knowing = cogn."}, {"text": "To write, to draw, something written", "isCorrect": true, "rationale": "From Greek graphein."}, {"text": "To believe", "isCorrect": false, "rationale": "Believing = cred."}, {"text": "To feel", "isCorrect": false, "rationale": "Feeling = sens."}]}, {"question": "'Graph' originates from?", "options": [{"text": "Gignoskein", "isCorrect": false, "rationale": "Gives gnosc."}, {"text": "Graphein (to write, draw)", "isCorrect": true, "rationale": "Stated in text."}, {"text": "Chronos", "isCorrect": false, "rationale": "Gives chron."}, {"text": "Logos", "isCorrect": false, "rationale": "Gives log."}]}, {"question": "What variant in 'Pangaea'?", "options": [{"text": "geog", "isCorrect": false, "rationale": "Not listed."}, {"text": "gea", "isCorrect": true, "rationale": "Stated in text."}, {"text": "geos", "isCorrect": false, "rationale": "Not listed."}, {"text": "geon", "isCorrect": false, "rationale": "Not listed."}]}, {"question": "Which is a derivative of 'geo'?", "options": [{"text": "Photograph", "isCorrect": false, "rationale": "Contains graph."}, {"text": "Geothermal", "isCorrect": true, "rationale": "Listed as example."}, {"text": "Telegram", "isCorrect": false, "rationale": "Contains gram."}, {"text": "Autograph", "isCorrect": false, "rationale": "Contains graph."}]}, {"question": "What variant indicates the process of writing?", "options": [{"text": "gram", "isCorrect": false, "rationale": "gram = product."}, {"text": "graphy", "isCorrect": true, "rationale": "The process variant."}, {"text": "grapho", "isCorrect": false, "rationale": "Not listed."}, {"text": "graphe", "isCorrect": false, "rationale": "Not listed."}]}, {"question": "Which is a derivative of 'graph/gram'?", "options": [{"text": "Geology", "isCorrect": false, "rationale": "geo + logy."}, {"text": "Diagram", "isCorrect": true, "rationale": "Listed as example."}, {"text": "Geometry", "isCorrect": false, "rationale": "geo + metron."}, {"text": "Geothermal", "isCorrect": false, "rationale": "geo + therm."}]}, {"question": "Both roots from which language?", "options": [{"text": "Latin", "isCorrect": false, "rationale": "Both Greek."}, {"text": "Greek", "isCorrect": true, "rationale": "ge and graphein."}, {"text": "French", "isCorrect": false, "rationale": "Greek."}, {"text": "Italian", "isCorrect": false, "rationale": "Greek."}]}, {"question": "Geo + graphy creates?", "options": [{"text": "Ancient writing systems", "isCorrect": false, "rationale": "That is paleography."}, {"text": "Study of Earth's features and peoples", "isCorrect": true, "rationale": "Geography."}, {"text": "Drawing portraits", "isCorrect": false, "rationale": "Different."}, {"text": "Measuring time", "isCorrect": false, "rationale": "Time = chron."}]}, {"question": "How does 'gram' differ from 'graph'?", "options": [{"text": "Identical", "isCorrect": false, "rationale": "Action vs. product."}, {"text": "Graph = act of writing; gram = thing written", "isCorrect": true, "rationale": "Action vs. product distinction."}, {"text": "One Greek, one Latin", "isCorrect": false, "rationale": "Both Greek."}, {"text": "Gram is always weight", "isCorrect": false, "rationale": "In this family, gram = something written."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
