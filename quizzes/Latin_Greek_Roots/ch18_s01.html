    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the original Latin phrase presented in the epigraph?", "options": [{"text": "Ave Caesar, morituri te salutant.", "isCorrect": false, "rationale": "While related to gladiatorial salutes, the epigraph explicitly only states 'Morituri te salutant', not the preceding 'Ave Caesar'."}, {"text": "Morituri te salutant.", "isCorrect": true, "rationale": "The epigraph clearly presents 'Morituri te salutant' as the Latin phrase."}, {"text": "Carpe Diem.", "isCorrect": false, "rationale": "'Carpe Diem' is a different Latin phrase meaning 'seize the day', which is not mentioned in the epigraph."}, {"text": "Veni, Vidi, Vici.", "isCorrect": false, "rationale": "'Veni, Vidi, Vici' is a Latin phrase attributed to Julius Caesar meaning 'I came, I saw, I conquered', which is not in the epigraph."}]}, {"question": "Which of the following best translates 'Morituri te salutant' according to the epigraph?", "options": [{"text": "Seize the day.", "isCorrect": false, "rationale": "This is the translation for 'Carpe Diem', not 'Morituri te salutant'."}, {"text": "I came, I saw, I conquered.", "isCorrect": false, "rationale": "This is the translation for 'Veni, Vidi, Vici', not 'Morituri te salutant'."}, {"text": "Those who are about to die salute you.", "isCorrect": true, "rationale": "The epigraph directly provides 'Those who are about to die salute you' as the English translation for 'Morituri te salutant'."}, {"text": "Hail, Emperor!", "isCorrect": false, "rationale": "While the salute was directed at the Emperor, this phrase is not the full or direct translation of 'Morituri te salutant' as given in the text."}]}, {"question": "To whom was the gladiatorial salute 'Morituri te salutant' traditionally addressed, as indicated by the text?", "options": [{"text": "The Roman Senate.", "isCorrect": false, "rationale": "The epigraph specifies the salute was directed 'to the Emperor', not the Senate."}, {"text": "Their opponents in the arena.", "isCorrect": false, "rationale": "The text states the salute was 'to the Emperor', not to other gladiators."}, {"text": "The Emperor.", "isCorrect": true, "rationale": "The epigraph explicitly states it is a 'Traditional gladiatorial salute to the Emperor'."}, {"text": "The gods.", "isCorrect": false, "rationale": "The epigraph specifies the salute was 'to the Emperor', not to the gods."}]}, {"question": "What core sentiment is most directly conveyed by the gladiatorial salute 'Those who are about to die salute you'?", "options": [{"text": "A defiant challenge to authority.", "isCorrect": false, "rationale": "A 'salute' generally implies respect or acknowledgment, not defiance. The context points to acceptance of their fate under imperial authority."}, {"text": "A plea for mercy and survival.", "isCorrect": false, "rationale": "The phrase 'about to die' suggests an acknowledgment of an imminent, likely irreversible fate, rather than a plea for escape."}, {"text": "An acceptance of imminent death and a show of respect.", "isCorrect": true, "rationale": "The phrase 'those who are about to die' acknowledges their impending fate, and 'salute you' indicates respect or formality towards the Emperor, signifying an acceptance within their dire circumstances."}, {"text": "A boast of their fighting prowess.", "isCorrect": false, "rationale": "The focus is on their impending death, not their ability to fight, making it unlikely to be a boast."}]}, {"question": "Considering the chapter title is 'mort', what is the most likely purpose of including this specific epigraph at the beginning of the section?", "options": [{"text": "To provide historical information about Roman entertainment.", "isCorrect": false, "rationale": "While it does provide historical context, the primary purpose of an epigraph for a chapter titled 'mort' would be thematic rather than purely informational about entertainment."}, {"text": "To highlight the bravery of gladiators.", "isCorrect": false, "rationale": "Gladiatorial bravery might be an implication, but the explicit statement 'about to die' combined with 'mort' points more broadly to themes of death, not just bravery."}, {"text": "To introduce the theme of mortality, sacrifice, and the acknowledgement of death.", "isCorrect": true, "rationale": "The phrase 'those who are about to die' directly relates to mortality and the inevitability of death, setting a fitting tone for a chapter titled 'mort'."}, {"text": "To demonstrate the use of Latin in ancient Rome.", "isCorrect": false, "rationale": "While the epigraph includes Latin, its primary function for a chapter title 'mort' is thematic, not a lesson on Latin linguistics."}]}, {"question": "If a gladiator uttered 'Morituri te salutant' before entering the arena, what does this indicate about their understanding of the situation?", "options": [{"text": "They were confident they would win and survive the day.", "isCorrect": false, "rationale": "The phrase 'those who are about to die' directly contradicts an expectation of survival."}, {"text": "They were protesting their forced participation in the games.", "isCorrect": false, "rationale": "A 'salute' indicates a formal address or acknowledgment, not necessarily a protest against their situation."}, {"text": "They recognized the extreme danger and the high probability of their own death.", "isCorrect": true, "rationale": "The literal translation 'those who are about to die' signifies a clear understanding and acceptance of the mortal peril they faced."}, {"text": "They were hoping to impress the crowd for better rewards.", "isCorrect": false, "rationale": "While impressing the crowd might have been a goal for some gladiators, the specific phrase focuses on their impending death, not their performance or rewards."}]}, {"question": "The phrase 'Those who are about to die salute you' can be interpreted as carrying a tone of:", "options": [{"text": "Lighthearted jest and sarcasm.", "isCorrect": false, "rationale": "Given the life-or-death context of gladiatorial combat, a lighthearted or sarcastic tone is highly unlikely."}, {"text": "Solemn resignation and formal acknowledgment.", "isCorrect": true, "rationale": "The phrase acknowledges an inevitable, grim fate ('about to die') with a respectful address ('salute you'), indicating a solemn and resigned tone."}, {"text": "Aggressive challenge and threat.", "isCorrect": false, "rationale": "A 'salute' to the Emperor does not convey aggression or threat; rather, it is a formal gesture."}, {"text": "Triumphant victory and celebration.", "isCorrect": false, "rationale": "The phrase directly speaks to impending death, which is the antithesis of triumph and celebration."}]}, {"question": "The author of 'mort' chose this epigraph. What thematic connection is strongest between the epigraph and the presumed subject matter of a chapter titled 'mort'?", "options": [{"text": "The importance of historical greetings in different cultures.", "isCorrect": false, "rationale": "While the epigraph is a historical greeting, its specific content about 'dying' makes its connection to 'mort' far deeper than just greetings."}, {"text": "The political power structure of the Roman Empire.", "isCorrect": false, "rationale": "The epigraph touches on this, but the core theme linking it to 'mort' is not Roman politics itself, but the universal concept of death it expresses."}, {"text": "The inevitability and acceptance of death.", "isCorrect": true, "rationale": "The phrase 'those who are about to die' directly addresses the concept of impending death, which is central to a chapter titled 'mort'."}, {"text": "The role of public entertainment in ancient societies.", "isCorrect": false, "rationale": "Gladiatorial games were entertainment, but the epigraph's focus is on the mortal aspect, not entertainment as a broad topic for 'mort'."}]}, {"question": "Which part of the epigraph provides immediate clarity on the meaning of the Latin phrase?", "options": [{"text": "The chapter source 'From: mort'.", "isCorrect": false, "rationale": "The chapter source provides context for the epigraph's placement, not the direct meaning of the Latin phrase."}, {"text": "The term 'epigraphbox'.", "isCorrect": false, "rationale": "'Epigraphbox' is a formatting label and provides no semantic meaning to the Latin phrase."}, {"text": "The English translation provided directly below the Latin.", "isCorrect": true, "rationale": "The epigraph explicitly gives the English translation '“Those who are about to die salute you.”' immediately after the Latin, which is the most direct source of clarity on its meaning."}, {"text": "The explanation of its origin as a gladiatorial salute.", "isCorrect": false, "rationale": "The origin explains the *context* of the phrase, but the *translation* provides its direct meaning."}]}, {"question": "Beyond its literal gladiatorial context, the phrase 'Morituri te salutant' can serve as a metaphor for:", "options": [{"text": "The celebration of a long and prosperous life.", "isCorrect": false, "rationale": "The phrase explicitly refers to 'those who are about to die', which is contrary to celebrating a long life."}, {"text": "The pursuit of eternal fame and glory.", "isCorrect": false, "rationale": "While gladiators might seek fame, the phrase itself focuses on the acceptance of impending death, not the pursuit of glory."}, {"text": "Any situation where individuals face an inevitable end or extreme peril with dignity or a formal acknowledgment.", "isCorrect": true, "rationale": "The core of the phrase conveys facing a certain, grim fate ('about to die') while acknowledging or saluting a higher authority or circumstance. This concept can be applied metaphorically to other dire situations requiring fortitude."}, {"text": "The importance of military conquest and expansion.", "isCorrect": false, "rationale": "The phrase is about gladiators facing death, not military conquest, and thus does not directly metaphorize military expansion."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
