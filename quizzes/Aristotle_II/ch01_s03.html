<script>
var QUESTIONS = [{"question": "According to Longinus, what is the defining characteristic of 'the sublime' in literature?", "options": [{"text": "It strictly adheres to classical rules of composition and rhetoric.", "isCorrect": false, "rationale": "Longinus's focus is on the overwhelming emotional and intellectual impact of literature, not on strict adherence to rules, which he contrasts with merely pleasant or persuasive works."}, {"text": "It possesses the power of language to lift the reader out of ordinary experience and produce a sense of transport (ekstasis).", "isCorrect": true, "rationale": "The text explicitly states that the Longinian sublime is 'the power of language to lift the reader out of ordinary experience—to produce a shock of recognition and a sense of transport (ekstasis) that no merely pleasant or persuasive work achieves.'"}, {"text": "It is a grandeur of subject matter that ensures broad appeal.", "isCorrect": false, "rationale": "While grandeur of subject matter might contribute, Longinus emphasizes that the sublime is not merely grandeur but the *power of language* to create an overwhelming experience, distinct from general appeal."}, {"text": "It primarily serves to persuade the reader toward a specific moral or philosophical viewpoint.", "isCorrect": false, "rationale": "The text states that the sublime is something 'no merely pleasant or persuasive work achieves,' indicating it goes beyond simple persuasion."}]}, {"question": "Longinus identified five sources of the sublime. Which pair represents qualities he believed were 'gifts of nature' rather than cultivated skills?", "options": [{"text": "Noble diction and dignified composition.", "isCorrect": false, "rationale": "The text states that 'noble diction' and 'dignified composition' are among the last three sources that 'can be cultivated,' making them acquired skills, not natural gifts."}, {"text": "Greatness of thought and strong, inspired emotion.", "isCorrect": true, "rationale": "The text explicitly states, 'The first two are gifts of nature,' referring to 'greatness of thought' and 'strong and inspired emotion.'"}, {"text": "Certain figures of speech and noble diction.", "isCorrect": false, "rationale": "'Certain figures of speech' and 'noble diction' are listed among the last three sources that 'can be cultivated,' thus not natural gifts."}, {"text": "Dignified composition and greatness of thought.", "isCorrect": false, "rationale": "While 'greatness of thought' is a gift of nature, 'dignified composition' is a cultivated skill, making this option incorrect as a pair of natural gifts."}]}, {"question": "Averroes (Ibn Rushd) faced a significant challenge when interpreting Aristotle's Poetics for Arabic culture. What was the primary reason for this difficulty, and how did he resolve it?", "options": [{"text": "Arabic culture lacked a tradition of epic poetry, so Averroes reinterpreted tragedy as a form of lyrical verse.", "isCorrect": false, "rationale": "The text states Arabic culture had 'no tradition of theatrical performance,' not epic poetry. Averroes reinterpreted tragedy as 'praise poetry,' not lyrical verse."}, {"text": "Arabic culture had no tradition of theatrical performance, leading Averroes to reinterpret tragedy as praise poetry and comedy as satirical verse.", "isCorrect": true, "rationale": "The text explicitly states, 'Arabic culture had no tradition of theatrical performance. There was no word for “comedy” or “tragedy” in the sense Aristotle meant.' Averroes resolved this by reinterpreting 'tragedy as a form of praise poetry and comedy as a form of satirical verse.'"}, {"text": "The Arabic language had no equivalent for philosophical concepts, so Averroes translated the Poetics into Syriac.", "isCorrect": false, "rationale": "The text does not mention a general lack of philosophical equivalents in Arabic or a translation into Syriac; the challenge was specifically related to theatrical terms and concepts."}, {"text": "Aristotle's work was considered controversial in the Islamic world, so Averroes disguised it as a work of grammar.", "isCorrect": false, "rationale": "The text does not mention controversy or disguise; Averroes attempted to make sense of the work within the existing Arabic literary framework."}]}, {"question": "Lodovico Castelvetro's commentary on the Poetics significantly influenced European drama by transforming Aristotle's descriptive observations into prescriptive rules. Which of the 'three unities' was entirely Castelvetro's invention, not even hinted at by Aristotle?", "options": [{"text": "Unity of action.", "isCorrect": false, "rationale": "The text states, 'Aristotle prescribed only the first (unity of action),' meaning this unity originated with Aristotle, not Castelvetro."}, {"text": "Unity of character.", "isCorrect": false, "rationale": "Unity of character is not one of the 'three unities' formulated by Castelvetro or discussed in the context of Aristotle's Poetics in the provided text."}, {"text": "Unity of time.", "isCorrect": false, "rationale": "The text indicates that 'Aristotle... hinted at the second (unity of time); Castelvetro invented the third.' While Castelvetro made it a binding requirement, the idea was hinted at by Aristotle."}, {"text": "Unity of place.", "isCorrect": true, "rationale": "The text explicitly states, 'Castelvetro invented the third,' referring to unity of place, and further clarifies that he 'added the requirement of a single location, which Aristotle never mentioned.'"}]}, {"question": "Castelvetro's formulation of the 'three unities' had a profound and lasting impact on European drama. Which statement best describes this impact?", "options": [{"text": "It led to a period of highly experimental and unconventional theatrical productions.", "isCorrect": false, "rationale": "Castelvetro's rules were prescriptive and restrictive, leading to a period of adherence to strict norms rather than experimentation."}, {"text": "It made Aristotle's original ideas accessible to a wider, non-academic audience for the first time.", "isCorrect": false, "rationale": "While Castelvetro's work was influential, its primary impact was on dramatic rules and standards, not necessarily on popularizing Aristotle's broader ideas directly to a mass audience."}, {"text": "It established prescriptive rules that dominated European drama for two centuries, becoming a standard for neoclassical writers.", "isCorrect": true, "rationale": "The text states, 'These rules dominated European drama from the sixteenth through the eighteenth century... and became the standard by which French neoclassical writers like Corneille and Racine measured their work.'"}, {"text": "It encouraged playwrights to focus on individual character development over plot structure.", "isCorrect": false, "rationale": "The 'three unities' are primarily concerned with constraints on plot, time, and setting, not with an emphasis on character development over plot structure."}]}, {"question": "Sir Philip Sidney argued for the superiority of poetry (meaning all serious imaginative literature) over both philosophy and history. What was his central reason for this claim?", "options": [{"text": "Poetry presents objective facts more accurately than history.", "isCorrect": false, "rationale": "Sidney contrasts poetry with history by stating the historian 'records what actually happened,' implying history's domain is facts, not that poetry is more accurate with them."}, {"text": "Poetry offers abstract precepts in a clearer way than philosophy.", "isCorrect": false, "rationale": "Sidney states the philosopher 'gives abstract precepts,' whereas the poet embodies universal truths, suggesting a different, more holistic approach, not necessarily a clearer presentation of *abstract* precepts."}, {"text": "Poetry creates a 'golden world' that embodies universal truths of philosophy in particular stories, engaging the whole person.", "isCorrect": true, "rationale": "The text explains Sidney's argument: 'the poet creates a 'golden world' in which the universal truths of philosophy are embodied in particular stories that engage the whole person—mind, imagination, and heart.'"}, {"text": "Poetry is inherently more entertaining and therefore reaches a larger audience.", "isCorrect": false, "rationale": "While entertainment might be a factor in engaging the 'whole person,' Sidney's primary argument for superiority rests on poetry's capacity to teach and move towards the good by embodying universal truths, not just its broader appeal."}]}, {"question": "A modern novelist, inspired by Sidney's *The Defence of Poesy*, wishes to write a story that exemplifies the concept of a 'golden world.' Which approach would best align with Sidney's idea?", "options": [{"text": "Documenting historical events with meticulous accuracy to convey their universal lessons.", "isCorrect": false, "rationale": "This approach aligns with history, which Sidney differentiates from poetry. Sidney's 'golden world' involves creation and embodiment of truths, not mere documentation of what happened."}, {"text": "Presenting philosophical arguments through a series of logical deductions in a fictional dialogue.", "isCorrect": false, "rationale": "This aligns more with philosophy's method of giving abstract precepts, even if presented fictitiously. Sidney's 'golden world' transcends abstract precepts by embodying them in concrete stories."}, {"text": "Crafting a narrative where complex moral dilemmas are explored through relatable characters and a compelling plot, leading readers to contemplate universal ethical principles.", "isCorrect": true, "rationale": "This option best reflects Sidney's idea of a 'golden world' where 'universal truths of philosophy are embodied in particular stories that engage the whole person—mind, imagination, and heart' through 'moral and spiritual formation.'"}, {"text": "Creating a fantastical world entirely disconnected from human experience to inspire pure escapism.", "isCorrect": false, "rationale": "Sidney's 'golden world' is purposeful, aiming to teach and move human beings toward the good by connecting to universal truths, not merely to provide escapism."}]}, {"question": "The author states that Longinus, Averroes, Castelvetro, and Sidney collectively show that Aristotle's *Poetics* and *Rhetoric* were 'living texts.' What does this phrase primarily signify in the context of their contributions?", "options": [{"text": "Their works contain literal translations of Aristotle's original Greek texts.", "isCorrect": false, "rationale": "While some translation was involved (e.g., Arabic reception), the contributions of these figures were primarily interpretation, transformation, and debate, not just literal translation."}, {"text": "Aristotle's ideas remained relevant and continued to generate debate, inspiration, and transformation across centuries and cultures.", "isCorrect": true, "rationale": "The concluding paragraph explicitly states these voices 'show that Aristotle's Poetics and Rhetoric were not merely historical curiosities but living texts that continued to generate debate, inspiration, and transformation for centuries after their composition.'"}, {"text": "These authors primarily focused on preserving Aristotle's original meaning without alteration.", "isCorrect": false, "rationale": "Averroes 'transformed Aristotle's original meaning,' and Castelvetro 'invented' rules not mentioned by Aristotle, indicating alteration and adaptation, not just preservation."}, {"text": "Their literary styles were heavily influenced by Aristotle's prose.", "isCorrect": false, "rationale": "The text focuses on the conceptual and theoretical engagement with Aristotle's ideas, not on stylistic imitation of his prose."}]}, {"question": "According to the 'teachernote,' Augustine of Hippo's *De Doctrina Christiana* made a crucial argument regarding Christian preaching. What was this argument?", "options": [{"text": "Christian preachers should entirely reject classical rhetoric in favor of purely spiritual discourse.", "isCorrect": false, "rationale": "The text states Augustine's work is 'essentially an argument that Christian preachers should use the full resources of classical rhetoric,' directly contradicting this option."}, {"text": "Classical rhetoric, including Aristotle's ethos, pathos, and logos, should be used to effectively proclaim the Gospel.", "isCorrect": true, "rationale": "The 'teachernote' states Augustine's *De Doctrina Christiana* 'is essentially an argument that Christian preachers should use the full resources of classical rhetoric—Aristotle's ethos, pathos, and logos—in the service of proclaiming the Gospel.'"}, {"text": "Christian preaching should focus solely on logical argument (logos) and avoid emotional appeal (pathos).", "isCorrect": false, "rationale": "Augustine advocated for using the 'full resources' of classical rhetoric, which includes pathos (emotional appeal) alongside ethos and logos."}, {"text": "The only acceptable form of Christian oratory is spontaneous, unscripted prayer.", "isCorrect": false, "rationale": "The 'teachernote' discusses the tradition of formal rhetoric in preaching, not exclusively spontaneous prayer."}]}, {"question": "A playwright aims to create a tragedy that not only adheres to Castelvetro's 'three unities' but also achieves Longinus's 'sublime.' What potential tension or challenge might this playwright encounter in balancing these two critical frameworks?", "options": [{"text": "Castelvetro's emphasis on a single location and short time frame might restrict the scope for 'greatness of thought' and 'inspired emotion' often associated with the sublime.", "isCorrect": true, "rationale": "The sublime, with its aim to 'lift the reader out of ordinary experience' and achieve 'greatness of thought' and 'strong and inspired emotion,' can sometimes thrive on an expansive canvas. Castelvetro's rigid constraints on time and place (single day, single location) could potentially limit the opportunities for the grand scale or varied experiences that might contribute to the overwhelming power of the sublime, creating a tension for the playwright."}, {"text": "Longinus's focus on 'strong, inspired emotion' directly contradicts Castelvetro's call for rational plot construction.", "isCorrect": false, "rationale": "Strong emotion in literature does not inherently contradict a rational or well-structured plot. A well-constructed plot can effectively evoke powerful emotions; the two are not mutually exclusive."}, {"text": "The 'three unities' are primarily concerned with poetic diction, while the sublime is about dramatic structure.", "isCorrect": false, "rationale": "The 'three unities' are indeed about dramatic structure (plot, time, place), but the sublime encompasses noble diction as one of its sources, as well as thought, emotion, and composition, so the distinction is inaccurate."}, {"text": "Achieving the sublime requires multiple subplots, which would violate Castelvetro's unity of action.", "isCorrect": false, "rationale": "While some works achieving the sublime might have complex narratives, multiple subplots are not a *requirement* for the sublime. The sublime can be achieved within a single line or passage, and 'unity of action' itself does not necessarily preclude greatness of thought or emotion within that single plot."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
