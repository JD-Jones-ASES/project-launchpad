<script>
var QUESTIONS = [{"question": "Which statement best describes Horace's contribution to the legacy of Aristotle's Poetics?", "options": [{"text": "He directly translated the Poetics into Latin, making it accessible to Roman audiences.", "isCorrect": false, "rationale": "The text states that Horace 'did not translate Aristotle; he absorbed him and reworked him for Roman tastes,' indicating an adaptation rather than a direct translation."}, {"text": "He adapted Aristotelian principles like unity and the dual purpose of poetry for Roman culture, significantly influencing Renaissance aesthetics.", "isCorrect": true, "rationale": "Horace 'absorbed him and reworked him for Roman tastes,' taking principles such as unity and the idea that poetry should 'delight and instruct.' His Ars Poetica 'became, in turn, enormously influential on the Renaissance,' making this the correct description of his contribution."}, {"text": "He systematized Aristotle's theories into a rigid set of dramatic rules for the Roman stage.", "isCorrect": false, "rationale": "The text describes Horace's Ars Poetica as 'not a systematic treatise' but rather a 'discursive, witty verse letter,' suggesting it was not a rigid system of rules in the way Renaissance critics later developed."}, {"text": "He challenged Aristotle's ideas, arguing that poetry should only delight and not instruct.", "isCorrect": false, "rationale": "Horace explicitly formulated that poetry should 'both delight and instruct (aut prodesse aut delectare),' directly echoing Aristotle's view, not challenging it."}]}, {"question": "The phrase 'aut prodesse aut delectare' (either to benefit or to delight) encapsulates a core principle inherited from Aristotle. Which of the following modern artistic scenarios best exemplifies this principle?", "options": [{"text": "A viral video designed solely to amuse viewers with a silly dance.", "isCorrect": false, "rationale": "This scenario focuses only on 'delectare' (delight) without a clear element of 'prodesse' (benefit or instruction), thus not fully embodying the dual purpose."}, {"text": "A documentary film that educates audiences about climate change without attempting to entertain.", "isCorrect": false, "rationale": "This scenario emphasizes 'prodesse' (benefit/instruction) but explicitly states it does not attempt to entertain, missing the 'delectare' aspect of Horace's formulation."}, {"text": "A novel that tells an engaging story while subtly exploring themes of social justice and personal growth.", "isCorrect": true, "rationale": "This novel simultaneously provides an 'engaging story' (delectare/delight) and explores 'themes of social justice and personal growth' (prodesse/benefit or instruct), perfectly aligning with the dual purpose of poetry described by Horace."}, {"text": "An abstract painting intended to evoke strong emotions without representing any specific subject.", "isCorrect": false, "rationale": "While an abstract painting can evoke emotions (delectare), its primary aim is not typically to instruct or benefit in a clear, thematic way, making it an incomplete match for the principle."}]}, {"question": "During the Renaissance, how did scholars primarily approach Aristotle's Poetics?", "options": [{"text": "They viewed it as a flexible guide, encouraging playwrights to innovate beyond its suggestions.", "isCorrect": false, "rationale": "The text states that scholars 'sought to derive from Aristotle a complete system of literary rules' and that 'Castelvetro's three unities became the test by which all drama was judged,' indicating a rigid rather than flexible approach."}, {"text": "They used it to justify existing literary practices, rather          than to create new ones.", "isCorrect": false, "rationale": "Renaissance scholars not only applied the Poetics to existing forms but also derived rules for 'the newly invented form of the prose romance,' showing an active role in shaping new practices based on Aristotle."}, {"text": "They interpreted it as a source for deriving a systematic and often rigid set of literary rules, such as the three unities.", "isCorrect": true, "rationale": "The text explicitly mentions that scholars 'sought to derive from Aristotle a complete system of literary rules' and that 'Castelvetro's three unities became the test by which all drama was judged,' which accurately describes their systematic and often rigid interpretation."}, {"text": "They largely ignored it, preferring indigenous folk traditions for literary inspiration.", "isCorrect": false, "rationale": "The text states that the Greek text of the Poetics 'was printed in 1508 and translated into Latin (1498) and Italian (1549)' and 'became the center of a vast critical enterprise,' demonstrating its profound importance rather than being ignored."}]}, {"question": "The text describes Shakespeare's relationship with Aristotelian principles as complex. Which statement best encapsulates this complexity?", "options": [{"text": "Shakespeare strictly adhered to all of Aristotle's rules, including the three unities, which led to his dramatic success.", "isCorrect": false, "rationale": "The text explicitly states that Shakespeare 'ignored the unities of time and place' and achieved his results 'without the three unities.'"}, {"text": "Shakespeare's plays, while ignoring explicit Aristotelian rules like the unities, nevertheless embodied deeper Aristotelian truths about plot and character.", "isCorrect": true, "rationale": "The text notes Shakespeare 'achieved this without the three unities' and in doing so 'showed that Aristotle's deepest principles are not rules to be followed but truths to be discovered by each great writer anew,' making this the correct answer."}, {"text": "Shakespeare consciously rejected Aristotle's Poetics entirely, finding no value in its theories.", "isCorrect": false, "rationale": "The text asserts that Shakespeare's tragedies 'are among the most powerful realizations of Aristotelian principles ever achieved,' indicating a profound, albeit indirect, engagement rather than outright rejection."}, {"text": "Shakespeare's comedies are Aristotelian, but his tragedies owe nothing to Aristotle's ideas.", "isCorrect": false, "rationale": "The text describes both Shakespeare's tragedies (e.g., 'heroes of genuine greatness undone by errors of judgment') and comedies ('imitation of the ridiculous') as illuminating Aristotelian principles."}]}, {"question": "How does Aristotle's Poetics continue to influence modern storytelling forms like novels and screenplays, despite predating them?", "options": [{"text": "By dictating specific genre conventions for detective novels and horror films.", "isCorrect": false, "rationale": "The text describes broader influences like plot structure and mimesis, not specific genre conventions for modern subgenres."}, {"text": "By providing a foundational understanding of plot structure, character development (catharsis), and the imitation of human action (mimesis).", "isCorrect": true, "rationale": "The text explicitly mentions the novel as a form of 'mimesis' aiming for 'unified, causally coherent plot,' and Hollywood screenwriting's 'three-act structure' as an 'Aristotelian construct,' with the 'character arc' as 'Aristotelian catharsis made commercial,' aligning with this option."}, {"text": "By requiring all narratives to observe the three unities of time, place, and action, as seen in most contemporary blockbusters.", "isCorrect": false, "rationale": "The text mentions that even Shakespeare ignored the unities of time and place, and while modern screenwriting uses an Aristotelian structure, it doesn't rigidly adhere to these specific unities in the way Renaissance critics did."}, {"text": "Its influence is primarily limited to academic literary criticism and has little bearing on commercial storytelling.", "isCorrect": false, "rationale": "The text states that the three-act structure 'dominates Hollywood screenwriting' and references Syd Field's influential screenwriting manual as a 'practical adaptation of Aristotle for the cinema,' directly contradicting this claim."}]}, {"question": "Which of the following best describes Cicero's principal role in transmitting and developing Aristotle's Rhetoric?", "options": [{"text": "He strictly translated Aristotle's Rhetoric into Latin, ensuring its direct preservation.", "isCorrect": false, "rationale": "Cicero 'synthesized Greek rhetorical theory for the Latin world,' indicating an adaptation and integration, not just a strict translation."}, {"text": "He applied Aristotelian principles in his own renowned orations and systematized them into the five canons of rhetoric, creating a teachable curriculum.", "isCorrect": true, "rationale": "Cicero was 'the greatest Roman orator—a man who actually used the principles he described' and 'gave the rhetorical tradition its enduring organizational framework: the five canons of rhetoric... systematized them into a teachable curriculum,' accurately reflecting his contributions."}, {"text": "He rejected Aristotle's emphasis on logic (logos), preferring an emotional approach to persuasion.", "isCorrect": false, "rationale": "Cicero 'synthesized Greek rhetorical theory,' which would have included logical appeals (logos), and he systematized all five canons, not just emotional aspects."}, {"text": "His contributions were largely ignored until the Renaissance, when scholars rediscovered his works.", "isCorrect": false, "rationale": "The text states that Cicero's system 'persisted through the Middle Ages and Renaissance,' indicating continuous influence rather than being ignored."}]}, {"question": "Quintilian's definition of the orator as 'vir bonus dicendi peritus' (a good man skilled in speaking) highlights which crucial aspect of effective rhetoric, as inherited from Aristotle?", "options": [{"text": "The importance of memorizing speeches verbatim for flawless delivery.", "isCorrect": false, "rationale": "While 'memoria' (memory) is one of Cicero's canons, Quintilian's specific definition emphasizes 'good man' and 'skilled in speaking,' linking morality and craft, which goes beyond mere memorization."}, {"text": "The necessity of innate talent over learned skill in public speaking.", "isCorrect": false, "rationale": "The phrase 'skilled in speaking' (dicendi peritus) directly implies a learned craft or developed skill, not solely innate talent."}, {"text": "The inseparable link between an orator's moral character (ethos) and their persuasive ability.", "isCorrect": true, "rationale": "The text explicitly states that this definition 'restates Aristotle's account of ethos in terms that bridge morality and craft,' meaning the speaker's 'goodness' (moral character) is fundamental to their persuasive skill."}, {"text": "The exclusive focus on emotional appeals (pathos) to sway an audience.", "isCorrect": false, "rationale": "Quintilian's definition relates to the speaker's overall credibility and character (ethos), not an exclusive focus on emotional appeals (pathos)."}]}, {"question": "Augustine of Hippo's De Doctrina Christiana represents a significant transformation of Aristotelian rhetoric. What was the core of this transformation?", "options": [{"text": "He argued against the use of classical rhetoric, believing it to be inherently pagan and unsuitable for Christian purposes.", "isCorrect": false, "rationale": "The text explicitly states that Augustine's decision was 'to argue that the preacher should use all the resources of classical rhetoric in the service of the Gospel,' directly refuting this option."}, {"text": "He adapted classical rhetorical principles to serve Christian preaching, redirecting its persuasive power from temporal to eternal goals.", "isCorrect": true, "rationale": "Augustine argued that the 'same power of speech that pagan orators used to move audiences toward temporal goods can and should be used by Christian preachers to move audiences toward eternal ones,' which is the core of his transformation."}, {"text": "He developed a completely new system of rhetoric, entirely independent of Greek and Roman traditions.", "isCorrect": false, "rationale": "Augustine advocated for using 'all the resources of classical rhetoric,' indicating an adaptation and re-purposing, not a creation of an entirely new system."}, {"text": "He limited Christian rhetoric exclusively to teaching (docere), rejecting delight and moving as worldly.", "isCorrect": false, "rationale": "Augustine embraced 'The three purposes of the orator—docere (to teach), delectare (to delight), movere (to move)' as the preacher's tools, emphasizing 'movere' (to move) as ultimately the greatest goal for conversion."}]}, {"question": "Which of the following lists accurately represents Cicero's five canons of rhetoric, which systematized Aristotle's treatment of the subject?", "options": [{"text": "Ethos, Pathos, Logos, Kairos, Telos.", "isCorrect": false, "rationale": "These are modes of persuasion or rhetorical concepts, primarily associated with Aristotle, but not Cicero's organizational framework of the five canons."}, {"text": "Invention, Arrangement, Style, Memory, Delivery.", "isCorrect": true, "rationale": "The text explicitly lists the five canons as 'inventio (finding arguments), dispositio (arrangement), elocutio (style), memoria (memory), and pronuntiatio (delivery),' which correspond to these terms."}, {"text": "Unity, Plot, Character, Diction, Spectacle.", "isCorrect": false, "rationale": "These are the main elements of tragedy as outlined in Aristotle's Poetics, not the canons of rhetoric."}, {"text": "Beginning, Middle, End, Reversal, Recognition.", "isCorrect": false, "rationale": "These are key elements of plot structure described in Aristotle's Poetics, not Cicero's canons of rhetoric."}]}, {"question": "Considering the entire section, what is the overarching message regarding Aristotle's Poetics and Rhetoric?", "options": [{"text": "Their influence was largely confined to ancient Greece and Rome, with minimal impact on later periods.", "isCorrect": false, "rationale": "The entire section traces their 'incalculable influence' from 'ancient Rome to modern Hollywood' and through the 'medieval university to the modern advertising agency,' directly contradicting this statement."}, {"text": "They provided rigid, unchanging rules that stifled creativity in subsequent literary and rhetorical traditions.", "isCorrect": false, "rationale": "While some periods, like the Renaissance, derived rigid rules, the text also highlights how figures like Shakespeare found 'truths' beyond 'rules,' and how Augustine 'transformed' rhetoric, demonstrating adaptability rather than universal stifling."}, {"text": "They offered foundational, adaptable principles of effective communication and storytelling that have been continuously reinterpreted and applied across diverse cultures and media for centuries.", "isCorrect": true, "rationale": "The section repeatedly emphasizes their 'incalculable influence,' their absorption and reworking by various figures (Horace, Cicero, Augustine), their application to new forms (novel, screenwriting), and their endurance over centuries, making this the most accurate overarching message."}, {"text": "They are primarily of historical interest to philosophers, with limited relevance to practicing artists or communicators today.", "isCorrect": false, "rationale": "The text explicitly mentions their influence on 'modern Hollywood' screenwriting and 'the modern advertising agency,' demonstrating clear contemporary relevance beyond historical philosophy."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
