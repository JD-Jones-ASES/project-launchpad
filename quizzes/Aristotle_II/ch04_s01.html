<script>
var QUESTIONS = [{"question": "According to Aristotle, what is the primary reason why mastering metaphor is considered a sign of genius rather than a teachable skill?", "options": [{"text": "It requires an innate ability to perceive resemblances between unlike things.", "isCorrect": true, "rationale": "Aristotle explicitly states that making good metaphors implies 'an eye for resemblances' and that this ability 'cannot be learnt from others' but is a 'natural capacity of mind' or *eudaiphyia*."}, {"text": "It involves using rare and elevated words that are difficult to acquire.", "isCorrect": false, "rationale": "While metaphor often uses elevated language, Aristotle clarifies that grammar, meter, and vocabulary registers (including rare words) *can* be taught. The genius of metaphor lies in the 'seeing' of resemblances, not merely in the words themselves."}, {"text": "It is the only poetic device that evokes strong emotions in the audience.", "isCorrect": false, "rationale": "Many poetic devices can evoke emotion. The text emphasizes metaphor's uniqueness in its untaught nature and its connection to insight and understanding, not primarily its emotional impact."}, {"text": "It is fundamentally a divine inspiration that cannot be rationally explained.", "isCorrect": false, "rationale": "Aristotle distinguishes his view from Plato's idea of divine inspiration, stating that metaphor-making is 'something more precise' – an innate talent (eudaiphyia) rather than a divine gift."}]}, {"question": "If a poet describes 'a thousand suns' to convey the idea of 'many bright stars,' which type of Aristotelian metaphor is most likely being employed?", "options": [{"text": "Genus to species", "isCorrect": false, "rationale": "Genus to species would be using a broader category (genus) to represent a specific instance (species), like 'lying' for 'anchoring.' Here, 'thousand' is more specific than 'many'."}, {"text": "Species to genus", "isCorrect": true, "rationale": "In this case, 'a thousand' is a specific number (a species) used to represent the general idea of 'many' (the genus). This aligns with Aristotle's example of 'ten thousand noble deeds' for 'many noble deeds'."}, {"text": "Species to species", "isCorrect": false, "rationale": "Species to species involves using one specific instance to represent another specific instance within the same broader category (genus), as in 'drew away the life' and 'cleft the water' both being species of 'taking away.' This doesn't fit the 'thousand' for 'many' relationship."}, {"text": "Proportional (analogy)", "isCorrect": false, "rationale": "Proportional metaphor involves an analogy (A:B as C:D), where one term is substituted for another based on a shared relationship, such as 'the shield of Dionysus' for 'cup.' No such analogy is explicitly described here."}]}, {"question": "Aristotle's concept of good poetic diction emphasizes a balance between clarity and elevation. Which statement best describes this balance?", "options": [{"text": "Poets should exclusively use common, ordinary words to ensure maximum clarity for all audiences.", "isCorrect": false, "rationale": "While ordinary words achieve clarity, Aristotle warns that a style built entirely of them leads to 'meanness,' 'flatness of prose that goes nowhere,' lacking elevation."}, {"text": "Elevated language, including metaphors and rare words, should be used moderately to lift ordinary language without causing obscurity.", "isCorrect": true, "rationale": "The text states the goal is 'a blend that uses ordinary words as its foundation, with metaphor, rare words, and other deviations from normal usage providing the 'lift' that separates memorable poetry from competent prose,' emphasizing moderation and propriety."}, {"text": "The primary goal is to impress the audience with complex, rare words, even if it sacrifices some immediate understanding.", "isCorrect": false, "rationale": "A style built entirely of strange or rare words 'becomes a riddle or a jargon, impressive but impenetrable,' sacrificing clarity for elevation, which is not the ideal balance."}, {"text": "Clarity is achieved by simple sentence structures, while elevation comes from lengthier, more complex sentences.", "isCorrect": false, "rationale": "The discussion of clarity and elevation in this section primarily focuses on word choice (ordinary vs. rare, metaphor) and poetic devices, rather than sentence structure or length."}]}, {"question": "The term *eudaiphyia* is used by Aristotle in the context of metaphor to emphasize what aspect of a poet's ability?", "options": [{"text": "Their mastery of grammar and meter.", "isCorrect": false, "rationale": "Grammar and meter are considered teachable craft elements. *Eudaiphyia* specifically refers to what cannot be taught."}, {"text": "Their ability to evoke strong emotions in the audience.", "isCorrect": false, "rationale": "While effective metaphors can evoke emotion, *eudaiphyia* refers to the inherent cognitive capacity to *create* such metaphors by seeing resemblances, not their emotional outcome."}, {"text": "Their natural gift for seeing resemblances between disparate things.", "isCorrect": true, "rationale": "The text defines *eudaiphyia* as 'A good natural endowment; being naturally well-gifted,' used to emphasize that 'metaphor-making depends on innate talent, not on acquired skill or teachable technique,' specifically 'an eye for resemblances.'"}, {"text": "Their diligence in practicing poetic techniques.", "isCorrect": false, "rationale": "*Eudaiphyia* points to innate talent, directly contrasting with 'acquired skill or teachable technique' and 'practice'."}]}, {"question": "Aristotle praises Homer for a particular narrative technique that distinguishes him from other epic poets. What is this technique, and why is it significant?", "options": [{"text": "Homer uses an exceptionally high number of rare words and extended metaphors, making his language uniquely elevated.", "isCorrect": false, "rationale": "While Homer does use elevated language, Aristotle's specific praise in this context is for Homer's narrative *voice*, not just his diction. The text notes that Homer's language is elevated and clear, but this isn't the distinguishing technique mentioned."}, {"text": "Homer primarily narrates events from an omniscient third-person perspective, providing constant authorial commentary.", "isCorrect": false, "rationale": "This is the opposite of what Aristotle praises. Homer is singled out because he 'speak[s] as little as possible in his own person,' minimizing authorial commentary."}, {"text": "Homer minimizes his own presence as narrator, allowing characters' actions and speech to tell the story, which gave dramatic form to narrative.", "isCorrect": true, "rationale": "Aristotle explicitly states that Homer 'speaks as little as possible in his own person' and 'lets his characters speak and act,' thus allowing 'the imitation speak for itself,' making him the 'father of tragedy as well as of epic' by giving 'dramatic form to narrative poetry.'"}, {"text": "Homer ensures perfect factual accuracy in all his descriptions, even when depicting the impossible, ensuring credibility.", "isCorrect": false, "rationale": "Aristotle's defense of poetry allows for 'probable impossibility' if it serves artistic purpose, indicating that perfect factual accuracy isn't a strict requirement, nor is it Homer's distinguishing narrative technique described here."}]}, {"question": "How does Aristotle apply his 'doctrine of the mean' to the concept of good poetic style?", "options": [{"text": "Good style is achieved by prioritizing clarity over elevation, leaning towards simplicity.", "isCorrect": false, "rationale": "Prioritizing clarity to the exclusion of elevation leads to 'flatness' or 'meanness,' which Aristotle considers one extreme to be avoided, not the mean."}, {"text": "Good style is a balance between being too ordinary (flatness) and too obscure (bizarre), much like virtue is between two vices.", "isCorrect": true, "rationale": "The text directly states, 'just as virtue lies between two vices (the doctrine of the mean from the Ethics), good style lies between the two failures of flatness and obscurity.'"}, {"text": "Poets should avoid all unusual or rare words to maintain a consistently accessible and comprehensible style.", "isCorrect": false, "rationale": "Avoiding all unusual words sacrifices elevation, leading to 'flatness.' Aristotle advocates for a blend, using rare words in moderation, not avoiding them entirely."}, {"text": "The best style involves consistently pushing linguistic boundaries to achieve maximum elevation, even if it risks confusing the audience.", "isCorrect": false, "rationale": "This describes the extreme of 'obscurity' or 'jargon,' which Aristotle identifies as a failure of style that sacrifices clarity, not the desired mean."}]}, {"question": "In his defense of poetry, Aristotle differentiates between essential and accidental errors. Which scenario represents an essential error according to his criteria?", "options": [{"text": "A poet accurately describes historical events but uses a meter that is inconsistent with traditional poetic forms.", "isCorrect": false, "rationale": "Errors in meter might be a flaw in craft, but an 'essential error' specifically damages the 'artistic effect' or the poem's 'purpose,' often related to plot coherence or character consistency. Meter isn't given as the primary example of an essential error here."}, {"text": "A poet mistakenly depicts a character performing a medical procedure incorrectly, but the overall plot remains compelling and moving.", "isCorrect": false, "rationale": "This is an example of an 'accidental' error – a factual inaccuracy that 'do[es] not affect the poem's power to achieve its purpose.' If the poem still works, the error is minor."}, {"text": "A poem's plot is poorly constructed and incoherent, making it difficult for the audience to follow the story's emotional arc.", "isCorrect": true, "rationale": "The text states, 'If a poem's construction is faulty — its plot incoherent, its characters inconsistent — the error is serious, because it damages the thing the poem is trying to do.' This directly undermines the artistic effect."}, {"text": "A poet uses a rare word that few readers understand, momentarily pausing the flow of comprehension.", "isCorrect": false, "rationale": "This would be an error in balance (leaning towards obscurity) or clarity, but not necessarily an 'essential error' that damages the fundamental artistic effect or purpose of the entire poem in the way an incoherent plot would."}]}, {"question": "A poet writes a story where a character flies by pure will, a clear impossibility. Under what condition would Aristotle most likely defend this poetic choice?", "options": [{"text": "The poet explicitly states that the story is entirely fictional and not meant to be realistic.", "isCorrect": false, "rationale": "A disclaimer of fiction is not the condition Aristotle provides. His defense is based on the artistic purpose and effect, not simply whether the poet labels it as fiction."}, {"text": "The flying character is central to a vivid and powerful artistic effect that serves the poem's overall purpose.", "isCorrect": true, "rationale": "Aristotle argues that 'a probable impossibility is to be preferred to an improbable possibility' and that if 'depicting something that never happened or could never happen achieves a vivid, powerful effect, the poet is justified — as long as the effect is genuine and not merely the result of laziness or shock.'"}, {"text": "The poet has mastered all other aspects of poetic craft, making the impossibility a minor flaw.", "isCorrect": false, "rationale": "Mastery of other craft elements does not inherently justify an impossibility. The condition is specifically about the artistic purpose it serves."}, {"text": "The impossibility is a common trope in the genre, so audiences expect and accept it without question.", "isCorrect": false, "rationale": "While genre conventions can influence audience acceptance, Aristotle's defense hinges on the artistic purpose and effect achieved, not merely on audience expectation or conventionality."}]}, {"question": "Despite epic poetry's grander scope and length, Aristotle ultimately argues that tragedy is the higher form of poetry. What is the core reason for this judgment?", "options": [{"text": "Tragedy allows for more complex characters and intricate plotlines than epic poetry.", "isCorrect": false, "rationale": "The text states epic 'can present multiple episodes, multiple threads of action, and a wider range of character.' Tragedy's focus is on concentration, not necessarily more complexity in characters/plots overall."}, {"text": "Tragedy is able to achieve its specific artistic pleasure more perfectly and with greater concentration than epic.", "isCorrect": true, "rationale": "Aristotle argues that tragedy 'achieves what art is for — the production of its proper pleasure — more perfectly. It does more with less. The Oedipus Rex, in a few hours on stage, produces a concentration of pity and fear that the Iliad... spreads across thousands of lines.'"}, {"text": "Epic poetry is inherently flawed because it relies too heavily on authorial narration rather than dramatic imitation.", "isCorrect": false, "rationale": "Aristotle praises Homer for *avoiding* heavy authorial narration, showing that epic is not inherently flawed in this regard. The argument for tragedy's superiority is based on its concentrated effect, not a universal flaw in epic narration."}, {"text": "Tragedy incorporates elements like music and spectacle, which are superior artistic forms compared to purely linguistic narrative.", "isCorrect": false, "rationale": "While tragedy 'adds music' and 'spectacle,' Aristotle notes it 'works even without performance.' The core argument is about the 'perfection' and 'concentration' of its effect, not merely the inclusion of more elements."}]}, {"question": "The text describes Aristotle's view that metaphor is closely tied to learning. Which statement best illustrates this connection?", "options": [{"text": "Metaphor uses unusual words that challenge the audience to expand their vocabulary and linguistic knowledge.", "isCorrect": false, "rationale": "While metaphor can use unusual words, the 'learning' Aristotle refers to is about understanding relationships and seeing the world differently, not primarily vocabulary acquisition."}, {"text": "Metaphor functions as a mnemonic device, helping audiences remember complex ideas by associating them with simpler ones.", "isCorrect": false, "rationale": "The text emphasizes metaphor's role in *creating* understanding and new insights by revealing unexpected similarities, rather than just aiding memory recall through association."}, {"text": "By revealing unexpected resemblances between different domains, metaphor creates new understanding and insight for the audience.", "isCorrect": true, "rationale": "The text states, 'We recognize the resemblance and, in recognizing it, learn something. This is why Aristotle ties metaphor so closely to learning: metaphor creates understanding by connecting two domains through an unexpected similarity.'"}, {"text": "Learning to identify and classify the four types of metaphor improves one's analytical skills.", "isCorrect": false, "rationale": "This describes learning *about* metaphor as a technique. Aristotle's point is how metaphor itself, when encountered, facilitates learning and understanding of the subject matter it describes."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
