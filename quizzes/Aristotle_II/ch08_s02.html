    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Aristotle_II.html">&larr; Back to The Life of Words (Aristotle II)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 8, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Based on the text, why did Aristotle himself not use the term \"Metaphysics\" to describe his inquiry into the nature of being?", "options": [{"text": "The term was coined by Andronicus of Rhodes to describe the work's physical placement after the Physics.", "isCorrect": true, "rationale": "The title refers to the editorial arrangement by Andronicus ($\\text{ta meta ta physika}$), meaning 'the things after the physics,' rather than a name Aristotle gave the subject."}, {"text": "Aristotle believed the study of being was lower in priority than the study of the physical world.", "isCorrect": false, "rationale": "Aristotle actually called this inquiry 'first philosophy,' indicating it held the highest priority in his hierarchy of knowledge."}, {"text": "The term was considered too poetic and lacked the logical precision Aristotle required for 'first philosophy.'", "isCorrect": false, "rationale": "Aristotle's choice of names like 'theology' or 'first philosophy' was based on the subject matter, not a rejection of the term 'metaphysics' for aesthetic reasons."}, {"text": "Aristotle intended for the work to be a direct continuation of his biological studies, not a separate discipline.", "isCorrect": false, "rationale": "While related, Aristotle distinguished 'being qua being' from the study of specific kinds of beings like biological organisms."}]}, {"question": "In the context of the four causes, how does Aristotle define the formal cause ($\\text{eidos}$)?", "options": [{"text": "The defining structure or pattern that makes a thing the specific kind of thing it is.", "isCorrect": true, "rationale": "The formal cause is the essence or organizing principle, such as a house's design or a human's soul, that gives matter its specific identity."}, {"text": "The external agent or craftsman whose skill brings a new object into existence.", "isCorrect": false, "rationale": "This description refers to the efficient cause, the source of the change or movement."}, {"text": "The underlying material substrate that persists throughout a process of change.", "isCorrect": false, "rationale": "This describes the material cause ($\\text{hyle}$), the 'stuff' out of which something is made."}, {"text": "The ultimate purpose or 'that for the sake of which' a thing exists.", "isCorrect": false, "rationale": "This identifies the final cause ($\\text{telos}$), which concerns the goal or end of a thing."}]}, {"question": "According to the text's explanation of substance ($\\text{ousia}$) and accident, which of the following represents a substance?", "options": [{"text": "A specific, individual horse.", "isCorrect": true, "rationale": "A substance is a determinate thing that exists in its own right, whereas accidents are qualities that belong to such things."}, {"text": "The paleness of a man's skin.", "isCorrect": false, "rationale": "Paleness is a quality or accident that characterizes a substance but is not the substance itself."}, {"text": "The act of standing in a marketplace.", "isCorrect": false, "rationale": "The position or action of a person is an accidental attribute of the primary substance (the person)."}, {"text": "The mathematical number of leaves on a branch.", "isCorrect": false, "rationale": "Quantity is a category of accident that describes a substance rather than being a substance itself."}]}, {"question": "How does Aristotle apply the concept of potentiality ($\\text{dynamis}$) and actuality ($\\text{energeia}$) to the relationship between matter and form?", "options": [{"text": "Matter is potentiality; form is the actuality that fulfills that potential.", "isCorrect": true, "rationale": "Aristotle views the development of any thing as a movement from its material potentiality toward its formal actuality."}, {"text": "Matter is pure actuality, while form is the potential for variety within that matter.", "isCorrect": false, "rationale": "Matter is passive potential; it is the form that provides the actualized structure and activity."}, {"text": "Actuality and potentiality are accidental attributes that do not apply to the core of form and matter.", "isCorrect": false, "rationale": "The text states that these concepts structure the Metaphysics and explain the 'coming-to-be' of all natural things."}, {"text": "Potentiality is the goal ($\\text{telos}$), while actuality is the raw material ($\\text{hyle}$).", "isCorrect": false, "rationale": "This reverses the relationship; the goal is the fulfillment of potential, which is the state of actuality."}]}, {"question": "What is the primary logical reason Aristotle argues there must be an 'Unmoved Mover' ($\\text{proton kinoun akineton}$)?", "options": [{"text": "To avoid an infinite regress in the chain of causes that would leave change unexplained.", "isCorrect": true, "rationale": "Aristotle posits that a first cause is necessary because a chain of movers tracing back indefinitely never reaches an ultimate explanation."}, {"text": "To provide a theological basis for the creation of the universe out of nothing.", "isCorrect": false, "rationale": "The text notes that Aristotle's Unmoved Mover did not create the world, distinguishing it from the God of Scripture."}, {"text": "To establish a moral judge who intervenes in human history based on virtue.", "isCorrect": false, "rationale": "Aristotle's Unmoved Mover does not know individual humans or act in history; it is a metaphysical principle of motion."}, {"text": "To explain the physical force that pushes the planets in their orbits.", "isCorrect": false, "rationale": "The Unmoved Mover 'moves' things as an object of desire or love, not through physical pushing or mechanical force."}]}, {"question": "How does the Metaphysics provide a foundation for the claims made in Aristotle's Poetics?", "options": [{"text": "It explains that poetry imitates the formal universal structures of human action.", "isCorrect": true, "rationale": "The 'universal' truth conveyed in poetry is a formal universal, requiring the metaphysical doctrine of form and essence to be understood."}, {"text": "It provides a list of material causes, like specific vocabulary, used to construct a plot.", "isCorrect": false, "rationale": "While language is a material cause, the text emphasizes that the metaphysical link lies in the imitation of 'reality' through form."}, {"text": "It argues that the Unmoved Mover is the primary audience for all tragic performances.", "isCorrect": false, "rationale": "The Unmoved Mover is 'pure thought thinking itself' and is not described as an observer of human art."}, {"text": "It suggests that art is an accident of history rather than a substance of human life.", "isCorrect": false, "rationale": "The text argues the opposite: that the 'life of words' is an organ of human nature, grounded in the rational form of the soul."}]}, {"question": "Which metaphysical concept explains why humans are susceptible to rational persuasion in the Rhetoric?", "options": [{"text": "The human soul is the form of a rational animal whose distinctive actuality is $\\text{logos}$.", "isCorrect": true, "rationale": "We are persuadable because our nature is constitutively rational; the form of argument corresponds to the form of our rational actuality."}, {"text": "The Unmoved Mover directly implants rational thoughts into the minds of the audience.", "isCorrect": false, "rationale": "Aristotle's Unmoved Mover is not an active intervenor in human psychology or persuasion."}, {"text": "The material cause of the human body is specifically designed to vibrate in response to speech.", "isCorrect": false, "rationale": "Persuasion is linked to the formal and actualized nature of the soul (reason), not merely the physical material of the body."}, {"text": "Rhetoric is an accidental property that has no relation to the substance of the human person.", "isCorrect": false, "rationale": "The text argues that we are 'animals constituted by language,' making $\\text{logos}$ central to our nature rather than accidental."}]}, {"question": "According to the text, what is the 'final cause' ($\\text{telos}$) of a human being in Aristotle's system?", "options": [{"text": "$\\text{Eudaimonia}$—the full and excellent exercise of human capacities.", "isCorrect": true, "rationale": "In both the Ethics and Metaphysics, the purpose of a human being is the flourishing that comes from fulfilling their specific nature."}, {"text": "The survival and reproduction of the biological material cause.", "isCorrect": false, "rationale": "While necessary, biological survival is not the 'highest' final cause that distinguishes human excellence."}, {"text": "The achievement of political power over other substances.", "isCorrect": false, "rationale": "Politics is a means toward the good life, but the ultimate end is the activity of the soul in accordance with virtue."}, {"text": "The eventual separation of the form from the body after death.", "isCorrect": false, "rationale": "For Aristotle, forms (including the soul) do not typically exist separately from matter, unlike the Platonic view."}]}, {"question": "The text describes the Unmoved Mover as 'pure actuality.' What does this imply about its nature?", "options": [{"text": "It contains no matter or potentiality and exists as pure thought thinking itself.", "isCorrect": true, "rationale": "Anything with potentiality can be changed or moved; therefore, the first mover must be entirely actualized and immaterial."}, {"text": "It is a physical body located at the center of the universe to maximize its influence.", "isCorrect": false, "rationale": "Pure actuality implies a lack of matter, so the Unmoved Mover cannot be a physical body."}, {"text": "It is constantly evolving and changing its mind as it observes the cosmos.", "isCorrect": false, "rationale": "Change implies potentiality (the ability to be something else), which is the opposite of pure actuality."}, {"text": "It is the sum total of all material potential in the universe.", "isCorrect": false, "rationale": "Matter is defined as potentiality, whereas the Unmoved Mover is defined as the lack of potentiality (pure actuality)."}]}, {"question": "How does Aristotle's view of forms ($\\text{eidos}$) differ from Plato's, as noted in the section on the Four Causes?", "options": [{"text": "For Aristotle, forms exist only as the structure of specific matter, not in a separate realm.", "isCorrect": true, "rationale": "The text notes that for Aristotle, forms are always the form of 'some matter' and do not exist separately as Plato held."}, {"text": "Aristotle believed that forms were accidents, while Plato believed they were substances.", "isCorrect": false, "rationale": "Both philosophers saw form as central to reality, but they disagreed on where and how those forms exist."}, {"text": "Aristotle rejected the concept of form entirely in favor of purely material explanations.", "isCorrect": false, "rationale": "Aristotle explicitly includes the formal cause as one of the four essential factors for understanding any thing."}, {"text": "Plato's forms were based on biological observations, while Aristotle's were mathematical.", "isCorrect": false, "rationale": "Plato's Ideas were often associated with abstract perfection, while Aristotle's forms were embedded in the physical world and observed through experience."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
