<script>
var QUESTIONS = [{"question": "Which specific Arabic poetic tradition did Averroes identify as the cultural equivalent of Aristotle's concept of tragedy?", "options": [{"text": "Panegyric ($madh$)", "isCorrect": true, "rationale": "Averroes equated tragedy with the tradition of praise poetry that celebrates virtue and heroic figures, as Arabic culture lacked a formal theatrical tradition."}, {"text": "Satirical verse ($hija$)", "isCorrect": false, "rationale": "This form was actually identified with comedy, as it focused on mocking enemies and exposing failings rather than celebrating virtue."}, {"text": "Nostalgic prelude ($nasib$)", "isCorrect": false, "rationale": "While a key component of the $qasida$, this specific section focuses on memory and loss rather than the broader category of tragedy."}, {"text": "Journey narrative ($rahil$)", "isCorrect": false, "rationale": "This is a structural part of a poem describing a physical journey and does not align with the moral evaluation central to Averroes' view of tragedy."}], "id": "q01"}, {"question": "How did Averroes' use of the term $muhakat$ fundamentally alter the Greek understanding of $mimesis$?", "options": [{"text": "It shifted the focus from dramatic performance to a cognitive operation of correspondence.", "isCorrect": true, "rationale": "The term suggests an intellectual 'likening' or structural correspondence between representation and reality, moving away from theatrical enactment."}, {"text": "It emphasized emotional catharsis over the structural logic of the plot.", "isCorrect": false, "rationale": "Averroes' interpretation actually moved toward a more intellectualist concept rather than a focus on the audience's emotional release."}, {"text": "It prioritized the collaborative nature of theater over the individual voice of the poet.", "isCorrect": false, "rationale": "The commentary actually filtered Aristotle through a tradition that valued the single poet over the collaborative spectacle of the theater."}, {"text": "It restricted imitation to historical events rather than fictional possibilities.", "isCorrect": false, "rationale": "While the focus shifted, it remained a form of representation; it was the method of representation that changed from acting to 'likening'."}], "id": "q02"}, {"question": "In Sir Philip Sidney's $The$ $Defence$ $of$ $Poesy$, what distinguishes the 'golden world' of the poet from the 'brazen world' of nature?", "options": [{"text": "The poet represents an idealized world of what ought to be, whereas nature is limited by its inherent imperfections.", "isCorrect": true, "rationale": "Sidney argues that the poet's imitation is superior because it shapes representation toward moral perfection and human intelligence."}, {"text": "The poet uses literal truth to describe nature, whereas nature itself is deceptive.", "isCorrect": false, "rationale": "Sidney actually argues that the poet does not deal in 'literal truth' or assertions of fact, but in fictions that reveal higher truths."}, {"text": "The poet's world is a historical reconstruction, while nature is a chaotic present.", "isCorrect": false, "rationale": "Sidney contrasts the poet with the historian, noting that the poet is not bound to what actually happened but to what illuminates human nature."}, {"text": "The golden world refers specifically to the use of ornate and metaphorical language.", "isCorrect": false, "rationale": "While language is involved, the 'golden world' refers to the moral and ontological status of the poet's creation, not just his style."}], "id": "q03"}, {"question": "According to Sidney, why is poetry a superior teacher of virtue compared to philosophy?", "options": [{"text": "Philosophy remains too abstract, while poetry provides vivid, concrete examples that move the heart.", "isCorrect": true, "rationale": "Poetry combines universal truths with particular, feeling characters, effectively bridging the gap between theory and action."}, {"text": "Philosophy is bound to historical facts, while poetry is free to explore abstract logic.", "isCorrect": false, "rationale": "It is history that is bound to facts; philosophy is abstract, and Sidney's critique is that it lacks the power to move the reader emotionally."}, {"text": "Poetry is based on divine revelation, whereas philosophy is merely human reasoning.", "isCorrect": false, "rationale": "Sidney defines the poet as a 'maker' ($poietes$) using human intelligence and moral vision, rather than strictly relying on divine revelation."}, {"text": "Philosophy is often deceptive, while poetry's fictions are presented as literal truths.", "isCorrect": false, "rationale": "Sidney famously argues that the poet 'nothing affirms' and thus does not present fiction as literal truth."}], "id": "q04"}, {"question": "How does Sidney logically refute the charge that poets are liars?", "options": [{"text": "By arguing that poets do not make factual assertions and therefore cannot be accused of false statements.", "isCorrect": true, "rationale": "Since the poet presents work as hypothesis or fiction rather than historical fact, the concept of a lie (a false assertion) does not apply."}, {"text": "By claiming that poets are protected by 'poetic license' to change historical dates.", "isCorrect": false, "rationale": "Sidney's defense is more fundamental and philosophical, focusing on the nature of affirmation rather than simple historical inaccuracies."}, {"text": "By stating that all poetic fictions are eventually proven true through historical cycles.", "isCorrect": false, "rationale": "Sidney differentiates poetry from history entirely; he does not suggest poetry eventually becomes history."}, {"text": "By asserting that the beauty of a poem's meter validates the truth of its content.", "isCorrect": false, "rationale": "Following Aristotle, Sidney argues the essence of a poet is the 'making' of representation, not the use of verse or meter."}], "id": "q05"}, {"question": "What role did the $qasida$ play in Averroes' interpretation of the $Poetics$?", "options": [{"text": "It provided the structural and generic framework through which he understood Aristotle’s categories.", "isCorrect": true, "rationale": "Because there was no Arabic theater, Averroes used the prestige form of Arabic poetry to define Aristotelian concepts like tragedy and comedy."}, {"text": "It served as a primary example of Greek drama that had been lost to the West.", "isCorrect": false, "rationale": "The $qasida$ is an indigenous Arabic poetic form, not a lost piece of Greek drama."}, {"text": "It was rejected by Averroes as being incompatible with Aristotelian logic.", "isCorrect": false, "rationale": "Averroes actually used the $qasida$ tradition to fill Aristotle's framework with culturally relevant content."}, {"text": "It allowed Averroes to argue that narrative action is more important than character praise.", "isCorrect": false, "rationale": "The $qasida$ tradition actually led Averroes to emphasize praise and blame over the narrative plot structures central to Aristotle."}], "id": "q06"}, {"question": "In the context of Aristotelian thought, how does Sidney distinguish the poet's work from that of the geometer?", "options": [{"text": "Both create hypothetical representations rather than making assertions about specific physical realities.", "isCorrect": true, "rationale": "Sidney uses the geometer as an analogy to show that creating a model (like a triangle on a page) is a form of reasoning, not an act of deception."}, {"text": "The geometer is bound to the 'brazen world,' while the poet is free to ignore logic.", "isCorrect": false, "rationale": "Sidney views the poet's work as highly structured and intellectual, not as a rejection of logic or geometry."}, {"text": "The geometer works with facts, while the poet works with lies that lead to truth.", "isCorrect": false, "rationale": "Sidney denies that poetry consists of lies and suggests the geometer's diagrams are similarly non-assertive abstractions."}, {"text": "The poet is a 'maker' ($poietes$), whereas the geometer is merely an observer of nature.", "isCorrect": false, "rationale": "Both roles involve a form of 'making' or constructing representations to illuminate universal principles."}], "id": "q07"}, {"question": "What is the significance of the title 'The Commentator' when applied to Averroes in medieval Europe?", "options": [{"text": "It recognized his definitive authority in interpreting the works of Aristotle for the Latin West.", "isCorrect": true, "rationale": "Averroes' extensive work on the Aristotelian corpus influenced major Christian and Jewish thinkers like Thomas Aquinas and Maimonides."}, {"text": "It highlighted his role as the first translator of the $Poetics$ into Spanish.", "isCorrect": false, "rationale": "While he lived in Cordoba, his primary impact was through his philosophical commentaries, which were translated into Latin and Hebrew."}, {"text": "It was a derogatory term used by the Almohad court to dismiss his philosophical views.", "isCorrect": false, "rationale": "The term was actually a mark of high respect in European academic circles, even if he faced political difficulties in his own court."}, {"text": "It distinguished him as a poet rather than a philosopher or legal scholar.", "isCorrect": false, "rationale": "Averroes was primarily a philosopher, physician, and judge; the title refers to his scholarly analysis of Aristotle's philosophy."}], "id": "q08"}, {"question": "Which component of the $qasida$ corresponds to the 'main section of praise' that Averroes linked to Aristotelian tragedy?", "options": [{"text": "$Madih$", "isCorrect": true, "rationale": "The $madih$ is the section of the $qasida$ dedicated to praise or petition, directly mapping onto Averroes' view of tragedy as panegyric."}, {"text": "$Nasib$", "isCorrect": false, "rationale": "This is the nostalgic prelude, which does not carry the weight of the moral celebration found in the $madih$."}, {"text": "$Rahil$", "isCorrect": false, "rationale": "This describes the journey narrative, which is a structural transition rather than the thematic core of praise."}, {"text": "$Hija$", "isCorrect": false, "rationale": "This refers to satire or blame poetry, which Averroes associated with comedy rather than tragedy."}], "id": "q09"}, {"question": "Sidney's $Defence$ $of$ $Poesy$ was primarily written as a direct response to which group's criticisms?", "options": [{"text": "Puritan critics who viewed theater and poetry as immoral and dangerous.", "isCorrect": true, "rationale": "Sidney's work defends the moral and educational value of poetry against charges that it is 'idle' or deceptive."}, {"text": "Aristotelian scholars who felt the Renaissance had strayed too far from the original text.", "isCorrect": false, "rationale": "Sidney actually uses Aristotelian framework to defend poetry; his primary targets were those who attacked poetry's very existence."}, {"text": "The Almohad caliphs who had banned philosophical commentaries.", "isCorrect": false, "rationale": "This relates to Averroes' historical context in the 12th century, not Sidney's in the Elizabethan Renaissance."}, {"text": "Historians who argued that poets were stealing historical records for their fictions.", "isCorrect": false, "rationale": "While Sidney compares poetry to history, his primary motivation was a moral defense against religious and social critics."}], "id": "q10"}, {"question": "Sidney's phrase 'the poet nothing affirms, and therefore never lieth' is a philosophical claim about the nature of poetic assertion. What does this imply about how we should evaluate poetry?", "options": [{"text": "Poetry can never be morally evaluated because it makes no true claims.", "isCorrect": false, "rationale": "Sidney's claim protects poetry from the charge of lying, not from moral evaluation. His entire defence argues poetry's moral value — that it teaches virtue by creating ideal images. The claim is about factual assertion, not moral quality."}, {"text": "Since poetry operates as fiction rather than factual assertion, it should be evaluated by different standards than truth and falsehood — by what it enables the reader to imagine, feel, and become.", "isCorrect": true, "rationale": "By removing poetry from the domain of factual assertion, Sidney opens the space for evaluating it by its proper standards: the quality of its golden-world representations, the virtue it embodies, and the moral formation it enables — not whether its characters 'really' existed."}, {"text": "Poetry should be evaluated exclusively by the beauty of its language, since it cannot be judged for truth.", "isCorrect": false, "rationale": "Sidney's argument is not that beauty is the only standard for poetry. He argues poetry excels at teaching and moving toward virtue — moral effectiveness, not just beauty, is his criterion."}, {"text": "Only historical accuracy can give poetry moral authority, so poetry without factual basis is inferior to history.", "isCorrect": false, "rationale": "This is precisely what Sidney argues against. His claim that the poet 'nothing affirms' is part of his argument that poetry is superior to history — freed from contingent facts, it can embody universal truths."}], "id": "q11"}, {"question": "Averroes' reinterpretation of the Poetics mapped tragedy onto the $qasida$ (Arabic ode) framework. What does this tell us about how philosophical ideas travel across cultural boundaries?", "options": [{"text": "Ideas can only be understood correctly in their original cultural context; translation always produces distortion.", "isCorrect": false, "rationale": "Averroes successfully preserved the essential insight of the Poetics — that literature represents human nature and illuminates universal truths — even while transforming its specific categories. This shows translation is productive, not merely distorting."}, {"text": "Ideas must be adapted to existing frameworks in the receiving culture, which preserves their essence while transforming their form.", "isCorrect": true, "rationale": "Averroes could not simply import Greek theatrical categories into a culture with no theatrical tradition. He adapted the ideas to the $qasida$ framework, preserving the essential insight (poetry represents human nature and produces moral effects) while changing the specific form — a productive cross-cultural translation."}, {"text": "Only direct, literal translations preserve philosophical meaning; any adaptation destroys the original's integrity.", "isCorrect": false, "rationale": "The text shows Averroes' adaptive reinterpretation preserved what mattered — the philosophical insight about poetry's nature and effects — even without theatrical equivalents. Literal translation of form would have been meaningless without the corresponding cultural context."}, {"text": "Cultural boundaries make philosophical translation impossible; Averroes' reinterpretation is simply a misunderstanding.", "isCorrect": false, "rationale": "The text credits Averroes with preserving the essential insight of the Poetics through his reinterpretation. The work was culturally inflected but philosophically productive — a creative translation, not a failure."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
