<script>
var QUESTIONS = [{"question": "The text describes Aristotle's Poetics as 'dense, elliptical, and often startling in its brevity.' What is identified as the primary reason for these characteristics?", "options": [{"text": "The original Greek language is inherently complex and difficult to translate accurately.", "isCorrect": false, "rationale": "While Greek can be complex, the text attributes the difficulty more to the nature of the surviving document rather than the language itself. The translation is even praised for its readability."}, {"text": "It appears to be lecture notes or an internal document, not a polished treatise intended for a general audience.", "isCorrect": true, "rationale": "The text explicitly states that 'the text we have appears to be lecture notes rather than a polished treatise,' and 'What survives of the Poetics is most likely an internal document,' which explains its compressed and elliptical nature."}, {"text": "Aristotle intentionally wrote the Poetics to be obscure, challenging readers to find hidden meanings.", "isCorrect": false, "rationale": "The text does not suggest intentional obscurity on Aristotle's part, but rather points to the document's form as lecture notes or an internal document as the cause of its density."}, {"text": "Many parts of the original Poetics have been lost over time, leaving only fragments.", "isCorrect": false, "rationale": "While Aristotle's 'exoteric' works are largely lost, the text implies that the Poetics we have is substantially what existed, just in a condensed, internal format, not a collection of fragments due to loss."}], "id": "q01"}, {"question": "A student finishes reading a particularly brief and complex chapter from the Poetics. According to the recommended reading strategy, what should be their immediate next step to ensure comprehension?", "options": [{"text": "Immediately proceed to the next chapter to maintain reading momentum.", "isCorrect": false, "rationale": "The text advises against rushing through, stating that 'almost no sentence can be skimmed without cost' and that short chapters require slowing down. Moving on immediately would likely lead to confusion."}, {"text": "Look up every Greek term mentioned in the chapter in the glossary.", "isCorrect": false, "rationale": "While the glossary is important, the primary immediate step after reading a chapter is to grasp its main argument, not to get bogged down in individual terms, which can be revisited later as needed."}, {"text": "Attempt to summarize its main argument in one or two sentences.", "isCorrect": true, "rationale": "The text explicitly states, 'After you read it, try to state its main argument in one or two sentences. If you cannot do that, read it again.' This is the key recommended step for understanding the Poetics."}, {"text": "Consult an external scholarly commentary for a simpler explanation of the content.", "isCorrect": false, "rationale": "While external summaries are mentioned for specific examples like Oedipus Rex, the primary strategy for understanding a chapter's argument is internal processing and re-reading, not immediately relying on external sources."}], "id": "q02"}, {"question": "The reading guidance suggests different approaches for the Poetics and the Rhetoric. Which statement best encapsulates a key analytical difference in their recommended reading order and reasoning?", "options": [{"text": "The Poetics should be read strictly in order as its arguments build chronologically, while the Rhetoric's books can be read independently.", "isCorrect": false, "rationale": "This statement reverses the advice. The Poetics, though dense, does not necessarily require strict sequential reading in the same way, while the Rhetoric explicitly 'builds on what precedes it,' making sequential reading crucial."}, {"text": "The Rhetoric's systematic, three-book structure necessitates reading it in order, as each part builds on the last, whereas the Poetics requires an iterative, argument-focused approach due to its compressed nature.", "isCorrect": true, "rationale": "This accurately reflects the text's guidance: the Rhetoric 'is best read in order, following the three-book plan, because each book builds on what precedes it,' while the Poetics demands a 'slow' and 'argument-finding' approach for its dense, often standalone points."}, {"text": "Both texts require a slow and meticulous reading, but the Poetics focuses on practical application, while the Rhetoric is purely theoretical.", "isCorrect": false, "rationale": "This is incorrect. The text describes the Rhetoric as 'the most practical of Aristotle's works,' contrasting with the analytical focus needed for the Poetics' arguments."}, {"text": "The Poetics is easier to understand due to its brevity, allowing for quick reading, while the Rhetoric's length demands careful pacing.", "isCorrect": false, "rationale": "The text explicitly warns, 'Do not mistake brevity for simplicity' regarding the Poetics, indicating its short length makes it more, not less, challenging and requires slower reading."}], "id": "q03"}, {"question": "To effectively apply Aristotle's concepts of ethos, pathos, and logos from the Rhetoric, what activity does the text explicitly recommend?", "options": [{"text": "Memorizing the precise definitions of each term and their historical context.", "isCorrect": false, "rationale": "While understanding definitions is foundational, the text emphasizes active application rather than rote memorization as the best way to test understanding."}, {"text": "Engaging in academic debates about the philosophical nuances of Aristotle's theories.", "isCorrect": false, "rationale": "While valuable for deeper study, the text highlights a more direct, observable application for understanding these specific rhetorical categories."}, {"text": "Identifying these categories in various real-world persuasive situations like speeches or advertising.", "isCorrect": true, "rationale": "The text states, 'As you read, think about speeches you have heard... Identifying them in real situations is one of the best ways to test whether you understand what Aristotle means.'"}, {"text": "Focusing solely on analyzing examples from ancient Greek rhetoric, as Aristotle did.", "isCorrect": false, "rationale": "The text explicitly encourages thinking about *modern* speeches 'in church, in class, in political debates, in advertising' to apply Aristotle's categories."}], "id": "q04"}, {"question": "Why does the reading guide specifically emphasize the importance of understanding the plot of Sophocles' Oedipus Rex for studying the Poetics?", "options": [{"text": "It is the only play Aristotle mentions in detail, making it crucial for every argument.", "isCorrect": false, "rationale": "Aristotle uses examples from Greek tragic and epic poetry broadly, but Oedipus Rex is singled out as 'the key example,' not the only one."}, {"text": "The plot of Oedipus Rex is unusually simple, making it an ideal entry point for beginners.", "isCorrect": false, "rationale": "The text doesn't suggest simplicity; rather, it highlights its exemplary status within Aristotle's framework, which implies its complexity aligns with his ideal."}, {"text": "Aristotle frequently uses Oedipus Rex as his model for perfect tragedy, making its plot central to understanding his arguments.", "isCorrect": true, "rationale": "The text states, 'Aristotle returns to Oedipus Rex again and again as his model of the perfect tragedy; understanding its plot will illuminate at least a third of the Poetics.'"}, {"text": "Understanding its plot helps to appreciate the nuances of S. H. Butcher's translation.", "isCorrect": false, "rationale": "The importance of Oedipus Rex is tied to Aristotle's repeated use of it as an example, not directly to the translation quality."}], "id": "q05"}, {"question": "S. H. Butcher's translation of the Poetics is praised for its 'accuracy and its willingness to render Aristotle's Greek into genuinely readable English, even when the original is elliptical.' How does this characteristic specifically address a known difficulty of the Poetics text?", "options": [{"text": "It simplifies Aristotle's complex philosophical ideas, making them easier for a modern audience to grasp without deep prior knowledge.", "isCorrect": false, "rationale": "The text highlights 'accuracy' and readability even when 'elliptical,' implying fidelity to the original's complexity, not simplification of ideas."}, {"text": "It ensures that the chronological order of Aristotle's arguments, which is often jumbled in the original, is restored for clarity.", "isCorrect": false, "rationale": "The text describes the Poetics as lecture notes, but the translation's role is not to reorder Aristotle's arguments but to make the existing text readable."}, {"text": "It helps to make a dense and often brief original text more accessible without sacrificing fidelity to its complex arguments.", "isCorrect": true, "rationale": "The Poetics is described as 'dense, elliptical, and often startling in its brevity.' Butcher's translation addresses this by being 'genuinely readable' while maintaining 'accuracy,' thus making the challenging original more accessible without losing its substance."}, {"text": "It adds clarifying footnotes and explanations directly into the main text to resolve ambiguities in the original Greek.", "isCorrect": false, "rationale": "The footnotes mentioned are part of the volume's editorial features, not a characteristic of Butcher's translation itself, which focuses on rendering the Greek into English."}], "id": "q06"}, {"question": "The Rhetoric's three books cover 'modes and types of rhetoric,' 'emotion, character, and argument,' and 'style and arrangement,' respectively. What is the main implication of this systematic organization for the reader?", "options": [{"text": "The reader can choose to read only the book most relevant to their interests, as they are largely independent topics.", "isCorrect": false, "rationale": "The text states that 'each book builds on what precedes it,' directly contradicting the idea that they can be read independently."}, {"text": "This structure makes the Rhetoric primarily a theoretical work, with less emphasis on practical application.", "isCorrect": false, "rationale": "The text explicitly calls the Rhetoric 'the most practical of Aristotle's works,' contradicting the idea of it being primarily theoretical."}, {"text": "Each book builds upon the preceding one, necessitating a sequential reading to grasp the full argument.", "isCorrect": true, "rationale": "The text explicitly states, 'This structure means that the Rhetoric is best read in order, following the three-book plan, because each book builds on what precedes it.'"}, {"text": "The sequential organization is a stylistic choice and does not impact the reader's comprehension if chapters are read out of order.", "isCorrect": false, "rationale": "The text clearly states that the sequential order is important because each book 'builds on what precedes it,' meaning reading out of order would hinder comprehension."}], "id": "q07"}, {"question": "A student encounters a Greek term in Chapter 5 that was initially defined in a footnote in Chapter 2, but they have forgotten its meaning. According to the reading tips, what is the most efficient and recommended way to clarify the term?", "options": [{"text": "Re-read Chapter 2 to find the original footnote definition.", "isCorrect": false, "rationale": "While effective, this is not the most efficient method recommended. The glossary is designed for quick reference after the initial definition."}, {"text": "Look for another footnote for the term later in the text.", "isCorrect": false, "rationale": "The text states, 'The first time a term appears in the text, it is defined in a footnote; after that, the glossary is your guide,' implying subsequent footnotes for the same term are unlikely."}, {"text": "Consult an external dictionary of Greek philosophical terms.", "isCorrect": false, "rationale": "The book provides its own internal resource (the glossary) specifically tailored to 'how Aristotle uses it,' making it more precise than a general dictionary for this context."}, {"text": "Revisit the glossary at the back of the book.", "isCorrect": true, "rationale": "The text advises, 'The first time a term appears in the text, it is defined in a footnote; after that, the glossary is your guide. ...revisit the glossary when you feel uncertain.'"}], "id": "q08"}, {"question": "The 'caution' note for the Poetics states, 'Do not mistake brevity for simplicity.' When encountering a very short passage, what analytical approach does it specifically recommend for understanding Aristotle's intent?", "options": [{"text": "Skim the passage quickly to get the main idea, then move on to a more expansive section.", "isCorrect": false, "rationale": "The text strongly advises against skimming, stating, 'Slow down, break each sentence into its parts,' directly contradicting this approach."}, {"text": "Assume the brevity indicates it is less important than longer, more detailed passages.", "isCorrect": false, "rationale": "The text explicitly counters this, noting that 'Chapter IX on poetry and history takes only two pages to make one of Aristotle's most important arguments,' highlighting that brevity often signals condensed importance."}, {"text": "Break each sentence into its parts, asking what question Aristotle is answering, what distinction he's drawing, or what conclusion he's reaching.", "isCorrect": true, "rationale": "The caution note explicitly recommends this: 'Slow down, break each sentence into its parts, and ask: what question is Aristotle answering here? What distinction is he drawing? What conclusion is he reaching?'"}, {"text": "Immediately consult an external summary or interpretation, as the passage is likely too abstract to understand alone.", "isCorrect": false, "rationale": "While external summaries are helpful for specific examples, the primary recommendation for short, dense passages is a deeper, internal analytical process rather than immediate external reliance."}], "id": "q09"}, {"question": "Considering the entire guidance section, what is the primary goal of providing specific reading strategies for Aristotle's Poetics and Rhetoric?", "options": [{"text": "To make both texts seem less intimidating to discourage detailed analysis from students.", "isCorrect": false, "rationale": "The guidance encourages *more* detailed analysis where appropriate (e.g., slowing down for the Poetics), not less. The goal is to make the texts understandable, not to deter study."}, {"text": "To ensure students memorize all Greek terms and historical facts before beginning their reading.", "isCorrect": false, "rationale": "The 'Reading Tips' note explicitly advises, 'Do not try to memorize all the Greek terms at once—let them accumulate as you read.'"}, {"text": "To equip readers with tailored approaches that maximize comprehension and save time by addressing the unique challenges and structures of each text.", "isCorrect": true, "rationale": "The introductory sentence states, 'A few pages of guidance here will save hours of confusion later,' and the specific strategies are designed to navigate each text's distinct difficulties and structures for better understanding."}, {"text": "To highlight the superior quality of the selected translations over other available versions.", "isCorrect": false, "rationale": "While the translations are praised, the primary focus of the section is on *how to read* the texts themselves, not solely on comparing translations."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
