<script>
var QUESTIONS = [{"question": "What phrase in Aristotle's definition of tragedy is often considered the most debated regarding its exact meaning?", "options": [{"text": "An imitation of an action.", "isCorrect": false, "rationale": "While foundational, the meaning of 'mimesis' as imitation of action is clearly elaborated by Aristotle and generally understood as the genus of tragedy, leading to the primacy of plot."}, {"text": "Through pity and fear effecting the proper purgation [catharsis] of these emotions.", "isCorrect": true, "rationale": "The text explicitly states this is 'the most discussed phrase in the definition' and notes the debate over whether catharsis means purging excess emotion or clarifying/refining emotions, a question the 'Poetics' does not fully resolve."}, {"text": "In the form of action, not of narrative.", "isCorrect": false, "rationale": "This distinction clearly differentiates drama from epic poetry (showing versus telling) and is not presented as highly debated, but rather as a clear structural characteristic."}, {"text": "Serious, complete, and of a certain magnitude.", "isCorrect": false, "rationale": "These terms are clearly defined in the text, distinguishing tragedy from comedy, establishing its unified structure (beginning, middle, end), and specifying appropriate length for natural development, without significant debate on their core meaning."}]}, {"question": "According to Aristotle, why is plot (mythos) considered the 'soul of a tragedy' and ranked highest among the six elements?", "options": [{"text": "Because it allows for the most elaborate use of spectacle and song, captivating the audience.", "isCorrect": false, "rationale": "Aristotle explicitly dismisses spectacle as 'least connected with the art of poetry' and considers song and spectacle to be the most contingent elements, easily separable from the essence of tragedy."}, {"text": "Because characters are developed independently of the action and then fitted into the plot as secondary elements.", "isCorrect": false, "rationale": "Aristotle states that characters exist 'in order to act' and are 'in the service of the plot, not the other way around,' directly contradicting the idea of independent character development."}, {"text": "Because tragedy fundamentally imitates an action, and plot is the arrangement of those incidents into a unified whole.", "isCorrect": true, "rationale": "The text directly states, 'Since tragedy imitates action, and plot is the arrangement of the action, plot is the element most essential to the form.' This aligns with tragedy being an 'imitation of an action.'"}, {"text": "Because it is the easiest element for an audience to follow, ensuring broad appeal and accessibility.", "isCorrect": false, "rationale": "Aristotle's ranking is based on philosophical principles of artistic essence, not on audience ease or popular appeal. He prioritizes the inherent nature of tragedy as an imitation of action."}]}, {"question": "A modern serialized drama features a detective who solves a different, unrelated crime in each episode, though his personal life follows a loose, overarching story arc. How would Aristotle likely evaluate the plot of such an episode in isolation from the full series?", "options": [{"text": "He would praise it as a unified plot because it centers on a single protagonist, the detective.", "isCorrect": false, "rationale": "Aristotle explicitly warns that unity 'does not mean that the plot must involve only one person' and that a chronicle of everything that happened to one person is not a unified plot if the incidents lack causal connection."}, {"text": "He would criticize it as an 'episodic' plot if the crimes do not causally connect to one another or grow from prior events.", "isCorrect": true, "rationale": "The text states that 'episodic' plots, where 'the episodes follow one another without necessary or probable connection,' are 'the worst.' If the individual crimes are unrelated, each episode's plot would be episodic."}, {"text": "He would consider it a perfect example of a complex plot due to the inclusion of personal life elements alongside the crime.", "isCorrect": false, "rationale": "A complex plot involves reversal (peripeteia) and recognition (anagnorisis) arising from the plot's own logic, not merely the presence of multiple narrative threads. Unconnected subplots would not make it complex in Aristotle's sense."}, {"text": "He would deem it superior to ancient Greek tragedies because of its focus on individual, self-contained episodes.", "isCorrect": false, "rationale": "Aristotle strongly favored unified plots where every incident is 'causally connected to what precedes and follows it,' viewing episodic plots as inferior, thus he would not see self-contained, unconnected episodes as superior."}]}, {"question": "When Aristotle claims that 'poetry is something more philosophical and more highly serious than history,' what is his primary justification?", "options": [{"text": "Poetry uses more elevated language and artistic ornaments than historical accounts, making it more profound.", "isCorrect": false, "rationale": "While poetry does use embellished language, this is not Aristotle's primary reason for deeming it more philosophical. The philosophical nature refers to its content and aim, not just its style."}, {"text": "Poetry focuses on the specific actions of historical figures, making it more factual and thus more serious.", "isCorrect": false, "rationale": "This statement is the opposite of Aristotle's claim. He argues that history records particulars ('what Alcibiades did'), whereas poetry tends to express universals, making it distinct from history's focus on facts."}, {"text": "Poetry tends to express universals—what such and such a kind of person will probably or necessarily say or do—rather than just particular events.", "isCorrect": true, "rationale": "The text explicitly states, 'poetry tends to express universals, history particulars.' Universals concern what is probable or necessary for a type of person, which is a more philosophical concern than mere factual recounting."}, {"text": "Poetry is always fictional, allowing greater creative freedom than the constraints of historical fact.", "isCorrect": false, "rationale": "While poetry involves creative freedom, Aristotle's argument for its philosophical superiority rests on its capacity to capture universal truths about human nature and action, not simply its fictional status. A poet writing about a real person, if aiming for universals, is still doing philosophy."}]}, {"question": "A tragic hero, known for his relentless pursuit of truth, misinterprets a prophecy due to a combination of his own strong will and a crucial piece of misinformation, leading him to unknowingly commit heinous acts. Which aspect best represents his hamartia according to Aristotle?", "options": [{"text": "His inherently evil nature, leading him to defy fate.", "isCorrect": false, "rationale": "Aristotle explicitly states that the tragic hero's misfortune is 'not by vice or depravity.' Hamartia is not synonymous with inherent evil but rather an error or frailty."}, {"text": "An external, unavoidable accident that befell him, completely beyond his control.", "isCorrect": false, "rationale": "The text clarifies that hamartia 'is not a mere accident' and 'not wholly external disasters.' It must arise from 'something in the hero's own character or understanding.'"}, {"text": "A catastrophic unforeseen consequence arising from an intellectual error or misjudgment influenced by his character.", "isCorrect": true, "rationale": "The definition of hamartia includes 'an intellectual error (believing a false report),' 'a mistake in judgment (misreading a situation),' or even 'a well-intentioned choice that has catastrophic unforeseen consequences,' all of which arise from the hero's own character or mind."}, {"text": "His perfectly virtuous character, making his downfall undeserved.", "isCorrect": false, "rationale": "Aristotle rules out a 'perfectly good man who passes from happiness to misery' as this produces outrage, not pity and fear. The tragic hero is 'not eminently good and just,' possessing a hamartia."}]}, {"question": "Which of the following elements did Aristotle consider 'least connected with the art of poetry' and could be omitted without destroying the essence of a tragedy?", "options": [{"text": "Character (ethos)", "isCorrect": false, "rationale": "Character is ranked second, immediately after plot, and is essential for portraying the moral qualities that make agents the kinds of people they are. It cannot be omitted without destroying the essence."}, {"text": "Thought (dianoia)", "isCorrect": false, "rationale": "Thought is ranked third and represents the intellectual content expressed by characters. It is an integral part of understanding the characters' motivations and the play's themes."}, {"text": "Spectacle (opsis)", "isCorrect": true, "rationale": "Aristotle is 'pointedly dismissive of spectacle,' remarking it is 'least connected with the art of poetry' and that 'the power of tragedy should be felt in reading as much as in performance,' implying its dispensability to the core art."}, {"text": "Diction (lexis)", "isCorrect": false, "rationale": "Diction, the verbal expression and metrical arrangement of words, is ranked fourth. It gives thought its form and is an important part of the 'embellished language' of tragedy."}]}, {"question": "Aristotle states that tragedy must be 'in the form of action, not of narrative.' What is the main implication of this distinction?", "options": [{"text": "It means that tragedies must always have a fast-paced plot without lengthy descriptions.", "isCorrect": false, "rationale": "The distinction is about the mode of presentation (showing vs. telling), not necessarily pacing or length of descriptive passages within that mode."}, {"text": "It distinguishes tragedy from epic poetry by emphasizing that tragedy shows events directly through performance, rather than telling about them through a narrator.", "isCorrect": true, "rationale": "The text clarifies, 'Tragedy is drama: it shows rather than tells. This distinguishes it from epic, which is narrated.' This points to the inherent dramatic nature of tragedy."}, {"text": "It implies that only plays performed live on stage can be considered true tragedies.", "isCorrect": false, "rationale": "While tragedy is designed for theatrical production, Aristotle's remark that 'the power of tragedy should be felt in reading as much as in performance' indicates that live staging isn't the sole criterion for its essence."}, {"text": "It highlights that the actors' physical movements are more important than their spoken lines.", "isCorrect": false, "rationale": "This statement overemphasizes spectacle (physical movement) over diction and thought, which are crucial. The distinction is about showing *the action*, which includes dialogue and plot unfolding, not just physical performance."}]}, {"question": "Why would Aristotle consider a perfectly good man falling from happiness to misery as an inappropriate protagonist for a tragedy designed to achieve pity and fear?", "options": [{"text": "Such a downfall would produce feelings of outrage and disgust, not the characteristic tragic emotions of pity and fear.", "isCorrect": true, "rationale": "The text explicitly states that a 'perfectly good man who passes from happiness to misery' 'produces outrage and disgust, not pity and fear,' making him unsuitable for tragedy's intended emotional effect."}, {"text": "A perfectly good man cannot logically experience a reversal of fortune, as he would always be in a state of happiness.", "isCorrect": false, "rationale": "Even a good man can experience misfortune. The issue is not the logical possibility of reversal, but the emotional response it elicits from the audience when it happens to a blameless character."}, {"text": "Audiences would not be able to identify with a character who is entirely virtuous and flawless.", "isCorrect": false, "rationale": "While relatability is a factor for fear ('the hero is enough like us'), Aristotle's primary reason for ruling out the perfectly good man is the specific negative emotions (outrage/disgust) that his undeserved suffering would evoke, rather than a lack of identification."}, {"text": "His suffering would be too deserved, negating the possibility of pity.", "isCorrect": false, "rationale": "This describes a 'thoroughly wicked man who falls from prosperity to ruin,' which 'may satisfy our sense of justice, but it does not produce the characteristic emotions of tragedy.' A perfectly good man's suffering would be *undeserved*, leading to outrage, not a sense of deservedness."}]}, {"question": "In 'Oedipus Rex,' the moment Oedipus discovers that the man he killed was his father and the woman he married was his mother simultaneously marks his ruin. What does Aristotle call this specific combination of events?", "options": [{"text": "An episodic plot.", "isCorrect": false, "rationale": "An episodic plot is one where events lack causal connection. The events in 'Oedipus Rex' are highly interconnected and necessary, making it the opposite of episodic."}, {"text": "A simple plot.", "isCorrect": false, "rationale": "A simple plot lacks reversal (peripeteia) and recognition (anagnorisis). The simultaneous occurrence of both makes 'Oedipus Rex' the paradigm of a complex plot."}, {"text": "A complex plot.", "isCorrect": true, "rationale": "The text states that 'the combination of reversal and recognition in a single moment to be the mark of the finest tragedy,' and refers to this coincidence, 'both arising necessarily from the plot's own logic,' as what Aristotle means by a 'complex' plot, citing 'Oedipus Rex' as the paradigm."}, {"text": "A cathartic climax.", "isCorrect": false, "rationale": "While this moment is a climax and certainly contributes to catharsis, 'cathartic climax' is not the specific term Aristotle uses to describe the *combination of reversal and recognition* in the plot structure itself."}]}, {"question": "Aristotle's requirement that a tragedy be 'of a certain magnitude' means:", "options": [{"text": "The play must feature characters of royal or noble birth, reflecting their societal importance.", "isCorrect": false, "rationale": "While many Greek tragedies featured noble characters, Aristotle's definition of 'magnitude' refers to the plot's length and development, not the social status of its characters."}, {"text": "The themes explored must be grand and universal in scope, addressing fundamental human questions.", "isCorrect": false, "rationale": "While tragedy often deals with universal themes, 'magnitude' specifically refers to the plot's length and structural integrity, not the thematic scope."}, {"text": "It must be long enough for its reversals to develop naturally through probable or necessary events, but not so long as to lose audience focus on the unified whole.", "isCorrect": true, "rationale": "The text explains 'Of a certain magnitude means it must be long enough for its reversals to develop naturally... but not so long that the audience loses track of the whole,' and that 'the change of fortune will come about as a result of probability or necessity.'"}, {"text": "The production must involve elaborate sets and numerous actors to convey its epic scale.", "isCorrect": false, "rationale": "This refers to spectacle (opsis), which Aristotle deemed the least important element and not essential to the definition of tragedy's magnitude."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
