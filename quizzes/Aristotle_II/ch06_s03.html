        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Aristotle_II.html">&larr; Back to The Life of Words (Aristotle II)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 6, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary distinction between Aristotle's Book I and Book II of 'Rhetoric'?", "options": [{"text": "Book I focuses on epideictic oratory, while Book II covers deliberative and forensic oratory.", "isCorrect": false, "rationale": "While Book I introduces all three kinds of oratory, the distinction is not primarily about which specific kinds are covered in each book, but rather the overall approach to rhetoric."}, {"text": "Book I lays out the theoretical framework of persuasion, whereas Book II applies that theory through concrete, systematic analysis.", "isCorrect": true, "rationale": "The text states that Book I 'gave us the architecture of persuasion' (theory), and Book II is 'where that theory comes alive' through 'systematic psychology' and concrete analysis."}, {"text": "Book I exclusively discusses 'logos,' while Book II delves into 'ethos' and 'pathos.'", "isCorrect": false, "rationale": "Book I introduces all three modes (ethos, pathos, logos). Book II certainly expands on ethos and pathos, but Book I is not exclusive to logos."}, {"text": "Book I addresses the speaker's character, while Book II focuses on the audience's emotions.", "isCorrect": false, "rationale": "Both ethos (speaker's character) and pathos (audience's emotions) are introduced in Book I and are the subjects of detailed analysis in Book II."}], "id": "q01"}, {"question": "Why does Aristotle argue that understanding the audience's emotions (pathos) and the speaker's character (ethos) are legitimate forms of evidence, rather than mere manipulation?", "options": [{"text": "Because they are easily faked, making them powerful tools for deception, thus requiring careful study.", "isCorrect": false, "rationale": "Aristotle argues the opposite: these are 'genuine forms of evidence about the truth of a matter,' not 'tricks or manipulations.' Their legitimacy stems from their actual influence, not their potential for deception."}, {"text": "He acknowledges that human beings are fundamentally irrational, and these modes simply cater to that reality.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating, 'This is not a concession to human weakness — it is an acknowledgment of how rational beings actually function.'"}, {"text": "He believes that a speaker's trustworthiness and an audience's emotional state genuinely alter the evaluation of a case or evidence.", "isCorrect": true, "rationale": "The text explains, 'A judge who is angry will genuinely weigh evidence differently from one who is calm; a speaker whose honesty we trust is, all other things being equal, more worthy of belief.' This confirms they are real factors influencing judgment."}, {"text": "These modes are essential for entertainment, ensuring the audience remains engaged throughout a speech.", "isCorrect": false, "rationale": "While engagement might be a byproduct, the primary justification is their impact on judgment and belief, not simply entertainment value."}], "id": "q02"}, {"question": "According to Aristotle's definition in 'Rhetoric, II.1,' which of the following best characterizes 'emotions'?", "options": [{"text": "Purely physiological reactions that have no bearing on rational thought.", "isCorrect": false, "rationale": "Aristotle defines emotions as 'feelings that so change men as to affect their judgements,' indicating a direct impact on rational thought, not a separation."}, {"text": "Feelings that influence judgment and are always accompanied by either pleasure or pain.", "isCorrect": true, "rationale": "The text states, 'The Emotions are all those feelings that so change men as to affect their judgements, and that are also attended by pain or pleasure.'"}, {"text": "Ephemeral sensations that an orator must avoid to maintain logical integrity.", "isCorrect": false, "rationale": "Aristotle emphasizes understanding and managing emotions as a core part of effective rhetoric, not avoiding them. They are integral to how people make judgments."}, {"text": "Subconscious impulses that dictate behavior without any conscious awareness.", "isCorrect": false, "rationale": "While impulses can be involved, Aristotle's analysis focuses on conscious feelings that affect judgment, implying a level of awareness, and are subject to systematic analysis."}], "id": "q03"}, {"question": "Aristotle proposes a 'three-question method' for analyzing each emotion. If an orator wants to effectively arouse pity in an audience, which of the following is essential?", "options": [{"text": "Knowing only the state of mind of people who feel pity, as this is the most critical factor.", "isCorrect": false, "rationale": "The text explicitly states, 'It is not enough to know one or even two of these points; unless we know all three, we shall be unable to arouse anger in any one.' The same logic applies to other emotions like pity."}, {"text": "Understanding what state of mind produces pity, towards whom it is felt, and for what reasons.", "isCorrect": true, "rationale": "The text outlines the three heads for analysis: '(1) what the state of mind of angry people is, (2) who the people are with whom they usually get angry, and (3) on what grounds they get angry with them.' This method applies to all emotions Aristotle analyzes."}, {"text": "Focusing solely on the specific individuals towards whom pity is usually directed.", "isCorrect": false, "rationale": "Similar to option A, knowing only one aspect is insufficient. All three aspects (state of mind, target, grounds) are required for effective emotional appeal."}, {"text": "Primarily memorizing a list of useful propositions about pity, as described earlier for oratory.", "isCorrect": false, "rationale": "The text distinguishes between a 'list of useful propositions for the orator' and the 'systematic analysis' of emotions using the three-question method. The latter is the focus for understanding and arousing emotions."}], "id": "q04"}, {"question": "The text highlights anger and fear among the fourteen emotions Aristotle analyzes in Book II. What is the primary reason for this specific emphasis?", "options": [{"text": "They are the easiest emotions for an orator to manipulate without ethical concern.", "isCorrect": false, "rationale": "The text does not suggest ease of manipulation or lack of ethical concern. Rather, it emphasizes their significance and complexity."}, {"text": "They are the only emotions applicable to both deliberative and forensic oratory, unlike others.", "isCorrect": false, "rationale": "The text notes that anger 'drives deliberative and forensic oratory to its most dangerous extremes,' but it does not claim they are the *only* emotions applicable to these forms, nor the *only* ones Aristotle covers in depth."}, {"text": "They are politically significant, thoroughly developed by Aristotle, and effectively illustrate his analytical method.", "isCorrect": true, "rationale": "The text states anger and fear 'are among the most politically significant, the most carefully developed, and the most illustrative of Aristotle's method.'"}, {"text": "They are universally experienced and therefore require less cultural context for an orator to understand.", "isCorrect": false, "rationale": "The text does not mention universal experience or ease of understanding due to cultural context as reasons for their emphasis. Aristotle's detailed analysis implies their complexity."}], "id": "q05"}, {"question": "Based on Aristotle's definition, which scenario would NOT typically provoke anger?", "options": [{"text": "Someone publicly ridicules a person's physical appearance without any clear gain.", "isCorrect": false, "rationale": "This aligns with 'insolence,' a form of slighting done 'simply for the pleasure involved' and causing shame, which is a direct cause of anger according to the text."}, {"text": "A rival deliberately prevents a person from achieving a goal, not to gain anything themselves, but purely to obstruct.", "isCorrect": false, "rationale": "This describes 'spite,' a form of slighting where one thwarts another's wishes 'not to get something yourself but to prevent his getting it.' Spite is a direct cause of anger."}, {"text": "A person feels pain after losing a competition and blames the rules, not a specific individual.", "isCorrect": true, "rationale": "Anger 'must always be felt towards some particular individual... and not 'man' in general.' Blaming abstract rules rather than a person does not fit Aristotle's definition of anger."}, {"text": "An individual's close friend suddenly stops greeting them, after a long period of respect and honor.", "isCorrect": false, "rationale": "The text states, 'We are angrier with our friends than with other people... And with those who have usually treated us with honour or regard, if a change comes and they behave to us otherwise: for we think that they feel contempt for us.' This would provoke anger."}], "id": "q06"}, {"question": "According to Aristotle, what differentiates 'spite' from 'insolence' as forms of slighting that cause anger?", "options": [{"text": "Spite aims to cause physical harm, while insolence aims to cause emotional distress.", "isCorrect": false, "rationale": "The text does not specify physical harm for spite. Both forms of slighting can cause distress, but their motivations differ."}, {"text": "Spite is the act of thwarting another's wishes purely to prevent their success, whereas insolence is causing shame for personal pleasure and a sense of superiority.", "isCorrect": true, "rationale": "The text defines spite as 'thwarting another man's wishes, not to get something yourself but to prevent his getting it.' Insolence 'consists in doing and saying things that cause shame to the victim, not in order that anything may happen to yourself... but simply for the pleasure involved,' and 'he thinks himself greatly superior to others when ill-treating them.'"}, {"text": "Spite is directed towards superiors, while insolence is directed towards inferiors.", "isCorrect": false, "rationale": "The text does not assign these specific targets to spite and insolence. Insolence, in fact, implies a feeling of superiority from the perpetrator. Spite implies the slighter does not fear the slighted."}, {"text": "Spite is a spontaneous act, while insolence is a premeditated form of revenge.", "isCorrect": false, "rationale": "Neither is described as spontaneous or premeditated revenge. Insolence is explicitly stated as *not* retaliation. Both are forms of active slighting."}], "id": "q07"}, {"question": "A person is extremely thirsty and their companion ignores their request for water, continuing a trivial conversation. According to Aristotle's analysis of anger, why might the thirsty person become angry?", "options": [{"text": "The companion's trivial conversation is perceived as an act of contempt, disregarding the thirsty person's immediate pain.", "isCorrect": true, "rationale": "The text states that being in a state of pain (like thirst) makes one 'prone to anger and easily roused: especially against those who slight their present distress.' Disregarding the need for water while thirsty is a slight to their present distress."}, {"text": "The thirsty person is experiencing an unexpected evil, which is especially painful and therefore causes anger.", "isCorrect": false, "rationale": "While an unexpected evil can cause pain, the primary trigger here is the slighting of an existing 'unsatisfied desire' (thirst), not necessarily an unexpected new evil imposed by the companion."}, {"text": "The companion is an inferior whom the thirsty person expects to obey requests, and their opposition is perceived as contempt.", "isCorrect": false, "rationale": "The text mentions anger with inferiors who oppose, but the scenario doesn't specify an inferior. The core reason here is the slighting of an existing painful condition, which applies regardless of status."}, {"text": "The companion's action signifies a desire for conspicuous revenge, which makes the thirsty person feel slighted.", "isCorrect": false, "rationale": "The companion is not seeking revenge; their action is indifferent, which is perceived as slighting. Anger, not the companion's action, is the impulse for revenge."}], "id": "q08"}, {"question": "Based on Aristotle's description, why would someone who prides themselves on their philosophical acumen become particularly angry with someone who shows contempt for their philosophy?", "options": [{"text": "Because they suspect, deep down, that they may indeed lack effective philosophical qualities.", "isCorrect": true, "rationale": "The text states, 'We feel particularly angry on this account if we suspect that we are in fact, or that people think we are, lacking completely or to any effective extent in the qualities in question.'"}, {"text": "Because such contempt is seen as an act of pure spite, aiming only to prevent their intellectual success.", "isCorrect": false, "rationale": "While it could involve spite, the primary reason given for heightened anger is the underlying insecurity about the very quality being slighted, not just the nature of the slight itself."}, {"text": "Because philosophers are inherently more prone to anger than other professions.", "isCorrect": false, "rationale": "The text generalizes this reaction to anyone who cares about certain qualities and is slighted, not just philosophers. It's about the perceived lack in a valued trait."}, {"text": "Because the slight is an 'unexpected evil' that causes profound pain, leading to an angry reaction.", "isCorrect": false, "rationale": "While any slight causes pain, the specific 'particular' anger arises from the suspicion of lacking the very quality being mocked, rather than just the unexpectedness of the slight."}], "id": "q09"}, {"question": "An orator wishes to use the emotion of 'anger' to sway a jury in a forensic case. Applying Aristotle's three-question method for arousing anger, which of the following actions would be most strategically effective?", "options": [{"text": "Presenting evidence that the defendant slighted the victim, while also portraying the jury as feeling 'afflicted by sickness or poverty' in general.", "isCorrect": true, "rationale": "This option addresses all three aspects of arousing anger: (1) The jury's 'frame of mind' (afflicted by pain/distress), (2) The 'persons' they should get angry with (defendant, towards victim), and (3) The 'grounds' for anger (a 'slight' to the victim). This comprehensive approach, aligning the jury's internal state with the external provocation, is what Aristotle advocates."}, {"text": "Detailing the defendant's character flaws without connecting them to any specific slight against the victim.", "isCorrect": false, "rationale": "While character flaws might be relevant to ethos, anger 'must always be felt towards some particular individual' due to something 'done or intended to do something to him or one of his friends,' i.e., a specific slight, not just general flaws."}, {"text": "Focusing solely on the victim's pain and suffering to evoke pity, believing pity naturally leads to anger.", "isCorrect": false, "rationale": "Pity and anger are distinct emotions. While a victim's suffering might make the jury more susceptible to anger if they feel slighted, pity alone is not the same as anger, and focusing solely on it misses the 'who' and 'grounds' for anger."}, {"text": "Recounting a historical event where an angry mob successfully achieved justice, to inspire similar feelings in the jury.", "isCorrect": false, "rationale": "This is an appeal to precedent or example, not a direct application of the three-question method for arousing anger. It doesn't systematically address the jury's state of mind, the specific target, or the grounds for anger in *this* case."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
