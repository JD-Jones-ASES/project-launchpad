<body>

<script>
var QUESTIONS = [{"question": "What is Aristotle's most significant contribution to the study of emotion, as described in the provided text?", "options": [{"text": "He provided a list of rhetorical techniques for manipulating crowds.", "isCorrect": false, "rationale": "The text explicitly states that Aristotle 'has not merely given the orator a list of techniques for stirring up crowds,' distinguishing his work from simple manipulation."}, {"text": "He produced the first systematic psychology of human emotion in Western philosophy.", "isCorrect": true, "rationale": "The text clearly identifies this as Aristotle's central accomplishment, noting he provided 'a rigorous, precise account of what emotions are, how they arise, and what purposes they serve.'"}, {"text": "He argued that emotions always distort rational judgment and should be avoided.", "isCorrect": false, "rationale": "While Plato worried that emotions distort rational judgment, Aristotle's approach was to analyze them systematically, not to dismiss them entirely or suggest they always distort judgment."}, {"text": "He celebrated emotions like pity and terror as the marks of great drama.", "isCorrect": false, "rationale": "The text attributes this view to the tragedians, not Aristotle's primary contribution to the psychology of emotion in the 'Rhetoric.'"}], "id": "q01"}, {"question": "An orator aims to elicit pity for a defendant. According to Aristotle's three-question method for analyzing emotions, which of the following is *not* a primary line of inquiry for the orator to understand and evoke this emotion responsibly?", "options": [{"text": "What state of mind produces the emotion of pity in the audience?", "isCorrect": false, "rationale": "This aligns with Aristotle's first question: 'What state of mind produces this emotion?'"}, {"text": "Toward whom should this emotion of pity be directed?", "isCorrect": false, "rationale": "This aligns with Aristotle's second question: 'Toward whom is this emotion directed?' (e.g., the defendant)."}, {"text": "What are the specific triggers or causes that produce pity in this particular case?", "isCorrect": false, "rationale": "This aligns with Aristotle's third question: 'For what reasons does this emotion arise?'"}, {"text": "How can the emotion be suppressed in hostile witnesses or jurors?", "isCorrect": true, "rationale": "Aristotle's three questions focus on understanding how an emotion *arises* in an individual. While an orator might consider managing emotions, suppressing them in others is not part of this analytical method for understanding the emotion itself."}], "id": "q02"}, {"question": "In Aristotle's definition of *orge* (anger), the use of the term 'apparent' (e.g., 'apparent slight') highlights which key psychological insight?", "options": [{"text": "That anger is often based on misunderstandings rather than real events.", "isCorrect": false, "rationale": "While misunderstandings can occur, the core insight isn't about the frequency of misunderstandings but the fundamental nature of perception in provoking anger."}, {"text": "That the objective truth of a slight is less important than the individual's subjective belief about it.", "isCorrect": true, "rationale": "The text states, 'what matters for the emotion is what the person believes, not what is objectively true. This is psychologically acute.' It emphasizes that perceived reality, not just objective reality, drives emotion."}, {"text": "That anger is usually directed at illusions or imagined slights.", "isCorrect": false, "rationale": "The term 'apparent' refers to the perception of the slight, not necessarily that the slight is an illusion or imagined. It might be objectively real, but the *belief* is what matters for the emotion."}, {"text": "That anger is a superficial emotion that lacks a firm basis in reality.", "isCorrect": false, "rationale": "Aristotle's rigorous analysis of anger suggests it is a real and impactful emotion, regardless of the objective truth of the slight. The text does not imply it's superficial."}], "id": "q03"}, {"question": "Why does Aristotle emphasize 'uncertainty' as a crucial component for evoking *phobos* (fear) in an audience?", "options": [{"text": "Because certainty about a negative future event makes the audience more receptive to persuasion.", "isCorrect": false, "rationale": "Certainty about a negative future event, according to Aristotle, leads to despair, which is distinct from fear and generally less conducive to productive persuasion."}, {"text": "Because fear is only effective if the audience believes the threat is entirely fabricated.", "isCorrect": false, "rationale": "Fear requires the belief that something bad *may* happen and is 'genuinely possible,' not that it's fabricated. Believing it's fabricated would lead to skepticism, not fear."}, {"text": "Because perfect certainty about a negative future event leads to despair, not fear, and fear requires a possibility, not a guarantee.", "isCorrect": true, "rationale": "The text states, 'we do not fear what is perfectly certain, since certainty produces despair rather than fear.' Fear lives in the 'middle ground of uncertainty,' where an outcome is possible but not guaranteed."}, {"text": "Because an audience will only experience fear if they are completely unaware of the potential danger.", "isCorrect": false, "rationale": "For fear to arise, the audience must believe that something bad *may* happen; complete unawareness prevents this belief from forming."}], "id": "q04"}, {"question": "An orator successfully incites an audience's anger against a proposed policy by presenting misleading statistics that suggest a severe injustice, which is not actually occurring. According to Aristotle's ethical framework, how would this orator's action be characterized?", "options": [{"text": "As a masterful display of rhetoric, demonstrating the orator's skill in emotional appeal.", "isCorrect": false, "rationale": "Aristotle would not consider this masterful rhetoric; he explicitly states that using pathos to deceive makes one 'not a better rhetorician but a worse one — and a morally blameworthy person besides.'"}, {"text": "As honest precision, because the orator effectively targeted the audience's emotions.", "isCorrect": false, "rationale": "The text defines honest precision as arousing emotions 'appropriate to the actual facts of the case,' which misleading statistics contradict."}, {"text": "As sophistry, because the emotion was aroused based on something that was not a genuine injustice.", "isCorrect": true, "rationale": "The text states, 'Arousing anger at a genuine injustice is legitimate; arousing anger at something that is not a genuine injustice is not rhetoric but sophistry.'"}, {"text": "As legitimate emotional engagement, as long as the audience eventually believes the statistics.", "isCorrect": false, "rationale": "The legitimacy in Aristotle's view depends on the 'actual facts of the case,' not just the audience's belief in fabricated facts."}], "id": "q05"}, {"question": "Aristotle organizes his analysis of fourteen emotions in Book II into 'contrasting pairs' (e.g., anger and calmness; fear and confidence). What is the primary pedagogical benefit of this organizational structure?", "options": [{"text": "It simplifies the emotions by reducing them to binary choices for the orator.", "isCorrect": false, "rationale": "The organization aims for deeper understanding and nuanced analysis, not simplification to binary choices."}, {"text": "It helps the orator understand which emotions are more powerful than others.", "isCorrect": false, "rationale": "While some emotions may feel more powerful, the text doesn't suggest the contrasting pairs are organized to rank their power, but rather to illuminate their nature."}, {"text": "It illuminates each emotion by highlighting its characteristics in opposition to its converse.", "isCorrect": true, "rationale": "The text states, 'The list is not random — it is organized in contrasting pairs... that illuminate each term by contrast with its opposite.'"}, {"text": "It provides a clear roadmap for manipulating an audience's emotional state from one extreme to another.", "isCorrect": false, "rationale": "The text consistently rejects the idea that Aristotle's framework is for manipulation, emphasizing 'honest, precise argument' over deceit."}], "id": "q06"}, {"question": "An orator is preparing a speech for an audience primarily composed of older individuals. Based on Aristotle's character types, which rhetorical approach would be *least* effective for this audience?", "options": [{"text": "Emphasizing practical benefits and financial security.", "isCorrect": false, "rationale": "Older people 'love money, for they have learned how hard it is to keep,' making practical, financial appeals potentially effective."}, {"text": "Appealing to their idealistic hopes for a grand, speculative future endeavor.", "isCorrect": true, "rationale": "The text states, 'The old are... cynical, hesitant, and suspicious. They live by memory rather than hope,' making appeals to idealistic, speculative hopes ineffective."}, {"text": "Presenting arguments with caution and well-qualified reasoning.", "isCorrect": false, "rationale": "Older individuals are described as 'hesitant, and suspicious,' suggesting they would appreciate cautious and qualified reasoning rather than impulsive statements."}, {"text": "Drawing on past experiences and memories as a basis for current decisions.", "isCorrect": false, "rationale": "The text states that older individuals 'live by memory rather than hope,' making appeals to past experience a potentially effective strategy."}], "id": "q07"}, {"question": "According to Aristotle, individuals in the 'prime of life' (roughly 35-49 years old) are characterized by what?", "options": [{"text": "Being driven primarily by passion and readily trusting others.", "isCorrect": false, "rationale": "These are characteristics of the young, while those in their prime are described as 'neither recklessly trusting nor chronically suspicious.'"}, {"text": "A cynical outlook and a tendency to be querulous and fault-finding.", "isCorrect": false, "rationale": "These are characteristics of the old, while those in their prime are a mean between extremes."}, {"text": "A balanced disposition, combining the virtues of youth with the realism and caution of old age, representing a mean between extremes.", "isCorrect": true, "rationale": "The text explicitly states they are 'the mean between the two extremes,' possessing 'the courage of the young tempered by the caution of the old; the hopefulness of youth tempered by the realism of experience.'"}, {"text": "A preference for abstract reasoning over practical wisdom.", "isCorrect": false, "rationale": "The prime of life is linked to Aristotle's *spoudaios*, the person of 'practical wisdom,' indicating a strong connection to practical application, not necessarily abstract reasoning over it."}], "id": "q08"}, {"question": "Which of the following scenarios, if experienced by an individual, would *not* likely lead to *orge* (Aristotle's anger) according to his definition?", "options": [{"text": "Believing a colleague deliberately spread a false rumor to undermine your reputation.", "isCorrect": false, "rationale": "This scenario involves an 'apparent slight' by a 'rational agent' who 'could have done otherwise,' fitting the criteria for anger."}, {"text": "Feeling pain and a desire for retaliation after a rival politician publicly disrespected your friends.", "isCorrect": false, "rationale": "This involves a slight against 'one's friends,' a desire for 'apparent retaliation,' and 'pain,' all elements of Aristotle's anger."}, {"text": "Being caught in a sudden, severe hailstorm that damages your property.", "isCorrect": true, "rationale": "The text states, 'we do not get angry at stones, animals, or inanimate forces.' A hailstorm is an inanimate force, and no rational agent capable of acting otherwise is involved, thus it would cause distress, not anger."}, {"text": "Perceiving that a business partner intentionally withheld crucial information, causing financial loss.", "isCorrect": false, "rationale": "This involves a perceived deliberate slight by an agent who 'could have done otherwise,' leading to pain and potentially a desire for retaliation, consistent with anger."}], "id": "q09"}, {"question": "What are the two fundamental types of rhetorical proof that Aristotle introduces as the logic of persuasion?", "options": [{"text": "Emotional appeals (pathos) and ethical appeals (ethos).", "isCorrect": false, "rationale": "Pathos and Ethos are modes of persuasion (appeals to emotion and character), not the 'two fundamental types of rhetorical argument' or 'proof' in the logical sense described here in Book II, chapters 20–26."}, {"text": "Examples (paradigma) and Enthymemes (enthymema).", "isCorrect": true, "rationale": "The text clearly states, 'Aristotle distinguishes two fundamental types of rhetorical argument: The Example (paradigma)... The Enthymeme (enthymema)...'"}, {"text": "Facts and opinions.", "isCorrect": false, "rationale": "While facts and opinions are raw materials or components of arguments, they are not the 'types of rhetorical argument' or 'proof' as Aristotle specifically defines them in this section."}, {"text": "Inductive and deductive reasoning.", "isCorrect": false, "rationale": "While examples are inductive and enthymemes are deductive, 'inductive and deductive reasoning' are broader categories of logic, not the specific 'forms of rhetorical proof' identified by Aristotle as Example and Enthymeme."}], "id": "q10"}, {"question": "Aristotle distinguishes anger ($orge$) from hatred by noting that anger is 'always concerned with individuals' while hatred can be directed at whole classes of people. What further practical difference does this distinction carry for the orator?", "options": [{"text": "Anger is more difficult to arouse than hatred, because it requires specific evidence against a named individual.", "isCorrect": false, "rationale": "Aristotle does not claim anger is harder to arouse; the distinction concerns its object and durability, not its ease of arousal. Anger can be aroused quickly if the right conditions (apparent slight, pain) are met."}, {"text": "Hatred is accompanied by pain, making it more easily redirected through pathos; anger is painless and therefore permanent.", "isCorrect": false, "rationale": "Aristotle states the opposite: anger is accompanied by pain, while hatred is not. This reversal is precisely why anger can be cured by time but hatred cannot."}, {"text": "Anger can be cured by time or satisfaction and aims at the offender feeling pain; hatred aims at permanent harm and cannot be cured by time.", "isCorrect": true, "rationale": "Aristotle explicitly notes that anger can be put to rest once the offender feels pain or is punished, while hatred — directed at a person's character rather than a specific act — aims to destroy the person and is not amenable to cure. This gives the orator very different tools for managing each."}, {"text": "The orator can exploit hatred to rouse a crowd but cannot exploit anger because it is directed at absent individuals.", "isCorrect": false, "rationale": "Anger, being individual and specific, is actually more useful for forensic oratory directed at a defendant; hatred's class-directed nature makes it harder to focus on a persuasive purpose. Aristotle does not claim anger is ineffective because the object is absent."}], "id": "q11"}, {"question": "Aristotle notes that fear requires a 'middle ground of uncertainty' — neither perfect certainty of harm nor complete safety. How does this insight guide an orator who wants to arouse fear in an audience that feels overconfident?", "options": [{"text": "The orator should threaten the audience with certain doom to ensure they take the danger seriously.", "isCorrect": false, "rationale": "Certainty of doom produces despair, not fear, and despair paralyzes rather than motivates. Aristotle explicitly states that people do not fear what is perfectly certain."}, {"text": "The orator should reassure the audience that they are safe to lower their guard before reintroducing the threat.", "isCorrect": false, "rationale": "Reassuring the audience would reduce fear, not produce it. The goal is to establish genuine uncertainty, not to cycle through security and danger."}, {"text": "The orator should point out that the danger has happened to stronger people like themselves in unexpected ways, making escape uncertain but not impossible.", "isCorrect": true, "rationale": "Aristotle prescribes exactly this approach: the orator should show that the danger is real and possible — it has harmed people stronger than this audience — while leaving open the 'faint expectation of escape' that is the psychological precondition of fear. This shifts an overconfident audience into the productive middle ground of uncertainty."}, {"text": "The orator should appeal to the audience's anger against the source of the threat, converting contempt into hostility.", "isCorrect": false, "rationale": "While anger and fear are related, Aristotle's prescription for arousing fear is about establishing the possibility and proximity of harm, not primarily about redirecting anger. Anger and fear produce different dispositions in the audience."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
