    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "According to Aristotle in Book III of the Rhetoric, what is the 'supreme virtue of prose style' and why is it considered foundational?", "options": [{"text": "To prepon, or appropriateness, because it ensures the speech resonates with the audience's emotions.", "isCorrect": false, "rationale": "To prepon is a crucial secondary virtue, but not the supreme or foundational one. Its primary role is matching style to context, not solely emotional resonance."}, {"text": "Distinction, achieved primarily through metaphor, because it makes language memorable and impactful.", "isCorrect": false, "rationale": "Distinction is a quality beyond clarity and appropriateness, achieved through devices like metaphor, but it is not the *foundational* virtue. Clarity is the absolute prerequisite."}, {"text": "Sapheneia, or clarity, because speech exists to convey meaning, and without clarity, it fails its essential purpose.", "isCorrect": true, "rationale": "The text explicitly states that sapheneia (clarity) is the supreme virtue, a logical requirement because speech that fails to convey meaning clearly has failed in its essential purpose."}, {"text": "Energeia, or vividness, because it sets events before the eyes and makes the speech more engaging.", "isCorrect": false, "rationale": "Energeia (vividness) is a valuable quality, often enhanced by metaphor, but it is a means to distinction and engagement, not the supreme virtue of prose style itself."}]}, {"question": "Aristotle describes 'to prepon' as an 'epistemic virtue.' What does this classification imply about the role of appropriateness in rhetoric?", "options": [{"text": "It means appropriateness is merely a conventional rule of etiquette that ensures social acceptance, rather than genuine persuasive power.", "isCorrect": false, "rationale": "The text explicitly states that 'appropriateness is not arbitrary convention but a genuine epistemic virtue,' directly contradicting this option."}, {"text": "It suggests that language, when it fits its context, actively contributes to making the argument clearer and more believable.", "isCorrect": true, "rationale": "An 'epistemic virtue' relates to knowledge and understanding. The text explains that 'language that fits its context makes the argument clearer and more believable, because it does not distract the audience from what matters.'"}, {"text": "It indicates that appropriateness is primarily about elevating the speaker's reputation, irrespective of the audience's understanding.", "isCorrect": false, "rationale": "While appropriateness can enhance a speaker's image, its core function as an 'epistemic virtue' is about clarifying the argument and making it believable, focusing on the audience's reception."}, {"text": "It implies that only highly educated audiences can appreciate truly appropriate language, limiting its universal appeal.", "isCorrect": false, "rationale": "The concept of appropriateness (to prepon) is universal in its application across different audiences and occasions, adapting the style rather than limiting it to an elite few."}]}, {"question": "A political orator is preparing a speech to a diverse public assembly about a new economic policy. To best adhere to Aristotle's virtues of style, which approach should the orator prioritize?", "options": [{"text": "Using highly elevated, complex vocabulary and elaborate metaphors to demonstrate intellectual superiority and distinction.", "isCorrect": false, "rationale": "While distinction is good, sacrificing clarity for elevation can lead to obscurity or pretentiousness (to psychron), especially in a diverse public assembly where clear communication is paramount."}, {"text": "Employing ordinary, current words and a direct structure, ensuring the policy is understood by everyone, even if the speech lacks flair.", "isCorrect": false, "rationale": "This approach achieves clarity but risks being 'flat and prosaic.' Good style requires appropriateness and distinction beyond just minimum clarity, especially for an important topic."}, {"text": "Balancing clear, accessible language with an appropriate level of elevation and well-crafted, proportional metaphors to explain complex ideas accessibly.", "isCorrect": true, "rationale": "This option best reflects Aristotle's 'middle of the road' approach, balancing clarity with appropriateness and distinction (through metaphor) without becoming obscure or ordinary. Proportional metaphors help make complex ideas understandable."}, {"text": "Focusing on a 'running style' with many conjunctions to maintain a continuous flow, regardless of sentence complexity.", "isCorrect": false, "rationale": "Aristotle prefers the periodic style for formal speaking, as the running style is more suited for informal contexts and can lack the structure needed for clear argumentation in a formal address."}]}, {"question": "Aristotle states that 'the best style conceals its art.' What is the underlying reason for this principle?", "options": [{"text": "To prevent other speakers from copying one's unique stylistic techniques, thus preserving originality.", "isCorrect": false, "rationale": "The text does not mention preventing imitation; the focus is on the audience's perception of authenticity and credibility."}, {"text": "Because naturalness is persuasive, and artificiality makes the audience suspicious that the speaker is performing rather than communicating.", "isCorrect": true, "rationale": "The text explicitly states: 'naturalness is persuasive and artificiality is the opposite—we sense when a speaker is performing rather than communicating, and we become suspicious.'"}, {"text": "To ensure that the audience focuses solely on the speaker's emotional delivery, not the linguistic structure.", "isCorrect": false, "rationale": "While emotional delivery is important, concealing art is about the audience's perception of sincerity and naturalness in the *communication* of ideas, not just emotional impact."}, {"text": "To challenge the audience to discover the subtle artistry, thereby increasing their intellectual engagement.", "isCorrect": false, "rationale": "The goal is transparent communication that feels unforced, not a puzzle for the audience to solve. Detection of artifice is a failure of style."}]}, {"question": "Why does Aristotle consider metaphor 'even more important' for the prose writer than for the poet?", "options": [{"text": "Because prose writers primarily deal with abstract concepts, requiring metaphor to make them tangible.", "isCorrect": false, "rationale": "While metaphor can clarify abstract concepts, Aristotle's primary reason is not the nature of prose topics but the limited stylistic resources available to prose writers compared to poets."}, {"text": "Poets have other resources like unusual words, elaborate rhythms, and elevated subject matter to distinguish language, which prose writers largely lack.", "isCorrect": true, "rationale": "The text explains: 'The poet has other resources—unusual words, elaborate rhythms, the elevated subject matter of tragedy and epic—that can distinguish language without metaphor. The prose writer has almost none of these.'"}, {"text": "Metaphors are easier to craft in prose due to its less constrained structure compared to poetic meter.", "isCorrect": false, "rationale": "The text indicates metaphor 'cannot be taught' even for poets, implying it's not inherently easier in prose; the emphasis is on its *necessity* for distinction in prose."}, {"text": "Metaphor's 'clearness, charm, and distinction' are only valuable in rhetorical contexts, not in poetic ones.", "isCorrect": false, "rationale": "The Poetics already established metaphor as 'the greatest thing by far' for the poet, indicating its value in both contexts, though its *centrality* for distinction in prose is highlighted."}]}, {"question": "A rhetorician uses the metaphor: 'The new policy is a sturdy bridge, connecting the present challenges to a future of stability.' According to Aristotle, why would this be an effective proportional metaphor?", "options": [{"text": "It uses highly ornate and unique language that immediately commands attention.", "isCorrect": false, "rationale": "While 'sturdy bridge' is effective, the value of the metaphor lies not in ornate language but in the recognition it creates. Ornate language can sometimes lead to 'frigidity.'"}, {"text": "It creates an obvious comparison that requires no mental effort, ensuring universal understanding.", "isCorrect": false, "rationale": "Aristotle states that the best metaphors are 'neither too obvious (which would be dull) nor too remote (which would be obscure).' They require 'just enough mental effort.'"}, {"text": "It establishes a four-term ratio (policy:challenges::bridge:stability), creating a sudden, pleasurable act of recognition of a hidden connection.", "isCorrect": true, "rationale": "The text explains proportional metaphors work by establishing a four-term ratio and creating a 'small act of recognition' where the hearer's mind perceives a resemblance that is both pleasurable and intellectually productive."}, {"text": "It focuses primarily on the emotional impact, bypassing logical reasoning altogether.", "isCorrect": false, "rationale": "While effective metaphors can have emotional resonance, Aristotle emphasizes that they are 'intellectually productive' and clarify connections, not bypass logic."}]}, {"question": "What is 'energeia' in Aristotle's rhetorical theory, and how is it typically achieved?", "options": [{"text": "It is the use of elaborate rhythmic patterns to make prose sound more poetic and elevated.", "isCorrect": false, "rationale": "Energeia refers to vividness, not rhythm. Elaborate rhythmic patterns approaching meter are cautioned against in prose."}, {"text": "It is vividness or 'actuality,' achieved by making the audience 'see' something as if in motion, often by giving metaphorical life to inanimate objects.", "isCorrect": true, "rationale": "The text defines energeia as 'vividness, or literally “actuality.”' It is achieved when a metaphor 'makes an audience see something' and by 'giving metaphorical life to lifeless things,' setting events 'before the eyes as if in motion.'"}, {"text": "It refers to the strategic use of silence and pauses to emphasize key points in a speech.", "isCorrect": false, "rationale": "Energeia is a quality of language and description, not a technique of delivery like pausing."}, {"text": "It is the logical force of an argument, ensuring its conclusions are undeniable.", "isCorrect": false, "rationale": "Energeia is a stylistic virtue related to vividness, distinct from the logical strength (ethos, pathos, logos) of an argument, though it can enhance persuasion."}]}, {"question": "Aristotle advises that prose should have rhythm but not meter. What is the practical implication of this distinction for an orator?", "options": [{"text": "Meter is too difficult for audiences to follow, whereas rhythm is naturally engaging.", "isCorrect": false, "rationale": "The issue with meter is not difficulty but its obtrusiveness; it creates fixed expectations that distract from content, making the speech feel artificial."}, {"text": "Rhythm in prose is a form of unconscious persuasion that guides the audience through the argument transparently, while meter distracts by drawing attention to its fixed patterns.", "isCorrect": true, "rationale": "The text states: 'Rhythm without meter achieves this effect while remaining transparent. Meter achieves it too obtrusively: the audience notices the pattern and watches for it, attending to the form rather than the content.'"}, {"text": "Prose should imitate poetry as closely as possible to elevate its status, but meter is impractical for spoken delivery.", "isCorrect": false, "rationale": "Aristotle explicitly states that meter belongs to poetry and would make speech artificial, contrasting prose rhythm with poetic meter rather than advocating imitation."}, {"text": "The paean is the only acceptable rhythm for prose, as all other rhythms are inherently metrical.", "isCorrect": false, "rationale": "Aristotle recommends the paean as *most suitable* because it avoids predictable patterns, but he does not state it is the *only* acceptable rhythm, nor that all others are metrical."}]}, {"question": "What is the primary difference between Aristotle's 'running style' (lexis eiromene) and 'periodic style' (lexis katestrammene) of prose, and which does he generally prefer for formal speaking?", "options": [{"text": "Running style uses short, abrupt sentences, while periodic style uses long, flowing sentences; he prefers running style for its energetic pace.", "isCorrect": false, "rationale": "The running style is characterized by clauses strung together with connectives, not necessarily short and abrupt. Aristotle prefers the periodic style for formal speaking."}, {"text": "Running style strings clauses with connectives ('and then'), while periodic style constructs sentences as self-contained, complete units; he prefers the periodic style.", "isCorrect": true, "rationale": "The text clearly defines running style as 'clauses are strung together with connectives like 'and then and then'' and periodic style as 'the whole sentence is constructed as a self-contained unit.' It concludes: 'Aristotle clearly prefers the periodic style for formal speaking.'"}, {"text": "Running style is free verse, while periodic style adheres to strict metrical feet; he prefers running style for its flexibility.", "isCorrect": false, "rationale": "Neither style adheres to strict metrical feet in prose. The distinction is about sentence structure and completeness, not meter."}, {"text": "Running style allows for spontaneous improvisation, whereas periodic style requires meticulous pre-composition; he prefers running style for its naturalness.", "isCorrect": false, "rationale": "While running style might *feel* more informal, the preference for periodic style in formal settings highlights that 'naturalness' in Aristotle's view is often the result of careful construction, not improvisation."}]}, {"question": "Aristotle warns against 'to psychron' (frigidity or coldness) in prose. Which example best illustrates this stylistic vice?", "options": [{"text": "Using a metaphor that is so subtle and understated that the audience barely notices it.", "isCorrect": false, "rationale": "A subtle metaphor might be dull if too obvious, but frigidity refers to over-elaboration and strained effort, not lack of notice."}, {"text": "Describing a minor disagreement as a 'cataclysm of outrage' or using overly elaborate epithets for simple nouns.", "isCorrect": true, "rationale": "The text uses 'describes an ordinary disagreement as a 'cataclysm of outrage'' as a direct example of 'to psychron,' which arises from 'trying to be impressive at the expense of being natural' through strained language."}, {"text": "Employing only current, ordinary words in ordinary ways, resulting in prose that is perfectly clear but utterly flat.", "isCorrect": false, "rationale": "This describes prose that achieves only clarity, lacking distinction and appropriateness, but it is not frigidity. Frigidity is the opposite extreme: overly elaborate and strained."}, {"text": "Adopting a periodic style of sentence structure that requires careful attention from the audience to follow.", "isCorrect": false, "rationale": "The periodic style is preferred for formal speaking and is designed to guide the audience transparently, not strain their attention. Frigidity relates to word choice and metaphorical extension, not sentence structure."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
