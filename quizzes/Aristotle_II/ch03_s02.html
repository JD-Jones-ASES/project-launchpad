<script>
var QUESTIONS = [{"question": "Which statement best describes the historical reception of Aristotle's Poetics?", "options": [{"text": "It was widely read and debated throughout antiquity, forming the bedrock of ancient literary theory.", "isCorrect": false, "rationale": "The text states that the Poetics circulated with 'modest influence' and 'was not among the texts most widely read or commented upon in antiquity.' Its significant influence began in the Renaissance."}, {"text": "It gained significant influence only in the Renaissance, when humanist scholars translated and debated its contents intensely.", "isCorrect": true, "rationale": "The section explicitly states, 'Its fortunes changed dramatically in the Renaissance, when humanist scholars recovered, translated, and debated it with passionate intensity,' after having only modest influence in antiquity."}, {"text": "Its ideas were largely ignored until the 20th century, when modern critics rediscovered its relevance.", "isCorrect": false, "rationale": "The text clearly indicates its dramatic resurgence in the Renaissance, not the 20th century, highlighting its impact on Neoclassical drama."}, {"text": "It was immediately recognized as a prescriptive guide for all dramatic writing from its inception.", "isCorrect": false, "rationale": "While it became prescriptive in the Renaissance commentary tradition (especially via Castelvetro), Aristotle's original intent was largely descriptive, and its initial influence was modest."}], "id": "q01"}, {"question": "What is the fundamental difference in approach between Aristotle's original Poetics and Lodovico Castelvetro's interpretation regarding the unities?", "options": [{"text": "Aristotle focused on the spiritual effect of tragedy, while Castelvetro focused on its structural elements.", "isCorrect": false, "rationale": "This reverses their general focus. Aristotle focused on structural elements and catharsis, while Castelvetro derived his rules for verisimilitude. Longinus, not Aristotle, emphasized spiritual effect."}, {"text": "Aristotle introduced the three unities, whereas Castelvetro argued against them.", "isCorrect": false, "rationale": "Aristotle only prescribed unity of action. Castelvetro not only embraced unity of action but also *invented* unity of place and made unity of time prescriptive."}, {"text": "Aristotle made descriptive observations about common practices in Greek tragedy, while Castelvetro transformed these into binding prescriptive rules for all drama.", "isCorrect": true, "rationale": "The text emphasizes this key distinction: 'The difference between a descriptive observation (“tragedy tends to cover a single day”) and a prescriptive rule (“tragedy must cover a single day”) is enormous.' Castelvetro derived 'strict rules from observations Aristotle had offered only tentatively.'"}, {"text": "Aristotle was concerned with dramatic realism, while Castelvetro prioritized the audience's emotional response.", "isCorrect": false, "rationale": "Castelvetro's rationale for his unities was indeed theatrical verisimilitude (dramatic realism), but Aristotle's focus was more on the plot's structure and the resulting catharsis, not primarily realism in the way Castelvetro conceived it."}], "id": "q02"}, {"question": "According to Castelvetro, why were the unities of time and place essential for dramatic art?", "options": [{"text": "He believed they enhanced the poetic beauty of the language, leading to a sublime experience.", "isCorrect": false, "rationale": "The sublime and poetic language were the focus of Longinus, not Castelvetro. Castelvetro's rationale was practical verisimilitude for the audience."}, {"text": "He argued that audiences could not suspend disbelief if a play claimed to span many days or traverse multiple locations during a short performance.", "isCorrect": true, "rationale": "The text explicitly states Castelvetro 'argued for them on grounds of theatrical verisimilitude' and that 'audiences, he argued, cannot suspend disbelief if a play claims to span years or traverse continents.'"}, {"text": "He inferred from Aristotle that a play's brevity was a sign of its artistic superiority.", "isCorrect": false, "rationale": "While brevity might result, his reasoning was about audience perception and belief in the staged reality, not an inherent superiority derived from brevity itself."}, {"text": "He observed that all successful ancient Greek tragedies strictly adhered to these unities.", "isCorrect": false, "rationale": "Aristotle's observation was only about the *tendency* for unity of time, and he said nothing about place. Castelvetro's rules went beyond observation."}], "id": "q03"}, {"question": "A playwright designs a new tragedy where the entire action takes place in the king's throne room, unfolding over a single afternoon. The plot features a clear beginning, middle, and end, focusing on a single, causally connected sequence of events, though a minor subplot involving the court jester mirrors the main narrative. Which dramatic tradition would this play most likely align with?", "options": [{"text": "The English literary tradition exemplified by Shakespeare.", "isCorrect": false, "rationale": "Shakespeare's plays often ignored the unities of time and place, spanning months or years and traversing multiple locations. While he observed unity of action, the strict adherence to time and place in this example makes it unlike typical Shakespearean drama."}, {"text": "The Neoclassical drama influenced by Castelvetro.", "isCorrect": true, "rationale": "This description perfectly matches Castelvetro's 'three unities,' which became the 'governing principles of European neoclassical drama.' The single location, single day timeframe, and single complete action (with an allowed subplot that mirrors the main action, as noted in the text's 'further irony' section) are all hallmarks."}, {"text": "The literary criticism of Longinus, prioritizing the sublime.", "isCorrect": false, "rationale": "Longinus was concerned with the emotional and spiritual effect (the sublime) on the audience, not specific structural rules like the unities of time and place."}, {"text": "Aristotle's original prescriptions in the Poetics.", "isCorrect": false, "rationale": "While the unity of action aligns with Aristotle, the strict adherence to unity of time and invention of unity of place were Castelvetro's contributions, not Aristotle's original prescriptions."}], "id": "q04"}, {"question": "Which of the 'three unities' was the *only* one explicitly prescribed by Aristotle in the Poetics?", "options": [{"text": "Unity of time, confining action to a single day.", "isCorrect": false, "rationale": "Aristotle made an *observation* about unity of time ('endeavors... to confine itself to a single revolution of the sun'), but it was descriptive, not prescriptive. Castelvetro made it a binding rule."}, {"text": "Unity of place, limiting action to a single location.", "isCorrect": false, "rationale": "Aristotle 'says nothing about it anywhere in the Poetics.' Unity of place was Castelvetro's own invention."}, {"text": "Unity of action, requiring a single, whole, causally connected plot.", "isCorrect": true, "rationale": "The text states: 'Aristotle, as you have read, prescribes exactly one unity for tragedy: unity of action. The plot must be a single, whole action with a beginning, middle, and end causally connected to one another.'"}, {"text": "Unity of character, ensuring consistent portrayal of individuals.", "isCorrect": false, "rationale": "Unity of character is not mentioned as one of the 'three unities' discussed in the text, nor was it a unity prescribed by Aristotle in this context."}], "id": "q05"}, {"question": "How did the English literary tradition, particularly playwrights like Shakespeare, generally respond to Castelvetro's 'three unities'?", "options": [{"text": "They fully embraced all three unities, considering them essential for dramatic excellence.", "isCorrect": false, "rationale": "The text explicitly states that the English tradition 'took a more skeptical view' and that Shakespeare 'largely ignored the unities of time and place.'"}, {"text": "They rigorously followed the unity of action but often disregarded the unities of time and place.", "isCorrect": true, "rationale": "The text notes: 'William Shakespeare (1564–1616) observed the unity of action—his plots are constructed with remarkable causal coherence—but largely ignored the unities of time and place.'"}, {"text": "They rejected all three unities, favoring a completely free and unstructured approach to drama.", "isCorrect": false, "rationale": "While they rejected time and place, Shakespeare still observed unity of action, indicating a structured approach, not a 'completely free' one for all elements."}, {"text": "They developed their own set of 'three unities' distinct from those of Castelvetro.", "isCorrect": false, "rationale": "The text does not mention the English tradition developing its own set of unities, but rather reacting to and largely ignoring Castelvetro's."}], "id": "q06"}, {"question": "What is the primary focus of Longinus's treatise On the Sublime, in contrast to Aristotle's Poetics?", "options": [{"text": "Longinus focuses on the precise structural elements required for a well-constructed plot, while Aristotle focuses on the emotional impact on the audience.", "isCorrect": false, "rationale": "This reverses their roles. Aristotle focused on 'elements and construction of tragedy,' while Longinus asked 'about the effect of great literature on the reader's soul.'"}, {"text": "Longinus examines the quality of literature that overwhelms and transports the reader, whereas Aristotle analyzes the construction and elements of tragedy.", "isCorrect": true, "rationale": "The text states Longinus's central concept is 'the sublime'—a quality that 'overwhelms, producing a kind of transport or ecstasy.' It contrasts this with Aristotle asking 'about the elements and construction of tragedy.'"}, {"text": "Longinus critiques the misinterpretations of earlier critics, while Aristotle provides the foundational theory.", "isCorrect": false, "rationale": "While Longinus critiques Caecilius, his *primary focus* is on defining and achieving the sublime, not solely critiquing others. Aristotle provides foundational theory, but the contrast isn't about critique vs. theory."}, {"text": "Longinus argues for strict adherence to dramatic unities, while Aristotle advocates for creative freedom.", "isCorrect": false, "rationale": "Longinus has no stated position on dramatic unities; his focus is on the sublime effect. Aristotle, while prescriptive on action, was not a strong advocate for creative freedom against unities of time/place, as those weren't his concepts."}], "id": "q07"}, {"question": "How does Longinus's concept of 'the sublime' relate to Aristotle's 'catharsis'?", "options": [{"text": "Longinus argues that the sublime prevents catharsis by overwhelming the reader too much.", "isCorrect": false, "rationale": "The text suggests a connection, not an opposition. Longinus's sublime is described as an internal experience of catharsis."}, {"text": "Longinus provides an aesthetic, internal description of what catharsis feels like—a shattering, overwhelming experience of greatness.", "isCorrect": true, "rationale": "The text explicitly states: 'Longinus is, in effect, describing what catharsis feels like from the inside: not a tidy emotional resolution but a shattering, overwhelming experience of greatness. What Aristotle explains structurally, Longinus experiences aesthetically.'"}, {"text": "Longinus considers the sublime to be a more rational and persuasive experience, distinct from the emotional purgation of catharsis.", "isCorrect": false, "rationale": "Longinus states the sublime 'does not convince the reason of the reader, but takes him out of himself.' It's *less* rational and *more* overwhelming than mere persuasion, making it distinct from a 'rational' experience."}, {"text": "Longinus refutes Aristotle's theory of catharsis entirely, proposing the sublime as a superior goal for tragedy.", "isCorrect": false, "rationale": "Longinus's description complements Aristotle's, offering an internal perspective rather than a refutation."}], "id": "q08"}, {"question": "According to Longinus, what is a defining characteristic of genuine sublimity in literature?", "options": [{"text": "It consistently persuades the reader through logical argument and clear arrangement of facts.", "isCorrect": false, "rationale": "Longinus contrasts the sublime with persuasion and lucid arrangement: 'A lofty passage does not convince the reason of the reader, but takes him out of himself.' Skill in invention and lucid arrangement 'manifest themselves in the general structure of a work,' while the sublime is like a 'lightning-flash.'"}, {"text": "It provides a tidy emotional resolution and purification of pity and fear.", "isCorrect": false, "rationale": "This describes Aristotle's catharsis, but Longinus characterizes the sublime as 'not a tidy emotional resolution but a shattering, overwhelming experience of greatness.'"}, {"text": "It overwhelms the reader, producing a sense of transport or ecstasy that confounds judgment.", "isCorrect": true, "rationale": "Longinus's central concept is that the sublime 'does not merely persuade or please but overwhelms, producing a kind of transport or ecstasy (ekplexis) in the hearer.' It 'confounds our judgment, and eclipses that which is merely reasonable or agreeable.'"}, {"text": "It strictly adheres to established literary rules and conventions for structural integrity.", "isCorrect": false, "rationale": "Longinus is concerned with the *effect* of greatness, not adherence to structural rules like the unities, which were more the domain of Aristotle (for action) and Castelvetro."}], "id": "q09"}, {"question": "A literary critic praises a new play, stating, 'The playwright's innovative use of anachronism throughout the dialogue and the shifting of scenes across multiple historical periods within a single act is a bold choice, forcing the audience to critically engage with the fragmented narrative rather than passively accepting a linear reality.' Based on the 'historical lesson' presented in the text, what might this critic be inadvertently illustrating a departure from?", "options": [{"text": "Aristotle's primary focus on the emotional effect of catharsis.", "isCorrect": false, "rationale": "While the fragmented narrative might affect catharsis, the more direct departure is from the prescriptive rules of theatrical realism and structural coherence advocated by Castelvetro regarding time and place."}, {"text": "Longinus's criteria for achieving the sublime through lofty language.", "isCorrect": false, "rationale": "The description focuses on structural and temporal choices, not specifically the loftiness of language that Longinus emphasized for the sublime."}, {"text": "Castelvetro's emphasis on theatrical verisimilitude and strict unities of time and place.", "isCorrect": true, "rationale": "The text's historical lesson highlights the difference between observation and prescription, specifically mentioning Castelvetro's strict rules based on verisimilitude. The play's anachronism and 'shifting of scenes across multiple historical periods' directly violate Castelvetro's unities of time and place, which he based on what audiences 'cannot suspend disbelief' for."}, {"text": "Shakespeare's disregard for the unity of action in his 'double plots'.", "isCorrect": false, "rationale": "The description implies a *deliberate* choice to fragment across time/place, not merely a 'double plot' that supports a main action, which Aristotle allowed. Shakespeare largely ignored time/place, but the 'historical lesson' section points directly to Castelvetro's rules as an example of misapplied prescription that this play is departing from."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
