<script>
var QUESTIONS = [{"question": "Which statement best describes the primary way Sir Philip Sidney transformed Aristotle's defense of poetry?", "options": [{"text": "By emphasizing the role of catharsis in purifying audience emotions.", "isCorrect": false, "rationale": "This aligns more with Aristotle's focus on tragedy, not Sidney's unique transformation of the defense."}, {"text": "By asserting poetry's ability to achieve a moral end more effectively than philosophy or history.", "isCorrect": true, "rationale": "Sidney transformed Aristotle's defense by arguing that poetry achieves a moral end better than philosophy (abstract virtue) or history (records virtue), by providing vivid, concrete images that act directly on the will."}, {"text": "By analyzing the psychological effects of metaphor on the reader's subconscious.", "isCorrect": false, "rationale": "The analysis of metaphor is a key part of Aristotle's and Longinus's work, but not the core of Sidney's distinct transformation of the defense."}, {"text": "By focusing solely on the natural endowment required for a poet's genius.", "isCorrect": false, "rationale": "This is a key distinction made by Longinus regarding the sources of the sublime, not Sidney's central argument for poetry's value."}]}, {"question": "According to Longinus, what is the defining characteristic of 'hypsos' or the sublime in literature?", "options": [{"text": "Its strict adherence to established rhetorical rules and conventions.", "isCorrect": false, "rationale": "Longinus explicitly states that the sublime 'cannot be produced merely by following rules,' distinguishing it from conventional excellence."}, {"text": "Its capacity to produce intellectual pleasure through complex allegories.", "isCorrect": false, "rationale": "While literature can produce pleasure, Longinus emphasizes 'transport rather than mere pleasure' as the hallmark of the sublime."}, {"text": "Its ability to lift the reader above themselves, producing transport akin to divine inspiration or ecstasy.", "isCorrect": true, "rationale": "Longinus defines 'hypsos' as the quality that makes a reader feel transported, lifted above themselves, experiencing something greater than ordinary human measure, akin to divine inspiration."}, {"text": "Its meticulous depiction of everyday human emotions and experiences.", "isCorrect": false, "rationale": "The sublime is characterized by transcending 'ordinary human measure,' focusing on greatness rather than mundane emotional experiences."}]}, {"question": "Which of Longinus's five sources of the sublime are primarily dependent on natural endowment, rather than being cultivable through study and practice?", "options": [{"text": "Grandeur of thought and a vigorous and spirited treatment of the passions.", "isCorrect": true, "rationale": "Longinus states that 'grandeur of thought' and 'a vigorous and spirited treatment of the passions' are the two sources of sublimity that depend mainly on natural endowments."}, {"text": "Artifice in the employment of figures and dignified expression.", "isCorrect": false, "rationale": "These two sources are described by Longinus as deriving assistance from 'Art,' meaning they can be cultivated through study and practice."}, {"text": "Majesty and elevation of structure and grandeur of thought.", "isCorrect": false, "rationale": "Majesty and elevation of structure is a cultivated source, while grandeur of thought is natural. This option mixes the categories incorrectly."}, {"text": "The proper choice of words and vigorous treatment of the passions.", "isCorrect": false, "rationale": "The proper choice of words is a cultivated aspect of dignified expression, whereas vigorous treatment of the passions is a natural endowment. This option mixes the categories incorrectly."}]}, {"question": "How does Longinus's perspective on metaphor primarily differ from or extend Aristotle's 'greatest thing by far' assessment?", "options": [{"text": "Longinus dismisses metaphor as a mere ornament, distracting from genuine grandeur of thought.", "isCorrect": false, "rationale": "Longinus includes metaphor as part of 'dignified expression' (his fourth source), indicating its importance rather than dismissal."}, {"text": "Longinus considers metaphor an important component of 'dignified expression,' but not sufficient for the full achievement of the sublime on its own.", "isCorrect": true, "rationale": "While Aristotle called metaphor 'the greatest thing by far,' Longinus places it fourth among his sources and explicitly states that 'metaphor alone is not enough' and requires all five sources working together."}, {"text": "Longinus elevates metaphor to the sole, ultimate source of sublimity, surpassing all others in significance.", "isCorrect": false, "rationale": "Longinus lists metaphor as part of his fourth source, not the sole or ultimate source. He emphasizes the need for all five sources to work together."}, {"text": "Longinus views metaphor primarily as a tool for creating tragic pity and fear in the audience.", "isCorrect": false, "rationale": "While metaphor can contribute to emotional impact, Longinus distinguishes the sublime from the merely pathetic, and his focus on metaphor is within the broader context of 'dignified expression' for transport, not solely tragic emotion."}]}, {"question": "Longinus refines the relationship between the sublime and the pathetic by asserting that:", "options": [{"text": "The sublime is always a direct and inevitable result of strong, genuine pathos.", "isCorrect": false, "rationale": "Longinus clarifies that 'sublimity is often not in the least affecting' and that some pathetic passages are not sublime, indicating they are not always coexistent or directly causative."}, {"text": "While genuine passion can contribute to sublimity, the two are distinct, and not all sublime passages are emotionally affecting in the ordinary sense.", "isCorrect": true, "rationale": "Longinus insists that 'the sublime is not the same as the merely emotional,' and that 'some of the most affecting passages in literature are not sublime; some of the most sublime are not particularly affecting in the ordinary emotional sense,' though genuine passion is highly conducive."}, {"text": "The pathetic is merely a lesser form of the sublime, achieved through superficial emotional appeals.", "isCorrect": false, "rationale": "Longinus views them as distinct qualities, and while he warns against 'parenthyrsus' (hollow passion), he acknowledges that genuine pathos can contribute significantly to the sublime."}, {"text": "The use of parenthyrsus is essential for achieving a truly overwhelming emotional response that characterizes the sublime.", "isCorrect": false, "rationale": "Parenthyrsus is defined as 'false or misplaced passion' that produces embarrassment, not transport, and Longinus warns against it."}]}, {"question": "What challenge was Sir Philip Sidney primarily attempting to address with his *Defence of Poesy*?", "options": [{"text": "The lack of sophisticated literary criticism in Elizabethan England.", "isCorrect": false, "rationale": "While Sidney's work provided sophisticated criticism, his primary motivation was to defend poetry against specific charges."}, {"text": "Plato's ancient charges against poets and a general skepticism towards fiction and poetry's moral effects.", "isCorrect": true, "rationale": "Sidney's *Defence* was written for an audience 'skeptical of fiction, suspicious of poetry's moral effects, and still influenced... by Plato's charges against the poets.' His aim was to answer these charges."}, {"text": "Aristotle's incomplete analysis of poetic elements like plot and character.", "isCorrect": false, "rationale": "Sidney built on Aristotelian foundations but pushed them in a new direction, rather than attempting to complete Aristotle's analysis of poetic elements."}, {"text": "The dominance of dramatic tragedy over other poetic forms in his contemporary literary landscape.", "isCorrect": false, "rationale": "The text does not indicate that this was Sidney's primary concern or the challenge he was addressing."}]}, {"question": "Sidney argues that poetry is superior to philosophy and history in achieving a moral end because:", "options": [{"text": "Philosophy offers abstract virtues, history records past virtues, but poetry presents vivid images of virtue acting directly on the will.", "isCorrect": true, "rationale": "Sidney's core argument is that the poet 'doth not only show the way, but giveth so sweet a prospect into the way, as will entice any man to enter into it,' providing concrete, vivid images that act directly on the will, unlike abstract philosophy or merely descriptive history."}, {"text": "Poets are inherently more virtuous than philosophers or historians, thus their teachings are more trustworthy.", "isCorrect": false, "rationale": "The text does not make a claim about the inherent virtue of poets, but rather about the *method* and *effect* of poetry."}, {"text": "Only poetry can accurately depict the 'brazen world' in all its imperfection.", "isCorrect": false, "rationale": "Sidney argues that the poet creates a 'golden world' which is *superior* to nature's 'brazen world,' portraying virtue and excellence at their height."}, {"text": "Philosophy and history rely too heavily on emotion, whereas poetry appeals purely to the intellect.", "isCorrect": false, "rationale": "Sidney explicitly states that poetry acts 'directly on the will, not merely on the intellect,' and uses engaging tales to entice readers, implying emotional and volitional engagement."}]}, {"question": "A writer crafts a historical novel where, despite the documented injustices of the era, the protagonist's unwavering integrity leads to a just resolution and inspires widespread societal change that surpasses historical accuracy. According to Sidney's *Defence of Poesy*, this narrative best exemplifies:", "options": [{"text": "The 'brazen world,' reflecting nature as it actually is, with its inherent flaws.", "isCorrect": false, "rationale": "The 'brazen world' represents nature's imperfection, while the narrative described portrays an idealized outcome that corrects or improves upon reality."}, {"text": "A philosophical treatise, teaching virtue abstractly through hypothetical scenarios.", "isCorrect": false, "rationale": "The example is a narrative, not an abstract treatise, and focuses on concrete, vivid portrayal rather than abstract teaching."}, {"text": "The creation of a 'golden world,' where the moral order is fulfilled and excellence is portrayed at its height.", "isCorrect": true, "rationale": "Sidney defines the 'golden world' as one in which 'virtue is rewarded, excellence is portrayed at its height, and the moral order of things is made visible,' which perfectly aligns with a narrative that surpasses reality to depict ideal moral outcomes."}, {"text": "An instance of parenthyrsus, where hollow emotion attempts to be sublime.", "isCorrect": false, "rationale": "Parenthyrsus is a concept from Longinus concerning false passion, unrelated to Sidney's 'golden world' concept or the moral efficacy of a narrative."}]}, {"question": "Which statement best characterizes the overall relationship between Aristotle, Longinus, and Sidney as presented in the text?", "options": [{"text": "Each critic entirely repudiated the theories of their predecessors, establishing wholly new paradigms for literary criticism.", "isCorrect": false, "rationale": "The text explicitly states Longinus is 'extending Aristotle's analysis' and Sidney builds on 'Aristotelian foundations,' indicating continuity and transformation, not repudiation."}, {"text": "Longinus and Sidney both transformed and extended Aristotle's foundational ideas, applying them to new questions and contexts.", "isCorrect": true, "rationale": "The text describes Longinus as completing/extending Aristotle's work on excellence to the sublime, and Sidney transforming Aristotle's defense of poetry to address moral efficacy in his own context, showing a clear pattern of building upon and extending foundational ideas."}, {"text": "Aristotle's work was largely ignored by Longinus and Sidney, who focused exclusively on moral and aesthetic qualities, respectively.", "isCorrect": false, "rationale": "Both Longinus and Sidney are shown to be directly engaging with and building upon Aristotle's critical contributions."}, {"text": "All three critics arrived at the same conclusions regarding the sources of literary excellence and poetry's ultimate purpose.", "isCorrect": false, "rationale": "While they share common ground, their specific questions (elements of excellence, sources of sublime, moral purpose of poetry) and conclusions diverged significantly, reflecting their unique contexts and aims."}]}, {"question": "Longinus's warning against 'parenthyrsus' primarily highlights his concern that:", "options": [{"text": "Excessive intellectualization can hinder genuine emotional response in literature.", "isCorrect": false, "rationale": "Parenthyrsus refers to false emotion, not excessive intellectualization. Longinus is concerned with the authenticity of passion."}, {"text": "Authors might attempt to achieve sublimity through inflated or hollow emotion, resulting in bathos rather than transport.", "isCorrect": true, "rationale": "Longinus warns against 'parenthyrsus' as 'false or misplaced passion — hollow or inflated emotion that tries to be sublime but falls into bathos or absurdity,' emphasizing that true greatness achieves its effect honestly, unlike empty swelling."}, {"text": "Poetry that focuses too much on moral instruction risks becoming didactic and unengaging.", "isCorrect": false, "rationale": "This concern relates more to Sidney's discussion of moral efficacy and engaging presentation, not Longinus's specific warning about 'parenthyrsus.'"}, {"text": "Metaphorical language, if overused, can obscure the clarity of thought and meaning.", "isCorrect": false, "rationale": "Parenthyrsus is about the authenticity and proper display of passion, not specifically the overuse or clarity of metaphorical language."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
