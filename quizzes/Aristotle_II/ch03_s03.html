<script>
var QUESTIONS = [{"question": "What are the core elements Aristotle includes in his celebrated definition of tragedy in Poetics, Chapter VI?", "options": [{"text": "An imitation of men, through vivid dialogue and elaborate spectacle, aiming to entertain a large audience.", "isCorrect": false, "rationale": "Aristotle states tragedy is an 'imitation of an action, not of men.' While spectacle has emotional attraction, he considers it the 'least artistic' element and not central to the definition's essence or purpose of entertainment."}, {"text": "An imitation of an action that is serious, complete, and of a certain magnitude, in embellished language, in the form of action, effecting purgation of pity and fear.", "isCorrect": true, "rationale": "This option directly quotes and accurately summarizes Aristotle's definition from the text: 'Tragedy, then, is an imitation of an action that is serious, complete, and of a certain magnitude; in language embellished with each kind of artistic ornament... in the form of action, not of narrative; through pity and fear effecting the proper purgation of these emotions.'"}, {"text": "A narrative story about a hero's life, showing his character and thoughts through a sequence of important events, ending in either success or failure.", "isCorrect": false, "rationale": "Aristotle explicitly states tragedy is 'in the form of action, not of narrative.' He also emphasizes that it's an imitation of *action*, not primarily 'men' or a hero's life chronicle, and that its purpose is 'purgation of pity and fear,' not just any ending."}, {"text": "A dramatic performance designed to display character and thought through speeches, utilizing rhythm and song to create emotional impact on spectators.", "isCorrect": false, "rationale": "While character, thought, rhythm, and song are elements, Aristotle identifies 'Plot' (arrangement of incidents) as the most important element and 'the soul of a tragedy,' not merely the display of character and thought. Also, 'Spectacle' (performance aspect) is considered the least artistic."}], "id": "q01"}, {"question": "According to Aristotle, which of the following sequences correctly ranks the six elements of tragedy from most to least important?", "options": [{"text": "Character, Plot, Thought, Diction, Spectacle, Song.", "isCorrect": false, "rationale": "Aristotle explicitly states that Plot is the 'first principle' and 'soul of a tragedy,' making it the most important, with Character holding 'the second place'."}, {"text": "Plot, Character, Thought, Diction, Song, Spectacle.", "isCorrect": true, "rationale": "The text clearly ranks the elements: 'The Plot, then, is the first principle... Character holds the second place. Third in order is Thought... Fourth among the elements enumerated comes Diction... Of the remaining elements Song holds the chief place among the embellishments. The Spectacle has... an emotional attraction of its own, but, of all the parts, it is the least artistic.'"}, {"text": "Spectacle, Plot, Diction, Character, Thought, Song.", "isCorrect": false, "rationale": "Spectacle is ranked as the least artistic and least connected to the art of poetry, making it the least important, not the second."}, {"text": "Plot, Diction, Character, Song, Thought, Spectacle.", "isCorrect": false, "rationale": "While Plot is correctly identified as first, the subsequent order of Diction, Character, Song, and Thought is incorrect. Character is second, Thought is third, and Diction is fourth."}], "id": "q02"}, {"question": "Aristotle claims that 'The Plot... is the first principle, and, as it were, the soul of a tragedy.' Which of the following best explains the profound significance of this claim?", "options": [{"text": "It highlights that a tragedy's emotional power primarily comes from the actors' performances and the visual elements on stage.", "isCorrect": false, "rationale": "Aristotle states that Spectacle is the 'least artistic' and that 'the power of Tragedy... is felt even apart from representation and actors,' directly contradicting this option."}, {"text": "It signifies that plot is the animating force and the ultimate purpose of the tragedy, as tragedy imitates action and life consists in action.", "isCorrect": true, "rationale": "The text explains, 'Tragedy is an imitation, not of men, but of an action and of life, and life consists in action, and its end is a mode of action, not a quality... Hence the incidents and the plot are the end of a tragedy; and the end is the chief thing of all.' The plot arranges these actions, making it the core essence or 'soul.'"}, {"text": "It suggests that without intricate language and profound philosophical statements, a play cannot achieve true tragic effect.", "isCorrect": false, "rationale": "While Diction (language) and Thought (philosophical statements) are elements, Aristotle argues that a play with a well-constructed plot can still produce the essential tragic effect, 'however deficient in these respects' (diction and thought)."}, {"text": "It implies that the audience's moral judgment of the characters' actions is the central focus of the play's overall meaning.", "isCorrect": false, "rationale": "Character 'reveals moral purpose,' but 'Dramatic action, therefore, is not with a view to the representation of character: character comes in as subsidiary to the actions.' The focus is on the action's outcome and the emotions of pity and fear, not primarily moral judgment."}], "id": "q03"}, {"question": "A playwright is meticulously crafting a tragic play where the protagonist's profound inner thoughts and complex moral dilemmas are the central focus, even if the sequence of events feels somewhat disconnected. Based on Aristotle's principles, what is the most likely critique of this approach?", "options": [{"text": "The playwright is on the right track, as a tragedy’s power ultimately stems from exploring the deepest aspects of human character.", "isCorrect": false, "rationale": "Aristotle explicitly states that character is 'subsidiary to the actions' and that 'without action there cannot be a tragedy; there may be without character.' Prioritizing character over a unified plot goes against his principles."}, {"text": "The play might fail to produce the essential tragic effect because character, while important, is subsidiary to a well-constructed and unified plot.", "isCorrect": true, "rationale": "Aristotle argues that 'tragedy is an imitation, not of men, but of an action' and that 'character comes in as subsidiary to the actions.' He also notes that 'if you string together a set of speeches expressive of character... you will not produce the essential tragic effect nearly so well as with a play which... yet has a plot and artistically constructed incidents.' Disconnected events further violate the principle of a unified plot."}, {"text": "The emphasis on inner thoughts is suitable, but the playwright should also ensure the use of embellished language to elevate the drama.", "isCorrect": false, "rationale": "While embellished language (Diction) is an element, it cannot compensate for a weak or disconnected plot. A strong plot is paramount for the 'essential tragic effect' according to Aristotle."}, {"text": "Disconnected events are acceptable as long as they showcase the hero's journey comprehensively, aligning with the principle of imitating a complete action.", "isCorrect": false, "rationale": "Aristotle argues against 'episodic plotting (scenes strung together without causal necessity)' and 'biographical storytelling (a chronicle of everything a person did).' A complete action must be a 'unified whole' with 'causally connected' parts, not merely a comprehensive sequence of disconnected events."}], "id": "q04"}, {"question": "In Aristotle's Poetics, what does 'Plot' (mythos) primarily refer to?", "options": [{"text": "The moral qualities and choices of the characters within the play.", "isCorrect": false, "rationale": "This describes 'Character,' which Aristotle defines as 'that in virtue of which we ascribe certain qualities to the agents.'"}, {"text": "The arrangement of the incidents or actions that constitute the story.", "isCorrect": true, "rationale": "The text states, 'By Plot I here mean the arrangement of the incidents.' This is central to his definition of plot as the imitation of action."}, {"text": "The metrical arrangement of words and the artistic language used by the characters.", "isCorrect": false, "rationale": "This describes 'Diction,' which Aristotle defines as 'the expression of the meaning in words; and its essence is the same both in verse and prose.'"}, {"text": "The intellectual arguments and general truths enunciated by the characters.", "isCorrect": false, "rationale": "This describes 'Thought,' which Aristotle defines as 'wherever a statement is proved, or, it may be, a general truth enunciated.'"}], "id": "q05"}, {"question": "Aristotle defines 'language embellished with each kind of artistic ornament' as a key part of tragedy. What specific elements does he include under this description?", "options": [{"text": "Deep philosophical statements and clear moral lessons.", "isCorrect": false, "rationale": "These aspects relate to 'Thought' and 'Character,' not directly to the 'embellished language' itself, which concerns the artistic presentation of the words."}, {"text": "Rhythm, harmony, and song, with different parts of the play using verse alone or with song.", "isCorrect": true, "rationale": "The text explicitly states: 'By 'language embellished,' I mean language into which rhythm, 'harmony,' and song enter. By 'the several kinds in separate parts,' I mean, that some parts are rendered through the medium of verse alone, others again with the aid of song.'"}, {"text": "Grand costumes and elaborate stage settings, enhancing the visual appeal.", "isCorrect": false, "rationale": "These elements fall under 'Spectacle,' which is distinct from 'language embellished' and is considered the least artistic part of tragedy."}, {"text": "The eloquent speeches of politicians and rhetoricians, designed to persuade and inform.", "isCorrect": false, "rationale": "While 'Thought' involves 'the faculty of saying what is possible and pertinent in given circumstances,' and older poets might use civic language, this is not the definition of 'embellished language,' which focuses on rhythmic and musical aspects."}], "id": "q06"}, {"question": "Aristotle praises Homer's Odyssey for its plot construction, contrasting it with works like the Heracleid. What lesson about plot unity does he draw from this comparison?", "options": [{"text": "A plot should feature a single, exceptional hero whose life story is detailed from birth to death.", "isCorrect": false, "rationale": "Aristotle explicitly refutes this, stating, 'Unity of plot does not... consist in the Unity of the hero. For infinitely various are the incidents in one man's life which cannot be reduced to unity.' He criticizes poets who believe 'as Heracles was one man, the story of Heracles must also be a unity.'"}, {"text": "True plot unity comes from imitating one action that is a unified whole, not simply chronicling all the events of one person's life.", "isCorrect": true, "rationale": "Aristotle praises Homer because 'he made the Odyssey... to centre round an action that in our sense of the word is one.' He contrasts this with poets who make 'the story of Heracles' a unity merely because he was one man, emphasizing that unity is of the action, not the agent."}, {"text": "Tragic plots must strictly adhere to the unity of time, ensuring all events occur within a single day.", "isCorrect": false, "rationale": "While the concept of unity of time emerged later, Aristotle discusses plot length in terms of 'magnitude' that can be 'easily embraced by the memory' and allows for a change of fortune 'according to the law of probability or necessity,' not a strict 24-hour rule."}, {"text": "The most powerful tragedies weave together multiple, unrelated subplots to create a complex and comprehensive view of life.", "isCorrect": false, "rationale": "Aristotle argues against 'episodic plotting (scenes strung together without causal necessity)' and demands a plot be 'a single, unified action with a beginning, a middle, and an end causally connected to one another,' not multiple unrelated subplots."}], "id": "q07"}, {"question": "According to Aristotle, what is the appropriate 'magnitude' for a well-constructed plot?", "options": [{"text": "It should be as long as possible to maximize the beauty and complexity of the story, limited only by competition rules.", "isCorrect": false, "rationale": "While 'the greater the length, the more beautiful will the piece be by reason of its size, provided that the whole be perspicuous,' Aristotle also cautions against 'vast size' where 'the unity and sense of the whole is lost for the spectator.' Length must be easily embraced by memory."}, {"text": "It must be short enough to be easily grasped by the audience's memory, yet long enough for a probable or necessary change from good to bad (or vice versa) fortune.", "isCorrect": true, "rationale": "The text states, 'a certain length is necessary, and a length which can be easily embraced by the memory.' It also defines proper magnitude as 'comprised within such limits, that the sequence of events, according to the law of probability or necessity, will admit of a change from bad fortune to good, or from good fortune to bad.'"}, {"text": "Its length is determined solely by the number of characters and the complexity of their interrelationships.", "isCorrect": false, "rationale": "While these factors might indirectly influence length, Aristotle's primary artistic criteria for magnitude are related to the plot's unity, comprehensibility by memory, and the space needed for a significant change in fortune, not merely character count."}, {"text": "It should be of minimal length, focusing on a single intense moment to avoid confusing the audience with too many details.", "isCorrect": false, "rationale": "Aristotle rejects 'very small animal organism[s]' as not beautiful because 'the view of it is confused, the object being seen in an almost imperceptible moment of time,' implying a plot must have sufficient length for clarity and impact."}], "id": "q08"}, {"question": "Aristotle states that 'Two of the parts constitute the medium of imitation.' Which two elements are these?", "options": [{"text": "Plot and Character.", "isCorrect": false, "rationale": "Plot and Character are considered the 'objects of imitation' because tragedy imitates 'action' (Plot) and 'persons' who possess 'character' and 'thought.'"}, {"text": "Spectacle and Thought.", "isCorrect": false, "rationale": "Spectacle is described as the 'manner' of imitation (how it is presented), while Thought is an 'object' of imitation."}, {"text": "Song and Diction.", "isCorrect": true, "rationale": "The text explicitly states: 'Next, Song and Diction, for these are the medium of imitation.' These are the means through which the imitation is conveyed."}, {"text": "Reversal and Recognition.", "isCorrect": false, "rationale": "Reversal (Peripeteia) and Recognition are specific components or 'parts of the plot,' not the fundamental mediums of imitation themselves."}], "id": "q09"}, {"question": "Of the six elements of tragedy, Aristotle considers Spectacle to be the 'least artistic' and 'connected least with the art of poetry.' Why does he hold this view?", "options": [{"text": "Spectacle is too expensive to produce, making it impractical for most poets.", "isCorrect": false, "rationale": "The text does not mention economic reasons for Spectacle's low artistic ranking; its critique is purely aesthetic and philosophical regarding its connection to the art itself."}, {"text": "Its emotional attraction is superficial, relying on external presentation rather than the inherent power of the dramatic action and language.", "isCorrect": true, "rationale": "Aristotle states, 'The Spectacle has, indeed, an emotional attraction of its own, but, of all the parts, it is the least artistic, and connected least with the art of poetry. For the power of Tragedy, we may be sure, is felt even apart from representation and actors.' This indicates that its appeal is external and not intrinsic to the poetic craft."}, {"text": "It distracts the audience from the intellectual arguments and moral lessons presented by the characters.", "isCorrect": false, "rationale": "While excessive spectacle might distract, Aristotle's primary reason is its detachment from the 'art of poetry' and the fact that tragedy's power can be experienced without it, not merely a distraction from other elements."}, {"text": "Ancient Greek audiences preferred to imagine the visual elements rather than have them explicitly shown on stage.", "isCorrect": false, "rationale": "The text does not discuss audience preferences. Aristotle's reasoning is based on the intrinsic nature of the art form and the source of its power, not how audiences prefer to experience it."}], "id": "q10"}, {"question": "Aristotle states that the best tragedies produce pity and fear even when read, without theatrical performance. What does this claim imply about the relationship between plot and spectacle?", "options": [{"text": "It implies that theatre is unnecessary and Aristotle prefers reading tragedies to watching them performed.", "isCorrect": false, "rationale": "Aristotle does not dismiss theatrical performance. His point is about the source of tragedy's power — its essential effect resides in the plot, not in staging. This does not constitute a preference for reading over performance."}, {"text": "It implies that the emotional power of tragedy resides in the plot itself, not in theatrical production — the soul of tragedy is the arrangement of events, not the visual effects.", "isCorrect": true, "rationale": "By arguing that tragedy's power can be felt in reading, Aristotle demonstrates that plot ($mythos$) is the real bearer of pity and fear. Spectacle is an additional dimension, but the essential effect comes from the internal logic of the action, which is why plot is 'the soul of tragedy.'"}, {"text": "It implies that written texts are inherently superior art forms to all performance arts.", "isCorrect": false, "rationale": "Aristotle does not make a general claim about written versus performed art. His claim is specific to tragedy: its essential effect comes from plot, which means performance is not the primary locus of its power."}, {"text": "It implies that Aristotle wrote the Poetics for readers rather than playwrights or theatre practitioners.", "isCorrect": false, "rationale": "The intended audience of the Poetics is a separate question from the claim about where tragedy's power resides. The argument about reading vs. performance is philosophical, not autobiographical."}], "id": "q11"}, {"question": "Aristotle requires that plots be 'unified' — that every element follow from necessity or probability. A subplot that is interesting but not causally connected to the main action would be an example of what type of plot?", "options": [{"text": "A simple plot, because it has no reversals.", "isCorrect": false, "rationale": "A simple plot lacks peripeteia and anagnorisis but still has causal unity. The issue with an irrelevant subplot is not that it is 'simple' but that it is 'episodic' — it breaks the causal chain."}, {"text": "An episodic plot, which Aristotle considers the worst kind because episodes follow each other without necessity or probability.", "isCorrect": true, "rationale": "Aristotle defines episodic plots as those in which the episodes succeed each other without probable or necessary sequence. An interesting-but-causally-disconnected subplot exemplifies exactly this flaw — the episode exists but its connection to the main action is merely accidental."}, {"text": "A complex plot, because it involves multiple narrative threads.", "isCorrect": false, "rationale": "Complex plots have peripeteia and/or anagnorisis — their complexity is about reversal and recognition within a causally unified action. Multiple narrative threads without causal connection is an episodic defect, not the complexity Aristotle values."}, {"text": "An appropriate plot, because variety of incidents enriches the dramatic experience.", "isCorrect": false, "rationale": "Aristotle explicitly criticizes episodic plots. Variety for its own sake, without causal connection, violates the unity he requires and results in what he calls the worst kind of tragic plot."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
