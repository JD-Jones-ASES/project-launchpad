    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Aristotle_II.html">&larr; Back to The Life of Words (Aristotle II)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does Aristotle identify as the single highest good that all human actions are ultimately directed toward?", "options": [{"text": "Wealth and material prosperity", "isCorrect": false, "rationale": "While wealth might be pursued as a good, Aristotle considers it a means to an end, not the ultimate highest good for human life."}, {"text": "Eudaimonia, often translated as happiness or flourishing", "isCorrect": true, "rationale": "The text explicitly states that eudaimonia is the 'single highest good that all the rest are aimed at' and 'the end toward which all human activity is ultimately directed.'"}, {"text": "Pleasure and the absence of pain", "isCorrect": false, "rationale": "For Aristotle, eudaimonia is not merely a feeling of pleasure, but rather 'a kind of life — the active, excellent exercise of one's distinctly human capacities.'"}, {"text": "Power and control over others", "isCorrect": false, "rationale": "The text does not identify power as the ultimate good; Aristotle's focus is on internal excellence and the well-being of the individual and community."}], "id": "q01"}, {"question": "According to Aristotle's framework, how is the 'good' of any kind of thing determined?", "options": [{"text": "By its popularity or social acceptance within a community.", "isCorrect": false, "rationale": "Aristotle's concept of 'good' is tied to inherent function, not social popularity or subjective preference."}, {"text": "By its monetary value or its scarcity in the marketplace.", "isCorrect": false, "rationale": "The text uses examples like a knife or musician, focusing on their performance of function, not their economic worth."}, {"text": "By performing its distinct function excellently.", "isCorrect": true, "rationale": "The text clearly states, 'Every kind of thing has a function, and the good of that thing lies in performing its function excellently.'"}, {"text": "By its ability to adapt and change over time.", "isCorrect": false, "rationale": "While adaptability might be useful, it is not Aristotle's primary criterion for defining the 'good' of a thing, which is rooted in its specific function."}], "id": "q02"}, {"question": "How does Aristotle characterize virtue (aretē)?", "options": [{"text": "An innate feeling or moral intuition one is born with.", "isCorrect": false, "rationale": "The text explicitly states, 'Virtue, Aristotle insists, is not a feeling we are born with...'"}, {"text": "A set of mechanical rules to be followed without much thought.", "isCorrect": false, "rationale": "The text clarifies that virtue is 'not a rule we follow mechanically. It is a habit—a settled disposition acquired through practice.'"}, {"text": "A settled disposition or habit acquired through consistent practice and education.", "isCorrect": true, "rationale": "Aristotle defines virtue as 'a habit—a settled disposition acquired through practice' and emphasizes that 'character is formed by what we repeatedly choose to do,' highlighting the role of education."}, {"text": "A temporary state of moral goodness experienced during significant challenges.", "isCorrect": false, "rationale": "Virtue is described as a 'settled disposition,' implying a stable, consistent character, not a temporary state."}], "id": "q03"}, {"question": "A person consistently avoids all forms of public speaking due to extreme apprehension, while another person frequently makes careless and inappropriate remarks in public, enjoying the attention regardless of the consequences. Which virtue, according to Aristotle's doctrine of the mean, are these two individuals failing to embody?", "options": [{"text": "Temperance, as it concerns moderation in desires.", "isCorrect": false, "rationale": "Temperance relates to self-control over pleasures and appetites, not specifically the realm of public speaking or social fear/recklessness."}, {"text": "Justice, as it relates to fair dealings with others.", "isCorrect": false, "rationale": "Justice primarily concerns an individual's relations and fairness within a community, not their personal demeanor in public speaking situations."}, {"text": "Generosity, as it balances giving too much and too little.", "isCorrect": false, "rationale": "Generosity, as mentioned in the text, is the mean between prodigality and miserliness, which is unrelated to public speaking behavior."}, {"text": "Courage, as the mean between cowardice and recklessness.", "isCorrect": true, "rationale": "The scenario describes extremes that align with cowardice (excessive fear/deficiency of courage) and recklessness (disregard for consequences/excess of courage), making courage the missing virtue as the mean."}], "id": "q04"}, {"question": "Why does Aristotle consider justice the 'most complete of the virtues'?", "options": [{"text": "Because it is the easiest virtue for an individual to acquire and master.", "isCorrect": false, "rationale": "The text does not suggest justice is easier; rather, its communal nature might imply greater complexity than purely individual virtues."}, {"text": "Because it primarily concerns an individual's internal moral improvement, independent of others.", "isCorrect": false, "rationale": "The text explicitly states that justice 'concerns our relations with others rather than just ourselves.'"}, {"text": "Because it inherently requires a community and concerns an individual's relations with others.", "isCorrect": true, "rationale": "The text explains, 'justice as the most complete of the virtues, because it concerns our relations with others rather than just ourselves. A person can be personally temperate or courageous while living as a hermit; justice requires a community.'"}, {"text": "Because it directly leads to the highest form of happiness, intellectual contemplation.", "isCorrect": false, "rationale": "While important, justice is linked to communal life, not directly identified as the path to intellectual contemplation, which is described as the highest form of individual happiness."}], "id": "q05"}, {"question": "When Aristotle declares that 'man is by nature a politikon zōon,' what is the core meaning he conveys?", "options": [{"text": "Humans are inherently aggressive and competitive.", "isCorrect": false, "rationale": "While competition exists, this is not the primary interpretation of 'politikon zōon'; the emphasis is on social and political organization."}, {"text": "Humans merely live in groups, similar to other social animals like bees or wolves.", "isCorrect": false, "rationale": "The text directly refutes this, clarifying that 'Aristotle means not merely that humans live in groups... but that the polis... is the natural and necessary setting for a fully human life.'"}, {"text": "The organized political community (polis) is the natural and necessary setting for a fully human life.", "isCorrect": true, "rationale": "The text explicitly states this, clarifying that humans are 'made for the polis' and that it's 'the natural and necessary setting for a fully human life.'"}, {"text": "Humans are naturally inclined to seek positions of political power and leadership.", "isCorrect": false, "rationale": "The term refers to the fundamental nature of humans as community-dwelling beings, not an innate desire for leadership."}], "id": "q06"}, {"question": "According to Aristotle, what is the ultimate purpose for which the polis (city-state) exists?", "options": [{"text": "To ensure the mere survival and security of its inhabitants.", "isCorrect": false, "rationale": "The text states the polis exists for 'the good life, not merely survival.' Survival is a prerequisite, but not the ultimate goal."}, {"text": "To facilitate trade, economic growth, and wealth accumulation for its citizens.", "isCorrect": false, "rationale": "While these might be aspects of a polis, the text identifies the 'good life' as its ultimate purpose, which encompasses more than just economic prosperity."}, {"text": "To enable and support the pursuit of the good life for its citizens.", "isCorrect": true, "rationale": "The text clearly states, 'the polis exists for the sake of the good life, not merely survival.'"}, {"text": "To establish military dominance and expand its territory over neighboring states.", "isCorrect": false, "rationale": "Aristotle's focus for the polis's purpose is internal flourishing and the good life for its citizens, not external aggression or conquest."}], "id": "q07"}, {"question": "Aristotle identifies three 'correct' forms of government. What distinguishes a 'correct' form from a 'deviant' or corrupted form?", "options": [{"text": "A correct form is always ruled by a single, benevolent monarch.", "isCorrect": false, "rationale": "Monarchy is one correct form, but aristocracy (rule by the best) and polity (rule by the many) are also correct, demonstrating it's not solely about single-person rule."}, {"text": "A correct form serves the specific interests of the ruling class or individuals.", "isCorrect": false, "rationale": "This describes the *deviant* forms (tyranny, oligarchy, democracy in its corrupted sense), which serve the rulers' own interests, not the common good."}, {"text": "A correct form ensures widespread economic equality among all citizens.", "isCorrect": false, "rationale": "While Aristotle might advocate for a broad middle class (in polity), the defining characteristic of 'correct' forms is not necessarily economic equality but rather the purpose of rule."}, {"text": "A correct form governs for the common good of the entire community.", "isCorrect": true, "rationale": "The text states that the 'deviant forms serve the rulers' own interests rather than the good of the whole community,' implying that correct forms serve the common good."}], "id": "q08"}, {"question": "A modern state is considering reforms to its public education system. Based on Aristotle's views in *The Politics*, which principle would he most strongly endorse?", "options": [{"text": "A system that prioritizes vocational training to meet immediate economic demands.", "isCorrect": false, "rationale": "While practical skills are valuable, Aristotle's primary emphasis in public education is on character formation and habituating citizens in virtue, not solely economic productivity."}, {"text": "A decentralized system where individual families have sole responsibility for their children's moral instruction.", "isCorrect": false, "rationale": "The text states 'the state has a responsibility to shape the characters of its people through law and public instruction,' indicating a centralized, communal role for education."}, {"text": "A system designed to habituate citizens in the virtues that support the state's constitution and communal life.", "isCorrect": true, "rationale": "The text explicitly links education to the state's role: 'Citizens must be formed for the constitution they live under; the state has a responsibility to shape the characters of its people through law and public instruction.'"}, {"text": "A system focused on developing a small elite of philosophers, with minimal education for the general populace.", "isCorrect": false, "rationale": "While contemplation is valued, *The Politics* emphasizes the state's responsibility to shape the character of *all* its people for the good of the community, not just a select few."}], "id": "q09"}, {"question": "The text emphasizes that the themes of Aristotle's *Ethics* and *Politics* are 'inseparable.' Which statement best explains this fundamental connection?", "options": [{"text": "The *Politics* details how individuals can achieve eudaimonia independently, while the *Ethics* describes communal duties.", "isCorrect": false, "rationale": "This reverses the relationship; the *Politics* argues the polis is *necessary* for the good life, linking individual flourishing to community."}, {"text": "The *Ethics* primarily focuses on theoretical knowledge, whereas the *Politics* deals exclusively with practical administration.", "isCorrect": false, "rationale": "Both works contain elements of theory and practice, and their inseparability stems from the shared focus on virtues and the good life, not a division of knowledge types."}, {"text": "The virtues that enable individuals to live good lives are the same virtues that are necessary for communities to be just and flourish.", "isCorrect": true, "rationale": "The text clearly states, 'In this way the themes of the Ethics and the Politics are inseparable: the virtues that make individuals good are the same virtues that make communities just.'"}, {"text": "The *Ethics* defines the ideal form of government, while the *Politics* focuses on individual moral choices.", "isCorrect": false, "rationale": "This incorrectly assigns their primary focus; the *Ethics* is about individual good, and the *Politics* about the community and its structures."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
