<script>
var QUESTIONS = [{"question": "According to Aristotle, which of the following best describes 'mimesis' in the context of artistic creation?", "options": [{"text": "A photographic reproduction of reality, aiming for perfect likeness.", "isCorrect": false, "rationale": "Aristotle explicitly states that mimesis is not a photographic likeness or passive copying. It is an active and creative process."}, {"text": "A selective and purposeful re-creation of human action, bringing focus to truths about human experience.", "isCorrect": true, "rationale": "The text defines mimesis as 'creative artistic representation — the selective, purposeful, and skillful re-creation of human action in a medium appropriate to the art.' This emphasizes the active, interpretative role of the artist."}, {"text": "The literal transcription of historical events as they occurred, ensuring factual accuracy.", "isCorrect": false, "rationale": "Aristotle contrasts the poet with the historian, noting that the historian records 'what did happen,' while the poet represents 'what might happen.' Mimesis is not about literal transcription of events."}, {"text": "An unconscious imitation of natural sounds and movements, leading to spontaneous artistic expressions.", "isCorrect": false, "rationale": "While Aristotle links art to instincts, mimesis itself is described as a 'skillful' and 'purposeful' re-creation, indicating a conscious and deliberate artistic process, not an unconscious one."}], "id": "q01"}, {"question": "A playwright creates a drama about a historical king, focusing on his internal struggles and moral dilemmas, rather than chronicling every battle or political event. How would Aristotle categorize this playwright's approach to mimesis?", "options": [{"text": "As an example of 'passive copying,' as the playwright is depicting a real person.", "isCorrect": false, "rationale": "Aristotle's mimesis is never passive copying. The playwright's selection of focus on internal struggles and moral dilemmas, rather than a full chronicle, demonstrates a creative and selective approach."}, {"text": "As a failure of mimesis, because it deviates from actual historical facts.", "isCorrect": false, "rationale": "Aristotle distinguishes the poet (representing what might happen) from the historian (recording what did happen). Deviation from literal facts for artistic truth is central to mimesis, not a failure."}, {"text": "As an example of 'creative artistic representation,' where the playwright invents and shapes to reveal human truths.", "isCorrect": true, "rationale": "The text explains that a playwright 'invents characters, shapes a plot, chooses what to include and what to leave out' to bring into focus 'something true and important about human experience.' This aligns perfectly with the described scenario."}, {"text": "As an instance of 'mixed manner' mimesis, combining narrative and direct presentation.", "isCorrect": false, "rationale": "The 'mixed manner' refers to how the art is presented (the Manner dimension), not the artist's general approach to representation or the choice of subject matter. This question is about the nature of the representation itself."}], "id": "q02"}, {"question": "Which of the following art forms, if it exists today, would Aristotle most likely consider to use 'language, rhythm, and harmony in combination' as its medium, and present action 'directly through characters who speak and move'?", "options": [{"text": "A novel primarily told through a narrator's voice, featuring extensive inner monologues.", "isCorrect": false, "rationale": "A novel primarily uses language as its medium and would likely be closer to a 'narrative' or 'mixed manner' in terms of presentation, not direct dramatic action through speaking/moving characters."}, {"text": "An abstract dance performance with accompanying instrumental music.", "isCorrect": false, "rationale": "While dance uses rhythm and bodily movement, and instrumental music uses rhythm and harmony, the combination of 'language' with these, and the direct presentation through speaking characters, is missing."}, {"text": "An opera where characters sing and act out a story on stage with orchestral accompaniment.", "isCorrect": true, "rationale": "Opera uses language (lyrics/dialogue), rhythm, and harmony (music) in combination as its medium, and presents action directly through characters who speak (sing) and move on stage, mirroring tragedy's manner and medium as described for Oedipus Rex."}, {"text": "A documentary film featuring interviews and archival footage.", "isCorrect": false, "rationale": "A documentary uses language and often rhythm, but its primary mode is recording 'what did happen' (historical, not poetic mimesis), and it typically uses narration and real-world footage, not direct dramatic presentation through created characters in the Aristotelian sense."}], "id": "q03"}, {"question": "According to Aristotle, why do human beings derive pleasure from watching a tragic play that depicts suffering and violence, which would typically cause pain in real life?", "options": [{"text": "The pleasure comes from the escape into a fantasy world where real-world consequences are suspended.", "isCorrect": false, "rationale": "The text explicitly states this is a 'profound and counterintuitive point' that the pleasure of art 'is not escapism — not simply fleeing from reality into a pleasant fantasy.'"}, {"text": "Humans have an innate desire to witness the misfortunes of others, even if simulated.", "isCorrect": false, "rationale": "While the text mentions an instinct for imitation, it does not attribute the pleasure of tragedy to a desire to witness misfortune, but to the act of understanding."}, {"text": "The pleasure arises from the act of recognition and learning, understanding truths about human vulnerability and the world.", "isCorrect": true, "rationale": "Aristotle states, 'The pleasure we take is not in the object itself, but in the recognition that the imitation accurately represents it.' He further clarifies, 'To learn...gives the liveliest pleasure,' allowing us to recognize 'truths about human vulnerability, about the relationship between choices and consequences... Art teaches us about life precisely by imitating it.'"}, {"text": "The artistic presentation makes the suffering appear beautiful, masking its true painful nature.", "isCorrect": false, "rationale": "While art can be beautiful, Aristotle's primary explanation for pleasure in tragic imitation is not aesthetic beauty masking pain, but the intellectual pleasure of learning and recognition."}], "id": "q04"}, {"question": "Aristotle contrasts the poet with the historian. What is the fundamental difference in their approach to representing reality?", "options": [{"text": "The historian records emotions, while the poet records facts.", "isCorrect": false, "rationale": "This reverses Aristotle's point. While poets evoke emotion, the core distinction is not about emotions vs. facts, but about what 'happened' vs. 'might happen'."}, {"text": "The historian uses prose, while the poet always uses verse.", "isCorrect": false, "rationale": "The text mentions poetry using language 'in prose or verse,' so the use of verse is not a fundamental, absolute distinction between poet and historian for Aristotle, though epic poetry uses verse."}, {"text": "The historian records what did happen, while the poet represents what might happen.", "isCorrect": true, "rationale": "The 'caution' box explicitly states, 'Aristotle contrasts the poet with the historian: the historian records what did happen, while the poet represents what might happen. This creative dimension is essential to what art is.'"}, {"text": "The historian aims to entertain, while the poet aims to educate.", "isCorrect": false, "rationale": "Aristotle sees both entertainment (pleasure) and education (learning) as outcomes of poetry, but this is not the fundamental distinction in their *approach to representing reality*."}], "id": "q05"}, {"question": "According to Aristotle, Homer's lost poem, the 'Margites,' was significant because it:", "options": [{"text": "Established the highest expression of epic poetry, depicting noble actions.", "isCorrect": false, "rationale": "Homer's Iliad and Odyssey are cited for bringing epic poetry to its highest expression, not the Margites."}, {"text": "Marked the transition from personal lampoon to generalized comic fiction.", "isCorrect": true, "rationale": "The text states, 'in the lost Margites, he showed how the lampooning tradition could be elevated from personal attack to generalizable comedy.'"}, {"text": "Was the first work to combine language, rhythm, and harmony in a single artistic medium.", "isCorrect": false, "rationale": "The Margites' significance lies in its contribution to comedy's development, not its combination of artistic mediums."}, {"text": "Depicted characters 'better than average,' laying the groundwork for tragedy.", "isCorrect": false, "rationale": "The Margites depicted a 'foolish hero,' making it an example of the comic tradition which imitates characters 'worse than average,' not better."}], "id": "q06"}, {"question": "Which of the following is the *most fundamental* distinction Aristotle makes between comedy and tragedy?", "options": [{"text": "Comedy aims to make the audience laugh, while tragedy aims to make them cry.", "isCorrect": false, "rationale": "While these are 'tendencies,' the text explicitly states: 'Comedy and tragedy do not differ because one is funny and the other is not, or because one ends happily and the other ends badly (though these are tendencies).'"}, {"text": "Tragedy always ends unhappily, while comedy always has a happy ending.", "isCorrect": false, "rationale": "Similar to the previous option, this describes a tendency, but not the fundamental distinction according to Aristotle."}, {"text": "They differ in the moral stature of the human beings they represent.", "isCorrect": true, "rationale": "The text states: 'They differ in their objects of imitation — in the moral stature of the human beings they represent.' Tragedy imitates 'better than average' (spoudaioi), while comedy imitates 'worse than average' (phauloi)."}, {"text": "Comedy uses a mixed manner of presentation, while tragedy uses pure drama.", "isCorrect": false, "rationale": "Manner of presentation is one of the three dimensions of mimesis, but the text specifies that *both* tragedy and comedy use the 'pure drama' manner, where characters speak for themselves."}], "id": "q07"}, {"question": "According to Aristotle, a comic character is primarily defined by being:", "options": [{"text": "A villain whose evil deeds cause significant pain or destruction.", "isCorrect": false, "rationale": "The text explicitly states: 'Aristotle is careful to specify that comedy does not portray evil. The comic character is not a villain.'"}, {"text": "A 'spoudaios,' or a person of elevated moral character, whose flaws are minor.", "isCorrect": false, "rationale": "'Spoudaios' refers to tragic characters, who are 'better than average,' not comic ones."}, {"text": "A 'phaulos,' or a ludicrous fool, whose defects are not painful or destructive.", "isCorrect": true, "rationale": "The text describes comic characters as 'phauloi, the base or ludicrous,' and specifies that 'The defect that comedy imitates is 'the ludicrous' — a subdivision of the ugly that is not painful or destructive.'"}, {"text": "An ordinary person whose experiences reflect average human life.", "isCorrect": false, "rationale": "While 'average' is closer than 'heroic' or 'villainous,' Aristotle characterizes comic characters as 'worse than average' and 'ludicrous,' not merely average."}], "id": "q08"}, {"question": "Which statement best summarizes Aristotle's view on the moral education provided by tragedy and comedy?", "options": [{"text": "Tragedy teaches us to avoid misfortune, while comedy teaches us to embrace silliness.", "isCorrect": false, "rationale": "This simplifies and misrepresents the deeper moral significance. Tragedy teaches about human vulnerability and consequences, not just avoiding misfortune, and comedy teaches through harmless folly, not merely embracing silliness."}, {"text": "Both forms aim to eliminate human emotions, promoting a stoic detachment.", "isCorrect": false, "rationale": "Tragedy aims to evoke pity and fear, and comedy laughter, which are distinct emotions to be engaged with, not eliminated."}, {"text": "Tragedy invites pity and fear, appropriate to serious suffering, while comedy invites laughter, appropriate to harmless folly, both serving as forms of moral education.", "isCorrect": true, "rationale": "The text directly states: 'Tragedy invites us to feel pity and fear — emotions appropriate to serious suffering. Comedy invites us to laugh — a response appropriate to harmless folly. Both are forms of moral education, but they work through different emotional registers.'"}, {"text": "Only tragedy offers moral education by depicting the consequences of greatness, while comedy is purely for entertainment.", "isCorrect": false, "rationale": "The text states that 'Both are forms of moral education,' contradicting the idea that comedy is purely for entertainment."}], "id": "q09"}, {"question": "Considering Aristotle's definition of mimesis, which statement most accurately reflects his likely perspective on an abstract painting with no recognizable subject matter?", "options": [{"text": "It would be considered a direct form of mimesis because all art inherently imitates emotion.", "isCorrect": false, "rationale": "Aristotle's mimesis primarily focuses on the 're-creation of human action.' While he acknowledges art's connection to emotion, he doesn't suggest that all abstract art directly imitates emotion in the same way it imitates human action, and the absence of a recognizable subject challenges his framework."}, {"text": "It would not fit cleanly within his framework because mimesis involves the representation of human action or identifiable objects.", "isCorrect": true, "rationale": "The 'thinkdeeper' section directly poses this challenge, asking 'An abstract painting with no recognizable subject — what does it 'imitate,' if anything?' Aristotle's framework is built around 'representation, re-creation, artistic portrayal' of 'people in action,' making abstract art a difficult fit due to the lack of an identifiable object of imitation."}, {"text": "It would be considered the highest form of mimesis, transcending the need for specific objects.", "isCorrect": false, "rationale": "Aristotle's 'highest expression' refers to works like Homer's epics or Sophocles' tragedies, which clearly represent identifiable 'objects' (noble characters in action), not abstract forms."}, {"text": "It would be categorized as mimesis of 'rhythm and harmony' as its medium, regardless of subject.", "isCorrect": false, "rationale": "Rhythm and harmony are mediums, not typically the 'object' of painting. While painting has its own 'rhythm' in a broad sense, Aristotle's 'rhythm and harmony' as mediums are specific to music and dance, and an abstract painting would still struggle with the 'object' dimension of mimesis."}], "id": "q10"}, {"question": "Aristotle identifies two deep human instincts as the origins of poetry. What are they, and what does their combination explain?", "options": [{"text": "The instinct for pleasure and the instinct for fame — explaining why poets seek audiences and recognition.", "isCorrect": false, "rationale": "Aristotle's account of poetry's origins is cognitive and aesthetic, not social or vanity-driven. He identifies natural instincts embedded in human nature, not desires for pleasure or fame."}, {"text": "The instinct for imitation (natural from childhood) and the instinct for rhythm and harmony — explaining why humans across all cultures make and enjoy poetry.", "isCorrect": true, "rationale": "The text explains that Aristotle traces poetry to two universal human instincts: the instinct for mimesis (imitation of action), which is natural from childhood and through which we learn, and the instinct for rhythm and harmony. Together they explain the universal human practice of making art."}, {"text": "The instinct for storytelling and the instinct for moral instruction — explaining why poetry always teaches while entertaining.", "isCorrect": false, "rationale": "Moral instruction is not one of Aristotle's two origins of poetry. His account focuses on mimesis and rhythm as natural human capacities, not on teaching as an origin."}, {"text": "The instinct for beauty and the instinct for truth — explaining why the greatest poetry is both beautiful and philosophically deep.", "isCorrect": false, "rationale": "Beauty and truth are qualities of good art, but Aristotle's account of poetry's origins concerns natural human instincts (mimesis and rhythm), not abstract properties."}], "id": "q11"}, {"question": "Aristotle argues that we enjoy seeing representations of things — even painful or ugly things — that we would find unpleasant in reality. What does this explain about the nature of aesthetic pleasure?", "options": [{"text": "Art desensitizes us to pain and ugliness, gradually making unpleasant things bearable.", "isCorrect": false, "rationale": "Aristotle's explanation is not about desensitization but about the cognitive pleasure of the mimetic act itself. The pleasure is in learning and recognition, not in becoming inured to unpleasantness."}, {"text": "Aesthetic pleasure is distinct from the pleasure or pain of the thing depicted — we enjoy the act of recognition and learning involved in the imitation.", "isCorrect": true, "rationale": "The text explains Aristotle's key insight: what we enjoy when looking at a representation is not the thing represented (which might be painful) but the act of recognition — 'this is that' — and the learning it involves. Aesthetic pleasure is cognitive, not merely sensory."}, {"text": "We enjoy painful depictions because they remind us we are safe by comparison, producing a sense of relief.", "isCorrect": false, "rationale": "This is a later theory (Hobbes's account of humor). Aristotle's explanation focuses on the cognitive pleasure of recognition and learning, not on comparative safety."}, {"text": "Art transforms painful subjects into beautiful forms, so the beauty of the work overcomes any discomfort.", "isCorrect": false, "rationale": "Aristotle does not claim art beautifies its subjects. His explanation is about the pleasure of recognition in the mimetic act, independent of whether the subject has been made beautiful."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
