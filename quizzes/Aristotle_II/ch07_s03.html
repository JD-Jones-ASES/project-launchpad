<script>
var QUESTIONS = [{"question": "What fundamental shift in focus does Aristotle introduce in Book III of the Rhetoric compared to Books I and II?", "options": [{"text": "From analyzing audience psychology to defining the types of persuasive appeals.", "isCorrect": false, "rationale": "Books I and II already covered the modes of persuasion (ethos, pathos, logos) and the psychology of emotion and character."}, {"text": "From the subject matter of rhetoric ('what to say') to its form ('how to say it').", "isCorrect": true, "rationale": "The text explicitly states: 'The earlier books treated the matter of rhetoric (what to say); Book III treats its form (how to say it). Aristotle himself notes that he would prefer to avoid the topic, since ideally only the argument should matter—but he acknowledges that style is a practical necessity given the real character of audiences.'"}, {"text": "From practical oratorical techniques to philosophical debates about truth.", "isCorrect": false, "rationale": "Aristotle's Rhetoric remains focused on practical persuasion, not a shift to pure philosophy, though it is grounded philosophically."}, {"text": "From ethical considerations of the orator to the logical structure of arguments.", "isCorrect": false, "rationale": "Ethos and logos, including argument structure, were already central to Books I and II."}], "id": "q01"}, {"question": "How does Aristotle primarily view the relationship between 'argument' (substance) and 'style' (form) in persuasion?", "options": [{"text": "Style is a necessary evil that distracts from the argument if not carefully managed.", "isCorrect": false, "rationale": "While he notes style is a practical necessity given audience character, he doesn't label it an 'evil' but insists it serves argument."}, {"text": "Argument is paramount, and style should always serve to enhance its clarity and reception without overshadowing it.", "isCorrect": true, "rationale": "The text states: 'Aristotle's response is to insist on a strict hierarchy: argument first, style in the service of argument. He does not dismiss style, but he refuses to treat it as the point.'"}, {"text": "Style, especially poetical flourishes, is crucial for captivating the audience, even if the underlying argument is weak.", "isCorrect": false, "rationale": "Aristotle is 'sharply critical' of this view, noting such style often 'concealed thin reasoning beneath impressive surfaces.'"}, {"text": "Argument and style are equally important, functioning as two independent pillars of effective rhetoric.", "isCorrect": false, "rationale": "He rejects equality, establishing a 'strict hierarchy' with argument coming first."}], "id": "q02"}, {"question": "According to Aristotle, what is a key pitfall of prioritizing elaborate style over substance in oratorical prose?", "options": [{"text": "It makes the speech sound too informal and thus less credible to a sophisticated audience.", "isCorrect": false, "rationale": "Elaborate style tends to make a speech more formal or poetical, not informal. His critique is not about formality but appropriateness and substance."}, {"text": "It can unintentionally reveal the orator's personal biases to the audience, undermining their trust.", "isCorrect": false, "rationale": "While biases can undermine trust, Aristotle's specific critique here is not about revealing bias but concealing a lack of substance."}, {"text": "It risks obscuring weak arguments with superficial ornamentation, ultimately hindering genuine persuasion.", "isCorrect": true, "rationale": "The text states teachers 'produced speeches full of poetical flourishes and elaborate figures that concealed thin reasoning beneath impressive surfaces. A speech whose language distracts, confuses, or bores its hearers has failed as persuasion, regardless of how sound its logic may be.'"}, {"text": "It prevents the orator from effectively utilizing emotional appeals (pathos) due to its intellectual focus.", "isCorrect": false, "rationale": "Sophisticated style could evoke emotion, but his critique is about the substance (or lack thereof) behind the style rather than the use of pathos."}], "id": "q03"}, {"question": "Which of the following is NOT presented by Aristotle as a fundamental characteristic of good oratorical style?", "options": [{"text": "Clearness, ensuring the message is plainly understood by the audience.", "isCorrect": false, "rationale": "The text states: 'Style to be good must be clear, as is proved by the fact that speech which fails to convey a plain meaning will fail to do just what speech has to do.'"}, {"text": "Appropriateness, balancing ordinary and elevated language according to the subject and audience.", "isCorrect": false, "rationale": "The text states: 'It must also be appropriate, avoiding both meanness and undue elevation; poetical language is certainly free from meanness, but it is not appropriate to prose.'"}, {"text": "Artifice, intentionally showcasing the orator's mastery of complex and embellished language.", "isCorrect": true, "rationale": "Aristotle advocates the opposite: a writer 'must disguise his art and give the impression of speaking naturally and not artificially. Naturalness is persuasive, artificiality is the contrary.'"}, {"text": "Naturalness, giving the impression of speaking spontaneously and without conscious effort.", "isCorrect": false, "rationale": "The text states: 'Naturalness is persuasive, artificiality is the contrary.'"}], "id": "q04"}, {"question": "Why does Aristotle advocate for a speaker to 'disguise his art' and appear to speak naturally?", "options": [{"text": "To prevent the audience from perceiving the speaker as manipulative or having ulterior motives.", "isCorrect": true, "rationale": "The text explains: 'Naturalness is persuasive, artificiality is the contrary; for our hearers are prejudiced and think we have some design against them, as if we were mixing their wines for them.'"}, {"text": "To ensure that the speech is easy to improvise, rather than requiring extensive memorization.", "isCorrect": false, "rationale": "The text does not discuss improvisation as the reason for naturalness; it focuses on audience reception and persuasion."}, {"text": "To adhere to the poetic tradition of spontaneous verse composition, which audiences preferred.", "isCorrect": false, "rationale": "Aristotle distinguishes oratorical prose from poetry and critiques excessive poetical elements in oratory, not advocating for poetic improvisation."}, {"text": "To focus the audience solely on the speaker's personal character (ethos) rather than the logical message.", "isCorrect": false, "rationale": "While ethos is important, the aim of naturalness is to ensure the message is received and understood without prejudice, not to shift focus entirely from the message itself."}], "id": "q05"}, {"question": "Despite acknowledging the practical necessity of style, Aristotle expresses a theoretical preference for what approach to argumentation?", "options": [{"text": "A minimalist approach focused solely on the bare facts and proofs, without any attempts to delight or charm.", "isCorrect": true, "rationale": "The text states: 'The right thing in speaking really is that we should be satisfied not to annoy our hearers, without trying to delight them: we ought in fairness to fight our case with no help beyond the bare facts: nothing, therefore, should matter except the proof of those facts.'"}, {"text": "An approach that uses elaborate rhetorical figures to emphasize the orator's wisdom and eloquence.", "isCorrect": false, "rationale": "He explicitly criticizes using 'fine language' as a substitute for argument and for being 'fanciful and meant to charm the hearer.'"}, {"text": "An approach that prioritizes emotional appeals (pathos) to bypass the audience's logical defenses.", "isCorrect": false, "rationale": "While pathos is a mode of persuasion, his theoretical ideal is based on facts and proofs, stating 'nothing... should matter except the proof of those facts.'"}, {"text": "An approach that blends poetical language with logical arguments for maximum impact on all audience types.", "isCorrect": false, "rationale": "He argues against blending poetical language excessively into prose, stating 'the language of prose is distinct from that of poetry.'"}], "id": "q06"}, {"question": "How did the historical development of oratorical prose, as described by Aristotle, initially relate to poetry?", "options": [{"text": "Oratorical prose originated as a direct critique of poetic over-ornamentation, establishing its own distinct style.", "isCorrect": false, "rationale": "The text suggests an initial influence of poetry on prose, not an immediate critique of its origin."}, {"text": "Early oratorical prose adopted a poetical style, influenced by poets' perceived success with fine language.", "isCorrect": true, "rationale": "The text states: 'Now it was because poets seemed to win fame through their fine language when their thoughts were simple enough, that the language of oratorical prose at first took a poetical colour, e.g. that of Gorgias.'"}, {"text": "Poets and orators always maintained a strict separation in their stylistic choices, recognizing their distinct purposes.", "isCorrect": false, "rationale": "The text explicitly states oratorical prose 'at first took a poetical colour,' indicating an initial lack of strict separation before evolving."}, {"text": "The language of tragedy immediately evolved into a prose-like style, influencing oratory from its inception.", "isCorrect": false, "rationale": "The text indicates the alteration of tragedy's character to be more prose-like was a later development, showing a distinction, not an initial influence on oratory in that direction."}], "id": "q07"}, {"question": "According to Aristotle, what is a unique and significant characteristic of metaphor in oratorical prose?", "options": [{"text": "Its primary function is to replace plain language entirely, creating an elevated and obscure tone.", "isCorrect": false, "rationale": "Metaphors are used 'with advantage' alongside 'regular and proper terms,' not to replace plain language entirely, and clarity is a key goal."}, {"text": "It is an invaluable tool for clarity, charm, and distinction, yet its effective use cannot be systematically taught.", "isCorrect": true, "rationale": "The text states: 'Metaphor, moreover, gives style clearness, charm, and distinction as nothing else can: and it is not a thing whose use can be taught by one man to another.'"}, {"text": "It is best employed by using strange words and compound expressions to surprise the audience with novelty.", "isCorrect": false, "rationale": "Strange and compound words are to be used sparingly, not as the primary means of metaphor, which must also be 'fitting.'"}, {"text": "Its appropriateness is determined solely by its ability to provoke strong emotional reactions from the audience.", "isCorrect": false, "rationale": "Metaphors 'must be fitting,' meaning they 'must fairly correspond to the thing signified,' which goes beyond mere emotional impact, encompassing logical and contextual fit."}], "id": "q08"}, {"question": "Why does Aristotle advise against the frequent use of 'strange words, compound words, and invented words' in oratorical prose?", "options": [{"text": "They are inherently unclear and make the argument difficult to follow for most audiences.", "isCorrect": false, "rationale": "While excessive use might reduce clarity, the primary reason given is their departure from suitability and naturalness in prose."}, {"text": "They are characteristic of poetry and generally depart from the suitability and naturalness required for effective prose.", "isCorrect": true, "rationale": "The text states these words 'depart from what is suitable, in the direction of excess.' It clarifies that 'poetical language... is not appropriate to prose,' and that in prose such words are 'far less often fitting because the subject-matter is less exalted.' This ties into the need for 'naturalness' in prose."}, {"text": "Their use is primarily a natural gift, making them difficult for most speakers to employ effectively without sounding awkward.", "isCorrect": false, "rationale": "The text identifies metaphor as a natural gift, but the restriction on these specific types of words is about appropriateness for the genre, not innate ability."}, {"text": "They signify a lack of vocabulary on the part of the speaker, diminishing their credibility (ethos).", "isCorrect": false, "rationale": "The use of such words often implies the opposite – an attempt at elevated vocabulary – which Aristotle criticizes for artificiality and unsuitability, not for a lack of vocabulary."}], "id": "q09"}, {"question": "How does Aristotle suggest a good prose writer can achieve a style that is 'distinguished without being obtrusive' while remaining clear?", "options": [{"text": "By exclusively using poetic language and elaborate figures of speech to elevate the discourse.", "isCorrect": false, "rationale": "Aristotle explicitly warns against excessive poetical language and elaborate figures, as they can be obtrusive and conceal thin reasoning. He stresses 'the language of prose is distinct from that of poetry.'"}, {"text": "By employing current, ordinary words and judiciously integrating fitting metaphorical terms and proper rhetorical devices.", "isCorrect": true, "rationale": "The text states 'Clearness is secured by using the words... that are current and ordinary.' It also notes that 'metaphorical terms only can be used with advantage' in prose and that 'a good writer can produce a style that is distinguished without being obtrusive, and is at the same time clear.'"}, {"text": "By focusing heavily on emotional appeals to charm the audience, regardless of the logical strength of the argument.", "isCorrect": false, "rationale": "Aristotle critiques relying on charm over substance ('All such arts are fanciful and meant to charm the hearer'), and emphasizes 'argument first' and clarity."}, {"text": "By using ambiguous words to mislead hearers and impress them with perceived cleverness, a technique of sophistry.", "isCorrect": false, "rationale": "The text explicitly states 'Words of ambiguous meaning are chiefly useful to enable the sophist to mislead his hearers,' which Aristotle does not endorse for a good writer."}], "id": "q10"}, {"question": "Aristotle acknowledges that delivery ($hypokrisis$) has great power over the audience but treats it somewhat reluctantly. What reason does he give for this ambivalence?", "options": [{"text": "Delivery is too difficult for most orators to master and therefore a waste of instructional time.", "isCorrect": false, "rationale": "Aristotle does not dismiss delivery because of its difficulty. His ambivalence is philosophical: in an ideal world, only the argument should matter, and the fact that delivery matters so much is a concession to human weakness."}, {"text": "Delivery belongs to the art of acting, not rhetoric, and the two should not be confused.", "isCorrect": false, "rationale": "While Aristotle notes the connection to theatrical performance, he does not exclude delivery from rhetoric's domain. His ambivalence is about its role in an ideal theory of argument-based persuasion."}, {"text": "Delivery has great power over audiences but is a concession to human weakness — in a perfect world, only the argument would matter.", "isCorrect": true, "rationale": "Aristotle states that the effect of delivery on an audience is real and important, but he would prefer rhetoric to succeed purely through the force of argument. Delivery matters because audiences are not ideally rational — it is a practical necessity rather than a theoretical virtue."}, {"text": "Delivery distracts from the other rhetorical virtues of clarity and appropriateness by focusing attention on performance.", "isCorrect": false, "rationale": "Aristotle's concern is not that delivery distracts from other virtues but that an ideal theory of rhetoric should be grounded in argument. His acknowledgment of delivery's power is pragmatic, not an aesthetic objection to its role."}], "id": "q11"}, {"question": "Aristotle argues that a speech should have two essential parts: the statement of the case and the proof. What does this minimal structure reveal about his theoretical priorities?", "options": [{"text": "It shows that Aristotle valued elaborate ceremonial openings as the most important part of a speech.", "isCorrect": false, "rationale": "Aristotle argues for the minimum number of parts necessary, criticizing teachers who multiplied divisions (introduction, narration, refutation, peroration) for reasons of effect rather than logical necessity."}, {"text": "It reflects his view that the core of rhetoric is stating what you are arguing and then proving it — everything else is supplementary to this logical kernel.", "isCorrect": true, "rationale": "By insisting that a speech needs only a statement and proof, Aristotle is reaffirming his central theoretical hierarchy: argument is paramount, and all other structural elements (introduction, narration, refutation) are practically useful but theoretically secondary to the act of making the case."}, {"text": "It demonstrates that Aristotle considered arrangement (dispositio) the most important canon of rhetoric, ranking above even invention.", "isCorrect": false, "rationale": "Aristotle's position is the reverse: the minimal structure (statement plus proof) shows that he subordinates structural considerations to the primacy of the argument itself. He explicitly resists treating the arrangement of parts as the essence of rhetoric."}, {"text": "It shows Aristotle's belief that forensic speeches require more complex structures than deliberative ones.", "isCorrect": false, "rationale": "Aristotle's two-part minimum applies to speeches generally, not specifically to forensic rhetoric. Different genres may in practice use more parts, but the theoretical minimum is universal."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
