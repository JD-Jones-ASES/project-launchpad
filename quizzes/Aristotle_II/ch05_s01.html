        <div class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 5, Section 1</div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Aristotle characterizes rhetoric as the $\\alpha\\nu\\tau\\iota\\sigma\\tau\\rho\\text{o}\\phi\\text{o}\\varsigma$ of dialectic. What does this structural relationship imply about the two arts?", "options": [{"text": "They are identical in their subject matter and the audiences they address.", "isCorrect": false, "rationale": "The text explicitly states the two arts are not identical and operate in different domains."}, {"text": "They share a parallel logical structure but function in different contexts.", "isCorrect": true, "rationale": "The term implies a 'mirror image' where rhetoric operates in the public sphere while dialectic operates through formal question and answer."}, {"text": "Rhetoric is a subordinate subset of dialectic used only when formal logic fails.", "isCorrect": false, "rationale": "Aristotle views them as counterparts or equals in structural importance, not as one being a failed version of the other."}, {"text": "Rhetoric focuses on emotional manipulation while dialectic focuses on pure reason.", "isCorrect": false, "rationale": "Aristotle argues that rhetoric is a genuine art of reasoning, just like dialectic, rather than a mere collection of emotional tricks."}], "id": "q01"}, {"question": "How does Aristotle's definition of rhetoric as the study of the 'available means of persuasion' distinguish it from the approach of the Sophists?", "options": [{"text": "It focuses on the speaker's prior reputation rather than the arguments themselves.", "isCorrect": false, "rationale": "The text notes that for Aristotle, the art should be grounded in what the speaker says, whereas the Sophists often relied on external prestige."}, {"text": "It suggests that the orator must invent arguments that do not necessarily exist in reality.", "isCorrect": false, "rationale": "The text states the rhetorician finds arguments that 'exist,' implying the art is bounded by reality rather than pure invention."}, {"text": "It prioritizes finding the most effective psychological triggers to short-circuit audience judgment.", "isCorrect": false, "rationale": "Aristotle's approach is aimed at bringing the audience to a true or probable conclusion through reasoning, not through bypassing their judgment."}, {"text": "It frames rhetoric as a legitimate intellectual skill rooted in finding genuine arguments within a given subject.", "isCorrect": true, "rationale": "Aristotle argues that rhetoric is an art because finding best available arguments is a systematic intellectual skill similar to other forms of reasoning."}], "id": "q02"}, {"question": "Why is the enthymeme considered the 'body of persuasion' within the realm of rhetorical $\\lambda\\text{o}\\gamma\\text{o}\\varsigma$?", "options": [{"text": "It utilizes syllogisms drawn from certain and immutable premises to ensure absolute truth.", "isCorrect": false, "rationale": "In rhetoric, certainty is rarely available; therefore, the enthymeme relies on probability rather than absolute certainty."}, {"text": "It functions as a rhetorical syllogism built from probable or commonly accepted premises.", "isCorrect": true, "rationale": "The enthymeme is the essential core of rational proof in rhetoric, adapted for situations where audiences must judge based on the best available probabilities."}, {"text": "It relies entirely on the emotional state of the audience to bypass the need for logical evidence.", "isCorrect": false, "rationale": "The enthymeme is specifically categorized under logos (rational proof), distinguishing it from pathos (emotional appeal)."}, {"text": "It is a technique for hiding weak arguments behind complex formal structures.", "isCorrect": false, "rationale": "Aristotle presents the enthymeme as a tool for honest reasoning under real-world conditions, not as a method for deception."}], "id": "q03"}, {"question": "According to the text, which mode of persuasion is established through the speaker’s perceived trustworthiness and expertise during the speech?", "options": [{"text": "$\\pi\\alpha\\theta\\text{o}\\varsigma$", "isCorrect": false, "rationale": "Pathos refers to the emotional state produced in the audience, not the character of the speaker."}, {"text": "$\\epsilon\\theta\\text{o}\\varsigma$", "isCorrect": true, "rationale": "Ethos is the character or moral disposition of the speaker as perceived by the audience through the discourse."}, {"text": "$\\lambda\\text{o}\\gamma\\text{o}\\varsigma$", "isCorrect": false, "rationale": "Logos refers to the rational argument and proof provided by the speech itself, distinct from the speaker's character."}, {"text": "$\\alpha\\nu\\tau\\iota\\sigma\\tau\\rho\\text{o}\\phi\\text{o}\\varsigma$", "isCorrect": false, "rationale": "This term refers to the structural relationship between rhetoric and dialectic, not a mode of persuasion."}], "id": "q04"}, {"question": "In $\\delta\\iota\\kappa\\alpha\\nu\\iota\\kappa\\text{o}\\nu$ (forensic) rhetoric, what is the primary objective of the speaker?", "options": [{"text": "To advise the assembly on the expediency of a future policy.", "isCorrect": false, "rationale": "Advising on future policy is the role of deliberative (political) rhetoric."}, {"text": "To praise or blame a person regarding their present worth.", "isCorrect": false, "rationale": "Ceremonial praise or blame is the hallmark of epideictic rhetoric."}, {"text": "To argue for or against a person's guilt regarding past actions based on justice.", "isCorrect": true, "rationale": "Forensic rhetoric addresses a jury or judge concerning the past, with justice or injustice as its relevant end."}, {"text": "To demonstrate the speaker's skill to spectators through a display of style.", "isCorrect": false, "rationale": "While forensic speeches require skill, their primary objective is a legal judgment, whereas display is more central to epideictic rhetoric."}], "id": "q05"}, {"question": "What distinguishes the end pursued by deliberative rhetoric from that of epideictic rhetoric?", "options": [{"text": "Deliberative rhetoric pursues justice, while epideictic pursues expediency.", "isCorrect": false, "rationale": "Justice is the end of forensic rhetoric, while deliberative rhetoric is the one concerned with expediency."}, {"text": "Deliberative rhetoric pursues expediency or harm, while epideictic pursues the noble or base.", "isCorrect": true, "rationale": "Deliberative oratory aims to determine if a future course is beneficial, whereas epideictic focuses on the ethical worth or nobility of its subject."}, {"text": "Deliberative rhetoric is concerned with the past, while epideictic is concerned with the future.", "isCorrect": false, "rationale": "The time frames are reversed; deliberative looks to the future, and epideictic, while focused on the present, often looks at past deeds."}, {"text": "Deliberative rhetoric relies solely on $\\pi\\alpha\\theta\\text{o}\\varsigma$, while epideictic relies on $\\lambda\\text{o}\\gamma\\text{o}\\varsigma$.", "isCorrect": false, "rationale": "All three kinds of rhetoric utilize all three modes of persuasion (ethos, pathos, and logos)."}], "id": "q06"}, {"question": "How does Aristotle define the 'noble' in his discussion of $\\epsilon\\pi\\iota\\delta\\epsilon\\iota\\kappa\\tau\\iota\\kappa\\text{o}\\nu$ rhetoric?", "options": [{"text": "That which is popular and achieves immediate social reputation.", "isCorrect": false, "rationale": "Aristotle distinguishes the noble from mere popularity, grounding it in actual virtue rather than reputation."}, {"text": "That which is both desirable for its own sake and also worthy of praise.", "isCorrect": true, "rationale": "This specific definition links the noble to intrinsic value and genuine ethical merit."}, {"text": "That which is most expedient for the survival of the state.", "isCorrect": false, "rationale": "Expediency is the concern of the deliberative orator, not the primary definition of the noble in epideictic rhetoric."}, {"text": "Whatever the speaker can successfully persuade the audience to admire.", "isCorrect": false, "rationale": "This reflects the Sophist view; Aristotle insists that the noble must be grounded in genuine excellence of character."}], "id": "q07"}, {"question": "Aristotle uses the example of a doctor's expertise persuading a patient to illustrate which mode of persuasion?", "options": [{"text": "$\\lambda\\text{o}\\gamma\\text{o}\\varsigma$", "isCorrect": false, "rationale": "While a doctor may use logos, the specific reliance on her expertise as a reason to trust her treatment is an example of ethos."}, {"text": "$\\pi\\alpha\\theta\\text{o}\\varsigma$", "isCorrect": false, "rationale": "Pathos involves the audience's emotions, whereas a doctor's expertise relates to the speaker's perceived qualities."}, {"text": "$\\epsilon\\theta\\text{o}\\varsigma$", "isCorrect": true, "rationale": "Ethos encompasses the speaker's credibility, knowledge, and trustworthiness, which are inherent in a doctor's professional authority."}, {"text": "$\\delta\\iota\\kappa\\alpha\\nu\\iota\\kappa\\text{o}\\nu$", "isCorrect": false, "rationale": "This is a kind of rhetoric (forensic) rather than a mode of persuasion."}], "id": "q08"}, {"question": "Why does Aristotle maintain that rhetoric is a legitimate art despite the fact that it can be used to cause harm?", "options": [{"text": "Because it is impossible to use logical reasoning to do harm.", "isCorrect": false, "rationale": "The text acknowledges that rhetoric, like a knife, has a capacity for misuse."}, {"text": "Because the ability to find the best available arguments is a genuine intellectual skill regardless of its application.", "isCorrect": true, "rationale": "Aristotle argues that the nature of an art is defined by the skill itself, not by its potential for misuse, similar to how a tool like a knife is still a tool."}, {"text": "Because the orator is always ethically required to only argue for the truth.", "isCorrect": false, "rationale": "While Aristotle links honest reasoning and rhetoric, the status of rhetoric as an 'art' ($ \\tau\\epsilon\\chi\\nu\\eta $) is based on the systematic skill involved, not just the ethical outcome."}, {"text": "Because rhetoric is primarily a display of aesthetic beauty rather than a tool for action.", "isCorrect": false, "rationale": "The text defines rhetoric as a tool for persuasion in practical human life, particularly in courts and assemblies."}], "id": "q09"}, {"question": "In the context of $\\pi\\alpha\\theta\\text{o}\\varsigma$, what is the specific role of the orator regarding the audience's emotional state?", "options": [{"text": "The orator must ignore emotions to ensure the audience remains neutral and rational.", "isCorrect": false, "rationale": "Aristotle argues that emotions should be used when they are relevant to the case, as they impact how judgment is formed."}, {"text": "The orator should produce a state of feeling that is relevant to the judgment the audience must make.", "isCorrect": true, "rationale": "Pathos is about understanding how emotions like anger or compassion change the way audiences judge facts and urgency."}, {"text": "The orator must use emotions to trick the audience into ignoring the lack of $\\lambda\\text{o}\\gamma\\text{o}\\varsigma$.", "isCorrect": false, "rationale": "Aristotle advocates for the modes to work together; using emotion to bypass reason is a Sophistic technique he critiques."}, {"text": "The orator's only concern is to make the audience feel pleasure during the speech.", "isCorrect": false, "rationale": "While some speeches might be pleasant, the function of pathos is to facilitate judgment on specific matters like danger or suffering."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
