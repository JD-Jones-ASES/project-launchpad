<script>
var QUESTIONS = [{"question": "According to Aristotle's Poetics, the foundational principle underlying all forms of art he discusses, such as epic, tragedy, and even flute-playing, is best described as:", "options": [{"text": "The creation of beauty through harmonious forms.", "isCorrect": false, "rationale": "While harmony can be a medium, the text explicitly states the core principle for all arts mentioned is 'mimesis, imitation or artistic representation of human action'."}, {"text": "The imitation or artistic representation of human action.", "isCorrect": true, "rationale": "The text states, 'all the arts we call poetry...are forms of mimesis, imitation or artistic representation of human action. From this single principle, Aristotle built an astonishingly coherent theory of literature.'"}, {"text": "The expression of universal truths about the divine.", "isCorrect": false, "rationale": "Aristotle's focus in the Poetics is on human action and universals derived from it, not primarily divine truths. The core principle is mimesis of human action."}, {"text": "The arousal of intense emotional experiences in the audience.", "isCorrect": false, "rationale": "Catharsis (purification of pity and fear) is an *effect* achieved by tragedy, but it is not the foundational principle of all arts mentioned, nor is it the definition of mimesis itself."}]}, {"question": "Aristotle's insistence on ranking plot (mythos) above character (ethos) in tragedy, and his claim that tragedy imitates action, not persons, implies which of the following about narrative?", "options": [{"text": "The moral uprightness of the characters is less important than their social status.", "isCorrect": false, "rationale": "While 'character' encompasses moral qualities, the distinction is between *who* the hero is and *what happens* to the hero. The option focuses on a specific aspect of character rather than the broader primacy of action."}, {"text": "The sequence of events and their causal connections are more critical to a story's impact than the personalities of the individuals involved.", "isCorrect": true, "rationale": "The text explains this enduring insight: 'It is not who the hero is that determines the tragic effect; it is what happens to him, and why it had to happen that way.' This emphasizes the priority of action and narrative causation."}, {"text": "Audiences are primarily interested in universal human traits rather than individual quirks.", "isCorrect": false, "rationale": "While poetry deals with universals, this option misrepresents the plot vs. character argument, which is about the structural and causal elements of the narrative itself, not primarily audience interest in trait types."}, {"text": "A hero's internal thoughts and motivations are secondary to the dramatic spectacle presented.", "isCorrect": false, "rationale": "Thought (dianoia) is ranked higher than spectacle (opsis) in the elements of tragedy. The claim is about action (plot) over person (character), not spectacle over thought."}]}, {"question": "In the Rhetoric, Aristotle identifies three legitimate modes of persuasion that effective persuasion utilizes. Which option correctly lists and defines these modes?", "options": [{"text": "Mythos (the story told), Ethos (speaker's credibility), Pathos (audience's emotions).", "isCorrect": false, "rationale": "Mythos is the term for plot in the Poetics, not one of the three modes of persuasion in the Rhetoric."}, {"text": "Logos (the argument), Pathos (the audience's emotions), Ethos (the speaker's credibility).", "isCorrect": true, "rationale": "The text explicitly states: 'Every act of effective persuasion works through some combination of ethos (the credibility and character of the speaker), pathos (the emotions aroused in the audience), and logos (the argument itself).'"}, {"text": "Dianoia (thought), Lexis (diction), Melos (song).", "isCorrect": false, "rationale": "These are three of the six elements of tragedy as described in the Poetics, not the modes of persuasion from the Rhetoric."}, {"text": "Sapheneia (clarity), To Prepon (appropriateness), Metaphor (figurative language).", "isCorrect": false, "rationale": "These are virtues of style and rhetorical techniques discussed in Book III of the Rhetoric, but they are not the three fundamental modes of persuasion (ethos, pathos, logos)."}]}, {"question": "A legal defense attorney arguing for their client's innocence in a criminal trial, focusing on past events and establishing who committed a crime, is primarily engaging in which kind of rhetoric according to Aristotle?", "options": [{"text": "Deliberative rhetoric.", "isCorrect": false, "rationale": "Deliberative rhetoric is concerned with advising for or against a future action, typically in political contexts."}, {"text": "Epideictic rhetoric.", "isCorrect": false, "rationale": "Epideictic rhetoric focuses on praising or blaming in the present, such as in eulogies or ceremonial speeches."}, {"text": "Forensic rhetoric.", "isCorrect": true, "rationale": "The text states that forensic rhetoric involves 'accusing or defending regarding a past action,' which perfectly describes a legal defense in a criminal trial."}, {"text": "Socratic rhetoric.", "isCorrect": false, "rationale": "Socratic rhetoric is not one of Aristotle's three categories of rhetoric. The question asks about Aristotle's classification."}]}, {"question": "Aristotle argues that poetry is 'more philosophical than history.' This assertion is rooted in the idea that:", "options": [{"text": "Poetic narratives are more complex and require deeper intellectual engagement than historical accounts.", "isCorrect": false, "rationale": "While poetry can be complex, the reason given in the text for it being 'more philosophical' is about its subject matter, not its complexity or the intellectual engagement required."}, {"text": "Poetry, by dealing with what *might* happen and universal truths, offers insights into general human experience, unlike history's focus on particular events.", "isCorrect": true, "rationale": "The text clarifies: 'poetry deals with universals (what might happen), while history deals with particulars (what did happen). Therefore poetry is closer to philosophy in its concern with general truths.'"}, {"text": "Historical texts often contain biases, whereas poetry presents an objective view of reality.", "isCorrect": false, "rationale": "The text does not discuss bias in historical texts or claim poetry offers an objective view. The distinction is about universals vs. particulars."}, {"text": "Philosophy itself originated from ancient poetic traditions, making poetry its intellectual precursor.", "isCorrect": false, "rationale": "This historical claim is not offered in the text as Aristotle's reason for poetry being 'more philosophical' than history."}]}, {"question": "Aristotle's statement that the capacity for metaphor 'cannot be learned from others' and is 'a sign of genius' fundamentally suggests that metaphor is:", "options": [{"text": "A complex rhetorical device that requires extensive formal training to master effectively.", "isCorrect": false, "rationale": "The text explicitly states it 'cannot be learned from others,' directly contradicting the idea of extensive formal training being its primary origin."}, {"text": "An innate intuitive ability to perceive connections between dissimilar things, highlighting a unique cognitive gift.", "isCorrect": true, "rationale": "The text explains: 'since a good metaphor implies an intuitive perception of the similarity in dissimilars.' This points to an inborn talent rather than a learned skill."}, {"text": "A decorative element of language primarily used to embellish prose and poetry, requiring little substance.", "isCorrect": false, "rationale": "The text elevates metaphor as 'the greatest thing by far' and a 'sign of genius,' indicating it's far more than mere decoration; it creates understanding through unexpected comparisons."}, {"text": "Best when it adheres to strict rules of comparison and avoids ambiguity, ensuring clarity above all.", "isCorrect": false, "rationale": "While clarity is a virtue of style, the genius of metaphor lies in perceiving similarity in *dissimilars*, which might involve novel or unexpected comparisons that challenge conventional rules, though craft helps give it form."}]}, {"question": "Averroes' reinterpretation of Aristotle's Poetics, transforming tragedy into praise poetry and comedy into satirical verse in a culture without a theatrical tradition, best illustrates which principle regarding intellectual traditions?", "options": [{"text": "The inherent superiority of some cultural traditions in preserving original philosophical intent.", "isCorrect": false, "rationale": "Averroes' actions highlight adaptation due to cultural context, not the superiority of one culture in preservation. He reinvented categories, rather than perfectly preserving the original theatrical intent."}, {"text": "The radical extent to which cultural context and existing traditions shape the interpretation and transmission of ideas.", "isCorrect": true, "rationale": "The text explicitly states Averroes' case 'revealing how radically context shapes interpretation' because he had to reinvent categories due to a lack of theatrical tradition."}, {"text": "The inevitable degradation of complex philosophical concepts when translated across languages.", "isCorrect": false, "rationale": "The text notes he 'preserved the work's essential insight,' indicating that the core message was maintained, not inevitably degraded, despite the reinterpretation."}, {"text": "That Aristotle's theories were universally applicable without need for adaptation.", "isCorrect": false, "rationale": "Averroes' need to 'reinvent the categories' directly contradicts the idea of universal applicability without adaptation."}]}, {"question": "Castelvetro is presented as a 'cautionary tale' because his contribution to literary criticism involved:", "options": [{"text": "Ignored Aristotle's Poetics entirely, developing his own independent theories.", "isCorrect": false, "rationale": "Castelvetro 'took Aristotle's descriptive observations,' meaning he engaged directly with Aristotle's work, rather than ignoring it."}, {"text": "Misunderstanding Aristotle's Greek, leading to mistranslations that distorted meaning.", "isCorrect": false, "rationale": "The text does not mention mistranslation as the reason for his cautionary status; it focuses on his interpretive approach."}, {"text": "Transforming Aristotle's descriptive observations of effective literature into rigid, prescriptive rules for all writers.", "isCorrect": true, "rationale": "The text clearly states, 'Castelvetro... took Aristotle's descriptive observations and turned them into prescriptive rules. The three unities he codified dominated European drama for two centuries, stifling some writers...'"}, {"text": "Advocating for a return to ancient Greek theatrical practices, stifling contemporary innovation.", "isCorrect": false, "rationale": "While his rules did stifle writers, the core issue was the transformation of observation into prescription, not an advocacy for a return to specific ancient practices in itself."}]}, {"question": "How do Aristotle's Poetics and Rhetoric, alongside the Ethics and Politics, collectively contribute to his 'single unified inquiry' as described in the text?", "options": [{"text": "They all primarily focus on the structure and delivery of effective public speaking.", "isCorrect": false, "rationale": "Only the Rhetoric primarily focuses on public speaking. The other works address different aspects of human life and community."}, {"text": "They each provide separate, distinct analyses of human society without significant overlap in purpose.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating, 'These are not four separate inquiries. They are four dimensions of one investigation.'"}, {"text": "They explore different dimensions of the fundamental questions: what it means to be human and how individuals can live well together within a community.", "isCorrect": true, "rationale": "The 'keyconcept' box states they 'are four dimensions of one investigation: what is it to be human, and how do we live together well?' Each work addresses a specific facet of this overarching theme."}, {"text": "Their common goal is to establish a set of universal aesthetic principles for judging all forms of art.", "isCorrect": false, "rationale": "While the Poetics deals with art, the Ethics, Politics, and Rhetoric have different primary goals related to the good life, community, and persuasion, respectively. Aesthetics is not their unifying common goal."}]}, {"question": "The enduring insight that persuasion rests on 'character, emotion, and argument' (ethos, pathos, logos) and 'not on tricks' implies what crucial aspect about the nature of effective persuasive communication?", "options": [{"text": "The most powerful persuasion relies solely on rigorous logical argumentation, dismissing emotional appeals as manipulative.", "isCorrect": false, "rationale": "Aristotle insists that all three (ethos, pathos, logos) are 'legitimate means of persuasion' and states that 'the speaker who ignores emotion will not move anyone.'"}, {"text": "True persuasive power ultimately stems from the speaker's genuine moral character and the audience's trust, making authenticity vital.", "isCorrect": true, "rationale": "The text states, 'The deepest source of persuasive power is the speaker's own moral character—the quality that makes an audience trust.' This emphasizes authenticity and the speaker's ethos."}, {"text": "Successful persuasion prioritizes manipulating audience emotions to achieve the speaker's desired outcome, regardless of truth.", "isCorrect": false, "rationale": "The text explicitly states 'not on tricks. Not on manipulation' and that rhetoric involves 'the honest use of character, emotion, and argument... in the service of truth and justice.'"}, {"text": "The effectiveness of persuasion is primarily determined by the cleverness of rhetorical devices employed, which can be taught and mastered.", "isCorrect": false, "rationale": "While style and arrangement are discussed, the 'deepest source of persuasive power' is tied to character and honest use of the modes, not just clever devices or tricks."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
