<script>
var QUESTIONS = [{"question": "How does Longinus's approach to language, particularly composition, fundamentally differ from Aristotle's in its ultimate aim?", "options": [{"text": "Aristotle focused on ethical appeals, while Longinus prioritized logical arguments.", "isCorrect": false, "rationale": "Both Aristotle and Longinus discussed aspects beyond just ethical appeals or logical arguments in relation to style and arrangement. The core difference lies in their primary aims regarding the effect on the audience."}, {"text": "Aristotle sought to make arguments effective and prevent distraction, while Longinus aimed to transport readers beyond ordinary experience, producing the sublime.", "isCorrect": true, "rationale": "The text explicitly states: 'Where Aristotle asks how style can make argument more effective, Longinus asks a grander question: how can the arrangement of words transport a reader beyond the ordinary, producing that overwhelming experience of the sublime that he calls hypsos?'"}, {"text": "Longinus emphasized the mechanical arrangement of words, whereas Aristotle explored the power of metaphor.", "isCorrect": false, "rationale": "Longinus explicitly states that composition is 'not merely a mechanical matter of arranging syllables.' While Aristotle did explore metaphor, this option misrepresents Longinus's nuanced view of composition."}, {"text": "Aristotle was concerned with the writer's genius, while Longinus focused on the audience's critical judgment.", "isCorrect": false, "rationale": "Longinus *was* concerned with the effects on the hearer, and also with the qualities of great writers (genius), but the primary distinction is about the *kind* of effect sought, not who is concerned with genius versus judgment."}], "id": "q01"}, {"question": "Which of the following best captures the meaning and significance of *ekstasis* as used by Longinus in the context of the sublime?", "options": [{"text": "A state of intense intellectual focus leading to precise understanding of complex arguments.", "isCorrect": false, "rationale": "Ekstasis is described as a transport *beyond* ordinary consciousness, not just heightened intellectual focus, and it is more about being overwhelmed than precise understanding."}, {"text": "The audience's appreciation of a speaker's logical consistency and rhetorical skill.", "isCorrect": false, "rationale": "While a positive outcome, this describes a more conventional rhetorical effect, not the profound, almost mystical transport of ekstasis."}, {"text": "A profound, almost physiological experience where a reader is carried out of ordinary consciousness by a powerful passage.", "isCorrect": true, "rationale": "The text defines ekstasis as 'Literally 'standing outside oneself.' Longinus uses the term for the experience of the sublime: being so overwhelmed by a great passage of writing that one is carried out of ordinary consciousness.'"}, {"text": "The speaker's ability to maintain emotional control while delivering a passionate speech.", "isCorrect": false, "rationale": "Ekstasis refers to the experience of the *hearer* or reader, not the speaker, and it implies being overwhelmed rather than maintaining control."}], "id": "q02"}, {"question": "Longinus compares the effect of well-composed prose or poetry to music. What is the primary implication of this analogy?", "options": [{"text": "Both music and literature are primarily designed to entertain and amuse the audience.", "isCorrect": false, "rationale": "While entertainment can be a byproduct, Longinus's comparison emphasizes a deeper, more profound impact than mere amusement, akin to music's power to 'exalt the soul' and create 'orgiastic frenzy.'"}, {"text": "Just as music can produce overwhelming emotional and physiological effects, so can the arrangement of words, transcending mere literal meaning.", "isCorrect": true, "rationale": "The text states: 'Just as a flute or a lyre can produce emotional effects... so a well-composed passage... can achieve effects that transcend its literal content. The words carry meaning, but the arrangement of the words carries something more: a rhythmic force that acts on the soul before the mind has fully processed what is being said.'"}, {"text": "The best literary works should always incorporate musical elements like song or verse.", "isCorrect": false, "rationale": "The analogy is about the *effect* and *power* of arrangement, not a literal instruction to incorporate musical forms into prose."}, {"text": "Only passages with explicit rhythmic patterns, like poetry, can achieve true sublimity.", "isCorrect": false, "rationale": "Longinus uses examples from both poetry (Euripides) and prose (Demosthenes) to illustrate the power of arrangement, indicating it's not limited to explicit poetic rhythms."}], "id": "q03"}, {"question": "Longinus's analysis of Demosthenes' phrase, 'This decree caused the danger which then hung round our city to pass away like a cloud,' primarily serves to illustrate what point about sublimity?", "options": [{"text": "The inherent power of vivid metaphors in political rhetoric.", "isCorrect": false, "rationale": "While the phrase contains a metaphor, Longinus's detailed analysis focuses not on the metaphor itself but on what happens when the words 'like a cloud' are moved, abbreviated, or lengthened, demonstrating the impact of arrangement."}, {"text": "That the placement, abbreviation, or lengthening of even a few syllables can profoundly alter a passage's 'grandeur of movement' and sublimity.", "isCorrect": true, "rationale": "Longinus explicitly demonstrates this by showing how transposing, cutting a syllable, or lengthening 'ὥσπερ νέφος' ('like a cloud') affects the passage's grandeur, highlighting 'how close is the unison between harmony and sublimity.'"}, {"text": "The importance of historical context in understanding ancient oratory.", "isCorrect": false, "rationale": "The analysis is purely formal, focusing on the linguistic construction rather than the historical background of the decree."}, {"text": "That the literal meaning of words is less important than their emotional impact.", "isCorrect": false, "rationale": "Longinus argues that arrangement *enhances* meaning and impact; it doesn't diminish the importance of literal meaning, but shows how arrangement adds a transcendent layer."}], "id": "q04"}, {"question": "According to Longinus, how does the presence of 'blunders' in the works of supreme masters like Homer or Plato affect their overall greatness?", "options": [{"text": "Their blunders detract significantly from their works, preventing them from achieving true sublimity.", "isCorrect": false, "rationale": "Longinus argues the opposite, stating that their great strokes redeem any errors."}, {"text": "The blunders are negligible in proportion to their passages of absolute perfection, which redeem any faults and command reverence.", "isCorrect": true, "rationale": "The text states: 'if you were to pick out all the blunders of Homer, Demosthenes, Plato... they would be found to bear a very small, or rather an infinitesimal proportion to the passages in which these supreme masters have attained absolute perfection.'"}, {"text": "Great writers intentionally include minor flaws to make their work more relatable to the common reader.", "isCorrect": false, "rationale": "There is no textual support for writers intentionally including flaws for relatability; Longinus focuses on the overwhelming power of their sublime moments despite imperfections."}, {"text": "Only writers who are entirely faultless can achieve lasting fame and positive approbation.", "isCorrect": false, "rationale": "Longinus explicitly contrasts those who 'make no slips' (who must be satisfied with 'negative approbation') with those who are 'sublime' (who 'commands positive reverence'), implying that flawlessness isn't the sole or highest arbiter of greatness."}], "id": "q05"}, {"question": "What is the 'grander question' that Longinus asks, distinguishing his inquiry from Aristotle's focus on how style makes argument effective?", "options": [{"text": "How can authors accurately reflect reality through their writing?", "isCorrect": false, "rationale": "While a valid question for literary analysis, it is not the specific 'grander question' Longinus poses in contrast to Aristotle."}, {"text": "How can the arrangement of words transport a reader beyond the ordinary, producing an overwhelming experience of the sublime?", "isCorrect": true, "rationale": "The text states: 'Where Aristotle asks how style can make argument more effective, Longinus asks a grander question: how can the arrangement of words transport a reader beyond the ordinary, producing that overwhelming experience of the sublime that he calls hypsos?'"}, {"text": "What are the ethical responsibilities of a writer when using persuasive language?", "isCorrect": false, "rationale": "This is a question about ethics, not the specific inquiry Longinus makes regarding the effect of style and arrangement on the reader's experience of the sublime."}, {"text": "How do different genres of literature compare in their ability to convey meaning?", "isCorrect": false, "rationale": "This is too broad and does not capture the specific distinction Longinus draws with Aristotle's work."}], "id": "q06"}, {"question": "The opening paragraph states that Aristotle's ideas on style, arrangement, metaphor, and period construction 'did not stay confined to a single ancient treatise.' What does the text imply was their broader historical impact?", "options": [{"text": "They were largely forgotten until the modern era, only to be rediscovered by scholars.", "isCorrect": false, "rationale": "The text explicitly states the opposite, that they 'shaped Western education for nearly two millennia.'"}, {"text": "They became the foundational 'seed of an entire tradition of thought about how language works at its best' and shaped Western education for nearly two millennia.", "isCorrect": true, "rationale": "The text states: 'They became the seed of an entire tradition of thought about how language works at its best. The section that follows traces the transformation of Aristotle's two-part theory of rhetoric into the five canons that shaped Western education for nearly two millennia.'"}, {"text": "They primarily influenced only a small, specialized group of rhetoricians in antiquity.", "isCorrect": false, "rationale": "The phrases 'entire tradition' and 'nearly two millennia' contradict the idea of a small, specialized influence."}, {"text": "Their main influence was in inspiring Longinus to completely reject Aristotle's initial premises.", "isCorrect": false, "rationale": "Longinus 'extended and deepened' Aristotle's analysis, rather than completely rejecting it."}], "id": "q07"}, {"question": "Longinus identifies composition (arrangement of words) as the fifth source of the sublime. What unique characteristic does he attribute to this source, distinguishing it from merely mechanical matters?", "options": [{"text": "It requires the speaker to have prior knowledge of the audience's emotional state.", "isCorrect": false, "rationale": "While audience awareness is important in rhetoric, Longinus's focus for composition is on its inherent power, not the speaker's prior knowledge of the audience's specific emotions."}, {"text": "It is a kind of harmony with a 'natural power' not only to win and delight, but also 'to exalt the soul' and sway the heart of man, producing an overwhelming, almost physiological effect.", "isCorrect": true, "rationale": "The text directly states: 'The fifth, he argues, is not merely a mechanical matter of arranging syllables; it is a kind of harmony that has “a natural power not only to win and to delight, but also in a remarkable degree to exalt the soul.”' It also mentions it can produce 'something close to a physiological effect.'"}, {"text": "It relies exclusively on the use of obscure and noble diction to impress the reader.", "isCorrect": false, "rationale": "Longinus gives examples like Euripides using 'common words' which are 'made sublime by being cast in a fine mould,' directly contradicting reliance on obscure diction."}, {"text": "Its primary function is to simplify complex ideas, making them easily digestible for any audience.", "isCorrect": false, "rationale": "While good composition can aid clarity, Longinus emphasizes its power to 'exalt the soul' and transport, going beyond mere digestibility."}], "id": "q08"}, {"question": "Longinus notes that Euripides' line, 'I’m full of woes, I have no room for more,' uses common words but achieves sublimity by being 'cast in a fine mould.' If a modern writer took a similarly simple, common phrase and achieved a profound emotional impact, which of Longinus's principles would best explain this success?", "options": [{"text": "The writer's use of highly specialized vocabulary.", "isCorrect": false, "rationale": "This contradicts the premise that the phrase uses 'simple, common words,' and Longinus's point about Euripides."}, {"text": "The inherent power of the thought itself, regardless of its expression.", "isCorrect": false, "rationale": "Longinus explicitly states for Euripides that 'the poetical quality of Euripides depends more on his arrangement than on his thoughts,' indicating expression (arrangement) is key."}, {"text": "The harmonious composition and arrangement of even common words, which can elevate them to dignity and elevation.", "isCorrect": true, "rationale": "This directly aligns with Longinus's explanation of the Euripides example: 'the words are quite common, but they are made sublime by being cast in a fine mould.' He further notes that 'many writers... though the terms they employed were usually common and popular... by the mere harmony of their composition have attained dignity and elevation.'"}, {"text": "The writer's strict adherence to traditional rhetorical rules, ensuring technical perfection.", "isCorrect": false, "rationale": "Longinus acknowledges that great writers can have 'blunders' and that sublimity can transcend mere correctness, focusing on powerful impact over strict adherence to rules."}], "id": "q09"}, {"question": "When Longinus argues that composition is 'not merely a mechanical matter of arranging syllables,' but a 'kind of harmony,' what is he primarily emphasizing?", "options": [{"text": "The necessity of using advanced grammatical structures.", "isCorrect": false, "rationale": "While grammar is part of arrangement, Longinus's emphasis on 'harmony' and 'exalt the soul' goes beyond merely 'advanced' structures to a deeper aesthetic and emotional impact."}, {"text": "The intuitive, artistic skill involved in shaping language to achieve a powerful, soul-exalting effect beyond simple comprehension.", "isCorrect": true, "rationale": "Longinus states it's a 'kind of harmony' with a 'natural power... to exalt the soul' and produce an 'overwhelming' physiological effect, going far beyond just making a passage easier to follow or mechanically correct. This points to an artistic, transcendent quality."}, {"text": "The importance of clear and concise writing for effective communication.", "isCorrect": false, "rationale": "Clear and concise writing is generally good, but Longinus is focused on achieving the sublime, which involves a profound emotional and transportive effect, not just effective communication."}, {"text": "The precise scientific rules that govern the rhythmic flow of words.", "isCorrect": false, "rationale": "While rhythm is discussed, the term 'harmony' and the description of its profound effects suggest something more akin to art and intuition than a strict 'scientific rule' in the modern sense."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
