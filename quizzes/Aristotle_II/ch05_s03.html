<script>
var QUESTIONS = [{"question": "What is the primary question Aristotle seeks to answer in *The Rhetoric*, as contrasted with *The Poetics*?", "options": [{"text": "How literary works achieve excellence through plot and character?", "isCorrect": false, "rationale": "This question is identified in the text as the focus of *The Poetics*, not *The Rhetoric*."}, {"text": "How words compel people to believe and act in practical matters?", "isCorrect": true, "rationale": "The text explicitly states that 'Where the Poetics asks what makes a literary work excellent, the Rhetoric asks a more immediate question: how do words move people to believe and to act?'"}, {"text": "What makes a society just and ethical in its governance?", "isCorrect": false, "rationale": "While rhetoric can be applied to political issues, this specific question is not presented as the primary goal of *The Rhetoric*."}, {"text": "How scientific inquiry can discover universal truths?", "isCorrect": false, "rationale": "The text distinguishes rhetoric from specific sciences, stating it deals with 'practical matters' and 'things as come, more or less, within the general ken of all men,' rather than scientific discovery."}], "id": "q01"}, {"question": "According to Aristotle, what is the most accurate formal definition of rhetoric?", "options": [{"text": "The art of constructing logical syllogisms for philosophical debate.", "isCorrect": false, "rationale": "While related through dialectic and enthymemes, this is too narrow and more aligned with dialectic's general scope rather than rhetoric's specific definition."}, {"text": "The systematic study of formal speech divisions like introductions and narrations.", "isCorrect": false, "rationale": "Aristotle criticizes contemporary rhetoricians for focusing on these 'non-essentials' rather than the core modes of persuasion."}, {"text": "The faculty of observing in any given case the available means of persuasion.", "isCorrect": true, "rationale": "This is Aristotle's direct and formal definition of rhetoric as provided in the 'Rhetoric, I.2' primary source excerpt."}, {"text": "The ability to arouse emotions in an audience to sway their judgment.", "isCorrect": false, "rationale": "Aristotle criticizes this as a common focus of contemporary writers, but asserts it's merely 'accessory' and not the true 'constituents of the art,' especially when done to pervert judgment."}], "id": "q02"}, {"question": "A lawyer presents a written contract, witness testimony, and a passionate appeal to the jury's sense of patriotism. According to Aristotle, which of these elements *do not* belong strictly to the art of rhetoric?", "options": [{"text": "The passionate appeal to patriotism.", "isCorrect": false, "rationale": "A passionate appeal to patriotism falls under pathos, which is one of the three artistic modes of persuasion that a speaker 'constructs by means of the principles of rhetoric'."}, {"text": "The lawyer's overall credibility and character.", "isCorrect": false, "rationale": "The lawyer's credibility and character (ethos) is a mode of persuasion 'furnished by the spoken word' and 'constructed' by the speaker, thus belonging strictly to the art."}, {"text": "The written contract and witness testimony.", "isCorrect": true, "rationale": "The text explicitly categorizes 'witnesses, evidence given under torture, written contracts, and so on' as modes of persuasion that 'do not' belong strictly to the art because they are 'not supplied by the speaker but are there at the outset'."}, {"text": "The logical structure of the lawyer's argument.", "isCorrect": false, "rationale": "The logical structure of an argument (logos, specifically enthymemes) is a core artistic mode of persuasion, 'constructed' by the speaker."}], "id": "q03"}, {"question": "Aristotle states that 'Rhetoric is the counterpart of Dialectic.' What does this relationship primarily imply?", "options": [{"text": "Rhetoric is a less rigorous, more emotional version of dialectic.", "isCorrect": false, "rationale": "Aristotle presents both as systematic arts. While rhetoric deals with emotion (pathos), he critiques its overuse and emphasizes logical persuasion (enthymemes), which are related to dialectical syllogisms."}, {"text": "Both are universal faculties concerned with reasoning about matters accessible to all, not specific sciences.", "isCorrect": true, "rationale": "The text states, 'Both alike are concerned with such things as come, more or less, within the general ken of all men and belong to no definite science.' This establishes their shared universal, non-specialized nature."}, {"text": "Dialectic focuses on persuasion through argument, while rhetoric focuses on truth-seeking through question and answer.", "isCorrect": false, "rationale": "This reverses the typical understanding of their roles; dialectic is associated with truth-seeking through logical argument, and rhetoric with persuasion."}, {"text": "Rhetoric exclusively uses syllogisms, while dialectic uses enthymemes.", "isCorrect": false, "rationale": "An enthymeme is defined as a 'rhetorical syllogism.' Dialectic considers syllogisms 'of all kinds, without distinction,' implying a broader scope, while enthymemes are specific to rhetoric."}], "id": "q04"}, {"question": "Aristotle heavily criticizes the 'framers of the current treatises on rhetoric' for what main failing?", "options": [{"text": "Their complete ignorance of the concept of emotion in persuasion.", "isCorrect": false, "rationale": "The text indicates the opposite: 'The arousing of prejudice, pity, anger, and similar emotions... these writers here deal is how to put the judge into a given frame of mind.' Their error was focusing *too much* on it."}, {"text": "Their exclusive focus on political oratory over forensic oratory.", "isCorrect": false, "rationale": "The text states they 'say nothing about political oratory, but try, one and all, to write treatises on the way to plead in court,' indicating a focus on forensic, not political."}, {"text": "Their preoccupation with non-essentials, like stirring emotions, rather than the substance of persuasion like enthymemes.", "isCorrect": true, "rationale": "Aristotle explicitly states, 'The modes of persuasion are the only true constituents of the art: everything else is merely accessory. These writers, however, say nothing about enthymemes... but deal mainly with non-essentials' such as arousing emotions."}, {"text": "Their lack of systematic approach, treating persuasion as random rather than an art.", "isCorrect": false, "rationale": "Aristotle argues that persuasion *can* be handled systematically, and his criticism is that the current writers focus on the wrong *parts* of the art, not that they lack a system entirely."}], "id": "q05"}, {"question": "Which of the following does Aristotle identify as 'the most effective of the modes of persuasion' and 'the substance of rhetorical persuasion'?", "options": [{"text": "Arousing pity and anger in the audience.", "isCorrect": false, "rationale": "Aristotle critiques this as a 'non-essential' element that 'pervert[s] the judge' and is not the true substance of rhetorical persuasion."}, {"text": "Establishing the speaker's personal character and credibility (ethos).", "isCorrect": false, "rationale": "While ethos is called 'the most effective means of persuasion he possesses' in general for making the speaker credible, the 'substance of rhetorical persuasion' and 'most effective of the modes' in the context of demonstration is the enthymeme."}, {"text": "The enthymeme.", "isCorrect": true, "rationale": "The text states, 'The orator's demonstration is an enthymeme, and this is, in general, the most effective of the modes of persuasion,' and that 'enthymemes... are the substance of rhetorical persuasion'."}, {"text": "The careful arrangement of the parts of a speech, such as the introduction.", "isCorrect": false, "rationale": "Aristotle considers these elements 'non-essentials' when other writers focus on them, stating they belong to the 'accessory' parts, not the core modes of persuasion."}], "id": "q06"}, {"question": "Why does Aristotle consider political oratory 'nobler' and less prone to 'unscrupulous practices' than forensic oratory?", "options": [{"text": "Political oratory primarily deals with past events, making facts easier to verify.", "isCorrect": false, "rationale": "Forensic oratory deals with past events (has or has not happened), while political oratory concerns future actions and policy."}, {"text": "In political debates, the audience is deciding on matters concerning their own vital interests, thus guarding against irrelevance.", "isCorrect": true, "rationale": "The text states, 'In a political debate the man who is forming a judgement is making a decision about his own vital interests. There is no need, therefore, to prove anything except that the facts are what the supporter of a measure maintains they are.' This makes them more discerning."}, {"text": "Forensic oratory inherently requires more emotional appeals due to the nature of legal disputes.", "isCorrect": false, "rationale": "Aristotle notes that forensic allows for more emotional appeals and 'unscrupulous practices,' but this is a characteristic of its misuse, not why political is nobler."}, {"text": "Political orators are typically more educated and virtuous than those in legal settings.", "isCorrect": false, "rationale": "The text does not make a claim about the general virtue or education level of political orators versus forensic orators."}], "id": "q07"}, {"question": "The textbook states that Aristotle's three modes of persuasion (ethos, pathos, logos) are 'not rival strategies' but rather 'three dimensions of every act of persuasion that work simultaneously.' What is the implication of this statement for a speaker?", "options": [{"text": "A speaker must choose only one mode that best suits their audience and subject.", "isCorrect": false, "rationale": "This contradicts the statement that they are 'not rival strategies' and 'work simultaneously'."}, {"text": "Effective persuasion requires a speaker to integrate appeals to character, emotion, and logic in every speech.", "isCorrect": true, "rationale": "Since they are 'three dimensions... that work simultaneously,' a speaker needs to consider and integrate all three aspects for comprehensive and effective persuasion."}, {"text": "Focusing solely on logical arguments (logos) is the most ethical approach to persuasion.", "isCorrect": false, "rationale": "While logos is crucial, the text emphasizes all three dimensions. Ethos (speaker's character) is also highlighted as highly effective, and pathos, while cautioned against misuse, is an inherent dimension."}, {"text": "The speaker's primary goal should be to prioritize emotional appeals to move the audience.", "isCorrect": false, "rationale": "Aristotle explicitly criticizes contemporary rhetoricians for making this their sole focus, arguing it's a 'non-essential' when used to pervert judgment."}], "id": "q08"}, {"question": "According to Aristotle's discussion of well-governed states and laws, which type of judgment *must* be left to the judge, as the lawgiver cannot foresee it?", "options": [{"text": "Whether a particular fact is important or unimportant.", "isCorrect": false, "rationale": "Aristotle argues that 'the judge must surely refuse to take his instructions from the litigants' on such points and that well-drawn laws should define 'all the points they possibly can'."}, {"text": "Whether an alleged fact has or has not happened.", "isCorrect": true, "rationale": "The text states: 'But questions as to whether something has happened or has not happened, will be or will not be, is or is not, must of necessity be left to the judge, since the lawgiver cannot foresee them.'"}, {"text": "Whether a proposed action is just or unjust in principle.", "isCorrect": false, "rationale": "Similar to importance, the justice or injustice of a principle should ideally be defined by the lawgiver, not left to the judge in individual cases."}, {"text": "Whether the litigant's character makes them more credible.", "isCorrect": false, "rationale": "While a speaker's character (ethos) influences credibility, Aristotle's primary concern here is what judgments about the *case* itself should be made by the judge versus the law. The credibility of a litigant is a persuasive element, not a factual judgment the lawgiver cannot foresee."}], "id": "q09"}, {"question": "Based on the text, which combination of skills is *most essential* for a person to be in command of the three modes of persuasion?", "options": [{"text": "An understanding of grammar, literary devices, and historical contexts.", "isCorrect": false, "rationale": "These skills relate more to style (Book III of Rhetoric) or other fields, and are not listed as the core essentials for commanding the three modes."}, {"text": "The ability to reason logically, understand human character and goodness, and comprehend emotions.", "isCorrect": true, "rationale": "The text explicitly states: 'The man who is to be in command of them must, it is clear, be able (1) to reason logically, (2) to understand human character and goodness in their various forms, and (3) to understand the emotions'."}, {"text": "Expertise in drafting legal contracts, cross-examining witnesses, and courtroom procedures.", "isCorrect": false, "rationale": "These are related to 'non-artistic' proofs or specific forensic practices, not the universal skills needed to command all three modes of persuasion inherent to rhetoric as an art."}, {"text": "A charismatic personality, a powerful voice, and an engaging stage presence.", "isCorrect": false, "rationale": "While these can enhance delivery, they are external qualities or performance aspects rather than the fundamental intellectual and psychological understanding required to 'invent' the means of persuasion, as outlined by Aristotle."}], "id": "q10"}, {"question": "Longinus describes the sublime as acting 'with an imperious and irresistible force' that 'sways every reader whether he will or no.' How does this description create a tension with Aristotle's theory of legitimate rhetoric?", "options": [{"text": "It suggests that Longinus considered rational argument unnecessary for effective public speaking.", "isCorrect": false, "rationale": "Longinus does not dismiss rational argument; he is distinguishing a higher register of excellence from ordinary persuasion, not rejecting the role of reason entirely."}, {"text": "It implies that the sublime may overstep Aristotle's boundary by overriding rather than guiding the hearer's rational faculty.", "isCorrect": true, "rationale": "Aristotle insists that legitimate rhetoric works through the hearer's rational nature — emotion, character, and argument are all means of making truth visible. The sublime's compulsive, irresistible quality raises the question of whether it respects rational autonomy or constitutes a form of psychological domination."}, {"text": "It shows that Longinus considered pathos the only important mode of persuasion, rejecting ethos and logos.", "isCorrect": false, "rationale": "The sublime in Longinus can represent an overwhelming form of ethos, pathos, or luminous logos — all three modes at their peak, not the rejection of two of them."}, {"text": "It demonstrates that Longinus disagreed with Aristotle's view that rhetoric is a counterpart of dialectic.", "isCorrect": false, "rationale": "Longinus does not engage with the antistrophos relationship between rhetoric and dialectic; his question is about the highest effects of writing and speech, which represents an extension of, not a direct challenge to, Aristotle's framework."}], "id": "q11"}, {"question": "Quintilian's definition of the ideal orator as $vir\\ bonus\\ dicendi\\ peritus$ — 'a good man skilled in speaking' — is described as 'profoundly Aristotelian.' What specific feature of Aristotle's rhetoric does this definition echo?", "options": [{"text": "Aristotle's argument that the five canons of rhetoric must be mastered in sequence.", "isCorrect": false, "rationale": "The five canons are a Roman systematization attributed to Quintilian himself, not an Aristotelian framework."}, {"text": "Aristotle's claim that ethos — the speaker's genuine moral character as demonstrated in the speech — is the most effective means of persuasion.", "isCorrect": true, "rationale": "Quintilian's insistence that true rhetorical excellence requires genuine virtue echoes Aristotle's claim that ethos produced by the speech itself is the most effective mode of persuasion. Both argue that authentic character cannot be indefinitely faked, making moral goodness inseparable from rhetorical greatness."}, {"text": "Aristotle's view that forensic oratory is nobler than deliberative oratory because it requires greater precision.", "isCorrect": false, "rationale": "Aristotle holds the opposite — deliberative (political) oratory is nobler than forensic. And Quintilian's definition concerns the character of the orator generally, not the relative value of rhetorical genres."}, {"text": "Aristotle's definition of rhetoric as the study of the available means of persuasion.", "isCorrect": false, "rationale": "Aristotle's formal definition is about the scope of the art, not the character of the practitioner. Quintilian's emphasis on goodness reflects Aristotle's theory of ethos, not his formal definition."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
