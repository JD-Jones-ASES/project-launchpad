        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Aristotle_II.html">&larr; Back to The Life of Words (Aristotle II)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 1, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How do Aristotle's Poetics and Rhetoric integrate with his Ethics and Politics within his broader philosophical project?", "options": [{"text": "They serve as supplementary texts that explore unrelated artistic and communicative theories.", "isCorrect": false, "rationale": "The text explicitly states that all four works are 'parts of a single inquiry into human nature and the human community,' making them deeply interconnected rather than unrelated."}, {"text": "They apply his systematic rigor to art and persuasion, showing how they contribute to understanding human nature and community, alongside his inquiries into the good life and community.", "isCorrect": true, "rationale": "The concluding paragraph clarifies that the Poetics asks how art helps us understand life, and the Rhetoric asks how words move a community toward right action, linking directly to the Ethics (good life) and Politics (good community)."}, {"text": "They represent a later, distinct phase of his philosophy, shifting focus entirely from individual and societal well-being.", "isCorrect": false, "rationale": "The text emphasizes a continuous inquiry into human nature and community, not a shift away from individual and societal well-being. These works *add* to that inquiry."}, {"text": "They primarily detail historical events and famous speeches, offering practical examples rather than theoretical frameworks.", "isCorrect": false, "rationale": "Both the Poetics and the Rhetoric are described as 'theories' of literature and persuasion, focusing on systematic understanding rather than merely cataloging historical examples."}]}, {"question": "According to Aristotle, why is poetry considered 'more philosophical and higher' than history?", "options": [{"text": "History records actual events, which are less complex than fictional narratives.", "isCorrect": false, "rationale": "While complexity might play a role, Aristotle's primary reason is about universality and potentiality, not simply complexity of narratives."}, {"text": "Poetry, through mimesis, reveals universal truths about the human condition by showing what might happen, rather than merely what did happen.", "isCorrect": true, "rationale": "The text explicitly states: 'history tells us what happened; poetry tells us what could happen, and in doing so reveals something universal about the human condition.'"}, {"text": "Poets are typically more educated and thoughtful than historians.", "isCorrect": false, "rationale": "Aristotle's argument is about the nature of the art forms themselves, not the personal qualities of their practitioners."}, {"text": "History primarily focuses on individual actions, while poetry focuses on broader societal structures.", "isCorrect": false, "rationale": "Aristotle says poetry 'represents human actions in a way that reveals their deeper pattern and meaning,' which is about universal insights into human action, not a strict focus on societal structures over individuals."}]}, {"question": "Which of the following best describes the emotional effect Aristotle attributes to great tragedy?", "options": [{"text": "It primarily aims to instruct the audience morally, providing clear lessons on good behavior.", "isCorrect": false, "rationale": "While tragedy might have moral implications, Aristotle's focus for its 'distinctive emotional effect' is catharsis, not direct moral instruction."}, {"text": "It achieves katharsis through the arousal of pity and fear, leading to a purification or purgation of these emotions.", "isCorrect": true, "rationale": "The text states that tragedy 'produces a distinctive emotional effect—katharsis... through pity and fear the catharsis of such emotions.'"}, {"text": "It causes the audience to feel detached and intellectually superior to the characters' struggles.", "isCorrect": false, "rationale": "The experience of pity and fear implies deep emotional engagement, not detachment or intellectual superiority."}, {"text": "It entertains by offering an escape from reality, without deeper emotional engagement.", "isCorrect": false, "rationale": "Tragedy, for Aristotle, involves significant emotional engagement and revelation of universal truths, which goes beyond mere escapist entertainment."}]}, {"question": "In Aristotle's theory of tragedy, which element is ranked as most important, followed by the second most important?", "options": [{"text": "Character, then Plot.", "isCorrect": false, "rationale": "Aristotle explicitly ranks plot above character."}, {"text": "Plot, then Character.", "isCorrect": true, "rationale": "The text states that Aristotle 'identifies six elements, ranks them in order of importance (plot above all; character second).'"}, {"text": "Diction, then Thought.", "isCorrect": false, "rationale": "Diction and Thought are elements of tragedy, but not the top two in Aristotle's ranking."}, {"text": "Spectacle, then Music.", "isCorrect": false, "rationale": "Spectacle and Music are elements of tragedy, but they are ranked lower in importance by Aristotle."}]}, {"question": "Aristotle defines rhetoric as 'the faculty of observing in any given case the available means of persuasion.' What does this definition emphasize about rhetoric's nature?", "options": [{"text": "Its primary goal is to manipulate an audience into accepting a predetermined viewpoint.", "isCorrect": false, "rationale": "The text explicitly states that rhetoric 'is not about tricking people or manipulating them,' but about finding the 'best arguments that can honestly be made.'"}, {"text": "It is a practical art focused on identifying and employing effective arguments suitable for any subject and audience, in service of truth.", "isCorrect": true, "rationale": "Aristotle's definition emphasizes observing 'available means' for 'any given case' and clarifies that rhetoric 'properly understood is an art in service of truth and justice,' making it a practical art of finding honest arguments."}, {"text": "It is a philosophical pursuit concerned with abstract truths, detached from practical application.", "isCorrect": false, "rationale": "The definition focuses on 'available means of persuasion' in 'any given case,' indicating a practical, applied nature, not an abstract one."}, {"text": "Its scope is limited to formal debate settings, excluding everyday communication.", "isCorrect": false, "rationale": "The phrase 'in any given case' implies a broad applicability to various situations, not just formal debates."}]}, {"question": "A political speaker delivers a passionate address, citing personal experiences of hardship and relying heavily on emotional appeals to inspire action from the audience. Which mode of persuasion is this speaker primarily employing, according to Aristotle?", "options": [{"text": "Ethos, by demonstrating their personal character and credibility through hardship.", "isCorrect": false, "rationale": "While personal experience can contribute to ethos (character/credibility), the description emphasizes 'passionate address' and 'emotional appeals' to 'inspire action,' which are the hallmarks of pathos."}, {"text": "Pathos, by engaging the audience's emotions through personal stories and appeals to move them to action.", "isCorrect": true, "rationale": "Pathos is defined as moving 'the audience by arousing appropriate emotions—fear, anger, pity, indignation—that are relevant to the case at hand.' The speaker's actions align directly with this definition."}, {"text": "Logos, by presenting compelling evidence and reasoning for their proposed actions.", "isCorrect": false, "rationale": "Logos refers to the 'rational content of the argument itself—the evidence, the reasoning, the structure of the case.' The description does not emphasize rational arguments or evidence."}, {"text": "Enthymeme, by offering probable arguments that resonate with common beliefs.", "isCorrect": false, "rationale": "An enthymeme is a 'rhetorical syllogism' and is a component of logos (reason). The primary focus of the speaker in this scenario is emotional arousal, not logical deduction from probable premises."}]}, {"question": "What distinguishes Aristotle's concept of the enthymeme from a logical syllogism?", "options": [{"text": "An enthymeme moves from particular conclusions to universal truths, while a syllogism does the opposite.", "isCorrect": false, "rationale": "Both are deductive in nature (moving from general to particular), but the enthymeme uses probable premises, unlike a formal syllogism."}, {"text": "Enthymemes are arguments based on probable or generally true premises, unlike syllogisms which rely on certain or universal truths.", "isCorrect": true, "rationale": "The text states that an enthymeme is 'an argument from probable rather than certain premises. Where a logical syllogism moves from universal truths to particular conclusions, an enthymeme moves from what is generally or usually true.'"}, {"text": "Enthymemes are primarily concerned with emotional appeals (pathos), whereas syllogisms are purely rational.", "isCorrect": false, "rationale": "The enthymeme is described as 'the body of persuasion' and is central to rhetorical logos (reason), not pathos."}, {"text": "A logical syllogism is a form of oral rhetoric, while an enthymeme is for written argument.", "isCorrect": false, "rationale": "No such distinction regarding oral vs. written form is made in the text; both can exist in either."}]}, {"question": "Aristotle's view of rhetoric, as an art in service of truth and justice, directly contrasts with which contemporary group?", "options": [{"text": "Playwrights, who focused on fictional narratives.", "isCorrect": false, "rationale": "Playwrights are related to the Poetics, not presented as a contrast to Aristotle's rhetorical ethics."}, {"text": "Historians, who documented past events without engaging in persuasion.", "isCorrect": false, "rationale": "Historians are not mentioned as antagonists to Aristotle's view of rhetoric."}, {"text": "Sophists, who taught how to make weaker arguments appear stronger, implying a disregard for truth.", "isCorrect": true, "rationale": "The text states, 'Aristotle sets himself against the Sophists—traveling teachers of his day who claimed to be able to make the weaker argument appear the stronger—and insists that rhetoric properly understood is an art in service of truth and justice.'"}, {"text": "Philosophers of the Academy, who emphasized abstract logic over practical persuasion.", "isCorrect": false, "rationale": "Aristotle himself studied at Plato's Academy and brought systematic rigor to rhetoric; the text does not present them as a contrasting group in this context."}]}, {"question": "Which statement accurately highlights a structural difference between Aristotle's Poetics and Rhetoric as described in the text?", "options": [{"text": "The Poetics is a comprehensive multi-volume work, while the Rhetoric is a concise single book.", "isCorrect": false, "rationale": "This statement reverses the descriptions given in the text."}, {"text": "The Poetics primarily focuses on oratorical techniques, whereas the Rhetoric analyzes literary forms like tragedy.", "isCorrect": false, "rationale": "This statement swaps the subjects of the two works. The Poetics is about literature (e.g., tragedy), and the Rhetoric is about persuasion/oratory."}, {"text": "The Rhetoric is a long and comprehensive work spanning three books, in contrast to the Poetics, which is short and dense, surviving mostly as Book I.", "isCorrect": true, "rationale": "The text states: 'Where the Poetics is short and dense, the Rhetoric is long and comprehensive—three full books covering everything... What survives is Book I, running just over fifty pages, but those fifty pages have generated more commentary...'"}, {"text": "The Poetics explicitly identifies three modes of artistic expression, while the Rhetoric details six elements of effective argumentation.", "isCorrect": false, "rationale": "The Poetics identifies six elements of tragedy, while the Rhetoric identifies three modes of persuasion (ethos, pathos, logos)."}]}, {"question": "The text describes Aristotle's Poetics as generating 'more commentary and debate than almost any work of comparable length in Western intellectual history.' What does this statement imply about its enduring value?", "options": [{"text": "It suggests that the Poetics is poorly written and difficult to understand, leading to confusion.", "isCorrect": false, "rationale": "Extensive commentary and debate over centuries typically signify a work's profound depth, complexity, and importance, not necessarily poor writing."}, {"text": "It highlights the work's foundational nature and its profound, lasting influence on literary theory and criticism.", "isCorrect": true, "rationale": "The sustained and widespread commentary and debate for over two millennia are direct evidence of the work's foundational importance and enduring relevance to literary thought."}, {"text": "It indicates that the work's ideas are largely outdated and no longer relevant to contemporary literary thought.", "isCorrect": false, "rationale": "Ongoing debate and commentary suggest continued engagement with and relevance of the ideas, not that they are outdated."}, {"text": "It proves that scholars have been unable to reach a consensus on Aristotle's true intentions for the work.", "isCorrect": false, "rationale": "While 'debate' implies lack of full consensus, the sheer volume of commentary points more broadly to its significance and the richness of its ideas, rather than merely a failure to agree on intentions."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
