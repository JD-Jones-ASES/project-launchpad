<script>
var QUESTIONS = [{"question": "How do Aristotle's Poetics and Rhetoric integrate with his Ethics and Politics within his broader philosophical project?", "options": [{"text": "They are independent treatises on separate topics with no significant philosophical connection.", "isCorrect": false, "rationale": "The text emphasizes how these works form part of a unified philosophical project, addressing different dimensions of the same fundamental questions about human nature and the good life."}, {"text": "They are the theoretical counterpart to the Ethics and Politics: where the earlier works ask how to live well, these ask how language and art serve and shape that good life.", "isCorrect": true, "rationale": "The overview explains that all four works are dimensions of a single inquiry: the Ethics and Politics address how to live well and form communities, while the Poetics and Rhetoric address how art and persuasion serve and shape human life."}, {"text": "They supersede the Ethics and Politics, representing Aristotle's more mature and final views.", "isCorrect": false, "rationale": "The text does not establish a chronological hierarchy placing these works above the earlier ones. All four are presented as complementary parts of one investigation."}, {"text": "They focus exclusively on technical skills, whereas the Ethics and Politics address moral and political philosophy.", "isCorrect": false, "rationale": "Both the Poetics and Rhetoric are philosophical investigations — the Poetics into the nature of artistic representation, the Rhetoric into the art of finding genuine arguments. They are not merely technical manuals."}], "id": "q01"}, {"question": "Why does the overview argue that poetry is 'more philosophical than history'?", "options": [{"text": "Because poetry requires more creative genius than the accurate recording of facts.", "isCorrect": false, "rationale": "Aristotle's argument is not about creative talent but about the cognitive content of each form. The distinction concerns universals versus particulars."}, {"text": "Because poetry deals with what might happen (universals about human nature) while history records what did happen (particular events).", "isCorrect": true, "rationale": "The text explains Aristotle's argument that poetry represents what kinds of people tend to say and do — universal truths — while history records what specific individuals like Alcibiades actually did. Universals are philosophy's domain."}, {"text": "Because the language of poetry is more precise than the language of historical prose.", "isCorrect": false, "rationale": "The claim is about the relationship to truth and universals, not linguistic precision. Aristotle's criterion is what each form represents, not how it says it."}, {"text": "Because poetry deals with heroes and gods, who are naturally more serious subjects than human affairs.", "isCorrect": false, "rationale": "Aristotle's universals argument concerns all poetry, not just works about heroes and gods. The philosophical superiority of poetry lies in its treatment of what might happen, not its subject matter."}], "id": "q02"}, {"question": "Aristotle defines $katharsis$ as the specific effect of tragedy. Which answer best captures what this means?", "options": [{"text": "The moral lesson the audience takes away from witnessing the hero's downfall.", "isCorrect": false, "rationale": "Katharsis is an emotional effect — a purification or purgation — not primarily a moral lesson. The moral interpretation is one later reading but not Aristotle's stated account."}, {"text": "The pleasurable purification or purgation of pity and fear produced by watching tragic action.", "isCorrect": true, "rationale": "The text describes katharsis as the emotional effect tragedy achieves in its audience — a kind of pleasurable purging or clarification of the pity and fear aroused by the play."}, {"text": "The intellectual satisfaction of seeing the plot resolved in a way that confirms the hero's worth.", "isCorrect": false, "rationale": "Katharsis is specifically an emotional effect involving pity and fear, not primarily an intellectual satisfaction at plot resolution."}, {"text": "The spectacle of suffering that makes tragedy more impressive than comedy.", "isCorrect": false, "rationale": "Aristotle ranks spectacle last among the elements of tragedy and argues the tragic effect can be achieved even in reading, without staging. Katharsis is not tied to spectacle."}], "id": "q03"}, {"question": "Aristotle ranks the six elements of tragedy. Which ranking is correct according to the text?", "options": [{"text": "Spectacle is first because theatre is above all a visual art; plot is last because it varies from play to play.", "isCorrect": false, "rationale": "Aristotle ranks spectacle last, noting it depends on production craft rather than the poet's art. Plot is ranked first as 'the soul of a tragedy.'"}, {"text": "Plot is first (the soul), then character, thought, diction, song, and spectacle last.", "isCorrect": true, "rationale": "The text lists this ranking precisely: plot (mythos) as the soul, followed by character (ethos), thought (dianoia), diction (lexis), song (melos), and spectacle (opsis) last."}, {"text": "Character is first because audience sympathy depends on the hero's moral qualities.", "isCorrect": false, "rationale": "Aristotle explicitly ranks character below plot, arguing that tragedy imitates action rather than persons — the arrangement of incidents matters more than who the hero is."}, {"text": "Diction is first because poetry is made of language and words are the poet's primary material.", "isCorrect": false, "rationale": "While language matters, Aristotle ranks diction fourth. His argument is that tragedy is defined by what it represents (action), not by its medium (language), though both matter."}], "id": "q04"}, {"question": "In Aristotle's Rhetoric, which statement accurately characterizes the role of $pathos$ — emotional appeal — among the modes of persuasion?", "options": [{"text": "Pathos is illegitimate because it manipulates the audience's judgment rather than persuading through reason.", "isCorrect": false, "rationale": "Aristotle explicitly defends pathos as a legitimate mode of persuasion. An audience's emotional state genuinely affects how they weigh evidence, making emotional appeals a real form of rhetorical evidence."}, {"text": "Pathos is the most important mode because audiences are fundamentally irrational and must be moved emotionally.", "isCorrect": false, "rationale": "Aristotle does not claim audiences are irrational or that pathos is the most important mode. All three modes are necessary, and the Rhetoric insists on finding the genuinely available means of persuasion."}, {"text": "Pathos is a legitimate mode because an audience's emotional state genuinely affects how they receive and evaluate arguments.", "isCorrect": true, "rationale": "The text explains that Aristotle defends pathos as legitimate because emotions are not irrational — a judge who is angry genuinely weighs evidence differently from one who is calm, making emotional appeals a real form of evidence about the case."}, {"text": "Pathos is limited to epideictic oratory; it has no role in deliberative or forensic contexts.", "isCorrect": false, "rationale": "Pathos applies to all three types of rhetoric. Emotional appeals are relevant in legal cases, political deliberation, and ceremonial speeches alike."}], "id": "q05"}, {"question": "What distinguishes the $enthymeme$ from a formal logical syllogism, and why does Aristotle call it 'the body of persuasion'?", "options": [{"text": "The enthymeme uses poetic language while a syllogism uses formal notation; rhetoric needs poetic expression.", "isCorrect": false, "rationale": "The distinction is not about language style but about the premises used. The enthymeme reasons from probable premises rather than certain ones, suited to the real-world conditions of rhetoric."}, {"text": "The enthymeme reasons from probable premises suitable for practical audiences; it is 'the body' because logos-based argument is the structural core of rhetoric as a genuine art.", "isCorrect": true, "rationale": "The text explains that the enthymeme is the rhetorical syllogism — reasoning from what seems probable to an audience, not from certain first principles. Aristotle calls it 'the body of persuasion' because argument is what makes rhetoric a genuine intellectual art."}, {"text": "The enthymeme omits a premise that the audience must supply; this psychological trick makes it more persuasive.", "isCorrect": false, "rationale": "While some enthymemes do leave a premise implicit, this is not Aristotle's primary definition or the reason for calling it 'the body of persuasion.' The key is that it reasons from probable, not certain, premises."}, {"text": "The enthymeme is shorter than a syllogism, making it more memorable for general audiences.", "isCorrect": false, "rationale": "Brevity is not the defining feature of the enthymeme. Its defining feature is reasoning from probable rather than certain premises, suited to the conditions of practical rhetoric."}], "id": "q06"}, {"question": "Why does the text claim that Aristotle's critique of the Sophists is central to understanding the Rhetoric?", "options": [{"text": "Because Aristotle borrowed most of his rhetorical theory from the Sophists and needed to acknowledge this debt.", "isCorrect": false, "rationale": "Aristotle's relationship with the Sophists is critical, not one of acknowledgment. He argues that Sophists misrepresent rhetoric by focusing on manipulation rather than genuine argument-finding."}, {"text": "Because the Sophists' claim that rhetoric can make 'the weaker argument appear the stronger' is what Aristotle's definition of rhetoric as finding genuine arguments directly counters.", "isCorrect": true, "rationale": "The text explains that Aristotle's definition of rhetoric as finding 'the available means of persuasion' is a direct philosophical counter to the Sophists' claim to make weak arguments appear strong. Legitimate rhetoric finds real arguments; sophistry manufactures the appearance of argument."}, {"text": "Because the Sophists were Aristotle's primary audience for the Rhetoric and he wrote to persuade them.", "isCorrect": false, "rationale": "The Rhetoric was a school text at the Lyceum, not a persuasive tract addressed to Sophists. The critique of Sophists defines what legitimate rhetoric is by contrast with its misuse."}, {"text": "Because Aristotle wanted to replace Sophistic oral teaching with written philosophical treatises.", "isCorrect": false, "rationale": "The text does not frame Aristotle's project as a campaign against oral vs. written instruction. The critique concerns the nature and purpose of rhetorical art, not its medium."}], "id": "q07"}, {"question": "Aristotle's three types of rhetoric each have a characteristic time reference. Which combination is correct?", "options": [{"text": "Deliberative = present, forensic = past, epideictic = future.", "isCorrect": false, "rationale": "Deliberative oratory is future-oriented (advising about what should be done); forensic is past-oriented (judging what was done); epideictic is present-oriented (praising or blaming now)."}, {"text": "Deliberative = future, forensic = past, epideictic = present.", "isCorrect": true, "rationale": "The text identifies these time references precisely: deliberative oratory advises for or against a future action; forensic oratory argues about past actions (justice/injustice); epideictic oratory praises or blames in the present."}, {"text": "Deliberative = past, forensic = future, epideictic = present.", "isCorrect": false, "rationale": "This reverses deliberative and forensic. Deliberative is future-oriented (what should we do?), and forensic is past-oriented (what was done, and was it just?)."}, {"text": "Deliberative = present, forensic = future, epideictic = past.", "isCorrect": false, "rationale": "This misassigns all three time references. The correct alignment is deliberative/future, forensic/past, epideictic/present."}], "id": "q08"}, {"question": "The text notes that the Poetics had 'vast influence on later literary criticism.' Which of the following best explains this influence?", "options": [{"text": "The Poetics survived antiquity intact and was continuously read in its original form throughout the Middle Ages.", "isCorrect": false, "rationale": "The text notes that the Poetics had a complicated transmission history — it was largely unknown in the Latin West and reached European critics through Arabic transmission and Renaissance rediscovery."}, {"text": "It provided an analytical vocabulary (mimesis, katharsis, peripeteia, hamartia) and a philosophical framework applicable to literary forms beyond those Aristotle knew.", "isCorrect": true, "rationale": "The text explains that the Poetics gave Western criticism its essential concepts and framework, which critics have applied to forms ranging from Roman poetry through the novel and cinema — even though Aristotle never knew these forms."}, {"text": "Its prescriptive rules for the three unities gave playwrights clear guidelines that produced great Renaissance drama.", "isCorrect": false, "rationale": "The three unities were Castelvetro's invention, not Aristotle's prescriptions. Aristotle himself stated only the unity of action; the other 'unities' were added by later critics and actually constrained drama rather than enabling it."}, {"text": "It was adopted as the official curriculum of medieval universities and read as a companion to Aristotle's Logic.", "isCorrect": false, "rationale": "The Poetics was not a standard medieval curriculum text in the way Aristotle's Logic and Ethics were. Its major European influence came later, through the Renaissance rediscovery and translation."}], "id": "q09"}, {"question": "Aristotle's account of $mimesis$ in the Poetics explains why we take pleasure in artistic representations of things that would be painful in reality, such as depictions of corpses. What is his explanation?", "options": [{"text": "Art creates a safe emotional distance that removes the pain of the original experience.", "isCorrect": false, "rationale": "This is a later aesthetic concept. Aristotle's explanation is cognitive, not about safety or distance. He focuses on what we are actually enjoying when we look at a representation."}, {"text": "We take pleasure in recognizing and learning from the imitation itself, not in the thing imitated.", "isCorrect": true, "rationale": "The text presents Aristotle's argument that the pleasure of mimesis is the pleasure of recognition and learning — we enjoy perceiving that 'this is that,' understanding what we see. This cognitive pleasure explains why even painful subjects can be enjoyed in artistic representation."}, {"text": "We take pleasure because art always transforms painful realities into something beautiful.", "isCorrect": false, "rationale": "Aristotle does not claim art beautifies painful subjects. His explanation is cognitive: the pleasure is in the recognition and learning, not in transformation of the subject's nature."}, {"text": "The pleasure is purely sensory — appealing to our instinct for harmony and rhythm.", "isCorrect": false, "rationale": "Aristotle does discuss rhythm and harmony as origins of poetry, but his specific explanation for why we enjoy representations of painful things focuses on the cognitive pleasure of recognition, not sensory pleasure in rhythm."}], "id": "q10"}, {"question": "The text explains that Aristotle saw rhetoric as 'the counterpart ($antistrophos$) of dialectic.' What does this comparison establish about rhetoric's nature?", "options": [{"text": "Rhetoric is inferior to dialectic because it works with mere probability rather than necessary truth.", "isCorrect": false, "rationale": "Aristotle does not rank rhetoric inferior to dialectic — they are structurally parallel arts operating in different domains. The difference is context, not logical quality."}, {"text": "Rhetoric and dialectic are structurally parallel arts of reasoning: both are applicable to any subject, both work with arguments, but dialectic addresses expert interlocutors while rhetoric addresses general audiences.", "isCorrect": true, "rationale": "The text explains that $antistrophos$ means 'counterpart' or 'answering' — rhetoric mirrors dialectic in structure but operates in the practical sphere with general audiences rather than in formal argumentation with expert interlocutors."}, {"text": "Rhetoric is a specialized form of dialectic limited to political and legal settings.", "isCorrect": false, "rationale": "Aristotle explicitly notes that rhetoric can be applied to any subject, just like dialectic. Its application to politics and law is characteristic, not definitionally limiting."}, {"text": "Rhetoric replaces dialectic for practical purposes because most people cannot follow formal arguments.", "isCorrect": false, "rationale": "Aristotle does not say rhetoric replaces dialectic or that it exists because audiences are unable to reason. The two arts are parallel, not one substituting for the other."}], "id": "q11"}, {"question": "The overview describes the Poetics as studying the 'imitation of action that is serious, complete, and of a certain magnitude.' Which element of Aristotle's definition distinguishes tragedy from comedy?", "options": [{"text": "'Of a certain magnitude' — tragedy is longer than comedy.", "isCorrect": false, "rationale": "Magnitude refers to the scale and importance of the action represented, not the length of the play. Comedy can be long; magnitude is about seriousness and scope."}, {"text": "'Serious' ($spoudaios$) — tragedy imitates elevated, weighty action while comedy imitates the ludicrous and defective.", "isCorrect": true, "rationale": "The text explains that the key distinction is in the objects imitated: tragedy imitates action that is $spoudaios$ (serious, weighty, elevated), while comedy imitates the $phaulos$ (ludicrous, inferior, defective). 'Serious' is the defining adjective."}, {"text": "'Complete' — tragedy has a definite ending while comedy is open-ended.", "isCorrect": false, "rationale": "'Complete' (having a beginning, middle, and end) applies to both well-constructed tragedy and comedy. Completeness is a requirement of unified plot construction, not a distinction between the genres."}, {"text": "'Imitation of action' — comedy imitates characters rather than action.", "isCorrect": false, "rationale": "Both tragedy and comedy are forms of mimesis and both imitate action. The distinction is not between imitating action and imitating character, but between the moral quality (elevation vs. defectiveness) of what is imitated."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
