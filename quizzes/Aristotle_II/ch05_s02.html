        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Aristotle_II.html">&larr; Back to The Life of Words (Aristotle II)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 5, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the analysis of Longinus, what is the fundamental difference between standard Aristotelian rhetoric and the concept of the $hypsos$?", "options": [{"text": "Aristotelian rhetoric focuses on the speaker's reputation, while the $hypsos$ focuses on the logic of the evidence.", "isCorrect": false, "rationale": "This confuses the modes of $ethos$ and $logos$ with the categorical shift between persuasion and transport described by Longinus."}, {"text": "Persuasion aims for a rational judgment, whereas the $hypsos$ produces an overwhelming transport that 'takes the hearer out of himself.'", "isCorrect": true, "rationale": "Longinus distinguishes between convincing the mind through argument and seizing the reader's faculty entirely through an irresistible, sublime force."}, {"text": "The $hypsos$ is a technical manual for arrangement, while Aristotelian rhetoric is concerned only with the choice of words.", "isCorrect": false, "rationale": "Aristotle covers arrangement in his work, and Longinus's work is an exploration of greatness rather than a technical manual for structure."}, {"text": "Aristotle's rhetoric is designed for literary criticism, while Longinus's work is designed for the legal courts of Rome.", "isCorrect": false, "rationale": "The source material indicates that Aristotle's rhetoric was for practical communication and Longinus's work influenced later literary criticism."}], "id": "q01"}, {"question": "Cicero's three offices of the orator—$docere$, $delectare$, and $movere$—align with which of Aristotle's three modes of persuasion?", "options": [{"text": "$docere$ (pathos), $delectare$ (logos), $movere$ (ethos)", "isCorrect": false, "rationale": "This incorrectly maps the Latin terms to the Greek modes, as teaching is associated with logic, not emotion."}, {"text": "$docere$ (ethos), $delectare$ (pathos), $movere$ (logos)", "isCorrect": false, "rationale": "The term $docere$ refers to instruction, which is a logical function rather than an ethical appeal based on character."}, {"text": "$docere$ (logos), $delectare$ (ethos), $movere$ (pathos)", "isCorrect": true, "rationale": "In the Ciceronian triad, teaching ($docere$) appeals to reason, delighting ($delectare$) builds a rapport via the speaker's character, and moving ($movere$) stirs the audience's emotions."}, {"text": "$docere$ (logos), $delectare$ (pathos), $movere$ (ethos)", "isCorrect": false, "rationale": "While $docere$ is logic-based, delighting the audience relates more to the audience's perception of the speaker's character ($ethos$) than to $pathos$."}], "id": "q02"}, {"question": "Which of the five canons of rhetoric were the primary contributions of the Roman tradition, having been largely omitted or only briefly mentioned in Aristotle's original theory?", "options": [{"text": "$Inventio$ and $Dispositio$", "isCorrect": false, "rationale": "These two canons correspond directly to the first two books of Aristotle's Rhetoric and were core to his original theory."}, {"text": "$Memoria$ and $Pronuntiatio$", "isCorrect": true, "rationale": "While Aristotle focused on the content and style of the message, the Roman tradition added systematic training for memory and physical delivery."}, {"text": "$Elocutio$ and $Inventio$", "isCorrect": false, "rationale": "Aristotle extensively covered style ($elocutio$) and the finding of arguments ($inventio$) in his works."}, {"text": "$Dispositio$ and $Elocutio$", "isCorrect": false, "rationale": "Organization and word choice are central components of Aristotle's Rhetoric, specifically in Book III."}], "id": "q03"}, {"question": "Quintilian's definition of the orator as a $vir\\ bonus\\ dicendi\\ peritus$ suggests that rhetorical excellence is inseparable from what quality?", "options": [{"text": "The speaker's mastery of the Greek language and classical philosophy.", "isCorrect": false, "rationale": "While Quintilian valued education, his specific definition focuses on a deeper personal attribute beyond technical or linguistic skill."}, {"text": "The speaker's ability to manipulate the $pathos$ of any given audience.", "isCorrect": false, "rationale": "Quintilian's definition is a moral standard rather than a technical focus on emotional manipulation."}, {"text": "The genuine moral character and virtue of the speaker.", "isCorrect": true, "rationale": "Quintilian argued that true $ethos$ cannot be faked indefinitely, meaning only a good person can achieve the highest form of rhetorical greatness."}, {"text": "The orator's status as a high-ranking statesman in the Roman Senate.", "isCorrect": false, "rationale": "Though Cicero emphasized the statesman role, Quintilian's definition specifically highlights the moral goodness of the individual."}], "id": "q04"}, {"question": "In his work 'De Doctrina Christiana', how does Augustine justify the use of traditional rhetoric by Christian preachers?", "options": [{"text": "He argues that rhetoric is a morally neutral tool that should be used to serve the truth of the Gospel.", "isCorrect": true, "rationale": "Augustine believed it was foolish for falsehood to be defended with eloquence while truth remained poorly communicated."}, {"text": "He claims that Christian rhetoric is entirely separate from pagan traditions and relies solely on divine inspiration.", "isCorrect": false, "rationale": "Augustine actually sought to synthesize the Roman rhetorical tradition, particularly Cicero, with Christian teaching."}, {"text": "He suggests that rhetoric is only useful for 'delighting' the audience but should never be used to 'move' the will.", "isCorrect": false, "rationale": "Augustine specifically emphasized moving the will as a vital goal of the Christian preacher."}, {"text": "He maintains that the $hypsos$ of Scripture renders all other rhetorical techniques obsolete for the preacher.", "isCorrect": false, "rationale": "While he recognized the power of Scripture, he still advocated for the preacher to learn the skills of effective communication."}], "id": "q05"}, {"question": "Longinus compares the effect of a sublime thought to a 'lightning-flash.' What does this analogy imply about the nature of the $hypsos$?", "options": [{"text": "It requires a long, systematic build-up of evidence to be effective.", "isCorrect": false, "rationale": "The source material contrasts the gradual manifestation of arrangement with the instantaneous power of the sublime."}, {"text": "It is a dangerous form of rhetoric that should only be used in emergency situations.", "isCorrect": false, "rationale": "The analogy refers to the speed and intensity of the effect on the audience, not its moral danger or situational frequency."}, {"text": "It reveals the total power of the orator and the essence of the subject in a single, instantaneous moment.", "isCorrect": true, "rationale": "The 'lightning-flash' signifies an immediate illumination that bypasses gradual logical progression to reveal the whole subject at once."}, {"text": "It is an unpredictable phenomenon that cannot be studied or taught as an art.", "isCorrect": false, "rationale": "While the sublime is described as a mystery, the analogy is used to describe its impact rather than its teachability."}], "id": "q06"}, {"question": "Within the medieval educational framework of the trivium, which specific Aristotelian source provided the foundation for the study of logic?", "options": [{"text": "The $Rhetoric$", "isCorrect": false, "rationale": "The Rhetoric was the core text for the 'rhetoric' branch of the trivium, not the logic branch."}, {"text": "The $Organon$", "isCorrect": true, "rationale": "The source material notes that grammar came from 'De Interpretatione,' logic from the 'Organon,' and rhetoric from the 'Rhetoric.'"}, {"text": "The $Poetics$", "isCorrect": false, "rationale": "The Poetics is not listed as one of the three foundational Aristotelian texts for the medieval trivium."}, {"text": "The $Ethics$", "isCorrect": false, "rationale": "While Aristotle's Ethics was influential, it was not the text used to organize the foundational logic component of the trivium."}], "id": "q07"}, {"question": "Cicero's ideal orator is described as a 'philosopher-statesman.' What failure does Cicero attribute to the philosopher who lacks the power of eloquence?", "options": [{"text": "The philosopher is 'dangerous' because they possess truth without restraint.", "isCorrect": false, "rationale": "Cicero reserve the label 'dangerous' for the orator who has technique but lacks substance or wisdom."}, {"text": "The philosopher is 'useless' because they possess wisdom but cannot communicate it to the commonwealth.", "isCorrect": true, "rationale": "Cicero argues that wisdom without the ability to communicate it fails to serve the public good."}, {"text": "The philosopher is 'irrational' because they ignore the emotional needs of the audience.", "isCorrect": false, "rationale": "Cicero’s critique is not about the philosopher's lack of emotion, but their lack of effective communicative power."}, {"text": "The philosopher is 'pagan' and therefore cannot reach a Christian audience.", "isCorrect": false, "rationale": "Cicero lived before the Christian era, so his critique of the philosopher was focused on civil utility, not religious conversion."}], "id": "q08"}, {"question": "If a student is using the five canons of rhetoric to organize a presentation, which canon are they applying when they choose specific metaphors and figures of speech?", "options": [{"text": "$Inventio$", "isCorrect": false, "rationale": "Inventio is the process of finding the arguments themselves, not the specific language used to express them."}, {"text": "$Dispositio$", "isCorrect": false, "rationale": "Dispositio concerns the structural arrangement of the speech rather than the stylistic choices."}, {"text": "$Elocutio$", "isCorrect": true, "rationale": "Elocutio, or style, is the canon dedicated to the choice of words, metaphors, and figures of speech."}, {"text": "$Pronuntiatio$", "isCorrect": false, "rationale": "Pronuntiatio refers to the actual vocal and physical delivery of the speech to an audience."}], "id": "q09"}, {"question": "What is the primary ethical concern raised by the existence of the 'sublime' as described by Longinus?", "options": [{"text": "It is too difficult for most speakers to achieve, making rhetoric an elitist art.", "isCorrect": false, "rationale": "While true, the text focuses on the ethical boundary between persuasion and domination rather than accessibility."}, {"text": "It may overstep the boundary between honest argument and psychological domination by bypassing the hearer's choice.", "isCorrect": true, "rationale": "Because the sublime 'sways every reader whether he will or no,' it raises questions about whether it respects the audience's rational autonomy."}, {"text": "It ignores the importance of $pathos$, focusing exclusively on the 'lightning-flash' of logic.", "isCorrect": false, "rationale": "The sublime is actually described as a shattering form of $pathos$ or overwhelming $ethos$, not a rejection of emotion."}, {"text": "It relies too heavily on written texts, making it ineffective for oral preaching.", "isCorrect": false, "rationale": "The sublime is applicable to both speech and writing, and was specifically debated in the context of Christian preaching."}], "id": "q10"}, {"question": "How does Cicero's expansion of Aristotle's two-part structure (invention/style) into five canons reflect his broader vision of the ideal orator?", "options": [{"text": "It narrows the scope of rhetoric by replacing philosophical breadth with technical precision.", "isCorrect": false, "rationale": "Cicero's expansion broadens rather than narrows the scope, integrating memory and delivery alongside the intellectual dimensions of rhetoric."}, {"text": "It demonstrates that Cicero viewed rhetoric as a purely technical skill requiring systematic rules at each stage.", "isCorrect": false, "rationale": "Cicero's ideal orator is a philosopher-statesman, not a mere technician; the five canons serve a vision of civic wisdom, not just technical efficiency."}, {"text": "It reflects Cicero's vision that the complete orator must master not only argument and style but also organization, memory, and embodied performance.", "isCorrect": true, "rationale": "By adding $dispositio$, $memoria$, and $pronuntiatio$ to Aristotle's $inventio$ and $elocutio$, Cicero produced a comprehensive system covering every stage of rhetorical preparation and delivery, embodying his ideal of the philosophically trained civic orator."}, {"text": "It shows that Cicero rejected Aristotle's approach as too philosophical and sought a purely practical Roman alternative.", "isCorrect": false, "rationale": "Cicero explicitly builds on and adapts Aristotle for a Roman audience; he does not reject the philosophical dimension but translates it into a civic context."}], "id": "q11"}, {"question": "Augustine's transformation of the rhetorical tradition in *De Doctrina Christiana* reoriented the three Ciceronian purposes — $docere$, $delectare$, $movere$ — toward a new ultimate end. What was that end, and why did it require the full rhetorical arsenal?", "options": [{"text": "Entertainment of the congregation; Augustine believed that pleasure was the best means of holding attention in a long sermon.", "isCorrect": false, "rationale": "$Delectare$ (pleasure) is only one of three purposes, and Augustine did not prioritize entertainment above instruction or emotional movement."}, {"text": "Logical demonstration of scriptural truths; Augustine believed that clear argument alone was sufficient to bring the faithful to salvation.", "isCorrect": false, "rationale": "Augustine explicitly argues that $docere$ (teaching) alone is insufficient; moving the will requires $movere$ as well, since the weakness of the will means intellectual assent does not automatically produce virtuous action."}, {"text": "Moving the congregation toward eternal goods; because human will is weakened and does not automatically follow intellectual assent, preaching must teach, delight, and above all move.", "isCorrect": true, "rationale": "Augustine transformed the three offices into instruments for guiding souls toward salvation: $docere$ informs the mind, $delectare$ engages attention and affection, and $movere$ overcomes the weakness of will that prevents people from acting on what they know to be true."}, {"text": "Converting pagan audiences through demonstrations of rhetorical superiority over classical orators.", "isCorrect": false, "rationale": "Augustine's concern was pastoral and theological, not competitive. His goal was spiritual transformation, not rhetorical one-upmanship."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
