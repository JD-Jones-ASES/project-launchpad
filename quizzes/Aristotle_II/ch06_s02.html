<script>
var QUESTIONS = [{"question": "According to Longinus in \\textit{On the Sublime}, which of the following best describes the relationship between pathos and sublimity?", "options": [{"text": "Pathos and sublimity are identical and always coexist within a great work.", "isCorrect": false, "rationale": "This view is attributed to Caecilius, which Longinus explicitly rejects by pointing out instances of sublimity without pathos."}, {"text": "Sublimity can exist without pathos, and some forms of pathos can be low rather than lofty.", "isCorrect": true, "rationale": "Longinus argues that while passion is a source of the sublime, certain emotions like pity or fear can be low, and some sublime passages, like those in panegyrics, lack pathos."}, {"text": "Pathos is the only necessary source of the sublime, as it provides 'divine inspiration.'", "isCorrect": false, "rationale": "While he values genuine passion highly, it is only one of five sources, and he notes that misplaced passion actually leads to embarrassment."}, {"text": "Pathos is always detrimental to sublimity because it disrupts the dignity of the composition.", "isCorrect": false, "rationale": "Longinus believes that appropriate and genuine passion is actually the most conducive element to achieving sublimity."}], "id": "q01"}, {"question": "What does Longinus mean by the term \\textit{parenthyrsus}?", "options": [{"text": "A natural gift for great thought that precedes technical skill.", "isCorrect": false, "rationale": "This describes $megalophrosyne$, which is a different source of the sublime."}, {"text": "The transport of an audience through authentic, divine inspiration.", "isCorrect": false, "rationale": "This is the desired effect of the sublime, not the technical error Longinus is identifying."}, {"text": "An inappropriate or excessive display of emotion that causes embarrassment.", "isCorrect": true, "rationale": "Longinus uses this term to describe emotion that is misplaced or too intense for the subject matter, leading to the writer's failure."}, {"text": "The mechanical application of figures of speech to enhance emotional impact.", "isCorrect": false, "rationale": "While this might contribute to the error, the term specifically refers to the resulting misplaced passion itself."}], "id": "q02"}, {"question": "In Philip Sidney's \\textit{The Defence of Poesy}, why is the poet considered superior to the philosopher in teaching virtue?", "options": [{"text": "The poet provides more universal logical abstractions than the philosopher.", "isCorrect": false, "rationale": "Sidney argues that the philosopher deals in abstractions, which is why they fail to move the will."}, {"text": "The poet alone understands that $gnosis$ is the ultimate fruit of moral doctrine.", "isCorrect": false, "rationale": "Sidney, citing Aristotle, argues that the fruit is actually $praxis$ (action), not just knowledge."}, {"text": "The poet's use of concrete images and delightful representations moves the will to action.", "isCorrect": true, "rationale": "Sidney contends that because poetry moves the reader's desire to emulate virtue, it fulfills the purpose of teaching more effectively than philosophy."}, {"text": "The poet relies on historical facts to prove that virtue is always rewarded in reality.", "isCorrect": false, "rationale": "This describes the historian's role, which Sidney finds limited because it is tied to particularities rather than universal ideals."}], "id": "q03"}, {"question": "Sidney identifies three duties of the orator/writer: $docere$, $delectare$, and $movere$. Which one does he argue is the most important for moral formation?", "options": [{"text": "$docere$ (to teach)", "isCorrect": false, "rationale": "While teaching is necessary, Sidney argues that knowing is useless if it does not lead to doing."}, {"text": "$delectare$ (to delight)", "isCorrect": false, "rationale": "Delight is a means to keep attention, but it is not the ultimate 'cause and effect' of moral doctrine."}, {"text": "$movere$ (to move)", "isCorrect": true, "rationale": "Sidney claims that moving is of a 'higher degree' because it is what leads to $praxis$, or the practice of what is taught."}, {"text": "$megalophrosyne$ (greatness of thought)", "isCorrect": false, "rationale": "This is one of Longinus's sources of the sublime, not one of the three Ciceronian duties of the orator."}], "id": "q04"}, {"question": "According to the text's analysis of Kahneman and Tversky, how does 'framing' relate to Aristotelian rhetoric?", "options": [{"text": "It proves that $logos$ is the only mode of persuasion that influences decision-making.", "isCorrect": false, "rationale": "Their research showed that even when logical content is identical, the presentation changes the outcome, complicating a purely logical model."}, {"text": "It demonstrates that emotional valence shapes judgment, validating Aristotle's observations on the state of mind of judges.", "isCorrect": true, "rationale": "Kahneman and Tversky showed that how a choice is presented (as a gain or loss) triggers emotional responses that steer decisions, similar to Aristotle's view of $pathos$."}, {"text": "It shows that people are entirely irrational and cannot be moved by logical arguments.", "isCorrect": false, "rationale": "The research identifies systematic biases, but it does not suggest that logic is irrelevant, only that it is influenced by context."}, {"text": "It suggests that $ethos$ is the primary driver of economic choices in modern society.", "isCorrect": false, "rationale": "While $ethos$ is important, the specific experiments mentioned focus on how the 'frame' of the argument itself (a form of $pathos$/$logos$ interaction) affects choice."}], "id": "q05"}, {"question": "Longinus categorizes the five sources of the sublime into two groups. Which sources are considered 'matters of art and craft' rather than 'natural gifts'?", "options": [{"text": "Greatness of thought and inspired emotion.", "isCorrect": false, "rationale": "Longinus explicitly identifies these first two as natural gifts that one must possess innately."}, {"text": "Noble diction, dignified composition, and certain figures of speech.", "isCorrect": true, "rationale": "The last three sources in Longinus's list are technical aspects of writing that can be learned and refined through art."}, {"text": "Authentic $pathos$ and the use of the 'fine madness.'", "isCorrect": false, "rationale": "Longinus views inspired emotion as a natural gift rather than a product of technical craft."}, {"text": "Megalophrosyne and the selection of physical symptoms of desire.", "isCorrect": false, "rationale": "Megalophrosyne (greatness of thought) is a natural gift, though the selection of symptoms (as in Sappho) is a mark of genius."}], "id": "q06"}, {"question": "Based on the section on modern applications, what is the 'test' to determine if an emotional appeal is honest or manipulative?", "options": [{"text": "Whether the speaker uses statistical data ($logos$) to back up the emotion.", "isCorrect": false, "rationale": "Statistics can be framed manipulatively, so their presence alone does not guarantee honesty."}, {"text": "Whether the emotional appeal connects to a genuine feature of the situation or substitutes for it.", "isCorrect": true, "rationale": "The text states that an appeal is honest when it illuminates the human significance of real facts, rather than exploiting vulnerabilities to bypass reason."}, {"text": "Whether the audience is transported into a state of 'fine madness' or remains rational.", "isCorrect": false, "rationale": "Transport is a goal of the sublime for Longinus, but the ethical test for modern rhetoric focuses on the relationship to facts."}, {"text": "Whether the appeal is made in a private setting or a public forum.", "isCorrect": false, "rationale": "Sidney and Aristotle focus on different settings, but the ethical distinction between manipulation and honesty applies to both."}], "id": "q07"}, {"question": "Sidney’s argument regarding the 'weakness of the will' reflects the influence of which intellectual tradition?", "options": [{"text": "The radical skepticism of the early Sophists.", "isCorrect": false, "rationale": "Sidney is a Renaissance humanist, and his focus on the will's moral formation is contrary to Sophistic relativism."}, {"text": "The Augustinian and Scholastic tradition of the Renaissance.", "isCorrect": true, "rationale": "The text notes that Sidney's focus on the will as the central problem of moral life is a hallmark of Renaissance humanism shaped by Augustine."}, {"text": "Longinus’s theory of aesthetic transport and the sublime.", "isCorrect": false, "rationale": "While Sidney is discussed alongside Longinus, his specific focus on the 'will' is a moral and spiritual concern rather than a purely aesthetic one."}, {"text": "The behavioral economics of the twentieth century.", "isCorrect": false, "rationale": "Behavioral economics provides modern parallels to these ideas but is not the tradition that shaped Sidney’s 16th-century context."}], "id": "q08"}, {"question": "Why does Longinus cite Sappho’s poem (Fragment 31) as a supreme example of $pathos$?", "options": [{"text": "Because it uses complex metaphorical figures to describe the idea of love.", "isCorrect": false, "rationale": "Longinus values the poem for its honesty and realism, not for technical complexity or abstraction."}, {"text": "Because the emotion is manufactured through 'emotional intensifiers' that overwhelm the reader.", "isCorrect": false, "rationale": "Longinus explicitly argues against manufactured emotion, praising Sappho for emotion that is entirely at home in its subject."}, {"text": "Because it selects and combines the real physical symptoms of desire with precision and honesty.", "isCorrect": true, "rationale": "The text explains that Longinus sees the selection of real experience as a mark of genius and the source of genuine pathos."}, {"text": "Because it successfully avoids the 'fine madness' that often ruins shorter poems.", "isCorrect": false, "rationale": "Longinus actually associates sublimity with a 'fine madness,' so avoiding it would not be a reason for his praise."}], "id": "q09"}, {"question": "In the context of 'Nudge theory,' how would Aristotle likely categorize the deliberate shaping of a choice environment?", "options": [{"text": "As a purely logical process devoid of $pathos$ or $ethos$.", "isCorrect": false, "rationale": "Nudges rely on emotional and psychological cues, which are core elements of rhetoric in Aristotle's view."}, {"text": "As a form of rhetoric that deliberately shapes the context in which a decision is made.", "isCorrect": true, "rationale": "The text identifies nudge theory as a form of rhetoric because it attempts to influence behavior through the design of the choice environment."}, {"text": "As a scientific method that bypasses the need for any rhetorical strategies.", "isCorrect": false, "rationale": "While based on psychological research, the application of that research to move people to act is fundamentally rhetorical."}, {"text": "As a violation of the principle of $docere$ because it does not inform the intellect.", "isCorrect": false, "rationale": "While it may focus on $movere$, it doesn't necessarily violate $docere$; rather, it represents a specific strategic application of rhetorical principles."}], "id": "q10"}, {"question": "Between the example ($paradigma$) and the enthymeme ($enthymema$) stands the maxim ($gnome$). What makes the maxim rhetorically effective, according to Aristotle's framework?", "options": [{"text": "It provides a universal logical proof that the audience cannot dispute.", "isCorrect": false, "rationale": "Maxims are not logical proofs but pithy general statements about human conduct. Their power comes from resonance with shared belief, not from irrefutable logical demonstration."}, {"text": "It functions as a premise of an enthymeme in its most portable and memorable form, drawing on the audience's existing moral understanding.", "isCorrect": true, "rationale": "Aristotle describes maxims as short, pithy general statements that work because audiences already half-believe them. The orator who deploys the right maxim at the right moment taps into pre-existing common knowledge to direct the audience's reasoning toward his conclusion."}, {"text": "It appeals primarily to the speaker's ethos by displaying philosophical learning.", "isCorrect": false, "rationale": "While a well-chosen maxim may enhance ethos incidentally, its rhetorical function is as a premise for an enthymeme, not a display of learning."}, {"text": "It substitutes for the enthymeme when the audience is incapable of following deductive reasoning.", "isCorrect": false, "rationale": "Maxims serve as the premises of enthymemes, not as replacements for them. The skilled orator uses maxims and enthymemes together, deploying maxims to provide familiar premises from which enthymematic conclusions can be drawn."}], "id": "q11"}, {"question": "Aristotle describes the prime of life as 'the mean between two extremes' of youth and old age. How does this portrait connect to his broader ethical theory in the Nicomachean Ethics?", "options": [{"text": "It shows that Aristotle considered the prime of life to be a biological rather than a moral achievement.", "isCorrect": false, "rationale": "Aristotle explicitly connects the character of the person at their prime to the spoudaios — the person of practical wisdom — which is a moral, not merely biological, category."}, {"text": "It demonstrates that Aristotle believed character was fixed by age and could not be changed through education.", "isCorrect": false, "rationale": "The Ethics teaches that character is formed through habituation and practice. The portrait of the prime of life shows the natural fruit of matured experience, not an immutable biological fixed point."}, {"text": "It illustrates that the virtuous character described in the Ethics — stable, balanced, and practically wise — is what natural maturity tends toward when experience is properly accumulated.", "isCorrect": true, "rationale": "Aristotle's portrait of the person at the prime of life maps directly onto the spoudaios of the Ethics: someone who has found the mean between passion and coldness, trust and suspicion, hope and realism through the natural development of practical wisdom."}, {"text": "It indicates that young and old audiences must be addressed with different rhetorical modes, while those at their prime require no special approach.", "isCorrect": false, "rationale": "The rhetorical implication is that all three character types require different approaches. The prime of life is not exempt from the need for rhetorical adaptation; it simply requires a more balanced combination of appeals."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
