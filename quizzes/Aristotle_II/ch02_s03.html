<script>
var QUESTIONS = [{"question": "What is the single fundamental characteristic that Aristotle identifies as common to all forms of poetry and art, such as epic verse, tragedy, and music?", "options": [{"text": "Their ability to evoke strong emotions.", "isCorrect": false, "rationale": "While art may evoke emotions, Aristotle's foundational concept discussed in the text is imitation, not the evocation of emotion, which he discusses later in relation to specific forms like tragedy."}, {"text": "Their use of structured language or melody.", "isCorrect": false, "rationale": "Aristotle describes these (language, rhythm, harmony) as 'media' of imitation, which are dimensions *by which* arts differ, not the overarching fundamental characteristic common to *all* of them. Some arts use only rhythm, others only language, etc."}, {"text": "Their function as modes of imitation (mimesis).", "isCorrect": true, "rationale": "The text explicitly states: 'All the arts we call poetry, he says, share a single fundamental characteristic. ... every one of them is a mode of imitation.'"}, {"text": "Their development from religious rituals.", "isCorrect": false, "rationale": "The text mentions dithyrambs as choral hymns sung in honor of Dionysus from which tragedy *may* have developed, but this is a specific historical development, not the fundamental characteristic of all arts according to Aristotle's theory."}], "id": "q01"}, {"question": "How does Aristotle's philosophical approach to poetry, as presented in the Poetics, fundamentally differ from Plato's perspective?", "options": [{"text": "Aristotle saw poetry as a dangerous distraction from philosophical truth, similar to Plato.", "isCorrect": false, "rationale": "This describes Plato's view, not Aristotle's. The text explicitly contrasts their views."}, {"text": "Aristotle viewed poetry with curiosity and admiration, unlike Plato's suspicion of it as imitation.", "isCorrect": true, "rationale": "The text states: 'Where Plato had viewed poetry with suspicion — as a dangerous imitation of appearances, twice removed from reality — Aristotle approached it as a philosopher and a scientist: with curiosity, careful classification, and genuine admiration.'"}, {"text": "Aristotle believed poetry's primary purpose was social utility, a concept Plato largely ignored.", "isCorrect": false, "rationale": "Aristotle roots poetry in human nature (imitation and rhythm/harmony) and the pleasure of learning, not primarily social utility. The text contrasts his view with that of a 'pragmatist' who might appeal to social utility."}, {"text": "Aristotle focused solely on the technical aspects of verse, whereas Plato examined its moral impact.", "isCorrect": false, "rationale": "Aristotle's work goes far beyond technical aspects to discuss the moral tone, objects, and purpose of imitation. Plato certainly examined moral impact, but his overall stance on poetry was suspicious."}], "id": "q02"}, {"question": "According to Aristotle, the arts differ from one another in three fundamental dimensions. Which of the following correctly lists these three dimensions?", "options": [{"text": "Theme, audience, and artistic merit.", "isCorrect": false, "rationale": "These are not the three dimensions Aristotle identifies. He focuses on the intrinsic characteristics of the imitation itself."}, {"text": "Medium, objects, and manner of imitation.", "isCorrect": true, "rationale": "The text explicitly states: 'They differ, however, from one another in three respects,—the medium, the objects, the manner or mode of imitation, being in each case distinct.'"}, {"text": "Historical period, cultural context, and author's intent.", "isCorrect": false, "rationale": "These are external factors not discussed by Aristotle as his three fundamental dimensions of difference."}, {"text": "Length, complexity, and moral message.", "isCorrect": false, "rationale": "While some of these might be characteristics of art, they are not Aristotle's three fundamental dimensions of difference."}], "id": "q03"}, {"question": "A dancer performs a routine that expresses joy and sorrow through movement alone, without music or spoken words. Based on Aristotle's classification, which medium of imitation is primarily employed here?", "options": [{"text": "Language", "isCorrect": false, "rationale": "Language involves words, which are explicitly absent in this scenario."}, {"text": "Harmony", "isCorrect": false, "rationale": "Harmony refers to tune or melodic elements, which are absent in this scenario described as 'movement alone without music'."}, {"text": "Rhythm", "isCorrect": true, "rationale": "The text states: 'In dancing, rhythm alone is used without `harmony`; for even dancing imitates character, emotion, and action, by rhythmical movement.' This scenario perfectly matches Aristotle's description."}, {"text": "A combination of all three", "isCorrect": false, "rationale": "The scenario specifies 'movement alone, without music or spoken words,' indicating only one medium is primarily used, not a combination of language, rhythm, and harmony."}], "id": "q04"}, {"question": "Aristotle states that the 'objects of imitation' distinguish tragedy from comedy. What is the core difference in how these two forms represent 'men in action'?", "options": [{"text": "Tragedy imitates men as they are, while comedy imitates men as better than they are.", "isCorrect": false, "rationale": "This statement inaccurately reverses Aristotle's definitions for tragedy and comedy, and misattributes the 'as they are' category."}, {"text": "Tragedy represents men as better than in real life, while comedy represents them as worse.", "isCorrect": true, "rationale": "The text explicitly states: 'The same distinction marks off Tragedy from Comedy; for Comedy aims at representing men as worse, Tragedy as better than in actual life.'"}, {"text": "Tragedy focuses on individual heroes, whereas comedy depicts groups of ordinary people.", "isCorrect": false, "rationale": "While tragedy often features heroes and comedy often features common people, Aristotle's primary distinction for 'objects of imitation' is whether the characters are depicted as 'better,' 'worse,' or 'as they are,' not individual vs. group focus."}, {"text": "Tragedy uses elevated language, while comedy employs everyday speech.", "isCorrect": false, "rationale": "This distinction relates to the 'medium' or 'manner' of imitation (specifically language style), but not the 'objects of imitation' which refers to the moral character of the men being depicted."}], "id": "q05"}, {"question": "What two fundamental aspects of human nature does Aristotle identify as the deep-seated origins from which poetry sprang?", "options": [{"text": "The desire for fame and the need for social commentary.", "isCorrect": false, "rationale": "While poets might seek fame or provide commentary, Aristotle identifies deeper, innate human instincts, not social or individual ambitions, as the origin of poetry."}, {"text": "The instinct for imitation and the instinct for rhythm and harmony.", "isCorrect": true, "rationale": "The text states: 'Poetry in general seems to have sprung from two causes, each of them lying deep in our nature. First, the instinct of imitation... Next, there is the instinct for `harmony` and rhythm...'"}, {"text": "Divine inspiration and the pursuit of political influence.", "isCorrect": false, "rationale": "Aristotle explicitly states he 'does not appeal to divine inspiration, as Plato sometimes did, nor to social utility, as a pragmatist might,' but rather to human nature."}, {"text": "The need for historical record-keeping and the celebration of heroes.", "isCorrect": false, "rationale": "While epic poetry might serve these functions, they are specific purposes for certain forms of poetry, not the fundamental, universal instincts Aristotle identifies as poetry's origin."}], "id": "q06"}, {"question": "Aristotle explains that humans can derive pleasure from art even when it depicts painful or terrible subjects, such as a realistic painting of a dead body. What is the underlying reason he provides for this phenomenon?", "options": [{"text": "Humans have a natural fascination with suffering and the macabre.", "isCorrect": false, "rationale": "Aristotle specifically refutes this, stating 'not because we enjoy suffering,' but because we enjoy learning."}, {"text": "The pleasure comes from the artist's skillful execution, regardless of subject.", "isCorrect": false, "rationale": "While execution can contribute to pleasure, the text indicates the primary source of pleasure from 'likeness' is the act of learning and recognition, even from subjects that would cause pain in reality."}, {"text": "Such representations offer a cathartic release of negative emotions.", "isCorrect": false, "rationale": "While Aristotle does discuss catharsis in relation to tragedy, the general explanation for pleasure from imitating painful things is tied to the 'love of learning,' not solely catharsis."}, {"text": "The pleasure arises from the act of learning and recognizing the representation, fulfilling a natural human love of understanding.", "isCorrect": true, "rationale": "The text states: 'To recognize that a representation corresponds to reality is a small act of understanding, and understanding is naturally pleasurable.' It concludes: 'Aristotle's account of art is, at its core, an account of the human love of learning.'"}], "id": "q07"}, {"question": "If an author publishes a detailed treatise on medicine written entirely in hexameter verse, how would Aristotle likely classify this author?", "options": [{"text": "As a poet, because the use of verse is the defining characteristic of poetry.", "isCorrect": false, "rationale": "Aristotle explicitly argues against this: 'as if it were not the imitation that makes the poet, but the verse that entitles them all indiscriminately to the name. Even when a treatise on medicine or natural science is brought out in verse, the name of poet is by custom given to the author; and yet Homer and Empedocles have nothing in common but the metre, so that it would be right to call the one poet, the other physicist rather than poet.'"}, {"text": "As primarily a physicist or medical writer, because the content (imitation of science) rather than the metre defines the work.", "isCorrect": true, "rationale": "Aristotle makes this precise point when discussing Empedocles: 'it would be right to call the one poet, the other physicist rather than poet,' emphasizing that imitation, not metre, makes a poet."}, {"text": "As an elegiac poet, due to the specific metre employed.", "isCorrect": false, "rationale": "While hexameter is a metre, Aristotle rejects the idea that the metre alone defines the *kind* of poet if the content isn't poetic imitation of human action."}, {"text": "As a tragic poet, if the subject matter involves human suffering.", "isCorrect": false, "rationale": "A medical treatise, even if discussing suffering, does not qualify as tragic poetry in Aristotle's sense because its 'object' is scientific explanation, not the imitation of 'men in action' depicted as better than in real life."}], "id": "q08"}, {"question": "The text states that the distinctions based on 'objects of imitation' carry 'deep consequences.' What is the primary impact of these distinctions on artistic traditions?", "options": [{"text": "They determine the commercial success and popularity of an art form.", "isCorrect": false, "rationale": "The text discusses moral tone and different ways of illuminating human life, not commercial success or popularity, as the 'deep consequences' of these distinctions."}, {"text": "They lead to the development of different technical skills among artists.", "isCorrect": false, "rationale": "While different art forms require different skills, this is a consequence of the 'medium' of imitation more so than the 'objects' of imitation directly leading to differing technical skills."}, {"text": "They establish the moral tone of an entire artistic tradition, distinguishing between noble and ignoble representation.", "isCorrect": true, "rationale": "The text states: 'The objects of imitation — 'men in action,' depicted as better, worse, or about the same as ordinary people — determine the moral tone of a whole artistic tradition.'"}, {"text": "They dictate the appropriate venue and audience for different types of performance.", "isCorrect": false, "rationale": "This is a practical consideration not discussed as a primary consequence of the 'objects of imitation' in the provided text."}], "id": "q09"}, {"question": "Aristotle refers to Homer as 'pre-eminent among poets' and notes his role in the development of both serious and comedic styles. How does Homer exemplify Aristotle's ideas about the divergence of poetry based on the character of writers?", "options": [{"text": "Homer's works primarily focused on trivial actions, laying the groundwork for satire.", "isCorrect": false, "rationale": "The text states Homer makes 'men better than they are' in his epics, which places him in the serious style. While he wrote Margites, which was satirical, his primary renown is for serious, noble imitation."}, {"text": "Homer alone combined dramatic form with excellent imitation of noble actions, and also dramatized the ludicrous for comedy.", "isCorrect": true, "rationale": "The text states: 'As, in the serious style, Homer is pre-eminent among poets, for he alone combined dramatic form with excellence of imitation, so he too first laid down the main lines of Comedy, by dramatising the ludicrous instead of writing personal satire'."}, {"text": "Homer was unique in his time for writing only in iambic verse, which was later adopted for lampoons.", "isCorrect": false, "rationale": "Homer is known for epic (hexameter) verse, not exclusively iambic. The iambic measure was 'introduced' for lampooning, not solely by Homer."}, {"text": "Homer avoided depicting men as better or worse, focusing instead on realistic portrayals that transcended these categories.", "isCorrect": false, "rationale": "The text specifically mentions Homer as an example of an artist who 'makes men better than they are,' clearly placing him within the 'better' category of imitation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
