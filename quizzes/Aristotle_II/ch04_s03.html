    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Aristotle_II.html">&larr; Back to The Life of Words (Aristotle II)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 4, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Aristotle's classification of metaphors, using the term \"ten thousand\" to describe a large number in general is an example of which type of transference?", "options": [{"text": "From genus to species", "isCorrect": false, "rationale": "This would involve using a general category to describe a specific item, such as calling an anchor 'lying' generally."}, {"text": "From species to genus", "isCorrect": true, "rationale": "The specific number 'ten thousand' is a species of the broader genus 'large number' and is used here to represent that general category."}, {"text": "From species to species", "isCorrect": false, "rationale": "This type of metaphor involves replacing one specific term with another specific term within the same broader category."}, {"text": "By analogy or proportion", "isCorrect": false, "rationale": "Analogy requires four terms where the second is to the first as the fourth is to the third, rather than a simple categorical relationship."}], "id": "q01"}, {"question": "Aristotle argues that a style composed entirely of metaphors results in what specific literary failure?", "options": [{"text": "A jargon", "isCorrect": false, "rationale": "Aristotle defines jargon as a style composed entirely of strange or rare words rather than metaphors."}, {"text": "A riddle", "isCorrect": true, "rationale": "The essence of a riddle, according to Aristotle, is to express true facts through impossible combinations, which is the result of using metaphors exclusively."}, {"text": "Meanness", "isCorrect": false, "rationale": "Meanness is the result of using only current or proper words, which provides clarity but lacks elevation."}, {"text": "An epic", "isCorrect": false, "rationale": "Epic poetry requires a balance of diction and is defined by its narrative structure rather than a singular reliance on metaphor."}], "id": "q02"}, {"question": "Why does Aristotle consider Homer's construction of the $Iliad$ to be superior to that of poets who wrote the $Cypria$ or the $Little$ $Iliad$?", "options": [{"text": "Homer included the entire history of the Trojan War from beginning to end.", "isCorrect": false, "rationale": "Aristotle specifically notes that Homer did not try to make the whole war his subject, as it would have been too vast and complicated."}, {"text": "Homer focused on a single hero throughout his entire life cycle.", "isCorrect": false, "rationale": "Aristotle criticizes poets who take a single person or period as their subject without maintaining unity of action."}, {"text": "Homer detached a single portion of the war and used other events as episodes.", "isCorrect": true, "rationale": "By focusing on a single action and diversifying it with episodes, Homer maintained the unity and dramatic structure necessary for excellence."}, {"text": "Homer utilized multiple different metres to keep the audience engaged.", "isCorrect": false, "rationale": "Homer strictly used the heroic measure, which Aristotle argues is the only appropriate metre for a poem on a great scale."}], "id": "q03"}, {"question": "In the context of poetic diction, what constitutes an \"altered word\"?", "options": [{"text": "A word where its vowel is exchanged for a longer one.", "isCorrect": false, "rationale": "This describes a 'lengthened' word, not an 'altered' one."}, {"text": "A word in which part of the ordinary form is kept and part is re-cast.", "isCorrect": true, "rationale": "Aristotle defines an altered word as one that retains part of its original form while another part is modified by the poet."}, {"text": "A word that has been shortened by removing a syllable.", "isCorrect": false, "rationale": "This defines a 'contracted' word."}, {"text": "A word that has never been in local use and is newly adopted by the poet.", "isCorrect": false, "rationale": "This refers to a 'newly-coined' word."}], "id": "q04"}, {"question": "Aristotle identifies one specific element of diction as the \"mark of genius\" because it cannot be taught and implies an \"eye for resemblances.\" Which element is it?", "options": [{"text": "The use of rare or strange words", "isCorrect": false, "rationale": "Strange words can be learned through study and practice, unlike the natural gift Aristotle highlights."}, {"text": "The command of metaphor", "isCorrect": true, "rationale": "Aristotle insists that the ability to see resemblances between unlike things is a natural gift and the most important aspect of style."}, {"text": "The lengthening of syllables", "isCorrect": false, "rationale": "Aristotle notes that critics often ridicule this practice as an 'easy' way to be a poet, implying it lacks the prestige of metaphor."}, {"text": "The construction of compound words", "isCorrect": false, "rationale": "While compound words are suited for dithyrambs, they do not hold the same status as the primary indicator of natural genius."}], "id": "q05"}, {"question": "According to the $Poetics$, how does Epic poetry differ from Tragedy regarding the scale of imitation?", "options": [{"text": "Epic can present many events transacted simultaneously.", "isCorrect": true, "rationale": "Tragedy is confined to the action on stage, while the narrative form of Epic allows for the presentation of multiple simultaneous events."}, {"text": "Tragedy has a greater capacity for enlarging its dimensions.", "isCorrect": false, "rationale": "Tragedy must be more concentrated, whereas the narrative form gives Epic a special capacity for mass and dignity."}, {"text": "Epic poetry is restricted to a single line of action carried out in one place.", "isCorrect": false, "rationale": "This restriction applies to Tragedy, whereas Epic can branch out into simultaneous narrative lines."}, {"text": "Epic poems must be shorter than a group of tragedies performed at one sitting.", "isCorrect": false, "rationale": "Aristotle suggests that the length of an epic should ideally correspond to a group of tragedies, but it has the capacity to be much larger due to its narrative nature."}], "id": "q06"}, {"question": "When defending poetry against critics who point out technical inaccuracies (e.g., a hind having no horns), what is Aristotle's primary counter-argument?", "options": [{"text": "Technical inaccuracies are essential to the beauty of the verse.", "isCorrect": false, "rationale": "Aristotle says errors should be avoided if possible; they are not inherently beautiful, though they might be justified."}, {"text": "The standard of correctness in poetry is the same as in medicine or politics.", "isCorrect": false, "rationale": "Aristotle explicitly states that the standard of correctness in poetry is *not* the same as in other arts or sciences."}, {"text": "Such errors are accidental to the art of poetry rather than inherent in its essence.", "isCorrect": true, "rationale": "Aristotle distinguishes between a failure of artistic imitation and a simple lack of factual or technical knowledge."}, {"text": "Poets should only imitate things exactly as they were or are.", "isCorrect": false, "rationale": "Aristotle notes that poets can also imitate things as they are said to be or as they ought to be."}], "id": "q07"}, {"question": "Why does Aristotle conclude that Tragedy is a higher form of art than Epic?", "options": [{"text": "It is much longer and therefore more impressive.", "isCorrect": false, "rationale": "Actually, Tragedy's superiority comes partly from its concentration and shorter limits compared to the 'diluted' effect of a long epic."}, {"text": "It lacks the 'unrefined' element of gesticulation found in acting.", "isCorrect": false, "rationale": "The criticism of gesticulation was leveled *against* tragedy, though Aristotle refutes it by saying it's a fault of the performers, not the art."}, {"text": "It attains its end and produces its specific pleasure more perfectly and in less time.", "isCorrect": true, "rationale": "Tragedy is more concentrated and vivid, containing all the elements of epic plus music and spectacle, making it more efficient in its artistic impact."}, {"text": "It uses more proper words and fewer metaphors than Epic.", "isCorrect": false, "rationale": "Tragedy uses metaphors and rare words appropriately; its status as a 'higher' art is not based on avoiding them but on its structural effectiveness."}], "id": "q08"}, {"question": "Aristotle mentions that the \"heroic measure\" is the most appropriate metre for Epic. What qualities does he attribute to this metre?", "options": [{"text": "It is stirring and akin to dancing.", "isCorrect": false, "rationale": "Aristotle describes the trochaic tetrameter as being akin to dancing, not the heroic measure."}, {"text": "It is the stateliest and most massive of all measures.", "isCorrect": true, "rationale": "The heroic measure (hexameter) is described as being massive enough to easily admit the rare words and metaphors typical of narrative imitation."}, {"text": "It is the measure that most closely reproduces familiar speech.", "isCorrect": false, "rationale": "Iambic verse is the measure that most closely reproduces familiar speech and prose."}, {"text": "It was invented by Chaeremon to mix different metres together.", "isCorrect": false, "rationale": "Aristotle uses Chaeremon as an example of an 'absurd' practice of mixing metres, which is the opposite of the heroic measure's fitness."}], "id": "q09"}, {"question": "What is the result of a style that uses *only* current or proper words, according to Aristotle?", "options": [{"text": "It becomes lofty and raised above the commonplace.", "isCorrect": false, "rationale": "Loftiness requires the infusion of unusual words, not just current ones."}, {"text": "It is clear but mean (low).", "isCorrect": true, "rationale": "Aristotle explains that while current words provide clarity, a style using only them lacks artistic distinction and remains 'mean'."}, {"text": "It results in a total jargon.", "isCorrect": false, "rationale": "Jargon results from strange words, whereas current words result in the opposite—flatness."}, {"text": "It is artistically perfect because it avoids riddles.", "isCorrect": false, "rationale": "Aristotle defines the perfection of style as being clear *without* being mean, requiring a balance of common and unusual terms."}], "id": "q10"}, {"question": "Aristotle uses the example of the sun \"scattering his rays\" compared to a farmer \"scattering seed\" to illustrate which type of metaphor?", "options": [{"text": "Species to species", "isCorrect": false, "rationale": "This would involve two specific actions that are already named; in this case, one of the actions (sun's scattering) is nameless."}, {"text": "Analogy or proportion", "isCorrect": true, "rationale": "Even though the action of the sun is nameless, it bears the same relation to the sun as sowing does to seed, allowing for a metaphorical proportion."}, {"text": "Lengthened metaphor", "isCorrect": false, "rationale": "Lengthening is a modification of a single word's form, not a conceptual transfer of meaning."}, {"text": "Genus to species", "isCorrect": false, "rationale": "This would involve taking a general term and applying it to a sub-category, which doesn't fit the 'nameless' comparison described."}], "id": "q11"}, {"question": "In the defense of poetry (Chapter XXV), Aristotle says that if a description is neither \"true to fact\" nor \"as it ought to be,\" the poet may justify it by appealing to:", "options": [{"text": "Scientific laws discovered since the time of the poet.", "isCorrect": false, "rationale": "Aristotle's focus is on artistic and cultural justification, not anachronistic scientific updates."}, {"text": "What men say or what is commonly believed.", "isCorrect": true, "rationale": "Aristotle notes that poets often describe things (like stories of the gods) based on traditional tales or received opinion, even if they aren't 'fact'."}, {"text": "The poet's own private hallucinations.", "isCorrect": false, "rationale": "Poetry is an imitation of reality or shared belief, not merely a record of personal delusion."}, {"text": "The necessity of making the poem as long as possible.", "isCorrect": false, "rationale": "Length is not a justification for factual error; errors are justified by the 'end of the art' (impact/effect)."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
