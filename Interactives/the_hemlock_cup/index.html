<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Hemlock Cup</title>
  <link rel="stylesheet" href="style.css" />
  <script src="story_data.js"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-brand">
        <span class="header-icon" aria-hidden="true">HC</span>
        <span class="header-title">The Hemlock Cup</span>
      </div>
      <div class="header-right">
        <button class="graph-btn" id="graph-btn" title="View story stats">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          Map
        </button>
      </div>
    </div>
  </header>
  <main>
    <div class="card" id="story-card">
      <div class="card-meta" id="card-meta"></div>
      <h1 class="story-title" id="story-title"></h1>
      <div class="story-text" id="story-text"></div>
      <div class="footnotes" id="footnotes" hidden></div>
      <div class="choices" id="choices"></div>
      <div class="ending-row" id="ending-row" hidden>
        <button class="restart-btn" id="restart-btn">&#8634; &nbsp;Start Again</button>
      </div>
    </div>
    <nav class="path-nav" id="path-nav" aria-label="Journey path"></nav>
  </main>
  <script src="app.js"></script>
</body>
</html>
