        .mm-breadcrumb { text-align: center; margin-bottom: 2rem; }
        .mm-breadcrumb a {
            color: var(--secondary-color); text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);

        }
        .mm-breadcrumb a:hover { background: var(--secondary-color); color: white; }
        .mm-controls {
            text-align: center; margin-bottom: 1rem;
        }
        .mm-controls button {
            font-family: 'Crimson Text', serif; font-size: 0.9rem;
            background: transparent; color: var(--secondary-color);
            border: 1px solid var(--secondary-color);
            padding: 0.3rem 0.8rem; border-radius: 6px;
            cursor: pointer; margin: 0 0.3rem;
            transition: all 0.3s ease;
        }
        .mm-controls button:hover { background: var(--secondary-color); color: white; }
        .mm-container {
            max-width: 900px; margin: 0 auto; padding: 2rem;
            background: var(--card-background);
            border: 2px solid var(--border-color); border-radius: 12px;
        }
        .mm-container h1 {
            font-family: 'Cinzel', serif; color: var(--primary-color);
            font-size: 1.6rem; margin-bottom: 1.5rem;
            padding-bottom: 0.75rem; border-bottom: 2px solid var(--border-color);
            text-align: center;
        }
        .mm-tree { padding: 0; }
        .mm-tree ul { list-style: none; padding-left: 0; margin: 0; }
        .mm-tree > ul { padding-left: 0; }
        .mm-tree li {
            position: relative; padding: 0.25rem 0 0.25rem 1.8rem;
        }
        /* Vertical connector line from parent through children */
        .mm-tree li::before {
            content: ''; position: absolute;
            left: 0.7rem; top: 0; bottom: 0;
            width: 1px; background: var(--border-color);
        }
        /* Horizontal connector line to each child node */
        .mm-tree li::after {
            content: ''; position: absolute;
            left: 0.7rem; top: 1.1rem;
            width: 0.8rem; height: 1px;
            background: var(--border-color);
        }
        /* Hide vertical line above first child */
        .mm-tree li:first-child::before { top: 1.1rem; }
        /* Hide vertical line below last child */
        .mm-tree li:last-child::before { bottom: calc(100% - 1.1rem); }
        /* No connectors on the root level */
        .mm-tree > ul > li::before,
        .mm-tree > ul > li::after { display: none; }
        .mm-tree > ul > li { padding-left: 0; }
        .mm-node {
            display: inline-block; padding: 0.35rem 0.75rem;
            border-radius: 8px; font-size: 0.95rem;
            cursor: pointer; transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .mm-node:hover { background: rgba(218,165,32,0.1); border-color: var(--border-color); }
        .mm-depth-0 {
            font-family: 'Cinzel', serif; font-size: 1.15rem; font-weight: 600;
            color: var(--primary-color); background: rgba(139,69,19,0.08);
            border-color: var(--primary-color); padding: 0.5rem 1rem;
            border-radius: 10px; margin-bottom: 0.25rem;
        }
        .mm-depth-1 {
            font-weight: 600; color: #8B4513;
            font-size: 1rem; background: rgba(139,69,19,0.04);
            border-color: rgba(139,69,19,0.15); padding: 0.3rem 0.7rem;
        }
        .mm-depth-2 {
            color: var(--text-primary); font-size: 0.95rem;
        }
        .mm-depth-3 { color: var(--text-secondary); font-size: 0.9rem; font-style: italic; }
        .mm-toggle {
            display: inline-block; width: 1.2em; text-align: center;
            color: var(--secondary-color); font-weight: bold; cursor: pointer;
            user-select: none; margin-right: 0.2rem;
            transition: transform 0.2s ease;
        }
        .mm-leaf { margin-left: 1.4em; }
        .mm-leaf::before {
            content: '\2022'; color: var(--secondary-color);
            position: absolute; left: -0.1rem; font-size: 0.8rem;
        }
        li.mm-collapsed > ul { display: none; }
        li.mm-collapsed > .mm-node .mm-toggle { transform: rotate(-90deg); }
        /* Hide connectors for collapsed children */
        li.mm-collapsed::before { bottom: calc(100% - 1.1rem); }
        /* Node count badge */
        .mm-count {
            font-size: 0.7rem; color: var(--text-secondary);
            background: rgba(218,165,32,0.12); border-radius: 4px;
            padding: 0.1rem 0.35rem; margin-left: 0.4rem;
            vertical-align: middle;
        }

    <script>
    var mmData = {
  "name": "THE ENLIGHTENMENT",
  "children": [
    {
      "name": "Foundations of the Enlightenment",
      "children": [
        {
          "name": "The Scientific Revolution",
          "children": [
            {"name": "Newton's Principia Mathematica (1687)"},
            {"name": "Universal mathematical law governs planets and apples"},
            {"name": "Universe: orderly, rational, knowable"},
            {"name": "Question: can reason unlock laws of society too?"}
          ]
        },
        {
          "name": "Descartes and Method of Doubt",
          "children": [
            {"name": "Discourse on Method (1637)"},
            {"name": "Doubted everything until reaching the undoubtable"},
            {"name": "'I think, therefore I am' (cogito ergo sum)"},
            {"name": "Shifted focus from God and tradition to individual human reason"},
            {"name": "Sincere Catholic; later thinkers used his method against faith"}
          ]
        },
        {
          "name": "Deism",
          "children": [
            {"name": "God created universe but does not intervene"},
            {"name": "God as clockmaker; universe runs on its own"},
            {"name": "Voltaire, Jefferson, Franklin held Deist views"},
            {"name": "Text: 'theological impoverishment' - not the God of Abraham"}
          ]
        }
      ]
    },
    {
      "name": "The Key Thinkers",
      "children": [
        {
          "name": "John Locke (1632-1704)",
          "children": [
            {"name": "Two Treatises of Government (1689)"},
            {"name": "State of nature: all humans naturally equal and free"},
            {"name": "Natural rights: life, liberty, and property"},
            {"name": "Social contract: consent of the governed"},
            {"name": "Right to dissolve tyrannical government"},
            {"name": "Directly influenced the Declaration of Independence"}
          ]
        },
        {
          "name": "Voltaire (1694-1778)",
          "children": [
            {"name": "Most famous/feared writer of the Enlightenment"},
            {"name": "Target: l'infame - religious intolerance and superstition"},
            {"name": "Candide (1759): satire demolishing false optimism"},
            {"name": "'We must cultivate our garden' - practical wisdom"},
            {"name": "Deist; attacked Church for cruelty, not Christianity itself"}
          ]
        },
        {
          "name": "Rousseau (1712-1778)",
          "children": [
            {"name": "'Man is born free, and everywhere he is in chains'"},
            {"name": "Civilization corrupted naturally good humans"},
            {"name": "General will: what community truly needs"},
            {"name": "Danger: general will can override individual rights"},
            {"name": "Road from Rousseau to Robespierre and the Terror"}
          ]
        },
        {
          "name": "Montesquieu (1689-1755)",
          "children": [
            {"name": "Spirit of the Laws (1748)"},
            {"name": "Studied governments empirically and comparatively"},
            {"name": "Tyranny = concentrated power"},
            {"name": "Remedy = separation of powers (legislative, executive, judicial)"},
            {"name": "Madison cited him most in The Federalist Papers"}
          ]
        }
      ]
    },
    {
      "name": "The Enlightenment in Action",
      "children": [
        {
          "name": "The Encyclopedie (1751-1772)",
          "children": [
            {"name": "Diderot and d'Alembert: 35 volumes, 70,000 articles"},
            {"name": "Church condemned it; government banned it twice"},
            {"name": "Treated craftsmen with same seriousness as theology"},
            {"name": "Implied no single authority owned truth"},
            {"name": "Sold 20,000 copies"}
          ]
        },
        {
          "name": "The American Revolution",
          "children": [
            {"name": "Declaration of Independence (1776) by Jefferson"},
            {"name": "Every phrase Lockean: natural rights, consent, right of revolution"},
            {"name": "Jefferson's addition: rights 'endowed by their Creator'"},
            {"name": "Grounded rights in God - not removable by majority vote"},
            {"name": "Contradiction: Jefferson enslaved over 600 people"}
          ]
        },
        {
          "name": "The French Revolution",
          "children": [
            {"name": "Began 1789 with genuine Enlightenment ideals"},
            {"name": "Became the Terror: 17,000 executed by guillotine"},
            {"name": "Based on Rousseau's general will; replaced Christianity with Reason"},
            {"name": "Closed churches; renamed Notre-Dame 'Temple of Reason'"},
            {"name": "Ended with Napoleon's dictatorship (1799)"},
            {"name": "Burke: tradition more reliable than abstract theory"}
          ]
        }
      ]
    },
    {
      "name": "The Christian Assessment",
      "children": [
        {
          "name": "What the Enlightenment Got Right",
          "children": [
            {"name": "Natural rights have roots in Christian natural law (Aquinas)"},
            {"name": "Jefferson grounded rights in the Creator"},
            {"name": "Constitutional government, religious toleration, abolition of torture"}
          ]
        },
        {
          "name": "What the Enlightenment Got Wrong",
          "children": [
            {"name": "Rousseau: general will can justify forced 'freedom'"},
            {"name": "Deism: reduced God to an absent clockmaker"},
            {"name": "Without humility about human sinfulness, reason becomes utopian"},
            {"name": "French Revolution: proof that reason without Christian restraint produces tyranny"}
          ]
        }
      ]
    }
  ]
}
;

    /* Render text with optional KaTeX math: $...$ delimiters or common patterns */
    function renderMath(text, container) {
        /* First handle explicit $...$ delimiters */
        var dollarRe = /\$([^$]+)\$/g;
        if (dollarRe.test(text) && typeof katex !== 'undefined') {
            var parts = text.split(/(\$[^$]+\$)/);
            parts.forEach(function(part) {
                if (part.startsWith('$') && part.endsWith('$')) {
                    var mathStr = part.slice(1, -1);
                    try {
                        var mathSpan = document.createElement('span');
                        katex.render(mathStr, mathSpan, { throwOnError: false, displayMode: false });
                        container.appendChild(mathSpan);
                        return;
                    } catch(e) { /* fall through */ }
                }
                container.appendChild(document.createTextNode(part));
            });
            return;
        }
        /* Heuristic: detect common math patterns (exponents, fractions, symbols) */
        var mathPatterns = /[a-zA-Z]\^[0-9]|\d+[a-zA-Z]\s*[+\-]|[+\-*/]=|\bsqrt\b|\bfrac\b|[<>]=?\s*\d|\(.*[a-zA-Z].*[+\-*/].*\)/;
        if (mathPatterns.test(text) && typeof katex !== 'undefined') {
            /* Split on label prefixes like "Format:" to only math-ify the value */
            var labelParts = text.split(/(:\s+)/);
            labelParts.forEach(function(part, idx) {
                if (idx > 0 && mathPatterns.test(part)) {
                    var mathStr = part.trim()
                        .replace(/([a-zA-Z0-9])\/([a-zA-Z0-9])/g, '\\frac{$1}{$2}');
                    try {
                        var mathSpan = document.createElement('span');
                        katex.render(mathStr, mathSpan, { throwOnError: false, displayMode: false });
                        container.appendChild(mathSpan);
                        return;
                    } catch(e) { /* fall through */ }
                }
                container.appendChild(document.createTextNode(part));
            });
            return;
        }
        container.appendChild(document.createTextNode(text));
    }

    function countDescendants(node) {
        if (!node.children || node.children.length === 0) return 0;
        var total = node.children.length;
        node.children.forEach(function(c) { total += countDescendants(c); });
        return total;
    }

    function buildTree(node, depth) {
        var li = document.createElement('li');
        var span = document.createElement('span');
        span.className = 'mm-node mm-depth-' + Math.min(depth, 3);
        var hasKids = node.children && node.children.length > 0;
        if (hasKids) {
            var toggle = document.createElement('span');
            toggle.className = 'mm-toggle';
            toggle.textContent = '\u25BC';
            span.appendChild(toggle);
            var textSpan = document.createElement('span');
            renderMath(' ' + node.name, textSpan);
            span.appendChild(textSpan);
            /* Show child count badge */
            var count = countDescendants(node);
            if (count > 2) {
                var badge = document.createElement('span');
                badge.className = 'mm-count';
                badge.textContent = count;
                span.appendChild(badge);
            }
            li.addEventListener('click', function(e) {
                e.stopPropagation();
                li.classList.toggle('mm-collapsed');
            });
        } else {
            span.classList.add('mm-leaf');
            renderMath(node.name, span);
        }
        li.appendChild(span);
        if (hasKids) {
            var ul = document.createElement('ul');
            node.children.forEach(function(child) { ul.appendChild(buildTree(child, depth + 1)); });
            li.appendChild(ul);
        }
        return li;
    }

    function expandAll() {
        document.querySelectorAll('#mindmap-tree li.mm-collapsed').forEach(function(li) {
            li.classList.remove('mm-collapsed');
        });
    }
    function collapseAll() {
        document.querySelectorAll('#mindmap-tree li').forEach(function(li) {
            if (li.querySelector('ul')) li.classList.add('mm-collapsed');
        });
    }

    var root = document.getElementById('mindmap-tree');
    var h1 = document.createElement('h1');
    h1.textContent = mmData.name;
    root.appendChild(h1);
    if (mmData.children) {
        var ul = document.createElement('ul');
        mmData.children.forEach(function(child) { ul.appendChild(buildTree(child, 1)); });
        root.appendChild(ul);
    }
    </script>
