        .mm-tree > ul { padding-left: 0; }
        .mm-tree li {
            position: relative; padding: 0.25rem 0 0.25rem 1.8rem;
        }
        /* Vertical connector line from parent through children */
        .mm-tree li::before {
            content: ''; position: absolute;
            left: 0.7rem; top: 0; bottom: 0;
            width: 1px; background: var(--border-color);
        }
        /* Horizontal connector line to each child node */
        .mm-tree li::after {

        /* Hide vertical line above first child */

        /* Hide vertical line below last child */
        .mm-tree li:last-child::before { bottom: calc(100% - 1.1rem); }
        /* No connectors on the root level */
        .mm-tree > ul > li::before,
        .mm-tree > ul > li::after { display: none; }
        .mm-tree > ul > li { padding-left: 0; }
        .mm-node {

    <script>
    var mmData = {
  "name": "VIS / VID — To See",
  "children": [
    {
      "name": "Origin & Meaning",
      "children": [
        {
          "name": "Latin source",
          "children": [
            {"name": "videre — to see"},
            {"name": "Past participle: visus (seen)"},
            {"name": "vis- from visus; vid- from the verb stem videre"},
            {"name": "Old French veoir → English view (distant variant)"}
          ]
        },
        {
          "name": "Historical context",
          "children": [
            {"name": "Roman courtroom: evidentia — proof so clear it can be seen by all"},
            {"name": "Romans equated seeing with understanding and grasping truth"},
            {"name": "Oversight (supervisory power) encoded seeing from above as governance"}
          ]
        },
        {
          "name": "How it entered English",
          "children": [
            {"name": "vis- form: words about sight and appearance (visible, vision, visual)"},
            {"name": "vid- form: words about knowledge and provision (evident, provide, video)"},
            {"name": "view: via Old French veoir (more distant phonological change)"}
          ]
        }
      ]
    },
    {
      "name": "Word Family by Prefix",
      "children": [
        {
          "name": "Base Forms (no prefix)",
          "children": [
            {
              "name": "visible = vis + -ible",
              "children": [{"name": "Able to be seen; perceptible to the eye"}]
            },
            {
              "name": "vision = vis + -ion",
              "children": [{"name": "The ability to see; a mental image of the future"}]
            },
            {
              "name": "visual = vis + -ual",
              "children": [{"name": "Relating to sight or the sense of seeing"}]
            },
            {
              "name": "video = vid + -eo",
              "children": [
                {"name": "Latin first-person present: 'I see'"},
                {"name": "A recording of moving images; borrowed directly in 20th century"}
              ]
            }
          ]
        },
        {
          "name": "e- (out, clearly)",
          "children": [
            {
              "name": "evident = e- + vid + -ent",
              "children": [{"name": "Clearly seen; standing out so plainly it cannot be denied"}]
            }
          ]
        },
        {
          "name": "super- (over, above)",
          "children": [
            {
              "name": "supervise = super- + vis + -e",
              "children": [{"name": "To see over; to watch and direct the work of others from above"}]
            }
          ]
        },
        {
          "name": "re- (again)",
          "children": [
            {
              "name": "revise = re- + vis + -e",
              "children": [{"name": "To see again; to look at one's work a second time in order to improve it"}]
            }
          ]
        },
        {
          "name": "pro- (ahead, before)",
          "children": [
            {
              "name": "provide = pro- + vid + -e",
              "children": [{"name": "To see ahead (vid- variant); to prepare for the future; to supply what is needed"}]
            }
          ]
        }
      ]
    },
    {
      "name": "Suffix Patterns",
      "children": [
        {
          "name": "-ible (able to be)",
          "children": [{"name": "visible — able to be seen"}]
        },
        {
          "name": "-ion (act or state of)",
          "children": [{"name": "vision — the state/act of seeing"}]
        },
        {
          "name": "-ual (relating to)",
          "children": [{"name": "visual — relating to sight"}]
        },
        {
          "name": "-ent (having the quality of)",
          "children": [{"name": "evident — having the quality of being clearly seen"}]
        },
        {
          "name": "-eo (Latin verb ending: 'I')",
          "children": [{"name": "video — literally 'I see' (first-person singular present)"}]
        }
      ]
    },
    {
      "name": "Variant Forms",
      "children": [
        {
          "name": "vis- (from past participle visus)",
          "children": [
            {"name": "visible, vision, visual, supervise, revise"},
            {"name": "Emphasizes sight as result or ongoing state"}
          ]
        },
        {
          "name": "vid- (from verb stem videre)",
          "children": [
            {"name": "video, evident, provide"},
            {"name": "Emphasizes the active process of seeing/knowing"}
          ]
        },
        {
          "name": "view (via Old French veoir)",
          "children": [
            {"name": "Phonologically distant but etymologically connected"},
            {"name": "review, preview, overview — same prefix logic applies"}
          ]
        }
      ]
    },
    {
      "name": "Root Connections",
      "children": [
        {
          "name": "vis/vid completes the senses progression",
          "children": [
            {"name": "voc (Ch. 1): voice / speaking"},
            {"name": "dict (Ch. 2): saying / declaring"},
            {"name": "aud (Ch. 3): hearing / listening"},
            {"name": "scrib (Ch. 4): writing / recording"},
            {"name": "vis/vid (Ch. 5): seeing / understanding"}
          ]
        },
        {
          "name": "Seeing = Knowing in Latin thought",
          "children": [
            {"name": "Evidence comes from e- + vid = 'clearly seen'"},
            {"name": "This connection runs forward into cogn (Ch. 7)"},
            {"name": "Perceiving leads to understanding leads to knowing"}
          ]
        },
        {
          "name": "Fun fact: video",
          "children": [
            {"name": "Borrowed directly from Latin in the 20th century"},
            {"name": "The name announces 'I see!' in 2000-year-old Latin every time you watch a clip"}
          ]
        }
      ]
    }
  ]
}
;

    /* Render text with optional KaTeX math: $...$ delimiters or common patterns */
    function renderMath(text, container) {
        /* First handle explicit $...$ delimiters */
        var dollarRe = /\$([^$]+)\$/g;
        if (dollarRe.test(text) && typeof katex !== 'undefined') {
            var parts = text.split(/(\$[^$]+\$)/);
            parts.forEach(function(part) {
                if (part.startsWith('$') && part.endsWith('$')) {
                    var mathStr = part.slice(1, -1);
                    try {
                        var mathSpan = document.createElement('span');
                        katex.render(mathStr, mathSpan, { throwOnError: false, displayMode: false });
                        container.appendChild(mathSpan);
                        return;
                    } catch(e) { /* fall through */ }
                }
                container.appendChild(document.createTextNode(part));
            });
            return;
        }
        /* Heuristic: detect common math patterns (exponents, fractions, symbols) */
        var mathPatterns = /[a-zA-Z]\^[0-9]|\d+[a-zA-Z]\s*[+\-]|[+\-*/]=|\bsqrt\b|\bfrac\b|[<>]=?\s*\d|\(.*[a-zA-Z].*[+\-*/].*\)/;
        if (mathPatterns.test(text) && typeof katex !== 'undefined') {
            /* Split on label prefixes like "Format:" to only math-ify the value */
            var labelParts = text.split(/(:\s+)/);
            labelParts.forEach(function(part, idx) {
                if (idx > 0 && mathPatterns.test(part)) {
                    var mathStr = part.trim()
                        .replace(/([a-zA-Z0-9])\/([a-zA-Z0-9])/g, '\\frac{$1}{$2}');
                    try {
                        var mathSpan = document.createElement('span');
                        katex.render(mathStr, mathSpan, { throwOnError: false, displayMode: false });
                        container.appendChild(mathSpan);
                        return;
                    } catch(e) { /* fall through */ }
                }
                container.appendChild(document.createTextNode(part));
            });
            return;
        }
        container.appendChild(document.createTextNode(text));
    }

    function countDescendants(node) {
        if (!node.children || node.children.length === 0) return 0;
        var total = node.children.length;
        node.children.forEach(function(c) { total += countDescendants(c); });
        return total;
    }

    function buildTree(node, depth) {
        var li = document.createElement('li');
        var span = document.createElement('span');
        span.className = 'mm-node mm-depth-' + Math.min(depth, 3);
        var hasKids = node.children && node.children.length > 0;
        if (hasKids) {
            var toggle = document.createElement('span');
            toggle.className = 'mm-toggle';
            toggle.textContent = '\u25BC';
            span.appendChild(toggle);
            var textSpan = document.createElement('span');
            renderMath(' ' + node.name, textSpan);
            span.appendChild(textSpan);
            /* Show child count badge */
            var count = countDescendants(node);
            if (count > 2) {
                var badge = document.createElement('span');
                badge.className = 'mm-count';
                badge.textContent = count;
                span.appendChild(badge);
            }
            li.addEventListener('click', function(e) {
                e.stopPropagation();
                li.classList.toggle('mm-collapsed');
            });
        } else {
            span.classList.add('mm-leaf');
            renderMath(node.name, span);
        }
        li.appendChild(span);
        if (hasKids) {
            var ul = document.createElement('ul');
            node.children.forEach(function(child) { ul.appendChild(buildTree(child, depth + 1)); });
            li.appendChild(ul);
        }
        return li;
    }

    function expandAll() {
        document.querySelectorAll('#mindmap-tree li.mm-collapsed').forEach(function(li) {
            li.classList.remove('mm-collapsed');
        });
    }
    function collapseAll() {
        document.querySelectorAll('#mindmap-tree li').forEach(function(li) {
            if (li.querySelector('ul')) li.classList.add('mm-collapsed');
        });
    }

    var root = document.getElementById('mindmap-tree');
    var h1 = document.createElement('h1');
    h1.textContent = mmData.name;
    root.appendChild(h1);
    if (mmData.children) {
        var ul = document.createElement('ul');
        mmData.children.forEach(function(child) { ul.appendChild(buildTree(child, 1)); });
        root.appendChild(ul);
    }
    </script>
