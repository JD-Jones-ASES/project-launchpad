    <style>
        .mm-breadcrumb { text-align: center; margin-bottom: 2rem; }
        .mm-breadcrumb a {
            color: var(--secondary-color); text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem; border-radius: 6px;
            transition: all 0.3s ease;
        }
        .mm-breadcrumb a:hover { background: var(--secondary-color); color: white; }
        .mm-controls {
            text-align: center; margin-bottom: 1rem;
        }
        .mm-controls button {
            font-family: 'Crimson Text', serif; font-size: 0.9rem;
            background: transparent; color: var(--secondary-color);
            border: 1px solid var(--secondary-color);
            padding: 0.3rem 0.8rem; border-radius: 6px;
            cursor: pointer; margin: 0 0.3rem;
            transition: all 0.3s ease;
        }
        .mm-controls button:hover { background: var(--secondary-color); color: white; }
        .mm-container {
            max-width: 900px; margin: 0 auto; padding: 2rem;
            background: var(--card-background);
            border: 2px solid var(--border-color); border-radius: 12px;
        }
        .mm-container h1 {
            font-family: 'Cinzel', serif; color: var(--primary-color);
            font-size: 1.6rem; margin-bottom: 1.5rem;
            padding-bottom: 0.75rem; border-bottom: 2px solid var(--border-color);
            text-align: center;
        }
        .mm-tree { padding: 0; }
        .mm-tree ul { list-style: none; padding-left: 0; margin: 0; }
        .mm-tree > ul { padding-left: 0; }
        .mm-tree li {
            position: relative; padding: 0.25rem 0 0.25rem 1.8rem;
        }
        /* Vertical connector line from parent through children */
        .mm-tree li::before {
            content: ''; position: absolute;
            left: 0.7rem; top: 0; bottom: 0;
            width: 1px; background: var(--border-color);
        }
        /* Horizontal connector line to each child node */
        .mm-tree li::after {
            content: ''; position: absolute;
            left: 0.7rem; top: 1.1rem;
            width: 0.8rem; height: 1px;
            background: var(--border-color);
        }
        /* Hide vertical line above first child */
        .mm-tree li:first-child::before { top: 1.1rem; }
        /* Hide vertical line below last child */
        .mm-tree li:last-child::before { bottom: calc(100% - 1.1rem); }
        /* No connectors on the root level */
        .mm-tree > ul > li::before,
        .mm-tree > ul > li::after { display: none; }
        .mm-tree > ul > li { padding-left: 0; }
        .mm-node {
            display: inline-block; padding: 0.35rem 0.75rem;
            border-radius: 8px; font-size: 0.95rem;
            cursor: pointer; transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .mm-node:hover { background: rgba(218,165,32,0.1); border-color: var(--border-color); }
        .mm-depth-0 {
            font-family: 'Cinzel', serif; font-size: 1.15rem; font-weight: 600;
            color: var(--primary-color); background: rgba(139,69,19,0.08);
            border-color: var(--primary-color); padding: 0.5rem 1rem;
            border-radius: 10px; margin-bottom: 0.25rem;
        }
        .mm-depth-1 {
            font-weight: 600; color: #8B4513;
            font-size: 1rem; background: rgba(139,69,19,0.04);
            border-color: rgba(139,69,19,0.15); padding: 0.3rem 0.7rem;
        }
        .mm-depth-2 {
            color: var(--text-primary); font-size: 0.95rem;
        }
        .mm-depth-3 { color: var(--text-secondary); font-size: 0.9rem; font-style: italic; }
        .mm-toggle {
            display: inline-block; width: 1.2em; text-align: center;
            color: var(--secondary-color); font-weight: bold; cursor: pointer;
            user-select: none; margin-right: 0.2rem;
            transition: transform 0.2s ease;
        }
        .mm-leaf { margin-left: 1.4em; }
        .mm-leaf::before {
            content: '\2022'; color: var(--secondary-color);
            position: absolute; left: -0.1rem; font-size: 0.8rem;
        }
        li.mm-collapsed > ul { display: none; }
        li.mm-collapsed > .mm-node .mm-toggle { transform: rotate(-90deg); }
        /* Hide connectors for collapsed children */
        li.mm-collapsed::before { bottom: calc(100% - 1.1rem); }
        /* Node count badge */
        .mm-count {
            font-size: 0.7rem; color: var(--text-secondary);
            background: rgba(218,165,32,0.12); border-radius: 4px;
            padding: 0.1rem 0.35rem; margin-left: 0.4rem;
            vertical-align: middle;
        }

    <script>
    var mmData = {
  "name": "THE RISE OF THE ROMAN REPUBLIC",
  "children": [
    {
      "name": "Roman Origins and Legends",
      "children": [
        {
          "name": "Founding Myths",
          "children": [
            {"name": "Romulus and Remus: divine parentage (Mars), nursed by she-wolf, Rome founded 753 BC"},
            {"name": "Aeneas: Trojan prince carrying father and household gods — image of pietas"},
            {"name": "Origin stories answer: 'Who are we, and what do we stand for?'"},
            {"name": "Even educated Romans preserved legends because they revealed Rome's values"}
          ]
        },
        {
          "name": "From Monarchy to Republic",
          "children": [
            {"name": "Seven kings after Romulus, some wise (Numa Pompilius), some warlike"},
            {"name": "Tarquinius Superbus (Tarquin the Proud): ruled by intimidation, executed citizens without trial"},
            {"name": "His son's violation of Lucretia; Brutus rallies Romans and expels the Tarquins (509 BC)"},
            {"name": "Romans swear never again to be ruled by a king"}
          ]
        }
      ]
    },
    {
      "name": "Republican Institutions",
      "children": [
        {
          "name": "Consuls",
          "children": [
            {"name": "Two annually elected chief magistrates with full imperium"},
            {"name": "Each holds intercessio (veto) over the other — prevents single-man rule"},
            {"name": "In military emergencies: dictator appointed for maximum six months"},
            {"name": "Commanded the army and presided over the Senate"}
          ]
        },
        {
          "name": "Senate and Tribunes",
          "children": [
            {"name": "Senate: experienced former magistrates; controlled finances, foreign policy, military commands"},
            {"name": "Senate decrees (senatus consulta) not formally laws but almost always obeyed"},
            {"name": "Tribunes of the Plebs: ten annually elected; persons sacrosanct"},
            {"name": "Tribunes could veto any magistrate's action affecting a plebeian"}
          ]
        },
        {
          "name": "Cursus Honorum",
          "children": [
            {"name": "Required sequence: quaestor → aedile → praetor → consul → censor"},
            {"name": "Minimum age and waiting period between each office"},
            {"name": "Ensured leaders were tested and experienced before reaching highest office"}
          ]
        },
        {
          "name": "Twelve Tables (451-450 BC)",
          "children": [
            {"name": "First written law code; twelve bronze tablets displayed publicly in Forum"},
            {"name": "Before them: patrician judges applied unwritten law however they wished"},
            {"name": "Written, public law = law knowable, consistent, binding on rich and poor alike"},
            {"name": "Compared to Solon's reforms in Athens: same function of legal accountability"}
          ]
        }
      ]
    },
    {
      "name": "Roman Virtues",
      "children": [
        {
          "name": "Three Core Virtues",
          "children": [
            {"name": "Virtus: from vir (man) — courage and excellence in service of the community"},
            {"name": "Pietas: dutiful devotion to gods, family, and state (pius Aeneas)"},
            {"name": "Gravitas: seriousness, weight, dignity appropriate to public responsibility"},
            {"name": "Fides: faithfulness — keeping one's word regardless of cost; foundation of social life"}
          ]
        },
        {
          "name": "Moral Exemplars",
          "children": [
            {"name": "Horatius: holds bridge alone while comrades demolish it; courage for community, not glory"},
            {"name": "Cincinnatus: called from farm, serves 15 days as dictator, returns to farm"},
            {"name": "Regulus: returns to Carthage and death to honor his oath — supreme example of fides"}
          ]
        },
        {
          "name": "Roman vs. Christian Virtue",
          "children": [
            {"name": "Roman virtue aims at the earthly city: Rome's honor, glory, survival"},
            {"name": "Christian virtue aims at the City of God, not any earthly city"},
            {"name": "The virtues overlap; the destinations differ"},
            {"name": "Augustine: Romans received their reward — earthly glory — but sought nothing more"}
          ]
        }
      ]
    },
    {
      "name": "Conflict of the Orders and Expansion",
      "children": [
        {
          "name": "Patricians vs. Plebeians",
          "children": [
            {"name": "Patricians: hereditary noble families controlling Senate and priesthoods"},
            {"name": "Plebeians: majority of free citizens, excluded from power"},
            {"name": "First secession (494 BC): plebeian soldiers walk out; tribune created"},
            {"name": "Lex Hortensia (287 BC): plebeian assembly resolutions binding on all Romans"}
          ]
        },
        {
          "name": "Roman Expansion",
          "children": [
            {"name": "Latin League defeated (338 BC): Rome offers Latin rights not enslavement"},
            {"name": "Samnite Wars (343-290 BC): brutal mountain campaigns; Rome learns hard lessons"},
            {"name": "Caudine Forks (321 BC): Roman humiliation — soldiers forced under yoke of spears"},
            {"name": "By 264 BC: Rome controls most of Italy south of the Po River"}
          ]
        }
      ]
    }
  ]
}
;

    /* Render text with optional KaTeX math: $...$ delimiters or common patterns */
    function renderMath(text, container) {
        /* First handle explicit $...$ delimiters */
        var dollarRe = /\$([^$]+)\$/g;
        if (dollarRe.test(text) && typeof katex !== 'undefined') {
            var parts = text.split(/(\$[^$]+\$)/);
            parts.forEach(function(part) {
                if (part.startsWith('$') && part.endsWith('$')) {
                    var mathStr = part.slice(1, -1);
                    try {
                        var mathSpan = document.createElement('span');
                        katex.render(mathStr, mathSpan, { throwOnError: false, displayMode: false });
                        container.appendChild(mathSpan);
                        return;
                    } catch(e) { /* fall through */ }
                }
                container.appendChild(document.createTextNode(part));
            });
            return;
        }
        /* Heuristic: detect common math patterns (exponents, fractions, symbols) */
        var mathPatterns = /[a-zA-Z]\^[0-9]|\d+[a-zA-Z]\s*[+\-]|[+\-*/]=|\bsqrt\b|\bfrac\b|[<>]=?\s*\d|\(.*[a-zA-Z].*[+\-*/].*\)/;
        if (mathPatterns.test(text) && typeof katex !== 'undefined') {
            /* Split on label prefixes like "Format:" to only math-ify the value */
            var labelParts = text.split(/(:\s+)/);
            labelParts.forEach(function(part, idx) {
                if (idx > 0 && mathPatterns.test(part)) {
                    var mathStr = part.trim()
                        .replace(/([a-zA-Z0-9])\/([a-zA-Z0-9])/g, '\\frac{$1}{$2}');
                    try {
                        var mathSpan = document.createElement('span');
                        katex.render(mathStr, mathSpan, { throwOnError: false, displayMode: false });
                        container.appendChild(mathSpan);
                        return;
                    } catch(e) { /* fall through */ }
                }
                container.appendChild(document.createTextNode(part));
            });
            return;
        }
        container.appendChild(document.createTextNode(text));
    }

    function countDescendants(node) {
        if (!node.children || node.children.length === 0) return 0;
        var total = node.children.length;
        node.children.forEach(function(c) { total += countDescendants(c); });
        return total;
    }

    function buildTree(node, depth) {
        var li = document.createElement('li');
        var span = document.createElement('span');
        span.className = 'mm-node mm-depth-' + Math.min(depth, 3);
        var hasKids = node.children && node.children.length > 0;
        if (hasKids) {
            var toggle = document.createElement('span');
            toggle.className = 'mm-toggle';
            toggle.textContent = '\u25BC';
            span.appendChild(toggle);
            var textSpan = document.createElement('span');
            renderMath(' ' + node.name, textSpan);
            span.appendChild(textSpan);
            /* Show child count badge */
            var count = countDescendants(node);
            if (count > 2) {
                var badge = document.createElement('span');
                badge.className = 'mm-count';
                badge.textContent = count;
                span.appendChild(badge);
            }
            li.addEventListener('click', function(e) {
                e.stopPropagation();
                li.classList.toggle('mm-collapsed');
            });
        } else {
            span.classList.add('mm-leaf');
            renderMath(node.name, span);
        }
        li.appendChild(span);
        if (hasKids) {
            var ul = document.createElement('ul');
            node.children.forEach(function(child) { ul.appendChild(buildTree(child, depth + 1)); });
            li.appendChild(ul);
        }
        return li;
    }

    function expandAll() {
        document.querySelectorAll('#mindmap-tree li.mm-collapsed').forEach(function(li) {
            li.classList.remove('mm-collapsed');
        });
    }
    function collapseAll() {
        document.querySelectorAll('#mindmap-tree li').forEach(function(li) {
            if (li.querySelector('ul')) li.classList.add('mm-collapsed');
        });
    }

    var root = document.getElementById('mindmap-tree');
    var h1 = document.createElement('h1');
    h1.textContent = mmData.name;
    root.appendChild(h1);
    if (mmData.children) {
        var ul = document.createElement('ul');
        mmData.children.forEach(function(child) { ul.appendChild(buildTree(child, 1)); });
        root.appendChild(ul);
    }
    </script>
</body>
