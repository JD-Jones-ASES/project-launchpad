        .mm-breadcrumb { text-align: center; margin-bottom: 2rem; }
        .mm-breadcrumb a {
            color: var(--secondary-color); text-decoration: none;

        }

        }
        .mm-controls button {
            font-family: 'Crimson Text', serif; font-size: 0.9rem;

            max-width: 900px; margin: 0 auto; padding: 2rem;

        .mm-container h1 {

            font-size: 1.6rem; margin-bottom: 1.5rem;

            text-align: center;
        }
        .mm-tree { padding: 0; }
        .mm-tree ul { list-style: none; padding-left: 0; margin: 0; }
        .mm-tree > ul { padding-left: 0; }
        .mm-tree li {
            position: relative; padding: 0.25rem 0 0.25rem 1.8rem;
        }
        /* Vertical connector line from parent through children */
        .mm-tree li::before {
            content: ''; position: absolute;
            left: 0.7rem; top: 0; bottom: 0;
            width: 1px; background: var(--border-color);
        }
        /* Horizontal connector line to each child node */
        .mm-tree li::after {
            content: ''; position: absolute;
            left: 0.7rem; top: 1.1rem;
            width: 0.8rem; height: 1px;
            background: var(--border-color);
        }
        /* Hide vertical line above first child */
        .mm-tree li:first-child::before { top: 1.1rem; }
        /* Hide vertical line below last child */
        .mm-tree li:last-child::before { bottom: calc(100% - 1.1rem); }
        /* No connectors on the root level */
        .mm-tree > ul > li::before,
        .mm-tree > ul > li::after { display: none; }
        .mm-tree > ul > li { padding-left: 0; }
        .mm-node {
            display: inline-block; padding: 0.35rem 0.75rem;
            border-radius: 8px; font-size: 0.95rem;
            cursor: pointer; transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .mm-node:hover { background: rgba(218,165,32,0.1); border-color: var(--border-color); }
        .mm-depth-0 {
            font-family: 'Cinzel', serif; font-size: 1.15rem; font-weight: 600;
            color: var(--primary-color); background: rgba(139,69,19,0.08);
            border-color: var(--primary-color); padding: 0.5rem 1rem;
            border-radius: 10px; margin-bottom: 0.25rem;
        }
        .mm-depth-1 {
            font-weight: 600; color: #8B4513;
            font-size: 1rem; background: rgba(139,69,19,0.04);
            border-color: rgba(139,69,19,0.15); padding: 0.3rem 0.7rem;
        }
        .mm-depth-2 {
            color: var(--text-primary); font-size: 0.95rem;
        }
        .mm-depth-3 { color: var(--text-secondary); font-size: 0.9rem; font-style: italic; }
        .mm-toggle {
            display: inline-block; width: 1.2em; text-align: center;
            color: var(--secondary-color); font-weight: bold; cursor: pointer;
            user-select: none; margin-right: 0.2rem;
            transition: transform 0.2s ease;
        }
        .mm-leaf { margin-left: 1.4em; }
        .mm-leaf::before {
            content: '\2022'; color: var(--secondary-color);
            position: absolute; left: -0.1rem; font-size: 0.8rem;
        }
        li.mm-collapsed > ul { display: none; }
        li.mm-collapsed > .mm-node .mm-toggle { transform: rotate(-90deg); }
        /* Hide connectors for collapsed children */
        li.mm-collapsed::before { bottom: calc(100% - 1.1rem); }
        /* Node count badge */
        .mm-count {
            font-size: 0.7rem; color: var(--text-secondary);
            background: rgba(218,165,32,0.12); border-radius: 4px;
            padding: 0.1rem 0.35rem; margin-left: 0.4rem;

    <script>
    var mmData = {
  "name": "THE FALL OF THE ROMAN EMPIRE",
  "children": [
    {
      "name": "Seeds of Decline",
      "children": [
        {
          "name": "Crisis of the Third Century (235–284 AD)",
          "children": [
            {"name": "50+ emperors in 50 years, most murdered by their own soldiers"},
            {"name": "Civil war rages across provinces; Rhine and Danube frontiers under pressure"},
            {"name": "Trade collapses; cities shrink; money economy weakens"},
            {"name": "Currency debasement: coins debased until nearly worthless; severe inflation"}
          ]
        },
        {
          "name": "Diocletian's Reforms",
          "children": [
            {"name": "Doubled army size; reorganized provincial administration"},
            {"name": "Tetrarchy: divided Empire into East (Augustus) and West (Augustus) + two juniors (Caesars)"},
            {"name": "East: densely populated, urbanized, impregnable Constantinople"},
            {"name": "West: longer exposed frontier, less urban, more vulnerable to incursion"}
          ]
        },
        {
          "name": "Structural Weaknesses",
          "children": [
            {"name": "Military overstretching: defending too many frontiers simultaneously"},
            {"name": "Plagues: Antonine Plague (165) and Plague of Cyprian (249) kill millions"},
            {"name": "Administrative corruption; loss of political legitimacy"},
            {"name": "Foederati: Germanic troops whose first loyalty is to chieftains, not Rome"}
          ]
        }
      ]
    },
    {
      "name": "The Invasions",
      "children": [
        {
          "name": "The Huns and Visigoths",
          "children": [
            {"name": "Huns: horse-warriors from Central Asia; sweep westward 370s AD"},
            {"name": "Visigoths flee Huns; beg Valens to cross Danube (376 AD)"},
            {"name": "Roman administrators exploit refugees: dog-meat, children demanded as slaves"},
            {"name": "Battle of Adrianople (378): Valens killed; two-thirds of Roman field army destroyed"}
          ]
        },
        {
          "name": "Alaric and the Sack of Rome",
          "children": [
            {"name": "Alaric: Visigothic leader, former Roman military officer"},
            {"name": "Repeatedly demanded land, recognition, command; Western government refused/broke promises"},
            {"name": "AD 410: sacks Rome for three days — first time in 800 years"},
            {"name": "Jerome: 'The city which had taken the whole world was itself taken'"}
          ]
        },
        {
          "name": "Attila the Hun",
          "children": [
            {"name": "Attila (r. 434–453): unites Hunnic tribes; 'Scourge of God'"},
            {"name": "Battle of Catalaunian Plains (451): last great Roman military victory in West"},
            {"name": "Attila invades Italy (452): sacks Aquileia; refugees found Venice"},
            {"name": "Pope Leo I meets Attila at Mincio River; persuades him to withdraw"}
          ]
        },
        {
          "name": "The Final Acts",
          "children": [
            {"name": "AD 455: Vandals sack Rome — more thoroughly than Alaric; strip Capitoline gilding"},
            {"name": "Western emperors become puppets of Germanic magistri militum"},
            {"name": "AD 476: Odoacer deposes boy-emperor Romulus Augustulus"},
            {"name": "Imperial regalia sent to Constantinople; no new emperor named — Western Empire ends"}
          ]
        }
      ]
    },
    {
      "name": "Justinian and Byzantium",
      "children": [
        {
          "name": "Justinian's Reconquests",
          "children": [
            {"name": "General Belisarius: reconquers North Africa (533), Italy (535–554), southern Spain"},
            {"name": "Briefly reunites Roman Empire under one emperor"},
            {"name": "Plague of Justinian (541–549): first bubonic plague outbreak; 25–50 million dead"},
            {"name": "Reconquered territories could not be held after the plague"}
          ]
        },
        {
          "name": "Justinian's Legal Legacy",
          "children": [
            {"name": "Corpus Juris Civilis (529–534): systematic compilation of all Roman law"},
            {"name": "Four parts: Institutes, Digest, Codex, Novels"},
            {"name": "Foundation of legal systems: medieval Italy to modern France, Germany, Spain"},
            {"name": "Hagia Sophia (537): 'Solomon, I have surpassed thee!'"}
          ]
        },
        {
          "name": "Byzantine Civilization",
          "children": [
            {"name": "Byzantines called themselves Romaioi ('Romans') until 1453"},
            {"name": "Constantinople: city of ~400,000 while Rome shrank to ~50,000"},
            {"name": "Preserved Greek learning; converted Slavic peoples (Saints Cyril and Methodius)"},
            {"name": "Eastern Church art influenced Russian, Greek, and Serbian culture"}
          ]
        }
      ]
    },
    {
      "name": "The Christian Response: Augustine and Boethius",
      "children": [
        {
          "name": "Augustine of Hippo",
          "children": [
            {"name": "Born AD 354 in North Africa; brilliant, ambitious, morally restless"},
            {"name": "Converted in Milan garden (386): heard 'Tolle, lege'; Romans 13 transforms him"},
            {"name": "Confessions (397–400): first great autobiography — 'Thou madest us for Thyself'"},
            {"name": "City of God (413–426): two cities, two loves — self-love vs. love of God"}
          ]
        },
        {
          "name": "Two Cities Framework",
          "children": [
            {"name": "City of Man: built on amor sui (self-love); glories in itself; temporal"},
            {"name": "City of God: built on amor Dei (love of God); cannot be destroyed by barbarians"},
            {"name": "Rome was a great but temporal City of Man — always going to end"},
            {"name": "Rome's fall should only shock Christians who confused Rome with the City of God"}
          ]
        },
        {
          "name": "Boethius and the Consolation",
          "children": [
            {"name": "Chief minister to Ostrogothic king Theodoric; falsely accused of treason"},
            {"name": "Translated Aristotle into Latin — preserved Greek thought for Latin West"},
            {"name": "Consolation of Philosophy (written in prison): dialogue with Lady Philosophy"},
            {"name": "Fortune's Wheel: wealth and power are never truly yours; virtue cannot be taken"},
            {"name": "Most read book outside the Bible throughout the Middle Ages"}
          ]
        },
        {
          "name": "What Survived Rome's Fall",
          "children": [
            {"name": "The Church: bishops maintained civic functions; bishop of Rome = most stable institution"},
            {"name": "Latin: language of scholarship and theology for medieval Europe"},
            {"name": "Roman law: Corpus Juris Civilis preserved for later recovery"},
            {"name": "Manuscripts: monks in scriptoria copied Virgil, Cicero, and Greek authors"},
            {"name": "The idea of Rome: inspired Charlemagne, the medieval papacy, Holy Roman Empire"}
          ]
        }
      ]
    }
  ]
}
;

    /* Render text with optional KaTeX math: $...$ delimiters or common patterns */
    function renderMath(text, container) {
        /* First handle explicit $...$ delimiters */
        var dollarRe = /\$([^$]+)\$/g;
        if (dollarRe.test(text) && typeof katex !== 'undefined') {
            var parts = text.split(/(\$[^$]+\$)/);
            parts.forEach(function(part) {
                if (part.startsWith('$') && part.endsWith('$')) {
                    var mathStr = part.slice(1, -1);
                    try {
                        var mathSpan = document.createElement('span');
                        katex.render(mathStr, mathSpan, { throwOnError: false, displayMode: false });
                        container.appendChild(mathSpan);
                        return;
                    } catch(e) { /* fall through */ }
                }
                container.appendChild(document.createTextNode(part));
            });
            return;
        }
        /* Heuristic: detect common math patterns (exponents, fractions, symbols) */
        var mathPatterns = /[a-zA-Z]\^[0-9]|\d+[a-zA-Z]\s*[+\-]|[+\-*/]=|\bsqrt\b|\bfrac\b|[<>]=?\s*\d|\(.*[a-zA-Z].*[+\-*/].*\)/;
        if (mathPatterns.test(text) && typeof katex !== 'undefined') {
            /* Split on label prefixes like "Format:" to only math-ify the value */
            var labelParts = text.split(/(:\s+)/);
            labelParts.forEach(function(part, idx) {
                if (idx > 0 && mathPatterns.test(part)) {
                    var mathStr = part.trim()
                        .replace(/([a-zA-Z0-9])\/([a-zA-Z0-9])/g, '\\frac{$1}{$2}');
                    try {
                        var mathSpan = document.createElement('span');
                        katex.render(mathStr, mathSpan, { throwOnError: false, displayMode: false });
                        container.appendChild(mathSpan);
                        return;
                    } catch(e) { /* fall through */ }
                }
                container.appendChild(document.createTextNode(part));
            });
            return;
        }
        container.appendChild(document.createTextNode(text));
    }

    function countDescendants(node) {
        if (!node.children || node.children.length === 0) return 0;
        var total = node.children.length;
        node.children.forEach(function(c) { total += countDescendants(c); });
        return total;
    }

    function buildTree(node, depth) {
        var li = document.createElement('li');
        var span = document.createElement('span');
        span.className = 'mm-node mm-depth-' + Math.min(depth, 3);
        var hasKids = node.children && node.children.length > 0;
        if (hasKids) {
            var toggle = document.createElement('span');
            toggle.className = 'mm-toggle';
            toggle.textContent = '\u25BC';
            span.appendChild(toggle);
            var textSpan = document.createElement('span');
            renderMath(' ' + node.name, textSpan);
            span.appendChild(textSpan);
            /* Show child count badge */
            var count = countDescendants(node);
            if (count > 2) {
                var badge = document.createElement('span');
                badge.className = 'mm-count';
                badge.textContent = count;
                span.appendChild(badge);
            }
            li.addEventListener('click', function(e) {
                e.stopPropagation();
                li.classList.toggle('mm-collapsed');
            });
        } else {
            span.classList.add('mm-leaf');
            renderMath(node.name, span);
        }
        li.appendChild(span);
        if (hasKids) {
            var ul = document.createElement('ul');
            node.children.forEach(function(child) { ul.appendChild(buildTree(child, depth + 1)); });
            li.appendChild(ul);
        }
        return li;
    }

    function expandAll() {
        document.querySelectorAll('#mindmap-tree li.mm-collapsed').forEach(function(li) {
            li.classList.remove('mm-collapsed');
        });
    }
    function collapseAll() {
        document.querySelectorAll('#mindmap-tree li').forEach(function(li) {
            if (li.querySelector('ul')) li.classList.add('mm-collapsed');
        });
    }

    var root = document.getElementById('mindmap-tree');
    var h1 = document.createElement('h1');
    h1.textContent = mmData.name;
    root.appendChild(h1);
    if (mmData.children) {
        var ul = document.createElement('ul');
        mmData.children.forEach(function(child) { ul.appendChild(buildTree(child, 1)); });
        root.appendChild(ul);
    }
    </script>
