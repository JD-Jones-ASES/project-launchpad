        .mm-tree li {
            position: relative; padding: 0.25rem 0 0.25rem 1.8rem;

        /* Vertical connector line from parent through children */

            content: ''; position: absolute;
            left: 0.7rem; top: 0; bottom: 0;

        /* Hide vertical line above first child */

    <script>
    var mmData = {
  "name": "Euthyphro",
  "children": [
    {
      "name": "The Setting and Characters",
      "children": [
        {
          "name": "The Dramatic Context",
          "children": [
            {
              "name": "Scene: outside the court of the King Archon in Athens"
            },
            {
              "name": "Socrates faces charges of impiety (asebeia) and corrupting the youth"
            },
            {
              "name": "Prosecutor: Meletus, a young and unknown poet"
            },
            {
              "name": "Part of a narrative arc: Euthyphro → Apology → Crito"
            }
          ]
        },
        {
          "name": "Euthyphro's Surprising Mission",
          "children": [
            {
              "name": "He is prosecuting his own father for murder"
            },
            {
              "name": "A hired laborer died from neglect after being bound in a ditch"
            },
            {
              "name": "Euthyphro's relatives regard the prosecution as outrageous"
            }
          ]
        },
        {
          "name": "Who Is Euthyphro?",
          "children": [
            {
              "name": "A professional diviner (mantis) and religious expert"
            },
            {
              "name": "Name means 'straight-thinker' — possibly ironic"
            },
            {
              "name": "Confident and unreflective; never questioned his own assumptions"
            }
          ]
        },
        {
          "name": "The Central Irony",
          "children": [
            {
              "name": "Socrates (accused of impiety) meets a man claiming to be a piety expert"
            },
            {
              "name": "Socrates proposes Euthyphro teach him piety so he can defend himself"
            },
            {
              "name": "Socrates uses the elenchus (cross-examination) beneath surface politeness"
            }
          ]
        }
      ]
    },
    {
      "name": "The Central Question: What Is Piety?",
      "children": [
        {
          "name": "The Socratic Demand for Definitions",
          "children": [
            {
              "name": "Socrates asks for the essence of piety, not a list of examples"
            },
            {
              "name": "'To hosion': the pious or holy — sanctioned by divine law"
            },
            {
              "name": "A definition states what all instances share; an example merely points"
            },
            {
              "name": "This demand eventually leads Plato to develop the Theory of Forms"
            }
          ]
        },
        {
          "name": "Example vs. Definition",
          "children": [
            {
              "name": "An example identifies a particular instance: 'Prosecuting wrongdoers is pious'"
            },
            {
              "name": "A definition identifies the essential nature shared by all instances"
            },
            {
              "name": "Only a definition can serve as a reliable standard for judging new cases"
            }
          ]
        }
      ]
    },
    {
      "name": "Five Definitions of Piety",
      "children": [
        {
          "name": "Definition 1: Piety Is What I Am Doing Now",
          "children": [
            {
              "name": "Euthyphro: piety is prosecuting wrongdoers, as Zeus punished Kronos"
            },
            {
              "name": "Socrates' objection: this is an example, not a definition"
            },
            {
              "name": "Many pious acts have nothing to do with prosecution"
            }
          ]
        },
        {
          "name": "Definition 2: Piety Is What Is Dear to the Gods",
          "children": [
            {
              "name": "An improvement: gives a general principle, not just one example"
            },
            {
              "name": "Fatal flaw: the Greek gods disagree and love different things"
            },
            {
              "name": "The same act could be both pious and impious simultaneously — a contradiction"
            }
          ]
        },
        {
          "name": "Definition 3: Piety Is What All the Gods Love",
          "children": [
            {
              "name": "Euthyphro revises: requires unanimous divine approval"
            },
            {
              "name": "Leads directly to the Euthyphro Dilemma"
            },
            {
              "name": "Being loved by the gods describes piety but does not explain its essence"
            }
          ]
        },
        {
          "name": "Definition 4: Piety Is a Part of Justice — Service to the Gods",
          "children": [
            {
              "name": "Piety is the portion of justice concerned with serving the gods"
            },
            {
              "name": "Socrates asks: what goal or great work does this service accomplish?"
            },
            {
              "name": "Euthyphro cannot explain what the gods gain from human piety"
            }
          ]
        },
        {
          "name": "Definition 5: Piety Is a Sacred Transaction with the Gods",
          "children": [
            {
              "name": "Humans give honor and sacrifice; gods give blessings and protection"
            },
            {
              "name": "Socrates: what do the gods actually receive that they need?"
            },
            {
              "name": "Collapses back into Definition 3 — circular argument (petitio principii)"
            }
          ]
        }
      ]
    },
    {
      "name": "The Euthyphro Dilemma",
      "children": [
        {
          "name": "The Core Question",
          "children": [
            {
              "name": "Is the pious loved by the gods because it is pious..."
            },
            {
              "name": "...or is it pious because the gods love it?"
            },
            {
              "name": "One of the most consequential questions in Western thought"
            }
          ]
        },
        {
          "name": "Horn 1: Piety Is Independent of the Gods",
          "children": [
            {
              "name": "Piety has a nature of its own; the gods recognize but do not create it"
            },
            {
              "name": "Implication: there is a standard of goodness above the gods"
            }
          ]
        },
        {
          "name": "Horn 2: Piety Depends on Divine Approval",
          "children": [
            {
              "name": "Piety has no independent nature; gods' approval makes something pious"
            },
            {
              "name": "Implication: morality is arbitrary — whatever gods approve is automatically right"
            }
          ]
        },
        {
          "name": "Philosophical Legacy",
          "children": [
            {
              "name": "Debated for over 2,400 years in moral philosophy and theology"
            },
            {
              "name": "Reformulated in monotheism as Divine Command Theory vs. natural law"
            },
            {
              "name": "'Is something good because God commands it, or does God command it because it is good?'"
            }
          ]
        }
      ]
    },
    {
      "name": "Aporia and What It Teaches",
      "children": [
        {
          "name": "The Dialogue Ends Without an Answer",
          "children": [
            {
              "name": "Euthyphro makes excuses and leaves; Socrates remains without a definition"
            },
            {
              "name": "Aporia: literally 'no passage' — genuine philosophical puzzlement"
            },
            {
              "name": "Many of Plato's early dialogues end in aporia"
            }
          ]
        },
        {
          "name": "Why Aporia Is Valuable",
          "children": [
            {
              "name": "Euthyphro's unexamined confidence has been shaken"
            },
            {
              "name": "'Knowing what you do not know' is more valuable than false certainty"
            },
            {
              "name": "Socrates at Delphi: called wisest because he alone knew he did not know"
            }
          ]
        },
        {
          "name": "The Path to the Theory of Forms",
          "children": [
            {
              "name": "Socrates needed a universal definition — stable, unchanging, independent"
            },
            {
              "name": "Plato's answer: Forms (eide) exist in a realm beyond the physical world"
            },
            {
              "name": "Form of Piety is the eternal standard; particular acts participate in it"
            },
            {
              "name": "The Form of the Good: supreme Form, illuminates all other Forms like the sun"
            }
          ]
        }
      ]
    }
  ]
}
;

    /* Render text with optional KaTeX math: $...$ delimiters or common patterns */
    function renderMath(text, container) {
        /* First handle explicit $...$ delimiters */
        var dollarRe = /\$([^$]+)\$/g;
        if (dollarRe.test(text) && typeof katex !== 'undefined') {
            var parts = text.split(/(\$[^$]+\$)/);
            parts.forEach(function(part) {
                if (part.startsWith('$') && part.endsWith('$')) {
                    var mathStr = part.slice(1, -1);
                    try {
                        var mathSpan = document.createElement('span');
                        katex.render(mathStr, mathSpan, { throwOnError: false, displayMode: false });
                        container.appendChild(mathSpan);
                        return;
                    } catch(e) { /* fall through */ }
                }
                container.appendChild(document.createTextNode(part));
            });
            return;
        }
        /* Heuristic: detect common math patterns (exponents, fractions, symbols) */
        var mathPatterns = /[a-zA-Z]\^[0-9]|\d+[a-zA-Z]\s*[+\-]|[+\-*/]=|\bsqrt\b|\bfrac\b|[<>]=?\s*\d|\(.*[a-zA-Z].*[+\-*/].*\)/;
        if (mathPatterns.test(text) && typeof katex !== 'undefined') {
            /* Split on label prefixes like "Format:" to only math-ify the value */
            var labelParts = text.split(/(:\s+)/);
            labelParts.forEach(function(part, idx) {
                if (idx > 0 && mathPatterns.test(part)) {
                    var mathStr = part.trim()
                        .replace(/([a-zA-Z0-9])\/([a-zA-Z0-9])/g, '\\frac{$1}{$2}');
                    try {
                        var mathSpan = document.createElement('span');
                        katex.render(mathStr, mathSpan, { throwOnError: false, displayMode: false });
                        container.appendChild(mathSpan);
                        return;
                    } catch(e) { /* fall through */ }
                }
                container.appendChild(document.createTextNode(part));
            });
            return;
        }
        container.appendChild(document.createTextNode(text));
    }

    function countDescendants(node) {
        if (!node.children || node.children.length === 0) return 0;
        var total = node.children.length;
        node.children.forEach(function(c) { total += countDescendants(c); });
        return total;
    }

    function buildTree(node, depth) {
        var li = document.createElement('li');
        var span = document.createElement('span');
        span.className = 'mm-node mm-depth-' + Math.min(depth, 3);
        var hasKids = node.children && node.children.length > 0;
        if (hasKids) {
            var toggle = document.createElement('span');
            toggle.className = 'mm-toggle';
            toggle.textContent = '\u25BC';
            span.appendChild(toggle);
            var textSpan = document.createElement('span');
            renderMath(' ' + node.name, textSpan);
            span.appendChild(textSpan);
            /* Show child count badge */
            var count = countDescendants(node);
            if (count > 2) {
                var badge = document.createElement('span');
                badge.className = 'mm-count';
                badge.textContent = count;
                span.appendChild(badge);
            }
            li.addEventListener('click', function(e) {
                e.stopPropagation();
                li.classList.toggle('mm-collapsed');
            });
        } else {
            span.classList.add('mm-leaf');
            renderMath(node.name, span);
        }
        li.appendChild(span);
        if (hasKids) {
            var ul = document.createElement('ul');
            node.children.forEach(function(child) { ul.appendChild(buildTree(child, depth + 1)); });
            li.appendChild(ul);
        }
        return li;
    }

    function expandAll() {
        document.querySelectorAll('#mindmap-tree li.mm-collapsed').forEach(function(li) {
            li.classList.remove('mm-collapsed');
        });
    }
    function collapseAll() {
        document.querySelectorAll('#mindmap-tree li').forEach(function(li) {
            if (li.querySelector('ul')) li.classList.add('mm-collapsed');
        });
    }

    var root = document.getElementById('mindmap-tree');
    var h1 = document.createElement('h1');
    h1.textContent = mmData.name;
    root.appendChild(h1);
    if (mmData.children) {
        var ul = document.createElement('ul');
        mmData.children.forEach(function(child) { ul.appendChild(buildTree(child, 1)); });
        root.appendChild(ul);
    }
    </script>
