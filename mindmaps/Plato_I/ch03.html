        .mm-tree li {
            position: relative; padding: 0.25rem 0 0.25rem 1.8rem;
        }
        /* Vertical connector line from parent through children */
        .mm-tree li::before {
            content: ''; position: absolute;
            left: 0.7rem; top: 0; bottom: 0;
            width: 1px; background: var(--border-color);
        }
        /* Horizontal connector line to each child node */
        .mm-tree li::after {
            content: ''; position: absolute;
            left: 0.7rem; top: 1.1rem;

        /* Hide vertical line above first child */

        /* Hide vertical line below last child */

        .mm-tree > ul > li::after { display: none; }

    <script>
    var mmData = {
  "name": "Chapter 3: Apology",
  "children": [
    {
      "name": "The Trial Setting",
      "children": [
        {
          "name": "Athenian Legal System",
          "children": [
            {
              "name": "399 BC: Socrates, age 70, before 501 citizen jurors"
            },
            {
              "name": "No judge, no lawyers, no rules of evidence"
            },
            {
              "name": "Any citizen could bring charges; jury voted immediately"
            },
            {
              "name": "Time measured by klepsydra (water clock)"
            }
          ]
        },
        {
          "name": "The Penalty Phase",
          "children": [
            {
              "name": "Accuser proposed one penalty; defendant proposed another"
            },
            {
              "name": "Jury chose between the two with no compromise option"
            }
          ]
        },
        {
          "name": "The Accusers",
          "children": [
            {
              "name": "Old accusers: years of rumor, gossip, and Aristophanes' The Clouds"
            },
            {
              "name": "New accusers: Meletus (poet), Anytus (politician), Lycon (orator)"
            },
            {
              "name": "Formal charges: corrupting the young and impiety (asebeia)"
            },
            {
              "name": "Daimonion: inner divine sign cited as evidence of new divinities"

          ]
        }
      ]

    {
      "name": "Socrates' Defense Speech",
      "children": [
        {
          "name": "Plain Speech and Parrhesia",

            {
              "name": "Parrhesia ('frank speech'): radical refusal to play the game of persuasion"

              "name": "Distinguishes himself from the Sophists who charge fees and flatter"

          ]
        },
        {
          "name": "The Oracle at Delphi",
          "children": [

            {
              "name": "Socrates tested the oracle by questioning politicians, poets, and craftsmen"
            },
            {
              "name": "Politicians thought they were wise but could not defend their views"
            },
            {
              "name": "Poets composed by inspiration, not wisdom; craftsmen over-extended their expertise"
            }
          ]
        },
        {
          "name": "Socratic Ignorance",
          "children": [
            {
              "name": "Wiser than others not by knowing more, but by knowing he does not know"
            },
            {
              "name": "'I know that I know nothing': starting point of genuine inquiry"
            },
            {
              "name": "His questioning mission given by Apollo — the impious man serves a god"
            }
          ]
        },
        {

          "children": [

            {
              "name": "If corruption was unintentional, proper remedy is instruction, not prosecution"

              "name": "Meletus' self-contradiction: charges complete atheism yet also introducing new divinities"

            },
            {
              "name": "His poverty proves sincerity — unlike Sophists, he never charged fees"
            },

              "name": "Killing the gadfly will not cure the disease of unexamined assumptions"

          ]

      ]
    },
    {
      "name": "The Verdict and Final Words",
      "children": [
        {
          "name": "Conviction and Counter-Penalty",
          "children": [
            {
              "name": "Vote: 280 for conviction, 221 for acquittal — shift of 30 would have acquitted"
            },
            {
              "name": "Meletus proposed death; Socrates first proposes free meals at the Prytaneum"
            },
            {
              "name": "Eventually proposes a fine of thirty minae guaranteed by friends"
            },
            {
              "name": "Death sentence passed by larger margin than conviction vote"
            }
          ]
        },
        {
          "name": "Speech to Those Who Convicted",
          "children": [
            {
              "name": "Prophecy: younger, harsher questioners will come after his death"
            },

              "name": "Silencing the critic does not make the city genuinely good"

          ]
        },
        {
          "name": "Speech to Those Who Acquitted",
          "children": [
            {
              "name": "Daimonion was silent throughout the trial — a good omen"

            {
              "name": "Death is either annihilation (dreamless sleep — a gain) or migration of the soul (a greater gain)"

    },
    {
      "name": "Key Themes",
      "children": [
        {
          "name": "The Examined Life",
          "children": [

            {
              "name": "Philosophy is a necessity, not a luxury — the life of an unquestioning sleepwalker is less than human"
            },
            {
              "name": "The examined life requires honesty and courage, not merely intelligence"
            }
          ]
        },
        {
          "name": "Philosophy versus Rhetoric",
          "children": [
            {
              "name": "Orators use emotional appeals: weeping children, flattery, moving stories"
            },
            {
              "name": "Socrates refuses to bring his sons to court or beg for mercy"
            },
            {
              "name": "Jury's role is to judge truth, not to reward the most moving appeal"
            }
          ]
        },
        {
          "name": "Death and the Philosopher",
          "children": [
            {
              "name": "Treats death as a philosophical problem, not a catastrophe"
            },
            {
              "name": "A good life is measured by pursuit of truth, not by length of survival"
            },
            {
              "name": "Stoics later adopted Socrates as their supreme model of calm before death"
            }
          ]
        }
      ]
    },
    {
      "name": "Broader Significance",
      "children": [
        {
          "name": "Allegory of the Cave and the Philosopher-King",
          "children": [
            {
              "name": "Plato's response: democracy condemned the wisest man in Athens"
            },
            {
              "name": "Allegory of the Cave (Republic VII): prisoners see only shadows; the freed philosopher ascends to the sun"
            },
            {
              "name": "The philosopher who returns to the cave to enlighten others may be killed"
            },
            {
              "name": "Only the philosopher, trained in dialectic, is fit to govern — tension with democracy"

        {

          "children": [

            },
            {
              "name": "Differences: Socrates argued; Jesus was largely silent before Pilate"
            },
            {
              "name": "Socrates sought wisdom and admitted ignorance; Jesus claimed to be the truth"
            },
            {
              "name": "Socrates' death: philosophical demonstration; Jesus' death: redemptive atonement"
            }
          ]
        },
        {
          "name": "The Stoic Inheritance",
          "children": [
            {
              "name": "Epictetus: 'Some things are in our power, some are not' — echoes Socrates' self-control at trial"
            },
            {
              "name": "Seneca echoed Socrates' final libation when forced to die by Nero"
            },
            {
              "name": "Marcus Aurelius' Meditations reflect Socrates' dismissal of reputation"
            }
          ]

        {
          "name": "Civil Disobedience",
          "children": [
            {
              "name": "Thoreau's 'Civil Disobedience' (1849): individual conscience vs. collective will"
            },
            {
              "name": "Martin Luther King Jr. cited Socrates in 'Letter from Birmingham Jail' (1963)"
            },
            {
              "name": "Both invoked Socrates as model: examined life requires action, not just contemplation"
            }
          ]
        }
      ]
    }

}

    /* Render text with optional KaTeX math: $...$ delimiters or common patterns */
    function renderMath(text, container) {
        /* First handle explicit $...$ delimiters */
        var dollarRe = /\$([^$]+)\$/g;
        if (dollarRe.test(text) && typeof katex !== 'undefined') {
            var parts = text.split(/(\$[^$]+\$)/);
            parts.forEach(function(part) {
                if (part.startsWith('$') && part.endsWith('$')) {
                    var mathStr = part.slice(1, -1);
                    try {
                        var mathSpan = document.createElement('span');
                        katex.render(mathStr, mathSpan, { throwOnError: false, displayMode: false });
                        container.appendChild(mathSpan);
                        return;
                    } catch(e) { /* fall through */ }
                }
                container.appendChild(document.createTextNode(part));
            });
            return;
        }
        /* Heuristic: detect common math patterns (exponents, fractions, symbols) */
        var mathPatterns = /[a-zA-Z]\^[0-9]|\d+[a-zA-Z]\s*[+\-]|[+\-*/]=|\bsqrt\b|\bfrac\b|[<>]=?\s*\d|\(.*[a-zA-Z].*[+\-*/].*\)/;
        if (mathPatterns.test(text) && typeof katex !== 'undefined') {
            /* Split on label prefixes like "Format:" to only math-ify the value */
            var labelParts = text.split(/(:\s+)/);
            labelParts.forEach(function(part, idx) {
                if (idx > 0 && mathPatterns.test(part)) {
                    var mathStr = part.trim()
                        .replace(/([a-zA-Z0-9])\/([a-zA-Z0-9])/g, '\\frac{$1}{$2}');
                    try {
                        var mathSpan = document.createElement('span');
                        katex.render(mathStr, mathSpan, { throwOnError: false, displayMode: false });
                        container.appendChild(mathSpan);
                        return;
                    } catch(e) { /* fall through */ }
                }
                container.appendChild(document.createTextNode(part));
            });
            return;
        }
        container.appendChild(document.createTextNode(text));
    }

    function countDescendants(node) {
        if (!node.children || node.children.length === 0) return 0;
        var total = node.children.length;
        node.children.forEach(function(c) { total += countDescendants(c); });
        return total;
    }

    function buildTree(node, depth) {
        var li = document.createElement('li');
        var span = document.createElement('span');
        span.className = 'mm-node mm-depth-' + Math.min(depth, 3);
        var hasKids = node.children && node.children.length > 0;
        if (hasKids) {
            var toggle = document.createElement('span');
            toggle.className = 'mm-toggle';
            toggle.textContent = '\u25BC';
            span.appendChild(toggle);
            var textSpan = document.createElement('span');
            renderMath(' ' + node.name, textSpan);
            span.appendChild(textSpan);
            /* Show child count badge */
            var count = countDescendants(node);
            if (count > 2) {
                var badge = document.createElement('span');
                badge.className = 'mm-count';
                badge.textContent = count;
                span.appendChild(badge);
            }
            li.addEventListener('click', function(e) {
                e.stopPropagation();
                li.classList.toggle('mm-collapsed');
            });
        } else {
            span.classList.add('mm-leaf');
            renderMath(node.name, span);
        }
        li.appendChild(span);
        if (hasKids) {
            var ul = document.createElement('ul');
            node.children.forEach(function(child) { ul.appendChild(buildTree(child, depth + 1)); });
            li.appendChild(ul);
        }
        return li;
    }

    function expandAll() {
        document.querySelectorAll('#mindmap-tree li.mm-collapsed').forEach(function(li) {
            li.classList.remove('mm-collapsed');
        });
    }
    function collapseAll() {
        document.querySelectorAll('#mindmap-tree li').forEach(function(li) {
            if (li.querySelector('ul')) li.classList.add('mm-collapsed');
        });
    }

    var root = document.getElementById('mindmap-tree');
    var h1 = document.createElement('h1');
    h1.textContent = mmData.name;
    root.appendChild(h1);
    if (mmData.children) {
        var ul = document.createElement('ul');
        mmData.children.forEach(function(child) { ul.appendChild(buildTree(child, 1)); });
        root.appendChild(ul);
    }
    </script>
