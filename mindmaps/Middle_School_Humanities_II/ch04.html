    {
      "id": "literature-and-learning",
      "label": "Literature and Learning",
      "mindmap": [
        "ch04-literature-and-learning",
        "ch04-dantes-divine-comedy",
        "ch04-roger-bacon"
      ],
      "quiz": [
        "q09",
        "q11"
      ],
      "flashcards": [
        "fc21",
        "fc22",
        "fc23",
        "fc25"
      ]
    }
  ]
};

    /* Render text with optional KaTeX math: $...$ delimiters or common patterns */
    function renderMath(text, container) {
        /* First handle explicit $...$ delimiters */
        var dollarRe = /\$([^$]+)\$/g;
        if (dollarRe.test(text) && typeof katex !== 'undefined') {
            var parts = text.split(/(\$[^$]+\$)/);
            parts.forEach(function(part) {
                if (part.startsWith('$') && part.endsWith('$')) {
                    var mathStr = part.slice(1, -1);
                    try {
                        var mathSpan = document.createElement('span');
                        katex.render(mathStr, mathSpan, { throwOnError: false, displayMode: false });
                        container.appendChild(mathSpan);
                        return;
                    } catch(e) { /* fall through */ }
                }
                container.appendChild(document.createTextNode(part));
            });
            return;
        }
        /* Heuristic: detect common math patterns (exponents, fractions, symbols) */
        var mathPatterns = /[a-zA-Z]\^[0-9]|\d+[a-zA-Z]\s*[+\-]|[+\-*/]=|\bsqrt\b|\bfrac\b|[<>]=?\s*\d|\(.*[a-zA-Z].*[+\-*/].*\)/;
        if (mathPatterns.test(text) && typeof katex !== 'undefined') {
            /* Split on label prefixes like "Format:" to only math-ify the value */
            var labelParts = text.split(/(:\s+)/);
            labelParts.forEach(function(part, idx) {
                if (idx > 0 && mathPatterns.test(part)) {
                    var mathStr = part.trim()
                        .replace(/([a-zA-Z0-9])\/([a-zA-Z0-9])/g, '\\frac{$1}{$2}');
                    try {
                        var mathSpan = document.createElement('span');
                        katex.render(mathStr, mathSpan, { throwOnError: false, displayMode: false });
                        container.appendChild(mathSpan);
                        return;
                    } catch(e) { /* fall through */ }
                }
                container.appendChild(document.createTextNode(part));
            });
            return;
        }
        container.appendChild(document.createTextNode(text));
    }

    function countDescendants(node) {
        if (!node.children || node.children.length === 0) return 0;
        var total = node.children.length;
        node.children.forEach(function(c) { total += countDescendants(c); });
        return total;
    }

    /* Close any open popover when clicking elsewhere */
    var activePopover = null;
    document.addEventListener('click', function(e) {
        if (activePopover && !activePopover.contains(e.target) && !e.target.classList.contains('mm-link-badge')) {
            activePopover.classList.remove('visible');
            activePopover = null;
        }
    });

    function showLinkPopover(badge, links, pid) {
        /* Close any existing popover */
        if (activePopover) activePopover.classList.remove('visible');
        var existing = badge.parentNode.querySelector('.mm-link-popover');
        if (existing) {
            existing.classList.toggle('visible');
            activePopover = existing.classList.contains('visible') ? existing : null;
            return;
        }
        var pop = document.createElement('div');
        pop.className = 'mm-link-popover visible';
        links.forEach(function(lnk) {
            var a = document.createElement('a');
            var targetParts = lnk.target.split('#');
            var targetSection = targetParts[0];
            var targetId = targetParts[1] || '';
            a.href = targetSection + '.html' + (targetId ? '#' + targetId : '');
            var typeSpan = document.createElement('span');
            typeSpan.className = 'mm-link-type mm-type-' + (lnk.type || 'example');
            typeSpan.textContent = lnk.type || 'link';
            a.appendChild(typeSpan);
            a.appendChild(document.createTextNode(' ' + lnk.label));
            pop.appendChild(a);
        });
        badge.parentNode.style.position = 'relative';
        badge.parentNode.appendChild(pop);
        activePopover = pop;
    }

    function buildTree(node, depth, pid) {
        var li = document.createElement('li');
        if (node.id) li.id = node.id;
        var span = document.createElement('span');
        span.className = 'mm-node mm-depth-' + Math.min(depth, 3);
        var hasKids = node.children && node.children.length > 0;
        if (hasKids) {
            var toggle = document.createElement('span');
            toggle.className = 'mm-toggle';
            toggle.textContent = '\u25BC';
            span.appendChild(toggle);
            var textSpan = document.createElement('span');
            renderMath(' ' + node.name, textSpan);
            span.appendChild(textSpan);
            /* Show child count badge */
            var count = countDescendants(node);
            if (count > 2) {
                var badge = document.createElement('span');
                badge.className = 'mm-count';
                badge.textContent = count;
                span.appendChild(badge);
            }
            /* Show link badge if node has cross-links */
            if (node.links && node.links.length > 0) {
                var linkBadge = document.createElement('span');
                linkBadge.className = 'mm-link-badge';
                linkBadge.textContent = '\u2197 ' + node.links.length;
                linkBadge.title = node.links.length + ' connection(s)';
                var nodeLinks = node.links;
                linkBadge.addEventListener('click', function(e) {
                    e.stopPropagation();
                    showLinkPopover(linkBadge, nodeLinks, pid);
                });
                span.appendChild(linkBadge);
            }
            /* Show concept badge if node has study material links */
            if (node.id && nodeConceptMap[node.id]) {
                var cBadge = document.createElement('span');
                cBadge.className = 'mm-concept-badge';
                cBadge.textContent = '\uD83D\uDCDA';
                cBadge.title = 'Concepts: ' + nodeConceptMap[node.id].join(', ');
                span.appendChild(cBadge);
            }
            li.addEventListener('click', function(e) {
                e.stopPropagation();
                li.classList.toggle('mm-collapsed');
            });
        } else {
            span.classList.add('mm-leaf');
            renderMath(node.name, span);
            /* Links on leaf nodes too */
            if (node.links && node.links.length > 0) {
                var linkBadge = document.createElement('span');
                linkBadge.className = 'mm-link-badge';
                linkBadge.textContent = '\u2197 ' + node.links.length;
                var nodeLinks = node.links;
                linkBadge.addEventListener('click', function(e) {
                    e.stopPropagation();
                    showLinkPopover(linkBadge, nodeLinks, pid);
                });
                span.appendChild(linkBadge);
            }
        }
        li.appendChild(span);
        if (hasKids) {
            var ul = document.createElement('ul');
            node.children.forEach(function(child) { ul.appendChild(buildTree(child, depth + 1, pid)); });
            li.appendChild(ul);
        }
        return li;
    }

    function renderLinksPanel(data) {
        if (!data.cross_links || data.cross_links.length === 0) return;
        var container = document.querySelector('.mm-container');
        var panel = document.createElement('div');
        panel.className = 'mm-links-panel';
        var h2 = document.createElement('h2');
        h2.textContent = 'Connections to Other Chapters';
        panel.appendChild(h2);
        var grid = document.createElement('div');
        grid.className = 'mm-links-grid';
        data.cross_links.forEach(function(cl) {
            var card = document.createElement('a');
            var targetParts = cl.to.split('#');
            var targetSection = targetParts[0];
            var targetId = targetParts[1] || '';
            card.href = targetSection + '.html' + (targetId ? '#' + targetId : '');
            card.className = 'mm-link-card type-' + (cl.type || 'example');
            var typeDiv = document.createElement('div');
            typeDiv.className = 'mm-link-card-type';
            typeDiv.textContent = cl.type || 'link';
            card.appendChild(typeDiv);
            var labelDiv = document.createElement('div');
            labelDiv.className = 'mm-link-card-label';
            labelDiv.textContent = cl.label;
            card.appendChild(labelDiv);
            var targetDiv = document.createElement('div');
            targetDiv.className = 'mm-link-card-target';
            targetDiv.textContent = '\u2192 ' + targetSection.replace('ch', 'Chapter ');
            card.appendChild(targetDiv);
            grid.appendChild(card);
        });
        panel.appendChild(grid);
        container.appendChild(panel);
    }

    /* Build a lookup: node ID → concept labels for badge display */
    var nodeConceptMap = {};
    if (mmMeta && mmMeta.concepts) {
        mmMeta.concepts.forEach(function(c) {
            (c.mindmap || []).forEach(function(nid) {
                if (!nodeConceptMap[nid]) nodeConceptMap[nid] = [];
                nodeConceptMap[nid].push(c.label);
            });
        });
    }

    function renderStudyPanel(meta, pid, sectionKey) {
        if (!meta || !meta.concepts || meta.concepts.length === 0) return;
        /* Only show if there are quiz or flashcard links */
        var hasStudyLinks = meta.concepts.some(function(c) {
            return (c.quiz && c.quiz.length > 0) || (c.flashcards && c.flashcards.length > 0);
        });
        if (!hasStudyLinks) return;

        var container = document.querySelector('.mm-container');
        var panel = document.createElement('div');
        panel.className = 'mm-study-panel';
        var h2 = document.createElement('h2');
        h2.textContent = 'Related Study Materials';
        panel.appendChild(h2);

        meta.concepts.forEach(function(concept) {
            var quizIds = concept.quiz || [];
            var fcIds = concept.flashcards || [];
            if (quizIds.length === 0 && fcIds.length === 0) return;

            var group = document.createElement('div');
            group.className = 'mm-concept-group';
            var label = document.createElement('div');
            label.className = 'mm-concept-label';
            label.textContent = concept.label;
            group.appendChild(label);

            var links = document.createElement('div');
            links.className = 'mm-study-links';
            quizIds.forEach(function(qid) {
                var chip = document.createElement('a');
                chip.className = 'mm-study-chip chip-quiz';
                chip.textContent = '\uD83D\uDCDD ' + qid.toUpperCase();
                chip.href = '../../quizzes/' + pid + '/' + sectionKey + '.html#' + qid;
                chip.title = 'Quiz question ' + qid;
                links.appendChild(chip);
            });
            fcIds.forEach(function(fcid) {
                var chip = document.createElement('a');
                chip.className = 'mm-study-chip chip-fc';
                chip.textContent = '\uD83D\uDCCB ' + fcid.toUpperCase();
                chip.href = '../../flashcards/' + pid + '/' + sectionKey + '.html#' + fcid;
                chip.title = 'Flashcard ' + fcid;
                links.appendChild(chip);
            });
            group.appendChild(links);
            panel.appendChild(group);
        });
        container.appendChild(panel);
    }

    function highlightTarget() {
        var hash = location.hash;
        if (!hash || hash.length < 2) return;
        var targetId = hash.substring(1);
        var targetEl = document.getElementById(targetId);
        if (!targetEl) return;
        /* Expand all ancestors so target is visible */
        var parent = targetEl.parentElement;
        while (parent) {
            if (parent.tagName === 'LI' && parent.classList.contains('mm-collapsed')) {
                parent.classList.remove('mm-collapsed');
            }
            parent = parent.parentElement;
        }
        /* Highlight the target node */
        var nodeSpan = targetEl.querySelector('.mm-node');
        if (nodeSpan) nodeSpan.classList.add('mm-highlight');
        /* Scroll into view */
        targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function expandAll() {
        document.querySelectorAll('#mindmap-tree li.mm-collapsed').forEach(function(li) {
            li.classList.remove('mm-collapsed');
        });
    }
    function collapseAll() {
        document.querySelectorAll('#mindmap-tree li').forEach(function(li) {
            if (li.querySelector('ul')) li.classList.add('mm-collapsed');
        });
    }

    var pid = 'Middle_School_Humanities_II';
    var root = document.getElementById('mindmap-tree');
    var h1 = document.createElement('h1');
    h1.textContent = mmData.name;
    root.appendChild(h1);
    if (mmData.children) {
        var ul = document.createElement('ul');
        mmData.children.forEach(function(child) { ul.appendChild(buildTree(child, 1, pid)); });
        root.appendChild(ul);
    }
    renderLinksPanel(mmData);
    var sectionKey = mmData.section || '';
    renderStudyPanel(mmMeta, pid, sectionKey);
    highlightTarget();
    </script>
