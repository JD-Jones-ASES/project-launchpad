<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Slides &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .ss-container {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }
        .ss-breadcrumb {
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        .ss-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .ss-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }
        .ss-viewer {
            position: relative;
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 24px var(--shadow-medium);
            cursor: pointer;
        }
        .ss-viewer img {
            width: 100%;
            height: auto;
            display: block;
            transition: opacity 0.3s ease;
        }
        .ss-nav {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 15%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 2;
        }
        .ss-nav:hover {
            background: rgba(0,0,0,0.3);
            color: white;
        }
        .ss-prev { left: 0; }
        .ss-next { right: 0; }
        .ss-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1rem 0;
        }
        .ss-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
        }
        .ss-btn {
            padding: 0.4rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .ss-btn:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .ss-keys {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .ss-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        /* Fullscreen */
        .ss-viewer:fullscreen {
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
        }
        .ss-viewer:-webkit-full-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">SLIDES</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 8, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="ss-container">
                <div class="ss-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                    <a href="ch08_s01.pptx" download>Download PPTX</a>
                </div>

                <div class="ss-viewer" id="viewer">
                    <button class="ss-nav ss-prev" onclick="prevSlide(event)">&lsaquo;</button>
                    <img id="slideImg" src="https://lh3.googleusercontent.com/d/1WpzoQ2jManniRKDGyvHrJZmqQAm0HfJb" alt="Slide 1">
                    <button class="ss-nav ss-next" onclick="nextSlide(event)">&rsaquo;</button>
                </div>

                <div class="ss-controls">
                    <span class="ss-counter" id="counter">1 / 13</span>
                    <button class="ss-btn" onclick="toggleFullscreen()">Fullscreen</button>
                </div>

                <div class="ss-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>F</kbd> fullscreen
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var SLIDES = ["https://lh3.googleusercontent.com/d/1WpzoQ2jManniRKDGyvHrJZmqQAm0HfJb", "https://lh3.googleusercontent.com/d/1LuYuT3N3FMZrn_-GKbHCrNANRUiy8eY8", "https://lh3.googleusercontent.com/d/1yhhD-giR4ZVnH93jdm9gonnCw38QKdw7", "https://lh3.googleusercontent.com/d/1ZKvmVtEpcJ4N-lqQWElbzG8dk-dHxI5k", "https://lh3.googleusercontent.com/d/1A7-8_EUrUTwcY3RFm6ABBGofd6cJGb6L", "https://lh3.googleusercontent.com/d/1WdW3Ng99KHIHcfNhuZsE-6w_RQ4dTBf9", "https://lh3.googleusercontent.com/d/1g5myWmrA0PBR5Xq8dr4xT3uz6h6Pr4Ng", "https://lh3.googleusercontent.com/d/1OBR6aQ_PWy_LA-bHTcXRVc3OBE9E65sZ", "https://lh3.googleusercontent.com/d/1RtG5vJm1WcHNZS4e5xxI1dUXaZvWoZM4", "https://lh3.googleusercontent.com/d/12dYKAjm9JJrBIgjit3H2F5D7Hrxg3-jU", "https://lh3.googleusercontent.com/d/1G3cSM4RLWYu4LacKbsh5NX2asK5V1wVE", "https://lh3.googleusercontent.com/d/1p59srayD--razaguJuOU7KWp2FAog5o9", "https://lh3.googleusercontent.com/d/1wxzGhmrcMBHzeLkrga-mqwF-sbENTt88"];
    var DIR = '';
    var idx = 0;

    function render() {
        document.getElementById('slideImg').src = DIR ? (DIR + '/' + SLIDES[idx]) : SLIDES[idx];
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + SLIDES.length;
    }

    function nextSlide(e) {
        if (e) e.stopPropagation();
        if (idx < SLIDES.length - 1) { idx++; render(); }
    }

    function prevSlide(e) {
        if (e) e.stopPropagation();
        if (idx > 0) { idx--; render(); }
    }

    function toggleFullscreen() {
        var el = document.getElementById('viewer');
        if (document.fullscreenElement) {
            document.exitFullscreen();
        } else {
            el.requestFullscreen();
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight') nextSlide();
        else if (e.key === 'ArrowLeft') prevSlide();
        else if (e.key === 'f' || e.key === 'F') toggleFullscreen();
    });

    // Click viewer to advance (except nav buttons)
    document.getElementById('viewer').addEventListener('click', function(e) {
        if (e.target.classList.contains('ss-nav')) return;
        nextSlide();
    });
    </script>
</body>
</html>
