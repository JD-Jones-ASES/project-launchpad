    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 5, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_II_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the two main methods for dividing polynomials discussed in this section?", "back": "The two main methods are polynomial long division and synthetic division."}, {"front": "State the Division Algorithm for Polynomials.", "back": "If P(x) and D(x) are polynomials with D(x) ≠ 0, then there exist unique polynomials Q(x) (the quotient) and R(x) (the remainder) such that P(x) = D(x)Q(x) + R(x), where either R(x) = 0 or deg(R(x)) < deg(D(x))."}, {"front": "In the Division Algorithm P(x) = D(x)Q(x) + R(x), what do P(x), D(x), Q(x), and R(x) represent?", "back": "P(x) is the dividend, D(x) is the divisor, Q(x) is the quotient, and R(x) is the remainder."}, {"front": "What condition must the remainder R(x) satisfy in the Division Algorithm for Polynomials?", "back": "Either R(x) = 0 or the degree of R(x) must be less than the degree of the divisor D(x) (deg(R(x)) < deg(D(x)))."}, {"front": "What crucial step should be taken before beginning polynomial long division if the dividend has missing terms?", "back": "Always write the dividend in standard form and insert zero-coefficient placeholder terms for any missing degrees (e.g., 0x^2)."}, {"front": "If the remainder after polynomial long division is 0, what does this imply about the divisor?", "back": "If the remainder is 0, it means the divisor is a factor of the dividend."}, {"front": "What is synthetic division?", "back": "Synthetic division is a compact algorithm for dividing a polynomial by a linear factor of the form (x - c), using only the coefficients of the polynomial."}, {"front": "When is synthetic division applicable, and how does this differ from polynomial long division?", "back": "Synthetic division is a shortcut applicable *only* when the divisor is a linear factor of the form (x - c). Polynomial long division is a general approach that works for any polynomial divisor."}, {"front": "How do you set up the coefficients for synthetic division of $3x^4 - 5x^3 + 2x - 8$ by $(x - 2)$?", "back": "The value 'c' is 2. The coefficients of P(x) are 3, -5, 0, 2, -8 (including 0 for the missing $x^2$ term)."}, {"front": "What is the first step in the synthetic division procedure after setting up the coefficients and 'c' value?", "back": "Bring down the first coefficient of the dividend to the bottom row."}, {"front": "In synthetic division, describe the repeated step that follows bringing down the first coefficient.", "back": "Multiply the number in the bottom row by 'c', write the product below the next coefficient, and then add the column to get the next number in the bottom row."}, {"front": "How do you interpret the numbers in the bottom row of a completed synthetic division table?", "back": "The last number in the bottom row is the remainder. The preceding numbers are the coefficients of the quotient polynomial, which has a degree one less than the original dividend."}, {"front": "State the Remainder Theorem.", "back": "If a polynomial P(x) is divided by (x - c), the remainder equals P(c). This can be expressed as P(x) = (x - c)Q(x) + P(c)."}, {"front": "According to the Remainder Theorem, if you divide P(x) by (x - 5), how can you find the remainder without performing the full division?", "back": "The remainder will be P(5). You can evaluate P(5) by substituting 5 into the polynomial, or more quickly by performing synthetic division with c = 5 and taking the final result."}, {"front": "How can synthetic division be used as a quick way to evaluate P(c)?", "back": "By the Remainder Theorem, the remainder obtained from dividing P(x) by (x - c) using synthetic division is equal to P(c). You simply read the last number in the bottom row."}, {"front": "When dividing $2x^3 + 3x^2 - 11x - 6$ by $x + 3$ using long division, what are the quotient and remainder?", "back": "Quotient: $2x^2 - 3x - 2$, Remainder: $0$."}, {"front": "If you need to divide $x^3 - 2x + 5$ by $x - 2$ using long division, what placeholder term should be included in the dividend?", "back": "A $0x^2$ term should be inserted, making the dividend $x^3 + 0x^2 - 2x + 5$."}, {"front": "If synthetic division results in a bottom row of [3, 1, 2, 6, 4] when dividing a 4th-degree polynomial by $(x-c)$, what is the quotient and remainder?", "back": "The quotient is $3x^3 + x^2 + 2x + 6$, and the remainder is 4."}, {"front": "What is an equivalent way to express the Division Algorithm for Polynomials, $P(x) = D(x) Q(x) + R(x)$, in terms of a fraction?", "back": "The equivalent form is $P(x) / D(x) = Q(x) + R(x) / D(x)$."}, {"front": "What is a key limitation of synthetic division compared to polynomial long division?", "back": "Synthetic division is only useful when the divisor is a linear factor of the form (x - c). It cannot be used for divisors of degree 2 or higher, or for linear divisors with a leading coefficient other than 1 (e.g., $2x - 1$)."}, {"front": "How can you verify the Remainder Theorem by evaluating P(3) for $P(x) = x^4 - 3x^2 + 5x - 7$?", "back": "Substitute 3 into P(x): $P(3) = (3)^4 - 3(3)^2 + 5(3) - 7 = 81 - 27 + 15 - 7 = 62$. The remainder is 62."}, {"front": "When performing polynomial long division, what is the goal in each step regarding the leading terms?", "back": "The goal is to eliminate the leading term of the current dividend by dividing it by the leading term of the divisor, then multiplying and subtracting."}, {"front": "What does the phrase 'streamlined shortcut' refer to in the context of synthetic division?", "back": "It refers to the fact that synthetic division is a more efficient and compact method for polynomial division when the divisor is a simple linear factor (x - c), requiring less writing than long division."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
