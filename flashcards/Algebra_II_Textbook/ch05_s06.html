<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 5, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the key characteristics of the graph of a polynomial function?", "back": "The graph of a polynomial function defines a smooth, continuous curve in the coordinate plane."}, {"front": "Define a 'zero' (or 'root') of a polynomial $P(x)$.", "back": "A zero (or root) of a polynomial $P(x)$ is a value $c$ such that $P(c) = 0$."}, {"front": "How are the zeros of a polynomial related to its graph?", "back": "The zeros of $P(x)$ are exactly the $x$-intercepts of the graph $y = P(x)$."}, {"front": "According to the Factor Theorem, what does it mean if $c$ is a zero of $P(x)$?", "back": "$(x - c)$ is a factor of $P(x)$."}, {"front": "What is the multiplicity of a zero $c$?", "back": "If $(x - c)^k$ is a factor of $P(x)$ but $(x-c)^{k+1}$ is not, then $c$ is a zero of multiplicity $k$."}, {"front": "How does the graph of a polynomial behave at an $x$-intercept corresponding to a zero with *odd* multiplicity?", "back": "The graph crosses the $x$-axis at $x = c$. (If $k \\ge 3$, the crossing is 'flattened'.)"}, {"front": "How does the graph of a polynomial behave at an $x$-intercept corresponding to a zero with *even* multiplicity?", "back": "The graph touches but does not cross the $x$-axis at $x = c$ (it bounces back)."}, {"front": "For $P(x) = x^2(x-3)^3(x+1)$, what is the multiplicity of the zero $x=0$ and how does the graph behave there?", "back": "The zero $x=0$ has multiplicity 2 (even); the graph touches but does not cross at $x=0$."}, {"front": "For $P(x) = x^2(x-3)^3(x+1)$, what is the multiplicity of the zero $x=3$ and how does the graph behave there?", "back": "The zero $x=3$ has multiplicity 3 (odd); the graph crosses and is 'flattened' at $x=3$."}, {"front": "For $P(x) = x^2(x-3)^3(x+1)$, what is the multiplicity of the zero $x=-1$ and how does the graph behave there?", "back": "The zero $x=-1$ has multiplicity 1 (odd); the graph crosses at $x=-1$."}, {"front": "Define the 'end behavior' of a polynomial.", "back": "The end behavior of a polynomial is the direction of the graph as $x \\to +\\infty$ and as $x \\to -\\infty$."}, {"front": "What determines the end behavior of a polynomial function?", "back": "The end behavior is determined entirely by the leading term $a_n x^n$."}, {"front": "Describe the end behavior of a polynomial with an *even* degree and a *positive* leading coefficient.", "back": "As $x \\to \\infty$, $y \\to \\infty$; as $x \\to -\\infty$, $y \\to \\infty$. (Both ends point up.)"}, {"front": "Describe the end behavior of a polynomial with an *even* degree and a *negative* leading coefficient.", "back": "As $x \\to \\infty$, $y \\to -\\infty$; as $x \\to -\\infty$, $y \\to -\\infty$. (Both ends point down.)"}, {"front": "Describe the end behavior of a polynomial with an *odd* degree and a *positive* leading coefficient.", "back": "As $x \\to \\infty$, $y \\to \\infty$; as $x \\to -\\infty$, $y \\to -\\infty$. (Rises to the right, falls to the left.)"}, {"front": "Describe the end behavior of a polynomial with an *odd* degree and a *negative* leading coefficient.", "back": "As $x \\to \\infty$, $y \\to -\\infty$; as $x \\to -\\infty$, $y \\to \\infty$. (Falls to the right, rises to the left.)"}, {"front": "Describe the end behavior of $f(x) = -2x^4 + 5x^2 - 1$.", "back": "The leading term is $-2x^4$. Degree 4 (even), leading coefficient $-2 < 0$. Both ends point down (as $x \\to \\pm\\infty$, $y \\to -\\infty$)."}, {"front": "Describe the end behavior of $g(x) = 3x^5 - x^3 + 7$.", "back": "The leading term is $3x^5$. Degree 5 (odd), leading coefficient $3 > 0$. Rises to the right, falls to the left (as $x \\to \\infty$, $y \\to \\infty$; as $x \\to -\\infty$, $y \\to -\\infty$)."}, {"front": "What is the first step when sketching a polynomial graph?", "back": "Determine the end behavior from the leading term."}, {"front": "After determining end behavior, what is the next step in sketching a polynomial graph?", "back": "Find all zeros (by setting $P(x) = 0$ and solving) and plot the $x$-intercepts."}, {"front": "How do you use the zeros to determine local behavior when sketching a polynomial graph?", "back": "Use multiplicity to decide whether the graph crosses or touches at each zero."}, {"front": "How do you find the $y$-intercept when sketching a polynomial graph?", "back": "Evaluate $P(0)$."}, {"front": "What is the purpose of choosing test values between consecutive zeros when sketching a polynomial graph?", "back": "To determine whether the graph is above or below the $x$-axis on each interval."}, {"front": "What is the final step in sketching a polynomial graph?", "back": "Connect smoothly, consistent with end behavior and the rules at each zero."}, {"front": "For $h(x) = -x^3(x+4)^2$, identify the zeros, their multiplicities, and behavior at each.", "back": "Zeros: $x=0$ (multiplicity 3, odd, crosses); $x=-4$ (multiplicity 2, even, touches)."}, {"front": "What is the end behavior of $h(x) = -x^3(x+4)^2$?", "back": "The leading term is $-x^3 \\cdot x^2 = -x^5$. This means the degree is 5 (odd) and the leading coefficient is negative. The end behavior is: rises left, falls right (as $x \\to \\infty$, $y \\to -\\infty$; as $x \\to -\\infty$, $y \\to \\infty$)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
