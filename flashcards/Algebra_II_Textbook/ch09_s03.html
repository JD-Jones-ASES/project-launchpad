<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 9, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_II_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Define an ellipse.", "back": "An ellipse is the set of all points in the plane whose distances to two fixed points (the foci) add up to a constant."}, {"front": "How can an ellipse be drawn using two thumbtacks and a string?", "back": "Pull a string taut between two thumbtacks (the foci). Trace the curve with a pencil, keeping the string taut. The sum of the distances from the pencil to the two tacks will always equal the string length, defining the ellipse."}, {"front": "How does an ellipse arise as a conic section?", "back": "An ellipse arises whenever a plane cuts a cone at an angle that is not parallel to the base (which gives a circle) and not parallel to a side (which gives a parabola)."}, {"front": "Name two real-world applications or phenomena modeled by ellipses.", "back": "Planetary orbits (with the sun at one focus), moon orbits, comet orbits, the design of whispering galleries, and lithotripsy machines."}, {"front": "What are the 'foci' of an ellipse, and what is the 'center'?", "back": "The foci (singular: focus) are the two fixed points used in the definition of an ellipse. The center is the midpoint of the segment joining the foci."}, {"front": "Differentiate between the semi-major axis ($a$) and semi-minor axis ($b$) of an ellipse.", "back": "The semi-major axis ($a$) is the distance from the center to a vertex (endpoint of the major axis). The semi-minor axis ($b$) is the distance from the center to a co-vertex (endpoint of the minor axis). By definition, $a > b > 0$."}, {"front": "State the relationship between $a$, $b$, and $c$ for an ellipse, where $c$ is the distance from the center to a focus.", "back": "The relationship is $c^2 = a^2 - b^2$, or equivalently $a^2 = b^2 + c^2$."}, {"front": "Write the standard form equation for an ellipse with center $(h,k)$ and a horizontal major axis.", "back": "$(x-h)^2/a^2 + (y-k)^2/b^2 = 1$, where $a > b > 0$."}, {"front": "Write the standard form equation for an ellipse with center $(h,k)$ and a vertical major axis.", "back": "$(x-h)^2/b^2 + (y-k)^2/a^2 = 1$, where $a > b > 0$."}, {"front": "How can you determine if an ellipse's major axis is horizontal or vertical from its standard form equation?", "back": "The larger denominator in the standard form always corresponds to the major axis. If $a^2$ is under the $x$-term, the major axis is horizontal; if under the $y$-term, it is vertical."}, {"front": "Where are the foci of an ellipse located relative to its center and major axis?", "back": "The foci are always inside the ellipse, located along the major axis, at a distance $c$ from the center."}, {"front": "Define the eccentricity ($e$) of an ellipse and state its range of values.", "back": "The eccentricity of an ellipse is $e = c/a$, where $c$ is the distance from the center to a focus and $a$ is the semi-major axis. The range is $0 < e < 1$."}, {"front": "How does the eccentricity of an ellipse relate to its shape?", "back": "When $e$ is close to 0, the ellipse is nearly circular. When $e$ is close to 1, the ellipse is very elongated."}, {"front": "What is the limiting case of an ellipse when its eccentricity is 0?", "back": "When $e=0$, the ellipse becomes a circle. This occurs when $c=0$, which implies $a=b=r$ (the radius)."}, {"front": "For the ellipse $x^2/25 + y^2/9 = 1$, identify the center, $a$, $b$, and $c$.", "back": "Center: $(0,0)$. $a^2=25 \\Rightarrow a=5$. $b^2=9 \\Rightarrow b=3$. $c^2=a^2-b^2 = 25-9=16 \\Rightarrow c=4$."}, {"front": "For the ellipse $x^2/25 + y^2/9 = 1$, identify the vertices, co-vertices, foci, and eccentricity.", "back": "Vertices: $(\\pm 5, 0)$. Co-vertices: $(0, \\pm 3)$. Foci: $(\\pm 4, 0)$. Eccentricity: $e = c/a = 4/5 = 0.8$."}, {"front": "For the ellipse $(x+1)^2/16 + (y-2)^2/7 = 1$, what is the center and which way is the major axis oriented?", "back": "Center: $(-1, 2)$. The major axis is horizontal because $16 > 7$, meaning $a^2$ is under the $x$-term."}, {"front": "For the ellipse $(x+1)^2/16 + (y-2)^2/7 = 1$, find $a$, $b$, and $c$.", "back": "$a^2=16 \\Rightarrow a=4$. $b^2=7 \\Rightarrow b=\\sqrt{7}$. $c^2=a^2-b^2 = 16-7=9 \\Rightarrow c=3$."}, {"front": "In the context of an elliptical orbit, what do 'perihelion' and 'aphelion' refer to?", "back": "Perihelion is the point in the orbit where the orbiting object is closest to the central body (e.g., Earth closest to the Sun). Aphelion is the point where it is farthest from the central body."}, {"front": "How are the perihelion and aphelion distances calculated for an elliptical orbit with semi-major axis $a$ and center-to-focus distance $c$?", "back": "Perihelion distance = $a - c$. Aphelion distance = $a + c$."}, {"front": "Why is completing the square a useful technique when working with general form equations of ellipses?", "back": "Completing the square converts the general form of an ellipse equation into its standard form, which directly reveals the center, the orientation of the major axis, and the lengths of the semi-major and semi-minor axes."}, {"front": "What significant discovery did Johannes Kepler make about planetary orbits in the early seventeenth century?", "back": "Kepler discovered that planetary orbits follow ellipses with the sun at one focus."}, {"front": "If $a^2$ is the denominator of the $(x-h)^2$ term in the standard form of an ellipse, what does this tell you about the ellipse?", "back": "It indicates that the semi-major axis is $a$, and the major axis is horizontal."}, {"front": "Find the foci and eccentricity of $x^2/36 + y^2/20 = 1$.", "back": "For $x^2/36 + y^2/20 = 1$: $a^2=36 \\Rightarrow a=6$. $b^2=20$. $c^2=a^2-b^2 = 36-20=16 \\Rightarrow c=4$. Foci: $(\\pm 4, 0)$. Eccentricity: $e = c/a = 4/6 = 2/3$."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
