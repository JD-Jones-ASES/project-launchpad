<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 7, Section 7</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what common scenarios do exponential functions model growth or decay?", "back": "When a quantity grows or shrinks at a rate proportional to its current size, such as population growth, radioactive decay, and continuously compounded bank balances.", "id": "fc01"}, {"front": "State the formula for the Continuous Growth/Decay Model.", "back": "A(t) = A_0 * e^(kt), where A(t) is the amount at time t, A_0 is the initial amount, e is Euler's number, and k is the continuous growth/decay rate.", "id": "fc02"}, {"front": "In the continuous growth/decay model, what does the sign of the constant 'k' indicate?", "back": "If k > 0, it indicates exponential growth. If k < 0, it indicates exponential decay.", "id": "fc03"}, {"front": "What is the very first step in applying the continuous growth/decay model to a real-world problem?", "back": "Use known data points to determine the growth/decay constant 'k'.", "id": "fc04"}, {"front": "What is 'half-life' in the context of exponential decay?", "back": "The time required for a quantity to decay to half of its original amount.", "id": "fc05"}, {"front": "How do you calculate the continuous decay rate (k) if you know the half-life (T)?", "back": "Set A(T) = A_0/2 in the formula A(t) = A_0 * e^(kt), leading to 1/2 = e^(kT), and thus k = ln(1/2)/T or k = -ln(2)/T.", "id": "fc06"}, {"front": "What is 'doubling time' in the context of exponential growth?", "back": "The time required for a quantity to double its original amount.", "id": "fc07"}, {"front": "How do you calculate the continuous growth rate (k) if you know the doubling time (T)?", "back": "Set A(T) = 2A_0 in the formula A(t) = A_0 * e^(kt), leading to 2 = e^(kT), and thus k = ln(2)/T.", "id": "fc08"}, {"front": "Does the doubling time (or half-life) of a quantity depend on its initial amount (A_0)?", "back": "No, the initial amount A_0 cancels out in the calculation, meaning doubling time or half-life depends only on the rate 'k'.", "id": "fc09"}, {"front": "A city's population in 2010 was 250,000, growing continuously at 2.3% per year. What is the value for 'k' in the growth model?", "back": "k = 0.023 (as a decimal from 2.3%).", "id": "fc10"}, {"front": "If sunlight intensity at the surface of a lake is 1,200 lm/m^2, and at 3 meters depth is 600 lm/m^2, what is the half-life of light intensity with respect to depth?", "back": "The half-life is 3 meters, as the intensity halves over that depth.", "id": "fc11"}, {"front": "How is the pH of a solution mathematically defined?", "back": "pH = -log[H+], where [H+] is the hydrogen ion concentration in moles per liter.", "id": "fc12"}, {"front": "What pH range indicates an acidic solution, and what indicates a basic solution?", "back": "A pH below 7 is acidic. A pH above 7 is basic.", "id": "fc13"}, {"front": "If a solution has a pH of 9.2, how would you calculate its hydrogen ion concentration [H+]?", "back": "Since pH = -log[H+], then log[H+] = -pH, which means [H+] = 10^(-pH). So, [H+] = 10^(-9.2).", "id": "fc14"}, {"front": "How is the Richter magnitude (M) of an earthquake defined?", "back": "M = log(I/I_0), where I is the intensity of the quake and I_0 is a reference intensity (smallest measurable quake).", "id": "fc15"}, {"front": "If an earthquake measures 7.2 on the Richter scale and a second quake measures 5.0, how many times more intense is the first quake than the second?", "back": "The ratio of intensities is 10^(M1 - M2). So, 10^(7.2 - 5.0) = 10^2.2, which is approximately 158 times more intense.", "id": "fc16"}, {"front": "Why are logarithmic scales (like pH, Richter) useful for measuring quantities that span enormous ranges of magnitude?", "back": "They compress vast ranges of numbers into more manageable and understandable scales, making comparisons and analyses simpler.", "id": "fc17"}, {"front": "Visually, what is the key distinction between exponential growth curves and exponential decay curves?", "back": "Growth curves rise without bound, while decay curves fall toward a horizontal asymptote.", "id": "fc18"}, {"front": "A bacterial colony triples in 8 hours. How would you set up the equation to find the continuous growth rate 'k'?", "back": "Using A(t) = A_0 * e^(kt), set A(8) = 3A_0. So, 3A_0 = A_0 * e^(k*8), which simplifies to 3 = e^(8k).", "id": "fc19"}, {"front": "Carbon-14 has a half-life of 5,730 years. If a fossil contains 30% of its original C-14, is its age more or less than 5,730 years?", "back": "Its age is more than 5,730 years. If it were 5,730 years old, it would contain 50% of its original C-14. 30% remaining means more time has passed.", "id": "fc20"}, {"front": "What is the fundamental inverse relationship between exponential and logarithmic functions?", "back": "Exponential functions (e.g., b^x = y) describe a quantity, while logarithmic functions (e.g., log_b y = x) are their inverse, used to solve for the exponent (often time or rate) in exponential equations.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
