<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_II_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "When do inequalities typically arise in mathematics and everyday life?", "back": "Inequalities arise when a quantity must fall within a range rather than equal a specific value, such as \"temperature below 32°F\" or \"work at least 40 hours.\""}, {"front": "Define an \"inequality.\"", "back": "An inequality is a statement that one expression is greater than, less than, greater than or equal to, or less than or equal to another."}, {"front": "How does the solution set of an inequality differ from that of an equation? How is it typically expressed?", "back": "Unlike an equation, whose solution is usually a single value, the solution set of an inequality is typically an entire interval of real numbers, expressed using interval notation."}, {"front": "What is the most important \"twist\" or crucial rule when solving inequalities compared to equations?", "back": "The most important rule is that multiplying or dividing both sides of an inequality by a negative number reverses the direction of the inequality sign."}, {"front": "How do addition and subtraction affect the direction of an inequality?", "back": "Adding or subtracting the same real number to both sides of an inequality does not change the direction of the inequality symbol. (If a < b, then a + c < b + c and a - c < b - c)."}, {"front": "How does multiplying or dividing by a *positive* number affect the direction of an inequality?", "back": "Multiplying or dividing both sides of an inequality by the same *positive* real number does not change the direction of the inequality symbol. (If a < b and c > 0, then ac < bc and a/c < b/c)."}, {"front": "How does multiplying or dividing by a *negative* number affect the direction of an inequality?", "back": "Multiplying or dividing both sides of an inequality by the same *negative* real number *must reverse* the direction of the inequality symbol. (If a < b and c < 0, then ac > bc and a/c > b/c)."}, {"front": "What is the single most common error made when solving inequalities?", "back": "Forgetting to flip the inequality sign when multiplying or dividing both sides by a negative number."}, {"front": "Solve the inequality 4x - 5 ≥ 7 and write the solution in interval notation.", "back": "4x - 5 ≥ 7 ⇒ 4x ≥ 12 ⇒ x ≥ 3. Solution set: [3, ∞)."}, {"front": "Explain why the solution to -2x < 6 is x > -3 and not x < -3.", "back": "When dividing both sides of -2x < 6 by -2 (a negative number), the inequality sign must be reversed, changing < to >. So, x > -3."}, {"front": "Define a \"compound inequality.\"", "back": "A compound inequality combines two inequalities using the word \"and\" or the word \"or\", representing conditions that must both hold or at least one must hold, respectively."}, {"front": "What characterizes an \"AND\" compound inequality, and how is its solution set formed? How is it often written compactly?", "back": "In an \"AND\" compound inequality, both conditions must hold simultaneously. The solution set is the *intersection* of the individual solution sets. It is often written compactly as a < x < b."}, {"front": "What characterizes an \"OR\" compound inequality, and how is its solution set formed?", "back": "In an \"OR\" compound inequality, at least one condition must hold. The solution set is the *union* of the individual solution sets."}, {"front": "How do you solve a compact compound \"AND\" inequality like -4 < 2x + 1 ≤ 9?", "back": "Perform the same operations (addition, subtraction, multiplication, division) on all three parts of the inequality simultaneously to isolate the variable in the middle."}, {"front": "Solve -4 < 2x + 1 ≤ 9 and write the solution in interval notation.", "back": "-4 < 2x + 1 ≤ 9 ⇒ -5 < 2x ≤ 8 ⇒ -5/2 < x ≤ 4. Solution set: (-5/2, 4]."}, {"front": "How do you solve a compound \"OR\" inequality like 2x + 5 < 1 or 3x - 4 ≥ 8?", "back": "Solve each individual inequality separately. Then, combine their solution sets using the union operator (typically denoted by ∪)."}, {"front": "Solve 2x + 5 < 1 or 3x - 4 ≥ 8 and write the solution in interval notation.", "back": "1. 2x + 5 < 1 ⇒ 2x < -4 ⇒ x < -2. (Solution: (-∞, -2))\n2. 3x - 4 ≥ 8 ⇒ 3x ≥ 12 ⇒ x ≥ 4. (Solution: [4, ∞))\nCombined solution (union): (-∞, -2) ∪ [4, ∞)."}, {"front": "When translating word problems into inequalities, what inequality symbols do the phrases \"at most\", \"no more than\", and \"at least\" correspond to?", "back": "\"At most\" and \"no more than\" correspond to ≤ (less than or equal to).\n\"At least\" corresponds to ≥ (greater than or equal to)."}, {"front": "If \"the sum of two consecutive integers is at most 47\", set up and solve the inequality for the smaller integer n.", "back": "Let the integers be n and n+1. The inequality is n + (n+1) ≤ 47.\n2n + 1 ≤ 47 ⇒ 2n ≤ 46 ⇒ n ≤ 23."}, {"front": "Can an inequality be an identity or a contradiction? Provide an example for each.", "back": "Yes, inequalities can be identities or contradictions.\nIdentity: An inequality that is always true, e.g., x + 1 > x.\nContradiction: An inequality that is never true, e.g., x + 1 < x."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
