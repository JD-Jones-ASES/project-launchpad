<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 5, Section 7</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a polynomial inequality?", "back": "An inequality that asks for all values of $x$ that make a polynomial expression, such as $P(x) > 0$ or $P(x) \\le 0$, true."}, {"front": "What is the key insight for determining where a polynomial is positive, negative, or zero?", "back": "A polynomial can only change sign at its zeros; between consecutive zeros, the polynomial is entirely positive or entirely negative."}, {"front": "What is the primary method used to efficiently solve polynomial inequalities?", "back": "The Sign Chart Method, also called an interval analysis table."}, {"front": "What is the first step in the Sign Chart Method for polynomial inequalities?", "back": "Move all terms to one side so the inequality has the form $P(x) \\diamond 0$ (e.g., $P(x) > 0$, $P(x) \\le 0$)."}, {"front": "What is the second step in the Sign Chart Method?", "back": "Factor the polynomial $P(x)$ completely."}, {"front": "In the Sign Chart Method, what are 'critical numbers' and how are they found?", "back": "Critical numbers are the zeros of the polynomial $P(x)$."}, {"front": "How do critical numbers partition the number line?", "back": "They divide the number line into intervals, within which the polynomial's sign remains constant."}, {"front": "How do you determine the sign of the polynomial in each interval of a sign chart?", "back": "Test one value from each interval in the factored form of $P(x)$ (or in each factor) to determine the sign."}, {"front": "When solving a strict polynomial inequality (e.g., $P(x) > 0$ or $P(x) < 0$), how are the endpoints of the solution intervals handled?", "back": "Endpoints are excluded from the solution set because at these points $P(x) = 0$, which does not satisfy the strict inequality."}, {"front": "When solving a non-strict polynomial inequality (e.g., $P(x) \\ge 0$ or $P(x) \\le 0$), how are the endpoints of the solution intervals handled?", "back": "Endpoints (the zeros of $P(x)$) are included in the solution set because $P(x)$ is equal to zero at these points, satisfying the 'or equal to' condition."}, {"front": "What is the final step in the Sign Chart Method after determining the signs in each interval?", "back": "Select the intervals where the sign matches the inequality, then write the solution in interval notation."}, {"front": "Why does a polynomial not change sign within any interval between consecutive zeros?", "back": "Because for the sign to change, the polynomial would have to cross the x-axis, meaning it would have another zero, which contradicts the definition of consecutive zeros."}, {"front": "How does a zero with an even multiplicity affect the sign of the polynomial in the neighboring intervals on a sign chart?", "back": "The polynomial does not change sign at a zero with even multiplicity; the sign in both neighboring intervals remains the same."}, {"front": "For the inequality $(x+1)^2(x-3) > 0$, why is $x=-1$ not part of the solution despite being a critical number?", "back": "Because at $x=-1$, the polynomial equals $0$, which does not satisfy the strict inequality condition of being 'greater than 0'."}, {"front": "If a polynomial inequality is given as $x^2 > 3x + 10$, what is the first step according to the Sign Chart Method?", "back": "Rearrange all terms to one side to get $x^2 - 3x - 10 > 0$, so the right side is zero."}, {"front": "When is substitution a useful technique in solving polynomial inequalities, such as $x^4 - 5x^2 + 4 \\le 0$?", "back": "When the polynomial is in a quadratic form with respect to a power of $x$ (e.g., $x^2$), substitution (like $u=x^2$) can simplify factoring."}, {"front": "What happens to the inequality sign if you divide or multiply both sides of an inequality by a negative number?", "back": "The direction of the inequality sign must be reversed."}, {"front": "Consider the applied problem: For what values of $t$ is $h(t) = -16t^2 + 64t + 6$ above $70$ ft? What is the initial inequality setup?", "back": "$-16t^2 + 64t + 6 > 70$."}, {"front": "If solving $(t-2)^2 < 0$, what is the solution?", "back": "No solution, because $(t-2)^2$ is always greater than or equal to $0$ for all real $t$, so it can never be strictly less than $0$."}, {"front": "How does factoring a polynomial pay dividends when solving polynomial inequalities?", "back": "Factoring helps find the zeros, which are critical numbers that define the intervals where the polynomial's sign is constant."}, {"front": "For what type of inequalities are zeros with even multiplicity typically *not* part of the solution?", "back": "Strict inequalities ($>$ or $<$), because at these zeros, $P(x)$ is exactly $0$, not strictly positive or negative."}, {"front": "In interval notation, how would you represent the solution for a polynomial that is positive on $(-\\infty, -2)$ and $(5, \\infty)$, excluding endpoints?", "back": "$$(-\\infty, -2) \\cup (5, \\infty)$$."}, {"front": "What is the primary difference in applying the Sign Chart Method to $P(x) > 0$ versus $P(x) \\ge 0$?", "back": "For $P(x) > 0$, zeros are excluded from the solution; for $P(x) \\ge 0$, zeros are included."}, {"front": "If you correctly follow the Sign Chart Method and find the solution for $(x-2)(x+1)(x-5) \\le 0$, what should the answer be?", "back": "$$(-\\infty,-1] \\cup [2,5]$$."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
