<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the mathematical definition of a 'set'?", "back": "A well-defined collection of objects."}, {"front": "In set theory, what terms are used to describe the objects that belong to a set?", "back": "Elements or members."}, {"front": "What does the notation $a \\in A$ represent?", "back": "The object $a$ is an element of set $A$."}, {"front": "What does the notation $a \\notin A$ represent?", "back": "The object $a$ is not an element of set $A$."}, {"front": "Which set notation method involves listing every element of the set between braces?", "back": "Roster notation."}, {"front": "Which set notation method describes a set by stating a rule that every element must satisfy?", "back": "Set-builder notation."}, {"front": "In the set-builder expression $\\{x \\mid x \\text{ is a positive integer}\\}$, what does the vertical bar $\\mid$ mean?", "back": "Such that."}, {"front": "What is the term for a set that contains no elements?", "back": "The empty set (or null set)."}, {"front": "What symbol is used to denote the empty set?", "back": "$\\emptyset$."}, {"front": "Describe the relationship between a smaller set and a larger set if the smaller one is a 'subset' of the larger one.", "back": "Every element of the smaller set also belongs to the larger set."}, {"front": "What are the elements of the set of natural numbers $\\mathbb{N}$?", "back": "$\\{1, 2, 3, 4, \\dots\\}$"}, {"front": "What is the alternative name for the set of natural numbers $\\mathbb{N}$?", "back": "Counting numbers."}, {"front": "The set of integers $\\mathbb{Z}$ consists of the natural numbers, zero, and _____.", "back": "All negative whole numbers."}, {"front": "Identify the set of numbers represented by the list $\\{\\dots, -3, -2, -1, 0, 1, 2, 3, \\dots\\}$.", "back": "Integers (denoted by $\\mathbb{Z}$)."}, {"front": "What is the definition of a rational number?", "back": "A number that can be written as a ratio $p/q$ where $p, q$ are integers and $q \\ne 0$."}, {"front": "What symbol is used to denote the set of all rational numbers?", "back": "$\\mathbb{Q}$."}, {"front": "Describe the two possible decimal forms of any rational number.", "back": "They either terminate or repeat."}, {"front": "Explain why every integer $n$ is also a rational number.", "back": "Every integer $n$ can be written as the ratio $n/1$."}, {"front": "What is the definition of an irrational number?", "back": "A real number that cannot be expressed as a ratio of two integers."}, {"front": "What are the characteristics of the decimal expansion of an irrational number?", "back": "It is non-terminating and non-repeating."}, {"front": "Identify three common examples of irrational numbers.", "back": "$\\sqrt{2}$, $\\sqrt{3}$, and $\\pi$ (approximately $3.14159$)."}, {"front": "The set of real numbers $\\mathbb{R}$ is the combination of which two main groups of numbers?", "back": "Rational and irrational numbers."}, {"front": "What does every point on the number line correspond to?", "back": "Exactly one real number."}, {"front": "List the containment chain of the four standard number sets starting from the smallest.", "back": "$\\mathbb{N} \\subseteq \\mathbb{Z} \\subseteq \\mathbb{Q} \\subseteq \\mathbb{R}$."}, {"front": "To which sets in the number-set hierarchy does the number $-5$ belong?", "back": "Integers ($\\mathbb{Z}$), Rational numbers ($\\mathbb{Q}$), and Real numbers ($\\mathbb{R}$)."}, {"front": "Explain why $0$ is not a natural number.", "back": "The set of natural numbers $\\mathbb{N}$ is defined as $\\{1, 2, 3, \\dots\\}$ and does not include zero."}, {"front": "To which sets in the number-set hierarchy does the number $3/4$ belong?", "back": "Rational numbers ($\\mathbb{Q}$) and Real numbers ($\\mathbb{R}$)."}, {"front": "To which sets in the number-set hierarchy does the number $\\sqrt{7}$ belong?", "back": "Irrational numbers and Real numbers ($\\mathbb{R}$)."}, {"front": "Why is $0.333\\dots = 0.\\bar{3}$ classified as a rational number?", "back": "It is a repeating decimal that can be written as the ratio $1/3$."}, {"front": "When is it appropriate to use interval notation instead of listing elements individually?", "back": "When the solution is a continuous range of real numbers (uncountable sets)."}, {"front": "What is the interval notation for the inequality $a \\le x \\le b$?", "back": "$[a, b]$"}, {"front": "What is the interval notation for the inequality $a < x < b$?", "back": "$(a, b)$"}, {"front": "Why are $\\infty$ and $-\\infty$ always paired with parentheses rather than square brackets in interval notation?", "back": "Infinity is not a real number and cannot be an included endpoint."}, {"front": "On a number line graph, what does a filled circle denote?", "back": "A closed endpoint (the number is included in the set)."}, {"front": "On a number line graph, what does an open circle denote?", "back": "An open endpoint (the number is excluded from the set)."}, {"front": "Write the inequality $-3 \\le x < 5$ in interval notation.", "back": "$[-3, 5)$"}, {"front": "Write the inequality $x > 2$ in interval notation.", "back": "$(2, \\infty)$"}, {"front": "Write the inequality $x \\le -1$ in interval notation.", "back": "$(-\\infty, -1]$"}, {"front": "Describe the number-line graph for the inequality $x > 2$.", "back": "An open circle at $2$ with shading to the right indefinitely."}, {"front": "Describe the number-line graph for the inequality $x \\le -1$.", "back": "A filled circle at $-1$ with shading to the left indefinitely."}, {"front": "In the context of set operations, what does the union $A \\cup B$ contain?", "back": "Every element belonging to $A$, to $B$, or to both."}, {"front": "In the context of set operations, what does the intersection $A \\cap B$ contain?", "back": "Only elements belonging to both $A$ and $B$."}, {"front": "State the set-builder definition for the union $A \\cup B$.", "back": "$A \\cup B = \\{x \\mid x \\in A \\text{ or } x \\in B\\}$"}, {"front": "State the set-builder definition for the intersection $A \\cap B$.", "back": "$A \\cap B = \\{x \\mid x \\in A \\text{ and } x \\in B\\}$"}, {"front": "What mnemonic aid distinguishes the union symbol $\\cup$ from the intersection symbol $\\cap$?", "back": "The union symbol $\\cup$ looks like a 'U'."}, {"front": "When working with intervals, what does the intersection specifically represent?", "back": "The overlap between the intervals."}, {"front": "Given $A = [-1, 4)$ and $B = (2, 7]$, find $A \\cup B$.", "back": "$[-1, 7]$"}, {"front": "Given $A = [-1, 4)$ and $B = (2, 7]$, find $A \\cap B$.", "back": "$(2, 4)$"}, {"front": "If $C = (-\\infty, 5]$ and $D = [3, \\infty)$, find the union $C \\cup D$.", "back": "$(-\\infty, \\infty)$ (or $\\mathbb{R}$)"}, {"front": "If $C = (-\\infty, 5]$ and $D = [3, \\infty)$, find the intersection $C \\cap D$.", "back": "$[3, 5]$"}, {"front": "Which specific number sets are infinite and cannot be written in roster notation?", "back": "$\\mathbb{N}$, $\\mathbb{Z}$, $\\mathbb{Q}$, and $\\mathbb{R}$."}, {"front": "Under what condition can a subset of an infinite set be written in roster notation?", "back": "If the subset is finite (e.g., $\\{1, 2, 3\\}$)."}, {"front": "What is the interval notation for the set of real numbers that are 'at most' $-1$?", "back": "$(-\\infty, -1]$"}, {"front": "What is the interval notation for the set of real numbers that are 'at least' $-3$ and 'strictly less than' $5$?", "back": "$[-3, 5)$"}, {"front": "What is the interval notation for the set of real numbers that are 'strictly greater than' $2$?", "back": "$(2, \\infty)$"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
