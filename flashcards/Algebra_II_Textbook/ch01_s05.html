<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 1, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_II_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In the expression a^n, what are a, n, and a^n called?", "back": "a is the base, n is the exponent, and a^n is the power."}, {"front": "What is the definition of a^n for a positive integer n?", "back": "a^n means 'a' multiplied by itself n times (n factors of a)."}, {"front": "State the Product Rule for Exponents.", "back": "For real numbers a (a ≠ 0 if in denominator) and integers m, n: a^m · a^n = a^(m+n)."}, {"front": "State the Quotient Rule for Exponents.", "back": "For real numbers a (a ≠ 0 if in denominator) and integers m, n: a^m / a^n = a^(m-n)."}, {"front": "State the Power Rule for Exponents.", "back": "For real numbers a (a ≠ 0 if in denominator) and integers m, n: (a^m)^n = a^(mn)."}, {"front": "State the Product to a Power Rule.", "back": "For real numbers a and b (a, b ≠ 0 if in denominator) and integer n: (ab)^n = a^n b^n."}, {"front": "State the Quotient to a Power Rule.", "back": "For real numbers a and b (a, b ≠ 0 if in denominator) and integer n: (a/b)^n = a^n / b^n."}, {"front": "How is a^0 defined for any non-zero real number a?", "back": "a^0 = 1."}, {"front": "How is a^-n defined for any non-zero real number a and positive integer n?", "back": "a^-n = 1/a^n."}, {"front": "What does a negative exponent signify?", "back": "A negative exponent signifies a reciprocal, not a negative output. For example, 2^-2 = 1/2^2 = 1/4."}, {"front": "What is 0^0?", "back": "The expression 0^0 is undefined. The rule a^0 = 1 holds only when a ≠ 0."}, {"front": "What is scientific notation?", "back": "A number is in scientific notation when it is written as a · 10^n, where 1 ≤ a < 10 and n is an integer."}, {"front": "In the expression √n(a), what are the radical sign, 'a', and 'n' called?", "back": "The symbol √ is the radical sign, 'a' is the radicand, and 'n' is the index (omitted for square roots where n=2)."}, {"front": "What is the principal square root of 'a' (for a ≥ 0)?", "back": "The principal square root √a is the unique non-negative number whose square is a."}, {"front": "State the Product Rule for Radicals.", "back": "For real numbers a ≥ 0, b > 0, and positive integer n: √n(ab) = √na · √nb."}, {"front": "State the Quotient Rule for Radicals.", "back": "For real numbers a ≥ 0, b > 0, and positive integer n: √n(a/b) = √na / √nb."}, {"front": "What does it mean to rationalize the denominator of a fraction?", "back": "To rewrite the fraction in an equivalent form with no radical in the denominator, without changing its value."}, {"front": "How do you rationalize a monomial denominator like a/√b?", "back": "Multiply the numerator and denominator by √b: (a/√b) · (√b/√b) = a√b / b."}, {"front": "How do you rationalize a binomial denominator involving a square root, like 1/(p - √q)?", "back": "Multiply the numerator and denominator by the conjugate of the denominator, (p + √q). Their product (p - √q)(p + √q) = p^2 - q is rational."}, {"front": "Simplify (x^3 y^-2) / (x^-1 y^4) and write the result with positive exponents only.", "back": "x^(3 - (-1)) y^(-2 - 4) = x^4 y^-6 = x^4 / y^6."}, {"front": "Compute (3.6 · 10^8)(2.0 · 10^-3) / (1.2 · 10^5) and express the result in scientific notation.", "back": "Group decimal parts and powers of 10: (3.6 · 2.0 / 1.2) · (10^(8 + (-3) - 5)) = 6.0 · 10^0."}, {"front": "Simplify √(72 x^3 y^4). Assume x ≥ 0, y ≥ 0.", "back": "√(36 · 2 · x^2 · x · y^4) = √36 · √x^2 · √y^4 · √(2x) = 6xy^2√(2x)."}, {"front": "Rationalize the denominator of 5 / (2 - √3).", "back": "(5 / (2 - √3)) · ((2 + √3) / (2 + √3)) = 5(2 + √3) / (2^2 - (√3)^2) = (10 + 5√3) / (4 - 3) = 10 + 5√3."}, {"front": "A square tile has an area of 50 cm^2. Find its exact side length.", "back": "Let s be the side length. s^2 = 50, so s = √50. Simplifying: √(25 · 2) = 5√2 cm."}, {"front": "Why do cube roots arise naturally in geometry?", "back": "Cube roots arise when computing a side length from a volume (e.g., s = ∛Volume for a cube)."}, {"front": "What is the relationship between √n(a) and rational exponents?", "back": "√n(a) = a^(1/n). Every radical can be rewritten as a fractional power and vice versa."}, {"front": "True or False: √(a + b) = √a + √b. Explain.", "back": "False. The Product Rule for Radicals applies to products, not sums. For example, √(9 + 16) = √25 = 5, but √9 + √16 = 3 + 4 = 7."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
