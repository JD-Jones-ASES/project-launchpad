<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 8, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How do scaling transformations differ from shifts?", "back": "Shifts move every point the same distance (add/subtract to input/output), while scaling transformations multiply input/output values, making the graph taller/shorter or wider/narrower."}, {"front": "What is the general rule for a vertical stretch or compression of y = f(x)?", "back": "The graph of y = f(x) becomes y = a * f(x), where 'a' is a positive constant."}, {"front": "Describe the transformation of y = f(x) when it becomes y = a * f(x) for a > 1.", "back": "The graph is stretched vertically by a factor of 'a', making it appear taller and narrower."}, {"front": "Describe the transformation of y = f(x) when it becomes y = a * f(x) for 0 < a < 1.", "back": "The graph is compressed vertically by a factor of 'a', making it appear shorter and wider."}, {"front": "If (x, y) is a point on y = f(x), what is the corresponding point on y = a * f(x)?", "back": "Each point (x, y) on y = f(x) maps to (x, ay) on y = a * f(x)."}, {"front": "Which points on a graph are unaffected by a vertical stretch or compression?", "back": "Points on the x-axis (where y = 0) are unchanged, because a * 0 = 0."}, {"front": "What is the general rule for a horizontal stretch or compression of y = f(x)?", "back": "The graph of y = f(x) becomes y = f(bx), where 'b' is a positive constant."}, {"front": "What is the counterintuitive property of horizontal scaling?", "back": "Multiplying the input by b > 1 actually compresses the graph horizontally, making it narrower, rather than stretching it."}, {"front": "Describe the transformation of y = f(x) when it becomes y = f(bx) for b > 1.", "back": "The graph is compressed horizontally by a factor of 1/b, making it narrower."}, {"front": "Describe the transformation of y = f(x) when it becomes y = f(bx) for 0 < b < 1.", "back": "The graph is stretched horizontally by a factor of 1/b, making it wider."}, {"front": "If (x, y) is a point on y = f(x), what is the corresponding point on y = f(bx)?", "back": "The point (x, y) maps to (x/b, y)."}, {"front": "Explain the mnemonic 'the function is working twice as fast' for understanding f(2x).", "back": "For f(2x), the function reaches a given y-value at half the x-distance compared to f(x), which means the graph is compressed horizontally (narrower)."}, {"front": "For f(x) = x^2, show how a horizontal compression is equivalent to a vertical stretch.", "back": "f(2x) = (2x)^2 = 4x^2 = 4f(x). A horizontal compression by 1/2 (where b=2) is the same as a vertical stretch by 4 (where a=4) for this specific function."}, {"front": "Does af(x) always equal f(bx) for some constants a and b?", "back": "No, for most functions, af(x) ≠ f(bx), and the distinction between vertical and horizontal scaling matters significantly."}, {"front": "When combining transformations, what is the general principle for the order of application?", "back": "Apply transformations 'inside to outside': first horizontal changes (shifts, stretches/compressions), then reflections, then vertical changes (stretches/compressions, then shifts)."}, {"front": "List the full recommended order of transformations from f(x) to a*f(b(x+c)) + d.", "back": "1. Horizontal shifts (x+c). 2. Horizontal stretches/compressions (b*x). 3. Reflections over the y-axis (if b is negative). 4. Vertical stretches/compressions (a*f). 5. Reflections over the x-axis (if a is negative). 6. Vertical shifts (+d)."}, {"front": "Given f(x) = |x|, identify all transformations applied in g(x) = -2|x + 1| - 3.", "back": "1. Horizontal shift left 1 (from x+1).\n2. Vertical stretch by a factor of 2 (from the '2').\n3. Reflection over the x-axis (from the leading '-').\n4. Vertical shift down 3 (from the '- 3')."}, {"front": "What is the vertex of g(x) = -2|x + 1| - 3?", "back": "The vertex is (-1, -3). (Shifted left 1 from (0,0) to (-1,0), then stretched/reflected, then shifted down 3)."}, {"front": "The graph of y = x^2 is shifted right 3, compressed vertically by 1/2, then shifted down 4. Write the new equation.", "back": "y = (1/2)(x - 3)^2 - 4"}, {"front": "Why is it important not to apply transformations in the wrong order?", "back": "Applying transformations in the wrong order (e.g., shifting before stretching/compressing) generally results in a different graph than applying them in the correct sequence, except in special cases."}, {"front": "Describe the transformations applied to f(x) = x to get h(x) = 3(-(x-2)) + 1.", "back": "1. Horizontal shift right 2 (from x-2).\n2. Reflection over the y-axis (from the negative sign inside -(x-2)).\n3. Vertical stretch by a factor of 3 (from the '3' outside).\n4. Vertical shift up 1 (from the '+ 1').\nThe starting point would be (2, 1)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
