<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_II_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the geometric definition of the absolute value of a number $x$?", "back": "The absolute value of a number $x$, written $x$, is the distance from $x$ to $0$ on the number line."}, {"front": "How is the absolute value of a real number $x$ defined algebraically (piecewise)?", "back": "$x = cases x & if x \\geq 0, \\\\ -x & if x < 0. cases$"}, {"front": "Is the absolute value of a number ever negative? Explain.", "back": "No, the absolute value $x$ is always non-negative ($x \\geq 0$) because it represents distance, which is never negative."}, {"front": "What is the standard absolute value function, and what are its domain and range?", "back": "The standard absolute value function is $f(x) = x$. Its domain is $(-\\infty, \\infty)$ and its range is $[0, \\infty)$."}, {"front": "Describe the characteristic graph shape and vertex of the absolute value function $f(x) = x$.", "back": "The graph of $f(x) = x$ is a V-shape with its vertex at the origin $(0, 0)$."}, {"front": "Is $f(x) = x$ an even or odd function? How does its graph demonstrate this?", "back": "It is an even function because $f(-x) = -x = x = f(x)$ for all $x$. Its graph is symmetric about the $y$-axis."}, {"front": "What is the general form for transformations of an absolute value function?", "back": "The general form is $y = a\\,x - h + k$."}, {"front": "In the general form $y = a\\,x - h + k$, what transformation does $h$ control?", "back": "$h$ shifts the vertex horizontally: right $h$ units if $h > 0$, or left $|h|$ units if $h < 0$."}, {"front": "In the general form $y = a\\,x - h + k$, what transformation does $k$ control?", "back": "$k$ shifts the vertex vertically: up $k$ units if $k > 0$, or down $|k|$ units if $k < 0$."}, {"front": "In the general form $y = a\\,x - h + k$, what does the sign of $a$ indicate?", "back": "If $a > 0$, the V opens upward. If $a < 0$, it opens downward (a reflection over the $x$-axis)."}, {"front": "In the general form $y = a\\,x - h + k$, what does the magnitude of $a$ (i.e., $|a|$) indicate?", "back": "If $|a| > 1$, the graph is steeper (vertical stretch). If $0 < |a| < 1$, the graph is wider (vertical compression)."}, {"front": "What are the vertex and axis of symmetry for an absolute value function in the form $f(x) = a\\,x - h + k$?", "back": "The vertex is $(h, k)$ and the axis of symmetry is the vertical line $x = h$."}, {"front": "For $f(x) = a\\,x - h + k$, what is the range if $a > 0$?", "back": "If $a > 0$, the V opens upward, so the range is $[k, \\infty)$."}, {"front": "For $f(x) = a\\,x - h + k$, what is the range if $a < 0$?", "back": "If $a < 0$, the V opens downward, so the range is $(-\\infty, k]$."}, {"front": "For $f(x) = x - 2 + 1$, identify its vertex, direction of opening, and range.", "back": "Vertex: $(2, 1)$; Opens upward (since $a=1 > 0$); Range: $[1, \\infty)$."}, {"front": "Describe the transformation from $y = x$ to $f(x) = x - 2 + 1$.", "back": "The graph of $y = x$ is shifted right 2 units and up 1 unit."}, {"front": "For $g(x) = -x + 3$, identify its vertex, direction of opening, and range.", "back": "Vertex: $(0, 3)$ (since $h=0, k=3$); Opens downward (since $a=-1 < 0$); Range: $(-\\infty, 3]$."}, {"front": "Describe the transformation from $y = x$ to $g(x) = -x + 3$.", "back": "The graph of $y = x$ is reflected over the $x$-axis and then shifted up 3 units."}, {"front": "Rewrite $f(x) = 2x - 6$ as a piecewise function without absolute value signs.", "back": "$f(x) = cases -2x + 6 & if x < 3, \\\\ 2x - 6 & if x \\geq 3. cases$"}, {"front": "Solve the absolute value equation $x - 1 = 3$ algebraically.", "back": "Break into two cases: $x - 1 = 3$ or $x - 1 = -3$. This yields $x = 4$ or $x = -2$."}, {"front": "How can the solutions to $x - 1 = 3$ be interpreted graphically?", "back": "The solutions are the $x$-coordinates of the intersection points between the graph of $y = x-1$ and the horizontal line $y = 3$."}, {"front": "An absolute value function has vertex $(-3, 2)$, opens downward, and passes through the point $(-1, 0)$. Write its equation.", "back": "Starting with $y = a\\,x - h + k$, substitute $(h, k) = (-3, 2)$ to get $y = a\\,x + 3 + 2$. Using the point $(-1, 0)$: $0 = a\\,-1 + 3 + 2 \\implies 0 = a(2) + 2 \\implies 2a = -2 \\implies a = -1$. The equation is $y = -x + 3 + 2$."}, {"front": "True or False: $x = -x$ means the output of the absolute value function is always negative.", "back": "False. When $x < 0$, the expression $-x$ is positive. For example, $-5 = -(-5) = 5$. The definition $x = -x$ applies only when $x$ is negative."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
