<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 3, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "State the Zero Product Property.", "back": "For any real numbers \\(a\\) and \\(b\\), if \\(ab = 0\\), then \\(a = 0\\) or \\(b = 0\\). More generally, if \\(a_1a_2...a_k=0\\), then at least one factor \\(a_j=0\\)."}, {"front": "What is the crucial condition for applying the Zero Product Property?", "back": "The product must equal zero. The equation must be in standard form with one side equal to zero."}, {"front": "Why can't we conclude that \\(a=2\\) and \\(b=3\\) if \\(ab=6\\)?", "back": "The Zero Product Property applies only when the product equals zero. If the product is 6, there are countless pairs of factors (e.g., \\(1 \\cdot 6\\), \\(12 \\cdot 0.5\\), etc.), so individual factors cannot be definitively determined."}, {"front": "What is the first step when solving an equation by factoring?", "back": "Write the equation in standard form: all terms on one side, zero on the other (e.g., \\(ax^2+bx+c=0\\))."}, {"front": "After writing an equation in standard form, what is the next step to solve it by factoring?", "back": "Factor the non-zero side completely."}, {"front": "Once an equation is factored and in standard form, what is the third step to solve it?", "back": "Set each factor equal to zero and solve each resulting equation."}, {"front": "What is the final step in the process of solving an equation by factoring?", "back": "Check all solutions in the original equation."}, {"front": "Solve \\(x^2 - 7x + 12 = 0\\) by factoring.", "back": "Factor: \\((x-3)(x-4)=0\\). Solutions: \\(x=3\\) or \\(x=4\\)."}, {"front": "Solve \\(2x^2 + 5x - 3 = 0\\) by factoring.", "back": "Factor using the AC method: \\((2x-1)(x+3)=0\\). Solutions: \\(x=1/2\\) or \\(x=-3\\)."}, {"front": "What is the crucial first step if an equation like \\(3x^2 = 5x + 2\\) needs to be solved by factoring?", "back": "Move all terms to one side to set the equation to zero (standard form): \\(3x^2 - 5x - 2 = 0\\)."}, {"front": "Solve \\(3x^2 = 5x + 2\\) by factoring.", "back": "First, rewrite as \\(3x^2 - 5x - 2 = 0\\). Factor: \\((x-2)(3x+1)=0\\). Solutions: \\(x=2\\) or \\(x=-1/3\\)."}, {"front": "Solve \\(x^3 - 4x = 0\\) by factoring.", "back": "Factor out GCF: \\(x(x^2-4)=0\\). Recognize difference of squares: \\(x(x-2)(x+2)=0\\). Solutions: \\(x=0\\), \\(x=2\\), \\(x=-2\\)."}, {"front": "How does the degree of a polynomial relate to the number of possible solutions?", "back": "A polynomial equation of degree \\(n\\) has at most \\(n\\) real solutions (or distinct factors that can equal zero)."}, {"front": "Why is it especially important to check solutions for word problems involving quadratic equations?", "back": "Word problems can yield extraneous or negative solutions that may not be meaningful or physically possible in the context of the problem (e.g., negative length, negative number of people)."}, {"front": "How would you set up an equation to find two consecutive positive integers whose product is 72?", "back": "Let the smaller integer be \\(n\\). The next is \\(n+1\\). The equation is \\(n(n+1) = 72\\)."}, {"front": "Solve the word problem: Find two consecutive positive integers whose product is 72.", "back": "Equation: \\(n^2+n-72=0\\). Factor: \\((n+9)(n-8)=0\\). Since \\(n\\) must be a positive integer, discard \\(n=-9\\). Thus \\(n=8\\), and the integers are 8 and 9."}, {"front": "What is a common error students make when trying to solve an equation like \\(x(x-3)=10\\) by using the Zero Product Property?", "back": "Students incorrectly set \\(x=10\\) or \\(x-3=10\\). The Zero Product Property only applies when the product equals zero, not 10."}, {"front": "What is the correct first step to solve \\(x(x-3)=10\\) by factoring?", "back": "Expand the left side, then move all terms to one side to set the equation to zero: \\(x^2 - 3x - 10 = 0\\)."}, {"front": "What is the standard form of a quadratic equation?", "back": "The standard form of a quadratic equation is \\(ax^2+bx+c=0\\), where \\(a\\), \\(b\\), and \\(c\\) are real numbers and \\(a \\neq 0\\)."}, {"front": "Name at least three types of factoring techniques that become powerful solving tools when combined with the Zero Product Property.", "back": "Factoring trinomials (including monic and general forms), factoring out a Greatest Common Factor (GCF), and recognizing special product patterns like Difference of Squares."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
