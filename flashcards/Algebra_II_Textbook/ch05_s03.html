<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is factoring in algebra?", "back": "Factoring is the reverse of multiplication: given a polynomial, we write it as a product of simpler polynomials."}, {"front": "Why is factoring essential in mathematics?", "back": "Factoring is essential for solving equations, simplifying rational expressions, and analyzing graphs."}, {"front": "What is the Greatest Common Factor (GCF) of a polynomial?", "back": "The GCF of a polynomial is the largest monomial that divides every term evenly."}, {"front": "What is always the first step in any factoring problem?", "back": "Factoring out the GCF is always the first step."}, {"front": "List the steps to factor out the GCF from a polynomial.", "back": "1. Find the GCF of all terms (highest common numerical factor times the lowest power of each shared variable).\n2. Write each term as GCF times something.\n3. Apply the distributive property in reverse."}, {"front": "Factor the polynomial completely: $12x^3 - 8x^2 + 4x$", "back": "The GCF is $4x$. So, $12x^3 - 8x^2 + 4x = 4x(3x^2 - 2x + 1)$."}, {"front": "How can you verify that you have factored a polynomial correctly?", "back": "Always verify by multiplying the factored expression back out. The product must equal the original polynomial."}, {"front": "State the formula for factoring the sum of two cubes, $A^3 + B^3$.", "back": "$A^3 + B^3 = (A+B)(A^2 - AB + B^2)$"}, {"front": "State the formula for factoring the difference of two cubes, $A^3 - B^3$.", "back": "$A^3 - B^3 = (A-B)(A^2 + AB + B^2)$"}, {"front": "What is the SOAP memory aid used for in the context of sum and difference of cubes?", "back": "SOAP helps remember the signs in the trinomial factor: Same sign as the binomial, Opposite sign in the middle, Always Positive for the last term."}, {"front": "Factor the polynomial: $8x^3 + 27$", "back": "Recognize $8x^3 = (2x)^3$ and $27 = 3^3$. Using the sum of cubes formula: $(2x+3)(4x^2 - 6x + 9)$."}, {"front": "Factor the polynomial: $x^3 - 64$", "back": "Recognize $x^3 = x^3$ and $64 = 4^3$. Using the difference of cubes formula: $(x-4)(x^2 + 4x + 16)$."}, {"front": "When is a polynomial considered to be in 'quadratic form'?", "back": "A polynomial is in quadratic form if it can be written as $au^2 + bu + c$ for some expression $u$."}, {"front": "Factor $x^4 - 5x^2 + 6$ by using a substitution for quadratic form.", "back": "Let $u = x^2$. Then $u^2 - 5u + 6 = (u-2)(u-3)$. Substituting back, $(x^2-2)(x^2-3)$, which further factors to $(x - \\sqrt{2})(x + \\sqrt{2})(x - \\sqrt{3})(x + \\sqrt{3})$ over the reals."}, {"front": "What does the 'multiplicity' of a zero refer to?", "back": "If $(x-r)^k$ is the highest power of $(x-r)$ that divides a polynomial $p(x)$, then $r$ is a zero of $p$ with multiplicity $k$."}, {"front": "For $p(x) = x^2(x-3)^3(x+1)$, identify the zeros and their multiplicities.", "back": "The zeros are: $x=0$ with multiplicity 2; $x=3$ with multiplicity 3; $x=-1$ with multiplicity 1."}, {"front": "What defines a 'monic trinomial' and how is it factored?", "back": "A monic trinomial has a leading coefficient of 1 ($x^2 + bx + c$). To factor, find two integers $p$ and $q$ such that $pq = c$ and $p + q = b$, then $x^2 + bx + c = (x + p)(x + q)$."}, {"front": "Factor the trinomial: $x^2 + 7x + 12$", "back": "Find two numbers that multiply to 12 and add to 7 (3 and 4). The factored form is $(x+3)(x+4)$."}, {"front": "Factor the trinomial: $x^2 - 5x - 14$", "back": "Find two numbers that multiply to -14 and add to -5 (2 and -7). The factored form is $(x+2)(x-7)$."}, {"front": "Describe the steps of the AC Method for factoring $ax^2 + bx + c$ when $a \\neq 1$.", "back": "1. Compute the product $ac$.\n2. Find integers $m$ and $n$ with $mn = ac$ and $m + n = b$.\n3. Rewrite the middle term: $ax^2 + mx + nx + c$.\n4. Factor by grouping."}, {"front": "Factor $6x^2 + 11x - 10$ using the AC Method.", "back": "1. $ac = 6(-10) = -60$.\n2. Find $m, n$ such that $mn = -60$ and $m+n = 11$: $m=15, n=-4$.\n3. Rewrite: $6x^2 + 15x - 4x - 10$.\n4. Factor by grouping: $3x(2x + 5) - 2(2x + 5) = (2x+5)(3x-2)$."}, {"front": "What is the very first step in the general strategy for factoring any polynomial?", "back": "Always factor out the Greatest Common Factor (GCF) first."}, {"front": "After checking for the GCF, if a polynomial has 3 terms, what factoring approaches should you consider?", "back": "Check for quadratic form; otherwise, try the $x^2+bx+c$ pattern (for monic trinomials) or the AC method (for non-monic trinomials)."}, {"front": "After checking for the GCF, if a polynomial has 2 terms, what factoring approaches should you consider?", "back": "Look for a difference of squares ($A^2 - B^2$) or a sum/difference of cubes ($A^3 \\pm B^3$)."}, {"front": "What are the final two steps to complete and verify the factoring process for any polynomial?", "back": "1. Check each factor to ensure no factor can be factored further.\n2. Verify the entire factorization by multiplying all factors back out."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
