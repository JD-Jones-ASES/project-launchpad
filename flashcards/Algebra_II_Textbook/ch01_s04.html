<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the geometric interpretation of absolute value?", "back": "The absolute value of a real number $x$, written $|x|$, is the distance from $x$ to $0$ on the number line.", "id": "fc01"}, {"front": "Provide the formal definition of the absolute value of $x$.", "back": "$|x| = x$ if $x \\ge 0$, and $|x| = -x$ if $x < 0$.", "id": "fc02"}, {"front": "What is always true about the value of an absolute value expression?", "back": "The absolute value of any real number is always non-negative; $|x| \\ge 0$ for every real $x$.", "id": "fc03"}, {"front": "State two useful algebraic identities involving absolute value.", "back": "$|-x| = |x|$ and $|xy| = |x||y|$. (Also $|x/y| = |x|/|y|$ for $y \\ne 0$).", "id": "fc04"}, {"front": "What are the possible solutions for an absolute value equation of the form $|E| = n$ when $n > 0$?", "back": "There are two possible solutions: $E = n$ or $E = -n$.", "id": "fc05"}, {"front": "How many solutions does the equation $|E| = n$ have when $n = 0$?", "back": "Exactly one solution: $E = 0$.", "id": "fc06"}, {"front": "What happens if you try to solve an absolute value equation where the absolute value is set equal to a negative number, e.g., $|E| = -2$?", "back": "There is no solution, because an absolute value expression can never be negative ($|E| \\ge 0$ always holds).", "id": "fc07"}, {"front": "Define an 'extraneous solution' in the context of solving equations.", "back": "An extraneous solution is a value produced algebraically during the solving process that does not satisfy the original equation and therefore must be discarded.", "id": "fc08"}, {"front": "When is checking for extraneous solutions especially critical for absolute value equations?", "back": "When the right-hand side of the equation is itself a variable expression (e.g., $|2x-1| = x+5$), because a candidate solution might make the RHS negative, which is impossible for an absolute value.", "id": "fc09"}, {"front": "How do you solve an absolute value equation where both sides have an absolute value, such as $|A| = |B|$?", "back": "Set $A = B$ or $A = -B$. Two quantities have equal absolute values if they are equal or are exact opposites.", "id": "fc10"}, {"front": "Geometrically, what does the inequality $|E| < m$ represent (for $m > 0$)?", "back": "It represents all real numbers for which the expression $E$ is within a distance $m$ from zero. This results in a bounded interval.", "id": "fc11"}, {"front": "Geometrically, what does the inequality $|E| > m$ represent (for $m > 0$)?", "back": "It represents all real numbers for which the expression $E$ is farther than a distance $m$ from zero. This results in two outward rays.", "id": "fc12"}, {"front": "Explain the 'AND/OR Memory Device' for absolute value inequalities.", "back": "'Less than' (< or \\le) means 'AND' (sandwich): $-m < E < m$. 'Greater than' (> or \\ge) means 'OR' (alligator mouth): $E < -m$ or $E > m$.", "id": "fc13"}, {"front": "How do you solve an inequality of the form $|E| < m$ (where $m > 0$)?", "back": "Rewrite it as a compound inequality: $-m < E < m$. This typically yields one bounded open interval.", "id": "fc14"}, {"front": "How do you solve an inequality of the form $|E| \\ge m$ (where $m > 0$)?", "back": "Rewrite it as two separate inequalities connected by 'OR': $E \\le -m$ or $E \\ge m$. This typically yields the union of two closed rays.", "id": "fc15"}, {"front": "What is the solution set for $|E| < m$ when $m \\le 0$?", "back": "There is no solution (the empty set), because an absolute value cannot be less than or equal to a non-positive number.", "id": "fc16"}, {"front": "What is the solution set for $|E| > m$ when $m < 0$?", "back": "All real numbers, because an absolute value (which is always non-negative) is always greater than any negative number.", "id": "fc17"}, {"front": "Why should you avoid writing the solution to a 'greater than' absolute value inequality as a single compound expression (e.g., $-4 \\ge x \\ge -1$)?", "back": "That notation implies an 'AND' condition ($x \\ge -4$ AND $x \\ge -1$), which is incorrect for 'OR' cases. The correct representation is using union notation, e.g., $(-\\infty, -4] \\cup [-1, \\infty)$.", "id": "fc18"}, {"front": "What real-world application of absolute value inequalities is mentioned for understanding tolerance and error bounds?", "back": "Engineering specifications like 'the measurement must be within $0.05$ cm of the target value $c$', which is exactly the inequality $|x - c| \\le 0.05$.", "id": "fc19"}, {"front": "Solve the equation: $|2x - 3| = 7$.", "back": "The solutions are $x = 5$ or $x = -2$.", "id": "fc20"}, {"front": "Solve the equation: $|x + 4| = -2$.", "back": "There is no solution, as an absolute value cannot be equal to a negative number.", "id": "fc21"}, {"front": "Solve the inequality: $|3x - 1| < 8$. Write the solution in interval notation.", "back": "$(-7/3, 3)$.", "id": "fc22"}, {"front": "Solve the inequality: $|2x + 5| \\ge 3$. Write the solution in interval notation.", "back": "$(- \\infty, -4] \\cup [-1, \\infty)$.", "id": "fc23"}, {"front": "How do you solve the equation $|x - 2| = |3x + 4|$?", "back": "Set $x - 2 = 3x + 4$ OR $x - 2 = -(3x + 4)$. The solutions are $x = -3$ or $x = -1/2$.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
