<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 4, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_II_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How are two functions $f$ and $g$ combined arithmetically to form their sum, $(f+g)(x)$?", "back": "$(f+g)(x) = f(x) + g(x)$."}, {"front": "How are two functions $f$ and $g$ combined arithmetically to form their difference, $(f-g)(x)$?", "back": "$(f-g)(x) = f(x) - g(x)$."}, {"front": "How are two functions $f$ and $g$ combined arithmetically to form their product, $(fg)(x)$?", "back": "$(fg)(x) = f(x)g(x)$."}, {"front": "How are two functions $f$ and $g$ combined arithmetically to form their quotient, $(f/g)(x)$?", "back": "$(f/g)(x) = f(x)/g(x)$, provided $g(x) \\neq 0$."}, {"front": "What is the domain of $(f+g)(x)$, $(f-g)(x)$, and $(fg)(x)$ given functions $f$ and $g$ with overlapping domains?", "back": "The intersection of the domains of $f$ and $g$, denoted as $D_f \\cap D_g$."}, {"front": "What is the domain of $(f/g)(x)$ given functions $f$ and $g$ with overlapping domains?", "back": "The intersection of the domains of $f$ and $g$ ($D_f \\cap D_g$), with any $x$ values where $g(x) = 0$ excluded."}, {"front": "Let $f(x) = 3x+1$ and $g(x) = x^2-4$. Find and simplify $(f+g)(x)$.", "back": "$(f+g)(x) = (3x+1) + (x^2-4) = x^2+3x-3$."}, {"front": "Let $f(x) = 3x+1$ and $g(x) = x^2-4$. Evaluate $(f-g)(2)$.", "back": "$(f-g)(x) = (3x+1) - (x^2-4) = -x^2+3x+5$. So, $(f-g)(2) = -(2)^2 + 3(2) + 5 = -4 + 6 + 5 = 7$."}, {"front": "For $f(x) = 3x+1$ and $g(x) = x^2-4$, state the domain of $(f/g)(x)$.", "back": "The domain excludes values where $x^2-4=0$, so $x \\neq 2$ and $x \\neq -2$. The domain is $(-\\infty, -2) \\cup (-2, 2) \\cup (2, \\infty)$."}, {"front": "Define the composition of functions $f$ and $g$, written $(f \\circ g)(x)$.", "back": "$(f \\circ g)(x) = f(g(x))$. It means applying $g$ to $x$ first, then applying $f$ to the result."}, {"front": "When evaluating a composite function $(f \\circ g)(x)$, which function is applied first, $f$ or $g$?", "back": "Function $g$ is applied first to $x$, and its output becomes the input for function $f$."}, {"front": "What is the domain of a composite function $(f \\circ g)(x)$?", "back": "It consists of all $x$ values in the domain of $g$ for which $g(x)$ is also in the domain of $f$."}, {"front": "Is function composition generally commutative? That is, is $(f \\circ g)(x) = (g \\circ f)(x)$ always true?", "back": "No, composition is generally not commutative. $(f \\circ g)(x) \\neq (g \\circ f)(x)$ in general."}, {"front": "Let $f(x) = x^2+1$ and $g(x) = 2x-3$. Evaluate $(f \\circ g)(4)$.", "back": "First, $g(4) = 2(4) - 3 = 5$. Then, $f(g(4)) = f(5) = 5^2 + 1 = 26$."}, {"front": "Let $f(x) = x^2+1$ and $g(x) = 2x-3$. Evaluate $(g \\circ f)(4)$.", "back": "First, $f(4) = 4^2 + 1 = 17$. Then, $g(f(4)) = g(17) = 2(17) - 3 = 31$."}, {"front": "Compare the results of $(f \\circ g)(4)$ and $(g \\circ f)(4)$ for $f(x) = x^2+1$ and $g(x) = 2x-3$. What does this illustrate?", "back": "$(f \\circ g)(4) = 26$ and $(g \\circ f)(4) = 31$. This illustrates that function composition is generally not commutative."}, {"front": "Let $f(x) = 2x+5$ and $g(x) = x^2-1$. Find and simplify $(f \\circ g)(x)$.", "back": "$(f \\circ g)(x) = f(g(x)) = f(x^2-1) = 2(x^2-1) + 5 = 2x^2 - 2 + 5 = 2x^2 + 3$."}, {"front": "Let $f(x) = 2x+5$ and $g(x) = x^2-1$. Find and simplify $(g \\circ f)(x)$.", "back": "$(g \\circ f)(x) = g(f(x)) = g(2x+5) = (2x+5)^2 - 1 = (4x^2 + 20x + 25) - 1 = 4x^2 + 20x + 24$."}, {"front": "Decompose $h(x) = (3x-5)^4$ into $f(g(x))$, where $f(x)$ and $g(x)$ are non-trivial functions.", "back": "Let $g(x) = 3x-5$ (the inner expression) and $f(x) = x^4$ (the outer function)."}, {"front": "Decompose $h(x) = \\frac{1}{x+3}$ into $f(g(x))$, where $f(x)$ and $g(x)$ are non-trivial functions.", "back": "Let $g(x) = x+3$ (the inner expression) and $f(x) = \\frac{1}{x}$ (the outer function)."}, {"front": "Let $f(x) = \\sqrt{x}$ and $g(x) = x-4$. Find $(f \\circ g)(x)$ and state its domain.", "back": "$(f \\circ g)(x) = f(g(x)) = f(x-4) = \\sqrt{x-4}$. For the domain, we need $x-4 \\ge 0$, so $x \\ge 4$. The domain is $[4, \\infty)$."}, {"front": "Why is the domain of a composite function $(f \\circ g)(x)$ not simply the domain of its simplified form?", "back": "The domain of $(f \\circ g)(x)$ requires two conditions: $x$ must be in the domain of $g$, AND $g(x)$ must be in the domain of $f$. Simplification might mask restrictions imposed by the inner function's output needing to be valid for the outer function."}, {"front": "What is a common mistake students make when evaluating $(f \\circ g)(x)$?", "back": "Students often reverse the order, applying $f$ first instead of $g$. Remember $(f \\circ g)(x)$ means $g$ feeds its output into $f$."}, {"front": "Let $f(x) = 4x-1$ and $g(x) = x^2$. Find $(f+g)(3)$.", "back": "$f(3) = 4(3)-1 = 11$. $g(3) = 3^2 = 9$. $(f+g)(3) = f(3)+g(3) = 11+9=20$."}, {"front": "Let $f(x) = 4x-1$ and $g(x) = x^2$. Find and simplify $(g \\circ f)(x)$.", "back": "$(g \\circ f)(x) = g(f(x)) = g(4x-1) = (4x-1)^2 = 16x^2 - 8x + 1$."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
