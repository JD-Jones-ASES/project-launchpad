<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 6, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_II_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the general form of a rational function and what are its domain restrictions?", "back": "A rational function has the form $f(x) = P(x) / Q(x)$, where $P$ and $Q$ are polynomials and $Q(x) \\neq 0$. Its domain excludes all zeros of $Q$."}, {"front": "Define a vertical asymptote.", "back": "The line $x = a$ is a vertical asymptote of $f$ if $|f(x)| \\to \\infty$ as $x \\to a$ from either side. Graphically, the curve climbs or falls steeply near $x = a$ without touching the line."}, {"front": "How do you find vertical asymptotes of $f(x) = P(x) / Q(x)$?", "back": "1. Factor $Q(x)$ completely. 2. Set $Q(x) = 0$ and solve. 3. Each solution $x = a$ gives a vertical asymptote only if the factor $(x - a)$ does not also cancel from the numerator."}, {"front": "What is the key difference between a factor in the denominator that causes a vertical asymptote and one that causes a hole?", "back": "A factor of the denominator that *does not* cancel with the numerator produces a vertical asymptote. A factor that *does* cancel produces a hole (removable discontinuity)."}, {"front": "What is a hole (removable discontinuity) in the graph of a rational function? How is its y-coordinate found?", "back": "A hole occurs at $x = a$ when the factor $(x - a)$ cancels from both the numerator and the denominator. The function is undefined at $x=a$. The $y$-coordinate is found by evaluating the simplified expression at $x = a$."}, {"front": "Both holes and vertical asymptotes arise from zeros of the denominator. How do you distinguish them?", "back": "A factor that cancels with the numerator produces a hole (a single missing point), while a factor that does not cancel produces a vertical asymptote (unbounded behavior). Always factor and simplify first."}, {"front": "For $f(x) = (x-2)(x+1) / ((x-2)(x+2))$, identify any holes and vertical asymptotes.", "back": "Hole at $x=2$: The factor $(x-2)$ cancels. Evaluate the simplified form $(x+1)/(x+2)$ at $x=2$ to get $(2+1)/(2+2) = 3/4$. So, hole at $(2, 3/4)$. Vertical asymptote at $x=-2$: The factor $(x+2)$ does not cancel."}, {"front": "How do you find the x-intercepts of a rational function?", "back": "Set the numerator (of the fully simplified form) equal to zero and solve. The solutions that are not domain restrictions are the x-intercepts."}, {"front": "Find the x-intercepts of $f(x) = (x-2)(x-3)/(x-1)$.", "back": "Set the numerator $(x-2)(x-3) = 0$. This gives $x=2$ and $x=3$. Neither are domain restrictions, so x-intercepts are at $(2,0)$ and $(3,0)$."}, {"front": "For $f(x) = (x+1)/((x-2)(x+3))$, find the domain, vertical asymptotes, holes, and x-intercepts.", "back": "Domain: $x \\neq 2, x \\neq -3$. Vertical Asymptotes: $x=2, x=-3$. Holes: None (no factors cancel). X-intercept: Set $x+1=0$, so $x=-1$. Point $(-1,0)$."}, {"front": "Define a horizontal asymptote. Can a graph cross a horizontal asymptote?", "back": "The line $y = b$ is a horizontal asymptote of $f$ if $f(x) \\to b$ as $x \\to \\infty$ or $x \\to -\\infty$. Yes, the graph *may* cross a horizontal asymptote for finite $x$."}, {"front": "Describe the three rules for finding horizontal asymptotes based on the degrees of the numerator ($n$) and denominator ($m$).", "back": "1. If $n < m$: Horizontal asymptote at $y = 0$. 2. If $n = m$: Horizontal asymptote at $y = a_n/b_m$ (ratio of leading coefficients). 3. If $n > m$: No horizontal asymptote."}, {"front": "What is the horizontal asymptote for $f(x) = (3x + 1)/(x^2 - 5)$?", "back": "The degree of the numerator (1) is less than the degree of the denominator (2), so the horizontal asymptote is $y = 0$."}, {"front": "What is the horizontal asymptote for $g(x) = (4x^2 - 1)/(2x^2 + 3)$?", "back": "The degree of the numerator (2) is equal to the degree of the denominator (2), so the horizontal asymptote is the ratio of leading coefficients: $y = 4/2 = 2$."}, {"front": "What is the horizontal asymptote for $h(x) = (x^3 - x)/(x^2 + 1)$?", "back": "The degree of the numerator (3) is greater than the degree of the denominator (2), so there is no horizontal asymptote."}, {"front": "Under what condition does a rational function have an oblique (slant) asymptote?", "back": "A rational function has an oblique asymptote when the degree of the numerator is *exactly one more* than the degree of the denominator."}, {"front": "How is an oblique asymptote found for $f(x) = P(x)/Q(x)$ when degree $P = $ degree $Q + 1$?", "back": "Perform polynomial long division: $P(x)/Q(x) = (mx + b) + R(x)/Q(x)$. The oblique asymptote is the line $y = mx + b$, as the remainder term $R(x)/Q(x) \\to 0$ as $x \\to \\pm \\infty$."}, {"front": "Find the oblique asymptote for $f(x) = (x^2 - 1)/(x - 2)$.", "back": "Perform long division: $(x^2 - 1) \\div (x - 2) = x + 2 + 3/(x - 2)$. The oblique asymptote is $y = x + 2$."}, {"front": "Why is sign analysis important when sketching the graph of a rational function?", "back": "Sign analysis helps determine whether the curve lies above or below the x-axis in each interval between vertical asymptotes and x-intercepts."}, {"front": "What are the steps for performing sign analysis for a rational function?", "back": "1. Identify all vertical asymptotes and x-intercepts; these divide the real line into intervals. 2. In each interval, choose a test value and evaluate the sign ($+$ or $-$) of $f(x)$. 3. The graph is above the x-axis where $f > 0$ and below where $f < 0$."}, {"front": "For $g(x) = (x^2 - 4) / (x^2 - 3x + 2)$, find the domain restrictions, vertical asymptotes, holes, and x-intercepts.", "back": "Factor: $g(x) = (x-2)(x+2) / ((x-2)(x-1))$. Domain restrictions: $x \\neq 2, x \\neq 1$. Vertical Asymptote: $x=1$ (factor $x-1$ does not cancel). Hole: At $x=2$ (factor $x-2$ cancels). Simplified form $(x+2)/(x-1)$. Evaluate at $x=2$: $(2+2)/(2-1) = 4$. So, hole at $(2,4)$. X-intercept: From simplified numerator $x+2=0$, so $x=-2$. X-intercept at $(-2,0)$."}, {"front": "For $f(x) = 3x^2 / (x^2 - 4)$, find the horizontal asymptote and all vertical asymptotes.", "back": "Horizontal Asymptote: Degrees are equal (2), so it's the ratio of leading coefficients: $y = 3/1 = 3$. Vertical Asymptotes: Factor the denominator $x^2 - 4 = (x-2)(x+2)$. Neither factor cancels with the numerator, so vertical asymptotes are $x=2$ and $x=-2$."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
