<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 2, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Define a \"system of linear equations\" in two unknowns.", "back": "A pair of linear equations, such as $a_1 x + b_1 y = c_1$ and $a_2 x + b_2 y = c_2$, that are required to be satisfied simultaneously.", "id": "fc01"}, {"front": "What is a \"solution\" to a system of linear equations?", "back": "An ordered pair $(x, y)$ that satisfies both equations in the system simultaneously.", "id": "fc02"}, {"front": "Graphically, what does a solution to a system of two linear equations represent?", "back": "A point of intersection between the two lines represented by the equations.", "id": "fc03"}, {"front": "What are the three possible geometric outcomes for the solution set of a system of two linear equations?", "back": "1. The lines intersect at exactly one point. 2. The lines are parallel. 3. The equations describe the same line.", "id": "fc04"}, {"front": "List the steps of the Substitution Method for solving a system of linear equations.", "back": "1. Solve one equation for one variable. 2. Substitute that expression into the other equation. 3. Solve the resulting one-variable equation. 4. Back-substitute to find the second variable. 5. Check the solution.", "id": "fc05"}, {"front": "Apply the Substitution Method to solve for $x$ in the system: $y = 2x - 3$, $3x + y = 7$.", "back": "Substitute $y = 2x - 3$ into the second equation: $3x + (2x - 3) = 7 \\Rightarrow 5x - 3 = 7 \\Rightarrow 5x = 10 \\Rightarrow x = 2$.", "id": "fc06"}, {"front": "What is the complete solution to the system $y = 2x - 3$, $3x + y = 7$?", "back": "$(x, y) = (2, 1)$. (Substitute $x=2$ into $y=2x-3$ gives $y=2(2)-3=1$. Check: $3(2)+1=7$ and $1=2(2)-3$ are true.)", "id": "fc07"}, {"front": "List the steps of the Elimination Method for solving a system of linear equations.", "back": "1. Multiply equations by constants (if needed) so one variable's coefficients are opposites. 2. Add the equations to eliminate one variable. 3. Solve the resulting one-variable equation. 4. Substitute back to find the other variable. 5. Check the solution.", "id": "fc08"}, {"front": "To solve $3x - 2y = 11$, $5x + 4y = 1$ using elimination, what is the first step to eliminate $y$?", "back": "Multiply the first equation by $2$ to get $6x - 4y = 22$. Then the $y$-coefficients $(-4y, +4y)$ are opposites.", "id": "fc09"}, {"front": "What is the result of adding the modified equations $6x - 4y = 22$ and $5x + 4y = 1$ when using the Elimination Method?", "back": "$11x = 23$.", "id": "fc10"}, {"front": "What is a common error to avoid when multiplying an equation by a constant in the Elimination Method?", "back": "Forgetting to multiply *every* term (including the right-hand side) by the constant, especially when dealing with negative signs.", "id": "fc11"}, {"front": "Describe a \"consistent and independent\" system of linear equations, including its graphical representation and number of solutions.", "back": "The lines intersect at exactly one point, resulting in one unique solution.", "id": "fc12"}, {"front": "Describe an \"inconsistent\" system of linear equations, including its graphical representation and number of solutions.", "back": "The lines are parallel (same slope, different intercepts), resulting in no solution.", "id": "fc13"}, {"front": "Describe a \"consistent and dependent\" system of linear equations, including its graphical representation and number of solutions.", "back": "The equations describe the same line, resulting in infinitely many solutions.", "id": "fc14"}, {"front": "What algebraic result indicates an inconsistent system when solving equations?", "back": "Solving leads to a false equation (e.g., $0 = 5$).", "id": "fc15"}, {"front": "What algebraic result indicates a consistent and dependent system when solving equations?", "back": "Solving leads to a true equation (e.g., $0 = 0$).", "id": "fc16"}, {"front": "Classify the system: $2x - y = 4$, $4x - 2y = 9$. What is the solution?", "back": "Inconsistent system. It has no solution because multiplying the first equation by $-2$ and adding results in $0 = 1$ (false). Graphically, the lines are parallel.", "id": "fc17"}, {"front": "Classify the system: $x + 2y = 6$, $3x + 6y = 18$. What is the solution set?", "back": "Consistent and dependent system. It has infinitely many solutions because multiplying the first equation by $-3$ and adding results in $0 = 0$ (true). The solution set is $(x, y) : x + 2y = 6$.", "id": "fc18"}, {"front": "A theater sold adult tickets ($9) and child tickets ($5). Total 200 tickets, total revenue $1,400. Set up a system of linear equations to find the number of adult ($a$) and child ($c$) tickets.", "back": "$a + c = 200$ (total tickets) and $9a + 5c = 1400$ (total revenue).", "id": "fc19"}, {"front": "Solve the system $a + c = 200$, $9a + 5c = 1400$ to find the number of adult and child tickets sold.", "back": "Multiply $a+c=200$ by $-5$ to get $-5a - 5c = -1000$. Add to $9a + 5c = 1400$ to get $4a = 400 \\Rightarrow a = 100$. Back-substitute: $100 + c = 200 \\Rightarrow c = 100$. So, 100 adult tickets and 100 child tickets.", "id": "fc20"}, {"front": "When setting up a system of equations from a word problem, what is an important guideline regarding units?", "back": "Ensure every equation has consistent units. Do not mix units like \"tickets\" and \"dollars\" within the same equation.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
