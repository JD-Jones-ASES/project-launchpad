<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 3, Section 7</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_II_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does the vertex of a parabola represent in the context of real-world quadratic applications?", "back": "The vertex of a parabola represents the point where the function achieves its maximum or minimum value."}, {"front": "List the five steps for the strategy in solving optimization problems with quadratic models.", "back": "1. Define variables. 2. Write the quadratic function. 3. Find the vertex. 4. State the answer with correct units. 5. Verify reasonableness."}, {"front": "A farmer has 200 ft of fencing for a rectangular pen against a barn wall. Define variables and write the area function.", "back": "Let 'w' be the width (perpendicular to barn) and 'l' be the length (parallel to barn). Constraint: 2w + l = 200, so l = 200 - 2w. Area function: A(w) = w(200 - 2w) = -2w^2 + 200w."}, {"front": "For the farmer's pen (200 ft fencing, barn wall), what dimensions maximize the enclosed area and what is that maximum area?", "back": "The width (w) that maximizes area is w = -200 / (2 * -2) = 50 ft. The length (l) is 200 - 2(50) = 100 ft. Maximum area = 50 ft * 100 ft = 5000 ft^2."}, {"front": "State the standard quadratic model for projectile motion when height 'h' is in feet and time 't' is in seconds.", "back": "h(t) = -16t^2 + v_0t + h_0, where v_0 is the initial velocity (ft/s) and h_0 is the initial height (ft)."}, {"front": "In the projectile motion model, what do v_0 and h_0 represent?", "back": "v_0 represents the initial velocity (at t=0) and h_0 represents the initial height (at t=0)."}, {"front": "What is the projectile motion model when height 'h' is in meters and time 't' is in seconds?", "back": "h(t) = -4.9t^2 + v_0t + h_0, where v_0 is the initial velocity (m/s) and h_0 is the initial height (m)."}, {"front": "A ball is thrown upward with h(t) = -16t^2 + 64t + 5. When does it reach its maximum height?", "back": "Maximum height occurs at the vertex's t-coordinate: t = -64 / (2 * -16) = -64 / -32 = 2 seconds."}, {"front": "For the ball thrown upward with h(t) = -16t^2 + 64t + 5, what is its maximum height?", "back": "The maximum height is h(2) = -16(2)^2 + 64(2) + 5 = -16(4) + 128 + 5 = -64 + 128 + 5 = 69 feet."}, {"front": "How do you find the time when a projectile hits the ground using its height function h(t)?", "back": "Set h(t) = 0 and solve the resulting quadratic equation for 't'. Reject any negative time values."}, {"front": "If a company sells 'x' items at a unit price of p(x) = 50 - 0.5x, write the revenue function R(x).", "back": "Revenue R(x) = x * p(x) = x(50 - 0.5x) = -0.5x^2 + 50x."}, {"front": "For the revenue function R(x) = -0.5x^2 + 50x, how many items should be sold to maximize revenue, and what is the maximum revenue?", "back": "The number of items 'x' for maximum revenue is x = -50 / (2 * -0.5) = 50 items. Maximum revenue R(50) = -0.5(50)^2 + 50(50) = -1250 + 2500 = $1250."}, {"front": "How do you determine if the vertex of a quadratic function represents a maximum or a minimum value?", "back": "If the parabola opens upward (leading coefficient a > 0), the vertex is a minimum. If it opens downward (leading coefficient a < 0), the vertex is a maximum."}, {"front": "Why are domain restrictions important to consider when solving quadratic optimization problems?", "back": "Domain restrictions (e.g., x > 0, 0 < t < 5) may limit which values of the vertex are physically meaningful. Always check that the optimal value lies within the feasible domain."}, {"front": "Find two positive numbers whose sum is 20 and whose product is maximum.", "back": "Let the numbers be x and 20-x. The product P(x) = x(20-x) = -x^2 + 20x. The vertex is x = -20 / (2 * -1) = 10. So the numbers are 10 and 10, with a maximum product of 100."}, {"front": "What general insight applies to maximizing the product of two positive numbers with a fixed sum?", "back": "Among all pairs of positive numbers with a fixed sum, the pair closest to equal always gives the largest product."}, {"front": "A rectangular field has 360 m of fence on three sides, with a river as the fourth side. Define variables and write the area function.", "back": "Let 'x' be the dimension perpendicular to the river (two sides) and 'y' be the dimension parallel to the river (one side). Constraint: 2x + y = 360, so y = 360 - 2x. Area function: A(x) = x(360 - 2x) = -2x^2 + 360x."}, {"front": "For the rectangular field with 360 m fence (river on one side), what dimensions maximize the enclosed area?", "back": "The dimension 'x' perpendicular to the river is x = -360 / (2 * -2) = 90 m. The dimension 'y' parallel to the river is y = 360 - 2(90) = 180 m. Dimensions: 90 m by 180 m."}, {"front": "A stone is dropped from rest (v_0=0) from a bridge 144 ft high. Write the height function and when it hits the water.", "back": "Height function: h(t) = -16t^2 + 0t + 144 = -16t^2 + 144. It hits the water when h(t)=0: -16t^2 + 144 = 0 => 16t^2 = 144 => t^2 = 9 => t = 3 seconds (rejecting negative time)."}, {"front": "A rectangle has perimeter 60 cm. Write its area as a function of the width 'w'.", "back": "Perimeter: 2w + 2l = 60 => w + l = 30 => l = 30 - w. Area function: A(w) = w * l = w(30 - w) = -w^2 + 30w."}, {"front": "For a rectangle with perimeter 60 cm, what dimensions maximize its area, and what is that maximum area?", "back": "The width 'w' that maximizes area is w = -30 / (2 * -1) = 15 cm. The length 'l' is 30 - 15 = 15 cm. Maximum area = 15 cm * 15 cm = 225 cm^2."}, {"front": "A shop can sell 'x' gadgets per week at price p(x) = 80 - 2x. What quantity maximizes weekly revenue?", "back": "Revenue R(x) = x * p(x) = x(80 - 2x) = -2x^2 + 80x. The quantity 'x' that maximizes revenue is x = -80 / (2 * -2) = -80 / -4 = 20 gadgets."}, {"front": "What is the potential error when solving projectile motion problems involving mixed unit systems?", "back": "Mixing unit systems (e.g., using -16 for feet and then providing initial height in meters) will produce nonsensical answers. Always ensure consistent units (feet with -16, meters with -4.9)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
