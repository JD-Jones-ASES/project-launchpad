<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 8, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are graphical transformations?", "back": "Graphical transformations are simple arithmetic operations (like shifts and reflections) applied to the inputs or outputs of a parent function to quickly produce new graphs."}, {"front": "Define a 'parent function' and provide three common examples mentioned in the chapter.", "back": "A parent function is the simplest form of a function family. Common examples are: $f(x) = x^2$ (quadratic), $f(x) = |x|$ (absolute value), and $f(x) = x^3$ (cubic)."}, {"front": "How does adding a positive constant 'k' to the output of a function, $y = f(x) + k$, affect its graph?", "back": "It shifts the entire graph up $k$ units without changing its shape."}, {"front": "How does subtracting a positive constant 'k' from the output of a function, $y = f(x) - k$, affect its graph?", "back": "It shifts the entire graph down $k$ units without changing its shape."}, {"front": "If a point $(x, y)$ is on the original graph of $y = f(x)$, what are its new coordinates after a vertical shift defined by $y = f(x) + k$?", "back": "The point moves to $(x, y + k)$."}, {"front": "Describe the transformation of $g(x) = x^2 + 3$ compared to its parent function $f(x) = x^2$, and state the new vertex.", "back": "The graph of $f(x) = x^2$ shifts up 3 units. Its vertex moves from $(0, 0)$ to $(0, 3)$."}, {"front": "How does substituting $(x - h)$ for $x$ in a function, resulting in $y = f(x - h)$ (where $h > 0$), affect its graph?", "back": "It shifts the graph right $h$ units."}, {"front": "How does substituting $(x + h)$ for $x$ in a function, resulting in $y = f(x + h)$ (where $h > 0$), affect its graph?", "back": "It shifts the graph left $h$ units."}, {"front": "If a point $(x, y)$ is on the original graph of $y = f(x)$, what are its new coordinates after a horizontal shift defined by $y = f(x - h)$?", "back": "The point moves to $(x + h, y)$."}, {"front": "Explain why horizontal shifts are often described as 'counterintuitive'.", "back": "The direction of the shift is opposite to the sign inside the parentheses. For example, $f(x-2)$ shifts right because $x$ must be $2$ for the input to be zero, aligning with the original $f(0)$."}, {"front": "Describe the transformation of $g(x) = |x - 4|$ compared to its parent function $f(x) = |x|$, and state the new vertex.", "back": "The graph of $f(x) = |x|$ shifts right 4 units. Its vertex moves from $(0, 0)$ to $(4, 0)$."}, {"front": "Without graphing, give the vertex of $y = (x - 1)^2 + 7$.", "back": "The vertex is $(1, 7)$ (shifted right 1, up 7)."}, {"front": "Without graphing, give the vertex of $y = |x + 5| - 3$.", "back": "The vertex is $(-5, -3)$ (shifted left 5, down 3)."}, {"front": "How does multiplying the entire function output by -1, $y = -f(x)$, transform the graph of $y = f(x)$?", "back": "It reflects the graph over the $x$-axis."}, {"front": "If a point $(x, y)$ is on the original graph of $y = f(x)$, what are its new coordinates after a reflection defined by $y = -f(x)$?", "back": "The point maps to $(x, -y)$."}, {"front": "How does multiplying the input variable by -1, $y = f(-x)$, transform the graph of $y = f(x)$?", "back": "It reflects the graph over the $y$-axis."}, {"front": "If a point $(x, y)$ is on the original graph of $y = f(x)$, what are its new coordinates after a reflection defined by $y = f(-x)$?", "back": "The point maps to $(-x, y)$."}, {"front": "Describe the transformations of $g(x) = -(x - 2)^2 + 1$ from its parent function $f(x) = x^2$, and state its vertex and direction of opening.", "back": "From $f(x) = x^2$: Shift right 2 units, then reflect over the $x$-axis (opens downward), then shift up 1 unit. The vertex is $(2, 1)$."}, {"front": "Describe the transformations of $h(x) = -x^2 + 4$ from its parent function $f(x) = x^2$, and state its vertex.", "back": "From $f(x) = x^2$: Reflect over the $x$-axis, then shift up 4 units. The vertex is $(0, 4)$."}, {"front": "Suppose the point $(3, 5)$ lies on the graph of $y = f(x)$. Find the corresponding point on the graph of $y = f(x - 4) + 2$.", "back": "The transformation shifts the graph right 4 and up 2. The point $(3, 5)$ maps to $(3+4, 5+2) = (7, 7)$."}, {"front": "Suppose the point $(3, 5)$ lies on the graph of $y = f(x)$. Find the corresponding point on the graph of $y = -f(x + 1) - 3$.", "back": "The transformation shifts left 1, reflects over the $x$-axis, then shifts down 3. The point $(3, 5)$ maps to $(3-1, -5-3) = (2, -8)$."}, {"front": "Given that $f(2) = 3$ and $g(x) = f(x + 3) - 7$, find $g(-1)$.", "back": "Substitute $x = -1$: $g(-1) = f(-1+3) - 7 = f(2) - 7$. Since $f(2) = 3$, $g(-1) = 3 - 7 = -4$."}, {"front": "Describe the graph of $p(x) = -(x + 3)^2 - 1$ relative to $y = x^2$, stating its vertex and direction of opening.", "back": "The graph of $y = x^2$ is shifted left 3 units, reflected over the $x$-axis, and then shifted down 1 unit. Its vertex is $(-3, -1)$ and it opens downward."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
