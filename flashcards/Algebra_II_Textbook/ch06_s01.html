<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a rational expression?", "back": "An expression of the form P(x)/Q(x), where P(x) and Q(x) are polynomials and Q(x) is not equal to zero.", "id": "fc01"}, {"front": "How does simplifying rational expressions differ from simplifying numerical fractions regarding domain?", "back": "When simplifying rational expressions, canceling factors can create values (holes) that are removed from the domain, unlike numerical fractions where the domain remains unchanged.", "id": "fc02"}, {"front": "What defines the domain of a rational expression?", "back": "The domain includes all real numbers for which the denominator, Q(x), is not equal to zero.", "id": "fc03"}, {"front": "Define a domain restriction (or excluded value).", "back": "A domain restriction is any value of the variable that makes the denominator of the rational expression equal to zero, rendering the expression undefined.", "id": "fc04"}, {"front": "Outline the steps to find all domain restrictions of a rational expression.", "back": "1. Factor the denominator completely. 2. Set each factor equal to zero and solve. 3. List these values as excluded from the domain.", "id": "fc05"}, {"front": "Find the domain of the rational expression 3x / (x - 5).", "back": "The denominator x - 5 = 0 when x = 5. So, the domain is all real numbers except x = 5.", "id": "fc06"}, {"front": "Find the domain of the rational expression (x + 2) / (x^2 - x - 6).", "back": "Factor the denominator to (x - 3)(x + 2). Setting factors to zero gives x = 3 and x = -2. So, restrictions are x ≠ 3 and x ≠ -2.", "id": "fc07"}, {"front": "Find the domain of the rational expression 5 / (x^2 + 4).", "back": "The denominator x^2 + 4 is always positive (since x^2 ≥ 0, x^2 + 4 ≥ 4), so it is never zero. The domain is all real numbers.", "id": "fc08"}, {"front": "State the Fundamental Property of Rational Expressions.", "back": "If P, Q, and R are polynomials (with Q ≠ 0 and R ≠ 0), then PR/QR = P/Q. This property states that common factors can be canceled from the numerator and denominator.", "id": "fc09"}, {"front": "What crucial rule must be remembered when canceling in rational expressions?", "back": "Only factors may be canceled, never terms. For example, in (x + 3)/(x + 7), 'x' cannot be canceled.", "id": "fc10"}, {"front": "List the three main steps for simplifying a rational expression.", "back": "1. Factor the numerator and denominator completely. 2. Cancel all common factors. 3. State the domain restrictions from the *original* expression.", "id": "fc11"}, {"front": "Simplify the expression 6x^3 / (9x) and state any restrictions.", "back": "The expression simplifies to 2x^2 / 3, with the restriction x ≠ 0.", "id": "fc12"}, {"front": "Simplify the expression (x^2 - 9) / (x^2 - x - 6) and state any restrictions.", "back": "Factor to ((x-3)(x+3)) / ((x-3)(x+2)). It simplifies to (x+3) / (x+2), with restrictions x ≠ 3 and x ≠ -2.", "id": "fc13"}, {"front": "Simplify the expression (2x^2 + 5x - 3) / (4x^2 - 1) and state any restrictions.", "back": "Factor numerator to (2x-1)(x+3) and denominator to (2x-1)(2x+1). It simplifies to (x+3) / (2x+1), with restrictions x ≠ 1/2 and x ≠ -1/2.", "id": "fc14"}, {"front": "How do you simplify an expression where a numerator factor is the opposite of a denominator factor (e.g., (3 - x) and (x - 3))?", "back": "Factor out -1 from one of the terms (e.g., 3 - x = -(x - 3)). This makes the common factor visible for cancellation, leaving a factor of -1 in the expression.", "id": "fc15"}, {"front": "Simplify the expression (3 - x) / (x^2 - 9) and state any restrictions.", "back": "Rewrite (3 - x) as -(x - 3). Factor denominator to (x - 3)(x + 3). The expression simplifies to -1 / (x + 3), with restrictions x ≠ 3 and x ≠ -3.", "id": "fc16"}, {"front": "What is the graphical consequence of simplifying a rational function by canceling a common factor?", "back": "The simplified function's graph will have a 'hole' (a removable discontinuity) at the x-value(s) where the canceled factor(s) originally made the denominator zero.", "id": "fc17"}, {"front": "Simplify the rational function f(x) = (x^3 - 4x) / (x^2 + 2x) and state its domain.", "back": "Factor numerator to x(x-2)(x+2) and denominator to x(x+2). The function simplifies to f(x) = x - 2. The original domain restrictions are x ≠ 0 and x ≠ -2.", "id": "fc18"}, {"front": "Explain why the simplified form of a rational function, even if it looks like a continuous polynomial, is not identical to that polynomial.", "back": "The simplified form must retain the domain restrictions of the original expression. These restrictions result in 'holes' or removable discontinuities in the graph of the rational function, making it distinct from a continuous polynomial.", "id": "fc19"}, {"front": "Simplify the expression (x^2 - 5x + 6) / (x^2 - 4) and state all domain restrictions.", "back": "Factor numerator to (x-2)(x-3) and denominator to (x-2)(x+2). It simplifies to (x-3) / (x+2), with original restrictions x ≠ 2 and x ≠ -2.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
