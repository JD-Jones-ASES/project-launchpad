<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why was the complex number system (C) introduced to extend the real number system (R)?", "back": "The real number system has no solution for equations like x^2 = -1, as no real number squared can be negative. The complex number system provides solutions for all polynomial equations."}, {"front": "Define the imaginary unit 'i'.", "back": "The imaginary unit 'i' is defined by i^2 = -1, or equivalently, i = sqrt(-1)."}, {"front": "How do you express the square root of a negative real number, like sqrt(-b) where b > 0, using the imaginary unit 'i'?", "back": "For any real number b > 0, sqrt(-b) = i * sqrt(b)."}, {"front": "What is a complex number?", "back": "A complex number is any number of the form a + bi, where 'a' and 'b' are real numbers."}, {"front": "In a complex number z = a + bi, what are 'a' and 'b' called?", "back": "'a' is the real part (Re(z) = a), and 'b' is the imaginary part (Im(z) = b)."}, {"front": "When is a complex number considered 'real'?", "back": "A complex number a + bi is real if its imaginary part b = 0."}, {"front": "When is a complex number considered 'purely imaginary'?", "back": "A complex number a + bi is purely imaginary if its real part a = 0 and its imaginary part b ≠ 0."}, {"front": "What is the set of all complex numbers denoted by?", "back": "The set of all complex numbers is denoted by C."}, {"front": "Under what condition are two complex numbers, a+bi and c+di, considered equal?", "back": "Two complex numbers a+bi and c+di are equal if and only if their real parts are equal (a=c) and their imaginary parts are equal (b=d)."}, {"front": "How do you add or subtract two complex numbers, (a+bi) and (c+di)?", "back": "To add or subtract, combine their real parts and imaginary parts separately: (a+bi) ± (c+di) = (a±c) + (b±d)i."}, {"front": "Simplify the expression: (3 + 5i) + (1 - 2i)", "back": "(3 + 1) + (5 - 2)i = 4 + 3i."}, {"front": "Simplify the expression: (4 - 7i) - (-2 + 3i)", "back": "(4 - (-2)) + (-7 - 3)i = (4 + 2) + (-7 - 3)i = 6 - 10i."}, {"front": "How do you multiply two complex numbers, (a+bi) and (c+di)?", "back": "Expand using the distributive law (FOIL) and substitute i^2 = -1: (ac - bd) + (ad + bc)i."}, {"front": "What is the key substitution used when multiplying complex numbers?", "back": "The key substitution is i^2 = -1."}, {"front": "Expand and simplify: (3+2i)(1-4i)", "back": "(3)(1) + (3)(-4i) + (2i)(1) + (2i)(-4i) = 3 - 12i + 2i - 8i^2 = 3 - 10i - 8(-1) = 3 - 10i + 8 = 11 - 10i."}, {"front": "List the first four positive integer powers of 'i'.", "back": "i^1 = i, i^2 = -1, i^3 = -i, i^4 = 1."}, {"front": "What is the pattern of positive integer powers of 'i', and what is its period?", "back": "The pattern is i, -1, -i, 1, and it repeats with a period of 4."}, {"front": "How can you find i^n for any positive integer n?", "back": "Divide n by 4 and use the remainder (0, 1, 2, or 3) to determine the value based on i^0=1, i^1=i, i^2=-1, i^3=-i."}, {"front": "Define the complex conjugate of a complex number z = a + bi.", "back": "The complex conjugate of z = a + bi is denoted z̄ and is equal to a - bi."}, {"front": "What is the product of a complex number z = a + bi and its conjugate z̄ = a - bi?", "back": "The product z * z̄ = (a+bi)(a-bi) = a^2 + b^2, which is always a non-negative real number."}, {"front": "How do you divide two complex numbers, such as (a+bi) / (c+di)?", "back": "Multiply both the numerator and the denominator by the complex conjugate of the denominator."}, {"front": "Why is multiplying by the conjugate of the denominator useful for complex number division?", "back": "It rationalizes the denominator, turning it into a real number (c^2 + d^2), which simplifies the division into the a+bi form."}, {"front": "Write (2+3i)/(1-2i) in the form a+bi.", "back": "(2+3i)/(1-2i) * (1+2i)/(1+2i) = (2+4i+3i+6i^2) / (1^2+2^2) = (2+7i-6) / 5 = (-4+7i) / 5 = -4/5 + 7/5 i."}, {"front": "Define the modulus (or absolute value) of a complex number z = a + bi.", "back": "The modulus of z = a + bi is |z| = sqrt(a^2 + b^2)."}, {"front": "What is the geometric interpretation of the modulus of a complex number |z|?", "back": "|z| represents the distance from the complex number z to the origin (0,0) in the complex plane."}, {"front": "Find the modulus of 3 - 4i.", "back": "|3 - 4i| = sqrt(3^2 + (-4)^2) = sqrt(9 + 16) = sqrt(25) = 5."}, {"front": "How do real numbers relate to the complex number system?", "back": "Every real number is a complex number where the imaginary part is zero (b=0), meaning R is a subset of C."}, {"front": "Describe the complex plane.", "back": "The complex plane is a two-dimensional coordinate system where the horizontal axis represents the real part of a complex number and the vertical axis represents the imaginary part."}, {"front": "Simplify the expression: (1+i)^2", "back": "(1+i)^2 = 1^2 + 2(1)(i) + i^2 = 1 + 2i - 1 = 2i."}, {"front": "Simplify the expression: i^47", "back": "Divide 47 by 4: 47 = 4 * 11 + 3. The remainder is 3, so i^47 = i^3 = -i."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
