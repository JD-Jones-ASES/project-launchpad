<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 6, Section 7</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a rational inequality?", "back": "A rational inequality involves a rational expression compared to a value or another expression.", "id": "fc01"}, {"front": "What is the general approach to solving rational inequalities?", "back": "The approach mirrors polynomial inequalities: identify critical values, build a sign chart, and read off the solution intervals.", "id": "fc02"}, {"front": "What is a key difference in solving rational inequalities compared to polynomial inequalities?", "back": "Rational functions are undefined at their vertical asymptotes, so those x-values (zeros of the denominator) are never part of the solution.", "id": "fc03"}, {"front": "What is the first step in the strategy for solving a rational inequality like f(x) < g(x)?", "back": "Rearrange the inequality to get 0 on one side: f(x) - g(x) < 0.", "id": "fc04"}, {"front": "After rearranging, what is the second step in solving a rational inequality?", "back": "Simplify the non-zero side into a single fraction p(x)/q(x).", "id": "fc05"}, {"front": "How do you find critical values for a rational inequality p(x)/q(x) > 0?", "back": "Critical values are the zeros of the numerator p(x) (potential sign changes) and the zeros of the denominator q(x) (excluded from the domain).", "id": "fc06"}, {"front": "What is the purpose of a sign chart in solving rational inequalities?", "back": "To determine the sign of the rational expression p(x)/q(x) in each interval defined by the critical values by testing one value in each interval.", "id": "fc07"}, {"front": "When writing the final solution for a rational inequality, how do you handle interval endpoints for non-strict inequalities (≤ or ≥)?", "back": "Include interval endpoints where the original expression equals the target (zeros of the numerator), but always exclude any x-values where the expression is undefined (zeros of the denominator).", "id": "fc08"}, {"front": "Why should you never multiply both sides of a rational inequality by the denominator without knowing its sign?", "back": "If the denominator is sometimes positive and sometimes negative, multiplying through would require splitting into cases. The sign-chart approach avoids this entirely.", "id": "fc09"}, {"front": "When solving p(x)/q(x) ≥ 0, are the zeros of p(x) (numerator) included in the solution?", "back": "Yes, the zeros of p(x) are included if the inequality is non-strict (≥ or ≤), because at these points, the expression equals zero.", "id": "fc10"}, {"front": "Are the zeros of q(x) (denominator) ever included in the solution to a rational inequality?", "back": "No, the zeros of q(x) are always excluded because the rational expression is undefined at these values (vertical asymptotes), regardless of the inequality type.", "id": "fc11"}, {"front": "For the inequality (x-1)/(x+2) > 0, what are the critical values?", "back": "The critical values are x=1 (from the numerator) and x=-2 (from the denominator).", "id": "fc12"}, {"front": "What is the solution to (x-1)/(x+2) > 0?", "back": "The solution is (-∞, -2) ∪ (1, ∞). (x=-2 is excluded because it's undefined; x=1 is excluded because it makes the expression 0, and we need strictly >0).", "id": "fc13"}, {"front": "What is the first step to solve 2/(x+1) ≤ x?", "back": "Subtract x from both sides to get 2/(x+1) - x ≤ 0.", "id": "fc14"}, {"front": "After subtracting x, what is the next step to solve 2/(x+1) - x ≤ 0?", "back": "Combine the terms into a single fraction: -(x^2+x-2)/(x+1) = -(x+2)(x-1)/(x+1) ≤ 0.", "id": "fc15"}, {"front": "What are the critical values for -(x+2)(x-1)/(x+1) ≤ 0?", "back": "The critical values are x=-2 (numerator zero), x=1 (numerator zero), and x=-1 (denominator zero).", "id": "fc16"}, {"front": "What is the solution to 2/(x+1) ≤ x?", "back": "The solution is (-∞, -2] ∪ (-1, 1]. (x=-2 and x=1 are included because it's ≤; x=-1 is excluded because it makes the expression undefined).", "id": "fc17"}, {"front": "For 1/x > 1/(x+2), after simplifying to 2/(x(x+2)) > 0, what are the critical values?", "back": "The critical values are x=0 and x=-2 (both from the denominator). The numerator is a constant 2, which has no zeros.", "id": "fc18"}, {"front": "What is the solution to 1/x > 1/(x+2)?", "back": "The solution is (-∞, -2) ∪ (0, ∞). (Both x=-2 and x=0 are excluded because they make the expression undefined, and we need strictly >0).", "id": "fc19"}, {"front": "What arithmetic rules do rational expressions follow?", "back": "Rational expressions follow the same arithmetic rules as numeric fractions: factor, find the LCD, and cancel common factors.", "id": "fc20"}, {"front": "What graphical features shape rational functions?", "back": "Rational function graphs are shaped by vertical asymptotes (where the denominator is zero), horizontal or slant asymptotes (end behavior), and holes (common factors that cancel).", "id": "fc21"}, {"front": "What is the primary method for solving rational *equations*, and what is a crucial check?", "back": "Rational equations are solved by clearing denominators, but you must always check for extraneous solutions.", "id": "fc22"}, {"front": "What is the primary method for solving rational *inequalities*?", "back": "Rational inequalities require sign analysis on a number line using the zeros of the numerator and the restrictions (zeros of the denominator) as critical values.", "id": "fc23"}, {"front": "Solve x+3/x-4 ≤ 0.", "back": "The solution is [-3, 4). (x=-3 is included because it makes the expression 0 and the inequality is ≤; x=4 is excluded because it makes the expression undefined).", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
