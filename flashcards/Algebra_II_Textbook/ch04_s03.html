<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_II_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the defining characteristic of a square root function regarding its domain?", "back": "The domain is restricted to non-negative inputs because the square root of a negative real number is not a real number."}, {"front": "Define the basic square root function, $f(x)$, and state its domain and range.", "back": "The basic square root function is $f(x) = \\sqrt{x}$. Its domain is $[0, \\infty)$ and its range is $[0, \\infty)$."}, {"front": "What is a 'radical function'?", "back": "A radical function is any function containing a variable under a radical sign."}, {"front": "What is the general transformation form for a radical function as discussed in this section?", "back": "The general transformation form is $f(x) = a\\sqrt{x - h} + k$, where $a$, $h$, and $k$ are real numbers with $a \\neq 0$."}, {"front": "How do you find the domain of a square root function of the form $f(x) = \\sqrt{ax+b}$?", "back": "Set the radicand (expression under the radical) greater than or equal to zero ($ax + b \\ge 0$), then solve the inequality for $x$, and write the answer in interval notation."}, {"front": "What is the effect of 'h' on the graph of $g(x) = a\\sqrt{x-h} + k$?", "back": "'h' causes a horizontal shift: right $h$ units if $h > 0$, or left $|h|$ units if $h < 0$. The domain starts at $x = h$."}, {"front": "What is the effect of 'k' on the graph of $g(x) = a\\sqrt{x-h} + k$?", "back": "'k' causes a vertical shift: up $k$ units if $k > 0$, or down $|k|$ units if $k < 0$. The range starts at $y = k$."}, {"front": "What is the effect of 'a' on the graph of $g(x) = a\\sqrt{x-h} + k$ if $a < 0$?", "back": "If $a < 0$, the graph is reflected over the x-axis, meaning it will curve downward from the starting point."}, {"front": "What is the effect of the magnitude of 'a' on the graph of $g(x) = a\\sqrt{x-h} + k$?", "back": "If $|a| > 1$, the graph is stretched vertically. If $0 < |a| < 1$, the graph is compressed vertically."}, {"front": "What are the coordinates of the starting point (endpoint) of the graph of $g(x) = a\\sqrt{x-h} + k$?", "back": "The starting point of the graph is $(h, k)$."}, {"front": "Find the domain of $f(x) = \\sqrt{x - 5}$.", "back": "Set $x - 5 \\ge 0$, so $x \\ge 5$. Domain: $[5, \\infty)$."}, {"front": "Find the domain of $g(x) = \\sqrt{3x + 12}$.", "back": "Set $3x + 12 \\ge 0$, so $3x \\ge -12$, giving $x \\ge -4$. Domain: $[-4, \\infty)$."}, {"front": "Find the domain of $h(x) = \\sqrt{8 - 2x}$.", "back": "Set $8 - 2x \\ge 0$, so $-2x \\ge -8$, giving $x \\le 4$ (remember to flip the inequality sign when dividing by a negative). Domain: $(-\\infty, 4]$."}, {"front": "Find the domain of $p(x) = \\sqrt{x^2 - 9}$.", "back": "Set $x^2 - 9 \\ge 0$, which factors to $(x-3)(x+3) \\ge 0$. This holds when $x \\le -3$ or $x \\ge 3$. Domain: $(-\\infty, -3] \\cup [3, \\infty)$."}, {"front": "Describe the transformations for $f(x) = \\sqrt{x - 3} + 2$ from $y = \\sqrt{x}$, and state its starting point, domain, and range.", "back": "Transformation: Shift right 3 units and up 2 units. Starting point: $(3, 2)$. Domain: $[3, \\infty)$. Range: $[2, \\infty)$."}, {"front": "Describe the transformations for $g(x) = -\\sqrt{x + 1}$ from $y = \\sqrt{x}$, and state its starting point, domain, and range.", "back": "Transformation: Shift left 1 unit and reflect over the x-axis (the graph curves downward). Starting point: $(-1, 0)$. Domain: $[-1, \\infty)$. Range: $(-\\infty, 0]$."}, {"front": "Describe the transformations for $h(x) = 3\\sqrt{x} - 6$ from $y = \\sqrt{x}$, and state its starting point, domain, and range.", "back": "Transformation: Vertically stretch by a factor of 3 and shift down 6 units. Starting point: $(0, -6)$. Domain: $[0, \\infty)$. Range: $[-6, \\infty)$."}, {"front": "Write the equation for a square root function whose graph starts at $(-2, 3)$, goes to the right, and passes through $(2, 7)$.", "back": "The general form is $y = a\\sqrt{x - h} + k$. Given starting point $(-2, 3)$, $h = -2$ and $k = 3$, so $y = a\\sqrt{x + 2} + 3$. Using $(2, 7)$: $7 = a\\sqrt{2 + 2} + 3 \\Rightarrow 7 = a\\sqrt{4} + 3 \\Rightarrow 7 = 2a + 3 \\Rightarrow 4 = 2a \\Rightarrow a = 2$. Equation: $y = 2\\sqrt{x + 2} + 3$."}, {"front": "The period $T$ (in seconds) of a simple pendulum of length $L$ (in meters) is $T = 2\\pi\\sqrt{L/9.8}$. Find $T$ when $L = 2.45$ m. Round to the nearest tenth.", "back": "$T = 2\\pi\\sqrt{2.45/9.8} = 2\\pi\\sqrt{0.25} = 2\\pi(0.5) = \\pi \\approx 3.1$ seconds."}, {"front": "Using the pendulum formula $T = 2\\pi\\sqrt{L/9.8}$, what length $L$ produces a period of exactly 2 seconds?", "back": "Set $T=2$: $2 = 2\\pi\\sqrt{L/9.8}$. Divide by $2\\pi$: $1/\\pi = \\sqrt{L/9.8}$. Square both sides: $(1/\\pi)^2 = L/9.8$. So $L = 9.8/\\pi^2 \\approx 0.993$ meters."}, {"front": "What is a crucial step to remember when solving the domain inequality $ax+b \\ge 0$ if the coefficient 'a' is negative?", "back": "Remember to flip the inequality sign when dividing both sides by the negative coefficient 'a'."}, {"front": "If a square root function's graph sweeps downward from its starting point, what does this imply about the coefficient 'a' in $f(x) = a\\sqrt{x-h} + k$?", "back": "The coefficient 'a' must be negative ($a < 0$), indicating a reflection over the x-axis."}, {"front": "Consider the basic square root function $y = \\sqrt{x}$. Where does its graph start and in what general direction does it curve?", "back": "It starts at the origin $(0,0)$ and curves gradually upward to the right."}, {"front": "The left endpoint of the domain of a square root function is also referred to as what?", "back": "It is referred to as the 'anchor point' or 'starting point'."}, {"front": "A square root function of the form $f(x) = a\\sqrt{x}$ passes through $(0, 0)$ and $(9, 6)$. Find the value of 'a'.", "back": "Using the point $(9, 6)$: $6 = a\\sqrt{9} \\Rightarrow 6 = 3a \\Rightarrow a = 2$."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
