<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 4, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_II_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a sequence?", "back": "An ordered list of numbers, called terms, denoted by $a_1, a_2, a_3, \\dots$, where $a_n$ represents the $n$th term."}, {"front": "From a function perspective, how can a sequence be viewed?", "back": "A sequence is a function whose domain is the set of positive integers (or natural numbers), where $a(n) = a_n$."}, {"front": "What are the two most important families of sequences discussed in this section?", "back": "Arithmetic sequences (characterized by a constant difference) and geometric sequences (characterized by a constant ratio)."}, {"front": "Define an arithmetic sequence.", "back": "An arithmetic sequence (or arithmetic progression) is a sequence in which the difference between consecutive terms is constant."}, {"front": "What is the 'common difference' in an arithmetic sequence? How is it denoted and calculated?", "back": "It is the constant difference between consecutive terms, denoted by $d$. It is calculated as $d = a_{n+1} - a_n$ for all $n \\ge 1$."}, {"front": "How do you determine if a given sequence is arithmetic?", "back": "Subtract each term from the next. If all differences equal the same constant value, $d$, then the sequence is arithmetic."}, {"front": "State the $n$th-Term Formula for an Arithmetic Sequence.", "back": "$a_n = a_1 + (n - 1)d$, where $a_1$ is the first term and $d$ is the common difference."}, {"front": "How is an arithmetic sequence related to a linear function?", "back": "An arithmetic sequence is a linear function of $n$. Plotting $(n, a_n)$ produces points that lie on a line with slope $d$ and $y$-intercept $a_1 - d$."}, {"front": "An arithmetic sequence has $a_1 = 7$ and common difference $d = -3$. Write a formula for $a_n$.", "back": "$a_n = 7 + (n-1)(-3) = 7 - 3n + 3 = 10 - 3n$."}, {"front": "For the arithmetic sequence $a_n = 10 - 3n$, find the 10th term ($a_{10}$).", "back": "$a_{10} = 10 - 3(10) = 10 - 30 = -20$."}, {"front": "For the arithmetic sequence $a_n = 10 - 3n$, which term equals $-50$?", "back": "Set $10 - 3n = -50$. Solving for $n$ gives $-3n = -60$, so $n = 20$. The 20th term equals $-50$."}, {"front": "Define a geometric sequence.", "back": "A geometric sequence is a sequence in which each term after the first is obtained by multiplying the previous term by a fixed nonzero constant."}, {"front": "What is the 'common ratio' in a geometric sequence? How is it denoted and calculated?", "back": "It is the fixed nonzero constant by which each term is multiplied, denoted by $r$. It is calculated as $r = a_{n+1} / a_n$ for all $n \\ge 1$."}, {"front": "State the $n$th-Term Formula for a Geometric Sequence.", "back": "$a_n = a_1 r^{n-1}$, where $a_1$ is the first term and $r$ is the common ratio ($r \\ne 0$)."}, {"front": "How is a geometric sequence related to an exponential function?", "back": "A geometric sequence is an exponential function of $n$."}, {"front": "Describe the behavior of a geometric sequence based on its common ratio $r$.", "back": "If $r > 1$, the terms grow. If $0 < r < 1$, the terms shrink toward zero. If $r < 0$, the terms alternate in sign."}, {"front": "Determine if the sequence $2, 6, 18, 54, \\dots$ is geometric. If so, state $r$ and the next two terms.", "back": "Ratios: $6/2=3$, $18/6=3$, $54/18=3$. It is a geometric sequence with $r=3$. The next two terms are $54 \\times 3 = 162$ and $162 \\times 3 = 486$."}, {"front": "If a geometric sequence has $a_1 = 3$ and $r = 2$, what is the formula for $a_n$?", "back": "$a_n = 3 \\cdot 2^{n-1}$."}, {"front": "For the geometric sequence $a_n = 3 \\cdot 2^{n-1}$, find $a_8$.", "back": "$a_8 = 3 \\cdot 2^{8-1} = 3 \\cdot 2^7 = 3 \\cdot 128 = 384$."}, {"front": "For the geometric sequence $a_n = 3 \\cdot 2^{n-1}$, is $192$ a term in the sequence? If so, which one?", "back": "Set $3 \\cdot 2^{n-1} = 192$. Dividing by 3 gives $2^{n-1} = 64$. Since $64 = 2^6$, we have $n-1 = 6$, so $n=7$. Yes, $192$ is the 7th term ($a_7$)."}, {"front": "An arithmetic sequence has $a_3 = 11$ and $a_7 = 27$. Find the common difference $d$.", "back": "The difference between $a_7$ and $a_3$ is $27 - 11 = 16$. This occurs over $7 - 3 = 4$ steps. So, $4d = 16$, which means $d = 4$."}, {"front": "Using $a_3 = 11$ and $d = 4$ from the previous card, find the first term ($a_1$) of the arithmetic sequence.", "back": "Using $a_n = a_1 + (n-1)d$ with $n=3$: $11 = a_1 + (3-1)(4) = a_1 + 8$. Therefore, $a_1 = 3$."}, {"front": "Write the formula for $a_n$ for an arithmetic sequence with $a_1 = 3$ and $d = 4$.", "back": "$a_n = 3 + (n-1)(4) = 3 + 4n - 4 = 4n - 1$."}, {"front": "How can compound interest be modeled as a geometric sequence?", "back": "When interest is compounded annually, the initial principal ($a_1$) is multiplied by a fixed factor ($1 + \\text{interest rate}$) each year. This factor acts as the common ratio ($r$) of a geometric sequence."}, {"front": "$1,000 is deposited at 6% annual interest compounded annually. Write the first four terms of this sequence.", "back": "The first term $a_1 = 1,000$. The common ratio $r = 1 + 0.06 = 1.06$.\n$a_1 = 1,000$\n$a_2 = 1,000 \\times 1.06 = 1,060$\n$a_3 = 1,060 \\times 1.06 = 1,123.60$\n$a_4 \\approx 1,123.60 \\times 1.06 = 1,191.02$"}, {"front": "For the previous compound interest example ($1,000 at 6% compounded annually), what is the balance after 10 years?", "back": "The balance after 10 years is the 10th term, $a_{10}$. Using $a_n = a_1 r^{n-1}$: $a_{10} = 1,000 \\cdot (1.06)^{10-1} = 1,000 \\cdot (1.06)^9 \\approx 1,000 \\cdot 1.689479 \\approx \\$1,689.48."}, {"front": "How do arithmetic sequences and geometric sequences relate to linear and exponential functions, respectively?", "back": "Arithmetic sequences grow linearly (due to a constant difference, similar to a slope), while geometric sequences grow exponentially (due to a constant ratio, similar to an exponential base)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
