<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 9, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the definition of a hyperbola based on distances to two fixed points?", "back": "A hyperbola is the set of all points where the absolute difference of the distances from two fixed points (the foci) is constant, i.e., $|d_1 - d_2| = 2a$ where $a > 0$."}, {"front": "How does the distance definition of a hyperbola contrast with that of an ellipse?", "back": "For a hyperbola, the *absolute difference* of distances to the foci is constant. For an ellipse, the *sum* of distances to the foci is constant."}, {"front": "List some real-world applications where hyperbolas appear.", "back": "The design of cooling towers, paths of comets with sufficient speed to escape gravity, and radio-navigation systems (LORAN)."}, {"front": "What is the standard form equation for a horizontal hyperbola centered at $(h,k)$?", "back": "$$\\frac{(x-h)^2}{a^2} - \\frac{(y-k)^2}{b^2} = 1$$"}, {"front": "What is the standard form equation for a vertical hyperbola centered at $(h,k)$?", "back": "$$\\frac{(y-k)^2}{a^2} - \\frac{(x-h)^2}{b^2} = 1$$"}, {"front": "What is the relationship between $a$, $b$, and $c$ for a hyperbola?", "back": "$c^2 = a^2 + b^2$"}, {"front": "How are the vertices of a hyperbola located relative to its center $(h,k)$?", "back": "The vertices are a distance $a$ from the center along the transverse axis. For a horizontal hyperbola: $(h \\pm a, k)$. For a vertical hyperbola: $(h, k \\pm a)$."}, {"front": "How are the foci of a hyperbola located relative to its center $(h,k)$?", "back": "The foci are a distance $c$ from the center along the transverse axis. For a horizontal hyperbola: $(h \\pm c, k)$. For a vertical hyperbola: $(h, k \\pm c)$."}, {"front": "What are the general equations for the asymptotes of a horizontal hyperbola centered at $(h,k)$?", "back": "$$y - k = \\pm \\frac{b}{a}(x - h)$$"}, {"front": "What are the general equations for the asymptotes of a vertical hyperbola centered at $(h,k)$?", "back": "$$y - k = \\pm \\frac{a}{b}(x - h)$$"}, {"front": "How does the eccentricity $e$ of a hyperbola compare to 1, and what is its formula?", "back": "For a hyperbola, $e > 1$. The formula is $e = \\frac{c}{a}$."}, {"front": "How can you determine the orientation (horizontal or vertical) of a hyperbola from its standard form equation?", "back": "If the $x$-term is positive and the $y$-term is subtracted, it is a horizontal hyperbola. If the $y$-term is positive and the $x$-term is subtracted, it is a vertical hyperbola."}, {"front": "Explain how the 'central rectangle' is used to sketch a hyperbola's asymptotes.", "back": "The central rectangle is centered at $(h,k)$ with half-widths $a$ (in the transverse direction) and $b$ (in the conjugate direction). The asymptotes are the extended diagonals of this rectangle."}, {"front": "For the hyperbola $x^2/9 - y^2/4 = 1$, identify its center, orientation, and values for $a$ and $b$.", "back": "Center: $(0,0)$. Orientation: horizontal. $a=3$, $b=2$."}, {"front": "For the hyperbola $(y+1)^2/16 - (x-2)^2/9 = 1$, identify its center, orientation, and values for $a$ and $b$.", "back": "Center: $(2,-1)$. Orientation: vertical. $a=4$, $b=3$."}, {"front": "What are the general steps to convert a hyperbola's equation from general form ($Ax^2 + Cy^2 + Dx + Ey + F = 0$) to standard form?", "back": "Group $x$-terms and $y$-terms; move the constant to the right. Factor out coefficients of squared terms. Complete the square for both $x$ and $y$. Divide by the constant on the right side to make it 1."}, {"front": "How do the coefficients $A$ and $C$ in the general conic equation $Ax^2 + Cy^2 + Dx + Ey + F = 0$ indicate that the conic is a hyperbola?", "back": "A hyperbola is formed when $A$ and $C$ have opposite signs."}, {"front": "Define 'conjugate hyperbolas' and give an example of their equations.", "back": "Conjugate hyperbolas share the same asymptotes but have their transverse and conjugate axes swapped. Example: $x^2/a^2 - y^2/b^2 = 1$ and $y^2/b^2 - x^2/a^2 = 1$."}, {"front": "What is a 'degenerate hyperbola'? Give an example equation.", "back": "A degenerate hyperbola occurs when its equation factors into two linear equations, representing a pair of intersecting lines. Example: $x^2 - 4y^2 = 0$, which factors to $(x - 2y)(x + 2y) = 0$."}, {"front": "What is a frequent error regarding the $c^2$ relationship when dealing with hyperbolas and ellipses?", "back": "Confusing the sign in the formula: For hyperbolas, $c^2 = a^2 + b^2$. For ellipses, $c^2 = a^2 - b^2$ (or $c^2 = a^2 - b^2$ if $a>b$, or $c^2 = b^2-a^2$ if $b>a$, but the general idea is $c^2 = |a^2-b^2|$ where $a$ is always the larger for ellipse)."}, {"front": "How is hyperbolic navigation (like LORAN) utilized to locate a ship's position?", "back": "A ship measures the difference in signal arrival times from two transmitters. This constant time difference translates to a constant difference in distances, defining a hyperbola. The intersection of two such hyperbolas from different transmitter pairs pinpoints the ship's location."}, {"front": "What are the possible numbers of intersection points between a line and any conic section?", "back": "A line can intersect a conic in zero points (misses entirely), one point (tangent line), or two points (secant line)."}, {"front": "What is the primary algebraic strategy for solving a linear-quadratic system (a line intersecting a conic)?", "back": "Solve the linear equation for one variable (e.g., $y$ in terms of $x$), then substitute that expression into the conic equation. This results in a quadratic equation."}, {"front": "When solving a linear-quadratic system, how do you determine if the line is tangent to the conic?", "back": "After substitution, if the resulting quadratic equation has exactly one real solution (meaning its discriminant is zero), the line is tangent to the conic."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
