<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Point-Slope Form of a linear equation?", "back": "The equation is `y - y_1 = m(x - x_1)`, where `m` is the slope and `(x_1, y_1)` is a point on the line.", "id": "fc01"}, {"front": "When is Point-Slope Form the most direct way to write a linear equation?", "back": "When you know the slope of the line and at least one point it passes through.", "id": "fc02"}, {"front": "State the Slope-Intercept Form of a linear equation.", "back": "The equation is `y = mx + b`, where `m` is the slope and `b` is the y-intercept.", "id": "fc03"}, {"front": "How can Slope-Intercept Form (`y = mx + b`) be related to Point-Slope Form?", "back": "It is Point-Slope Form applied to the specific point `(0, b)`, where `b` is the y-intercept.", "id": "fc04"}, {"front": "What is the Standard Form of a linear equation, including its constraints?", "back": "The equation is `Ax + By = C`, where `A`, `B`, and `C` are integers, `A >= 0`, and `A, B, C` have no common factor (i.e., `gcd(A, B, C) = 1`).", "id": "fc05"}, {"front": "Write the equation of the line through `(-1, 3)` with slope `m = 2` in Point-Slope Form.", "back": "`y - 3 = 2(x + 1)`", "id": "fc06"}, {"front": "Convert the equation `y - 3 = 2(x + 1)` (from a line through `(-1, 3)` with slope `m = 2`) to Slope-Intercept Form.", "back": "`y = 2x + 5`", "id": "fc07"}, {"front": "Convert the equation `y = 2x + 5` to Standard Form.", "back": "`2x - y = -5`", "id": "fc08"}, {"front": "Outline the steps to write the equation of a line when given two points.", "back": "Step 1: Calculate the slope `m` using the two points. Step 2: Use the point-slope form `y - y_1 = m(x - x_1)` with one of the given points and the calculated slope (then simplify to desired form).", "id": "fc09"}, {"front": "Write the equation of the line passing through `(2, -1)` and `(5, 5)` in Slope-Intercept Form.", "back": "First, find the slope: `m = (5 - (-1))/(5 - 2) = 6/3 = 2`. Then use point-slope with `(2, -1)`: `y - (-1) = 2(x - 2) -> y + 1 = 2x - 4 -> y = 2x - 5`.", "id": "fc10"}, {"front": "What is a common error when expanding point-slope form like `y - y_1 = m(x - x_1)` with a negative slope?", "back": "Forgetting to distribute the negative sign to both terms inside the parentheses. For instance, with `m = -3` and `(x_1, y_1) = (2, 5)`, the right side `-3(x - 2)` should be `-3x + 6`, not `-3x - 6`.", "id": "fc11"}, {"front": "How are the slopes of parallel lines related?", "back": "Parallel lines have identical slopes.", "id": "fc12"}, {"front": "Write the equation of the line parallel to `y = 3x - 7` that passes through `(0, 4)`.", "back": "Since parallel lines have the same slope, `m = 3`. The point `(0, 4)` is the y-intercept, so `b = 4`. The equation is `y = 3x + 4`.", "id": "fc13"}, {"front": "How are the slopes of perpendicular lines related?", "back": "Perpendicular lines have slopes that are negative reciprocals of each other (i.e., `m_1 * m_2 = -1`).", "id": "fc14"}, {"front": "Outline the steps to write the equation of a line perpendicular to a given line and passing through a specific point.", "back": "Step 1: Find the slope of the given line. Step 2: Determine the negative reciprocal of that slope for the perpendicular line. Step 3: Use the point-slope form with the new slope and the given point.", "id": "fc15"}, {"front": "Write the equation of the line perpendicular to `2x - 3y = 6` that passes through `(4, -1)`.", "back": "First, find the slope of `2x - 3y = 6`: `y = (2/3)x - 2`, so `m_given = 2/3`. The perpendicular slope `m_perp = -3/2`. Using point-slope with `(4, -1)`: `y - (-1) = (-3/2)(x - 4) -> y + 1 = (-3/2)x + 6 -> y = (-3/2)x + 5`.", "id": "fc16"}, {"front": "What is an efficient method for graphing a line in Standard Form (`Ax + By = C`)?", "back": "Plotting its x-intercept and y-intercept and drawing a line through them.", "id": "fc17"}, {"front": "How do you find the x-intercept of a line?", "back": "Set `y = 0` in the equation of the line and solve for `x`.", "id": "fc18"}, {"front": "How do you find the y-intercept of a line?", "back": "Set `x = 0` in the equation of the line and solve for `y`.", "id": "fc19"}, {"front": "Find the x- and y-intercepts for the equation `2x - 3y = 6`.", "back": "For x-intercept (set `y=0`): `2x - 3(0) = 6 -> 2x = 6 -> x = 3`. Point: `(3, 0)`. For y-intercept (set `x=0`): `2(0) - 3y = 6 -> -3y = 6 -> y = -2`. Point: `(0, -2)`.", "id": "fc20"}, {"front": "What should you do if both the x- and y-intercepts of a line coincide (i.e., the line passes through the origin)?", "back": "Find a second point by substituting any convenient `x`-value (other than 0) into the equation.", "id": "fc21"}, {"front": "Define a linear function in terms of its algebraic form.", "back": "A linear function is any function of the form `f(x) = mx + b`, where `m` and `b` are constants.", "id": "fc22"}, {"front": "What are the key graphical properties of a linear function `f(x) = mx + b`?", "back": "Its graph is a line with slope `m` and y-intercept `b`.", "id": "fc23"}, {"front": "Is every linear function `f(x) = mx + b` a one-to-one function?", "back": "Yes, every linear function with `m != 0` is one-to-one (it passes the horizontal line test). If `m = 0`, it's a horizontal line, which is not one-to-one.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
