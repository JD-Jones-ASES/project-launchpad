<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_II_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How do you multiply two rational expressions in general terms?", "back": "Multiply the numerators together and multiply the denominators together."}, {"front": "How do you divide two rational expressions in general terms?", "back": "Multiply the first rational expression by the reciprocal of the second rational expression (the divisor)."}, {"front": "What is the most important strategy to apply when multiplying or dividing rational expressions?", "back": "Factor all numerators and denominators completely first, so that common factors can be canceled before performing the multiplication."}, {"front": "State the algebraic property for multiplying rational expressions (P/Q) * (R/S).", "back": "If P/Q and R/S are rational expressions with Q ≠ 0 and S ≠ 0, then (P/Q) * (R/S) = PR/QS."}, {"front": "What are the procedural steps to multiply and simplify rational expressions?", "back": "1. Factor all numerators and denominators completely. 2. Cancel any common factors. 3. Multiply the remaining numerators and multiply the remaining denominators."}, {"front": "Simplify the product: (3x^2 / 5y) * (10y^3 / 9x)", "back": "The simplified form is (2xy^2)/3."}, {"front": "To multiply (x^2 - 4)/(x^2 + x) by (x^2 + 2x + 1)/(x + 2), what is the first step you should take?", "back": "Factor all numerators and denominators completely: x^2 - 4 = (x-2)(x+2), x^2 + x = x(x+1), x^2 + 2x + 1 = (x+1)^2, x + 2 = x+2."}, {"front": "What is the simplified product and the domain restrictions for (x^2 - 4)/(x^2 + x) * (x^2 + 2x + 1)/(x + 2)?", "back": "Simplified product: (x-2)(x+1)/x. Domain restrictions: x ≠ 0, x ≠ -1, x ≠ -2."}, {"front": "Does the procedure for multiplying rational expressions change if there are more than two expressions?", "back": "No, the procedure remains the same: factor all numerators and denominators, cancel common factors across all expressions, then multiply the remaining parts."}, {"front": "State the algebraic property for dividing rational expressions (P/Q) / (R/S).", "back": "To divide by a rational expression, multiply by its reciprocal: (P/Q) / (R/S) = (P/Q) * (S/R) = PS/QR, where R ≠ 0."}, {"front": "What are the procedural steps to divide and simplify rational expressions?", "back": "1. Rewrite the division as multiplication by the reciprocal of the second fraction (the divisor). 2. Factor all numerators and denominators completely. 3. Cancel any common factors. 4. Multiply the remaining numerators and denominators."}, {"front": "What is a common error to avoid when dividing rational expressions?", "back": "Always invert the second fraction (the divisor), not the first fraction."}, {"front": "Simplify the division: (4x^3 / 7y^2) / (8x / 21y)", "back": "The simplified form is (3x^2)/(2y)."}, {"front": "To divide (x^2 - 9)/(x^2 - x) by (x^2 + x - 12)/(x^2 - 1), what is the first step you should take?", "back": "Rewrite as multiplication by the reciprocal of the second fraction: (x^2 - 9)/(x^2 - x) * (x^2 - 1)/(x^2 + x - 12)."}, {"front": "What is the simplified form and domain restrictions for (x^2 - 9)/(x^2 - x) / (x^2 + x - 12)/(x^2 - 1)?", "back": "Simplified form: (x+3)(x+1)/(x(x+4)). Domain restrictions: x ≠ 0, x ≠ 1, x ≠ -1, x ≠ 3, x ≠ -4."}, {"front": "How do you handle a division problem where the divisor is a polynomial (e.g., (x - 2)) rather than a fraction?", "back": "Write the polynomial as a rational expression with a denominator of 1 (e.g., (x - 2)/1), then proceed with the standard division steps (multiply by reciprocal)."}, {"front": "Simplify (x^2 + 2x - 8)/(x + 1) / (x - 2) and state its restrictions.", "back": "Simplified form: (x+4)/(x+1). Restrictions: x ≠ -1, x ≠ 2."}, {"front": "Why is it crucial to factor rational expressions before multiplying or dividing them?", "back": "Factoring allows you to identify and cancel common factors in the numerators and denominators, simplifying the expression before multiplication and preventing large, complex polynomial terms."}, {"front": "When performing operations on rational expressions, which terms contribute to the overall domain restrictions?", "back": "Any factor that appears in any denominator at any point during the problem (including the original denominators and the denominator of the divisor after it's been inverted) must be checked to ensure it does not equal zero."}, {"front": "Multiply and simplify: (x^2 + 3x)/(x^2 - 4) * (x^2 - 2x)/(x^2 + x - 6)", "back": "Simplified form: x^2 / ((x+2)(x-2)). Domain restrictions: x ≠ 0, x ≠ 2, x ≠ -2, x ≠ -3."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
