<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_II_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a polynomial in one variable x?", "back": "An expression of the form a_n x^n + a_{n-1}x^{n-1} + … + a_1 x + a_0."}, {"front": "What are the key conditions for an expression to be a polynomial in one variable x?", "back": "The exponent 'n' must be a non-negative integer, the coefficients a_k must be real numbers, and the leading coefficient a_n cannot be zero."}, {"front": "Give two examples of expressions that are NOT polynomials and explain why.", "back": "x^(1/2) (involves a fractional exponent) or x^(-2) (involves a negative exponent)."}, {"front": "In the context of a polynomial, what is a \"term\"?", "back": "Each product a_k x^k in the polynomial expression is called a term."}, {"front": "What defines the \"degree of a polynomial\"?", "back": "The greatest exponent that appears on the variable in the polynomial."}, {"front": "What is the \"leading term\" of a polynomial?", "back": "The term that contains the highest exponent on the variable."}, {"front": "What is the \"leading coefficient\" of a polynomial?", "back": "The coefficient of the leading term."}, {"front": "What is the \"constant term\" of a polynomial?", "back": "The term a_0 that has no variable factor (i.e., the term with x^0)."}, {"front": "How is a polynomial written in \"standard form\"?", "back": "Its terms are arranged in descending order of degree, from the highest-degree term first down to the constant term last."}, {"front": "What is a \"monomial\"? Give an example.", "back": "A polynomial with exactly one term. Example: 5x^3."}, {"front": "What is a \"binomial\"? Give an example.", "back": "A polynomial with exactly two terms. Example: x^2 - 4."}, {"front": "What is a \"trinomial\"? Give an example.", "back": "A polynomial with exactly three terms. Example: 2x^2 - 3x + 1."}, {"front": "For the polynomial P(x) = -4x^5 + 7x^3 - x + 9, what is its degree?", "back": "The degree is 5."}, {"front": "For the polynomial P(x) = -4x^5 + 7x^3 - x + 9, what is its leading coefficient?", "back": "The leading coefficient is -4."}, {"front": "For the polynomial P(x) = -4x^5 + 7x^3 - x + 9, what is its constant term?", "back": "The constant term is 9."}, {"front": "For the polynomial P(x) = -4x^5 + 7x^3 - x + 9, what is the coefficient of x^3?", "back": "The coefficient of x^3 is 7."}, {"front": "Write 3x^2 - 8 + 5x^4 - x in standard form. Then state its degree and leading coefficient.", "back": "Standard form: 5x^4 + 3x^2 - x - 8. Degree: 4. Leading coefficient: 5."}, {"front": "What are \"like terms\" in a polynomial?", "back": "Terms that have identical variable parts (the same variable raised to the same exponent)."}, {"front": "What is the rule for combining like terms in a polynomial expression?", "back": "Only like terms can be combined by adding or subtracting their coefficients."}, {"front": "Simplify: (6x^3 - 2x^2 + 5x - 1) + (x^3 + 4x^2 - 3x + 7).", "back": "7x^3 + 2x^2 + 2x + 6."}, {"front": "How does the degree of a sum or difference of two polynomials relate to their individual degrees?", "back": "It is at most the larger of their individual degrees. It can be lower if the leading terms cancel."}, {"front": "How do you evaluate a polynomial P(x) at x = a?", "back": "Substitute the value 'a' for every occurrence of 'x' in the polynomial expression and then simplify the result."}, {"front": "If P(x) = 2x^3 - 5x^2 + x - 4, what is P(3)?", "back": "P(3) = 8."}, {"front": "If P(x) = 2x^3 - 5x^2 + x - 4, what is P(-2)?", "back": "P(-2) = -42."}, {"front": "What important caution should be observed when substituting a negative value into a polynomial, especially when exponents are involved?", "back": "Enclose the negative value in parentheses before applying the exponent to ensure the sign is handled correctly, e.g., (-2)^2 = 4 but -2^2 = -4."}, {"front": "If Q(x) = x^2 - 3x + 2, what is Q(a+1) in simplified form?", "back": "Q(a+1) = a^2 - a."}, {"front": "What are the three main steps to add or subtract polynomials?", "back": "1. Distribute any negative sign across a subtracted polynomial. 2. Collect like terms. 3. Write the result in standard form."}, {"front": "Subtract: (5x^3 - 2x^2 + 4) - (3x^3 + x^2 - 6x + 1).", "back": "2x^3 - 3x^2 + 6x + 3."}, {"front": "Add: (4x^2 - 3x + 1) + (2x^2 + 5x - 7).", "back": "6x^2 + 2x - 6."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
