<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The Second Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The Second Year &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_II_Textbook.html">&larr; Back to Algebra: The Second Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary goal of factoring a polynomial expression?", "back": "Factoring is the reverse of multiplication; it rewrites a polynomial as a product of simpler polynomials."}, {"front": "Why is mastery of factoring essential in algebra?", "back": "It converts a polynomial equation into a form where the Zero Product Property can be applied, which is crucial for solving equations."}, {"front": "What is the *first* step in the systematic strategy for factoring any polynomial?", "back": "Always factor out the Greatest Common Factor (GCF) from all terms first."}, {"front": "After factoring out the GCF, what is the next step in the factoring strategy?", "back": "Count the number of terms in the remaining polynomial to determine the appropriate factoring method (e.g., two terms, three terms)."}, {"front": "Define the Greatest Common Factor (GCF) of a polynomial.", "back": "The GCF of a polynomial is the largest monomial that divides every term in the polynomial."}, {"front": "How do you factor out the GCF from a polynomial?", "back": "Identify the GCF, then use the distributive property to write the GCF multiplied by the remaining polynomial terms."}, {"front": "Factor the expression \\(6x^3 - 9x^2 + 3x\\) by pulling out the GCF.", "back": "\\(3x(2x^2 - 3x + 1)\\)"}, {"front": "Factor the expression \\(12x^4y^2 - 8x^3y^3 + 4x^2y\\) by pulling out the GCF.", "back": "\\(4x^2y(3x^2y - 2xy^2 + 1)\\)"}, {"front": "When factoring a trinomial of the form \\(x^2+bx+c\\) (leading coefficient is 1), what two integers are you looking for?", "back": "You are looking for two integers \\(p\\) and \\(q\\) such that \\(p+q=b\\) and \\(pq=c\\)."}, {"front": "Factor the trinomial \\(x^2-5x+6\\).", "back": "\\((x-2)(x-3)\\)"}, {"front": "What is the primary purpose of the AC Method in factoring trinomials?", "back": "The AC Method provides a systematic procedure for factoring trinomials of the form \\(ax^2+bx+c\\) when the leading coefficient \\(a\\) is not 1."}, {"front": "What are the first two steps of the AC Method for factoring \\(ax^2+bx+c\\)?", "back": "Step 1: Compute \\(ac\\). Step 2: Find two integers \\(m\\) and \\(n\\) such that \\(mn = ac\\) and \\(m+n = b\\)."}, {"front": "What are the remaining steps of the AC Method after finding \\(m\\) and \\(n\\)?", "back": "Rewrite \\(ax^2 + bx + c\\) as \\(ax^2 + mx + nx + c\\), then factor the first two terms and last two terms separately (grouping), and finally factor out the common binomial."}, {"front": "Factor the trinomial \\(6x^2+7x-3\\) using the AC Method.", "back": "\\((3x-1)(2x+3)\\)"}, {"front": "Why is it crucial to always check for a GCF *before* attempting trinomial factoring or the AC method?", "back": "Skipping the GCF step means working with larger coefficients unnecessarily and may cause you to miss a common factor entirely, leading to an incomplete factorization."}, {"front": "What is the formula for factoring a difference of squares?", "back": "\\(a^2 - b^2 = (a+b)(a-b)\\)"}, {"front": "Factor the expression \\(4x^2-25\\).", "back": "\\((2x+5)(2x-5)\\)"}, {"front": "What are the formulas for factoring perfect square trinomials?", "back": "\\(a^2+2ab+b^2 = (a+b)^2\\) and \\(a^2-2ab+b^2 = (a-b)^2\\)"}, {"front": "Factor the expression \\(x^2+10x+25\\).", "back": "\\((x+5)^2\\)"}, {"front": "Can a sum of squares (e.g., \\(a^2+b^2\\)) be factored over the real numbers?", "back": "No, a sum of squares (\\(a^2+b^2\\)) cannot be factored over the real numbers (it is considered prime over the reals)."}, {"front": "Factor \\(4x^2-8x\\) completely.", "back": "\\(4x(x-2)\\)"}, {"front": "Factor \\(x^2+3x-10\\) completely.", "back": "\\((x+5)(x-2)\\)"}, {"front": "Factor \\(3x^2-10x+8\\) completely.", "back": "\\((3x-4)(x-2)\\)"}, {"front": "Factor \\(9x^2-16\\) completely.", "back": "\\((3x+4)(3x-4)\\)"}, {"front": "Factor \\(x^2-8x+16\\) completely.", "back": "\\((x-4)^2\\)"}, {"front": "What crucial step should always be performed after factoring any polynomial to ensure accuracy?", "back": "Always check your factoring by multiplying the factors out to verify you recover the original polynomial."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
