<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>AP Human Geography &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "Demographic Transition Model (DTM)", "back": "A model proposing that as countries modernize and industrialize, they pass through a predictable sequence of stages defined by the relationship between the crude birth rate (CBR) and crude death rate (CDR). Death rates decline first; birth rates lag behind. The gap between the two rates determines natural increase. Proposed by Warren Thompson (1929) and formalized by Frank Notestein (1945). Derived from Western European experience.", "id": "fc01"}, {"front": "DTM Stage 1 — High Stationary", "back": "Both birth and death rates hover at roughly 35–50 per 1,000. Population grows slowly because high mortality (from disease, famine, and conflict) offsets high fertility. Natural increase is very low. No country currently occupies Stage 1; it describes most of human history before the eighteenth century.", "id": "fc02"}, {"front": "DTM Stage 2 — Early Expanding", "back": "Death rates fall sharply first — from better sanitation, clean water, vaccination, and antibiotics — while birth rates remain high because cultural and economic norms favoring large families change slowly. The result is explosive natural increase. Many sub-Saharan African nations (Niger, Mali, Chad, DRC) are in Stage 2 in the 2020s. Niger's TFR of ~7 is among the world's highest.", "id": "fc03"}, {"front": "DTM Stage 3 — Late Expanding", "back": "Birth rates begin to fall as urbanization reduces the economic value of children, women gain access to education and employment, and contraceptives become available. Death rates stabilize at a low level. Population continues to grow but at a decelerating rate. India and much of South and Southeast Asia occupy Stage 3.", "id": "fc04"}, {"front": "DTM Stage 4 — Low Stationary", "back": "Both birth and death rates are low. Population is large but essentially stable, with natural increase near zero. Replacement-level fertility (TFR ~2.1 in high-income countries) characterizes this stage. The United States, France, Australia, and China are broadly in Stage 4, though their exact trajectories differ.", "id": "fc05"}, {"front": "DTM Stage 5 — Declining", "back": "Birth rates fall below the level needed to replace deaths. Without immigration, the population shrinks. Germany, Italy, Japan, South Korea, and most of Eastern Europe are in Stage 5. Japan's population has been declining in absolute numbers since 2009. Stage 5 was added to the original four-stage model to account for countries experiencing sustained below-replacement fertility.", "id": "fc06"}, {"front": "Critiques of the Demographic Transition Model", "back": "Derived from Western European experience; may not be universal. Some countries (sub-Saharan Africa) resist expected fertility decline despite falling death rates. Others (Eastern Europe) moved to Stage 5 without an extended Stage 3. The model omits migration, which can significantly alter actual population growth independently of birth and death rates.", "id": "fc07"}, {"front": "Population Pyramid", "back": "A graphic representation of a population's age-sex structure. Each horizontal bar represents a 5-year age cohort; bar length is proportional to that cohort's share of total population. Males on the left, females on the right; youngest cohorts at bottom, oldest at top. Three canonical shapes — expansive, stationary, and constrictive — correspond broadly to DTM Stages 2, 4, and 5.", "id": "fc08"}, {"front": "Expansive pyramid (Stage 2 shape)", "back": "Wide at the base, narrow at the top — a true triangle. Reflects very high TFR and high birth rates characteristic of Stage 2. More than 50% of the population may be under age 15. Example: Niger, with a TFR of approximately 7. The wide base indicates a rapidly growing young population, while slim old-age cohorts reflect both historical high mortality and the fact that each new cohort is larger than the previous one.", "id": "fc09"}, {"front": "Stationary pyramid (Stage 4 shape)", "back": "Roughly equal-width bars through most age cohorts, with slight narrowing at the very top as mortality thins older cohorts. Consistent with low and stable fertility near replacement level. Example: the United States, where the baby-boom bulge (born 1946–1964) appears as a widening in the 55–75 age range in the 2020s.", "id": "fc10"}, {"front": "Constrictive pyramid (Stage 5 shape)", "back": "Narrow at the base and widening through the middle and upper age brackets — an inverted triangle. Reflects decades of below-replacement fertility. Example: Japan, with a TFR of approximately 1.2. Each new birth cohort is smaller than the previous one, creating a top-heavy structure that puts enormous pressure on pension and healthcare systems.", "id": "fc11"}, {"front": "Dependency Ratio", "back": "The ratio of economically dependent people (under 15 + over 64) to the working-age population (15–64), multiplied by 100. A high dependency ratio strains productive capacity. Youth dependency (Stage 2) can yield a future 'demographic dividend' if those children are educated; elderly dependency (Stages 4–5) creates more immediate fiscal pressure because retirees draw on pensions and healthcare.", "id": "fc12"}, {"front": "Case Study — Japan: Stage-5 Aging", "back": "Japan is the world's clearest Stage-5 laboratory. With a TFR of ~1.2 — far below the 2.1 replacement threshold — Japan's population peaked at ~128 million in 2009 and has been declining since. By 2040, 35% of the population is projected to be over 65. Japan's worker-to-retiree ratio fell from ~9:1 in 1970 to below 2:1 in the 2020s. Public debt exceeds 250% of GDP partly due to rising social-security and healthcare costs.", "id": "fc13"}, {"front": "Epidemiological Transition Model (ETM)", "back": "Proposed by Abdel Omran (1971). As countries develop, leading causes of death shift from infectious and parasitic diseases (Stage 1–2) toward chronic, degenerative diseases — cardiovascular disease, cancer, diabetes (Stages 4–5). Three phases: Age of Pestilence and Famine (life expectancy 20–40), Age of Receding Pandemics (50–60), Age of Degenerative and Human-Made Diseases (70+). Complements rather than replaces the DTM.", "id": "fc14"}, {"front": "How does the ETM complement the DTM?", "back": "The DTM describes the quantities of births and deaths; the ETM describes the causes of those deaths. Together they explain both the pace of demographic change (DTM) and the underlying health transitions driving it (ETM). The ETM also shows the transition is not irreversible — emerging infectious diseases like HIV/AIDS and COVID-19 demonstrate that Stage-2 gains can be set back.", "id": "fc15"}, {"front": "Natural increase rate", "back": "The rate of population growth from births minus deaths, expressed per 1,000 population per year (CBR − CDR). It does not include migration. A positive natural increase rate means the population is growing from births and deaths alone; in Stage 5 it becomes negative, meaning deaths outnumber births. Natural increase is the central variable tracking progress through DTM stages.", "id": "fc16"}, {"front": "Total Fertility Rate (TFR)", "back": "The average number of children a woman would have over her lifetime given current age-specific fertility rates. Replacement-level TFR is approximately 2.1 in high-income countries (slightly above 2.0 to account for childhood mortality and sex ratio). A TFR above 2.1 means the population is growing from births alone; below 2.1 means eventual decline without immigration.", "id": "fc17"}, {"front": "Why did death rates fall before birth rates in the demographic transition?", "back": "Death rates declined first because technological changes — sanitation, clean water, vaccination, antibiotics — reduced mortality relatively quickly and required no change in cultural attitudes or behavior. Birth rates lagged because they were embedded in deep cultural, economic, and religious norms (the value of large families in a high-mortality world) that change slowly across generations, especially before urbanization reduces the economic value of children.", "id": "fc18"}, {"front": "Demographic dividend", "back": "The economic growth potential that arises when a country's working-age population is larger than its dependent population (children + elderly). Occurs in the transition from Stage 2 to Stage 3–4, as falling fertility reduces the youth-dependency ratio before elderly dependency rises. Countries that educate and employ this bulge of working-age adults can achieve rapid economic growth — as East Asian nations did in the late twentieth century.", "id": "fc19"}, {"front": "Synthesis: How do population pyramid shapes connect to geographic regions and policy implications?", "back": "Stage-2 expansive pyramids concentrate in sub-Saharan Africa and parts of South Asia — high youth dependency but potential future demographic dividend. Stage-5 constrictive pyramids cluster in East Asia and Europe — pension solvency crises, healthcare demand surges, and immigration pressure to fill labor gaps. A pyramid encodes a country's recent demographic history and projects its economic and policy future; it is a spatial argument compressed into a bar chart.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
