<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

            </div>
        </div>

    <script>
    var CARDS = [{"front": "First Agricultural Revolution (Neolithic Revolution)", "back": "The transition, beginning around 10,000–8,000 BCE, by which human communities shifted from foraging to deliberate cultivation of plants and herding of animals. It produced at least six independent hearths, generated agricultural surplus, enabled sedentary settlement, and set in motion urbanization, labor specialization, and social stratification.", "id": "fc01"}, {"front": "Agricultural hearth", "back": "A geographic region in which the domestication of plants or animals arose independently, without diffusing from another center. The six independently documented hearths are: the Fertile Crescent, the Yangtze and Yellow River valleys (East Asia), Mesoamerica, the Andes, sub-Saharan Africa, and New Guinea. Evidence comes from archaeobotany, zooarchaeology, and population genomics.", "id": "fc02"}, {"front": "Fertile Crescent hearth", "back": "A crescent-shaped arc from the Levant through Syria, Iraq, and southeastern Turkey where wheat and barley were cultivated by ~9,500 BCE and sheep, goats, cattle, and pigs were domesticated by ~7,000 BCE. Its Mediterranean climate — winter rains, summer droughts — produced annual grasses with storable seeds, making it uniquely suited to early agriculture.", "id": "fc03"}, {"front": "Mesoamerican hearth and the three-sisters complex", "back": "Central Mexico through northern Central America, where maize (derived from teosinte by ~7,000–6,500 BCE), common beans, squash, chili peppers, and turkeys were domesticated. The three-sisters intercropping system — corn stalk supports beans, beans fix nitrogen, squash retains moisture — was ecologically efficient enough to support dense urban populations from Teotihuacan to the Maya lowlands.", "id": "fc04"}, {"front": "Andean hearth", "back": "The Andean highlands and coastal lowlands of South America, where potatoes, quinoa, peppers, and cotton were cultivated by ~8,000–5,000 BCE at altitudes above 3,000 m. Llamas and alpacas — the only large domesticated pack animals native to the Americas — were also herded here. Andean potatoes later became a demographic cornerstone of European peasant diets via the Columbian Exchange.", "id": "fc05"}, {"front": "Domestication (definition)", "back": "The process by which human communities, over generations of deliberate selection, alter the genetic characteristics of a plant or animal to make it more useful. Domesticated crops typically have larger seeds, reduced seed dispersal, reduced dormancy, and sometimes altered photoperiodism. Domesticated animals typically show reduced flight response, smaller body size, and altered reproductive timing.", "id": "fc06"}, {"front": "Carl Sauer and the seedbed hypothesis", "back": "American geographer (1889–1975) at UC Berkeley who argued in 'Agricultural Origins and Dispersals' (1952) that domestication most likely occurred in zones of ecological diversity and material security — wooded, hilly terrain at the margins of river valleys — not in ecologically stressed environments. He rejected Childe's stress-driven hypothesis and was an early critic of industrial monoculture.", "id": "fc07"}, {"front": "Agricultural surplus", "back": "Crop production in excess of the immediate subsistence needs of the producing community. Surplus enables: feeding of non-farming specialists (artisans, soldiers, administrators); construction of monumental architecture; long-distance trade; accumulation of private or institutional wealth; and ultimately the emergence of urban settlements and state-level political organization. Surplus is the material foundation of social inequality.", "id": "fc08"}, {"front": "Why early farmers were often less healthy than foragers", "back": "Skeletal evidence shows early farmers typically had shorter statures, higher anemia rates, more dental cavities (from starchy grain diets), and more infectious disease than hunter-gatherer contemporaries. Dense settlement near waste and domesticated animals facilitated zoonotic diseases (smallpox, measles, influenza). Jared Diamond called agriculture 'the worst mistake in the history of the human race' based on this evidence — yet it prevailed because it produced surplus.", "id": "fc09"}, {"front": "Second Agricultural Revolution", "back": "A cluster of innovations concentrated in Britain (~1750–1850) that permanently transformed agriculture: the Norfolk four-field crop rotation (eliminating fallow), improved moldboard plow, Jethro Tull's seed drill (~1701), and Cyrus McCormick's mechanical reaper (1834). Combined with the enclosure movement, it released rural labor for industrial factories and catalyzed rapid urbanization.", "id": "fc10"}, {"front": "Norfolk four-field rotation", "back": "A British crop rotation system — wheat, turnips, barley, clover — that eliminated the need for a fallow year. Nitrogen-fixing clover and deep-rooted turnips (winter fodder) restored soil fertility, increasing cultivable acreage per farm by roughly 25–30% per year. Perfected by Viscount Charles Townshend (1674–1738) and central to the Second Agricultural Revolution.", "id": "fc11"}, {"front": "Enclosure Movement", "back": "The process, primarily in 18th–19th century Britain, by which common lands were legally enclosed as private property through Parliamentary acts. Enclosures increased agricultural productivity via consolidated farming while dispossessing hundreds of thousands of rural laborers of subsistence rights, accelerating rural-to-urban migration and supplying cheap factory labor. Between 1750 and 1850, Britain's urban population grew from ~20% to more than 50%.", "id": "fc12"}, {"front": "Green Revolution", "back": "A scientifically orchestrated transformation of global agriculture from the 1940s through the 1970s, centered on high-yield varieties (HYVs) of wheat and rice, synthetic nitrogen fertilizer (Haber-Bosch process), and expanded irrigation. It dramatically reduced famine mortality in Asia and Latin America but produced ecological costs — aquifer depletion, biodiversity loss, pesticide contamination — and unequally distributed benefits favoring wealthier farmers.", "id": "fc13"}, {"front": "Norman Borlaug (1914–2009)", "back": "American agronomist who developed high-yield, disease-resistant, semi-dwarf wheat varieties in Mexico under the Rockefeller Foundation's Mexican Agricultural Program (later CIMMYT). His varieties were introduced to India and Pakistan in 1965, helping those countries achieve wheat self-sufficiency within a decade. Awarded the Nobel Peace Prize in 1970 — the only agronomist to receive it. He estimated the Green Revolution saved one billion lives.", "id": "fc14"}, {"front": "High-Yield Variety (HYV)", "back": "A crop cultivar developed through selective breeding to produce substantially greater grain output per unit of land. The key design is short, stiff stems (resist lodging under heavy nitrogen fertilization), broad upright leaves (maximize light capture), and early maturity (allow double- or triple-cropping). HYVs generally require synthetic fertilizer, pesticides, and controlled irrigation to realize their yield potential.", "id": "fc15"}, {"front": "IR8 — 'miracle rice'", "back": "A high-yield rice variety released in 1966 by the International Rice Research Institute (IRRI) in Los Baños, Philippines. Under optimal conditions (fertilization, irrigation, pest management), IR8 yielded up to five times more grain per hectare than traditional varieties. The Philippines achieved rice self-sufficiency within a decade; India's rice production tripled between 1970 and 2000.", "id": "fc16"}, {"front": "Ecological costs of the Green Revolution", "back": "The Green Revolution's intensive irrigation drew down aquifers (the Punjab aquifer depletes ~0.33 m/year); continuous monoculture of HYVs displaced thousands of traditional cultivars, reducing genetic diversity; heavy pesticide regimes contaminated groundwater and eliminated beneficial insects; nitrogen runoff created coastal dead zones. These are long-term, often irreversible costs that contrast with the revolution's short-term yield gains.", "id": "fc17"}, {"front": "Social equity critique of the Green Revolution", "back": "The Green Revolution's technology package — HYV seeds, synthetic fertilizers, irrigation, pesticides — required capital investment that favored larger, wealthier farmers. In India's Punjab, farmers who could afford the full package saw incomes triple; small and tenant farmers often saw relative or absolute impoverishment. Sociologist Vandana Shiva argued the revolution accelerated agrarian differentiation — widening the gap between commercially successful and subsistence farmers.", "id": "fc18"}, {"front": "Comparison: What linked the Second Agricultural Revolution and the Industrial Revolution?", "back": "They were causally intertwined, not merely contemporaneous. Agricultural mechanization reduced labor required per unit of food, releasing millions of workers from the land precisely when expanding factories needed them. The enclosure of the commons translated productivity gains into urban labor supply by eliminating the subsistence safety net that allowed the rural poor to survive outside the wage-labor system.", "id": "fc19"}, {"front": "Scale analysis: Evaluating the Green Revolution at three scales", "back": "Global scale: aggregate hunger fell dramatically between 1960 and 2000. Regional scale (India's Punjab, Mexico's Sonora): transformed agricultural landscapes and produced enormous wealth for some farmers. Local scale: deepened inequality within farming communities and degraded specific aquifers, soils, and ecosystems. A complete analysis requires all three dimensions and distinguishes aggregate caloric production from distribution.", "id": "fc20"}, {"front": "New Guinea hearth", "back": "Perhaps the most surprising agricultural hearth: the New Guinea highlands independently developed agriculture centered on taro, sugarcane, bananas, and yams, dated to at least 7,000 BCE based on drainage channels at Kuk Swamp. This complex diffused slowly through the island Pacific and into mainland Southeast Asia — demonstrating that domestication arose in remote, ecologically distinctive environments, not only in well-known river valleys.", "id": "fc21"}, {"front": "Sub-Saharan African hearth", "back": "At least one independent domestication zone, centered on the Chad basin or Ethiopian highlands, where drought-tolerant sorghum was domesticated by ~3,000 BCE. Yams and oil palm were domesticated in West African forest zones. Cattle appear to have been independently domesticated in sub-Saharan Africa, separate from the Fertile Crescent. African pastoralism — herding cattle, goats, and camels across seasonal ranges — remains economically central to the Sahel and East Africa today.", "id": "fc22"}, {"front": "Haber-Bosch process and the Green Revolution", "back": "An industrial chemical process in which atmospheric nitrogen is combined with hydrogen under high temperature and pressure to produce ammonia, which is the basis for synthetic nitrogen fertilizer. The Green Revolution depended on Haber-Bosch fertilizer to realize the yield potential of HYVs — semi-dwarf wheat and rice varieties convert heavy nitrogen fertilization directly into grain rather than stem.", "id": "fc23"}, {"front": "Synthesis: How did each Agricultural Revolution transform the relationship between people and land?", "back": "First Revolution: converted mobile foragers into sedentary farmers; surplus enabled cities and states; increased disease burden but supported population density orders of magnitude higher than foraging. Second Revolution: mechanization released most of the population from farming; fueled industrial urbanization; concentrated land in fewer hands. Green Revolution: multiplied yields on existing farmland; averted famine at the cost of ecological debt and unequal distribution — each revolution solving one set of problems while creating new ones.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
