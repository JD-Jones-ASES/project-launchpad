<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Human Geography &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 2, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Push and Pull Factors", "back": "Push factors are conditions at the place of origin that motivate out-migration: poverty, unemployment, conflict, political persecution, environmental hazard, or lack of opportunity. Pull factors are conditions at the destination that attract in-migration: higher wages, political freedom, family networks, better schools, or environmental amenities. Both operate simultaneously; a person rarely migrates without some combination of dissatisfaction with the origin and perceived opportunity at the destination.", "id": "fc01"}, {"front": "Four categories of push and pull factors", "back": "Economic: wage differentials are the most powerful force in international labor migration (e.g., $2/day in rural Guatemala vs. $12/hour in California). Political: persecution, civil war, authoritarian governance generate forced migration. Social: chain migration — early migrants establish networks that lower cost and risk for later migrants from the same community. Environmental: rising sea levels, desertification, and intensifying storms accelerate environmentally driven migration; World Bank projects 216 million internal climate migrants by 2050.", "id": "fc02"}, {"front": "Chain migration", "back": "The process by which early migrants establish social networks (housing, employment information, cultural familiarity) that lower the cost and risk for subsequent migrants from the same community. Once a community establishes itself at a destination, those networks become a powerful pull factor. Chain migration explains the clustering of ethnic communities in particular cities and neighborhoods worldwide.", "id": "fc03"}, {"front": "Intervening obstacles", "back": "Barriers between origin and destination that raise the cost or risk of migration and may prevent it entirely. Physical: oceans, mountain ranges, deserts. Political: border controls, visa requirements, immigration quotas. Economic: cost of transit. Cultural: language barriers and xenophobia at the destination. Intervening obstacles explain why migration flows cluster by corridor rather than diffusing uniformly across all possible destinations.", "id": "fc04"}, {"front": "Stouffer's intervening opportunities", "back": "Samuel Stouffer's 1940 theory that migrants do not simply move toward the most attractive distant destination — they stop at the nearest place that offers an equivalent opportunity. This explains step-migration (regional city → national capital → international destination) and why internal migration often precedes international migration in a migrant's trajectory. It refines the distance-decay principle by making opportunity structure, not just distance, the key variable.", "id": "fc05"}, {"front": "Voluntary vs. forced migration", "back": "Voluntary migration: individuals freely choose to relocate, typically to improve economic, social, or environmental conditions. Forced migration: individuals are compelled to move by violence, persecution, natural disaster, or legal coercion, with no realistic safe alternative. The distinction matters because forced migrants have different legal protections and logistical needs. In practice, the boundary is blurry — extreme poverty in a conflict-affected region can make 'choosing' to stay a life-threatening non-option.", "id": "fc06"}, {"front": "International vs. internal migration", "back": "International migration crosses a national border; internal migration occurs within a country's borders. Most migration is internal. China's movement of ~250–300 million rural workers to cities since the 1980s is entirely internal and is one of the largest human population movements in history. Globally, there are roughly 3.5 times as many internal migrants as international migrants.", "id": "fc07"}, {"front": "Refugee", "back": "A person outside their country of nationality who cannot return because of a well-founded fear of persecution on grounds of race, religion, nationality, political opinion, or membership in a particular social group. Legal definition established by the 1951 Refugee Convention, which also established the principle of non-refoulement: no country may return a refugee to a territory where they face persecution.", "id": "fc08"}, {"front": "Internally Displaced Person (IDP)", "back": "Someone forced from their home by conflict or disaster who remains within their own country's borders. IDPs are not covered by the 1951 Refugee Convention because they have not crossed an international border; they depend on their own government for protection — which is often the party responsible for their displacement. Colombia and Syria have two of the world's largest IDP populations.", "id": "fc09"}, {"front": "Stateless person", "back": "Someone recognized by no country as a national under its laws. The Rohingya people of Myanmar are the world's largest stateless group, denied citizenship despite having lived in Myanmar for generations. Statelessness exposes people to acute vulnerability because nationality is the basis of nearly all legal protections under international law.", "id": "fc10"}, {"front": "Ernst Georg Ravenstein and the Laws of Migration (1885)", "back": "A German-British cartographer who analyzed the 1871 and 1881 British censuses to derive seven empirical 'laws' describing where and why people move. Derived from mid-Victorian Britain; derived from the empirical rather than theoretical tradition (Census data → spatial regularities). His laws have proven remarkably durable: distance-decay, step-migration, and the economic motive have been confirmed across different countries and time periods.", "id": "fc11"}, {"front": "Ravenstein's Laws of Migration (7 laws)", "back": "1) Most migrants travel short distances (distance decay). 2) Migration proceeds in steps (rural → market town → regional city → national capital). 3) Longer-distance migrants gravitate to large urban centers. 4) Every migration stream generates a counterstream. 5) Women dominate short-distance migration; men dominate long-distance migration (now changed: women are ~48% of international migrants). 6) Migration volume increases with transport/communication development. 7) The primary motive for migration is economic.", "id": "fc12"}, {"front": "Distance decay in migration", "back": "The principle that the volume of migration decreases with increasing distance from the origin. Most moves are to adjacent or nearby places. Ravenstein's first law: most migrants travel short distances. Distance decay is weakened (but not eliminated) in the modern era by cheap air travel and communication technology — still holds strongly for internal migration but less so for international flows.", "id": "fc13"}, {"front": "Step-migration", "back": "The pattern in which migrants move in stages through an urban hierarchy rather than jumping directly from origin to final destination: rural village → nearby market town → regional city → national capital → potentially international destination. Consistent with both Ravenstein's Law 1 (short-distance primacy at each step) and Law 2 (migration proceeds in stages). Also consistent with Stouffer's intervening opportunities theory.", "id": "fc14"}, {"front": "Zelinsky Migration Transition Model (1971)", "back": "Wilbur Zelinsky's model linking migration types to DTM stages. As countries progress through the DTM, dominant migration types change: Stage 1 — limited mobility. Stage 2 — massive rural-to-urban + emigration to 'new lands.' Stage 3 — rural-to-urban moderates; international migration replaces internal as dominant flow. Stage 4 — rural-to-urban complete; inter-city/suburban migration dominates; return/amenity migration. Stage 5 (speculative) — physical movement may decline as telecommunications reduce need for face-to-face interaction.", "id": "fc15"}, {"front": "Case Study — Internal Displacement: Colombia and Syria", "back": "Colombia: 60+ years of civil conflict (government, FARC, ELN, paramilitaries, narcotraffickers) produced ~7–8 million IDPs at peak — the world's largest IDP population for much of the 2000s–2010s. Syria: Civil war from 2011 left ~6 million internally displaced within Syria and ~6 million who crossed borders as refugees, making Syria the world's largest refugee source. Both illustrate that the same conflict produces both IDPs (those unable to cross a border) and refugees (those who can), depending on proximity and circumstance.", "id": "fc16"}, {"front": "Case Study — Philippines remittances and brain waste", "back": "~10 million overseas Filipino workers (OFWs) are employed in 160+ countries. Remittances constitute ~9–10% of Philippine GDP — one of the world's highest remittance-to-GDP ratios. 'Brain waste' (deskilling): many OFWs are highly educated nurses, engineers, or teachers who take lower-skilled domestic-worker positions abroad because the wage gap is so large that deskilled foreign work outpays professional work at home. This encodes structural dependency — remittances benefit households while the public health and education systems lose workers trained at public expense.", "id": "fc17"}, {"front": "Non-refoulement", "back": "The core principle of the 1951 Refugee Convention: no country may return a refugee to a territory where they face persecution. It is the cornerstone of international refugee law and applies regardless of whether a formal refugee determination has been made. Non-refoulement creates a legal obligation for host states that is distinct from (and more absolute than) general immigration law.", "id": "fc18"}, {"front": "Remittances", "back": "Money sent by migrants back to their home country. One of the largest international financial flows globally — in many developing countries, remittance inflows exceed foreign direct investment and foreign aid combined. Example: Philippine OFW remittances (~9–10% of GDP) fund household consumption, education, and small-business investment. Remittances create economic ties between sending and receiving countries and are a key mechanism by which migration reshapes geography at the global scale.", "id": "fc19"}, {"front": "Synthesis: How do Ravenstein's Laws, the push/pull framework, and Zelinsky's model work together?", "back": "Ravenstein's Laws describe spatial regularities of migration (distance decay, step-migration, economic motive). The push/pull framework explains the motivational logic behind individual decisions. Zelinsky's model links both to stages of national development — at Stage 2 the dominant flow is massive rural-to-urban and emigration to new lands; at Stage 4 it diversifies into inter-city and return migration. Migration is a geographic process that reshapes spatial distribution of people, labor, capital, and culture at every scale from the neighborhood to the globe.", "id": "fc20"}, {"front": "Environmental migration and climate change", "back": "Climate change is accelerating environmentally driven migration. Rising sea levels threaten low-lying Pacific Islands and coastal deltas (Bangladesh, Vietnam's Mekong Delta). Desertification is pushing populations in the Sahel southward. Intensifying hurricane frequency is driving Caribbean migration. The World Bank projects that by 2050 climate change could generate 216 million internal climate migrants in six world regions if warming is not reduced — making environmental push factors a growing share of global migration flows.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
