<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Human Geography &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "State (political geography)", "back": "A self-governing political entity occupying a defined territory and recognized by other states as legitimate. The Montevideo Convention (1933) lists four criteria: permanent population, defined territory, effective government, and capacity to enter relations with other states. Distinct from the American usage of 'state' as a sub-national unit.", "id": "fc01"}, {"front": "Sovereignty", "back": "The principle that a state has supreme authority within its own territory, free from external interference. Has two faces: internal sovereignty (the government's monopoly on legitimate force within its territory, per Max Weber) and external sovereignty (recognition by other states of the government's exclusive right to manage its own affairs).", "id": "fc02"}, {"front": "Montevideo Convention criteria (1933)", "back": "The classic checklist for statehood: (1) a permanent population, (2) a defined territory, (3) an effective government, and (4) the capacity to enter into relations with other states. Used by political geographers to assess whether a political entity qualifies as a fully recognized state.", "id": "fc03"}, {"front": "Nation", "back": "A cultural community — a group of people who share a perceived common identity rooted in language, religion, history, ethnicity, or some combination — and who often aspire to political self-determination. Nations are cultural entities; they are not the same as states. Example: the Kurdish nation exists without a state.", "id": "fc04"}, {"front": "Nation-state", "back": "The idealized political form in which cultural and political boundaries coincide: one nation, one state. Japan and Iceland are frequently cited examples — relatively homogeneous cultural communities occupying discrete territories with single national governments. In practice, most states fall short of this ideal.", "id": "fc05"}, {"front": "Stateless nation", "back": "A cultural or ethnic group that identifies as a distinct nation but lacks its own sovereign state. Canonical examples: the Kurds (25–35 million dispersed across Turkey, Syria, Iraq, and Iran), the Palestinians, and the Tibetans.", "id": "fc06"}, {"front": "Multinational state", "back": "A single state that contains two or more nations within its borders. Examples: Russia (100+ recognized ethnic groups) and Belgium (Dutch-speaking Flemish, French-speaking Walloons, German-speaking community). Belgium went 589 days without a functioning federal government in 2010–2011 due to linguistic-bloc conflict.", "id": "fc07"}, {"front": "Multi-state nation", "back": "A cultural group whose members are divided between two or more states. Examples: Koreans divided between the ROK and DPRK along the 38th parallel since 1953, and Germans divided between the FRG and GDR from 1949 to 1990. Members share common language, history, and cultural traditions despite living under separate governments.", "id": "fc08"}, {"front": "Westphalian system", "back": "The global order of sovereign states traced to the Peace of Westphalia (1648), which ended the Thirty Years' War. Established two principles: rulers determine the religion of their territory without outside interference (cuius regio, eius religio), and signatory states recognize each other's sovereignty as legally equal. Sovereign states are the primary actors in international relations.", "id": "fc09"}, {"front": "Peace of Westphalia (1648)", "back": "Treaties signed at Osnabrück and Münster that ended the Thirty Years' War and established the modern system of sovereign states. They enshrined territorial sovereignty and the principle of non-interference in other states' internal affairs. The system was originally European but was exported globally through imperialism.", "id": "fc10"}, {"front": "Case study: Rohingya statelessness", "back": "The Rohingya, a predominantly Muslim ethnic group indigenous to Myanmar's Rakhine region, were stripped of citizenship by Myanmar's 1982 Citizenship Law (which recognized 135 'national races' but excluded them). In August 2017, military operations drove approximately 700,000 Rohingya into Bangladesh. As of 2024, nearly one million remain stateless at Cox's Bazar — the world's largest refugee settlement.", "id": "fc11"}, {"front": "Case study: Kurdish statelessness", "back": "The 1920 Treaty of Sèvres promised a potential Kurdish homeland; the 1923 Treaty of Lausanne instead partitioned Kurdish-majority territory among Turkey, Syria, Iraq, and Iran — the 'Sykes-Picot betrayal.' Iraq's Kurdish Regional Government (KRG) exercises substantial autonomy and controls the Peshmerga military, but full sovereign statehood remains impossible as long as four neighboring states oppose it.", "id": "fc12"}, {"front": "Supranational organizations and sovereignty", "back": "Bodies to which states voluntarily cede some authority, placing binding obligations on member states and thereby eroding absolute sovereignty. Examples: the EU (requires supremacy of EU law), WTO (compels trade dispute resolution through its mechanism), and the International Criminal Court (holds states accountable for treatment of their own citizens).", "id": "fc13"}, {"front": "How do multinational corporations (MNCs) erode state sovereignty?", "back": "MNCs like Apple or ExxonMobil exercise economic power that often exceeds the GDP of small or medium-sized states. They can shift supply chains, employment, and taxable revenue across jurisdictions faster than any government can respond through legislation, effectively constraining the economic sovereignty of host states.", "id": "fc14"}, {"front": "Climate displacement and the territorial state", "back": "Rising sea levels threaten the physical existence of low-lying island nations like Kiribati and Tuvalu, whose governments have already begun negotiating land purchases in other countries for population relocation. This raises genuine legal questions: does sovereignty persist when territory disappears? Can a population be a nation without land?", "id": "fc15"}, {"front": "Berlin Conference (1884–85) and sovereignty", "back": "European powers divided Africa among themselves at the Berlin Conference according to their own strategic and economic interests, producing straight lines and geometric arcs that cut through indigenous nations and ethnic homelands. The same Westphalian system that guaranteed sovereign equality to European monarchs was used to impose superimposed colonial borders on Africa.", "id": "fc16"}, {"front": "Internal vs. external sovereignty — a key distinction", "back": "Internal sovereignty is a government's monopoly on the legitimate use of force within its territory (Weber's definition). External sovereignty is recognition by other states of the government's exclusive authority. Both must be present for sovereignty to be fully meaningful. States like Taiwan or Kosovo may meet internal criteria but struggle with external recognition.", "id": "fc17"}, {"front": "Nation-state mismatch", "back": "The global political map gives the appearance of a world divided into sovereign nation-states, but most states are multinational and many nations are stateless. The mismatch between cultural boundaries and political boundaries is the central analytical problem of Unit 4 — producing conflict, refugee flows, devolution, and secessionist movements.", "id": "fc18"}, {"front": "Synthesis: Why is statelessness a political rather than a natural condition?", "back": "Both the Rohingya and Kurdish cases demonstrate that statelessness is produced by deliberate state decisions, imperial line-drawing, and international indifference — not by geography or culture alone. The Rohingya were stripped of citizenship by law in 1982; the Kurds were denied a homeland by great-power treaty revision in 1923. Statelessness is an outcome of the political system, not its precondition.", "id": "fc19"}, {"front": "How do NGOs challenge the Westphalian principle of non-interference?", "back": "Transnational advocacy networks such as Amnesty International and Médecins Sans Frontières operate across borders, publicize human rights abuses, and provide services in conflict zones — sometimes substituting for or competing with state functions. Their activism has shaped international norms on land mines, climate agreements, and humanitarian intervention, directly contesting the idea of absolute internal sovereignty.", "id": "fc20"}, {"front": "Synthesis: State vs. nation — why the distinction matters for AP HuGe", "back": "Confusing 'state' (political) with 'nation' (cultural) leads to misreading political conflicts. Secessionist movements, devolution demands, refugee crises, and ethnic conflicts are all rooted in the tension between these two concepts. The AP exam routinely presents scenarios and asks students to classify the political-cultural relationship using precise vocabulary: stateless nation, multinational state, multi-state nation.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
