<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Human Geography &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Cultural landscape (Sauer's definition)", "back": "The visible imprint of human culture on the physical environment — all modifications a culture group has made through buildings, roads, field patterns, place names, irrigation works, and monuments. Sauer (1925): \"The cultural landscape is fashioned from a natural landscape by a culture group. Culture is the agent, the natural area the medium, the cultural landscape the result.\"", "id": "fc01"}, {"front": "Carl Sauer (1889–1975)", "back": "Berkeley geographer whose 1925 essay \"The Morphology of Landscape\" established the cultural landscape as geography's central concept. Founder of the Berkeley School of cultural geography. Argued that culture operates on the natural environment as an independent force — rejecting environmental determinism. Also pioneered study of agricultural origins, proposing Southeast Asia as the earliest hearth of plant domestication.", "id": "fc02"}, {"front": "Palimpsest (cultural landscape)", "back": "A landscape in which successive periods of human occupation have inscribed their marks, each overwriting but never entirely erasing what came before. Most real landscapes are palimpsests because cultures succeed one another over time, leaving layered traces. Example: the American South, where antebellum plantation houses, sharecropper cabins, railroad towns, and highway interchanges all coexist in one landscape.", "id": "fc03"}, {"front": "Environmental determinism", "back": "The view that the physical environment — especially climate — shapes or determines human behavior, social organization, and economic achievement. Associated with Ellsworth Huntington (Civilization and Climate, 1915), who claimed temperate climates produced superior civilizations. Today thoroughly discredited: it cannot explain why the same climate zone produced different outcomes in different eras, and it served as a pseudoscientific rationale for colonial racial hierarchies.", "id": "fc04"}, {"front": "Vidal de la Blache (1845–1918)", "back": "French geographer who developed possibilism — the view that the physical environment sets limits and offers possibilities, but human cultures choose among those possibilities according to their own values, technologies, and social organization. Studied French regional genres de vie (ways of life), showing communities creatively adapting to local environments. Theoretical foundation of the possibilist alternative to environmental determinism.", "id": "fc05"}, {"front": "Possibilism", "back": "The geographic framework, associated with Vidal de la Blache, holding that the physical environment sets a range of possibilities but does not determine outcomes. Desert environments constrain agriculture to irrigated valleys but do not determine whether those valleys produce empires, nomadic confederations, or modern petroleum states — human agency, technology, history, and culture determine which possibilities are realized.", "id": "fc06"}, {"front": "Folk culture", "back": "The customs, practices, and material traditions of a small, relatively homogeneous, usually rural group maintained over generations with limited outside contact. Folk cultures are place-specific: folk foods, building styles, music, and festivals evolved in relative isolation in response to local ecology and history. Change slowly and resist homogenization. Examples: Amish farming communities, Swiss Alpine vernacular architecture, Ifugao rice-cultivation practices.", "id": "fc07"}, {"front": "Popular culture", "back": "Practices, tastes, and material products that spread rapidly across large, often global populations — primarily through mass media, commercial distribution, and digital networks. Associated with urban, industrialized, interconnected societies. Landscapes tend toward uniformity: the same franchise restaurants, chain retail stores, and entertainment formats appear across thousands of miles. Changes quickly, driven by market forces and media cycles.", "id": "fc08"}, {"front": "Placelessness (Edward Relph)", "back": "The erosion of geographic distinctiveness produced by popular culture, described by geographer Edward Relph in Place and Placelessness (1976). When a highway corridor in Ohio looks nearly identical to one in Texas — same gas stations, fast-food outlets, and big-box retail — the \"place\" has been drained of its particularity. Placelessness reflects the displacement of locally specific cultural landscapes by globally standardized ones.", "id": "fc09"}, {"front": "Cultural diffusion", "back": "The spread of cultural elements — ideas, practices, artifacts, languages, religions, technologies — from a hearth of origin to new areas through human movement and communication. Two major pathways: relocation diffusion (the trait moves with migrating people) and expansion diffusion (the trait spreads outward from the source without migrating the source population).", "id": "fc10"}, {"front": "Relocation diffusion", "back": "A type of cultural diffusion in which people migrate and carry their culture with them to new locations. Tends to produce faithful transplants: the migrating carrier reproduces what they knew at home. Example: Italian immigrants brought pizza from Naples to U.S. cities in the late 19th–early 20th centuries; Catholic church architecture of Mexican-heritage San Antonio reflects relocation of a cultural-religious tradition.", "id": "fc11"}, {"front": "Hierarchical diffusion", "back": "A subtype of expansion diffusion that moves through a network of ranked places or people — from elites downward, or from large cities outward to smaller ones. High fashion originates in Paris, Milan, London, and New York, then filters to secondary cities and eventually to mass-market retailers. Tends to produce top-down imposition of elite cultural standards.", "id": "fc12"}, {"front": "Contagious diffusion", "back": "A subtype of expansion diffusion that spreads outward in all directions from the hearth through direct contact, like a disease spreading through a population. The rapid worldwide spread of a viral internet meme illustrates contagious diffusion facilitated by digital networks. Earlier examples: spread of Christianity through the Roman Empire along trade routes; westward spread of wheat cultivation from the Fertile Crescent.", "id": "fc13"}, {"front": "Stimulus diffusion", "back": "A subtype of expansion diffusion in which an underlying idea spreads but takes a distinctly new form adapted to local conditions or values in the receiving culture. Produces creative hybrids rather than faithful copies. Classic example: Buddhism spread from India to China, where it was transformed — incorporating ancestor-veneration, adapting iconography to Chinese aesthetics, and developing the bodhisattva concept in ways resonating with Confucian social ethics.", "id": "fc14"}, {"front": "How does diffusion mechanism shape landscape outcome?", "back": "The mechanism of diffusion determines what a cultural feature looks like at its destination. Relocation diffusion → faithful transplants (migrants reproduce what they knew). Stimulus diffusion → creative hybrids (hearth trait adapted, not copied). Hierarchical diffusion → top-down imposition of elite standards. This explains both similarities and differences between a feature in its hearth and a distant location.", "id": "fc15"}, {"front": "Culture hearth", "back": "The place of origin from which a cultural trait — religion, language, agricultural practice, technology — diffuses outward. Identifying a hearth is the starting point for tracing diffusion pathways. Example: the Fertile Crescent as a hearth for wheat cultivation, which then spread contagiously across Eurasia; the Arabian Peninsula as the hearth for Islam.", "id": "fc16"}, {"front": "Neo-determinism (Jared Diamond)", "back": "The framework in Guns, Germs, and Steel (1997) arguing that Eurasia's biogeographic advantages — a rich array of domesticable plants and animals along an east-west axis — gave its peoples a compounding head start. Avoids Huntington's racial essentialism but still grounds human historical outcomes primarily in physical-geographic variables. Critics argue it underestimates cultural innovation, political decision-making, and historical contingency, and may naturalize global inequality.", "id": "fc17"}, {"front": "Angkor Wat as cultural landscape example", "back": "The 12th-century Khmer temple complex in Cambodia is a defining example of the cultural landscape in Sauer's sense: the Khmer Empire mobilized tens of thousands of workers to transform a flat alluvial plain into a geometric sacred space, with moats, causeways, and five towers arranged to mirror the Hindu cosmological image of Mount Meru. Its survival and continued religious use illustrate how cultural landscapes outlast the political orders that created them.", "id": "fc18"}, {"front": "Synthesis: How does Sauer's framework challenge environmental determinism?", "back": "Sauer's cultural landscape concept directly refutes environmental determinism by making culture — not climate or terrain — the active agent. The same natural landscape yields different cultural landscapes when occupied by different culture groups with different tools, values, and economic systems. This means geographic outcomes are explained by human agency and historical process, not by physical environment acting on passive human subjects.", "id": "fc19"}, {"front": "Synthesis: Folk vs. popular culture — landscape implications", "back": "Folk cultures produce diverse, place-specific landscapes because they evolved in relative isolation responding to local ecology and history. Popular culture produces uniform, placeless landscapes because it spreads globally through mass media and commercial distribution. The global expansion of popular culture therefore both homogenizes the built environment and erases the geographic distinctiveness that folk cultures had created over generations.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
