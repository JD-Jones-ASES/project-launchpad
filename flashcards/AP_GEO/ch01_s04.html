    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

    <script>
    var CARDS = [{"front": "Scale of Analysis", "back": "The spatial extent at which a geographic phenomenon is examined or at which a geographic process operates. Geographers conventionally recognize four nested scales: local (neighborhood or farm), regional (metropolitan area or river basin), national (sovereign state's territory), and global (the entire planet and its interconnections). The choice of scale is not merely methodological convenience—it determines which patterns are visible and which causal mechanisms can be identified. The same phenomenon produces different geographic narratives at different scales.", "id": "fc01"}, {"front": "Local Scale", "back": "The most intimate geographic scale, encompassing the immediate environment of a specific site: a neighborhood, farm, factory floor, city block, or single river reach. Analysis at the local scale prioritizes the particularities of place—specific land uses, the social composition of a community, the drainage characteristics of a particular watershed. Local-scale analysis is often qualitative and ethnographic; it is also where policy is ultimately implemented and where abstract forces become concrete human experiences.", "id": "fc02"}, {"front": "Regional Scale", "back": "The geographic scale spanning multiple communities, counties, or natural drainage areas: a metropolitan area, river basin, agricultural zone, or culture hearth. The regional scale is where spatial patterns first become statistically reliable—where urban-suburban-rural gradients can be mapped, diffusion paths traced, and regional economic specialization becomes visible. Much influential mid-twentieth-century geography operated at this level, including Hägerstrand's time-geography and Christaller's central place theory.", "id": "fc03"}, {"front": "National Scale", "back": "The geographic scale corresponding to the territory of a sovereign state. National-scale analysis is often driven by data availability—most statistical agencies collect and publish data at this level (GDP, life expectancy, total fertility rate). National-scale analysis can mask enormous internal variation: the national average income of a highly unequal country may describe the experience of very few of its actual citizens. But it also captures the uniform effects of national policy (immigration law, monetary policy, public health infrastructure) across an entire territory.", "id": "fc04"}, {"front": "Global Scale", "back": "The geographic scale encompassing the entire planet and the systems that connect its parts: international trade networks, long-range atmospheric circulation, pandemic diffusion along airline routes, and international flows of capital, technology, and cultural products. Global-scale analysis reveals patterns invisible at smaller scales—the systematic concentration of manufacturing in East and Southeast Asia, or the concentration of financial services in New York, London, Tokyo, and Singapore. It also operates on the longest time horizons: climate change and sea-level rise can only be understood at the planetary level.", "id": "fc05"}, {"front": "The Scalar Difference Principle", "back": "The geographic insight that the scale at which you observe a phenomenon changes what you see. A landscape appearing uniformly green from altitude reveals a patchwork of land uses at lower altitude and individual organisms at ground level. The same is true of human processes: economic inequality, disease diffusion, and political conflict all look different—and reveal different causal structures—depending on whether they are analyzed locally, regionally, nationally, or globally. This principle is foundational to the AP Human Geography curriculum's Scale Analysis skill.", "id": "fc06"}, {"front": "Outsourcing at the Global Scale", "back": "At the global scale, outsourcing appears as a rational spatial response to factor-cost differences: labor is cheaper in Vietnam than in the United States, so American apparel companies relocate manufacturing. The global map of manufacturing reveals a massive shift from the Global North to East and Southeast Asia between the 1980s and 2020s, driven by trade liberalization (GATT, WTO accession) and transportation cost reductions from containerization.", "id": "fc07"}, {"front": "Outsourcing at the National Scale (United States)", "back": "At the national scale, outsourcing appears primarily as a story of deindustrialization and job displacement. U.S. manufacturing employment fell from approximately 19 million in 1979 to approximately 13 million in 2022, with the steepest declines in textiles, apparel, electronics assembly, and steel. National-scale analysis reveals the geographic concentration of job loss in the Rust Belt and the Carolinas textile counties, and points to policy debates about trade policy and worker retraining.", "id": "fc08"}, {"front": "Outsourcing at the Regional and Local Scale", "back": "At the regional scale (e.g., the Piedmont of North and South Carolina), outsourcing registers as a simultaneous implosion of the textile economy (mills closing, mill towns depopulating) and an explosion of logistics infrastructure (Amazon fulfillment centers) employing the same communities at lower wages. At the local scale (e.g., Kannapolis, NC), it becomes the story of the Pillowtex Corporation's 2003 closure—the largest single-day layoff in North Carolina history—and subsequent community redevelopment as a biotech campus. The global scale explains why Pillowtex closed; the local scale reveals what that actually meant.", "id": "fc09"}, {"front": "COVID-19 at the Global Scale", "back": "At the global scale, COVID-19 diffused along the world's airline network with near-statistical precision: the first international cases appeared in Thailand, Japan, South Korea, and the United States—all destinations with direct or hub-connected flights from Wuhan. The global geography of the first wave was effectively a map of the global air transportation network. This scale of analysis revealed why early travel restrictions (imposed after substantial community transmission had already occurred) had limited effect.", "id": "fc10"}, {"front": "COVID-19 at the National Scale", "back": "At the national scale, the pandemic's severity reflected enormous variation in public health infrastructure, political trust, and government response capacity. New Zealand, South Korea, and Taiwan achieved early suppression through aggressive testing, contact tracing, and border management. Countries with universal health coverage generally achieved better vaccine distribution equity than those with fragmented, market-based systems. National-scale analysis shows how sovereign policy choices shaped aggregate outcomes.", "id": "fc11"}, {"front": "COVID-19 at the Regional Scale", "back": "At the regional scale, COVID-19 revealed sharp urban-rural divides that shifted over time. In the first wave (spring 2020), the pandemic was overwhelmingly urban—dense metropolitan areas with major international airports were seeded first and hardest. By the second and third waves (fall–winter 2020), the geographic center shifted to rural areas and the interior Sun Belt, reflecting urban first-wave immunity, indoor venue reopening, and lower rural hospital surge capacity.", "id": "fc12"}, {"front": "COVID-19 at the Local Scale", "back": "At the local scale, the pandemic produced radically different experiences even within a single metropolitan area. In Chicago, COVID-19 mortality in majority-Black and majority-Latino zip codes exceeded mortality in majority-white zip codes by a factor of two to three in the first months. This disparity reflected the spatial concentration of essential workers (who could not work from home), overcrowded housing, and limited access to primary care and testing—a geography mapping closely onto pre-existing patterns of racial residential segregation and economic inequality.", "id": "fc13"}, {"front": "The Spatial Perspective", "back": "The foundational lens through which human geographers see the world. It asks, first and most basically: where is this, and why there? It insists that location is not a backdrop or accident but a constitutive feature of social, economic, and political life. Students who internalize the spatial perspective automatically ask, for any phenomenon they encounter: Does location matter here? Does distance matter? Does scale change what I see? In geography, the answer to all three is almost always yes.", "id": "fc14"}, {"front": "Pillowtex Corporation (Kannapolis, NC)", "back": "A case study in local-scale outsourcing impact. Once the largest employer in Kannapolis, North Carolina, with over 4,500 workers, the Pillowtex Corporation shut its mill in 2003 in the largest single-day layoff in North Carolina history—a direct consequence of the global shift of textile manufacturing to lower-wage countries. The site was eventually redeveloped as a biotech research campus. The Pillowtex story illustrates how global-scale economic forces produce specific, concrete local-scale human consequences.", "id": "fc15"}, {"front": "Torsten Hägerstrand", "back": "A Swedish geographer whose time-geography, developed primarily at the regional scale, examined how individuals move through space and time and how constraints on movement shape social patterns. Hägerstrand's work was influential in establishing the regional scale as a productive level for geographic analysis in the mid-twentieth century.", "id": "fc16"}, {"front": "How does scale analysis differ from simply describing that something exists at multiple levels?", "back": "A complete scale-analysis response must explain how the same phenomenon operates through different causal mechanisms at different geographic scales—not just note that it exists at multiple scales. For COVID-19: the airline network explains global diffusion speed; public health infrastructure explains national case fatality rate differences; urban-rural density gradients explain the regional wave sequence; residential segregation and occupational structure explain local mortality disparities. Each scale reveals a causal story that the others cannot tell alone.", "id": "fc17"}, {"front": "Why does national-scale analysis of inequality mislead?", "back": "National-scale averages (national GDP, national average income, national case fatality rate) can mask enormous internal variation. The national average income of a highly unequal country may describe the experience of very few actual citizens. National analysis of COVID-19 mortality concealed the dramatic local disparities by race and class that only zip-code-level analysis could reveal. A complete geographic explanation requires checking whether national averages obscure the regional and local patterns that matter most for policy and lived experience.", "id": "fc18"}, {"front": "Scale Analysis AP Skill: FRQ Application", "back": "When an FRQ prompt asks to 'evaluate a process at multiple geographic scales,' it asks for analytical scale reasoning—how the same process looks different when examined at local, regional, national, and global levels. A full response must: (1) identify the correct scale level for each claim, (2) explain the causal mechanism operating at that scale, and (3) show how the mechanisms differ across scales. Simply repeating the same description at each level earns no credit; the difference in what each scale reveals is the analytical work.", "id": "fc19"}, {"front": "Why can global-scale analysis make outsourcing look like 'efficiency' while local-scale analysis makes it look like 'devastation'?", "back": "These characterizations are not contradictory—they reflect genuine differences in what each scale reveals. At the global scale, outsourcing is a rational spatial response to factor-cost differences that raises aggregate welfare by allocating production to its least-cost location. At the local scale, the same process translates into specific closed mills, specific unemployed workers, specific depopulated towns, and specific communities whose entire economic base was eliminated. Both descriptions are accurate at their respective scales; the geographic skill is recognizing that both are necessary for a complete understanding.", "id": "fc20"}, {"front": "Central Place Theory (Walter Christaller)", "back": "A model developed by German geographer Walter Christaller in 1933 explaining the size, number, and spacing of urban centers based on their role in providing goods and services to surrounding areas. Christaller argued that higher-order goods (requiring large threshold populations) would be found only in larger, more widely spaced cities, while lower-order goods would be available in smaller, more closely spaced centers. Christaller's theory operates primarily at the regional scale and was influential in mid-twentieth-century geography.", "id": "fc21"}, {"front": "Containerization and Global Outsourcing", "back": "The standardization of intermodal shipping containers (developed commercially in the 1950s–1960s) dramatically reduced the cost of long-distance trade by enabling goods to be moved between ships, trains, and trucks without reloading. This transportation cost reduction was a key geographic enabler of global outsourcing—making it economically viable to manufacture goods in East and Southeast Asia for consumption in North America and Europe, fundamentally reshaping the global geography of manufacturing.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
