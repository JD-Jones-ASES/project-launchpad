<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

        </div>

    <script>
    var CARDS = [{"front": "Language family", "back": "The highest-order classification of human languages — a group of languages sharing a demonstrable common ancestor (proto-language) reconstructed through systematic comparison of vocabulary, grammar, and sound correspondences. Approximately 130–150 recognized language families worldwide, ranging from vast (Indo-European, with ~3.2 billion speakers) to tiny isolates (Basque, with no known relatives).", "id": "fc01"}, {"front": "Language taxonomy hierarchy", "back": "The nested classification system organizing languages from most inclusive to most specific: language family → language branch → language group → individual language → dialect. Example within Indo-European: family (Indo-European) → branch (Germanic) → group (North Germanic) → language (Swedish) → dialect (regional Swedish variety).", "id": "fc02"}, {"front": "Language branch and dialect", "back": "A language branch is a subdivision of a language family — languages sharing a common ancestor more recent than the family as a whole (e.g., Romance and Germanic are both branches of Indo-European). A dialect is a regional or social variety of a single language, distinguished by vocabulary, pronunciation, and grammar but mutually intelligible with other dialects. The boundary between dialect and separate language is as much political as linguistic.", "id": "fc03"}, {"front": "Indo-European language family", "back": "The most widely spoken language family on Earth (~3.2 billion speakers), spread across South Asia, Europe, the Americas, and Australia through ancient migrations and modern colonialism. Major branches: Indo-Iranian (Hindi-Urdu, Bengali, Persian), Romance (Spanish, Portuguese, French, Italian), Germanic (English, German, Dutch), and Slavic (Russian, Polish, Ukrainian). Its vast geographic range is a direct product of European colonial expansion.", "id": "fc04"}, {"front": "Sino-Tibetan language family", "back": "The world's second-largest language family by speakers (~1.3 billion), dominant in East and Southeast Asia. Largest member: Mandarin Chinese (Putonghua, ~1 billion speakers). Other members include Cantonese, Wu (Shanghainese), Tibetan, and Burmese.", "id": "fc05"}, {"front": "Niger-Congo language family", "back": "The largest language family in Africa by number of languages (~1,500 individual languages) and geographic extent (~500 million speakers). Includes the Bantu subfamily — Swahili, Zulu, Xhosa, Shona — which spread across sub-Saharan Africa through the Bantu migrations of the past two millennia. The Bantu expansion is one of the most significant language-diffusion events in African prehistory.", "id": "fc06"}, {"front": "Austronesian language family", "back": "A language family remarkable for its geographic spread (~300 million speakers): from Madagascar in the west to Easter Island in the east — the greatest longitudinal range of any language family. Major members: Malay-Indonesian, Tagalog (Filipino), Javanese, and the Polynesian languages (Hawaiian, Maori, Samoan). Its distribution maps one of human history's greatest maritime migrations.", "id": "fc07"}, {"front": "Kurgan hypothesis (Indo-European origin)", "back": "Associated with archaeologist Marija Gimbutas; locates the Proto-Indo-European hearth among pastoral nomads of the Pontic-Caspian steppe (present-day Ukraine and southern Russia) around 4000–3500 BCE. The horse-riding, chariot-using Kurgan peoples expanded outward in multiple waves, spreading their languages through military dominance and cultural prestige. Recent ancient-DNA research provides substantial support for a steppe origin for the European branch of Indo-European.", "id": "fc08"}, {"front": "Anatolian hypothesis (Indo-European origin)", "back": "Proposed by archaeologist Colin Renfrew in the 1980s; argues Indo-European languages originated among early farming populations of Anatolia (modern Turkey) around 8000 BCE, spreading into Europe and South Asia with the Neolithic agricultural revolution. Diffusion was primarily contagious, tied to agricultural expansion: farmers multiplied and spread, carrying languages with them. Not mutually exclusive with the Kurgan hypothesis — multiple episodes of expansion may have occurred.", "id": "fc09"}, {"front": "Lingua franca", "back": "A language used as a medium of communication among speakers of different native languages. Historically developed along trade routes — Swahili across the East African coast, Arabic across the medieval Islamic world, Latin across Christian Europe. Today, English is the dominant global lingua franca in aviation, scientific publishing, and digital communication. The UN recognizes six official languages: English, Mandarin, Spanish, Arabic, Russian, and French.", "id": "fc10"}, {"front": "Pidgin language", "back": "A simplified contact language that develops between speakers of different native languages, drawing vocabulary primarily from one language (the superstrate, usually colonial or trade) while simplifying grammar and blending structures from other languages (substrates). Nobody's native language — learned as a second language for specific communicative purposes. Example: Tok Pisin (Papua New Guinea), drawing vocabulary largely from English while incorporating Melanesian grammatical structures.", "id": "fc11"}, {"front": "Creole language", "back": "A language that developed from a pidgin that became the native language of a community. When children acquire a pidgin natively, they expand and regularize its grammar, producing a full natural language with regular grammar, rich vocabulary, and native speakers. Examples: Haitian Kreyòl (from French-based pidgin during French colonial rule); Gullah (English-based creole with deep West African grammatical substrate, spoken on South Carolina and Georgia Sea Islands).", "id": "fc12"}, {"front": "Isogloss", "back": "A line on a linguistic map marking the geographic boundary of a particular linguistic feature — a word, pronunciation, or grammatical construction. Where multiple isoglosses cluster together, they define a dialect boundary. Because linguistic change is gradual and continuous, isoglosses rarely coincide perfectly — they form bundles rather than sharp lines. Example: the U.S. \"pop\" vs. \"soda\" divide marks an isogloss between Northern and Midland/Southern dialect regions.", "id": "fc13"}, {"front": "Toponym", "back": "A place name — among the most durable artifacts of cultural landscapes. Toponyms function as \"cultural fossils,\" preserving evidence of languages, peoples, and events that have otherwise vanished. Examples: -chester/-caster suffixes in English town names (Manchester, Lancaster) record the Latin castra (military camp); Arabic al- prefixes in Spanish place names (Alhambra, Almería) document the Moorish presence 711–1492; hundreds of U.S. state names derive from indigenous languages.", "id": "fc14"}, {"front": "Language as cultural-historical evidence", "back": "The geographic distribution of related languages maps historical movement of peoples. Because language change is systematic and measurable — linguists can reconstruct what words existed in a proto-language and therefore what technologies and social structures its speakers had — language families are one of the most powerful tools for reconstructing prehistory without written records. The Indo-European debate illustrates how linguistic, archaeological, and genetic evidence must be integrated.", "id": "fc15"}, {"front": "Why is Austronesian distribution geographically significant?", "back": "The Austronesian family spans from Madagascar to Easter Island — the greatest longitudinal range of any language family. This distribution is a direct record of one of human history's most ambitious maritime migrations: Austronesian-speaking peoples navigated the open Pacific and Indian Oceans using outrigger canoes and sophisticated celestial navigation, reaching virtually every habitable island in two oceans long before European exploration.", "id": "fc16"}, {"front": "What makes a creole a \"full\" language while a pidgin is not?", "back": "A pidgin is a simplified contact language that nobody acquires as a native tongue — it has reduced grammar and vocabulary adequate only for limited communicative purposes. When children are born into a pidgin-using community and acquire it as their first language, they automatically expand its grammar to full complexity. The resulting creole has regular grammar, rich vocabulary, native speakers, and cultural traditions — all markers of a complete natural language, not a corrupted version of its vocabulary source.", "id": "fc17"}, {"front": "Afro-Asiatic language family", "back": "A language family concentrated in North Africa and the Middle East (~350 million speakers). Major members: Arabic (largest branch), Hebrew, Amharic (Ethiopia), Hausa (West Africa), and Somali. Arabic's spread across North Africa and the Middle East reflects the rapid expansion of Islam in the 7th century CE — making Afro-Asiatic another case where language distribution maps a historical religious-political diffusion event.", "id": "fc18"}, {"front": "Synthesis: How do language distribution maps record human migration history?", "back": "Language family boundaries are essentially migration maps: they record where ancestral populations lived, how they split and spread, and which groups conquered or absorbed others. The Indo-European family's global reach reflects both ancient steppe expansions (Kurgan hypothesis) and modern European colonialism. The Austronesian family's Pacific-Indian Ocean span records ancient maritime migrations. The Bantu subfamily's sub-Saharan distribution records the Bantu agricultural expansion. Language geography is thus a form of historical evidence independent of written records.", "id": "fc19"}, {"front": "Synthesis: Why does the dialect-language boundary matter politically?", "back": "The distinction between a dialect and a separate language is as much political as linguistic — mutual intelligibility is a technical criterion, but nations often elevate regional dialects to full-language status for political reasons (e.g., Serbian and Croatian are mutually intelligible but are treated as separate languages by their respective states). This has real geographic consequences: language recognition affects access to education, government services, official signage, and cultural legitimacy.", "id": "fc20"}, {"front": "Proto-Indo-European reconstruction: what does it tell geographers?", "back": "By systematically comparing vocabulary across all Indo-European languages, linguists have reconstructed Proto-Indo-European — a language spoken ~4000–6000 BCE. The reconstructed vocabulary (words for wheel, horse, cattle, and certain plants) implies a specific technological and ecological context: the Eurasian steppe. This makes linguistic reconstruction a form of archaeological evidence, constraining where and when the Indo-European hearth could have existed even without any written records from that period.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
