<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

    <script>
    var CARDS = [{"front": "Universalizing religion", "back": "A religion that actively seeks converts and claims its message is appropriate for all humanity, regardless of birthplace, ancestry, or ethnicity. Because membership is not restricted to a descent group, universalizing religions spread through missionary diffusion. The three largest are Christianity (~2.4 billion adherents), Islam (~1.9 billion), and Buddhism (~500 million). Sikhism is also classified as universalizing. These faiths produce global spatial distributions.", "id": "fc01"}, {"front": "Ethnic religion", "back": "A religion whose membership is defined primarily by descent, ethnicity, or cultural belonging rather than by conversion. Ethnic religions do not actively seek outside converts and are tied to specific peoples and places. Examples: Hinduism, Judaism, Shinto, traditional African religions, and indigenous spiritual traditions. Produces highly concentrated spatial distributions — Shinto is overwhelmingly Japanese; Judaism is concentrated among Jewish diaspora communities.", "id": "fc02"}, {"front": "Why do universalizing and ethnic religions produce different spatial distributions?", "back": "Universalizing religions spread through active missionary diffusion — believers recruit across all ethnic and geographic boundaries — producing global distributions (Christianity reaches from the Philippines to Nigeria to Brazil; Islam from West Africa to Indonesia). Ethnic religions produce clustered, often territorially bounded distributions because membership is not open to outsiders. The map of world religion is partly a map of diffusion pathways.", "id": "fc03"}, {"front": "Hinduism: origin and distribution", "back": "The world's oldest major living religion, with roots in the Indus Valley civilization (~2000 BCE). No single founder, text, or central institutional authority. Spread within South Asia through Vedic religious culture, and into Southeast Asia through Hindu kingdoms and trade networks (hence Hindu elements at Angkor Wat, Cambodia). Today ~1.2 billion adherents, predominantly in India, Nepal, and diaspora communities in Fiji, Trinidad, South Africa, and elsewhere. Classified as an ethnic religion.", "id": "fc04"}, {"front": "Judaism: origin, diaspora, and distribution", "back": "Originated in the ancient Near East, traced to the covenant between Abraham and God. The Jewish diaspora proceeded in waves: Babylonian exile (586 BCE), Roman destruction of the Second Temple (70 CE), medieval expulsions from Western Europe (England 1290, France 1306, Spain 1492), and the Holocaust (1939–1945). Today the largest Jewish populations are in Israel and the United States. Classified as an ethnic religion; spread reflects forced dispersal rather than missionary diffusion.", "id": "fc05"}, {"front": "Buddhism: origin and diffusion", "back": "Founded in Lumbini (present-day Nepal) in the 6th century BCE by Siddhartha Gautama. Spread first through South Asia under Mauryan Emperor Ashoka (3rd century BCE), then along trade routes into Central Asia, China, Korea, Japan, and Southeast Asia — a combination of relocation and stimulus diffusion. Later largely displaced from South Asia by resurgent Hinduism. Today concentrated in East and Southeast Asia, Tibet, and Sri Lanka. Classified as universalizing.", "id": "fc06"}, {"front": "Christianity: origin and diffusion pathways", "back": "Emerged in Palestine in the 1st century CE through the ministry of Jesus of Nazareth. Diffused through the Roman Empire via a combination of contagious diffusion (personal contact along trade routes) and hierarchical diffusion (through urban centers and imperial patronage). Constantine's conversion (312 CE) and the Edict of Milan (313 CE) accelerated spread. Later expansion through European colonialism extended the faith to the Americas, sub-Saharan Africa, and the Philippines.", "id": "fc07"}, {"front": "Islam: origin and diffusion", "back": "Founded in Mecca (present-day Saudi Arabia) in the early 7th century CE through revelations received by the Prophet Muhammad (~610 CE). Spread rapidly after Muhammad's death (632 CE) across the Middle East, North Africa, the Iberian Peninsula, Persia, and South Asia within a century. Further expansion into sub-Saharan Africa and Southeast Asia through trade networks and Sufi missionary activity. Indonesia — reached via maritime trade, not military conquest — is the world's most populous Muslim-majority country.", "id": "fc08"}, {"front": "Sikhism: origin and distribution", "back": "Founded in the Punjab region of South Asia by Guru Nanak (1469–1539) and developed through a succession of ten Gurus. Combines elements from Hindu and Islamic traditions while asserting a distinct monotheistic theology. Spread through the Punjab and, through diaspora migration, to the United Kingdom, Canada, the United States, and East Africa. Classified as universalizing, though practical spread has been more limited than Christianity, Islam, or Buddhism.", "id": "fc09"}, {"front": "Sacred space", "back": "A location regarded as holy or spiritually special by a religious group. Includes natural features (rivers, mountains, springs) believed to have divine associations, and human-built structures (temples, mosques, churches, stupas, cemeteries) set apart from everyday space. Historian of religion Mircea Eliade argued that in religious experience, space is not uniform: sacred places are qualitatively different from profane ones, oriented toward a cosmic center (axis mundi).", "id": "fc10"}, {"front": "Mosque as cultural landscape feature", "back": "Islamic mosques are oriented toward Mecca — the direction of the qibla (prayer direction). Most mosques in the Middle East and South Asia have minarets (towers for the call to prayer). Interior features: mihrab (niche marking the qibla), minbar (pulpit for Friday sermon), absence of representational imagery. Geographic implication: a mosque's long axis is a directional indicator — a mosque in Jakarta faces northwest; one in Madrid faces southeast.", "id": "fc11"}, {"front": "Buddhist stupa as cultural landscape feature", "back": "A hemispherical mound structure originally constructed to house relics of the Buddha or honored monks; became objects of veneration and pilgrimage across the Buddhist world. The stupa form was adapted into the pagoda in East Asia and the chedi in Southeast Asia. Buddhist temples typically include statue halls, meditation spaces, and libraries of sacred texts — reflecting the religion's emphasis on learning, meditation, and communal practice.", "id": "fc12"}, {"front": "Jerusalem: tripartite sacred space", "back": "Simultaneously sacred to three universalizing religions in one square kilometer of the Old City. For Jews: the Temple Mount (site of the First and Second Temples) and the Western Wall. For Muslims: Al-Haram al-Sharif (the Dome of the Rock, built 691 CE, and al-Aqsa Mosque). For Christians: the Church of the Holy Sepulchre (site of the Crucifixion and Resurrection). The physical overlap of mutually exclusive sacred claims means any political decision about sovereignty, access, or construction carries worldwide religious implications.", "id": "fc13"}, {"front": "Northern Ireland: ethno-religious territorial conflict (\"the Troubles\")", "back": "Conflict (roughly 1968–1998) rooted in the intersection of ethnic, national, and religious identities. Unionist (predominantly Protestant) community identified with British national identity; Nationalist (predominantly Catholic) community identified with Irish national identity. Religion served as a marker of ethnic and political identity rather than primarily theological difference. Belfast and Derry landscapes remain visibly divided: peace walls, territorial murals, and flags. The Good Friday Agreement (1998) reduced violence but segregation persists.", "id": "fc14"}, {"front": "Kashmir: Hindu-Muslim territorial dispute", "back": "A Muslim-majority princely state whose Hindu maharaja acceded to India at Partition (1947), giving India legal claim while Pakistan disputed accession on demographic grounds. Two full-scale wars (1947–48, 1965) and a low-grade insurgency since 1989. China also controls a northeastern portion (Aksai Chin). The Line of Control dividing Indian-administered and Pakistani-administered Kashmir is one of the world's most militarized borders. Religious, strategic, hydrological, and nationalist dimensions all shape the conflict.", "id": "fc15"}, {"front": "Gothic cathedral as cultural landscape feature", "back": "Western Christian churches often follow a cruciform plan (cross-shaped, symbolizing the Crucifixion), with the altar at the east end (oriented toward Jerusalem). Gothic cathedrals use pointed arches and flying buttresses to achieve tremendous height, directing worshippers' eyes upward toward heaven. The landscape of Christian Europe is still organized around medieval parish churches and cathedrals, which remain central to townscapes long after declining church attendance.", "id": "fc16"}, {"front": "Hindu temple as cultural landscape feature", "back": "Hindu temples follow complex rules of sacred geometry derived from Sanskrit treatises (Vastu Shastra and Agama Shastra). The central tower (shikhara or vimana) rises above the innermost sanctuary (the garbhagriha, or \"womb chamber\") housing the primary deity image. The entire temple is conceived as a microcosm of Mount Meru, the sacred mountain at the center of Hindu cosmology. This cosmological structuring of built space is characteristic of Sauer's cultural landscape concept applied to religion.", "id": "fc17"}, {"front": "Synthesis: How does the universalizing/ethnic distinction explain world religion maps?", "back": "The diffusion mechanism a religion uses determines its spatial distribution. Universalizing religions (Christianity, Islam, Buddhism) spread across ethnic and political boundaries through missionary diffusion, producing global distributions. Ethnic religions (Hinduism, Judaism, Shinto) spread primarily through descent and remain spatially concentrated. The world religion map is therefore simultaneously a map of religious doctrine and of historical diffusion patterns — not just a snapshot of where people happen to live.", "id": "fc18"}, {"front": "Synthesis: Why does sacred space generate intractable political conflict?", "back": "When different religious communities assign sacred status to the same physical location, conflict becomes resistant to ordinary territorial compromise. Sacred claims are not negotiable the way economic interests are — they are non-fungible (no substitute site satisfies the claim) and tied to collective identity. Jerusalem illustrates this: three religions cannot each have exclusive control of overlapping holy sites, so any resolution alienates one or more groups. Religious-ethnic conflict thus often resists the territorial partitions that resolve secular disputes.", "id": "fc19"}, {"front": "Myanmar/Rohingya: religious-ethnic violence and statelessness", "back": "The predominantly Muslim Rohingya ethnic minority has lived in Myanmar's Rakhine State for centuries but was denied citizenship since 1982. In August 2017, following attacks by a Rohingya militant group, the Myanmar military launched mass violence against Rohingya civilians — burning villages, committing mass killings, and carrying out systematic sexual violence. ~700,000–1,000,000 Rohingya fled to Bangladesh, creating the Cox's Bazar displacement camp (world's largest). The UN Fact-Finding Mission concluded acts of genocidal intent were committed.", "id": "fc20"}, {"front": "How does the diffusion of Buddhism illustrate stimulus diffusion?", "back": "Buddhism originated in India as a doctrine emphasizing individual liberation from suffering through the Eightfold Path. When Buddhism diffused into China over subsequent centuries, it was transformed: Chinese Mahayana Buddhism incorporated local ancestor-veneration practices, adapted visual iconography to Chinese aesthetics, and developed the bodhisattva concept (enlightened being who delays personal liberation to aid others) — resonating with Confucian social ethics. The underlying doctrine spread, but stimulus diffusion produced distinctly Chinese Buddhism rather than a transplanted Indian one.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
