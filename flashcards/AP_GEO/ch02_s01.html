<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Ecumene", "back": "The permanently inhabited portion of the Earth's surface. Roughly 90 percent of the world's population lives on about 10 percent of total land area. The ecumene is concentrated in low-elevation, mid-latitude zones with reliable precipitation, fertile soils, and access to trade routes or navigable water. Its boundaries shift slowly as technology, climate, and economic incentives change.", "id": "fc01"}, {"front": "Non-Ecumene", "back": "The uninhabited or only temporarily inhabited portions of the Earth's surface. Includes high-altitude zones (above ~2,000 m), extreme arid regions (Sahara, Atacama, Rub' al Khali), boreal and tundra zones of northern Canada, Siberia, and Alaska, and polar ice sheets. These regions cover roughly 60 percent of Earth's land surface but support less than 5 percent of its population.", "id": "fc02"}, {"front": "Arithmetic Density", "back": "Total population divided by total land area of a territorial unit. Also called crude density, it is the simplest and most widely cited measure. Formula: D = P / A. It treats all land as equally available for settlement — which is rarely true — making it a poor indicator of actual population pressure on habitable land.", "id": "fc03"}, {"front": "Physiological Density", "back": "Total population divided by the area of arable land — land capable of supporting crop agriculture. Because not all land is farmable, physiological density reveals pressure on the food-producing land base far more accurately than arithmetic density. A country with very high physiological density is placing heavy demands on its cultivable soil.", "id": "fc04"}, {"front": "Agricultural Density", "back": "The number of farmers (agricultural labor force) divided by the area of arable land. Measures how intensively human labor is applied to available farmland. Countries with highly mechanized agriculture have very low agricultural densities; countries dependent on hand labor have very high ones. Low agricultural density alongside high arithmetic density signals an industrialized farming sector.", "id": "fc05"}, {"front": "Why do the three density measures function as a diagnostic set?", "back": "Arithmetic density describes how crowded a country looks on a map. Physiological density reveals pressure on the food-production land base. Agricultural density indicates the technological intensity of farming. A country with very high physiological but low agricultural density (like the Netherlands) has solved land pressure through technology. A country with high physiological density and no offsetting technology faces genuine food-security stress.", "id": "fc06"}, {"front": "Egypt: arithmetic vs. physiological density", "back": "Egypt's arithmetic density (~104 people/km²) seems moderate. But only 3–5% of Egypt's territory — the Nile floodplain and Delta — is arable. Restricting to that ~33,000 km² yields a physiological density approaching 3,000 people/km², one of the world's highest. Egypt is not crowded on paper; it is extraordinarily crowded in practice because nearly everyone must live from a narrow irrigated strip flanked by desert.", "id": "fc07"}, {"front": "Netherlands: arithmetic density vs. agricultural density", "back": "The Netherlands is dense arithmetically (~510 people/km²) and has very high physiological density. Yet its agricultural density is fewer than 3 farmers/km² of arable land — among the world's lowest — because Dutch farming is extraordinarily mechanized. High arithmetic density plus low agricultural density signals a highly developed, industrialized agricultural sector that has decoupled food production from raw land area.", "id": "fc08"}, {"front": "East Asia population cluster", "back": "China, Japan, the Korean Peninsula, and Taiwan together hold roughly 1.6 billion people. The cluster concentrates on eastern coastal lowlands, the major river valleys (Huang He and Yangtze), and the Korean and Japanese archipelagos. Intensive wet-rice cultivation, which has supported high population densities for millennia, underlies much of the pattern.", "id": "fc09"}, {"front": "South Asia population cluster", "back": "The Indian subcontinent — India, Pakistan, Bangladesh, and Sri Lanka — is home to nearly 2 billion people. Bangladesh, centered on the Ganges-Brahmaputra delta, has an arithmetic density exceeding 1,200 per km², making it one of the most densely settled large countries on Earth. The Indo-Gangetic Plain is one of the world's most fertile and densely inhabited agricultural regions.", "id": "fc10"}, {"front": "Europe population cluster", "back": "Western and Central Europe — from the British Isles across France, the Low Countries, Germany, and into Poland and Ukraine — form the third great population cluster. Industrial development, urbanization, and centuries of intensive agriculture shaped the distribution. Unlike the Asian clusters, Europe's high densities in the modern era reflect urban rather than agricultural concentration.", "id": "fc11"}, {"front": "Northeast U.S. / Southern Canada population cluster", "back": "The megalopolis stretching from Boston through New York, Philadelphia, Baltimore, and Washington constitutes the densest concentration in the Western Hemisphere. Industrial and commercial development — not agricultural capacity — explains this cluster, distinguishing it from the Asian clusters where intensive agriculture is the historical foundation.", "id": "fc12"}, {"front": "Carrying Capacity", "back": "The maximum population size that an environment can support indefinitely, given available technology, resources, and cultural practices. Carrying capacity is not a fixed biological constant — it shifts upward with technological innovation (e.g., the Green Revolution) and downward with environmental degradation (soil salinization, aquifer depletion, climate disruption). Technology, trade, and social organization allow societies to expand or exceed apparent biological limits.", "id": "fc13"}, {"front": "Why is carrying capacity difficult to calculate in practice?", "back": "Because technology, trade, and social organization allow societies to either expand or exceed apparent biological limits. Ancient Rome fed a city of one million from grain shipped from Egypt — seemingly impossible if planners thought only in terms of Italian agriculture. The Netherlands today exports food worldwide while maintaining Europe's highest densities, because greenhouse technology has decoupled food production from land area.", "id": "fc14"}, {"front": "Population distribution", "back": "The spatial pattern of where people are located across Earth's surface. Population distribution is not random — it follows physical (elevation, climate, soils), historical, economic, and cultural logics. The fundamental pattern is extreme concentration: ~90% of humanity occupies ~10% of Earth's land area, primarily in mid-latitude zones of the Northern Hemisphere.", "id": "fc15"}, {"front": "What physical factors explain the location of the world's thinly settled zones?", "back": "The thinly settled zones between the four great clusters — the Saharan and Arabian deserts, boreal forest and tundra of northern Asia and Canada, tropical rainforests of the Amazon and Congo basins, and high-altitude Tibetan and Andean plateaus — share the friction of extreme environments: cold, aridity, steep terrain, high disease burden, and lack of navigable water or fertile soil.", "id": "fc16"}, {"front": "How does the Boserup perspective challenge fixed carrying capacity?", "back": "The Danish economist Ester Boserup argued that population growth itself can drive the technological and social changes that raise carrying capacity, rather than simply bumping against a fixed ceiling. This frames population as a driver of innovation, not only a constraint — the central tension in human geography between those who see population as a limit and those who see it as a stimulus.", "id": "fc17"}, {"front": "What does a population density choropleth map reveal — and what does it conceal?", "back": "A choropleth map of arithmetic density shows the spatial distribution of population across political units. It conceals internal variation: a single country may contain teeming river-delta cities and empty highland steppes. The unit of analysis (country vs. province vs. district) matters enormously — a national-average arithmetic density value cannot distinguish a city from a rural hinterland at most map scales.", "id": "fc18"}, {"front": "Synthesis: Why does arithmetic density alone mislead analysis of food security?", "back": "Arithmetic density treats all land as equally productive and available, ignoring that only a fraction is arable. Egypt's case shows how a moderate arithmetic density can mask extreme physiological density — extraordinary pressure on cultivable land. Agricultural density adds a third lens: how much human labor (vs. machinery) is applied to that arable land. All three measures together reveal whether a country faces genuine food-security stress or has compensated through technology.", "id": "fc19"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
