    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">

    <main class="main-content">
        <div class="container">

                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>

                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>

                    </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;

                    <kbd>S</kbd> shuffle

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

    <script>
    var CARDS = [{"front": "Industrial Revolution — where and when?", "back": "Originated in Britain in the late eighteenth century (c. 1760–1840), driven by accessible coalfields in the English Midlands, South Wales, Yorkshire, and Northumberland, combined with iron ore deposits, navigable waterways, and institutional supports for capital investment. Steam power reorganized the spatial logic of production more fundamentally than any previous technology.", "id": "fc01"}, {"front": "Why did Britain industrialize first?", "back": "Three overlapping reasons: (1) Geological — shallow, accessible coalfields that steam-powered pumps could drain; (2) Geographic — coal and iron ore deposits lying close together (Black Country, Sheffield), minimizing assembly costs; (3) Institutional — secure property rights, capital markets, and canal-building capacity that no continental rival yet matched.", "id": "fc02"}, {"front": "Manchester / 'Cottonopolis'", "back": "Manchester epitomized the early industrial city. By 1800, cotton-spinning mills lined the River Irwell, drawing on moist air (reducing thread breakage), waterpower and steam, and a rural migrant labor pool swelled by agricultural enclosure. Population quadrupled from ~25,000 (1771) to over 180,000 (1831). Its break-of-bulk position between Liverpool's port and inland markets amplified commercial growth.", "id": "fc03"}, {"front": "Break-of-bulk point (definition)", "back": "A location where cargo must be transferred from one transportation mode or vessel to another — for example, from oceangoing ship to river barge, or from rail to truck. Break-of-bulk points concentrate warehousing, processing, and commercial activity because the interruption of transit creates economic opportunity. Major examples: Rotterdam, Singapore, Hong Kong, New Orleans.", "id": "fc04"}, {"front": "Ford assembly line (1913)", "back": "Henry Ford's moving assembly belt at Highland Park, Michigan reduced the time to build a Model T from 12.5 hours to 93 minutes by decomposing production into standardized, sequential tasks at fixed stations. It fundamentally separated mental labor (design, engineering) from physical labor (assembly) — concentrating the former in offices and the latter on the factory floor. Key example of Second Industrial Revolution logic.", "id": "fc05"}, {"front": "Second Industrial Revolution (c. 1870–1914)", "back": "Deepened and widened the first by replacing iron with steel, introducing electricity in some factories, and spawning chemical industries. Key innovations: the Bessemer converter (mass steel production), the internal combustion engine, and the assembly line. By 1900, Germany had surpassed Britain in steel output, and the United States had become the world's largest industrial economy.", "id": "fc06"}, {"front": "Diffusion of industrialization — Continental Europe", "back": "Belgium industrialized first on the continent (accessible coal at Liège and Charleroi; proximity to British engineers). France followed, centered on northern coalfields near Lille and Alsace-Lorraine. Germany accelerated dramatically after unification (1871), with the Ruhr Valley — where the Rhine receives coal-bearing tributaries — becoming the continent's most productive industrial district.", "id": "fc07"}, {"front": "Diffusion of industrialization — United States", "back": "Appalachian coal fields (Pennsylvania through West Virginia) and Great Lakes iron ore (Mesabi Range, Minnesota, 1880s) provided the raw-material base. Samuel Slater launched water-powered cotton spinning at Pawtucket, RI (1793). Andrew Carnegie's integrated Homestead Works (Pittsburgh, 1881) combined Appalachian coal, Great Lakes ore, and the Erie Canal to undercut European steel prices.", "id": "fc08"}, {"front": "Japan's Meiji industrialization", "back": "State-directed and compressive — completing in three to four decades what took Britain a century. After the Meiji Restoration (1868), the government dispatched engineers to Europe, imported machinery wholesale, and established government-owned 'model factories' in silk, cotton, and munitions. By the 1890s these were handed to private zaibatsu conglomerates (Mitsui, Mitsubishi, Sumitomo), which integrated banking, industry, and commerce under family control.", "id": "fc09"}, {"front": "East Asian Tigers / NIEs", "back": "South Korea, Taiwan, Hong Kong, and Singapore — the 'Four Tigers' or Newly Industrializing Economies — pursued export-led growth strategies in the 1960s–80s. South Korea's chaebol (Samsung, Hyundai, LG) replicated the zaibatsu model. Singapore leveraged political stability, English-speaking labor, and a break-of-bulk location on the Strait of Malacca (through which a quarter of global maritime trade passes) to attract foreign manufacturing.", "id": "fc10"}, {"front": "Shipping container revolution (1956)", "back": "On April 26, 1956, Malcom McLean's Ideal X departed Newark with 58 standardized metal boxes — the first modern intermodal container voyage. Standardized at 20 feet (TEU) and later 40 feet, containers eliminated most stevedoring labor and pilferage. By the 1970s, ocean freight rates had fallen ~90% in real terms vs. the 1950s, making offshore manufacturing cheaper than domestic production and enabling the modern global supply chain.", "id": "fc11"}, {"front": "Weber's Least Cost Theory (1909) — core claim", "back": "Alfred Weber argued that a rational firm locates its factory at the point that minimizes total production costs, calculated as the sum of three factors: (1) transportation costs (moving raw materials in and finished goods out); (2) labor costs (wage bill per unit of output); and (3) agglomeration economies (cost savings from clustering near related firms, suppliers, and specialized labor).", "id": "fc12"}, {"front": "Weber's location triangle", "back": "If a factory uses two raw materials from two source locations and sells to one market, the optimal plant location lies within the triangle formed by the three points, pulled toward whichever vertex exerts the greatest 'transport weight.' The firm minimizes the total cost of moving all inputs to the plant and all outputs to market.", "id": "fc13"}, {"front": "Weight-losing vs. weight-gaining industries (Weber)", "back": "Weight-losing (bulk-reducing) industries — copper smelting, steel making — produce finished goods lighter than their raw inputs, so the minimum-cost location is near the raw materials. Weight-gaining (bulk-increasing) industries — soft-drink bottling, bread baking — add weight or bulk at the factory, so the minimum-cost location is near the market. Steel mills in Pennsylvania/Ruhr; bottling plants near every city — both confirm Weber.", "id": "fc14"}, {"front": "Isotims and isodapanes (Weber)", "back": "Isotims are lines of equal transport cost radiating from a raw-material source or market point. An isodapane connects points of equal total transport-cost increase above the transport minimum. A firm will deviate from the transport-minimum location to a cheaper-labor site only if that site lies inside the critical isodapane — the isodapane whose transport-cost increase equals the labor cost saving.", "id": "fc15"}, {"front": "Labor deviation in Weber's model — real-world example", "back": "The textile industry's migration from New England (high wages) → US South (lower wages, early 20th century) → Bangladesh (still lower wages, 21st century) tracks Weber's labor-deviation logic: each move occurred when wage savings in the new location exceeded the added transport costs. The shipping container revolution amplified this effect by collapsing the transport-cost penalty of distant locations.", "id": "fc16"}, {"front": "Agglomeration economies — three types", "back": "(1) Localization economies: firms in the same industry share specialized workers, suppliers, and information spillovers (Silicon Valley engineers; Emilia-Romagna leatherworkers). (2) Urbanization economies: general benefits of large cities (transport, finance, legal services, cultural amenities). (3) Marshallian industrial districts: informal knowledge transfer across firms that no single firm could internalize — Alfred Marshall's 'something in the air.'", "id": "fc17"}, {"front": "Alfred Weber (1868–1958) — biography", "back": "German economic geographer, younger brother of sociologist Max Weber. Studied law and political economy, then pioneered location theory at the University of Heidelberg. His 1909 Standortslehre applied marginal analysis to the spatial problem of industrial siting, introducing location triangles, isodapanes, and isotims. His framework was refined by August Lösch and Walter Isard and incorporated into regional science. He also contributed to cultural sociology and warned of fascism's dangers in the 1920s.", "id": "fc18"}, {"front": "Critique of Weber's Least Cost Theory", "back": "Weber's model assumes perfect information, a flat (isotropic) plain, and a single-minded cost minimizer. It ignores: (1) agglomeration economies from proximity to consumers (not only producers); (2) government policy (tax incentives, EPZs); (3) environmental regulation as a location pull; (4) land rent in urban industrial districts. Its mechanical geometry understates the role of institutions and historical path dependence.", "id": "fc19"}, {"front": "Localization economies vs. urbanization economies", "back": "Localization economies arise when many firms in the same industry cluster together, sharing specialized workers, suppliers, and knowledge spillovers — benefits specific to that industry's concentration. Urbanization economies are the general benefits of being in any large city: transport networks, financial services, legal expertise, and cultural amenities that attract talent across industries.", "id": "fc20"}, {"front": "TEU (Twenty-foot Equivalent Unit)", "back": "The standard measure for container shipping capacity. One TEU equals a 20-foot intermodal shipping container. Standardization allowed containers to be transferred seamlessly between ships, rail cars, and trucks by crane — collapsing the labor and time required for cargo handling. Container ships today carry 20,000+ TEUs; the unit is the basic vocabulary of global supply-chain logistics.", "id": "fc21"}, {"front": "Synthesis: How did containerization change Weber's model?", "back": "By collapsing ocean freight costs ~90% between the 1950s and 1970s, containerization drastically reduced the transport-cost penalty of locating factories far from core markets. This amplified the relative importance of Weber's labor-deviation factor: firms could now move to low-wage peripheries (Bangladesh, Vietnam, Mexico) and still profitably reach core consumers. R&D and design remained in high-wage cores while assembly migrated — a spatial division of labor Weber's model predicts but containerization made globally scalable.", "id": "fc22"}, {"front": "Synthesis: Comparing industrialization diffusion pathways", "back": "Britain industrialized organically through resource endowment and private capital. Belgium and Germany followed via proximity and continental resource bases. The US leveraged continental raw materials and immigration. Japan compressed the process through state direction (Meiji model). The East Asian Tigers used export-led strategies and state-guided investment (chaebol/zaibatsu). All pathways confirm Weber's raw-material pull for heavy industry, but the Tiger cases also show how deliberate labor-cost positioning (Weber's deviation logic) can overcome resource limitations.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
