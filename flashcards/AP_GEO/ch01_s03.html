    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

    <script>
    var CARDS = [{"front": "Space (geographic usage)", "back": "The abstract backdrop against which locations exist and spatial relations are measured—unmarked, undifferentiated, and theoretical. It is the coordinate grid before anyone has attached meaning to any of its cells. Geographers use spatial analysis to understand how phenomena are arranged across this surface, how distance shapes interaction, and how locations are structured relative to one another. Doreen Massey argued that space should be understood as relational—produced by the ongoing social connections (supply chains, trade routes, investment flows) that flow through it rather than as a static geometric container.", "id": "fc01"}, {"front": "Place", "back": "What space becomes when human beings invest it with meaning. Place is created through experience, memory, and emotion: a stretch of coastline that appears on a topographic map as featureless contours may be, for the community that grew up fishing it, a dense web of named spots, remembered experiences, and inherited knowledge. The geographic coordinates are the same; the place is entirely different. Yi-Fu Tuan described place as 'a special kind of object' and 'a concretion of value' in which one can dwell.", "id": "fc02"}, {"front": "Yi-Fu Tuan (1930–2022)", "back": "A foundational figure in humanistic geography, long associated with the University of Minnesota and later the University of Wisconsin-Madison, born in Tianjin, China. His two landmark books—Topophilia (1974) and Space and Place (1977)—established the philosophical framework for studying the human experience of geographic environments. Tuan argued that geography had overemphasized spatial analysis at the expense of understanding what places mean to the people who inhabit them, drawing on literature, phenomenology, and personal reflection as well as fieldwork.", "id": "fc03"}, {"front": "Topophilia", "back": "A term coined by Yi-Fu Tuan in 1974 to describe the deep emotional bond between people and their environments—from the Greek topos (place) and philia (love or affinity). Topophilia describes the full range of human emotional bonds to the physical environment, from the powerful attachments of indigenous communities to ancestral homelands to the diffuse pleasures of urban dwelling. Tuan's concept established that geographic experience is not merely physical or economic but deeply affective.", "id": "fc04"}, {"front": "Doreen Massey", "back": "A British geographer (1944–2016) who argued in the 1990s that space should be understood as 'the sphere of the possibility of the existence of multiplicity'—produced by ongoing social relations rather than a static geometric container. Her relational conception of space challenged the idea that locations are defined purely by coordinates, insisting instead that a place's spatial existence is constituted by the supply chains, investment flows, and human connections that flow through it.", "id": "fc05"}, {"front": "Toponym", "back": "A place name. Toponyms encode cultural, historical, and political information: they reflect the language and values of the communities that assigned them, mark territorial claims and successive layers of conquest, and provide a window into how different cultures have organized their geographic environments. Toponymy (the study of place names) is a legitimate subfield of human geography. When place names are changed—as when colonial names are replaced by indigenous names after independence—the act is always a geographic as well as a political statement about whose sense of place deserves official recognition.", "id": "fc06"}, {"front": "Site", "back": "The intrinsic physical characteristics of a location—its topography, hydrology, soil, elevation, local climate, and natural resources. Site describes the land itself without reference to the surrounding environment. The site of Chicago is a low, flat plain at the mouth of the Chicago River where it meets the southern tip of Lake Michigan; the site of San Francisco is a hilly peninsula with a fine natural harbor. Site characteristics influence where settlements first develop and what activities they support, though they can be modified by human engineering.", "id": "fc07"}, {"front": "Situation", "back": "The relative position of a location with respect to the surrounding environment—other cities, transportation networks, natural resources, and political boundaries. Unlike site (which describes the land itself), situation describes a place's connectivity and accessibility to the rest of the world. Situation changes as surrounding conditions change: the situation of Chicago was radically altered when the Erie Canal opened in 1825 (connecting Great Lakes ports to New York), and again when the Interstate Highway System was built in the 1950s–1960s.", "id": "fc08"}, {"front": "Site vs. Situation", "back": "Site refers to the physical characteristics of the land a place occupies (topography, hydrology, soil); situation refers to its relative position in a broader geographic context (connectivity to trade routes, proximity to other settlements, position within transportation networks). A city may have an excellent site (good harbor, fertile land) but a deteriorating situation (bypassed by new transportation), or vice versa. Understanding both is essential for explaining why cities grow, stagnate, or decline.", "id": "fc09"}, {"front": "Region", "back": "A portion of the Earth's surface defined by shared characteristics that distinguish it from adjacent areas. Regions are intellectual constructs, not objective features of the physical world—different geographers may draw different regional boundaries depending on what criteria they use and what questions they are trying to answer. The CED recognizes three types: formal (uniform), functional (nodal), and perceptual (vernacular).", "id": "fc10"}, {"front": "Formal Region (Uniform Region)", "back": "A region defined by the presence of a measurable, relatively homogeneous characteristic across its interior. The Corn Belt is a formal region defined by statistical dominance of corn in agricultural land use (50%+ of planted cropland in its core). The Bible Belt is a formal region defined by the disproportionate share of Baptist and Evangelical Protestant congregations in a belt of American Southeast and South-Central counties. Formal regions are most commonly depicted on choropleth maps and most amenable to quantitative description.", "id": "fc11"}, {"front": "Functional Region (Nodal Region)", "back": "A region defined not by internal homogeneity but by its organization around a central node—a dominant city, airport, or hub from which activity radiates outward. The defining characteristic is flow: of people, goods, information, or services, to and from the node. Metropolitan Statistical Areas (MSAs)—defined as a core urban area of at least 50,000 people plus surrounding counties with strong commuting ties—are functional regions. Boundaries are drawn where one node's pull weakens and a rival node exerts equal or greater influence.", "id": "fc12"}, {"front": "Perceptual Region (Vernacular Region)", "back": "A region that exists primarily in the minds of people who use the label rather than in any objectively measurable landscape characteristic. 'The South' is the canonical American example: ask a hundred Americans to draw its boundaries and you get a hundred different maps, yet 'the South' shapes identity, migration decisions, political behavior, and cultural production in empirically measurable ways. Perceptual regions are not unreal—they are real as social facts, even when they lack crisp geographic edges.", "id": "fc13"}, {"front": "Metropolitan Statistical Area (MSA)", "back": "A functional region defined by the U.S. Office of Management and Budget as a core urban area of at least 50,000 people plus surrounding counties with strong commuting ties to that core. MSAs are a classic example of a nodal/functional region: their boundaries are drawn at the point where the central city's daily commuting pull weakens relative to a rival urban center. They are the primary unit for comparing metropolitan economic data in the United States.", "id": "fc14"}, {"front": "Acadiana", "back": "A perceptual/vernacular region comprising roughly twenty-two parishes of south-central and southwestern Louisiana where Cajun culture—French-rooted language, food traditions, music, Catholicism, and marsh-adapted economy—remains culturally dominant. No law defines Acadiana's boundaries; no survey measures where Cajun identity begins and ends. Yet residents strongly identify with it as a distinct cultural place, and its boundaries are reproduced on commercial signage, tourism materials, and local political identity.", "id": "fc15"}, {"front": "Toponymy", "back": "The study of place names. Toponymy is a legitimate subfield of human geography that investigates how names encode cultural, historical, and political information about the communities that assigned them. The name 'Manhattan' derives from a Lenape phrase; 'Chicago' likely derives from a Miami-Illinois word for wild onions. The history of American toponymy also includes systematic erasure of indigenous names through renaming with European ones—making toponymic change a recurring site of political and cultural contest.", "id": "fc16"}, {"front": "The Social Construction of Region", "back": "Regions do not pre-exist in nature waiting to be discovered; they are constructed by geographers, governments, businesses, and communities for specific analytical or political purposes. The same territory can simultaneously belong to multiple overlapping regions—Tennessee is part of 'the South' (formal/cultural), the 'Rust Belt' (formal/economic in some formulations), and the 'Sun Belt' migration destination (perceptual). Recognizing that regions are constructs does not make them useless; it prompts the question: who constructed this region, for what purpose, and what is obscured by how the boundaries are drawn?", "id": "fc17"}, {"front": "Spatial Analysis vs. Humanistic Geography", "back": "Two complementary approaches within geography. Spatial analysis uses abstract spatial concepts—location, distance, connectivity—and quantitative methods (the gravity model, GIS, choropleth mapping) to identify patterns across space. Humanistic geography, associated with Yi-Fu Tuan and others, prioritizes meaning, identity, memory, and emotional experience of place, drawing on qualitative evidence: literature, ethnography, phenomenology, and personal reflection. Neither approach is complete without the other; the spatial perspective holds both in productive tension.", "id": "fc18"}, {"front": "How does Chicago's site differ from its situation?", "back": "Chicago's site consists of its intrinsic physical features: a low, flat plain at the mouth of the Chicago River on the southwestern shore of Lake Michigan. Chicago's situation—which matters far more for explaining its growth—is its position at the junction of the Great Lakes water system and the continental interior, making it the inevitable transfer point between Great Lakes commerce and the rail and road networks extending west across the prairies. The situation changed dramatically with the Erie Canal (1825) and the railroad era, transforming a remote frontier outpost into the rail hub of a continental economy.", "id": "fc19"}, {"front": "Classifying Regions: Formal, Functional, or Perceptual?", "back": "A formal region has measurable internal homogeneity (Corn Belt, Bible Belt). A functional region is organized around a central node with flows radiating outward (MSA, newspaper circulation area). A perceptual region exists in collective mental maps rather than objective data ('the South,' Acadiana). Many real regions combine types—the Bible Belt is simultaneously formal (measurable congregation density) and perceptual (widely varying mental maps of its extent). Identifying which evidence the question provides tells you which classification the College Board is testing.", "id": "fc20"}, {"front": "Why are place names (toponyms) contested?", "back": "Toponyms encode whose sense of place receives official recognition. American toponymy includes systematic erasure of indigenous names replaced by European ones—'Manhattan' (Lenape) and 'Chicago' (Miami-Illinois) survived, but thousands of indigenous place names were overwritten. Contemporary contests over renaming—mountains, schools, streets honoring figures now understood as symbols of oppression—are debates about whose historical memory the landscape should reflect. Every renaming is both a geographic and a political act.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
