<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>AP Human Geography &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "Thomas Robert Malthus (1766–1834)", "back": "English clergyman and political economist whose Essay on the Principle of Population (1798) argued that population growth outpaces food supply. First professor of political economy at the East India Company College (Haileybury). His geometric–arithmetic model influenced Charles Darwin, who credited reading Malthus in 1838 with crystallizing his understanding of natural selection. Later editions softened his fatalism by adding 'moral restraint' (delayed marriage, abstinence) as a preventive check.", "id": "fc01"}, {"front": "Malthusian geometric vs. arithmetic growth", "back": "Malthus's core mathematical claim: population, when unchecked, grows in a geometric ratio (1, 2, 4, 8, 16…), while food supply can grow at most in an arithmetic ratio (1, 2, 3, 4, 5…). The inevitable result of this disparity is that population will always tend to press against the limits of subsistence. He treated both premises — food necessity and sexual passion — as fixed laws of human nature.", "id": "fc02"}, {"front": "Malthusian Crisis", "back": "The predicted outcome when population growth outstrips food production capacity, leading to 'positive checks' — famine, disease, war — that raise death rates and restore equilibrium. Malthus also identified 'preventive checks' (delayed marriage, celibacy) that could limit growth before crisis. Neo-Malthusians extend the concept to resource scarcity beyond food: water, fossil fuels, arable land, and atmospheric carbon-absorptive capacity.", "id": "fc03"}, {"front": "Malthusian positive checks vs. preventive checks", "back": "Positive checks raise death rates after a population overshoots resources: famine, epidemic disease, and war. They restore equilibrium forcibly. Preventive checks reduce birth rates before the crisis: delayed marriage, abstinence (moral restraint). Malthus considered preventive checks difficult to sustain at scale and therefore expected positive checks to be the more common equilibrating mechanism.", "id": "fc04"}, {"front": "Neo-Malthusianism", "back": "Twentieth-century application of Malthusian resource-scarcity logic to a wider range of threats. Key examples: Paul Ehrlich's The Population Bomb (1968) predicting mass famine; the Club of Rome's Limits to Growth (1972) modeling resource depletion; Robert Kaplan's 'The Coming Anarchy' (1994) linking scarcity to political instability. Critics note that predicted crises repeatedly failed to materialize because human ingenuity relaxed constraints that seemed absolute.", "id": "fc05"}, {"front": "The empirical failure of Malthusian pessimism", "back": "Since Malthus wrote in 1798, global population grew from ~1 billion to ~8 billion — yet per-capita food availability also rose. The world in 2024 produces more calories per person than in 1798. The Green Revolution (high-yield dwarf wheat and rice varieties by Norman Borlaug and the IRRI) transformed India from a food-aid recipient to a net food exporter by the late 1970s, precisely when Ehrlich predicted mass famine. The Simon–Ehrlich wager (1980–1990) confirmed that resource prices fell as population grew.", "id": "fc06"}, {"front": "Simon–Ehrlich wager (1980–1990)", "back": "Economist Julian Simon bet Paul Ehrlich that five industrial metals chosen by Ehrlich would fall in inflation-adjusted price over the decade, arguing human ingenuity expands effective supply faster than population expands demand. Ehrlich accepted, predicting scarcity-driven price spikes. By 1990 all five metals had fallen in price. Simon won. The wager crystallized the empirical conflict between Malthusian pessimism and Boserupian optimism.", "id": "fc07"}, {"front": "Ester Boserup (1910–1999)", "back": "Danish agricultural economist whose The Conditions of Agricultural Change (1965) argued that population pressure stimulates agricultural innovation rather than triggering inevitable crisis. Spent decades as a researcher for the UN Food and Agriculture Organization (FAO) and the World Bank, studying agricultural development in Africa, South Asia, and Latin America. Her fieldwork gave her thesis empirical grounding that purely theoretical Malthusianism lacked. Extended her argument to industrial technology in Population and Technological Change (1981).", "id": "fc08"}, {"front": "Boserup Hypothesis (1965)", "back": "Population pressure is the primary stimulus for agricultural intensification. Central claim: as population density rises, farmers shift from extensive to intensive cultivation systems, adopting new technologies that raise output per unit of land. Necessity is the mother of agricultural invention. Rather than population growth leading to famine (Malthus), Boserup argued it drives innovation that raises carrying capacity.", "id": "fc09"}, {"front": "Boserup's five stages of agricultural intensification", "back": "1) Forest-fallow: cultivated every 20–25 years; only feasible at very low density. 2) Bush-fallow: every 6–10 years; shorter fallow from secondary scrub. 3) Short-fallow: every 1–2 years; more labor to maintain fertility. 4) Annual cropping: cultivated every year with systematic soil management. 5) Multi-cropping: two or more harvests per year on the same land; requires irrigation, high-yield varieties, intensive fertilization, and capital investment.", "id": "fc10"}, {"front": "Evidence supporting and critiquing the Boserup Hypothesis", "back": "Support: Agricultural histories of China, Java, and Bangladesh — densely populated regions — show intensive multi-cropping systems rather than famine and collapse. The Green Revolution may be a Boserupian outcome: pressure of a billion-person food gap drove high-yield variety development. Critique: Underestimates environmental costs of intensification (soil salinization, aquifer depletion, biodiversity loss). Sub-Saharan Africa in the 1970s–80s — where population growth outpaced agricultural adaptation and famine resulted — is a partial vindication of Malthus.", "id": "fc11"}, {"front": "Malthus–Boserup dialectic", "back": "The central intellectual tension in population geography. Malthus: population presses against resource limits; without checks it generates misery. Boserup: population pressure drives innovation; human ingenuity repeatedly relaxes the limits Malthus treats as fixed. Contemporary geography does not declare a winner — outcomes depend on context: whether governance enables technological adoption (Boserup may hold) and whether environmental thresholds are crossed before adaptation occurs (Malthus may prevail).", "id": "fc12"}, {"front": "John Snow (1813–1858) and medical geography", "back": "A London physician who in 1854 used spatial mapping of cholera deaths in Soho to challenge the miasma theory and identify the Broad Street water pump as the transmission source. His method — plotting each fatality as a dot on a large-scale street map — anticipated modern GIS by over a century. Snow is regarded as the founder of medical geography: the subfield concerned with the spatial distribution of disease, health outcomes, and healthcare access.", "id": "fc13"}, {"front": "Snow's Broad Street pump investigation (1854)", "back": "Snow mapped every cholera death in Soho, revealing a tight cluster around the Broad Street pump. Two anomalies strengthened the case: a brewery adjacent to the pump had no employee deaths (workers drank brewery water and beer); a widow in distant Hampstead died after she had a cart collect Broad Street water weekly. On the strength of the spatial evidence, Snow persuaded the Board of Guardians to remove the pump handle on 8 September 1854. The epidemic subsided.", "id": "fc14"}, {"front": "Pronatalist population policy", "back": "Government policies that aim to increase birth rates, typically in Stage-4 or Stage-5 countries concerned about aging populations and labor shortages. Examples: France's allocations familiales (cash payments for families with 2+ children), subsidized childcare, paid parental leave; Singapore's 'Three or More' campaign (1987) offering cash bonuses and tax rebates for third and fourth children. Despite incentives, Singapore's TFR (~1.0 in the 2020s) illustrates how difficult it is to reverse the fertility transition through financial means alone.", "id": "fc15"}, {"front": "Antinatalist population policy", "back": "Government policies that aim to reduce birth rates, typically in Stage-2 countries concerned about rapid growth, resource scarcity, or poverty. China's one-child policy (1980–2015) is the most radical modern example: imposed a limit of one child per urban family, reducing China's TFR from ~2.8 in 1979 to 1.5–1.6 by the 1990s. Legacy costs: rapidly aging population, skewed sex ratio (selective abortion of female fetuses), and shrinking labor force. China moved to a two-child policy (2016) and three-child policy (2021); TFR continued to fall.", "id": "fc16"}, {"front": "China's one-child policy: causes, effects, and legacy", "back": "Cause: rapid population growth threatening to overwhelm agricultural and economic capacity. Policy (1980–2015): one child per urban family; rural exceptions if first child was a daughter; ethnic-minority exceptions. Enforcement ranged from financial penalties to documented coercive sterilization and forced abortion. Effects: TFR from ~2.8 to 1.5–1.6; accelerated economic growth by reducing youth-dependency ratio. Legacy: aging population, skewed sex ratio, shrinking labor force. TFR continued declining after the two-child (2016) and three-child (2021) shifts.", "id": "fc17"}, {"front": "Medical geography", "back": "The subfield of geography concerned with the spatial distribution of disease, health outcomes, and healthcare access. Founded by John Snow's 1854 cholera mapping. The essential geographic insight: location is data — where people get sick is a signal about the transmission mechanism, not random noise. The logic underlies contemporary epidemiology, from tracking HIV/AIDS diffusion corridors to modeling COVID-19 spread and GIS-based disease surveillance.", "id": "fc18"}, {"front": "Synthesis: When does the Boserup optimism hold, and when does Malthusian pessimism prevail?", "back": "Boserup's optimism is more likely to hold in well-governed, open economies with infrastructure for technology adoption and investment — the conditions under which the Green Revolution succeeded in South and Southeast Asia. Malthusian pessimism is more likely to prevail in governance-weak or ecologically fragile settings where adaptation cannot occur before environmental thresholds are crossed — as in parts of sub-Saharan Africa during the 1970s–80s famines. The debate is alive in contemporary climate-change and food-security arguments.", "id": "fc19"}, {"front": "Why does Malthus's model fail empirically even though it is logically coherent?", "back": "Because it treats agricultural technology as fixed, when in practice technology is a function of incentives, institutions, and cumulative human ingenuity. The geometric–arithmetic disparity Malthus described would produce disaster in a static-technology world, but the post-1798 record shows that technological innovation has repeatedly relaxed the food-supply constraint faster than population has expanded demand. Malthus was correct that the population-resource relationship is a real constraint; he was wrong that the ceiling is fixed.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
