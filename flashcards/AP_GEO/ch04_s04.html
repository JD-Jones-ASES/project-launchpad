<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Human Geography &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 4, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "Centripetal forces", "back": "Conditions, institutions, and ideas that bind a state's population together and reinforce national identity. The most powerful centripetal forces are typically cultural: a shared national language, a shared religion (when it distinguishes a people from neighbors), shared history and civic religion, infrastructure, and economic interdependencies. France's active promotion of French over regional languages is a classic example.", "id": "fc01"}, {"front": "Centrifugal forces", "back": "Conditions and dynamics that drive populations away from unity and toward fragmentation, autonomy, or secession. Include: ethnic and religious conflict, economic disparities between regions, physical distance and geographic barriers, and the internet's power to sustain regional grievances in parallel information ecosystems. Centrifugal forces produce devolution pressure and, in extreme cases, secession.", "id": "fc02"}, {"front": "Devolution", "back": "The transfer of authority from a central government to sub-national units (regions, provinces, autonomous communities) without abolishing central sovereignty. A middle path between unitary centralism and outright secession — political geography's most common response to centrifugal pressure. Examples: Catalonia (Spain), Scotland (UK), Quebec (Canada), South Sudan (Sudan).", "id": "fc03"}, {"front": "Case study: Catalonia (2017)", "back": "Catalonia held an independence referendum in October 2017 after failed fiscal negotiations with Madrid. The Spanish government declared it unconstitutional; the Constitutional Court agreed; Spanish security forces attempted to prevent voting. Catalonia briefly declared independence before Spain invoked Article 155 to suspend Catalan self-government and impose direct rule. Senior Catalan officials were imprisoned or fled into exile. Illustrates both the power of devolutionary pressure and limits of subnational self-determination within a constitutional order.", "id": "fc04"}, {"front": "Case study: Scotland (2014 and Brexit aftermath)", "back": "Scotland voted in September 2014 to remain in the UK (55.3%–44.7%). After the 2016 Brexit referendum — in which England and Wales voted to leave the EU while Scotland voted 62% to remain — Scottish independence advocates argued Scotland was being 'dragged out' against its will. In 2022, the UK Supreme Court ruled the Scottish Parliament cannot hold a binding independence referendum without Westminster's consent.", "id": "fc05"}, {"front": "Case study: South Sudan (2011)", "back": "South Sudan became the world's newest internationally recognized country on July 9, 2011, following a January 2011 referendum in which 98.8% of southern Sudanese voted for independence from Sudan. Driven by decades of civil war between the predominantly Muslim/Arab-identified north and the predominantly Christian/animist south, plus competition over southern oil fields. Within two years of independence, South Sudan descended into its own civil war (2013–2020).", "id": "fc06"}, {"front": "Case study: Quebec (1980 and 1995 referenda)", "back": "French-speaking Quebec held two independence referenda. The first (1980) failed 59.6%–40.4%. The second (1995) came within 50,000 votes of passing: 'No' won by 50.58%–49.42%. Canada's federal response was the Clarity Act (2000), establishing conditions for negotiating secession after a future referendum: a 'clear question' and a 'clear majority.' Quebec's independence movement has since receded, illustrating that devolutionary pressure can be managed through federal accommodation.", "id": "fc07"}, {"front": "Canada's Clarity Act (2000)", "back": "Federal legislation passed in response to the 1995 Quebec referendum, establishing that the federal government would negotiate secession only after a referendum with a 'clear question' and a 'clear majority.' Illustrates a constitutional mechanism for managing devolutionary pressure without either automatically granting or permanently blocking independence.", "id": "fc08"}, {"front": "Supranationalism", "back": "The pooling of aspects of state sovereignty into multinational organizations for shared purposes. Supranationalism operates above states, shifting power upward from the national scale to the global scale — the opposite direction from devolution (which shifts power downward to sub-national units). Examples: the United Nations, NATO, ASEAN, the African Union, and most deeply, the European Union.", "id": "fc09"}, {"front": "NATO (1949)", "back": "The North Atlantic Treaty Organization, a military alliance among 32 member states (as of 2024) whose Article 5 commits each member to treat an attack on any member as an attack on all — a deep pooling of military sovereignty. NATO's eastward expansion after the Cold War (incorporating former Warsaw Pact states) became a central Russian foreign policy grievance and a factor in Russia's 2022 full-scale invasion of Ukraine.", "id": "fc10"}, {"front": "European Union — stages of supranational integration", "back": "ECSC (1951): pooled French-German coal and steel to make renewed war economically irrational. EEC (1957, Treaty of Rome): common market for goods, services, capital, and labor. Maastricht Treaty (1993): EU citizenship, plans for common currency, shared foreign policy. Eurozone (1999): 11 states transferred monetary sovereignty (interest rates, money supply) to the European Central Bank — the deepest sovereignty pooling in history.", "id": "fc11"}, {"front": "Brexit (2020)", "back": "The United Kingdom formally left the European Union on January 31, 2020 — the first significant reversal of European supranational integration. A June 2016 referendum produced a 52–48% vote to leave. Brexit demonstrated that supranational integration is not necessarily irreversible and that voluntary sovereignty pooling depends on the ongoing consent of democratic electorates.", "id": "fc12"}, {"front": "Responsibility to Protect (R2P)", "back": "A doctrine endorsed by the UN General Assembly (2005 World Summit) holding that sovereignty is not a shield: when a state fails to protect its population from genocide, war crimes, ethnic cleansing, or crimes against humanity — or perpetrates them — the international community has a responsibility to act, including through coercive measures. Emerged from failures of international response to Rwanda (1994) and Srebrenica (1995).", "id": "fc13"}, {"front": "R2P and the Libya intervention (2011)", "back": "R2P was invoked to authorize NATO airstrikes when the UN Security Council authorized 'all necessary measures' to protect Libyan civilians from Gaddafi's forces. The intervention prevented a massacre in Benghazi but contributed to the collapse of the Libyan state. Russia and China argued afterward it exceeded its mandate (effectively pursuing regime change), and vetoed Security Council action on Syria — demonstrating that R2P's application depends entirely on great-power politics.", "id": "fc14"}, {"front": "ASEAN (1967)", "back": "The Association of Southeast Asian Nations — a regional organization of ten Southeast Asian states promoting economic integration, political dialogue, and conflict reduction through a norm of non-interference in members' internal affairs. The non-intervention principle has been criticized as a shield for authoritarian governments but has enabled sustained economic cooperation across a region of remarkable cultural and political diversity.", "id": "fc15"}, {"front": "Devolution vs. supranationalism — scale analysis", "back": "Devolution shifts power downward from the national scale to the regional or local scale. Supranationalism shifts power upward from the national scale to the global scale. A single policy domain (e.g., environmental regulation) can simultaneously involve all scales: a local municipality, a national carbon-pricing policy, an EU emissions target, and a Paris Accord aspirational target — illustrating how the same process looks different at different geographic scales.", "id": "fc16"}, {"front": "Centripetal force: shared language", "back": "A shared national language is one of the most consistently cited unifying forces. France actively suppressed regional languages (Breton, Occitan, Basque, Alsatian) from the Revolution onward, using public schools and the military to homogenize language. Japan's near-universal literacy in a common written language reinforces high social cohesion. States with multiple official languages (Canada, Switzerland, Belgium) must actively manage linguistic pluralism to prevent it from becoming a centrifugal force.", "id": "fc17"}, {"front": "Benedict Anderson's 'imagined community'", "back": "Sociologist Benedict Anderson's concept that nations are 'imagined communities' — large groups whose members will never meet but who perceive themselves as sharing a common identity through shared history, civic religion, national holidays, monuments, museums, and official narratives. Political elites deploy national mythology (American Revolution, French Republic, South African 'rainbow nation') as symbolic resources for building solidarity.", "id": "fc18"}, {"front": "African Union (AU, 2002)", "back": "The successor to the Organization of African Unity, including all 55 recognized African states. Coordinates continental policy on peace and security, economic integration, and governance. Has deployed peacekeeping missions and attempted to sanction unconstitutional changes of government, but its capacity is severely constrained by funding limitations and member-state reluctance to cede national authority.", "id": "fc19"}, {"front": "Synthesis: Why does devolution succeed in some cases and fail in others?", "back": "Quebec illustrates successful management through federal accommodation (Clarity Act). Scotland illustrates ongoing tension managed within constitutional constraints. Catalonia illustrates suppression — the Spanish government's invocation of Article 155 and criminal prosecution of leaders. South Sudan illustrates successful secession followed by internal collapse. Key variables: constitutional flexibility of the center, economic grievances, degree of cultural distinctiveness, and availability of a credible legal pathway for the subnational claim.", "id": "fc20"}, {"front": "Synthesis: Sovereignty under pressure from all directions", "back": "Modern state sovereignty is simultaneously eroded from above (supranational bodies, MNCs, NGOs, international human rights law, R2P doctrine) and from below (devolution demands, secessionist movements, stateless nations). Brexit was a state attempting to reclaim sovereignty from above; Catalonia was a region attempting to break free from sovereignty below. These opposing pressures define the central tension in Unit 4's political geography.", "id": "fc21"}, {"front": "Synthesis: R2P as a challenge to Westphalian sovereignty", "back": "The Westphalian system guarantees non-interference in states' internal affairs. R2P directly challenges this by asserting that sovereignty is conditional — a state that massacres its own population forfeits its claim to non-interference. The doctrine represents the furthest evolution of the post-1945 erosion of absolute sovereignty, but its selective application (Libya yes, Syria no) illustrates that great-power veto power determines when norms are enforced.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
