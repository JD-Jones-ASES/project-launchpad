<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Human Geography &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Remote Sensing", "back": "The acquisition of data about the Earth's surface or atmosphere from a distance, using sensors mounted on satellites, aircraft, or drones. Passive systems measure reflected solar radiation or emitted thermal energy (including optical cameras and multispectral sensors). Active systems emit their own energy pulses and measure the return signal—LiDAR and radar are the most common active systems. Remote sensing enables systematic monitoring of the entire planet's surface at regular intervals.", "id": "fc01"}, {"front": "Passive vs. Active Remote Sensing", "back": "Passive remote sensing systems detect radiation that is naturally emitted or reflected by the Earth, including visible light and thermal infrared—they require an external energy source (usually the sun). Active remote sensing systems emit their own energy pulses and measure what returns; LiDAR (laser pulses) and radar are the primary examples. Active systems can operate at night and through cloud cover.", "id": "fc02"}, {"front": "Landsat Program", "back": "A joint NASA/U.S. Geological Survey satellite Earth observation program whose first satellite launched in 1972. Landsat satellites carry multispectral sensors recording reflectance across visible, near-infrared, shortwave infrared, and thermal infrared bands. The near-infrared band is particularly valuable for vegetation monitoring, as healthy plants strongly reflect near-infrared—a fact invisible to the human eye but clearly captured by multispectral sensors.", "id": "fc03"}, {"front": "NDVI (Normalized Difference Vegetation Index)", "back": "A ratio derived from multispectral satellite data comparing near-infrared reflectance to red reflectance. Healthy green plants strongly reflect near-infrared while absorbing red light, producing a high NDVI value; stressed or dying vegetation produces lower values. Used globally to monitor drought, deforestation, crop health, and the advance or retreat of vegetation under climate change.", "id": "fc04"}, {"front": "LiDAR (Light Detection and Ranging)", "back": "An active remote sensing technology that emits rapid laser pulses and measures return times to build precise three-dimensional point clouds of terrain—capable of resolving elevation differences of centimeters across entire landscapes. Transformative in archaeology (can 'see through' forest canopy to reveal ancient structures), urban planning (building-height models for flood risk analysis), and autonomous vehicle navigation. Airborne LiDAR surveys of the Petén, Guatemala, beginning in 2010 revealed an interconnected Maya urban network beneath the rainforest, revising pre-Columbian population estimates upward by an order of magnitude.", "id": "fc05"}, {"front": "GPS (Global Positioning System)", "back": "A space-based navigation system operated by the U.S. Air Force, consisting of at least 24 satellites in medium Earth orbit (~20,200 km altitude), declared fully operational in 1995. GPS receivers calculate position through trilateration—measuring signal travel times from four or more satellites to determine three-dimensional location. Civilian accuracy is approximately 3–5 meters; differential GPS achieves centimeter-level accuracy used in precision agriculture and surveying.", "id": "fc06"}, {"front": "Trilateration", "back": "The technique GPS receivers use to determine position. A signal from one satellite constrains the receiver to a sphere; two satellites constrain it to a circle; three to two points; four or more resolve it to a single point, also correcting for clock drift. Trilateration differs from triangulation (which uses angles) in that it uses measured distances from known reference points.", "id": "fc07"}, {"front": "GIS (Geographic Information System)", "back": "An integrated software system for capturing, storing, manipulating, analyzing, and displaying spatially referenced information. GIS stores geographic features as vector data (points, lines, polygons for discrete objects) or raster data (a grid of cells representing continuous surfaces). The ability to overlay and query multiple data layers simultaneously makes GIS the primary analytical tool of contemporary geography, urban planning, epidemiology, and environmental management.", "id": "fc08"}, {"front": "Vector Data (GIS)", "back": "A GIS data format that represents geographic features as points (a well, a school), lines (a road, a river centerline), or polygons (a county boundary, a building footprint). Vector data excel at representing discrete, bounded objects and are well suited to network analysis such as routing and connectivity modeling.", "id": "fc09"}, {"front": "Raster Data (GIS)", "back": "A GIS data format that divides the landscape into a regular grid of cells, each assigned a value representing a geographic variable. Satellite imagery and digital elevation models are common raster datasets. Raster data excel at representing continuous spatial variation—temperature, elevation, vegetation density—and support surface analysis operations such as slope calculation and watershed delineation.", "id": "fc10"}, {"front": "Quantitative Spatial Data", "back": "Measurable, numeric values attached to locations—population counts, average annual precipitation, crime rates, housing values. Quantitative data are essential for identifying patterns across large numbers of places, testing hypotheses statistically, and producing choropleth and proportional symbol maps. Collected by governments (censuses), businesses (GPS traces, point-of-sale data), and satellite sensors. Their limitation: they capture what can be counted but remain silent about meaning.", "id": "fc11"}, {"front": "Qualitative Spatial Data", "back": "Descriptive, interpretive, or narrative information about places—ethnographic field notes, historical photographs, residents' descriptions of neighborhood character, community-drawn mental maps. Qualitative data fill the gap that quantitative data leave by capturing how people experience, understand, and construct their spatial worlds. Yi-Fu Tuan's foundational work on topophilia drew primarily on qualitative evidence: literary texts, personal narratives, and architectural analysis.", "id": "fc12"}, {"front": "VGI — Volunteered Geographic Information", "back": "Spatial data created and shared by private individuals using internet-connected devices—smartphones, GPS-enabled cameras, web browsers—without formal training as surveyors or cartographers. The term was coined by geographer Michael Goodchild in 2007. VGI ranges from deliberate contributions (adding a building to OpenStreetMap) to incidental location data (a geotagged social media post). VGI has dramatically expanded spatial data coverage, particularly in regions where official mapping is incomplete, while raising questions about data quality, spatial coverage bias, and privacy.", "id": "fc13"}, {"front": "OpenStreetMap (OSM)", "back": "The most important VGI project in the world, launched in 2004 by Steve Coast in London. A free, editable, openly licensed map of the world built collaboratively by millions of volunteers who contribute roads, buildings, land use, and points of interest from GPS surveys, aerial imagery tracing, and local knowledge. As of the mid-2020s, OSM contains over 8 billion geographic nodes and is often the most detailed geographic reference available in regions where commercial mapping services have incomplete coverage.", "id": "fc14"}, {"front": "Ushahidi", "back": "A crisis-mapping platform developed in Kenya in the aftermath of the disputed 2007 presidential election. The platform allowed anyone with a mobile phone to text-message reports of violence incidents, which were geocoded and displayed on a web map in near-real time—creating the only comprehensive spatial record of the crisis. 'Ushahidi' means 'testimony' in Swahili. Subsequently used in the Haiti earthquake (2010), Pakistan flooding (2010), and election monitoring across Africa; demonstrated that crisis-affected communities are often the best-positioned spatial data producers.", "id": "fc15"}, {"front": "Michael Goodchild", "back": "The geographer who coined the term 'Volunteered Geographic Information' (VGI) in 2007, naming and theorizing the phenomenon of private individuals creating and sharing spatial data via networked platforms. His work helped establish VGI as a legitimate and transformative category of geographic data production, distinct from both professional surveying and traditional remote sensing.", "id": "fc16"}, {"front": "MODIS (Moderate Resolution Imaging Spectroradiometer)", "back": "An instrument launched aboard NASA's Terra satellite in 1999 that captures daily global imagery at moderate resolution (250 m to 1 km per pixel). MODIS has been central to tracking global land-cover change, wildfire, and sea surface temperature for over two decades. Its daily global coverage makes it especially valuable for monitoring rapidly changing phenomena like wildfires and flooding.", "id": "fc17"}, {"front": "Spatial Coverage Bias in VGI", "back": "A key limitation of Volunteered Geographic Information: VGI data density reflects the demographics of who participates rather than the actual geography of phenomena. Ushahidi's crisis map was most detailed in urban areas and near universities (where mobile penetration and digital literacy were highest), while rural areas remained comparatively data-sparse. Similarly, OpenStreetMap coverage is densest in wealthy, tech-connected regions. Identifying coverage bias is an essential part of interpreting VGI-derived maps.", "id": "fc18"}, {"front": "Integrated Geospatial Infrastructure", "back": "The convergence of remote sensing, GPS, and GIS into a system that makes it possible to study the entire planet's surface with unprecedented precision and temporal frequency. Remote sensing provides raw observations; GPS provides precise locational reference; GIS provides the analytical environment in which these datasets—combined with census records and VGI—can be layered and queried. Understanding what each technology can and cannot do is essential for interpreting any map or spatial analysis.", "id": "fc19"}, {"front": "How did LiDAR transform Maya archaeology?", "back": "Airborne LiDAR surveys of the Petén region of Guatemala beginning in 2010 revealed an interconnected network of Maya cities, causeways, and agricultural terraces concealed beneath rainforest canopy. Because LiDAR pulses penetrate vegetation gaps to detect the ground surface below, structures invisible to conventional aerial photography were mapped in detail. The surveys fundamentally revised estimates of the pre-Columbian Maya population upward by an order of magnitude, demonstrating that LiDAR can 'see' what optical remote sensing cannot.", "id": "fc20"}, {"front": "Data Analysis Skill: Evaluating Geospatial Data Sources", "back": "When an AP exam stimulus presents a choropleth, satellite image, or GIS-derived data table, a full response must identify not only what pattern is visible but also what the data source's limitations are for answering the geographic question. A GIS-modeled flood risk map is only as accurate as its underlying elevation model; a LiDAR-derived model is far more precise than older survey-based data. For VGI-derived data, ask: who contributed these data, and which communities are likely under-represented?", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
