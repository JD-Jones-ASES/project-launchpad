    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "Gross Domestic Product (GDP) vs. Gross National Income (GNI)", "back": "GDP measures the total market value of goods and services produced within a country's borders, regardless of who owns the means of production. GNI adds income earned abroad by a country's residents and subtracts income earned domestically by foreigners. GNI matters especially for countries like the Philippines and Mexico, where migrant remittances are a large share of national income.", "id": "fc01"}, {"front": "Purchasing Power Parity (PPP)", "back": "A statistical adjustment that converts GNI per capita to a common price level by using a standardized basket of goods, making cross-country income comparisons more meaningful. A haircut costs $30 in New York but $3 in Dhaka; nominal comparisons understate living standards in poor countries. Under PPP, India's per capita income roughly triples compared to the nominal market-exchange-rate figure.", "id": "fc02"}, {"front": "GNI per capita (PPP-adjusted) — definition and range", "back": "The World Bank's preferred single-number development benchmark: sums domestic production plus net income flows from abroad, divides by population, and adjusts for price-level differences. Range: Norway exceeds $80,000; Niger falls below $1,400 — a ratio of roughly 60:1 capturing the extreme spread of material living standards in the contemporary world.", "id": "fc03"}, {"front": "Human Development Index (HDI) — three pillars", "back": "Introduced in 1990 by Mahbub ul Haq and Amartya Sen. Combines three dimensions: (1) Health — life expectancy at birth; (2) Education — mean years of schooling for adults and expected years of schooling for children; (3) Standard of living — GNI per capita (PPP). Each dimension is indexed 0–1 and combined geometrically (not averaged), so a country cannot compensate a very low score in one dimension by scoring high in another.", "id": "fc04"}, {"front": "Why use a geometric mean in the HDI?", "back": "The geometric mean means that all three dimensions — health, education, and income — must improve together for the overall index to rise. A country cannot offset a very low health score by a very high income score (as a simple average would allow). This design reflects the view that human development requires balanced progress across all three dimensions, not just economic growth.", "id": "fc05"}, {"front": "Gender Inequality Index (GII)", "back": "Introduced in 2010 to replace earlier gender-development measures. Measures gender-based disadvantage across three dimensions: (1) Reproductive health — maternal mortality ratio and adolescent birth rate; (2) Empowerment — parliamentary seats and secondary/higher education, by sex; (3) Labor market participation. Framed explicitly as a loss of human development: countries lose HDI points they could have earned if women and men had equal opportunities. Norway ≈ 0; Yemen/Chad ≈ 1.", "id": "fc06"}, {"front": "Multidimensional Poverty Index (MPI)", "back": "Developed by the Oxford Poverty and Human Development Initiative (OPHI). Identifies the poor not by income alone but by simultaneous deprivations across ten indicators in three clusters: health (nutrition, child mortality), education (years of schooling, attendance), and living standards (cooking fuel, sanitation, water, electricity, housing, assets). A household is 'multidimensionally poor' if deprived in at least one-third of the weighted indicators.", "id": "fc07"}, {"front": "Why does MPI differ from income poverty measures?", "back": "A family may earn just above the $2.15/day income poverty line but still lack clean water, sanitation, and any schooling — deprivations invisible to income-only measures. The MPI consistently reveals that income poverty misses substantial hardship. Conversely, some families below the income line have access to public health care and schools, making their 'multidimensional poverty' lower than income suggests.", "id": "fc08"}, {"front": "Rostow's Stages of Economic Growth (1960) — five stages", "back": "(1) Traditional Society: subsistence agriculture, limited science. (2) Preconditions for Take-Off: entrepreneurial elite, infrastructure investment, scientific ideas in agriculture. (3) Take-Off: sustained growth, leading sector drives economy, urban-industrial regions emerge. (4) Drive to Maturity: economy diversifies beyond the leading sector, modern technology spreads. (5) Age of High Mass Consumption: leading sector shifts to consumer durables and services; welfare-state programs.", "id": "fc09"}, {"front": "Walt Rostow (1916–2003) — context", "back": "American economist and National Security Council staff member under Presidents Kennedy and Johnson. Wrote The Stages of Economic Growth (1960) explicitly as a Cold War policy document, subtitling it 'A Non-Communist Manifesto.' The U.S. government adopted the Stages as the theoretical justification for foreign aid: give developing nations capital and technical assistance, and they will take off along the Western road — no need for Marxist frameworks.", "id": "fc10"}, {"front": "Evidence supporting Rostow's model", "back": "South Korea's GDP per capita grew from ~$155 (1960) to over $33,000 today — a trajectory that Rostow's take-off and drive-to-maturity stages describe plausibly. Taiwan, Singapore, and Hong Kong followed similar curves. China's post-1978 growth is, for Rostow's supporters, the world's largest take-off — a peasant agrarian economy transitioning to industrial powerhouse in roughly three decades.", "id": "fc11"}, {"front": "Critique of Rostow's model", "back": "The model is linear, teleological (implying a pre-determined Western endpoint), and implicitly Eurocentric. It ignores colonialism's role in shaping 'preconditions' — many non-Western societies were deliberately deindustrialized to serve as raw-material exporters. It treats all 'traditional societies' as equivalent starting points. It cannot explain why some countries have remained in Stage 1 or 2 for generations despite receiving exactly the capital and technical assistance Rostow prescribed.", "id": "fc12"}, {"front": "Wallerstein's World-Systems Theory (1974) — core claim", "back": "The modern world economy is a single capitalist world-system that reproduces inequality through unequal exchange. Poor countries are not at an earlier developmental stage — they are poor because the system requires some zones to be subordinate for the benefit of others. Poverty is not an original condition but a produced condition — a structural argument, not a developmental-lag argument.", "id": "fc13"}, {"front": "Core, semi-periphery, periphery (Wallerstein)", "back": "Core: advanced technology, capital-intensive industries, skilled labor, strong states (US, Germany, Japan, South Korea). Semi-periphery: intermediate position — exploits peripheral zones while being exploited by core; serves as a political buffer preventing periphery from uniting against core (Brazil, Mexico, China, India, Russia, South Africa). Periphery: supplies raw materials and low-wage labor; weaker states, narrow specialization, disadvantageous terms of trade (Sub-Saharan Africa, Haiti, Central Asian republics).", "id": "fc14"}, {"front": "Unequal exchange (Wallerstein)", "back": "When a Congolese miner extracts cobalt for a dollar a day and that cobalt ends up in a lithium-ion battery sold in Frankfurt for $80,000, the value created by labor in the periphery is captured in the core. Trade at world prices looks equal; the embedded labor values are not. This reproduces poverty without requiring direct coercion — the mechanism is market exchange itself.", "id": "fc15"}, {"front": "Immanuel Wallerstein (1930–2019) — biography", "back": "American sociologist trained at Columbia; studied decolonization movements of the 1950s–60s. His three-volume The Modern World-System (1974–1989) applied long-run historical analysis (drawing on Fernand Braudel's Annales school) to construct a theory of global capitalism since the 'long sixteenth century.' Spent most of his career at SUNY Binghamton, where he founded the Fernand Braudel Center. Died in Amsterdam, 2019.", "id": "fc16"}, {"front": "Semi-peripheral mobility — and its limits", "back": "Wallerstein acknowledged that individual countries can move between zones: South Korea moved from semi-periphery to core; Mexico moved from periphery to semi-periphery. But the system's overall structure of inequality is self-reproducing: someone must occupy the periphery. The Tigers' rise does not refute the model — it merely shows which countries escaped their zone while others were pushed down to fill it.", "id": "fc17"}, {"front": "Critique of Wallerstein's World-Systems Theory", "back": "Accused of structural determinism: if the system always reproduces itself, how do the East Asian Tigers' rises get explained? It underweights domestic institutions, culture, and policy choices. Its Marxist framing makes it politically contested rather than a neutral analytical tool. It also struggles to account for variation within the periphery — why do some peripheral countries perform better than others under the same world-system rules?", "id": "fc18"}, {"front": "Rostow vs. Wallerstein — contrasting frameworks", "back": "Rostow: all countries are on the same developmental road; wealthy nations are simply further ahead. Development requires capital, technology, and institutional modernization. Wallerstein: rich and poor countries are not on the same road — the rich countries' road was built from the poverty of the poor. Development is structurally constrained by the world-system. Both are partial; together they frame the central debates of development geography.", "id": "fc19"}, {"front": "Singapore vs. Syria — Rostow vs. Wallerstein comparison", "back": "Rostow would explain Singapore's success as a successful take-off driven by good governance, export orientation, and human-capital investment — and Syria's stagnation as a failure to create the institutional preconditions. Wallerstein would locate Singapore's success in its strategic semi-peripheral position (Strait of Malacca break-of-bulk, political stability attractive to core capital) and Syria's trajectory in peripheral resource dependence, geopolitical vulnerability, and core-country interference.", "id": "fc20"}, {"front": "Extreme poverty reduction (1990–2024) — geographic pattern", "back": "Global extreme poverty fell from ~38% of humanity (1.9 billion people) in 1990 to ~9% (700 million) by 2019. Geographically concentrated: most reduction in East and South Asia, with China alone accounting for over 800 million people escaping poverty between 1981 and 2015. Sub-Saharan Africa made percentage progress but saw absolute numbers rise as population growth outpaced poverty reduction. COVID-19 (2020) reversed gains, pushing ~97 million additional people into extreme poverty.", "id": "fc21"}, {"front": "HDI outliers — Cuba and Sri Lanka", "back": "Cuba and Sri Lanka typically score significantly higher on the HDI than their GNI per capita would predict, because both countries made strong public investments in health care and education. This is a key AP exam example: it demonstrates that income alone does not determine human development outcomes and that state policy choices — particularly universal health and education provision — can produce development dividends independent of income level.", "id": "fc22"}, {"front": "Synthesis: Why is the MPI more useful than the $2.15/day line for measuring poverty in the periphery?", "back": "The $2.15/day line is a monetary threshold that misses non-income dimensions of deprivation — lack of sanitation, unsafe drinking water, no schooling, inadequate housing — that are endemic in peripheral countries. The MPI captures the overlapping deprivations that trap households in poverty traps regardless of cash income. In sub-Saharan Africa and South Asia, MPI headcounts typically far exceed income-poverty headcounts, revealing the depth of structural disadvantage that Wallerstein's framework would predict as a feature, not a bug, of the world-system.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
