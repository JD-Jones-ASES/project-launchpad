    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 3, Section 4</p>
            </div>
        </div>

    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

    <script>
    var CARDS = [{"front": "Ethnicity (geographic definition)", "back": "A social identity based on shared cultural heritage — ancestry, language, religion, customs, history, and homeland. Ethnic identity is self-defined and performative; it can be maintained across migration and evolve over generations. Distinct from race because it is primarily cultural rather than phenotypic (based on physical appearance), though the two are often intertwined in practice. Example: Irish-American communities in Boston, Vietnamese-American communities in Little Saigon (Orange County).", "id": "fc01"}, {"front": "Race (social construct)", "back": "A system of classifying human beings based on perceived physical characteristics, particularly skin color, hair texture, and facial features. Geographers and sociologists regard race as a social construct — a category human societies create, assign meaning to, and enforce rather than a biologically fixed classification. Human genetic diversity does not support discrete biological races (variation within \"racial\" groups is generally greater than between them), yet the social reality of race has profound geographic consequences for where people live, what schools they attend, and what wealth they accumulate.", "id": "fc02"}, {"front": "Ethnic enclave", "back": "A neighborhood in which a substantial proportion of the population shares a common ethnic identity, reflected in the cultural landscape through signs in the ethnic language, restaurants serving the ethnic cuisine, religious institutions, and social service organizations for recent immigrants. Classic examples: Chinatowns in San Francisco and New York, Little Italy in Manhattan, Miami's Little Havana, and Dearborn, Michigan's Arab-American community (largest concentration of Arab Americans outside the Middle East).", "id": "fc03"}, {"front": "Ethnoburb (Wei Li, 1998)", "back": "A suburban ethnic enclave. As Asian and Latino immigration increased in the late 20th century, immigrant communities dispersed to suburbs rather than concentrating in inner-city ethnic neighborhoods. Coined by geographer Wei Li in 1998. Canonical examples: Monterey Park and San Gabriel in the Los Angeles metro area — predominantly Chinese-American suburbs with ethnic commercial strips, Chinese-language banks and media, and a high proportion of foreign-born residents situated in suburban rather than inner-city environments.", "id": "fc04"}, {"front": "Spatial assimilation", "back": "The process by which immigrant groups gradually move out of ethnic enclaves as they achieve economic mobility and social integration, dispersing into mainstream residential neighborhoods over generations. The classic Chicago School argument: first-generation immigrants cluster in ethnic enclaves for mutual support; second- and third-generation descendants move to the suburbs as they achieve middle-class status. The trajectory implies that ethnic enclaves are transitional stages rather than permanent features.", "id": "fc05"}, {"front": "Heterolocalism", "back": "A residential pattern in which immigrant communities disperse geographically from the moment of arrival, settling across a metropolitan area or nationally, but maintain ethnic community ties through digital communication, shared institutions, and periodic gathering rather than through geographic concentration. Example: a Hmong family in Minneapolis may have no Hmong neighbors within a mile but participates in a dense community network spanning the entire Twin Cities region via social media and ethnic associations.", "id": "fc06"}, {"front": "Ethnic cleansing", "back": "The forced removal or destruction of an ethnic or religious group from a territory in order to make that territory ethnically homogeneous. When the intent is to destroy the group \"in whole or in part,\" international law defines the act as genocide. Ethnic cleansing has geographic consequences: it produces abrupt demographic discontinuities in the landscape, erases ethnic minority cultural landscapes, and creates refugee flows that transform recipient regions.", "id": "fc07"}, {"front": "Rwanda Genocide (1994)", "back": "In 100 days between April and July 1994, approximately 800,000 Tutsi Rwandans — and moderate Hutu who refused to participate — were killed by Hutu extremists using machetes, firearms, and civilian militias (the Interahamwe). Organized by Hutu Power extremists within the government. The Tutsi-Hutu distinction had roots in colonial-era Belgian racial classification policies that reified pre-existing social distinctions. The international community largely failed to intervene. Ended when the Rwandan Patriotic Front (Tutsi-led) took control.", "id": "fc08"}, {"front": "Srebrenica Massacre, Bosnia (1995)", "back": "During the Bosnian War (1992–1995) following Yugoslavia's disintegration, Bosnian Serb forces under General Ratko Mladić killed approximately 8,000 Bosniak (Bosnian Muslim) men and boys in and around Srebrenica in July 1995 — a UN-declared \"safe area.\" The largest mass killing in Europe since World War II; ruled a genocide by the International Criminal Tribunal for the former Yugoslavia (ICTY). The Bosnian War produced systematic ethnic cleansing, resulting in a dramatically more ethnically segregated landscape than before the war.", "id": "fc09"}, {"front": "Rohingya displacement, Myanmar (2017–present)", "back": "The predominantly Muslim Rohingya ethnic minority in Myanmar's Rakhine State was denied citizenship since 1982. In August 2017, the Myanmar military launched mass violence against Rohingya civilians — burning villages, committing mass killings, and systematic sexual violence — following attacks by a Rohingya militant group. Approximately 700,000–1,000,000 Rohingya fled to Bangladesh, creating the Cox's Bazar displacement camp (world's largest). The UN Fact-Finding Mission concluded acts of genocidal intent were committed.", "id": "fc10"}, {"front": "Gender Inequality Index (GII)", "back": "A composite measure developed by the UNDP that combines three dimensions of gender-based disadvantage: (1) reproductive health — maternal mortality ratio, adolescent birth rate; (2) empowerment — female vs. male shares of parliamentary seats and secondary education; (3) labor market participation — female vs. male labor force participation rates. GII ranges from 0 (perfect equality) to 1 (maximum inequality). High scores indicate severe structural disadvantage for women relative to men.", "id": "fc11"}, {"front": "Judith Carney (b. 1955) — Black Rice", "back": "UCLA cultural and historical geographer whose landmark 2001 book Black Rice: The African Origins of Rice Cultivation in the Americas argued that the success of rice cultivation in the South Carolina lowcountry depended on the specific agricultural expertise of enslaved Africans — particularly women — from the rice-growing regions of West Africa (Gambia River watershed, the \"Rice Coast\"). These women had developed sophisticated techniques for cultivating rice in tidal floodplains using sluice-gate systems; this knowledge was extracted under coercion but was foundational to the South Carolina rice economy.", "id": "fc12"}, {"front": "Domestic vs. public space (gendered space)", "back": "In many societies, a distinction between domestic space (the home, associated with women, reproduction, and private life) and public space (the street, market, workplace, and political arena, associated with men) has historically structured the built environment. This public/private divide has taken different forms: the zenana (women's quarters) in traditional South Asian architecture, gendered spatial restrictions across the Middle East, and the \"separate spheres\" ideology of 19th-century Europe and the U.S. that confined middle-class women to the home.", "id": "fc13"}, {"front": "San Francisco Chinatown as cultural landscape case", "back": "Established in the 1850s following Chinese immigration during the Gold Rush, San Francisco's Chinatown served as the entry point and cultural refuge for Chinese immigrants facing severe legal discrimination, including the Chinese Exclusion Act (1882–1943). Cultural landscape features — pagoda-style building decorations, Chinese-language signage, herbal medicine shops, Buddhist and Taoist temples — reflect the community's strategy of maintaining cultural identity in the face of exclusion. Today functions as both a living neighborhood and a heritage landscape drawing tourism.", "id": "fc14"}, {"front": "Why did Belgium's racial classification policy matter in Rwanda?", "back": "During colonial rule, Belgian administrators created a formal racial classification system distinguishing Tutsi from Hutu based on cattle ownership and physical measurements, issuing identity cards recording ethnicity. This reified and politicized pre-existing social distinctions that had been more fluid. By making ethnic identity rigid, official, and hereditary, the colonial classification created the administrative infrastructure that Hutu Power extremists later used to organize the 1994 genocide — a key example of how colonial racial policies can have catastrophic long-term geographic and demographic consequences.", "id": "fc15"}, {"front": "Identity, power, and the cultural landscape", "back": "The cultural landscape is shaped by all the social categories through which human societies organize themselves — ethnicity, race, religion, language, and gender. These categories are not merely descriptive; they carry power. They determine who builds, who is displaced, who is counted, and whose knowledge and labor are recognized. Reading the cultural landscape critically requires asking not just what it looks like, but whose choices and whose constraints produced it. Carney's Black Rice exemplifies this: the South Carolina rice landscape was produced by knowledge systematically attributed to white planters despite being the work of enslaved Black women.", "id": "fc16"}, {"front": "Spatial assimilation vs. heterolocalism — why does the difference matter?", "back": "Spatial assimilation predicts that immigrant enclaves are transitional: as groups achieve economic mobility, they disperse and the enclave fades. Heterolocalism shows that post-1965 digital-era immigrants can maintain strong ethnic community ties without geographic concentration — digital communication, shared institutions, and periodic gathering substitute for proximity. This has implications for urban geography (fewer visible ethnic enclaves), for policy (community needs are not spatially concentrated and cannot be addressed through place-based programs alone), and for measuring immigrant integration.", "id": "fc17"}, {"front": "Ethnic enclave vs. ethnoburb — what shift do they reflect?", "back": "The classic ethnic enclave is an inner-city neighborhood where low-income first-generation immigrants cluster for mutual support, cultural maintenance, and access to ethnic institutions (Chinatown, Little Italy). The ethnoburb reflects a post-1965 shift: affluent, often highly educated, post-1965 immigrants from Asia and Latin America bypassed the inner city and settled directly in suburbs, producing suburban ethnic concentrations with high-end ethnic commercial strips, foreign-language media, and professional services — a fundamentally different model of immigrant settlement.", "id": "fc18"}, {"front": "Synthesis: How do Rwanda, Bosnia, and Myanmar illustrate ethnic cleansing as a geographic process?", "back": "All three cases show that ethnic cleansing is a deliberate geographic strategy: it reshapes the human landscape by eliminating one group's presence from a territory, producing forced homogenization. In Rwanda, the rapid mobilization of civilian militias shows how pre-existing ethnic identity maps can be weaponized to reorganize territory at mass scale. In Bosnia, systematic displacement produced a more ethnically segregated landscape than existed before. In Myanmar, statelessness (Rohingya lack citizenship anywhere) removed any legal geography of protection, facilitating mass flight. All three cases also show the failure of international geographic-political systems (UN safe areas, international law) to prevent landscape-scale violence.", "id": "fc19"}, {"front": "Synthesis: How does Judith Carney's research reframe the cultural landscape of the antebellum South?", "back": "By recovering the specific West African agricultural knowledge of enslaved Gambian women — tidal-floodplain rice cultivation, sluice-gate water management, mortar-and-pestle processing — Carney shows that the South Carolina rice lowcountry was a cultural landscape created by enslaved African women's expertise, not by European agricultural planning using generic coerced labor. This reframing applies Sauer's cultural landscape framework to power: the same visible landscape (rice fields, drainage works, processing buildings) carries a completely different historical meaning depending on whose agency and knowledge is recognized as the agent of transformation.", "id": "fc20"}, {"front": "Yi-Fu Tuan — sense of place (topophilia)", "back": "Chinese-American geographer Yi-Fu Tuan (1930–2022) coined the concept of topophilia — the affective bond between people and place. In his work Place and Space (1977) and Topophilia (1974), Tuan argued that places are not merely locations on a map but emotionally charged environments laden with personal and cultural meaning. This concept links to ethnic enclaves (communities invest place with cultural identity that transcends economics), sacred spaces (religious attachment to specific sites), and gendered spaces (the home as a deeply felt domestic geography). Tuan's work bridges humanistic geography and cultural geography.", "id": "fc21"}, {"front": "How does race function as a geographic variable even though it has no biological basis?", "back": "Although human genetic diversity does not support the existence of discrete biological races, the social construction of race has produced real geographic outcomes: residential segregation enforced by redlining and restrictive covenants, school district boundaries that map onto racial demographics, differential policing geographies, and wealth gaps tied to racially discriminatory mortgage and homeownership policies. The geographic consequences of racial classification persist even after the formal legal structures that created them have been abolished, because landscapes — neighborhood compositions, school district lines, wealth distributions — change more slowly than laws.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
