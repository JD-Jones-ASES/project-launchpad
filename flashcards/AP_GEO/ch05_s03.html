    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

    <script>
    var CARDS = [{"front": "Agribusiness (definition)", "back": "The cluster of industries and firms involved in producing, processing, distributing, and retailing agricultural commodities. Encompasses not only farms but also input suppliers (seed companies, fertilizer manufacturers, equipment makers), commodity processors (grain elevators, flour mills, slaughterhouses), logistics companies (refrigerated shipping, warehouses), food manufacturers, and retailers. Ownership is concentrated in a small number of very large corporations.", "id": "fc01"}, {"front": "Vertical integration in agribusiness", "back": "A company's control over multiple successive stages of the commodity chain — from input supply through production, processing, and distribution. Cargill, Inc. (Wayzata, MN) is the canonical example: it produces and sells fertilizer, buys and stores grain, operates flour mills and meat-processing facilities, manages shipping and port facilities, and sells branded food products. A farmer may sell to Cargill, buy Cargill fertilizer, ship on Cargill transport, and have grain processed at a Cargill facility.", "id": "fc02"}, {"front": "Horizontal acquisition (consolidation) in agribusiness", "back": "A company's purchase of competitors or firms at the same stage of the commodity chain, reducing competition and building market share. The seed industry is the most dramatic example: by 2020, four companies (Bayer-Monsanto, Corteva-Pioneer, ChemChina-Syngenta, BASF) controlled roughly 60% of the global commercial seed market, after hundreds of mergers. In 1996, hundreds of independent seed companies served American farmers.", "id": "fc03"}, {"front": "Commodity chain (value chain)", "back": "The sequence of activities through which a raw agricultural product is transformed into a consumer good, identifying where value is added, where costs are incurred, and who captures the profit at each stage. Core finding: the majority of value in agricultural commodity chains is captured not by farmers or farm workers but by logistics, processing, and retail stages — all dominated by corporations headquartered in wealthy countries.", "id": "fc04"}, {"front": "Banana commodity chain — farm-gate vs. retail value", "back": "A box of 18 kg of bananas at the farm gate in Honduras is worth approximately $3.50; at retail in Wisconsin it sells for $12–14. The Honduran farm worker who harvested a pound received roughly $0.01–0.02 of the ~$0.59–0.69 retail price. The gap illustrates the structural finding of commodity-chain analysis: value accrues at logistics, ripening, and retail stages, not at primary production.", "id": "fc05"}, {"front": "Steps of the banana commodity chain", "back": "1. Planting and cultivation on monocultured plantation (Honduras). 2. Harvesting at 75–80% maturity; packing in 18-kg boxes. 3. Refrigerated container shipping (13.3°C) via Puerto Cortés, 5–10 days to US port. 4. Port arrival, customs, transfer to ripening facilities. 5. Ethylene-gas ripening rooms (5–8 days). 6. Distribution to regional wholesaler/retailer via refrigerated truck. 7. Retail sale to consumer (3–7 day shelf life).", "id": "fc06"}, {"front": "Just-in-time (JIT) logistics", "back": "A supply-chain management approach — borrowed from manufacturing — in which food is produced, processed, and delivered in quantities calibrated to match near-term consumer demand, minimizing inventory costs and waste. JIT systems depend on precise coordination and rapid, reliable transportation — making them highly efficient under normal conditions but vulnerable to disruptions (port strikes, extreme weather, pandemic closures, cyber attacks on logistics software).", "id": "fc07"}, {"front": "Cold chain", "back": "The temperature-controlled segment of the food supply chain that preserves perishable products from harvest to consumption. Comprises refrigerated on-farm storage, reefer shipping containers (sea), refrigerated trucks (road), controlled-atmosphere storage for fruits and vegetables (slows respiration), and refrigerated retail display cases. The cold chain has dramatically extended the geographic reach of fresh-food trade — US consumers eat fresh Chilean blueberries in February and fresh New Zealand lamb year-round.", "id": "fc08"}, {"front": "Container shipping revolution and Malcom McLean", "back": "American trucking entrepreneur who launched the first standardized container service in 1956. Standardized 20- and 40-foot containers with reefer units can be transferred directly between ships, trains, and trucks without unpacking and tracked via GPS. The resulting freight cost drop — an estimated 90% in inflation-adjusted terms between 1950 and 2000 — made it economically viable to source food anywhere on the planet and was the enabling infrastructure for the global agribusiness system.", "id": "fc09"}, {"front": "Cash-crop dependence", "back": "A country's or region's economic reliance on one or a few agricultural export commodities for the majority of its foreign exchange earnings. Commodity prices are highly volatile (weather shocks, importing-country policy changes, synthetic substitution); countries deriving 60% of exports from coffee (Ethiopia) or 40% from cocoa (Ivory Coast) have limited ability to cushion a bad harvest or price collapse. Yet cash-crop agriculture has also been the primary vehicle for rural income growth in many Global South countries.", "id": "fc10"}, {"front": "Mexican avocado supply chain — Michoacán case study", "back": "Mexico's Michoacán state produces ~80% of US-consumed avocados — over 1 million metric tons/year by 2022, $3 billion+ in export revenues. The boom was supercharged by NAFTA (1994), which eliminated tariffs protecting US and Chilean producers. Avocado orchards now cover 200,000+ hectares of former pine-oak forest and subsistence cornfields. Consequences: aquifer depletion, organized crime extortion ('green gold'), USDA inspector threats, and rural income gains — illustrating the complexity of supply-chain globalization.", "id": "fc11"}, {"front": "Coffee and climate vulnerability — supply chain case study", "back": "Coffea arabica requires a narrow temperature range (18–24°C) and specific precipitation. Rising temperatures have shifted the optimal growing zone upslope: in Tanzania's Kilimanjaro region, optimal cultivation altitude has risen ~160 m per decade since the 1970s. Similar upslope migrations documented in Colombia and Mexico. When mountains run out of altitude, production zones disappear entirely — increasing price volatility and supply disruption risk for importing countries.", "id": "fc12"}, {"front": "Amazon deforestation — agricultural commodity chains", "back": "Agriculture is the dominant driver of Amazon deforestation: roads are built, loggers follow, cattle ranchers move in, then soy farmers purchase land from ranchers. Brazil is the world's largest exporter of beef and soybeans — the two commodities primarily driving deforestation. Between 1988 and 2020, ~20% of the Brazilian Amazon was deforested (an area roughly the size of Western Europe). Brazil's deforestation rate peaked at 27,000 km²/year in 2004.", "id": "fc13"}, {"front": "Soy Moratorium (2006)", "back": "An agreement by major agricultural commodity buyers not to purchase soy from newly deforested Amazon land. Combined with federal enforcement (IBAMA) and satellite monitoring (PRODES/DETER), the Moratorium helped drive Brazil's deforestation rate down by roughly 85% by 2012 — one of the most dramatic environmental reversals documented. It illustrates that supply-chain governance and international pressure can measurably reduce deforestation.", "id": "fc14"}, {"front": "Core vs. periphery in agricultural commodity chains", "back": "A structural pattern visible in the banana (Honduras to Wisconsin), avocado (Michoacán to Wisconsin), and coffee (Tanzania to Seattle) chains: production occurs in the Global South periphery, while profit capture concentrates in the Global North core (logistics, processing, retail). Farm workers at origin receive $0.01–0.02 of a pound of retail bananas; the majority of value accumulates at stages controlled by corporations headquartered in wealthy countries.", "id": "fc15"}, {"front": "Cargill, Inc. — vertical integration example", "back": "Among the world's largest private companies, headquartered in Wayzata, Minnesota. Cargill produces and sells fertilizer, buys and stores grain, operates flour mills and meat-processing facilities, manages shipping and port facilities, and sells branded food products — controlling multiple successive stages of the commodity chain. A farmer selling corn to a Cargill elevator may buy Cargill fertilizer to grow it and ship on Cargill transport.", "id": "fc16"}, {"front": "Risks of corporate concentration in the food chain", "back": "The combined effect of vertical integration and horizontal consolidation is that the food chain from field to fork is controlled by a remarkably small number of corporations. Risks include: reduced farmer bargaining power (price-taking rather than price-setting); weakened food safety oversight; and supply-chain vulnerability to single-point failures — illustrated when COVID-19 meatpacking plant closures in 2020 caused meat shortages across the US.", "id": "fc17"}, {"front": "Container shipping and globalized von Thünen rings (synthesis)", "back": "The 90% drop in freight costs enabled by the container shipping revolution (McLean, 1956) effectively 'stretched' von Thünen's rings to global scale. Airfreight plays the role of the cart horse for high-value perishables: Kenyan roses and green beans, airfreighted to London within 24 hours, occupy the inner ring by perishability logic regardless of physical distance. Bulk commodities (grain, soybeans) remain outer-ring productions because their transport cost per unit of value is low even by sea.", "id": "fc18"}, {"front": "Spatial structure of commodity chains — FRQ analytical framework", "back": "For any commodity, map: (1) production zones — typically in the Global South periphery; (2) processing nodes — often break-of-bulk points (port cities, ripening facilities); (3) consumption markets — concentrated in the Global North core. Ask: Where is value added? Who captures it? What environmental costs accrue where? How does the chain make distant producers and consumers spatially interdependent in ways neither may fully recognize?", "id": "fc19"}, {"front": "Synthesis: How does the avocado case illustrate the limits of supply-chain analysis focused only on economics?", "back": "The Michoacán avocado case shows that the global food system operates within — and is sometimes shaped by — local political economies of violence and coercion invisible to the end consumer. The Knights Templar Cartel and CJNG began extorting avocado farmers ('taxes' per truckload), threatening USDA inspectors, and temporarily halting US inspection programs. Economic supply-chain analysis must therefore incorporate political geography, governance, and security conditions at the production end of the chain.", "id": "fc20"}, {"front": "NAFTA and the avocado boom", "back": "The North American Free Trade Agreement (1994) progressively eliminated tariffs that had previously protected US and Chilean avocado producers from Mexican competition. US per capita avocado consumption increased roughly tenfold between 1990 and 2020, driven by demographic shifts (growing Latino population), culinary trends (guacamole normalization, avocado toast), and effective marketing. NAFTA is a concrete example of how trade policy reshapes agricultural geography.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
