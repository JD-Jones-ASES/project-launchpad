<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Human Geography &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Rank-size rule (Zipf's Law)", "back": "An empirical regularity in mature urban systems: the population of any city equals the population of the largest city divided by that city's rank (P_n = P_1 / n). When city populations are plotted against rank on a log-log scale, a straight line results. The United States, Germany, Brazil, and India approximate this pattern.", "id": "fc01"}, {"front": "Primate city", "back": "A city that is not merely the largest in its national system, but is qualitatively dominant — concentrating a disproportionate share of national political power, economic activity, cultural production, and population. Named and theorized by Mark Jefferson in 1939. Departs sharply from the rank-size distribution.", "id": "fc02"}, {"front": "Mark Jefferson and 'The Law of the Primate City' (1939)", "back": "American geographer Mark Jefferson (1863–1949) argued that in many national urban systems one city is 'supereminent' — dominant in every dimension (political, economic, cultural, symbolic). He attributed primacy to concentrated political power, colonial administrative inheritance, and nationalist cultural investment. Published in Geographical Review, 1939.", "id": "fc03"}, {"front": "Bangkok as a primate city example", "back": "Bangkok's greater metropolitan area holds approximately 10–12 million people; Thailand's second city, Chiang Mai, holds roughly 300,000. The primacy ratio exceeds 30:1 — among the most extreme in the world. Reflects colonial-era centralization and continued concentration of government, finance, and cultural institutions in the capital.", "id": "fc04"}, {"front": "Causes of primate city formation", "back": "Colonial history (colonial port cities received disproportionate investment), political centralization (national governments concentrate services in the capital), agglomeration economies (firms cluster where other firms are, reinforcing advantage), and rural-to-urban migration (migrants move to where jobs are — the primate city).", "id": "fc05"}, {"front": "Walter Christaller (1893–1969)", "back": "German geographer who produced Central Place Theory in Die zentralen Orte in Süddeutschland (1933). His work gained international recognition only in the 1950s–60s when the quantitative revolution in geography sought formal theoretical models. His post-war career was complicated by his work for Nazi SS planning; he joined the Communist Party of Germany after 1945 partly as an act of reparation.", "id": "fc06"}, {"front": "Central Place Theory (Christaller, 1933)", "back": "A model explaining how settlements of different sizes distribute across a landscape to efficiently serve a dispersed agricultural population. Assumes a uniform flat plain, uniformly distributed rural population, consumers always travel to the nearest supplier, and perfect competition. Results in a nested hierarchy of hexagonal market areas.", "id": "fc07"}, {"front": "Threshold (Central Place Theory)", "back": "The minimum level of demand — in population, purchasing power, or customers — required for a supplier to profitably offer a good or service. Low-threshold services (convenience stores, elementary schools) appear frequently throughout the hierarchy; high-threshold services (opera companies, organ-transplant centers) appear only in large cities.", "id": "fc08"}, {"front": "Range (Central Place Theory)", "back": "The maximum distance a consumer will travel to obtain a particular good or service. Low-order goods (daily groceries, haircuts) have small ranges and generate densely spaced central places. High-order goods (specialized medical care, professional sports) have large ranges and generate widely spaced central places.", "id": "fc09"}, {"front": "Why do hexagons emerge in Central Place Theory?", "back": "If circular market areas are arranged to cover every point on the plain without overlap, the optimal shape is a hexagon. Hexagons tile perfectly — unlike circles, which leave gaps or overlapping zones — and minimize the average distance from any farm to the nearest central place, producing a nested hierarchy of hexagonal market areas.", "id": "fc10"}, {"front": "Christaller K=3 (Marketing Principle)", "back": "Each lower-order place lies at the corner of three higher-order hexagons, so the higher-order city serves itself plus 1/3 of each of six surrounding lower-order places (total = 3). Maximizes the number of market centers to minimize consumer travel distance. Best suited when market access is the primary goal.", "id": "fc11"}, {"front": "Christaller K=4 (Transportation Principle)", "back": "Each lower-order place lies at the midpoint of an edge between two higher-order hexagons. This arrangement places all lower-order cities on straight roads between higher-order cities, minimizing transportation infrastructure cost. Best suited when building efficient road networks is the priority.", "id": "fc12"}, {"front": "Christaller K=7 (Administrative Principle)", "back": "Each higher-order place entirely encompasses six lower-order places within its administrative boundary. Maximizes administrative efficiency by ensuring every lower-order place falls unambiguously under a single higher-order jurisdiction. Best suited for organizing governance hierarchies.", "id": "fc13"}, {"front": "Gravity model (urban interaction)", "back": "A spatial-interaction model predicting that movement of people, goods, or information between two places is directly proportional to the product of their populations and inversely proportional to the square of the distance between them: I = (P1 × P2) / d². Used to predict commuter flows, migration streams, retail catchment areas, and trade volumes.", "id": "fc14"}, {"front": "Rank-size vs. primate distribution: how to identify from data", "back": "Calculate the ratio of the largest city to the second-largest. A ratio near 2:1 is consistent with rank-size regularity; a ratio of 5:1 or higher signals primacy. Also check whether top cities concentrate in one region (centralized/colonial system) or distribute across regions (balanced, rank-size system).", "id": "fc15"}, {"front": "Why do flat agricultural plains produce Christaller-like patterns?", "back": "Central Place Theory assumes a uniform flat plain with no geographic obstacles. On such a landscape, there are no physical reasons for market areas to deviate from the mathematically optimal hexagonal form. Mountains, rivers, coastlines, and historical accident all break the hexagonal pattern — which is why the model fits Iowa or the North China Plain better than mountain countries.", "id": "fc16"}, {"front": "Critique of Central Place Theory", "back": "The real world is not a uniform plain — geographic obstacles break the hexagonal pattern. The theory ignores institutional factors, cultural preferences, and government investment. The digital economy has dramatically altered threshold and range: consumers can now 'travel' zero distance online to buy specialized goods, collapsing range to near-zero for information goods.", "id": "fc17"}, {"front": "Singapore as a primate city case study", "back": "As a city-state, Singapore concentrates the entire national economy, port infrastructure, and financial system in a single urban node. Its status as a break-of-bulk point in Southeast Asian shipping mirrors the situational advantage of great port cities in Borchert's Sail-Wagon epoch — but now operating at global rather than regional scale.", "id": "fc18"}, {"front": "Critique of Jefferson's Primate City 'law'", "back": "Jefferson's 'law' is more an observed tendency than a predictive rule. It does not explain which countries will produce primate cities or at what point primacy becomes self-reinforcing. In small countries (Singapore, Kuwait), a single dominant city may simply reflect efficient spatial organization rather than distortion.", "id": "fc19"}, {"front": "Synthesis: rank-size, primacy, and central place theory as complementary frameworks", "back": "Rank-size and primacy describe the national-scale distribution of city sizes; Central Place Theory explains regional and local settlement hierarchies through threshold and range logic. Together they form a nested framework: CPT explains the spacing and size of towns within a region; rank-size/primacy describes how regional systems integrate into national urban hierarchies.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
