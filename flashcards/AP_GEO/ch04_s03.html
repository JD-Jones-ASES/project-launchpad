<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Human Geography &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Unitary state", "back": "A state in which the central (national) government holds supreme authority over all sub-national units, which exercise only those powers the center delegates to them. The most common form of political organization worldwide. Canonical examples: France (governing through a centralized Paris bureaucracy; 101 departments are administrative units of the national government), China, and Japan.", "id": "fc01"}, {"front": "Federal state", "back": "A state in which the constitution divides political authority between a central government and sub-national units (states, provinces, Länder), and neither level can unilaterally abolish the other. Examples: the United States (10th Amendment), Germany (16 Länder), India (Union/State/Concurrent lists), Brazil, and Nigeria.", "id": "fc02"}, {"front": "Confederation", "back": "An association of sovereign states that delegates limited authority to a common body for specific purposes (typically defense, trade, and foreign policy) while each member retains sovereignty. Examples: the U.S. under the Articles of Confederation (1781–1788) and the Confederate States of America (1861–1865). Confederations tend toward instability because members can unilaterally withdraw or veto collective action.", "id": "fc03"}, {"front": "Advantages and disadvantages of unitary vs. federal systems", "back": "Unitary: advantage = policy coherence (single national standard for healthcare, education, taxation); disadvantage = inflexibility in culturally/geographically diverse societies. Federal: advantage = accommodates diversity (sub-national governments adapt to regional needs); disadvantage = persistent tensions over fiscal transfers and regulatory authority between levels.", "id": "fc04"}, {"front": "Reapportionment", "back": "The redistribution of seats in a legislative body among political units (such as U.S. states) following a census, to reflect population change. In the U.S., the 435 House seats are reapportioned among 50 states after each decennial census. After the 2020 Census, Texas gained two seats while California, New York, and Illinois each lost one.", "id": "fc05"}, {"front": "Redistricting", "back": "The process of redrawing the geographic boundaries of legislative districts within a state to reflect population change following reapportionment. Required by the one-person-one-vote principle (Reynolds v. Sims, 1964). In most U.S. states, redistricting is controlled by the state legislature — giving the party in power the ability to draw lines for all state and U.S. House elections.", "id": "fc06"}, {"front": "Gerrymandering", "back": "The manipulation of electoral district boundaries to give one political party or group an unfair electoral advantage. Named for Massachusetts Governor Elbridge Gerry, who in 1812 signed a bill creating a salamander-shaped district. Two main techniques: cracking and packing. Modern computer modeling has made gerrymandering far more precise and durable than the 1812 original.", "id": "fc07"}, {"front": "Cracking (gerrymandering technique)", "back": "Dispersing a population that tends to vote for the opposing party across multiple districts, diluting their voting strength so they form a minority in each district. Example: if the opposition can count on 40% of the state's voters, cracking distributes that 40% across many districts so they never constitute a plurality in any of them.", "id": "fc08"}, {"front": "Packing (gerrymandering technique)", "back": "Concentrating the opposing party's voters into as few districts as possible, creating a small number of districts where the opposition wins by enormous margins (e.g., 80–20) while the drawing party wins many more districts by comfortable but not wastefully large margins (e.g., 55–45). The effect is to 'waste' the opposition's votes.", "id": "fc09"}, {"front": "How cracking and packing work together", "back": "Effective gerrymandering combines both techniques: the drawing party packs the most reliable opposition precincts into one or two districts, then cracks any remaining concentrations of opposition voters into several surrounding majority-drawn districts. The result: the opposition wins a few seats by enormous margins while losing many more by modest margins.", "id": "fc10"}, {"front": "Rucho v. Common Cause (2019)", "back": "A 5–4 Supreme Court ruling (Chief Justice Roberts) that federal courts have no role in adjudicating claims of partisan gerrymandering because there is no 'judicially manageable standard' for distinguishing unjust line-drawing from acceptable political considerations. Effectively left partisan gerrymandering as a political question under federal law, but left open state-court remedies under state constitutions.", "id": "fc11"}, {"front": "Reynolds v. Sims (1964)", "back": "The Supreme Court case establishing the one-person-one-vote principle: congressional and state legislative districts must be 'as equal as possible' in population. This ruling requires that districts be redrawn each decade following the census to account for internal migration and population shifts, establishing the constitutional foundation for redistricting.", "id": "fc12"}, {"front": "Shaw v. Reno (1993)", "back": "The Supreme Court case that scrutinized North Carolina's 12th Congressional District, which stretched 160 miles along Interstate 85 to connect African-American neighborhoods in Charlotte and Greensboro into a single majority-Black district. The case addressed racial gerrymandering — the use of race as a predominant factor in drawing district lines — establishing limits on when race can be used in redistricting.", "id": "fc13"}, {"front": "India as a federal state — key features", "back": "India is the world's largest democracy and a federal republic of 28 states and 8 union territories. Its constitution explicitly lists three categories: the Union List (exclusive central government powers), the State List (exclusive state powers), and the Concurrent List (shared powers). This tripartite division is a more elaborate federal structure than the U.S. Tenth Amendment approach.", "id": "fc14"}, {"front": "Germany's federal structure (Basic Law, 1949)", "back": "Germany's Basic Law establishes a federal structure with 16 Länder that have distinct constitutional competences, including control over education and local policing. The post-WWII design deliberately distributed power to prevent the re-concentration of authority that had enabled the Nazi state — making federalism a democratic safeguard as well as a governance structure.", "id": "fc15"}, {"front": "Electoral geography and power", "back": "The drawing of electoral districts is an act of political geography with direct consequences for democratic representation. Reapportionment reallocates power among states; redistricting determines which communities are aggregated or divided within states; gerrymandering can systematically distort the relationship between votes cast and seats won. Understanding these processes requires analyzing how political power is spatially organized.", "id": "fc16"}, {"front": "State legislatures and redistricting — the political geography problem", "back": "In most U.S. states, the state legislature controls redistricting — meaning the party in power draws the district boundaries for its own elections. This creates a structural incentive for partisan gerrymandering: the party in power can draw maps that entrench its advantage for the entire decade between censuses. After Rucho (2019), only state courts and independent commissions can check this power.", "id": "fc17"}, {"front": "Synthesis: Why shape matters in electoral geography", "back": "Contorted district shapes (Maryland's 3rd District described as a 'broken-winged pterodactyl'; North Carolina's 12th stretching 160 miles along I-85) are not geographic accidents but deliberate political engineering. The AP exam may show a district map and ask students to identify techniques (packing vs. cracking) or legal issues (partisan vs. racial gerrymandering) based on shape and demographic data.", "id": "fc18"}, {"front": "Synthesis: Unitary vs. federal — which fits diverse societies?", "back": "Federal systems are generally better suited to culturally, linguistically, or geographically diverse societies because sub-national governments can adopt policies tailored to regional needs. Unitary systems can impose policy coherence efficiently in homogeneous societies but risk centrifugal pressure in diverse ones. Belgium's repeated constitutional reforms devolving power to linguistic communities illustrate a unitary system adapting under federal-like pressure.", "id": "fc19"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
