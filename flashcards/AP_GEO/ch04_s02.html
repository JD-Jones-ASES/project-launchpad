<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">

            </div>
        </div>

    <script>
    var CARDS = [{"front": "Antecedent boundary", "back": "A boundary established before significant human settlement of the region. Drawn on a sparsely populated or empty landscape, it pre-dates the cultural patterns of the population that later develops around it. Example: much of the 49th Parallel between the U.S. and Canada west of the Great Lakes, surveyed in the 1840s–1870s when the region was sparsely settled.", "id": "fc01"}, {"front": "Subsequent boundary", "back": "A boundary drawn after significant settlement has occurred, typically attempting to reflect the cultural or linguistic pattern already on the ground. Examples: many European borders redrawn after WWI and WWII, including the post-1945 Oder-Neisse line between Poland and Germany, drawn to reflect intended demographic outcomes after German populations were expelled from Silesia.", "id": "fc02"}, {"front": "Superimposed boundary", "back": "A boundary imposed by an outside power with little or no regard for existing ethnic, linguistic, or political communities — an external line drawn on top of pre-existing human patterns. The canonical example is the colonial-era boundaries of Africa drawn at the Berlin Conference (1884–85), cutting through ethnic homelands, clan territories, and trade networks.", "id": "fc03"}, {"front": "Relict boundary", "back": "A boundary that has ceased to function as a political division but remains visible in the cultural or physical landscape. Examples: Hadrian's Wall (122 CE, no longer marks an active border but its earthworks remain visible); the Berlin Wall trace (still visible in street patterns, bus routes, and nightlife distribution despite the wall's demolition after 1989).", "id": "fc04"}, {"front": "Hartshorne's boundary typology — exam tip", "back": "Hartshorne's four types (antecedent, subsequent, superimposed, relict) classify boundaries by their relationship to pre-existing settlement patterns. Key distinctions: antecedent = drawn before settlement; subsequent = drawn to reflect existing settlement; superimposed = drawn by outsiders ignoring existing settlement; relict = formerly active, now only culturally/physically visible.", "id": "fc05"}, {"front": "UNCLOS (United Nations Convention on the Law of the Sea, 1982)", "back": "The international treaty that created a comprehensive layered framework for maritime sovereignty, establishing four zones: territorial sea (0–12 nm), contiguous zone (12–24 nm), Exclusive Economic Zone (EEZ, 0–200 nm), and continental shelf rights (up to 350 nm). Before UNCLOS, states claimed territorial seas of varying widths, producing frequent conflicts.", "id": "fc06"}, {"front": "Territorial sea (UNCLOS)", "back": "The zone extending 12 nautical miles from a state's baseline (low-tide line). Within this zone the coastal state exercises full sovereignty — regulating navigation, enforcing customs and immigration laws, and exploiting natural resources — though innocent passage by foreign vessels is permitted.", "id": "fc07"}, {"front": "Contiguous zone (UNCLOS)", "back": "The zone extending from 12 to 24 nautical miles from a state's baseline. The coastal state may enforce customs, fiscal, immigration, and sanitary laws but does not exercise full sovereignty. Functions as a legal buffer between the territorial sea and the open ocean.", "id": "fc08"}, {"front": "Exclusive Economic Zone (EEZ)", "back": "Under UNCLOS (1982), the 200-nautical-mile zone extending from a state's baseline within which the coastal state has exclusive rights to explore and exploit all natural resources — fish, oil, natural gas, and deep-sea minerals. Foreign ships and aircraft retain freedom of navigation and overflight. Overlapping EEZ claims have produced many of the most contentious territorial disputes of the 21st century.", "id": "fc09"}, {"front": "Continental shelf rights (UNCLOS)", "back": "Where a state's physical continental shelf extends beyond 200 nautical miles, the state may claim sovereign resource extraction rights over the seabed and subsoil up to 350 nm. Claims must be established through a formal submission to the Commission on the Limits of the Continental Shelf (CLCS).", "id": "fc10"}, {"front": "Mackinder's Heartland Theory (1904)", "back": "British geographer Halford Mackinder argued that control of the landlocked interior of Eurasia — the 'Heartland' — was the key to global power. His formula: 'Who rules East Europe commands the Heartland; who rules the Heartland commands the World-Island; who rules the World-Island commands the World.' Railways made the previously inaccessible interior strategically decisive.", "id": "fc11"}, {"front": "Spykman's Rimland Theory (1944)", "back": "Dutch-American geographer Nicholas Spykman inverted Mackinder: the 'Rimland' — the coastal periphery of Eurasia (European peninsula, Middle East, South Asia, East Asia) — holds decisive strategic importance because it contains most of the world's population, agriculture, and industrial capacity. 'Who controls the Rimland rules Eurasia.' Directly informed U.S. Cold War containment doctrine.", "id": "fc12"}, {"front": "Ratzel's Organic Theory of the State (1897)", "back": "German geographer Friedrich Ratzel argued that the state is a biological organism that grows, competes for space, ages, and dies. States need Lebensraum ('living space') to survive and prosper. A strong state naturally expands; one that cannot grow contracts and dies. Ratzel's vocabulary was later weaponized by Nazi geopoliticians (Karl Haushofer) to justify German territorial expansion — far beyond Ratzel's own academic intent.", "id": "fc13"}, {"front": "Lebensraum", "back": "Friedrich Ratzel's term (1897) for the 'living space' he argued a state requires to survive and prosper. In Ratzel's original scholarly usage, it was a demographic-analytical descriptor. Karl Haushofer and Nazi Geopolitik stripped it of scholarly nuance and used it to justify eastward conquest. One of the textbook examples of how a geographic theory can be weaponized beyond its author's intentions.", "id": "fc14"}, {"front": "Comparing Mackinder and Spykman", "back": "Mackinder (1904): the landlocked Heartland of Eurasia is strategically decisive because sea power cannot project force into it. Spykman (1944): the Rimland (coastal periphery) is decisive because it contains population, resources, and the battlegrounds of modern war. Spykman directly reversed Mackinder's hierarchy, arguing maritime-oriented states dominate because they can project force along the rimland's coastline.", "id": "fc15"}, {"front": "Case study: East China Sea / Senkaku-Diaoyu dispute", "back": "Eight uninhabited outcroppings (~7 sq km) claimed by Japan (Senkaku Islands, administered since 1972), China (Diaoyu Islands, citing Ming Dynasty maps and pre-1895 administration), and Taiwan. The dispute matters because controlling the islands controls overlapping EEZs in resource-rich waters with significant oil, gas, and fishery value. China's 2013 Air Defense Identification Zone escalated tensions and triggered U.S. reaffirmation of treaty obligations under the U.S.-Japan Mutual Security Treaty (Article 5).", "id": "fc16"}, {"front": "Berlin Conference (1884–85) and the 'effective occupation' doctrine", "back": "Article 6 of the General Act required that a European power's claim to African territory be recognized only if it could demonstrate actual administrative authority — treaties, administrative presence, capacity to protect rights. This transformed the Scramble for Africa from a diplomatic into a military competition. Between 1885 and 1900, formal European colonial control over Africa rose from ~10% to over 90%.", "id": "fc17"}, {"front": "Geographic determinism — critique of Heartland and Rimland theories", "back": "Both Mackinder and Spykman have been criticized for geographic determinism — assuming that geography drives strategic outcomes independently of technology, political institutions, or economic development. The USSR controlled the Heartland for 70 years yet was outcompeted economically and technologically by maritime-oriented states. Airpower, nuclear weapons, and globalized logistics eroded the sharp land/sea power distinction both models assumed.", "id": "fc18"}, {"front": "Why do tiny uninhabited islands generate major disputes? (EEZ logic)", "back": "Under UNCLOS, a state that controls even a small island or rock controls a 200-nm EEZ around it — granting exclusive rights to fish, oil, gas, and deep-sea minerals in a vast area. This transforms formerly marginal geographic features into enormously valuable sovereign assets. The Senkaku/Diaoyu case illustrates how UNCLOS, intended to reduce maritime conflict, can instead focus and intensify sovereignty disputes.", "id": "fc19"}, {"front": "Synthesis: Boundary type and political stability", "back": "Antecedent boundaries (drawn before settlement) tend to be relatively uncontested once settlement patterns form around them. Superimposed boundaries (drawn by outside powers ignoring existing peoples) tend to generate persistent instability — civil wars, secessionist movements, resource conflicts — because they divide ethnic or cultural communities and bundle incompatible groups together. Africa's colonial borders are the primary example.", "id": "fc20"}, {"front": "Uti possidetis principle", "back": "The international legal doctrine, endorsed by the International Court of Justice (1986 Burkina Faso/Mali case), that inherited colonial boundaries are presumed valid to prevent wholesale revision from generating cascading conflicts. The ICJ applied it to African postcolonial borders drawn at Berlin. The result: the Berlin Conference's cartographic legacy continues to define contemporary African political geography.", "id": "fc21"}, {"front": "Synthesis: Geopolitical theory and U.S. Cold War policy", "back": "Spykman's Rimland Theory directly informed U.S. containment doctrine: if the Soviet Union (controlling the Heartland) expanded into Rimland states, the U.S. and allies should contain it at the rim. This logic justified NATO (Western Europe), alliances with Japan and South Korea, and military intervention in Korea and Vietnam — showing how a geographic model can translate into decades of foreign policy.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
