<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Human Geography &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 6, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Redlining", "back": "The practice, formalized by the Home Owners' Loan Corporation (HOLC) in the 1930s and enforced by the Federal Housing Administration (FHA), of denying mortgage loans or insurance to residents of neighborhoods designated 'hazardous' (marked in red on HOLC maps). Red designation was applied almost universally to neighborhoods with significant Black populations regardless of individual financial risk, systematically preventing Black families from building home equity during the postwar housing boom.", "id": "fc01"}, {"front": "HOLC color-coding system", "back": "Home Owners' Loan Corporation (1930s) rated neighborhoods by perceived mortgage risk using four colors: green ('best'), blue ('still desirable'), yellow ('definitely declining'), and red ('hazardous'). The 'hazardous' (redlined) designation was applied almost universally to neighborhoods with Black residents, making federal mortgage insurance unavailable there while it simultaneously subsidized White middle-class suburbs.", "id": "fc02"}, {"front": "Restrictive covenants", "back": "Legally enforceable clauses in property deeds prohibiting sale of a home to racial or religious minorities. Though declared unenforceable by the Supreme Court in Shelley v. Kraemer (1948), covenants had already structured the demographics of vast suburban tracts. Their legacies are visible in cities like Minneapolis, Seattle, and Los Angeles, where whole neighborhoods were developed under racially exclusionary deeds.", "id": "fc03"}, {"front": "Blockbusting", "back": "A real-estate technique in which agents deliberately frightened White homeowners in transitional neighborhoods into selling quickly at low prices by warning of Black in-migration, then resold the purchased homes to Black families at inflated prices — often on exploitative contract-for-deed arrangements that built no equity. Simultaneously stripped wealth from White sellers, denied equity to Black buyers, and earned large commissions for brokers.", "id": "fc04"}, {"front": "White flight", "back": "The mass out-migration of White middle-class and working-class households from American cities to suburbs, accelerating in the 1950s–60s. Driven by racial transition in urban neighborhoods, federal transportation and housing policies subsidizing suburban homeownership, and blockbusting. Reduced the tax base of central cities, accelerated deterioration of urban public services and schools, and deepened the racial and class geography of metropolitan America.", "id": "fc05"}, {"front": "Urban renewal and its spatial impact", "back": "Federal urban renewal programs (Housing Act of 1949) empowered cities to demolish 'blighted' neighborhoods — a designation that overwhelmingly targeted low-income Black and immigrant communities — and replace them with highways, sports stadiums, universities, or upscale housing. James Baldwin observed in 1963 that 'urban renewal means Negro removal,' a characterization urban historians have largely validated.", "id": "fc06"}, {"front": "Gentrification", "back": "The process by which higher-income households move into lower-income urban neighborhoods, rehabilitating housing stock and attracting new retail and services, while simultaneously driving up rents and property values and displacing long-term lower-income residents. Contested: improves physical infrastructure and may reduce crime but destroys established communities and displaces vulnerable residents into worse housing markets at the urban periphery.", "id": "fc07"}, {"front": "Rent gap theory (Neil Smith)", "back": "Critical geographer Neil Smith argued that gentrification is driven primarily not by residential tastes but by rent gaps — the difference between current low rent in a disinvested neighborhood and the potential rent if the neighborhood were redeveloped. When the gap is large enough, investors move in and displacement follows. This framing shifts responsibility from individual preferences to capital dynamics.", "id": "fc08"}, {"front": "Smart growth", "back": "A planning philosophy that concentrates new development in existing urban cores and near transit infrastructure rather than allowing continued low-density suburban sprawl. Principles include: mixed land uses, compact building design, a range of housing types and price points, walkable streets, accessible open space, and transit-oriented development. Example: Portland, Oregon's Urban Growth Boundary (established 1979).", "id": "fc09"}, {"front": "Walkability (Jeff Speck's framework)", "back": "Urban planner Jeff Speck (Walkable City, 2012) argues a city is truly walkable only when walking is simultaneously useful, safe, comfortable, and interesting. Most American cities fail at least two of these four conditions. Automobile-dependent zoning — which separates residential from commercial uses — makes walking structurally impossible by eliminating the 'useful' condition.", "id": "fc10"}, {"front": "Curitiba, Brazil — transit-oriented development", "back": "In the 1970s, Curitiba designed a bus rapid transit (BRT) system that functions at metro efficiency at a fraction of the cost. High-density development concentrates along BRT corridors; lower-density housing fills the interstices. This spatial logic mirrors Christaller's transportation principle transposed from the regional scale to the metropolitan scale.", "id": "fc11"}, {"front": "Bogotá's Ciclovía program", "back": "Since the 1970s, Bogotá, Colombia closes major city arteries to automobiles on Sundays and public holidays, allowing 1.5–2 million cyclists, runners, and pedestrians to reclaim the street. A visible assertion that urban space is a public good rather than a private automotive throughway. Represents a low-infrastructure approach to walkability and urban livability.", "id": "fc12"}, {"front": "Rotterdam: Room for the River (Ruimte voor de Rivier)", "back": "A Dutch national program shifting climate-engineering doctrine from 'fight the water' to 'make room for the water.' In Rotterdam, this means designing infrastructure to serve double duty: the Waterplein (Benthemplein, 2013) is a public plaza of concrete basins that in dry weather functions as a skateboard park but during heavy rainfall converts into a temporary reservoir holding up to 1.7 million liters of stormwater.", "id": "fc13"}, {"front": "Rotterdam's broader climate adaptation portfolio", "back": "Beyond the Waterplein, Rotterdam has built: a floating neighborhood (Buoyant Foundations project), a rooftop park atop a parking garage designed as a rainwater retention system, and underground cisterns beneath public parks. The core lesson is that flood adaptation can be designed as public space rather than hidden infrastructure — a shift with implications for urban livability and democratic accountability.", "id": "fc14"}, {"front": "Bangladesh: shrimp farming and sea-level adaptation", "back": "In Khulna and Satkhira regions, rice paddies were converted to brackish-water shrimp ponds beginning in the 1980s as global shrimp demand grew. By the 2020s, saltwater intrusion from shrimp farming, storm surge, and sea-level rise has rendered large areas unfit for rice. Poor laborers who cannot adapt migrate to Dhaka and Chittagong, adding to informal settlements; those who remain use salt-tolerant crop varieties, raised homestead platforms, and community-managed tidal embankments.", "id": "fc15"}, {"front": "Spatial patterns of gentrification", "back": "Gentrification typically moves outward from already-gentrified neighborhoods along corridors of amenity: good transit access, walkable commercial streets, proximity to universities or cultural institutions, scenic character (waterfronts, parks, Victorian housing stock). In New York City it moved from the West Village through Williamsburg, Bushwick, and East New York; in Chicago, south from Lincoln Park through Wicker Park and Pilsen.", "id": "fc16"}, {"front": "Portland Urban Growth Boundary", "back": "Established in 1979, Oregon's Urban Growth Boundary legally prevents urban development from spreading into agricultural land beyond a defined perimeter around Portland. Has successfully limited sprawl for over four decades and is a leading example of smart growth policy. Critics note it has also contributed to rising housing prices by constraining the supply of developable land.", "id": "fc17"}, {"front": "Urban heat island and Phoenix's mitigation strategies", "back": "Phoenix, Arizona, where summer temperatures regularly exceed 110°F, has deployed heat-island mitigation strategies including cool pavements (high-albedo surfaces that absorb less solar radiation), urban tree canopy expansion, and mandatory shade structures in new commercial developments. Illustrates how climate adaptation must be tailored to local geographic conditions.", "id": "fc18"}, {"front": "How redlining contributed to the racial wealth gap", "back": "Federal mortgage insurance was unavailable in redlined (predominantly Black) neighborhoods, making it nearly impossible for residents there to access the low-interest loans that simultaneously built White middle-class suburban wealth through home equity. Because homeownership is the primary vehicle of middle-class wealth accumulation in the U.S., decades of exclusion produced a durable racial wealth gap that persists today.", "id": "fc19"}, {"front": "Synthesis: Rotterdam vs. Bangladesh — two models of climate adaptation", "back": "Rotterdam represents engineered infrastructure adaptation by a wealthy state: purpose-built water squares, floating neighborhoods, and storm barriers designed within a national program funded by the Dutch government and connected to EU policy. Bangladesh represents agricultural and community-scale adaptation under resource constraints: salt-tolerant crops, raised homesteads, community embankments — and when those fail, climate migration to mega-cities. Both show how global carbon emissions cascade through regional and local scales into spatial decisions.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
