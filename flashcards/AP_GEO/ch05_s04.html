    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 5, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

    <script>
    var CARDS = [{"front": "Desertification (definition)", "back": "The process by which productive dryland ecosystems — grasslands, savannas, and dry woodlands at the margins of deserts — are degraded to near-desert conditions through the interaction of human land use (overgrazing, overcultivation, fuel-wood extraction) and climatic stress (reduced or variable rainfall). Affects roughly 3.6 billion hectares globally and threatens more than one billion people's livelihoods. Distinguished from natural desert expansion: it refers to human-accelerated land degradation in ecologically marginal areas.", "id": "fc01"}, {"front": "The Sahel — desertification case study", "back": "A semi-arid transition zone stretching from Senegal through Mali, Niger, Chad, and Sudan, between the Sahara and the humid tropics. Since the 1970s, a combination of drought cycles, population growth, and intensified livestock grazing has degraded large areas of Sahelian grassland. However, satellite data suggests some greening since the 1990s in response to increased rainfall — cautioning against simple linear desertification narratives; the interaction between climate and land use is complex.", "id": "fc02"}, {"front": "Aral Sea catastrophe", "back": "Once the world's fourth-largest lake, straddling Kazakhstan and Uzbekistan. Beginning in the 1960s, Soviet irrigation policy diverted the Amu Darya and Syr Darya rivers to irrigate cotton fields. By the 2010s, the Aral Sea had lost more than 90% of its surface area, leaving the Aralkum Desert, dust storms carrying toxic salt and pesticide residues, and a more extreme regional climate (hotter summers, colder winters) as its thermal mass disappeared.", "id": "fc03"}, {"front": "Soil salinization", "back": "The accumulation of soluble salts in the soil to concentrations that inhibit or prevent plant growth. The primary cause of agricultural land loss in irrigated arid and semi-arid regions. Process: irrigation water evaporates from soil surface but leaves dissolved salts behind; if drainage is insufficient to carry salts below the root zone, they accumulate over years until the soil becomes too saline for crops to absorb water.", "id": "fc04"}, {"front": "Indus River valley salinization", "back": "The world's largest irrigated agricultural region (wheat, cotton, sugarcane, rice for hundreds of millions in Pakistan and northwest India). Poorly designed colonial-era drainage infrastructure has left large areas waterlogged and increasingly saline. Parallels the ancient Mesopotamian case: the collapse of the Akkadian Empire and decline of Sumerian agriculture after 2000 BCE are linked to progressive soil salinization — and the same process is still underway in large areas of Iraq today.", "id": "fc05"}, {"front": "Agriculture as the primary driver of global deforestation", "back": "The FAO estimates approximately 70% of global deforestation since 1990 has been driven by agricultural expansion — primarily conversion of tropical forests to cattle pasture and soy cropland in the Amazon Basin, and to palm oil and pulp-wood plantations in Indonesia and Malaysia. The standard Amazon deforestation sequence: roads built → loggers extract timber → cattle ranchers move in → soy farmers purchase from ranchers.", "id": "fc06"}, {"front": "Amazon deforestation — scale and drivers", "back": "The Amazon contains ~60% of the world's remaining tropical rainforest and an estimated 10% of all Earth's species. Between 1988 and 2020, ~20% of the Brazilian Amazon was deforested — an area roughly the size of Western Europe. Brazil is the world's largest exporter of beef and soybeans — the two commodities primarily driving deforestation. Deforestation peaked at 27,000 km²/year in 2004 and was reduced ~85% by 2012 via federal enforcement, satellite monitoring, and the Soy Moratorium.", "id": "fc07"}, {"front": "Indonesian peatland deforestation — palm oil", "back": "Indonesia and Malaysia have cleared vast areas of peatland tropical forest on Borneo and Sumatra for oil palm plantations, driven by global demand for palm oil as a food ingredient, biofuel, and cosmetics ingredient. Peatland fires release not only standing forest carbon but also carbon accumulated in deep peat deposits over thousands of years. Indonesia's annual greenhouse gas emissions from land-use change have at times exceeded those of the entire US economy.", "id": "fc08"}, {"front": "Three pathways by which tropical deforestation contributes to climate change", "back": "1. Direct carbon release: burning and decomposition of forest biomass releases stored CO₂. 2. Loss of ongoing carbon absorption: tropical forests absorb an estimated 1.4 billion tonnes of CO₂/year; deforested land loses this sink capacity. 3. Alteration of local precipitation: tropical forests generate 'flying rivers' of water vapor that sustain rainfall across continental scales; deforestation disrupts regional precipitation patterns.", "id": "fc09"}, {"front": "Biodiversity loss from industrial agriculture — crop genetic diversity", "back": "The Green Revolution concentrated production into a handful of HYV crop varieties, displacing thousands of traditional cultivars. The IRRI estimates more than 100,000 rice varieties existed globally before the Green Revolution; today a small number of HYVs dominate global rice acreage. This loss reduces the gene pool from which plant breeders can develop varieties resistant to new diseases, pests, or climate conditions — ecological vulnerability from genetic monoculture.", "id": "fc10"}, {"front": "Wild bee decline and ecosystem services", "back": "The global decline of wild bee populations — documented since the 1990s — threatens the pollination of roughly one-third of global food crops. It illustrates how agricultural biodiversity loss can circle back to undermine the food production system that drove it: conversion of diverse natural habitats to monoculture eliminates insects, birds, and soil organisms that maintain ecosystem services (pollination, pest control, soil fertility, water filtration) on which agriculture ultimately depends.", "id": "fc11"}, {"front": "Hypoxic zone (dead zone)", "back": "An area of ocean or large lake where dissolved oxygen has fallen below 2 mg/L — the minimum for most marine organisms — due to decomposition of excess algal biomass generated by nitrogen and phosphorus runoff from agricultural and urban areas. More than 400 such zones have been identified globally. The Gulf of Mexico dead zone, driven by Mississippi River basin Corn Belt runoff, is the world's second-largest (13,000–22,000 km² at peak).", "id": "fc12"}, {"front": "Gulf of Mexico dead zone — scale-crossing causation", "back": "The Gulf dead zone is a concrete, spatially mappable consequence of agricultural decisions on farms in Iowa, Illinois, and Indiana — a scale-crossing relationship between local land use and downstream ecosystem health. Corn Belt farms apply excess nitrogen fertilizer → nitrogen runs off into drainage tiles and streams → accumulates in the Mississippi River basin (regional scale) → creates hypoxic zone in the Gulf (national scale) → damages commercial shrimp, oyster, and finfish fisheries.", "id": "fc13"}, {"front": "Agriculture and climate change — dual role", "back": "Agriculture both drives climate change (through deforestation, methane from livestock and rice paddies, and nitrous oxide from synthetic fertilizers) and is increasingly affected by it (shifting growing zones, heat stress on crops, sea-level rise threatening delta agriculture, upslope migration of optimal cultivation zones). The food system is thus simultaneously a major cause of and a major victim of the global climate crisis.", "id": "fc14"}, {"front": "Shifting growing zones — Corn Belt and tropics", "back": "The American Corn Belt has begun shifting northward as warming temperatures allow corn cultivation in previously marginal areas of Wisconsin, Minnesota, and the Canadian Prairies — but onto shallower, less fertile soils with late-season frost risk. In the tropics, even small temperature increases push crops beyond heat tolerance: rice and wheat yields decline significantly above ~34°C nighttime temperatures, a threshold increasingly exceeded in South Asia and the Sahel.", "id": "fc15"}, {"front": "Mekong Delta sea-level rise threat", "back": "Vietnam's Mekong Delta produces roughly half of Vietnam's rice and a large share of its fish; large areas sit less than one meter above current sea level. Saltwater intrusion from rising sea levels is already degrading rice yields in delta areas, and storm surge flooding has intensified. The Mekong Delta case illustrates how global-scale processes (sea-level rise from greenhouse gas emissions) produce local-scale agricultural consequences (farm degradation, income loss, migration).", "id": "fc16"}, {"front": "Sustainable agricultural practices — soil-focused", "back": "Contour plowing: plowing along the topographic contour of hillsides reduces runoff speed and dramatically cuts soil erosion. No-till agriculture: eliminating mechanical soil disturbance preserves soil structure, reduces erosion, retains moisture, and sequesters carbon in undisturbed organic matter; adoption has grown substantially in the American Midwest, Brazil, and Argentina. Cover crops: planted between cash-crop seasons to suppress erosion, fix nitrogen (if leguminous), and improve water retention.", "id": "fc17"}, {"front": "Drip irrigation", "back": "Delivers water directly to the root zone of individual plants through underground or surface tubes. Reduces water use by 30–50% compared to flood or sprinkler irrigation while actually increasing yields by delivering water more precisely when plants need it. Israel, operating in an extremely arid environment, pioneered and exports drip-irrigation technology and has achieved among the world's highest agricultural water-use efficiencies.", "id": "fc18"}, {"front": "Vertical and urban agriculture", "back": "Growing food in vertically stacked, controlled-environment facilities within or adjacent to cities. Can produce leafy greens, herbs, and strawberries with ~95% less water than conventional field production, no pesticides, on a tiny land footprint, year-round, and very close to urban consumers. Currently far more expensive per calorie than field production and limited to high-value, low-calorie crops; potential to address global food insecurity at scale remains debated.", "id": "fc19"}, {"front": "Amazon deforestation reversal — policy and governance", "back": "Brazil's deforestation rate peaked at 27,000 km²/year in 2004. Federal enforcement (IBAMA), satellite monitoring (PRODES/DETER), and supply-chain pressure (Soy Moratorium, 2006) drove the rate down ~85% by 2012. It then rose again under the Bolsonaro administration (2019–2022), which relaxed regulations and undermined enforcement. Rates fell sharply again under Lula da Silva (elected 2022) with a renewed zero-illegal-deforestation-by-2030 commitment — demonstrating deforestation is primarily a political and economic choice.", "id": "fc20"}, {"front": "Agroforestry", "back": "Integrating trees into agricultural landscapes to provide shade, windbreaks, habitat for pollinators and pest-control species, and carbon sequestration — while also producing fruit, nuts, or timber. A sustainable practice that addresses multiple environmental problems simultaneously: reduces erosion (tree root systems), maintains biodiversity (diverse habitat), sequesters carbon, and improves microclimate. Contrasts with monoculture systems that eliminate trees from the agricultural landscape entirely.", "id": "fc21"}, {"front": "Scale analysis: local land use to global climate — and back (FRQ framework)", "back": "The environmental consequences of agriculture demonstrate scale-crossing causation. Local scale: a farmer applies nitrogen fertilizer to a single Iowa field. Regional scale: nitrogen runs off into the Mississippi River basin. National scale: accumulated nitrogen creates the Gulf of Mexico dead zone. Global scale: deforestation decisions aggregate into climate-changing carbon emissions. Policy cascades back: global carbon price → national deforestation incentives → regional land-use patterns → local farmer economic calculations.", "id": "fc22"}, {"front": "Synthesis: Why is sustainable agricultural transformation described as a 'central challenge of the twenty-first century'?", "back": "Agriculture occupies ~50% of habitable land, draws down freshwater reserves, loads waterways with reactive nitrogen, and simplifies ecosystems into monocultures — while simultaneously being the activity on which eight billion people's food security depends and one of the largest drivers of climate change. Sustainable transformation (reducing emissions, halting deforestation, improving water efficiency, preserving biodiversity) is thus not a peripheral environmental issue but a prerequisite for both climate stability and global food security.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
