<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Human Geography &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "Choropleth Map", "back": "A thematic map that shades predefined geographic units (countries, states, counties) with a graduated color or pattern scale proportional to a statistical variable, such as population density or median income. Proper construction requires normalized data (rates or densities, not raw totals) to avoid misleading readers with large-area units that dominate the visual field regardless of their actual magnitude.", "id": "fc01"}, {"front": "Isoline Map (Isarithmic Map)", "back": "A map that connects points of equal value with continuous lines. Common forms include topographic contour maps (equal elevation), isotherms (equal temperature), isobars (equal atmospheric pressure), and isohyets (equal precipitation). Isolines excel at revealing continuous gradients across space but struggle with phenomena that are discrete or bounded rather than continuous.", "id": "fc02"}, {"front": "Dot Density Map", "back": "A map type that places a dot or symbol representing a fixed quantity at the location of each occurrence or cluster of occurrences of a phenomenon. Dot density maps convey absolute distribution and the texture of spatial clustering. Their weakness is that dots can overlap in dense areas, obscuring the actual count.", "id": "fc03"}, {"front": "Proportional Symbol Map", "back": "A map that uses symbols—typically circles—whose size scales to the magnitude of a variable at each location. Unlike choropleth maps, proportional symbol maps are not constrained by political or administrative boundaries, so they can locate phenomena where they actually occur rather than averaging across an entire region.", "id": "fc04"}, {"front": "Map Projection", "back": "A systematic mathematical transformation that converts the three-dimensional surface of the Earth onto a two-dimensional plane. Because this transformation is geometrically impossible without distortion, every projection makes trade-offs among shape, area, distance, and direction. The choice of projection encodes assumptions about which spatial properties deserve faithful representation—making projection selection an inherently political as well as technical act.", "id": "fc05"}, {"front": "Mercator Projection (1569)", "back": "A conformal projection designed by Gerardus Mercator for maritime navigation, preserving local angles so a straight line represents a constant compass bearing (rhumb line). It achieves conformality by stretching the horizontal scale toward the poles, dramatically inflating the apparent size of high-latitude landmasses—Greenland appears roughly the size of Africa, though Africa is approximately fourteen times larger. Became a problematic standard classroom map despite never being designed for that purpose.", "id": "fc06"}, {"front": "Peters Projection (Gall-Peters Projection, 1973)", "back": "An equal-area projection published by Arno Peters that preserves the relative sizes of land masses, showing Africa and South America in their true continental scale. The trade-off is shape: the projection severely distorts landmass forms, compressing the tropics and stretching the mid-latitudes. Peters explicitly promoted it as an anti-colonial corrective to the Mercator's systematic enlargement of the Global North.", "id": "fc07"}, {"front": "Robinson Projection (1963)", "back": "A compromise projection developed by Arthur Robinson on commission from Rand McNally, designed to minimize all distortions simultaneously rather than preserving any single property perfectly. It is neither conformal nor equal-area. Adopted by the National Geographic Society as its standard world map in 1988 and remains widely used in educational contexts.", "id": "fc08"}, {"front": "Goode's Homolosine Projection (1923)", "back": "A projection developed by J. Paul Goode that 'interrupts' the ocean surfaces to flatten the continental land masses with near-equal-area accuracy. The result resembles a flattened orange peel—oceans are split into lobes while continents lie flat—preserving area at the cost of making sea routes impossible to trace. Commonly used for global thematic maps (climate zones, vegetation, biomes) requiring accurate area comparison.", "id": "fc09"}, {"front": "Absolute Location", "back": "The exact position of a place on the Earth's surface, expressed in a coordinate system that is the same regardless of who uses it or where they stand. The most common system is the geographic grid of latitude (degrees north or south of the Equator) and longitude (degrees east or west of the Prime Meridian). Used in GPS navigation, surveying, military targeting, and any context requiring precise, machine-readable spatial reference.", "id": "fc10"}, {"front": "Relative Location", "back": "A description of where a place is in relation to other places, transportation routes, natural features, or cultural landmarks. Unlike absolute location, relative location is context-dependent—the same physical site can have dramatically different relative locations depending on which reference points are used and how surrounding geography has changed over time. In human geography, relative location often matters more than absolute location for explaining why settlements grow and economic activity concentrates.", "id": "fc11"}, {"front": "Distance Decay", "back": "The principle that the intensity of interaction, movement, or spatial diffusion between two places tends to decrease as the distance between them increases. Distance decay reflects the economic, temporal, and psychological costs of crossing space. It is not a fixed function—it varies by type of interaction and available transportation and communication technology—but describes a powerful baseline tendency shaping most human geographic patterns.", "id": "fc12"}, {"front": "Gravity Model", "back": "A model borrowed from Newtonian physics that predicts interaction between two places as proportional to the product of their populations and inversely proportional to the square of the distance between them (I = P₁P₂ / d²). Applied to predict migration flows, retail trade areas, telephone traffic, airline passenger volumes, and internet bandwidth. Its limitation is that it treats all 'mass' as equivalent and assumes distance is the primary frictional force.", "id": "fc13"}, {"front": "Cartographic Scale (Map Scale)", "back": "The ratio between a distance on the map and the corresponding distance on the ground. A scale of 1:24,000 means one unit on the map equals 24,000 units on the ground. Large-scale maps (small denominators, e.g., 1:10,000) show small areas in great detail; small-scale maps (large denominators, e.g., 1:1,000,000) show large areas with little detail.", "id": "fc14"}, {"front": "Analytical Scale (Geographic Scale of Analysis)", "back": "The spatial extent at which a phenomenon is studied or at which a process operates. Geographers recognize four nested levels: local (neighborhood, city block), regional (metropolitan area, drainage basin), national (sovereign state), and global (planet-spanning patterns). The same phenomenon can appear entirely different depending on which scale of analysis is applied—a critical insight tested directly on the AP exam.", "id": "fc15"}, {"front": "Conformality (Conformal Projection)", "back": "A map projection property that preserves local angles and shapes, meaning that small shapes on the Earth's surface appear as correct shapes on the map. The Mercator projection is conformal. Achieving conformality requires sacrificing equal-area accuracy, so landmasses far from the projection's standard line (particularly near the poles) appear distorted in size.", "id": "fc16"}, {"front": "Equal-Area (Equivalent) Projection", "back": "A map projection property that preserves the relative sizes of landmasses across the map. The Gall-Peters projection is equal-area. Achieving equal area requires sacrificing conformality, so shapes are distorted—regions appear stretched or compressed. Equal-area projections are preferred for thematic maps where accurate size comparison across the globe is essential.", "id": "fc17"}, {"front": "Modifiable Areal Unit Problem (MAUP)", "back": "A systematic bias in choropleth maps and statistical analyses in which results change depending on how geographic units are defined and bounded. A choropleth map of population density by state looks very different from the same data mapped by county, because the aggregation boundaries determine what patterns are visible. Proper choropleth construction uses normalized data (rates or densities) to reduce—though not eliminate—this problem.", "id": "fc18"}, {"front": "Why is the Mercator projection described as 'not wrong, but misused'?", "back": "The Mercator projection is mathematically correct for its intended purpose—maritime navigation, where preserving compass bearings is essential. Its distortion of landmass sizes near the poles is the necessary consequence of conformality, not an error. The problem arose when it was adopted as the standard classroom world map in the nineteenth and twentieth centuries, a context for which it was never designed, making its political implications far more significant.", "id": "fc19"}, {"front": "What is the key distinction between large-scale and small-scale maps?", "back": "Large-scale maps have small denominators (e.g., 1:10,000) and show small areas in great detail—individual streets and buildings are visible. Small-scale maps have large denominators (e.g., 1:10,000,000) and show large areas with little detail—entire continents fit on one page. The counterintuitive terminology trips up many students: 'large scale' means the map fraction is large, so objects appear large.", "id": "fc20"}, {"front": "Maps as Arguments", "back": "A foundational principle of critical cartography: every map is an argument about how space should be represented. The choices of projection, scale, and map type each determine what geographic patterns are visible and what remains obscured. There is no view from nowhere in cartography—students should ask not just 'what does this map show?' but 'what has this map been designed to make visible, and what has it been designed to hide?'", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
