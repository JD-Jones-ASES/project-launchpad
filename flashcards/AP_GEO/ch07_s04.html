    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>

    <main class="main-content">

                </div>

                <div class="fc-progress">

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">

                    <button class="fc-tool" onclick="resetDeck()">Reset</button>

    <script>
    var CARDS = [{"front": "Comparative advantage (definition)", "back": "The principle, formalized by David Ricardo (1817), that a country gains from specializing in goods for which its opportunity cost is lower — even if it is not absolutely more productive than trading partners. England is more productive at both cloth and wine than Portugal, but England is relatively more productive at cloth; Portugal at wine. Both gain from specialization and trade. Foundation of the theoretical case for free trade and international economic specialization.", "id": "fc01"}, {"front": "Modern sources of comparative advantage", "back": "In the contemporary global economy, comparative advantage is shaped less by natural endowments than by accumulated investments in human capital, infrastructure, and technology. South Korea has a comparative advantage in semiconductor design because of decades of public investment in engineering education and R&D — not natural resources. Bangladesh has a comparative advantage in garment assembly because of its large, low-wage workforce and accumulated industry expertise.", "id": "fc02"}, {"front": "Tariffs vs. quotas vs. non-tariff barriers", "back": "Tariffs (duties): taxes on imported goods, raising their price; generate government revenue and protect domestic industries but reduce consumer welfare. Quotas: quantity limits on imports (e.g., US sugar quota raises domestic price to ~twice world price). Non-tariff barriers: regulatory measures that restrict trade without explicit taxes — product safety standards foreign manufacturers cannot meet, packaging requirements, customs delays, 'buy domestic' procurement rules. Non-tariff barriers have proliferated as tariffs fell.", "id": "fc03"}, {"front": "Smoot-Hawley Tariff Act (1930) — what happened", "back": "Signed by President Hoover on June 17, 1930 (seven months after the stock market crash), it raised US duties on 20,000+ imported goods to the highest levels in American history — average ad valorem rates ~50%. Over 25 foreign governments retaliated within months. Global trade volumes fell ~60% between 1929 and 1934. Near-economic-consensus: Smoot-Hawley did not cause the Depression but deepened and prolonged it.", "id": "fc04"}, {"front": "Smoot-Hawley — political economy lesson", "back": "A Democratic House and Republican Senate both passed the bill despite over 1,000 economists signing an open letter urging Hoover to veto it. Agricultural interests (lobbying since the 1920s for tariff relief) and industrial producers were better organized than the diffuse consumers who bore the costs. Illustrates the political economy of protectionism: concentrated benefits for producers, dispersed costs for consumers — a structural bias toward trade restriction in democratic politics.", "id": "fc05"}, {"front": "Post-WWII trade architecture — GATT", "back": "The General Agreement on Tariffs and Trade, signed in 1947 by 23 countries, established the most-favored-nation (MFN) principle: any trade concession granted to one partner must be extended to all signatories. Eight rounds of multilateral tariff negotiations under GATT (culminating in the Uruguay Round, 1986–1994) reduced average tariffs in developed countries from ~40% (1947) to under 5% (1994). GATT was the direct institutional response to Smoot-Hawley.", "id": "fc06"}, {"front": "World Trade Organization (WTO) — definition", "back": "Established January 1995 as GATT's successor. Added a binding dispute-resolution mechanism (Appellate Body) and extended coverage to services (GATS) and intellectual property (TRIPS). By 2024: 166 members representing 98% of world trade. Governed by consensus — any member has a veto — which has produced gridlock since the Doha Round (launched 2001) collapsed without agreement.", "id": "fc07"}, {"front": "IMF and World Bank — roles and criticism", "back": "IMF (founded Bretton Woods, 1944): provides short-term balance-of-payments financing in exchange for policy conditionality (fiscal austerity and structural adjustment). Critics argue 1980s–90s conditionality programs deepened poverty in Africa and Latin America by cutting health and education spending. World Bank (IBRD): provides long-term development lending; shifted from post-WWII European reconstruction to developing-country infrastructure and poverty reduction in the 1960s.", "id": "fc08"}, {"front": "Most-favored-nation (MFN) principle", "back": "The foundational rule of the GATT/WTO system: any trade concession (tariff reduction, quota expansion) granted to one trading partner must be extended to all other WTO members. Prevents bilateral trade deals from creating discriminatory advantages and pushes toward multilateral liberalization. Exception: regional trade agreements (RTAs) are permitted to offer preferential rates among members without extending them to all WTO members.", "id": "fc09"}, {"front": "Regional trade agreements (RTAs) and the 'spaghetti bowl'", "back": "Frustrated by slow WTO multilateral progress, countries negotiated 350+ RTAs in force by 2024. The 'spaghetti bowl' (Jagdish Bhagwati's term) captures the resulting complexity: a single product may face different tariff rates depending on where it was produced, rules-of-origin requirements, and preferential access provisions that vary by country pair. Key RTAs: NAFTA/USMCA (US–Canada–Mexico), RCEP (15 Asia-Pacific nations — world's largest RTA by GDP/population share), ASEAN, Mercosur.", "id": "fc10"}, {"front": "China's WTO accession (2001) — significance", "back": "In December 2001, China joined the WTO, committing to reduce tariffs, open sectors to foreign investment, and accept dispute-resolution jurisdiction. Within China: manufacturing employment and exports surged; China's share of world manufactured exports roughly tripled (2001–2010); hundreds of millions of workers moved from subsistence agriculture to urban factories, driving the largest poverty-reduction episode in history.", "id": "fc11"}, {"front": "The 'China shock' — US effects", "back": "Economists Autor, Dorn, and Hanson (2013) estimated Chinese import competition cost the US ~2 to 2.4 million manufacturing jobs between 1999 and 2011. Losses were geographically concentrated: furniture-manufacturing centers in North Carolina, small-appliance towns in Ohio suffered persistent unemployment, declining wages, and social deterioration. Gains from trade (lower prices for consumers) were widely dispersed; losses were spatially concentrated — making them politically potent.", "id": "fc12"}, {"front": "Smoot-Hawley vs. China WTO accession — inverse case studies", "back": "Smoot-Hawley (1930): the canonical failure of trade restriction — unilateral tariff increases triggered global retaliation, collapsing world trade by ~60% and deepening the Depression. China WTO accession (2001): the most consequential trade liberalization since GATT's founding — triggered a manufacturing boom in China, drove the largest poverty reduction in history, and simultaneously disrupted US manufacturing communities. Together, they bracket the costs and benefits of trade openness.", "id": "fc13"}, {"front": "UN Sustainable Development Goals (SDGs) — overview", "back": "Adopted by the UN General Assembly in 2015 as the 2030 Agenda for Sustainable Development — 17 interconnected goals targeting achievement by 2030. Extend the earlier Millennium Development Goals (MDGs, 2000–2015) with broader scope covering poverty, hunger, health, education, gender equality, clean water, energy, economic growth, infrastructure, inequality, sustainable cities, climate, marine and land ecosystems, peace, and global partnerships. A 2023 mid-term assessment found most goals off track.", "id": "fc14"}, {"front": "SDGs — tension between Goals 8 and 13", "back": "Goal 8 (Decent Work and Economic Growth) requires industrialization and manufacturing expansion in developing countries to lift populations out of poverty. Goal 13 (Climate Action) requires rapid reduction in carbon emissions — which industrialization produces. For many developing economies, these goals are in direct tension: they cannot simultaneously eliminate carbon emissions and industrialize at the pace required to escape poverty. This is the central dilemma of sustainable development policy.", "id": "fc15"}, {"front": "Microfinance — Grameen Bank model", "back": "Muhammad Yunus (Bangladeshi economist) began experimenting with small-credit lending to poor rural women in the 1970s, formalizing as Grameen Bank in 1983. The Grameen model offered loans without collateral, substituting group lending (borrowers form small groups jointly responsible for repayment) as a social enforcement mechanism. Yunus received the Nobel Peace Prize in 2006. The model bypasses conventional banks and gives the poor direct access to capital for small enterprises.", "id": "fc16"}, {"front": "Critique of microfinance", "back": "Randomized controlled trials in India, Bangladesh, and Ethiopia found microcredit had modest positive effects on enterprise formation and consumption but did not reliably lift households out of poverty or significantly empower women. Mission drift: many microfinance institutions began charging usurious interest rates (20–100% per year), reversing the 'liberation' narrative. The 2010 Andhra Pradesh crisis (India), where aggressive lending practices contributed to farmer suicides, was the field's most cautionary episode.", "id": "fc17"}, {"front": "Global pharmaceutical supply chain — structure", "back": "R&D: US/European labs (partly NIH-funded); 20-year patent exclusivity. Clinical trials: Turkey, Poland, Romania, Brazil, South Africa (large, diverse, lower-cost populations). APIs (Active Pharmaceutical Ingredients): India (~70% of developing-country generic APIs) and China. Excipients: India and China. Packaging: Germany and US. Distribution: AmerisourceBergen, McKesson, Cardinal Health distribute ~90% of US pharmaceutical volumes.", "id": "fc18"}, {"front": "COVID-19 and pharmaceutical supply-chain vulnerability", "back": "COVID-19 shutdowns at Chinese chemical facilities disrupted the global API supply chain. The US had largely exited API manufacturing in the 1990s as production migrated to lower-cost Asian producers — no domestic alternative existed. The episode illustrated that global supply-chain efficiency and supply-chain resilience are in tension: geographic concentration of production creates strategic vulnerabilities that market prices alone cannot capture. It catalyzed US legislation (CHIPS Act pharmaceutical provisions) and EU industrial policy to reshore critical medical supply chains.", "id": "fc19"}, {"front": "Supply chain: efficiency vs. resilience trade-off", "back": "Just-in-time, geographically concentrated supply chains minimize costs but create single points of failure. When COVID-19 disrupted Chinese API factories, there was no domestic fallback for US pharmaceutical producers. The pandemic forced a recalibration: resilience requires redundancy and geographic diversification (reshoring, nearshoring, dual-sourcing) — which adds cost. Governments began weighing national security and public health resilience against pure comparative-advantage efficiency.", "id": "fc20"}, {"front": "Scale analysis — pharmaceutical supply chain", "back": "Local scale: an Indian API factory in Hyderabad employs chemical engineers whose wages have risen with global demand. National scale: India's dominance of global API supply gives its government leverage in trade negotiations and vulnerability if a major customer (US, EU) decides to reshore. Global scale: geographic concentration in a handful of countries creates vulnerabilities for the entire international community during disruptions (COVID-19, geopolitical conflict). The same event generates different policy problems depending on the scale of analysis.", "id": "fc21"}, {"front": "Synthesis: How do comparative advantage, Wallerstein, and the pharmaceutical case intersect?", "back": "Comparative advantage logic explains why API production migrated to India and China — lower labor and regulatory costs gave them a relative advantage in chemical synthesis. Wallerstein's framework explains the structural outcome: core countries (US, Germany) capture high-value R&D and brand rents while semi-peripheral India and China perform the chemical manufacturing. The pharmaceutical supply-chain case then reveals the vulnerability embedded in this arrangement: efficiency gains in normal times become strategic liabilities during crises — a cost the market price of APIs never reflected.", "id": "fc22"}, {"front": "Synthesis: From Smoot-Hawley to the WTO — what the institutional arc reveals", "back": "Smoot-Hawley showed that uncoordinated national trade policy produces a race-to-the-bottom (retaliatory tariffs, trade collapse). GATT/WTO built the institutional infrastructure to prevent that outcome — MFN rules, binding dispute resolution, successive liberalization rounds. But the WTO's consensus governance (any member can veto) and the China shock's concentrated regional costs have eroded political support for multilateralism. The arc from 1930 to 2024 shows that trade liberalization's aggregate gains and its distributional losses are politically separable — and the losses vote.", "id": "fc23"}, {"front": "Doha Round — significance of its failure", "back": "The WTO's Doha Development Round, launched in 2001, aimed to reduce agricultural subsidies in core countries (which suppress world prices and harm peripheral-country farmers) and to expand developing-country market access. It collapsed without agreement — primarily because core countries (US, EU) refused to cut agricultural subsidies and developing countries (India, Brazil) refused to open their service sectors. The failure illustrates the WTO's consensus-governance problem and the limits of multilateral trade negotiation when North–South distributional tensions are central.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
