<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Human Geography &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Site (urban geography)", "back": "The physical and intrinsic characteristics of the land on which a settlement is built: access to fresh water, defensible terrain, fertile hinterland, proximity to raw materials, and natural harbor. Site factors are place-bound and describe what a location offers independent of its relationship to surrounding places.", "id": "fc01"}, {"front": "Situation (urban geography)", "back": "The relative position of a settlement with respect to surrounding places, transportation networks, trade routes, and resources. Situation explains connectivity rather than intrinsic physical qualities and can change dramatically as transportation technology evolves.", "id": "fc02"}, {"front": "Break-of-bulk point", "back": "A location where goods must be transferred from one mode of transport to another. Cities at break-of-bulk points gain economic power from their network position rather than from their own soil. Classic examples include where navigable rivers meet roads or where ocean shipping meets a continental interior.", "id": "fc03"}, {"front": "Why did Chicago's uninspiring site not prevent its rise?", "back": "Chicago's flat, swampy Lake Michigan shoreline was poor in site qualities, but its situation was exceptional. The Chicago Portage linked the Great Lakes drainage to the Mississippi watershed, making Chicago the continental hinge for trade. The Illinois and Michigan Canal (1848) and the railroad system that followed capitalized on that situational advantage.", "id": "fc04"}, {"front": "Sjoberg Pre-Industrial City Model (1960)", "back": "Proposed by Gideon Sjoberg: all pre-industrial cities share a common spatial structure due to the absence of mechanized transport. Elites cluster at the center near seats of power; artisans and merchants occupy middle rings; the urban poor live at the periphery. This inverts the modern North American pattern where affluent residents historically fled the core.", "id": "fc05"}, {"front": "Why was the pre-industrial city so small and dense?", "back": "Without mechanized transport, no worker could live more than ~30–45 minutes' walk from their workplace. This imposed a hard ceiling on urban radius (roughly 1.5 miles), forcing enormous density. Political power, not economic productivity, was the primary engine of pre-industrial urban growth.", "id": "fc06"}, {"front": "John Borchert (1918–2001)", "back": "University of Minnesota geographer whose 1967 paper 'American Metropolitan Evolution' identified five technological epochs of American urban development. He argued that the dominant energy source and transportation technology of each era determined which cities grew and what form they took. His work gave planners a systematic vocabulary for understanding urban change.", "id": "fc07"}, {"front": "Borchert's Epoch 1 — Sail-Wagon (pre-1830)", "back": "Energy: wind and animal traction. Dominant cities: coastal ports and river-mouth cities (Boston, New York, Baltimore, New Orleans) and inland portage/confluence cities (Pittsburgh, Cincinnati). Urban form: compact, walking-scale, mixed-use. The Great Lakes and interior remained largely non-urban.", "id": "fc08"}, {"front": "Borchert's Epoch 2 — Iron Horse (1830–1870)", "back": "Energy: coal-fired steam locomotives. Dominant new cities: railroad junction cities — Albany, Buffalo, Cleveland, Detroit, and above all Chicago. Railroads allowed cities to grow inland from the coast and accelerated Midwest settlement. Urban form remains compact, organized around the depot as a new focal point.", "id": "fc09"}, {"front": "Borchert's Epoch 3 — Steel Rail (1870–1920)", "back": "Energy: high-capacity steel-rail railroads plus industrial electric power. Dominant cities: manufacturing belt metropolises — Chicago, Pittsburgh, Detroit, Cleveland, Milwaukee, St. Louis. Heavy industry (steel, meatpacking, auto assembly) drove growth. Urban form begins spreading along streetcar lines but the city core remains dominant.", "id": "fc10"}, {"front": "Borchert's Epoch 4 — Auto-Air (1920–1970)", "back": "Energy: petroleum (gasoline engine and jet fuel). Dominant new cities: Sunbelt cities (Los Angeles, Phoenix, Houston, Miami, San Jose) and suburban rings everywhere. The automobile decoupled residence from transit corridors, enabling low-density sprawl. The Interstate Highway System (begun 1956) dramatically accelerated this process.", "id": "fc11"}, {"front": "Borchert's Epoch 5 — High-Tech (1970–present)", "back": "Energy: digital telecommunications infrastructure. Dominant cities: knowledge clusters (Silicon Valley, Boston's Route 128, Seattle, Austin) and edge cities — large suburban office-retail nodes (Tysons Corner VA, Galleria Houston, Schaumburg IL) that have effectively become secondary downtowns.", "id": "fc12"}, {"front": "Edge city", "back": "A large suburban office-retail complex that functions as a secondary downtown — often larger in employment than the historic CBD it nominally orbits. Emerged in Borchert's High-Tech epoch. Associated with the Galactic City model. Examples: Tysons Corner, VA; Schaumburg, IL; Perimeter Center, Atlanta.", "id": "fc13"}, {"front": "How does the walking city differ from the automobile city in spatial form?", "back": "The walking city was extremely dense because the cost of overcoming distance was high — workers had to live within ~1.5 miles of their workplace. The automobile city sprawled in all directions because the car made movement in any direction roughly equivalent in cost, collapsing the friction of distance.", "id": "fc14"}, {"front": "Chicago's trajectory through Borchert's epochs", "back": "Sail-Wagon: tiny portage settlement. Iron Horse: the Illinois and Michigan Canal (1848) and railroad hub made it a metropolis (109,000 by 1860). Steel Rail: Union Stock Yards made it the industrial capital of the Midwest. Auto-Air: suburbanization and industrial decline. High-Tech: financial instruments (CME/CBOT), professional services, and cultural capital sustain it.", "id": "fc15"}, {"front": "Critique of Borchert's metropolitan epochs model", "back": "The model focuses almost exclusively on American cities and on energy/transport as primary drivers. Critics note that social forces — racial segregation, federal housing policy, zoning law — shaped urban form at least as powerfully as technology. The model underemphasizes political and cultural factors.", "id": "fc16"}, {"front": "Critique of Sjoberg's Pre-Industrial City model", "back": "Criticized for overgeneralizing across very different societies. Some medieval European cities had merchants in the most central locations, not elites. The model says little about urban change dynamics — it is a static cross-section, not an explanation of process.", "id": "fc17"}, {"front": "Scale analysis applied to urban location decisions", "back": "Urban location decisions operate at multiple scales simultaneously: local (site determines drainage and flood risk), regional (situation determines growth or stagnation as corridors shift), national (federal investment in highways or canals determines which situations become advantageous), and global (Chicago's commodities markets price grain for farmers worldwide).", "id": "fc18"}, {"front": "Synthesis: How do site and situation interact over time?", "back": "Site and situation can pull in opposite directions as conditions change. Cities with excellent sites but deteriorating situations (bypassed by new transport corridors) may stagnate. Cities with modest sites but exceptional situations explode when technology makes their position the fulcrum of a continental system — Chicago being the canonical example. Geography constrains the possible; technology and social forces determine which possibilities are realized.", "id": "fc19"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
