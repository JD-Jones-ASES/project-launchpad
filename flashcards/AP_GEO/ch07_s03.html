    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 7, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

    <script>
    var CARDS = [{"front": "Deindustrialization (definition)", "back": "The decline of industrial (manufacturing) employment and output as a share of total economic activity in a previously industrial region, typically driven by: (1) technological change — automation reducing labor demand; (2) labor-cost arbitrage — production relocating to lower-wage regions; (3) demand composition shifts — consumers spending more on non-tradable services. Produces spatially concentrated effects: cities dependent on a single industry suffer disproportionately.", "id": "fc01"}, {"front": "The American Rust Belt", "back": "A term coined in the early 1980s for the manufacturing corridor stretching from the Great Lakes through the Ohio Valley. Key cities: Detroit (automobiles), Pittsburgh (steel), Cleveland (metals/chemicals), Gary (steel), Buffalo (steel/chemicals), Youngstown (steel). Detroit's population fell from 1.85 million (1950) to under 700,000 (2020). Pittsburgh lost ~150,000 manufacturing jobs in the 1970s–80s alone.", "id": "fc02"}, {"front": "Three causes of deindustrialization", "back": "(1) Technological change: automation and robotics permanently reduced labor content — a car body needing 40 welders in 1970 needed 4 in 2000. (2) Global labor-cost arbitrage: as container shipping costs fell, assembly migrated first to the US South (weaker unions), then Mexico, then East Asia. (3) Demand shifts: rising incomes in core countries led consumers to spend more on services (health, education, entertainment), which are non-tradable and cannot be offshored.", "id": "fc03"}, {"front": "European Rust Belt geographies", "back": "Parallel deindustrialization occurred across Europe from the 1970s onward. The English Midlands (Birmingham metal industries, Coventry auto sector), the German Ruhr (world's largest pre-WWII coal and steel district), and Scottish Clydeside (shipbuilding) all experienced structural collapse. Britain's manufacturing employment fell from ~38% of the workforce (1960) to under 9% (2010) — no precedent in the country that invented industrial capitalism.", "id": "fc04"}, {"front": "Sun Belt shift", "back": "Simultaneous with Rust Belt decline, the US South and Southwest ('Sun Belt') industrialized, attracting firms seeking lower labor costs, weaker union environments, and lower real estate costs. States like Texas, North Carolina, South Carolina, Tennessee, and Alabama gained manufacturing and logistics employment that the Great Lakes region lost. The shift was driven by the same wage-arbitrage logic Weber's labor-deviation factor predicts.", "id": "fc05"}, {"front": "Maquiladora system — origin", "back": "Originated with Mexico's Border Industrialization Program (BIP) of 1965. US-owned factories could import components duty-free into a designated border zone, assemble them using Mexican labor, and re-export finished goods to the US paying tariff only on the Mexican value added — not on the full product value. Cities like Tijuana, Ciudad Juárez, Monterrey, and Matamoros grew explosive export-manufacturing sectors.", "id": "fc06"}, {"front": "Maquiladora (definition)", "back": "A factory located in Mexico (historically near the US border, now more widely distributed) that imports components duty-free, assembles them using Mexican labor, and re-exports the finished product. Exploits a comparative advantage in labor costs while maintaining supply-chain proximity to the US market. Contemporary maquiladoras produce automobiles, electronics, medical devices, apparel, and aerospace components; the sector employs ~2.5 million workers.", "id": "fc07"}, {"front": "NAFTA and the maquiladora boom", "back": "The North American Free Trade Agreement (effective January 1994) accelerated the maquiladora system by removing remaining tariffs and liberalizing investment rules — allowing US and Canadian firms to relocate any manufacturing function to Mexico, not just border-zone assembly. Maquiladora employment grew from ~550,000 (1993) to over 1.3 million (2000). NAFTA's successor, USMCA (2020), added labor-standard provisions requiring 40% of auto content from workers earning over $16/hour.", "id": "fc08"}, {"front": "Offshoring vs. outsourcing", "back": "Offshoring: relocating a business function to another country — whether within the same company (captive offshoring) or by contracting with a foreign firm. The key spatial dimension is international relocation. Outsourcing: contracting a function to an external firm rather than performing it in-house. The key organizational dimension is externalization. A US firm hiring a US call-center firm = outsourcing, not offshoring. A US firm contracting a Bangladeshi supplier = both.", "id": "fc09"}, {"front": "Special Economic Zones (SEZs) vs. Export-Processing Zones (EPZs)", "back": "An EPZ is a fenced, customs-controlled zone offering tax holidays, duty-free inputs, and streamlined regulations in exchange for exporting most or all output — designed to attract labor-intensive assembly; exists in 130+ countries. An SEZ is broader: it can include EPZs but may also permit domestic sales, allow financial sector liberalization, and — as in China — serve as testing grounds for market reforms the government is unwilling to apply nationally.", "id": "fc10"}, {"front": "Shenzhen SEZ — case study", "back": "In 1979, Shenzhen was a fishing village of ~30,000 people. Designated China's first SEZ in 1980, it became the fastest large-scale urbanization in recorded history: ~12 million people and GDP over $450 billion by 2023. Success factors: Hong Kong capital and management expertise; cheap land and abundant migrant labor; flexible state-provided infrastructure. Home to Foxconn (world's largest contract electronics manufacturer), Huawei, Tencent, and BYD.", "id": "fc11"}, {"front": "Shenzhen through Wallerstein's and Rostow's lenses", "back": "Wallerstein: Shenzhen represents a semi-peripheral zone that climbed toward core functions within forty years — moving from low-wage assembly to genuine R&D and innovation (Huawei, Tencent, BYD). Rostow: it is simply the world's most compressed take-off — a classic leading-sector-driven transition from agrarian to industrial to high-tech economy, completing in decades what Britain took a century to achieve.", "id": "fc12"}, {"front": "Technopole (definition)", "back": "A planned or organically developed industrial district specializing in high-technology industries (semiconductors, software, biotechnology, aerospace), typically located near a major research university and anchored by knowledge spillovers, skilled-labor pools, and venture capital networks. Term coined by Manuel Castells and Peter Hall in their 1994 study Technopoles of the World. Represents agglomeration economies built on knowledge and talent rather than physical infrastructure.", "id": "fc13"}, {"front": "Castells & Hall: Technopoles of the World (1994)", "back": "Proposers: Manuel Castells (sociologist, Berkeley) and Peter Hall (urban planner, Berkeley). Central claim: late 20th-century capitalism generates value through information processing and innovation rather than physical manufacturing. The spatial expression is the technopole: a high-tech cluster whose competitive advantage rests on proximity to research universities, venture capital, and networks of highly skilled workers — a new form of agglomeration economy built on knowledge spillovers.", "id": "fc14"}, {"front": "Silicon Valley as a technopole", "back": "Stanford and Berkeley provide research and graduates; venture capital firms on Sand Hill Road provide financing; the density of engineers and entrepreneurs generates idea spillovers. Network effects are so strong that even very high land and labor costs do not cause firms to disperse. The San Jose–Sunnyvale–Santa Clara metro receives more venture capital than most entire countries and accounts for a disproportionate share of US tech-sector IPOs.", "id": "fc15"}, {"front": "Other key technopoles", "back": "Boston / Route 128: MIT and Harvard anchor biotech and software; Kendall Square is the world's most productive biotech corridor by patent output per square mile. Bangalore: Indian Institutes of Technology supply software talent; time-zone advantage for US clients; Infosys, Wipro. Tel Aviv / Haifa: military R&D (IDF Unit 8200) as de facto tech incubator; Technion anchors hardware/materials. Cambridge (UK): 'Silicon Fen' around Cambridge University in biosciences, software, semiconductors (ARM Holdings).", "id": "fc16"}, {"front": "Critique of technopoles as a development strategy", "back": "Technopoles can be extraordinarily expensive to live in, exacerbating housing inequality and displacing working-class populations. The knowledge economy's geographic rewards concentrate among the already-advantaged; deindustrialized regions rarely become technopoles simply by building a science park. Many planned 'science cities' (Korean science parks, Russia's 'Silicon Steppes') have failed because agglomeration cannot be manufactured top-down — the spillovers require an authentic critical mass of talent.", "id": "fc17"}, {"front": "Packard plant, Detroit — as a symbol", "back": "The Packard automotive plant on East Grand Boulevard employed 36,000 workers (1955) and was empty by 1958. By the 1980s it had become the most photographed ruin in America — used by journalists as shorthand for the entire story of American industrial decline. The plant captures the central geographic paradox: at precisely the moment global industrial output reached record highs, the places where modern industry had first grown were losing it fastest.", "id": "fc18"}, {"front": "Political consequences of deindustrialization", "back": "Rust Belt communities experienced not only job loss but the full range of associated social pathologies: rising mortality, declining marriage rates, opioid addiction, school closures, and local government fiscal crisis. The political backlash against globalization and trade agreements that drove the 2016 and 2024 US presidential elections was directly rooted in these deindustrialized geographies — the spatial concentration of trade losses making them politically potent.", "id": "fc19"}, {"front": "Synthesis: Rust Belt–Sun Belt–Maquiladora as a spatial relationships case", "back": "The same causal forces — wage differentials, falling transport costs (containerization), declining union strength — produced three spatially distinct outcomes simultaneously: job loss in the industrial Midwest (Rust Belt), job gain in the US South (Sun Belt), and export-manufacturing growth in northern Mexico (maquiladoras). Labor arbitrage was the common cause; the geography of labor cost and regulation determined where the jobs went. This is Weber's labor-deviation logic operating at continental scale.", "id": "fc20"}, {"front": "Synthesis: Why don't deindustrialized regions easily become technopoles?", "back": "Technopoles require a critical mass of research universities, venture capital, and highly skilled workers that took decades to accumulate in Silicon Valley, Boston, and Bangalore. Rust Belt cities have legacy infrastructure, blue-collar workforce demographics, and tax bases in fiscal crisis — the opposite of technopole inputs. 'Science parks' can be built, but knowledge spillovers require authentic social networks and talent density that top-down planning cannot replicate. This explains the persistent intra-national divergence between innovation hubs and deindustrialized hinterlands.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
