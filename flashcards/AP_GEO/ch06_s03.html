<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Human Geography &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Burgess Concentric Zone Model (1923)", "back": "Proposed by sociologist Ernest Burgess: the American industrial city organizes itself as a series of concentric rings, each with a distinctive land use and social character. Five zones radiate outward from the CBD. Each zone continuously expands into the next through 'invasion and succession.' Derived from empirical study of 1920s Chicago.", "id": "fc01"}, {"front": "Burgess Zone I — Central Business District (CBD)", "back": "The commercial, financial, and governmental core. Highest land values, tallest buildings, greatest pedestrian density. Contains retail shops, offices, hotels, and civic institutions. The nucleus around which all other zones are organized in the Burgess model.", "id": "fc02"}, {"front": "Burgess Zone II — Zone of Transition", "back": "Immediately surrounding the CBD. Mixed factories, warehousing, and deteriorating housing — an 'urban frontier' where commercial expansion constantly threatens residential stability. Home to recent immigrants, the poorest workers, vice districts, and bohemian enclaves. Perpetually being converted from residential to commercial use.", "id": "fc03"}, {"front": "Burgess Zones III–V", "back": "Zone III (Working-Class Housing): stable neighborhoods of second-generation immigrant families. Zone IV (Better Residences): middle-class single-family housing connected to the CBD by streetcar. Zone V (Commuter Zone): wealthy suburban fringe accessible only by commuter rail or automobile; upper-class estates and dormitory suburbs.", "id": "fc04"}, {"front": "Invasion and succession (Burgess)", "back": "The process by which each concentric zone continuously expands outward into the next zone, displacing its previous occupants. As the CBD expands, the Zone of Transition absorbs former working-class housing; working-class neighborhoods expand into middle-class zones; and so on. The model is dynamic in this sense but static in its zone sequence.", "id": "fc05"}, {"front": "Hoyt Sector Model (1939)", "back": "Proposed by economist Homer Hoyt based on rent data from 142 American cities: land uses form wedge-shaped sectors radiating outward from the CBD along transportation arteries — not concentric rings. Once a high-rent residential area begins along a particular corridor, it continues expanding outward along that sector as new construction pushes to the suburbs.", "id": "fc06"}, {"front": "Filtering (Hoyt Sector Model)", "back": "As new high-quality housing is built at the outer edge of the high-income sector, previously newest housing becomes the domain of the next income tier, which vacates housing for a lower tier — a cascading process. In theory this delivers decent used housing to lower-income groups; in practice, racial segregation, deteriorating infrastructure, and disinvestment often arrested it.", "id": "fc07"}, {"front": "Harris-Ullman Multiple Nuclei Model (1945)", "back": "Proposed by Chauncy Harris and Edward Ullman: the modern city develops around several separate nuclei rather than a single dominant CBD. Nodes include a CBD, heavy-industry district, university district, medical center, suburban retail and office node, airport zone, and port zone. Residential areas distribute around these various employment nodes.", "id": "fc08"}, {"front": "Why do multiple nuclei form? (Harris-Ullman)", "back": "Some activities require specialized facilities (ports, rail access, runways) only available at particular locations. Some benefit from agglomeration with similar activities. Some are mutually repellent (heavy industry repels high-end residential). High CBD land costs push some activities to cheaper peripheral locations. The automobile enabled all of these tendencies.", "id": "fc09"}, {"front": "Galactic City Model (1980s)", "back": "Associated with Peter Muller and popularized by Joel Garreau's Edge City (1991): the post-1970 American metropolitan region is organized around a galaxy of roughly equivalent nodes — the original downtown (often declining) surrounded by multiple edge cities at freeway interchanges, major malls, and airport corridors. Residents increasingly live, work, and shop entirely within a suburb.", "id": "fc10"}, {"front": "Ernest Burgess (1886–1966)", "back": "University of Chicago sociologist, central member of the Chicago School alongside Robert Park and Roderick McKenzie. His concentric zone model emerged from systematic urban fieldwork — mapping neighborhoods, interviewing residents, charting spatial distribution of social phenomena. Pioneered mixed-methods research combining statistics with ethnography.", "id": "fc11"}, {"front": "McGee Southeast Asian City Model (1967)", "back": "Proposed by T. G. McGee: colonial Southeast Asian cities contain at least three distinct urban cores — (1) a Western commercial zone (port, banks, colonial offices), (2) an alien commercial zone (Chinese merchant district), and (3) a traditional/indigenous market area. These zones remain spatially distinct rather than merging into a single CBD. High-density squatter settlements appear at the periphery and along transport corridors.", "id": "fc12"}, {"front": "Griffin-Ford Latin American City Model (1980)", "back": "Proposed by Ernst Griffin and Larry Ford: the Latin American city has a vibrant CBD with a colonial historic center (plaza mayor with cathedral and government palace). A spine of high-income development extends outward from the CBD in the direction of amenity. Surrounding zones grade from a 'zone of maturity' (working-class, decent infrastructure) through 'in situ accretion' (informal housing being upgraded) to a 'disamenity sector' (extreme poverty on topographically difficult land — hillsides, floodplains).", "id": "fc13"}, {"front": "Disamenity sector (Griffin-Ford model)", "back": "The sector of the Latin American city containing the most desperate poverty, typically occupying topographically difficult land — steep hillsides, floodplains, ravines. Known as favelas (Brazil), callampas (Chile), or colonias populares (Mexico). Contrasts sharply with the North American model where the urban poor occupy the inner city rather than the periphery.", "id": "fc14"}, {"front": "Sub-Saharan African City Model", "back": "Shaped by colonial legacy (British or French), rapid post-independence urbanization, and informal housing on a massive scale. Includes three distinct CBD-like zones: (1) a modern colonial CBD with European-style towers, (2) a traditional market/bazaar zone, and (3) a transitional mixed-use zone. The urban periphery is dominated by large informal settlements — bidonvilles (French West Africa), townships (southern Africa), slums (East Africa).", "id": "fc15"}, {"front": "How does the Griffin-Ford model differ from Burgess regarding affluent residents?", "back": "In Burgess, the most affluent residents occupy the outermost (commuter) zone, as far from the CBD as possible. In Griffin-Ford, the most affluent neighborhoods radiate outward along a prestigious spine extending from the CBD itself. The Latin American elite has historically valued proximity to the urban center rather than distance from it.", "id": "fc16"}, {"front": "Critique of the Burgess Concentric Zone Model", "back": "The model is static — it does not explain the dynamics of change. It assumes a single dominant CBD and a pre-automobile, radially symmetric transport network. It ignores the role of racial segregation. It was derived exclusively from one American industrial city at one historical moment, limiting its universality.", "id": "fc17"}, {"front": "Critique of the Galactic City / edge city model", "back": "Edge cities are almost entirely automobile-dependent, have little pedestrian infrastructure, generate severe traffic congestion, and represent large-scale disinvestment from historic downtowns and inner-city neighborhoods. The concept has been criticized for romanticizing suburban development while ignoring social costs — air quality, infrastructure inefficiency, and displacement of lower-income residents.", "id": "fc18"}, {"front": "How did successive North American models improve on Burgess?", "back": "Hoyt added sectoral (not just concentric) organization and the filtering concept (1939). Harris-Ullman added multiple nuclei and explained why specialized activity nodes form (1945). The Galactic City model added the reality of post-1970 edge cities as co-equal nodes with the CBD (1980s). Each model incorporated features the previous missed, especially the growing role of the automobile.", "id": "fc19"}, {"front": "Synthesis: Why do global city models differ from North American models?", "back": "North American models reflect industrial capitalism, mass automobile ownership, racial segregation enforced by law and custom, a weak welfare state, and federal policy subsidizing suburban homeownership. None of these conditions apply universally. Colonial history, informal housing markets, and different city-building processes produce fundamentally different spatial organizations — as shown by the McGee, Griffin-Ford, and Sub-Saharan African models.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
