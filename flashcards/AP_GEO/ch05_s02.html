<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Human Geography &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_GEO.html">&larr; Back to AP Human Geography</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

    <script>
    var CARDS = [{"front": "Subsistence agriculture", "back": "A farming system in which the primary purpose is to produce food for the consumption of the farming household, with little or no surplus sold in commercial markets. Subsistence farmers cultivate a variety of crops for dietary diversity rather than specializing in a single cash crop. An estimated 500 million smallholder households globally practice subsistence farming, concentrated in sub-Saharan Africa, South and Southeast Asia, and parts of Latin America.", "id": "fc01"}, {"front": "Shifting cultivation (swidden / slash-and-burn)", "back": "The oldest spatially extensive farming form in humid tropics. A forest patch is cleared by cutting and burning; ash deposits nutrients. The land is cultivated 2–5 years, then abandoned for a 10–25 year fallow during which forest regenerates. Practiced across the Amazon Basin, Congo Basin, and mainland Southeast Asia. Sustainable at low population densities; breaks down as populations grow and fallow periods shorten. Traditional swidden is closed-loop; industrial deforestation frontiers are not.", "id": "fc02"}, {"front": "Intensive subsistence agriculture", "back": "A farming system supporting among the highest population densities on Earth, found in the densely populated river deltas and mountain valleys of East and South Asia. The hallmark is paddy (wet) rice cultivation — flooded fields where rice is transplanted and harvested by hand. Labor input is 10–20 times that of dryland grain farming per hectare, but yields routinely exceed 4–6 tonnes/hectare. Double- and triple-cropping are common in tropical zones.", "id": "fc03"}, {"front": "Pastoral nomadism", "back": "A subsistence strategy based on herding livestock — cattle, camels, sheep, goats, reindeer, or yaks — across large, seasonally variable grazing ranges. True pastoral nomadism is now rare; transhumance (semi-nomadic movement between fixed seasonal pastures) is more common in mountainous regions. Principal zones: Sahel of Africa, East African savanna, Central Asian steppes, Arabian Peninsula. Under pressure from sedentarization policies, land enclosures, and climate variability.", "id": "fc04"}, {"front": "Commercial agriculture", "back": "A farming system in which the primary purpose is to produce food, fiber, or commodities for sale in commercial markets. Commercial farms specialize in limited commodities, rely on purchased inputs, use mechanized equipment, and are integrated into regional or global supply chains. Commercial agriculture accounts for the dominant share of global caloric production, though subsistence farming supports a larger share of the world's farming households.", "id": "fc05"}, {"front": "Extensive agriculture", "back": "A farming system characterized by low inputs of labor and capital per unit of land, relying on large farm sizes for commercially viable output. Typical of regions where land is abundant relative to labor — American Great Plains, Argentine pampas, Australian wheat-sheep zone. Contrasts with intensive agriculture, which applies large inputs of labor, capital, or technology per unit of land (e.g., East Asian rice farming, California vegetable production).", "id": "fc06"}, {"front": "Plantation agriculture", "back": "A commercial system in which a single export crop is grown on a large estate using hired or historically coerced labor, typically in a tropical or subtropical environment. Classic crops: sugar, bananas, rubber, coffee, cacao, tea, palm oil. Inseparable from colonialism — tropical colonies were organized to produce raw commodities for metropolitan processors. Legacy: export-crop dependence, large landholdings by multinationals, single-crop economic vulnerability.", "id": "fc07"}, {"front": "Market gardening (truck farming)", "back": "The intensive cultivation of high-value fruits, vegetables, and flowers for nearby urban markets. Characterized by extremely high labor and capital inputs per hectare, a wide variety of perishable crops, and historical dependence on urban proximity — consistent with von Thünen's innermost ring. Principal North American zones: California's Central Valley, Florida coastal plain, Rio Grande valley. California produces roughly half of all US fruits and vegetables.", "id": "fc08"}, {"front": "Mixed crop-livestock farming", "back": "A commercial system integrating crop production (feed grains and forage crops) with livestock raising (beef cattle, hogs, poultry) on the same farm. Predominates in the American Corn Belt (Iowa, Illinois, Indiana), German agricultural heartland, and much of France. Ecological logic: livestock convert low-value feed grains and crop residues into higher-value meat and dairy, while manure replenishes soil fertility.", "id": "fc09"}, {"front": "Dairy farming and its geographic drivers", "back": "Dairy farming concentrates in temperate, humid climates with cool summers that support high-quality pasture, and in proximity to urban markets because fresh milk is highly perishable. In the US, the Dairy Belt runs from Vermont through New York, Pennsylvania, Wisconsin, and Minnesota. In Europe, the Netherlands, Denmark, and Ireland dominate. The cold chain — refrigerated logistics from farm to store — is essential to dairy's geographic reach.", "id": "fc10"}, {"front": "Johann Heinrich von Thünen (1783–1850)", "back": "German economist and estate manager who developed the concentric rings model of agricultural land use in 'Der isolierte Staat' (The Isolated State, 1826). He derived the model from meticulous cost-accounting of his own Mecklenburg estate and empirically verified it by mapping land use around the city of Rostock. His model established the foundation for agricultural location theory and, in modified form, for urban bid-rent models.", "id": "fc11"}, {"front": "Von Thünen's concentric rings model — core logic", "back": "In a featureless plain with a single central market, agricultural land use will organize itself into concentric rings. The zone boundary is set where the profit of one land use equals the profit of the next — determined by land rent (highest near the city) and transport cost. The key variable: perishable, high-value goods with high transport costs per unit are produced close to the market; bulky, low-value goods can be produced farther away.", "id": "fc12"}, {"front": "Von Thünen's four zones", "back": "Zone 1 — Market gardening and dairying: perishable products close to the city. Zone 2 — Timber and firewood: heavy to transport; now largely disappeared in post-industrial economies. Zone 3 — Extensive crop farming: storable grains that can absorb moderate transport costs. Zone 4 — Ranching and extensive livestock: live animals can 'walk to market' (self-transporting commodity), making distance economically viable.", "id": "fc13"}, {"front": "Bid-rent and von Thünen", "back": "A farmer will plant whichever crop yields the highest rent — the highest surplus after transport costs are deducted from the market price. Because transport costs increase with distance from the market, the crop that can pay the highest rent at the market's edge is displaced at greater distances by crops that are cheaper to transport relative to their value. This bid-rent maximization produces the concentric ring pattern.", "id": "fc14"}, {"front": "Limitations of the von Thünen model", "back": "The model assumes a featureless, homogeneous plain with a single market. In practice: rivers, roads, and topographic barriers deform the rings into irregular shapes; multiple competing markets create overlapping rent cones; global supply chains have complicated the single-market assumption. Despite these limitations, the core insight — transport cost and perishability determine spatial sorting of agricultural activities — retains explanatory power.", "id": "fc15"}, {"front": "Globalizing von Thünen's rings", "back": "In the contemporary world, the 'central market' has become the global city system (London, Tokyo, New York). The rings have stretched to continental and intercontinental scales, with airfreight playing the role of the cart horse. Kenyan roses airfreighted to London within 24 hours of harvest occupy von Thünen's inner ring by logic of high value and high perishability — even though Kenya is on the other side of the planet from London.", "id": "fc16"}, {"front": "Commercial ranching", "back": "Large-scale, extensive livestock grazing on native or improved pastures, primarily for beef production. World principal zones: Argentine pampas, Brazilian cerrado, Australian outback, American Mountain West. Among the least labor-intensive agricultural systems — individual Australian ranches may exceed 10,000 km². Major environmental consequences include overgrazing-induced land degradation and clearing of forests for pasture.", "id": "fc17"}, {"front": "Banana republic (plantation legacy)", "back": "A country whose political and economic life is dominated by a single foreign agricultural corporation. Honduras became the archetype when United Fruit Company (later Chiquita) controlled vast banana plantations in the early twentieth century. The term illustrates the plantation system's legacy: export-crop dependence, large multinational-controlled landholdings, and vulnerability to commodity price fluctuations in former colonial economies.", "id": "fc18"}, {"front": "Why dairy farms locate closer to cities than wheat farms (FRQ application)", "back": "Per von Thünen's model, dairy products (fresh milk) are highly perishable and lose value rapidly in transit — making proximity to the market economically essential to remain profitable. Wheat is storable, non-perishable, and can absorb higher transport costs per unit. Even if wheat were more profitable per unit under ideal conditions, the transport cost penalty at distance makes dairy production viable only close to the market, sorting it into the inner ring.", "id": "fc19"}, {"front": "Synthesis: How does physical environment shape agricultural type distribution?", "back": "Physical environment constrains and enables agricultural systems: tropical soils leached by high rainfall favor shifting cultivation over permanent cropping; humid temperate climates with cool summers favor dairy; flat, expansive interior grasslands with fertile soils and seasonal rainfall favor large-scale grain farming; tropical climates with year-round warmth favor plantation crops (sugar, coffee, rubber). Climate, soils, and water availability set the bounds within which economic logic (von Thünen) operates.", "id": "fc20"}, {"front": "Transhumance", "back": "A semi-nomadic pastoralism pattern in which communities move their herds between fixed seasonal pastures — typically lowland winter pastures and highland summer pastures. More common than true pastoral nomadism (no fixed base) in mountainous regions such as the Alps, the Atlas Mountains, and parts of Central Asia. Unlike full nomadism, transhumant communities maintain permanent settlement in at least one seasonal location.", "id": "fc21"}, {"front": "Large-scale grain farming — geographic pattern", "back": "Occupies the world's great interior grassland plains: Argentine pampas (wheat, soybeans), Russian steppe (wheat, sunflowers), and American and Canadian Great Plains (spring and winter wheat, corn, soybeans). These are extensive farming systems — each unit of land receives relatively little labor and capital input, but farms of hundreds or thousands of hectares produce high aggregate output. Located in von Thünen's outer rings by model logic.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
