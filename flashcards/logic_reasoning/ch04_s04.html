<html lang="en">
<head>

    <title>Logic and Reasoning for Middle School &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 4, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#logic_reasoning">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What type of logical statement do most school rules represent?", "back": "Most school rules are \"IF THEN\" statements, which are conditionals."}, {"front": "Translate the school rule: \"If you are late three times, then you get detention.\"", "back": "Let L = \"You are late three times\" and D = \"You get detention.\" The rule is L → D."}, {"front": "Translate the school rule: \"If you don't turn in the assignment, then you get a zero.\"", "back": "Let T = \"You turn in the assignment\" and Z = \"You get a zero.\" The rule is ¬T → Z."}, {"front": "Translate the complex school rule: \"If you bring a phone to class and it rings, then the teacher confiscates it.\"", "back": "Let P = \"You bring a phone to class,\" R = \"It rings,\" and C = \"The teacher confiscates it.\" The rule is (P ∧ R) → C."}, {"front": "What is a common misconception students might have about translating a rule into P → Q?", "back": "Students might think that translating a rule into P → Q means it can't be broken. Logic tells us what *should* follow, not that it always *does* happen."}, {"front": "Consider the rule: \"If you are late three times, then you get detention.\" Is its converse necessarily true? Explain.", "back": "No, the converse (\"If you get detention, then you were late three times\") is not necessarily true. You could get detention for other reasons (e.g., talking in class, cheating). The converse of a school rule is not automatically a rule."}, {"front": "What logical form do promises and deals between friends often take?", "back": "Promises and deals between friends are typically conditionals, or \"IF THEN\" statements."}, {"front": "Translate the promise: \"If I finish my homework, then I can play video games.\"", "back": "Let H = \"I finish my homework\" and V = \"I can play video games.\" The promise is H → V."}, {"front": "Using Modus Ponens, explain how the promise (H → V) helps you make a case if you *do* finish your homework.", "back": "If H (\"I finish my homework\") is true, then by Modus Ponens, V (\"I can play video games\") should logically follow. You have a case that the promise should be honored."}, {"front": "If you *don't* finish your homework, and the promise is (H → V), can you logically conclude that you *cannot* play video games? Explain.", "back": "No, you cannot logically conclude that you cannot play video games. This would be an invalid inference called \"denying the antecedent.\" The rule only states what happens if you *do* finish homework; it doesn't preclude playing games for other reasons."}, {"front": "What is \"What If?\" scenario analysis in propositional logic?", "back": "It's the process of using propositional logic to think through various hypothetical situations and figure out their logical consequences before they actually happen."}, {"front": "Given the rules: (1) R → M (If it rains, go to museum), and (2) M → L (If go to museum, need money for lunch). What is the logical conclusion if it rains?", "back": "If it rains (R), then by rule (1) using Modus Ponens, we go to the museum (M). Since M is now true, by rule (2) using Modus Ponens, we need money for lunch (L). Therefore, if it rains, we need money for lunch (R → L)."}, {"front": "What is the specific logical pattern illustrated by chaining R → M and M → L to conclude R → L?", "back": "This pattern is a chain of conditionals, also known as Hypothetical Syllogism."}, {"front": "In the context of the 'Try It' example: If the power goes out, what is the final conclusion based on the given rules?", "back": "Rules: (1) Power out → Internet down; (2) Internet down → Can't submit online; (3) Can't submit online → Print instead. Conclusion: If the power goes out, then I need to print my homework instead."}, {"front": "How does Google's default search behavior relate to Boolean operators?", "back": "Google's default behavior for multiple search terms is to treat them as if they are connected by 'AND,' finding pages that mention *all* specified words."}, {"front": "What is the function of the 'OR' operator in Boolean search? Provide an example.", "back": "The 'OR' operator finds pages that contain *at least one* of the specified terms. Example: \"dogs OR cats\" finds pages about either dogs or cats."}, {"front": "How do you use the 'NOT' operator in Google's Boolean search? Provide an example.", "back": "The 'NOT' operator is represented by a minus sign (-) before a word. It excludes pages containing that word. Example: \"jaguar -car\" searches for the animal \"jaguar\" and excludes results about the car brand."}, {"front": "Who commonly uses Boolean search operators in their daily work?", "back": "Librarians, researchers, and journalists frequently use Boolean search to refine their queries and find precise information."}, {"front": "Why is it useful to learn propositional logic for real-life situations, beyond just academic exercises?", "back": "Propositional logic provides tools to analyze real-world rules, promises, and \"what if?\" scenarios, allowing you to understand logical consequences and plan ahead, as seen in school rules, promises, and even search engines."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
