<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic and Reasoning for Middle School &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#logic_reasoning">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Define \"ambiguity.\"", "back": "Ambiguity occurs when a word, phrase, or sentence has more than one possible meaning, allowing it to be understood in two or more different ways."}, {"front": "Why is ambiguity considered a significant problem in reasoning?", "back": "Ambiguity can lead to miscommunication and weaken arguments by causing key words to shift their meaning, making an argument appear logical when it is fundamentally flawed."}, {"front": "Is ambiguity usually an intentional act, like lying?", "back": "No, ambiguity is usually accidental. The speaker typically doesn't realize their words could be interpreted in multiple ways."}, {"front": "Provide two common lexically ambiguous words and their multiple meanings.", "back": "Examples include 'bank' (financial institution or river's edge), 'bat' (flying animal or sports equipment), 'light' (not heavy or brightness), 'bark' (dog's sound or tree's outer layer), or 'right' (correct or a direction)."}, {"front": "How does 'context' typically help resolve lexical ambiguity?", "back": "Context refers to the surrounding words and ideas. It often provides enough information to clarify which meaning of an ambiguous word the speaker intended."}, {"front": "Explain the two possible meanings of the sentence: 'I saw her duck.'", "back": "It could mean (a) I saw her pet duck (the bird), or (b) I saw her duck down (bend to avoid something)."}, {"front": "How can ambiguity undermine the validity of an argument?", "back": "If a crucial word in an argument means one thing in a premise and a different thing in another premise or the conclusion, the argument collapses because the conclusion does not logically follow from the premises due to the shift in meaning."}, {"front": "Analyze the flawed 'soggy sandwich' argument: Premise 1: Nothing is better than pizza. Premise 2: A soggy sandwich is better than nothing. Conclusion: A soggy sandwich is better than pizza. How does ambiguity break this argument?", "back": "The word 'nothing' is ambiguous. In Premise 1, it means 'no food surpasses pizza.' In Premise 2, it means 'having zero food.' The shift in meaning invalidates the conclusion."}, {"front": "What is 'The Ambiguity Check' for evaluating arguments?", "back": "Before accepting an argument, check its key words. If an important word is used with one meaning in the premises and a different meaning in the conclusion, the argument is flawed."}, {"front": "How do advertisers sometimes use ambiguity to their advantage?", "back": "Advertisers use phrases like 'Part of a complete breakfast' where 'part of' is ambiguous. This makes the product sound healthier or more significant than it might be, even if the statement is technically true."}, {"front": "Define 'lexical ambiguity.'", "back": "Lexical ambiguity occurs when a single word has multiple meanings, and the word itself is the source of the confusion."}, {"front": "Define 'syntactic ambiguity' (also known as 'structural ambiguity').", "back": "Syntactic ambiguity happens when the arrangement or structure of words in a sentence creates confusion, even when the individual words themselves are clear."}, {"front": "Provide an example of syntactic ambiguity and its multiple interpretations.", "back": "Example: 'The teacher said on Monday she would give a test.' This could mean (a) the announcement was made on Monday, or (b) the test will occur on Monday."}, {"front": "Explain the two possible meanings of the sentence: 'Visiting relatives can be annoying.'", "back": "It could mean (a) the act of *you* visiting your relatives is annoying, or (b) your relatives *who are visiting you* are annoying."}, {"front": "What is the primary difference between lexical and syntactic ambiguity?", "back": "Lexical ambiguity arises from a single word having multiple meanings, while syntactic ambiguity results from the way words are structured in a sentence, creating multiple interpretations of the sentence's overall meaning."}, {"front": "How can you resolve or 'fix' an ambiguous sentence?", "back": "By rewriting the sentence to be more precise and making the intended meaning crystal clear. For example, instead of 'I saw her duck,' say 'I saw her pet duck' or 'I saw her duck behind the desk.'"}, {"front": "Why is being precise with words considered an important skill in clear thinking?", "back": "Precision helps prevent miscommunication, strengthens arguments by ensuring consistent word meanings, and guarantees that ideas are conveyed accurately, leading to better understanding and more effective reasoning."}, {"front": "According to the 'teachernote,' which common English word is cited as having an exceptionally large number of meanings?", "back": "The word 'set' is mentioned as having over 400 meanings in English."}, {"front": "What is a common misconception students have about the nature of ambiguity?", "back": "Students often mistakenly think that ambiguity is the same as lying, rather than recognizing it as usually accidental."}, {"front": "What is a key objective for students learning about ambiguous words, according to the 'teachernote'?", "back": "Students should be able to define ambiguity, identify words with multiple meanings, and explain how ambiguity can weaken an argument."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
