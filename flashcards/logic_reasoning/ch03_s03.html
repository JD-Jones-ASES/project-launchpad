<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic and Reasoning for Middle School &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#logic_reasoning">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the three special names given to the categories in every syllogism?", "back": "Major term, Minor term, and Middle term."}, {"front": "Define the Major Term in a syllogism.", "back": "The Major term is the predicate (second category) of the conclusion."}, {"front": "Define the Minor Term in a syllogism.", "back": "The Minor term is the subject (first category) of the conclusion."}, {"front": "Define the Middle Term in a syllogism.", "back": "The Middle term is the category that appears in both premises but not in the conclusion. It acts as the “glue” that connects the other two terms."}, {"front": "In the syllogism \"All humans are mortal. Socrates is a human. Therefore, Socrates is mortal.\", identify the Major, Minor, and Middle terms.", "back": "Major term: mortal. Minor term: Socrates. Middle term: human."}, {"front": "What common misconception do students often have about the validity of a syllogism?", "back": "Students often assume a syllogism is valid because the conclusion “sounds true.” Validity, however, is about the structure of the argument, not the truth of its conclusion or premises."}, {"front": "Can a valid argument have a false conclusion? If so, when?", "back": "Yes, a valid argument can have a false conclusion if one or more of its premises are false. Validity only guarantees that *if* the premises are true, *then* the conclusion must also be true."}, {"front": "What tool can always confirm a syllogism's validity?", "back": "Drawing a Venn diagram will always show whether a syllogism is valid or not."}, {"front": "Describe the pattern for the valid syllogism known as Barbara.", "back": "Barbara's pattern is: All M are P (All middle are major). All S are M (All minor are middle). Therefore, all S are P (All minor are major)."}, {"front": "Give an example of a syllogism in the Barbara pattern.", "back": "All mammals are warm-blooded. All dogs are mammals. Therefore, all dogs are warm-blooded."}, {"front": "Describe the pattern for the valid syllogism known as Celarent.", "back": "Celarent's pattern is: No M are P (No middle are major). All S are M (All minor are middle). Therefore, no S are P (No minor are major)."}, {"front": "Give an example of a syllogism in the Celarent pattern.", "back": "No reptiles are mammals. All snakes are reptiles. Therefore, no snakes are mammals."}, {"front": "Define what it means for a term to be \"distributed\" in a statement.", "back": "A term is distributed in a statement if the statement says something about every member of that category."}, {"front": "Define what it means for a term to be \"undistributed\" in a statement.", "back": "A term is undistributed if the statement only says something about some members (or doesn't cover the whole group)."}, {"front": "Which term(s) are distributed in the categorical statement \"All A are B\"?", "back": "Only 'A' is distributed (we talk about every A). 'B' is undistributed."}, {"front": "Which term(s) are distributed in the categorical statement \"No A are B\"?", "back": "Both 'A' and 'B' are distributed (every A is excluded from B, and every B is excluded from A)."}, {"front": "Which term(s) are distributed in the categorical statement \"Some A are B\"?", "back": "Neither 'A' nor 'B' is distributed."}, {"front": "Which term(s) are distributed in the categorical statement \"Some A are not B\"?", "back": "Only 'B' is distributed (we're saying A is completely outside of B for at least one A)."}, {"front": "What is the primary rule regarding the Middle Term for a syllogism to be valid?", "back": "The middle term must be distributed at least once in the premises. If it isn't, the syllogism is invalid."}, {"front": "What is the \"Undistributed Middle\" fallacy?", "back": "It is an invalid syllogism pattern where the middle term is never distributed in either of the premises, meaning it fails to properly connect the major and minor terms."}, {"front": "Provide an example of the Undistributed Middle fallacy.", "back": "All dogs are animals. All cats are animals. Therefore, all dogs are cats. (The middle term \"animals\" is undistributed in both premises, making the argument invalid.)"}, {"front": "What is the \"Illicit Major\" fallacy?", "back": "The Illicit Major fallacy occurs when the major term is distributed in the conclusion but is not distributed in its premise."}, {"front": "Provide an example of the Illicit Major fallacy.", "back": "All dogs are animals. No cats are dogs. Therefore, no cats are animals. (The major term \"animals\" is distributed in the conclusion but not in premise 1.)"}, {"front": "What is the \"Illicit Minor\" fallacy?", "back": "The Illicit Minor fallacy occurs when the minor term is distributed in the conclusion but is not distributed in its premise."}, {"front": "Provide an example of the Illicit Minor fallacy.", "back": "All basketball players are athletes. All basketball players are tall. Therefore, all athletes are tall. (The minor term \"athletes\" is distributed in the conclusion but not in either premise.)"}, {"front": "State the rule for a valid syllogism related to distributed terms in the conclusion.", "back": "If a term is distributed in the conclusion, it must also be distributed in its premise."}, {"front": "State the rule for a valid syllogism related to negative premises.", "back": "A valid syllogism can have at most one negative premise. (Two negatives don't make a valid positive!)"}, {"front": "State the rule for a valid syllogism related to particular premises.", "back": "A valid syllogism cannot have two particular premises (two “Some” statements). At least one premise must be universal."}, {"front": "Is the following syllogism valid or invalid? \"All video games require electricity. Some homework does not require electricity. Therefore, some homework is not a video game.\"", "back": "This syllogism is valid. (It follows a pattern called Baroco, and its premises logically necessitate the conclusion.)"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
