<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic and Reasoning for Middle School &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#logic_reasoning">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a cognitive bias?", "back": "A cognitive bias is a pattern of thinking that causes your brain to make errors in judgment automatically, like an optical illusion for thoughts."}, {"front": "Define 'heuristic' in the context of brain function.", "back": "A heuristic is a mental shortcut your brain uses to make quick decisions, saving time and energy but sometimes leading to mistakes."}, {"front": "Why does the human brain use shortcuts like heuristics?", "back": "The brain uses heuristics because it receives millions of signals per second and cannot analyze every piece of information carefully. Shortcuts speed up decision-making."}, {"front": "What is a common misconception about who is affected by cognitive biases?", "back": "A common misconception is that biases only affect 'dumb' people. In reality, everyone, including scientists, doctors, and teachers, has cognitive biases."}, {"front": "What is confirmation bias?", "back": "Confirmation bias is the tendency to search for, notice, and remember information that agrees with what you already believe, while ignoring information that disagrees."}, {"front": "How does confirmation bias affect your perception of information, using the 'tinted glasses' analogy?", "back": "Confirmation bias is like wearing tinted glasses; once you believe something, your brain automatically filters information to match that belief, making everything look 'tinted' to support it."}, {"front": "Give an example of confirmation bias in action, related to social media.", "back": "Social media algorithms showing you posts you'll agree with, creating an 'echo chamber' that reinforces your existing views, is an example of confirmation bias."}, {"front": "Explain the cognitive bias known as anchoring.", "back": "Anchoring is the tendency to rely too heavily on the first piece of information received (the 'anchor') when making decisions, even if that information is irrelevant."}, {"front": "How do retail stores commonly use anchoring to influence customers?", "back": "Stores use anchoring by showing a high 'original price' alongside a lower 'sale price.' The high original price acts as an anchor, making the sale price feel like a better deal than it might actually be."}, {"front": "Why does anchoring work, and what is its common limitation?", "back": "Anchoring works because the brain starts from the initial number and adjusts, rather than evaluating from scratch. The limitation is that this adjustment is almost never big enough."}, {"front": "What is the availability heuristic?", "back": "The availability heuristic is the tendency to judge how likely something is based on how easily you can think of an example. If examples come to mind quickly, the event is assumed to be common."}, {"front": "Using the 'sharks vs. cows' example, explain how the availability heuristic can lead to incorrect judgments.", "back": "Due to dramatic media coverage, shark attacks are easily recalled, making people overestimate their danger. However, cows cause more deaths annually in the U.S., but these events are less vivid or reported, so they are harder to recall and thus underestimated."}, {"front": "How might the availability heuristic affect someone's fear of flying after watching a scary movie about planes?", "back": "After watching a scary movie, the vivid examples of plane crashes are easily recalled, leading the person to overestimate the likelihood of a real crash, even though flying is statistically safer than driving."}, {"front": "In what way are optical illusions similar to cognitive biases?", "back": "Optical illusions are 'visual biases' where the brain takes shortcuts in processing visual information, leading to misinterpretations. Similarly, cognitive biases trick thinking through mental shortcuts."}, {"front": "Who was Daniel Kahneman, and what was his significant contribution to the study of the human mind?", "back": "Daniel Kahneman was a Nobel Prize-winning psychologist who, with Amos Tversky, researched the systematic mistakes people make in thinking. He proposed two systems of thought: System 1 (fast, automatic) and System 2 (slow, deliberate)."}, {"front": "What are Daniel Kahneman's 'System 1' and 'System 2' thinking?", "back": "System 1 is fast, automatic, and relies on shortcuts (where most biases originate). System 2 is slow, deliberate, and requires effortful, careful thought."}, {"front": "Why did Daniel Kahneman, a psychologist, win the Nobel Prize in Economics?", "back": "He won the Nobel Prize in Economics because his work demonstrated that understanding human biases is essential for making better decisions in every part of life, including economic choices, challenging previous assumptions of human rationality."}, {"front": "Why are cognitive biases considered a 'feature' rather than a 'bug' of the human brain?", "back": "Biases are considered a feature because they evolved to help humans survive and make fast decisions, usually proving efficient, even if they sometimes lead to errors."}, {"front": "According to 'The Bias Awareness Rule,' what is the ultimate goal regarding cognitive biases?", "back": "The ultimate goal is not to eliminate biases (which is impossible) but to learn to spot them and notice when they might be affecting your thinking, allowing you to slow down and think more carefully when it matters."}, {"front": "You are convinced your favorite restaurant is the best. You primarily remember delicious meals and overlook the few times the service was slow. Which bias is at play?", "back": "Confirmation bias is at play, as you're selectively remembering information that confirms your existing positive belief about the restaurant."}, {"front": "A car dealership advertises a car for '25,000, originally35,000.' Even if the car was rarely sold at $35,000, the higher price makes the current offer seem better. What bias is this an example of?", "back": "This is an example of anchoring, where the initial high price of 35,000 acts as an anchor, making the25,000 seem like a significant discount."}, {"front": "After seeing several news reports about a recent crime wave in a distant city, you become unusually cautious, believing your own safe neighborhood is now much more dangerous. What heuristic is likely influencing your perception?", "back": "The availability heuristic is likely influencing your perception, as the vivid and recent news reports make you overestimate the likelihood of similar events occurring in your own area."}, {"front": "What is the primary benefit of heuristics for the brain, despite their potential for error?", "back": "The primary benefit of heuristics is that they save time and energy, allowing the brain to make quick decisions without having to carefully analyze every piece of information."}, {"front": "Marcus thinks his math teacher is unfair. When the teacher gives an easy test, Marcus attributes it to the principal forcing her to do so. Which bias is Marcus exhibiting?", "back": "Marcus is exhibiting confirmation bias, interpreting the teacher's actions (even seemingly positive ones) as evidence to support his existing belief that she is unfair."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
