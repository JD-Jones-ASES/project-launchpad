<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic and Reasoning for Middle School &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Logic and Reasoning for Middle School &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#logic_reasoning">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why is recognizing that your brain has biases considered 'great news' rather than 'bad news'?", "back": "Because knowing about these cognitive traps allows you to learn strategies to avoid them, improving your critical thinking and judgment."}, {"front": "What is the definition of a 'devil's advocate'?", "back": "A devil's advocate is someone who argues against a position, not necessarily because they believe it, but to test whether the position is strong by deliberately looking for reasons it might be wrong."}, {"front": "When playing devil's advocate in a group, does it mean you have to agree with the other side?", "back": "No, it is a thinking tool to test an argument's strength, not a change of belief or an agreement with the opposing view."}, {"front": "How does playing devil's advocate strengthen an argument, even if you ultimately support the original position?", "back": "By identifying potential weaknesses, downsides, or counter-arguments beforehand, it allows you to address these concerns and make your original argument more robust."}, {"front": "Define 'Steelmanning' an argument.", "back": "Steelmanning is the practice of restating someone else's argument in the strongest possible way before responding to it, focusing on its best possible interpretation."}, {"front": "What is the key difference between steelmanning and creating a 'straw man' argument?", "back": "Steelmanning makes the other person's argument sound as strong and reasonable as possible, while a straw man misrepresents or weakens the opponent's argument to make it easier to attack."}, {"front": "Why is steelmanning considered a powerful thinking tool?", "back": "If you can successfully argue against the strongest version of someone's position, it signifies a genuine victory in understanding and critical thinking, rather than just defeating a weak misrepresentation."}, {"front": "When considering the opposite, what is the 'magic question' to ask yourself when you believe something strongly?", "back": "'What would change my mind?'"}, {"front": "What does it indicate if you cannot think of anything that would change your mind about a strong belief?", "back": "It's a red flag that your emotions or biases might be in control, and you're not engaging in critical thought."}, {"front": "Define 'framing' in the context of media and information.", "back": "Framing is the way information is presented, including choices about what to include or exclude and how to word things, to influence how an audience thinks or feels about it."}, {"front": "How can the exact same facts be framed to evoke different feelings in an audience?", "back": "By highlighting different aspects or percentages. For example, '30% of Students Failed the State Exam' vs. '70% of Students Passed the State Exam' evokes different emotions."}, {"front": "What are 'cherry-picked statistics'?", "back": "Cherry-picking is the selective presentation of only data or statistics that support a particular point, while omitting or hiding data that contradicts it or provides a different perspective."}, {"front": "Identify three 'red flags' or warning signs of bias in media.", "back": "Emotional headlines ('SHOCKING!'), missing context ('Crime is up 50%!'), unnamed sources ('Experts say...'), or only one side of an issue presented."}, {"front": "Why should you be wary of headlines containing words like 'SHOCKING!' or 'You Won't Believe...'?", "back": "These emotional headlines are designed to trigger your availability heuristic and bypass your critical thinking, prompting an immediate emotional response."}, {"front": "What is problematic about 'missing context' when statistics are presented in the media?", "back": "Without context (e.g., baseline numbers, area, or time period), statistics or claims can seem more significant or alarming than they actually are, misleading the audience."}, {"front": "Name three reputable fact-checking websites mentioned in the text.", "back": "Snopes, PolitiFact, and FactCheck.org."}, {"front": "What is an important caveat to remember even when using reputable fact-checking websites?", "back": "Even fact-checkers can have biases. Good critical thinkers should check multiple fact-checking sources and evaluate their methods, not just their conclusions."}, {"front": "What is the ultimate goal when using fact-checking resources and debiasing tools?", "back": "The goal is not to blindly trust a single source, but to develop one's own ability to evaluate evidence and identify bias independently."}, {"front": "List the four powerful tools for catching bias that were introduced in this section.", "back": "1. Playing Devil's Advocate, 2. Steelmanning, 3. Asking 'What would change my mind?', and 4. Spotting Bias in Media (framing, cherry-picking, red flags)."}, {"front": "If an article only presents arguments for one side of a controversial topic, what might the author's intention be?", "back": "The author may be framing the issue to push readers toward a specific conclusion or opinion, indicating potential bias in presentation."}, {"front": "How do fact-checking websites operate similarly to the debiasing tools discussed in this chapter?", "back": "They look for evidence, consider alternative explanations, check sources, and watch out for framing effects, acting like 'professional bias detectives'."}, {"front": "Describe the core idea behind 'Your Brain's Secret Shortcuts (and Why They Fool You)'.", "back": "It suggests that our brains use cognitive shortcuts (biases) which, while efficient, can sometimes lead to errors in judgment and perception, making us susceptible to being fooled."}, {"front": "When someone refers to 'Experts say...' without naming them, what information should you seek?", "back": "You should question which specific experts are being referred to, what their qualifications are, and whether other experts hold differing opinions or evidence."}, {"front": "Why is it beneficial to have a toolkit of debiasing strategies rather than relying on just one?", "back": "Having multiple tools (like devil's advocate, steelmanning, etc.) means you'll be able to catch more biases, make stronger arguments, and be more effective at critical thinking in various situations."}, {"front": "What is the misconception about steelmanning an argument, and how should it be clarified?", "back": "The misconception is that steelmanning means the other person is right. It should be clarified that it means you are being fair by representing their argument strongly, even if you disagree."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
