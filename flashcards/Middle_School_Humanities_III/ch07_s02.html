<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the primary paradox of the Western Front during World War I?", "back": "Four years of the most intense fighting in human history produced almost no territorial movement along its 700-kilometer line."}, {"front": "Name the three main powers of the Triple Alliance on the eve of World War I.", "back": "Germany, Austria-Hungary, and Italy."}, {"front": "Name the three main powers of the Triple Entente in 1914.", "back": "France, Russia, and Britain."}, {"front": "Why did Napoleonic-era infantry assault tactics become almost suicidal on the Western Front in World War I?", "back": "The Industrial Revolution had transformed weapons (like machine guns and heavy artillery) but not tactics, making traditional close-formation assaults extremely vulnerable."}, {"front": "Identify three key technologies that contributed to the defensive stalemate on the Western Front.", "back": "The machine gun, barbed wire, and heavy artillery."}, {"front": "How did the machine gun contribute to the Western Front stalemate?", "back": "It could fire 400–600 rounds per minute, allowing a single well-positioned gun to stop an entire infantry company, making open assaults nearly impossible."}, {"front": "What role did barbed wire play in the defensive dominance of the Western Front?", "back": "Barbed wire physically stopped attacking infantry in the open, holding them in place as easy targets for machine guns and artillery."}, {"front": "Why was heavy artillery a double-edged sword for attackers on the Western Front?", "back": "While it could destroy trench fortifications, the barrages churned the ground into an impassable wasteland for infantry and, crucially, warned defenders of an impending attack."}, {"front": "What two new technologies were introduced to try and break the Western Front stalemate, and when did they become truly effective?", "back": "Tanks and airplanes. Tanks first appeared in 1916 but were only effective in 1918 when combined with new infantry tactics."}, {"front": "How did the Western Front differ geographically and tactically from the Eastern Front during WWI?", "back": "The Western Front was relatively short (700 km) and characterized by static trench warfare and immobility. The Eastern Front was much longer, less densely held, and saw lines move hundreds of kilometers, often featuring more open terrain and cavalry."}, {"front": "What principle did President Woodrow Wilson advocate for redrawing the map of Europe after WWI, and what was its practical challenge?", "back": "The principle of self-determination, which stated that peoples of a common nationality should govern themselves. In practice, Europe's populations were too intermixed and had too many competing historical claims for clean boundaries."}, {"front": "Name two new nations created from the dissolution of Austria-Hungary after WWI.", "back": "Czechoslovakia, Yugoslavia, Poland, and Hungary are all correct (any two)."}, {"front": "What controversial geographic feature was created for Poland after WWI, and what problem did it cause for Germany?", "back": "The 'Polish Corridor,' which gave Poland access to the sea but cut off the German province of East Prussia from the rest of Germany, placing ethnic Germans on the 'wrong' side of new borders."}, {"front": "How were the Arab territories of the dismembered Ottoman Empire handled after WWI, and what was the consequence?", "back": "They were divided between Britain and France as 'League of Nations mandates,' leading to feelings of betrayal among Arab leaders who had been promised independence."}, {"front": "What was the 'stabbed in the back' myth that emerged in Germany after WWI?", "back": "The false belief that Germany had not been defeated on the battlefield but had been betrayed by revolutionaries and Jews at home who undermined the war effort."}, {"front": "Define the Weimar Republic.", "back": "Germany's first genuine parliamentary democracy, established in 1919 after Kaiser Wilhelm II's abdication. It governed Germany until 1933 and faced severe challenges from its birth."}, {"front": "What were two major challenges faced by the Weimar Republic from its inception?", "back": "The burden of Versailles reparations, devastating inflation in the early 1920s, and relentless attacks from both Communist and extreme nationalist political parties."}, {"front": "What was the core purpose of the League of Nations, as envisioned by Woodrow Wilson?", "back": "To be an international organization where disputes between countries could be resolved by negotiation rather than war, promoting collective security."}, {"front": "What was the principle of collective security, and how did the League of Nations attempt to implement it?", "back": "Collective security meant that an attack on one member was considered an attack on all, and all members would respond together. The League aimed to achieve this through diplomatic pressure and economic sanctions."}, {"front": "Identify two structural flaws that made the League of Nations incapable of preventing aggression.", "back": "It lacked an enforcement mechanism (no army, only sanctions) and universal membership (the United States never joined, and Germany/Soviet Union were initially excluded)."}, {"front": "What was Point I of Woodrow Wilson's Fourteen Points, and what historical context was he addressing?", "back": "'Open covenants of peace, openly arrived at,' addressing the secret treaties and alliance systems that he believed contributed to the outbreak of WWI."}, {"front": "Compare the Peace of Westphalia (1648) and the Treaty of Versailles (1919) in terms of their approach to the defeated parties.", "back": "Westphalia included defeated parties in negotiations, assigned no blame, and demanded no punishment, fostering a sense of legitimacy. Versailles excluded Germany, assigned war-guilt, and demanded reparations, leading to resentment and instability."}, {"front": "According to the economist John Maynard Keynes, what would be the consequence of the Treaty of Versailles' combination of humiliation and economic burden on Europe?", "back": "He predicted it would destabilize Europe, a prediction that proved correct."}, {"front": "Why did the US not join the League of Nations, despite it being a core proposal of President Wilson?", "back": "The US Senate refused to ratify the Treaty of Versailles, and with it, American membership in the League, based on concerns about national sovereignty and entanglement in European affairs."}, {"front": "How did the creation of Yugoslavia exemplify the challenges of self-determination after WWI?", "back": "It combined diverse peoples (Serbs, Croats, Slovenes, Bosnians, Macedonians) with different religions, alphabets, and centuries of mutual suspicion, illustrating the difficulty of drawing 'clean' boundaries based on nationality."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
