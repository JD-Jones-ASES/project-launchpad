<head>

    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities III &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What striking contrast is highlighted by the books of Ernst Jünger and Erich Maria Remarque, both published in 1929?", "back": "They both wrote about the Western Front in WWI, but Jünger described it as a magnificent test of the human spirit, while Remarque's became a celebrated anti-war novel depicting its destructive nature."}, {"front": "What key insight do the differing conclusions of Jünger and Remarque offer about human experience and history?", "back": "They demonstrate that human beings experience suffering differently, and that 'lived experience' does not always speak for itself; primary sources reflect the author's perspective, even when witnessing the same event."}, {"front": "Why does the textbook emphasize that Jünger and Remarque are not simply 'opponents in a debate'?", "back": "Both are considered honest witnesses telling the truth of their own experience. The goal is to understand what the difference between their accounts reveals, not to declare one 'right' and the other 'wrong'."}, {"front": "What ancient literary work is mentioned as a precedent for the tension between glorious and terrible depictions of war found in Jünger and Remarque?", "back": "Homer's *Iliad*, which also presents war as both glorious and terrible, sometimes in the same breath."}, {"front": "Who was Ernst Jünger and what was his most famous WWI memoir?", "back": "Ernst Jünger was a German WWI veteran who served extensively on the Western Front, was wounded multiple times, and received Germany's highest military honor. His memoir is *The Storm of Steel*."}, {"front": "How did Jünger describe the experience of combat in *The Storm of Steel*, despite acknowledging its horrors?", "back": "He described it with a precise, clinical eye, but also as a source of exhilaration, pride, intense aliveness, and a strong bond between soldiers, experiencing a 'clean fear' that sharpened him."}, {"front": "What significant military honor did Ernst Jünger receive during WWI?", "back": "The Pour le Mérite, Germany's highest military honor."}, {"front": "What was Jünger's perspective on grief and loss in battle, as described in *The Storm of Steel*?", "back": "He believed that in the field, love for the dead is best expressed not in tears but in endurance and continuing the fight, as stopping to grieve could be seen as abandoning the men."}, {"front": "What was Ernst Jünger's political stance during the Nazi era?", "back": "He was not a Nazi; he declined several invitations to join the party and publicly ignored Hitler, despite his celebration of war and nationalism placing him in a complicated political position."}, {"front": "Who was Erich Maria Remarque and what was his most famous WWI novel?", "back": "Erich Maria Remarque was a German WWI veteran who served briefly on the Western Front. His most famous novel is *All Quiet on the Western Front*."}, {"front": "How did *All Quiet on the Western Front* portray the impact of WWI on young soldiers?", "back": "It portrayed the war as destroying them slowly and grindingly, stripping away their idealism, youth, and capacity to feel at home anywhere, ultimately replacing their future with the brutal reality of war itself."}, {"front": "What was the immediate impact and reception of *All Quiet on the Western Front* upon its publication?", "back": "It sold 2.5 million copies in its first 18 months and became immensely popular worldwide."}, {"front": "What happened to Remarque's books when the Nazis came to power?", "back": "*All Quiet on the Western Front* was among the first books burned by the Nazi government in 1933, and Remarque's German citizenship was revoked."}, {"front": "According to Remarque's narrator Paul Bäumer, what was the devastating effect of the war on his generation's identity and future?", "back": "They were no longer 'youth' who wanted to take the world by storm; they were 'fleeing from themselves' and their lives, cut off from progress and believing only in the war itself."}, {"front": "How does Remarque's depiction of war, particularly Paul Bäumer's perspective, contrast with Jünger's 'intense aliveness' in combat?", "back": "While Jünger finds affirmation and a sense of self in battle, Paul Bäumer experiences a loss of self and the destruction of his youth, with the war becoming the only brutal reality he knows, stripping away all idealism."}, {"front": "What does the phrase 'We believe in the war' signify in Remarque's *All Quiet on the Western Front*?", "back": "It signifies that the war has become the sole, undeniable reality for Paul Bäumer's generation, replacing all previous beliefs in progress, purpose, and the future, which have been exposed as illusions."}, {"front": "How do Jünger and Paul Bäumer (Remarque's character) process psychic wounds or loss differently?", "back": "Jünger processes loss through 'endurance' and continuing the fight, seeing it as an expression of love for the dead. Paul Bäumer, however, has stopped enduring, having fled inside himself because the cost of endurance is too high."}, {"front": "How does the way war is remembered in public memorials often align with Jünger's perspective?", "back": "Monuments, memorials, and official histories tend to emphasize heroism, sacrifice, and endurance, aligning more with Jünger's mode of finding meaning and affirmation in combat."}, {"front": "What pedagogical purpose does comparing Jünger and Remarque serve for students studying primary sources?", "back": "It demonstrates that primary sources, including literary ones, inherently reflect the perspective of their author, and that two witnesses can truthfully describe the same event in incompatible ways, prompting students to analyze the differences."}, {"front": "Who was Wilfred Owen and what is his significance in WWI literature?", "back": "Wilfred Owen was a British officer and poet who served on the Western Front. He is significant for writing powerful anti-war poetry depicting the 'pity of war,' and was killed one week before the Armistice."}, {"front": "What was the context of Wilfred Owen's prolific writing during WWI?", "back": "He was shell-shocked and recovered in a hospital where he met Siegfried Sassoon, who encouraged him to write about the war, leading to some of his most famous poems before his death."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
