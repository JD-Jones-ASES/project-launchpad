<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities III &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What central question do Shakespeare's *Henry V*, Milton's *Areopagitica*, and the English Bill of Rights all explore?", "back": "They all explore the question: 'What gives authority its right to rule?'"}, {"front": "When was Shakespeare's *Henry V* written and what was the historical context?", "back": "It was written around 1599, a decade marked by war, religious tension, and anxiety about Queen Elizabeth I's succession."}, {"front": "What historical victory is the subject of Shakespeare's *Henry V*?", "back": "The Battle of Agincourt (1415), where Henry V's outnumbered English army defeated a larger French force."}, {"front": "In *Henry V*, what profound question do soldiers ask the disguised king on the eve of battle, and how does he respond regarding responsibility?", "back": "They ask if the king's cause is just and if he is responsible for their souls. Henry responds that 'Every subject's duty is the king's; but every subject's soul is his own.'"}, {"front": "What famous speech from *Henry V* emphasizes shared sacrifice, brotherhood, and honor for common soldiers?", "back": "The St. Crispin's Day speech."}, {"front": "What radical claim does King Henry make in the St. Crispin's Day speech about men who fight with him, and what does it imply about social status?", "back": "He claims that any man who fights beside him will become his 'brother' and be 'gentled' (raised to noble rank), a radical assertion in a society governed by birth and hereditary privilege."}, {"front": "How does the 'gentling' concept in *Henry V*'s St. Crispin's Day speech relate to later historical documents like the English Bill of Rights?", "back": "Both assert that rights and dignity are not solely for the wealthy and well-born, challenging the notion of privilege based on birth, although Henry's claim is more rhetorical in context."}, {"front": "What specific government action prompted John Milton to write *Areopagitica*?", "back": "The Long Parliament's 1643 Licensing Order, which required all books to be approved by government censors before publication."}, {"front": "What is the significance of the title *Areopagitica*?", "back": "It refers to the Areopagus, the ancient Athenian hill where the city's supreme court met, symbolizing a place of open debate and judgment."}, {"front": "What is Milton's central philosophical argument in *Areopagitica* regarding truth and falsehood?", "back": "He argues that truth is stronger than falsehood and will prevail in open debate, needing no government protection. Suppressing ideas only drives them underground, making them more dangerous."}, {"front": "In *Areopagitica*, what does Milton mean by 'Let her and Falsehood grapple; who ever knew Truth put to the worse, in a free and open encounter?'", "back": "He means that truth, if allowed to openly contend with falsehood, will always triumph without the need for censorship or government intervention."}, {"front": "What did Milton declare as the most essential of all liberties in *Areopagitica*?", "back": "He declared: 'Give me the liberty to know, to utter, and to argue freely according to conscience, above all liberties.'"}, {"front": "What is the lasting legacy of Milton's *Areopagitica*?", "back": "It is considered the first great argument in the English language for freedom of the press and became foundational for later liberal thought, influencing figures like John Locke and the American founders (e.g., the First Amendment)."}, {"front": "Did *Areopagitica* immediately achieve its goal, and what was its long-term impact?", "back": "No, Parliament initially ignored it. However, Milton's arguments gradually won the intellectual debate, contributing to the eventual lapsing of the Licensing Act in 1695."}, {"front": "When was the English Bill of Rights enacted and what historical event preceded it?", "back": "It was enacted in 1689, following the Glorious Revolution."}, {"front": "What was the primary purpose of the English Bill of Rights?", "back": "To formally list what the monarch could and could not do, presented as conditions for William and Mary to receive the crown, declaring existing law rather than requesting new rights."}, {"front": "What specific abuses of the Stuart kings did the English Bill of Rights directly address?", "back": "It addressed abuses such as suspending laws, keeping a standing army without Parliament's consent, and manipulating courts and elections."}, {"front": "Name two key provisions included in the English Bill of Rights.", "back": "Two provisions are: suspending laws without Parliament's consent is illegal, and raising a standing army in peacetime without Parliament's consent is illegal. (Other examples: free election of MPs, no excessive bail/fines/cruel punishments, right to petition the king.)"}, {"front": "Define 'Habeas Corpus' and explain its significance.", "back": "Habeas Corpus is a legal protection, strengthened by the Habeas Corpus Act (1679), that prevents the government from imprisoning a person without charging them with a specific crime and bringing them before a court. It is one of the oldest protections of individual liberty in English law."}, {"front": "What fundamental principle did the English Bill of Rights establish regarding the monarch's power?", "back": "It established the principle that the law is above the king and that Parliament makes the law, ensuring the monarch governs within it."}, {"front": "How is the English Bill of Rights similar to Magna Carta (1215)?", "back": "Both documents responded to specific royal abuses and were framed as declarations of 'ancient rights and liberties' rather than entirely new inventions."}, {"front": "What is the difference between arguing for 'ancient rights' (like in the Bill of Rights/Magna Carta) versus 'natural rights' (like John Locke)?", "back": "'Ancient rights' implies they are traditional, historically established, and rediscovered/reaffirmed. 'Natural rights' suggests they are inherent to human beings, universal, and independent of historical precedent or government grant."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
