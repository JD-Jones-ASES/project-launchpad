<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did medieval scholars typically answer questions about the natural world?", "back": "They consulted the works of ancient Greek philosophers, primarily Aristotle, and relied on reasoning from first principles rather than direct observation or experimentation."}, {"front": "Who was Francis Bacon, and what was his main contribution to the scientific revolution?", "back": "Francis Bacon (1561–1626) was a lawyer, philosopher, and statesman. Although not primarily a scientist, he articulated the problems with the old method of knowledge and proposed the inductive method, foundational to modern science."}, {"front": "What did Bacon mean by 'idols' in the mind, as described in his work *Novum Organum*?", "back": "Bacon referred to 'idols' as mental habits and prejudices that distorted observation and prevented objective understanding of the natural world."}, {"front": "Define the 'inductive method' of scientific inquiry.", "back": "The inductive method, developed by Francis Bacon, starts with specific observations, tests them through experiment, looks for patterns, and only then draws general conclusions. It moves from particular observations to general principles."}, {"front": "What was the core difference between Bacon's inductive method and the Aristotelian 'deductive' approach?", "back": "The deductive method started with accepted truths and reasoned downwards to conclusions. Bacon's inductive method started with observation and experiment, building in a test against reality. If the initial principle in deduction was wrong, everything else could be wrong without a check."}, {"front": "Explain the significance of Francis Bacon's quote, 'Nature to be commanded must be obeyed.'", "back": "It means that to control or use nature to one's advantage (e.g., build machines, cure diseases), one must first understand how nature actually works through careful observation and experimentation. You cannot command what you do not understand."}, {"front": "How did Galileo Galilei's work exemplify the 'new way of knowing' in the 17th century?", "back": "Galileo studied falling objects, pendulums, and the moons of Jupiter. Using an improved telescope, he confirmed the Earth orbited the Sun, directly challenging ancient authorities and relying on observation."}, {"front": "What was Francis Bacon's revolutionary insight concerning authority in knowledge?", "back": "His insight was to 'look before you conclude.' Do not assume ancient authorities are correct; test their claims through experiment. If the experiment contradicts the authority, trust the experiment. This meant any educated person could, in principle, correct Aristotle."}, {"front": "When and why was the Royal Society founded?", "back": "The Royal Society was founded in London in 1660 and chartered by Charles II in 1662 to promote scientific inquiry through observation and experiment, providing a community for scholars to share findings."}, {"front": "What was the Royal Society's Latin motto, and what did it signify?", "back": "Its motto was 'Nullius in verba' ('Take nobody's word for it'), expressing its commitment to evidence and verifiable experiment over unproven authority or personal belief."}, {"front": "What was *Philosophical Transactions*, and why was its publication significant?", "back": "*Philosophical Transactions* was the world's first scientific journal, published by the Royal Society beginning in 1665. It allowed experiments to be documented, shared, and independently repeated and checked by others, fostering scientific collaboration and verification."}, {"front": "Who was Robert Boyle, and what were his key contributions to science?", "back": "Robert Boyle (1627–1691) was an early member of the Royal Society. He developed the air pump, formulated Boyle's Law (pressure and volume of a gas are inversely proportional), and is often called the founder of modern chemistry."}, {"front": "Name Isaac Newton's most significant work and its primary achievement.", "back": "Newton's most significant work was *Principia Mathematica* (1687). It unified celestial and terrestrial mechanics by explaining planetary motion and falling objects through a single mathematical law of universal gravitation, demonstrating the universe as a rational system."}, {"front": "Beyond universal gravitation, what other major scientific contributions did Isaac Newton make?", "back": "Newton also discovered the laws of motion, independently invented calculus (with Leibniz), and showed that white light is composed of all the colors of the spectrum."}, {"front": "How did Isaac Newton view the relationship between science and faith?", "back": "Newton saw no conflict between science and faith. He believed the orderly laws of nature discovered through physics were evidence of a rational Creator, and that understanding these laws was a way of 'reading God's mind.'"}, {"front": "What was the 17th-century term for what we now call 'science'?", "back": "The term used was 'natural philosophy.' 'Scientists' were called 'natural philosophers,' and the word 'scientist' itself was not coined until 1833."}, {"front": "How did the scientific and political revolutions of 17th-century England share a common theme?", "back": "Both revolutions asked, 'By what authority do you claim the right to tell me what is true?' Both demanded accountability: the Royal Society to nature and evidence, Parliament to the law and the people, challenging old, unquestionable authorities like Aristotle or the divine right of kings."}, {"front": "How did 17th-century scientific inquiry differ from medieval Scholasticism, even though both valued reason?", "back": "Medieval Scholasticism (e.g., Aquinas) operated within an authoritative framework of Scripture, Church Fathers, and Aristotle, which set the boundaries of inquiry. The 17th century removed Aristotle from that privileged position for natural world investigation, prioritizing careful experiment over ancient authority."}, {"front": "Why did the conflict between science and church authority (like Galileo's trial) not repeat itself in England?", "back": "In England, the Royal Society's founders were overwhelmingly Protestant, including many ordained clergymen, who saw no conflict between careful observation of nature and Christian faith. Galileo's case was an Italian Catholic affair, influenced by specific Church politics and personal factors, not defining English scientific culture."}, {"front": "How does the Royal Society's motto 'Nullius in verba' relate to modern scientific practice?", "back": "It is the ancestor of what scientists today call 'peer review,' where experiments and their results must be independently verified and checked by other scientists before being accepted. It emphasizes accountability to evidence, a core principle of modern science."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
