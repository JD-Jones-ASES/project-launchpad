<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities III &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What historical period, from roughly 1492 to 1888, saw European nations build global empires?", "back": "This period is known as the Age of European Expansion and Conquest."}, {"front": "According to a classical Christian assessment, what were the dual realities of European expansion from 1492-1888?", "back": "European expansion brought both genuine goods (trade, Christian mission, new connections) and genuine evils (conquest, forced labor, Atlantic slave trade), often carried by the same ships."}, {"front": "What was the estimated scale and duration of the Atlantic slave trade?", "back": "Over approximately three and a half centuries (c. 1500–1867), about twelve million African people were captured or purchased and transported across the Atlantic Ocean."}, {"front": "Approximately how many enslaved people died during the Middle Passage alone?", "back": "About 1.8 million people, roughly one in seven, died during the ocean crossing due to disease, starvation, violence, and despair."}, {"front": "Define the 'Middle Passage.'", "back": "The Middle Passage was the brutal sea journey enslaved Africans were forced to make from West Africa across the Atlantic Ocean to the Americas, characterized by horrific overcrowding, deprivation, and high mortality. It was the middle leg of the triangle trade."}, {"front": "What economic system primarily drove the demand for enslaved labor in the Americas?", "back": "The plantation economy, which produced cash crops like sugar, tobacco, cotton, and rice for export, required massive amounts of hard physical labor."}, {"front": "Define 'plantation economy.'", "back": "A plantation economy is an agricultural system built around large estates (plantations) that produce a single cash crop for export, heavily dependent on enslaved African labor in the Americas."}, {"front": "What was the role of African kings and merchants in the Atlantic slave trade?", "back": "African kings and merchants participated by capturing and selling enslaved people to European traders. This shows how commercial incentives corrupted moral judgment across multiple cultures, though European demand created and sustained the market."}, {"front": "Define the 'East India Company.'", "back": "The East India Company was a private English trading corporation founded in 1600. It evolved from a trading entity to a powerful private army that collected taxes, fought wars, and governed vast territories in India."}, {"front": "How did the East India Company transform from a trading company to a governing power in India?", "back": "It transitioned gradually by offering protection to local rulers in exchange for trading privileges, leading to dependency and eventual absorption of territory. By 1858, it had effectively governed most of the Indian subcontinent."}, {"front": "What Enlightenment ideals were central to the American Declaration of Independence, and who was a key influence?", "back": "The Declaration proclaimed that 'all men are created equal' and endowed with unalienable rights of life, liberty, and the pursuit of happiness, influenced by John Locke's political philosophy."}, {"front": "What significant contradiction existed in the American founding regarding its ideals?", "back": "Many of the Founding Fathers, including Thomas Jefferson, owned enslaved people, creating a profound contradiction between the Declaration's language of equality and liberty and the reality of American slavery."}, {"front": "Where did the most radical application of Enlightenment ideas about human equality occur?", "back": "In the French colony of Saint-Domingue (modern Haiti), through the Haitian Revolution."}, {"front": "Define the 'Haitian Revolution.'", "back": "The Haitian Revolution (1791–1804) was the uprising of enslaved people in French Saint-Domingue, led by Toussaint Louverture, that resulted in the abolition of slavery and the founding of the independent Republic of Haiti—the only successful slave revolt in history."}, {"front": "What was a major international consequence of the Haitian Revolution, particularly for the United States?", "back": "Napoleon's failure to crush the revolution and restore slavery led France to sell the Louisiana Territory to the United States in 1803, as France could no longer defend its American empire effectively."}, {"front": "What was the abolitionist movement, and what were its two main philosophical foundations?", "back": "Abolitionism was the movement to legally end the slave trade and slavery itself. Its arguments rested on both Christian moral principle (every person bears the image of God) and Enlightenment natural rights philosophy (all people are born free)."}, {"front": "Name a key figure who led the parliamentary campaign for abolition in Britain and a religious group that spearheaded the movement.", "back": "William Wilberforce led the parliamentary campaign, and the Quakers were among the first organized religious groups to condemn slavery."}, {"front": "When did Britain abolish the slave trade, and when did it emancipate all enslaved people in its colonies?", "back": "Britain abolished the slave trade in 1807 and passed the Emancipation Act, freeing all enslaved people in British colonies, in 1833."}, {"front": "Define 'emancipation,' and what controversial aspect accompanied the British Emancipation Act of 1833?", "back": "Emancipation means being set free from slavery or other legal bondage. The British government paid compensatory money to the slaveholders, not to the enslaved people, in 1833."}, {"front": "How did Olaudah Equiano's 'Interesting Narrative' contribute to the abolitionist movement?", "back": "His autobiography, widely read, provided a powerful firsthand account of the horrors of the Middle Passage and slavery, putting a human face on the statistics and moral arguments for abolition."}, {"front": "What was the primary cause of the Opium Wars between Britain and China?", "back": "Britain faced a significant trade deficit with China. To balance trade, the British East India Company illegally sold opium (grown in India) in China, leading to widespread addiction and government intervention that triggered the wars."}, {"front": "What was the outcome of the First Opium War (1839–42) for China?", "back": "China was forced to open five ports to British trade, pay reparations, and cede Hong Kong to Britain, essentially a war fought to protect drug trafficking."}, {"front": "What positive impacts are attributed to European expansion in the 'Balance Sheet of Empire' assessment?", "back": "The spread of Christianity, literacy, eventually Western medicine, and the abolition of the slave trade (itself a product of Christian conscience and mission)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
