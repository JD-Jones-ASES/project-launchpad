<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to the text, is a map ever neutral?", "back": "No, a map is always made by someone, for a purpose, from a particular point of view."}, {"front": "How did European colonial maps depict the territories they claimed?", "back": "They depicted territories as empty land waiting to be filled, ignoring the people already living there."}, {"front": "What was the primary purpose of European colonial maps?", "back": "To show Europeans how much of the world they controlled."}, {"front": "Define the 'triangle trade.'", "back": "The triangle trade was the system of Atlantic commerce that connected Europe, West Africa, and the Americas in a continuous circuit of exchange."}, {"front": "Describe the three main legs of the triangle trade.", "back": "European ships carried manufactured goods to West Africa for enslaved people, transported the enslaved across the Atlantic (the Middle Passage) to the Americas, and then carried colonial products (sugar, tobacco, cotton, rum) back to Europe."}, {"front": "What commodity 'made the whole system work' in the triangle trade?", "back": "Enslaved people."}, {"front": "Approximately how many enslaved Africans died during the Middle Passage between 1500 and 1867?", "back": "Approximately 1.8 million people."}, {"front": "Which two regions were the largest single destinations for enslaved Africans in the Americas?", "back": "Brazil (roughly 4.9 million) and the Caribbean islands (roughly 4.7 million)."}, {"front": "What was the primary destination for most enslaved Africans in the Americas?", "back": "The plantation."}, {"front": "What specific crop 'drove the trade' and created enormous wealth for European owners in the Caribbean?", "back": "Sugar."}, {"front": "Explain the 'simple and horrifying arithmetic' that shaped the high death rates on Caribbean plantations.", "back": "It was cheaper for planters to work an enslaved person to death and buy another than to keep a workforce alive and healthy."}, {"front": "How does the text describe the plantation economy in relation to the Atlantic system?", "back": "It was the economic logic that drove the entire Atlantic system, connecting European demand for products with coerced labor in the Americas via the Atlantic slave trade."}, {"front": "What insight does the text offer about economic rationality and moral atrocity in the context of the plantation economy?", "back": "The slave trade was a rational response to economic incentives, illustrating that economic rationality and moral atrocity are not opposites."}, {"front": "Define 'missionary encounter.'", "back": "Missionary encounter refers to meetings between Christian missionaries and indigenous peoples that were complex, representing both genuine care and European power, sometimes paving the way for conquest."}, {"front": "Who was Francis Xavier, and where did he primarily work?", "back": "A Jesuit priest and one of the great missionaries of the 16th century, primarily working in India and Japan."}, {"front": "How did Matteo Ricci approach missionary work in China?", "back": "He learned Chinese, studied Confucian philosophy, and presented Christianity in terms that made sense within Chinese intellectual culture."}, {"front": "What were the Jesuit reductions (reducciones) in Paraguay?", "back": "Self-governing communities for Guarani indigenous people established by Jesuits that combined Catholic religious life with indigenous governance and agriculture, operating outside Spanish colonial labor demands."}, {"front": "Why were the Jesuit reductions controversial both in their time and historically?", "back": "Spanish colonists resented them for interfering with indigenous labor access; some historians view them as paternalistic institutions that displaced indigenous culture even while protecting indigenous lives."}, {"front": "Who was David Livingstone, and what was his dual mission in Africa?", "back": "A Scottish Congregationalist missionary and explorer who combined missionary work with the campaign against the African slave trade."}, {"front": "Describe the complex relationship between Protestant missions and British colonialism in Africa.", "back": "Many missionaries genuinely opposed the exploitation of Africans, but the establishment of missions often preceded and facilitated British colonial control, even if unintentionally."}, {"front": "Name two similarities between the Crusades and European colonial expansion.", "back": "Both involved Western military, economic, and religious power moving outward, and both were justified with religious arguments."}, {"front": "Identify key differences in the primary aims and scale between the Crusades and colonial expansion.", "back": "Crusades aimed at controlling specific holy sites; colonial expansion aimed at trade and wealth, creating permanent settler societies on a much larger scale, such as the Atlantic slave trade."}, {"front": "What does the text suggest about the Christian tradition regarding colonial crimes?", "back": "The Christian tradition contained resources for self-criticism, evidenced by figures like Las Casas, Equiano, and the abolitionist movement, suggesting a capacity for moral growth."}, {"front": "List three aspects of the modern world that have roots in the age of colonial expansion.", "back": "The global economy, racial categories, national borders, and the distribution of wealth between the Global North and Global South."}, {"front": "By 1914, approximately what percentage of the world's land surface did European nations control?", "back": "Approximately 84%."}, {"front": "Name two similarities between the Roman Empire and European colonial empires mentioned in the text.", "back": "Both extracted wealth from conquered territories, used local elites as intermediaries, and justified their power with claims of civilizational superiority."}, {"front": "How did the Roman Empire's system differ from colonial empires in terms of integration and extraction?", "back": "Rome's system was more durably integrated, while colonial empires were generally more extractive."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
