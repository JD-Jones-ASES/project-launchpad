<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What made the Westphalian peace negotiations (1643-1648) unique and without real precedent in European history?", "back": "For the first time, representatives of nearly all major European powers sat down simultaneously to negotiate a comprehensive peace, involving over a hundred delegations."}, {"front": "When and where were the treaties of Westphalia signed, and how long did the negotiations take?", "back": "The treaties were signed in 1648 in the Westphalian towns of Osnabrück and Münster, after five years of negotiations."}, {"front": "Beyond ending specific wars, what profound impact did the Westphalian treaties have on international politics?", "back": "They created a new way of organizing international politics by establishing the principles of state sovereignty, legal equality of states, and non-interference in internal affairs."}, {"front": "Before Westphalia, what two rival claims to universal authority dominated European politics?", "back": "The Holy Roman Emperor (claiming secular head of Christendom) and the Pope (claiming spiritual supremacy over all Christian rulers)."}, {"front": "How did historical events before Westphalia contribute to the weakening of universal authority claims by the Emperor and Pope?", "back": "The Reformation had shattered the church's unity, and the Habsburgs had never been able to enforce imperial authority everywhere."}, {"front": "Define the Peace of Westphalia.", "back": "A pair of treaties signed in Osnabrück and Münster in 1648 that ended both the Thirty Years' War and the Eighty Years' War. They established the principles of state sovereignty, legal equality of states, and non-interference in internal affairs."}, {"front": "What foundational principles for international relations were established by the Peace of Westphalia?", "back": "State sovereignty, the legal equality of states, and non-interference in internal affairs — principles that remain the foundation of international relations today."}, {"front": "What is the Peace of Westphalia often called in the context of the modern state system?", "back": "The birth certificate of the modern state system."}, {"front": "What significant concept did the Congress of Westphalia introduce that would shape European history for the next two and a half centuries?", "back": "The balance of power."}, {"front": "Explain the core idea behind the balance of power principle.", "back": "No single nation should be allowed to become so dominant that it could dictate terms to all others. Power should be distributed across multiple states, kept in rough equilibrium."}, {"front": "How would the balance of power system typically respond if one nation, such as France or the Habsburgs, grew too strong?", "back": "Other nations would form coalitions to check its power, maintaining a rough equilibrium."}, {"front": "What were some shortcomings or limitations of the balance of power system?", "back": "It still allowed wars (even requiring them when the balance tipped) and had no mechanism for protecting small states from great powers."}, {"front": "Who was the biggest winner of the Thirty Years' War, and how did Cardinal Richelieu's strategy contribute to this outcome?", "back": "France was the biggest winner. Richelieu's strategy of backing the Habsburgs' enemies paid off, weakening Spain and fragmenting the Holy Roman Empire."}, {"front": "Who was Louis XIV, and what economic system did his chief minister, Jean-Baptiste Colbert, implement in France?", "back": "Louis XIV (r. 1643–1715) was the French king. Colbert reorganized the French economy according to mercantilism, which prioritized maximizing exports and accumulating wealth."}, {"front": "How did Jean-Baptiste Colbert strengthen the French economy under Louis XIV?", "back": "He built up French manufactures, expanded the navy, and made France the most economically dynamic state in Europe through mercantilist policies."}, {"front": "How did Louis XIV use the Palace of Versailles as a political instrument of absolutism?", "back": "He required powerful nobles to live at court, keeping them close, dependent on royal patronage, and distracted from building independent power bases, effectively turning them into courtiers rather than rivals."}, {"front": "How did the Peace of Westphalia contribute to the decline and fragmentation of the Holy Roman Empire?", "back": "It recognized the autonomy of the Empire's hundreds of constituent territories, giving each prince, duke, bishop, and free city the right to conduct its own foreign policy, drastically reducing the Emperor's real authority."}, {"front": "Describe the Holy Roman Empire after the Peace of Westphalia.", "back": "It became essentially a loose confederation of hundreds of nearly independent territories, held together more by tradition than by real central authority, lasting until 1806."}, {"front": "What were the long-term consequences of the Holy Roman Empire's fragmentation for Germany?", "back": "Without a strong central state, Germany could not build a unified national economy or coherent foreign policy, leading to its unification as a single nation-state only in 1871."}, {"front": "What profound shift in political identity and loyalty did Westphalia produce among Europeans?", "back": "Loyalty shifted from the universal community of 'Christendom' (united under the Pope and Emperor) to the sovereign 'nation' or state (e.g., France, England, Sweden)."}, {"front": "After 1648, how did the role of religion change in international politics?", "back": "Religion increasingly became a private or local matter, rather than the organizing principle of international politics, as seen in the legal equality of Catholic, Protestant, and Lutheran states."}, {"front": "Do the principles established at Westphalia still govern international relations today? Provide an example.", "back": "Yes, they do. For example, when one country invades another to stop an atrocity, it is violating the Westphalian principle of sovereignty and non-interference."}, {"front": "How do international courts and the United Nations demonstrate the ongoing tension around Westphalian principles today?", "back": "International courts assert a law binding all nations (challenging pure sovereignty), while the UN is built on a tension between Westphalian sovereignty (Article 2) and universal human rights (Article 1)."}, {"front": "What comparison can be made between the balance of power principle and a system of governance within a country?", "back": "It can be compared to the American system of checks and balances within government, applying the same underlying idea of distributed power to relations between states."}, {"front": "Why is understanding Westphalia essential for understanding the failures of later international bodies like the League of Nations?", "back": "Westphalia established the enduring framework of sovereign states, and later attempts to transcend this sovereignty (like the League of Nations) often failed due to the deep-seated nature of these principles."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
