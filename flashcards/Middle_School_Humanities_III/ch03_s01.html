<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities III &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What 1618 event in Bohemia triggered the Thirty Years' War?", "back": "The Defenestration of Prague, where Protestant Bohemian nobles threw three Catholic royal officials from a castle window."}, {"front": "Define the 'Defenestration of Prague'.", "back": "The 1618 event in which Protestant Bohemian nobles threw three Catholic royal officials from a castle window in Prague, triggering the Thirty Years' War. The officials survived, but the act was explosive."}, {"front": "What was the internal state of the Holy Roman Empire at the outbreak of the Thirty Years' War?", "back": "It was deeply and dangerously divided between Catholics and Protestants, despite an earlier truce allowing each prince to choose the religion of his territory."}, {"front": "What dual nature is often ascribed to the Thirty Years' War?", "back": "It is often called the last of the religious wars and the first of the modern wars, beginning as a conflict over religion and ending as a struggle for political power."}, {"front": "How do historians typically divide the Thirty Years' War, and what characterizes each division?", "back": "Into four overlapping phases, each named for the major power that led the anti-Habsburg side."}, {"front": "What was the outcome of the Bohemian Phase (1618–1625) of the Thirty Years' War?", "back": "The Protestant revolt was crushed at the Battle of White Mountain (1620) by Holy Roman Emperor Ferdinand II, leading to suppression of Bohemian nobility and a ban on Protestant worship."}, {"front": "What significant decree was issued during the Danish Phase (1625–1629) of the Thirty Years' War?", "back": "The Edict of Restitution (1629), issued by the Emperor, demanding that Protestants return all Catholic church property seized since 1552."}, {"front": "Who was Gustavus Adolphus and what was his contribution during the Swedish Phase (1630–1635)?", "back": "King of Sweden, known as the 'Lion of the North,' he reorganized the Swedish army with new tactics (faster artillery, disciplined infantry, mobile cavalry) and won major victories before being killed at the Battle of Lützen."}, {"front": "How did the French Phase (1635–1648) signify a shift in the character of the Thirty Years' War?", "back": "Cardinal Richelieu of Catholic France openly declared war on the Catholic Habsburgs, not for religion, but for 'raison d'état,' marking a shift from religious to political motivations."}, {"front": "Define 'raison d'état' and explain its significance in the Thirty Years' War.", "back": "A French phrase meaning 'reason of state,' referring to the idea that a government may take actions, even morally questionable ones, if they serve the nation's political interests. Cardinal Richelieu's use of it to fund Protestant armies against Catholics signaled the end of religion as the sole explanation for European politics."}, {"front": "What was the estimated human cost and impact of the Thirty Years' War on Germany?", "back": "Germany, the primary battlefield, lost between a quarter and a third of its entire population, mainly due to starvation and disease. It took a century for Germany to recover."}, {"front": "What was the significance of the Peace of Westphalia (1648)?", "back": "It not only ended the Thirty Years' War but also created the framework within which modern nations still operate, establishing fundamental principles of international relations."}, {"front": "List the three core principles established by the Peace of Westphalia.", "back": "1. State sovereignty, 2. Equality of sovereign states, and 3. Non-interference in the internal affairs of other sovereign states."}, {"front": "Define 'sovereignty' as established by the Peace of Westphalia.", "back": "The supreme authority of a government over its own territory and people, free from outside control, meaning no pope or emperor can override a ruler on matters of religion or internal governance."}, {"front": "How did the Peace of Westphalia change the nature of warfare in Europe?", "back": "Before 1648, wars often aimed to impose a universal religious or political order; after 1648, wars were fought between sovereign states pursuing national interests."}, {"front": "Who was Hugo Grotius and what was his main contribution to international relations?", "back": "A Dutch scholar and author of *The Rights of War and Peace* (1625), he argued that nations are bound by natural law, leading him to be called the 'father of international law.'"}, {"front": "What new ideal of kingship did Louis XIV embody, and what was his famous (though debated) quote?", "back": "Absolute monarchy. His famous quote, which perfectly captures his governing philosophy, is 'L'État, c'est moi' ('The state, it is I')."}, {"front": "Define 'absolute monarchy' and name its classic example.", "back": "A system of government in which the monarch holds supreme, unrestricted power over the state, not bound by a constitution, parliament, or nobles. Louis XIV of France is the classic example."}, {"front": "How did Louis XIV consolidate his power and weaken the French nobility?", "back": "He concentrated all power in himself, weakening the French nobility by bringing them to his spectacular palace at Versailles, thus separating them from their regional power bases."}, {"front": "What was the Edict of Nantes and what action did Louis XIV take regarding it in 1685?", "back": "The Edict of Nantes (1598) had guaranteed religious tolerance and political protections to France's Protestants (Huguenots). Louis XIV revoked it in 1685."}, {"front": "What were the consequences of Louis XIV's revocation of the Edict of Nantes?", "back": "Between 200,000 to 400,000 Huguenots fled France in a 'Huguenot diaspora,' which severely weakened France by losing skilled labor and strengthened its rival nations."}, {"front": "Who were the Huguenots?", "back": "French Protestants, mostly Calvinist, who formed a significant minority in France, granted freedom of worship by the Edict of Nantes until its revocation by Louis XIV."}, {"front": "What major conflict marked the end of Louis XIV's reign and what was its outcome?", "back": "The War of Spanish Succession (1701–1714), which ended with the Treaty of Utrecht (1713), establishing a new balance of power in Europe and confirming that France's expansion was checked."}, {"front": "What historical atrocity occurred in Magdeburg in 1631 during the Thirty Years' War?", "back": "Imperial troops sacked the city, killing some twenty thousand civilians and burning the city to the ground, an event many historians call the worst atrocity of the war."}, {"front": "How did the moral weight of the Thirty Years' War become complex by its end?", "back": "By the end, it was not simply 'Catholics vs. Protestants'; Catholic France was fighting Catholic Austria, and Protestant princes fought each other, demonstrating how 'raison d'état' trumped religious confession."}, {"front": "What did Hugo Grotius argue about nations and law in *The Rights of War and Peace*?", "back": "He argued that nations, like individuals, are subject to a natural law they did not make and cannot repeal, meaning even in war, certain actions like killing civilians or breaking treaties are forbidden."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
