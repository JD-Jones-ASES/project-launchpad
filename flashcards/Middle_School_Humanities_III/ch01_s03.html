<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the state of England regarding religion when Elizabeth I became queen in 1558?", "back": "The kingdom was exhausted by religious conflict, having changed its official religion four times in twenty-five years under Henry VIII, Edward VI, and Mary I."}, {"front": "Define the Elizabethan Settlement.", "back": "The religious compromise established by Elizabeth I (1559–1563) that made England officially Protestant (Church of England) while retaining many Catholic forms of worship, aiming for broad inclusion and peace."}, {"front": "What was Elizabeth I's famous philosophy regarding her subjects' private religious beliefs?", "back": "She famously refused to “open windows into men's souls,” caring more about outward conformity to the Church of England than private convictions."}, {"front": "Why was Mary Queen of Scots a significant personal and political dilemma for Elizabeth I?", "back": "Mary was Catholic, had a plausible claim to the English throne, and became a focal point for Catholic plots against Elizabeth."}, {"front": "What prompted Philip II of Spain to launch the Spanish Armada against England?", "back": "The execution of Mary Queen of Scots in 1587 enraged Philip II, who had long planned to invade England and return it to Catholicism."}, {"front": "What was the primary goal of the Spanish Armada?", "back": "To invade England, return it to Roman Catholicism, and escort a Spanish army from the Netherlands across the Channel."}, {"front": "List three key factors that contributed to the defeat of the Spanish Armada in 1588.", "back": "English naval tactics (smaller, faster ships, fire vessels), leadership (e.g., Sir Francis Drake), and catastrophic Atlantic storms."}, {"front": "What was the long-term significance of the Spanish Armada's defeat for English national identity?", "back": "It crystallized English national identity around the Protestant queen, English liberty, and sea power, defining the nation for centuries."}, {"front": "Who succeeded Elizabeth I to the English throne, and what important belief did he hold about royal authority?", "back": "James VI of Scotland (son of Mary Queen of Scots) became James I of England. He passionately believed in the divine right of kings."}, {"front": "Define the \"divine right of kings.\"", "back": "The belief that a monarch's authority comes directly from God and cannot be limited by any human institution, including Parliament."}, {"front": "What was a major enduring achievement of King James I's reign?", "back": "The completion of the King James Bible in 1611, a translation that shaped English prose and worship for four hundred years."}, {"front": "What was \"ship money,\" and why did Charles I's use of it cause conflict with Parliament?", "back": "\"Ship money\" was a tax traditionally collected only in coastal counties to fund the navy. Charles I controversially extended it to the entire country without Parliamentary consent."}, {"front": "Define the Petition of Right (1628).", "back": "A declaration passed by Parliament demanding Charles I acknowledge specific limits to his authority, such as not imprisoning subjects without cause or levying taxes without Parliament's consent."}, {"front": "What was the \"Personal Rule\" during Charles I's reign?", "back": "The eleven-year period (1629-1640) when Charles I dismissed Parliament and ruled without it."}, {"front": "What event ultimately forced Charles I to recall Parliament in 1640?", "back": "The Scots rebelled when Charles I tried to impose a new prayer book on them, forcing him to recall Parliament to raise funds for a war."}, {"front": "Who were the \"Cavaliers\" and \"Roundheads\" during the English Civil War?", "back": "\"Cavaliers\" were supporters of the King, while \"Roundheads\" were supporters of Parliament, so called for their short-cropped hair."}, {"front": "What was the historical significance of the execution of King Charles I in 1649?", "back": "It was the first time in European history that a reigning monarch had been publicly tried and beheaded by his own subjects."}, {"front": "Define the \"Commonwealth\" in English history.", "back": "The republican government established in England after the execution of Charles I in 1649, which was a state without a king, governed by Parliament and a Council of State."}, {"front": "Define the \"Protectorate\" and describe Oliver Cromwell's role in it.", "back": "The government of England from 1653 to 1659, headed by Oliver Cromwell as \"Lord Protector.\" Cromwell held near-kingly powers but refused the crown, dissolving Parliament when it displeased him."}, {"front": "What event marked \"The Restoration\" in 1660?", "back": "Parliament invited Charles II, the executed king's son, to return from exile, bringing back the monarchy, the Church of England, and theaters."}, {"front": "What key actions by James II led to growing discontent among Protestants and ultimately the Glorious Revolution?", "back": "James II was Catholic, appointed Catholics to offices, suspended laws keeping them out of public life, and the birth of his Catholic son guaranteed a Catholic succession."}, {"front": "Define the \"Glorious Revolution.\"", "back": "The nearly bloodless transfer of the English crown from James II to William and Mary in 1688, called \"glorious\" because it established Parliament's supremacy without battle on English soil."}, {"front": "Name three key provisions of the English Bill of Rights (1689).", "back": "The monarch could not suspend laws, levy taxes, or keep a standing army without Parliamentary consent; members of Parliament must be freely elected; and it prohibited excessive bail, fines, and cruel/unusual punishments."}, {"front": "Define \"parliamentary supremacy.\"", "back": "The constitutional principle, firmly established by the Glorious Revolution and the Bill of Rights (1689), that Parliament is the supreme law-making authority in England, above the monarch."}, {"front": "How did the Glorious Revolution and the English Bill of Rights influence Enlightenment thinkers like John Locke?", "back": "Locke responded directly to these events in his *Two Treatises of Government*, arguing that government exists by consent of the governed and can be overthrown if it breaks the social contract, influencing future revolutions."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
