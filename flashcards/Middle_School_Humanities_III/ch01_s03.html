<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities III &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What fundamental shift in authority occurred in 17th-century England regarding knowledge?", "back": "Scholars began challenging the ultimate authority of old figures like Aristotle, just as Parliament challenged the authority of kings."}, {"front": "Who was considered the ultimate authority for knowledge about the natural world in medieval Europe?", "back": "Aristotle and the scholars who commented on his works."}, {"front": "Who was Francis Bacon, and what was his primary contribution to the new way of knowing?", "back": "A lawyer, philosopher, and statesman who articulated why the old Aristotelian method was flawed and proposed the inductive method as its replacement."}, {"front": "What did Francis Bacon call the mental habits and prejudices that distorted observation?", "back": "Idols"}, {"front": "Define the inductive method as developed by Francis Bacon.", "back": "The approach to knowledge that starts with specific observations, tests them through experiment, and only then draws general conclusions. It moves from particulars to generals."}, {"front": "What is the meaning of Francis Bacon's famous line, 'Nature to be commanded must be obeyed'?", "back": "It means that to use nature to one's advantage (e.g., build machines, cure diseases), one must first understand how nature actually works through observation and experiment."}, {"front": "How did Bacon's inductive method contrast with the old Aristotelian approach (deduction)?", "back": "Deduction started with accepted general truths and reasoned down to particular conclusions. Induction started with specific observations and experiments to build general conclusions. Induction had a built-in 'correction' through nature itself."}, {"front": "What was the 'revolutionary claim' behind Bacon's insight: 'look before you conclude'?", "back": "It meant that any educated person with access to nature could, in principle, correct ancient authorities like Aristotle, making empirical evidence paramount over tradition."}, {"front": "Name a European scholar besides Bacon who championed empirical inquiry and made significant discoveries.", "back": "Galileo Galilei (studied falling objects, pendulum, moons of Jupiter, confirmed Earth orbits the Sun)."}, {"front": "What happened to Galileo Galilei due to his scientific conclusions, and where did this occur?", "back": "He was put on trial before the Inquisition in Italy in 1633 for confirming that the Earth orbited the Sun, which conflicted with Catholic authorities."}, {"front": "Why did the conflict between science and church authority, as seen with Galileo, not repeat itself in England?", "back": "The founders of the Royal Society were overwhelmingly Protestant, and many were ordained clergymen who saw no conflict between careful observation of nature and Christian faith."}, {"front": "What was the Royal Society, when was it founded, and by whom was it chartered?", "back": "An organization founded in London in 1660 (chartered by Charles II in 1662) to promote scientific inquiry through observation and experiment."}, {"front": "What was the motto of the Royal Society, and what did it signify?", "back": "*Nullius in verba* ('Take nobody's word for it'), expressing its commitment to evidence and observation over ancient or powerful authority."}, {"front": "What was the world's first scientific journal, and what was its purpose?", "back": "*Philosophical Transactions*, published by the Royal Society, allowed experiments to be repeated and checked by other scientists, promoting transparency and verification."}, {"front": "Name two prominent early members of the Royal Society and their key contributions.", "back": "Robert Boyle (air pump, Boyle's Law, founder of modern chemistry) and Isaac Newton (universal gravitation, laws of motion, calculus, light spectrum)."}, {"front": "What was Isaac Newton's greatest achievement, published in his *Principia Mathematica*?", "back": "He unified observations of planetary motion (Kepler) and falling objects (Galileo) into a single mathematical law of universal gravitation, showing the universe was a single, rational system."}, {"front": "How did Isaac Newton view the relationship between science and faith?", "back": "He saw no conflict; he believed the orderly laws of nature were evidence of a rational Creator, and discovering these laws was a form of 'reading God's mind'."}, {"front": "What was the 17th-century term for what we now call 'science'?", "back": "Natural philosophy (the term 'scientist' was not coined until 1833)."}, {"front": "What fundamental question linked the political and scientific revolutions of 17th-century England?", "back": "'By what authority do you claim the right to tell me what is true?' Both demanded accountability."}, {"front": "How did the scientific revolution challenge the authority of traditional knowledge, comparable to political challenges to royal authority?", "back": "The Royal Society demanded evidence over the authority of Aristotle, much like Parliament demanded accountability to the law from Charles I, challenging established power structures in their respective domains."}, {"front": "How did the intellectual framework of the 17th century differ from medieval Scholasticism regarding the boundaries of inquiry?", "back": "Medieval Scholasticism worked within an authoritative framework of Scripture, Church Fathers, and Aristotle. The 17th century removed Aristotle from that privileged position for the natural world, opening it to investigation beyond ancient authority."}, {"front": "What is the modern scientific practice that descends from the Royal Society's principle of *Nullius in verba*?", "back": "Peer review, where experiments and results are shared and independently checked or repeated by other scientists."}, {"front": "How did the concept of 'accountability' manifest in both the political and scientific spheres in 17th-century England?", "back": "Politically, Parliament demanded accountability to the law (e.g., 'no taxation without representation'). Scientifically, the Royal Society demanded accountability to evidence and experiment ('take nobody's word for it')."}, {"front": "According to Bacon, what was the primary problem with relying on reasoning from 'first principles' without observation?", "back": "If the starting principle was wrong, everything that followed would be wrong too, and there was no built-in mechanism to check conclusions against reality."}, {"front": "Beyond merely documenting observations, what did Bacon emphasize as crucial steps in the inductive method?", "back": "Gathering evidence systematically, looking for patterns, and drawing conclusions *only* from what has actually been observed and tested, rather than preconceived notions."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
