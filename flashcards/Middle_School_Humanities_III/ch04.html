<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities III &mdash; Chapter 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the Enlightenment?", "back": "An intellectual movement (c. 1680-1800) centered on the belief that human reason, properly applied, could improve government, society, religion, and morality. Its thinkers (philosophes) used reason to question tradition and challenge authority. Greatest achievements: constitutional government, religious toleration, natural rights. Greatest failure: the French Revolution.", "id": "fc01"}, {"front": "What was the Scientific Revolution's connection to the Enlightenment?", "back": "Newton's Principia Mathematica (1687) showed that a single mathematical law (universal gravitation) governed both falling apples and planetary orbits. If reason could unlock the laws of nature, the philosophes asked, could it also unlock the laws of justice, liberty, and human happiness?", "id": "fc02"}, {"front": "What was Descartes's Method of Doubt?", "back": "The philosophical technique of systematically doubting every belief until reaching something undoubtable. Even if an evil spirit were deceiving him about everything, the very act of doubting proved he existed as a thinking thing. Result: 'I think, therefore I am' (cogito, ergo sum).", "id": "fc03"}, {"front": "What was 'cogito ergo sum' and why does it matter?", "back": "Descartes's Latin phrase: 'I think, therefore I am.' The most famous sentence in philosophy. Even if everything else is illusion, the fact of thinking proves existence. By making the individual thinking mind the starting point of all knowledge, Descartes shifted focus from God, Scripture, and tradition toward human reason.", "id": "fc04"}, {"front": "What is Deism?", "back": "The belief that God created the universe but does not intervene in it through miracles, revelation, or prayer. God is the rational 'clockmaker' who wound up the universe and stepped back. Many Enlightenment figures (Voltaire, Jefferson, Franklin) held Deist views. The text calls this a 'theological impoverishment': the God of Deism is not the personal God of Scripture.", "id": "fc05"}, {"front": "What was Newton's contribution to the Enlightenment's worldview?", "back": "His Principia Mathematica (1687) showed the universe was not chaotic or mysterious but a vast machine running on precise mathematical laws. For many Enlightenment thinkers, this pointed toward Deism: if the universe runs like a clock, God is the clockmaker who set it ticking and stepped back.", "id": "fc06"}, {"front": "Who were the philosophes?", "back": "The French word for 'philosophers' that became the nickname for Enlightenment thinkers across Europe. They believed that just as Newton discovered the laws of physics, reason could discover the laws of justice, liberty, and human happiness.", "id": "fc07"}, {"front": "What were John Locke's natural rights?", "back": "Rights that belong to every human being by nature - not granted by governments or removable by them. Locke identified the core natural rights as life, liberty, and property. The American Declaration of Independence restated these as 'Life, Liberty and the pursuit of Happiness.' They have roots in the Christian natural law tradition going back to Aquinas.", "id": "fc08"}, {"front": "What was Locke's 'state of nature'?", "back": "Not a historical claim but a philosophical thought experiment: an imagined condition before government existed. In this state, all human beings are naturally equal and free, possessing natural rights. It establishes that rights exist before and independent of any government.", "id": "fc09"}, {"front": "What is the social contract (Locke)?", "back": "The idea that governments are formed by an agreement among people who consent to be governed in exchange for protection of their rights. If the government breaks this contract by violating the people's rights, the people may replace it. Directly influenced the American Declaration of Independence.", "id": "fc10"}, {"front": "How did Locke's argument challenge the divine right of kings?", "back": "For centuries, kings claimed authority came from God directly. Locke said no: authority comes from the consent of the governed. If a government fails to protect natural rights and becomes tyrannical, the people have the right to dissolve that government and form a new one.", "id": "fc11"}, {"front": "Who was Voltaire?", "back": "Francois-Marie Arouet (1694-1778), most famous and feared writer of the Enlightenment. He wielded wit against l'infame - 'the infamous thing' - meaning religious intolerance, superstition, and persecution. He was not an atheist but a Deist who attacked the Church for cruelty and corruption.", "id": "fc12"}, {"front": "What was Voltaire's Candide (1759)?", "back": "A satirical novel following a naive young man through a world of earthquakes, Inquisitions, slavery, and war. By the end, Candide abandons philosopher Pangloss's optimism and concludes: 'We must cultivate our garden.' Voltaire's real philosophy: practical wisdom over utopian dreams.", "id": "fc13"}, {"front": "What does 'l'infame' mean and who used the phrase?", "back": "French: 'the infamous thing.' Voltaire's term for religious intolerance, superstition, and the persecution of those who think differently. His campaign against l'infame made bigotry look not only wrong but stupid through satire and ridicule.", "id": "fc14"}, {"front": "Who was Rousseau and what was his key argument?", "back": "Jean-Jacques Rousseau (1712-1778), the Enlightenment's most radical and contradictory thinker. He argued that civilization itself corrupted naturally innocent, free, and good human beings. His Social Contract (1762) opened: 'Man is born free, and everywhere he is in chains.'", "id": "fc15"}, {"front": "What was Rousseau's 'general will'?", "back": "What the community as a whole truly wants - not the sum of individual desires, but the common good. Just government must express the general will. Danger: someone must decide what it is, and that someone can override individual rights in the name of the community's good. Robespierre used it to justify the guillotine.", "id": "fc16"}, {"front": "Why is Rousseau's general will considered dangerous?", "back": "Unlike Locke's individual natural rights, the general will is collective. If someone decides what truly benefits the community, they can force people to be 'free' whether they want to be or not - overriding individual rights. This is the road from Rousseau to the Terror of the French Revolution.", "id": "fc17"}, {"front": "Who was Montesquieu and what did he conclude about government?", "back": "Charles-Louis de Secondat, Baron de Montesquieu (1689-1755), applied the scientific method to government. In Spirit of the Laws (1748), he concluded that tyranny occurs when power is concentrated in one place; the remedy is separation of powers into three branches that check each other.", "id": "fc18"}, {"front": "What is separation of powers?", "back": "The division of government into three branches: legislative (makes laws), executive (carries out laws), judicial (interprets laws). Each can limit the others. Drawn from Montesquieu's analysis of the English constitution; became the foundation of the United States Constitution. Madison cited Montesquieu more than any other thinker in The Federalist Papers.", "id": "fc19"}, {"front": "What was the Encyclopedie?", "back": "The great encyclopedia of the French Enlightenment, edited by Denis Diderot and d'Alembert, published 1751-1772. 35 volumes, 150 contributors, over 70,000 articles. The Church condemned it; the French government banned it twice. It sold 20,000 copies. It treated mechanical trades with the same seriousness as theology, implying the craftsman deserved the same respect as the bishop.", "id": "fc20"}, {"front": "How did the American Declaration of Independence apply Locke's philosophy?", "back": "Every phrase is Lockean: natural rights that precede government, consent of the governed as the source of authority, right to revolution when government fails. Jefferson added the crucial phrase that rights are 'endowed by their Creator' - grounding natural rights in God rather than human opinion, making them unremovable by any majority vote.", "id": "fc21"}, {"front": "What was the French Revolution's relationship to the Enlightenment?", "back": "It began with genuine Enlightenment ideals (Rights of Man, constitutional government) but within four years became the Terror: over 17,000 executed by guillotine. Based on Rousseau's general will and abstract Reason that explicitly replaced Christianity; closed churches and renamed Notre-Dame the 'Temple of Reason.'", "id": "fc22"}, {"front": "What is Edmund Burke's argument in Reflections on the Revolution in France (1790)?", "back": "The accumulated wisdom of tradition is more reliable than the abstract theories of any single generation of intellectuals. He was right: the Revolution ended with Napoleon, not liberty. Burke is the classic conservative response to revolutionary Enlightenment politics.", "id": "fc23"}, {"front": "What is the key difference between the American and French Revolutions according to this chapter?", "back": "The American Revolution was conservative (appealed to existing English rights and God-given natural rights; preserved institutions). The French was based on abstract Reason explicitly replacing Christianity. Enlightenment reason applied without Christian restraint - without acknowledging human sinfulness and God's transcendent authority - tends toward the illusion that a perfect society can be engineered by force.", "id": "fc24"}, {"front": "Who was Descartes and why does the text note his unintended consequences?", "back": "Rene Descartes (1596-1650), French philosopher and Catholic who intended his Method of Doubt to strengthen faith by grounding it in reason rather than tradition. However, later thinkers used Cartesian doubt to attack religious belief rather than defend it - a lesson about how ideas travel beyond their authors' intentions.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
