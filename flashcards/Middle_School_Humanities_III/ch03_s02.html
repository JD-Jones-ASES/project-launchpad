<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Hugo Grotius, what is natural law?", "back": "Natural law governs nations and individuals, discovered by reason. It is inherent in human beings as rational, social creatures and does not depend solely on Scripture, a particular church, or sovereign."}, {"front": "Who is often considered the 'father of international law'?", "back": "Hugo Grotius."}, {"front": "How does the text define 'international law'?", "back": "A body of rules and principles that govern relations between nations. Unlike domestic laws, it depends on the consent of nations and the pressure of international opinion."}, {"front": "What urgent question did Hugo Grotius seek to answer in *The Rights of War and Peace*?", "back": "His central question was whether any rules bind nations, even when they are engaged in war."}, {"front": "What was Friedrich Schiller's belief regarding the moral purpose of history?", "back": "Schiller, an Enlightenment figure, believed history had a moral purpose, teaching nations and individuals how to live better by studying the past."}, {"front": "In what year did Hugo Grotius publish *The Rights of War and Peace*?", "back": "1625."}, {"front": "Approximately how long after the Thirty Years' War did Friedrich Schiller write his *History of the Thirty Years' War*?", "back": "More than 150 years later, in the 1790s."}, {"front": "Name the two prominent figures whose works on the Thirty Years' War are discussed in the section 'Reading the War: Two Witnesses Across Time.'", "back": "Hugo Grotius and Friedrich Schiller."}, {"front": "What major European conflict was ongoing when Grotius wrote *The Rights of War and Peace*?", "back": "The Thirty Years' War."}, {"front": "Which devastating event of the Thirty Years' War did Schiller extensively detail in his historical account?", "back": "The Sack of Magdeburg in May 1631."}, {"front": "What was the full Latin title of Grotius's foundational work on international law?", "back": "*De Jure Belli ac Pacis* (The Rights of War and Peace)."}, {"front": "Which famous Schiller poem was set to music by Beethoven in his 'Ode to Joy'?", "back": "The poem 'Ode to Joy'."}, {"front": "How did Grotius's personal experiences, such as imprisonment, influence his legal scholarship?", "back": "His experience of persecution and imprisonment for political views likely fueled his urgent questioning of rules that bind nations, even during conflict and political turmoil."}, {"front": "What was the 'explosive' implication of Grotius's argument that natural law binds nations?", "back": "It meant international law could apply to all nations, Christian and non-Christian alike, and that no sovereign could claim to be above this law."}, {"front": "List some specific acts that Grotius argued were forbidden even in war.", "back": "Killing innocent civilians, using poison, breaking treaties, and enslaving captives without legal cause."}, {"front": "How did Grotius challenge the common saying, 'in war laws are silent'?", "back": "He refuted it by appealing to 'right reason and conscience,' arguing that nature itself established laws among nations for maintaining society, binding public and private capacities."}, {"front": "What contribution did Grotius make to the existing tradition of natural law thinking?", "back": "He extended the Thomistic tradition of natural law into the realm of international relations, arguing it applied universally to nations, not just individuals."}, {"front": "Why did Schiller include the detail that Field Marshal Tilly supposedly shed tears over the destruction of Magdeburg?", "back": "This detail added historical nuance, showing that the event was not simply a religious massacre but a military operation that spiraled out of control. It highlighted the difference between commanders' intentions and the devastating realities war produces."}, {"front": "Compare the historical contexts of Grotius and Schiller when they wrote about the Thirty Years' War.", "back": "Grotius wrote *during* the war (1625), urgently seeking to establish rules for ongoing conflict. Schiller wrote *more than 150 years after* the war (1790s), from an Enlightenment perspective, reflecting on the catastrophe to learn moral lessons."}, {"front": "What fundamental question did both Grotius and Schiller, despite their different eras, seek to address regarding human conflict?", "back": "How do human beings, capable of such destruction, build rules and institutions that limit it?"}, {"front": "What were the distinct answers Grotius and Schiller offered to the problem of limiting destruction in human conflict?", "back": "Grotius's answer was law (reason establishing norms), while Schiller's answer was memory (honestly confronting war's costs to prefer peace)."}, {"front": "How did the Peace of Westphalia (1648) relate to Grotius's ideas?", "back": "While it didn't fully implement his vision, the Peace of Westphalia drew on Grotius's arguments for systematic international relations and rules."}, {"front": "Using Grotius and Schiller as examples, explain the difference between 'experiencing a historical moment' and 'interpreting it.'", "back": "Grotius exemplifies experiencing a moment by writing during the war, urgently seeking rules for ongoing conflict. Schiller exemplifies interpreting it by looking back from the Enlightenment, analyzing the war's catastrophe for moral lessons."}, {"front": "How did Grotius's work ensure that the concept of international law was not solely a 'secular invention'?", "back": "Grotius explicitly rooted international law in natural law, which he argued could be discovered by reason even if God didn't exist, but also acknowledged its deep roots in Christian natural law thinking."}, {"front": "Why was the Sack of Magdeburg considered one of the most horrible atrocities of the Thirty Years' War, according to Schiller?", "back": "The city was almost entirely reduced to ashes, with widespread murder and rapine. Of 30,000 inhabitants, only about 5,000 escaped, demonstrating immense suffering and destruction."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
