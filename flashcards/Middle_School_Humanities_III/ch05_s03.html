<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the approximate timeframe of European global expansion and empire-building discussed in the text?", "back": "The period from roughly 1492 to 1888 saw European nations build empires that stretched across the globe."}, {"front": "Which five European nations were primarily involved in global empire-building during the age of expansion?", "back": "Portugal, Spain, England, France, and the Netherlands."}, {"front": "According to the text, what is a 'classical Christian assessment' of European expansion?", "back": "It must hold both realities honestly: genuine goods (trade, Christian mission, new connections) and genuine evils (conquest, forced labor, Atlantic slave trade), often carried by the same ships."}, {"front": "What was the scale of the Atlantic slave trade in terms of people transported and deaths during the Middle Passage?", "back": "Approximately twelve million African men, women, and children were transported. About 1.8 million (one in seven) died during the ocean crossing alone."}, {"front": "Define the 'Middle Passage.'", "back": "The Middle Passage was the brutal sea journey enslaved Africans were forced to make from the West African coast across the Atlantic Ocean to the Americas, part of the triangle trade."}, {"front": "What economic system drove the demand for enslaved labor in the Americas, and what cash crops were cultivated?", "back": "The plantation economy drove the demand. Primary cash crops included sugar, tobacco, cotton, and rice."}, {"front": "How did African kings and merchants participate in the Atlantic slave trade?", "back": "They participated in capturing and selling enslaved people to European traders. The text notes that commercial incentives corrupted moral judgment across several cultures simultaneously."}, {"front": "What is a 'plantation economy'?", "back": "A plantation economy is an agricultural system built around large estates that produce a single cash crop for export, almost entirely dependent on enslaved African labor in the Americas."}, {"front": "Who founded the English East India Company, and what was its original purpose?", "back": "It was founded by royal charter in 1600 by Queen Elizabeth I as a private English trading corporation seeking spices, textiles, and other Asian goods, holding a monopoly on English trade with Asia."}, {"front": "How did the English East India Company evolve from a trading company to a governing power in India?", "back": "It began by offering protection to local rulers for trading privileges, making them dependent, and eventually absorbing their territory. It raised its own army, fought wars, collected taxes, and governed vast territories."}, {"front": "When and why did the British Crown take direct control of India from the East India Company?", "back": "In 1858, after a major Indian uprising (the Sepoy Mutiny), the British Crown took direct control, ending nearly a century of the Company's effective governance."}, {"front": "What Enlightenment idea from the Declaration of Independence is highlighted, and what contradiction existed with its authors?", "back": "The idea that 'all men are created equal' and endowed with unalienable rights (life, liberty, pursuit of happiness) was proclaimed. However, many founders, including Thomas Jefferson, owned enslaved people."}, {"front": "Who was Toussaint Louverture, and what was his significance in the Haitian Revolution?", "back": "He was a formerly enslaved man and brilliant military commander who led the enslaved people of Saint-Domingue in their revolt, resulting in Haiti's independence."}, {"front": "What makes the Haitian Revolution unique in history?", "back": "It was the first Black republic in the world and the only successful slave revolt in history to create a lasting independent state."}, {"front": "How did the Haitian Revolution impact slaveholders in the Americas and inspire abolitionists?", "back": "It terrified slaveholders by demonstrating that enslaved people would fight for freedom and were capable of self-governance. It inspired abolitionists by showing their courage and determination."}, {"front": "Which religious group was among the first organized groups to condemn slavery as incompatible with Christian faith?", "back": "The Quakers."}, {"front": "Define 'abolitionism' and state the two main types of arguments used by abolitionists.", "back": "Abolitionism was the movement to legally end the slave trade and slavery. Arguments rested on both Christian moral principle (people bear the image of God) and Enlightenment natural rights philosophy (all people are born free)."}, {"front": "Who was William Wilberforce, and what was his role in the British abolitionist movement?", "back": "He was a member of Parliament and evangelical Christian who led the parliamentary campaign in Britain for nearly twenty years to abolish the slave trade and slavery."}, {"front": "When did the British Parliament abolish the British slave trade and pass the Emancipation Act?", "back": "The slave trade was abolished in 1807. The Emancipation Act, freeing all enslaved people in British colonies, was passed in 1833."}, {"front": "What does 'emancipation' mean, and who received compensation when the British Emancipation Act was passed?", "back": "Emancipation means being set free from slavery or other legal bondage. The British government paid compensatory money to the slaveholders, not to the formerly enslaved people."}, {"front": "How did Olaudah Equiano's 'Interesting Narrative' contribute to the abolitionist movement?", "back": "His autobiography, detailing his kidnapping, Middle Passage survival, and eventual freedom, sold widely and put a human face on the statistics and moral arguments against slavery, becoming a powerful weapon for abolitionists."}, {"front": "Why did Britain resort to selling opium in China, leading to the Opium Wars?", "back": "Britain had a serious trade deficit with China, which had little interest in European goods. The British East India Company found a solution in selling Indian-grown opium illegally in China to balance trade."}, {"front": "What was the outcome of the First Opium War for China?", "back": "China was forced to open five ports to British trade, pay reparations, and cede Hong Kong to Britain."}, {"front": "How do the Opium Wars serve as a 'useful test case for thinking about empire honestly'?", "back": "They illustrate the gap between the principle of 'free trade' (which the British government genuinely believed in) and its application, which in this case meant the freedom to sell a destructive drug to an unwilling population."}, {"front": "According to the text, what were some of the positive outcomes attributed to European expansion?", "back": "The text lists the spread of Christianity, literacy, and Western medicine, the abolition of the slave trade (product of Christian conscience), missionaries bringing the Gospel, and trade creating real wealth."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
