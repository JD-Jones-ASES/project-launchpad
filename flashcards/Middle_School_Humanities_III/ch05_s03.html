<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities III &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did European colonial maps of the 18th and 19th centuries reflect the mindset of their creators?", "back": "They were made by Europeans, for Europeans, to show the world they controlled. They often depicted colonized lands as empty, ignoring existing indigenous populations.", "id": "fc01"}, {"front": "On historical European colonial maps, which major colonial power was typically represented by the color pink?", "back": "The British Empire.", "id": "fc02"}, {"front": "What critical questions should one ask when interpreting historical European colonial maps today?", "back": "Who drew the boundaries? Who was consulted? What existed here before?", "id": "fc03"}, {"front": "Define the 'triangle trade.'", "back": "The triangle trade was a system of Atlantic commerce connecting Europe, West Africa, and the Americas in a continuous circuit. European ships carried manufactured goods to Africa, traded them for enslaved people, transported the enslaved across the Atlantic, sold them in the Americas, and then loaded colonial products (e.g., sugar, tobacco, cotton) to return to Europe.", "id": "fc04"}, {"front": "What commodity was central to making the entire triangle trade system profitable?", "back": "Enslaved people were the commodity that made the whole system work.", "id": "fc05"}, {"front": "Approximately how many enslaved Africans were transported across the Atlantic between 1500 and 1867?", "back": "Approximately twelve million enslaved Africans.", "id": "fc06"}, {"front": "What was the estimated death toll of enslaved Africans during the Middle Passage?", "back": "Approximately 1.8 million people died during the Middle Passage.", "id": "fc07"}, {"front": "What were the two largest single destinations for enslaved Africans in the Americas?", "back": "Brazil (roughly 4.9 million) and the Caribbean islands (roughly 4.7 million).", "id": "fc08"}, {"front": "What specific crop 'drove the trade' and the demand for intensive enslaved labor in the Americas?", "back": "Sugar, particularly in the Caribbean sugar islands.", "id": "fc09"}, {"front": "Explain the 'arithmetic' that led to extremely high death rates for enslaved people on Caribbean plantations compared to North America.", "back": "It was often cheaper for planters to work an enslaved person to death and buy another than to keep a workforce alive and healthy, due to brutal conditions and constant demand. This resulted in a constant stream of new imports from Africa.", "id": "fc10"}, {"front": "What was the 'economic logic' that drove the entire Atlantic system and the slave trade, according to the text?", "back": "European consumer demand for products like sugar, tobacco, and cotton, coupled with planters' need for cheap labor. The Atlantic slave trade was the supply chain connecting this demand to coerced labor, presenting a 'rational response to economic incentives' despite its moral atrocity.", "id": "fc11"}, {"front": "Define 'missionary encounter' in the context of the age of expansion.", "back": "Missionary encounter refers to the complex meetings between Christian missionaries and indigenous peoples, often driven by genuine religious motivations but also representing European power and culture, sometimes paving the way for conquest or cultural destruction.", "id": "fc12"}, {"front": "Name a significant Jesuit missionary who traveled to India and Japan in the 16th century, reportedly baptizing tens of thousands.", "back": "Francis Xavier (1506–1552).", "id": "fc13"}, {"front": "How did Matteo Ricci approach missionary work in China?", "back": "He learned Chinese, studied Confucian philosophy, and presented Christianity in terms that made sense within Chinese intellectual culture.", "id": "fc14"}, {"front": "What were the 'reductions' (reducciones) established by Jesuits in Paraguay?", "back": "Self-governing communities for Guarani indigenous people that combined Catholic religious life with indigenous governance and agriculture, operating outside Spanish colonial labor demands. They were considered unusually humane for their time.", "id": "fc15"}, {"front": "What led to the collapse of the Jesuit reductions in Paraguay?", "back": "The expulsion of the Jesuits from Spanish territories in 1767, after which their populations were absorbed into the colonial labor system.", "id": "fc16"}, {"front": "How are the Jesuit reductions in Paraguay controversially viewed by historians?", "back": "Some see them as humane institutions protecting indigenous lives from colonial abuses, while others view them as paternalistic, displacing indigenous culture even while protecting lives.", "id": "fc17"}, {"front": "Who was a prominent Scottish Congregationalist missionary and explorer in central Africa, known for combining missionary work with campaigns against the African slave trade in the 19th century?", "back": "David Livingstone (1813–1873).", "id": "fc18"}, {"front": "Describe the complex relationship between Protestant missions and British colonialism in Africa.", "back": "Many missionaries genuinely opposed the exploitation of Africans, but their establishment of missions often inadvertently preceded and facilitated British colonial control, even when this was not their intention.", "id": "fc19"}, {"front": "What was the primary aim of the Crusades compared to that of European colonial expansion?", "back": "The Crusades primarily aimed at controlling specific holy sites and defending Christian territories; colonial expansion aimed primarily at trade and wealth.", "id": "fc20"}, {"front": "How did the long-term impact of European colonial expansion differ from the Crusades?", "back": "The Crusades were a finite series of expeditions; colonial expansion created permanent settler societies and economic systems that remade the world on a much larger scale (e.g., the Atlantic slave trade affected many times more people).", "id": "fc21"}, {"front": "How does the text suggest the Christian tradition contained resources for self-criticism regarding colonial expansion's crimes?", "back": "Figures like Las Casas and Equiano, and the abolitionist movement, appealed to Christian principles to argue against the actions of Christian nations, demonstrating the tradition's capacity for moral growth.", "id": "fc22"}, {"front": "Name several aspects of the modern world that have roots in the age of European colonial expansion.", "back": "The global economy, racial categories, national borders, and the distribution of wealth between the Global North and Global South.", "id": "fc23"}, {"front": "By 1914, what percentage of the world's land surface did European nations control?", "back": "Approximately 84%.", "id": "fc24"}, {"front": "What specific technologies and economic systems enabled European nations to control such a vast amount of the world's land by 1914?", "back": "Technologies included gunpowder, steel, ships (and later railroads and the telegraph). Economic systems included the plantation economy, the East India Company, and the triangle trade.", "id": "fc25"}, {"front": "Compare the Roman Empire's system of control to that of European colonial empires, according      to the text.", "back": "Both extracted wealth from conquered territories, used local elites as intermediaries, and justified power with claims of civilizational superiority. However, Rome's system was more durably integrated, while colonial empires were more extractive. The fundamental dynamic of the center enriching itself from the periphery was common to both.", "id": "fc26"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
