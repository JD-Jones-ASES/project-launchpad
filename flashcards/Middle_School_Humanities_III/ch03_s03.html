<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What event, occurring in 1618, triggered the Thirty Years' War?", "back": "The Defenestration of Prague, where Protestant Bohemian nobles threw three Catholic royal officials from a castle window."}, {"front": "How is the Holy Roman Empire described at the outbreak of the Thirty Years' War?", "back": "A vast, sprawling collection of Catholic and Protestant territories in central Europe, deeply divided and with an uneasy religious truce breaking down."}, {"front": "Historically, what two significant characteristics are often used to describe the Thirty Years' War?", "back": "It is called the last of the religious wars and the first of the modern wars."}, {"front": "What was the estimated human cost of the Thirty Years' War?", "back": "Approximately eight million people, including soldiers, civilians, and victims of famine and plague."}, {"front": "Name the four phases of the Thirty Years' War, as identified by historians.", "back": "The Bohemian Phase, the Danish Phase, the Swedish Phase, and the French Phase."}, {"front": "What characterized the Bohemian Phase (1618–1625) of the Thirty Years' War?", "back": "It began as a Protestant revolt against the Catholic Holy Roman Emperor Ferdinand II, leading to the Protestant defeat at the Battle of White Mountain."}, {"front": "What significant decree was issued by the Emperor during the Danish Phase (1625–1629)?", "back": "The Edict of Restitution (1629), demanding that Protestants return all Catholic church property seized since 1552."}, {"front": "Who was 'the Lion of the North' and what was his contribution to the Swedish Phase (1630–1635) of the war?", "back": "Gustavus Adolphus, King of Sweden, who reorganized the Swedish army with new tactics and won major victories before his death at the Battle of Lützen."}, {"front": "Who was Cardinal Richelieu, and what principle guided his actions in the French Phase (1635–1648) of the war?", "back": "Richelieu was the chief minister of Catholic France. He guided his actions by 'raison d'état' (reason of state), openly declaring war on the Catholic Habsburgs and funding Protestant armies for political power, not religion."}, {"front": "Define 'raison d'état' and explain its significance during the Thirty Years' War.", "back": "'Raison d'état' means 'reason of state.' It refers to actions a government takes, even morally questionable ones, to serve national political interests and security. Its use by Catholic France against Catholic Habsburgs marked a shift from religious to political motivations in European conflicts."}, {"front": "What was the primary devastating impact of the Thirty Years' War on Germany?", "back": "Germany, as the main battlefield, lost between a quarter and a third of its entire population, primarily to starvation and disease, and took a century to recover."}, {"front": "What event in 1631 is often cited as the worst atrocity of the Thirty Years' War?", "back": "The sacking of the city of Magdeburg by Imperial troops, resulting in the killing of some twenty thousand civilians and the burning of the city."}, {"front": "What was the Peace of Westphalia, and when was it signed?", "back": "It was the diplomatic settlement that ended the Thirty Years' War, signed in 1648 in the Westphalian cities of Osnabrück and Münster."}, {"front": "Name the three core principles established by the Peace of Westphalia that remain foundational to international relations.", "back": "State sovereignty, equality of sovereign states, and non-interference in the internal affairs of other sovereign states."}, {"front": "Define 'sovereignty' as established by the Peace of Westphalia.", "back": "The supreme authority of a government over its own territory and people, free from outside control, meaning no outside power (pope, emperor) has the right to override its internal governance or religion."}, {"front": "How did the Peace of Westphalia change the nature of European warfare and political organization?", "back": "Before 1648, wars often aimed to impose universal religious or political order; after 1648, wars were fought between sovereign states pursuing national interests, marking a crucial shift in political life."}, {"front": "Who is known as the 'father of international law' and what was the title of his most significant work?", "back": "Hugo Grotius; his great work was 'The Rights of War and Peace' (De Jure Belli ac Pacis, 1625)."}, {"front": "What core idea did Hugo Grotius propose in 'The Rights of War and Peace'?", "back": "He argued that nations, like individuals, are subject to a natural law they did not make, binding all humanity to a rational, moral order and forbidding certain acts even in war, like killing civilians without cause."}, {"front": "Which European nation emerged as the dominant power after the Thirty Years' War, and who was its long-reigning monarch?", "back": "France, under King Louis XIV."}, {"front": "Define 'absolute monarchy' and identify its classic example.", "back": "A system of government where the monarch holds supreme, unrestricted power over the state, not bound by a constitution, parliament, or nobles. Louis XIV of France is the classic example."}, {"front": "What phrase is famously attributed to Louis XIV to summarize his philosophy of absolute monarchy?", "back": "'L'État, c'est moi' ('The state, it is I')."}, {"front": "What was the Edict of Nantes, and what action did Louis XIV take regarding it in 1685?", "back": "The Edict of Nantes (1598) had guaranteed religious tolerance to France's Protestants (Huguenots). Louis XIV revoked it in 1685."}, {"front": "What was the consequence of Louis XIV's revocation of the Edict of Nantes?", "back": "It led to the Huguenot diaspora, with 200,000 to 400,000 Huguenots fleeing France, a massive loss of talent and productivity that strengthened France's rivals."}, {"front": "Who were the Huguenots?", "back": "French Protestants, mostly Calvinist, who formed a significant minority in France and were granted freedom of worship by the Edict of Nantes until its revocation by Louis XIV."}, {"front": "What major war involving Louis XIV established a new 'balance of power' in Europe?", "back": "The War of Spanish Succession (1701–1714), which ended with the Treaty of Utrecht (1713)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
