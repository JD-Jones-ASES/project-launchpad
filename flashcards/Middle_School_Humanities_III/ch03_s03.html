<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "When and where did the Westphalian peace negotiations begin, and how long did they last?", "back": "They began in 1643 in Osnabrück and Münster and lasted five years, culminating in treaties signed in 1648."}, {"front": "What made the Westphalian peace negotiations unprecedented in European history?", "back": "Representatives of nearly all major European powers sat down simultaneously for the first time to negotiate a comprehensive peace."}, {"front": "How was European politics organized *before* the Peace of Westphalia?", "back": "Around two rival claims to universal authority: the Holy Roman Emperor (secular head of Christendom) and the Pope (spiritual supremacy)."}, {"front": "What historical events had already weakened the universal authority claims of the Holy Roman Emperor and the Pope before Westphalia?", "back": "The Reformation had shattered the church's unity, and the Habsburgs had struggled to enforce imperial authority universally."}, {"front": "Define the Peace of Westphalia.", "back": "A pair of treaties (Osnabrück and Münster, 1648) that ended the Thirty Years' War and the Eighty Years' War, establishing state sovereignty, legal equality of states, and non-interference."}, {"front": "What foundational principles of international relations were established by the Peace of Westphalia?", "back": "State sovereignty, the legal equality of states, and non-interference in internal affairs."}, {"front": "What is the Peace of Westphalia often called, highlighting its significance for global politics?", "back": "The birth certificate of the modern state system."}, {"front": "Explain the concept of the 'balance of power' introduced by the Congress of Westphalia.", "back": "The principle that no single nation should be permitted to dominate all others; other nations form alliances to check a rising power, maintaining a rough equilibrium."}, {"front": "How does the balance of power system operate in practice?", "back": "If one power grows too strong, other nations form coalitions to check it, ensuring power is distributed across multiple states and preventing universal domination."}, {"front": "What were the main limitations or drawbacks of the balance of power system?", "back": "It still allowed wars (and sometimes required them when the balance tipped) and offered no mechanism for protecting small states when great powers agreed among themselves."}, {"front": "Which nation emerged as the biggest winner of the Thirty Years' War, and why?", "back": "France, because Cardinal Richelieu's strategy of backing the Habsburgs' enemies paid off by weakening Spain and fragmenting the Holy Roman Empire."}, {"front": "Who was Jean-Baptiste Colbert, and what economic system did he implement in France under Louis XIV?", "back": "He was Louis XIV's chief economic minister who reorganized the French economy according to mercantilism."}, {"front": "Define mercantilism as practiced in Louis XIV's France.", "back": "An economic system focused on maximizing national wealth by maximizing exports, minimizing imports, and accumulating gold and silver."}, {"front": "Beyond a residence, how did Louis XIV use the Palace of Versailles as a political instrument?", "back": "He required powerful nobles to live at court, attend daily rituals, and compete for royal favor, thus keeping them close, dependent, and distracted from organizing opposition."}, {"front": "What specific ways did Versailles serve as an 'instrument of absolutism'?", "back": "It kept nobles away from their estates, made them financially dependent on royal patronage, and turned them into courtiers competing for royal attention rather than potential rivals."}, {"front": "What was the primary impact of the Peace of Westphalia on the Holy Roman Empire?", "back": "It drastically weakened the Empire by recognizing the autonomy of its hundreds of constituent territories, reducing the Emperor's real authority."}, {"front": "Describe the nature of the Holy Roman Empire after the Peace of Westphalia.", "back": "It became essentially a loose confederation of hundreds of nearly independent territories, held together more by tradition than by real central authority."}, {"front": "What were the long-term consequences of the Holy Roman Empire's fragmentation for Germany?", "back": "Germany could not build a unified national economy or coherent foreign policy, delaying its unification as a single nation-state until 1871."}, {"front": "What profound shift in European political identity did Westphalia produce?", "back": "Loyalty shifted from the universal community of Christendom (united under Pope/Emperor) to the sovereign nation-state (e.g., France, England, Sweden)."}, {"front": "After 1648, how did the role of religion change in international politics?", "back": "It became increasingly a private or local matter, rather than the primary organizing principle of international relations, as states of different faiths were treated as legal equals."}, {"front": "How do the principles of Westphalia create tension in modern international relations?", "back": "The principles of sovereignty and non-interference often clash with contemporary ideals of universal human rights and the argument for intervention to stop atrocities."}, {"front": "How does the United Nations Charter reflect the tension between Westphalian principles and modern international law?", "back": "Article 2 upholds Westphalian sovereignty (non-interference in member states' internal affairs), while Article 1 emphasizes universal human rights, creating an inherent tension."}, {"front": "In what way did the Roman Senate's approach to governance differ from the Westphalian system, and what were the outcomes?", "back": "The Senate created a single governing body for a vast empire, maintaining internal peace but failing to prevent civil war. Westphalia created a system of independent states governed by international law, keeping peace between states but not preventing them from developing destructive weapons."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
