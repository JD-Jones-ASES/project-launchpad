<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities III &mdash; Chapter 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the Industrial Revolution?", "back": "The transformation of European and North American economies from agriculture and hand-production to machine manufacturing and factory labor, beginning in Britain around 1760-1780 and spreading across Europe through the 19th century. It produced enormous new wealth - and enormous new misery.", "id": "fc01"}, {"front": "Why did the Industrial Revolution begin in Britain?", "back": "Britain had coal, iron, rivers for power, a stable legal system protecting private property, a Parliament favoring commerce, and an empire providing both raw materials and markets. Key inventions: spinning jenny (1764), steam engine (1769), power loom. By 1820 Britain was the factory floor of the world.", "id": "fc02"}, {"front": "What were working conditions like in early industrial Britain?", "back": "Factory workers (including women and children) worked 12-16 hours a day, 6 days a week, in unventilated buildings with dangerous machinery. Children as young as five worked in coal mines. Workers lived in slums without clean water. Cholera epidemics swept through cities because the poor drank water contaminated with sewage.", "id": "fc03"}, {"front": "What was the 'social question'?", "back": "The 19th-century debate over how industrial society should respond to the poverty, labor exploitation, and inequality of the Industrial Revolution. It generated three competing answers: liberal capitalism (the market will solve it), socialism/Communism (the system must be overthrown), and Catholic Social Teaching (moral reform rooted in human dignity and natural law).", "id": "fc04"}, {"front": "How did Charles Dickens contribute to the social question?", "back": "Dickens documented the human cost of industrialization: Oliver Twist (1837) portrayed orphaned children sold to workhouses; Hard Times (1854) depicted the dehumanizing factory town of 'Coketown' where workers were called 'Hands.' Dickens was writing journalism in the form of fiction.", "id": "fc05"}, {"front": "Who was Karl Marx and what was The Communist Manifesto (1848)?", "back": "A German philosopher working in London with Friedrich Engels. The Manifesto is one of the most influential and dangerous political documents ever written. It analyzed all history as class struggle, predicted inevitable proletarian revolution, and prescribed the violent overthrow of capitalism and abolition of private property.", "id": "fc06"}, {"front": "What was Marx's theory of class struggle?", "back": "All history is the story of conflict between those who own the means of production and those who must sell their labor. In industrial Europe: bourgeoisie (factory owners) vs. proletariat (workers). Marx claimed this struggle would culminate in proletarian revolution and a classless Communist society.", "id": "fc07"}, {"front": "What is the bourgeoisie in Marxist analysis?", "back": "The class that owns the means of production: factories, land, and capital. Marx used the term to describe industrialists and capitalists who profited from workers' labor. The word comes from the French for 'townsman' or 'city-dweller.'", "id": "fc08"}, {"front": "What is the proletariat in Marxist analysis?", "back": "The working class - those who own no property and must sell their labor to the bourgeoisie to survive. Marx predicted the proletariat would eventually overthrow the bourgeoisie and establish a classless Communist society.", "id": "fc09"}, {"front": "What happened in the Revolutions of 1848?", "back": "The Communist Manifesto was published in February 1848; within weeks revolution broke out across Europe (France, Austria, Hungary, Italy, German states). Most were led by liberal middle-class reformers, not factory workers. Within two years, conservative governments had suppressed nearly all of them. France elected Louis-Napoleon who became Emperor Napoleon III.", "id": "fc10"}, {"front": "What lesson did the failure of 1848 teach European radicals?", "back": "Spontaneous popular uprisings were not enough. Organized, disciplined revolutionary movements with explicit programs and committed leadership were needed. This shaped the development of socialist and Communist parties throughout the second half of the 19th century.", "id": "fc11"}, {"front": "What is Rerum Novarum and when was it issued?", "back": "The encyclical ('On the Condition of Labor') issued by Pope Leo XIII on May 15, 1891. It is the founding document of Catholic Social Teaching, addressing the exploitation of workers under industrial capitalism and arguing that workers have God-given rights to just wages, safe conditions, and the freedom to form unions.", "id": "fc12"}, {"front": "What did Rerum Novarum say about private property?", "back": "Private property is a natural right, rooted in human nature itself. A man who works has a right to own what his labor produces. The socialist solution - abolishing private property - attacks the rights of the individual and hands unlimited power to the state.", "id": "fc13"}, {"front": "What did Rerum Novarum say about wages?", "back": "Employers have a moral obligation to pay a living wage - enough for a worker to support himself and his family in reasonable comfort. The 'free market' cannot determine wages without moral limits, because workers are not commodities; they are human beings made in the image of God (imago Dei).", "id": "fc14"}, {"front": "What is imago Dei and why is it central to Rerum Novarum?", "back": "Latin: 'image of God.' The Christian teaching (Genesis 1:27) that every human being is made in God's image and therefore possesses inherent dignity that cannot be taken away by any economic or political system. Rerum Novarum grounds its entire argument for workers' rights in this principle.", "id": "fc15"}, {"front": "What is Catholic Social Teaching?", "back": "The body of official Church teaching on social, economic, and political questions, beginning with Rerum Novarum (1891). Central principles: human dignity (imago Dei), the common good, the right to private property, the option for the poor, and subsidiarity (decisions should be made at the most local level capable).", "id": "fc16"}, {"front": "What is laissez-faire economics?", "back": "French: 'let it do.' An economic philosophy holding that government should not interfere in the economy - that free markets produce the best outcomes. Rerum Novarum rejected pure laissez-faire because it left workers with no protection against exploitation.", "id": "fc17"}, {"front": "What is the 'third way' Rerum Novarum offers?", "back": "A path between laissez-faire capitalism (the market will fix everything) and Marxist socialism (only revolution and abolishing property can fix it). Foundation: not economics but theology - humans are made in God's image, and any system treating them as mere instruments violates their God-given dignity.", "id": "fc18"}, {"front": "Who was Pope Pius X and how did he differ from Leo XIII?", "back": "Leo XIII's successor (1835-1914, pontificate 1903-1914). Where Leo engaged economic and social modernity with a reasoned alternative, Pius X became alarmed by 'Modernism' within the Church - the application of modern historical scholarship to Scripture and doctrine. He condemned it in 1907 and required clergy to swear an anti-Modernist oath.", "id": "fc19"}, {"front": "What was 'Modernism' in the Catholic Church and how did Pius X respond?", "back": "The tendency of some Catholic theologians to apply methods of modern historical scholarship to Scripture and doctrine. Pius X condemned it in Lamentabili and Pascendi Dominici Gregis (1907), calling it 'the synthesis of all heresies.' He established internal surveillance boards in every diocese. His campaign was widely seen as overly harsh.", "id": "fc20"}, {"front": "What was Otto von Bismarck's social insurance system?", "back": "Germany's first national social insurance system, introduced by the 'Iron Chancellor' after unifying Germany in 1871. Bismarck's motive was not idealism but calculation: modest government welfare programs would reduce the appeal of socialism among workers. It became the model for the modern welfare state.", "id": "fc21"}, {"front": "What does the text identify as Marx's three fundamental errors?", "back": "Atheism (rejected the natural law tradition that provides a moral check on power), materialism (reduced human beings to economic units rather than persons made in God's image), and utopianism (believed a perfect society was achievable on earth by force). The 20th-century Communist record demonstrated these errors with catastrophic force.", "id": "fc22"}, {"front": "What does Fyodor Dostoevsky's 'Grand Inquisitor' story ask?", "back": "From The Brothers Karamazov (1880): what does it actually mean to be free? Could it be that what human beings most fear is not oppression but the weight of their own freedom? The Grand Inquisitor argues most people will surrender freedom for bread, security, and belonging - challenging the Enlightenment assumption that people want liberty above all.", "id": "fc23"}, {"front": "By 1914, what were the pressures building in Europe?", "back": "Socialist parties were major forces in nearly every European country. Germany was unified (1871) and growing powerful. Russia had seen its first revolution in 1905. Pressures building toward catastrophe: nationalism, imperial rivalry, social conflict - the great debate over the social question would not be resolved but interrupted by World War I.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
