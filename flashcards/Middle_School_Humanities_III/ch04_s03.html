    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did Enlightenment ideas primarily spread across Europe and the Atlantic?", "back": "Through a remarkable network of books, letters, journals, coffeehouses, and salons."}, {"front": "What was the full title of the Encyclopédie, and who were its primary editors?", "back": "The full title was Encyclopédie, ou Dictionnaire raisonné des sciences, des arts et des métiers. Its primary editors were Denis Diderot and Jean le Rond d'Alembert."}, {"front": "What was the main goal of the Encyclopédie beyond compiling information?", "back": "Its goal was to organize and transmit knowledge so that future generations could build on past achievements, implicitly arguing that no single authority owned the truth by treating all fields equally."}, {"front": "In what way did the Encyclopédie's inclusion of artisans and craftsmen reflect a political statement?", "back": "It was a political statement that the man who makes things with his hands deserves the same intellectual respect as the man who thinks about abstract ideas."}, {"front": "Why was the Encyclopédie banned multiple times by the French government and condemned by the Pope?", "back": "It was banned due to specific offensive articles (e.g., comparing the Eucharist to pagan rituals) and, more fundamentally, because its entire project claimed all knowledge could be organized, examined, and judged by human reason, challenging traditional authority."}, {"front": "How did Denis Diderot manage to continue publishing the Encyclopédie despite official bans?", "back": "He often hid controversial material under innocent-looking article titles, and by the time the government realized its full scope, copies were already in the hands of readers."}, {"front": "What was the approximate reach and influence of the Encyclopédie in 18th-century France?", "back": "It sold about 20,000 copies, meaning virtually every educated household in France owned one, and it created a shared vocabulary of rights, reason, and reform that revolutionaries later drew upon."}, {"front": "Define an Enlightenment 'salon.'", "back": "A regular gathering in a private home, typically hosted by a wealthy or aristocratic woman, where philosophers, writers, scientists, and political figures discussed ideas, debated controversies, and exchanged information."}, {"front": "What was the significant role of women in the Enlightenment salons?", "back": "In an era when women were excluded from formal intellectual institutions, salonnières (salon hostesses) organized guest lists, managed conversations, mediated disputes, and often directed the intellectual life of their time."}, {"front": "Who was Marie Thérèse Rodet Geoffrin, and what was her notable contribution to the Enlightenment?", "back": "She was a prominent salon hostess whose salon became the unofficial headquarters of the Encyclopédie project. She provided financial support to Diderot, mediated quarrels, and used her social connections to protect the project from interference."}, {"front": "How did the salon of Marquise du Deffand differ in character from that of Marie Thérèse Rodet Geoffrin?", "back": "Du Deffand's salon was more skeptical and ironic, cooler in its outlook compared to Geoffrin's enthusiasm for progress and reform, aligning more with Voltaire's spirit."}, {"front": "What was the English equivalent of the French salon during the Enlightenment, and what was its nickname?", "back": "The English equivalent was the coffeehouse, which was nicknamed 'penny universities' because admission typically cost a penny."}, {"front": "How did coffeehouses contribute to the spread of ideas and intellectual life in England?", "back": "They provided a new culture of conversation, argument, and news-sharing, supplying not just coffee but also newspapers, pamphlets, and a public space for diverse people to discuss ideas."}, {"front": "In what sense were English coffeehouses considered 'democratic institutions' during the Enlightenment?", "back": "They allowed people from different social classes (e.g., a merchant next to an earl) to sit together and participate equally in discussions, representing a significant expansion of who could engage in intellectual and political life, though women were generally not admitted."}, {"front": "Define the 'Republic of Letters.'", "back": "It was a virtual, international community of scholars, philosophers, and scientists who corresponded with one another across national and religious boundaries, sharing ideas, debating theories, and forming intellectual friendships."}, {"front": "What was the 'Republic of Letters' sustained by, given it had no physical headquarters or formal membership?", "back": "It was held together entirely by correspondence and a shared commitment to learning among its members, connecting thinkers across a wide geographical area."}, {"front": "What crucial infrastructure enabled the 'Republic of Letters' to function effectively?", "back": "The postal system, which, despite being slow by modern standards, was reliable enough to sustain a continent-wide conversation in real time."}, {"front": "How did governments respond to the widespread use of postal systems by Enlightenment thinkers, and how did writers adapt?", "back": "Governments monitored the postal system, routinely opening and reading letters. Writers learned to use pseudonyms, coded language, and trusted private couriers for sensitive correspondence."}, {"front": "What is one key similarity between the Protestant Reformation and the Enlightenment regarding the spread of ideas?", "back": "Both movements extensively used print culture (e.g., books, pamphlets) to disseminate their ideas and influence societal change."}, {"front": "What was the primary difference in the *purpose* for which the Reformation and the Enlightenment used print?", "back": "The Reformers debated the meaning of Scripture and the authority of the Church, while the philosophes debated reason, government, and human nature."}, {"front": "What were the differing *outcomes* of the Protestant Reformation's print culture compared to the Enlightenment's print culture?", "back": "The Reformation produced religious diversity, while the Enlightenment produced political diversity."}, {"front": "How did the means of spreading ideas in the 18th century impact the Enlightenment ideas themselves?", "back": "The accessibility and conversational nature of channels like salons, coffeehouses, and the Republic of Letters encouraged debate, refinement, and the application of human reason to diverse fields, shaping the ideas as they spread."}, {"front": "Name three ways Enlightenment ideas traveled that were distinct from formal academic institutions.", "back": "Salons, coffeehouses, and the Republic of Letters."}, {"front": "What was the significance of the Encyclopédie's treatment of all fields of knowledge, from theology to clockmaking, with equal seriousness?", "back": "It implicitly argued against any single authority holding a monopoly on truth, promoting a more secular and rational approach to understanding the world by valuing practical and theoretical knowledge equally."}, {"front": "Who was Mary Wollstonecraft, and what critical question did she raise in response to the Enlightenment's ideals?", "back": "Mary Wollstonecraft was an English writer who, in her work 'A Vindication of the Rights of Woman' (1792), questioned why the Enlightenment, which proclaimed the natural equality of human beings, did not extend that equality to women."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
