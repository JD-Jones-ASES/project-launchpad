<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What intellectual movement grew out of the Scientific Revolution and believed human reason could improve society?", "back": "The Enlightenment (c. 1680–1800)."}, {"front": "What core belief defined the Enlightenment?", "back": "The belief that human reason, properly applied, could improve government, society, religion, and morality."}, {"front": "What were Enlightenment thinkers called, particularly in French?", "back": "Philosophes."}, {"front": "Name three significant achievements of the Enlightenment.", "back": "Constitutional government, religious toleration, and the doctrine of natural rights."}, {"front": "What was considered the greatest failure of the Enlightenment?", "back": "The French Revolution."}, {"front": "How did Isaac Newton's discovery of universal gravitation influence Enlightenment thought?", "back": "It showed the universe was orderly, rational, and knowable, leading philosophes to wonder if society could also operate on rational laws."}, {"front": "Who laid the philosophical foundation of the Enlightenment with his 'Discourse on Method'?", "back": "René Descartes."}, {"front": "Define Descartes' 'Method of Doubt.'", "back": "A philosophical technique of systematically doubting every belief until he reached something that could not be doubted, leading him to conclude 'I think, therefore I am.'"}, {"front": "What famous phrase did Descartes coin to express his foundational certainty?", "back": "'I think, therefore I am' (cogito, ergo sum)."}, {"front": "How did Descartes' focus on the individual thinking mind influence later Enlightenment thinkers, potentially beyond his intent?", "back": "It shifted the focus away from God, Scripture, and tradition toward human reason, which later thinkers used to attack religious belief."}, {"front": "What was the title and significance of Isaac Newton's most important scientific book?", "back": "*Principia Mathematica* (1687), which showed the universe runs on precise mathematical laws, like a vast machine."}, {"front": "What theological belief emerged among some Enlightenment thinkers due to Newton's 'clockwork universe' concept?", "back": "Deism."}, {"front": "Define Deism.", "back": "The belief that God created the universe but does not intervene in it through miracles, revelation, or prayer, acting as a 'clockmaker' who set the universe in motion and then stepped back."}, {"front": "Who was the political philosopher of the Enlightenment known for *Two Treatises of Government*?", "back": "John Locke."}, {"front": "According to Locke, what are natural rights, and what three specific rights did he identify?", "back": "Rights that belong to every human being by nature (not granted by governments), which he identified as life, liberty, and property."}, {"front": "Explain Locke's concept of the social contract.", "back": "Governments are formed by an agreement among people who consent to be governed in exchange for protection of their rights; if the government violates these rights, the people may replace it."}, {"front": "How did Locke's idea of authority coming from the 'consent of the governed' challenge the traditional doctrine of 'divine right'?", "back": "It asserted that a government's legitimacy comes from the people, not directly from God to a king."}, {"front": "Who was Voltaire, and what was his primary target ('l'infâme')?", "back": "François-Marie Arouet, a famous Enlightenment writer whose primary target ('the infamous thing') was religious intolerance, superstition, and the persecution of those who thought differently."}, {"front": "What was Voltaire's philosophical advice, expressed at the end of *Candide*?", "back": "'We must cultivate our garden,' meaning to focus on practical work and leave utopian dreams aside."}, {"front": "Was Voltaire an atheist? Explain his religious views.", "back": "No, he was a Deist who believed in God as the rational author of the universe but attacked the Catholic Church for its cruelty and corruption."}, {"front": "Who was the Enlightenment's most radical and contradictory thinker, arguing that civilization corrupted human beings?", "back": "Jean-Jacques Rousseau."}, {"front": "What famous line opened Rousseau's *Social Contract*?", "back": "'Man is born free, and everywhere he is in chains.'"}, {"front": "Define Rousseau's concept of the 'General Will.'", "back": "What the community as a whole truly wants—not the sum of individual desires, but the common good—which a just government should express."}, {"front": "How did Rousseau's 'General Will' differ from Locke's emphasis on individual natural rights, and what potential danger did it pose?", "back": "The General Will focused on the collective good, potentially allowing a government to override individual rights in the name of what someone decided was 'truly good' for the community, as seen in the French Revolution's Reign of Terror."}, {"front": "Who proposed the concept of 'separation of powers' to prevent tyranny?", "back": "Montesquieu (Charles-Louis de Secondat, Baron de Montesquieu)."}, {"front": "Describe Montesquieu's 'separation of powers.'", "back": "The division of government authority into three distinct branches—legislative (makes laws), executive (carries out laws), and judicial (interprets laws)—each with the ability to limit ('check') the others."}, {"front": "What historical government model heavily influenced Montesquieu's idea of separation of powers?", "back": "The English constitutional system of King, Parliament, and courts that emerged after the Glorious Revolution of 1688."}, {"front": "Which founding document of the United States was significantly influenced by Montesquieu's ideas on government structure?", "back": "The United States Constitution."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
