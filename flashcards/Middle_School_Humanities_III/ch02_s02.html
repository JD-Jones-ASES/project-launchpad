<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities III &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who were Miguel de Cervantes and Bartolomé de las Casas, and what is their significance to understanding the Spanish Empire?", "back": "They were two contemporary writers who lived through the height and beginning of the decline of the Spanish Empire, leaving indispensable records that reflect both its comedic and tragic aspects."}, {"front": "Describe some key events in Miguel de Cervantes' eventful life that influenced his writing.", "back": "He fought at the Battle of Lepanto (1571), was captured by pirates and enslaved for five years, and later faced poverty and imprisonment, eventually working as a tax collector."}, {"front": "How did Cervantes' personal biography influence the central theme of *Don Quixote*?", "back": "Having experienced both heroic ideals (battle) and painful realities (slavery, poverty, imprisonment), Cervantes infused his novel with the gap between these two, reflecting his own life of service followed by indifference."}, {"front": "What is *Don Quixote* often called, and what is its position in Spanish literature?", "back": "It is often called the first modern novel and is widely considered the greatest work in the Spanish language."}, {"front": "Who is the protagonist of *Don Quixote*, and what prompts his adventures?", "back": "Alonso Quijano, who renames himself Don Quixote de la Mancha, loses his grip on reality from reading too many chivalric romances and sets out to revive the age of knighthood."}, {"front": "What is the most famous scene in *Don Quixote*, Part I?", "back": "Don Quixote mistaking thirty or forty windmills for giants and charging them in battle, believing he is slaying a 'foul brood.'"}, {"front": "What allegorical interpretations can be drawn from Don Quixote's windmill scene?", "back": "It portrays a man so committed to an ideal that reality cannot reach him. Historically, it's been seen as an allegory for Spain itself, clinging to outdated rhetoric of crusade and chivalry while reality was shifting."}, {"front": "When reality contradicts Don Quixote's perceptions (like with the windmills), how does he maintain his delusions?", "back": "He blames enchanters for transforming what he perceives as giants into windmills or otherwise altering reality to fit his fantastical worldview."}, {"front": "How does the tone of *Don Quixote* evolve in Part II, particularly regarding Don Quixote's delusions?", "back": "The comedy deepens into something more melancholy. Don Quixote himself begins to doubt his visions, such as the one in the Cave of Montesinos, signaling the cracking of his confident delusion."}, {"front": "How did Cervantes himself characterize *Don Quixote*, and how do most readers perceive its genre?", "back": "Cervantes called it a 'comic history.' Most readers experience both laughter and grief, finding it a blend of comedy and tragedy simultaneously."}, {"front": "According to philosopher Miguel de Unamuno, what did Cervantes give Spain through *Don Quixote*?", "back": "Its 'tragic sense of life'—the awareness that ideals are beautiful, but the world often does not align with them."}, {"front": "What was Bartolomé de las Casas's significant work, and what was its purpose?", "back": "*A Short Account of the Destruction of the Indies* (1542), addressed directly to Prince Philip, intended to shock the Spanish court into reforming its colonial practices."}, {"front": "How did Las Casas describe the indigenous peoples of the Caribbean he encountered?", "back": "As 'open and as innocent as can be imagined,' simple, long-suffering, unassertive, submissive, without malice or guile, and utterly faithful and obedient."}, {"front": "How did Las Casas describe the behavior of the Spaniards towards the native peoples?", "back": "Like 'ravening wild beasts, wolves, tigers, or lions that had been starved for many days,' engaging in killing, terrorizing, afflicting, torturing, and destroying with unprecedented cruelty."}, {"front": "According to Las Casas, what were the devastating consequences of Spanish colonial practices on the indigenous population?", "back": "Forced labor in mines and fields, starvation, mothers' milk drying up, infant deaths, separation of sexes leading to no new births, and ultimately, the extinction of 'this whole race of people.'"}, {"front": "What crucial statement did Las Casas include to establish his credibility for his accounts?", "back": "He explicitly stated, 'I speak of what I myself saw. I was there.'"}, {"front": "On what theological principle did Las Casas primarily base his argument against Spanish colonial exploitation?", "back": "Christian theology, specifically the concept of *imago Dei* (indigenous peoples are human beings made in the image of God), arguing that enslavement and abuse mocked the faith."}, {"front": "What duty did Las Casas argue the Spanish Crown had before God regarding the indigenous peoples?", "back": "A positive duty to protect these peoples, not exploit them."}, {"front": "What makes Las Casas's critique of Spanish colonialism particularly powerful, considering his background?", "back": "He was not an outsider but a priest, a Spaniard, and a former *encomendero*, undergoing a remarkable 'conversion from participant to prophet' to advocate for indigenous rights."}, {"front": "How does Las Casas's use of religious authority compare to Pope Urban II's call for the First Crusade?", "back": "Both invoked religious authority, but Las Casas turned that same authority *against* expansion and conquest, arguing Christian teaching required the defense, not exploitation, of the conquered."}, {"front": "What common historical period did Cervantes and Las Casas share?", "back": "Both lived through the period when Spain's greatness was most visible, but also when its costs and the beginning of its decline were becoming undeniable."}, {"front": "How did both Cervantes and Las Casas demonstrate a unique combination of loyalty and protest towards Spain and its faith?", "back": "Neither abandoned Spain or their faith. Instead, they used what they loved (literature, the church) to challenge and critique what Spain was becoming, embodying both celebration and grief for their nation."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
