<html lang="en">
<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who were Miguel de Cervantes and Bartolomé de las Casas, and what historical period did they witness?", "back": "They were two pivotal Spanish writers who lived through the height and the beginning of the decline of the Spanish Empire, leaving records indispensable for understanding it from the inside."}, {"front": "What significant personal experiences shaped Miguel de Cervantes' worldview and writing?", "back": "He fought at the Battle of Lepanto, was captured and enslaved by Barbary pirates for five years, and spent years in poverty, even writing Don Quixote in prison. These experiences exposed him to both heroic ideals and painful realities."}, {"front": "What is Don Quixote often called, and why is it considered a groundbreaking work of literature?", "back": "It is often called the first modern novel and the greatest work in the Spanish language, noted for its complex exploration of ideals versus reality and its satirical yet profound character study."}, {"front": "Who is the protagonist of Don Quixote, and what is his central delusion?", "back": "The protagonist is Alonso Quijano, who renames himself Don Quixote de la Mancha. His central delusion is believing himself to be a knight-errant and setting out to revive the age of knighthood after reading too many chivalric romances."}, {"front": "Describe the famous 'tilting at windmills' scene from Don Quixote.", "back": "Don Quixote mistakes thirty or forty windmills for hulking giants and charges them, only to be knocked from his horse while the windmills turn serenely. He then blames an enchanter for transforming the 'giants'."}, {"front": "Beyond slapstick comedy, what allegorical and historical meanings can be drawn from the windmill scene?", "back": "Allegorically, it portrays a man so committed to an ideal that reality cannot reach him. Historically, it can represent Spain itself, still clinging to rhetoric of crusade and chivalry while the world was changing (published after the Armada's failure)."}, {"front": "How did Cervantes' own life experiences influence the themes explored in Don Quixote?", "back": "Cervantes, who had experienced real battle, capture, slavery, and poverty after service, infused his hero with the love of heroic ideals and the world's indifference to them, reflecting the gap between ideals and painful reality."}, {"front": "How does the 'comedy' of Don Quixote evolve from Part I to Part II?", "back": "In Part I, it's more slapstick. By Part II, it deepens into something more melancholy, with Don Quixote's delusions cracking and even he beginning to doubt his visions, making it a 'tragicomic' experience."}, {"front": "According to the philosopher Miguel de Unamuno, what did Cervantes give Spain through Don Quixote?", "back": "Unamuno believed Cervantes gave Spain its 'tragic sense of life'—the awareness that ideals are beautiful, but the world often fails to match them."}, {"front": "What ideals does Don Quixote chase, and what does the novel suggest about their relevance in his era?", "back": "He chases ideals of chivalry and crusade. The novel suggests these ideals, while once real, no longer match the world he lives in, leading to delusion and conflict with reality."}, {"front": "What was the title of Bartolomé de las Casas' most famous work, and what was its primary objective?", "back": "His most famous work was A Short Account of the Destruction of the Indies (1542). Its primary objective was to shock the Spanish court into reforming its colonial practices in the Americas."}, {"front": "How did Las Casas initially describe the indigenous peoples of the Caribbean islands in 'A Short Account'?", "back": "He described them as innocent, unassuming, long-suffering, unassertive, submissive, without malice or guile, and utterly faithful and obedient—'the simplest people in the world'."}, {"front": "How did Las Casas contrast the behavior of the Spanish conquistadors with the nature of the indigenous peoples?", "back": "He contrasted the 'meek outcasts' with Spaniards who behaved 'like ravening wild beasts, wolves, tigers, or lions that had been starved for many days,' inflicting unprecedented cruelty."}, {"front": "What specific atrocities did Las Casas document regarding the treatment of indigenous populations in the mines and fields?", "back": "He documented forced labor for men in mines and women in fields, starvation, the drying up of mothers' milk leading to infant deaths, and the separation of spouses, resulting in the extinction of whole populations."}, {"front": "What was the basis of Bartolomé de las Casas' ethical arguments against Spanish colonial exploitation?", "back": "His arguments were grounded in Christian theology, asserting that indigenous peoples were human beings made in the image of God (imago Dei) and that the Spanish crown had a divine duty to protect, not exploit, them."}, {"front": "Explain Bartolomé de las Casas' significant moral transformation.", "back": "He was a priest and a former encomendero (participant in the colonial system) who underwent a conversion from participant to prophet, using his religious authority to advocate for the conquered rather than justify their exploitation."}, {"front": "How did Las Casas' use of religious authority differ from that of historical figures like Urban II?", "back": "While Urban II invoked religious authority to justify expansion (the First Crusade), Las Casas turned that same religious authority against expansion and exploitation, arguing that Christian teaching required the defense of the conquered."}, {"front": "What shared characteristics or roles united Cervantes and Las Casas despite their different literary forms?", "back": "They were almost exact contemporaries who both lived through the peak of Spain's empire and its undeniable costs. Both maintained loyalty to Spain and its faith while protesting its worst excesses from within, challenging what it was becoming."}, {"front": "What lasting legacy do Cervantes and Las Casas hold in Spanish literature and Western civilization?", "back": "They are enduring figures not just in Spanish literature but in the moral history of Western civilization, representing a powerful combination of loyalty and protest, celebration and grief, in their challenge to the Spanish Empire."}, {"front": "When was Don Quixote Part I published, and what significant historical event, seventeen years prior, provided a backdrop to its themes?", "back": "Don Quixote Part I was published in 1605. Seventeen years prior, in 1588, the Spanish Armada failed, which is seen by some as historical context for the novel's themes of a nation clinging to past ideals."}, {"front": "What role does Sancho Panza serve during Don Quixote's adventures, particularly in the windmill scene?", "back": "Sancho Panza serves as Don Quixote's squire and the voice of practical reality, often trying to bring his master back to reason (e.g., identifying windmills as windmills, not giants)."}, {"front": "What detail about Las Casas' past gave his critiques of Spanish colonial practices particular weight and credibility?", "back": "He was himself a former encomendero, meaning he had direct experience within the system he was criticizing, which made his moral transformation and witness incredibly powerful."}, {"front": "In Part II of Don Quixote, what new element is introduced regarding Don Quixote's delusions after his experience in the Cave of Montesinos?", "back": "For the first time, Don Quixote himself begins to doubt whether his vision was real, and Sancho wonders if his master is lying, signaling a cracking of the old, confident delusion and the collapse of his ideals."}, {"front": "How did Cervantes himself categorize Don Quixote, and how is it typically perceived by readers?", "back": "Cervantes called it a 'comic history.' Most readers find themselves experiencing both laughter and grief simultaneously, perceiving it as a blend of comedy and tragedy."}, {"front": "What is the meaning and significance of 'imago Dei' in Las Casas' arguments?", "back": "'Imago Dei' means 'image of God.' Las Casas argued that indigenous peoples were created in God's image, making their enslavement and brutalization a mockery of faith and a direct violation of Christian duty to protect them."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
