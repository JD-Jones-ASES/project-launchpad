<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 7, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What event triggered the start of World War I?", "back": "The assassination of Archduke Franz Ferdinand, heir to the Austro-Hungarian throne, and his wife Sophie in Sarajevo on June 28, 1914."}, {"front": "Who assassinated Archduke Franz Ferdinand?", "back": "Gavrilo Princip, a nineteen-year-old Bosnian nationalist."}, {"front": "Define the 'alliance system' as it existed in Europe before WWI.", "back": "A network of treaties in which countries promised to defend one another if attacked. This system converted a regional crisis into a world war."}, {"front": "Name the two main alliance blocs in Europe in 1914.", "back": "The Triple Alliance (Germany, Austria-Hungary, Italy) and the Triple Entente (France, Russia, Britain)."}, {"front": "How did the assassination in Sarajevo escalate into a world war within six weeks?", "back": "Austria-Hungary declared war on Serbia. Russia mobilized to defend Serbia, leading Germany to declare war on Russia and France. When Germany invaded neutral Belgium, Britain declared war on Germany."}, {"front": "Why did the alliance system, designed to deter war, fail in 1914?", "back": "Military timetables moved faster than diplomats, mobilization orders were irreversible, and national leaders underestimated the destructiveness of modern industrial warfare."}, {"front": "What was Germany's pre-war strategy for a two-front war?", "back": "The Schlieffen Plan, which called for a rapid six-week knockout of France through Belgium, then a turn east to face Russia."}, {"front": "What was the outcome of the Schlieffen Plan?", "back": "It failed when German forces were halted at the First Battle of the Marne in September 1914, leading to a static Western Front and trench warfare."}, {"front": "Define 'trench warfare.'", "back": "A style of warfare in which opposing armies dig parallel systems of trenches and defend them against frontal assault. It featured multiple lines of trenches and a 'No Man's Land' between armies."}, {"front": "How did new industrial technologies impact warfare on the Western Front?", "back": "Weapons like machine guns, heavy artillery, and barbed wire made defense almost impregnable and offense nearly impossible, leading to a static front and massive casualties."}, {"front": "What was significant about the Battle of the Somme (July–November 1916)?", "back": "It was a British offensive that resulted in approximately 57,000 British casualties on the first day alone, and over a million total for both sides, with an Allied advance of only a few miles."}, {"front": "What was the German objective in the Battle of Verdun (February–December 1916)?", "back": "To 'bleed France white' by deliberately attacking a French fortress town of great symbolic importance, leading to approximately 700,000 casualties for both sides."}, {"front": "How did the Eastern Front differ from the Western Front during WWI?", "back": "The Eastern Front was much longer and more fluid, with enormous movements of territory and tremendous casualties, but it never completely stalemated like the Western Front."}, {"front": "Describe the Gallipoli Campaign (1915–1916).", "back": "An Allied attempt (championed by Winston Churchill) to knock the Ottoman Empire out of the war by seizing the Dardanelles, which became a catastrophic failure with nearly half a million casualties."}, {"front": "What two decisive events transformed World War I in 1917?", "back": "The entry of the United States into the war and the collapse and withdrawal of Russia."}, {"front": "What were the primary reasons for the United States entering WWI?", "back": "German unrestricted submarine warfare (including the sinking of the Lusitania) and Germany's attempt to encourage Mexico to attack the US (the Zimmermann Telegram)."}, {"front": "What was the impact of the US entry into WWI?", "back": "American troops provided fresh manpower and renewed Allied morale, arriving in large numbers in 1918 as Germany launched its last desperate offensives."}, {"front": "How did Russia's involvement in WWI end?", "back": "Revolutions in 1917 overthrew the Tsarist government, and the Bolsheviks, led by Vladimir Lenin, seized power in October, negotiating peace with Germany and withdrawing from the war in March 1918."}, {"front": "What is an 'Armistice'?", "back": "A formal agreement to stop fighting, pending a peace treaty."}, {"front": "When did the fighting on the Western Front officially end?", "back": "At 11:00 AM on November 11, 1918, with the signing of the Armistice."}, {"front": "What were the approximate human costs of World War I?", "back": "Approximately 17 million dead and another 20 million wounded."}, {"front": "What was President Woodrow Wilson's vision for the post-WWI peace settlement?", "back": "His Fourteen Points, which advocated for open diplomacy, freedom of the seas, arms reduction, national self-determination, and a League of Nations to resolve disputes peacefully."}, {"front": "What was the League of Nations, as envisioned by Wilson's Fourteen Points?", "back": "An international organization proposed by President Wilson to maintain peace and resolve future disputes peacefully."}, {"front": "What was the Treaty of Versailles?", "back": "The peace treaty signed on June 28, 1919, officially ending World War I, which imposed harsh terms on Germany."}, {"front": "Name three key provisions of the Treaty of Versailles.", "back": "Germany had to accept full responsibility for the war (war guilt clause), pay massive reparations, lose territory (e.g., Alsace-Lorraine, Polish Corridor), and face severe limits on its military."}, {"front": "What was the 'war guilt clause' (Article 231) of the Treaty of Versailles?", "back": "A provision that forced Germany and its allies to accept full responsibility for causing all the loss and damage of World War I."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
