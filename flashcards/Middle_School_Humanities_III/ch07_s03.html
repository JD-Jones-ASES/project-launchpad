<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities III &mdash; Chapter 7, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What crucial information about the First World War does a map of Europe's alliance system in 1914 reveal?", "back": "It shows Germany surrounded by the Triple Entente (France and Russia aligned, Britain controlling the seas), highlighting the geopolitical 'trap'."}, {"front": "What were the two main alliance blocs in Europe on the eve of World War I?", "back": "The Triple Alliance (Germany, Austria-Hungary, Italy) and the Triple Entente (France, Russia, Britain)."}, {"front": "Describe the 'paradox' of the Western Front mentioned in the text.", "back": "Four years of the most intense fighting in human history produced almost no territorial movement along the approximately 700-kilometer front lines."}, {"front": "How did advancements in weaponry contribute to the stalemate on the Western Front?", "back": "The Industrial Revolution transformed weapons, but armies still used outdated Napoleonic-era infantry assault tactics, making them suicidal against modern defensive firepower."}, {"front": "Identify three key technologies that made the Western Front nearly impossible to cross for attacking infantry.", "back": "Machine guns (high firing rate), barbed wire (stopped infantry, made them targets), and heavy artillery (destroyed fortifications but churned ground and warned defenders)."}, {"front": "How did heavy artillery barrages, intended to aid an assault, sometimes hinder it on the Western Front?", "back": "While they could destroy trenches, they also churned the ground into a difficult-to-cross wasteland and warned defenders, who would be ready with machine guns when the barrage stopped."}, {"front": "What new military technologies were introduced to try to break the Western Front stalemate, and when did they become effective?", "back": "Tanks and airplanes were introduced. Tanks first appeared in 1916 but only became effective in restoring movement to the battlefield by 1918, combined with new infantry tactics."}, {"front": "Explain why the Eastern Front experienced much greater line movement compared to the Western Front during WWI.", "back": "The Eastern Front was significantly longer, less densely held, and featured more cavalry and open terrain, preventing the same kind of entrenched stalemate seen in the West."}, {"front": "What challenging task faced the peacemakers in Paris in 1919 regarding the map of Europe?", "back": "They had to redraw the map of a continent where four empires (German, Austro-Hungarian, Russian, Ottoman) had collapsed, and over a dozen new or enlarged nations were claiming territory."}, {"front": "What was President Wilson's principle of 'self-determination,' and why was it difficult to apply in post-WWI Europe?", "back": "It was the idea that peoples of a common nationality should govern themselves. It was difficult because Europe's populations were too intermixed, scattered, and divided by competing historical claims for clean boundaries."}, {"front": "How did the Treaty of Versailles redraw the map of what was formerly Austria-Hungary?", "back": "Austria-Hungary was dissolved, leading to the creation of new nations like Czechoslovakia, Yugoslavia, Hungary, and a smaller Austria."}, {"front": "Name two new nations formed from the dissolution of Austria-Hungary and describe a key ethnic or cultural challenge each faced.", "back": "1. Czechoslovakia: Combined Czech and Slovak populations with different languages, and included three million ethnic Germans in the Sudetenland. 2. Yugoslavia: Combined diverse peoples (Serbs, Croats, Slovenes, Bosnians, Macedonians) with different religions, alphabets, and historical suspicions."}, {"front": "What significant territorial outcome of the Treaty of Versailles regarding Poland created a new point of contention with Germany?", "back": "Poland was reborn and gained the 'Polish Corridor,' a strip of territory providing sea access, but it cut off the German province of East Prussia from the rest of Germany."}, {"front": "What was the 'stabbed in the back' myth that developed in Germany after WWI?", "back": "The false belief that Germany had not been defeated on the battlefield but had been betrayed by revolutionaries and Jews at home who undermined the war effort."}, {"front": "What was the true reason for Germany's defeat in WWI, contradicting the 'stabbed in the back' myth?", "back": "Germany was exhausted by four years of attritional warfare and the Allied blockade."}, {"front": "Define the 'Weimar Republic' and explain its initial challenges.", "back": "The democratic German government established in 1919 after Kaiser Wilhelm II's abdication. It was born associated with defeat and national humiliation, burdened by Versailles reparations, inflation, and attacks from both Communist and extreme nationalist parties."}, {"front": "What was the primary goal of the League of Nations, as proposed by Woodrow Wilson?", "back": "To create an international organization where disputes between countries could be resolved by negotiation rather than war, promoting collective security."}, {"front": "Identify two structural flaws that prevented the League of Nations from effectively maintaining peace.", "back": "1. Lack of enforcement mechanism: It had no army and relied only on economic sanctions and diplomatic pressure. 2. Lack of universal membership: The United States never joined, and Germany and the Soviet Union were initially excluded."}, {"front": "What was John Maynard Keynes's prediction about the Treaty of Versailles?", "back": "He predicted that the treaty's combination of humiliation and economic burden would destabilize Europe."}, {"front": "What was 'Point I' of Woodrow Wilson's Fourteen Points, and what historical context was it addressing?", "back": "'Open covenants of peace, openly arrived at,' aiming to prevent the secret treaties and back-channel deals of the pre-WWI alliance system that Wilson believed contributed to the war."}, {"front": "According to the text, what are the two most consequential peace settlements in modern European history?", "back": "The Peace of Westphalia (1648) and the Treaty of Versailles (1919)."}, {"front": "Name three things the Peace of Westphalia (1648) 'got right' compared to the Treaty of Versailles (1919) in achieving lasting peace.", "back": "1. It included the defeated parties in negotiations. 2. It did not assign blame or demand punishment. 3. It recognized that lasting peace required all parties to accept the outcome as legitimate."}, {"front": "How did the Treaty of Versailles violate the principles for lasting peace exemplified by the Peace of Westphalia?", "back": "Versailles excluded Germany from negotiations, assigned war guilt, demanded punishment (reparations), and thus failed to secure Germany's acceptance of the outcome as legitimate."}, {"front": "Why did Arab leaders feel betrayed by the dismemberment of the Ottoman Empire after WWI?", "back": "They had been promised independence for supporting the Allied war effort, but instead, their territories (Syria, Lebanon, Mesopotamia, Palestine) were divided between Britain and France as League of Nations mandates."}, {"front": "How did the post-WWI settlement contribute to future instability in the 20th century?", "back": "The new nations created at Versailles faced crises of legitimacy; Germany's humiliation created a grievance exploited by nationalists; and the League of Nations, lacking key members and enforcement, was unable to prevent future aggression."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
