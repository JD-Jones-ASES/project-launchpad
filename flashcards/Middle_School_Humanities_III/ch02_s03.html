<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What made the Spanish Empire unique in world history at its height?", "back": "It was the first empire to genuinely span the entire globe, connecting previously isolated parts of the world from the Philippines to the Caribbean."}, {"front": "What was the primary economic engine of the Spanish Empire?", "back": "Silver, extracted mainly from the viceroyalties of New Spain and Peru."}, {"front": "Which two great viceroyalties were organized around the extraction of mineral wealth for shipment back to Seville?", "back": "New Spain (Mexico and Central America) and Peru (South America)."}, {"front": "Where was Cerro Rico, the 'Rich Mountain' with the largest silver deposit in world history, discovered in 1545?", "back": "Present-day Bolivia, leading to the rapid growth of the city of Potosí."}, {"front": "Describe the 'mita' labor system as adapted by the Spanish for colonial mines.", "back": "The mita was a system of rotational community labor, adapted from an Inca institution. Indigenous villages were required to send a quota of male workers to the mines for a fixed period each year. In practice, it was a deadly forced labor, often without fair compensation."}, {"front": "What were the deadly consequences for workers in the Potosí silver mines under the colonial mita system?", "back": "Workers faced lethal conditions underground, breathing silver dust and mercury vapor. Many died from mercury poisoning, leading to tremors, madness, and organ failure. An estimated eight million people died at Potosí over the colonial period."}, {"front": "Define the 'Price Revolution' that swept through Europe in the 16th and early 17th centuries.", "back": "The Price Revolution was a dramatic rise in prices, primarily caused by the flood of silver from the New World. As the supply of silver increased faster than goods, its purchasing power fell, leading to inflation that hit ordinary people hardest and caused social unrest."}, {"front": "Explain the paradox of Spain's immense silver wealth yet its repeated bankruptcies.", "back": "Despite possessing more silver than any European nation, Spain went bankrupt multiple times because the silver flowed through the country without developing its own manufacturing, it was consumed by costly wars, and the flood of silver itself caused inflation (the Price Revolution) which devalued its currency."}, {"front": "How did Spain's economic strategy of extracting raw bullion differ from the Roman Empire's approach to provincial wealth?", "back": "Spain extracted raw metal (bullion) and consumed it in wars, failing to create a durable economic base. The Roman Empire extracted wealth through taxation and trade, integrating provinces into an economy that produced goods and services."}, {"front": "Describe the 'Manila Galleon' trade route.", "back": "The Manila Galleon was an annual Spanish trading vessel that sailed between Acapulco (Mexico) and Manila (Philippines) from 1565 to 1815. It carried New World silver westward across the Pacific and returned with Asian luxury goods like Chinese silk, porcelain, and spices, connecting global economies."}, {"front": "What was the ultimate destination for much of the silver transported by the Manila Galleons?", "back": "China, where it served as the standard currency and financed the Qing dynasty's imperial economy."}, {"front": "Define the 'Columbian Exchange.'", "back": "The Columbian Exchange was the transfer of plants, animals, diseases, and people between the Americas and the rest of the world following Columbus's voyages in 1492. It permanently transformed diets, populations, and environments globally."}, {"front": "Name three major crops that went from the Americas to the Old World as part of the Columbian Exchange and describe their impact.", "back": "The potato (enabled population growth in Ireland and northern Europe), the tomato (defined Italian cuisine), and corn (maize, became a staple crop across Africa). These were caloric staples that fed millions."}, {"front": "What significant animals were introduced from the Old World to the Americas, and what was their impact?", "back": "Horses, cattle, pigs, and sheep were unknown in the Americas before Columbus. Horses, for example, transformed the Plains cultures of North America, leading many Indigenous peoples to adopt a horse-mounted warrior lifestyle."}, {"front": "What was the most devastating import from the Old World to the Americas during the Columbian Exchange?", "back": "Disease, such as smallpox, measles, influenza, and typhus. Indigenous peoples had no prior exposure or immune resistance to these diseases."}, {"front": "Explain the demographic impact of Old World diseases on indigenous populations in the Americas.", "back": "Due to lack of immunity, Old World diseases caused one of the largest demographic catastrophes in human history. Within a century of contact, indigenous populations in many regions fell by an estimated 50 to 90 percent, leading to the collapse of entire civilizations and ways of life."}, {"front": "How does the Columbian Exchange illustrate the concept of 'unintended consequences'?", "back": "The exchange was not designed by anyone; it resulted from contact between previously isolated biological systems. The profound results—both beneficial and catastrophic—were larger than any individual human decision, demonstrating that not everything that happens in history is the result of deliberate choice."}, {"front": "Describe the 'casta system' in colonial Spanish America.", "back": "The casta system was a rigid racial classification hierarchy that assigned social status, legal rights, and economic obligations based on ancestry and perceived racial mixture. It was codified in law and enforced in daily social practice, regulating aspects like marriage, jobs, and tribute payments."}, {"front": "What were the main categories of the casta system hierarchy, from top to bottom?", "back": "Peninsulares (born in Spain), criollos (full Spanish descent born in Americas), mestizos (mixed Spanish and indigenous ancestry), indigenous peoples, and enslaved Africans and their descendants at the bottom."}, {"front": "How did the casta system help the Spanish maintain colonial control?", "back": "It organized society to create divisions among different groups, ensuring that various segments had different interests and enemies. This fragmentation made collective resistance against the colonial order harder to achieve."}, {"front": "Compare the Spanish casta system's method of maintaining control to the Roman practice of granting citizenship to provincial elites.", "back": "Both were methods of co-opting potential opponents. However, Spain's casta system was more rigid and explicitly racial, dividing groups to prevent unified resistance. Rome's system of granting citizenship aimed to integrate elites and encourage loyalty."}, {"front": "What are some lasting legacies of the Spanish colonial system on modern Latin America?", "back": "The concentration of land in the hands of a small elite, the underdevelopment of manufacturing in favor of raw material export, and the racial hierarchies created by the casta system all have roots in the colonial period and continue to influence economic and social challenges today."}, {"front": "How does the Columbian Exchange continue to shape the world's diets today?", "back": "Many staple foods globally originated in the Americas, such as the potato (crucial for European diets, as seen in the Irish potato famine) and the tomato (essential for Italian and Spanish cuisine). These transfers fundamentally altered global agriculture and eating habits."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
