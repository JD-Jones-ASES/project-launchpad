<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "List the three major events of 1492 that transformed Spain.", "back": "1. The surrender of Granada, ending the Reconquista. 2. The issuance of the Alhambra Decree, expelling Spain's Jewish population. 3. Christopher Columbus's departure to find a western route to Asia."}, {"front": "Define the Reconquista.", "back": "The centuries-long campaign by Christian kingdoms to retake the Iberian Peninsula from Muslim rulers, lasting from the eighth century to 1492."}, {"front": "What was the long-term impact of the Reconquista on Spanish national identity?", "back": "It shaped Spanish national identity and reinforced the conviction that Christian civilization must be defended and expanded at all costs."}, {"front": "Explain the purpose and outcome of the Treaty of Tordesillas (1494).", "back": "It divided newly discovered lands between Spain and Portugal along a line in the Atlantic. Spain received everything to the west (most of the Americas), and Portugal received the east (including Brazil and the sea route to India)."}, {"front": "Who conquered the Aztec Empire, and what key factor, besides military might, aided this conquest?", "back": "Hernán Cortés conquered the Aztec Empire. Smallpox, to which the native population had no immunity, played a devastating role, killing far more than Spanish swords."}, {"front": "Who conquered the Inca Empire, and what happened to its ruler, Atahualpa?", "back": "Francisco Pizarro conquered the Inca Empire. Its ruler, Atahualpa, was captured, held for ransom (a room filled with gold and silver), and executed despite the ransom's delivery."}, {"front": "Define 'viceroyalty' and name the two great Spanish viceroyalties.", "back": "A viceroyalty was a large colonial territory governed by a viceroy (an official who ruled on behalf of the Spanish crown). The two great viceroyalties were New Spain (Mexico and Central America) and Peru (South America)."}, {"front": "What was the stated purpose of the encomienda system?", "back": "Spanish colonists (encomenderos) were granted the labor of a specific number of native people in exchange for the obligation to Christianize and protect them."}, {"front": "How did the encomienda system operate in practice?", "back": "In practice, it became little more than forced labor. Native men were worked to death in silver mines, families were torn apart, and entire villages were depopulated."}, {"front": "Who was Bartolomé de las Casas, and what was his primary mission?", "back": "He was a Dominican friar who, after a religious conversion, dedicated his life to defending the native peoples of the Americas against Spanish colonial abuses."}, {"front": "What important work did Las Casas publish in 1542, and what was its focus?", "back": "He published 'A Short Account of the Destruction of the Indies,' a searing indictment of Spanish colonial practice addressed directly to the king, arguing that indigenous peoples were fully human and their enslavement a mortal sin."}, {"front": "What was the main objective of the New Laws of 1542, influenced by Las Casas?", "back": "The main objective was to curtail the worst abuses of the encomienda system, though with mixed success."}, {"front": "Explain the concept of 'prophetic witness from within a system' using Las Casas as an example.", "back": "It describes someone who does not abandon their system (e.g., nation or faith) but uses it to indict injustice. Las Casas used his position as a friar and his Spanish identity to challenge the crown's colonial practices."}, {"front": "Characterize the reign of Philip II (1556–1598) in terms of Spain's global power and religious role.", "back": "Philip II's reign marked the height of Spanish power, ruling a vast empire across two hemispheres. He was the great champion of the Catholic Counter-Reformation and defender of orthodoxy against Protestantism."}, {"front": "What was the Escorial, and who built it?", "back": "The Escorial was a palace, monastery, and mausoleum outside Madrid, built by Philip II as a monument to Spanish Catholic civilization."}, {"front": "What was the significance of the Battle of Lepanto (1571)?", "back": "It was a major Spanish-led coalition victory against the Ottoman fleet off the coast of Greece, shattering the myth of Ottoman naval invincibility and marking one of the greatest Christian naval victories of the era."}, {"front": "Define the Counter-Reformation and Spain's role in it.", "back": "The Counter-Reformation was the Catholic Church's reform movement in the 16th-17th centuries, responding to the Protestant Reformation. Spain under Philip II was its great champion in Europe, supporting institutions like the Council of Trent, the Jesuits, and the Inquisition."}, {"front": "What was the central question addressed during the Valladolid Debate (1550–1551)?", "back": "The central question was whether Spain's conquest of the Americas was morally just."}, {"front": "Summarize Juan Ginés de Sepúlveda's argument at the Valladolid Debate.", "back": "Sepúlveda argued that indigenous peoples were 'natural slaves' in the Aristotelian sense – barbarous, incapable of governing themselves, and therefore legitimately conquered and Christianized by force."}, {"front": "Summarize Bartolomé de las Casas's argument at the Valladolid Debate.", "back": "Las Casas argued that every human being was endowed with reason and natural rights, and that no just war could be waged against people who had never harmed Spain or its subjects."}, {"front": "Why was the Valladolid Debate remarkable, despite its inconclusive verdict?", "back": "It was remarkable because Spain was one of the few colonial powers in history to conduct a formal legal and theological inquiry into the moral legitimacy of its own empire."}, {"front": "Identify two key events during Philip II's reign that foreshadowed Spain's decline.", "back": "The revolt of the Dutch Netherlands (beginning c. 1568), which led to eighty years of costly warfare, and the defeat of the Spanish Armada by England in 1588."}, {"front": "What was the impact of the expulsion of the Moriscos in 1609?", "back": "Philip III expelled an estimated three hundred thousand Moriscos (descendants of Muslim converts to Christianity), removing skilled farmers and craftsmen from the Spanish economy."}, {"front": "How did the Thirty Years' War and the Peace of Westphalia impact Spain?", "back": "The Thirty Years' War (1618–48) drained Spanish resources, and the Peace of Westphalia (1648) marked Spain's loss of dominance in Europe to France."}, {"front": "What was the final outcome of the War of Spanish Succession (1701–14) for Spain?", "back": "The Treaty of Utrecht (1713) installed a French Bourbon as king but stripped Spain of its remaining European territories, including the Spanish Netherlands and its Italian possessions, ending its age of hegemony."}, {"front": "What recurring historical pattern does Spain's rise and fall illustrate, according to the text?", "back": "It illustrates a pattern of rapid expansion funded by extracted wealth, followed by the political and economic costs of maintaining too large an empire. The silver fueled inflation and, when it ran short, left little to fall back on during continuous wars."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
