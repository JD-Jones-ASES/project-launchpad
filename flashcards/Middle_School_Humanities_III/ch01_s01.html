<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the context of religious conflict in England when Elizabeth I became queen?", "back": "England had changed its official religion four times in twenty-five years, from Henry VIII's break with Rome to Edward VI's radical Protestantism and Mary I's attempt to restore Catholicism."}, {"front": "Define the 'Elizabethan Settlement'.", "back": "The religious compromise established by Elizabeth I in 1559–1563, making England officially Protestant (Church of England) while keeping many Catholic forms of worship, aimed at creating a broad and peaceful national church."}, {"front": "What was Elizabeth I's philosophy regarding private religious beliefs?", "back": "She famously refused to 'open windows into men's souls,' prioritizing outward conformity to the Church of England over private belief to maintain peace."}, {"front": "How did the Elizabethan Settlement contribute to stability in England compared to other European nations?", "back": "For most of Elizabeth's reign, England avoided the religious civil wars that devastated France and the Holy Roman Empire due to the compromise."}, {"front": "Who was Mary Queen of Scots and why was she a threat to Elizabeth I?", "back": "Mary was Elizabeth's Catholic cousin with a plausible claim to the English throne, serving as a focal point for various Catholic plots against Elizabeth."}, {"front": "What event prompted Philip II of Spain to launch the Spanish Armada?", "back": "The execution of Mary Queen of Scots in February 1587 enraged Philip II, who had already planned to invade England and return it to Rome."}, {"front": "What was the significance of the defeat of the Spanish Armada in 1588?", "back": "It was a turning point in English history, crystallizing English national identity around the Protestant queen, English liberty, and sea power, defining the nation for centuries."}, {"front": "Define the 'divine right of kings' and identify English monarchs who believed in it.", "back": "The belief that a monarch's authority comes directly from God and cannot be limited by any human institution, including Parliament. Kings James I and Charles I famously adhered to this doctrine."}, {"front": "What was James I's most enduring achievement during his reign?", "back": "The completion of the King James Bible in 1611, a translation that combined theological precision with literary beauty and shaped English prose and worship."}, {"front": "Why was Charles I's 'ship money' tax controversial?", "back": "Charles I extended this tax, traditionally collected only in coastal counties to fund the navy, to the entire country without Parliamentary consent, violating established custom and royal authority limits."}, {"front": "What was the 'Petition of Right' (1628) and what did it demand?", "back": "A declaration passed by Parliament listing specific abuses of royal power and demanding Charles I acknowledge he could not imprison subjects without cause, levy taxes without Parliament's consent, or billet soldiers in private homes."}, {"front": "What was Charles I's 'Personal Rule'?", "back": "A period of eleven years (1629–1640) during which Charles I dismissed Parliament and ruled without it."}, {"front": "What event ultimately forced Charles I to recall Parliament after his 'Personal Rule'?", "back": "His attempt to impose a new prayer book on Scotland led to a rebellion, forcing him to recall Parliament to raise money for military action."}, {"front": "Who were the 'Cavaliers' and 'Roundheads' during the English Civil War?", "back": "The 'Cavaliers' were supporters of the king, while the 'Roundheads' were Parliament's army, so called for their short-cropped hair."}, {"front": "What was the historical significance of the execution of Charles I in 1649?", "back": "It was the first time in European history that a reigning monarch had been publicly tried and beheaded by his own subjects, demonstrating a radical shift in political power."}, {"front": "Define the 'Commonwealth' in English history.", "back": "The republican government established in England after the execution of Charles I in 1649, existing as a state without a king, governed by Parliament and a Council of State until 1653."}, {"front": "Who was Oliver Cromwell and what was his role during the 'Protectorate'?", "back": "Oliver Cromwell was a brilliant military commander and Puritan who ruled England as 'Lord Protector' during the Protectorate (1653–1659), holding near-kingly powers but refusing the crown."}, {"front": "What did the 'Restoration' (1660) bring back to England?", "back": "The monarchy (under Charles II), the Church of England, and the theaters, which had been closed by the Puritans."}, {"front": "Why did leading Protestants in Parliament invite William of Orange to England during James II's reign?", "back": "James II's open Catholicism, appointment of Catholics to military and civil offices, and the birth of his Catholic son guaranteed a Catholic succession, raising fears of England returning to Rome."}, {"front": "Define the 'Glorious Revolution'.", "back": "The nearly bloodless transfer of the English crown from James II to William and Mary in 1688, called 'glorious' because it avoided battle on English soil and permanently established Parliament's supremacy."}, {"front": "What were some key provisions of the English Bill of Rights (1689)?", "back": "It declared that the monarch could not suspend laws, levy taxes, or keep a standing army without Parliamentary consent; guaranteed free elections for MPs; and prohibited excessive bail, fines, and cruel and unusual punishments."}, {"front": "What is the principle of 'parliamentary supremacy'?", "back": "The constitutional principle, firmly established by the Glorious Revolution and the Bill of Rights (1689), that Parliament is the supreme law-making authority in England, which no monarch may override."}, {"front": "How did the reigns of James I and Charles I foreshadow the English Civil War?", "back": "Their strong belief in the divine right of kings and repeated attempts to rule without or in defiance of Parliament (especially regarding taxation and royal authority) generated significant friction and ultimately led to armed conflict."}, {"front": "How did the Glorious Revolution influence later political thought, particularly in America?", "back": "John Locke's Two Treatises of Government (1689), inspired by the Revolution, argued for government by consent, influencing the American founders and the American Bill of Rights (1791) directly borrowed phrases."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
