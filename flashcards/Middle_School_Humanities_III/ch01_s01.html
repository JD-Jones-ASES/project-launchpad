<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What overarching question do Shakespeare's Henry V, Milton's Areopagitica, and the English Bill of Rights all explore?", "back": "They all ask: 'What gives authority its right to rule?'"}, {"front": "What historical period and political climate surrounded the writing of Shakespeare's Henry V?", "back": "It was written around 1599, a decade marked by war, religious tension, and anxiety about who would succeed the aging Elizabeth I."}, {"front": "What famous English victory is the subject of Shakespeare's Henry V?", "back": "The Battle of Agincourt (1415), where Henry V's outnumbered army defeated a much larger French force."}, {"front": "In Henry V, what weighty question does the common soldier Williams pose to the king, disguised as a common soldier, the night before battle?", "back": "Williams asks if the king's cause is just and if the king is responsible for the souls of the men who die for him."}, {"front": "How does King Henry respond to the question of a king's responsibility for his soldiers' souls in Henry V?", "back": "He states, 'Every subject's duty is the king's; but every subject's soul is his own.'"}, {"front": "What is the 'St. Crispin's Day speech' from Henry V about?", "back": "It is King Henry's rallying cry to his outnumbered and exhausted officers, emphasizing shared sacrifice, brotherhood, and the honor of ordinary men who fight together."}, {"front": "Explain the significance of King Henry's line from the St. Crispin's Day speech: 'For he to-day that sheds his blood with me Shall be my brother; be he ne'er so vile, This day shall gentle his condition.'", "back": "This line suggests that fighting alongside the king on this day will elevate a common man to noble rank ('gentle his condition'), a radical claim in a society defined by birth and hereditary privilege."}, {"front": "What government action provoked John Milton to write Areopagitica?", "back": "The Long Parliament's Licensing Order of 1643, which required all books to be approved by government censors before publication."}, {"front": "From where does John Milton's Areopagitica get its title?", "back": "It comes from the Areopagus, an ancient Athenian hill where the city's supreme court met, symbolizing a place for public debate and judgment."}, {"front": "What is the central argument John Milton makes in Areopagitica regarding truth and falsehood?", "back": "Milton argues that truth is inherently stronger than falsehood and will prevail in open debate without needing government protection. Suppressing ideas only makes them more dangerous."}, {"front": "What famous statement from Areopagitica encapsulates Milton's belief in the power of truth?", "back": "'Let her and Falsehood grapple; who ever knew Truth put to the worse, in a free and open encounter?'"}, {"front": "What did Milton consider 'above all liberties' in Areopagitica?", "back": "He stated, 'Give me the liberty to know, to utter, and to argue freely according to conscience, above all liberties.'"}, {"front": "What is the historical significance of Milton's Areopagitica?", "back": "It is considered the first great argument in the English language for freedom of the press, foundational for later liberal thought and directly influencing the First Amendment to the U.S. Constitution."}, {"front": "Did Areopagitica immediately achieve its goal? What was its long-term impact?", "back": "Parliament initially ignored it, and the Licensing Order remained. However, Milton's arguments gradually won the intellectual debate, contributing to the lapse of the Licensing Act in 1695."}, {"front": "What historical event directly led to the drafting of the English Bill of Rights (1689)?", "back": "The Glorious Revolution."}, {"front": "What was the primary purpose of the English Bill of Rights (1689)?", "back": "To formally list what the monarch could and could not do, serving as a declaration of existing law and conditions for William and Mary to receive the crown."}, {"front": "How did the English Bill of Rights differ from a mere request to the monarch?", "back": "It was a declaration of existing law, presented as conditions to the new monarchs, not a petition. It asserted Parliament's authority rather than asking for royal favor."}, {"front": "Name two specific abuses of the Stuart kings that the English Bill of Rights (1689) aimed to correct.", "back": "It addressed James II's abuses such as suspending laws without Parliament's consent, keeping a standing army in peacetime, and manipulating courts and elections."}, {"front": "According to the English Bill of Rights, what was illegal concerning the suspension of laws?", "back": "The pretended power of suspending or executing laws by regal authority without Parliament's consent was declared illegal."}, {"front": "What did the English Bill of Rights state about standing armies in peacetime?", "back": "Raising or keeping a standing army within the kingdom in time of peace, without consent of Parliament, was declared against law."}, {"front": "What provision did the English Bill of Rights make regarding parliamentary elections?", "back": "It stipulated that the election of members of Parliament ought to be free."}, {"front": "What protections did the English Bill of Rights offer regarding legal punishments?", "back": "It declared that excessive bail ought not to be required, nor excessive fines imposed, nor cruel and unusual punishments inflicted."}, {"front": "Define 'habeas corpus' and explain its significance in English law.", "back": "'Habeas corpus' is a legal protection (strengthened by the 1679 Act) that prevents the government from imprisoning a person without charging them with a specific crime and bringing them before a court. It means 'you shall have the body' and is one of the oldest protections of individual liberty."}, {"front": "What fundamental principle did the English Bill of Rights (1689) establish regarding the monarch's power?", "back": "It established the principle that the law is above the king, and Parliament makes the law within which the king governs."}, {"front": "How does the English Bill of Rights (1689) relate to earlier documents like Magna Carta (1215)?", "back": "Both documents responded to specific royal abuses and were framed as declarations of 'ancient rights and liberties,' rather than new inventions, asserting pre-existing rights."}, {"front": "What does it mean for rights to be considered 'ancient' in the context of documents like the Bill of Rights or Magna Carta?", "back": "It implies that these rights are not newly created but are long-standing traditions and established customs, giving them historical legitimacy and making them harder for a monarch to challenge."}, {"front": "How does the concept of 'ancient rights and liberties' in the English Bill of Rights subtly contrast with the idea of 'natural rights'?", "back": "Ancient rights are based on historical precedent, tradition, and custom specific to a nation. Natural rights, championed later by thinkers like Locke, are viewed as inherent to all humans by virtue of their existence, regardless of historical context or specific laws."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
