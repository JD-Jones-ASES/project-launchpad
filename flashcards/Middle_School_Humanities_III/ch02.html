<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities III &mdash; Chapter 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What three events in 1492 set Spain on the path to world empire?", "back": "The fall of Granada completed the Reconquista (January); the Alhambra Decree expelled Spain's Jewish population; Columbus sailed west in August, reaching the Americas."}, {"front": "What was the Reconquista?", "back": "The centuries-long campaign by Christian kingdoms to retake the Iberian Peninsula from Muslim rulers. Beginning in the eighth century, it ended with the fall of Granada in 1492 and shaped Spain's conviction that Christian civilization must be defended and expanded."}, {"front": "What was the Treaty of Tordesillas (1494)?", "back": "A treaty dividing newly discovered lands between Spain and Portugal along a line through the Atlantic: Spain received everything to the west, Portugal the east (including India and Brazil). No native peoples were consulted."}, {"front": "How did Hernan Cortes conquer the Aztec Empire with only about 500 soldiers?", "back": "Military tactics, horses, and crucially smallpox, to which the native population had no immunity. Disease killed far more than Spanish swords; the capital Tenochtitlan fell in 1521."}, {"front": "Who was Francisco Pizarro and what did he conquer?", "back": "A Spanish conquistador who overthrew the Inca Empire in Peru with an even smaller force than Cortes used. The Inca ruler Atahualpa was captured, held for ransom (a room filled with gold and silver), then executed anyway."}, {"front": "What was a viceroyalty?", "back": "A large colonial territory governed by a viceroy (in place of the king) who ruled on behalf of the Spanish crown. The two great viceroyalties were New Spain (Mexico and Central America) and Peru (South America)."}, {"front": "What was the encomienda system?", "back": "A labor system granting Spanish colonists (encomenderos) the labor of a specific number of native people in exchange for Christianizing and protecting them. In practice it became forced labor; native men were worked to death in silver mines."}, {"front": "Who was Bartolome de las Casas?", "back": "A Dominican friar who had participated in the conquest before a religious conversion led him to defend indigenous peoples. He testified before the Spanish court, published A Short Account of the Destruction of the Indies (1542), and argued enslavement was a mortal sin."}, {"front": "What were the New Laws of 1542?", "back": "Laws passed partly due to Las Casas's efforts that attempted to curtail the worst encomienda abuses. They had mixed success because economic interest and distance from power slowed and limited reform."}, {"front": "What was the Valladolid Debate (1550-1551)?", "back": "An extraordinary debate ordered by King Charles I (Charles V) who suspended all conquests and summoned a council to answer: was Spain's conquest of the Americas morally just? Las Casas argued against Sepulveda; no definitive verdict was issued, but the debate itself was remarkable."}, {"front": "What did Sepulveda argue at the Valladolid Debate?", "back": "That indigenous peoples were natural slaves in the Aristotelian sense - barbarous, incapable of governing themselves, and therefore legitimately conquered and Christianized by force."}, {"front": "What did Las Casas argue at the Valladolid Debate?", "back": "That every human being was endowed with reason and natural rights, and that no just war could be waged against people who had never harmed Spain or its subjects."}, {"front": "What was the Battle of Lepanto (1571)?", "back": "A Spanish-led coalition of Catholic navies that destroyed the Ottoman fleet off the coast of Greece. The largest naval battle in the Mediterranean since ancient times, it shattered the myth of Ottoman naval invincibility. Cervantes fought there and was wounded."}, {"front": "What was the Counter-Reformation?", "back": "The Catholic Church's reform movement of the 16th-17th centuries, partly in response to Protestantism. Key institutions: Council of Trent, Jesuits (founded by Ignatius of Loyola, 1540), and the renewed Inquisition. Philip II of Spain was its great political champion."}, {"front": "Who was Philip II of Spain (r. 1556-1598)?", "back": "The most powerful Catholic monarch in Christendom, ruling Spain, Portugal, the Netherlands, most of Italy, and a two-hemisphere empire. Champion of the Counter-Reformation; built the Escorial; launched the Armada against England."}, {"front": "Who was Miguel de Cervantes?", "back": "Spanish author (1547-1616) who fought at Lepanto, was captured by Barbary pirates and enslaved for five years, returned to poverty in Spain, and wrote Don Quixote - often called the first modern novel and the greatest work in the Spanish language."}, {"front": "What is the central theme of Don Quixote?", "back": "The gap between heroic ideals and painful reality. Alonso Quijano (Don Quixote) has read so many chivalric romances that he loses his grip on reality and sets out to revive knighthood - tilting at windmills he mistakes for giants."}, {"front": "What does the windmill episode in Don Quixote represent?", "back": "A portrait of a man so committed to an ideal that reality cannot reach him - simultaneously comic and tragic. Many readers have read it as Spain itself, living in crusade and chivalry rhetoric while economic and military foundations shifted beneath it."}, {"front": "What was Las Casas's moral argument against the encomienda?", "back": "From Christian theology: indigenous peoples are fully human, made in the image of God (imago Dei). Baptizing people you have enslaved and worked half to death is not evangelism - it is mockery of the faith. Spain had a positive duty to protect, not exploit, these peoples."}, {"front": "What personal transformation makes Las Casas remarkable?", "back": "He was himself a former encomendero who participated in the conquest. His religious conversion led him to dedicate his life to defending the same people he had once helped exploit - a moral transformation the text calls one of the most remarkable in the history of colonialism."}, {"front": "Why did Spain expel the Moriscos in 1609, and what were the consequences?", "back": "Philip III expelled the Moriscos (descendants of Muslim converts) for religious and political reasons. The result: an estimated 300,000 skilled farmers and craftsmen left in a single decade, seriously damaging Spain's economy."}, {"front": "What was the War of Spanish Succession (1701-1714)?", "back": "A European war over who would inherit the Spanish throne after the last Habsburg king died without an heir. Ended by the Treaty of Utrecht (1713), which installed a French Bourbon as king but stripped Spain of its remaining European territories."}, {"front": "Why did New World silver ultimately weaken rather than strengthen Spain?", "back": "Spain spent its silver faster than it could mine it, funding constant wars. The influx of silver also caused inflation that undermined Spain's economy. When wars continued and silver ran short, there was nothing to fall back on."}, {"front": "How does the text compare Spain's colonial economy to Rome's provincial system?", "back": "Rome extracted wealth through taxation and trade rather than mining, creating more durable economic structures. Spain's mining-based extraction made it rich fast but vulnerable when mines declined and wars continued."}, {"front": "What role did the Dutch revolt play in Spain's decline?", "back": "Beginning around 1568, the revolt of the Dutch Netherlands dragged Spain into 80 years of costly warfare, draining Spanish resources and weakening its military power. Combined with other factors, it contributed decisively to Spain's decline."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
