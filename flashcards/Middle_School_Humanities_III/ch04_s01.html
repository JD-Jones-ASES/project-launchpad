<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities III &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the Enlightenment?", "back": "An intellectual movement (c. 1680–1800) centered on the belief that human reason, properly applied, could improve government, society, religion, and morality."}, {"front": "How did the Scientific Revolution influence the Enlightenment?", "back": "Isaac Newton's discovery of universal gravitation suggested the universe was orderly, rational, and knowable, inspiring Enlightenment thinkers (philosophes) to believe society could also operate on rational laws."}, {"front": "What was the term for Enlightenment thinkers, particularly in France?", "back": "Philosophes."}, {"front": "Name some of the Enlightenment's greatest achievements and its greatest failure.", "back": "Achievements include constitutional government, religious toleration, and the doctrine of natural rights. Its greatest failure was the French Revolution."}, {"front": "What foundational philosophical technique did René Descartes develop?", "back": "The Method of Doubt, systematically doubting every belief until he reached something that could not be doubted."}, {"front": "What famous phrase encapsulated René Descartes's discovery of an undeniable truth?", "back": "“I think, therefore I am” (cogito, ergo sum)."}, {"front": "How did Descartes's philosophy shift the focus of knowledge?", "back": "By making the individual thinking mind the starting point, it shifted focus away from God, Scripture, and tradition toward human reason."}, {"front": "What concept did Isaac Newton's *Principia Mathematica* introduce, and what theological belief did it inspire among some Enlightenment thinkers?", "back": "Newton showed the universe was a 'clockwork machine' running on precise mathematical laws. This inspired Deism, the belief in a God who created but does not intervene."}, {"front": "Define Deism, a belief common among some Enlightenment figures.", "back": "The belief that God created the universe but does not intervene in it through miracles, revelation, or prayer. Deists accepted God as a rational explanation for existence but rejected specific religious doctrines."}, {"front": "What was John Locke's most important political work, and what question did it address?", "back": "*Two Treatises of Government* (1689), which asked: what is government, and why should anyone obey it?"}, {"front": "According to John Locke, what is the 'state of nature,' and what rights do individuals possess within it?", "back": "An imagined condition before government where all humans are naturally equal and free, possessing natural rights to life, liberty, and property."}, {"front": "Define 'natural rights' as understood by John Locke.", "back": "Rights that belong to every human being by nature—not granted by governments, kings, or laws, and not removable by them. Locke identified them as life, liberty, and property."}, {"front": "Explain John Locke's concept of the social contract.", "back": "Governments are formed by an agreement (explicit or implied) among people who consent to be governed in exchange for protection of their rights. If the government violates these rights, the people have the right to replace it."}, {"front": "How did Locke's political philosophy challenge the traditional doctrine of divine right?", "back": "Locke argued that governmental authority comes from the consent of the governed, not directly from God, fundamentally opposing the divine right of kings."}, {"front": "What was Voltaire's primary target, which he called 'l'infâme'?", "back": "Religious intolerance, superstition, and the persecution of those who thought differently."}, {"front": "What practical wisdom did Voltaire convey through his work *Candide*?", "back": "He advocated for practical work and leaving utopian dreams aside, summarized by the phrase, 'We must cultivate our garden.'"}, {"front": "Was Voltaire an atheist? Explain his religious views.", "back": "No, he was a Deist who believed in God as the rational author of the universe. He attacked the corruption and cruelty of the Church, not Christianity itself."}, {"front": "What was Jean-Jacques Rousseau's radical view on civilization?", "back": "He argued that civilization itself was the problem, believing that human beings in their natural state were innocent, free, and good, but society had corrupted them."}, {"front": "What famous opening line from Rousseau's *Social Contract* encapsulates his view on human freedom?", "back": "“Man is born free, and everywhere he is in chains.”"}, {"front": "Define Rousseau's concept of the 'General Will.'", "back": "What the community as a whole truly wants—not the sum of individual desires, but the common good. Rousseau believed just government must express this will."}, {"front": "What is a significant criticism or potential danger of Rousseau's concept of the General Will?", "back": "It can be used to justify overriding individual rights in the name of the community's good, as seen during the French Revolution's Reign of Terror (Robespierre)."}, {"front": "What was Montesquieu's important work on government, and what problem did it aim to solve?", "back": "*The Spirit of the Laws* (1748); it aimed to understand what made some governments free and others tyrannical, concluding that tyranny comes from concentrated power."}, {"front": "Define 'separation of powers' as advocated by Montesquieu.", "back": "The division of government authority into three distinct branches—legislative, executive, and judicial—each with the ability to limit ('check') the others, preventing power concentration."}, {"front": "What major historical document was heavily influenced by Montesquieu's ideas on government?", "back": "The United States Constitution, particularly its system of checks and balances."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
