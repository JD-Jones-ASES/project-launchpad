<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who are the three key Enlightenment writers highlighted for English-speaking students in this section?", "back": "John Locke, Voltaire, and René Descartes."}, {"front": "What is John Locke's most influential work of political philosophy?", "back": "Second Treatise of Government (published in 1689)."}, {"front": "What was the primary purpose of Locke's First Treatise of Government?", "back": "To demolish the divine right of kings by refuting Robert Filmer's argument that kings inherit authority from Adam."}, {"front": "How does Locke describe the 'state of nature' in his Second Treatise of Government?", "back": "It is a philosophical thought experiment asking what rights humans have simply by being human, apart from any law or government, not a historical claim."}, {"front": "What is the 'law of nature' according to Locke, and what is its historical context?", "back": "It is an inherent moral law going back to the Stoics, St. Paul, and Aquinas, which Locke translated from a Christian natural law tradition into a new political vocabulary."}, {"front": "What does Locke mean by the 'state of equality' in the state of nature?", "back": "No person has natural authority over any other; a king has no more natural authority over subjects than a subject has over a king, unless received by consent."}, {"front": "How does government gain legitimate authority, according to Locke's concept of the 'social contract'?", "back": "Through the consent of the governed, who agree to live under common rules for mutual protection, comfortable living, and the secure enjoyment of their properties."}, {"front": "Under what circumstances do the people have the right and duty to replace their government, according to Locke?", "back": "If the government transgresses its fundamental role of protecting natural rights (property) and instead attacks them, thereby breaking the social contract and forfeiting its power."}, {"front": "How did Locke's concept of property as a natural right differ from the feudal system?", "back": "Under feudalism, land was held hierarchically (king owns all land, granting to nobles); Locke argued property is a natural right belonging to the individual that precedes government."}, {"front": "What 1755 event prompted Voltaire to write Candide, and what philosophical idea did he challenge?", "back": "The Lisbon earthquake, which killed 30,000 people. He challenged Gottfried Leibniz's claim that we live in 'the best of all possible worlds.'"}, {"front": "Who is Pangloss in Candide, and what philosophy does he represent?", "back": "Pangloss is Candide's tutor, a caricature of Leibniz, who embodies extreme optimism by constantly insisting that 'all is for the best in this best of all possible worlds,' despite overwhelming catastrophes."}, {"front": "What was Voltaire's main target in Candide's Chapter 6, 'The Auto-da-Fé,' regarding the Lisbon earthquake?", "back": "He targeted human institutions, specifically the Portuguese Inquisition, for torturing and killing people in God's name and rationalizing it as appeasing God to prevent further disasters."}, {"front": "What significant moral contradiction is highlighted in Candide's Chapter 19, 'The Slave in Surinam'?", "back": "The contradiction between Christian teaching of human equality ('all men are children of Adam') and the brutal practice of slavery, used to provide cheap sugar to Europeans."}, {"front": "What is the concluding advice of Candide: 'cultivate our garden'?", "back": "It is a call to practical action and humility; it means abandoning grand, abstract philosophical theories and instead focusing on work and making immediate, local improvements to one's world."}, {"front": "Was Voltaire an orthodox Christian?", "back": "No. While a Deist who believed in God and was baptized, he ferociously attacked the institutional Church, denied Christ's divinity, and defended toleration for all faiths, defying easy categorization."}, {"front": "What is René Descartes' Discourse on Method known for regarding its accessibility?", "back": "It was written in French rather than Latin specifically so that ordinary educated people, not just scholars, could read it, making it highly accessible."}, {"front": "What is Descartes' 'Method of Doubt' as described in Discourse on Method?", "back": "His decision to build his knowledge from scratch by accepting nothing as certain unless it was so clear and distinct to his reason that no doubt was possible, questioning all previously absorbed beliefs."}, {"front": "What philosophical foundation did René Descartes' Discourse on Method establish for the Enlightenment?", "back": "It established the philosophical foundation for systematic rational inquiry, emphasizing individual reason and doubt as a method to arrive at clear and distinct truths, fundamental to Enlightenment thought."}, {"front": "How does Descartes' decision to write in French reflect a broader Enlightenment ideal?", "back": "It reflects the Enlightenment ideal of disseminating knowledge to a wider educated public, promoting reason and individual understanding beyond the exclusive domain of traditional academic institutions."}, {"front": "What political event in England coincided with the publication of Locke's Two Treatises of Government?", "back": "The Glorious Revolution of 1689."}, {"front": "According to Locke, what is the fundamental reason why men enter into society and form governments?", "back": "The preservation of their property, which Locke defines broadly to include their lives, liberties, and estates."}, {"front": "What does 'auto-da-fé' literally mean, and what did it signify in the context of the Portuguese Inquisition after the Lisbon earthquake?", "back": "'Act of faith.' It was a public ceremony where heretics were punished, often by being burned alive, believed by the Inquisition to appease God and prevent further disasters."}, {"front": "How did Voltaire's 'The Slave in Surinam' passage influence later movements?", "back": "It influenced the abolitionist movement by starkly highlighting the moral hypocrisy of Christian nations practicing slavery, providing a powerful argument for human equality later used by figures like Equiano and Wilberforce."}, {"front": "How does Voltaire's 'cultivate our garden' contrast with Pangloss's philosophy?", "back": "Pangloss represents a theoretical, all-encompassing optimism that disregards suffering, while 'cultivate our garden' advocates for a pragmatic, localized approach of active work and improvement in response to life's difficulties."}, {"front": "In Locke's view, what is the implication of 'state of equality' for natural authority?", "back": "It implies that no one is born with natural authority over another; any legitimate authority must be derived from the consent of those being governed."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
