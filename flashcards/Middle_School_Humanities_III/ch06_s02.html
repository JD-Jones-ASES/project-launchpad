<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What common crisis did Karl Marx, Pope Leo XIII, and Fyodor Dostoevsky address in their writings?", "back": "They all responded to the suffering of the poor, the concentration of power, and the question of whether human beings can be made truly free and truly good by rearranging their economic or political circumstances."}, {"front": "What were Karl Marx's primary answers to the crisis of industrial society?", "back": "Marx argued that human beings could be made truly free and good, but only by revolution (written 1848)."}, {"front": "What were Pope Leo XIII's primary answers to the crisis of industrial society?", "back": "Pope Leo XIII stated that human dignity could be protected and workers' rights vindicated, but not by abolishing property or inflaming class hatred (written 1891)."}, {"front": "What deeper question did Fyodor Dostoevsky explore regarding human freedom?", "back": "Dostoevsky asked what it truly means to be free, and whether human beings might fear the weight of their own freedom more than oppression (written 1880)."}, {"front": "What significant document did Karl Marx and Friedrich Engels publish in 1848?", "back": "They published 'The Communist Manifesto', which had an incalculable impact on history."}, {"front": "What famous statement opens Part I of 'The Communist Manifesto'?", "back": "“The history of all hitherto existing society is the history of class struggles.”"}, {"front": "According to Marx, what new ruling class emerged from the Industrial Revolution, and how did it transform society?", "back": "The bourgeoisie emerged, remaking the world in its own image, sweeping away feudal loyalties, national traditions, and religious pieties, reducing all relationships to 'naked self-interest' and 'cash payment'."}, {"front": "What was Marx's proposed solution to the problems of industrial society, as stated in 'The Communist Manifesto'?", "back": "Marx called for a violent revolution, specifically 'the forcible overthrow of all existing social conditions,' culminating in the famous rallying cry: 'Working Men of All Countries, Unite!'"}, {"front": "What historical outcomes are associated with the practical application of Marx's call for 'forcible overthrow'?", "back": "The text notes that in the Soviet Union under Stalin, Communist China under Mao, and Cambodia under Pol Pot, this approach led to mass murder on an incomprehensible scale."}, {"front": "Identify three key reasons why Marx's proposed solution was considered 'catastrophically wrong' by the text.", "back": "His atheism (rejecting natural law and moral checks on power), his materialism (reducing humans to economic units), and his utopianism (believing a perfect society was achievable on earth) led to violence on the scale of his ambitions."}, {"front": "What was the title and year of Pope Leo XIII's encyclical addressing industrial society?", "back": "It was 'Rerum Novarum' ('On the Condition of Labor'), issued on May 15, 1891."}, {"front": "What two major challenges did 'Rerum Novarum' directly respond to?", "back": "It responded both to socialist revolution and to the suffering caused by unrestrained industrial capitalism."}, {"front": "According to 'Rerum Novarum', what is the fundamental dignity of workers, in contrast to their treatment as commodities?", "back": "Workers are not commodities; they are human beings made in God's image, and their wages must allow them to live as human beings, not merely to survive as machines."}, {"front": "Define the concept of a 'just wage' as described in 'Rerum Novarum' and Catholic Social Teaching.", "back": "A 'just wage' is a moral right to a wage sufficient to support oneself and one's family in reasonable dignity. A contracted wage is not automatically just if the worker had no real choice but to accept it, as natural justice sets a floor below which no wage can fall."}, {"front": "How did Pope Leo XIII challenge the capitalist argument that a freely agreed-upon wage is always just?", "back": "He argued that when a starving person 'freely' accepts any wage, their freedom is not real; the agreement is coerced by necessity, meaning it lacks genuine consent."}, {"front": "According to Pope Leo XIII, what two conditions are necessary for 'real freedom'?", "back": "Real freedom requires real alternatives, and real alternatives require a minimum floor of material security."}, {"front": "In what key areas did Pope Leo XIII agree with Karl Marx regarding industrial society?", "back": "Both agreed that workers were being exploited, that the state had a duty to intervene, and both rejected the laissez-faire position that the market alone would solve the problem."}, {"front": "In what key areas did Pope Leo XIII disagree with Karl Marx regarding industrial society?", "back": "Leo XIII rejected the abolition of private property (seeing it as a natural right), class struggle (destroying social harmony), atheism (human dignity from 'imago Dei'), and violent revolution (advocating for reform instead)."}, {"front": "What is the title of the famous chapter by Fyodor Dostoevsky that explores freedom, power, and faith?", "back": "'The Grand Inquisitor,' found in his novel 'The Brothers Karamazov'."}, {"front": "What is the central argument made by the Grand Inquisitor to Christ in Dostoevsky's story?", "back": "The Inquisitor argues that Christ's error was offering human beings freedom, because they are not strong enough to bear its weight and prefer security, bread, and someone to tell them what to do."}, {"front": "According to the Grand Inquisitor, what three temptations did Christ reject in the wilderness, and what did this choice represent?", "back": "Christ rejected bread, worldly power, and a display of miraculous authority, choosing freedom over these things. The Inquisitor believes this was a mistake for humanity."}, {"front": "How does the Grand Inquisitor claim the Church has 'corrected' Christ's work regarding human freedom?", "back": "The Inquisitor states that the Church, for humanity's own good, has taken their freedom from them by providing bread, miracle, and authority, for which people are grateful."}, {"front": "What, according to the Grand Inquisitor, do human beings truly fear more than oppression?", "back": "The Grand Inquisitor suggests that human beings most fear 'the weight of their own freedom'."}, {"front": "What is the significance of the Grand Inquisitor's statement, 'We are not working with Thee, but with him'?", "back": "It reveals that the Church, under the Inquisitor's cynical view, sided with Satan by accepting the worldly power and control Christ rejected, believing it necessary to manage humanity's inability to handle true freedom."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
