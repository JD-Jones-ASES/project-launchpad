<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What common crisis did Karl Marx, Pope Leo XIII, and Fyodor Dostoevsky address in their writings during the height of the industrial age?", "back": "The suffering of the poor, the concentration of power, and the question of whether human beings can be made truly free and good by rearranging economic or political circumstances."}, {"front": "How did Karl Marx, writing in 1848, propose to solve the crisis of the industrial age?", "back": "He answered: Yes – but only by revolution."}, {"front": "How did Pope Leo XIII, writing in 1891, propose to address the crisis of the industrial age?", "back": "He answered: Human dignity can be protected and workers' rights vindicated, but not by abolishing property or inflaming class hatred."}, {"front": "What deeper question did Fyodor Dostoevsky, writing in 1880, raise concerning freedom?", "back": "He asked: What does it actually mean to be free? And could it be that what human beings most fear is not oppression, but the weight of their own freedom?"}, {"front": "What was the historical impact of Karl Marx and Friedrich Engels' *The Communist Manifesto*?", "back": "It shaped revolutions, wars, and the political structure of half the twentieth-century world."}, {"front": "According to Marx in *The Communist Manifesto*, what is the fundamental nature of all hitherto existing society?", "back": "The history of all hitherto existing society is the history of class struggles."}, {"front": "How did Marx describe the impact of the bourgeoisie (ruling class) during the Industrial Revolution?", "back": "The bourgeoisie put an end to feudal ties, leaving 'no other nexus between man and man than naked self-interest, than callous \"cash payment\"' and resolving 'personal worth into exchange value'."}, {"front": "What did Marx's *Communist Manifesto* explicitly advocate regarding existing social conditions?", "back": "The 'forcible overthrow of all existing social conditions,' stating that 'The proletarians have nothing to lose but their chains. They have a world to win. Working Men of All Countries, Unite!'"}, {"front": "What were the historical consequences of Marx's program for the 'forcible overthrow of all existing social conditions' in the 20th century?", "back": "It produced mass murder on an almost incomprehensible scale in Communist regimes like the Soviet Union under Stalin, China under Mao, and Cambodia under Pol Pot."}, {"front": "What three factors are identified as reasons why Marx's proposed solution was 'catastrophically wrong,' despite his accurate diagnosis of suffering?", "back": "His atheism (rejecting natural law), his materialism (reducing human beings to economic units), and his utopianism (believing a perfect society was achievable on earth)."}, {"front": "What is *Rerum Novarum* and when was it issued?", "back": "*Rerum Novarum* ('On the Condition of Labor') is Pope Leo XIII's encyclical issued on May 15, 1891, as the Catholic Church's direct response to both socialist revolution and unrestrained industrial capitalism."}, {"front": "What core principle regarding workers did *Rerum Novarum* establish that challenged prevailing capitalist views?", "back": "Workers are not commodities; they are human beings made in God's image, and any wage insufficient to allow a worker to live in reasonable dignity is unjust."}, {"front": "Define 'just wage' according to Catholic Social Teaching, as presented in *Rerum Novarum*.", "back": "The concept that workers have a moral right to a wage sufficient to support themselves and their families in reasonable dignity, even if a lower wage was 'freely' agreed upon due to necessity."}, {"front": "How did Pope Leo XIII rebut the argument that a worker's 'free agreement' to a wage automatically makes it just?", "back": "He argued that when a starving person 'freely' accepts any wage due to necessity or fear of a worse evil, their freedom is not real, and the agreement is coerced, making the wage potentially unjust."}, {"front": "In what key areas did Pope Leo XIII agree with Karl Marx regarding the problems of the industrial age?", "back": "Both agreed that workers were being exploited, that the state had a duty to intervene, and both rejected the laissez-faire position that the market would solve the problem on its own."}, {"front": "In what key areas did Pope Leo XIII disagree with Karl Marx?", "back": "Leo XIII rejected the abolition of private property, class struggle, atheism (grounding human dignity in *imago Dei*), and violent revolution, advocating for reform instead of destruction."}, {"front": "What is 'The Grand Inquisitor' and where does it appear in Dostoevsky's work?", "back": "'The Grand Inquisitor' is a famous chapter within Fyodor Dostoevsky's novel *The Brothers Karamazov* (1880), told by the atheist brother Ivan to his devout brother Alyosha."}, {"front": "What is the setting of 'The Grand Inquisitor' story?", "back": "Sixteenth-century Seville, during the Spanish Inquisition, where Christ returns to Earth, performs a miracle, and is arrested by the aged, cynical Grand Inquisitor."}, {"front": "What was the Grand Inquisitor's primary criticism of Christ's actions and message?", "back": "Christ's error was offering human beings freedom, which the Inquisitor believed humans are too weak to bear, preferring bread, miracles, and absolute authority to tell them what to do."}, {"front": "According to the Grand Inquisitor, what did Christ refuse in the wilderness that revealed his focus on freedom?", "back": "Christ refused the three temptations: bread (material security), worldly power (empire), and a display of miraculous authority (spectacle), choosing freedom over these comforts."}, {"front": "What 'mystery' does the Grand Inquisitor reveal about the Church's true allegiance in his speech to Christ?", "back": "He claims the Church has been allied with 'him' (Satan) for eight centuries, having taken the gifts (Rome and Caesar's sword) that Christ rejected, to provide humanity with the security and obedience they crave."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
