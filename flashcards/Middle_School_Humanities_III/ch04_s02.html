<html lang="en">
<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did Enlightenment ideas primarily spread across Europe and across the Atlantic?", "back": "Through a remarkable network of books, letters, journals, coffeehouses, and salons."}, {"front": "What was the full title of the Enlightenment's 'Great Project' and who were its primary editors?", "back": "The Encyclopédie, ou Dictionnaire raisonné des sciences, des arts et des métiers ('Encyclopedia, or Reasoned Dictionary of Sciences, Arts, and Crafts'), edited by Denis Diderot and Jean le Rond d'Alembert."}, {"front": "What was the main goal and implicit argument of the Encyclopédie?", "back": "Its goal was to compile, organize, and transmit human knowledge so future generations could build on the past. Implicitly, by treating all fields equally, it argued that no single authority owned the truth."}, {"front": "How did the Encyclopédie's inclusion of articles on practical arts (e.g., clockmaking) make a political statement?", "back": "It suggested that artisans and craftsmen, who work with their hands, deserved the same intellectual respect as philosophers who deal with abstract ideas."}, {"front": "Why did the French government and the Pope ban the Encyclopédie?", "back": "Primarily because its entire project was subversive: it claimed all knowledge could be examined by human reason, challenging tradition, Church authority, and royal decree."}, {"front": "How did Denis Diderot manage to continue publishing the Encyclopédie despite government bans?", "back": "He often hid controversial material under innocent-looking article titles and kept publishing until the books were widely distributed across Europe, making it too late to stop."}, {"front": "Despite what might seem like modest sales by modern standards, why was the Encyclopédie considered highly influential in its time?", "back": "Approximately 20,000 copies sold meant virtually every educated household in France owned one, creating a shared vocabulary of rights, reason, and reform that influenced the French Revolution."}, {"front": "Define a 'salon' in the context of the French Enlightenment.", "back": "A regular gathering in a private home, typically hosted by a wealthy or aristocratic woman, where philosophers, writers, scientists, and political figures discussed ideas, debated controversies, and exchanged information."}, {"front": "What was the significant role of women in the French Enlightenment salons?", "back": "As 'salonnières,' women organized guest lists, managed conversations, and often mediated disputes, creating a crucial space for women to participate in and direct intellectual life despite exclusion from formal institutions."}, {"front": "Who was Marie Thérèse Rodet Geoffrin, and what was her connection to the Encyclopédie?", "back": "A prominent salon hostess whose salon in Paris became the unofficial headquarters of the Encyclopédie project. She provided financial support, mediated quarrels, and used her social connections to protect it, earning the title 'the mother of the Encyclopédie.'"}, {"front": "How did the intellectual outlook of Marie Thérèse Rodet Geoffrin's salon differ from that of the Marquise du Deffand's salon?", "back": "Geoffrin's salon was enthusiastic about progress and reform, while du Deffand's was more skeptical, cooler, and ironic, reflecting a more nuanced view closer to Voltaire."}, {"front": "What institution in England served a similar purpose to the French salon in spreading Enlightenment ideas?", "back": "The coffeehouse."}, {"front": "Why were English coffeehouses sometimes called 'penny universities'?", "back": "They charged a penny for admission and provided not just coffee, but also newspapers, pamphlets, and a public space for people to argue and share news."}, {"front": "In what limited sense were coffeehouses considered a 'democratic institution' during the Enlightenment?", "back": "They allowed people from different social classes (e.g., merchant and earl) to sit together, speak, and be heard as equals, though women were generally not admitted."}, {"front": "What was the 'Republic of Letters,' and how did it function?", "back": "A virtual community and international network of scholars, philosophers, and scientists who corresponded regularly by mail, sharing ideas, debating theories, and forming intellectual friendships across national and religious boundaries."}, {"front": "How crucial was the postal system to the functioning of the Republic of Letters?", "back": "It was the essential, albeit mundane, infrastructure that allowed thinkers across vast distances to sustain a continent-wide conversation in real time, despite its slowness by modern standards."}, {"front": "How did writers in the Republic of Letters cope with government monitoring of the postal system?", "back": "They used strategies like pseudonyms, coded language, trusted private couriers, and publishing controversial manuscripts anonymously or outside France."}, {"front": "Compare the primary purpose of using print in the Protestant Reformation versus the Enlightenment.", "back": "The Reformation used print to debate Scripture and Church authority, leading to religious diversity. The Enlightenment used print to debate reason, government, and human nature, leading to political diversity."}, {"front": "What fundamental principle do both the Protestant Reformation and the Enlightenment movements illustrate regarding the impact of ideas?", "back": "Both illustrate the principle that 'ideas have consequences,' often unforeseen by their original thinkers."}, {"front": "Why is understanding *how* ideas traveled in the eighteenth century considered as important as understanding *what* those ideas were?", "back": "Because 'the means of spreading ideas shapes the ideas themselves,' influencing their interpretation, evolution, and impact."}, {"front": "Name some of the major Enlightenment thinkers who contributed to the Encyclopédie.", "back": "Voltaire, Rousseau, Montesquieu, and d'Alembert were among the dozens of major thinkers who contributed."}, {"front": "How did the Republic of Letters contribute to the ideas that shaped the American Declaration of Independence?", "back": "Enlightenment ideas about rights, reason, and governance circulated for decades through this network (e.g., Jefferson reading Montesquieu, Franklin corresponding with Hume) before being articulated in foundational American documents."}, {"front": "What was the typical travel time for a letter between London and Philadelphia in the 18th century?", "back": "A letter from London to Philadelphia typically took four to six weeks."}, {"front": "What institution was central to the flourishing of the Scottish Enlightenment, which produced thinkers like David Hume and Adam Smith?", "back": "Coffeehouses, particularly in Edinburgh, fostered a vibrant culture of intellectual exchange and debate."}, {"front": "Why is the role of women in the Enlightenment considered both significant and paradoxical by historians?", "back": "Women significantly shaped intellectual culture through salons, yet they were largely excluded from formal institutions, highlighting the Enlightenment's proclaimed equality often not extending to women."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
