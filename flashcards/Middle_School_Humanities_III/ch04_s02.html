<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who are the three major Enlightenment writers highlighted in this section for English-speaking students?", "back": "John Locke, Voltaire, and René Descartes."}, {"front": "What is the primary purpose of John Locke's *Second Treatise of Government*?", "back": "It is a positive account of what government is and ought to be, laying out its foundations and legitimate authority."}, {"front": "How does John Locke define the 'state of nature' in his *Second Treatise of Government*?", "back": "It is a philosophical thought experiment envisioning a world before government, where humans have perfect freedom to order their actions and dispose of their possessions within the bounds of the law of nature."}, {"front": "Was Locke's 'state of nature' a historical claim about a literal time before government existed?", "back": "No, Locke did not intend it as a historical claim, but rather as a philosophical thought experiment to determine inherent human rights."}, {"front": "What is Locke's 'law of nature,' and what philosophical traditions influenced it?", "back": "The 'law of nature' dictates that humans have rights simply by being human. It is not a new concept and is influenced by Stoicism, St. Paul's letter to the Romans, and Aquinas, translating a Christian natural law tradition into a new political vocabulary."}, {"front": "What does Locke mean when he says the state of nature is also a 'state of equality'?", "back": "It means no person has natural authority over any other; authority, such as a king's over subjects, must be received through the consent of those being governed."}, {"front": "According to Locke, how does government legitimately acquire the authority to make and enforce laws?", "back": "Through the consent of the governed. People agree to live under common rules for mutual protection, forming a social contract."}, {"front": "What is the 'social contract' according to John Locke?", "back": "It is an agreement among individuals to join and unite into a community under common rules for their comfortable, safe, and peaceable living, giving up some natural liberty for greater security."}, {"front": "Under what circumstances does Locke argue that the people have the right and the duty to replace their government?", "back": "If the government transgresses its fundamental role of protecting natural rights and instead attacks those rights, it breaches its trust, and the social contract is broken. The people then have the right and duty to provide for themselves by erecting a new legislative."}, {"front": "How did Locke's concept of property as a natural right differ from the feudal system?", "back": "Under feudalism, land was held in a hierarchy with the king owning all land. Locke argued the opposite: property is a natural right belonging to the individual that precedes government, a revolutionary idea for European thinking."}, {"front": "What real-world event primarily inspired Voltaire to write *Candide*?", "back": "The great Lisbon earthquake of 1755, which killed 30,000 people and challenged philosophical optimism."}, {"front": "What philosophical claim did Voltaire's *Candide* specifically aim to refute?", "back": "The philosopher Leibniz's claim that we live in 'the best of all possible worlds'."}, {"front": "Who is Pangloss in *Candide*, and what philosophy does he represent?", "back": "Pangloss is Candide's tutor, a caricature of Leibniz, who continually insists that 'all is for the best in this best of all possible worlds,' regardless of catastrophic events."}, {"front": "What does the 'auto-da-fé' scene in *Candide* primarily criticize?", "back": "It criticizes human institutions, like the Portuguese Inquisition, that torture and kill people in God's name, convincing themselves it makes the world better, rather than truly addressing suffering or divine will."}, {"front": "What specific contradiction does the enslaved man in Surinam highlight in *Candide*?", "back": "He highlights the contradiction between Christian teaching ('all of us children of Adam') and the barbaric practice of slavery by Europeans, influencing the abolitionist movement."}, {"front": "Does Candide's final advice to 'cultivate our garden' mean abandoning the world's problems in defeat?", "back": "No, it's not defeatism. It's a call for practical effort at a local, human scale, rejecting grand, dishonest philosophical systems and advocating for work to make the immediate world better."}, {"front": "What is the deeper meaning behind Candide's concluding statement, 'we must cultivate our garden'?", "back": "It signifies a rejection of useless grand philosophical theories in favor of humble, practical action and work to improve one's immediate circumstances and world, embodying a form of practical wisdom."}, {"front": "How can Voltaire's religious views be characterized?", "back": "He was a Deist who believed in God and was baptized, but he ferociously attacked the institutional Church for cruelty and corruption, denied Christ's divinity, and championed toleration. He defied easy categorization as neither atheist nor orthodox Christian."}, {"front": "Why did René Descartes choose to write *Discourse on Method* in French rather than Latin?", "back": "He wrote it in French specifically so that ordinary educated people, not just scholars, could read and access his philosophical work."}, {"front": "What was Descartes' primary objective in establishing his 'Method of Doubt'?", "back": "His objective was to build his knowledge from scratch, questioning all previously absorbed beliefs and accepting nothing as certain unless it was clear and distinct to his reason."}, {"front": "What was the guiding principle Descartes resolved to follow in his 'Method of Doubt'?", "back": "He resolved to accept nothing as certain unless it was so clear and distinct to his reason that no doubt was possible."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
