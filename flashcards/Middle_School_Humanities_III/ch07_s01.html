<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What contrasting views of World War I did Ernst Jünger and Erich Maria Remarque present in their books published in 1929?", "back": "Jünger described the war as a magnificent, if terrible, test of the human spirit, while Remarque portrayed it as meaningless and destructive, leading to the ruin of a generation."}, {"front": "What important lesson can be learned from Jünger and Remarque's differing conclusions about their shared WWI experience?", "back": "It shows that human beings experience suffering differently and that lived experience does not always speak for itself, highlighting the subjective nature of primary sources and author perspective."}, {"front": "How does the text advise interpreting the contrasting accounts of Jünger and Remarque?", "back": "Both are considered 'honest witnesses' telling the truth of their own experience. The goal is not to declare a winner, but to understand what the difference between their accounts reveals about diverse human responses to the same event."}, {"front": "To what ancient epic is the tension between Jünger's and Remarque's perspectives on war compared?", "back": "Homer's *Iliad*, which also presents war as both glorious and terrible, sometimes in the same breath."}, {"front": "Who was Ernst Jünger and what was the title of his most famous WWI memoir?", "back": "Ernst Jünger (1895–1998) was a German veteran who served four years on the Western Front. His memoir, written from his wartime diaries, is titled *The Storm of Steel* (first published in German in 1920, English translation in 1929)."}, {"front": "What unique aspects did Jünger emphasize in his portrayal of combat, despite acknowledging its horrors?", "back": "He described the exhilaration, pride, intense aliveness that danger brings, and the strong bond between soldiers, experiencing these as genuine parts of his combat experience."}, {"front": "What high German military honor did Ernst Jünger receive during WWI?", "back": "He received the Pour le Mérite, Germany's highest military honor."}, {"front": "Describe Jünger's concept of 'clean fear' as experienced during a night raid.", "back": "He felt a 'cold clarity' where fear 'sharpened rather than paralyzed,' making him feel 'more fully alive,' as if the 'fog of daily life had burned away.'"}, {"front": "According to Jünger in *The Storm of Steel*, how is 'love for the dead' best expressed in battle?", "back": "He believed it's best expressed 'not in tears but in endurance,' arguing that soldiers must continue fighting to honor their fallen comrades, rather than stopping to grieve."}, {"front": "What was Ernst Jünger's political position regarding the Nazi party?", "back": "He was not a Nazi, declined invitations to join the party, and publicly ignored Hitler, despite his own celebration of war and nationalism."}, {"front": "Who was Erich Maria Remarque and what was his most famous novel?", "back": "Erich Maria Remarque (1898–1970) was a German veteran. His most famous novel is *All Quiet on the Western Front*, published in German in 1928 and English in 1929."}, {"front": "What was the central theme of Remarque's *All Quiet on the Western Front*?", "back": "The novel portrays how the war destroys a generation of young men, stripping them of idealism, youth, and the capacity to feel at home anywhere, rather than through dramatic heroic deaths."}, {"front": "How did the Nazi government react to *All Quiet on the Western Front*?", "back": "The Nazi government burned his books in 1933 and revoked his German citizenship due to the novel's anti-war politics and unsparing portrayal of the war's destruction."}, {"front": "Explain the devastating meaning of Paul Bäumer's quote: 'We believe in such things no longer. We believe in the war.'", "back": "This means the war has become the only reality Paul can trust. Everything else—progress, purpose, the future—has been revealed as an illusion, leaving only the war as a constant."}, {"front": "How does Paul Bäumer's experience of combat, as described in *All Quiet on the Western Front*, differ from Jünger's sense of 'aliveness'?", "back": "Paul describes being 'overwhelmed by this wave' of ferocity, fear, and madness, turning him into a 'thug' and 'murderer' acting instinctively for survival, rather than finding meaning or personal affirmation in the danger."}, {"front": "Who was Wilfred Owen and what was his fate during WWI?", "back": "Wilfred Owen (1893–1918) was a British officer-poet who served on the Western Front. He was killed by machine-gun fire on November 4, 1918, just one week before the Armistice."}, {"front": "What was the overarching theme or concept in Wilfred Owen's poetry about WWI?", "back": "His work is known for expressing 'The Pity of War,' highlighting the profound suffering, horror, and tragedy of the conflict."}, {"front": "Compare Jünger's and Remarque's ultimate interpretations of what the war meant for their generation.", "back": "For Jünger, the war was an affirmation of his identity, a test that revealed 'what I was.' For Remarque's Paul Bäumer, the war had replaced everything he might have been, destroying his youth and prospects, leaving a generation 'cut off from activity, from striving, from progress.'"}, {"front": "How do monuments, memorials, and official histories of war often align with either Jünger's or Remarque's mode of remembrance?", "back": "They tend to align with Jünger's mode, emphasizing heroism, sacrifice, and endurance, often leaving out the profound suffering, meaninglessness, and destruction portrayed by Remarque."}, {"front": "Why does the text state that 'A complete account needs both' Jünger's and Remarque's perspectives on war?", "back": "A complete understanding requires acknowledging both the heroism, sacrifice, and endurance (Jünger's truth) and the devastating loss, suffering, and destruction of a generation (Remarque's truth), as both are authentic aspects of human experience in conflict."}, {"front": "What literary element do both Jünger and Remarque effectively use to convey the immediacy of their war experiences?", "back": "Both use first-person narrative (Jünger's memoir based on diaries, Remarque's novel through Paul Bäumer) to provide an intimate and personal account of their respective truths."}, {"front": "How does Paul Bäumer's response to loss differ fundamentally from Jünger's emphasis on 'endurance'?", "back": "Jünger processes loss through active endurance, believing continuing the fight honors the dead. Paul Bäumer, however, has reached a point of despair, having 'stopped enduring' and retreated internally because the psychological cost of enduring became too overwhelming."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
