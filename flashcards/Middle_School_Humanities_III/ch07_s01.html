<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What event triggered the start of World War I?", "back": "The assassination of Archduke Franz Ferdinand, heir to the Austro-Hungarian throne, and his wife Sophie on June 28, 1914, in Sarajevo."}, {"front": "Who was Gavrilo Princip?", "back": "A nineteen-year-old Bosnian nationalist who assassinated Archduke Franz Ferdinand and his wife, an act that sparked World War I."}, {"front": "Define the 'alliance system' as it existed in Europe prior to World War I.", "back": "A network of treaties where countries promised to defend one another if attacked. It converted a regional crisis into a world war."}, {"front": "Name the two main alliance blocs in Europe in 1914 and their member countries.", "back": "The Triple Alliance (Germany, Austria-Hungary, Italy) and the Triple Entente (France, Russia, Britain)."}, {"front": "Explain how the assassination of Franz Ferdinand led to a full-scale European war within six weeks.", "back": "Austria-Hungary declared war on Serbia. Russia mobilized to defend Serbia. Germany declared war on Russia and France. Britain declared war on Germany after its invasion of neutral Belgium."}, {"front": "Why did the alliance system, designed to deter war, fail in 1914?", "back": "Military timetables moved faster than diplomacy, mobilization orders were irreversible, and national leaders underestimated the destructiveness of modern industrial war."}, {"front": "What was the initial expectation regarding the duration of the war in August 1914, and what was the reality?", "back": "Most soldiers expected the war to be over by Christmas, but it lasted for four years and three months."}, {"front": "Describe Germany's initial war strategy for the Western Front.", "back": "The Schlieffen Plan, which called for a rapid six-week knockout of France through Belgium, then a turn east to face Russia."}, {"front": "What was the outcome of the Schlieffen Plan?", "back": "It nearly worked, bringing German armies close to Paris, but was halted by French and British forces at the First Battle of the Marne in September 1914."}, {"front": "Define 'trench warfare' and describe the key features of the Western Front's trench systems.", "back": "A style of warfare where opposing armies dug parallel systems of trenches (front-line, support, reserve) and defended them against frontal assault. 'No Man's Land' lay between the lines."}, {"front": "Why did trench warfare strongly favor defense over offense on the Western Front?", "back": "Industrial revolution weapons like machine guns, barbed wire, and heavy artillery could destroy attacking infantry far faster than they could advance across 'No Man's Land'."}, {"front": "What was the significance of the Battle of the Somme (1916)?", "back": "A massive British offensive that resulted in approximately 57,000 British casualties on the first day alone, and over a million men killed or wounded by its end, with minimal territorial gains."}, {"front": "What was the German objective at the Battle of Verdun (1916), and what did the battle become a symbol of?", "back": "To 'bleed France white' by attacking a symbolically important fortress town. It became a symbol of the war's senseless consumption of human life, with 700,000 casualties."}, {"front": "How did the Eastern Front differ from the Western Front during WWI?", "back": "The Eastern Front was much longer and more fluid, with enormous movements of territory and tremendous casualties, but it never completely stalemated like the Western Front."}, {"front": "What was the objective and outcome of the Gallipoli Campaign (1915-1916)?", "back": "An Allied attempt to knock the Ottoman Empire out of the war by capturing Constantinople. It was a catastrophe, resulting in nearly half a million casualties and a complete Allied failure."}, {"front": "What two decisive events transformed the war in 1917?", "back": "The entry of the United States into the war and the collapse of Russia."}, {"front": "What were the primary reasons for the United States entering World War I in April 1917?", "back": "Unrestricted German submarine warfare (including the sinking of the Lusitania) and German attempts to encourage Mexico to attack the U.S. (Zimmermann Telegram)."}, {"front": "What was the impact of the U.S. entry on the Allied war effort?", "back": "American troops provided fresh manpower and renewed Allied morale, especially in 1918 when Germany launched its last desperate offensives."}, {"front": "How did Russia's involvement in WWI end?", "back": "The Tsarist government collapsed in February 1917, and after the Bolsheviks seized power in October 1917, Russia negotiated peace with Germany and left the war in March 1918."}, {"front": "When did World War I officially end with an armistice on the Western Front?", "back": "At 11:00 AM on November 11, 1918."}, {"front": "Define 'Armistice' in the context of WWI.", "back": "A formal agreement to stop fighting, pending a peace treaty. The Armistice of November 11, 1918, ended the killing on the Western Front."}, {"front": "What was the approximate human cost of World War I?", "back": "Approximately 17 million dead and another 20 million wounded."}, {"front": "What were President Woodrow Wilson's 'Fourteen Points'?", "back": "His proposal for the peace settlement, advocating for open diplomacy, freedom of the seas, arms reduction, national self-determination, and a League of Nations."}, {"front": "How did European realpolitik differ from Wilson's idealism in the peace negotiations?", "back": "France demanded a peace that would permanently cripple Germany, and Britain sought to preserve its empire, while Wilson envisioned a more generous peace based on self-determination and collective security."}, {"front": "What was the name of the peace treaty that officially ended World War I?", "back": "The Treaty of Versailles, signed on June 28, 1919."}, {"front": "What was the 'war guilt clause' (Article 231) of the Treaty of Versailles?", "back": "A provision that forced Germany and its allies to accept full responsibility for causing all the loss and damage of the war."}, {"front": "List three key provisions of the Treaty of Versailles imposed on Germany.", "back": "The war guilt clause (Article 231), massive reparations payments, loss of German territory (e.g., Alsace-Lorraine, 'Polish Corridor'), and severe limits on its military."}, {"front": "How was Germany involved in the negotiation of the Treaty of Versailles?", "back": "Germany was not invited to negotiate; the treaty was presented as a 'diktat,' meaning a dictated peace."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
