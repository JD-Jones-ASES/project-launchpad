<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities III &mdash; Chapter 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the Defenestration of Prague (1618)?", "back": "Protestant Bohemian nobles threw three Catholic royal officials from a castle window in Prague, triggering the Thirty Years' War. 'Defenestration' comes from the Latin for 'window' (fenestra). The officials survived; the war they started killed millions.", "id": "fc01"}, {"front": "Why is the Thirty Years' War called both 'the last of the religious wars' and 'the first of the modern wars'?", "back": "It began as a conflict over religion (Catholics vs. Protestants) but ended as a struggle for political power, with Catholic France funding Protestant armies against Catholic Austria. When raison d'etat trumped confession, the war changed character.", "id": "fc02"}, {"front": "What were the four phases of the Thirty Years' War?", "back": "Bohemian Phase (1618-1625): Protestant revolt crushed at White Mountain. Danish Phase (1625-1629): Christian IV defeated; Edict of Restitution. Swedish Phase (1630-1635): Gustavus Adolphus won victories but died at Lutzen. French Phase (1635-1648): Catholic France fought Catholic Habsburgs for raison d'etat.", "id": "fc03"}, {"front": "Who was Gustavus Adolphus?", "back": "King of Sweden called the 'Lion of the North' who reorganized the Swedish army with new tactics (faster artillery, disciplined infantry, mobile cavalry) and drove deep into Germany. He won major victories but was killed at the Battle of Lutzen (1632).", "id": "fc04"}, {"front": "What was Cardinal Richelieu's role in the Thirty Years' War?", "back": "As chief minister of Catholic France, he first secretly funded Protestant armies, then declared war openly on the Catholic Habsburgs - not for religion but for raison d'etat (France's political interest in weakening a rival). This shocked contemporaries and ended the era of purely religious warfare.", "id": "fc05"}, {"front": "What is raison d'etat?", "back": "French for 'reason of state.' The idea that a government may take actions, even morally questionable ones, if they serve the nation's political interests. Associated with Machiavelli and Richelieu; still influential and controversial in political thought today.", "id": "fc06"}, {"front": "What was the human cost of the Thirty Years' War for Germany?", "back": "Germany lost between a quarter and a third of its entire population - mostly not to battle but to starvation and disease caused by marauding armies. Some regions lost more than half their people. The city of Magdeburg was burned and approximately 20,000 civilians killed in 1631. It took Germany a century to recover.", "id": "fc07"}, {"front": "What was the Sack of Magdeburg (1631)?", "back": "When Imperial troops stormed the Protestant city, killing approximately 20,000 civilians and burning it to the ground. Historians call it the worst atrocity of the entire Thirty Years' War. Described by Schiller in his History of the Thirty Years' War.", "id": "fc08"}, {"front": "What was the Peace of Westphalia (1648)?", "back": "The peace settlement negotiated in Osnabruck and Munster ending the Thirty Years' War. It created the framework within which modern nations still operate: state sovereignty, equality of sovereign states in international law, and non-interference in other states' affairs.", "id": "fc09"}, {"front": "What are the three principles established by the Peace of Westphalia?", "back": "1) State sovereignty: each ruler has supreme authority in his territory. 2) Equality of sovereign states: all recognized states are equal in international law regardless of size. 3) Non-interference: no state may interfere in another's internal affairs.", "id": "fc10"}, {"front": "What is sovereignty?", "back": "The supreme authority of a government over its own territory and people, free from outside control. Established as the central principle of international relations by the Peace of Westphalia: each state governs its own affairs, and no pope or emperor can override it.", "id": "fc11"}, {"front": "How did the Peace of Westphalia change the nature of wars?", "back": "Before 1648, wars were often fought to impose a universal religious or political order. After 1648, wars were fought between sovereign states pursuing national interests. This is a crucial shift in how human beings organize political life.", "id": "fc12"}, {"front": "Who was Hugo Grotius and what did he contribute?", "back": "A Dutch legal scholar (1583-1645) who argued in The Rights of War and Peace (1625) that nations, like individuals, are subject to natural law. Even in war, certain things are forbidden: killing civilians, breaking treaties, using treachery. He is called the 'father of international law.'", "id": "fc13"}, {"front": "What is international law?", "back": "A body of rules governing relations between nations. Unlike domestic law, it depends on the consent of nations and international pressure. Hugo Grotius established the first systematic argument that nations are subject to a higher moral law - rooted in Christian natural law tradition.", "id": "fc14"}, {"front": "How did Grotius's argument extend the Christian natural law tradition?", "back": "He drew on Roman law, Aquinas's natural law tradition, and Scripture to argue that a rational moral order binds all humanity. This law applies to all nations - Christian and non-Christian alike - because it flows from our nature as rational, social creatures.", "id": "fc15"}, {"front": "Who was Louis XIV and how long did he reign?", "back": "Louis XIV (1638-1715) became king of France at age four and ruled for 72 years - the longest reign of any major European monarch. He embodied absolute monarchy and is credited with the phrase 'L'Etat, c'est moi' ('The state, it is I').", "id": "fc16"}, {"front": "What was absolute monarchy?", "back": "A system of government in which the monarch holds supreme, unrestricted power, not bound by a constitution or Parliament. Louis XIV is the classic example: he controlled the army, courts, church, and economy with no institution able to check his authority.", "id": "fc17"}, {"front": "What was Versailles and how did Louis XIV use it?", "back": "A spectacular palace outside Paris to which Louis XIV brought the French nobility. By requiring nobles to live at court, he weakened them politically (they couldn't build independent power bases in their regions) and could watch and control them.", "id": "fc18"}, {"front": "Who were the Huguenots and what happened to them in 1685?", "back": "French Protestants, mostly Calvinist, who had religious freedom under the Edict of Nantes (1598). When Louis XIV revoked the Edict in 1685, 200,000-400,000 Huguenots fled France, taking their skills to England, the Dutch Republic, Prussia, and South Africa.", "id": "fc19"}, {"front": "What was the Edict of Nantes (1598) and when was it revoked?", "back": "An edict granting French Protestants (Huguenots) freedom of worship and political protections. Issued by Henry IV in 1598 after the French religious wars. Revoked by Louis XIV in 1685, triggering the Huguenot diaspora.", "id": "fc20"}, {"front": "Who was Friedrich Schiller and what did he write about the Thirty Years' War?", "back": "A German writer (1759-1805), one of Germany's greatest, who wrote a History of the Thirty Years' War in the 1790s. His account of the Sack of Magdeburg preserved moral memory of the war's costs without propaganda.", "id": "fc21"}, {"front": "What two questions do Grotius and Schiller both address?", "back": "How do human beings, capable of such destruction, build rules and institutions that limit it? Grotius answers: through natural law. Schiller answers: through honest memory of what war costs.", "id": "fc22"}, {"front": "What was the Edict of Restitution (1629)?", "back": "Issued by the Holy Roman Emperor after defeating Denmark, it demanded Protestants return all Catholic church property seized since 1552. It appeared to signal a total Catholic victory - but it provoked the Swedish intervention that turned the tide.", "id": "fc23"}, {"front": "How does the text characterize the Thirty Years' War's relationship to Christianity?", "back": "The war was fought largely in the name of Christianity, by men who believed they were serving God - yet it killed millions and laid waste to Germany. The results call into serious question the use of religious motivation as a basis for politics.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
