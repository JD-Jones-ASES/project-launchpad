<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What major transformations occurred between 1800 and 1870 that indicated a \"new world\"?", "back": "Rapid advancements in communication (telegraph) and transportation (railroad) significantly reduced travel and message times, fundamentally altering the conditions of human life."}, {"front": "Why is understanding the \"machinery of the industrial age\" crucial for historical analysis?", "back": "It provides essential context for understanding major political and social developments like the encyclical Rerum Novarum and the outbreak of World War I, as these technologies fundamentally altered how societies functioned."}, {"front": "Define \"railroad\" in the context of the mid-19th century.", "back": "A system of iron (later steel) tracks on which steam-powered locomotives pulled carriages or freight cars. It was the defining technology of the mid-nineteenth century, slashing travel times and integrating national economies."}, {"front": "What was the first commercial steam railway, and when did it open?", "back": "The Stockton and Darlington Railway in northeastern England, which opened in 1825."}, {"front": "List two major economic impacts of the railroad on 19th-century Europe.", "back": "It allowed perishable goods (like fish and fresh vegetables) to reach urban markets before spoiling, and enabled efficient transport of raw materials and manufactured goods between cities, integrating national economies."}, {"front": "How did the railroad transform warfare in the 19th century?", "back": "It enabled armies to mobilize and transport troops in days instead of months, requiring more pre-planning and potentially escalating conflicts faster, playing a fateful role in the outbreak of World War I."}, {"front": "Compare the impact of the railroad on land travel to that of the sailing ship on sea travel.", "back": "Both technologies allowed for goods, people, and armies to move across vast distances faster and cheaper than ever before, revolutionizing trade, communication, and military logistics."}, {"front": "How did Victorian railroad networks resemble Roman road networks, and what was a key difference in scale?", "back": "Both served as systems of imperial communication and control, moving troops, goods, and governors. The key difference was scale: Rome's network was ~50,000 miles, while the world's railroad network by 1914 was over 700,000 miles."}, {"front": "Who sent the first long-distance telegraph message and in what year?", "back": "Samuel Morse sent the first long-distance telegraph message in 1844, from Washington to Baltimore."}, {"front": "Define \"telegraph\" and state its historical significance.", "back": "An electrical communication system that transmits coded signals over wires. Developed in the 1830s-1840s, it was the first technology in human history to transmit information faster than a human could travel, fundamentally separating information from physical transport."}, {"front": "What major impact did the transatlantic cable (1866) have on global communication and markets?", "back": "It reduced message transmission between Britain and North America from weeks to minutes, allowing financial markets in London and New York to react simultaneously and governments to direct operations in real time."}, {"front": "When did the Suez Canal open, and what did it connect?", "back": "The Suez Canal opened in 1869, connecting the Mediterranean Sea to the Red Sea through the Isthmus of Suez in Egypt."}, {"front": "What was the primary benefit of the Suez Canal for European powers, particularly Britain?", "back": "It drastically shortened sea routes (e.g., London to Bombay from six months to three weeks), providing immense strategic and commercial value, especially for the British Empire's control over India and East Africa."}, {"front": "How does the Suez Canal exemplify the relationship between 19th-century technology and European empire?", "back": "It was a major engineering feat built in a non-European country using non-European labor, operated primarily for European benefit, and became a strategic military and economic asset for European empires, demonstrating the non-neutral relationship between technology and empire."}, {"front": "What development in the 1840s enabled Europeans to penetrate the interior of Africa more effectively?", "back": "The development of quinine treatment for malaria, which significantly reduced European mortality rates from tropical diseases."}, {"front": "What was the Berlin Conference (1884-85), and what principle did it establish?", "back": "A conference convened by German Chancellor Bismarck where European powers established rules for the colonial division of Africa. It formalized the principle that European claims to African territory would be recognized only if backed by \"effective occupation.\" No African leaders were invited."}, {"front": "List three major motivations behind the \"Scramble for Africa.\"", "back": "Desire for raw materials (rubber, copper, diamonds), new markets for manufactured goods, strategic naval bases, nationalist prestige, and the widespread ideology of European civilizational superiority (the \"civilizing mission\")."}, {"front": "What was the fate of most of Africa by 1914, and which two nations remained independent?", "back": "By 1914, almost the entire continent was carved up and controlled by European powers; only Ethiopia and Liberia remained independent."}, {"front": "Describe one example of the brutality associated with European colonial rule in Africa mentioned in the text.", "back": "In the Belgian Congo, ruled as the personal property of King Leopold II, workers who failed to meet rubber quotas faced systematic atrocities, including having their hands cut off."}, {"front": "How does the \"Scramble for Africa\" compare to the Spanish conquest of the Americas, according to the text?", "back": "Both are cases where European military and technological superiority was used to dispossess non-European peoples, and where Christian missionaries were both complicit in and critical of the conquest."}, {"front": "When did German unification occur, and under whose leadership?", "back": "German unification occurred in 1871, primarily under the leadership of Prussian Chancellor Otto von Bismarck and King (later Kaiser) Wilhelm I."}, {"front": "Define \"German unification\" as a political process.", "back": "The political process by which the German states were united into a single nation-state, the German Empire, in 1871. This event, led by Prussia, transformed Europe's balance of power due to Germany's powerful military and industrial economy."}, {"front": "How did German unification (1871) fundamentally alter the European balance of power?", "back": "It shattered the balance established by the Congress of Vienna (1815) by creating a new dominant power on the continent—a unified German state with the largest industrial economy and most efficient army, forcing other European powers to adjust."}, {"front": "What role did Otto von Bismarck play in German foreign policy after unification, and what was his primary goal?", "back": "Bismarck constructed an elaborate network of alliances designed to keep France isolated and preserve peace, aiming to stabilize the new European balance of power after Germany's emergence."}, {"front": "What event led to the unraveling of Bismarck's carefully constructed alliance system?", "back": "His dismissal by the young and impulsive Kaiser Wilhelm II in 1890, which eventually led to Europe dividing into two armed camps by 1907."}, {"front": "By 1907, what two major alliance systems had emerged in Europe, setting the stage for WWI?", "back": "The Triple Alliance (Germany, Austria-Hungary, Italy) and the Triple Entente (France, Russia, Britain)."}, {"front": "The text mentions a comparison between German unification's impact on the balance of power and an earlier historical event. What is it, and what principle did both relate to?", "back": "It compares to the Peace of Westphalia (Unit 3), as both established or significantly altered the balance of power as a governing principle in European international relations."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
