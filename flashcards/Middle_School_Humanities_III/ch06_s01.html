<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities III &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did daily life in Europe transform between 1800 and 1900?", "back": "In 1800, most people farmed small plots, worked by hand, heated with wood, and traveled by horse. By 1900, steam-driven factories employed thousands, railroads crossed continents, telegraphs sent messages globally, and cities housed millions.", "id": "fc01"}, {"front": "Define the Industrial Revolution.", "back": "The transformation of European and North American economies from agriculture and hand-production to machine manufacturing and factory labor, beginning in Britain around 1760–1780 and spreading across Europe through the nineteenth century.", "id": "fc02"}, {"front": "List key factors that led the Industrial Revolution to begin in Britain.", "back": "Britain had abundant coal and iron, rivers for power, a stable legal system protecting private property, a Parliament favoring commerce, and an empire providing raw materials and markets.", "id": "fc03"}, {"front": "What were some significant early inventions of the Industrial Revolution?", "back": "The spinning jenny (1764), the steam engine (1769), and the power loom.", "id": "fc04"}, {"front": "Describe the distribution of wealth and the 'new kind of poverty' that emerged with industrialization.", "back": "Factory owners grew spectacularly rich, while workers experienced a systematic, year-round poverty unlike traditional hardship, bound to the rhythms of the machine.", "id": "fc05"}, {"front": "What were the typical working conditions for industrial factory workers, including women and children?", "back": "Twelve to sixteen hours a day, six days a week, in unventilated, noisy buildings with dangerous moving machinery. Children as young as five worked in mines with no education.", "id": "fc06"}, {"front": "Describe the living conditions in the urban slums that developed during the Industrial Revolution.", "back": "Workers lived packed into slums without clean water, sanitation, or fresh air, leading to repeated cholera epidemics caused by sewage-contaminated water.", "id": "fc07"}, {"front": "What was the 'social question' that dominated European political thought from the 1840s through the early twentieth century?", "back": "The debate over what a just society owes to its workers, whether the market alone can solve poverty, and if the state has an obligation to intervene.", "id": "fc08"}, {"front": "How did Charles Dickens' novels contribute to understanding the human cost of industrialization?", "back": "Novels like *Oliver Twist* (workhouses) and *Hard Times* (dehumanizing factory towns where workers were 'Hands') documented the suffering and injustice, acting as 'journalism in the form of fiction.'", "id": "fc09"}, {"front": "Who authored *The Communist Manifesto* and in what year was it published?", "back": "Karl Marx, with Friedrich Engels, published it in February 1848.", "id": "fc10"}, {"front": "According to Marx, what is the central concept of 'class struggle' and what historical trajectory did he propose for it?", "back": "Class struggle is the ongoing conflict between those who own the means of production (bourgeoisie) and those who sell their labor (proletariat). Marx believed it was the engine of history, leading to a proletarian revolution.", "id": "fc11"}, {"front": "In Marxist analysis, distinguish between the 'bourgeoisie' and the 'proletariat.'", "back": "The bourgeoisie are the property-owning capitalist class who own factories, land, and capital. The proletariat are the working class who own no property and must sell their labor to survive.", "id": "fc12"}, {"front": "What was Marx's prescribed remedy for the capitalist system and how did he believe it would be achieved?", "back": "The revolutionary overthrow of the bourgeoisie, the abolition of private property, and the establishment of a classless Communist society. He believed this could not be achieved peacefully.", "id": "fc13"}, {"front": "According to the provided text, what did Marx accurately diagnose about industrial injustice, and what was the flaw in his proposed solution?", "back": "Marx honestly described real suffering like child labor and starvation wages under early industrial capitalism. His error was proposing a purely material solution (abolition of private property) to a spiritual problem of human greed, failing to account for state power abuse.", "id": "fc14"}, {"front": "What were some of the key causes of the Revolutions of 1848 across Europe?", "back": "A bad harvest in 1847, urban poverty, frustrated nationalism, and a growing middle class demanding constitutional government.", "id": "fc15"}, {"front": "What was the general outcome of the 1848 Revolutions, and what lesson did European radicals draw from them?", "back": "Most revolutions, led by liberal middle-class reformers, were suppressed by conservative governments within two years. Radicals learned that spontaneous uprisings were insufficient, and organized, disciplined revolutionary movements were needed.", "id": "fc16"}, {"front": "What is *Rerum Novarum*, when was it issued, and what was its central purpose?", "back": "*Rerum Novarum* ('On the Condition of Labor') is an encyclical (official teaching letter) issued by Pope Leo XIII in 1891. It addressed the exploitation of workers under industrial capitalism, serving as the founding document of Catholic Social Teaching.", "id": "fc17"}, {"front": "How did *Rerum Novarum* agree with Marx, and where did it fundamentally diverge on the question of private property?", "back": "It agreed that industrial workers were unjustly exploited. However, it rejected socialism's abolition of private property, arguing that private property is a natural right rooted in human nature, which the state cannot violate.", "id": "fc18"}, {"front": "Define 'laissez-faire' and explain why *Rerum Novarum* rejected this economic philosophy.", "back": "Laissez-faire is an economic philosophy advocating no government interference in free markets. *Rerum Novarum* rejected it because it left workers unprotected from exploitation, arguing that wages cannot be determined without moral limits as workers are human beings, not commodities.", "id": "fc19"}, {"front": "What is 'imago Dei' and how is it central to *Rerum Novarum*'s argument for workers' rights?", "back": "'Imago Dei' (Latin: 'image of God') is the Christian teaching that every human possesses inherent dignity because they are made in God's image. *Rerum Novarum* grounds its entire argument for workers' rights, including a living wage and protection, in this principle.", "id": "fc20"}, {"front": "According to *Rerum Novarum*, what positive duties does the state have regarding workers' rights and conditions?", "back": "The state has a positive duty to protect workers by setting limits on working hours, prohibiting child labor, ensuring living wages, and safeguarding the right to form unions.", "id": "fc21"}, {"front": "What is Catholic Social Teaching, and what are some of its central principles?", "back": "It's the body of official Church teaching on social, economic, and political questions, starting with *Rerum Novarum*. Principles include human dignity (*imago Dei*), the common good, the right to private property, the option for the poor, and subsidiarity.", "id": "fc22"}, {"front": "How does Catholic Social Teaching offer a 'third way' between unrestrained capitalism and socialism?", "back": "It rejects laissez-faire capitalism for its exploitation and socialism for its abolition of private property and state overreach, proposing a moral framework rooted in human dignity and natural law to reform society without revolution.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
