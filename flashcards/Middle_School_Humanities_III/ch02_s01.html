<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What made the Spanish Empire unique in world history at its height?", "back": "It was the first empire to genuinely span the entire globe, connecting distant territories like the Philippines, Mexico City, and the Andes."}, {"front": "What was the primary economic 'engine' driving the Spanish Empire?", "back": "Silver, primarily extracted from vast deposits in the viceroyalties of New Spain (Mexico and Central America) and Peru (South America)."}, {"front": "Where was Cerro Rico, the 'Rich Mountain,' located, and what was its significance?", "back": "It was in present-day Bolivia and contained the largest silver deposit ever discovered, leading to the rapid growth of the city of Potosí, which became larger than London at the time."}, {"front": "Define the mita system as it was adapted by the Spanish Empire.", "back": "The mita was a colonial labor system, adapted from an Inca institution, that required every indigenous village in a region to send a quota of male workers to mines, construction, or agriculture for a fixed period each year. In practice, it was a death sentence due to brutal conditions."}, {"front": "Describe the working conditions for laborers in the Potosí silver mines under the mita system.", "back": "Workers faced deadly conditions, including descending hundreds of feet underground, breathing air thick with silver dust and lethal mercury vapor (used in refining). This led to tremors, madness, organ failure, and an estimated eight million deaths over the colonial period."}, {"front": "What was the 'price revolution' that swept through Europe during the 16th and early 17th centuries?", "back": "It was a dramatic rise in prices caused by the flood of New World silver. As silver supply outpaced goods, its purchasing power fell, requiring more silver to buy the same items and causing widespread inflation and social unrest."}, {"front": "Why did the Spanish Empire, despite its immense silver wealth, repeatedly go bankrupt?", "back": "Several reasons: 1) Silver flowed through Spain to pay for imported finished goods, hindering domestic manufacturing. 2) The high cost of Spain's continuous wars (e.g., Dutch Revolt) consumed vast amounts of silver. 3) The 'price revolution' devalued silver, making Spain poorer rather than richer."}, {"front": "Explain the paradox of Spain's economic situation during the height of its empire regarding its silver wealth.", "back": "Spain possessed more silver than any previous nation but repeatedly went bankrupt. This illustrates that raw wealth (bullion extraction) does not equate to economic strength if it's consumed by wars and imports rather than used to build a durable manufacturing or trade base."}, {"front": "What was the Manila Galleon trade route, and what did it primarily transport?", "back": "It was an annual Spanish trading vessel route between Acapulco (Mexico) and Manila (Philippines). It primarily transported New World silver westward across the Pacific in exchange for Chinese luxury goods like silk, porcelain, and spices."}, {"front": "How did the Manila Galleon trade illustrate the interconnectedness of global economies?", "back": "It created one of the longest-running trade routes in history, directly connecting the economies of the Americas, Europe (via Spain), and East Asia (China) into a single global system for the first time, with Potosí silver ultimately financing the Qing dynasty."}, {"front": "Define the Columbian Exchange.", "back": "Named by historian Alfred Crosby, it was the transfer of plants, animals, diseases, and people between the Americas and the rest of the world following Columbus's voyages in 1492, profoundly transforming diets, populations, and environments globally."}, {"front": "Name three significant plants that traveled from the Americas to the Old World as part of the Columbian Exchange and their impact.", "back": "The potato (enabled population growth in Ireland/northern Europe), the tomato (defined Italian cuisine), corn/maize (became a staple in Africa), cacao, tobacco, and sweet potato. These were caloric staples that fed millions."}, {"front": "What was the most devastating 'import' from the Old World to the Americas during the Columbian Exchange, and why?", "back": "Diseases like smallpox, measles, influenza, and typhus were deadliest. Indigenous peoples had no prior exposure or immune resistance, leading to a demographic catastrophe with estimated population declines of 50-90% in many regions within a century."}, {"front": "The Columbian Exchange is considered a case study in what key historical concept?", "back": "Unintended consequences. The transfers were not deliberately designed but resulted from biological systems isolated for millennia coming into contact, leading to massive, unforeseen good and catastrophic results, larger than any individual human decision."}, {"front": "Describe the basic hierarchy of the casta system in colonial Spanish America.", "back": "It was a rigid racial classification hierarchy: peninsulares (Spanish-born) at the top, followed by criollos (Spanish descent born in Americas), then mestizos (mixed Spanish and indigenous), indigenous peoples, and enslaved Africans/descendants at the bottom."}, {"front": "What was the difference between 'peninsulares' and 'criollos' in the casta system?", "back": "Peninsulares were people born in Spain and held the highest offices, while criollos were of full Spanish descent but born in the Americas. Criollos were considered socially inferior and largely barred from the highest political posts, despite their shared ancestry."}, {"front": "What was the main purpose of the casta system for Spanish colonial rule?", "back": "It was designed to maintain Spanish colonial control by creating divisions among different racial groups, assigning varying social status, legal rights, and economic obligations. This made collective resistance against the colonial order more difficult."}, {"front": "How did the Spanish Empire's approach to social control through the casta system compare to the Roman Empire's method of dealing with provincial elites?", "back": "Spain's method was rigid and explicitly racial, organizing society so different groups had different interests and enemies, preventing them from combining. Rome, by contrast, often co-opted provincial elites by granting them citizenship, integrating them into the imperial system."}, {"front": "Name two lasting legacies of the Spanish colonial system on modern Latin American nations.", "back": "Legacies include: 1) The concentration of land in the hands of a small elite. 2) The underdevelopment of manufacturing in favor of raw material export. 3) Enduring racial hierarchies rooted in the casta system. These patterns shaped modern economic and social challenges."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
