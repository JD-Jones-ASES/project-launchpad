    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities III &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What three significant events happened in Spain in 1492?", "back": "The surrender of Granada (ending the Reconquista), the expulsion of Spain's Jewish population (Alhambra Decree), and Christopher Columbus's voyage west."}, {"front": "Define the Reconquista.", "back": "The centuries-long campaign (8th century to 1492) by Christian kingdoms to retake the Iberian Peninsula from Muslim rulers, ending with the fall of Granada. It shaped Spanish national identity."}, {"front": "How did the discovery of the Americas transform Spain?", "back": "It transformed Spain almost overnight from a medium-sized Iberian kingdom into the dominant power in the world."}, {"front": "What was the Treaty of Tordesillas (1494) and what was its significance?", "back": "It was an agreement between Spain and Portugal, dividing newly discovered lands in the Americas along a line in the Atlantic. Spain received lands to the west, and Portugal received lands to the east (including Brazil and the route to India)."}, {"front": "Who was Hernán Cortés and what was his major conquest?", "back": "A Spanish conquistador who, in 1519, landed in Mexico and within two years overthrew the Aztec Empire, including its capital Tenochtitlán, by 1521."}, {"front": "What crucial role did disease play in the Spanish conquest of the Aztecs?", "back": "Smallpox, to which native populations had no immunity, swept through Tenochtitlán during the siege, killing far more people than Spanish swords and significantly aiding Cortés's conquest."}, {"front": "Who was Francisco Pizarro and what empire did he conquer?", "back": "A Spanish conquistador who conquered the Inca Empire in Peru with an even smaller force a decade after Cortés's conquest of the Aztecs."}, {"front": "Define a \"viceroyalty\" in the context of the Spanish Empire.", "back": "A large colonial territory governed by a viceroy, an official ruling on behalf of the Spanish crown with almost royal authority. Examples include New Spain (Mexico/Central America) and Peru (South America)."}, {"front": "Describe the encomienda system.", "back": "A system where Spanish colonists (encomenderos) were granted the labor of a specific number of native people in exchange for the obligation to Christianize and protect them. In practice, it became a system of brutal forced labor."}, {"front": "Who was Bartolomé de las Casas and what was his primary contribution?", "back": "A Dominican friar who, after a religious conversion, dedicated his life to defending the native peoples of the Americas, denouncing the encomienda system, and arguing for their humanity and rights."}, {"front": "What was \"A Short Account of the Destruction of the Indies\" (1542)?", "back": "A searing indictment of Spanish colonial practice written by Bartolomé de las Casas and addressed directly to the king, detailing the abuses against indigenous peoples."}, {"front": "What were the New Laws of 1542, and what was their impact?", "back": "Laws enacted due to Las Casas's efforts, attempting to curtail the worst abuses of the encomienda system. Their success was mixed due to economic interests and distance from Spain."}, {"front": "Explain the concept of \"prophetic witness from within a system\" using Las Casas as an example.", "back": "It describes someone who, like Las Casas, critiques injustice from within the system (e.g., the Spanish crown, the Church) rather than abandoning it, using its own values and institutions to advocate for reform."}, {"front": "Who was Philip II and what characterized his reign (1556–1598)?", "back": "The king of Spain who ruled over its height of power, championing the Catholic Counter-Reformation, building the Escorial, and expanding the Spanish Empire across two hemispheres."}, {"front": "What was the significance of the Battle of Lepanto (1571)?", "back": "A major Spanish-led Catholic naval victory off the coast of Greece that destroyed the Ottoman fleet, shattering the myth of Ottoman naval invincibility and marking a high point for Catholic power in the Mediterranean."}, {"front": "Define the Counter-Reformation.", "back": "The Catholic Church's reform movement (16th-17th centuries) in response to the Protestant Reformation. Key institutions included the Council of Trent, the Jesuits, and the renewed Inquisition. Spain under Philip II was its primary champion."}, {"front": "What was the Valladolid Debate (1550-1551) about?", "back": "A formal legal and theological inquiry summoned by King Charles I (Charles V) to debate whether Spain's conquest of the Americas was morally just."}, {"front": "Compare the arguments of Juan Ginés de Sepúlveda and Bartolomé de las Casas during the Valladolid Debate.", "back": "Sepúlveda argued that indigenous peoples were \"natural slaves\" and could be justly conquered and Christianized by force. Las Casas argued that all humans had reason and natural rights, and no just war could be waged against them."}, {"front": "What was the outcome and lasting significance of the Valladolid Debate?", "back": "No definitive verdict was issued, and conquests resumed. However, the debate itself was significant as Spain was almost unique in formally questioning the moral legitimacy of its own empire."}, {"front": "What two major events marked the initial \"seeds of decline\" for Spain under Philip II?", "back": "The revolt of the Dutch Netherlands (c. 1568), which led to costly warfare, and the defeat of the Spanish Armada by England in 1588, a profound psychological and strategic blow."}, {"front": "How did the expulsion of the Moriscos in 1609 contribute to Spain's decline?", "back": "The expulsion of an estimated three hundred thousand skilled Muslim converts and their descendants from Spain significantly harmed the Spanish economy by removing vital farmers and craftsmen."}, {"front": "How did the Thirty Years' War (1618-1648) impact Spain?", "back": "It further drained Spanish resources, and the subsequent Peace of Westphalia (1648) marked Spain's loss of dominance in Europe to France."}, {"front": "What was the cause and outcome of the War of Spanish Succession (1701-1714)?", "back": "Caused by the death of the last Habsburg king of Spain without an heir. The Treaty of Utrecht (1713) ended it, installing a French Bourbon king but stripping Spain of its remaining European territories, ending its hegemony."}, {"front": "How does Spain's rise and fall illustrate a recurring pattern in history regarding empires?", "back": "It shows rapid expansion funded by extracted wealth, followed by economic and political costs of maintaining too large an empire. Inflation fueled by New World silver and constant wars eventually undermined its economy and power."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
