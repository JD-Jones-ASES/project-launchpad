<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the Industrial Revolution?", "back": "The transformation of European and North American economies from agriculture and hand-production to machine manufacturing and factory labor, beginning in Britain around 1760–1780 and spreading across Europe through the nineteenth century."}, {"front": "Where and when did the Industrial Revolution begin?", "back": "It began in Britain around 1760–1780."}, {"front": "List three key factors that contributed to the Industrial Revolution starting in Britain.", "back": "Britain had coal and iron resources, rivers for power and transport, a stable legal system protecting private property, a Parliament favoring commerce, and an empire for raw materials and markets."}, {"front": "How did daily life in Europe change between 1800 and 1900 due to the Industrial Revolution?", "back": "In 1800, most people farmed small plots, worked by hand, heated with wood, and traveled by horse. By 1900, steam engines drove factories, railroads crossed continents, telegraphs sent messages globally, and cities grew from thousands to millions."}, {"front": "Describe the working conditions for industrial factory workers in the new industrial cities.", "back": "Workers, including women and children as young as five, endured 12-16 hour days, 6 days a week, in unventilated buildings filled with noise, dust, and dangerous machinery. Child labor was common, even in mines, and education was rare."}, {"front": "What was the \"new kind of poverty\" that emerged in industrial cities like Manchester?", "back": "It was systematic, year-round poverty, bound to the rhythms of the machine and factory wages, unlike the traditional poverty of bad harvests or hard winters. It was often characterized by urban slums, poor sanitation, and disease."}, {"front": "Define \"the social question\" that dominated European political thought.", "back": "The nineteenth-century debate over how industrial society should respond to the poverty, labor exploitation, and inequality produced by the Industrial Revolution. It asked what a just society owes its workers and whether the market or state should intervene."}, {"front": "Name three major competing answers to \"the social question.\"", "back": "Liberal capitalism (the market will solve it), socialism/Communism (the system must be overthrown), and Catholic Social Teaching (a moral framework for reform without revolution)."}, {"front": "Which English novelist documented the human cost of industrialization, and name one of his works.", "back": "Charles Dickens, known for novels like *Oliver Twist* (portraying workhouses) and *Hard Times* (depicting dehumanizing factory towns)."}, {"front": "Who authored *The Communist Manifesto* and when was it published?", "back": "Karl Marx and Friedrich Engels, published in February 1848."}, {"front": "According to Marx, what is the \"engine of all historical change\"?", "back": "Class struggle – the ongoing conflict between economic classes, specifically between those who own the means of production and those who sell their labor."}, {"front": "In Marxist analysis, define the *bourgeoisie*.", "back": "The class that owns the means of production (factories, land, capital). Marx used it to describe the industrialists and capitalists who profited from worker labor."}, {"front": "In Marxist analysis, define the *proletariat*.", "back": "The working class – those who own no property and must sell their labor to the bourgeoisie to survive."}, {"front": "What was Marx's ultimate prediction for the future of industrial society?", "back": "He predicted the proletariat would eventually recognize their common interests, rise up, and inevitably overthrow the capitalist order, leading to a classless Communist society."}, {"front": "What was Marx's prescribed \"remedy\" for the problems of industrial capitalism?", "back": "The revolutionary overthrow of the bourgeoisie, the abolition of private property, and the establishment of a classless Communist society where \"the free development of each is the condition for the free development of all.\""}, {"front": "What was a key difference between Marx's \"diagnosis\" and his \"prescription\" regarding societal problems?", "back": "Marx accurately diagnosed the real suffering and exploitation of workers under early industrial capitalism (diagnosis), but his proposed solution (prescription) was a purely material one—the abolition of private property—which proved destructive and did not account for the abuse of state power."}, {"front": "What were the Revolutions of 1848, and what was their outcome?", "back": "A series of widespread revolutions across Europe (France, Austria, Hungary, German states) driven by economic hardship, nationalism, and demands for constitutional government. Most were suppressed within two years by conservative forces."}, {"front": "What crucial lesson did the failure of the 1848 revolutions teach European radicals?", "back": "That spontaneous popular uprisings were insufficient; organized, disciplined revolutionary movements with explicit programs and committed leadership were necessary. This shaped the development of socialist and Communist parties."}, {"front": "What was *Rerum Novarum*, who issued it, and when?", "back": "*Rerum Novarum* (\"On the Condition of Labor\") was an encyclical (official teaching letter) issued by Pope Leo XIII in 1891, marking the founding document of Catholic Social Teaching."}, {"front": "On what fundamental point did *Rerum Novarum* agree with Karl Marx?", "back": "Both agreed that industrial workers were being exploited and that this exploitation was unjust."}, {"front": "How did *Rerum Novarum* challenge socialism regarding private property?", "back": "It argued that private property is a natural right, rooted in human nature, and that abolishing it violates natural law and gives unlimited power to the state."}, {"front": "How did *Rerum Novarum* challenge unrestrained capitalism (*laissez-faire*) regarding wages and workers?", "back": "It argued that employers have a moral obligation to pay a living wage because workers are human beings made in the image of God (*imago Dei*), not mere commodities to be valued solely by the \"free market.\""}, {"front": "Define *imago Dei* and explain its significance in *Rerum Novarum*.", "back": "Latin for \"image of God,\" it's the Christian teaching that every human being possesses inherent dignity. *Rerum Novarum* grounds its entire argument for workers' rights in this principle."}, {"front": "According to *Rerum Novarum*, what positive duty does the state have regarding workers' rights?", "back": "The state has a positive duty to protect workers by setting limits on working hours, prohibiting child labor, ensuring decent wages, and recognizing workers' right to form unions."}, {"front": "Define *laissez-faire* economics.", "back": "A philosophy holding that the government should not interfere in the economy, believing free markets, left to themselves, will produce the best outcomes for all. *Rerum Novarum* rejected pure *laissez-faire* as it left workers vulnerable to exploitation."}, {"front": "What is Catholic Social Teaching (CST), and what \"third way\" does it offer?", "back": "The body of official Church teaching on social, economic, and political questions, beginning with *Rerum Novarum*. It offers a \"third way\" between unrestrained capitalism and socialism, rooted in human dignity, the common good, and natural law."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
