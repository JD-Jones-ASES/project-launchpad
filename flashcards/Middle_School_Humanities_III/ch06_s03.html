<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What characterized the physical transformation of the world between 1800 and 1870?", "back": "Rapid advancements in communication and transportation, such as messages traveling 400 miles in minutes (telegraph) instead of days (horse), and journeys taking hours (railroad) instead of days (coach)."}, {"front": "What was the significance of these 19th-century technological transformations beyond mere convenience?", "back": "They fundamentally changed human life by speeding up news, enabling faster troop movements, facilitating continental trade, and altering global interrelations, providing context for major historical events like Rerum Novarum and the outbreak of WWI."}, {"front": "Define \"railroad\" as the defining technology of the mid-nineteenth century.", "back": "A system of iron (later steel) tracks on which steam-powered locomotives pulled carriages or freight cars. It slashed travel times, opened new markets, enabled mass troop movements, and knit together national economies."}, {"front": "What was the first commercial steam railway, and when did it open?", "back": "The Stockton and Darlington Railway in northeastern England, opened in 1825."}, {"front": "How did the railroad transform daily life and economies?", "back": "It drastically reduced travel times (e.g., London to Edinburgh from four days to nine hours), allowed perishable goods to reach urban markets, facilitated urban growth, and enabled manufacturers and merchants to ship goods quickly across regions."}, {"front": "What impact did the railroad have on warfare in the 19th century?", "back": "It enabled armies to mobilize and transport troops much faster (days instead of months), leading to wars that could begin and escalate more quickly. This necessitated detailed pre-planning and mobilization schedules, playing a fateful role in WWI."}, {"front": "Compare the railroad's impact on land travel to the sailing ship's impact on sea travel.", "back": "Both allowed goods, people, and armies to move across vast distances faster and cheaper than ever before, with the railroad doing for land what the sailing ship had done for sea."}, {"front": "Compare the Victorian railroad network to the Roman road network.", "back": "Both were systems of imperial communication and control, used by states to move goods, troops, and governors, transforming connected territories into integrated economic and political units. The key difference was scale: Roman roads covered ~50,000 miles, while the world's railroad network covered over 700,000 miles by 1914."}, {"front": "What was the significance of Samuel Morse's first long-distance telegraph message in 1844?", "back": "His message, \"What hath God wrought?\", marked the first time information could travel faster than a human could carry it, a revolutionary concept that separated information from physical transport."}, {"front": "Define \"telegraph.\"", "back": "An electrical communication system that transmits coded signals (Morse code) over wires. It was the first technology to transmit information faster than a human being could travel, with submarine cables connecting continents by 1866."}, {"front": "How did the electric telegraph transform global communication and commerce?", "back": "It allowed financial markets in London and New York to react simultaneously to news, enabled governments to direct ambassadors and military commanders in real time, and brought news from distant wars to home audiences within hours."}, {"front": "When and where was the Suez Canal opened, and who was its primary engineer?", "back": "The Suez Canal opened in 1869, connecting the Mediterranean Sea to the Red Sea through the Isthmus of Suez in Egypt. It was directed by French engineer Ferdinand de Lesseps."}, {"front": "What was the strategic and commercial value of the Suez Canal, especially for the British Empire?", "back": "It cut the sea route from London to Bombay roughly in half (from ~11,000 to ~6,200 miles) and reduced journey time from six months to three weeks, providing immense strategic and commercial value for Britain's control over India and its Asian and African territories."}, {"front": "Describe the pattern that the Suez Canal illustrates regarding 19th-century European expansion.", "back": "It shows how major engineering achievements in non-European countries, built with non-European labor, primarily benefited European empires, serving as both commercial and military assets, highlighting the non-neutral relationship between technology and empire."}, {"front": "What enabled Europeans to penetrate the interior of Africa in the mid-19th century, leading to the \"Scramble for Africa\"?", "back": "The development of quinine treatment for malaria in the 1840s reduced the risk of disease, allowing European surveyors, missionaries, and soldiers to explore and penetrate tropical Africa's interior."}, {"front": "Define the \"Berlin Conference.\"", "back": "A conference held in Berlin from November 1884 to February 1885, convened by German Chancellor Bismarck, where European powers established rules for the colonial division of Africa. No African leaders were invited, and it formalized the principle of \"effective occupation.\""}, {"front": "What principle did the Berlin Conference establish for European claims to African territory?", "back": "A nation had to demonstrate \"effective occupation\" of a territory—meaning having troops, administrators, or established control—to have its claim recognized by other European powers."}, {"front": "What were the primary drivers of the \"Scramble for Africa\"?", "back": "Desire for raw materials (rubber, copper, ivory, diamonds), new markets for manufactured goods, strategic naval bases, nationalist prestige, and the widespread European ideology of civilizational superiority."}, {"front": "By 1914, what percentage of the world's land surface did Europe control, and which African states remained independent?", "back": "Europe controlled approximately 84% of the world's land surface. Only Ethiopia (which defeated Italy) and Liberia (founded by freed American slaves) remained independent in Africa."}, {"front": "How does the \"Scramble for Africa\" compare to the Spanish conquest of the Americas?", "back": "Both were cases where European military and technological superiority led to the dispossession of non-European peoples, often with Christian missionaries being both complicit in and critical of the conquest, and driven by similar desires for resources and empire."}, {"front": "What was one of the most consequential political events of the nineteenth century that reshaped the European balance of power?", "back": "The unification of Germany in 1871 under Prussian leadership, led by Chancellor Otto von Bismarck."}, {"front": "How did German unification come about, and what were its immediate outcomes for Europe?", "back": "It was achieved through three wars (against Denmark, Austria, and France) between 1864 and 1871. It resulted in the proclamation of the German Empire at Versailles, forced France to surrender Alsace-Lorraine and pay an indemnity, and shattered the existing European balance of power."}, {"front": "How did the unified German state immediately disrupt the European balance of power after 1871?", "back": "Germany became the most powerful military state on the European continent, possessing the largest industrial economy and a determination to claim its \"place in the sun,\" forcing other powers like Britain, France, Russia, and Austria-Hungary to adjust."}, {"front": "What was Otto von Bismarck's approach to international relations after German unification, and how did it change after his dismissal?", "back": "Bismarck pursued a cautious policy, building an elaborate network of alliances to keep France isolated and preserve peace. After his dismissal by Kaiser Wilhelm II in 1890, this system unraveled, leading to the division of Europe into two armed camps by 1907: the Triple Alliance and the Triple Entente."}, {"front": "Name the two main armed camps that Europe divided into by 1907.", "back": "The Triple Alliance (Germany, Austria-Hungary, Italy) and the Triple Entente (France, Russia, Britain)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
