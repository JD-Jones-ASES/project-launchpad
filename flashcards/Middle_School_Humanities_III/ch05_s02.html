<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities III &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who are the \"three witnesses\" to the age of expansion featured in this unit's literature?", "back": "Olaudah Equiano, Bartolomé de las Casas, and William Shakespeare (through \"The Tempest\")."}, {"front": "What overarching themes do the three literary works in this unit explore regarding the age of expansion?", "back": "Power, conscience, and the costs of confronting difficult truths."}, {"front": "What \"tools\" did Olaudah Equiano use to argue for abolition in \"The Interesting Narrative\"?", "back": "The tools of the Enlightenment: reason, natural rights, and literary skill."}, {"front": "Briefly describe Olaudah Equiano's early life and journey to freedom.", "back": "Born Igbo in West Africa (c. 1745), he was kidnapped at age eleven, survived the Middle Passage, served in the Royal Navy, and purchased his freedom in 1766."}, {"front": "What was the significance of Olaudah Equiano publishing \"The Interesting Narrative\" in 1789?", "back": "It was published in the same year as the French Revolution and the beginning of the Haitian Revolution, marking a period of significant global change and challenges to existing power structures."}, {"front": "How did Equiano's \"Narrative\" serve multiple purposes?", "back": "It functioned as a memoir of his life, a spiritual autobiography detailing his conversion to Christianity, and a powerful political argument against the slave trade."}, {"front": "How did Equiano's", "back": "By describing Igbo customs and social life in detail, he humanized enslaved people and implicitly countered the argument that Africans were \"barbaric\" and benefited from European civilization."}, {"front": "What specific horrors of the Middle Passage does Equiano recount in Chapter 2 of his Narrative?", "back": "Extreme crowding, suffocating heat, \"loathsome smells,\" widespread sickness and death, and the dehumanizing examination and treatment by the crew."}, {"front": "How did Equiano use Enlightenment philosophy to argue against slavery?", "back": "He applied the concept of natural rights (from thinkers like John Locke) to enslaved people, arguing that since all humans are born with inherent rights, the slave trade was philosophically incoherent and contradicted its defenders' stated principles."}, {"front": "How did Equiano's Christian faith reinforce his abolitionist stance?", "back": "His faith taught him that every human being is made in the \"imago Dei\" (image of God), meaning they possess an inherent dignity that no human power can revoke, making enslavement a profound moral wrong."}, {"front": "What two intellectual traditions did Equiano combine in his argument against slavery?", "back": "Enlightenment natural rights philosophy and the Christian understanding of human dignity rooted in \"imago Dei.\""}, {"front": "Who was Bartolomé de las Casas and what was his primary concern regarding the Spanish conquest?", "back": "He was a Spanish priest who witnessed and condemned the conquest and enslavement of indigenous peoples in the Americas, particularly the \"encomienda\" system."}, {"front": "Define the \"encomienda\" system.", "back": "It was a labor system in Spanish colonial America where the crown granted a colonist (an \"encomendero\") the right to demand labor and tribute from a specific group of indigenous people. In practice, it was often brutal forced labor."}, {"front": "What was Las Casas's main accusation against the Spanish Christians regarding their treatment of indigenous people?", "back": "He accused them of \"insatiable greed and overweening ambition,\" treating indigenous people \"not as brute animals... so much as piles of dung in the middle of the road.\""}, {"front": "What was a key difference in the rhetorical strategies of Equiano and Las Casas in appealing to conscience?", "back": "Equiano appealed to his British readers by making them \"see and feel\" the slave trade's impact, while Las Casas appealed to the Spanish crown's conscience by framing the conquest as a violation of Christian duty and theology."}, {"front": "What does it mean that Las Casas offered a \"prophetic witness from within a system\"?", "back": "He was not an outsider but a Spanish priest and former participant in the colonial system who used his insider status to condemn its injustices to the highest authorities, including the King of Spain."}, {"front": "What was the Council of Valladolid (1550-51) and what was its outcome?", "back": "It was a debate where Las Casas argued against Juan Ginés de Sepúlveda regarding the justice of the Spanish conquest. Las Casas won the theological debate, leading to the official condemnation of the \"encomienda\" system, though the conquest largely continued."}, {"front": "What was the long-term significance of Las Casas's campaign, despite its immediate failures?", "back": "His arguments contributed to the development of international law, the concept of human rights, and influenced later thinkers like Hugo Grotius and the School of Salamanca's theories on indigenous rights."}, {"front": "What real-world event is believed to have influenced Shakespeare's \"The Tempest\"?", "back": "The shipwreck of the \"Sea Venture\" off the coast of Bermuda in 1609."}, {"front": "Who is Caliban in \"The Tempest,\" and what is his relationship with Prospero?", "back": "Caliban is the island's original inhabitant, son of the witch Sycorax. Prospero, having arrived on the island, has enslaved Caliban and uses him as a laborer."}, {"front": "What is Caliban's direct accusation to Prospero in Act I, scene 2 of \"The Tempest\"?", "back": "\"This island's mine, by Sycorax my mother, / Which thou tak'st from me.\""}, {"front": "What concept does Caliban's accusation in \"The Tempest\" powerfully illustrate in the context of colonialism?", "back": "The theme of dispossession – the forceful taking of land and home by a more powerful stranger from its original inhabitant."}, {"front": "How does William Shakespeare's \"The Tempest\" differ from the works of Equiano and Las Casas in its approach to colonialism?", "back": "\"The Tempest\" is not a direct pamphlet or political argument but a play that uses literary imagery and character dynamics to explore the human cost and moral ambiguities of power and dispossession in a colonial context."}, {"front": "What is the significance of the agreement between Equiano and Las Casas that enslavement was fundamentally wrong, despite their different cultural and religious traditions?", "back": "Their agreement highlights a universal moral principle against enslavement, suggesting that deeply divergent worldviews can converge on essential truths about human dignity and justice."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
