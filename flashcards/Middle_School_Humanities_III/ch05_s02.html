<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities III &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities III &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_III.html">&larr; Back to History &amp; Humanities III</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who are the \"three witnesses\" to the age of expansion discussed in this section's literature?", "back": "Olaudah Equiano, Bartolomé de las Casas, and William Shakespeare."}, {"front": "What overarching themes do the three literary texts in this section invite readers to consider?", "back": "Power, conscience, and the cost of keeping one's eyes open to difficult realities."}, {"front": "What historical event is central to Olaudah Equiano's personal narrative and abolitionist argument?", "back": "The Middle Passage, which he survived as an enslaved person."}, {"front": "What intellectual tools did Olaudah Equiano use to make a moral case for abolition in his Narrative?", "back": "The tools of the Enlightenment, including reason, natural rights, and literary skill."}, {"front": "Besides being a memoir, what other functions did Olaudah Equiano's \"The Interesting Narrative\" serve?", "back": "It was a spiritual autobiography and a powerful political argument against slavery."}, {"front": "What was Equiano's rhetorical strategy in describing his African childhood in the ethnographic mode?", "back": "To humanize enslaved people by showing they had civilization, history, and culture, thereby implicitly answering arguments that Africans were 'barbaric.'"}, {"front": "Describe the immediate physical and psychological impact of being brought aboard a slave ship, as recounted by Equiano.", "back": "He was filled with astonishment quickly turning to terror, handled 'to see if I were sound,' and persuaded he had entered a 'world of bad spirits.'"}, {"front": "How did Equiano use the language of natural rights to argue against slavery?", "back": "He adopted principles from Enlightenment thinkers like Locke, asserting that enslaved people, as human beings, possess inherent rights to life, liberty, and property, making slavery 'philosophically incoherent.'"}, {"front": "What two distinct traditions did Equiano combine in his argument against slavery?", "back": "Enlightenment natural rights philosophy (e.g., Locke) and the Christian understanding of human dignity rooted in *imago Dei* (being made in the image of God)."}, {"front": "Who was Bartolomé de las Casas and what was his primary goal regarding the Spanish conquest of the Americas?", "back": "He was a Spanish priest who witnessed conquest and enslavement and used Christian theology to condemn it, campaigning against systems like the encomienda."}, {"front": "Define the *encomienda* system in Spanish colonial America.", "back": "A labor system where the crown granted a colonist (encomendero) the right to demand labor and tribute from a specific group of indigenous people, often resulting in brutal forced labor."}, {"front": "What did Las Casas identify as the primary motivation for the 'Christians' (Spaniards) in their actions against indigenous people, according to \"A Short Account\"?", "back": "'Purely and simply greed' and an 'insatiable greed and overweening ambition' to amass wealth and elevate their social status."}, {"front": "How did Las Casas describe the Spanish treatment of indigenous people in \"A Short Account of the Destruction of the Indies\"?", "back": "He stated they were treated 'not as brute animals—indeed, I would to God they had done...so much as piles of dung in the middle of the road.'"}, {"front": "Why is Las Casas considered a \"prophetic witness from within a system\"?", "back": "He was a Spanish priest and former beneficiary of the colonial system who used his insider status to condemn its injustices to the Spanish crown."}, {"front": "What was the outcome of Las Casas's arguments at the Council of Valladolid (1550–51) regarding the *encomienda* system?", "back": "He won the theological debate, leading to the official condemnation of the *encomienda* system, though the conquest largely continued."}, {"front": "What lasting impact did Las Casas's campaign against the abuses of the *encomienda* system have, despite its immediate failures?", "back": "It contributed to the development of international law and the concept of human rights, influencing thinkers like those of the School of Salamanca and Hugo Grotius."}, {"front": "How did the rhetorical strategies of Equiano and Las Casas differ in their appeals to conscience?", "back": "Equiano appealed to British readers by making them see and feel the slave trade's impact, while Las Casas appealed to the Spanish crown by framing the conquest as a violation of Christian duty."}, {"front": "Despite their different cultural and religious traditions, what common conclusion did Equiano and Las Casas reach about enslavement?", "back": "Both concluded that enslavement was a fundamental wrong, a point of moral significance given their diverse backgrounds."}, {"front": "What historical event likely influenced Shakespeare's \"The Tempest\"?", "back": "The shipwreck of the Sea Venture off the coast of Bermuda in 1609."}, {"front": "Who is Caliban in Shakespeare's \"The Tempest\" and what is his relationship with Prospero?", "back": "Caliban is the island's original inhabitant, son of the witch Sycorax, whom Prospero has enslaved and uses as a laborer."}, {"front": "What is the central accusation Caliban makes against Prospero in \"The Tempest\"?", "back": "'This island's mine, by Sycorax my mother, Which thou tak'st from me,' highlighting themes of dispossession and colonialism."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
