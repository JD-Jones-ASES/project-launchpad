<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading the Modern Short Story &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Modern_Short_Stories">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is an 'epiphany' in the context of a short story, as defined by James Joyce?", "back": "An epiphany is a sudden moment in a story when a character, or the reader, sees something clearly for the first time."}, {"front": "Describe the typical nature of an epiphany, according to James Joyce. Is it a happy revelation?", "back": "No, it is usually the opposite: an unwelcome flash of self-knowledge, a recognition that cannot be taken back. It's a 'sinking, clarifying feeling'."}, {"front": "What is the typical impact of an epiphany on a character?", "back": "It often makes the character honest, forcing them to confront a truth about themselves or their situation, rather than making them happy."}, {"front": "Which of James Joyce's stories is mentioned as an example of a character experiencing an epiphany?", "back": "In 'The Dead,' the main character experiences an epiphany about his marriage."}, {"front": "How does the text describe the feeling of an epiphany in everyday terms?", "back": "It's like realizing, mid-sentence, that you have been wrong about something important concerning yourself, not just a fact."}, {"front": "What is the 'Iceberg Principle' in short stories, as described by Ernest Hemingway?", "back": "It's Hemingway's writing method where only a small, visible part of the story's meaning or content is stated directly, with the most important, powerful parts remaining submerged and implied."}, {"front": "How did Ernest Hemingway use the analogy of an iceberg to explain his writing method?", "back": "He said that only one-eighth of an iceberg is visible above the waterline, but the seven-eighths below is what gives it its power. In his stories, the most important thing is almost never stated directly."}, {"front": "In a story written with the Iceberg Principle, where is the most important information usually found?", "back": "The most important information is almost never stated directly; it is implied, talked around by characters, or left unexplained by the narrator, existing in the 'submerged' part of the story."}, {"front": "What is the reader's role in understanding a story written with the Iceberg Principle?", "back": "The reader is trusted to feel what is missing—to sense the shape and weight of the submerged ice from the small piece that shows, actively inferring the unspoken truth."}, {"front": "Which of Ernest Hemingway's stories is mentioned as an example of the Iceberg Principle?", "back": "'Hills Like White Elephants,' where a life-changing decision is discussed without the central word ever being spoken."}, {"front": "Which author is associated with the concept of 'epiphany'?", "back": "James Joyce."}, {"front": "Which author is associated with the 'Iceberg Principle'?", "back": "Ernest Hemingway."}, {"front": "What common problem were both James Joyce's epiphany and Ernest Hemingway's Iceberg Principle a response to?", "back": "They were responses to the pre-modern fiction practice where the narrator explicitly told the reader what to think about characters' feelings or situations."}, {"front": "How did most fiction before modern writers (like Chekhov, Joyce, Hemingway) typically convey information about characters' inner states?", "back": "Narrators would 'step in and explain' that a character was sad, foolish, or in love, directly telling the reader what to think."}, {"front": "Why did modern writers like Joyce and Hemingway consider the traditional method of explicit narration 'dishonest'?", "back": "They believed that real understanding does not arrive through explanation but through experience."}, {"front": "According to modern writers, how does 'real understanding' arrive, as opposed to how it arrived in older fiction?", "back": "Real understanding arrives through experience, rather than through direct explanation from the narrator."}, {"front": "How does Joyce's epiphany allow truth to be revealed?", "back": "Joyce's epiphany lets the truth hit the character (and the reader) all at once, without warning, as a sudden flash of insight."}, {"front": "How does Hemingway's Iceberg Principle allow truth to be conveyed without direct explanation?", "back": "Hemingway's Iceberg Principle lets the truth remain unspoken, trusting the reader to feel its weight and infer the unstated meaning."}, {"front": "What common assumption do both the epiphany and the Iceberg Principle make about the reader?", "back": "Both methods assume that the reader is intelligent enough to do some of the work of understanding and interpretation."}, {"front": "How does the narrator typically behave in a story employing the Iceberg Principle?", "back": "The narrator refuses to explain the most important things directly, leaving them to be inferred by the reader."}, {"front": "How do characters often approach crucial topics in a story using the Iceberg Principle?", "back": "Characters tend to talk around the most important things, never directly stating the core issue."}, {"front": "What happens to the 'recognition' gained during an epiphany?", "back": "It is a recognition that cannot be taken back; once seen, the truth remains clear to the character/reader."}, {"front": "What did Hemingway believe about a writer's knowledge of a subject and its impact on the reader?", "back": "He believed that if a writer knows something well enough, the reader will feel it without being told directly."}, {"front": "What kind of 'work' are readers expected to do when engaging with stories that use techniques like the epiphany and the Iceberg Principle?", "back": "Readers are expected to actively participate in uncovering meaning, sensing what is missing, and inferring truths that are not explicitly stated."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
