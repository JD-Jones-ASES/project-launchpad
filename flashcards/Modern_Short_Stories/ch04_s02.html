<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading the Modern Short Story &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Modern_Short_Stories">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does Gabriel do when he sees Gretta on the stairs, listening to the song?", "back": "He turns the moment into something about himself, composing an image of her as if she were a painting, rather than seeking to understand her inner experience."}, {"front": "What does Gabriel's impulse to 'compose a picture' of Gretta reveal about his character?", "back": "It reveals that he experiences other people aesthetically, as images or occasions for his own feelings, rather than as separate beings with their own inner lives."}, {"front": "How does Joyce use the staircase scene to 'set a trap' for the reader?", "back": "He lets the reader share Gabriel's romanticized vision of his wife so that when the truth is revealed in the hotel room, the reader feels the fall as sharply as Gabriel does."}, {"front": "Who is Michael Furey?", "back": "Michael Furey was a young boy, seventeen years old and ill, who was deeply in love with Gretta and visited her in the rain the night before she left Galway; Gretta believes he died for her."}, {"front": "What is the 'asymmetry' at the heart of Gabriel and Gretta's marriage, revealed by Michael Furey?", "back": "Gabriel assumed he was the central figure in Gretta's emotional life, but he discovers that the deepest feeling his wife has ever known belongs to Michael Furey, a boy long dead whom Gabriel had never heard of."}, {"front": "What was the true significance of the song Gretta heard on the stairs?", "back": "The song did not create Gretta's grief for Michael Furey; it uncovered a deeply private and painful memory she had carried with her for years."}, {"front": "What central question does the story implicitly raise about Gabriel's perception of Gretta?", "back": "The story asks not whether Gretta loves Gabriel, but whether Gabriel has ever truly seen her as a complete individual with an independent inner life."}, {"front": "What is Gabriel's 'epiphany' in the hotel room?", "back": "His epiphany is a painful but honest self-recognition: he realizes he has been performing confidence, composing images of others, and has never truly known his wife or himself."}, {"front": "How does Gabriel's epiphany relate to Joyce's definition of the term?", "back": "It aligns perfectly: it's a moment of sudden, often unwelcome self-knowledge, a confrontation with a truth that, once arrived, cannot be unfelt or unseen, rather than a happy insight."}, {"front": "What is the significance of the story ending with the image of snow?", "back": "The snow enlarges the story beyond Gabriel's individual consciousness, placing his experience within something vast and impersonal, connecting the living and the dead, the city and the countryside, in a universal embrace of mortality."}, {"front": "Describe the stylistic changes in the final paragraph of 'The Dead.'", "back": "The sentences lengthen, the rhythm becomes incantatory and musical, specific nouns give way to broader ones, and the narration shifts from Gabriel's perspective to a universal, almost cosmic one."}, {"front": "What themes does the snow evoke in the story's conclusion?", "back": "It evokes themes of mortality, the passage of time, the interconnectedness of all existence, and the strange democracy of death that makes no distinction between individuals."}, {"front": "What is the ultimate effect of the snow passage on the reader?", "back": "It creates a sense of awe, a 'terrible beauty,' where individual life and its concerns are held against the background of everything, leading to a feeling of transcendence rather than diminishment."}, {"front": "How does Joyce manipulate the reader's expectations in 'The Dead'?", "back": "He meticulously builds up the party scenes, leading readers to believe the party and Gabriel's social anxieties are the main subject, only to surprise them with the profound, personal revelation in the hotel room."}, {"front": "What does the text suggest is the true subject of 'The Dead'?", "back": "The true subject is the discovery that the person closest to you has an inner life you've never touched, that deep feelings in a marriage may belong to someone absent, and that the living carry the dead with them always."}, {"front": "Why is Gabriel's epiphany considered 'painful, yes,' but also leading to 'something closer to honesty' and 'a kind of freedom'?", "back": "It's painful because it strips away his comfortable self-deceptions, but it's honest and freeing because he sees himself clearly for the first time, becoming more fully present to his own life."}, {"front": "Does the ending of 'The Dead' provide a definitive resolution for Gabriel's future actions?", "back": "No, Joyce deliberately leaves open what Gabriel will do with this new knowledge, emphasizing that this silence is part of the story's honesty."}, {"front": "What specific detail about Gabriel's reaction to Gretta on the stairs reveals his aesthetic rather than empathetic view?", "back": "He immediately thinks of what he would call the scene if it were a painting, rather than wondering what the song means to Gretta or what she is feeling."}, {"front": "Before Gretta's revelation, how does Gabriel perceive himself in relation to his wife?", "back": "He assumes he is the central, most significant figure in Gretta's emotional life, confident in his role as her educated, successful husband."}, {"front": "The 'closeread' section asks: 'What is the difference between seeing someone and composing an image of them?' How does the story answer this?", "back": "Seeing someone involves recognizing their separate inner life and feelings, while composing an image frames them aesthetically for one's own perception, without true empathy or understanding."}, {"front": "How does the final image of snow contrast with Gabriel's earlier anxieties and self-importance?", "back": "It contrasts by shifting focus from individual anxieties and vanity to a vast, impersonal, and universal reality of mortality and the passage of time, diminishing Gabriel's earlier concerns."}, {"front": "What is the meaning of 'the living carry the dead with them always, and that this carrying is not a burden but a form of faithfulness'?", "back": "It means that memories and past relationships profoundly shape one's inner life, and maintaining these connections is a testament to enduring love and loyalty, not just a weight."}, {"front": "What does the text suggest about the purpose of the 'surprise' in the narrative structure of 'The Dead'?", "back": "The surprise is the point; it serves to disorient the reader, making them realize that the story's true, deeper subject was always present but concealed beneath the surface events, just as Gabriel's wife had an unseen inner life."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
