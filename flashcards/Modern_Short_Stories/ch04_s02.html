<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading the Modern Short Story &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Modern_Short_Stories">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does Gabriel's immediate impulse to compose a \"painting title\" for Gretta on the stairs reveal about his character?", "back": "It reveals that he experiences other people aesthetically, as images or occasions for his own feelings, rather than as separate beings with their own inner lives."}, {"front": "How does Joyce use Gabriel's romanticized vision of Gretta in the staircase scene to set a \"trap\" for the reader?", "back": "Joyce allows readers to share Gabriel's idealized view of Gretta's beauty and emotional depth, so that when the truth about her feelings is revealed, both Gabriel and the reader experience the \"fall\" more sharply."}, {"front": "What significant event occurs in the hotel room after the party that profoundly impacts Gabriel?", "back": "Gretta begins to cry and reveals the story of Michael Furey, a boy she loved who died young, who sang the song she was listening to on the stairs."}, {"front": "Define \"asymmetry\" as it applies to Gabriel and Gretta's marriage, based on the revelation about Michael Furey.", "back": "\"Asymmetry\" refers to the fundamental imbalance in their understanding of their shared life; Gabriel had assumed he was central to Gretta's emotional world, while she carried a profound, private grief for Michael Furey from a past he knew nothing about."}, {"front": "What is the immediate cause of Gretta's tears in the hotel room, and what deeper truth does it uncover?", "back": "Her tears are immediately caused by hearing the song Michael Furey used to sing. This uncovers the deeper truth that she has carried a profound, private grief and love for Michael Furey throughout her marriage, unknown to Gabriel."}, {"front": "How does Gabriel's assumption about being the \"central figure\" in Gretta's emotional life relate to his earlier habit of \"composing images\" of people?", "back": "Both reflect Gabriel's self-centered perception; his assumption of centrality in Gretta's life is a form of \"composing an image\" of her that fits his narrative, rather than engaging with her actual, independent inner life."}, {"front": "According to the text, how does Joyce's concept of \"epiphany\" manifest in Gabriel's experience at the end of the story?", "back": "Gabriel's epiphany is a sudden, painful, and unwelcome moment of self-knowledge where he confronts the truth about himself—that he has been performing confidence and composing images of others rather than truly knowing them."}, {"front": "What is the key difference between how Gabriel *thought* he knew Gretta and the reality revealed by Michael Furey's story?", "back": "Gabriel believed he knew Gretta completely and was the focus of her deepest feelings, but the reality was that she had a rich, private interior life, with profound feelings for Michael Furey, that he had never glimpsed."}, {"front": "Give an example of Gabriel \"experiencing other people aesthetically\" from the text.", "back": "His impulse to imagine a painting title for Gretta on the stairs, or his earlier speeches and memories where he frames others as occasions for his own feelings, rather than engaging with their true selves."}, {"front": "How does the song Gretta hears on the stairs function in the narrative regarding her grief for Michael Furey?", "back": "The song does not *create* her grief but rather *uncovers* it, bringing to the surface a long-held, private sorrow and love for Michael Furey."}, {"front": "What is the primary \"fiction\" Gabriel's epiphany strips away, according to the text?", "back": "It strips away the comfortable fictions that he is perceptive, that he truly understands his wife, and that his life has a certain shape and significance."}, {"front": "What \"question\" does the story leave open regarding Gabriel's epiphany, and why is Joyce's silence on this significant?", "back": "The story leaves open what Gabriel will *do* with this new self-knowledge. Joyce's silence is significant because it is part of the story's honesty, reflecting that not all profound insights lead to clear-cut resolutions."}, {"front": "What does the snow symbolize in the final paragraph of \"The Dead\"?", "back": "The snow symbolizes mortality, the passage of time, and a \"strange democracy\" that makes no distinction between the living and the dead, placing individual human experience within something vast, impersonal, and transcendent."}, {"front": "Describe the change in prose style in the final paragraph of the story and its effect on the reader.", "back": "The prose shifts to longer, more rhythmic, and incantatory sentences, with specific nouns giving way to broader ones. This creates a sense of awe, enlarging the story beyond Gabriel's individual consciousness and evoking a feeling of terrible beauty in the face of universal themes like mortality."}, {"front": "According to the text, what is the \"real subject\" of \"The Dead\" that many readers initially miss?", "back": "The real subject is the discovery that even the person closest to you has an inner life you may never fully touch, that deepest feelings in a marriage can belong to someone not in the room, and that the living carry the dead with them."}, {"front": "Who coined the term \"epiphany\" as used in literature, and what did he mean by it?", "back": "James Joyce coined the term \"epiphany\" for moments of sudden, often unwelcome self-knowledge or recognition, a confrontation with truth that cannot be unfelt or unseen."}, {"front": "How does the text describe the effect of the final snow passage on Gabriel's personal situation?", "back": "It states that the snow does not resolve Gabriel's situation or comfort him; instead, it places his individual experience within something vast and impersonal, transcending his personal grief."}, {"front": "How does Gabriel's state of being *after* his epiphany differ from his state *before* it, despite the pain?", "back": "After his epiphany, Gabriel is \"more fully present to his own life\" and experiences a kind of \"freedom\" through honesty, having stripped away comfortable fictions, even though the recognition is painful and humbling. Before, he was performing confidence and composing images."}, {"front": "Why is the \"incompleteness\" of a reader's initial prediction about \"The Dead\" considered intentional by Joyce?", "back": "Joyce deliberately builds detailed party scenes to mislead readers into thinking the party is the main story, only to \"pull the ground out\" from under them with the revelation about Michael Furey, making the surprise the central point."}, {"front": "How does Gretta's carrying of Michael Furey differ from a \"secret\"?", "back": "She carried it not as a deliberate secret, but as something too private and too painful to share casually, highlighting its deeply personal and internal nature rather than a calculated concealment."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
