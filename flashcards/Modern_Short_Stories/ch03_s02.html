<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading the Modern Short Story &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Modern_Short_Stories">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does Joyce use domestic ceremony to reveal throughout *Dubliners*?", "back": "He uses domestic ceremony to reveal the spiritual condition of an entire culture."}, {"front": "How does the Morkan household function as an 'argument' in 'The Dead'?", "back": "It represents a Dublin that has not changed—that cannot change—serving as annual proof that the old ways still hold, despite the world outside."}, {"front": "What repetitive aspects of the Morkan party does Joyce highlight to illustrate its unchanging nature?", "back": "The same guests, music, anxieties, compliments, topics, and small tensions that surface and are smoothed over, creating an effect 'like watching a music box'."}, {"front": "What 'tragedy' does Joyce attribute to the Morkan household?", "back": "The tragedy is not that it is empty, but that it is 'full of life that has nowhere to go'—a sense of stagnation despite warmth and affection."}, {"front": "What is Gabriel Conroy's primary anxiety at the beginning of the party?", "back": "He is nervous about his after-dinner speech, whether his literary references will be understood, and how others perceive him."}, {"front": "How does Gabriel typically react when a social interaction doesn't follow his 'script,' as seen in the exchange with Lily?", "back": "He is 'perpetually startled' and tries to 'paper over the confusion' with money or other superficial gestures, rather than understanding the underlying issue."}, {"front": "What does the term 'West Briton' signify in the context of early 20th-century Ireland?", "back": "It was a sharp insult for an Irish person perceived as too sympathetic to British culture, implying they had chosen the colonizer's world over their own Irish identity."}, {"front": "Why does Miss Ivors's challenge sting Gabriel so deeply?", "back": "It stings because she is his intellectual equal, politically committed in a way he is not, and she presses exactly on his discomfort—his avoidance of engaging with his own country's cultural revival."}, {"front": "According to Joyce, what is 'paralysis' as a spiritual condition in *Dubliners*?", "back": "Paralysis is 'the inability to act, to change, to leave'—a spiritual condition where characters live in a culture that makes staying still feel like the only safe option."}, {"front": "How is the Morkan party itself an example of 'paralysis'?", "back": "It is 'paralysis made hospitable,' with the same event, guests, and songs year after year, symbolizing a culture's collective decision that the past is preferable to the future."}, {"front": "How does Joyce's portrayal of Miss Ivors and Gabriel's exchange reflect his characteristic method?", "back": "Joyce doesn't take sides, presenting two intelligent people talking past each other about something deeply important, trusting the complexity of the situation and the reader's discomfort."}, {"front": "What is the unspoken irony of Aunt Julia singing 'Arrayed for the Bridal'?", "back": "An elderly woman, whose life has narrowed to this annual party, sings a bride's song, highlighting her age, frailty, and a life whose 'bridal' moments are long past."}, {"front": "What detail does Gabriel notice during Aunt Julia's song, and what does it foreshadow?", "back": "He notices 'the haggard look on his aunt's face,' and evidence of age and frailty, which he later remembers when he imagines attending her funeral in Part Two."}, {"front": "How does the conversation about 'the old singers' reinforce the theme of paralysis?", "back": "The guests' nostalgia for incomparably better past singers and companies signifies 'paralysis made audible,' where they believe the best music has already been heard and nothing in the present can match the past."}, {"front": "Why does Joyce lavish attention on the description of the supper table?", "back": "He is describing a household, not just a meal. The abundance signifies the Morkan sisters' hospitality as both genuine warmth and a compulsive performance to prove the old standards hold and nothing has been lost."}, {"front": "Describe the significant moment when Gabriel notices Gretta on the stairs.", "back": "Late in the party, Gabriel sees Gretta standing still on the stairs, listening to a song from another room, unaware of being watched."}, {"front": "Why is Gabriel's observation of Gretta on the stairs a pivotal moment for his character?", "back": "It's the first time he responds to another person with a sudden rush of 'tenderness and desire'—seeing her 'as if for the first time,' rather than through his usual anxiety and self-consciousness."}, {"front": "What was the dominant public issue in Ireland around 1914, when *Dubliners* was published?", "back": "The question of Irish independence—political, cultural, and linguistic—from British rule dominated public life."}, {"front": "How does Gabriel's intelligence primarily manifest, according0 to the text?", "back": "His intelligence is real (well-read, thoughtful) but 'turned inward,' mainly used to manage his own anxiety rather than to understand other people."}, {"front": "What does the cultural preference for the past over the future indicate about the society Joyce is depicting?", "back": "It indicates a culture that has collectively, and often subconsciously, decided that the past is preferable to the future, contributing to the condition of paralysis."}, {"front": "Give an example of Gabriel's 'small failures' mentioned early in the story, besides the one with Lily.", "back": "His nervousness about his after-dinner speech and whether his literary references will be understood by his audience are early indications of his anxieties and social failures."}, {"front": "How do Gabriel's interactions with Lily and Miss Ivors differ in their impact on him?", "back": "Lily's bitterness surprises Gabriel, leading to a superficial recovery (money). Miss Ivors's challenge threatens him directly as an intellectual equal, exposing his discomfort with avoided personal and political questions."}, {"front": "Why does Joyce avoid taking sides in the Miss Ivors-Gabriel exchange?", "back": "Joyce trusts the 'complexity of the situation' more than any clear-cut argument, presenting two valid but conflicting perspectives without offering a simple resolution, allowing the reader to sit with the discomfort."}, {"front": "What does the 'music box' metaphor suggest about the guests and rituals at the Morkan party?", "back": "It suggests that the guests 'perform their roles' in a beautiful, intricate, but ultimately 'incapable of playing a different tune' way, highlighting the rigid, unchanging nature of the social ceremony."}, {"front": "How does Gabriel's refusal to visit the Aran Islands exemplify 'paralysis'?", "back": "It's a form of paralysis because he declines to engage with a place associated with traditional, authentically Irish culture, reflecting his resistance to a particular set of commitments to his homeland."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
