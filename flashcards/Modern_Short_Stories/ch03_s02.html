<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading the Modern Short Story &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Modern_Short_Stories">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is Lily in 'The Dead' and what is her role at the Misses Morkan's annual dance?", "back": "Lily is the caretaker's daughter, working as a housemaid. She is described as 'run off her feet' attending to guests, taking coats, and answering the door."}, {"front": "Describe the Misses Morkan's annual dance.", "back": "It is a long-standing tradition, a 'great affair' held at their home on Usher's Island. It's attended by family, old friends, and pupils of Mary Jane and Julia's choir members."}, {"front": "What is Mary Jane Morkan's primary role and contribution to the household?", "back": "Mary Jane is the Morkan sisters' niece and the 'main prop of the household.' She is an organist at Haddington Road and gives annual pupils' concerts."}, {"front": "Who are Miss Kate and Miss Julia Morkan, and what are their initial concerns on the night of the dance?", "back": "They are the elderly hostesses of the dance, aunts to Mary Jane and Gabriel. Their primary concerns are Gabriel's late arrival and the potential for Freddy Malins to turn up drunk ('screwed')."}, {"front": "What is Gabriel Conroy's initial excuse for his and Gretta's late arrival?", "back": "Gabriel tells Lily that his wife, Gretta, 'takes three mortal hours to dress herself.'"}, {"front": "Provide a physical description of Gabriel Conroy from the text.", "back": "Gabriel is a 'stout tallish young man' with a 'high colour' on his cheeks and 'hairless face.' He wears glasses with 'polished lenses and bright gilt rims' and has 'glossy black hair parted in the middle.'"}, {"front": "What does Gabriel offer Lily, and how does she react to his gesture?", "back": "Gabriel offers Lily a coin, saying 'it's Christmas-time.' Lily initially refuses, crying 'O no, sir! Really, sir, I wouldn’t take it,' but eventually accepts."}, {"front": "What bitter remark does Lily make to Gabriel, and what does it suggest about her view of men?", "back": "Lily says, 'The men that is now is only all palaver and what they can get out of you.' This reveals a cynical and possibly painful past experience with men, suggesting distrust and resentment."}, {"front": "How does Lily's sudden retort affect Gabriel?", "back": "Gabriel is 'discomposed' and 'coloured as if he felt he had made a mistake.' Her remark casts a 'gloom over him' and makes him question his own actions and his planned speech."}, {"front": "What internal conflict does Gabriel experience regarding his speech for the party?", "back": "He worries that his chosen quotation from Robert Browning will be 'above the heads of his hearers,' fearing they will think he is 'airing his superior education' and that he will 'fail with them' as he felt he had with Lily."}, {"front": "What type of quotation does Gabriel consider more appropriate for his speech than Robert Browning?", "back": "He thinks a quotation 'from Shakespeare or from the Melodies' would be better, as they would be more recognizable to his audience."}, {"front": "Compare the physical appearance and temperament of Aunt Kate and Aunt Julia.", "back": "Aunt Julia is an inch taller, grey-haired, and has a 'large flaccid face' with 'slow eyes and parted lips,' giving her a somewhat lost appearance. Aunt Kate is 'more vivacious,' with a healthier face full of 'puckers and creases,' and 'ripe nut colour' hair."}, {"front": "Why is Gabriel considered the 'favourite nephew' by the Morkan sisters?", "back": "He is the son of their 'dead elder sister, Ellen,' making him a significant family connection and likely a source of pride or comfort for the elderly aunts."}, {"front": "What is Gabriel's stance on taking a cab home versus walking, and what is Gretta's opinion?", "back": "Gabriel insists on walking to avoid Gretta catching another cold, having had a bad experience last year. Gretta, however, claims she 'would walk home in the snow if she were let' and finds his fussiness amusing."}, {"front": "What are 'goloshes,' and why do they become a topic of discussion?", "back": "Goloshes are 'guttapercha things' (overshoes) worn over boots to protect against wet weather. They become a topic because Gabriel insists Gretta wear them, and the aunts find his insistence, and the word itself, a source of amusement."}, {"front": "How does Gabriel try to justify the wearing of goloshes, particularly to Aunt Julia?", "back": "Gabriel states that 'everyone wears them on the continent,' implying it's a modern European custom, though Gretta finds the word amusing because it reminds her of Christy Minstrels."}, {"front": "What does Gretta tease Gabriel about regarding his fussiness?", "back": "She playfully complains about his fussiness, mentioning 'green shades for Tom’s eyes at night and making him do the dumb-bells, and forcing Eva to eat the stirabout,' and his insistence on her wearing goloshes."}, {"front": "Where do Gabriel and Gretta plan to stay for the night after the dance?", "back": "They have booked a room 'in the Gresham' (Gresham Hotel) rather than returning home to Monkstown."}, {"front": "What observation does Aunt Kate make about Lily's character lately?", "back": "Aunt Kate remarks, 'I don’t know what has come over her lately. She’s not the girl she was at all,' implying a change in Lily's demeanor or spirit."}, {"front": "Who is Freddy Malins, and why are the aunts particularly anxious about his arrival?", "back": "Freddy Malins is an expected guest who 'always came late.' The aunts are 'dreadfully afraid that Freddy Malins might turn up screwed' (drunk), fearing Mary Jane's pupils might see him in that state."}, {"front": "Where do the Misses Morkan live, and what is the history of their residence?", "back": "They live in a 'dark gaunt house on Usher’s Island,' having moved there 'thirty years ago' after the death of their brother Pat, renting the upper part from Mr. Fulham, the corn-factor."}, {"front": "What details in the text suggest the Morkan sisters' lifestyle is 'modest' but emphasizes 'eating well'?", "back": "The text states 'Though their life was modest they believed in eating well; the best of everything: diamond-bone sirloins, three-shilling tea and the best bottled stout.'"}, {"front": "How is the snow described on Gabriel's arrival?", "back": "A 'light fringe of snow lay like a cape on the shoulders of his overcoat and like toecaps on the toes of his goloshes.' A 'cold, fragrant air' also escaped from his snow-stiffened coat."}, {"front": "What does Gabriel infer about the cultural level of the party guests based on his internal monologue about his speech?", "back": "He perceives their 'grade of culture differed from his,' believing they would not understand poetry by Robert Browning and would think he was 'airing his superior education.'"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
