<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading the Modern Short Story &mdash; Chapter 3, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Modern_Short_Stories">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who are the Misses Morkan, and what event are they hosting?", "back": "Miss Kate and Miss Julia Morkan are elderly sisters who host their annual dance, a major social event for their family and friends."}, {"front": "Describe Lily's role and her initial state at the beginning of the story.", "back": "Lily is the caretaker's daughter and housemaid. At the story's opening, she is 'literally run off her feet' attending to arriving guests."}, {"front": "Why are the Morkan sisters particularly anxious about two specific guests?", "back": "They are worried about Gabriel and his wife being late, and especially concerned that Freddy Malins might arrive 'screwed' (drunk), which would embarrass them, particularly with Mary Jane's pupils present."}, {"front": "What is Mary Jane Morkan's relationship to the aunts, and what is her primary contribution to the household?", "back": "Mary Jane is their only niece. She is the 'main prop of the household' because she is an organist and a music teacher for well-to-do families."}, {"front": "How long have the Morkan sisters and Mary Jane lived in the house on Usher's Island, and what prompted the move?", "back": "They have lived there for 'a good thirty years,' since leaving Stoney Batter after the death of their brother Pat."}, {"front": "Describe Gabriel Conroy's initial interaction with Lily when he arrives.", "back": "Gabriel attempts a friendly, jocular tone by asking if she still goes to school and teasing her about a potential wedding, which Lily resents."}, {"front": "What is Lily's bitter retort to Gabriel, and what does it reveal about her perspective?", "back": "She replies, 'The men that is now is only all palaver and what they can get out of you,' revealing her cynicism and possibly a past negative experience with men."}, {"front": "How does Gabriel react internally to Lily's comment?", "back": "He is 'discomposed,' feels he made a mistake, and the comment casts 'a gloom over him,' leading him to self-doubt about his impending speech."}, {"front": "What details about Gabriel's appearance are provided, and what might they suggest about his character?", "back": "He is described as stout, tallish, with 'high colour' on his cheeks, a hairless face, and polished glasses. This suggests a somewhat refined, perhaps self-conscious, intellectual."}, {"front": "Why does Gabriel give Lily money, and what is her reaction?", "back": "He gives her money for Christmas, saying 'Just here's a little.' Lily initially refuses, but accepts after he insists and moves away."}, {"front": "What internal conflict does Gabriel experience regarding his speech?", "back": "He worries his quotation from Robert Browning will be 'above the heads of his hearers' and that he will 'make himself ridiculous' due to their differing 'grade of culture.'"}, {"front": "Contrast Aunt Kate and Aunt Julia's personalities as described in their physical", "back": "Aunt Julia appears slow and somewhat lost ('flaccid face,' 'slow eyes'), while Aunt Kate is described as more 'vivacious,' with a healthier face of 'puckers and creases' like a shrivelled red apple."}, {"front": "What is Gabriel's relationship to Aunt Kate and Aunt Julia?", "back": "He is their favorite nephew, the son of their deceased elder sister, Ellen."}, {"front": "Why do Gabriel and Gretta decide not to take a cab home to Monkstown?", "back": "They had a bad experience the previous year where Gretta caught a 'dreadful cold' due to the rattling windows and cold east wind."}, {"front": "What are 'goloshes,' and why do they become a topic of humorous discussion among Gabriel and his aunts?", "back": "Goloshes are guttapercha overshoes worn over boots in wet weather. They become a joke because Gabriel insists Gretta wear them, showing his fussiness, and Aunt Julia doesn't know what they are."}, {"front": "What does Gretta's playful teasing of Gabriel about his 'solicitude' reveal about their relationship?", "back": "It shows a comfortable, affectionate relationship where teasing is common, and Gretta understands Gabriel's overprotective and particular nature."}, {"front": "What observation does Aunt Kate make about Lily's recent behavior?", "back": "Aunt Kate notes, 'There's that Lily, I'm sure I don't know what has come over her lately. She's not the girl she was at all.'"}, {"front": "How do the Morkan sisters manage the ladies' dressing room for the party?", "back": "They converted the upstairs bathroom into a ladies' dressing-room, indicating their practicality and planning for the annual event."}, {"front": "What does the", "back": "It suggests a blend of frugality and a commitment to quality and comfort within their means, perhaps reflecting a desire to maintain appearances and tradition."}, {"front": "What literary device is used in the", "back": "This is an example of a simile, using 'like' to compare the snow to a cape and toecaps."}, {"front": "Where has Gabriel booked a room for himself and Gretta for the night of the dance?", "back": "He has taken a room in the Gresham Hotel."}, {"front": "Who will look after Gabriel and Gretta's children while they are at the dance?", "back": "Bessie, their caretaker, will look after them."}, {"front": "How do the aunts greet Gabriel and Gretta upon their arrival upstairs?", "back": "Both aunts kiss Gretta, express concern that she must be 'perished alive' from the cold, and then greet Gabriel."}, {"front": "What is the overall tone or atmosphere established in the opening scenes of the party?", "back": "The opening establishes a bustling, slightly chaotic, yet generally festive and warm atmosphere, tinged with the aunts' fussiness and underlying anxieties about appearances."}, {"front": "What does Gabriel's internal struggle with his speech, particularly his concern about quoting Robert Browning, reveal about his perception of himself versus others?", "back": "It reveals his intellectual snobbery and self-consciousness, as he believes his 'superior education' makes him distinct from his guests, but also his anxiety about being misunderstood or appearing ridiculous."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
