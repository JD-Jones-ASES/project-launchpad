<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading the Modern Short Story &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Modern_Short_Stories">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does Gurov initially expect his affair with Anna to be?", "back": "He expects it to be a fleeting, typical affair, a diversion with an 'inferior race,' devoid of deep emotional consequence, easily forgotten upon his return to Moscow."}, {"front": "At what point in the story does Gurov begin to realize the affair with Anna is something more significant?", "back": "His realization is gradual, beginning with moments like Anna's deep emotional distress after their first intimacy and intensifying as he finds himself unable to forget her after returning to Moscow."}, {"front": "How does Chekhov initially portray Gurov's view of women?", "back": "Chekhov tells us early on that Gurov considers women 'the inferior race,' reflecting his cynical, dismissive, and objectifying attitude towards them."}, {"front": "What is the literary effect of Chekhov presenting Gurov's cynicism about women before completely transforming him?", "back": "It creates a powerful ironic contrast, highlighting the depth of Gurov's transformation and emphasizing that genuine human connection can dismantle deeply ingrained prejudices. It's a deliberate setup to show profound character development."}, {"front": "Is Chekhov's portrayal of Gurov's transformation from cynic to lover ironic? Explain.", "back": "Yes, it is deeply ironic. Gurov's initial cynical view of women is completely contradicted by his profound love for Anna, who he initially saw as just another conquest, highlighting the irony of his initial judgments."}, {"front": "What does Anna's husband primarily symbolize in 'The Lady with the Dog'?", "back": "He symbolizes the oppressive, mundane, and unfulfilling societal conventions and domestic life that trap both Anna and Gurov, representing a barrier to their authentic happiness."}, {"front": "Is Anna's husband depicted as a villain in the story, or something more complex?", "back": "He is more complex than a simple villain. Chekhov keeps him largely offstage and provides little detail, suggesting he represents a societal force or circumstance (the 'other' lives) rather than a malicious individual."}, {"front": "What is the significance of Chekhov keeping Anna's husband almost entirely offstage?", "back": "It emphasizes that the central conflict is not with him as an individual, but with the societal structures and the internal struggles of Anna and Gurov themselves, making him a symbol of their confined lives."}, {"front": "What 'most complicated and difficult part' do Anna and Gurov face at the story's end?", "back": "They face the challenge of living a genuine, loving relationship in secret, navigating societal disapproval, and determining how to build a future together when their current lives are intertwined with others."}, {"front": "Why does Chekhov end 'The Lady with the Dog' without showing the resolution of Anna and Gurov's predicament?", "back": "Chekhov focuses on the realization and transformation, not the resolution. The open ending emphasizes the complexity and ongoing difficulty of their situation, reflecting the messy reality of life and love beyond a neat narrative conclusion."}, {"front": "What would be gained or lost if 'The Lady with the Dog' continued for another ten pages to show their future?", "back": "Gained: A clearer resolution to their logistical problems. Lost: The powerful sense of raw, unresolved human struggle, and the focus on the moment of profound personal awakening rather than neat plot mechanics."}, {"front": "How does the setting of Yalta reflect the characters' initial emotional states?", "back": "Yalta, a resort town, reflects their initial carefree, transient attitudes—a place for temporary escape and casual encounters, aligning with Gurov's expectation of a fleeting affair and Anna's desire for diversion."}, {"front": "How does the setting of Moscow contribute to Gurov's emotional journey?", "back": "Moscow, his home and routine, initially highlights his loneliness and the hollowness of his ordinary life. It becomes a place of yearning for Anna, contrasting with the vibrant intimacy and freedom he felt in Yalta."}, {"front": "How does Anna's provincial town symbolize her existence before Gurov?", "back": "Her provincial town symbolizes her confinement, the suffocating routine, and the mediocrity of her marriage, reflecting her emotional and intellectual stagnation and longing for something more."}, {"front": "What is the primary function of physical settings in 'The Lady with the Dog'?", "back": "Settings function as more than backdrops; they reflect and amplify the characters' emotional states, societal constraints, and the evolving nature of their relationship."}, {"front": "What theme is explored when Gurov tries to share his profound experience but is met with a remark about sturgeon?", "back": "This illustrates the theme of the 'invisible interior,' where deep, personal, life-altering experiences are often incomprehensible or invisible to those outside the individual's inner world, leading to a sense of isolation."}, {"front": "What does Gurov learn about himself through his affair with Anna?", "back": "He learns that his life has been empty and unfulfilling, that true happiness lies in genuine human connection, and that he is capable of deep, selfless love, shattering his former cynical worldview."}, {"front": "What is the significance of the 'little dog' in 'The Lady with the Dog'?", "back": "The dog serves as a memorable identifier for Anna, making her stand out to Gurov initially. It also symbolizes her perceived innocence and vulnerability in the eyes of others."}, {"front": "What external conflict do Anna and Gurov face throughout the story?", "back": "They face the conflict of societal judgment and the practical difficulties of maintaining a relationship while both are married to other people, constrained by social norms and their existing lives."}, {"front": "What internal conflict does Gurov experience throughout the story?", "back": "Gurov struggles between his ingrained cynicism and his burgeoning, undeniable love for Anna, leading to a profound internal transformation and a re-evaluation of his life's values."}, {"front": "How does the story's ending, despite its lack of resolution, suggest hope for Anna and Gurov?", "back": "The ending suggests hope through their shared commitment to finding a way forward, the depth of their mutual love, and their recognition that 'the most complicated and difficult part' is not insurmountable when faced together."}, {"front": "What kind of love is depicted between Anna and Gurov by the story's conclusion?", "back": "Their love evolves from a casual affair into a profound, spiritual, and deeply committed bond, characterized by empathy, shared understanding, and a mutual desire to overcome obstacles together."}, {"front": "Why is Anna's 'voice' or inner perspective often obscured in the story, particularly through Gurov's early impressions?", "back": "Gurov's initial cynicism and patriarchal assumptions cause him to project his own views onto Anna, preventing him from truly understanding her inner world and deeper motivations until his own transformation."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
