<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading the Modern Short Story &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Modern_Short_Stories">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is Michael Furey, and what does he initially represent to Gretta in 'The Dead'?", "back": "Michael Furey was a young man Gretta knew and loved in Galway. He died young, possibly from exposure after standing outside her window in the rain. To Gretta, he represents a passionate, sacrificial, and authentic love from her youth."}, {"front": "How does Michael Furey's memory impact Gabriel when he learns of it?", "back": "Michael Furey's memory represents a rival to Gabriel, highlighting his own perceived inadequacies and the lack of passionate intensity in his marriage. Gabriel feels overshadowed by a dead man and confronted with a powerful, hidden part of his wife's past."}, {"front": "What is the significance of Gretta having carried the memory of Michael Furey privately for years?", "back": "Gretta's private memory reveals a deep inner life and personal history unknown to Gabriel, underscoring their emotional distance. It shows a powerful, formative experience that shaped her, independent of her life with Gabriel."}, {"front": "What does it signify for Gabriel to encounter the memory of Michael Furey only now, at the end of the story?", "back": "Encountering this memory now shatters Gabriel's self-perception, forcing him to confront his own self-absorption, the true nature of his marriage, and the ephemeral nature of life and love, precipitating his profound epiphany."}, {"front": "Describe the complex emotional response Gabriel experiences at the very end of 'The Dead'.", "back": "Gabriel feels a mixture of shame, tenderness, grief, and a sense of almost spiritual peace. His individual ego dissolves into a larger contemplation of mortality, human connection, and the universal experience of life and death."}, {"front": "Can Gabriel's final emotional state be encapsulated by a single word, or does it resist such naming?", "back": "It largely resists a single word. While elements like shame and grief are present, the overall feeling is a complex, almost transcendent blend that moves beyond simple categorization, touching on profound existential recognition rather than a definable emotion."}, {"front": "What does the snow in the final paragraph, falling on 'the living and the dead' equally, symbolize?", "back": "The snow symbolizes the universalizing force of death and nature, unifying all existence. It suggests that past and present are interconnected, and that the living and the dead are part of a continuous, shared human experience across Ireland."}, {"front": "Why does Joyce choose the image of the falling snow to conclude 'The Dead'?", "back": "Joyce uses the snow to evoke a sense of profound melancholy, unity, and the pervasive influence of the past. It provides a visual metaphor for the story's themes of mortality, the interconnectedness of all life, and the quiet, inevitable passage of time."}, {"front": "Is Gabriel a 'better' or 'worse' person by the end of 'The Dead'?", "back": "It's not a question of 'better' or 'worse.' Gabriel undergoes a profound transformation, moving from self-delusion and superficiality to a more honest and empathetic understanding of himself, his wife, and the human condition, which is neither purely good nor bad."}, {"front": "How does Gabriel become 'more honest' by the end of the story, even if he isn't necessarily happier?", "back": "Gabriel becomes more honest by shedding his intellectual pretensions and confronting his own emotional inadequacies and mortality. He sees himself, his marriage, and the fleeting nature of life with a new, unvarnished clarity, even if this realization brings sorrow rather than joy."}, {"front": "Compare the nature of Gabriel's epiphany in 'The Dead' to Gurov's moment of change in Chekhov's 'The Lady with the Dog.' What is similar?", "back": "Both Gabriel and Gurov experience a profound, unavoidable self-discovery that shatters their previous perceptions. They realize the superficiality of their lives, the emotional shallowness of their relationships, and the existence of a deeper, more authentic emotional reality they had ignored."}, {"front": "What is different about how Joyce and Chekhov handle the aftermath of their protagonists' moments of recognition?", "back": "Joyce's ending for Gabriel is one of dissolution and resignation into a universal human experience of death and memory, without a clear path forward for personal change. Chekhov's ending for Gurov, while melancholic, suggests a potential for future, more meaningful action and a desire to forge a new life with Anna."}, {"front": "When rewriting the final paragraph of 'The Dead' in plain prose (no imagery, repetition, or rhythm), what is primarily lost?", "back": "The primary loss is the evocative power of Joyce's imagery, rhythm, and repetition. The plain prose version loses the emotional depth, symbolic resonance, musicality, and the ability to convey the profound, almost spiritual, atmosphere of universal mortality and connection."}, {"front": "What does the comparison between Joyce's original prose and a 'plain' version of the final paragraph reveal about Joyce's writing style?", "back": "It reveals that Joyce's prose is highly deliberate and functional; his rhythm, imagery, and repetition actively *perform* the story's themes. They convey the melancholic universality, the interconnectedness of life and death, and the profound emotional impact that mere facts cannot achieve."}, {"front": "If Gabriel were to write an unsent letter to Gretta the morning after the party, what would he most likely want to convey about his newfound understanding?", "back": "He would likely want to express his regret for his past self-absorption, his profound realization of her inner life, the depth of her past loves, and his own mortality. He might express a newfound tenderness and a recognition of their shared humanity and suffering."}, {"front": "What might Gabriel find himself unable to express in an unsent letter to Gretta about his epiphany?", "back": "He would struggle to articulate the full, ineffable scope of his existential realization—the feeling of his soul swooning, the dissolving of his identity into a universal experience of death and memory. The most profound, unnameable aspects of his epiphany would remain unspoken."}, {"front": "What does the concept of an 'unsent letter' reveal about the gap between Gabriel's understanding and his ability to communicate it to Gretta?", "back": "The unsent letter highlights the profound chasm between internal understanding and external expression. Gabriel's epiphany is deeply personal and existential, difficult to translate into direct communication, especially given their existing emotional distance and the ineffable nature of his insights."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
