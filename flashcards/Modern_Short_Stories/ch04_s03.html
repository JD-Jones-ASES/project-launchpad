<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading the Modern Short Story &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Modern_Short_Stories">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Gabriel's initial observation of Gretta when he first sees her on the staircase?", "back": "He sees her in a dark part of the hall, near the top of the first flight, in shadow. He notices her stillness and the terracotta and salmon-pink panels of her skirt, which appear black and white in the dim light."}, {"front": "How does Gabriel interpret Gretta's pose on the staircase, and what title does he imagine for a painting of her?", "back": "He sees grace and mystery in her attitude, as if she were a symbol of something. He imagines a painting called 'Distant Music'."}, {"front": "Who is singing the song that captures Gretta's attention, and what is his initial reason for not wanting to sing?", "back": "Bartell D'Arcy is singing. He claims he has a dreadful cold and is as hoarse as a crow, refusing to sing all night."}, {"front": "Recite the lines of the song Bartell D'Arcy sings that express grief.", "back": "O, the rain falls on my heavy locks And the dew wets my skin, My babe lies cold."}, {"front": "What is the title of the song Bartell D'Arcy sings that deeply affects Gretta?", "back": "The song is called 'The Lass of Aughrim'."}, {"front": "How does Gretta react to hearing 'The Lass of Aughrim'?", "back": "She seems unaware of the general conversation around her, her cheeks gain color, and her eyes shine. She specifically asks Bartell D'Arcy for the name of the song."}, {"front": "Describe the atmosphere and weather conditions as Gabriel and Gretta leave the Morkan's house in the early morning.", "back": "The morning is still dark with a dull yellow light, the sky seems to be descending, and it's slushy underfoot with patches of snow on roofs and railings. The lamps burn redly, and the Four Courts appear menacing."}, {"front": "How does Gretta's physical presence change from when Gabriel first sees her on the stairs at the party to when she walks with Mr. D'Arcy outside?", "back": "On the stairs, she has 'grace and mystery.' Outside, walking with Mr. D'Arcy, holding her skirt from the slush and with shoes in a parcel, she 'had no longer any grace of attitude.'"}, {"front": "Describe Gabriel's internal emotional state as he walks behind Gretta and Mr. D'Arcy in the slushy morning.", "back": "His eyes are bright with happiness, his blood is bounding, and his thoughts are 'proud, joyful, tender, valorous.' He longs to run after her, defend her, and be alone with her."}, {"front": "What specific memories of their 'secret life together' flood Gabriel's mind during the walk?", "back": "He recalls a heliotrope envelope, birds twittering, a sunny curtain, placing a ticket in her glove, and standing with her looking at a man making bottles in a furnace."}, {"front": "What is Gabriel's central desire regarding his relationship with Gretta as he reminisces in the cab?", "back": "He longs to recall their moments of ecstasy to her, hoping to make her forget the years of their 'dull existence' and remember only those passionate times."}, {"front": "Quote the significant line Gabriel wrote in an old letter to Gretta, revealing his feelings about words and her name.", "back": "Why is it that words like these seem to me so dull and cold? Is it because there is no word tender enough to be your name?"}, {"front": "What does Gabriel anticipate happening once he and Gretta are alone in their hotel room?", "back": "He imagines calling her softly, her perhaps not hearing at once while undressing, and then something in his voice striking her, causing her to turn and look at him."}, {"front": "What superstition is mentioned regarding crossing O'Connell Bridge, and how does Gabriel playfully respond?", "back": "The superstition is, 'They say you never cross O'Connell Bridge without seeing a white horse.' Gabriel responds, 'I see a white man this time,' referring to the snow-covered statue of Dan O'Connell."}, {"front": "How does Gabriel interact with the cab driver, and what does this reveal about him?", "back": "He jumps out, insists on paying despite Mr. D'Arcy's protest, and gives the driver a shilling over his fare. He also cordially wishes him a prosperous New Year. This shows Gabriel's generosity and desire to appear gracious and affluent."}, {"front": "How does Gretta's light touch on Gabriel's arm after the party affect him, specifically concerning his desire?", "back": "The first touch of her body, described as 'musical and strange and perfumed,' sends 'a keen pang of lust' through him, kindling many memories."}, {"front": "What metaphorical description does Gabriel use to express his feeling of escape with Gretta at the hotel door?", "back": "He feels 'they had escaped from their lives and duties, escaped from home and friends and run away together with wild and radiant hearts to a new adventure.'"}, {"front": "Describe Gretta's posture and appearance as she ascends the stairs to the hotel room.", "back": "She mounts with her head bowed, her 'frail shoulders curved as with a burden,' and her skirt girt tightly about her."}, {"front": "What physical manifestation of Gabriel's suppressed desire is described as they climb the stairs?", "back": "His arms are trembling with desire to seize her, and only the stress of his nails against the palms of his hands holds 'the wild impulse of his body in check.'"}, {"front": "What specific lighting conditions in the hotel room does Gabriel request, and why?", "back": "He refuses the electric light and asks the porter to remove his candle, stating, 'We don’t want any light. We have light enough from the street.' He desires a more intimate, shadowy atmosphere provided by the ghostly street light."}, {"front": "What is the porter's reaction to Gabriel's request about the light in the hotel room?", "back": "The porter is surprised by such a novel idea, taking up his candle slowly before leaving."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
