<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading the Modern Short Story &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Modern_Short_Stories">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is Dmitri Dmitritch Gurov and where is he introduced?", "back": "Gurov is a central character in \"The Lady with the Dog,\" introduced as a man under forty, on holiday in Yalta, who takes an interest in new arrivals."}, {"front": "Describe Gurov's family situation and his feelings towards his wife.", "back": "Gurov is married with a twelve-year-old daughter and two sons. He secretly considers his wife unintelligent, narrow, and inelegant, is afraid of her, and dislikes being at home."}, {"front": "What is Gurov's general attitude towards women, despite his frequent infidelities?", "back": "Gurov frequently calls women \"the lower race,\" yet he cannot go long without their company. He feels free and himself with women, but bored and uncommunicative with men."}, {"front": "What \"attractive and elusive\" quality did Gurov possess?", "back": "Gurov had an attractive and elusive quality in his appearance, character, and whole nature that allured women and disposed them in his favor."}, {"front": "How does Gurov's past experience with affairs influence his perspective on new relationships?", "back": "His bitter experience taught him that intimacies, initially charming, inevitably become complex and unbearable problems. However, he consistently forgets this lesson with each new \"interesting woman.\""}, {"front": "How is Anna Sergeyevna first described when Gurov notices her?", "back": "She is described as a fair-haired young lady of medium height, wearing a béret, accompanied by a white Pomeranian dog, walking alone on the sea-front."}, {"front": "What initial observation does Gurov make about Anna Sergeyevna that prompts him to pursue an acquaintance?", "back": "He reflects that \"If she is here alone without a husband or friends, it wouldn't be amiss to make her acquaintance.\""}, {"front": "How does Gurov initiate conversation with Anna Sergeyevna?", "back": "He initiates conversation by beckoning coaxingly to her Pomeranian dog, which prompts her to speak."}, {"front": "What information does Gurov share about himself during his first conversation with Anna Sergeyevna?", "back": "He tells her he is from Moscow, has an Arts degree, works in a bank, once trained as an opera singer, and owns two houses in Moscow."}, {"front": "What does Gurov learn about Anna Sergeyevna during their first extended conversation?", "back": "He learns she grew up in Petersburg, has lived in S—- since her marriage two years prior, is staying another month in Yalta, and her husband might fetch her. Her name is Anna Sergeyevna."}, {"front": "What specific details about Anna Sergeyevna cause Gurov to perceive \"something pathetic about her\" at the end of Section I?", "back": "He notes her diffidence and angularity, perceiving her as an inexperienced schoolgirl, likely facing male attention with a \"secret motive\" for the first time."}, {"front": "Describe the setting and circumstances leading up to Gurov and Anna Sergeyevna's first intimate encounter in Section II.", "back": "A week after meeting, on a sultry holiday evening, they are on the groyne watching a steamer. After the crowd disperses, Gurov spontaneously embraces and kisses her."}, {"front": "How does Gurov react immediately after kissing Anna Sergeyevna?", "back": "He immediately looks around him, anxiously wondering whether anyone had seen them, suggesting a concern for discretion or consequences."}, {"front": "How does Anna Sergeyevna react emotionally and physically to their intimacy?", "back": "She reacts gravely, feeling it was \"her fall.\" Her face dropped and faded, hair hung mournfully, and she mused dejectedly, like \"the woman who was a sinner.\""}, {"front": "What phrases does Anna Sergeyevna use to express her self-reproach after the encounter?", "back": "She states, \"It's wrong,\" \"You will be the first to despise me now,\" and \"I am a bad, low woman; I despise myself and don't attempt to justify myself.\""}, {"front": "What does Anna Sergeyevna reveal about her marriage and her motivation for seeking something more?", "back": "She reveals she married at twenty to a \"flunkey\" and was \"tormented by curiosity,\" wanting \"something better\" and a desire \"to live!\""}, {"front": "How does Gurov internally respond to Anna Sergeyevna's expression of remorse and self-condemnation?", "back": "He feels bored and irritated by her \"naïve tone\" and \"remorse, so unexpected and inopportune,\" indicating a lack of empathy."}, {"front": "How does Gurov categorize women in his mind, based on his past experiences?", "back": "He thinks of them as: 1) careless, good-natured women; 2) women like his wife, loving without genuine feeling; and 3) beautiful, cold, domineering women with a \"rapacious expression.\""}, {"front": "What makes Anna Sergeyevna's reaction to intimacy different from other women Gurov has known?", "back": "She displayed \"diffidence, the angularity of inexperienced youth, an awkward feeling,\" and \"consternation,\" indicating genuine distress rather than a casual or calculating demeanor."}, {"front": "What is the significance of the \"white Pomeranian dog\" in the story's initial presentation of Anna Sergeyevna?", "back": "The dog gives her the descriptive nickname \"the lady with the dog,\" making her recognizable and serving as Gurov's initial pretext to engage her in conversation."}, {"front": "What do Gurov's secret opinion of his wife and her use of \"phonetic spelling\" for her reveal about their relationship?", "back": "It highlights his intellectual contempt for her despite her self-proclaimed intellect, revealing a deep underlying marital discord and his disdain."}, {"front": "What does Yalta represent for Gurov and Anna Sergeyevna in this initial section?", "back": "For Gurov, it's a place for seeking fleeting adventures and diversion. For Anna, it's a temporary escape from a dull marriage, a place where she hopes to experience a different kind of life."}, {"front": "How does Gurov's dismissal of \"provincials\" finding Yalta dull contrast with his own actions?", "back": "He criticizes the fashionable complaint of Yalta's dullness, yet his own pursuit of fleeting romance suggests he too seeks diversion from the monotony or problems of his regular life."}, {"front": "What does Anna Sergeyevna's confessed ignorance about her husband's profession suggest about her marriage?", "back": "It suggests a lack of genuine connection, interest, or intimacy in her marriage, reinforcing her feeling of being unfulfilled and \"deceiving herself.\""}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
