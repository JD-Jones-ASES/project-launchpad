<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading the Modern Short Story &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Modern_Short_Stories">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central, unspoken conflict between the couple in Ernest Hemingway's 'Hills Like White Elephants'?", "back": "The couple is subtly arguing about whether the girl, Jig, should have an abortion, which is never explicitly named but heavily implied."}, {"front": "What does the man (the American) primarily want regarding the 'operation' in 'Hills Like White Elephants'?", "back": "He wants Jig to have the abortion, presenting it as a simple procedure that will restore their previous carefree lifestyle without the complication of a child."}, {"front": "What does the girl (Jig) appear to desire throughout 'Hills Like White Elephants', beyond what she explicitly states?", "back": "Jig struggles between her desire to please the man and maintain their relationship, and a burgeoning desire for a different life, possibly involving motherhood, and for genuine affection and understanding."}, {"front": "How does the man's language in 'Hills Like White Elephants' reveal his true desire for the abortion, despite his claims of neutrality?", "back": "He repeatedly minimizes the procedure ('awfully simple operation,' 'nothing to it'), assures her it will make them 'perfectly happy,' and dismisses her concerns, demonstrating his strong preference."}, {"front": "What is the likely true meaning of Jig's final line, 'I feel fine. There's nothing wrong with me,' in 'Hills Like White Elephants'?", "back": "It is an ironic and resigned statement. It signifies her emotional defeat and decision to comply with the man's wishes for the sake of ending the argument, but at the cost of her own feelings and the potential for a genuine connection."}, {"front": "What does the idiom 'white elephant' symbolize in the context of the story's title and Jig's observation?", "back": "A 'white elephant' is a valuable possession that is difficult to maintain and whose cost exceeds its usefulness. In the story, it symbolizes the unwanted pregnancy as a burden or problem the man wishes to dispose of."}, {"front": "What does the exchange about the 'hills like white elephants' reveal about the couple's relationship and their individual perspectives?", "back": "It highlights a fundamental disconnect. Jig sees the world with imagination and depth, while the man either doesn't share her perception or dismisses it, indicating a lack of mutual understanding and empathy between them."}, {"front": "Describe a key characteristic of Ernest Hemingway's dialogue style, as exemplified in 'Hills Like White Elephants'.", "back": "Hemingway uses sparse, direct, and often repetitive dialogue, leaving much unsaid. He relies heavily on subtext, requiring readers to infer characters' true feelings, motivations, and the underlying tensions of the situation."}, {"front": "In 'Hills Like White Elephants,' how does subtext function as a critical element of the storytelling?", "back": "Subtext is crucial because characters rarely state their true feelings or intentions directly. Readers must interpret unspoken meanings, emotions, and the core conflict from their indirect communication, pauses, and reactions."}, {"front": "Does Jig (the girl) undergo a significant change during the story? If so, what is it?", "back": "Yes, Jig changes from someone who is perhaps considering keeping the baby and wanting genuine happiness, to someone who resigns herself to the man's wishes, leading to a sense of emotional detachment and compliance."}, {"front": "Does the American (the man) undergo a significant change during the story?", "back": "No, the American remains consistent in his desire for Jig to have the abortion and restore their carefree lifestyle, showing little to no shift in his perspective or empathy towards Jig's internal struggle."}, {"front": "Why might Hemingway's dialogue in 'Hills Like White Elephants' be considered 'honest' about how people actually talk, despite its indirectness?", "back": "It reflects the realistic way people often communicate about difficult or taboo subjects – indirectly, using euphemisms, unspoken pressures, and avoiding direct confrontation, mirroring real-life conversational dynamics."}, {"front": "If characters in 'Hills Like White Elephants' said exactly what they meant, would the scene be more 'honest' or just more 'explicit'? Explain the difference.", "back": "It would be more explicit. While being explicit clarifies intentions, the 'honesty' of Hemingway's style lies in its portrayal of the *unspoken complexities* and emotional barriers that often prevent direct communication in real life. Explicit dialogue might simplify this nuance."}, {"front": "What is gained by adding pure narration and interior monologue to a scene originally written in Hemingway's sparse dialogue style?", "back": "Readers would gain direct access to characters' thoughts and emotions, clarifying motivations and internal conflicts that are otherwise left to inference, potentially leading to a more immediate understanding."}, {"front": "What is lost when a Hemingway scene is rewritten with extensive pure narration and interior monologue?", "back": "The tension, ambiguity, and reader engagement that comes from inferring meaning are lost. The subtle art of showing (through dialogue and action) rather than telling (through narration) is diminished, making the experience less immersive and interpretive."}, {"front": "In literature, what is the key distinction between a 'hopeful' ending and a 'resolved' ending?", "back": "A resolved ending provides a clear conclusion to the central conflict, whether positive or negative. A hopeful ending, however, suggests a potential for positive future developments or a sense of optimism, even if the conflict isn't fully concluded."}, {"front": "Is the ending of 'Hills Like White Elephants' (Jig saying she feels fine) more hopeful or less hopeful than resolved? Explain.", "back": "It is generally considered less hopeful. While it offers a form of resolution (Jig's apparent compliance), it is deeply tinged with resignation, emotional loss, and a lack of genuine connection, suggesting a bleak future for the couple's relationship."}, {"front": "What key stylistic elements would be crucial to maintain Hemingway's style when writing a hypothetical 'next stop' conversation for the characters?", "back": "Maintaining Hemingway's style would require dialogue-only, minimal narration, no interior monologue, and letting the reader infer characters' feelings and any decisions from what is said and, more importantly, what is *not* said."}, {"front": "How does the term 'operation' function as a euphemism in the story's dialogue?", "back": "It serves as a euphemism for abortion, allowing the characters to discuss a sensitive, morally charged, and socially taboo topic without directly naming it, reflecting their discomfort and the societal norms of the time."}, {"front": "What role does the desolate train station setting play in 'Hills Like White Elephants'?", "back": "The setting, with its stark contrast between the dry, barren side of the tracks and the fertile, green side, symbolizes the two paths before Jig: the 'operation' (barrenness) or continuing the pregnancy (fertility), and the stark choice she faces."}, {"front": "How does the American view his relationship with Jig, based on his dialogue?", "back": "He seems to value their relationship for its ease, freedom, and ability to travel without commitments, viewing the pregnancy as a threat to this preferred, unburdened lifestyle."}, {"front": "Describe Jig's internal conflict throughout 'Hills Like White Elephants'.", "back": "Jig is torn between her love for the man and her desire to please him by having the abortion, and her nascent desire for a family, a more meaningful life, and her own emotional well-being and sense of authenticity."}, {"front": "What is the significance of the silences and pauses in the dialogue of 'Hills Like White Elephants'?", "back": "They amplify the unspoken tension, allow for contemplation and unstated emotional shifts, and highlight the heavy weight of the unaddressed conflict, forcing the reader to interpret what lies beneath the surface of the words."}, {"front": "What is the significance of the man's repeated use of 'perfectly happy' when discussing the 'operation'?", "back": "His insistence on 'perfectly happy' suggests a forced optimism and a denial of the serious implications of the abortion. It's an attempt to reassure Jig (and perhaps himself) that the procedure is a simple fix that will restore an idealized, uncomplicated past."}, {"front": "What major thematic ideas does Hemingway explore through the unstated conflict in 'Hills Like White Elephants'?", "back": "Hemingway explores themes of communication breakdown, gender roles and power dynamics, sacrifice, existential choice, and the superficiality of modern relationships when confronted with difficult truths."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
