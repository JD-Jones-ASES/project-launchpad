<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading the Modern Short Story &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Modern_Short_Stories">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary narrative technique employed by Ernest Hemingway in 'Hills Like White Elephants'?", "back": "The story is almost entirely dialogue, with minimal narration, requiring the reader to infer much of the meaning."}, {"front": "What literary device, characteristic of Hemingway, is exemplified by the story's reliance on subtext and unstated meaning?", "back": "The 'Iceberg Theory' or 'Theory of Omission,' where only a small portion of the story's meaning is explicitly stated, with the bulk hidden beneath the surface."}, {"front": "Describe the physical setting where the American and Jig are located.", "back": "They are at a train station junction in the hot, dry Ebro valley in Spain, outside a bar, waiting for a train to Madrid."}, {"front": "What is the underlying subject of the couple's conversation, never explicitly named?", "back": "An abortion, which the man refers to as 'an awfully simple operation' or 'just to let the air in'."}, {"front": "What is the literal meaning of the idiom 'white elephant' as it applies to a possession?", "back": "A costly and burdensome possession that is difficult to maintain or dispose of, often acquired as an unwanted gift."}, {"front": "How does Jig's initial comparison of the hills to 'white elephants' function symbolically in the story?", "back": "It subtly introduces the idea of something precious yet unwanted or burdensome, hinting at the unspoken subject of the pregnancy or the decision about the abortion."}, {"front": "What is the man's main argument for Jig to go through with the 'operation'?", "back": "He insists it's 'simple,' 'not really an operation at all,' and that afterward, they will be 'fine' and 'just like we were before,' implying it will solve their problems."}, {"front": "What are Jig's primary concerns regarding the 'operation,' as suggested by her dialogue?", "back": "She worries about the impact on their relationship, the potential loss of 'everything' they could have, and whether happiness can truly be restored afterward."}, {"front": "What does Jig imply about her feelings when she states, 'Everything tastes of licorice. Especially all the things you’ve waited so long for, like absinthe'?", "back": "She expresses a deep sense of disillusionment and bitterness, suggesting that anticipated pleasures or important life experiences often turn out disappointing or unpleasant."}, {"front": "How does the setting, particularly the contrast between the dry, barren side of the valley and the fertile side with grain and trees, symbolize the couple's situation?", "back": "The dry, barren side represents the potential barrenness, sacrifice, or loss of life associated with the abortion, while the fertile side represents the life and growth they might forgo."}, {"front": "What is the significance of the bead curtain in the story?", "back": "It acts as a physical and symbolic barrier, separating the interior (private thoughts, bar) from the exterior (public space, the train), and also symbolizes a division or boundary between the couple's differing perspectives."}, {"front": "Explain what Jig means when she says, 'It isn't ours any more' in response to the man's claims that they 'can have the whole world.'", "back": "She believes that their shared future, innocence, or potential for genuine happiness has been irrevocably diminished or lost due to their current conflict and the gravity of their decision."}, {"front": "What does Jig's repeated request, 'Would you please please please please please please please stop talking?' convey about her emotional state?", "back": "It reveals her deep exhaustion, frustration, and a sense of being unheard or pressured by the man's relentless insistence on the 'simplicity' of the procedure."}, {"front": "How does the man's observation of the 'labels on them from all the hotels where they had spent nights' on their bags contribute to understanding their relationship?", "back": "It suggests a transient, unrooted lifestyle, possibly reflecting their avoidance of commitment, stability, or deeper consequences, including the current dilemma."}, {"front": "What is the effect of the story's ambiguous ending, particularly Jig's final statement, 'I feel fine. There's nothing wrong with me. I feel fine.'?", "back": "The ambiguity leaves the reader to infer whether Jig has truly accepted the man's view, made a decision, or is simply masking profound internal conflict and resignation, creating an unsettling sense of unresolved tension."}, {"front": "What does the train junction itself symbolize for the couple?", "back": "It symbolizes a crucial crossroads or a point of decision in their relationship, where their paths could diverge depending on the choice they make about their future together."}, {"front": "How does the man's final action of drinking an Anis alone in the bar reflect his character or state of mind?", "back": "It shows him seeking a momentary escape or distraction from the tension with Jig, and a return to 'normalcy' or his own comfort, while Jig remains outside, highlighting their emotional distance."}, {"front": "What is Jig's reaction when the man says, 'I don’t want you to do it if you feel that way,' after she states, 'I don’t care about me'?", "back": "She stands up and walks to the end of the station, observing the fertile landscape. This suggests a moment of contemplating an alternative life path or a rejection of his conditional concern."}, {"front": "What does the phrase 'just to let the air in' euphemistically refer to in the context of the story?", "back": "It's the man's evasive and minimizing way of describing the abortion procedure, attempting to make it sound harmless, natural, and inconsequential."}, {"front": "How does Jig's question, 'And if I do it you’ll be happy and things will be like they were and you’ll love me?' challenge the man's assurances?", "back": "It exposes her deeper anxieties about the operation's impact on his love for her and their relationship, questioning whether their past happiness can truly be recovered by this singular action, or if it's a sacrifice without guarantee."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
