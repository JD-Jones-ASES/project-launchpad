<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading the Modern Short Story &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Modern_Short_Stories">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Gabriel initially perceive Gretta when he sees her on the stairs?", "back": "He sees her standing still in shadow, graceful and mysterious, like 'a symbol of something,' listening intently. He notes her skirt's color appears black and white in the shadow."}, {"front": "What artistic inclination does Gabriel reveal when observing Gretta on the stairs?", "back": "He imagines painting her in that attitude, stating that if he were a painter, he would call the picture 'Distant Music'."}, {"front": "What is the significance of the song Bartell D'Arcy sings on the stairs, and what is its title?", "back": "It's an old Irish song ('The Lass of Aughrim') with a plaintive melody expressing grief, about a cold, dead babe, which deeply affects Gretta."}, {"front": "Describe Bartell D'Arcy's demeanor and physical state immediately after he stops singing.", "back": "He is hoarse, claims to have a 'dreadful cold,' speaks roughly to the guests, and hastily puts on his overcoat, creating an awkward atmosphere."}, {"front": "How does Gretta react specifically to D'Arcy's singing, contrasting with her initial stillness?", "back": "Her eyes shine, color appears on her cheeks, and she breaks her silence to intently ask for the name of the song, 'The Lass of Aughrim'."}, {"front": "What external weather condition is frequently mentioned, and how does it relate to Mr. D'Arcy?", "back": "Snow is general all over Ireland and has been falling for thirty years. Mr. D'Arcy dislikes the snow because he believes it exacerbates his cold."}, {"front": "As Gabriel and Gretta leave the party, what physical detail of Gretta's behavior captures Gabriel's attention, and with whom is she walking?", "back": "Gretta walks ahead of Gabriel with Mr. Bartell D'Arcy, holding her skirt up from the slush, her shoes in a brown parcel tucked under her arm."}, {"front": "Name two specific intimate memories of Gretta that flood Gabriel's mind as they walk to the hotel.", "back": "He recalls caressing a heliotrope envelope beside his breakfast-cup, and placing a ticket inside the warm palm of her glove on a crowded platform."}, {"front": "What powerful emotion does Gabriel experience regarding his and Gretta's past, and what does he long for?", "back": "He believes their 'tender fire' hasn't been quenched by their 'dull existence' and longs to recall moments of 'ecstasy' with her, wanting to be alone in their hotel room."}, {"front": "What did Gabriel write in an old letter to Gretta that comes back to him as 'distant music'?", "back": "'Why is it that words like these seem to me so dull and cold? Is it because there is no word tender enough to be your name?'"}, {"front": "What is the significance of the cab ride for Gabriel as he anticipates being alone with Gretta?", "back": "The rattling noise saves him from conversation. He recalls their honeymoon, seeing the cab as a symbol of their escape to new adventure and a return to past 'ecstasy'."}, {"front": "What common Irish superstition is mentioned during the cab ride across O'Connell Bridge?", "back": "Miss O'Callaghan states, 'They say you never cross O’Connell Bridge without seeing a white horse.'"}, {"front": "How does Gabriel interact with the statue on O'Connell Bridge, and who does he address?", "back": "He points to the snow-covered statue (of Daniel O'Connell), nods familiarly, waves, and says, 'Good-night, Dan' gaily."}, {"front": "What physical action by Gretta upon arriving at the hotel ignites a 'keen pang of lust' in Gabriel?", "back": "She leans lightly on his arm while getting out of the cab and bidding good-night to the others, a touch that rekindles many memories and desires."}, {"front": "What does Gabriel feel about their arrival at the hotel, having escaped the others?", "back": "He feels they have 'escaped from their lives and duties, escaped from home and friends and run away together with wild and radiant hearts to a new adventure.'"}, {"front": "Describe Gretta's posture as she ascends the hotel stairs behind the porter.", "back": "Her head is bowed, her frail shoulders curved 'as with a burden,' and her skirt girt tightly about her, giving an impression of weariness or preoccupation."}, {"front": "What extreme physical manifestation of desire does Gabriel experience while ascending the stairs?", "back": "His arms tremble with desire to seize her, and only the 'stress of his nails against the palms of his hands' holds his 'wild impulse' in check. He also hears his own heart thumping against his ribs."}, {"front": "What does Gabriel do immediately upon entering the hotel room with Gretta, regarding the lighting?", "back": "He rejects the porter's offer of electric light and asks him to remove the candle, stating they have 'light enough from the street.' He then 'shot the lock' to ensure privacy."}, {"front": "How does the 'storypreface' advise the reader to approach the ending of the party?", "back": "It advises paying 'close attention to everything that happens on the stairs' because 'the story is about to shift'."}, {"front": "What is the broader symbolic meaning Gabriel attributes to Gretta's initial stance on the stairs?", "back": "He sees her as 'a symbol of something,' specifically relating to 'distant music' and embodying grace and mystery, almost as if she represents a profound, unspoken truth."}, {"front": "Compare Gabriel's feelings about Gretta's physical touch earlier in the evening to his feelings upon arriving at the hotel.", "back": "Earlier, when she danced with him, he felt 'proud and happy.' Upon arrival at the hotel, her touch, described as 'musical and strange and perfumed,' sends a 'keen pang of lust' through him, fueling intense desire and a sense of escape."}, {"front": "What do Gabriel's chosen memories of Gretta (heliotrope envelope, ticket in glove, furnace scene) suggest about their relationship?", "back": "They suggest moments of private, tender intimacy and shared experiences, often simple but imbued with deep emotional significance, that stand apart from their 'dull existence' and represent their 'moments of ecstasy.'"}, {"front": "How does the description of the morning outside the hotel (after the party) contribute to the mood?", "back": "The 'dull yellow light,' 'murky air,' 'slushy underfoot,' and 'menacing' palace of the Four Courts create a somber, perhaps ominous, atmosphere that contrasts with Gabriel's internal joy and desire."}, {"front": "What does Gabriel's refusal of the electric light and candle in the hotel room signify about his desires?", "back": "It signifies his desire for a specific, perhaps more authentic or romantic, intimacy with Gretta, illuminated only by the 'ghostly light' from the street lamp, away from artificiality or interruption, and perhaps a rejection of conventional reality."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
