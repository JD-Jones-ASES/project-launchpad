<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading the Modern Short Story &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Modern_Short_Stories">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Gurov's initial, cynical view of women at the beginning of 'The Lady with the Dog'?", "back": "Gurov views women as 'the inferior race,' finding them tiresome but irresistible, and approaches relationships as a familiar pattern of pursuit, conquest, and mild regret."}, {"front": "How does Chekhov present Gurov's character in the opening pages without direct editorial comment?", "back": "Chekhov uses narrative restraint, presenting Gurov's thoughts and actions as facts, allowing the reader to draw their own conclusions about his character without authorial judgment."}, {"front": "Explain the 'trap' Chekhov sets for the reader and Gurov regarding Gurov's self-perception.", "back": "The 'trap' is that Gurov's belief about himself as a cynical man whose affairs follow a predictable pattern turns out to be inadequate, as his feelings for Anna prove to be deeper and more permanent than he expects."}, {"front": "How does Chekhov reveal Gurov's transformation without explicitly stating that he has changed?", "back": "Gurov's transformation is revealed through small, specific details, such as his persistent thoughts of Anna, his restlessness in Moscow, and his desperate trip to her provincial town."}, {"front": "What is the significance of the 'gap' between what Gurov knows about himself and what the reader knows about him?", "back": "This gap is where the story's emotional power lives, as the reader understands Gurov's change and deepening feelings long before the character himself fully comprehends them."}, {"front": "According to the text, what makes resort towns like Yalta 'dangerous places in fiction'?", "back": "Resort towns are dangerous because they are 'places out of time' where ordinary rules of behavior are suspended, allowing characters to behave as if consequences belong to someone else."}, {"front": "How does the setting of Yalta contribute to the affair between Gurov and Anna?", "back": "Yalta's atmosphere of temporary freedom, warmth, and idleness makes a love affair seem natural and safe, as both characters assume it has a built-in expiration date."}, {"front": "What is the ironic outcome of the temporary nature of the Yalta setting for Gurov?", "back": "Despite the temporary setting, the feelings generated in Yalta turn out to be permanent, producing a lasting emotional result that Gurov is unprepared for."}, {"front": "Contrast the symbolic meanings of Yalta, Moscow, and Anna's provincial town in 'The Lady with the Dog.'", "back": "Yalta symbolizes possibility and freedom; Moscow represents cold obligations and a life that cannot accommodate the Yalta experience; and Anna's provincial town signifies a cage or entrapment."}, {"front": "Why does Chekhov not explicitly explain the symbolic meanings of the different settings?", "back": "Chekhov trusts the reader to understand these meanings; the settings 'do the work' of conveying the characters' emotional states and circumstances without needing authorial explanation."}, {"front": "Describe the pivotal 'Sturgeon Exchange' scene in Moscow.", "back": "In this scene, Gurov tries to share his profound experience with Anna to an acquaintance, who responds with a trivial remark about the dinner's sturgeon, failing to grasp Gurov's anguish."}, {"front": "What does the 'Sturgeon Exchange' reveal about Gurov's social world and his inner life?", "back": "It highlights the unbridgeable distance between Gurov's inner transformation and his social world, which is designed for a version of him that no longer exists, leading to deep isolation."}, {"front": "What ultimately motivates Gurov to visit Anna in her provincial town after the 'Sturgeon Exchange'?", "back": "Gurov is driven by desperation and a profound sense of isolation, realizing he has no one else with whom to share his true self and the depth of his feelings for Anna."}, {"front": "Define 'free indirect discourse.'", "back": "Free indirect discourse is a narrative method where the narrator adopts the character's voice, vocabulary, and perspective without using quotation marks or explicit signal phrases like 'he thought' or 'she felt.'"}, {"front": "How does Chekhov use free indirect discourse to create intimacy with Gurov's consciousness?", "back": "By blurring the line between narrator and character, Chekhov allows the reader to experience Gurov's inner life, assumptions, and rationalizations directly from the inside, rather than being told about them."}, {"front": "What is the effect of Chekhov's use of free indirect discourse on the reader's perception?", "back": "It creates intimacy without sentimentality, allowing the reader to be close to Gurov's mind while also remaining free to see things Gurov himself might not fully perceive or admit."}, {"front": "Provide an example from the text that illustrates free indirect discourse concerning Gurov's wife.", "back": "The sentence, 'His wife seemed to him half as long again as he really was,' exemplifies free indirect discourse, presenting Gurov's resentful perception as a seemingly objective statement."}, {"front": "What is the most important characteristic of the ending of 'The Lady with the Dog'?", "back": "The story does not end; it is left unresolved, with Gurov and Anna in love but no closer to a solution, indicating that 'the most complicated and difficult part' is only beginning."}, {"front": "Why does Chekhov choose to leave the story's ending unresolved?", "back": "Chekhov believes some situations do not resolve but are 'lived with.' An unresolved ending is more honest and realistic than a conventional resolution, which would be a simplification or a 'lie.'"}, {"front": "How does the unresolved ending of 'The Lady with the Dog' connect to Hemingway's 'iceberg principle'?", "back": "Similar to the iceberg principle, Chekhov withholds resolution not to be mysterious but because resolution would be false, allowing the story's power to come from what it refuses to provide: certainty and closure."}, {"front": "What emotional impact does the unresolved ending aim to have on the reader?", "back": "The unresolved ending aims to evoke a sense of frustration in the reader, mirroring the characters' own ongoing struggle and placing the reader 'inside a life that is still being lived.'"}, {"front": "What is Chekhov's purpose in allowing Gurov to tell us 'exactly who he is — or who he thinks he is' at the story's outset?", "back": "Chekhov establishes Gurov's initial self-perception to set up the 'trap' where everything Gurov believes about himself turns out to be inadequate, highlighting his impending transformation."}, {"front": "What does the phrase 'The setting changes; the emotion does not' signify in the context of Gurov's affair with Anna?", "back": "It signifies that the intense feelings and bond formed in the temporary, freeing environment of Yalta persist and grow even after Gurov returns to his ordinary life in Moscow."}, {"front": "How does Chekhov implicitly comment on Gurov's character without explicit authorial judgment?", "back": "By presenting Gurov's thoughts and actions directly and then showing how his 'cynicism he wears like armor turns out to be a costume,' Chekhov allows the reader to observe Gurov's self-deception and change."}, {"front": "What kind of 'isolation' does Gurov experience after returning to Moscow, particularly evidenced by the Sturgeon Exchange?", "back": "Gurov experiences the isolation of someone whose profound real experience has no audience, as his social world fails to acknowledge or accommodate the changed person he has become."}, {"front": "Why is Chekhov's use of free indirect discourse considered 'remarkably efficient'?", "back": "It is efficient because in a few sentences, Chekhov can simultaneously show both what Gurov sees and how he sees it, effectively conveying his inner life without lengthy interior monologues or direct authorial interpretation."}, {"front": "What 'comfort' does Chekhov refuse to provide the reader with his unresolved ending?", "back": "Chekhov refuses to provide the comfort of certainty, closure, and knowing how things ultimately turn out for Gurov and Anna, leaving them in a state of ongoing struggle and ambiguity."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
