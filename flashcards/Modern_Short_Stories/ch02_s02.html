<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading the Modern Short Story &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Modern_Short_Stories">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Gurov initially view women and affairs at the beginning of the story?", "back": "He considers them 'the inferior race,' tiresome but irresistible, treating affairs as a familiar pattern of pursuit, conquest, mild regret, and return to routine."}, {"front": "What is Chekhov's narrative technique when first introducing Gurov's character, particularly regarding judgment?", "back": "Chekhov uses 'quietly ruthless' restraint, presenting Gurov's thoughts and actions without editorial comment or explicit judgment, allowing the reader to draw their own conclusions."}, {"front": "What 'trap' does Chekhov set for both Gurov and the reader concerning Gurov's self-perception?", "back": "The trap is that everything Gurov believes about himself—his cynicism and familiar pattern of affairs—will prove inadequate and eventually break, leading to an unexpected transformation."}, {"front": "How does Chekhov reveal Gurov's transformation, rather than explicitly stating it?", "back": "Through small, specific details such as Gurov's thoughts about Anna, his restlessness in Moscow, and his desperate trip to her provincial town, showing the change accumulating subtly."}, {"front": "What gap does Chekhov create between Gurov's understanding and the reader's understanding of his transformation?", "back": "The reader understands Gurov's change 'for pages already' before Gurov himself does, and this gap between what Gurov knows and what the reader knows is where the story's emotional power lives."}, {"front": "According to the text, why are resort towns like Yalta considered 'dangerous places in fiction' for Chekhov?", "back": "They function as 'a condition' that temporarily frees people from ordinary lives, suspending normal rules and consequences, thereby allowing things to happen that wouldn't otherwise."}, {"front": "How does Yalta contribute to making the affair between Gurov and Anna seem both inevitable and temporary?", "back": "Yalta's atmosphere (warmth, sea, idle hours) makes a love affair feel natural, while its temporary nature creates a built-in expiration date, making the affair feel safe."}, {"front": "What is the central irony regarding the temporary setting of Yalta and the feelings it engenders?", "back": "The irony is that a temporary place (Yalta) can generate feelings that turn out to be permanent, causing the emotion to persist even after the setting changes."}, {"front": "How does Chekhov use the contrasting settings of Yalta, Moscow, and Anna's provincial town to reflect the characters' emotional states?", "back": "Yalta represents possibility and openness; Moscow signifies cold, enclosed obligations that don't accommodate new feelings; Anna's provincial town symbolizes a gray, dull 'cage' of a life."}, {"front": "Describe the 'Sturgeon Exchange' scene in Moscow.", "back": "Gurov, full of thoughts about Anna, tries to share a profound personal experience with an acquaintance at dinner, who responds with a mundane remark about the sturgeon."}, {"front": "What does the 'Sturgeon Exchange' reveal about Gurov's social world and his inner life?", "back": "It highlights an 'unbridgeable' distance between Gurov's deeply significant inner experience and his superficial social world, underscoring his profound isolation because his real feelings have no audience."}, {"front": "What primarily drives Gurov to Anna's town after the 'Sturgeon Exchange'?", "back": "Desperation, stemming from the isolation of having 'no one to be that person with' in his social world, rather than conventional romantic passion."}, {"front": "Define 'free indirect discourse' as a narrative technique.", "back": "It's a narration method where the narrator adopts a character's voice, vocabulary, and perspective without using quotation marks or explicit phrases like 'he thought,' blurring the lines between narrator and character."}, {"front": "What key effect does Chekhov achieve by using free indirect discourse in 'The Lady with the Dog'?", "back": "It creates intimacy without sentimentality, allowing readers to experience Gurov's inner life from the inside—his assumptions, rationalizations, and slow awakening—while remaining free to see things he cannot."}, {"front": "Give an example of free indirect discourse from the story mentioned in the text.", "back": "The sentence 'His wife seemed to him half as long again as he really was' uses 'seemed' as the only clue that it's Gurov's resentful perception, not objective narration, blurring the lines of perspective."}, {"front": "How does Chekhov's use of free indirect discourse contribute to narrative efficiency?", "back": "In a few sentences, it allows Chekhov to show both what a character sees and how they see it, making the gap between objective observation and subjective perception the core of the story."}, {"front": "Describe the nature of the ending in 'The Lady with the Dog'.", "back": "The story ends without resolution; Gurov and Anna are in love and meeting in secret, but are no closer to a solution, with 'the most complicated and difficult part' only just beginning."}, {"front": "Why does Chekhov choose an unresolved ending for 'The Lady with the Dog'?", "back": "He aims for an honest representation of life, believing some situations do not resolve but are simply 'lived with,' and that conventional resolution would be a simplification or a lie."}, {"front": "How does the unresolved ending connect to the 'iceberg principle'?", "back": "Like the iceberg principle, Chekhov withholds resolution not to be mysterious, but because providing certainty or closure would be false. The story's power comes from what it refuses to provide."}, {"front": "What does Gurov's 'cynicism he wears like armor' ultimately turn out to be?", "back": "It turns out to be a 'costume,' beneath which is a man capable of feeling far more than he ever suspected, demonstrating the inadequacy of his initial self-perception."}, {"front": "What does Chekhov mean by stating that 'The settings do the work' when discussing Yalta, Moscow, and Anna's town?", "back": "He means that the contrasting environments visually and emotionally convey the characters' states and the story's themes without needing explicit narration or explanation from the author."}, {"front": "What particular kind of isolation does Chekhov capture through Gurov's experience in Moscow?", "back": "The isolation of someone whose profound personal experience has no audience; his deep changes are unnoticed and unaccommodated by his social world, leaving him with no one to share his true self with."}, {"front": "How does Gurov's affair with Anna Sergeyevna fundamentally deviate from his usual 'familiar pattern' of relationships?", "back": "Unlike his previous affairs, this one does not end when Yalta ends or fade into memory; instead, it stubbornly grows into something permanent that Gurov has no existing framework for understanding."}, {"front": "What is the emotional power that lives in the 'gap' between what Gurov knows about himself and what the reader knows about him?", "back": "The emotional power comes from the reader witnessing Gurov's transformation and inner life unfolding before he fully understands it himself, creating a sense of dramatic irony and deep engagement."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
