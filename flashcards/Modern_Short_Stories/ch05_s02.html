<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading the Modern Short Story &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Modern_Short_Stories">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central, unspoken topic of conversation between the couple in Hemingway's \"Hills Like White Elephants\"?", "back": "The central, unspoken topic is abortion."}, {"front": "Why does Hemingway deliberately omit the explicit word for the central topic in \"Hills Like White Elephants\"?", "back": "He omits the word to reflect how people behave in public when the stakes are too high for honesty, negotiating something enormous using small, indirect language."}, {"front": "How does \"Hills Like White Elephants\" differ from most fiction in its narrative approach?", "back": "There is almost no narrator; meaning is conveyed through the rhythm of dialogue, who speaks and falls silent, and what is repeated or omitted, requiring the reader to listen for what isn't said."}, {"front": "Define \"subtext\" in the context of literary analysis.", "back": "Subtext is what characters mean or feel but do not explicitly say."}, {"front": "How does Hemingway's use of subtext in \"Hills Like White Elephants\" differ from its typical function in other stories?", "back": "In this story, subtext *is* the dialogue itself; characters never explicitly name their argument, desires, or feelings, yet the reader understands them by the end."}, {"front": "What is Hemingway's achievement in his handling of subtext in this story?", "back": "He makes the surface dialogue so transparent that the deeper meanings and emotions show through without explicit narration."}, {"front": "Describe the two contrasting landscapes Hemingway uses to open \"Hills Like White Elephants.\"", "back": "One side of the valley has \"long and white\" hills and is \"brown and dry\"; the other side has \"fields of grain and trees\" along the Ebro, suggesting barrenness versus fertility."}, {"front": "What do the two contrasting landscapes symbolize in the story?", "back": "They symbolize the two possible futures the couple faces: a barren future if the pregnancy is terminated, or a fertile future if it continues."}, {"front": "How do the man and the girl's interactions with the landscape differ, and what does this reveal?", "back": "The girl looks at both sides, indicating her indecision; the man looks at neither, focusing on his drink, indicating he has already made up his mind."}, {"front": "What is the specific meaning of the phrase \"white elephant\" as an idiom?", "back": "It refers to something costly, burdensome, and unwanted—a gift one cannot refuse and cannot use."}, {"front": "How does the idiomatic meaning of \"white elephant\" apply to the girl's comment about the hills?", "back": "She is implicitly comparing the pregnancy (or the potential child) to a \"white elephant\"—something beautiful but unwanted, costly, and burdensome."}, {"front": "What does the man's response, \"I've never seen one,\" to the girl's \"white elephant\" comment reveal about him?", "back": "It reveals his literal-mindedness, his lack of understanding of the situation's true burden, and his unwillingness or inability to see beyond the surface."}, {"front": "What does the girl's reply, \"No, you wouldn't have,\" reveal about her perception of the man?", "back": "It shows her awareness of his selective perception and the fundamental difference in how they interpret their shared reality and the implications of their decision."}, {"front": "How does Hemingway illustrate the power imbalance between the man and the girl through their dialogue patterns?", "back": "The man talks more, initiates topics, and repeatedly steers the conversation back to the operation; the girl deflects, uses shorter, questioning sentences, and expresses desperation."}, {"front": "The man's repeated assurances (\"It's really an awfully simple operation\") have what quality?", "back": "They have the quality of a \"sales pitch,\" indicating he is trying to manage or persuade her, rather than genuinely listen."}, {"front": "How does the girl's resistance manifest, given the power imbalance?", "back": "Through indirection, looking away, making observations the man doesn't understand, and desperate pleas, like her repeated \"please.\""}, {"front": "What is the significance of the girl repeating \"please\" seven times (\"please please please please please please please stop talking\")?", "back": "It is not a polite request but a raw expression of someone at the end of her endurance, using desperate emphasis as her only available tool."}, {"front": "Identify the \"emotional center\" of the story.", "back": "The girl's lines: \"And we could have all this And we could have everything and every day we make it more impossible,\" and \"That's all we do, isn't it — look at things and try new drinks.\""}, {"front": "What deeper insight does the girl express when she says, \"That's all we do, isn't it — look at things and try new drinks\"?", "back": "She's critically assessing their entire relationship as superficial, filled with travel and drinks but lacking true substance, viewing the operation as a symptom of this larger problem."}, {"front": "How does the man react to the girl's profound assessment of their relationship, and what does it reveal?", "back": "He attempts to smooth it over (\"I don't care about me\"), failing to engage with her truth, demonstrating his pattern of avoiding deeper engagement."}, {"front": "Why is the girl's honest assessment of their life considered the \"hinge\" of the story?", "back": "Because she has clearly seen and articulated a truth about their relationship that cannot be unsaid, regardless of the conversation's immediate outcome."}, {"front": "Define Hemingway's \"iceberg principle\" of writing.", "back": "It's the idea that a story's power comes from what the writer leaves out, with the deeper meaning and emotional impact existing beneath the surface of explicit text."}, {"front": "Provide specific examples of how \"Hills Like White Elephants\" applies the \"iceberg principle.\"", "back": "It includes a lack of backstory, minimal character names (\"the American,\" \"Jig\"), no interior monologue, and no explicit resolution to the central conflict."}, {"front": "What is the overall effect of Hemingway's narrative restraint (iceberg principle) on the reader?", "back": "It allows the reader to \"feel\" the unstated complexities and emotions, trusting them to interpret the deeper meaning and engage actively with the story."}, {"front": "Why is Hemingway's restraint not considered \"coldness\" but a \"form of respect\"?", "back": "It respects the characters' complexity by not over-explaining them, and it respects the reader's intelligence by trusting them to do the interpretive work."}, {"front": "What does the contrast between the man's repeated verbal assurances and his continuous pressure imply about his character?", "back": "It reveals a gap between his words and actions, showing his manipulative nature and how he applies pressure more effectively through feigned deference than open argument."}, {"front": "How does Chekhov's method of revealing a character's interior life differ from Hemingway's in this context?", "back": "Chekhov provides direct access to a character's interior life and changing feelings through narration, fostering intimacy; Hemingway uses subtext and omission to imply inner states."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
