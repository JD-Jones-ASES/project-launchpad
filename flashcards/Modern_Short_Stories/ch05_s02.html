<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading the Modern Short Story &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading the Modern Short Story &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Modern_Short_Stories">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central unspoken topic at the heart of the conversation in Hemingway's 'Hills Like White Elephants'?", "back": "The central unspoken topic is whether the girl should have an abortion, which the man wants her to do."}, {"front": "Why does Hemingway choose to omit the specific word for the operation in 'Hills Like White Elephants'?", "back": "Hemingway omits the word because it reflects how the characters would behave in a public place, negotiating a high-stakes issue indirectly. It's a portrait of human behavior, not squeamishness."}, {"front": "How does Hemingway convey meaning in 'Hills Like White Elephants' given the lack of direct narration?", "back": "Meaning is conveyed through the surface of the dialogue: the rhythm of who speaks and who falls silent, what gets repeated, and what gets dropped, requiring the reader to listen for what people are trying not to say."}, {"front": "Define 'subtext' as it is presented in the chapter.", "back": "Subtext is what characters mean but don't say. It's the underlying conversation or meaning that runs beneath the surface dialogue."}, {"front": "How does the use of subtext in 'Hills Like White Elephants' differ from its typical role in most stories?", "back": "In 'Hills Like White Elephants,' subtext *is* the dialogue; there is nothing else. Unlike most stories where subtext runs *underneath* the dialogue, here it forms the entire conversation, making the surface transparent enough for depths to show through."}, {"front": "What is Hemingway's 'achievement' regarding subtext in 'Hills Like White Elephants'?", "back": "Hemingway's achievement is making the surface dialogue so transparent that the characters' unspoken arguments, desires, and feelings are revealed without being explicitly stated."}, {"front": "Describe the two distinct landscapes Hemingway presents at the beginning of 'Hills Like White Elephants.'", "back": "On one side, the hills are 'long and white' and the country is 'brown and dry' (barren). On the other side, there are 'fields of grain and trees along the banks of the Ebro' (fertile)."}, {"front": "What do the 'two landscapes' in 'Hills Like White Elephants' symbolically represent?", "back": "They symbolize the two possible futures the couple faces: one barren if the pregnancy does not continue, and one fertile if it does."}, {"front": "How do the man and the girl's interactions with the landscapes reveal their differing states of mind?", "back": "The girl looks at both landscapes, showing her indecision, while the man looks at neither (focusing on the table/drinks), indicating he has already decided what he wants."}, {"front": "What is the common meaning of the phrase 'white elephant'?", "back": "A 'white elephant' typically refers to something costly, burdensome, and unwanted; a gift you cannot refuse and cannot use."}, {"front": "In 'Hills Like White Elephants,' what does the girl imply when she says the hills 'look like white elephants'?", "back": "She is implying that the pregnancy, or perhaps their entire relationship, has become a 'white elephant'—something beautiful but potentially unwanted, costly, and burdensome."}, {"front": "What does the man's response, 'I've never seen one,' to the 'white elephants' comment reveal about him?", "back": "His response reveals his lack of perception or his unwillingness to acknowledge the deeper, burdensome implications of their situation that the girl is hinting at."}, {"front": "What does the girl's reply, 'No, you wouldn't have,' tell us about her understanding of the man?", "back": "Her reply suggests she understands his limited perspective, his inability or refusal to see things as they truly are, especially concerning their shared reality."}, {"front": "Describe the pattern of dialogue that emerges between the man and the girl in 'Hills Like White Elephants.'", "back": "The man talks more, initiates topics, and repeatedly pushes for the operation. The girl deflects, changes the subject, uses short sentences, and asks questions, trying to avoid the argument."}, {"front": "How does Hemingway convey the power imbalance between the man and the girl without explicitly stating it?", "back": "He conveys it through sentence rhythms: the man's longer, assured, repetitive sentences sound like a 'sales pitch,' while the girl's short, questioning sentences and efforts to divert the conversation show her subordinate position."}, {"front": "What is the nature of the man's 'calm' during the conversation about the operation?", "back": "His calm is not that of someone open to both outcomes, but rather the calm of someone who has already decided and is waiting for the other person to agree, indicating manipulation."}, {"front": "What form does the girl's 'power' or resistance take in the conversation?", "back": "Her resistance comes through indirection: looking away, making observations he doesn't understand, and using desperate emphasis, like her repeated 'please please please please please please please stop talking.'"}, {"front": "What is the significance of the girl's repeated phrase, 'please please please please please please please stop talking'?", "back": "This repetition, seven times, is not a polite request but a sign that she is at the end of what she can bear, using desperate emphasis as her only remaining tool of resistance."}, {"front": "What is the girl truly talking about when she says, 'That's all we do, isn't it — look at things and try new drinks'?", "back": "She is not talking about the operation anymore, but about their entire relationship—a life of superficiality and transient pleasures with no real substance underneath."}, {"front": "Why is the girl's realization, 'That's all we do,' considered the 'emotional center' and 'hinge' of the story?", "back": "It's the emotional center because she honestly assesses their relationship's superficiality. It's the hinge because after she names this truth, the conversation changes, even if unacknowledged, as something profound has been said."}, {"front": "How does the man respond to the girl's deeper insight about their relationship ('That's all we do')?", "back": "He tries to smooth it over immediately with reassurances like 'I don't care about me,' failing to engage with the truth she has named about their relationship's lack of substance."}, {"front": "Define Hemingway's 'iceberg principle' of writing.", "back": "The iceberg principle is the idea that a story's power comes from what the writer leaves out, with only a small portion visible above the surface, implying much more beneath."}, {"front": "How is 'Hills Like White Elephants' considered a 'purest example' of the iceberg principle in practice?", "back": "It's a purest example because it contains almost no explicit narration, backstory, interior monologue, or resolution, relying entirely on implication and reader interpretation to convey profound meaning."}, {"front": "What specific elements does Hemingway *omit* in 'Hills Like White Elephants' that demonstrate the iceberg principle?", "back": "Hemingway omits backstory, most character names, interior monologues, and a clear resolution to the central conflict."}, {"front": "Why does Hemingway choose to omit so much information in 'Hills Like White Elephants' rather than explicitly stating it?", "back": "He trusts the reader to 'feel' the unstated emotions and implications, allowing the knowledge gained to be similar to overhearing a real, serious conversation."}, {"front": "According to the text, what is the reader's role in interpreting stories written with the iceberg principle?", "back": "The reader is trusted to do the 'work of interpretation,' piecing together meaning from subtle cues and implications, feeling what is left unsaid as if it were there."}, {"front": "How does Hemingway's restraint in 'Hills Like White Elephants' demonstrate 'respect'?", "back": "It's a form of respect for the characters, who are allowed to be complex without being explained, and for the reader, who is trusted to engage in thoughtful interpretation."}, {"front": "Compare Hemingway's approach to revealing character and meaning in 'Hills Like White Elephants' to that of Chekhov or Joyce, as described in the text.", "back": "Chekhov and Joyce grant access to characters' interior lives and consciousness. Hemingway, by contrast, provides almost no narrator or interior monologue, forcing meaning to emerge solely from dialogue and subtle external cues (subtext)."}, {"front": "What is the 'feeling' that Hemingway aims to create in the reader through the iceberg principle?", "back": "The feeling is a sense that there is 'something large and important just beneath the words,' a profound depth holding up everything visible, even if it cannot be explicitly seen."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
