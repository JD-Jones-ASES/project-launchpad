<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">We the People &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Early_Government">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the definition of \"governor\" in the context of Texas government?", "back": "The head of a state's executive branch, like the “president” of the state, whose job is to carry out Texas laws and lead the state."}, {"front": "Define \"lieutenant governor\" in Texas.", "back": "The second-highest official in the state executive branch, who also presides over the Texas Senate."}, {"front": "What is a \"biennial session\"?", "back": "A legislative meeting that happens every two years rather than every year."}, {"front": "What is the \"judiciary\"?", "back": "The court system; the branch of government that interprets laws and settles disputes."}, {"front": "What is the fundamental design principle of the Texas government, mirroring the federal government?", "back": "It uses the exact same three-branch design (executive, legislative, judicial) with separate powers and checks on each other."}, {"front": "How do most of Texas's top executive officials get their positions, differing from federal Cabinet members?", "back": "Most of Texas's top executive officials (like the Attorney General and Comptroller) are elected directly by voters, unlike federal Cabinet members who are appointed by the President."}, {"front": "How are Texas judges selected, differing from federal judges?", "back": "Texas judges are elected by voters, while federal judges are appointed by the President."}, {"front": "What is a key difference in the frequency of legislative sessions between the U.S. Congress and the Texas Legislature?", "back": "The U.S. Congress meets annually, while the Texas Legislature meets in a biennial session (once every two years)."}, {"front": "What is the primary role of the Texas Governor?", "back": "To carry out Texas laws and lead the state as the head of the executive branch."}, {"front": "What is the term length for the Governor of Texas?", "back": "Four-year terms, and they can be elected more than once."}, {"front": "List three powers of the Texas Governor.", "back": "Signing bills into law (or vetoing them), commanding the Texas National Guard, appointing judges, agency heads, and board members, and calling special sessions of the Legislature."}, {"front": "Name two other significant executive officials in Texas besides the Governor and Lieutenant Governor.", "back": "The Attorney General (the state's top lawyer) and the Comptroller (who manages the state's money)."}, {"front": "Why is the Texas Lieutenant Governor considered unusually powerful?", "back": "Unlike the U.S. Vice President, the Texas Lieutenant Governor presides over the Senate and controls which bills get debated, making them a very powerful official."}, {"front": "What is the main function of the Texas Legislature?", "back": "To make state laws."}, {"front": "Name the two chambers of the Texas Legislature and state their number of members and term lengths.", "back": "Texas Senate (31 senators, 4-year terms) and Texas House of Representatives (150 members, 2-year terms)."}, {"front": "How often and for approximately how long does the Texas Legislature meet in regular session?", "back": "It meets in a biennial session (once every two years) for about 140 days in odd-numbered years."}, {"front": "List two jobs of the Texas Legislature.", "back": "Writing and passing state laws, approving the state budget, overriding the governor's veto (with a 2/3 vote), and proposing amendments to the Texas Constitution."}, {"front": "What is unique about the Texas court system compared to most other states and the federal system?", "back": "It has two top courts instead of one."}, {"front": "Name the two top courts in the Texas judicial system and specify what type of cases each handles.", "back": "Texas Supreme Court (handles civil cases) and Texas Court of Criminal Appeals (handles criminal cases)."}, {"front": "What kind of cases does the Texas Supreme Court handle?", "back": "Civil cases, which are disputes between people or organizations over money, contracts, or rights."}, {"front": "What kind of cases does the Texas Court of Criminal Appeals handle?", "back": "Criminal cases, which involve crimes against the law."}, {"front": "Name some of the courts that exist below the two top courts in Texas.", "back": "Courts of Appeals, District Courts, County Courts, and Justice of the Peace Courts."}, {"front": "Who was Sam Houston, and what was his role in Texas's independence?", "back": "He was a remarkable figure in Texas history who commanded the Texas Army at the Battle of San Jacinto in 1836, winning Texas's independence from Mexico."}, {"front": "How did Sam Houston demonstrate principle during the Civil War era?", "back": "He refused to take an oath of loyalty to the Confederacy when Texas voted to leave the Union in 1861 and was forced from office."}, {"front": "What is the 'Texas Pledge of Allegiance'?", "back": "Texas has its own pledge, recited alongside the U.S. Pledge in many Texas schools, affirming loyalty to the state."}, {"front": "Why do some experts believe Texas uses biennial legislative sessions instead of meeting every year?", "back": "Possible reasons include a historical distrust of government and a desire to keep legislators as citizen-lawmakers rather than full-time politicians."}, {"front": "What does the word 'indivisible' mean in the context of a state or nation, as used in the Texas and U.S. Pledges?", "back": "It means unable to be divided or separated; signifying unity and that the state (or nation) should remain whole and united."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
