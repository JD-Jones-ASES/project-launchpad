<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">We the People &mdash; Chapter 9, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the definition of 'review' in the context of learning?", "back": "Review is going back over what you have learned to make sure you remember and understand it.", "id": "fc01"}, {"front": "Define 'reflection' as described in the text.", "back": "Reflection is thinking carefully and honestly about what something means and why it matters.", "id": "fc02"}, {"front": "According to Unit 1, why do people need government?", "back": "People need rules to live together safely and fairly. Government is the system for making and enforcing those rules, providing order, protection, and promoting the common good.", "id": "fc03"}, {"front": "What key lesson did the experiments of ancient governments like Egypt, Israel, Greece, and Rome teach?", "back": "Each ancient experiment (one powerful king, God's law, citizen vote, balanced republic) taught the world something about how to — and how not to — govern.", "id": "fc04"}, {"front": "What vocabulary for types of government did Aristotle provide, and what did he note about their nature?", "back": "Aristotle provided the vocabulary of monarchy, aristocracy, and democracy, noting that each form can be good or corrupt.", "id": "fc05"}, {"front": "What cyclical pattern in governments did Polybius demonstrate, and what solution did he propose?", "back": "Polybius showed that governments cycle from good to corrupt unless wisely mixed, and he identified the Roman Republic's three-part design as the answer.", "id": "fc06"}, {"front": "What core beliefs guided the American Founders in declaring independence and building a new government?", "back": "The American Founders believed their rights as Englishmen were being taken, cited natural rights and consent of the governed, and built a new government with careful checks and limits.", "id": "fc07"}, {"front": "How does the U.S. federal government prevent concentrated power, according to Unit 5?", "back": "The U.S. federal government prevents concentrated power through separation of powers, dividing authority among three branches (Congress, President, Supreme Court), with each checking the others.", "id": "fc08"}, {"front": "How does the textbook distinguish state governments, specifically Texas, from the federal government?", "back": "State governments are not small versions of the federal government; they are separate, with their own constitutions, courts, and ways of organizing power, as seen in Texas's unique history and identity.", "id": "fc09"}, {"front": "What is the source of rights in America, and which amendments helped correct historical wrongs to advance a 'more perfect Union'?", "back": "Rights are not gifts from government; they belong to every person. The Thirteenth, Fourteenth, Fifteenth, and Nineteenth Amendments corrected wrongs through the Founders' established process.", "id": "fc10"}, {"front": "How does comparing America to other world governments benefit its citizens?", "back": "Comparing America to other world governments, from democracies to authoritarian states, helps citizens see what they have, why it matters, and what could be lost.", "id": "fc11"}, {"front": "What is 'civic virtue,' and why is it essential for a republic?", "back": "Civic virtue includes honesty, responsibility, courage, and concern for the common good. It is the foundation of a republic because its strength depends entirely on its citizens practicing these virtues.", "id": "fc12"}, {"front": "Who famously said, 'A republic — if you can keep it,' and when?", "back": "Benjamin Franklin said this in September 1787, the night after the Constitutional Convention ended, when asked about the form of government they had created.", "id": "fc13"}, {"front": "What 'weight' do Franklin's words, 'if you can keep it,' carry regarding the American republic?", "back": "These words emphasize that the Constitution, branches of government, Bill of Rights, and peaceful transfer of power do not continue automatically; they require active participation and care from citizens across generations.", "id": "fc14"}, {"front": "What specific actions are required of citizens to 'keep' the republic, according to the text?", "back": "Citizens must choose to participate, obey the law, stay informed, and care about the common good to keep the republic strong.", "id": "fc15"}, {"front": "Identify three examples of civic virtue mentioned in the text.", "back": "Honesty, responsibility, courage, and concern for the common good are examples of civic virtue. (Any three are acceptable.)", "id": "fc16"}, {"front": "What happens in the absence of government, according to Unit 1?", "back": "Without government, there is no order, no protection, and no common good.", "id": "fc17"}, {"front": "Name two specific forms of government experimented with by ancient civilizations mentioned in Unit 2.", "back": "Ancient civilizations experimented with one powerful king (Egypt), God's law through judges (Israel), the vote of citizens (Athens/Greece), and the balance of a republic (Rome). (Any two are acceptable.)", "id": "fc18"}, {"front": "Besides natural rights, what other key concept did American colonists cite when declaring independence?", "back": "The American colonists cited the 'consent of the governed' when declaring independence.", "id": "fc19"}, {"front": "What are the three branches of the U.S. federal government and their primary functions?", "back": "The three branches are Congress (makes laws), the President (enforces laws), and the Supreme Court (makes sure laws follow the Constitution).", "id": "fc20"}, {"front": "Why does the text state that 'rights are not gifts from government'?", "back": "Rights belong to every person inherently, implying they exist independently of government and should not be granted or withheld by it.", "id": "fc21"}, {"front": "How can an individual citizen directly contribute to 'forming a more perfect Union'?", "back": "An individual can contribute by practicing civic virtues, participating, obeying the law, staying informed, and caring about the common good, continuing the work built by the Founders and subsequent amendments.", "id": "fc22"}, {"front": "What is the overall 'story' of government presented throughout the nine units?", "back": "The story traces government from the basic human need for rules, through ancient experiments, different forms, America's founding, its federal and state structures, the struggle for rights, global comparisons, and culminates in the vital role of the good citizen.", "id": "fc23"}, {"front": "According to the final word, what document protects freedoms and ensures peaceful transfer of power in the U.S.?", "back": "The Constitution is the magnificent document that protects freedoms through the Bill of Rights and ensures elections transfer power peacefully.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
