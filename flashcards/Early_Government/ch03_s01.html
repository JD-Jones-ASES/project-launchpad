<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We the People &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">We the People &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Early_Government.html">&larr; Back to We the People</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does it mean to 'classify' in the context of government?", "back": "To sort governments into groups based on their similarities, as Aristotle did.", "id": "fc01"}, {"front": "Define 'aristocracy'.", "back": "Government by the best and most qualified, ruling for the common good. (From Greek: aristos 'best' + kratos 'rule')", "id": "fc02"}, {"front": "Define 'oligarchy'.", "back": "Government by a small group of wealthy or powerful people, ruling for their own benefit. (From Greek: oligos 'few' + arkhein 'to rule')", "id": "fc03"}, {"front": "Define 'tyranny'.", "back": "Rule by one person for their own benefit, using fear and force. A tyrant holds power unjustly.", "id": "fc04"}, {"front": "What was Aristotle's main question about government?", "back": "What makes a good government?", "id": "fc05"}, {"front": "According to Aristotle, what two questions should analyze every government?", "back": "1. How many people hold power (one, few, or many)? 2. For whose benefit do they rule (common good or themselves)?", "id": "fc06"}, {"front": "What was Aristotle's key insight regarding the nature of government?", "back": "The same number of rulers can produce either a good government or a bad one; it depends on whether they govern for everyone or only for themselves.", "id": "fc07"}, {"front": "How did Aristotle distinguish between a 'good monarch' and a 'tyrant'?", "back": "A good monarch cares about his people, while a tyrant cares only about his own wealth and power.", "id": "fc08"}, {"front": "According to Aristotle, when does an 'aristocracy' decay into an 'oligarchy'?", "back": "An aristocracy (experienced citizens governing wisely) decays into an oligarchy when those noble families become greedy and grab power and money for themselves.", "id": "fc09"}, {"front": "What did Aristotle call the corrupt form of 'many-person rule'?", "back": "Mob rule, where the majority uses its power to crush the minority, not true democracy.", "id": "fc10"}, {"front": "What was Aristotle's great contribution to political thought?", "back": "Any form of government can be good or corrupt depending on whether its rulers serve the common good or only themselves.", "id": "fc11"}, {"front": "Who was Aristotle's most famous student?", "back": "Alexander the Great.", "id": "fc12"}, {"front": "What new question did Polybius ask, building on Aristotle's ideas?", "back": "Why do governments keep changing? Is there a pattern?", "id": "fc13"}, {"front": "What is 'anacyclosis'?", "back": "Polybius's theory that governments do not stay still but move in a rotating cycle, from one form to the next, generation after generation. (From Greek: ana- 'again' + kyklos 'circle')", "id": "fc14"}, {"front": "List the stages of Polybius's cycle of government decay, starting with a good monarchy.", "back": "Monarchy → Tyranny → Aristocracy → Oligarchy → Democracy (Polity) → Ochlocracy (Mob Rule) → Monarchy (cycle repeats).", "id": "fc15"}, {"front": "In Polybius's cycle, what form of government follows the decay of aristocracy?", "back": "Oligarchy, when noble families become greedy and seize power for themselves.", "id": "fc16"}, {"front": "What did Polybius call the 'good' form of many-person rule, corresponding to Aristotle's 'polity'?", "back": "Democracy, where the common people rise up and rule through the assembly for the common good.", "id": "fc17"}, {"front": "What is 'ochlocracy'?", "back": "Mob rule; the corrupt form of democracy in Polybius's cycle where the crowd loses discipline and demands only what pleases itself. (From Greek: ochlos 'mob' + kratos 'rule')", "id": "fc18"}, {"front": "What solution did Polybius propose to break the cycle of anacyclosis?", "back": "A mixed constitution, which blends elements of monarchy, aristocracy, and democracy.", "id": "fc19"}, {"front": "How did the Roman Republic exemplify Polybius's idea of a mixed constitution?", "back": "It combined: two consuls (monarchy), the Senate (aristocracy), and popular assemblies (democracy).", "id": "fc20"}, {"front": "What role did the two consuls play in the Roman Republic's mixed constitution?", "back": "They served like kings, but only for one year and always two of them, preventing any one person from becoming a tyrant.", "id": "fc21"}, {"front": "What was the function of the Senate in the Roman Republic's mixed constitution?", "back": "It acted like an aristocracy, with experienced leaders guiding long-term policy and finances.", "id": "fc22"}, {"front": "How did the popular assemblies contribute to the Roman Republic's mixed constitution?", "back": "They acted like a democracy, where citizens voted on laws and elected leaders.", "id": "fc23"}, {"front": "What was Polybius's great contribution to political thought, and how did it influence later thinkers?", "back": "The idea of the mixed constitution, combining monarchy, aristocracy, and democracy to limit each other. It heavily influenced the American Founders when designing the three branches of government.", "id": "fc24"}, {"front": "Who read Polybius's work carefully and was influenced by his ideas about a mixed constitution?", "back": "James Madison and other American Founders.", "id": "fc25"}, {"front": "What is the connection between Polybius's mixed constitution and the U.S. government?", "back": "The three branches of the U.S. government (Congress, President, Supreme Court) are a mixed constitution in the Polybian sense, designed with checks and balances to prevent the cycle of tyranny and mob rule.", "id": "fc26"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
