<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 6, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "While addition and subtraction of polynomials involve combining like terms, what technique is used for multiplying polynomials?", "back": "The distributive property."}, {"front": "To multiply a monomial by a polynomial, you must distribute the monomial to _____ and then simplify.", "back": "each term of the polynomial"}, {"front": "Formula: The Distributive Property for a monomial m and polynomial p₁ + p₂ + dots + p_k.", "back": "m(p₁ + p₂ + dots + p_k) = mp₁ + mp₂ + dots + mp_k"}, {"front": "What is the first step in multiplying -3x²(4x³ - 2x + 5)?", "back": "Distribute -3x² to each term in the parentheses."}, {"front": "In the expression -3x²(4x³ - 2x + 5), what is the result of multiplying the monomial by the first term 4x³?", "back": "-12x⁵"}, {"front": "In the expression -3x²(4x³ - 2x + 5), what is the result of multiplying the monomial by the second term -2x?", "back": "6x³"}, {"front": "In the expression -3x²(4x³ - 2x + 5), what is the result of multiplying the monomial by the constant term 5?", "back": "-15x²"}, {"front": "What is the simplified product of -3x²(4x³ - 2x + 5)?", "back": "-12x⁵ + 6x³ - 15x²"}, {"front": "To multiply two binomials, the distributive property must be applied how many times?", "back": "Twice."}, {"front": "What mnemonic is used to remember the steps for multiplying two binomials?", "back": "FOIL"}, {"front": "In the FOIL mnemonic, what does 'F' represent?", "back": "First"}, {"front": "In the FOIL mnemonic, what does 'O' represent?", "back": "Outer"}, {"front": "In the FOIL mnemonic, what does 'I' represent?", "back": "Inner"}, {"front": "In the FOIL mnemonic, what does 'L' represent?", "back": "Last"}, {"front": "Formula: FOIL for (a + b)(c + d).", "back": "ac + ad + bc + bd"}, {"front": "Using FOIL on (2x + 3)(x - 5), what is the 'First' product?", "back": "2x²"}, {"front": "Using FOIL on (2x + 3)(x - 5), what is the 'Outer' product?", "back": "-10x"}, {"front": "Using FOIL on (2x + 3)(x - 5), what is the 'Inner' product?", "back": "3x"}, {"front": "Using FOIL on (2x + 3)(x - 5), what is the 'Last' product?", "back": "-15"}, {"front": "After applying FOIL to (2x + 3)(x - 5), what are the four terms generated before combining like terms?", "back": "2x² - 10x + 3x - 15"}, {"front": "What is the final simplified form of (2x + 3)(x - 5)?", "back": "2x² - 7x - 15"}, {"front": "In the multiplication (x + 4)(x - 6), what is the result of the 'Outer' and 'Inner' steps combined?", "back": "-2x"}, {"front": "What is the final product of (x + 4)(x - 6)?", "back": "x² - 2x - 24"}, {"front": "Why can FOIL not be used for a binomial times a trinomial?", "back": "FOIL works only for two binomials."}, {"front": "What is the general procedure for multiplying polynomials with three or more terms?", "back": "Distribute each term of one polynomial to every term of the other."}, {"front": "To multiply (x + 3)(x² - 2x + 4), which two expressions must be summed after the first level of distribution?", "back": "x(x² - 2x + 4) and 3(x² - 2x + 4)"}, {"front": "In the product (x + 3)(x² - 2x + 4), what is the result of distributing the 'x' term?", "back": "x³ - 2x² + 4x"}, {"front": "In the product (x + 3)(x² - 2x + 4), what is the result of distributing the '3' term?", "back": "3x² - 6x + 12"}, {"front": "When simplifying x³ - 2x² + 4x + 3x² - 6x + 12, what is the result of combining the quadratic (x²) terms?", "back": "x²"}, {"front": "When simplifying x³ - 2x² + 4x + 3x² - 6x + 12, what is the result of combining the linear (x) terms?", "back": "-2x"}, {"front": "What is the simplified answer for (x + 3)(x² - 2x + 4)?", "back": "x³ + x² - 2x + 12"}, {"front": "When multiplying (2x - 1)(x² + 3x - 2), what results from multiplying 2x by x² + 3x - 2?", "back": "2x³ + 6x² - 4x"}, {"front": "When multiplying (2x - 1)(x² + 3x - 2), what results from multiplying -1 by x² + 3x - 2?", "back": "-x² - 3x + 2"}, {"front": "What is the final simplified result of (2x - 1)(x² + 3x - 2)?", "back": "2x³ + 5x² - 7x + 2"}, {"front": "The fact that the product of any two polynomials is always a polynomial is known as the _____ property.", "back": "closure"}, {"front": "How is the degree of a product of polynomials determined from its factors?", "back": "It equals the sum of the degrees of the factors."}, {"front": "If a degree-2 polynomial is multiplied by a degree-3 polynomial, what is the degree of the resulting product?", "back": "Degree 5"}, {"front": "What is the degree of the product (x+4)(x-6)?", "back": "Degree 2"}, {"front": "What is the degree of the factor (x² - 2x + 4) in the example (x + 3)(x² - 2x + 4)?", "back": "Degree 2"}, {"front": "In the multiplication (2x - 1)(x² + 3x - 2), the degree of the first factor is 1 and the second is 2. What is the degree of the product?", "back": "3"}, {"front": "What is the result of the 'Last' step in FOIL for (x + 4)(x - 6)?", "back": "-24"}, {"front": "What is the result of the 'First' step in FOIL for (x + 4)(x - 6)?", "back": "x²"}, {"front": "The property stating that multiplying a term by a sum is the same as multiplying the term by each part of the sum individually is called the _____ property.", "back": "Distributive"}, {"front": "True or False: FOIL is an effective method for multiplying a trinomial by a trinomial.", "back": "False"}, {"front": "In the context of polynomial multiplication, 'closure' means the product is always a _____.", "back": "polynomial"}, {"front": "To find the product of (2x + 3) and (x - 5), how many terms are combined to reach the final simplified middle term?", "back": "Two (-10x and 3x)"}, {"front": "What is the degree of the monomial -3x²?", "back": "Degree 2"}, {"front": "What is the degree of the product -12x⁵ + 6x³ - 15x²?", "back": "Degree 5"}, {"front": "When multiplying polynomials, the sum of the degrees of the factors _____ the degree of the product.", "back": "equals"}, {"front": "In the FOIL method, which product involves the term furthest to the left and the term furthest to the right?", "back": "Outer"}, {"front": "In the FOIL method, which product involves the two terms closest to each other in the center of the expression?", "back": "Inner"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
