<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 9, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Rational expressions operate using the same four arithmetic rules as ______.", "back": "numerical fractions"}, {"front": "What is the key initial step recommended before performing operations with rational expressions?", "back": "Factor all numerators and denominators completely."}, {"front": "What is the final step in the general process of operating with rational expressions after factoring?", "back": "Simplify the expression by dividing out common factors."}, {"front": "According to the property for multiplying rational expressions, $\\frac{P}{Q} \\cdot \\frac{R}{S} =$ ______.", "back": "$\\frac{PR}{QS}$"}, {"front": "In the multiplication property $\\frac{P}{Q} \\cdot \\frac{R}{S} = \\frac{PR}{QS}$, what are the two required conditions for $Q$ and $S$?", "back": "$Q \\ne 0$ and $S \\ne 0$"}, {"front": "Step 1 in multiplying rational expressions is to ______.", "back": "factor all numerators and denominators completely"}, {"front": "Step 2 in multiplying rational expressions is to ______ factors common to any numerator and any denominator.", "back": "divide out"}, {"front": "What is the final step in the procedure for multiplying rational expressions?", "back": "Multiply the remaining factors."}, {"front": "When multiplying $\\frac{x^2 - 4}{x + 5} \\cdot \\frac{x + 5}{x + 2}$, what is the factored form of the first numerator?", "back": "$(x+2)(x-2)$"}, {"front": "In the example $\\frac{x^2 - 4}{x + 5} \\cdot \\frac{x + 5}{x + 2}$, which factor is common to the first denominator and the second numerator?", "back": "$(x+5)$"}, {"front": "The product of $\\frac{x^2 - 4}{x + 5} \\cdot \\frac{x + 5}{x + 2}$ simplifies to which expression?", "back": "$x - 2$"}, {"front": "What are the excluded values for $x$ in the simplified product $\\frac{x^2 - 4}{x + 5} \\cdot \\frac{x + 5}{x + 2} = x - 2$?", "back": "$x \\ne -5$ and $x \\ne -2$"}, {"front": "Dividing by a rational expression is defined as multiplying by its ______.", "back": "reciprocal"}, {"front": "What is the first step to perform when dividing $\\frac{x^2 + 3x}{x - 1}$ by $\\frac{x^2 + 3x + 2}{x^2 - 1}$?", "back": "Multiply $\\frac{x^2 + 3x}{x - 1}$ by the reciprocal $\\frac{x^2 - 1}{x^2 + 3x + 2}$."}, {"front": "In the division example $\\frac{x^2 + 3x}{x - 1} \\div \\frac{x^2 + 3x + 2}{x^2 - 1}$, what is the factored form of $x^2 - 1$?", "back": "$(x+1)(x-1)$"}, {"front": "In the division example $\\frac{x^2 + 3x}{x - 1} \\div \\frac{x^2 + 3x + 2}{x^2 - 1}$, what is the factored form of $x^2 + 3x + 2$?", "back": "$(x+1)(x+2)$"}, {"front": "What is the simplified result of dividing $\\frac{x^2 + 3x}{x - 1}$ by $\\frac{x^2 + 3x + 2}{x^2 - 1}$?", "back": "$\\frac{x(x+3)}{x+2}$"}, {"front": "What three values of $x$ are excluded from the division result $\\frac{x(x+3)}{x+2}$?", "back": "$x \\ne 1$, $x \\ne -1$, and $x \\ne -2$"}, {"front": "What is the result of the checkpoint multiplication $\\frac{3x}{x^2 - 1} \\cdot \\frac{x + 1}{6}$?", "back": "$\\frac{x}{2(x-1)}$"}, {"front": "When adding rational expressions with like denominators, you add the ______ and keep the common denominator.", "back": "numerators"}, {"front": "When subtracting rational expressions with like denominators, you subtract the ______ and keep the common denominator.", "back": "numerators"}, {"front": "What is the sum of $\\frac{3x}{x+4} + \\frac{12}{x+4}$ before simplification?", "back": "$\\frac{3x + 12}{x + 4}$"}, {"front": "In the example $\\frac{3x + 12}{x + 4}$, factoring the numerator yields ______.", "back": "$3(x + 4)$"}, {"front": "The expression $\\frac{3x}{x+4} + \\frac{12}{x+4}$ simplifies to which constant?", "back": "3"}, {"front": "What value of $x$ is restricted in the addition example $\\frac{3x}{x+4} + \\frac{12}{x+4} = 3$?", "back": "$x \\ne -4$"}, {"front": "What must be found first when adding or subtracting rational expressions with unlike denominators?", "back": "A common denominator (specifically the LCD)."}, {"front": "What does the acronym LCD stand for in the context of rational expressions?", "back": "Least Common Denominator"}, {"front": "To find the LCD, the first step is to ______ each denominator completely.", "back": "factor"}, {"front": "The LCD is the product of each distinct factor, raised to the ______ power with which it appears in any denominator.", "back": "highest"}, {"front": "If denominators are $x-3$ and $x+1$, what is the LCD?", "back": "$(x-3)(x+1)$"}, {"front": "In the subtraction $\\frac{5}{x-3} - \\frac{2}{x+1}$, what must the first fraction be multiplied by to reach the LCD?", "back": "$\\frac{x+1}{x+1}$"}, {"front": "In the subtraction $\\frac{5}{x-3} - \\frac{2}{x+1}$, what must the second fraction be multiplied by to reach the LCD?", "back": "$\\frac{x-3}{x-3}$"}, {"front": "After rewriting with a common denominator, the subtraction $\\frac{5(x+1)}{(x-3)(x+1)} - \\frac{2(x-3)}{(x+1)(x-3)}$ results in what single numerator?", "back": "$5(x+1) - 2(x-3)$"}, {"front": "Simplifying the numerator $5(x+1) - 2(x-3)$ results in ______.", "back": "$3x + 11$"}, {"front": "What is the final simplified form of $\\frac{5}{x-3} - \\frac{2}{x+1}$?", "back": "$\\frac{3x + 11}{(x-3)(x+1)}$"}, {"front": "What values are excluded for $x$ in the expression $\\frac{3x + 11}{(x-3)(x+1)}$?", "back": "$x \\ne 3$ and $x \\ne -1$"}, {"front": "What is the result of the checkpoint addition $\\frac{4}{x} + \\frac{3}{x+2}$?", "back": "$\\frac{7x+8}{x(x+2)}$"}, {"front": "In the checkpoint $\\frac{4}{x} + \\frac{3}{x+2}$, what are the excluded values for $x$?", "back": "$x \\ne 0$ and $x \\ne -2$"}, {"front": "True or False: The denominator of a rational expression can be zero.", "back": "False"}, {"front": "When finding the LCD, if a factor $(x+2)$ appears once in one denominator and twice in another, what power of $(x+2)$ is used in the LCD?", "back": "The second power (or $(x+2)^2$)."}, {"front": "Concept: Reciprocal of a Rational Expression", "back": "Definition: The expression formed by interchanging the numerator and the denominator. Example: The reciprocal of $\\frac{P}{Q}$ is $\\frac{Q}{P}$."}, {"front": "How is the multiplication of numerators performed after finding common denominators in addition?", "back": "The numerators are combined over the single common denominator."}, {"front": "In $\\frac{3x + 12}{x + 4}$, why is $x = -4$ an excluded value even though the expression simplifies to 3?", "back": "Because the original denominator $x+4$ would be zero at $x = -4$."}, {"front": "When combining $5(x+1) - 2(x-3)$, what is the result of distributive property on the second term?", "back": "$-2x + 6$"}, {"front": "In the LCD definition, what does 'distinct factor' mean?", "back": "Each unique polynomial factor identified during the factoring process."}, {"front": "If two denominators have no common factors, the LCD is simply their ______.", "back": "product"}, {"front": "What is the primary reason to 'factor first' in rational expression operations?", "back": "To identify common factors that can be divided out to simplify the expression."}, {"front": "To add $\\frac{A}{C} + \\frac{B}{C}$, the result is ______.", "back": "$\\frac{A + B}{C}$"}, {"front": "When dividing $\\frac{P}{Q} \\div \\frac{R}{S}$, which expression is flipped to find the reciprocal?", "back": "The divisor (the second expression, $\\frac{R}{S}$)."}, {"front": "In the multiplication result $x-2, x \\ne -5, x \\ne -2$, why are there two restrictions if the final answer is linear?", "back": "Restrictions are based on all denominators present in the original problem or intermediate steps."}, {"front": "What is the LCD for the denominators $x$ and $x+2$?", "back": "$x(x+2)$"}, {"front": "In the context of the text, rational expression operations are compared to operations with ______.", "back": "numerical fractions"}, {"front": "In the subtraction problem $5x + 5 - 2x + 6$, what is the result of combining like terms?", "back": "$3x + 11$"}, {"front": "When a common factor is divided out of the numerator and denominator, what value does that ratio represent?", "back": "1"}, {"front": "Where will students continue to develop skills with rational expression operations after this section?", "back": "Algebra II, Sections 6-2 and 6-3."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
