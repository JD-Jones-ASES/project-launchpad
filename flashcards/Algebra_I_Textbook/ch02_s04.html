<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 2, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the definition of a literal equation?", "back": "It is an equation that contains two or more variables."}, {"front": "A literal equation contains at least _____ variables.", "back": "Two"}, {"front": "How should other variables be treated when solving a literal equation for one specific variable?", "back": "They should be treated as if they were numbers."}, {"front": "The algebraic steps used to solve literal equations are identical to the steps used to solve _____.", "back": "One-variable equations with numbers."}, {"front": "Formula: Area of a triangle", "back": "A = ½bh"}, {"front": "In the triangle area formula A = ½bh, what does the variable b represent?", "back": "Base"}, {"front": "In the triangle area formula A = ½bh, what does the variable h represent?", "back": "Height"}, {"front": "Solve the triangle area formula A = ½bh for h.", "back": "h = 2A/b"}, {"front": "What is the first step to solve A = ½bh for h to eliminate the fraction?", "back": "Multiply both sides by 2."}, {"front": "After multiplying A = ½bh by 2 on both sides, what is the resulting equation?", "back": "2A = bh"}, {"front": "To isolate h in the equation 2A = bh, what operation must be performed?", "back": "Divide both sides by b."}, {"front": "Solve the triangle area formula A = ½bh for b.", "back": "b = 2A/h"}, {"front": "Formula: Perimeter of a rectangle", "back": "P = 2l + 2w"}, {"front": "In the formula P = 2l + 2w, what do l and w represent?", "back": "Length and width"}, {"front": "Solve the rectangle perimeter formula P = 2l + 2w for w.", "back": "w = P - 2l/2"}, {"front": "What is the first step to isolate w in the equation P = 2l + 2w?", "back": "Subtract 2l from both sides."}, {"front": "What is the resulting equation after subtracting 2l from both sides of P = 2l + 2w?", "back": "P - 2l = 2w"}, {"front": "To isolate w in the equation P - 2l = 2w, what operation must be performed last?", "back": "Divide both sides by 2."}, {"front": "Solve the rectangle perimeter formula P = 2l + 2w for l.", "back": "l = P - 2w/2"}, {"front": "Formula: Distance", "back": "d = rt"}, {"front": "In the distance formula d = rt, what do the variables r and t represent?", "back": "Rate and time"}, {"front": "Solve the distance formula d = rt for t.", "back": "t = d/r"}, {"front": "Which operation isolates t in the equation d = rt?", "back": "Divide both sides by r."}, {"front": "Solve the distance formula d = rt for r.", "back": "r = d/t"}, {"front": "Formula: Circumference of a circle", "back": "C = 2π r"}, {"front": "Solve the circumference formula C = 2π r for the radius r.", "back": "r = C/2π"}, {"front": "What operation is used to isolate r in the equation C = 2π r?", "back": "Divide both sides by 2π."}, {"front": "Many important formulas in mathematics and _____ are literal equations.", "back": "Science"}, {"front": "Formula: Physics Force formula", "back": "F = ma"}, {"front": "Solve the physics formula F = ma for a.", "back": "a = F/m"}, {"front": "Solve the physics formula F = ma for m.", "back": "m = F/a"}, {"front": "Formula: Chemistry Ideal Gas Law", "back": "PV = nRT"}, {"front": "Solve the chemistry formula PV = nRT for T.", "back": "T = PV/nR"}, {"front": "Solve the chemistry formula PV = nRT for P.", "back": "P = nRT/V"}, {"front": "Solve the chemistry formula PV = nRT for n.", "back": "n = PV/RT"}, {"front": "Solve the chemistry formula PV = nRT for V.", "back": "V = nRT/P"}, {"front": "What is the 'caution' regarding the target variable in the final solution of a literal equation?", "back": "The variable must not appear on both sides of the final answer."}, {"front": "Why is h = A/frac12b considered a less desirable answer than h = 2A/b?", "back": "It is not fully simplified because it contains a complex fraction."}, {"front": "To solve a literal equation, you must _____ the target variable on one side.", "back": "Isolate"}, {"front": "When solving P = 2l + 2w for w, which term is removed first from the side containing w?", "back": "2l"}, {"front": "In the context of the distance formula, t is calculated by dividing distance by _____.", "back": "Rate"}, {"front": "In the context of circle circumference, r is calculated by dividing circumference by _____.", "back": "2π"}, {"front": "Solve A = ½bh for h given A = 10 and b = 5.", "back": "h = 2(10)/5 = 4"}, {"front": "What is the primary goal when asked to 'solve for x' in a literal equation containing x, y, and z?", "back": "To isolate x on one side of the equation with an expression containing only y and z on the other."}, {"front": "In science courses, why is rearranging formulas like PV = nRT considered an essential skill?", "back": "To allow for the calculation of an unknown variable from known experimental values."}, {"front": "What is the simplified solved form of C = 2π r for π?", "back": "π = C/2r"}, {"front": "The formula d = rt is an example of a _____ equation because it contains three variables.", "back": "Literal"}, {"front": "When solving 2A = bh for b, what is the next logical step?", "back": "Divide both sides by h."}, {"front": "What represents the 'rate' in the distance formula d=rt?", "back": "r"}, {"front": "Solve for w: P - 2l = 2w.", "back": "w = P - 2l/2"}, {"front": "If you solve A = ½bh and get h = A/0.5b, is it equivalent to h = 2A/b?", "back": "Yes, but h = 2A/b is preferred as it is fully simplified."}, {"front": "In the formula P = 2l + 2w, which operation is used to separate the 2 from the w?", "back": "Division"}, {"front": "If PV = nRT, then R = PV/nT. What operation was used to isolate R?", "back": "Division (by nT)"}, {"front": "In the formula A = ½bh, the fraction ½ is a _____.", "back": "Coefficient (or constant)."}, {"front": "Rearranging d = rt to r = d/t allows you to find the _____ if you know distance and time.", "back": "Rate (or speed)"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
