<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 9, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What condition must be met to add or subtract radical expressions?", "back": "The expressions must have the same radicand.", "id": "fc01"}, {"front": "What is the term for radical expressions that have the same radicand?", "back": "Like radicals.", "id": "fc02"}, {"front": "Like radicals are conceptually similar to what algebraic concept?", "back": "Like terms.", "id": "fc03"}, {"front": "Simplify the expression $3\\sqrt{5} + 7\\sqrt{5}$.", "back": "$10\\sqrt{5}$.", "id": "fc04"}, {"front": "Why is it often necessary to simplify radicals before adding or subtracting them?", "back": "To determine if they can be converted into like radicals.", "id": "fc05"}, {"front": "What is the first step in simplifying the expression $3\\sqrt{12} + 5\\sqrt{27} - 2\\sqrt{48}$?", "back": "Simplify each individual radical term.", "id": "fc06"}, {"front": "Simplify the radical term $3\\sqrt{12}$.", "back": "$6\\sqrt{3}$.", "id": "fc07"}, {"front": "Simplify the radical term $5\\sqrt{27}$.", "back": "$15\\sqrt{3}$.", "id": "fc08"}, {"front": "Simplify the radical term $2\\sqrt{48}$.", "back": "$8\\sqrt{3}$.", "id": "fc09"}, {"front": "After simplifying, how is $6\\sqrt{3} + 15\\sqrt{3} - 8\\sqrt{3}$ combined?", "back": "By combining the coefficients: $(6 + 15 - 8)\\sqrt{3}$.", "id": "fc10"}, {"front": "What are the two primary mathematical properties used to multiply radical expressions?", "back": "The product property of square roots and the distributive property.", "id": "fc11"}, {"front": "State the product property of square roots used during multiplication.", "back": "$\\sqrt{a} \\cdot \\sqrt{b} = \\sqrt{ab}$.", "id": "fc12"}, {"front": "In the example $\\sqrt{3}(2\\sqrt{6} - \\sqrt{15})$, what is the result of the first distribution step?", "back": "$2\\sqrt{18} - \\sqrt{45}$.", "id": "fc13"}, {"front": "Simplify the expression $2\\sqrt{18}$.", "back": "$6\\sqrt{2}$.", "id": "fc14"}, {"front": "Simplify the expression $\\sqrt{45}$.", "back": "$3\\sqrt{5}$.", "id": "fc15"}, {"front": "What is the final simplified form of $2\\sqrt{18} - \\sqrt{45}$?", "back": "$6\\sqrt{2} - 3\\sqrt{5}$.", "id": "fc16"}, {"front": "Concept: Conjugate", "back": "Definition: For an expression $a + \\sqrt{c}$, the conjugate is $a - \\sqrt{c}$.", "id": "fc17"}, {"front": "What is the conjugate of the expression $a + b\\sqrt{c}$?", "back": "$a - b\\sqrt{c}$.", "id": "fc18"}, {"front": "What is the result of multiplying a radical binomial by its conjugate?", "back": "The radical terms cancel out, leaving a rational expression.", "id": "fc19"}, {"front": "The formula $(a + b\\sqrt{c})(a - b\\sqrt{c}) = a^2 - b^2 c$ is an application of which algebraic pattern?", "back": "The difference-of-squares pattern.", "id": "fc20"}, {"front": "How do you rationalize a denominator that is a binomial containing a radical?", "back": "Multiply both the numerator and denominator by the conjugate of the denominator.", "id": "fc21"}, {"front": "In the expression $\\frac{6}{3 + \\sqrt{5}}$, what is the conjugate of the denominator?", "back": "$3 - \\sqrt{5}$.", "id": "fc22"}, {"front": "When simplifying $\\frac{6}{3 + \\sqrt{5}}$, what is the product of the denominator and its conjugate?", "back": "$3^2 - (\\sqrt{5})^2$, which simplifies to $4$.", "id": "fc23"}, {"front": "Simplify the fraction $\\frac{6(3 - \\sqrt{5})}{4}$ by reducing the common factor.", "back": "$\\frac{3(3 - \\sqrt{5})}{2}$.", "id": "fc24"}, {"front": "What is the final distributed form of $\\frac{3(3 - \\sqrt{5})}{2}$?", "back": "$\\frac{9 - 3\\sqrt{5}}{2}$.", "id": "fc25"}, {"front": "The process of removing a radical from the bottom of a fraction is called _____ the denominator.", "back": "rationalizing", "id": "fc26"}, {"front": "According to the 'Working with Radicals' summary, how should you rationalize a single-term denominator $\\sqrt{a}$?", "back": "Multiply the fraction by $\\frac{\\sqrt{a}}{\\sqrt{a}}$.", "id": "fc27"}, {"front": "Under what condition can you add or subtract radicals immediately without simplification?", "back": "When they already have the same radicand.", "id": "fc28"}, {"front": "In Algebra II, Section 1-5, operations will extend to higher-index radicals, such as _____ roots.", "back": "cube", "id": "fc29"}, {"front": "What is the conjugate of $x - \\sqrt{y}$?", "back": "$x + \\sqrt{y}$.", "id": "fc30"}, {"front": "What term describes the number or expression located inside a radical symbol?", "back": "Radicand.", "id": "fc31"}, {"front": "True or False: You can combine $2\\sqrt{3}$ and $2\\sqrt{5}$ into a single radical term.", "back": "False (they are not like radicals).", "id": "fc32"}, {"front": "Calculate the denominator result: $(\\sqrt{7} + 2)(\\sqrt{7} - 2)$.", "back": "$3$.", "id": "fc33"}, {"front": "What property justifies the step $\\sqrt{2} \\cdot \\sqrt{3} = \\sqrt{6}$?", "back": "The product property of square roots.", "id": "fc34"}, {"front": "Identify the conjugate: $5 + \\sqrt{2}$.", "back": "$5 - \\sqrt{2}$.", "id": "fc35"}, {"front": "Identify the conjugate: $\\sqrt{6} - 3$.", "back": "$\\sqrt{6} + 3$.", "id": "fc36"}, {"front": "When multiplying radicals, the product property states that $\\sqrt{a} \\cdot \\sqrt{b} = \\sqrt{ab}$ for all non-negative real numbers _____.", "back": "$a$ and $b$", "id": "fc37"}, {"front": "In the expression $3\\sqrt{12}$, the number $3$ is the coefficient and $12$ is the _____.", "back": "radicand", "id": "fc38"}, {"front": "What is the value of $(\\sqrt{x})^2$ for any non-negative $x$?", "back": "$x$.", "id": "fc39"}, {"front": "Simplify $10\\sqrt{3} - 4\\sqrt{3} + \\sqrt{3}$.", "back": "$7\\sqrt{3}$.", "id": "fc40"}, {"front": "To simplify $\\frac{1}{\\sqrt{2} + 1}$, you should multiply the numerator and denominator by _____.", "back": "$\\sqrt{2} - 1$.", "id": "fc41"}, {"front": "Which algebraic rule allows us to say $3\\sqrt{x} + 7\\sqrt{x} = (3+7)\\sqrt{x}$?", "back": "The distributive property.", "id": "fc42"}, {"front": "What is the next step in simplifying $\\sqrt{18} + \\sqrt{50}$?", "back": "Simplify the radicals to $3\\sqrt{2} + 5\\sqrt{2}$.", "id": "fc43"}, {"front": "Multiply: $\\sqrt{5}(\\sqrt{5} + 2)$.", "back": "$5 + 2\\sqrt{5}$.", "id": "fc44"}, {"front": "Simplify the product: $\\sqrt{2} \\cdot \\sqrt{32}$.", "back": "$8$ (from $\\sqrt{64}$).", "id": "fc45"}, {"front": "When rationalizing $\\frac{4}{2-\\sqrt{3}}$, what is the resulting denominator after multiplying by the conjugate?", "back": "$1$ (from $2^2 - (\\sqrt{3})^2 = 4 - 3$).", "id": "fc46"}, {"front": "Simplify: $2\\sqrt{3} \\cdot 5\\sqrt{6}$.", "back": "$10\\sqrt{18}$ or $30\\sqrt{2}$.", "id": "fc47"}, {"front": "What is the conjugate of $-\\sqrt{10} - 4$?", "back": "$-\\sqrt{10} + 4$.", "id": "fc48"}, {"front": "Is the expression $5\\sqrt{2} + 2\\sqrt{5}$ considered a pair of like radicals?", "back": "No, because the radicands ($2$ and $5$) are different.", "id": "fc49"}, {"front": "The summary notes that in Algebra II, radicals will also be expressed using _____ exponents.", "back": "rational", "id": "fc50"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
