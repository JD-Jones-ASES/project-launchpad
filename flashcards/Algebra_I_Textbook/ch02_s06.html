<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 2, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the literal meaning of the term \"percent\"?", "back": "Per hundred."}, {"front": "What is the decimal representation of $45\\%$?", "back": "0.45"}, {"front": "What is the fraction representation of $45\\%$?", "back": "45/100"}, {"front": "What must be done to a percent before using it in an algebraic equation?", "back": "Convert it to a decimal or a fraction."}, {"front": "State the standard Percent Equation using the terms part, percent, and whole.", "back": "part = percent · whole"}, {"front": "In the percent equation part = pw, what does the variable p represent?", "back": "The percent written as a decimal."}, {"front": "In the percent equation part = pw, what does the variable w represent?", "back": "The whole."}, {"front": "What is the first step in finding a part, such as \"What is $35\\%of80$\"?", "back": "Write the percent as a decimal (0.35)."}, {"front": "What is the result of $35\\%of80$?", "back": "28"}, {"front": "What is $18\\%of250$?", "back": "45"}, {"front": "When solving for the percent p in 12 = p · 50, what is the result of the division 12/50?", "back": "0.24"}, {"front": "What is the final step after finding the decimal value 0.24 in a \"finding the percent\" problem?", "back": "Convert the decimal back to a percent ($24\\%$)."}, {"front": "What is the first step in calculating a percent increase or decrease?", "back": "Find the amount of change (change = original - new)."}, {"front": "In a percent decrease problem, how is the amount of change calculated?", "back": "change = original - sale\\_price"}, {"front": "What is the denominator used when calculating the percent decrease?", "back": "The original amount."}, {"front": "A jacket originally priced at 60is on sale for45\\. What is the amount of change?", "back": "15\\$"}, {"front": "What is the percent decrease for a 60jacket sold for45\\.", "back": "$25\\%$"}, {"front": "A shirt costs 40and its price increases to52\\. What is the amount of change?", "back": "12\\$"}, {"front": "What is the percent increase for a 40shirt that now costs52\\.", "back": "$30\\%$"}, {"front": "What is the formula for simple interest?", "back": "I = Prt"}, {"front": "In the simple interest formula, what does I represent?", "back": "The interest earned."}, {"front": "Term: Principal", "back": "Definition: The starting amount of money in an interest calculation."}, {"front": "In the simple interest formula, what does r represent?", "back": "The annual interest rate written as a decimal."}, {"front": "In the simple interest formula, what does t represent?", "back": "The time in years."}, {"front": "What specific unit of time must be used for t in the simple interest formula?", "back": "Years."}, {"front": "What type of function models simple interest?", "back": "A linear function."}, {"front": "What type of function models compound interest?", "back": "An exponential function."}, {"front": "Why is r = 4 incorrect for a $4\\%interest rate in the formulaI=Prt$?", "back": "The rate must be converted to the decimal 0.04 first."}, {"front": "Which algebraic concept is commonly applied to calculate discounts, taxes, and tips?", "back": "Percent equations."}, {"front": "To find $18\\%of250, you multiply250$ by which decimal?", "back": "0.18"}, {"front": "What is the equation to find p if 12 is what percent of 50?", "back": "12 = p · 50"}, {"front": "Convert the decimal 0.30 to a percent.", "back": "$30\\%$"}, {"front": "In which specific mathematics course is compound interest typically studied?", "back": "Algebra II."}, {"front": "Cloze: In the percent equation, part = _____ · whole.", "back": "percent"}, {"front": "If a value changes from 40 to 52, what is the original amount in the percent increase formula?", "back": "40"}, {"front": "What is the mathematical result of 15/60 as a decimal?", "back": "0.25"}, {"front": "What is the mathematical result of 12/40 as a decimal?", "back": "0.30"}, {"front": "What is the value of r if the annual interest rate is $7.5\\%$?", "back": "0.075"}, {"front": "According to the text, what does compound interest involve that simple interest does not?", "back": "Interest earning interest."}, {"front": "Cloze: To find the percent change, divide the _____ by the original amount.", "back": "change"}, {"front": "If P is the principal and r is the rate, what does the product Pr represent if t=1?", "back": "The interest earned in one year (I)."}, {"front": "Which variable in I=Prt represents the starting balance of an account?", "back": "P"}, {"front": "How do you translate \"is\" in a percent word problem into a mathematical symbol?", "back": "The equals sign (=)."}, {"front": "How do you translate \"of\" in a percent word problem into a mathematical operation?", "back": "Multiplication (·)."}, {"front": "Convert $35\\%$ to a decimal.", "back": "0.35"}, {"front": "A discount is a real-world application of which concept?", "back": "Percent decrease."}, {"front": "Tax is a real-world application of which concept?", "back": "Percent increase."}, {"front": "What is the result of moving the decimal point in 0.24 two places to the right?", "back": "$24\\%$"}, {"front": "Cloze: Percent means per _____.", "back": "hundred"}, {"front": "Which formula should be used to calculate annual interest that does not earn interest?", "back": "The simple interest formula (I=Prt)."}, {"front": "Identify the whole (w) in the question: \"12 is what percent of 50?\"", "back": "50"}, {"front": "Identify the part in the question: \"What is $35\\%of80$?\"", "back": "The unknown variable (x)."}, {"front": "If an interest rate is given monthly, what must be done to the time t before using the simple interest formula?", "back": "Convert the time to years."}, {"front": "What is the decimal equivalent of $100\\%$?", "back": "1.0"}, {"front": "Cloze: In Algebra I, percent applications are modeled by _____ equations.", "back": "linear"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
