<html lang="en">
<head>

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the alternative name for the elimination method of solving systems?", "back": "The addition method."}, {"front": "Under what structural condition is the elimination method considered especially efficient?", "back": "It is efficient when neither equation is already solved for a variable."}, {"front": "In the elimination method, both equations should first be written in _____ form.", "back": "Standard form ($Ax + By = C$)."}, {"front": "What is the primary goal of multiplying equations by constants in the elimination method?", "back": "To make the coefficients of one variable opposites."}, {"front": "What mathematical operation is performed on the two equations to cause one variable to drop out?", "back": "Addition (or subtraction)."}, {"front": "After adding two equations and eliminating a variable, what is the next step in the procedure?", "back": "Solve the resulting equation for the remaining variable."}, {"front": "Once the value of one variable is found, how is the value of the other variable determined?", "back": "Substitute the value back into either original equation."}, {"front": "Where should the final solution to a system be checked to ensure accuracy?", "back": "In both original equations."}, {"front": "In the system $3x + 2y = 16$ and $3x - 2y = 8$, adding the equations results in the equation _____.", "back": "$6x = 24$."}, {"front": "In the system $3x + 2y = 16$ and $3x - 2y = 8$, the solved value for $x$ is _____.", "back": "$4$."}, {"front": "For the system $3x + 2y = 16$ and $3x - 2y = 8$, the solved value for $y$ is _____.", "back": "$2$."}, {"front": "System: $2x + 5y = 1$ and $3x + 2y = -4$. To eliminate $x$, what should the first equation be multiplied by?", "back": "$3$."}, {"front": "System: $2x + 5y = 1$ and $3x + 2y = -4$. To eliminate $x$, what should the second equation be multiplied by?", "back": "$-2$."}, {"front": "After multiplying $2x + 5y = 1$ by $3$ and $3x + 2y = -4$ by $-2$, what are the new $x$-coefficients?", "back": "$6$ and $-6$."}, {"front": "In the system $2x + 5y = 1$ and $3x + 2y = -4$, adding the transformed equations leads to the equation _____.", "back": "$11y = 11$."}, {"front": "For the system $2x + 5y = 1$ and $3x + 2y = -4$, what is the calculated value of $y$?", "back": "$1$."}, {"front": "For the system $2x + 5y = 1$ and $3x + 2y = -4$, what is the calculated value of $x$?", "back": "$-2$."}, {"front": "If adding the equations in a system results in a contradiction like $0 = 22$, what is the solution?", "back": "The system has no solution."}, {"front": "Geometrically, what is the relationship between lines in a system that has no solution?", "back": "The lines are parallel."}, {"front": "In the system $4x - 6y = 12$ and $-2x + 3y = 5$, multiplying the second equation by $2$ results in _____.", "back": "$-4x + 6y = 10$."}, {"front": "Checkpoint System: $5x + 3y = 11$ and $2x - 3y = 10$. What is the value of $x$ after adding the equations?", "back": "$x = 3$."}, {"front": "Checkpoint System: $5x + 3y = 11$ and $2x - 3y = 10$. What is the value of $y$?", "back": "$y = -\\frac{4}{3}$."}, {"front": "How do the solutions found by graphing, substitution, and elimination compare for the same system?", "back": "All three methods give the same answer."}, {"front": "Algebra II extends system-solving to how many variables?", "back": "Three variables."}, {"front": "What advanced mathematical tool is used to solve larger systems in higher-level algebra courses?", "back": "Matrix methods."}, {"front": "If a system is $2x = -4$, what is the value of $x$?", "back": "$x = -2$."}, {"front": "In the process of elimination, why might you multiply both equations by different constants?", "back": "To ensure the coefficients of the chosen variable become additive opposites."}, {"front": "What is the resulting equation when $3(4) + 2y = 16$ is simplified for $2y$?", "back": "$2y = 4$."}, {"front": "The standard form equation used in elimination is represented by the formula _____.", "back": "$Ax + By = C$."}, {"front": "If the addition of two lines in a system results in $0=0$, what would that usually imply compared to $0=22$?", "back": "While $0=22$ means no solution, $0=0$ would imply infinitely many solutions (though not explicitly detailed in this section)."}, {"front": "What is the final coordinate pair for the system $2x + 5y = 1$ and $3x + 2y = -4$?", "back": "$(-2, 1)$."}, {"front": "What is the final coordinate pair for the system $3x + 2y = 16$ and $3x - 2y = 8$?", "back": "$(4, 2)$."}, {"front": "What is the final coordinate pair for the system $5x + 3y = 11$ and $2x - 3y = 10$?", "back": "$(3, -\\frac{4}{3})$."}, {"front": "In the standard form $Ax + By = C$, what do $A$, $B$, and $C$ typically represent?", "back": "Constants."}, {"front": "What is the first step when solving $[\\, 4x - 6y = 12, \\, -2x + 3y = 5 \\,]$ by elimination?", "back": "Multiply the second equation by $2$."}, {"front": "Adding $(4x - 6y)$ and $(-4x + 6y)$ results in what value?", "back": "$0$."}, {"front": "In the example resulting in no solution, what was the sum of the constants $12$ and $10$?", "back": "$22$."}, {"front": "The choice of method for solving a system should be based on which is most _____ for that system.", "back": "Efficient."}, {"front": "True or False: The elimination method can only be used if coefficients are already opposites.", "back": "False, because equations can be multiplied by constants to create opposites."}, {"front": "What variable drops out when adding $2y$ and $-2y$?", "back": "The variable $y$."}, {"front": "In the system $5x + 3y = 11$ and $2x - 3y = 10$, what makes the $y$ variable easy to eliminate?", "back": "The $y$-coefficients are already opposites ($3$ and $-3$)."}, {"front": "If you multiply $2x + 5y = 1$ by $3$, the resulting equation is _____.", "back": "$6x + 15y = 3$."}, {"front": "If you multiply $3x + 2y = -4$ by $-2$, the resulting equation is _____.", "back": "$-6x - 4y = 8$."}, {"front": "What is the sum of $3(4)$ and $2(2)$ in the check for the first example?", "back": "$16$."}, {"front": "What is the sum of $3(4)$ and $-2(2)$ in the check for the first example?", "back": "$8$."}, {"front": "In the elimination process, what happens to the $x$ variable when $6x$ and $-6x$ are added?", "back": "It is eliminated (becomes $0x$)."}, {"front": "Why is it important to multiply both sides of the equation by a constant?", "back": "To maintain the equality of the equation."}, {"front": "If $x=3$ is substituted into $5x + 3y = 11$, what is the simplified equation for $3y$?", "back": "$3y = -4$."}, {"front": "Solving a system of equations by elimination is also known as using the _____ property of equality.", "back": "Addition."}, {"front": "What is the significance of solving for the 'remaining variable' after addition?", "back": "It provides the numerical value for one half of the $(x, y)$ solution pair."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
