<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 5, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the definition of a solution to a system of linear inequalities?", "back": "An ordered pair (x, y) that satisfies every inequality in the system."}, {"front": "What term describes the set of all solutions representing the intersection of half-planes in a system of inequalities?", "back": "The solution region."}, {"front": "When graphing a single linear inequality, what is the first step regarding the boundary?", "back": "Graph the boundary line defined by the equation version of the inequality."}, {"front": "Which inequality symbols require the use of a solid boundary line?", "back": "le (less than or equal to) or ge (greater than or equal to)."}, {"front": "Which inequality symbols require the use of a dashed boundary line?", "back": "< (less than) or > (greater than)."}, {"front": "What does a solid boundary line indicate about the points located on that line?", "back": "The points are included in the solution set."}, {"front": "What does a dashed boundary line indicate about the points located on that line?", "back": "The points are not included in the solution set."}, {"front": "What is the purpose of choosing a test point not on the boundary line?", "back": "To determine which half-plane contains the solutions and should be shaded."}, {"front": "Why is the origin (0, 0) frequently used as a test point?", "back": "It simplifies the substitution and arithmetic calculations."}, {"front": "Under what condition do you shade the half-plane that contains the chosen test point?", "back": "When substituting the test point into the inequality results in a true statement."}, {"front": "Under what condition do you shade the half-plane that does NOT contain the chosen test point?", "back": "When substituting the test point into the inequality results in a false statement."}, {"front": "For the inequality y le 2x + 1, what type of line is used for the boundary y = 2x + 1?", "back": "A solid line."}, {"front": "Substituting (0, 0) into y le 2x + 1 results in 0 le 1. Based on this, which region is shaded?", "back": "The region below the line containing the origin."}, {"front": "How is the solution region of a system of two inequalities identified on a graph?", "back": "It is the area where the shaded regions of both individual inequalities overlap."}, {"front": "In the system of y ge -x + 4 and y < 2x + 1, which direction is shaded for y ge -x + 4?", "back": "The region above the line (where (0, 0) is false)."}, {"front": "In the system of y ge -x + 4 and y < 2x + 1, which direction is shaded for y < 2x + 1?", "back": "The region below the line (where (0, 0) is true)."}, {"front": "How is the vertex of a solution region's boundary determined?", "back": "By finding the intersection point of the boundary lines using algebraic substitution or elimination."}, {"front": "What is the intersection point of the boundary lines y = -x + 4 and y = 2x + 1?", "back": "(1, 3)."}, {"front": "In the system y ge -x + 4 and y < 2x + 1, why is the vertex (1, 3) excluded from the solution region?", "back": "Because it lies on a dashed boundary line (y < 2x + 1) where equality is not allowed."}, {"front": "How do you algebraically determine if a specific point (x, y) is a solution to a system of inequalities?", "back": "Substitute the point into every inequality in the system to check if all resulting statements are true."}, {"front": "Is the point (3, 2) a solution to the system y ge -x + 4 and y < 2x + 1?", "back": "Yes, because 2 ge 1 and $2 < 7$ are both true."}, {"front": "For the system y > x - 2 and y le -x + 4, what type of line represents y = x - 2?", "back": "A dashed line."}, {"front": "For the system y > x - 2 and y le -x + 4, what type of line represents y = -x + 4?", "back": "A solid line."}, {"front": "Where do the boundary lines y = x - 2 and y = -x + 4 intersect?", "back": "(3, 1)."}, {"front": "Under what circumstance does a system of linear inequalities have no solution?", "back": "When there is no overlapping area between the shaded regions of the individual inequalities."}, {"front": "Why does the system y > 2x + 3 and y < 2x - 1 have no solution?", "back": "They define parallel strips with shadings that move away from each other and never overlap."}, {"front": "The solution region of a system is the _____ of the half-planes defined by the inequalities.", "back": "Intersection (or overlap)"}, {"front": "If an inequality is strict, such as y > mx + b, the boundary line is _____.", "back": "Dashed"}, {"front": "If an inequality includes equality, such as y ge mx + b, the boundary line is _____.", "back": "Solid"}, {"front": "To test the side of the line to shade for y < 2x + 1, you can substitute the coordinates of the _____ into the inequality.", "back": "Origin (or test point)"}, {"front": "When solving for the intersection of y = -x + 4 and y = 2x + 1, what is the resulting equation for x?", "back": "-x + 4 = 2x + 1"}, {"front": "In the context of graphing, what does the 'boundary line' represent?", "back": "The edge of the solution region where the inequality becomes an equation."}, {"front": "Concept: Solution of a System of Linear Inequalities", "back": "Definition: An ordered pair satisfying all inequalities in the system. Example: (3, 2) for y ge -x + 4 and y < 2x + 1."}, {"front": "Process: Determining the Shading Region", "back": "Choose a point off the line, substitute into the inequality; if true, shade that side; if false, shade the opposite side."}, {"front": "What characterizes the 'half-plane' in a linear inequality graph?", "back": "The region on one side of a boundary line containing points that satisfy the inequality."}, {"front": "For y > x - 2, in which direction relative to the line y = x - 2 is the solution region shaded?", "back": "Above the line."}, {"front": "For y le -x + 4, in which direction relative to the line y = -x + 4 is the solution region shaded?", "back": "Below the line."}, {"front": "If a system consists of two non-parallel linear inequalities, how many vertices will the solution region have?", "back": "One."}, {"front": "Why is (1, 3) not a solution to y < 2x + 1?", "back": "Because substituting the coordinates results in $3 < 3$, which is a false statement."}, {"front": "What is the relationship between the boundary lines of the system y > 2x + 3 and y < 2x - 1?", "back": "They are parallel because they have the same slope."}, {"front": "When graphing a system, what is the 'intersection of half-planes'?", "back": "The region where all individual inequality conditions are simultaneously met."}, {"front": "If (0, 0) is tested in y < 2x + 1 and results in $0 < 1$, is the origin part of the solution?", "back": "Yes, because the statement is true."}, {"front": "If (0, 0) is tested in y ge -x + 4 and results in 0 ge 4, is the origin part of the solution?", "back": "No, because the statement is false."}, {"front": "If a point satisfies one inequality in a system but not the other, is it a solution to the system?", "back": "No, it must satisfy every inequality in the system."}, {"front": "How is the vertex (1, 3) found for the boundary lines y = -x + 4 and y = 2x + 1?", "back": "Set the equations equal: -x + 4 = 2x + 1, solve for x = 1, then find y = 3."}, {"front": "What type of line is used for y ge -x + 4?", "back": "A solid line."}, {"front": "What type of line is used for y < 2x + 1?", "back": "A dashed line."}, {"front": "If the solution region is 'above' a solid line and 'below' a dashed line, what type of boundary does the vertex have?", "back": "An open or 'not included' vertex (if at least one boundary is dashed)."}, {"front": "Which point (x, y) is a common convenient test point unless it falls exactly on the boundary line?", "back": "The origin (0, 0)."}, {"front": "If a test point (0, 0) makes the inequality y ge 2x + 1 false, which side of the line is shaded?", "back": "The side not containing (0, 0)."}, {"front": "How can you identify the vertex of a solution region from a system of equations?", "back": "Solve the system of boundary line equations for their intersection point."}, {"front": "True or False: A point on a dashed boundary line can be a solution to a system of inequalities.", "back": "False."}, {"front": "True or False: Every point in the overlapping shaded region of a system is a solution.", "back": "True."}, {"front": "If y le 2x + 1, are the points on the line y = 2x + 1 solutions?", "back": "Yes."}, {"front": "If y < 2x + 1, are the points on the line y = 2x + 1 solutions?", "back": "No."}, {"front": "The vertex of the solution region for y > x - 2 and y le -x + 4 is at (3, 1). Is this point included in the solution set?", "back": "No, because y > x - 2 is a strict inequality."}, {"front": "What visual feature indicates a 'no solution' scenario in a system of linear inequalities?", "back": "The absence of any overlapping shaded area between the graphs."}, {"front": "Is the ordered pair (0, 4) a solution to y ge -x + 4?", "back": "Yes, because 4 ge -0 + 4 simplifies to 4 ge 4, which is true."}, {"front": "When a system consists of parallel boundary lines and the shaded regions are between them, how many solution regions are there?", "back": "One (the strip between the lines)."}, {"front": "What is the result of substituting (1, 3) into y ge -x + 4?", "back": "3 ge 3, which is true."}, {"front": "Formula: Finding the intersection of y = m₁x + b₁ and y = m₂x + b₂", "back": "Set m₁x + b₁ = m₂x + b₂ and solve for x."}, {"front": "What determines if a shaded region is 'above' or 'below' a line in the form y < mx + b or y > mx + b?", "back": "The inequality symbol (> for above, < for below)."}, {"front": "Term: Test Point", "back": "Definition: A point chosen to check which side of a boundary line satisfies an inequality. Example: (0, 0)."}, {"front": "What happens to the solution region if you add a third inequality to a system?", "back": "The region will likely shrink as it must satisfy the intersection of all three half-planes."}, {"front": "In the inequality y ge 2x + 1, what does the 'greater than' part of ge signify for shading?", "back": "Shading above the boundary line."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
