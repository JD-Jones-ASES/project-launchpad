<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In mathematics, what is the definition of a 'relation'?", "back": "Any set of ordered pairs."}, {"front": "List four common ways a relation may be described.", "back": "A list of ordered pairs, a table, a graph, or an equation."}, {"front": "The set of all first coordinates (x -values) in a relation is called the _____.", "back": "Domain"}, {"front": "The set of all second coordinates (y -values) in a relation is called the _____.", "back": "Range"}, {"front": "When stating the domain and range from a list of ordered pairs, how should repeated values be handled?", "back": "Each value should be listed only once."}, {"front": "State the domain of the relation (-3, 2), (0, 5), (1, -1), (4, 5).", "back": "-3, 0, 1, 4"}, {"front": "State the range of the relation (-3, 2), (0, 5), (1, -1), (4, 5).", "back": "-1, 2, 5"}, {"front": "In the relation (-3, 2), (0, 5), (1, -1), (4, 5), why is the number 5 only listed once in the range?", "back": "The range is a set of unique y-values and does not include repeats."}, {"front": "A relation where every element of the domain is paired with exactly one element of the range is called a _____.", "back": "Function"}, {"front": "What is the requirement for x-values in a relation to be classified as a function?", "back": "No x-value can be repeated with a different y-value."}, {"front": "The _____ is a visual method used to determine if a graph in the coordinate plane represents a function.", "back": "Vertical line test"}, {"front": "According to the vertical line test, a graph is a function if every vertical line intersects the graph at _____ point(s).", "back": "At most one"}, {"front": "If a vertical line crosses a graph at two or more points, what does this indicate about the x-value?", "back": "A single x-value is paired with more than one y-value."}, {"front": "A relation is NOT a function if any vertical line crosses its graph in _____ point(s).", "back": "Two or more"}, {"front": "Explain why the relation (1, 3), (2, 5), (3, 7), (4, 9) is a function.", "back": "Each x-value appears exactly once, meaning every input has exactly one output."}, {"front": "Identify the specific reason the relation (2, 4), (3, -1), (2, 6) is not a function.", "back": "The x-value 2 is paired with two different outputs, 4 and 6."}, {"front": "Why is the relation (0, 1), (1, 1), (2, 1) considered a function despite the repeating y-values?", "back": "Each x-value appears only once and is paired with exactly one output."}, {"front": "What does the notation f(x) represent?", "back": "The output of the function f when the input is x."}, {"front": "How is the function notation f(x) read aloud?", "back": "“f of x”"}, {"front": "In the notation f(x), what does the letter f represent?", "back": "The name of the function."}, {"front": "Does the notation f(x) indicate the multiplication of f and x?", "back": "No, it represents the function f evaluated at input x."}, {"front": "Given f(x) = 3x - 2, calculate the value of f(5).", "back": "13"}, {"front": "Given f(x) = 3x - 2, calculate the value of f(-1).", "back": "-5"}, {"front": "Given f(x) = 3x - 2, find the expression for f(a + 1).", "back": "3a + 1"}, {"front": "Given g(x) = x² + 4x, calculate the value of g(3).", "back": "21"}, {"front": "Which level of mathematics typically extends function concepts to include one-to-one functions and the horizontal line test?", "back": "Algebra II"}, {"front": "What is the primary danger when interpreting the notation f(x) for the first time?", "back": "Confusing it with the multiplication of f and x."}, {"front": "If a list of ordered pairs contains (5, 10) and (5, 12), why is it categorized as a relation but not a function?", "back": "The domain element 5 is paired with more than one range element (10 and 12)."}, {"front": "In function notation, which variable is traditionally used to represent the input?", "back": "x"}, {"front": "What is the resulting range for the function f(x) = 1 given the domain \\0, 1, 2\\?", "back": "\\1\\"}, {"front": "To evaluate f(a+1) for the function f(x) = 3x - 2, what is the first algebraic step?", "back": "Replace x with the quantity (a + 1)."}, {"front": "Under what condition does a set of points on a coordinate plane fail the vertical line test?", "back": "If any vertical line crosses the graph in two or more points."}, {"front": "Which specific component of a relation is examined to determine its domain?", "back": "The first coordinate of every ordered pair."}, {"front": "Which specific component of a relation is examined to determine its range?", "back": "The second coordinate of every ordered pair."}, {"front": "The notation f(x) = 3x - 2 is an example of describing a relation using a(n) _____.", "back": "Equation"}, {"front": "If a relation is shown as a set of points on a graph, it is being described by a _____.", "back": "Graph"}, {"front": "In the function g(3) = 21, which number represents the input?", "back": "3"}, {"front": "In the function g(3) = 21, which number represents the output?", "back": "21"}, {"front": "True or False: A relation must be a function to have a domain and range.", "back": "False"}, {"front": "How many y-values can be associated with a single x-value for a relation to remain a function?", "back": "Exactly one"}, {"front": "In the vertical line test, if a vertical line never touches the graph, does the graph still represent a function?", "back": "Yes, as long as no vertical line touches it more than once."}, {"front": "Concept: Function Notation", "back": "Definition: A way to name a function using letters like f or g, where f(x) represents the output for input x."}, {"front": "Concept: Vertical Line Test", "back": "A visual check where a graph is a function if every vertical line hits the graph at most once."}, {"front": "Why is the notation f(x) often preferred over using just y in equations?", "back": "It allows the function to be named and clearly identifies the input value being used."}, {"front": "What is the domain of a relation defined by the points \\(1, 2), (1, 3)\\?", "back": "\\1\\"}, {"front": "What is the range of a relation defined by the points \\(1, 2), (1, 3)\\?", "back": "\\2, 3\\"}, {"front": "Is the relation \\(1, 2), (1, 3)\\ a function?", "back": "No, because the input 1 has two different outputs (2 and 3)."}, {"front": "Simplify the expression 3(5) - 2 as used in evaluating f(5) for f(x) = 3x - 2.", "back": "13"}, {"front": "If f(x) = 3x - 2, the notation f(-1) implies replacing x with _____.", "back": "-1"}, {"front": "True or False: Every function is a relation.", "back": "True"}, {"front": "True or False: Every relation is a function.", "back": "False"}, {"front": "The definition of a function states that every element of the _____ is paired with exactly one element of the range.", "back": "Domain"}, {"front": "If the domain of a relation is \\2, 3\\ and the range is \\4, -1, 6\\, and the points are (2, 4), (3, -1), (2, 6), why is this not a function?", "back": "The domain element 2 is paired with two elements of the range (4 and 6)."}, {"front": "What are common letters used to name functions?", "back": "f, g, or h"}, {"front": "In the coordinate plane, the domain corresponds to values on the _____ axis.", "back": "x-axis (horizontal)"}, {"front": "In the coordinate plane, the range corresponds to values on the _____ axis.", "back": "y-axis (vertical)"}, {"front": "When evaluating g(3) = 3² + 4(3), what is the result of 3²?", "back": "9"}, {"front": "When evaluating g(3) = 9 + 4(3), what is the final sum?", "back": "21"}, {"front": "The phrase \"no x-value is repeated with a different y-value\" is the defining characteristic of a _____.", "back": "Function"}, {"front": "If a graph is a circle, does it pass the vertical line test?", "back": "No, because most vertical lines would intersect the circle at two points."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
