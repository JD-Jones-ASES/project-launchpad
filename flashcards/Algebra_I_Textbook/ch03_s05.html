<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 3, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the fundamental approach to solving absolute value inequalities?", "back": "The key idea is to translate the absolute value inequality into a compound inequality that you already know how to solve."}, {"front": "What does the inequality $|x| < 5$ represent in terms of distance from zero?", "back": "It represents all numbers that are less than 5 units from zero, meaning all numbers between -5 and 5."}, {"front": "How do you translate the absolute value inequality $|ax + b| < c$ (where $c > 0$) into a compound inequality?", "back": "It translates into the 'and' compound inequality: $-c < ax + b < c$."}, {"front": "What type of compound inequality results from a 'less than' absolute value inequality ($|expr| < c$ or $|expr| \\le c$)?", "back": "An 'and' compound inequality, where the solution is a single interval between two values."}, {"front": "What is the solution to $|ax + b| < c$ if $c \\le 0$?", "back": "There is no solution, because an absolute value expression is always greater than or equal to 0, so it cannot be strictly less than a negative number or zero."}, {"front": "Solve the inequality $|2x - 3| < 7$ and write the solution in interval notation.", "back": "Rewrite as: $-7 < 2x - 3 < 7$\nAdd 3: $-4 < 2x < 10$\nDivide by 2: $-2 < x < 5$\nInterval notation: $(-2, 5)$"}, {"front": "What does the inequality $|x| > 5$ represent in terms of distance from zero?", "back": "It represents all numbers that are more than 5 units from zero, meaning all numbers less than -5 or greater than 5."}, {"front": "How do you translate the absolute value inequality $|ax + b| > c$ (where $c > 0$) into a compound inequality?", "back": "It translates into the 'or' compound inequality: $ax + b < -c$ or $ax + b > c$."}, {"front": "What type of compound inequality results from a 'greater than' absolute value inequality ($|expr| > c$ or $|expr| \\ge c$)?", "back": "An 'or' compound inequality, where the solution consists of two separate rays pointing outward."}, {"front": "What is the solution to $|ax + b| > c$ if $c < 0$?", "back": "The inequality $|ax + b| > c$ is true for all real numbers, because an absolute value is always greater than or equal to 0, and thus always greater than any negative number."}, {"front": "Solve the inequality $|x + 4| \\ge 3$ and write the solution in interval notation.", "back": "Rewrite as: $x + 4 \\le -3$ or $x + 4 \\ge 3$\nSolve each part:\n$x \\le -7$ or $x \\ge -1$\nInterval notation: $(-\\infty, -7] \\cup [-1, \\infty)$"}, {"front": "What is the first step you should take when solving an absolute value inequality like $3|x - 2| + 1 > 10$?", "back": "First, isolate the absolute value expression (in this case, by subtracting 1 and then dividing by 3)."}, {"front": "Solve the inequality $3|x - 2| + 1 > 10$ and write the solution in interval notation.", "back": "Isolate absolute value: $3|x - 2| > 9 \\implies |x - 2| > 3$\nRewrite as: $x - 2 < -3$ or $x - 2 > 3$\nSolve each part:\n$x < -1$ or $x > 5$\nInterval notation: $(-\\infty, -1) \\cup (5, \\infty)$"}, {"front": "What is the memory aid used to distinguish between 'less than' and 'greater than' absolute value inequalities?", "back": "Less thAND (for $< c$ or $\\le c$, results in an 'and' compound inequality), and GreatOR (for $> c$ or $\\ge c$, results in an 'or' compound inequality)."}, {"front": "Compare the solution sets for $|expr| < c$ and $|expr| > c$ (assuming $c > 0$).", "back": "For $|expr| < c$: The solution set is a single interval, representing numbers 'between' two values. For $|expr| > c$: The solution set is two separate intervals (two rays pointing outward), representing numbers 'outside' two values."}, {"front": "Why is it important that $c > 0$ when setting up the compound inequality for $|ax+b| < c$?", "back": "If $c \\le 0$, there is no solution because an absolute value is always non-negative, so it cannot be strictly less than a non-positive number."}, {"front": "Why is it important to consider the value of $c$ when setting up the compound inequality for $|ax+b| > c$?", "back": "If $c < 0$, the inequality is true for all real numbers because an absolute value (always non-negative) is always greater than any negative number. If $c=0$, the solution is all real numbers except where $ax+b=0$."}, {"front": "Solve the checkpoint problem: $|3x + 6| \\le 9$. Write the solution in interval notation.", "back": "Rewrite as: $-9 \\le 3x + 6 \\le 9$\nSubtract 6: $-15 \\le 3x \\le 3$\nDivide by 3: $-5 \\le x \\le 1$\nInterval notation: $[-5, 1]$"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
