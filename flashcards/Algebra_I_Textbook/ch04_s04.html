<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 4, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the slope-intercept form of a linear equation?", "back": "y = mx + b"}, {"front": "In the equation y = mx + b, what does the variable m represent?", "back": "The slope of the line."}, {"front": "In the equation y = mx + b, what does the variable b represent?", "back": "The y-intercept."}, {"front": "Define the y-intercept of a line.", "back": "The y-coordinate of the point where the line crosses the y-axis."}, {"front": "Why is slope-intercept form considered the most common form for linear equations?", "back": "The slope and y-intercept can be read directly from the equation."}, {"front": "What is the equation of a line with a slope of 3 and a y-intercept of -4?", "back": "y = 3x - 4"}, {"front": "What is the point-slope form of a linear equation?", "back": "y - y₁ = m(x - x₁)"}, {"front": "In the point-slope form y - y₁ = m(x - x₁), what does (x₁, y₁) represent?", "back": "Any specific point on the line."}, {"front": "When is the point-slope form particularly useful?", "back": "When the slope and a point are known, but the point is not the y-intercept."}, {"front": "What is the first step to write the equation of a line with slope -2 passing through (3, 1)?", "back": "Substitute the values into the point-slope form: y - 1 = -2(x - 3)."}, {"front": "Convert the point-slope equation y - 1 = -2(x - 3) into slope-intercept form.", "back": "y = -2x + 7"}, {"front": "Write the point-slope form of a line with slope 4 that passes through (-1, 2).", "back": "y - 2 = 4(x - (-1))"}, {"front": "Convert the equation y - 2 = 4(x + 1) into slope-intercept form.", "back": "y = 4x + 6"}, {"front": "What is the first step in writing a linear equation when only two points are given?", "back": "Calculate the slope (m) using the two points."}, {"front": "What is the slope of the line passing through (2, 5) and (6, -3)?", "back": "-2"}, {"front": "After finding the slope from two points, what is the next step to write the equation?", "back": "Use the point-slope form with the calculated slope and either of the given points."}, {"front": "Write the slope-intercept equation of the line passing through (2, 5) and (6, -3).", "back": "y = -2x + 9"}, {"front": "What is the slope of the line passing through (-1, 4) and (3, -8)?", "back": "-3"}, {"front": "Write the slope-intercept equation of the line passing through (-1, 4) and (3, -8).", "back": "y = -3x + 1"}, {"front": "What is the standard form of a linear equation?", "back": "Ax + By = C"}, {"front": "In the standard form Ax + By = C, what type of numbers must A, B, and C be?", "back": "Integers."}, {"front": "In the standard form Ax + By = C, what is the specific requirement for the coefficient A?", "back": "A must be non-negative (A ge 0)."}, {"front": "What is the restriction on coefficients A and B in standard form?", "back": "A and B cannot both be zero."}, {"front": "Name two practical uses for the standard form of a linear equation.", "back": "Finding intercepts quickly and solving systems of equations."}, {"front": "How are variable terms positioned when converting from slope-intercept form to standard form?", "back": "Both variable terms (x and y) must be moved to the left side of the equation."}, {"front": "What step must be taken if a linear equation in standard form contains fractions?", "back": "Multiply the entire equation by a common denominator to clear the fractions."}, {"front": "True or False: The three forms of linear equations (slope-intercept, point-slope, and standard) describe different lines.", "back": "False (they are different ways of writing the same relationship)."}, {"front": "Which algebraic skill is essential for working with systems of equations in Chapter 5?", "back": "Converting between different forms of linear equations."}, {"front": "Concept: Slope-Intercept Form", "back": "Definition: y = mx + b, where m is slope and b is the y-intercept."}, {"front": "Concept: Point-Slope Form", "back": "Definition: y - y₁ = m(x - x₁), where m is slope and (x₁, y₁) is a point on the line."}, {"front": "Concept: Standard Form", "back": "Definition: Ax + By = C, where A, B, C are integers and A is non-negative."}, {"front": "In the equation y = 3x - 4, what is the coordinate of the y-intercept?", "back": "(0, -4)"}, {"front": "What is the slope of a line represented by the equation y - 5 = -2(x - 2)?", "back": "-2"}, {"front": "The formula m = y₂ - y₁/x₂ - x₁ is used to find what value?", "back": "The slope of a line given two points."}, {"front": "Which form of a linear equation is most useful for identifying the y-intercept at a glance?", "back": "Slope-intercept form (y = mx + b)."}, {"front": "To clear fractions in a linear equation, you must _____ through by the denominator.", "back": "Multiply"}, {"front": "In standard form Ax + By = C, where is the constant term located?", "back": "On the right side of the equation."}, {"front": "In point-slope form, the point used to write the equation can be _____ point on the line.", "back": "Any"}, {"front": "What happens to the sign of m when moving mx from the right side of y = mx + b to the left side?", "back": "The sign of m becomes its opposite (negative if positive, positive if negative)."}, {"front": "If the calculation for m results in -12/4, what is the simplified slope?", "back": "-3"}, {"front": "In the point-slope form y - y₁ = m(x - x₁), what does the variable m represent?", "back": "The slope of the line."}, {"front": "Identify the slope in the equation y = 4x + 6.", "back": "4"}, {"front": "Identify the y-intercept in the equation y = -2x + 7.", "back": "7"}, {"front": "When given the points (-1, 4) and (3, -8), what is the value of x₁ if you use the first point?", "back": "-1"}, {"front": "What coordinate point is represented by (x₁, y₁) in the equation y - 4 = -3(x + 1)?", "back": "(-1, 4)"}, {"front": "Which form of a linear equation is best for solving systems of equations?", "back": "Standard form (Ax + By = C)."}, {"front": "What is the simplified form of y - 5 = -2x + 4 when isolating y?", "back": "y = -2x + 9"}, {"front": "If m = -2 and the line passes through (3, 1), what is the value of y₁ in the point-slope form?", "back": "1"}, {"front": "In the equation y = 3x - 4, if x = 0, what is the value of y?", "back": "-4"}, {"front": "Does using different points from the same line in point-slope form result in different slope-intercept equations?", "back": "No (the resulting slope-intercept equation will be identical)."}, {"front": "What is the requirement for A in standard form if the initial conversion results in -2x + y = 5?", "back": "A must be positive, so the equation must be multiplied by -1 to get 2x - y = -5."}, {"front": "The _____ form is useful for finding intercepts quickly.", "back": "Standard"}, {"front": "How is the slope m calculated using points (x₁, y₁) and (x₂, y₂)?", "back": "m = y₂ - y₁/x₂ - x₁"}, {"front": "If m = -2 and the point is (6, -3), write the point-slope equation.", "back": "y - (-3) = -2(x - 6) or y + 3 = -2(x - 6)"}, {"front": "Convert y = 3x - 4 into standard form.", "back": "3x - y = 4"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
