<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 6, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the definition of a monomial?", "back": "A number, a variable, or a product of a number and one or more variables raised to whole-number exponents."}, {"front": "In the definition of a monomial, what type of numbers must the exponents be?", "back": "Whole numbers"}, {"front": "Is the number 7 considered a monomial?", "back": "Yes, it is a constant monomial."}, {"front": "Is -3x classified as a monomial?", "back": "Yes, it is a product of a number and a variable with a whole-number exponent."}, {"front": "Is 4a²b³ an example of a monomial?", "back": "Yes"}, {"front": "Why is 5x⁻¹ not considered a monomial?", "back": "Because the exponent on the variable x is negative, not a whole number."}, {"front": "Why is y¹/² (an exponent of 1/2) not considered a monomial?", "back": "Because the exponent is not a whole number."}, {"front": "What is the definition of a polynomial?", "back": "A monomial or a sum of monomials."}, {"front": "What is each individual monomial within a polynomial sum called?", "back": "A term"}, {"front": "How is the degree of a monomial determined?", "back": "By calculating the sum of the exponents of its variables."}, {"front": "What is the degree of a nonzero constant?", "back": "0"}, {"front": "What is the degree of the number 0?", "back": "It has no degree."}, {"front": "What is the degree of the monomial 4a²b³?", "back": "5 (calculated as 2 + 3)"}, {"front": "How is the degree of a polynomial determined?", "back": "It is the greatest degree among all of its terms."}, {"front": "When is a polynomial written in 'standard form'?", "back": "When its terms are arranged in order from the greatest degree to the least degree."}, {"front": "Convert x - 7 + 5x³ - 2x² into standard form.", "back": "5x³ - 2x² + x - 7"}, {"front": "A polynomial with a degree of 1 is classified as _____.", "back": "Linear"}, {"front": "A polynomial with a degree of 2 is classified as _____.", "back": "Quadratic"}, {"front": "A polynomial with a degree of 3 is classified as _____.", "back": "Cubic"}, {"front": "How is a polynomial with exactly one term classified?", "back": "Monomial"}, {"front": "How is a polynomial with exactly two terms classified?", "back": "Binomial"}, {"front": "How is a polynomial with exactly three terms classified?", "back": "Trinomial"}, {"front": "Identify the degree and classify the polynomial 4x² - 9 by terms.", "back": "Degree 2; Binomial."}, {"front": "Identify the degree and classify the polynomial 7n by terms.", "back": "Degree 1; Monomial."}, {"front": "Identify the degree of the polynomial x³ - 2x² + 5x - 1.", "back": "3"}, {"front": "What is the term classification for x³ - 2x² + 5x - 1?", "back": "Polynomial (no special name for 4 terms)."}, {"front": "What name is given to the combination of a degree of 2 and two terms?", "back": "Quadratic binomial"}, {"front": "What name is given to the combination of a degree of 1 and one term?", "back": "Linear monomial"}, {"front": "A polynomial with degree 3 is specifically called a _____ polynomial.", "back": "Cubic"}, {"front": "What are 'like terms' in polynomial addition?", "back": "Terms that have the same variables raised to the same powers."}, {"front": "To add polynomials, you must group and combine _____.", "back": "Like terms"}, {"front": "Simplify: (3x² + 5x - 4) + (x² - 2x + 7)", "back": "4x² + 3x + 3"}, {"front": "To subtract a polynomial, what must you distribute to every term of the second polynomial?", "back": "The negative sign"}, {"front": "In the subtraction problem (5x² + 3x - 2) - (2x² - x + 6), what is the result of distributing the negative sign?", "back": "-2x² + x - 6"}, {"front": "Simplify: (5x² + 3x - 2) - (2x² - x + 6)", "back": "3x² + 4x - 8"}, {"front": "Simplify: (4n³ - n + 5) - (n³ + 3n - 8)", "back": "3n³ - 4n + 13"}, {"front": "What does it mean for polynomials to be 'closed' under addition and subtraction?", "back": "The sum or difference of two polynomials is always another polynomial."}, {"front": "What is the degree of the term 5x³ in the polynomial 5x³ - 2x² + x - 7?", "back": "3"}, {"front": "What is the degree of the constant term -7 in a polynomial?", "back": "0"}, {"front": "If a polynomial has four terms, how do we typically classify it by its number of terms?", "back": "Simply as a 'polynomial' (no special name)."}, {"front": "Which specific degree classification corresponds to a degree of 0?", "back": "Constant"}, {"front": "True or False: The sum of the exponents of all variables in a monomial is its degree.", "back": "True"}, {"front": "When combining terms like 3x² and x², what is the coefficient of the result?", "back": "4"}, {"front": "What is the result of distributing a negative sign to the term -x?", "back": "+x"}, {"front": "Is x² y² a monomial?", "back": "Yes"}, {"front": "What is the degree of the monomial x² y²?", "back": "4 (the sum of exponents 2 + 2)"}, {"front": "In standard form, which term appears first?", "back": "The term with the greatest degree."}, {"front": "In standard form, which term appears last?", "back": "The term with the least degree (often the constant)."}, {"front": "True or False: A polynomial can be a single monomial.", "back": "True"}, {"front": "What is the result of 5x - 2x?", "back": "3x"}, {"front": "What is the result of -4 + 7 when adding polynomials?", "back": "3"}, {"front": "How do you identify 'like terms' for the variable n?", "back": "Look for terms where n is raised to the exact same power."}, {"front": "When simplifying (4n³ - n + 5) - (n³ + 3n - 8), what constant value results from +5 - (-8)?", "back": "13"}, {"front": "What is the classification of 7n by its degree?", "back": "Linear"}, {"front": "Term: Trinomial", "back": "Definition: A polynomial with exactly three terms."}, {"front": "Term: Binomial", "back": "Definition: A polynomial with exactly two terms."}, {"front": "The property that states polynomials always result in a polynomial when subtracted is called _____.", "back": "Closure"}, {"front": "Are polynomials closed under the operation of addition?", "back": "Yes"}, {"front": "Why is x³ - 2x² + 5x - 1 in standard form?", "back": "Because the exponents decrease in order: 3, 2, 1, 0."}, {"front": "What is the degree of the monomial -3x?", "back": "1"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
