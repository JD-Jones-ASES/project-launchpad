<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 4, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What type of graph uses points in a coordinate plane to represent two related variables?", "back": "A scatter plot"}, {"front": "In a scatter plot, what does each individual point (x, y) represent?", "back": "One observation of two related variables"}, {"front": "Term: Positive Correlation", "back": "Definition: A relationship where y tends to increase as x increases."}, {"front": "How do points trend visually in a positive correlation?", "back": "They trend upward from left to right."}, {"front": "Term: Negative Correlation", "back": "Definition: A relationship where y tends to decrease as x increases."}, {"front": "How do points trend visually in a negative correlation?", "back": "They trend downward from left to right."}, {"front": "What is indicated when points are scattered on a plot with no obvious upward or downward trend?", "back": "No correlation"}, {"front": "What is a straight line drawn through data points to follow their general direction called?", "back": "A trend line (or line of best fit)"}, {"front": "According to the general rule, how should a trend line be positioned relative to the data points?", "back": "It should have roughly the same number of points above it as below it."}, {"front": "What is the primary purpose of a trend line in a scatter plot?", "back": "To describe the data pattern with a linear equation."}, {"front": "Formula: Slope (m) of a trend line passing through (x₁, y₁) and (x₂, y₂)", "back": "m = y₂ - y₁/x₂ - x₁"}, {"front": "When using two points to write a trend line equation, which linear form is often used first after finding the slope?", "back": "Point-slope form"}, {"front": "Calculate the slope (m) for a trend line using the points (1, 55) and (5, 80).", "back": "m = 6.25"}, {"front": "In the student score example, what is the final equation of the trend line using slope 6.25 and point (1, 55)?", "back": "y = 6.25x + 48.75"}, {"front": "If the trend line is y = 6.25x + 48.75, what is the predicted score for a student studying 8 hours?", "back": "About 99 (calculated as 98.75)"}, {"front": "Term: Interpolation", "back": "Definition: Using a trend line to estimate a value that falls between existing data points."}, {"front": "Term: Extrapolation", "back": "Definition: Using a trend line to estimate a value that falls beyond the range of existing data points."}, {"front": "Why is interpolation generally more reliable than extrapolation?", "back": "The prediction stays within the observed range of the data."}, {"front": "Why is extrapolation considered risky for making predictions?", "back": "The observed trend may not continue outside of the original data range."}, {"front": "In the study example (range 1 le x le 6), predicting a score for 3.5 hours is an example of _____.", "back": "Interpolation"}, {"front": "In the study example (range 1 le x le 6), predicting a score for 12 hours is an example of _____.", "back": "Extrapolation"}, {"front": "In the study example, why is the predicted score of 123.75 for 12 hours study time considered impossible?", "back": "The score exceeds 100, which is the maximum possible test score."}, {"front": "What is the critical rule regarding the relationship between correlation and cause-and-effect?", "back": "Correlation does not imply causation."}, {"front": "Which factor causes the correlation between ice cream sales and drowning incidents?", "back": "Hot weather"}, {"front": "Given the trend line y = 8x - 200, predict the number of visitors (y) when the temperature (x) is 85^° F.", "back": "480 visitors"}, {"front": "What numerical measure describes how closely data follow a linear trend?", "back": "The correlation coefficient (r)"}, {"front": "Concept: Line of Best Fit", "back": "Definition: A trend line that most accurately represents the data points in a scatter plot."}, {"front": "In a positive correlation, as the independent variable (x) increases, what happens to the dependent variable (y)?", "back": "The dependent variable (y) tends to increase."}, {"front": "In a negative correlation, as the independent variable (x) increases, what happens to the dependent variable (y)?", "back": "The dependent variable (y) tends to decrease."}, {"front": "True or False: Real-world data usually falls exactly on a straight line.", "back": "False, it often follows an approximately linear pattern."}, {"front": "The points on a scatter plot are determined by _____ from real-world observations.", "back": "Data"}, {"front": "What is the first step in manually writing the equation of a trend line from a scatter plot?", "back": "Identify two points on the trend line to calculate the slope."}, {"front": "What is the slope-intercept form of a linear equation?", "back": "y = mx + b"}, {"front": "When points trend upward from left to right, the correlation is _____.", "back": "Positive"}, {"front": "When points trend downward from left to right, the correlation is _____.", "back": "Negative"}, {"front": "How many variables are represented in a single point on a scatter plot?", "back": "Two"}, {"front": "What term refers to a value that falls outside the observed range of x-values in a dataset?", "back": "Extrapolation"}, {"front": "What term refers to a value that falls within the observed range of x-values in a dataset?", "back": "Interpolation"}, {"front": "Why might a linear trend fail to hold for very large values of x?", "back": "The trend may change or hit a physical limit beyond the observed data range."}, {"front": "Point-slope form: Formula for a line with slope m and point (x₁, y₁)", "back": "y - y₁ = m(x - x₁)"}, {"front": "In the student score example, what variable is represented by x?", "back": "The number of hours studied"}, {"front": "In the student score example, what variable is represented by y?", "back": "The score earned on the test"}, {"front": "Calculating a student's score for 3.5 hours of study using data ranging from 1 to 6 hours is called _____.", "back": "Interpolation"}, {"front": "Calculating a student's score for 12 hours of study using data ranging from 1 to 6 hours is called _____.", "back": "Extrapolation"}, {"front": "Does a strong correlation between height and weight imply that height causes weight?", "back": "No, because correlation does not imply causation."}, {"front": "What is the visual pattern of a scatter plot with no correlation?", "back": "Points are scattered with no clear upward or downward trend."}, {"front": "Equation: y - 55 = 6.25(x - 1) simplified to slope-intercept form", "back": "y = 6.25x + 48.75"}, {"front": "In the trend line y = 8x - 200, what is the value of the slope?", "back": "8"}, {"front": "In the trend line y = 6.25x + 48.75, what does the value 48.75 represent?", "back": "The y-intercept"}, {"front": "A scatter plot of temperature versus park visitors shows a positive correlation; how do visitors change as temperature increases?", "back": "The number of visitors increases."}, {"front": "Why is the number 480 considered a prediction in the checkpoint example?", "back": "It is a value calculated from a trend line equation rather than a direct observation."}, {"front": "What is the result of 6.25(8) + 48.75?", "back": "98.75"}, {"front": "What is the range of x values in the study example dataset?", "back": "1 le x le 6"}, {"front": "Is predicting a test score for 0 hours of study an example of interpolation or extrapolation in the 1 le x le 6 range?", "back": "Extrapolation"}, {"front": "Is predicting a test score for 5.5 hours of study an example of interpolation or extrapolation in the 1 le x le 6 range?", "back": "Interpolation"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
