    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 8, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    var CARDS = [{"front": "In the context of projectile motion, what does the variable $h(t)$ represent?", "back": "The height of the object at a specific time $t$."}, {"front": "In the height model $h(t) = -16t^2 + v_0 t + h_0$, what does the constant $v_0$ represent?", "back": "The initial upward velocity of the object in feet per second."}, {"front": "In the height model $h(t) = -16t^2 + v_0 t + h_0$, what does the constant $h_0$ represent?", "back": "The initial height of the object in feet."}, {"front": "Why is the leading coefficient in the projectile motion model $h(t) = -16t^2 + v_0 t + h_0$ equal to $-16$?", "back": "It is half of the downward acceleration due to gravity, which is approximately $32$ ft/s$^2$."}, {"front": "How is the time $t$ to reach the maximum height calculated for a quadratic height function?", "back": "By finding the $t$-coordinate of the vertex using the formula $t = -\\frac{b}{2a}$."}, {"front": "How is the maximum height of a projectile determined once the time $t$ of the vertex is known?", "back": "By evaluating the height function $h(t)$ at the calculated vertex time."}, {"front": "At what height value $h(t)$ does an object hit the ground?", "back": "The object hits the ground when $h(t) = 0$."}, {"front": "A ball is thrown from a $48$-foot building with an initial velocity of $32$ ft/s; what is its height function?", "back": "$h(t) = -16t^2 + 32t + 48$"}, {"front": "In the example $h(t) = -16t^2 + 32t + 48$, at what time $t$ does the ball reach its maximum height?", "back": "$t = 1$ second"}, {"front": "In the example $h(t) = -16t^2 + 32t + 48$, what is the maximum height reached by the ball?", "back": "$64$ feet"}, {"front": "When solving $-16t^2 + 32t + 48 = 0$, what is the result after dividing every term by $-16$?", "back": "$t^2 - 2t - 3 = 0$"}, {"front": "What are the factored forms of the equation $t^2 - 2t - 3 = 0$?", "back": "$(t - 3)(t + 1) = 0$"}, {"front": "In the projectile example where $t = 3$ or $t = -1$, why is $t = 3$ the only valid solution for hitting the ground?", "back": "Time must be a non-negative value in this physical context."}, {"front": "When a quantity is modeled by a quadratic function, where does the optimal value (maximum or minimum) occur?", "back": "The optimal value occurs at the vertex of the parabola."}, {"front": "A rancher uses $120$ feet of fencing for three sides of a rectangular pen; what is the perimeter constraint equation?", "back": "$2x + y = 120$, where $y$ is the side parallel to the barn."}, {"front": "Given the constraint $y = 120 - 2x$, what is the quadratic area function $A(x)$ for a rectangular pen?", "back": "$A(x) = -2x^2 + 120x$"}, {"front": "In the area optimization example $A(x) = -2x^2 + 120x$, what is the $x$-value of the vertex?", "back": "$x = 30$"}, {"front": "If the width $x$ of a rectangular pen is $30$ feet and the fencing constraint is $y = 120 - 2x$, what is the length $y$?", "back": "$60$ feet"}, {"front": "What is the maximum area possible for a rectangular pen with a three-side fence length of $120$ feet?", "back": "$1800$ ft$^2$"}, {"front": "In a revenue function, revenue is defined as the product of which two factors?", "back": "Price per item and the quantity of items sold."}, {"front": "If $x$ represents the number of $\\$1$ price increases, how is a new price expressed if the original price was $\\$15$?", "back": "$15 + x$"}, {"front": "If $10$ fewer shirts are sold for every $\\$1$ price increase $x$, how is the quantity sold expressed if the original quantity was $200$?", "back": "$200 - 10x$"}, {"front": "What is the resulting quadratic revenue function $R(x)$ from multiplying $(15 + x)$ and $(200 - 10x)$?", "back": "$R(x) = -10x^2 + 50x + 3000$"}, {"front": "In the revenue function $R(x) = -10x^2 + 50x + 3000$, what value of $x$ maximizes the revenue?", "back": "$x = 2.5$"}, {"front": "If the optimal number of $\\$1$ price increases is $x = 2.5$ and the starting price is $\\$15$, what is the optimal price?", e parabola representing the maximum or minimum value of a real-world quantity. Example: The time and height when a ball reaches its peak."}, {"front": "Formula: $x = -\\frac{b}{2a}$", "back": "Purpose: To find the $x$-coordinate (input value) of the vertex of a quadratic function."}, {"front": "Why is the revenue function $R(x) = (15 + x)(200 - 10x)$ considered quadratic?", "back": "Expanding the binomials results in a term with $x^2$ ($ -10x^2 $)."}, {"front": "In the T-shirt example, if $x = 2.5$, what is the total number of shirts sold at the optimal price?", "back": "$175$ shirts (calculated as $200 - 10(2.5)$)."}, {"front": "When finding when a projectile hits the ground, why do we set $h(t) = 0$?", "back": "The ground represents a height of zero feet."}, {"front": "If a rancher encloses four sides of a rectangular pen with fencing length $P$, how would the constraint equation $P = 2x + 2y$ change if one side is a barn?", "back": "The constraint would become $P = 2x + y$ (or $x + 2y$)."}, {"front": "In the height formula, what physical force does the $-16$ term represent?", "back": "The force of gravity acting on the object."}, {"front": "To find the maximum area of $A(x) = -2x^2 + 120x$, what formula provides the optimal width $x$?", "back": "$x = -\\frac{120}{2(-2)}$"}, {"front": "If $x$ is the number of price decreases, how would the price factor change in the revenue formula $(15 + x)$?", "back": "It would change to $(15 - x)$."}, {"front": "What is the first step in solving a quadratic optimization word problem?", "back": "Identify the variables and express the quantity to be optimized as a function of one variable."}, {"front": "How do you check if a vertex represents a maximum without graphing?", "back": "Check if the leading coefficient $a$ is negative."}, {"front": "In the checkpoint problem $h(t) = -16t^2 + 64t$, what is the initial height $h_0$?", "back": "$0$ feet (since there is no constant term)."}, {"front": "In the checkpoint problem $h(t) = -16t^2 + 64t$, what is the initial velocity $v_0$?", "back": "$64$ ft/s"}, {"front": "Does a quadratic function with $a = 5$ have a maximum or minimum value?", "back": "It has a minimum value because $a > 0$."}, {"front": "What operation is performed on the price and quantity expressions to create the revenue function?", "back": "Multiplication"}, {"front": "If a ball is thrown from ground level, what is the value of $h_0$ in the height equation?", "back": "$0$"}, {"front": "In the expression $-10(2.5)^2 + 50(2.5) + 3000$, which part represents the revenue before any price changes?", "back": "$3000$"}, {"front": "What is the shape of the graph of any quadratic application function?", "back": "A parabola"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
