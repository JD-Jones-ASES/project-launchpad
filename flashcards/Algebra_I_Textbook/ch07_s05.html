<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 7, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does it mean for a polynomial to be \"factored completely\"?", "back": "Every factor is prime and cannot be factored further using integers."}, {"front": "What is the first step in the general strategy for factoring any polynomial?", "back": "Factor out the greatest common factor (GCF)."}, {"front": "When finding the GCF, under what condition should you factor out a negative value?", "back": "When the leading coefficient of the polynomial is negative."}, {"front": "What specific pattern should be checked for when factoring a polynomial with exactly two terms?", "back": "A difference of squares ($a^2 - b^2$)."}, {"front": "How does the expression $a^2 + b^2$ factor using integers?", "back": "It does not factor."}, {"front": "What is the recommended factoring technique for a polynomial with three terms?", "back": "Factor it as a trinomial."}, {"front": "In a three-term polynomial, what special type of trinomial should always be checked for?", "back": "A perfect square trinomial."}, {"front": "Which factoring method is typically used for polynomials with four or more terms?", "back": "Factoring by grouping."}, {"front": "After factoring out the GCF and applying a specific technique, what is the next step in the strategy?", "back": "Check whether any of the resulting factors can be factored further."}, {"front": "How can you verify that a polynomial has been factored correctly?", "back": "Multiply all the factors to ensure the original polynomial is recovered."}, {"front": "A polynomial is factored completely when every factor is ____.", "back": "prime"}, {"front": "Identify the GCF of the expression $3x^3 - 12x^2 - 36x$.", "back": "$3x$"}, {"front": "When factoring $3x^3 - 12x^2 - 36x$, what is the resulting trinomial after the GCF $3x$ is removed?", "back": "$x^2 - 4x - 12$"}, {"front": "To factor $x^2 - 4x - 12$, you must find two numbers with a product of $-12$ and a sum of ____.", "back": "$-4$"}, {"front": "Which two numbers have a product of $-12$ and a sum of $-4$?", "back": "$-6$ and $2$."}, {"front": "What is the fully factored form of $3x^3 - 12x^2 - 36x$?", "back": "$3x(x - 6)(x + 2)$"}, {"front": "In the factoring of $2x^3 - 50x$, what is the GCF?", "back": "$2x$"}, {"front": "After removing the GCF from $2x^3 - 50x$, the remaining factor is $x^2 - 25$. This is an example of a(n) ____.", "back": "difference of squares"}, {"front": "What is the factored form of the binomial $x^2 - 25$?", "back": "$(x + 5)(x - 5)$"}, {"front": "What is the complete factorization of $2x^3 - 50x$?", "back": "$2x(x + 5)(x - 5)$"}, {"front": "What is the name of the property that states: if $AB = 0$, then $A = 0$ or $B = 0$?", "back": "The Zero Product Property."}, {"front": "The Zero Product Property connects factoring to the process of finding ____.", "back": "solutions of equations"}, {"front": "If a product of factors equals zero, then at least ____ of the factors must equal zero.", "back": "one"}, {"front": "What is the first step in solving the equation $x^2 - 5x - 14 = 0$?", "back": "Factor the left side of the equation."}, {"front": "To solve $x^2 - 5x - 14 = 0$, you must find two numbers that multiply to $-14$ and add to ____.", "back": "$-5$"}, {"front": "What is the factored form of $x^2 - 5x - 14$?", "back": "$(x - 7)(x + 2)$"}, {"front": "If $(x - 7)(x + 2) = 0$, what are the two resulting linear equations to solve?", "back": "$x - 7 = 0$ or $x + 2 = 0$."}, {"front": "What are the solutions for the equation $x^2 - 5x - 14 = 0$?", "back": "$x = 7$ or $x = -2$."}, {"front": "Factor $5x^2 - 20$ completely.", "back": "$5(x + 2)(x - 2)$"}, {"front": "What are the solutions to the equation $5x^2 - 20 = 0$?", "back": "$x = 2$ or $x = -2$."}, {"front": "The GCF of $5x^2$ and $-20$ is ____.", "back": "$5$"}, {"front": "What does a \"prime\" factor mean in the context of polynomials?", "back": "It cannot be factored further using integers."}, {"front": "In the strategy for three terms, if the leading coefficient is $1$, which section should you refer to for the method?", "back": "Section 7-2."}, {"front": "In the strategy for three terms, if the leading coefficient is NOT $1$, which section should you refer to for the method?", "back": "Section 7-3."}, {"front": "In the Zero Product Property, what value must the product equal for the property to be applicable?", "back": "$0$"}, {"front": "Concept: Zero Product Property", "back": "Definition: If a product equals zero, at least one factor is zero. Example: If $x(x-3)=0$, then $x=0$ or $x=3$."}, {"front": "What is the purpose of the final \"Check\" step in factoring completely?", "back": "To ensure that all factors are prime and to verify the original expression by multiplication."}, {"front": "In the factoring of $3x^3 - 12x^2 - 36x$, why are $3x$, $(x-6)$, and $(x+2)$ considered prime?", "back": "They cannot be factored further using integers."}, {"front": "To solve $x^2 - 5x - 14 = 0$, applying the Zero Product Property yields $x - 7 = 0$ or $x + 2 = 0$. Solving these gives the values $x = ____$ or $x = ____$.", "back": "$7$; $-2$"}, {"front": "Is it possible to factor $x^2 + 25$ using the difference of squares technique?", "back": "No, because it is a sum of squares, not a difference."}, {"front": "When checking the factors $(x+5)(x-5)$, the result of the FOIL method is ____.", "back": "$x^2 - 25$"}, {"front": "Why is factoring useful for solving equations like $x^2 - 5x - 14 = 0$?", "back": "It allows the use of the Zero Product Property to find solutions."}, {"front": "In the equation $5x^2 - 20 = 0$, what is the first step toward isolation of the factors?", "back": "Factoring out the GCF of $5$."}, {"front": "If you factor $2x$ out of $2x^3 - 50x$, why is the expression not yet factored \"completely\"?", "back": "Because the remaining factor $x^2 - 25$ can be factored further into $(x+5)(x-5)$."}, {"front": "Factoring by grouping is the recommended technique for polynomials with ____ terms.", "back": "four or more"}, {"front": "What are the two numbers whose product is $-14$ and sum is $-5$?", "back": "$-7$ and $2$."}, {"front": "When checking $3x(x - 6)(x + 2)$, multiplying $(x - 6)(x + 2)$ first results in which trinomial?", "back": "$x^2 - 4x - 12$"}, {"front": "If a quadratic equation is not solved by factoring, what alternative methods will be covered in later chapters?", "back": "The quadratic formula and the method of completing the square."}, {"front": "Does $x^2 + 9$ factor into $(x+3)(x-3)$?", "back": "No, that results in $x^2 - 9$."}, {"front": "If a product of three factors $ABC = 0$, what does the Zero Product Property imply?", "back": "$A = 0$, $B = 0$, or $C = 0$."}, {"front": "How do you verify the solution $x = -2$ for $x^2 - 5x - 14 = 0$?", "back": "Evaluate $(-2)^2 - 5(-2) - 14$ to see if it equals zero."}, {"front": "What is the product of $5(x+2)(x-2)$?", "back": "$5x^2 - 20$"}, {"front": "In the factoring hierarchy, checking for a GCF occurs ____ any other technique.", "back": "before"}, {"front": "The property that allows us to solve $(x-7)(x+2)=0$ is the ____ ____ Property.", "back": "Zero Product"}, {"front": "What is the GCF of $x^2$ and $x$?", "back": "$x$"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
