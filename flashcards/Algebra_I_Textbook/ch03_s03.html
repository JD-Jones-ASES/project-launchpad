<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the definition of a compound inequality?", "back": "A sentence formed by joining two inequalities with the word \"and\" or the word \"or.\""}, {"front": "Under what condition is a compound inequality joined by \"and\" considered true?", "back": "It is true only when both individual parts are true."}, {"front": "Graphically, what does the solution of an \"and\" compound inequality represent?", "back": "The overlap or intersection of the two individual solution sets."}, {"front": "How can the compound inequality x > 1 and x le 5 be expressed in compact notation?", "back": "$1 < x le 5$"}, {"front": "Term: Intersection of Sets", "back": "Definition: The set of elements that belong to both set A and set B, written as A cap B."}, {"front": "When solving a three-part inequality like -3 < 2x + 1 le 7, what is the primary goal?", "back": "To isolate the variable x in the middle part of the inequality."}, {"front": "What is the first step in solving the inequality -3 < 2x + 1 le 7?", "back": "Subtract 1 from all three parts of the inequality."}, {"front": "After subtracting 1 from all parts of -3 < 2x + 1 le 7, what is the resulting inequality?", "back": "-4 < 2x le 6"}, {"front": "What operation is used to isolate x in the inequality -4 < 2x le 6?", "back": "Divide all three parts of the inequality by 2."}, {"front": "What is the final inequality solution for -3 < 2x + 1 le 7?", "back": "-2 < x le 3"}, {"front": "Convert the inequality -2 < x le 3 into interval notation.", "back": "(-2, 3]"}, {"front": "When is a compound inequality joined by the word \"or\" considered true?", "back": "It is true when at least one part of the inequality is true."}, {"front": "The solution to an \"or\" compound inequality is the _____ of the two individual solution sets.", "back": "union"}, {"front": "Concept: Union of Sets", "back": "Definition: The set of elements that belong to at least one of the sets, written as A cup B."}, {"front": "How does the procedure for solving an \"or\" inequality differ from a three-part \"and\" inequality?", "back": "Each inequality in an \"or\" statement is solved separately."}, {"front": "What is the solution to the first part of $3x + 2 < -4or2x - 1 > 5$?", "back": "x < -2"}, {"front": "What is the solution to the second part of $3x + 2 < -4or2x - 1 > 5$?", "back": "x > 3"}, {"front": "What is the combined inequality solution for $3x + 2 < -4or2x - 1 > 5$?", "back": "x < -2 or x > 3"}, {"front": "Write the solution x < -2 or x > 3 in interval notation.", "back": "(-∞, -2) cup (3, ∞)"}, {"front": "What is the solution to the compound inequality x > 4 and x < 1?", "back": "No solution (or emptyset)"}, {"front": "Why does x > 4 and x < 1 have no solution?", "back": "There is no number that is simultaneously greater than 4 and less than 1."}, {"front": "What is the first step in solving the checkpoint inequality -1 le 3x + 2 < 14?", "back": "Subtract 2 from all three parts."}, {"front": "After subtracting 2 from all parts of -1 le 3x + 2 < 14, what is the simplified result?", "back": "-3 le 3x < 12"}, {"front": "What is the final inequality solution for -1 le 3x + 2 < 14?", "back": "-1 le x < 4"}, {"front": "Write the solution -1 le x < 4 in interval notation.", "back": "[-1, 4)"}, {"front": "In the context of set operations, which symbol represents the word \"and\"?", "back": "The intersection symbol (cap)"}, {"front": "In the context of set operations, which symbol represents the word \"or\"?", "back": "The union symbol (cup)"}, {"front": "According to the text, when will students study set operations like intersections and unions in greater generality?", "back": "Algebra II, Section 1-1"}, {"front": "In interval notation, what does a square bracket [ or ] indicate about the endpoint?", "back": "The endpoint is included in the solution set."}, {"front": "In interval notation, what does a parenthesis ( or ) indicate about the endpoint?", "back": "The endpoint is not included in the solution set."}, {"front": "Which specific word corresponds to the requirement that both conditions must hold?", "back": "\"And\""}, {"front": "Which specific word corresponds to the requirement that at least one condition must hold?", "back": "\"Or\""}, {"front": "The compact inequality a < x < b is logically equivalent to which two individual inequalities joined by \"and\"?", "back": "x > a and x < b"}, {"front": "What is the mathematical symbol for an empty set (no solution)?", "back": "emptyset"}, {"front": "In the solution for an \"and\" inequality, what happens if the two individual solution sets do not overlap?", "back": "There is no solution for the compound inequality."}, {"front": "How is the variable x isolated in the middle part of the inequality -4 < 2x le 6?", "back": "By dividing all parts of the inequality by 2."}, {"front": "If a solution is written as (-∞, -2) cup (3, ∞), what does the symbol cup signify?", "back": "The union of the two disjoint intervals."}, {"front": "Solve the first step of $2x - 1 > 5by isolating thex$ term.", "back": "$2x > 6$"}, {"front": "What is the final result of dividing $2x > 6by2$?", "back": "x > 3"}, {"front": "Solve the first step of $3x + 2 < -4by isolating thex$ term.", "back": "$3x < -6$"}, {"front": "What is the final result of dividing $3x < -6by3$?", "back": "x < -2"}, {"front": "The intersection of sets A and B is denoted as _____.", "back": "A cap B"}, {"front": "The union of sets A and B is denoted as _____.", "back": "A cup B"}, {"front": "When a quantity must satisfy two conditions simultaneously, which type of inequality is used?", "back": "An \"and\" compound inequality (intersection)."}, {"front": "When a quantity must satisfy at least one of two conditions, which type of inequality is used?", "back": "An \"or\" compound inequality (union)."}, {"front": "Identify the type of compound inequality: x < 5 or x > 10.", "back": "Union"}, {"front": "Identify the type of compound inequality: -2 < x < 4.", "back": "Intersection"}, {"front": "In interval notation, what symbol is always used next to ∞ or -∞?", "back": "Parentheses ( ( or ) )"}, {"front": "If the solution to an \"or\" inequality is x < -2 or x > 3, is the value 0 a solution?", "back": "No, because 0 is not less than -2 and 0 is not greater than 3."}, {"front": "If the solution to an \"and\" inequality is -2 < x le 3, is the value 3 a solution?", "back": "Yes, because the inequality includes the \"equal to\" condition at 3."}, {"front": "What characterizes the intersection of two sets?", "back": "Elements that are common to both sets."}, {"front": "What characterizes the union of two sets?", "back": "Elements that belong to one set, the other set, or both."}, {"front": "A _____ inequality is a sentence formed by joining two inequalities with \"and\" or \"or.\"", "back": "compound"}, {"front": "True or False: A compound inequality with \"and\" is true if only one of its parts is true.", "back": "False"}, {"front": "True or False: A compound inequality with \"or\" is true if both of its parts are true.", "back": "True"}, {"front": "In the inequality -1 le 3x + 2 < 14, how many parts must the subtraction of 2 be applied to?", "back": "All three parts."}, {"front": "What notation uses the symbols cap and cup?", "back": "Set notation (specifically for intersections and unions)."}, {"front": "How is the compact inequality $1 < x le 5$ read?", "back": "x is greater than 1 and less than or equal to 5."}, {"front": "If two inequalities joined by \"and\" have no common values, the intersection is the _____.", "back": "empty set (emptyset)"}, {"front": "In the graphical solution of an \"or\" inequality, the result usually consists of _____ segments on the number line.", "back": "two (pointing in opposite directions)"}, {"front": "In the graphical solution of a compact \"and\" inequality, the result is usually a _____ segment on the number line.", "back": "single (between two endpoints)"}, {"front": "When dividing a three-part inequality by a negative number, what must be done to the inequality signs?", "back": "The inequality signs must be reversed (Note: though not explicitly in the text's examples, it is a standard rule of inequalities)."}, {"front": "Translate \"x is at least -1 and less than 4\" into compact inequality notation.", "back": "-1 le x < 4"}, {"front": "The word \"and\" is associated with the set operation called _____.", "back": "intersection"}, {"front": "The word \"or\" is associated with the set operation called _____.", "back": "union"}, {"front": "Is the number 1 included in the solution set of $1 < x le 5$?", "back": "No, because the inequality is strictly \"greater than\" 1."}, {"front": "Is the number 5 included in the solution set of $1 < x le 5$?", "back": "Yes, because the inequality is \"less than or equal to\" 5."}, {"front": "In interval notation, what does the symbol (-∞, ∞) represent?", "back": "The set of all real numbers."}, {"front": "If you solve x < 5 or x > 2, what is the resulting solution set?", "back": "All real numbers (since every number is either less than 5 or greater than 2)."}, {"front": "In a three-part inequality, which part contains the variable you are solving for?", "back": "The middle part."}, {"front": "What is the intersection of the sets \\1, 2, 3\\ and \\3, 4, 5\\?", "back": "\\3\\"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
