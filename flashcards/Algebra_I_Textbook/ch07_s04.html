<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 7, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary benefit of recognizing special polynomial forms during factoring?", "back": "They allow for quick factoring without the need to list factor pairs."}, {"front": "What is the factoring pattern for the difference of squares a² - b²?", "back": "(a + b)(a - b)"}, {"front": "To use the difference of squares pattern, the expression must involve which mathematical operation?", "back": "Subtraction"}, {"front": "To apply the pattern a² - b², both terms in the expression must be categorized as      .", "back": "perfect squares"}, {"front": "In the factoring example x² - 49, what is the value of a?", "back": "x"}, {"front": "In the factoring example x² - 49, what is the value of b?", "back": "7"}, {"front": "Factor the expression x² - 49.", "back": "(x + 7)(x - 7)"}, {"front": "What is the result of checking the factors (x + 7)(x - 7) using multiplication?", "back": "x² - 49"}, {"front": "Express the term 4y² as a perfect square (a)².", "back": "(2y)²"}, {"front": "In the expression 4y² - 25, what is the value of b for the difference of squares pattern?", "back": "5"}, {"front": "Factor the expression 4y² - 25.", "back": "(2y + 5)(2y - 5)"}, {"front": "What is the value of the middle terms when checking (2y + 5)(2y - 5) with FOIL?", "back": "-10y and +10y (which sum to zero)"}, {"front": "Factor the expression 9n² - 16.", "back": "(3n + 4)(3n - 4)"}, {"front": "Under what condition does the sum of squares a² + b² factor over the real numbers?", "back": "It does not factor (it is prime)."}, {"front": "Why is it incorrect to factor x² + 9 as (x + 3)(x - 3)?", "back": "The product (x + 3)(x - 3) equals x² - 9, not x² + 9."}, {"front": "What term describes a polynomial like x² + 9 that cannot be factored?", "back": "Prime"}, {"front": "The factoring pattern for the perfect square trinomial a² + 2ab + b² is      .", "back": "(a + b)²"}, {"front": "The factoring pattern for the perfect square trinomial a² - 2ab + b² is      .", "back": "(a - b)²"}, {"front": "In a perfect square trinomial, what must be true of the first and last terms?", "back": "They must both be perfect squares."}, {"front": "How is the middle term of a perfect square trinomial calculated using the square roots of the first and last terms?", "back": "It equals 2 × (square root of first term) × (square root of last term)."}, {"front": "In the trinomial x² + 10x + 25, what is the square root of the first term (a)?", "back": "x"}, {"front": "In the trinomial x² + 10x + 25, what is the square root of the last term (b)?", "back": "5"}, {"front": "How do you verify that the middle term of x² + 10x + 25 fits the perfect square trinomial pattern?", "back": "Confirm that 10x is equal to 2(x)(5)."}, {"front": "Factor the perfect square trinomial x² + 10x + 25.", "back": "(x + 5)²"}, {"front": "Which part of a perfect square trinomial determines whether to use the (a+b)² or (a-b)² pattern?", "back": "The sign of the middle term"}, {"front": "In what course are the patterns for the sum and difference of cubes (a³ + b³ and a³ - b³) typically studied?", "back": "Algebra II"}, {"front": "Concept: Difference of Squares", "back": "Definition: A polynomial of the form a² - b² that factors into the product of a sum and a difference, (a+b)(a-b)."}, {"front": "The expression (a - b)² expands to the trinomial      .", "back": "a² - 2ab + b²"}, {"front": "What is the square root of the first term in the expression 9n²?", "back": "3n"}, {"front": "What is the square root of the last term in the expression 16?", "back": "4"}, {"front": "Is the polynomial x² + 25 factorable over the real numbers?", "back": "No, it is a sum of squares and is considered prime."}, {"front": "Identify the value of 2ab if a = x and b = 5.", "back": "10x"}, {"front": "Identify the value of 2ab if a = 2y and b = 5.", "back": "20y"}, {"front": "In the identity (a + b)(a - b) = a² - b², which direction represents the process of factoring?", "back": "Moving from a² - b² to (a + b)(a - b)."}, {"front": "In the identity (a + b)² = a² + 2ab + b², which direction represents the process of factoring?", "back": "Moving from a² + 2ab + b² to (a + b)²."}, {"front": "What specific form is the polynomial 4y² - 25?", "back": "Difference of squares"}, {"front": "What specific form is the polynomial x² + 10x + 25?", "back": "Perfect square trinomial"}, {"front": "What is the resulting middle term when multiplying (x+7)(x-7) before simplification?", "back": "-7x + 7x"}, {"front": "Why is the middle term absent in the simplified form of a difference of squares?", "back": "The opposite middle terms created during multiplication sum to zero."}, {"front": "What is the square root of the term 4y²?", "back": "2y"}, {"front": "What is the square root of the term 25?", "back": "5"}, {"front": "What is the square root of the term 9n²?", "back": "3n"}, {"front": "Formula: Difference of Squares factoring", "back": "a² - b² = (a + b)(a - b)"}, {"front": "Formula: Perfect Square Trinomial (sum) factoring", "back": "a² + 2ab + b² = (a + b)²"}, {"front": "Formula: Perfect Square Trinomial (difference) factoring", "back": "a² - 2ab + b² = (a - b)²"}, {"front": "Which mathematical property is typically used to check the results of factoring?", "back": "The distributive property (or FOIL method)."}, {"front": "Does x² - 10x + 25 fit the perfect square trinomial pattern?", "back": "Yes, because x² = (x)², 25 = (5)², and -10x = -2(x)(5)."}, {"front": "Factor x² - 10x + 25.", "back": "(x - 5)²"}, {"front": "To factor a² - b², we must find the       of each term to determine a and b.", "back": "square root"}, {"front": "In the trinomial x² + 6x + 9, what is the value of the square root of the last term?", "back": "3"}, {"front": "In the trinomial x² + 6x + 9, does the middle term 6x equal 2(x)(3)?", "back": "Yes, so it is a perfect square trinomial."}, {"front": "Factor x² + 6x + 9.", "back": "(x + 3)²"}, {"front": "If a trinomial's first and last terms are perfect squares but the middle term is not 2ab, can it be factored using the perfect square trinomial pattern?", "back": "No, all three conditions must be met."}, {"front": "What are the square roots of the terms in the difference of squares 16x² - 81?", "back": "4x and 9"}, {"front": "Factor 16x² - 81 using the special form pattern.", "back": "(4x + 9)(4x - 9)"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
