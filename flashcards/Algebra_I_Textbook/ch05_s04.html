<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 5, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the first step in the general strategy for solving a system from a word problem?", "back": "Read the problem carefully and identify the two unknowns.", "id": "fc01"}, {"front": "After identifying the two unknowns in a word problem, what action should be taken next?", "back": "Assign a variable to each unknown.", "id": "fc02"}, {"front": "How many relationships (conditions) must be found to connect two unknowns in a system of equations?", "back": "Two relationships.", "id": "fc03"}, {"front": "Once two relationships are identified in a word problem, what is the next step in the strategy?", "back": "Write each relationship as an equation.", "id": "fc04"}, {"front": "Which two algebraic methods are suggested for solving a system of equations derived from a word problem?", "back": "Substitution or elimination.", "id": "fc05"}, {"front": "What is the final step in the strategy for solving word problems using systems?", "back": "Check that the answer makes sense in the context of the problem.", "id": "fc06"}, {"front": "In the 'Mixture Problem' example, what do the variables $n$ and $d$ represent?", "back": "$n$ is the number of nickels and $d$ is the number of dimes.", "id": "fc07"}, {"front": "For a jar containing 20 total coins (nickels $n$ and dimes $d$), what is the 'total number' equation?", "back": "$n + d = 20$", "id": "fc08"}, {"front": "How many cents are in $\\$1.35$?", "back": "$135$ cents", "id": "fc09"}, {"front": "In a system of equations for coins, what does the expression $5n$ represent if $n$ is the number of nickels?", "back": "The total value of the nickels in cents.", "id": "fc10"}, {"front": "In a system of equations for coins, what does the expression $10d$ represent if $d$ is the number of dimes?", "back": "The total value of the dimes in cents.", "id": "fc11"}, {"front": "For a collection of nickels ($n$) and dimes ($d$) worth $135$ cents, what is the 'total value' equation?", "back": "$5n + 10d = 135$", "id": "fc12"}, {"front": "If $n + d = 20$, what is $n$ expressed in terms of $d$?", "back": "$n = 20 - d$", "id": "fc13"}, {"front": "In the equation $5(20 - d) + 10d = 135$, what is the result of the distribution step?", "back": "$100 - 5d + 10d = 135$", "id": "fc14"}, {"front": "Solving $100 - 5d + 10d = 135$ leads to what simplified equation for $d$?", "back": "$5d = 35$", "id": "fc15"}, {"front": "If $5d = 35$, what is the value of $d$?", "back": "$7$", "id": "fc16"}, {"front": "If $d = 7$ and $n + d = 20$, what is the value of $n$?", "back": "$13$", "id": "fc17"}, {"front": "When two objects move in opposite directions, how do you find the total distance between them?", "back": "The individual distances of the two objects are added together.", "id": "fc18"}, {"front": "In a distance-rate-time problem, what formula relates distance ($d$), rate ($r$), and time ($t$)?", "back": "$d = r \\cdot t$", "id": "fc19"}, {"front": "Cyclist 1 rides at $12$ mph and Cyclist 2 rides at $8$ mph in opposite directions. If $t$ is hours, what is the expression for their total distance apart?", "back": "$12t + 8t$", "id": "fc20"}, {"front": "What equation represents two cyclists (at $12$ mph and $8$ mph) being $50$ miles apart after $t$ hours?", "back": "$12t + 8t = 50$", "id": "fc21"}, {"front": "Simplify the motion equation $12t + 8t = 50$.", "back": "$20t = 50$", "id": "fc22"}, {"front": "If $20t = 50$, what is the value of $t$?", "back": "$2.5$", "id": "fc23"}, {"front": "In the distance problem check, how far does a cyclist at $12$ mph travel in $2.5$ hours?", "back": "$30$ miles", "id": "fc24"}, {"front": "In the distance problem check, how far does a cyclist at $8$ mph travel in $2.5$ hours?", "back": "$20$ miles", "id": "fc25"}, {"front": "What term describes the point where two different cost options result in the same total amount?", "back": "Break-even point", "id": "fc26"}, {"front": "In a cost equation like $T = 50 + 0.75c$, what does the constant term (50) usually represent?", "back": "The setup fee or fixed cost.", "id": "fc27"}, {"front": "In the cost equation $T = 50 + 0.75c$, what does the coefficient $0.75$ represent?", "back": "The variable cost per unit (e.g., price per copy).", "id": "fc28"}, {"front": "If Company A charges $\\$50$ setup plus $\\$0.75$/copy, what is the total cost equation ($T$) for $c$ copies?", "back": "$T = 50 + 0.75c$", "id": "fc29"}, {"front": "If Company B charges $\\$20$ setup plus $\\$1.25$/copy, what is the total cost equation ($T$) for $c$ copies?", "back": "$T = 20 + 1.25c$", "id": "fc30"}, {"front": "To find the number of copies ($c$) where two companies charge the same, what algebraic step is performed with their cost equations?", "back": "Set the two total cost expressions equal to each other ($T_A = T_B$).", "id": "fc31"}, {"front": "Solve for $c$: $50 + 0.75c = 20 + 1.25c$.", "back": "$c = 60$", "id": "fc32"}, {"front": "In the cost problem, if $c = 60$, what is the total cost $T$ for either company?", "back": "$95$", "id": "fc33"}, {"front": "In the checkpoint problem, what is the value of a quarter in cents?", "back": "$25$ cents", "id": "fc34"}, {"front": "In the checkpoint problem, what is the value of a dime in cents?", "back": "$10$ cents", "id": "fc35"}, {"front": "For a student with 20 total coins (quarters $q$ and dimes $d$), what is the total count equation?", "back": "$q + d = 20$", "id": "fc36"}, {"front": "If a student has $\\$3.50$ in quarters ($q$) and dimes ($d$), what is the total value equation in cents?", "back": "$25q + 10d = 350$", "id": "fc37"}, {"front": "Substituting $d = 20 - q$ into $25q + 10d = 350$ yields what equation?", "back": "$25q + 10(20 - q) = 350$", "id": "fc38"}, {"front": "Simplify: $25q + 10(20 - q) = 350$.", "back": "$15q + 200 = 350$", "id": "fc39"}, {"front": "If $15q = 150$, what is the value of $q$?", "back": "$10$", "id": "fc40"}, {"front": "In the checkpoint problem, if there are $10$ quarters in a $20$-coin set, how many dimes are there?", "back": "$10$ dimes", "id": "fc41"}, {"front": "Cloze: When translating word problems, assign a _____ to each of the two unknown quantities.", "back": "variable", "id": "fc42"}, {"front": "True or False: In motion problems where objects move in opposite directions, the total distance is the difference of their individual distances.", "back": "False", "id": "fc43"}, {"front": "What is the result of $1.25 \\cdot 60$?", "back": "$75$", "id": "fc44"}, {"front": "What is the result of $0.75 \\cdot 60$?", "back": "$45$", "id": "fc45"}, {"front": "In the equation $30 = 0.50c$, what operation is used to isolate $c$?", "back": "Divide both sides by $0.50$.", "id": "fc46"}, {"front": "If a problem involves two unknown quantities connected by two conditions, what mathematical tool is used to solve it?", "back": "A system of equations.", "id": "fc47"}, {"front": "To convert dollars to cents, you must multiply the dollar amount by _____.", "back": "$100$", "id": "fc48"}, {"front": "In the coin problem solution, why is the equation $5n + 10d = 135$ preferred over $0.05n + 0.10d = 1.35$?", "back": "It avoids working with decimals by using cents instead of dollars.", "id": "fc49"}, {"front": "Process: What should you do after finding numerical values for your variables in a word problem?", "back": "Check the values against the original conditions to ensure they make sense.", "id": "fc50"}, {"front": "In the cyclist problem, if the cyclists were moving toward each other, would the distance equation change?", "back": "No, because the distances still add to the total distance apart.", "id": "fc51"}, {"front": "Equation: Total distance = (Rate 1 $\\cdot$ Time) + (Rate 2 $\\cdot$ Time). This applies when objects move in _____ directions.", "back": "opposite", "id": "fc52"}, {"front": "In $T = 20 + 1.25c$, what is the total cost if $c = 0$?", "back": "$20$", "id": "fc53"}, {"front": "Concept: If $5d = 35$ and $d$ represents the number of dimes, can $d$ be a fraction?", "back": "No, because you cannot have a fraction of a coin in this context.", "id": "fc54"}, {"front": "The expression $25q$ represents the value of $q$ quarters in what unit?", "back": "cents", "id": "fc55"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
