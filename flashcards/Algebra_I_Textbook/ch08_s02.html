<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 8, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Under what structural condition can a quadratic equation be solved by taking square roots rather than factoring?", "back": "When it has no linear term ($bx$ term) or can be written as a perfect square on one side."}, {"front": "In the standard quadratic form $ax^2 + bx + c = 0$, what is the term $bx$ called?", "back": "The linear term."}, {"front": "State the Square Root Property for $x^2 = k$ where $k \\ge 0$.", "back": "$x = \\pm \\sqrt{k}$"}, {"front": "What does the symbol $\\pm$ represent in the solution $x = \\pm \\sqrt{k}$?", "back": "Two distinct solutions: one positive ($x = \\sqrt{k}$) and one negative ($x = -\\sqrt{k}$)."}, {"front": "If $k < 0$, how many real solutions does the equation $x^2 = k$ have?", "back": "Zero (no real solution)."}, {"front": "Why is the answer $x = 3$ considered incomplete for the equation $x^2 = 9$?", "back": "It omits the negative solution $x = -3$."}, {"front": "Solve the equation $x^2 = 49$ for $x$.", "back": "$x = \\pm 7$"}, {"front": "What is the result of solving $x^2 = -4$ in the set of real numbers?", "back": "No real solution."}, {"front": "Solve the equation $x^2 = 12$ for $x$ and provide the answer in simplified radical form.", "back": "$x = \\pm 2\\sqrt{3}$"}, {"front": "Why is there no real number that satisfies $x^2 = -4$?", "back": "There is no real number whose square is negative."}, {"front": "In which math course are imaginary numbers typically introduced to solve equations like $x^2 = -4$?", "back": "Algebra II."}, {"front": "Rule: A square root expression is in simplified radical form only if no _____ factors (other than $1$) remain under the radical.", "back": "perfect square"}, {"front": "Rule: Simplified radical form requires that no _____ appear under the radical sign.", "back": "fractions"}, {"front": "Rule: A square root is not simplified if any _____ remain in the denominator.", "back": "radicals"}, {"front": "Simplify the expression $\\sqrt{12}$.", "back": "$2\\sqrt{3}$"}, {"front": "Simplify the expression $\\sqrt{75}$.", "back": "$5\\sqrt{3}$"}, {"front": "To what types of expressions can the Square Root Property be extended?", "back": "Any expression that is squared, such as $(ax + b)^2$."}, {"front": "What is the first step in solving $(2x - 1)^2 = 25$ using the Square Root Property?", "back": "$2x - 1 = \\pm \\sqrt{25}$"}, {"front": "After applying the Square Root Property to $(2x - 1)^2 = 25$, what two linear equations must be solved?", "back": "$2x - 1 = 5$ and $2x - 1 = -5$"}, {"front": "Solve the linear equation $2x - 1 = 5$ for $x$.", "back": "$x = 3$"}, {"front": "Solve the linear equation $2x - 1 = -5$ for $x$.", "back": "$x = -2$"}, {"front": "What are the two solutions to the equation $(2x - 1)^2 = 25$?", "back": "$x = 3$ and $x = -2$"}, {"front": "How do you verify the solutions $x = 3$ and $x = -2$ for the equation $(2x - 1)^2 = 25$?", "back": "Substitute each value back into the original equation to see if they produce $25$."}, {"front": "Solve the equation $(x + 3)^2 = 20$ by applying the Square Root Property.", "back": "$x + 3 = \\pm \\sqrt{20}$"}, {"front": "Simplify the radical expression $\\sqrt{20}$.", "back": "$2\\sqrt{5}$"}, {"front": "If $x + 3 = \\pm 2\\sqrt{5}$, what is the expression for $x$?", "back": "$x = -3 \\pm 2\\sqrt{5}$"}, {"front": "Express the two solutions of $x = -3 \\pm 2\\sqrt{5}$ separately.", "back": "$x = -3 + 2\\sqrt{5}$ and $x = -3 - 2\\sqrt{5}$"}, {"front": "Solve the checkpoint equation $(x - 4)^2 = 36$ for $x - 4$.", "back": "$x - 4 = \\pm 6$"}, {"front": "What is the value of $x$ if $x - 4 = 6$?", "back": "$10$"}, {"front": "What is the value of $x$ if $x - 4 = -6$?", "back": "$-2$"}, {"front": "The method of solving by square roots is most efficient when the _____ term is missing.", "back": "linear"}, {"front": "Why is $x^2 = -4$ categorized as having 'no real solution' in this course?", "back": "Because the course works only with real numbers, and no real number squared is negative."}, {"front": "Concept: Square Root Property", "back": "Definition: A method to solve quadratic equations of the form $x^2 = k$ by taking the square root of both sides."}, {"front": "Identify the perfect square factor of $12$ used to simplify $\\sqrt{12}$.", "back": "$4$"}, {"front": "Identify the perfect square factor of $20$ used to simplify $\\sqrt{20}$.", "back": "$4$"}, {"front": "Identify the perfect square factor of $75$ used to simplify $\\sqrt{75}$.", "back": "$25$"}, {"front": "If $(x + 3)^2 = 20$, why do we subtract $3$ from both sides after taking the square root?", "back": "To isolate the variable $x$."}, {"front": "Solve $x^2 = 144$ using the Square Root Property.", "back": "$x = \\pm 12$"}, {"front": "Solve $x^2 = 0$.", "back": "$x = 0$"}, {"front": "When solving $x^2 = k$, which symbol must be used to ensure all solutions are identified?", "back": "$\\pm$ (plus or minus)."}, {"front": "In the equation $(2x - 1)^2 = 25$, what is the constant $k$?", "back": "$25$"}, {"front": "If an equation is written as $(ax + b)^2 = k$, what operation is performed first on both sides?", "back": "Taking the square root."}, {"front": "True or False: $\\sqrt{\\frac{1}{2}}$ is in simplified radical form.", "back": "False"}, {"front": "True or False: $2\\sqrt{3}$ is in simplified radical form.", "back": "True"}, {"front": "What is the primary difference between solutions for $x^2 = 49$ and $x^2 = 20$?", "back": "The solutions for $x^2 = 49$ are rational, while the solutions for $x^2 = 20$ are irrational."}, {"front": "Equation: $x^2 = 121$. Solution: _____", "back": "$x = \\pm 11$"}, {"front": "Equation: $(x - 5)^2 = 9$. Solution for $x - 5$: _____", "back": "$x - 5 = \\pm 3$"}, {"front": "If $x - 5 = \\pm 3$, what are the values of $x$?", "back": "$x = 8$ and $x = 2$"}, {"front": "What happens to the number of real solutions when $k = 0$ in the equation $x^2 = k$?", "back": "There is only one real solution ($x = 0$)."}, {"front": "Why does $\\sqrt{20} = 2\\sqrt{5}$?", "back": "Because $20 = 4 \\cdot 5$, and the square root of the perfect square $4$ is $2$."}, {"front": "How is $x = 7$ and $x = -7$ written compactly?", "back": "$x = \\pm 7$"}, {"front": "What does the simplified radical form rule 'No radicals appear in a denominator' prevent?", "back": "Having an irrational square root in the bottom of a fraction."}, {"front": "If $(2x - 1)^2 = 25$, check the solution $x = -2$ by evaluating the squared binomial.", "back": "$(2(-2) - 1)^2 = (-5)^2 = 25$"}, {"front": "Solve $x^2 - 100 = 0$ using the Square Root Property.", "back": "$x = \\pm 10$"}, {"front": "Which form of a quadratic equation allows for direct application of the Square Root Property?", "back": "The form $x^2 = k$ or $(ax + b)^2 = k$."}, {"front": "What term is blanked in the following rule: 'No _____ appear under the radical' for simplified form?", "back": "fractions"}, {"front": "In the solution $x = -3 \\pm 2\\sqrt{5}$, what does the $-3$ represent relative to the original equation $(x + 3)^2 = 20$?", "back": "The opposite of the constant added to $x$ inside the parentheses."}, {"front": "If $x^2 = 12$, then $x = \\pm \\sqrt{12}$. Simplify the radical part.", "back": "$\\pm 2\\sqrt{3}$"}, {"front": "Does the equation $(x - 1)^2 = -1$ have any real solutions?", "back": "No, because the square of a real expression cannot be negative."}, {"front": "The Square Root Property states that if $x^2 = k$ and $k > 0$, then $x = \\sqrt{k}$ or $x = \\dots$", "back": "$-\\sqrt{k}$"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
