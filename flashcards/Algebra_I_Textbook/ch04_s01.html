<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the term for the surface formed by two perpendicular number lines intersecting at their zero points?", "back": "The coordinate plane"}, {"front": "In the coordinate plane, what is the specific name given to the horizontal number line?", "back": "The x-axis"}, {"front": "In the coordinate plane, what is the specific name given to the vertical number line?", "back": "The y-axis"}, {"front": "What is the name of the point (0, 0) where the x-axis and y-axis intersect?", "back": "The origin"}, {"front": "The axes divide the coordinate plane into four regions known as _____.", "back": "Quadrants"}, {"front": "In which direction are the quadrants of the coordinate plane numbered?", "back": "Counter-clockwise"}, {"front": "Which quadrant is located in the upper right section of the coordinate plane?", "back": "Quadrant I"}, {"front": "Term: Ordered Pair", "back": "Definition: A pair of numbers (x, y) that gives the specific position of a point in the coordinate plane."}, {"front": "In the ordered pair (x, y), what does the first number x represent?", "back": "The x-coordinate (horizontal distance from the origin)"}, {"front": "In the ordered pair (x, y), what does the second number y represent?", "back": "The y-coordinate (vertical distance from the origin)"}, {"front": "To plot a point (a, b), what is the required starting location in the coordinate plane?", "back": "The origin"}, {"front": "When plotting (a, b), if a > 0, in which horizontal direction should you move?", "back": "Right"}, {"front": "When plotting (a, b), if a < 0, in which horizontal direction should you move?", "back": "Left"}, {"front": "When plotting (a, b), if b > 0, in which vertical direction should you move?", "back": "Up"}, {"front": "When plotting (a, b), if b < 0, in which vertical direction should you move?", "back": "Down"}, {"front": "Which quadrant contains points where both the x and y coordinates are positive?", "back": "Quadrant I"}, {"front": "Which quadrant contains points where x < 0 and y > 0?", "back": "Quadrant II"}, {"front": "Which quadrant contains points where both the x and y coordinates are negative?", "back": "Quadrant III"}, {"front": "Which quadrant contains points where x > 0 and y < 0?", "back": "Quadrant IV"}, {"front": "If a point has an x-coordinate of 0, such as (0, -3), on which part of the coordinate plane does it lie?", "back": "The y-axis"}, {"front": "If a point has a y-coordinate of 0, such as (5, 0), on which part of the coordinate plane does it lie?", "back": "The x-axis"}, {"front": "What geometric property is shared by two points that have the same y-coordinate?", "back": "They lie on a horizontal line."}, {"front": "What geometric property is shared by two points that have the same x-coordinate?", "back": "They lie on a vertical line."}, {"front": "How is the distance calculated between two points (x₁, y) and (x₂, y) on a horizontal line?", "back": "By taking the absolute value of the difference between the x-coordinates: |x₂ - x₁|."}, {"front": "How is the distance calculated between two points (x, y₁) and (x, y₂) on a vertical line?", "back": "By taking the absolute value of the difference between the y-coordinates: |y₂ - y₁|."}, {"front": "What is the distance between the points (2, 7) and (9, 7)?", "back": "7 units"}, {"front": "What is the distance between the points (-3, 4) and (-3, -5)?", "back": "9 units"}, {"front": "Term: Midpoint", "back": "Definition: The point exactly halfway between the endpoints of a segment."}, {"front": "What algebraic operation is used on coordinates to find the midpoint of a segment?", "back": "Averaging the coordinates"}, {"front": "Concept: Midpoint Formula", "back": "Formula: M = (x₁ + x₂/2, y₁ + y₂/2)"}, {"front": "To find the x-coordinate of the midpoint between (x₁, y₁) and (x₂, y₂), you use the expression _____.", "back": "x₁ + x₂/2"}, {"front": "To find the y-coordinate of the midpoint between (x₁, y₁) and (x₂, y₂), you use the expression _____.", "back": "y₁ + y₂/2"}, {"front": "What is the midpoint of the segment with endpoints A(-2, 5) and B(6, 1)?", "back": "(2, 3)"}, {"front": "What is the midpoint of the segment with endpoints (3, -4) and (7, 2)?", "back": "(5, -1)"}, {"front": "Point B(-2, 4) lies in which quadrant?", "back": "Quadrant II"}, {"front": "Point C(-4, -1) lies in which quadrant?", "back": "Quadrant III"}, {"front": "Point A(3, 5) lies in which quadrant?", "back": "Quadrant I"}, {"front": "The coordinate plane is the _____ for all graphing done in algebra.", "back": "foundation"}, {"front": "In the context of the coordinate plane, what does the term 'perpendicular' describe regarding the two number lines?", "back": "That they intersect at right angles (90 degrees)."}, {"front": "When calculating the distance between points on a vertical line, why is the result |-9| expressed as 9?", "back": "Distance must be represented as a non-negative value."}, {"front": "Where would you find any point where the x-coordinate and y-coordinate are both zero?", "back": "The origin"}, {"front": "If you are finding the midpoint of a horizontal segment, which coordinate (x or y) will be the same for the endpoints and the midpoint?", "back": "The y-coordinate"}, {"front": "If you are finding the midpoint of a vertical segment, which coordinate (x or y) will be the same for the endpoints and the midpoint?", "back": "The x-coordinate"}, {"front": "According to the text, in which course will you learn the formula for the distance between any two points in the plane?", "back": "Algebra II"}, {"front": "How many dimensions are represented by the coordinate plane?", "back": "Two dimensions"}, {"front": "A point at (7, -2) is located in which quadrant?", "back": "Quadrant IV"}, {"front": "If a point is on the x-axis, its distance from the origin is determined solely by which coordinate?", "back": "The x-coordinate"}, {"front": "To find the distance between (5, 12) and (5, 3), you would calculate |12 - 3|, which equals _____.", "back": "9"}, {"front": "To find the distance between (-8, 4) and (2, 4), you would calculate |2 - (-8)|, which equals _____.", "back": "10"}, {"front": "If M is the midpoint of segment PQ, and P is at (0, 0) and Q is at (10, 6), what are the coordinates of M?", "back": "(5, 3)"}, {"front": "What is the x-coordinate of the origin?", "back": "0"}, {"front": "What is the y-coordinate of the origin?", "back": "0"}, {"front": "When identifying a point's location, why is (0, -3) described as being on an axis rather than in a quadrant?", "back": "Points on the axes are the boundaries between quadrants and do not belong to any single quadrant."}, {"front": "True or False: The distance between (x₁, y₁) and (x₂, y₂) on a horizontal line is always positive or zero.", "back": "True"}, {"front": "The coordinate plane combines a vertical number line with a _____ number line.", "back": "Horizontal"}, {"front": "If you move 4 units left and 1 unit down from the origin, which point from the example are you plotting?", "back": "Point C(-4, -1)"}, {"front": "A point with coordinates (-5, 0) lies on which axis?", "back": "The x-axis"}, {"front": "If two points share the same x-coordinate, the line segment connecting them is _____.", "back": "Vertical"}, {"front": "If two points share the same y-coordinate, the line segment connecting them is _____.", "back": "Horizontal"}, {"front": "In the midpoint formula, the resulting x-value is the _____ of the two initial x-values.", "back": "Arithmetic mean (or average)"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
