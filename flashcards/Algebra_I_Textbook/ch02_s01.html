<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the term for a mathematical statement that two expressions are equal?", "back": "Equation"}, {"front": "What punctuation or mathematical symbol is always present in an equation?", "back": "An equals sign ($=$)"}, {"front": "Solving an equation involves finding the value of the _____ that makes the mathematical sentence true.", "back": "variable"}, {"front": "Term: Solution of an Equation", "back": "Definition: A value of the variable that makes the equation a true statement."}, {"front": "How can you verify if a specific value is a solution to an equation?", "back": "Substitute the value back into the original equation to see if it remains true."}, {"front": "Why is $x = 4$ considered a solution to the equation $x + 3 = 7$?", "back": "Because substituting $4$ for $x$ results in the true statement $4 + 3 = 7$."}, {"front": "What is the definition of 'Equivalent Equations'?", "back": "Equations that have exactly the same solution(s)."}, {"front": "Term: Solving an Equation", "back": "Process: Transforming an equation into simpler equivalent equations until the variable is isolated."}, {"front": "To produce an equivalent equation, what must be done when performing an operation on one side?", "back": "Perform the exact same operation on the other side of the equation."}, {"front": "Which property states that for all real numbers $a$, $b$, and $c$, if $a = b$, then $a + c = b + c$?", "back": "Addition Property of Equality"}, {"front": "Which property states that for all real numbers $a$, $b$, and $c$, if $a = b$, then $a - c = b - c$?", "back": "Subtraction Property of Equality"}, {"front": "According to the Addition and Subtraction Properties of Equality, what type of equations are produced by adding the same number to both sides?", "back": "Equivalent equations"}, {"front": "To solve the equation $x + 9 = 14$, what value should be subtracted from both sides?", "back": "$9$"}, {"front": "What is the solution to the equation $x + 9 = 14$?", "back": "$x = 5$"}, {"front": "When solving $y - 7 = -3$, what is the first step to isolate the variable $y$?", "back": "Add $7$ to both sides of the equation."}, {"front": "What is the solution to the equation $y - 7 = -3$?", "back": "$y = 4$"}, {"front": "Solve the equation $n + 12 = 5$.", "back": "$n = -7$"}, {"front": "Which property states that for all real numbers $a$, $b$, and $c$, if $a = b$, then $ac = bc$?", "back": "Multiplication Property of Equality"}, {"front": "Which property states that for all real numbers $a$, $b$, and $c$ (where $c \\neq 0$), if $a = b$, then $\\frac{a}{c} = \\frac{b}{c}$?", "back": "Division Property of Equality"}, {"front": "Under what condition is the Division Property of Equality valid for a divisor $c$?", "back": "$c$ must be a nonzero number ($c \\neq 0$)."}, {"front": "To solve the equation $-4x = 28$, by what number should you divide both sides?", "back": "$-4$"}, {"front": "What is the solution to the equation $-4x = 28$?", "back": "$x = -7$"}, {"front": "If a variable is divided by a number, what operation is used on both sides to solve the equation?", "back": "Multiplication"}, {"front": "What is the recommended strategy for solving an equation when the coefficient of the variable is a fraction?", "back": "Multiply both sides by the reciprocal of the fraction."}, {"front": "What is the solution to the equation $\\frac{m}{3} = -6$?", "back": "$m = -18$"}, {"front": "Which four properties serve as the foundation for solving every equation in the course?", "back": "The Addition, Subtraction, Multiplication, and Division Properties of Equality."}, {"front": "In Algebra II, the Properties of Equality are used to solve complex equations involving quadratics, rational expressions, and _____.", "back": "radicals"}, {"front": "Concept: Isolating the Variable", "back": "Definition: The process of using inverse operations to leave the variable alone on one side of the equation."}, {"front": "What is the inverse operation of addition?", "back": "Subtraction"}, {"front": "What is the inverse operation of multiplication?", "back": "Division"}, {"front": "Is $x = 5$ a solution to $x + 3 = 7$?", "back": "No, because $5 + 3 = 8$, which does not equal $7$."}, {"front": "How many solutions are found in a basic 'one-step' linear equation like $2n = 10$?", "back": "One solution ($n = 5$)"}, {"front": "Formula: $x + 9 - 9 = 14 - 9$", "back": "Process: Applying the Subtraction Property of Equality to solve for $x$."}, {"front": "Formula: $y - 7 + 7 = -3 + 7$", "back": "Process: Applying the Addition Property of Equality to solve for $y$."}, {"front": "Formula: $\\frac{-4x}{-4} = \\frac{28}{-4}$", "back": "Process: Applying the Division Property of Equality to solve for $x$."}, {"front": "What specific goal must be achieved to consider an equation 'solved'?", "back": "The variable must be alone on one side of the equals sign."}, {"front": "True or False: $x + 3 = 7$ and $x = 4$ are equivalent equations.", "back": "True"}, {"front": "An equation is defined as a mathematical _____ stating that two expressions are equal.", "back": "sentence"}, {"front": "When a coefficient is a fraction, multiplying by the _____ is equivalent to dividing by that fraction.", "back": "reciprocal"}, {"front": "What is the check for the solution $n = -7$ in the equation $n + 12 = 5$?", "back": "$-7 + 12 = 5$"}, {"front": "If $x = 4$ is the only solution to two different equations, those equations are described as _____.", "back": "equivalent"}, {"front": "In the equation $\\frac{y}{4} = 5$, what operation undoes the division by $4$?", "back": "Multiplying both sides by $4$."}, {"front": "Solve for $y$: $\\frac{y}{4} = 5$.", "back": "$y = 20$"}, {"front": "Solve for $n$: $2n = 10$.", "back": "$n = 5$"}, {"front": "What does it mean to find 'all' solutions of an equation?", "back": "To solve the equation."}, {"front": "Term: Property of Equality", "back": "Definition: A rule guaranteeing that performing the same operation on both sides of an equation results in an equivalent equation."}, {"front": "In the example $-4x = 28$, what is the coefficient of $x$?", "back": "$-4$"}, {"front": "What is the result of $-3 + 7$?", "back": "$4$"}, {"front": "What is the result of $5 - 12$?", "back": "$-7$"}, {"front": "Cloze: Multiplying both sides of an equation by the same _____ number produces an equivalent equation.", "back": "nonzero"}, {"front": "Which algebraic property is used to 'undo' a subtraction operation?", "back": "Addition Property of Equality"}, {"front": "Which algebraic property is used to 'undo' a multiplication operation?", "back": "Division Property of Equality"}, {"front": "If $a = b$, then $ac = bc$ represents the _____ Property of Equality.", "back": "Multiplication"}, {"front": "Why is the Division Property of Equality restricted for $c = 0$?", "back": "Because division by zero is undefined in mathematics."}, {"front": "Concept: One-Step Equations", "back": "Definition: Equations that can be solved by performing a single inverse operation to isolate the variable."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
