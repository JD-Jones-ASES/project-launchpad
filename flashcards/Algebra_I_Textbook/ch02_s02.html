<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the first general step in solving a multi-step equation?", "back": "Simplify each side of the equation by distributing and combining like terms."}, {"front": "In the context of multi-step equations, solving should be thought of as \"undoing\" operations in _____ order.", "back": "reverse"}, {"front": "After simplifying each side of an equation, what is the next step to collect variable and constant terms?", "back": "Use addition or subtraction to move variable terms to one side and constants to the other."}, {"front": "What operations are typically used in the final step to isolate a variable in a multi-step equation?", "back": "Multiplication or division."}, {"front": "How do you verify if a solution to an equation is correct?", "back": "Substitute the value into the original equation to see if it makes a true statement."}, {"front": "To solve 3x + 7 = 22, what is the first inverse operation performed?", "back": "Subtract 7 from both sides."}, {"front": "In the equation 3x = 15, how is the variable x isolated?", "back": "By dividing both sides by 3."}, {"front": "Solve 3x + 7 = 22 for x.", "back": "x = 5"}, {"front": "What is the first step in solving 2(x - 4) + 3 = 11?", "back": "Distribute the 2 to the terms inside the parentheses."}, {"front": "In the expression 2(x - 4) + 3, what is the result after applying the distributive property?", "back": "2x - 8 + 3"}, {"front": "Simplify the expression 2x - 8 + 3 by combining like terms.", "back": "2x - 5"}, {"front": "Solve 2(x - 4) + 3 = 11 for x.", "back": "x = 8"}, {"front": "Solve the equation 5n - 3 = 27 for n.", "back": "n = 6"}, {"front": "When solving 5n - 3 = 27, what is the value of the variable term 5n after the first step?", "back": "30"}, {"front": "What is the result of distributing a negative three in the expression -3(x - 2)?", "back": "-3x + 6"}, {"front": "Why does -3(x - 2) result in a positive 6 for the constant term?", "back": "The product of two negative numbers is positive."}, {"front": "What is the specific technique used to eliminate denominators from an equation?", "back": "Clearing fractions."}, {"front": "To clear fractions, you multiply every term on both sides of the equation by the _____.", "back": "least common denominator (LCD)"}, {"front": "What type of coefficients are produced after clearing fractions from an equation?", "back": "Integer coefficients."}, {"front": "Solve x/2 + x/3 = 10. What is the LCD of the fractions?", "back": "6"}, {"front": "In the equation x/2 + x/3 = 10, what is the resulting equation after multiplying every term by 6?", "back": "3x + 2x = 60"}, {"front": "Solve the equation x/2 + x/3 = 10 for x.", "back": "x = 12"}, {"front": "To clear decimals from an equation, multiply both sides by a _____.", "back": "power of 10"}, {"front": "If an equation contains values to the hundredths place, what power of 10 should you multiply by to clear the decimals?", "back": "100"}, {"front": "If an equation contains values only to the tenths place, what power of 10 should you multiply by to clear the decimals?", "back": "10"}, {"front": "Solve 0.2x + 0.5 = 1.3. What is the equation after clearing the decimals?", "back": "2x + 5 = 13"}, {"front": "Solve 0.2x + 0.5 = 1.3 for x.", "back": "x = 4"}, {"front": "True or False: Clearing fractions and decimals is a mandatory step in solving equations.", "back": "False (it is an optional technique)."}, {"front": "What is the primary advantage of clearing fractions or decimals before solving?", "back": "It simplifies arithmetic and reduces the chance for errors."}, {"front": "In the strategy for solving multi-step equations, which property is used to remove parentheses?", "back": "The distributive property."}, {"front": "The first step to solve 2x - 5 = 11 is to _____.", "back": "add 5 to both sides"}, {"front": "When checking a solution, what should you do with the value of the variable?", "back": "Substitute it back into the original equation."}, {"front": "Concept: Clearing Decimals", "back": "Definition: Multiplying an equation by a power of 10 to remove decimal points."}, {"front": "What is the sign of the constant term when distributing -5(y - 3)?", "back": "Positive (or +15)"}, {"front": "To isolate the variable in 3x = 15, we perform the inverse of multiplication, which is _____.", "back": "division"}, {"front": "Process: Clearing Fractions", "back": "Step 1: Identify the LCD. Step 2: Multiply every term by the LCD. Step 3: Solve the resulting integer equation."}, {"front": "What is the coefficient of x after multiplying x/3 by 6?", "back": "2"}, {"front": "What is the coefficient of x after multiplying x/2 by 6?", "back": "3"}, {"front": "Solve 3x + 7 = 22. What is the value of 3x after the first step?", "back": "15"}, {"front": "In the equation 2x - 5 = 11, what is the value of 2x after adding 5 to both sides?", "back": "16"}, {"front": "What happens if you multiply only one side of an equation by the LCD?", "back": "The equation is no longer equivalent (balanced)."}, {"front": "If an equation has tenths, we multiply by 10¹. If it has thousandths, we multiply by _____.", "back": "1000 (or 10³)"}, {"front": "The process of combining 2x and 3x into 5x is called combining _____.", "back": "like terms"}, {"front": "Solve 5n - 3 = 27. What operation is used to move the constant -3?", "back": "Addition (add 3 to both sides)."}, {"front": "Which order of operations is generally reversed when solving equations?", "back": "Order of operations (PEMDAS/BODMAS)."}, {"front": "Check the solution x = 12 for the equation x/2 + x/3 = 10.", "back": "6 + 4 = 10"}, {"front": "Check the solution x = 8 for the equation 2(x - 4) + 3 = 11.", "back": "2(4) + 3 = 8 + 3 = 11"}, {"front": "When solving 0.2x + 0.5 = 1.3, what is the second step after clearing decimals?", "back": "Subtract 5 from both sides."}, {"front": "What is the constant term in the equation 3x + 7 = 22?", "back": "7 (or 22)"}, {"front": "What is the variable term in the equation 3x + 7 = 22?", "back": "3x"}, {"front": "To solve an equation, we use _____ operations to isolate the variable.", "back": "inverse"}, {"front": "Why is -3(x - 2) not equal to -3x - 6?", "back": "Because the product of -3 and -2 is positive 6."}, {"front": "In the strategy for multi-step equations, which side of the equation should you simplify first?", "back": "Each side (both sides)."}, {"front": "If you multiply the left side of an equation by 6, what must you do to the right side?", "back": "Multiply it by 6 as well."}, {"front": "Formula: LCD multiplication.", "back": "LCD × (Term 1 + Term 2) = LCD × (Term 3)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
