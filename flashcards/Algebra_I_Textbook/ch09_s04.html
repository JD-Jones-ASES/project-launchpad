<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 9, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the definition of the principal square root of $a$ ($a \\ge 0$)?", "back": "The non-negative number $b$ such that $b^2 = a$."}, {"front": "Which symbol is used to denote a radical sign?", "back": "$\\sqrt{x}$"}, {"front": "What is the term for the expression located under a radical sign?", "back": "Radicand"}, {"front": "In the expression $\\sqrt{3x + 7}$, what is the radicand?", "back": "$3x + 7$"}, {"front": "Why must a radicand be non-negative when working within the set of real numbers?", "back": "The square root of a negative number is not a real number."}, {"front": "The Product Property of Square Roots states that $\\sqrt{ab} = \\sqrt{a} \\cdot \\sqrt{b}$ under what conditions for $a$ and $b$?", "back": "$a \\ge 0$ and $b \\ge 0$."}, {"front": "What formula defines the Quotient Property of Square Roots?", "back": "$\\sqrt{\\frac{a}{b}} = \\frac{\\sqrt{a}}{\\sqrt{b}}$"}, {"front": "In the Quotient Property $\\sqrt{\\frac{a}{b}} = \\frac{\\sqrt{a}}{\\sqrt{b}}$, why must $b$ be strictly greater than $0$?", "back": "To ensure the denominator is not zero."}, {"front": "What is the first requirement for a radical expression to be in simplest form?", "back": "The radicand must have no perfect square factor other than $1$."}, {"front": "What is the second requirement for a radical expression to be in simplest form regarding fractions?", "back": "The radicand must contain no fractions."}, {"front": "What is the third requirement for a radical expression to be in simplest form regarding denominators?", "back": "No radical sign may appear in a denominator."}, {"front": "To simplify a radical, what should be factored out from the radicand?", "back": "The largest perfect square factor."}, {"front": "What is the simplified form of $\\sqrt{72}$?", "back": "$6\\sqrt{2}$"}, {"front": "How is $\\sqrt{72}$ decomposed using its largest perfect square factor?", "back": "$\\sqrt{36 \\cdot 2}$"}, {"front": "What is the simplified form of $\\sqrt{98}$?", "back": "$7\\sqrt{2}$"}, {"front": "What is the simplified form of $\\sqrt{50x^4y^3}$ if all variables are non-negative?", "back": "$5x^2 y\\sqrt{2y}$"}, {"front": "In the simplification of $\\sqrt{50x^4y^3}$, which perfect squares are factored out?", "back": "$25$, $x^4$, and $y^2$."}, {"front": "What is the term for the process of removing a radical from a denominator?", "back": "Rationalizing the denominator"}, {"front": "What is the simplified form of the fraction $\\frac{5}{\\sqrt{3}}$?", "back": "$\\frac{5\\sqrt{3}}{3}$"}, {"front": "To rationalize the denominator of $\\frac{5}{\\sqrt{3}}$, what expression should you multiply the numerator and denominator by?", "back": "$\\sqrt{3}$"}, {"front": "What is the simplified form of $\\frac{8}{\\sqrt{2}}$?", "back": "$4\\sqrt{2}$"}, {"front": "In Algebra II notation, what is the rational exponent equivalent of $\\sqrt{x}$?", "back": "$x^{1/2}$"}, {"front": "True or False: The principal square root of $25$ is $\\pm 5$.", "back": "False, the principal square root is only the non-negative value $5$."}, {"front": "Concept: Radical Expression", "back": "Definition: An expression that contains a radical sign."}, {"front": "What is the result of multiplying $\\sqrt{3} \\cdot \\sqrt{3}$?", "back": "$3$"}, {"front": "Why is $\\sqrt{12}$ not in simplest form?", "back": "It contains the perfect square factor $4$."}, {"front": "What is the simplified form of $\\sqrt{12}$?", "back": "$2\\sqrt{3}$"}, {"front": "What is the simplified form of $\\sqrt{18}$?", "back": "$3\\sqrt{2}$"}, {"front": "What is the simplified form of $\\sqrt{20}$?", "back": "$2\\sqrt{5}$"}, {"front": "What is the largest perfect square factor of $50$?", "back": "$25$"}, {"front": "What is the simplified form of $\\sqrt{8}$?", "back": "$2\\sqrt{2}$"}, {"front": "How do you rationalize a single-term denominator involving a square root?", "back": "Multiply the numerator and denominator by the radical that makes the denominator a whole number."}, {"front": "A radical expression contains no _____ in the radicand when in simplest form.", "back": "fractions"}, {"front": "If $b^2 = a$ and $b \\ge 0$, then $\\sqrt{a}$ equals _____.", "back": "$b$"}, {"front": "Simplify $\\sqrt{x^6}$ assuming $x \\ge 0$.", "back": "$x^3$"}, {"front": "Simplify $\\sqrt{49x^2}$ assuming $x \\ge 0$.", "back": "$7x$"}, {"front": "Which property allows you to split $\\sqrt{25 \\cdot 2}$ into $\\sqrt{25} \\cdot \\sqrt{2}$?", "back": "Product Property of Square Roots"}, {"front": "Which property allows you to rewrite $\\frac{\\sqrt{100}}{\\sqrt{4}}$ as $\\sqrt{\\frac{100}{4}}$?", "back": "Quotient Property of Square Roots"}, {"front": "Simplify the radical $\\sqrt{24}$.", "back": "$2\\sqrt{6}$"}, {"front": "What is the largest perfect square factor of $24$?", "back": "$4$"}, {"front": "Simplify the expression $\\frac{1}{\\sqrt{2}}$ by rationalizing the denominator.", "back": "$\\frac{\\sqrt{2}}{2}$"}, {"front": "What is the radicand in the expression $\\sqrt{x^2 - 4}$?", "back": "$x^2 - 4$"}, {"front": "Simplify $\\sqrt{y^5}$ assuming $y \\ge 0$.", "back": "$y^2 \\sqrt{y}$"}, {"front": "Why is the expression $\\sqrt{\\frac{3}{4}}$ not in simplest form?", "back": "The radicand contains a fraction."}, {"front": "Simplify the expression $\\sqrt{\\frac{3}{4}}$.", "back": "$\\frac{\\sqrt{3}}{2}$"}, {"front": "What is the value of $\\sqrt{0}$?", "back": "$0$"}, {"front": "Simplify $\\sqrt{80}$.", "back": "$4\\sqrt{5}$"}, {"front": "What is the largest perfect square factor of $80$?", "back": "$16$"}, {"front": "Simplify $\\sqrt{32x^3}$ for $x \\ge 0$.", "back": "$4x\\sqrt{2x}$"}, {"front": "What is the purpose of rationalizing the denominator?", "back": "To eliminate any radical signs from the denominator of a fraction."}, {"front": "Simplify $\\frac{6}{\\sqrt{3}}$.", "back": "$2\\sqrt{3}$"}, {"front": "When simplifying $\\sqrt{x^{10}}$, the result is $x$ to what power?", "back": "$5$"}, {"front": "What is the simplest form of $\\sqrt{27}$?", "back": "$3\\sqrt{3}$"}, {"front": "What is the largest perfect square factor of $27$?", "back": "$9$"}, {"front": "Simplify the expression $\\frac{\\sqrt{15}}{\\sqrt{3}}$.", "back": "$\\sqrt{5}$"}, {"front": "True or False: $\\sqrt{a + b}$ is always equal to $\\sqrt{a} + \\sqrt{b}$.", "back": "False"}, {"front": "Simplify $\\sqrt{50}$.", "back": "$5\\sqrt{2}$"}, {"front": "Rationalize the denominator: $\\frac{2}{\\sqrt{7}}$.", "back": "$\\frac{2\\sqrt{7}}{7}$"}, {"front": "What is the simplified form of $\\sqrt{100}$?", "back": "$10$"}, {"front": "What is the simplified form of $\\sqrt{121}$?", "back": "$11$"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
