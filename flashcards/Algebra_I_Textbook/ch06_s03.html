<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In scientific notation, what is the required range for the coefficient $a$?", "back": "The coefficient $a$ must satisfy the condition $1 \\le a < 10$."}, {"front": "What type of number must the exponent $n$ be in the scientific notation form $a \\times 10^n$?", "back": "The exponent $n$ must be an integer."}, {"front": "Term: Coefficient", "back": "Definition: The factor $a$ in the scientific notation expression $a \\times 10^n$."}, {"front": "In the form $a \\times 10^n$, what is the term used for the component $10^n$?", "back": "The power of 10."}, {"front": "What are two primary reasons for using scientific notation in science and engineering?", "back": "It provides a compact way to express very large or very small numbers while reducing errors from writing many zeros."}, {"front": "When converting a standard number to scientific notation, where should the decimal point be placed to determine the coefficient $a$?", "back": "The decimal point must be moved so that exactly one nonzero digit is to its left."}, {"front": "In standard to scientific conversion, if the decimal point is moved to the left, what is the sign of the exponent $n$?", "back": "The exponent $n$ is positive."}, {"front": "In standard to scientific conversion, if the decimal point is moved to the right, what is the sign of the exponent $n$?", "back": "The exponent $n$ is negative."}, {"front": "How is the value of the exponent $n$ determined when converting from standard form to scientific notation?", "back": "The value of $n$ is the count of how many places the decimal point was moved."}, {"front": "Write the number $45,000,000$ in scientific notation.", "back": "$4.5 \\times 10^7$"}, {"front": "How many places must the decimal point move to convert $45,000,000$ to scientific notation?", "back": "Seven places to the left."}, {"front": "Write the number $0.00032$ in scientific notation.", "back": "$3.2 \\times 10^{-4}$"}, {"front": "How many places must the decimal point move to convert $0.00032$ to scientific notation?", "back": "Four places to the right."}, {"front": "When converting from scientific notation to standard form, in which direction should the decimal point move if $n > 0$?", "back": "To the right."}, {"front": "When converting from scientific notation to standard form, in which direction should the decimal point move if $n < 0$?", "back": "To the left."}, {"front": "Write the value $6.02 \\times 10^{23}$ in standard form.", "back": "$602,000,000,000,000,000,000,000$"}, {"front": "To convert $6.02 \\times 10^{23}$ to standard form, how many places is the decimal point moved?", "back": "Twenty-three places to the right."}, {"front": "What is the general procedure for multiplying two numbers written in scientific notation?", "back": "Multiply the coefficients and add the exponents of the powers of 10."}, {"front": "What is the general procedure for dividing two numbers written in scientific notation?", "back": "Divide the coefficients and subtract the exponents of the powers of 10."}, {"front": "Simplify the expression $(3 \\times 10^4)(2 \\times 10^5)$ and write the answer in scientific notation.", "back": "$6 \\times 10^9$"}, {"front": "Simplify the expression $\\frac{8.4 \\times 10^9}{2.1 \\times 10^3}$ and write the answer in scientific notation.", "back": "$4 \\times 10^6$"}, {"front": "What step must be taken if the result of an arithmetic operation in scientific notation has a coefficient $a$ outside the range $1 \\le a < 10$?", "back": "Adjust the coefficient and the exponent to return the number to proper scientific notation."}, {"front": "Simplify $(7 \\times 10^5)(8 \\times 10^3)$ before adjusting the final coefficient.", "back": "$56 \\times 10^8$"}, {"front": "Rewrite the improper form $56 \\times 10^8$ in correct scientific notation.", "back": "$5.6 \\times 10^9$"}, {"front": "How is the number $56$ expressed in scientific notation for coefficient adjustment purposes?", "back": "$5.6 \\times 10^1$"}, {"front": "On a scientific calculator, what does the letter 'E' represent in a display like $3.2E-4$?", "back": "It stands for 'times ten to the power.'"}, {"front": "How would the number $3.2 \\times 10^{-4}$ typically be displayed on a graphing calculator?", "back": "As $3.2E-4$ or $3.2,ee,-4$."}, {"front": "Which specific calculator keys are recommended for entering numbers in scientific notation?", "back": "The EE or EXP keys."}, {"front": "Why should users avoid typing $\\times 10 \\wedge$ when entering scientific notation on a calculator?", "back": "Calculators provide dedicated keys like EE or EXP to handle scientific notation more efficiently and accurately."}, {"front": "The distance from Earth to the Sun is approximately $93,000,000$ miles; write this in scientific notation.", "back": "$9.3 \\times 10^7$ miles."}, {"front": "A red blood cell is about $0.000007$ meters across; write this in scientific notation.", "back": "$7 \\times 10^{-6}$ meters."}, {"front": "If the decimal moves 5 places to the right to reach proper scientific notation, what is the value of $n$?", "back": "$-5$"}, {"front": "If the decimal moves 8 places to the left to reach proper scientific notation, what is the value of $n$?", "back": "$8$"}, {"front": "A number is in scientific notation when written in the form $a \\times 10^n$, where the integer $n$ and coefficient $a$ must satisfy _____.", "back": "$1 \\le a < 10$"}, {"front": "To convert from scientific notation to standard form, you move the decimal point $n$ places to the _____ if $n$ is negative.", "back": "Left"}, {"front": "To convert from scientific notation to standard form, you move the decimal point $n$ places to the _____ if $n$ is positive.", "back": "Right"}, {"front": "When multiplying $(a \\times 10^m)$ and $(b \\times 10^n)$, the new power of 10 is found by calculating $10$ raised to the power of _____.", "back": "$m + n$"}, {"front": "When dividing $(a \\times 10^m)$ by $(b \\times 10^n)$, the new power of 10 is found by calculating $10$ raised to the power of _____.", "back": "$m - n$"}, {"front": "Why is $0.45 \\times 10^8$ not in proper scientific notation?", "back": "The coefficient $0.45$ is less than $1$."}, {"front": "Why is $12.5 \\times 10^3$ not in proper scientific notation?", "back": "The coefficient $12.5$ is not less than $10$."}, {"front": "Evaluate $(2 \\times 10^{-3})(4 \\times 10^7)$ and provide the answer in scientific notation.", "back": "$8 \\times 10^4$"}, {"front": "Evaluate $\\frac{6 \\times 10^5}{3 \\times 10^{-2}}$ and provide the answer in scientific notation.", "back": "$2 \\times 10^7$"}, {"front": "Determine the coefficient $a$ for the number $0.000000501$ when written in scientific notation.", "back": "$5.01$"}, {"front": "Determine the exponent $n$ for the number $501,000$ when written in scientific notation.", "back": "$5$"}, {"front": "True or False: The exponent $n$ in scientific notation must always be a positive integer.", "back": "False, $n$ can be a negative integer or zero."}, {"front": "In the standard form number $0.0025$, moving the decimal to the right 3 places results in the coefficient _____.", "back": "$2.5$"}, {"front": "In the standard form number $7,200$, moving the decimal to the left 3 places results in the coefficient _____.", "back": "$7.2$"}, {"front": "Convert $0.5 \\times 10^4$ to proper scientific notation.", "back": "$5 \\times 10^3$"}, {"front": "How is $10^1 \\times 10^8$ simplified using exponent rules?", "back": "$10^9$"}, {"front": "What is the result of $8.4$ divided by $2.1$?", "back": "$4$"}, {"front": "What is the result of adding the exponents $4$ and $5$?", "back": "$9$"}, {"front": "What is the result of subtracting the exponents $9 - 3$?", "back": "$6$"}, {"front": "If a result is $0.2 \\times 10^5$, what is the adjusted scientific notation?", "back": "$2 \\times 10^4$"}, {"front": "If a result is $25 \\times 10^{-4}$, what is the adjusted scientific notation?", "back": "$2.5 \\times 10^{-3}$"}, {"front": "In the context of scientific notation, what arithmetic rules are used to handle the powers of 10?", "back": "The exponent rules."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
