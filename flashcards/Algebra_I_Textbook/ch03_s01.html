<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In mathematics, what is a sentence that compares two expressions using symbols like < or > called?", "back": "An inequality"}, {"front": "Which mathematical symbol is used to represent 'less than'?", "back": "<"}, {"front": "Which mathematical symbol is used to represent 'greater than'?", "back": ">"}, {"front": "Which mathematical symbol is used to represent 'less than or equal to'?", "back": "le"}, {"front": "Which mathematical symbol is used to represent 'greater than or equal to'?", "back": "ge"}, {"front": "What is the term for the set of all values that make an inequality true?", "back": "The solution set"}, {"front": "Term: Inequality", "back": "Definition: A mathematical sentence that compares two expressions using symbols such as <, >, le, or ge."}, {"front": "Concept: Solution Set", "back": "Definition: The set of all variable values that satisfy an inequality. Example: For x > 3, the set of all numbers greater than 3."}, {"front": "How is the solution set of an inequality represented visually?", "back": "By shading a region on a number line."}, {"front": "When graphing an inequality, what does an open circle at the boundary point represent?", "back": "The boundary value is not included in the solution set."}, {"front": "Which two inequality symbols require an open circle on a number line graph?", "back": "< and >"}, {"front": "When graphing an inequality, what does a closed circle at the boundary point represent?", "back": "The boundary value is included in the solution set."}, {"front": "Which two inequality symbols require a closed circle on a number line graph?", "back": "le and ge"}, {"front": "To graph x > 2, at what value should the open circle be placed?", "back": "2"}, {"front": "In which direction do you shade the number line to represent x > 2?", "back": "To the right"}, {"front": "What type of circle is used to graph the inequality x le 4?", "back": "A closed circle"}, {"front": "In which direction do you shade the number line to represent x le 4?", "back": "To the left"}, {"front": "A number line graph has a closed circle at -1 and is shaded to the left. What inequality does this represent?", "back": "x le -1"}, {"front": "A number line graph has an open circle at 2 and is shaded to the right. What inequality does this represent?", "back": "x > 2"}, {"front": "What notation describes a solution set using the format x mid condition\\?", "back": "Set-builder notation"}, {"front": "In set-builder notation x mid x > 2\\, what is the verbal translation of the vertical bar mid?", "back": "Such that"}, {"front": "How is the set-builder notation x mid x > 2\\ read aloud?", "back": "\"The set of all x such that x is greater than 2.\""}, {"front": "Which notation uses parentheses and brackets to describe a solution set on a number line?", "back": "Interval notation"}, {"front": "In interval notation, what does a parenthesis ( or ) indicate about an endpoint?", "back": "The endpoint is not included."}, {"front": "In interval notation, what does a bracket [ or ] indicate about an endpoint?", "back": "The endpoint is included."}, {"front": "Which specific symbol is ALWAYS paired with a parenthesis in interval notation?", "back": "Infinity (∞ or -∞)"}, {"front": "Why is the symbol for infinity always paired with a parenthesis in interval notation?", "back": "Because infinity is not a real number and cannot be included as a specific endpoint."}, {"front": "The inequality x > 2 is written as \\_\\_\\_\\_\\_ in interval notation.", "back": "(2, ∞)"}, {"front": "The inequality x le 4 is written as \\_\\_\\_\\_\\_ in interval notation.", "back": "(-∞, 4]"}, {"front": "What is the set-builder notation for the inequality x ge -3?", "back": "x mid x ge -3\\"}, {"front": "What is the interval notation for the inequality x ge -3?", "back": "[-3, ∞)"}, {"front": "How would you graph the inequality x ge -3 on a number line?", "back": "Place a closed circle at -3 and shade to the right."}, {"front": "In which future course will students extensively use interval notation to describe domain and range?", "back": "Algebra II"}, {"front": "An open circle on a number line corresponds to which two interval notation symbols?", "back": "Parentheses ( or )"}, {"front": "A closed circle on a number line corresponds to which two interval notation symbols?", "back": "Brackets [ or ]"}, {"front": "The inequality x < 5 corresponds to which interval?", "back": "(-∞, 5)"}, {"front": "The inequality x ge 10 corresponds to which interval?", "back": "[10, ∞)"}, {"front": "What is the primary difference between an equation and an inequality?", "back": "An equation states two expressions are equal, while an inequality compares them as being unequal (<, >, etc.)."}, {"front": "When writing an inequality from a graph, what three features must be noted?", "back": "The boundary point, the circle type (open/closed), and the shading direction."}, {"front": "Cloze: In set-builder notation, the curly braces \\\\ indicate that the expression represents a \\_\\_\\_\\_\\_.", "back": "Set"}, {"front": "In interval notation, which direction on the number line does -∞ represent?", "back": "The far left (negative infinity)"}, {"front": "In interval notation, which direction on the number line does ∞ represent?", "back": "The far right (positive infinity)"}, {"front": "If a solution set includes all numbers less than 7, what is the boundary point?", "back": "7"}, {"front": "If a solution set includes all numbers less than 7, should the circle at 7 be open or closed?", "back": "Open"}, {"front": "How is 'at least a certain amount' represented mathematically?", "back": "Using the greater than or equal to symbol (ge)"}, {"front": "How is 'below freezing' represented mathematically if freezing is 32 degrees?", "back": "Using the less than symbol (< 32)"}, {"front": "What does 'strictly greater than' imply about the boundary point in a graph?", "back": "The boundary point is not included (open circle)."}, {"front": "Formula: Interval notation for a < x < b (not including endpoints)", "back": "(a, b)"}, {"front": "Formula: Interval notation for x le a", "back": "(-∞, a]"}, {"front": "Formula: Interval notation for x > a", "back": "(a, ∞)"}, {"front": "Formula: Set-builder notation for all numbers less than or equal to -1", "back": "x mid x le -1\\"}, {"front": "What is the boundary point of the set represented by [5, ∞)?", "back": "5"}, {"front": "Is the number 5 included in the solution set represented by (5, ∞)?", "back": "No"}, {"front": "Is the number 5 included in the solution set represented by [5, ∞)?", "back": "Yes"}, {"front": "When translating the phrase 'the set of all x such that x is less than 4' to set-builder notation, what is written?", "back": "x mid x < 4\\"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
