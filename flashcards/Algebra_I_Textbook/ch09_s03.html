    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 9, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the definition of a rational equation?", "back": "An equation that contains one or more rational expressions."}, {"front": "What is the primary strategy for clearing fractions when solving a rational equation?", "back": "Multiply every term on both sides of the equation by the least common denominator (LCD)."}, {"front": "Multiplying a rational equation by its LCD transforms it into what type of equation?", "back": "A polynomial equation."}, {"front": "What is the first step in the procedure for solving a rational equation?", "back": "Find the LCD of all rational expressions in the equation."}, {"front": "What is the second step in the procedure for solving a rational equation?", "back": "Multiply every term on both sides by the LCD."}, {"front": "After solving the resulting polynomial equation, what must you do with each potential solution?", "back": "Check each solution in the original rational equation."}, {"front": "Under what specific condition must a solution to a rational equation be discarded?", "back": "When the solution makes any denominator in the original equation equal to zero."}, {"front": "In the equation $\\frac{3}{x} + \\frac{1}{4} = \\frac{5}{x}$, what is the least common denominator?", "back": "$4x$"}, {"front": "When solving $\\frac{3}{x} + \\frac{1}{4} = \\frac{5}{x}$ by multiplying every term by $4x$, what is the resulting polynomial equation?", "back": "$12 + x = 20$"}, {"front": "What is the solution to the rational equation $\\frac{3}{x} + \\frac{1}{4} = \\frac{5}{x}$?", "back": "$x = 8$"}, {"front": "Define: Extraneous solution", "back": "A value that appears when solving a transformed equation but does not satisfy the original equation."}, {"front": "Why do extraneous solutions sometimes occur when solving rational equations?", "back": "Multiplying both sides by an expression containing a variable can introduce values that make a denominator zero."}, {"front": "In the equation $\\frac{x}{x-2} - \\frac{3}{x+1} = \\frac{6}{(x-2)(x+1)}$, what is the LCD?", "back": "$(x-2)(x+1)$"}, {"front": "When $\\frac{x}{x-2}$ is multiplied by the LCD $(x-2)(x+1)$, what is the resulting term?", "back": "$x(x+1)$"}, {"front": "When $\\frac{3}{x+1}$ is multiplied by the LCD $(x-2)(x+1)$, what is the resulting term?", "back": "$3(x-2)$"}, {"front": "The equation $x(x+1) - 3(x-2) = 6$ simplifies to what quadratic equation in standard form?", "back": "$x^2 - 2x = 0$"}, {"front": "What are the two potential solutions derived from the polynomial equation $x(x-2) = 0$?", "back": "$x = 0$ and $x = 2$"}, {"front": "In the equation $\\frac{x}{x-2} - \\frac{3}{x+1} = \\frac{6}{(x-2)(x+1)}$, why is $x = 2$ considered extraneous?", "back": "Substituting $x = 2$ results in a denominator of zero, making the term undefined."}, {"front": "What is the valid solution for the equation $\\frac{x}{x-2} - \\frac{3}{x+1} = \\frac{6}{(x-2)(x+1)}$?", "back": "$x = 0$"}, {"front": "Term: Proportion", "back": "Definition: An equation stating that two ratios are equal, typically in the form $\\frac{a}{b} = \\frac{c}{d}$."}, {"front": "What algebraic method is specifically used to solve a proportion?", "back": "Cross-multiplying."}, {"front": "Cross-multiplying is considered a special case of what broader algebraic strategy?", "back": "Clearing fractions with the LCD."}, {"front": "In the proportion $\\frac{x+1}{3} = \\frac{2x-5}{7}$, what is the result of cross-multiplying?", "back": "$7(x + 1) = 3(2x - 5)$"}, {"front": "Expand the equation $7(x + 1) = 3(2x - 5)$ to its linear form.", "back": "$7x + 7 = 6x - 15$"}, {"front": "What is the solution to the proportion $\\frac{x+1}{3} = \\frac{2x-5}{7}$?", "back": "$x = -22$"}, {"front": "Solve the checkpoint problem: $\\frac{2}{x+3} + \\frac{1}{x-3} = \\frac{12}{x^2-9}$.", "back": "$x = 5$"}, {"front": "The checkpoint problem $\\frac{2}{x+3} + \\frac{1}{x-3} = \\frac{12}{x^2-9}$ results in what simplified linear equation after clearing denominators?", "back": "$2(x - 3) + 1(x + 3) = 12$"}, {"front": "A rational equation is an equation that contains one or more _____ _____.", "back": "rational expressions"}, {"front": "In the context of rational equations, why must you always check solutions by substituting them back into the original equation?", "back": "To ensure they do not produce a zero in any denominator (identifying extraneous solutions)."}, {"front": "According to the property for solving rational equations, what should you do with solutions that make a denominator zero?", "back": "Discard them."}, {"front": "Cross-multiplying the proportion $\\frac{a}{b} = \\frac{c}{d}$ results in the equation _____.", "back": "$ad = bc$"}, {"front": "In the equation $\\frac{3}{x} + \\frac{1}{4} = \\frac{5}{x}$, if $x = 8$, the left side becomes $\\frac{3}{8} + \\frac{2}{8}$. What is the resulting sum?", "back": "$\\frac{5}{8}$"}, {"front": "Which level of math course generally covers rational equations that reduce to more complex quadratic equations?", "back": "Algebra II."}, {"front": "True or False: An extraneous solution is a value that satisfies the original equation but not the transformed equation.", "back": "False (it satisfies the transformed polynomial equation but not the original)."}, {"front": "When solving $\\frac{x}{x-2} - \\frac{3}{x+1} = \\frac{6}{(x-2)(x+1)}$, what are the two excluded values for $x$ that would make the equation undefined?", "back": "$x = 2$ and $x = -1$"}, {"front": "If a solution to a transformed rational equation is $x = -1$, and the original equation contains the term $\\frac{3}{x+1}$, is this solution valid?", "back": "No, it is extraneous because it makes the denominator zero."}, {"front": "The strategy of clearing fractions involves multiplying _____ term on both sides by the LCD.", "back": "every"}, {"front": "In the example $\\frac{x+1}{3} = \\frac{2x-5}{7}$, what is the value of the left side ratio when $x = -22$?", "back": "$-7$"}, {"front": "How does the process of clearing fractions change the nature of the equation?", "back": "It transforms a rational equation into a polynomial equation."}, {"front": "When finding the LCD of $\\frac{2}{x+3}$ and $\\frac{1}{x-3}$, you must recognize that $x^2 - 9$ is equal to what factored expression?", "back": "$(x + 3)(x - 3)$"}, {"front": "A proportion is a special case of a rational equation where the LCD is the _____ of the two denominators.", "back": "product"}, {"front": "If you solve $x^2 - 2x = 0$ by factoring, you get $x(x - 2) = 0$. What property of real numbers allows you to set $x = 0$ and $x - 2 = 0$?", "back": "The Zero Product Property."}, {"front": "Why is it mathematically incorrect to include a solution that makes a denominator zero?", "back": "Division by zero is undefined."}, {"front": "Solve for $x$: $\\frac{12}{x} = 3$.", "back": "$x = 4$"}, {"front": "In the expression $\\frac{6}{(x-2)(x+1)}$, the denominators are $x-2$ and $x+1$. If the LCD is $(x-2)(x+1)$, what does the numerator $6$ become after multiplying by the LCD?", "back": "$6$"}, {"front": "When checking $x = 8$ in $\\frac{3}{x} + \\frac{1}{4} = \\frac{5}{x}$, we find $\\frac{3}{8} + \\frac{1}{4}$ equals $\\frac{5}{8}$. Is $x = 8$ a valid solution?", "back": "Yes."}, {"front": "What is the result of $x^2 + x - 3x + 6$ when simplified?", "back": "$x^2 - 2x + 6$"}, {"front": "What is the resulting equation if $x^2 - 2x + 6 = 6$ is subtracted by $6$ on both sides?", "back": "$x^2 - 2x = 0$"}, {"front": "The process of multiplying every term by the LCD is designed to _____ denominators.", "back": "eliminate (or clear)"}, {"front": "Does a proportion like $\\frac{a}{b} = \\frac{c}{d}$ always have to be solved by cross-multiplication, or can it be solved by finding a common denominator?", "back": "It can be solved by either, as cross-multiplication is just a shortcut for clearing fractions with the LCD."}, {"front": "If $\\frac{x}{x-2}$ is a term in a rational equation, what value is restricted from the domain?", "back": "$2$"}, {"front": "In Example 2, what was the value of the right side $\\frac{6}{(x-2)(x+1)}$ when $x = 0$?", "back": "$-3$"}, {"front": "In the equation $\\frac{3}{x} + \\frac{1}{4} = \\frac{5}{x}$, what is the restriction on $x$?", "back": "$x \\ne 0$"}, {"front": "In the checkpoint equation $\\frac{2}{x+3} + \\frac{1}{x-3} = \\frac{12}{x^2-9}$, what two values would be extraneous if they appeared as solutions?", "back": "$-3$ and $3$"}, {"front": "Solve for $x$ in the simple proportion $\\frac{x}{10} = \\frac{2}{5}$.", "back": "$x = 4$"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
