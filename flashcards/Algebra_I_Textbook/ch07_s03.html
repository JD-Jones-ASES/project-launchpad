<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 7, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the general form of the trinomials discussed in Chapter 7, Section 3?", "back": "ax² + bx + c where a ≠ 1"}, {"front": "Which method is used to factor trinomials of the form ax² + bx + c?", "back": "The ac method"}, {"front": "In the ac method, what is the first calculation performed?", "back": "The product ac"}, {"front": "In the ac method, what is the required product for the integers m and n?", "back": "m · n = ac"}, {"front": "In the ac method, what is the required sum for the integers m and n?", "back": "m + n = b"}, {"front": "The ac method: Compute ac. Find two integers m, n such that m · n = ac and m + n = b. Rewrite bx as _____. Factor by grouping.", "back": "mx + nx"}, {"front": "Which factoring technique is applied after rewriting the middle term in the ac method?", "back": "Factor by grouping"}, {"front": "When is a trinomial considered 'prime over the integers' in the context of the ac method?", "back": "When no pair of integers m and n satisfy the product and sum requirements."}, {"front": "What is the very first step to take before applying the ac method to a trinomial?", "back": "Check for and factor out a Greatest Common Factor (GCF)."}, {"front": "What is the advantage of removing the GCF before using the ac method?", "back": "It makes the remaining coefficients smaller and the factoring process easier."}, {"front": "In the example 2x² + 7x + 3, what is the value of a?", "back": "2"}, {"front": "In the example 2x² + 7x + 3, what is the value of c?", "back": "3"}, {"front": "What is the value of ac for the trinomial 2x² + 7x + 3?", "back": "6"}, {"front": "For the trinomial 2x² + 7x + 3, which two numbers have a product of 6 and a sum of 7?", "back": "1 and 6"}, {"front": "In the ac method for 2x² + 7x + 3, how is the term 7x rewritten?", "back": "x + 6x"}, {"front": "What is the expression for 2x² + 7x + 3 after rewriting the middle term?", "back": "2x² + x + 6x + 3"}, {"front": "Factoring 2x² + x + 6x + 3 by grouping results in the expression x(2x + 1) + _____(2x + 1).", "back": "3"}, {"front": "What is the factored form of 2x² + 7x + 3?", "back": "(2x + 1)(x + 3)"}, {"front": "How can you verify that (2x + 1)(x + 3) is the correct factorization of 2x² + 7x + 3?", "back": "Multiply the factors using the FOIL method or distributive property."}, {"front": "In the example 3x² + x - 10, what is the value of ac?", "back": "-30"}, {"front": "What is the coefficient b in the trinomial 3x² + x - 10?", "back": "1"}, {"front": "Which two integers have a product of -30 and a sum of 1?", "back": "6 and -5"}, {"front": "How is the middle term x rewritten in the ac method for 3x² + x - 10?", "back": "6x - 5x"}, {"front": "In the grouping step for 3x² + 6x - 5x - 10, what is the GCF of the first two terms?", "back": "3x"}, {"front": "In the grouping step for 3x² + 6x - 5x - 10, what is the GCF of the last two terms?", "back": "-5"}, {"front": "What is the result of factoring by grouping 3x(x + 2) - 5(x + 2)?", "back": "(x + 2)(3x - 5)"}, {"front": "What is the factored form of 3x² + x - 10?", "back": "(x + 2)(3x - 5)"}, {"front": "In the example 6x² - 11x + 4, what is the value of ac?", "back": "24"}, {"front": "In the trinomial 6x² - 11x + 4, what is the coefficient b?", "back": "-11"}, {"front": "Which two integers have a product of 24 and a sum of -11?", "back": "-3 and -8"}, {"front": "How is -11x rewritten in the ac method for 6x² - 11x + 4?", "back": "-3x - 8x"}, {"front": "What is the expression for 6x² - 11x + 4 after splitting the middle term?", "back": "6x² - 3x - 8x + 4"}, {"front": "What is the result of factoring 3x from the first two terms of 6x² - 3x - 8x + 4?", "back": "3x(2x - 1)"}, {"front": "What is the result of factoring -4 from the last two terms of 6x² - 3x - 8x + 4?", "back": "-4(2x - 1)"}, {"front": "What is the factored form of 6x² - 11x + 4?", "back": "(2x - 1)(3x - 4)"}, {"front": "What is the factored form of the checkpoint problem 5x² + 13x + 6?", "back": "(5x + 3)(x + 2)"}, {"front": "In the checkpoint problem 5x² + 13x + 6, what is the value of ac?", "back": "30"}, {"front": "For the checkpoint problem 5x² + 13x + 6, which two integers sum to 13 and multiply to 30?", "back": "3 and 10"}, {"front": "What term describes the coefficient a in the trinomial ax² + bx + c?", "back": "The leading coefficient"}, {"front": "According to the note, where will you develop faster mental strategies for factoring trinomials?", "back": "Algebra II, Section 3-3"}, {"front": "Identify the integer factors m and n for the trinomial 3x² + x - 10.", "back": "6 and -5"}, {"front": "Identify the integer factors m and n for the trinomial 6x² - 11x + 4.", "back": "-3 and -8"}, {"front": "In the ac method, if ac is positive and b is negative, what must be true about the signs of m and n?", "back": "Both m and n must be negative."}, {"front": "In the ac method, if ac is negative, what must be true about the signs of m and n?", "back": "One must be positive and one must be negative."}, {"front": "What is the common binomial factor found during the grouping step for 2x² + x + 6x + 3?", "back": "(2x + 1)"}, {"front": "What is the common binomial factor found during the grouping step for 3x² + 6x - 5x - 10?", "back": "(x + 2)"}, {"front": "What is the common binomial factor found during the grouping step for 6x² - 3x - 8x + 4?", "back": "(2x - 1)"}, {"front": "In the expression 3x(2x - 1) - 4(2x - 1), what is the final factored form?", "back": "(2x - 1)(3x - 4)"}, {"front": "In the expression x(2x + 1) + 3(2x + 1), what is the final factored form?", "back": "(2x + 1)(x + 3)"}, {"front": "What happens to the coefficients of a trinomial when a GCF is removed first?", "back": "They become smaller."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
