        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 1, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the sign of the product of two numbers with the same sign?", "back": "Positive."}, {"front": "What is the sign of the product of two numbers with different signs?", "back": "Negative."}, {"front": "The product $(+)(+)$ results in a _____ value.", "back": "Positive."}, {"front": "The product $(-)(-)$ results in a _____ value.", "back": "Positive."}, {"front": "The product $(+)(-)$ results in a _____ value.", "back": "Negative."}, {"front": "The product $(-)(+)$ results in a _____ value.", "back": "Negative."}, {"front": "How do the sign rules for division compare to those for multiplication?", "back": "The sign rules are the same."}, {"front": "What is the sign of a quotient when the numbers have the same signs?", "back": "Positive."}, {"front": "What is the sign of a quotient when the numbers have different signs?", "back": "Negative."}, {"front": "For every real number $a$, what is the result of $a \\cdot 0$?", "back": "$0$."}, {"front": "For every real number $a$, what is the result of $0 \\cdot a$?", "back": "$0$."}, {"front": "What is the result of $0 \\div a$ (where $a \\ne 0$)?", "back": "$0$."}, {"front": "What is the status of the expression $a \\div 0$?", "back": "Undefined."}, {"front": "Why is the expression $\\frac{a}{0}$ not allowed in mathematics?", "back": "Division by zero is never allowed."}, {"front": "Simplify the expression $(-4)(7)$.", "back": "$-28$."}, {"front": "Simplify the expression $(-3)(-9)$.", "back": "$27$."}, {"front": "What is the general procedure for simplifying an expression like $5(-6)(2)$?", "back": "Multiply left to right."}, {"front": "In the process of simplifying $5(-6)(2)$, what is the first product calculated?", "back": "$-30$."}, {"front": "Simplify the expression $5(-6)(2)$.", "back": "$-60$."}, {"front": "Simplify the quotient $-24 \\div 6$.", "back": "$-4$."}, {"front": "Simplify the quotient $-35 \\div -5$.", "back": "$7$."}, {"front": "Simplify the expression $0 \\div -8$.", "back": "$0$."}, {"front": "Simplify the product $(-8)(-5)$.", "back": "$40$."}, {"front": "Simplify the quotient $-42 \\div -7$.", "back": "$6$."}, {"front": "The expression $\\frac{0}{0}$ is known as an _____ form.", "back": "Indeterminate."}, {"front": "Under what condition is $a \\div 0$ undefined?", "back": "It is undefined for every value of $a$, including $a = 0$."}, {"front": "What happens to the sign of every term inside grouping symbols when a negative number is distributed?", "back": "Every term changes sign."}, {"front": "What is the first step in simplifying $-2(3x - 5) + 4x$?", "back": "Distribute $-2$."}, {"front": "Simplify the term $-2(3x - 5)$ using the distributive property.", "back": "$-6x + 10$."}, {"front": "Simplify the entire expression $-2(3x - 5) + 4x$.", "back": "$-2x + 10$."}, {"front": "Term: Like Terms", "back": "Definition: Terms that have the same variable(s) raised to the same power(s)."}, {"front": "What specific part of like terms is added to combine them?", "back": "Their coefficients."}, {"front": "Simplify $7a - 3b + 2a + 5b$.", "back": "$9a + 2b$."}, {"front": "In the expression $7a - 3b + 2a + 5b$, which term is 'like' $7a$?", "back": "$2a$."}, {"front": "In the expression $7a - 3b + 2a + 5b$, which term is 'like' $-3b$?", "back": "$5b$."}, {"front": "What is the result of grouping and combining the $a$-terms in $7a - 3b + 2a + 5b$?", "back": "$9a$."}, {"front": "What is the result of grouping and combining the $b$-terms in $7a - 3b + 2a + 5b$?", "back": "$2b$."}, {"front": "Simplify the expression $4x - 3(2x - 1) + 5$.", "back": "$-2x + 8$."}, {"front": "When simplifying $4x - 3(2x - 1) + 5$, what does the expression become after the distribution step?", "back": "$4x - 6x + 3 + 5$."}, {"front": "Key Concept: Result of same signs in multiplication/division?", "back": "Positive result."}, {"front": "Key Concept: Result of different signs in multiplication/division?", "back": "Negative result."}, {"front": "Key Concept: Result of any number times zero?", "back": "Zero."}, {"front": "Key Concept: Rule for division by zero?", "back": "It is undefined."}, {"front": "Key Concept: Effect of distributing a negative factor?", "back": "The sign of every term changes."}, {"front": "Key Concept: Method for combining like terms?", "back": "Add the coefficients of terms with the same variables and powers."}, {"front": "Is $\\frac{0}{0}$ equal to $1$?", "back": "No, it is an indeterminate form."}, {"front": "Is $\\frac{0}{0}$ equal to $0$?", "back": "No, it is an indeterminate form."}, {"front": "Identify the like terms in the expression $4x - 6x + 8$.", "back": "$4x$ and $-6x$."}, {"front": "What is the coefficient of the term $-3b$?", "back": "$-3$."}, {"front": "What is the next step in the sequence $5(-6) = -30$ to solve $5(-6)(2)$?", "back": "Multiply $-30$ by $2$."}, {"front": "True or False: The quotient of zero and a nonzero number is always zero.", "back": "True."}, {"front": "True or False: Like terms must have different variables.", "back": "False."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
