<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 3, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the geometric definition of the absolute value of a number?", "back": "The number's distance from zero on the number line."}, {"front": "For any real number a, what is the result of |a| if a ge 0?", "back": "a"}, {"front": "For any real number a, what is the result of |a| if a < 0?", "back": "-a"}, {"front": "According to the definition of distance, what is the minimum possible value for |a|?", "back": "0"}, {"front": "When solving the equation |x| = 5, what specific distance are you looking for from zero?", "back": "A distance of 5."}, {"front": "How many solutions exist for the equation |x| = 5?", "back": "Two solutions."}, {"front": "What are the two solutions for the equation |x| = 5?", "back": "x = 5 and x = -5"}, {"front": "In the property for solving |ax + b| = c, what must be true about c for the equation to have two solutions?", "back": "c > 0"}, {"front": "If c > 0, what two linear equations are equivalent to |ax + b| = c?", "back": "ax + b = c and ax + b = -c"}, {"front": "How many solutions are there for the equation |ax + b| = 0?", "back": "Exactly one solution."}, {"front": "If c = 0, what single linear equation is equivalent to |ax + b| = c?", "back": "ax + b = 0"}, {"front": "Under what condition for c does the equation |ax + b| = c have no solution?", "back": "c < 0"}, {"front": "Why does |ax + b| = c have no solution if c is a negative number?", "back": "An absolute value cannot be negative."}, {"front": "To solve |x - 3| = 7, what is the first case to evaluate after splitting the equation?", "back": "x - 3 = 7"}, {"front": "To solve |x - 3| = 7, what is the second case to evaluate after splitting the equation?", "back": "x - 3 = -7"}, {"front": "What are the two numerical solutions for |x - 3| = 7?", "back": "x = 10 and x = -4"}, {"front": "When solving |x - 3| = 7, how does checking x = -4 verify the solution?", "back": "|-4 - 3| = |-7| = 7"}, {"front": "What is the critical first step before splitting an absolute value equation into two cases?", "back": "Isolate the absolute value expression."}, {"front": "In the equation $2|3x + 1| - 5 = 9$, what is the first operation performed to isolate the absolute value?", "back": "Add 5 to both sides."}, {"front": "After adding 5 to both sides of $2|3x + 1| - 5 = 9$, what is the resulting intermediate equation?", "back": "$2|3x + 1| = 14$"}, {"front": "Given $2|3x + 1| = 14$, what operation is needed next to fully isolate the absolute value?", "back": "Divide both sides by 2."}, {"front": "What is the isolated form of the equation $2|3x + 1| - 5 = 9$?", "back": "|3x + 1| = 7"}, {"front": "When splitting |3x + 1| = 7, what are the two resulting linear equations?", "back": "3x + 1 = 7 and 3x + 1 = -7"}, {"front": "Solving 3x + 1 = 7 yields which value for x?", "back": "x = 2"}, {"front": "Solving 3x + 1 = -7 yields which value for x?", "back": "x = -8/3"}, {"front": "Why does the equation |2x + 5| = -3 have no solution?", "back": "An absolute value is always greater than or equal to zero."}, {"front": "What are the two solutions for the checkpoint equation |4x - 2| = 10?", "back": "x = 3 or x = -2"}, {"front": "To solve |4x - 2| = 10, what two linear equations must be solved?", "back": "4x - 2 = 10 and 4x - 2 = -10"}, {"front": "In the equation $3|x + 4| + 2 = 11, what is the first step to isolate|x + 4|$?", "back": "Subtract 2 from both sides."}, {"front": "In the equation $3|x + 4| = 9$, what is the final step to isolate the absolute value?", "back": "Divide by 3."}, {"front": "After isolating the absolute value in $3|x + 4| + 2 = 11$, what is the simplified equation?", "back": "|x + 4| = 3"}, {"front": "What is the result of solving |x + 4| = 3 for the positive case?", "back": "x = -1"}, {"front": "What is the result of solving |x + 4| = 3 for the negative case?", "back": "x = -7"}, {"front": "If |ax + b| = c and c < 0, the solution set is _____.", "back": "Empty (or No Solution)"}, {"front": "If |ax + b| = c and c > 0, the solution set contains _____ values.", "back": "Two"}, {"front": "Is it permissible to split an absolute value equation before it is isolated?", "back": "No."}, {"front": "Where in the curriculum are more complex absolute value equations (like those with absolute value on both sides) covered?", "back": "Algebra II, Section 1-4."}, {"front": "The notation for the absolute value of a is written as _____.", "back": "|a|"}, {"front": "Concept: Absolute Value", "back": "Definition: The distance of a number from zero on a number line. Example: |-7| = 7."}, {"front": "Equation: |x| = 0", "back": "Solution: x = 0"}, {"front": "Equation: |x| = -5", "back": "Solution: No solution"}, {"front": "In the process of solving $2|3x + 1| = 14, why do we divide by2$?", "back": "To isolate the absolute value expression."}, {"front": "Solve for x in the equation |x| = 10.", "back": "x = 10, -10"}, {"front": "Solve for x: |x + 1| = 0.", "back": "x = -1"}, {"front": "Solve for x: |x - 5| = -2.", "back": "No solution"}, {"front": "Is the statement |a| ge 0 true for all real numbers?", "back": "Yes, because distance is never negative."}, {"front": "True or False: |x-3| = 7 is equivalent to x - 3 = 7 or x + 3 = 7.", "back": "False."}, {"front": "What is the first step to solve $5|x| - 10 = 0$?", "back": "Add 10 to both sides."}, {"front": "After adding 10 to $5|x| - 10 = 0$, what is the next step?", "back": "Divide by 5."}, {"front": "What is the isolated version of $5|x| - 10 = 0$?", "back": "|x| = 2"}, {"front": "What are the solutions for $5|x| - 10 = 0$?", "back": "x = 2 and x = -2"}, {"front": "The absolute value of a is equivalent to -a if a is _____.", "back": "Negative (less than zero)"}, {"front": "The absolute value of a is equivalent to a if a is _____.", "back": "Greater than or equal to zero"}, {"front": "How many cases must you consider when solving a standard isolated absolute value equation equal to a positive number?", "back": "Two cases."}, {"front": "Solve |2x| = 8 for x.", "back": "x = 4 and x = -4"}, {"front": "If you are solving |x - k| = d, what does d represent geometrically?", "back": "The distance between x and k."}, {"front": "Identify the error: Splitting $2|x + 1| = 6into2x + 2 = 6and2x + 2 = -6without dividing by2$.", "back": "There is no error, but it is standard practice to isolate first to avoid mistakes."}, {"front": "What does 'isolating' an absolute value expression mean?", "back": "Manipulating the equation so the absolute value is alone on one side."}, {"front": "In the context of |ax + b| = c, what is the solution set if c=0?", "back": "\\ -b/a \\"}, {"front": "Why is it important to check solutions in the original absolute value equation?", "back": "To ensure no algebraic errors were made during the splitting or solving process."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
