<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In the exponential expression $a^n$, what is the term for the factor $a$?", "back": "Base", "id": "fc01"}, {"front": "In the exponential expression $a^n$, what is the term for the number $n$ that indicates how many times the base is repeated?", "back": "Exponent", "id": "fc02"}, {"front": "The expression $a^n$ represents the base $a$ used as a factor how many times?", "back": "$n$ times", "id": "fc03"}, {"front": "Property: Product of Powers", "back": "Definition: For a nonzero real number $a$, $a^m a^n = a^{m+n}$.", "id": "fc04"}, {"front": "To multiply powers with the same base, keep the base and _____ the exponents.", "back": "add", "id": "fc05"}, {"front": "According to the Product of Powers rule, what is the result of $a^m a^n$?", "back": "$a^{m+n}$", "id": "fc06"}, {"front": "Simplify the expression $x^3 x^5$.", "back": "$x^8$", "id": "fc07"}, {"front": "Simplify $2^4 2^3$ as a single power.", "back": "$2^7$", "id": "fc08"}, {"front": "What is the numerical value of $2^7$?", "back": "128", "id": "fc09"}, {"front": "When simplifying $3y^2 5y^6$, what is the resulting coefficient?", "back": "15", "id": "fc10"}, {"front": "Simplify the expression $3y^2 5y^6$.", "back": "15y^8", "id": "fc11"}, {"front": "The Product of Powers rule requires the _____ of the terms to be identical.", "back": "bases", "id": "fc12"}, {"front": "Property: Power of a Power", "back": "Definition: For a nonzero real number $a$, $(a^m)^n = a^{mn}$.", "id": "fc13"}, {"front": "To raise a power to a power, keep the base and _____ the exponents.", "back": "multiply", "id": "fc14"}, {"front": "According to the Power of a Power rule, what is the result of $(a^m)^n$?", "back": "$a^{mn}$", "id": "fc15"}, {"front": "Simplify the expression $(x^4)^3$.", "back": "$x^{12}$", "id": "fc16"}, {"front": "Simplify $(2^3)^2$ as a single power.", "back": "$2^6$", "id": "fc17"}, {"front": "What is the numerical value of $2^6$?", "back": "64", "id": "fc18"}, {"front": "Simplify the expression $((y^2)^3)^4$.", "back": "$y^{24}$", "id": "fc19"}, {"front": "Property: Power of a Product", "back": "Definition: For nonzero real numbers $a$ and $b$, $(ab)^n = a^n b^n$.", "id": "fc20"}, {"front": "To raise a product to a power, raise _____ to that power.", "back": "each factor", "id": "fc21"}, {"front": "According to the Power of a Product rule, $(ab)^n$ is equal to which expression?", "back": "$a^n b^n$", "id": "fc22"}, {"front": "Simplify the expression $(3x)^4$.", "back": "$81x^4$", "id": "fc23"}, {"front": "What is the numerical value of $3^4$?", "back": "81", "id": "fc24"}, {"front": "Simplify the expression $(2a^3)^5$.", "back": "$32a^{15}$", "id": "fc25"}, {"front": "What is the numerical value of $2^5$?", "back": "32", "id": "fc26"}, {"front": "Simplify the expression $(4x^2y)^3$.", "back": "$64x^6y^3$", "id": "fc27"}, {"front": "What is the numerical value of $4^3$?", "back": "64", "id": "fc28"}, {"front": "Simplify the expression $(-2x^3)^4$.", "back": "$16x^{12}$", "id": "fc29"}, {"front": "In the expression $(-2x^3)^4$, why is the resulting coefficient positive 16?", "back": "A negative number raised to an even power results in a positive value.", "id": "fc30"}, {"front": "Why can the expression $x^3 y^5$ not be simplified using the Product of Powers rule?", "back": "The bases $x$ and $y$ are different.", "id": "fc31"}, {"front": "Which exponent rule involves adding exponents: multiplying powers or raising a power to a power?", "back": "Multiplying powers", "id": "fc32"}, {"front": "Which exponent rule involves multiplying exponents: multiplying powers or raising a power to a power?", "back": "Raising a power to a power", "id": "fc33"}, {"front": "In the Product of Powers rule, what set of numbers must $m$ and $n$ belong to?", "back": "Positive integers", "id": "fc34"}, {"front": "In the Power of a Product rule, the base variables $a$ and $b$ must be _____ real numbers.", "back": "nonzero", "id": "fc35"}, {"front": "The expression $(a^m)^n$ is simplified as $a^m$ used as a factor how many times?", "back": "$n$ times", "id": "fc36"}, {"front": "What is the result of raising $(-2)^4$?", "back": "16", "id": "fc37"}, {"front": "True or False: The Product of Powers rule applies to expressions with different bases, such as $2^3 3^3$.", "back": "False", "id": "fc38"}, {"front": "Simplify $x^a x^b$.", "back": "$x^{a+b}$", "id": "fc39"}, {"front": "Simplify $(y^a)^b$.", "back": "$y^{ab}$", "id": "fc40"}, {"front": "In the simplification of $(4x^2y)^3$, what is the intermediate power for the variable $x$?", "back": "$(x^2)^3$", "id": "fc41"}, {"front": "In the expression $3y^2 5y^6$, what is the first step in simplifying the numerical part?", "back": "Multiply the coefficients 3 and 5.", "id": "fc42"}, {"front": "Why does $a^m a^n = a^{m+n}$? (Answer in terms of factors)", "back": "Because it combines $m$ factors of $a$ with $n$ factors of $a$ to get $m+n$ factors.", "id": "fc43"}, {"front": "What happens to the exponents when you simplify $(x^3)^5$?", "back": "They are multiplied (result is $x^{15}$).", "id": "fc44"}, {"front": "What happens to the exponents when you simplify $x^3 x^5$?", "back": "They are added (result is $x^8$).", "id": "fc45"}, {"front": "In what specific section of Algebra II are these properties extended to rational exponents?", "back": "Section 1-5", "id": "fc46"}, {"front": "The Power of a Product rule states that $(ab)^n = a^n b^n$. How is the exponent $n$ distributed?", "back": "It is applied to each factor in the product.", "id": "fc47"}, {"front": "Simplify $(x^2 y^3 z)^2$.", "back": "$x^4 y^6 z^2$", "id": "fc48"}, {"front": "If $a$ is a nonzero real number, what is the result of $a^1 a^1$?", "back": "$a^2$", "id": "fc49"}, {"front": "The rule for $a^m a^n = a^{m+n}$ is derived directly from the definition of exponents as _____.", "back": "repeated multiplication", "id": "fc50"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
