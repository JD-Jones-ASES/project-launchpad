<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In the exponential expression aⁿ, what is the term for the factor a?", "back": "Base"}, {"front": "In the exponential expression aⁿ, what is the term for the number n that indicates how many times the base is repeated?", "back": "Exponent"}, {"front": "The expression aⁿ represents the base a used as a factor how many times?", "back": "n times"}, {"front": "Property: Product of Powers", "back": "Definition: For a nonzero real number a, a^m aⁿ = am⁺ⁿ."}, {"front": "To multiply powers with the same base, keep the base and _____ the exponents.", "back": "add"}, {"front": "According to the Product of Powers rule, what is the result of a^m aⁿ?", "back": "am⁺ⁿ"}, {"front": "Simplify the expression x³ x⁵.", "back": "x⁸"}, {"front": "Simplify 2⁴ 2³ as a single power.", "back": "2⁷"}, {"front": "What is the numerical value of 2⁷?", "back": "128"}, {"front": "When simplifying 3y² 5y⁶, what is the resulting coefficient?", "back": "15"}, {"front": "Simplify the expression 3y² 5y⁶.", "back": "15y^8"}, {"front": "The Product of Powers rule requires the _____ of the terms to be identical.", "back": "bases"}, {"front": "Property: Power of a Power", "back": "Definition: For a nonzero real number a, (a^m)ⁿ = amⁿ."}, {"front": "To raise a power to a power, keep the base and _____ the exponents.", "back": "multiply"}, {"front": "According to the Power of a Power rule, what is the result of (a^m)ⁿ?", "back": "amⁿ"}, {"front": "Simplify the expression (x⁴)³.", "back": "x¹²"}, {"front": "Simplify (2³)² as a single power.", "back": "2⁶"}, {"front": "What is the numerical value of 2⁶?", "back": "64"}, {"front": "Simplify the expression ((y²)³)⁴.", "back": "y²⁴"}, {"front": "Property: Power of a Product", "back": "Definition: For nonzero real numbers a and b, (ab)ⁿ = aⁿ bⁿ."}, {"front": "To raise a product to a power, raise _____ to that power.", "back": "each factor"}, {"front": "According to the Power of a Product rule, (ab)ⁿ is equal to which expression?", "back": "aⁿ bⁿ"}, {"front": "Simplify the expression (3x)⁴.", "back": "81x⁴"}, {"front": "What is the numerical value of 3⁴?", "back": "81"}, {"front": "Simplify the expression (2a³)⁵.", "back": "32a¹⁵"}, {"front": "What is the numerical value of 2⁵?", "back": "32"}, {"front": "Simplify the expression (4x²y)³.", "back": "64x⁶y³"}, {"front": "What is the numerical value of 4³?", "back": "64"}, {"front": "Simplify the expression (-2x³)⁴.", "back": "16x¹²"}, {"front": "In the expression (-2x³)⁴, why is the resulting coefficient positive 16?", "back": "A negative number raised to an even power results in a positive value."}, {"front": "Why can the expression x³ y⁵ not be simplified using the Product of Powers rule?", "back": "The bases x and y are different."}, {"front": "Which exponent rule involves adding exponents: multiplying powers or raising a power to a power?", "back": "Multiplying powers"}, {"front": "Which exponent rule involves multiplying exponents: multiplying powers or raising a power to a power?", "back": "Raising a power to a power"}, {"front": "In the Product of Powers rule, what set of numbers must m and n belong to?", "back": "Positive integers"}, {"front": "In the Power of a Product rule, the base variables a and b must be _____ real numbers.", "back": "nonzero"}, {"front": "The expression (a^m)ⁿ is simplified as a^m used as a factor how many times?", "back": "n times"}, {"front": "What is the result of raising (-2)⁴?", "back": "16"}, {"front": "True or False: The Product of Powers rule applies to expressions with different bases, such as 2³ 3³.", "back": "False"}, {"front": "Simplify x^a x^b.", "back": "xa⁺b"}, {"front": "Simplify (y^a)^b.", "back": "yab"}, {"front": "In the simplification of (4x²y)³, what is the intermediate power for the variable x?", "back": "(x²)³"}, {"front": "In the expression 3y² 5y⁶, what is the first step in simplifying the numerical part?", "back": "Multiply the coefficients 3 and 5."}, {"front": "Why does a^m aⁿ = am⁺ⁿ? (Answer in terms of factors)", "back": "Because it combines m factors of a with n factors of a to get m+n factors."}, {"front": "What happens to the exponents when you simplify (x³)⁵?", "back": "They are multiplied (result is x¹⁵)."}, {"front": "What happens to the exponents when you simplify x³ x⁵?", "back": "They are added (result is x⁸)."}, {"front": "In what specific section of Algebra II are these properties extended to rational exponents?", "back": "Section 1-5"}, {"front": "The Power of a Product rule states that (ab)ⁿ = aⁿ bⁿ. How is the exponent n distributed?", "back": "It is applied to each factor in the product."}, {"front": "Simplify (x² y³ z)².", "back": "x⁴ y⁶ z²"}, {"front": "If a is a nonzero real number, what is the result of a¹ a¹?", "back": "a²"}, {"front": "The rule for a^m aⁿ = am⁺ⁿ is derived directly from the definition of exponents as _____.", "back": "repeated multiplication"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
