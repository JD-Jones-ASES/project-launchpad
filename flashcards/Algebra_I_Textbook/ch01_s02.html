<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the alternative name for the set of natural numbers?", "back": "Counting numbers"}, {"front": "The set of numbers \\1, 2, 3, 4, 5, dots\\ is known as the _____ numbers.", "back": "Natural"}, {"front": "How do the whole numbers differ from the natural numbers?", "back": "The whole numbers include zero, whereas natural numbers do not."}, {"front": "The set containing the natural numbers and zero is called the _____ numbers.", "back": "Whole"}, {"front": "Which set of numbers includes all whole numbers and their opposites?", "back": "Integers"}, {"front": "List three examples of integers that are not whole numbers.", "back": "-1, -2, -3 (or any negative whole numbers)"}, {"front": "Term: Rational Number", "back": "Definition: Any number that can be written as a fraction a/b where a and b are integers and b ne 0."}, {"front": "In decimal form, what are the two possible behaviors of a rational number?", "back": "It either terminates or repeats."}, {"front": "Is the decimal 0.75 a rational or irrational number?", "back": "Rational (it terminates)."}, {"front": "Is the decimal 0.333dots a rational or irrational number?", "back": "Rational (it repeats)."}, {"front": "What is the primary characteristic of an irrational number's decimal form?", "back": "It neither terminates nor repeats."}, {"front": "Provide two common examples of irrational numbers.", "back": "√2 and π"}, {"front": "Which set consists of the union of all rational and irrational numbers?", "back": "Real numbers"}, {"front": "Every point on the _____ corresponds to exactly one real number.", "back": "Number line"}, {"front": "True or False: Every integer is also a rational number.", "back": "True"}, {"front": "True or False: Every rational number is an integer.", "back": "False"}, {"front": "The number sets are _____, meaning natural numbers are inside whole numbers, which are inside integers, and so on.", "back": "Nested"}, {"front": "What relationship exists between natural numbers and integers?", "back": "Every natural number is an integer."}, {"front": "What set of numbers fills the remaining points on the number line that are not occupied by rational numbers?", "back": "Irrational numbers"}, {"front": "The _____ of a number a is -a, located the same distance from zero on the opposite side of the number line.", "back": "Opposite"}, {"front": "What is the opposite of 3?", "back": "-3"}, {"front": "What is the opposite of -5?", "back": "5"}, {"front": "The distance from a real number a to 0 on the number line is called its _____.", "back": "Absolute value"}, {"front": "What is the standard notation for the absolute value of a?", "back": "|a|"}, {"front": "What is a key property of distance/absolute value regarding its sign?", "back": "It is always non-negative."}, {"front": "Evaluate |-8|.", "back": "8"}, {"front": "Evaluate |5|.", "back": "5"}, {"front": "Evaluate |0|.", "back": "0"}, {"front": "Evaluate |-12|.", "back": "12"}, {"front": "Evaluate |-7|.", "back": "7"}, {"front": "According to the formal definition, if a < 0, then |a| = _____.", "back": "-a"}, {"front": "According to the formal definition, if a ge 0, then |a| = _____.", "back": "a"}, {"front": "When comparing two real numbers on a number line, which number is always greater?", "back": "The number farther to the right."}, {"front": "What is a recommended strategy for comparing numbers in different formats (like fractions and decimals)?", "back": "Convert them all to decimals."}, {"front": "Order the following from least to greatest: -2, ¾, -5/2, 1.5, 0.", "back": "-5/2, -2, 0, ¾, 1.5"}, {"front": "What decimal value is equivalent to -5/2?", "back": "-2.5"}, {"front": "What decimal value is equivalent to ¾?", "back": "0.75"}, {"front": "In Algebra II, what set is introduced to handle the square roots of negative numbers?", "back": "Complex numbers"}, {"front": "Which set contains numbers like π and √3 that cannot be written as ratios of integers?", "back": "Irrational numbers"}, {"front": "Is the number 0 a natural number?", "back": "No"}, {"front": "Is the number 0 an integer?", "back": "Yes"}, {"front": "Identify all sets to which -3 belongs.", "back": "Integers, Rational numbers, Real numbers"}, {"front": "To which number sets does the number 7 belong?", "back": "Natural, Whole, Integer, Rational, and Real numbers"}, {"front": "Why is a/b not a rational number if b = 0?", "back": "Division by zero is undefined."}, {"front": "If a number is an integer, it is also automatically a _____ number and a _____ number.", "back": "Rational; Real"}, {"front": "If a decimal does not terminate and does not repeat, what kind of number is it?", "back": "Irrational"}, {"front": "Concept: The Number Line", "back": "Definition: A visual model where each point corresponds to exactly one real number and vice versa."}, {"front": "What is the absolute value of a positive number?", "back": "The number itself."}, {"front": "What is the absolute value of a negative number?", "back": "Its opposite (the positive version of the number)."}, {"front": "True or False: Every real number is either rational or irrational.", "back": "True"}, {"front": "The set of whole numbers includes all natural numbers plus _____.", "back": "Zero"}, {"front": "Which is greater: -2 or -2.5?", "back": "-2"}, {"front": "How does the distance from 0 to 5 compare to the distance from 0 to -5?", "back": "They are the same distance (5 units)."}, {"front": "Which set is the 'largest' family described in the text that contains all others?", "back": "Real numbers"}, {"front": "True or False: An irrational number can be written as a fraction a/b using integers.", "back": "False"}, {"front": "Is √25 (which equals 5) a rational or irrational number?", "back": "Rational"}, {"front": "Is 0 a rational number?", "back": "Yes (it can be written as 0/1)."}, {"front": "The symbol |a| represents the distance of a from zero, which is always _____.", "back": "Non-negative"}, {"front": "What is the approximate decimal value of π given in the text?", "back": "3.14159"}, {"front": "What is the approximate decimal value of √2 given in the text?", "back": "1.41421"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
