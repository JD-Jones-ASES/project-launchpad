<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary goal when solving an equation with variable terms on both sides?", "back": "To collect all variable terms on one side and all constant terms on the other."}, {"front": "To solve $5x - 3 = 2x + 12$, what is the first step to isolate the variable terms on the left side?", "back": "Subtract $2x$ from both sides."}, {"front": "What resulting equation is obtained after subtracting $2x$ from both sides of $5x - 3 = 2x + 12$?", "back": "$3x - 3 = 12$"}, {"front": "In the equation $3x - 3 = 12$, what operation is used to move the constant $-3$ to the right side?", "back": "Add 3 to both sides."}, {"front": "After adding 3 to both sides of $3x - 3 = 12$, what is the resulting equation?", "back": "$3x = 15$"}, {"front": "What is the final solution for the variable $x$ in the equation $3x = 15$?", "back": "$x = 5$"}, {"front": "When checking the solution $x = 5$ in $5x - 3 = 2x + 12$, what is the value of the left side?", "back": "22"}, {"front": "When checking the solution $x = 5$ in $5x - 3 = 2x + 12$, what is the value of the right side?", "back": "22"}, {"front": "Solve the checkpoint equation: $7n + 4 = 3n + 20$.", "back": "$n = 4$"}, {"front": "In solving $7n + 4 = 3n + 20$, what is the result of $7n - 3n$?", "back": "$4n$"}, {"front": "If the equation $7n + 4 = 3n + 20$ simplifies to $4n = 16$, what is the value of $n$?", "back": "4"}, {"front": "How many solutions do most linear equations have?", "back": "Exactly one solution."}, {"front": "What is an identity in algebra?", "back": "An equation that is true for every value of the variable."}, {"front": "What type of statement is obtained when solving an identity?", "back": "A statement that is always true, such as $0 = 0$ or $5 = 5$."}, {"front": "What is a contradiction in algebra?", "back": "An equation that is true for no value of the variable."}, {"front": "What type of statement is obtained when solving a contradiction?", "back": "A statement that is always false, such as $0 = 7$ or $3 = -1$."}, {"front": "What is a conditional equation?", "back": "An equation that is true for only certain values of the variable."}, {"front": "Solve the equation: $2(x + 3) = 2x + 6$.", "back": "Every real number is a solution."}, {"front": "What is the first step in solving $2(x + 3) = 2x + 6$?", "back": "Distribute the 2 across the parentheses."}, {"front": "Distributing the 2 in $2(x + 3) = 2x + 6$ results in which equivalent equation?", "back": "$2x + 6 = 2x + 6$"}, {"front": "If you subtract $2x$ from both sides of $2x + 6 = 2x + 6$, what is the final statement?", "back": "$6 = 6$"}, {"front": "How is the equation $2(x + 3) = 2x + 6$ classified?", "back": "An identity."}, {"front": "What is the solution to an identity?", "back": "All real numbers."}, {"front": "Solve the equation: $3x + 5 = 3x - 2$.", "back": "No solution."}, {"front": "What statement is obtained after subtracting $3x$ from both sides of $3x + 5 = 3x - 2$?", "back": "$5 = -2$"}, {"front": "Is the statement $5 = -2$ ever true?", "back": "No, it is never true."}, {"front": "How is the equation $3x + 5 = 3x - 2$ classified?", "back": "A contradiction."}, {"front": "If solving an equation leads to a single value like $x = 3$, what is the equation's classification?", "back": "Conditional."}, {"front": "If solving an equation leads to a true statement like $0 = 0$, what is the equation's classification?", "back": "Identity."}, {"front": "If solving an equation leads to a false statement like $0 = 5$, what is the equation's classification?", "back": "Contradiction."}, {"front": "How many solutions are there for a conditional equation?", "back": "Exactly one solution."}, {"front": "How many solutions are there for an identity?", "back": "Every real number is a solution."}, {"front": "How many solutions are there for a contradiction?", "back": "There is no solution."}, {"front": "Term: Identity", "back": "Definition: An equation true for every value of the variable."}, {"front": "Term: Contradiction", "back": "Definition: An equation true for no value of the variable."}, {"front": "Term: Conditional Equation", "back": "Definition: An equation true for only certain values of the variable."}, {"front": "Which equation type results in the set of all real numbers as a solution?", "back": "An identity."}, {"front": "Which equation type results in zero solutions?", "back": "A contradiction."}, {"front": "In Chapter 5, a system with infinitely many solutions corresponds to what type of equation?", "back": "An identity."}, {"front": "In Chapter 5, a system with no solution corresponds to what type of equation?", "back": "A contradiction."}, {"front": "The statement $x = 5$ for $5x - 3 = 2x + 12$ makes it a(n) _____ equation.", "back": "conditional"}, {"front": "An equation that produces the statement $0 = 0$ is a(n) _____.", "back": "identity"}, {"front": "An equation that produces the statement $0 = 7$ is a(n) _____.", "back": "contradiction"}, {"front": "What is the final step in solving $3x = 15$?", "back": "Divide both sides by 3."}, {"front": "What is the final step in solving $4n = 16$?", "back": "Divide both sides by 4."}, {"front": "True or False: A conditional equation has no solutions.", "back": "False."}, {"front": "True or False: Every real number is a solution to an identity.", "back": "True."}, {"front": "True or False: A contradiction results in a false statement like $3 = -1$.", "back": "True."}, {"front": "When variable terms are found on both sides, the first objective is to _____ them on one side.", "back": "collect"}, {"front": "In the solve-and-check process, where do you substitute the final variable value to verify it?", "back": "Into the original equation."}, {"front": "What is the distributive result of $2(x+3)$?", "back": "$2x + 6$"}, {"front": "If the variables cancel out and leave $5 = 5$, what is the solution set?", "back": "All real numbers."}, {"front": "If the variables cancel out and leave $5 = -2$, what is the solution set?", "back": "No solution."}, {"front": "Classification: $0 = 0$", "back": "Identity."}, {"front": "Classification: $0 = 5$", "back": "Contradiction."}, {"front": "Classification: $x = 3$", "back": "Conditional."}, {"front": "What is the next step to solve $5x - 2x - 3 = 12$ after simplifying $5x - 2x$?", "back": "$3x - 3 = 12$"}, {"front": "In the equation $3x - 3 = 12$, what must be done to the $-3$ to isolate $3x$?", "back": "Add 3 to both sides."}, {"front": "If an equation has variable terms on both sides, constant terms should be collected on the _____ side.", "back": "opposite"}, {"front": "An equation that is true for only specific values is called _____.", "back": "conditional"}, {"front": "Identify the type: $3x + 5 = 3x - 2$.", "back": "Contradiction."}, {"front": "Identify the type: $2(x + 3) = 2x + 6$.", "back": "Identity."}, {"front": "Identify the type: $5x - 3 = 2x + 12$.", "back": "Conditional."}, {"front": "If you obtain $x = 5$, the equation has exactly _____ solution.", "back": "one"}, {"front": "The phrase \"all real numbers\" describes the solution set for which equation type?", "back": "Identity."}, {"front": "The phrase \"no solution\" describes the solution set for which equation type?", "back": "Contradiction."}, {"front": "What operation is used to move $3n$ in the equation $7n + 4 = 3n + 20$?", "back": "Subtraction."}, {"front": "What operation is used to move $4$ in the equation $7n + 4 = 3n + 20$?", "back": "Subtraction."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
