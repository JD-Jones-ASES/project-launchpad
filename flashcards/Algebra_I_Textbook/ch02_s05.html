<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 2, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the definition of a ratio?", "back": "A comparison of two quantities by division."}, {"front": "In the ratio of $a$ to $b$, what is the mathematical constraint on the value of $b$?", "back": "$b \\neq 0$"}, {"front": "The ratio of $a$ to $b$ can be written using a colon as _____.", "back": "$a : b$"}, {"front": "The ratio of $a$ to $b$ can be written as a fraction in the form _____.", "back": "$\\frac{a}{b}$"}, {"front": "Besides using a colon or a fraction, what is the third way to write the ratio of $a$ to $b$?", "back": "$a$ to $b$"}, {"front": "What is a proportion?", "back": "An equation stating that two ratios are equal."}, {"front": "In the proportion $\\frac{a}{b} = \\frac{c}{d}$, which values are prohibited from being zero?", "back": "$b$ and $d$"}, {"front": "What is considered the most efficient way to solve a proportion?", "back": "Cross-multiplication."}, {"front": "State the Cross-Multiplication Property for the proportion $\\frac{a}{b} = \\frac{c}{d}$.", "back": "$ad = bc$"}, {"front": "Solve the proportion $\\frac{x}{6} = \\frac{5}{9}$ by showing the first step of cross-multiplication.", "back": "$9x = 30$"}, {"front": "What is the simplified solution for $x$ in the proportion $\\frac{x}{6} = \\frac{5}{9}$?", "back": "$x = \\frac{10}{3}$"}, {"front": "Solve the proportion $\\frac{3}{n} = \\frac{12}{20}$ by showing the first step of cross-multiplication.", "back": "$60 = 12n$"}, {"front": "What is the value of $n$ in the proportion $\\frac{3}{n} = \\frac{12}{20}$?", "back": "$n = 5$"}, {"front": "How is the solution $n = 5$ checked for the proportion $\\frac{3}{n} = \\frac{12}{20}$?", "back": "By verifying that $\\frac{3}{5} = \\frac{12}{20}$."}, {"front": "Solve the proportion $\\frac{4}{7} = \\frac{x}{21}$ for $x$.", "back": "$x = 12$"}, {"front": "In the proportion $\\frac{4}{7} = \\frac{x}{21}$, what equation results from cross-multiplying?", "back": "$84 = 7x$"}, {"front": "What defines similar figures?", "back": "Figures that have the same shape but not necessarily the same size."}, {"front": "What property do the corresponding sides of similar figures possess?", "back": "They are proportional."}, {"front": "Two similar triangles have sides in the ratio $3:5$. If the smaller triangle's shortest side is $9$, what proportion is used to find the larger side $x$?", "back": "$\\frac{3}{5} = \\frac{9}{x}$"}, {"front": "In a $3:5$ ratio of similar triangles, if the shortest side of the smaller triangle is $9$ cm, what is the length of the corresponding side of the larger triangle?", "back": "$15$ cm"}, {"front": "What are two common practical applications of proportions mentioned in the text?", "back": "Scale drawings and maps."}, {"front": "If a map scale is $1\\text{ in.} : 50\\text{ mi}$, what is the corresponding proportion for a map distance $d_{map}$ and actual distance $d_{actual}$?", "back": "$\\frac{1}{50} = \\frac{d_{map}}{d_{actual}}$"}, {"front": "A ratio is a comparison of two quantities by _____.", "back": "Division"}, {"front": "An equation stating that two ratios are equal is called a _____.", "back": "Proportion"}, {"front": "In similar figures, while sizes may differ, the _____ must be the same.", "back": "Shape"}, {"front": "To solve $\\frac{a}{b} = \\frac{c}{d}$, we use the _____ Property.", "back": "Cross-Multiplication"}, {"front": "Why is cross-multiplication used when solving proportions?", "back": "It is the most efficient way to solve the equation."}, {"front": "When checking a proportion solution, you must ensure the two ratios are _____.", "back": "Equal"}, {"front": "What does a map scale of $1:50$ represent in a proportion?", "back": "The ratio of map distance to actual distance."}, {"front": "How do you verify the solution for $x$ in a proportion like $\\frac{x}{6} = \\frac{5}{9}$?", "back": "Substitute the value back into the original proportion and simplify both sides."}, {"front": "If $3x = 45$, what is the next step to find $x$?", "back": "Divide both sides by $3$."}, {"front": "In the context of scaling a recipe, what mathematical concept is being applied?", "back": "Ratios or proportions."}, {"front": "If the ratio of sides is $3:5$, which number represents the smaller figure?", "back": "$3$"}, {"front": "Under what condition are two figures considered similar?", "back": "When they have the same shape and their corresponding sides are proportional."}, {"front": "In the proportion $\\frac{1}{50} = \\frac{d_{map}}{d_{actual}}$, what does $d_{actual}$ represent?", "back": "The actual distance in the real world."}, {"front": "Solve for $x$: $7x = 84$.", "back": "$x = 12$"}, {"front": "Is the statement $\\frac{a}{b}$ a ratio or a proportion?", "back": "A ratio."}, {"front": "Is the statement $\\frac{a}{b} = \\frac{c}{d}$ a ratio or a proportion?", "back": "A proportion."}, {"front": "What happens to the denominator in a ratio if it is zero?", "back": "The ratio becomes undefined."}, {"front": "In the example $\\frac{3}{n} = \\frac{12}{20}$, where is the variable located?", "back": "In the denominator."}, {"front": "Solve the proportion $\\frac{3}{5} = \\frac{9}{x}$ for $3x$.", "back": "$3x = 45$"}, {"front": "If a map uses the scale $1:50$, and the map distance is $2$ units, what is the actual distance?", "back": "$100$ units"}, {"front": "When cross-multiplying $\\frac{a}{b} = \\frac{c}{d}$, which terms are multiplied together first in the product $ad$?", "back": "The numerator of the first ratio and the denominator of the second ratio."}, {"front": "How is the ratio $10:18$ related to the ratio $5:9$?", "back": "They are equal (or proportional)."}, {"front": "If two figures have the same size and same shape, are they still considered similar?", "back": "Yes (similar figures do not necessarily have different sizes)."}, {"front": "What is the result of $30 \\div 9$ simplified to a fraction?", "back": "$\\frac{10}{3}$"}, {"front": "In the proportion $\\frac{x}{6} = \\frac{5}{9}$, which term is the unknown?", "back": "$x$"}, {"front": "What type of mathematical comparison is performed when analyzing a rate?", "back": "Division (Ratio)."}, {"front": "If $b = 0$ in the expression $a/b$, is it still a valid ratio?", "back": "No, the denominator must not be zero."}, {"front": "The product of the means equals the product of the extremes is another way to describe the _____ property.", "back": "Cross-Multiplication"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
