<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 4, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the definition of parallel lines in the same plane?", "back": "Lines in the same plane that never intersect."}, {"front": "What is the definition of perpendicular lines?", "back": "Lines that intersect at right angles."}, {"front": "According to the Property of Slopes of Parallel Lines, what must be true about the slopes of two non-vertical parallel lines?", "back": "They must have the same slope (m₁ = m₂)."}, {"front": "Under what condition are two non-vertical lines perpendicular?", "back": "Their slopes must be negative reciprocals of each other (m₁ m₂ = -1)."}, {"front": "How do the slopes of two vertical lines relate to each other?", "back": "Two vertical lines are parallel to each other."}, {"front": "What is the geometric relationship between a horizontal line and a vertical line?", "back": "They are perpendicular to each other."}, {"front": "How can you identify if two lines are parallel, perpendicular, or neither just by looking at their equations?", "back": "By comparing their slopes (m)."}, {"front": "If line 1 has y = 2x + 5 and line 2 has y = 2x - 3, how are these lines classified?", "back": "They are parallel because both have a slope of 2."}, {"front": "Given line 1 with m₁ = 3 and line 2 with m₂ = -⅓, what is the product of their slopes?", "back": "The product is -1."}, {"front": "In the equations y = 3x + 1 and y = -⅓x + 4, why are the lines perpendicular?", "back": "Because their slopes are negative reciprocals (3 · -⅓ = -1)."}, {"front": "If two lines have slopes of m₁ = 2 and m₂ = -2, why are they classified as 'neither' parallel nor perpendicular?", "back": "The slopes are not equal and their product is not -1."}, {"front": "What slope would a line parallel to y = -3x + 2 have?", "back": "-3."}, {"front": "To find the equation of a line parallel to y = -3x + 2 through (4, 1), what is the first step using point-slope form?", "back": "Substitute m = -3 and the point (4, 1) into y - y₁ = m(x - x₁)."}, {"front": "What is the slope-intercept form of the line parallel to y = -3x + 2 passing through (4, 1)?", "back": "y = -3x + 13."}, {"front": "What is the negative reciprocal of the slope m = ⅖?", "back": "-5/2."}, {"front": "What slope should be used to write the equation of a line perpendicular to y = ⅖x - 1?", "back": "-5/2."}, {"front": "What is the point-slope form of the line perpendicular to y = ⅖x - 1 passing through (2, -3)?", "back": "y - (-3) = -5/2(x - 2)."}, {"front": "What is the slope-intercept form of the line perpendicular to y = ⅖x - 1 passing through (2, -3)?", "back": "y = -5/2x + 2."}, {"front": "If a line is parallel to y = ½x + 3, what is its slope?", "back": "½."}, {"front": "What is the equation of the line parallel to y = ½x + 3 that passes through (-4, 5)?", "back": "y = ½x + 7."}, {"front": "Two lines in the same plane that do not intersect are called _____.", "back": "Parallel"}, {"front": "The property for perpendicular lines states that m₂ is equal to _____.", "back": "-1/m₁"}, {"front": "In point-slope form, the equation y - 1 = -3(x - 4) simplifies to y - 1 = -3x + 12. What is the final step to reach slope-intercept form?", "back": "Add 1 to both sides of the equation."}, {"front": "In the equation y + 3 = -5/2(x - 2), what is the result of distributing -5/2?", "back": "y + 3 = -5/2x + 5."}, {"front": "True or False: A horizontal line is parallel to another horizontal line.", "back": "True."}, {"front": "True or False: All lines in the same plane intersect at exactly one point.", "back": "False, because parallel lines never intersect."}, {"front": "What is the negative reciprocal of -3?", "back": "⅓."}, {"front": "If line A is perpendicular to line B, and line A has an undefined slope, what is the slope of line B?", "back": "0 (it is a horizontal line)."}, {"front": "What is the product of the slopes of two perpendicular lines if neither is vertical?", "back": "-1."}, {"front": "If m₁ = m₂, the lines are _____.", "back": "Parallel"}, {"front": "What specific form is used to write the initial equation of a parallel line given a point (x₁, y₁)?", "back": "Point-slope form."}, {"front": "If m₁ = a/b, what is the slope of the perpendicular line m₂?", "back": "-b/a."}, {"front": "Concept: Negative Reciprocals", "back": "Definition: Two numbers whose product is -1. Example: ⅔ and -3/2."}, {"front": "Two lines are _____ if they intersect at a 90cⁱrc angle.", "back": "Perpendicular"}, {"front": "In which math course will slope relationships be used to analyze families of lines and prove geometric properties?", "back": "Algebra II."}, {"front": "What is the slope of the line y = 12x + 7?", "back": "12."}, {"front": "Why are two vertical lines considered parallel?", "back": "Because they are in the same plane and never intersect."}, {"front": "If the slope of a line is 0, what is the slope of a perpendicular line?", "back": "Undefined (it is a vertical line)."}, {"front": "If y - 5 = ½(x + 4), find the slope-intercept form.", "back": "y = ½x + 7."}, {"front": "What is the slope of the line y = -2x + 7?", "back": "-2."}, {"front": "If m₁ = 3 and m₂ = -⅓, are the lines parallel, perpendicular, or neither?", "back": "Perpendicular."}, {"front": "If m₁ = 2 and m₂ = 2, are the lines parallel, perpendicular, or neither?", "back": "Parallel."}, {"front": "If m₁ = 2 and m₂ = -2, are the lines parallel, perpendicular, or neither?", "back": "Neither."}, {"front": "How many points of intersection do two parallel lines have?", "back": "None."}, {"front": "The phrase 'negative reciprocal' describes the slopes of _____ lines.", "back": "Perpendicular"}, {"front": "Is the line y = 3x + 1 parallel to y = 3x - 5?", "back": "Yes, because their slopes are equal (m=3)."}, {"front": "What is the slope of any line perpendicular to y = x?", "back": "-1."}, {"front": "Formula: y - y₁ = m(x - x₁) is known as the _____ form.", "back": "Point-slope"}, {"front": "Formula: y = mx + b is known as the _____ form.", "back": "Slope-intercept"}, {"front": "In the context of slopes, what does the 'if and only if' mean for parallel lines?", "back": "It means the lines are parallel if they have the same slope, and if they have the same slope, they are parallel."}, {"front": "Can two lines be both parallel and perpendicular at the same time?", "back": "No, they must either never intersect or intersect at 90cⁱrc."}, {"front": "What is the slope of a line parallel to the x-axis?", "back": "0."}, {"front": "What is the slope of a line parallel to the y-axis?", "back": "Undefined."}, {"front": "If a line has a slope of 1, what is the slope of a parallel line?", "back": "1."}, {"front": "If a line has a slope of 1, what is the slope of a perpendicular line?", "back": "-1."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
