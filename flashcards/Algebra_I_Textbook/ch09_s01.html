<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 9, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the mathematical term for an expression written in the form $\\frac{P}{Q}$, where $P$ and $Q$ are polynomials?", "back": "Rational Expression"}, {"front": "In a rational expression $\\frac{P}{Q}$, what specific condition must be met by polynomial $Q$?", "back": "$Q \\ne 0$"}, {"front": "Why must any value of a variable that makes the denominator of a rational expression equal to zero be excluded?", "back": "Because division by zero is undefined."}, {"front": "Term: Excluded Values", "back": "Definition: The specific values of a variable that make the denominator of a rational expression equal to zero."}, {"front": "What is the first step in finding the excluded values of a rational expression?", "back": "Set the denominator equal to zero."}, {"front": "After setting the denominator to zero, what action is typically performed to find excluded values?", "back": "Solve the resulting equation for the variable."}, {"front": "To find the excluded values of $\\frac{x+3}{x^2-x-6}$, which part of the expression is set to zero?", "back": "The denominator ($x^2 - x - 6$)."}, {"front": "What are the factors of the quadratic expression $x^2 - x - 6$?", "back": "$(x-3)(x+2)$"}, {"front": "What are the excluded values for the expression $\\frac{x+3}{x^2-x-6}$?", "back": "$x = 3$ and $x = -2$"}, {"front": "What are the two primary actions required to simplify a rational expression?", "back": "Factor the numerator and denominator completely, then divide out common factors."}, {"front": "Property: If $P$, $Q$, and $R$ are polynomials ($Q, R \\ne 0$), then $\\frac{PR}{QR} = $ _____.", "back": "$\\frac{P}{Q}$"}, {"front": "In the property $\\frac{PR}{QR} = \\frac{P}{Q}$, what does the polynomial $R$ represent?", "back": "A common factor shared by the numerator and the denominator."}, {"front": "What is the very first step in the formal procedure to simplify a rational expression?", "back": "Factor the numerator and denominator completely."}, {"front": "What is the final step in the formal procedure for simplifying a rational expression?", "back": "State the excluded values."}, {"front": "How is the numerator $x^2 - 9$ factored in the expression $\\frac{x^2 - 9}{x^2 + 6x + 9}$?", "back": "$(x+3)(x-3)$"}, {"front": "How is the denominator $x^2 + 6x + 9$ factored in the expression $\\frac{x^2 - 9}{x^2 + 6x + 9}$?", "back": "$(x+3)(x+3)$"}, {"front": "What common factor is divided out when simplifying $\\frac{(x+3)(x-3)}{(x+3)(x+3)}$?", "back": "$(x+3)$"}, {"front": "What is the simplified form of $\\frac{x^2 - 9}{x^2 + 6x + 9}$?", "back": "$\\frac{x-3}{x+3}$"}, {"front": "What is the excluded value for the simplified expression $\\frac{x-3}{x+3}$ as derived from $\\frac{x^2 - 9}{x^2 + 6x + 9}$?", "back": "$x \\ne -3$"}, {"front": "What is the greatest common factor (GCF) of the numerator $6x^2 + 12x$?", "back": "$6x$"}, {"front": "What is the fully factored form of the numerator $6x^2 + 12x$?", "back": "$6x(x+2)$"}, {"front": "What is the greatest common factor (GCF) of the denominator $3x^2 + 12x + 12$?", "back": "$3$"}, {"front": "After removing the GCF of $3$, what is the factored form of the trinomial $x^2 + 4x + 4$?", "back": "$(x+2)^2$ (or $(x+2)(x+2)$)"}, {"front": "What is the fully factored form of the denominator $3x^2 + 12x + 12$?", "back": "$3(x+2)^2$"}, {"front": "When simplifying $\\frac{6x(x+2)}{3(x+2)^2}$, what numerical factor can be reduced from $\\frac{6}{3}$?", "back": "$2$"}, {"front": "What is the simplified form of $\\frac{6x^2 + 12x}{3x^2 + 12x + 12}$?", "back": "$\\frac{2x}{x+2}$"}, {"front": "What is the excluded value for the expression $\\frac{6x^2 + 12x}{3x^2 + 12x + 12}$?", "back": "$x \\ne -2$"}, {"front": "In rational expressions, you can only cancel _____ and never individual _____.", "back": "factors; terms"}, {"front": "Why is it incorrect to cancel the $x$'s in the expression $\\frac{x+5}{x+3}$?", "back": "The $x$'s are terms, not factors."}, {"front": "What is the simplest form of the rational expression $\\frac{x+5}{x+3}$?", "back": "$\\frac{x+5}{x+3}$ (it is already in simplest form)"}, {"front": "To simplify $\\frac{x^2 - 4x}{x^2 - 16}$, how is the numerator $x^2 - 4x$ factored?", "back": "$x(x-4)$"}, {"front": "To simplify $\\frac{x^2 - 4x}{x^2 - 16}$, how is the denominator $x^2 - 16$ factored?", "back": "$(x-4)(x+4)$"}, {"front": "What is the common factor divided out in $\\frac{x(x-4)}{(x-4)(x+4)}$?", "back": "$(x-4)$"}, {"front": "What is the simplified form of the checkpoint expression $\\frac{x^2 - 4x}{x^2 - 16}$?", "back": "$\\frac{x}{x+4}$"}, {"front": "What are the excluded values for the expression $\\frac{x^2 - 4x}{x^2 - 16}$?", "back": "$x \\ne 4$ and $x \\ne -4$"}, {"front": "According to the source note, in which future section will you work with polynomial denominators of higher degree?", "back": "Algebra II, Section 6-1"}, {"front": "A rational expression is an algebraic extension of what basic numerical concept?", "back": "Numerical fractions (integers in the numerator and denominator)."}, {"front": "The expression $\\frac{2a}{a^2 - 9}$ is an example of what kind of mathematical expression?", "back": "Rational Expression"}, {"front": "In the rational expression $\\frac{3x+1}{1}$, the numerator $3x+1$ is a _____.", "back": "Polynomial"}, {"front": "Finding excluded values is necessary because division by _____ is undefined.", "back": "zero"}, {"front": "If the denominator of a rational expression is $(x-3)(x+2)$, what specific equation do you solve to find the domain exclusions?", "back": "$(x-3)(x+2) = 0$"}, {"front": "When simplifying a rational expression, what must you do to the numerator and denominator before dividing out common factors?", "back": "Factor them completely."}, {"front": "Is $\\frac{x+5}{x+3}$ equal to $\\frac{5}{3}$? Why or why not?", "back": "No, because you cannot cancel terms (like $x$)."}, {"front": "What is the result of dividing $6x$ by $3$ in a simplified algebraic fraction?", "back": "$2x$"}, {"front": "In the property $\\frac{PR}{QR} = \\frac{P}{Q}$, what must be true about the relationship between $P, Q, R$ and polynomials?", "back": "They must all be polynomials."}, {"front": "If a factor $(x+2)$ appears in both the numerator and the denominator, it can be _____.", "back": "divided out (or canceled)"}, {"front": "The domain of a rational expression includes all real numbers except its _____.", "back": "excluded values"}, {"front": "What mathematical skill from earlier chapters is essential for simplifying rational expressions?", "back": "Factoring polynomials."}, {"front": "In the term $\\frac{3(x+2)^2}{6x(x+2)}$, what part of the expression $(x+2)^2$ is canceled by the $(x+2)$ in the denominator?", "back": "One of the two $(x+2)$ factors (leaving one $(x+2)$ in the numerator)."}, {"front": "What determines if a rational expression is in its 'simplest form'?", "back": "The numerator and denominator share no common factors other than $1$."}, {"front": "How many excluded values does $\\frac{x-3}{x+3}$ have?", "back": "One ($x = -3$)."}, {"front": "If a denominator is $x^2-16$, what are the values of $x$ that make it zero?", "back": "$x = 4$ and $x = -4$"}, {"front": "Which algebraic fractions are used throughout advanced mathematics, science, and engineering?", "back": "Rational expressions."}, {"front": "True or False: A rational expression can have more than one excluded value.", "back": "True"}, {"front": "In $\\frac{x^2-9}{x^2+6x+9}$, which factor of the numerator is shared with the denominator?", "back": "$(x+3)$"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
