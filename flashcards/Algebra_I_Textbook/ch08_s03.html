<head>

    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 8, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Which method is specifically recommended when a quadratic expression factors easily over the integers?", "back": "Factoring."}, {"front": "Which method is recommended for solving quadratic equations that lack a linear term?", "back": "The Square Root Property."}, {"front": "Which mathematical method can be used to solve any quadratic equation, regardless of whether it factors neatly?", "back": "The Quadratic Formula."}, {"front": "What is the standard form of a quadratic equation used to identify coefficients for the Quadratic Formula?", "back": "ax² + bx + c = 0"}, {"front": "Formula: The Quadratic Formula", "back": "x = frac-b ± √b² - 4ac2a"}, {"front": "What specific condition must be met by the coefficient a in the equation ax² + bx + c = 0 to use the Quadratic Formula?", "back": "a ne 0"}, {"front": "The Quadratic Formula is derived by applying the technique of _____ the square to the standard form equation.", "back": "completing"}, {"front": "In the derivation of the Quadratic Formula, what is the first step performed on ax² + bx + c = 0?", "back": "Subtract c from both sides."}, {"front": "After subtracting c in the derivation of the Quadratic Formula, what is the next step to isolate the x² coefficient?", "back": "Divide both sides by a."}, {"front": "What constant is added to both sides of x² + b/ax = -c/a to complete the square?", "back": "left(b/2aright)² (or b²/4a²)"}, {"front": "What is the factored form of the left side of the equation after adding b²/4a² during the formula derivation?", "back": "left(x + b/2aright)²"}, {"front": "Which property is applied to left(x + b/2aright)² = b² - 4ac/4a² to solve for x?", "back": "The Square Root Property."}, {"front": "What is the square root of the denominator 4a² found in the derivation of the Quadratic Formula?", "back": "2a"}, {"front": "To use the Quadratic Formula, which three values must be identified from the standard form equation?", "back": "a, b, and c."}, {"front": "Solve for a: x² + 5x + 3 = 0.", "back": "1"}, {"front": "Solve for b: x² + 5x + 3 = 0.", "back": "5"}, {"front": "Solve for c: x² + 5x + 3 = 0.", "back": "3"}, {"front": "What is the discriminant value (b² - 4ac) for the equation x² + 5x + 3 = 0?", "back": "13"}, {"front": "What are the two solutions for the equation x² + 5x + 3 = 0?", "back": "x = frac-5 ± √132"}, {"front": "Solve for a: 2x² - 4x - 3 = 0.", "back": "2"}, {"front": "Solve for b: 2x² - 4x - 3 = 0.", "back": "-4"}, {"front": "Solve for c: 2x² - 4x - 3 = 0.", "back": "-3"}, {"front": "In the formula application for 2x² - 4x - 3 = 0, what value is placed under the radical before simplification?", "back": "40"}, {"front": "Simplify the radical expression: √40.", "back": "2√10"}, {"front": "What is the simplified solution for 2x² - 4x - 3 = 0 after dividing by the common factor of 2?", "back": "x = frac2 ± √102"}, {"front": "Solve for a: x² - 2x - 5 = 0.", "back": "1"}, {"front": "Solve for b: x² - 2x - 5 = 0.", "back": "-2"}, {"front": "Solve for c: x² - 2x - 5 = 0.", "back": "-5"}, {"front": "What is the value of b² - 4ac for the equation x² - 2x - 5 = 0?", "back": "24"}, {"front": "Simplify the solution frac2 ± √242.", "back": "1 ± √6"}, {"front": "What must be done to the equation 3x² = 7x - 1 before applying the Quadratic Formula?", "back": "Rewrite it in standard form (3x² - 7x + 1 = 0)."}, {"front": "Solve for b: 3x² - 7x + 1 = 0.", "back": "-7"}, {"front": "Solve for c: 3x² - 7x + 1 = 0.", "back": "1"}, {"front": "What is the solution for the equation 3x² - 7x + 1 = 0?", "back": "x = frac7 ± √376"}, {"front": "Identify the values of a, b, and c for 2x² + 3x - 1 = 0.", "back": "a=2, b=3, c=-1"}, {"front": "Calculate the discriminant (b² - 4ac) for 2x² + 3x - 1 = 0.", "back": "17"}, {"front": "What is the solution for 2x² + 3x - 1 = 0 using the Quadratic Formula?", "back": "x = frac-3 ± √174"}, {"front": "Besides solving equations, what is another common use for the technique of completing the square?", "back": "Rewriting quadratic functions in vertex form."}, {"front": "In the Quadratic Formula x = frac-b ± √b² - 4ac2a, what term represents the linear coefficient?", "back": "b"}, {"front": "In the expression b² - 4ac, which variable represents the constant term of the quadratic equation?", "back": "c"}, {"front": "Why is standard form required before identifying a, b, and c for the Quadratic Formula?", "back": "To ensure the signs (positive or negative) of the coefficients are correct."}, {"front": "If the expression under the radical in the Quadratic Formula is 13, how many real solutions exist?", "back": "Two."}, {"front": "In the derivation step x² + b/ax + b²/4a² = -c/a + b²/4a², what is the common denominator used to combine the right side?", "back": "4a²"}, {"front": "What is the value of -b if b = -4?", "back": "4"}, {"front": "What is the value of b² if b = -7?", "back": "49"}, {"front": "In the equation x² + 5x + 3 = 0, what is the value of the quadratic coefficient a?", "back": "1"}, {"front": "True or False: The Quadratic Formula can only be used if the quadratic equation is factorable.", "back": "False."}, {"front": "The technique of completing the square is typically studied in greater depth in which math course?", "back": "Algebra II."}, {"front": "In the Quadratic Formula, what mathematical symbol indicates that there are usually two separate solutions?", "back": "± (plus-minus)"}, {"front": "What is the next step in solving 2x² - 4x - 3 = 0 after identifying a=2, b=-4, c=-3?", "back": "Substitute the values into the Quadratic Formula."}, {"front": "Convert x² = 2x + 5 into standard form.", "back": "x² - 2x - 5 = 0"}, {"front": "Simplify the expression: frac4 ± 2√104.", "back": "frac2 ± √102"}, {"front": "What is the result of -4ac when a=3 and c=1?", "back": "-12"}, {"front": "What is the denominator of the Quadratic Formula?", "back": "2a"}, {"front": "In the process of completing the square, adding b²/4a² ensures the left side of the equation becomes a _____.", "back": "perfect square trinomial"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
