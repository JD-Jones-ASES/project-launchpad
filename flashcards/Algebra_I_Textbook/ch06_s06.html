<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 6, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why is it beneficial to memorize special product patterns in algebra?", "back": "It saves time when multiplying binomials and helps with factoring polynomials in later chapters."}, {"front": "Formula: Square of a Binomial Sum", "back": "(a + b)² = a² + 2ab + b²"}, {"front": "Formula: Square of a Binomial Difference", "back": "(a - b)² = a² - 2ab + b²"}, {"front": "How many terms are produced by the square of a binomial?", "back": "Three terms."}, {"front": "In the expansion of (a + b)², what is the first term?", "back": "The square of the first term (a²)."}, {"front": "In the expansion of (a + b)², what is the middle term?", "back": "Twice the product of the two terms (2ab)."}, {"front": "In the expansion of (a + b)², what is the last term?", "back": "The square of the last term (b²)."}, {"front": "The common algebraic error (a + b)² = a² + b² fails to include which specific term?", "back": "The middle term 2ab."}, {"front": "Show the FOIL expansion steps for (a + b)(a + b).", "back": "a² + ab + ab + b²"}, {"front": "Calculate (x + 5)² using the special product pattern.", "back": "x² + 10x + 25"}, {"front": "Using a numerical example like (3 + 5)², why is the result not 3² + 5²?", "back": "Because 64 ne 34."}, {"front": "When expanding (3x + 4)², what is the value of the term a²?", "back": "9x²"}, {"front": "When expanding (3x + 4)², what is the value of the term 2ab?", "back": "24x"}, {"front": "When expanding (3x + 4)², what is the value of the term b²?", "back": "16"}, {"front": "What is the expanded form of (3x + 4)²?", "back": "9x² + 24x + 16"}, {"front": "When expanding (2x - 7)², what is the value of the term a²?", "back": "4x²"}, {"front": "When expanding (2x - 7)², what is the value of the middle term -2ab?", "back": "-28x"}, {"front": "When expanding (2x - 7)², what is the value of the term b²?", "back": "49"}, {"front": "What is the expanded form of (2x - 7)²?", "back": "4x² - 28x + 49"}, {"front": "Formula: Difference of Squares", "back": "(a + b)(a - b) = a² - b²"}, {"front": "The product of the sum and the difference of the same two terms equals the _____.", "back": "Difference of their squares."}, {"front": "Why does the middle term disappear in the product (a + b)(a - b)?", "back": "The middle terms -ab and +ab cancel each other out."}, {"front": "Expand (x + 6)(x - 6) using the Difference of Squares pattern.", "back": "x² - 36"}, {"front": "Expand (3n + 5)(3n - 5) using the Difference of Squares pattern.", "back": "9n² - 25"}, {"front": "Expand (4a² - 1)(4a² + 1) using the Difference of Squares pattern.", "back": "16a⁴ - 1"}, {"front": "In the expression (4a² - 1)(4a² + 1), what is the result of squaring the first term 4a²?", "back": "16a⁴"}, {"front": "Expand (5x + 3)(5x - 3) using the Difference of Squares pattern.", "back": "25x² - 9"}, {"front": "Concept: Perfect Square Trinomial (sum)", "back": "The resulting three-term polynomial from expanding (a + b)²."}, {"front": "Concept: Perfect Square Trinomial (difference)", "back": "The resulting three-term polynomial from expanding (a - b)²."}, {"front": "In which math course will you learn to expand higher-degree expressions like (a + b)³?", "back": "Algebra II."}, {"front": "How does the pattern for (a - b)² differ from (a + b)²?", "back": "Only the sign of the middle term (2ab) changes from positive to negative."}, {"front": "True or False: The square of a binomial always results in a binomial.", "back": "False (it results in a trinomial)."}, {"front": "What is the square of 3n?", "back": "9n²"}, {"front": "What is the square of 5x?", "back": "25x²"}, {"front": "In the pattern for the Difference of Squares, what operation is performed on the squares of a and b?", "back": "Subtraction."}, {"front": "If a = 2x and b = 7, what is the value of 2ab?", "back": "28x"}, {"front": "If a = 3x and b = 4, what is the value of 2ab?", "back": "24x"}, {"front": "What is the result of multiplying (x + 5)(x + 5)?", "back": "x² + 10x + 25"}, {"front": "Identify the pattern used for (4a² - 1)(4a² + 1).", "back": "Difference of Squares."}, {"front": "In Chapter 7, how will special product patterns be used?", "back": "In reverse to factor polynomials."}, {"front": "The expression a² - 2ab + b² is known as a _____.", "back": "Perfect square trinomial (difference)."}, {"front": "The expression a² + 2ab + b² is known as a _____.", "back": "Perfect square trinomial (sum)."}, {"front": "What is the value of (3x)²?", "back": "9x²"}, {"front": "What is the value of (4a²)²?", "back": "16a⁴"}, {"front": "In the Difference of Squares pattern, is the last term b² ever positive?", "back": "No, it is always subtracted (- b²)."}, {"front": "Cloze: (a + b)² = a² + \\_\\_\\_\\_\\_ + b².", "back": "2ab"}, {"front": "Cloze: (a - b)² = a² - 2ab + \\_\\_\\_\\_\\_.", "back": "b²"}, {"front": "Cloze: (a + b)(a - b) = \\_\\_\\_\\_\\_ - b².", "back": "a²"}, {"front": "Expand (x + 10)².", "back": "x² + 20x + 100"}, {"front": "Expand (x - 10)².", "back": "x² - 20x + 100"}, {"front": "Expand (x + 10)(x - 10).", "back": "x² - 100"}, {"front": "If a = x and b = 6, what is a² - b²?", "back": "x² - 36"}, {"front": "Why is the middle term of (a+b)² called 'twice the product of the two terms'?", "back": "Because it equals 2 times a times b."}, {"front": "When using the pattern (a - b)², what value do you use for b if the expression is (2x - 7)²?", "back": "7"}, {"front": "What is the sign of the constant term in the expansion of (a - b)²?", "back": "Positive (+b²)."}, {"front": "What results from a² - ab + ab - b² after simplification?", "back": "a² - b²"}, {"front": "What results from a² + ab + ab + b² after simplification?", "back": "a² + 2ab + b²"}, {"front": "True or False: (a - b)² = a² - b².", "back": "False."}, {"front": "The square of a binomial difference pattern is a² - 2ab + b² for all _____.", "back": "Real numbers a and b."}, {"front": "Is the result of (3x+4)² a binomial or a trinomial?", "back": "A trinomial."}, {"front": "Is the result of (x+6)(x-6) a binomial or a trinomial?", "back": "A binomial."}, {"front": "Determine the middle term of (4x + 1)².", "back": "8x"}, {"front": "Determine the last term of (5n - 2)².", "back": "4"}, {"front": "What is the square of the term 3n in the expression (3n+5)(3n-5)?", "back": "9n²"}, {"front": "In the expansion of (a - b)², what is the first term?", "back": "The square of the first term (a²)."}, {"front": "What happens to the ab terms when applying FOIL to (a+b)²?", "back": "They are added together to become 2ab."}, {"front": "What is the expanded form of (x-1)²?", "back": "x² - 2x + 1"}, {"front": "What is the expanded form of (x-1)(x+1)?", "back": "x² - 1"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
