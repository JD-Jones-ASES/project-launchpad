<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the value of any nonzero real number a raised to the zero power?", "back": "1"}, {"front": "Formula: Zero Exponent Rule", "back": "a⁰ = 1 (where a ne 0)"}, {"front": "Under what specific condition is the expression a⁰ = 1 invalid?", "back": "When a = 0"}, {"front": "Why is a⁰ defined as 1 in terms of the product of powers rule?", "back": "To ensure a^m · a⁰ = am⁺⁰ = a^m holds true."}, {"front": "Is the expression 0⁰ defined?", "back": "No, it is not defined."}, {"front": "Evaluate the expression 5⁰.", "back": "1"}, {"front": "Evaluate the expression (-3)⁰.", "back": "1"}, {"front": "Property: Negative Exponent (Formula for a⁻ⁿ)", "back": "a⁻ⁿ = 1/aⁿ"}, {"front": "A nonzero base raised to a negative exponent is equal to the _____ of the base raised to the positive exponent.", "back": "reciprocal"}, {"front": "What is the equivalent positive exponent form of 1/a⁻ⁿ?", "back": "aⁿ"}, {"front": "Evaluate 4⁻² and provide the result as a fraction.", "back": "1/16"}, {"front": "Evaluate the expression (⅔)⁻³.", "back": "27/8"}, {"front": "Step-by-step: What is the first step to evaluate (⅔)⁻³ using the negative exponent property?", "back": "Take the reciprocal of the base to get (3/2)³."}, {"front": "Evaluate the expression 2⁻⁵.", "back": "1/32"}, {"front": "Property: Quotient of Powers (Formula)", "back": "a^m/aⁿ = am⁻ⁿ"}, {"front": "To divide powers with the same base, you keep the base and _____ the exponents.", "back": "subtract"}, {"front": "Simplify x⁷/x³.", "back": "x⁴"}, {"front": "Simplify 12a⁵/4a².", "back": "3a³"}, {"front": "Simplify m³/m⁸ and write the answer with a positive exponent.", "back": "1/m⁵"}, {"front": "Using the quotient rule, a³/a³ results in what power of a?", "back": "a⁰"}, {"front": "Using the quotient rule, a²/a⁵ results in what power of a?", "back": "a⁻³"}, {"front": "Property: Power of a Quotient (Formula)", "back": "(a/b)ⁿ = aⁿ/bⁿ"}, {"front": "Simplify the expression (x³ y²)⁴.", "back": "x¹²y⁸"}, {"front": "What is the first step in simplifying (2a³)² a⁻¹⁰?", "back": "Apply the power of a product rule to get 2² (a³)² a⁻¹⁰."}, {"front": "Simplify (2a³)² a⁻¹⁰ completely, using only positive exponents.", "back": "4/a⁴"}, {"front": "Simplify (3x⁻² y³)² and write the answer with positive exponents.", "back": "9y⁶/x⁴"}, {"front": "When simplifying (3x⁻² y³)², what is the resulting coefficient?", "back": "9"}, {"front": "Simplify the expression fracn⁴ n⁻⁷n² using positive exponents.", "back": "1/n⁵"}, {"front": "What is the result of n⁴ · n⁻⁷ in the numerator of fracn⁴ n⁻⁷n²?", "back": "n⁻³"}, {"front": "In the summary of exponent properties, what is the rule for (ab)ⁿ?", "back": "aⁿ bⁿ"}, {"front": "In the summary of exponent properties, what is the rule for (a^m)ⁿ?", "back": "amⁿ"}, {"front": "In the summary of exponent properties, what is the rule for a^m · aⁿ?", "back": "am⁺ⁿ"}, {"front": "True or False: The exponent rules for integers also apply to rational exponents like a¹/².", "back": "True"}, {"front": "Which algebra course is mentioned as the place where exponent rules are extended to rational exponents?", "back": "Algebra II"}, {"front": "Evaluate 10⁻¹.", "back": "⅒"}, {"front": "Evaluate (-2)⁻³.", "back": "-⅛"}, {"front": "Simplify y⁰ · y⁵.", "back": "y⁵"}, {"front": "Simplify z²/z⁻⁴.", "back": "z⁶"}, {"front": "If a^m/aⁿ = 1, what must be the relationship between m and n?", "back": "m = n"}, {"front": "Convert x⁻¹⁰ to an expression with a positive exponent.", "back": "1/x¹⁰"}, {"front": "Evaluate 1⁻¹⁰⁰.", "back": "1"}, {"front": "Simplify (a⁻²)⁻³.", "back": "a⁶"}, {"front": "What is the result of dividing 5a⁸ by a⁸?", "back": "5"}, {"front": "Evaluate (-1)⁰.", "back": "1"}, {"front": "Simplify b⁴/b⁴.", "back": "1"}, {"front": "In the expression 3a⁻², which part is raised to the negative power?", "back": "a only"}, {"front": "Rewrite 3a⁻² using only positive exponents.", "back": "3/a²"}, {"front": "Evaluate (½)⁻¹.", "back": "2"}, {"front": "Simplify (x⁰ y²)³.", "back": "y⁶"}, {"front": "What operation do you perform on exponents when raising a power to a power, such as (a^m)ⁿ?", "back": "Multiplication"}, {"front": "Simplify k⁵/k⁹.", "back": "1/k⁴"}, {"front": "Evaluate 3⁻² + 3⁰.", "back": "10/9"}, {"front": "Simplify 4x³/2x⁵.", "back": "2/x²"}, {"front": "What is the exponent of x in the simplified form of (x⁻¹ y²)⁻²?", "back": "2"}, {"front": "Simplify 2³/2⁵.", "back": "¼"}, {"front": "Evaluate (-4)⁻².", "back": "1/16"}, {"front": "What is the reciprocal of xⁿ?", "back": "x⁻ⁿ"}, {"front": "Simplify a⁷ · a⁻⁷.", "back": "1"}, {"front": "Does the Power of a Quotient rule apply when the denominator is zero?", "back": "No"}, {"front": "Simplify (ab)²/a².", "back": "b²"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
