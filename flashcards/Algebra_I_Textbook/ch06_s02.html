<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the value of any nonzero real number $a$ raised to the zero power?", "back": "1", "id": "fc01"}, {"front": "Formula: Zero Exponent Rule", "back": "$a^0 = 1$ (where $a \\ne 0$)", "id": "fc02"}, {"front": "Under what specific condition is the expression $a^0 = 1$ invalid?", "back": "When $a = 0$", "id": "fc03"}, {"front": "Why is $a^0$ defined as $1$ in terms of the product of powers rule?", "back": "To ensure $a^m \\cdot a^0 = a^{m+0} = a^m$ holds true.", "id": "fc04"}, {"front": "Is the expression $0^0$ defined?", "back": "No, it is not defined.", "id": "fc05"}, {"front": "Evaluate the expression $5^0$.", "back": "1", "id": "fc06"}, {"front": "Evaluate the expression $(-3)^0$.", "back": "1", "id": "fc07"}, {"front": "Property: Negative Exponent (Formula for $a^{-n}$)", "back": "$a^{-n} = \\frac{1}{a^n}$", "id": "fc08"}, {"front": "A nonzero base raised to a negative exponent is equal to the _____ of the base raised to the positive exponent.", "back": "reciprocal", "id": "fc09"}, {"front": "What is the equivalent positive exponent form of $\\frac{1}{a^{-n}}$?", "back": "$a^n$", "id": "fc10"}, {"front": "Evaluate $4^{-2}$ and provide the result as a fraction.", "back": "$\\frac{1}{16}$", "id": "fc11"}, {"front": "Evaluate the expression $(\\frac{2}{3})^{-3}$.", "back": "$\\frac{27}{8}$", "id": "fc12"}, {"front": "Step-by-step: What is the first step to evaluate $(\\frac{2}{3})^{-3}$ using the negative exponent property?", "back": "Take the reciprocal of the base to get $(\\frac{3}{2})^3$.", "id": "fc13"}, {"front": "Evaluate the expression $2^{-5}$.", "back": "$\\frac{1}{32}$", "id": "fc14"}, {"front": "Property: Quotient of Powers (Formula)", "back": "$\\frac{a^m}{a^n} = a^{m-n}$", "id": "fc15"}, {"front": "To divide powers with the same base, you keep the base and _____ the exponents.", "back": "subtract", "id": "fc16"}, {"front": "Simplify $\\frac{x^7}{x^3}$.", "back": "$x^4$", "id": "fc17"}, {"front": "Simplify $\\frac{12a^5}{4a^2}$.", "back": "$3a^3$", "id": "fc18"}, {"front": "Simplify $\\frac{m^3}{m^8}$ and write the answer with a positive exponent.", "back": "$\\frac{1}{m^5}$", "id": "fc19"}, {"front": "Using the quotient rule, $\\frac{a^3}{a^3}$ results in what power of $a$?", "back": "$a^0$", "id": "fc20"}, {"front": "Using the quotient rule, $\\frac{a^2}{a^5}$ results in what power of $a$?", "back": "$a^{-3}$", "id": "fc21"}, {"front": "Property: Power of a Quotient (Formula)", "back": "$(\\frac{a}{b})^n = \\frac{a^n}{b^n}$", "id": "fc22"}, {"front": "Simplify the expression $(x^3 y^2)^4$.", "back": "$x^{12}y^8$", "id": "fc23"}, {"front": "What is the first step in simplifying $(2a^3)^2 a^{-10}$?", "back": "Apply the power of a product rule to get $2^2 (a^3)^2 a^{-10}$.", "id": "fc24"}, {"front": "Simplify $(2a^3)^2 a^{-10}$ completely, using only positive exponents.", "back": "$\\frac{4}{a^4}$", "id": "fc25"}, {"front": "Simplify $(3x^{-2} y^3)^2$ and write the answer with positive exponents.", "back": "$\\frac{9y^6}{x^4}$", "id": "fc26"}, {"front": "When simplifying $(3x^{-2} y^3)^2$, what is the resulting coefficient?", "back": "9", "id": "fc27"}, {"front": "Simplify the expression $\\frac{n^4 n^{-7}}{n^2}$ using positive exponents.", "back": "$\\frac{1}{n^5}$", "id": "fc28"}, {"front": "What is the result of $n^4 \\cdot n^{-7}$ in the numerator of $\\frac{n^4 n^{-7}}{n^2}$?", "back": "$n^{-3}$", "id": "fc29"}, {"front": "In the summary of exponent properties, what is the rule for $(ab)^n$?", "back": "$a^n b^n$", "id": "fc30"}, {"front": "In the summary of exponent properties, what is the rule for $(a^m)^n$?", "back": "$a^{mn}$", "id": "fc31"}, {"front": "In the summary of exponent properties, what is the rule for $a^m \\cdot a^n$?", "back": "$a^{m+n}$", "id": "fc32"}, {"front": "True or False: The exponent rules for integers also apply to rational exponents like $a^{1/2}$.", "back": "True", "id": "fc33"}, {"front": "Which algebra course is mentioned as the place where exponent rules are extended to rational exponents?", "back": "Algebra II", "id": "fc34"}, {"front": "Evaluate $10^{-1}$.", "back": "$\\frac{1}{10}$", "id": "fc35"}, {"front": "Evaluate $(-2)^{-3}$.", "back": "$-\\frac{1}{8}$", "id": "fc36"}, {"front": "Simplify $y^0 \\cdot y^5$.", "back": "$y^5$", "id": "fc37"}, {"front": "Simplify $\\frac{z^2}{z^{-4}}$.", "back": "$z^6$", "id": "fc38"}, {"front": "If $\\frac{a^m}{a^n} = 1$, what must be the relationship between $m$ and $n$?", "back": "$m = n$", "id": "fc39"}, {"front": "Convert $x^{-10}$ to an expression with a positive exponent.", "back": "$\\frac{1}{x^{10}}$", "id": "fc40"}, {"front": "Evaluate $1^{-100}$.", "back": "1", "id": "fc41"}, {"front": "Simplify $(a^{-2})^{-3}$.", "back": "$a^6$", "id": "fc42"}, {"front": "What is the result of dividing $5a^8$ by $a^8$?", "back": "5", "id": "fc43"}, {"front": "Evaluate $(-1)^0$.", "back": "1", "id": "fc44"}, {"front": "Simplify $\\frac{b^4}{b^4}$.", "back": "1", "id": "fc45"}, {"front": "In the expression $3a^{-2}$, which part is raised to the negative power?", "back": "$a$ only", "id": "fc46"}, {"front": "Rewrite $3a^{-2}$ using only positive exponents.", "back": "$\\frac{3}{a^2}$", "id": "fc47"}, {"front": "Evaluate $(\\frac{1}{2})^{-1}$.", "back": "2", "id": "fc48"}, {"front": "Simplify $(x^0 y^2)^3$.", "back": "$y^6$", "id": "fc49"}, {"front": "What operation do you perform on exponents when raising a power to a power, such as $(a^m)^n$?", "back": "Multiplication", "id": "fc50"}, {"front": "Simplify $\\frac{k^5}{k^9}$.", "back": "$\\frac{1}{k^4}$", "id": "fc51"}, {"front": "Evaluate $3^{-2} + 3^0$.", "back": "$\\frac{10}{9}$", "id": "fc52"}, {"front": "Simplify $\\frac{4x^3}{2x^5}$.", "back": "$\\frac{2}{x^2}$", "id": "fc53"}, {"front": "What is the exponent of $x$ in the simplified form of $(x^{-1} y^2)^{-2}$?", "back": "2", "id": "fc54"}, {"front": "Simplify $\\frac{2^3}{2^5}$.", "back": "$\\frac{1}{4}$", "id": "fc55"}, {"front": "Evaluate $(-4)^{-2}$.", "back": "$\\frac{1}{16}$", "id": "fc56"}, {"front": "What is the reciprocal of $x^n$?", "back": "$x^{-n}$", "id": "fc57"}, {"front": "Simplify $a^7 \\cdot a^{-7}$.", "back": "1", "id": "fc58"}, {"front": "Does the Power of a Quotient rule apply when the denominator is zero?", "back": "No", "id": "fc59"}, {"front": "Simplify $\\frac{(ab)^2}{a^2}$.", "back": "$b^2$", "id": "fc60"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
