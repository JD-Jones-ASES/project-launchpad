<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What algebraic process is defined as writing a product as a multiplication of simpler expressions?", "back": "Factoring", "id": "fc01"}, {"front": "Factoring is considered the reverse process of which algebraic operation?", "back": "Multiplication", "id": "fc02"}, {"front": "Why is factoring considered one of the most important skills in algebra?", "back": "It allows for solving equations, simplifying expressions, and analyzing functions.", "id": "fc03"}, {"front": "What is the first step to take in any factoring problem?", "back": "Look for a greatest common factor (GCF).", "id": "fc04"}, {"front": "Term: Greatest Common Factor (GCF) of Monomials", "back": "The product of the GCF of numerical coefficients and the highest power of each variable shared by every monomial.", "id": "fc05"}, {"front": "When finding the GCF of monomials, which power of a shared variable is used?", "back": "The smallest exponent that appears among the monomials.", "id": "fc06"}, {"front": "What are the three steps to find the GCF of a set of monomials?", "back": "Find the GCF of coefficients, find the smallest exponent for shared variables, and multiply those results.", "id": "fc07"}, {"front": "What is the GCF of the numerical coefficients $12$ and $18$?", "back": "$6$", "id": "fc08"}, {"front": "Between the monomials $12x^3y^2$ and $18x^2y^5$, what is the GCF of the $x$ variables?", "back": "$x^2$", "id": "fc09"}, {"front": "Between the monomials $12x^3y^2$ and $18x^2y^5$, what is the GCF of the $y$ variables?", "back": "$y^2$", "id": "fc10"}, {"front": "What is the GCF of $12x^3y^2$ and $18x^2y^5$?", "back": "$6x^2y^2$", "id": "fc11"}, {"front": "What are the three steps to factor a polynomial by removing the GCF?", "back": "Find the GCF of all terms, divide each term by the GCF, and write the expression as $GCF(remaining\\ polynomial)$.", "id": "fc12"}, {"front": "How can you verify that a polynomial has been factored correctly?", "back": "Distribute the GCF back into the parentheses to see if it matches the original polynomial.", "id": "fc13"}, {"front": "What is the GCF of the terms in the polynomial $15x^3 - 10x^2 + 25x$?", "back": "$5x$", "id": "fc14"}, {"front": "In the process of factoring $15x^3 - 10x^2 + 25x$, what is the result of dividing $15x^3$ by the GCF $5x$?", "back": "$3x^2$", "id": "fc15"}, {"front": "In the process of factoring $15x^3 - 10x^2 + 25x$, what is the result of dividing $-10x^2$ by the GCF $5x$?", "back": "$-2x$", "id": "fc16"}, {"front": "In the process of factoring $15x^3 - 10x^2 + 25x$, what is the result of dividing $25x$ by the GCF $5x$?", "back": "$5$", "id": "fc17"}, {"front": "What is the factored form of $15x^3 - 10x^2 + 25x$?", "back": "$5x(3x^2 - 2x + 5)$", "id": "fc18"}, {"front": "What is the GCF of $8a^2b$ and $12ab^2$?", "back": "$4ab$", "id": "fc19"}, {"front": "What is the factored form of $8a^2b + 12ab^2$?", "back": "$4ab(2a + 3b)$", "id": "fc20"}, {"front": "Under what condition is it useful to factor out a negative GCF?", "back": "When the leading coefficient of the polynomial is negative.", "id": "fc21"}, {"front": "What is the primary goal of factoring out a negative GCF?", "back": "To ensure the leading term inside the parentheses is positive.", "id": "fc22"}, {"front": "In the polynomial $-6x^2 + 9x - 3$, why would $-3$ be factored out rather than $3$?", "back": "Because the leading coefficient is negative.", "id": "fc23"}, {"front": "What is the result of factoring out $-3$ from $-6x^2 + 9x - 3$?", "back": "$-3(2x^2 - 3x + 1)$", "id": "fc24"}, {"front": "Which technique is specifically used for some polynomials with exactly four terms?", "back": "Factoring by grouping", "id": "fc25"}, {"front": "What is the first step when factoring a four-term polynomial by grouping?", "back": "Split the polynomial into two pairs of terms.", "id": "fc26"}, {"front": "What must be done after splitting a polynomial into pairs during factoring by grouping?", "back": "Factor the GCF from each pair of terms.", "id": "fc27"}, {"front": "What is the final step in the process of factoring by grouping?", "back": "Factor out the common binomial factor from the groups.", "id": "fc28"}, {"front": "In factoring $x^3 + 3x^2 + 2x + 6$ by grouping, what are the initial two groups?", "back": "$(x^3 + 3x^2)$ and $(2x + 6)$", "id": "fc29"}, {"front": "After factoring the GCF from each group in $x^3 + 3x^2 + 2x + 6$, what is the resulting expression?", "back": "$x^2(x + 3) + 2(x + 3)$", "id": "fc30"}, {"front": "What is the common binomial factor in the expression $x^2(x + 3) + 2(x + 3)$?", "back": "$(x + 3)$", "id": "fc31"}, {"front": "What is the final factored form of $x^3 + 3x^2 + 2x + 6$?", "back": "$(x + 3)(x^2 + 2)$", "id": "fc32"}, {"front": "In factoring $2y^3 - y^2 + 6y - 3$ by grouping, what is the GCF of the first two terms?", "back": "$y^2$", "id": "fc33"}, {"front": "In factoring $2y^3 - y^2 + 6y - 3$ by grouping, what is the GCF of the last two terms?", "back": "$3$", "id": "fc34"}, {"front": "What is the final factored form of $2y^3 - y^2 + 6y - 3$?", "back": "$(2y - 1)(y^2 + 3)$", "id": "fc35"}, {"front": "What requirement must be met by the binomial factors in each group for factoring by grouping to work?", "back": "They must be exactly the same.", "id": "fc36"}, {"front": "If the binomial factors are different during grouping, what should you attempt first?", "back": "Try rearranging the terms of the polynomial.", "id": "fc37"}, {"front": "Besides rearranging terms, what other action can you take if binomial factors in grouping are not identical?", "back": "Factor out a $-1$ from one of the groups.", "id": "fc38"}, {"front": "Under what condition is a polynomial considered non-factorable by grouping?", "back": "When no arrangement of terms produces a common binomial factor.", "id": "fc39"}, {"front": "The GCF of monomials uses the _____ exponent for each variable that appears in all terms.", "back": "smallest", "id": "fc40"}, {"front": "Factoring by grouping involves factoring a common _____ factor from two pairs of terms.", "back": "binomial", "id": "fc41"}, {"front": "In the context of GCF, the variable $x$ in $x^2$ and $x^5$ has a common factor of _____.", "back": "$x^2$", "id": "fc42"}, {"front": "When factoring by removing the GCF, the polynomial is written as the product of the GCF and the _____.", "back": "remaining polynomial", "id": "fc43"}, {"front": "What is the result of multiplying the factors of a polynomial back together?", "back": "The original polynomial.", "id": "fc44"}, {"front": "In the term $5x(3x^2 - 2x + 5)$, which component is the GCF?", "back": "$5x$", "id": "fc45"}, {"front": "What is the GCF of $6$, $9$, and $3$?", "back": "$3$", "id": "fc46"}, {"front": "What is the binomial factor in the expression $x^2(x + 3) + 2(x + 3)$?", "back": "$(x + 3)$", "id": "fc47"}, {"front": "What is the GCF of coefficients $15, 10,$ and $25$?", "back": "$5$", "id": "fc48"}, {"front": "Why is it important to use the smallest exponent of a shared variable when finding a GCF?", "back": "It ensures the variable power is present in every monomial term.", "id": "fc49"}, {"front": "True or False: A variable must appear in every term of a polynomial to be included in the GCF.", "back": "True", "id": "fc50"}, {"front": "What is the name of the factor that remains after dividing each term of a polynomial by the GCF?", "back": "The remaining polynomial factor.", "id": "fc51"}, {"front": "Which algebraic property is used to check factoring results?", "back": "The distributive property.", "id": "fc52"}, {"front": "Is it possible to factor $x^3 + 3x^2 + 2x + 6$ using the GCF method alone?", "back": "No, because there is no common factor for all four terms other than 1.", "id": "fc53"}, {"front": "If grouping $2y^3 - y^2 + 6y - 3$ results in $y^2(2y - 1) + 3(2y - 1)$, what is the next step?", "back": "Factor out the common binomial $(2y - 1)$.", "id": "fc54"}, {"front": "How many terms are usually present when the 'grouping' technique is introduced?", "back": "Four", "id": "fc55"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
