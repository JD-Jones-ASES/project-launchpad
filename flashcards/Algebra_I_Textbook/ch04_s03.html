<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What property of a line does the slope measure in algebra?", "back": "Steepness"}, {"front": "Slope describes the rate at which $y$-values change relative to what other values?", "back": "$x$-values"}, {"front": "The slope of a non-vertical line is the ratio of the _____ change to the horizontal change.", "back": "vertical"}, {"front": "What specific term refers to the vertical change between two points on a line?", "back": "Rise"}, {"front": "What specific term refers to the horizontal change between two points on a line?", "back": "Run"}, {"front": "Term: Slope", "back": "Definition: The ratio of the rise to the run between any two points on a non-vertical line."}, {"front": "Which lowercase letter is most commonly used to denote slope in algebra?", "back": "$m$"}, {"front": "Formula: Slope ($m$)", "back": "$m = \\frac{\\text{rise}}{\\text{run}} = \\frac{\\text{change in } y}{\\text{change in } x}$"}, {"front": "Provide the coordinate-based formula for the slope of a line passing through $(x_1, y_1)$ and $(x_2, y_2)$.", "back": "$m = \\frac{y_2 - y_1}{x_2 - x_1}$"}, {"front": "What condition regarding $x_1$ and $x_2$ must be true for the slope formula to be defined?", "back": "$x_1 \\neq x_2$"}, {"front": "How does the choice of which point is designated as $(x_1, y_1)$ versus $(x_2, y_2)$ affect the resulting slope?", "back": "It does not change the result, provided the subtraction order remains consistent for both coordinates."}, {"front": "What is the slope of a line that rises from left to right?", "back": "Positive slope"}, {"front": "What is the slope of a line that falls from left to right?", "back": "Negative slope"}, {"front": "A horizontal line has a slope of _____.", "back": "$0$"}, {"front": "What is the numerical slope of a vertical line?", "back": "Undefined"}, {"front": "Calculate the slope of the line passing through $(1, 3)$ and $(4, 9)$.", "back": "$2$"}, {"front": "If a line has a slope of $2$, how many units does it rise for every $1$ unit it moves to the right?", "back": "$2$ units"}, {"front": "Calculate the slope of the line passing through $(2, 5)$ and $(7, 5)$.", "back": "$0$"}, {"front": "Calculate the slope of the line passing through $(3, -1)$ and $(3, 4)$.", "back": "Undefined"}, {"front": "Why is the slope of a horizontal line equal to zero?", "back": "There is no vertical change (rise is $0$), and zero divided by any non-zero run is zero."}, {"front": "Why is the slope of a vertical line considered undefined?", "back": "The horizontal change (run) is $0$, and division by zero is undefined."}, {"front": "In real-world applications, slope is frequently interpreted as a _____ of change.", "back": "rate"}, {"front": "If a $12$-inch candle burns to a height of $6$ inches in $3$ hours, what is the slope of the height-time relationship?", "back": "$-2$"}, {"front": "What does a slope of $-2$ inches per hour represent in the context of a burning candle?", "back": "The candle's height decreases by $2$ inches for every hour it burns."}, {"front": "When interpreting slope in context, the slope often includes _____ such as miles per gallon or dollars per hour.", "back": "units"}, {"front": "Calculate the slope of the line through $(-2, 7)$ and $(4, -5)$.", "back": "$-2$"}, {"front": "In the formula $m = \\frac{y_2 - y_1}{x_2 - x_1}$, which variable represents the independent variable typically plotted on the horizontal axis?", "back": "$x$"}, {"front": "In the formula $m = \\frac{y_2 - y_1}{x_2 - x_1}$, which variable represents the dependent variable typically plotted on the vertical axis?", "back": "$y$"}, {"front": "What is the 'rise' between the points $(1, 3)$ and $(4, 9)$?", "back": "$6$"}, {"front": "What is the 'run' between the points $(1, 3)$ and $(4, 9)$?", "back": "$3$"}, {"front": "If the slope of a line is undefined, the line must be _____.", "back": "vertical"}, {"front": "If the slope of a line is $0$, the line must be _____.", "back": "horizontal"}, {"front": "What does a positive slope indicate about the relationship between $x$ and $y$?", "back": "As $x$ increases, $y$ also increases."}, {"front": "What does a negative slope indicate about the relationship between $x$ and $y$?", "back": "As $x$ increases, $y$ decreases."}, {"front": "Identify the rise for the points $(2, 5)$ and $(7, 5)$.", "back": "$0$"}, {"front": "Identify the run for the points $(3, -1)$ and $(3, 4)$.", "back": "$0$"}, {"front": "What is the resulting slope when the vertical change is $5$ and the horizontal change is $0$?", "back": "Undefined"}, {"front": "What is the resulting slope when the vertical change is $0$ and the horizontal change is $5$?", "back": "$0$"}, {"front": "Concept: Rate of Change", "back": "The interpretation of slope in real-world problems, often expressed in units like degrees per minute."}, {"front": "In the candle example, what does the $x$-axis represent?", "back": "Time (in hours)"}, {"front": "In the candle example, what does the $y$-axis represent?", "back": "Height (in inches)"}, {"front": "What error is being warned against when distinguishing between zero and undefined slope?", "back": "Confusing a horizontal line (zero slope) with a vertical line (undefined slope)."}, {"front": "If coordinates are subtracted as $y_2 - y_1$ in the numerator, how must they be subtracted in the denominator?", "back": "$x_2 - x_1$"}, {"front": "A line with a slope of $m = -2$ moves $1$ unit to the right. How many units does it move vertically, and in what direction?", "back": "$2$ units downward"}, {"front": "True or False: The slope of a straight line is the same between any two points chosen on that line.", "back": "True"}, {"front": "What is the 'run' between the points $(-2, 7)$ and $(4, -5)$?", "back": "$6$"}, {"front": "What is the 'rise' between the points $(-2, 7)$ and $(4, -5)$?", "back": "$-12$"}, {"front": "The slope of a line measures exactly the _____ of a hill in an algebraic context.", "back": "steepness"}, {"front": "Why is slope considered one of the most important numbers in a linear relationship?", "back": "It quantifies exactly how fast $y$ changes relative to $x$."}, {"front": "What happens to the sign of the slope if you reverse the subtraction order in BOTH the numerator and denominator?", "back": "The sign remains the same (it does not change)."}, {"front": "Identify the slope for points where the $y$-coordinates are identical.", "back": "$0$"}, {"front": "Identify the slope for points where the $x$-coordinates are identical.", "back": "Undefined"}, {"front": "In the unit 'miles per gallon', which variable ($y$ or $x$) corresponds to 'miles'?", "back": "$y$ (the numerator/rise)"}, {"front": "In the unit 'miles per gallon', which variable ($y$ or $x$) corresponds to 'gallons'?", "back": "$x$ (the denominator/run)"}, {"front": "How is a line with a negative slope visually distinguished from one with a positive slope?", "back": "A negative slope line goes down from left to right, while a positive one goes up."}, {"front": "What is the denominator of the slope formula $m = \\frac{y_2 - y_1}{x_2 - x_1}$?", "back": "$x_2 - x_1$"}, {"front": "What is the numerator of the slope formula $m = \\frac{y_2 - y_1}{x_2 - x_1}$?", "back": "$y_2 - y_1$"}, {"front": "If the change in $x$ is $3$ and the change in $y$ is $6$, the slope is _____.", "back": "$2$"}, {"front": "If the change in $x$ is $5$ and the change in $y$ is $0$, the slope is _____.", "back": "$0$"}, {"front": "If the change in $x$ is $0$ and the change in $y$ is $5$, the slope is _____.", "back": "undefined"}, {"front": "Calculate the slope through $(0, 12)$ and $(3, 6)$.", "back": "$-2$"}, {"front": "What is the run between $(2, 5)$ and $(7, 5)$?", "back": "$5$"}, {"front": "What is the rise between $(3, -1)$ and $(3, 4)$?", "back": "$5$"}, {"front": "Which specific geometric situation results in a 'division by zero' error when calculating slope?", "back": "A vertical line"}, {"front": "Which specific geometric situation results in a numerator of zero when calculating slope?", "back": "A horizontal line"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
