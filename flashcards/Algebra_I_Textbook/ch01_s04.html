<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the rule for adding two real numbers that have the same sign?", "back": "Add their absolute values and keep the common sign."}, {"front": "When adding two numbers with different signs, how do you determine the numerical part of the result?", "back": "Subtract the smaller absolute value from the larger absolute value."}, {"front": "In the addition of two numbers with different signs, which sign is kept for the final result?", "back": "The sign of the number with the larger absolute value."}, {"front": "What is the primary rule for subtracting one real number from another?", "back": "Add the opposite of the number being subtracted."}, {"front": "According to the subtraction rule, what is the equivalent addition expression for $ a - b $?", "back": "$ a + (-b) $"}, {"front": "To add two numbers with the same sign, you must add their _____ and keep the common sign.", "back": "absolute values"}, {"front": "Simplify the expression: $ (-6) + (-11) $.", "back": "$ -17 $"}, {"front": "Simplify the expression: $ 3 + 5 $.", "back": "$ 8 $"}, {"front": "Simplify the expression: $ (-3) + (-5) $.", "back": "$ -8 $"}, {"front": "Simplify the expression: $ 15 + (-9) $.", "back": "$ 6 $"}, {"front": "Simplify the expression: $ (-4) + 10 $.", "back": "$ 6 $"}, {"front": "Simplify the expression: $ (-7) + 4 $.", "back": "$ -3 $"}, {"front": "Simplify the expression: $ 9 + (-2) $.", "back": "$ 7 $"}, {"front": "Simplify the expression: $ (-8) + (-3) $.", "back": "$ -11 $"}, {"front": "What is the result of $ 7 - 12 $ when rewritten as an addition problem?", "back": "$ -5 $"}, {"front": "Simplify the expression: $ -3 - 8 $.", "back": "$ -11 $"}, {"front": "Simplify the expression: $ -5 - (-9) $.", "back": "$ 4 $"}, {"front": "Simplify the expression: $ -6 - (-14) $.", "back": "$ 8 $"}, {"front": "What is the first step recommended for simplifying the expression $ -4 + 7 - 3 + (-2) - (-5) $?", "back": "Rewrite all subtractions as additions of opposites."}, {"front": "Rewrite $ -4 + 7 - 3 + (-2) - (-5) $ using only addition symbols.", "back": "$ -4 + 7 + (-3) + (-2) + 5 $"}, {"front": "In the expression $ -4 + 7 + (-3) + (-2) + 5 $, what is the sum of all the negative terms?", "back": "$ -9 $"}, {"front": "In the expression $ -4 + 7 + (-3) + (-2) + 5 $, what is the sum of all the positive terms?", "back": "$ 12 $"}, {"front": "What is the final simplified value of $ -4 + 7 - 3 + (-2) - (-5) $?", "back": "$ 3 $"}, {"front": "How is a drop of $ 8^{\\circ} $ from a temperature of $ 3^{\\circ} $ expressed mathematically?", "back": "$ 3 - 8 = -5^{\\circ} $"}, {"front": "If you descend $ 200 $ ft from an elevation of $ 150 $ ft above sea level, what is your new elevation?", "back": "$ -50 $ ft"}, {"front": "In geography, what does an elevation of $ -50 $ ft typically signify?", "back": "50 feet below sea level."}, {"front": "What are three common real-world applications of signed-number arithmetic mentioned in the text?", "back": "Temperature changes, elevation, and business profit/loss."}, {"front": "Concept: Opposite", "back": "Definition: The number that, when added to $ a $, results in $ 0 $ (e.g., the opposite of $ b $ is $ -b $)."}, {"front": "Rewrite the subtraction $ 7 - 12 $ as the addition of an opposite.", "back": "$ 7 + (-12) $"}, {"front": "Rewrite the subtraction $ -3 - 8 $ as the addition of an opposite.", "back": "$ -3 + (-8) $"}, {"front": "Rewrite the expression $ -5 - (-9) $ as addition.", "back": "$ -5 + 9 $"}, {"front": "When simplifying $ 15 + (-9) $, why is the final result positive?", "back": "Because the absolute value of $ 15 $ is greater than the absolute value of $ -9 $."}, {"front": "When simplifying $ (-7) + 4 $, why is the final result negative?", "back": "Because the absolute value of $ -7 $ is greater than the absolute value of $ 4 $."}, {"front": "The rules for adding and subtracting positive and negative numbers are derived directly from what mathematical tool?", "back": "The number line."}, {"front": "Simplify: $ (-10) + (-20) $.", "back": "$ -30 $"}, {"front": "Simplify: $ 25 + (-30) $.", "back": "$ -5 $"}, {"front": "Simplify: $ (-100) + 50 $.", "back": "$ -50 $"}, {"front": "Simplify: $ 0 - 8 $.", "back": "$ -8 $"}, {"front": "Simplify: $ -12 - (-12) $.", "back": "$ 0 $"}, {"front": "What is the opposite of $ -14 $?", "back": "$ 14 $"}, {"front": "What is the opposite of $ 12 $?", "back": "$ -12 $"}, {"front": "Solve: $ (-1) + (-2) + (-3) + (-4) $.", "back": "$ -10 $"}, {"front": "Solve: $ 5 + (-5) + 10 + (-10) $.", "back": "$ 0 $"}, {"front": "In the context of profit and loss, what would a 'loss' of $ \\$500 $ be represented as?", "back": "$ -500 $"}, {"front": "In the context of profit and loss, what would a 'profit' of $ \\$200 $ be represented as?", "back": "$ 200 $"}, {"front": "To subtract $ b $ from $ a $, you must _____ the _____ of $ b $.", "back": "add; opposite"}, {"front": "Simplify the expression: $ 10 - (-5) $.", "back": "$ 15 $"}, {"front": "Simplify the expression: $ -20 + 20 $.", "back": "$ 0 $"}, {"front": "If you have $ -9 + 12 $, which number's sign determines the sign of the sum?", "back": "$ 12 $"}, {"front": "If you have $ -15 + 10 $, which number's sign determines the sign of the sum?", "back": "$ -15 $"}, {"front": "What is the result of adding two negative numbers?", "back": "A negative number."}, {"front": "What is the result of adding two positive numbers?", "back": "A positive number."}, {"front": "Under what condition is the sum of a positive and a negative number equal to zero?", "back": "When the numbers have the same absolute value (they are opposites)."}, {"front": "When combining multiple real numbers, why is it helpful to group numbers with the same sign together?", "back": "It allows you to use the simpler 'same sign' addition rule before combining the final totals."}, {"front": "Simplify: $ (-5) + (-2) + 7 $.", "back": "$ 0 $"}, {"front": "Simplify: $ 8 - 10 + 2 $.", "back": "$ 0 $"}, {"front": "Translate to a math expression: A temperature of $ -4^{\\circ} $ rises by $ 10^{\\circ} $.", "back": "$ -4 + 10 $"}, {"front": "What is the final value of a temperature of $ -4^{\\circ} $ that rises by $ 10^{\\circ} $?", "back": "$ 6^{\\circ} $"}, {"front": "Translate to a math expression: An account starts at $ -\\$20 $ and $ \\$50 $ is deposited.", "back": "$ -20 + 50 $"}, {"front": "What is the result of $ -20 + 50 $?", "back": "$ 30 $"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
