<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the fundamental difference between algebra and arithmetic?", "back": "Algebra uses letters to represent numbers and describe general quantities, while arithmetic works with specific numbers."}, {"front": "Term: Variable", "back": "Definition: A letter or symbol that represents one or more numbers. Example: x, y, n, or t."}, {"front": "Term: Constant", "back": "Definition: A quantity whose value does not change. Example: 3, -7, or 12."}, {"front": "What is an algebraic expression?", "back": "A combination of variables, constants, and operations such as addition, subtraction, multiplication, division, and exponentiation."}, {"front": "Which mathematical operations can be part of an algebraic expression?", "back": "Addition, subtraction, multiplication, division, and exponentiation."}, {"front": "In an algebraic expression, what are the parts separated by addition or subtraction signs called?", "back": "Terms."}, {"front": "Identify the terms in the algebraic expression 3x + 5.", "back": "The terms are 3x and 5."}, {"front": "Term: Coefficient", "back": "Definition: The numerical factor multiplied by the variable(s) in a term."}, {"front": "What is the coefficient in the term 3x?", "back": "The coefficient is 3."}, {"front": "What is the numerical coefficient of a variable written alone, such as x?", "back": "The coefficient is 1."}, {"front": "What is the coefficient in the algebraic term -y?", "back": "The coefficient is -1."}, {"front": "What are the two main steps required to evaluate an algebraic expression?", "back": "Replace each variable with its given value and simplify using the order of operations."}, {"front": "What does the acronym PEMDAS stand for in the order of operations?", "back": "Parentheses, Exponents, Multiplication and Division, Addition and Subtraction."}, {"front": "In the PEMDAS hierarchy, which operations must be performed after Parentheses but before Multiplication?", "back": "Exponents."}, {"front": "According to the order of operations, in what order should Multiplication and Division be performed?", "back": "From left to right."}, {"front": "According to the order of operations, in what order should Addition and Subtraction be performed?", "back": "From left to right."}, {"front": "Evaluate the expression 3x² - 2x + 4 when x = 5.", "back": "69."}, {"front": "Evaluate the expression a + b/a - b when a = 7 and b = 3.", "back": "5/2 (or 2.5)."}, {"front": "Evaluate the expression 2n² + 3n - 1 when n = 4.", "back": "43."}, {"front": "Translate the verbal phrase \"three times a number\" into an algebraic expression using n.", "back": "3n."}, {"front": "Translate the verbal phrase \"seven more than\" into a mathematical operation.", "back": "Addition of 7."}, {"front": "Write an algebraic expression for the phrase: \"seven more than three times a number.\"", "back": "3n + 7."}, {"front": "Write an algebraic expression for the phrase: \"four less than five times a number.\"", "back": "5n - 4."}, {"front": "How does the phrase \"less than\" affect the order of terms in an algebraic subtraction expression?", "back": "It reverses the order of the numbers (e.g., \"five less than n\" is n - 5)."}, {"front": "Translate \"five less than a number\" into an algebraic expression.", "back": "n - 5."}, {"front": "Why is \"five less than a number\" not written as 5 - n?", "back": "The phrase \"less than\" reverses the order, indicating the 5 is being subtracted from n."}, {"front": "What is the advantage of choosing variables like t for time or d for distance?", "back": "Meaningful variables make equations easier to read and interpret."}, {"front": "The parts of the expression 2a² - 7b are 2a² and -7b. What is the specific name for these parts?", "back": "Terms."}, {"front": "In the algebraic expression n⁴ + 1, what is the constant?", "back": "1."}, {"front": "Cloze: To evaluate an expression, you replace each _____ with its given value.", "back": "variable"}, {"front": "What is the first step in simplifying 3(5)² - 2(5) + 4 using PEMDAS?", "back": "Evaluate the exponent (5²)."}, {"front": "Which operation in 75 - 10 + 4 should be performed first according to the order of operations?", "back": "Subtraction (75 - 10), because it appears first on the left."}, {"front": "What is the coefficient of the variable term in the expression x + 10?", "back": "1."}, {"front": "In the term 2a², what does the 2 represent?", "back": "The coefficient."}, {"front": "Identify the operation indicated by the phrase \"times a number.\"", "back": "Multiplication."}, {"front": "In algebra, what symbol is commonly used to represent an unknown quantity?", "back": "A variable (usually a letter)."}, {"front": "Is the number -7 considered a variable or a constant?", "back": "A constant."}, {"front": "What are grouping symbols (like parentheses) used for in algebra?", "back": "To indicate which operations should be performed first."}, {"front": "If x = 1x, what is the coefficient of x?", "back": "1."}, {"front": "What is the term for the numerical factor in 3x?", "back": "Coefficient."}, {"front": "Write an expression for \"the sum of a number n and 12.\"", "back": "n + 12."}, {"front": "Evaluate 3x + 5 when x = 2.", "back": "11."}, {"front": "In the expression 2a² - 7b, identify the variable(s).", "back": "a and b."}, {"front": "How many terms are in the expression n⁴ + 3n - 7?", "back": "Three."}, {"front": "What is the result of the exponentiation step when evaluating 3(5)²?", "back": "3(25) or 75."}, {"front": "Cloze: In the term -y, the coefficient is assumed to be _____.", "back": "-1"}, {"front": "In the expression 3x + 5, which part is the constant term?", "back": "5."}, {"front": "Translate into algebra: \"ten less than x.\"", "back": "x - 10."}, {"front": "Translate into algebra: \"the product of 4 and n.\"", "back": "4n."}, {"front": "In PEMDAS, what does the 'E' stand for?", "back": "Exponents."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
