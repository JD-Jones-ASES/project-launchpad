<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to the Commutative Property of Addition, $a + b$ is equal to which expression?", "back": "$b + a$", "id": "fc01"}, {"front": "What is the algebraic identity for the Commutative Property of Multiplication?", "back": "$ab = ba$", "id": "fc02"}, {"front": "Which property states that changing the order of two numbers being added does not change the sum?", "back": "Commutative Property of Addition", "id": "fc03"}, {"front": "The property illustrating that the order in which two numbers are multiplied does not affect the product is the _____ Property of Multiplication.", "back": "Commutative", "id": "fc04"}, {"front": "State the algebraic form of the Associative Property of Addition.", "back": "$(a + b) + c = a + (b + c)$", "id": "fc05"}, {"front": "State the algebraic form of the Associative Property of Multiplication.", "back": "$(ab)c = a(bc)$", "id": "fc06"}, {"front": "Which property states that changing the grouping of three numbers being added does not change the sum?", "back": "Associative Property of Addition", "id": "fc07"}, {"front": "The _____ Property of Multiplication allows for the regrouping of factors without changing the product.", "back": "Associative", "id": "fc08"}, {"front": "In the context of the Identity Properties, what is the 'identity' for addition?", "back": "$0$", "id": "fc09"}, {"front": "In the context of the Identity Properties, what is the 'identity' for multiplication?", "back": "$1$", "id": "fc10"}, {"front": "What is the result of the expression $a + 0$ according to the Additive Identity Property?", "back": "$a$", "id": "fc11"}, {"front": "According to the Multiplicative Identity Property, the product of any real number $a$ and $1$ is _____.", "back": "$a$", "id": "fc12"}, {"front": "Which property is illustrated by the equation $a + (-a) = 0$?", "back": "Inverse Property of Addition", "id": "fc13"}, {"front": "What term is used to describe the value $-a$ in the equation $a + (-a) = 0$?", "back": "Opposite (or Additive Inverse)", "id": "fc14"}, {"front": "State the algebraic form of the Inverse Property of Multiplication.", "back": "$a \\cdot \\frac{1}{a} = 1$", "id": "fc15"}, {"front": "Under what condition does the Multiplicative Inverse Property $a \\cdot \\frac{1}{a} = 1$ hold true?", "back": "$a \\ne 0$", "id": "fc16"}, {"front": "What term is used to describe the value $\\frac{1}{a}$ in the expression $a \\cdot \\frac{1}{a}$?", "back": "Reciprocal (or Multiplicative Inverse)", "id": "fc17"}, {"front": "The Distributive Property states that $a(b + c)$ is equal to which expression?", "back": "$ab + ac$", "id": "fc18"}, {"front": "Express the Distributive Property as it applies to subtraction: $a(b - c) = \\_\\_\\_\\_\\_$.", "back": "$ab - ac$", "id": "fc19"}, {"front": "Identify the property illustrated by the statement $5 + 3 = 3 + 5$.", "back": "Commutative Property of Addition", "id": "fc20"}, {"front": "Identify the property illustrated by the statement $4(x + 7) = 4x + 28$.", "back": "Distributive Property", "id": "fc21"}, {"front": "Identify the property illustrated by the statement $(2 \\cdot 6) \\cdot 3 = 2 \\cdot (6 \\cdot 3)$.", "back": "Associative Property of Multiplication", "id": "fc22"}, {"front": "Identify the property illustrated by the statement $9 + 0 = 9$.", "back": "Additive Identity Property", "id": "fc23"}, {"front": "Identify the property illustrated by the statement $x \\cdot 1 = x$.", "back": "Multiplicative Identity Property", "id": "fc24"}, {"front": "Identify the property illustrated by the statement $y + (-y) = 0$.", "back": "Inverse Property of Addition", "id": "fc25"}, {"front": "Identify the property illustrated by the statement $7 \\cdot \\frac{1}{7} = 1$.", "back": "Inverse Property of Multiplication", "id": "fc26"}, {"front": "Why is subtraction considered a non-commutative operation?", "back": "Changing the order of the numbers changes the result (e.g., $8 - 3 \\ne 3 - 8$).", "id": "fc27"}, {"front": "Why is division considered a non-commutative operation?", "back": "Changing the order of the numbers changes the result (e.g., $12 \\div 4 \\ne 4 \\div 12$).", "id": "fc28"}, {"front": "Using the Distributive Property, expand $3(2x + 5)$.", "back": "$6x + 15$", "id": "fc29"}, {"front": "When simplifying $3(2x + 5) - 4x$, what is the result after combining like terms?", "back": "$2x + 15$", "id": "fc30"}, {"front": "Simplify the expression $5(n - 3) + 2n$ completely.", "back": "$7n - 15$", "id": "fc31"}, {"front": "In the expression $5(n - 3) + 2n$, what is the first step in the simplification process?", "back": "Distribute $5$ to $(n - 3)$.", "id": "fc32"}, {"front": "Concept: Commutative Property", "back": "Definition: A property where the order of operands does not change the result. Example: $a + b = b + a$.", "id": "fc33"}, {"front": "Concept: Associative Property", "back": "Definition: A property where the grouping of operands does not change the result. Example: $(ab)c = a(bc)$.", "id": "fc34"}, {"front": "Concept: Identity Property", "back": "Definition: A property involving an element that, when combined with a number, leaves the number unchanged. Example: $a \\cdot 1 = a$.", "id": "fc35"}, {"front": "Concept: Inverse Property", "back": "Definition: A property where an element combined with its opposite or reciprocal yields the identity. Example: $a + (-a) = 0$.", "id": "fc36"}, {"front": "True or False: The Associative Property applies to subtraction.", "back": "False", "id": "fc37"}, {"front": "True or False: The Distributive Property relates multiplication to both addition and subtraction.", "back": "True", "id": "fc38"}, {"front": "What is the sum of any real number and its opposite?", "back": "$0$", "id": "fc39"}, {"front": "What is the product of any non-zero real number and its reciprocal?", "back": "$1$", "id": "fc40"}, {"front": "The property that allows you to 'pass out' a factor to terms inside parentheses is the _____ Property.", "back": "Distributive", "id": "fc41"}, {"front": "Which specific property justifies the step: $6x + 15 - 4x = (6x - 4x) + 15$?", "back": "Commutative Property of Addition (reordering terms)", "id": "fc42"}, {"front": "The equation $x + (y + z) = (x + y) + z$ is an instance of the _____ Property of Addition.", "back": "Associative", "id": "fc43"}, {"front": "The equation $x + y = y + x$ is an instance of the _____ Property of Addition.", "back": "Commutative", "id": "fc44"}, {"front": "If $x = 10$, what is its multiplicative inverse?", "back": "$\\frac{1}{10}$", "id": "fc45"}, {"front": "If $x = -5$, what is its additive inverse?", "back": "$5$", "id": "fc46"}, {"front": "Term: Additive Identity", "back": "Definition: The number $0$, which when added to any real number, results in the original number.", "id": "fc47"}, {"front": "Term: Multiplicative Identity", "back": "Definition: The number $1$, which when multiplied by any real number, results in the original number.", "id": "fc48"}, {"front": "Term: Reciprocal", "back": "Definition: The multiplicative inverse of a non-zero number $a$, denoted as $\\frac{1}{a}$.", "id": "fc49"}, {"front": "Term: Opposite", "back": "Definition: The additive inverse of a number $a$, denoted as $-a$.", "id": "fc50"}, {"front": "According to the text, knowing properties by name helps you to _____ each step of your work.", "back": "justify", "id": "fc51"}, {"front": "Which two arithmetic operations are specifically noted as NOT being commutative?", "back": "Subtraction and division", "id": "fc52"}, {"front": "Provide a numerical counterexample for the Commutative Property of Division.", "back": "$12 \\div 4 = 3$, but $4 \\div 12 = \\frac{1}{3}$.", "id": "fc53"}, {"front": "Simplify: $2(3x - 4) + 5$.", "back": "$6x - 3$", "id": "fc54"}, {"front": "Which property allows us to say that $x(y)$ is the same as $y(x)$?", "back": "Commutative Property of Multiplication", "id": "fc55"}, {"front": "Which property allows us to say that $3 + (x + 2)$ is the same as $(3 + x) + 2$?", "back": "Associative Property of Addition", "id": "fc56"}, {"front": "What property justifies: $5x + 0 = 5x$?", "back": "Additive Identity Property", "id": "fc57"}, {"front": "What property justifies: $10 \\cdot 1 = 10$?", "back": "Multiplicative Identity Property", "id": "fc58"}, {"front": "State the result of $a(b - c + d)$ using the Distributive Property.", "back": "$ab - ac + ad$", "id": "fc59"}, {"front": "The sum of a number and its _____ is always zero.", "back": "additive inverse (or opposite)", "id": "fc60"}, {"front": "The product of a non-zero number and its _____ is always one.", "back": "multiplicative inverse (or reciprocal)", "id": "fc61"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
