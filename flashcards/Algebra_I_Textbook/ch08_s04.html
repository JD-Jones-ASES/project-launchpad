<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 8, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In the context of quadratic equations, what is the term for the expression $b^2 - 4ac$?", "back": "Discriminant", "id": "fc01"}, {"front": "For the quadratic equation $ax^2 + bx + c = 0$, what is the formula for the discriminant?", "back": "$b^2 - 4ac$", "id": "fc02"}, {"front": "What condition must be met by the coefficient $a$ in the equation $ax^2 + bx + c = 0$ to use the discriminant?", "back": "$a \\neq 0$", "id": "fc03"}, {"front": "Where is the discriminant located in the quadratic formula?", "back": "Under the radical sign", "id": "fc04"}, {"front": "What does the value of the discriminant determine regarding the solutions of a quadratic equation?", "back": "The number and type of solutions", "id": "fc05"}, {"front": "If the discriminant is positive ($b^2 - 4ac > 0$), how many real solutions does the equation have?", "back": "Two real solutions", "id": "fc06"}, {"front": "If the discriminant equals zero ($b^2 - 4ac = 0$), how many real solutions exist?", "back": "Exactly one real solution", "id": "fc07"}, {"front": "If the discriminant is negative ($b^2 - 4ac < 0$), how many real solutions are there?", "back": "No real solutions", "id": "fc08"}, {"front": "When the discriminant is a positive perfect square, what specific type of real numbers are the solutions?", "back": "Rational numbers", "id": "fc09"}, {"front": "A quadratic equation $ax^2 + bx + c = 0$ can be solved by factoring over the integers if the discriminant is a _____.", "back": "Positive perfect square", "id": "fc10"}, {"front": "What is the value of the discriminant for the equation $x^2 - 6x + 9 = 0$?", "back": "$0$", "id": "fc11"}, {"front": "How many real solutions does the equation $x^2 - 6x + 9 = 0$ have?", "back": "Exactly one real solution", "id": "fc12"}, {"front": "Identify the values of $a$, $b$, and $c$ for the equation $2x^2 + 3x - 5 = 0$.", "back": "$a = 2, b = 3, c = -5$", "id": "fc13"}, {"front": "What is the calculated value of the discriminant for $2x^2 + 3x - 5 = 0$?", "back": "$49$", "id": "fc14"}, {"front": "Given that the discriminant of $2x^2 + 3x - 5 = 0$ is $49$, are the solutions rational or irrational?", "back": "Rational solutions", "id": "fc15"}, {"front": "What is the discriminant for the equation $x^2 + x + 1 = 0$?", "back": "$-3$", "id": "fc16"}, {"front": "Why does the equation $x^2 + x + 1 = 0$ have no real solutions?", "back": "The discriminant is less than zero", "id": "fc17"}, {"front": "Calculate the discriminant for $6x^2 + x - 2 = 0$.", "back": "$49$", "id": "fc18"}, {"front": "Does the quadratic $6x^2 + x - 2 = 0$ factor over the integers?", "back": "Yes, because the discriminant is a positive perfect square", "id": "fc19"}, {"front": "What are the integer-based factors of $6x^2 + x - 2$?", "back": "$(2x - 1)(3x + 2)$", "id": "fc20"}, {"front": "Calculate the discriminant for $3x^2 - 4x + 5 = 0$.", "back": "$-44$", "id": "fc21"}, {"front": "How many real solutions does $3x^2 - 4x + 5 = 0$ have?", "back": "No real solutions", "id": "fc22"}, {"front": "To find a parameter $k$ such that $x^2 + kx + 9 = 0$ has exactly one solution, what value must the discriminant be set to?", "back": "$0$", "id": "fc23"}, {"front": "For the equation $x^2 + kx + 9 = 0$, express the discriminant in terms of $k$.", "back": "$k^2 - 36$", "id": "fc24"}, {"front": "What are the two possible values of $k$ that make $x^2 + kx + 9 = 0$ have one real solution?", "back": "$k = 6$ and $k = -6$", "id": "fc25"}, {"front": "Which solution method should be used when the equation factors easily over the integers?", "back": "Factoring", "id": "fc26"}, {"front": "Which method is best for solving a quadratic equation with no linear term ($b = 0$)?", "back": "Square Root Property", "id": "fc27"}, {"front": "Under what condition is the Square Root Property most efficient for equations of the form $(ax + b)^2 = k$?", "back": "When there is no isolated linear term", "id": "fc28"}, {"front": "Which method for solving quadratic equations always works regardless of the coefficients?", "back": "Quadratic Formula", "id": "fc29"}, {"front": "When should the Quadratic Formula be preferred over factoring?", "back": "When factoring is difficult or solutions involve radicals", "id": "fc30"}, {"front": "In the equation $ax^2 + bx + c = 0$, what is the 'linear term'?", "back": "$bx$", "id": "fc31"}, {"front": "How can you quickly check if a quadratic is solvable by factoring?", "back": "Check if the discriminant is a perfect square", "id": "fc32"}, {"front": "The discriminant determines the nature of the roots and the _____ of the corresponding parabola.", "back": "Shape", "id": "fc33"}, {"front": "True or False: The discriminant allows you to find the number of solutions without solving the equation.", "back": "True", "id": "fc34"}, {"front": "What is the discriminant value if $a=1, b=1, c=1$?", "back": "$-3$", "id": "fc35"}, {"front": "What is the discriminant value if $a=6, b=1, c=-2$?", "back": "$49$", "id": "fc36"}, {"front": "What is the discriminant value if $a=1, b=-6, c=9$?", "back": "$0$", "id": "fc37"}, {"front": "If $D = 49$, how many distinct rational solutions exist?", "back": "Two distinct rational solutions", "id": "fc38"}, {"front": "If the discriminant of a quadratic is $49$, can it be factored over the integers?", "back": "Yes", "id": "fc39"}, {"front": "If a quadratic equation is in the form $(ax + b)^2 = k$, which method is most efficient?", "back": "Square Root Property", "id": "fc40"}, {"front": "If a discriminant is negative, the equation has _____ solutions in the real number system.", "back": "Zero", "id": "fc41"}, {"front": "In the discriminant formula, what does the term 'c' represent?", "back": "The constant term", "id": "fc42"}, {"front": "In the discriminant formula, what does the term 'b' represent?", "back": "The coefficient of the linear term ($x$)", "id": "fc43"}, {"front": "In the discriminant formula, what does the term 'a' represent?", "back": "The coefficient of the squared term ($x^2$)", "id": "fc44"}, {"front": "If $b^2 - 4ac$ is not a perfect square but is greater than zero, what type of real solutions exist?", "back": "Irrational solutions", "id": "fc45"}, {"front": "Is it possible for a discriminant to be negative and still have real solutions?", "back": "No", "id": "fc46"}, {"front": "Calculate $D$ for $x^2 + 5x + 6 = 0$.", "back": "$1$", "id": "fc47"}, {"front": "Since the discriminant of $x^2 + 5x + 6 = 0$ is $1$, which is a perfect square, what method is efficient?", "back": "Factoring", "id": "fc48"}, {"front": "In Algebra II, the discriminant helps distinguish between real and _____ roots.", "back": "Complex", "id": "fc49"}, {"front": "Identify $a$ in $3x^2 - 4x + 5 = 0$.", "back": "$3$", "id": "fc50"}, {"front": "Identify $b$ in $3x^2 - 4x + 5 = 0$.", "back": "$-4$", "id": "fc51"}, {"front": "Identify $c$ in $3x^2 - 4x + 5 = 0$.", "back": "$5$", "id": "fc52"}, {"front": "If $k^2 - 36 = 0$, what are the values of $k$?", "back": "$6$ and $-6$", "id": "fc53"}, {"front": "What is the discriminant of $x^2 + 0x - 4 = 0$?", "back": "$16$", "id": "fc54"}, {"front": "Does $x^2 - 4 = 0$ have rational or irrational solutions based on its discriminant ($16$)?", "back": "Rational solutions", "id": "fc55"}, {"front": "What is the discriminant of $x^2 + 2x + 1 = 0$?", "back": "$0$", "id": "fc56"}, {"front": "How many real solutions does $x^2 + 2x + 1 = 0$ have?", "back": "Exactly one real solution", "id": "fc57"}, {"front": "If $D = 12$, how many real solutions exist?", "back": "Two real solutions", "id": "fc58"}, {"front": "If $D = 12$, will the solutions be rational or irrational?", "back": "Irrational (since 12 is not a perfect square)", "id": "fc59"}, {"front": "The Square Root Property is best used when there is no _____ term.", "back": "Linear", "id": "fc60"}, {"front": "Which value of the discriminant indicates that the quadratic is a perfect square trinomial?", "back": "$0$", "id": "fc61"}, {"front": "For $ax^2 + bx + c = 0$, if $a, b,$ and $c$ are integers and the discriminant is $25$, is the quadratic factorable?", "back": "Yes", "id": "fc62"}, {"front": "What is the primary goal of Section 8-4 in the text?", "back": "Using the discriminant to determine the number and type of solutions", "id": "fc63"}, {"front": "The expression $b^2 - 4ac$ determines the number of real solutions without actually _____ the equation.", "back": "Solving", "id": "fc64"}, {"front": "If $a=2, b=3, c=-5$, calculate $b^2$.", "back": "$9$", "id": "fc65"}, {"front": "If $a=2, b=3, c=-5$, calculate $-4ac$.", "back": "$40$", "id": "fc66"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
