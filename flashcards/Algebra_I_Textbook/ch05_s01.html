<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the definition of a system of linear equations?", "back": "A set of two or more linear equations that use the same variables.", "id": "fc01"}, {"front": "What is the standard algebraic form of a system with two equations and two variables?", "back": "$\\begin{cases} a_1 x + b_1 y = c_1 \\\\ a_2 x + b_2 y = c_2 \\end{cases}$", "id": "fc02"}, {"front": "In the system form $\\begin{cases} a_1 x + b_1 y = c_1 \\\\ a_2 x + b_2 y = c_2 \\end{cases}$, what do the symbols $a_1, b_1, c_1, a_2, b_2, c_2$ represent?", "back": "Real-number constants.", "id": "fc03"}, {"front": "What constitutes a solution for a system of two equations in two variables?", "back": "An ordered pair $(x, y)$ that makes both equations true.", "id": "fc04"}, {"front": "Graphically, what represents the solution of a system of two linear equations?", "back": "The point where the two lines intersect.", "id": "fc05"}, {"front": "How many solutions does a system have if the lines intersect at exactly one point?", "back": "One solution.", "id": "fc06"}, {"front": "How is a system classified if it has exactly one solution?", "back": "Consistent and independent.", "id": "fc07"}, {"front": "How many solutions does a system have if the lines are parallel?", "back": "No solution.", "id": "fc08"}, {"front": "How is a system classified if it has no solution?", "back": "Inconsistent.", "id": "fc09"}, {"front": "How many solutions does a system have if the equations describe the same line?", "back": "Infinitely many solutions.", "id": "fc10"}, {"front": "How is a system classified if the lines are the same?", "back": "Consistent and dependent.", "id": "fc11"}, {"front": "In a system with no solution, how do the slopes of the lines compare?", "back": "The slopes are the same.", "id": "fc12"}, {"front": "In a system with no solution, how do the $y$-intercepts of the lines compare?", "back": "The $y$-intercepts are different.", "id": "fc13"}, {"front": "A consistent and dependent system has lines with the same slope and the _____ $y$-intercept.", "back": "Same", "id": "fc14"}, {"front": "What is the first step in solving a system of equations by graphing?", "back": "Graph each equation on the same coordinate plane.", "id": "fc15"}, {"front": "Solve the system $\\begin{cases} y = 2x - 1 \\\\ y = -x + 5 \\end{cases}$ by identifying the intersection point.", "back": "$(2, 3)$", "id": "fc16"}, {"front": "What is the slope of the line $y = 2x - 1$?", "back": "$2$", "id": "fc17"}, {"front": "What is the $y$-intercept of the line $y = -x + 5$?", "back": "$(0, 5)$", "id": "fc18"}, {"front": "If a system's lines have different slopes, how many intersection points exist?", "back": "Exactly one point.", "id": "fc19"}, {"front": "How is the system $\\begin{cases} y = 3x + 2 \\\\ y = 3x - 4 \\end{cases}$ classified?", "back": "Inconsistent.", "id": "fc20"}, {"front": "Why does the system $\\begin{cases} y = 3x + 2 \\\\ y = 3x - 4 \\end{cases}$ have no solution?", "back": "The lines are parallel and never intersect.", "id": "fc21"}, {"front": "What should be done after estimating a solution from a graph?", "back": "Check the answer by substituting it into both original equations.", "id": "fc22"}, {"front": "When is graphing most likely to provide only an approximate answer?", "back": "When the intersection point has fractional coordinates.", "id": "fc23"}, {"front": "To identify slopes and intercepts easily, equations like $2x + y = 4$ should be written in _____ form.", "back": "Slope-intercept", "id": "fc24"}, {"front": "What is the slope-intercept form of the equation $2x + y = 4$?", "back": "$y = -2x + 4$", "id": "fc25"}, {"front": "What is the slope-intercept form of the equation $4x + 2y = 8$?", "back": "$y = -2x + 4$", "id": "fc26"}, {"front": "How is the system $\\begin{cases} 2x + y = 4 \\\\ 4x + 2y = 8 \\end{cases}$ classified?", "back": "Consistent and dependent.", "id": "fc27"}, {"front": "Solve the checkpoint system $\\begin{cases} y = x + 1 \\\\ y = -2x + 7 \\end{cases}$ by graphing.", "back": "$(2, 3)$", "id": "fc28"}, {"front": "Term: Consistent System", "back": "Definition: A system of equations that has at least one solution.", "id": "fc29"}, {"front": "Term: Inconsistent System", "back": "Definition: A system of equations that has no solution.", "id": "fc30"}, {"front": "Term: Independent System", "back": "Definition: A consistent system that has exactly one solution.", "id": "fc31"}, {"front": "Term: Dependent System", "back": "Definition: A consistent system that has infinitely many solutions.", "id": "fc32"}, {"front": "In an independent system, how many times do the lines cross?", "back": "Exactly once.", "id": "fc33"}, {"front": "In a dependent system, which points on the line are solutions?", "back": "Every point on the line.", "id": "fc34"}, {"front": "If two lines in a system have the same slope, what are the two possible number of solutions?", "back": "No solution or infinitely many solutions.", "id": "fc35"}, {"front": "In the check for $(2, 3)$ in $y = 2x - 1$, what is the result of $2(2) - 1$?", "back": "$3$", "id": "fc36"}, {"front": "In the check for $(2, 3)$ in $y = -x + 5$, what is the result of $-(2) + 5$?", "back": "$3$", "id": "fc37"}, {"front": "When graphing, where is the solution located if the system is consistent and independent?", "back": "At the point of intersection.", "id": "fc38"}, {"front": "A system is _____ if the lines have the same slope and same $y$-intercept.", "back": "Dependent (or Consistent and dependent)", "id": "fc39"}, {"front": "A system is _____ if the lines have different slopes.", "back": "Independent (or Consistent and independent)", "id": "fc40"}, {"front": "What type of answers do algebraic methods (Sections 5-2 and 5-3) provide compared to graphing?", "back": "Exact answers.", "id": "fc41"}, {"front": "What is the $y$-intercept of the line $y = 2x - 1$?", "back": "$(0, -1)$", "id": "fc42"}, {"front": "What is the slope of the line $y = -x + 5$?", "back": "$-1$", "id": "fc43"}, {"front": "What condition regarding $y$-intercepts makes two lines with the same slope parallel?", "back": "They must have different $y$-intercepts.", "id": "fc44"}, {"front": "What condition regarding $y$-intercepts makes two lines with the same slope the same line?", "back": "They must have the same $y$-intercept.", "id": "fc45"}, {"front": "What is the number of solutions for two lines with different slopes?", "back": "One solution.", "id": "fc46"}, {"front": "The system $\\begin{cases} y = 3x + 2 \\\\ y = 3x - 4 \\end{cases}$ has slopes of _____.", "back": "$3$", "id": "fc47"}, {"front": "The system $\\begin{cases} y = 3x + 2 \\\\ y = 3x - 4 \\end{cases}$ has $y$-intercepts of _____ and _____.", "back": "$2$ and $-4$", "id": "fc48"}, {"front": "Which classification applies to a system where the lines are parallel?", "back": "Inconsistent.", "id": "fc49"}, {"front": "Which classification applies to a system where the lines intersect once?", "back": "Consistent and independent.", "id": "fc50"}, {"front": "Which classification applies to a system where the lines are identical?", "back": "Consistent and dependent.", "id": "fc51"}, {"front": "What must you do to confirm that $(2, 3)$ is the solution to $y = x + 1$ and $y = -2x + 7$?", "back": "Substitute $(2, 3)$ into both original equations to see if they are true.", "id": "fc52"}, {"front": "If $2x + y = 4$ and $4x + 2y = 8$ are graphed, how many lines will appear on the coordinate plane?", "back": "One line.", "id": "fc53"}, {"front": "An ordered pair that makes only one of the two equations in a system true is _____ a solution of the system.", "back": "Not", "id": "fc54"}, {"front": "Why is graphing considered an estimation method for systems?", "back": "Because the intersection point may be difficult to read accurately, especially with fractions.", "id": "fc55"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
