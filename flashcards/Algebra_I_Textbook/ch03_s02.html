<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra: The First Year &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Textbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Which operations are used to isolate the variable when solving a multi-step inequality?", "back": "Inverse operations."}, {"front": "How does the process of solving an inequality generally compare to solving an equation?", "back": "It is very similar, primarily using inverse operations to isolate the variable."}, {"front": "According to the Addition Property of Inequality, if a < b, then a + c < ____.", "back": "b + c"}, {"front": "According to the Subtraction Property of Inequality, if a < b, then a - c < ____.", "back": "b - c"}, {"front": "True or False: Adding or subtracting the same number on both sides of an inequality changes the direction of the symbol.", "back": "False."}, {"front": "Under the Multiplication Property, if c > 0 and a < b, then ac ____ bc.", "back": "<"}, {"front": "Under the Multiplication Property, if c < 0 and a < b, then ac ____ bc.", "back": ">"}, {"front": "What action requires the reversal of the inequality symbol when solving an inequality?", "back": "Multiplying or dividing both sides by a negative number."}, {"front": "According to the text, what is one of the most common errors in algebra regarding inequalities?", "back": "Forgetting to reverse the inequality symbol when multiplying or dividing by a negative number."}, {"front": "If you divide both sides of -2x > 6 by -2, what is the resulting inequality?", "back": "x < -3"}, {"front": "What is the first step to solve the inequality $3x - 7 > 5$?", "back": "Add 7 to both sides."}, {"front": "Solve the inequality $3x > 12forx$.", "back": "x > 4"}, {"front": "What is the interval notation for the solution x > 4?", "back": "(4, ∞)"}, {"front": "What is the first step to solve the inequality -4x + 3 le 19?", "back": "Subtract 3 from both sides."}, {"front": "When solving -4x le 16, what results from dividing both sides by -4?", "back": "x ge -4"}, {"front": "What is the interval notation for the solution x ge -4?", "back": "[-4, ∞)"}, {"front": "Solve the inequality -2x + 5 > 13.", "back": "x < -4"}, {"front": "Write the solution x < -4 in interval notation.", "back": "(-∞, -4)"}, {"front": "Which property should be used first to solve 2(3x - 1) - 4x le 10?", "back": "The distributive property."}, {"front": "What is the result of distributing the 2 in the expression 2(3x - 1) - 4x?", "back": "6x - 2 - 4x"}, {"front": "After distributing, what is the result of combining like terms in 6x - 2 - 4x le 10?", "back": "2x - 2 le 10"}, {"front": "What is the final inequality solution for 2x - 2 le 10?", "back": "x le 6"}, {"front": "What is the interval notation for the solution x le 6?", "back": "(-∞, 6]"}, {"front": "Solve the checkpoint inequality $5 - 3(2x + 1) < 8$.", "back": "x > -1"}, {"front": "What is the simplified form of $5 - 3(2x + 1) < 8after distributing the-3$?", "back": "$5 - 6x - 3 < 8$"}, {"front": "What is the result of combining the constant terms in $5 - 6x - 3 < 8$?", "back": "$2 - 6x < 8$"}, {"front": "After subtracting 2 from both sides of $2 - 6x < 8$, what is the resulting inequality?", "back": "-6x < 6"}, {"front": "What is the interval notation for the solution x > -1?", "back": "(-1, ∞)"}, {"front": "List the three procedural steps to solve a multi-step inequality as described in the chapter note.", "back": "Use the distributive property, combine like terms, and apply inverse operations."}, {"front": "If a < b and c < 0, then a/c ____ b/c.", "back": ">"}, {"front": "If a < b and c > 0, then a/c ____ b/c.", "back": "<"}, {"front": "What is the name of the property that states adding the same number to both sides of an inequality preserves the inequality?", "back": "Addition Property of Inequality."}, {"front": "When graphing the solution x > 4, does the point 4 on the number line get a solid or an open circle?", "back": "An open circle."}, {"front": "When graphing the solution x le 6, does the point 6 on the number line get a solid circle or an open circle?", "back": "A solid circle."}, {"front": "In interval notation, which symbol represents that an endpoint is NOT included in the solution set?", "back": "Parenthesis ( or )."}, {"front": "In interval notation, which symbol represents that an endpoint IS included in the solution set?", "back": "Bracket [ or ]."}, {"front": "Solve the inequality: x + 5 < 12.", "back": "x < 7"}, {"front": "Solve the inequality: x - 3 ge 10.", "back": "x ge 13"}, {"front": "What is the next step to isolate x in the inequality 2x le 12?", "back": "Divide both sides by 2."}, {"front": "What is the solution for -x > 5?", "back": "x < -5"}, {"front": "The inequality 2x - 2 + 2 le 10 + 2 is an application of which property?", "back": "Addition Property of Inequality."}, {"front": "Does multiplying an inequality by a positive fraction change the direction of the symbol?", "back": "No."}, {"front": "Does dividing an inequality by a negative decimal change the direction of the symbol?", "back": "Yes."}, {"front": "Term: Interval Notation.", "back": "Definition: A way to write the solution set of an inequality using brackets or parentheses and the endpoints of the interval."}, {"front": "If you multiply both sides of x < y by c = -1, what is the result?", "back": "-x > -y"}, {"front": "To solve $5 - 6x < 8, you first subtract5to get-6x < 3$. What is the final step?", "back": "Divide both sides by -6 and reverse the inequality symbol."}, {"front": "In interval notation, the symbol for infinity is always enclosed by a ____.", "back": "Parenthesis."}, {"front": "What is the inequality form of the interval notation (-∞, -4)?", "back": "x < -4"}, {"front": "What is the inequality form of the interval notation [6, ∞)?", "back": "x ge 6"}, {"front": "The property stating that if a < b, then a - c < b - c is the ____ Property of Inequality.", "back": "Subtraction"}, {"front": "When using the Multiplication Property of Inequality with a negative number, the symbol < becomes ____.", "back": ">"}, {"front": "When using the Multiplication Property of Inequality with a negative number, the symbol le becomes ____.", "back": "ge"}, {"front": "What is the result of -4x / -4 when solving -4x le 16?", "back": "x"}, {"front": "How many steps are generally involved in solving 2(3x - 1) - 4x le 10 as shown in the text?", "back": "Four steps (distribute, combine terms, add constant, divide)."}, {"front": "The distributive property is used to remove ____ when solving an inequality.", "back": "Parentheses."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
