<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Math: Practical Applications &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Business Math: Practical Applications &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Business_Math">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is 'markup'?", "back": "Markup is the amount added to the cost of an item to determine its selling price. (Selling Price = Cost + Markup)"}, {"front": "How do you calculate the markup amount if you know the selling price and cost?", "back": "Markup = Selling Price - Cost."}, {"front": "What are the two common bases used to express 'percent markup' in business?", "back": "Percent markup can be expressed as a percent of cost or as a percent of selling price."}, {"front": "How is 'percent markup on cost' calculated?", "back": "Percent markup on cost = (Markup / Cost) * 100%."}, {"front": "What is the formula to find the selling price when you know the cost and the markup rate on cost?", "back": "Selling Price = Cost * (1 + markup rate)."}, {"front": "How is 'percent markup on selling price' calculated?", "back": "Percent markup on selling price = (Markup / Selling Price) * 100%."}, {"front": "What is the formula to find the selling price when you know the cost and the markup rate on selling price?", "back": "Selling Price = Cost / (1 - markup rate)."}, {"front": "A store buys a jacket for $45.00 and marks it up 60% on cost. What is the selling price?", "back": "Markup = 45.00 * 0.60 =27.00. Selling Price = 45.00 +27.00 = $72.00. (Alternatively: 45.00 * (1 + 0.60) =72.00)."}, {"front": "A retailer wants a 40% markup on selling price. If an item costs $36.00, what should the selling price be?", "back": "Selling Price = Cost / (1 - markup rate) = 36.00 / (1 - 0.40) =36.00 / 0.60 = $60.00."}, {"front": "A pair of shoes sells for $85.00 after a 70% markup on cost. What was the original cost?", "back": "Selling Price = Cost * (1 + markup rate) => $85.00 = Cost * (1 + 0.70) => Cost = 85.00 / 1.70 =50.00."}, {"front": "If an item costs $50, which would result in a higher selling price: '40% markup on cost' or '40% markup on selling price'?", "back": "'40% markup on selling price' results in a higher selling price. (50 / (1 - 0.40) =83.33) compared to '40% markup on cost' (50 * (1 + 0.40) =70.00)."}, {"front": "What is a 'markdown,' also known as a discount?", "back": "A markdown is a reduction from the original selling price. (Sale Price = Original Price - Markdown Amount)."}, {"front": "How is 'percent markdown' calculated?", "back": "Percent markdown = (Markdown Amount / Original Price) * 100%."}, {"front": "What is the formula to find the sale price when you know the original price and the markdown rate?", "back": "Sale Price = Original Price * (1 - markdown rate)."}, {"front": "A $120.00 pair of boots is marked down 25%. What is the sale price?", "back": "Sale Price = 120.00 * (1 - 0.25) =120.00 * 0.75 = $90.00."}, {"front": "What are 'successive markdowns'?", "back": "Successive markdowns occur when an item is discounted more than once, with each discount applied to the most recent (reduced) price."}, {"front": "What is the formula for calculating the final price after two successive markdowns with rates d1 and d2 (as decimals)?", "back": "Final Price = Original Price * (1 - d1) * (1 - d2)."}, {"front": "Is a single markdown of 35% the same as two successive markdowns of 20% and 15%? Explain.", "back": "No, they are not the same. Successive markdowns apply each discount to the *reduced* price, resulting in a smaller overall discount than a single markdown of the summed rates. For example, 200 * (1-0.20)*(1-0.15) =136, but 200 * (1-0.35) =130."}, {"front": "A $200.00 coat is first marked down 20%, then an additional 15% off the reduced price. What is the final price?", "back": "Final Price = 200.00 * (1 - 0.20) * (1 - 0.15) =200.00 * 0.80 * 0.85 = $136.00."}, {"front": "What are 'fixed costs' in business?", "back": "Fixed costs are expenses that remain constant regardless of the number of units produced or sold (e.g., rent, insurance, salaries)."}, {"front": "What are 'variable costs' in business?", "back": "Variable costs are expenses that change in direct proportion to the number of units produced or sold (e.g., materials, packaging, shipping per unit)."}, {"front": "How do you calculate the total cost for a business?", "back": "Total Cost = Fixed Costs + (Variable Cost per Unit * Quantity)."}, {"front": "What is 'revenue,' and how is it calculated?", "back": "Revenue is the total income from selling a product. Revenue = Selling Price per Unit * Quantity."}, {"front": "What is the 'break-even point'?", "back": "The break-even point is the number of units at which total revenue equals total cost, meaning the business makes neither a profit nor a loss."}, {"front": "What is the formula to calculate the break-even quantity (Q)?", "back": "Q = Fixed Costs / (Price per Unit - Variable Cost per Unit)."}, {"front": "What is the term for the denominator in the break-even quantity formula (Price per Unit - Variable Cost per Unit)?", "back": "This is called the 'contribution margin per unit'."}, {"front": "A company has fixed costs of 12,000.00 per month. Each unit costs8.00 to produce and sells for $20.00. What is the break-even quantity?", "back": "Q = 12,000 / (20.00 - 8.00) =12,000 / $12.00 = 1,000 units."}, {"front": "What is the formula for calculating profit?", "back": "Profit = Revenue - Total Cost, or Profit = (Price per Unit - Variable Cost per Unit) * Quantity - Fixed Costs."}, {"front": "How does the number of units sold relate to profit or loss in terms of the break-even point?", "back": "Profit is positive when sales exceed the break-even point. Profit is negative (a loss) when sales are below the break-even point."}, {"front": "Using the break-even example (Fixed Costs 12,000, Variable Cost8, Price $20), what is the profit or loss if 800 units are sold?", "back": "Profit = (20 -8) * 800 - 12,000 =12 * 800 - 12,000 =9,600 - 12,000 = -2,400 (a loss)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
