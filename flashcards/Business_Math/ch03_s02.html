<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Math: Practical Applications &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Business Math: Practical Applications &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Business_Math">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is proportional reasoning in a business context?", "back": "It's a practical math skill used for tasks like comparing unit prices, scaling recipes, converting currencies, estimating defect rates, and working with production ratios, all relying on the principles of ratios and proportions."}, {"front": "Name three common business applications where proportional reasoning is essential.", "back": "Best-buy comparisons (unit price), recipe scaling for catering, currency exchange, quality control sampling, production ratios, and using blueprint scales."}, {"front": "How is 'unit price' defined when making business purchase decisions?", "back": "The unit price is the price per single unit of measure for a product (e.g., price per ounce, price per ream, price per piece)."}, {"front": "What is the primary method for finding the 'best buy' when comparing the same product sold in different package sizes?", "back": "Calculate the unit price for each option and then compare them to find the lowest unit price."}, {"front": "Oakdale Office Supplies sees copy paper option A: 5 reams for $24.95, and option B: 10 reams for $44.90. Which has the lower unit price?", "back": "Option A: $24.95 / 5 reams = $4.99 per ream. Option B: $44.90 / 10 reams = $4.49 per ream. Option B has the lower unit price."}, {"front": "Why are grocery stores often legally required to display unit prices on shelf labels?", "back": "To make it easier for shoppers to compare products and make informed purchasing decisions, directly applying the unit rate concept."}, {"front": "What is a 'scaling factor' in the context of adjusting a recipe for different serving sizes?", "back": "It's the ratio of the desired number of servings to the original number of servings. Each ingredient quantity is multiplied by this factor."}, {"front": "Chef Ramirez's chili recipe serves 12 and calls for 3 pounds of ground beef. How much ground beef is needed for 80 servings?", "back": "Scale factor = 80 servings / 12 servings = 20/3 (approximately 6.667). Ground beef needed = 3 lbs * (20/3) = 20 pounds."}, {"front": "Why are currency conversions considered a type of proportion problem?", "back": "Because an exchange rate provides a direct ratio between two currencies, allowing you to set up a proportion to find the equivalent value of an amount in the other currency."}, {"front": "Pacific Trading Company needs to pay a Japanese supplier 500,000 yen. If the exchange rate is 1 US dollar = 148.50 yen, how many US dollars are needed?", "back": "Set up a proportion: 1 dollar / 148.50 yen = x dollars / 500,000 yen. Solve for x: x = 500,000 / 148.50 = ~$3,367.00."}, {"front": "What crucial factors, besides the current stated exchange rate, should a business consider during international currency transactions?", "back": "Exchange rates change daily, and banks or exchange services may charge fees or commissions, which effectively alter the rate received."}, {"front": "How do manufacturing companies use proportional reasoning in quality control?", "back": "They inspect a random sample of products to find a defect rate. Then, they use this proportion to estimate the total number of defective items in the entire production run."}, {"front": "A quality inspector finds 8 defective circuit boards in a sample of 250. If the factory produced 12,000 boards, estimate the total defective boards.", "back": "Set up a proportion: 8 defective / 250 sampled = x defective / 12,000 produced. Solve for x: x = (8 * 12,000) / 250 = 384 defective boards."}, {"front": "A furniture workshop takes 4.5 hours to build one bookshelf. If the shop has 24 total labor hours available per day, how many bookshelves can be completed?", "back": "Set up a proportion: 1 bookshelf / 4.5 hours = x bookshelves / 24 hours. Solve for x: x = 24 / 4.5 = 5.33. Since partial bookshelves aren't sold, 5 bookshelves can be completed."}, {"front": "A factory produces 180 items per hour with 6 machines. If 2 machines break down, what is the factory's new production rate per hour?", "back": "Each machine produces 180 items / 6 machines = 30 items per hour. With 4 machines (6-2), the new rate is 4 machines * 30 items/machine = 120 items per hour."}, {"front": "What is the primary function of using a 'scale' on an architect's blueprint?", "back": "The scale establishes a constant proportional relationship between the measurements on the blueprint and the actual, real-world dimensions of the structure or object being designed."}, {"front": "An architect's blueprint uses a scale of 1 inch = 4 feet. If the main showroom measures 3.25 inches wide on the blueprint, what is its actual width?", "back": "Set up a proportion: 1 inch / 4 feet = 3.25 inches / x feet. Solve for x: x = 4 * 3.25 = 13 feet."}, {"front": "Why is understanding proportions crucial for architects and engineers working with different blueprint scales?", "back": "It allows them to accurately convert any measurement from a blueprint to its actual size, regardless of the specific scale (e.g., 1/4\"=1', 1/8\"=1', 1\"=10') being used for a project."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
