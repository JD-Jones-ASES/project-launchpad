<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Math: Practical Applications &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Business Math: Practical Applications &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Business_Math">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is depreciation?", "back": "Depreciation is the loss in value of an asset over time."}, {"front": "What are the two main mathematical models for how asset value decreases over time discussed in this section?", "back": "Linear decrease (a constant dollar amount each period) and exponential decrease (a constant percent each period)."}, {"front": "Define Linear Decrease, also known as Straight-Line Depreciation.", "back": "A quantity decreases linearly when it loses the same dollar amount in every equal time period. When graphed, value versus time forms a straight line that slopes downward."}, {"front": "What is the formula for linear decrease (value at time $t$)? Identify each variable.", "back": "$V(t) = V_0 - d t$\nwhere:\n$V(t)$ = value after $t$ time periods\n$V_0$ = original (initial) value\n$d$ = amount of decrease per period (the depreciation amount)\n$t$ = number of time periods"}, {"front": "A machine is worth $20,000 when new and loses $2,500 in value each year. What is its value after 3 years using linear decrease?", "back": "$V(3) = 20,000 - 2,500(3) = 20,000 - 7,500 = $12,500.00."}, {"front": "In a linear decrease model, what does the 'd' variable represent and how does it relate to the graph?", "back": "'d' represents the amount of decrease per period (depreciation amount). It is the absolute value of the slope of the line, indicating the line falls by 'd' dollars for every one-unit increase in 't'."}, {"front": "What is the formula to find the annual depreciation amount ($d$) when you know the original cost, salvage value, and number of periods?", "back": "$d = (V_0 - V_{end}) / n$\nwhere $V_0$ is the original cost, $V_{end}$ is the value at the end (salvage value), and $n$ is the number of time periods."}, {"front": "Equipment costs $36,000 and will be worth $6,000 after 10 years. Calculate the annual depreciation using the linear method.", "back": "$d = (36,000 - 6,000) / 10 = 30,000 / 10 = $3,000.00 per year."}, {"front": "Define Exponential Decrease, also known as Declining-Balance Depreciation.", "back": "A quantity decreases exponentially when it loses a fixed percent of its current value each period. The dollar amount of the decrease gets smaller over time, even though the percent stays the same."}, {"front": "What is the formula for exponential decrease (value at time $t$)? Identify each variable.", "back": "$V(t) = V_0 (1 - r)^t$\nwhere:\n$V(t)$ = value after $t$ time periods\n$V_0$ = original value\n$r$ = rate of decrease per period (as a decimal)\n$t$ = number of time periods"}, {"front": "In the exponential decrease formula, what is the expression $(1 - r)$ called?", "back": "The decay factor."}, {"front": "A car is worth $30,000 when new and loses 20% of its value each year. What is its value after 2 years using exponential decrease?", "back": "$V(2) = 30,000(1 - 0.20)^2 = 30,000(0.80)^2 = 30,000(0.64) = $19,200.00."}, {"front": "What is the fundamental difference between linear and exponential decrease in terms of how the dollar amount of value is lost?", "back": "Linear decrease involves a constant *dollar amount* loss per period. Exponential decrease involves a constant *percent* loss of the *current value* per period, meaning the dollar amount of the loss decreases over time."}, {"front": "If an asset experiences both $2,000 per year linear depreciation and 20% per year exponential depreciation (starting from the same initial value), which method would result in a higher remaining value after several years?", "back": "The exponential method would likely result in a higher remaining value after several years because its dollar drop gets smaller over time compared to the constant dollar drop of the linear method."}, {"front": "What is MACRS?", "back": "MACRS stands for Modified Accelerated Cost Recovery System. It is the depreciation method required by the IRS for most business property for tax purposes."}, {"front": "How does the MACRS method work to calculate annual depreciation?", "back": "The IRS groups assets into property classes (e.g., 3-year, 5-year, 7-year) and provides a table of percentages. You multiply the original cost by each year's specific percentage to find that year's depreciation."}, {"front": "Explain the 'half-year convention' in MACRS and its effect on depreciation periods.", "back": "The half-year convention assumes an asset is placed in service at the midpoint of the first year. This results in an asset's depreciation being spread over one more calendar year than its property class (e.g., a '5-year' property actually has 6 years of depreciation entries)."}, {"front": "What is the formula for calculating depreciation in a specific year ($k$) using a MACRS table?", "back": "Depreciation in year $k$ = Original Cost × MACRS percentage for year $k$."}, {"front": "How is the book value (remaining value) of an asset calculated at the end of any year using MACRS?", "back": "Book value at the end of any year = Original Cost - All depreciation taken so far."}, {"front": "A business computer system costs $8,000 and is a 5-year MACRS property. Using the MACRS table, if Year 1 percentage is 20.00% and Year 2 is 32.00%, what is the depreciation for year 2?", "back": "Year 2 depreciation = $8,000 × 0.3200 = $2,560.00."}, {"front": "Following the previous question, what is the book value of the computer system at the end of year 2?", "back": "Total depreciation through year 2 = $1,600 (year 1) + $2,560 (year 2) = $4,160.00.\nBook value at end of year 2 = $8,000 - $4,160 = $3,840.00."}, {"front": "What is a crucial difference in how the depreciation percentage/rate is applied between MACRS and the exponential (declining-balance) method?", "back": "With MACRS, you *always* multiply the percentage by the *original cost*. With the declining-balance (exponential) method, you multiply the rate by the *current book value* (remaining value) each year."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
