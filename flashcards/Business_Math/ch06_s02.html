<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Math: Practical Applications &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Business Math: Practical Applications &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Business_Math">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary challenge businesses face when making pricing decisions?", "back": "The challenge is setting a price that is not too high (driving customers away) and not too low (failing to cover costs and generate profit)."}, {"front": "Define 'markup on cost' and state its purpose in retail pricing.", "back": "Markup on cost is an amount added to the cost of a product, expressed as a percentage of the cost, to determine the selling price. Its purpose is to cover operational costs, overhead, and generate profit."}, {"front": "How do you calculate the selling price of an item given its cost and a markup rate on cost?", "back": "Selling Price = Cost × (1 + markup rate)"}, {"front": "Jamal buys T-shirts for $14.00 each and uses a 60% markup on cost. What is the retail price and the markup amount per shirt?", "back": "Retail Price = $14.00 × (1 + 0.60) = 22.40. Markup Amount =22.40 - 14.00 =8.40."}, {"front": "What is a 'markdown' in retail pricing, and when is it typically used?", "back": "A markdown is a reduction from the original retail price of an item. It is typically used to clear out seasonal inventory, attract customers, or respond to competition."}, {"front": "A pair of shoes originally priced at $110.00 receives a 25% markdown, and then an additional 15% off the reduced price. What is the final clearance price?", "back": "First markdown: $110.00 × (1 - 0.25) = $82.50. Second markdown: $82.50 × (1 - 0.15) = $70.13."}, {"front": "Explain why successive discounts (e.g., 25% off then 15% off) result in a smaller total discount than a single discount equal to the sum of the percentages (e.g., 40% off).", "back": "Successive discounts are applied to the *already reduced price*. Each subsequent discount is calculated on a smaller base, making the absolute discount amount smaller than if it were applied to the original price."}, {"front": "Describe the 'high-low pricing' strategy used by retailers.", "back": "High-low pricing involves setting initial prices high and then frequently running sales and promotions. This strategy aims to create a perception of value and urgency among customers who feel they are getting a 'deal'."}, {"front": "What is 'everyday low pricing' (EDLP) and which types of retailers often use it?", "back": "Everyday low pricing (EDLP) is a strategy of maintaining consistently low prices with smaller markups and fewer sales. Warehouse clubs and discount stores often use this approach."}, {"front": "What is the 'break-even point' for a business?", "back": "The break-even point is the level of sales (in units or revenue) where total revenue equals total costs, resulting in zero profit and zero loss."}, {"front": "What formula is used to calculate the break-even quantity (Q)?", "back": "Q = Fixed Costs / (Price per unit - Variable Cost per unit)"}, {"front": "Maria's Tacos has fixed monthly costs of 3,800. Each taco costs1.75 in variable costs and sells for $5.50. How many tacos must Maria sell to break even?", "back": "Q = 3,800 / (5.50 - 1.75) =3,800 / $3.75 = 1,014 tacos (rounded up)."}, {"front": "If Maria sells 1,200 tacos in a month (Fixed Costs: $3,800, Variable Cost: $1.75/taco, Price: $5.50/taco), what is her profit?", "back": "Revenue = 1,200 × 5.50 =6,600. Total Cost = $3,800 + (1,200 × 1.75) =3,800 + 2,100 =5,900. Profit = 6,600 -5,900 = $700.00."}, {"front": "How can a business determine the minimum selling price required to achieve a specific target profit?", "back": "By using the profit equation: Profit = (Price - Variable Cost) × Quantity - Fixed Costs. Substitute the target profit, fixed costs, variable costs, and expected sales quantity, then solve for Price (P)."}, {"front": "Bright Gadgets wants a 3,000 monthly profit, sells 500 chargers (cost18 each), and has $6,000 in fixed costs. What is the minimum selling price per charger?", "back": "3,000 = (P -18.00)(500) - 6,0009,000 = (P - 18.00)(500)18 = P - 18.00 \n P =36.00"}, {"front": "What is the 'supply chain' in the context of product pricing?", "back": "The supply chain refers to the entire sequence of entities and processes involved in getting a product from its origin (e.g., manufacturer) to the end consumer (e.g., through distributors and retailers)."}, {"front": "Why do products often cost significantly more in a retail store than their initial production cost?", "back": "Each step in the supply chain (manufacturer, distributor, retailer) adds its own markup to cover its operational costs, overhead, and to earn a profit, leading to an accumulated increase in price for the consumer."}, {"front": "Define 'direct-to-consumer' (DTC) brands and explain their potential advantage in pricing.", "back": "DTC brands sell products directly to the end consumer, bypassing traditional middlemen like distributors and retailers. This can allow them to offer lower prices to consumers or achieve higher profit margins due to reduced intermediary costs."}, {"front": "A coffee mug costs $4.50 to produce. The manufacturer marks it up 40%, the distributor 30%, and the retailer 50% (all markups on cost). What is the final price the consumer pays?", "back": "Manufacturer to distributor: $4.50 × 1.40 = $6.30. \n Distributor to retailer: $6.30 × 1.30 = $8.19. \n Retailer to consumer: $8.19 × 1.50 = $12.29."}, {"front": "How is the total chain markup from production cost to consumer price calculated?", "back": "Total Chain Markup = (Consumer Price - Production Cost) / Production Cost × 100%."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
