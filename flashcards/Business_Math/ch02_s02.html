<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Math: Practical Applications &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Business Math: Practical Applications &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Business_Math">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary role of percents in business applications?", "back": "Percents are the language of business, used to express sales tax, tips, commissions, discounts, profit margins, and growth rates."}, {"front": "Define 'sales tax' in the context of business transactions.", "back": "Sales tax is a percentage of the purchase price added to the cost of an item, which is collected by the store and remitted to the state or local government."}, {"front": "How do you calculate the sales tax amount on a purchase?", "back": "Sales Tax Amount = Purchase Price × Sales Tax Rate."}, {"front": "Aisha buys an office chair for $349.99 with a 7.25% sales tax rate. How much sales tax does she pay?", "back": "Sales Tax = $349.99 × 0.0725 = $25.37 (rounded to the nearest cent)."}, {"front": "How can you calculate the total price of an item including sales tax in a single step?", "back": "Total Price = Purchase Price × (1 + Sales Tax Rate)."}, {"front": "What is a 'tip' or 'gratuity' in a service industry setting?", "back": "A tip (or gratuity) is an additional amount of money given by a customer to a service provider (e.g., a server), typically expressed as a percentage of the pre-tax bill."}, {"front": "What are common tipping rates in the United States?", "back": "Common tipping rates in the U.S. typically range from 15% to 20% of the pre-tax bill."}, {"front": "Marcus's pre-tax lunch bill is $124.60. He wants to leave an 18% tip on the pre-tax amount. How much is the tip?", "back": "Tip = $124.60 × 0.18 = $22.43."}, {"front": "In Marcus's lunch scenario (pre-tax bill $124.60, 6.5% sales tax, 18% tip), what is the total amount Marcus pays?", "back": "Sales Tax = $124.60 × 0.065 = $8.10. Total = $124.60 (bill) + $22.43 (tip) + $8.10 (tax) = $155.13."}, {"front": "What is a 'commission' in the context of sales?", "back": "A commission is a form of pay based on the amount of sales a person makes, calculated as a percentage of total sales."}, {"front": "Explain the difference between 'straight commission' and 'base salary plus commission'.", "back": "Straight commission means a salesperson's entire pay is based solely on their sales. Base salary plus commission means they earn a fixed salary in addition to a commission on their sales."}, {"front": "Danielle sells a house for $285,000.00 and earns a 3% commission. What is her commission for this sale?", "back": "Commission = $285,000.00 × 0.03 = $8,550.00."}, {"front": "Ryan earns a monthly base salary of $1,800.00 plus a 4.5% commission on all sales. If his total sales were $38,400.00, what is his total pay for the month?", "back": "Commission = $38,400.00 × 0.045 = $1,728.00. Total Pay = $1,800.00 (base) + $1,728.00 (commission) = $3,528.00."}, {"front": "What does 'Year-Over-Year (YOY) growth' mean for a business?", "back": "YOY growth compares a business's performance (e.g., sales, revenue) during a specific period in the current year to the same period in the previous year, measuring growth or shrinkage."}, {"front": "How is the percent change calculated for metrics like YOY growth?", "back": "Percent Change = ((Current Value - Previous Value) / Previous Value) × 100%."}, {"front": "Maple Street Bakery's revenue was $186,000.00 last year and $213,900.00 this year. What is their percent increase in revenue?", "back": "Percent Increase = (($213,900.00 - $186,000.00) / $186,000.00) × 100% = (27,900 / 186,000) × 100% = 0.15 × 100% = 15%."}, {"front": "What are 'successive discounts'?", "back": "Successive discounts occur when multiple discounts are applied one after another, with each subsequent discount applied to the price that has already been reduced by the previous discount."}, {"front": "A $220.00 coat is on sale for 30% off, and Elena gets an additional 15% employee discount. What is the price after the first 30% discount?", "back": "Sale Price = $220.00 × (1 - 0.30) = $220.00 × 0.70 = $154.00."}, {"front": "Continuing the previous scenario, what is the final price Elena pays for the coat after both the 30% sale and 15% employee discount?", "back": "Employee Price = $154.00 × (1 - 0.15) = $154.00 × 0.85 = $130.90."}, {"front": "Why is a 30% discount followed by a 15% discount not equivalent to a single 45% discount?", "back": "Successive discounts are applied to successively smaller bases. A 45% discount would be applied to the original, higher price. For example, 30% then 15% off is equivalent to 40.5% total discount, not 45% (1 - (0.70 * 0.85) = 0.405)."}, {"front": "If an item is sold after a 20% discount, what percentage of the original price did the customer pay?", "back": "The customer paid 100% - 20% = 80% of the original price."}, {"front": "After a 20% discount, a customer paid $68.00 for a pair of shoes. What was the original price of the shoes?", "back": "Let B be the original price. 0.80 × B = $68.00. So, B = $68.00 / 0.80 = $85.00."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
