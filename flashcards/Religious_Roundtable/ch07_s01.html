<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Does Confucianism primarily begin with theology and the structure of the cosmos?", "back": "No, it begins with the question of how human beings should treat each other."}, {"front": "What is the supreme virtue in the Confucian ethical system?", "back": "Ren (benevolence, humaneness, or compassion)."}, {"front": "How does the text define 'ren' beyond just a simple feeling?", "back": "It is a quality of character and an inner disposition of genuine care for others."}, {"front": "What formulation from the Analects (12.2) describes the practice of 'ren'?", "back": "Do not impose on others what you yourself do not want."}, {"front": "According to the key term definition, what are the three ways 'ren' is cultivated?", "back": "Through education, self-reflection, and the faithful performance of ritual."}, {"front": "Term: Li", "back": "Definition: Ritual propriety or the proper forms of conduct for every social situation."}, {"front": "Besides state ceremonies, what daily activities does 'li' encompass?", "back": "Greeting elders, setting a table, and mourning the dead."}, {"front": "What is the relationship between 'li' and 'ren'?", "back": "Li is the outward expression of the inner virtue ren."}, {"front": "How does performing a ritual like bowing to one's parents affect character?", "back": "The act of bowing helps the person become someone who genuinely respects their parents."}, {"front": "According to Confucius, what is the educational relationship between form and feeling?", "back": "Form and feeling educate each other."}, {"front": "Term: Yi", "back": "Definition: Righteousness or the virtue of doing what is genuinely right in a given situation."}, {"front": "Which Confucian virtue governs the ability to discern what is right when it is costly or difficult?", "back": "Yi (righteousness)."}, {"front": "In the triad of virtues, which one acts as the practical wisdom for applying the others?", "back": "Yi (righteousness)."}, {"front": "Term: Zhengming", "back": "Definition: The rectification of names, or the insistence that language must accurately track reality."}, {"front": "What did Confucius say he would do first if he were given authority?", "back": "Correct the names (zhengming)."}, {"front": "According to 'zhengming', what should a ruler be called if he acts tyrannically?", "back": "A tyrant, rather than a ruler."}, {"front": "Why is 'zhengming' necessary for a society to function properly?", "back": "Dishonest language causes a society to lose its ability to think clearly about reality."}, {"front": "What are the foundations of every other reform in the Confucian system?", "back": "Clarity of speech and clarity of thought."}, {"front": "What is the primary aim of the Five Relationships in Confucianism?", "back": "To achieve social harmony through the practice of virtue."}, {"front": "In the Five Relationships, what are the mutual obligations between a ruler and subject?", "back": "The ruler governs with benevolence; the subject obeys with loyalty."}, {"front": "Which of the Five Relationships is considered the foundation of all others?", "back": "Father and son."}, {"front": "What is the father's specific obligation in the father-son relationship?", "back": "To nurture the son with love."}, {"front": "Term: Xiao", "back": "Definition: Filial piety, or the devotion and care for one's parents and ancestors."}, {"front": "In the relationship between husband and wife, what two elements govern their duty?", "back": "Mutual care and duty."}, {"front": "How does an elder brother fulfill his role in the Five Relationships?", "back": "By guiding the younger brother with affection."}, {"front": "How should a younger brother respond to an elder brother?", "back": "With respect."}, {"front": "Which of the Five Relationships is unique for being a bond among equals?", "back": "Friend and friend."}, {"front": "Term: Xin", "back": "Definition: Faithfulness, the virtue governing the relationship between friends."}, {"front": "What principle prevents Confucianism from being a system of blind obedience?", "back": "Mutuality (the fact that both parties in a relationship have obligations)."}, {"front": "Under what condition does a ruler lose his claim to a subject's loyalty?", "back": "When the ruler governs tyrannically and fails to show benevolence."}, {"front": "Under what condition does a father lose his claim to filial piety?", "back": "When the father shows no love toward the son."}, {"front": "How does the text describe the accountability of individuals in the Confucian social structure?", "back": "Everyone, at every level, is accountable to everyone else."}, {"front": "In Confucian thought, ritual propriety (li) is the primary means of maintaining _____.", "back": "Social harmony."}, {"front": "According to the 'ren' keyterm, what flows from proper human relationships?", "back": "Social harmony."}, {"front": "The ability to discern what is right in a complex situation is the virtue of _____.", "back": "Yi (righteousness)."}, {"front": "In the Confucian triad, if 'ren' is the emotional core, what is 'li'?", "back": "The form."}, {"front": "What happens to a society when its names are 'wrong' or dishonest?", "back": "Everything built on them becomes unstable."}, {"front": "What is the son's response to a father's nurturing love called?", "back": "Xiao (filial piety)."}, {"front": "True or False: 'Li' is considered empty formalism in Confucian thought.", "back": "False; it is the outward expression of inner virtue (ren)."}, {"front": "What is the fundamental starting point for all Confucian thought?", "back": "The question of how human beings should treat each other."}, {"front": "What does 'zhengming' suggest about the relationship between language and action?", "back": "Language shapes thought, and thought shapes action."}, {"front": "In the friend-friend relationship, the governing virtue is _____.", "back": "Xin (faithfulness)."}, {"front": "Which virtue requires the knowledge of what is right and the courage to act on it?", "back": "Yi (righteousness)."}, {"front": "What term is translated as 'benevolence,' 'humaneness,' or 'goodness'?", "back": "Ren."}, {"front": "According to the text, what is 'ren' the inner quality of?", "back": "A person who genuinely cares about the well-being of others."}, {"front": "The Five Relationships are described by the text as a web of _____.", "back": "Mutual care."}, {"front": "What is the primary role of education in the context of 'ren'?", "back": "To help cultivate the inner virtue of humaneness."}, {"front": "Why does 'zhengming' insist that a ritual without feeling should not be called a ritual?", "back": "To ensure that words accurately reflect the reality of the action."}, {"front": "Which relationship serves as the foundational model for social virtue?", "back": "Father and son."}, {"front": "What virtue is characterized as 'practical wisdom'?", "back": "Yi."}, {"front": "In the hierarchy of brothers, the younger brother responds with _____.", "back": "Respect."}, {"front": "In the hierarchy of brothers, the elder brother guides with _____.", "back": "Affection."}, {"front": "A subject's obligation to a ruler is defined by the virtue of _____.", "back": "Loyalty."}, {"front": "How are roles in the husband-wife relationship described relative to history?", "back": "They differ based on Confucius's historical context but involve mutual care."}, {"front": "What quality of character ensures every action reflects care for others?", "back": "Ren."}, {"front": "Confucianism aims to produce a social structure organized around the _____.", "back": "Five Relationships."}, {"front": "What is the purpose of 'li' in social interactions?", "back": "To express inner virtue and maintain social harmony."}, {"front": "What is the prerequisite for 'li' to be meaningful rather than empty?", "back": "It must be performed with genuine inner feeling."}, {"front": "Is the ruler-subject relationship one-sided or mutual?", "back": "Mutual; both parties have specific obligations."}, {"front": "Which virtue specifically addresses the 'rectification of names'?", "back": "Zhengming."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
