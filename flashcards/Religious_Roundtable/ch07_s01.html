<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what year was the philosopher Kong Qiu born?", "back": "551 BCE"}, {"front": "In which ancient Chinese state was Confucius born?", "back": "Lu"}, {"front": "Which modern Chinese province corresponds to the ancient state of Lu?", "back": "Shandong Province"}, {"front": "What was the economic status of Confucius's family during his youth?", "back": "Modest means"}, {"front": "Confucius's family was just prosperous enough to provide him with what type of education?", "back": "Classical education"}, {"front": "Before falling into modest means, what was the former social status of Confucius's family?", "back": "Aristocratic"}, {"front": "Which dynasty's disintegration provided the political backdrop for Confucius's life?", "back": "The Zhou dynasty"}, {"front": "What did Confucius aim to close between his contemporary society and the standards of ancient texts?", "back": "The gap"}, {"front": "Confucius believed the problems of the Zhou dynasty were primarily _____ rather than merely political.", "back": "Moral"}, {"front": "According to Confucius, rituals had become \"empty theater\" because people lost their _____.", "back": "Inner virtues"}, {"front": "Which group of people is responsible for the Latinized name \"Confucius\"?", "back": "Jesuit missionaries"}, {"front": "What is the English translation of the name \"Kong Fuzi\"?", "back": "Master Kong"}, {"front": "What is the title of the book containing the sayings of Confucius compiled by his students?", "back": "The Analects"}, {"front": "Confucius is recognized as one of the first Chinese educators to open his school to students regardless of their _____.", "back": "Social rank"}, {"front": "Confucius's open enrollment policy was a radical challenge to a society organized around _____.", "back": "Hereditary privilege"}, {"front": "What was the ultimate goal of Confucius's curriculum for his students?", "back": "Reforming government and society from the inside"}, {"front": "How many years did Confucius spend wandering between states seeking a wise ruler?", "back": "Thirteen years"}, {"front": "During his travels, what type of advisors did most rulers prefer over philosophers?", "back": "Military advisors"}, {"front": "In what year did Confucius die?", "back": "479 BCE"}, {"front": "At the time of his death, what was Confucius's personal assessment of his mission?", "back": "He was convinced it had failed"}, {"front": "Which dynasty eventually adopted Confucianism as its governing philosophical framework?", "back": "The Han dynasty"}, {"front": "In what year did the Han dynasty unify China?", "back": "206 BCE"}, {"front": "The system used to determine government office eligibility based on Confucian mastery was the _____.", "back": "Imperial examination system"}, {"front": "In what year was the Confucian imperial examination system finally abolished?", "back": "1905 CE"}, {"front": "The imperial examination system was a historic early example of what type of civil service?", "back": "Merit-based"}, {"front": "What was a major practical limitation of the merit-based imperial examination system?", "back": "It favored those who could afford years of education"}, {"front": "Confucius's life spanned from 551 BCE to _____.", "back": "479 BCE"}, {"front": "What subjects did Confucius edit in his old age after returning to Lu?", "back": "Classical texts"}, {"front": "Confucius believed that outer rituals were intended to express and reinforce _____.", "back": "Inner virtues"}, {"front": "During the Zhou disintegration, how did lords often treat advisors who gave inconvenient advice?", "back": "They dismissed or murdered them"}, {"front": "Term: The Analects", "back": "Definition: A compilation of the sayings of Confucius, created by his students after his death."}, {"front": "Term: Meritocracy (in the context of Imperial China)", "back": "Definition: A system where government positions are earned through examinations rather than inherited."}, {"front": "Who kept the teachings of Confucius alive immediately after his death?", "back": "His students"}, {"front": "Concept: The \"moral\" problem of China", "back": "Confucius's belief that political instability stemmed from a lack of inner character and integrity."}, {"front": "The road to _____ in China ran through Confucius for more than two thousand years.", "back": "Power"}, {"front": "How did the imperial examination system differ from systems common elsewhere in the ancient world?", "back": "It was more open than purely hereditary systems"}, {"front": "What specific skill did candidates spend years developing for the imperial examinations?", "back": "Writing elaborate essays on governance"}, {"front": "What was the political condition of China during the time of Confucius?", "back": "Constant war and disintegration of the central framework"}, {"front": "Who provided the moral and political framework of Chinese civilization for centuries before Confucius?", "back": "The Zhou dynasty"}, {"front": "Confucius taught his students both classical texts and how to become people who could _____.", "back": "Reform society"}, {"front": "Why did Han emperors need a common philosophical framework?", "back": "To govern a vast, unified empire"}, {"front": "What did Confucius do upon his return to Lu in old age?", "back": "Teaching and editing classical texts"}, {"front": "The Latinized name of Kong Qiu is _____.", "back": "Confucius"}, {"front": "What happened to the old rituals during the crisis of the Zhou dynasty?", "back": "They were ignored or performed as empty theater"}, {"front": "Whose records did Confucius study to find examples of wise kings and ministers?", "back": "The ancient records"}, {"front": "Confucius was convinced that society's problem was moral, not merely _____.", "back": "Political"}, {"front": "How did Confucius's family background affect his view of society?", "back": "It made him aware of how far society had fallen from ancient standards"}, {"front": "Which aspect of education did Confucius's school prioritize over social standing?", "back": "Willingness to learn"}, {"front": "Where did Confucius spend the final years of his life?", "back": "Lu"}, {"front": "The imperial examination system was based on the mastery of which specific materials?", "back": "The Confucian classics"}, {"front": "What is the significance of the year 1905 CE in Chinese history?", "back": "It was the end of the Confucian imperial examination system"}, {"front": "What did Confucius find instead of the wise rulers he sought during his thirteen-year journey?", "back": "Rulers seeking military advisors"}, {"front": "Confucius's teaching was radical because it rejected _____ as the basis for education.", "back": "Hereditary privilege"}, {"front": "The Jesuit missionaries gave the name Confucius to the philosopher originally known as _____.", "back": "Kong Qiu"}, {"front": "How long did the influence of Confucius on the road to power in China endure?", "back": "More than two thousand years"}, {"front": "What was the purpose of the rigorous tests in the imperial examination system?", "back": "Determining who could hold government office"}, {"front": "Master Kong is another name for _____.", "back": "Kong Qiu (or Confucius)"}, {"front": "Confucius spent his entire life trying to close the gap between reality and _____.", "back": "Ancient standards"}, {"front": "What role did Confucius hold for most of his life?", "back": "Teacher"}, {"front": "What was the geographical context of Confucius's birthplace?", "back": "The state of Lu"}, {"front": "The Han dynasty unification occurred in which century BCE?", "back": "3rd Century BCE (206 BCE)"}, {"front": "What was the core requirement for admission to Confucius's school?", "back": "A willingness to learn"}, {"front": "Which group's records did Confucius consider to be the source of wisdom?", "back": "Ancient kings and ministers"}, {"front": "Why were the Han emperors interested in Confucianism?", "back": "It provided a framework for governing a vast empire"}, {"front": "Despite his perceived failure, Confucius's teachings were preserved by his _____.", "back": "Students"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
