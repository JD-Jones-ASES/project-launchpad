<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 4, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the most common misconception regarding the Hindu pantheon?", "back": "That all Hindus worship all gods within the pantheon equally."}, {"front": "In the Hindu metaphor of the mountain, what do the \"many paths\" represent?", "back": "The diverse devotional traditions and practices available to practitioners."}, {"front": "In the metaphor of the mountain, what does the \"summit\" represent?", "back": "The single ultimate reality or goal that all sincere paths lead toward."}, {"front": "Which major stream of Hindu devotional practice is centered on the deity Vishnu?", "back": "Vaishnavism."}, {"front": "What is the primary role of Vishnu within the universe?", "back": "The sustainer and preserver of the universe."}, {"front": "What are \"avatars\" in the context of Vaishnavism?", "back": "Divine descents into human or animal form to restore cosmic order."}, {"front": "Who is the Vaishnava avatar known as the \"divine king\"?", "back": "Rama."}, {"front": "Which Vaishnava avatar is famous for being the teacher of the Bhagavad Gita?", "back": "Krishna."}, {"front": "What is the primary path to moksha emphasized in Vaishnavism?", "back": "Bhakti (devotional love)."}, {"front": "According to Vaishnava practice, where should a devotee see the face of God?", "back": "In every human being."}, {"front": "Which stream of Hinduism is currently the largest worldwide?", "back": "Vaishnavism."}, {"front": "Which Hindu tradition centers on a deity who is simultaneously a destroyer and a regenerator?", "back": "Shaivism."}, {"front": "Shaivism centers on which complex and paradoxical divine figure?", "back": "Shiva."}, {"front": "According to Shaivism, why is the destruction of the universe necessary?", "back": "So that it can be recreated and renewed."}, {"front": "What kind of personal discipline do Shaivas typically emphasize?", "back": "Ascetic practice and yogic discipline."}, {"front": "In Shaivism, where is the divine primarily accessed by the practitioner?", "back": "Within the self (through meditation and stilling the mind)."}, {"front": "Shiva is paradoxically described as both a god of death and a god of _____.", "back": "Yoga."}, {"front": "Which Hindu tradition focuses specifically on the Divine Feminine?", "back": "Shaktism."}, {"front": "What is the name of the single divine power or active force in Shaktism?", "back": "Shakti."}, {"front": "In Shaktism, how are goddesses like Durga, Kali, and Lakshmi viewed?", "back": "As different aspects of a single divine power (Shakti)."}, {"front": "In Shaktism, the ultimate reality is characterized as a dynamic, _____ divine energy.", "back": "Maternal."}, {"front": "What does the fierce image of the goddess Kali represent in Shaktism meditation?", "back": "The power that drives transformation."}, {"front": "What is the definition of \"henotheism\" in a Hindu context?", "back": "Worshipping one god as supreme while acknowledging that other gods exist."}, {"front": "How does henotheism differ from polytheism?", "back": "Henotheism views one god as supreme, whereas polytheism views all gods as roughly equal."}, {"front": "How does henotheism differ from monotheism?", "back": "Henotheism acknowledges the existence of multiple gods, whereas monotheism claims only one exists."}, {"front": "What has the \"theologically flexible\" position of henotheism allowed Hinduism to do?", "back": "Absorb many traditions without destroying any of them."}, {"front": "Which major festival is known as the \"Festival of Lights\"?", "back": "Diwali."}, {"front": "Identify four religious groups mentioned that celebrate Diwali.", "back": "Hindus, Sikhs, Jains, and some Buddhists."}, {"front": "For Vaishnavas, Diwali commemorates the return of Rama after his victory over _____.", "back": "Ravana."}, {"front": "What event does Diwali celebrate in the Jain tradition?", "back": "The enlightenment of Mahavira."}, {"front": "In Shaivism, Shiva is described as both an ascetic and a _____, highlighting his paradoxical nature.", "back": "Householder."}, {"front": "The term \"Shakti\" refers to the creative, energizing, and _____ force of the universe.", "back": "Active."}, {"front": "How does a practitioner of one Hindu stream typically relate to the deities of another stream?", "back": "They view them as real but less central to their own spiritual life."}, {"front": "Which Vaishnava concept involves surrendering to God in love and singing his praises?", "back": "Bhakti."}, {"front": "In the context of the text, what is the significance of Kali dancing on the corpse of Shiva?", "back": "It is a meditation on the power that drives transformation."}, {"front": "Why is Vaishnavism focused on Vishnu's avatars?", "back": "Because they are the forms through which he restores cosmic order."}, {"front": "The practice of stilling the mind to access the divine is central to which tradition?", "back": "Shaivism."}, {"front": "Name two goddesses besides Kali that are considered aspects of Shakti.", "back": "Durga, Lakshmi, or Saraswati."}, {"front": "In the mountain metaphor, why might practitioners on different paths not see each other?", "back": "Because they are at different points on their specific spiritual paths."}, {"front": "What is the literal translation provided for the festival of Diwali?", "back": "The Festival of Lights."}, {"front": "Which specific Hindu tradition emphasizes that the divine is \"within\" rather than just in a heaven?", "back": "Shaivism."}, {"front": "In Shaktism, the ultimate reality is a dynamic energy that dances through all _____.", "back": "Creation."}, {"front": "True or False: A Vaishnava denies the existence of the god Shiva.", "back": "False."}, {"front": "What is the primary goal of the Vaishnava path of bhakti?", "back": "To reach moksha."}, {"front": "Shaivism teaches that the universe must be _____ so that it can be recreated.", "back": "Dissolved."}, {"front": "The diversity of meanings for the festival of Diwali is described by the text as being \"very _____.\"", "back": "Hindu."}, {"front": "Rama is described in the text as the divine _____.", "back": "King."}, {"front": "Krishna is described in the text as the _____ of the Bhagavad Gita.", "back": "Teacher."}, {"front": "The phrase \"One Tradition, Many Paths\" refers to the internal diversity of which religion?", "back": "Hinduism."}, {"front": "What is the geographical scope of the Diwali diaspora?", "back": "Across South Asia and the diaspora."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
