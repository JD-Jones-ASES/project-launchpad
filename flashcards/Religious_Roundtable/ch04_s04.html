<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 4, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Approximately how many years of history do the sacred texts of Hinduism span?", "back": "More than three thousand years."}, {"front": "What language is associated with the oldest Hindu scriptures?", "back": "Archaic Vedic Sanskrit."}, {"front": "Name the four foundational scriptures of Hinduism known as the Vedas.", "back": "Rigveda, Samaveda, Yajurveda, and Atharvaveda."}, {"front": "What does the term 'shruti' literally mean in the context of Hindu scripture?", "back": "That which was heard."}, {"front": "According to Hindu tradition, who are the 'rishis'?", "back": "Ancient seers who perceived eternal truths in deep meditation."}, {"front": "How were the Vedas transmitted for thousands of years before being written down?", "back": "Orally."}, {"front": "Which of the four Vedas is considered the most important?", "back": "The Rigveda."}, {"front": "How many hymns are contained in the Rigveda?", "back": "1,028 hymns."}, {"front": "What is the primary subject of the 'Nasadiya Sukta' (Hymn of Creation)?", "back": "The origins of being and non-being before creation."}, {"front": "How does the Rigveda's Hymn of Creation characterize the ultimate answer to the origins of the universe?", "back": "It holds the question open with 'reverent uncertainty'."}, {"front": "What collection of approximately 108 texts is known as the 'philosophical heart' of Hinduism?", "back": "The Upanishads."}, {"front": "During what approximate time period were the Upanishads composed?", "back": "Between 800 and 200 BCE."}, {"front": "What is the literal meaning of the word 'Upanishad'?", "back": "Sitting down near a teacher."}, {"front": "In Hindu philosophy, what is 'Brahman'?", "back": "The nature of ultimate reality that underlies all things."}, {"front": "What does the term 'atman' refer to in the Upanishads?", "back": "The self."}, {"front": "How do the Upanishads describe the size of Brahman relative to the world?", "back": "Brahman is paradoxically both smaller than a grain of rice and larger than all the worlds."}, {"front": "What literary format is primarily used in the Upanishads to explore deep questions?", "back": "Dialogues between a student and a teacher."}, {"front": "What text is considered the ethical and spiritual summit of the Hindu tradition?", "back": "The Bhagavad Gita."}, {"front": "What is the literal English translation of 'Bhagavad Gita'?", "back": "Song of the Lord."}, {"front": "The Bhagavad Gita is a 720-verse poem embedded within which larger epic?", "back": "The Mahabharata."}, {"front": "Who are the two primary figures in the conversation of the Bhagavad Gita?", "back": "The god Krishna and the warrior Arjuna."}, {"front": "In what setting does the dialogue of the Bhagavad Gita take place?", "back": "On a battlefield."}, {"front": "Why is the warrior Arjuna paralyzed by hesitation at the start of the Bhagavad Gita?", "back": "He is distraught by the thought of fighting against his own kinsmen."}, {"front": "How many chapters are contained in the Bhagavad Gita?", "back": "Eighteen chapters."}, {"front": "According to the Bhagavad Gita, what is the nature of the self regarding death?", "back": "The self cannot be killed; it can only be transformed."}, {"front": "What is the central ethical instruction given by Krishna to Arjuna regarding action?", "back": "Perform one's duty without attachment to outcomes."}, {"front": "Name the three paths toward God addressed in the Bhagavad Gita.", "back": "The paths of knowledge, action, and devotion."}, {"front": "Which 20th-century Indian leader was famously guided by the principles of the Bhagavad Gita?", "back": "Mahatma Gandhi."}, {"front": "Which nuclear physicist famously quoted the Bhagavad Gita during the first atomic bomb test?", "back": "J. Robert Oppenheimer."}, {"front": "What is the concept of 'nishkama karma'?", "back": "Desireless action, or acting without being attached to the outcome."}, {"front": "Which text is the longest poem ever written, containing roughly 200,000 verses?", "back": "The Mahabharata."}, {"front": "What is the primary subject of the Puranas?", "back": "Ancient stories about the gods, cosmology, and genealogy."}, {"front": "What do the Dharmashastra texts primarily address?", "back": "Law and social order."}, {"front": "Which Hindu epic tells the story of the divine king Rama and his wife Sita?", "back": "The Ramayana."}, {"front": "What is the central theme of the cosmic struggle depicted in the Ramayana?", "back": "The struggle between good and evil."}, {"front": "Concept: Shruti", "back": "Definition: Scriptures considered eternal truths heard by sages, not of human composition."}, {"front": "The Vedas are not human compositions but eternal truths perceived by ____.", "back": "Rishis (ancient seers)."}, {"front": "Which specific Veda includes the Nasadiya Sukta (Hymn of Creation)?", "back": "The Rigveda."}, {"front": "Term: Brahman", "back": "Definition: The ultimate reality or divine ground of all being in Hindu philosophy."}, {"front": "How does the Bhagavad Gita's principle of 'nishkama karma' apply to modern management?", "back": "It encourages performing duties without being attached to the 'fruits' or specific outcomes."}, {"front": "What is the status of the Ramayana and Mahabharata epics in modern Hindu life?", "back": "They are 'lived' traditions performed through dance, television, and storytelling."}, {"front": "The Upanishads were attached to which earlier group of scriptures?", "back": "The Vedas."}, {"front": "How many verses long is the Bhagavad Gita?", "back": "720 verses."}, {"front": "In the Bhagavad Gita, who serves as Arjuna's charioteer?", "back": "Krishna."}, {"front": "The phrase 'You have a right to perform your duty, but not to the fruits of your actions' is from which text?", "back": "The Bhagavad Gita (specifically verse 2:47)."}, {"front": "Which text explores the question: 'was there being or non-being before creation began?'", "back": "The Rigveda (Nasadiya Sukta)."}, {"front": "What is the relationship between the self (atman) and ultimate reality (Brahman) in the Upanishads?", "back": "They are the primary focus of inquiry into the nature of existence."}, {"front": "What are the Puranas known for documenting besides stories of gods?", "back": "Cosmology and genealogy."}, {"front": "The Mahabharata is roughly _____ times longer than the Bhagavad Gita section within it.", "back": "The text states the Mahabharata has 200,000 verses compared to the Gita's 720."}, {"front": "According to the source, why is the Hindu sacred library unique among world religions?", "back": "It is among the largest and most varied, written over 3,000 years in multiple languages."}, {"front": "How long has the unbroken tradition of storytelling for the Ramayana lasted?", "back": "At least two millennia."}, {"front": "The principle of nishkama karma is translated as ____ action.", "back": "Desireless."}, {"front": "What differentiates 'shruti' from other forms of literature in Hinduism?", "back": "Shruti are eternal truths perceived in meditation, not composed by humans."}, {"front": "Who is the faithful wife of the divine king Rama in the Ramayana?", "back": "Sita."}, {"front": "Concept: Dharmashastra", "back": "Definition: Sacred Hindu texts focusing on law, ethics, and the maintenance of social order."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
