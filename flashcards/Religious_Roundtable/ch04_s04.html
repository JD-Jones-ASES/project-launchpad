<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 4, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Approximately how many years of history do the sacred texts of Hinduism span?", "back": "More than three thousand years"}, {"front": "Which group of texts forms the foundation of the Hindu sacred library?", "back": "The four Vedas"}, {"front": "What is the term for scriptures believed to be \"eternal truths\" perceived by ancient sages and transmitted orally?", "back": "Shruti"}, {"front": "What does the word 'shruti' literally translate to in English?", "back": "\"That which was heard\""}, {"front": "In Hindu tradition, who were the 'rishis'?", "back": "Ancient seers who perceived eternal truths in deep meditation"}, {"front": "List the four Vedas.", "back": "Rigveda, Samaveda, Yajurveda, and Atharvaveda"}, {"front": "Which of the four Vedas is considered the most important?", "back": "The Rigveda"}, {"front": "How many hymns are contained within the Rigveda?", "back": "1,028 hymns"}, {"front": "What is the subject of the Nasadiya Sukta (Rigveda 10.129)?", "back": "The creation of the universe"}, {"front": "The Nasadiya Sukta is notable for its 'reverent uncertainty' regarding which specific topic?", "back": "The origins of being and non-being before creation"}, {"front": "Which collection of approximately 108 texts is considered the philosophical heart of Hinduism?", "back": "The Upanishads"}, {"front": "During which approximate time period were the Upanishads composed?", "back": "Between 800 and 200 BCE"}, {"front": "What is the literal meaning of the word 'Upanishad'?", "back": "\"Sitting down near\" a teacher"}, {"front": "Which Hindu concept refers to the nature of ultimate reality underlying all things?", "back": "Brahman"}, {"front": "In the Upanishads, what does the term 'atman' refer to?", "back": "The self"}, {"front": "How do the Upanishads paradoxically describe the size of Brahman relative to a grain of rice?", "back": "Brahman is described as \"both smaller than a grain of rice\" and larger than all the worlds."}, {"front": "What literary format do the Upanishads typically use to explore deep philosophical questions?", "back": "Dialogues between a student and a teacher"}, {"front": "Which text is regarded by most Hindus as the ethical and spiritual summit of their tradition?", "back": "The Bhagavad Gita"}, {"front": "What is the literal English translation of 'Bhagavad Gita'?", "back": "\"Song of the Lord\""}, {"front": "The Bhagavad Gita is a 720-verse poem embedded within which larger epic?", "back": "The Mahabharata"}, {"front": "On what specific setting does the conversation of the Bhagavad Gita take place?", "back": "A battlefield"}, {"front": "Who is the warrior in the Bhagavad Gita who becomes paralyzed by the thought of fighting his kinsmen?", "back": "Arjuna"}, {"front": "Who acts as Arjuna's charioteer and provides spiritual instruction in the Bhagavad Gita?", "back": "The god Krishna"}, {"front": "How many chapters comprise the Bhagavad Gita?", "back": "Eighteen chapters"}, {"front": "According to the Bhagavad Gita, what is the nature of the self in relation to death?", "back": "The self cannot be killed; it can only be transformed."}, {"front": "What Hindu principle involves performing one's duty without attachment to the outcomes?", "back": "Nishkama karma (desireless action)"}, {"front": "Bhagavad Gita 2:47 states that a person has a right to perform their duty, but not to what?", "back": "The fruits (outcomes) of their actions"}, {"front": "Which 20th-century physicist famously quoted the Bhagavad Gita during the first atomic bomb test?", "back": "J. Robert Oppenheimer"}, {"front": "What category of Hindu texts includes ancient stories about gods, cosmology, and genealogy?", "back": "The Puranas"}, {"front": "What is the primary focus of the Dharmashastra?", "back": "Law and social order"}, {"front": "Which text is considered the longest poem ever written, consisting of roughly 200,000 verses?", "back": "The Mahabharata"}, {"front": "Which Hindu epic tells the story of the divine king Rama and his wife Sita?", "back": "The Ramayana"}, {"front": "What central conflict is depicted in the Ramayana?", "back": "The cosmic struggle between good and evil"}, {"front": "The stories of Rama and Sita are described as an unbroken tradition of storytelling going back at least how many years?", "back": "Two millennia"}, {"front": "Term: Brahman", "back": "Definition: The ultimate reality that underlies all things in the universe."}, {"front": "Term: Atman", "back": "Definition: The individual self or soul."}, {"front": "The principle of _____ karma emphasizes acting without being attached to the outcome of one's deeds.", "back": "nishkama"}, {"front": "Unlike the Vedas, which were heard (shruti), the epics and Puranas are examples of 'lived' literature that are performed and _____.", "back": "retold"}, {"front": "Which Veda contains the Nasadiya Sukta?", "back": "The Rigveda"}, {"front": "What specific dilemma causes Arjuna to stop his chariot in the Bhagavad Gita?", "back": "The moral conflict of fighting against his own family members (kinsmen)."}, {"front": "The Upanishads are attached to which foundational Hindu texts?", "back": "The Vedas"}, {"front": "Name one of the three paths Krishna teaches Arjuna to move toward God.", "back": "The path of knowledge (or action, or devotion)"}, {"front": "In the context of Hindu texts, what does the term 'vernacular' refer to?", "back": "Regional, everyday languages used in later scriptures"}, {"front": "Why are the Upanishads described as not being for 'passive readers'?", "back": "They require the reader to wrestle with paradoxical ideas that exceed normal categories."}, {"front": "Which major Hindu text was a primary source of guidance for Mahatma Gandhi?", "back": "The Bhagavad Gita"}, {"front": "The Vedas were originally transmitted _____ for thousands of years before being written down.", "back": "orally"}, {"front": "What is the primary role of Krishna during the opening of the battle in the Gita?", "back": "Arjuna's charioteer and divine instructor"}, {"front": "Which text serves as a 'complete manual for living' for many Hindus?", "back": "The Bhagavad Gita"}, {"front": "What is the collective name for the four oldest scriptures in Hinduism?", "back": "The Vedas"}, {"front": "The dialogue format of the Upanishads involves a student asking what kind of questions?", "back": "The deepest questions (e.g., What happens after death? What is God?)"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
