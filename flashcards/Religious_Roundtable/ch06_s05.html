<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 6, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Which major Chinese tradition is often considered the least-known in the Western world despite its immense influence?", "back": "Taoism"}, {"front": "Chinese medicine, including acupuncture and herbalism, is fundamentally rooted in which philosophical framework?", "back": "Taoist cosmology (and the yin-yang framework)"}, {"front": "In the context of Chinese medicine, what does the term \"qi\" represent?", "back": "Vital energy flowing through the body"}, {"front": "The practice of arranging physical spaces to be in harmony with natural forces is known as _____.", "back": "Feng shui"}, {"front": "Which specific category of martial arts provides an explicit embodiment of the concept of wu wei?", "back": "Internal martial arts"}, {"front": "Name three specific examples of internal martial arts mentioned as embodiments of wu wei.", "back": "Tai chi, bagua, and xinyi"}, {"front": "What three core elements characterize the Taoist aesthetic in Chinese painting and poetry?", "back": "Emptiness, suggestion, and naturalness"}, {"front": "The cross-cultural fusion of Taoism and Buddhism in China resulted in the creation of _____.", "back": "Chan Buddhism (known as Zen in Japan)"}, {"front": "Which two specific Taoist figures are credited with influencing the development of Zen Buddhism?", "back": "Zhuangzi and Laozi"}, {"front": "Zen Buddhism's distrust of elaborate systems and doctrine is a direct debt to which philosophical tradition?", "back": "Taoism"}, {"front": "In terms of practice, Zen's emphasis on \"sitting quietly with what is\" is derived from _____.", "back": "Taoism"}, {"front": "How does Taoism view the relationship between humans and the natural world in terms of hierarchy?", "back": "Humans are participants in nature rather than its masters"}, {"front": "According to Taoist ecological ethics, what is the inevitable result of attempting to dominate natural systems?", "back": "Resistance and disorder"}, {"front": "True or False: Taoism teaches that the natural world exists primarily for human use.", "back": "False (it teaches the Tao flows through everything equally)"}, {"front": "The Taoist concept of _____ challenges the modern obsession with productivity and efficiency.", "back": "Wu wei"}, {"front": "Contrary to the misconception of laziness, what does wu wei actually signify in problem-solving?", "back": "Recognizing that not all problems are solved by doing more"}, {"front": "In the philosophy of wu wei, what is often considered the \"wisest action\"?", "back": "To stop, observe, and allow the natural movement of things to reveal itself"}, {"front": "Historically, where was the lesson of wu wei considered just as countercultural as it is in the modern world?", "back": "The courts of ancient China"}, {"front": "Which specific component of Chinese medicine focuses on the flow of vital energy through the body?", "back": "Acupuncture (or the concept of qi)"}, {"front": "The Zen emphasis on _____ experience over formal doctrine is a hallmark of its Taoist heritage.", "back": "Direct"}, {"front": "Concept: Qi", "back": "Definition: The vital energy believed to flow through the body, serving as a core concept in Taoist-rooted Chinese medicine."}, {"front": "How does the Taoist view of the \"summit of creation\" differ from many other worldviews?", "back": "It never taught that human beings are the summit of creation."}, {"front": "In Taoist painting, what is the purpose of the aesthetic of \"emptiness\"?", "back": "To allow for suggestion and naturalness rather than overcrowding the work."}, {"front": "Which art form uses the Taoist principle of \"natural forces\" to determine the arrangement of furniture or buildings?", "back": "Feng shui"}, {"front": "The internal martial art of xinyi is an embodiment of which Taoist principle?", "back": "Wu wei"}, {"front": "Taoism is increasingly cited as a modern resource for which branch of ethics?", "back": "Ecological (or environmental) ethics"}, {"front": "According to the text, how does the Tao flow through the various parts of the universe?", "back": "It flows through everything equally."}, {"front": "What is the primary difference between Chan and Zen as described in the text?", "back": "Chan is the Chinese origin, while Zen is the Japanese development of the same fusion."}, {"front": "The Taoist aesthetic of _____ refers to the quality of being unforced or spontaneous in art and poetry.", "back": "Naturalness"}, {"front": "Wu wei suggests that when we attempt to dominate nature, we generate _____.", "back": "Resistance"}, {"front": "In modern terms, Taoism acts as a radical challenge to the obsession with _____.", "back": "Productivity (or efficiency/ceaseless activity)"}, {"front": "What is the relationship between the yin-yang framework and Chinese medicine?", "back": "The framework provides the structural basis for medical diagnosis and treatment."}, {"front": "Why is the Taoist influence on civilization described as \"still very much alive\"?", "back": "It persists through practices like acupuncture, feng shui, and martial arts."}, {"front": "Identify the core Taoist influence on Zen's attitude toward complex religious structures.", "back": "A distrust of elaborate systems"}, {"front": "In the context of ecological ethics, Taoism posits that humans are _____ in a system rather than owners of it.", "back": "Participants"}, {"front": "Acupuncture is rooted in Taoist _____ and the yin-yang framework.", "back": "Cosmology"}, {"front": "The internal martial art of _____ is often the most recognized embodiment of wu wei in the West.", "back": "Tai chi"}, {"front": "What does the Taoist aesthetic of \"suggestion\" imply in the context of Chinese poetry?", "back": "Using minimal language to hint at deeper, unstated meanings."}, {"front": "Taoism's rejection of humans as the \"summit of creation\" aligns with which contemporary movement?", "back": "Environmentalism (or ecological thinking)"}, {"front": "Term: Wu wei", "back": "Definition: A Taoist principle of 'non-doing' or 'effortless action' that involves observing and following the natural flow of events."}, {"front": "How does Taoism define the \"wisest action\" regarding problem-solving?", "back": "Stopping and observing until the natural movement reveals the solution."}, {"front": "Which specific Taoist art involves the orientation and harmony of living spaces?", "back": "Feng shui"}, {"front": "The Taoist debt in Zen is visible in its preference for direct experience over _____.", "back": "Doctrine"}, {"front": "Which martial art, alongside tai chi and xinyi, is mentioned as an internal Taoist practice?", "back": "Bagua"}, {"front": "What is the Taoist perspective on the utility of the natural world?", "back": "Nature does not exist solely for human use."}, {"front": "According to the text, Taoism's challenge to productivity is considered \"quietly _____.\"", "back": "Radical"}, {"front": "In Chinese medicine, what framework is used alongside Taoist cosmology?", "back": "The yin-yang framework"}, {"front": "The synthesis of Taoism and Buddhism produced one of the world's most creative _____ fusions.", "back": "Cross-cultural"}, {"front": "What does the Taoist aesthetic of naturalness mean in the context of poetry?", "back": "An emphasis on being unforced and in tune with the environment."}, {"front": "Under the principle of wu wei, what is the consequence of \"ceaseless activity\"?", "back": "It ignores the fact that not all problems are solved by doing more."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
