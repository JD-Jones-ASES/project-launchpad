<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 11, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the fundamental warning given in the opening sentence of the Tao Te Ching regarding the Tao?", "back": "The text opens with, 'The Tao that can be told is not the eternal Tao,' warning that whatever is said about the source of the universe will be incomplete and distorted by language."}, {"front": "According to Taoism, what is the philosophical position concerning the ground of reality and language?", "back": "The ground of reality cannot be captured in words without being distorted, representing a radical position that acknowledges the limitations of human language."}, {"front": "Define the key term 'wu wei' in the context of Taoism.", "back": "Wu wei (Chinese for 'non-action' or 'effortless action') does not mean doing nothing, but rather acting in alignment with the natural flow of things, without forcing or imposing one's will."}, {"front": "How does 'wu wei' manifest at the cosmic level, according to Taoist thought?", "back": "At the cosmic level, 'the Tao does nothing' (wu wei), yet through its natural and effortless flow, everything is accomplished, much like rivers flowing to the sea without forcing their way."}, {"front": "How should a Taoist sage act, reflecting the principle of wu wei?", "back": "A sage acts in alignment with the natural current of things, not by compulsion or imposition of will, but by discovering and flowing with the 'Way'."}, {"front": "How does Chapter 25 of the Tao Te Ching describe the state of reality before heaven and earth?", "back": "It was something undifferentiated and yet complete, silent and formless, standing alone without changing, going everywhere without harm. It could be called the mother of all things."}, {"front": "Why is the name 'Tao' (The Way) considered a concession in the Tao Te Ching?", "back": "The text acknowledges that the source of the universe has no name that truly fits, and 'Tao' is reluctantly given as a concession to the limitations of human language."}, {"front": "Outline the cosmological sequence described in Chapter 42 of the Tao Te Ching.", "back": "The Tao begot one. One begot two. Two begot three. And three begot the ten thousand things, describing the unfolding of the cosmos from unity to multiplicity."}, {"front": "What crucial elements are notably absent from the Taoist account of creation, unlike many other traditions?", "back": "There is no divine will, no plan, no purpose, and no moment of decision. The cosmos emerges naturally and effortlessly from the Tao, without design or a conscious creator."}, {"front": "How does the emergence of the cosmos from the Tao exemplify cosmic wu wei?", "back": "The universe arises through non-forcing, non-striving, and non-imposition, naturally flowing from the Tao like a river from a spring, without deliberate action."}, {"front": "What is the immediate implication of understanding the Tao for human life?", "back": "The person who understands the Tao will live by discovering the natural current and flowing with it, rather than by conquering the world or imposing their will on it."}, {"front": "How do yin and yang function in Taoist cosmology?", "back": "Yin and yang are complementary, mutually arising forces that together account for all of nature's dynamism. They are not opposing forces of good and evil."}, {"front": "Give examples of the complementary nature of yin and yang.", "back": "Examples include day requiring night, activity requiring rest, and fullness requiring emptiness, demonstrating their interdependence."}, {"front": "What does the taijitu symbol (the familiar black-and-white symbol) illustrate about yin and yang?", "back": "It depicts that each half (yin or yang) contains a drop of the other, signifying that neither can exist without its complement and they are intertwined."}, {"front": "How does Taoism characterize the relationship between apparent opposites in the cosmos?", "back": "The cosmos is described as a 'dance between complements,' rather than a battle between opposites, where understanding this dance is the beginning of wisdom."}, {"front": "According to the Tao Te Ching (Chapter 1), what is revealed when one is 'always without desire'?", "back": "If one is always without desire, the deep mystery of the Tao can be sounded. If desire always exists, only its outer fringe will be seen."}, {"front": "How does the Tao Te Ching (Chapter 1) distinguish between the 'Originator of heaven and earth' and the 'Mother of all things'?", "back": "Conceived of as having no name, it is the Originator of heaven and earth; conceived of as having a name, it is the Mother of all things."}, {"front": "What is the relationship between man, Earth, Heaven, and the Tao concerning their 'law'?", "back": "Man takes his law from the Earth; the Earth takes its law from Heaven; Heaven takes its law from the Tao. The law of the Tao is its being what it is."}, {"front": "Who is Laozi, according to tradition, and what is the meaning of his name?", "back": "Laozi is the legendary author of the Tao Te Ching, traditionally an archivist in the Zhou dynasty court. His name simply means 'Old Master,' and some scholars doubt he was a single historical person."}, {"front": "How did the Tao Te Ching supposedly come into existence?", "back": "Tradition holds that Laozi, disillusioned with civilization, departed for the western frontier, and at the border, a gatekeeper begged him to write down his wisdom. The result was the 81 short chapters of the Tao Te Ching."}, {"front": "What is the significance of the Tao Te Ching in literary and religious history?", "back": "It is one of the most translated books in human history and a foundational text for Taoism, offering profound insights into the 'Way'."}, {"front": "What is the 'Mystery' referred to in Chapter 1 of the Tao Te Ching?", "back": "The 'Mystery' refers to the unified, underlying source that, while essentially the same, receives different names as development takes place, leading to 'all that is subtle and wonderful'."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
