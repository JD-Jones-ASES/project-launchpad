<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 16, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Karl Marx, what is the primary cause of human suffering?", "back": "Marx argues that human suffering is primarily produced by material conditions—economic structures, property relations, and the organization of labor—rather than being a spiritual condition."}, {"front": "How does Marx view capitalism in relation to human suffering?", "back": "Marx views capitalism as the 'disease' itself, a system that systematically takes the fruit of workers' labor and returns it as a hostile power standing over them, thereby causing suffering."}, {"front": "Define Karl Marx's concept of 'alienation' (Entfremdung).", "back": "Alienation (Entfremdung) is Marx's term for the condition of workers under capitalism, where human beings become estranged from their labor, products, fellow humans, and their own essential nature. It is a structural reality, not merely a feeling."}, {"front": "What is the etymological significance of the German word 'Entfremdung' as used by Marx?", "back": "The German word 'Entfremdung' carries the sense of becoming foreign or strange to something that should inherently be one's own."}, {"front": "In which key text did Marx identify the four distinct dimensions of alienation?", "back": "Karl Marx identified the four distinct dimensions of alienation in his *Economic and Philosophic Manuscripts of 1844*."}, {"front": "Describe the first dimension of alienation: alienation from the product of labor.", "back": "The worker is alienated from the product because the goods they create do not belong to them but to the capitalist, appearing as an alien object or commodity rather than an expression of their creativity."}, {"front": "Explain the second dimension of alienation: alienation from the act of labor itself.", "back": "Work, which should be an expression of human creativity and freedom, becomes under capitalism a compelled activity done not for its own sake but merely for survival. The worker feels herself only when not working, making labor dehumanizing."}, {"front": "What is Marx's concept of 'species-being' (Gattungswesen)?", "back": "Species-being (Gattungswesen) is Marx's term for the essential, distinctively human capacity to consciously shape one's world, make one's life-activity an object of conscious will and imagination, and act for the good of the species, unlike animals driven by instinct."}, {"front": "How does capitalism lead to alienation from one's species-being?", "back": "Capitalism inverts human nature by taking the activity that should express human freedom (conscious labor) and turning it into a repetitive, compelled activity focused solely on survival, much like an animal, thereby stripping workers of their distinctively human capacity."}, {"front": "Describe the fourth dimension of alienation: alienation from other humans.", "back": "Under capitalism, all human relationships are mediated by economic competition and wage relations, replacing genuine human community with instrumental relationships where people relate to one another as means to an end, rather than as ends in themselves."}, {"front": "How does Marx contrast human 'species-being' with animal activity?", "back": "Unlike animals that act from instinct to meet immediate needs, humans, as 'species-beings,' can step back, consciously shape their world, and envision what they want to create. Capitalism, however, reduces human labor to animal-like, repetitive, compelled activity for survival."}, {"front": "Why did Marx reject individual spiritual practices as a solution for suffering?", "back": "Marx believed that spiritual or individual solutions for suffering were merely treating the symptom while ignoring the structural disease of capitalism. He argued that since suffering is structural, liberation must also be structural."}, {"front": "What is Marx's prescription for liberation, given his diagnosis of structural suffering?", "back": "Marx prescribed structural liberation through collective action—the organized resistance of the working class (the proletariat) against the owning class (the bourgeoisie)—to overthrow the capitalist conditions that produce alienation."}, {"front": "In Marx's analysis, who are the 'proletariat' and the 'bourgeoisie'?", "back": "The 'proletariat' refers to the working class, while the 'bourgeoisie' refers to the owning or capitalist class."}, {"front": "What is the ultimate goal of the classless society Marx envisioned (communism)?", "back": "The ultimate goal of communism is not just an economic arrangement but a state of human wholeness. When the structures that produce alienation are abolished, human beings can finally be what they truly are: free, creative, and social beings."}, {"front": "What do the 'chains' represent in the famous quote from *The Communist Manifesto* ('The proletarians have nothing to lose but their chains.')?", "back": "The 'chains' symbolize the oppressive material conditions, economic structures, and systematic alienation imposed upon the working class under capitalism."}, {"front": "In what sense can Marx's vision of communism be considered a 'doctrine of salvation'?", "back": "It can be seen as a doctrine of salvation because it aims for a state of human wholeness and liberation from suffering by abolishing the structural conditions that produce alienation, allowing humans to achieve their true, free, and creative nature."}, {"front": "What is a significant historical fact about the *Economic and Philosophic Manuscripts of 1844* and 20th-century Marxist regimes?", "back": "The *Manuscripts* were not published until 1932, meaning many important Marxist regimes of the 20th century (e.g., the Russian Revolution) had already been carried out without having read this foundational account of alienation."}, {"front": "How do some scholars argue the history of Communism might have differed if the *Economic and Philosophic Manuscripts of 1844* had been widely read earlier?", "back": "Some scholars argue that if early Marxist regimes had read this foundational text on alienation, the history of Communism might have looked very different, potentially leading to a greater focus on humanistic aspects rather than solely economic or statist interpretations."}, {"front": "How old was Karl Marx when he wrote the *Economic and Philosophic Manuscripts of 1844*?", "back": "Karl Marx was twenty-six years old when he wrote the *Economic and Philosophic Manuscripts of 1844*."}, {"front": "According to Marx, what is the consequence for the worker as she produces more under capitalism?", "back": "The more a worker produces, the more wealth accumulates for the capitalist, which then confronts the worker not as an expression of her creativity but as a hostile, alien power, thereby deepening her alienation."}, {"front": "What is the fundamental difference between Marx's materialist premise and a spiritual view regarding the origin of suffering?", "back": "A spiritual view typically sees suffering as an internal, spiritual condition requiring inner healing or transformation. Marx's materialist view fundamentally opposes this, asserting that suffering originates from external, concrete material conditions and economic structures."}, {"front": "Why does Marx state that under capitalism, 'The worker does not feel herself in her work; she feels herself only when she is not working'?", "back": "This statement highlights alienation from the act of labor itself. Under capitalism, work is compelled and dehumanizing, done purely for survival. The worker's true self and freedom are expressed only outside of the compelled activity of labor."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
