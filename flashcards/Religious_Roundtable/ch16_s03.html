<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 16, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Karl Marx, what is the fundamental cause of human suffering?", "back": "Marx argued that suffering is primarily produced by material conditions—economic structures, property relations, and the organization of labor—rather than spiritual conditions.", "id": "fc01"}, {"front": "What did Marx call the condition where capitalism systematically takes the fruit of workers' labor and returns it as a hostile power?", "back": "He called it Entfremdung, or 'alienation' (estrangement).", "id": "fc02"}, {"front": "What is Marx's definition of 'alienation' (Entfremdung)?", "back": "It is the condition of workers under capitalism in which human beings become estranged from their labor, products, fellow humans, and their own essential nature. It is a structural reality, not merely a feeling.", "id": "fc03"}, {"front": "What is the meaning conveyed by the German word *Entfremdung*?", "back": "It carries the sense of becoming foreign or strange to something that should rightfully be one's own.", "id": "fc04"}, {"front": "In which influential text did Marx identify four distinct dimensions of alienation?", "back": "The *Economic and Philosophic Manuscripts of 1844*.", "id": "fc05"}, {"front": "Describe the first dimension of alienation: alienation from the product of one's labor.", "back": "Workers create products that do not belong to them, but to the capitalist. The product confronts them as an alien object, a commodity that accumulates wealth for someone else.", "id": "fc06"}, {"front": "Explain the second dimension of alienation: alienation from the act of labor itself.", "back": "Work, which should be an expression of human creativity, becomes a compelled activity under capitalism, performed only for survival. Workers feel themselves only when *not* working, making labor dehumanizing.", "id": "fc07"}, {"front": "What is Marx's concept of 'species-being' (*Gattungswesen*)?", "back": "It is the essential, distinctively human capacity to make one's own life-activity the object of conscious will and imagination, envisioning and creating for the good of the species.", "id": "fc08"}, {"front": "How does capitalism lead to alienation from one's 'species-being'?", "back": "Capitalism inverts this human capacity by turning free, conscious creative labor into repetitive, compelled activity focused only on survival, making humans less than fully human.", "id": "fc09"}, {"front": "Compare human labor to animal activity according to Marx, and explain how alienated labor blurs this distinction.", "back": "Humans can consciously shape their world and act on ideas (species-being), unlike animals driven by instinct. Alienated labor reduces human work to repetitive, compelled activity purely for survival, akin to animalistic behavior.", "id": "fc10"}, {"front": "Describe the fourth dimension of alienation: alienation from other humans.", "back": "Under capitalism, human relationships are mediated by economic competition and wage relations, replacing genuine community with instrumental relationships where people relate as means to an end (e.g., friendship becoming networking).", "id": "fc11"}, {"front": "What did Marx believe was the only way to achieve liberation from suffering, given his diagnosis of structural alienation?", "back": "Liberation must be structural, achieved through collective action—the organized resistance of the working class (proletariat) against the owning class (bourgeoisie)—to overthrow the economic conditions causing alienation.", "id": "fc12"}, {"front": "Why did Marx dismiss individual spiritual practice as a solution for suffering under capitalism?", "back": "He believed individual spiritual practice only treats symptoms and cannot fix a broken economic system; suffering is structural and requires a structural solution.", "id": "fc13"}, {"front": "In Marx's revolutionary framework, who are the 'proletariat' and the 'bourgeoisie'?", "back": "The proletariat refers to the working class, and the bourgeoisie refers to the owning or capitalist class.", "id": "fc14"}, {"front": "Beyond being an economic arrangement, what did Marx envision as the ultimate state of 'communism'?", "back": "A state of human wholeness, where the structures producing alienation are abolished, allowing human beings to be truly free, creative, and social. He viewed it as a 'doctrine of salvation.'", "id": "fc15"}, {"front": "Recite the famous closing lines of *The Communist Manifesto* regarding the proletarians.", "back": "'The proletarians have nothing to lose but their chains. They have a world to win.'", "id": "fc16"}, {"front": "What famous call to action concludes *The Communist Manifesto*?", "back": "'WORKING MEN OF ALL COUNTRIES, UNITE!'", "id": "fc17"}, {"front": "When were Marx's *Economic and Philosophic Manuscripts of 1844* finally published, and what is the significance of this timeline?", "back": "They were published in 1932, 88 years after being written. This meant many 20th-century Marxist regimes, including the Russian Revolution, had operated without knowledge of Marx's foundational account of alienation.", "id": "fc18"}, {"front": "According to some scholars, how might the history of Communism have been different if Marx's *Economic and Philosophic Manuscripts of 1844* had been published earlier?", "back": "Some scholars argue that if Marxist regimes had read this foundational account of alienation, their understanding and implementation of Communism might have looked very different.", "id": "fc19"}, {"front": "Marx argued that capitalism turns the activity that should express human freedom into what kind of activity?", "back": "It turns it into the activity of an animal — repetitive, compelled, and oriented only toward survival.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
