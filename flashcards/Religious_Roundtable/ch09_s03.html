<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 9, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In the context of a tradition, what is the 'canon'?", "back": "An authorized collection of texts that define a tradition's beliefs, practices, and self-understanding."}, {"front": "How do Communist governments treat core Marxist texts in terms of governance?", "back": "They are treated as the final authority on questions of political and social life."}, {"front": "Identify the shortest and most widely read text in the Marxist tradition.", "back": "The Communist Manifesto."}, {"front": "In what year was the Communist Manifesto published?", "back": "1848."}, {"front": "Who were the two authors of the Communist Manifesto?", "back": "Karl Marx and Friedrich Engels."}, {"front": "The Communist Manifesto was written at the request of which organization?", "back": "The Communist League."}, {"front": "According to the text, the Communist Manifesto's structure of diagnosis, prosecution, and exhortation is described as being almost _____.", "back": "Liturgical."}, {"front": "How does the Communist Manifesto characterize the history of all hitherto existing society?", "back": "As a history of class struggle."}, {"front": "Which economic system does the Communist Manifesto primarily prosecute?", "back": "Capitalism."}, {"front": "Complete the final exhortation of the Manifesto: 'The proletarians have nothing to lose but their _____.'", "back": "Chains."}, {"front": "According to the final lines of the Manifesto, what do the workers of the world have to win?", "back": "A world."}, {"front": "What famous rallying cry concludes the Communist Manifesto?", "back": "Workers of all countries, unite!"}, {"front": "Unlike a dry economics paper, what is the intended purpose of the Manifesto's prose style?", "back": "To move people to action."}, {"front": "The Communist Manifesto is described as the most widely distributed _____ document in history.", "back": "Political."}, {"front": "What famous opening line describes the state of 19th-century Europe in the Manifesto?", "back": "A specter is haunting Europe — the specter of communism."}, {"front": "Title: Das Kapital (Volume 1, 1867)", "back": "Content: A systematic analysis of capitalism as an economic system."}, {"front": "What is the full title of Marx's major theoretical work, published in 1867?", "back": "Capital: A Critique of Political Economy."}, {"front": "While the Manifesto is described as a 'sermon,' Das Kapital is categorized as a _____.", "back": "Treatise."}, {"front": "Which specific economic theory regarding the origin of value is detailed in Das Kapital?", "back": "The labor theory of value."}, {"front": "Name three economic topics analyzed in detail within Das Kapital.", "back": "Commodity exchange, the labor theory of value, and the accumulation of capital."}, {"front": "Who assembled the second and third volumes of Das Kapital from Marx's notes?", "back": "Friedrich Engels."}, {"front": "What is the common alternative name for the Economic and Philosophic Manuscripts of 1844?", "back": "The Paris Manuscripts."}, {"front": "Why were the Economic and Philosophic Manuscripts of 1844 not published during Marx's lifetime?", "back": "They were private notebooks not intended for publication."}, {"front": "In what year were the Paris Manuscripts finally discovered and published?", "back": "1932."}, {"front": "How did the 1932 publication of the Paris Manuscripts alter scholarly views of Marx?", "back": "It revealed him as a thinker deeply concerned with human nature rather than just economics."}, {"front": "Which major Marxist concept regarding the worker's psychological state originates in the Paris Manuscripts?", "back": "Alienation."}, {"front": "In the Marxist 'canon,' which text serves as the systematic scripture providing theoretical depth?", "back": "Das Kapital."}, {"front": "In the Marxist 'canon,' which text serves as the founding document defining the movement?", "back": "The Communist Manifesto."}, {"front": "Name three major historical figures identified as interpreters of the Marxist tradition.", "back": "Lenin, Mao, and Trotsky."}, {"front": "How does the text compare the different readings of the Manifesto (e.g., Leninist vs. Maoist)?", "back": "They are compared to the different readings of the Bible (Protestant/Catholic) or Quran (Sunni/Shia)."}, {"front": "What consistent three-part pattern is shared by both religious and political movements?", "back": "A founding text, a community of interpretation, and competing schools of thought."}, {"front": "Term: Proletarians", "back": "Definition: The working class who, according to Marx, have a world to win through revolution."}, {"front": "How many copies of core Marxist texts are estimated to have been printed worldwide?", "back": "Hundreds of millions of copies."}, {"front": "Approximately how long does it take to read the entire Communist Manifesto?", "back": "About an hour."}, {"front": "What distinguishes the focus of the Paris Manuscripts from the focus of Das Kapital?", "back": "The Manuscripts focus on human nature and alienation, while Das Kapital focuses on economic systems and capital."}, {"front": "According to the text, what role did Friedrich Engels play regarding the later volumes of Das Kapital?", "back": "He assembled and published volumes two and three after Marx's death."}, {"front": "The prose of the Communist Manifesto is described as being urgent, vivid, and designed for what purpose?", "back": "Moving people to action."}, {"front": "What does the text suggest is the value of reading the Communist Manifesto today?", "back": "It is a worthwhile exercise in understanding the 20th century."}, {"front": "What is the primary diagnosis of capitalism provided in the Communist Manifesto?", "back": "A system of class exploitation."}, {"front": "In the comparison of religious and political texts, which text acts as the 'systematic scripture' for Communism?", "back": "Das Kapital."}, {"front": "Where was Karl Marx living when he wrote the 1844 Manuscripts?", "back": "Paris."}, {"front": "The text characterizes the Communist Manifesto as a short political _____.", "back": "Pamphlet."}, {"front": "Which Marxist text provides the 'theoretical foundation' for the economic claims made in the Manifesto?", "back": "Das Kapital."}, {"front": "According to the 'didyouknow' section, in what languages is the Manifesto available?", "back": "Hundreds of languages."}, {"front": "Marx's analysis of the historical development of the _____ system is a key component of Das Kapital.", "back": "Factory."}, {"front": "The Economic and Philosophic Manuscripts are primarily concerned with what it means to live a fully _____ life.", "back": "Human."}, {"front": "Which school of thought is specifically mentioned alongside Leninist and Maoist as an interpretation of the Manifesto?", "back": "Trotskyist."}, {"front": "What did the Manifesto predict regarding the future of the working class?", "back": "The inevitable revolution of the working class."}, {"front": "How does the text describe the difficulty and length of Das Kapital compared to the Manifesto?", "back": "It is a very long, very dense book that took decades to write."}, {"front": "Which text is described as containing passages of 'real philosophical power' and 'sharp wit'?", "back": "Das Kapital."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
