<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the foundational text of Taoism?", "back": "The Tao Te Ching (Daodejing)."}, {"front": "To whom is the Tao Te Ching traditionally attributed?", "back": "Laozi."}, {"front": "How many chapters are contained in the Tao Te Ching?", "back": "Eighty-one chapters."}, {"front": "The Tao Te Ching alternates between which two primary thematic focuses?", "back": "The cosmic and the political."}, {"front": "How does the Tao Te Ching describe the Tao in a cosmic sense?", "back": "As the silent ground of all being."}, {"front": "What political advice does the Tao Te Ching offer to rulers?", "back": "To govern wisely by doing less."}, {"front": "What literary device is used in the Tao Te Ching to unsettle the mind's habit of seeking easy answers?", "back": "Deliberate paradoxes."}, {"front": "According to the Tao Te Ching, what is 'intelligence'?", "back": "Knowing others."}, {"front": "According to the Tao Te Ching, what is 'true wisdom'?", "back": "Knowing yourself."}, {"front": "In the Tao Te Ching, what does it take to overcome others?", "back": "Force."}, {"front": "In the Tao Te Ching, what does it take to overcome yourself?", "back": "Strength."}, {"front": "The title 'Tao Te Ching' is often translated as 'The Classic of the Way and Its _____'.", "back": "Power."}, {"front": "During which approximate centuries was the Tao Te Ching likely compiled?", "back": "The 6th to 4th centuries BCE."}, {"front": "What does the term 'te' refer to in the context of the Tao Te Ching?", "back": "The nature of virtue."}, {"front": "Which religious text is the only book in history more translated than the Tao Te Ching?", "back": "The Bible."}, {"front": "What is considered the second great classic text of Taoism?", "back": "The Chuang Tzu (Zhuangzi)."}, {"front": "To whom is the Chuang Tzu attributed?", "back": "Zhuangzi."}, {"front": "In which century BCE did the philosopher Zhuangzi live?", "back": "The 4th century BCE."}, {"front": "Unlike the short chapters of the Tao Te Ching, what literary forms comprise the Chuang Tzu?", "back": "Essays, parables, dialogues, and philosophical arguments."}, {"front": "Which story in the Chuang Tzu illustrates the concept of wu wei through the craft of a butcher?", "back": "The story of Cook Ding."}, {"front": "Why does Cook Ding's knife never dull?", "back": "He cuts between the joints, finding the space that is already there."}, {"front": "In the Chuang Tzu, the movement of Cook Ding's knife is a metaphor for what?", "back": "How the Tao moves between all things."}, {"front": "The effortless action of Cook Ding's butchery is a practical example of _____.", "back": "Wu wei."}, {"front": "What is the primary goal of the humor and parables found in the Chuang Tzu?", "back": "To explore the Tao and the limitations of conventional thinking."}, {"front": "According to the Chuang Tzu, what is available to those who live in harmony with the Way?", "back": "Freedom."}, {"front": "What is the name of the vast collection of hundreds of volumes in the religious Taoist canon?", "back": "The Daozang."}, {"front": "Term: Daozang.", "back": "Definition: The Taoist 'Canon' consisting of ritual manuals, meditation guides, and other specialized texts."}, {"front": "Besides ritual and meditation, what two scientific/philosophical fields are addressed in the Daozang?", "back": "Cosmology and medicine."}, {"front": "What type of texts in the Daozang focus on the transformation of materials or internal states?", "back": "Alchemical texts."}, {"front": "Why do translations of the Tao Te Ching vary so dramatically?", "back": "Classical Chinese allows multiple readings of almost every line."}, {"front": "What linguistic feature of the Tao Te Ching 'unsettles the mind's habit of grabbing for easy answers'?", "back": "Paradox."}, {"front": "What is the alternative romanization for the 'Tao Te Ching'?", "back": "Daodejing."}, {"front": "Zhuangzi's writing style is described as comic, lyrical, and vertiginously _____.", "back": "Strange."}, {"front": "The Tao Te Ching describes 'te' as the nature of virtue and the art of living in _____ with the Way.", "back": "Harmony."}, {"front": "What shared core do the Tao Te Ching and the Chuang Tzu represent for all Taoist traditions?", "back": "The philosophical core."}, {"front": "In the Tao Te Ching, 'knowing others' is contrasted with 'knowing _____' as true wisdom.", "back": "Yourself."}, {"front": "In the Tao Te Ching, 'overcoming others' is contrasted with 'overcoming _____' as true strength.", "back": "Yourself."}, {"front": "What is the physical characteristic of Cook Ding’s knife after years of use?", "back": "It never dulls."}, {"front": "How does the Chuang Tzu approach philosophical arguments differently than the Tao Te Ching?", "back": "It uses humor, parables, and dialogues rather than short, paradoxical chapters."}, {"front": "The Daozang includes ritual manuals and _____ guides.", "back": "Meditation."}, {"front": "What is the literal translation of the term 'Daozang'?", "back": "Taoist 'Canon'."}, {"front": "The Tao Te Ching describes the Tao as the silent _____ of all being.", "back": "Ground."}, {"front": "What is the approximate length of some chapters in the Tao Te Ching?", "back": "Barely a paragraph long."}, {"front": "Which classic text is attributed to the 4th-century BCE philosopher Zhuangzi?", "back": "The Chuang Tzu."}, {"front": "According to the text, what prevents the mind from seeking 'easy answers' when reading the Tao Te Ching?", "back": "Sitting with its paradoxes."}, {"front": "What does the Chuang Tzu explore regarding human cognition?", "back": "The limitations of conventional thinking."}, {"front": "Which specific occupation does the Chuang Tzu use to demonstrate harmony with the Way?", "back": "Butcher (Cook Ding)."}, {"front": "The Tao Te Ching’s eighty-one chapters describe the Tao, the nature of virtue, and the art of _____ in harmony with the Way.", "back": "Living."}, {"front": "What is the size of the canon in the religious Taoist tradition?", "back": "Enormous (hundreds of volumes)."}, {"front": "In the context of the Chuang Tzu, Cook Ding's knife finds the _____ that is already there.", "back": "Space."}, {"front": "Which Taoist classic is noted for being 'vertiginously strange'?", "back": "The Chuang Tzu (Zhuangzi)."}, {"front": "What quality does the Tao Te Ching claim is required to overcome yourself?", "back": "Strength."}, {"front": "The Tao Te Ching is primarily concerned with the nature of the Tao, the nature of virtue (te), and the art of _____.", "back": "Living."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
