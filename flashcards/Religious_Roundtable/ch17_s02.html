<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 17, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What characterizes Hinduism's approach to the concepts of transcendence and immanence?", "back": "Hinduism is a vast family of traditions developed over thousands of years, not a single unified system, offering a rich and diverse vocabulary for understanding transcendence and immanence."}, {"front": "Define Brahman in Hindu theology.", "back": "Brahman is the ultimate, uncaused, unlimited, eternal reality from which everything arises, in which everything exists, and to which everything returns. It is the impersonal, infinite ground of all being."}, {"front": "What are the Upanishads, and what is their significance in Hindu scripture?", "back": "The Upanishads are the philosophical heart of the Hindu scriptures, composed roughly between 800 and 200 BCE, known for their persistent exploration of 'What is Brahman?'"}, {"front": "What is the relationship between Brahman and Atman, according to the Upanishads?", "back": "The Upanishads teach that Brahman is identical with Atman, the innermost self of every person. To know Brahman is to know one's deepest self."}, {"front": "Define Brahman nirguna.", "back": "Brahman nirguna refers to Brahman 'without qualities' – the utterly transcendent, formless, attribute-less ground of being that cannot be described, only approached through negation ('neti neti')."}, {"front": "Define Brahman saguna.", "back": "Brahman saguna refers to Brahman 'with qualities' – the divine as it manifests with personality, form, and relationship (e.g., Krishna, Shiva, Devi, Vishnu)."}, {"front": "How do Brahman nirguna and Brahman saguna represent different aspects of ultimate reality?", "back": "Nirguna represents Brahman as pure transcendence (formless, attribute-less), while Saguna represents Brahman as immanence (the infinite made approachable with qualities). Both are considered real aspects of the same ultimate reality."}, {"front": "Are the gods of the Hindu pantheon (e.g., Krishna, Shiva) considered rivals to Brahman?", "back": "No, the gods of the Hindu pantheon are not rivals to Brahman; they are manifestations of Brahman saguna, acting as 'windows' through which finite human beings can encounter the infinite."}, {"front": "How does the Bhagavad Gita dramatically illustrate the concept of Saguna Brahman?", "back": "In Chapter 11, Krishna reveals his cosmic form (vishvarupa) to Arjuna, showing all of creation, time, and existence simultaneously present in a single figure, demonstrating Brahman's immanent yet transcendent nature."}, {"front": "What is one of the four great sayings (mahavakyas) of the Upanishads that speaks to the transcendence-immanence tension?", "back": "'Tat tvam asi' – 'That thou art.'"}, {"front": "What does 'Tat tvam asi' imply about the Atman and Brahman?", "back": "It implies that the Atman, the innermost self of every human being, is not ultimately separate from Brahman."}, {"front": "Distinguish between pantheism and panentheism.", "back": "Pantheism claims the world *is* God, equating God with the universe. Panentheism states that the world is *within* God, and God is *more than* the world."}, {"front": "Which term, pantheism or panentheism, best describes the Hindu understanding of God's relationship to the world?", "back": "Panentheism, as Hinduism posits that the world is within God, but God's reality is greater than the world itself."}, {"front": "What is the core teaching of the Advaita (non-dual) school of Vedanta, associated with Shankara?", "back": "Advaita Vedanta argues that Brahman and Atman are, at the deepest level, identical. The experience of separation is considered maya (illusion)."}, {"front": "In Advaita Vedanta, what is 'maya'?", "back": "Maya refers to the illusion of separation – it means we misunderstand the ultimate nature of reality, not that the world itself does not exist."}, {"front": "How do the Vishishtadvaita and Dvaita schools of Vedanta differ from Advaita regarding Atman and Brahman?", "back": "Vishishtadvaita (Ramanuja) and Dvaita (Madhva) resist the complete identification of Atman and Brahman, maintaining a distinction between the soul and God while affirming their intimate relationship, unlike Advaita's assertion of identity."}, {"front": "What does the diversity of Hindu theological schools (like Advaita, Vishishtadvaita, Dvaita) signify regarding transcendence and immanence?", "back": "The diversity reflects a long-standing debate and argument within Hinduism about the degree to which transcendence and immanence can be reconciled."}, {"front": "What is the etymological meaning of 'Upanishad,' and what does it suggest about their teaching method?", "back": "The word 'Upanishad' comes from Sanskrit roots meaning 'sitting down near,' suggesting the intimate, face-to-face transmission of philosophical wisdom through dialogue between teacher and student, often emphasizing discovery through questioning."}, {"front": "Which aspect of Brahman (nirguna or saguna) is primarily addressed by the Upanishads' persistent question, 'What is Brahman?'", "back": "The persistent questioning suggests an attempt to grasp Brahman nirguna, the ultimately indescribable and unqualifiable reality, through various indirect approaches."}, {"front": "According to the Bhagavad Gita quote, 'He only knoweth--only he is free of sin, and wise, Who seeth Me, Lord of the Worlds, with faith-enlightened eyes, Unborn, undying, unbegun,' what does this emphasize about Brahman?", "back": "This emphasizes Brahman saguna, as it refers to a 'Me,' a 'Lord of the Worlds,' with whom one can have a relationship and 'see with faith-enlightened eyes,' even while also affirming the transcendent qualities of being 'Unborn, undying, unbegun.'"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
