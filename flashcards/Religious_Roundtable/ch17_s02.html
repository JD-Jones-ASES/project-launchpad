<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 17, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary characteristic of Hinduism as a tradition?", "back": "Hinduism is not a single, unified system, but a vast family of traditions developed over more than three thousand years.", "id": "fc01"}, {"front": "What concept holds a privileged place as the ultimate ground of all reality in Hindu theology?", "back": "Brahman.", "id": "fc02"}, {"front": "Define Brahman in Hindu theology.", "back": "Brahman is the ultimate, uncaused, unlimited, eternal reality from which everything arises, in which everything exists, and to which everything returns. It is the impersonal, infinite reality that underlies all of existence.", "id": "fc03"}, {"front": "What Hindu scriptures are considered the philosophical heart of the tradition and extensively explore the nature of Brahman?", "back": "The Upanishads, composed roughly between 800 and 200 BCE.", "id": "fc04"}, {"front": "What does the Upanishadic teaching state about the relationship between Brahman and atman?", "back": "The Upanishads teach that Brahman is identical with atman, the innermost self of every person. To know Brahman is to know what you most deeply are.", "id": "fc05"}, {"front": "Explain the concept of Brahman nirguna.", "back": "Brahman nirguna refers to Brahman 'without qualities' – the utterly transcendent, formless, attribute-less ground of being that cannot be described, only approached through negation (neti neti). It represents pure transcendence.", "id": "fc06"}, {"front": "Explain the concept of Brahman saguna.", "back": "Brahman saguna refers to Brahman 'with qualities' – Brahman as it appears with a face, a name, a story, and a personality. Examples include Krishna, Shiva, Devi, and Vishnu, serving as approachable manifestations of the infinite.", "id": "fc07"}, {"front": "How do the gods of the Hindu pantheon relate to Brahman, particularly Brahman saguna?", "back": "The gods are not rivals to Brahman; they are manifestations of Brahman-saguna, acting as 'windows' through which finite human beings can encounter the infinite.", "id": "fc08"}, {"front": "What dramatic event in the Bhagavad Gita illustrates the concept of Brahman saguna?", "back": "Krishna's revelation of his cosmic form (vishvarupa) to Arjuna in Chapter 11, where Arjuna sees all of creation, time, and existence simultaneously present in a single figure.", "id": "fc09"}, {"front": "What is the meaning of the Sanskrit phrase 'neti neti' in relation to Brahman nirguna?", "back": "'Neti neti' means 'not this, not this' and is used to describe Brahman nirguna, emphasizing its indescribable nature and the need to approach it through negation.", "id": "fc10"}, {"front": "What is one of the four great sayings (mahavakyas) of the Upanishads that deeply resolves the transcendence-immanence tension?", "back": "'Tat tvam asi' ('That thou art').", "id": "fc11"}, {"front": "What does 'Tat tvam asi' signify regarding the atman and Brahman?", "back": "It signifies that the atman, the innermost self of every human being, is not ultimately separate from Brahman.", "id": "fc12"}, {"front": "Differentiate between pantheism and panentheism as explained in the context of Hindu thought.", "back": "Pantheism claims the world simply is God (a flat equation). Panentheism, more subtly, states that the world is within God, and God is more than the world.", "id": "fc13"}, {"front": "Which philosophical school of Vedanta argues for the strongest identification between Brahman and Atman?", "back": "Advaita (non-dual) school of Vedanta, associated with the philosopher Shankara.", "id": "fc14"}, {"front": "According to Advaita Vedanta, what is maya?", "back": "Maya is an illusion, meaning the experience of separation (between Atman and Brahman) is a misunderstanding of the world's ultimate nature, not that the world doesn't exist.", "id": "fc15"}, {"front": "Name two other schools of Vedanta that resist the complete identification of Atman and Brahman.", "back": "Vishishtadvaita (associated with Ramanuja) and Dvaita (associated with Madhva).", "id": "fc16"}, {"front": "How does the diversity of Hindu theology relate to the concepts of transcendence and immanence?", "back": "The diversity of Hindu theology is, in part, a long argument about just how completely transcendence and immanence can be reconciled, with different schools offering varying degrees of identification or distinction.", "id": "fc17"}, {"front": "What is the literal meaning of the word 'Upanishad' and what does it suggest about how wisdom was transmitted?", "back": "'Upanishad' comes from Sanskrit roots meaning 'sitting down near,' suggesting the intimate, face-to-face transmission of philosophical wisdom from teacher to student through dialogues.", "id": "fc18"}, {"front": "In the context of Brahman, why is any direct answer to 'What is Brahman?' considered inadequate by the Upanishads?", "back": "Any direct answer is inadequate because Brahman is the ultimate, uncaused, unlimited reality, which cannot be fully encompassed or described by finite human language or concepts, requiring a patient, circling persistence to approach.", "id": "fc19"}, {"front": "Provide an example of how Brahman is both utterly beyond human comprehension and simultaneously approachable, referencing the Bhagavad Gita.", "back": "In the Bhagavad Gita, Krishna reveals his terrifying yet beautiful cosmic form (vishvarupa) to Arjuna, showing all of existence simultaneously. It is utterly beyond comprehension yet looks back with the face of a friend, illustrating both pure transcendence and intimate immanence.", "id": "fc20"}, {"front": "What is the primary difference between Brahman as 'not a god among gods' and the specific deities of the Hindu pantheon?", "back": "Brahman is the impersonal, infinite, ultimate reality underlying all existence, the ground of being. Specific deities are manifestations or 'windows' of Brahman saguna, embodying qualities and personality, making the infinite approachable to finite beings.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
