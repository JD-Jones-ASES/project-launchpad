<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Translate the Hebrew declaration 'Shema Yisrael, Adonai Eloheinu, Adonai Echad'.", "back": "Hear, O Israel, the Lord is our God, the Lord is One."}, {"front": "The core Jewish prayer that is the first learned by children and the last spoken before death is called the _____.", "back": "Shema"}, {"front": "How many Hebrew words comprise the central declaration of the Shema?", "back": "Six"}, {"front": "In Jewish monotheism, what does the claim of God's 'absolute unity' imply beyond a numerical value?", "back": "It is a moral claim that God is undivided, uncomplicated, and the ultimate source of reality."}, {"front": "How does Jewish monotheism differ from the concept of a 'chief god'?", "back": "It asserts there is exactly one God who is the creator and sustainer of all reality, not merely the highest among many."}, {"front": "According to Jewish belief, what is the status of rival divine powers or equal forces of evil?", "back": "There are no rival divine powers or forces of evil equal to the force of good."}, {"front": "Contrast the Jewish view of God with the 'distant architect' model of Deism.", "back": "The Jewish God is intensely personal, hears prayer, and is involved in human history rather than walking away after creation."}, {"front": "Identify three human-like emotional or communicative traits attributed to God in Jewish tradition.", "back": "God speaks, hears prayer, grieves over suffering, and becomes angry at injustice."}, {"front": "What is the Jewish theological stance on creating physical representations or images of God?", "back": "Jewish theology strictly forbids making images of God to prevent reducing Him to something manageable or controllable."}, {"front": "Beyond statues, what is the deeper theological concern regarding the prohibition of idolatry?", "back": "It guards against the human tendency to reduce God to something that can be controlled or fully comprehended."}, {"front": "Term: Brit", "back": "Definition: The Hebrew word for covenant, representing the binding, mutual relationship between God and the Jewish people."}, {"front": "Describe the power dynamic between the parties in the Jewish covenant (*brit*).", "back": "It is a relationship with genuine obligations on both sides, though God is clearly the senior partner."}, {"front": "What are the three primary commitments God makes to Israel within the covenant?", "back": "God commits to care for, guide, and ultimately redeem Israel."}, {"front": "What are the primary obligations Israel accepts under the covenant?", "back": "Israel commits to follow the commandments, practice justice, and be a holy nation."}, {"front": "According to the Torah, what two specific roles is the nation of Israel called to fulfill?", "back": "Israel is called to be a kingdom of priests and a holy nation."}, {"front": "What is the most common misunderstanding of the phrase 'chosen people'?", "back": "It is often wrongly interpreted as a claim of racial or spiritual superiority."}, {"front": "How do Jewish theologians typically define the concept of 'chosenness'?", "back": "Chosenness is defined as a responsibility and a call to a specific way of life rather than a privilege."}, {"front": "What is the specific goal of Israel's 'chosenness' in relation to the rest of the world?", "back": "To model justice and holiness for the world."}, {"front": "How is the practice of debating and questioning the Torah viewed within Jewish faith?", "back": "It is viewed as an expression of faith in the inexhaustible richness of God's word."}, {"front": "The Jewish religious text that preserves centuries of scholarly debates, even those without resolution, is the _____.", "back": "Talmud"}, {"front": "In the Talmud, why are multiple conflicting positions often recorded as valid?", "back": "Judaism treats the ongoing sacred conversation and engagement with questions as more important than fixed answers."}, {"front": "Term: Tikkun Olam", "back": "Definition: A Hebrew phrase meaning 'repair of the world,' referring to the vocation to pursue justice and heal suffering."}, {"front": "What is the human role in creation according to the concept of *Tikkun Olam*?", "back": "Human beings are God's partners in completing and healing a broken creation."}, {"front": "In Jewish ethics, how are poverty and oppression categorized theologically?", "back": "They are viewed as violations of the divine order rather than merely unfortunate facts."}, {"front": "Which Jewish law regarding agriculture is cited as a specific example of *Tikkun Olam*?", "back": "The commandment to leave a corner of one's field for the poor."}, {"front": "What economic restriction in Jewish law targets the protection of the vulnerable?", "back": "The prohibition against charging interest to the vulnerable."}, {"front": "Name the specific ethical obligation in Jewish law regarding foreigners or outsiders.", "back": "The obligation to welcome the stranger."}, {"front": "Who in the Hebrew Bible are known for 'thundering against injustice' and inspiring future reform movements?", "back": "The Prophets"}, {"front": "According to the source, why is no single reading of the Torah considered exhaustive?", "back": "Because God's word is believed to be inexhaustibly rich."}, {"front": "What is the philosophical implication of having 'one ultimate source of reality' in Judaism?", "back": "It means there is one ultimate ground of morality."}, {"front": "How does the text describe the current state of the world in relation to *Tikkun Olam*?", "back": "The world as it exists is 'not yet what it should be' and is currently broken."}, {"front": "In Judaism, every act of compassion or generosity is considered a small act of _____.", "back": "Repair (or Tikkun)"}, {"front": "Why is Jewish theology cautious about describing God in human terms?", "back": "Because God is believed to be utterly unlike anything human."}, {"front": "The Jewish concept of a mutual relationship with God is characterized as a _____ rather than a contract between equals.", "back": "Covenant (or Brit)"}, {"front": "What does the Shema's focus on 'One' reject in terms of cosmic origin?", "back": "It rejects the idea of a chaos goddess battling a sky god or any dualistic origin of reality."}, {"front": "What is the 'sacred' element of the Jewish tradition regarding the Torah?", "back": "The conversation and ongoing engagement with questions."}, {"front": "How do Jews 'participate in God's work' according to the concept of *Tikkun Olam*?", "back": "By actively resisting cruelty, poverty, and injustice to restore creation."}, {"front": "What phrase from the Torah describes the communal goal of Israel's faithfulness?", "back": "A kingdom of priests and a holy nation."}, {"front": "What distinguishes the Jewish God's unity from a simple numerical claim?", "back": "It is a claim that God is entirely himself, uncomplicated, and without rival divine powers."}, {"front": "In the context of the *brit*, what does Israel offer in exchange for God's protection?", "back": "Obedience and faithfulness (following the commandments)."}, {"front": "According to Jewish thought, why is the world 'not fixed'?", "back": "It is 'being fixed' through the partnership of God and human beings."}, {"front": "What is the theological function of the 'six Hebrew words' of the Shema?", "back": "They serve as a dense declaration of absolute monotheism."}, {"front": "Why does the Jewish God 'resist all reductions'?", "back": "To prevent humans from treating God as something manageable or within their control."}, {"front": "True or False: The Talmud seeks to provide a single, fixed answer to every theological question.", "back": "False (it often preserves conflicting positions as valid to maintain the sacred conversation)."}, {"front": "What specific human emotion does the text mention God feels regarding injustice?", "back": "Anger"}, {"front": "What is the relationship between 'justice' and the 'divine order' in Judaism?", "back": "Injustice is seen as a direct violation of the divine order."}, {"front": "How does the 'chosen' status affect a person's life according to Jewish theologians?", "back": "It calls them to a specific way of life focused on modeling holiness."}, {"front": "In the phrase 'Shema Yisrael', what does 'Shema' mean?", "back": "Hear"}, {"front": "What role do humans play in the restoration of creation?", "back": "They act as God's partners in the work of *Tikkun Olam*."}, {"front": "How does the text describe the ferocity of the Prophets?", "back": "As a force that has inspired reform movements across many centuries and cultures."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
