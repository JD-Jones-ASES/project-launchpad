<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the six Hebrew words that form the central declaration of Jewish monotheism?", "back": "Shema Yisrael, Adonai Eloheinu, Adonai Echad."}, {"front": "What is the English translation of the Shema?", "back": "Hear, O Israel, the Lord is our God, the Lord is One."}, {"front": "The Shema is traditionally the first prayer learned by _____ and the last words spoken before _____.", "back": "children; death."}, {"front": "Term: Monotheism (in Judaism)", "back": "Definition: The belief in exactly one God who is the sole creator and sustainer of all reality."}, {"front": "In Jewish thought, the claim that God is \"One\" is not just numerical but also a _____ and _____ claim.", "back": "philosophical; moral."}, {"front": "What does it mean for God to be \"undivided\" in Jewish theology?", "back": "It means God is uncomplicated, entirely himself, and there are no rival divine powers."}, {"front": "How does Judaism view the relationship between the force of good and the force of evil?", "back": "There is no force of evil equal to the force of good because there is only one ultimate source of reality."}, {"front": "In Jewish tradition, God is described as _____ personal rather than a distant architect.", "back": "intensely."}, {"front": "According to the text, how does God react to human suffering?", "back": "God grieves over human suffering."}, {"front": "What specific emotion does the Jewish God feel regarding injustice?", "back": "Anger."}, {"front": "Why does Jewish theology strictly forbid making images of God?", "back": "To prevent the human tendency to reduce God to something manageable or controllable."}, {"front": "Term: Brit", "back": "Definition: The Hebrew word for covenant, describing the binding, mutual relationship between God and the Jewish people."}, {"front": "In the covenantal relationship, which party is described as the \"senior partner\"?", "back": "God."}, {"front": "Within the covenant, what does God commit to do for the people of Israel?", "back": "To care for, guide, and ultimately redeem them."}, {"front": "What is the primary obligation of Israel within the covenantal relationship?", "back": "To follow the commandments and practice justice."}, {"front": "According to the Torah, Israel is called to be a \"kingdom of _____ and a _____ nation.\"", "back": "priests; holy."}, {"front": "How has the phrase \"chosen people\" been historically misunderstood?", "back": "It has been incorrectly viewed as a claim of racial or spiritual superiority."}, {"front": "From a Jewish theological perspective, \"chosenness\" is a _____ rather than a privilege.", "back": "responsibility."}, {"front": "What are the Jewish people \"called\" to model for the rest of the world?", "back": "Justice and holiness."}, {"front": "What is considered the most distinctive feature of Jewish religious life?", "back": "Intense interpretive energy regarding the Torah."}, {"front": "In Judaism, why is the Torah questioned and re-examined in every generation?", "back": "Because God's word is considered inexhaustibly rich, meaning no single reading can exhaust it."}, {"front": "Questioning and debating the Torah is viewed as an expression of _____, not doubt.", "back": "faith."}, {"front": "Which central Jewish text preserves centuries of debates where multiple valid positions are recorded?", "back": "The Talmud."}, {"front": "What is sacred in the Jewish tradition of debate and interpretation?", "back": "The conversation itself."}, {"front": "Term: Tikkun Olam", "back": "Definition: A Hebrew phrase meaning \"repair of the world.\""}, {"front": "What is the core objective of the Jewish vocation of Tikkun Olam?", "back": "To pursue justice, heal suffering, and restore a broken creation."}, {"front": "In the work of Tikkun Olam, humans are viewed as God's _____ in completing and healing creation.", "back": "partners."}, {"front": "How are poverty, injustice, and cruelty categorized in Jewish thought?", "back": "They are seen as violations of the divine order."}, {"front": "What specific agricultural law in the Torah supports the poor?", "back": "The commandment to leave a corner of one's field for them."}, {"front": "What is the Jewish legal prohibition regarding lending to the vulnerable?", "back": "The prohibition against charging interest."}, {"front": "Under Jewish law, what is the specific obligation regarding a \"stranger\"?", "back": "The obligation to welcome the stranger."}, {"front": "Who in the Hebrew Bible are known for their fierce opposition to injustice?", "back": "The prophets."}, {"front": "Every act of justice, compassion, or generosity is described as a \"small act of _____.\"", "back": "repair."}, {"front": "Does Judaism view the world as a finished or fixed product?", "back": "No; the world is seen as being fixed through human participation."}, {"front": "The Jewish concept of God rejects the existence of a \"_____ goddess battling a sky god.\"", "back": "chaos."}, {"front": "In terms of hierarchy, how is the relationship between God and Israel described?", "back": "It is not a contract between equals; God is the senior partner."}, {"front": "How does Judaism treat the existence of fixed answers versus ongoing engagement?", "back": "The tradition lives in ongoing engagement with questions rather than fixed answers."}, {"front": "What does it mean for God to be the \"ultimate ground of morality\" in Jewish monotheism?", "back": "It means there is only one ultimate source for moral truth."}, {"front": "Judaism emphasizes that being \"called\" to a specific way of life involves a specific _____ of life.", "back": "way."}, {"front": "What role does the Talmud play regarding scholars who arrive at no resolution in their arguments?", "back": "It records both conflicting positions as valid."}, {"front": "What is the primary goal of the human role in Tikkun Olam?", "back": "Restoring a broken creation."}, {"front": "According to the text, the Jewish God resists all human attempts at _____.", "back": "reduction."}, {"front": "The Shema serves as a declaration of belief in exactly _____ God.", "back": "one."}, {"front": "What is the direct theological implication of the Shema's \"God is One\" declaration?", "back": "It is a claim of absolute monotheism and the unity of reality."}, {"front": "In the context of the brit, what is the specific term used to describe God's offer to Israel?", "back": "Protection and presence."}, {"front": "The concept of Tikkun Olam implies that the world as it exists is _____.", "back": "broken."}, {"front": "Jewish theology is \"deeply cautious\" about describing God in what kind of terms?", "back": "Human terms."}, {"front": "The ethical expression of Jewish interpretive impulse is found in which concept?", "back": "Tikkun Olam."}, {"front": "What is the intended outcome of the \"kingdom of priests\" mandate for Israel?", "back": "To become a holy nation."}, {"front": "How does Judaism view the practice of charging interest to the vulnerable?", "back": "As a violation of the divine order that is legally prohibited."}, {"front": "What is the theological significance of God \"hearing prayer\" and \"speaking\"?", "back": "It illustrates that God is intensely personal and engaged with humanity."}, {"front": "In Jewish practice, the study of the Torah is often described as a form of _____.", "back": "worship or faith."}, {"front": "Why is it impossible for a single reading of the Torah to be exhaustive?", "back": "Because the divine word is considered to be inexhaustibly rich."}, {"front": "The ferocity of the prophets against injustice has served as an inspiration for what over many centuries?", "back": "Reform movements across different cultures."}, {"front": "What does the text suggest is the result of humans reducing God to something \"manageable\"?", "back": "Idolatry."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
