<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "From which Mesopotamian city did Abraham (then Abram) originate?", "back": "Ur."}, {"front": "Around what year did the story of Judaism begin with Abraham's call?", "back": "1800 BCE."}, {"front": "What is the meaning of the name 'Abraham'?", "back": "Father of many nations."}, {"front": "In the context of Jewish origins, what is a 'covenant'?", "back": "A formal, sacred agreement between God and a people with mutual obligations."}, {"front": "Term: The Exodus.", "back": "The liberation of the Israelites from slavery in Egypt."}, {"front": "How did Moses first encounter God in the desert?", "back": "Through a burning bush that was not consumed by the flames."}, {"front": "What divine name did God reveal to Moses at the burning bush?", "back": "I Am Who I Am."}, {"front": "Which event is considered the 'defining moment' of the entire Jewish tradition?", "back": "The Exodus."}, {"front": "What annual ritual retells the story of the Exodus?", "back": "The Passover Seder."}, {"front": "Where does Jewish tradition hold that God revealed the Torah to Moses?", "back": "Mount Sinai."}, {"front": "Definition: Torah.", "back": "The first five books of the Hebrew Bible revealed at Mount Sinai."}, {"front": "How many commandments (mitzvot) are contained in the Torah?", "back": "613."}, {"front": "What was the purpose of the 613 mitzvot in the context of the covenant?", "back": "They define the specific shape of Israel's relationship with God."}, {"front": "Which king established Jerusalem as the capital and unified the tribes of Israel?", "back": "King David."}, {"front": "Around what year did King David unify the kingdom of Israel?", "back": "1000 BCE."}, {"front": "Who was responsible for building the first Temple in Jerusalem around 950 BCE?", "back": "King Solomon."}, {"front": "What was the theological significance of the First Temple?", "back": "It was the place where the presence of God was believed to dwell most fully."}, {"front": "Which empire destroyed the First Temple in 586 BCE?", "back": "The Babylonian Empire."}, {"front": "Who was the Babylonian king that invaded Jerusalem and carried the population into exile?", "back": "King Nebuchadnezzar."}, {"front": "How did the prophets Isaiah, Jeremiah, and Ezekiel interpret the Babylonian Exile?", "back": "As a consequence of Israel's unfaithfulness rather than abandonment by God."}, {"front": "Which Persian king allowed the Jewish exiles to return to their homeland?", "back": "King Cyrus."}, {"front": "In what year did the Romans destroy the Second Temple?", "back": "70 CE."}, {"front": "Which Roman general oversaw the destruction of the Second Temple?", "back": "General Titus."}, {"front": "What is the name of the remaining outer western retaining wall of the Second Temple?", "back": "The Western Wall (or the Kotel)."}, {"front": "After the destruction of the Temple, the center of Jewish life shifted from priests and sacrifice to _____.", "back": "Rabbis and study."}, {"front": "Definition: Diaspora.", "back": "The scattering of Jewish people away from their ancestral homeland across the world."}, {"front": "What is the literal translation of the Hebrew word 'Yisrael'?", "back": "One who 'wrestles with God'."}, {"front": "Which patriarch was renamed 'Israel' after wrestling with a divine figure?", "back": "Jacob."}, {"front": "How does the Jewish tradition view the act of questioning or debating God?", "back": "The wrestling itself is considered holy."}, {"front": "What was the 'extraordinary promise' God made to Abram in Ur?", "back": "To make him into a great nation and show him a new land."}, {"front": "Abraham is the founding patriarch for which three major religions?", "back": "Judaism, Islam, and Christianity."}, {"front": "Before his mission, where was the Hebrew-born Moses raised?", "back": "In Pharaoh's court."}, {"front": "What triggered Pharaoh's decision to finally release the Hebrew slaves?", "back": "Ten devastating plagues."}, {"front": "According to the Torah, how are Jews commanded to view themselves regarding the Exodus?", "back": "As though they personally came out of Egypt."}, {"front": "Apart from religious rituals, what other aspects of life did the 613 mitzvot govern?", "back": "Agriculture, family relationships, and the treatment of strangers."}, {"front": "How is the forty-year period of wandering in the wilderness interpreted in Jewish tradition?", "back": "As a period of formation and testing."}, {"front": "What was the primary location of the promised land given to Abraham's descendants?", "back": "Canaan."}, {"front": "Why did the destruction of the Temple in 586 BCE create a 'theological crisis'?", "back": "If God lived in the Temple and it was gone, it suggested God might have abandoned His people."}, {"front": "What event accelerated the Jewish Diaspora after the initial Babylonian exile?", "back": "The Roman destruction of the Second Temple in 70 CE."}, {"front": "For the two thousand years following the Roman destruction, what was the status of the Jewish people globally?", "back": "They lived as a minority community in other people's countries."}, {"front": "The first five books of the Hebrew Bible are specifically called the _____.", "back": "Torah."}, {"front": "Concept: Mitzvot.", "back": "The 613 commandments found in the Torah governing Jewish life."}, {"front": "The binding promise of the covenant is summarized by the phrase: 'I will be your God, and you will be my ____.'", "back": "People."}, {"front": "Which biblical book contains the account of the Hebrews being enslaved in Egypt?", "back": "The book of Exodus (and Genesis)."}, {"front": "To reach Canaan, the Israelites had to cross which body of water?", "back": "The Red Sea."}, {"front": "Which set of rules within the mitzvot prohibits murder, theft, and idolatry?", "back": "The Ten Commandments."}, {"front": "What was the political peak of ancient Israel under the monarchy?", "back": "The unification of the tribes and establishment of Jerusalem under King David."}, {"front": "What allowed Jewish life to reconstitute itself after the Babylonian exile?", "back": "The return to the homeland and the building of the Second Temple."}, {"front": "In Diaspora, what three things did the Jewish people carry with them to maintain their tradition?", "back": "Texts, memory, and practice."}, {"front": "During the night he wrestled with a divine figure, why did Jacob refuse to let go?", "back": "He refused to give up until he received a blessing."}, {"front": "Where did Moses flee after killing an Egyptian overseer?", "back": "The desert."}, {"front": "The Torah is also used more broadly to mean all of Jewish _____ and _____.", "back": "Teaching and law."}, {"front": "What defined the 'extraordinary command' given to Abram in Ur?", "back": "To leave his country, his people, and his father's household."}, {"front": "What major shift in Jewish religious practice occurred because the Temple has never been rebuilt?", "back": "A shift from animal sacrifice to the study of texts and rabbinic leadership."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
