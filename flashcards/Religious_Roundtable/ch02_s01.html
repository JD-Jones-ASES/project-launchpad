<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is considered the founding patriarch of Judaism, Christianity, and Islam?", "back": "Abraham (originally Abram) is the founding patriarch."}, {"front": "What was God's extraordinary command and promise to Abram?", "back": "God commanded Abram to leave his country, people, and father's household for a new land, promising to make him a great nation."}, {"front": "Define 'covenant' as it relates to God and the Jewish people.", "back": "A covenant is a formal, sacred agreement between God and a people, with mutual obligations on both sides, establishing a binding promise: 'I will be your God, and you will be my people.'"}, {"front": "Who was Moses, and what was his mission from God?", "back": "Moses was a Hebrew raised in Pharaoh's court who encountered God in a burning bush. His mission was to return to Egypt and demand the release of the Hebrew slaves."}, {"front": "What is 'the Exodus' in Jewish tradition, and why is it significant?", "back": "The Exodus is the liberation of the Israelites from slavery in Egypt. It is understood as the foundational act of God's rescue and faithfulness, and the defining moment of the entire Jewish tradition."}, {"front": "How do Jews commemorate the Exodus story each year?", "back": "The Jewish Passover Seder retells the Exodus story each year, with Jews commanded to consider themselves as though they personally came out of Egypt."}, {"front": "What is the 'Torah' in its primary and broader meanings?", "back": "Primarily, the Torah refers to the first five books of the Hebrew Bible, believed to be revealed by God to Moses at Mount Sinai. More broadly, it means all of Jewish teaching and law."}, {"front": "How many commandments (mitzvot) are traditionally found in the Torah, and what was their purpose?", "back": "The Torah contained 613 commandments (mitzvot). They were not just rules, but the specific terms of the covenant, shaping Israel's relationship with God."}, {"front": "Who unified the Israelite tribes into a single kingdom and established Jerusalem as its capital?", "back": "King David unified the tribes around 1000 BCE and established Jerusalem as the capital."}, {"front": "Who built the First Temple in Jerusalem, and what was its theological significance?", "back": "King Solomon built the First Temple around 950 BCE. It became the center of Israelite worship, where God's presence was believed to dwell most fully, signifying that God had chosen to live among this people."}, {"front": "What catastrophic event occurred in 586 BCE, and what were its immediate consequences for the Jewish people?", "back": "In 586 BCE, the Babylonian empire under King Nebuchadnezzar invaded Jerusalem, destroyed the First Temple, and carried the population into exile in Babylon."}, {"front": "Why was the Babylonian Exile considered a 'theological crisis'?", "back": "It was a theological crisis because if God lived in the Temple and the Temple was gone, it raised the question of whether God had abandoned His people, forcing a profound rethinking of Jewish faith."}, {"front": "How did the prophets interpret the Babylonian Exile, and what was its long-term effect on Jewish tradition?", "back": "Prophets like Isaiah, Jeremiah, and Ezekiel insisted God had not abandoned Israel but allowed the exile as a consequence of unfaithfulness. The crisis deepened the tradition rather than destroying it."}, {"front": "What happened to the Second Temple in 70 CE, and what physical remnant exists today?", "back": "In 70 CE, after a Jewish revolt against Roman rule, the Roman general Titus destroyed the Second Temple. Only the outer western retaining wall, known today as the Western Wall or Kotel, remains."}, {"front": "How did Jewish life fundamentally shift after the destruction of the Second Temple?", "back": "With the Temple gone, the center of Jewish life shifted from priests and sacrifice to rabbis and study. This marked a significant change in the practice and focus of Judaism."}, {"front": "Define 'the Diaspora' in the context of Jewish history.", "back": "The Diaspora is the scattering of Jewish people away from their ancestral homeland across the world, beginning with the Babylonian exile and accelerating significantly after the destruction of the Second Temple in 70 CE."}, {"front": "How did the Jewish people preserve their tradition for two thousand years during the Diaspora?", "back": "During the Diaspora, Jewish people preserved their tradition by carrying it with them in texts, in memory, and in practice, living as minority communities in other countries."}, {"front": "What is the symbolic meaning behind the Hebrew word 'Yisrael' (Israel)?", "back": "'Yisrael' is sometimes translated as 'one who wrestles with God.' It symbolizes a people whose tradition includes challenging, debating, and questioning God, finding holiness in the wrestling itself."}, {"front": "What was the significance of the Israelites' forty years of wandering in the wilderness after the Exodus?", "back": "In Jewish tradition, the forty years of wandering in the wilderness is understood as a crucial period of formation and testing for the Israelites before they entered the promised land of Canaan."}, {"front": "What was the immediate consequence of the Ten Plagues on Egypt?", "back": "After ten devastating plagues struck Egypt, Pharaoh relented and allowed the Hebrew slaves to leave, leading to the Exodus."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
