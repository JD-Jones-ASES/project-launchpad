<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "The Bible is more accurately described as a(n) _____ rather than a single book.", "back": "Library"}, {"front": "According to the Protestant count, how many books are in the Bible?", "back": "66"}, {"front": "How many books comprise the Catholic version of the Bible?", "back": "73"}, {"front": "Over approximately how many years was the Bible written?", "back": "1,000 years"}, {"front": "Identify the three original languages in which the Bible was written.", "back": "Hebrew, Aramaic, and Greek"}, {"front": "The authors of the Bible ranged from fishermen to _____.", "back": "Kings"}, {"front": "What is the central subject that provides unity to the Bible's diverse books?", "back": "The relationship between God and humanity"}, {"front": "What are the four stages of the biblical narrative mentioned in the text?", "back": "Creation, fall, redemption, and restoration"}, {"front": "What are the two major sections of the Christian Bible?", "back": "The Old Testament and the New Testament"}, {"front": "What is the Jewish name for the collection of books known as the Old Testament?", "back": "The Tanakh (or Hebrew Bible)"}, {"front": "How many books are in the Protestant Old Testament canon?", "back": "39"}, {"front": "How many books are in the Catholic Old Testament canon?", "back": "46"}, {"front": "Term: Canon", "back": "Definition: The authoritative collection of texts recognized by a religious community as sacred scripture."}, {"front": "What collective term refers to the additional books found in the Catholic Old Testament but not the Protestant one?", "back": "The Deuterocanon (or Apocrypha)"}, {"front": "Which section of the Bible records the history of the people of Israel?", "back": "The Old Testament"}, {"front": "Name three major figures whose stories are found in the Old Testament.", "back": "Abraham, Moses, and the prophets"}, {"front": "How many books comprise the New Testament?", "back": "27"}, {"front": "During which century were the books of the New Testament written?", "back": "The first century"}, {"front": "Term: Gospel", "back": "Definition: One of the four New Testament accounts that narrate the life, teachings, death, and resurrection of Jesus Christ."}, {"front": "List the four Gospels found in the New Testament.", "back": "Matthew, Mark, Luke, and John"}, {"front": "Why do the four Gospels provide different accounts of Jesus's life?", "back": "They approach Jesus from different angles and for different audiences."}, {"front": "Which New Testament book tells the story of the early church?", "back": "The Acts of the Apostles"}, {"front": "Term: Epistle", "back": "Definition: A formal letter written by early leaders like Paul to address specific communities and theological questions."}, {"front": "Which New Testament book contains a densely symbolic vision of cosmic history?", "back": "The Book of Revelation"}, {"front": "The formation of the New Testament canon is described as a _____ process.", "back": "Gradual"}, {"front": "In what year did the Council of Carthage ratify the 27-book New Testament canon?", "back": "397"}, {"front": "Roman Catholics interpret the Bible through the lens of Church tradition and the _____.", "back": "Magisterium (teaching authority)"}, {"front": "Term: Sola Scriptura", "back": "Definition: The Protestant principle that Scripture alone is the ultimate authority for Christian belief and practice."}, {"front": "When did the Protestant Reformation begin?", "back": "The sixteenth century"}, {"front": "What was a major consequence of the Protestant shift toward 'sola scriptura'?", "back": "It democratized biblical interpretation but also produced remarkable diversity in conclusions."}, {"front": "How does Eastern Orthodox Christianity view the relationship between Scripture and Church tradition?", "back": "They are inseparable because the community produced the Bible."}, {"front": "Into how many languages has the complete Bible been translated?", "back": "More than 700"}, {"front": "Portions of the Bible exist in over _____ languages.", "back": "3,500"}, {"front": "What is the name of the oldest complete Greek manuscript of the New Testament?", "back": "The Codex Sinaiticus"}, {"front": "What is the approximate date range for the Codex Sinaiticus?", "back": "330–360"}, {"front": "The Bible includes various literary genres, such as law, history, letters, and _____.", "back": "Poetry"}, {"front": "Who provided the 'psalms' mentioned in the Old Testament summary?", "back": "David"}, {"front": "What type of vision characterizes the Book of Revelation?", "back": "Apocalyptic"}, {"front": "Term: Magisterium", "back": "Definition: The teaching authority of the Roman Catholic Church's hierarchy."}, {"front": "According to the text, the Bible's unity lies in its _____ rather than its author.", "back": "Subject"}, {"front": "What was the significance of the Council of Carthage in 397?", "back": "It ratified the twenty-seven-book New Testament canon."}, {"front": "Which section of the Bible contains the biography of Jesus?", "back": "The Gospels (New Testament)"}, {"front": "Which language was primarily used for the Tanakh?", "back": "Hebrew"}, {"front": "Which major biblical figure is associated with the 'stories of the creation' and the 'law'?", "back": "Moses"}, {"front": "The New Testament books were written by _____ of Jesus.", "back": "Followers"}, {"front": "What is the specific name of the additional works found in the Catholic Old Testament?", "back": "Deuterocanon"}, {"front": "In the Protestant tradition, the authoritative collection of texts is referred to as the _____.", "back": "Canon"}, {"front": "Which Christian tradition insists that the Bible cannot be understood without the community that produced it?", "back": "Eastern Orthodox Christianity"}, {"front": "Which literary genre in the Bible involves formal letter-writing?", "back": "Epistle"}, {"front": "What kind of history is recorded in the Old Testament regarding the people of Israel?", "back": "Long, painful, and hopeful history"}, {"front": "True or False: The formation of the New Testament canon was an immediate event following the death of Jesus.", "back": "False (it was a gradual process taking several centuries)"}, {"front": "The Bible's narrative arc moves from creation toward _____.", "back": "Restoration"}, {"front": "Which section of the Bible contains the 'prophecy' and 'psalms' genres primarily?", "back": "The Old Testament"}, {"front": "Who are the 'early leaders' specifically mentioned as writing letters to Christian communities?", "back": "Paul and other early leaders"}, {"front": "Which Christian group places heavy emphasis on the 'lens of Church tradition' for reading scripture?", "back": "Roman Catholics"}, {"front": "What is the primary language of the oldest complete New Testament manuscript?", "back": "Greek"}, {"front": "Which book of the New Testament is described as a 'densely symbolic vision'?", "back": "The Book of Revelation"}, {"front": "The diversity of authors in the Bible includes individuals such as kings and _____.", "back": "Fishermen"}, {"front": "The term 'Apocrypha' is used as a synonym for which other term in the text?", "back": "Deuterocanon"}, {"front": "How does the text describe the nature of the relationship between the four Gospels?", "back": "They are not identical; their differences are as illuminating as their agreements."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
