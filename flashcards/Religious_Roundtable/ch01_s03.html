<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what village was Jesus born around the year 4 BCE?", "back": "Bethlehem"}, {"front": "In which Galilean town was Jesus raised?", "back": "Nazareth"}, {"front": "What was the occupation of Joseph, the father of Jesus?", "back": "Carpenter"}, {"front": "What is the Hebrew name for Jesus?", "back": "Yeshua"}, {"front": "How is the name Yeshua rendered in the Greek language?", "back": "Iesous"}, {"front": "The Hebrew word Messiah translates to which title in English?", "back": "The anointed one"}, {"front": "Which language was the common tongue of the region where Jesus lived?", "back": "Aramaic"}, {"front": "At approximately what age did Jesus begin his public ministry?", "back": "Thirty"}, {"front": "Term: Apostle", "back": "Definition: One sent out; specifically the twelve disciples personally commissioned by Jesus."}, {"front": "What literary form did Jesus use to tell short, vivid stories about seeds, coins, and sheep?", "back": "Parables"}, {"front": "According to the text, what was the core message of Jesus’s teaching?", "back": "The arrival of the Kingdom of God"}, {"front": "The Kingdom of God is described as a new order of justice, mercy, and _____.", "back": "Divine presence"}, {"front": "What is the literal meaning of the term Gospel?", "back": "Good news"}, {"front": "From which Old English word is the term 'Gospel' derived?", "back": "Godspel"}, {"front": "How long did the public ministry of Jesus approximately last?", "back": "Three years"}, {"front": "Which Roman governor was Jesus handed over to for execution?", "back": "Pontius Pilate"}, {"front": "Around what year was Jesus crucified?", "back": "30 CE"}, {"front": "What event is considered the cornerstone of the Christian faith?", "back": "The claim of bodily resurrection"}, {"front": "The term Pentecost is derived from the Greek word for which day?", "back": "Fiftieth day"}, {"front": "What significant event occurred during Pentecost according to the Acts of the Apostles?", "back": "The Holy Spirit descended on the apostles."}, {"front": "Who is credited with shaping the early Christian movement more powerfully than any other follower?", "back": "Paul of Tarsus"}, {"front": "What was Paul of Tarsus's relationship to Christianity before his conversion?", "back": "He was a fierce persecutor of Christians."}, {"front": "On the road to which city did Paul report having a vision of the risen Jesus?", "back": "Damascus"}, {"front": "Which portion of the New Testament was largely formed by the letters written by Paul?", "back": "The Epistles"}, {"front": "How did Paul's theology contribute to the global momentum of Christianity?", "back": "He argued that faith in Jesus was open to everyone, not just Jews."}, {"front": "For how many centuries did Christianity spread through the Roman Empire despite intermittent persecution?", "back": "Nearly three centuries"}, {"front": "What official document was issued by Emperor Constantine in 313 CE?", "back": "The Edict of Milan"}, {"front": "What was the primary purpose of the Edict of Milan?", "back": "To grant Christians religious freedom throughout the Roman Empire."}, {"front": "Which emperor moved Christianity from a persecuted minority to an imperial religion?", "back": "Constantine"}, {"front": "What was the first great gathering of Christian bishops called in 325 CE?", "back": "The Council of Nicaea"}, {"front": "What theological doctrine was established at the Council of Nicaea regarding Jesus's nature?", "back": "Jesus was fully divine and of the same substance as the Father."}, {"front": "The word Christ is the Greek translation of which Hebrew word?", "back": "Messiah"}, {"front": "Jesus was educated in the _____ scriptures.", "back": "Jewish"}, {"front": "Which group of authorities arrested Jesus in Jerusalem before handing him to the Romans?", "back": "Jewish religious authorities"}, {"front": "According to followers, how many days after the crucifixion was the tomb found empty?", "back": "Three days"}, {"front": "What did the descent of the Holy Spirit empower the apostles to do?", "back": "Preach the message to the world"}, {"front": "How did Constantine’s endorsement change the status of Christianity within a single generation?", "back": "It transformed from a persecuted minority into an imperial religion."}, {"front": "The Council of Nicaea signaled that Christianity was transitioning from a movement into a(n) _____.", "back": "Institution"}, {"front": "What does the title 'the Christ' signify theologically?", "back": "That Jesus was the promised deliverer foretold in scripture."}, {"front": "By what method of execution was Jesus killed?", "back": "Crucifixion"}, {"front": "Who did Jesus call the 'twelve disciples personally commissioned' to carry his message?", "back": "Apostles"}, {"front": "What specific vision transformed Paul of Tarsus into a missionary?", "back": "A blinding vision of the risen Jesus"}, {"front": "How many followers were in Jesus's innermost circle of disciples?", "back": "Twelve"}, {"front": "In the context of Nicaea, what does the phrase 'same substance as the Father' imply about Jesus?", "back": "He was not a lesser creation of God but fully divine."}, {"front": "In what region was the common language Aramaic used during the time of Jesus?", "back": "Galilee"}, {"front": "The four accounts of Jesus's life, death, and resurrection are contained in the _____.", "back": "New Testament"}, {"front": "What was the primary method Paul used to spread the message across the Roman Empire?", "back": "Traveling as a missionary and founding communities of believers."}, {"front": "Who was the mother of Jesus?", "back": "Mary"}, {"front": "According to the text, the early church was born following which event?", "back": "Pentecost"}, {"front": "What specific claim did early Christians make when they called Jesus 'the Christ'?", "back": "They were claiming he was the promised deliverer of the Jewish scriptures."}, {"front": "During his ministry, Jesus was considered 'compelling' by some and _____ by others.", "back": "Deeply alarming"}, {"front": "The Council of Nicaea was convened by which political leader?", "back": "Emperor Constantine"}, {"front": "In which city was Jesus arrested?", "back": "Jerusalem"}, {"front": "What was the primary language Jesus used for daily communication?", "back": "Aramaic"}, {"front": "The term 'Universalism' in early Christianity refers to the inclusion of _____ in the faith.", "back": "Gentiles (non-Jews)"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
