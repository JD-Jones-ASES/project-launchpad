<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 16, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Buddhism, what is the primary root cause of human suffering?", "back": "Suffering is rooted within the individual, in the craving, grasping, clinging mind that mistakes impermanent things for permanent satisfactions.", "id": "fc01"}, {"front": "What is the Buddhist 'prescription' or path to liberation from suffering?", "back": "The Eightfold Path, a systematic transformation of how one thinks, speaks, acts, and attends to experience, leading to liberation (nirvana) through sustained individual practice.", "id": "fc02"}, {"front": "What is the role of the social world in the Buddhist understanding of suffering?", "back": "The social world is not irrelevant, but it is not considered the primary site of the problem or the root of suffering.", "id": "fc03"}, {"front": "Where does Norse Paganism locate the root of human suffering?", "back": "Suffering is located in the cosmos itself; fate (wyrd) is woven before birth, the gods will die at Ragnarök, and even the most courageous life ends in death.", "id": "fc04"}, {"front": "What is the Norse 'prescription' or counsel in the face of suffering, if not a path to liberation?", "back": "It is a counsel of dignity: face your wyrd with courage, live so that your deeds are worth remembering, and accept that the world owes no escape from its inherent nature.", "id": "fc05"}, {"front": "Why is the Norse perspective considered 'freeing' despite not offering liberation from suffering?", "back": "If nothing can be done about the structure of reality, the energy one might spend resenting it can instead be spent living well and courageously.", "id": "fc06"}, {"front": "According to Communism (Marx), what is the primary root cause of human suffering?", "back": "Suffering is produced by structural economic arrangements, specifically the exploitation inherent in private ownership of the means of production, not by spiritual errors or cosmic necessity.", "id": "fc07"}, {"front": "How did Marx characterize religion's function regarding suffering?", "back": "He called it the 'opium of the people,' a cruel distraction and comfort that dulls pain without curing the underlying structural disease.", "id": "fc08"}, {"front": "What is the Communist 'prescription' for overcoming suffering?", "back": "Structural change through revolution, the abolition of private ownership of the means of production, and the creation of a society where exploitation and alienation are impossible.", "id": "fc09"}, {"front": "What is the 'deepest disagreement' among these three traditions regarding the source of human suffering?", "back": "The primary source of human suffering is debated: is it inside us (individual), outside us (social/economic), or built into the structure of reality itself (cosmic)?", "id": "fc10"}, {"front": "How does the diagnosis of suffering's root directly influence the proposed solution?", "back": "If rooted in craving (Buddhism), transform the mind. If rooted in economic exploitation (Communism), change the economic system. If rooted in cosmic nature (Norse), live with honesty and courage.", "id": "fc11"}, {"front": "Provide an example of how a Buddhist might acknowledge factors beyond individual mind transformation related to suffering.", "back": "A Buddhist could acknowledge that unjust economic structures make the Eightfold Path harder to practice, though not the primary root cause.", "id": "fc12"}, {"front": "How might a Marxist acknowledge forms of suffering not eliminated by a perfectly just economic system?", "back": "A Marxist could acknowledge that even a perfectly just economic system would not eliminate universal human experiences like grief, loss, or the fear of death.", "id": "fc13"}, {"front": "How might a practitioner of Norse tradition reconcile their acceptance of ultimate fate with actions like inward cultivation or outward resistance?", "back": "They might say that both inward cultivation and outward resistance to injustice can coexist with the acceptance of ultimate fate, as courage does not require passivity.", "id": "fc14"}, {"front": "Which tradition primarily emphasizes individual internal transformation as the solution to suffering?", "back": "Buddhism.", "id": "fc15"}, {"front": "Which tradition primarily emphasizes radical societal and structural change as the solution to suffering?", "back": "Communism.", "id": "fc16"}, {"front": "Which tradition views suffering as an inherent and unchangeable aspect of existence, recommending a dignified and courageous response?", "back": "Norse Paganism.", "id": "fc17"}, {"front": "What does the Buddhist concept of 'craving, grasping, clinging mind' refer to as the root of suffering?", "back": "It refers to the mind's attachment to impermanent things, mistakenly believing they will bring lasting satisfaction, which leads to suffering when these things inevitably change or are lost.", "id": "fc18"}, {"front": "In the context of suffering, why would Marx consider telling a worker suffering from exploitation to meditate or be courageous a 'cruel distraction'?", "back": "Because Marx believed the worker's suffering was caused by structural economic exploitation, not individual spiritual flaws or cosmic fate. Such advice distracts from the necessary revolutionary action to change the oppressive system.", "id": "fc19"}, {"front": "What is the core difference in how 'liberation' or 'freedom' is conceptualized across the three traditions?", "back": "Buddhism seeks liberation *from* suffering via internal transformation; Norse Paganism finds freedom in dignity *in the face of* unchangeable cosmic suffering; Communism seeks liberation *from* structurally imposed suffering via societal revolution.", "id": "fc20"}, {"front": "What does the Norse term 'wyrd' signify in their understanding of suffering?", "back": "'Wyrd' refers to fate, which is believed to be woven before birth and is unchangeable, meaning certain aspects of suffering are an inherent and unavoidable part of existence.", "id": "fc21"}, {"front": "According to Communism, what is the ultimate goal regarding human alienation?", "back": "To create a society where alienation is impossible because no one can exploit anyone else's labor, thus eliminating the structural source of suffering.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
