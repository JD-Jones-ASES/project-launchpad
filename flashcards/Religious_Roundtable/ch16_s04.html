<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 16, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Buddhism, what is the fundamental root of human suffering?", "back": "The root of suffering is located within the individual, specifically in the craving, grasping, and clinging mind that mistakes impermanent things for permanent satisfactions."}, {"front": "What is the Buddhist 'prescription' for overcoming suffering?", "back": "The Eightfold Path, which is a systematic, inward transformation of how one thinks, speaks, acts, and attends to experience."}, {"front": "What is the ultimate goal of the Buddhist path to alleviate suffering?", "back": "Liberation (nirvana), achieved by the individual practitioner through sustained practice on the Eightfold Path."}, {"front": "In Buddhism, what is the primary site for addressing the problem of suffering?", "back": "The individual practitioner; the social world, though not irrelevant, is not considered the primary site of the problem."}, {"front": "Where does Norse Paganism locate the root of suffering?", "back": "In the cosmos itself, as an inherent part of reality: fate is woven before birth, the gods will die at Ragnarök, and even the most just life ends in death."}, {"front": "What is the Norse 'prescription' for dealing with cosmic suffering?", "back": "It is not a path to liberation, but a counsel of dignity: to face one's wyrd (fate) with courage, live so that one's deeds are worth remembering, and accept that the world offers no escape from its inherent nature."}, {"front": "How does Norse tradition view the possibility of escaping suffering?", "back": "It asserts that nothing can be done about the fundamental structure of reality, encouraging individuals to live well rather than expending energy on resenting or trying to escape inevitable suffering."}, {"front": "What central attitude is encouraged by Norse Paganism in the face of cosmic suffering?", "back": "Courage and dignity in accepting one's ultimate fate (wyrd) and living a life of memorable deeds, without pretending reality owes an escape."}, {"front": "According to Communism (Marx), what is the primary cause of human suffering?", "back": "Suffering is structural, produced by economic arrangements and exploitation, rather than by spiritual errors or cosmic necessity."}, {"front": "How did Marx critique religion's role in addressing suffering?", "back": "He called it the 'opium of the people,' functioning as a cruel distraction and comfort that dulls the pain of structural exploitation without curing the underlying disease."}, {"front": "What is the Communist 'prescription' for eliminating suffering?", "back": "A structural revolution, involving the abolition of private ownership of the means of production, and the creation of a society where alienation is impossible."}, {"front": "What is the ultimate goal of the Communist solution to suffering?", "back": "The creation of a society where no one can exploit anyone else's labor, thereby eliminating suffering produced by economic and social structures."}, {"front": "What is the 'deepest disagreement' among the three traditions regarding the source of human suffering?", "back": "Whether the primary source of suffering is inside us (Buddhism), outside us in human structures (Communism), or built into the structure of reality itself (Norse Paganism)."}, {"front": "How does one's answer to the primary source of suffering directly impact the proposed solution?", "back": "If rooted in craving, one transforms the mind. If rooted in economic exploitation, one changes the economic system. If woven into cosmic nature, one lives with honesty and courage."}, {"front": "Can the diagnoses of Buddhism, Norse Paganism, and Communism be considered mutually exclusive?", "back": "Not necessarily. The text suggests that elements from each perspective can coexist, acknowledging complexities beyond a single cause."}, {"front": "How might a Buddhist acknowledge external sources of suffering?", "back": "A Buddhist could acknowledge that unjust economic structures make the practice of the Eightfold Path significantly harder to achieve."}, {"front": "How might a Marxist acknowledge forms of suffering not directly tied to economic structures?", "back": "A Marxist could acknowledge that even a perfectly just economic system would not eliminate universal human experiences like grief, loss, or the fear of death."}, {"front": "How might a Norse practitioner reconcile their view of fate with other approaches to suffering or injustice?", "back": "They might suggest that inward cultivation and outward resistance to injustice can coexist with the acceptance of ultimate fate, implying that courage does not require passivity."}, {"front": "Categorize the type of 'prescription' each tradition offers (e.g., individual, structural, attitudinal).", "back": "Buddhism offers an individual (inward) transformation. Communism offers a structural (outward) revolution. Norse Paganism offers an attitudinal (dignity/courage) approach to cosmic fate."}, {"front": "Contrast how each tradition views 'liberation' or 'escape' from suffering.", "back": "Buddhism offers liberation (nirvana) through individual practice. Communism offers liberation from structural exploitation through revolution. Norse Paganism offers no escape from cosmic reality, but a freeing acceptance through dignified living."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
