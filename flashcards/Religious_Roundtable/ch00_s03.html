<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 0, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In an academic context, what is the primary definition of \"thinking religiously\"?", "back": "Taking big questions seriously with curiosity and sitting with uncertainty."}, {"front": "What alternative to \"devotion\" or \"faith\" does the text propose for religious thinking?", "back": "Approaching fundamental questions with genuine curiosity and seriousness."}, {"front": "What should a thinker do instead of reaching for \"easy answers\" when thinking religiously?", "back": "Be willing to sit with difficulty and uncertainty."}, {"front": "What common misconception about thinking religiously does the text clarify?", "back": "It does not require being devout or adopting a specific faith."}, {"front": "According to the text, why are Immanuel Kant's career-long questions considered religious in structure?", "back": "They address fundamental human concerns that do not yield to calculation."}, {"front": "Identify the focus of Immanuel Kant's question: \"What can I know?\"", "back": "The limits and possibilities of human knowledge."}, {"front": "Identify the focus of Immanuel Kant's question: \"What should I do?\"", "back": "Human ethics and moral obligations."}, {"front": "Identify the focus of Immanuel Kant's question: \"What may I hope for?\"", "back": "Human aspirations and ultimate expectations."}, {"front": "How does Albert Camus define \"the absurd\"?", "back": "The gap between human longing for meaning and an indifferent universe."}, {"front": "Why is Albert Camus's work on the absurd categorized as a \"religious question\"?", "back": "It addresses the fundamental search for meaning despite its secular presentation."}, {"front": "Karl Marx famously described religion as the \"_____\" of the masses.", "back": "opiate"}, {"front": "In Karl Marx’s theory of history, which stage corresponds to the religious concept of the \"fall\"?", "back": "Primitive harmony."}, {"front": "In Karl Marx’s theory of history, which system corresponds to the religious concept of \"suffering\"?", "back": "Capitalism."}, {"front": "In Karl Marx’s theory of history, which event corresponds to the religious concept of \"redemption\"?", "back": "Revolution."}, {"front": "In Karl Marx’s theory of history, which state corresponds to the religious concept of \"paradise\"?", "back": "The classless society."}, {"front": "Why is the structure of Karl Marx’s historical theory described as \"unmistakably religious\"?", "back": "It follows a narrative arc of fall, suffering, redemption, and paradise."}, {"front": "Term: Immanence", "back": "Definition: The presence of the divine or ultimate within the world and human experience."}, {"front": "How does a tradition that emphasizes \"immanence\" view the accessibility of the sacred?", "back": "As close, present in nature, and found within the human heart."}, {"front": "What is the opposite of the religious concept of immanence?", "back": "Transcendence."}, {"front": "Term: Sacred", "back": "Definition: That which is set apart from the ordinary and treated with special reverence and awe."}, {"front": "What is the defining contrast to the \"sacred\"?", "back": "The secular."}, {"front": "How does the \"sacred\" demand a person respond compared to \"everyday behavior\"?", "back": "It requires a response that goes beyond normal, everyday actions."}, {"front": "Term: Secular", "back": "Definition: That which belongs to the ordinary world of everyday life without special religious significance."}, {"front": "Which two concepts form one of the deepest tensions in religious thought?", "back": "Transcendence and immanence."}, {"front": "Describe the core idea of a \"transcendent\" view of the divine.", "back": "A God or ultimate reality that is utterly beyond the world."}, {"front": "What pulls serious thinkers toward religious questions regardless of their personal beliefs?", "back": "The weight and seriousness (gravity) of the questions themselves."}, {"front": "What is the student's primary task when encountering different religious traditions?", "back": "To understand what the tradition is saying and why it might be compelling."}, {"front": "Beyond understanding a tradition's claims, what should a student identify about how to live?", "back": "The implications the tradition has for human conduct."}, {"front": "Why are questions about \"meaning\" considered religious even when asked by secular thinkers?", "back": "They address the fundamental nature of existence and longing."}, {"front": "What characteristic of religious questions makes them distinct from laboratory experiments?", "back": "They do not yield to calculation or empirical testing."}, {"front": "Cloze: Thinking religiously means approaching big questions with _____ curiosity.", "back": "genuine"}, {"front": "Cloze: The _____ is whatever a tradition regards as holy or deserving of awe.", "back": "sacred"}, {"front": "Cloze: A tradition teaches immanence when it says the divine is present in the _____.", "back": "human heart (or everyday life)"}, {"front": "Cloze: The tension between _____ and immanence is found in almost every tradition.", "back": "transcendence"}, {"front": "How does the text describe the nature of the universe in Albert Camus's theory?", "back": "It seems to offer no meaning to satisfy human longing."}, {"front": "What is the intended outcome of understanding why a tradition is \"compelling\"?", "back": "To comprehend its internal logic and appeal to its followers."}, {"front": "What quality of a question makes it \"religious in structure\" according to the text?", "back": "It deals with fundamental meaning, ethics, or ultimate hope."}, {"front": "According to the text, what is the significance of \"primitive harmony\" in Marxist theory?", "back": "It serves as the starting point equivalent to a religious pre-fall state."}, {"front": "In terms of accessibility, what does immanence suggest about the sacred?", "back": "It is accessible and present in the ordinary world."}, {"front": "Under what condition is a thing considered \"sacred\"?", "back": "When it is set apart from the ordinary and treated with special reverence."}, {"front": "What does the text suggest is the goal of studying religious traditions, rather than deciding correctness?", "back": "Understanding the tradition's perspective and its implications for living."}, {"front": "How does the text distinguish between philosophy and religion?", "back": "They are not the same thing, though they often grapple with similar questions."}, {"front": "What phrase does the author use to describe the pull of religious questions on thinkers?", "back": "A kind of gravity."}, {"front": "Where does the text state immanence can be observed in nature?", "back": "In the everyday presence of the divine within the world."}, {"front": "What does a \"secular\" context lack compared to a \"sacred\" one?", "back": "Special religious significance or holy reverence."}, {"front": "In the context of the absurdity discussed by Camus, what is the \"gap\"?", "back": "The distance between human desire for meaning and the universe's silence."}, {"front": "How should a student evaluate a religious tradition according to this book?", "back": "By understanding what it says and why it is compelling to others."}, {"front": "What type of answers does the text advise thinkers to avoid when exploring religious questions?", "back": "Easy answers."}, {"front": "According to the text, why did Marx deny the religious nature of his theories?", "back": "He viewed religion as an \"opiate\" and likely saw his own work as purely scientific or secular."}, {"front": "What is the relationship between \"reverence\" and the \"sacred\"?", "back": "Reverence is the special response or treatment required by the sacred."}, {"front": "Cloze: Immanence describes a God who is _____ within the world.", "back": "present"}, {"front": "What makes the questions asked by great minds in history \"religious\" in nature?", "back": "They focus on themes of meaning, existence, and the ultimate that science cannot answer."}, {"front": "What does the text imply by saying Camus's question was \"dressed in secular clothes\"?", "back": "He used non-religious language to address a fundamentally religious concern."}, {"front": "When a tradition says God is \"close,\" which key term is it emphasizing?", "back": "Immanence."}, {"front": "According to the definition of \"sacred,\" what type of behavior is insufficient for holy things?", "back": "Normal everyday behavior."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
