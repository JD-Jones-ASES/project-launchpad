<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 1, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Approximately how many people globally are adherents of Christianity?", "back": "2.4 billion"}, {"front": "What proportion of the world's population is estimated to be Christian?", "back": "Nearly ⅓"}, {"front": "Which religion is considered the world's largest by any measure?", "back": "Christianity"}, {"front": "Which two major geographic regions has Christianity fundamentally shaped?", "back": "Europe and the Americas"}, {"front": "The concept that every person possesses inherent worth regardless of status is known as universal _____.", "back": "Human dignity"}, {"front": "What Latin term refers to the Christian teaching that humans are made in the image of God?", "back": "Imago Dei"}, {"front": "Christian teaching identifies the root of human dignity as the fact that humans are _____.", "back": "Made in the image of God (imago Dei)"}, {"front": "Which political tradition undergirding modern democracy was developed by Christian thinkers?", "back": "Natural rights tradition"}, {"front": "Which 13th-century Christian thinker was instrumental in developing the natural rights tradition?", "back": "Thomas Aquinas"}, {"front": "Which 17th-century Christian thinker is credited with developing the natural rights tradition alongside Thomas Aquinas?", "back": "John Locke"}, {"front": "The text describes the abolitionist, early labor, and civil rights movements as _____ projects.", "back": "Theological"}, {"front": "Abolitionists concluded that slavery was incompatible with Christianity by reading the _____.", "back": "Gospels"}, {"front": "Who authored the 'Divine Comedy', a work cited as unintelligible without understanding Christian theology?", "back": "Dante"}, {"front": "Which composer's cantatas are highlighted as being deeply tied to Christian theology?", "back": "Bach"}, {"front": "Which Renaissance artist's work on the Sistine Chapel ceiling is rooted in Christian theology?", "back": "Michelangelo"}, {"front": "Which 19th-century novelist's works are cited as examples of art shaped by Christian theology?", "back": "Dostoevsky"}, {"front": "Through which century is the overwhelming majority of Western art considered unintelligible without Christian theology?", "back": "The nineteenth century"}, {"front": "Which devout Christian is cited as a founder of modern astronomy?", "back": "Copernicus"}, {"front": "Which devout Christian is cited as a founder of modern genetics?", "back": "Mendel"}, {"front": "Which devout Christian is cited as a founder of modern physics?", "back": "Newton"}, {"front": "How did the founders of modern science interpret their scientific work?", "back": "Studying the order God built into creation"}, {"front": "In modern bioethics, the question 'when does human life begin?' is described as having roots that are _____.", "back": "Theological"}, {"front": "What modern bioethical question concerns the duties owed to the terminally ill?", "back": "What do we owe the terminally ill?"}, {"front": "The social justice debate regarding the obligations of wealthy nations to poor ones is described as _____-rooted.", "back": "Theologically"}, {"front": "A central modern debate in human rights is whether rights are universal or _____.", "back": "Culturally relative"}, {"front": "The text refers to the 'grammar' of modern activist language as being shaped by centuries of _____.", "back": "Christian thought"}, {"front": "Activists who insist that justice demands caring for the _____ are using language shaped by Christian thought.", "back": "Vulnerable"}, {"front": "What phrase describes the omnipresence of Christian concepts in the modern world?", "back": "Intellectual air"}, {"front": "List four concepts Christianity believes in that remain part of the modern 'intellectual air'.", "back": "God, humanity, sin, and redemption"}, {"front": "According to the text, even secular societies often conduct debates in terms that are _____ theological.", "back": "Invisibly"}, {"front": "The natural rights tradition developed by Aquinas and Locke provides the foundation for modern _____.", "back": "Democracy"}, {"front": "What specific belief about humanity is the basis for the concept of universal human dignity?", "back": "Every human is made in the image of God"}, {"front": "The abolitionist movement was driven by the belief that _____ was incompatible with Christian teaching.", "back": "Slavery"}, {"front": "What was the common motivation for early labor and civil rights movements according to the text?", "back": "Christian teaching regarding oppression and dignity"}, {"front": "What 'deeper claim' does the text make about Christianity beyond its number of adherents?", "back": "It fundamentally shaped the world and Western civilization"}, {"front": "In the context of modern science, the belief that the universe possesses 'order' was historically attributed to _____.", "back": "God"}, {"front": "When a politician speaks of the 'dignity of every person', they are using a language whose grammar was shaped by _____.", "back": "Centuries of Christian thought"}, {"front": "Which movement was motivated by the theological conclusion that oppression was incompatible with the Gospels?", "back": "The early labor movement"}, {"front": "Term: Imago Dei", "back": "Definition: The theological concept that humans are created in the image of God, providing inherent worth."}, {"front": "The founders of modern genetics, physics, and astronomy all shared what religious characteristic?", "back": "They were devout Christians"}, {"front": "What is the relationship between secular activists and Christian thought according to the text?", "back": "They often use language and concepts shaped by Christian thought without knowing it"}, {"front": "Dante, Bach, and Michelangelo are examples of how Christian theology is essential to understanding Western _____.", "back": "Arts"}, {"front": "The text argues that the significance of Christianity is found not just in numbers but in its influence on global _____.", "back": "Civilization"}, {"front": "What modern debate asks: 'Are rights universal, or culturally relative?'", "back": "Human rights"}, {"front": "Which specific Christian thinkers are mentioned as the developers of the natural rights tradition?", "back": "Thomas Aquinas and John Locke"}, {"front": "The idea that every person possesses worth regardless of 'status or ability' is rooted in _____.", "back": "The image of God (imago Dei)"}, {"front": "The text claims that even skeptics of religion are already in _____ with Christian beliefs.", "back": "Conversation"}, {"front": "Christianity's influence on Europe and the Americas has had what kind of impact?", "back": "Enormous global influence"}, {"front": "Which scientific field was founded by Gregor Mendel?", "back": "Genetics"}, {"front": "Which scientific field was founded by Isaac Newton?", "back": "Physics"}, {"front": "Which scientific field was founded by Nicolaus Copernicus?", "back": "Astronomy"}, {"front": "The concept of 'universal human dignity' is a foundational root for modern _____ and ethics.", "back": "Law"}, {"front": "What is the 'question' the text poses to readers regarding Christianity's intellectual influence?", "back": "Whether they have noticed it"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
