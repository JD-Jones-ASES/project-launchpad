<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 15, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the 'Ummah' in Islam?", "back": "The global community of Muslim believers, transcending race, nationality, language, and class. It is one of Islam's most foundational social concepts."}, {"front": "Define Salat.", "back": "The five daily prayers that constitute the second of the Five Pillars of Islam. Each prayer involves specific physical postures and prescribed Arabic recitations."}, {"front": "What is Jumu'ah?", "back": "The Friday congregational prayer, which includes a sermon (khutba). Attendance at Friday prayer is obligatory for Muslim men and serves as a visible expression of community solidarity."}, {"front": "What is the Shahada, and what is its significance?", "back": "The declaration of faith: 'There is no god but God, and Muhammad is the messenger of God.' It is the first of the Five Pillars and is recited publicly as the act of entering the Muslim community."}, {"front": "Explain Zakat and its purpose.", "back": "Obligatory almsgiving, the third Pillar of Islam. It is a fixed portion of a Muslim's wealth given annually to the poor, the indebted, and others in need."}, {"front": "How is Islam fundamentally a 'community religion'?", "back": "It is a theological conviction, not an accident of history. Four of the Five Pillars of Islam have an inherently communal dimension, binding believers to the Ummah."}, {"front": "How does the Shahada demonstrate Islam's communal nature?", "back": "The Shahada is spoken aloud and witnessed by others, making it an act of entering a community rather than merely a private change in belief."}, {"front": "What is the communal ideal for Salat (daily prayer)?", "back": "Salat is ideally performed in congregation, fostering a shared spiritual experience among believers."}, {"front": "How does Zakat illustrate the communal aspect of Islam?", "back": "Zakat requires giving a portion of one's wealth to the community's poor and needy, directly linking worship with social responsibility."}, {"front": "Describe the communal dimension of the Hajj pilgrimage.", "back": "The Hajj gathers millions of believers from every nation in one place at one time, all dressed in the same plain white garments (ihram), symbolizing equality and erasing visible distinctions of wealth and rank."}, {"front": "What does the wearing of ihram (plain white garments) by Hajj pilgrims symbolize?", "back": "It symbolizes equality before God, suggesting that all pilgrims are equal regardless of wealth or status, much like how all human beings will stand before God on the Day of Judgment."}, {"front": "What human divisions does the concept of the Ummah transcend?", "back": "The Ummah transcends race, nationality, language, class, and tribe, uniting Muslims across the globe into a single community."}, {"front": "How does the Friday prayer (Jumu'ah) exemplify 'solidarity made visible'?", "back": "During Jumu'ah, Muslims stand shoulder to shoulder, all facing Mecca, performing the same movements, and reciting the same Arabic words, turning uniformity into a visible expression of solidarity."}, {"front": "According to Islamic scripture, what is the divine command regarding Friday prayer?", "back": "Surah 62:9-10 instructs believers: 'when the call to prayer is made on the day of assembly, hasten to the remembrance of God and leave off your business.'"}, {"front": "What is the purpose of the khutba (sermon) during Jumu'ah prayer?", "back": "The khutba connects faith to the immediate life of the community, addressing current events, moral challenges, and the needs of the poor."}, {"front": "How does the text describe the mosque's role in the Muslim community?", "back": "The mosque is described as the community's 'living room,' not primarily a private meditation space, highlighting its central social and communal function."}, {"front": "How do Islamic scriptures like Surah 2:43 connect prayer and social obligation?", "back": "Surah 2:43 directly links them, stating: 'Establish prayer and give zakat,' implying that worship and social responsibility are intrinsically bound together."}, {"front": "Describe the communal 'choreography' of the Salat.", "back": "Five times a day, at the call to prayer (adhan), Muslims stop to pray, performing the same postures (standing, bowing, prostrating, sitting) and beginning with 'Allahu Akbar' (God is greater) everywhere."}, {"front": "What is the sociological explanation for the sense of belonging experienced during communal Salat?", "back": "Social scientists might call it a 'synchrony effect,' where people moving in the same way, at the same time, experience a powerful sense of belonging."}, {"front": "What is the theological explanation for the sense of belonging experienced during communal Salat?", "back": "Islamic theology explains it as believers turning toward God, and in doing so, finding themselves standing beside every other believer who has ever turned in the same direction."}, {"front": "How does the 'radical uniformity' of the Friday prayer contribute to community building?", "back": "It expresses that there is something inherently community-building about sameness – about doing exactly what everyone else is doing, fostering shared identity and solidarity."}, {"front": "In what way does the body become a 'medium of community' in Islam?", "back": "Through shared physical actions like the uniform postures and movements during Salat and Jumu'ah, the body itself becomes a vehicle for expressing and reinforcing communal bonds and solidarity."}, {"front": "What comparison does the text make between the Hajj and the Day of Judgment?", "back": "Pilgrims standing on the plain of Arafat, stripped of earthly distinctions in their plain white garments, describe it as a foretaste of the Day of Judgment, when all human beings will stand before God in ultimate equality."}, {"front": "Why is the communal dimension of Islam considered a 'theological conviction' rather than an 'accident of history'?", "back": "The emphasis on community is not merely a historical outcome but is deeply embedded in the core theological practices and requirements, such as the inherently communal nature of the Five Pillars."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
