<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 15, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the \"Ummah\" in Islam?", "back": "The global community of Muslim believers, transcending race, nationality, language, and class. It is one of Islam's most foundational social concepts."}, {"front": "Define \"Salat\" and its significance.", "back": "The five daily prayers, the second of the Five Pillars of Islam. Each prayer involves specific physical postures and prescribed Arabic recitations."}, {"front": "What is \"Jumu'ah\" and who is required to attend?", "back": "The Friday congregational prayer, which includes a sermon (khutba). Attendance is obligatory for Muslim men."}, {"front": "What is the \"Shahada\" and what is its communal significance?", "back": "The declaration of faith: \"There is no god but God, and Muhammad is the messenger of God.\" It is the first of the Five Pillars and the public act of entering the Muslim community."}, {"front": "Explain \"Zakat\" and its purpose.", "back": "Obligatory almsgiving, the third Pillar of Islam. It is a fixed portion of a Muslim's wealth given annually to the poor, the indebted, and others in need."}, {"front": "Why is Islam considered a 'community religion' from a theological perspective?", "back": "It is a theological conviction, not an accident of history. Four of the Five Pillars have an inherently communal dimension, binding believers to the Ummah."}, {"front": "Which of the Five Pillars of Islam are highlighted as having an inherently communal dimension?", "back": "Shahada (declaration of faith), Salat (daily prayer), Zakat (almsgiving), and Hajj (pilgrimage to Mecca)."}, {"front": "How does the Shahada demonstrate its communal aspect?", "back": "It is spoken aloud and witnessed by others, serving as the act of entering a community rather than merely a private belief."}, {"front": "What is the ideal way to perform Salat (daily prayer)?", "back": "Salat is ideally performed in congregation, emphasizing its communal nature."}, {"front": "How does Zakat fulfill a communal obligation?", "back": "Zakat requires giving a portion of one's wealth to the community's poor, the indebted, and others in need."}, {"front": "In what way does the Hajj pilgrimage symbolize equality within the Ummah?", "back": "Millions of pilgrims from diverse backgrounds wear the same plain white garments (ihram), erasing visible distinctions of wealth and rank, symbolizing equality before God."}, {"front": "What does the concept of the Ummah transcend?", "back": "The Ummah transcends every human division, including race, nationality, language, class, and tribe, uniting Muslims globally."}, {"front": "What specific actions during Jumu'ah (Friday prayer) foster a sense of community?", "back": "Muslims stand shoulder to shoulder, all facing Mecca, bowing and prostrating in the same postures, and reciting the same Arabic words, creating visible solidarity."}, {"front": "According to the text, what is the role of the 'khutba' during Jumu'ah prayer?", "back": "The sermon (khutba) connects faith to the immediate life of the community, addressing current events, moral challenges, and the needs of the poor."}, {"front": "How does Surah 62:9-10 relate to the Friday prayer?", "back": "It is a divine command instructing believers to 'hasten to the remembrance of God and leave off your business' when the call to prayer is made on the day of assembly."}, {"front": "What analogy does the text use to describe the mosque's function?", "back": "The mosque is described as 'the community's living room,' not primarily a private meditation space."}, {"front": "How does Surah 2:43 link worship and social obligation?", "back": "It directly connects prayer to the care for the poor, stating: 'Establish prayer and give zakat,' implying that worship and social duty are inseparable."}, {"front": "Describe the communal aspect of Salat choreography.", "back": "Five times a day, Muslims perform the same postures (standing, bowing, prostrating, sitting) and begin with the same words ('Allahu Akbar'), creating uniformity and a sense of belonging."}, {"front": "What is the 'synchrony effect' in the context of Salat?", "back": "Social scientists might describe it as the powerful sense of belonging experienced by people who move in the same way, at the same time."}, {"front": "How does Islamic theology explain the uniformity in Salat?", "back": "Theologically, believers turn toward God, and in doing so, find themselves standing beside every other believer who has ever turned in the same direction."}, {"front": "What is the significance of pilgrims standing on the plain of Arafat during Hajj?", "back": "Pilgrims describe it as a foretaste of the Day of Judgment, when all human beings stand before God stripped of every earthly distinction."}, {"front": "What are the opening words of the Salat, and what do they mean?", "back": "The opening words are 'Allahu Akbar,' meaning 'God is greater.'"}, {"front": "What is the purpose of the call to prayer ('adhan')?", "back": "The 'adhan' announces the times for the five daily prayers, prompting Muslims to stop what they are doing and pray."}, {"front": "Can you name an example of a practice outside of Islam that builds community through sameness, similar to Friday prayer?", "back": "Parallel practices include national anthems, sports team rituals, or graduation ceremonies, where collective uniform actions foster group identity."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
