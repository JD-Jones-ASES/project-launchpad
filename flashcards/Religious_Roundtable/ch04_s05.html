<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 4, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Which religion is recognized as the world's oldest living religious tradition?", "back": "Hinduism"}, {"front": "Approximately how many people practice Hinduism worldwide?", "back": "1.2 billion"}, {"front": "Where does Hinduism rank in terms of global religion size?", "back": "Third largest"}, {"front": "Which two major world religions arose from the Indian subcontinent as offshoots of Hinduism?", "back": "Buddhism and Jainism"}, {"front": "In what social/religious context was the Buddha raised?", "back": "He was raised as a Hindu."}, {"front": "List three concepts from Buddhism that have direct Hindu antecedents.", "back": "Karma, dharma, and samsara"}, {"front": "What is the Hindu root concept for the Buddhist goal of nirvana?", "back": "Liberation from rebirth"}, {"front": "Hinduism is described as the _____ from which a significant portion of Asian religious thought grew.", "back": "seed"}, {"front": "What language is the source of Hindu terms like 'yoga' and 'karma'?", "back": "Sanskrit"}, {"front": "Term: Yoga", "back": "Definition: A rigorous spiritual discipline aimed at uniting the individual self with Brahman."}, {"front": "What is the original spiritual goal of yoga in the Hindu tradition?", "back": "Uniting the individual self with Brahman."}, {"front": "How is yoga predominantly practiced worldwide today?", "back": "Without any explicitly spiritual intent."}, {"front": "Which Hindu concept refers to the cycle of action and consequence?", "back": "Karma"}, {"front": "Name four Sanskrit words originating in Hinduism that are now part of common English vocabulary.", "back": "Guru, mantra, avatar, and nirvana"}, {"front": "In Hindu philosophy, what is 'Brahman'?", "back": "A single reality underlying all the apparent diversity of the world."}, {"front": "Which collection of Hindu texts provides the vision of Brahman as a single underlying reality?", "back": "The Upanishads"}, {"front": "The Upanishadic vision of Brahman resonates with modern interpretations of which field of science?", "back": "Quantum physics"}, {"front": "How does the concept of Brahman relate to modern ecological thinking?", "back": "It emphasizes the interdependence of all living things."}, {"front": "According to the Bhagavad Gita, what is the primary cause of human suffering?", "back": "Attachment"}, {"front": "What mental state does the Bhagavad Gita identify as the key to freedom?", "back": "Detachment"}, {"front": "The Bhagavad Gita's analysis of attachment and freedom anticipates insights in which Western discipline?", "back": "Psychology"}, {"front": "What is the Sanskrit term for the great schools of systematic Indian philosophy?", "back": "Darshanas"}, {"front": "Name two metaphysical topics debated by the Hindu philosophical schools (darshanas).", "back": "The nature of time and the nature of consciousness."}, {"front": "The systematic debate regarding the _____ is a central focus of the darshanas.", "back": "reality of the external world"}, {"front": "How is the Hindu tradition of philosophical debate characterized relative to other global traditions?", "back": "It is one of the most sophisticated intellectual traditions on earth."}, {"front": "What is the hierarchical social ordering that has stratified Indian society for millennia?", "back": "The caste system"}, {"front": "What is the modern preferred term for the group historically called 'untouchables'?", "back": "Dalits"}, {"front": "How has the caste system historically been defended within the Hindu tradition?", "back": "With religious arguments."}, {"front": "Who was the Hindu reformer and political leader who famously challenged caste discrimination?", "back": "Mahatma Gandhi"}, {"front": "Identify the Hindu reformer who was a key figure in challenging the caste system alongside Gandhi and Ambedkar.", "back": "Swami Vivekananda"}, {"front": "What is the legal status of caste discrimination according to the Indian constitution?", "back": "It is banned."}, {"front": "Does caste discrimination still exist in modern India?", "back": "Yes, it persists in practice despite being legally banned."}, {"front": "Why is it important to study the history of Hinduism according to the text?", "back": "It has been practiced and debated longer than most other civilizations have existed."}, {"front": "What does the text claim is necessary to understand the origins of Buddhism?", "back": "Understanding the Hindu tradition Buddhism was responding to."}, {"front": "The Upanishadic concept of Brahman emphasizes the _____ of all living things.", "back": "interdependence"}, {"front": "What are the two aspects of a religious tradition that the text says deserve 'honest examination'?", "back": "Its resources and its failures."}, {"front": "B. R. Ambedkar is noted in Hindu history for his fierce challenge against _____.", "back": "caste discrimination"}, {"front": "What is 'samsara'?", "back": "The cycle of rebirth."}, {"front": "What is the Sanskrit term for the 'duty' or 'teachings' shared by Hindu and Buddhist traditions?", "back": "Dharma"}, {"front": "Which Hindu text provides a sophisticated analysis of how detachment enables freedom?", "back": "The Bhagavad Gita"}, {"front": "What does the word 'avatar' mean in its original Hindu context?", "back": "It is a Sanskrit word for a deity's descent to earth."}, {"front": "The darshanas argued about the nature of _____ and consciousness.", "back": "time"}, {"front": "What was the core social consequence for those at the bottom of the caste hierarchy?", "back": "Immense suffering and severe social stratification."}, {"front": "Why does the text argue Hinduism deserves more attention in Western education?", "back": "It possesses a highly sophisticated and systematic intellectual tradition."}, {"front": "The term 'mantra' originated from which religious tradition?", "back": "Hinduism"}, {"front": "Which specific Hindu concept is now used in English to describe someone's personal 'vibe' or 'consequence'?", "back": "Karma"}, {"front": "What is the relationship between 'atman' (the self) and 'Brahman' in yoga's original purpose?", "back": "Yoga aims to unite the individual self with the universal reality (Brahman)."}, {"front": "Who are Dalits?", "back": "Those at the bottom of the caste hierarchy, formerly known as untouchables."}, {"front": "Hinduism has approximately _____ practitioners.", "back": "1.2 billion"}, {"front": "The _____ of Indian philosophy argued about the reality of the external world.", "back": "darshanas"}, {"front": "What Hindu insight into the human mind does modern psychology mirror?", "back": "The link between attachment and suffering."}, {"front": "What is the status of Hinduism relative to other living religious traditions in terms of age?", "back": "It is the world's oldest living tradition."}, {"front": "In the context of Asian religious history, how is Hinduism viewed relative to Buddhism and Jainism?", "back": "As the mother tradition."}, {"front": "What specific social structure is cited as one of Hinduism's major historical difficulties?", "back": "The caste system"}, {"front": "Which Sanskrit term for 'spiritual teacher' is commonly used in English today?", "back": "Guru"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
