<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 16, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Norse Paganism, what is the fundamental nature of suffering in reality?", "back": "Suffering is woven into the structure of reality, including for the gods, and is not an accident or flaw."}, {"front": "How does Norse Paganism's response to suffering differ from that of Buddhism or Communism?", "back": "Norse Paganism advocates meeting suffering with courage, rather than seeking escape (Buddhism) or overthrowing the system that causes it (Communism)."}, {"front": "Define 'Ragnarök' in Norse mythology.", "back": "Ragnarök is the prophesied final battle at which the gods will die, the world will be destroyed, and crucially, a new world will rise from the sea."}, {"front": "Name three prominent gods and their prophesied fates during Ragnarök.", "back": "Odin will be swallowed by the wolf Fenrir; Thor will kill the Midgard Serpent and then die from its venom; Freyr will fall to the fire-giant Surtr."}, {"front": "What is the 'crucial' aspect of Ragnarök beyond simple catastrophe?", "back": "It signifies the death of the old world and the birth of a new one, though the current gods will not survive to see it."}, {"front": "In the Norse worldview, what does suffering signify about a life lived fully?", "back": "Suffering is considered the price of a life lived fully."}, {"front": "Define the Norse term 'wyrd.'", "back": "Wyrd refers to fate, destiny, or the cosmic pattern woven by the Norns."}, {"front": "Is one's 'wyrd' entirely fixed in Norse belief? Explain.", "back": "No, one's wyrd is not entirely fixed; it is the accumulated weight of what has been, shaping what can be. One cannot escape it, but can choose how to face it."}, {"front": "How does facing one's 'wyrd' offer an alternative to Buddhist liberation or Marxist revolution?", "back": "It offers acceptance with dignity, rather than escaping a cycle (Buddhism) or changing a system (Communism)."}, {"front": "What is the Hávamál, and what kind of wisdom does it contain?", "back": "The Hávamál ('Sayings of the High One') is a collection of verses attributed to Odin in the Poetic Edda, offering practical wisdom on hospitality, friendship, knowledge, and mortality."}, {"front": "What is the central message of Hávamál stanzas 77-78 regarding mortality and human deeds?", "back": "While all things eventually die, the quality of one's life and the character of one's deeds (a noble name, good renown) can achieve lasting significance beyond death."}, {"front": "In the context of the Hávamál, what does 'fame' truly mean for the Norse?", "back": "Fame does not mean celebrity, but rather the remembrance by others of one's genuine virtues: being brave, generous, loyal, and honest."}, {"front": "What is a common misunderstanding about Valhalla?", "back": "Valhalla is often misunderstood as a simple 'heaven for warriors' or a place of eternal rest."}, {"front": "What is the true purpose of the warriors gathered in Valhalla?", "back": "The warriors in Valhalla feast and fight every day to prepare for Ragnarök, where they will fight alongside Odin in a last, doomed stand."}, {"front": "What kind of 'liberation' from suffering does Norse Paganism offer?", "back": "It does not promise nirvana, heaven, or a classless society, but rather the possibility of meeting one's fate with courage, an intact head, and a life behind you worth remembering."}, {"front": "Why is the Norse concept of 'liberation' significant, given the nature of the cosmos?", "back": "In a world where the Norns weave fate and Ragnarök awaits, the ability to face fate with courage and leave behind memorable deeds is the only thing that belongs entirely to the individual."}, {"front": "According to the text, is the Norse view of inherent suffering pessimistic?", "back": "No, the text states it is not pessimism but a 'profound realism' about what the cosmos is like."}, {"front": "How do the Norse gods maintain their youth?", "back": "They must regularly eat the golden apples of the goddess Iðunn."}, {"front": "What example is given of Loki's trickery causing suffering among the gods?", "back": "Loki's trickery led to the death of Baldr, the most beloved of the gods, whose death could not be undone."}, {"front": "Who are the Norns, and what is their role?", "back": "The Norns are beings who weave the cosmic pattern of wyrd, or fate, before a person is born."}, {"front": "How is Odin's personal suffering highlighted in the text?", "back": "Odin gave one of his eyes to gain wisdom, hung on Yggdrasil for nine nights to gain the runes, and knows he will be swallowed by Fenrir at Ragnarök but prepares for it anyway."}, {"front": "The Norse afterlife, even in Valhalla, is structured around what central concept?", "back": "The acceptance of inevitable defeat."}, {"front": "What is the overall message that Norse tradition offers regarding suffering and death?", "back": "It offers the possibility of facing both with courage and leaving behind deeds worth remembering."}, {"front": "Why does the text emphasize that the Norse concept of 'fame' is not 'celebrity'?", "back": "Because it focuses on the memory of genuine virtue (bravery, generosity, loyalty, honesty) by those who knew you, rather than widespread public recognition."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
