<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 16, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core Norse Pagan view on suffering, as described in the text?", "back": "Suffering is woven into the structure of reality, including for the gods, and the right response is not escape but courage."}, {"front": "How does Norse Paganism's view on suffering contrast with that of Buddhism?", "back": "Buddhism states suffering arises from craving and can be extinguished, while Norse Paganism sees suffering as inherent to reality, to be met with courage, not escape."}, {"front": "How does Norse Paganism's view on suffering contrast with that of Communism?", "back": "Communism attributes suffering to economic exploitation that can be overthrown, whereas Norse Paganism views suffering as an intrinsic part of the cosmos, to be faced with dignity."}, {"front": "Define Ragnarök.", "back": "Ragnarök is the prophesied final battle in Norse mythology where the gods will die, the world will be destroyed, and a new world will rise from the sea."}, {"front": "What is the ultimate fate of Odin during Ragnarök?", "back": "Odin will be swallowed by the wolf Fenrir during Ragnarök."}, {"front": "What is the ultimate fate of Thor during Ragnarök?", "back": "Thor will kill the Midgard Serpent but then die from its venom during Ragnarök."}, {"front": "What is the ultimate fate of Freyr during Ragnarök?", "back": "Freyr will fall to the fire-giant Surtr during Ragnarök."}, {"front": "Beyond catastrophe, what crucial dual nature does Ragnarök represent?", "back": "Ragnarök represents not just the death of the old world, but also the crucial birth of a new one."}, {"front": "How does the text demonstrate that suffering is not an accident or flaw in the Norse cosmos, even for the gods?", "back": "The gods age slowly (requiring Iðunn's apples), suffer loss (Baldr's death), and even Odin endures pain and knows his inevitable fate at Ragnarök."}, {"front": "Why do the Norse gods regularly eat the golden apples of Iðunn?", "back": "The gods must regularly eat Iðunn's golden apples to maintain their youth, illustrating that even they are not immune to the effects of time."}, {"front": "Define wyrd in the Norse worldview.", "back": "Wyrd is fate, destiny, or the cosmic pattern woven by the Norns."}, {"front": "Is one's wyrd entirely fixed in Norse belief? Explain.", "back": "No, wyrd is not entirely fixed; it is the accumulated weight of what has been, shaping what can be. One cannot escape it, but can choose how to face it."}, {"front": "What does the Norse concept of facing wyrd with dignity offer as an alternative to Buddhist liberation or Marxist revolution?", "back": "It offers acceptance with dignity, rather than escape from a cycle (Buddhism) or transformation of a system (Marxism)."}, {"front": "What is the Hávamál, and what kind of wisdom does it offer?", "back": "The Hávamál, or 'Sayings of the High One,' is a collection of verses attributed to Odin in the Poetic Edda, offering frankly practical wisdom on life, conduct, and mortality."}, {"front": "According to the Hávamál's famous passage on mortality ('Cattle die...'), what is the one thing that never dies?", "back": "The Hávamál states that 'the fame of a dead man's deeds' and 'a noble name' will never die."}, {"front": "What is the significance of the Hávamál's message 'everything dies, and therefore the quality of your life and the character of your deeds matter absolutely'?", "back": "It is an honest acknowledgment of universal mortality, redirecting focus to living a life of significance, where genuine virtue (bravery, generosity, loyalty, honesty) creates lasting remembrance."}, {"front": "In the Norse context, what does 'fame' (as in 'the fame of a dead man's deeds') refer to?", "back": "'Fame' refers to the memory of genuine virtue — remembrance by others that one was brave, generous, loyal, and honest, not celebrity."}, {"front": "How is the Norse concept of Valhalla often misunderstood?", "back": "Valhalla is often misunderstood as a simple 'heaven for warriors' or a place of eternal rest."}, {"front": "What is the true purpose of the warriors in Valhalla?", "back": "The warriors in Valhalla feast and fight every day in preparation for Ragnarök, where they will fight alongside Odin in a last, doomed stand. They are being prepared for inevitable defeat, not rewarded with rest."}, {"front": "What is the central characteristic of the Norse afterlife, as exemplified by Valhalla?", "back": "The Norse afterlife is structured around the acceptance of inevitable defeat."}, {"front": "Does Norse Paganism promise 'liberation' from suffering in the same way Buddhism or Christianity does?", "back": "No, Norse Paganism does not offer liberation in the form of nirvana, heaven, or a classless society."}, {"front": "What does Norse Paganism offer instead of escape or traditional liberation from suffering?", "back": "It offers the possibility of meeting one's fate with courage, dignity, and a life behind them worth remembering."}, {"front": "What is the 'only thing that belongs entirely to you' in the Norse worldview, amidst woven fate and impending Ragnarök?", "back": "The only thing that belongs entirely to you is how you meet your fate with your head up, your courage intact, and a life behind you worth remembering."}, {"front": "What is the Norse answer to suffering and death?", "back": "To face both with courage and to leave behind deeds worth remembering, rather than seeking to eliminate suffering or escape death."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
