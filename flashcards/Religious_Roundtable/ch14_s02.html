<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 14, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is \"De\" in Taoism?", "back": "\"De\" (often translated as virtue or power) is the natural, effortless virtue that flows from a life aligned with the Tao, emerging when one stops forcing."}, {"front": "Explain the Taoist concept of \"Wu wei.\"", "back": "\"Wu wei\" (non-action or effortless action) is the principle that a sage achieves by not forcing, leading by not dominating, and succeeding by not striving; often described as \"going with the flow.\""}, {"front": "What does \"Pu\" represent in Taoist philosophy?", "back": "\"Pu\" (the uncarved block) is a metaphor for the original, undistorted nature of a person before social conditioning and artificial virtues have shaped them, to which the sage returns."}, {"front": "Define \"Ziran\" in Taoism.", "back": "\"Ziran\" (naturalness or self-so-ness) is the quality of being spontaneous and unforced, following one's own nature without strain or performance."}, {"front": "What is Taoist ethics' initial \"startling claim\" regarding morality?", "back": "Taoist ethics claims that the very discussion of ethics indicates a problem, as \"kindness and morality appear\" only when the great Tao is forgotten."}, {"front": "According to Taoism, what happens when people live in alignment with the Tao?", "back": "When people live in alignment with the Tao, virtue (de) flows naturally and effortlessly; there's no need for rules, rituals, or moral philosophy."}, {"front": "How does Laozi critique Confucian virtue, particularly regarding \"highest virtue\" and \"lowest virtue\"?", "back": "Laozi states that the person of highest virtue doesn't even try to be virtuous and thus truly is, while the person of lowest virtue tries very hard and therefore is not virtuous."}, {"front": "What analogy does the Tao Te Ching use in Chapter 8 to describe moral excellence?", "back": "The Tao Te Ching compares the highest good to water, which gives life to all things without competing, flows to low places, and does not force its way, thus being like the Tao."}, {"front": "List three characteristics of water that serve as a moral ideal in Taoism.", "back": "Water is humble, flexible, persistent, nourishing, and ultimately irresistible. (Any three are valid)."}, {"front": "How does Taoism view moral striving?", "back": "Taoism views moral striving as self-defeating, like trying too hard to fall asleep, because true virtue emerges naturally, not through forced effort."}, {"front": "Clarify the common misunderstanding of \"wu wei.\"", "back": "\"Wu wei\" is often misunderstood as laziness or passivity, but it actually means acting in perfect alignment with the situation, without forcing or imposing one's agenda on reality."}, {"front": "Provide an example of \"wu wei\" in action for a skilled craftsman.", "back": "A skilled craftsman exhibits \"wu wei\" by letting the knife glide along the natural grain of the wood rather than fighting it."}, {"front": "How does a good ruler exhibit \"wu wei\"?", "back": "A good ruler exhibits \"wu wei\" by governing so lightly that the people are governed without domination, leading them to say, \"We did it ourselves.\""}, {"front": "Explain the paradox of the sage not competing, according to the Tao Te Ching.", "back": "The Tao Te Ching states, \"The sage does not compete, and therefore no one can compete with him,\" implying that by letting go of striving and fighting, one becomes unassailable."}, {"front": "What is the Taoist perspective on \"softness\" and \"hardness\"?", "back": "In Taoism, softness overcomes hardness, meaning gentle, yielding approaches are ultimately more effective and powerful than rigid, forceful ones."}, {"front": "What does the Tao Te Ching suggest about \"emptiness\" in relation to usefulness?", "back": "The Tao Te Ching suggests that emptiness is useful, implying that a receptive, unforced state allows for greater potential and effectiveness than being filled with rigid doctrines or intentions."}, {"front": "How does Taoist ethics critique \"performance\" or ostentatious displays of virtue?", "back": "Taoist ethics critiques performance, stating that ostentatious displays of virtue (e.g., making a show of kindness) are expressions of ego, stepping out of wu wei and negating true virtue."}, {"front": "According to the Tao Te Ching, how does a truly good person act regarding credit and recognition?", "back": "A truly good person acts and leaves no trace, helps and does not take credit, and speaks rarely, only saying what is true, without seeking recognition or building a reputation."}, {"front": "What is the ultimate goal of the \"good life\" in Taoism?", "back": "The good life in Taoism is not the result of maximizing effort; it is the result of removing the obstacles to naturalness and returning to one's original, uncarved nature (pu)."}, {"front": "How do rules and moral philosophy function in a society where the Tao has been forgotten?", "back": "Rules and moral philosophy act as symptoms of a societal disease, appearing as an attempt to \"patch the hole\" left by the loss of natural alignment with the Tao."}, {"front": "What is the Taoist ideal for the mind's state, as mentioned in Chapter 8?", "back": "The Taoist ideal for the mind's state is \"abysmal stillness,\" promoting a calm, deep, and receptive inner peace."}, {"front": "In Taoism, what is the connection between giving to others and having for oneself for the sage?", "back": "The sage, by expending more for others, paradoxically possesses more of their own; the more they give to others, the more they have themselves, illustrating abundance through generosity and non-accumulation."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
