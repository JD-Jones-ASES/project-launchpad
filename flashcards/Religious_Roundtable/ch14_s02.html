<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 14, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In Taoism, what is 'De' (duh)?", "back": "De is often translated as 'virtue' or 'power.' It is the natural, effortless virtue that flows from a life aligned with the Tao, emerging spontaneously when one stops forcing.", "id": "fc01"}, {"front": "Define 'Wu wei' (woo-WAY).", "back": "Wu wei literally means 'non-action' or 'effortless action.' It's a Taoist principle where the sage achieves by not forcing, leads by not dominating, and succeeds by not striving, often described as 'going with the flow.'", "id": "fc02"}, {"front": "What does 'Pu' (poo) represent in Taoism?", "back": "Pu, 'the uncarved block,' is a metaphor for a person's original, undistorted nature before social conditioning and artificial virtues have shaped them. The sage aims to return to pu.", "id": "fc03"}, {"front": "What is 'Ziran' (tsih-RAN)?", "back": "Ziran means 'naturalness' or 'self-so-ness.' It is the quality of being spontaneous and unforced, following one's own nature without strain or performance.", "id": "fc04"}, {"front": "According to Taoist ethics, why is the very discussion of ethics considered a 'problem'?", "back": "The fact that people talk about ethics indicates a departure from the Tao. When in alignment with the Tao, virtue flows effortlessly, and rules or moral philosophies become unnecessary 'patches' for a lost natural order.", "id": "fc05"}, {"front": "How does Laozi, in the Tao Te Ching (Chapter 38), contrast the 'person of highest virtue' with the 'person of lowest virtue'?", "back": "The person of highest virtue does not try to be virtuous and therefore is truly virtuous. The person of lowest virtue tries very hard to be virtuous and therefore is not virtuous at all, seeing moral striving as self-defeating.", "id": "fc06"}, {"front": "What central image does Chapter 8 of the Tao Te Ching use to illustrate the highest moral excellence, and why?", "back": "The highest good is like water. Water benefits all things without competing, flows to low places, does not force its way, and gives life without demanding recognition, embodying humility, flexibility, persistence, and nourishment.", "id": "fc07"}, {"front": "Is 'Wu wei' synonymous with laziness or passivity? Explain.", "back": "No, wu wei is neither laziness nor passivity. It means acting in perfect alignment with a situation, without forcing one's own agenda, and working harmoniously with the natural grain of reality.", "id": "fc08"}, {"front": "Provide two examples of 'Wu wei' in action, as described in the text.", "back": "A skilled craftsman exhibits wu wei by letting the knife glide along the natural grain of the wood. A good ruler exhibits wu wei when people are governed so lightly that they feel they 'did it themselves.'", "id": "fc09"}, {"front": "The text mentions a paradox related to wu wei, stating 'softness overcomes hardness.' Explain this paradox in the context of Taoist thought.", "back": "This paradox suggests that by choosing not to compete, struggle, or exert force (softness), one becomes ultimately unbeatable and irresistible. Flexibility and yielding are seen as more powerful in the long run than brute force.", "id": "fc10"}, {"front": "How does Taoist ethics critique 'performance' or ostentatious displays of virtue?", "back": "A person who ostentatiously displays virtue, lectures others, or builds a reputation for goodness steps out of wu wei and into ego. True goodness acts and leaves no trace, helps without taking credit, and speaks only what is true, reflecting a return to pu.", "id": "fc11"}, {"front": "According to Chapter 81 of the Tao Te Ching, how does the sage deal with accumulation and giving?", "back": "The sage does not accumulate for himself. The more he expends for others, the more he possesses; the more he gives to others, the more he has himself.", "id": "fc12"}, {"front": "How does the Taoist moral ideal, as exemplified by water, differ from more conventional heroic or intellectual ideals?", "back": "The Taoist ideal is not the heroic warrior, the lecturing philosopher, or the dutiful official. Instead, it is humble, flexible, persistent, nourishing, and ultimately irresistible, like water.", "id": "fc13"}, {"front": "In Taoist thought, why are rules, rituals, and moral philosophy seen as a 'symptom of the disease they claim to cure'?", "back": "When people lose their natural alignment with the Tao, they create rules to patch the hole. These rules don't cure the underlying problem (loss of alignment) but rather indicate its presence, much like a fever is a symptom of illness.", "id": "fc14"}, {"front": "According to Laozi, why is moral striving considered 'self-defeating'?", "back": "Trying very hard to be virtuous is compared to trying very hard to fall asleep: the effort itself prevents the desired outcome. True virtue (de) flows naturally when one stops forcing, not through strenuous effort.", "id": "fc15"}, {"front": "How does society's influence relate to the Taoist concept of 'Pu,' the uncarved block?", "back": "Society's conditioning and artificial virtues are seen as shaping and distorting a person's original, natural ('uncarved') nature. The sage seeks to shed these external influences to return to their authentic self.", "id": "fc16"}, {"front": "Chapter 8 states that water 'is like the Tao.' In what specific ways does water's behavior resemble the Tao?", "back": "Water resembles the Tao by benefiting all things without competition, by occupying low places, and by not forcing its way but finding the path of least resistance.", "id": "fc17"}, {"front": "According to the Tao Te Ching, 'The sage does not compete, and therefore no one can compete with him.' Explain this apparent paradox.", "back": "By choosing not to engage in struggle or rivalry, the sage removes the very basis for competition. Their actions are so aligned with the natural flow that there is no 'opponent' or goal to contend for, making them ultimately unassailable.", "id": "fc18"}, {"front": "Describe the characteristics of a truly good person from a Taoist perspective, according      to the text.", "back": "A truly good person acts and leaves no trace, helps and does not take credit, speaks rarely, and when they do, says what is true and stops. This is a natural expression, not false modesty or a performance.", "id": "fc19"}, {"front": "How does a good ruler exhibiting wu wei impact their people?", "back": "A good ruler governs so lightly and without imposing their will that the people feel they themselves accomplished the good outcomes, fostering natural order rather than enforced compliance.", "id": "fc20"}, {"front": "What does Chapter 81 say about 'sincere words' versus 'fine words'?", "back": "Sincere words are not fine; fine words are not sincere. This implies that genuine communication is direct and unadorned, while overly eloquent or embellished language may lack truthfulness.", "id": "fc21"}, {"front": "What is the ultimate state a Taoist sage aims to return to or achieve?", "back": "The ultimate goal is to return to 'Pu' (the uncarved block) and live in alignment with 'Ziran' (naturalness), allowing 'De' (virtue) to flow effortlessly through 'Wu wei' (effortless action).", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
