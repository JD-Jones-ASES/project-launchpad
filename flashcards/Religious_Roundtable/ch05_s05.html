<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 5, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Approximately how many practitioners does Buddhism claim worldwide?", "back": "500 million"}, {"front": "Where does Buddhism rank among the world's largest religions by number of adherents?", "back": "Fourth"}, {"front": "Which specific Buddhist practice moved into secular hospitals and schools in the late 20th century?", "back": "Mindfulness meditation"}, {"front": "In addition to hospitals and schools, where has mindfulness meditation been adopted in the modern era?", "back": "Corporate offices and psychological clinics"}, {"front": "What does the acronym MBCT stand for in the context of psychological treatment?", "back": "Mindfulness-Based Cognitive Therapy"}, {"front": "In what decade was Mindfulness-Based Cognitive Therapy (MBCT) developed?", "back": "The 1990s"}, {"front": "Mindfulness-Based Cognitive Therapy (MBCT) was developed to treat anxiety and which other condition?", "back": "Depression"}, {"front": "MBCT is a modern psychological treatment that draws directly on which tradition's practices?", "back": "Buddhism"}, {"front": "Western philosophers of mind consider Buddhist thought a serious dialogue partner for neuroscience and which other field?", "back": "Phenomenology"}, {"front": "Buddhist thought is valued by neuroscientists for its specific analysis of perception and _____.", "back": "Consciousness"}, {"front": "How does Buddhist thought describe the nature of the \"self\" in its analysis of the mind?", "back": "Constructed"}, {"front": "Which prominent Buddhist leader has hosted sustained conversations with scientists regarding the nature of the mind?", "back": "The Dalai Lama"}, {"front": "Term: Ahimsa", "back": "Definition: The principle of non-harm or non-violence."}, {"front": "Which two other religions share the principle of ahimsa with Buddhism?", "back": "Hinduism and Jainism"}, {"front": "The principle of ahimsa has shaped modern movements for peace and _____.", "back": "Social justice"}, {"front": "Who is the primary figure associated with \"Engaged Buddhism\"?", "back": "Thich Nhat Hanh"}, {"front": "What is the primary goal of the \"Engaged Buddhism\" movement?", "back": "Applying Buddhist teachings directly to social and global crises."}, {"front": "Engaged Buddhism applies Buddhist teachings to war, poverty, and which other global issue?", "back": "Environmental destruction"}, {"front": "What core Buddhist insight serves as the ground for Buddhist ecology?", "back": "All things are interdependent"}, {"front": "Buddhist ecology offers a framework for thinking about humanity's relationship to the _____.", "back": "Natural world"}, {"front": "Buddhism provides a rigorous account of mind and suffering that notably lacks an appeal to what type of deity?", "back": "A creator God"}, {"front": "Unlike many religious traditions, Buddhism does not make a demand for which type of faith?", "back": "Supernatural faith"}, {"front": "Buddhism is philosophically inclusive because it does not exclude those who cannot accept certain _____ claims.", "back": "Metaphysical"}, {"front": "What is the first step in the three-part Buddhist method described in the text?", "back": "Careful observation of experience"}, {"front": "What is the second step in the three-part Buddhist method described in the text?", "back": "Systematic analysis"}, {"front": "What is the third step in the three-part Buddhist method described in the text?", "back": "Practical application"}, {"front": "The relationship between Buddhism and modern _____ is described as one of the most intellectually fertile conversations today.", "back": "Psychology"}, {"front": "Buddhism claims approximately _____ practitioners worldwide.", "back": "500 million"}, {"front": "The Principle of non-harm or non-violence is known as _____.", "back": "Ahimsa"}, {"front": "The insight that all things are _____ is the basis for Buddhist ecology.", "back": "Interdependent"}, {"front": "Buddhism's method is characterized as one of the great _____ achievements of human civilization.", "back": "Intellectual"}, {"front": "Buddhism's influence reached hospitals and corporate offices during which two centuries?", "back": "The late 20th and early 21st centuries"}, {"front": "What specific area of Buddhist thought interests neuroscientists regarding the \"self\"?", "back": "Its constructed nature"}, {"front": "Which Buddhist movement specifically targets issues like poverty and environmental destruction?", "back": "Engaged Buddhism"}, {"front": "Buddhism is described as a rigorous account of mind and _____.", "back": "Suffering"}, {"front": "Along with Buddhism, Jainism and _____ share the ethical principle of ahimsa.", "back": "Hinduism"}, {"front": "Western philosophers find Buddhism useful for its analysis of consciousness, perception, and the _____ nature of the self.", "back": "Constructed"}, {"front": "What is the primary psychological application for MBCT?", "back": "Treating depression and anxiety"}, {"front": "The Buddhist method prioritizes the systematic analysis of _____ over metaphysical faith.", "back": "Experience"}, {"front": "Buddhism's ethical legacy is particularly noted for its influence on movements for _____.", "back": "Peace and social justice"}, {"front": "How is the historical framework of Buddhist ecology described in relation to modern environmental thought?", "back": "One of the oldest and most sophisticated"}, {"front": "What makes Buddhism philosophically rare in the modern student's perspective?", "back": "It requires no appeal to a creator God or supernatural faith."}, {"front": "Buddhism is the _____ largest religion in the world.", "back": "Fourth"}, {"front": "According to the text, who would have been \"astonished\" by the modern secular use of mindfulness?", "back": "The monks of ancient India"}, {"front": "The systematic analysis of experience in Buddhism is paired with which type of application?", "back": "Practical application"}, {"front": "What kind of claims does Buddhism not force its practitioners to accept?", "back": "Metaphysical claims"}, {"front": "In the conversation between Buddhism and neuroscience, what is a primary topic of dialogue?", "back": "The constructed nature of the self"}, {"front": "Buddhist ecology applies the concept of interdependence to humanity's relationship with what?", "back": "The natural world"}, {"front": "Thich Nhat Hanh is the central figure for which social-action-oriented Buddhist movement?", "back": "Engaged Buddhism"}, {"front": "Which century saw the development of Mindfulness-Based Cognitive Therapy?", "back": "The 20th century (specifically the 1990s)"}, {"front": "What term describes the Buddhist principle of non-violence shared with Jainism?", "back": "Ahimsa"}, {"front": "Buddhism's method includes systematic analysis and careful _____ of experience.", "back": "Observation"}, {"front": "What is the primary focus of the Dalai Lama's sustained conversations with scientists?", "back": "The nature of the mind (consciousness and perception)"}, {"front": "Buddhism's account of the mind is noted for being _____ and systematic.", "back": "Rigorous"}, {"front": "Which modern field uses Buddhist ideas as a dialogue partner for neuroscience?", "back": "Phenomenology"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
