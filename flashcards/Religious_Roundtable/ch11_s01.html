<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 11, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Nasadiya Sukta?", "back": "The Nasadiya Sukta, or Hymn of Creation (Rigveda 10.129), is one of the oldest philosophical poems in the world, known for questioning the universe's origins and admitting uncertainty."}, {"front": "What is the central philosophical stance of the Nasadiya Sukta regarding creation?", "back": "It asks fundamental questions about the universe's origin (being/non-being, darkness/water) and concludes with intellectual humility, admitting 'Who really knows?'"}, {"front": "Define Brahman in Hindu philosophy.", "back": "Brahman is the ultimate, undifferentiated reality underlying all of existence, the ground of being itself, beyond all qualities yet their source."}, {"front": "How do the Upanishads describe Brahman?", "back": "The Upanishads describe Brahman as sat-chit-ananda: being, consciousness, and bliss."}, {"front": "Is Brahman considered a god among gods in Hinduism? Explain.", "back": "No, Brahman is not a god but the ground of being itself, neither fully personal nor fully impersonal, transcending conventional categories of deity."}, {"front": "What is the relationship between the individual self (atman) and Brahman?", "back": "At the deepest level, the individual self (atman) is identical with Brahman, described as a drop of the ocean discovering it was never separate."}, {"front": "How does Hindu cosmology differ from traditions that begin with a single moment of creation?", "back": "Hindu cosmology does not begin with a single creator or moment; instead, the universe is cyclically created and destroyed across immense spans of time."}, {"front": "What is a 'kalpa' in Hindu cosmology?", "back": "A kalpa is an immense span of time, lasting 4.32 billion years, during which the universe is created and destroyed, embedded in larger cosmic cycles."}, {"front": "How is the cosmos often described in Hindu thought, moving beyond a machine analogy?", "back": "It is described as a living, breathing, pulsating process, rather than a machine built once and left to run, emphasizing its dynamic and cyclical nature."}, {"front": "What is the Trimurti in Hinduism?", "back": "The Trimurti consists of three divine figures: Brahma the creator, Vishnu the preserver, and Shiva the destroyer."}, {"front": "What is the collective significance of the Trimurti?", "back": "They represent three aspects of the single divine process that is Brahman expressing itself in time – the endless rhythm of creation, sustenance, and dissolution."}, {"front": "Differentiate between Brahma and Brahman.", "back": "Brahma is the creator god within the Trimurti, a divine figure. Brahman is the ultimate, undifferentiated reality underlying all existence, the ground of being itself."}, {"front": "What does the Nasadiya Sukta's ending, 'Who really knows?', signify about Hindu thought?", "back": "It signifies intellectual honesty and humility, a willingness to leave fundamental questions open, suggesting even gods or the 'One' may not fully know the origin of creation."}, {"front": "What is 'lila' in Hindu thought, particularly regarding creation?", "back": "Lila means 'divine play,' suggesting the world is created not out of divine need or a problem to solve, but freely and joyfully, with no purpose beyond the joy of the activity itself."}, {"front": "What does the concept of lila imply about the nature of creation?", "back": "It implies that creation is an overflow of divine abundance and joy, rather than a response to a divine lack or necessity."}, {"front": "How does the Nasadiya Sukta challenge common assumptions about sacred texts?", "back": "Unlike many sacred texts that offer confident answers, the Nasadiya Sukta embraces uncertainty and intellectual humility, questioning the origins of creation rather than providing a definitive account."}, {"front": "Describe two key characteristics of Brahman that distinguish it from a conventional deity.", "back": "Brahman is neither fully personal nor fully impersonal, and it is beyond all qualities yet the source of all qualities, making it the ground of being rather than a specific divine entity."}, {"front": "According to the concept of lila, what is the 'cause' of creation?", "back": "Creation arises from an overflow of divine abundance and joy, analogous to a child's play, rather than from a divine need or purpose."}, {"front": "Explain the 'drop of the ocean' analogy in relation to atman and Brahman.", "back": "It illustrates that the individual self (atman) is, at its deepest level, identical with Brahman, implying that any perceived separation is an illusion and unity is the fundamental truth."}, {"front": "What is significant about the Rigveda's age in the context of philosophical texts?", "back": "The Nasadiya Sukta (Rigveda 10.129) is one of the oldest philosophical poems in the world, demonstrating humanity's early and profound intellectual inquiry into cosmic origins."}, {"front": "How does Hindu thought conceptualize the cosmos differently from a 'machine built once and left to run'?", "back": "It views the cosmos as a dynamic, living, breathing, pulsating process that undergoes continuous cycles of creation and destruction, rather than a static, engineered system."}, {"front": "What is meant by Brahman being 'undifferentiated reality'?", "back": "It means Brahman is a unified, singular reality that underlies all distinctions and diversity in the universe, without internal divisions or separate components."}, {"front": "Why is the Nasadiya Sukta's intellectual honesty considered 'of a very high order'?", "back": "Because it, an ancient sacred text, bravely admits uncertainty about ultimate origins, prioritizing honest inquiry over dogmatic pronouncements, fostering deep philosophical thought."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
