<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 3, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the literal meaning of the word \"Quran\"?", "back": "Recitation."}, {"front": "How do Muslims describe the authorship of the Quran?", "back": "They believe it is the direct, verbatim word of God rather than a book written by Muhammad."}, {"front": "Through which angel was the Quran revealed to Muhammad?", "back": "Gabriel."}, {"front": "During which years did the revelation of the Quran take place?", "back": "610 to 632."}, {"front": "Why is the Quran considered \"untranslatable\" in a strict sense?", "back": "It is believed to be God's direct speech specifically in the Arabic language."}, {"front": "What is the status of Quranic texts written in languages other than Arabic?", "back": "They are considered interpretations or meanings rather than the Quran itself."}, {"front": "What title is given to a Muslim who has memorized the entire Quran?", "back": "Hafiz."}, {"front": "What is the literal meaning of the term \"hafiz\"?", "back": "One who preserves."}, {"front": "Approximately how many words are contained in the Quran?", "back": "77,000."}, {"front": "How many chapters (suras) make up the Quran?", "back": "114."}, {"front": "On what types of materials were the Quranic revelations first recorded during Muhammad's life?", "back": "Bones, flat stones, and palm leaves."}, {"front": "Which Caliph first ordered the compilation of Quranic fragments into a single document?", "back": "Abu Bakr."}, {"front": "Which Caliph produced the authoritative written text of the Quran used today?", "back": "Uthman ibn Affan."}, {"front": "Around what year was the authoritative Uthmanic text of the Quran produced?", "back": "650."}, {"front": "What action did Caliph Uthman take regarding non-standard versions of the Quran?", "back": "He ordered them to be destroyed."}, {"front": "What are the chapters of the Quran called?", "back": "Suras."}, {"front": "Except for the opening chapter, how are the suras of the Quran generally ordered?", "back": "From longest to shortest."}, {"front": "What is the title of the short opening chapter of the Quran?", "back": "Al-Fatiha."}, {"front": "Which specific chapter of the Quran is recited in every unit of the five daily prayers?", "back": "Al-Fatiha."}, {"front": "What are the \"Hadith\"?", "back": "Recorded reports of Muhammad's sayings, actions, and tacit approvals."}, {"front": "In which century were the most authoritative Hadith collections compiled?", "back": "9th century."}, {"front": "Name one of the two most authoritative collectors of Hadith mentioned in the text.", "back": "al-Bukhari (or Muslim)."}, {"front": "What is the \"Sunnah\"?", "back": "The practice and way of life of Muhammad, serving as a model for Muslim behavior."}, {"front": "Where is the Sunnah of the Prophet Muhammad preserved?", "back": "In the Hadith."}, {"front": "Which two sources form the foundation for Islamic law (Sharia)?", "back": "The Quran and the Sunnah."}, {"front": "What is the literal meaning of the word \"Sharia\"?", "back": "The path to the watering hole."}, {"front": "What is the conceptual goal of Sharia, according to the literal meaning of its name?", "back": "To provide a road to life rather than a prison of rules."}, {"front": "What does the name \"Al-Fatiha\" mean?", "back": "The Opening."}, {"front": "How many verses are contained in Al-Fatiha?", "back": "Seven."}, {"front": "How many times per day does a Muslim performing all five prayers recite Al-Fatiha?", "back": "Seventeen."}, {"front": "Over a year, approximately how many times does a Muslim recite Al-Fatiha during daily prayers?", "back": "Over six thousand times."}, {"front": "What is the traditional nickname for the chapter Al-Fatiha?", "back": "The mother of the Quran."}, {"front": "How does the Quran's role as \"God's speech\" affect its use in prayer and study?", "back": "It is meant to be heard and recited for its rhythms and sound patterns."}, {"front": "What topics does the Quran address regarding the afterlife?", "back": "The nature of Paradise and Hell."}, {"front": "What is the relationship between the Quran and the Hadith when solving practical life questions?", "back": "Muslims turn to the Hadith when the Quran does not provide a specific answer."}, {"front": "Term: Sunnah", "back": "Definition: The model of behavior based on the Prophet Muhammad’s life."}, {"front": "Term: Hafiz", "back": "Definition: A person who has committed the entire 114 chapters of the Quran to memory."}, {"front": "What was Muhammad's role in the delivery of the Quran according to Islamic tradition?", "back": "He was a vessel who recited the speech delivered by God through Gabriel."}, {"front": "Why is the Arabic of the Quran held in such high regard by Muslims?", "back": "It is considered miraculous in its beauty and precision."}, {"front": "The Quran is organized into _____ chapters called suras.", "back": "114"}, {"front": "The collections of _____ and _____ are considered the most authoritative reports of the Prophet's life.", "back": "al-Bukhari; Muslim"}, {"front": "How does the Quran describe the lives of figures from before Muhammad's time?", "back": "It includes the stories of earlier prophets."}, {"front": "What did Uthman do with the standardized copies of the Quran after they were produced?", "back": "He sent them to the major cities of the Muslim world."}, {"front": "The term \"_____\" refers to Muhammad's unspoken acceptance of an action or behavior.", "back": "tacit approval"}, {"front": "Concept: The Uthmanic Text", "back": "Definition: The standardized version of the Quran established around 650 that remains the basis for the modern text."}, {"front": "How long after Muhammad's death were the most authoritative Hadith collections compiled?", "back": "Two centuries (in the 9th century)."}, {"front": "What does the Quran cover regarding the nature of the divine?", "back": "The nature of God."}, {"front": "Why is memorization of the Quran considered a \"cherished honor\"?", "back": "It preserves the direct word of God as it was originally recited."}, {"front": "Which specific Caliph is responsible for the final destruction of variant Quranic texts?", "back": "Uthman ibn Affan."}, {"front": "In Islamic guidance, what distinguishes the Hadith from the Quran?", "back": "The Quran is the word of God, whereas the Hadith is the word and example of Muhammad."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
