<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 3, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is believed by Muslims to have revealed the word of God to Muhammad?", "back": "The angel Gabriel."}, {"front": "Between which years was the Quran revealed to the Prophet Muhammad?", "back": "610 and 632."}, {"front": "What does the name \"Quran\" literally mean?", "back": "Recitation."}, {"front": "In Islam, how does the Quran's authorship differ from other scriptures?", "back": "It is viewed as God's direct speech rather than a book written or composed by a human."}, {"front": "Why is the Quran considered untranslatable in a strict sense?", "back": "Because the Quran itself is the specific Arabic text, held to be miraculous in beauty and precision."}, {"front": "What is the term for a Muslim who has memorized the entire Quran?", "back": "Hafiz."}, {"front": "What does the term \"hafiz\" literally mean?", "back": "One who preserves."}, {"front": "Approximately how many words are contained in the Quran?", "back": "77,000."}, {"front": "On what types of materials were the Quranic revelations first written during Muhammad's lifetime?", "back": "Bones, flat stones, and palm leaves."}, {"front": "Which caliph ordered the first compilation of Quranic fragments into a single document?", "back": "Abu Bakr."}, {"front": "Who produced the authoritative written text of the Quran used today?", "back": "The third caliph, Uthman ibn Affan."}, {"front": "Around what year was the authoritative Uthmanic text of the Quran produced?", "back": "650."}, {"front": "What action did Uthman take to ensure the standardization of the Quranic text?", "back": "He sent copies to major cities and ordered other versions destroyed."}, {"front": "What is the term for the 114 chapters of the Quran?", "back": "Suras."}, {"front": "With the exception of the first chapter, how are the suras of the Quran organized?", "back": "Roughly from longest to shortest."}, {"front": "What is the name of the short opening chapter of the Quran?", "back": "Al-Fatiha."}, {"front": "What does the name \"Al-Fatiha\" mean?", "back": "The Opening."}, {"front": "How many verses are contained in Al-Fatiha?", "back": "Seven."}, {"front": "How many times per day does a Muslim recite Al-Fatiha during the five daily prayers?", "back": "Seventeen."}, {"front": "Because of its central importance, what does tradition call Al-Fatiha?", "back": "The mother of the Quran."}, {"front": "What are the Hadith?", "back": "Recorded reports of Muhammad's sayings, actions, and tacit approvals."}, {"front": "In what century were the authoritative Hadith collections of al-Bukhari and Muslim compiled?", "back": "The 9th century."}, {"front": "What is the \"Sunnah\"?", "back": "The practice and way of life of the Prophet Muhammad, serving as a model for behavior."}, {"front": "Which two sources form the foundation for Sharia?", "back": "The Quran and the Sunnah."}, {"front": "What does the word \"Sharia\" literally mean?", "back": "The path to the watering hole."}, {"front": "Why is the Quran considered a book to be heard as much as read?", "back": "Its rhythms, sound patterns, and repeated refrains are essential to its impact."}, {"front": "The Quran is not considered Muhammad's book about God, but rather God's _____.", "back": "Speech."}, {"front": "How many chapters (suras) comprise the Quran?", "back": "114."}, {"front": "Unlike the Quran, the Hadith are not the word of God, but the word and example of _____.", "back": "The Prophet Muhammad."}, {"front": "Term: Sunnah", "back": "Definition: The practice and way of life of Muhammad, preserved in the Hadith as a behavioral model."}, {"front": "Term: Hafiz", "back": "Definition: An honorary title for a Muslim who has committed the entire Quran to memory."}, {"front": "Concept: Sharia", "back": "Definition: Islamic law interpreted as a \"road to life\" rather than just a prison of rules."}, {"front": "Which specific chapter is recited in every unit of every daily Muslim prayer?", "back": "Al-Fatiha."}, {"front": "What are the names of the two most authoritative Hadith collectors mentioned in the text?", "back": "Al-Bukhari and Muslim."}, {"front": "What is the primary role of Muhammad regarding the Quranic text according to Islamic belief?", "back": "He acted as a vessel for God's recitation."}, {"front": "Approximately how many times per year does a practicing Muslim recite Al-Fatiha?", "back": "Over six thousand times."}, {"front": "Which caliph is credited with ordering the compilation of Quranic fragments into a single document after Muhammad's death?", "back": "Abu Bakr."}, {"front": "The Quran addresses topics such as theology, ethics, law, and the stories of earlier _____.", "back": "Prophets."}, {"front": "What is the significance of the Uthmanic text in modern Islam?", "back": "It is the version of the Quran substantially used by Muslims today."}, {"front": "The _____ is the sacred scripture of Islam, believed to be the direct word of God.", "back": "Quran."}, {"front": "What characteristic of the Quran's Arabic is held to be \"miraculous\"?", "back": "Its beauty and precision."}, {"front": "Why do Muslims turn to the Hadith in addition to the Quran?", "back": "The Quran does not address every practical question of life."}, {"front": "How does the literal meaning of Sharia reflect its intended role in a believer's life?", "back": "It suggests a path to sustenance and life (\"path to the watering hole\") rather than restriction."}, {"front": "Which figure in Islamic history is responsible for sending standardized copies of the Quran to major cities?", "back": "Uthman ibn Affan."}, {"front": "The _____ are recorded reports of the Prophet's sayings and actions compiled centuries after his death.", "back": "Hadith."}, {"front": "In Quranic organization, which chapter breaks the rule of being arranged from longest to shortest?", "back": "Al-Fatiha (The Opening)."}, {"front": "What is the foundation of Islamic law called?", "back": "Sharia."}, {"front": "The practice and way of life of the Prophet Muhammad is known as the _____.", "back": "Sunnah."}, {"front": "How many verses make up the chapter known as \"The Opening\"?", "back": "7."}, {"front": "According to the text, what happened to non-standardized versions of the Quran during Uthman's reign?", "back": "They were ordered to be destroyed."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
