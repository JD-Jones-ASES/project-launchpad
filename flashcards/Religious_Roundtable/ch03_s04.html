<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 3, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Muslim belief, who is the author of the Quran?", "back": "God (Allah)."}, {"front": "Through which angel was the Quran revealed to Muhammad?", "back": "Gabriel."}, {"front": "What was the timeframe for the revelation of the Quran?", "back": "Between 610 and 632."}, {"front": "What is the literal meaning of the name \"Quran\"?", "back": "Recitation."}, {"front": "How do Muslims describe Muhammad's role in the creation of the Quran?", "back": "He was a vessel who recited God's direct, verbatim speech."}, {"front": "Why is the Quran considered strictly untranslatable in Islamic tradition?", "back": "It is considered God's speech specifically in the Arabic language."}, {"front": "In Islamic thought, what is the status of a Quranic text written in a language other than Arabic?", "back": "An interpretation or meaning of the Quran."}, {"front": "What title is given to a Muslim who has memorized the entire Quran?", "back": "Hafiz."}, {"front": "The term \"hafiz,\" used for one who memorizes the Quran, literally means _____.", "back": "One who preserves."}, {"front": "Approximately how many words are contained in the Quran?", "back": "77,000."}, {"front": "How many chapters (suras) comprise the Quran?", "back": "114."}, {"front": "What types of materials were used to record revelations during Muhammad's lifetime?", "back": "Bones, flat stones, and palm leaves."}, {"front": "Which leader ordered the first compilation of Quranic fragments into a single document?", "back": "Abu Bakr (the first caliph)."}, {"front": "Which caliph is responsible for producing the authoritative written text of the Quran used today?", "back": "Uthman ibn Affan (the third caliph)."}, {"front": "In what year was the authoritative Uthmanic text of the Quran produced?", "back": "Around 650."}, {"front": "What action did Uthman take regarding non-standardized versions of the Quran?", "back": "He ordered them to be destroyed."}, {"front": "What is the term for a chapter within the Quran?", "back": "Sura."}, {"front": "Except for the first chapter, how are the suras of the Quran generally organized?", "back": "From longest to shortest."}, {"front": "What is the name of the short opening chapter of the Quran?", "back": "Al-Fatiha."}, {"front": "What is the English meaning of the title \"Al-Fatiha\"?", "back": "The Opening."}, {"front": "Which specific chapter is recited in every unit of every daily Muslim prayer?", "back": "Al-Fatiha."}, {"front": "Beyond its text, what oral elements contribute to the impact of the Quran?", "back": "Rhythms, sound patterns, and repeated refrains."}, {"front": "What are the \"Hadith\" in Islamic tradition?", "back": "Recorded reports of Muhammad's sayings, actions, and tacit approvals."}, {"front": "Whose words and examples are recorded in the Hadith?", "back": "Prophet Muhammad."}, {"front": "During which century were the most authoritative collections of Hadith compiled?", "back": "9th century."}, {"front": "Who are the two most authoritative compilers of Hadith?", "back": "Al-Bukhari and Muslim."}, {"front": "What is the \"Sunnah\"?", "back": "The practice and way of life of the Prophet Muhammad."}, {"front": "Where is the Sunnah of the Prophet Muhammad preserved?", "back": "In the Hadith."}, {"front": "What two primary sources form the foundation for Sharia?", "back": "The Quran and the Sunnah."}, {"front": "What is the literal meaning of the word \"Sharia\"?", "back": "The path to the watering hole."}, {"front": "Metaphorically, Sharia is described not as a prison of rules, but as a _____.", "back": "Road to life."}, {"front": "How many verses are contained in Al-Fatiha?", "back": "Seven."}, {"front": "How many times per day does a Muslim who performs all five prayers recite Al-Fatiha?", "back": "17 times."}, {"front": "What honorific title does Islamic tradition give to the opening chapter, Al-Fatiha?", "back": "The mother of the Quran."}, {"front": "How does the Quran's origin differ from other scriptures regarding divine inspiration?", "back": "It is considered direct speech from God rather than human composition under inspiration."}, {"front": "What is the primary function of the Sunnah in a Muslim's life?", "back": "It serves as a model for behavior in all areas of life."}, {"front": "Why were standardized copies of the Quran sent to major cities in the 7th century?", "back": "To establish an authoritative text across the Muslim world."}, {"front": "Which religious source is used when the Quran does not address a specific practical question of life?", "back": "The Hadith."}, {"front": "How does the Quran address the history of religion?", "back": "It includes the stories of earlier prophets."}, {"front": "What distinguishes the content of the Hadith from the content of the Quran regarding divinity?", "back": "The Hadith are the words of a prophet, while the Quran is the word of God."}, {"front": "The rhythmic and auditory nature of the Quran suggests it is meant to be _____ as much as read.", "back": "Heard."}, {"front": "What is the approximate annual count of Al-Fatiha recitations for a practicing Muslim?", "back": "Over 6,000 times."}, {"front": "What major topics regarding the afterlife are addressed in the Quran?", "back": "The nature of Paradise and Hell."}, {"front": "The authoritative written Quran used today is substantially based on the text produced by _____.", "back": "Uthman ibn Affan."}, {"front": "In the context of the Hadith, what is a \"tacit approval\"?", "back": "Muhammad's silent acceptance of an action performed in his presence."}, {"front": "What does the etymology of Sharia imply about its purpose in a believer's life?", "back": "It provides essential guidance for survival and flourishing."}, {"front": "How did the early Muslim community primarily preserve the Quran before it was standardized in writing?", "back": "Through memorization."}, {"front": "Concept: The Sunnah", "back": "Definition: The prophetic model of behavior derived from Muhammad's life, serving as a guide for Muslims."}, {"front": "Term: Sharia", "back": "Definition: Islamic law derived from the Quran and Sunnah, literally meaning \"the path to the watering hole.\""}, {"front": "Term: Hadith", "back": "Definition: Recorded reports of the sayings and actions of Prophet Muhammad."}, {"front": "True or False: Muhammad is considered the author of the Quran in Islamic theology.", "back": "False (God is the author; Muhammad is the messenger/vessel)."}, {"front": "What is the significance of the Arabic language in the Quran?", "back": "Its beauty and precision are considered miraculous and essential to the revelation."}, {"front": "Which caliph's standardization project ensured the uniformity of the Quranic text?", "back": "Uthman ibn Affan."}, {"front": "What is the relationship between the Sunnah and the Hadith?", "back": "The Sunnah is the lifestyle/practice, which is documented and preserved within the Hadith."}, {"front": "Aside from theology and law, name two other topics addressed by the Quran.", "back": "Ethics and history (or the stories of earlier prophets)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
