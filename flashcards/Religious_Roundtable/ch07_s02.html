<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the approximate timeframe for the Classical phase of Confucianism?", "back": "5th century BCE–2nd century CE"}, {"front": "Which successor to Confucius taught that human nature is fundamentally good?", "back": "Mencius"}, {"front": "Which philosopher is described as an important 'contrarian' successor in Classical Confucianism?", "back": "Xunzi"}, {"front": "According to Mencius, what are two examples of innate human virtues?", "back": "Compassion and moral judgment"}, {"front": "What did Xunzi teach regarding the fundamental state of human nature?", "back": "It is fundamentally chaotic."}, {"front": "By what method did Xunzi believe virtue must be established?", "back": "Through education and ritual"}, {"front": "Despite their disagreement on human nature, what process did both Mencius and Xunzi emphasize?", "back": "Cultivation"}, {"front": "During which Chinese dynasty did Neo-Confucianism emerge?", "back": "Song dynasty"}, {"front": "Neo-Confucianism was an intellectual response to which two other major systems of thought?", "back": "Buddhism and Taoism"}, {"front": "What did Buddhism and Taoism provide that Classical Confucianism originally lacked?", "back": "Sophisticated metaphysical accounts of reality"}, {"front": "What was the primary focus of Classical Confucianism before the Neo-Confucian shift?", "back": "Ethics and governance"}, {"front": "Who were the two brothers identified as key early Neo-Confucian philosophers?", "back": "Cheng Yi and Cheng Hao"}, {"front": "Which philosopher is credited with most fully developing the Neo-Confucian synthesis?", "back": "Zhu Xi"}, {"front": "What was the lifespan of the Neo-Confucian philosopher Zhu Xi?", "back": "1130–1200 CE"}, {"front": "Term: Neo-Confucianism", "back": "A philosophical movement synthesizing Confucian ethics with Buddhist and Taoist metaphysics."}, {"front": "Which Korean dynasty was explicitly organized around Neo-Confucian principles?", "back": "Joseon dynasty"}, {"front": "What was the lifespan of the Joseon dynasty in Korea?", "back": "1392–1910 CE"}, {"front": "In Japan, Neo-Confucian thought helped shape the samurai code known as _____.", "back": "Bushido"}, {"front": "During which period in Japan did Neo-Confucianism shape the education system?", "back": "Tokugawa period"}, {"front": "In Vietnam, Neo-Confucianism provided the framework for what government system?", "back": "The imperial civil service"}, {"front": "What is the 20th-century movement that seeks to engage Confucianism with Western philosophy?", "back": "New Confucianism"}, {"front": "What is the Chinese term for New Confucianism?", "back": "Xin Rujia"}, {"front": "New Confucian thinkers attempt to adapt the tradition to a world that values individual rights and _____.", "back": "Democratic equality"}, {"front": "Some New Confucianists argue that values like social harmony and the cultivation of character offer an 'Asian path' to _____.", "back": "Democracy"}, {"front": "Critics argue that Confucianism must be radically reformed regarding its historical treatment of _____.", "back": "Women"}, {"front": "A major point of debate in New Confucianism is how to adapt its traditional emphasis on _____ to the modern world.", "back": "Ritual hierarchy"}, {"front": "What are the traditional Korean Confucian academies called?", "back": "Seowon"}, {"front": "Which value rooted in Confucian formation emphasizes honor toward parents and those of older generations?", "back": "Respect for elders"}, {"front": "The emphasis on _____ is a core Confucian value that remains powerful in East Asian cultures today.", "back": "Education"}, {"front": "Which core Confucian value emphasizes the primary importance of the kinship unit?", "back": "Dedication to family"}, {"front": "What is the specific timeframe given for the Song dynasty?", "back": "960–1279 CE"}, {"front": "What is the specific timeframe given for the philosopher Xunzi?", "back": "310–235 BCE"}, {"front": "Zhu Xi's synthesis integrated Confucian ethics with what other philosophical component?", "back": "A metaphysical account of reality"}, {"front": "In which three regions outside of China did Zhu Xi's synthesis become the official state philosophy?", "back": "Korea, Vietnam, and Japan"}, {"front": "Scholars in which three locations primarily developed New Confucianism in the 20th century?", "back": "China, Taiwan, and Hong Kong"}, {"front": "Beyond ethics, what third major area does New Confucianism attempt to engage with besides Western philosophy and democracy?", "back": "Science"}, {"front": "According to the text, Confucianism is not a fixed system but has evolved through major phases in response to what?", "back": "Intellectual and historical challenges"}, {"front": "In the Mencius vs. Xunzi debate, they disagreed about what humans are cultivating _____, but agreed that they must cultivate.", "back": "Toward"}, {"front": "The phrase 'Xin Rujia' refers to which historical phase of Confucian thought?", "back": "New Confucianism"}, {"front": "Neo-Confucianism was the official state philosophy of multiple countries for how long?", "back": "Several centuries"}, {"front": "In modern Korea, students still visit _____ scattered across the countryside for Confucian education.", "back": "Seowon (Confucian academies)"}, {"front": "Which philosopher taught that human nature is chaotic and virtue must be 'imposed'?", "back": "Xunzi"}, {"front": "Mencius believed that moral judgment is an _____ quality in humans.", "back": "Innate"}, {"front": "Zhu Xi's work is described as a _____ of Confucian ethics and other metaphysical elements.", "back": "Synthesis"}, {"front": "True or False: New Confucianism is primarily concerned with returning to purely Classical practices without Western influence.", "back": "False"}, {"front": "Which regional code of conduct was influenced by Neo-Confucianism in Japan?", "back": "Bushido"}, {"front": "New Confucianism seeks to reconcile Confucianism with the Western value of _____ rights.", "back": "Individual"}, {"front": "What intellectual field did the Neo-Confucian philosophers Cheng Yi and Cheng Hao help develop?", "back": "Neo-Confucianism"}, {"front": "Social harmony is cited as a Confucian value that might be compatible with which political system?", "back": "Democracy"}, {"front": "The 'Joseon dynasty' is associated with which modern-day country's Confucian history?", "back": "Korea"}, {"front": "Which period in Japanese history utilized Neo-Confucianism in its education system?", "back": "Tokugawa period"}, {"front": "Classical Confucianism focused on ethics and governance, while Buddhism offered _____.", "back": "Metaphysical accounts of reality"}, {"front": "What was the duration of the Classical period of Confucianism?", "back": "Roughly 7 centuries"}, {"front": "Who is the 'great successor' to Confucius mentioned alongside Mencius and Xunzi?", "back": "Mencius"}, {"front": "One major argument for reforming Confucianism is its historical treatment of what group?", "back": "Women"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
