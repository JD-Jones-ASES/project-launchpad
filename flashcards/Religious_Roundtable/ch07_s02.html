<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary question that serves as the starting point for Confucianism?", "back": "How should human beings treat each other?"}, {"front": "Instead of theology or the afterlife, what is the central focus of Confucian thought?", "back": "The ethics of human relationships and social conduct."}, {"front": "Term: ren", "back": "Definition: The supreme Confucian virtue representing benevolence, humaneness, or compassion."}, {"front": "Why is ren considered a \"quality of character\" rather than just a transient feeling?", "back": "It is an inner disposition where a person's every action reflects a genuine care for others."}, {"front": "What is the formulation of the Golden Rule found in the Analects (12.2)?", "back": "Do not impose on others what you yourself do not want."}, {"front": "Through which three activities is the virtue of ren primarily cultivated?", "back": "Education, self-reflection, and the performance of ritual."}, {"front": "Term: li", "back": "Definition: Ritual propriety, or the proper forms of conduct for social situations."}, {"front": "How does the performance of li (ritual) interact with a person's inner feelings?", "back": "The outward form and the inner feeling educate and strengthen each other."}, {"front": "Give an example of a social interaction governed by li.", "back": "Greeting an elder (or setting a table/mourning the dead)."}, {"front": "Term: yi", "back": "Definition: Righteousness or moral rightness; the ability to discern and do what is right."}, {"front": "In the triad of ren, li, and yi, which virtue serves as the \"emotional core\"?", "back": "ren"}, {"front": "In the triad of ren, li, and yi, which virtue represents the \"outward form\" of conduct?", "back": "li"}, {"front": "In the triad of ren, li, and yi, which virtue provides the \"practical wisdom\" for application?", "back": "yi"}, {"front": "What does the virtue of yi require of a person in a difficult situation?", "back": "The courage to act on moral knowledge even when it is costly."}, {"front": "Term: zhengming", "back": "Definition: The \"rectification of names\"; the insistence that language must accurately track reality."}, {"front": "Why did Confucius believe the rectification of names was the first priority of authority?", "back": "Clarity of speech and thought are the necessary foundations for all other social reforms."}, {"front": "According to the principle of zhengming, what should a ruler be called if they act tyrannically?", "back": "A tyrant."}, {"front": "What is the consequence for a society that uses names dishonestly?", "back": "It loses the ability to think clearly about what is actually happening."}, {"front": "What is the specific goal of the social structure organized around the Five Relationships?", "back": "To achieve social harmony through the practice of virtue within fundamental human bonds."}, {"front": "Identify the Five Relationships defined in Confucianism.", "back": "Ruler/subject, father/son, husband/wife, elder brother/younger brother, and friend/friend."}, {"front": "In the ruler and subject relationship, what is the specific obligation of the ruler?", "back": "To govern with benevolence."}, {"front": "In the ruler and subject relationship, what is the specific obligation of the subject?", "back": "To obey with loyalty."}, {"front": "Term: xiao", "back": "Definition: Filial piety; the devotion and care for parents and ancestors."}, {"front": "Which of the Five Relationships is considered the foundation of all others?", "back": "Father and son."}, {"front": "In the father and son relationship, how is the father's duty described?", "back": "To nurture the son with love."}, {"front": "What is the shared characteristic of both roles in the husband and wife relationship?", "back": "Mutual care and duty."}, {"front": "In the relationship between brothers, what is the duty of the elder brother?", "back": "To guide the younger with affection."}, {"front": "In the relationship between brothers, how should the younger brother respond to the elder?", "back": "With respect."}, {"front": "Term: xin", "back": "Definition: Faithfulness; the virtue that governs the relationship between friends."}, {"front": "What distinguishes the friend/friend relationship from the other four relationships?", "back": "It is the only relationship among equals."}, {"front": "What does it mean for the Five Relationships to be \"mutual\"?", "back": "Both parties in the relationship have specific obligations to the other."}, {"front": "Under what condition does a father lose his claim to the son's filial piety?", "back": "If the father shows no love."}, {"front": "Under what condition does a ruler lose their claim to the subject's loyalty?", "back": "If the ruler governs tyrannically."}, {"front": "Instead of blind obedience, how does the text characterize the Confucian social structure?", "back": "A web of mutual care and accountability."}, {"front": "Which virtue is described as the primary means by which social harmony is maintained?", "back": "li (ritual propriety)"}, {"front": "According to zhengming, what should a ritual be called if performed without inner feeling?", "back": "It should not be called ritual."}, {"front": "What inner quality is the source from which all proper human relationships flow?", "back": "ren (benevolence)"}, {"front": "How does the text define the relationship between language, thought, and action?", "back": "Language shapes thought, and thought shapes action."}, {"front": "Cloze: In Confucian thought, _____ is the practical wisdom that knows how to apply ren and li in real life.", "back": "yi"}, {"front": "Cloze: The supreme virtue in Confucius's system is _____, often translated as humaneness.", "back": "ren"}, {"front": "Cloze: Devotion and care for parents and ancestors is known as _____.", "back": "xiao"}, {"front": "Cloze: The relationship between friends is governed by the virtue of _____.", "back": "xin"}, {"front": "Why is the rectification of names considered a foundational reform?", "back": "When names are wrong, everything built upon them becomes unstable."}, {"front": "What is the result of a person bowing respectfully to their parents according to the logic of li?", "back": "The person becomes someone who genuinely respects their parents through the act."}, {"front": "How does Confucianism view the role of a subject in relation to a ruler?", "back": "As an individual with obligations, not merely a pawn."}, {"front": "What is the primary method for cultivating the inner quality of ren?", "back": "The faithful performance of ritual (li)."}, {"front": "Which virtue involves the ability to discern what is right even when it is costly?", "back": "yi (righteousness)"}, {"front": "True or False: Confucianism prioritizes the structure of the cosmos over human interaction.", "back": "False"}, {"front": "In the father and son relationship, what is the son's specific duty?", "back": "To respond with xiao (filial piety)."}, {"front": "How are the obligations in the Five Relationships distributed across society?", "back": "Everyone, at every level, is accountable to everyone else."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
