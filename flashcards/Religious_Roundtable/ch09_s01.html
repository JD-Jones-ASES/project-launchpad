<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 9, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In Marx's philosophy, what is the claim that the economic organization of society determines everything else called?", "back": "Historical materialism"}, {"front": "According to historical materialism, what determines the nature of law, religion, and politics?", "back": "The economic base (how things are produced and who controls production)."}, {"front": "What collective term did Marx use for law, religion, art, and politics within a society?", "back": "The superstructure"}, {"front": "Whose interests does the superstructure generally serve?", "back": "The interests of whoever controls the economic base."}, {"front": "In Marx's analysis, why is religion considered the \"opiate of the masses\"?", "back": "It functions as a painkiller that makes people accept earthly suffering by promising future rewards."}, {"front": "Marx's term for the conflict between social classes with opposing economic interests is _____.", "back": "Class struggle"}, {"front": "According to the Communist Manifesto, what is the \"driving force of all history\"?", "back": "The history of class struggles."}, {"front": "List three examples of historical class oppositions mentioned by Marx and Engels.", "back": "Freeman and slave, patrician and plebeian, lord and serf."}, {"front": "What defines the conditions for the next historical era's conflict in Marxist theory?", "back": "The resolution of the previous era's class conflict."}, {"front": "What is the German term for the concept of alienation?", "back": "Entfremdung"}, {"front": "In which work, not published during his lifetime, did Marx fully develop the account of alienation?", "back": "The Economic and Philosophic Manuscripts of 1844."}, {"front": "In what year were the Economic and Philosophic Manuscripts of 1844 discovered?", "back": "1932"}, {"front": "Define the first dimension of alienation: alienation from the product.", "back": "The worker produces items they do not own, which are then sold against their interest."}, {"front": "Define the second dimension of alienation: alienation from the process.", "back": "Labor is repetitive, exhausting, and lacks creativity or fulfillment."}, {"front": "What is the third dimension of alienation in Marxist thought?", "back": "Alienation from species-being (Gattungswesen)."}, {"front": "Define the fourth dimension of alienation: alienation from other humans.", "back": "Capitalist competition sets workers against one another instead of building community."}, {"front": "What is the German term for \"species-being\"?", "back": "Gattungswesen"}, {"front": "What specific capacity does Marx believe distinguishes humans from animals?", "back": "The capacity for free, conscious, purposive creative activity."}, {"front": "How does Marx contrast the labor of a beaver building a dam with that of a human architect?", "back": "An architect envisions the house in their imagination before bringing it into reality."}, {"front": "Under industrial capitalism, labor becomes a _____, meaning it is something bought and sold like a thing.", "back": "Commodity"}, {"front": "What is the core mechanism of exploitation in Marx's analysis of capitalism?", "back": "Surplus value"}, {"front": "Define 'surplus value'.", "back": "The value created by workers beyond the wages they are paid."}, {"front": "If a worker produces goods worth \\160but is paid\\60, what is the surplus value?", "back": "\\100$"}, {"front": "Who captures the surplus value produced by the worker?", "back": "The capitalist"}, {"front": "Marx argued that exploitation is not an \"abuse\" of capitalism but its _____.", "back": "Fundamental logic"}, {"front": "What term describes workers' understanding of their situation and exploitation?", "back": "Class consciousness"}, {"front": "Marx predicted that as capital concentrated in fewer hands and the working class grew, revolution would become _____.", "back": "Inevitable"}, {"front": "In Marx's predicted revolution, the proletariat would overthrow which class?", "back": "The bourgeoisie"}, {"front": "What is the transitional state called where the government owns the economy on behalf of all?", "back": "Socialism"}, {"front": "What happens to the state in the final stage of a fully communist society?", "back": "It \"withers away.\""}, {"front": "What is the distribution principle of a fully communist society?", "back": "Each contributes according to ability; each receives according to need."}, {"front": "How did Marx's presentation of his predictions differ from mere \"hope\"?", "back": "He presented them as scientific predictions based on historical forces."}, {"front": "What are the three main characteristics of the final stage of communism?", "back": "Classless, stateless, and no private property."}, {"front": "In which stage does the working class control the state but social classes still exist?", "back": "Socialism"}, {"front": "How did Marx categorize most 20th-century Communist governments?", "back": "As socialist states still in transition."}, {"front": "What concept explains that the factory worker does not design products but merely repeats tasks?", "back": "Alienation from the process (or labor)."}, {"front": "Marx's philosophy is described as a system where each piece depends on the others; to understand one, you must see its _____.", "back": "Connections to the rest."}, {"front": "Why does a factory owner benefit from workers who pray for heaven rather than higher wages?", "back": "Religion encourages acceptance of current suffering in exchange for future rewards."}, {"front": "True or False: Surplus value is considered illegal theft within the capitalist legal system.", "back": "False (it is legally permitted but morally/economically exploitative)."}, {"front": "What happens to surplus value over time according to Marx?", "back": "It accumulates as capital."}, {"front": "According to Marx, what is the \"deepest expression of human nature\"?", "back": "Bringing an imagined concept into being through labor."}, {"front": "In the dimension of alienation from other humans, what logic replaces genuine community?", "back": "Competitive logic"}, {"front": "Which social class is defined as the owners of the means of production?", "back": "The bourgeoisie"}, {"front": "Which social class must sell its labor power to survive?", "back": "The proletariat"}, {"front": "According to the text, the resolution of class conflict in one era does what for the next?", "back": "Generates the conditions for the next conflict."}, {"front": "What was the consequence of the 100-year delay in publishing the 1844 Manuscripts?", "back": "Marxism was primarily understood through only political and economic lenses."}, {"front": "Under capitalism, the worker's labor, which should be human expression, instead becomes a _____.", "back": "Commodity"}, {"front": "Marx distinguishes between \"theft in a legal sense\" and \"_____ in an economic and moral sense.\"", "back": "Exploitation"}, {"front": "What two factors regarding the proletariat's status contribute to the inevitability of revolution?", "back": "They grow larger and more impoverished."}, {"front": "In a transitional socialist state, who manages the economy?", "back": "The government (on behalf of all)."}, {"front": "What is the defining feature of a communist society regarding private property?", "back": "Private property is abolished."}, {"front": "The claim that the economic base determines the superstructure is the core of which theory?", "back": "Historical materialism"}, {"front": "Why is factory labor described as degrading to human quality in the context of species-being?", "back": "It is repetitive and meaningless rather than creative and purposive."}, {"front": "What is the relationship between surplus value and capitalist profit?", "back": "Surplus value is the source of capitalist profit."}, {"front": "In the Economic and Philosophic Manuscripts of 1844, Marx is revealed as a more _____ thinker.", "back": "Philosophically ambitious"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
