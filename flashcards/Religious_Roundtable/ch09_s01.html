<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 9, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What major historical event was \"remaking Europe\" during Karl Marx's birth in 1818?", "back": "The Industrial Revolution.", "id": "fc01"}, {"front": "Describe the harsh working conditions prevalent in industrial Europe that significantly influenced Karl Marx's ideas.", "back": "Millions of people were pulled from farms into cities, working long hours (e.g., children as young as six working fourteen-hour shifts). Workers faced dangerous conditions (e.g., collapsing mines) and were easily replaced if injured, while factory owners grew wealthy.", "id": "fc02"}, {"front": "Who was Karl Marx?", "back": "A German philosopher, economist, and political theorist (1818–1883); co-author of The Communist Manifesto (1848) with Friedrich Engels, and sole author of Das Kapital (1867).", "id": "fc03"}, {"front": "Name two major works associated with Karl Marx.", "back": "The Communist Manifesto (co-authored with Engels) and Das Kapital.", "id": "fc04"}, {"front": "Which German philosopher's ideas about history influenced Marx, particularly his concept of conflict driving historical change?", "back": "Georg Wilhelm Friedrich Hegel.", "id": "fc05"}, {"front": "What was the key difference between Hegel's and Marx's explanation for what drives history?", "back": "Hegel believed history was driven by ideas and the development of mind. Marx argued it was driven by concrete material conditions: who owned land, factories, and who had to sell their labor to survive.", "id": "fc06"}, {"front": "Who was Friedrich Engels, and what was his unique perspective on industrial capitalism?", "back": "A German socialist (1820–1895) and son of a successful factory owner. He had firsthand knowledge of industrial capitalism from the employer's side, which horrified him, leading him to document its brutality.", "id": "fc07"}, {"front": "What book did Engels write in 1845, detailing the severe conditions of industrial life?", "back": "The Condition of the Working Class in England.", "id": "fc08"}, {"front": "What crucial role did Friedrich Engels play in Karl Marx's life and work?", "back": "Engels financially supported Marx's family through years of poverty in London and prepared the second and third volumes of Das Kapital for publication after Marx's death.", "id": "fc09"}, {"front": "Define \"historical materialism\" as a central concept in Marx's theory.", "back": "Marx's theory that history is driven by material economic conditions—who owns what, how goods are produced, and how that production is organized—rather than by ideas, God's will, or great individuals.", "id": "fc10"}, {"front": "According to historical materialism, what is the relationship between society's \"economic base\" and its \"superstructure\"?", "back": "The 'economic base' (material economic conditions) shapes everything else, which Marx called the 'superstructure' (law, politics, religion, art, philosophy).", "id": "fc11"}, {"front": "When was The Communist Manifesto published, and by whom was it commissioned?", "back": "It was published in February 1848, commissioned by the Communist League, a small organization of European radicals.", "id": "fc12"}, {"front": "What was the \"stark central claim\" of The Communist Manifesto regarding human history?", "back": "All of human history is the history of class struggle.", "id": "fc13"}, {"front": "In Marxist terminology, define the \"bourgeoisie.\"", "back": "The class that owns the means of production (factories, land, machinery, capital); they employ workers but do not perform physical labor.", "id": "fc14"}, {"front": "In Marxist terminology, define the \"proletariat.\"", "back": "The working class; those who own no means of production and must sell their labor to the bourgeoisie in order to survive.", "id": "fc15"}, {"front": "What is the etymological origin of the word \"proletariat\"?", "back": "It comes from the Latin 'proletarius,' referring to a citizen with no property, whose only contribution to the state was his children (proles).", "id": "fc16"}, {"front": "According to Marx, what is the ultimate destiny of the proletariat?", "back": "The proletariat is destined to overthrow the capitalist order and liberate all humanity.", "id": "fc17"}, {"front": "Name three historical Communist revolutions mentioned in the text.", "back": "The Russian Revolution (1917) under Vladimir Lenin, the Chinese Communist Revolution (1949) under Mao Zedong, and Cuba's revolution (1959) under Fidel Castro.", "id": "fc18"}, {"front": "How did Vladimir Lenin adapt Marx's theory for the Russian Revolution?", "back": "He adapted Marx's theory for a peasant society that had not yet undergone full industrial capitalism.", "id": "fc19"}, {"front": "What significant challenge does the text highlight regarding the gap between Communist theory and practice?", "back": "The gap between Marx's theoretical predictions and the actual outcomes of real-world Communist governments, which often produced lethal systems of political repression that Marx himself neither predicted nor (his defenders argue) would have endorsed.", "id": "fc20"}, {"front": "Did Karl Marx live to see his theoretical predictions come true?", "back": "No, he died in 1883 without ever seeing any of his theoretical predictions come true.", "id": "fc21"}, {"front": "What were some personal challenges faced by Karl Marx and his family during their adult lives?", "back": "They lived in genuine poverty in London, and several of his children died young, partly due to their difficult living conditions.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
