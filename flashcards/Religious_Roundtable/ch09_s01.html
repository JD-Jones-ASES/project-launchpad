<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 9, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what year was Karl Marx born?", "back": "1818"}, {"front": "Which major economic transformation was remaking Europe during the year of Marx's birth?", "back": "The Industrial Revolution"}, {"front": "What demographic shift occurred as a result of 19th-century mills and factories?", "back": "Millions of people moved from farms into cities."}, {"front": "What was the typical shift length for children working in 19th-century cotton mills?", "back": "Fourteen hours"}, {"front": "What was the primary safety risk for coal miners mentioned in the text?", "back": "Shafts collapsing without warning"}, {"front": "How did factory owners typically handle workers who were injured by machinery?", "back": "They were simply replaced."}, {"front": "Karl Marx was born in which German city?", "back": "Trier"}, {"front": "What were the primary subjects Karl Marx studied at the university level?", "back": "Law and philosophy"}, {"front": "Which German philosopher's ideas on the rational unfolding of history heavily influenced Marx?", "back": "Georg Wilhelm Friedrich Hegel"}, {"front": "Why was Karl Marx eventually expelled from multiple European countries?", "back": "For his radical political writings"}, {"front": "In which city did Karl Marx spend most of his adult life?", "back": "London"}, {"front": "Who provided the primary financial support for Karl Marx and his family?", "back": "Friedrich Engels"}, {"front": "What was the title of the major work published by Marx in 1867?", "back": "Das Kapital"}, {"front": "According to Hegel, history is driven by the development of the mind and _____.", "back": "Ideas"}, {"front": "In contrast to Hegel, what did Marx believe was the true driver of history?", "back": "Concrete material conditions and labor relations"}, {"front": "What was the title of Friedrich Engels' 1845 book documenting industrial poverty?", "back": "The Condition of the Working Class in England"}, {"front": "In which English city did Engels observe the clinical details of industrial capitalism?", "back": "Manchester"}, {"front": "In what year did Marx and Engels first meet and begin their collaboration?", "back": "1844"}, {"front": "Who prepared the second and third volumes of 'Das Kapital' for publication after Marx's death?", "back": "Friedrich Engels"}, {"front": "Term: Historical Materialism", "back": "Definition: Marx's theory that history is driven by material economic conditions rather than ideas or divine will."}, {"front": "According to Marx, what determines human consciousness?", "back": "Social existence"}, {"front": "In Marxist theory, what term refers to the economic base's influence on law, politics, and religion?", "back": "The superstructure"}, {"front": "Which organization commissioned the writing of 'The Communist Manifesto' in 1847?", "back": "The Communist League"}, {"front": "In what month and year was 'The Communist Manifesto' published?", "back": "February 1848"}, {"front": "According to 'The Communist Manifesto', the history of all hitherto existing society is the history of _____.", "back": "Class struggle"}, {"front": "Term: Bourgeoisie", "back": "Definition: The class that owns the means of production and employs workers but does not perform physical labor."}, {"front": "How did the wealth of the bourgeoisie differ from that of the older aristocracy?", "back": "Bourgeois wealth came from capital and factories rather than land and inheritance."}, {"front": "Term: Proletariat", "back": "Definition: The working class who own no means of production and must sell their labor to survive."}, {"front": "What is the Latin origin of the word 'proletariat'?", "back": "Proletarius, meaning a citizen whose only contribution to the state was his children."}, {"front": "Which class did Marx believe was destined to overthrow the capitalist order?", "back": "The proletariat"}, {"front": "Which 1917 event brought Vladimir Lenin and the Bolsheviks to power?", "back": "The Russian Revolution"}, {"front": "How did Vladimir Lenin adapt Marx's theory for the Russian context?", "back": "He applied it to a peasant society that had not yet undergone full industrial capitalism."}, {"front": "Who led the 1949 Chinese Communist Revolution?", "back": "Mao Zedong"}, {"front": "Which country established the only Communist state in the Western Hemisphere to survive into the 21st century?", "back": "Cuba"}, {"front": "Who was the leader of the 1959 Cuban Revolution?", "back": "Fidel Castro"}, {"front": "What is a major criticism regarding the real-world practice of Communist governments?", "back": "They often produced systems of extreme political repression."}, {"front": "How many of Marx's theoretical predictions had come true by the time of his death in 1883?", "back": "None"}, {"front": "What tragic personal outcome did Marx's poverty in London have on his family?", "back": "Several of his children died young due to difficult living conditions."}, {"front": "According to Hegel, what logic governs the transition from one historical era to the next?", "back": "Contradiction and resolution"}, {"front": "The 'economic base' of society is defined by how goods are produced and how that production is _____.", "back": "Organized"}, {"front": "What were the three specific classes mentioned as historical antagonists in 'The Manifesto'?", "back": "Masters vs. slaves, lords vs. serfs, and bourgeoisie vs. proletariat."}, {"front": "Which 1848 event occurred just weeks after 'The Communist Manifesto' was published?", "back": "Revolutions broke out across Europe."}, {"front": "What was the profession of Karl Marx's father?", "back": "Lawyer"}, {"front": "Marx's family converted from Judaism to which religion?", "back": "Christianity"}, {"front": "What role did Friedrich Engels' father play in the industrial system?", "back": "He was a successful factory owner."}, {"front": "Describe the prose style of 'The Communist Manifesto'.", "back": "It was written with hammer-like directness."}, {"front": "In Marxist terminology, what are factories, land, and machinery collectively called?", "back": "Means of production"}, {"front": "What does the Latin word 'proles' mean?", "back": "Children"}, {"front": "Which group is described by Marx as the 'most oppressed class'?", "back": "The proletariat"}, {"front": "According to the text, what is one of the most difficult questions in 20th-century history?", "back": "The gap between Communist theory and Communist practice."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
