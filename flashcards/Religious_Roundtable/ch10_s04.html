<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 10, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What common historical figure is shared as the origin point for the three traditions discussed in the text?", "back": "Abraham"}, {"front": "According to the text, what is the core commonality in how the three traditions view the relationship between God and humanity?", "back": "God speaks to humanity."}, {"front": "On what specific entity does Christianity center its account of divine revelation?", "back": "A person (Jesus Christ)."}, {"front": "In the Christian tradition, revelation is not merely a message or scripture, but the event where God became a _____.", "back": "human being"}, {"front": "What is the supreme act of faith for a Christian?", "back": "Trusting in the person of Jesus Christ and the event of the Incarnation."}, {"front": "What is the Greek term for 'faith' used in the Christian context of the text?", "back": "pistis"}, {"front": "How is the nature of 'pistis' (faith) described in Christianity relative to the individual?", "back": "It is personal and relational."}, {"front": "In the Christian model of faith, what is the temporal relationship between 'pistis' and full understanding?", "back": "Faith precedes full understanding."}, {"front": "On what specific concept does Judaism center its account of revelation?", "back": "A practice."}, {"front": "In Judaism, what is the primary content of the revelation given at Sinai?", "back": "The Torah (God's word)."}, {"front": "What is the primary purpose of the Torah for the Jewish people?", "back": "To provide instruction for living as God's covenant people."}, {"front": "How does Judaism define the appropriate human response to the Torah?", "back": "Doing and embodying it in the rhythms of daily life."}, {"front": "According to the text, when did revelation end in the Jewish tradition?", "back": "It did not end; it continues in every generation."}, {"front": "Through what activity does revelation continue in Judaism after the event at Sinai?", "back": "Through rabbinic interpretation, argument, and wrestling with the text."}, {"front": "On what specific concept does Islam center its account of revelation?", "back": "A recitation."}, {"front": "In Islam, what is the Quran's relationship to God's speech?", "back": "It is God's direct, verbatim, and final speech to humanity."}, {"front": "Through whom was the recitation of the Quran transmitted?", "back": "The prophet Muhammad."}, {"front": "In what language is the Quran said to be perfectly preserved?", "back": "Arabic"}, {"front": "What is the Arabic term for 'faith' as used in the Islamic context of the text?", "back": "iman"}, {"front": "What specific act marks the beginning of 'iman' (faith) in Islam?", "back": "The declaration of the Shahada."}, {"front": "How is 'iman' primarily expressed in the life of a Muslim?", "back": "Through the Five Pillars."}, {"front": "Contrast the Islamic expression of faith with 'intellectual assent.'", "back": "Faith is a structured, disciplined life of practice rather than just mental agreement."}, {"front": "According to the text, what is a primary point of disagreement among the three traditions regarding divine speech?", "back": "How God speaks (person vs. practice vs. recitation)."}, {"front": "The three traditions disagree on whether earlier revelations remain _____ or have been superseded.", "back": "authoritative"}, {"front": "How does the text describe the feeling of a member of one tradition reading the scriptures of another?", "back": "Like encountering a family member and a stranger at the same time."}, {"front": "Besides history and politics, what deeper dimension characterizes the tension between the three traditions?", "back": "Philosophical"}, {"front": "What is the central philosophical problem raised by the differences in revelation if they all originate from the same God?", "back": "How to account for the differences in how God spoke or how humans heard."}, {"front": "Term: Torah", "back": "Definition: The word of God given at Sinai providing instruction for covenant life."}, {"front": "Term: Shahada", "back": "Definition: The Islamic declaration that marks the beginning of faith (iman)."}, {"front": "Term: Five Pillars", "back": "Definition: The core set of practices through which faith is expressed in Islam."}, {"front": "How does the Jewish view of 'doing' compare to the Islamic view of 'practice'?", "back": "Both emphasize action over mere belief, though through different frameworks (covenant rhythms vs. structured pillars)."}, {"front": "In the Islamic view, the Quran is the _____ speech of God to humanity, meaning no further revelation is expected.", "back": "final"}, {"front": "What does the text suggest about the 'nature of revelation itself' in its concluding questions?", "back": "It may resist simple"}, {"front": "For a Christian, the object of faith (Jesus) is described as being _____ toward the believer.", "back": "relational"}, {"front": "In Judaism, what role does 'wrestling with the text' play in the concept of revelation?", "back": "It is how revelation continues through generations of rabbinic interpretation."}, {"front": "In the comparison of the three, which tradition identifies revelation as a verbatim recitation?", "back": "Islam"}, {"front": "In the comparison of the three, which tradition identifies revelation as a practice or way of living?", "back": "Judaism"}, {"front": "In the comparison of the three, which tradition identifies revelation as an incarnate person?", "back": "Christianity"}, {"front": "How does the text characterize the Christian approach to 'understanding' in relation to faith?", "back": "Faith is not dependent on waiting for full understanding; it comes first."}, {"front": "What is the primary mode of transmission for the Quran according to Islamic belief?", "back": "Transmission through the prophet Muhammad."}, {"front": "The text poses a theory that if the revelations differ, it might be because human beings _____.", "back": "heard imperfectly"}, {"front": "In Islam, faith is described as a life oriented toward God that is both structured and _____.", "back": "disciplined"}, {"front": "How does Judaism describe the appropriate embodiment of revelation?", "back": "In the rhythms of daily life."}, {"front": "Which tradition views revelation as an ongoing process of interpretation rather than a finished event at a single point in history?", "back": "Judaism"}, {"front": "True or False: The text suggests that the differences between the traditions are solely political.", "back": "False (they are also deeply philosophical)."}, {"front": "What is the defining characteristic of the Quran's preservation in Islamic tradition?", "back": "It is preserved perfectly in Arabic."}, {"front": "In Christianity, faith is primarily oriented toward _____.", "back": "Jesus Christ"}, {"front": "What does 'covenant people' refer to in the context of Jewish revelation?", "back": "The community for whom the Torah provides instruction on how to live."}, {"front": "The Islamic term 'iman' is contrasted against what specific type of 'assent'?", "back": "Intellectual assent."}, {"front": "According to the final paragraph, what is a potential conclusion regarding the nature of divine communication?", "back": "That it resists simple"}, {"front": "What are the three specific 'responses' to revelation mentioned in the comparison paragraph?", "back": "Trust, doing, and submission."}, {"front": "Which specific tradition's response is characterized as 'trust'?", "back": "Christianity"}, {"front": "Which specific tradition's response is characterized as 'doing'?", "back": "Judaism"}, {"front": "Which specific tradition's response is characterized as 'submission'?", "back": "Islam"}, {"front": "What is the core tension for a believer of one of these faiths encountering the others?", "back": "Accounting for how the same God could provide such different accounts of revelation."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
