<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Christian doctrine of the Trinity?", "back": "The Christian doctrine that God is three distinct persons—Father, Son, and Holy Spirit—who together constitute one divine being.", "id": "fc01"}, {"front": "How do Christians describe the nature of the relationship within the single divine being of the Trinity?", "back": "Within the single divine being, there is relationship, communication, and love among the three distinct persons (Father, Son, and Holy Spirit).", "id": "fc02"}, {"front": "What is the primary role of the Father in the Trinity?", "back": "The Father is the creator and sustainer of all things.", "id": "fc03"}, {"front": "Who is the Son in the Trinity and what is his significance?", "back": "The Son is Jesus Christ, who entered human history.", "id": "fc04"}, {"front": "What is the role of the Holy Spirit for believers?", "back": "The Holy Spirit is the continuing divine presence that guides and empowers believers.", "id": "fc05"}, {"front": "How do Christians view human capacity to fully comprehend the Trinity?", "back": "Christians have always admitted that the Trinity is a mystery that exceeds full human comprehension.", "id": "fc06"}, {"front": "Define the Christian doctrine of the Incarnation.", "back": "The belief that the eternal Son of God took on a fully human nature in the person of Jesus Christ, being born of the Virgin Mary.", "id": "fc07"}, {"front": "What startling claim does Christianity make about the nature of Jesus Christ?", "back": "Christianity insists that Jesus was fully human and fully divine at the same time.", "id": "fc08"}, {"front": "What implications does the Incarnation have for God's engagement with human life?", "back": "It implies that the infinite God entered finite human life, experiencing birth, growth, fatigue, grief, and ultimately death, without merely disguising himself or observing.", "id": "fc09"}, {"front": "According to Christians, what fundamental question does the Incarnation answer?", "back": "The Incarnation answers the question: 'How far would God go to reach humanity?' Christians believe the answer is 'all the way.'", "id": "fc10"}, {"front": "How does Christianity define sin?", "back": "Any thought, word, or deed that turns a person away from God and toward self—an act of separation from the source of life and goodness.", "id": "fc11"}, {"front": "What is the Christian concept of 'original sin' and its effect on human nature?", "back": "Christians believe the first humans disobeyed God, introducing a rupture into human nature itself, inclining humans toward selfishness, pride, and injustice.", "id": "fc12"}, {"front": "Why do Christians believe an 'outside intervention' was necessary to address sin?", "back": "Because the rupture in human nature caused by sin is so deep that no human effort alone can fix it; humans are like sick doctors who cannot heal themselves.", "id": "fc13"}, {"front": "What is the Christian belief concerning the Resurrection of Jesus?", "back": "Christians believe that Jesus, after his crucifixion and burial, rose bodily from the dead on the third day, not as a ghost or vision, but in a transformed physical body.", "id": "fc14"}, {"front": "Why is the Resurrection considered the central event in Christian faith and history?", "back": "It is taken as evidence that death itself has been defeated, that the separation between God and humanity introduced by sin has been overcome, and it is the basis of Christian hope for human transformation and restoration.", "id": "fc15"}, {"front": "Define 'grace' in Christian theology.", "back": "God's freely given, unearned love and favor, which enables human beings to be forgiven and restored to relationship with God.", "id": "fc16"}, {"front": "What is 'salvation' in Christian terms?", "back": "Being made right with God and ultimately participating in eternal life.", "id": "fc17"}, {"front": "How do most Christian traditions teach that salvation is achieved?", "back": "Salvation is a gift from God, not something human beings can achieve through their own good behavior or religious effort.", "id": "fc18"}, {"front": "What is the Christian understanding of 'faith'?", "back": "Faith is a trust and reliance on what God has done in Christ, serving as the human response to God's initiative of grace.", "id": "fc19"}, {"front": "How do Christians reconcile salvation by grace through faith with the importance of good behavior?", "back": "While salvation is a gift not earned by behavior, genuine faith is expected to produce genuine change and good works; the change follows the gift, it does not earn it.", "id": "fc20"}, {"front": "What common analogy is sometimes used to describe the Trinity, and why does the text suggest it ultimately fails?", "back": "A triangle (three sides, one shape) is sometimes used. It fails because the Trinity involves distinct persons in relationship within a single divine being, which a simple geometric shape cannot fully capture.", "id": "fc21"}, {"front": "Beyond individual humans, what does the text indicate is affected by the weight of sin?", "back": "The text states that 'the entire creation groans under this weight,' suggesting sin's impact extends to the broader world and not just humanity.", "id": "fc22"}, {"front": "What examples does the text provide to illustrate Jesus' fully human experiences during the Incarnation?", "back": "Jesus was born, grew up, got tired, felt grief, and ultimately died, showcasing his full engagement with human life.", "id": "fc23"}, {"front": "How does the Christian understanding of Jesus' bodily Resurrection differ from a mere spiritual apparition?", "back": "Christians believe Jesus rose 'bodily' in a 'transformed physical body,' implying a concrete and physical, though changed, existence, rather than just a ghost or vision.", "id": "fc24"}, {"front": "From a Christian perspective, what does the necessity of God becoming human and suffering on the cross to save humanity suggest about the relationship between love, justice, and power?", "back": "It suggests that God's love is so profound it goes 'all the way' to identify with humanity's plight, and that divine justice requires a full, personal address of sin's rupture, with power expressed through sacrificial love rather than mere decree.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
