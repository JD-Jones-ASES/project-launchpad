<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does the founding of Hinduism differ from most other major religions?", "back": "It has no single founder, prophet, or decisive founding moment."}, {"front": "What is the approximate historical depth of the religious life that constitutes Hinduism?", "back": "More than three thousand years."}, {"front": "Name the two major cities of the Indus Valley Civilization mentioned as sources of archaeological evidence.", "back": "Mohenjo-daro and Harappa."}, {"front": "The Indus Valley Civilization flourished during which time period?", "back": "$2500-1900$ BCE."}, {"front": "What archaeological feature of Indus Valley cities suggests an ancient concern with purity?", "back": "Ritual bathing pools."}, {"front": "Why is it currently impossible to know the specific prayers of the Indus Valley people?", "back": "Their script cannot be read by modern scholars."}, {"front": "Which major Hindu deity is potentially linked to figurines and symbols found in the Indus Valley?", "back": "Shiva."}, {"front": "From which geographic region did the Aryans migrate into the Indian subcontinent?", "back": "Central Asia."}, {"front": "The Aryan migration into the Indian subcontinent occurred around what year?", "back": "$1500$ BCE."}, {"front": "What was the primary economic lifestyle of the Aryan people who migrated to India?", "back": "Cattle-herding."}, {"front": "What is the name of the ancient language brought to the Indian subcontinent by the Aryans?", "back": "Sanskrit."}, {"front": "The religious culture of the Aryans, centered on fire sacrifices, is known as the _____ religion.", "back": "Vedic"}, {"front": "What is the Sanskrit term for the fire sacrifices performed in the Vedic religion?", "back": "Yajnas."}, {"front": "Which specialized group of priests performed the ritual fire sacrifices in the Vedic tradition?", "back": "Brahmins."}, {"front": "In the Vedic pantheon, what is the domain of the god Indra?", "back": "Thunder and war."}, {"front": "Which Vedic god is associated with cosmic order?", "back": "Varuna."}, {"front": "In the Vedic pantheon, who is the god of fire?", "back": "Agni."}, {"front": "What is the name of the earliest layer of Hindu scripture?", "back": "The Vedas."}, {"front": "Hinduism is described as a blend of which two ancient traditions?", "back": "The Indus Valley Civilization and the Aryan Vedic religion."}, {"front": "The philosophical shift in Hinduism occurred during which approximate time period?", "back": "$800-200$ BCE."}, {"front": "What are the philosophical texts composed by rishis between $800$ and $200$ BCE called?", "back": "The Upanishads."}, {"front": "What does the term 'rishis' literally mean?", "back": "Seers or sages."}, {"front": "How did the focus of the Upanishads differ from earlier Vedic practice?", "back": "They shifted from ritual correctness to deep philosophical questions about reality and the self."}, {"front": "Which global era produced the Upanishads, the Buddha, Confucius, and Greek philosophers?", "back": "The Axial Age."}, {"front": "Name the two great epics that contributed to the development of Hindu tradition.", "back": "The Mahabharata and the Ramayana."}, {"front": "The rise of _____ (devotional) movements occurred during the first millennium CE.", "back": "bhakti"}, {"front": "Besides Islamic culture, which two Indian philosophies influenced the development of Hinduism?", "back": "Buddhist and Jain philosophy."}, {"front": "Which historical period in India lasted from $1526$ to $1857$ and brought encounters with Islamic culture?", "back": "The Mughal period."}, {"front": "Which 19th-century reformer engaged with Western science while reaffirming Hindu tradition?", "back": "Swami Vivekananda."}, {"front": "The category 'Hinduism' was constructed in part by which colonial group?", "back": "British colonial officials."}, {"front": "What was the original Persian meaning of the word 'Hindu'?", "back": "The people of the Indus river region."}, {"front": "Name a specific sectarian identity that a practitioner might use instead of the generic label 'Hindu'.", "back": "Vaishnava (or Shaiva/Shakta)."}, {"front": "Practitioners who specifically identify with the worship of Shiva are called _____.", "back": "Shaivas"}, {"front": "Practitioners who specifically identify with the worship of the Goddess are called _____.", "back": "Shaktas"}, {"front": "Sanskrit is the ancestor of which modern South Asian languages?", "back": "Hindi, Bengali, and Nepali."}, {"front": "The Sanskrit word 'deva' (god) is a distant relative of which Latin word?", "back": "Deus."}, {"front": "The English word 'divine' shares a linguistic root with which Sanskrit word?", "back": "Deva."}, {"front": "Why is Hinduism described as a 'family of traditions' rather than a monolith?", "back": "It is held together by shared texts and vocabulary despite its enormous internal variety."}, {"front": "Indus Valley cities were known for advanced _____ systems and granaries.", "back": "drainage"}, {"front": "What was the primary method of passing down the hymns and rituals of the Aryans?", "back": "A rich oral tradition."}, {"front": "Which Vedic god is specifically designated as the god of thunder?", "back": "Indra."}, {"front": "The Upanishads sought to explore the relationship between the _____ and the universe.", "back": "individual"}, {"front": "The term 'Hindu' was originally used to describe people based on their _____ rather than their religion.", "back": "geography (or region)"}, {"front": "Which religion's prophets were active during the same 'Axial Age' as the authors of the Upanishads?", "back": "Hebrew."}, {"front": "What is the primary scriptural source for the hymns of the Vedic religion?", "back": "The Vedas."}, {"front": "Archaeologists use the presence of what structures in Mohenjo-daro to suggest a concern with ritual purity?", "back": "Bathing pools."}, {"front": "In Sanskrit linguistics, what is the relationship between Sanskrit and languages like Latin and Greek?", "back": "They are distant relatives (cognates)."}, {"front": "The shift from Vedic sacrifice to Upanishadic inquiry is often called a 'profound _____ turn.'", "back": "philosophical"}, {"front": "What did British colonial officials use the term 'Hindu' to represent?", "back": "Religious practices of the Indian subcontinent that were not Islam, Christianity, or Buddhism."}, {"front": "Which group of people is responsible for bringing the concept of 'yajnas' to India?", "back": "The Aryans."}, {"front": "How did Swami Vivekananda's reform efforts impact the modern perception of Hinduism?", "back": "He reaffirmed the tradition's depth while engaging with Western philosophy and science."}, {"front": "The Sanskrit word for 'god' is _____.", "back": "deva"}, {"front": "What was the purpose of the Vedic fire sacrifices?", "back": "To honor and propitiate nature gods."}, {"front": "Who were the primary targets of the British label 'Hindu' during the colonial era?", "back": "Anyone in the Indian subcontinent who was not Muslim, Christian, or Buddhist."}, {"front": "During which historical period did Hinduism encounter Islamic culture extensively?", "back": "The Mughal period ($1526-1857$)."}, {"front": "The philosophical texts that asked 'What is reality?' are the _____.", "back": "Upanishads"}, {"front": "The Indus Valley Civilization is also known for its location in northwestern India and modern-day _____.", "back": "Pakistan"}, {"front": "Which Sanskrit-derived language is primarily spoken in West Bengal?", "back": "Bengali."}, {"front": "Which Sanskrit-derived language is the national language of Nepal?", "back": "Nepali."}, {"front": "The Upanishads transitioned the religious focus from 'How do we perform the sacrifice?' to 'What is the _____?'", "back": "self (or reality)"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
