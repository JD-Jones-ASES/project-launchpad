<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In the Hindu tradition of the Upanishads, what is the term for the ultimate, infinite, and impersonal reality?", "back": "Brahman"}, {"front": "How does Brahman differ from a \"god among gods\"?", "back": "It is the ground of all being rather than a personal deity with intentions."}, {"front": "Brahman is described as the source from which everything arises and to which everything _____.", "back": "Returns"}, {"front": "Which metaphor is used to describe Brahman's relationship to the individual things in the world?", "back": "The ocean of which everything is a wave."}, {"front": "Besides the ocean and waves, what metaphor describes Brahman as the quiet origin of existence?", "back": "The silence in which all sound arises."}, {"front": "What three characteristics of Brahman indicate its relationship to time and boundaries?", "back": "Without beginning, without end, and without limit."}, {"front": "In Hindu philosophy, what is the term for the innermost self or individual soul of a human being?", "back": "Atman"}, {"front": "According to the deepest Hindu philosophy, what is the true nature of the atman?", "back": "It is ultimately identical with Brahman."}, {"front": "The atman is described as the \"universal self wearing the _____ of an individual.\"", "back": "Costume"}, {"front": "What is the English translation of the famous Sanskrit phrase \"Tat tvam asi\"?", "back": "That art thou"}, {"front": "What does the phrase \"Tat tvam asi\" signify regarding the relationship between the self and the universe?", "back": "The individual is not separate from the vast, infinite reality."}, {"front": "How does the text describe a human being's existence in relation to the universe?", "back": "The universe temporarily experiencing itself through a particular body and mind."}, {"front": "What term is used to describe the illusion or \"veil\" of separateness from Brahman?", "back": "Maya"}, {"front": "According to Hindu thought, what is the root of all human suffering?", "back": "Maya (the misidentification of the self with the individual personality)."}, {"front": "How do most people incorrectly experience themselves due to maya?", "back": "As separate, bounded, and individual creatures."}, {"front": "What term describes the cosmic and moral order that holds the universe together?", "back": "Dharma"}, {"front": "Besides being a cosmic principle, dharma is also a personal _____.", "back": "Obligation (or duty)"}, {"front": "What are the four primary factors that determine a person's specific dharma?", "back": "Nature, stage of life, gender, and social position."}, {"front": "What is the direct consequence of acting in alignment with dharma?", "back": "The production of good karma."}, {"front": "What does the Sanskrit word \"karma\" literally mean?", "back": "Action"}, {"front": "What is the law of moral cause and effect where every action generates consequences?", "back": "Karma"}, {"front": "When might the consequences of karma be experienced?", "back": "In the current life or in future lives."}, {"front": "In the Hindu understanding, karma is not a punishment from a judge, but a natural _____.", "back": "Moral structure"}, {"front": "To what physical law is karma compared to illustrate its consistent and impersonal nature?", "back": "The law of gravity"}, {"front": "Every _____ action generates karma, allowing individuals to shape their own future.", "back": "Intentional"}, {"front": "What is the term for the endless cycle of birth, death, and rebirth?", "back": "Samsara"}, {"front": "In the context of the \"Great Wheel,\" what is the vehicle through which karma operates across time?", "back": "Samsara"}, {"front": "How is life after death understood in Hinduism compared to a final destination?", "back": "It is a continuation of the journey rather than a final destination."}, {"front": "What three types of beings might a soul become in a future life based on its karma?", "back": "A human, an animal, or a god."}, {"front": "What is the ultimate goal of Hindu spiritual life?", "back": "Moksha"}, {"front": "What is the definition of Moksha?", "back": "Liberation from the cycle of samsara."}, {"front": "When does a soul achieve moksha?", "back": "When it recognizes its identity with Brahman."}, {"front": "How does Moksha differ from the Western concept of a pleasant afterlife (heaven)?", "back": "It is the complete dissolution of the illusion of separateness rather than a place."}, {"front": "What happens to the generation of karma once a person fully knows their self is Brahman?", "back": "There is no more karma to generate."}, {"front": "What metaphor does the text use for the soul's liberation during Moksha?", "back": "The wave returns to the ocean."}, {"front": "To what everyday experience do the Upanishads compare the realization of the atman's identity with Brahman?", "back": "Waking up from a dream."}, {"front": "What is the \"Great Wheel\" a metaphor for in Hindu belief?", "back": "The cycle of samsara."}, {"front": "Why is it impossible to pray to Brahman in the way one prays to a personal god?", "back": "Because Brahman is an impersonal reality without feelings or intentions."}, {"front": "What does it mean to \"align oneself with the structure of reality\" in Hindu ethics?", "back": "To act according to one's dharma."}, {"front": "In the cycle of samsara, what shapes the new bodies a soul takes on?", "back": "The karma accumulated in previous lives."}, {"front": "Brahman is described as the \"background against which all _____ occurs.\"", "back": "Experience"}, {"front": "Term: Maya", "back": "Definition: The misidentification of the self with individual personality; the illusion of separateness."}, {"front": "Concept: Dharma", "back": "Definition: The cosmic and moral order and the specific duties belonging to a being based on their nature and social position."}, {"front": "Is karma considered fate in the Hindu tradition?", "back": "No, it is a structure where you shape your own future through choice."}, {"front": "The Upanishads provide the most _____ answer to the question \"What is real?\"", "back": "Philosophically developed"}, {"front": "How is the universe described in relation to the individual's body and mind?", "back": "As experiencing itself through them."}, {"front": "What is the consequence of achieving moksha regarding the \"Great Wheel\"?", "back": "The wheel stops turning for that individual (rebirth ends)."}, {"front": "Which text tradition contains the core philosophical move identifying Atman with Brahman?", "back": "The Upanishads"}, {"front": "What is the primary motive behind the actions of those trapped in maya?", "back": "Pursuing their own pleasure and avoiding their own pain."}, {"front": "What ensures the universe stays together according to Hindu belief?", "back": "Dharma (as a cosmic principle)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
