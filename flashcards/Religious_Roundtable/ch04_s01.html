<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to the Upanishads, what is the one ultimate reality that underlies all changing appearances?", "back": "Brahman"}, {"front": "Term: Brahman", "back": "Definition: The ultimate, infinite, and impersonal reality that is the ground of all being."}, {"front": "How does Brahman differ from a typical 'god among gods'?", "back": "It is an impersonal reality rather than a person with feelings and intentions."}, {"front": "In the metaphor describing Brahman as an ocean, what represents individual existence?", "back": "A wave"}, {"front": "Brahman is described as the _____ in which all sound arises.", "back": "Silence"}, {"front": "Regarding its duration and boundaries, Brahman is described as being without _____.", "back": "Beginning, end, or limit"}, {"front": "Term: Atman", "back": "Definition: The innermost self or individual soul of a human being."}, {"front": "In the deepest Hindu philosophy, what is the relationship between Atman and Brahman?", "back": "They are ultimately identical."}, {"front": "The Atman is described as the universal self wearing the '_____' of an individual.", "back": "Costume"}, {"front": "What is the English translation of the famous Sanskrit phrase 'Tat tvam asi'?", "back": "That art thou."}, {"front": "The phrase 'Tat tvam asi' identifies the individual person with which reality?", "back": "The vast, infinite reality (Brahman)."}, {"front": "According to the Upanishads, you are not a fragment of the universe, but the universe experiencing itself through a specific _____.", "back": "Body and mind"}, {"front": "Term: Maya", "back": "Definition: The illusion or 'veil' that causes humans to misidentify the self with the individual personality."}, {"front": "What is considered the root of all human suffering in Hindu thought?", "back": "Maya (the misidentification of the self as separate from Brahman)."}, {"front": "How do individuals under the influence of 'maya' typically perceive themselves?", "back": "As separate, bounded, individual creatures."}, {"front": "Term: Dharma", "back": "Definition: The cosmic and moral order, encompassing the specific duties of a being."}, {"front": "To act according to dharma is to align oneself with the _____.", "back": "Structure of reality"}, {"front": "Dharma is both a cosmic principle of order and a _____.", "back": "Personal obligation"}, {"front": "Which three factors determine a person's specific duties (dharma)?", "back": "Stage of life, gender, and social position."}, {"front": "What is the immediate spiritual result of acting in accordance with dharma?", "back": "Good karma"}, {"front": "Term: Karma", "back": "Definition: The law of moral cause and effect where every action generates consequences."}, {"front": "Karma is described as a natural moral structure as consistent as the law of _____.", "back": "Gravity"}, {"front": "Unlike a punishment from an outside judge, karma is an _____ principle of the universe.", "back": "Impersonal"}, {"front": "What type of action is required to generate karma?", "back": "Intentional action"}, {"front": "Term: Samsara", "back": "Definition: The endless cycle of birth, death, and rebirth."}, {"front": "Samsara is often referred to as the '_____' of existence.", "back": "Great Wheel"}, {"front": "In the process of samsara, what shapes the new bodies a soul takes in future lives?", "back": "Accumulated karma"}, {"front": "How does the Hindu understanding of life after death differ from a 'final destination'?", "back": "It is viewed as a continuation of the journey through new bodies."}, {"front": "What types of beings might a soul become during the cycle of samsara?", "back": "Humans, animals, or gods."}, {"front": "Term: Moksha", "back": "Definition: Liberation from the cycle of samsara and the dissolution of the illusion of separateness."}, {"front": "What occurs when an individual soul (Atman) fully recognizes its identity with Brahman?", "back": "Moksha (liberation from rebirth)."}, {"front": "How does Moksha differ from the concept of a 'pleasant afterlife'?", "back": "It is the complete dissolution of the self's separateness rather than a place."}, {"front": "Once moksha is achieved, what happens to the generation of karma?", "back": "There is no more karma to generate."}, {"front": "The Upanishads compare the realization of one's identity as Brahman to _____ from a dream.", "back": "Waking up"}, {"front": "What Sanskrit word translates literally to 'action'?", "back": "Karma"}, {"front": "The 'ground of all being' is a", "back": "Brahman"}, {"front": "Why is Brahman not a deity that a Hindu would pray to?", "back": "It is an impersonal reality without feelings or intentions."}, {"front": "In Hindu philosophy, what serves as the 'background' against which all experience occurs?", "back": "Brahman"}, {"front": "According to the text, what is the ultimate goal every Hindu seeks, whether consciously or not?", "back": "Moksha"}, {"front": "What is the relationship between karma and fate in Hindu understanding?", "back": "Karma is not fate because it is shaped by individual choices rather than outside imposition."}, {"front": "The 'Great Wheel' is the vehicle through which _____ operates across time.", "back": "Karma"}, {"front": "Acting in accordance with one's social position and stage of life is the fulfillment of _____.", "back": "Dharma"}, {"front": "When a soul achieves moksha, it is compared to a wave returning to the _____.", "back": "Ocean"}, {"front": "What term describes the misidentification of the self with the individual personality?", "back": "Maya"}, {"front": "The source material identifies Brahman as the source from which everything arises and to which everything _____.", "back": "Returns"}, {"front": "Which specific Hindu texts provide the 'philosophically developed' answer regarding ultimate reality?", "back": "The Upanishads"}, {"front": "What describes the ethical and cosmic framework that organizes Hindu life?", "back": "Dharma"}, {"front": "How is the universe characterized in the context of Brahman's underlying reality?", "back": "Changing, multiplying, and bewildering."}, {"front": "By what mechanism does a soul transition from a human life to an animal life in Hindu belief?", "back": "The turning of the wheel of samsara based on karma."}, {"front": "Is karma considered a reward or punishment administered by a divine judge?", "back": "No, it is a natural moral consequence of the universe."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
