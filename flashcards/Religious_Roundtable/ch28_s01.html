<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 28, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central question explored in Cycle One of the text?", "back": "Faith (what we believe and how we know it)."}, {"front": "In the Christian tradition, faith is fundamentally described as trust in what?", "back": "A Person (the incarnate God)."}, {"front": "In Judaism, faith is considered inseparable from what kind of relationship?", "back": "A covenant relationship."}, {"front": "Which religious tradition defines the beginning of faith with the declaration \"la ilaha illallah\"?", "back": "Islam."}, {"front": "What is the central question explored in Cycle Two of the text?", "back": "Creation (where the world came from and what it is made of)."}, {"front": "In Hinduism, what term refers to the primordial unity from which all differentiation flows?", "back": "Brahman."}, {"front": "Which Hindu text is noted for its honest acknowledgement that even the gods may not know the origin of the world?", "back": "The Nasadiya Sukta."}, {"front": "By what conceptual process does the cosmos arise according to Buddhist thought?", "back": "Dependent origination."}, {"front": "Why does Buddhism decline to answer questions regarding a \"first cause\" of the universe?", "back": "It views the cosmos like a circle, which has no edge or starting point."}, {"front": "According to Taoism, what is the limitation of a Tao that can be spoken?", "back": "It is not the eternal Tao."}, {"front": "What is the central question explored in Cycle Three of the text?", "back": "The human person (what we are)."}, {"front": "According to Confucianism, humans are social creatures primarily constituted by their _____.", "back": "Relationships."}, {"front": "In the Confucian tradition, what does the term \"ren\" signify?", "back": "Benevolence."}, {"front": "In the Confucian tradition, what does the term \"li\" signify in the context of individual behavior?", "back": "Proper conduct."}, {"front": "In Norse Paganism, what material objects were the ancestors of humans?", "back": "Trees."}, {"front": "In Norse Paganism, what group is responsible for weaving the web of fate before a person's birth?", "back": "The Norns."}, {"front": "According to Norse Paganism, what is the only thing humans control in the face of fate?", "back": "Their character (courage and dignity)."}, {"front": "How does Communism primarily define the nature of a human being?", "back": "A productive being."}, {"front": "In Communism, what occurs when the system of production treats humans as instruments?", "back": "Estrangement (from work, others, and self)."}, {"front": "What is the central question explored in Cycle Four of the text?", "back": "Sacred texts (how ultimate truth reaches us)."}, {"front": "In the Jewish tradition, which text is metaphorically described as the \"seed\"?", "back": "The Torah."}, {"front": "In the Jewish tradition, which text represents centuries of interpretive growth from the Torah?", "back": "The Talmud."}, {"front": "What does the Hindu category of \"shruti\" signify?", "back": "Heard revelation (e.g., the Vedas)."}, {"front": "What does the Hindu category of \"smriti\" signify?", "back": "Remembered tradition (e.g., the epics and Gita)."}, {"front": "What was the Norse god of wisdom required to do for nine days to receive the runes?", "back": "Suffer on the tree Yggdrasil."}, {"front": "What is the central question explored in Cycle Five of the text?", "back": "Morality (how we should live and the source of ethics)."}, {"front": "Christian ethics are grounded in the \"double commandment\" to love which two entities?", "back": "God and neighbor."}, {"front": "What is the Taoist concept of acting in harmony with the \"grain of things\" without forcing?", "back": "Wu wei."}, {"front": "According to Communism, from what conditions is morality inseparable?", "back": "The material conditions of society."}, {"front": "In the Communist view, why is personal soul-justice impossible without structural economic change?", "back": "Because injustice is built into the structure of the economy."}, {"front": "What is the central question explored in Cycle Six of the text?", "back": "Community and worship (how we practice together)."}, {"front": "What term refers to the global Islamic community defined by shared submission to God?", "back": "The ummah."}, {"front": "In Buddhism, what are the \"Three Jewels\"?", "back": "The Buddha, the Dharma, and the Sangha."}, {"front": "What term defines the community of practitioners in the Buddhist tradition?", "back": "The Sangha."}, {"front": "In Confucianism, what is described as the \"architecture of community\" that makes trust visible?", "back": "Li (ritual)."}, {"front": "What is the central question explored in Cycle Seven of the text?", "back": "Suffering (why we suffer and if we can be freed)."}, {"front": "What Buddhist term refers to the \"craving\" or relentless wanting that causes suffering?", "back": "Tanha."}, {"front": "How does Norse Paganism characterize suffering in contrast to traditions seeking liberation?", "back": "As a condition to be faced (rather than a problem to be solved)."}, {"front": "What is the Norse mythic event where the gods age and eventually die?", "back": "Ragnarök."}, {"front": "According to the 'H'avam'al', what is the only thing that never dies?", "back": "The fame of a dead man's deeds."}, {"front": "In the Communist diagnosis, what is the root cause of human suffering?", "back": "A system built on exploitation."}, {"front": "What is the central question explored in Cycle Eight of the text?", "back": "Transcendence and immanence (is the divine beyond us or within us)."}, {"front": "While Islam insists on absolute transcendence, which of its traditions approaches God with intimacy?", "back": "Sufism."}, {"front": "In Hinduism, what does the term \"Brahman nirguna\" describe?", "back": "The featureless divine that is beyond"}, {"front": "In Hinduism, what does the term \"Brahman saguna\" describe?", "back": "The divine full of qualities and accessible to humans (e.g., Krishna)."}, {"front": "What is the central question explored in Cycle Nine of the text?", "back": "History and hope (where we are going)."}, {"front": "In Christianity, history is described as moving toward a specific _____.", "back": "Consummation (or Kingdom/judgment)."}, {"front": "What Jewish term refers to the Messianic hope of \"repairing\" the world?", "back": "Tikkun olam."}, {"front": "In Confucianism, who is the \"exemplary person\" used as a model for civilizational hope?", "back": "The junzi."}, {"front": "According to the text's conclusion, what is the primary goal of a successful education?", "back": "To deepen the questions rather than provide final answers."}, {"front": "Which cycle asks about the nature of sacred texts and how truth reaches us?", "back": "Cycle Four."}, {"front": "Which cycle asks about why humans suffer and the possibility of freedom?", "back": "Cycle Seven."}, {"front": "Which cycle asks about the origins and composition of the world?", "back": "Cycle Two."}, {"front": "In the context of the Nine Cycles, which tradition identifies the human person as a material creature embedded in fate?", "back": "Norse Paganism."}, {"front": "In the context of the Nine Cycles, which tradition views history as moving toward a civilizational ideal through self-discipline?", "back": "Confucianism."}, {"front": "The principle of \"wu wei\" is central to which tradition's account of morality?", "back": "Taoism."}, {"front": "Which tradition views sacred texts as being preserved by people who no longer believed in them?", "back": "Norse Paganism."}, {"front": "In Islam, the ummah is defined not by ethnicity or nation, but by shared _____.", "back": "Submission to God."}, {"front": "Which tradition diagnoses suffering as primarily structural rather than interior or cosmic?", "back": "Communism."}, {"front": "The concept of \"Brahman saguna\" allows the divine to be accessible in which specific form mentioned in the text?", "back": "Krishna."}, {"front": "In Judaism, the Messianic hope is described as running through _____.", "back": "This world."}, {"front": "Which tradition views the universe's origin as an \"unnamed\" mystery that cannot be spoken?", "back": "Taoism."}, {"front": "Which religious tradition grounds faith in a promise that runs through generations?", "back": "Judaism."}, {"front": "In the context of Cycle Six, what does ritual accomplish that words alone cannot in Confucianism?", "back": "Making trust and order visible."}, {"front": "According to the text, which tradition's view of the human person involves being trees given the gift of breath and warmth?", "back": "Norse Paganism."}, {"front": "Which cycle deals with the direction of time and whether it has a sea or a source?", "back": "Cycle Nine."}, {"front": "In the Christian account of morality, what gap does the tradition wrestle with?", "back": "The gap between the standard of love and the human ability to meet it."}, {"front": "In Buddhism, craving is described as a \"relentless wanting\" that makes what impossible?", "back": "Satisfaction."}, {"front": "The idea that suffering is the \"predictable output\" of a specific system is found in which tradition?", "back": "Communism."}, {"front": "Which tradition approach describes the divine as both \"everywhere and nowhere\"?", "back": "Taoism."}, {"front": "In Cycle One, what is the distinction drawn between faith and another state of mind?", "back": "Certainty."}, {"front": "In Norse Paganism, what quality is offered by the 'H'avam'al' as a response to suffering?", "back": "Courage."}, {"front": "Which tradition views history as a movement toward a \"judgment\"?", "back": "Christianity."}, {"front": "In the Jewish tradition of sacred texts, which text acts as the \"growth\" arising from the seed?", "back": "The Talmud."}, {"front": "How does Taoism describe the divine in relation to everything and beyond everything?", "back": "As a paradox."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
