<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 28, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What fundamental aspect of the 'great questions' remained constant throughout the nine cycles of study, and what changed?", "back": "The questions themselves never changed. What changed, radically and sometimes shockingly, were the answers provided by different traditions."}, {"front": "How does Christianity define faith?", "back": "For Christianity, faith is trust in a Person—the incarnate God who walked, ate, and died in human history."}, {"front": "What is the Jewish understanding of faith?", "back": "For Judaism, faith is inseparable from covenant relationship: you do not merely believe in God; you are bound to God through a promise that runs through generations."}, {"front": "How does Islam describe faith?", "back": "For Islam, faith begins with a single declaration—la ilaha illallah (there is no god but Allah)—and radiates outward into every corner of life."}, {"front": "In Hinduism, what is the primordial source of all differentiation according to the concept of creation?", "back": "Hinduism spoke of a primordial unity—Brahman—from which all differentiation flows, with the Nasadiya Sukta acknowledging that even the gods may not know the answer."}, {"front": "How does Buddhism address the question of creation and a first cause?", "back": "Buddhism declined the question, stating the cosmos arises by dependent origination; asking for a first cause is like asking for the edge of a circle."}, {"front": "What does Taoism identify as the origin of the world?", "back": "Taoism pointed to the unnamed: the Tao that can be spoken is not the eternal Tao."}, {"front": "How does Confucianism define the human person?", "back": "Confucianism answered: we are social creatures, constituted by our relationships, capable of ren (benevolence) and li (proper conduct) when we are at our best."}, {"front": "What is the Norse Pagan view of the human person and their control over destiny?", "back": "We are material creatures embedded in a web of fate. What we control is not our destiny but our character: the courage and dignity with which we face what has been given to us."}, {"front": "According to Communism, what happens to human beings when they are treated as instruments of the production system?", "back": "They become estranged—from their work, from each other, and from their own humanity."}, {"front": "How does Judaism view the interpretation of sacred texts?", "back": "Judaism showed a living tradition of interpretation—the Torah as seed, the Talmud as centuries of growth."}, {"front": "What are the two main layers of sacred texts in Hinduism?", "back": "Hinduism showed a layered archive: the shruti (heard revelation) of the Vedas giving rise to the smriti (remembered tradition) of the epics and Gita."}, {"front": "What is unique about how Norse Paganism's sacred texts were preserved?", "back": "Texts were preserved by people who no longer believed in them, and a myth exists where even the god of wisdom (Odin) had to suffer to receive the runes."}, {"front": "How does Christianity ground its ethical obligations?", "back": "Christianity grounded ethics in love—the double commandment to love God and neighbor—and wrestled with the gap between the standard and our ability to meet it."}, {"front": "What is 'wu wei' in Taoist morality?", "back": "Taoism counseled wu wei: do not force; act in harmony with the grain of things."}, {"front": "How does Communism link morality to societal conditions?", "back": "Communism argued that morality cannot be separated from the material conditions of society: you cannot have justice in your soul while injustice is built into the structure of your economy."}, {"front": "What is the 'ummah' in Islam?", "back": "The ummah is a community defined not by ethnicity or nation but by shared submission to God, observed through practices like five daily prayers facing the same direction."}, {"front": "What is the 'Sangha' in Buddhism, and what is its significance?", "back": "The Sangha is the community of practitioners, revered as one of the Three Jewels alongside the Buddha and Dharma."}, {"front": "How does Confucianism view 'li' in the context of community?", "back": "Confucianism offered li as the architecture of community itself: ritual is not decoration; it is how trust and order are made visible."}, {"front": "What is the Buddhist diagnosis for the root cause of suffering?", "back": "Buddhism diagnosed the root as tanha—craving, the relentless wanting that makes satisfaction impossible."}, {"front": "How does Norse Paganism view suffering?", "back": "Norse Paganism gave the starkest answer: suffering is not a problem to be solved but a condition to be faced, offering courage as a response to an inescapable fate."}, {"front": "Where does Communism locate the root cause of suffering?", "back": "Communism located the root outside the individual entirely: suffering is not a personal spiritual problem; it is the predictable output of a system built on exploitation."}, {"front": "How does Islam balance the absolute transcendence of Allah with intimacy?", "back": "Islam insisted on the absolute transcendence of Allah, then allowed the Sufi tradition to approach him with an intimacy that seems to contradict it."}, {"front": "Explain the concepts of Brahman nirguna and Brahman saguna in Hinduism.", "back": "Hinduism held both at once: Brahman nirguna (featureless, beyond description) and Brahman saguna (full of qualities, accessible as Krishna)."}, {"front": "How does Taoism describe the presence of the Tao?", "back": "Taoism named the paradox: the Tao is everywhere and nowhere, in everything and beyond everything."}, {"front": "What is the Christian view of history's direction and ultimate hope?", "back": "Christianity answered: yes—history is moving toward a consummation, a Kingdom, a judgment."}, {"front": "What is the Jewish perspective on Messianic hope and its relation to the world?", "back": "The Messianic hope is real, but it runs through this world—justice, repair (tikkun olam), return."}, {"front": "What kind of hope does Confucianism offer regarding society's future?", "back": "Confucianism offered a different kind of hope: not a cosmic ending but a civilizational ideal, the junzi (exemplary person) as the model of what human society can become when it disciplines itself."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
