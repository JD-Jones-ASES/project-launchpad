<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 28, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What surprising finding did the Roundtable reveal about human inquiries across history?", "back": "Human beings have asked the same fundamental questions across all cultures and eras."}, {"front": "What was the Bronze Age Hebrew poet standing before when contemplating universal questions?", "back": "A burning bush."}, {"front": "Where was the ancient Indian prince sitting while asking fundamental questions?", "back": "Under a Bodhi tree."}, {"front": "In what city was the medieval philosopher located who solved equations by lamplight?", "back": "Baghdad."}, {"front": "What was the Norse skald's specific task while contemplating the world's creation?", "back": "Shaping the creation into verse beside a winter fire."}, {"front": "In what specific institution was the 19th-century German economist studying manuscripts?", "back": "The British Library."}, {"front": "According to the Roundtable, why is there _____ rather than nothing?", "back": "Something."}, {"front": "What universal question concerns the relationship between morality and misfortune?", "back": "Why do the innocent suffer?"}, {"front": "What specific social obligation is listed as a universal human question?", "back": "What do I owe to the stranger?"}, {"front": "What question do humans universally ask regarding the conclusion of life?", "back": "What happens after I die?"}, {"front": "What two possibilities do humans consider regarding the progression of history?", "back": "Whether there is a pattern or just noise."}, {"front": "One theory suggests these universal questions are not philosophical accidents but arise from the _____.", "back": "Human condition."}, {"front": "What is the textual observation regarding a person's initial entry into the world?", "back": "We are all born into a world we did not ask to enter."}, {"front": "What do humans inevitably discover about the organization of the world in relation to themselves?", "back": "The world is not organized around our desires."}, {"front": "What universal experience involving interpersonal relationships is cited as a source of these questions?", "back": "Loving people and losing them."}, {"front": "What do humans occasionally sense about the depth of reality?", "back": "There is more going on than meets the eye."}, {"front": "What is the ultimate goal humans seek when asking if life has meaning?", "back": "To know whether it means anything."}, {"front": "Which scholar spent his life studying world religions to find their underlying shared questions?", "back": "Huston Smith."}, {"front": "Huston Smith's universal question part 1: What is the _____?", "back": "Nature of reality."}, {"front": "Huston Smith's universal question part 2: How should I _____ in light of reality?", "back": "Live."}, {"front": "What did Huston Smith consider to be one of the most important facts about human beings?", "back": "The existence of shared fundamental questions across different traditions."}, {"front": "What was Ludwig Wittgenstein's view on the limitations of science?", "back": "Even if science answered all factual questions, the deepest human questions would remain untouched."}, {"front": "What term did Ludwig Wittgenstein use to describe the deepest human questions?", "back": "The riddle."}, {"front": "How does the text distinguish between a 'puzzle' and a 'mystery'?", "back": "Puzzles have solutions, whereas mysteries orient our lives."}, {"front": "What is the function of the nine traditions in the Roundtable regarding 'the mystery'?", "back": "They offer a way of living inside the mystery."}, {"front": "Identify the four tools provided by the nine traditions to face persistent questions.", "back": "Story, practice, community, and disciplines."}, {"front": "How does the text distinguish between animal and human problem-solving?", "back": "Animals solve problems, but humans ask why the problems exist in the first place."}, {"front": "What is the textual status of the nine traditions in relation to human history?", "back": "The most sustained, serious attempts to answer the deeper questions of existence."}, {"front": "What do the nine traditions disagree on regarding the divine?", "back": "The nature of God."}, {"front": "What do the nine traditions disagree on regarding human pain?", "back": "The cause of suffering."}, {"front": "What do the nine traditions disagree on regarding the timeline of events?", "back": "The meaning of history."}, {"front": "What do the nine traditions disagree on regarding physical reality?", "back": "The structure of the universe."}, {"front": "What is the significance of the fact that the nine traditions disagree on many things but ask the same questions?", "back": "It suggests they may all be pointing at something real from different angles."}, {"front": "The impulse to ask deep philosophical questions is described as a sign of _____.", "back": "Human nature (or being distinctively human)."}, {"front": "Why is the convergence of questions across different 'cosmologies' considered significant?", "back": "It shows that geographical and conceptual differences do not change the fundamental human inquiry."}, {"front": "Concept: The Riddle", "back": "Definition: Mysteries that orient human lives and remain untouched by scientific factual answers."}, {"front": "According to the text, what does the impulse to ask 'why' suggest about the status of these questions in human nature?", "back": "It is not a sign of weakness or confusion but a distinctive human trait."}, {"front": "What role does 'community' play within the nine traditions mentioned?", "back": "It is a discipline or framework for facing questions that will not go away."}, {"front": "What was the 19th-century German economist doing while asking the same questions as the Bronze Age poet?", "back": "Hunching over manuscripts in the British Library."}, {"front": "How does the text characterize the 'answers' given by the nine traditions in comparison to their 'questions'?", "back": "The traditions disagree on almost every answer but take the same questions seriously."}, {"front": "Huston Smith's research focused on which specific area of study?", "back": "World religions."}, {"front": "The text describes the nine traditions as 'sustained' and '_____' attempts to answer deep questions.", "back": "Serious."}, {"front": "What is the primary difference in how different traditions handle the nature of reality according to Huston Smith?", "back": "They give different answers to the same underlying question."}, {"front": "The philosopher _____ called the deepest human questions 'the riddle.'", "back": "Ludwig Wittgenstein."}, {"front": "What is the textual implication of being 'born into a world we did not ask to enter'?", "back": "It is a fundamental aspect of the human condition that prompts universal questions."}, {"front": "According to the text, what is the most surprising revelation of the Roundtable?", "back": "The consistency of human questions across time, language, and culture."}, {"front": "Term: Norse Skald", "back": "Definition: A poet or storyteller in Norse culture, used in the text as an example of a universal questioner."}, {"front": "Which historical figure is used to illustrate the intersection of mathematics and philosophical questioning?", "back": "A medieval philosopher in Baghdad."}, {"front": "How do the nine traditions treat the questions that 'will not go away'?", "back": "By offering disciplines for facing them rather than simply solving them."}, {"front": "What does the text suggest about the relationship between truth and the nine traditions?", "back": "They might all be pointing toward something real from different perspectives."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
