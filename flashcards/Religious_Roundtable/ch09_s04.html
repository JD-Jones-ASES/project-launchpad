<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 9, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did Karl Marx describe his own philosophical stance regarding the supernatural?", "back": "He identified as an atheist and a materialist."}, {"front": "Karl Marx believed that religion was not a path to truth, but rather an _____ to it.", "back": "obstacle"}, {"front": "What did Karl Marx mean by his famous claim that religion is the \"opium of the people\"?", "back": "Religion numbs the pain of human suffering without curing its actual cause."}, {"front": "According to Marx, what effect does the hope for heaven in the next life have on a worker's demand for justice?", "back": "It makes the worker less likely to demand justice in this life."}, {"front": "How does Marx explain the origin of religion in relation to human experience?", "back": "He argued that religion is produced by human suffering and helps to perpetuate it."}, {"front": "Why would Karl Marx have objected to being classified as a religious thinker?", "back": "Because he viewed religion as a projection of human fears onto an imagined supernatural authority."}, {"front": "What is the central thesis regarding the \"structure\" of Communism in this text?", "back": "It possesses the structure of a religion even though it uses non-religious language."}, {"front": "How did the theologian Paul Tillich define the term \"faith\"?", "back": "He defined faith as the state of being \"ultimately concerned.\""}, {"front": "According to Paul Tillich's framework, what serves as an individual's \"god\"?", "back": "Whatever the individual treats as their highest value or ultimate loyalty."}, {"front": "In Tillich's framework, what constitutes practicing a \"religion of nationalism\"?", "back": "Treating one's nation as the ultimate concern or highest loyalty."}, {"front": "How does Communism fit Paul Tillich's definition of religion?", "back": "It treats the liberation of the working class and the classless society as the ultimate concern."}, {"front": "Term: Apostasy (in a Communist context).", "back": "Definition: Defecting from the Party, treated as a betrayal of the highest loyalty."}, {"front": "Term: Heresy (in a Communist context).", "back": "Definition: Criticizing the leader or official party ideology."}, {"front": "Which Communist texts were traditionally studied with an intensity comparable to religious scripture?", "back": "The Communist Manifesto and the writings of Lenin."}, {"front": "According to Mircea Eliade, what is one of the fundamental moves of religion?", "back": "Distinguishing between the sacred and the profane."}, {"front": "In Eliade's framework, what is the \"profane\"?", "back": "The ordinary flow of life and events."}, {"front": "How does Communism apply Eliade's concept of the \"sacred\" to historical actors?", "back": "It treats the proletariat and the revolutionary vanguard as sacred agents with world-historical significance."}, {"front": "In the structural parallels between Communism and religion, what provides the \"Cosmology\" (cosmic story)?", "back": "Historical materialism."}, {"front": "The Communist narrative of primitive communism, class division, and revolution follows a pattern of _____-fall-redemption.", "back": "creation"}, {"front": "In the Marxist creation-fall-redemption narrative, what specific event represents the \"fall\"?", "back": "The emergence of private property and class division."}, {"front": "Term: Hamartiology.", "back": "Definition: The study of what is wrong with the world, traditionally the study of \"sin.\""}, {"front": "In the Marxist \"Hamartiology,\" what are the primary causes of the world's problems?", "back": "Alienation, class exploitation, and the corruption of human nature by capitalism."}, {"front": "Term: Soteriology.", "back": "Definition: The study of salvation or liberation."}, {"front": "How does Communist \"Soteriology\" define the act of salvation?", "back": "As revolution, which is collective, this-worldly liberation from structural oppression."}, {"front": "Where does Communist \"salvation\" take place compared to traditional religious salvation?", "back": "It takes place within human history rather than in heaven after death."}, {"front": "What constitutes the \"Ethics\" or moral demands of the Communist structure?", "back": "Solidarity with the working class and sacrifice for the cause."}, {"front": "In Communism, which individualistic philosophy is explicitly rejected as part of its ethical demands?", "back": "Bourgeois individualism."}, {"front": "Term: Canon.", "back": "Definition: A collection of sacred or authoritative texts."}, {"front": "Name three texts that form the core Marxist canon mentioned in the text.", "back": "The Manifesto, Das Kapital, and the Paris Manuscripts."}, {"front": "Term: Ecclesiology.", "back": "Definition: The study of the community of the faithful or the \"church.\""}, {"front": "Which organization functions as the \"Ecclesiology\" in the Communist structure?", "back": "The Party."}, {"front": "Term: Eschatology.", "back": "Definition: The study of the end of history or the ultimate destiny of humanity."}, {"front": "What is the ultimate \"Eschatological\" hope of Communism?", "back": "The arrival of a classless, stateless society where alienation is overcome."}, {"front": "Marx's communism is described as an \"earthly paradise\" located at the end of _____.", "back": "history"}, {"front": "According to Eliade, how is the Revolution distinguished from ordinary political events?", "back": "It is treated as the turning point of all time, where profane history becomes sacred history."}, {"front": "What is the primary goal of treating Communism as a religion in an analytical context?", "back": "To understand what religion does and why human beings seem to need it."}, {"front": "Does treating Communism as a religion require a judgment on whether Marxist governments were good or evil?", "back": "No, it requires only an analytical recognition of structural similarities."}, {"front": "How has the religious community engaged with Marx's critique that religion pacifies the poor?", "back": "Serious religious thinkers have grappled with the critique and incorporated it into movements like liberation theology."}, {"front": "What does Liberation Theology argue regarding the relationship between Christianity and Marx's goals?", "back": "It argues that a properly understood Christianity demands the justice that Marx sought."}, {"front": "In Marxist cosmology, what is the state of the world before the \"fall\"?", "back": "Primitive communism."}, {"front": "How does the role of the Communist leader relate to the concept of \"heresy\"?", "back": "Criticizing the leader is treated as heresy because it challenges the sacred authority of the cause."}, {"front": "According to Tillich, can a person who identifies as a materialist still be practicing a religion?", "back": "Yes, if their ultimate concern is a materialist goal like class liberation."}, {"front": "In Eliade's framework, what are \"sacred times and places\" in traditional religions?", "back": "Moments or locations marked out from the ordinary flow of life as holy."}, {"front": "What is the Marxist equivalent of the \"Kingdom of Freedom\"?", "back": "The classless, stateless society."}, {"front": "Marx argued that religion is a projection of human _____ and fears.", "back": "hopes"}, {"front": "What is the \"sacred history\" in the Marxist view of time?", "back": "The history of liberation that begins with the revolution."}, {"front": "In the comparison of Communism to religion, what entity is organized to carry the \"revolutionary mission\" forward?", "back": "The Party."}, {"front": "Why is historical materialism considered a \"complete account\" in the context of cosmology?", "back": "It explains where the world came from, how it declined, and where it is going."}, {"front": "According to the text, what does religion do for human beings that might explain their \"need\" for it?", "back": "It provides a structure of ultimate concern and historical significance."}, {"front": "What later figures supplemented the Marxist canon in different traditions?", "back": "Lenin and Mao."}, {"front": "How does the text describe the intensity with which Communist writings were studied?", "back": "They were studied with the intensity of scripture."}, {"front": "In the Marxist framework, \"alienation\" suggests that human beings are not living as they were _____ to live.", "back": "meant"}, {"front": "What is the primary reason Marx called religion the \"opium of the people\"?", "back": "It numbs the pain of the oppressed so they do not seek to cure its cause."}, {"front": "True or False: The analytical case for treating Communism as a religion assumes that historical materialism is better than divine providence.", "back": "False."}, {"front": "What is the \"this-worldly\" equivalent of redemption in Marxist thought?", "back": "The revolution."}, {"front": "According to Eliade, certain historical actors in Communism are treated as \"_____ agents.\"", "back": "sacred"}, {"front": "What is the term for a set of doctrines and beliefs that a student or follower must not deviate from?", "back": "Canon."}, {"front": "In Tillich's view, a person whose ultimate concern is their nation is practicing a religion of _____.", "back": "nationalism"}, {"front": "Marx argued that religion is used to _____ inequality and justify oppression.", "back": "sanctify"}, {"front": "The arrival of the classless society is awaited with something similar to _____ hope.", "back": "eschatological"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
