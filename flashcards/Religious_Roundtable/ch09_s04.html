<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 9, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was Karl Marx's personal stance on religion?", "back": "Karl Marx was an atheist and a materialist who believed religion was an obstacle to truth, not a path to it."}, {"front": "According to Marx, what did he mean by stating that 'religion is the opium of the people'?", "back": "He meant that religion, like opium, numbs pain without curing its cause, thereby distracting suffering workers from demanding justice in this life by focusing on an imagined heaven in the next."}, {"front": "Why does this textbook argue that Communism has the 'structure of a religion,' despite Marx's atheism?", "back": "The text asserts that the system of thought Marx created exhibits structural similarities to religion in its worldview, ethics, and community, whether or not it uses religious language or its founder was religious."}, {"front": "How did American theologian Paul Tillich define 'faith'?", "back": "Tillich defined faith not as belief in doctrines, but as the state of being 'ultimately concerned' — whatever one treats as their highest value, ultimate loyalty, or the thing they would sacrifice everything else for."}, {"front": "How does Tillich's definition of faith apply to Communist movements?", "back": "Communist movements functioned as religions by demanding ultimate loyalty to the cause, subordinating personal interests, treating defection as apostasy, studying texts like scripture, and awaiting a classless society with 'eschatological hope.'"}, {"front": "What fundamental distinction did historian of religion Mircea Eliade emphasize as characteristic of religion?", "back": "Eliade highlighted the distinction between the sacred (holy, set apart, charged with ultimate significance) and the profane (ordinary) as a fundamental move of religion."}, {"front": "How did Eliade apply the sacred/profane distinction to Communism's view of history?", "back": "He observed that Communism treats certain historical actors (the proletariat, revolutionary vanguard) as sacred agents, and the revolution as a sacred turning point where profane history of exploitation gives way to sacred history of liberation."}, {"front": "In the structural parallel of Communism to religion, what is its 'cosmic story' or cosmology?", "back": "Historical materialism, which provides a creation-fall-redemption narrative: from primitive communism, through the fall into class division, to the redemption of revolution and the classless society."}, {"front": "What does Communism identify as 'what is wrong with the world' (its hamartiology) in this structural analysis?", "back": "Alienation, class exploitation, and the corruption of human nature by capitalist conditions, preventing human beings from living as they were meant to live."}, {"front": "What is the concept of 'salvation' (soteriology) within the structural framework of Communism as a religion?", "back": "Revolution—collective, this-worldly liberation from structural oppression, leading to communism in history rather than individual salvation or heaven after death."}, {"front": "What are the 'moral demands' or ethics within the structural framework of Communism as a religion?", "back": "Solidarity with the working class, willingness to sacrifice personal comfort for the cause, and rejection of bourgeois individualism."}, {"front": "What are considered the 'sacred texts' or canon within Communism's structural parallel to religion?", "back": "The Manifesto, Das Kapital, and the Paris Manuscripts; later supplemented by writings from figures like Lenin and Mao."}, {"front": "What acts as the 'community' or ecclesiology in the structural parallel of Communism as a religion?", "back": "The Party, described as the community of the faithful, organized to carry the revolutionary mission forward in history."}, {"front": "What is the 'hope' or eschatology within the structural framework of Communism as a religion?", "back": "The classless, stateless society—an earthly paradise or 'kingdom of freedom' where alienation is overcome, and human beings finally live as they were meant to, marking the end of history."}, {"front": "What is the primary purpose of analyzing Communism through a religious structure in this textbook?", "back": "To recognize structural similarities between Communism and religion, and to understand what religion does and why human beings seem to need it, without judging the validity or morality of Communism itself."}, {"front": "What is a key critique of religion that Marx made, and that serious religious thinkers have also grappled with?", "back": "The critique that religion has sometimes been used to justify oppression, pacify the poor, and sanctify inequality."}, {"front": "Name a Christian theological movement mentioned that has taken Marx's critique of religion seriously.", "back": "Liberation theology."}, {"front": "In the context of Eliade's framework, what specific event is considered the 'turning point of all time' in Communism's sacred history?", "back": "The Revolution, which transforms the profane history of exploitation into the sacred history of liberation."}, {"front": "According to the structural analysis, what does 'historical materialism' provide for Communism?", "back": "It provides a complete 'cosmic story' (cosmology) explaining the world's origin, how it 'fell,' and where it is going."}, {"front": "In the Tillichian framework, what was considered 'apostasy' or 'heresy' within Communist movements?", "back": "To defect from the Party was apostasy; to criticize the leader could be heresy, reflecting ultimate loyalty to the cause."}, {"front": "What does 'bourgeois individualism' refer to, which Communist ethics demand rejection of?", "back": "The self-centered values and prioritization of personal interests often associated with capitalist societies, which contrast with the collective solidarity demanded by Communism."}, {"front": "How does Communist 'salvation' (soteriology) fundamentally differ from traditional religious concepts of heaven after death?", "back": "Communist salvation is a collective, this-worldly liberation from structural oppression realized in history, not an individual, otherworldly reward after death."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
