<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 11, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the ultimate source of the cosmos according to Hinduism?", "back": "In Hinduism, Brahman is the undifferentiated ground of being from which all things emerge."}, {"front": "Describe the cyclical nature of the Hindu cosmos.", "back": "The Hindu cosmos pulsates through vast cycles of creation and dissolution, emerging from and returning to Brahman."}, {"front": "How does Hinduism reconcile an impersonal cosmic source with personal deities?", "back": "Despite Brahman being an impersonal 'primordial ocean,' Hindu devotion is rich with personal deities, vivid stories, and direct relationships between humans and gods."}, {"front": "What is the significance of the Nasadiya Sukta in Hindu thought on creation?", "back": "The Nasadiya Sukta adds a layer of intellectual honesty, suggesting that even the Hindu account of creation may not be the full truth, encouraging humility."}, {"front": "How does Buddhism typically respond to the question 'Where did the world come from?'", "back": "Buddhism considers it the 'wrong question,' as it presupposes a creator and creation event that cannot be established."}, {"front": "What is the central Buddhist concept explaining how phenomena arise?", "back": "Pratityasamutpada (dependent origination) is the Buddhist concept that everything arises in dependence on conditions, without a first cause or absolute beginning."}, {"front": "Does Buddhism identify a creator or an absolute first cause for the universe?", "back": "No, Buddhism asserts there is no first cause, no absolute beginning, and no creator existing outside the web of interdependence."}, {"front": "What is the primary focus of Buddhism concerning existence, rather than cosmic origins?", "back": "The primary focus of Buddhism shifts from origins to liberation from suffering, asking 'How do I get out of suffering?'"}, {"front": "What is the Taoist concept for the source of all things?", "back": "The Tao is the unnamed, wordless source of the cosmos, prior to all names, distinctions, and human descriptions of reality."}, {"front": "How does the cosmos emerge from the Tao?", "back": "The cosmos flows naturally and effortlessly from the Tao, without any design or decision, akin to a spring giving rise to a river."}, {"front": "In Taoism, how is the 'creation' process different from a craftsman making an object?", "back": "The Tao does not 'create' by conscious design or decision like a craftsman; it spontaneously gives rise to all things, like a spring to a river."}, {"front": "What is the appropriate human response to the Taoist understanding of the cosmos?", "back": "The appropriate human response in Taoism is alignment – learning to flow with the grain of reality rather than against it, not worship, submission, or liberation."}, {"front": "Compare the nature of the cosmic 'source' in Hinduism and Taoism.", "back": "Hinduism names Brahman as the undifferentiated ground of being, while Taoism names the Tao but emphasizes its unnamed, indescribable nature. Both are impersonal sources."}, {"front": "How do these three traditions differ regarding the concept of a 'creator'?", "back": "Hinduism has an impersonal source (Brahman) but a rich pantheon of personal deities; Buddhism denies a creator and first cause; Taoism sees the cosmos flowing spontaneously without design."}, {"front": "What fundamental agreement do Hinduism, Buddhism, and Taoism share about the cosmos?", "back": "All three traditions agree that the cosmos is not arbitrary chaos, but possesses a character worth attending to, though they account for it differently."}, {"front": "Which tradition emphasizes 'liberation' from suffering as its central goal?", "back": "Buddhism focuses on liberation from suffering, shifting emphasis from cosmological origins to personal practice."}, {"front": "Which tradition emphasizes 'alignment' as the ideal human response to reality?", "back": "Taoism emphasizes alignment, flowing with the natural rhythm and grain of the Tao."}, {"front": "How does Buddhism's Pratityasamutpada (dependent origination) differ from the concept of a single ultimate cause?", "back": "Pratityasamutpada posits that everything arises in dependence on *multiple* interconnected conditions, directly contrasting the idea of a single, independent first cause."}, {"front": "In simple terms, what does 'undifferentiated ground of being' mean in the context of Brahman?", "back": "It refers to Brahman as a fundamental, ultimate reality that is the basis for all existence, prior to any distinctions or individual forms."}, {"front": "What profound question does the text pose about the meaning of the universe?", "back": "The text asks whether meaning derives from a universe with a creator, or if it depends more on how we live within the cosmos, regardless of its origins."}, {"front": "Which tradition uses the analogy of a 'primordial ocean' for its cosmic source?", "back": "Hinduism describes Brahman as being like a primordial ocean from which all waves (all things) arise."}, {"front": "How does Taoism's view of the Tao being 'prior to all names' impact its understanding of reality?", "back": "It implies that the ultimate reality of the Tao transcends human language, concepts, and distinctions, which are inherently limited."}, {"front": "What is the main distinction between Hinduism's cyclical creation and Buddhism's non-creation stance?", "back": "Hinduism posits a definite, cyclical creation from Brahman, whereas Buddhism avoids cosmological questions entirely, focusing instead on the interconnectedness of phenomena without a beginning or end."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
