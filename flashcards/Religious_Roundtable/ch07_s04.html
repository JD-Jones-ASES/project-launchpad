<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 7, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did Confucius describe his role in relation to the ancient wisdom he taught?", "back": "He saw himself as a transmitter rather than an author or creator."}, {"front": "Complete the quote from Analects 7.1: \"I transmit but do not _____; I believe in and love the ancients.\"", "back": "create"}, {"front": "What are the two primary collections into which the most important Confucian texts are grouped?", "back": "The Four Books and the Five Classics."}, {"front": "Which philosopher was responsible for compiling and commenting on the Four Books in the 12th century?", "back": "Zhu Xi"}, {"front": "During which historical period did the Four Books serve as the core curriculum for the imperial examination system?", "back": "The Neo-Confucian era (starting with Zhu Xi, 1130–1200 CE)."}, {"front": "What is the Chinese title of the Analects?", "back": "Lunyu"}, {"front": "What does the Chinese title \"Lunyu\" literally mean?", "back": "Selected conversations"}, {"front": "Which text is considered the primary source for Confucius's own voice and direct thoughts?", "back": "The Analects"}, {"front": "Who compiled the sayings and conversations found in the Analects?", "back": "The students of Confucius (after his death)."}, {"front": "Describe the typical format of a passage in the Analects.", "back": "A brief exchange consisting of a question and a short answer."}, {"front": "What is the English title of the text \"Daxue\"?", "back": "The Great Learning"}, {"front": "What foundational Confucian concept is described by the \"eight steps\" in The Great Learning?", "back": "The cultivation of virtue from the individual outward to the world."}, {"front": "The Great Learning describes Confucianism's concentric vision of ethics as a path from the individual to the family, the state, and _____.", "back": "the whole world"}, {"front": "What is the English title of the text \"Zhongyong\"?", "back": "The Doctrine of the Mean"}, {"front": "Name the three core virtues emphasized in the Doctrine of the Mean.", "back": "Moderation, balance, and sincerity."}, {"front": "Which of the Four Books develops the metaphysical dimension of Confucianism most fully?", "back": "The Doctrine of the Mean"}, {"front": "How does the Doctrine of the Mean relate human virtue to the universe?", "back": "It connects human virtue to the order of the cosmos."}, {"front": "Who is recognized as Confucius's most important disciple and the author of the \"Mengzi\"?", "back": "Mencius (Meng Ke)"}, {"front": "What was Mencius's crucial argument regarding human nature?", "back": "Human nature is fundamentally good."}, {"front": "Mencius argued that virtues like compassion and a sense of right and wrong are present from birth and are comparable to _____.", "back": "seeds that need cultivation"}, {"front": "According to Confucian tradition, who edited and transmitted the Five Classics?", "back": "Confucius"}, {"front": "What is the Chinese title for the Book of Songs?", "back": "Shijing"}, {"front": "What is the primary content of the Shijing (Book of Songs)?", "back": "An anthology of ancient Chinese poetry."}, {"front": "What was the purpose of studying the Book of Songs according to Confucius?", "back": "To cultivate sensitivity, moral imagination, and proper feeling."}, {"front": "What is the Chinese title for the Book of History?", "back": "Shujing"}, {"front": "The Book of History contains records of ancient rulers intended to serve as models of good governance and _____.", "back": "cautionary tales of bad governance"}, {"front": "What is the Chinese title for the Book of Rites?", "back": "Liji"}, {"front": "Which text contains detailed accounts of ritual practices, social customs, and ceremonial forms?", "back": "The Book of Rites (Liji)"}, {"front": "What are the two common English names for the \"Yijing\"?", "back": "The Book of Changes or I Ching."}, {"front": "In its earliest form, for what purpose was the Book of Changes used?", "back": "Divination"}, {"front": "How did Confucian thinkers interpret the Book of Changes for human affairs?", "back": "As a guide to the patterns underlying change."}, {"front": "What is the Chinese title for the Spring and Autumn Annals?", "back": "Chunqiu"}, {"front": "The Spring and Autumn Annals is a chronicle of events in which ancient Chinese state?", "back": "Lu"}, {"front": "Why do scholars study the Spring and Autumn Annals despite its seemingly neutral historical narrative?", "back": "To find the moral judgments traditionally attributed to Confucius."}, {"front": "What is the broader ambition of the Confucian canon beyond private spiritual life?", "back": "To shape the whole person: emotional, intellectual, moral, social, and political."}, {"front": "Which collection became the standard for the imperial examination system: the Four Books or the Five Classics?", "back": "The Four Books"}, {"front": "What is the first of the \"eight steps\" in The Great Learning?", "back": "Investigating things"}, {"front": "What is the final goal of the \"eight steps\" in The Great Learning?", "back": "Bringing peace to all under heaven"}, {"front": "In the Mencius, what specific internal traits are described as being present in every person from birth?", "back": "Compassion and a sense of right and wrong."}, {"front": "Which specific classic focuses on the records of ancient rulers?", "back": "Book of History (Shujing)"}, {"front": "Which text is categorized as a cosmological guide to change in natural and human affairs?", "back": "Book of Changes (Yijing)"}, {"front": "Identify the text: A chronicle of the state of Lu traditionally attributed to Confucius himself.", "back": "Spring and Autumn Annals (Chunqiu)"}, {"front": "Which text is the most full development of the metaphysical dimension in early Confucianism?", "back": "The Doctrine of the Mean (Zhongyong)"}, {"front": "Name the two collections that reflect Confucianism's reverence for the written record of human wisdom.", "back": "The Four Books and the Five Classics."}, {"front": "Term: The Analects", "back": "The primary collection of Confucius's sayings and conversations, compiled post-mortem by his students."}, {"front": "Concept: Concentric vision of ethics", "back": "The Confucian idea that virtue radiates from the individual outward to family, state, and the world."}, {"front": "How does the Book of Songs contribute to a person's moral development?", "back": "By cultivating moral imagination and proper feeling through poetry."}, {"front": "True or False: Confucius viewed himself as the original author of the Five Classics.", "back": "False (He saw himself as an editor and transmitter of ancient wisdom)."}, {"front": "Which text focuses on the social customs and ceremonial forms of ancient China?", "back": "Book of Rites (Liji)"}, {"front": "The _____ argues that human nature is fundamentally good, comparing virtues to seeds.", "back": "Mencius (Mengzi)"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
