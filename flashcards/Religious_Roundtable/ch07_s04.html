<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 7, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did Confucius describe his role in relation to ancient wisdom?", "back": "He viewed himself as a transmitter of ancient wisdom rather than its author."}, {"front": "Which specific phrase from the Analects 7.1 captures Confucius's approach to creating new ideas?", "back": "\"I transmit but do not create.\""}, {"front": "What were the two primary collections of texts in the Confucian canon?", "back": "The Four Books and the Five Classics."}, {"front": "Who was the Neo-Confucian philosopher responsible for compiling and commenting on the Four Books?", "back": "Zhu Xi."}, {"front": "During which years did the philosopher Zhu Xi live?", "back": "1130–1200 CE."}, {"front": "What role did the Four Books play in the historical Chinese political system?", "back": "They became the core curriculum of the imperial examination system."}, {"front": "What is the Chinese title of the primary collection of Confucius's sayings?", "back": "The Analects (Lunyu)."}, {"front": "Who compiled the conversations found in the Analects?", "back": "Confucius's students (compiled after his death)."}, {"front": "What does the Chinese title 'Lunyu' literally translate to?", "back": "Selected conversations."}, {"front": "How is the format of the Analects characterized in the text?", "back": "Brief exchanges, often consisting of a question and a short answer."}, {"front": "Which text is described as a short but foundational work on the cultivation of virtue from the individual to the world?", "back": "The Great Learning (Daxue)."}, {"front": "The Great Learning describes Confucianism's concentric vision of ethics through its famous \"_____.\"", "back": "Eight steps."}, {"front": "In the Great Learning's eight steps, what is the initial starting point for cultivating virtue?", "back": "Investigating things."}, {"front": "What is the ultimate goal of the eight steps found in the Great Learning?", "back": "Bringing peace to all under heaven."}, {"front": "Which Confucian text focuses heavily on the virtues of moderation, balance, and sincerity?", "back": "The Doctrine of the Mean (Zhongyong)."}, {"front": "How does the Doctrine of the Mean differ from the Analects in its philosophical depth?", "back": "It develops the metaphysical dimension of Confucian thought more fully."}, {"front": "To what does the Doctrine of the Mean connect human virtue?", "back": "The order of the cosmos."}, {"front": "Who was the author of the 'Mencius' and a primary disciple of Confucius?", "back": "Mencius (Meng Ke)."}, {"front": "What were the approximate birth and death years of Mencius?", "back": "372–289 BCE."}, {"front": "What was Mencius's crucial argument regarding the fundamental nature of humans?", "back": "Human nature is fundamentally good."}, {"front": "To what did Mencius compare virtues like compassion and right and wrong to explain their presence from birth?", "back": "Seeds that need cultivation."}, {"front": "How do the Five Classics compare in age to the Four Books?", "back": "The Five Classics are older texts."}, {"front": "What is the Chinese title for the 'Book of Songs'?", "back": "Shijing."}, {"front": "What kind of material is contained in the Book of Songs (Shijing)?", "back": "An anthology of ancient Chinese poetry."}, {"front": "What three internal qualities did Confucius believe the Book of Songs helped cultivate?", "back": "Sensitivity, moral imagination, and proper feeling."}, {"front": "What is the Chinese title for the 'Book of History'?", "back": "Shujing."}, {"front": "What is the primary subject matter of the Book of History (Shujing)?", "back": "Records of ancient rulers and their deeds."}, {"front": "What purpose did the Book of History serve regarding leadership?", "back": "It provided models of good governance and cautionary tales of bad governance."}, {"front": "What is the Chinese title for the 'Book of Rites'?", "back": "Liji."}, {"front": "What three areas of social behavior are detailed in the Book of Rites (Liji)?", "back": "Ritual practices, social customs, and ceremonial forms."}, {"front": "What are the two common names used for the cosmological text used for divination?", "back": "Book of Changes (Yijing or I Ching)."}, {"front": "How did later Confucian thinkers interpret the Book of Changes beyond its use in divination?", "back": "As a guide to the patterns underlying change in human and natural affairs."}, {"front": "What is the Chinese title for the 'Spring and Autumn Annals'?", "back": "Chunqiu."}, {"front": "The Spring and Autumn Annals is a chronicle of events in which specific Chinese state?", "back": "The state of Lu."}, {"front": "What unique element did Confucius embed within the seemingly neutral narrative of the Spring and Autumn Annals?", "back": "Moral judgments."}, {"front": "The range of the Confucian canon includes which diverse types of literature?", "back": "Poetry, history, ritual, philosophy, divination, and historical chronicles."}, {"front": "Rather than focusing only on private spiritual life, Confucianism aims to shape the _____.", "back": "Whole person."}, {"front": "What are the five specific dimensions of the human person that Confucianism seeks to shape?", "back": "Emotional, intellectual, moral, social, and political."}, {"front": "What is the meaning of the Chinese title 'Daxue'?", "back": "The Great Learning."}, {"front": "What is the meaning of the Chinese title 'Zhongyong'?", "back": "The Doctrine of the Mean."}, {"front": "In the Great Learning, what level of cultivation exists between the 'family' and 'all under heaven'?", "back": "The state."}, {"front": "According to the Analects 7.1, Confucius's attitude toward the ancients was that he _____ them.", "back": "Believed in and loved."}, {"front": "Which text serves as the primary source for Confucius’s own direct and demanding voice?", "back": "The Analects."}, {"front": "Which text explicitly argues that compassion is present in every person from birth?", "back": "Mencius (Mengzi)."}, {"front": "To whom is the authorship of the Spring and Autumn Annals traditionally attributed?", "back": "Confucius."}, {"front": "According to the Great Learning, the cultivation of virtue expands in what geometric pattern?", "back": "Concentric circles."}, {"front": "What is the literal translation of the title 'Mengzi'?", "back": "Mencius."}, {"front": "Which collection of texts did Confucius regard as the record of ancient wisdom?", "back": "The Five Classics."}, {"front": "How is the style of the Analects described for a reader who reflects on it for years?", "back": "Deceptively simple."}, {"front": "What dimension of Confucianism is specifically developed in the Doctrine of the Mean?", "back": "The metaphysical dimension."}, {"front": "In the Book of History, what do the deeds of ancient rulers serve as?", "back": "Models of good governance and cautionary tales of bad governance."}, {"front": "Which book is described as an 'anthology'?", "back": "The Book of Songs (Shijing)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
