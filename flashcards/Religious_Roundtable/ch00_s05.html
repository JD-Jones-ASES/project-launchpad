<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 0, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the first reason the text provides for why an educated person should study religion?", "back": "Historical and cultural literacy."}, {"front": "What is the second reason the text provides for why an educated person should study religion?", "back": "Philosophical necessity."}, {"front": "What is the third reason the text provides for why an educated person should study religion?", "back": "Civic necessity."}, {"front": "According to the text, what context is required to make sense of the great cathedrals of Europe?", "back": "Religious context."}, {"front": "The philosophy of ancient Greece is described as being unintelligible without understanding what?", "back": "Religion."}, {"front": "What specific aspect of the Islamic world is cited as being rooted in religious context?", "back": "Legal codes."}, {"front": "The art of _____ and the poetry of China are listed as achievements requiring religious context.", "back": "India"}, {"front": "What specific musical tradition is noted as being unintelligible without understanding the African American church?", "back": "The music of the African American church."}, {"front": "Which 19th-century Russian author is mentioned as being steeped in religious thought?", "back": "Leo Tolstoy."}, {"front": "Which author of 'The Divine Comedy' is cited as having writing steeped in religious thought?", "back": "Dante."}, {"front": "Which American novelist is listed alongside Shakespeare and Dante as being steeped in religious thought?", "back": "Toni Morrison."}, {"front": "Name one major American historical movement mentioned that has religion woven into its history.", "back": "The Civil Rights Movement (or the Abolition movement)."}, {"front": "How is religion related to the history of science according to the text?", "back": "It is woven into every thread of its history."}, {"front": "A person who does not know the world's religions is said to be missing the key to what?", "back": "An enormous portion of human achievement."}, {"front": "How does the text characterize the questions asked by religion?", "back": "They are the hardest questions there are."}, {"front": "Which reason for studying religion focuses on questions regarding the purpose of human life?", "back": "Philosophical necessity."}, {"front": "Why does science not answer questions about the meaning or purpose of life?", "back": "These questions fall outside the scope of what science is designed to do."}, {"front": "How does philosophy differ from religion in its approach to the 'hardest questions'?", "back": "Philosophy uses different methods than religion."}, {"front": "Religion asks if there is _____ beyond what human courts can deliver.", "back": "justice"}, {"front": "The text argues that accumulated religious thinking is worth taking seriously because it has confronted hard questions for _____.", "back": "thousands of years"}, {"front": "What is the approximate current global population mentioned in the text?", "back": "Eight billion people."}, {"front": "What is the primary goal of studying religion for 'civic necessity'?", "back": "To understand what other people believe and why."}, {"front": "According to the text, what is 'understanding' NOT synonymous with in a civic context?", "back": "Agreement."}, {"front": "How does the text define 'strong' understanding in a religious context?", "back": "The ability to see the world as another person sees it for a moment."}, {"front": "What percentage of the world's population identifies with a religious group according to Pew Research?", "back": "Approximately 84%."}, {"front": "Approximately how many billions of people belong to a religious tradition?", "back": "6.7 billion."}, {"front": "Which religious group is the largest globally, representing about 31% of the population?", "back": "Christians."}, {"front": "What percentage of the world population identifies as Muslim?", "back": "Approximately 25%."}, {"front": "What percentage of the world population identifies as Hindu?", "back": "Approximately 15%."}, {"front": "Buddhists make up approximately what percentage of the global population?", "back": "7%."}, {"front": "What percentage of the world population identifies as religiously unaffiliated?", "back": "16%."}, {"front": "Do religiously unaffiliated individuals typically lack all spiritual convictions?", "back": "No, they often hold spiritual beliefs or engage in spiritual practices."}, {"front": "Concept: Civic Necessity", "back": "Definition: The need to understand others' deepest convictions to navigate the world as a neighbor, citizen, and professional."}, {"front": "Concept: Historical Literacy", "back": "Definition: The ability to understand human civilization and achievements through their underlying religious context."}, {"front": "In the context of 'civic necessity,' understanding involves taking another person's _____ seriously.", "back": "most serious commitments"}, {"front": "What is the difference between 'weak tolerance' and 'understanding' according to the text?", "back": "Tolerance is merely putting up with people; understanding is seeing the world as they do."}, {"front": "The text lists Hindus, Muslims, Buddhists, Christians, and _____ as examples of groups sharing the planet.", "back": "Sikhs (and atheists)"}, {"front": "Is the study of religion only for those who belong to a religious tradition?", "back": "No, it is for every educated person regardless of their personal belief."}, {"front": "Which author is associated with the 'Abolition movement' and the 'Civil Rights Movement' in the context of religious study?", "back": "The text mentions these movements generally as being woven with religion."}, {"front": "True or False: The text claims that studying a religion is the same as living one.", "back": "False."}, {"front": "According to the 'Philosophical Necessity' section, what does religion ask regarding our relationships with others?", "back": "What do we owe to each other and why?"}, {"front": "What does the text suggest an atheist might gain from studying religion?", "back": "Historical/cultural literacy, philosophical insights, and civic understanding."}, {"front": "The philosophy of which ancient civilization is specifically linked to religious context?", "back": "Ancient Greece."}, {"front": "What is the specific raw number of people identified as religious out of 8 billion?", "back": "6.7 billion."}, {"front": "Which reason for study involves the claim that religion asks questions that are 'not trivial'?", "back": "Philosophical necessity."}, {"front": "How does the text describe the relationship between religion and the 'American founding'?", "back": "Religion is woven into every thread of it."}, {"front": "In the text, 'Historical and cultural literacy' is the _____ reason provided for studying religion.", "back": "first"}, {"front": "What does the text mean by 'philosophical necessity' in religious studies?", "back": "The need to confront the hardest questions about human existence."}, {"front": "What is the 'weak sense' of tolerance mentioned in the text?", "back": "Merely putting up with people."}, {"front": "Which group makes up the remaining 16% of the population in the Pew Research data?", "back": "The religiously unaffiliated."}, {"front": "What does the text say about the value of 'accumulated thinking' in religion?", "back": "It is worth taking seriously because it has addressed hard questions for millennia."}, {"front": "Identify one of the authors cited as being 'steeped in religious thought' from the 16th or 17th century.", "back": "William Shakespeare."}, {"front": "Is religion's purpose in philosophy to provide easy answers?", "back": "No, it is to wrestle with the hardest questions there are."}, {"front": "According to the Pew Research data, which is the third largest religious group worldwide?", "back": "Hindus (15%)."}, {"front": "The 'big question' section asks if there is a difference between studying a religion and _____ one.", "back": "living"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
