<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 0, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why is Communism included in a textbook on world religions, despite not being a traditional religion?", "back": "Scholars of religion use broader frameworks to define faith and the sacred, finding that Communism exhibits the structural features of a religion, even without a deity.", "id": "fc01"}, {"front": "How did Karl Marx famously describe religion?", "back": "He called it 'the opiate of the masses.'", "id": "fc02"}, {"front": "According to Marx, what was the primary function of religion as 'the opiate of the masses'?", "back": "Religion numbed people to their real suffering and prevented them from addressing their issues, much like a drug numbs pain.", "id": "fc03"}, {"front": "How did the theologian Paul Tillich define 'faith'?", "back": "Tillich defined faith as 'ultimate concern,' meaning whatever a person treats as the most important thing in their life, for which they would sacrifice everything else.", "id": "fc04"}, {"front": "Based on Paul Tillich's definition of 'faith,' is faith limited to traditional religious beliefs?", "back": "No, Tillich's definition suggests that faith is not limited to traditional religion; it is the structure of human commitment itself.", "id": "fc05"}, {"front": "How did the historian of religion Mircea Eliade define 'the sacred'?", "back": "Eliade argued that the sacred is any reality human beings treat as set apart, charged with special significance, and deserving of a response beyond ordinary everyday behavior.", "id": "fc06"}, {"front": "According to Mircea Eliade's definition, is 'the sacred' always supernatural?", "back": "No, Eliade's definition expands the concept of the sacred beyond just the supernatural to include any reality treated with special significance.", "id": "fc07"}, {"front": "What broad scholarly frameworks justify the analytical classification of Communism as having the 'full structure of a religion'?", "back": "Paul Tillich's definition of faith as 'ultimate concern' and Mircea Eliade's definition of the sacred as 'set apart reality' allow scholars to examine Communism's functional similarities to religion.", "id": "fc08"}, {"front": "What is Communism's 'cosmic story' that explains all of human history?", "back": "It is the theory of historical materialism, which explains history as a movement through stages toward a final classless society.", "id": "fc09"}, {"front": "List the stages of human history according to the theory of historical materialism.", "back": "Primitive communism, slavery, feudalism, capitalism, and finally, a classless society.", "id": "fc10"}, {"front": "How does Communism's theory of historical materialism function similarly to a religious creation myth?", "back": "It provides a comprehensive explanation of reality and human history, offering a grand narrative akin to how creation myths explain origins and destiny.", "id": "fc11"}, {"front": "What are some 'moral demands' that Communism places on its adherents?", "back": "Calls for solidarity with the oppressed, resistance to exploitation, and subordination of personal interest to the revolutionary cause.", "id": "fc12"}, {"front": "Name three 'sacred texts' within the Communist tradition mentioned in the text.", "back": "The Communist Manifesto (1848), Das Kapital (1867), and the Economic and Philosophic Manuscripts of 1844.", "id": "fc13"}, {"front": "How do Communist 'sacred texts' resemble religious scriptures in their function?", "back": "They serve as authoritative scriptures, interpreted and debated by later authorities and commentators, similar to how religious texts are treated.", "id": "fc14"}, {"front": "What is Communism's 'eschatological hope'?", "back": "The vision of a classless society, seen not just as a political goal but as ultimate redemption, promising the end of alienation, restoration of human wholeness, and fulfillment of history.", "id": "fc15"}, {"front": "What organization functions as the 'community of the faithful' in carrying forward Communism's eschatological hope?", "back": "The Party.", "id": "fc16"}, {"front": "Does the inclusion of Communism in a religious studies context imply an endorsement of its politics or that Karl Marx would have agreed with this classification?", "back": "No, it is explicitly stated that it is not an endorsement, and Marx himself would have rejected this characterization. It is a scholarly, analytical classification.", "id": "fc17"}, {"front": "According to the text, why is Communism a valid subject for serious study alongside other religious traditions?", "back": "Because it raises and attempts to answer the same fundamental questions about suffering, justice, history, and human nature that other traditions address, deserving similar charitable attention.", "id": "fc18"}, {"front": "Who was a significant philosophical influence on Karl Marx, particularly regarding ideas about history's progression?", "back": "G.W.F. Hegel.", "id": "fc19"}, {"front": "How did Karl Marx fundamentally transform G.W.F. Hegel's framework of history?", "back": "While Hegel believed history was driven by ideas, Marx argued it was driven by material conditions—specifically, who owns the tools of production and who performs the labor.", "id": "fc20"}, {"front": "Define 'historical materialism' and explain its foundational role in Marxist thought.", "back": "Historical materialism is Marx's theory that history is driven by material conditions, such as the ownership of production tools and labor relations. It is the fundamental basis of Marxist philosophy.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
