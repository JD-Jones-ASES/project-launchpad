<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 10, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Instead of starting with a definition, Judaism begins with a relationship and a _____.", "back": "Name"}, {"front": "In the Book of Exodus, what Hebrew phrase does God provide when Moses asks for His name?", "back": "Ehyeh asher ehyeh"}, {"front": "What are the two common English translations for the divine name 'Ehyeh asher ehyeh'?", "back": "\"I am that I am\" or \"I will be what I will be.\""}, {"front": "The God of Israel is characterized not as a proposition to be believed, but as a _____ to be encountered.", "back": "Presence"}, {"front": "What is the Hebrew term for the binding agreement between God and the people of Israel?", "back": "Brit"}, {"front": "Term: Brit", "back": "Definition: A binding agreement with mutual obligations (covenant)."}, {"front": "How does a covenant differ from a contract in terms of its nature?", "back": "A contract is transactional, while a covenant is relational."}, {"front": "What allows a covenant to persist through time, failure, and repair?", "back": "The bond it creates between persons."}, {"front": "Beyond providing law, what did the covenant at Sinai transform Israel into?", "back": "A people (am Yisrael)."}, {"front": "What is the Hebrew phrase for 'the people of Israel'?", "back": "Am Yisrael"}, {"front": "In the Sinai covenant, what was God's commitment to the people of Israel?", "back": "To be their God, guide them, and protect them."}, {"front": "In the Sinai covenant, what was Israel's commitment to God?", "back": "To follow the Torah (divine instruction)."}, {"front": "What is the core meaning of the Hebrew word 'Torah' within the context of the covenant?", "back": "Divine instruction"}, {"front": "Which central Jewish prayer is named after the Hebrew word for 'Hear'?", "back": "The Shema"}, {"front": "From which biblical passage is the Shema derived?", "back": "Deuteronomy 6:4-9"}, {"front": "How often are observant Jews traditionally required to recite the Shema daily?", "back": "Twice daily (upon waking and before sleeping)."}, {"front": "The Shema is traditionally the last prayer spoken before _____.", "back": "Death"}, {"front": "Why is the Shema considered a declaration of relationship rather than a creed?", "back": "It declares that God is one and belongs to the people rather than listing doctrines."}, {"front": "According to Deuteronomy 6:5, what three aspects of self should be used to love the LORD?", "back": "Heart, soul, and might."}, {"front": "Where are Jews commanded to talk about the words of God according to the Shema?", "back": "At home and when walking by the way (on the road)."}, {"front": "Where should the words of the Shema be bound as a sign?", "back": "Upon the hand"}, {"front": "Where are the 'frontlets' containing the words of the Shema to be placed?", "back": "Between the eyes"}, {"front": "According to the Shema, where should the words be written on a house?", "back": "Upon the doorposts and the gates."}, {"front": "What is the term for the emphasis on 'correct practice' in religious life?", "back": "Orthopraxy"}, {"front": "What is the term for the emphasis on 'correct belief' in religious life?", "back": "Orthodoxy"}, {"front": "Between orthopraxy and orthodoxy, which does Judaism primarily emphasize?", "back": "Orthopraxy (correct practice)."}, {"front": "What is the fundamental question in Judaism regarding one's religious life?", "back": "\"What do you do?\""}, {"front": "What is the Hebrew term for the commandments in Judaism?", "back": "Mitzvot"}, {"front": "How is a Jew who observes the mitzvot but struggles with doubt classified in the faith?", "back": "Observant"}, {"front": "In Judaism, how is belief typically 'performed' or enacted in the world?", "back": "Through action, ritual, and the treatment of others."}, {"front": "Name four groups the text identifies as requiring special treatment to enact Jewish belief.", "back": "The poor, the stranger, the widow, and the orphan."}, {"front": "What is the Jewish view on the timeline of revelation?", "back": "It is ongoing and did not end with Moses."}, {"front": "Which Jewish text is described as a compendium of rabbinic discussion spanning several centuries?", "back": "The Talmud"}, {"front": "The _____ is the component of revelation preserved and developed within the Talmud.", "back": "Oral Torah"}, {"front": "Who is the biblical ancestor whose struggle with God serves as a model for wrestling with the text?", "back": "Jacob"}, {"front": "In the Jewish tradition, what is the prerequisite for receiving a blessing when wrestling with God or the text?", "back": "Refusing to let go."}, {"front": "Which concept describes a relationship where God is a partner rather than a doctrine?", "back": "Covenant (brit)"}, {"front": "How does Judaism view the status of a Jew who has perfect beliefs but ignores the mitzvot?", "back": "They are considered \"something else entirely\" rather than observant."}, {"front": "What differentiates a covenant's longevity from a contract's longevity?", "back": "A covenant persists after transactions are complete, whereas a contract ends when the transaction is finished."}, {"front": "The Shema declares that 'the LORD our God is _____ LORD'.", "back": "One"}, {"front": "What physical action does the Shema prescribe for ensuring children learn the faith?", "back": "Teaching them diligently."}, {"front": "What is the primary role of the Oral Torah in relation to the revelation at Sinai?", "back": "It is understood as an integral part of that same revelation."}, {"front": "Judaism is structured around the _____ of faith in daily life rather than just internal assent.", "back": "Embodiment"}, {"front": "What was the significance of the first question Moses asked God in Exodus?", "back": "It established a relationship through the sharing of a name."}, {"front": "The Shema's instructions to talk about the words when sitting, walking, lying down, and rising indicate that faith should be part of _____.", "back": "Daily life"}, {"front": "Concept: Oral Torah", "back": "Definition: The ongoing revelation of God developed through centuries of rabbinic discussion and recorded in the Talmud."}, {"front": "Which attribute of God's name 'Ehyeh asher ehyeh' implies a presence that continues into the future?", "back": "\"I will be what I will be.\""}, {"front": "What term describes the condition of a bond that can be 'renewed, tested, broken, and repaired'?", "back": "The covenant (brit)."}, {"front": "According to the text, what is the fundamental question 'in much of Christianity' that contrasts with the Jewish focus on action?", "back": "\"Do you believe?\""}, {"front": "The instruction to 'bind them for a sign upon thine hand' refers to what specific words?", "back": "The commands and words of the Shema."}, {"front": "How is the Talmud characterized in terms of its content?", "back": "As a compendium of rabbinic discussion."}, {"front": "In the Jewish tradition, wrestling with the text is seen as an act that leads to a _____.", "back": "Blessing"}, {"front": "What is the relationship between the covenant and the formation of am Yisrael?", "back": "The covenant at Sinai created the people of Israel."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
