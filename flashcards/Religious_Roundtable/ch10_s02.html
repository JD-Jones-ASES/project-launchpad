<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 10, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Jewish faith primarily begin, according to the text?", "back": "It begins with a name and a relationship with God, rather than a definition or proposition."}, {"front": "What is the significance of God's name, 'Ehyeh asher ehyeh,' revealed to Moses?", "back": "It is famously difficult to translate, meaning 'I am that I am' or 'I will be what I will be,' signifying God as a presence to be encountered and a partner in a covenant."}, {"front": "What is the foundational concept of Jewish faith?", "back": "The covenant (brit), a binding agreement between God and the people of Israel."}, {"front": "Distinguish between a 'covenant' and a 'contract' in the context of Judaism.", "back": "A contract is transactional and concludes upon completion of obligations, whereas a covenant is relational, creating a persistent bond that endures through time, failure, and repair."}, {"front": "What was the immediate impact of the covenant at Sinai on the people of Israel?", "back": "It not only gave Israel a law (Torah) but also forged them into a distinct people ('am Yisrael')."}, {"front": "Define the Hebrew term 'brit' in the context of Jewish faith.", "back": "Brit means a binding agreement with mutual obligations, specifically referring to the covenant between God and Israel, central to their faith."}, {"front": "What is at the heart of the covenant made at Sinai?", "back": "God's commitment to be Israel's God, to guide and protect them, and Israel's reciprocal obligation to follow the Torah (divine instruction). This relationship defines Jewish faith."}, {"front": "Identify the most important sentence in all of Judaism, according to the text, and its scriptural source.", "back": "'Hear, O Israel: The LORD our God is one LORD' (Deuteronomy 6:4), which is the opening line of the Shema."}, {"front": "What is the 'Shema' and how is it observed in Jewish practice?", "back": "The Shema is a passage from Deuteronomy 6:4-9, recited by observant Jews twice daily (upon waking and before sleeping) and traditionally as the last prayer before death."}, {"front": "How does the Shema differ from a Christian creed?", "back": "It is not a creed listing doctrines to be accepted, but rather a declaration of relationship with God and an expression of love for this one God."}, {"front": "What is the central emphasis of Jewish religious thought regarding faith and practice?", "back": "Judaism places a primary emphasis on orthopraxy (correct practice) rather than orthodoxy (correct belief)."}, {"front": "How does the fundamental question in Judaism differ from that often asked in Christianity?", "back": "In Judaism, the fundamental question is 'What do you do?' (concerning actions and observance), while in much of Christianity, it's 'Do you believe?'"}, {"front": "Explain the concept of 'orthopraxy'.", "back": "Orthopraxy means correct practice, highlighting the importance of actions, rituals, and the embodiment of faith in daily life as central to religious observance."}, {"front": "How is belief understood in Judaism, despite its emphasis on orthopraxy?", "back": "Belief is not unimportant, but it is primarily enacted or performed through actions, rituals, and the ethical treatment of others, such as the poor, the stranger, the widow, and the orphan."}, {"front": "What is meant by the 'embodiment of faith in daily life' in Judaism?", "back": "It means integrating religious principles and commandments (mitzvot) into everyday actions, speech, and interactions, as instructed in the Shema to teach, talk about, bind, and write sacred words."}, {"front": "How is revelation understood in Judaism, particularly regarding its timeline?", "back": "Revelation is considered ongoing, not having ended with Moses, but continuing in every generation through those who engage with and interpret sacred texts."}, {"front": "What is the 'Oral Torah,' and how does it relate to revelation?", "back": "The Oral Torah, preserved and developed in the Talmud, is understood as an integral part of God's revelation at Sinai and is considered an ongoing aspect of divine instruction."}, {"front": "What is the 'Talmud'?", "back": "The Talmud is a comprehensive compendium of rabbinic discussion spanning several centuries, which serves to preserve and develop the Oral Torah."}, {"front": "According to Jewish thought, what characterizes an 'observant' Jew?", "back": "An observant Jew is one who observes the commandments (mitzvot), even if they experience struggles with doubt regarding their beliefs."}, {"front": "List some examples from the Shema of how Jews are instructed to integrate their faith into daily life.", "back": "Teach these words diligently to children, talk about them at home and on the road, bind them for a sign upon the hand, and write them on the posts of the house and gates."}, {"front": "What is the Hebrew term for commandments, and why are they significant in Jewish practice?", "back": "The Hebrew term is 'mitzvot.' They are significant because observance of mitzvot is central to orthopraxy and defines an observant Jew, enacting belief through concrete actions."}, {"front": "How has the covenant between God and Israel persisted throughout history?", "back": "The covenant has been renewed, tested, broken, and repaired across thousands of years, demonstrating its enduring and relational nature despite historical challenges."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
