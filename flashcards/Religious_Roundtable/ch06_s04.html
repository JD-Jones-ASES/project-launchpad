<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 6, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the two foundational texts of Taoism?", "back": "The Tao Te Ching and the Chuang Tzu."}, {"front": "Who is the traditionally attributed author of the \"Tao Te Ching\"?", "back": "Laozi"}, {"front": "The title \"Tao Te Ching\" is translated as \"The Classic of the Way and Its _____.\"", "back": "Power"}, {"front": "Approximately when was the \"Tao Te Ching\" likely compiled?", "back": "Between the 6th and 4th centuries BCE."}, {"front": "How many chapters comprise the \"Tao Te Ching\"?", "back": "Eighty-one"}, {"front": "The \"Tao Te Ching\" alternates between which two main thematic focuses?", "back": "The cosmic and the political."}, {"front": "How does the \"Tao Te Ching\" describe the Tao in a cosmic sense?", "back": "The silent ground of all being."}, {"front": "According to the \"Tao Te Ching\", how should a ruler govern wisely?", "back": "By doing less."}, {"front": "Term: Te.", "back": "Definition: The nature of virtue."}, {"front": "What literary style is famously used in the \"Tao Te Ching\" to unsettle conventional thinking?", "back": "Paradox"}, {"front": "In the paradoxes of the \"Tao Te Ching\", what is the result of \"knowing others\"?", "back": "Intelligence"}, {"front": "According to the \"Tao Te Ching\", what is the definition of \"true wisdom\"?", "back": "Knowing yourself."}, {"front": "In Taoist thought, what is required to overcome others?", "back": "Force"}, {"front": "In Taoist thought, what is required to overcome yourself?", "back": "Strength"}, {"front": "What is the primary pedagogical purpose of the paradoxes found in the \"Tao Te Ching\"?", "back": "To unsettle the mind's habit of grabbing for easy answers."}, {"front": "Which sacred text is the second most translated book in history?", "back": "The Tao Te Ching."}, {"front": "Who is the attributed author of the \"Chuang Tzu\"?", "back": "Zhuangzi"}, {"front": "During which century BCE was the philosopher Zhuangzi active?", "back": "The 4th century BCE."}, {"front": "What literary forms are included in the \"Chuang Tzu\" collection?", "back": "Essays, parables, dialogues, and philosophical arguments."}, {"front": "How does the tone of the \"Chuang Tzu\" differ from the \"Tao Te Ching\"?", "back": "It can be comic, lyrical, or vertiginously strange."}, {"front": "Which famous story in the \"Chuang Tzu\" features a butcher whose knife never dulls?", "back": "The story of Cook Ding."}, {"front": "In the story of Cook Ding, how does the butcher cut the animal?", "back": "He cuts between the joints, exactly as the Tao moves between all things."}, {"front": "Cook Ding's effortless mastery of his craft is described as _____ in action.", "back": "Wu wei"}, {"front": "Concept: Wu wei.", "back": "Definition: Living or acting in effortless harmony with the Way."}, {"front": "What does the \"Chuang Tzu\" aim to explore regarding human cognition?", "back": "The limitations of conventional thinking."}, {"front": "According to the \"Chuang Tzu\", what is available to those who live in harmony with the Way?", "back": "Freedom"}, {"front": "What is the \"Daozang\"?", "back": "The Taoist Canon, consisting of hundreds of volumes of religious texts."}, {"front": "List three types of texts found within the \"Daozang\".", "back": "Ritual manuals, meditation guides, and alchemical texts."}, {"front": "Besides ritual and meditation, what scientific fields are addressed in the \"Daozang\"?", "back": "Cosmology and medicine."}, {"front": "Why do translations of the \"Tao Te Ching\" often differ dramatically?", "back": "Classical Chinese allows multiple readings of almost every line."}, {"front": "Which 19th-century translator's work is commonly used for the \"Tao Te Ching\" because it is in the public domain?", "back": "James Legge"}, {"front": "In the context of the \"Tao Te Ching\", how should paradoxes be treated by the practitioner?", "back": "As practices to be sat with rather than puzzles to be solved."}, {"front": "What does Cook Ding find that allows his knife to pass through the animal without dulling?", "back": "The space that is already there."}, {"front": "The foundational philosophical core shared by all Taoist traditions is represented by which two texts?", "back": "The Tao Te Ching and the Chuang Tzu."}, {"front": "Term: Tao.", "back": "Definition: The Way; the foundational principle and silent ground of all being."}, {"front": "What is the romanized alternative name for the \"Tao Te Ching\"?", "back": "Daodejing"}, {"front": "The \"Chuang Tzu\" is also known by which name?", "back": "Zhuangzi"}, {"front": "How are the eighty-one chapters of the \"Tao Te Ching\" physically characterized?", "back": "They are short, with some barely a paragraph long."}, {"front": "What does the story of Cook Ding illustrate about the movement of the Tao?", "back": "The Tao moves between all things like a knife between joints."}, {"front": "What is the primary language used in the original foundational texts of Taoism?", "back": "Classical Chinese"}, {"front": "Which Taoist text is described as a collection of essays and parables?", "back": "The Chuang Tzu."}, {"front": "In the \"Tao Te Ching\", knowing others is associated with _____, whereas knowing oneself is true wisdom.", "back": "Intelligence"}, {"front": "The term \"Daozang\" is literally referred to as the Taoist \"_____.\"", "back": "Canon"}, {"front": "True or False: The \"Tao Te Ching\" is the most translated book in history.", "back": "False (it is the second most translated after the Bible)."}, {"front": "According to the \"Chuang Tzu\", living in harmony with the Way provides a sense of _____.", "back": "Freedom"}, {"front": "What specific advice does the \"Tao Te Ching\" offer regarding political leadership?", "back": "Governing by doing less."}, {"front": "In the \"Tao Te Ching\", \"_____ yourself takes strength.\"", "back": "Overcoming"}, {"front": "Which text uses humor to explore the nature of the Tao?", "back": "The Chuang Tzu."}, {"front": "What is the focus of alchemical texts found in the \"Daozang\"?", "back": "They are part of the vast collection of ritual and spiritual manuals in the Taoist Canon."}, {"front": "What allows a practitioner to locate a specific passage in any edition of the \"Tao Te Ching\"?", "back": "Citing both the chapter number and the opening line."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
