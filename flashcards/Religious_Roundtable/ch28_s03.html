<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 28, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is identified as the primary text of Christianity?", "back": "The Holy Bible (King James Version, 1611)"}, {"front": "Which Gospel is recommended as the shortest and most immediate starting point for Christianity?", "back": "The Gospel of Mark"}, {"front": "Along with the Gospel of Mark, which New Testament book is suggested for understanding the theological core of Christianity?", "back": "Paul's Letter to the Romans"}, {"front": "Who authored the 1952 book 'Mere Christianity', which originated from radio broadcasts?", "back": "C.S. Lewis"}, {"front": "What is the title of Diarmaid MacCulloch’s comprehensive historical source on Christianity published in 2009?", "back": "A History of Christianity: The First Three Thousand Years"}, {"front": "The primary text of Judaism is the _____, also known as the Five Books of Moses.", "back": "Torah"}, {"front": "Which book of the Torah is recommended for its narrative of the flight from Egypt and the giving of the Law at Sinai?", "back": "Exodus"}, {"front": "Which translation of the Torah, published in 1985, is noted for being widely praised?", "back": "The Jewish Publication Society (JPS) translation"}, {"front": "Who wrote 'Living a Jewish Life' (1991) as an introduction to practice and belief for non-specialists?", "back": "Anita Diamant"}, {"front": "Which comprehensive reference book by Joseph Telushkin covers Jewish history, religion, and culture?", "back": "Jewish Literacy"}, {"front": "What is the primary text of Islam?", "back": "The Quran"}, {"front": "Which translation of the Quran (Oxford World’s Classics, 2004) is recommended for its clarity?", "back": "The Abdel Haleem translation"}, {"front": "To understand the theological foundations of Islam, which two Suras are recommended as starting points?", "back": "Sura 1 (Al-Fatiha) and Sura 2 (Al-Baqara)"}, {"front": "Who is the author of the 1991 biography 'Muhammad', which details the emergence of Islam?", "back": "Karen Armstrong"}, {"front": "What is the title of Reza Aslan’s 2005 introduction to the origins and evolution of Islam?", "back": "No god but God"}, {"front": "What is the primary text of Hinduism listed in the source material?", "back": "Bhagavad Gita"}, {"front": "Which translator produced the 'beautifully rendered' 1986 Bantam Classics version of the Bhagavad Gita?", "back": "Barbara Stoler Miller"}, {"front": "In the Bhagavad Gita, which specific chapter is cited as containing the philosophical heart of the text?", "back": "Chapter 2"}, {"front": "Whose book 'The World’s Religions' contains a chapter on Hinduism noted as one of the clearest introductions available?", "back": "Huston Smith"}, {"front": "Who is the author of the detailed and sometimes controversial 'The Hindus: An Alternative History' (2009)?", "back": "Wendy Doniger"}, {"front": "Term: Dhammapada", "back": "Definition: The primary text of Buddhism, consisting of a collection of the Buddha’s sayings in verse."}, {"front": "Which scholar translated the 1881 version of the Dhammapada mentioned in the text?", "back": "F. Max Müller"}, {"front": "Which Vietnamese Zen master wrote 'The Heart of the Buddha’s Teaching'?", "back": "Thich Nhat Hanh"}, {"front": "Thich Nhat Hanh’s introduction to Buddhism focuses on the Eightfold Path and the _____.", "back": "Four Noble Truths"}, {"front": "Who wrote the scholarly introduction 'What the Buddha Taught' (1959)?", "back": "Walpola Rahula"}, {"front": "What is the primary text of Taoism, traditionally attributed to Laozi?", "back": "Tao Te Ching"}, {"front": "Which 1988 translation of the Tao Te Ching is described as poetic and widely read?", "back": "The Stephen Mitchell translation"}, {"front": "How many chapters are contained in the primary text of Taoism, the Tao Te Ching?", "back": "81"}, {"front": "What is the second great Taoist classic mentioned in the text?", "back": "Chuang Tzu"}, {"front": "Which specific story in Chapter 3 of the Chuang Tzu is recommended for beginners?", "back": "The Cook and the Ox"}, {"front": "Who translated the version of the Chuang Tzu published in 1964?", "back": "Burton Watson"}, {"front": "Alan Watts’ book 'The Way of Zen' covers which two Eastern traditions?", "back": "Taoism and Zen Buddhism"}, {"front": "What is the primary text of Confucianism?", "back": "The Analects"}, {"front": "Which translator produced the Penguin Classics version of 'The Analects' (1979)?", "back": "D.C. Lau"}, {"front": "Which books of 'The Analects' are suggested as the best starting point for readers?", "back": "Books 1, 2, and 4"}, {"front": "Who wrote the 2015 biography and cultural history titled 'Confucius'?", "back": "Michael Schuman"}, {"front": "What is the primary poetic text of Norse Paganism?", "back": "The Poetic Edda"}, {"front": "Which section of the Poetic Edda covers the themes of creation and doom?", "back": "Völuspá"}, {"front": "Which section of the Poetic Edda contains the 'practical wisdom of Odin'?", "back": "Hávamál"}, {"front": "Who is the author/compiler of 'The Prose Edda'?", "back": "Snorri Sturluson"}, {"front": "Which section of the 'Prose Edda' is recommended for understanding the Norse cosmos?", "back": "Gylfaginning"}, {"front": "Who wrote the 2017 'vivid, accessible retelling' of major Norse myths?", "back": "Neil Gaiman"}, {"front": "Which author wrote the standard English-language reference 'Norse Mythology: A Guide to the Gods, Heroes, Rituals, and Beliefs'?", "back": "John Lindow"}, {"front": "What is the primary text of Communism authored by Marx and Engels in 1848?", "back": "The Communist Manifesto"}, {"front": "Who provided the 1888 translation of 'The Communist Manifesto' mentioned in the source?", "back": "Samuel Moore"}, {"front": "Which work by Karl Marx is the source of his philosophical concept of alienation?", "back": "Economic and Philosophic Manuscripts of 1844"}, {"front": "Who is the author of the 'lively, balanced' biography titled 'Karl Marx' (2000)?", "back": "Francis Wheen"}, {"front": "What is the title of Karl Marx's masterwork, the first volume of which was published in 1867?", "back": "Das Kapital"}, {"front": "In 'Das Kapital', Chapter 1 focuses on the topic of _____.", "back": "Commodities"}, {"front": "In 'Das Kapital', Chapter 10 is titled 'The _____'.", "back": "Working Day"}, {"front": "Which text is described as the 'second great Taoist classic' and is known for being 'witty, paradoxical, and surprisingly funny'?", "back": "Chuang Tzu"}, {"front": "Ivanhoe and Van Norden edited which anthology of key Confucian and related texts?", "back": "Readings in Classical Chinese Philosophy"}, {"front": "The translation of the 'Prose Edda' by Rasmus B. Anderson (1901) is available in the _____.", "back": "Public domain"}, {"front": "Approximately how long is 'The Communist Manifesto' in its standard form?", "back": "40 pages"}, {"front": "The primary text for Buddhism, the Dhammapada, is a collection of sayings written in which literary form?", "back": "Verse"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
