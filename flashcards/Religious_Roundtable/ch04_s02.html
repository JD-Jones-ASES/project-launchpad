<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary misconception regarding the way Hindus interact with their pantheon of gods?", "back": "That Hindus worship all gods within the pantheon equally."}, {"front": "In Hindu philosophy, what does the mountain metaphor illustrate about spiritual paths?", "back": "Many different paths, followed sincerely, lead to the same summit."}, {"front": "How does a practitioner of one Hindu stream typically relate to the deities of a different stream?", "back": "They view them as real but less central to their own spiritual life."}, {"front": "Which devotional tradition of Hinduism is centered on Vishnu, the sustainer and preserver?", "back": "Vaishnavism."}, {"front": "Concept: Avatar", "back": "Definition: A divine descent into human or animal form to restore cosmic order. Example: Rama or Krishna."}, {"front": "In the Vaishnava tradition, what is the primary purpose of an avatar's descent?", "back": "To restore cosmic order when it is threatened."}, {"front": "Which two figures are considered the most beloved avatars of Vishnu?", "back": "Rama and Krishna."}, {"front": "Who is the Vaishnava avatar described as the \"divine king\"?", "back": "Rama."}, {"front": "Who is the Vaishnava avatar described as the \"teacher of the Bhagavad Gita\"?", "back": "Krishna."}, {"front": "Vaishnavism emphasizes _____ as the primary path to achieving moksha.", "back": "bhakti (devotional love)."}, {"front": "Term: Bhakti", "back": "Definition: The path of devotional love and surrender to God."}, {"front": "In Vaishnava practice, where is a devotee expected to see the face of God?", "back": "In every human being."}, {"front": "Which stream of Hinduism is currently the largest worldwide?", "back": "Vaishnavism."}, {"front": "Which Hindu tradition centers on a paradoxical deity who is both destroyer and regenerator?", "back": "Shaivism."}, {"front": "According to Shaiva theology, why is the dissolution of the universe necessary?", "back": "So that the universe can be recreated."}, {"front": "Which deity represents the paradox of being simultaneously an ascetic and a householder?", "back": "Shiva."}, {"front": "Besides being the god of death, Shiva is also recognized as the god of _____.", "back": "yoga."}, {"front": "What do Shaivas emphasize as the primary means of recognizing the divine within?", "back": "Ascetic practice and yogic discipline."}, {"front": "Where do Shaivas believe the divine is primarily accessible?", "back": "Within the self, rather than in a distant heaven."}, {"front": "What specific mental technique do Shaivas use to access the divine?", "back": "Meditation and the stilling of the mind."}, {"front": "Which stream of Hinduism focuses on the Divine Feminine and her various forms?", "back": "Shaktism."}, {"front": "Concept: Shakti", "back": "Definition: The creative, energizing, and active force of the universe."}, {"front": "In Shaktism, how are goddesses like Durga, Kali, and Lakshmi viewed in relation to one another?", "back": "As different aspects of a single divine power (Shakti)."}, {"front": "How does the Shaktism view of ultimate reality differ from a transcendent male god?", "back": "It views reality as a dynamic, maternal divine energy."}, {"front": "What is the specific theological meditation behind the fierce image of the goddess Kali?", "back": "A meditation on the power that drives transformation."}, {"front": "Describe the traditional iconography of the goddess Kali.", "back": "Fierce and dark, dancing on the corpse of Shiva."}, {"front": "Term: Henotheism", "back": "Definition: Worshipping one god as supreme while acknowledging that other gods are real and exist."}, {"front": "How does henotheism differ from polytheism?", "back": "Henotheism holds one god as supreme, while polytheism views gods as roughly equal."}, {"front": "How does henotheism differ from monotheism?", "back": "Henotheism acknowledges the existence of other gods, while monotheism denies them."}, {"front": "Why is henotheism considered a \"theologically flexible\" position for Hinduism?", "back": "It allows the tradition to absorb many different paths without destroying them."}, {"front": "Which major festival is celebrated by Hindus, Sikhs, Jains, and some Buddhists?", "back": "Diwali (the Festival of Lights)."}, {"front": "In the Vaishnava tradition, what specific event does Diwali commemorate?", "back": "The return of Rama after his victory over the demon Ravana."}, {"front": "What event does Diwali celebrate for practitioners of Jainism?", "back": "The enlightenment of Mahavira."}, {"front": "How is the phrase \"one festival, many meanings\" applied to Hindu practice?", "back": "It describes how different traditions celebrate unique events through the same shared festival."}, {"front": "List three specific aspects of the Divine Feminine recognized in Shaktism.", "back": "Devi, Durga, and Kali (or Lakshmi and Saraswati)."}, {"front": "Which Hindu stream emphasizes that the divine is accessed through meditation and the stilling of the mind?", "back": "Shaivism."}, {"front": "In the context of the mountain metaphor, why might people at different points not see each other?", "back": "They are on different paths, but all lead to the same summit."}, {"front": "Which deity is the center of the largest stream of Hinduism?", "back": "Vishnu."}, {"front": "What term is used for the \"active force of the universe\" in Shaktism?", "back": "Shakti."}, {"front": "For a Shaiva, destruction is considered a necessary precursor to _____.", "back": "renewal."}, {"front": "The demon defeated by Rama, whose return is celebrated at Diwali, is named _____.", "back": "Ravana."}, {"front": "How does a Vaishnava view the status of Shiva in relation to Vishnu?", "back": "As a real deity, but less central than Vishnu (the highest manifestation)."}, {"front": "What does Shaktism describe as \"dancing through all creation\"?", "back": "A dynamic, maternal divine energy."}, {"front": "What is the primary focus of the devotional tradition known as Vaishnavism?", "back": "Devotional love (bhakti) centered on Vishnu and his avatars."}, {"front": "Which Hindu stream is most likely to emphasize yogic discipline and asceticism?", "back": "Shaivism."}, {"front": "In Shaivism, the god of death is also the god of _____.", "back": "yoga."}, {"front": "What role does Vishnu play in the cosmic cycle?", "back": "Sustainer and preserver of the universe."}, {"front": "Who is the central figure of the Bhagavad Gita within Vaishnavism?", "back": "Krishna."}, {"front": "Which goddess represents the \"creative, energizing, active force\" in the Shaktism tradition?", "back": "Shakti (or Devi)."}, {"front": "What is the common scholarly term for worshipping one supreme god while acknowledging others?", "back": "Henotheism."}, {"front": "True or False: Henotheism is the same as monotheism because only one god is worshipped as supreme.", "back": "False, because henotheism acknowledges that other gods exist and are real."}, {"front": "In Vaishnavism, what is the ultimate goal or liberation called?", "back": "Moksha."}, {"front": "Which Hindu stream views the ultimate reality as a maternal divine energy?", "back": "Shaktism."}, {"front": "Which deity is described as an \"ascetic and householder\"?", "back": "Shiva."}, {"front": "The metaphor of the mountain implies that different spiritual paths are _____.", "back": "equally valid when followed sincerely."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
