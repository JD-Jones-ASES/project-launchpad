<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what year and city was Muhammad ibn Abdullah born?", "back": "He was born around 570 in the city of Mecca."}, {"front": "Which tribe was responsible for the guardianship of the Ka'ba in Mecca?", "back": "The Quraysh tribe."}, {"front": "Term: Al-Amin", "back": "Definition: A nickname given to Muhammad meaning \"the trustworthy.\""}, {"front": "Who was the first person to believe in Muhammad’s prophetic message?", "back": "His wife, Khadijah."}, {"front": "According to Muslim tradition, where did Muhammad experience the first divine revelation?", "back": "In a cave on Mount Hira outside of Mecca."}, {"front": "In the year 610, which angel appeared to Muhammad to command him to recite?", "back": "The angel Gabriel, known as Jibril in Arabic."}, {"front": "The Arabic word for reciting or reading aloud, from the same root as Quran, is _____.", "back": "iqra'"}, {"front": "How many years did the divine revelations to Muhammad continue until his death?", "back": "Twenty-three years."}, {"front": "What was the central monotheistic message Muhammad began preaching publicly around 613?", "back": "That there was only one God, known in Arabic as Allah."}, {"front": "Why did the wealthy merchants of Mecca find Muhammad's message threatening?", "back": "It challenged their polytheistic beliefs and asserted that the rich had obligations to the poor."}, {"front": "In 615, where did a group of early Muslims flee to seek protection from persecution?", "back": "Christian Ethiopia."}, {"front": "Term: Hijra", "back": "Definition: The migration of Muhammad and his followers from Mecca to Medina in 622."}, {"front": "What event marks the beginning of the Islamic calendar?", "back": "The Hijra in 622."}, {"front": "Term: Ummah", "back": "Definition: The community of all Muslim believers, understood as a single spiritual family."}, {"front": "Which document organized the various tribes of Medina under a common framework in 622?", "back": "The Constitution of Medina."}, {"front": "What roles did Muhammad take on in Medina that differed from his role as a preacher in Mecca?", "back": "He became a statesman and lawgiver."}, {"front": "In what year did the Battle of Badr take place?", "back": "624"}, {"front": "In what year did the Battle of Uhud take place?", "back": "625"}, {"front": "The defensive battle fought by the Muslim community in 627 is known as the Battle of the _____.", "back": "Trench"}, {"front": "What action did Muhammad take at the Ka'ba upon returning to Mecca in 630?", "back": "He cleansed it of idols and rededicated it to the one God."}, {"front": "According to Islamic belief, who originally built the Ka'ba?", "back": "Abraham and his son Ishmael."}, {"front": "In what city did Muhammad die in 632?", "back": "Medina"}, {"front": "The Arabic root s-l-m, from which the name Islam is derived, means _____.", "back": "Peace, safety, and wholeness."}, {"front": "What is the literal meaning of the word \"Muslim\"?", "back": "One who makes surrender or submission to God."}, {"front": "What does the greeting \"As-salamu alaykum\" mean in English?", "back": "Peace be upon you."}, {"front": "The Hebrew word for peace that shares the same Semitic root as \"salam\" is _____.", "back": "shalom"}, {"front": "Who raised Muhammad after the deaths of his father and mother?", "back": "His uncle, Abu Talib."}, {"front": "By what age was Muhammad orphaned of both parents?", "back": "Six years old."}, {"front": "What was Muhammad's primary profession as a young man in Mecca?", "back": "He worked as a merchant."}, {"front": "Approximately how many miles was the journey of the Hijra from Mecca to Medina?", "back": "About 250 miles."}, {"front": "Which groups besides Muslims were included in the Constitution of Medina?", "back": "Jewish and pagan tribes."}, {"front": "What was the previous name of the city renamed Medina?", "back": "Yathrib"}, {"front": "What are three regions Islam spread to within a century of Muhammad's death?", "back": "Persia, Egypt, and North Africa."}, {"front": "What did Muhammad warn the wealthy merchants about regarding the afterlife?", "back": "The coming of a Day of Judgment."}, {"front": "What was the geographical center of Islamic worship established after 630?", "back": "The Ka'ba."}, {"front": "How did the Meccan elite respond to the early Muslim message?", "back": "They responded with persecution, including beatings, boycotts, and killings."}, {"front": "In whose arms did Muhammad pass away in 632?", "back": "His wife Aisha."}, {"front": "What was the status of a successor when Muhammad died?", "back": "He left no designated successor."}, {"front": "Concept: The First Diaspora", "back": "Definition: The 615 flight of early Muslims to Ethiopia to escape Meccan persecution."}, {"front": "What core social teaching of Muhammad emphasized the relationship between the rich and poor?", "back": "The teaching that the rich had obligations to the poor."}, {"front": "The Arabic word for God, used by Muslims, Arab Christians, and Jews alike, is _____.", "back": "Allah"}, {"front": "Who was the King of Ethiopia who granted protection to early Muslims?", "back": "The Negus."}, {"front": "What physical structure is described as a sacred cube-shaped shrine in Mecca?", "back": "The Ka'ba."}, {"front": "The Ummah is intended to transcend boundaries of tribe, nationality, and _____.", "back": "race"}, {"front": "In what year did Muhammad return to Mecca with a large army?", "back": "630"}, {"front": "Which specific Arabian peninsula city was the site of Muhammad's birth?", "back": "Mecca"}, {"front": "Muhammad's wife Khadijah was _____ years his senior.", "back": "fifteen"}, {"front": "What was the formative test of faith remembered by the early Muslim community?", "back": "The suffering and persecution they endured in Mecca."}, {"front": "In which city did much of Islamic law and practice first take its formative shape?", "back": "Medina"}, {"front": "Within how many years of Muhammad's death did Islam reach Spain and Central Asia?", "back": "Within one century."}, {"front": "What was the character of the city of Mecca's surrender to Muhammad in 630?", "back": "It surrendered with almost no bloodshed."}, {"front": "To whom is the name \"Al-Amin\" attributed?", "back": "Muhammad ibn Abdullah."}, {"front": "How did Muhammad's father's death relate to Muhammad's birth?", "back": "His father died before his birth."}, {"front": "Where did Muhammad regularly retreat to pray and meditate before his first revelation?", "back": "A cave on Mount Hira."}, {"front": "Which specific event is regarded by Muslims as the beginning of divine revelation?", "back": "The appearance of the angel Gabriel to Muhammad in 610."}, {"front": "Which major monotheistic figures are credited by Muslims with building the Ka'ba?", "back": "Abraham and Ishmael."}, {"front": "What was the significance of the Constitution of Medina for non-Muslims?", "back": "It organized Jewish and pagan tribes alongside Muslims under a common framework."}, {"front": "What was the nickname given to Muhammad for his reputation as a merchant?", "back": "Al-Amin (The Trustworthy)."}, {"front": "What is the primary meaning of the Arabic root s-l-m?", "back": "Peace, safety, and wholeness."}, {"front": "In the context of the Hijra, what does the city name Medina signify?", "back": "It was the city Yathrib, where Muhammad established the first Muslim community."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
