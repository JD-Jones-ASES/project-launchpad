<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Around what year was Muhammad born in the city of Mecca?", "back": "570"}, {"front": "To which tribe, known as the guardians of the Ka'ba, did Muhammad's family belong?", "back": "The Quraysh tribe"}, {"front": "Who raised Muhammad after the deaths of his father and mother?", "back": "His uncle Abu Talib"}, {"front": "What profession did Muhammad practice as a young man before his prophetic mission?", "back": "Merchant"}, {"front": "Term: Al-Amin", "back": "Definition: A nickname meaning \"the trustworthy\" given to Muhammad for his honesty."}, {"front": "Who was Muhammad's first wife and the first person to believe his prophetic message?", "back": "Khadijah"}, {"front": "Where did Muhammad regularly retreat to pray and meditate before his first revelation?", "back": "A cave on Mount Hira"}, {"front": "In what year did Muslims believe Muhammad received his first divine revelation?", "back": "610"}, {"front": "Which angel is credited with appearing to Muhammad to deliver the divine revelations?", "back": "Gabriel (Jibril)"}, {"front": "What was the specific first command given to Muhammad by the angel Gabriel?", "back": "Recite (iqra')"}, {"front": "The Arabic word \"iqra'\" means to _____ or read aloud.", "back": "recite"}, {"front": "Over how many years were the divine revelations transmitted to Muhammad?", "back": "23 years"}, {"front": "In what year did Muhammad begin preaching his message publicly in Mecca?", "back": "613"}, {"front": "What was the central theological claim of Muhammad's preaching that threatened Meccan merchants?", "back": "There is only one God (Allah)."}, {"front": "What social obligation did Muhammad's Meccan message emphasize regarding wealth?", "back": "The rich had obligations to the poor."}, {"front": "In 615, where did a group of early Muslims flee to seek protection from Meccan persecution?", "back": "Christian Ethiopia"}, {"front": "What was the title of the king of Ethiopia who granted protection to the first Muslim diaspora?", "back": "The Negus"}, {"front": "The migration of Muhammad and his followers from Mecca to Medina in 622 is called the _____.", "back": "Hijra"}, {"front": "What was the original name of the city of Medina before Muhammad's migration?", "back": "Yathrib"}, {"front": "Why is the year 622 significant for the Islamic calendar?", "back": "It is the year from which the Islamic calendar is calculated."}, {"front": "In Medina, Muhammad transitioned from being just a preacher to becoming a _____ and lawgiver.", "back": "statesman"}, {"front": "Term: Ummah", "back": "Definition: The community of all Muslim believers, understood as a single spiritual family."}, {"front": "What was the name of the agreement that organized Medina's Muslim, Jewish, and pagan tribes?", "back": "The Constitution of Medina"}, {"front": "In which city did much of Islamic law and practice take its formative shape?", "back": "Medina"}, {"front": "What was the first major battle (624) between the community in Medina and the Meccans?", "back": "The Battle of Badr"}, {"front": "What was the name of the battle that occurred in 625 between Mecca and Medina?", "back": "The Battle of Uhud"}, {"front": "What conflict occurred in 627 between the Meccan forces and the Medina community?", "back": "The Battle of the Trench"}, {"front": "In what year did Muhammad return to Mecca at the head of a large army?", "back": "630"}, {"front": "Upon returning to Mecca, what symbolic act did Muhammad perform at the Ka'ba?", "back": "He cleansed it of idols and rededicated it to the one God."}, {"front": "According to Muslim belief, which two figures originally built the Ka'ba?", "back": "Abraham and his son Ishmael"}, {"front": "What structure serves as the geographical center of Islamic worship worldwide?", "back": "The Ka'ba"}, {"front": "In what year did Muhammad die?", "back": "632"}, {"front": "In whose arms did Muhammad die in Medina?", "back": "His wife Aisha"}, {"front": "What leadership crisis emerged immediately following Muhammad's death?", "back": "He left no designated successor."}, {"front": "Within a century of Muhammad's death, Islam had spread as far west as North Africa and _____.", "back": "Spain"}, {"front": "The name \"Islam\" is derived from the Arabic root s-l-m, which means _____.", "back": "peace, safety, and wholeness"}, {"front": "Concept: Muslim", "back": "Definition: One who makes \"islam\" (surrender or submission) to God."}, {"front": "What is the English translation of the greeting \"As-salamu alaykum\"?", "back": "Peace be upon you"}, {"front": "Which Hebrew word shares the same ancient Semitic root as the Arabic word \"Islam\"?", "back": "Shalom"}, {"front": "Which specific Meccan social class found Muhammad's message of equality and monotheism most threatening?", "back": "The wealthy, polytheistic merchants"}, {"front": "The _____ is a sacred cube-shaped shrine in Mecca that was a pilgrimage site even before Islam.", "back": "Ka'ba"}, {"front": "What is the common Arabic word for God used by Muslims, Arab Christians, and Jews alike?", "back": "Allah"}, {"front": "How long was the age gap between Muhammad and his first wife Khadijah?", "back": "Fifteen years"}, {"front": "Beyond tribe and race, what is the primary basis for unity in the Muslim ummah?", "back": "A single spiritual family of all believers"}, {"front": "What future event did Muhammad warn of during his early preaching in Mecca?", "back": "A Day of Judgment"}, {"front": "To what region did Islam spread in the East within 100 years of Muhammad's death?", "back": "Central Asia"}, {"front": "What was the significance of the Surrender of Mecca in 630 regarding casualties?", "back": "The city surrendered with almost no bloodshed."}, {"front": "The Arabic word for the Quran comes from the same root as \"iqra'\", meaning \"to _____.\"", "back": "recite"}, {"front": "Which specific role did Muhammad assume in Medina that he did not hold in Mecca?", "back": "Statesman and lawgiver"}, {"front": "By 632, what had been transmitted to the Prophet over the course of twenty-three years?", "back": "Divine speech (the revelations)"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
