<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Around what year was Muhammad ibn Abdullah born?", "back": "570."}, {"front": "In what city was Muhammad born?", "back": "Mecca."}, {"front": "Which tribe served as the guardians of the Ka'ba shrine in Mecca?", "back": "The Quraysh."}, {"front": "What is the physical shape of the Ka'ba shrine?", "back": "Cube-shaped."}, {"front": "At what point in Muhammad's life did his father die?", "back": "Before his birth."}, {"front": "How old was Muhammad when his mother died?", "back": "Six."}, {"front": "Who raised Muhammad following the death of his mother?", "back": "His uncle Abu Talib."}, {"front": "What was Muhammad's occupation as a young man?", "back": "Merchant."}, {"front": "What Arabic nickname meaning \"the trustworthy\" did Muhammad earn?", "back": "Al-Amin."}, {"front": "Who was Muhammad's first wife?", "back": "Khadijah."}, {"front": "How many years older than Muhammad was his wife Khadijah?", "back": "Fifteen years."}, {"front": "Where did Muhammad regularly retreat to pray and meditate?", "back": "A cave on Mount Hira."}, {"front": "In what year did Muhammad experience the beginning of divine revelation?", "back": "610."}, {"front": "Which angel appeared to Muhammad and commanded him to recite?", "back": "Gabriel (Jibril)."}, {"front": "What is the Arabic word for reciting or reading aloud?", "back": "Iqra'."}, {"front": "The holy book \"Quran\" shares the same Arabic root as which word for reciting?", "back": "Iqra'."}, {"front": "Who was the first person to believe Muhammad's prophetic message?", "back": "Khadijah."}, {"front": "For how many years did the divine revelations to Muhammad continue?", "back": "Twenty-three years."}, {"front": "In what year did Muhammad begin his public preaching?", "back": "613."}, {"front": "What is the Arabic word for God used by Muslims, Christians, and Jews?", "back": "Allah."}, {"front": "Muhammad's core message proclaimed that all human beings were _____ before God.", "back": "Equal."}, {"front": "What specific obligation did Muhammad's message place on the rich?", "back": "Obligations to the poor."}, {"front": "Muhammad's early preaching warned of the approach of a Day of _____.", "back": "Judgment."}, {"front": "Why did the wealthy merchants of Mecca find Muhammad's message threatening?", "back": "It promoted monotheism and social equality."}, {"front": "In 615, where did a group of Muhammad's followers flee to escape persecution?", "back": "Ethiopia."}, {"front": "Who granted protection to the first Muslim diaspora in Ethiopia?", "back": "The Negus (king)."}, {"front": "What is the term for the migration of Muhammad and his followers from Mecca to Medina in 622?", "back": "The Hijra."}, {"front": "What was the city of Medina originally called before the Hijra?", "back": "Yathrib."}, {"front": "The Islamic calendar is calculated starting from what specific year?", "back": "622 (the year of the Hijra)."}, {"front": "In Medina, Muhammad took on the roles of preacher, statesman, and _____.", "back": "Lawgiver."}, {"front": "What term refers to the community of all Muslim believers as a single spiritual family?", "back": "The Ummah."}, {"front": "What was the name of the agreement that organized Medina's Muslim, Jewish, and pagan tribes?", "back": "The Constitution of Medina."}, {"front": "Which battle between the Muslim community and Mecca took place in 624?", "back": "The Battle of Badr."}, {"front": "In what year did the Battle of Uhud occur?", "back": "625."}, {"front": "What was the name of the battle that took place in 627?", "back": "The Battle of the Trench."}, {"front": "In what year did Muhammad return to Mecca with a large army?", "back": "630."}, {"front": "How was the surrender of Mecca in 630 characterized?", "back": "It occurred with almost no bloodshed."}, {"front": "What action did Muhammad take at the Ka'ba to redefine its religious meaning?", "back": "He cleansed it of idols."}, {"front": "According to Islamic belief, which two figures originally built the Ka'ba?", "back": "Abraham and his son Ishmael."}, {"front": "What site serves as the geographical center of Islamic worship worldwide?", "back": "The Ka'ba."}, {"front": "In what year did Muhammad die?", "back": "632."}, {"front": "In which city did Muhammad die?", "back": "Medina."}, {"front": "Which wife was Muhammad with when he passed away?", "back": "Aisha."}, {"front": "What political vacuum did Muhammad leave behind upon his death?", "back": "He left no designated successor."}, {"front": "Within a century of Muhammad's death, Islam spread as far west as which European country?", "back": "Spain."}, {"front": "The name \"Islam\" is derived from an Arabic root meaning peace, safety, and _____.", "back": "Wholeness."}, {"front": "What is the literal meaning of the word \"Islam\"?", "back": "Surrender or submission (to God)."}, {"front": "What is the literal definition of a \"Muslim\"?", "back": "One who makes islam (surrender or submission) to God."}, {"front": "What does the greeting \"As-salamu alaykum\" translate to in English?", "back": "Peace be upon you."}, {"front": "Which Hebrew word shares the same ancient Semitic root as \"As-salamu alaykum\"?", "back": "Shalom."}, {"front": "Approximately how far is Medina from Mecca?", "back": "250 miles."}, {"front": "The Ummah is intended to transcend boundaries of tribe, race, and _____.", "back": "Nationality."}, {"front": "Term: Al-Amin", "back": "Definition: A nickname given to Muhammad meaning \"the trustworthy.\""}, {"front": "Term: Ummah", "back": "Definition: The collective community of all Muslim believers."}, {"front": "Concept: The Hijra", "back": "The 622 migration from Mecca to Medina that marks the start of the Islamic calendar."}, {"front": "The Meccan elite's response to Muhammad's early public preaching was characterized by _____.", "back": "Persecution."}, {"front": "What was the religious state of the merchants in Mecca during Muhammad's early life?", "back": "Polytheistic."}, {"front": "The three major battles between Mecca and the early Medina community were Badr, Uhud, and _____.", "back": "The Trench."}, {"front": "Islam spread to Persia, Egypt, North Africa, Spain, and _____ within 100 years of the Prophet's death.", "back": "Central Asia."}, {"front": "Muhammad's father, who died before his birth, was named _____.", "back": "Abdullah."}, {"front": "The word \"Islam\" comes from the Arabic root consonants _____.", "back": "s-l-m."}, {"front": "According to the text, the suffering of the early Muslim community is remembered as a formative _____.", "back": "Test of faith."}, {"front": "The Ka'ba was rededicated to the one God in the year _____.", "back": "630."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
