<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 8, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the organizational status of ancient Norse Paganism regarding central authority?", "back": "It was never a unified religion and lacked a central authority."}, {"front": "Did ancient Norse Paganism utilize a fixed scripture or a formal creed?", "back": "No, it lacked both a creed and a fixed scripture."}, {"front": "Ancient Norse Paganism is best described as a _____ of related traditions.", "back": "family"}, {"front": "Identify the three major regional variations of the ancient Germanic religious world.", "back": "Norse, Anglo-Saxon, and Continental Germanic religion."}, {"front": "Which regions primarily practiced the Norse variation of Germanic religion?", "back": "Scandinavia and Iceland."}, {"front": "Where was the Anglo-Saxon religion practiced prior to and during its Christianization?", "back": "England."}, {"front": "During which centuries did the Christianization of the Anglo-Saxons primarily occur?", "back": "The 5th–7th centuries."}, {"front": "Where were the Continental Germanic religious traditions primarily practiced?", "back": "Central Europe."}, {"front": "What two elements did all ancient Germanic religious traditions share despite regional differences?", "back": "A basic family of gods and a similar cosmological framework."}, {"front": "What was the Anglo-Saxon name for the Norse god Odin?", "back": "Woden"}, {"front": "What was the Anglo-Saxon name for the Norse god Þórr (Thor)?", "back": "Þunor"}, {"front": "What does the name 'Þunor' literally mean?", "back": "Thunder"}, {"front": "The Continental Germanic traditions were distinguished by the addition of _____ deities and practices.", "back": "local"}, {"front": "Which specific regional tradition is primarily preserved in the medieval Icelandic Eddas?", "back": "The Norse tradition."}, {"front": "Which Germanic god is the namesake for the English weekday Tuesday?", "back": "Týr (Tiw in Old English)."}, {"front": "Which Anglo-Saxon deity is the namesake for the English weekday Wednesday?", "back": "Woden"}, {"front": "Which deity is the namesake for the English weekday Thursday?", "back": "Þunor (Thor)."}, {"front": "Which two goddesses are potentially the namesakes for the English weekday Friday?", "back": "Frigg or Freyja."}, {"front": "From which culture's deity does the English name for Saturday originate?", "back": "Roman (Saturn)."}, {"front": "Sunday and Monday are named after the _____ of the sun and moon.", "back": "personifications"}, {"front": "What is the name of the largest and most organized modern revival of Norse religion?", "back": "Ásatrú"}, {"front": "What is the literal translation of the Icelandic term Ásatrú?", "back": "Loyalty to the Æsir"}, {"front": "In what year did the Icelandic government officially recognize Ásatrú as a religion?", "back": "1973"}, {"front": "What is the common term used to refer to practitioners of modern Norse Paganism?", "back": "Heathens"}, {"front": "What are the two primary sources modern Heathens use to reconstruct pre-Christian Norse practices?", "back": "The Eddas and archaeological evidence."}, {"front": "What specific ritual practice do Ásatrú practitioners use to worship the Norse gods?", "back": "Seasonal rituals (blóts)."}, {"front": "Besides the gods, whom do modern Ásatrú practitioners typically honor?", "back": "Their ancestors."}, {"front": "Which specific ancient symbols have white supremacist and neo-Nazi groups attempted to appropriate?", "back": "Runes"}, {"front": "How do the majority of Ásatrú and Heathen communities respond to racist appropriation of their symbols?", "back": "They explicitly and strongly reject it."}, {"front": "What is 'The Troth'?", "back": "An international Heathen organization that affirms Norse Paganism is open to all ethnicities."}, {"front": "What is the official stance of groups like The Troth regarding racists in their communities?", "back": "They state that racists are not welcome."}, {"front": "Historical evidence of trade and intermarriage shows the Norse people interacted with which three broad regions?", "back": "Europe, the Middle East, and Central Asia."}, {"front": "Why does the historical record contradict the idea that Norse gods belong to a specific racial group?", "back": "The original practitioners traded, fought, and intermarried across diverse global regions."}, {"front": "What is the primary internal controversy currently facing modern Norse Paganism?", "back": "The appropriation of Norse symbols by white supremacist and neo-Nazi groups."}, {"front": "The name for Tuesday in Old English was _____.", "back": "Tiw"}, {"front": "Which modern geographic regions have seen the spread of Ásatrú outside of Scandinavia?", "back": "North America and Australia."}, {"front": "The Eddas are the primary source for Norse tradition as remembered in which country?", "back": "Iceland"}, {"front": "What is the term for a modern religious movement that revives pre-Christian Norse Paganism?", "back": "Ásatrú"}, {"front": "What is a 'blót' in the context of Ásatrú?", "back": "A seasonal festival or ritual used to worship the gods."}, {"front": "How is the growth of the Ásatrú movement characterized in the modern world?", "back": "It is one of the fastest-growing pagan religious movements."}, {"front": "Ancient Germanic traditions were practiced by tribes in _____ Europe before their Christianization.", "back": "Central"}, {"front": "Which day of the week is named after the Roman god Saturn?", "back": "Saturday"}, {"front": "Which deity is specifically associated with the Anglo-Saxon name Woden?", "back": "Odin"}, {"front": "Which deity is associated with the Anglo-Saxon name Tiw?", "back": "Týr"}, {"front": "The lack of a unified authority meant ancient Norse Paganism varied significantly by region, community, and _____.", "back": "period"}, {"front": "What type of evidence is used alongside the Eddas for reconstructionist Norse religious practice?", "back": "Archaeological evidence"}, {"front": "The concept of 'Who owns a tradition?' arises from the conflict over who has the right to _____ a religion's meaning.", "back": "define"}, {"front": "In the English language, the names of the days of the week preserve the names of Norse and _____ gods.", "back": "Roman"}, {"front": "The Norse tradition described in the Eddas originated specifically from _____ Iceland.", "back": "medieval"}, {"front": "According to practitioners, Norse Paganism is open to people of all _____.", "back": "ethnicities"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
