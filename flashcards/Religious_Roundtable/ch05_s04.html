<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 5, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does the scriptural structure of Buddhism compare to that of Islam or Christianity?", "back": "Buddhism has no single authoritative book but rather multiple vast collections of texts called canons."}, {"front": "What is the oldest and most complete collection of Buddhist scriptures?", "back": "The Pali Canon (also called the Tipitaka)."}, {"front": "In which specific language is the Pali Canon written?", "back": "Pali (a language closely related to Sanskrit)."}, {"front": "Which Buddhist tradition is responsible for preserving the Pali Canon?", "back": "The Theravada tradition."}, {"front": "What is the literal English translation of the term 'Tipitaka'?", "back": "Three Baskets."}, {"front": "Which 'basket' of the Tipitaka contains the rules governing the lives of monks and nuns?", "back": "The Vinaya Pitaka."}, {"front": "What is the primary function of the Vinaya Pitaka in a monastic setting?", "back": "It serves as the practical backbone for conduct, ceremonies, and dispute settlement."}, {"front": "Which 'basket' of the Tipitaka consists of the recorded teaching conversations (discourses) of the Buddha?", "back": "The Sutta Pitaka."}, {"front": "Who recorded the discourses found in the Sutta Pitaka following the Buddha's death?", "back": "His disciples."}, {"front": "Which text is considered the most beloved single work within the Sutta Pitaka?", "back": "The Dhammapada."}, {"front": "The Dhammapada consists of how many poetic verses distilling the Buddha's teaching?", "back": "423."}, {"front": "According to the famous opening lines of the Dhammapada, what is the 'forerunner of all actions'?", "back": "Mind."}, {"front": "Which 'basket' of the Tipitaka provides a highly technical philosophical analysis of mind and reality?", "back": "The Abhidhamma Pitaka."}, {"front": "Who developed the Abhidhamma Pitaka to systematize the Buddha's teachings?", "back": "Later scholars."}, {"front": "In Buddhism, what does the term 'sutra' (Sanskrit) or 'sutta' (Pali) specifically refer to?", "back": "A discourse or teaching attributed to the Buddha."}, {"front": "Which branch of Buddhism produced an enormous body of additional sutras centuries after the historical Buddha?", "back": "Mahayana Buddhism."}, {"front": "How do Mahayana practitioners view the authenticity of Mahayana sutras relative to older texts?", "back": "They regard them as equally authentic expressions of wisdom for those ready for deeper teaching."}, {"front": "Which famous Mahayana sutra is a compressed meditation on the nature of emptiness?", "back": "The Heart Sutra."}, {"front": "Which Mahayana sutra expanded the vision regarding which individuals can attain enlightenment?", "back": "The Lotus Sutra."}, {"front": "Which Mahayana sutra is structured as a philosophical dialogue concerning non-attachment and perception?", "back": "The Diamond Sutra."}, {"front": "In Tibetan Buddhism, what are 'terma'?", "back": "Hidden treasure texts revealed by realized masters."}, {"front": "What is the common English title for the Tibetan text 'Bardo Thodol'?", "back": "The Tibetan Book of the Dead."}, {"front": "The Bardo Thodol provides a guide for navigating which states of consciousness?", "back": "The states between death and rebirth."}, {"front": "What does the Bardo Thodol suggest about the Buddhist understanding of the mind's duration?", "back": "The mind extends far beyond what happens in a single lifetime."}, {"front": "The Vinaya Pitaka governs practical monastic matters such as eating, dress, and _____.", "back": "Speaking (or settling disputes/conducting ceremonies)."}, {"front": "Which basket analyzes the technical components of 'matter' in addition to mind and reality?", "back": "The Abhidhamma Pitaka."}, {"front": "Mahayana Buddhism spread primarily through which four regions mentioned in the text?", "back": "China, Japan, Korea, and Tibet."}, {"front": "What does the diversity of multiple canons and languages imply about Buddhism as a tradition?", "back": "It is a living, intellectually rich, and contested philosophical tradition."}, {"front": "Which specific sutra is recited daily in millions of monasteries as a meditation on emptiness?", "back": "The Heart Sutra."}, {"front": "The language Pali is closely related to the ancient Indian language _____.", "back": "Sanskrit."}, {"front": "Term: Sutta", "back": "Definition: The Pali form of the word for a discourse or teaching attributed to the Buddha."}, {"front": "Which 'basket' of the Tipitaka is characterized as a systematized philosophical analysis developed by scholars?", "back": "The Abhidhamma Pitaka."}, {"front": "Concept: The Three Baskets", "back": "Definition: The literal meaning of Tipitaka, referring to the divisions of the Pali Canon."}, {"front": "Which Mahayana text is described as a 'dazzling' dialogue on perception?", "back": "The Diamond Sutra."}, {"front": "The Bardo Thodol is categorized as part of the sacred texts of which Buddhist branch?", "back": "Tibetan Buddhism."}, {"front": "How is the content of the Sutta Pitaka structured?", "back": "As thousands of teaching conversations (discourses)."}, {"front": "Identify the three specific areas analyzed in the Abhidhamma Pitaka.", "back": "Mind, matter, and reality."}, {"front": "What distinguishes the timeline of Mahayana sutras from the historical life of the Buddha?", "back": "Some appeared centuries after the historical Buddha."}, {"front": "According to the Vinaya Pitaka, monks and nuns follow rules regarding how to eat, dress, and _____.", "back": "Speak."}, {"front": "Which 'basket' serves as the practical guide for conducting monastic ceremonies?", "back": "The Vinaya Pitaka."}, {"front": "The Dhammapada belongs to which of the 'three baskets'?", "back": "The Sutta Pitaka."}, {"front": "What is the primary theme of the Diamond Sutra?", "back": "The nature of perception and non-attachment."}, {"front": "Which text serves as a reminder that Buddhism's understanding of mind extends beyond death?", "back": "The Bardo Thodol (Tibetan Book of the Dead)."}, {"front": "How does the text describe the nature of Buddhism regarding its history of commentary and debate?", "back": "As intellectually rich and contested."}, {"front": "Which collection of Buddhist scriptures is described as the oldest and most complete?", "back": "The Pali Canon."}, {"front": "In the Tipitaka, which 'basket' is most focused on the daily life of monastics?", "back": "The Vinaya Pitaka."}, {"front": "The Dhammapada expresses the Buddha's teaching in a memorable and _____ form.", "back": "Poetic."}, {"front": "Which text addresses the universal ability to attain enlightenment?", "back": "The Lotus Sutra."}, {"front": "The Heart Sutra is described as a 'compressed' meditation on what subject?", "back": "Emptiness."}, {"front": "What are the three components of the Tipitaka?", "back": "The Vinaya Pitaka, the Sutta Pitaka, and the Abhidhamma Pitaka."}, {"front": "Who revealed the 'terma' texts in Tibetan Buddhism?", "back": "Realized masters."}, {"front": "The term 'Pitaka' translates to English as _____.", "back": "Basket."}, {"front": "Which basket was developed by later scholars rather than being direct discourses of the Buddha?", "back": "The Abhidhamma Pitaka."}, {"front": "In which tradition is the Pali Canon exclusively preserved?", "back": "The Theravada tradition."}, {"front": "The Sutta Pitaka contains thousands of teaching conversations recorded by the Buddha's _____.", "back": "Disciples."}, {"front": "Which text is quoted as saying: 'Mind is the forerunner of all actions'?", "back": "The Dhammapada."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
