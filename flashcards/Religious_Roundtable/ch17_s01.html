<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 17, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the meaning and significance of 'Tawhid' in Islam?", "back": "Tawhid is the absolute oneness and uniqueness of Allah, meaning God is uniquely and categorically different from creation, without partners or equals. It is the fundamental affirmation of Islamic belief.", "id": "fc01"}, {"front": "Define 'shirk' and explain its severity in Islamic theology.", "back": "Shirk is the gravest sin in Islam, meaning 'associating partners with God.' It is a fundamental misunderstanding of reality and the opposite of tawhid, treating creation as divine or comparable to Allah.", "id": "fc02"}, {"front": "What is the foundational declaration of Islamic faith, often heard at birth and death?", "back": "The foundational declaration is 'La ilaha illa Allah' – 'There is no god but God.' This statement encapsulates tawhid.", "id": "fc03"}, {"front": "Beyond merely stating the number of gods, what deeper claim does tawhid make about God's nature?", "back": "Tawhid claims that God is not just numerically one, but uniquely and categorically different from everything in creation. Allah is Being itself, in a way nothing else is.", "id": "fc04"}, {"front": "How does Islamic theology describe God's 'radical transcendence'?", "back": "Radical transcendence means God is not like us, nor a larger or more powerful version of anything we can see or imagine, but is uniquely, categorically different from creation.", "id": "fc05"}, {"front": "How does Islam balance God's transcendence with the concept of God's nearness or immanence?", "back": "Islam insists on God's nearness through the ninety-nine Beautiful Names of Allah (Asma ul-Husna) and through Quranic verses like 'wherever you turn, there is the face of Allah,' expressing both God's otherness and presence.", "id": "fc06"}, {"front": "What are the 'ninety-nine Beautiful Names of Allah' (Asma ul-Husna) and what is their theological purpose?", "back": "The Asma ul-Husna are names like Al-Qadir (All-Powerful) and Al-Wadud (Loving). They serve as a theology in miniature, expressing both God's transcendence and immanence, showing how God is both beyond and present.", "id": "fc07"}, {"front": "Which Quranic verses are cited to powerfully express the tension between transcendence and immanence?", "back": "Surah 57:3 describes Allah as 'the First and the Last, 'the Outward and the Inward',' and Surah 2:115 states, 'Wherever you turn, 'there is the face of Allah'.'", "id": "fc08"}, {"front": "How do Sufi mystics uniquely emphasize God's immanence within Islam?", "back": "Sufis push the immanence side through spiritual disciplines (qurb) aimed at direct experiential awareness of the divine presence, encountering God directly, not just at a theological distance.", "id": "fc09"}, {"front": "In Sufism, what is 'qurb' and how does it differ from 'ittihad'?", "back": "Qurb means 'nearness to God,' a direct experiential awareness of divine presence. Sufis are careful to distinguish it from ittihad, which means union in the sense of identity (the creature becoming God), which they avoid.", "id": "fc10"}, {"front": "What role does the great Sufi poet Rumi play in expressing the Sufi experience?", "back": "Rumi wrote extensively of the soul's longing for union with God, using language akin to reunion with a lost lover, capturing the intimacy and proximity sought in Sufi mysticism.", "id": "fc11"}, {"front": "How do Sufis understand 'tawhid' differently from a purely doctrinal perspective?", "back": "For Sufis, tawhid is not merely a doctrine to be recited but a reality to be experienced. They believe God is truly one and truly everywhere, allowing the purified heart to encounter God directly.", "id": "fc12"}, {"front": "What is a 'misbaha' and how does its use connect to the concepts of transcendence and immanence?", "back": "A misbaha is a string of prayer beads, often with ninety-nine beads, used to recite the Beautiful Names of Allah. This practice bridges the transcendent (names point beyond human image) and the immanent (physical beads, verbal recitation).", "id": "fc13"}, {"front": "Why is shirk considered not just a moral failing, but a 'fundamental misunderstanding of reality' in Islam?", "back": "Shirk fundamentally misunderstands God's unique nature (tawhid) by treating creation as having divine status or being comparable to Allah, thus distorting the true nature of existence and God's absolute oneness.", "id": "fc14"}, {"front": "What is the significance of Allah being described as 'the First and the Last, 'the Outward and the Inward'' in Surah 57:3?", "back": "These four names together encapsulate both extremes of the transcendence-immanence spectrum, showing God's eternal nature (First/Last) and simultaneous presence and hiddenness (Outward/Inward).", "id": "fc15"}, {"front": "What is the foundational significance of tawhid for 'everything else in Islam'?", "back": "Tawhid is the theological foundation from which all other Islamic doctrines, practices, and understandings of reality proceed, shaping views on worship, ethics, and the human-divine relationship.", "id": "fc16"}, {"front": "How is tawhid explicitly expressed in the Shahada, the declaration of faith?", "back": "Tawhid is expressed in the Shahada as 'La ilaha illa Allah' (There is no god but God), affirming God's absolute unity and uniqueness as the primary article of faith.", "id": "fc17"}, {"front": "Explain the statement: 'Allah is Being itself in a way that nothing else is.'", "back": "This means Allah's existence is fundamental and uncreated, the ultimate source and ground of all existence. No other being possesses this ontological status; all creation exists only through Allah.", "id": "fc18"}, {"front": "What concept is emphasized by the Quranic statement, 'wherever ye are, He is with you'?", "back": "This statement strongly emphasizes God's immanence and omnipresence, asserting that God is intimately present and aware of all actions, regardless of location.", "id": "fc19"}, {"front": "What traditional belief is associated with memorizing the ninety-nine Beautiful Names of Allah?", "back": "Tradition holds that whoever memorizes the ninety-nine Beautiful Names of Allah 'will enter Paradise.'", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
