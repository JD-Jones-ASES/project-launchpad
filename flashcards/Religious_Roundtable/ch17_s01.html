<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 17, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central declaration of Islam, and what does its Arabic phrase 'La ilaha illa Allah' signify?", "back": "The central declaration is 'La ilaha illa Allah,' meaning 'There is no god but God.' It signifies tawhid, the absolute oneness and uniqueness of Allah."}, {"front": "Define 'tawhid' in Islamic theology.", "back": "Tawhid is the Islamic doctrine of the absolute unity and uniqueness of God. It asserts that Allah is uniquely one, without partners, equals, or anything comparable in creation, and it is the foundational affirmation of Islamic belief."}, {"front": "How is tawhid more profound than merely a numerical claim about the number of gods?", "back": "Tawhid is a claim about what God is: uniquely, categorically different from everything in creation. Allah is not just the greatest being among beings, but Being itself in a way nothing else is, reflecting radical transcendence."}, {"front": "What is 'shirk,' and why is it considered the gravest error in Islamic theology?", "back": "Shirk is the Arabic term for associating partners with God. It is the gravest error because it represents a fundamental misunderstanding of reality, treating something in creation as having divine status or being comparable to Allah, thus directly opposing tawhid."}, {"front": "Explain the concept of 'radical transcendence' as it applies to Allah in Islam.", "back": "Radical transcendence means God is not like us, nor a larger or more powerful version of anything we can see or imagine. Allah is uniquely and categorically different from everything in creation, entirely distinct from His creation."}, {"front": "How does Islamic theology balance God's transcendence with His immanence (nearness)?", "back": "Islamic theology insists on both with equal force. God is transcendent in His absolute uniqueness, yet immanent in His nearness and presence, expressed through the ninety-nine Beautiful Names and Quranic verses."}, {"front": "What are the 'Asma ul-Husna'?", "back": "The Asma ul-Husna are the ninety-nine Beautiful Names of Allah, such as Al-Azim (the Magnificent) and Al-Wadud (the Loving). They are considered 'a theology in miniature,' each expressing both God's transcendence and immanence."}, {"front": "Give two examples of Allah's Beautiful Names that emphasize transcendence, and two that emphasize immanence.", "back": "Transcendence: Al-Azim (the Magnificent), Al-Qadir (the All-Powerful). Immanence: Al-Wadud (the Loving), Al-Qarib (the Near), Al-Mujib (the Responsive)."}, {"front": "Which Quranic verse explicitly captures the tension between transcendence and immanence by describing Allah as 'the First and the Last, the Outward and the Inward'?", "back": "Surah 57:3."}, {"front": "How does Surah 2:115 express God's immanence?", "back": "Surah 2:115 declares, 'wherever you turn, there is the face of Allah,' signifying God's pervasive and ever-present reality."}, {"front": "Who are the Sufi mystics, and what is their primary spiritual aim?", "back": "Sufi mystics are the mystical strand of Islam who practice spiritual disciplines aimed at 'qurb,' which means nearness to God and direct experiential awareness of the divine presence."}, {"front": "What does 'qurb' mean for Sufis, and how does it relate to tawhid?", "back": "Qurb refers to an intimate proximity and experiential knowing of God. For Sufis, tawhid is not just a doctrine but a reality to be experienced, where God's oneness means His presence is everywhere, allowing for direct encounter."}, {"front": "What distinction do Sufis make between 'qurb' (nearness) and 'ittihad' (union)?", "back": "Sufis seek qurb, a profound intimacy and nearness to God, but are careful to insist it is not ittihad, which would imply union in the sense of identity, where the creature becomes God. The creature remains the creature."}, {"front": "What is the significance of the 'shahada' in relation to tawhid?", "back": "The shahada ('La ilaha illa Allah'), the declaration of faith, is the first and most fundamental affirmation of Islamic belief, directly expressing the doctrine of tawhid."}, {"front": "What is 'misbaha,' and how is it used in Muslim practice?", "back": "Misbaha is a string of prayer beads, typically with ninety-nine beads. Many Muslims use it to recite the ninety-nine Beautiful Names of Allah in meditation."}, {"front": "How does the practice of reciting the Beautiful Names of Allah using a misbaha bridge transcendence and immanence?", "back": "The names themselves point to God's transcendent reality beyond human image, while the physical act of holding the beads and reciting with one's lips provides an immanent, tangible connection to the divine."}, {"front": "What promise is traditionally associated with memorizing the ninety-nine Beautiful Names of Allah?", "back": "Tradition holds that whoever memorizes them 'will enter Paradise.'"}, {"front": "According to the text, what was a key theme in the writings of the great Sufi poet Rumi?", "back": "Rumi wrote about the soul's profound longing for union with God, often using evocative language of reunion with a lost lover, emphasizing spiritual intimacy and divine love."}, {"front": "Why is 'La ilaha illa Allah' considered the theological foundation from which everything else in Islam proceeds?", "back": "It establishes tawhid, the absolute oneness and uniqueness of Allah, which dictates the nature of God, the gravest sin (shirk), and all other aspects of Islamic belief and practice."}, {"front": "In what sense are the ninety-nine Beautiful Names of Allah considered 'a theology in miniature'?", "back": "Each name simultaneously describes an aspect of God's transcendence ('God is beyond you in this way') and an aspect of God's immanence ('God is present to you in this way'), encapsulating the core paradox and richness of Islamic theology."}, {"front": "What does the phrase 'God is Being itself in a way that nothing else is' imply about Allah's nature?", "back": "It implies that Allah's existence is fundamental, uncreated, and unique, not merely the greatest among existing things but the source and ground of all being, reinforcing His radical transcendence."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
