<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does the source describe the nature of modern Jewish practice?", "back": "It is a family of related traditions rather than a single, uniform practice."}, {"front": "What three elements unite the various branches of Judaism?", "back": "Shared texts, shared history, and shared covenantal identity."}, {"front": "According to the text, what has the Jewish tradition always thrived on?", "back": "Argument."}, {"front": "In Orthodox Judaism, how was the Torah (both Written and Oral) revealed?", "back": "It was revealed by God to Moses exactly as it has been received."}, {"front": "How many commandments are considered binding on all Jews in Orthodox practice?", "back": "613."}, {"front": "Which branch of Judaism holds that tradition provides the stable ground to navigate modern confusion?", "back": "Orthodox Judaism."}, {"front": "From which day and time does Shabbat (the Sabbath) begin?", "back": "Friday sundown."}, {"front": "Name three things Orthodox Jews refrain from during Shabbat.", "back": "Work, electricity, and commerce."}, {"front": "Term: Kashrut", "back": "Dietary laws that distinguish permitted (kosher) from forbidden foods."}, {"front": "What specific dietary separation does kashrut require?", "back": "The separation of meat and dairy."}, {"front": "What language is used for prayer in Orthodox Judaism?", "back": "Hebrew."}, {"front": "How is worship organized regarding gender in Orthodox synagogues?", "back": "It is gender-separated."}, {"front": "Who do Orthodox Jews look to for guidance on new legal questions?", "back": "Authoritative rabbinic decisors."}, {"front": "Which movement occupies a middle position by affirming binding law while allowing flexibility in its application?", "back": "Conservative Judaism."}, {"front": "How does Conservative Judaism view the historical development of the Torah?", "back": "It accepts that the Torah developed over time in a historical context."}, {"front": "In which geographic region has the Conservative movement been particularly influential?", "back": "North America."}, {"front": "How does Conservative practice of Shabbat and kashrut compare to Orthodox practice?", "back": "It is generally observed with more leniency."}, {"front": "What is the largest Jewish movement in the United States?", "back": "Reform Judaism."}, {"front": "Reform Judaism emphasizes the _____ heart of Jewish teaching over ritual details.", "back": "Ethical."}, {"front": "How does Reform Judaism characterize Jewish law?", "back": "A human response to divine revelation shaped by historical circumstances."}, {"front": "What criteria do Reform Jews use to determine which laws to follow today?", "back": "Each generation must discern which laws still carry moral weight."}, {"front": "How is seating arranged in Reform synagogues?", "back": "Men and women are seated together."}, {"front": "Which branch of Judaism ordains women and LGBTQ+ individuals as rabbis?", "back": "Reform Judaism."}, {"front": "What is the watchword of the Reform movement?", "back": "Prophetic Judaism."}, {"front": "According to Prophetic Judaism, what is more fundamental than ritual rules?", "back": "Justice."}, {"front": "Who founded Reconstructionist Judaism in the 20th century?", "back": "Rabbi Mordecai Kaplan."}, {"front": "Reconstructionist Judaism views Judaism as an evolving _____ rather than a revealed religion.", "back": "Civilization."}, {"front": "How is God reinterpreted in Reconstructionist Judaism?", "back": "As a non-personal force that enables human flourishing."}, {"front": "In Reconstructionist Judaism, practice is an expression of _____ rather than divine command.", "back": "Culture and identity."}, {"front": "Name two primary texts shared by all movements of Judaism.", "back": "The Torah and the Talmud."}, {"front": "List three shared holy days among all Jewish movements.", "back": "Passover, Yom Kippur, and Rosh Hashanah."}, {"front": "What political movement sought to establish a Jewish homeland in the 19th century?", "back": "Zionism."}, {"front": "In what year was the modern State of Israel founded?", "back": "1948."}, {"front": "Why did some early Orthodox Jews oppose Zionism?", "back": "They believed only the Messiah could legitimately restore Israel."}, {"front": "What literal meaning is associated with the Hebrew word 'Halakha'?", "back": "The way of walking."}, {"front": "How is Jewish law (Halakha) viewed conceptually in terms of its function?", "back": "A path that orients a structured way of moving through life in relationship with God."}, {"front": "What event in Europe directly preceded and influenced the founding of modern Israel?", "back": "Catastrophic persecution."}, {"front": "What is the Reform approach to the language used in religious services?", "back": "Synagogues often conduct services in the local language alongside Hebrew."}, {"front": "True or False: Zionism is considered a branch of Judaism.", "back": "False."}, {"front": "Which branch believes that modernity does not override tradition?", "back": "Orthodox Judaism."}, {"front": "The argument about how to be Jewish is described by the text as a form of _____.", "back": "Belonging."}, {"front": "Conservative Judaism insists that historical development _____ diminish the authority of the Torah.", "back": "Does not."}, {"front": "What is the primary focus of 'Prophetic Judaism'?", "back": "Insistence on justice as demanded by the prophets."}, {"front": "Reconstructionist Judaism rejects the idea of Judaism as a _____ revealed religion.", "back": "Supernaturally."}, {"front": "In what language are Orthodox services exclusively conducted?", "back": "Hebrew."}, {"front": "What is the status of the 'Oral Torah' in Orthodox belief?", "back": "It was revealed by God to Moses alongside the Written Torah."}, {"front": "What is the duration of Shabbat?", "back": "From Friday sundown to Saturday night."}, {"front": "Which movement is most associated with the idea that law is an evolving expression of a people's culture?", "back": "Reconstructionist Judaism."}, {"front": "What central fact of Jewish life worldwide emerged in 1948?", "back": "The existence of the State of Israel."}, {"front": "How does the text describe current Jewish views on Israeli politics?", "back": "Jews hold a wide range of views about its politics and policies."}, {"front": "What role does the Hebrew language play across all Jewish movements?", "back": "It is the shared language of prayer."}, {"front": "Why is Jewish law described as a 'path' rather than a 'cage'?", "back": "It provides a structured way of moving through time and daily life."}, {"front": "According to Reform Judaism, ritual details are secondary to the _____.", "back": "Ethical heart of Jewish teaching."}, {"front": "Which branch specifically mentions the use of 'authoritative rabbinic decisors'?", "back": "Orthodox Judaism."}, {"front": "In the Conservative movement, Jewish law is still considered _____.", "back": "Binding."}, {"front": "The 613 commandments in Orthodoxy are considered binding in _____.", "back": "Every age."}, {"front": "What is the relationship between Zionism and Jewish religious branches?", "back": "It is a political movement with which different branches have varying levels of engagement and opinion."}, {"front": "What does the separation of meat and dairy in kashrut signify?", "back": "A distinction between permitted and forbidden ways of consuming food."}, {"front": "What is the Reconstructionist reinterpretation of God's nature?", "back": "The force that enables human flourishing."}, {"front": "Which movement's name reflects the idea that Judaism is a 'civilization'?", "back": "Reconstructionist Judaism."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
