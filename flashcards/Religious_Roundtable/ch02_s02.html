<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Shema and its central declaration in Judaism?", "back": "The Shema is a core Jewish prayer: 'Shema Yisrael, Adonai Eloheinu, Adonai Echad' ('Hear, O Israel, the Lord is our God, the Lord is One'). It declares absolute monotheism, asserting God's unity as the sole creator and sustainer of all reality."}, {"front": "Beyond a numerical claim, what philosophical and moral significance does Judaism attach to God's absolute unity?", "back": "God's unity means God is undivided, uncomplicated, and entirely Himself. There are no rival divine powers or forces of good/evil equal to God. God is the one ultimate source of reality and morality."}, {"front": "How does Jewish tradition describe the personal nature of God?", "back": "God is intensely personal—speaking, hearing prayer, grieving over human suffering, and becoming angry at injustice. God is actively involved in the world."}, {"front": "Why is Judaism deeply cautious about picturing God in human terms and strictly forbids images of God?", "back": "The prohibition on idolatry extends beyond physical statues; it resists the human tendency to reduce God to something manageable or controllable. God resists all such reductions because God is utterly unlike anything human."}, {"front": "Define 'brit' in the context of Judaism.", "back": "'Brit' is the Hebrew word for covenant, defining the binding, mutual relationship between God and the Jewish people. God offers protection and presence, while Israel offers obedience and faithfulness."}, {"front": "What are God's obligations within the covenant with Israel?", "back": "God commits to care for, guide, and ultimately redeem Israel."}, {"front": "What are Israel's obligations within the covenant with God?", "back": "Israel commits to follow the commandments, to practice justice, and to be, in the words of the Torah, 'a kingdom of priests and a holy nation'."}, {"front": "How has the concept of 'chosen people' often been misunderstood, and how do Jewish theologians typically interpret it?", "back": "It has often been misunderstood as a claim of racial or spiritual superiority. Jewish theologians see it not as a privilege, but as a responsibility to a specific way of life, called to model justice and holiness for the world."}, {"front": "What does the 'interpretive energy' surrounding the Torah signify in Jewish religious life?", "back": "It signifies faith in God's word as inexhaustibly rich. The Torah is studied, debated, questioned, and re-examined in every generation, showing that no single reading can exhaust its meaning."}, {"front": "What role does the Talmud play in Jewish interpretive tradition?", "back": "The Talmud preserves centuries of scholarly debates, including cases where scholars argue fiercely without resolution. Both positions are recorded as valid, showing that Judaism values the conversation itself as sacred, not just fixed answers."}, {"front": "Define 'tikkun olam.'", "back": "'Tikkun olam' is a Hebrew phrase meaning 'repair of the world.' It represents the Jewish vocation to pursue justice, heal suffering, and participate in God's work of restoring a broken creation."}, {"front": "How does 'tikkun olam' manifest in Jewish ethical practice? Provide examples.", "back": "It manifests as active resistance to poverty, injustice, oppression, and cruelty. Examples include the commandment to leave a corner of one's field for the poor, the prohibition against charging interest to the vulnerable, and the obligation to welcome the stranger."}, {"front": "According to Jewish tradition, what is the ultimate goal of human beings in relation to creation?", "back": "Human beings are God's partners in completing and healing creation (tikkun olam). Every act of justice, compassion, or generosity is considered a small act of repair, contributing to a world that is 'being fixed'."}, {"front": "How does the Jewish concept of God differ from a 'distant architect' who created the universe and walked away?", "back": "In Jewish tradition, God is intensely personal and actively involved in creation and human life—speaking, hearing prayers, grieving, and reacting to human suffering and injustice, rather than being aloof."}, {"front": "What is the significance of Judaism treating the 'conversation itself as sacred'?", "back": "It implies that the tradition lives not in fixed answers but in ongoing engagement with the questions. If God's word is inexhaustibly rich, then continuous study, debate, and re-examination of the Torah are essential expressions of faith."}, {"front": "What specific phrase from the Torah describes Israel's calling within the covenant?", "back": "Israel is called to be 'a kingdom of priests and a holy nation'."}, {"front": "What is meant by 'monotheism' in the Jewish context, and how does it differ from belief in one chief god among many?", "back": "Jewish monotheism means belief in exactly one God—not merely one chief god among others, but the only God, creator and sustainer of all reality. This God is undivided and the sole source of reality and morality."}, {"front": "What did the prophets of the Hebrew Bible emphasize, as related to 'tikkun olam'?", "back": "The prophets thundered against injustice with a ferocity that has inspired reform movements across many centuries and cultures, aligning with the Jewish vocation to pursue justice and resist violations of the divine order."}, {"front": "Why is it important that the Jewish God 'resists all such reductions' to something manageable or controllable?", "back": "This resistance safeguards the transcendent and unique nature of God. Reducing God to human terms or controllable concepts risks diminishing God's absolute power, unity, and ultimate moral authority, leading to idolatry."}, {"front": "How does the covenant (brit) represent a mutual relationship despite God being the 'senior partner'?", "back": "While God is the ultimate authority, the covenant involves genuine obligations on both sides. God commits to Israel, and Israel commits to God's commandments, making it a binding agreement with mutual responsibilities."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
