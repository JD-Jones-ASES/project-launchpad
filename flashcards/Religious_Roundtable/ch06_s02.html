<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the two broad streams into which scholars typically divide Taoism?", "back": "Philosophical Taoism and Religious Taoism."}, {"front": "What is the Chinese term for Philosophical Taoism?", "back": "daojia"}, {"front": "What is the literal translation of the term daojia?", "back": "The school of the \"Way\"."}, {"front": "What is the Chinese term for Religious Taoism?", "back": "daojiao"}, {"front": "What is the literal translation of the term daojiao?", "back": "The teaching of the \"Way\"."}, {"front": "On which two primary texts is Philosophical Taoism (daojia) rooted?", "back": "The texts of Laozi and Zhuangzi."}, {"front": "What is the primary focus of Philosophical Taoism regarding the Tao?", "back": "Understanding its nature."}, {"front": "What is the personal goal of aligning oneself with the Tao in Philosophical Taoism?", "back": "Cultivating personal wisdom and freedom."}, {"front": "Toward what type of activity does Philosophical Taoism tend?", "back": "Contemplative practice."}, {"front": "In Philosophical Taoism, what action is taken regarding social roles?", "back": "Stepping back from them."}, {"front": "What mental shift does Philosophical Taoism encourage for personal cultivation?", "back": "Releasing rigid thinking."}, {"front": "What is the characteristic style of action sought in Philosophical Taoism?", "back": "Effortless action."}, {"front": "Which text is noted as the most familiar source of Taoism for Western readers?", "back": "The Tao Te Ching."}, {"front": "Around what century CE did Religious Taoism (daojiao) begin to develop?", "back": "The 2nd century CE."}, {"front": "What type of figures lead the organized religion of Taoism?", "back": "Priests."}, {"front": "What term describes the set of public worship formulas used in Religious Taoism?", "back": "Liturgy."}, {"front": "How does Religious Taoism categorize its various divine figures?", "back": "As a rich pantheon."}, {"front": "What are the two primary categories of concerns in Religious Taoism?", "back": "Practical and communal."}, {"front": "What is a primary practical goal of Religious Taoism regarding physical health?", "back": "Healing the sick."}, {"front": "What communal protection does Religious Taoism aim to provide?", "back": "Protection from harmful spirits."}, {"front": "What agricultural concern is addressed by Religious Taoism?", "back": "Ensuring good harvests."}, {"front": "How does Religious Taoism interact with life transitions like birth or death?", "back": "By marking them through ritual."}, {"front": "Besides health, what long-term physical goal does Religious Taoism guide practitioners toward?", "back": "Longevity."}, {"front": "Religious Taoism combines philosophical texts with folk religion and _____ tradition.", "back": "shamanic"}, {"front": "Along with folk and shamanic traditions, what worldview does Religious Taoism draw upon?", "back": "Chinese cosmology."}, {"front": "In some Taoist traditions, what is the ultimate transcendence of death called?", "back": "Immortality."}, {"front": "Which physical practice involving nutrition is used in Religious Taoism to extend life?", "back": "The right diet."}, {"front": "Which physical practice involving respiratory control is used in Religious Taoism for longevity?", "back": "Breathing exercises."}, {"front": "What mental practice is utilized in Religious Taoism to potentially transcend death?", "back": "Meditation."}, {"front": "What is the original meaning of the term gong fu?", "back": "Disciplined practice over time."}, {"front": "Which English term for martial arts is derived from the Chinese word gong fu?", "back": "Kung fu."}, {"front": "What is the full Chinese name for the practice known as Tai chi?", "back": "Taijiquan"}, {"front": "Tai chi originated as a Taoist martial art rooted in which two principles?", "back": "Wu wei and yin-yang."}, {"front": "What physical descriptors characterize the movements of Tai chi?", "back": "Flowing and circular."}, {"front": "Tai chi movements are a physical embodiment of which subject?", "back": "Taoist philosophy."}, {"front": "In Tai chi, how does a practitioner respond to force?", "back": "By meeting it with softness."}, {"front": "How is balance achieved in the practice of Tai chi?", "back": "Through constant, gentle motion."}, {"front": "Why should the division between philosophical and religious Taoism not be overdrawn?", "back": "In practice, they have always intertwined and influenced each other."}, {"front": "Where might a 10th-century Taoist priest have found the Tao Te Ching in relation to ritual manuals?", "back": "On the same shelf."}, {"front": "Which philosopher's concepts might a Taoist priest use while performing healing rites?", "back": "Zhuangzi."}, {"front": "What is described as the \"genius\" of Taoism?", "back": "Its flexibility."}, {"front": "To what four diverse types of people can Taoism speak simultaneously?", "back": "The philosopher, farmer, martial artist, and person seeking healing."}, {"front": "In Philosophical Taoism, alignment with the Tao is achieved by releasing _____.", "back": "rigid thinking"}, {"front": "What is the primary communal role of Religious Taoism regarding community protection?", "back": "Warding off harmful spirits."}, {"front": "Religious Taoism: Concerns are communal and _____.", "back": "practical"}, {"front": "What is the core connection between Taoist longevity practices and the concept of gong fu?", "back": "The requirement of disciplined practice over time."}, {"front": "The practice of Tai chi is performed in parks globally as a _____ movement practice.", "back": "slow and flowing"}, {"front": "In Religious Taoism, health and longevity are sought through meditation, diet, and _____ practice.", "back": "ritual"}, {"front": "What describes the relationship between daojia and daojiao for a historical Chinese villager?", "back": "They were not necessarily experienced as separate streams."}, {"front": "Philosophical Taoism (daojia) emphasizes understanding the nature of the _____.", "back": "Tao"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
