<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 15, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In Confucianism, what is Li?", "back": "Li (ritual propriety) refers to the proper forms of conduct that govern every relationship and social situation, embodying virtue in social form.", "id": "fc01"}, {"front": "Define Ren in Confucian ethics.", "back": "Ren (benevolence, humaneness, or love) is the central virtue in Confucian ethics, representing the inner moral character.", "id": "fc02"}, {"front": "How do Li and Ren relate to each other, according to Confucius?", "back": "Confucius taught that without Ren, Li is empty performance; without Li, Ren has no proper expression. They are interdependent.", "id": "fc03"}, {"front": "List the Five Relationships central to Confucian social harmony.", "back": "The Five Relationships are: ruler and subject, parent and child, husband and wife, elder sibling and younger sibling, and friend and friend. Each carries specific obligations.", "id": "fc04"}, {"front": "What is Ancestral Veneration in Confucian practice?", "back": "Ancestral veneration is the practice of honoring deceased ancestors through rituals of remembrance, offerings, and proper conduct, seen as an expression of filial piety (xiao) extended beyond death.", "id": "fc05"}, {"front": "Who is a Junzi in Confucianism?", "back": "A Junzi is 'the exemplary person' or 'gentleman'—the ideal moral character produced by proper education, self-cultivation, and ritual practice.", "id": "fc06"}, {"front": "Explain Confucius's subtle but profound claim about ritual (li) and feeling.", "back": "Confucius claimed that ritual is not merely the external expression of an inward feeling, but rather that the proper performance of ritual *generates and sustains* the feelings that give it meaning.", "id": "fc07"}, {"front": "Why did Confucius believe ritual was crucial for society?", "back": "Ritual provides a shared grammar for society, giving emotions proper outlets, and teaching people how to relate to one another through common forms.", "id": "fc08"}, {"front": "What did Confucius's refusal to discuss the sacrifice to Heaven reveal about his view of ritual?", "back": "It revealed that for Confucius, ritual was serious and required deep understanding, not mere automatic ceremony. A ritual performed without understanding was considered worse than no ritual at all.", "id": "fc09"}, {"front": "What three types of rituals did Confucius value most?", "back": "Confucius valued ancestral veneration, court rituals, and family rituals.", "id": "fc10"}, {"front": "Is ancestral veneration considered worship of the dead in Confucianism?", "back": "No, it is not strictly worship of the dead. It is an expression of filial piety (xiao) extended beyond death, affirming the living's connection to and gratitude for previous generations.", "id": "fc11"}, {"front": "What is the significance of Analects 3:3: 'If a person is not benevolent (ren), what has he to do with ritual (li)?'", "back": "This passage emphasizes that ritual and music divorced from humaneness (ren) are empty and dangerous. Inner virtue must animate outward forms for them to have meaning and positive impact.", "id": "fc12"}, {"front": "What does Analects 3:12 'Sacrifice as if present' teach about ritual performance?", "back": "It teaches that ritual acts require full presence and engagement, not mechanical execution. One must be truly 'there' for the ritual to be effective and meaningful.", "id": "fc13"}, {"front": "Beyond entertainment, what role did Confucius believe music played in society?", "back": "Confucius believed that proper music, performed properly, had the power to shape character, calm emotions, stabilize society, and serve as a form of moral education.", "id": "fc14"}, {"front": "What extreme effect did Confucius describe after hearing the shao music of King Shun?", "back": "Confucius famously said that after hearing the shao music, he did not notice the taste of meat for three months, illustrating its profound power to elevate and transform the listener.", "id": "fc15"}, {"front": "What kind of music did Confucius believe could corrupt society?", "back": "He believed that 'licentious' or 'exciting' music could corrupt the moral character of a society as surely as bad government.", "id": "fc16"}, {"front": "How does Confucius's view on bowing to a parent illustrate his perspective on ritual and feeling?", "back": "When bowing to a parent, one is not just expressing pre-existing filial love, but also, through the act of bowing, cultivating and reinforcing that love. The ritual act itself strengthens the feeling.", "id": "fc17"}, {"front": "What is the Confucian concept of xiao, and how does ancestral veneration relate to it?", "back": "Xiao is filial piety. Ancestral veneration is an expression of xiao extended beyond death, demonstrating continued respect and gratitude to deceased parents and ancestors.", "id": "fc18"}, {"front": "What happens to emotions and society if rituals are absent, according to Confucius?", "back": "Without ritual, emotions have no proper outlet, society lacks a shared grammar, and people do not know how to relate to one another.", "id": "fc19"}, {"front": "If a society performs all the correct rituals but its inner life has 'rotted away,' what would Confucius say?", "back": "Confucius would say that this is empty and dangerous, as ritual must be 'kept alive from the inside' by genuine benevolence (ren), as highlighted in Analects 3:3.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
