<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 0, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why is defining religion considered a difficult task for scholars?", "back": "Scholars have debated the definition for centuries and still disagree."}, {"front": "True or False: Most scholars agree that religion is more than just rules, beliefs, or attending a building.", "back": "True."}, {"front": "Who authored the influential 1902 work titled 'The Varieties of Religious Experience'?", "back": "William James."}, {"front": "What were the two primary professional fields of William James?", "back": "Philosophy and psychology."}, {"front": "William James defined religion as the feelings, acts, and experiences of individuals in their _____.", "back": "Solitude."}, {"front": "According to William James, individuals in their solitude apprehend themselves to stand in relation to what?", "back": "Whatever they may consider the divine."}, {"front": "Instead of focusing on institutions or doctrines, what did William James prioritize in his definition of religion?", "back": "Individual experience."}, {"front": "What is the term for an approach to defining religion based on what it does for people and their lives?", "back": "Functional approach."}, {"front": "A functional approach focuses on the internal sense that something _____ demands a response.", "back": "Ultimate."}, {"front": "What type of definition focuses on the content or 'what religion is made of'?", "back": "Substantive definition."}, {"front": "Substantive definitions typically involve belief in what three types of entities?", "back": "Gods, spirits, or supernatural beings."}, {"front": "Which definition of religion matches the way most people think of it in everyday conversation?", "back": "Substantive definition."}, {"front": "What is the primary problem with using a strictly substantive definition of religion?", "back": "It excludes traditions like Buddhism that do not involve a creator God."}, {"front": "Why do many scholars prefer a functional approach over a substantive one?", "back": "To include traditions that lack belief in supernatural beings or a creator God."}, {"front": "Beyond specific definitions, religion is described as a person's deepest _____ toward the ultimate.", "back": "Orientation."}, {"front": "What does a person consider 'ultimate' if they treat it as 'the most real'?", "back": "The divine or sacred."}, {"front": "The 'ultimate' in a religious context is that which is considered the most real, most important, and most worthy of _____.", "back": "Reverence."}, {"front": "Term: Religion", "back": "Definition: An organized system of beliefs, practices, and values used to relate to the sacred or ultimate."}, {"front": "In an organized religion, what is the purpose of 'stories'?", "back": "To explain existence."}, {"front": "In an organized religion, what do 'moral demands' provide?", "back": "Guidelines on how to live."}, {"front": "What is the role of 'rituals' within a religious system?", "back": "To mark important moments."}, {"front": "What social component is typically involved in a religion?", "back": "Communities of shared practice."}, {"front": "Term: Theology", "back": "Definition: The formal study of religious beliefs and their meaning."}, {"front": "What is the primary question a theologian might ask about God?", "back": "What is God like?"}, {"front": "How does theology differ from religion in terms of its intellectual process?", "back": "Theology is religion thinking carefully about itself."}, {"front": "A theologian examines how the _____ relates to the world.", "back": "Divine."}, {"front": "What do theologians analyze to determine the meaning of their tradition?", "back": "Sacred texts."}, {"front": "Term: Transcendence", "back": "Definition: That which goes beyond ordinary experience, such as the ultimate or the divine."}, {"front": "Something is considered _____ if it lies beyond the limits of the natural, material world.", "back": "Transcendent."}, {"front": "True or False: Most religions point toward something transcendent, though they describe it differently.", "back": "True."}, {"front": "What are two common synonyms used for 'the transcendent' in the text?", "back": "The ultimate and the sacred."}, {"front": "Approximately how many distinct religions are estimated to be practiced globally?", "back": "Between 4,000 and 10,000."}, {"front": "Most of the world's religions have fewer than how many followers?", "back": "10,000."}, {"front": "How many religions worldwide have more than one million adherents?", "back": "About 20."}, {"front": "Despite diversity, what four consistent questions do most religions address?", "back": "Meaning, purpose, morality, and what lies beyond death."}, {"front": "Which specific tradition is mentioned as a challenge to substantive definitions because it may lack belief in a creator God?", "back": "Certain forms of Buddhism."}, {"front": "The functional approach focuses on the _____ it feels like to be a person sensing the ultimate.", "back": "Inside."}, {"front": "According to the text, a substantive definition focuses on the _____ of religion.", "back": "Content."}, {"front": "A functional approach focuses on religion's _____ in human lives.", "back": "Role or purpose."}, {"front": "What did William James consider to be 'religion' in his 1902 work?", "back": "Individual feelings, acts, and experiences."}, {"front": "The study of religious beliefs and their meaning is called _____.", "back": "Theology."}, {"front": "What term describes the quality of being beyond the limits of the natural world?", "back": "Transcendence."}, {"front": "In the organized system of religion, 'moral demands' are specifically about _____.", "back": "How to live."}, {"front": "What is the relationship between the number of religions and the number of adherents for most traditions?", "back": "Most religions have a small number of followers (fewer than 10,000)."}, {"front": "Theology involves religion thinking _____ about itself.", "back": "Carefully."}, {"front": "According to the text, what 'demands a response' in a functional definition?", "back": "Something ultimate or 'more'."}, {"front": "Which approach to defining religion is considered 'more specific'?", "back": "Substantive definition."}, {"front": "Is the substantive definition based on what religion *is* or what it *does*?", "back": "What it is."}, {"front": "Is the functional definition based on what religion *is* or what it *does*?", "back": "What it does."}, {"front": "In the keyterm definition of religion, what type of system is it described as?", "back": "An organized system."}, {"front": "The text suggests holding both the functional and substantive definitions _____.", "back": "Loosely."}, {"front": "Religious stories are intended to explain _____.", "back": "Existence."}, {"front": "What is the focus of a functional approach to defining religion?", "back": "What religion does for people."}, {"front": "What is the focus of a substantive approach to defining religion?", "back": "What religion is made of (its content)."}, {"front": "According to the text, the questions religions ask are remarkably _____ across all traditions.", "back": "Consistent."}, {"front": "Which component of an organized religion is a community of 'shared practice'?", "back": "Religious communities."}, {"front": "William James's landmark work was published in what year?", "back": "1902."}, {"front": "How does James's definition view the 'divine'?", "back": "As whatever an individual considers it to be."}, {"front": "Theology asks: 'What does our tradition's _____ mean?'", "back": "Sacred text."}, {"front": "Religion is described as a human being's deepest _____.", "back": "Orientation."}, {"front": "What does a substantive definition require belief in to count as a religion?", "back": "Gods, spirits, or supernatural beings."}, {"front": "A substantive definition is often considered too limited because it excludes religions without a _____.", "back": "Creator God."}, {"front": "What term is used for the quality of being 'the most real' and 'worthy of reverence'?", "back": "Ultimate."}, {"front": "Scholars often combine the functional and substantive approaches to avoid the _____ of each.", "back": "Problems or limitations."}, {"front": "What are 'rituals' used to mark in a religious system?", "back": "Important moments."}, {"front": "What are stories used to explain in a religious system?", "back": "Existence."}, {"front": "What do religions use to provide guidelines for living?", "back": "Moral demands."}, {"front": "The questions religions ask about what lies beyond _____ are consistent across the world.", "back": "Death."}, {"front": "How many religions have more than 1,000,000 followers?", "back": "About 20."}, {"front": "The formal study of religious beliefs is called _____.", "back": "Theology."}, {"front": "Something that goes beyond ordinary experience is called _____.", "back": "Transcendence."}, {"front": "Which definition approach focuses on what religion 'does'?", "back": "Functional."}, {"front": "Which definition approach focuses on what religion 'is'?", "back": "Substantive."}, {"front": "What did William James focus on instead of institutional structures?", "back": "Individual experience."}, {"front": "True or False: According to the text, the term 'religion' refers to a building people visit once a week.", "back": "False."}, {"front": "Religion relates people to what two things?", "back": "The sacred or the ultimate."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
