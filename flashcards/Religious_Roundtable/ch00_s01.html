<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 0, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Term: Epistemology", "back": "Definition: The study of knowledge."}, {"front": "Which branch of philosophy asks the core question, \"How do we know anything?\"", "back": "Epistemology."}, {"front": "In the study of reality, _____ is the discipline that investigates the origin and structure of the universe.", "back": "Cosmology"}, {"front": "What is the primary focus of cosmology according to the text?", "back": "The origin and structure of the universe."}, {"front": "Which question does the field of cosmology seek to answer?", "back": "What exists and where did it come from?"}, {"front": "In a theological or philosophical context, what is the definition of \"anthropology\"?", "back": "The study of human nature."}, {"front": "Which branch of inquiry addresses the question, \"What is a human being?\"", "back": "Anthropology."}, {"front": "Term: Soteriology", "back": "Definition: The study of salvation or liberation."}, {"front": "Soteriology is defined as the study of _____ or liberation.", "back": "salvation"}, {"front": "What is the technical definition of \"eschatology\"?", "back": "The study of the end—of individual life, of history, and of the cosmos."}, {"front": "Which philosophical field asks the question, \"Where is history going?\"", "back": "Eschatology."}, {"front": "Eschatology is the study of the \"end\" regarding individual life, the cosmos, and _____.", "back": "history"}, {"front": "According to the text, how many religious and philosophical traditions are invited to the \"roundtable\"?", "back": "Nine."}, {"front": "List the three Abrahamic traditions included among the nine traditions in the book.", "back": "Christianity, Judaism, and Islam."}, {"front": "Which two major traditions originating from the Indian subcontinent are included in the nine?", "back": "Hinduism and Buddhism."}, {"front": "Name the two Chinese traditions included in the nine.", "back": "Taoism and Confucianism."}, {"front": "Which polytheistic tradition from Northern Europe is included in the book's nine traditions?", "back": "Norse Paganism."}, {"front": "Which modern socio-political ideology is treated as one of the nine philosophical traditions?", "back": "Communism."}, {"front": "What is the first stage in the sequence philosophers and theologians use to build a complete account of reality?", "back": "Epistemology."}, {"front": "In the sequence of philosophical inquiry, which field follows epistemology?", "back": "Cosmology."}, {"front": "Which field follows cosmology in the sequence of building a worldview?", "back": "Anthropology."}, {"front": "According to the text's sequence, what topic follows anthropology?", "back": "Revelation."}, {"front": "In the progression of the nine cycles, which field follows revelation?", "back": "Ethics."}, {"front": "Which technical term refers to the stage of inquiry following ethics and preceding soteriology?", "back": "Praxis."}, {"front": "What field of study follows praxis in the cycle sequence?", "back": "Soteriology."}, {"front": "In the book's sequence, what field follows soteriology?", "back": "Theology proper."}, {"front": "What is the final stage in the sequence of building a complete account of reality?", "back": "Eschatology."}, {"front": "The sequence of inquiry moves from epistemology (how we know) to _____ (what exists).", "back": "cosmology"}, {"front": "What is the central image used to organize the interaction between the nine traditions?", "back": "A roundtable."}, {"front": "The study of the nature of knowledge itself is called _____.", "back": "epistemology"}, {"front": "Which term describes the study of the ultimate fate of the universe and humanity?", "back": "Eschatology."}, {"front": "The study of how a tradition views the \"liberation\" of the soul or person is known as _____.", "back": "soteriology"}, {"front": "What is the technical term for the study of the origin of the universe?", "back": "Cosmology."}, {"front": "Which of the nine traditions is a non-theistic, modern system focused on historical materialism?", "back": "Communism."}, {"front": "How does the text define the theological use of the term \"anthropology\"?", "back": "The study of human nature."}, {"front": "In the nine cycles, the study of human nature is referred to as _____.", "back": "anthropology"}, {"front": "The study of the \"end\" of history is a component of which discipline?", "back": "Eschatology."}, {"front": "Which cycle in the sequence explores the study of salvation?", "back": "Soteriology."}, {"front": "Which cycle in the sequence addresses the study of knowledge?", "back": "Epistemology."}, {"front": "Which cycle in the sequence addresses the origin of the universe?", "back": "Cosmology."}, {"front": "Which tradition among the nine is an East Asian tradition emphasizing social harmony and the teachings of a specific sage?", "back": "Confucianism."}, {"front": "Which of the nine traditions is based on the ancient myths and beliefs of Scandinavia?", "back": "Norse Paganism."}, {"front": "The sequence of building a complete account of reality ends with the study of _____.", "back": "eschatology"}, {"front": "Which field of study is placed between Ethics and Soteriology in the provided sequence?", "back": "Praxis."}, {"front": "Which field of study is placed between Revelation and Praxis?", "back": "Ethics."}, {"front": "Which field of study is placed between Soteriology and Eschatology?", "back": "Theology proper."}, {"front": "The study of the structure of the universe is a key part of _____.", "back": "cosmology"}, {"front": "What are the three levels of \"the end\" that eschatology studies?", "back": "Individual life, history, and the cosmos."}, {"front": "Term: Praxis", "back": "Definition: A technical term for religious or philosophical practice or action."}, {"front": "In the context of the book, which tradition is included alongside world religions but is primarily a political philosophy?", "back": "Communism."}, {"front": "How many \"cycles\" or structured conversations form the heart of the book?", "back": "Nine."}, {"front": "Which branch of theology specifically investigates the concept of salvation?", "back": "Soteriology."}, {"front": "The question \"What is a human being?\" belongs to the cycle of _____.", "back": "anthropology"}, {"front": "The question \"How do we know anything?\" belongs to the cycle of _____.", "back": "epistemology"}, {"front": "The question \"Where is history going?\" belongs to the cycle of _____.", "back": "eschatology"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
