<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 17, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core problem described as the 'transcendence-immanence tension'?", "back": "It's the theological problem of simultaneously affirming that God is utterly beyond the world (transcendent) and genuinely near to us (immanent), despite these ideas pulling in opposite directions.", "id": "fc01"}, {"front": "Define theological transcendence.", "back": "The idea that God is utterly beyond the world—infinite, uncaused, unlike anything we can name, existing outside of and independent from creation.", "id": "fc02"}, {"front": "Define theological immanence.", "back": "The idea that God is genuinely near, present in our experience, within the world, responsive to us, and available in everyday reality.", "id": "fc03"}, {"front": "How does Islam typically navigate the transcendence-immanence tension?", "back": "Islam holds both poles simultaneously and refuses to let go of either, insisting on both sides based on revealed scripture rather than philosophical argument.", "id": "fc04"}, {"front": "What is 'Tawhid' in Islam and what does it emphasize regarding transcendence?", "back": "Tawhid is the absolute oneness and incomparability of Allah, insisting that nothing is comparable to God and no image captures God, thereby emphasizing Allah's absolute transcendence.", "id": "fc05"}, {"front": "What is 'Shirk' in Islam and why is it considered the gravest error?", "back": "Shirk is associating anything with God. It is the gravest error because it violates Tawhid, the principle of Allah's absolute oneness and transcendence.", "id": "fc06"}, {"front": "What is a key Quranic verse cited to affirm Allah's immanence?", "back": "\"He is nearer to him than his jugular vein\" (Quran 50:16), and also \"Wherever you turn, there is the face of Allah.\"", "id": "fc07"}, {"front": "How does the Sufi tradition specifically approach Allah's immanence?", "back": "The Sufi tradition pursues the immanence side into mystical experience, emphasizing 'qurb' (the nearness to Allah that can be felt, not just affirmed).", "id": "fc08"}, {"front": "How does Hinduism, particularly the Advaita school, attempt to resolve the transcendence-immanence tension?", "back": "It offers a philosophical resolution: nirguna Brahman (transcendent, formless absolute) and saguna Brahman (personal, immanent divine) are two aspects of one reality. Further, 'atman is Brahman'.", "id": "fc09"}, {"front": "Distinguish between 'nirguna Brahman' and 'saguna Brahman'.", "back": "Nirguna Brahman is the transcendent, formless absolute without attributes. Saguna Brahman is the personal, immanent divine with names, forms, and attributes. Both are considered aspects of one ultimate reality.", "id": "fc10"}, {"front": "Explain the Advaita Hindu concept 'atman is Brahman'.", "back": "This means the individual soul (atman) is not a fragment of the divine but is, at the deepest level, already identical with the ultimate reality (Brahman). The experience of separation is an illusion.", "id": "fc11"}, {"front": "What is 'maya' in Advaita Hinduism's explanation of reality?", "back": "Maya is illusion. It is the cosmic force that creates the appearance of the material world and the experience of separation between atman and Brahman, even though they are ultimately identical.", "id": "fc12"}, {"front": "What challenging questions does the Advaita resolution ('atman is Brahman') raise?", "back": "If atman is Brahman, it raises questions about the significance of individual existence and whether the self is ultimately real or ultimately illusory.", "id": "fc13"}, {"front": "How does Taoism address the distinction between transcendence and immanence?", "back": "Taoism does not hold them in tension or resolve them philosophically; instead, it dissolves the categories themselves, stating that the Tao is prior to such distinctions.", "id": "fc14"}, {"front": "What is 'the Tao' in Taoist philosophy?", "back": "The Tao is the ultimate reality, the underlying principle of the universe, which is prior to all distinctions and categories, including 'beyond the world' and 'within the world'.", "id": "fc15"}, {"front": "What is 'wu wei' in Taoism, and what does it signify about interacting with the Tao?", "back": "Wu wei is a responsive, unforced alignment with the Tao as it flows through everything, including oneself. It is the appropriate response to the Tao, rather than argument or intellectual analysis.", "id": "fc16"}, {"front": "Compare the primary approach of Islam, Advaita Hinduism, and Taoism to the transcendence-immanence tension.", "back": "Islam holds the poles in tension. Advaita Hinduism offers a philosophical resolution. Taoism dissolves the categories entirely.", "id": "fc17"}, {"front": "What fundamental belief do Islam, Advaita Hinduism, and Taoism share about the divine or ultimate reality?", "back": "All three insist that the divine/ultimate reality is in some fundamental sense 'other than' the ordinary categories of experience, not just 'one more thing' in the universe.", "id": "fc18"}, {"front": "How do these three traditions (Islam, Hinduism, Taoism) ensure 'access' to the divine or ultimate reality, despite its otherness?", "back": "The Sufi finds 'qurb' (nearness to Allah); the Advaitin realizes 'atman is Brahman' (identity with Brahman); the Taoist practices 'wu wei' (flowing with the Tao).", "id": "fc19"}, {"front": "According to the text, can the transcendence-immanence tension be truly resolved?", "back": "The text suggests it 'cannot be resolved — only navigated,' implying it might be a description of reality that just does not fit neatly into ordinary language or logic, rather than a contradiction.", "id": "fc20"}, {"front": "What broader philosophical question does the transcendence-immanence tension pose?", "back": "It questions whether being 'utterly beyond' and 'closer to you than you are to yourself' is a contradiction, or if it describes a profound reality that transcends ordinary language and logical categories.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
