<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is *tawhid*, the central theological principle of Islam, and what does it mean?", "back": "*Tawhid* is the absolute oneness and unity of God. It means God is utterly unique, undivided, and without partner, equal, or rival.", "id": "fc01"}, {"front": "How does *tawhid* function as a 'liberation theology' in Islam?", "back": "*Tawhid* asserts that only God has absolute claim over humanity, rejecting all other authorities (rulers, idols, ideologies, desires) as unworthy of ultimate loyalty. This liberates individuals from any human or earthly power.", "id": "fc02"}, {"front": "What is *shirk*, and why is it considered highly significant in Islam?", "back": "*Shirk* is associating partners with God (idolatry). It is the one offense the Quran describes as unforgivable, as it directly violates *tawhid*.", "id": "fc03"}, {"front": "According to Islamic belief, what is the role of prophets?", "back": "Prophets are messengers chosen by God to deliver divine guidance to humanity. Islam honors a long line of prophets, including Adam, Noah, Abraham, Moses, and Jesus.", "id": "fc04"}, {"front": "Who is considered the 'Seal of the Prophets' in Islam, and what does this title signify?", "back": "Muhammad is the 'Seal of the Prophets' (*Khatam al-Anbiya'*), meaning he is the last and final prophet whose revelation in the Quran supersedes and corrects all previous ones.", "id": "fc05"}, {"front": "How does Islam view previous scriptures like the Hebrew Bible and the Gospels compared to the Quran?", "back": "Islam honors the Hebrew Bible and Gospels in principle, believing they contained genuine revelation. However, it holds that these texts, as currently possessed, were distorted or corrupted by human error, while the Quran alone is incorruptible.", "id": "fc06"}, {"front": "List the six Articles of Faith (*Arkan al-Iman*) in Islam.", "back": "Belief in one God, in the angels, in the revealed scriptures, in the prophets, in the Day of Judgment, and in divine providence (*qadar*).", "id": "fc07"}, {"front": "What is *Yawm al-Qiyama*, and what is its significance in Islamic consciousness?", "back": "*Yawm al-Qiyama* is the Day of Judgment. It occupies a central place, as every human will be resurrected, held accountable for their life's acts, and rewarded in Paradise or face consequences, serving as a motivating force for ethical choices.", "id": "fc08"}, {"front": "What are the Five Pillars of Islam?", "back": "The Five Pillars are the five fundamental religious duties required of every Muslim: the Declaration of Faith (*Shahada*), daily prayer (*Salat*), almsgiving (*Zakat*), fasting during Ramadan (*Sawm*), and the pilgrimage to Mecca (*Hajj*).", "id": "fc09"}, {"front": "Describe the *Shahada* and its significance.", "back": "The *Shahada* is the Declaration of Faith: 'I bear witness that there is no god but God, and I bear witness that Muhammad is the messenger of God.' Spoken sincerely, it makes one a Muslim and marks significant life events.", "id": "fc10"}, {"front": "Explain the practice of *Salat*, including its frequency and direction.", "back": "*Salat* is the daily prayer performed five times a day (at dawn, midday, afternoon, sunset, and night). Muslims orient themselves toward the Ka'ba in Mecca and perform structured sequences of standing, bowing, and prostration.", "id": "fc11"}, {"front": "What is *Zakat*, and how does it differ from ordinary charity?", "back": "*Zakat* is obligatory almsgiving, requiring Muslims who possess wealth above a minimum threshold to give 2.5% of their savings annually to those in need. It is an obligation and a purification of wealth, not merely a generous extra.", "id": "fc12"}, {"front": "Describe *Sawm*, the Islamic practice of fasting during Ramadan, and its multi-faceted purpose.", "back": "During the month of Ramadan, Muslims fast completely from food, drink, and other physical pleasures from dawn until sunset. It is a physical discipline, an act of gratitude, and a practice of solidarity with those who go hungry involuntarily.", "id": "fc13"}, {"front": "Who is required to perform the *Hajj*, and what are some key aspects of this pilgrimage?", "back": "Every Muslim who is physically and financially able must make the pilgrimage to Mecca at least once in their lifetime. Pilgrims dress identically in white cloth and perform rituals like circling the Ka'ba, walking between two hills, and standing in prayer at Arafat.", "id": "fc14"}, {"front": "What is the symbolic significance of the *Hajj* for Muslims?", "back": "The *Hajj* is often a powerful experience, symbolizing unity and equality among Muslims from all nations, with pilgrims dressed identically and performing the same rituals. It is seen by many as a foretaste of the equality of Judgment Day.", "id": "fc15"}, {"front": "Define *Iman* in Islamic theology and its three dimensions.", "back": "*Iman* is the Arabic word for faith. In Islamic theology, it has three dimensions: belief in the heart, affirmation with the tongue, and enactment in deeds. It signifies a whole-person orientation toward God.", "id": "fc16"}, {"front": "According to Islamic theology, what does the concept of *tawhid* imply about things in modern life that people treat as sources of ultimate meaning and value?", "back": "*Tawhid* means nothing else deserves ultimate loyalty or worship. Islamic theology would view modern pursuits like wealth, power, fame, or ideologies, when they claim ultimate loyalty or become ultimate sources of meaning, as forms of *shirk*, diverting worship from God alone.", "id": "fc17"}, {"front": "How does *Salat* contribute to a Muslim's daily life beyond being a mere ritual?", "back": "*Salat* punctuates and sanctifies the entire day, providing structured moments of reflection, connection with God, and discipline that frames a Muslim's activities and keeps their faith central.", "id": "fc18"}, {"front": "What is the role of *qadar* (divine providence) within the Articles of Faith?", "back": "*Qadar* refers to the decree or will of God. It is an article of faith emphasizing the belief that God has knowledge and control over all things, while still upholding human accountability.", "id": "fc19"}, {"front": "Why is the Quran considered incorruptible in Islam, unlike previous revelations?", "back": "Islam holds that while earlier prophets received genuine revelation, human error subsequently distorted or corrupted those texts. The Quran, revealed to Muhammad, is believed to be the final, complete, and perfectly preserved word of God, hence incorruptible.", "id": "fc20"}, {"front": "What immediate actions or declarations are involved in becoming a Muslim?", "back": "To become a Muslim, one must sincerely speak the *Shahada*: 'I bear witness that there is no god but God, and I bear witness that Muhammad is the messenger of God.'", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
