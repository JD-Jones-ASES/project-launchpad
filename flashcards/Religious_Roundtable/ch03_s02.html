<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what year did Muhammad die without leaving written instructions for leadership?", "back": "632"}, {"front": "What is the central question that caused the most significant division in Islamic history?", "back": "Who has the legitimate authority to guide the ummah?"}, {"front": "What percentage of the global Muslim population identifies as Sunni?", "back": "Approximately 85–90%"}, {"front": "What is the literal meaning of the term 'caliph'?", "back": "Successor or deputy"}, {"front": "According to Sunni tradition, how should a caliph be chosen?", "back": "By community consensus"}, {"front": "What are the two primary responsibilities of a caliph in Sunni Islam?", "back": "To govern Muslim affairs and protect the faith"}, {"front": "Who was the first of the four 'Rightly Guided Caliphs'?", "back": "Abu Bakr"}, {"front": "Who was the second of the four 'Rightly Guided Caliphs'?", "back": "Umar"}, {"front": "Who was the third of the four 'Rightly Guided Caliphs'?", "back": "Uthman"}, {"front": "Who was the fourth of the four 'Rightly Guided Caliphs'?", "back": "Ali"}, {"front": "How do Sunni Muslims view the era of the first four caliphs?", "back": "As the golden age of Islamic governance"}, {"front": "Term: Madhab", "back": "Definition: A school of legal interpretation within Sunni Islam."}, {"front": "How many major madhabs (schools of legal interpretation) exist in Sunni Islam?", "back": "Four"}, {"front": "What is the literal meaning of 'Shia' (from Shi'at Ali)?", "back": "The party of Ali"}, {"front": "Whom do Shia Muslims believe should have immediately succeeded Muhammad?", "back": "Ali ibn Abi Talib"}, {"front": "What was Ali ibn Abi Talib's familial relationship to Muhammad?", "back": "He was Muhammad's cousin and son-in-law"}, {"front": "What title do Shia Muslims give to the descendants of Ali who led the community?", "back": "Imams"}, {"front": "According to Shia belief, what special authority do Imams possess?", "back": "Divinely guided interpretation of the revelation"}, {"front": "Does Shia Islam hold that the Imams possessed the power of prophecy?", "back": "No, prophecy ended with Muhammad"}, {"front": "In what year did the Battle of Karbala take place?", "back": "680"}, {"front": "Which significant figure was murdered at the Battle of Karbala?", "back": "Husayn (the son of Ali)"}, {"front": "What is the name of the annual Shia observance that commemorates the tragedy of Karbala?", "back": "Ashura"}, {"front": "List three countries where Shia Muslims currently form a majority.", "back": "Iran, Iraq, and Bahrain (also Lebanon)"}, {"front": "How is Sufi Islam categorized in relation to the Sunni and Shia denominations?", "back": "It is a spiritual current that runs through both traditions rather than a separate denomination"}, {"front": "What is the primary focus of Sufism (the mystical strand of Islam)?", "back": "Inward practice, devotion, and contemplation aimed at the direct experience of God"}, {"front": "Term: Dhikr", "back": "Definition: The Sufi practice of meditation and chanting God's names."}, {"front": "Who is the 13th-century Persian poet famous for his Sufi poems about divine love?", "back": "Jalal al-Din Rumi"}, {"front": "What is the central theme of Jalal al-Din Rumi's poetry?", "back": "The soul's longing for God and divine love"}, {"front": "What Sufi term refers to 'nearness' or 'closeness' to God?", "back": "Qurb"}, {"front": "What is a common criticism of Sufism from other groups within Islam?", "back": "It is accused of blurring the line between God and creation"}, {"front": "In which three major regions was Sufism an effective vehicle for spreading Islam peacefully?", "back": "Africa, Central Asia, and South Asia"}, {"front": "What four foundational practices are shared by Sunni, Shia, and Sufi Muslims?", "back": "Praying the same prayers, fasting Ramadan, reciting the same Quran, and facing the Ka'ba"}, {"front": "What theological principle describes the unity of the global Muslim community?", "back": "The unity of the ummah"}, {"front": "The whirling dance of Sufi dervishes is primarily a form of _____.", "back": "Moving meditation"}, {"front": "In the Sufi dervish dance, what does the right hand facing upward symbolize?", "back": "Receiving divine grace"}, {"front": "In the Sufi dervish dance, what does the left hand facing downward symbolize?", "back": "Passing divine grace to the earth"}, {"front": "What does the act of spinning represent in the Sufi dervish tradition?", "back": "Turning away from the self toward the divine center"}, {"front": "The 'Rightly Guided Caliphs' is a term specifically used by which branch of Islam?", "back": "Sunni Islam"}, {"front": "To whom did Shia Muslims believe leadership should have passed after Muhammad's death instead of Abu Bakr?", "back": "Ali ibn Abi Talib"}, {"front": "Which event is considered a 'defining tragedy' of Islamic history by Shia Muslims?", "back": "The Battle of Karbala"}, {"front": "In the context of the dervish dance, the soul is described as revolving around _____.", "back": "God"}, {"front": "How do Sunni madhabs differ from one another?", "back": "They differ on details of practice and legal interpretation"}, {"front": "According to the text, how many countries feature Sunni cultural expressions?", "back": "Fifty-plus countries"}, {"front": "What specific type of authority do Shia Imams hold regarding the revelation?", "back": "Divinely guided interpretation"}, {"front": "The observance of Ashura is characterized by what two emotional states?", "back": "Profound mourning and reflection"}, {"front": "Sufis use the term 'qurb' to describe the _____ of religious life.", "back": "Goal"}, {"front": "According to the text, is Sufism a separate denomination?", "back": "No, it is a spiritual current within Sunni and Shia Islam"}, {"front": "What is the role of the 'community consensus' in the Sunni selection of leadership?", "back": "It is the method used to choose a qualified leader (caliph)"}, {"front": "True or False: Sufis exclude the Quran from their practices to focus on meditation.", "back": "False (they recite the same Quran as other Muslims)"}, {"front": "What physical object do all branches of Islam face during prayer?", "back": "The Ka'ba"}, {"front": "What is the primary difference between the Sunni caliph and the Shia Imam regarding spiritual status?", "back": "The caliph is a qualified leader chosen by consensus, while the Imam has divinely guided spiritual authority"}, {"front": "Which branch of Islam is described as having a 'monolithic' appearance but actually contains various schools and cultures?", "back": "Sunni Islam"}, {"front": "The term 'ummah' refers to the ____.", "back": "Muslim community"}, {"front": "What is the historical significance of the year 632 in Islam?", "back": "It was the year Muhammad died"}, {"front": "Who was Husayn's father?", "back": "Ali ibn Abi Talib"}, {"front": "What kind of 'meditation' is the Sufi whirling dance described as?", "back": "Moving meditation"}, {"front": "What was the result of the Battle of Karbala for the Shia tradition?", "back": "It became a defining tragedy and a focal point for annual mourning"}, {"front": "What is the relationship between the dervish spinning and the concept of 'self'?", "back": "The spinning represents turning away from the self"}, {"front": "Which group believes the leadership of the ummah should be based on bloodline or direct descent from Muhammad?", "back": "Shia Muslims"}, {"front": "What is the main purpose of chanting God's names (dhikr) in Sufism?", "back": "To aim for a direct experience of God's presence"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
