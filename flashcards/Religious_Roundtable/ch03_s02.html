<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what year did Muhammad die without leaving written instructions for leadership succession?", "back": "632"}, {"front": "What central question regarding the \"ummah\" caused the most significant division in Islamic history?", "back": "Who has the legitimate authority to lead the community?"}, {"front": "What percentage of the global Muslim population identifies as Sunni?", "back": "85–90%"}, {"front": "The title \"caliph\" literally translates to _____.", "back": "Successor (or deputy)"}, {"front": "By what method does Sunni Islam hold that a leader should be chosen?", "back": "Community consensus"}, {"front": "What are the primary responsibilities of a caliph in Sunni tradition?", "back": "Governing Muslim affairs and protecting the faith."}, {"front": "The first four leaders of the Muslim community after Muhammad are collectively known as the _____.", "back": "Rightly Guided Caliphs"}, {"front": "Who was the first of the Rightly Guided Caliphs?", "back": "Abu Bakr"}, {"front": "Who was the second of the Rightly Guided Caliphs?", "back": "Umar"}, {"front": "Who was the third of the Rightly Guided Caliphs?", "back": "Uthman"}, {"front": "Who was the fourth of the Rightly Guided Caliphs?", "back": "Ali"}, {"front": "Which era do Sunnis regard as the \"golden age\" of Islamic governance?", "back": "The era of the Rightly Guided Caliphs"}, {"front": "What is the term for the four major schools of legal interpretation within Sunni Islam?", "back": "Madhabs"}, {"front": "The name \"Shia\" is derived from the phrase \"Shi'at Ali,\" which means _____.", "back": "The party of Ali"}, {"front": "According to Shia Islam, who was the rightful immediate successor to Muhammad?", "back": "Ali ibn Abi Talib"}, {"front": "What two family relationships did Ali ibn Abi Talib have with Muhammad?", "back": "Cousin and son-in-law"}, {"front": "In Shia Islam, the descendants of Ali who serve as leaders are known as _____.", "back": "Imams"}, {"front": "How does the spiritual authority of an Imam differ from Muhammad's authority?", "back": "Imams possess divinely guided interpretation, but they do not possess prophecy."}, {"front": "What 680 CE event is considered a defining tragedy of Shia history?", "back": "The Battle of Karbala"}, {"front": "Which historical figure was murdered at the Battle of Karbala?", "back": "Husayn (son of Ali)"}, {"front": "The annual Shia observance commemorating the death of Husayn is called _____.", "back": "Ashura"}, {"front": "List four modern-day countries where Shia Muslims constitute a majority.", "back": "Iran, Iraq, Bahrain, and Lebanon"}, {"front": "Rather than a separate denomination, Sufism is described as a _____.", "back": "Spiritual current (or mystical strand) running through Sunni and Shia traditions."}, {"front": "What is the primary goal of Sufi religious practice?", "back": "Direct experience of God's presence"}, {"front": "What are the three pillars of Sufi inward practice?", "back": "Meditation, devotion, and contemplation"}, {"front": "The Sufi practice of chanting God's names is known as _____.", "back": "Dhikr"}, {"front": "Which 13th-century Persian poet is the most famous figure of the Sufi tradition?", "back": "Jalal al-Din Rumi"}, {"front": "What are the two central themes of Rumi's poetry?", "back": "Divine love and the soul's longing for God."}, {"front": "In Sufism, the term \"qurb\" refers to _____.", "back": "Nearness (or closeness) to God"}, {"front": "On what theological grounds have critics within Islam sometimes challenged Sufism?", "back": "The blurring of the line between God and creation."}, {"front": "In which three world regions was Sufism an effective vehicle for spreading Islam peacefully?", "back": "Africa, Central Asia, and South Asia"}, {"front": "Despite historical divisions, all Muslims share what four core practices/elements?", "back": "Same prayers, same Ramadan fast, same Quran, and same Ka'ba."}, {"front": "What theological principle is described as running deeper than any division within the Muslim community?", "back": "The unity of the ummah"}, {"front": "What is the purpose of the whirling dance performed by Sufi dervishes?", "back": "It is a form of moving meditation and physical expression of the soul revolving around God."}, {"front": "In the whirling dervish dance, what does the upward-facing right hand represent?", "back": "Receiving divine grace"}, {"front": "In the whirling dervish dance, what does the downward-facing left hand represent?", "back": "Passing divine grace to the earth"}, {"front": "What does the act of spinning represent in the Sufi dervish tradition?", "back": "Turning away from the self toward the divine center."}, {"front": "Term: Madhab", "back": "Definition: A school of legal interpretation within Sunni Islam."}, {"front": "The murder of Husayn at Karbala occurred in the year _____.", "back": "680"}, {"front": "How do Sunni and Shia views on the identity of the first leader after Muhammad differ?", "back": "Sunnis recognize Abu Bakr, while Shias believe it should have been Ali ibn Abi Talib."}, {"front": "What distinguishes the Sunni \"consensus\" model of leadership from the Shia model?", "back": "Sunnis favor a qualified leader chosen by the community, while Shias favor hereditary spiritual authority through Ali's line."}, {"front": "Sufis use _____ to achieve direct experience of God's presence.", "back": "Inward practices like meditation and dhikr"}, {"front": "According to the text, Sunni Islam is not monolithic because it includes _____ and varied cultural expressions.", "back": "Four major schools of legal interpretation (madhabs)"}, {"front": "The core of the Sunni-Shia split concerns the _____ to guide the ummah.", "back": "Legitimate authority"}, {"front": "Why is the era of the first four caliphs significant to Sunni Muslims?", "back": "It is regarded as the golden age of Islamic governance."}, {"front": "What is the primary goal of the \"moving meditation\" practiced by Sufis?", "back": "To express the soul revolving around God."}, {"front": "Shia Muslims commemorate Ashura as a day of _____.", "back": "Profound mourning and reflection"}, {"front": "How does the text define the \"ummah\"?", "back": "The Muslim community."}, {"front": "Concept: Dhikr", "back": "Definition: A Sufi practice involving the rhythmic chanting of the names of God."}, {"front": "Which branch of Islam is described as having spreading peacefully across Africa and South Asia?", "back": "Sufi Islam"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
