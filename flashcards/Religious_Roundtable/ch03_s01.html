<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central theological principle of Islam regarding the absolute oneness and unity of God?", "back": "Tawhid"}, {"front": "In Islamic theology, what does the term 'shirk' signify?", "back": "The idolatrous act of associating partners with God."}, {"front": "Which offense does the Quran describe as the only one that is unforgivable?", "back": "Shirk (associating partners with God)."}, {"front": "How does Islamic theology frame 'tawhid' in a practical, social sense beyond simple monotheism?", "back": "As a liberation theology that rejects the absolute claim of any human authority or earthly power."}, {"front": "According to Islamic belief, who was the very first prophet?", "back": "Adam"}, {"front": "What is the Islamic view regarding the original revelations received by prophets like Abraham, Moses, and Jesus?", "back": "They were genuine revelations that were subsequently distorted or corrupted by human error."}, {"front": "Which title is given to Muhammad to signify that he is the last and final prophet?", "back": "The Seal of the Prophets (Khatam al-Anbiya')."}, {"front": "Why does the Quran supersede and correct previous scriptures like the Hebrew Bible and the Gospels?", "back": "Because those earlier texts are no longer fully reliable due to human distortion, while the Quran is incorruptible."}, {"front": "What are the 'arkan al-iman' in Islamic theology?", "back": "The articles of faith."}, {"front": "List the six fundamental articles of faith (arkan al-iman) in Islam.", "back": "Belief in one God, angels, revealed scriptures, prophets, the Day of Judgment, and divine providence."}, {"front": "What is the Arabic term for divine providence, representing the decree or will of God?", "back": "Qadar"}, {"front": "What is the Arabic name for the Day of Judgment in Islamic consciousness?", "back": "Yawm al-Qiyama"}, {"front": "According to Islamic belief, what happens to every human being on the Day of Judgment?", "back": "They are resurrected and held accountable for every act of their lives."}, {"front": "What are the 'Arkan al-Islam'?", "back": "The Five Pillars (the fundamental religious duties required of every Muslim)."}, {"front": "Which pillar involves the declaration: \"I bear witness that there is no god but God, and I bear witness that Muhammad is the messenger of God\"?", "back": "Shahada"}, {"front": "Which of the Five Pillars is considered the essential act that makes one a Muslim when spoken sincerely?", "back": "Shahada (Declaration of Faith)."}, {"front": "How many times daily is a Muslim required to perform Salat (prayer)?", "back": "Five times."}, {"front": "Toward which structure must Muslims orient themselves during daily prayer?", "back": "The Ka'ba in Mecca."}, {"front": "What physical actions constitute the structured sequence of the Salat (prayer)?", "back": "Standing, bowing, and prostration."}, {"front": "What is the specific annual percentage required for Zakat (almsgiving)?", "back": "$2.5\\%$ of savings."}, {"front": "How does Islamic theology distinguish Zakat from ordinary, voluntary charity?", "back": "Zakat is an obligation and a purification of wealth, not just a generous extra."}, {"front": "During which Islamic month is the obligatory fast (Sawm) performed?", "back": "Ramadan"}, {"front": "Why was the month of Ramadan chosen for the annual fast?", "back": "It is the month in which the first Quranic revelation came to Muhammad."}, {"front": "What are the daily time constraints for fasting during Ramadan?", "back": "From dawn until sunset."}, {"front": "Besides physical discipline and gratitude, what social purpose does the fast of Sawm serve?", "back": "It is a practice of solidarity with those who go hungry involuntarily."}, {"front": "What is the 'Hajj'?", "back": "The pilgrimage to Mecca that must be performed at least once by those physically and financially able."}, {"front": "What do pilgrims wear during the Hajj to symbolize equality?", "back": "Identical white cloth."}, {"front": "What are the three core rituals performed during the Hajj mentioned in the text?", "back": "Circling the Ka'ba, walking between two hills, and standing in prayer at the plain of Arafat."}, {"front": "What does the Arabic word 'iman' mean?", "back": "Faith"}, {"front": "Identify the three dimensions of 'iman' (faith) in Islamic theology.", "back": "Belief in the heart, affirmation with the tongue, and enactment in deeds."}, {"front": "The phrase \"There is no God but God\" is a radical negation of what, according to the text?", "back": "Anything that is not God that claims ultimate loyalty, such as rulers, idols, or ideologies."}, {"front": "In the context of Salat, what does the prayer do for a Muslim's daily life?", "back": "It punctuates and sanctifies the entire day."}, {"front": "What is the significance of the plain of Arafat during the Hajj?", "back": "It is where pilgrims stand in prayer as part of the essential rituals."}, {"front": "According to the text, the Hajj serves as a foretaste of what future event?", "back": "The equality of Judgment Day."}, {"front": "Which pillar is described as the last words a dying Muslim hopes to say?", "back": "Shahada"}, {"front": "Concept: Khatam al-Anbiya'", "back": "Definition: The Seal of the Prophets, referring to Muhammad as the final messenger whose revelation corrects all previous ones."}, {"front": "True or False: In Islam, Zakat is only required of those whose wealth is above a minimum threshold.", "back": "True"}, {"front": "According to the text, 'iman' is not just a set of ideas, but a whole-person _____ toward God.", "back": "orientation"}, {"front": "Which group of people does the Quran mention as having received genuine revelation that was later distorted?", "back": "Jews and Christians."}, {"front": "What is the primary motivating force for ethical choices in Islamic consciousness?", "back": "The Day of Judgment (Yawm al-Qiyama)."}, {"front": "Term: Salat", "back": "Definition: The five-times daily ritual prayer performed while facing the Ka'ba in Mecca."}, {"front": "Term: Sawm", "back": "Definition: Fasting from food, drink, and physical pleasures from dawn to sunset during Ramadan."}, {"front": "Term: Zakat", "back": "Definition: The obligatory almsgiving of $2.5\\%$ of savings to those in need as a purification of wealth."}, {"front": "Term: Shahada", "back": "Definition: The declaration of faith witnessing the oneness of God and the messengership of Muhammad."}, {"front": "Term: Hajj", "back": "Definition: The annual pilgrimage to Mecca required once in a lifetime for those who are able."}, {"front": "In Islamic theology, what is the role of the Quran in relation to the Hebrew Bible and the Gospels?", "back": "It supersedes and corrects them."}, {"front": "Which pillar is described as a physical discipline and an act of gratitude?", "back": "Sawm (Fasting)."}, {"front": "Under the principle of tawhid, why is no human authority considered to have an absolute claim over an individual?", "back": "Because only God has the ultimate claim over humanity."}, {"front": "What are the five times of day for Salat?", "back": "Dawn, midday, afternoon, sunset, and night."}, {"front": "The Arabic word for idolatry, _____, literally means associating partners with God.", "back": "shirk"}, {"front": "What is the Islamic term for the articles of faith?", "back": "Arkan al-iman"}, {"front": "The core rituals of Hajj include circling the _____, which is the focal point of Islamic prayer.", "back": "Ka'ba"}, {"front": "According to the text, faith (iman) must show in how one _____.", "back": "lives"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
