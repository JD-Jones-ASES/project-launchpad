<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central theological principle of Islam regarding the absolute oneness and unity of God?", "back": "Tawhid."}, {"front": "How does Islamic theology describe the relationship between God and any other ideology or power?", "back": "God is utterly unique, undivided, and without partner, equal, or rival."}, {"front": "What is the Arabic term for the sin of associating partners with God?", "back": "Shirk."}, {"front": "According to the Quran, which offense is described as the only one that is unforgivable?", "back": "Shirk (idolatry or associating partners with God)."}, {"front": "In what way does the concept of tawhid function as a \"liberation theology\"?", "back": "It rejects the absolute claim of any human authority or earthly power over an individual."}, {"front": "What is the primary role of a prophet in Islamic theology?", "back": "To serve as a messenger chosen by God to deliver divine guidance to humanity."}, {"front": "Who is recognized in Islam as the first prophet?", "back": "Adam."}, {"front": "Which figures from the Judeo-Christian tradition are explicitly honored in Islam as genuine prophets?", "back": "Noah, Abraham, Moses, and Jesus."}, {"front": "Why does Islam hold that the Quran was necessary despite previous revelations to Moses and Jesus?", "back": "Previous revelations were subsequently distorted or corrupted by human error."}, {"front": "What does the title \"Seal of the Prophets\" (Khatam al-Anbiya') signify regarding Muhammad?", "back": "He is the last and final prophet whose revelation is the final authority."}, {"front": "What is the Islamic perspective on the reliability of the Hebrew Bible and the Gospels as they exist today?", "back": "They are honored in principle but considered not fully reliable due to human distortion."}, {"front": "How does the Quran relate to the revelations that came before it?", "back": "It supersedes and corrects all previous revelations."}, {"front": "What is the collective term for the Islamic articles of faith?", "back": "Arkan al-iman."}, {"front": "Name the six core beliefs included in the arkan al-iman.", "back": "Belief in one God, angels, revealed scriptures, prophets, the Day of Judgment, and divine providence."}, {"front": "What does the term \"qadar\" represent in Islamic belief?", "back": "Divine providence, specifically the decree or will of God."}, {"front": "What is the Arabic term for the Day of Judgment?", "back": "Yawm al-Qiyama."}, {"front": "According to Islamic belief, what happens to every human being on the Day of Judgment?", "back": "They are resurrected and held accountable for every act of their lives."}, {"front": "What role does the Day of Judgment play in a Muslim's daily life?", "back": "It serves as a motivating force for making ethical choices."}, {"front": "What are the \"Five Pillars\" of Islam?", "back": "The five fundamental religious duties required of every Muslim."}, {"front": "What is the Shahada?", "back": "The declaration of faith: \"I bear witness that there is no god but God, and I bear witness that Muhammad is the messenger of God.\""}, {"front": "What is the minimum requirement for an individual to become a Muslim?", "back": "Sincerely speaking the words of the Shahada (Declaration of Faith)."}, {"front": "What is the Arabic term for the five daily prayers in Islam?", "back": "Salat."}, {"front": "At what specific times of day must Salat be performed?", "back": "Dawn, midday, afternoon, sunset, and night."}, {"front": "Toward what specific location do Muslims face during prayer?", "back": "The Ka'ba in Mecca."}, {"front": "What physical actions constitute the structured sequence of Salat?", "back": "Standing, bowing, and prostration."}, {"front": "What is Zakat?", "back": "An obligatory annual almsgiving of 2.5% of a Muslim's savings to those in need."}, {"front": "How does Zakat differ from standard voluntary charity?", "back": "It is a required obligation and a purification of wealth rather than an optional extra."}, {"front": "What is the Arabic term for fasting during the month of Ramadan?", "back": "Sawm."}, {"front": "Why is the month of Ramadan chosen for the annual fast?", "back": "It is the month in which the first Quranic revelation came to Muhammad."}, {"front": "From what must a Muslim abstain during the daily fast of Ramadan?", "back": "Food, drink, and other physical pleasures."}, {"front": "What is the required daily duration of the Ramadan fast?", "back": "From dawn until sunset."}, {"front": "What social and spiritual purposes does Sawm serve?", "back": "It acts as a physical discipline, an act of gratitude, and a practice of solidarity with the hungry."}, {"front": "What is the Hajj?", "back": "The pilgrimage to Mecca that every able Muslim must make at least once in their lifetime."}, {"front": "What are the physical and financial prerequisites for performing the Hajj?", "back": "A Muslim must be both physically and financially able to undertake the journey."}, {"front": "What specific ritual clothing is worn by pilgrims during the Hajj?", "back": "Identical white cloth."}, {"front": "Name three key rituals performed during the annual Hajj.", "back": "Circling the Ka'ba, walking between two hills, and standing in prayer at the plain of Arafat."}, {"front": "What does the Hajj symbolize regarding the afterlife?", "back": "It serves as a foretaste of the equality of all people on Judgment Day."}, {"front": "What is the Arabic term for faith in Islamic theology?", "back": "Iman."}, {"front": "What are the three dimensions of Iman according to Islamic theology?", "back": "Belief in the heart, affirmation with the tongue, and enactment in deeds."}, {"front": "How does the concept of Iman go beyond simple mental assent?", "back": "It is a whole-person orientation toward God that is demonstrated through how one lives."}, {"front": "What is the literal meaning of the term tawhid?", "back": "Absolute oneness and unity."}, {"front": "What are the first words traditionally whispered into a Muslim newborn's ear?", "back": "The Shahada (Declaration of Faith)."}, {"front": "In the context of Zakat, what is the \"threshold\" for giving?", "back": "It is the minimum amount of wealth a Muslim must possess before the obligation to give applies."}, {"front": "Which specific location is associated with the most powerful experience of prayer during Hajj?", "back": "The plain of Arafat."}, {"front": "Term: Yawm al-Qiyama", "back": "Definition: The Day of Judgment in Islamic theology when all are held accountable."}, {"front": "Term: Khatam al-Anbiya'", "back": "Definition: \"Seal of the Prophets,\" signifying Muhammad's role as the final messenger."}, {"front": "Concept: The Quran's incorruptibility", "back": "Definition: The belief that the Quran alone remains perfectly preserved and free from human error."}, {"front": "The Arabic word for idolatry, _____, means associating partners with God.", "back": "shirk"}, {"front": "The five daily prayers known as _____ punctuate and sanctify the entire day for a Muslim.", "back": "Salat"}, {"front": "_____ is the Arabic word for faith, which involves heart, tongue, and action.", "back": "Iman"}, {"front": "During the Hajj, pilgrims circle the _____, a central structure in Mecca.", "back": "Ka'ba"}, {"front": "The Islamic concept of divine providence or the decree of God is known as _____.", "back": "qadar"}, {"front": "A Muslim who possesses wealth above a minimum threshold must give _____ percent of their savings as Zakat.", "back": "2.5"}, {"front": "What are the two components of the Shahada testimony?", "back": "That there is no god but God, and that Muhammad is the messenger of God."}, {"front": "According to the text, what is the significance of pilgrims dressing identically in white during Hajj?", "back": "It demonstrates the equality of all people before God."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
