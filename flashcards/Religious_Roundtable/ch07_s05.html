<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 7, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Confucianism differ from Christianity and Islam regarding a divine figure?", "back": "It has no creator God."}, {"front": "What religious component related to the end of life is missing from Confucianism?", "back": "A salvation narrative."}, {"front": "How did Confucius respond to inquiries about the nature of death?", "back": "He deflected them by focusing on the importance of understanding life first."}, {"front": "Confucius famously asked, \"Not yet understanding _____, how can you understand 'death?'\"", "back": "life"}, {"front": "For how many years has Confucianism served as the ethical framework for Chinese civilization?", "back": "Approximately 2,500 years."}, {"front": "Name the four primary civilizations mentioned as being shaped by Confucian thought.", "back": "China, Korea, Japan, and Vietnam."}, {"front": "What is considered the primary path to self-improvement in the Confucian tradition?", "back": "Education."}, {"front": "What is the Confucian term for intense devotion to parents and ancestors?", "back": "Filial piety."}, {"front": "According to Confucius, what institution serves as the \"school of all virtues\"?", "back": "The family."}, {"front": "Confucianism prioritizes social harmony over _____ assertion.", "back": "individual"}, {"front": "How does Confucianism fundamentally define human beings?", "back": "As relational creatures."}, {"front": "In the Confucian view, where does a person become \"fully human\"?", "back": "Within a web of mutual obligations."}, {"front": "In the 20th century, Chinese reformers attacked Confucianism as the root of China's _____.", "back": "backwardness"}, {"front": "What social structure did 20th-century reformers claim Confucianism unfairly enforced?", "back": "Hierarchy."}, {"front": "What did 20th-century critics argue Confucianism suppressed in favor of tradition?", "back": "Individual rights."}, {"front": "How did historical Confucian practice generally view the status of women?", "back": "As subordinate to men."}, {"front": "Does the text argue that Confucius's own ethical principles justified the historical subordination of women?", "back": "No."}, {"front": "What meritocratic system was produced by the Confucian tradition?", "back": "The examination system."}, {"front": "What was the purpose of the Confucian examination system?", "back": "To open government positions to talent regardless of birth."}, {"front": "The philosophy of _____ obligation gave the governed the right to criticize the governor.", "back": "mutual"}, {"front": "What is the Chinese term for the \"noble person\" or \"gentleman\"?", "back": "Junzi"}, {"front": "By what three qualities is a *junzi* primarily defined?", "back": "Virtue, learning, and care for others."}, {"front": "What two factors are NOT the defining characteristics of a *junzi*?", "back": "Power and wealth."}, {"front": "What is the central ethical question of Confucianism?", "back": "How should human beings treat each other?"}, {"front": "Confucianism lacks an account of the _____, distinguishing it from many Western religions.", "back": "afterlife"}, {"front": "What value does Confucianism place on the \"common good\" compared to the individual?", "back": "The common good is prioritized over individual assertion."}, {"front": "The civilizations of Korea, Japan, and Vietnam developed in _____ with Chinese Confucianism.", "back": "conversation"}, {"front": "Why is the 20th-century critique of Confucianism described as \"incomplete\"?", "back": "It overlooks the tradition's meritocratic and critical features."}, {"front": "In Confucian thought, education is the primary path to social _____.", "back": "contribution"}, {"front": "The Confucian conviction that humans are relational implies that they are defined by _____.", "back": "mutual obligations"}, {"front": "Confucianism provided the framework for Chinese civilization for about _____ centuries.", "back": "25"}, {"front": "Which specific aspect of family life is still visible in East Asian cultures today due to Confucianism?", "back": "Intense filial piety."}, {"front": "True or False: Confucianism is a religion in the same sense as Islam.", "back": "False."}, {"front": "What did reformers claim Confucianism did to individual rights?", "back": "Suppressed them."}, {"front": "The examination system allowed government access to individuals based on _____ rather than birth.", "back": "talent"}, {"front": "What right did the governed possess in a system of mutual obligation?", "back": "The right to criticize the governor."}, {"front": "What are the three core attributes of a *junzi*?", "back": "Virtue, learning, and care for others."}, {"front": "Confucianism's emphasis on education aims at both social contribution and _____.", "back": "self-improvement"}, {"front": "Which East Asian country's development was influenced by its conversation with Confucian thought?", "back": "Korea (or Japan, or Vietnam)."}, {"front": "According to the text, the historical practice of Confucianism often enforced _____ hierarchies.", "back": "unjust"}, {"front": "The term *junzi* is often translated into English as _____.", "back": "gentleman"}, {"front": "What did 20th-century reformers believe was the root of China's lack of progress?", "back": "Confucianism."}, {"front": "Confucius believed that human beings only become \"fully human\" through their _____ to others.", "back": "obligations"}, {"front": "What is the relationship between birth status and government service in the Confucian examination system?", "back": "Birth status was disregarded in favor of talent."}, {"front": "What does the text suggest we should do with Confucian answers today?", "back": "Argue with, learn from, and challenge them."}, {"front": "The devotion to ancestors in East Asia is a manifestation of _____.", "back": "filial piety"}, {"front": "How did Confucianism's actual practice for 2,000 years compare to Confucius's own ethical principles regarding women?", "back": "Actual practice was more restrictive than the principles could justify."}, {"front": "In the Confucian framework, what is the \"school\" where all virtues are taught?", "back": "The family."}, {"front": "What political framework did Confucian thought provide for 2,500 years?", "back": "The framework for Chinese civilization."}, {"front": "Confucianism values the _____ over the assertion of the individual.", "back": "common good"}, {"front": "What kind of person is defined by virtue, learning, and care for others?", "back": "A junzi (or noble person)."}, {"front": "Which specific civilization in Southeast Asia was influenced by Confucianism?", "back": "Vietnam."}, {"front": "According to the text, is Confucianism a creator-God-based religion?", "back": "No."}, {"front": "What was the 20th-century reformer's view on Confucianism and women?", "back": "That it kept women subordinate."}, {"front": "The examination system is an example of the tradition's tendency toward _____ rigidity being balanced by merit.", "back": "hierarchical"}, {"front": "Confucius focuses on life because he believes we cannot understand _____ without it.", "back": "death"}, {"front": "What does Confucianism suggest is the primary way for a person to improve themselves?", "back": "Through education."}, {"front": "Which social concept suggests that human beings are essentially \"relational\"?", "back": "Confucianism."}, {"front": "Under Confucianism, a governor could be criticized due to the philosophy of _____.", "back": "mutual obligation"}, {"front": "What is the primary concern of the noble person in Confucianism?", "back": "Virtue."}, {"front": "How does the text characterize the historical enforcement of hierarchy in Confucianism?", "back": "As unjust."}, {"front": "Confucianism has shaped family structures and _____ systems for over two millennia.", "back": "educational"}, {"front": "What was the primary critique of Confucianism during the 20th century in China?", "back": "That it caused backwardness and suppressed rights."}, {"front": "Confucius insisted that the family is the school of all _____.", "back": "virtues"}, {"front": "What merit-based system did Confucianism produce to manage the state?", "back": "The examination system."}, {"front": "What is the focus of Confucianism's central question?", "back": "Interpersonal treatment (how humans treat each other)."}, {"front": "How did Confucianism influence daily lives in East Asia?", "back": "By shaping family structures and social obligations."}, {"front": "What did reformers claim Confucianism did to the individual?", "back": "Suppressed their rights."}, {"front": "Is the Confucian *junzi* defined by their power?", "back": "No."}, {"front": "The Confucian tradition provides an ethical framework for the civilizations of China, Korea, Japan, and _____.", "back": "Vietnam"}, {"front": "In the Confucian view, humans are fundamentally _____ creatures.", "back": "relational"}, {"front": "The examination system opened government to people of _____.", "back": "talent"}, {"front": "Why does the text claim Confucianism is not a religion like Islam?", "back": "It has no creator God or salvation narrative."}, {"front": "True or False: Confucius encouraged deep theological study of the afterlife.", "back": "False."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
