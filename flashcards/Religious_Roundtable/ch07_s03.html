<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 7, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what year was Kong Qiu (Confucius) born?", "back": "551 BCE"}, {"front": "In which ancient Chinese state was Confucius born?", "back": "Lu"}, {"front": "The ancient state of Lu is located in which modern-day Chinese province?", "back": "Shandong Province"}, {"front": "What was the economic and social background of Confucius's family?", "back": "They were of modest means but had once been aristocratic."}, {"front": "Confucius believed his society had fallen from standards recorded in what sources?", "back": "Ancient texts"}, {"front": "Which dynasty's disintegration created the world in crisis that Confucius lived in?", "back": "The Zhou dynasty"}, {"front": "During Confucius's time, how did lords typically respond to inconvenient advice from advisors?", "back": "They dismissed or murdered the advisors."}, {"front": "Confucius observed that rituals in his era were either ignored or performed as _____.", "back": "Empty theater"}, {"front": "Confucius argued that the disintegration of society was primarily a _____ problem, not just political.", "back": "Moral"}, {"front": "According to Confucius, rituals were meant to express and reinforce what internal qualities?", "back": "Inner virtues"}, {"front": "Which group of people is responsible for giving Kong Qiu the Latinized name 'Confucius'?", "back": "Jesuit missionaries"}, {"front": "What is the meaning of the name 'Kong Fuzi'?", "back": "Master Kong"}, {"front": "Where were the sayings of Confucius compiled after his death?", "back": "The Analects"}, {"front": "In what year did Confucius die?", "back": "479 BCE"}, {"front": "What radical shift did Confucius introduce to Chinese education regarding social status?", "back": "He opened his school to anyone willing to learn, regardless of social rank."}, {"front": "Confucius taught his students classical texts and how to reform society from the _____.", "back": "Inside"}, {"front": "How many years did Confucius spend wandering between states looking for a wise ruler?", "back": "Thirteen years"}, {"front": "Why did most rulers reject the counsel of Confucius during his 13 years of wandering?", "back": "They wanted military advisors rather than philosophers."}, {"front": "To what tasks did Confucius turn his attention upon returning to Lu in his old age?", "back": "Teaching and editing classical texts."}, {"front": "What was Confucius’s personal assessment of his life's mission at the time of his death?", "back": "He was convinced that his mission had failed."}, {"front": "Which dynasty unified China in 206 BCE and adopted Confucianism?", "back": "The Han dynasty"}, {"front": "Why did the Han emperors adopt Confucianism as their philosophical framework?", "back": "They needed a common framework for governing a vast empire."}, {"front": "What system determined who could hold government office based on mastery of Confucian classics?", "back": "The imperial examination system"}, {"front": "In what year was the Confucian imperial examination system abolished?", "back": "1905 CE"}, {"front": "For how long was Confucianism the primary requirement for achieving power in China?", "back": "More than two thousand years"}, {"front": "The imperial examination system was a very early example of what type of civil service?", "back": "Merit-based"}, {"front": "What did candidates for the imperial examinations have to demonstrate in their elaborate essays?", "back": "How to apply the Confucian classics to governance."}, {"front": "What was the main socio-economic limitation of the imperial examination system?", "back": "It favored those who could afford many years of education."}, {"front": "How did the imperial examination system compare to most other ancient political systems?", "back": "It was more open than purely hereditary systems."}, {"front": "Term: Kong Qiu", "back": "Definition: The original name of the philosopher known in the West as Confucius."}, {"front": "Confucius believed people had lost inner virtues that outer rituals were meant to _____.", "back": "Express and reinforce"}, {"front": "According to the text, what was the primary occupation of Confucius for most of his life?", "back": "Teacher"}, {"front": "Confucius read the ancient records of which two groups to find examples of wisdom?", "back": "Kings and ministers"}, {"front": "What characterized the political state of China during the time of Confucius?", "back": "Constant wars and rival states competing for power."}, {"front": "What happened to the 'old rituals' that once held society together during the Zhou decline?", "back": "They were either ignored or performed as empty theater."}, {"front": "Who kept the teachings of Confucius alive after his death?", "back": "His students (who then taught their own students)."}, {"front": "The Han dynasty unification of China occurred in which year?", "back": "206 BCE"}, {"front": "The imperial examination system required years of _____ for candidates.", "back": "Memorizing the Confucian classics"}, {"front": "Which phrase describes the road to power in China for two millennia according to the text?", "back": "It ran through Confucius."}, {"front": "Why was the family status of Confucius significant to his world view?", "back": "It gave him an education while making him aware of society's decline."}, {"front": "Confucius’s family was just poor enough to make him acutely aware of the gap between society and _____.", "back": "The standards of ancient texts"}, {"front": "In the context of the Han dynasty, Confucianism provided a common _____ for governance.", "back": "Philosophical framework"}, {"front": "What was the primary focus of the imperial examination tests?", "back": "Mastery of the Confucian classics"}, {"front": "How did Confucius's educational philosophy challenge 'hereditary privilege'?", "back": "By opening education to anyone regardless of their social rank."}, {"front": "At what stage of his life did Confucius return to Lu to edit classical texts?", "back": "Old age"}, {"front": "According to the text, the Zhou dynasty had provided what two frameworks for China?", "back": "Political and moral frameworks"}, {"front": "What kind of advice was typically considered 'inconvenient' by the lords of Confucius's time?", "back": "Advice that did not involve military strategy."}, {"front": "The Analects was compiled by the _____ of Confucius.", "back": "Students"}, {"front": "Confucius believed that solving society's problems required people to regain their _____.", "back": "Inner virtues"}, {"front": "To Confucius, what was the ultimate goal of learning the classical texts?", "back": "To become the kind of people who could reform government and society."}, {"front": "In the phrase 'empty theater,' what was Confucius describing?", "back": "Rituals performed without the inner virtues they were meant to represent."}, {"front": "True or False: Confucius successfully found a ruler to implement his ideas during his lifetime.", "back": "False"}, {"front": "What was the result of the Han dynasty's need for a common ideology?", "back": "Confucianism became the foundation of Chinese governance."}, {"front": "The imperial examination system determined eligibility for what specific purpose?", "back": "Holding government office"}, {"front": "How did the imperial examination system affect social mobility in China?", "back": "It was more open than hereditary systems but favored the wealthy."}, {"front": "What did Confucius spend his entire life trying to 'close the gap' between?", "back": "His society and the standards of ancient texts."}, {"front": "The Jesuit name 'Confucius' is a Latinized version of what name?", "back": "Kong Fuzi (Master Kong)"}, {"front": "During the Zhou decline, society was held together by _____ that were being ignored.", "back": "Old rituals"}, {"front": "Confucius’s students came from _____ backgrounds.", "back": "Many different"}, {"front": "What was the 'radical move' Confucius made as an educator?", "back": "Opening his school to people regardless of social rank."}, {"front": "How long did the Han dynasty's choice of Confucianism influence Chinese history?", "back": "Over two thousand years"}, {"front": "The imperial examination system was a series of _____ based on classics.", "back": "Rigorous tests"}, {"front": "What did Confucius believe was the prerequisite for rituals to be meaningful?", "back": "Inner virtue"}, {"front": "In 1905 CE, what major shift occurred in the Chinese civil service?", "back": "The Confucian imperial examination system ended."}, {"front": "How did Confucius view the kings and ministers found in ancient records?", "back": "He considered them wise."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
