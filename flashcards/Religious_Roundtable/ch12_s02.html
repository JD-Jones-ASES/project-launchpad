<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 12, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Norse myth, what were the first humans, Ask and Embla, before they received gifts from the gods?", "back": "They were two trees (ash and possibly elm/vine) found lying along the seashore."}, {"front": "Which three essential gifts transformed Ask and Embla into the first man and woman?", "back": "Breath/life-force (\"ond\"), sense/consciousness (\"s\\'er\"), and blood/goodly color/warmth."}, {"front": "Who gave the gift of \"ond\" (breath, life-force) to Ask and Embla, according to the V\"olusp\\'a?", "back": "Odin."}, {"front": "Define the Norse term \"ond\" and explain its significance.", "back": "\"Ond\" is the Norse word for breath or life-force, given by Odin to the first humans. It represents the animating spirit that makes a living body alive, similar to \"spirit\" or \"soul\" in an animating sense, rather than a post-death ghost."}, {"front": "What did the Norse creation story *not* say about humans, contrasting with some other religious traditions?", "back": "It did not say that humans are made in the image of a god, carry a divine spark or immortal soul, or are the pinnacle of creation."}, {"front": "What is the fundamental Norse view of the human person, based on their creation story?", "back": "Humans are fundamentally earthy, physical beings who received specific gifts to become alive. They belong to this world, are part of it, and will return to it."}, {"front": "What is the second great element of Norse anthropology, alongside the earthy view of humans?", "back": "Fate."}, {"front": "Who are the Norns, and what is their role in Norse cosmology?", "back": "The Norns are three figures—Urðr, Verðandi, and Skuld—who sit at the Well of Urðr beneath Yggdrasil and spin the threads of destiny (wyrd) for all living things, including the gods, before birth."}, {"front": "What is the Old English word \"wyrd\" related to, and what does it originally mean?", "back": "\"Wyrd\" is related to the Old Norse \"urðr\" and originally meant \"fated.\" It also derives from a word meaning \"to become\" or \"to turn.\""}, {"front": "How does Norse and Germanic thought define \"wyrd\" beyond simple predestination?", "back": "Wyrd is not simple predestination but a complex, interconnected web of accumulated patterns from what has been. It weaves together a person's choices, character, and conditions of birth, into which each new moment must fit."}, {"front": "Can a person escape their \"wyrd\" according to Norse tradition?", "back": "No, a person cannot escape their wyrd, but they can face it with more or less dignity and courage."}, {"front": "What does the V\"olusp\\'a imply about Norse human identity in relation to fate?", "back": "It implies that a human is not primarily an individual who chooses their path, but a being embedded in a cosmic web whose threads were set before their birth."}, {"front": "How does the Norse understanding of fate (wyrd) contrast with the concept of absolute free will?", "back": "While free will often implies complete control over one's choices and destiny, wyrd suggests that many elements of life are predetermined or woven before birth, even for gods. However, it still emphasizes the importance of how one chooses to face that fate."}, {"front": "What does the Norse tradition offer as a response to the \"uncomfortable doctrine\" of fate?", "back": "It treats it as a reason for a particular kind of courage, rather than despair."}, {"front": "What is the Norse ideal of the human person shaped by, given the understanding of fate?", "back": "The ideal is shaped by the understanding that while one cannot escape what has been woven, one can control the *quality* of how they live within it."}, {"front": "What qualities are within a person's control, according to the Norse heroic ideal, even if fate is set?", "back": "Courage, skill, loyalty to community, generosity as a host, honesty in dealings, and willingness to face hardship without complaint."}, {"front": "Describe the Norse heroic ideal in contrast to a \"triumphant superhero.\"", "back": "The Norse heroic ideal is not a superhero who always wins, but a figure who faces overwhelming odds with clear eyes, does not flinch, and acts with courage despite knowing inevitable hardships like Ragnarök or death."}, {"front": "In Norse thought, what is the relationship between fate and character?", "back": "The human person is a creature of fate, but fate does not determine character. Character is what you bring to fate."}, {"front": "According to the V\"olusp\\'a, who gave \"sense\" (s\\'er) to Ask and Embla?", "back": "Honir."}, {"front": "According to the V\"olusp\\'a, who gave \"heat and goodly hue\" (blood, goodly color, warmth) to Ask and Embla?", "back": "Lothur."}, {"front": "Where do the Norns reside and carry out their task of weaving fate?", "back": "At the Well of Urðr beneath the world tree, Yggdrasil."}, {"front": "Why is the Norse view of the human person described as \"fundamentally earthy\"?", "back": "Because humans are seen as physical beings, like trees, who received specific animating gifts, rather than primarily spiritual beings or having a divine origin. They belong to and will return to this world."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
