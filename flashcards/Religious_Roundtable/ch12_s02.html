<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 12, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Norse myth, what were the first humans, Ask and Embla, before they received gifts from the gods?", "back": "They were two trees (ash and possibly elm or vine) found lying along the seashore, alive but lacking essential human qualities."}, {"front": "What three essential categories of gifts transformed Ask and Embla into the first man and woman?", "back": "Breath/life-force (\"ond\"), sense and consciousness (\"s'er\"), and blood/goodly color/warmth."}, {"front": "According to the Völuspá poem, which three figures gave specific gifts to Ask and Embla?", "back": "Odin gave \"ond\" (soul/breath), Honir gave sense, and Lothur gave heat, motion, and goodly hue."}, {"front": "Define the Norse term \"ond\" and explain its significance in the creation story.", "back": "\"\"ond\"\" is the Norse word for breath or life-force, the animating spirit that makes a living body alive. Without it, Ask and Embla were trees; with it, they became people."}, {"front": "What common theological ideas about humanity does the Norse creation story *not* assert?", "back": "It does not say humans are made in the image of a god, carry a divine spark or immortal soul, or are the pinnacle of creation."}, {"front": "How does Norse paganism fundamentally view the human person in relation to the world?", "back": "Humans are fundamentally earthy, physical beings who belong to this world, are part of it, and will return to it, rather than primarily spiritual beings having a physical experience."}, {"front": "Who are the Norns, and what is their primary role in Norse cosmology?", "back": "The Norns are three female figures who sit at the Well of Urðr beneath Yggdrasil and spin the threads of destiny (wyrd) for all living things, including gods."}, {"front": "Name the three Norns who weave the threads of destiny.", "back": "Urðr, Verðandi, and Skuld."}, {"front": "Where are the Norns said to reside in Norse myth?", "back": "At the Well of Urðr, which is located beneath the world tree Yggdrasil."}, {"front": "Define the term \"wyrd\" and explain its meaning in Norse and Germanic thought.", "back": "\"Wyrd\" is an Old English word (related to Old Norse urðr) meaning fate or destiny. It's not simple predestination but an accumulated, interconnected pattern of past events, choices, character, and birth conditions that shapes the present and future."}, {"front": "What is the original meaning of the modern English word \"weird,\" and from which Old English word is it derived?", "back": "The modern English word \"weird\" originally meant \"fated\" or \"destined,\" and it is derived from the Old English word \"wyrd.\""}, {"front": "In Norse thought, can a person escape their \"wyrd\"? What aspect of their life *can* they control regarding it?", "back": "A person cannot escape their \"wyrd,\" but they can control the quality of how they face it—with more or less dignity and courage."}, {"front": "How does the Norse concept of the Norns weaving fate before birth influence the view of human identity?", "back": "It implies that a human is not primarily an individual who chooses their path, but a being embedded in a cosmic web whose threads of destiny were set before birth."}, {"front": "According to the Völuspá, from where did the Norns come, and what was their initial action?", "back": "They came from the sea and immediately began to cut the threads of fate for all peoples, naming destinies for the children of time and setting down the law."}, {"front": "Can even the gods escape their fate in Norse cosmology?", "back": "No, even the gods are subject to the fate woven by the Norns and cannot escape it."}, {"front": "How does the Norse heroic ideal differ from the modern 'triumphant superhero' archetype?", "back": "The Norse ideal is not the superhero who always wins, but rather the figure who faces overwhelming odds and inevitable hardship with clear eyes, dignity, and courage, without flinching."}, {"front": "What specific qualities define the \"heroic self\" in Norse tradition, given the understanding of fate?", "back": "Courage, skill, loyalty to one's community, generosity as a host, honesty in dealings, and willingness to face hardship without complaint."}, {"front": "Explain the relationship between \"fate\" and \"character\" in Norse thought.", "back": "Fate determines the conditions and circumstances of one's life (\"what has been woven for you\"), but character is what one brings to that fate—how one chooses to live within it and respond to its challenges."}, {"front": "If one cannot change destiny, how does Norse tradition suggest life remains meaningful?", "back": "Meaning comes from the *quality* of how one lives within that fate – the courage, dignity, and character one demonstrates in facing inevitable challenges and death."}, {"front": "The Norse view describes humans as \"physical beings who received the breath of life, the gift of mind, and the warmth of a living body.\" How does this contrast with common alternative perspectives?", "back": "It contrasts with the idea that humans are primarily spiritual beings having a physical experience, emphasizing instead our fundamental connection to the earthly, material world."}, {"front": "What is the significance of the Norse creation story emphasizing that humans are \"living wood, material creatures\"?", "back": "It underscores the fundamentally earthy nature of humanity, belonging to and returning to this world, rather than being primarily spiritual or divine in origin."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
