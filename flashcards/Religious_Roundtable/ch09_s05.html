<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 9, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to the text, which ideology shaped the 20th century more dramatically than any other?", "back": "Communism"}, {"front": "To understand the world of the last _____ years, one must understand the arguments of Marx and the movements that followed them.", "back": "175"}, {"front": "At its peak, what proportion of the world's population lived under Communist governments?", "back": "One-third"}, {"front": "What was the official name of the state referred to as the USSR?", "back": "The Union of Soviet Socialist Republics"}, {"front": "The Union of Soviet Socialist Republics (USSR) existed from 1922 until which year?", "back": "1991"}, {"front": "How many distinct republics were encompassed by the USSR?", "back": "Fifteen"}, {"front": "The USSR's territory spanned Russia, much of Eastern Europe, and which other major region?", "back": "Central Asia"}, {"front": "In what year was the People's Republic of China founded?", "back": "1949"}, {"front": "Which organization remains the governing body of the People's Republic of China today?", "back": "The Chinese Communist Party"}, {"front": "Communist movements influenced labor organizing and anti-colonial independence movements in Latin America, Asia, and which other continent?", "back": "Africa"}, {"front": "The defining global conflict known as the Cold War lasted from roughly 1947 to _____.", "back": "1991"}, {"front": "Which two nations were the primary contestants in the Cold War?", "back": "The United States and the Soviet Union"}, {"front": "The Cold War represented a contest between which two economic systems?", "back": "Capitalism and Communism"}, {"front": "What positive economic outcome is sometimes attributed to Communist governments in certain countries?", "back": "Rapid industrialization"}, {"front": "In some contexts, Communist governments pursued genuine commitments to which social objective regarding sex?", "back": "Gender equality"}, {"front": "Communist movements frequently supported or led movements aimed at ending what type of imperialism?", "back": "European imperialism"}, {"front": "Which Soviet leader was responsible for purges and the creation of a massive labor camp system?", "back": "Stalin"}, {"front": "What was the name of the system of labor camps utilized in the Soviet Union that resulted in millions of deaths?", "back": "The Gulag system"}, {"front": "What was the name of Mao Zedong's campaign that took place from 1958 to 1962?", "back": "The Great Leap Forward"}, {"front": "What were the two primary goals of Mao Zedong's \"Great Leap Forward\"?", "back": "Industrialization and collectivization"}, {"front": "What was the primary cause of death for the estimated 15 to 55 million people during the Great Leap Forward?", "back": "Famine"}, {"front": "Which Communist group was led by Pol Pot in Cambodia?", "back": "The Khmer Rouge"}, {"front": "Approximately what percentage of the Cambodian population was murdered by the Khmer Rouge in the 1970s?", "back": "25 percent"}, {"front": "Historians debate how much Communist atrocities are due to Marx's theory versus the decisions of specific _____.", "back": "Leaders"}, {"front": "What Marxist concept describes the separation of workers from the products of their labor and their own human potential?", "back": "Alienation"}, {"front": "What Marxist concept involves the unfair use of a worker's labor for the benefit of the capitalist?", "back": "Exploitation"}, {"front": "Marx's critique of which economic system is still seriously engaged with by modern philosophers and economists?", "back": "Capitalism"}, {"front": "Marx raised the question of whether capitalism creates conditions that _____ workers.", "back": "Dehumanize"}, {"front": "What does the text describe as a structural problem in a system that turns human effort into a commodity?", "back": "Capitalism"}, {"front": "While Marx's philosophical questions remain relevant, what aspect of his work is described as having a \"troubled track record\"?", "back": "Specific political prescriptions"}, {"front": "The text includes Communism alongside religions like Christianity and Buddhism because it functions as a _____.", "back": "Worldview"}, {"front": "The text argues that Communism is included in the course because it provides answers to fundamental questions with \"great _____ and seriousness.\"", "back": "Force"}, {"front": "What fundamental question about human nature does Communism attempt to answer?", "back": "What is a human being?"}, {"front": "What fundamental question about the timeline of the world does Communism attempt to answer?", "back": "Where did the world come from?"}, {"front": "What fundamental question about human hardship does Communism attempt to answer?", "back": "Why do we suffer?"}, {"front": "What fundamental question about ethics and behavior does Communism attempt to answer?", "back": "How should we live?"}, {"front": "What fundamental question about the destination of human society does Communism attempt to answer?", "back": "Where is history going?"}, {"front": "The text states that an honest examination of any worldview requires understanding it on its _____ _____ before evaluating it.", "back": "Own terms"}, {"front": "Which country is currently the most populous country in the world and governed by a Communist party?", "back": "China"}, {"front": "The 20th-century Communist governments are noted for being responsible for some of the worst _____ _____ catastrophes in history.", "back": "Human rights"}, {"front": "The text identifies Communism as a force that touched _____ _____ of the globe during the Cold War.", "back": "Every corner"}, {"front": "True or False: The text suggests that only Marxists engage seriously with Marx's critique of capitalism.", "back": "False"}, {"front": "Concept: The Khmer Rouge", "back": "Definition: A Communist movement in Cambodia that systematically murdered a quarter of the country's population during the 1970s."}, {"front": "In the context of the text, what is meant by the \"legacy of Communist governance\" being \"genuinely contested\"?", "back": "It is debated because it includes both significant achievements and massive human rights atrocities."}, {"front": "Term: Collectivization", "back": "Definition: A policy of forced consolidation of individual peasant households and labor into collective farms, as seen in the Great Leap Forward."}, {"front": "Mao Zedong's \"Great Leap Forward\" was primarily a campaign for forced _____ and collectivization.", "back": "Industrialization"}, {"front": "According to the text, the specific decisions of leaders are often weighed against _____ _____ when analyzing Communist history.", "back": "Marx's theory"}, {"front": "Which group of professionals, besides philosophers and economists, are mentioned as engaging with the concepts of alienation and exploitation?", "back": "Sociologists and political activists"}, {"front": "The text asserts that the question of whether capitalism turns human creativity into a _____ remains urgently relevant.", "back": "Commodity"}, {"front": "In the concluding note, what is the prerequisite for an \"honest examination\" of a worldview?", "back": "Understanding it on its own terms before evaluation."}, {"front": "Name one of the three specific countries or regions mentioned where Communist movements shaped 20th-century history.", "back": "Latin America (also Africa or Asia)"}, {"front": "The 15 republics of the USSR were primarily located across Russia, Central Asia, and _____ _____.", "back": "Eastern Europe"}, {"front": "What specific moral and philosophical issues raised by Marx have \"not gone away\" despite his political failures?", "back": "The critique of capitalism and the dehumanization of workers."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
