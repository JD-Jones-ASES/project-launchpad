<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the literal translation of the Chinese term 'Tao'?", "back": "The Way."}, {"front": "How does Taoism define the 'Tao' in relation to the universe's origin?", "back": "It is the nameless, formless source and underlying order of all reality."}, {"front": "Why does Taoism claim that the 'name that can be named is not the eternal name'?", "back": "Because the Tao is fundamental and resistant to precise definition or naming."}, {"front": "In what way does the Tao differ from a 'god' in the Western sense?", "back": "It is not a person, does not issue commands, and cannot be prayed to."}, {"front": "The Tao is described as the way the universe moves when nothing is _____ it.", "back": "forcing"}, {"front": "Why is 'water' used as a central metaphor for the Tao?", "back": "It nourishes everything and competes with nothing."}, {"front": "What quality of an 'empty bowl' makes it a useful metaphor for the Tao?", "back": "Its usefulness comes from its emptiness."}, {"front": "Which geographic feature is used to describe the Tao's receptive and low nature?", "back": "A valley."}, {"front": "The Tao is the source from which all things arise and the _____ to which they return.", "back": "pattern"}, {"front": "What is the primary conclusion Taoism draws regarding how a person should live?", "back": "In alignment with the Tao rather than against it."}, {"front": "Term: wu wei", "back": "Definition: Literally 'non-action' or 'effortless action'; acting in accordance with the natural flow of things."}, {"front": "According to Taoist thought, what is the 'art of doing exactly what the situation requires' called?", "back": "wu wei"}, {"front": "What is a common misunderstanding of the concept of 'wu wei'?", "back": "That it means doing nothing or being lazy."}, {"front": "Concept: wu wei", "back": "Attribute: It involves not straining against the grain of reality or imposing an artificial agenda."}, {"front": "How does a Taoist ruler practice the political ideal of 'wu wei'?", "back": "By governing so wisely that the people believe they did everything themselves."}, {"front": "How does a martial artist apply 'wu wei' during a fight?", "back": "By redirecting an opponent's force rather than meeting it head-on."}, {"front": "What is the ecological ideal of 'wu wei' in the context of agriculture?", "back": "Farming with the land rather than against it."}, {"front": "Term: ziran", "back": "Definition: Naturalness or spontaneity; the quality of acting from one's true nature without artifice."}, {"front": "What nature metaphor is used to illustrate the concept of 'ziran'?", "back": "A tree growing or a stream flowing."}, {"front": "According to Taoism, what is usually indicated by the presence of 'effort' in an action?", "back": "That 'ziran' (naturalness) has been lost."}, {"front": "How is the relationship between 'wu wei' and 'ziran' described?", "back": "Ziran is what happens when wu wei is fully realized."}, {"front": "The symbol of 'yin and yang' represents the interplay of two _____ forces.", "back": "complementary"}, {"front": "In the 'yin and yang' symbol, what does the small seed of the opposite color in each half represent?", "back": "That each force contains a seed of the other and they are interdependent."}, {"front": "How does the Taoist view of 'yin and yang' differ from Western dualism?", "back": "It is not a battle of good versus evil, but a"}, {"front": "Which force in the 'yin and yang' pair is associated with receptivity, darkness, and softness?", "back": "yin"}, {"front": "Which force in the 'yin and yang' pair is associated with activity, light, and firmness?", "back": "yang"}, {"front": "True or False: In Taoism, the 'yang' force is considered superior to the 'yin' force.", "back": "False; neither is superior and both are necessary."}, {"front": "Taoism suggests many human problems stem from trying to _____ things.", "back": "force"}, {"front": "How many chapters are contained in the 'Tao Te Ching'?", "back": "Eighty-one"}, {"front": "In Taoism, 'naturalness' is synonymous with the term _____.", "back": "ziran"}, {"front": "What is described as the 'deep current running beneath all appearances'?", "back": "The Tao"}, {"front": "What constitutes the 'martial arts ideal' in Taoism?", "back": "Redirecting force rather than opposing it head-on."}, {"front": "Acting from one's own true nature without self-consciousness is known as _____.", "back": "ziran"}, {"front": "In the context of 'wu wei', acting 'artificially' means _____.", "back": "imposing one's agenda on a situation that calls for something different."}, {"front": "The 'Tao Te Ching' uses the image of a _____ to represent receptivity.", "back": "valley"}, {"front": "Why is the Tao described as 'nameless'?", "back": "Because it is the formless source that precedes and underlies all named things."}, {"front": "What happens to 'ziran' when a person exerts forced effort?", "back": "It is lost."}, {"front": "The 'dance of opposites' refers to the dynamic interplay of _____ and _____.", "back": "yin; yang"}, {"front": "In Taoist philosophy, what is the 'fundamental nature of things'?", "back": "The Tao"}, {"front": "Which concept is defined as acting with 'no wasted energy'?", "back": "wu wei"}, {"front": "Yin and yang are not enemies, but '_____ partners'.", "back": "dance"}, {"front": "What is the primary characteristic of the 'Way' when it is unforced?", "back": "It is the fundamental nature of how the universe moves."}, {"front": "True or False: Taoism is considered a form of pure mysticism with no practical application.", "back": "False; it draws immediate conclusions about practical life and governance."}, {"front": "The interplay of 'yin and yang' is what generates all _____.", "back": "phenomena"}, {"front": "What does the 'empty bowl' metaphor emphasize about the Tao?", "back": "Its infinite utility and potential."}, {"front": "If a situation is 'forced,' it is said to be in opposition to the _____.", "back": "Tao"}, {"front": "What is the 'way' of a tree growing or a stream flowing called in Taoism?", "back": "ziran"}, {"front": "Which Taoist concept involves working with the natural direction of things?", "back": "wu wei"}, {"front": "Taoism describes reality as being structured in pairs of _____.", "back": "complementary opposites"}, {"front": "What does 'non-action' look like in a political context?", "back": "A ruler whose governance is so subtle that the people feel they were self-governing."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
