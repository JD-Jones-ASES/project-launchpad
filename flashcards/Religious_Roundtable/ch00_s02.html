<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 0, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did Karl Marx famously describe religion's effect on society?", "back": "He called it the \"opiate of the masses.\""}, {"front": "According to Marx, why is religion like a drug?", "back": "It numbs people to their real suffering and prevents them from taking action."}, {"front": "How does theologian Paul Tillich define \"faith\"?", "back": "Faith is defined as a person's \"ultimate concern.\""}, {"front": "According to Paul Tillich, what constitutes an \"ultimate concern\"?", "back": "Whatever a person treats as most important and would sacrifice everything else for."}, {"front": "How does historian Mircea Eliade define \"the sacred\"?", "back": "Any reality set apart, charged with special significance, and deserving of a response beyond ordinary behavior."}, {"front": "Concept: Historical Materialism", "back": "Definition: The theory that history is driven by material conditions rather than ideas."}, {"front": "Identify the four structural features Communism shares with traditional religions.", "back": "Cosmic story, moral demands, sacred texts, and eschatological hope."}, {"front": "What theory serves as the \"cosmic story\" in the structure of Communism?", "back": "The theory of historical materialism."}, {"front": "What are the five stages of history outlined in the Communist cosmic story?", "back": "Primitive communism, slavery, feudalism, capitalism, and the classless society."}, {"front": "What is the final stage of history in the Marxist cosmic story?", "back": "The final classless society."}, {"front": "Identify three moral demands Communism makes of its followers.", "back": "Solidarity with the oppressed, resistance to exploitation, and subordination of personal interest to the cause."}, {"front": "Name three texts that function as \"authoritative scriptures\" in Communism.", "back": "The Communist Manifesto, Das Kapital, and the Economic and Philosophic Manuscripts of 1844."}, {"front": "In the religious structure of Communism, what serves as \"eschatological hope\"?", "back": "The vision of the classless society as ultimate redemption."}, {"front": "According to the text, what does the classless society represent beyond political goals?", "back": "The end of alienation and the restoration of human wholeness."}, {"front": "What entity functions as the \"community of the faithful\" in the Communist structure?", "back": "The Party."}, {"front": "Why do scholars include Communism in the study of world religions?", "back": "It functions like a religion in the lives of its adherents and in its intellectual structure."}, {"front": "Karl Marx (1818–1883) grew up in a Jewish family that converted to _____.", "back": "Protestant Christianity"}, {"front": "Where did Karl Marx encounter G.W.F. Hegel's ideas about history?", "back": "The University of Berlin."}, {"front": "How did G.W.F. Hegel believe history was driven?", "back": "Hegel believed history was driven by ideas."}, {"front": "How did Marx's view of historical movement differ from Hegel's?", "back": "Marx argued history was driven by material conditions instead of ideas."}, {"front": "In Marxism, what two factors define \"material conditions\"?", "back": "Who owns the tools of production and who does the labor."}, {"front": "What was the publication year of the *Communist Manifesto*?", "back": "1848"}, {"front": "What was the publication year of *Das Kapital*?", "back": "1867"}, {"front": "According to the text, would Karl Marx have accepted the classification of Communism as a religion?", "back": "No, Marx would have rejected that characterization."}, {"front": "Mircea Eliade argued that the sacred is not simply the _____.", "back": "supernatural"}, {"front": "The Communist call to subordinate personal interest is directed toward the _____ _____.", "back": "revolutionary cause"}, {"front": "Who interprets and debates Communist \"scriptures\" in a way similar to religious commentators?", "back": "Later authorities within the tradition."}, {"front": "The classless society is described as the fulfillment of _____.", "back": "history"}, {"front": "What stage of history precedes capitalism in the Marxist framework?", "back": "Feudalism"}, {"front": "What stage of history precedes feudalism in the Marxist framework?", "back": "Slavery"}, {"front": "The stage of history involving communal living before the rise of slavery is called _____ _____.", "back": "primitive communism"}, {"front": "According to Paul Tillich, faith is the structure of human _____ itself.", "back": "commitment"}, {"front": "Scholars argue Communism raises the same questions as other traditions regarding suffering, justice, history, and _____ _____.", "back": "human nature"}, {"front": "Marx's transformation of Hegel's ideas into a materialist framework is called _____ _____.", "back": "historical materialism"}, {"front": "The \"opiate of the masses\" metaphor suggests religion numbs pain to prevent people from doing what?", "back": "Doing something about their suffering."}, {"front": "What term does Paul Tillich use to describe the object of a person's faith?", "back": "Ultimate concern"}, {"front": "In Eliade's view, the sacred is a reality that is \"set _____.\"", "back": "apart"}, {"front": "Which specific Marxist text was published in 1844?", "back": "Economic and Philosophic Manuscripts"}, {"front": "How does the Marxist cosmic story characterize the movement of history?", "back": "As a movement through specific stages toward a final goal."}, {"front": "In the context of Communist moral demands, \"solidarity\" is specifically directed toward whom?", "back": "The oppressed"}, {"front": "Which philosopher provided the framework for Marx's idea that history moves toward a final fulfillment?", "back": "G.W.F. Hegel"}, {"front": "According to the text, what is the \"restoration of human wholeness\"?", "back": "The classless society (or eschatological hope)."}, {"front": "What is the primary focus of scholarly analysis when classifying Communism as a religion?", "back": "How it functions in the lives of its adherents and its intellectual structure."}, {"front": "The theory that explains history as a sequence of economic stages is called _____ _____.", "back": "historical materialism"}, {"front": "True or False: Including Communism in religious studies is an endorsement of its politics.", "back": "False."}, {"front": "Which university did Karl Marx attend to study philosophy?", "back": "The University of Berlin"}, {"front": "What concept refers to the \"end of alienation\" in Communist thought?", "back": "Eschatological hope"}, {"front": "Marx transformed Hegel's ideas by shifting the focus from ideas to _____ _____.", "back": "material conditions"}, {"front": "In the structure of Communism, which group carries the eschatological hope forward in the world?", "back": "The Party"}, {"front": "What is the significance of the year 1867 in Marxist literature?", "back": "It is the year Das Kapital was published."}, {"front": "What is the significance of the year 1848 in Marxist literature?", "back": "It is the year the Communist Manifesto was published."}, {"front": "What stage follows slavery in the Marxist theory of history?", "back": "Feudalism"}, {"front": "Eliade defines the sacred as requiring a response that goes beyond _____ everyday behavior.", "back": "ordinary"}, {"front": "Tillich's definition of faith implies that faith is not limited to _____ _____.", "back": "traditional religion"}, {"front": "In historical materialism, what determines the structure of society?", "back": "Who owns tools of production and who performs labor."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
