<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Approximately how many people worldwide identify with the Christian tradition today?", "back": "Over two billion people."}, {"front": "What are the three major branches of the Christian family mentioned in the text?", "back": "Roman Catholic, Eastern Orthodox, and Protestant."}, {"front": "On what three main areas do the major branches of Christianity often disagree?", "back": "Authority, worship, and practice."}, {"front": "In what year did the Great Schism occur?", "back": "1054."}, {"front": "During the Great Schism, which leader held authority over the Western church?", "back": "The bishop of Rome (the Pope)."}, {"front": "Which leader held authority over the Eastern church at the time of the Great Schism?", "back": "The patriarch of Constantinople."}, {"front": "What was the primary conflict regarding leadership that led to the Great Schism?", "back": "The Pope's claimed authority over all Christians."}, {"front": "What formal action did the Roman Catholic and Eastern Orthodox churches take against each other in 1054?", "back": "They formally excommunicated each other."}, {"front": "Which liturgical language tradition did Eastern Orthodoxy maintain?", "back": "Ancient Greek."}, {"front": "What term refers to the sacred images used in worship within Eastern Orthodoxy?", "back": "Icons."}, {"front": "Concept: Theosis", "back": "Definition: The belief that humans can be gradually transformed to share in the divine nature."}, {"front": "According to Eastern Orthodoxy, through what three means is theosis achieved?", "back": "Prayer, sacrament, and holy living."}, {"front": "In which regions is Eastern Orthodoxy the dominant Christian tradition today?", "back": "Russia, Greece, and much of Eastern Europe."}, {"front": "In what year did Martin Luther initiate the Protestant Reformation?", "back": "1517."}, {"front": "What was the specific occupation and nationality of Martin Luther?", "back": "A German monk."}, {"front": "Where did Martin Luther post his list of ninety-five objections?", "back": "A church door in Wittenberg."}, {"front": "What specific Church practice regarding purgatory troubled Martin Luther most?", "back": "The sale of indulgences."}, {"front": "What were payments made to the Church that supposedly reduced a soul's time in purgatory called?", "back": "Indulgences."}, {"front": "Luther argued the Church had buried the 'simple Gospel truth' beneath institutional power and _____.", "back": "layers of tradition"}, {"front": "Term: Sola scriptura", "back": "Definition: The belief that Scripture alone is the final authority for Christians."}, {"front": "Term: Sola fide", "back": "Definition: The belief that faith alone, rather than works or sacraments, is the means of salvation."}, {"front": "Which early Protestant movement is also known as the Calvinist tradition?", "back": "The Reformed movement."}, {"front": "List the four original movements produced by the Protestant Reformation mentioned in the text.", "back": "Lutheran, Reformed (Calvinist), Anglican, and Anabaptist."}, {"front": "Which branch of Christianity is currently the largest single body with over a billion members?", "back": "Roman Catholicism."}, {"front": "In Roman Catholicism, the Pope and bishops are viewed as the successors of the _____.", "back": "apostles"}, {"front": "How many sacraments are recognized in the Roman Catholic Church?", "back": "Seven."}, {"front": "What do Catholics believe happens to the bread and wine during the Eucharist?", "back": "They truly become the body and blood of Christ."}, {"front": "Which two groups of figures are particularly venerated in the Roman Catholic tradition?", "back": "Mary and the saints."}, {"front": "Through what 'lens' does Roman Catholicism interpret the reading of Scripture?", "back": "Church tradition."}, {"front": "What doctrinal 'core' regarding the nature of God is shared by all three major branches?", "back": "The Trinity."}, {"front": "What doctrinal 'core' regarding God becoming human is shared by all three major branches?", "back": "The Incarnation."}, {"front": "What central event regarding Jesus' victory over death is shared by all major Christian branches?", "back": "The Resurrection."}, {"front": "What shared 'hope' is a core belief across Catholic, Orthodox, and Protestant traditions?", "back": "The hope of eternal life."}, {"front": "What ancient documents provide a united statement of core beliefs for all three branches?", "back": "The ancient creeds."}, {"front": "According to scholar estimates, approximately how many distinct Christian denominations exist worldwide?", "back": "Between 30,000 and 45,000."}, {"front": "How are many of the thousands of distinct Christian denominations organized?", "back": "As small, locally organized congregations."}, {"front": "What persistent 'impulse' drives the continuous diversity and formation of new Christian denominations?", "back": "The impulse to return to original sources and ask what they actually mean."}, {"front": "In the context of the Reformation, what was the primary target of the 'sola fide' critique?", "back": "The belief that works or sacraments are the means of salvation."}, {"front": "What was the significance of the city of Constantinople in the Great Schism?", "back": "It was the seat of the Eastern patriarch."}, {"front": "In Roman Catholicism, the Eucharist is one of _____ recognized sacraments.", "back": "seven"}, {"front": "Name two modern denominations that belong to the Protestant 'family' today.", "back": "Baptists and Methodists (or Presbyterians, Pentecostals, Evangelicals)."}, {"front": "The Great Schism was caused by authority disputes, theological differences, and centuries of _____.", "back": "cultural drift"}, {"front": "Which branch of Christianity is most associated with the theological concept of theosis?", "back": "Eastern Orthodoxy."}, {"front": "Who posted the list of objections that sparked the Protestant Reformation?", "back": "Martin Luther."}, {"front": "What is the Catholic belief regarding the authority of the Pope?", "back": "He is the successor of the apostles with authority over the Church."}, {"front": "What is the primary difference between how Protestants and Catholics view the authority of Scripture?", "back": "Protestants hold Scripture alone as final authority, while Catholics read it through Church tradition."}, {"front": "What do all three Christian branches agree is the final source of spiritual authority?", "back": "Scripture."}, {"front": "Which Protestant movement is specifically noted for its emphasis on 'faith alone' for salvation?", "back": "The Lutheran movement (as started by Martin Luther)."}, {"front": "How did the Western and Eastern churches formally signify their break in 1054?", "back": "They excommunicated each other."}, {"front": "Which major branch of Christianity is dominant in Greece?", "back": "Eastern Orthodoxy."}, {"front": "In the Protestant tradition, the rejection of the necessity of sacraments for salvation is encapsulated in the phrase _____.", "back": "sola fide"}, {"front": "What role do the 'ancient creeds' play in modern Christianity?", "back": "They unite all three branches on the 'common core' of the faith."}, {"front": "What does the text suggest is the common ancestry shared by all Christian traditions?", "back": "The ancient, undivided Church and its core doctrines."}, {"front": "The 'Great Schism' specifically refers to the split between the _____ and the Eastern Orthodox Church.", "back": "Western Roman Catholic Church"}, {"front": "Luther’s ninety-five objections were primarily targeted at _____.", "back": "Church practices"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
