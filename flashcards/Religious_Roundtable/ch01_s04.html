<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why is the Bible often described as a \"library\" rather than a single book?", "back": "It is a collection of sixty-six or seventy-three books written over a thousand years by dozens of authors."}, {"front": "How many total books are contained in the Protestant Bible?", "back": "66"}, {"front": "How many total books are contained in the Catholic Bible?", "back": "73"}, {"front": "Over approximately what span of time was the Bible written?", "back": "One thousand years"}, {"front": "List the three original languages in which the Bible was written.", "back": "Hebrew, Aramaic, and Greek"}, {"front": "According to the text, what range of social positions did the biblical authors hold?", "back": "They ranged from kings to fishermen."}, {"front": "What are the four stages of the biblical narrative regarding the relationship between God and humanity?", "back": "Creation, fall, redemption, and restoration."}, {"front": "What is the primary subject that provides unity to the various books of the Bible?", "back": "The relationship between God and humanity."}, {"front": "Identify three literary genres found within the Bible.", "back": "Law, history, poetry, prophecy, biography, letter-writing, or apocalyptic vision."}, {"front": "What are the two major sections that divide the Bible?", "back": "The Old Testament and the New Testament."}, {"front": "What term do Jews use to refer to the Hebrew Bible?", "back": "Tanakh"}, {"front": "How many books are included in the Protestant Old Testament canon?", "back": "39"}, {"front": "How many books are included in the Catholic Old Testament canon?", "back": "46"}, {"front": "Term: Canon", "back": "The authoritative collection of texts recognized by a religious community as sacred scripture."}, {"front": "What collective name is given to the additional books found in the Catholic Old Testament but not the Protestant canon?", "back": "The Deuterocanon (or Apocrypha)."}, {"front": "What is the central focus of the books within the Old Testament?", "back": "God's relationship with the people of Israel."}, {"front": "Name three figures or groups whose histories are recorded in the Old Testament.", "back": "Abraham, Moses, the prophets, David, or the people of Israel."}, {"front": "How many books are contained in the New Testament?", "back": "27"}, {"front": "In which century were the books of the New Testament written?", "back": "The first century"}, {"front": "Term: Gospel", "back": "One of the four New Testament accounts narrating the life, teachings, death, and resurrection of Jesus."}, {"front": "List the four Gospels of the New Testament.", "back": "Matthew, Mark, Luke, and John"}, {"front": "Why do the four Gospels present different angles of Jesus's life?", "back": "They were written for different audiences and from different perspectives."}, {"front": "Which New Testament book records the story of the early church?", "back": "The Acts of the Apostles"}, {"front": "Term: Epistle", "back": "A formal letter written by early leaders to address specific communities and theological questions."}, {"front": "Who was the primary author of many of the New Testament epistles?", "back": "Paul"}, {"front": "Which book of the New Testament contains a densely symbolic vision of cosmic history?", "back": "The Book of Revelation"}, {"front": "Which historical event in 397 ratified the 27-book New Testament canon?", "back": "The Council of Carthage"}, {"front": "Describe the process by which the New Testament canon was formed.", "back": "It was a gradual process where texts were circulated and eventually accepted or rejected by councils."}, {"front": "Through what two lenses do Roman Catholics typically interpret the Bible?", "back": "Church tradition and the teaching authority (magisterium) of the Church."}, {"front": "Term: Magisterium", "back": "The teaching authority of the Roman Catholic Church's hierarchy."}, {"front": "Which 16th-century movement introduced the principle of \"sola scriptura\"?", "back": "The Protestant Reformation"}, {"front": "What is the meaning of the Protestant principle \"sola scriptura\"?", "back": "Scripture alone is the ultimate authority for Christian belief and practice."}, {"front": "How did the \"democratization\" of biblical interpretation affect Protestant Christianity?", "back": "It produced remarkable diversity as different readers reached different conclusions from the same text."}, {"front": "What is the Eastern Orthodox view on the relationship between Scripture and Tradition?", "back": "They are inseparable; the Bible cannot be understood without the community that produced it."}, {"front": "Into how many languages has the complete Bible been translated?", "back": "More than 700"}, {"front": "Portions of the Bible exist in approximately how many languages?", "back": "Over 3,500"}, {"front": "What is the Codex Sinaiticus?", "back": "The oldest complete manuscript of the New Testament in Greek."}, {"front": "To what approximate years does the Codex Sinaiticus date?", "back": "330–360"}, {"front": "The Old Testament is primarily the story of God's relationship with the people of _____.", "back": "Israel"}, {"front": "Which major section of the Bible was written by followers of Jesus in the first century?", "back": "The New Testament"}, {"front": "How many books are in the Catholic Old Testament including the Deuterocanon?", "back": "46"}, {"front": "How many books are in the Protestant Old Testament?", "back": "39"}, {"front": "The Book of Revelation is categorized as a/an _____ vision.", "back": "Apocalyptic"}, {"front": "In the Protestant Bible, how many books are in the Old Testament and New Testament respectively?", "back": "39 and 27"}, {"front": "In the Catholic Bible, how many books are in the Old Testament and New Testament respectively?", "back": "46 and 27"}, {"front": "What historical group did the authors of the New Testament represent?", "back": "Followers of Jesus"}, {"front": "Under the principle of sola scriptura, what serves as the ultimate authority for belief?", "back": "The Bible (or Scripture)"}, {"front": "Which ancient manuscript allows readers to view a complete Greek New Testament digitally?", "back": "Codex Sinaiticus"}, {"front": "The Council of Carthage in 397 was responsible for which biblical development?", "back": "The ratification of the 27-book New Testament canon."}, {"front": "Which literary form in the New Testament is used to address specific theological questions in early communities?", "back": "The Epistle (or letter)"}, {"front": "According to scholars, what makes the differences between the four Gospels valuable?", "back": "The differences are as illuminating as the agreements for understanding Jesus."}, {"front": "What specific component of the Old Testament contains the \"psalms of David\"?", "back": "The poetry (or wisdom literature) of Israel."}, {"front": "Which tradition insists that you cannot understand the Bible without the community that produced it?", "back": "Eastern Orthodox Christianity"}, {"front": "The term _____ refers to the collection of additional books found in the Catholic Old Testament.", "back": "Apocrypha (or Deuterocanon)"}, {"front": "Which language was used to write the oldest complete New Testament manuscript, the Codex Sinaiticus?", "back": "Greek"}, {"front": "The narrative movement from creation through fall through redemption toward restoration defines the Bible's _____.", "back": "Unity (or thematic structure)"}, {"front": "What is the primary role of the \"magisterium\" in Roman Catholicism?", "back": "The teaching authority that provides the lens for reading the Bible."}, {"front": "Which section of the Bible includes the stories of Abraham and Moses?", "back": "The Old Testament"}, {"front": "Identify the genre: The Acts of the Apostles.", "back": "History"}, {"front": "Identify the genre: The Psalms.", "back": "Poetry"}, {"front": "How does the Protestant approach to interpretation differ from the Catholic approach?", "back": "Protestants champion individual interpretation via sola scriptura, while Catholics use Church tradition and hierarchy."}, {"front": "The Bible has been translated into more than _____ languages.", "back": "700"}, {"front": "Is the number of books in the New Testament the same for both Catholics and Protestants?", "back": "Yes (both recognize 27 books)."}, {"front": "What is the significance of the 16th century in the history of biblical interpretation?", "back": "It was the start of the Protestant Reformation and the principle of sola scriptura."}, {"front": "Which portion of the New Testament describes the life, teachings, death, and resurrection of Jesus?", "back": "The Gospels"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
