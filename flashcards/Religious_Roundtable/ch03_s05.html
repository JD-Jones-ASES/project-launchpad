<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 3, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the approximate number of Islamic adherents worldwide?", "back": "1.8 billion"}, {"front": "Approximately what ratio of the human population practices Islam?", "back": "One in four"}, {"front": "Which country currently holds the largest Muslim population in the world?", "back": "Indonesia"}, {"front": "Name the three countries that, along with Indonesia, have the largest Muslim populations.", "back": "Pakistan, Bangladesh, and India"}, {"front": "What is the primary language used for Islamic prayer and scripture worldwide?", "back": "Arabic"}, {"front": "Roughly what years define the period known as the Islamic Golden Age?", "back": "800 to 1300"}, {"front": "Name three major cities that served as centers for Islamic scholarship during the Golden Age.", "back": "Baghdad, Cairo, and Cordoba"}, {"front": "Which Greek philosopher's work was preserved and extended by scholars in Baghdad, Cairo, and Cordoba?", "back": "Aristotle"}, {"front": "Islamic scholars preserved and extended the medicine of which ancient authority?", "back": "Galen"}, {"front": "The mathematical traditions of which two regions were extended by Islamic Golden Age scholars?", "back": "Greece and India"}, {"front": "From which Arabic term is the word \"algebra\" derived?", "back": "Al-jabr"}, {"front": "Who was the 9th-century mathematician responsible for the treatise on algebra?", "back": "Al-Khwarizmi"}, {"front": "What is the name for the modern numeral system that entered Europe through Islamic scholarship?", "back": "Hindu-Arabic numerals"}, {"front": "By what Latinized name is the scholar Ibn Sina known in the West?", "back": "Avicenna"}, {"front": "For what specific intellectual contribution is Avicenna (Ibn Sina) famous in European university history?", "back": "A medical encyclopedia used for centuries"}, {"front": "How did Islamic scholarship impact the European Renaissance?", "back": "It preserved the knowledge that the Renaissance later rediscovered"}, {"front": "In which city and country is the Alhambra located?", "back": "Granada, Spain"}, {"front": "What two artistic features are prominently found on the walls of the Alhambra?", "back": "Geometric tilework and calligraphic poetry"}, {"front": "In what year was the Dome of the Rock in Jerusalem completed?", "back": "691"}, {"front": "The mosque of Ibn Tulun, a landmark of architectural history, is located in which city?", "back": "Cairo"}, {"front": "In what year was the mosque of Ibn Tulun in Cairo constructed?", "back": "879"}, {"front": "Name four languages in which major Islamic literary traditions were produced.", "back": "Persian, Arabic, Urdu, and Turkish"}, {"front": "Who are two of the famous Muslim poets whose work has shaped global literary traditions?", "back": "Rumi and Hafiz"}, {"front": "Besides Rumi and Hafiz, which two writers are noted for shaping Islamic literary traditions?", "back": "Omar Khayyam and Ibn Arabi"}, {"front": "What is a primary contemporary challenge regarding the legal structure of some Muslim societies?", "back": "The relationship between Islamic law and modern secular states"}, {"front": "What are two specific social issues frequently debated in contemporary Muslim-majority societies?", "back": "The treatment of women and minorities"}, {"front": "Why is it considered unfair to judge the entire Islamic tradition by its worst practitioners?", "back": "Every major religious tradition has produced both its worst and its best"}, {"front": "Which historical event is cited as an example of Christianity's \"worst\" practitioners?", "back": "The Inquisition"}, {"front": "What contemporary movement is cited as an example of Buddhism's \"worst\" practitioners?", "back": "Buddhist nationalism"}, {"front": "Term: Islamic Golden Age", "back": "Definition: A period of immense intellectual contribution between 800 and 1300 centered in cities like Baghdad and Cairo."}, {"front": "Cloze: The countries with the largest Muslim populations are Indonesia, Pakistan, Bangladesh, and _____.", "back": "India"}, {"front": "Cloze: The word algebra comes from a treatise by the 9th-century mathematician _____.", "back": "Al-Khwarizmi"}, {"front": "Cloze: The _____ in Granada, Spain, is a monument to beauty in service of the sacred.", "back": "Alhambra"}, {"front": "How does the source characterize the relationship between problems and solutions within the Islamic tradition?", "back": "The tradition contains both problems and resources for solving them"}, {"front": "True or False: Islam is primarily a Middle Eastern religion.", "back": "False"}, {"front": "On which continents do Muslim populations currently live?", "back": "Every continent"}, {"front": "What role does Arabic play for Muslims who speak other native languages?", "back": "It remains the language of prayer and scripture"}, {"front": "Which three regions' philosophical or scientific traditions were translated by Golden Age Islamic scholars?", "back": "Greece, India, and the Islamic world itself (extending Aristotle and Galen)"}, {"front": "What specific type of poetry is found on the walls of the Alhambra?", "back": "Calligraphic poetry"}, {"front": "The Dome of the Rock is located in which city?", "back": "Jerusalem"}, {"front": "Identify one of the major themes students of Islam are expected to engage with honestly.", "back": "Questions of violence and reform"}, {"front": "According to the text, why is knowing nothing about Islam a form of ignorance regarding humanity?", "back": "Because Muslims represent a quarter of the human population"}, {"front": "Which 9th-century mathematician's work led to the modern word \"algebra\"?", "back": "Al-Khwarizmi"}, {"front": "What was the significance of Cordoba during the period of 800–1300?", "back": "It was a major center for translating and extending philosophy and science"}, {"front": "Which Muslim poet is mentioned alongside Hafiz and Omar Khayyam?", "back": "Rumi"}, {"front": "The treatement of _____ and _____ are cited as serious contemporary questions in some Muslim-majority societies.", "back": "Women; minorities"}, {"front": "What is the Latinized name for Ibn Sina?", "back": "Avicenna"}, {"front": "Which landmark was built first: the Dome of the Rock or the mosque of Ibn Tulun?", "back": "The Dome of the Rock (691 vs. 879)"}, {"front": "What was the primary goal of scholars in Baghdad regarding ancient Greek philosophy?", "back": "To translate, preserve, and extend it"}, {"front": "What specific mathematical system was transmitted to Europe via Islamic scholarship?", "back": "Hindu-Arabic numerals"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
