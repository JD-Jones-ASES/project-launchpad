<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 3, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Approximately how many people worldwide adhere to Islam?", "back": "1.8 billion."}, {"front": "What fraction of the human population identifies as Muslim?", "back": "About one in four."}, {"front": "In terms of size, what is Islam's rank among the world's religions?", "back": "Second-largest."}, {"front": "Islam is the second-largest religion on earth, with approximately _____ adherents.", "back": "1.8 billion"}, {"front": "Which country currently holds the largest Muslim population in the world?", "back": "Indonesia."}, {"front": "Name one of the four countries listed as having the largest Muslim populations.", "back": "Pakistan (or Indonesia, Bangladesh, or India)."}, {"front": "Which language serves as the universal language of prayer and scripture for all Muslims?", "back": "Arabic."}, {"front": "According to the text, what is the consequence of knowing nothing about Islam?", "back": "Ignorance of a quarter of humanity."}, {"front": "What approximate years define the period known as the Islamic Golden Age?", "back": "800 to 1300."}, {"front": "Name one of the three major cities identified as centers of scholarship during the Islamic Golden Age.", "back": "Baghdad (or Cairo or Cordoba)."}, {"front": "Islamic Golden Age scholars are credited with preserving and extending the philosophy of which Greek thinker?", "back": "Aristotle."}, {"front": "The scholars of the Islamic Golden Age translated and preserved the medical works of which ancient figure?", "back": "Galen."}, {"front": "The mathematical traditions of which two regions were preserved and extended by Islamic scholars?", "back": "Greece and India."}, {"front": "From which specific Arabic term does the word \"algebra\" originate?", "back": "Al-jabr."}, {"front": "Which 9th-century mathematician wrote the treatise that introduced the term \"al-jabr\"?", "back": "Al-Khwarizmi."}, {"front": "What is the common name for the modern numeral system that reached Europe via Islamic scholarship?", "back": "Hindu-Arabic numerals."}, {"front": "By what name is the scholar Ibn Sina known in the Western tradition?", "back": "Avicenna."}, {"front": "Where was Avicenna's medical encyclopedia primarily used for several centuries?", "back": "European universities."}, {"front": "What major European historical period might have had \"far less to rediscover\" without Islamic scholarship?", "back": "The Renaissance."}, {"front": "In which city and country is the Alhambra located?", "back": "Granada, Spain."}, {"front": "What two specific artistic elements are noted as being intricate on the walls of the Alhambra?", "back": "Geometric tilework and calligraphic poetry."}, {"front": "The Alhambra is described as a monument to putting beauty in service of the _____.", "back": "Sacred"}, {"front": "In what year was the Dome of the Rock in Jerusalem constructed?", "back": "691."}, {"front": "In which city is the historic Mosque of Ibn Tulun located?", "back": "Cairo."}, {"front": "In what year was the Mosque of Ibn Tulun in Cairo built?", "back": "879."}, {"front": "Name one of the four primary languages that produced the influential literature of the Muslim world.", "back": "Persian (or Arabic, Urdu, or Turkish)."}, {"front": "Which 13th-century Persian poet is mentioned as a major figure in Islamic literary tradition?", "back": "Rumi."}, {"front": "Name the author of the \"Rubaiyat\" who is cited as a key figure in Islamic literature.", "back": "Omar Khayyam."}, {"front": "List one of the influential poets or writers mentioned in the text besides Rumi or Omar Khayyam.", "back": "Hafiz (or Ibn Arabi)."}, {"front": "What contemporary challenge concerns the interaction between religious and secular governance in Islam?", "back": "The relationship between Islamic law and modern secular states."}, {"front": "Which two specific demographic groups' treatment is cited as a modern concern in some Muslim-majority societies?", "back": "Women and minorities."}, {"front": "The text argues it is unfair to judge the whole Islamic tradition by its _____ practitioners.", "back": "Worst"}, {"front": "Which historical Christian event is used as a comparison to the \"worst\" of the Islamic tradition?", "back": "The Inquisition."}, {"front": "The text compares modern challenges in Islam to which specific contemporary movement in Buddhism?", "back": "Buddhist nationalism."}, {"front": "What does the Islamic tradition contain that assists in addressing its own modern problems?", "back": "Resources for solving them."}, {"front": "While Europe struggled with basic literacy, scholars in Baghdad were extending the medicine of _____.", "back": "Galen"}, {"front": "Term: Islamic Golden Age", "back": "Definition: A period of immense intellectual contribution (c. 800–1300) centered in cities like Baghdad and Cairo."}, {"front": "Which mathematician is responsible for the transmission of Hindu-Arabic numerals to Europe?", "back": "Al-Khwarizmi."}, {"front": "True or False: Islam is primarily a Middle Eastern religion.", "back": "False (The largest populations are in Indonesia, Pakistan, Bangladesh, and India)."}, {"front": "What is the primary message of the section regarding the geographic distribution of Muslims?", "back": "Muslims live on every continent and in virtually every nation."}, {"front": "What philosophical work did Golden Age scholars help preserve for future generations?", "back": "The philosophy of Aristotle."}, {"front": "The Mosque of _____ in Cairo stands as a landmark of architectural history from the year 879.", "back": "Ibn Tulun"}, {"front": "According to the text, how should students engage with questions of violence and reform in Islam?", "back": "With honest engagement and context."}, {"front": "Which specific architectural landmark is located in Jerusalem?", "back": "The Dome of the Rock."}, {"front": "What was the role of Islamic scholars regarding the mathematics of Greece and India?", "back": "Translating, preserving, and extending them."}, {"front": "Which 9th-century figure wrote the treatise on \"al-jabr\"?", "back": "Al-Khwarizmi."}, {"front": "The text states that every major religious tradition has produced both its _____ and its _____.", "back": "Worst; best"}, {"front": "In which city were scholars preserving Aristotle's philosophy alongside Cairo and Cordoba?", "back": "Baghdad."}, {"front": "The complex geometric tilework mentioned in the text is a hallmark of which Spanish landmark?", "back": "The Alhambra."}, {"front": "What is the primary reason the text gives for why knowing about Islam matters?", "back": "Its followers represent a quarter of humanity."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
