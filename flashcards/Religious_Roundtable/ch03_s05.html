<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 3, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Approximately how many people worldwide are adherents of Islam?", "back": "1.8 billion"}, {"front": "Islam is ranked as the _____-largest religion on earth.", "back": "second"}, {"front": "What fraction of the human population identifies as Muslim?", "back": "One in four"}, {"front": "Which country has the largest Muslim population in the world?", "back": "Indonesia"}, {"front": "Identify three countries with large Muslim populations besides Indonesia.", "back": "Pakistan, Bangladesh, and India"}, {"front": "True or False: Islam is primarily a Middle Eastern religion.", "back": "False (The largest populations are in Indonesia, Pakistan, Bangladesh, and India)"}, {"front": "Regardless of their native tongue, what language do all Muslims use for prayer and scripture?", "back": "Arabic"}, {"front": "The intellectual period known as the Islamic Golden Age occurred between approximately which years?", "back": "800 and 1300"}, {"front": "Name the three major cities that served as centers for Islamic scholarship during the Golden Age.", "back": "Baghdad, Cairo, and Cordoba"}, {"front": "Islamic scholars in the Middle Ages were responsible for translating and extending the philosophy of which Greek figure?", "back": "Aristotle"}, {"front": "Which Greek physician's medical works were preserved and extended by Islamic scholars?", "back": "Galen"}, {"front": "The English word \"algebra\" is derived from which Arabic term?", "back": "al-jabr"}, {"front": "Who was the 9th-century mathematician who wrote the treatise on \"al-jabr\"?", "back": "al-Khwarizmi"}, {"front": "The modern numeral system used today entered Europe through Islamic scholarship and is called the _____ numerals.", "back": "Hindu-Arabic"}, {"front": "Which scholar, known as Ibn Sina, produced a medical encyclopedia used in Europe for centuries?", "back": "Avicenna"}, {"front": "How did Islamic scholars influence the European Renaissance?", "back": "They preserved and extended knowledge for the Renaissance to rediscover."}, {"front": "In which city and country is the Alhambra located?", "back": "Granada, Spain"}, {"front": "The Alhambra is famous for its calligraphic poetry and its intricate _____ tilework.", "back": "geometric"}, {"front": "According to the text, the Alhambra serves as a monument to putting beauty in service of the _____.", "back": "sacred"}, {"front": "In which city is the Dome of the Rock located?", "back": "Jerusalem"}, {"front": "In what year was the Dome of the Rock completed?", "back": "691"}, {"front": "Where is the mosque of Ibn Tulun located?", "back": "Cairo"}, {"front": "In what year was the mosque of Ibn Tulun established?", "back": "879"}, {"front": "Name one of the two famous Persian poets mentioned as major global literary figures.", "back": "Rumi (or Hafiz)"}, {"front": "Beside Rumi and Hafiz, who are the other two major Muslim writers mentioned in the text?", "back": "Omar Khayyam and Ibn Arabi"}, {"front": "List the four specific language traditions of literature produced by Muslim writers mentioned in the text.", "back": "Persian, Arabic, Urdu, and Turkish"}, {"front": "A major contemporary challenge in the Muslim world is the relationship between modern secular states and _____.", "back": "Islamic law"}, {"front": "What contemporary questions regarding social groups does the text suggest students of Islam will encounter?", "back": "The treatment of women and minorities"}, {"front": "The text argues that it is unfair to judge the whole Islamic tradition by its worst practitioners, similar to judging Christianity by the _____.", "back": "Inquisition"}, {"front": "Which contemporary Buddhist movement is used as a comparison to the extremist challenges within Islam?", "back": "Buddhist nationalism"}, {"front": "Islamic scholars extended mathematical knowledge from which two primary ancient civilizations?", "back": "Greece and India"}, {"front": "Where was Avicenna's medical encyclopedia primarily used for several centuries?", "back": "European universities"}, {"front": "How does the text characterize the state of Europe during the Islamic Golden Age?", "back": "Europe was struggling to preserve basic literacy."}, {"front": "The text states that the Islamic tradition contains both problems and _____ for solving them.", "back": "resources"}, {"front": "According to the text, why is knowing something about Islam necessary for understanding humanity?", "back": "Muslims represent a quarter of the human population."}, {"front": "On which continents can Muslim populations be found today?", "back": "Every continent"}, {"front": "The intellectual contributions of Islamic civilization between 800 and 1300 were _____.", "back": "immense"}, {"front": "Which specific architectural feature is noted on the walls of the Alhambra?", "back": "Calligraphic poetry"}, {"front": "What is the name of the 9th-century mathematician who wrote the treatise on al-jabr?", "back": "al-Khwarizmi"}, {"front": "What specific contemporary debate involves the structure of government in Muslim-majority societies?", "back": "The relationship between Islamic law and modern secular states"}, {"front": "Islamic scholars in Baghdad, Cairo, and Cordoba were responsible for preserving the philosophy of _____.", "back": "Aristotle"}, {"front": "The Dome of the Rock and the mosque of Ibn Tulun are cited as landmarks of _____.", "back": "architectural history"}, {"front": "Who wrote the medical encyclopedia used by European universities?", "back": "Avicenna (Ibn Sina)"}, {"front": "The text describes the Islamic Golden Age as a period often spanning from _____ to _____.", "back": "800; 1300"}, {"front": "What does the text suggest is the proper way to approach the challenges of contemporary Islam?", "back": "Honest engagement and providing context"}, {"front": "What is the linguistic origin of the word algebra?", "back": "Arabic (al-jabr)"}, {"front": "Which major religion is the only one larger than Islam by population?", "back": "Christianity (implied by Islam being the second-largest)"}, {"front": "In what language is the calligraphic poetry on the Alhambra walls likely written?", "back": "Arabic"}, {"front": "The Hindu-Arabic numerals were introduced to Europe through _____ scholarship.", "back": "Islamic"}, {"front": "Which Islamic landmark was built in Jerusalem in 691?", "back": "The Dome of the Rock"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
