<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 13, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Poetic Edda?", "back": "The older of the two Eddas, a collection of anonymous Old Norse poems compiled in Iceland around 1270, notably in the manuscript known as the Codex Regius.", "id": "fc01"}, {"front": "Name some significant poems found within the Poetic Edda.", "back": "Prominent poems include the Völuspá, Hávamál, and Grímnismál, among other mythological and heroic verses.", "id": "fc02"}, {"front": "Why is the Poetic Edda considered a crucial source for Norse mythology?", "back": "It is our earliest direct source for Norse mythology.", "id": "fc03"}, {"front": "Who wrote the Prose Edda and when?", "back": "Snorri Sturluson, a Christian Icelandic chieftain, wrote the Prose Edda between 1179 and 1241.", "id": "fc04"}, {"front": "What was Snorri Sturluson's primary purpose in writing the Prose Edda?", "back": "He wrote it as a handbook for aspiring skalds, intending to retell Norse mythology in narrative form and catalogue traditional kennings and verse-forms.", "id": "fc05"}, {"front": "Define 'kenning' and provide an example.", "back": "A kenning is a compound poetic metaphor used in skaldic verse. Examples include 'whale-road' for the sea, 'wound-dew' for blood, or 'raven-feeder' for a warrior.", "id": "fc06"}, {"front": "What was the significance of kennings in the Norse oral tradition?", "back": "Kennings made the oral tradition denser and more resistant to casual paraphrase, requiring memorization and proper understanding to be effective.", "id": "fc07"}, {"front": "Who is a Völva in Norse tradition?", "back": "A Völva is a Norse female seer or prophetess, capable of performing sei (a form of divination and magic).", "id": "fc08"}, {"front": "What is the role of the Völva in the poem Völuspá?", "back": "The speaker of the Völuspá ('The Seeress's Prophecy') is a Völva whom Odin has raised from the dead to learn the secrets of creation and Ragnarök.", "id": "fc09"}, {"front": "According to the Hávamál, how did Odin obtain sacred knowledge?", "back": "Odin hung himself on Yggdrasil, the World Tree, wounded by a spear, for nine nights without food or water, sacrificing himself to himself.", "id": "fc10"}, {"front": "What specific knowledge did Odin gain through his suffering on Yggdrasil?", "back": "He gained the runes—sacred symbols containing hidden knowledge.", "id": "fc11"}, {"front": "How does the Norse account of obtaining sacred knowledge (Odin's sacrifice) differ from the Judaic tradition (Torah)?", "back": "In Norse tradition, the highest god suffers intensely to gain knowledge. In Judaism, the Torah was given freely and publicly by God to an entire nation, with no divine suffering.", "id": "fc12"}, {"front": "Contrast the Norse method of gaining sacred wisdom with the Hindu tradition regarding Shruti texts.", "back": "Odin endured nine days of agony to gain runes. In Hinduism, Shruti texts were heard effortlessly by ancient seers in deep meditation after long preparation, with no suffering by the divine.", "id": "fc13"}, {"front": "What does Odin's act of suffering for knowledge suggest about the Norse tradition's view of wisdom?", "back": "It implies that even the highest god must pay a high price for what matters most, highlighting a deep valuation of wisdom often tied to personal sacrifice and suffering.", "id": "fc14"}, {"front": "What is highly distinctive about how the Eddas were preserved compared to other sacred texts?", "back": "The Eddas were preserved by people who no longer believed in the myths themselves (e.g., Snorri Sturluson and the Poetic Edda compiler were Christians), unlike texts like the Torah or Quran, which were preserved by believers for believers.", "id": "fc15"}, {"front": "Was Snorri Sturluson, the author of the Prose Edda, a believer in Norse Paganism?", "back": "No, Snorri Sturluson was a practicing Christian.", "id": "fc16"}, {"front": "What practical problem did Snorri Sturluson aim to solve by preserving Norse myths in the Prose Edda?", "back": "By the 13th century, Christian Iceland had forgotten kenning-based metaphors, making older skaldic poetry unintelligible. Snorri preserved the myths so people could still understand and appreciate this poetry.", "id": "fc17"}, {"front": "When preserved by Christians, how were the Norse myths in the Eddas generally viewed?", "back": "They were preserved as cultural heritage, literature, material for poetry, and ancestral stories, rather than as divine revelation.", "id": "fc18"}, {"front": "What challenge do modern Ásatrú practitioners face regarding the Eddas?", "back": "They grapple with the fact that the texts, while valuable, were filtered through a Christian worldview, making it difficult to fully discern the original religion's inner life, ritual meanings, or theological nuances.", "id": "fc19"}, {"front": "The text describes the Eddas as a 'window' into Norse Paganism. Explain what this metaphor implies.", "back": "It implies that the Eddas offer a valuable, beautiful, but partial and potentially obscured glimpse into the original religion, viewed through the filter of a different worldview (Christianity).", "id": "fc20"}, {"front": "Which of the two Eddas contains the Hávamál and Völuspá?", "back": "The Poetic Edda contains both the Hávamál and Völuspá.", "id": "fc21"}, {"front": "According to the text, what happened to Odin after he took up the runes?", "back": "After taking up the runes, Odin 'forthwith back I fell' (Hávamál), having gained the knowledge he sought.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
