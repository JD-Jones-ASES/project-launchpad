<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 2, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does the text characterize the internal arguments within the various branches of Judaism?", "back": "As a form of belonging that identifies the tradition as a \"living, arguing tradition.\""}, {"front": "What three factors unite the different branches of Judaism despite their differences in practice?", "back": "Shared texts, shared history, and shared covenantal identity."}, {"front": "What is the primary point of contention among the modern branches of Judaism?", "back": "How strictly Jewish law should be interpreted and applied in the modern world."}, {"front": "According to Orthodox Judaism, who revealed the Written and Oral Torah to Moses?", "back": "God."}, {"front": "How many commandments are considered binding on all Jews in every age by Orthodox Judaism?", "back": "613."}, {"front": "During which timeframe is the Jewish Sabbath (Shabbat) observed?", "back": "From Friday sundown to Saturday night."}, {"front": "In Orthodox Judaism, what are the three specific things from which Jews refrain during Shabbat?", "back": "Work, electricity, and commerce."}, {"front": "What is the term for the dietary laws that distinguish permitted from forbidden foods?", "back": "Kashrut (or kosher)."}, {"front": "Which dietary separation is strictly required under the laws of kashrut?", "back": "The separation of meat and dairy."}, {"front": "What is the primary language used for prayer in Orthodox Judaism?", "back": "Hebrew."}, {"front": "How is worship organized by gender in Orthodox synagogues?", "back": "Worship is gender-separated."}, {"front": "To whom do Orthodox Jews look for guidance on new legal questions regarding Jewish law?", "back": "Authoritative rabbinic decisors."}, {"front": "In the Orthodox view, what role does tradition play in relation to modernity?", "back": "Tradition provides the stable ground from which to navigate modern confusion."}, {"front": "Which branch of Judaism is described as occupying a \"middle position\" regarding Jewish law?", "back": "Conservative Judaism."}, {"front": "How does Conservative Judaism view the binding nature of Jewish law?", "back": "It affirms the law as binding but allows for more flexibility in interpretation."}, {"front": "Conservative Judaism accepts that the Torah developed over time and in _____ context.", "back": "Historical."}, {"front": "How does the observance of Shabbat and kashrut in Conservative Judaism generally compare to Orthodox practice?", "back": "It is observed with somewhat more leniency."}, {"front": "In which geographic region has the Conservative movement been particularly influential?", "back": "North America."}, {"front": "Which branch of Judaism is currently the largest movement in the United States?", "back": "Reform Judaism."}, {"front": "Reform Judaism emphasizes the _____ heart of Jewish teaching over ritual details.", "back": "Ethical."}, {"front": "How do Reform Jews characterize the origins of Jewish law?", "back": "As a human response to divine revelation shaped by historical circumstances."}, {"front": "What is the responsibility of each generation in Reform Judaism regarding Jewish law?", "back": "To discern which laws still carry moral weight today."}, {"front": "What linguistic change is common in Reform synagogue services compared to Orthodox services?", "back": "Services are often conducted in the local language alongside Hebrew."}, {"front": "What is the seating practice for men and women in Reform synagogues?", "back": "They are seated together."}, {"front": "Which movement was the first to ordain women and LGBTQ+ individuals as rabbis?", "back": "Reform Judaism."}, {"front": "What is the watchword of Reform Judaism that prioritizes justice?", "back": "Prophetic Judaism."}, {"front": "In Reform Judaism, what concept is considered more fundamental than dietary rules?", "back": "Justice (as demanded by the prophets)."}, {"front": "Who founded Reconstructionist Judaism in the 20th century?", "back": "Rabbi Mordecai Kaplan."}, {"front": "How does Reconstructionist Judaism define Judaism?", "back": "As an evolving civilization."}, {"front": "How is God interpreted within the Reconstructionist movement?", "back": "In non-personal terms, as the force that enables human flourishing."}, {"front": "In Reconstructionism, Jewish practice is an expression of culture and identity rather than _____.", "back": "Divine command."}, {"front": "Which two major texts are shared by all the movements of Judaism?", "back": "The Torah and the Talmud."}, {"front": "Name three major holy days shared across all Jewish movements.", "back": "Passover, Yom Kippur, and Rosh Hashanah."}, {"front": "What political movement sought to establish a Jewish homeland in the 19th century?", "back": "Zionism."}, {"front": "In what year was the modern State of Israel founded?", "back": "1948."}, {"front": "What major historical event led to the practical necessity of founding the State of Israel?", "back": "Catastrophic persecution in Europe."}, {"front": "Why did some Orthodox Jews originally oppose early Zionism?", "back": "They believed only the Messiah could legitimately restore Israel."}, {"front": "What is the status of Zionism in relation to the branches of Judaism?", "back": "It is a political movement rather than a religious branch."}, {"front": "What does the Hebrew word \"halakha\" literally mean?", "back": "The way of walking."}, {"front": "How is Jewish law metaphorically understood in contrast to a \"cage\"?", "back": "As a path that orients a structured way of moving through life."}, {"front": "Halakha is intended to orient a person's life in a conscious relationship with _____.", "back": "God."}, {"front": "Term: Shabbat", "back": "Definition: The Jewish Sabbath, observed from Friday sundown to Saturday night as a time of rest."}, {"front": "According to the text, what is the role of argument in the Jewish tradition?", "back": "It is a sign of a thriving tradition and a form of belonging."}, {"front": "What is the Orthodox view on the immutability of the 613 commandments?", "back": "They are considered binding in every age and are not overridden by modernity."}, {"front": "How does Conservative Judaism view the origins of the Torah?", "back": "It accepts that the Torah developed over time but maintains its authority."}, {"front": "What is the primary goal of the \"prophetic Judaism\" mentioned in the text?", "back": "The insistence that justice is the core demand of the faith."}, {"front": "Concept: Reconstructionist Judaism", "back": "A 20th-century movement viewing Judaism as a cultural civilization rather than a revealed religion."}, {"front": "True or False: All Jewish people share a single view on the politics and policies of modern Israel.", "back": "False (Jews hold a wide range of views)."}, {"front": "What is the relationship between the Hebrew language and prayer across the branches of Judaism?", "back": "It is a shared language of prayer, though Reform Judaism also incorporates local languages."}, {"front": "How does the literal meaning of \"halakha\" reflect its purpose in daily life?", "back": "It suggests a path for walking through time and seasons in relationship with God."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
