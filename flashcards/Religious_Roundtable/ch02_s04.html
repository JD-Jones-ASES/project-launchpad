    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 2, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does the text characterize the nature of Judaism today regarding its unity and diversity?", "back": "Judaism is a family of related traditions, united by shared texts, history, and covenant, but differing in how strictly Jewish law is interpreted and applied in the modern world.", "id": "fc01"}, {"front": "What is the core belief of Orthodox Judaism concerning the Torah?", "back": "Orthodox Judaism holds that the Written and Oral Torah was revealed by God to Moses exactly as received, and its 613 commandments are binding in every age.", "id": "fc02"}, {"front": "Describe typical Shabbat observance for Orthodox Jews.", "back": "Orthodox Jews observe Shabbat (Friday sundown to Saturday night) by refraining from work, using electricity, and engaging in commerce.", "id": "fc03"}, {"front": "What are kashrut laws in Judaism, and what do they require?", "back": "Kashrut are dietary laws that distinguish permitted (kosher) from forbidden foods and require the separation of meat and dairy.", "id": "fc04"}, {"front": "How does Conservative Judaism position itself regarding Jewish law compared to other branches?", "back": "Conservative Judaism occupies a middle position, affirming the binding nature of Jewish law while allowing more flexibility in its interpretation and application.", "id": "fc05"}, {"front": "What is Conservative Judaism's perspective on the historical development of the Torah?", "back": "Conservative Judaism accepts that the Torah developed over time and in historical context, but insists this does not diminish its authority.", "id": "fc06"}, {"front": "What is the primary emphasis of Reform Judaism?", "back": "Reform Judaism emphasizes the ethical heart of Jewish teaching over its ritual details.", "id": "fc07"}, {"front": "How does Reform Judaism view the authority and applicability of Jewish law for each generation?", "back": "Reform Jews believe Jewish law was a human response to divine revelation, shaped by history, and each generation must discern which laws still carry moral weight today.", "id": "fc08"}, {"front": "Name three characteristic practices found in Reform synagogues.", "back": "Reform synagogues often conduct services in the local language alongside Hebrew, seat men and women together, and ordain women and LGBTQ+ individuals as rabbis.", "id": "fc09"}, {"front": "What is 'prophetic Judaism' in the context of Reform Judaism?", "back": "Prophetic Judaism is Reform's watchword, emphasizing that justice—what the prophets demanded—is more fundamental than any dietary rule or ritual.", "id": "fc10"}, {"front": "Who founded Reconstructionist Judaism, and in what century?", "back": "Reconstructionist Judaism was founded in the 20th century by Rabbi Mordecai Kaplan.", "id": "fc11"}, {"front": "How does Reconstructionist Judaism fundamentally define Judaism?", "back": "Reconstructionist Judaism views Judaism as an evolving civilization rather than a supernaturally revealed religion.", "id": "fc12"}, {"front": "How does Reconstructionist Judaism reinterpret the concept of God?", "back": "God is reinterpreted in non-personal terms, often as the force that enables human flourishing.", "id": "fc13"}, {"front": "Name three elements that most branches of Judaism share despite their differences.", "back": "Shared elements include the Torah, the Talmud, the Hebrew language of prayer, the cycle of holy days (e.g., Passover, Yom Kippur, Rosh Hashanah), and a shared history.", "id": "fc14"}, {"front": "According to the text, what role does argument play within Jewish tradition?", "back": "Argumentation is described as a fundamental aspect of the tradition, thriving on debate, and serving as a form of belonging.", "id": "fc15"}, {"front": "Define Zionism.", "back": "Zionism is a 19th-century political movement that sought to establish a Jewish homeland in the ancient land of Israel.", "id": "fc16"}, {"front": "What significant event did Zionism lead to, and when did it occur?", "back": "Zionism led to the founding of the modern State of Israel in 1948, following catastrophic persecution in Europe.", "id": "fc17"}, {"front": "Is Zionism considered a branch of Judaism? Explain briefly.", "back": "No, Zionism is a political movement, not a branch of Judaism. Jewish opinion on it has always been divided.", "id": "fc18"}, {"front": "How did some Orthodox Jews initially react to early Zionism?", "back": "Some Orthodox Jews opposed early Zionism, believing that only the Messiah could legitimately restore Israel.", "id": "fc19"}, {"front": "What is the literal meaning of 'halakha,' and how is it understood in Jewish tradition?", "back": "'Halakha' literally means 'the way of walking.' It is understood as a path that orients and structures Jewish life, rather than a restrictive cage.", "id": "fc20"}, {"front": "Compare gender roles and worship seating in Orthodox vs. Reform Judaism.", "back": "Orthodox Judaism maintains gender-separated worship, while Reform synagogues often seat men and women together and ordain women and LGBTQ+ individuals as rabbis.", "id": "fc21"}, {"front": "For Orthodox Jews, what is the relationship between tradition and modernity?", "back": "For Orthodox Jews, modernity does not override tradition; rather, tradition provides the stable ground from which to navigate modern confusion.", "id": "fc22"}, {"front": "Which Jewish movement emphasizes justice over ritual, and considers it more fundamental than dietary rules?", "back": "Reform Judaism, through its watchword 'prophetic Judaism,' emphasizes justice as more fundamental than ritual details.", "id": "fc23"}, {"front": "How does Conservative Judaism's observance of Shabbat and kashrut generally compare to Orthodox practice?", "back": "Many Conservative Jews observe Shabbat and kashrut, but typically with somewhat more leniency than Orthodox practice.", "id": "fc24"}, {"front": "What is a key reinterpretation of Jewish practice in Reconstructionist Judaism?", "back": "Jewish practice is embraced as the expression of a people's culture and identity rather than divine command.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
