<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 2, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the collective name for the Hebrew Bible in Jewish tradition?", "back": "Tanakh"}, {"front": "The acronym Tanakh is derived from which three Hebrew words?", "back": "Torah, Nevi'im, and Ketuvim"}, {"front": "Which section of the Tanakh is known as \"the Law\"?", "back": "The Torah"}, {"front": "What does the Hebrew term \"Nevi'im\" translate to in English?", "back": "The Prophets"}, {"front": "What does the Hebrew term \"Ketuvim\" translate to in English?", "back": "The Writings"}, {"front": "How does the Torah's five-book structure compare to Christian terminology?", "back": "It is equivalent to the Pentateuch or the first five books of the Old Testament."}, {"front": "According to tradition, where did Moses receive the Torah from God?", "back": "Mount Sinai"}, {"front": "Identify the five books that constitute the Torah.", "back": "Genesis, Exodus, Leviticus, Numbers, and Deuteronomy"}, {"front": "What content is primarily found in the Nevi'im section of the Tanakh?", "back": "Historical books and the writings of prophets."}, {"front": "Which prophets are mentioned as interpreting Israel's history in the Nevi'im?", "back": "Isaiah, Jeremiah, Amos, and Micah"}, {"front": "What literary genres are contained within the Ketuvim?", "back": "Poetry, wisdom literature, and narrative"}, {"front": "Identify three specific books found in the Ketuvim.", "back": "Psalms, Job, and Song of Songs"}, {"front": "Define the \"Oral Torah.\"", "back": "The interpretations and applications of the law passed down by word of mouth from Sinai."}, {"front": "What historical event in 70 CE led to the writing down of the Oral Torah?", "back": "The destruction of the Second Temple"}, {"front": "What is the name of the first written collection of the Oral Torah?", "back": "The Mishnah"}, {"front": "Which figure is credited with compiling the Mishnah around 200 CE?", "back": "Rabbi Judah the Prince"}, {"front": "How is the content of the Mishnah organized?", "back": "By topic"}, {"front": "What is the Gemara?", "back": "The rabbinic commentary on the Mishnah."}, {"front": "Which two geographic regions produced the Gemara between 200 and 500 CE?", "back": "Babylon and Palestine"}, {"front": "Mishnah + Gemara = _____", "back": "The Talmud"}, {"front": "What distinguishes the Talmud from most other sacred texts regarding legal outcomes?", "back": "It records the arguments and debates rather than just the final conclusions."}, {"front": "Identify the two rival schools of legal debate prominent in the Talmud.", "back": "The school of Shammai and the school of Hillel"}, {"front": "What principle is expressed by the phrase \"These and these are the words of the living God\"?", "back": "Both the majority and minority opinions in rabbinic debate are preserved as sacred."}, {"front": "The term \"Rabbi\" literally translates to what?", "back": "My master or my teacher"}, {"front": "Which religious figure replaced the priest as the central leader of Jewish life after the Temple's destruction?", "back": "The Rabbi"}, {"front": "What is the Siddur?", "back": "The Jewish prayer book used for daily services and holy days."}, {"front": "How many daily prayer services are organized by the Siddur?", "back": "Three"}, {"front": "Identify the times of day for the three standard Jewish prayer services.", "back": "Morning, afternoon, and evening"}, {"front": "What is a minyan?", "back": "A quorum of ten adults required for communal prayer."}, {"front": "How does the perspective of the Siddur prayers differ from individualistic prayer?", "back": "They are oriented toward the collective (\"our God\") rather than personal salvation."}, {"front": "What is a yeshiva?", "back": "A Jewish academy of study."}, {"front": "Why does the Talmud preserve minority opinions that were not adopted into law?", "back": "Because the ruling might be needed at a later time."}, {"front": "Who was the early 2nd-century sage often depicted as debating with earlier scholars in the Talmud?", "back": "Rabbi Akiva"}, {"front": "In Jewish tradition, why is the conversation between ancient rabbis considered ongoing for modern students?", "back": "Time is treated as no barrier to the conversation recorded in the texts."}, {"front": "The core of the Tanakh, believed to be revealed directly by God to Moses, is the _____.", "back": "Torah"}, {"front": "Unlike the Christian term \"Old Testament,\" Jews simply refer to their sacred text as the _____.", "back": "Bible"}, {"front": "The historical books of Israel are found in the _____ section of the Tanakh.", "back": "Nevi'im"}, {"front": "The Book of Psalms and the Book of Job are part of the _____.", "back": "Ketuvim"}, {"front": "The Mishnah was compiled around the year _____ CE.", "back": "200"}, {"front": "The _____ is the central text of Rabbinic Judaism after the Hebrew Bible.", "back": "Talmud"}, {"front": "Rabbinic Judaism shifted the focus of religious life from sacrifice to _____.", "back": "Interpretation"}, {"front": "Siddur prayers focus on the restoration of Israel and all _____.", "back": "Humanity"}, {"front": "Term: Tanakh", "back": "Definition: The Hebrew Bible, consisting of the Torah, Nevi'im, and Ketuvim."}, {"front": "Term: Mishnah", "back": "Definition: The first written collection of the Oral Torah, recording rabbinic rulings by topic."}, {"front": "Term: Gemara", "back": "Definition: A multi-volume rabbinic commentary and analysis of the Mishnah."}, {"front": "Term: Talmud", "back": "Definition: The vast compilation of Jewish law, ethics, and theology comprising the Mishnah and Gemara."}, {"front": "Term: Siddur", "back": "Definition: The Jewish prayer book containing the liturgy for daily and special services."}, {"front": "How does the organization of the Mishnah differ from the Torah?", "back": "The Mishnah is organized by topic rather than narrative or chronological sequence."}, {"front": "Which text records the debates of rabbis living hundreds of years apart as if they were in the same room?", "back": "The Talmud"}, {"front": "Why was the Oral Torah written down after being oral for generations?", "back": "The scattering of the community after 70 CE made oral transmission fragile."}, {"front": "Which division of the Tanakh contains \"The Song of Songs\"?", "back": "Ketuvim (Writings)"}, {"front": "What role did the great prophets play in the Nevi'im?", "back": "They interpreted history and called the people back to faithfulness."}, {"front": "The prayers for Shabbat and annual holy days are found in which book?", "back": "The Siddur"}, {"front": "How does the Talmud treat a minority opinion that was not adopted as law?", "back": "It preserves it instead of erasing it."}, {"front": "What is the primary language/format of instruction in a yeshiva?", "back": "Students arguing and debating with ancient rabbinic voices."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
