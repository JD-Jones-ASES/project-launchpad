<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Tanakh, and what does its name represent?", "back": "The Tanakh is the Hebrew Bible, an acronym formed from the first letters of its three parts: Torah (the Law), Nevi'im (the Prophets), and Ketuvim (the Writings)."}, {"front": "How do Jews view the Tanakh in relation to the Christian 'Old Testament'?", "back": "The Tanakh is roughly equivalent to what Christians call the Old Testament, but for Jews, it is simply 'the Bible,' complete and authoritative in itself, without the 'Old' designation."}, {"front": "What is the Torah, specifically referring to the Five Books of Moses, and how is it believed to have been revealed?", "back": "The Torah consists of the five books of Moses (Genesis, Exodus, Leviticus, Numbers, and Deuteronomy). It is believed to have been revealed directly by God to Moses at Sinai."}, {"front": "What types of texts are included in the Nevi'im (the Prophets)?", "back": "Nevi'im includes historical books and the writings of great prophets like Isaiah, Jeremiah, Amos, and Micah, who interpreted Israel's history and called the people back to faithfulness."}, {"front": "What content is found in the Ketuvim (the Writings)?", "back": "Ketuvim contains poetry, wisdom literature, and narrative, such as the Psalms, the book of Job, and the Song of Songs."}, {"front": "What is the Oral Torah, and how does it complement the Written Torah?", "back": "The Oral Torah consists of interpretations, explanations, and applications of the written law that were passed down by word of mouth for generations, believed to have been given by God to Moses alongside the Written Torah."}, {"front": "What historical event led to the decision to write down the Oral Torah?", "back": "The destruction of the Second Temple in 70 CE led to the community being scattered, making oral transmission fragile, which prompted the rabbis to write down the Oral Torah."}, {"front": "What is the Mishnah, who compiled it, and when?", "back": "The Mishnah is the first written collection of the Oral Torah, compiled around 200 CE under Rabbi Judah the Prince. It records rabbinic discussions and rulings on Jewish law, organized by topic."}, {"front": "What is the Gemara?", "back": "The Gemara is the rabbinic commentary on the Mishnah, compiled separately in Babylon and Palestine between roughly 200 and 500 CE."}, {"front": "What is the Talmud, and what are its two main components?", "back": "The Talmud is a vast, multi-volume compilation of Jewish law, ethics, history, and theology. It comprises the Mishnah and the Gemara and is the central text of Rabbinic Judaism after the Hebrew Bible."}, {"front": "What makes the Talmud unique among sacred texts in terms of its content preservation?", "back": "Unlike most religious texts that record conclusions, the Talmud records arguments and disagreements between rabbis, preserving both sides of a dispute, even minority opinions."}, {"front": "Explain the significance of the saying, 'These and these are the words of the living God,' in Jewish intellectual life.", "back": "This saying means that even opposing rabbinic opinions and rulings are considered legitimate expressions of divine truth and are preserved within the Talmud, reflecting a principle of open intellectual inquiry and debate."}, {"front": "What is a 'rabbi,' and how did their role become central after the destruction of the Temple?", "back": "A rabbi is a Jewish teacher and interpreter of Torah. Their role became central after the Temple's destruction because the tradition shifted from sacrifice to interpretation, making the rabbi, as a master of Torah, the central figure."}, {"front": "What is the Siddur, and what is its primary function?", "back": "The Siddur is the Jewish prayer book. It organizes the three daily prayer services (morning, afternoon, evening) and special liturgies for Shabbat and annual holy days."}, {"front": "What is a 'minyan,' and what does its requirement signify about Jewish worship?", "back": "A minyan is a quorum of ten adults required for communal Jewish prayer services. Its existence signifies that Jewish worship is profoundly communal, oriented toward the collective rather than individual salvation."}, {"front": "How do Jewish communal prayers typically express their orientation?", "back": "Jewish communal prayers are profoundly oriented toward the collective, speaking of 'our God' and focusing on the restoration of Israel and all humanity, rather than personal salvation."}, {"front": "How does the Talmud demonstrate a unique approach to 'time' in intellectual discourse?", "back": "The Talmud treats time as no barrier to conversation, preserving debates from rabbis who lived hundreds of years apart, allowing students in yeshivas today to engage with these ancient voices as if they were in the same room."}, {"front": "Name the five books of Moses that constitute the Torah (as part of the Tanakh).", "back": "Genesis, Exodus, Leviticus, Numbers, and Deuteronomy."}, {"front": "What was the primary function of the prophets whose writings are found in Nevi'im?", "back": "They interpreted Israel's history and called the people back to faithfulness."}, {"front": "Which two prominent rabbinic schools were known for their frequent disagreements recorded in the Talmud?", "back": "The school led by Rabbi Shammai and the school led by Rabbi Hillel."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
