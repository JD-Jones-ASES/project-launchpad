<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does the founding of Hinduism differ from that of religions like Christianity or Islam?", "back": "It has no single founding person, prophet, or specific visionary event."}, {"front": "Hinduism is best described as the accumulated religious life of a civilization stretching back at least _____ years.", "back": "Three thousand."}, {"front": "Which ancient civilization provided the earliest archaeological evidence of sophisticated urban life in the Indian subcontinent?", "back": "The Indus Valley Civilization."}, {"front": "Identify two major cities of the Indus Valley Civilization that flourished around 2500–1900 BCE.", "back": "Mohenjo-daro and Harappa."}, {"front": "Which architectural feature of Indus Valley cities suggests an ancient cultural concern with ritual purity?", "back": "Ritual bathing pools."}, {"front": "What is the current limitation in understanding the prayers and specific beliefs of the Indus Valley people?", "back": "Their script cannot be read by modern scholars."}, {"front": "Which later Hindu deity is potentially represented in early forms found in Indus Valley symbols and figurines?", "back": "Shiva."}, {"front": "Around what year did the Aryans migrate into the Indian subcontinent from Central Asia?", "back": "1500 BCE."}, {"front": "What primary language did the Aryans bring with them to the Indian subcontinent?", "back": "Sanskrit."}, {"front": "The religious culture of the Aryans, centered on fire sacrifices, is known as the _____ religion.", "back": "Vedic."}, {"front": "Term: Yajnas", "back": "Definition: Fire sacrifices performed by Vedic priests to honor nature gods."}, {"front": "Which specialized social group was responsible for performing Vedic fire sacrifices?", "back": "Brahmins."}, {"front": "In the Vedic pantheon, what is the domain of the god Indra?", "back": "Thunder and war."}, {"front": "Which Vedic god is associated with the maintenance of cosmic order?", "back": "Varuna."}, {"front": "In the Vedic tradition, who is the god of fire?", "back": "Agni."}, {"front": "What constitutes the earliest layer of Hindu scripture?", "back": "The Vedas."}, {"front": "Hinduism as it exists today is a blend of which two major ancient traditions?", "back": "The Indus Valley Civilization and the Aryan (Vedic) religion."}, {"front": "During which time period did the Hindu tradition undergo a profound philosophical turn through the Upanishads?", "back": "800–200 BCE."}, {"front": "Term: Rishis", "back": "Definition: The seers or sages who composed the philosophical texts known as the Upanishads."}, {"front": "How did the focus of the Upanishads differ from the focus of earlier Vedic religion?", "back": "They shifted focus from correct ritual performance to philosophical questions about reality and the self."}, {"front": "The period between 800–200 BCE is often called the _____, an era of global philosophical development.", "back": "Axial Age."}, {"front": "The Upanishads sought to answer what question regarding the individual's place in the cosmos?", "back": "What is the relationship between the individual and the universe?"}, {"front": "Name the two great epics that significantly influenced the development of the Hindu tradition.", "back": "The Mahabharata and the Ramayana."}, {"front": "Which religious movement, emphasizing emotional devotion, rose during the first millennium CE?", "back": "Bhakti movements."}, {"front": "Which two non-Hindu philosophical traditions heavily influenced the development of Hinduism?", "back": "Buddhism and Jainism."}, {"front": "What historical period (1526–1857) marks a long encounter between Hindu and Islamic cultures?", "back": "The Mughal period."}, {"front": "Who was the 19th-century reformer who engaged with Western philosophy while reaffirming Hindu depth?", "back": "Swami Vivekananda."}, {"front": "Why is the category 'Hinduism' considered in part a Western construction?", "back": "British colonial officials used it to group a vast variety of Indian practices that were not Islam, Christianity, or Buddhism."}, {"front": "What is the Persian etymological origin of the word 'Hindu'?", "back": "It refers to the people of the Indus river region."}, {"front": "Concept: Vaishnavas", "back": "Definition: Hindu practitioners who specifically identify with the worship of the god Vishnu."}, {"front": "Concept: Shaivas", "back": "Definition: Hindu practitioners who specifically identify with the worship of the god Shiva."}, {"front": "Concept: Shaktas", "back": "Definition: Hindu practitioners who specifically identify with the worship of the Goddess (Shakti)."}, {"front": "Hinduism is best described as a _____ of traditions rather than a single monolith.", "back": "Family."}, {"front": "Sanskrit is the direct ancestor of which modern South Asian languages?", "back": "Hindi, Bengali, and Nepali."}, {"front": "The Sanskrit word for god, 'deva', shares a linguistic root with which Latin word?", "back": "Deus."}, {"front": "The English word 'divine' is a distant relative of which Sanskrit word for god?", "back": "Deva."}, {"front": "Which geographic region contains the archaeological sites of Mohenjo-daro and Harappa?", "back": "Pakistan and northwestern India."}, {"front": "What did the Upanishadic sages (rishis) believe was the philosophical heart of Hinduism?", "back": "The answers to systematic questions about reality, the self, and the universe."}, {"front": "What was the primary lifestyle of the Aryan people who migrated into India?", "back": "Cattle-herding."}, {"front": "What three elements hold the 'family' of Hindu traditions together?", "back": "Shared texts, shared practices, and a shared philosophical vocabulary."}, {"front": "In the Axial Age, which Greek and Hebrew figures emerged alongside the Indian rishis?", "back": "Greek philosophers and Hebrew prophets."}, {"front": "What architectural evidence from the Indus Valley suggests a highly organized urban society?", "back": "Advanced drainage systems and granaries."}, {"front": "How was the early Aryan tradition of hymns and ritual knowledge primarily preserved?", "back": "Through a rich oral tradition."}, {"front": "Identify the primary purpose of 'propitiating' Vedic nature gods through yajnas.", "back": "To honor the gods and maintain cosmic and natural order."}, {"front": "The term 'Hindu' was originally a geographic label for people living near which landmark?", "back": "The Indus River."}, {"front": "By what names do many practitioners identify themselves more specifically than the generic term 'Hindu'?", "back": "Vaishnavas, Shaivas, or Shaktas."}, {"front": "Sanskrit is part of the same linguistic family as which two major classical European languages?", "back": "Greek and Latin."}, {"front": "The 'Axial Age' transition occurred between roughly _____ and _____ BCE.", "back": "800; 200."}, {"front": "What was the primary religious focus of the 'Brahmin' class during the Vedic period?", "back": "The performance of specialized ritual fire sacrifices."}, {"front": "Which 19th-century reformer is noted for engaging with modern science in the context of Hinduism?", "back": "Swami Vivekananda."}, {"front": "Why is it accurate to say Hinduism was already a 'blend' before recorded history?", "back": "It combined the existing Indus Valley culture with the arriving Aryan religious culture."}, {"front": "Aside from Sanskrit, what other language is mentioned as a distant relative of Hindi and Bengali?", "back": "English (or Russian/Latin/Greek)."}, {"front": "The term 'Upanishads' refers to philosophical texts that asked deeper questions than just correct _____ performance.", "back": "Sacrificial (or ritual)."}, {"front": "The earliest archaeological evidence of Indian urban life dates back to approximately what year?", "back": "2500 BCE."}, {"front": "What role did the Persian language play in the history of the name 'Hindu'?", "back": "It provided the original word used to describe the people of the Indus region."}, {"front": "Which major world religious figure was a contemporary of the Upanishadic rishis?", "back": "The Buddha (or Confucius)."}, {"front": "Vedic religion honored a pantheon of gods representing which aspect of the world?", "back": "Nature."}, {"front": "How does the construction of the Sanskrit language relate to other world languages?", "back": "It is one of the oldest recorded languages and is remarkably precisely constructed."}, {"front": "Which empire's rule coincides with the long encounter between Hinduism and Islamic culture?", "back": "The Mughal Empire."}, {"front": "What is the literal meaning of 'rishi' in the Hindu tradition?", "back": "Seer or sage."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
