<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does the founding of Hinduism differ from that of many other major religions?", "back": "It lacks a single founder, prophet, or decisive founding event."}, {"front": "Hinduism is best described as the accumulated religious life of a civilization spanning at least how many years?", "back": "Three thousand years."}, {"front": "Name the two prominent cities of the Indus Valley Civilization that flourished around 2500–1900 BCE.", "back": "Mohenjo-daro and Harappa."}, {"front": "Which urban feature of the Indus Valley Civilization suggests an ancient preoccupation with ritual purity?", "back": "Ritual bathing pools."}, {"front": "Archaeologists have found Indus Valley symbols that may represent an early form of which major Hindu god?", "back": "Shiva."}, {"front": "Around 1500 BCE, which cattle-herding people migrated into the Indian subcontinent from Central Asia?", "back": "The Aryans."}, {"front": "What was the primary language of the Aryan people and the subsequent Vedic religion?", "back": "Sanskrit."}, {"front": "The Vedic religion was primarily centered on which type of ritual act?", "back": "Fire sacrifices (yajnas)."}, {"front": "Which group of specialized priests was responsible for performing Vedic fire sacrifices?", "back": "Brahmins."}, {"front": "Identify the Vedic deity who served as the god of thunder and war.", "back": "Indra."}, {"front": "Identify the Vedic deity who was considered the guardian of cosmic order.", "back": "Varuna."}, {"front": "Identify the Vedic deity who served as the god of fire.", "back": "Agni."}, {"front": "What is the name of the earliest layer of Hindu scripture, preserving ancient hymns and ritual knowledge?", "back": "The Vedas."}, {"front": "Hinduism originated as a blend of which two distinct ancient traditions?", "back": "The Indus Valley Civilization and the Aryan/Vedic religion."}, {"front": "During which approximate time period did the Hindu tradition undergo its \"philosophical turn\"?", "back": "800–200 BCE."}, {"front": "What is the term for the seers or sages who composed the Upanishads?", "back": "Rishis."}, {"front": "Which collection of philosophical texts explores the nature of reality and the self?", "back": "The Upanishads."}, {"front": "What term is used to describe the era (800–200 BCE) that produced the Upanishads alongside other global philosophical movements?", "back": "The Axial Age."}, {"front": "Name two other global philosophical or religious groups that emerged during the same Axial Age as the rishis.", "back": "Hebrew prophets, Greek philosophers, the Buddha, or Confucius."}, {"front": "Name the two great Indian epics that followed the composition of the Upanishads.", "back": "The Mahabharata and the Ramayana."}, {"front": "Which religious movement emphasizing personal devotion arose during the first millennium CE?", "back": "The Bhakti movement."}, {"front": "Which two non-Hindu philosophical traditions significantly influenced the development of Hindu thought?", "back": "Buddhism and Jainism."}, {"front": "During which period (1526–1857) did Hinduism encounter and engage with Islamic culture?", "back": "The Mughal period."}, {"front": "Which 19th-century reformer engaged Western philosophy while reaffirming the depth of Hindu tradition?", "back": "Swami Vivekananda."}, {"front": "The category of \"Hinduism\" as a unified religion is partially considered a construction of which historical group?", "back": "British colonial officials."}, {"front": "The word \"Hindu\" originally derived from a Persian term for people of which geographic region?", "back": "The Indus river region."}, {"front": "Instead of the generic label \"Hindu,\" a practitioner might identify as a _____, Shaiva, or Shakta.", "back": "Vaishnava."}, {"front": "Hinduism is described not as a single monolith, but as a \"_____ of traditions.\"", "back": "Family."}, {"front": "What three elements hold the diverse traditions of Hinduism together?", "back": "Shared texts, shared practices, and shared philosophical vocabulary."}, {"front": "How does the age of the Sanskrit language compare to other recorded languages?", "back": "It is one of the oldest recorded languages in the world."}, {"front": "Name one modern South Asian language that is a direct descendant of Sanskrit.", "back": "Hindi, Bengali, or Nepali."}, {"front": "The Sanskrit word \"deva\" (god) is a distant relative of which Latin word?", "back": "Deus."}, {"front": "The Sanskrit word \"deva\" (god) shares a linguistic root with which English word?", "back": "Divine."}, {"front": "Why is the specific content of prayers from the Indus Valley Civilization unknown?", "back": "Their script cannot be read by modern scholars."}, {"front": "What was the purpose of the \"yajnas\" performed by Brahmins in the Vedic religion?", "back": "To honor and propitiate the pantheon of nature gods."}, {"front": "In the context of the Upanishads, what question replaced the focus on how to perform sacrifices correctly?", "back": "What is reality? (or \"What is the self?\")."}, {"front": "Cloze: The cities of Mohenjo-daro and Harappa flourished between _____ and 1900 BCE.", "back": "2500 BCE."}, {"front": "Cloze: The _____ (meaning seers) were the authors of the philosophical Upanishads.", "back": "Rishis."}, {"front": "Cloze: British colonial officials used the term \"Hindu\" to group practices that were not Islam, Buddhism, or _____.", "back": "Christianity."}, {"front": "Cloze: The earliest layer of Hindu scripture is called the _____.", "back": "Vedas."}, {"front": "Cloze: The _____ movement, emphasizing personal devotion, rose in the first millennium CE.", "back": "Bhakti."}, {"front": "Concept: The Axial Age.", "back": "Definition: An era (800–200 BCE) of profound philosophical development across multiple global civilizations."}, {"front": "Term: Yajnas.", "back": "Definition: Fire sacrifices performed by specialized priests in the Vedic religion."}, {"front": "Term: Brahmins.", "back": "Definition: The specialized priests of the Vedic religious culture."}, {"front": "Which specific god is associated with thunder in the Vedic pantheon?", "back": "Indra."}, {"front": "What geographic region served as the origin for the Aryan people?", "back": "Central Asia."}, {"front": "Describe the core shift in focus from the Vedic period to the Upanishadic period.", "back": "A shift from ritual fire sacrifices to deep philosophical questioning of reality."}, {"front": "How does Sanskrit relate to languages like Greek and Latin?", "back": "It is a distant relative within the same linguistic family."}, {"front": "Which archaeological find in the Indus Valley suggests an early form of the god Shiva?", "back": "Figurines and symbols."}, {"front": "What was the primary economic activity of the Aryan people who entered India?", "back": "Cattle-herding."}, {"front": "What is the status of the relationship between the individual and the universe in the Upanishads?", "back": "It is a central question that the rishis sought to answer systematically."}, {"front": "The term \"Hindu\" was originally a _____ word.", "back": "Persian."}, {"front": "Which period of Indian history lasted from 1526 to 1857?", "back": "The Mughal period."}, {"front": "What are the three main sectarian identities mentioned as more specific than the label \"Hindu\"?", "back": "Vaishnavas, Shaivas, and Shaktas."}, {"front": "Identify one advanced infrastructure system found in Mohenjo-daro.", "back": "Advanced drainage systems (or granaries)."}, {"front": "What is the \"philosophical heart\" of the Hindu tradition?", "back": "The Upanishads."}, {"front": "Which Vedic god is responsible for \"propitiating\" nature through fire?", "back": "Agni."}, {"front": "How did the 19th-century reform movements affect modern Hinduism?", "back": "They engaged with Western philosophy and science while reaffirming traditional depth."}, {"front": "What language family does Sanskrit belong to, given its relationship to Russian and English?", "back": "Indo-European."}, {"front": "What does the lack of a founding prophet suggest about the nature of Hinduism?", "back": "It is an organic, accumulated religious tradition rather than a single revelation."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
