<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 10, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Rather than starting with an argument or proof, what is the starting point of the Christian account of faith?", "back": "An act of trust and a willingness to stake one's life on something not fully seen."}, {"front": "How does the Letter to the Hebrews characterize faith in contrast to the idea that it is a weakness?", "back": "It is presented as a philosophically sophisticated strength."}, {"front": "In the New Testament, what are the three primary meanings of the Greek word $\\pi\\acute{\\iota}\\sigma\\tau\\iota\\varsigma$ (pistis)?", "back": "Trust, conviction, and loyalty."}, {"front": "How does the Christian tradition define faith in relation to the self?", "back": "A total orientation of the mind, will, and affections toward God."}, {"front": "Why is Christian faith ($\\pi\\acute{\\iota}\\sigma\\tau\\iota\\varsigma$) distinct from mere intellectual agreement?", "back": "It involves a total orientation of the self and loyalty, not just mental assent."}, {"front": "How does the text distinguish faith from credulity?", "back": "Faith is not accepting things carelessly or without thought simply because an authority says so."}, {"front": "What is the primary difference between faith and scientific certainty?", "back": "Faith is trust in something real but not fully visible, while certainty relies on measuring known quantities."}, {"front": "The text describes faith as a 'third territory' located between which two concepts?", "back": "Credulity and certainty."}, {"front": "According to Hebrews 11:1, faith is the _____ of things hoped for.", "back": "substance"}, {"front": "According to Hebrews 11:1, faith is the _____ of things not seen.", "back": "evidence"}, {"front": "What was obtained by 'the elders' through faith, according to Hebrews 11:2?", "back": "A good report."}, {"front": "According to Hebrews 11:3, how were the worlds framed?", "back": "Through the word of God."}, {"front": "What does Hebrews 11:3 claim regarding the origin of 'things which are seen'?", "back": "They were not made of things which do appear."}, {"front": "In the context of Hebrews 11:1, what does the word 'substance' imply about the nature of faith?", "back": "Faith is real and grounds ordinary visible reality rather than being a mere feeling."}, {"front": "How did Thomas Aquinas describe the relationship between faith and reason?", "back": "Faith is not against reason but goes beyond it."}, {"front": "According to Thomas Aquinas, what can the natural human intellect conclude through the 'cosmological argument'?", "back": "That God exists."}, {"front": "What is the core observation behind the 'cosmological argument'?", "back": "Everything that exists seems to require a cause."}, {"front": "Which three specifically Christian claims did Aquinas believe could only be reached by faith?", "back": "The Trinity, the Incarnation, and the resurrection."}, {"front": "How did Thomas Aquinas define faith in terms of the intellect?", "back": "The intellect assenting to divine truth on the authority of God who reveals."}, {"front": "What is the central and most distinctive claim in Christian theology regarding revelation?", "back": "The Incarnation."}, {"front": "How does the Incarnation differ from other forms of divine revelation, such as dictating a text?", "back": "In the Incarnation, God entered the story personally as a human being."}, {"front": "The Gospel of John uses the Greek term $\\lambda\\acute{o}\\gamma o\\varsigma$ (logos) to describe Jesus as what?", "back": "The Word, or the rationality and meaning of the universe."}, {"front": "Why is Jesus Christ called the 'supreme and final revelation' in Christian theology?", "back": "Because in him, information and the informer became one."}, {"front": "Ultimately, what is the object of trust in the Christian sense of faith?", "back": "The person of Jesus Christ."}, {"front": "The English word 'creed' is derived from which Latin word?", "back": "credo"}, {"front": "What is the literal meaning of the Latin word *credo*?", "back": "I believe."}, {"front": "What is the definition of a 'creed' in a religious context?", "back": "A formal, public statement of the beliefs held by a community."}, {"front": "Which two creeds are the most widely recited in Christian history?", "back": "The Apostles' Creed and the Nicene Creed."}, {"front": "Since at least which century has the Apostles' Creed been in use?", "back": "The 2nd century."}, {"front": "In what year was the Nicene Creed formulated?", "back": "325 CE."}, {"front": "Beyond an intellectual exercise, what does the act of reciting a creed represent?", "back": "An act of communal loyalty and a declaration of where one stands."}, {"front": "Which 11th-century theologian is famous for the phrase *fides quaerens intellectum*?", "back": "Anselm of Canterbury."}, {"front": "What is the English translation of the Latin phrase *fides quaerens intellectum*?", "back": "Faith seeking understanding."}, {"front": "How does Anselm's approach to belief differ from the modern tendency regarding understanding?", "back": "Anselm argues one should commit first and then seek to understand, while moderns demand understanding before belief."}, {"front": "According to Anselm of Canterbury, why is it impossible to fully understand God from the 'outside'?", "back": "Understanding only begins to unfold once a person steps inside and trusts."}, {"front": "What analogy is used to describe the type of trust found in faith?", "back": "Trusting a friend before they have had a chance to prove themselves in every situation."}, {"front": "In Aquinas's view, on what authority does the intellect assent to divine truth?", "back": "The authority of God who reveals."}, {"front": "According to the text, Christianity calls Jesus the Word of God, meaning he is the very _____ of the universe.", "back": "rationality and meaning"}, {"front": "At which council was the Nicene Creed formulated?", "back": "The Council of Nicea."}, {"front": "What role do the 'affections' play in the Christian definition of faith?", "back": "They are one of the elements of the self (along with mind and will) directed toward God."}, {"front": "In the Christian tradition, is faith considered a feeling, a wish, or a substance?", "back": "A substance."}, {"front": "What is the specific New Testament book that defines faith as 'the evidence of things not seen'?", "back": "The Letter to the Hebrews."}, {"front": "According to Thomas Aquinas, the observation that the world requires a cause is called the _____.", "back": "cosmological argument"}, {"front": "How does the text describe the relationship between 'information' and 'the informer' in the person of Jesus?", "back": "They became one."}, {"front": "According to Anselm, what must happen before understanding can unfold?", "back": "A person must first commit and trust."}, {"front": "What does the term $\\lambda\\acute{o}\\gamma o\\varsigma$ suggest about the nature of the universe in John's Gospel?", "back": "The universe has an inherent rationality and meaning."}, {"front": "Under whose authority does a believer accept the Trinity according to Aquinas?", "back": "The authority of God."}, {"front": "How is faith's 'total orientation' of the self categorized in the text?", "back": "As a direction of the mind, the will, and the affections."}, {"front": "What does the text identify as the 'classic formulation' of the relationship between faith and understanding?", "back": "Fides quaerens intellectum (Faith seeking understanding)."}, {"front": "What did the 'elders' obtain through faith in the King James Version of Hebrews 11?", "back": "A good report."}, {"front": "True or False: According to the source, Christian faith is defined as trust in a system of principles.", "back": "False; it is defined as trust in the person of Jesus Christ."}, {"front": "According to Hebrews 11:3, things which are seen were not made of things which _____.", "back": "do appear"}, {"front": "Which medieval theologian argued that faith does not contradict reason but transcends it?", "back": "Thomas Aquinas."}, {"front": "What is the primary function of a 'Creed' for a religious community?", "back": "It serves as a formal, public statement of communal loyalty and belief."}, {"front": "The concept of God becoming 'flesh' and dwelling among humanity is known as the _____.", "back": "Incarnation"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
