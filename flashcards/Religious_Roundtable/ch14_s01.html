<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 14, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the Beatitudes?", "back": "The opening declarations of Jesus's Sermon on the Mount (Matthew 5:3-12), each beginning 'Blessed are,' which describe the character and condition of those who belong to the Kingdom of God."}, {"front": "Define Agape in the context of Christian ethics.", "back": "The Greek word for the unconditional, self-giving love that the New Testament places at the center of Christian ethics, distinct from friendship love (philia) or romantic love (eros)."}, {"front": "What is Sanctification?", "back": "The ongoing process by which a Christian grows in holiness after conversion, representing the ongoing work of the Holy Spirit to conform the believer to the character of Christ."}, {"front": "What is the Sermon on the Mount?", "back": "Jesus's extended ethical teaching recorded in Matthew 5-7, widely considered the most concentrated summary of Christian moral vision in the entire New Testament."}, {"front": "According to Jesus, what are the two great commandments that form the foundation of Christian ethics?", "back": "To love God with all your heart, soul, and mind; and to love your neighbor as yourself."}, {"front": "How do all other moral obligations, such as the Ten Commandments, relate to Jesus's two great commandments?", "back": "All other moral obligations — 'all the law and the prophets' — flow from these two commandments; they 'hang' on them."}, {"front": "What is the fundamental nature of the Christian moral life, beyond mere compliance with rules?", "back": "It is primarily a matter of becoming a person capable of genuine love."}, {"front": "Which New Testament chapter is considered by many to be the greatest meditation on agape love?", "back": "1 Corinthians 13, written by the apostle Paul."}, {"front": "How does 1 Corinthians 13 describe agape love, and what does this imply about its nature?", "back": "It describes love as patient, kind, not envious, not boastful, not proud, and not keeping a record of wrongs. This is presented as a complete moral program, not a sentimental greeting card."}, {"front": "What makes the Sermon on the Mount striking and different from typical moral systems?", "back": "It refuses to be merely reasonable, presenting radical commands like 'Blessed are the meek,' 'Love your enemies,' and 'Do not resist an evildoer,' which push past prudential calculation."}, {"front": "Explain the concept of the 'already and not yet' in relation to the Kingdom of God in Christian ethics.", "back": "It refers to the ethics of a Kingdom that has already begun through Jesus but has not yet fully arrived, explaining the demanding and hopeful nature of its commands."}, {"front": "What is the Greek word for 'blessed' in the Beatitudes, and what is its deeper meaning?", "back": "The Greek word is 'makarios,' which carries a meaning closer to 'fully alive' or 'living well in the deepest sense,' rather than just a moral reward."}, {"front": "How do the Beatitudes 'turn ordinary moral calculations upside down'?", "back": "While the world values the strong, self-sufficient, and powerful, Jesus declares that those who know their own need, mourn, are gentle, and hunger for justice are the ones who are truly flourishing."}, {"front": "What is the key distinction between justification and sanctification in Christian ethics, particularly in the Protestant tradition?", "back": "Justification is what God does (declaring a believer righteous through faith, not works). Sanctification is what follows: the believer's ongoing growth in holiness through the Holy Spirit."}, {"front": "Does justification make morality optional for a Christian?", "back": "No, once justified, the Christian is called to grow in holiness through sanctification; morality is not optional but a natural outflow."}, {"front": "How is the 'good life' for a Christian described in relation to rules and growth?", "back": "The good life is not earned by following rules; rather, it grows naturally, 'as fruit grows from a healthy tree,' through the process of sanctification."}, {"front": "List at least three of the Beatitudes (Blessed statements) from Matthew 5:3-12.", "back": "Examples include: 'Blessed are the poor in spirit,' 'Blessed are they that mourn,' 'Blessed are the meek,' 'Blessed are they which do hunger and thirst after righteousness,' 'Blessed are the merciful,' 'Blessed are the pure in heart,' 'Blessed are the peacemakers,' 'Blessed are they which are persecuted for righteousness' sake.'"}, {"front": "How do the Beatitudes differ from a system of moral reward?", "back": "They don't say 'Try hard to be meek' or 'Work to become merciful' to *receive* blessing; instead, they declare that the meek and merciful *are already* blessed, describing a state of being rather than an achievement."}, {"front": "What core message does the apostle Paul convey about love in 1 Corinthians 13 regarding how it functions?", "back": "Love is patient and kind; it does not envy, boast, or keep a record of wrongs, functioning as a practical moral program rather than a mere feeling."}, {"front": "Why is Christian ethics described as 'not, at its root, a set of rules'?", "back": "Because it is grounded in the two great commandments of loving God and neighbor, from which all other moral obligations flow, emphasizing transformation of character over mere compliance."}, {"front": "What does Jesus imply by stating 'On these two commandments hang all the law and the prophets'?", "back": "He implies that loving God and loving neighbor is the interpretive key and the sum total of all divine instruction and moral expectation revealed in the Old Testament."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
