<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 8, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did Norse Paganism traditionally begin according to the historical record?", "back": "It grew slowly over centuries among Germanic and Scandinavian peoples without a single founder."}, {"front": "Who were the primary ancestors of the modern Norwegians, Swedes, Danes, and Icelanders?", "back": "The Germanic and Scandinavian peoples of northern Europe."}, {"front": "Before they were written down, how were Norse mythological stories primarily preserved?", "back": "They were sung by skalds and passed down as oral tradition across generations."}, {"front": "Term: Skald", "back": "Definition: A Norse court poet who composed and performed verse to celebrate gods and heroes."}, {"front": "Beyond entertainment, what was the primary social role of a Norse skald?", "back": "A keeper of sacred and historical memory."}, {"front": "What three complex linguistic features characterized skaldic verse?", "back": "Alliteration, internal rhyme, and riddle-like kennings."}, {"front": "Why did the complex structure of skaldic verse make it a reliable oral record?", "back": "The dense poetic forms were difficult to alter during transmission."}, {"front": "Term: Kenning", "back": "Definition: A compound poetic image used in Old Norse poetry, such as 'whale-road' for the sea."}, {"front": "In the context of Norse poetry, what does the kenning 'whale-road' represent?", "back": "The sea."}, {"front": "During which historical era did Norse Paganism reach its most dramatic expression?", "back": "The Viking Age."}, {"front": "What is the approximate date range of the Viking Age?", "back": "793–1066."}, {"front": "To which specific group of people does the word 'Viking' refer?", "back": "Norse people who went on sea-raids."}, {"front": "True or False: The term 'Viking' described every person living in Norse culture.", "back": "False (it referred specifically to those who participated in sea-raids)."}, {"front": "According to Norse mythology, what is the central structure of the cosmos?", "back": "A vast world-tree."}, {"front": "Besides gods, what major group of beings populated the Norse cosmos?", "back": "Giants."}, {"front": "How is the predicted end of the Norse world described in their mythology?", "back": "As a catastrophic and ultimately regenerative event."}, {"front": "Which Norse explorer established a settlement in Newfoundland around 1000 CE?", "back": "Leif Eriksson."}, {"front": "What is the name of the confirmed Viking archaeological site in Newfoundland, Canada?", "back": "L'Anse aux Meadows."}, {"front": "What is the historical significance of the settlement at L'Anse aux Meadows?", "back": "It is the oldest known European settlement in the Americas."}, {"front": "Approximately how many centuries before Columbus did the Norse reach the Americas?", "back": "Five centuries."}, {"front": "What was the religious affiliation of Leif Eriksson at the time he reached the Americas?", "back": "Christian."}, {"front": "In what year did Iceland officially convert to Christianity?", "back": "1000."}, {"front": "What is the fundamental historiographical problem with surviving Norse mythological texts?", "back": "They were all recorded after the conversion to Christianity."}, {"front": "Between what years did the kingdoms of Norway, Denmark, and Sweden adopt Christianity?", "back": "Approximately 960 and 1100."}, {"front": "Most of the Norse myths we know today were written down in which century and country?", "back": "13th-century Iceland."}, {"front": "Who were the primary scribes responsible for writing down Norse myths in the 13th century?", "back": "Christian scholars."}, {"front": "Identify: Snorri Sturluson", "back": "An Icelandic chieftain, historian, and poet who compiled the Prose Edda."}, {"front": "What was the life span of Snorri Sturluson?", "back": "1179–1241."}, {"front": "Around what year did Snorri Sturluson compile the Prose Edda?", "back": "1220."}, {"front": "What was the original intended purpose of the Prose Edda?", "back": "A handbook of Norse mythology and skaldic poetic technique."}, {"front": "What is the title of Snorri Sturluson’s history of the Norwegian kings?", "back": "Heimskringla."}, {"front": "The Prose Edda provides a comprehensive account of Norse mythology, but it is complicated by Snorri’s _____ lens.", "back": "medieval Christian"}, {"front": "How does the Poetic Edda differ from the Prose Edda regarding its authorship?", "back": "The compiler of the Poetic Edda is unknown."}, {"front": "Around what year was the Poetic Edda written down?", "back": "1270."}, {"front": "What does the Poetic Edda contain?", "back": "A collection of older mythological and heroic poems."}, {"front": "Although recorded in the 13th century, the oral traditions in the Poetic Edda are believed to go back _____.", "back": "centuries further"}, {"front": "What is the central debate among scholars regarding 13th-century Norse texts?", "back": "How much the Christian worldview of the scribes distorted the original pagan myths."}, {"front": "How should modern students view the 13th-century Norse texts according to the source material?", "back": "As a window filtered through time and conversion, neither pure fiction nor perfectly preserved."}, {"front": "Norse Paganism is considered a 'living memory' of a people because it was passed down through _____.", "back": "generation to generation"}, {"front": "What geographic range did Norse sailors cover during the Viking Age?", "back": "From Newfoundland in the west to Constantinople in the east."}, {"front": "Why did Christian scholars like Snorri Sturluson record pagan myths?", "back": "They wanted to preserve the old stories despite no longer believing in them."}, {"front": "The 'whale-road' is an example of what poetic device used by skalds?", "back": "Kenning."}, {"front": "Norse sailors traveling with Leif Eriksson helped preserve myths by carrying _____ of the stories with them.", "back": "memories"}, {"front": "How did the absence of a written revelation affect the early development of Norse Paganism?", "back": "It allowed the religion to grow slowly and organically through oral tradition."}, {"front": "In skaldic poetry, what are riddle-like compound poetic images called?", "back": "Kennings."}, {"front": "Which text is considered our most comprehensive account of Norse mythology?", "back": "The Prose Edda."}, {"front": "The Prose Edda was written approximately _____ years after the Viking Age ended.", "back": "154 (calculated from 1066 to 1220)."}, {"front": "What specific social rank did Snorri Sturluson hold in Iceland?", "back": "Chieftain."}, {"front": "What were the 'great halls of chieftains' used for in the context of Norse mythology?", "back": "Places where skalds sang stories and passed on oral traditions."}, {"front": "Which century saw the primary recording of Norse myths in written form?", "back": "The 13th century."}, {"front": "Why is the work of Snorri Sturluson described as both 'invaluable and complicated'?", "back": "He preserved stories that would have been lost but interpreted them through a Christian lens."}, {"front": "Which group of people are described as the 'ancestors' of modern Anglo-Saxons in the text?", "back": "The Germanic peoples of northern Europe."}, {"front": "What does the text suggest about the 'reliability' of skaldic oral transmission?", "back": "It was highly reliable due to the difficulty of altering complex poetic forms."}, {"front": "The Norse cosmos was organized around Yggdrasil, which is the name of the _____.", "back": "world-tree"}, {"front": "What event names the whole Norse culture after its most dramatic activity?", "back": "The Viking Age."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
