<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 8, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

            </div>
        </div>

    <script>
    var CARDS = [{"front": "Why is it unusual that the surviving sacred texts of Norse Paganism were written by Christians?", "back": "They were recorded to preserve cultural heritage rather than as a practiced religion."}, {"front": "How are the Eddas categorized as textual evidence?", "back": "They sit somewhere between scripture and literature."}, {"front": "Define: Poetic Edda.", "back": "A collection of Old Norse mythological and heroic poems compiled around 1270."}, {"front": "What is the name of the primary manuscript containing the Poetic Edda?", "back": "Codex Regius."}, {"front": "Which poem in the Poetic Edda describes the world's creation and the coming Ragnarök?", "back": "V\"olusp'a (\"The Seeress's Prophecy\")."}, {"front": "Which poem, attributed to Odin, contains practical wisdom and accounts of his sacrifices?", "back": "H'avam'al (\"Sayings of the High One\")."}, {"front": "What makes the Poetic Edda significant compared to other Norse sources?", "back": "It is the oldest and most direct source for Norse mythology."}, {"front": "Who is the author of the Prose Edda?", "back": "Snorri Sturluson."}, {"front": "What was the original purpose of the Prose Edda?", "back": "It served as a handbook for aspiring skalds (poets)."}, {"front": "Which section of the Prose Edda retells Norse mythology in narrative form?", "back": "Gylfaginning (\"The Fooling of Gylfi\")."}, {"front": "Which section of the Prose Edda catalogues kennings and poetic techniques?", "back": "Skáldskaparmál (\"The Language of Poetry\")."}, {"front": "What is demonstrated in Snorri Sturluson's 'Háttatal'?", "back": "A list of 102 different verse forms."}, {"front": "What is the Elder Futhark?", "back": "The 24-character runic alphabet used for sacred and magical inscriptions."}, {"front": "What does the word 'rune' mean in Old Norse?", "back": "Secret or mystery."}, {"front": "On what types of objects were runic inscriptions typically found?", "back": "Weapons, grave-markers, jewelry, and stone monuments."}, {"front": "According to Norse literature, how did Odin gain the secret wisdom of the runes?", "back": "He sacrificed himself by hanging from Yggdrasil for nine nights."}, {"front": "From which specific tree did Odin hang during his self-sacrifice?", "back": "Yggdrasil."}, {"front": "By what weapon was Odin wounded during his ordeal on Yggdrasil?", "back": "A spear."}, {"front": "To whom did Odin sacrifice himself to obtain the runes?", "back": "To himself."}, {"front": "How does the Norse account of receiving sacred knowledge contrast with the Vedic account?", "back": "Norse knowledge is earned through suffering, while Vedic knowledge is received through meditation."}, {"front": "The runic alphabet is commonly named _____ after its first six letters.", "back": "Futhark"}, {"front": "Approximately how many runic inscriptions survive in Sweden?", "back": "3,000."}, {"front": "What is the significance of the R\"ok Runestone in Sweden?", "back": "It is the longest known runic inscription, consisting of 760 characters."}, {"front": "What time period covers the active use of the runic alphabet for inscriptions?", "back": "Approximately the 2nd to the 17th centuries."}, {"front": "What is a major challenge regarding the modern understanding of the Norse textual tradition?", "back": "The lack of a community of practice to explain how stories related to daily ritual."}, {"front": "In terms of religious framework, the Eddas provide mythology but lack a _____.", "back": "theology"}, {"front": "According to the H'avam'al, what physical deprivation did Odin endure on Yggdrasil?", "back": "He was without food or water."}, {"front": "What does the Norse account of the runes suggest about the nature of sacred knowledge?", "back": "It must be earned through suffering rather than given freely."}, {"front": "The R\"ok Runestone inscription includes references to ancient heroes, battles, and possibly _____.", "back": "Ragnarök"}, {"front": "Why can the Eddas not tell us exactly what individual Norse people believed?", "back": "They preserve narrative stories rather than personal belief systems or daily worship practices."}, {"front": "How many verse forms are demonstrated in the Prose Edda's 'Háttatal'?", "back": "102."}, {"front": "The title 'H'avam'al' refers to the sayings of which high-ranking deity?", "back": "Odin."}, {"front": "What does the existence of the R\"ok Runestone suggest about the complexity of runic writing?", "back": "It could be used for extremely long, complex puzzles involving multiple sides of stone."}, {"front": "In the context of the H'avam'al, what is 'rune-lore'?", "back": "Sacred knowledge regarding the magical and prophetic use of runes."}, {"front": "What is the primary manuscript source for the poems in the Poetic Edda?", "back": "The Codex Regius."}, {"front": "What does the Prose Edda section 'Skáldskaparmál' translate to in English?", "back": "The Language of Poetry."}, {"front": "Concept: Gylfaginning", "back": "The narrative section of the Prose Edda that retells Norse mythology."}, {"front": "Which century saw the compilation of the Poetic Edda?", "back": "The 13th century (specifically around 1270)."}, {"front": "What is the literal meaning of 'V\"olusp'a'?", "back": "The Seeress's Prophecy."}, {"front": "How many characters comprise the Elder Futhark alphabet?", "back": "24."}, {"front": "Where was the Poetic Edda compiled?", "back": "Iceland."}, {"front": "Why did Snorri Sturluson write the Prose Edda around 1220?", "back": "As a handbook to teach the techniques of skaldic verse."}, {"front": "What was the significance of runes on weapons and jewelry?", "back": "They carried magical and sacred significance beyond simple identification."}, {"front": "Term: Skald", "back": "A poet in Old Norse society who composed and performed verse."}, {"front": "What does the text conclude about the relationship between writing and the most sacred things?", "back": "For much of human history, the most sacred things were not written down."}, {"front": "Odin's ordeal of nine nights is recorded in which specific poem?", "back": "H'avam'al."}, {"front": "What province in Sweden houses the R\"ok Runestone?", "back": "Osterg\"otland."}, {"front": "How does the Norse textual tradition serve as a 'unique kind of textual evidence'?", "back": "It was preserved by those who no longer believed in its religious content."}, {"front": "What theme in the H'avam'al explains why knowledge is not 'given freely'?", "back": "The concept that even the greatest god must suffer or 'bleed' for what matters."}, {"front": "Which section of the Prose Edda serves as a catalogue of kennings?", "back": "Skáldskaparmál."}, {"front": "What are the first six letters of the runic alphabet?", "back": "f, u, th, a, r, k."}, {"front": "Cloze: The Poetic Edda was compiled by an unknown scholar in _____ around 1270.", "back": "Iceland"}, {"front": "Cloze: The word 'rune' means _____ or mystery in Old Norse.", "back": "secret"}, {"front": "Cloze: The _____ Runestone is one of the great unsolved puzzles of Norse studies.", "back": "R\"ok"}, {"front": "Which text is the 'handbook for aspiring skalds'?", "back": "The Prose Edda."}, {"front": "According to the text, what effect does writing have on cultural preservation?", "back": "Writing changes what gets preserved and the way it is remembered."}, {"front": "How is the acquisition of the Torah at Sinai contrasted with Odin's runes?", "back": "The Torah was given freely by God to a willing community, unlike the runes which required sacrifice."}, {"front": "What is the primary subject of the 'Háttatal' section in the Prose Edda?", "back": "A demonstration of 102 different verse forms."}, {"front": "Where did the Elder Futhark alphabet find its primary use throughout history?", "back": "Throughout the Germanic and Scandinavian world."}, {"front": "Why is the lack of a 'community of practice' a challenge for scholars today?", "back": "It makes it difficult to determine what was required belief versus optional storytelling."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
