<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 10, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the meaning of the Arabic word “islam”?", "back": "“Islam” means “surrender” – specifically, a willing, active surrender to a greater reality, chosen for alignment rather than defeat.", "id": "fc01"}, {"front": "What does the Arabic word “muslim” signify?", "back": "A “muslim” means “one who surrenders” (to God).", "id": "fc02"}, {"front": "In Islam, what does the Arabic word “iman” mean?", "back": "“Iman” means faith, trust, and conviction; it is the interior state that transforms surrender into liberation.", "id": "fc03"}, {"front": "What six core beliefs are involved in “iman” (faith) in Islam?", "back": "Iman involves belief in God (Allah), angels, divine books, prophets, the Day of Judgment, and divine decree (qadar).", "id": "fc04"}, {"front": "How is “iman” understood as more than just intellectual assent?", "back": "Iman is a state of the whole person – heart, mind, and action – oriented toward God, not merely an intellectual acceptance of beliefs.", "id": "fc05"}, {"front": "According to classical Islamic scholars, how does faith (iman) change?", "back": "Faith (iman) increases with obedience and decreases with sin.", "id": "fc06"}, {"front": "What is the Shahada, and what is its significance?", "back": "The Shahada is the declaration of faith and the first of Islam's Five Pillars, serving as the doorway into Islam and the frame for all its beliefs and practices.", "id": "fc07"}, {"front": "What are the two main parts of the Shahada?", "back": "“There is no god but God (Allah),” and “Muhammad is the messenger of God.”", "id": "fc08"}, {"front": "What is the purpose or effect of the first part of the Shahada, “There is no god but God”?", "back": "It negates all false gods and rivals to the divine, clearing the field of anything humans might mistakenly treat as ultimate (e.g., wealth, power, nation, ideology).", "id": "fc09"}, {"front": "What does the second part of the Shahada, “Muhammad is the messenger of God,” affirm?", "back": "It affirms the existence of genuine revelation, a genuine messenger (Muhammad), and a genuine path from God.", "id": "fc10"}, {"front": "What is “tawhid,” the central concept of Islamic theology?", "back": "Tawhid is the absolute unity and oneness of God, meaning God is utterly unique, unlike anything in creation, and without partners, children, equals, or rivals.", "id": "fc11"}, {"front": "How is “tawhid” more than just a numerical claim about God?", "back": "Beyond God being numerically one, tawhid emphasizes God's absolute uniqueness, incomparability, and sole sovereignty, without sharing divine authority with anyone or anything.", "id": "fc12"}, {"front": "What is “shirk,” and how is it related to tawhid?", "back": "Shirk is the opposite of tawhid; it means associating anything with God that does not belong there, such as partners or rivals.", "id": "fc13"}, {"front": "Why does Islamic theology consider “shirk” the most serious of all errors?", "back": "Shirk is deemed the most serious error because it distorts the fundamental truth about reality, which is the absolute unity and oneness of God (tawhid).", "id": "fc14"}, {"front": "How does Surah 2:285-286 (“The Cow”) portray the Islamic understanding of faith?", "back": "It captures faith as a comprehensive, communal, and humble act, emphasizing obedience rather than debate, and acknowledging human limitations.", "id": "fc15"}, {"front": "In Surah 2:285-286, how is faith presented as both personal and communal?", "back": "The passage states that 'each soul answers for itself' (personal) while 'the believers speak together' in their affirmations and prayers (communal).", "id": "fc16"}, {"front": "How does Islam view biblical prophets such as Adam, Abraham, Moses, and Jesus?", "back": "Islam honors them all as messengers of God, part of a continuous line of divine revelation.", "id": "fc17"}, {"front": "What is Islam's view on the reliability of earlier scriptures like the Torah and the Gospel?", "back": "Islam holds that earlier scriptures have been partially corrupted over time through careless transmission or deliberate alteration.", "id": "fc18"}, {"front": "What is Muhammad's specific title and role in Islam regarding prophecy?", "back": "Muhammad is the Khatam al-Anbiya' – the Seal of the Prophets, meaning the last and final prophet.", "id": "fc19"}, {"front": "How does Islam understand the Quran, and how does this differ from its understanding of the Bible?", "back": "The Quran is understood as the direct, verbatim speech of God, transmitted perfectly to Muhammad, unlike the Bible, which Islam views as human writings about divine matters.", "id": "fc20"}, {"front": "How was the Quran originally transmitted and preserved?", "back": "It was an oral revelation, spoken to Muhammad, memorized by his companions, and then written down, preserved perfectly in its original Arabic.", "id": "fc21"}, {"front": "What does the Arabic word “Quran” mean?", "back": "The word “Quran” in Arabic means “recitation.”", "id": "fc22"}, {"front": "What is a “hafiz” in the Muslim world, and why is it a high honor?", "back": "A hafiz is a person who has memorized the entire Quran by heart, a feat highly honored due to the Quran's sacred status and emphasis on oral tradition.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
