<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 18, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What historical period did Confucius live in, and what characterized it?", "back": "Confucius lived during the Spring and Autumn period (551-479 BCE), a time marked by political fragmentation, warfare, and the apparent collapse of the Zhou dynasty's ritual order."}, {"front": "Instead of seeking divine intervention, where did Confucius look for solutions to societal disharmony?", "back": "Confucius looked backward to the sage-kings of antiquity (Yao, Shun, the Duke of Zhou), believing they built genuinely harmonious societies through the cultivation of virtue and faithful practice of ritual (li)."}, {"front": "How does Confucianism's 'eschatology' differ from typical religious prophecies about the future?", "back": "Confucian 'eschatology' is less a prophecy about the future and more a recovery of a harmonious past, presenting a human challenge rather than a divine promise."}, {"front": "What is the meaning of the Confucian key term 'Da Tong'?", "back": "Da Tong, or Great Harmony/Great Commonwealth, is the Confucian vision of the ideal society, a state of perfect social and political order."}, {"front": "Which classical Confucian text describes the vision of Da Tong?", "back": "The vision of Da Tong is primarily described in the Book of Rites (Li Ji)."}, {"front": "In the Da Tong vision, how are political leaders chosen, and how do people care for children and elders?", "back": "Political leaders are chosen for virtue rather than heredity, and all people share in caring for one another's children and elders as if they were their own."}, {"front": "Describe the economic and social support aspects of the Da Tong ideal.", "back": "In Da Tong, the able are employed, the weak are cared for and supported, and society functions as a vast family."}, {"front": "Which core Confucian virtues bind society together in the Da Tong vision?", "back": "Society in Da Tong is bound together by ren (benevolence), yi (righteousness), and li (ritual propriety)."}, {"front": "Is Da Tong presented solely as a historical account, or also as a future aspiration?", "back": "Da Tong is presented both as a"}, {"front": "What is the Confucian concept of 'xing shan'?", "back": "Xing shan, associated with Mencius, means the fundamental goodness of human nature – that moral virtue is inherent within us, like a seed requiring cultivation."}, {"front": "Why is the concept of 'xing shan' crucial for the achievability of the Great Harmony (Da Tong)?", "back": "If human nature is fundamentally good (xing shan), then the Great Harmony is genuinely achievable and not a utopian fantasy, implying that human beings are capable of virtue and history is capable of progress."}, {"front": "Who was Mencius, and in what era did he live?", "back": "Mencius (372-289 BCE) was the greatest inheritor of Confucius's tradition, known for his teaching on the fundamental goodness of human nature (xing shan)."}, {"front": "According to Mencius, what 'four sprouts' of virtue are inherent in human nature?", "back": "Mencius believed every person is born with the beginnings of benevolence, righteousness, propriety, and wisdom."}, {"front": "How did Mencius believe these 'four sprouts' of virtue could be cultivated?", "back": "These sprouts can grow into full virtue if cultivated by education, ritual, and good examples, particularly those provided by sage-rulers."}, {"front": "What alternative view on human nature existed within Confucian thought, contrasting with Mencius's xing shan?", "back": "Xunzi, another Confucian thinker, held that human nature tends toward selfishness and must be shaped by external ritual and education."}, {"front": "How did Neo-Confucianism of the Song dynasty expand upon Mencius's insights?", "back": "Neo-Confucianism wove Mencius's ideas of human nature together with Buddhist and Taoist concepts, developing the ideal of the sage into a spiritual ideal, not merely a moral and political one."}, {"front": "What lesson is conveyed by Confucius's saying: 'If a man take no thought about what is distant, he will find sorrow near at hand'?", "back": "This quote emphasizes the importance of foresight, long-term planning, and considering future consequences to avoid immediate problems or regrets."}, {"front": "How did Kang Youwei reimagine the Confucian Great Harmony (Da Tong) in modern times?", "back": "Kang Youwei (1858-1927), a reformist Confucian thinker, wrote the *Book of the Great Unity* (*Datong Shu*), reimagining Da Tong in terms of global governance, social equality, and the elimination of national borders."}, {"front": "What was Sun Yat-sen's connection to the concept of Da Tong?", "back": "Sun Yat-sen, the founder of modern China, frequently quoted the Da Tong passage in his political speeches, highlighting its enduring relevance."}, {"front": "Despite officially rejecting Confucianism, how has the Communist Party of China shown an influence of Confucian thought?", "back": "The Communist Party of China has periodically appealed to the language of the 'harmonious society' (hexie shehui), reflecting how deeply the Confucian vision of harmony runs in Chinese culture."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
