<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 2, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Approximately how many Jews are there in the world today?", "back": "15 million."}, {"front": "Judaism accounts for less than what percentage of the global population?", "back": "< 0.2%."}, {"front": "Which two major world religions grew directly from Jewish roots?", "back": "Christianity and Islam."}, {"front": "What concept regarding the nature of God did Christianity and Islam inherit from Judaism?", "back": "Monotheism."}, {"front": "What theological framework concerning a divine agreement was passed from Judaism to its daughter religions?", "back": "Covenant theology."}, {"front": "What Jewish idea describes history as moving toward a specific purpose?", "back": "Linear history."}, {"front": "How is morality characterized in secular Western culture due to Jewish influence?", "back": "As non-negotiable."}, {"front": "In the Jewish prophetic tradition, what is the specific role of speaking to those in power?", "back": "Speaking truth to power."}, {"front": "The scale of Jewish intellectual and artistic contribution is described as being staggering out of _____ to its size.", "back": "Proportion."}, {"front": "Which medieval philosopher reconciled Greek philosophy with monotheist theology?", "back": "Moses Maimonides."}, {"front": "Maimonides' synthesis of philosophy and theology influenced which two other religious traditions?", "back": "Christianity and Islam."}, {"front": "In which city and century did Baruch Spinoza work?", "back": "17th-century Amsterdam."}, {"front": "Baruch Spinoza laid the intellectual foundations for modern philosophy and what other field?", "back": "Biblical criticism."}, {"front": "Sigmund Freud transformed the human understanding of what subject?", "back": "The mind."}, {"front": "What two concepts of physics were transformed by Albert Einstein's work?", "back": "Space and time."}, {"front": "Franz Kafka and Primo Levi gave voice to experiences of survival and _____.", "back": "Alienation."}, {"front": "What is the Hebrew term for the Holocaust?", "back": "The Shoah."}, {"front": "During which years did the Nazi regime systematically murder six million Jews?", "back": "1941 to 1945."}, {"front": "What fraction of the world's Jewish population was murdered during the Holocaust?", "back": "⅓."}, {"front": "The Holocaust resulted in the destruction of nearly the whole of which specific civilization?", "back": "European Jewish civilization."}, {"front": "How did the Holocaust differ from previous attempts to destroy the Jewish people?", "back": "It was the largest and most methodical."}, {"front": "Concept: Theodicy", "back": "Definition: The theological reflection on why God permits evil."}, {"front": "What quality distinguishes the theological and philosophical reflection produced by Jewish thinkers since 1945?", "back": "Extraordinary honesty."}, {"front": "For how long has the Jewish tradition survived in the diaspora?", "back": "Two thousand years."}, {"front": "Name two historical powers, besides medieval Europe, that the Jewish tradition survived.", "back": "Babylon and Rome."}, {"front": "Which central sacred text has remained the same for Jews throughout two millennia of diaspora?", "back": "The Torah."}, {"front": "Which major holiday has been continuously celebrated by Jews despite centuries of persecution?", "back": "Passover."}, {"front": "What are the two primary factors debated as the cause of Jewish survival?", "back": "God's covenant and cultural resilience."}, {"front": "Judaism's sense of God is one who is not distant but who _____ in history.", "back": "Acts."}, {"front": "Which Jewish philosopher's work shaped Christian and Islamic thought for centuries?", "back": "Moses Maimonides."}, {"front": "How does secular Western culture view the direction of history due to Jewish influence?", "back": "Moving toward a purpose."}, {"front": "According to the text, what is the status of Judaism's global population size?", "back": "Small (approximately 15 million)."}, {"front": "What specific aspect of scripture did Judaism contribute to Christianity and Islam?", "back": "Monotheism and portions of its sacred writings."}, {"front": "What type of history is defined as moving forward rather than in a cycle?", "back": "Linear history."}, {"front": "Baruch Spinoza's work in Amsterdam laid the foundations for modern _____.", "back": "Philosophy."}, {"front": "What question does the Holocaust pose regarding human nature?", "back": "The nature of human cruelty."}, {"front": "The destruction of European Jewish civilization occurred between the years _____ and _____.", "back": "1941; 1945."}, {"front": "Beyond faith and survival, what is the third major philosophical question posed by the Holocaust?", "back": "Theodicy."}, {"front": "What does the text call the fact that Judaism survived 2,000 years of persecution?", "back": "A remarkable fact."}, {"front": "Jewish thinkers since 1945 have wrestled with questions of faith and survival with _____.", "back": "Extraordinary seriousness."}, {"front": "The concept that 'morality is non-negotiable' is a stamp of which tradition on secular culture?", "back": "Judaism."}, {"front": "What term describes the displacement of Jews from their homeland for two thousand years?", "back": "Diaspora."}, {"front": "According to the text, why would Christianity and Islam 'not exist' without Judaism?", "back": "Because they grew directly from Jewish roots and inherited its core theology."}, {"front": "Moses Maimonides helped reconcile monotheist theology with _____ philosophy.", "back": "Greek."}, {"front": "Who is the 20th-century Jewish thinker noted for transforming the understanding of time?", "back": "Albert Einstein."}, {"front": "Who is the 20th-century Jewish thinker noted for transforming the understanding of the mind?", "back": "Sigmund Freud."}, {"front": "What specific experience did Primo Levi give voice to?", "back": "Survival."}, {"front": "What specific experience did Franz Kafka give voice to?", "back": "Alienation."}, {"front": "How many Jews were murdered by the Nazi regime?", "back": "Six million."}, {"front": "Judaism is described as one of the most _____ forces in human history.", "back": "Consequential."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
