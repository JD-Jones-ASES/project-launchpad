<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 17, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the philosophical significance of the Tao Te Ching's opening line: 'The Tao that can be named is not the eternal \"Tao\"'?", "back": "It is a warning about language itself, implying that any attempt to name or describe ultimate reality (Tao) will make it smaller than it is, as Tao exceeds all human description."}, {"front": "Define 'Tao' as the central concept of Taoist philosophy.", "back": "The central concept meaning 'the Way.' It is the ultimate ground of all reality—the source, principle, and destination of all things—which cannot be described in ordinary language or grasped by ordinary thought, yet is present everywhere."}, {"front": "How does the Tao differ from the God of Islam or the Brahman of Hindu theology?", "back": "Unlike a personal God or being, the Tao has no personality; it does not create by choice or love, nor does it command. It is described as existing before heaven and earth, as nameless, solitary, and unchanging."}, {"front": "Describe the unique type of 'transcendence' associated with the Tao.", "back": "It is not the transcendence of a God 'higher' than the world, but the transcendence of a 'ground that is prior' to the world. The Tao is the condition of possibility for creation itself, not merely another level added above it."}, {"front": "How does Taoism emphasize the 'radical immanence' of the Tao?", "back": "It asserts that 'The great Tao flows everywhere' (Ch. 34), present in everything, like 'grain in wood.' Naturalness (ziran) and the uncarved block (pu) are expressions of the Tao's presence in the ordinary world."}, {"front": "What is the Taoist concept of 'returning to the root' as described in Chapter 16 of the Tao Te Ching?", "back": "It signifies that all 'ten thousand things' arise from the Tao and return to it. This return brings a stillness and clarity, which Laozi calls 'returning to one's destiny' and leads to an understanding of the 'unchanging rule.'"}, {"front": "Define 'wu wei' in Taoist philosophy.", "back": "A central Taoist concept meaning 'non-action' or 'acting without forcing.' It does not mean doing nothing, but acting in accordance with the Tao—with the grain of reality rather than against it—effortlessly and spontaneously."}, {"front": "How does the practice of wu wei lead to accomplishing great things in Taoism?", "back": "By not straining, forcing, or imposing, a person practicing wu wei acts in harmony with the natural flow of the Tao. Like water, they achieve goals effectively by aligning with, rather than resisting, the way things are."}, {"front": "Explain the fundamental paradox at the heart of Taoist theology regarding the Tao's nature.", "back": "The paradox is that the Tao is simultaneously the farthest thing from ordinary experience (exceeding all description) and the closest thing to ordinary experience (the ground of everything you see and touch)."}, {"front": "What is considered the appropriate response to the paradox of the Tao's transcendence and immanence?", "back": "The paradox itself is the teaching. The appropriate response is not a clever philosophical argument, but a responsive openness—wu wei—where one stops fighting the way things are and moves with the Tao."}, {"front": "In what sense is the Tao 'prior to the distinction between transcendent and immanent'?", "back": "The Tao is not simply 'above' or 'within' creation; it is the ultimate foundation that allows for the very concepts of transcendence and immanence to exist. It precedes and encompasses these dualistic distinctions."}, {"front": "What is meant by 'deliberate theological humility' at the beginning of Taoism?", "back": "It refers to Taoism's conscious acknowledgment and acceptance that the ultimate reality (Tao) cannot be fully named, grasped, or comprehended by human language or conventional thought, thus embracing its ineffable nature."}, {"front": "What does 'ziran' (naturalness) represent in Taoist thought, and how does it relate to the Tao?", "back": "Ziran signifies the spontaneous, unforced, and authentic quality observed in nature (e.g., water flowing, bamboo bending). It is an essential expression of the Tao's immanent presence in the ordinary world."}, {"front": "What does 'pu' (the uncarved block) symbolize in Taoism?", "back": "Pu symbolizes simplicity, naturalness, and the unadorned state of things before they are shaped, altered, or named by human intervention. It represents the original, pure potentiality inherent in the Tao."}, {"front": "According to Chapter 1 of the Tao Te Ching, what condition is necessary to 'sound' the 'deep mystery' of the Tao?", "back": "One must 'Always without desire we must be found.' If desire is always present, one will only perceive its 'outer fringe' and not its profound depth."}, {"front": "How does Chapter 34 describe the Great Tao's actions regarding creation?", "back": "It gives all things their production without them refusing obedience, but 'does not claim the name of having done it.' It clothes all things and 'makes no assumption of being their lord,' operating without seeking recognition."}, {"front": "What does Chapter 16 of the Tao Te Ching state about the consequences of knowing versus not knowing the 'unchanging rule'?", "back": "To know the unchanging rule is to be intelligent, leading to 'grand capacity and forbearance,' 'community of feeling,' and 'kingliness of character.' Not to know it 'leads to wild movements and evil issues.'"}, {"front": "Why is translating the Tao Te Ching particularly challenging, leading to many different versions?", "back": "The original Chinese text is deliberately ambiguous; individual characters can be read in multiple ways, and sentences parsed differently. Laozi intentionally cultivated this ambiguity, making no two translations quite the same."}, {"front": "What is 'the Mystery' as described in Chapter 1 of the Tao Te Ching?", "back": "The 'Mystery' is the unified essence of the Tao, encompassing both its nameless aspect (Originator of heaven and earth) and its named aspect (Mother of all things). It is 'the gate of all that is subtle and wonderful.'"}, {"front": "What form of transcendence is implied when Taoism describes the Tao as existing 'before heaven and earth'?", "back": "This implies a foundational transcendence, where the Tao is ontologically prior to and the ultimate ground for all existence, rather than a being that resides 'above' or 'apart' from a pre-existing world."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
