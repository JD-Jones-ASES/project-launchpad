<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 8, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How many days of the week in the English-language calendar bear the names of Norse deities?", "back": "Four days."}, {"front": "The names of the months in the modern calendar are derived from which culture's deities?", "back": "The Roman gods."}, {"front": "The modern calendar represents a fusion of which three distinct religious and cultural traditions?", "back": "Roman, Christian, and Germanic cultures."}, {"front": "Which professional academic fields did J.R.R. Tolkien specialize in before writing his famous novels?", "back": "Old Norse and Old English."}, {"front": "In which specific Norse literary work did Tolkien find the names for the dwarves in *The Hobbit*?", "back": "The Poetic Edda."}, {"front": "The list of dwarf names used by Tolkien is known by what specific Norse title?", "back": "The D'vergatal."}, {"front": "The \"Catalogue of Dwarves\" (D'vergatal) is a section found within which larger Norse poem?", "back": "The Völuspá."}, {"front": "Name one dwarf from Tolkien's *The Hobbit* whose name was taken directly from the *D'vergatal*.", "back": "Thorin (or Fili, Kili, Dwalin, Óin, Glóin)."}, {"front": "Which major wizard character from Tolkien's legendarium has a name that appears in the Norse *D'vergatal*?", "back": "Gandalf."}, {"front": "According to the source text, what was Tolkien's primary motivation for borrowing Norse names?", "back": "To pay homage to a tradition he loved and studied deeply."}, {"front": "Which modern fictional genre is described as being \"saturated\" with Norse mythology and concepts?", "back": "Modern fantasy fiction."}, {"front": "Name the Norse concept of the nine distinct realms of existence often featured in modern fantasy.", "back": "The Nine Worlds."}, {"front": "What Norse cosmological symbol serves as a foundational element for much of modern fantasy fiction?", "back": "The World Tree."}, {"front": "The behavioral standard often found in fantasy literature is derived from which Norse cultural element?", "back": "The heroic warrior code."}, {"front": "What central event distinguishes the Norse worldview from all other major traditions mentioned in the text?", "back": "The death of the gods."}, {"front": "In contrast to the Norse tradition, what \"ultimate\" feature is offered by every other tradition like Buddhism or Christianity?", "back": "A form of ultimate hope."}, {"front": "What specific \"hope\" does Communism offer as an alternative to religious traditions?", "back": "A classless society."}, {"front": "Norse tradition centers on _____, the event marking the end of the gods and the world.", "back": "Ragnarök"}, {"front": "What occurs in the Norse cosmological cycle after the destruction of the world during Ragnarök?", "back": "A renewal of the world."}, {"front": "Why is the renewal after Ragnarök considered \"quietly devastating\" for the current Norse deities?", "back": "The gods now living will not survive to see it."}, {"front": "In the face of the inevitable failure of protecting powers, what was the primary Norse ethical response?", "back": "To live as if life mattered."}, {"front": "Norse ethics emphasized keeping faith with which specific group during times of hardship?", "back": "The community."}, {"front": "According to the Norse warrior code, how should an individual face their final moments?", "back": "By dying well when their time comes."}, {"front": "Which Norse text is translated as the \"Sayings of the High One\"?", "back": "The Hávamál."}, {"front": "Which Norse deity is identified as the \"High One\" in the *Hávamál*?", "back": "Odin."}, {"front": "The *Hávamál* is characterized as having a vision of life that is earthy, practical, and _____", "back": "honestly devastating."}, {"front": "According to the *Hávamál* quote, what is the first thing mentioned that must eventually die?", "back": "Cattle."}, {"front": "In the *Hávamál*'s list of things that perish, who dies after the cattle?", "back": "Kinsmen."}, {"front": "What is the final entity the *Hávamál* states will inevitably die?", "back": "One's self."}, {"front": "What is the single thing that the *Hávamál* claims \"never dies\"?", "back": "The fame of a dead man's deeds."}, {"front": "Norse Paganism is described as having an \"unflinching honesty\" about what specific subject?", "back": "The human condition."}, {"front": "In the Norse view, why does the quality of your life matter if there is no heaven or nirvana?", "back": "Because it is the only thing that belongs entirely to the individual."}, {"front": "Concept: Norse Legacy", "back": "Definition: The thorough shaping of the English-speaking world through language, literature, and philosophy."}, {"front": "Which close friend of J.R.R. Tolkien was also profoundly shaped by Norse literature?", "back": "C.S. Lewis."}, {"front": "Beyond the calendar, Norse mythology has most profoundly influenced modern _____ and popular culture.", "back": "literature"}, {"front": "Why does the source material suggest students should take the Norse tradition seriously?", "back": "Because it offers honesty instead of easy answers."}, {"front": "In Norse ethics, what three traits should a person develop to live a meaningful life?", "back": "Skills, courage, and generosity."}, {"front": "The *Hávamál* provides a vision of life that focuses on which two ultimate certainties?", "back": "Life and death."}, {"front": "How does the Norse \"shadowy afterlife\" compare to the concepts of heaven or nirvana?", "back": "It lacks the ultimate hope or salvation found in those traditions."}, {"front": "Term: D'vergatal", "back": "Definition: The \"Catalogue of Dwarves\" found in the Norse Poetic Edda."}, {"front": "The conviction that how you live matters \"absolutely\" is held in Norse Paganism despite the absence of what divine oversight?", "back": "God watching the individual."}, {"front": "The name of the world-ending battle, Ragnarök, translates to the \"death of the _____.\"", "back": "gods"}, {"front": "Tolkien's use of Norse mythology is characterized by the text as a form of _____, not theft.", "back": "homage"}, {"front": "What is the \"only thing\" that belongs entirely to a person in the Norse philosophical framework?", "back": "The quality of their life and death."}, {"front": "Which ancient Germanic tradition is credited with influencing the modern English calendar alongside Roman and Christian cultures?", "back": "Norse religion (Germanic religious culture)."}, {"front": "The Norse tradition is unique among those in the book because it places _____ at its center.", "back": "the death of the gods"}, {"front": "What core literary influence did Tolkien and C.S. Lewis share?", "back": "Norse literature."}, {"front": "Norse Paganism's philosophical depth is often neglected in favor of its more visible _____ legacy.", "back": "linguistic"}, {"front": "What specific hope does the tradition of Hinduism offer that Norse Paganism does not?", "back": "Moksha."}, {"front": "According to the Norse warrior code, what should one hope will happen after their death?", "back": "That what they did will be remembered."}, {"front": "What is the primary source text for the names of the dwarves Thorin, Fili, and Kili?", "back": "The Poetic Edda (Völuspá)."}, {"front": "Unlike the Tao, which endures, the Norse gods are destined to _____.", "back": "fail (or die)."}, {"front": "The \"Nine Worlds\" and \"World Tree\" are key elements of Norse _____ used in modern games.", "back": "cosmology"}, {"front": "What does the text claim is the \"most visible legacy\" of the Norse religion?", "back": "Linguistics (names of the days of the week)."}, {"front": "What is the tone of the *Hávamál* when discussing the inevitability of death?", "back": "Earthy, practical, and honestly devastating."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
