<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Christian doctrine that defines God as three distinct persons in one divine being?", "back": "The Trinity"}, {"front": "Identify the three distinct persons that constitute the Trinity in Christianity.", "back": "Father, Son, and Holy Spirit"}, {"front": "In the doctrine of the Trinity, what is the primary role of 'the Father'?", "back": "The creator and sustainer of all things"}, {"front": "Which person of the Trinity is identified as Jesus Christ, who entered human history?", "back": "The Son"}, {"front": "How is the 'Holy Spirit' described regarding its role for believers?", "back": "The continuing divine presence that guides and empowers believers"}, {"front": "What does Christianity mean by the claim that the Trinity consists of 'three persons'?", "back": "There is relationship, communication, and love within the single divine being"}, {"front": "The Trinity is not three separate gods, but rather three distinct centers of relationship within a single _____.", "back": "Divine reality"}, {"front": "What geometric shape is often used as an analogy for the Trinity?", "back": "A triangle"}, {"front": "Why do Christians believe that analogies for the Trinity, such as a triangle, eventually fail?", "back": "The Trinity is a mystery that exceeds full human comprehension"}, {"front": "What is the theological term for the belief that the eternal Son of God became human?", "back": "The Incarnation"}, {"front": "According to Christian doctrine, from whom was Jesus Christ born?", "back": "The Virgin Mary"}, {"front": "In the doctrine of the Incarnation, what two natures does Jesus Christ simultaneously possess?", "back": "Fully human and fully divine"}, {"front": "What does the claim 'fully human' imply about Jesus's life experiences?", "back": "He was born, grew up, grew tired, felt grief, and died"}, {"front": "Christianity maintains that the Incarnation was not a god disguising himself, but the infinite God entering _____.", "back": "Finite human life"}, {"front": "What question does the doctrine of the Incarnation seek to answer regarding God's relationship with humanity?", "back": "How far would God go to reach humanity?"}, {"front": "What is the Christian definition of 'sin'?", "back": "Any thought, word, or deed that turns a person away from God and toward self"}, {"front": "Sin is fundamentally described as an act of _____ from the source of life and goodness.", "back": "Separation"}, {"front": "Which biblical book provides the narrative for the origin of sin in humanity?", "back": "The book of Genesis"}, {"front": "What did the first humans do that introduced 'original sin' into human nature?", "back": "They chose to disobey God"}, {"front": "According to the text, what happened to human nature as a result of original sin?", "back": "A rupture was introduced that inclined humans toward selfishness, pride, and injustice"}, {"front": "To what are humans naturally inclined in the Christian view of sin?", "back": "Selfishness, pride, and injustice"}, {"front": "Why does Christianity teach that human effort alone cannot fix the problem of sin?", "back": "A doctor who is himself sick cannot heal himself"}, {"front": "In Christian theology, the solution to the weight of sin required an _____.", "back": "Outside intervention"}, {"front": "What is the central historical event in Christianity that marks the culmination of God’s intervention?", "back": "The Resurrection"}, {"front": "On which day after his burial do Christians believe Jesus rose from the dead?", "back": "The third day"}, {"front": "How do Christians describe the physical state of Jesus after the Resurrection?", "back": "A transformed physical body"}, {"front": "According to the Apostle Paul, what is the status of Christian faith if Christ was not raised?", "back": "The faith is empty"}, {"front": "The Resurrection is taken as evidence that which ultimate enemy has been defeated?", "back": "Death"}, {"front": "What separation does the Resurrection overcome in Christian theology?", "back": "The separation between God and humanity introduced by sin"}, {"front": "The Resurrection provides the basis for the Christian hope that humans can be _____.", "back": "Transformed and restored"}, {"front": "What is the theological term for God's freely given, unearned love and favor?", "back": "Grace"}, {"front": "What does 'grace' enable human beings to achieve in relation to God?", "back": "To be forgiven and restored to relationship with God"}, {"front": "What term refers to being made right with God and participating in eternal life?", "back": "Salvation"}, {"front": "How do most Christian traditions view the role of human behavior in achieving salvation?", "back": "Salvation is a gift that cannot be achieved through good behavior or religious effort"}, {"front": "In the context of salvation, what is the human response to God’s reach called?", "back": "Faith"}, {"front": "How does the text define 'faith' in the context of salvation?", "back": "A trust and reliance on what God has done in Christ"}, {"front": "What is the relationship between genuine faith and personal change in Christianity?", "back": "Genuine faith produces genuine change, but the change follows the gift rather than earning it"}, {"front": "The Trinity means there is relationship, communication, and _____ within the single divine being.", "back": "Love"}, {"front": "According to the text, the Father is the creator and _____ of all things.", "back": "Sustainer"}, {"front": "In Christianity, Jesus was not a god visiting as an observer, but God becoming _____.", "back": "Human"}, {"front": "The doctrine of the Incarnation claims Jesus was fully human and fully _____ at the same time.", "back": "Divine"}, {"front": "What specifically introduced a 'rupture' into human nature?", "back": "Original sin"}, {"front": "The entire creation is said to 'groan' under the weight of _____.", "back": "Sin"}, {"front": "Christians believe Jesus rose not as a ghost or vision, but in a physical form that was _____.", "back": "Transformed"}, {"front": "The Trinity teaches that God is not a solitary, _____ being.", "back": "Self-contained"}, {"front": "What is the 'startling claim' of Christian theology regarding God's existence?", "back": "God became human"}, {"front": "According to the source, what does sin turn a person away from?", "back": "God"}, {"front": "According to the source, what does sin turn a person toward?", "back": "Self"}, {"front": "Which event is considered the 'central event in all of history' for Christians?", "back": "The Resurrection"}, {"front": "Does Christianity teach that humans are people who merely make mistakes?", "back": "No; they are viewed as people inclined toward selfishness and pride due to a ruptured nature"}, {"front": "According to the text, what is the primary 'outside intervention' that addresses the problem of sin?", "back": "The Resurrection of Jesus Christ"}, {"front": "Salvation involves the participation in _____ life.", "back": "Eternal"}, {"front": "Concept: The Trinity", "back": "Definition: The Christian doctrine that God is three distinct persons who constitute one divine being."}, {"front": "Concept: The Incarnation", "back": "Definition: The belief that the eternal Son of God took on a fully human nature in Jesus Christ."}, {"front": "Concept: Grace", "back": "Definition: God's freely given, unearned love and favor that enables forgiveness and restoration."}, {"front": "In the triangle analogy of the Trinity, what do the 'three sides' represent?", "back": "The three distinct persons (Father, Son, and Holy Spirit)"}, {"front": "What is the significance of the Virgin Mary in the doctrine of the Incarnation?", "back": "She is the woman through whom the Son of God was born into human nature"}, {"front": "Why is the Trinity referred to as a 'mystery' in Christian tradition?", "back": "It is a concept that exceeds full human comprehension"}, {"front": "What does the text suggest is the result of humans 'turning toward self'?", "back": "Separation from the source of life and goodness (Sin)"}, {"front": "According to Christian thought, what comes first: the gift of grace or the change in behavior?", "back": "The gift of grace"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
