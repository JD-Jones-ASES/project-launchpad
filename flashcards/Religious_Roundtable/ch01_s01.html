<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Christian doctrine that defines God as three distinct persons in one divine being?", "back": "The Trinity."}, {"front": "Name the three distinct persons that constitute the Christian Trinity.", "back": "The Father, the Son, and the Holy Spirit."}, {"front": "In the Trinity, what are the primary roles of the Father?", "back": "The creator and sustainer of all things."}, {"front": "Which person of the Trinity is identified as Jesus Christ?", "back": "The Son."}, {"front": "How is the Holy Spirit's role described in relation to the life of a believer?", "back": "The continuing divine presence that guides and empowers believers."}, {"front": "What does the term 'three persons' imply about the internal life of the single divine being?", "back": "It signifies that within God there is relationship, communication, and love."}, {"front": "What common geometric shape is used as an analogy for the Trinity's 'three-in-one' nature?", "back": "A triangle."}, {"front": "How do Christians categorize the Trinity regarding human understanding?", "back": "It is considered a mystery that exceeds full human comprehension."}, {"front": "According to the text, what is the 'most startling claim' in Christian theology?", "back": "The doctrine of the Incarnation, or that God became human."}, {"front": "Define the Christian doctrine of the Incarnation.", "back": "The belief that the eternal Son of God took on a fully human nature in Jesus Christ."}, {"front": "Who is the mother of Jesus in the context of the Incarnation?", "back": "The Virgin Mary."}, {"front": "In the person of Jesus, how do Christians describe the coexistence of human and divine natures?", "back": "He is believed to be fully human and fully divine at the same time."}, {"front": "What does the Incarnation imply about God's presence on earth compared to a mere observer?", "back": "God did not just visit or disguise Himself but actually entered finite human life."}, {"front": "According to Christianity, what was the primary purpose of the Incarnation?", "back": "To show that God would go 'all the way' to reach humanity."}, {"front": "How is 'sin' defined in Christian theology?", "back": "Any thought, word, or deed that turns a person away from God and toward self."}, {"front": "Sin is fundamentally described as an act of _____ from the source of life and goodness.", "back": "Separation"}, {"front": "Which biblical book contains the narrative of the first humans choosing to disobey God?", "back": "The book of Genesis."}, {"front": "What is 'original sin' in the context of human nature?", "back": "A rupture introduced into human nature that makes people inclined toward selfishness and pride."}, {"front": "According to the Christian view, why can humans not fix the problem of sin through their own effort?", "back": "A rupture in human nature requires an outside intervention, similar to how a sick doctor cannot heal himself."}, {"front": "What event is considered the central historical event in all of Christianity?", "back": "The Resurrection."}, {"front": "On what day after his burial do Christians believe Jesus rose from the dead?", "back": "The third day."}, {"front": "How does the text distinguish Jesus' resurrected body from a ghost or vision?", "back": "It was a transformed physical body."}, {"front": "What did the Apostle Paul argue would be the state of Christian faith if Christ had not been raised?", "back": "The faith would be empty."}, {"front": "What is the theological significance of the Resurrection regarding death?", "back": "It is taken as evidence that death itself has been defeated."}, {"front": "Define 'grace' as it is understood in the Christian tradition.", "back": "God's freely given, unearned love and favor."}, {"front": "What does grace enable for human beings in their relationship with God?", "back": "It enables humans to be forgiven and restored to relationship with God."}, {"front": "What is the Christian term for being 'made right with God' and participating in eternal life?", "back": "Salvation."}, {"front": "Why do most Christian traditions teach that salvation cannot be achieved through good behavior?", "back": "It is viewed as a gift that cannot be earned by human effort."}, {"front": "In response to God's grace, what is the expected human reaction known as 'faith'?", "back": "A trust and reliance on what God has done in Christ."}, {"front": "According to the text, what is the relationship between genuine faith and personal change?", "back": "Genuine faith produces genuine change, but the change follows the gift of grace."}, {"front": "Trinity: God is not a solitary, self-contained being but three distinct _____.", "back": "Persons"}, {"front": "The three persons of the Trinity are not three gods, but centers of relationship within a _____.", "back": "Single divine reality"}, {"front": "How does the text clarify that the Trinity is not 'three masks' worn by one actor?", "back": "They are three distinct centers of relationship, not merely different roles."}, {"front": "What specific human limitations did Jesus experience during the Incarnation?", "back": "He was born, grew up, got tired, felt grief, and died."}, {"front": "Christianity teaches that humans are not just people who make mistakes, but people inclined toward _____.", "back": "Injustice (or selfishness and pride)"}, {"front": "What is the 'outside intervention' that Christians believe was required to rescue humanity?", "back": "The life, death, and Resurrection of Jesus Christ."}, {"front": "The Resurrection provides the basis for the Christian hope that humans can be _____.", "back": "Transformed and restored"}, {"front": "Cloze: In Christian theology, _____ precedes human change and behavior in the process of salvation.", "back": "Grace (or the gift)"}, {"front": "Term: Trinity", "back": "The doctrine that God is three distinct persons who constitute one divine being."}, {"front": "Term: Incarnation", "back": "The belief that the eternal Son of God took on a fully human nature."}, {"front": "Term: Salvation", "back": "The process of being made right with God and participating in eternal life."}, {"front": "Concept: The 'Sick Doctor'", "back": "An analogy explaining why humans cannot save themselves from the rupture of sin."}, {"front": "Concept: Transformed Physical Body", "back": "The nature of Jesus' physical state after the Resurrection."}, {"front": "How does the doctrine of the Trinity challenge the historical view of God as a solitary being?", "back": "It presents God as a being containing internal relationship and communication."}, {"front": "What role does the Virgin Mary play in the doctrine of the Incarnation?", "back": "She is the woman through whom the Son of God was born into humanity."}, {"front": "Why is the Resurrection considered more than just a 'comforting story' about the afterlife?", "back": "It is viewed as the central historical event that restored the connection between God and humanity."}, {"front": "In the triangle analogy of the Trinity, what does the 'one shape' represent?", "back": "The single divine being."}, {"front": "What is the consequence of sin regarding one's orientation toward self and God?", "back": "It turns a person away from God and toward self."}, {"front": "According to the text, what 'groans' under the weight of human sin?", "back": "The entire creation."}, {"front": "In Christian belief, how is the 'gift' of salvation related to human behavior?", "back": "The gift is not earned by behavior, though behavior changes as a result of the gift."}, {"front": "What specific phrase does the text use to describe the impact of original sin on human nature?", "back": "A rupture."}, {"front": "Who entered human history as the person of Jesus?", "back": "The Son."}, {"front": "What characterizes the Holy Spirit's presence in the world today, according to the Trinity?", "back": "It is a continuing divine presence that empowers believers."}, {"front": "Why is the claim of Jesus being fully human and fully divine described as 'demanding'?", "back": "It has generated centuries of philosophical debate and challenges standard logic."}, {"front": "The Christian definition of God emphasizes that He is not _____, but relational.", "back": "Self-contained (or solitary)"}, {"front": "Cloze: Christianity teaches that _____ was a choice made by the very first humans to disobey God.", "back": "Original sin"}, {"front": "Cloze: Salvation is described as a _____, rather than something earned through religious effort.", "back": "Gift"}, {"front": "What does the text suggest is the relationship between the three persons of the Trinity and 'Gods'?", "back": "They are not three separate gods."}, {"front": "According to the Apostle Paul, the Resurrection is the reason Christian faith is not _____.", "back": "Empty"}, {"front": "What is the primary obstacle between God and humanity that the Resurrection is said to overcome?", "back": "The separation introduced by sin."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
