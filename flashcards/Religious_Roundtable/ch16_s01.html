<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 16, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is unique about Buddhism's starting point compared to many other religious or philosophical traditions?", "back": "Buddhism begins not with a creation story, a god, or a moral code, but with a diagnosis: life involves suffering.", "id": "fc01"}, {"front": "What is the Pali word 'dukkha,' and what is its richer meaning beyond simple 'suffering'?", "back": "Dukkha means suffering, unsatisfactoriness, or the pervasive unsatisfactoriness of conditioned existence. It includes pain, grief, loss, and the subtle dissatisfaction that comes from impermanence.", "id": "fc02"}, {"front": "What is the First Noble Truth of Buddhism?", "back": "The First Noble Truth states that dukkha (suffering/unsatisfactoriness) exists.", "id": "fc03"}, {"front": "What is 'tanha,' and what does it represent in Buddhist teaching?", "back": "Tanha is a Pali word meaning craving or thirst, which Buddhism identifies as the cause of dukkha.", "id": "fc04"}, {"front": "What is the Second Noble Truth of Buddhism?", "back": "The Second Noble Truth identifies the cause of dukkha as tanha, or craving.", "id": "fc05"}, {"front": "Explain the specific kind of desire (tanha) that Buddhism identifies as the cause of suffering.", "back": "Tanha is a clinging, grasping quality of mind that seeks permanent satisfaction. It's not general desire, but the attempt to hold onto what cannot be held, leading to constant dissatisfaction.", "id": "fc06"}, {"front": "How does Buddhism view the ordinary mind's perception of the world, and how does this relate to suffering?", "back": "The ordinary mind perceives the world as fixed things we can permanently possess, which is a distortion. This leads to suffering because reality is impermanent (anicca) and lacks a fixed, permanent self (anatta).", "id": "fc07"}, {"front": "What do the terms 'anicca' and 'anatta' signify in Buddhism?", "back": "Anicca means impermanence, and anatta means without a fixed, permanent self. They describe the fundamental nature of reality that craving attempts to deny.", "id": "fc08"}, {"front": "What is the Third Noble Truth of Buddhism, and what revolutionary claim does it make?", "back": "The Third Noble Truth states that cessation of suffering is possible, claiming that suffering is not the permanent condition of humanity.", "id": "fc09"}, {"front": "Define 'nirvana' (or 'nibbana') and clarify what it is NOT.", "back": "Nirvana is the Buddhist goal of liberation, 'the blowing out' of the fires of craving, hatred, and delusion. It is not oblivion or annihilation of the person, but the end of ego-driven patterns that generate suffering.", "id": "fc10"}, {"front": "How is nirvana described, given that it's said to be beyond ordinary language?", "back": "Nirvana is described as a state of clarity, freedom, and peace. The Buddha called it the 'highest happiness,' yet also as beyond categories of existence and non-existence.", "id": "fc11"}, {"front": "What is the Fourth Noble Truth of Buddhism?", "back": "The Fourth Noble Truth prescribes the path to the cessation of suffering: the Noble Eightfold Path.", "id": "fc12"}, {"front": "What is the purpose and nature of the Noble Eightfold Path?", "back": "The Noble Eightfold Path is a systematic, practical program for transforming the whole person, covering thoughts, speech, actions, work, and spiritual practice. It is a path of sustained, disciplined practice.", "id": "fc13"}, {"front": "Name the eight factors of the Noble Eightfold Path.", "back": "Right understanding, right intention, right speech, right action, right livelihood, right effort, right mindfulness, and right concentration.", "id": "fc14"}, {"front": "According to the Dhammapada, what is central to a person's life and actions?", "back": "The Dhammapada states that 'All that we are is the result of what we have thought: it is founded on our thoughts, it is made up of our thoughts.' The mind is the forerunner of all actions.", "id": "fc15"}, {"front": "According to the Dhammapada, what follows a person who speaks or acts with an evil thought, versus a pure thought?", "back": "Pain follows evil thoughts, 'as the wheel follows the foot of the ox.' Happiness follows pure thoughts, 'like a shadow that never leaves him.'", "id": "fc16"}, {"front": "How does the Dhammapada explain the cessation of hatred?", "back": "Hatred does not cease by hatred at any time; hatred ceases by love. Harbouring thoughts of being abused or wronged prevents hatred from ceasing.", "id": "fc17"}, {"front": "What does the word 'Dhammapada' mean, and what type of text is it?", "back": "Dhammapada means 'path of the dhamma' (the teaching). It is a widely read collection of 423 verses attributed to the Buddha, often memorized and studied.", "id": "fc18"}, {"front": "Why is Buddhism considered a 'path' rather than a destination achieved by sudden insight alone?", "back": "Buddhism emphasizes liberation as the result of sustained, disciplined practice and transformation across all dimensions of life, as outlined in the Noble Eightfold Path, rather than a single event or conversion.", "id": "fc19"}, {"front": "In what specific way is Buddhism 'unusual' among world religions according to the text?", "back": "It begins not with a creation story, a god, or a moral code, but with a diagnosis: life as ordinarily lived involves suffering (dukkha).", "id": "fc20"}, {"front": "What key terms are associated with the impermanence and non-self nature of reality in Buddhism?", "back": "Anicca (impermanence) and Anatta (no fixed, permanent self).", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
