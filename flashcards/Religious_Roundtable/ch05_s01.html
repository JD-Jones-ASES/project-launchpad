<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the starting point of Buddhist thought, according to the text?", "back": "Buddhism begins with a diagnosis of human experience: life is marked by pervasive unsatisfactoriness."}, {"front": "Define 'dukkha' in Buddhism.", "back": "Dukkha is a Pali word often translated as suffering, but more precisely means the unsatisfactory, unstable quality of all conditioned experience, ranging from obvious pain to subtle dissatisfaction."}, {"front": "What are the Three Marks of Existence in Buddhism?", "back": "The Three Marks of Existence are dukkha (unsatisfactoriness/suffering), anicca (impermanence), and anatta (non-self)."}, {"front": "Explain 'anicca'.", "back": "Anicca means impermanence, the Buddhist teaching that all conditioned phenomena are constantly changing and nothing in the physical or mental world is permanent or fixed."}, {"front": "What is 'anatta' and why is it considered radical?", "back": "Anatta means non-self, the teaching that there is no permanent, unchanging self or soul. It's radical because it posits that 'what we call the self' is a dynamic process, not a fixed entity."}, {"front": "List the Four Noble Truths.", "back": "1. Dukkha: Life involves suffering and unsatisfactoriness.\n2. Samudaya: Suffering arises from tanha (craving).\n3. Nirodha: There is a state where suffering ceases (nirvana).\n4. Magga: The path to cessation of suffering is the Noble Eightfold Path."}, {"front": "What is 'Samudaya' and what does it identify as the root of suffering?", "back": "Samudaya is the second Noble Truth, meaning 'arising'. It states that suffering arises from tanha (craving or thirst)."}, {"front": "Define 'tanha' and explain its role.", "back": "Tanha is craving or thirst, identified as the root cause of suffering. It includes craving for pleasure, existence, and non-existence, stemming from a mind that demands permanence when things are not permanent."}, {"front": "What is 'Nirodha' and what state does it refer to?", "back": "Nirodha is the third Noble Truth, meaning 'cessation'. It refers to nirvana, a state in which suffering ceases when craving is extinguished."}, {"front": "What is 'Magga'?", "back": "Magga is the fourth Noble Truth, meaning 'path'. It refers to the Noble Eightfold Path as the way to the cessation of suffering."}, {"front": "What is the purpose of the Noble Eightfold Path?", "back": "The Noble Eightfold Path is the Buddha's prescription for living, designed to uproot craving and cultivate the clarity and compassion that lead to liberation."}, {"front": "What are the three main training areas into which the Noble Eightfold Path factors are grouped?", "back": "The three training areas are Wisdom, Ethics, and Cultivation."}, {"front": "Which factors of the Noble Eightfold Path belong to the 'Wisdom' training area?", "back": "Right View (understanding the Four Noble Truths and reality) and Right Intention (cultivating renunciation, goodwill, and non-harm)."}, {"front": "Which factors of the Noble Eightfold Path belong to the 'Ethics' training area?", "back": "Right Speech (speaking truthfully, kindly, helpfully), Right Action (acting without harming oneself or others), and Right Livelihood (earning a living without causing harm)."}, {"front": "Which factors of the Noble Eightfold Path belong to the 'Cultivation' training area?", "back": "Right Effort (cultivating wholesome states), Right Mindfulness (maintaining present awareness), and Right Concentration (developing deep meditative focus)."}, {"front": "Define 'karma' in Buddhism.", "back": "Karma refers to action and its consequence. Actions motivated by greed, hatred, or delusion generate karma that perpetuates the cycle of samsara."}, {"front": "Define 'samsara' in Buddhism.", "back": "Samsara is the cycle of death and rebirth."}, {"front": "How do actions influence karma and samsara?", "back": "Actions motivated by greed, hatred, or delusion generate karma that perpetuates the cycle of samsara. Actions motivated by wisdom and compassion move one toward liberation from samsara."}, {"front": "What is the ultimate goal for Buddhists regarding samsara and nirvana?", "back": "The ultimate goal is to escape samsara altogether, not just to have a better next life, but to reach the unconditioned freedom of nirvana."}, {"front": "What is meant by the Buddha's 'noble silence'?", "back": "The Buddha's 'noble silence' refers to his refusal to answer certain metaphysical questions (e.g., 'Is the universe eternal?'), deeming them unhelpful for liberation."}, {"front": "What analogy did the Buddha use to explain his 'noble silence'?", "back": "He compared himself to a doctor: a patient with an arrow in his chest needs the arrow removed, not a philosophical lecture on its origin. The focus is on liberation from suffering."}, {"front": "Why did the Buddha decline to answer certain metaphysical questions?", "back": "He declined because debating these questions gets in the way of the primary goal of liberation from suffering, which is the most pressing concern."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
