<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What core diagnostic framework remains central to all three major traditions of Buddhism?", "back": "The Four Noble Truths."}, {"front": "What is the meaning of the Sanskrit term 'yanas' in the context of Buddhist traditions?", "back": "Vehicles."}, {"front": "Which Buddhist tradition is considered the oldest surviving tradition?", "back": "Theravada."}, {"front": "What does the term 'Theravada' literally translate to?", "back": "The Teaching of the Elders."}, {"front": "In which geographical region is Theravada Buddhism primarily dominant?", "back": "Southeast Asia."}, {"front": "Theravada Buddhism holds most closely to which specific collection of scriptures?", "back": "The Pali Canon."}, {"front": "What lifestyle does Theravada Buddhism emphasize as the primary path to liberation?", "back": "Monastic life."}, {"front": "Term: Arhat", "back": "Definition: The ideal figure in Theravada who achieves nirvana for herself through rigorous practice."}, {"front": "How do critics sometimes describe the Theravada tradition?", "back": "The narrow vehicle."}, {"front": "Name three Southeast Asian countries where Theravada Buddhism is a dominant tradition.", "back": "Sri Lanka, Thailand, and Myanmar (Burma)."}, {"front": "Besides Sri Lanka, Thailand, and Myanmar, which two other countries are centers for Theravada?", "back": "Laos and Cambodia."}, {"front": "What does the term 'Mahayana' literally translate to?", "back": "The Great Vehicle."}, {"front": "Approximately how many centuries after the Buddha did Mahayana Buddhism emerge in India?", "back": "Five centuries."}, {"front": "Into which two major East Asian countries did Mahayana Buddhism spread north and east?", "back": "China and Japan."}, {"front": "Besides China and Japan, name two other countries where Mahayana Buddhism became established.", "back": "Korea and Vietnam."}, {"front": "What is the central innovation or ideal of Mahayana Buddhism?", "back": "The bodhisattva ideal."}, {"front": "In Mahayana Buddhism, a being who vows to attain enlightenment for the sake of all sentient beings is called a _____.", "back": "bodhisattva"}, {"front": "What does a bodhisattva willingly delay out of compassion?", "back": "Final nirvana."}, {"front": "Mahayana Buddhism 'democratizes' salvation by insisting that _____ is available to all, not just monastics.", "back": "buddhahood"}, {"front": "Why is the Mahayana tradition described as 'great' or expansive?", "back": "It insists that enlightenment is available to everyone rather than a select few."}, {"front": "What does the term 'Vajrayana' literally translate to?", "back": "The Diamond Vehicle."}, {"front": "What are two alternative names for Vajrayana Buddhism?", "back": "Tibetan Buddhism or Tantric Buddhism."}, {"front": "From which century CE onward did Vajrayana Buddhism develop in India and Tibet?", "back": "The 5th century CE."}, {"front": "Vajrayana Buddhism incorporates the use of _____, which are sacred geometric diagrams.", "back": "mandalas"}, {"front": "What is the term for a qualified teacher who provides guidance in the Vajrayana tradition?", "back": "Lama."}, {"front": "Who is the most globally recognized figure and spiritual leader of the Vajrayana tradition?", "back": "The Dalai Lama."}, {"front": "According to Vajrayana teachings, how quickly is liberation possible with the right methods?", "back": "In a single lifetime."}, {"front": "What unique depth does Vajrayana contribute to the Buddhist 'productive tension'?", "back": "Mystical depth regarding the mind's capacity for awakening."}, {"front": "What essential quality does Mahayana Buddhism emphasize to 'expand the circle of who belongs'?", "back": "Compassion."}, {"front": "How does the rigor of the Theravada tradition benefit the overall Buddhist faith?", "back": "It keeps the teaching close to its origins."}, {"front": "In the Mahayana tradition, where does the bodhisattva choose to remain until all beings are freed?", "back": "The cycle of rebirth."}, {"front": "What type of practices involve the elaborate use of sacred imagery and diagrams in Vajrayana?", "back": "Visualization practices and mandalas."}, {"front": "Which tradition is defined by its adherence to the 'Teaching of the Elders'?", "back": "Theravada."}, {"front": "While traditions change in emphasis and practice, what core 'diagnosis' remains central to all?", "back": "The Four Noble Truths."}, {"front": "How does the arhat's goal in Theravada differ from the bodhisattva's goal in Mahayana?", "back": "The arhat seeks personal liberation, while the bodhisattva seeks liberation for all beings."}, {"front": "Which tradition is most likely to be practiced in Vietnam?", "back": "Mahayana Buddhism."}, {"front": "Which tradition is most likely to be practiced in Sri Lanka?", "back": "Theravada Buddhism."}, {"front": "In Vajrayana, what is the historically political as well as spiritual role of the Dalai Lama?", "back": "Leader of Tibet."}, {"front": "The bodhisattva ideal is the central innovation of which Buddhist vehicle?", "back": "Mahayana Buddhism."}, {"front": "Concept: Mandalas", "back": "Definition: Sacred geometric diagrams used as ritual and visualization tools in Vajrayana Buddhism."}, {"front": "Which vehicle was the last to develop chronologically according to the text?", "back": "Vajrayana Buddhism."}, {"front": "Mahayana Buddhism spread primarily north and east from which country?", "back": "India."}, {"front": "Which tradition rejects the critical framing of being a 'narrow vehicle'?", "back": "Theravada."}, {"front": "What specific ritualistic element is a hallmark of Vajrayana compared to the other two vehicles?", "back": "Elaborate ritual and visualization practices."}, {"front": "The Dalai Lama is the spiritual leader of which specific branch of Buddhism?", "back": "Vajrayana (Tibetan) Buddhism."}, {"front": "Which tradition emphasizes that the path is 'precise, demanding, and genuinely transforming'?", "back": "Theravada."}, {"front": "In Mahayana, the 'Great Vehicle' is so named because it _____ salvation.", "back": "democratizes"}, {"front": "Vajrayana developed in India and Tibet starting approximately in the _____ century CE.", "back": "5th"}, {"front": "Which tradition is described as holding the core teachings closest to their original form?", "back": "Theravada."}, {"front": "What is the primary motivation for a bodhisattva to remain in the cycle of rebirth?", "back": "To help others reach liberation."}, {"front": "Which vehicle incorporates the guidance of a 'lama' as a central component of practice?", "back": "Vajrayana."}, {"front": "Geographically, where did all three major vehicles of Buddhism originate?", "back": "India."}, {"front": "Theravada is the dominant tradition in which Southeast Asian country known for its historic name Burma?", "back": "Myanmar."}, {"front": "Does Mahayana Buddhism restrict the possibility of buddhahood to monastics?", "back": "No, it insists buddhahood is available to all."}, {"front": "What is the collective purpose of the three traditions according to the text's conclusion?", "back": "To hold each other in productive tension by illuminating different aspects of the faith."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
