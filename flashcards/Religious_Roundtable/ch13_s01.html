<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 13, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the narrow definition of 'Torah' in Judaism?", "back": "In its narrowest sense, the Torah refers to the five books of Moses (Genesis through Deuteronomy).", "id": "fc01"}, {"front": "What is the broader meaning of 'Torah'?", "back": "In a broader sense, 'Torah' refers to the entire body of divine teaching given to Israel.", "id": "fc02"}, {"front": "What does the Hebrew word 'Torah' primarily mean?", "back": "'Torah' in Hebrew means 'instruction' or 'teaching.'", "id": "fc03"}, {"front": "Describe the concept of the 'Oral Torah.'", "back": "The Oral Torah is the interpretive tradition that, according to the rabbis, was given to Moses alongside the Written Torah at Sinai to make its teachings applicable across generations.", "id": "fc04"}, {"front": "What were the two main texts into which the Oral Torah was eventually written down and expanded?", "back": "The Oral Torah was first written down as the Mishnah (c. 200 CE) and later expanded and debated into the Talmud.", "id": "fc05"}, {"front": "What is the Mishnah?", "back": "The Mishnah is the first written compilation of the Oral Torah, codified around 200 CE, which records rabbinic discussions on Jewish law.", "id": "fc06"}, {"front": "What is the Talmud?", "back": "The Talmud is a vast body of Jewish civil and ceremonial law and legend, comprising the Mishnah and rabbinical commentaries (Gemara) on it.", "id": "fc07"}, {"front": "What is 'lectio continua' in the context of Jewish practice?", "back": "'Lectio continua,' meaning 'continuous reading,' is the synagogue practice of publicly reading the entire Torah from beginning to end over the course of a year.", "id": "fc08"}, {"front": "Beyond being merely scripture, what multiple roles does the Torah serve for Judaism?", "back": "The Torah is Judaism's constitution, history, law code, poetry, and love story with God all at once.", "id": "fc09"}, {"front": "How does the text describe a devout Jew's experience of reading Torah?", "back": "For a devout Jew, reading Torah is less like reading a legal code and more like listening to a parent explain the family's deepest story, revealing who God is, who you are, and how the universe works.", "id": "fc10"}, {"front": "How frequently does the word 'Torah' appear in the Hebrew Bible?", "back": "The word 'Torah' appears more than two hundred times in the Hebrew Bible, making it the most common word for scripture.", "id": "fc11"}, {"front": "What is notable about Psalm 119 regarding the Torah?", "back": "Psalm 119 is the longest chapter in the Bible (176 verses), and every single verse is a meditation on the goodness and importance of Torah.", "id": "fc12"}, {"front": "How is the Jewish relationship to scripture characterized, beyond intellectual understanding?", "back": "The Jewish relationship to scripture is devotional and even romantic; rabbis compared the relationship between Israel and the Torah to a marriage.", "id": "fc13"}, {"front": "What profound contribution does the doctrine of the Oral Torah make to the theology of scripture?", "back": "It posits that interpretation is not a threat to revelation but rather an integral part of revelation itself, implying that the text is not self-interpreting.", "id": "fc14"}, {"front": "What is the purpose of the Oral Torah in relation to the Written Torah?", "back": "The Oral Torah's purpose is to provide the interpretive tradition necessary to make the written words of the Torah applicable to every generation in every situation.", "id": "fc15"}, {"front": "How has the 'lectio continua' practice impacted Jewish communal life?", "back": "It has kept the Torah text at the living center of Jewish communal life for more than two thousand years.", "id": "fc16"}, {"front": "What festival marks the conclusion of the annual Torah reading cycle, and what happens during it?", "back": "The festival is Simchat Torah ('Rejoicing in the Torah'), where the last words of Deuteronomy are read, and the scroll is immediately rolled back to the first words of Genesis, restarting the cycle.", "id": "fc17"}, {"front": "What is the significance of immediately restarting the Torah reading cycle on Simchat Torah?", "back": "It signifies that 'the story never ends' and that the community continually brings new eyes, questions, and life to the timeless words.", "id": "fc18"}, {"front": "How does Judaism view the Torah as a 'relationship'?", "back": "The Jewish tradition views the Torah not merely as information about God, but as a medium through which God speaks personally to each reader.", "id": "fc19"}, {"front": "According to Psalm 119, what are some of the qualities or roles attributed to the Torah (God's word/law)?", "back": "Psalm 119 calls the Torah a lamp, a light, a treasure, a delight, a counselor, a comfort in affliction, and something that provides understanding and wisdom.", "id": "fc20"}, {"front": "Explain the interconnectedness of the Written Torah and the Oral Torah.", "back": "The Written Torah provides the core divine instruction, while the Oral Torah provides the necessary interpretation and application to keep the Written Torah relevant and understandable across all generations and contexts.", "id": "fc21"}, {"front": "Why does the text state that calling the Torah a 'holy book' in the ordinary sense 'almost miss[es] the point'?", "back": "Because the Torah is far more comprehensive than a typical holy book; it encompasses Judaism's constitution, history, law, poetry, and its relationship with God, acting as a foundational guide for life, not just a set of religious texts.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
