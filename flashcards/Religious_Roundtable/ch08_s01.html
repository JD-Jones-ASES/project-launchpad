<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 8, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the name of the immense ash tree at the center of Norse cosmology?", "back": "Yggdrasil"}, {"front": "What does the name 'Yggdrasil' literally mean?", "back": "Odin's horse"}, {"front": "To what does the 'horse' in the name Yggdrasil refer?", "back": "The gallows Odin 'rode' during his self-sacrifice."}, {"front": "According to Norse tradition, how many distinct realms make up the cosmos?", "back": "Nine"}, {"front": "Which realm serves as the home of the Æsir gods?", "back": "Ásgarðr (Asgard)"}, {"front": "Which realm is designated for the giants?", "back": "Jötunheimr"}, {"front": "Which realm is associated with ice and death?", "back": "Niflheimr"}, {"front": "What animal perches in the branches of Yggdrasil?", "back": "Eagles"}, {"front": "What creatures are known to gnaw at the roots of Yggdrasil?", "back": "Serpents"}, {"front": "What are the two primary families of Norse gods?", "back": "The Æsir and the Vanir"}, {"front": "Name the Norse god associated with wisdom, war, and death.", "back": "Odin"}, {"front": "Who is the Norse god of thunder and the protector of humanity?", "back": "Thor (Þórr)"}, {"front": "Which goddess is associated with marriage and foresight within the Æsir family?", "back": "Frigg"}, {"front": "Name the Norse god of law and justice.", "back": "Týr"}, {"front": "Which divine lineage is primarily associated with the earth, fertility, and the sea?", "back": "The Vanir"}, {"front": "Name the Vanir god of fertility and prosperity.", "back": "Freyr"}, {"front": "Which Vanir goddess is linked to love, beauty, and battle?", "back": "Freyja"}, {"front": "Name the Vanir god of the sea and fishing.", "back": "Njörðr"}, {"front": "What event led the Æsir and Vanir to live together and exchange hostages?", "back": "A great war between the two divine families."}, {"front": "In what specific way are the Æsir distinct from gods in many other traditions regarding their longevity?", "back": "They are mortal and will die at Ragnarök."}, {"front": "How is the figure Loki described in relation to the gods and giants?", "back": "A complex figure who is neither fully god nor fully giant."}, {"front": "Who are the three female beings responsible for weaving the destiny of all beings?", "back": "The Norns"}, {"front": "Where do the Norns dwell?", "back": "At the Well of Urðr beneath Yggdrasil."}, {"front": "What does the name of the Norn 'Urðr' translate to?", "back": "What Has Been"}, {"front": "What does the name of the Norn 'Verðandi' translate to?", "back": "What Is Becoming"}, {"front": "What does the name of the Norn 'Skuld' translate to?", "back": "What Shall Be"}, {"front": "What are the two terms used to describe fate in Norse tradition?", "back": "Wyrd or orlög"}, {"front": "How is Norse fate (wyrd) best understood relative to human agency?", "back": "As a pattern that unfolds through one's choices and encounters."}, {"front": "What is the name for the prophesied destruction and renewal of the Norse cosmos?", "back": "Ragnarök"}, {"front": "According to prophecy, which creature will swallow Odin at Ragnarök?", "back": "The wolf Fenrir"}, {"front": "Which monster does Thor kill at Ragnarök before dying from its venom?", "back": "The Midgard Serpent"}, {"front": "What physical change happens to the world immediately following the great battle of Ragnarök?", "back": "The world sinks into the sea."}, {"front": "What follows the destruction of the world in the Ragnarök cycle?", "back": "The world rises again, green and renewed."}, {"front": "Who will inhabit the remade world after Ragnarök?", "back": "A new generation of surviving gods."}, {"front": "How does Odin's knowledge of his inevitable death at Ragnarök affect his actions?", "back": "He spends his life preparing for the battle despite knowing he will lose."}, {"front": "What is the central 'measure of who you are' in the Norse heroic ideal?", "back": "How you face what cannot be avoided."}, {"front": "What is the name of Odin's great hall in Ásgarðr for the battle-dead?", "back": "Valhalla"}, {"front": "Who are the warrior women who serve Odin and collect the dead from battle?", "back": "Valkyries"}, {"front": "What is the ultimate purpose of the warriors gathered in Valhalla?", "back": "To feast and fight until they join Odin at the final battle of Ragnarök."}, {"front": "Where do the half of the battle-dead who do not go to Valhalla reside?", "back": "Fólkvangr (Freyja's hall)"}, {"front": "Where do those who die of illness or old age go in the Norse afterlife?", "back": "Hel"}, {"front": "Who rules the realm of Hel?", "back": "A goddess also named Hel."}, {"front": "How is the realm of Hel described physically?", "back": "A dim, shadowy place of quiet, pale existence."}, {"front": "What is the primary concern of the Norse afterlife system?", "back": "The nature or 'kind' of death one died."}, {"front": "Concept: The Courage of the Doomed", "back": "The philosophical conviction that courage is defined by fighting for what is right even when defeat is certain."}, {"front": "In Norse cosmology, what does the survival of the world equilibrium depend upon?", "back": "The survival of Yggdrasil."}, {"front": "The _____ are the primary divine family dwelling in Ásgarðr.", "back": "Æsir"}, {"front": "The Norns weave the threads of destiny at the ____ of Urðr.", "back": "Well"}, {"front": "Unlike many religions, Norse mythology does not promise eternal _____ even for the gods.", "back": "security"}, {"front": "What virtue is rooted in the conviction of how one faces the inevitable in Norse tradition?", "back": "Courage"}, {"front": "The three roots of Yggdrasil reach into which three realms?", "back": "Ásgarðr, Jötunheimr, and Niflheimr."}, {"front": "Which Vanir deity is specifically associated with sea and fishing?", "back": "Njörðr"}, {"front": "At Ragnarök, Thor dies specifically from _____ after killing the Midgard Serpent.", "back": "venom"}, {"front": "Is Hel considered a place of punishment in Norse mythology?", "back": "No, it is a place for those who died of non-combat causes like age or illness."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
