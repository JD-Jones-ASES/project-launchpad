<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 13, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Jewish understanding of the Torah's origin and nature?", "back": "The Torah is a revelation given at Sinai to Moses and Israel, a historical document interpreted across all subsequent time."}, {"front": "In Judaism, how does the concept of 'Oral Torah' relate to the Written Torah?", "back": "The tradition insists the Oral Torah was also given at Sinai, arriving together with the written text, rather than being human opinion added later."}, {"front": "What analogy is used to describe Jewish scripture, and what does it imply?", "back": "Scripture is like a river, implying it has a definite source but flows and is interpreted through every generation."}, {"front": "What does 'shruti' mean in Hinduism, and what texts are primarily considered shruti?", "back": "'Shruti' means 'heard.' The Vedas and Upanishads are considered shruti, received by seers in timeless meditation."}, {"front": "How does the Hindu understanding of its sacred texts' origin (Vedas/Upanishads) differ from the Jewish understanding of the Torah?", "back": "Hindu texts (shruti) were 'heard' from a reality predating history and not composed at a specific historical moment, unlike the Torah which is rooted in a specific historical event at Sinai."}, {"front": "What additional layer of sacred knowledge transmission does the Bhagavad Gita introduce in Hinduism?", "back": "It presents eternal teaching periodically lost and restored through a chain of teacher-student transmission stretching back to creation."}, {"front": "What analogy is used to describe Hindu scripture, and what does it imply about its nature?", "back": "Scripture is like a law of nature, implying it is always true, whether or not it has been discovered or received yet."}, {"front": "Why are the Norse Eddas not considered 'scripture' in the same sense as the Torah or Vedas?", "back": "They were written down by Christians to preserve cultural heritage, not as a direct revelation or timeless truth, and thus are not objects of belief for their scribes."}, {"front": "How did Odin acquire the runes in Norse mythology, and what does this signify about sacred knowledge?", "back": "Odin acquired the runes by paying with nine nights of agony on Yggdrasil, signifying that sacred knowledge in Norse tradition must be earned through suffering, not freely given."}, {"front": "Compare the acquisition of sacred knowledge in Norse Paganism (Odin) with Judaism (Moses) and Hinduism (Vedic seers).", "back": "Odin earned knowledge through suffering, unlike Moses who received revelation as a gift at Sinai, or Vedic seers who 'heard' it in meditation."}, {"front": "What deep philosophical question about language do these three traditions implicitly answer in their understanding of scripture?", "back": "What is the relationship between a text and the reality it points to?"}, {"front": "How does Judaism view the relationship between its sacred text (Torah) and reality?", "back": "The Torah is a record of revelation that itself becomes a vehicle of continued revelation through interpretation."}, {"front": "How does Hinduism view the relationship between its sacred texts (Vedas) and reality?", "back": "The Vedas are understood as a window onto eternal truth."}, {"front": "How does Norse Paganism view the relationship between its sacred texts (Eddas) and reality?", "back": "The Eddas are a memory of a lost world, imperfectly preserved by outsiders, pointing to a tradition that must be reconstructed."}, {"front": "What types of questions are most relevant for assessing the authority of Jewish scripture, given its nature?", "back": "Historical questions, such as whether Moses was at Sinai and if the text was preserved accurately, are relevant."}, {"front": "What types of questions are most relevant for assessing the authority of Hindu scripture, given its nature?", "back": "The key question is whether the seer truly 'heard' the eternal truth; historical questions are beside the point."}, {"front": "What types of questions are most relevant for assessing the authority of Norse Pagan scripture (Eddas), given its nature?", "back": "Both historical questions (what was actually preserved?) and hermeneutical questions (how do we read it now?) are relevant."}, {"front": "What is 'at stake' if scripture is viewed primarily as a historical document?", "back": "Its authority depends significantly on historical verifiability and the accuracy of its preservation."}, {"front": "What is 'at stake' if scripture is viewed as eternal truth received by seers?", "back": "The primary concern is the authenticity of the reception—whether the seer genuinely heard the eternal truth, making historical context less critical."}, {"front": "What is 'at stake' if scripture is viewed as a cultural memory preserved by non-believers?", "back": "Its authority relies on understanding what was genuinely preserved from the original tradition and how it should be interpreted in the present."}, {"front": "According to the text, how do these three traditions fundamentally disagree about the 'kind of truth' a text can carry?", "back": "They disagree on whether a book is given by God (Judaism), reveals eternal truth (Hinduism), or records ancestral memories (Norse Paganism)."}, {"front": "What potential implication does the text raise about the value of sacred knowledge acquired through suffering versus knowledge given freely?", "back": "It prompts the question of whether knowledge won through suffering (like Odin's runes) might be considered more or less valuable than knowledge freely given (like Moses's Torah)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
