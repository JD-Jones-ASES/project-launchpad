<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 13, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Judaism view the Torah's origin and nature?", "back": "The Torah is a revelation given at Sinai, to Moses, to Israel. It is a document with a specific historical date, location, and audience."}, {"front": "What is the role of the Oral Torah in Judaism?", "back": "The Oral Torah is itself considered to have been given at Sinai, arriving together with the written text, and is not merely human opinion but an integral part of divine revelation and interpretation."}, {"front": "What metaphor is used to describe scripture in Judaism, and what does it imply?", "back": "Scripture is like a 'river': it has a source (Sinai) but flows through every generation, implying continuous interpretation and relevance."}, {"front": "In Judaism, what is the relationship between the text (Torah) and the reality it points to?", "back": "The Torah is a record of revelation that itself becomes a vehicle of continued revelation through interpretation."}, {"front": "What type of questions are relevant for validating the authority of Jewish scripture?", "back": "Its authority depends partly on historical questions, such as whether Moses was truly at Sinai and if the text was preserved accurately."}, {"front": "How are the Vedas and Upanishads understood in Hinduism?", "back": "They are 'shruti' ('heard') by seers in the timeless depths of meditation, received from a reality that predates history, rather than historically composed."}, {"front": "What does the Bhagavad Gita add to the understanding of sacred knowledge in Hinduism?", "back": "It represents an eternal teaching that is periodically lost and restored through a chain of teacher-student transmission stretching back to creation."}, {"front": "What metaphor is used for scripture in Hinduism, and what does it imply?", "back": "Scripture is like a 'law of nature'—always true, whether or not anyone has discovered it yet."}, {"front": "In Hinduism, what is the relationship between texts like the Vedas and the reality they point to?", "back": "The Vedas are a window onto eternal truth."}, {"front": "What type of questions are relevant for validating the authority of Hindu scripture?", "back": "Historical questions are beside the point; the question is whether the seer truly heard the eternal truth."}, {"front": "How do the Eddas differ from the Torah or Vedas in their nature as 'scripture' in Norse Paganism?", "back": "The Eddas are not scripture in the same revelatory sense. They were written down by Christians preserving a cultural heritage they no longer believed, not as direct divine revelation or timeless truth."}, {"front": "How was sacred knowledge (the runes) acquired by Odin in Norse mythology?", "back": "Odin did not receive the runes as a gift; he paid for them with nine nights of agony on Yggdrasil, indicating knowledge must be earned through suffering."}, {"front": "What core concept about sacred knowledge is highlighted in the Norse telling?", "back": "Sacred knowledge is not freely given; it must be earned through suffering."}, {"front": "In Norse Paganism, what is the relationship between the Eddas and the reality they point to?", "back": "The Eddas are a memory of a lost world, preserved imperfectly by outsiders, pointing to a tradition that must be reconstructed rather than simply received."}, {"front": "What types of questions are relevant for the authority and understanding of the Eddas?", "back": "Both historical questions (what did they actually preserve?) and hermeneutical questions (how do we read it now?) are relevant."}, {"front": "Compare the origin of sacred knowledge in Judaism, Hinduism, and Norse Paganism.", "back": "Judaism: Revelation at a specific historical moment (Sinai). Hinduism: Timeless reception by seers from a pre-historical reality. Norse Paganism: Knowledge earned through suffering, preserved as cultural memory."}, {"front": "What is the overarching philosophical question that these three traditions address regarding language and texts?", "back": "What is the relationship between a text and the reality it points to?"}, {"front": "How does the view of scripture as a historical document (Judaism) affect questions about its authority?", "back": "Its authority depends on historical questions: Was Moses at Sinai? Was the text preserved accurately?"}, {"front": "How does the view of scripture as eternal truth (Hinduism) affect questions about its authority?", "back": "Historical questions are beside the point; the authority depends on whether the seer truly heard the eternal truth."}, {"front": "What are the implications for a tradition whose sacred knowledge was won through suffering rather than given freely?", "back": "This implies a unique value or depth to the knowledge, suggesting it is not easily accessible and requires significant personal cost."}, {"front": "How do the 'windows onto truth' differ for Jewish, Hindu, and Norse texts?", "back": "Judaism: a record and vehicle of continued revelation. Hinduism: a window onto eternal truth. Norse Paganism: a memory of a lost world needing reconstruction."}, {"front": "Explain the significance of interpretation for the Jewish view of scripture.", "back": "Interpretation (Oral Torah) is crucial; it's not adding human opinion but is integral to the revelation itself, allowing the text to flow through and remain relevant for every generation."}, {"front": "Contrast the Hindu and Norse views on how sacred knowledge is obtained.", "back": "Hinduism: Knowledge is 'heard' by seers in timeless meditation or restored through teacher-student chains. Norse Paganism: Knowledge must be actively earned through profound suffering and sacrifice."}, {"front": "Why is the preservation of the Eddas described as 'imperfect' and requiring 'reconstruction'?", "back": "They were preserved by outsiders (Christians) who no longer believed the content, suggesting potential biases, gaps, or misinterpretations that require careful scholarly and interpretive reconstruction by modern adherents."}, {"front": "What general observation does the text make about how all three traditions approach ancient texts?", "back": "All three traditions ask us to take ancient texts seriously as windows onto truth, despite their differing views on the nature and origin of that truth."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
