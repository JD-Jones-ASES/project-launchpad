<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Religious Roundtable &mdash; Chapter 14, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Religious_Roundtable">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is historical materialism in Marx's theory?", "back": "Marx's theory that the fundamental driver of human history is the material conditions of production – who owns the means of production and how labor is organized – rather than ideas, religion, or great leaders."}, {"front": "Define 'class consciousness' in Marxist thought.", "back": "The awareness by members of a class (especially the working class) of their common interests and common exploitation, which Marx considered a prerequisite for collective action."}, {"front": "Who are the 'proletariat' according to Marx?", "back": "The class of workers who do not own the means of production and must sell their labor to survive. Marx considered them the agent of historical transformation."}, {"front": "In Marxist terms, who constitutes the 'bourgeoisie'?", "back": "The class that owns the means of production (factories, land, capital) in capitalist society. Marx argued that bourgeois morality serves bourgeois interests."}, {"front": "What is 'solidarity' in Marxist ethics?", "back": "The bond of mutual obligation and shared interest among members of the working class, considered the supreme social virtue."}, {"front": "According to Marx, who writes traditional moral codes and whose interests do they serve?", "back": "The ruling class writes moral codes, directly or indirectly, to serve its own interests, legitimizing the existing system of ownership and labor."}, {"front": "Explain Marx's statement: 'The ruling ideas of every age are the ideas of the ruling class.'", "back": "This means that concepts like individual rights, private property, and meritocracy are not eternal truths but ideological tools used by the ruling class to maintain their power and legitimize exploitation."}, {"front": "Is it accurate to say Marx believed there is no such thing as morality, only power?", "back": "No, this is a misreading. Marx had a deeply moral vision; he was outraged by exploitation and believed it was genuinely wrong, and alienation was a real harm."}, {"front": "What did Marx consider genuinely wrong and harmful?", "back": "The exploitation of workers and alienation—the condition where humans are estranged from their labor, products, fellow workers, and human nature."}, {"front": "What constitutes the 'good life' for Marx?", "back": "A life in which people can exercise their creative capacities freely, in community with others, without coercion or exploitation."}, {"front": "In Marxist ethics, what is considered the supreme virtue and the primary vice?", "back": "Solidarity is the supreme virtue, and individualism is the primary vice."}, {"front": "How does Marx argue capitalism affects human behavior and relationships?", "back": "Capitalism fosters competition (worker against worker, individual against individual) which Marx believed was not natural human behavior but a product of the system."}, {"front": "What is Marx's proposed antidote to the competition bred by capitalism?", "back": "Solidarity – workers recognizing common interests, refusing to compete, and acting collectively, exemplified by the moral command 'Workers of all countries, unite!'"}, {"front": "How does Marx describe the nature and outcome of the communist revolution?", "back": "The revolution is not destructive but emancipatory. It overthrows the conditions of exploitation, leading to a good life that capitalism prevented."}, {"front": "What structural similarities does the communist revolution share with religious eschatology?", "back": "Both involve a present condition of suffering, a diagnosis of its cause, a vision of liberation, and a call to act."}, {"front": "According to 'The Communist Manifesto,' what will society be like after the communist revolution?", "back": "Class distinctions and antagonisms will disappear. There will be an association where the free development of each is the condition for the free development of all."}, {"front": "Why is class consciousness crucial for the proletariat?", "back": "For Marx, class consciousness is the prerequisite for collective action, enabling the working class to recognize their common exploitation and unite for historical transformation."}, {"front": "According to Marx, what is the primary function of 'bourgeois morality'?", "back": "To serve bourgeois interests by legitimizing a capitalist system where a small class owns the means of production and a large class must sell its labor to survive."}, {"front": "What specific forms of 'alienation' did Marx identify as a real harm to human beings?", "back": "Estrangement from their labor, their products, their fellow workers, and their own human nature."}, {"front": "In Marxist ethics, what is the significance of the phrase 'Workers of all countries, unite!'?", "back": "It is not just a political slogan but a moral command, urging workers to overcome isolation and competition and act in solidarity to achieve human liberation."}, {"front": "What conditions specifically outraged Marx and fueled his moral vision?", "back": "The harsh conditions of the industrial working class, including twelve-hour days, child labor, factory accidents, and wages that barely sustained life."}, {"front": "Who is considered 'the good person' in Marxist ethics?", "back": "The one who overcomes the isolation and competition that capitalism breeds and acts in solidarity with those who share their condition (the working class)."}, {"front": "According to the Communist Manifesto, what happens to 'political power' after class distinctions disappear?", "back": "Political power will lose its political character, as it is understood as merely the organized power of one class for oppressing another, which will no longer exist."}, {"front": "For Marx, what distinguishes 'bourgeois ethics' from 'genuine ethics'?", "back": "Bourgeois ethics uses universal language to disguise ruling-class interests and legitimize exploitation, whereas genuine ethics is the ethics of human liberation, challenging and overthrowing that system."}, {"front": "Why does Marxist ethics consider individualism a primary vice?", "back": "Individualism promotes competition and self-interest, behaviors produced by the capitalist system, rather than the natural human tendency towards community and mutual support, which solidarity embodies."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
