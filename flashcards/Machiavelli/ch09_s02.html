<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 9, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, what are the two ways a private citizen can become a prince without relying entirely on fortune or genius?", "back": "Through wicked/nefarious ways or through the favor of fellow citizens."}, {"front": "What was the humble social origin of Agathocles of Syracuse?", "back": "He was the son of a potter."}, {"front": "What military rank did Agathocles attain in Syracuse before seizing the principality?", "back": "Praetor of Syracuse."}, {"front": "To whom did Agathocles turn for an understanding to assist in his plan to seize Syracuse?", "back": "Amilcar the Carthaginian."}, {"front": "By what specific action did Agathocles eliminate the political opposition in Syracuse?", "back": "He signaled his soldiers to kill all the senators and the richest citizens during a public assembly."}, {"front": "How did Agathocles respond to being besieged by the Carthaginians in Syracuse?", "back": "He left part of his men for defense and led the others to attack Africa."}, {"front": "Why does Machiavelli argue that Agathocles’ rise cannot be attributed to fortune?", "back": "He attained pre-eminence step by step through military service, facing a thousand troubles and perils."}, {"front": "What four specific behaviors does Machiavelli claim prevent a ruler from gaining 'glory,' even if they gain 'empire'?", "back": "Slaying fellow citizens, deceiving friends, being without faith, and being without religion."}, {"front": "Concept: The limit of Agathocles' reputation.", "back": "His 'barbarous cruelty and inhumanity' prevent him from being celebrated among the most excellent men."}, {"front": "Who raised and educated Oliverotto da Fermo after he was left an orphan?", "back": "His maternal uncle, Giovanni Fogliani."}, {"front": "Under which military leader was Oliverotto first sent to train in his youth?", "back": "Pagolo Vitelli."}, {"front": "Under whose leadership did Oliverotto serve after the death of Pagolo Vitelli?", "back": "Vitellozzo Vitelli."}, {"front": "What pretense did Oliverotto use to return to Fermo and visit his uncle Giovanni?", "back": "He claimed he wanted to see his patrimony and show the citizens he had spent his time in military service honorably."}, {"front": "How many horsemen accompanied Oliverotto on his return to Fermo?", "back": "One hundred."}, {"front": "At what event did Oliverotto carry out his plan to murder his uncle and the chiefs of Fermo?", "back": "A solemn banquet he provided for them."}, {"front": "To what kind of location did Oliverotto lead his guests before the massacre began?", "back": "A private chamber for more 'grave discourses' regarding the Pope and Cesare Borgia."}, {"front": "How did Oliverotto consolidate his power immediately after the murders?", "back": "He besieged the chief magistrate, forced the people to obey him, and formed a new government."}, {"front": "Which historical figure eventually 'overreached' and destroyed Oliverotto da Fermo?", "back": "Cesare Borgia."}, {"front": "Where was Oliverotto da Fermo eventually captured and killed?", "back": "Sinigaglia."}, {"front": "How did Oliverotto die, exactly one year after his parricide?", "back": "He was strangled."}, {"front": "According to Machiavelli, under what specific condition are severities 'properly used'?", "back": "When they are applied at one blow for the sake of security and then converted to the benefit of subjects."}, {"front": "According to Machiavelli, what defines 'badly employed' severities?", "back": "Cruelties that are few at the beginning but multiply with time rather than decrease."}, {"front": "Why is it impossible for those who persist in cruelties to maintain their state?", "back": "They are always compelled to 'keep the knife in hand' and can never rely on their subjects."}, {"front": "In seizing a state, when should a usurper carry out necessary 'injuries'?", "back": "All at one stroke, so they do not have to be repeated daily."}, {"front": "What is the psychological benefit of inflicting all injuries at one time?", "back": "They are 'tasted less' and therefore offend the subjects less."}, {"front": "How does Machiavelli suggest benefits should be distributed to subjects?", "back": "Little by little, so that the flavor of them may last longer."}, {"front": "Why should a prince avoid being forced to change his behavior during 'troubled times'?", "back": "Harsh measures will be too late, and mild ones will be seen as forced and earn no gratitude."}, {"front": "Machiavelli notes that Agathocles rose to power not by the favor of any one, but step by step in the _____.", "back": "Military profession."}, {"front": "What was the result of the Carthaginian necessity after Agathocles attacked Africa?", "back": "They were compelled to leave Sicily to him and be content with the possession of Africa."}, {"front": "Term: Severities properly used.", "back": "Definition: Acts of cruelty performed once for security and then ceased in favor of the subjects' advantage."}, {"front": "What does Machiavelli call the result of a ruler who cannot rely on his subjects due to 'continued and repeated wrongs'?", "back": "Being compelled to always keep the knife in hand."}, {"front": "To whom was the 'slavery of their country' dearer than its liberty, assisting Oliverotto in his coup?", "back": "Certain citizens of Fermo."}, {"front": "Which two families aided Oliverotto in his plan to seize Fermo?", "back": "The Vitelleschi and certain citizens of Fermo."}, {"front": "Why did the people of Fermo obey Oliverotto after he besieged the chief magistrate?", "back": "They were driven by fear."}, {"front": "How did Oliverotto ensure his security within the city of Fermo after seizing power?", "back": "He killed all the malcontents who were able to injure him."}, {"front": "What prevented Oliverotto from becoming as difficult to destroy as Agathocles?", "back": "He allowed himself to be overreached by Cesare Borgia."}, {"front": "What is the consequence of a prince behaving differently in good times versus evil times?", "back": "Unsettling the people and losing their obligation/loyalty when necessity arises."}, {"front": "The ability to overcome hardships is termed by Machiavelli as _____ of mind.", "back": "Greatness."}, {"front": "Why can Agathocles be compared to 'the most notable captain' but not 'the most excellent men'?", "back": "He possessed military courage and genius, but lacked the moral virtues necessary for celebration."}, {"front": "In Machiavelli's view, can wicked methods lead to empire?", "back": "Yes, but they cannot lead to glory."}, {"front": "Which Pope’s rule provided the backdrop for Oliverotto da Fermo’s rise?", "back": "Alexander VI."}, {"front": "What was the familial relationship between Oliverotto and Vitellozzo Vitelli's brother?", "back": "There was no familial relationship; Vitellozzo was his military leader and mentor."}, {"front": "By not _____ men through repeated injuries, a prince will be able to reassure them and win them with benefits.", "back": "Unsettling."}, {"front": "Under what condition can a ruler mitigate their rule by 'aid of God or man'?", "back": "If they practice the system of applying severities at one blow."}, {"front": "Why did Oliverotto want to be received 'honourably' by the citizens of Fermo?", "back": "To show he had not spent his time in military service in vain and to honor his uncle."}, {"front": "Who was the maternal uncle of Oliverotto da Fermo?", "back": "Giovanni Fogliani."}, {"front": "How did Agathocles handle the transition from Praetor to Prince?", "back": "He seized by violence that which had been conceded to him by assent."}, {"front": "In Machiavelli's analysis, what is the primary objective of properly used evil?", "back": "One's own security."}, {"front": "Why is 'timidity' or 'evil advice' a danger to a new prince's strategy of injury?", "back": "It leads them to repeat injuries daily, preventing them from relying on their subjects."}, {"front": "What happened to Vitellozzo Vitelli alongside Oliverotto at Sinigaglia?", "back": "He was also strangled."}, {"front": "What specific quality did Agathocles have that allowed him to rise through military ranks despite his 'infamous life'?", "back": "Ability of mind and body."}, {"front": "The 'flavour' of benefits is best preserved when they are given _____.", "back": "Little by little."}, {"front": "Why does Machiavelli provide one ancient and one modern example of rising through wickedness?", "back": "To provide sufficient illustration for those who may be compelled to follow such methods."}, {"front": "What was the 'signal' given by Agathocles to his soldiers to begin the massacre?", "back": "Machiavelli describes it as a 'given signal' without specifying the exact physical act."}, {"front": "How did Agathocles avoid 'civil commotion' after his coup?", "back": "By killing all the senators and the richest people who could have led an opposition."}, {"front": "What does Machiavelli call the act of Oliverotto killing his own uncle?", "back": "Parricide."}, {"front": "Why are mild measures in times of trouble considered useless by Machiavelli?", "back": "They are considered forced, and thus no one feels an obligation for them."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
