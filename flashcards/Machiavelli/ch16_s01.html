<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 16, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the philosophical significance of Chapter XV in Machiavelli's 'The Prince'?", "back": "It serves as the philosophical turning point where Machiavelli declares his method and distances himself from traditional political philosophy."}, {"front": "What is the primary goal Machiavelli states for writing 'The Prince'?", "back": "To write something useful for the reader."}, {"front": "Machiavelli's commitment to 'verità effettuale' is known as the _____.", "back": "Effectual truth"}, {"front": "Contrast 'effectual truth' with the focus of traditional political philosophy.", "back": "Effectual truth focuses on how politics is actually practiced rather than an imaginary or ideal version."}, {"front": "Which Renaissance literary genre, focusing on ideal ruler behavior, does Machiavelli explicitly reject?", "back": "Mirrors for princes"}, {"front": "According to Machiavelli, what is the flaw in the tradition stretching from Plato to the Renaissance?", "back": "It describes ideal states and rulers that exist nowhere in reality."}, {"front": "Concept: Plato's Philosopher-King", "back": "Definition: An imaginary ruler of perfect wisdom and virtue who governs with absolute justice."}, {"front": "In 'City of God', what did Augustine argue was the only truly just city?", "back": "The communion of the saved."}, {"front": "How did Aquinas, following Aristotle, define the best ruler?", "back": "A morally good person whose virtue is inseparable from good governance."}, {"front": "Why does Machiavelli argue that a prince who tries to practice all virtues will be destroyed?", "back": "Because he lives in a world where his rivals practice no virtues."}, {"front": "In the list of qualities for which princes are praised or blamed, what is the opposite of 'generous'?", "back": "Miserly"}, {"front": "In the list of qualities for which princes are praised or blamed, what is the opposite of 'cruel'?", "back": "Merciful"}, {"front": "In the list of qualities for which princes are praised or blamed, what is the opposite of 'faithful'?", "back": "Faithless"}, {"front": "In the list of qualities for which princes are praised or blamed, what is the opposite of 'courageous'?", "back": "Cowardly"}, {"front": "In the list of qualities for which princes are praised or blamed, what is the opposite of 'humane'?", "back": "Fierce"}, {"front": "In the list of qualities for which princes are praised or blamed, what is the opposite of 'chaste'?", "back": "Licentious"}, {"front": "In the list of qualities for which princes are praised or blamed, what is the opposite of 'sincere'?", "back": "Cunning"}, {"front": "In the list of qualities for which princes are praised or blamed, what is the opposite of 'hard'?", "back": "Flexible"}, {"front": "In the list of qualities for which princes are praised or blamed, what is the opposite of 'grave'?", "back": "Frivolous"}, {"front": "In the list of qualities for which princes are praised or blamed, what is the opposite of 'religious'?", "back": "Unbelieving"}, {"front": "What is the traditional advice given to princes regarding the list of moral qualities?", "back": "Cultivate all the virtues (generosity, mercy, faithfulness, etc.)."}, {"front": "Why does Machiavelli believe a fixed moral code is a dangerous guide for a ruler?", "back": "Political reality is too varied, dangerous, and unpredictable."}, {"front": "What does the phrase 'verità effettuale' imply about Machiavelli's methodology?", "back": "He draws conclusions from real successes and failures rather than moral prescriptions."}, {"front": "How does Machiavelli's approach to facts differ from his approach to values?", "back": "He refuses to let personal values distort his observation of facts."}, {"front": "What analogy does Machiavelli use to justify telling harsh political truths?", "back": "The doctor who must tell a patient the truth to be helpful rather than dangerous."}, {"front": "According to Machiavelli, what must a prince learn to do 'if he wants to maintain himself'?", "back": "Learn how not to be good."}, {"front": "Under what condition should a prince use the capacity to be 'not good'?", "back": "According to necessity."}, {"front": "What is the likely fate of a prince who is 'always good'?", "back": "He will be exploited by those who are not good."}, {"front": "What is the likely fate of a prince who is 'always bad'?", "back": "He will be hated and eventually destroyed."}, {"front": "According to the text, what determines whether a prince survives?", "back": "Understanding both good and bad behavior and choosing between them appropriately."}, {"front": "Term: Necessità", "back": "Definition: The condition of genuine necessity that justifies a ruler's departure from moral norms."}, {"front": "How does Machiavelli distinguish between 'necessity' and 'convenience'?", "back": "Departing from moral norms is justified only by genuine necessity, not by personal preference or convenience."}, {"front": "Why is Chapter XV considered the 'birth of political science'?", "back": "It established politics as a discipline independent of moral philosophy."}, {"front": "Before Machiavelli, what was the relationship between political and moral philosophy?", "back": "Politics was treated as a branch of moral philosophy."}, {"front": "What are the three main goals of Machiavellian political analysis?", "back": "Stability, security, and power."}, {"front": "How does Machiavelli's view of a ruler compare to Aristotle's in 'Politics'?", "back": "Aristotle emphasizes the good ruler's virtue, while Machiavelli emphasizes political effectiveness."}, {"front": "Machiavelli argues that a prince must have the capacity to use 'not good' actions, but must also know how to _____.", "back": "Withhold them as circumstances require."}, {"front": "According to Machiavelli, why is the man who brings a knife to a gunfight 'admirable but doomed'?", "back": "He is committed to civilized norms in a situation where they guarantee his loss."}, {"front": "What does Machiavelli mean by the 'imaginary version' of political truth?", "back": "The ideal states and rulers described by theologians and philosophers that do not exist in reality."}, {"front": "In Machiavelli's view, can a prince possess all 'praised' qualities simultaneously?", "back": "No, attempting to possess them all at once will lead to ruin."}, {"front": "Why does Machiavelli refuse to argue that traditional ideals are 'bad'?", "back": "He argues they are useless for actual governance, not that they are inherently evil."}, {"front": "What fundamental question did political philosophy ask before Machiavelli?", "back": "What is a good person and how do they govern well?"}, {"front": "In Machiavelli’s analysis, what takes precedence over moral purity?", "back": "What actually produces stability and security."}, {"front": "Concept: Political Realism", "back": "Definition: A political philosophy based on 'effectual truth' and the pragmatic exercise of power, founded in Chapter XV of 'The Prince'."}, {"front": "What specific quality does Machiavelli pair as the opposite of 'humane'?", "back": "Fierce"}, {"front": "What specific quality does Machiavelli pair as the opposite of 'sincere'?", "back": "Cunning"}, {"front": "What specific quality does Machiavelli pair as the opposite of 'grave'?", "back": "Frivolous"}, {"front": "The list of qualities provided by Machiavelli represents genuine _____ a ruler must make.", "back": "Choices"}, {"front": "True or False: Machiavelli advocates for immorality for its own sake.", "back": "False; he advocates for it only when necessitated by political reality."}, {"front": "True or False: Machiavelli believes deception is an inherent virtue.", "back": "False; he views it as a tool that may be required by necessity."}, {"front": "What does Machiavelli suggest about the relationship between private morality and the political world?", "back": "They are governed by different sets of rules."}, {"front": "The 'effectual truth' is based on the successes and failures of _____.", "back": "Real rulers in real situations."}, {"front": "In 'The Prince', which philosopher's 'philosopher-king' is cited as a primary example of an imaginary ideal?", "back": "Plato"}, {"front": "What distinguishes Machiavelli's advisor role from the 'mirrors for princes' authors?", "back": "He intends to tell the truth about how rulers behave rather than how they should behave."}, {"front": "According to the text, when is a prince's departure from moral norms considered justified?", "back": "Only by genuine necessity (*necessità*)."}, {"front": "What is the primary danger for a prince who refuses to learn 'how not to be good'?", "back": "He will be crushed by those who know the difference between private morality and political necessity."}, {"front": "Machiavelli concludes that the political world is too _____ for a fixed moral code.", "back": "Unpredictable"}, {"front": "In the context of Chapter XV, what does 'maintaining himself' mean for a prince?", "back": "Preserving his power and the stability of his state."}, {"front": "Why is the 'imaginary version' of truth considered dangerous by Machiavelli?", "back": "It leads a ruler to act in ways that ensure his own destruction."}, {"front": "What is the core methodological difference between Machiavelli and Aquinas?", "back": "Aquinas prescribes behavior based on virtue; Machiavelli describes behavior based on effect."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
