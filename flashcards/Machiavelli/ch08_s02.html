    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 8, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "According to Machiavelli, how do princes who rise from private citizenship solely by good fortune find the ascent?", "back": "They experience little trouble rising because they effectively 'fly' to the top."}, {"front": "What difficulty do princes who rise by fortune face once they reach the summit of power?", "back": "They face many difficulties in keeping their position."}, {"front": "On what two 'inconstant and unstable' things do princes elevated by others' favour depend?", "back": "They depend on the goodwill and the fortune of those who elevated them."}, {"front": "Why is it unreasonable to expect a prince who was formerly a private citizen to know how to command?", "back": "They lack the requisite knowledge and experience unless they are men of great worth and ability."}, {"front": "Princes who rise by fortune often fail because they lack _____ forces that are friendly and faithful.", "back": "loyal"}, {"front": "Machiavelli compares states that rise unexpectedly to what biological phenomenon?", "back": "Things in nature which are born and grow rapidly but lack deep roots."}, {"front": "What must an able prince do if they did not lay foundations before becoming a prince?", "back": "They must lay the foundations after acquiring power, though it is dangerous and troublesome."}, {"front": "Which historical figure does Machiavelli use as an example of rising to power through great ability?", "back": "Francesco Sforza."}, {"front": "How did Francesco Sforza's experience in keeping power compare to his experience in acquiring it?", "back": "He acquired power with great anxiety but kept it with little trouble."}, {"front": "By what means did Cesare Borgia, also known as Duke Valentino, acquire his state?", "back": "He acquired it through the ascendancy and fortune of his father."}, {"front": "Despite his efforts, why did Cesare Borgia ultimately lose his state?", "back": "He lost it when his father's fortune declined and due to the extreme malignity of fortune."}, {"front": "Machiavelli offers the actions of _____ as the best precepts for a new prince to follow.", "back": "Cesare Borgia"}, {"front": "What was the primary difficulty Alexander VI faced when trying to aggrandize his son, Cesare?", "back": "He could not make him master of any state that did not belong to the Church."}, {"front": "Which two Italian powers would have opposed Alexander VI's attempt to rob the Church for his son?", "back": "The Duke of Milan and the Venetians."}, {"front": "Which two Roman noble families held the military power that Alexander VI feared would hinder his son's aggrandizement?", "back": "The Orsini and the Colonnesi."}, {"front": "What action did Alexander VI take to upset the existing state of affairs in Italy?", "back": "He embroiled the Italian powers and facilitated the entry of the French into Italy."}, {"front": "How did Alexander VI assist King Louis of France to gain his consent for an Italian expedition?", "back": "He dissolved the King's former marriage."}, {"front": "Cesare Borgia's first major conquest, the Romagna, was achieved with the reputation of which foreign leader?", "back": "The King of France."}, {"front": "What two things hindered Cesare Borgia's progress after he acquired the Romagna?", "back": "The perceived disloyalty of his own forces and the uncertain goodwill of France."}, {"front": "Which family's forces did Cesare Borgia use initially but later found to be unwilling and unreliable?", "back": "The Orsini family."}, {"front": "What event warned Cesare that the Orsini might seize what he had won?", "back": "Their unwilling behavior during the attack on Bologna after the taking of Faenza."}, {"front": "How did Cesare Borgia weaken the Orsini and Colonna factions in Rome?", "back": "He won over their adherents by giving them offices, commands, and high pay."}, {"front": "The Orsini realized too late that the growth of the Duke's power meant their ruin, leading to a meeting at _____.", "back": "Magione in Perugia"}, {"front": "How did Cesare Borgia overcome the rebellion at Urbino and the Romagna?", "back": "He used the help of the French and his own wiles."}, {"front": "How did Cesare Borgia secure the trust of Signor Pagolo Orsini during their reconciliation?", "back": "He gave him money, apparel, and horses."}, {"front": "At which location did Cesare Borgia finally trap and exterminate the Orsini leaders?", "back": "Sinigaglia."}, {"front": "What was the social condition of the Romagna when Cesare Borgia first occupied it?", "back": "It was full of robbery, quarrels, and violence under weak masters who plundered their subjects."}, {"front": "Who did Cesare Borgia appoint to restore peace and unity to the Romagna with 'fullest power'?", "back": "Messer Ramiro d’Orco."}, {"front": "Why did Cesare Borgia eventually decide to replace Ramiro d'Orco's absolute authority with a civil court?", "back": "He feared that such excessive authority would make him odious to the people."}, {"front": "What was Cesare Borgia's motive for the public execution of Ramiro d’Orco?", "back": "To clear himself of the hatred caused by past severities and show they originated with the minister."}, {"front": "What were the two emotional reactions of the people of Cesena upon seeing Ramiro d’Orco’s body?", "back": "They were at once satisfied and dismayed."}, {"front": "Why did Cesare Borgia begin seeking new alliances and distancing himself from France?", "back": "He realized the King of France had become aware of his mistake and would no longer support him."}, {"front": "What was Cesare Borgia's first goal to secure his state against a future unfriendly Pope?", "back": "To exterminate the families of the lords he had despoiled."}, {"front": "What was Cesare Borgia's second goal to curb the influence of a future Pope?", "back": "To win over all the gentlemen of Rome to his side."}, {"front": "What was Cesare Borgia's third goal regarding the College of Cardinals?", "back": "To convert the college more to his own interests."}, {"front": "What was Cesare Borgia's fourth goal intended to protect him from the initial shock of his father's death?", "back": "To acquire so much power that he could resist the first shock by his own measures."}, {"front": "How many of his four primary future-proofing goals had Cesare Borgia accomplished by the death of Alexander VI?", "back": "He had accomplished three of the four goals."}, {"front": "Which Italian region was Cesare Borgia intending to master to solidify his power before his father's death?", "back": "Tuscany."}, {"front": "How many years had passed between Alexander VI drawing the sword and his death?", "back": "Five years."}, {"front": "What two external factors combined with his father's death to frustrate Cesare Borgia's designs?", "back": "Two powerful hostile armies on his back and his own life-threatening illness."}, {"front": "Despite being 'half alive,' why remained Cesare Borgia secure in Rome after his father's death?", "back": "His foundations were so firm that his enemies could not effect anything against him."}, {"front": "What did Cesare Borgia tell Machiavelli was the only scenario he had failed to anticipate regarding his father's death?", "back": "That he himself would be on the point of dying at the same time."}, {"front": "Machiavelli argues that Borgia's failure was not his fault, but due to the extreme malignity of _____.", "back": "fortune"}, {"front": "What specific action of Cesare Borgia does Machiavelli identify as a 'bad choice' or error?", "back": "His consent to the election of Julius II as Pope."}, {"front": "Why does Machiavelli argue a prince should never allow the election of a Pope whom they have previously injured?", "back": "Because men injure others either out of fear or out of hatred."}, {"front": "Which cardinal, eventually elected as Julius II, was among those Cesare Borgia had previously injured?", "back": "San Pietro ad Vincula."}, {"front": "According to Machiavelli, what is the danger of believing 'new benefits' will win over great personages?", "back": "It is a deception to think they will forget old injuries."}, {"front": "Whom should Cesare Borgia have tried to make Pope instead of San Pietro ad Vincula?", "back": "A Spaniard, or failing that, the Cardinal of Rouen."}, {"front": "Machiavelli claims that the error in the papal election was the cause of Borgia's ultimate _____.", "back": "ruin"}, {"front": "What quality did Francesco Sforza possess that allowed him to keep his state with little trouble?", "back": "Great worth and ability (virtù)."}, {"front": "Why are the goodwill and fortune of an elevator considered unstable foundations for a prince?", "back": "They are inconstant and can change rapidly without notice."}, {"front": "What is the result of a prince lacking 'correspondencies' and 'fixed foundations' in a new state?", "back": "The first 'storm' or political crisis will overthrow them."}, {"front": "How did Cesare Borgia ensure the loyalty of the Roman gentlemen formerly attached to the Orsini and Colonna?", "back": "He gave them rank, office, and command until their old attachment was destroyed."}, {"front": "In Machiavelli's view, should a prince strive to be loved, feared, or both?", "back": "A prince should strive to be both beloved and feared by the people."}, {"front": "What must a prince do to a disloyal soldiery according to the example of Cesare Borgia?", "back": "He must destroy them and create a new one."}, {"front": "How should a prince maintain relationships with other kings so they 'help him with zeal'?", "back": "In such a way that they must help him with zeal and offend him only with caution."}, {"front": "According to the text, what was the status of the Romagna after Alexander VI died?", "back": "It was the only part of Borgia's state that was consolidated."}, {"front": "How long did the Romagna wait for Cesare Borgia after the death of his father?", "back": "For more than a month."}, {"front": "Which two powerful hostile armies was Cesare Borgia caught between at the time of his father's death?", "back": "The French and the Spaniards."}, {"front": "Why were the Baglioni, Vitelli, and Orsini unable to effect anything against Borgia in Rome?", "back": "Because he had laid such firm foundations for his power."}, {"front": "According to Machiavelli, what is the best example for a new prince to imitate?", "back": "The actions and dispositions of Cesare Borgia."}, {"front": "What were the 'proper means' by which Francesco Sforza became Duke of Milan?", "back": "Great ability and his own effort, rather than the fortune of others."}, {"front": "Why did the French King King Louis XII enter Italy according to the text?", "back": "He was brought back by the Venetians and consented to by Alexander VI."}, {"front": "What does Machiavelli mean by 'arms of others' in the context of Cesare Borgia?", "back": "Military forces belonging to other powers, such as the French or mercenaries like the Orsini."}, {"front": "How did Cesare Borgia handle the leaders of the Orsini after the Sinigaglia reconciliation?", "back": "He had them exterminated."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
