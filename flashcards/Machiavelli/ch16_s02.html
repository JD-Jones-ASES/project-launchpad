<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 16, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, what is the 'effectual truth' (verità effettuale) in politics?", "back": "The 'effectual truth' is Machiavelli's fundamental methodological commitment to studying politics as it is, not as it ought to be, drawing conclusions from actual successes and failures of real rulers."}, {"front": "Why is Chapter XV considered a 'philosophical turning point' in *The Prince*?", "back": "It is where Machiavelli explicitly announces his method, declares his intention to distance himself from prior political philosophy, and sets the stage for the book's practical applications."}, {"front": "How does Machiavelli's approach to political truth differ from the 'imaginary version' he rejects?", "back": "Machiavelli pursues the 'effectual truth' (how rulers actually behave), rejecting the 'imaginary version' which describes ideal states and rulers that exist nowhere in reality."}, {"front": "What warning does Machiavelli give to a prince who tries to practice all virtues in a morally imperfect world?", "back": "A prince who tries to practice all virtues in a world where rivals do not will not become a model of righteousness, but will be destroyed, because political reality is too dangerous and unpredictable."}, {"front": "What does Machiavelli mean by the 'imaginary version of political truth'?", "back": "It refers to the tradition of philosophers and theologians (e.g., Plato's philosopher-king, Augustine's City of God) who described ideal states and rulers based on what *should* be, rather than what *is*."}, {"front": "What is the most famous line from Chapter XV regarding a prince's moral conduct?", "back": "The most famous line is: 'It is necessary to a prince, if he wants to maintain himself, to learn how not to be good, and to use this and not use it according to necessity.'"}, {"front": "Does Machiavelli advocate for a prince to always be 'bad'?", "back": "No, Machiavelli clarifies that a prince must *know how* to be bad—must have this capacity available—and use or withhold it as circumstances (necessity) require, not for its own sake."}, {"front": "According to Machiavelli, what are the potential consequences for a prince who is *always* good or *always* bad?", "back": "A prince who is always good will be exploited and ruined, while a prince who is always bad will be hated and eventually destroyed. Survival depends on choosing appropriately based on circumstances."}, {"front": "What is the significance of *necessità* (necessity) in Machiavelli's view of a prince departing from moral norms?", "back": "Machiavelli states that departing from moral norms is justified *only* by genuine necessity, not by convenience or personal preference, underscoring that such actions are pragmatic requirements for survival."}, {"front": "How did Chapter XV mark a 'moral revolution' in political thought?", "back": "It marked the birth of political science as a discipline independent of ethics, allowing for analysis of what actually produces stability, security, and power, without presupposing that the answer must be morally pure."}, {"front": "Before Machiavelli, what was the prevailing relationship between political philosophy and moral philosophy?", "back": "Before Machiavelli, political philosophy was largely a branch of moral philosophy; the question of how to govern well was inseparable from the question of what constitutes a good person."}, {"front": "When discussing qualities for which princes are praised or blamed, what 'unsettling advice' does Machiavelli offer compared to traditional wisdom?", "back": "While tradition advises cultivating all virtues (e.g., generous, merciful), Machiavelli warns that trying to possess all these qualities at once will ruin a prince, as political reality demands flexibility and sometimes the opposite."}, {"front": "Why does Machiavelli argue that traditional moral codes are unreliable guides for a prince?", "back": "He believes political reality is too varied, dangerous, and unpredictable for any fixed moral code to serve as a reliable guide, necessitating adaptability rather than strict adherence to virtues."}, {"front": "What analogy does Machiavelli use to explain his role as an advisor who focuses on the 'effectual truth'?", "back": "He compares himself to a doctor who tells a patient the truth, even if it's unwelcome, rather than one who tells only what the patient wants to hear, which would be dangerous."}, {"front": "How does Machiavelli differentiate the rules governing the political world from those governing private morality?", "back": "He argues that the political world is not governed by the same rules as private morality, and a ruler who acts as if it were will be crushed by those who understand this difference."}, {"front": "Can moral virtue and political effectiveness sometimes conflict, according to Machiavelli's perspective?", "back": "Yes, Machiavelli's core argument is that doing the 'right thing' (morally virtuous) can sometimes cost a leader power or stability, and doing the 'expedient thing' (politically effective) might require departing from moral norms."}, {"front": "How did Aquinas, following Aristotle, view the relationship between a ruler's virtue and good governance?", "back": "Aquinas argued that the good ruler must be a morally good person, believing that virtue and good governance are inseparable, and that a virtuous king is the best ruler."}, {"front": "What specific examples of 'imaginary' political truth does Machiavelli reference from classical and religious philosophy?", "back": "He refers to Plato's philosopher-king from *The Republic* and Augustine's concept of the City of God, both representing ideal states or rulers that do not exist in the real world."}, {"front": "What is Machiavelli's stated primary intention in writing *The Prince*, as declared in Chapter XV?", "back": "His stated primary intention is 'to write something useful to whoever reads it,' focusing on practical advice derived from the 'effectual truth' of political reality."}, {"front": "When Machiavelli argues for learning 'how not to be good,' is he endorsing cruelty or deception as virtues?", "back": "No, he explicitly states he is not advocating immorality for its own sake, nor that cruelty is a virtue or justice a fiction. He stresses that actions departing from moral norms are justified only by *necessità* (necessity), not by convenience."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
