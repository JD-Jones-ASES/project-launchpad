<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 16, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was Machiavelli's primary intention in writing about a prince's conduct?", "back": "To write something useful for those who understand it."}, {"front": "Machiavelli argues that a writer should follow the \"real truth\" of a matter rather than the _____ of it.", "back": "imagination"}, {"front": "Why does Machiavelli criticize previous writers who \"pictured republics and principalities\"?", "back": "Because those states have never actually been known or seen to exist."}, {"front": "According to Machiavelli, what happens to a person who neglects \"what is done\" for \"what ought to be done\"?", "back": "They bring about their own ruin rather than their preservation."}, {"front": "Why is it dangerous for a man to always act according to \"professions of virtue\"?", "back": "He will be destroyed by the many people who are not virtuous."}, {"front": "What skill must a prince acquire if he wishes to \"hold his own\" in power?", "back": "He must know how to do wrong."}, {"front": "Under what condition should a prince make use of the ability to \"do wrong\"?", "back": "According to necessity."}, {"front": "Why are princes more frequently associated with qualities that bring \"blame or praise\" than ordinary men?", "back": "Because they are more highly placed and visible."}, {"front": "In the Tuscan language, how does Machiavelli define an \"avaricious\" person?", "back": "One who desires to possess things by robbery."}, {"front": "In the Tuscan language, how does Machiavelli define a \"miserly\" person?", "back": "One who deprives himself too much of the use of his own property."}, {"front": "Term: Miserly", "back": "The Tuscan term for someone who is overly frugal with their own possessions, contrasted with an avaricious robber."}, {"front": "According to Machiavelli, what is the opposite quality of being \"liberal\"?", "back": "Miserly."}, {"front": "According to Machiavelli, what is the opposite quality of being \"generous\"?", "back": "Rapacious."}, {"front": "According to Machiavelli, what is the opposite quality of being \"cruel\"?", "back": "Compassionate."}, {"front": "According to Machiavelli, what is the opposite quality of being \"faithless\"?", "back": "Faithful."}, {"front": "According to Machiavelli, what is the opposite quality of being \"effeminate and cowardly\"?", "back": "Bold and brave."}, {"front": "According to Machiavelli, what is the opposite quality of being \"affable\"?", "back": "Haughty."}, {"front": "According to Machiavelli, what is the opposite quality of being \"lascivious\"?", "back": "Chaste."}, {"front": "According to Machiavelli, what is the opposite quality of being \"sincere\"?", "back": "Cunning."}, {"front": "According to Machiavelli, what is the opposite quality of being \"hard\"?", "back": "Easy."}, {"front": "According to Machiavelli, what is the opposite quality of being \"grave\"?", "back": "Frivolous."}, {"front": "According to Machiavelli, what is the opposite quality of being \"religious\"?", "back": "Unbelieving."}, {"front": "Why can a prince NOT entirely possess or observe all the qualities considered \"good\"?", "back": "Human conditions do not permit it."}, {"front": "What is the primary objective of a \"prudent\" prince regarding his own vices?", "back": "To know how to avoid the reproach of those vices that would lose him his state."}, {"front": "How should a prince handle vices that do NOT threaten the loss of his state?", "back": "He should keep from them if possible, but may abandon himself to them if necessary."}, {"front": "When should a prince disregard the \"reproach\" or shame of a particular vice?", "back": "When the state cannot be saved without that vice."}, {"front": "What is the result of a prince following a quality that \"looks like virtue\" but is impractical?", "back": "It would be his ruin."}, {"front": "What is the result of a prince following a quality that \"looks like vice\" but is necessary?", "back": "It brings him security and prosperity."}, {"front": "Machiavelli states that the distance between how one lives and how one _____ to live is vast.", "back": "ought"}, {"front": "The core reason Machiavelli departs from the methods of others is to focus on the \"_____ truth.\"", "back": "real"}, {"front": "What does Machiavelli suggest is the ultimate goal of a prince's conduct?", "back": "His preservation and holding his own."}, {"front": "How does Machiavelli describe the world in which the prince must operate?", "back": "A place where there is \"so much that is evil.\""}, {"front": "Concept: The Effectual Truth", "back": "Definition: Focusing on the actual results and practical realities of political actions rather than idealized or moralistic theories."}, {"front": "Why is it \"most praiseworthy\" for a prince to have good qualities, according to common confession?", "back": "Because they are qualities generally considered good by everyone."}, {"front": "Machiavelli advises that a prince should not be _____ at incurring reproach for vices necessary to save the state.", "back": "uneasy"}, {"front": "Which specific vice does Machiavelli distinguish from \"avarice\" using the Tuscan dialect?", "back": "Miserliness."}, {"front": "If a prince follows everything \"carefully,\" what will he find regarding the appearance of virtue?", "back": "That some things looking like virtue lead to ruin."}, {"front": "How does Machiavelli view the possibility of a perfectly virtuous leader?", "back": "As impossible because human conditions do not allow it."}, {"front": "What is the relationship between \"prudence\" and the \"reproach of vices\"?", "back": "Prudence helps a prince avoid the shame of vices that would cause him to lose power."}, {"front": "Why must a prince be able to use \"wrong\" actions selectively?", "back": "Because acting only with virtue is destructive among evil men."}, {"front": "Which term describes a prince who is \"cunning\" in contrast to being \"sincere\"?", "back": "Cunning."}, {"front": "Which term describes a prince who is \"frivolous\" in contrast to being \"grave\"?", "back": "Frivolous."}, {"front": "Which term describes a prince who is \"haughty\" in contrast to being \"affable\"?", "back": "Haughty."}, {"front": "What does Machiavelli call those who focus on how things \"ought\" to be rather than how they are?", "back": "Those who neglect what is done."}, {"front": "According to the text, a prince must be \"sufficiently _____\" to manage his reputation regarding vices.", "back": "prudent"}, {"front": "What is the outcome of a prince \"abandoning himself\" to vices that do not lose him his state?", "back": "He does so with less hesitation if it is not possible to keep from them."}, {"front": "Machiavelli emphasizes that princes are spoken of chiefly for being \"more highly _____.\"", "back": "placed"}, {"front": "In Machiavelli's view, what is the \"real truth\" regarding the possession of all good qualities?", "back": "They can neither be entirely possessed nor observed."}, {"front": "What is the primary difference between how people live and how they ought to live, according to Machiavelli?", "back": "They are \"far distant\" from each other."}, {"front": "What does Machiavelli say about the \"imagination\" of republics and principalities?", "back": "They have never been known or seen in fact."}, {"front": "The ability to \"make use of\" wrong-doing is governed by the principle of _____.", "back": "necessity"}, {"front": "Which vice does Machiavelli suggest might lead to \"security and prosperity\" if followed?", "back": "Something that looks like vice but serves the state's preservation."}, {"front": "What does Machiavelli think about the tradition of political philosophy that preceded him?", "back": "He breaks decisively with it by choosing real truth over imagination."}, {"front": "What is the specific danger of a prince trying to be entirely virtuous in an evil world?", "back": "Destruction."}, {"front": "Machiavelli writes that princes are \"remarkable for some of those _____ which bring them either blame or praise.\"", "back": "qualities"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
