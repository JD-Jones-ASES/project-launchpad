<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 28, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is 'political realism' according to Machiavelli's legacy?", "back": "It is the tradition of studying politics as it actually is, not as it ought to be, beginning with 'the effectual truth of the matter' rather than idealized models."}, {"front": "How does Machiavelli structure the argument in *The Prince*?", "back": "It divides into four movements: Ch I-XI survey principality types; Ch XII-XIV address military foundations; Ch XV-XXIII explore the prince's personal qualities; Ch XXIV-XXVI apply and conclude, aiming for Italy's liberation."}, {"front": "What is Machiavelli's stance on mercenaries and auxiliaries?", "back": "He insists they are useless or dangerous; a prince must command his own army, built from his own citizens, to have a secure military foundation and be truly sovereign."}, {"front": "Which section of *The Prince* is considered its 'heart' and most famous/disturbing?", "back": "Chapters XV through XXIII, which explore the prince's personal qualities, including learning 'how not to be good,' being feared rather than loved, breaking promises, and prioritizing appearances."}, {"front": "What is a consistently overlooked, yet crucial, argument Machiavelli makes about the prince's foundation?", "back": "He strongly emphasizes popular support, stating that the people are the prince's most important political resource, and the best fortress is not to be hated by them."}, {"front": "What is revealed as the ultimate purpose of *The Prince* in its passionate conclusion (Chapter XXVI)?", "back": "The entire book is directed toward the hope that someone will rise to liberate Italy from foreign domination."}, {"front": "Explain Machiavelli's concept of *virtù* and *fortuna*.", "back": "*Virtù* represents human agency, preparedness, boldness, and adaptability, while *fortuna* refers to circumstances beyond human control. The tension between them means a leader can improve chances but not guarantee outcomes."}, {"front": "What does the metaphor of 'the fox and the lion' represent in political leadership, according to Machiavelli?", "back": "Effective leadership requires both cunning strategy (fox) to understand situations and forceful action (lion) to act decisively, even when morally uncomfortable."}, {"front": "What was a major practical failure regarding Machiavelli's advice in *The Prince*?", "back": "His advice was never taken by the Medici, and Italy remained divided and largely under foreign domination for over three centuries after the book was written."}, {"front": "What is a significant moral and intellectual limitation identified in Machiavelli's writing?", "back": "His gendered language, such as describing fortune as a woman who must be 'beaten and ill-used,' which reflects morally unacceptable attitudes and distracts from the argument."}, {"front": "How does *The Prince* potentially give a distorted picture of Machiavelli's overall political thought?", "back": "Its exclusive focus on principalities overlooks his arguments in *Discourses on Livy* that republican government (free citizens governing themselves) is the strongest and most durable form of political organization."}, {"front": "What did Machiavelli consider *The Prince* to be, rather than a blueprint for an ideal state?", "back": "He saw it as 'medicine for a crisis' facing Italy."}, {"front": "According to Machiavelli, what is the relative difficulty of holding hereditary states versus states governed by previously free cities?", "back": "Hereditary states are easy to keep, whereas states governed by previously free cities are nearly impossible to hold without destroying them."}, {"front": "Why does Machiavelli assert that a prince unable to defend himself through his own resources is not truly sovereign?", "back": "Because military foundations underlie all political power, and true sovereignty requires self-sufficiency in defense, not reliance on others."}, {"front": "According to Machiavelli, what constitutes the greatest danger to a prince?", "back": "Being hated or despised by one's own subjects, which he argues is a greater threat than external enemies."}, {"front": "When was *The Prince* written?", "back": "1513."}, {"front": "What 19th-century European event is mentioned as embodying the balance-of-power politics Machiavelli analyzed?", "back": "The Congress of Vienna (1814–1815)."}, {"front": "What is considered Machiavelli's 'most powerful legacy'?", "back": "The tradition of political realism—the insistence that politics must be understood as it is, not as we wish it were."}, {"front": "Why does Machiavelli suggest it is better for a prince to be feared than loved?", "back": "While both are ideal, fear is more reliable because people are less likely to break promises out of fear of punishment than out of love, which is fickle."}, {"front": "What is Machiavelli's advice regarding a prince's advisors?", "back": "The best advisors are those whose interests align with the prince's own, as they are most likely to provide honest and beneficial counsel."}, {"front": "What does Machiavelli emphasize about appearances versus reality for a prince?", "back": "Appearances matter more than reality; a prince should always appear to possess virtuous qualities, even if he must act contrary to them when necessary for the state's survival."}, {"front": "How did Machiavelli's 'commitment to empirical political analysis' influence later political thought?", "back": "It defined a tradition focusing on how politics *is* rather than *ought to be*, influencing 19th-century Italian realists and 20th-century international relations theorists."}, {"front": "In what fields has Machiavelli's legacy of political realism continued to be influential?", "back": "Political philosophy, international relations theory, and statecraft."}, {"front": "What is the significance of the people being 'the prince's foundation' as an enduring insight?", "back": "It underscores the vital role of popular support and citizen-soldiers for a state's security and anticipates democratic political theory by emphasizing the ultimate political resource."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
