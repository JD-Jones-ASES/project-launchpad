<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, why is it significantly easier to hold a hereditary principality than a new one?", "back": "The prince has fewer reasons to give offense to his subjects."}, {"front": "In Machiavelli's writing, what does the brevity of a chapter usually indicate about the political situation being discussed?", "back": "The situation is ordinary and uncomplicated."}, {"front": "What term describes the general belief among the governed that a ruler has the right to rule?", "back": "Legitimacy."}, {"front": "How does long-standing dynastic rule affect the public's perception of a prince's right to rule?", "back": "The dynasty becomes woven into daily life and is eventually viewed as a fact of nature."}, {"front": "Beyond legitimacy, what are the three interlocking reasons Machiavelli provides for the stability of hereditary states?", "back": "Custom, inertia, and the absence of offense."}, {"front": "In the context of political stability, what is 'inertia'?", "back": "The tendency of people to remain content with the familiar rather than rebelling."}, {"front": "What are the three requirements for a population to overcome inertia and attempt a revolution?", "back": "Energy, coordination, and a compelling reason to risk failure."}, {"front": "Under what condition will subjects typically remain content under a hereditary prince?", "back": "As long as the prince does not actively oppress them."}, {"front": "Machiavelli suggests that stability often rests not on deep loyalty, but on _____.", "back": "Habit."}, {"front": "What level of ability does Machiavelli claim is sufficient for a hereditary prince to maintain his state?", "back": "Ordinary ability."}, {"front": "What is the primary internal danger that can cause a hereditary prince to lose his state?", "back": "His own bad judgment."}, {"front": "A hereditary prince of ordinary ability will maintain his state unless _____.", "back": "Some exceptional and unusual force deprives him of it."}, {"front": "What is Machiavelli's practical rule for a hereditary prince regarding established customs?", "back": "Do not change them unless forced by circumstance."}, {"front": "In what 'technical sense' does Machiavelli act as a conservative?", "back": "He values political stability and recognizes that existing arrangements have proven their effectiveness."}, {"front": "According to Machiavelli, what has a custom demonstrated if it has survived for generations?", "back": "Its usefulness."}, {"front": "What is the primary risk of replacing an established custom with a new one?", "back": "Creating instability for no guaranteed gain."}, {"front": "Concept: The Power of Custom", "back": "Definition: The accumulated weight of habit, tradition, and practice that serves as a powerful force in political life."}, {"front": "What does Machiavelli believe existing institutions represent in terms of historical development?", "back": "Practical wisdom accumulated over time."}, {"front": "Instead of modernization, what is the primary job of a prince who inherits a stable dynasty?", "back": "To maintain the existing system of governance."}, {"front": "What internal impulse is often the greatest enemy of a hereditary prince?", "back": "The desire to reform or modernize."}, {"front": "What are examples of the 'extraordinary and excessive force' that can topple a competent hereditary prince?", "back": "External invasion, catastrophic military defeat, or an economy-destroying plague."}, {"front": "Why does a hereditary prince have a high chance of regaining his state after an external conquest?", "back": "The legitimacy of the old dynasty works in his favor against the occupier."}, {"front": "What resource does the 'memory of the old order' provide to a displaced hereditary prince?", "back": "A catalyst for subjects to rally to the old family during reconquest."}, {"front": "In the architecture of 'The Prince', what is the primary function of the chapter on hereditary principalities?", "back": "To establish a baseline for the 'easy case' of ruling to contrast with the 'new prince'."}, {"front": "Which historical Italian family does Machiavelli use as the primary example of a stable hereditary dynasty?", "back": "The Este family of Ferrara."}, {"front": "For how many centuries did the Este family rule Ferrara, illustrating hereditary stability?", "back": "From the thirteenth century until 1598."}, {"front": "Why might subjects of a conquered hereditary state resent a new occupier even if the old prince was only of 'ordinary ability'?", "back": "They prefer the familiar customs and legitimacy of the established dynasty."}, {"front": "What fundamental advantage does the hereditary prince have that the 'new prince' must create from scratch?", "back": "Established legitimacy and a reservoir of habit and tradition."}, {"front": "The general belief among the governed that a ruler has the right to rule is known as _____.", "back": "Legitimacy."}, {"front": "According to Machiavelli, a prince's job is to maintain the system he inherits, not to _____ it.", "back": "Improve."}, {"front": "How does Machiavelli characterize the relationship between the cost of disruption and political stability?", "back": "Stability is maintained because disruption is costly and the current arrangement is known."}, {"front": "Which later political thinker is mentioned as sharing Machiavelli's view that institutions represent accumulated practical wisdom?", "back": "Edmund Burke."}, {"front": "Why is it harder for an occupier to maintain control over a recently conquered hereditary state?", "back": "Any misfortune the occupier faces provides an opportunity for the legitimate dynasty to return."}, {"front": "What is the relationship between the prince's ability and external enemies in a hereditary state?", "back": "Ordinary ability is sufficient to keep the state unless a massive external force intervenes."}, {"front": "How does the passage of generations affect the perception of a ruling family's right to govern?", "back": "It makes the rule appear to be a 'fact of nature'."}, {"front": "True or False: Machiavelli believes hereditary princes need charismatic leadership to survive.", "back": "False (he states that 'ordinary ability' is sufficient)."}, {"front": "In Machiavellian thought, what is the 'conservative' rationale for valuing political stability?", "back": "Existing arrangements have already demonstrated that they work."}, {"front": "What specific chapters of 'The Prince' focus on the strategies needed for new princes to overcome their lack of tradition?", "back": "Chapters III through XIV."}, {"front": "Why does a hereditary prince have 'fewer reasons to give offense' than a new prince?", "back": "He does not need to seize power or disrupt established lives to establish his authority."}, {"front": "How does custom influence the settling of disputes and collection of taxes in a hereditary state?", "back": "It weaves these processes into the fabric of daily life, making them routine and unquestioned."}, {"front": "What does Machiavelli call a force such as a plague or a great power invasion that can topple a prince?", "back": "Extraordinary and excessive force."}, {"front": "Which group of readers would have known the example of Ferrara firsthand during Machiavelli’s time?", "back": "Florentine readers."}, {"front": "The desire to modernize a state is described by Machiavelli as a hereditary prince's _____.", "back": "Greatest enemy."}, {"front": "In terms of political effort, why is revolution rare in hereditary states?", "back": "The risks of failure and the cost of disruption usually outweigh the reason to rebel."}, {"front": "What baseline does Chapter II provide for the rest of Machiavelli's 'The Prince'?", "back": "It represents the 'easy case' of political rule."}, {"front": "How does the 'memory of the old order' function for a population under a new occupier?", "back": "It acts as a resource for the reconquest of the state by the old dynasty."}, {"front": "According to Machiavelli, a custom that has survived generations has demonstrated its _____.", "back": "Usefulness."}, {"front": "What must a prince avoid doing to ensure his subjects do not hate him?", "back": "He must avoid giving them reasons for offense, such as active oppression."}, {"front": "The rule 'do not change what works' applies specifically to which type of ruler?", "back": "The hereditary prince."}, {"front": "Why is the contrast between the hereditary prince and the new prince central to Machiavelli's book?", "back": "It highlights that the new prince must create through strategy what the hereditary prince receives through tradition."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
