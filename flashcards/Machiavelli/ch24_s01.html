<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 24, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why do flatterers thrive within the environment of a royal court?", "back": "The incentive structure rewards agreement and punishes dissent."}, {"front": "What is the primary short-term goal of a flatterer surrounding a prince?", "back": "To gain the prince's favor."}, {"front": "According to the text, how does a flatterer typically gain favor with a prince?", "back": "By praising the prince's decisions and claiming his plans are excellent."}, {"front": "What 'paradox' does a prince face when he allows flattery to dominate his court?", "back": "He feels well-informed while actually governing in a metaphorical 'fog.'"}, {"front": "How is the information a prince receives filtered when his advisors are flatterers?", "back": "It is filtered through the advisors' desire to please the prince."}, {"front": "In a court of flatterers, what happens to the reporting of risks associated with a prince's plans?", "back": "The risks are systematically downplayed."}, {"front": "What is the consequence of a prince's advisors hiding problems to avoid displeasure?", "back": "The problems are addressed too late or not at all."}, {"front": "Why is a minister who flatters considered to be serving himself rather than the prince?", "back": "He prioritizes his own comfort and the prince's momentary pleasure over effective governance."}, {"front": "What is the 'obvious' but rejected solution to the problem of court flattery?", "back": "Allowing everyone to speak freely and criticize the prince openly."}, {"front": "Why does Machiavelli reject the idea of unlimited freedom of speech for a prince's subjects?", "back": "It causes the prince to lose his authority."}, {"front": "What reputation does a prince acquire if he is seen as available for public correction?", "back": "He becomes a figure of contempt."}, {"front": "How do a prince's decisions appear when they are subject to constant revision by others?", "back": "They appear tentative."}, {"front": "What does a prince's authority dissolve into if it is undermined by public challenge?", "back": "A continuous negotiation."}, {"front": "According to Machiavelli, what happens to other instruments of governance when authority is weakened?", "back": "They all weaken along with the loss of authority."}, {"front": "What is the primary structural challenge Machiavelli identifies regarding honest counsel?", "back": "Receiving honest advice without compromising the prince's authority."}, {"front": "Whom should a prince select as advisors to ensure structured honesty?", "back": "A small number of trusted, capable, and loyal men known for good judgment."}, {"front": "What specific permission must a prince give to his selected advisors?", "back": "The authority to speak frankly only when specifically asked."}, {"front": "Regarding honest counsel, what must advisors understand about their role?", "back": "That providing honest thought is a requirement, not just a permission."}, {"front": "In Machiavelli's solution, what should a prince do after asking for and listening to counsel?", "back": "Deliberate the matter in his own mind."}, {"front": "Why should a prince avoid unsolicited criticism from outside his designated circle?", "back": "To ensure he is not seen as governed by whoever speaks most boldly."}, {"front": "Machiavelli views the choice to receive counsel through proper channels as an act of _____.", "back": "Authority"}, {"front": "What is Machiavelli's 'most important formulation' regarding prudence and counsel?", "back": "Good counsel must arise from the prince's own prudence, not the reverse."}, {"front": "Why can a foolish prince not make effective use of excellent advisors?", "back": "He lacks the judgment to assess their advice or weigh competing recommendations."}, {"front": "According to the text, can wisdom be 'outsourced' to advisors?", "back": "No, the prince's own judgment is the necessary foundation."}, {"front": "What is the role of 'good counsel' in the context of a prince's decision-making process?", "back": "It is merely an input into the prince's own judgment."}, {"front": "Why do princes who rely on flatterers make 'systematic errors'?", "back": "They base their decisions on a chorus of approval rather than reality."}, {"front": "What do princes often mistake for genuine popular support when surrounded by flatterers?", "back": "The approval they receive at court."}, {"front": "What is the primary diagnosis for why the Italian princes lost their states?", "back": "They were surrounded by flatterers and lacked independent judgment."}, {"front": "To use counsel wisely, a prince must develop the ability to recognize when he is being told _____.", "back": "What he wants to hear"}, {"front": "Which chapter in Machiavelli's work focuses on the selection of right ministers?", "back": "Chapter XXII"}, {"front": "How does Chapter XXIII complement Chapter XXII regarding leadership?", "back": "It explains how to create the conditions for honest counsel and use it wisely."}, {"front": "What is the modern parallel of a 'yes-man' in the corporate sector?", "back": "An advisor who avoids conflict by constantly agreeing with the executive."}, {"front": "What is the danger for military commanders who punish subordinates for reporting bad news?", "back": "They will fail to receive the information necessary to adjust their strategies."}, {"front": "In modern democracies, what is the purpose of structural mechanisms that force leaders to hear 'inconvenient truths'?", "back": "To prevent the leader from governing in a 'fog' of filtered information."}, {"front": "True or False: A wise prince is the product of receiving good advice.", "back": "False; good advice is the product of a wise prince."}, {"front": "What happens to a prince's plans when 'reality finally breaks through' the flattery at court?", "back": "The prince is found to be unprepared."}, {"front": "Machiavelli describes the dissolution of authority into negotiation as a result of being _____.", "back": "Subject to revision by anyone bold enough to challenge the prince."}, {"front": "The flatterer is described as not 'intrinsically evil' but rather a product of what?", "back": "The incentive structure of court life."}, {"front": "What specific action should a prince take with his advisors' counsel once he has heard it?", "back": "He should deliberate on it in his own mind to form a final judgment."}, {"front": "Why is 'independent prudence' necessary for a prince when his judgment conflicts with his counsel?", "back": "To allow him to make decisions that reflect his own judgment despite external pressure."}, {"front": "A prince who allows himself to be corrected by anyone is reduced to a figure who is governed by whom?", "back": "Whoever speaks most boldly."}, {"front": "What are the three core qualities Machiavelli suggests for a prince's trusted advisors?", "back": "Capability, loyalty, and good judgment."}, {"front": "Cloze: Flattery filtered through advisors means that problems are raised _____.", "back": "Too late or not at all"}, {"front": "Cloze: According to Machiavelli, a prince's authority is the foundation that prevents his decisions from appearing _____.", "back": "Tentative"}, {"front": "Term: Structured Honesty", "back": "Definition: A system where specific advisors are required to speak frankly only when the prince requests their input."}, {"front": "According to the text, why does a flatterer fail to serve the prince effectively?", "back": "Because the prince needs honest counsel to govern, which the flatterer avoids."}, {"front": "What is the result when a prince is seen as 'available for public challenge'?", "back": "His authority dissolves."}, {"front": "In Machiavelli's system, when should a prince ask his advisors for their opinions?", "back": "When he wants their counsel on specific matters he has chosen."}, {"front": "Why is the Prince's own judgment the 'necessary foundation' for governance?", "back": "Because without it, he cannot effectively weigh or assess the advice he receives."}, {"front": "What core leadership problem is addressed by the 'structural solution' of limited advisors?", "back": "The need for truth versus the need to maintain authority."}, {"front": "If a prince follows a foolish path suggested by flatterers, what usually happens when that plan meets reality?", "back": "The plan collapses."}, {"front": "How does Machiavelli describe the state of a prince's knowledge when surrounded by 'yes-men'?", "back": "Governing in a fog."}, {"front": "What quality must a prince have to override counsel when his own judgment differs?", "back": "Independent prudence."}, {"front": "Why does Machiavelli emphasize that advisors should only speak when asked?", "back": "To ensure the prince remains the source of initiative and maintains his status."}, {"front": "According to the Teacher Note, what does Chapter XXII focus on?", "back": "Choosing the right ministers."}, {"front": "How does flattery affect a prince's perception of his own plans?", "back": "He is told they are excellent, which hides potential flaws."}, {"front": "What is the psychological effect on a prince when his court is filled with agreement?", "back": "He feels well-informed and confident."}, {"front": "What happens to the 'instruments of governance' once a prince's authority is undermined?", "back": "They weaken."}, {"front": "What must advisors be 'known for' before being selected by the prince?", "back": "Good judgment."}, {"front": "According to the text, truth is a 'dangerous' thing in what specific location?", "back": "Royal courts."}, {"front": "Cloze: Only an already _____ prince can make use of good advice.", "back": "Wise"}, {"front": "What does a prince lose if he allows himself to be governed by whoever speaks most boldly?", "back": "His authority."}, {"front": "What determines if a prince can successfully weigh competing recommendations?", "back": "His own independent judgment."}, {"front": "What is the relationship between Chapter XXIII and the failure of Italian princes?", "back": "It provides a partial diagnosis of why they lost their states."}, {"front": "What is the 'short run' benefit for an advisor who agrees with a prince?", "back": "Gaining the prince's favor."}, {"front": "How does the text define a minister who is serving his own comfort?", "back": "A flatterer."}, {"front": "In the modern democratic parallel, what is a leader's 'inner circle' accused of doing?", "back": "Shielding the leader from public opinion."}, {"front": "What must a prince do to ensure advisors tell him what they actually think?", "back": "Explicitly authorize and require frankness."}, {"front": "Why is the prince's authority described as 'the one thing he cannot afford to lose'?", "back": "Because it is the basis for all other instruments of governance."}, {"front": "Concept: The Prince's Prudence", "back": "Definition: The inherent wisdom of a leader that allows them to solicit, assess, and correctly utilize advice from others."}, {"front": "Cloze: Wisdom cannot be _____.", "back": "Outsourced"}, {"front": "What is the outcome when 'reality finally breaks through' for a prince who ignored risks?", "back": "He is found to be unprepared."}, {"front": "According to Machiavelli, what is the 'delicate' problem a prince must solve?", "back": "Obtaining honest counsel without losing authority."}, {"front": "Why is a prince who is subject to public correction considered 'contemptible'?", "back": "His decisions seem weak and up for debate by anyone."}, {"front": "What should a prince do to avoid mistaking court approval for real support?", "back": "Develop independent prudence to assess the truth behind the praise."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
