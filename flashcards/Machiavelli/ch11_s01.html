<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 11, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, what is the fundamental test of a prince's strength?", "back": "Whether the prince can field an army for a pitched battle or must retreat behind walls."}, {"front": "What defines a prince as 'self-sufficient' in a military context?", "back": "Having enough men and money to face any enemy in open battle."}, {"front": "Machiavelli describes a prince who relies on help from allies or mercenaries as being in a state of _____.", "back": "dependency"}, {"front": "Why does Machiavelli regard political or military dependency as dangerous?", "back": "The prince is at the mercy of others rather than controlling his own fate."}, {"front": "Which specific types of soldiers make state dependency even more dangerous?", "back": "Mercenaries and auxiliaries."}, {"front": "What is the recommended strategy for a prince who cannot meet an enemy in open battle?", "back": "Fortify the city and build up reserves of supplies."}, {"front": "Besides physical fortifications, what is the critical internal factor for surviving a siege?", "back": "The loyalty of the people."}, {"front": "How does a prince earn the endurance of his subjects during a prolonged siege?", "back": "By winning their genuine love and governing in their interest."}, {"front": "What is the primary risk of an oppressive prince during a foreign invasion?", "back": "The subjects may open the city gates from the inside."}, {"front": "Which historical entities does Machiavelli use as examples of well-fortified and self-governing communities?", "back": "The free imperial cities of Germany."}, {"front": "Name three specific German free cities mentioned as examples of military readiness.", "back": "Nuremberg, Augsburg, and Frankfurt."}, {"front": "To whom did the German free imperial cities owe direct allegiance?", "back": "The Holy Roman Emperor."}, {"front": "Roughly how many free imperial cities existed in the Holy Roman Empire during Machiavelli's time?", "back": "Sixty."}, {"front": "What aspect of German civic culture does Machiavelli admire for its contribution to security?", "back": "Citizens are armed participants invested in their city's independence."}, {"front": "According to Machiavelli, a fortress is only as strong as the _____ it defends.", "back": "political situation"}, {"front": "In Chapter XX, what does Machiavelli identify as the 'best fortress' for a prince?", "back": "To not be hated by the people."}, {"front": "Machiavelli argues that physical defenses are _____ to good governance, not substitutes for it.", "back": "supplements"}, {"front": "What modern military concept is anticipated by Machiavelli's focus on civic engagement and state survival?", "back": "National resilience"}, {"front": "What is the primary reason an invader might negotiate rather than persist in a long siege?", "back": "Armies on campaign consume enormous resources and may wear out."}, {"front": "How does civic engagement multiply a state's military strength according to Machiavelli?", "back": "It creates a population committed to the state's defense rather than passive subjects."}, {"front": "The German free cities maintained their own _____, levied their own taxes, and conducted their own foreign policy.", "back": "militias"}, {"front": "Why is a prince who is besieged during a popular uprising considered to have 'no real fortress'?", "back": "The enemy is already inside the walls."}, {"front": "What is the central question Machiavelli insists on before discussing how a prince should behave?", "back": "How strong is the state the prince governs?"}, {"front": "In Machiavelli's view, what provides the closest thing to an invulnerable political position?", "back": "The combination of material preparation and popular goodwill."}, {"front": "What distinguishes the 'strong' category of princes from the 'weak'?", "back": "The ability to command resources to field an army and defend territory."}, {"front": "Concept: Reichsstädte", "back": "Imperial cities of the Holy Roman Empire that were self-governing and owed allegiance only to the emperor."}, {"front": "How does Machiavelli describe the position of a prince who must rely on fortifications and the endurance of his people?", "back": "Precarious."}, {"front": "What is the outcome for a prince who has 'alienated his people' during a siege?", "back": "His walls may hold, but his subjects may betray him."}, {"front": "Term: National Resilience", "back": "The capacity of a state and its people to withstand and recover from adversity through civic engagement."}, {"front": "What resource, besides men, does Machiavelli identify as essential for military self-sufficiency?", "back": "Money."}, {"front": "A prince who can hold the _____ in a pitched battle is considered self-sufficient.", "back": "field"}, {"front": "Why were cities like Nuremberg and Frankfurt able to fund substantial defenses?", "back": "They were wealthy trading centers."}, {"front": "What training do citizens of the German free cities regularly undergo?", "back": "Military training for defense and sieges."}, {"front": "Machiavelli’s 'implicit lesson' is that genuine security comes from a population that is _____ in the state's survival.", "back": "invested"}, {"front": "If an invader cannot force a _____ decision, the cost of a campaign may lead them to negotiate.", "back": "quick"}, {"front": "What metaphor does Machiavelli use for a prince who has the people's loyalty?", "back": "A fortress in every heart."}, {"front": "How does Machiavelli characterize the strategy of fortifying a city when a prince cannot fight in the open?", "back": "As a viable strategy that does not lead to despair."}, {"front": "What is the relationship between military self-sufficiency and the prince's control over his fate?", "back": "Self-sufficiency allows the prince to control his own fate."}, {"front": "In Machiavelli's test of strength, what is the 'weaker' alternative to fighting a pitched battle?", "back": "Retreating behind walls and waiting for relief."}, {"front": "The strategy for a weak prince involves building up reserves of supplies and cultivating _____.", "back": "popular loyalty"}, {"front": "Which chapters of 'The Prince' discuss why hired and borrowed soldiers are dangerous?", "back": "Chapters XII and XIII."}, {"front": "German free cities are described as having a combination of wealth, military readiness, and _____.", "back": "civic solidarity"}, {"front": "Why is the test of strength described as 'stark and practical'?", "back": "It focuses on the immediate physical ability to defend territory against attackers."}, {"front": "What do modern military strategists recognize as more difficult to defeat than professional forces alone?", "back": "A population committed to its state's defense."}, {"front": "According to the text, what shapes all of Machiavelli's subsequent advice on a prince's behavior?", "back": "The measure of the state's fundamental strength."}, {"front": "What allows subjects to hold out during hardships that would otherwise lead to surrender?", "back": "The knowledge that the prince governs in their interest."}, {"front": "What is the political status of citizens in German free cities relative to a prince?", "back": "They are armed participants in their own defense, not passive subjects."}, {"front": "A prince who depends on the goodwill of stronger neighbors is considered _____.", "back": "dependent"}, {"front": "Why is the endurance of the people considered a 'precarious position' for a prince?", "back": "It relies on internal variables of loyalty rather than external military dominance."}, {"front": "What is the 'prior question' Machiavelli insists on regarding a prince's governance?", "back": "How strong the state is."}, {"front": "What makes the German free cities 'extremely difficult to conquer'?", "back": "The combination of wealth, readiness, and civic solidarity."}, {"front": "What is the underlying logic that links the German cities to the concept of national resilience?", "back": "Civic engagement multiplies military strength."}, {"front": "True or False: Machiavelli believes physical walls are a substitute for good governance.", "back": "False."}, {"front": "How does Machiavelli define a 'pitched battle' in the context of the fundamental test?", "back": "A battle where the prince meets the enemy in the open field."}, {"front": "What role does 'civic culture' play in the security of Nuremberg and Augsburg?", "back": "It ensures citizens have a personal stake in the city's independence."}, {"front": "Why does dependency on allies make a prince's position dangerous?", "back": "He cannot control his own fate and is subject to the allies' interests."}, {"front": "What is the primary factor that determines if a population will open the gates to an invader?", "back": "Whether the prince has oppressed and alienated them."}, {"front": "What is the 'stark' answer to whether a prince is strong?", "back": "Can he fight a pitched battle or must he retreat behind walls?"}, {"front": "Machiavelli notes that armies on campaign consume _____.", "back": "enormous resources"}, {"front": "What is the goal of a city that can withstand a prolonged siege?", "back": "To wear out the attacker until they negotiate or retreat."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
