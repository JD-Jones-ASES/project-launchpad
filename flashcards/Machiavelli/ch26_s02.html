<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 26, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What central question does Machiavelli address in Chapter XXV of *The Prince* regarding fortune and advice?", "back": "Machiavelli addresses the question: If fortune is so powerful, sweeping princes to power and casting them down regardless of skill, what is the point of all his advice?"}, {"front": "What common opinion regarding world affairs and human agency does Machiavelli acknowledge at the beginning of Chapter XXV?", "back": "Many believe world affairs are governed by fortune and God, rendering human wisdom and effort futile, leading them to conclude that it's unnecessary to labor much in affairs."}, {"front": "How does Machiavelli balance the power of fortune with human free will?", "back": "He states that Fortune is the arbiter of one-half of our actions, but she still leaves us to direct the other half, or perhaps a little less, so as 'not to extinguish our free will.'"}, {"front": "What famous natural disaster does Machiavelli use as a metaphor for fortune's power?", "back": "He compares fortune to one of those raging rivers which, when in flood, overflows the plains, sweeping away trees and buildings."}, {"front": "Explain the analogy Machiavelli draws between controlling a raging river and managing fortune.", "back": "Just as men build defenses and barriers against a raging river when the weather is fair to channel its force, princes should prepare with 'valour' and 'barriers' to resist fortune's power when times are good."}, {"front": "When does fortune 'show her power' according to Machiavelli?", "back": "Fortune shows her power 'where valour has not prepared to resist her,' and turns her forces 'where she knows that barriers and defences have not been raised to constrain her.'"}, {"front": "How does Machiavelli use Italy's political situation as an example of vulnerability to fortune?", "back": "He describes Italy as an 'open country without barriers and without any defence,' unlike Germany, Spain, and France, which explains why it has experienced such great 'changes' (invasions and instability)."}, {"front": "What is the primary reason a prince who relies entirely on fortune is likely to be ruined?", "back": "A prince who relies entirely on fortune is lost when fortune changes, because he has not prepared defenses against its variability."}, {"front": "What key principle does Machiavelli suggest is essential for a prince's success in navigating fortune?", "back": "A prince will be successful who directs his actions 'according to the spirit of the times.'"}, {"front": "How can different methods (e.g., caution vs. haste) lead to the same goal of glory and riches, according to Machiavelli?", "back": "Success depends not on the specific method itself, but on whether that method conforms 'to the spirit of the times.'"}, {"front": "Why is it difficult for men, especially princes, to adapt their methods to changing times?", "back": "Men are not often circumspect enough to accommodate change, partly because they cannot deviate from their natural inclination and partly because past success with one method makes them unwilling to change."}, {"front": "Provide an example of how a 'cautious man' might be ruined by not adapting to changing times.", "back": "A cautious man, when times require an adventurous approach, 'does not know how to do it, hence he is ruined' because he cannot change his conduct with the times."}, {"front": "Who does Machiavelli present as an example of a leader who successfully navigated fortune through impetuous action?", "back": "Pope Julius the Second is cited as an example of someone whose impetuous approach always met with success because 'the times and circumstances conform so well to that line of action.'"}, {"front": "Describe Pope Julius II's first enterprise against Bologna and why his impetuousness was key to its success.", "back": "Despite Venetian and Spanish disagreement and ongoing discussions with France, Julius personally led the expedition with boldness. This impetuous move made others irresolute and compelled the King of France to join him, achieving what cautious planning could not."}, {"front": "What would have been the likely outcome for Pope Julius II if circumstances had required him to act cautiously?", "back": "Machiavelli suggests that if circumstances had arisen which required him to go cautiously, his ruin would have followed, because he would never have deviated from his naturally impetuous ways."}, {"front": "What is Machiavelli's overall conclusion about the relationship between fortune, mankind's ways, and success?", "back": "Fortune is changeful and mankind is steadfast in their ways; men are successful when their ways are in agreement with fortune, but unsuccessful when they fall out of agreement."}, {"front": "What is Machiavelli's personal preference when it comes to being adventurous versus cautious in dealing with fortune?", "back": "He considers that 'it is better to be adventurous than cautious.'"}, {"front": "Explain Machiavelli's controversial metaphor comparing fortune to a woman.", "back": "Fortune is compared to a woman who needs to be 'beaten and ill-use her' to be kept under control. She allows herself to be mastered by the adventurous, violent, and audacious, rather than by those who act coldly or cautiously."}, {"front": "According to Machiavelli, why is fortune more receptive to 'young men'?", "back": "Fortune, being 'woman-like,' is a 'lover of young men' because they are generally 'less cautious, more violent, and with more audacity command her.'"}, {"front": "In Machiavelli's view, what is the ultimate determinant of a prince's long-term success amidst the changing nature of fortune?", "back": "The ability to be sufficiently circumspect to accommodate changes in times and affairs, by adapting one's methods and disposition, rather than remaining fixed in one's natural inclination."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
