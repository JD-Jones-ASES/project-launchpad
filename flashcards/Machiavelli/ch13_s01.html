<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 13, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, what is the material foundation of all political power?", "back": "Military force."}, {"front": "Machiavelli argues that all principalities are built upon which two foundations?", "back": "Good laws and good arms."}, {"front": "Why does Machiavelli prioritize \"good arms\" over \"good laws\" in the sequence of state building?", "back": "Because good laws cannot exist without the force of good arms to support them."}, {"front": "What is the primary reason Machiavelli believes professional soldiers hired for pay lack commitment in battle?", "back": "They do not have the personal stake of defending their own homes and families."}, {"front": "The professional military commanders who led hired companies in Renaissance Italy were known as _____.", "back": "Condottieri"}, {"front": "From which Italian word, meaning \"contract,\" does the term \"condottieri\" derive?", "back": "Condotta"}, {"front": "According to Machiavelli's structural argument, why is mercenary loyalty unreliable?", "back": "Their loyalty evaporates if the money runs out or if the enemy offers a higher payment."}, {"front": "What economic incentive led mercenaries to deliberately prolong wars?", "back": "Long campaigns were more profitable than short, decisive ones."}, {"front": "Why did mercenary captains have an incentive to minimize casualties on both sides during a battle?", "back": "Dead soldiers could not spend wages, and preserving the army kept the \"product\" available for future contracts."}, {"front": "Machiavelli famously describes mercenary forces as \"_____ and dangerous.\"", "back": "Useless"}, {"front": "How do mercenaries negatively impact a state's treasury during times of peace?", "back": "They drain the treasury while providing no active defensive benefit."}, {"front": "Concept: Citizen Army", "back": "Definition: A military force composed of citizens who have a personal stake, such as property and family, in the state's survival."}, {"front": "Why does a citizen soldier resist being bought off by an enemy more effectively than a mercenary?", "back": "An enemy victory implies the soldier's own personal subjugation and loss of property."}, {"front": "What practical military experiment did Machiavelli oversee in 1505–06 as Secretary of the Florentine Republic?", "back": "The organization of a citizen militia to reduce reliance on mercenaries."}, {"front": "Which specific condottiere used his military position to seize power for himself rather than defending his employer?", "back": "Francesco Sforza"}, {"front": "Name three prominent condottieri from the Renaissance whose statues still stand in Italian piazzas.", "back": "Francesco Sforza, Bartolomeo Colleoni, and Federico da Montefeltro."}, {"front": "What event in 1494 demonstrated the immediate collapse of the Italian condottieri system?", "back": "The invasion of Italy by a national French army motivated by genuine military objectives."}, {"front": "Which ancient civilization does Machiavelli cite as an example of a state that fell after relying on mercenaries?", "back": "Carthage (after the Second Punic War)."}, {"front": "How did Rome maintain its military foundation according to Machiavelli's analysis?", "back": "By relying on its own legions rather than hired soldiers."}, {"front": "What was the result of Florence's reliance on mercenaries during its conflict with Pisa?", "back": "The mercenaries failed to achieve victory for Florence."}, {"front": "Machiavelli's Chapter XII serves as a diagnosis for the military and political catastrophe of which specific region?", "back": "Italy"}, {"front": "In which 1521 work did Machiavelli expand his arguments for the citizen-army ideal?", "back": "The Art of War"}, {"front": "How did Machiavelli's military theories influence the American Founders?", "back": "They informed the debate regarding the preference for citizen militias over standing professional armies."}, {"front": "Which part of the US Bill of Rights reflects the Machiavellian suspicion of professional armies divorced from the citizenry?", "back": "The Second Amendment (referencing a \"well-regulated Militia\")."}, {"front": "Why are modern Private Military Contractors (PMCs) compared to Machiavelli's condottieri?", "back": "They are paid for service but lack an intrinsic stake in the outcomes they are paid to secure."}, {"front": "What is the primary risk a prince faces when hiring a highly skilled mercenary commander?", "back": "The commander may use his skill and army to seize the state for himself."}, {"front": "According to Machiavelli, what is the consequence of law existing without force?", "back": "The law is \"empty\" and cannot be sustained."}, {"front": "Which 1470 painting by Paolo Uccello is cited as a depiction of the ordered Renaissance court world?", "back": "Hunt in the Forest"}, {"front": "What structural flaw in the condottieri system led to battles with minimal casualties?", "back": "The lack of interest in decisive victories that would terminate their employment and payroll."}, {"front": "Machiavelli argues that every form of political skill is worthless unless the prince can perform what action?", "back": "Defend his state."}, {"front": "How does the text characterize the results of Machiavelli's 1505–06 Florentine militia experiment?", "back": "Mixed results."}, {"front": "Why is a long campaign considered a \"perversity\" of the mercenary system?", "back": "It prioritizes the financial gain of the soldiers over the strategic goals of the state."}, {"front": "In wartime, what does Machiavelli claim mercenaries often do at the \"crucial moment\"?", "back": "They lose or demand ruinous concessions to continue serving."}, {"front": "What is the core reason Machiavelli believes a prince should lead his own army?", "back": "To ensure the army serves the state's interests rather than a commander's personal ambition."}, {"front": "Which historical power does Machiavelli use to illustrate the success of a state-raised army?", "back": "Rome"}, {"front": "Why are citizen soldiers considered unable to be \"bought off\" compared to professionals?", "back": "They are defending their own liberty and property, which no bribe can fully replace if lost to an enemy."}, {"front": "What is the primary motivation for a French soldier in the 1494 invasion compared to an Italian mercenary?", "back": "The French were motivated by national military objectives rather than just a contract (condotta)."}, {"front": "Which museum houses Paolo Uccello's masterpiece *Hunt in the Forest*?", "back": "The Ashmolean Museum, Oxford."}, {"front": "Machiavelli's transition in Chapter XII is from the classification of states to the study of _____.", "back": "Military force."}, {"front": "According to the \"teachernote,\" what is the commonality between condottieri and modern PMCs regarding alignment?", "back": "Their interests do not necessarily align with those of the states that hire them."}, {"front": "What is the term for a commander of a mercenary company in the 15th century?", "back": "Condottiere"}, {"front": "True or False: Machiavelli believed that if a prince has good laws, he does not need to worry about the quality of his army.", "back": "False"}, {"front": "In the context of the citizen army, what role does property ownership play?", "back": "It provides a material stake that motivates the soldier to fight to the last."}, {"front": "Why does Machiavelli categorize the condottieri system as the cause of Italy's political fragmentation?", "back": "Because their military weakness left Italian states vulnerable to foreign invasion and internal betrayal."}, {"front": "What happened to the condottieri system when faced with a \"real national army\"?", "back": "It collapsed almost immediately."}, {"front": "What did Machiavelli observe regarding the mercenary captains hired by Florence during his diplomatic career?", "back": "Florence was betrayed by one captain after another."}, {"front": "The Republican tradition in political thought was influenced by Machiavelli’s preference for _____ over standing armies.", "back": "Citizen militias"}, {"front": "Under what conditions will mercenary loyalty \"evaporate,\" according to Machiavelli?", "back": "When money runs out or a better offer is made by the enemy."}, {"front": "How does Machiavelli characterize the behavior of mercenaries in peacetime?", "back": "They create political complications and drain resources."}, {"front": "What is the fundamental structural reason Machiavelli attacks the use of mercenaries?", "back": "They fight for money rather than for the state or personal survival."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
