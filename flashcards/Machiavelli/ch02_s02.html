<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, what are the two fundamental classifications for all states that rule over men?", "back": "Republics and principalities."}, {"front": "What is the primary distinction Machiavelli makes between different types of principalities?", "back": "They are either hereditary or new."}, {"front": "How is a hereditary principality defined in the text?", "back": "A state where the ruling family has been long established."}, {"front": "Into what two sub-categories does Machiavelli divide new principalities?", "back": "Entirely new states or members annexed to a hereditary state."}, {"front": "What specific example does Machiavelli provide for an \"entirely new\" principality?", "back": "Milan to Francesco Sforza."}, {"front": "What example does Machiavelli use for a principality annexed as a member to a hereditary state?", "back": "The kingdom of Naples to the King of Spain."}, {"front": "What were the two possible previous conditions of a newly acquired dominion?", "back": "Being accustomed to living under a prince or living in freedom."}, {"front": "By what two types of military force can a prince acquire a new dominion?", "back": "By the arms of the prince himself or the arms of others."}, {"front": "Besides military force, what are the two other factors that lead to the acquisition of a state?", "back": "Fortune or ability (virtù)."}, {"front": "Who rose from the position of condottiere to Duke of Milan through his own ability?", "back": "Francesco Sforza."}, {"front": "Term: Hereditary Principality", "back": "Definition: A principality where the ruling family's power is long established."}, {"front": "Term: Annexed Member", "back": "Definition: A newly acquired territory added to the existing hereditary state of a prince."}, {"front": "Concept: Entirely New Principality", "back": "Definition: A state acquired by a prince who had no previous hereditary claim to it. Example: Milan under Francesco Sforza."}, {"front": "According to the text, the kingdom of Naples was annexed to the state of which ruler?", "back": "The King of Spain."}, {"front": "The principle that all states are either republics or principalities is found in which chapter of \"The Prince\"?", "back": "Chapter I."}, {"front": "Machiavelli describes acquired dominions as being either used to living under a _____ or used to living in freedom.", "back": "Prince."}, {"front": "Francesco Sforza is cited as an example of a prince who gained power through his own _____.", "back": "Ability (virtù)."}, {"front": "In Machiavelli's classification, how would the King of Spain's relationship to Naples be described?", "back": "As an annexed member of a hereditary state."}, {"front": "Machiavelli notes that states can be acquired through the arms of _____ or the arms of the prince himself.", "back": "Others."}, {"front": "What is the alternative to \"ability\" as a means for acquiring a state mentioned at the end of Chapter I?", "back": "Fortune."}, {"front": "Which specific city-state did Francesco Sforza acquire?", "back": "Milan."}, {"front": "True or False: Machiavelli classifies a state annexed to a hereditary dominion as a \"new\" principality.", "back": "True."}, {"front": "In the context of the text, what does the term \"dominion\" refer to?", "back": "States or powers that have held rule over men."}, {"front": "What does Machiavelli call a state that is not a principality?", "back": "A republic."}, {"front": "A prince who acquires a state that was previously self-governing is acquiring a state accustomed to living in _____.", "back": "Freedom."}, {"front": "The acquisition of Milan by Francesco Sforza is Machiavelli's prime example of which type of state?", "back": "An entirely new principality."}, {"front": "What is the relationship between the King of Spain and the territory of Naples in the text?", "back": "Naples was a member annexed to Spain's hereditary state."}, {"front": "Besides \"the arms of others,\" how else might a prince's own military strength be described?", "back": "The arms of the prince himself."}, {"front": "What are the two pairs of methods for state acquisition identified by Machiavelli?", "back": "Own arms/others' arms and fortune/ability."}, {"front": "A state that has been ruled by the same family for a long time is classified as a _____ principality.", "back": "Hereditary."}, {"front": "Does Machiavelli categorize republics as a type of principality?", "back": "No, they are one of two distinct kinds of government."}, {"front": "Which historical figure does Machiavelli identify as a duke who used ability to gain everything?", "back": "Francesco Sforza."}, {"front": "What term is used to describe territories that are \"as it were, members annexed\" to a hereditary state?", "back": "New principalities."}, {"front": "Under what condition is a dominion acquired if it is not accustomed to freedom?", "back": "It is accustomed to living under a prince."}, {"front": "Francesco Sforza's rise to power is an example of acquisition by _____.", "back": "Ability (virtù)."}, {"front": "If a prince inherits a state from his father, what kind of principality is it?", "back": "Hereditary."}, {"front": "If a prince conquers a state using his own troops, he has acquired it by the _____ of the prince himself.", "back": "Arms."}, {"front": "According to Machiavelli, all powers that have held rule over men are either _____ or republics.", "back": "Principalities."}, {"front": "Machiavelli uses the King of Spain as an example of a ruler who _____ a new member to his hereditary state.", "back": "Annexed."}, {"front": "A principality that is not hereditary and not annexed is considered _____ new.", "back": "Entirely."}, {"front": "What is the distinction between acquisition by fortune and acquisition by ability?", "back": "Fortune implies luck or external circumstances, while ability implies the prince's own skill or virtù."}, {"front": "Which classification of state is defined by a lack of previous established rule by the current prince's family?", "back": "New principality."}, {"front": "In Chapter I, how many fundamental kinds of government does Machiavelli identify?", "back": "Two."}, {"front": "Which of Machiavelli's examples represents a transition from a mercenary leader to a ruler?", "back": "Francesco Sforza."}, {"front": "When a prince acquires a state through luck or favorable timing, he is said to have acquired it by _____.", "back": "Fortune."}, {"front": "Can a principality be both new and annexed at the same time?", "back": "Yes, an annexed state is a specific type of new principality."}, {"front": "Which ruler's acquisition of Naples illustrates a composite or annexed state?", "back": "The King of Spain."}, {"front": "If a territory is \"accustomed to live in freedom,\" it was likely previously a _____.", "back": "Republic."}, {"front": "What is the opposite of acquiring a state by the arms of others?", "back": "Acquiring it by the arms of the prince himself."}, {"front": "Machiavelli's distinction between republics and principalities covers all states that \"hold _____ over men.\"", "back": "Rule."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
