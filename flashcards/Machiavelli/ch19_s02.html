<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 19, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to the text, what is the common consensus regarding how a prince should live?", "back": "With integrity and not with craft."}, {"front": "What has been the historical experience regarding princes who 'have done great things'?", "back": "They have held good faith of little account and used craft to circumvent others."}, {"front": "Machiavelli identifies two ways of contesting: the first is by the _____, and the second is by _____.", "back": "law; force"}, {"front": "In Machiavelli's framework, which method of contesting is considered 'proper to men'?", "back": "The law."}, {"front": "In Machiavelli's framework, which method of contesting is considered 'proper to beasts'?", "back": "Force."}, {"front": "Why does Machiavelli argue it is necessary for a prince to 'have recourse' to the method of the beast?", "back": "Because the method of the law is frequently insufficient."}, {"front": "What does the ancient story of Achilles being nursed by the Centaur Chiron figuratively teach princes?", "back": "The necessity of knowing how to use both human and beastly natures."}, {"front": "According to Machiavelli, what happens to a prince who utilizes only one of the two natures (man or beast)?", "back": "Their power is not durable."}, {"front": "When adopting the nature of the beast, which two specific animals must a prince emulate?", "back": "The fox and the lion."}, {"front": "Why is it insufficient for a prince to emulate only the lion?", "back": "The lion cannot defend himself against snares."}, {"front": "Why is it insufficient for a prince to emulate only the fox?", "back": "The fox cannot defend himself against wolves."}, {"front": "In Machiavelli's animal metaphor, what is the primary function of being a 'fox'?", "back": "To discover snares."}, {"front": "In Machiavelli's animal metaphor, what is the primary function of being a 'lion'?", "back": "To terrify the wolves."}, {"front": "Under what specific condition does Machiavelli claim a wise lord 'ought not to keep faith'?", "back": "When observance may be turned against him."}, {"front": "Besides personal disadvantage, what is the second condition under which a prince is not bound to keep a pledge?", "back": "When the reasons that caused him to make the pledge no longer exist."}, {"front": "What pessimistic view of human nature does Machiavelli use to justify a prince breaking his word?", "back": "Men are bad and will not keep faith with the prince."}, {"front": "Machiavelli suggests that a prince will never lack 'legitimate reasons' to excuse what action?", "back": "The non-observance of his promises."}, {"front": "According to the text, which type of prince has 'succeeded best' in modern examples?", "back": "Those who have known best how to employ the fox."}, {"front": "What secondary skill is necessary for a prince who intends to be deceptive?", "back": "To be a great pretender and dissembler."}, {"front": "Why does Machiavelli believe a deceiver will 'always find someone who will allow himself to be deceived'?", "back": "Because men are simple and subject to their present necessities."}, {"front": "Which historical figure is cited as a 'recent example' of a man who did nothing but deceive and always found victims?", "back": "Alexander the Sixth."}, {"front": "How does the text describe Alexander VI's relationship with his own oaths and affirmations?", "back": "He affirmed things with great oaths but observed them less than any other man."}, {"front": "According to the Italian proverb quoted in the text, what was the difference between Alexander and Cesare?", "back": "Alexander never did what he said, and Cesare never said what he did."}, {"front": "Regarding 'good qualities,' what does Machiavelli claim is more useful than actually possessing them?", "back": "Appearing to have them."}, {"front": "Why does Machiavelli argue that always observing good qualities is 'injurious' to a prince?", "back": "It limits the prince's ability to act against those qualities when necessity requires it."}, {"front": "What five specific virtues should a prince 'appear to have' at all times?", "back": "Merciful, faithful, humane, upright, and religious."}, {"front": "A prince should have a mind 'framed' so that if he must change to the opposite of a virtue, he is able to _____.", "back": "know how to do so."}, {"front": "Why is it particularly difficult for a 'new prince' to observe all things for which men are esteemed?", "back": "He is often forced to act contrary to fidelity and religion to maintain the state."}, {"front": "How should a prince's mind respond to the 'variations of fortune'?", "back": "By being ready to turn itself according to the direction the winds of fortune force it."}, {"front": "What is Machiavelli's 'precept' regarding a prince's divergence from 'the good'?", "back": "Do not diverge from it if possible, but know how to do evil if compelled."}, {"front": "According to Machiavelli, which of the five 'appeared' qualities is the most necessary to maintain?", "back": "Religiousness."}, {"front": "Why do most men judge a prince 'more by the eye than by the hand'?", "back": "Because everyone can see the prince, but few come in touch with him."}, {"front": "In a state, why do the few who truly know the prince's character 'dare not oppose' the opinion of the many?", "back": "The many are defended by the majesty of the state."}, {"front": "By what standard are the actions of all men, and especially princes, ultimately judged?", "back": "By the result."}, {"front": "If a prince is successful in 'conquering and holding his state,' how will his means be regarded by the public?", "back": "They will always be considered honest and praised by everybody."}, {"front": "Whom does Machiavelli refer to as 'the vulgar' in the context of political judgment?", "back": "The common people who are taken by appearances and results."}, {"front": "According to Machiavelli, when do the 'few' (the wise) have a place in the world?", "back": "Only when the 'many' (the vulgar) have no ground to rest on."}, {"front": "The unnamed 'prince of the present time' mentioned at the end of the text publicly preaches _____ and _____, though he is hostile to both.", "back": "peace; good faith"}, {"front": "Why, according to Machiavelli, did the unnamed 'prince of the present time' avoid keeping his word?", "back": "Keeping it would have deprived him of his reputation and kingdom many times."}, {"front": "Concept: The Centaur Chiron", "back": "Definition: A mythological teacher who symbolizes the dual necessity of a prince to master both human (law) and animal (force) natures."}, {"front": "Concept: Dissembler", "back": "Definition: A person who conceals their true motives, feelings, or beliefs; a quality Machiavelli deems essential for a prince."}, {"front": "What is the primary danger for a prince who relies 'simply on the lion'?", "back": "He does not understand how to avoid snares/traps."}, {"front": "Machiavelli argues that because men 'will not keep faith with you,' the prince is _____.", "back": "not bound to observe it with them."}, {"front": "How does Machiavelli describe the level of simplicity in mankind regarding deception?", "back": "Men are so simple and subject to present necessities that a deceiver will always find a victim."}, {"front": "According to the text, how many people truly 'know' what a prince is compared to those who 'see' what he appears to be?", "back": "Few really know him, while everyone sees him."}, {"front": "What is the relationship between a prince's public speech and his actual actions, according to the final paragraph?", "back": "A prince may preach peace and faith while acting in ways entirely hostile to both to maintain power."}, {"front": "In the phrase 'the fox to discover the snares and a lion to terrify the wolves,' which animal represents physical strength?", "back": "The lion."}, {"front": "In the phrase 'the fox to discover the snares and a lion to terrify the wolves,' which animal represents cunning/intellect?", "back": "The fox."}, {"front": "True or False: Machiavelli believes a prince should 'diverge from the good' at every opportunity.", "back": "False; he should only do so when 'compelled' by necessity."}, {"front": "What does Machiavelli claim is the result of a prince having and *always* observing all good qualities?", "back": "It is injurious."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
