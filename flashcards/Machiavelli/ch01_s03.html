    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "How was the geopolitical structure of Renaissance Italy described before the 16th century?", "back": "It was a collection of rival city-states and regional powers rather than a unified nation."}, {"front": "Name the five major regional powers that dominated 15th-century Italy.", "back": "Florence, Venice, Milan, Naples, and the Papal States."}, {"front": "What was the primary function of mercenary armies in Renaissance Italy?", "back": "They were hired by city-states to fight their various wars and conflicts."}, {"front": "Which 1454 treaty stabilized relations and maintained a balance of power among the major Italian states?", "back": "The Peace of Lodi."}, {"front": "Which Florentine leader was renowned for using clever diplomacy to maintain the balance of power in Italy?", "back": "Lorenzo the Magnificent."}, {"front": "What event in 1494 shattered the diplomatic balance of the Italian peninsula?", "back": "The invasion of Italy by King Charles VIII of France."}, {"front": "The prolonged conflicts between 1494 and 1559 involving France, Spain, and the Holy Roman Empire are known as the _____.", "back": "Italian Wars."}, {"front": "What was the final geopolitical outcome for Italy at the end of the Italian Wars in 1559?", "back": "Spain became the dominant power and Italian independence effectively ended."}, {"front": "According to Machiavelli, why had the educated rulers of Italy proven helpless against foreign invaders?", "back": "They governed according to a fantasy world of noble principles rather than how power actually works."}, {"front": "The medieval and early Renaissance tradition of giving moral advice to rulers is known as the _____ tradition.", "back": "Mirror for princes (speculum principis)."}, {"front": "What was the core assumption of the 'mirror for princes' genre regarding a ruler's success?", "back": "That political success was a direct consequence of the ruler's moral character and virtue."}, {"front": "Which 1516 work by Erasmus is a famous example of the 'mirror for princes' tradition?", "back": "The Education of a Christian Prince."}, {"front": "In the Aristotelian tradition, what is the primary purpose of the state?", "back": "To foster conditions for human flourishing and make human beings virtuous."}, {"front": "How did Christian political theology, represented by Augustine and Aquinas, view a tyrannical ruler?", "back": "As a sinner who would be punished by God in this life or the next."}, {"front": "The Renaissance intellectual movement focused on recovering Greek and Roman wisdom is called _____.", "back": "Humanism."}, {"front": "Which two Roman historians provided Machiavelli with accounts of republican Rome for his analysis?", "back": "Livy and Polybius."}, {"front": "Define 'Political Realism' as it pertains to Machiavelli's approach.", "back": "The study of how power actually works in practice rather than how it ought to work in an ideal world."}, {"front": "Why does Machiavelli argue that focusing on 'imaginary' states is harmful to a ruler?", "back": "It prevents them from providing useful advice and leads to failure in the real world."}, {"front": "According to Machiavelli, why can a ruler not afford the luxury of consistent moral virtue?", "back": "They are surrounded by enemies and must manage unpredictable crises and conflicting interests."}, {"front": "Machiavelli describes political theorists who ignore the realities of power as writers of _____.", "back": "fairy tales."}, {"front": "What does Machiavelli mean by the term 'verità effettuale'?", "back": "The 'effectual truth' or the practical reality of how things function in politics."}, {"front": "In which chapter of 'The Prince' does Machiavelli introduce the concept of 'verità effettuale'?", "back": "Chapter XV."}, {"front": "Machiavelli compares a political theorist who acknowledges the unpleasant realities of power to a _____.", "back": "doctor."}, {"front": "Why is Machiavelli’s approach to politics not considered nihilism?", "back": "He argues that analysis must be grounded in political reality to be useful, not that morality is meaningless."}, {"front": "Who was the 'new prince' whom Machiavelli observed and used as a primary model for 'The Prince'?", "back": "Cesare Borgia (Duke Valentino)."}, {"front": "Who was the father of Cesare Borgia?", "back": "Pope Alexander VI."}, {"front": "While traditional moralists viewed Cesare Borgia as a monster, Machiavelli viewed him as a model of _____.", "back": "political intelligence in action."}, {"front": "What specific leadership qualities did Machiavelli admire in Cesare Borgia?", "back": "His strategic genius, boldness, and skill at managing both force and appearances."}, {"front": "What is the 'Machiavellian revolution' in the context of political analysis?", "back": "The divorce of political analysis from moral judgment."}, {"front": "What was the primary intellectual source that treated politics as a branch of ethics?", "back": "Aristotle's Politics."}, {"front": "What was the consequence for Italian rulers after the invasion of King Charles VIII?", "back": "Italian independence effectively ended as foreign powers fought over the peninsula."}, {"front": "Machiavelli believed the 'mirror for princes' tradition was flawed because it described rulers who _____.", "back": "did not and could not exist."}, {"front": "Under the 'mirror for princes' tradition, a prince who was pious was assumed to maintain the _____.", "back": "loyalty of his subjects."}, {"front": "What was the 'key question' that Machiavelli believed previous political traditions had asked incorrectly?", "back": "How should a ruler govern?"}, {"front": "Instead of asking what morality requires, Machiavelli asks: 'What _____?'", "back": "actually works."}, {"front": "In Machiavelli's view, why must a ruler sometimes be cruel, deceptive, or ruthless?", "back": "To survive and maintain power in a world where others are not consistently virtuous."}, {"front": "What specific event resulted in the political institutions of Florence being 'repeatedly overturned'?", "back": "The Italian Wars."}, {"front": "Machiavelli's use of examples from Roman history illustrates his background in which intellectual movement?", "back": "Humanism."}, {"front": "How does Machiavelli differentiate his use of the classical tradition from other humanists?", "back": "He uses the classical tradition to reach conclusions that are very 'un-humanist'."}, {"front": "According to the text, the 'effectual truth' is contrasted against versions of political reality that are _____.", "back": "imaginary."}, {"front": "Cesare Borgia is used as an example of a ruler who used _____ as routine tools of statecraft.", "back": "deception and betrayal."}, {"front": "What was the ultimate outcome of Cesare Borgia's political career?", "back": "It ended in failure, despite Machiavelli's admiration for his methods."}, {"front": "What is the literal translation of the Latin phrase 'speculum principis'?", "back": "Mirror for princes."}, {"front": "In the Christian tradition of political theology, a ruler who governed justly was said to be _____.", "back": "serving God's purposes."}, {"front": "What did the Peace of Lodi maintain for much of the fifteenth century?", "back": "A rough balance of power among the major Italian city-states."}, {"front": "Which major European powers fought for control of Italy during the Italian Wars?", "back": "France, Spain, and the Holy Roman Empire."}, {"front": "Machiavelli argues that a doctor who refuses to acknowledge disease is like a theorist who refuses to acknowledge _____.", "back": "what power actually requires."}, {"front": "Why does Machiavelli emphasize the importance of strategic clarity over moral character?", "back": "Because the real world of politics is defined by survival and results rather than virtue."}, {"front": "What role did Machiavelli hold that allowed him to observe Cesare Borgia directly?", "back": "He was on diplomatic missions for Florence in 1502–03."}, {"front": "In the context of Machiavelli's thought, what does the term 'ruthless' often refer to?", "back": "The willingness to act decisively, including the use of force or betrayal, to achieve political goals."}, {"front": "What was the significance of the year 1559 in the context of the Italian Wars?", "back": "It marked the end of the wars and the beginning of Spanish dominance in Italy."}, {"front": "According to Machiavelli, the 'fantasy world' of Italian rulers led to what intellectual failure?", "back": "The failure to analyze politics based on how power actually works."}, {"front": "How does Machiavelli's focus on Borgia represent a shift in political thought?", "back": "It shifts the focus from the ruler’s moral character to their strategic methods."}, {"front": "In political realism, what is the ultimate test of a ruler's advice?", "back": "Whether the advice is useful and works in the real world."}, {"front": "The assumption that good governance follows from moral virtue was the cornerstone of which tradition?", "back": "The mirror-for-princes tradition."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
