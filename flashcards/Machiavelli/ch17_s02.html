    <script>

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 17, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "According to Machiavelli's Chapter XVI, what are the two opposed qualities regarding wealth management?", "back": "Liberality (generosity) and parsimony (frugality or meanness)."}, {"front": "What is the primary risk of exercising liberality in a way that is 'honest' and quiet?", "back": "It may remain unknown, leaving the prince with the negative reputation of its opposite."}, {"front": "To maintain a public reputation for liberality, what must a prince avoid neglecting?", "back": "Any attribute of magnificence."}, {"front": "What is the inevitable financial outcome for a prince who attempts to maintain a reputation for liberality?", "back": "He will consume all his property and be forced to heavily tax his subjects."}, {"front": "How does heavy taxation to fund liberality affect the prince's relationship with his subjects?", "back": "It makes him odious (hateful) to them."}, {"front": "According to Machiavelli, what happens to a prince's value when he becomes poor through excessive spending?", "back": "He becomes little valued by anyone."}, {"front": "Why is a liberal prince particularly vulnerable to the 'very first trouble' or danger?", "back": "He has offended many subjects while only rewarding a few with his spending."}, {"front": "What reputation does a prince immediately incur if he tries to stop his excessive spending to avoid poverty?", "back": "The reproach of being miserly."}, {"front": "Why should a wise prince not fear the reputation of being mean?", "back": "Because his economy will provide enough revenue for defense and state enterprises without taxing the people."}, {"front": "In Machiavelli's view, how does a frugal prince exercise liberality toward 'the many'?", "back": "By not taking wealth from the numberless people through taxes."}, {"front": "To whom does a frugal prince show 'meanness'?", "back": "The few individuals to whom he does not give gifts or rewards."}, {"front": "Which historical figure used a reputation for liberality to reach the papacy but abandoned it to fund wars?", "back": "Pope Julius II."}, {"front": "How did Pope Julius II fund his wars without extraordinary taxes?", "back": "Through his long-term thriftiness and accumulated resources."}, {"front": "Which monarch's success in enterprises is attributed to not being 'reputed liberal'?", "back": "The King of Spain."}, {"front": "Under what condition is meanness considered a vice that actually 'enables' a prince to govern?", "back": "If it prevents him from robbing subjects, becoming poor, or becoming rapacious."}, {"front": "In what specific phase of power is a reputation for liberality 'very necessary'?", "back": "When a person is on the way to becoming a prince."}, {"front": "Why is liberality dangerous for a leader who is already a 'prince in fact'?", "back": "It destroys the financial stability of the government if not moderated."}, {"front": "What historical leader obtained empire through liberality but would have destroyed his government if he had not moderated his expenses?", "back": "Julius Caesar."}, {"front": "In what situation must a prince 'not neglect any opportunity for liberality'?", "back": "When he is spending the property of others, such as during war."}, {"front": "Why is liberality essential for a prince leading an army in the field?", "back": "Soldiers will not follow a leader who does not allow them to share in pillage and sack."}, {"front": "Name three leaders Machiavelli cites as 'ready givers' of wealth that was not their own.", "back": "Cyrus, Caesar, and Alexander."}, {"front": "How does squandering the property of others affect a prince's reputation?", "back": "It adds to his reputation rather than injuring it."}, {"front": "According to Machiavelli, what is the only type of spending that truly injures a prince?", "back": "Squandering his own resources."}, {"front": "Why does Machiavelli argue that liberality 'wastes so rapidly'?", "back": "The act of giving away resources causes the prince to lose the power to continue giving."}, {"front": "What are the two primary negative states a prince must guard against above all else?", "back": "Being despised and being hated."}, {"front": "How can liberality lead a prince to become 'hated'?", "back": "By forcing him to become rapacious and tax his subjects to avoid poverty."}, {"front": "Which is preferable: a reputation for meanness or a reputation for rapacity?", "back": "Meanness, because it brings reproach without hatred."}, {"front": "Why does a reputation for rapacity bring 'reproach with hatred'?", "back": "Because it involves taking property from others to maintain a name for liberality."}, {"front": "Cloze: Machiavelli notes that apparent virtues can become genuine _____, and apparent vices genuine _____.", "back": "vices; virtues"}, {"front": "Term: Rapacity", "back": "Definition: The act of seizing property or resources by force or greed, often leading to hatred from subjects."}, {"front": "According to the text, why have only those considered 'mean' done great things in Machiavelli's time?", "back": "Their thriftiness allowed them to fund major actions without exhausting the state or ruining the people."}, {"front": "Concept: The Paradox of Generosity", "back": "Definition: Exercising generosity depletes the resources needed to be generous, eventually leading to greed and loss of power."}, {"front": "How does the prince's ability to 'defend himself' relate to his reputation for meanness?", "back": "Sparing expenses allows him to fund a defense without needing to impose extraordinary burdens on the public."}, {"front": "What is the 'reproach' associated with meanness, according to the final paragraph?", "back": "A reputation for being stingy or tight-fisted that does not inspire active hatred."}, {"front": "Why does Machiavelli distinguish between 'your own' property and 'others' property' when discussing liberality?", "back": "Spending one's own leads to ruin, while spending others' (pillage) strengthens the prince's standing with his army."}, {"front": "If a prince is wise, why should he hold a reputation for meanness of 'little account'?", "back": "It is one of the vices that provides the practical means to govern effectively."}, {"front": "What emotional reaction is triggered by a prince who 'offends many and rewards few'?", "back": "He becomes vulnerable to the first sign of danger or trouble."}, {"front": "Under what circumstance does a prince become 'abject'?", "back": "When he becomes poor as a result of uncontrolled liberality."}, {"front": "Cloze: A prince should avoid the name of liberal if it requires him to _____ his people.", "back": "tax"}, {"front": "What does Machiavelli suggest is the result of a prince recognizing his own financial ruin and 'wishing to draw back'?", "back": "He immediately faces the accusation of being a miser."}, {"front": "How does a prince's 'thriftiness' act as a form of liberality toward the general public?", "back": "It allows him to engage in enterprises without taking from the common citizen."}, {"front": "In the context of the King of Spain, what did 'reputed liberal' status represent for potential success?", "back": "An obstacle that would have prevented him from undertaking or conquering in many enterprises."}, {"front": "What differentiates 'meanness' from 'rapacity' in terms of social consequences?", "back": "Meanness results in disapproval without hatred, whereas rapacity results in disapproval coupled with active hatred."}, {"front": "According to Machiavelli, why was Caesar's liberality 'necessary'?", "back": "It was essential for his rise to pre-eminence in Rome before he held absolute power."}, {"front": "What is the primary danger for a prince who goes forth with his army and does not practice liberality with loot?", "back": "He will not be followed by his soldiers."}, {"front": "Cloze: It is wiser to have a reputation for _____ which brings reproach without hatred.", "back": "meanness"}, {"front": "Why is 'magnificence' a trap for a ruler's treasury?", "back": "It requires the prince to spend lavishly on all visible attributes to sustain a specific public image."}, {"front": "What is the outcome for a prince who becomes 'despised'?", "back": "He loses his value and authority in the eyes of everyone."}, {"front": "How does Machiavelli describe the 'reproach of its opposite' regarding quiet liberality?", "back": "A ruler who is genuinely generous but not publicly known as such will still be criticized for being stingy."}, {"front": "What is the relationship between 'long thriftiness' and 'extraordinary tax'?", "back": "Thriftiness allows a ruler to avoid imposing extra taxes during times of war."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
