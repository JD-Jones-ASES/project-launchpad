<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Chapter VI of The Prince, what is the most difficult way for a man to become a prince?", "back": "Creating a new principality entirely through one's own ability without inherited advantage."}, {"front": "Which four historical figures does Machiavelli identify as the greatest founders who created political order through virtù?", "back": "Moses, Cyrus, Romulus, and Theseus."}, {"front": "What common pattern did Machiavelli identify in the circumstances faced by Moses, Cyrus, Romulus, and Theseus?", "back": "Each faced a crisis of maximum suffering that created a moment of maximum opportunity."}, {"front": "In Machiavelli's view, what served as the \"raw material\" from which the great founders built political order?", "back": "The suffering and crisis of the people."}, {"front": "What was the specific crisis Moses faced before founding his new order?", "back": "He found the people of Israel enslaved and dispossessed."}, {"front": "Under whose rule did Cyrus find the Persians discontented?", "back": "The Medes."}, {"front": "What condition did Romulus find Rome in at the time of its founding?", "back": "Chaos."}, {"front": "In what state did Theseus find the Athenians before establishing order?", "back": "They were scattered."}, {"front": "Term: Fortuna", "back": "Definition: The opportunity or right circumstances provided by the moment."}, {"front": "How does Machiavelli describe the outcome if a leader has talent (virtù) but lacks opportunity (fortuna)?", "back": "Their talents would be wasted."}, {"front": "How does Machiavelli describe the outcome if a leader has opportunity (fortuna) but lacks talent (virtù)?", "back": "The opportunity would come in vain."}, {"front": "According to Machiavelli, what is the result of the interaction between virtù and fortuna?", "back": "Historical transformation."}, {"front": "In the context of a great founder, what does the quality of 'Vision' entail?", "back": "The ability to see what a transformed political order could look like."}, {"front": "How does Machiavelli define 'Decisiveness' for a founder?", "back": "The willingness to act on a vision immediately without waiting for perfect conditions."}, {"front": "Why does a founder require 'Arms' according to Chapter VI?", "back": "To impose the new order and defend it against resistance."}, {"front": "What does 'Endurance' represent in Machiavelli's analysis of virtù?", "back": "The ability to survive backlash and build after initial enthusiasm fades."}, {"front": "How did the great founders achieve success regarding their environment?", "back": "They imposed their will on unfavorable conditions."}, {"front": "What qualification does Machiavelli give for Moses that distinguishes him from Cyrus, Romulus, and Theseus?", "back": "He was a mere executor of things ordered by God."}, {"front": "Why was Machiavelli's grouping of Moses with Cyrus, Romulus, and Theseus considered scandalous in 1513?", "back": "It treated a biblical figure as a secular political actor subject to the same analysis as pagan founders."}, {"front": "According to the text, what merit does Machiavelli explicitly grant Moses regarding his relationship with the divine?", "back": "The grace which made him worthy to speak with God."}, {"front": "Machiavelli’s famous epigram states: “All _____ prophets have conquered, and the _____ ones have been destroyed.”", "back": "armed; unarmed"}, {"front": "Who is Machiavelli's primary historical example of an \"unarmed prophet\"?", "back": "Girolamo Savonarola."}, {"front": "What was the religious and political role of Girolamo Savonarola in Florence?", "back": "He was a Dominican friar who ruled the city and implemented moral reforms."}, {"front": "During what years did Girolamo Savonarola rule Florence?", "back": "1494–1498."}, {"front": "Which ruling family was expelled from Florence when Savonarola took power?", "back": "The Medici."}, {"front": "What was the 1497 event where Savonarola organized the destruction of books, cosmetics, and artworks?", "back": "The Bonfire of the Vanities."}, {"front": "What specific action by Pope Alexander VI led to the collapse of Savonarola's support?", "back": "Excommunication."}, {"front": "What was the ultimate fate of Girolamo Savonarola in 1498?", "back": "He was arrested, tortured, hanged, and burned."}, {"front": "Where was Girolamo Savonarola executed?", "back": "The Piazza della Signoria."}, {"front": "According to Machiavelli, why cannot ideas or moral authority alone sustain political power?", "back": "Because people are fickle and will abandon a leader when things go wrong."}, {"front": "What does Machiavelli claim is the \"ultimate guarantee\" of political survival?", "back": "Military force."}, {"front": "Machiavelli states there is nothing more difficult to plan than to institute a _____.", "back": "new order"}, {"front": "Why do reformers face \"concentrated opposition\" when instituting a new order?", "back": "Because those who benefited from the old order become determined enemies."}, {"front": "How does Machiavelli characterize the support from those who would benefit from a new order?", "back": "As timid supporters."}, {"front": "What is required to overcome the asymmetry between determined enemies and timid supporters of a new order?", "back": "Armed force."}, {"front": "From which city did Girolamo Savonarola originate?", "back": "Ferrara."}, {"front": "How did Machiavelli's personal experience inform his view of Savonarola?", "back": "He watched Savonarola's rise and fall as a young Florentine official."}, {"front": "In Machiavelli's pantheon, what is the relationship between a founder's talent and the crisis they face?", "back": "The founder's talent gives lasting form to the opportunity created by the crisis."}, {"front": "What specific religious discipline did Savonarola impose on Florentine life?", "back": "Apocalyptic prophecy and rigorous moral reform."}, {"front": "Why is instituting a new order considered \"doubtful of success\"?", "back": "Due to the combination of fierce enemies from the old system and weak supporters of the new one."}, {"front": "According to Machiavelli, what is the role of religion in the political success of Moses?", "back": "It provides a context or divine commission, but the political mechanics of his success remain the same as secular founders."}, {"front": "How does Machiavelli describe the reliability of a population's belief in a prophet?", "back": "They believe when things go well but are easily swayed to abandon the prophet in times of trouble."}, {"front": "What is the primary reason Savonarola is described as \"politically doomed\"?", "back": "He lacked an army to protect his position when support collapsed."}, {"front": "What artistic work by Guido Reni is mentioned in the context of Chapter VI?", "back": "Moses with the Tablets of the Law."}, {"front": "In Chapter VI, Machiavelli shifts his focus away from hereditary princes to those who must create principalities through _____.", "back": "their own arms"}, {"front": "What does Machiavelli call the ability to recognize and seize the right moment for political change?", "back": "Virtù."}, {"front": "Why did Savonarola organize the burning of mirrors and cosmetics?", "back": "He viewed them as immoral vanities."}, {"front": "In Machiavelli's analysis, what is the outcome for a leader who relies solely on moral authority?", "back": "They are destroyed when people no longer believe in them."}, {"front": "What is the chronological context of Machiavelli writing about Moses's political virtù?", "back": "The year 1513."}, {"front": "According to the text, what is the founder's role in relation to the people's suffering?", "back": "The founder ends the suffering by using it as a catalyst to build order."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
