<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 10, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the defining characteristic of a 'civil principality'?", "back": "A leading citizen becomes prince through the favor of his fellow citizens rather than wickedness or violence."}, {"front": "According to Machiavelli, what quality is more necessary than genius or fortune to attain a civil principality?", "back": "A happy shrewdness."}, {"front": "Which two distinct 'parties' does Machiavelli claim are found in every city?", "back": "The common people and the nobles."}, {"front": "What is the primary desire of the common people in any city?", "back": "To not be ruled or oppressed by the nobles."}, {"front": "What is the primary desire of the nobles in any city?", "back": "To rule and oppress the people."}, {"front": "What three results can arise from the 'opposite desires' of the people and the nobles?", "back": "A principality, self-government, or anarchy."}, {"front": "Why do the nobles 'cry up the reputation' of one of their own to make him a prince?", "back": "To give vent to their own ambitions under his shadow."}, {"front": "Why do the common people 'cry up the reputation' of one of their own to make him a prince?", "back": "To be defended by his authority against the nobles."}, {"front": "Why is a prince who is aided by the nobles more difficult to maintain than one aided by the people?", "back": "He is surrounded by individuals who consider themselves his equals."}, {"front": "What is the structural advantage of a prince who reaches sovereignty by popular favor?", "back": "He finds himself alone with few or none who are not prepared to obey him."}, {"front": "How does the 'righteousness' of the people's objective compare to that of the nobles?", "back": "The people's objective is more righteous because they only seek to avoid oppression."}, {"front": "Why can a prince never secure himself against a hostile common people?", "back": "Because they are too many in number."}, {"front": "Why is it easier for a prince to secure himself against hostile nobles than against the people?", "back": "The nobles are few in number."}, {"front": "What is the worst outcome a prince should expect from a hostile populace?", "back": "To be abandoned by them."}, {"front": "What two things must a prince fear from hostile nobles in times of trouble?", "back": "That they will abandon him and rise against him."}, {"front": "Why are nobles considered more dangerous than the people in political crises?", "back": "They are more far-seeing and astute, acting early to save themselves and obtain favors."}, {"front": "In what way is a prince's relationship with the common people more permanent than his relationship with nobles?", "back": "He must always live with the same people, but he can make or unmake nobles daily."}, {"front": "How should a prince treat nobles who bind themselves entirely to his fortune and are not rapacious?", "back": "They ought to be honored and loved."}, {"front": "What are the two reasons nobles might fail to bind themselves to a prince's fortune?", "back": "Pusillanimity (natural lack of courage) or their own ambitious ends."}, {"front": "How should a prince utilize nobles who lack the courage to bind themselves to him?", "back": "He should make use of those with good counsel so he can honor them in prosperity."}, {"front": "How should a prince view nobles who do not bind themselves to him because of personal ambition?", "back": "He should fear them as if they were open enemies."}, {"front": "What is the primary requirement for a prince who gains power through the favor of the people?", "back": "To keep them friendly."}, {"front": "What is the first priority of a prince who gains power through the favor of the nobles?", "back": "To win the people over to himself."}, {"front": "Why are the people 'bound more closely' to a prince who takes them under his protection after they expected evil from him?", "back": "Because men feel more devoted to a benefactor from whom they expected harm."}, {"front": "Why is it necessary for a prince to have the people friendly in times of adversity?", "back": "Without their friendship, he has no security."}, {"front": "What allowed Nabis, Prince of the Spartans, to defend his government against all Greece and a Roman army?", "back": "He had made himself secure against a few nobles and did not have a hostile populace."}, {"front": "Under what condition does Machiavelli claim the proverb 'He who builds on the people, builds on the mud' is actually true?", "back": "When a private citizen relies on the people to free him from oppression by magistrates or enemies."}, {"front": "Which two Roman and Florentine examples are cited to illustrate the failure of private citizens building on the people?", "back": "The Gracchi in Rome and Messer Giorgio Scali in Florence."}, {"front": "What qualities in a prince ensure he is not 'deceived' by relying on the people?", "back": "Courage, energy, resolution, and the ability to keep the people encouraged."}, {"front": "When are civil principalities most liable to danger?", "back": "When they are passing from a civil to an absolute order of government."}, {"front": "Why is a government 'weaker and more insecure' when a prince rules through magistrates?", "back": "It rests entirely on the goodwill of the citizens serving in the magistracy."}, {"front": "How can magistrates destroy a government in 'troubled times'?", "back": "By either intrigue or open defiance."}, {"front": "Why is absolute authority difficult for a prince to exercise during a 'tumult'?", "back": "The citizens are accustomed to receiving orders from magistrates and will not obey the prince amid confusion."}, {"front": "Why is a prince's observation of his citizens' loyalty in 'quiet times' often misleading?", "back": "Everyone agrees with the state when death is far distant, but few are found when the state needs them."}, {"front": "What is the 'dangerous experiment' regarding citizen loyalty that a prince can only try once?", "back": "Testing the faithfulness of citizens in troubled times when they are no longer in need of the state."}, {"front": "What course of action ensures that citizens will always remain faithful to a wise prince?", "back": "Ensuring the citizens always have need of the state and the prince in every circumstance."}, {"front": "In Chapter IX, what does Machiavelli conclude is the safest foundation for a prince: the great or the common people?", "back": "The common people."}, {"front": "The ability of a prince to 'give or take away authority' at will refers to his relationship with which group?", "back": "The nobles."}, {"front": "Why does Machiavelli advise a prince to fear ambitious nobles 'especially in adversity'?", "back": "They always help to ruin him during those times."}, {"front": "According to Machiavelli, why is it easy for a prince to keep the people friendly?", "back": "They only ask not to be oppressed."}, {"front": "Term: Civil Principality.", "back": "A state established through the favor of fellow citizens, requiring happy shrewdness rather than mere wickedness."}, {"front": "What distinguishes the 'pusillanimity' of certain nobles from the 'ambitious ends' of others?", "back": "Pusillanimity is a natural lack of courage, whereas ambitious ends reflect a calculated choice to prioritize themselves over the prince."}, {"front": "Why is the transition from ruling through magistrates to ruling personally described as 'dangerous'?", "back": "The prince lacks a scarcity of men he can trust in the resulting confusion."}, {"front": "How does Machiavelli describe the behavior of citizens toward the state 'when death is far distant'?", "back": "They all promise and wish to die for the prince."}, {"front": "Which party creates a prince to 'shadow' their own ambitions?", "back": "The nobles."}, {"front": "According to Machiavelli, why are nobles 'more far-seeing' than the common people?", "back": "They are more astute in political affairs and act to protect their interests ahead of time."}, {"front": "What is the primary reason a prince supported by nobles cannot 'rule or manage them to his liking'?", "back": "They consider themselves his equals."}, {"front": "If a prince is raised to power by the nobles, what is his first duty to ensure security?", "back": "To win over the common people."}, {"front": "What happens to the prince's ability to exercise absolute authority during a transition from civil government in 'troubled times'?", "back": "It is diminished because subjects are used to obeying magistrates rather than him."}, {"front": "According to the text, a prince's security in adversity is dependent on what?", "back": "Having the common people as his friends."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
