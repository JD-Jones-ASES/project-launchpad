<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 12, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In Machiavelli's analysis, which specific type of principality is described as being uniquely \"secure and happy\"?", "back": "Ecclesiastical principalities."}, {"front": "How are ecclesiastical principalities typically acquired before they are possessed?", "back": "By capacity or good fortune."}, {"front": "What force sustains ecclesiastical principalities, regardless of how the prince behaves or lives?", "back": "Ancient ordinances of religion."}, {"front": "According to Machiavelli, why is it unnecessary for ecclesiastical princes to defend their states?", "back": "Because the states are sustained by all-powerful religious ordinances."}, {"front": "What paradox does Machiavelli observe regarding the subjects of an ecclesiastical prince?", "back": "The prince has subjects but does not rule them."}, {"front": "Why do the subjects of an ecclesiastical state not attempt to \"alienate themselves\" from their prince?", "back": "They have neither the desire nor the ability to do so."}, {"front": "Why does Machiavelli initially state he will not discuss the maintenance of ecclesiastical states in detail?", "back": "They are exalted and maintained by God, beyond the reach of the human mind."}, {"front": "Before King Charles of France entered Italy, which five powers shared dominion over the country?", "back": "The Pope, the Venetians, the King of Naples, the Duke of Milan, and the Florentines."}, {"front": "What was the primary goal of Italian potentates regarding foreign powers before the French invasion?", "back": "To ensure no foreigner entered Italy under arms."}, {"front": "Which two Italian powers were the primary source of anxiety for the other potentates?", "back": "The Pope and the Venetians."}, {"front": "What political strategy was required to restrain the Venetians in pre-invasion Italy?", "back": "The union of all other Italian powers."}, {"front": "How did Italian potentates historically keep the power of the Pope \"weak and powerless\"?", "back": "By utilizing the internal Roman factions of the barons."}, {"front": "Identify the two main rival factions of Roman barons mentioned by Machiavelli.", "back": "The Orsini and the Colonnesi."}, {"front": "Why did the short average lifespan of a Pope (ten years) contribute to the Church's temporal weakness?", "back": "It was insufficient time to fully suppress a rival faction."}, {"front": "Which Pope first demonstrated that a pontiff could succeed through the use of \"money and arms\"?", "back": "Alexander VI."}, {"front": "Through which \"instrumentality\" did Alexander VI carry out his actions to expand power?", "back": "Duke Valentino (Cesare Borgia)."}, {"front": "What was the unintended long-term result of Alexander VI's efforts to aggrandize Duke Valentino?", "back": "The greatness of the Church."}, {"front": "Who became the \"heir to all the labours\" of Alexander VI and Duke Valentino?", "back": "The Church."}, {"front": "What major territory did Pope Julius II find the Church in possession of at the start of his reign?", "back": "The Romagna."}, {"front": "What financial practice did Julius II inherit and improve upon from Alexander VI's time?", "back": "A method to accumulate money never practiced before."}, {"front": "What were the three primary military and political objectives of Pope Julius II?", "back": "To gain Bologna, ruin the Venetians, and drive the French from Italy."}, {"front": "How did the motivations of Julius II differ from those of Alexander VI regarding Church expansion?", "back": "Julius sought to strengthen the Church rather than any private person."}, {"front": "How did Julius II manage the Orsini and Colonnesi factions during his papacy?", "back": "He kept them within the bounds he found them."}, {"front": "According to Machiavelli, what specific office allows Roman factions to foster disorders?", "back": "The office of Cardinal."}, {"front": "Why do the Roman barons feel compelled to support the internal factions of the Church?", "back": "Because the Cardinals foster the factions and the barons must support their leaders."}, {"front": "Who was the Pope at the time Machiavelli concluded his survey in Chapter XI?", "back": "Pope Leo X."}, {"front": "What qualities did Machiavelli hope would make Pope Leo X's pontificate venerated?", "back": "His goodness and infinite other virtues."}, {"front": "Cloze: Machiavelli states that ecclesiastical principalities are unique because their princes have states and do not _____ them.", "back": "defend"}, {"front": "Cloze: Before Alexander VI, the Italian potentates valued the _____ power of the Church very slightly.", "back": "temporal"}, {"front": "Under whose papacy were the Roman barons finally \"reduced to impotence\"?", "back": "Julius II (following the actions of Alexander VI)."}, {"front": "What was the primary anxiety of Italian states regarding their neighbors in the pre-French period?", "back": "That none of themselves should seize more territory."}, {"front": "Why was the \"short life of a pope\" a cause of political weakness for the Church?", "back": "It prevented the sustained suppression of hostile factions."}, {"front": "How did Julius II use the \"greatness of the Church\" to control the Roman factions?", "back": "He used it as a means to terrify them into submission."}, {"front": "Term: Potentates", "back": "Definition: The major ruling powers or sovereign states within a region, specifically the five dominant powers of Renaissance Italy."}, {"front": "According to Machiavelli, what is the prerequisite for an ecclesiastical prince to keep his state?", "back": "Nothing; they are held regardless of the prince's behavior."}, {"front": "Which event eventually allowed the Church to drive the King of France from Italy?", "back": "The Church's attainment of great temporal power."}, {"front": "What role did the Duke Valentino play in the history of the Papacy?", "back": "He served as the military instrument for his father, Alexander VI, to expand Church influence."}, {"front": "Concept: Temporal Power", "back": "Definition: The political and worldly authority held by the Pope, distinct from his spiritual authority as head of the Church."}, {"front": "Why did the union of powers occur for the defense of Ferrara?", "back": "To restrain the expansionist ambitions of the Venetians."}, {"front": "What happens to the \"unguarded\" states of ecclesiastical princes?", "back": "They are not taken from them."}, {"front": "Why does Machiavelli consider the Orsini and Colonnesi factions a \"pretext for disorder\"?", "back": "They remained armed and active under the eyes of the Pope, keeping him weak."}, {"front": "Who was the Pope that immediately followed Alexander VI in Machiavelli’s historical account?", "back": "Pope Julius II."}, {"front": "What specific action regarding Cardinals did Julius II take to maintain order?", "back": "He did not allow the Orsini or Colonnesi factions to have their own Cardinals."}, {"front": "Machiavelli suggests that the Church's power under Leo X could be made great through _____.", "back": "arms"}, {"front": "Why did the Italian potentates' anxiety focus specifically on the Pope and Venetians?", "back": "They were the two powers most likely to disrupt the balance of power or invite foreign influence."}, {"front": "What was the significance of Julius II \"finding the way open to accumulate money\"?", "back": "It provided the financial resources necessary to strengthen the Church's temporal and military power."}, {"front": "Machiavelli notes that ecclesiastical principalities are the only ones that are \"_____ and _____.\"", "back": "secure; happy"}, {"front": "What was the primary cause of the \"disorders and tumults\" among the Roman barons?", "back": "The ambitions of prelates (Cardinals) who fostered competing factions."}, {"front": "In the context of the Papacy's rise, who was ruined along with the death of Alexander VI?", "back": "The Duke (Cesare Borgia)."}, {"front": "How does the text characterize the status of the Roman barons by the time of Julius II?", "back": "They were reduced to impotence."}, {"front": "What was the average lifespan of a Pope during the period discussed by Machiavelli?", "back": "Ten years."}, {"front": "Before the rise of Alexander VI, how did the smallest lords value the temporal power of the Pope?", "back": "They valued it very slightly."}, {"front": "Cloze: According to Machiavelli, the Church’s greatness in temporal power now makes a king of _____ tremble.", "back": "France"}, {"front": "What did Julius II inherit from Alexander VI regarding the Roman factions?", "back": "He found the factions wiped out through Alexander's chastisements."}, {"front": "Which Pope is credited with successfully driving the French out of Italy?", "back": "Pope Julius II."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
