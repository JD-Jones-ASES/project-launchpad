    <script>

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">

    <script>
    var CARDS = [{"front": "What is a 'mixed principality' according to Machiavelli?", "back": "A new territory added to an existing 'ancient' state, creating a composite body."}, {"front": "Why do subjects in a new principality often change their rulers willingly?", "back": "They hope to better their condition by taking up arms against the current ruler."}, {"front": "What is the typical outcome for subjects who change rulers in hopes of improvement?", "back": "They are usually deceived, finding by experience that their situation has gone from bad to worse."}, {"front": "What 'natural and common necessity' causes a new prince to burden his new subjects?", "back": "The need to maintain a soldiery and impose other hardships to secure the acquisition."}, {"front": "Why does a new prince inevitably face enemies in a newly seized principality?", "back": "He has injured those affected by the seizure and cannot satisfy the expectations of the 'friends' who helped him."}, {"front": "According to Machiavelli, what is always needed to enter a province, regardless of army strength?", "back": "The goodwill of the natives."}, {"front": "Why did King Louis XII of France quickly lose Milan the first time he occupied it?", "back": "The people who opened the gates were deceived in their hopes for benefit and would not endure his ill-treatment."}, {"front": "Why is a rebellious province harder to lose a second time after it is re-acquired?", "back": "The prince is less reluctant to punish delinquents, clear out suspects, and strengthen weak defenses."}, {"front": "What are the two conditions for holding an annexed territory that shares the same country and language as the original state?", "back": "Extinguish the family of the former prince and leave laws and taxes unaltered."}, {"front": "Why is it easier to hold annexed territories like Brittany or Burgundy compared to distant lands?", "back": "They share similar customs and, despite language differences, can easily integrate."}, {"front": "What is the primary difficulty when acquiring states in a country with different languages, customs, or laws?", "back": "Maintaining control requires great energy and good fortune to navigate the cultural and legal differences."}, {"front": "What is considered one of the 'greatest and most real helps' for a prince holding a culturally different territory?", "back": "The prince should go and reside there in person."}, {"front": "How does a prince's residence in a new territory prevent the escalation of 'disorders'?", "back": "He can see and remedy problems as they spring up rather than waiting until they become incurable."}, {"front": "What benefit do subjects receive when a prince resides in a newly acquired, culturally different territory?", "back": "They have prompt recourse to the prince, which satisfies them and prevents officials from pillaging the country."}, {"front": "In Machiavelli's view, why are colonies a 'better course' than maintaining a large military garrison?", "back": "They are less expensive, more faithful, and cause less widespread offense."}, {"front": "Who is offended when a prince establishes a colony in a new state?", "back": "Only the minority from whom lands and houses are taken to give to the new inhabitants."}, {"front": "Why are the people injured by the establishment of colonies unable to hurt the prince?", "back": "They remain poor and scattered."}, {"front": "What is Machiavelli's maxim regarding the treatment of men in a conquered territory?", "back": "Men ought either to be well treated or crushed."}, {"front": "Why does Machiavelli argue that injuries to a man should be serious rather than light?", "back": "Men can avenge light injuries, but they cannot avenge serious ones."}, {"front": "Why are armed garrisons described as 'useless' compared to colonies?", "back": "They consume all income from the state (turning acquisition into loss) and exasperate the entire population through constant movement."}, {"front": "How should a prince manage 'less powerful neighbours' in a newly acquired province?", "back": "He should make himself their head and defender while keeping them from gaining too much power."}, {"front": "What should a prince do regarding 'more powerful' neighbors in a newly acquired province?", "back": "He should work to weaken them."}, {"front": "Why should a prince prevent a powerful foreigner from gaining a footing in his new province?", "back": "Discontented locals, driven by ambition or fear, will eventually invite the foreigner in to challenge the prince."}, {"front": "How do subject states typically react when a powerful foreigner enters a country?", "back": "They quickly rally to the foreigner out of hatred for the existing ruling power."}, {"front": "What strategy did the Romans use in Greece to maintain their authority?", "back": "They sent colonies, maintained friendly relations with minor powers (without increasing their strength), and humbled the powerful."}, {"front": "How does Machiavelli use the 'hectic fever' analogy to describe political foresight?", "back": "Evils are easy to cure but hard to detect at first; once they are obvious to all, they are easy to detect but impossible to cure."}, {"front": "What was the Romans' philosophy regarding the avoidance of war?", "back": "They knew war cannot be avoided but only deferred to the advantage of others, so they chose to fight early."}, {"front": "According to Machiavelli, what is the consequence of trying to 'enjoy the benefits of the time' rather than using prudence?", "back": "Time brings both good and evil, so one should rely on valour and foresight instead."}, {"front": "Why does Machiavelli criticize Louis XII for helping Pope Alexander occupy the Romagna?", "back": "It weakened Louis by depriving him of friends and aggrandized the Church by adding temporal power to its spiritual authority."}, {"front": "What mistake did Louis XII make regarding the Kingdom of Naples?", "back": "He divided it with the King of Spain, bringing a powerful 'associate' into Italy who could eventually drive him out."}, {"front": "What is Machiavelli's view on the 'wish to acquire' territory?", "back": "It is a natural and common desire for which men are praised when they succeed and blamed only if they lack the means but persist."}, {"front": "List the five errors King Louis XII committed in Italy.", "back": "Destroyed minor powers, increased a greater power, brought in a foreign power, did not settle there, and did not send colonies."}, {"front": "What was the 'sixth error' that finalized Louis XII's ruin in Italy?", "back": "Taking away the dominions of the Venetians."}, {"front": "Why was ruining the Venetians a mistake for Louis XII after his previous actions?", "back": "The Venetians would have kept others from attacking Lombardy, and other powers would not have wanted to give Lombardy to Venice."}, {"front": "What is Machiavelli's response to the claim that a prince should yield territory to 'avoid war'?", "back": "War is not avoided but only deferred to your disadvantage."}, {"front": "What is the 'general rule which never or rarely fails' regarding power dynamics?", "back": "He who is the cause of another becoming powerful is ruined."}, {"front": "Why is the person who helps another become powerful eventually distrusted by the one they raised up?", "back": "The rise to power was achieved through astuteness or force, both of which are distrusted by the new ruler."}, {"front": "According to the text, why did the French 'not understand statecraft'?", "back": "They allowed the Church to reach a level of greatness that threatened their own interests in Italy."}, {"front": "Term: Colony (in the context of The Prince)", "back": "Definition: A small settlement of the prince's subjects placed in a new state to serve as 'keys' to the territory, displacing only a few locals."}, {"front": "Term: Composite State", "back": "Definition: A principality formed by adding new territories to an existing ancient state."}, {"front": "In the Roman model, why was Antiochus driven out of Greece?", "back": "To prevent a strong foreign power from gaining authority in a region the Romans intended to control."}, {"front": "Why did Machiavelli admire the Romans' approach to future troubles?", "back": "They prepared for them with every energy, foreseeing and remedying them before they became 'incurable'."}, {"front": "What was the result of Louis XII's intervention in Lombardy for the smaller Italian states?", "back": "Nearly all of them (Genoa, Florentines, etc.) made advances to become his friend to seek protection."}, {"front": "How did the Venetians' 'rashness' in Lombardy backfire?", "back": "To secure two towns, they made the King of France master of two-thirds of Italy."}, {"front": "Why could Louis XII have easily maintained his position in Italy despite his errors?", "back": "His numerous friends were weak, timid, and forced to stand with him against the Church or the Venetians."}, {"front": "Concept: The Turk in Greece", "back": "Example of: A ruler residing in a culturally different annexed territory to ensure its secure and durable possession."}, {"front": "According to Machiavelli, why should a prince who acquires a province with different customs weaken the 'powerful' natives?", "back": "To ensure they cannot lead a rebellion or facilitate the entry of a foreign rival."}, {"front": "Why does a prince spend 'little or no expense' on colonies?", "back": "He simply reallocates existing lands and houses from a small group of locals to the new inhabitants."}, {"front": "What does Machiavelli mean by saying 'war is not to be avoided, but is only to be put off to the advantage of others'?", "back": "Delaying an inevitable conflict only allows the enemy to grow stronger while the prince's position may weaken."}, {"front": "How did King Louis XII's actions regarding the Church and Spain affect the balance of power in Italy?", "back": "He caused the 'greatness' of both the Church and Spain, which eventually led to his own ruin."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
