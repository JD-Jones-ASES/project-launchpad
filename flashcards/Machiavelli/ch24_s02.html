<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 24, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, what is the primary reason courts are full of flatterers?", "back": "Men are so self-complacent and easily deceived in their own affairs."}, {"front": "What specific danger does a prince face when trying to defend himself against the \"pest\" of flatterers?", "back": "The danger of falling into contempt."}, {"front": "How can a prince guard himself against flatterers without losing the respect of his subjects?", "back": "By letting men understand that telling the truth does not offend him."}, {"front": "Why is it dangerous for a prince to allow everyone to tell him the truth freely?", "back": "Respect for the prince abates when everyone may speak the truth to him."}, {"front": "In Machiavelli's \"third course,\" whom should the prince choose to speak the truth?", "back": "The wise men in his state."}, {"front": "Under what condition should the prince's chosen wise men be permitted to offer their honest opinions?", "back": "Only when the prince inquires about specific things, and none others."}, {"front": "On what range of subjects should a wise prince question his chosen advisors?", "back": "He should question them upon everything."}, {"front": "What is the final step in the prince's counseling process after listening to the opinions of his advisors?", "back": "He should form his own conclusions."}, {"front": "How should a prince incentivize his councilors to speak more freely?", "back": "By making each know that the more freely they speak, the more they shall be preferred."}, {"front": "Whom should a prince listen to outside of his selected council of wise men?", "back": "No one."}, {"front": "What behavior must a prince exhibit once he has resolved on a course of action after taking counsel?", "back": "He must be steadfast in his resolutions."}, {"front": "What is the likely fate of a prince who is frequently changed by varying opinions?", "back": "He falls into contempt."}, {"front": "Who was the modern example Machiavelli used to illustrate the dangers of an irresolute prince?", "back": "Fra Luca's"}, {"front": "Why did Emperor Maximilian I fail to \"get his own way in anything\"?", "back": "He consulted with no one and did not communicate his designs."}, {"front": "What happens to a prince's designs when they only become known as they are being carried into effect?", "back": "They are at once obstructed by the men around the prince."}, {"front": "What character flaw in Maximilian I allowed him to be easily diverted from his plans?", "back": "He was pliant."}, {"front": "Why can no one rely on the resolutions of a prince like Maximilian I?", "back": "The things he does one day he undoes the next."}, {"front": "Regarding timing, when should a prince take counsel?", "back": "Only when he wishes, and not when others wish."}, {"front": "What should a prince do to discourage unsolicited advice from his court?", "back": "Discourage everyone from offering advice unless it is asked for."}, {"front": "What two qualities should a prince exhibit during the counseling session?", "back": "Being a constant inquirer and a patient listener."}, {"front": "How should a prince react upon discovering that an advisor has not told him the truth?", "back": "He should let his anger be felt."}, {"front": "What is the Machiavellian \"axiom\" regarding a prince's ability to take advice?", "back": "A prince who is not wise himself will never take good advice."}, {"front": "Under what singular, lucky condition might an unwise prince be well-governed?", "back": "If he yields his affairs entirely to one person who is very prudent."}, {"front": "Why is relying on a single prudent governor a short-lived solution for an unwise prince?", "back": "The governor would likely take away the prince's state in a short time."}, {"front": "Why can't an inexperienced prince effectively manage advice from multiple independent counselors?", "back": "He will not get united counsels nor know how to unite them himself."}, {"front": "What do counselors naturally prioritize if the prince does not know how to control them?", "back": "Their own interests."}, {"front": "According to Machiavelli, what is required to keep men honest?", "back": "Constraint."}, {"front": "What is the ultimate origin of \"good counsels\" in a successful state?", "back": "The wisdom of the prince."}, {"front": "A prince who lacks wisdom will fail to see through the _____ of his counselors.", "back": "interests"}, {"front": "Machiavelli describes flatterers as a courtly \"_____\" from which princes are preserved with difficulty.", "back": "pest"}, {"front": "The prince's system must ensure that honesty does not lead to a loss of _____.", "back": "authority"}, {"front": "Concept: The \"Third Course\"", "back": "Definition: A structural system where the prince limits truth-telling to specific wise advisors and only upon his inquiry."}, {"front": "Term: Pliant", "back": "Definition: Easily influenced or yielding, used by Machiavelli to criticize Emperor Maximilian's lack of resolve."}, {"front": "How does Machiavelli refute the idea that a prince's wisdom comes from his advisors?", "back": "By asserting that good counsel is born from the prince's wisdom, not vice-versa."}, {"front": "What is the consequence of a prince being \"secretive\" according to the example of Maximilian?", "back": "His designs are obstructed once they are revealed for execution."}, {"front": "How does Machiavelli describe the relationship between a prince's anger and truth-telling?", "back": "The prince must show anger if he learns an advisor has withheld the truth."}, {"front": "What is the risk of a prince who is \"overthrown by flatterers\"?", "back": "He loses his state or is rendered ineffective by false praise."}, {"front": "Why is the prince's constant inquiry essential to effective rule?", "back": "It ensures he receives the necessary information to form sound conclusions."}, {"front": "What must the prince do *after* listening to his counselors to maintain his authority?", "back": "Form his own conclusions and stay steadfast in the resulting resolution."}, {"front": "According to Machiavelli, men will always prove _____ unless kept honest by constraint.", "back": "untrue"}, {"front": "In the context of advice, what is the role of the prince as a \"patient listener\"?", "back": "To carefully consider the honest opinions he has solicited before deciding."}, {"front": "Why does Machiavelli advise a prince to only take counsel when he wishes?", "back": "To prevent others from controlling his agenda or eroding his authority."}, {"front": "What does Machiavelli suggest happens to the respect for a prince when \"every one may tell you the truth\"?", "back": "It abates."}, {"front": "The emperor Maximilian is described as a \"_____ man\" who does not communicate his designs.", "back": "secretive"}, {"front": "What is the primary danger for a prince who changes his mind due to \"varying opinions\"?", "back": "Falling into contempt."}, {"front": "Machiavelli's instruction that a prince should be a \"constant inquirer\" relates to which task?", "back": "Seeking out the truth on matters he deems important."}, {"front": "What is the relationship between counselor self-interest and the prince's wisdom?", "back": "A wise prince must be able to see through and control his counselors' personal interests."}, {"front": "Why is an inexperienced prince unable to unite counsels?", "back": "He lacks the ability to synthesize differing viewpoints or see through self-serving advice."}, {"front": "What is the result of a prince being \"discriminating\" in choosing advisors?", "back": "He preserves himself from the danger of flatterers."}, {"front": "The prince should be steadfast in his resolutions, or he will be \"overthrown by _____.\"", "back": "flatterers"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
