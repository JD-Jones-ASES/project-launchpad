<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 20, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, what are the two internal traits a prince must avoid to ensure survival?", "back": "Being hated or despised."}, {"front": "What specific actions make a prince most 'hated' by his subjects?", "back": "Being rapacious and violating the property or women of his subjects."}, {"front": "Under what conditions do the 'majority of men' live contentedly under a prince?", "back": "When neither their property nor their honor is touched."}, {"front": "List three of the five character traits Machiavelli claims make a prince 'contemptible'.", "back": "Fickle, frivolous, effeminate, mean-spirited, or irresolute."}, {"front": "To maintain a high reputation, what four qualities should a prince endeavor to show in his actions?", "back": "Greatness, courage, gravity, and fortitude."}, {"front": "In private dealings, a prince's judgments should be _____ to ensure no one hopes to deceive him.", "back": "irrevocable"}, {"front": "Why is a highly esteemed prince difficult to conspire against?", "back": "He is recognized as an excellent man who is revered by his people."}, {"front": "What are the two primary 'fears' a prince ought to have?", "back": "Internal threats from subjects and external threats from foreign powers."}, {"front": "How does a prince primarily defend himself against external powers?", "back": "By being well armed and having good allies."}, {"front": "According to Machiavelli, a prince will always have good friends if he is _____.", "back": "well armed"}, {"front": "What is the most efficacious remedy a prince has against internal conspiracies?", "back": "Not being hated or despised by the people."}, {"front": "Why does a conspirator usually hesitate to move against a prince who has popular goodwill?", "back": "He fears the inevitable prospect of offending the people through the prince's removal."}, {"front": "Why is it difficult for a conspirator to find reliable companions?", "back": "Malcontents can gain a certain advantage by denouncing the conspiracy to the prince."}, {"front": "What 'majesty' protects the prince from the 'rashness' of conspirators?", "back": "The majesty of the principality and the protection of laws and friends."}, {"front": "In the case of Annibale Bentivogli, why did the people of Bologna murder the Canneschi family?", "back": "Due to the popular goodwill the house of Bentivogli enjoyed."}, {"front": "After Annibale Bentivogli's death, why did the Bolognese seek a blacksmith's son to rule?", "back": "He was believed to be of the Bentivogli bloodline, and no other heirs were of age."}, {"front": "What is the 'important object' wise princes pursue regarding the nobility and the people?", "back": "Not driving nobles to desperation and keeping the people satisfied."}, {"front": "What was the primary purpose of the parliament in the kingdom of France?", "back": "To act as an arbiter that could restrain the nobles and protect the people."}, {"front": "Why did the founder of the French kingdom establish an independent arbiter instead of the king managing the nobles directly?", "back": "To shield the king from the 'reproach' or blame of favoring one class over the other."}, {"front": "What general rule does Machiavelli provide regarding 'affairs of reproach' and 'affairs of grace'?", "back": "Princes should delegate reproachful tasks to others and keep gracious tasks for themselves."}, {"front": "Unlike other principalities, what third difficulty did Roman emperors face?", "back": "The cruelty and avarice of their soldiers."}, {"front": "Why was it nearly impossible for Roman emperors to satisfy both the people and the soldiers?", "back": "The people loved peace and unaspiring princes, while soldiers loved warlike and rapacious ones."}, {"front": "If a prince cannot avoid being hated by everyone, whose hatred should he most diligently avoid?", "back": "The hatred of the most powerful group."}, {"front": "Why did Marcus Aurelius live and die honored, despite being 'humane' and a 'lover of justice'?", "back": "He succeeded by hereditary title and owed nothing to the soldiers or the people."}, {"front": "Why was the Emperor Pertinax overthrown at the start of his administration?", "back": "The soldiers hated his attempts to force them into an 'honest life' and despised his old age."}, {"front": "According to Machiavelli, how can 'good works' harm a prince?", "back": "If the group the prince needs to maintain power (people, soldiers, or nobles) is corrupt."}, {"front": "Why was the Emperor Alexander (Severus) eventually murdered by his own army?", "back": "He was considered effeminate and allowed himself to be governed by his mother."}, {"front": "Which Roman emperor does Machiavelli describe as a 'most valiant lion and a most cunning fox'?", "back": "Septimius Severus."}, {"front": "What pretext did Severus use to justify moving his army toward Rome?", "back": "He claimed he was going to avenge the death of the Emperor Pertinax."}, {"front": "How did Severus neutralize Albinus while he fought Niger in the East?", "back": "He deceived Albinus with the title of Caesar and the offer to share the emperorship."}, {"front": "Why did the people not hate Severus for his oppression and violence?", "back": "His 'supreme renown' and valour kept them astonished and awed."}, {"front": "What personal trait of Antoninus Caracalla made him 'beloved by the armies'?", "back": "He was a warlike man who despised all delicate food and luxuries."}, {"front": "What caused the downfall of Antoninus Caracalla despite his military qualities?", "back": "His extreme ferocity and unheard-of cruelties made him hated by the whole world."}, {"front": "Why does Machiavelli say a prince should be careful not to do 'grave injury' to those in his service?", "back": "Because anyone who does not fear death can inflict a fatal blow on the prince."}, {"front": "How did Commodus fall into contempt with his soldiers?", "back": "He descended to the theatre to compete with gladiators and performed other 'vile things'."}, {"front": "What two factors led to the hatred and contempt for Emperor Maximinus?", "back": "His low birth as a shepherd and the reputation for ferocity gained by his prefects."}, {"front": "Why is it currently 'more necessary' for most princes to satisfy the people rather than the soldiers?", "back": "Because in modern times, the people are the more powerful force."}, {"front": "Name one of the two modern rulers Machiavelli identifies as exceptions who must prioritize the military over the people.", "back": "The Turk (Ottoman Sultan) or the Soldan (Sultan of Egypt)."}, {"front": "Why is the state of the 'Soldan' compared to the 'Christian pontificate'?", "back": "It is neither hereditary nor truly new; the prince is elected by those in authority."}, {"front": "According to the text, why would it have been dangerous for Pertinax or Alexander to imitate Marcus Aurelius?", "back": "They were 'new princes,' whereas Marcus was an 'heir to the principality'."}, {"front": "What should a 'new prince' take from the example of Septimius Severus?", "back": "The parts necessary to found his state."}, {"front": "What should a 'new prince' take from the example of Marcus Aurelius?", "back": "The parts proper and glorious to keep a state that is already stable."}, {"front": "Machiavelli states that hatred is acquired as much by _____ works as by bad ones.", "back": "good"}, {"front": "What was the result of the Canneschi's conspiracy against Annibale Bentivogli?", "back": "The people rose up and murdered all the Canneschi."}, {"front": "In the context of the Roman Empire, which group generally 'loved peace'?", "back": "The people."}, {"front": "How does Machiavelli characterize the nature of Julian, Macrinus, and Heliogabalus?", "back": "Thoroughly contemptible."}, {"front": "Why did Severus attack Albinus after defeating Niger?", "back": "He accused Albinus of ingratitude and treachery to justify taking his life and government."}, {"front": "Which emperor is cited as an example of being destroyed by being 'both hated and despised'?", "back": "Commodus."}, {"front": "What made the Bolognese willing to accept a 'son of a blacksmith' as their ruler?", "back": "Their deep popular goodwill for the house of Bentivogli."}, {"front": "A prince should guard himself from being seen as 'fickle' as if from a _____.", "back": "rock"}, {"front": "How does Machiavelli define the 'Soldan's' state structure?", "back": "An ancient custom where the constitution is old, but the prince is new."}, {"front": "According to Machiavelli, why are successful conspiracies historically rare?", "back": "The difficulties confronting a conspirator are 'infinite'."}, {"front": "The Roman soldiers preferred a prince who was 'bold, cruel, and rapacious' so they could receive _____.", "back": "double pay"}, {"front": "Why did Maximinus's own army eventually murder him at the siege of Aquileia?", "back": "They were disgusted with his cruelties and feared him less seeing the world against him."}, {"front": "What does Machiavelli suggest a prince should do to the 'nobles' to maintain stability?", "back": "Cherish them, but not so much as to make the people hate him."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
