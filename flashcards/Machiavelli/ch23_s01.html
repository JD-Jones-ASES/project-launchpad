<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 23, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, what is the primary basis for the first opinion formed about a prince's understanding?", "back": "The quality of the men the prince has around him."}, {"front": "What conclusion do observers draw when a prince chooses capable and loyal ministers?", "back": "The prince is discerning and wise."}, {"front": "If a prince's ministers are corrupt, what is the first possible conclusion regarding the prince's judgment?", "back": "The prince cannot distinguish between good and bad character."}, {"front": "If a prince recognizes ministerial corruption but allows it, what does this imply about the prince?", "back": "The prince is complicit in the corruption."}, {"front": "The concept that the quality of advisors reflects the quality of the ruler is known as the _____.", "back": "Mirror Principle"}, {"front": "What is the primary 'test' Machiavelli uses to distinguish a good minister from a bad one?", "back": "The minister's orientation (who they think about primarily)."}, {"front": "Whose interests does a 'good' minister prioritize according to Machiavelli?", "back": "The interests of the prince and the state."}, {"front": "What is the primary focus of a 'bad' minister?", "back": "Their own self-interest."}, {"front": "Why is a minister who prioritizes self-interest considered 'actively dangerous'?", "back": "They distort counsel and conceal information to serve their own ends."}, {"front": "How does a good minister handle unpleasant truths?", "back": "They tell the prince what he needs to hear rather than what he wants to hear."}, {"front": "Term: Flatterer", "back": "Definition: A minister who prioritizes their own comfort and the prince's pleasure over the prince's actual interests."}, {"front": "In Machiavelli's framework, why is a flatterer always considered a 'bad minister'?", "back": "They choose personal ease over the state's and prince's well-being."}, {"front": "What is Machiavelli's 'elegant solution' to the problem of ministerial self-interest?", "back": "Aligning the minister's personal prosperity with the prince's success."}, {"front": "The strategy of making a minister's interests identical to the prince's is called the _____.", "back": "Architecture of Loyalty"}, {"front": "What are the three specific things a prince must give a minister to ensure satisfaction?", "back": "Honors, wealth, and responsibility."}, {"front": "Why must a prince give a minister a significant stake in his own success?", "back": "To ensure the minister cannot easily transfer loyalty to a rival."}, {"front": "How should a prince handle a good minister's conscience in 'small matters'?", "back": "The prince should never ask the minister to act against it."}, {"front": "What is the intended result of respecting a minister's conscience in minor affairs?", "back": "The minister develops trust in the prince's fundamental decency."}, {"front": "Rather than blind loyalty, Machiavelli views the prince-minister relationship as a _____.", "back": "Rational partnership."}, {"front": "In the prince-minister partnership, what specific assets does the minister contribute?", "back": "Capability and honest counsel."}, {"front": "In the prince-minister partnership, what specific benefits does the prince provide?", "back": "Protection, honor, and material reward."}, {"front": "What is the 'structural advantage' of surrounding a prince with honest advisors?", "back": "The prince receives accurate information and early warnings about errors."}, {"front": "Machiavelli describes the right ministers as a form of _____ that multiplies the prince's abilities.", "back": "Political intelligence."}, {"front": "How does the choice of a bad minister propagate through a prince's reign?", "back": "It filters every subsequent decision through self-interested and distorted advice."}, {"front": "To what traditional literary genre does Machiavelli's advice on counselors belong?", "back": "Mirrors for princes."}, {"front": "What distinguishes Machiavelli's advice from the traditional 'mirrors for princes' genre?", "back": "His approach is non-idealistic and based on incentive analysis rather than abstract virtue."}, {"front": "Instead of evaluating a minister's 'virtue,' Machiavelli evaluates the alignment of their _____.", "back": "Interests."}, {"front": "According to the text, what replaces the moral framework in Machiavelli's analysis of ministers?", "back": "An analysis of incentives."}, {"front": "What is the consequence of a prince surrounding himself with sycophants?", "back": "He may never learn the quality of his decisions until it is too late."}, {"front": "A good minister will flag _____ before they become crises.", "back": "Problems"}, {"front": "Under what condition will a minister serve the prince well according to the principle of self-interest?", "back": "When serving the prince well is the best way to serve themselves."}, {"front": "What is the primary risk of a minister cultivating relationships to strengthen their own position?", "back": "It prioritizes the minister's safety over the prince's interests."}, {"front": "Machiavelli argues that a prince's first and most important decision upon taking power is _____.", "back": "Choosing who will advise him."}, {"front": "Why does a bad minister recommend policies that benefit themselves?", "back": "Because their primary orientation is toward their own interests rather than the state."}, {"front": "In the architecture of loyalty, what is the purpose of giving a minister 'honors'?", "back": "To make the minister satisfied and personally invested in the current regime."}, {"front": "A minister who takes on difficult tasks without demanding 'excessive rewards' is showing signs of being a _____.", "back": "Good minister."}, {"front": "What is the 'mirror' in Machiavelli’s 'The Minister as Mirror' concept?", "back": "The ministers chosen by the prince."}, {"front": "If a prince cannot tell the difference between a good and bad minister, he is said to lack _____.", "back": "Judgment"}, {"front": "Why is 'honesty' in an advisor valued practically rather than morally by Machiavelli?", "back": "It ensures the prince makes decisions based on accurate, uncorrupted information."}, {"front": "The 'Architecture of Loyalty' relies on the assumption that humans are primarily driven by _____.", "back": "Self-interest."}, {"front": "What is the relationship between 'political intelligence' and the prince's own abilities?", "back": "The right ministers act as a multiplier of the prince's abilities."}, {"front": "Why is 'orientation' a more practical standard than 'competence' for Machiavelli?", "back": "Competence without the right orientation can be used against the prince."}, {"front": "Which specific group of ministers is defined by choosing the prince's 'pleasure' over his interests?", "back": "Flatterers."}, {"front": "What is the specific danger of a prince only realizing the quality of his decisions 'too late'?", "back": "It usually occurs when he is surrounded by flatterers who hide the truth."}, {"front": "Concept: Reciprocity in Leadership", "back": "Definition: The prince provides rewards and protection in exchange for a minister’s capability and honesty."}, {"front": "According to Machiavelli, there is no _____ ground between a prince being wise or being reflected by his poor advisors.", "back": "Middle"}, {"front": "Why should a minister be made to feel that he cannot prosper under a different ruler?", "back": "To prevent him from transferring his loyalty to a rival."}, {"front": "In Machiavelli's view, a minister should think of the _____ even when it costs him personally.", "back": "Prince's interests"}, {"front": "What does 'distorted counsel' mean in the context of a self-serving minister?", "back": "Advice designed to protect the minister rather than help the state."}, {"front": "Machiavelli’s analysis of ministers shifts the focus from 'moral character' to '_____.'", "back": "Incentives."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
