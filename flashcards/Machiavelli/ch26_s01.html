<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 26, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What historical concept does Machiavelli's 'fortuna' draw upon, often depicted as a 'Wheel of Fortune'?", "back": "Machiavelli's concept of 'fortuna' draws on centuries of reflection, including the 'Wheel of Fortune' from figures like Boethius, reflecting the fickleness of worldly power."}, {"front": "What is the central philosophical tension explored in Chapter XXV of *The Prince*?", "back": "The central tension is the relationship between virtù (human skill, energy, decisiveness) and fortuna (fortune, luck, circumstance)."}, {"front": "How does Machiavelli initially address the belief that fortune governs everything and human effort makes no difference?", "back": "Machiavelli acknowledges that many people hold this belief, and concedes that fortune is powerful, but he refuses to accept that it is omnipotent."}, {"front": "Describe Machiavelli's famous 'river metaphor' for fortune.", "back": "Machiavelli compares fortune to a raging river in flood, sweeping away everything in its path, which cannot be withstood at that moment."}, {"front": "In the river metaphor, what do the 'defences and barriers' built when the weather is fair represent in political life?", "back": "The 'defences and barriers' represent preparation, such as building dikes and channels, which allow fortune (the flood) to be managed and its damage reduced, even if it cannot be stopped entirely."}, {"front": "What is the key takeaway from the river metaphor regarding fortune's impact on political life?", "back": "Fortune cannot be stopped, but it can be managed, and the degree of management depends on the preparation made before it arrives."}, {"front": "What is 'virtù' according to Machiavelli in the context of *The Prince*?", "back": "Virtù refers to human skill, energy, and decisiveness; the qualities that allow a prince to act effectively in political life."}, {"front": "What is 'fortuna' according to Machiavelli in the context of *The Prince*?", "back": "Fortuna refers to fortune, luck, or circumstances beyond direct human control."}, {"front": "What is Machiavelli's resolution to the tension between virtù and fortuna?", "back": "Machiavelli takes a middle ground: he is neither a fatalist (fortune controls everything) nor an idealist (virtù always prevails). He suggests fortune governs roughly half of human affairs, and virtù governs the other half."}, {"front": "What qualities allow a prince to master more of fortune's domain?", "back": "A bold, prepared, and adaptable prince can master more of fortune's domain than a timid, unprepared, or rigid prince."}, {"front": "What specific actions can a prince take to maximize his chances against fortune?", "back": "A prince can maximize his chances by developing virtù and building political foundations such as popular support, his own army, and good counsel to make his state resilient."}, {"front": "What is Machiavelli's second, more controversial argument about fortune's preference?", "back": "Machiavelli argues that fortune favors bold action over cautious action."}, {"front": "Which historical figure does Machiavelli cite as an example of fortune favoring boldness?", "back": "Pope Julius II, who was recklessly bold in his military and political ventures and consistently succeeded."}, {"front": "Beyond specific opportunities, what is the deeper reason Machiavelli argues fortune favors boldness over caution?", "back": "Boldness often matches the demands of most political crises which reward decisiveness, while cautious princes struggle to adapt when circumstances change and require boldness."}, {"front": "Machiavelli uses a controversial metaphor equating fortune to a woman. What is the underlying political claim students should understand, distinct from the language?", "back": "The underlying political claim is that boldness and decisiveness tend to succeed where excessive caution fails."}, {"front": "What does Machiavelli NOT claim about virtù's power over fortune?", "back": "He does not claim that virtù always overcomes fortune, citing Cesare Borgia, a model of political skill, whose story ultimately ended in failure."}, {"front": "What is Machiavelli's 'honest and tragic answer' regarding political life?", "back": "Political life is not reducible to a formula; the greatest skill and best preparation can still be overwhelmed by circumstances. However, passivity and fatalism are worse, as 'the prince who does not try has already lost.'"}, {"front": "How does Machiavelli's virtù/fortuna distinction relate to Stoic philosophy?", "back": "The Stoics (e.g., Epictetus, Marcus Aurelius) distinguished between what is 'up to us' and what is not, a concept very similar to Machiavelli's virtù/fortuna division."}, {"front": "How does Machiavelli's approach to fortune differ from Boethius's view in *De Consolatione Philosophiae*?", "back": "Boethius, using the image of Fortune's Wheel, argued that true goods (wisdom, virtue) are not subject to fortune. Machiavelli's answer is more political and less consolatory, arguing fortune can be partially managed by human action rather than circumvented by focusing on 'true goods'."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
