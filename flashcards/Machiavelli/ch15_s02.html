<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 15, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, what is the only subject a prince should study?", "back": "War and its rules and discipline."}, {"front": "What is the primary reason Machiavelli gives for a prince losing his state?", "back": "Neglecting the art of war."}, {"front": "What allows a man from a private station to rise to the rank of a prince?", "back": "Mastery of the art of war."}, {"front": "Who became the Duke of Milan by being a martial person despite his private origins?", "back": "Francesco Sforza."}, {"front": "Why did the sons of Francesco Sforza fall from being dukes to being private persons?", "back": "They avoided the hardships and troubles of arms."}, {"front": "What specific ignominy must a prince guard himself against by remaining armed?", "back": "Being despised."}, {"front": "Why is it considered unreasonable for an armed man to obey an unarmed man willingly?", "back": "Because there is no proportion between the armed and the unarmed."}, {"front": "What two negative emotions make it impossible for an unarmed prince and armed servants to work together?", "back": "Disdain and suspicion."}, {"front": "What is the consequence for a prince who does not understand the art of war regarding his soldiers?", "back": "He cannot be respected by them or rely on them."}, {"front": "When should a prince devote himself most to the exercise of war?", "back": "In times of peace."}, {"front": "What are the two ways a prince can exercise for war during peace?", "back": "By action and by study."}, {"front": "What does Machiavelli suggest a prince do to keep his men prepared through action?", "back": "Keep them well organized and drilled."}, {"front": "What physical benefit does a prince gain from following the chase (hunting)?", "back": "He accustoms his body to hardships."}, {"front": "How does hunting help a prince understand the nature of localities?", "back": "It teaches him how mountains rise, valleys open, and plains lie."}, {"front": "What is the primary advantage of a prince knowing the terrain of his own country?", "back": "He is better able to undertake its defense."}, {"front": "Why does knowledge of one's own locality help in studying other regions?", "back": "Geographical features like hills and valleys resemble those in other countries."}, {"front": "A prince who lacks topographical skill cannot perform what essential task of a captain?", "back": "Selecting quarters or arraying the battle."}, {"front": "Which Prince of the Achaeans is praised for focusing entirely on the rules of war during peace?", "back": "Philopoemen."}, {"front": "What was Philopoemen's method of training his intellect while walking with friends?", "back": "Reasoning through hypothetical tactical scenarios and enemy positions."}, {"front": "What was the ultimate goal of Philopoemen’s constant tactical discussions?", "back": "To ensure no unexpected military circumstances could arise that he could not handle."}, {"front": "How should a prince exercise his intellect regarding the study of history?", "back": "By examining the actions of illustrious men and the causes of their victories and defeats."}, {"front": "Why should a prince study the defeats of past illustrious men?", "back": "To learn how to avoid those same failures."}, {"front": "What historical figure did Alexander the Great reportedly take as an exemplar?", "back": "Achilles."}, {"front": "Whom did Julius Caesar use as his primary exemplar to imitate?", "back": "Alexander the Great."}, {"front": "Whom did Scipio Africanus imitate to gain his glory?", "back": "Cyrus."}, {"front": "Who was the author of the life of Cyrus, which Scipio used as a guide?", "back": "Xenophon."}, {"front": "In what specific moral qualities did Scipio conform to Xenophon's", "back": "Chastity, affability, humanity, and liberality."}, {"front": "Why must a prince increase his resources with industry during peaceful times?", "back": "To ensure they are available to him in times of adversity."}, {"front": "What is the purpose of a prince's constant preparation for war during peace?", "back": "To be prepared to resist the blows of fortune."}, {"front": "The first cause of losing a state is the _____ of the art of war.", "back": "Neglect."}, {"front": "What determines whether a prince is respected or despised by his soldiers?", "back": "His understanding of the art of war."}, {"front": "Machiavelli notes that an unarmed man is never _____ among armed servants.", "back": "Secure."}, {"front": "What geographical feature must a prince study to understand how to lead armies and besiege towns?", "back": "The nature of rivers and marshes."}, {"front": "According to Machiavelli, what is the \"sole art\" that belongs to one who rules?", "back": "The art of war."}, {"front": "Which Roman general is noted for defeating Hannibal at the Battle of Zama?", "back": "Scipio Africanus."}, {"front": "How does Machiavelli describe the relationship between an armed person and an unarmed one?", "back": "There is nothing proportionate between them."}, {"front": "What does a prince learn about terrain by studying a specific region like Tuscany?", "back": "The general aspect and resemblance of other countries' landscapes."}, {"front": "What did Philopoemen listen to when discussing war strategies with his friends?", "back": "Their opinions, which he then confirmed or countered with reasons."}, {"front": "Machiavelli believes that history allows a prince to see how illustrious men _____ themselves in war.", "back": "Borne."}, {"front": "What is the role of 'Fortune' in Machiavelli's advice on military preparation?", "back": "She is a force whose blows must be resisted through constant preparation."}, {"front": "Which group of people became private persons because they avoided the 'hardships and troubles of arms'?", "back": "The sons of Francesco Sforza."}, {"front": "What specific tactical skill involves choosing where an army will stay during a campaign?", "back": "Selecting quarters."}, {"front": "Mastery of the art of war is what enables you to _____ a state.", "back": "Acquire."}, {"front": "Princes who think more of _____ than of arms are likely to lose their power.", "back": "Ease."}, {"front": "What is the primary source of 'disdain' in the relationship between soldiers and a prince?", "back": "The prince being unarmed or lacking military skill."}, {"front": "To what does Machiavelli compare the physical preparation of hunting?", "back": "Accustoming the body to hardships."}, {"front": "Which historical work is cited as the source for the qualities of Cyrus?", "back": "The Cyropaedia (written by Xenophon)."}, {"front": "What does Machiavelli call the shame that an unarmed prince faces?", "back": "Ignominy."}, {"front": "A prince should use his time in peace to increase his _____ with industry.", "back": "Resources."}, {"front": "Which specific tactical action involves arranging soldiers for combat?", "back": "Arraying the battle."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
