    <script>

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 18, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">

    <script>
    var CARDS = [{"front": "In Chapter XVII of 'The Prince', what central question does Machiavelli pose regarding a ruler's relationship with his subjects?", "back": "Whether it is better to be loved or to be feared."}, {"front": "Machiavelli replaces the classical question 'what ought a ruler to be?' with which pragmatic inquiry?", "back": "What must a ruler do to survive?"}, {"front": "Which two Greek philosophers in Raphael's 'School of Athens' represent the idealist tradition that Machiavelli explicitly rejects?", "back": "Plato and Aristotle."}, {"front": "What is Machiavelli's characteristic starting point when answering whether it is better to be loved or feared?", "back": "He grants that it would be best to be both loved and feared."}, {"front": "Under what specific condition does Machiavelli argue a prince must choose between being loved or being feared?", "back": "When the two qualities conflict with one another."}, {"front": "According to Machiavelli, why is fear a more 'reliable' political foundation than love?", "back": "Fear is maintained by a dread of punishment that never fails, whereas love is easily broken for self-interest."}, {"front": "Machiavelli defines the 'link of obligation' in love as being vulnerable to what human trait?", "back": "The baseness of men, who break the link at every opportunity for their own advantage."}, {"front": "According to Machiavelli's assessment of human nature, people are primarily motivated by _____.", "back": "Self-interest"}, {"front": "Why is the bond of love described as 'conditional' in Machiavelli's political psychology?", "back": "It only holds as long as the bond of mutual benefit persists."}, {"front": "Machiavelli argues that a prince's security should rest on what he _____, not on what others feel.", "back": "Controls"}, {"front": "In the distinction between love and fear, who is the active party that chooses to 'love'?", "back": "The subject (the other person)."}, {"front": "In the distinction between love and fear, who controls the capacity to maintain 'fear'?", "back": "The prince."}, {"front": "Which historical figure does Machiavelli use as a case study for the effective use of 'cruelty' to create order?", "back": "Cesare Borgia."}, {"front": "What territory did Cesare Borgia consolidate for his father, Pope Alexander VI, using decisive force?", "back": "The Romagna."}, {"front": "What was the 'humane outcome' that Machiavelli attributes to Cesare Borgia's methods?", "back": "He produced peace and unity through targeted severity rather than allowing disorder."}, {"front": "How did the Florentines' attempt to avoid a reputation for cruelty backfire in the city of Pistoia?", "back": "They allowed factional conflict to escalate until the city was destroyed by civil violence."}, {"front": "Machiavelli argues that a few targeted acts of severity are preferable to 'clemency' because they prevent widespread _____.", "back": "Disorder"}, {"front": "What label does Machiavelli apply to a prince who shrinks from necessary harshness and allows social chaos?", "back": "Negligent."}, {"front": "Which Carthaginian general is cited by Machiavelli for his 'inhuman cruelty' during the invasion of Italy?", "back": "Hannibal Barca."}, {"front": "According to Machiavelli, what was the primary factor that held Hannibal's diverse army of Gauls, Africans, and Iberians together?", "back": "His ruthless discipline and willingness to execute failing soldiers."}, {"front": "How does Machiavelli's analysis of Hannibal differ from that of traditional Roman historians?", "back": "While others praised Hannibal's virtues, Machiavelli focused specifically on his harsh methods as the key to his success."}, {"front": "What is the 'critical limit' that a prince must never cross when cultivating fear?", "back": "The prince must never be hated."}, {"front": "What are the two specific things a prince must never seize from his subjects to avoid being hated?", "back": "Their property and their women."}, {"front": "Complete Machiavelli's provocative quote: 'Men forget more easily the death of their father than the loss of their _____.'", "back": "Patrimony"}, {"front": "Why does Machiavelli identify property and family as the material anchors a ruler must not violate?", "back": "They represent the fundamental interests and material stability of ordinary life."}, {"front": "According to Machiavelli, what distinguishes a ruler who is 'feared but not hated'?", "back": "He exercises severity with apparent justice and restraint."}, {"front": "What specific qualities in a ruler typically lead to being 'hated' by the subjects?", "back": "Being unjust, grasping, or humiliating."}, {"front": "In Machiavelli's view, why is fear less vulnerable to the 'vicissitudes of fortune' than love?", "back": "Because the dread of punishment remains operative even when human calculation or circumstances change."}, {"front": "What is the primary difference between Machiavelli's 'descriptive claim' and 'normative recommendation' in Chapter XVII?", "back": "The descriptive claim is that fear is more reliable; the normative recommendation is that a ruler should therefore cultivate it."}, {"front": "The Carthaginian general Hannibal Barca invaded Italy by crossing the Alps in the year $218$ BC with what notable animal corps?", "back": "An elephant corps."}, {"front": "Concept: Machiavellian Realism", "back": "Definition: A political philosophy prioritizing survival and effective governance over moral or idealistic standards."}, {"front": "Under what condition might subjects act against a feared ruler, despite the dread of punishment?", "back": "When they become desperate."}, {"front": "What spectacular and violent display did Cesare Borgia orchestrate in the piazza of Cesena to subdue the region?", "back": "The public display of a dismembered body."}, {"front": "Machiavelli suggests that effective governance cannot be founded on 'contingent _____.'", "back": "Goodwill"}, {"front": "For how many years did Hannibal maintain his diverse army in hostile territory without dissolution?", "back": "$15$ years."}, {"front": "The Battle of Cannae ($216$ BC) resulted in the death of roughly how many Romans in a single day?", "back": "$50,000$."}, {"front": "In Machiavelli's framework, which is safer: relying on what others feel or relying on what one controls?", "back": "Relying on what one controls."}, {"front": "Why does Machiavelli argue that 'love' is not a reliable tool for a prince during times of crisis?", "back": "Because men are scrupulous about offending someone they fear, but easily offend someone they love for personal gain."}, {"front": "Machiavelli views the Florentines' refusal to use force in Pistoia as an act of 'clemency' that actually caused more _____.", "back": "Suffering"}, {"front": "According to the 'Think Deeper' section, what distinguishes a 'feared' ruler from a 'hated' one?", "back": "A feared ruler uses severity cleanly and firmly, while a hated ruler is seen as grasping or humiliating."}, {"front": "True or False: Machiavelli believes a prince should strive to be hated to ensure absolute control.", "back": "False."}, {"front": "What is the primary danger of a prince being 'negligent' in his use of force?", "back": "It allows widespread disorder and factional violence to destroy the state."}, {"front": "According to Machiavelli, do men fear punishment more or less than they fear breaking a bond of love?", "back": "More (dread of punishment 'never fails')."}, {"front": "What role does 'mutual benefit' play in Machiavelli's concept of love?", "back": "It is the only factor that preserves the bond of love; once it disappears, the bond breaks."}, {"front": "How does Machiavelli justify Cesare Borgia's execution of rival warlords?", "back": "It was a decisive act that produced peace and unity in the Romagna."}, {"front": "According to Machiavelli, the primary risk of relying on love is that people are 'primarily _____-_____.'", "back": "Self-interested"}, {"front": "In the context of Chapter XVII, what does the term 'patrimony' refer to?", "back": "Inherited property or wealth."}, {"front": "What is the specific psychological mechanism that makes fear effective in governance?", "back": "The dread of punishment."}, {"front": "Machiavelli posits that a prince can be feared and yet not hated simultaneously if he avoids what specific behavior?", "back": "Abstaining from the property and women of his subjects."}, {"front": "Why is the 'one-liner' that it is better to be feared than loved considered an oversimplification of Machiavelli's argument?", "back": "Because the full argument includes the crucial qualification that the prince must avoid being hated."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
