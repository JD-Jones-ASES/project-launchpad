<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 23, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, what is the primary way a prince reveals his own intelligence to others?", "back": "By the quality of the people he chooses to advise him."}, {"front": "The character of a prince's servants is determined by the _____ of the prince.", "back": "Discrimination"}, {"front": "What is the basis for the 'first opinion' formed about a prince's understanding?", "back": "Observing the men he has around him."}, {"front": "Under what conditions is a prince considered wise regarding his choice of servants?", "back": "When the servants are capable and faithful."}, {"front": "Why is a prince credited with wisdom when he has capable and faithful servants?", "back": "Because he knew how to recognize capability and maintain their faithfulness."}, {"front": "If a prince chooses servants who are not capable or faithful, what is considered his 'prime error'?", "back": "The initial act of choosing them."}, {"front": "Who was the servant of Pandolfo Petrucci mentioned as an example of a prince's cleverness?", "back": "Messer Antonio da Venafro."}, {"front": "Pandolfo Petrucci was the Prince of which city?", "back": "Siena"}, {"front": "How many classes of intellect does Machiavelli define?", "back": "Three"}, {"front": "What defines the first and 'most excellent' class of intellect?", "back": "An intellect which comprehends by itself."}, {"front": "What defines the second class of intellect, which Machiavelli calls 'good'?", "back": "An intellect which appreciates what others have comprehended."}, {"front": "What defines the third class of intellect, which Machiavelli deems 'useless'?", "back": "An intellect which neither comprehends by itself nor through the showing of others."}, {"front": "Rank the intellect that 'comprehends by itself' according to Machiavelli.", "back": "Most excellent"}, {"front": "Rank the intellect that 'appreciates what others comprehended' according to Machiavelli.", "back": "Good"}, {"front": "Rank the intellect that 'neither comprehends by itself nor by the showing of others' according to Machiavelli.", "back": "Useless"}, {"front": "Why is a prince of the 'second rank' of intellect still able to govern effectively?", "back": "He has the judgment to recognize good and bad in what is said and done by others."}, {"front": "In the second rank of intellect, even if the prince lacks _____, he can still praise or correct his servants.", "back": "Initiative"}, {"front": "What is the practical benefit of a prince being able to recognize good and bad in his servant's actions?", "back": "The servant cannot hope to deceive him and is kept honest."}, {"front": "What 'never-failing test' does Machiavelli suggest for forming an opinion of a servant?", "back": "Observing if the servant thinks more of their own interests than the prince's."}, {"front": "According to Machiavelli, why is a servant who seeks his own profit in everything untrustworthy?", "back": "Because he who holds the state of another should never think of himself, only the prince."}, {"front": "To what matters should a good servant never pay attention?", "back": "Matters in which the prince is not concerned."}, {"front": "What should a prince do to ensure his servant remains honest?", "back": "Study him, honour him, enrich him, and do him kindnesses."}, {"front": "Besides riches and honors, what should a prince share with a servant to keep them faithful?", "back": "Cares (responsibilities)."}, {"front": "Why should a prince give a servant 'many honours'?", "back": "So that the servant does not desire more honours."}, {"front": "What is the purpose of a prince enriching his servant?", "back": "To prevent the servant from wishing for more riches."}, {"front": "Why should a prince assign 'many cares' to a servant?", "back": "So that the servant will 'dread chances' or fear changes to the status quo."}, {"front": "A prince must ensure his servant realizes that he cannot _____ alone.", "back": "Stand"}, {"front": "What is the result when both the prince and servant are properly disposed toward one another?", "back": "They can trust each other."}, {"front": "What is the predicted outcome when the relationship between prince and servant lacks mutual trust and proper disposition?", "back": "A disastrous end for one or the other."}, {"front": "What determines if a prince's servants are 'good or not'?", "back": "The prince's own discrimination."}, {"front": "According to Machiavelli, what is the 'first rank' of intellect?", "back": "The most excellent (comprehends by itself)."}, {"front": "What is the defining trait of a servant who will 'never make a good servant'?", "back": "Thinking more of his own interests than the prince's."}, {"front": "Cloze: A prince reveals his understanding by _____.", "back": "The men he has around him"}, {"front": "How does a prince of the 'second rank' maintain honesty in his servants?", "back": "By praising the good and correcting the bad, removing the hope of deception."}, {"front": "What must a person who 'has the state of another in his hands' prioritize?", "back": "The interests of the prince."}, {"front": "Cloze: To keep a servant honest, a prince ought to share with him _____ and _____.", "back": "Honours and cares"}, {"front": "In the case of Pandolfo Petrucci, what did the excellence of his servant signify about Pandolfo?", "back": "That he was a very clever man."}, {"front": "What does Machiavelli suggest is the consequence of a prince being unable to recognize good or bad advice?", "back": "He possesses the 'useless' third class of intellect."}, {"front": "If a prince and servant are not 'thus disposed' (mutually supportive), what is the inevitable end?", "back": "Disaster"}, {"front": "What prevents a servant from desiring more honours according to Machiavelli's strategy?", "back": "Being given so many honours that they do not seek more."}, {"front": "What prevents a servant from wishing for more riches in Machiavelli's framework?", "back": "Being enriched by the prince."}, {"front": "What causes a servant to 'dread chances' in the prince's service?", "back": "Having many cares/responsibilities."}, {"front": "According to Machiavelli, why is recognizing a capable servant a sign of wisdom?", "back": "It proves the prince knows how to recognize talent and maintain loyalty."}, {"front": "What is the relationship between the prince's intellect and his ability to judge his servants?", "back": "The prince's intellect allows him to praise the good and correct the bad in his servant's work."}, {"front": "How does Machiavelli describe an intellect that requires others to show it what to comprehend?", "back": "The second class (good)."}, {"front": "How does Machiavelli describe an intellect that can neither comprehend alone nor with help?", "back": "The third class (useless)."}, {"front": "Machiavelli argues that a servant should 'never think of himself, but always of _____.'", "back": "His prince"}, {"front": "What is the specific danger of a servant who seeks his own profit in everything?", "back": "He can never be trusted."}, {"front": "What does the prince achieve by doing 'kindnesses' for his servant?", "back": "He keeps the servant honest and loyal."}, {"front": "Why is the choice of servants of 'no little importance' to a prince?", "back": "It is the primary indicator of the prince's wisdom and understanding."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
