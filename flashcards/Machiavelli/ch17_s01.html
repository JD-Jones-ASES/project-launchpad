<!DOCTYPE html>
<html lang="en">
<head>

    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 17, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In Machiavelli's political theory, what is the term for the pursuit of practical results over idealized visions of virtue?", "back": "The effectual truth"}, {"front": "What is the primary pair of opposed qualities Machiavelli analyzes when applying his method to a prince's conduct?", "back": "Liberality (generosity) and parsimony (miserliness)"}, {"front": "According to Machiavelli, why is genuine generosity self-defeating for a prince?", "back": "It exhausts the prince's resources, eventually forcing him to tax or seize property from his subjects."}, {"front": "What is the final reputational outcome for a prince who attempts to maintain a policy of generosity until his treasury is empty?", "back": "He becomes both hated for his subsequent oppression and despised for his stinginess."}, {"front": "Concept: The Paradox of Liberality", "back": "A prince's attempt to be seen as generous leads to the depletion of wealth, resulting in oppressive taxation and a reputation for being miserly."}, {"front": "Why does Machiavelli argue that a 'miserly' prince is actually more generous to the general public in the long run?", "back": "His careful management allows him to defend the state and avoid raising taxes on the majority of his subjects."}, {"front": "In Machiavelli's view, a quality that appears to be a vice, like parsimony, is politically valuable because it produces _____.", "back": "Fiscal security and low taxation"}, {"front": "According to the text, a quality that appears to be a virtue, like generosity, is politically dangerous because it eventually functions as which vice?", "back": "Financial desperation and heavy taxation"}, {"front": "Why is a reputation for being miserly preferable to a reputation for generosity purchased at the cost of oppression?", "back": "Being thought miserly does not produce the active hatred that stems from seizing subjects' property."}, {"front": "How did Pope Julius II use the reputation for generosity to achieve his political goals?", "back": "He distributed money to the cardinals to win the papacy."}, {"front": "Why did Pope Julius II abandon his reputation for generosity once he became Pope?", "back": "To ensure he had the funds necessary to govern and conduct war effectively."}, {"front": "Under what specific condition is a prince's generosity considered sustainable by Machiavelli?", "back": "When the resources being distributed are the spoils of conquest (the wealth of others)."}, {"front": "Why does giving away the spoils of conquest not harm a prince's standing?", "back": "It costs the prince nothing of his own while increasing his soldiers' loyalty."}, {"front": "Name two of the great founders Machiavelli cites as leaders who were generous only with the wealth of others.", "back": "Cyrus and Scipio (or Moses and Romulus)"}, {"front": "Instead of moral principle, Machiavelli argues a prince must be guided by _____ and _____.", "back": "Circumstance and necessity"}, {"front": "Machiavelli’s three-step pedagogical pattern involves stating conventional wisdom, revealing a trap, and then proposing a _____.", "back": "Counter-intuitive solution"}, {"front": "What is the structural commonality between Machiavelli's chapters on liberality, cruelty, and faith-keeping?", "back": "They all argue that moral categories are less stable than they appear and must be navigated based on political necessity."}, {"front": "What modern economic concept mirrors Machiavelli’s analysis of the prince who overspends to maintain popularity?", "back": "Unsustainable fiscal policy"}, {"front": "In modern political terms, how does 'borrowing' relate to Machiavelli's 'trap of generosity'?", "back": "It conceals the true cost of generosity until the resources run out or taxes must be raised."}, {"front": "Why does Machiavelli believe that 'appearances often matter more than reality' in politics?", "back": "Reputation shapes the loyalty of subjects and the respect of enemies, even if the reputation is not grounded in truth."}, {"front": "What is the specific danger of a prince trying to regain a reputation for generosity after his treasury is depleted?", "back": "He is forced to become oppressive, which generates hatred among the people."}, {"front": "Machiavelli's training of the reader aims to help them think past their initial _____.", "back": "Moral intuitions"}, {"front": "How does parsimony allow a prince to be 'generous' during times of war?", "back": "It provides him with the necessary funds to defend the state without imposing emergency taxes."}, {"front": "In the Machiavellian framework, why is the shift from generosity to parsimony by a leader like Julius II considered 'good judgment' rather than hypocrisy?", "back": "The leader is simply using the most effective tool for the current political moment."}, {"front": "What happens to the reputation of a prince who 'achieved nothing more than a word' by being called generous but then running out of money?", "back": "His reputation vanishes, leaving him with financial desperation and political instability."}, {"front": "According to Machiavelli, what is the 'effectual truth' regarding a prince who wishes to be liked for his open hand?", "back": "He will end by being despised."}, {"front": "The prince who is called miserly but whose subjects are lightly taxed has achieved something _____.", "back": "Real"}, {"front": "How does Machiavelli redefine the 'virtue' of generosity in a political context?", "back": "As a strategic tool to be used only when it does not deplete the prince’s own essential resources."}, {"front": "What is the primary psychological driver of 'hatred' toward a prince according to Machiavelli's section on liberality?", "back": "The prince’s need to take property from his subjects to fund his spending."}, {"front": "Which historical figure does Machiavelli use to illustrate the use of generosity specifically for winning an election?", "back": "Pope Julius II"}, {"front": "Why does Machiavelli argue that a prince who gives away what he has seized from enemies is 'circulating the resources of others'?", "back": "The wealth does not come from his own treasury or his subjects' pockets."}, {"front": "Machiavelli suggests that a prince should care little for the reputation of being a _____ if it prevents him from being a predator to his subjects.", "back": "Miser (or parsimonious ruler)"}, {"front": "What is the 'trap' concealed in the conventional wisdom that a prince should be generous?", "back": "Generosity requires constant funding, leading to the depletion of the state's wealth."}, {"front": "A prince's parsimony is a 'vice' that allows him to exercise the 'virtue' of _____.", "back": "Effective defense (or low taxation)"}, {"front": "In the modern counterpart of Machiavelli’s argument, what happens when 'the bills come due' for a politician's promises?", "back": "The ruler must either become oppressive by raising taxes or run out of resources."}, {"front": "According to Machiavelli, why is the distinction between 'one's own wealth' and 'the wealth of others' vital for a prince?", "back": "Spending one's own wealth leads to ruin, while spending the wealth of others increases one's reputation at no cost."}, {"front": "What is the primary instability caused by a reputation for generosity?", "back": "It forces the prince into a cycle of extraction (taxation) that alienates the people."}, {"front": "Machiavelli’s analysis suggests that 'virtue' and 'vice' are not fixed, but rather depend on their _____.", "back": "Political consequences (or outcomes)"}, {"front": "Why is the prince's reputation for parsimony described as sustainable?", "back": "It does not require continuous new revenue to maintain, unlike a reputation for generosity."}, {"front": "According to the guide, Machiavelli's discussion of generosity serves as a logical template for which other topics?", "back": "Cruelty and clemency; love and fear; faith-keeping and deception."}, {"front": "Which group does Machiavelli suggest should benefit from a prince's use of spoils of conquest?", "back": "His soldiers"}, {"front": "In Machiavelli's political world, the word 'generous' can become a source of _____ once the prince's treasury is empty.", "back": "Financial desperation"}, {"front": "True or False: Machiavelli believes a prince should never be generous under any circumstances.", "back": "False (he can be generous with the spoils of conquest or to win an initial position)."}, {"front": "How does Machiavelli characterize the transition between using generosity and using parsimony?", "back": "As a strategic adaptation to changing goals and circumstances."}, {"front": "What is the 'cycle of depletion and extraction'?", "back": "Spending leads to empty treasuries, which leads to heavy taxes, which leads to hatred and instability."}, {"front": "Which of the following is NOT one of the three options Machiavelli lists for a prince with a depleted treasury: raise taxes, seize property, or declare war?", "back": "Declare war (the third option is to curtail generosity)."}, {"front": "Machiavelli argues that a prince who is called 'miserly' actually performs which essential civic 'generosity'?", "back": "Civic celebrations and addressing true need without overtaxing."}, {"front": "Why is the reputation for parsimony considered a 'real' achievement compared to a reputation for generosity?", "back": "It is based on the tangible security and financial health of the state rather than empty praise."}, {"front": "Concept: Effectual Truth vs. Idealized Virtue", "back": "The difference between how a prince actually maintains power and the moral standards people wish he would follow."}, {"front": "What is the pedagogical purpose of using 'counter-intuitive' solutions in the text?", "back": "To break the reader's reliance on conventional moral wisdom in political analysis."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
