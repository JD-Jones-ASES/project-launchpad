    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 10, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

        </div>

    <script>
    var CARDS = [{"front": "What defines a 'civil principality' in Machiavelli's framework?", "back": "A state where a private citizen rises to power through the favor of fellow citizens rather than crime or conquest."}, {"front": "Which two social groups possess the power to elevate a citizen to a civil principality?", "back": "The nobles and the common people."}, {"front": "According to Machiavelli, what is the fundamental desire of the nobles?", "back": "To oppress the people."}, {"front": "What is the primary desire of the common people in a city?", "back": "To avoid being oppressed."}, {"front": "Why is a prince raised by nobles considered to be in an unstable position?", "back": "His patrons are powerful, expect rewards, and can easily become dangerous enemies if unsatisfied."}, {"front": "Why is a prince who owes his throne to the nobles never fully independent?", "back": "He is surrounded by ambitious equals who view themselves as his patrons rather than his subjects."}, {"front": "What single requirement does Machiavelli place on a prince to satisfy the common people?", "back": "The prince must refrain from oppressing them."}, {"front": "Why does Machiavelli argue it is easier to satisfy the people than the nobles?", "back": "The people's desire not to be oppressed is more honorable and simpler to meet than the nobles' desire to command."}, {"front": "Machiavelli concludes that it is better for a prince to have the support of the _____.", "back": "people"}, {"front": "Why does Machiavelli describe the people's support as a 'fortress' for the prince?", "back": "The people are more numerous and powerful than the nobles, providing a more secure base against enemies."}, {"front": "In Machiavelli's view, what makes the people a more reliable base of support than the elites?", "back": "Their relative weakness and lack of ambition to govern make them less likely to scheme against the prince."}, {"front": "How does the calculation of nobles differ from the behavior of the people toward a prince?", "back": "Nobles constantly calculate their own profit and may undermine a prince, while the people remain loyal if they feel protected."}, {"front": "Term: Grandi", "back": "The 'great' or nobles who desire to command and oppress the common people."}, {"front": "Term: Popolo", "back": "The common people who desire only not to be commanded or oppressed."}, {"front": "What are the two irreconcilable 'humors' that Machiavelli identifies in every city?", "back": "The desire of the great to oppress and the desire of the people not to be oppressed."}, {"front": "If a prince is raised to power by the nobles, what must he immediately do to secure his position?", "back": "He must work to win over the people and become their protector."}, {"front": "What is the consequence for a prince who fails to either protect the people or satisfy the nobles?", "back": "He will be destroyed by both factions."}, {"front": "What is the practical definition of political legitimacy in Machiavelli's thought?", "back": "The necessity of maintaining the support or acquiescence of the majority to govern stably."}, {"front": "According to the logic of popular legitimacy, why does a revolt of the many against the few usually succeed?", "back": "The sheer number of the people outweighs the organized but limited power of the elite."}, {"front": "Which school of political thought is directly connected to Machiavelli's observations on elite and popular 'humors'?", "back": "The Italian Realist school."}, {"front": "Which two thinkers in the Italian Realist school developed theories on the distinction between the ruling class and the ruled?", "back": "Gaetano Mosca and Vilfredo Pareto."}, {"front": "What core constraint on elite rule did Mosca and Pareto identify that echoes Machiavelli?", "back": "Elites can only govern stably if they maintain a degree of popular acquiescence."}, {"front": "Why does Machiavelli advocate for the prince to win the people's goodwill?", "back": "It is a matter of rational calculation for power preservation rather than moral sentiment."}, {"front": "How does the prince's need for popular support align with the development of democratic theory?", "back": "It establishes a practical incentive for rulers to govern in ways that are acceptable to the governed."}, {"front": "Why are the 'great' (nobles) described as potential rivals even when they are satisfied?", "back": "Their desires are insatiable, and they view themselves as equals to the prince."}, {"front": "Under what condition will the people rally to defend a prince against internal and external enemies?", "back": "When they feel protected by the prince and are left in peace."}, {"front": "According to Machiavelli, the people's very _____ is what makes them a reliable base for a prince.", "back": "weakness"}, {"front": "What does a prince who owes his throne to the great men lack that a prince supported by the people possesses?", "back": "Full independence from the demands of powerful patrons."}, {"front": "What term does Machiavelli use to describe the opposing social drives within a city?", "back": "Humors"}, {"front": "How does the prince's role change when he is elevated by the nobles instead of the people?", "back": "He must shift from being a tool of the nobles to a protector of the people against the nobles."}, {"front": "A prince loved by the nobles but hated by the people has no real _____.", "back": "security"}, {"front": "Why is it easier to hold a principality when the people are the primary base of support?", "back": "The people have modest desires and do not seek to govern or overthrow the ruler if satisfied."}, {"front": "In the context of 'The Civil Principality', what is meant by 'popular acquiescence'?", "back": "The passive acceptance of a ruler's authority by the majority of the population."}, {"front": "Why is the nobles' support considered more dangerous than the people's hostility?", "back": "Nobles are organized, ambitious, and capable of active subversion, whereas the people are a diffuse mass."}, {"front": "What is the primary difference between a civil principality and one gained through crime?", "back": "A civil principality is gained through the favor and consent of fellow citizens."}, {"front": "According to Machiavelli, what is the 'more durable foundation for power'?", "back": "Popular support."}, {"front": "What does Machiavelli suggest is the ultimate outcome of a prince trying to remain neutral between the nobles and the people?", "back": "Destruction by both sides."}, {"front": "How does Machiavelli's advice to the prince create an early form of political accountability?", "back": "By demonstrating that a prince's survival depends on serving the broad interests of the people."}, {"front": "The desire of the 'Grandi' to command and oppress is described as _____.", "back": "insatiable"}, {"front": "The logic of political legitimacy runs in the direction of accountability because the people cannot be indefinitely _____ without revolting.", "back": "oppressed"}, {"front": "Why is the support of the many considered 'more powerful' than the support of the few?", "back": "The sheer volume of citizens makes their collective action or resistance impossible to suppress indefinitely."}, {"front": "If a prince satisfies the 'modest desires' of the people, they will remain _____.", "back": "loyal"}, {"front": "Gaetano Mosca's distinction between the ruling class and the ruled is an evolution of Machiavelli's concept of _____.", "back": "humors"}, {"front": "What is the 'counterintuitive' aspect of Machiavelli's preference for popular support?", "back": "A realist would be expected to favor the concentrated power of elites over the diffuse power of the masses."}, {"front": "In a civil principality, why are the nobles more likely to see the prince as an equal?", "back": "They are the ones who elevated him to power and believe they share his status."}, {"front": "What is the primary goal of the 'Popolo' in Machiavelli's social division?", "back": "To be left alone and not commanded by the great."}, {"front": "A prince who acts as a protector of the people effectively mitigates the danger posed by _____.", "back": "hostile nobles"}, {"front": "Why is the people's lack of interest in governing an advantage for a prince?", "back": "It removes a source of internal competition for the prince's supreme authority."}, {"front": "According to the Italian Realists, what must elites do to ensure their survival?", "back": "Serve broad interests to maintain some degree of popular support."}, {"front": "What is the 'clear conclusion' Machiavelli draws regarding the two roads to power?", "back": "It is better to have the people's support than the nobles' support."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
