<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was Machiavelli's political status when he wrote the dedicatory letter for *The Prince*?", "back": "He was unemployed, without political influence, and lacked hope for official rehabilitation."}, {"front": "To which specific figure is the dedicatory letter of *The Prince* addressed?", "back": "Lorenzo de' Medici (addressed as Your Magnificence)."}, {"front": "How does the introductory text characterize Machiavelli's tone in the dedicatory letter?", "back": "Humble but not servile; frank but calculated."}, {"front": "In the introduction, what two objects are used as analogies for the value of Machiavelli's gift?", "back": "A map or a hunting falcon."}, {"front": "According to the introduction, where does the value of Machiavelli's gift lie?", "back": "In its usefulness rather than the wealth or status of the giver."}, {"front": "What did Machiavelli believe was more valuable than any material possession money could buy?", "back": "His years of experience and his rigorous analysis of that experience."}, {"front": "List four examples of traditional gifts given to princes according to the primary source.", "back": "Horses, arms, cloth of gold, and precious stones."}, {"front": "What does Machiavelli claim is his 'most dear' and valued possession?", "back": "The knowledge of the actions of great men."}, {"front": "Machiavelli's political knowledge was acquired through long experience in _____ and a continual study of _____.", "back": "Contemporary affairs; antiquity."}, {"front": "How did Machiavelli process his many years of study and experience for the prince?", "back": "He reflected with great diligence and digested the knowledge into a little volume."}, {"front": "What specific opportunity does Machiavelli offer the Prince through his book?", "back": "The ability to understand in the shortest time everything Machiavelli learned over many years."}, {"front": "Why did Machiavelli explicitly avoid 'swelling or magnificent words' in his writing?", "back": "He wanted the work to be valued for its truth and the weightiness of the theme."}, {"front": "What term does Machiavelli use to describe the stylistic decorations he intentionally omitted?", "back": "Extrinsic allurements (or ornaments)."}, {"front": "According to Machiavelli, why should it not be considered 'presumption' for a man of low condition to discuss princes?", "back": "Because different social positions provide unique perspectives necessary for understanding."}, {"front": "In the landscape analogy, where must one stand to contemplate the nature of mountains?", "back": "Below in the plain."}, {"front": "In the landscape analogy, where must one stand to contemplate the nature of the plains?", "back": "Upon high mountains."}, {"front": "According to Machiavelli's analogy, who is best suited to understand the nature of the people?", "back": "A prince."}, {"front": "According to Machiavelli's analogy, who is best suited to understand the nature of princes?", "back": "A person of the people (a commoner)."}, {"front": "What does Machiavelli hope Lorenzo will attain through his 'fortune and other attributes'?", "back": "Greatness."}, {"front": "What phrase does Machiavelli use to describe his own current state of suffering at the end of the letter?", "back": "A great and continued malignity of fortune."}, {"front": "Why does Machiavelli describe his suffering as 'unmerited'?", "back": "He believes his hardship is an injustice caused by bad luck rather than his own faults."}, {"front": "Term: 'Contemporary affairs'", "back": "Definition: Current political events and diplomatic activities of Machiavelli's own time."}, {"front": "Term: 'Study of antiquity'", "back": "Definition: The analytical reading and examination of historical records and classical authors from the past."}, {"front": "What was the purpose of the 'dedicatory letter' in the context of Machiavelli's life?", "back": "It was a formal attempt to seek employment and rehabilitation from the ruling Medici family."}, {"front": "What does the introduction say Machiavelli presents as his 'gift' to the prince?", "back": "A book summarizing everything he knows about how rulers succeed."}, {"front": "In the context of the letter, what are 'rounded periods'?", "back": "Elaborate, balanced, and stylistically complex rhetorical sentences."}, {"front": "What does Machiavelli imply by describing his work as 'digested into a little volume'?", "back": "The material is concentrated, essential, and free of unnecessary filler."}, {"front": "Machiavelli suggests that to understand the 'nature of princes,' one needs to be _____.", "back": "Of the people."}, {"front": "How does Machiavelli view the traditional gifts (horses, stones, gold) in relation to his own work?", "back": "They are external ornaments, whereas his gift is internal, useful knowledge."}, {"front": "What condition does Machiavelli place on the effectiveness of his book for Lorenzo?", "back": "That it be diligently read and considered."}, {"front": "The introduction notes that Machiavelli compares himself to a person bringing a gift, but its value is not in the giver's _____.", "back": "Wealth or status."}, {"front": "What is the 'testimony of my devotion' Machiavelli refers to in the letter?", "back": "The book itself, *The Prince*."}, {"front": "Machiavelli identifies his knowledge as being acquired through 'many years' and with many _____ and _____.", "back": "Troubles; dangers."}, {"front": "How does Machiavelli hope his work will be received by the Prince?", "back": "Acceptable due to the Prince's 'benignity' and the weight of the subject matter."}, {"front": "Which social class does Machiavelli place himself in when discussing his right to write about princes?", "back": "A low and humble condition."}, {"front": "In the landscape analogy, 'lofty places' represent the concerns of _____.", "back": "Princes."}, {"front": "What does Machiavelli ask Lorenzo to do from the 'summit of your greatness'?", "back": "Turn his eyes toward the lower regions (Machiavelli's plight)."}, {"front": "Concept: The First Political Realist.", "back": "Definition: A thinker who analyzes politics based on objective experience and history rather than ideal states or moral embellishment."}, {"front": "Machiavelli's letter is described as one of the most _____ documents he ever wrote.", "back": "Carefully crafted."}, {"front": "What does Machiavelli believe is the primary factor that has kept him from offering a more 'valuable' gift than his book?", "back": "Fortune."}, {"front": "What is the ultimate goal Machiavelli expresses for the recipient of the book?", "back": "That the Prince attains the greatness promised to him."}, {"front": "How does the dedicatory letter characterize the relationship between truth and rhetoric?", "back": "It prioritizes the 'truth of the matter' over rhetorical embellishment and 'magnificent words'."}, {"front": "What does the term 'Malignity' imply about Machiavelli's view of his own life circumstances?", "back": "He views his situation as being caused by a hostile or evil turn of fate."}, {"front": "According to the introduction, Machiavelli was without hope of official _____.", "back": "Rehabilitation."}, {"front": "The introduction states that Machiavelli's tone is frank but _____.", "back": "Calculated."}, {"front": "What does Machiavelli claim he has not 'stuffed' his work with?", "back": "Rounded periods or extrinsic allurements."}, {"front": "Machiavelli describes his volume as containing all he has learnt with 'so many _____ and _____.'", "back": "Troubles; dangers."}, {"front": "In the landscape artist analogy, what is the role of 'the plain'?", "back": "It is the vantage point used to see the mountains."}, {"front": "What does Machiavelli mean by the 'weightiness of the theme'?", "back": "The serious and important nature of governing and political power."}, {"front": "Machiavelli asserts that the understanding of a Prince's nature requires the perspective of a _____.", "back": "Commoner (or person of the people)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
