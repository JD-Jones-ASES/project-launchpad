<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, what are the two fundamental categories of all political authority?", "back": "Republics and principalities."}, {"front": "What is the primary analytical method Machiavelli employs at the start of 'The Prince'?", "back": "Classifying political entities before analyzing them."}, {"front": "Machiavelli’s approach of describing states as they actually are, rather than as they ought to be, is called the \"_____ truth of the matter.\"", "back": "effectual"}, {"front": "Why does Machiavelli exclude the study of republics from 'The Prince'?", "back": "He intends to maintain a deliberate and narrow focus specifically on principalities."}, {"front": "In which of his works does Machiavelli provide a detailed study of republics?", "back": "Discourses on Livy"}, {"front": "What defines a hereditary principality?", "back": "A state ruled by a family that has been long established in power."}, {"front": "What are the two distinct types of \"new\" principalities identified by Machiavelli?", "back": "Entirely new states and territories annexed to an existing hereditary state."}, {"front": "Which historical figure does Machiavelli use as an example of an entirely new principality founded by military genius?", "back": "Francesco Sforza"}, {"front": "Francesco Sforza is cited for his founding of which specific state?", "back": "The Duchy of Milan"}, {"front": "The Kingdom of Naples, absorbed by the Spanish crown, serves as an example of a(n) _____ territory.", "back": "annexed"}, {"front": "Why is the distinction between hereditary and new states significant for a prince?", "back": "The specific challenges and available solutions differ dramatically depending on the state's type."}, {"front": "According to Machiavelli, new states are acquired either by the prince's own arms or by the arms of _____.", "back": "others"}, {"front": "What are the two opposing forces that Machiavelli identifies as the drivers of political outcomes?", "back": "Virtù and fortuna."}, {"front": "Concept: Virtù", "back": "Definition: The combination of skill, energy, decisiveness, and cunning used to seize opportunity and impose one's will."}, {"front": "How does the Machiavellian concept of virtù differ from traditional moral virtue?", "back": "It focuses on political effectiveness and strength rather than goodness, piety, or righteousness."}, {"front": "Which three \"great founders\" are noted for possessing an abundance of virtù?", "back": "Moses, Cyrus, and Romulus."}, {"front": "Concept: Fortuna", "back": "Definition: The unpredictable currents of circumstance, timing, and luck that remain beyond human control."}, {"front": "Machiavelli personifies the force of Fortuna as a(n) _____.", "back": "powerful and capricious woman"}, {"front": "What is the central philosophical problem presented in 'The Prince' regarding a ruler's power?", "back": "The tension between what a ruler can control (virtù) and what they cannot (fortuna)."}, {"front": "Definition: Principality", "back": "A state ruled by a single sovereign or prince, rather than by a republic."}, {"front": "Which ruler conquered the Kingdom of Naples in 1503?", "back": "Ferdinand of Aragon"}, {"front": "In Machiavelli's view, how does classification function within his political analysis?", "back": "It serves as the essential first step of analysis by sorting states into categories with specific rules."}, {"front": "What does Machiavelli suggest is the relationship between virtù and opportunity?", "back": "Virtù allows a prince to recognize and seize the opportunities presented by circumstance."}, {"front": "According to the text, what is the risk of reading 'The Prince' without acknowledging Machiavelli's work on republics?", "back": "The reader may conclude Machiavelli favors tyranny and miss half of his political perspective."}, {"front": "What role does Chapter 1 play in the overall structure of 'The Prince'?", "back": "It acts as a complete map or roadmap for the subjects covered in the following chapters."}, {"front": "How does Machiavelli differentiate the acquisition of power through \"ability\" versus \"fortune\"?", "back": "Ability involves the prince's own skill and virtù, while fortune involves external luck and timing."}, {"front": "In the context of 'The Prince', what does it mean to impose one's will on \"circumstances\"?", "back": "Using virtù to shape and control political outcomes despite the presence of fortuna."}, {"front": "Machiavelli contrasts the \"idealized constitutions of philosophers\" with what alternative?", "back": "The classification of what states actually are in reality."}, {"front": "What specific force did Francesco Sforza use to found the Duchy of Milan?", "back": "His own military genius."}, {"front": "What is the outcome for a prince who is swept to power or ruin by Fortuna alone?", "back": "The prince is at the mercy of unpredictable currents beyond their own control."}, {"front": "Why is the Kingdom of Naples described as a territory with its own \"history and customs\" in the context of Ferdinand of Aragon?", "back": "It highlights the difficulty of a distant power absorbing a territory that already has established traditions."}, {"front": "How does Machiavelli characterize the nature of all political authority at the very start of the book?", "back": "It is divided between rule over men in either republics or principalities."}, {"front": "What term describes a state that is ruled by an established family for generations?", "back": "Hereditary principality."}, {"front": "According to Machiavelli, what are the two sources of military force a prince might use to acquire a state?", "back": "The prince's own arms or the arms of others."}, {"front": "What is the primary function of the \"effectual truth\" in Machiavelli's methodology?", "back": "To provide a realistic and practical analysis of political power as it functions in the world."}, {"front": "In the context of political acquisition, what does the term \"fortune\" encompass?", "back": "Circumstance, timing, and luck."}, {"front": "How does Machiavelli justify his systematic categorization of states?", "back": "By showing that the nature of the state dictates the specific problems a ruler must overcome."}, {"front": "What is the relationship between Chapter 1’s taxonomy and the subsequent chapters of 'The Prince'?", "back": "The subsequent chapters work through each category of the taxonomy in a systematic order."}, {"front": "Which force is described as capable of \"dashing\" a prince to ruin?", "back": "Fortuna."}, {"front": "In Machiavelli's framework, what must a prince possess to overcome the capricious nature of Fortune?", "back": "Virtù."}, {"front": "What was the status of the Kingdom of Naples when Ferdinand of Aragon conquered it in 1503?", "back": "It was a territory with its own history and customs that became annexed to a distant power."}, {"front": "Why is virtù considered an \"untranslatable\" concept in Machiavelli's work?", "back": "It encompasses a unique blend of political qualities that do not align with standard moral goodness."}, {"front": "Which category of principality involves a ruler seizing power by \"force or fortune\"?", "back": "A new principality."}, {"front": "Machiavelli’s opening sentence states that all states that have held rule over men fall into one of how many categories?", "back": "Two."}, {"front": "What is the specific focus of 'The Prince' according to Machiavelli's introductory taxonomy?", "back": "The study of principalities."}, {"front": "How does Machiavelli describe the reach of political authority in his opening taxonomy?", "back": "As powers that have held and hold rule over men."}, {"front": "Which concept represents the energy and determination of a ruler?", "back": "Virtù."}, {"front": "By excluding the study of republics, what does Machiavelli achieve for his reader?", "back": "A deliberate and concentrated focus on the mechanics of princely rule."}, {"front": "What differentiates the Kingdom of Naples from the Duchy of Milan in Machiavelli's examples?", "back": "Naples was an annexed territory, while Milan was an entirely new principality."}, {"front": "What is the goal of the \"scientist or geographer\" approach Machiavelli takes in his writing?", "back": "To provide a systematic and classification-based study of political power."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
