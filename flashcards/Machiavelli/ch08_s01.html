<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 8, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In Chapter VII of 'The Prince', what is the primary reason rulers who rise through others' fortune often fail?", "back": "Their foundations are insecure and depend entirely on the continued goodwill of their benefactor."}, {"front": "Who does Machiavelli identify as the extraordinary exception to the rule that princes rising on others' fortune usually fail?", "back": "Cesare Borgia."}, {"front": "In what year did Rodrigo Borgia become Pope Alexander VI?", "back": "1492."}, {"front": "What was the biological relationship between Pope Alexander VI and Cesare Borgia?", "back": "Cesare Borgia was the illegitimate son of the Pope."}, {"front": "Which three resources of the Church did Pope Alexander VI use to carve out a state for his son?", "back": "Money, political influence, and the threat of spiritual sanction."}, {"front": "Before pursuing a military career in 1498, what high-ranking clerical office did Cesare Borgia hold?", "back": "Cardinal."}, {"front": "What was Cesare Borgia's formal title after being released from clerical orders?", "back": "Duke of Romagna (or Duke Valentino)."}, {"front": "According to Machiavelli, what quality of Borgia's strategy distinguished him from other lucky princes?", "back": "The methodical and long-range nature of his planning."}, {"front": "What was the first step in Borgia's strategy to secure his power in the Romagna?", "back": "Weakening the families allied to great powers, specifically the Orsini and the Colonna."}, {"front": "Which powerful family in the Romagna was historically connected to French interests?", "back": "The Orsini."}, {"front": "Which powerful family in the Romagna leaned toward the interests of Spain?", "back": "The Colonna."}, {"front": "What was the second step in Borgia's long-term strategy for political survival?", "back": "Ensuring that any future pope would be either friendly to his interests or too weak to harm him."}, {"front": "Why did Borgia insist on building a military force of his own?", "back": "To ensure his army owed loyalty directly to him rather than to outside commanders or his father."}, {"front": "Term: The Romagna", "back": "The territory of petty lordships in central Italy systematically conquered by Cesare Borgia."}, {"front": "What was the internal state of the Romagna before Cesare Borgia's conquest?", "back": "It was plagued by chaos, private wars, and the cruelties of various petty rulers."}, {"front": "Who did Borgia appoint as governor to restore order to the Romagna?", "back": "Remirro de Orco."}, {"front": "How does Machiavelli describe the character of governor Remirro de Orco?", "back": "He was 'a cruel and capable man'."}, {"front": "What was the political consequence of Remirro de Orco's successful pacification of the Romagna?", "back": "The people developed a deep hatred for Remirro due to his cruel methods."}, {"front": "In what city was Remirro de Orco's body publicly displayed after his execution?", "back": "Cesena."}, {"front": "How was Remirro de Orco's body physically presented to the public after his execution?", "back": "It was cut in two and displayed in the public square with a bloody knife beside it."}, {"front": "What was Borgia's primary goal in the public execution of Remirro de Orco?", "back": "To shift the blame for the territory's past cruelties onto the governor and satisfy the people's desire for revenge."}, {"front": "According to Machiavelli, what dual reaction did the spectacle of Remirro's death produce in the populace?", "back": "The people were at once satisfied and stupefied."}, {"front": "Machiavelli uses the Remirro de Orco episode to demonstrate his theory on the management of _____ _____.", "back": "Political perception."}, {"front": "Which two events occurred simultaneously in August 1503 to trigger Borgia's collapse?", "back": "The death of Pope Alexander VI and Borgia's own dangerous illness."}, {"front": "Which enemy of Cesare Borgia was elected to the papacy in 1503?", "back": "Julius II."}, {"front": "What does Machiavelli identify as the single mistake Cesare Borgia made?", "back": "Allowing Julius II to be elected Pope."}, {"front": "To what factor does Machiavelli attribute Borgia's ultimate political failure?", "back": "Fortuna (bad timing and circumstances beyond human planning)."}, {"front": "In what year did Cesare Borgia die?", "back": "1507."}, {"front": "Where did Cesare Borgia die during a minor skirmish?", "back": "Navarre."}, {"front": "How many times did Machiavelli personally meet Cesare Borgia during diplomatic missions?", "back": "Twice."}, {"front": "How does Machiavelli evaluate the moral character of Pope Alexander VI?", "back": "He analyzes him without moral comment as a clever operator serving his family's interests."}, {"front": "What scandalous political methods were commonly associated with the Borgia family?", "back": "Selling Church offices, using excommunication as a weapon, and eliminating enemies."}, {"front": "Concept: Fortuna", "back": "The unpredictable element of luck or circumstance that can override even the most methodical political planning."}, {"front": "What was the purpose of the bloody knife left beside Remirro de Orco's body?", "back": "To symbolize that the execution was an act of justice and to shift responsibility away from Borgia."}, {"front": "Why was Borgia unable to block the election of Julius II?", "back": "His severe illness prevented him from being present for the crucial papal conclave."}, {"front": "According to Machiavelli, why is Borgia a model for all new princes rising by others' arms?", "back": "He took every possible methodical step to secure his state after his initial stroke of luck."}, {"front": "How did the Borgia family's use of spiritual sanctions impact their political power?", "back": "It functioned as a tool for intimidation and the elimination of political rivals."}, {"front": "What was the ultimate fate of the 'petty lordships' of central Italy under Borgia's rule?", "back": "They were systematically conquered and brought under a single, ordered administration."}, {"front": "Cloze: Machiavelli argues that a prince can transfer the blame for necessary cruelty to an _____ he then removes.", "back": "Agent."}, {"front": "What role did Pope Alexander VI play in the arts and administration of the Church?", "back": "He was an effective administrator and a prominent patron of the arts."}, {"front": "How did Borgia's use of his own military force differ from the standard practices of his time?", "back": "He moved away from relying on mercenaries or hired commanders toward a personally loyal army."}, {"front": "What is the core argument Machiavelli makes regarding the relationship between political order and violence?", "back": "That violence may be necessary to establish order, but its perception must be carefully managed to maintain popularity."}, {"front": "At what approximate age did Cesare Borgia die?", "back": "31."}, {"front": "Who is the artist traditionally identified with the 1502 portrait of Cesare Borgia?", "back": "Raphael."}, {"front": "Why did the people of the Romagna initially resent the order imposed by Remirro de Orco?", "back": "Because the pacification was achieved through intense cruelty and brutal efficiency."}, {"front": "Which specific Italian territory was Borgia ruling when he attempted to secure his future independence?", "back": "The Romagna."}, {"front": "According to the 'teachernote', the Remirro de Orco episode serves as a theory for how _____ _____ works.", "back": "Political perception."}, {"front": "What happens to most princes who rely on the 'fortune of others' according to Machiavelli's general skepticism?", "back": "They usually lose their states quickly because they lack their own foundations and roots."}, {"front": "What was the primary vulnerability that caused Borgia's state to collapse in 1503?", "back": "His dependence on his father's life and his own health, both of which failed simultaneously."}, {"front": "Cloze: Machiavelli met Borgia twice during _____ missions in 1502–03.", "back": "Diplomatic."}, {"front": "What was the outcome of Borgia's attempt to weaken the Orsini and Colonna families?", "back": "He successfully reduced them as potential rivals to his power in the Romagna."}, {"front": "According to Machiavelli's verdict, was Borgia's failure his own fault?", "back": "No, it was the result of a concatenation of bad timing that no planning could have prevented."}, {"front": "What does Machiavelli suggest is the best way for a prince to handle the blame for 'necessary cruelties'?", "back": "Shift the blame to an agent and then publicly punish that agent to satisfy the people."}, {"front": "How did Pope Alexander VI's Spanish origin influence his rise in the Church?", "back": "He used wealth, political cunning, and bribery to climb the hierarchy despite being an outsider."}, {"front": "Why is the study of Cesare Borgia essential for understanding 'The Prince'?", "back": "He serves as Machiavelli's foremost example of the 'capable prince' who masters strategy if not luck."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
