<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 14, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, what are auxiliaries?", "back": "Auxiliaries are troops borrowed from another ruler, operating as a complete unit under their own commander."}, {"front": "How does Machiavelli rank military forces from most to least desirable?", "back": "Machiavelli ranks them as: a prince's own troops, followed by mixed forces, then auxiliaries and mercenaries at the bottom."}, {"front": "What is a 'mixed force' in Machiavelli's military hierarchy?", "back": "A mixed force consists of a prince's own troops supplemented by hired (mercenary) or borrowed (auxiliary) men."}, {"front": "Why does Machiavelli consider auxiliaries even more dangerous than mercenaries?", "back": "Auxiliaries' ultimate loyalty is to the ruler who sent them, not the borrowing prince, making their victories a gain for the foreign power, whereas mercenaries are primarily motivated by payment."}, {"front": "What is the key difference in loyalty between mercenary companies and auxiliary troops?", "back": "Mercenaries fight for money and have no master beyond their captain during a campaign, while auxiliaries are loyal to the ruler who dispatched them."}, {"front": "According to Machiavelli, what is the outcome if mercenary troops win a battle for a prince?", "back": "The prince who hired them wins, as their goals (getting paid and achieving victory) are aligned for the duration of the campaign."}, {"front": "What is the main risk if auxiliary troops win a battle for the prince who borrowed them?", "back": "The victory and prestige belong to the ruler who dispatched them, potentially strengthening a rival power and allowing a foreign military to demonstrate its effectiveness on the borrowing prince's own territory."}, {"front": "What are the consequences if auxiliary troops lose a battle for the prince who borrowed them?", "back": "The prince is defeated, the state is weakened, and the loaning prince may exploit this weakness, leaving the borrowing prince with nothing but defeat."}, {"front": "What historical example does Machiavelli use to warn against the long-term consequences of military dependency on auxiliaries?", "back": "Rome's gradual recruitment of barbarian soldiers (Germanic, Gothic) into its legions, which eventually led to these auxiliaries becoming the real military power and their commanders becoming rulers, contributing to the fall of the Western Roman Empire."}, {"front": "How did Pope Julius II's use of Spanish auxiliaries illustrate Machiavelli's warning?", "back": "Julius successfully used Spanish troops to expel the French from Italy, but this action inadvertently established Spain as the dominant military power in Italy for the next century."}, {"front": "What broader political philosophy is Machiavelli articulating through his discussion of military forces?", "back": "A philosophy of political self-reliance, emphasizing that a prince must control the most fundamental levers of political power, especially military might."}, {"front": "According to Machiavelli, what does a prince surrender by depending on others for military security?", "back": "The most fundamental lever of political power, as his survival then depends not on his own strength, but on the conditional and changeable goodwill of his benefactors."}, {"front": "What is Machiavelli's view on 'goodwill' as a basis for political security?", "back": "Goodwill is always conditional and subject to change, making it an unreliable and dangerous foundation for a prince's survival or state security."}, {"front": "What 'broader principle' runs through *The Prince* regarding a ruler's essential needs?", "back": "The prince must control the things that are most essential to his survival, extending beyond just military forces."}, {"front": "What might be considered the modern equivalent of 'own arms' for a nation-state today, according to Machiavelli's logic?", "back": "A standing army, an independent industrial base, a domestic food supply, and control over critical technology."}, {"front": "How would Machiavelli likely view a modern state that is entirely dependent on foreign manufacturers for its weapons or foreign suppliers for its energy?", "back": "With the same concern he directs at a prince who relies on auxiliary troops, as it represents a strategic dependency that undermines self-reliance and sovereignty."}, {"front": "Does Machiavelli oppose alliances in general? Explain.", "back": "No, he understood that states must cooperate. However, he would insist that a state must maintain sufficient independent military capacity to be a genuine partner rather than a dependent client."}, {"front": "What are the political consequences for a modern nation that relies entirely on an ally's protection, in Machiavellian terms?", "back": "Reduced sovereignty, diminished leverage over policy decisions, and increased vulnerability to the ally's strategic priorities."}, {"front": "Briefly compare the immediate vs. long-term outcome of Pope Julius II's reliance on Spanish auxiliaries.", "back": "Immediately, Julius achieved his goal of driving the French from Italy. Long-term, he unwittingly established Spanish military dominance over the Italian peninsula for the next century, creating the very situation he sought to avoid with the French."}, {"front": "In Machiavelli's hierarchy of military forces, why are 'own troops' considered superior?", "back": "Because they are loyal only to the prince; their victories directly strengthen his own power and state, and their defeat only weakens his own state without empowering a rival."}, {"front": "What makes an auxiliary unit particularly dangerous even if they win a battle for the borrowing prince?", "back": "They arrive as a complete unit under their own commander, loyal to their sending ruler. Their victory demonstrates their effectiveness and builds goodwill among the local population, but the ultimate benefit of their success accrues to their original sovereign, not the prince who borrowed them."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
