<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 21, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, what is the fundamental test for any defensive strategy a ruler might employ?", "back": "Whether it actually works in reality, rather than merely being a common answer or traditional wisdom."}, {"front": "What is Machiavelli's general advice to a new prince regarding arming his subjects?", "back": "A new prince should always arm his subjects, especially if he found them disarmed."}, {"front": "Explain why Machiavelli advises a new prince to arm his subjects.", "back": "Arming subjects makes them the prince's own, turns distrusted men faithful, keeps faithful men loyal, and makes subjects adherents. It also allows the prince to handle non-armed subjects more freely."}, {"front": "What are the negative consequences of a prince disarming his subjects?", "back": "Disarming subjects offends them by showing distrust (for cowardice or lack of loyalty), which breeds hatred. It also forces the prince to rely on unreliable mercenaries."}, {"front": "Under what specific circumstance should a prince disarm the men of a newly acquired state?", "back": "When a prince acquires a new state as a province to his old one, he should disarm its men, except for those who were his initial adherents, who should eventually be rendered 'soft and effeminate'."}, {"front": "What was the traditional wisdom regarding fostering factions in tributary towns?", "back": "Forefathers believed it was necessary to hold cities like Pistoia by factions to keep possession more easily by fostering quarrels."}, {"front": "What is Machiavelli's view on the usefulness of fostering factions in his own time?", "back": "He believes factions are never useful in his time because divided cities are quickly lost in war, as the weakest party will always assist outside forces."}, {"front": "Provide an example Machiavelli uses to illustrate the failure of fostering factions.", "back": "The Venetians fostered Guelph and Ghibelline factions in tributary cities, but after the rout at Vaila, one party immediately took courage and seized the state, proving the policy fallacious."}, {"front": "What does Machiavelli suggest about a prince who relies on fostering factions?", "back": "Such methods argue weakness in the prince and are only useful in times of peace, proving fallacious during war."}, {"front": "According to Machiavelli, how can princes become great through difficulties and obstacles?", "back": "Princes become great when they overcome difficulties and obstacles, which Fortune often causes to arise for new princes to provide opportunities for them to gain renown and 'mount higher, as by a ladder'."}, {"front": "What controversial advice does Machiavelli offer regarding fostering animosity for renown?", "back": "A wise prince might craftily foster some animosity against himself, so that, having crushed it, his renown may rise higher."}, {"front": "Who has typically shown more fidelity and assistance to new princes: those initially trusted or distrusted?", "back": "Princes, especially new ones, have found more fidelity and assistance in men who were distrusted in the beginning of their rule."}, {"front": "Why might initially hostile or distrusted men prove more faithful to a new prince?", "back": "If they need assistance to support themselves, they are easily gained over and serve faithfully to 'cancel by deeds the bad impression' formed of them, making them more profitable than complacent trusted servants."}, {"front": "What warning does Machiavelli give a prince who acquired a state through secret favors from discontented allies?", "back": "He warns that such allies are difficult to keep friendly because it will be impossible to satisfy their discontent, making them a source of trouble."}, {"front": "Who is easier for a prince to make friends with: those who were contented under the former government (enemies) or those who were discontented and helped him seize power (allies)?", "back": "It is easier for the prince to make friends of those men who were contented under the former government (and therefore his enemies) than of those who, being discontented, were favorable to him and encouraged him to seize it."}, {"front": "What were the traditional purposes of building fortresses?", "back": "Fortresses served as a 'bridle and bit' to those who might work against the prince, and as a place of refuge from a first attack."}, {"front": "What is Machiavelli's general conclusion about the usefulness of fortresses?", "back": "Fortresses are useful or not according to circumstances; they can do good in one way but injure in another."}, {"front": "When should a prince build fortresses, according to Machiavelli?", "back": "A prince who has more to fear from his own people than from foreigners ought to build fortresses."}, {"front": "When should a prince avoid building fortresses, according to Machiavelli?", "back": "A prince who has more to fear from foreigners than from his own people ought to leave fortresses alone (or demolish them)."}, {"front": "What does Machiavelli identify as 'the best possible fortress'?", "back": "Not to be hated by the people."}, {"front": "Why are fortresses ultimately ineffective if the people hate the prince?", "back": "Although a prince may hold fortresses, they will not save him if the people hate him, because there will always be foreigners willing to assist a people who have taken up arms against their ruler."}, {"front": "Provide an example where fortresses were *initially* useful, as cited by Machiavelli.", "back": "The Countess of Forli used fortresses to withstand a popular attack after her consort's death and wait for assistance from Milan, because at that time, foreigners could not assist the people."}, {"front": "Why did the Countess of Forli's fortresses ultimately fail her?", "back": "When Cesare Borgia attacked her, and the people (her enemy) were allied with foreigners, her fortresses were of little value. It would have been safer for her not to have been hated by the people."}, {"front": "What is Machiavelli's final judgment on building or not building fortresses?", "back": "He praises both those who build fortresses and those who do not, but blames whoever, trusting in them, cares little about being hated by the people."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
