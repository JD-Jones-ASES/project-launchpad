<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 21, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Machiavelli's verdict on a prince disarming his subjects?", "back": "It is a serious mistake that breeds resentment and signals distrust."}, {"front": "When a prince disarms his subjects, he signals that he does not _____ them.", "back": "Trust"}, {"front": "Why does disarming subjects lead to a dependency on mercenaries?", "back": "The prince no longer has a domestic military and must rely on hired or foreign soldiers."}, {"front": "What is the primary psychological effect on subjects who are disarmed by their prince?", "back": "They feel humiliated and excluded from the defense of their own state."}, {"front": "How does arming subjects benefit the prince's relationship with the people?", "back": "It creates a bond of mutual dependence and makes the people partners in state defense."}, {"front": "According to Machiavelli, what are the 'best' types of troops for a prince?", "back": "Citizens who share the prince's interests."}, {"front": "Under what specific condition might a prince need to disarm inhabitants?", "back": "When the prince acquires new territory where the people are not yet loyal."}, {"front": "What should be the long-term military goal for a prince regarding subjects in a new territory?", "back": "To incorporate them into his military order rather than leaving them disarmed."}, {"front": "What is Machiavelli's general verdict on fostering factions among subjects?", "back": "It is dangerous because factional divisions weaken the state against external enemies."}, {"front": "Why did some Italian princes deliberately keep their cities divided into factions?", "back": "They believed divided subjects could not unite to oppose the prince."}, {"front": "What typically happens to a factional city when an external enemy arrives?", "back": "It collapses because factions will not unite, and one side may join the invader."}, {"front": "On what does a prince's security ultimately rest, according to Machiavelli?", "back": "Unity, not division."}, {"front": "List two long-term benefits of a united population that are lost through division.", "back": "The ability to resist invasion and the maintenance of a stable tax base."}, {"front": "What is the primary appeal of building fortresses for a prince?", "back": "They provide a refuge during threats and a base for reconquering lost territory."}, {"front": "What is the 'decisive factor' in determining whether a fortress is useful?", "back": "The relationship between the prince and his people."}, {"front": "When is a physical fortress considered useful by Machiavelli?", "back": "When a prince fears his own subjects more than foreign enemies."}, {"front": "Why is a fortress useless if the people hate the prince?", "back": "Hostile subjects will assist external enemies in reducing the fortress."}, {"front": "Concept: The Best Fortress", "back": "Definition: Popular support, or specifically, not being hated by the people."}, {"front": "Name two ways physical walls can be overcome that loyalty avoids.", "back": "Walls can be scaled or undermined."}, {"front": "How can an enemy defeat a fortress garrison without direct assault?", "back": "By cutting off supply lines and starving them out."}, {"front": "According to Machiavelli, military hardware is a _____ to popular loyalty, not a substitute.", "back": "Supplement"}, {"front": "Which historical figure's fortress failed because his people were willing to let it fall?", "back": "Guidobaldo da Montefeltro (of Urbino)."}, {"front": "How did the Bentivoglio family maintain their position in Bologna without a great fortress?", "back": "They had the genuine support of the people, who resisted their enemies."}, {"front": "A fortress used by a hated prince to retreat from his subjects effectively becomes a _____.", "back": "Prison"}, {"front": "A prince whose people are genuinely loyal has a defense that no _____ can overcome.", "back": "Besieging army"}, {"front": "How does a prince avoid the failure seen in Guidobaldo's example?", "back": "By prioritizing popular support over reliance on physical fortifications."}, {"front": "In the 'Think Deeper' section, what fine distinction does Machiavelli make regarding the prince's reputation?", "back": "The distinction between being feared (which may be necessary) and being hated (which is fatal)."}, {"front": "What is the primary reason Machiavelli discourages the use of foreign auxiliaries?", "back": "They cannot be fully trusted by the prince."}, {"front": "Under what condition is unity necessary for a prince to sustain a long war?", "back": "To ensure a stable tax base and a population willing to resist conquest."}, {"front": "Why is a prince at the head of armed citizens considered 'safer'?", "back": "He is defended by those who share his interests rather than untrustworthy mercenaries."}, {"front": "According to the text, what is the consequence of leaving new subjects permanently disarmed?", "back": "They become permanently resentful toward the prince."}, {"front": "Machiavelli argues that division may look like a tool of control in the short run, but in the long run it is an _____.", "back": "Invitation to conquest"}, {"front": "Which Pope drove Guidobaldo da Montefeltro from Urbino?", "back": "Pope Julius II."}, {"front": "What does Machiavelli call the practice of supporting one district or family against another?", "back": "Fostering factions."}, {"front": "Why is 'not being hated' more effective than a physical wall?", "back": "Loyal subjects will suffer to protect the prince, whereas walls can be scaled or starved."}, {"front": "How does Machiavelli characterize the relationship between a prince and his armed citizens?", "back": "Partnership and mutual dependence."}, {"front": "The analysis of fortresses in Chapter XXI echoes the arguments from which earlier chapter on civil principalities?", "back": "Chapter IX."}, {"front": "Why are divided subjects unable to provide a stable tax base?", "back": "Factionalism prevents the stability and unity required to finance military power."}, {"front": "What happens to a prince's defense when people are willing to suffer to protect him?", "back": "It becomes a defense that no besieging army can overcome."}, {"front": "If a prince is hated, who will his internal enemies find as allies?", "back": "Foreign or external enemies attacking the state."}, {"front": "Machiavelli suggests that disarming subjects in a transition period should only be a _____ measure.", "back": "Temporary"}, {"front": "What is the specific risk of mercenaries compared to citizen troops?", "back": "Mercenaries cannot be fully trusted to share the prince's interests in the field."}, {"front": "True or False: Machiavelli believes fortresses are always useless.", "back": "False (The verdict is nuanced and depends on the prince's relationship with the people)."}, {"front": "What is the primary disadvantage of relying on 'foreign auxiliaries'?", "back": "They cannot be fully trusted by the prince for defense."}, {"front": "How does popular loyalty affect the usefulness of physical military hardware?", "back": "Loyalty makes hardware a supplement; lack of loyalty makes it a substitute that ultimately fails."}, {"front": "What historical outcome is explained by Chapter XXIV regarding Italian princes?", "back": "Why they lost their states (often due to lack of popular loyalty and reliance on hardware)."}, {"front": "Why do factional cities collapse during peacetime versus wartime?", "back": "They may be manageable in peacetime but are vulnerable to external enemies in wartime."}, {"front": "What is the 'memorably formulated' conclusion regarding fortresses?", "back": "The best fortress a prince can have is not to be hated by the people."}, {"front": "How does a prince ensure subjects have 'something to fight for'?", "back": "By arming them and making them partners in the state's defense."}, {"front": "Which family serves as Machiavelli's example of maintaining power through popular support without fortresses?", "back": "The Bentivoglio family."}, {"front": "What allows a prince to be more 'formidable' in the field?", "back": "Heading his own armed citizens rather than hiding behind walls."}, {"front": "Why does disarming subjects signal a prince is 'hiding'?", "back": "It indicates he relies on walls or mercenaries because he fears his own people."}, {"front": "A prince who fosters division among subjects is using a tool that acts as an _____ in the long run.", "back": "Invitation to conquest"}, {"front": "In the context of military chapters, who are considered the 'best troops'?", "back": "Citizens."}, {"front": "What must a prince do to new subjects to prevent them from remaining permanently resentful?", "back": "Incorporate them into his military order."}, {"front": "What is the ultimate foundation of all other secondary defenses, such as fortresses?", "back": "Popular loyalty."}, {"front": "What is the danger of a prince fearing his own subjects more than foreigners?", "back": "It drives him to build fortresses that will likely fail if the subjects hate him."}, {"front": "According to Machiavelli, why is a loved prince's family compared to an army?", "back": "Because they can rally the people to resist any external attack."}, {"front": "Under what condition does a prince's retreat into a fortress become fatal?", "back": "When he has caused his people to hate him to the point of taking up arms."}, {"front": "True or False: Machiavelli encourages Italian princes to support internal family rivalries.", "back": "False (He is skeptical because it weakens the state)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
