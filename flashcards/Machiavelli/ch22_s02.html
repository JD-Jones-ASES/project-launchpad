<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 22, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, what two factors most contribute to a prince being esteemed?", "back": "Great enterprises and setting a fine example."}, {"front": "Which historical figure does Machiavelli identify as the \"present King of Spain\" who rose from an insignificant king to the foremost in Christendom?", "back": "Ferdinand of Aragon."}, {"front": "Why does Machiavelli categorize Ferdinand of Aragon as a \"new prince\"?", "back": "Because he rose from a position of little power to great fame and glory through his deeds."}, {"front": "What specific military enterprise served as the foundation of Ferdinand of Aragon's dominion?", "back": "The attack on Granada."}, {"front": "How did Ferdinand of Aragon prevent the barons of Castile from opposing his early innovations?", "back": "He kept their minds occupied with the war in Granada, preventing them from noticing his increasing authority."}, {"front": "Who provided the financial support for Ferdinand of Aragon’s armies during his early reign?", "back": "The Church and the people."}, {"front": "What long-term military benefit did Ferdinand gain from the protracted war in Granada?", "back": "He laid the foundation for the military skill that later distinguished him."}, {"front": "Ferdinand of Aragon utilized _____ as a recurring plea to justify his expansionist schemes.", "back": "religion"}, {"front": "Concept: Pious cruelty", "back": "Definition: Ferdinand of Aragon's policy of expelling the Moors from his kingdom under the guise of religious devotion."}, {"front": "Name three regions, other than Granada, that Ferdinand of Aragon attacked to keep his people in \"suspense and admiration.\"", "back": "Africa, Italy, and France."}, {"front": "Why did Ferdinand of Aragon sequence his military actions to arise \"one out of the other\"?", "back": "To ensure his enemies never had enough time to work steadily against him."}, {"front": "Which historical figure is cited as an example of setting extraordinary rewards or punishments in civil life?", "back": "Messer Bernabo da Milano."}, {"front": "What reputation should a prince strive to gain in every single action he takes?", "back": "The reputation of being a great and remarkable man."}, {"front": "Under what condition is a prince most respected in his relationships with other powers?", "back": "When he declares himself a true friend or a downright enemy without reservation."}, {"front": "Why is standing neutral generally less advantageous than declaring war when neighbors are in conflict?", "back": "The winner will view the neutral party as a doubtful friend, and the loser will not offer shelter."}, {"front": "According to Machiavelli, why does a conqueror avoid maintaining \"doubtful friends\"?", "back": "Because they did not provide assistance during his time of trial."}, {"front": "In the conflict between the Romans and Antiochus, what was the Roman legate's argument against Achaean neutrality?", "back": "He argued that neutrality would leave them without favor or consideration, as the prize of the victor."}, {"front": "What is the typical outcome for \"irresolute princes\" who choose neutrality to avoid immediate danger?", "back": "They are generally ruined."}, {"front": "If a prince allies with a party that eventually loses, what is the potential benefit for the prince?", "back": "He may be sheltered by the loser and become a companion in a fortune that may rise again."}, {"front": "Why is a powerful victor unlikely to immediately oppress an ally who helped him win?", "back": "A bond of amity is established, and victories are never so complete that justice can be entirely ignored."}, {"front": "Under what circumstance is it \"greater prudence\" to be allied with a neighbor even if you do not fear the conqueror?", "back": "When you assist in the destruction of one party by the aid of another who would have otherwise been a threat."}, {"front": "What is the primary danger for a prince who makes an alliance with a more powerful state to attack others?", "back": "If they conquer, the prince remains at the discretion of the more powerful ally."}, {"front": "Which Italian state's ruin does Machiavelli attribute to an unnecessary alliance with France against the Duke of Milan?", "back": "The Venetians."}, {"front": "When is a prince justified in making an alliance with a more powerful state despite the risks?", "back": "When necessity compels the alliance."}, {"front": "How should a government view the prospect of choosing a \"perfectly safe course\"?", "back": "It should never imagine safe courses exist, as avoiding one trouble often leads to another."}, {"front": "According to Machiavelli, what is the essence of \"prudence\" in statesmanship?", "back": "Knowing how to distinguish the character of troubles and choosing the lesser evil."}, {"front": "How should a prince demonstrate his support for talent within his state?", "back": "By showing himself as a patron of ability and honoring those proficient in every art."}, {"front": "What fear should a prince alleviate to encourage his citizens to improve their possessions?", "back": "The fear that their possessions will be taken away from them."}, {"front": "Why might a citizen be deterred from opening up trade, according to the text?", "back": "Fear of excessive taxes."}, {"front": "What method should a prince use to motivate citizens to honor their city or state?", "back": "Offering rewards to those who design ways to improve the state."}, {"front": "How should a prince engage with the various guilds and societies of his city?", "back": "By holding them in esteem, associating with them, and showing courtesy and liberality."}, {"front": "What must a prince always maintain, even when showing courtesy to his people or guilds?", "back": "The majesty of his rank."}, {"front": "Ferdinand of Aragon's rise was marked by his transition from an \"insignificant king\" to the \"foremost king in _____.\"", "back": "Christendom"}, {"front": "What psychological effect did Ferdinand’s constant stream of \"great and extraordinary\" deeds have on his people?", "back": "It kept their minds in a state of suspense and admiration."}, {"front": "What was the purpose of Ferdinand of Aragon's attack on Africa and Italy?", "back": "To undertake greater schemes and maintain his reputation for great enterprises."}, {"front": "How should a prince respond when a citizen performs an extraordinary act in civil life?", "back": "He should reward or punish them in a way that is highly visible and much discussed."}, {"front": "Why is the path of neutrality considered \"erroneous\" when a prince is forced to choose between two warring neighbors?", "back": "Because the prince will inevitably fall prey to the winner, to the satisfaction of the loser."}, {"front": "Cloze: A prince should avoid being at the _____ of anyone as much as possible.", "back": "discretion"}, {"front": "When the Pope and Spain attacked Lombardy, why were the Florentines forced to favor one party?", "back": "Because the alliance could not be avoided, and failing to choose would lead to ruin."}, {"front": "What should a prince provide for the entertainment of his people at \"convenient seasons of the year\"?", "back": "Festivals and spectacles."}, {"front": "According to the Roman legate, what is the \"guerdon\" (reward) for a state that remains neutral in a war?", "back": "Being left without favor or consideration by the conqueror."}, {"front": "Why is it important for a prince to encourage citizens to practice their callings \"peaceably\"?", "back": "To ensure the economic prosperity and stability of the state."}, {"front": "How does allying with a potentially losing side provide a \"companion on a fortune that may rise again\"?", "back": "It ensures the prince is sheltered by the ally and they can rebuild together."}, {"front": "Machiavelli describes Ferdinand's use of religion to clear his kingdom of the Moors as an example that was both \"admirable\" and \"_____.\"", "back": "rare"}, {"front": "What specific group's minds were occupied by the war in Granada to Ferdinand's political advantage?", "back": "The barons of Castile."}, {"front": "In Machiavelli's view, a prince must never consent to \"abate in anything\" regarding what?", "back": "The majesty of his rank."}, {"front": "What is the specific risk of allying with a more powerful state to attack a third party?", "back": "The prince becomes a prisoner of the more powerful state's discretion upon victory."}, {"front": "Why does a prince need to reward those who \"honor his city\"?", "back": "To foster a culture of excellence and loyalty to the state."}, {"front": "What term does Machiavelli use to describe the state of being undecided or failing to act in a conflict?", "back": "Irresolute."}, {"front": "How does a prince show himself as a \"patron of ability\"?", "back": "By honoring those who are proficient in any art or field."}, {"front": "Why is it more advantageous to declare for one side if you do not fear the conqueror?", "back": "It allows the prince to assist in the destruction of a potential enemy with the help of an ally."}, {"front": "What was the \"cloak\" used by Ferdinand of Aragon to justify his attacks on Africa, Italy, and France?", "back": "Religion."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
