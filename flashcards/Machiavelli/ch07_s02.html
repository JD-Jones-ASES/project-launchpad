<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why does Machiavelli advise a prince to follow the paths of 'great men'?", "back": "To savor their ability even if he cannot fully equal their greatness."}, {"front": "In Machiavelli’s archer analogy, why does a clever archer aim much higher than his target?", "back": "To hit the distant mark by compensating for the limits of his bow's strength."}, {"front": "What are the two primary factors that allow a private citizen to become a prince?", "back": "Ability or fortune."}, {"front": "According to Machiavelli, who is established most strongly as a prince?", "back": "The leader who has relied least on fortune."}, {"front": "What action facilitates a prince keeping a newly acquired state?", "back": "Residing in the state in person."}, {"front": "Who are the four 'most excellent examples' of princes who rose by their own ability?", "back": "Moses, Cyrus, Romulus, and Theseus."}, {"front": "Why does Machiavelli hesitate to fully discuss Moses as an example of personal ability?", "back": "Because Moses was a mere executor of the will of God."}, {"front": "Aside from divine will, why does Machiavelli believe Moses should be admired?", "back": "For the favor that made him worthy to speak with God."}, {"front": "What was the only thing the great founders owed to 'fortune'?", "back": "Opportunity."}, {"front": "What would have happened to the founders' 'powers of mind' without opportunity?", "back": "They would have been extinguished."}, {"front": "What specific opportunity did Moses find in Egypt?", "back": "The people of Israel enslaved and oppressed by the Egyptians."}, {"front": "What was necessary for Romulus to eventually become the founder of Rome?", "back": "To be abandoned at birth and not remain in Alba."}, {"front": "What condition of the Medes allowed Cyrus to succeed in his conquest?", "back": "They had become soft and effeminate through long peace."}, {"front": "Theseus could only show his ability because he found the Athenians in what state?", "back": "Dispersed."}, {"front": "Princes who acquire power through 'valorous ways' typically find it _____ to keep the state.", "back": "easy"}, {"front": "Why is the introduction of a 'new order of things' considered the most difficult task for a leader?", "back": "The innovator faces established enemies and only lukewarm defenders."}, {"front": "In the context of a new order, who are the 'enemies' of the innovator?", "back": "All those who prospered under the old conditions."}, {"front": "What two factors contribute to the 'lukewarm' defense of a new order?", "back": "Fear of the legal power of opponents and the incredulity of men toward new things."}, {"front": "How does Machiavelli describe 'the incredulity of men' regarding new systems?", "back": "Men do not readily believe in new things until they have had long experience of them."}, {"front": "What happens when an innovator is forced to rely on 'prayers' rather than force?", "back": "They always succeed badly and never achieve anything."}, {"front": "According to Machiavelli, what is the historical outcome for 'unarmed prophets'?", "back": "They have been destroyed."}, {"front": "Why is it necessary for a prince to be able to use force to maintain belief?", "back": "The nature of the people is variable and their persuasion must often be fixed by force."}, {"front": "Which Florentine figure was ruined because he was an unarmed prophet?", "back": "Girolamo Savonarola."}, {"front": "Why did Savonarola's 'new order' fail once the multitude stopped believing in him?", "back": "He had no means to keep believers steadfast or force unbelievers to believe."}, {"front": "When do successful founders begin to be 'respected, powerful, secure, and happy'?", "back": "After they have overcome initial dangers and exterminated those who envied them."}, {"front": "Which Syracusan rose from a private station to be prince purely through ability and opportunity?", "back": "Hiero the Syracusan."}, {"front": "What was the 'opportunity' that led to Hiero's rise in Syracuse?", "back": "The Syracusans were oppressed and chose him for their captain."}, {"front": "How did Hiero of Syracuse secure his military foundations?", "back": "He abolished the old soldiery and organized a new one."}, {"front": "How did Hiero manage his political alliances?", "back": "He gave up old alliances and made new ones."}, {"front": "Term: Fortuna", "back": "Definition: The unpredictable external forces, including luck and circumstance, that shape political outcomes."}, {"front": "Term: Virtù", "back": "Definition: The personal ability, skill, or prowess of a prince to shape his own destiny and state."}, {"front": "What is the result of 'imitating' the deeds of others, according to Machiavelli?", "back": "One is unable to keep entirely to their ways or attain their exact power."}, {"front": "What is the relationship between 'ability' and 'opportunity' for a great founder?", "back": "Ability allows the founder to recognize the opportunity and mold it into a new state."}, {"front": "Why is it easier to keep a state acquired by 'valor' than one acquired by 'fortune'?", "back": "The prince has established his own strong foundations and methods."}, {"front": "How do those hostile to a new order attack the innovator?", "back": "They attack like 'partisans' whenever they have the opportunity."}, {"front": "Why are those who might benefit from a new order 'fearful' defenders?", "back": "Because their opponents currently have the laws on their side."}, {"front": "According to Machiavelli, what determines if an innovator can 'consummate their enterprise'?", "back": "Whether they can rely on themselves and use force."}, {"front": "What is the 'material' that great founders mold into a state?", "back": "The population and the circumstances of the time."}, {"front": "Why was Cyrus's conquest of the Medes facilitated by 'long peace'?", "back": "It rendered the Medes soft and effeminate, making them easier to conquer."}, {"front": "What phrase did an author use to describe Hiero's potential as a private citizen?", "back": "He wanted nothing but a kingdom to be a king."}, {"front": "Machiavelli states that all 'armed prophets' have _____.", "back": "conquered"}, {"front": "Why are the dangers for founders described as being 'in the ascent'?", "back": "The most significant difficulties occur while acquiring the state and introducing new rules."}, {"front": "How does Hiero's acquisition of Syracuse compare to his keeping of it?", "back": "He endured much trouble in acquiring it but little in keeping it."}, {"front": "The Israelites were 'disposed to follow' Moses to be delivered from _____.", "back": "bondage"}, {"front": "What does a prince gain by 'exterminating' those who envy his success?", "back": "He begins to be respected and secures his power and honor."}, {"front": "According to Machiavelli, how easily can the nature of the people be changed?", "back": "They are easily persuaded but difficult to keep fixed in that persuasion."}, {"front": "What role does 'preceptor' play in Machiavelli's comparison of Moses and Cyrus?", "back": "Moses had God as a preceptor, yet Cyrus's deeds are found to be equally admirable."}, {"front": "In the archer analogy, the archer knows the _____ of his bow.", "back": "limits"}, {"front": "Why does Machiavelli choose to 'adduce the highest examples' of princes?", "back": "To provide a high mark for others to aim for in their own imitation."}, {"front": "What is the primary danger for a prince supported by 'lukewarm defenders'?", "back": "The prince is endangered along with them during an attack by hostile partisans."}, {"front": "Which quality allowed founders to ennoble their countries and make them famous?", "back": "High ability."}, {"front": "According to Machiavelli, why should an innovator not rely on others?", "back": "Depending on others leads to failure because they cannot use force when needed."}, {"front": "How does residing in person help a prince who lacks other states?", "back": "It makes the administration of the new state easier and more direct."}, {"front": "What was the result for Cyrus finding the Persians 'discontented' with the Medes?", "back": "It provided the necessary opportunity to lead a successful uprising."}, {"front": "Concept: Armed Prophet", "back": "Definition: A leader who uses force and their own power to establish and sustain a new political order."}, {"front": "What condition of the Israelites in Egypt made them 'disposed' to follow Moses?", "back": "Enslavement and oppression."}, {"front": "Why is the path of the 'innovator' specifically described as 'perilous'?", "back": "Because it challenges those who benefit from the status quo."}, {"front": "How does Machiavelli describe the success of those who use 'prayers' in their enterprise?", "back": "They always succeed badly."}, {"front": "What does a prince achieve once the 'incredulity of men' is overcome by long experience?", "back": "The new order becomes powerful and secure."}, {"front": "Why did Hiero of Syracuse 'abolish the old soldiery'?", "back": "To ensure he had a reliable military foundation loyal to him alone."}, {"front": "In Machiavelli's framework, what is the 'material' upon which ability acts?", "back": "The circumstances and people provided by opportunity."}, {"front": "Who was chosen as captain by the Syracusans because they were 'oppressed'?", "back": "Hiero the Syracusan."}, {"front": "According to the text, a prince must take measures to 'make them believe by _____' when they believe no longer.", "back": "force"}, {"front": "What is the ultimate purpose of aiming high in the archer analogy?", "back": "To hit the intended mark through the aid of a high aim."}, {"front": "What is the status of the prince's security once 'those who envied them' are removed?", "back": "He becomes powerful, secure, honored, and happy."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
