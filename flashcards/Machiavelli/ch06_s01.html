<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Chapter V, what is the first option for a prince who conquers a previously self-governing city?", "back": "Destroy it."}, {"front": "What is the second option Machiavelli proposes for governing a conquered free city?", "back": "The prince moves there and governs in person."}, {"front": "What is the third option for governing a conquered city that previously had its own laws?", "back": "Allow it to continue under its own laws while extracting tribute and using a local oligarchy."}, {"front": "Why does Machiavelli argue that destruction is the most reliable strategy for holding a free city?", "back": "A city that is destroyed cannot organize a rebellion."}, {"front": "According to Machiavelli, what happens to a population's capacity for resistance once it is dispersed?", "back": "It loses its organizational capacity."}, {"front": "Which historical example does Machiavelli use to prove that destruction is more effective than controlled survival?", "back": "Rome's treatment of Carthage."}, {"front": "How does Machiavelli distinguish between the 'effectiveness' and the 'morality' of destroying a city?", "back": "He argues it is effective for maintaining power without claiming it is morally admirable."}, {"front": "What is a major advantage of a prince residing personally in a conquered territory?", "back": "He can respond to problems immediately and prevent abuses by distant governors."}, {"front": "Which French ruler did Machiavelli criticize for failing to move to Italy to secure his conquests?", "back": "Louis XII."}, {"front": "What is the primary limitation of a prince governing a conquered city in person?", "back": "The underlying problem of rebellion reasserts itself as soon as the prince leaves."}, {"front": "In the context of indirect rule, what is a 'friendly oligarchy'?", "back": "A small group of local collaborators whose position depends on the foreign ruler."}, {"front": "What is the 'fatal weakness' of trying to govern a formerly free city through an oligarchy?", "back": "The population's memory of self-governance eventually triggers a rebellion."}, {"front": "Why might a collaborating oligarchy eventually lead a resistance against their own patron prince?", "back": "They may find it more advantageous to lead the local resistance than to serve a foreigner."}, {"front": "Which ancient power's failure to hold Greek cities demonstrates the weakness of indirect rule?", "back": "Sparta."}, {"front": "What force does Machiavelli identify as outlasting conquest, suppression, and the original generation of free citizens?", "back": "The memory of liberty."}, {"front": "Why does Machiavelli describe the idea of former freedom as 'politically explosive'?", "back": "It serves as a persistent rallying cry for rebellion that institutions and walls cannot erase."}, {"front": "What is the core question Machiavelli's realism seeks to answer regarding political strategy?", "back": "What actually works?"}, {"front": "How does Machiavelli's method treat 'uncomfortable truths' about power?", "back": "He states them directly based on evidence rather than flinching for moral reasons."}, {"front": "Concept: Political Realism", "back": "Definition: The analytical approach that separates moral judgment from the objective analysis of how power functions."}, {"front": "According to the text, what is the 'definitive historical proof' that Carthage needed to be razed?", "back": "Carthage eventually rebelled after Rome initially tried to let it survive under controlled conditions."}, {"front": "What is the result of a prince's absence from a city that has a tradition of republican freedom?", "back": "The tradition of freedom becomes a catalyst for the city to reclaim its independence."}, {"front": "In Machiavelli's view, can a city that has been self-governing for centuries ever 'simply forget' its freedom?", "back": "No, the idea of its past persists regardless of dismantled institutions or killed leaders."}, {"front": "What is the pedagogical purpose of students confronting the 'shocking' arguments in Chapter V?", "back": "To force them to confront the gap between political ideals and political analysis."}, {"front": "Cloze: Machiavelli argues that a city accustomed to freedom can only be reliably held by ______ it.", "back": "destroying"}, {"front": "Cloze: The ______ knows that it owes its position to the foreign ruler, making them local collaborators.", "back": "friendly oligarchy"}, {"front": "Why is the memory of liberty more dangerous to a conqueror in a republic than in a principality?", "back": "In a republic, the people have a deep-rooted tradition of self-governance that fuels constant unrest."}, {"front": "How does residing in person help a prince build stability with local leadership?", "back": "It allows him to build personal relationships and monitor local leaders directly."}, {"front": "What happens to the 'Carthaginian problem' once Rome destroyed the city entirely?", "back": "The problem ceased to exist because the city's capacity for resistance was removed."}, {"front": "What does Machiavelli's analysis of Sparta suggest about the durability of indirect rule?", "back": "It suggests that indirect rule is fragile because the conquered cities eventually rebelled."}, {"front": "According to Machiavelli, why is it difficult to erase a people's political culture of freedom?", "back": "Because the idea of what the city once was remains a force even after physical destruction of its walls."}, {"front": "Term: Indirect Rule", "back": "Definition: Governing a conquered territory through existing local laws and a puppet government rather than direct presence."}, {"front": "What is the 'essence' of Machiavelli's method as revealed in Chapter V?", "back": "The willingness to prioritize analytical engagement over moral reaction."}, {"front": "Why is 'distance' a problem for a prince who does not move to a conquered city?", "back": "He cannot prevent his own governors from abusing the local population, leading to resentment."}, {"front": "How does Machiavelli view the relationship between the passage of time and the desire for liberty?", "back": "Time does not erase the desire; the memory of liberty can persist for decades or centuries."}, {"front": "What distinction must a reader of 'The Prince' constantly make regarding Machiavelli's claims?", "back": "The distinction between whether he is empirically right and whether he is being honest about the evidence."}, {"front": "In the third option, what is the primary motivation for the local oligarchy to remain loyal?", "back": "They realize they cannot survive without the friendship and protection of the prince."}, {"front": "What does Machiavelli suggest is the ultimate 'secure' outcome of total destruction?", "back": "The elimination of the city's ability to ever organize as a political threat again."}, {"front": "Cloze: Machiavelli cites ______ attempt to hold Greek cities as proof that indirect rule through friendly governments fails.", "back": "Sparta's"}, {"front": "How does Machiavelli's analysis of Carthage illustrate his 'realism'?", "back": "He focuses on the result (no more rebellion) rather than the ethics of razing a city."}, {"front": "Why is the memory of liberty described as 'explosive'?", "back": "It possesses the power to ignite rebellion long after the original institutions have been dismantled."}, {"front": "What is the 'brutal reality' Machiavelli presents when choosing how to govern a free city?", "back": "That the most effective methods are often the most morally troubling."}, {"front": "In Chapter V, how does Machiavelli characterize the strategy of 'living there personally'?", "back": "As a workable but demanding approach that only lasts as long as the prince remains."}, {"front": "According to Machiavelli, what is the risk of the general population 'remembering' its freedom?", "back": "They will eventually remove the oligarchs or pressure them to lead a revolt."}, {"front": "What is the difference between a city that has always had a prince and a previously free city?", "back": "A previously free city has a memory of liberty that makes it far more difficult to pacify."}, {"front": "Machiavelli's method asks 'what actually works' instead of asking what is ______.", "back": "just or merciful"}, {"front": "Why is a city with dispersed people unable to resist a conqueror?", "back": "They lack the institutions and leadership structures necessary to coordinate against the ruler."}, {"front": "What does the text suggest is the most important window into Machiavelli's thinking?", "back": "His evaluation of the most reliable (though unsettling) political strategies."}, {"front": "Cloze: The memory of liberty is a force that outlasts conquest, suppression, and the ______ who originally experienced it.", "back": "generations"}, {"front": "In Machiavelli's view, can a city's walls and leaders being removed solve the threat of rebellion in a republic?", "back": "No, because the underlying idea of freedom persists in the political culture."}, {"front": "What is the primary takeaway regarding 'The Prince' and the gap between ideals and analysis?", "back": "Political analysis focuses on empirical effectiveness rather than moral ideals."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
