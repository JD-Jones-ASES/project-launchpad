<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 1, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what year did Niccolò Machiavelli begin writing the work that would become *The Prince*?", "back": "1513"}, {"front": "What was the original Latin title Machiavelli gave to the manuscript of *The Prince*?", "back": "De Principatibus"}, {"front": "To which friend did Machiavelli write in December 1513 to describe his \"little book\" (*opusculetto*)?", "back": "Francesco Vettori"}, {"front": "Who was the Duke of Urbino and effective ruler of Florence to whom Machiavelli dedicated *The Prince*?", "back": "Lorenzo di Piero de' Medici"}, {"front": "What was Machiavelli's underlying motive for dedicating *The Prince* to Lorenzo de' Medici?", "back": "To demonstrate his political usefulness and secure a government job."}, {"front": "How did Lorenzo de' Medici react to Machiavelli’s gift of *The Prince*?", "back": "He showed little interest and never employed Machiavelli."}, {"front": "Roughly how long is the book *The Prince* in most standard editions?", "back": "Fewer than one hundred pages"}, {"front": "Which section of *The Prince* (Chapters I–XI) focuses on the types of states and how they are acquired?", "back": "The first eleven chapters"}, {"front": "What is the primary subject of Chapters XII through XIV of *The Prince*?", "back": "Military power"}, {"front": "According to Machiavelli, what are the two types of external military forces that a prince should avoid using?", "back": "Mercenaries and auxiliary forces"}, {"front": "The middle section of *The Prince* (Chapters XV–XXIII) examines the prince's personal qualities and _____.", "back": "Virtues"}, {"front": "What is the specific goal of the final chapters of *The Prince*?", "back": "To call for a prince to liberate Italy from foreign domination."}, {"front": "Machiavelli's authorial tone is distinctive because he writes as a man of _____, rather than a moralist.", "back": "Experience"}, {"front": "Instead of citing Scripture or abstract principles, Machiavelli supports his arguments using _____.", "back": "Historical examples"}, {"front": "Name one of the modern historical figures Machiavelli uses as an example in *The Prince*.", "back": "Cesare Borgia (or Francesco Sforza / Ferdinand of Aragon)"}, {"front": "Name one of the ancient rulers Machiavelli uses as a model for statecraft.", "back": "Moses (or Cyrus the Great / Roman emperors)"}, {"front": "Concept: Effectual Truth", "back": "Definition: The reality of how politics actually works, as opposed to how it is imagined. Example: Analyzing a ruler's use of deception as a rational tool."}, {"front": "What is the Italian term for Machiavelli’s concept of \"effectual truth\"?", "back": "Verità effettuale"}, {"front": "Machiavelli contrasts \"effectual truth\" with the \"imaginary\" versions of politics found in works like Plato's _____.", "back": "Republic"}, {"front": "The commitment to studying the \"effectual truth\" serves as the foundation for the school of thought known as political _____.", "back": "Realism"}, {"front": "In what year was *The Prince* first published?", "back": "1532"}, {"front": "How long after Machiavelli's death was *The Prince* officially published?", "back": "Five years"}, {"front": "By the generation following its publication, the term \"Machiavellian\" became a synonym for what?", "back": "Cunning, deception, and amoral manipulation"}, {"front": "Which English playwrights popularized the \"Machiavel\" as a stock villain on stage?", "back": "Christopher Marlowe and William Shakespeare"}, {"front": "What action did Pope Paul IV take against *The Prince* in 1559?", "back": "He placed it on the Index of Forbidden Books."}, {"front": "Term: Index of Forbidden Books", "back": "Definition: A list of texts declared dangerous to Catholic faith and morals, which members of the Church were forbidden to read."}, {"front": "Why did the Catholic Church find Machiavelli's work so alarming?", "back": "It challenged the view that politics and Christian morality were inseparable."}, {"front": "What \"surface problem\" did traditional readers find in Machiavelli's advice to princes?", "back": "He advised using cruelty, deception, and religious manipulation."}, {"front": "How did Machiavelli suggest rulers should view and use religion?", "back": "As a propaganda device"}, {"front": "The \"deeper scandal\" of *The Prince* was Machiavelli's treatment of power as a _____ question rather than a moral one.", "back": "Technical"}, {"front": "Machiavelli’s innovation was the separation of political analysis from _____.", "back": "Moral evaluation"}, {"front": "Machiavelli’s \"Diagnostic Approach\" means he is not necessarily prescribing behavior, but rather _____ it.", "back": "Diagnosing"}, {"front": "What analogy is used to explain the difference between a writer describing violence and one encouraging it?", "back": "A doctor explaining a poison vs. a poisoner using it"}, {"front": "What does Machiavelli suggest a prince should do to the old ruling families when acquiring mixed territories?", "back": "Consider destroying them."}, {"front": "According to the text, what is Machiavelli’s ultimate purpose in writing *The Prince*?", "back": "To understand princes rather than to corrupt them."}, {"front": "Machiavelli warns that rulers who ignore historical records and the reality of power will ultimately _____.", "back": "Fail"}, {"front": "Machiavelli's status in 1513 was that of a disgraced former _____.", "back": "Civil servant"}, {"front": "What is the central question Machiavelli addresses in the first section of the book regarding principalities?", "back": "How are they acquired and how are they held?"}, {"front": "Chapters XV through XXIII ask how a prince should balance qualities like _____ and mercy.", "back": "Cruelty"}, {"front": "Chapters XV through XXIII ask how a prince should balance qualities like _____ and parsimony.", "back": "Generosity"}, {"front": "The Index of Forbidden Books, which included *The Prince*, was maintained by the Church until what year?", "back": "1966"}, {"front": "Machiavelli identifies a significant gap between how people _____ politics works and how it actually works.", "back": "Imagine"}, {"front": "How old was Lorenzo de' Medici when Machiavelli dedicated *The Prince* to him?", "back": "Twenty-one"}, {"front": "Who was Lorenzo di Piero de' Medici’s famous grandfather?", "back": "Lorenzo the Magnificent"}, {"front": "What was the immediate reaction to the publication of *The Prince* in 1532?", "back": "It was immediate and intense."}, {"front": "Machiavelli compared the acquisition of power to technical skills like building a bridge or _____.", "back": "Commanding an army"}, {"front": "Machiavelli's method is described as almost _____ because he identifies actions, outcomes, and lessons.", "back": "Scientific"}, {"front": "Before being called *The Prince*, the book was known by Machiavelli as _____.", "back": "On Principalities"}, {"front": "Why was Machiavelli living on a farm in 1513?", "back": "He was confined there and forbidden from political life."}, {"front": "Machiavelli argues that a prince must have his own _____ rather than relying on mercenaries.", "back": "Army"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
