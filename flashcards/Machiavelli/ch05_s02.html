<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, what are the two distinct ways a principality can be governed?", "back": "By a prince and his servants, or by a prince and barons."}, {"front": "By what authority do ministers in a centralized monarchy assist the prince?", "back": "By the grace and permission of the prince."}, {"front": "In a decentralized monarchy, how do barons acquire their dignity?", "back": "Through antiquity of blood."}, {"front": "Why is a prince in a servant-based state held in higher consideration than one in a baron-based state?", "back": "No one in the country is recognized as superior to him."}, {"front": "How do subjects in a decentralized state typically feel toward their local lords?", "back": "They recognize them as lords and hold them in natural affection."}, {"front": "In Machiavelli's time, which state served as the primary example of a prince governing through servants?", "back": "The Turk (Ottoman Empire)."}, {"front": "In the Turkish monarchy, what are the administrative divisions called where the lord sends different administrators?", "back": "Sanjaks."}, {"front": "How does the King of France's relationship with his lords differ from the Turk's relationship with his servants?", "back": "The French lords have ancient prerogatives that the king cannot safely take away."}, {"front": "Why is it difficult for a conqueror to be 'called in' by internal forces in the Turk's kingdom?", "back": "The ministers are slaves and bondmen who cannot easily be corrupted."}, {"front": "Why do corrupted ministers in a centralized state provide little advantage to a conqueror?", "back": "They cannot carry the people with them."}, {"front": "Concept: The Turk's Monarchy", "back": "Definition: A state difficult to seize due to unity and hard-to-corrupt ministers, but easy to hold once the prince's family is gone."}, {"front": "What must an attacker rely on when attempting to conquer a centralized state like the Turk's?", "back": "Their own strength rather than the revolt of others."}, {"front": "Once a centralized state like the Turk's is conquered and the prince's family is exterminated, why is there nothing else to fear?", "back": "The remaining officials have no credit or influence with the people."}, {"front": "How does a conqueror typically enter a kingdom governed like France?", "back": "By gaining over malcontent barons who desire change."}, {"front": "Why does a state like France present 'infinite difficulties' after it has been conquered?", "back": "The conqueror faces opposition from both those they crushed and those who assisted them."}, {"front": "In a decentralized state, why is exterminating the prince's family insufficient to secure the state?", "back": "The remaining lords make themselves the heads of fresh movements against the conqueror."}, {"front": "To which historical government does Machiavelli compare the kingdom of the Turk?", "back": "The government of Darius (Persia)."}, {"front": "Who was the last Achaemenid king of Persia defeated by Alexander the Great?", "back": "Darius III."}, {"front": "Why was Alexander the Great's empire secure after the death of Darius?", "back": "The state structure was centralized, leaving no powerful local lords to raise tumults."}, {"front": "According to Machiavelli, what was the only cause of tumults in Alexander's empire after Darius's death?", "back": "The ambitions of Alexander's own successors."}, {"front": "Why were the Romans' possessions in Spain, France, and Greece initially insecure?", "back": "The many principalities previously existing there caused frequent rebellions."}, {"front": "What allowed the Romans to finally become 'secure possessors' of states like Greece and Spain?", "back": "The long continuance of the empire and the fading memory of former principalities."}, {"front": "How did individual Roman leaders attach parts of the country to themselves during internal Roman conflicts?", "back": "According to the authority they had assumed in those specific regions."}, {"front": "According to Machiavelli, what factor besides a conqueror's ability determines the ease of keeping a state?", "back": "The want of uniformity in the subject state."}, {"front": "Term: Sanjak", "back": "Definition: An administrative division in the Ottoman (Turkish) Empire governed by administrators appointed by the lord."}, {"front": "The principalities governed by a prince and _____ are difficult to keep once acquired.", "back": "barons"}, {"front": "The principalities governed by a prince and _____ are difficult to seize but easy to hold.", "back": "servants"}, {"front": "In a centralized monarchy, administrators are shifted and changed at the prince's _____.", "back": "will (or choice)"}, {"front": "Why can a king not easily take away the prerogatives of French barons?", "back": "It would put the king at peril due to the barons' ancient rights and subject loyalty."}, {"front": "Why is it impossible to hold states like France with 'tranquillity'?", "back": "The decentralized structure ensures constant opportunities for rebellion by local lords."}, {"front": "How did the Romans eliminate the threat of former lords in their provinces?", "back": "By exterminating the families of the former lords and outlasting the memory of their rule."}, {"front": "In a servant-based state, if a subject obeys someone other than the prince, they do so as if to a _____.", "back": "minister (or official)"}, {"front": "What historical figure is cited as an example of someone who had great difficulty keeping their acquisitions?", "back": "Pyrrhus."}, {"front": "Under what condition would Alexander's successors have enjoyed his empire 'at their ease'?", "back": "If they had remained united among themselves."}, {"front": "In which type of state is it easier for a conqueror to rely on internal corruption?", "back": "A decentralized state (like France)."}, {"front": "In which type of state must a conqueror rely almost entirely on their own military strength?", "back": "A centralized state (like the Turk's)."}, {"front": "Why are the subjects in France loyal to their barons?", "back": "They recognize them as lords and hold them in natural affection."}, {"front": "What is the primary risk of using 'malcontents' to enter a state like France?", "back": "They create difficulties for the conqueror even after the victory is won."}, {"front": "The state of the Turk is governed by one lord, and all others are his _____.", "back": "servants (or slaves/bondmen)"}, {"front": "What happens to the credit of lords in a servant-led state after the prince is defeated?", "back": "They have no credit or influence with the people."}, {"front": "Why was the state of Darius considered 'similar to the kingdom of the Turk'?", "back": "It was a centralized monarchy where the king's power was absolute over his ministers."}, {"front": "What did the Romans wait for before they became 'secure possessors' of former principalities?", "back": "The memory of the ancient principalities to pass away."}, {"front": "Why is it impossible to 'satisfy' the remaining lords in a conquered state like France?", "back": "They have their own independent power bases and ambitions that the conqueror cannot meet."}, {"front": "In Machiavelli's analysis, why did Alexander face no rebellions in Asia?", "back": "The state structure lacked independent local lords who could lead a revolt."}, {"front": "The difficulty of keeping an acquisition is caused not by the ability of the conqueror, but by the _____.", "back": "want of uniformity in the subject state"}, {"front": "How does Machiavelli describe the status of ministers in the Turkish empire?", "back": "As slaves and bondmen."}, {"front": "What creates the 'natural affection' subjects feel for barons in France?", "back": "The antiquity of the barons' blood and their long-standing status as lords."}, {"front": "In the state of the Turk, why is the lord's family the only remaining fear after conquest?", "back": "No one else has the standing or recognition from the people to lead."}, {"front": "What role do 'malcontents' play in the conquest of a decentralized kingdom?", "back": "They open the way into the state and render the initial victory easy."}, {"front": "Why did the Roman Empire eventually split into parts attached to different Roman leaders?", "back": "Each leader established his own authority in different parts of the country after the old lords were gone."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
