<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 15, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Which chapter of 'The Prince' serves as the structural pivot from external conditions to the prince’s own qualities?", "back": "Chapter XIV"}, {"front": "Before Chapter XIV, 'The Prince' focuses on the _____ conditions a prince must manage.", "back": "external"}, {"front": "Why does Machiavelli begin his discussion of the prince's qualities with war rather than justice or wisdom?", "back": "He believes all other qualities are irrelevant without military competence."}, {"front": "According to Machiavelli, what happens to a wise and just prince who cannot defend his state?", "back": "He will lose his state along with his wisdom and justice."}, {"front": "What should be a prince's sole aim, thought, and study according to Machiavelli?", "back": "War and its rules and discipline."}, {"front": "Machiavelli views the 'art of war' as the prince's science, sport, and _____.", "back": "philosophy"}, {"front": "What is the ultimate basis of political power in Machiavelli’s view?", "back": "Coercive power."}, {"front": "Coercive power is primarily dependent on the credible threat of _____.", "back": "organized force"}, {"front": "How are princes who are ignorant of military affairs perceived by their soldiers?", "back": "They are despised."}, {"front": "What is the risk of a prince being ignorant of military constraints and capabilities?", "back": "He will make strategic miscalculations."}, {"front": "Why does the perception of military weakness invite aggression from enemies?", "back": "Enemies will test a prince they sense cannot fight."}, {"front": "Concept: Military Expertise", "back": "Definition: The foundation on which all other princely authority rests."}, {"front": "Who rose from nothing to become Duke of Milan through military skill?", "back": "Francesco Sforza."}, {"front": "Why did the descendants of Francesco Sforza lose the Duchy of Milan?", "back": "They abandoned the labors of the military."}, {"front": "Machiavelli argues that military skill is non-transferable; what can a prince not outsource to a general?", "back": "His military expertise."}, {"front": "According to Machiavelli, a prince who outsources political judgment to a minister ceases to be the actual _____.", "back": "ruler"}, {"front": "What are the two distinct types of military training a prince must engage in during peacetime?", "back": "Physical and mental training."}, {"front": "What is the primary activity recommended for a prince’s physical training?", "back": "Hunting."}, {"front": "How does hunting specifically help a prince plan a defense?", "back": "It teaches him to read the terrain and landscape of his own territory."}, {"front": "Which physical attribute does hunting develop to prepare a prince for military campaigns?", "back": "Stamina (or endurance)."}, {"front": "What does mental training for a prince primarily involve?", "back": "Reading military history."}, {"front": "For what purpose should a prince study great commanders of the past?", "back": "To analyze their successes and failures as case studies to be applied."}, {"front": "Which four historical commanders does Machiavelli recommend for study?", "back": "Alexander, Caesar, Scipio, and Cyrus."}, {"front": "Which book by Xenophon does Machiavelli highlight as a military-political manual?", "back": "The Cyropaedia."}, {"front": "Who is the central figure in Xenophon's 'Cyropaedia' whom Machiavelli uses as a model?", "back": "Cyrus the Great."}, {"front": "The Italian Wars took place between the years _____.", "back": "1494 and 1559"}, {"front": "Which specialized infantry formation demonstrated devastating effectiveness during the Italian Wars?", "back": "Swiss pike formations."}, {"front": "What new technology transformed siege warfare during the Renaissance Military Revolution?", "back": "Gunpowder weapons (or artillery)."}, {"front": "During the Renaissance Military Revolution, which military unit declined in importance relative to infantry?", "back": "Cavalry."}, {"front": "What old style of warfare became obsolete almost overnight due to Renaissance tactical developments?", "back": "The condottieri style."}, {"front": "Why was a prince's personal understanding of military matters particularly 'urgent' during Machiavelli's time?", "back": "The old rules of warfare were being replaced by new, lethal methods."}, {"front": "What warning does Machiavelli give regarding the 'storage' of military skill?", "back": "Military skill cannot be stored; it must be constantly maintained through study and practice."}, {"front": "According to the text, a prince who lives on borrowed time is one who relies on his family's _____.", "back": "military reputation"}, {"front": "How must the quality of virtù in a founder be handled by subsequent generations?", "back": "It must be renewed in each generation."}, {"front": "What happens to dynasties that stop working to 'deserve' their position?", "back": "Their inheritance decays because Fortune does not hold still."}, {"front": "In the context of military training, what does it mean to 'read the terrain'?", "back": "Understanding the navigational constraints and tactical advantages of a landscape."}, {"front": "Why is the study of military history considered 'mental training'?", "back": "It forces the prince to analyze the 'why' behind a commander's actions."}, {"front": "What specific consequence does a prince face if he is 'exploited by generals'?", "back": "Loss of actual authority and ruler status."}, {"front": "Machiavelli's claim that a prince should study 'nothing else' than war is intended to be taken _____.", "back": "literally"}, {"front": "According to Machiavelli, what is the prerequisite for exercising justice and wisdom in a state?", "back": "The ability to defend the state through military competence."}, {"front": "Which Renaissance development increased the 'scale and lethality' of battles?", "back": "The Military Revolution (including gunpowder and disciplined infantry)."}, {"front": "Under what condition will a prince be 'blindsided' by new military methods?", "back": "When he relies on experienced but outdated commanders."}, {"front": "What does Machiavelli's treatment of Xenophon's 'Cyropaedia' suggest about his view of history?", "back": "He treats it as a practical manual rather than just a narrative."}, {"front": "The rise of _____ is used as the 'classic case' of a man rising through his own virtù.", "back": "Francesco Sforza"}, {"front": "Why is the placement of military discussion at the start of the prince's qualities described as 'deliberate'?", "back": "It signals that military competence is the most fundamental virtue."}, {"front": "What is the result of a prince neglecting 'the labors of the military'?", "back": "The loss of his state (as seen with Sforza's descendants)."}, {"front": "How does hunting prepare a prince for harsh campaign conditions?", "back": "It develops the endurance to operate in harsh conditions."}, {"front": "How does Machiavelli describe the movement of 'Fortune' in relation to dynasties?", "back": "Fortune does not hold still."}, {"front": "Which country’s infantry tactics are specifically cited as part of the Renaissance Military Revolution?", "back": "Spanish infantry tactics."}, {"front": "The 'condottieri' style of warfare was characterized by being _____ by the developments of the Italian Wars.", "back": "obsolete"}, {"front": "What question must a prince 'constantly ask' when studying historical successes?", "back": "What did this commander do, and why did he do it?"}, {"front": "What is the relationship between political power and organized force in Machiavelli's thought?", "back": "Political power is ultimately coercive and relies on force."}, {"front": "Which virtue did previous traditions of political advice usually place first?", "back": "Justice (or wisdom/piety)."}, {"front": "In Machiavelli's framework, what happens to a prince's piety if he cannot defend his state?", "back": "It is lost along with the state."}, {"front": "True or False: Machiavelli believes a prince can delegate military competence to an expert general.", "back": "False"}, {"front": "Which commander did Machiavelli treat as a case study for analyzing success and failure?", "back": "Cyrus (or Alexander/Caesar/Scipio)."}, {"front": "The 'Transition' in 'The Prince' refers to the shift from studying the state to studying _____.", "back": "the prince himself"}, {"front": "What is the primary danger of the perception of military weakness?", "back": "It invites aggression at the worst possible moment."}, {"front": "Why is 'virtù' in the military domain described as non-transferable?", "back": "A prince cannot remain the actual ruler if he lacks personal military authority."}, {"front": "The 'Italian Wars' showcased the effectiveness of which French military asset?", "back": "Artillery."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
