    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Which type of state does Machiavelli claim is the easiest to rule and preserve?", "back": "Hereditary principalities."}, {"front": "According to Machiavelli, why do hereditary states present fewer difficulties in holding than new ones?", "back": "They are long accustomed to the family of their prince."}, {"front": "To maintain a hereditary state, a prince must only avoid transgressing the _____ of his ancestors.", "back": "Customs."}, {"front": "Besides following tradition, how must a hereditary prince handle events to maintain his rule?", "back": "By dealing prudently with circumstances as they arise."}, {"front": "What level of capability allows a hereditary prince to maintain himself in his state?", "back": "Average powers."}, {"front": "Under what specific condition is a hereditary prince of average powers likely to be deprived of his state?", "back": "By some extraordinary and excessive force."}, {"front": "If a hereditary prince is ousted by a usurper, when is he most likely to regain his state?", "back": "Whenever anything sinister happens to the usurper."}, {"front": "Which Italian ruler is cited as an example of an established prince who withstood foreign attacks?", "back": "The Duke of Ferrara."}, {"front": "The Duke of Ferrara was able to withstand attacks from the _____ in 1484.", "back": "Venetians."}, {"front": "Which Pope attacked the Duke of Ferrara in 1510?", "back": "Pope Julius."}, {"front": "What allowed the Duke of Ferrara to survive the attacks of 1484 and 1510?", "back": "He was long established in his dominions."}, {"front": "Why does a hereditary prince have less cause and necessity to offend his subjects?", "back": "His rule is supported by long-established tradition rather than force."}, {"front": "What is the natural result of a hereditary prince having less necessity to offend his subjects?", "back": "He will be more loved."}, {"front": "Unless _____ cause him to be hated, subjects are naturally well disposed toward a hereditary prince.", "back": "Extraordinary vices."}, {"front": "What factors cause the memories and motives for political change to be lost?", "back": "The antiquity and duration of a prince's rule."}, {"front": "Machiavelli states that one political change always leaves the _____ for another.", "back": "Toothing."}, {"front": "Concept: Toothing", "back": "Definition: A metaphorical foundation or opening created by one change that facilitates subsequent changes."}, {"front": "Term: Hereditary Principality", "back": "Definition: A state where the family of the prince has been established for a long period."}, {"front": "In hereditary states, what does most of the governing for the prince?", "back": "Long-established custom."}, {"front": "Machiavelli argues that subjects are \"naturally well disposed\" toward a prince because of his family's _____.", "back": "Antiquity."}, {"front": "How does Machiavelli describe the level of difficulty in holding new states compared to hereditary ones?", "back": "New states present far more difficulties to the ruler."}, {"front": "What must a prince do if he is deprived of his hereditary state and the usurper fails?", "back": "He will regain it."}, {"front": "In what year did the Venetians attack the Duke of Ferrara?", "back": "1484."}, {"front": "What is the primary requirement for an average prince to maintain a hereditary state?", "back": "Not to transgress ancestral customs and act prudently."}, {"front": "Why is the memory of past changes lost in a long-standing principality?", "back": "The duration of the rule erases the motives for change."}, {"front": "What specific human response is lost during the \"antiquity and duration\" of a rule?", "back": "The memories and motives that make for change."}, {"front": "A hereditary prince is generally more _____ by his subjects because he offends them less.", "back": "Loved."}, {"front": "What prevents subjects from being well disposed toward a hereditary ruler?", "back": "The presence of extraordinary vices."}, {"front": "How does Machiavelli characterize the force required to take a state from an average hereditary prince?", "back": "Extraordinary and excessive."}, {"front": "According to the text, a prince of average powers will maintain his state as long as he is _____ with circumstances.", "back": "Prudent."}, {"front": "What is the relationship between the duration of a rule and the likelihood of revolution?", "back": "Long duration erases the motives and memories required for change."}, {"front": "Who was the usurper's primary threat when taking a hereditary state?", "back": "The original prince, who will likely regain power if the usurper falters."}, {"front": "The Duke of Ferrara's survival against Pope Julius in 1510 is used to illustrate which concept?", "back": "The stability provided by being long-established in a dominion."}, {"front": "What does Machiavelli suggest is the consequence of making one change in a state?", "back": "It prepares the way for another change to occur."}, {"front": "Which type of government does Machiavelli explicitly state he will not discuss in Chapter II?", "back": "Republics."}, {"front": "According to Machiavelli, why is it sufficient for a hereditary prince to follow ancestral custom?", "back": "Custom does most of the governing for him."}, {"front": "Under what condition will a deposed prince regain his state from a usurper?", "back": "Whenever anything sinister happens to the usurper."}, {"front": "What is the main reason a hereditary prince is less likely to be hated by his subjects?", "back": "He has less necessity to offend them compared to a new prince."}, {"front": "A hereditary prince is more loved because he has less cause to _____ his people.", "back": "Offend."}, {"front": "What effect does the \"antiquity and duration\" of rule have on political stability?", "back": "It removes the motives and memories that drive political change."}, {"front": "How does Machiavelli describe the difficulty of holding a state long accustomed to a family?", "back": "It presents fewer difficulties than holding a new state."}, {"front": "In the context of the Duke of Ferrara, what historical event occurred in 1484?", "back": "The attacks of the Venetians."}, {"front": "In the context of the Duke of Ferrara, what historical event occurred in 1510?", "back": "The attacks of Pope Julius."}, {"front": "What is the prerequisite for subjects being \"naturally well disposed\" toward their ruler?", "back": "The rule must be hereditary and long-established."}, {"front": "How does a prince of average powers maintain himself against potential usurpers?", "back": "By dealing prudently with circumstances and following tradition."}, {"front": "What is Machiavelli's term for the way one political change facilitates the next?", "back": "Toothing."}, {"front": "According to Machiavelli, what destroys the motives that make for change?", "back": "A rule's antiquity and duration."}, {"front": "What must a prince do with his ancestors' customs to stay in power?", "back": "He must not transgress them."}, {"front": "Why is a usurper in a hereditary state particularly vulnerable?", "back": "Any misfortune he faces allows the original prince to regain the state."}, {"front": "Which group attacked the Duke of Ferrara in '84?", "back": "The Venetians."}, {"front": "Machiavelli notes that subjects are naturally well disposed toward a prince unless _____ cause him to be hated.", "back": "Extraordinary vices."}, {"front": "What is the main advantage a hereditary prince has in maintaining his state?", "back": "The established order built by his ancestors."}, {"front": "How does Machiavelli categorize the powers of a prince who can maintain a hereditary state?", "back": "Average powers."}, {"front": "In Machiavelli's view, why is a new prince more likely to offend his subjects?", "back": "He lacks the established customs that govern for a hereditary prince."}, {"front": "What phrase does Machiavelli use to describe the durability of long-established rule against external attacks?", "back": "Long established in his dominions."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
