<head>

    <link rel="stylesheet" href="../../styles.css">

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 21, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What practical question does Machiavelli address in Chapter XX?", "back": "Which defensive strategies actually work for a prince in reality."}, {"front": "What is the characteristic 'test' Machiavelli applies to strategies like building fortresses?", "back": "Determining if the strategy is effective in practical, real-world application."}, {"front": "Why does a new prince in a new principality always distribute arms to his subjects?", "back": "To ensure their loyalty, as arming them makes the arms the prince's and converts distrust into faithfulness."}, {"front": "What effect does arming subjects have on those who were previously distrusted?", "back": "They become faithful to the prince."}, {"front": "In a new state, what is the result of arming those who were already faithful?", "back": "They are kept faithful and become the prince's adherents."}, {"front": "How should a prince handle the subjects he does NOT arm when he selectively arms others?", "back": "By treating those who are armed better, making them dependents, and letting the others see it as a necessary reward for danger."}, {"front": "Why does disarming subjects offend them?", "back": "It shows that the prince distrusts them for either cowardice or a lack of loyalty."}, {"front": "What is the consequence of a prince breeding hatred by disarming his subjects?", "back": "He must turn to mercenaries for defense, which are insufficient against powerful enemies."}, {"front": "How should a prince treat the men of a new state that is added as a province to his old one?", "back": "He must disarm them, with the exception of those who helped him acquire the state."}, {"front": "What should eventually happen to the 'adherents' who helped a prince acquire a new province?", "back": "They should be rendered soft and effeminate over time."}, {"front": "Where should the armed soldiers of a prince's expanded state be located?", "back": "In the prince's old state, living near him."}, {"front": "What was the traditional wisdom regarding the control of Pistoia?", "back": "That it was necessary to hold it by fostering internal factions."}, {"front": "What was the traditional wisdom regarding the control of Pisa?", "back": "That it was necessary to hold it by using fortresses."}, {"front": "Why does Machiavelli reject the use of internal factions to maintain control today?", "back": "Because divided cities are lost quickly when an enemy attacks, as the weak party will assist the invaders."}, {"front": "How did the Venetians attempt to keep their tributary cities from uniting against them?", "back": "By fostering the Guelph and Ghibelline factions to keep the citizens distracted by disputes."}, {"front": "What happened to the Venetian-controlled cities after the rout at Vaila?", "back": "One faction took courage and immediately seized the state from the Venetians."}, {"front": "What does the reliance on internal factions to manage subjects indicate about a prince?", "back": "It indicates weakness in the prince's rule."}, {"front": "When is the policy of fostering factions among subjects typically useful?", "back": "Only in times of peace."}, {"front": "How does fortune assist a 'new prince' who needs to earn renown?", "back": "By causing enemies to arise so the prince has the opportunity to overcome them."}, {"front": "According to Machiavelli, what is the purpose of a wise prince 'fostering animosity' against himself?", "back": "To rise higher in renown by crushing the opposition."}, {"front": "Why do new princes often find more fidelity in men who were initially distrusted?", "back": "These men feel a greater necessity to cancel their bad reputation through loyal deeds."}, {"front": "Who was the Prince of Siena who ruled his state using those who had been distrusted?", "back": "Pandolfo Petrucci."}, {"front": "Why is it difficult to satisfy those who helped a prince acquire a state because they were discontented with the old government?", "back": "Because their support was based on frustration rather than affection, making them impossible to fully satisfy."}, {"front": "Is it easier for a prince to make friends of former enemies or of former allies who were discontented with the previous rule?", "back": "It is easier to make friends of those who were contented under the former government (former enemies)."}, {"front": "What is the historical purpose of building fortresses in a state?", "back": "To serve as a 'bridle and bit' against rebels and a refuge from initial attacks."}, {"front": "Why did Nicolo Vitelli demolish fortresses in Citta di Castello?", "back": "In order to keep possession of that state."}, {"front": "What action did Guido Ubaldo, Duke of Urbino, take upon returning to his dominion?", "back": "He razed all fortresses to the foundations to make the province harder to lose."}, {"front": "Under what condition should a prince build fortresses?", "back": "When he has more to fear from his own people than from foreigners."}, {"front": "Under what condition should a prince leave fortresses alone?", "back": "When he has more to fear from foreigners than from his own people."}, {"front": "What specific fortress caused significant trouble for the house of Sforza in Milan?", "back": "The castle of Milan."}, {"front": "What does Machiavelli claim is 'the best possible fortress'?", "back": "Not being hated by the people."}, {"front": "Why are fortresses useless if the people hate the prince?", "back": "Because foreigners will always come to assist a people who have taken up arms against their ruler."}, {"front": "How did a fortress help the Countess of Forli after the death of Count Girolamo?", "back": "It allowed her to withstand a popular attack while waiting for assistance from Milan."}, {"front": "Why did the Countess of Forli's fortresses fail her when Cesare Borgia attacked?", "back": "The people were allied with the foreigners (Borgia), rendering the fortresses of little value."}, {"front": "What is Machiavelli's final judgment on those who build fortresses?", "back": "He praises both those who build them and those who do not, provided they do not neglect the hatred of the people."}, {"front": "Whom does Machiavelli specifically blame regarding the use of fortresses?", "back": "Anyone who trusts in fortresses while caring little about being hated by the people."}, {"front": "According to the text, what is the 'ladder' that a prince's enemies unwittingly raise for him?", "back": "The difficulties and obstacles they create, which the prince overcomes to mount higher."}, {"front": "Why can one not give a 'final judgment' on defensive strategies like building fortresses without context?", "back": "Because the decision depends on the particulars of the specific state involved."}, {"front": "How does disarming subjects lead to a prince's reliance on mercenaries?", "back": "The prince cannot remain unarmed, and since he doesn't trust his subjects, he must hire outside soldiers."}, {"front": "What is the primary reason the 'weakest party' in a divided city assists outside forces during war?", "back": "They seek to gain an advantage over their internal rivals by siding with the invader."}, {"front": "Term: Guelph and Ghibelline", "back": "Definition: Factions in Italian tributary cities that the Venetians fostered to keep citizens distracted from uniting."}, {"front": "Why do 'distrusted' men often serve a prince with more fidelity than those who feel secure?", "back": "Those who feel secure may neglect the prince's affairs, while the distrusted must prove their worth."}, {"front": "Why is 'natural affection' a more reliable basis for support than 'discontent with government'?", "back": "Discontented supporters are hard to satisfy once they realize the new government cannot meet all their expectations."}, {"front": "What is the strategic risk of a prince trusting in fortresses above all else?", "back": "It can lead him to ignore the more important task of maintaining the support of his subjects."}, {"front": "Concept: The Best Fortress", "back": "Definition: Popular support and the absence of the people's hatred, which protects more effectively than stone walls."}, {"front": "Which group should a prince render 'soft and effeminate' over time in an annexed province?", "back": "The adherents who helped him acquire the state."}, {"front": "In Chapter XX, what does Machiavelli say about the necessity of holding Pisa?", "back": "Forefathers believed it was necessary to hold Pisa by fortresses."}, {"front": "According to Machiavelli, under what specific circumstance are factions 'useful'?", "back": "They are only useful for managing subjects more easily in times of peace."}, {"front": "What is the metaphorical 'bridle and bit' used by princes?", "back": "Fortresses built to control those who might design to work against the prince."}, {"front": "How does a prince's treatment of armed subjects create 'dependents'?", "back": "By benefiting those he arms, he creates a specialized class that relies on his favor for their status."}, {"front": "What was the outcome for the Bentivogli when they returned to Bologna?", "back": "They decided to demolish the fortresses in the state."}, {"front": "Why did Cesare Borgia's attack on the Countess of Forli succeed despite her fortresses?", "back": "The people joined the foreign attacker, which the fortresses could not prevent."}, {"front": "What quality must a prince possess for a principality to be considered 'vigorous' regarding factions?", "back": "Strength, as factions are never permitted in a vigorous principality."}, {"front": "Machiavelli notes that histories are full of examples of what specific military policy for new princes?", "back": "The policy of distributing arms to their subjects."}, {"front": "When adding a state to an old one, which soldiers should the prince rely on?", "back": "Soldiers who lived near the prince in his original state."}, {"front": "Why does the 'cowardice' or 'want of loyalty' implied by disarming subjects lead to hatred?", "back": "It is an offensive show of distrust toward the people's character."}, {"front": "What is the result when a city is divided and an outside enemy attacks?", "back": "The city is quickly lost because it cannot resist with one party assisting the enemy."}, {"front": "Why is renown more necessary for a new prince than an hereditary one?", "back": "Because a new prince must earn his reputation and legitimacy through deeds, whereas an hereditary one inherits them."}, {"front": "According to the text, why did the Venetians never allow Guelph and Ghibelline disputes to come to bloodshed?", "back": "They wanted to keep the citizens distracted by differences without causing total chaos."}, {"front": "What determines if a prince extracting profit from his servants is successful?", "back": "Whether the servants feel a need to prove their loyalty (distrusted) or are complacent (trusted)."}, {"front": "Why is a prince's 'craft' mentioned in relation to fostering animosity?", "back": "A wise prince may intentionally create a small conflict to demonstrate his ability to resolve it."}, {"front": "What happened to the Countess of Forli when the Count Girolamo was killed?", "back": "She used a fortress to withstand a popular attack and recovered her state with help from Milan."}, {"front": "Who was the 'foreigner' that assisted the people against the Countess of Forli?", "back": "Cesare Borgia."}, {"front": "What is the core reason why disarmed subjects cannot defend a prince against powerful enemies?", "back": "The prince is forced to use mercenaries, who are inherently unreliable and insufficient."}, {"front": "How does Machiavelli characterize the strategy of holding Pistoia by factions today?", "back": "He believes it cannot be accepted as a precept for modern times."}, {"front": "What makes those who were contented under a former government 'enemies' to a new prince?", "back": "Their loyalty to the previous regime naturally places them in opposition to the new one."}, {"front": "In the context of the text, what does 'render soft and effeminate' mean?", "back": "Weakening the martial spirit and military capacity of potential internal rivals."}, {"front": "Why is the Castle of Milan cited as a 'disorder in the state'?", "back": "It created more trouble and rebellion for the Sforza family than it prevented."}, {"front": "What condition made the Countess of Forli's fortress useful in the first instance?", "back": "The foreigners were unable to assist the people at that specific time."}, {"front": "What does Machiavelli suggest is the relationship between 'difficulty' and a prince's 'greatness'?", "back": "A prince becomes great by overcoming the difficulties and obstacles placed in his path."}, {"front": "How should a prince view the 'particulars of those states' when making defensive decisions?", "back": "As the essential details required to make a final judgment on which strategy to use."}, {"front": "What is the primary danger of a prince trusting in fortresses while being hated by his subjects?", "back": "Foreign powers will intervene to help the subjects, and the fortress will not provide protection from both."}, {"front": "Why does Machiavelli advise a prince to consider the 'reasons' why people supported his takeover?", "back": "To determine if their support was based on true affection or merely temporary dissatisfaction."}, {"front": "According to the text, when does the policy of fostering factions prove 'fallacious'?", "back": "The moment war comes."}, {"front": "Which prince is praised for demolishing fortresses to keep his state?", "back": "Nicolo Vitelli."}, {"front": "What was the result of the Bentivogli family's return to Bologna regarding fortresses?", "back": "They decided to destroy the fortresses to prevent losing the state again."}, {"front": "What does the text suggest is the relationship between 'danger' and 'reward' for subjects?", "back": "Subjects who face the most danger and service should receive the most reward."}, {"front": "Why is it easier to gain over former enemies who need assistance to support themselves?", "back": "They are in a vulnerable position and can be easily secured through the prince's help."}, {"front": "What does Machiavelli identify as the 'bridle and bit' for potential enemies?", "back": "The construction of fortresses."}, {"front": "According to Machiavelli, what should a prince do if he finds his new subjects are already disarmed?", "back": "He should arm them."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
