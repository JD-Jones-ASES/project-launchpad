<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 25, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Machiavelli's main verdict regarding why Italian princes lost their states?", "back": "They lost their states not due to bad luck or fortune, but because they were inadequate and violated fundamental principles of good governance."}, {"front": "According to Machiavelli, what was the primary issue with the armies of Italian princes?", "back": "They relied on mercenaries and auxiliaries, forces Machiavelli condemned, rather than building their own military, leaving them helpless against better-organized enemies."}, {"front": "Why did Italian princes lack popular loyalty, according to Machiavelli?", "back": "They failed to win the genuine support of their people, who therefore had little stake in their rulers' survival and offered minimal resistance to invaders."}, {"front": "What critical error did Italian princes make regarding preparedness for adversity?", "back": "They failed to prepare during times of peace, living as if good times would continue indefinitely and making no provision for potential attacks."}, {"front": "How did Machiavelli view the strategy of Italian princes who resorted to flight during a crisis?", "back": "He was contemptuous of it, arguing that a prince who abandons his state demonstrates he doesn't deserve it and makes recovery nearly impossible as invaders consolidate power."}, {"front": "What common excuse did defeated Italian princes offer for their losses?", "back": "They blamed fortune, claiming the enemy was too strong, the timing was unlucky, or circumstances conspired against them."}, {"front": "How does Machiavelli respond to the excuse that fortune was to blame for the princes' failures?", "back": "He dismisses it as a comforting delusion, arguing that while fortune governs roughly half of events, the other half is within human control through choices and preparations."}, {"front": "What is the 'sharp edge' of Machiavelli's argument against blaming fortune?", "back": "It's a moral and political judgment: the princes were not tragic victims but men who had warnings and resources but chose not to act on them."}, {"front": "Define Machiavelli's key concept of 'preparedness' as a consistent theme in *The Prince*.", "back": "Preparedness means investing in resilience during peace – building one's own army, securing popular loyalty, and anticipating adversity – rather than waiting for crisis to strike."}, {"front": "How does Machiavelli argue that the principle of preparedness applies beyond principalities?", "back": "He states it's a universal feature of political and organizational life: institutions that don't invest in resilience during good times find themselves defenseless when bad times arrive."}, {"front": "How does Chapter XXIV connect to the rest of *The Prince*?", "back": "It serves as a synthesis, demonstrating what happens when the specific prescriptions of earlier chapters (e.g., build one's own army, win popular support) are ignored."}, {"front": "What role do the Italian princes play in *The Prince*'s overall message, particularly in Chapter XXIV?", "back": "They serve as 'negative examples' or practical illustrations of failure for rulers who have not mastered Machiavelli's lessons."}, {"front": "What personal context influenced Machiavelli's writing of *The Prince* and his diagnosis of Italy's failures?", "back": "He wrote it in 1513, witnessing the fall of the Republic of Florence and the return of the Medici, which cost him his position, making his analysis partly a self-diagnosis."}, {"front": "How does Chapter XXIV act as a bridge to subsequent chapters in *The Prince*?", "back": "After establishing that Italian failures were self-inflicted, it leads into the philosophical question of how much of political life is within human control (the problem of fortune and free will)."}, {"front": "What were the consequences of Italian princes not building their own armies?", "back": "They were helpless when French or Spanish armies arrived, as their hired mercenaries either fled or proved insufficient, leaving them vulnerable to invasion."}, {"front": "What crucial aspect of leadership did Italian princes neglect by not taking their enemies seriously until it was too late?", "back": "Strategic foresight and proactive preparation, failing to anticipate and plan for potential threats during periods of peace."}, {"front": "Why is it difficult for a prince who flees his state to recover it later?", "back": "An invader has time to consolidate power, create new loyalties among the populace, and make the original prince's return increasingly difficult and unwelcome."}, {"front": "What kind of invasion led to the collapse of Italian independence that Machiavelli witnessed?", "back": "Invasions by French, Spanish, and Imperial armies."}, {"front": "What is the universal feature of political life described by Machiavelli regarding preparedness?", "back": "That institutions which neglect to invest in resilience during good times will inevitably find themselves defenseless when bad times eventually arrive."}, {"front": "According to Machiavelli, what are some specific prescriptions from earlier chapters that Italian princes ignored?", "back": "Building their own army, winning popular support, avoiding being hated, and knowing how not to be good when circumstances require it."}, {"front": "When Machiavelli says 'Do Not Blame Fortune,' what domain does he argue the Italian princes failed in?", "back": "They failed in the domain where their own choices, actions, and preparations would have made a decisive difference."}, {"front": "What distinguishes Machiavelli's analysis in Chapter XXIV from mere historical observation?", "back": "It is a moral and political judgment, not just an account of events, labeling the princes inadequate rather than tragic victims."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
