<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 22, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who did Machiavelli consider to be the \"model prince\" of his era in Chapter XXI?", "back": "Ferdinand II of Aragon."}, {"front": "According to Machiavelli, what was Ferdinand II's primary skill regarding the use of religion?", "back": "Using religion as a political instrument or cover."}, {"front": "What was the primary result of the marriage between Ferdinand of Aragon and Isabella of Castile in 1469?", "back": "The unification of the two largest Iberian kingdoms."}, {"front": "Despite their marriage, how did the kingdoms of Ferdinand and Isabella handle their internal governance?", "back": "Each kingdom retained its own distinct laws and institutions."}, {"front": "Which historical event in 1492 marked the end of the Christian Reconquista in Spain?", "back": "The conquest of Granada."}, {"front": "What was Ferdinand's strategic goal in using the conquest of Granada to unite his kingdoms?", "back": "To unite them around a common religious cause and build a military machine."}, {"front": "How did Machiavelli interpret Ferdinand and Isabella's expulsion of the Jews in 1492?", "back": "As an example of using religion as a political cover to seize wealth."}, {"front": "What was the political consequence of Ferdinand’s military campaigns in North Africa and Italy?", "back": "They kept the nobility occupied and his subjects amazed by his ambitions."}, {"front": "Which Italian territory did Ferdinand conquer between 1503 and 1504 to establish Spanish dominance?", "back": "The Kingdom of Naples."}, {"front": "According to Machiavelli, why must a prince follow one great enterprise with a greater one?", "back": "To keep subjects and rivals too busy admiring or fearing him to plot against him."}, {"front": "In Machiavelli's view, what opens the political space for conspiracy against a prince?", "back": "The moment the prince stops being impressive."}, {"front": "Concept: The Politics of Spectacle", "back": "The strategy of building a reputation through being talked about and performing decisive actions."}, {"front": "Why does Machiavelli argue that a prince's reputation for greatness is a form of physical defense?", "back": "It makes him harder to overthrow because challengers face the prestige surrounding him."}, {"front": "What is Machiavelli's specific advice regarding a prince's stance when two neighboring powers go to war?", "back": "Never be neutral."}, {"front": "Why is neutrality considered a \"delusion\" of safety in international conflict?", "back": "It pleases no one and leaves the victor with no reason to reward or respect the prince."}, {"front": "What benefit does a prince gain by committing to a losing side in a conflict?", "back": "A reputation for reliability and courage that pays dividends over time."}, {"front": "What is the strategic advantage of choosing a side that eventually wins a war?", "back": "The prince gains a powerful friend who is indebted to him."}, {"front": "Which modern diplomatic tradition is prefigured by Machiavelli's arguments against neutrality?", "back": "Realpolitik."}, {"front": "According to Henry Kissinger, why is a state that refuses to clearly define its interests at a disadvantage?", "back": "It becomes unpredictable, and unpredictable allies are not valued."}, {"front": "In domestic politics, why should a prince honor talent in arts and commerce?", "back": "To build a reputation as a patron and a protector of the state's progress."}, {"front": "What is the political purpose of a prince holding festivals and spectacles?", "back": "To provide collective pleasures that bind the population to the state."}, {"front": "Why does Machiavelli encourage the prince to associate with guilds and professional associations?", "back": "To transform these organizations into networks of loyalty and order."}, {"front": "What did Ferdinand II's \"endless enterprises\" achieve regarding his domestic rivals?", "back": "They kept the nobles occupied in military service and away from internal plotting."}, {"front": "Machiavelli values Ferdinand’s _____ _____ over his piety or justice.", "back": "political effectiveness"}, {"front": "The title \"Catholic Monarchs\" refers to Ferdinand II of Aragon and _____ __ _____.", "back": "Isabella of Castile"}, {"front": "Machiavelli suggests that a prince should be \"visibly present in the life of the city\" rather than _____.", "back": "shut away in a palace"}, {"front": "According to the text, what replaces the physical defenses that money cannot always buy for a prince?", "back": "A reputation built through great enterprises and decisive actions."}, {"front": "By the time of his death, Ferdinand had established Spanish dominance in which two major regions?", "back": "Italy and the Americas."}, {"front": "Ferdinand used the ______ to build his military machine and unite his kingdoms.", "back": "conquest of Granada"}, {"front": "True or False: Machiavelli considers the politics of spectacle to be a form of vanity.", "back": "False, he considers it a political strategy."}, {"front": "What is the primary risk of neutrality for a prince if a neighboring conflict ends in a decisive victory?", "back": "The victor will likely view the neutral prince as a suspicious and unhelpful neighbor."}, {"front": "Machiavelli advises that a prince build his reputation through a sustained ______ ______ of impressive behavior.", "back": "visible pattern"}, {"front": "How does a prince's patronage of craftsmen affect his public image?", "back": "It establishes him as a supporter of the industries that improve the state."}, {"front": "What was the final Muslim kingdom driven from the Iberian Peninsula in 1492?", "back": "Granada."}, {"front": "Why did Ferdinand's campaigns in North Africa and Italy keep his enemies uncertain?", "back": "The scale and frequency of his ambitions made his next moves unpredictable."}, {"front": "In Machiavelli's view, a prince must not merely be respected quietly, but ______ and ______.", "back": "actively admired; discussed"}, {"front": "What was the effect of the 1469 marriage on the laws of Aragon and Castile?", "back": "Both kingdoms retained their own separate laws and institutions."}, {"front": "Machiavelli argues that a prince who chooses a side in a war gains a ______ ______ who owes him something.", "back": "powerful friend"}, {"front": "Ferdinand used his enterprises to ensure his subjects were \"too busy ______—or ______—\" to plot against him.", "back": "admiring; fearing"}, {"front": "The expulsion of the Jews is cited by Machiavelli as an example of using ______ as a political cover.", "back": "religion"}, {"front": "What is the strategic reason for a prince to encourage those who improve the state’s industries?", "back": "It fosters domestic growth and builds the prince’s reputation as a protector."}, {"front": "According to the \"teachernote,\" the neutrality argument relates to historical debates about ______ in the 1930s.", "back": "appeasement"}, {"front": "Which two North African cities were captured by Ferdinand’s armies?", "back": "Oran and Tripoli."}, {"front": "In Chapter XXI, Machiavelli moves from abstract principles to a ______ ______ ______ to explain how to gain renown.", "back": "concrete case study"}, {"front": "What specific domestic groups should a prince associate with to build networks of loyalty?", "back": "Guilds and professional associations."}, {"front": "What does Machiavelli call the reasoning that neutrality preserves a prince's options?", "back": "A delusion."}, {"front": "A prince who commits decisively to a side avoids being seen as ______.", "back": "unreliable"}, {"front": "What was the significance of Ferdinand's death in terms of Spain's global standing?", "back": "He had unified most of Spain and opened a colonial empire in the Americas."}, {"front": "Ferdinand's \"elegant logic\" suggests that a prince should always be in the process of ______.", "back": "completing a spectacular enterprise"}, {"front": "According to Machiavelli, the tools of great enterprises and extraordinary patronage build ______.", "back": "reputation"}, {"front": "Ferdinand's domestic management suggests the prince should be visibly present in city life rather than ______.", "back": "isolated in a palace"}, {"front": "Why is a prince who is considered \"great\" by his people harder to overthrow?", "back": "He is protected by the prestige and expectations of the populace."}, {"front": "The conquest of Naples made Spain the dominant power in which country?", "back": "Italy."}, {"front": "What term is used to describe the 19th-century diplomatic tradition that values credible commitments over neutrality?", "back": "Realpolitik."}, {"front": "What is the primary danger of an unpredictable ally in international relations according to Kissinger?", "back": "They are not valued by other states because their interests are undefined."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
