<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 20, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, what are the two truly fatal errors a prince can commit?", "back": "To be hated or to be despised."}, {"front": "What are the two primary sources of hatred towards a prince?", "back": "Seizing the property of subjects and interfering with their women."}, {"front": "Why is seizing the land or honor of subjects dangerous for a prince?", "back": "It turns passive resentment into active fury and encourages conspiracy."}, {"front": "Under what condition will a people generally avoid hating a prince even if he is harsh?", "back": "If the prince avoids violating their property and honor."}, {"front": "Which specific trait in a prince leads to contempt from subjects?", "back": "Being perceived as irresolute, effeminate, cowardly, or weak."}, {"front": "Why does a prince who is not feared become vulnerable?", "back": "He becomes vulnerable to every faction and ambitious noble in his state."}, {"front": "What is the inherent tension in avoiding both hatred and contempt?", "back": "Firmness needed to avoid contempt can cause hatred, while restraint to avoid hatred can invite contempt."}, {"front": "What qualities must a prince possess to navigate the tension between hatred and contempt?", "back": "Virtgraveu and prudence."}, {"front": "Why did Machiavelli use the Roman Empire as a 'political laboratory'?", "back": "It provided a five-century record of political successes and failures."}, {"front": "How did Marcus Aurelius's path to power differ from other emperors?", "back": "He came to power through legitimate succession rather than force."}, {"front": "Why was Marcus Aurelius never required to use cruelty?", "back": "He was both loved and respected due to his legitimacy and consistent virtue."}, {"front": "What is Machiavelli's crucial caveat regarding the virtuous model of Marcus Aurelius?", "back": "It only works for a prince who inherits power in a stable state."}, {"front": "Which emperor is cited by Machiavelli as the supreme practitioner of the fox-and-lion method?", "back": "Septimius Severus."}, {"front": "How did Septimius Severus maintain the loyalty of his soldiers?", "back": "Through consistent military victory and material rewards."}, {"front": "Why was Septimius Severus never despised despite his ruthless nature?", "back": "He was clearly capable and decisive in his actions."}, {"front": "In the fox-and-lion method, when did Septimius Severus use the 'fox' approach?", "back": "When he needed to deceive enemies because direct force was insufficient."}, {"front": "Which emperor lost respect by appearing in the arena as a gladiator?", "back": "Commodus."}, {"front": "Why was the emperor Commodus ultimately assassinated?", "back": "He aroused hatred through cruelty and invited contempt through eccentric behavior."}, {"front": "What specific act of cruelty made Caracalla unsafe even among his own guard?", "back": "The wholesale massacre of the population of Alexandria."}, {"front": "Why was Maximinus despised by the Roman Senate and the people?", "back": "He was of humble birth and had never been seen in Rome."}, {"front": "What was the common reason for the failure of Commodus, Caracalla, and Maximinus?", "back": "They either aroused active hatred or invited fatal contempt."}, {"front": "How did Pertinax meet his end while trying to restore order?", "back": "He was killed by soldiers who were unwilling to be disciplined."}, {"front": "According to Machiavelli, what is the most essential defense for any prince?", "back": "Ensuring he is neither hated by his people nor considered weak by his enemies."}, {"front": "The emperor Septimius Severus shifted power away from the Senate and toward which group?", "back": "The military legions."}, {"front": "What is the 'Universal Rule' Machiavelli draws from the history of Roman emperors?", "back": "Never be hated, and never be despised."}, {"front": "Marcus Aurelius is noted for defending the northern frontier against which group?", "back": "Germanic invasions."}, {"front": "How does Machiavelli describe the 'lion' aspect of Septimius Severus's rule?", "back": "Crushing enemies with force once cunning was exhausted."}, {"front": "What was the primary danger of a prince being perceived as irresolute?", "back": "It invites conspiracies from those who no longer fear him."}, {"front": "Why did Machiavelli consider Septimius Severus one of the greatest political operators?", "back": "He prevailed despite facing extremely difficult circumstances."}, {"front": "What allowed Marcus Aurelius to treat the Senate with courtesy and govern firmly without cruelty?", "back": "His birth and character aligned perfectly with his circumstances."}, {"front": "Term: Soldier-emperors", "back": "Definition: Rulers whose power depended entirely on the loyalty of the legions."}, {"front": "What happened to Maximinus before he even reached the capital of Rome?", "back": "He was killed in a mutiny."}, {"front": "Why is a prince who retreats at the first sign of opposition considered vulnerable?", "back": "Such behavior invites contempt from both subjects and foreign powers."}, {"front": "What was the fate of the emperor Caracalla?", "back": "He was murdered by his own household/guard."}, {"front": "According to Machiavelli, what provides more security than fortresses or armies?", "back": "A prince who is neither resented by his people nor considered weak."}, {"front": "Which emperor was the son of Septimius Severus and known for being brilliant in battle but recklessly cruel?", "back": "Caracalla."}, {"front": "Which emperor was the son of Marcus Aurelius and squandered his inheritance through cruelty?", "back": "Commodus."}, {"front": "What event in 193 AD did Septimius Severus exploit to seize power?", "back": "The Year of the Five Emperors."}, {"front": "Machiavelli argues that subjects will not remain passive if they lose which two things?", "back": "Their land or their honor."}, {"front": "Why is 'carelessness' alone enough to lose power according to Machiavelli?", "back": "It can lead to either greed that causes hatred or weakness that causes contempt."}, {"front": "What was Marcus Aurelius's reputation besides being an emperor?", "back": "He was a Stoic philosopher and author of the Meditations."}, {"front": "How did Maximinus's origin contribute to his downfall?", "back": "His humble birth made the Senate feel he lacked legitimate imperial dignity."}, {"front": "Under Machiavelli's analysis, what is the result of a prince being 'feared rather than loved'?", "back": "It is a valid path to power, provided the prince avoids being hated."}, {"front": "What was the primary failure of the emperor Pertinax?", "back": "He tried to restore order to soldiers who preferred to remain undisciplined."}, {"front": "To whom did Marcus Aurelius owe his power through adoption?", "back": "Emperor Antoninus Pius."}, {"front": "How does Machiavelli characterize the behavior of Septimius Severus during his rise to power?", "back": "Calculating, ruthless, and duplicitous."}, {"front": "What is the relationship between decisiveness and the avoidance of conspiracies?", "back": "Decisiveness prevents the contempt that typically invites conspiracies."}, {"front": "In Machiavelli's view, why was Marcus Aurelius able to be 'consistently virtuous'?", "back": "His circumstances as a legitimate heir permitted it."}, {"front": "What is the primary risk of a prince behaving in a way that is 'effeminate' or 'cowardly'?", "back": "He will be despised (contempt)."}, {"front": "Which Roman emperor was born in Libya to an equestrian family?", "back": "Septimius Severus."}, {"front": "Why is 'being feared' distinct from 'being hated' in Machiavellian thought?", "back": "Fear comes from decisiveness/severity, while hatred comes from violating property/persons."}, {"front": "What was the aristocracy's view of Commodus's gladiatorial displays?", "back": "They considered it beneath imperial dignity and viewed it with contempt."}, {"front": "How did Caracalla deal with his own brother?", "back": "He murdered him."}, {"front": "Machiavelli notes that a prince must know when to _____ his word to avoid being weak.", "back": "Break."}, {"front": "Why is the avoidance of hatred/contempt a 'universal rule'?", "back": "While particulars change across eras, these two errors consistently lead to a prince's downfall."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
