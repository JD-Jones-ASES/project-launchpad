<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 9, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Besides virt`u and fortuna, what is the third category of principality acquisition discussed in Chapter VIII?", "back": "Principalities acquired through wickedness or outright crime."}, {"front": "Who is the primary ancient example used to illustrate the acquisition of a state through wickedness?", "back": "Agathocles of Syracuse."}, {"front": "What was the original social status of Agathocles of Syracuse?", "back": "He was the son of a potter."}, {"front": "What method did Agathocles use to eliminate his rivals in Syracuse in a single afternoon?", "back": "He ordered his troops to murder the leading citizens and soldiers at a prearranged assembly."}, {"front": "How long did Agathocles maintain power in Syracuse after his violent seizure of the state?", "back": "He held power for decades and died in old age still in control."}, {"front": "Which external enemy did Agathocles successfully defeat during his reign?", "back": "The Carthaginians."}, {"front": "According to Machiavelli, what is the trade-off of using wicked methods to gain empire?", "back": "Such methods may gain empire but cannot gain glory."}, {"front": "What specific actions does Machiavelli list as incompatible with achieving glory?", "back": "Killing fellow citizens, betraying friends, being without faith, mercy, or religion."}, {"front": "How does Machiavelli define the quality of 'virt`u' in the context of political achievement?", "back": "It is the ability to achieve success while earning genuine admiration and creating something lasting."}, {"front": "Why does Machiavelli exclude Agathocles from the ranks of founders like Moses, Cyrus, and Romulus?", "back": "Because Agathocles achieved power through terror rather than admirable political genius or glory."}, {"front": "What distinguishes the 'predator' from the 'founder' in Machiavelli’s analysis?", "back": "The predator survives by terror, whereas the founder creates something worthy of respect and lasting achievement."}, {"front": "What are the two sub-categories of cruelty introduced in Chapter VIII?", "back": "Cruelties can be either “well-used” or “badly-used.”"}, {"front": "What defines 'well-used' cruelty in a prince's rise to power?", "back": "It is committed all at once at the beginning for security and then not repeated."}, {"front": "In a regime using 'well-used' cruelty, how should benefits be handled?", "back": "Benefits should be distributed slowly over time after the initial violence has ceased."}, {"front": "What characterizes 'badly-used' cruelty?", "back": "It begins small and escalates over time rather than being finished at the start."}, {"front": "Why does 'badly-used' cruelty prevent a prince from achieving stability?", "back": "The prince never reaches psychological safety, causing resentment to accumulate and enemies to multiply."}, {"front": "According to Machiavelli, what is the paradoxical advantage of concentrated violence?", "back": "Concentrated violence followed by benevolent governance is more politically durable than ongoing low-level oppression."}, {"front": "Who is the modern example Machiavelli provides for a prince who used wickedness to seize power?", "back": "Oliverotto da Fermo."}, {"front": "Who raised Oliverotto da Fermo?", "back": "His uncle, Giovanni Fogliani."}, {"front": "How did Oliverotto da Fermo seize power in his hometown?", "back": "He invited the leading citizens to a dinner and had them murdered at a pre-arranged signal."}, {"front": "How long did Oliverotto da Fermo rule before being eliminated?", "back": "About a year."}, {"front": "Who eventually eliminated Oliverotto da Fermo?", "back": "Cesare Borgia."}, {"front": "By what method did Cesare Borgia execute Oliverotto da Fermo?", "back": "He had him strangled."}, {"front": "What analytical lesson is drawn from the pairing of Oliverotto and Cesare Borgia?", "back": "A wicked prince using treachery is often defeated by an intelligent prince who can plan multiple steps ahead."}, {"front": "What is the 'dirty hands' problem in political philosophy?", "back": "The question of whether a leader is morally justified in doing wrong to achieve good outcomes."}, {"front": "Which 20th-century philosopher used the phrase 'dirty hands' to describe moral dilemmas in leadership?", "back": "Michael Walzer."}, {"front": "Which author explored the 'dirty hands' problem in a 1948 play of the same name?", "back": "Jean-Paul Sartre."}, {"front": "What is Machiavelli's practical criterion for evaluating political violence?", "back": "Whether the violence achieves security and allows for the resumption of normal, benevolent life."}, {"front": "Machiavelli suggests that to be remembered well, a prince must commit all necessary cruelties _____.", "back": "at once (or simultaneously)."}, {"front": "How does Machiavelli view the moral standard of a 'founder' compared to a 'criminal'?", "back": "A founder meets a non-Christian standard of glory and lasting achievement that the criminal fails."}, {"front": "What is the psychological effect of 'well-used' cruelty on the ruler's position?", "back": "It provides the psychological safety that comes from having decisively broken resistance."}, {"front": "Under what condition does Machiavelli observe that some cruelties produce durable political outcomes?", "back": "When they are used for self-defense and the common utility of the subjects later."}, {"front": "In Machiavelli's view, why is a prince who commits smaller cruelties repeatedly in a more precarious position?", "back": "Because the constant threat prevents the subjects from feeling secure and breeds ongoing hatred."}, {"front": "What was the pretense under which Agathocles called the assembly of Syracuse?", "back": "The pretense of consultation."}, {"front": "Why is it significant that Oliverotto was a contemporary of Machiavelli's readers?", "back": "It demonstrated that the patterns of wicked success were not just ancient curiosities but active political realities."}, {"front": "Machiavelli’s distinction between empire and glory implies that effectiveness is not the same as _____.", "back": "Virt`u."}, {"front": "What is the primary difference in the trajectory of violence between Agathocles and Oliverotto?", "back": "Agathocles used violence to establish a multi-decade stable rule, whereas Oliverotto was quickly eliminated by a more skillful prince."}, {"front": "According to the text, what is the 'demanding, non-Christian standard' Machiavelli uses to judge leaders?", "back": "The standard of political glory and lasting achievement."}, {"front": "What was the ultimate fate of Agathocles of Syracuse?", "back": "He died in old age, still in control of his state."}, {"front": "The case of Oliverotto illustrates that treachery may be insufficient when facing a prince with _____.", "back": "Virt`u (or superior planning)."}, {"front": "In the context of Chapter VIII, what is the intended purpose of 'well-used' cruelty?", "back": "To establish security and move toward a regime that benefits the people."}, {"front": "True or False: Machiavelli endorses Agathocles as a moral model for new princes.", "back": "False; he explicitly states Agathocles cannot be called virtuous."}, {"front": "Why does resentment accumulate in a state where cruelty is 'badly-used'?", "back": "Because the violence is ongoing and the populace never has a chance to feel safe or benefit from stability."}, {"front": "What does the 'dirty hands' tradition suggest about ordinary moral philosophy?", "back": "That it is not equipped to resolve the unique moral dilemmas faced by political leaders."}, {"front": "How did Agathocles handle the Carthaginians who tried to unseat him?", "back": "He defeated them and forced them to come to terms."}, {"front": "In Machiavelli's framework, what is the result of a leader who is 'without faith' and 'without religion'?", "back": "They may gain power, but they forfeit the possibility of glory."}, {"front": "What does Machiavelli claim is the result of a prince who 'never reaches psychological safety'?", "back": "They are forced to keep a 'knife in hand' and can never rely on their subjects."}, {"front": "What was the relationship between Giovanni Fogliani and Oliverotto da Fermo?", "back": "Giovanni was the uncle who raised the orphaned Oliverotto."}, {"front": "What was the signal for the massacre at Oliverotto's banquet?", "back": "The signal occurred when Oliverotto retired to a secret room and his soldiers emerged."}, {"front": "Why is the timing of cruelty so essential for a new prince?", "back": "Because injuries should be done all at once so they are tasted less and offend less."}, {"front": "How does Machiavelli differentiate between a successful 'wicked' prince and a 'virtuous' prince?", "back": "The virtuous prince earns glory and admiration, while the wicked prince only achieves power through terror."}, {"front": "Why does Machiavelli provide the example of Oliverotto alongside Agathocles?", "back": "To show that the principles of political crime apply to contemporary times as well as antiquity."}, {"front": "Which specific trait allowed Cesare Borgia to eliminate Oliverotto?", "back": "His virt`u, specifically his ability to plan more than one step ahead."}, {"front": "What is the 'paradoxical implication' of Machiavelli's advice on violence?", "back": "Concentrated, heavy violence at the start is more effective than lighter, chronic violence."}, {"front": "According to Machiavelli, what allows 'normal life to resume' after a seizure of power?", "back": "Performing all necessary cruelties immediately and then shifting to benevolent acts."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
