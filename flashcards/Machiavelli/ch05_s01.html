<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What central historical puzzle does Machiavelli address regarding Alexander the Great's empire?", "back": "Why the Persian core remained obedient to its new rulers after Alexander's death despite the fracturing of his empire."}, {"front": "According to Machiavelli, what determines how difficult a state is to conquer and maintain?", "back": "The internal organization and structural form of the state."}, {"front": "What are the two contrasting models of government identified by Machiavelli?", "back": "The centralized (Turkish) model and the decentralized (French) model."}, {"front": "In Machiavelli's centralized model, who governs alongside the supreme ruler?", "back": "Appointed servants, officials, and ministers who owe their positions entirely to the ruler's favor."}, {"front": "What defines the role of a noble in a decentralized (\"French\") model of government?", "back": "They are hereditary lords with their own ancient rights, armed retainers, and local loyalties."}, {"front": "Why is a centralized state like the Ottoman Empire considered hard to conquer?", "back": "There are no independent nobles who can be bribed to betray the ruler or serve as a fifth column."}, {"front": "How does a centralized state typically respond to an external invasion?", "back": "It resists the invasion as a single, unified whole under the ruler's control."}, {"front": "What is the primary military requirement for conquering a centralized state?", "back": "The conqueror must defeat the ruler directly and completely in the field."}, {"front": "Why is a centralized state easy to hold once the ruler has been defeated?", "back": "The removal of the central authority leaves the population without natural leaders to organize resistance."}, {"front": "To whom does a conquered population in a centralized state transfer its obedience?", "back": "They transfer their obedience to the new master who successfully seized the center of power."}, {"front": "What historical event serves as Machiavelli's evidence for the stability of a conquered centralized state?", "back": "The lack of organized native resistance in Persia after the fall of Darius III and the rise of Alexander's successors."}, {"front": "Why is a decentralized kingdom like France relatively easy to invade?", "back": "A conqueror can often find a discontented baron willing to provide a beachhead through treachery."}, {"front": "What is the main challenge of holding a decentralized state after conquest?", "back": "The conqueror faces numerous independent centers of resistance led by local nobles who did not submit."}, {"front": "In a decentralized state, why does the defeat of the king not guarantee the submission of the population?", "back": "Local subjects maintain their primary loyalty to their specific lords rather than just the monarch."}, {"front": "During what years did Alexander the Great conquer the Persian Empire?", "back": "Between 334 and 323 BC."}, {"front": "Which Persian ruler did Alexander the Great defeat to claim the empire?", "back": "Darius III."}, {"front": "Name the two decisive battles where Alexander defeated the Persian forces.", "back": "The Battle of Issus (333 BC) and the Battle of Gaugamela (331 BC)."}, {"front": "How did Alexander the Great attempt to ease the transition of power for his Persian subjects?", "back": "He adopted Persian dress and local customs."}, {"front": "What practical lesson does Machiavelli draw for a conqueror facing a centralized state?", "back": "Expect the hardest initial resistance but a total submission once the ruler is defeated."}, {"front": "What practical lesson does Machiavelli draw for a conqueror facing a decentralized state?", "back": "Expect an easier initial entry followed by a grinding and potentially endless occupation."}, {"front": "In Machiavelli's time, who were the \"pashas\" in the Ottoman system?", "back": "Appointed administrators who could be dismissed or executed at the sultan's will."}, {"front": "How did the Ottoman sultan's power differ from the power of the French king?", "back": "The sultan had absolute control over his officials, while the French king dealt with semi-independent nobles."}, {"front": "Why did the Persian nobles who served Darius III submit to Alexander rather than revolting?", "back": "They lacked independent military followings and relied on the central machinery of the state."}, {"front": "The internal organization of the state determining its external vulnerability is a contribution to which field of thought?", "back": "Political thought and structural analysis."}, {"front": "What modern military concept has been analyzed using Machiavelli’s structural state theory?", "back": "Twentieth-century counterinsurgency campaigns."}, {"front": "Cloze: In a centralized state, power flows strictly from the _____.", "back": "Top down"}, {"front": "Cloze: A decentralized state is characterized by a tangle of _____ authorities.", "back": "Overlapping"}, {"front": "Cloze: Machiavelli uses the example of _____ as the contemporary equivalent of the centralized Persian model.", "back": "The Ottoman Empire (or \"the Turk\")"}, {"front": "Concept: The \"French\" model of government.", "back": "Definition: A decentralized system where power is distributed among hereditary nobles with independent local loyalties."}, {"front": "Concept: The \"Turkish\" model of government.", "back": "Definition: A centralized system where one supreme ruler governs through appointed officials who lack independent power bases."}, {"front": "What happens to the Persian administrative machinery after Alexander's conquest?", "back": "It continued to function effectively under the new Macedonian ruling class."}, {"front": "Why is there no \"fifth column\" to recruit in a centralized state?", "back": "There is no nobility with independent power that can be recruited to betray the master."}, {"front": "How do hereditary barons in France maintain their power against the king?", "back": "Through ancient rights, fortified castles, and their own armed retainers."}, {"front": "What was the immediate result of Alexander the Great's death in 323 BC?", "back": "The empire he built quickly fractured among his successors."}, {"front": "Why is the subject population of a centralized state described as \"accustomed to obedience\"?", "back": "They are habituated to following whoever holds control over the centralized administrative center."}, {"front": "Which factor prevents a conqueror from simply replacing a king in a decentralized state?", "back": "The existence of many other independent lords who can rally support for the old regime."}, {"front": "In a decentralized state, what determines the loyalty of the common people?", "back": "Local loyalty to their specific lord or baron rather than the central monarch."}, {"front": "What was the geographical extent of Alexander the Great's empire?", "back": "From Macedonia to India."}, {"front": "Why are \"shortcuts through treachery\" impossible in states like Machiavelli's Turkey?", "back": "The absolute dependence of all officials on the ruler ensures total unity against invaders."}, {"front": "In the decentralized model, what role does the Church or towns play in governance?", "back": "They represent additional layers of overlapping authority and ancient privilege that limit the king's power."}, {"front": "What happens to a centralized state's resistance once the ruling family is extinguished?", "back": "Resistance usually ends because there are no secondary leaders with the authority to command the people."}, {"front": "How does Machiavelli characterize the transition of the Persian core to Greek rule?", "back": "The civilization absorbed its new rulers and continued under new management."}, {"front": "Which historical conquest is contrasted with Alexander's conquest of Persia to illustrate structural differences?", "back": "The Roman conquest of Gaul."}, {"front": "What is the primary risk for a conqueror who wins a decentralized state through a baron's betrayal?", "back": "The same treachery used to enter can be used against the conqueror by other remaining nobles."}, {"front": "How did the Persian administrative structure respond to the change from Darius to Alexander?", "back": "It remained largely intact and continued to function under the new Macedonian rulers."}, {"front": "What term does Machiavelli use to describe the officials who owe everything to the Ottoman Sultan?", "back": "Appointed servants or ministers."}, {"front": "Why is a centralized state described as resisting as a \"unified whole\"?", "back": "Because the ruler's total control over officials prevents internal splintering during an invasion."}, {"front": "How do hereditary lords in the decentralized model treat the king's commands?", "back": "They can often override or ignore them because the king cannot easily interfere with their ancient rights."}, {"front": "What is the defining characteristic of power in the centralized model?", "back": "Power flows exclusively from the top down through non-hereditary, dependent officials."}, {"front": "Which ancient civilization's core did not reassert its independence after the Macedonian takeover?", "back": "The Persian Empire."}, {"front": "What makes the French nobles \"semi-independent\"?", "back": "Their possession of independent military followings and ancient rights that the king cannot easily seize."}, {"front": "What does Machiavelli suggest is the ultimate cause of the Persian Empire's stability under Alexander's successors?", "back": "Its centralized structure, which prevented the rise of independent native leaders for resistance."}, {"front": "Cloze: In the French model, the king rules through a layer of _____ nobles.", "back": "Hereditary"}, {"front": "Cloze: Alexander the Great defeated Darius III at the battle of _____ in 331 BC.", "back": "Gaugamela"}, {"front": "Why did the Macedonian successors face little organized native resistance in Persia?", "back": "The Persian nobility submitted because they lacked the independent power to lead a rebellion."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
