<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Instead of reading *The Prince* as a narrative, how does the text suggest a reader should approach it?", "back": "As an argument where every chapter advances a thesis."}, {"front": "What is the primary method Machiavelli uses to derive his political lessons?", "back": "Historical case study."}, {"front": "Machiavelli reasons from specific examples rather than from _____.", "back": "abstract principles"}, {"front": "Why does Machiavelli prioritize historical examples over philosophical theories?", "back": "He believes the lessons of history are more reliable than philosophical theories."}, {"front": "List two of the historical figures Machiavelli uses as case studies in *The Prince*.", "back": "Cesare Borgia and Ferdinand of Aragon."}, {"front": "According to the text, what two biblical or historical figures does Machiavelli use as examples besides Borgia and Ferdinand?", "back": "Moses and the Roman emperors."}, {"front": "What should a reader evaluate regarding Machiavelli's interpretation of historical cases?", "back": "Whether his reading of the case is accurate and fair."}, {"front": "When Machiavelli uses a single historical example to establish a general rule, what critical question should the reader ask?", "back": "Is a single case sufficient to establish a general rule?"}, {"front": "Unlike earlier political thinkers, Machiavelli almost never appeals to _____ or traditional morality.", "back": "justice"}, {"front": "To what divine entity does Machiavelli conspicuously avoid appealing in his political advice?", "back": "God"}, {"front": "What concept does Machiavelli omit in favor of grounded effectiveness, which earlier thinkers associated with natural law?", "back": "Natural law"}, {"front": "In contrast to earlier thinkers who grounded advice in ethics and theology, Machiavelli grounds his in _____.", "back": "effectiveness"}, {"front": "What does Machiavelli's silence on traditional morality indicate about his project's focus?", "back": "A focus on practical results rather than ethical ideals."}, {"front": "The text suggests reading *The Prince* not as a collection of answers, but as a set of _____.", "back": "provocations"}, {"front": "When Machiavelli claims it is better to be feared than loved, what should a reader compare this against?", "back": "Their own knowledge of effective leadership."}, {"front": "What does Machiavelli argue regarding the success of an 'unarmed prophet'?", "back": "He argues that an unarmed prophet fails."}, {"front": "According to Machiavelli, what type of 'prophet' is likely to succeed?", "back": "An armed prophet."}, {"front": "How does Machiavelli feel about readers who 'push back' and argue with his claims?", "back": "He respects them."}, {"front": "What specific quality did Machiavelli assume his readers possessed when he wrote *The Prince*?", "back": "Intelligence (enough to think hard about difficult things)."}, {"front": "For what type of reader did Machiavelli specifically write his work?", "back": "People who are serious about understanding how power works."}, {"front": "Which translation of *The Prince* is noted for using clear Edwardian English?", "back": "The 1908 translation by W. K. Marriott."}, {"front": "How does the text describe the accuracy and readability of the Marriott translation?", "back": "It is accurate and readable, though not word-for-word literal."}, {"front": "What feature of the Marriott edition is provided to explain archaic terms or historical references?", "back": "Footnotes."}, {"front": "In which specific library collection was the standard 1908 English edition of *The Prince* published?", "back": "Everyman's Library."}, {"front": "What critical thinking task should a reader perform when encountering Machiavelli's historical evidence?", "back": "Determine if the evidence actually supports the claim."}, {"front": "Machiavelli’s method is deliberate because he values the _____ of history over theory.", "back": "lessons"}, {"front": "Term: Historical Case Study", "back": "Definition: Machiavelli's primary method of reasoning using specific examples to derive political rules."}, {"front": "Concept: Machiavelli's Silence", "back": "Definition: The deliberate omission of appeals to God, justice, or ethics in political discourse."}, {"front": "Concept: Thesis-driven Reading", "back": "Definition: Identifying the specific claim and supporting evidence within each chapter of *The Prince*."}, {"front": "How should a reader respond to Machiavelli’s claim about 'unarmed prophets' to practice critical thinking?", "back": "By trying to think of counterexamples."}, {"front": "What is the primary requirement the text places on the reader's level of attention?", "back": "Full attention and best critical thinking."}, {"front": "What does the text suggest a reader ask when Machiavelli uses a historical example?", "back": "Is the reading of the historical case accurate?"}, {"front": "Earlier political thinkers grounded their work in ethics; Machiavelli’s work is grounded in _____.", "back": "effectiveness"}, {"front": "W. K. Marriott's translation is described as using clear _____ English.", "back": "Edwardian"}, {"front": "What was the purpose of Machiavelli's provocations in *The Prince*?", "back": "To encourage the reader to argue and think critically about power."}, {"front": "Every chapter of *The Prince* advances a _____, which the reader should identify.", "back": "thesis"}, {"front": "What did earlier political thinkers typically ground their advice in that Machiavelli did not?", "back": "Ethics and theology."}, {"front": "What should a reader investigate regarding the 'fairness' of Machiavelli's historical evidence?", "back": "Whether he is presenting the historical case in a fair manner."}, {"front": "What is the date of the W. K. Marriott translation mentioned in the text?", "back": "1908."}, {"front": "What does the text mean by saying *The Prince* rewards 'active' reading?", "back": "The reader should ask questions and engage critically with the arguments."}, {"front": "Machiavelli's silences on God and justice are described as _____ and significant.", "back": "deliberate"}, {"front": "Is *The Prince* described as a long, dense volume or a short work?", "back": "A short work."}, {"front": "What is the relationship between Machiavelli's thesis and his evidence in each chapter?", "back": "He makes claims (theses) and backs them up with evidence (historical cases)."}, {"front": "To understand Machiavelli’s project, what must a reader analyze regarding his 'silence'?", "back": "What the silence tells us and what it leaves out."}, {"front": "According to the text, why did Machiavelli assume his readers could 'think hard about difficult things'?", "back": "Because he viewed them as intelligent and serious about power."}, {"front": "What should a reader do when Machiavelli’s provocations conflict with their own knowledge of leadership?", "back": "Engage in an internal argument or push back against the claim."}, {"front": "Which historical case involves an example of an 'armed prophet' succeeding?", "back": "Moses."}, {"front": "How does the text characterize the English used in the Marriott translation?", "back": "Clear and accessible to modern readers."}, {"front": "What is the main goal of the strategies provided in 'How to Read The Prince'?", "back": "To help the reader get the most out of the text through active reading."}, {"front": "Machiavelli respects readers who _____.", "back": "push back"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
