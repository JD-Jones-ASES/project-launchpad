<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 27, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Machiavelli's writing voice change from the first 25 chapters of *The Prince* to Chapter XXVI?", "back": "The first 25 chapters feature a detached, analytical, cool, and unsentimental voice. Chapter XXVI shifts to an emotional, passionate appeal, transforming from analysis to prophecy."}, {"front": "What is the underlying reason for Machiavelli's significant tone shift in the final chapter of *The Prince*?", "back": "The shift reveals Machiavelli's deep desire for Italy's liberation, transforming the book from a detached political analysis into a passionate plea for national unity and independence."}, {"front": "According to Machiavelli in Chapter XXVI, why is 1513 a 'propitious' moment for a new prince to emerge and liberate Italy?", "back": "Italy's extreme suffering and desolation have stripped away complacency, making the people genuinely hungry for a leader who can provide order, unity, and independence."}, {"front": "How do the examples of Moses, Cyrus, and Romulus (Theseus) relate to Machiavelli's argument about Italy's opportunity for liberation?", "back": "Machiavelli argues these great founders succeeded because they encountered people whose suffering (slavery, subjection, abandonment) had prepared them for liberation, analogous to Italy's current state."}, {"front": "Describe Machiavelli's heartbreaking depiction of Italy's condition in 1513, as quoted in Chapter XXVI.", "back": "Italy was 'more enslaved than the Hebrews, more oppressed than the Persians, more scattered than the Athenians; without head, without order, beaten, despoiled, torn, overrun; and she has endured every kind of desolation.'"}, {"front": "What does the final chapter reveal about *The Prince*'s deepest level of purpose, beyond being a 'handbook for tyrants'?", "back": "It reveals *The Prince* as a plea for Italian national liberation, an attempt to offer 'medicine for a sick state' in hopes of a prince with the *virtù* to unite it."}, {"front": "Provide examples of Machiavelli's advice from earlier chapters that, in light of Chapter XXVI, is ultimately directed toward Italian liberation.", "back": "Advice such as 'build your own army,' 'win popular support,' 'avoid being hated or despised,' 'act boldly,' and 'prepare for fortune's reversals' are all meant to equip an Italian prince to unite the peninsula and expel foreigners."}, {"front": "Who did Machiavelli hope would embody the *virtù* necessary to liberate Italy using his advice?", "back": "He hoped the Medici family, if they proved capable, would be Italy's liberator."}, {"front": "How does Machiavelli's use of Moses in Chapter XXVI differ from his earlier citations of Moses in *The Prince*?", "back": "Earlier, Moses was cited as an 'armed prophet,' a strategic model. In Chapter XXVI, Moses is invoked as a type, a figure whose story mirrors Italy's situation, symbolizing a liberator leading his people out of bondage."}, {"front": "What rare literary element does Machiavelli introduce in Chapter XXVI, contrasting with the rest of *The Prince*?", "back": "He incorporates genuinely elevated, even poetic, language, culminating in a quote from Petrarch's patriotic poem calling for Italy's liberation."}, {"front": "How does Chapter XXVI challenge the common 'cynical reading' of *The Prince* as a guide for amoral power politics?", "back": "The chapter's intense emotional appeal and passionate plea for liberation contradict the idea of Machiavelli as a detached analyst with no moral or political stakes, showing he cares deeply about Italy's fate."}, {"front": "If Machiavelli's advice includes cruelty and deception, how does Chapter XXVI explain the ultimate purpose of this ruthlessness?", "back": "The ruthlessness is not for tyranny's sake but is in service of creating the political conditions necessary for Italy to be free and united, as 'the ruthlessness is in the service of the liberation.'"}, {"front": "What classic problem in political philosophy does *The Prince*, particularly with Chapter XXVI, illustrate regarding means and ends?", "back": "It illustrates the 'dirty hands' problem: whether a noble goal (like national liberation) can justify or help explain the use of morally questionable or ruthless means."}, {"front": "Did Machiavelli's project for Italian liberation succeed in his lifetime or immediately after *The Prince* was written?", "back": "No, his advice was not taken by the Medici, and Italy remained divided and largely under foreign domination for over three centuries until national unification in 1861."}, {"front": "Why is understanding Chapter XXVI considered essential for a complete understanding of *The Prince*?", "back": "It reveals that all Machiavelli's earlier arguments (military, princely qualities, fortune) were directed toward the specific goal of Italian liberation, thereby reframing the moral assessment of his controversial advice."}, {"front": "What transformation does Machiavelli undergo in Chapter XXVI regarding his role as a writer?", "back": "He transitions from a 'detached analyst' of political reality to a prophetic voice, making a passionate 'appeal' as a man desperate for his country's liberation."}, {"front": "What specific historical event does Machiavelli refer to when he mentions foreigners devastating Italy since 1494?", "back": "This refers to the series of Italian Wars, which began in 1494 with the French invasion, leading to widespread foreign intervention and control over Italian states."}, {"front": "How does the concept of *virtù* become particularly crucial in Chapter XXVI?", "back": "*Virtù* is presented as the essential quality a prince must possess to have the strength, skill, and determination to take Machiavelli's 'medicine' and liberate Italy from its suffering."}, {"front": "Why does Machiavelli believe the Italian people are ready to follow a liberator in 1513?", "back": "Their prolonged suffering and desolation have 'stripped away complacency and created genuine hunger for someone who can provide order, unity, and independence.'"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
