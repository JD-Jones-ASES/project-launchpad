<html lang="en">
<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Machiavelli's term for territories annexed by a prince that possess different languages and customs?", "back": "Mixed principalities."}, {"front": "According to Machiavelli, why do subjects willingly change their ruler?", "back": "They expect to better their own condition under a new master."}, {"front": "What is the primary cause of disappointment for subjects after a conquest?", "back": "The new ruler inevitably imposes burdens like taxes, garrisons, and new laws."}, {"front": "What does Machiavelli identify as the most effective strategy for holding a mixed principality?", "back": "Establishing colonies of the prince's own people in the new territory."}, {"front": "Why is colonization considered a financially 'cheap' strategy for a prince?", "back": "It only requires compensating the small number of people displaced to make room for colonists."}, {"front": "Why are colonists typically loyal to the prince in a new territory?", "back": "They have a personal stake in the prince's continued success and protection."}, {"front": "How does colonization affect potential rebels in an annexed territory?", "back": "They are scattered among the prince's partisans and become demoralized."}, {"front": "What is the primary disadvantage of using a standing army to garrison a new territory?", "back": "It is far more expensive and generates significant resentment among the local population."}, {"front": "Regarding local power dynamics, what should a prince do with weaker local parties?", "back": "The prince should protect and support them to gain loyal allies."}, {"front": "Regarding local power dynamics, what should a prince do with strong local interests?", "back": "The prince should seek to weaken or destroy them to eliminate potential rivals."}, {"front": "Why is a weak local lord considered a valuable ally to a new prince?", "back": "They depend entirely on the prince's protection for their own survival."}, {"front": "The Romans believed that war is not avoided but only _____ to one's own disadvantage.", "back": "postponed"}, {"front": "According to Machiavelli's observation of the Romans, how should a ruler respond to future troubles?", "back": "The ruler should anticipate problems and respond to them immediately before they develop."}, {"front": "What characterized the beginning of the Italian Wars in 1494?", "back": "The invasion of Italy by Charles VIII of France."}, {"front": "Who was the Spanish ruler who emerged dominant at the conclusion of the Italian Wars?", "back": "Ferdinand of Aragon."}, {"front": "Which French king is used by Machiavelli as the primary example of failed strategic policy in Italy?", "back": "Louis XII."}, {"front": "What years did Louis XII serve as the King of France?", "back": "1498–1515."}, {"front": "In what year did Louis XII conquer Milan?", "back": "1499."}, {"front": "How did Louis XII's treatment of smaller Italian states contribute to his failure?", "back": "He destroyed the smaller powers that had initially welcomed him as allies."}, {"front": "Which institution did Louis XII strengthen in Italy, creating a major rival for himself?", "back": "The Papacy."}, {"front": "Which two Popes became dominant temporal powers during the period of French control in Italy?", "back": "Alexander VI and Julius II."}, {"front": "How did Louis XII's policy toward Spain in Naples undermine his own power?", "back": "He invited a powerful competitor into the peninsula who became impossible to remove."}, {"front": "Why is it an error for a prince to govern a distant territory without moving there personally?", "back": "The prince cannot respond to problems quickly or prevent the abuses of local governors."}, {"front": "What was Louis XII's administrative error regarding the stabilization of his Italian territories?", "back": "He failed to establish colonies to create a local base of loyalty."}, {"front": "What is the concept of a distribution of strength among states so no single one dominates?", "back": "The balance of power."}, {"front": "According to Machiavelli, what is the natural tendency of powerful states?", "back": "They tend to expand until they are stopped by an opposing force."}, {"front": "Why was the failure of Italian states to unite against invaders considered a lesson by Machiavelli?", "back": "Their internal divisions allowed foreign powers to destroy them."}, {"front": "In the context of statecraft, what does it mean for governance to be 'anticipatory'?", "back": "Identifying and solving potential crises before they fully develop."}, {"front": "Why did the subjects of newly conquered territories eventually turn against their 'liberators'?", "back": "They discovered that the burdens of the new rule were equal to or worse than the old."}, {"front": "Term: Mixed Principality", "back": "Definition: A territory added to an existing state whose people have different languages, customs, and loyalties."}, {"front": "Why does Machiavelli argue that every political relationship is potentially a competition?", "back": "Strong local powers will always seek to challenge the prince given the opportunity."}, {"front": "What is the primary reason the American occupation of Iraq is used as a parallel to Chapter III?", "back": "It involves the failure to establish stable local governance and the introduction of allies with competing agendas."}, {"front": "What is the moral distinction made in teaching Machiavelli's advice on colonization?", "back": "The difference between describing an effective political strategy and endorsing it as a moral good."}, {"front": "According to Machiavelli, what is the consequence of waiting until a crisis is fully developed to respond?", "back": "The prince loses most of his effective options for resolving the problem."}, {"front": "Why was the presence of Spanish troops in Naples particularly damaging to Louis XII?", "back": "It introduced a rival with comparable power that could not be easily expelled from Italy."}, {"front": "What was the broader historical result of Louis XII violating Machiavelli's strategic principles?", "back": "The eventual loss of all French territorial gains in Italy."}, {"front": "Which specific Italian city-state is mentioned as a smaller power Louis XII should have protected?", "back": "Florence."}, {"front": "How does the presence of a prince in a new territory prevent local administrative abuse?", "back": "It allows for direct oversight and more rapid intervention when governors mistreat subjects."}, {"front": "Machiavelli notes that colonization is 'demoralizing' to rebels because they are _____ among the prince's partisans.", "back": "scattered"}, {"front": "The Italian Wars were a conflict primarily between France, Spain, the Holy Roman Empire, and _____.", "back": "Italian city-states"}, {"front": "Why did smaller Italian lords initially welcome French intervention?", "back": "They sought protection against their larger, more powerful neighbors."}, {"front": "What was the date range of the Italian Wars?", "back": "1494–1559."}, {"front": "In Machiavelli's view, a strong local lord with his own power base is a rival waiting to become an _____.", "back": "enemy"}, {"front": "What is the main logistical reason a distant prince cannot hold a territory effectively?", "back": "He cannot build the necessary local relationships to maintain loyalty."}, {"front": "What is the primary reason colonization is more 'effective' than military garrisoning?", "back": "Colonists provide a permanent, loyal presence without the massive ongoing costs of an army."}, {"front": "Which French King's invasion originally destroyed the balanced system of Italian politics?", "back": "Charles VIII."}, {"front": "In the dissection of Louis XII's errors, how many specific mistakes does Machiavelli identify?", "back": "Five."}, {"front": "What was the result of Louis XII allowing the Papacy to expand its temporal authority?", "back": "He inadvertently created a powerful Italian rival to French influence."}, {"front": "What does Machiavelli call the inherent difficulty of ruling people who did not choose their prince?", "back": "The problem of mixed rule."}, {"front": "According to Machiavelli, why is war never actually avoided?", "back": "It is only postponed to the disadvantage of the party that waits."}, {"front": "What is the consequence of a prince failing to weaken the strong in a new territory?", "back": "The strong parties will eventually lead the resistance against the prince."}, {"front": "Which major Italian territory did Louis XII hold for over a decade before losing it?", "back": "Milan."}, {"front": "How does Machiavelli describe the expense of colonization relative to garrisoning?", "back": "He states colonies cost very little and can be maintained at small expense."}, {"front": "What was the primary goal of the French claims in Italy pursued by Louis XII?", "back": "Control over Milan and Naples."}, {"front": "What is the central 'natural' political condition described in the 'Deeper Lesson' of the text?", "back": "The balance of power."}, {"front": "Which power base did Louis XII invite into Naples?", "back": "Spain."}, {"front": "Subjects change rulers expecting to better themselves but find themselves burdened by _____.", "back": "new taxes"}, {"front": "What does Machiavelli suggest is the impact of colonization on potential rebels' property?", "back": "It involves minimal disruption as only a small number are displaced to provide land."}, {"front": "Why did Italian observers like Machiavelli view the Italian Wars as a 'catastrophe'?", "back": "The wars resulted in the destruction of the Italian states due to their lack of unity."}, {"front": "How did Louis XII violate the principle of the balance of power?", "back": "He strengthened rivals like the Papacy and Spain while destroying potential small-state allies."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
