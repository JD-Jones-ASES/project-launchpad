<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 12, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, which form of state serves as the exception to the rules governing all other principalities?", "back": "Ecclesiastical principalities"}, {"front": "In what two ways does Machiavelli grant that ecclesiastical principalities may be originally acquired?", "back": "By ability or by fortune"}, {"front": "What specific force maintains ecclesiastical principalities regardless of the prince's ability or fortune?", "back": "The ancient ordinances of religion"}, {"front": "How does the behavior of a prince affect his hold on an ecclesiastical principality?", "back": "The state is held regardless of how the prince behaves or lives."}, {"front": "What is the primary characteristic of the religious ordinances that sustain ecclesiastical states?", "back": "They are all-powerful."}, {"front": "Why does Machiavelli claim he will not analyze ecclesiastical principalities in depth?", "back": "He argues it would be presumptuous to discuss states upheld by God."}, {"front": "What tone does Machiavelli use when he claims ecclesiastical states are 'exalted and maintained by God'?", "back": "An ironic tone"}, {"front": "Which two popes are credited by Machiavelli with significantly increasing the papacy's political power?", "back": "Alexander VI and Julius II"}, {"front": "Whom did Pope Alexander VI use as his primary instrument to consolidate the Papal States?", "back": "Cesare Borgia"}, {"front": "Through what three specific methods did Cesare Borgia expand the Papal States?", "back": "Force, cunning, and outright treachery"}, {"front": "What transition did the Papal States undergo due to the actions of Cesare Borgia?", "back": "They moved from loosely controlled territories to a unified, well-defended state."}, {"front": "How did Pope Julius II change the territorial holdings he inherited from Alexander VI?", "back": "He enlarged them further."}, {"front": "Against which major powers did Pope Julius II lead military campaigns?", "back": "Venice and France"}, {"front": "What was an 'astonishing sight' regarding Pope Julius II's leadership in 1511?", "back": "The elderly pope in armor personally directing artillery fire."}, {"front": "At which specific siege did Pope Julius II personally command troops in 1511?", "back": "The siege of Mirandola"}, {"front": "What was the birth name of Pope Julius II?", "back": "Giuliano della Rovere"}, {"front": "For what reason is Julius II known to history as the 'Warrior Pope'?", "back": "His personal leadership of military campaigns to expand the Papal States"}, {"front": "What is the Italian phrase for Julius II's nickname, the 'Warrior Pope'?", "back": "il Papa Terribile"}, {"front": "Which Renaissance artist did Julius II commission to paint the Sistine Chapel ceiling?", "back": "Michelangelo"}, {"front": "Which famous religious structure did Julius II commission Michelangelo to design?", "back": "St. Peter's Basilica"}, {"front": "According to Machiavelli's analysis in Chapter XXV, what quality of Julius II matched the demands of his time?", "back": "His impetuosity"}, {"front": "What did Julius II's military campaigns prove about the Church's capabilities?", "back": "The Church could project real political and military power."}, {"front": "How does Machiavelli define religion within his political analysis?", "back": "A source of legitimacy and authority that operates by its own logic"}, {"front": "Why is the obedience of subjects in a religious state considered 'non-conditional'?", "back": "It is rooted in reverence for the institution rather than the prince's performance."}, {"front": "What makes the legitimacy of an ecclesiastical prince 'enviable' to a secular ruler?", "back": "The prince does not need to be just, competent, or even present to maintain power."}, {"front": "What is the primary objective of Machiavelli’s analysis of ecclesiastical states?", "back": "To observe how religious authority creates political legitimacy."}, {"front": "Which modern political science term describes the use of religious symbolism to legitimize a state?", "back": "Civil religion"}, {"front": "What term did later thinkers use to describe the religious legitimacy that protects a state, similar to Machiavelli’s observations?", "back": "The sacred canopy"}, {"front": "How does Machiavelli treat the genuineness of religious belief in his analysis?", "back": "He does not deny that religious belief is genuine."}, {"front": "In Machiavelli's view, how does religious authority differ from military force as a source of power?", "back": "It creates a form of legitimacy distinct from anything military force can achieve."}, {"front": "Which pope succeeded in driving the French temporarily from the Italian peninsula?", "back": "Julius II"}, {"front": "What was the status of the Papal States before Alexander VI and Cesare Borgia's intervention?", "back": "They were a collection of loosely controlled territories."}, {"front": "Why does Machiavelli provide 'no tips' for ruling as the Vicar of Christ?", "back": "Such legitimacy is beyond the scope of his usual political advice."}, {"front": "Which chapter of *The Prince* returns to the connection between religion and political power?", "back": "Chapter 28"}, {"front": "What distinguishes the maintenance of an ecclesiastical principality from a civil one?", "back": "Ecclesiastical states are maintained by religious tradition rather than the prince's actions."}, {"front": "What was Julius II's relationship with Cesare Borgia?", "back": "He expelled Borgia from Italy."}, {"front": "What was the chronological duration of Julius II's papacy?", "back": "1503 to 1513"}, {"front": "What role did artillery play in the military history of Julius II?", "back": "The pope personally directed its fire during the siege of Mirandola."}, {"front": "According to the text, why is Machiavelli's reticence to analyze the Church considered 'commentary'?", "back": "It highlights his awareness that the Church operates outside standard political rules."}, {"front": "What does Machiavelli argue the Church used when 'legitimate governance' failed to unify territories?", "back": "Political violence"}, {"front": "How did the acquisition of ecclesiastical principalities follow 'normal' patterns initially?", "back": "They were acquired through either ability (virtù) or fortune."}, {"front": "What is the primary difference between a secular prince's legitimacy and a pope's legitimacy?", "back": "Secular legitimacy depends on performance; papal legitimacy depends on institutional reverence."}, {"front": "In what specific way did Julius II inherit the work of Alexander VI?", "back": "He inherited the territorial gains and consolidation achieved by Alexander and Borgia."}, {"front": "Why is Machiavelli’s treatment of the Church described as 'political analysis' rather than 'anti-religious polemic'?", "back": "He focuses on religion as a political phenomenon and source of power."}, {"front": "What did the papacy transform into during the Renaissance under Julius II?", "back": "A major military-political power"}, {"front": "What phrase does Machiavelli use to justify his refusal to analyze God's role in the state?", "back": "He calls it the act of a 'presumptuous and rash man.'"}, {"front": "Which pope is characterized by Machiavelli as having 'impetuosity' that matched his historical moment?", "back": "Julius II"}, {"front": "According to Machiavelli, what is the 'logic' behind the people's obedience to religious princes?", "back": "Reverence for the institution the prince represents."}, {"front": "What was the primary goal of Cesare Borgia's treachery according to the text?", "back": "To expand and consolidate the Papal States."}, {"front": "In the context of the Papal States, what replaced 'legitimate governance' as a means of unification?", "back": "Political violence"}, {"front": "How did Julius II's age affect his military participation?", "back": "Despite being elderly, he personally led armies into the field."}, {"front": "Which figure served as Machiavelli's model prince in Chapter VII and aided the papacy?", "back": "Cesare Borgia"}, {"front": "How does Machiavelli categorize states that are neither hereditary, mixed, new, nor civil?", "back": "Ecclesiastical principalities"}, {"front": "The Papal States would hold even if a pope were incompetent because of ____.", "back": "Ancient ordinances of religion"}, {"front": "What does Machiavelli imply by saying a religious prince does not need to be 'present' in his state?", "back": "The institution's authority is self-sustaining without the ruler's active management."}, {"front": "What was the result of Julius II moving against Venice and France?", "back": "He defended and enlarged papal territory."}, {"front": "What irony is found in Machiavelli's claim that ecclesiastical states are 'maintained by God'?", "back": "He immediately follows this claim with a detailed analysis of their human political history."}, {"front": "What source of allegiance does a religious ruler utilize that secular rulers often lack?", "back": "Popular reverence for religious authority."}, {"front": "What did Julius II prove regarding the 'spiritual authority' of the Church?", "back": "It could be translated into real military and political power."}, {"front": "How does Machiavelli view the connection between religion and political legitimacy?", "back": "He views it as a distinct and powerful form of political authority."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
