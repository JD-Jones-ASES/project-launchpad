<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 12, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What distinguishes ecclesiastical principalities from other types Machiavelli discusses?", "back": "They are unique because they are sustained by the ancient ordinances of religion, requiring neither capacity nor good fortune to be held once acquired."}, {"front": "According to Machiavelli, how do ecclesiastical princes manage their states and subjects?", "back": "They have states but do not defend them, and subjects but do not rule them."}, {"front": "What is the primary outcome for ecclesiastical principalities, despite their lack of defense or direct rule?", "back": "They are secure and happy, as states are not taken from them, and subjects have neither the desire nor the ability to alienate themselves."}, {"front": "Why does Machiavelli state he will speak no more of ecclesiastical principalities after his initial description?", "back": "He claims they are upheld by divine power, which the human mind cannot reach, and it would be presumptuous to discuss them further (a rhetorical maneuver)."}, {"front": "What paradoxical shift in the Church's temporal power does Machiavelli highlight?", "back": "Previously, Italian potentates valued the Church's temporal power very little, but now a King of France trembles before it, and it can drive him from Italy."}, {"front": "Name the five principal potentates in Italy before the French King Charles VIII's entry.", "back": "The Pope, the Venetians, the King of Naples, the Duke of Milan, and the Florentines."}, {"front": "What were the two main anxieties of the Italian potentates before French intervention?", "back": "1) That no foreigner should enter Italy under arms. 2) That none of themselves should seize more territory."}, {"front": "What local force contributed to keeping the pontificate weak and powerless before Alexander VI?", "back": "The Roman barons, divided into the Orsini and Colonnesi factions, who provided a constant pretext for disorder."}, {"front": "Why was the short average life of a pope a cause of weakness for the pontificate?", "back": "In an average of ten years, a pope could barely suppress one faction, and a new pope would often face a resurgent opposing faction, making it difficult to establish lasting control."}, {"front": "How did Pope Alexander VI demonstrate that a pope could prevail in temporal power?", "back": "He showed how a pope with both money and arms could be effective, largely through the actions of his son, Duke Valentino (Cesare Borgia), and the entry of the French."}, {"front": "What was Alexander VI's primary intention, and what was the unintended consequence for the Church?", "back": "His primary intention was to aggrandize his son, Duke Valentino, but his actions inadvertently contributed to the Church's greatness, as it became the heir to his labors after his death and the duke's ruin."}, {"front": "What was the condition of the Church when Pope Julius II succeeded Alexander VI?", "back": "It was strong, possessing all the Romagna, with the Roman barons reduced to impotence, the factions wiped out, and new ways to accumulate money."}, {"front": "Name some of Pope Julius II's key enterprises to strengthen the Church.", "back": "To gain Bologna, to ruin the Venetians, and to drive the French out of Italy."}, {"front": "How did Julius II's motivation differ from Alexander VI's regarding strengthening the Church?", "back": "Julius II did everything to strengthen the Church itself, not for any private person, unlike Alexander VI, whose actions primarily benefited his son."}, {"front": "How did Pope Julius II manage to keep the Orsini and Colonnesi factions in check? (Two methods)", "back": "1) He terrified them with the greatness of the Church. 2) He did not allow them to have their own cardinals."}, {"front": "Why did Julius II prevent factions from having their own cardinals?", "back": "Cardinals foster factions in and out of Rome, compelling barons to support them, thus creating disorder and tumults from prelates' ambitions."}, {"front": "What legacy did Alexander VI and Julius II leave for Pope Leo X?", "back": "Pope Leo X found the pontificate 'most powerful' due to their efforts in strengthening the Church through arms, money, and control over factions."}, {"front": "What made Julius II's enterprises particularly creditable, according to Machiavelli?", "back": "His enterprises prospered greatly, and this was especially to his credit because he did everything to strengthen the Church itself, rather than a private individual."}, {"front": "How did the power of the Church in Italy change from 'Alexander backwards' to the time of Julius II/Leo X?", "back": "It transformed from being little esteemed by Italian potentates and weak due to internal factions, to being a formidable temporal power capable of influencing major European powers and controlling its own territories."}, {"front": "What lesson might a secular prince learn from the unique stability of ecclesiastical principalities?", "back": "While the source of their stability (religion/divine power) is inimitable, a prince might observe the importance of deeply ingrained societal norms, beliefs, or institutions that can bind subjects without direct force."}, {"front": "What was a direct cause of the Roman barons having a 'pretext for disorder'?", "back": "Their division into the Orsini and Colonnesi factions."}, {"front": "What are 'ancient ordinances of religion' in the context of ecclesiastical principalities?", "back": "The fundamental, long-standing religious laws, traditions, and beliefs that provide the ultimate and unshakeable foundation for the Church's power and stability."}, {"front": "Before French entry, which two Italian potentates caused the most anxiety for the others due to their potential for expansion?", "back": "The Pope and the Venetians."}, {"front": "Besides factions and short lifespans, what other factor kept the Papacy weak before Alexander VI?", "back": "The general disunity and competing anxieties among the major Italian potentates, who actively sought to restrain both the Pope and the Venetians."}, {"front": "What hope did Machiavelli express regarding Pope Leo X's potential contribution to the pontificate?", "back": "That if others (like Alexander VI and Julius II) made it great in arms, Leo X would make it still greater and more venerated by his goodness and infinite other virtues."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
