        .fc-container {

    <script>
    var CARDS = [{"front": "In what year and city was Niccolò Machiavelli born?", "back": "1469 in Florence."}, {"front": "Who was the de facto ruler of Florence during Machiavelli's youth, known as \"the Magnificent\"?", "back": "Lorenzo de' Medici."}, {"front": "Which banking empire provided the wealth that fueled Florence's cultural height under Lorenzo de' Medici?", "back": "The Medici banking empire."}, {"front": "Name three classical historians whose works shaped Machiavelli's political vision through his early education.", "back": "Livy, Thucydides, and Polybius."}, {"front": "What major event in 1492 signaled the end of stability for the city of Florence?", "back": "The death of Lorenzo the Magnificent."}, {"front": "Which French king invaded Italy in 1494, leading to the flight of the Medici family?", "back": "Charles VIII."}, {"front": "Who was the Dominican friar that ruled Florence from 1494 to 1498 and preached against worldliness?", "back": "Girolamo Savonarola."}, {"front": "What was the primary reason Girolamo Savonarola failed to maintain his authority in Florence?", "back": "He lacked military force to back his authority."}, {"front": "What \"cautionary tale\" did Machiavelli internalize from Girolamo Savonarola's execution?", "back": "Enthusiasm and moral authority are no substitute for organized force."}, {"front": "In 1498, Machiavelli was appointed Secretary to which Florentine governing body?", "back": "The Second Chancery."}, {"front": "What were the two primary areas of responsibility for the committee known as the \"Ten of Liberty and Peace\"?", "back": "Military affairs and foreign policy."}, {"front": "How many years did Machiavelli serve at the center of Florentine political life as a civil servant?", "back": "Fourteen years (1498–1512)."}, {"front": "What did Machiavelli primarily observe during his missions to the court of King Louis XII in France?", "back": "How a powerful monarchy operated."}, {"front": "Who was the ruthless \"Duke Valentino\" that Machiavelli observed carved out a principality in central Italy?", "back": "Cesare Borgia."}, {"front": "Machiavelli noted that Cesare Borgia attempted to gain power through a combination of military skill, calculated cruelty, and _____.", "back": "Masterful deception."}, {"front": "Which Pope was known as the \"Warrior Pope\" for personally leading armies in the field?", "back": "Pope Julius II."}, {"front": "What was Machiavelli's assessment of Emperor Maximilian's leadership style?", "back": "He was an irresolute ruler unable to follow through on decisions."}, {"front": "What unique advantage did Machiavelli's diplomatic missions give him over other political philosophers of his time?", "back": "Direct, sustained observation of real political actors under real conditions."}, {"front": "Which foreign army supported the Medici's return to power in Florence in 1512?", "back": "A Spanish army."}, {"front": "Why was Machiavelli arrested and tortured in early 1513 following the Medici return?", "back": "He was implicated in a conspiracy against the Medici family."}, {"front": "What specific torture method was used on Machiavelli during his imprisonment in 1513?", "back": "The rack."}, {"front": "To which village did Machiavelli retreat after being barred from government office and forbidden from leaving Florentine territory?", "back": "Sant'Andrea in Percussina."}, {"front": "In his letter to Francesco Vettori, what did Machiavelli describe doing every evening before entering his study?", "back": "Putting on his court clothes to commune with ancient authors."}, {"front": "In what year was the short treatise *The Prince* written?", "back": "1513."}, {"front": "What is the title of Machiavelli's longest and most sustained work of political analysis?", "back": "Discourses on the First Ten Books of Titus Livy."}, {"front": "Which 1521 work by Machiavelli focused on the organization of military forces?", "back": "The Art of War."}, {"front": "What is the name of the comedy play written by Machiavelli during his literary years?", "back": "La Mandragola."}, {"front": "Machiavelli died in June 1527, only weeks after which family was expelled from Florence?", "back": "The Medici family."}, {"front": "Where is Niccolò Machiavelli buried?", "back": "Santa Croce (Florence)."}, {"front": "Translate the Latin inscription on Machiavelli's tomb: *Tanto nomini nullum par elogium*.", "back": "No praise can be adequate to so great a name."}, {"front": "Savonarola's rule is famously associated with the \"bonfires of the _____\", during which books and art were destroyed.", "back": "Vanities."}, {"front": "What was the profession of Machiavelli's father?", "back": "A lawyer of modest means."}, {"front": "Which event in 1512 directly caused the collapse of the Florentine republic?", "back": "The defeat of Florentine forces by a Spanish army supported by Pope Julius II."}, {"front": "In what year was Machiavelli's *The Prince* published posthumously?", "back": "1532."}, {"front": "What was the title of the commissioned history Machiavelli wrote in 1525?", "back": "Florentine Histories."}, {"front": "True or False: Machiavelli was an elected official in the Florentine government from 1498 to 1512.", "back": "False (he was a civil servant/operational staff officer)."}, {"front": "According to Machiavelli, why did Pope Julius II succeed in bullying the great powers of Europe?", "back": "Sheer audacity."}, {"front": "At what age was Machiavelli when his political career abruptly ended in 1512?", "back": "43 years old."}, {"front": "Machiavelli observed King Louis XII making the very \"mistakes\" he would later analyze in which famous book?", "back": "The Prince."}, {"front": "To whom did Machiavelli write a famous 1513 letter describing his daily life in exile?", "back": "Francesco Vettori."}, {"front": "Approximately how many miles south of Florence was Machiavelli's farm at Sant'Andrea in Percussina located?", "back": "Eight miles."}, {"front": "Lorenzo de' Medici used a combination of personal diplomacy, cultural patronage, and _____ politics to hold alliances together.", "back": "Shrewd."}, {"front": "Who were three of the major artists supported by Lorenzo de' Medici's court?", "back": "Botticelli, Leonardo da Vinci, and Michelangelo."}, {"front": "In what year was Savonarola excommunicated, arrested, and burned at the stake?", "back": "1498."}, {"front": "Which governing body was Machiavelli serving when he drafted dispatches and managed diplomatic correspondence?", "back": "The Second Chancery."}, {"front": "Machiavelli's role as a civil servant for 14 years gave him what he called an \"extraordinary education\" in what field?", "back": "Practical politics."}, {"front": "What term did the source use to describe Machiavelli's reaction to Cesare Borgia's methods?", "back": "Fascinated and repelled in equal measure."}, {"front": "According to the source, why was Savonarola able to rule Florence initially from 1494 to 1498?", "back": "He convinced Florentines their suffering was divine punishment for worldliness."}, {"front": "What political philosophy is Machiavelli famously associated with in the title of this section?", "back": "Political Realism."}, {"front": "Machiavelli's family belonged to which social class in Florence?", "back": "Old Florentine nobility."}, {"front": "When did the Medici family first return to power after their 1494 expulsion?", "back": "1512."}, {"front": "Which Pope personally led armies in the field, a sight Machiavelli found \"startling and instructive\"?", "back": "Pope Julius II."}, {"front": "How did Machiavelli characterize the political situation in Florence following Lorenzo's death in 1492?", "back": "A period of crisis."}, {"front": "Term: The Second Chancery.", "back": "The government office in Florence where Machiavelli served as Secretary, handling operational diplomatic tasks."}, {"front": "During his missions to the court of Emperor Maximilian in 1507–08, Machiavelli concluded the Emperor lacked the ability to _____ on his decisions.", "back": "Follow through."}, {"front": "What was the duration of the period of Machiavelli's intense literary output following his 1512 dismissal?", "back": "1512 until his death in 1527."}, {"front": "Machiavelli's \"enforced idleness\" on his farm eventually resulted in how many major published works mentioned in the text?", "back": "Five (*The Prince*, *Discourses*, *Art of War*, *Florentine Histories*, and *La Mandragola*)."}, {"front": "What was the immediate consequence of Machiavelli's arrest in early 1513?", "back": "He was thrown into prison and tortured on the rack."}, {"front": "Machiavelli was born into a family of \"modest means\" but of what social status?", "back": "Old Florentine nobility."}, {"front": "Who was the \"Warrior Pope\" that supported the Spanish army's defeat of Florence in 1512?", "back": "Pope Julius II."}, {"front": "In Machiavelli's view, moral authority cannot replace what essential political tool?", "back": "Organized force."}, {"front": "What did Machiavelli spend his days doing while in exile at his farm before his evening study sessions?", "back": "Working on the farm and arguing with locals at the inn."}, {"front": "What was the name of the village where Machiavelli's family farm was located?", "back": "Sant'Andrea in Percussina."}, {"front": "Machiavelli's education focused heavily on which specific subjects in addition to Latin?", "back": "Classical authors and their histories."}, {"front": "What was Machiavelli's official title within the Second Chancery?", "back": "Secretary."}, {"front": "What was the date of Machiavelli's death?", "back": "June 22, 1527."}, {"front": "Machiavelli believed that Emperor Maximilian was _____ (unable to make firm decisions).", "back": "Irresolute."}, {"front": "The Medici family were in exile for how many years before their return in 1512?", "back": "Eighteen years."}, {"front": "Where in Florence is the Palazzo Vecchio located, which houses a famous portrait of Machiavelli?", "back": "Florence (it was the seat of government)."}, {"front": "How did Machiavelli's time in Cesare Borgia's court affect his political imagination?", "back": "It left a permanent mark, showing him the use of skill, cruelty, and deception in building a state."}, {"front": "Which event happened first: Machiavelli's mission to Pope Julius II or his mission to Emperor Maximilian?", "back": "The mission to Pope Julius II (1506)."}, {"front": "True or False: Machiavelli was allowed to return to his government office after his 1513 release.", "back": "False (he was barred from government offices)."}, {"front": "According to the source, Machiavelli was born at what kind of moment for a future political thinker?", "back": "The most fortunate possible moment."}, {"front": "Machiavelli's diplomatic mission to France in 1500 and 1504 was to negotiate with which specific monarch?", "back": "King Louis XII."}, {"front": "What is the primary theme of Machiavelli's *The Art of War*?", "back": "Military organization."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
