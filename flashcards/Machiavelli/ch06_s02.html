<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli in Chapter V, what specific question does a conqueror face regarding a previously self-governing city?", "back": "The conqueror must decide what to do with a city or principality that had its own laws, institutions, and tradition of republican freedom."}, {"front": "What are Machiavelli's three primary options for governing a newly conquered, previously self-governing city?", "back": "1. Destroy it. 2. Move there yourself and govern in person. 3. Allow it to continue under its own laws, extracting tribute, and governing through a friendly oligarchy."}, {"front": "Which of Machiavelli's options for holding a conquered city does he consider the most secure and reliable?", "back": "Destroying the city."}, {"front": "Why does Machiavelli argue that destroying a conquered city is the most reliable strategy?", "back": "A city that has been destroyed cannot rebel. Its population, dispersed, and institutions dismantled, loses the organizational capacity for resistance."}, {"front": "What historical example does Machiavelli use to illustrate the effectiveness of destroying a city to prevent future rebellion?", "back": "Rome's treatment of Carthage. Rome first tried controlled conditions, Carthage rebelled, and Rome eventually razed it entirely, solving the 'Carthaginian problem'."}, {"front": "How does Machiavelli's argument for destruction reflect his political realism, as opposed to moral judgment?", "back": "Machiavelli does not claim destruction is morally admirable; he states it is effective. This reflects his separation of moral judgment from political analysis, defining his realism."}, {"front": "What are the advantages of a prince choosing to govern a conquered city in person?", "back": "The prince can respond to problems immediately, build personal relationships with local leaders, and prevent abuses by distant governors."}, {"front": "What is the main drawback or limitation of a prince choosing to govern a conquered city by living there personally?", "back": "This approach is only effective as long as the prince remains present. The underlying problems reassert themselves the moment he withdraws."}, {"front": "What advice did Machiavelli give elsewhere in *The Prince* regarding a ruler moving to a conquered territory?", "back": "He recommended this approach, notably criticizing Louis XII for not moving to Italy."}, {"front": "What is Machiavelli's third option for governing a conquered free city, besides destruction or direct personal rule?", "back": "Allowing it to continue under its own laws, extracting tribute, and governing through a friendly oligarchy of local collaborators."}, {"front": "What 'fatal weakness' does Machiavelli identify in the strategy of governing a conquered city through a friendly oligarchy?", "back": "The memory of the city's previous freedom persists among the population and eventually becomes a rallying cry for rebellion."}, {"front": "Why might a collaborating oligarchy in a conquered city eventually lose its position or even lead resistance?", "back": "They may be removed by their own people who remember freedom, or they may find it more advantageous to lead the resistance themselves against the foreign ruler."}, {"front": "What historical example does Machiavelli use to demonstrate the failure of indirect rule through friendly governments?", "back": "Sparta's attempt to hold the Greek cities it conquered by installing friendly governments; every one of them eventually rebelled."}, {"front": "What does Machiavelli mean by 'the memory of liberty'?", "back": "It is a powerful political force that outlasts conquest, suppression, and generations. The idea of a city's former self-governance persists even if its institutions are dismantled."}, {"front": "Why is 'the memory of liberty' considered politically explosive by Machiavelli?", "back": "Because the persistent idea of a city's former self-governance can always become a powerful motivation for rebellion and resistance against a conqueror."}, {"front": "What is the core question Machiavelli is trying to answer in Chapter V of *The Prince* regarding conquered free cities?", "back": "He is asking 'what actually works?' to reliably hold such a city, not 'what is the just or merciful thing to do?'"}, {"front": "How does Machiavelli's approach in Chapter V exemplify the essence of political realism?", "back": "It demonstrates a willingness to state uncomfortable truths about how power actually functions, even if the conclusions are morally troubling."}, {"front": "What is a key distinction readers of *The Prince* must constantly make, according to the text?", "back": "They must distinguish between whether Machiavelli is empirically right and whether he is being honest about what the evidence shows."}, {"front": "Compare the security of Machiavelli's 'destruction' option versus the 'governing in person' option.", "back": "Destruction offers permanent security by eliminating the capacity for rebellion, whereas governing in person only secures the city as long as the prince is physically present."}, {"front": "According to Machiavelli, what is the fundamental psychological barrier to maintaining control over a city accustomed to freedom through indirect rule?", "back": "The enduring memory and longing for its past freedom among the populace, which cannot be easily erased or suppressed and eventually becomes a rallying cry for rebellion."}, {"front": "What 'uncomfortable truth' does Chapter V reveal about power dynamics, according to Machiavelli?", "back": "That the most effective means of controlling a people accustomed to freedom may be morally disturbing, such as outright destruction, despite any ethical considerations."}, {"front": "What pedagogical value does the 'shock' of Machiavelli's argument for city destruction provide for students?", "back": "It forces students to confront the gap between political ideals and political analysis, shifting conversation from moral reaction to analytical engagement with historical evidence."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
