<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powers and Principalities (Machiavelli) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Machiavelli, what is the first course of action for a prince who wishes to hold a state accustomed to living under its own laws?", "back": "To ruin them."}, {"front": "What is the second course of action Machiavelli identifies for holding a state accustomed to freedom?", "back": "To reside there in person."}, {"front": "What is the third course of action for holding a free state involving local governance and economics?", "back": "Permit them to live under their own laws, draw a tribute, and establish an oligarchy."}, {"front": "Why does an oligarchy established by a prince in a conquered city typically support that prince?", "back": "It knows it cannot stand without the prince's friendship and interest."}, {"front": "Machiavelli argues that a city accustomed to freedom is held more easily through its own _____ than by any other means.", "back": "Citizens."}, {"front": "Which two Greek cities did the Spartans attempt to hold by establishing oligarchies?", "back": "Athens and Thebes."}, {"front": "What was the ultimate outcome of the Spartans' attempt to hold Athens and Thebes through oligarchies?", "back": "They lost them."}, {"front": "Name one of the three cities the Romans held successfully by dismantling them.", "back": "Carthage (or Capua/Numantia)."}, {"front": "How did the Romans treat Capua and Numantia to ensure they were not lost after conquest?", "back": "They dismantled them."}, {"front": "What was the result when the Romans tried to hold Greece by permitting its laws and making it free?", "back": "They did not succeed."}, {"front": "According to Machiavelli, what was the Roman Empire compelled to do to cities in Greece to retain them?", "back": "Dismantle many cities in the country."}, {"front": "In Machiavelli's view, what is the only \"safe way\" to retain a city accustomed to freedom?", "back": "Ruining it."}, {"front": "What does Machiavelli predict will happen to a prince who captures a free city but does not destroy it?", "back": "He may expect to be destroyed by the city."}, {"front": "In a rebellion, what serves as the primary \"rallying point\" for a city accustomed to freedom?", "back": "The watchword of liberty and its ancient privileges."}, {"front": "How does Machiavelli describe the influence of \"time\" on a city's memory of its ancient privileges?", "back": "Time never causes the city to forget its privileges."}, {"front": "Under what specific condition will a conquered city forget its name and privileges?", "back": "Only if the inhabitants are disunited or dispersed."}, {"front": "Which city does Machiavelli cite as an example of rebelling after being held in \"bondage\" for a century?", "back": "Pisa."}, {"front": "Pisa rebelled against which state after 100 years of being held?", "back": "The Florentines."}, {"front": "Why are countries accustomed to living under a prince easier to hold after the ruling family is exterminated?", "back": "They are accustomed to obeying and do not know how to govern themselves."}, {"front": "What prevents a city formerly ruled by a prince from quickly choosing a new leader from within its own ranks?", "back": "The citizens cannot agree in making one from amongst themselves."}, {"front": "How does the reaction to war in a principality differ from that of a republic according to Machiavelli?", "back": "Principalities are very slow to take up arms."}, {"front": "What three characteristics of republics make them more resistant to new princes than principalities?", "back": "More vitality, greater hatred, and more desire for vengeance."}, {"front": "What are the two \"safest\" ways to maintain control over a conquered republic?", "back": "To destroy them or to reside there."}, {"front": "The Spartans' failure to hold Athens is used to illustrate the difficulty of using _____ to control free cities.", "back": "Oligarchies."}, {"front": "In Chapter V, how does Machiavelli characterize the argument regarding the treatment of conquered free cities?", "back": "Uncompromising."}, {"front": "Machiavelli notes that inhabitants of republics will never permit the memory of their former _____ to rest.", "back": "Liberty."}, {"front": "According to the text, what is the defining characteristic of Sparta in the context of Machiavelli's examples?", "back": "An ancient Greek city-state known for military discipline."}, {"front": "What is the primary reason a prince can gain control of a former principality \"much more easily\" than a republic?", "back": "The inhabitants do not know how to govern themselves without their old prince."}, {"front": "True or False: Machiavelli believes that providing \"benefits\" to a formerly free city will make it forget its ancient privileges.", "back": "False."}, {"front": "Which Roman historian provided the examples Machiavelli used to discuss Capua and Carthage?", "back": "Livy."}, {"front": "Why does Machiavelli suggest that the third method (tribute/oligarchy) relies on the prince's \"friendship and interest\"?", "back": "Because the newly created government cannot survive without the prince's support."}, {"front": "In republics, what specific sentiment prevents the inhabitants from allowing the memory of liberty to rest?", "back": "Desire for vengeance."}, {"front": "According to Machiavelli, what is the \"safest way\" to govern a city like Pisa after conquest?", "back": "To destroy it or reside there."}, {"front": "What is the intended purpose of establishing an oligarchy in a conquered city?", "back": "To keep the city friendly to the prince."}, {"front": "What was the result of the Romans' attempt to hold Greece by permitting its laws?", "back": "They did not succeed and were forced to dismantle cities."}, {"front": "Machiavelli states that a prince who becomes master of a city accustomed to freedom and does not destroy it _____.", "back": "May expect to be destroyed by it."}, {"front": "What happens to the ruling family of a principality in Machiavelli's scenario for an easy conquest?", "back": "The family is exterminated."}, {"front": "Why are the citizens of a former principality \"very slow to take up arms\"?", "back": "They are accustomed to obeying and lack a unified leadership to replace the old prince."}, {"front": "In Chapter V, what does Machiavelli say about the \"name of liberty\" in formerly free cities?", "back": "It is never forgotten at any chance they have to rally to it."}, {"front": "How did the Spartans lose Thebes and Athens?", "back": "They attempted to hold them via oligarchy rather than destruction or residence."}, {"front": "What term does Machiavelli use to describe the state of Pisa under the Florentines for 100 years?", "back": "Bondage."}, {"front": "According to the text, a prince who wishes to keep a city accustomed to freedom should do so by means of its _____.", "back": "Own citizens."}, {"front": "What is the primary \"watchword\" that acts as a rallying point for rebellion in a free city?", "back": "Liberty."}, {"front": "Machiavelli claims that in republics, there is \"greater _____\" compared to principalities.", "back": "Hatred."}, {"front": "How many specific historical examples of cities dismantled by Romans are mentioned in the text?", "back": "Three (Capua, Carthage, and Numantia)."}, {"front": "Why does Machiavelli consider the memory of liberty in a republic a permanent threat to a prince?", "back": "Because neither time nor benefits will cause the city to forget it."}, {"front": "What does Machiavelli define as the \"third course\" for holding a state accustomed to freedom?", "back": "Permitting them to live under their own laws and drawing a tribute."}, {"front": "In the context of the Spartans, what was the specific outcome of the Athens and Thebes occupation?", "back": "They lost the cities."}, {"front": "Why is residing in person considered one of the ways to hold a conquered free city?", "back": "It is one of the safest methods to maintain control without destruction."}, {"front": "What is the consequence of a conquered city being \"accustomed to live under a prince\" when that prince's line ends?", "back": "They do not know how to govern themselves and are easily gained by a new prince."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
