<head>

    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 11, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Machiavelli">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What foundational question does Machiavelli ask regarding the strength of a prince's state?", "back": "Whether a prince can defend himself with his own resources or depends on the assistance of others."}, {"front": "What two resources allow a prince to raise a sufficient army to support himself?", "back": "Abundance of men or money."}, {"front": "According to Machiavelli, what defines a prince who always has 'need of others' for defense?", "back": "The inability to meet an enemy in the field, forcing them to shelter behind walls."}, {"front": "What is the primary defensive recommendation for a prince who cannot raise a field army?", "back": "Provision and fortify their towns."}, {"front": "In the case of a prince sheltering behind walls, what does Machiavelli advise them *not* to defend?", "back": "The country or surrounding territory."}, {"front": "Why is a prince who fortifies his town and manages his subjects well unlikely to be attacked?", "back": "Men are generally adverse to enterprises where clear difficulties can be seen."}, {"front": "What condition regarding the prince's reputation makes a fortified town particularly difficult to attack?", "back": "The prince is not hated by his people."}, {"front": "What is the political status of the cities of Germany as described by Machiavelli?", "back": "They are absolutely free."}, {"front": "Under what condition do the free cities of Germany yield obedience to the emperor?", "back": "Only when it suits them."}, {"front": "What specific physical defenses make German cities difficult to take by assault?", "back": "Proper ditches, walls, and sufficient artillery."}, {"front": "How long of a supply do German cities maintain in their public depots?", "back": "One year."}, {"front": "What three types of supplies are specifically stored in German public depots?", "back": "Eating, drinking, and firing (fuel)."}, {"front": "How do German cities keep the community quiet and productive without loss to the state?", "back": "By providing work in labors that constitute the life and strength of the city."}, {"front": "How do German cities maintain military readiness among their citizens?", "back": "They hold military exercises in high repute and maintain ordinances to uphold them."}, {"front": "What is the likely outcome for an attacker who besieges a prince with a strong city and the love of his people?", "back": "The attacker will be driven off with disgrace."}, {"front": "What external factor makes it difficult for an invading army to maintain a siege for a whole year?", "back": "The changeable nature of the affairs of this world."}, {"front": "According to Machiavelli, why might subjects become impatient if they have property outside the city walls during a siege?", "back": "They see their property burnt and their self-interest makes them forget the prince."}, {"front": "How does a 'powerful and courageous' prince counter the subjects' fear of a long siege?", "back": "By giving them hope that the evil will not be for long."}, {"front": "What psychological tool does a prince use to distract subjects from their burnt property during a siege?", "back": "Fear of the cruelty of the enemy."}, {"front": "How should a prince handle subjects who appear 'too bold' during a defensive siege?", "back": "By preserving himself adroitly from them."}, {"front": "At what point in a siege does the enemy typically ruin the surrounding country?", "back": "Upon their arrival, when the spirits of the people are still hot for defense."}, {"front": "Why is the destruction of property early in a siege actually an advantage for the prince later on?", "back": "The damage is already done and the people's spirits have cooled, leaving no remedy but to unite with the prince."}, {"front": "According to Machiavelli's view of human nature, why do subjects feel 'under obligations' to a prince after their property is destroyed?", "back": "Their possessions were ruined in the prince's defense."}, {"front": "What is the Machiavellian principle regarding the nature of men and the benefits they confer?", "back": "Men are bound by the benefits they confer as much as by those they receive."}, {"front": "What is the essential requirement for a wise prince to keep the minds of his citizens steadfast?", "back": "He must not fail to support and defend them."}, {"front": "A prince who can raise a sufficient army is categorized as being able to support himself with his _____ _____.", "back": "own resources"}, {"front": "What term does Machiavelli use to describe the difficulty of taking German cities by assault?", "back": "Tedious."}, {"front": "In the context of German cities, what are the 'labours' provided to the people intended to prevent?", "back": "Loss to the state and restlessness among the people."}, {"front": "The ability to 'join battle against any one who comes to attack' is the hallmark of which type of prince?", "back": "A prince who can support himself with his own resources."}, {"front": "What is the specific effect of having 'proper ditches and walls' according to the text?", "back": "It makes taking a city by assault seem tedious and difficult."}, {"front": "Why does the 'long siege' pose a risk to the prince's relationship with his subjects?", "back": "It causes them to focus on self-interest over loyalty."}, {"front": "Machiavelli suggests a prince must preserve himself 'adroitly' from what specific type of subject?", "back": "Those who seem too bold."}, {"front": "What does Machiavelli claim happens to the 'spirits' of the people after some time has passed during a siege?", "back": "They cool down."}, {"front": "Machiavelli concludes that keeping citizens steadfast is 'not difficult' provided the prince is _____.", "back": "wise"}, {"front": "What is the relationship between the German cities and the country around them?", "back": "They own but little country around them."}, {"front": "Why do German cities not fear the power of nearby neighbors?", "back": "They are fortified in a way that makes assault appear difficult to everyone."}, {"front": "A prince is less likely to be attacked if he is not _____ by his people.", "back": "hated"}, {"front": "In Machiavelli's analysis, what is the consequence of the damage being 'already done' during a siege?", "back": "The people become more ready to unite with the prince."}, {"front": "What is the primary reason an army cannot easily stay in the field for a whole year?", "back": "The affairs of the world are changeable."}, {"front": "A prince who must shelter behind walls is advised to encourage his people to _____ and _____ their towns.", "back": "provision; fortify"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
