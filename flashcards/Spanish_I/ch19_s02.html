<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Encountering Spanish &mdash; Chapter 19, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Spanish_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the general grammatical rule for stating 'I want to be a [profession]' in Spanish?", "back": "Use the structure 'Quiero ser + [profession]' without an indefinite article (un/una)."}, {"front": "Provide an example of how to correctly say 'I want to be a doctor' in Spanish, following the article rule.", "back": "Quiero ser médico. (NOT 'Quiero ser un médico'.)"}, {"front": "Explain the grammatical peculiarity of Spanish nouns like 'policía' when referring to professions.", "back": "Nouns like 'policía' use the same form for both masculine and feminine individuals. Only the definite article (el/la) changes to indicate gender (e.g., 'el policía' for a male officer, 'la policía' for a female officer)."}, {"front": "Name at least three Spanish profession words that use the same form for both masculine and feminine, only changing the article.", "back": "El/la artista, el/la atleta, el/la periodista, el/la electricista, el/la comerciante, el/la piloto, el/la policía."}, {"front": "Besides referring to a female police officer, what other meaning can 'La policía' have?", "back": "'La policía' can also refer to 'the police' as an institution or police force."}, {"front": "What special conjugation rule applies to Spanish verbs ending in -uir, such as 'construir,' in certain present-tense and preterite forms?", "back": "Verbs ending in -uir (e.g., construir, destruir, incluir) add a 'y' in several present-tense forms and in the third-person preterite (e.g., construyó, construyeron)."}, {"front": "Who was Gabriel García Márquez, and what is one of his most famous works?", "back": "Gabriel García Márquez (Colombia, 1927–2014) was a Nobel Prize-winning novelist. His most famous work is 'Cien años de soledad' (One Hundred Years of Solitude)."}, {"front": "What profession is Gabriel García Márquez associated with?", "back": "Escritor (Writer/Novelist)."}, {"front": "Who is Lionel Messi, and for what is he famous?", "back": "Lionel Messi (Argentina, 1987–) is a world-renowned Argentine soccer player, widely considered one of the greatest of all time, who won the FIFA World Cup in 2022."}, {"front": "What profession is Lionel Messi associated with?", "back": "Atleta (Athlete/Soccer player)."}, {"front": "Who is Sonia Sotomayor, and what significant achievement is she known for?", "back": "Sonia Sotomayor (USA, Puerto Rican heritage, 1954–) is the first Latina Justice of the United States Supreme Court, appointed in 2009."}, {"front": "What profession is Sonia Sotomayor associated with?", "back": "Abogada / Juez (Lawyer / Judge)."}, {"front": "Who was Luis Federico Leloir, and what was his major contribution?", "back": "Luis Federico Leloir (Argentina, 1906–1987) was an Argentine biochemist who won the Nobel Prize in Chemistry in 1970 for his work on sugar nucleotides."}, {"front": "What profession is Luis Federico Leloir associated with?", "back": "Científico (Scientist/Biochemist)."}, {"front": "Who was Frida Kahlo, and what type of art is she famous for?", "back": "Frida Kahlo (Mexico, 1907–1954) was a celebrated Mexican painter known for her vivid self-portraits and exploration of Mexican identity and culture."}, {"front": "What profession is Frida Kahlo associated with?", "back": "Artista (Artist/Painter)."}, {"front": "What is the Spanish children's song 'Martinillo' also known as, and what is its French original?", "back": "'Martinillo' is also known as 'Fray Felipe' and is the Spanish version of the French song 'Frère Jacques' (Are You Sleeping?)."}, {"front": "What is the basic story told in the song 'Martinillo'?", "back": "It tells the story of a sleeping friar (Fray Felipe/Brother Martin) who has forgotten to ring the morning bells for prayer."}, {"front": "How is 'Martinillo' typically sung, creating a 'beautiful overlapping effect'?", "back": "It is typically sung as a round (un canon), where different groups start singing the same melody at different times."}, {"front": "Which command form can be found in the 'Martinillo' song lyrics provided in the text?", "back": "'Suena la campana' (Ring the bell!)."}, {"front": "Why is 'Martinillo' considered a good song for Spanish learners?", "back": "It is a simple, playful song good for practicing daily routine vocabulary and command forms."}, {"front": "Describe the 'Las asociaciones de profesiones' memory technique.", "back": "This technique involves linking each Spanish profession word to a real person you know or a famous person you admire to make memorization easier and more vivid."}, {"front": "Why is associating professions with people an effective memory technique?", "back": "The brain remembers vivid human faces and specific images much better than abstract words or labels, aiding recall."}, {"front": "What is the Spanish word for 'doctor'?", "back": "Médico (m) / Médica (f)."}, {"front": "What is the Spanish word for 'journalist'?", "back": "Periodista (m/f)."}, {"front": "What is the Spanish word for 'electrician'?", "back": "Electricista (m/f)."}, {"front": "What is the Spanish word for 'merchant' or 'trader'?", "back": "Comerciante (m/f)."}, {"front": "What is the Spanish word for 'pilot'?", "back": "Piloto (m/f)."}, {"front": "What is the Spanish word for 'firefighter'?", "back": "Bombero (m) / Bombera (f)."}, {"front": "According to the text, what action do professionals in fields like medicine, engineering, art, and athletics perform daily?", "back": "They 'shape our world every day'."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
