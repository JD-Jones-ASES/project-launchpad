<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Encountering Spanish &mdash; Chapter 20, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary use of the imperfect tense when talking about childhood?", "back": "It is the perfect tool for sharing childhood memories—what you used to do, who you used to be, and what the world looked like through younger eyes.", "id": "fc01"}, {"front": "What is the 'magic phrase' to begin a statement about childhood memories in Spanish, and what does it mean?", "back": "'Cuando era niño/a,' meaning 'When I was a child/boy/girl.'", "id": "fc02"}, {"front": "Translate this sentence into English: 'Cuando era niño, jugaba con mi perro todos los días.'", "back": "'When I was a boy, I used to play with my dog every day.'", "id": "fc03"}, {"front": "Translate this sentence into English: 'De niña, mi mamá me leía cuentos sobre animales.'", "back": "'As a girl, my mom used to read me stories about animals.'", "id": "fc04"}, {"front": "How would you say 'We used to be very curious and we used to explore the forest' in Spanish?", "back": "'Éramos muy curiosos y explorábamos el bosque.'", "id": "fc05"}, {"front": "Translate this question into English: '¿Tenías un animal favorito cuando eras pequeño?'", "back": "'Did you have a favorite animal when you were little?'", "id": "fc06"}, {"front": "According to 'Recuerdos de mi niñez,' where did the narrator live as a child?", "back": "In a small town near the jungle in Costa Rica.", "id": "fc07"}, {"front": "Describe the narrator's childhood home and garden from 'Recuerdos de mi niñez.'", "back": "The house was modest ('modesta'), but the garden was enormous ('enorme') and full of colorful flowers.", "id": "fc08"}, {"front": "What special trip did the narrator's family take every summer?", "back": "They used to go to the Pacific beach.", "id": "fc09"}, {"front": "What mysterious sight did the narrator witness at the beach at night?", "back": "Sea turtles ('tortugas marinas') coming to lay their eggs in the white sand. It was like a dream ('¡Era como un sueño!').", "id": "fc10"}, {"front": "What kind of stories did the narrator's grandfather tell?", "back": "Stories about jungle animals ('animales de la selva'), such as jaguars walking near the town when it rained a lot.", "id": "fc11"}, {"front": "How did the narrator feel listening to their grandfather's stories?", "back": "A little scared ('un poco asustado') and a little fascinated ('un poco fascinado').", "id": "fc12"}, {"front": "What common sight was always in the narrator's garden, and what did they do with them?", "back": "There were always butterflies ('mariposas') of various colors. The narrator would chase them for hours but never catch them.", "id": "fc13"}, {"front": "What special belief did the narrator's grandmother have about blue butterflies?", "back": "She said it was good luck ('buena suerte') to see one.", "id": "fc14"}, {"front": "How did the narrator describe their family's happiness despite their financial situation?", "back": "They were a happy family ('una familia feliz'). They had little money, but they had nature, which was enough for them.", "id": "fc15"}, {"front": "How did Sofía ask Valentina about her childhood activities in the conversation?", "back": "'Oye, ¿qué hacías cuando eras pequeña?' (Hey, what did you used to do when you were little?)", "id": "fc16"}, {"front": "Where did Valentina live as a child, and what was her daily activity?", "back": "She lived near a lake and used to swim with her brothers every day.", "id": "fc17"}, {"front": "What was Sofía's childhood activity given that she was from the city?", "back": "She used to go to the zoo every month because she loved elephants.", "id": "fc18"}, {"front": "What was Sofía's favorite animal as a child, and what was her dream related to it?", "back": "Her favorite animal was the dolphin ('el delfín'), and she dreamed of swimming with dolphins someday.", "id": "fc19"}, {"front": "What is the primary purpose of 'El paseo mental por la naturaleza' memory tip?", "back": "To help remember the animal vocabulary from the chapter.", "id": "fc20"}, {"front": "Describe the core method of 'El paseo mental por la naturaleza' memory tip.", "back": "Close your eyes and imagine a walk through a jungle, encountering various animals like a snake, monkey, tiger, butterfly, turtle, bird, whale, and dolphins, then farm animals like cows, horses, a dog, and a cat.", "id": "fc21"}, {"front": "What is recommended to enhance the 'mental nature walk' for better memory?", "back": "Add colors, sounds, and smells to make it more vivid, because the brain remembers stories, not just lists.", "id": "fc22"}, {"front": "Which grammar tense and specific phrase should be used when writing about childhood memories, according to the activity prompt?", "back": "The imperfect tense and the phrase 'cuando era niño/a.'", "id": "fc23"}, {"front": "Provide two helpful sentence starters for writing about your childhood in Spanish.", "back": "'Cuando era niño/a, vivía en...' (When I was a child, I lived in...) or 'Me encantaba / Me gustaba...' (I used to love / I used to like...).", "id": "fc24"}, {"front": "What elements did the narrator consider sufficient for happiness, despite having little money?", "back": "Nature was sufficient for them.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
