<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Encountering Spanish &mdash; Chapter 14, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In English, \"to know\" is one verb. How many verbs are there for \"to know\" in Spanish?", "back": "There are two verbs in Spanish for \"to know\": \"saber\" and \"conocer.\""}, {"front": "What is the primary meaning/use of the Spanish verb \"saber\"?", "back": "\"Saber\" is used for knowing facts, information, or how to do something (skills). It means 'know THAT' or 'know HOW'."}, {"front": "What types of \"knowing\" require the verb \"conocer\"?", "back": "\"Conocer\" is used for knowing or being familiar with people, places, or things."}, {"front": "Provide an example of using \"saber\" for a fact or piece of information.", "back": "Sé que hoy hay clase. (I know that there is class today.)"}, {"front": "How do you express \"knowing how to do something\" (a skill) using \"saber\"?", "back": "Use \"saber\" followed by an infinitive, e.g., Sé nadar. (I know how to swim.)"}, {"front": "Give an example of using \"saber\" for a specific detail like a name, address, or phone number.", "back": "¿Sabes el número de teléfono? (Do you know the phone number?)"}, {"front": "What is the irregular \"yo\" form of \"saber\"?", "back": "The \"yo\" form of \"saber\" is \"sé.\" It has an accent mark to distinguish it from the reflexive pronoun \"se.\""}, {"front": "Give an example of using \"conocer\" when referring to knowing a person.", "back": "Conozco a mi vecino. (I know my neighbor.)"}, {"front": "How do you use \"conocer\" to talk about knowing a place?", "back": "Use \"conocer\" to indicate you have been there or are familiar with it, e.g., ¿Conoces Bogotá? (Do you know / have you been to Bogotá?)"}, {"front": "How do you use \"conocer\" for being familiar with a specific thing (not a fact)?", "back": "Conocemos esa canción. (We know that song — we are familiar with it.)"}, {"front": "What is the irregular \"yo\" form of \"conocer\"?", "back": "The \"yo\" form of \"conocer\" is \"conozco.\" This -zco ending is a common pattern for verbs ending in -cer or -cir."}, {"front": "Which memory tip helps differentiate \"saber\" and \"conocer\"?", "back": "\"Saber\" is \"HEAD knowledge\" (formulas, facts, answers, skills). \"Conocer\" is \"HEART knowledge\" (people you've met, places you've visited, personal familiarity/connection)."}, {"front": "If you \"know the capital of Peru,\" which verb would you use and why?", "back": "You would use \"saber\" (Sé que la capital del Perú es Lima) because it's a learned fact or piece of information."}, {"front": "If you \"know Lima\" (meaning you've been there or are familiar with it), which verb would you use and why?", "back": "You would use \"conocer\" (Conozco Lima) because it refers to familiarity with a place through experience."}, {"front": "What is the irregular \"yo\" form of the verb \"dar\" (to give)?", "back": "The \"yo\" form of \"dar\" is \"doy.\""}, {"front": "What is the irregular \"yo\" form of the verb \"ver\" (to see)?", "back": "The \"yo\" form of \"ver\" is \"veo.\""}, {"front": "Translate: \"I give my friend a map.\"", "back": "Le doy un mapa a mi amigo."}, {"front": "Translate: \"Do you see the traffic light on the corner?\"", "back": "¿Ves el semáforo en la esquina?"}, {"front": "What is the \"personal a\" in Spanish grammar?", "back": "The \"personal a\" is the word \"a\" that is required before a specific person when that person is the direct object of a verb. It has no equivalent in English."}, {"front": "When is the \"personal a\" used with verbs like \"conocer\"?", "back": "It is used when the direct object is a specific person, e.g., Conozco a mi vecino."}, {"front": "When should you NOT use the \"personal a\"?", "back": "Do not use the \"personal a\" when the direct object is a place or a thing, e.g., Conozco Bogotá or Conocemos esa canción."}, {"front": "Decide: \"I know how to swim.\" (skill) - Saber or Conocer?", "back": "Saber (Sé nadar.)"}, {"front": "Decide: \"I know the president of Mexico.\" (person) - Saber or Conocer?", "back": "Conocer (Conozco al presidente de México.)"}, {"front": "Decide: \"She knows Lima very well.\" (place) - Saber or Conocer?", "back": "Conocer (Ella conoce Lima muy bien.)"}, {"front": "Decide: \"We know the answer.\" (information) - Saber or Conocer?", "back": "Saber (Sabemos la respuesta.)"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
