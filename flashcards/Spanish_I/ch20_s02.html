<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encountering Spanish &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Encountering Spanish &mdash; Chapter 20, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Spanish_I.html">&larr; Back to Encountering Spanish</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How many irregular verbs are there in the imperfect tense in Spanish?", "back": "Only three.", "id": "fc01"}, {"front": "Name the three irregular verbs in the Spanish imperfect tense.", "back": "Ser, ir, and ver.", "id": "fc02"}, {"front": "Do stem-changing verbs and other 'tricky' verbs follow regular or irregular patterns in the imperfect tense?", "back": "They follow the regular imperfect endings perfectly.", "id": "fc03"}, {"front": "How does the number of irregular verbs in the imperfect tense compare to the preterite tense?", "back": "There are significantly fewer irregular verbs in the imperfect (only three) compared to the preterite (dozens).", "id": "fc04"}, {"front": "Conjugate the verb 'ser' (to be) in the imperfect tense.", "back": "era, eras, era, éramos, erais, eran.", "id": "fc05"}, {"front": "When is 'ser' typically used in the imperfect tense?", "back": "To describe identity, characteristics, or states that existed over time in the past.", "id": "fc06"}, {"front": "Conjugate the verb 'ir' (to go) in the imperfect tense.", "back": "iba, ibas, iba, íbamos, ibais, iban.", "id": "fc07"}, {"front": "What are the main uses of 'ir' in the imperfect tense?", "back": "To describe habitual destinations or ongoing movement in the past.", "id": "fc08"}, {"front": "Conjugate the verb 'ver' (to see/watch) in the imperfect tense.", "back": "veía, veías, veía, veíamos, veíais, veían.", "id": "fc09"}, {"front": "When is 'ver' typically used in the imperfect tense?", "back": "To describe what someone used to see, watch, or observe regularly in the past.", "id": "fc10"}, {"front": "Why is 'ver' considered an irregular verb in the imperfect, even though its endings match regular -er/-ir verbs?", "back": "Because its stem 've-' retains the 'e', unlike truly regular verbs (e.g., 'comer' -> 'com-') which drop to a bare stem before adding the imperfect endings.", "id": "fc11"}, {"front": "List four common 'animales domésticos' (domestic animals) in Spanish.", "back": "Perro (dog), gato (cat), vaca (cow), caballo (horse).", "id": "fc12"}, {"front": "Give examples of masculine wild predator nouns in Spanish.", "back": "El león (lion), el tigre (tiger), el oso (bear), el lobo (wolf).", "id": "fc13"}, {"front": "Give examples of feminine gentle animal nouns in Spanish.", "back": "La tortuga (turtle), la mariposa (butterfly), la serpiente (snake), la ballena (whale).", "id": "fc14"}, {"front": "Explain the special article rule for 'el águila' (eagle).", "back": "'Águila' is a feminine noun, but it uses the masculine article 'el' in the singular ('el águila') because it begins with a stressed 'á-' sound, which avoids an awkward double-vowel sound. In the plural, it returns to the feminine article: 'las águilas'.", "id": "fc15"}, {"front": "Name two other Spanish nouns that follow the same article rule as 'el águila'.", "back": "El agua (water) and el alma (soul).", "id": "fc16"}, {"front": "How do verbs like 'volar,' 'subir,' and 'crecer' (nature verbs) behave in the imperfect tense?", "back": "They follow the regular imperfect patterns (e.g., volaba, subían, crecíamos).", "id": "fc17"}, {"front": "Why is Latin America considered one of the most biologically diverse regions on Earth?", "back": "Due to regions like the Amazon basin (millions of species, thousands endemic), the Galápagos Islands (unique creatures), Patagonia (condors, penguins), and high-biodiversity cloud forests.", "id": "fc18"}, {"front": "Which famous scientist developed his theory of evolution after observing animals in the Galápagos Islands?", "back": "Charles Darwin.", "id": "fc19"}, {"front": "Name two unique animal species found in the Galápagos Islands mentioned in the text.", "back": "Marine iguanas, blue-footed boobies, or giant tortoises.", "id": "fc20"}, {"front": "What is the Amazon basin's significance in global biodiversity?", "back": "It is home to more species of plants and animals than anywhere else on the planet, with over three million species, including thousands found nowhere else.", "id": "fc21"}, {"front": "List three major threats facing Latin America's natural habitats.", "back": "Deforestation, climate change, and pollution.", "id": "fc22"}, {"front": "What is 'ecotourism,' and why is it important for conservation?", "back": "Ecotourism is a form of tourism that supports the conservation of natural environments. It demonstrates that protecting nature can also be beneficial for people and local economies.", "id": "fc23"}, {"front": "What percentage of all species on Earth can be found in Costa Rica, despite its small size?", "back": "Nearly 5%.", "id": "fc24"}, {"front": "How did Costa Rica become a 'Champion of Conservation' after facing significant deforestation in the 1980s?", "back": "The government implemented a bold path: paying landowners to protect forests instead of cutting them down, and establishing a national park system that now covers 25% of the country's land.", "id": "fc25"}, {"front": "Name two iconic animals tourists visit Costa Rica to see.", "back": "Sloths, jaguars, sea turtles, or resplendent quetzals.", "id": "fc26"}, {"front": "What is the lesson demonstrated by Costa Rica's conservation success?", "back": "That humans and nature can thrive together.", "id": "fc27"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
