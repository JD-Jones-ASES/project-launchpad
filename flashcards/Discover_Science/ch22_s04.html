<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Discover Science &mdash; Chapter 22, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Define \"weathering.\"", "back": "Weathering is the process of breaking rocks into smaller pieces by water, ice, wind, or living things, without moving the pieces from their original location."}, {"front": "What is the key difference between weathering and erosion?", "back": "Weathering is the process of breaking rocks apart, while erosion is the process of moving those broken pieces from one place to another. Weathering is about breaking, erosion is about moving."}, {"front": "Define \"erosion.\"", "back": "Erosion is the process of moving weathered rock and soil from one place to another by wind, water, ice, or gravity."}, {"front": "How does ice contribute to weathering?", "back": "Water seeps into rock cracks and freezes. When water freezes, it expands, pushing the crack open like a wedge. Repeated freezing and thawing eventually splits the rock apart."}, {"front": "What is considered the most powerful agent of erosion?", "back": "Water is the most powerful agent of erosion, carrying away soil through rain, carving valleys with rivers, and wearing away coastlines with ocean waves."}, {"front": "Give an example of how living things contribute to weathering.", "back": "Plant roots grow into cracks in rocks and slowly push them apart as they thicken. Burrowing animals like groundhogs and earthworms also break apart rock and soil as they dig."}, {"front": "Why is weathering considered the \"first step\" in making soil?", "back": "Without weathering, rocks would not break down into the small particles and sediments that are essential components for soil formation."}, {"front": "Describe how wind contributes to both weathering and erosion.", "back": "Wind causes weathering by carrying tiny grains of sand that 'sandblast' and wear away rock surfaces. It causes erosion by picking up dry, loose soil and carrying it through the air to a new location."}, {"front": "How do glaciers act as agents of erosion?", "back": "Glaciers are huge, slow-moving rivers of ice that scrape up vast amounts of rock and soil as they slide across the land, carrying them along and carving out features like valleys."}, {"front": "Name two harmful effects of erosion on agricultural land.", "back": "Erosion removes precious topsoil, which contains vital nutrients for plant growth, leading to decreased farm productivity. It can also muddy rivers and lakes, harming aquatic life."}, {"front": "Describe a helpful outcome of erosion.", "back": "Erosion can be helpful by carrying sediment downstream and depositing it in flat areas, creating rich farmland like floodplains and fertile river deltas. It also helps build beaches."}, {"front": "Approximately how long does it take for one inch of topsoil to form?", "back": "It takes hundreds of years to build just one inch of topsoil."}, {"front": "Explain how terracing helps prevent erosion on steep hillsides.", "back": "Terracing involves cutting flat 'steps' into the slope of a hillside. These steps slow down the flow of water, preventing it from rushing straight downhill and washing away soil."}, {"front": "How do plant roots prevent erosion, especially compared to bare ground?", "back": "Plant roots grip the soil like tiny anchors, holding soil particles in place and making it much harder for wind or water to dislodge and carry them away. Bare ground has no such anchor."}, {"front": "What is contour plowing and how does it reduce erosion?", "back": "Contour plowing involves farmers plowing across the slope of a hill, following the natural curves of the land, instead of straight up and down. This creates ridges that slow down water runoff and prevent soil loss."}, {"front": "What are windbreaks and how do they help prevent erosion?", "back": "Windbreaks are rows of trees planted along the edges of fields. They block the wind, reducing its speed and preventing it from blowing away dry, loose soil."}, {"front": "In the \"Erosion Experiment,\" what was the expected difference in soil loss between the tray with plants and the tray with bare soil?", "back": "The tray with bare soil was expected to lose significantly more soil, resulting in much muddier runoff water, because there were no roots to hold the soil in place."}, {"front": "How did Wangari Maathai's work with the Green Belt Movement address erosion?", "back": "By encouraging women to plant millions of trees across Africa, Maathai's movement re-established root systems that held soil in place, preventing erosion, especially in areas affected by deforestation."}, {"front": "Explain why cutting down forests can lead to serious erosion problems.", "back": "When forests are cut down, the extensive root systems of trees, which normally anchor the soil, are lost. Without these roots, soil becomes loose and is easily washed away by rain or blown away by wind, leading to severe erosion."}, {"front": "Which term describes the process of rocks breaking apart but staying in the same location: weathering or erosion?", "back": "Weathering."}, {"front": "Which term primarily describes the process of \"soil on the move\": weathering or erosion?", "back": "Erosion."}, {"front": "How do burrowing animals contribute to weathering?", "back": "Burrowing animals physically break apart rock and soil particles as they dig and move through the ground."}, {"front": "Contrast how erosion can be both beneficial and detrimental to land and ecosystems.", "back": "Erosion is beneficial when it creates fertile floodplains and deltas by depositing nutrient-rich sediment. However, it is detrimental when it removes precious topsoil from existing farmlands, degrades water quality, and harms habitats."}, {"front": "How does using mulch help prevent soil erosion?", "back": "Mulch, such as leaves, straw, or wood chips, covers bare soil, protecting it directly from the force of raindrops (which can dislodge soil) and from strong winds, thus keeping the soil in place."}, {"front": "What historical event in the 1930s serves as a powerful example of severe wind erosion caused by unprotected topsoil?", "back": "The American Dust Bowl, where extensive plowing of prairie grasslands, combined with severe drought, led to massive dust storms that carried away vast amounts of unprotected topsoil."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
