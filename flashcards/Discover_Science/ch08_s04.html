<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Discover Science &mdash; Chapter 8, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is concentration in chemistry?", "back": "Concentration is how much solute is dissolved in a certain amount of solvent.", "id": "fc01"}, {"front": "Differentiate between a concentrated solution and a dilute solution.", "back": "A concentrated solution has a lot of solute dissolved in the solvent, while a dilute solution has only a little solute dissolved.", "id": "fc02"}, {"front": "Describe a dilute solution using the orange juice example.", "back": "A dilute orange juice solution is made by mixing one spoonful of orange powder (solute) into a cup of water (solvent), resulting in a pale color and mild taste.", "id": "fc03"}, {"front": "Describe a concentrated solution using the orange juice example.", "back": "A concentrated orange juice solution is made by mixing four spoonfuls of orange powder (solute) into the same amount of water (solvent), resulting in a deep orange color and strong taste.", "id": "fc04"}, {"front": "How can you visually observe a difference in concentration?", "back": "You can observe concentration by adding varying amounts of food coloring to water; more drops lead to a darker color, indicating higher concentration.", "id": "fc05"}, {"front": "How can you feel a difference in concentration?", "back": "You can feel concentration, for example, with bubble soap in a bath; more soap (higher concentration) creates thicker, foamy bubbles.", "id": "fc06"}, {"front": "How do cooks apply the concept of concentration in the kitchen?", "back": "Cooks adjust concentration to achieve desired tastes, such as adding a teaspoon of salt for mild flavor versus a tablespoon for a much saltier taste.", "id": "fc07"}, {"front": "What is the approximate salt concentration of ocean water and why is it significant?", "back": "Ocean water has a salt concentration of about 35 grams per liter, which is why it tastes so salty and cannot be consumed.", "id": "fc08"}, {"front": "What four ingredients make up the 'Super Mixture' in the activity?", "back": "The Super Mixture consists of sand, salt, iron filings, and water.", "id": "fc09"}, {"front": "What three separation methods are used in the 'Super Mixture Challenge' activity?", "back": "The three separation methods used are magnetism, filtering, and evaporation.", "id": "fc10"}, {"front": "Which separation method is used first in the Super Mixture Challenge, and what does it separate?", "back": "Magnetism is used first to separate the iron filings from the mixture.", "id": "fc11"}, {"front": "Explain why magnetism is an effective method for separating iron filings from the Super Mixture.", "back": "Iron is magnetic, while sand, salt, and water are not, allowing the magnet to attract and remove only the iron filings.", "id": "fc12"}, {"front": "After magnetism, what separation method is used in the Super Mixture Challenge, and what does it separate?", "back": "Filtering is used after magnetism to separate the sand, which gets trapped in the filter, from the salty water.", "id": "fc13"}, {"front": "Explain why filtering is an effective method for separating sand from the Super Mixture.", "back": "Filtering works because sand particles are larger than the pores in the coffee filter, trapping them, while the dissolved salt and water pass through.", "id": "fc14"}, {"front": "What is the final separation method used in the Super Mixture Challenge, and what does it separate?", "back": "Evaporation is the final method, used to separate the salt from the water by allowing the water to turn into vapor, leaving the salt crystals behind.", "id": "fc15"}, {"front": "Explain why evaporation is an effective method for separating salt from water in the Super Mixture.", "back": "Evaporation separates salt from water because water changes into a gas (water vapor) and escapes, while salt, a solid, does not evaporate and is left behind as crystals.", "id": "fc16"}, {"front": "Why is the order of separation methods important in the Super Mixture Challenge?", "back": "The order is important because each method targets a specific property. For example, filtering before using a magnet would still leave the iron filings with the sand or stuck in the filter, making it harder to separate cleanly. Evaporation only works on the liquid part.", "id": "fc17"}, {"front": "What would happen if you tried to filter the Super Mixture before using the magnet?", "back": "If you filtered first, the iron filings (along with the sand) would be trapped in the coffee filter, making it difficult to separate the iron filings from the sand afterward.", "id": "fc18"}, {"front": "Who was Alice Ball?", "back": "Alice Ball was an African American chemist, the first woman and first African American to earn a master's degree in chemistry from the University of Hawaii.", "id": "fc19"}, {"front": "What significant medical breakthrough did Alice Ball achieve?", "back": "Alice Ball developed a method to make oil from the chaulmoogra tree dissolve in water so it could be injected, making it an effective treatment for Hansen's disease (leprosy).", "id": "fc20"}, {"front": "Why was Alice Ball's method for chaulmoogra oil so important?", "back": "Her method was crucial because chaulmoogra oil was the best treatment for Hansen's disease, but it wouldn't mix with bodily fluids; her discovery made it absorbable and saved thousands of lives.", "id": "fc21"}, {"front": "What unfortunate circumstance surrounded Alice Ball's discovery, and how is she remembered today?", "back": "Alice Ball died young before publishing her work, and another scientist took credit for years. Today, the University of Hawaii honors her memory annually on 'Alice Ball Day.'", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
