<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Discover Science &mdash; Chapter 18, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Discover_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary characteristic that defines a chemical change?", "back": "A chemical change results in the formation of one or more new substances."}, {"front": "List the five main clues scientists use to identify a chemical change.", "back": "1. Color Change\n2. Gas Bubbles Form\n3. Heat or Light Is Produced/Absorbed\n4. A New Smell Appears\n5. Hard to Reverse"}, {"front": "Give three examples of a color change indicating a chemical change.", "back": "An iron nail turning reddish-brown as it rusts, a cut apple turning brown, or a silver spoon tarnishing dark over time."}, {"front": "Explain why not every color change signifies a chemical change.", "back": "Some color changes, like mixing red and blue paint to make purple, are physical changes because no new substance is formed; it's simply a mixture."}, {"front": "What observation about gas bubbles suggests a chemical change?", "back": "The formation of bubbles (a new gas) in a liquid without heating it to its boiling point."}, {"front": "Provide an example of gas bubbles forming due to a chemical reaction.", "back": "Dropping a fizzy antacid tablet into water or mixing vinegar and baking soda, both of which produce carbon dioxide gas bubbles."}, {"front": "How can you distinguish between bubbles from a chemical change and bubbles from boiling water?", "back": "Bubbles from a chemical change occur spontaneously without reaching the boiling point, while bubbles from boiling water are a physical change (liquid turning to vapor)."}, {"front": "How can energy changes serve as a clue for a chemical reaction?", "back": "Many chemical changes release energy as heat, light, or both (exothermic). Others absorb heat from their surroundings, making the container feel cold (endothermic)."}, {"front": "Give an example of a chemical change that produces both heat and light.", "back": "Burning a match."}, {"front": "Provide an example of a chemical change that primarily produces light.", "back": "Snapping a glow stick, where chemicals mix and react to give off light."}, {"front": "What observation related to temperature can indicate an endothermic chemical change?", "back": "The container feeling cold to the touch when substances are mixed, indicating the reaction is absorbing heat from the surroundings."}, {"front": "How does a change in smell indicate a chemical change?", "back": "If a substance suddenly smells different, it suggests that new molecules with distinct odors have formed through a chemical reaction."}, {"front": "Give an example of a new smell indicating a chemical change.", "back": "The warm smell of bread baking, the bad smell of a spoiled hard-boiled egg (due to new sulfur-containing molecules), or the distinct smell of burning leaves."}, {"front": "What is the safe technique for detecting a smell from an unknown substance?", "back": "Wafting: holding the container about 15 cm from your nose and gently fanning the air toward you with your hand to safely detect the odor."}, {"front": "Describe the 'Hard to Reverse' clue for a chemical change.", "back": "Most chemical changes are very difficult or impossible to reverse, meaning the original substances cannot easily be recovered (e.g., you can't unburn wood)."}, {"front": "Provide an example of a chemical change that is difficult or impossible to reverse.", "back": "Rusting a nail, cooking an egg, or burning wood into ash."}, {"front": "Why are these indicators called 'clues' rather than 'proofs' of a chemical change?", "back": "Because some physical changes can also exhibit these signs (e.g., boiling water produces bubbles, mixing paints changes color). They are strong indicators, but not definitive proof on their own."}, {"front": "What provides stronger evidence of a chemical change when observing these clues?", "back": "Observing several clues together, rather than relying on just one, provides stronger evidence that a chemical change has occurred."}, {"front": "In the Vinegar and Baking Soda experiment, what clues indicate a chemical change?", "back": "Gas bubbles forming (inflating the balloon), the bottle feeling cooler (heat absorption), and the change being hard to reverse."}, {"front": "What new substance is responsible for inflating the balloon in the vinegar and baking soda experiment?", "back": "Carbon dioxide gas (CO2)."}, {"front": "How do chemical changes involving baking soda contribute to baking a cake?", "back": "Baking soda reacts with an acid (like buttermilk) to produce carbon dioxide gas bubbles, which get trapped in the batter and make the cake rise, making it fluffy."}, {"front": "What would happen to a cake if the chemical reaction involving baking soda didn't occur?", "back": "The cake would be flat and dense because no carbon dioxide gas bubbles would be produced to make the batter rise."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
