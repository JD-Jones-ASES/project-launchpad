    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Discover Science &mdash; Chapter 16, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Discover_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is nutrition?", "back": "Nutrition is the process of eating and using food to keep your body healthy and strong."}, {"front": "Define a 'balanced diet.'", "back": "A balanced diet means eating a variety of foods from all the food groups so your body gets everything it needs."}, {"front": "Why is the food you eat important for your body?", "back": "Food provides the energy and materials your body needs to grow, move, think, and repair itself."}, {"front": "What key nutrients do fruits and vegetables provide, and what do they help your body do?", "back": "They are packed with vitamins and minerals that help your body fight sickness and keep your eyes, skin, and organs healthy."}, {"front": "What is the main role of grains in your diet?", "back": "Grains (like bread, rice, pasta, oatmeal) give your body energy to move and think."}, {"front": "Why are whole grains especially good for you compared to other grains?", "back": "Whole grains (like brown rice and whole wheat bread) provide energy that lasts longer."}, {"front": "How does protein help your body stay healthy?", "back": "Protein (meat, fish, beans, eggs, nuts) helps your body build and repair muscles, bones, and other tissues, and is crucial for muscle growth."}, {"front": "What essential mineral does dairy provide, and why is it important?", "back": "Dairy (milk, cheese, yogurt) is rich in calcium, which is the mineral your bones and teeth need to stay strong and constantly rebuild themselves."}, {"front": "Water is not a food group, but why is it essential for your body?", "back": "Your body is about 60 percent water. Water helps your blood flow, your digestive system work, and your body stay cool."}, {"front": "What does 'exercise' mean?", "back": "Exercise means moving your body in ways that make your heart beat faster and your muscles work harder."}, {"front": "How does exercise benefit your bones?", "back": "Bones get stronger and denser, especially when you run, jump, and play (weight-bearing activities)."}, {"front": "What effect does regular exercise have on your muscles?", "back": "Muscles grow bigger and stronger when you use them regularly, allowing them to do more without getting tired."}, {"front": "Why is exercise good for your heart?", "back": "The heart is a muscle, and exercise makes it stronger so it can pump blood more efficiently without working as hard."}, {"front": "How does being active impact your digestive system?", "back": "Moving around helps food travel smoothly through your intestines, making the digestive system work better."}, {"front": "How much physical activity do scientists recommend for kids your age every day?", "back": "Scientists recommend at least 60 minutes of physical activity every day."}, {"front": "What is sleep, and what happens to your body during this time?", "back": "Sleep is a period of rest during which the body grows, repairs itself, and the brain processes what you learned during the day."}, {"front": "What two important physical processes happen to your bones and muscles while you sleep?", "back": "Your bones grow, and your muscles repair tiny tears that happen during normal activity."}, {"front": "How does sleep help your brain?", "back": "While you rest, your brain organizes everything you learned during the day, moving information into long-term memory."}, {"front": "What happens to your immune system when you get enough sleep?", "back": "Your immune system—the body's defense against germs—gets stronger."}, {"front": "How many hours of sleep do kids ages 9 to 11 typically need each night?", "back": "Kids ages 9 to 11 need about 9 to 12 hours of sleep every night."}, {"front": "What is the first simple rule for taking care of your body regarding food?", "back": "Eat well: Choose a variety of foods from every food group, eat plenty of fruits and vegetables, and drink lots of water."}, {"front": "What is the second simple rule for a healthy body related to movement?", "back": "Move often: Get at least 60 minutes of physical activity every day and find activities you enjoy so exercise feels like fun!"}, {"front": "What is the third simple rule for taking care of your body regarding rest?", "back": "Sleep enough: Go to bed at a regular time and get 9 to 12 hours of sleep each night."}, {"front": "Who was Daniel Hale Williams?", "back": "Daniel Hale Williams was an American surgeon who made history in 1893."}, {"front": "For what groundbreaking surgery is Daniel Hale Williams most famous?", "back": "He performed one of the first successful open-heart surgeries in the world in 1893."}, {"front": "Besides his surgery, what other significant achievement did Daniel Hale Williams make as a pioneer?", "back": "He founded Provident Hospital in Chicago in 1891, one of the first hospitals in the U.S. where Black doctors and nurses could work and train."}, {"front": "How do the choices you make about eating, moving, and sleeping now affect your body?", "back": "The choices you make now will affect how your body feels and works for the rest of your life."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
