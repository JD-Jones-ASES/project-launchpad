<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Discover Science &mdash; Chapter 27, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is conservation?", "back": "Conservation is using natural resources wisely and carefully so they last as long as possible and cause as little harm as possible."}, {"front": "What is the main goal of conservation?", "back": "The main goal of conservation is to ensure there are enough resources for people today and for people in the future."}, {"front": "What are the \"Three R's\" of conservation?", "back": "The \"Three R's\" are Reduce, Reuse, and Recycle."}, {"front": "In what order of importance are the \"Three R's\" listed, and why?", "back": "They are listed in order from most helpful to least helpful: Reduce, Reuse, Recycle. Reducing is best because it prevents resource extraction and waste creation entirely."}, {"front": "Why is \"Reduce\" considered the single best conservation strategy?", "back": "Because using less in the first place means fewer resources are extracted, less energy is used to make products, and less waste is created."}, {"front": "Give two examples of how to \"Reduce\" resource consumption.", "back": "Examples include turning off lights when leaving a room, walking or biking instead of driving, using both sides of paper, or bringing a reusable water bottle."}, {"front": "What does \"Reuse\" mean in the context of conservation?", "back": "Reusing means finding another use for an item instead of throwing it away, which saves resources by avoiding the need for a new one."}, {"front": "Provide two examples of how to \"Reuse\" items.", "back": "Examples include using a cloth shopping bag, passing along old clothes/toys, washing and reusing containers, repairing broken items, or turning old T-shirts into cleaning rags."}, {"front": "What is recycling?", "back": "Recycling means breaking down a used material and turning it into something new."}, {"front": "Besides saving raw materials, what is a significant energy benefit of recycling?", "back": "Recycling saves a lot of energy. For example, recycling an aluminum can uses about 95% less energy than making a new one from raw ore."}, {"front": "Name three common materials that can be recycled.", "back": "Common recyclable materials include paper and cardboard, aluminum and steel cans, glass bottles and jars, and many types of plastic (check the number on the bottom)."}, {"front": "Why is saving energy considered a powerful form of conservation?", "back": "Because making and transporting products uses so much energy, saving energy directly reduces the need for fossil fuels and other resources, leading to fewer greenhouse gas emissions."}, {"front": "List two simple ways to save energy at home or school.", "back": "Examples include turning off lights, televisions, and computers when not in use; using energy-saving light bulbs; wearing a sweater instead of turning up the heat; or unplugging unused chargers and devices."}, {"front": "Define \"endangered species.\"", "back": "An endangered species is a type of plant or animal that is in danger of disappearing forever because so few of its kind are left."}, {"front": "How does protecting habitats help conservation beyond just individual resources?", "back": "Protecting habitats helps protect entire ecosystems and food chains, ensuring plants and animals have places to live and thrive, which prevents species from becoming endangered."}, {"front": "Give two examples of how people protect habitats and wildlife.", "back": "Examples include creating national parks and wildlife refuges, passing laws against hunting endangered animals, replanting forests, restoring wetlands, cleaning up polluted areas, and planting native trees/flowers."}, {"front": "What is one simple action kids can take to conserve water?", "back": "Kids can turn off the tap while brushing their teeth; a running faucet wastes about 8 liters of water per minute."}, {"front": "How can kids help conserve resources through transportation choices?", "back": "By walking, biking, or carpooling instead of always driving, which reduces the amount of gasoline burned and associated pollution."}, {"front": "What significant scientific discovery did Eunice Newton Foote make in the 1850s?", "back": "She was the first person to demonstrate the greenhouse effect, showing that carbon dioxide (CO2) traps heat from the Sun."}, {"front": "How did Eunice Newton Foote conduct her experiment on CO2 and heat?", "back": "She filled glass cylinders with different gases, including CO2, placed them in sunlight, and measured the temperature inside each. She found the CO2 cylinder got much hotter and stayed hot longer."}, {"front": "Why was Eunice Newton Foote's discovery largely overlooked for over 150 years?", "back": "Because she was a woman, a male scientist had to read her paper for her, and her work was largely forgotten, with a male scientist (John Tyndall) later receiving credit for a similar discovery."}, {"front": "What is a common finding when performing a \"Trash Audit\"?", "back": "Most groups find that more than half (often 50-75%) of their trash could have been recycled, reused, or composted, meaning the \"True Trash\" pile is usually the smallest."}, {"front": "If a forest is cleared to build a shopping center, what natural resources are directly used or impacted, and what happens to the wildlife?", "back": "Resources like trees, metal, stone, and fossil fuels are used. Plants and animals lose their homes, which can disrupt ecosystems, food chains, and potentially endanger species."}, {"front": "How could a new development like a shopping center be built to use fewer resources or cause less environmental harm?", "back": "Ways include using recycled building materials, designing for energy efficiency, protecting existing natural areas, replanting native species, building on previously developed land, or planning for public transport access."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
