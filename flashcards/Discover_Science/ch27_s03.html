<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Discover Science &mdash; Chapter 27, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Discover_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What everyday object is used as an example to illustrate that resources come from different parts of Earth?", "back": "A simple pencil, with wood from a tree, graphite from underground rock, metal from aluminum ore, and rubber from a rubber tree."}, {"front": "What are the three main parts of Earth that provide resources, as remembered from Unit 2?", "back": "The atmosphere (air), the hydrosphere (water), and the lithosphere (land and rock)."}, {"front": "Name at least three resources or benefits provided by the atmosphere.", "back": "Oxygen to breathe, nitrogen for plants, wind energy, and protection from harmful sun rays."}, {"front": "Name at least three resources or benefits provided by the hydrosphere.", "back": "Fresh water (for drinking, farming, hydropower), fish, salt, and minerals from the sea floor."}, {"front": "Name at least three resources or benefits provided by the lithosphere.", "back": "Soil for farming, rocks and minerals for building, metals for tools, and fossil fuels for energy. Most mined/drilled resources come from here."}, {"front": "Define 'mining'.", "back": "Mining is digging into the Earth to remove rocks, minerals, metals, or fossil fuels."}, {"front": "Compare and contrast surface mining and underground mining.", "back": "Surface mining involves removing soil and rock on top to reach resources near the surface, creating open pits. Underground mining involves digging tunnels and shafts deep into the Earth for resources far below the surface."}, {"front": "What method is used to extract oil and natural gas from deep underground?", "back": "Drilling, where wells are dug thousands of meters deep to allow oil or gas to flow up through pipes."}, {"front": "Define 'logging'.", "back": "Logging is cutting down trees to use the wood as a resource."}, {"front": "What are some common uses for wood obtained through logging?", "back": "Building, paper, furniture, and fuel."}, {"front": "How does farming provide resources, and name two examples of non-food resources from farms.", "back": "Farming uses soil, water, and sunlight to grow food and other useful plants. Examples include cotton for clothing and rubber for tires."}, {"front": "Outline the general concept of turning a raw resource into a finished product.", "back": "Natural resources rarely look like their finished products; they must go through many steps of extraction, transport, processing, and assembly."}, {"front": "List the key steps in transforming iron ore into a steel bicycle frame.", "back": "Mining iron ore, transporting it to a factory, smelting the ore to separate iron, mixing iron with carbon to make steel, and then shaping the steel."}, {"front": "List the key steps in transforming trees into a book.", "back": "Cutting down trees (logging), transporting logs to a paper mill, chipping logs into pulp, spreading and drying pulp to make paper, printing words, and binding pages."}, {"front": "What fundamental resource is used at every step of transforming raw resources into finished products?", "back": "Energy, often derived from other resources like gasoline, coal, or natural gas."}, {"front": "Name four major environmental costs associated with extracting and using resources.", "back": "Habitat destruction, pollution, waste, and soil and water damage."}, {"front": "How does surface mining contribute to habitat destruction?", "back": "Surface mining removes entire forests and hilltops, destroying the homes of countless animals and plants."}, {"front": "Give two examples of how resource extraction and use can lead to pollution.", "back": "Burning fossil fuels releases gases into the air, and mining can release harmful chemicals into rivers and streams."}, {"front": "What is 'waste' in the context of resource use, and where do old products often end up?", "back": "Waste refers to leftover material from manufacturing and old products that are thrown away. They often end up in landfills, huge areas where trash is buried."}, {"front": "Explain how mining and logging can lead to soil erosion and water pollution.", "back": "Mining and logging remove plant cover, leaving bare ground that erodes easily. Chemicals from these activities can also seep into the ground and pollute drinking water."}, {"front": "Should humans stop using resources because of the environmental costs? Explain why or why not.", "back": "No, people need resources to live. However, it means we should use them carefully and wisely to reduce negative impacts."}, {"front": "What is 'smelting' and why is it a critical step in turning ore into metal?", "back": "Smelting is heating ore in a very hot furnace to separate the pure metal (like iron) from the surrounding rock, which is crucial for refining the metal."}, {"front": "How do responsible logging companies mitigate the environmental impact of cutting down trees?", "back": "Responsible logging companies replant new trees after cutting, allowing the forest to grow back over time."}, {"front": "Beyond environmental damage, what other resource is heavily consumed during the processing of raw materials into finished goods?", "back": "Energy, which itself is derived from other natural resources such as fossil fuels or hydropower."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
