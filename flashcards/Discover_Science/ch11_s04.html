<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Discover Science &mdash; Chapter 11, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What percentage of all animal species are invertebrates?", "back": "About 95 percent of all animal species are invertebrates.", "id": "fc01"}, {"front": "What is the defining characteristic of an invertebrate?", "back": "Invertebrates are animals without backbones.", "id": "fc02"}, {"front": "List the three main body parts and leg count of an insect.", "back": "Insects have three body parts (head, thorax, abdomen) and six legs.", "id": "fc03"}, {"front": "Give three examples of insects.", "back": "Butterflies, ants, beetles, grasshoppers, and ladybugs are examples of insects.", "id": "fc04"}, {"front": "How do arachnids differ from insects in terms of legs and body parts?", "back": "Arachnids have eight legs and two body parts, while insects have six legs and three body parts.", "id": "fc05"}, {"front": "Name two types of arachnids.", "back": "Spiders, scorpions, and ticks are examples of arachnids.", "id": "fc06"}, {"front": "What are common characteristics of most crustaceans?", "back": "Most crustaceans live in water and have a hard exoskeleton.", "id": "fc07"}, {"front": "Give two examples of crustaceans.", "back": "Crabs, lobsters, shrimp, and barnacles are examples of crustaceans.", "id": "fc08"}, {"front": "Describe mollusks and give an example of one with and one without a shell.", "back": "Mollusks are soft-bodied animals; many have shells. Snails and clams have shells, while octopuses and squid do not.", "id": "fc09"}, {"front": "How do earthworms contribute to a healthy environment?", "back": "Earthworms help soil stay healthy by digging tunnels that let air and water reach plant roots.", "id": "fc10"}, {"front": "What is a defining feature of cnidarians?", "back": "Cnidarians are soft, water-dwelling animals with stinging cells.", "id": "fc11"}, {"front": "Name two examples of cnidarians.", "back": "Jellyfish, sea anemones, and coral are examples of cnidarians.", "id": "fc12"}, {"front": "Define adaptation.", "back": "An adaptation is a body feature or behavior that helps a living thing survive in its environment.", "id": "fc13"}, {"front": "How do adaptations develop in animals?", "back": "Adaptations develop over a very long time, across many generations.", "id": "fc14"}, {"front": "What is camouflage, and how does it help an animal survive?", "back": "Camouflage is when an animal blends in with its surroundings, helping it hide from predators or prey.", "id": "fc15"}, {"front": "Give an example of an animal using camouflage.", "back": "A leaf insect looks like a green leaf, and an Arctic hare turns white in winter to match the snow.", "id": "fc16"}, {"front": "How do sharp claws and teeth serve as body adaptations?", "back": "Sharp claws help animals catch prey (e.g., lions), and large front teeth help animals gnaw through wood (e.g., beavers).", "id": "fc17"}, {"front": "Explain how thick fur or blubber helps an animal.", "back": "Thick fur and blubber are layers of fat that provide insulation, helping animals like polar bears stay warm in cold environments.", "id": "fc18"}, {"front": "What survival advantage do wings provide for animals?", "back": "Wings enable flight, which helps animals find food and escape predators.", "id": "fc19"}, {"front": "Why do some animals, like poison dart frogs, display bright colors?", "back": "Bright colors act as a warning to predators, signaling that the animal is dangerous or poisonous.", "id": "fc20"}, {"front": "What is the primary function of shells and armor as an adaptation?", "back": "Shells and armor provide protective coverings for animals against predators.", "id": "fc21"}, {"front": "Define behavior adaptation.", "back": "A behavior adaptation is an action or pattern of behavior that helps an animal survive.", "id": "fc22"}, {"front": "What is migration, and why do animals do it?", "back": "Migration is when animals travel long distances, usually to find warmer places with more food when seasons change.", "id": "fc23"}, {"front": "What is hibernation?", "back": "Hibernation is a behavior adaptation where some animals sleep through cold winter months when food is scarce.", "id": "fc24"}, {"front": "How does hunting in groups benefit animals like wolves?", "back": "Hunting in groups allows animals like wolves to bring down large prey that they could not catch alone.", "id": "fc25"}, {"front": "Describe 'playing dead' as a behavior adaptation.", "back": "Playing dead is a behavior where an animal, like an opossum, lies completely still when threatened, hoping the predator will lose interest.", "id": "fc26"}, {"front": "Give an example of how building shelters is a behavior adaptation.", "back": "Beavers build dams and lodges, birds build nests, and termites build mounds to provide protection and shelter.", "id": "fc27"}, {"front": "Who was Charles Henry Turner?", "back": "Charles Henry Turner was an American scientist who studied insect and spider behavior and was one of the first African American scientists to earn a PhD.", "id": "fc28"}, {"front": "What significant discovery did Charles Henry Turner make about insect intelligence?", "back": "Turner showed that insects could learn, demonstrating that honeybees can see colors and cockroaches can learn their way through a maze.", "id": "fc29"}, {"front": "According to the 'Try This' activity, how would you classify a spider versus a ladybug?", "back": "A spider is an arachnid (8 legs, 2 body parts), while a ladybug is an insect (6 legs, 3 body parts).", "id": "fc30"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
