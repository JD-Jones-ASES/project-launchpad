<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Discover Science &mdash; Chapter 15, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Discover_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary role of a 'producer' in a food chain?", "back": "An organism (like a plant) that makes its own food using sunlight."}, {"front": "What is a 'consumer' in the context of a food chain?", "back": "An organism (like an animal) that obtains energy by eating other organisms."}, {"front": "Provide a simple food chain example mentioned in the text, starting from the original energy source.", "back": "Sun --> plant --> animal --> you."}, {"front": "In the example of a turkey sandwich, what role does the turkey play in the food chain?", "back": "The turkey is a consumer, eating grain (a plant) for energy."}, {"front": "According to the text, what vital roles do animals play in maintaining a healthy food chain, beyond being food themselves?", "back": "Spreading seeds, pollinating flowers, and recycling nutrients."}, {"front": "List the main stages of Earth's water cycle.", "back": "Evaporation, condensation, precipitation, and collection."}, {"front": "How does the water cycle connect to the food chain?", "back": "Plants absorb water from the soil, and animals drink water, connecting every link to Earth's hydrosphere."}, {"front": "What fundamental chemical principle explains why the atoms in your body might have once been part of a leaf?", "back": "Atoms are never created or destroyed; they only move and are rearranged from one thing to another."}, {"front": "What is the chemical formula for glucose, the sugar molecule found in an apple?", "back": "C6H12O6."}, {"front": "Briefly describe how an apple tree uses atoms from the air and soil to make glucose.", "back": "Through photosynthesis, it pulls carbon from carbon dioxide (CO2) in the air and hydrogen and oxygen from water (H2O) in the soil, rearranging them into glucose."}, {"front": "What is the ultimate original source of energy for nearly all food chains on Earth?", "back": "The sun (light energy)."}, {"front": "How do plants convert the sun's energy into a usable form for the food chain?", "back": "They capture light energy and convert it into stored chemical energy (in glucose) through photosynthesis."}, {"front": "When a turkey eats grain, into what forms is the chemical energy from the grain converted within the turkey's body?", "back": "Kinetic energy (for muscles), heat energy (to stay warm), and stored energy."}, {"front": "Explain the Law of Conservation of Energy as it applies to a food chain.", "back": "Energy changes form (e.g., light to chemical to kinetic), but it is never created or destroyed."}, {"front": "Why do food chains rarely have more than four or five links?", "back": "Because a significant amount of energy is lost as heat at each step, leaving insufficient energy to support further levels."}, {"front": "Identify one connection between Life Science and Chemistry described in the text.", "back": "Animals eating plants and other animals (Life Science) involves the breakdown and rearrangement of atoms and molecules in their food (Chemistry)."}, {"front": "How does Earth Science directly relate to the Physics of energy flow in a food chain?", "back": "Water (Earth Science) is essential for plants to perform photosynthesis, which converts light energy (Physics) into chemical energy."}, {"front": "When you eat an apple, how does your body utilize the glucose molecule?", "back": "Your body breaks apart the glucose molecule and uses the atoms to build your own cells and release energy for activities."}, {"front": "Why is it crucial for all living things in a food chain to have access to water?", "back": "Water is essential for life processes; plants absorb it for photosynthesis, and animals drink it to survive, directly linking the food chain to Earth's hydrosphere."}, {"front": "What is the term for the process where an apple tree uses sunlight to create glucose?", "back": "Photosynthesis."}, {"front": "Differentiate between the primary roles of vertebrates and invertebrates in a food chain according to the text.", "back": "Vertebrates (like turkeys, cows, humans) are typically consumers in the main food chain; invertebrates (like earthworms) help break down soil, aiding plant growth at the base of the chain."}, {"front": "What central idea ties all four branches of science (Life, Earth, Chemistry, Physics) together in the context of your lunch?", "back": "Every item on the lunch tray, and indeed all life, ultimately gets its energy from the sun, flowing through interconnected natural processes governed by all four science branches."}, {"front": "How long has water been cycling through Earth's water cycle?", "back": "Billions of years."}, {"front": "Name the specific molecule that makes up the sugar in an apple.", "back": "Glucose."}, {"front": "How does the initial energy from the sun, a concept of Physics, become part of your body, a concept of Life Science?", "back": "Sunlight (Physics) is converted to chemical energy in plants via photosynthesis. This chemical energy is transferred through the food chain to animals and eventually to humans, where it powers life processes (Life Science)."}, {"front": "What happens to some energy at every step of the food chain, limiting its length?", "back": "Some energy is always lost as heat at each transfer, meaning there's less available for the next level."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
