<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Discover Science &mdash; Chapter 29, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is static electricity?", "back": "Static electricity is a buildup of electric charge on the surface of an object.", "id": "fc01"}, {"front": "What is electric charge?", "back": "Electric charge is a basic property of the tiny particles inside atoms. There are two kinds: positive (+) and negative (-).", "id": "fc02"}, {"front": "What type of charge do protons carry and where are they found in an atom?", "back": "Protons carry a positive charge (+) and are found in the center of the atom.", "id": "fc03"}, {"front": "What type of charge do electrons carry and where are they found in an atom?", "back": "Electrons carry a negative charge (-) and zip around the outside of the atom.", "id": "fc04"}, {"front": "What does it mean for an atom to be 'neutral'?", "back": "A neutral atom has the same number of protons and electrons, so its positive and negative charges balance out, resulting in no overall charge.", "id": "fc05"}, {"front": "What happens to an object that gains extra electrons when rubbed?", "back": "The object that gains extra electrons becomes negatively charged.", "id": "fc06"}, {"front": "What happens to an object that loses electrons when rubbed?", "back": "The object that loses electrons becomes positively charged.", "id": "fc07"}, {"front": "What does the word 'static' mean in the term 'static electricity'?", "back": "The word 'static' means staying in one place, indicating that the charges sit on the object instead of flowing.", "id": "fc08"}, {"front": "When you rub a balloon on your hair, which object gains electrons and what charge does it become?", "back": "The balloon gains electrons and becomes negatively charged.", "id": "fc09"}, {"front": "When you rub a balloon on your hair, what charge does your hair acquire and why might it stand up?", "back": "Your hair loses electrons and becomes positively charged. It stands up because each strand has the same (positive) charge, and like charges repel.", "id": "fc10"}, {"front": "What is the fundamental rule about how electric charges interact?", "back": "Opposite charges attract, and like charges repel.", "id": "fc11"}, {"front": "What does it mean for electric charges to 'attract'?", "back": "To attract means to pull toward each other, as opposite charges (positive and negative) do.", "id": "fc12"}, {"front": "What does it mean for electric charges to 'repel'?", "back": "To repel means to push away from each other, as like charges (two positives or two negatives) do.", "id": "fc13"}, {"front": "Why does a negatively charged balloon stick to a wall?", "back": "The balloon's extra negative charges attract the positive charges in the wall's surface, pulling the balloon toward the wall.", "id": "fc14"}, {"front": "Provide an everyday example of static electricity related to clothing.", "back": "Walking on carpet in socks can rub electrons from the carpet onto you (sock shuffle), or clothes tumbling in a dryer can trade electrons, making them cling together (laundry cling).", "id": "fc15"}, {"front": "How does plastic wrap become 'clingy'?", "back": "Pulling plastic wrap off the roll creates static charge, making it cling to bowls and to itself.", "id": "fc16"}, {"front": "What is nature's most dramatic example of static electricity?", "back": "Lightning is nature's most dramatic example of static electricity.", "id": "fc17"}, {"front": "How do storm clouds build up static charge before lightning strikes?", "back": "Inside a storm cloud, tiny bits of ice and water droplets swirl around and rub against each other, causing charges to build up. The bottom of the cloud becomes strongly negative, and the ground below becomes strongly positive.", "id": "fc18"}, {"front": "What causes lightning to occur?", "back": "Lightning occurs when the difference in charge between the cloud and the ground (or between clouds) gets big enough, causing electrons to leap in a brilliant flash.", "id": "fc19"}, {"front": "What causes the sound of thunder during a lightning storm?", "back": "The air along the lightning bolt heats up so fast that it expands with a loud boom, which is thunder.", "id": "fc20"}, {"front": "Name one industrial application where static electricity is used.", "back": "Factories use static electricity to spray paint evenly on cars and furniture, or photocopiers/laser printers use it to place ink, or air purifiers use it to pull dust and pollen out of the air.", "id": "fc21"}, {"front": "How do photocopiers and laser printers utilize static electricity?", "back": "Photocopiers and laser printers use static charge to place ink in exactly the right spots on paper.", "id": "fc22"}, {"front": "How do air purifiers use static electricity?", "back": "Air purifiers use static charge to pull dust and pollen out of the air.", "id": "fc23"}, {"front": "What does an object become if it loses electrons?", "back": "If an object loses electrons, it becomes positively charged.", "id": "fc24"}, {"front": "Why is the shock you feel from a doorknob on a dry day an example of static electricity?", "back": "It's an example because electrons build up on your body (static charge) and then jump to the doorknob, causing a brief flow of charge (the zap).", "id": "fc25"}, {"front": "When electrons move from one object to another due to rubbing, what property of the objects changes?", "back": "The overall electric charge of the objects changes; one becomes positively charged and the other negatively charged.", "id": "fc26"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
