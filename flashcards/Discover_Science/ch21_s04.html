<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Discover Science &mdash; Chapter 21, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Discover_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does it mean for an ecosystem to be \"in balance\"?", "back": "It means that the populations of different organisms stay fairly steady over time, with enough producers, herbivores, carnivores, and decomposers to maintain the system without any single population growing out of control."}, {"front": "Does a balanced ecosystem mean populations never change?", "back": "No, populations in a healthy ecosystem fluctuate a little, like a seesaw, but over time, the system stays in a stable pattern."}, {"front": "Why are ecosystems considered fragile?", "back": "Because when one part of the system changes (e.g., a species disappears, a new plant takes over, a resource dries up), the effects can ripple through and disrupt the entire system."}, {"front": "Describe the initial effect on a forest ecosystem if wolves are removed.", "back": "With no wolves to hunt them, the deer population would grow significantly."}, {"front": "What happens to the plant life in a forest if the deer population grows unchecked?", "back": "More deer would eat plants (grasses, shrubs, young trees) faster than they can grow back, leading to overgrazing and a decline in plant life."}, {"front": "How does the removal of a predator like the wolf eventually affect the soil in a forest ecosystem?", "back": "With fewer plants holding the soil in place due to overgrazing by deer, erosion increases as rain washes soil away."}, {"front": "What was the outcome for the deer population itself after wolves were removed, and what happened when they were reintroduced in Yellowstone?", "back": "After removal, deer populations exploded, then crashed due to starvation. Reintroducing wolves helped the ecosystem, including the deer population, slowly recover to a more balanced state."}, {"front": "What did the reintroduction of wolves in Yellowstone National Park demonstrate about ecosystems?", "back": "It demonstrated that all parts of an ecosystem are interconnected, and changes to one species (like a top predator) can have far-reaching effects on the entire system, including plants, other animals, and even physical landscape features."}, {"front": "Define \"habitat.\"", "back": "A habitat is the specific place where an organism lives, providing the food, water, shelter, and space it needs to survive."}, {"front": "Define \"niche.\"", "back": "A niche is the role or job of an organism in its ecosystem, including what it eats, what eats it, where it lives, and how it interacts with other organisms."}, {"front": "What is a simple analogy to understand the difference between an organism's habitat and its niche?", "back": "Your habitat is like your address (where you live), and your niche is like your job (what you do in your community)."}, {"front": "Why can't two different species usually have exactly the same niche in the same habitat for very long?", "back": "If two species have the exact same niche, they will compete fiercely for resources, and eventually, one species will outcompete the other, leading to one species moving or adapting, or its population shrinking."}, {"front": "What is considered the biggest threat to wildlife around the world?", "back": "Habitat destruction, often caused by humans clearing land for homes or farms."}, {"front": "Give an example of how habitat destruction impacts an ecosystem.", "back": "When forests are cut down for development, the animals and plants that lived there lose their home and resources, often leading to their decline or disappearance."}, {"front": "How can pollution affect an ecosystem?", "back": "Chemicals from factories, farms, and cars can poison plants and animals, make water unsafe to drink, and disrupt the overall health of an ecosystem."}, {"front": "What is an \"invasive species\"?", "back": "An invasive species is a plant or animal that is brought to a new ecosystem where it does not naturally belong, and it often causes harm to the native organisms."}, {"front": "How do invasive species typically harm native organisms in an ecosystem?", "back": "Without natural predators in their new environment, invasive species can multiply rapidly, outcompete native species for resources, and push them out."}, {"front": "Give an example of an invasive species and its impact.", "back": "Rabbits introduced to Australia had no natural predators, multiplied rapidly, and destroyed huge areas of farmland and native plant life."}, {"front": "What is \"overuse of resources\" and how does it affect ecosystems?", "back": "It is when people take too many resources (like fish or trees) from an ecosystem faster than the ecosystem can recover or replenish them, leading to depletion and imbalance."}, {"front": "List one way people can protect habitats.", "back": "Establishing national parks, wildlife refuges, and nature reserves to set aside land where ecosystems can thrive without human development."}, {"front": "Name a simple action an individual can take to help reduce pollution in ecosystems.", "back": "Using less plastic, recycling, and keeping chemicals out of rivers and lakes."}, {"front": "Why is it important to plant native species in your area?", "back": "Planting native species provides appropriate food and shelter for native animals, supporting the local ecosystem."}, {"front": "Who was Rachel Carson and what was her main contribution to environmental science?", "back": "Rachel Carson was an American marine biologist and writer who, through her book *Silent Spring*, highlighted how human actions (like pesticide use) can harm entire ecosystems, starting the modern environmental movement."}, {"front": "What was the name of Rachel Carson's famous book?", "back": "*Silent Spring*."}, {"front": "What chemical did Rachel Carson's book *Silent Spring* expose as harmful to ecosystems?", "back": "DDT (a pesticide)."}, {"front": "How did DDT primarily harm birds like eagles and pelicans, according to Rachel Carson?", "back": "DDT built up in food chains, and birds at the top received high doses, causing their eggshells to become so thin that they broke before chicks could hatch."}, {"front": "What significant environmental change resulted from Rachel Carson's work?", "back": "DDT was eventually banned in the United States, leading to the recovery of bald eagle populations and other species."}, {"front": "What fundamental principle about ecosystems did Rachel Carson's work highlight?", "back": "She showed that in an ecosystem, everything is connected, and what we do to one part, we do to all the others."}, {"front": "Explain how a chemical sprayed on plants could eventually affect hawks or eagles, tracing its path through a food chain.", "back": "The chemical is absorbed by plants. Herbivores (like insects or rabbits) eat the plants, absorbing the chemical. Smaller carnivores (like snakes or rodents) eat the herbivores, getting a higher dose. Finally, top predators like hawks or eagles eat the smaller carnivores, accumulating the highest and most harmful concentrations of the chemical."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
