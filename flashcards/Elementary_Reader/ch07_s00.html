<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Open Page &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Open Page &mdash; Chapter 7</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Elementary_Reader.html">&larr; Back to The Open Page</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the primary purpose of the Constitutional Convention in 1787?", "back": "The primary purpose was for delegates from twelve states to gather in Philadelphia and write the Constitution of the United States, creating a plan for how the new nation's government would work.", "id": "fc01"}, {"front": "What significant event occurred in 1789, two years after the Constitutional Convention?", "back": "George Washington was elected the first president of the United States.", "id": "fc02"}, {"front": "What is the Preamble to the Constitution?", "back": "The Preamble is the introductory statement to the U.S. Constitution, a fifty-two-word sentence that explains the entire purpose of the United States government.", "id": "fc03"}, {"front": "What does the phrase 'We the People' in the Preamble signify regarding the source of government power?", "back": "It signifies that the government's power comes from ordinary citizens, rather than from a monarch or a ruling elite.", "id": "fc04"}, {"front": "Name three of the six core purposes of the United States government as stated in the Preamble.", "back": "To form a more perfect Union, establish Justice, insure domestic Tranquility, provide for the common defence, promote the general Welfare, and secure the Blessings of Liberty to ourselves and our Posterity.", "id": "fc05"}, {"front": "What title did George Washington prefer, setting a precedent for all future presidents?", "back": "He preferred the simple title 'Mr. President,' refusing suggestions like 'Your Majesty' to emphasize the democratic nature of the office.", "id": "fc06"}, {"front": "What important precedent did George Washington set regarding presidential terms?", "back": "He voluntarily stepped down from power after serving two terms, setting an example of peaceful leadership and limiting presidential power.", "id": "fc07"}, {"front": "Who was Abigail Adams, and why is her letter to John Adams from March 1776 historically significant?", "back": "Abigail Adams was John Adams' wife, a self-educated woman and trusted adviser. Her letter urged her husband to 'remember the ladies' and consider women's rights in the new code of laws, highlighting early calls for gender equality.", "id": "fc08"}, {"front": "According to Abigail Adams, what would women do if they were not given a voice or representation in the new laws?", "back": "She warned that they would 'foment a rebellion' and not hold themselves bound by any laws in which they had no voice or representation.", "id": "fc09"}, {"front": "How did John Adams initially respond to his wife Abigail's plea to 'remember the ladies'?", "back": "He responded playfully, laughing off her 'extraordinary code of laws' and suggesting that traditional 'masculine systems' were largely theoretical and not fully enforced.", "id": "fc10"}, {"front": "What historical event and location inspired Francis Scott Key to write 'The Star-Spangled Banner'?", "back": "The bombardment of Fort McHenry in Baltimore Harbor by the British navy during the War of 1812 in September 1814.", "id": "fc11"}, {"front": "What sight moved Francis Scott Key to write the poem that became the national anthem?", "back": "He was moved by seeing the American flag still flying over Fort McHenry at dawn after a night of heavy bombardment, signaling that the fort had not fallen.", "id": "fc12"}, {"front": "When did 'The Star-Spangled Banner' officially become the national anthem of the United States?", "back": "Congress officially made 'The Star-Spangled Banner' the national anthem in 1931.", "id": "fc13"}, {"front": "Who is often called the 'father of American literature'?", "back": "Washington Irving is often called the 'father of American literature'.", "id": "fc14"}, {"front": "Which famous short story by Washington Irving features a character who sleeps through the American Revolution?", "back": "The story is 'Rip Van Winkle,' published in 1819 in 'The Sketch-Book'.", "id": "fc15"}, {"front": "In 'Rip Van Winkle,' what was Rip's 'great error in his composition'?", "back": "His 'great error' was 'an insuperable aversion to all kinds of profitable labour,' meaning he strongly disliked any work that was productive or profitable.", "id": "fc16"}, {"front": "How did Rip Van Winkle demonstrate his good-natured character despite his aversion to profitable labor?", "back": "He was a kind neighbor, always ready to assist others in their toils and errands, even though he neglected his own farm and family duties.", "id": "fc17"}, {"front": "What was the size of the flag that inspired Francis Scott Key, and who ordered it?", "back": "The flag was enormous, measuring thirty feet by forty-two feet. Major George Armistead, the commander of Fort McHenry, ordered it so the British would easily see it.", "id": "fc18"}, {"front": "What was the original title Francis Scott Key gave to his poem that became 'The Star-Spangled Banner'?", "back": "He originally titled it 'Defence of Fort M'Henry'.", "id": "fc19"}, {"front": "In what mountain range is the story of 'Rip Van Winkle' set?", "back": "The story of 'Rip Van Winkle' is set in the Catskill Mountains of New York.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
