<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Open Page &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Open Page &mdash; Chapter 15</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Elementary_Reader.html">&larr; Back to The Open Page</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is an allegory?", "back": "An allegory is a story in which characters and events represent deeper moral or spiritual truths."}, {"front": "Define the term 'pilgrim' as used in this unit.", "back": "A pilgrim is a person who travels to a holy place or is on a spiritual journey."}, {"front": "What does 'blessed' mean in a spiritual context?", "back": "In a spiritual context, 'blessed' means made holy, favored by God, and happy in a deep, spiritual way."}, {"front": "Define 'righteousness.'", "back": "Righteousness is the quality of being morally right and just."}, {"front": "Who wrote *Little Women* and when was it published?", "back": "Louisa May Alcott wrote *Little Women*, published in 1868."}, {"front": "What central metaphor does Mrs. March use to describe life's journey for her daughters?", "back": "Mrs. March uses the metaphor of 'Playing Pilgrims Progress,' where life is a continuous journey with burdens, a road, and the longing for goodness and happiness as a guide toward a 'true Celestial City' of peace."}, {"front": "In the opening scene of *Little Women*, how do Jo's and Beth's initial reactions to the lack of presents differ, revealing their personalities?", "back": "Jo grumbled about no presents, showing her outspoken and somewhat temperamental nature, while Beth contentedly reminded them of their family, highlighting her gentle and optimistic personality."}, {"front": "What significant historical event influenced the setting of *Little Women*, particularly the father's absence?", "back": "The American Civil War, which had ended just a few years before the book was written, influenced the story, as the March sisters' father was away serving in the army."}, {"front": "What 'bosom enemies' does Father encourage his daughters to fight in his letter?", "back": "Father encourages his daughters to fight their internal struggles, such as selfishness, anger, or discontent, to 'conquer themselves' and become better people."}, {"front": "Who wrote *The Pilgrim's Progress* and under what significant circumstances?", "back": "John Bunyan wrote *The Pilgrim's Progress* while imprisoned for twelve years for preaching without a license from the government."}, {"front": "What does Christian's 'heavy burden' allegorically represent in *The Pilgrim's Progress*?", "back": "Christian's 'heavy burden' allegorically represents the weight of sin and guilt that a person carries before finding spiritual deliverance."}, {"front": "Who is the grave person Christian meets at the Wicket Gate, and what inscription is above the gate?", "back": "The grave person Christian meets is named Good-will, and above the gate is written, 'Knock, and it shall be opened unto you.'"}, {"front": "Why does Good-will pull Christian through the Wicket Gate instead of just letting him walk in?", "back": "Good-will pulls Christian in because Beelzebub, captain of a strong castle nearby, shoots arrows at those approaching the gate, hoping they will die before entering."}, {"front": "What are the allegorical meanings of the 'City of Destruction' and the 'Celestial City' in *The Pilgrim's Progress*?", "back": "The 'City of Destruction' represents the fallen, sinful world, while the 'Celestial City' represents heaven or ultimate spiritual salvation and peace."}, {"front": "What was the historical significance of *The Pilgrim's Progress* in English literature?", "back": "For centuries, *The Pilgrim's Progress* was one of the most widely read books in the English language after the Bible, translated into over 200 languages and often found in homes alongside the Bible."}, {"front": "Who wrote the poem 'Who Has Seen the Wind?'", "back": "Christina Rossetti wrote the poem 'Who Has Seen the Wind?'"}, {"front": "How does Rossetti's poem 'Who Has Seen the Wind?' demonstrate the unseen presence of the wind?", "back": "The poem shows the wind's unseen presence through its effects: 'when the leaves hang trembling, The wind is passing through' and 'when the trees bow down their heads, The wind is passing by.'"}, {"front": "What is the main message of the second stanza of Christina Rossetti's poem 'In the Bleak Midwinter' concerning personal giving?", "back": "The main message is that even if one is poor and has no material gifts to offer, the most valuable gift one can give is one's heart ('Give my heart')."}, {"front": "Where are the Beatitudes found in the Bible?", "back": "The Beatitudes are found in the Gospel of Matthew (Chapter 5, verses 3-12), as the opening words of Jesus' Sermon on the Mount."}, {"front": "According to the Beatitudes, who are promised comfort?", "back": "The Beatitudes state, 'Blessed are they that mourn: for they shall be comforted.'"}, {"front": "What blessing is given to the 'meek' in the Beatitudes?", "back": "The Beatitudes state, 'Blessed are the meek: for they shall inherit the earth.'"}, {"front": "What does it mean to 'hunger and thirst after righteousness,' and what is the promise associated with it?", "back": "To 'hunger and thirst after righteousness' means to deeply desire and seek moral rightness and goodness. The promise is 'for they shall be filled.'"}, {"front": "Who are called 'the children of God' in the Beatitudes?", "back": "The Beatitudes state, 'Blessed are the peacemakers: for they shall be called the children of God.'"}, {"front": "What overarching theme connects *Little Women* and *The Pilgrim's Progress*?", "back": "Both stories share the overarching theme of a spiritual journey or pilgrimage towards goodness, self-improvement, and a heavenly or ideal state, often involving overcoming challenges and internal struggles."}, {"front": "How do Christina Rossetti's poems and the Beatitudes both describe realities that are not physically visible?", "back": "Rossetti's poems describe the unseen wind through its effects and the unseen Christ child as worthy of a heart's gift. The Beatitudes describe unseen spiritual qualities like 'poor in spirit' or 'pure in heart' that lead to unseen blessings like the 'kingdom of heaven' or 'seeing God'."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
