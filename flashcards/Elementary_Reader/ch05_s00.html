<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Open Page &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Open Page &mdash; Chapter 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Elementary_Reader.html">&larr; Back to The Open Page</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is an extended metaphor?", "back": "A comparison where one thing stands for something else throughout an entire poem or text. Anne Bradstreet uses this by comparing her book to a child.", "id": "fc01"}, {"front": "In colonial America, what was a 'primer'?", "back": "A basic reading textbook for young children, often used for over a hundred years in New England, teaching the alphabet alongside faith and virtue.", "id": "fc02"}, {"front": "What is an almanac, as described in the context of Benjamin Franklin?", "back": "A yearly publication containing useful information, calendars, weather predictions, and wise sayings (proverbs).", "id": "fc03"}, {"front": "What does 'thrift' mean in the context of colonial wisdom, particularly associated with Benjamin Franklin?", "back": "The wise use of money and resources, emphasizing the avoidance of waste.", "id": "fc04"}, {"front": "What was the main purpose of Benjamin Franklin's 'Poor Richard's Almanack'?", "back": "To provide weather forecasts, recipes, and witty sayings (proverbs) about money, work, and character, published annually for 25 years.", "id": "fc05"}, {"front": "What was a 'hornbook' in colonial schools?", "back": "A small board covered with a thin sheet of horn, used by children to practice writing because paper was expensive.", "id": "fc06"}, {"front": "Who was Anne Bradstreet, based on the provided text?", "back": "The first published poet in the American colonies, known for writing about love, faith, and everyday life in the New World.", "id": "fc07"}, {"front": "For what is Benjamin Franklin primarily known as an author in this section?", "back": "For publishing 'Poor Richard's Almanack' under the pen name 'Richard Saunders,' filled with practical wisdom and proverbs.", "id": "fc08"}, {"front": "What was unique about the initial publication of Anne Bradstreet's poems?", "back": "Her brother-in-law secretly took her poems to London and had them published without her knowledge, making her the first woman poet published in the New World.", "id": "fc09"}, {"front": "What was the typical content and purpose of 'The New England Primer'?", "back": "It taught children the alphabet with short rhymes, incorporating lessons that pointed young readers toward faith and virtue.", "id": "fc10"}, {"front": "What is the central theme of Anne Bradstreet's 'To My Dear and Loving Husband'?", "back": "The intense and enduring love and spiritual unity between a husband and wife, valued above all earthly riches.", "id": "fc11"}, {"front": "How does Anne Bradstreet use an extended metaphor in 'The Author to Her Book'?", "back": "She compares her book (her poetry) to an 'ill-formed offspring' or a child with blemishes and stumbling feet, representing her self-criticism and the imperfections of her work.", "id": "fc12"}, {"front": "What was Anne Bradstreet's initial reaction to her poems being published without her consent?", "back": "She was embarrassed by the public exposure of her 'ill-formed' work but also felt a sense of pride.", "id": "fc13"}, {"front": "In 'The Author to Her Book,' what does Bradstreet mean by sending her book out in 'homespun cloth'?", "back": "It signifies the simple, unrefined, and unpolished nature of her poetry, acknowledging its imperfections but sending it forth nonetheless.", "id": "fc14"}, {"front": "Provide three examples of proverbs from Benjamin Franklin's 'Poor Richard's Almanack.'", "back": "Examples include: 'Early to bed and early to rise, makes a man healthy, wealthy, and wise.'; 'A penny saved is a penny earned.'; 'An investment in knowledge pays the best interest.'; 'An ounce of prevention is worth a pound of cure.'", "id": "fc15"}, {"front": "What important life lesson did Benjamin Franklin learn from 'The Whistle' incident in his childhood?", "back": "The lesson that one should not 'give too much for the whistle,' meaning not to pay an excessive price for something of little true value or to regret unnecessary purchases.", "id": "fc16"}, {"front": "What does the proverb 'An ounce of prevention is worth a pound of cure' mean?", "back": "It means that it is better and easier to prevent problems or difficulties than to deal with them after they have occurred.", "id": "fc17"}, {"front": "What message does the proverb 'Little strokes fell great oaks' convey?", "back": "It suggests that great accomplishments can be achieved through consistent, persistent effort, even if each individual action seems small.", "id": "fc18"}, {"front": "What pen name did Benjamin Franklin use when publishing 'Poor Richard's Almanack'?", "back": "Richard Saunders.", "id": "fc19"}, {"front": "Based on the text, how did colonial schools differ significantly from modern schools?", "back": "They were typically one-room, mixed-age classrooms with strict schoolmasters, taught letters, numbers, and Bible verses, and often used hornbooks instead of expensive paper.", "id": "fc20"}, {"front": "Why did colonial families place such a high value on education, particularly learning to read?", "back": "They believed that every child should be able to read the Bible, viewing learning to read and learning about faith as intertwined.", "id": "fc21"}, {"front": "How did 'The New England Primer' integrate literacy education with religious instruction?", "back": "Each letter of the alphabet came with a short rhyme, and nearly every lesson included a message about God, sin, or salvation, reflecting the belief that faith and learning went hand in hand.", "id": "fc22"}, {"front": "What does the line 'In Adam's Fall / We sinned all' from 'The New England Primer' reveal about colonial religious beliefs?", "back": "It reflects the Puritan belief in original sin and humanity's inherited fallen state due to Adam's transgression.", "id": "fc23"}, {"front": "Compare the main themes of Anne Bradstreet's 'To My Dear and Loving Husband' and 'The Author to Her Book.'", "back": "'To My Dear and Loving Husband' focuses on intense marital and spiritual love, while 'The Author to Her Book' explores the author's self-consciousness, humility, and the struggle with presenting her imperfect creative work to the public.", "id": "fc24"}, {"front": "How did the colonial environment influence Anne Bradstreet's writing process and the publication of her work?", "back": "Life was hard, so she wrote by candlelight; the lack of formal publishing opportunities led to her work being secretly taken to London and published without her knowledge.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
