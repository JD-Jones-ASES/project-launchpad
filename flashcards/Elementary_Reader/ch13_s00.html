<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Open Page &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Open Page &mdash; Chapter 13</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Elementary_Reader.html">&larr; Back to The Open Page</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Which classic adventure novel features a young boy named Jim Hawkins who finds a treasure map?", "back": "Treasure Island by Robert Louis Stevenson.", "id": "fc01"}, {"front": "Describe the mysterious stranger (the Captain) who arrives at Jim Hawkins' family inn in Treasure Island.", "back": "He is a tall, strong, nut-brown man with a tarry pigtail, scarred hands, a sabre cut on his cheek, and he drinks a lot of rum.", "id": "fc02"}, {"front": "What famous sea song does the Captain often sing at the inn?", "back": "\"Fifteen men on the dead man's chest—\nYo-ho-ho, and a bottle of rum!\"", "id": "fc03"}, {"front": "What specific warning or request does the Captain give Jim Hawkins?", "back": "To keep his \"weather-eye open for a seafaring man with one leg.\"", "id": "fc04"}, {"front": "What kind of stories did the Captain tell that frightened the inn's company?", "back": "Dreadful stories about hanging, walking the plank, storms at sea, and wild deeds of buccaneers on the Spanish Main.", "id": "fc05"}, {"front": "Who wrote Treasure Island?", "back": "Robert Louis Stevenson, a Scottish writer (1850–1894).", "id": "fc06"}, {"front": "What other famous works did Robert Louis Stevenson write?", "back": "A Child's Garden of Verses and Strange Case of Dr Jekyll and Mr Hyde.", "id": "fc07"}, {"front": "What inspired Robert Louis Stevenson to write Treasure Island?", "back": "He drew a colorful map of an imaginary island for his twelve-year-old stepson, which sparked his imagination.", "id": "fc08"}, {"front": "What animal is Rikki-tikki-tavi?", "back": "A mongoose.", "id": "fc09"}, {"front": "What are mongooses famous for, according to the text?", "back": "Their bravery in fighting snakes, even deadly cobras, despite their small size.", "id": "fc10"}, {"front": "What is the motto of the mongoose family, as stated in 'Rikki-Tikki-Tavi'?", "back": "\"Run and find out.\"", "id": "fc11"}, {"front": "How does Rikki-tikki-tavi end up with the human family?", "back": "He is washed out of his burrow by a high summer flood and found by a small boy named Teddy.", "id": "fc12"}, {"front": "Who are Nag and Nagaina in 'Rikki-Tikki-Tavi'?", "back": "They are the big black cobras, a male and female pair, who pose a threat to the human family and garden animals.", "id": "fc13"}, {"front": "How does Kipling build suspense in 'Rikki-Tikki-Tavi, Part 2' during Rikki's confrontation with Nag?", "back": "Through descriptions of Nag's silent waiting coiled around the water jar, Rikki's slow, muscle-by-muscle approach, and the sudden explosion of action when he attacks.", "id": "fc14"}, {"front": "How does Rikki-tikki-tavi ultimately defeat Nag?", "back": "He attacks Nag's head and holds on tightly until the 'big man' (Teddy's father) shoots Nag with a shotgun.", "id": "fc15"}, {"front": "What is Rikki-tikki's strategy to confront Nagaina after Nag's death?", "back": "He finds and crushes 24 of Nagaina's 25 eggs, using the last egg to lure her out and confront her.", "id": "fc16"}, {"front": "What is the final outcome of Rikki-tikki's fight with Nagaina?", "back": "He chases her into her hole after she grabs the last egg, defeats her underground, and emerges victorious.", "id": "fc17"}, {"front": "What real-life mongoose behaviors did Rudyard Kipling accurately describe in 'Rikki-Tikki-Tavi'?", "back": "Their lightning-fast reflexes, ability to dodge cobra strikes, biting the snake behind the head, and using thick fur for some protection against venom.", "id": "fc18"}, {"front": "Who wrote 'Rikki-Tikki-Tavi' and what larger collection is it part of?", "back": "Rudyard Kipling, and it is one of the standalone stories in The Jungle Book.", "id": "fc19"}, {"front": "What is the main purpose of Rudyard Kipling's poem 'If—'?", "back": "It offers advice to his son, John, about the qualities and virtues needed to grow into a good and honorable person.", "id": "fc20"}, {"front": "According to 'If—', how should one treat 'Triumph and Disaster'?", "back": "As \"two impostors,\" meaning they should be treated the same, without being overly affected by either extreme success or failure.", "id": "fc21"}, {"front": "What does Kipling advise about dreams and thoughts in the poem 'If—'?", "back": "To dream but not let dreams become your master, and to think but not make thoughts your only aim.", "id": "fc22"}, {"front": "In 'If—', what is the advice for dealing with deceit and hatred?", "back": "If lied about, don't deal in lies; if hated, don't give way to hating.", "id": "fc23"}, {"front": "What does the line 'Or watch the things you gave your life to, broken, And stoop and build 'em up with worn-out tools' imply?", "back": "It implies resilience and determination to rebuild and persevere even after experiencing significant loss or setbacks.", "id": "fc24"}, {"front": "What challenging action does the poem 'If—' suggest about personal winnings and loss?", "back": "To risk all one's winnings on a single chance, and if lost, to start again from the beginning without ever complaining about the loss.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
