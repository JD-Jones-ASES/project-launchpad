<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Open Page &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Open Page &mdash; Chapter 12</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Elementary_Reader.html">&larr; Back to The Open Page</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Where was Booker T. Washington born and under what circumstances?", "back": "He was born a slave on a plantation in Franklin County, Virginia."}, {"front": "Describe the living conditions of Booker T. Washington's early years as a slave.", "back": "He lived in a log cabin, about fourteen by sixteen feet, with his mother, brother, and sister. It also served as the plantation kitchen, lacked glass windows, and had an ill-fitting door."}, {"front": "What types of tasks did Booker T. Washington perform while enslaved?", "back": "He cleaned yards, carried water to men in the fields, and took corn to the mill (about three miles away) once a week."}, {"front": "What profound impression did school make on young Booker T. Washington?", "back": "He had no schooling as a slave, but seeing children study made him feel that getting into a schoolhouse 'would be about the same as getting into paradise'."}, {"front": "What was 'the most trying ordeal' Booker T. Washington endured as a slave boy?", "back": "Wearing a new flax shirt, made from the roughest and cheapest part of the flax, which he described as causing extreme torture."}, {"front": "How did Booker T. Washington experience the announcement of his freedom?", "back": "A United States officer read a paper (the Emancipation Proclamation), after which they were declared free. His mother cried tears of joy and kissed her children."}, {"front": "What major institution did Booker T. Washington found after emancipation?", "back": "The Tuskegee Institute in Alabama."}, {"front": "What was the primary purpose and philosophy of the Tuskegee Institute?", "back": "It trained African Americans in practical skills like trades, teaching, agriculture, farming, carpentry, and brick-making, believing these skills would empower them to build independent lives."}, {"front": "What was the title of Booker T. Washington's autobiography, and why was it significant?", "back": "Up From Slavery. It became one of the most widely read books in America and inspired generations of readers."}, {"front": "Who was Paul Laurence Dunbar, and what was his significance as a poet?", "back": "He was one of the first African American poets to gain national fame, the son of formerly enslaved parents, known for exploring the joys and sorrows of Black life in America."}, {"front": "What two powerful metaphors does Dunbar use in the provided poems to express hidden suffering?", "back": "A mask ('We Wear the Mask') and a caged bird ('Sympathy')."}, {"front": "In 'We Wear the Mask,' what does the mask primarily symbolize?", "back": "It symbolizes the outward facade of smiles and false contentment that African Americans presented to the world to hide their inner pain, sorrow, and 'tortured souls' from an unsympathetic society."}, {"front": "What is the central message of 'We Wear the Mask'?", "back": "The poem conveys the burden of racial oppression, forcing individuals to conceal their true suffering and struggles behind a 'mask' to survive in a world that doesn't understand or care about their pain."}, {"front": "What does the 'caged bird' in Dunbar's poem 'Sympathy' represent?", "back": "It represents the oppressed individual, particularly African Americans, whose natural desires for freedom and joy are confined and whose song is a 'prayer' or 'plea' from a 'heart's deep core' for liberation."}, {"front": "Why does the caged bird sing, according to Dunbar's poem 'Sympathy'?", "back": "The bird sings not out of joy or glee, but as a 'prayer' and a 'plea' from its 'heart's deep core' while it 'beats its bars' and longs to be free, despite its 'bruised wing and bosom sore'."}, {"front": "What significant literary tribute was paid to Paul Laurence Dunbar by Maya Angelou?", "back": "Maya Angelou titled her famous autobiography 'I Know Why the Caged Bird Sings' in tribute to Dunbar's poem 'Sympathy'."}, {"front": "How did Paul Laurence Dunbar financially support himself early in his career while trying to publish his poetry?", "back": "He worked as an elevator operator in Dayton, Ohio, selling his first book of poems, 'Oak and Ivy', to passengers."}, {"front": "What is O. Henry's real name, and what literary device is he known for?", "back": "His real name was William Sydney Porter, and he was known as a master of the surprise ending in short stories."}, {"front": "Where is the story 'The Last Leaf' set, and who are the main characters introduced?", "back": "It is set in Greenwich Village, New York, and introduces two young artists, Sue and Johnsy (Joanna), who share a studio."}, {"front": "What illness afflicts Johnsy in 'The Last Leaf,' and what is the doctor's prognosis?", "back": "She contracts pneumonia. The doctor gives her only 'one chance in... ten' to live, emphasizing that her desire to live is crucial."}, {"front": "What morbid belief does Johnsy develop regarding her illness?", "back": "She believes she will die when the last leaf falls from the old ivy vine outside her window."}, {"front": "Who is Old Behrman, and how is his artistic career described in 'The Last Leaf'?", "back": "He is an old painter who lives on the ground floor. He is described as 'a failure in art,' having painted for forty years without achieving success."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
