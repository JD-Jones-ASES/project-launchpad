<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Open Page &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Open Page &mdash; Chapter 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Elementary_Reader.html">&larr; Back to The Open Page</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is one primary purpose of ancient Greek hero stories, according to the text?", "back": "Ancient Greeks told stories about heroes and monsters to explain the world and teach courage.", "id": "fc01"}, {"front": "Who was Theseus, and from what city was he a prince?", "back": "Theseus was a young prince from the ancient city of Athens, known for his bravery.", "id": "fc02"}, {"front": "Describe the Minotaur.", "back": "The Minotaur was a terrible creature with the body of a man and the shaggy head and horns of a bull, feeding upon human flesh.", "id": "fc03"}, {"front": "What yearly tribute did King Minos of Crete demand from the Athenians?", "back": "Every year, King Minos compelled the Athenians to send seven young men and seven young maidens into the Labyrinth for the Minotaur to devour.", "id": "fc04"}, {"front": "How did Ariadne assist Theseus in his quest to defeat the Minotaur?", "back": "Ariadne, King Minos's daughter, gave Theseus a sword to fight the Minotaur and a spool of thread to find his way back out of the Labyrinth.", "id": "fc05"}, {"front": "What two qualities were essential for Theseus's success against the Minotaur?", "back": "Theseus used both bravery to face the monster in battle and cleverness by using Ariadne's thread to navigate the Labyrinth.", "id": "fc06"}, {"front": "Who was King Midas, and what was his greatest desire?", "back": "King Midas was a very rich king who loved gold more than anything else in the world, except his daughter. He wished that everything he touched would turn to gold.", "id": "fc07"}, {"front": "What was the immediate effect of King Midas receiving the 'Golden Touch'?", "back": "Immediately, Midas found that his bedclothes, a chair, a table, and even roses in his garden all turned to shining gold upon his touch.", "id": "fc08"}, {"front": "How did the 'Golden Touch' bring Midas great despair?", "back": "The golden touch caused his food to turn to gold, his roses to lose their fragrance, and tragically, transformed his beloved daughter Marygold into a golden statue.", "id": "fc09"}, {"front": "How did King Midas get rid of the dreadful 'Golden Touch'?", "back": "He begged the stranger to take back the gift and was told to bathe in the river, which washed the Golden Touch away and restored Marygold.", "id": "fc10"}, {"front": "What common English phrase originated from the myth of King Midas?", "back": "The phrase 'the Midas touch' is used today to describe someone who is exceptionally good at making money.", "id": "fc11"}, {"front": "What political crisis afflicted England after King Uther Pendragon's death in the King Arthur legend?", "back": "After King Uther Pendragon died, England fell into trouble because no one knew who the rightful king should be, leading to a prayer for a divine sign.", "id": "fc12"}, {"front": "What sign appeared in the churchyard to indicate the true king of England?", "back": "A huge stone appeared with an anvil of iron upon it, and a great sword thrust through both, bearing the inscription: 'Whoso pulleth out this sword from this stone and anvil is the true-born King of England.'", "id": "fc13"}, {"front": "How did Arthur, a young boy, manage to pull the sword from the stone when many knights failed?", "back": "Arthur pulled the sword easily because he needed a sword for his brother Kay's tournament, acting out of service rather than ambition for the crown.", "id": "fc14"}, {"front": "What made Arthur different from the proud lords and knights who tried to pull the sword?", "back": "Arthur demonstrated humility and a cheerful, willing heart, pulling the sword simply to help his brother, not for personal glory or to claim the throne.", "id": "fc15"}, {"front": "Who wrote 'The Eagle,' and what is a key characteristic of this poem?", "back": "Alfred, Lord Tennyson wrote 'The Eagle.' It is notable for being one of the shortest yet most powerful poems in English, comprising just six lines.", "id": "fc16"}, {"front": "What vivid actions and imagery describe the eagle in Tennyson's poem?", "back": "The eagle 'clasps the crag with crooked hands,' 'stands' in lonely lands 'ring'd with the azure world,' 'watches from his mountain walls,' and 'falls' like a thunderbolt.", "id": "fc17"}, {"front": "Who wrote 'The Tyger,' and what collection is it from?", "back": "William Blake wrote 'The Tyger,' which is from his collection *Songs of Experience*.", "id": "fc18"}, {"front": "What profound question does Blake ask about the Tyger's creation?", "back": "Blake asks 'What immortal hand or eye, Could frame thy fearful symmetry?' and 'Did he who made the Lamb make thee?', questioning the nature of the Creator of both gentle and fierce creatures.", "id": "fc19"}, {"front": "What industrial imagery does William Blake use in 'The Tyger' to suggest its powerful creation?", "back": "Blake uses imagery such as 'hammer,' 'chain,' 'furnace,' and 'anvil' to describe the intense process of the Tyger's creation.", "id": "fc20"}, {"front": "Contrast the focus of Tennyson's 'The Eagle' with Blake's 'The Tyger.'", "back": "Tennyson's 'The Eagle' describes the physical presence and predatory power of the bird, while Blake's 'The Tyger' explores philosophical questions about creation, the nature of good and evil, and the Creator's intent.", "id": "fc21"}, {"front": "Define 'avarice.'", "back": "Avarice is an extreme greed for wealth or possessions.", "id": "fc22"}, {"front": "What is a 'labyrinth'?", "back": "A labyrinth is a complicated maze or network of passages from which it is difficult to find one's way out.", "id": "fc23"}, {"front": "Define 'valor.'", "back": "Valor is great courage, especially in battle.", "id": "fc24"}, {"front": "Who was Nathaniel Hawthorne, and what was his role in presenting the Greek myths in this unit?", "back": "Nathaniel Hawthorne was an American author who retold classic Greek myths, like 'The Minotaur' and 'The Golden Touch,' for young readers in his collections *A Wonder-Book* and *Tanglewood Tales*.", "id": "fc25"}, {"front": "Who was Howard Pyle, and how did he contribute to the King Arthur legends in this unit?", "back": "Howard Pyle was an American writer and illustrator who brought the legends of King Arthur to life for young American readers, often illustrating his own books with detailed drawings.", "id": "fc26"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
