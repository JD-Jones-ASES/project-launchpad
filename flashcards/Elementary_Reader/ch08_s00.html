<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Open Page &mdash; Chapter 8</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Elementary_Reader.html">&larr; Back to The Open Page</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the primary motivation for American expansion westward after the new nation was established?", "back": "Americans looked westward for vast prairies, towering peaks, and a seemingly endless frontier."}, {"front": "Who commissioned the Lewis and Clark expedition, and in what year?", "back": "President Thomas Jefferson sent Meriwether Lewis and William Clark on an expedition in 1804."}, {"front": "What was the main purpose of the Lewis and Clark expedition?", "back": "To explore the vast territory west of the Mississippi River."}, {"front": "How long did the Lewis and Clark journey take, and approximately how many miles did they cover?", "back": "Their journey took over two years and covered more than eight thousand miles."}, {"front": "What did Meriwether Lewis meticulously document in his journals?", "back": "He kept detailed journals describing the landscapes, animals, and peoples they encountered."}, {"front": "What dual emotions did Meriwether Lewis experience upon first seeing the Rocky Mountains?", "back": "Initial secret pleasure at being near the head of the Missouri, followed by reflection on the difficulties and hardships of crossing the snowy barrier to the Pacific."}, {"front": "What natural spectacle did Lewis describe on June 13, 1805?", "back": "The Great Falls of the Missouri River, noting the spray like a column of smoke, an 80-foot precipice, and a beautiful rainbow."}, {"front": "Who was Meriwether Lewis, and what made him suitable to lead the expedition?", "back": "Lewis was a Virginia soldier and personal secretary to President Jefferson, chosen for his courage, knowledge of the wilderness, and skill as a naturalist."}, {"front": "What was the historical significance of Lewis and Clark's journals?", "back": "They provided the first detailed descriptions of the American West for people back East."}, {"front": "Who was Sacagawea, and what was her key role in the Lewis and Clark expedition?", "back": "Sacagawea was a young Shoshone woman who served as interpreter and guide for the expedition."}, {"front": "How did Sacagawea's presence, particularly with her infant son, benefit the expedition's interactions with Native American tribes?", "back": "Her presence helped signal to the Native peoples they met that the group came in peace, as a war party would not travel with a mother and baby."}, {"front": "What was the Oregon Trail, and during which decade did it see significant use?", "back": "The Oregon Trail was a two-thousand-mile route from Missouri to the Pacific Northwest, popular in the 1840s."}, {"front": "What city served as a primary hub for emigrants and traders preparing for westward journeys in the 1840s?", "back": "St. Louis was a busy city where emigrants and traders prepared for journeys to Oregon, California, and Santa Fe."}, {"front": "What types of challenges did travelers often face when journeying up the Missouri River by steamboat?", "back": "They faced rapid currents, grating upon snags, and getting stuck on sand-bars, as described by Francis Parkman."}, {"front": "What was the common rendezvous point in Missouri where emigrants gathered before beginning their overland journey on the Oregon Trail?", "back": "Independence, Missouri, served as the common meeting place for emigrants."}, {"front": "Who was Francis Parkman, and what was the title of his famous book about westward travel?", "back": "Francis Parkman was a young Harvard student who traveled the Oregon Trail in 1846 and wrote 'The Oregon Trail,' a significant American travel book."}, {"front": "What initial difficulties did Francis Parkman encounter shortly after beginning his overland journey from Westport?", "back": "His shaft mule reared and plunged, and he soon encountered a deep muddy gully where his cart got stuck for an hour or more."}, {"front": "Why were folk songs important to pioneers traveling westward?", "back": "Pioneers sang songs around campfires to pass the time, lift their spirits, and cope with the hardships of the long journey."}, {"front": "How were traditional folk songs like those sung on the frontier typically transmitted?", "back": "They were passed from person to person by word of mouth, often leading to changes in the words from singer to singer."}, {"front": "Compare the themes portrayed in 'Home on the Range' and 'Sweet Betsy from Pike' regarding frontier life.", "back": "'Home on the Range' celebrates the beauty and peace of the open West, while 'Sweet Betsy from Pike' tells a humorous tale of the hardships and difficulties encountered on the trail."}, {"front": "What specific imagery and themes are present in 'Home on the Range'?", "back": "It depicts a home where buffalo, deer, and antelope roam, where discouraging words are seldom heard, skies are clear, and the air is pure."}, {"front": "What kind of challenges are humorously described in 'Sweet Betsy from Pike'?", "back": "It describes Betsy giving out in the desert, animals dying, the last piece of bacon being fried, and general discouragement and sadness."}, {"front": "According to the text, how is a 'folk song' defined?", "back": "Folk songs are songs that belong to everyone—no single person 'owns' them, and they are typically learned by listening rather than being written down."}, {"front": "What was the approximate daily travel distance and total duration for a wagon train journey from Missouri to California or Oregon?", "back": "Wagon trains could travel only about fifteen miles a day, and the trip took four to six months."}, {"front": "Why did many trail songs frequently incorporate humor?", "back": "Laughter helped the travelers keep their spirits up amidst the hardships and challenges of the long journey."}, {"front": "Define the term 'frontier' as used in the context of westward expansion.", "back": "The 'frontier' refers to the border of settled land; the edge of the known world."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
