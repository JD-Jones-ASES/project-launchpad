<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Open Page &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Open Page &mdash; Chapter 10</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Elementary_Reader">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central theme of Chapter 10, 'Slavery and Freedom: Voices of Conscience'?", "back": "The chapter explores the experiences of enslaved individuals and the efforts of abolitionists through their own words and creations."}, {"front": "What types of literary forms will be explored in this unit to present 'voices of conscience'?", "back": "Autobiography, speech, poetry, and fiction."}, {"front": "What is meant by 'voices of conscience' in the context of slavery and freedom?", "back": "It refers to the personal accounts, arguments, and artistic expressions of those who experienced slavery or were morally compelled to fight against it."}, {"front": "How do autobiographies, such as slave narratives, contribute to our understanding of slavery?", "back": "They provide firsthand accounts of the brutalities, emotional toll, and daily lives of enslaved people, offering personal perspectives often absent from official records."}, {"front": "What was the primary purpose of abolitionist speeches during the era of slavery?", "back": "To inform the public about the horrors of slavery, rally support for the abolitionist cause, and persuade lawmakers to end the institution."}, {"front": "How might poetry serve as a tool for resistance or advocacy against slavery?", "back": "Poetry could convey deep emotions, critique societal injustices through allegory or direct address, and inspire empathy or action among readers."}, {"front": "In what ways could fiction shed light on the realities of slavery, even if not based on a single true story?", "back": "Fiction could explore the psychological impacts, family separations, and moral dilemmas of slavery, creating relatable narratives that humanize the enslaved and expose the system's cruelty."}, {"front": "Why is it crucial to study the perspectives of 'those who endured slavery'?", "back": "To understand the human cost of slavery directly from those who suffered it, challenging biased historical narratives and acknowledging their agency and resilience."}, {"front": "What significance do the 'voices of those who fought to end it' hold?", "back": "They reveal the strategies, arguments, and moral courage required to challenge a deeply entrenched institution, inspiring future social justice movements."}, {"front": "What common themes are often found in the autobiographical accounts of formerly enslaved people?", "back": "Themes often include the struggle for literacy, the pain of family separation, resistance, the journey to freedom, and the quest for human dignity."}, {"front": "How do primary sources like those discussed in this chapter differ from secondary sources?", "back": "Primary sources are original materials from the time period (e.g., autobiographies, speeches), while secondary sources are interpretations or analyses of those events by later historians."}, {"front": "What is the value of studying a mix of literary forms (autobiography, speech, poetry, fiction) regarding slavery?", "back": "Each form offers a unique lens, together providing a comprehensive, multi-faceted understanding of the institution of slavery and the fight against it."}, {"front": "What challenges might an author of a slave narrative face when recounting their experiences?", "back": "Challenges could include traumatic memories, skepticism from white audiences, fears of retribution, and the difficulty of articulating unimaginable suffering."}, {"front": "How did the publication of slave narratives impact the abolitionist movement?", "back": "They provided undeniable evidence of slavery's brutality, humanized enslaved people, and galvanized public opinion against the institution, fueling the abolitionist cause."}, {"front": "What is an 'abolitionist'?", "back": "An abolitionist was a person who advocated for the complete and immediate end to slavery."}, {"front": "How did the concept of 'freedom' manifest differently for enslaved individuals versus abolitionists?", "back": "For enslaved individuals, freedom was often literal emancipation and autonomy; for abolitionists, it was the moral imperative to end an unjust system for all."}, {"front": "What role did empathy play in the effectiveness of 'voices of conscience' against slavery?", "back": "These voices aimed to evoke empathy in readers and listeners, making the abstract concept of slavery a concrete, personal tragedy that demanded action."}, {"front": "How might the literary devices used in poetry about slavery enhance its message?", "back": "Devices like metaphor, imagery, and symbolism could powerfully convey suffering, hope, or defiance, making the message more impactful and memorable."}, {"front": "What analytical questions should students ask when examining an autobiography from this period?", "back": "Students should consider the author's purpose, audience, the historical context, the narrative's structure, and how personal experience illuminates broader historical truths."}, {"front": "What is the significance of the word 'conscience' in the chapter title?", "back": "It highlights the moral dimension of the struggle, emphasizing that opposition to slavery stemmed from a deep-seated belief in human rights and justice."}, {"front": "How did the concept of literacy connect to the pursuit of freedom for many enslaved individuals?", "back": "Literacy was often seen as a path to self-emancipation, enabling enslaved people to read abolitionist texts, write their own stories, and understand legal pathways to freedom."}, {"front": "What is one way fiction can explore the complexities of slavery beyond individual experience?", "back": "Fiction can create composite characters or scenarios that represent the collective experiences, systemic injustices, and diverse perspectives within the institution of slavery."}, {"front": "Why might historians and literary scholars value these 'voices' as historical documents?", "back": "They offer invaluable insights into the social, cultural, and political landscape of the era from marginalized perspectives, often challenging official records."}, {"front": "How did speeches from formerly enslaved people often differ from those of white abolitionists?", "back": "Speeches by formerly enslaved individuals often carried greater moral authority due to their direct experience, focusing on personal testimony and lived realities."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
