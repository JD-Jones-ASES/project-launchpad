<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Open Page &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Open Page &mdash; Chapter 10</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Elementary_Reader">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was a primary reason slaveholders made it illegal to teach enslaved people to read and write?", "back": "Slaveholders feared that literacy would make enslaved people harder to control, potentially leading to rebellion or a desire for freedom."}, {"front": "How did Frederick Douglass's mistress, Sophia Auld, initially treat his desire to learn to read?", "back": "She kindly commenced to instruct him, indicating an initial willingness to teach him."}, {"front": "Why did Frederick Douglass's mistress stop teaching him to read, and what did she come to believe?", "back": "She stopped teaching him in compliance with her husband's advice, as she came to believe that education and slavery were incompatible."}, {"front": "What 'stratagem' did young Frederick Douglass use to learn to read on the streets of Baltimore?", "back": "He befriended little white boys, exchanging bread for lessons, converting them into his teachers."}, {"front": "How did Frederick Douglass learn to write?", "back": "He learned letters from carpenters at a shipyard and then challenged other boys to 'prove' he could write by copying their letters on fences, walls, and pavements with chalk."}, {"front": "What was the significance of Frederick Douglass's *Narrative of the Life of Frederick Douglass*?", "back": "Published in 1845, it was a powerful autobiography that exposed the horrors of slavery to thousands of readers, influencing the abolitionist movement."}, {"front": "Why was Frederick Douglass at risk by including real names and places in his narrative?", "back": "It put him in danger of being captured and returned to slavery, as it provided verifiable details about his identity and escape."}, {"front": "What was the setting and main topic of Sojourner Truth's famous 'Ain't I a Woman?' speech?", "back": "It was delivered at a women's rights convention in Akron, Ohio, in 1851, addressing arguments that women were too delicate and weak to deserve equal rights."}, {"front": "How did Sojourner Truth use her personal experiences to challenge notions of female delicacy?", "back": "She recounted her physical strength from working, enduring the lash, and bearing thirteen children (most sold into slavery), highlighting her resilience and capability."}, {"front": "Explain Sojourner Truth's 'cup holds a pint' analogy regarding intellect.", "back": "She argued that even if a woman's intellect (like a cup) was perceived as smaller, it would still be 'mean' to deny her the right to have her 'little half-measure full,' implying everyone deserves their full rights."}, {"front": "How did Sojourner Truth respond to the argument that women couldn't have equal rights because Christ was not a woman?", "back": "She countered by asking, 'Where did your Christ come from? From God and a woman! Man had nothing to do with Him,' emphasizing the crucial role of women."}, {"front": "Who was John Greenleaf Whittier, and what was his motivation for writing anti-slavery poetry?", "back": "He was a Quaker poet and abolitionist who used his poetry to fight against slavery, believing it could change hearts and minds and give voice to the suffering of enslaved people."}, {"front": "What is the central theme of Whittier's poem 'The Farewell of a Virginia Slave Mother'?", "back": "The poem expresses the profound anguish and grief of a mother whose children are being sold away from her to a harsh life in a rice-swamp."}, {"front": "What literary device does Whittier employ with the repeated lines 'Gone, gone,—sold and gone' in his poem, and what is its effect?", "back": "He uses a refrain, which acts like a mournful cry, making the reader feel the mother's escalating grief and emphasizing the tragedy of family separation."}, {"front": "What specific imagery does Whittier use to describe the horrific conditions awaiting the sold children in the rice-swamp?", "back": "He depicts it as 'dank and lone,' with a 'slave-whip ceaseless swings,' 'noisome insect stings,' 'fever-demon strews poison,' and 'sickly sunbeams glare.'"}, {"front": "What significant impact did Harriet Beecher Stowe's novel *Uncle Tom's Cabin* have in 1852?", "back": "It shook the nation, powerfully depicting the stories of enslaved people with such compassion that it helped turn millions of Americans against slavery."}, {"front": "Describe the unique friendship portrayed between Uncle Tom and Eva in *Uncle Tom's Cabin*.", "back": "It was a tender friendship that crossed the boundaries of slavery, with Tom loving Eva as both earthly and divine, and Eva often reading the Bible to him."}, {"front": "How did *Uncle Tom's Cabin* contribute to the abolitionist cause, beyond just telling a story?", "back": "It humanized enslaved people, evoking empathy and exposing the moral atrocities of slavery through compelling characters and narrative, thereby strengthening anti-slavery sentiment."}, {"front": "What overarching goal connected the works and efforts of Frederick Douglass, Sojourner Truth, John Greenleaf Whittier, and Harriet Beecher Stowe?", "back": "All four used their distinctive voices and talents—autobiography, speech, poetry, and fiction—to expose the injustices of slavery and fight for freedom and human rights."}, {"front": "According to the overview, through what different literary forms did the 'voices of conscience' against slavery express themselves in this unit?", "back": "Through autobiography, speech, poetry, and fiction."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
