<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Open Page &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Open Page &mdash; Chapter 11</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Elementary_Reader.html">&larr; Back to The Open Page</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the historical context for Abraham Lincoln's Gettysburg Address?", "back": "In November 1863, four months after the devastating Battle of Gettysburg, Lincoln delivered the address at the dedication of a national cemetery for the fallen soldiers.", "id": "fc01"}, {"front": "According to the Gettysburg Address, what central idea was the Civil War testing for the American nation?", "back": "The war was testing 'whether that nation, or any nation so conceived and so dedicated, can long endure'—a nation 'conceived in Liberty, and dedicated to the proposition that all men are created equal.'", "id": "fc02"}, {"front": "In the Gettysburg Address, what was the 'great task remaining' that Lincoln urged the living to undertake?", "back": "The living should dedicate themselves to the 'unfinished work' for which the soldiers fought, ensuring their sacrifice was not in vain, leading to a 'new birth of freedom' and the preservation of 'government of the people, by the people, for the people.'", "id": "fc03"}, {"front": "Despite its brevity, why is the Gettysburg Address considered one of the greatest speeches in history?", "back": "Though only 272 words and lasting about two minutes, its powerful articulation of national purpose, equality, and sacrifice has resonated through centuries, as noted by Edward Everett.", "id": "fc04"}, {"front": "What was the core message of Abraham Lincoln's Second Inaugural Address in March 1865, near the war's end?", "back": "Lincoln called for national healing and reconciliation: 'With malice toward none; with charity for all... let us strive on to finish the work we are in; to bind up the nation's wounds... to achieve and cherish a just, and a lasting peace.'", "id": "fc05"}, {"front": "What were Abraham Lincoln's two major achievements as President during the Civil War?", "back": "He successfully led the country through its greatest crisis, the Civil War, and issued the Emancipation Proclamation, which declared enslaved people in Confederate states free.", "id": "fc06"}, {"front": "When and by whom was President Abraham Lincoln assassinated?", "back": "He was assassinated by John Wilkes Booth on April 14, 1865, just five days after the Civil War ended.", "id": "fc07"}, {"front": "Who was Sullivan Ballou, and what was the context of his famous letter to his wife, Sarah?", "back": "Sullivan Ballou was a major in the 2nd Rhode Island Volunteers. He wrote the letter on July 14, 1861, one week before the First Battle of Bull Run, expressing his premonition of death.", "id": "fc08"}, {"front": "How did Sullivan Ballou describe the conflict between his love for his wife and his love for his country in his letter?", "back": "He wrote that his 'love for you [Sarah] is deathless,' but his 'love of Country comes over me like a strong wind and bears me irresistibly on... to the battlefield,' indicating his willingness to sacrifice.", "id": "fc09"}, {"front": "What was Sullivan Ballou's fate after writing his heartfelt letter?", "back": "He was killed at the First Battle of Bull Run on July 21, 1861, the first major battle of the Civil War.", "id": "fc10"}, {"front": "How did Sullivan Ballou's letter become widely known to the American public decades after his death?", "back": "It was featured prominently and read aloud in Ken Burns's acclaimed 1990 documentary, *The Civil War*, moving millions of viewers.", "id": "fc11"}, {"front": "What was the significance of the First Battle of Bull Run in the early stages of the Civil War?", "back": "Fought on July 21, 1861, it was the first major battle. It resulted in a shocking Union defeat, disproving public expectations of a quick war and showing both sides it would be long and costly.", "id": "fc12"}, {"front": "What inspired Julia Ward Howe to write the 'Battle Hymn of the Republic'?", "back": "During a visit to Union army camps in November 1861, she heard soldiers singing 'John Brown's Body' and was prompted by a friend to write more 'worthy' words for the tune.", "id": "fc13"}, {"front": "When and where was the 'Battle Hymn of the Republic' first published, and what was its immediate impact?", "back": "It was published in *The Atlantic Monthly* in February 1862 and quickly became recognized as 'the anthem of the Union cause.'", "id": "fc14"}, {"front": "What is a prominent religious and moral theme conveyed in the 'Battle Hymn of the Republic' concerning the Union's struggle?", "back": "It portrays the Union cause as a righteous, divinely ordained mission, equating the fight for freedom with a spiritual battle and urging soldiers to 'die to make men free' as Christ died to make men holy.", "id": "fc15"}, {"front": "What other significant cause did Julia Ward Howe champion after writing the 'Battle Hymn of the Republic'?", "back": "She became a prominent advocate for women's rights, co-founding the American Woman Suffrage Association and becoming the first woman elected to the American Academy of Arts and Letters.", "id": "fc16"}, {"front": "What historical event prompted Walt Whitman to write his elegy, 'O Captain! My Captain!'?", "back": "He wrote the poem in April 1865, shortly after the assassination of President Abraham Lincoln, which occurred just days after the end of the Civil War.", "id": "fc17"}, {"front": "What literary form is 'O Captain! My Captain!' an example of, and what is its purpose?", "back": "It is an elegy, a type of poem specifically written to mourn the dead. In this case, it mourns the death of President Abraham Lincoln.", "id": "fc18"}, {"front": "Explain the central metaphor used in Walt Whitman's 'O Captain! My Captain!'", "back": "The 'Captain' represents Abraham Lincoln, the 'ship' symbolizes the United States, the 'fearful trip' is the Civil War, and the 'prize we sought is won' signifies the Union victory.", "id": "fc19"}, {"front": "What contrasting emotions does 'O Captain! My Captain!' effectively convey?", "back": "The poem simultaneously conveys the nation's joy and relief at the conclusion of the Civil War ('the bells I hear, the people all exulting') and the profound grief and sorrow over the assassination of its leader, Lincoln ('O the bleeding drops of red').", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
