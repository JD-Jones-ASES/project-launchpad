<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Open Page &mdash; Chapter 14</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Elementary_Reader.html">&larr; Back to The Open Page</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is often called the 'Father of the National Parks'?", "back": "John Muir."}, {"front": "What region did John Muir explore, documented in 'My First Summer in the Sierra'?", "back": "The Sierra Nevada mountains of California, specifically the high country above Yosemite Valley and the headwaters of the Merced and Tuolumne rivers."}, {"front": "How does Muir describe the mountains in 'My First Summer in the Sierra'?", "back": "He describes them as if they were alive and full of glory, kindling enthusiasm and making him feel an inseparable, immortal part of nature."}, {"front": "What significant event involving John Muir helped lead to the protection of Yosemite?", "back": "His camping trip with President Theodore Roosevelt in 1903, where Muir convinced Roosevelt of the need for federal protection for Yosemite Valley."}, {"front": "What was unique about Emily Dickinson's life and the publication of her poems?", "back": "She lived a quiet life in Amherst, Massachusetts, rarely leaving home, and wrote nearly 1,800 poems, most of which were not published until after her death."}, {"front": "What are 'fascicles' in the context of Emily Dickinson's work?", "back": "Small booklets of poems that Dickinson sewed together using needle and thread, often written on scraps of paper and hidden."}, {"front": "In 'A Bird Came Down the Walk,' what is the speaker's interaction with the bird?", "back": "The speaker observes the bird eating a worm and drinking dew, then cautiously offers it a crumb, which causes the bird to fly away 'softer home.'"}, {"front": "What is the central message of Emily Dickinson's poem 'I'm Nobody! Who Are You?'", "back": "It explores the value of anonymity and private existence, contrasting it with the 'dreary' and 'public' nature of being 'Somebody.'"}, {"front": "What metaphor does Emily Dickinson use for 'Hope' in her poem 'Hope Is the Thing with Feathers'?", "back": "She describes hope as a 'thing with feathers' that perches in the soul, sings wordlessly, and never stops."}, {"front": "According to Dickinson's 'Hope Is the Thing with Feathers,' when is hope heard sweetest and what does it never ask for?", "back": "It is heard sweetest 'in the Gale' (during hardship) and never asks for 'a crumb' in return, even in extremity."}, {"front": "Who was William Wordsworth, and what was a key characteristic of his poetic philosophy?", "back": "He was one of England's great Romantic poets who believed poetry should use simple language and draw on personal experience in nature."}, {"front": "What natural scene inspired Wordsworth's poem 'I Wandered Lonely as a Cloud'?", "back": "He and his sister Dorothy came upon a 'host, of golden daffodils' dancing beside a lake (Ullswater in England's Lake District)."}, {"front": "What 'wealth' does the memory of the daffodils bring to the speaker in Wordsworth's poem?", "back": "When he is in a 'vacant or in pensive mood,' the memory of the dancing daffodils flashes upon his 'inward eye,' filling his heart with pleasure and making it dance."}, {"front": "What is Robert Frost's poetic style often characterized by?", "back": "His poems often use plain words and seem simple on the surface but hold surprising depth beneath, drawing inspiration from New England nature and farms."}, {"front": "What is the central theme of Robert Frost's 'The Road Not Taken'?", "back": "It explores the idea of choice and its irreversible consequences, reflecting on individuality and the paths taken (or not taken) in life."}, {"front": "What do the 'two roads' symbolize in Robert Frost's 'The Road Not Taken'?", "back": "They symbolize the divergent paths and choices individuals face in life, with the speaker ultimately choosing the 'one less traveled by.'"}, {"front": "How do William Wordsworth and Robert Frost both use nature in their poems, despite living a century apart?", "back": "Both poets found deep inspiration in the natural world, using scenes from nature (daffodils, divergent paths) to explore bigger ideas about life, emotion, and choice."}, {"front": "Who was Henry David Thoreau, and what was his famous experiment in deliberate living?", "back": "He was an American transcendentalist writer who built a cabin by Walden Pond and lived there alone for two years to strip life down to its essentials."}, {"front": "Where did Thoreau conduct his experiment, which led to the writing of 'Walden'?", "back": "At Walden Pond, near Concord, Massachusetts."}, {"front": "What was Thoreau's stated primary reason for going to the woods, as written in 'Walden'?", "back": "He went 'to live deliberately, to front only the essential facts of life, and see if I could not learn what it had to teach, and not, when I came to die, discover that I had not lived.'"}, {"front": "What does Thoreau mean by the phrase 'suck out all the marrow of life'?", "back": "He means to live deeply, intensely, and extract the absolute essence and meaning from existence, leaving nothing unexplored or unexperienced."}, {"front": "What core value does Thoreau emphasize at the very end of the provided text from 'Walden'?", "back": "Simplicity ('Simplicity, simplicity, simplici...')."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
