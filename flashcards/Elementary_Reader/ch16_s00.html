<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Open Page &mdash; Chapter 16</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Elementary_Reader">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary message conveyed by Emma Lazarus's poem, 'The New Colossus'?", "back": "The poem serves as America's welcome to immigrants, offering hope and refuge to the 'tired, your poor, your huddled masses yearning to breathe free'."}, {"front": "How does Lazarus's 'Mother of Exiles' compare to the 'brazen giant of Greek fame' mentioned in 'The New Colossus'?", "back": "Unlike the conquering Greek giant, the 'Mother of Exiles' represents a welcoming figure with a torch, offering worldwide welcome rather than conquest, standing at America's 'sea-washed, sunset gates'."}, {"front": "What was the purpose of Jacob Riis's book, 'How the Other Half Lives'?", "back": "Riis's book used words and photographs to expose the harsh conditions faced by newcomers and the working poor living in New York City's tenements, aiming to shock readers and prompt reform."}, {"front": "Describe the contrast between the promise in Lazarus's poem and the reality Riis describes.", "back": "Lazarus's poem offers a promise of welcome and a better life for immigrants, while Riis's work vividly portrays the grim reality of overcrowding, poverty, and harsh living conditions in urban tenements."}, {"front": "What role did the Statue of Liberty play for immigrants arriving in America between 1880 and 1920?", "back": "Millions of immigrants passed beneath the Statue of Liberty in New York Harbor, seeing it as a symbol of America's welcome and the promise of a new life, a sentiment captured by Lazarus's poem."}, {"front": "Who was Emma Lazarus and what is a significant fact about her poem, 'The New Colossus'?", "back": "Emma Lazarus was a Jewish American poet who wrote 'The New Colossus' in 1883 to raise money for the Statue of Liberty's pedestal. It was engraved on a bronze plaque and mounted inside the pedestal in 1903."}, {"front": "Who was Jacob Riis and what was the impact of his work?", "back": "Jacob Riis was a Danish immigrant who used words and photographs in 'How the Other Half Lives' to expose tenement conditions, which helped bring about housing reform."}, {"front": "What caused the increased demand for strong dogs like Buck in 'The Call of the Wild'?", "back": "The Klondike Gold Rush, which attracted thousands of men to the frozen North, created a booming demand for heavy, strong, furry-coated dogs to toil and withstand the frost."}, {"front": "Describe Buck's life at Judge Miller's place before he was kidnapped.", "back": "Buck lived a comfortable, privileged life at a large estate in the Santa Clara Valley, ruling over the demesne, not confined as a house-dog or kennel-dog, and participating in various family activities."}, {"front": "Who was Jack London and what real-life experience heavily influenced 'The Call of the Wild'?", "back": "Jack London was an adventurous American author who joined the Klondike Gold Rush in 1897 and spent a winter in the Yukon Territory, which provided the material for his stories, including 'The Call of the Wild'."}, {"front": "How quickly did Buck's world change in 'The Call of the Wild'?", "back": "Buck's world changed almost instantaneously from a comfortable life in California to being violently kidnapped, choked, and thrown into a baggage car, signaling his abrupt entry into a new, harsh reality."}, {"front": "What historical event is the subject of Alfred, Lord Tennyson's poem, 'The Charge of the Light Brigade'?", "back": "The poem describes a disastrous military action during the Crimean War on October 25, 1854, where a brigade of British cavalry charged directly into a valley defended by Russian cannons due to a mistaken order."}, {"front": "What famous lines from 'The Charge of the Light Brigade' express the soldiers' unwavering obedience despite a clear blunder?", "back": "'Theirs not to make reply, / Theirs not to reason why, / Theirs but to do and die.'"}, {"front": "Who was Alfred, Lord Tennyson, and what was his significance in the Victorian era?", "back": "Alfred, Lord Tennyson was Poet Laureate of Great Britain for over forty years and one of the most popular poets of the Victorian era, whose works were widely read and memorized."}, {"front": "What was Tennyson's motivation for writing 'The Charge of the Light Brigade' so quickly?", "back": "Tennyson wrote the poem within minutes of reading about the disaster in a newspaper, driven by admiration for the soldiers' courage and bravery despite the tragic mistake."}, {"front": "What makes 'The Charge of the Light Brigade' distinct in its literary form and impact?", "back": "The poem is known for its galloping rhythm, imitating charging horses, and became one of the most famous poems about war ever written, honoring the soldiers' courage."}, {"front": "What was the Harlem Renaissance?", "back": "The Harlem Renaissance was an extraordinary flourishing of African American art, music, and literature in the 1920s, centered in the Harlem neighborhood of New York City."}, {"front": "Who was Langston Hughes, and what did he believe about African American life in literature?", "back": "Langston Hughes was a leading voice of the Harlem Renaissance. He believed that the everyday lives and voices of Black Americans deserved a place in great literature and celebrated Black identity and American heritage."}, {"front": "Based on the provided stanzas, what is the main theme of Langston Hughes's 'The Negro Speaks of Rivers'?", "back": "The main theme is the deep and ancient connection of the African American soul to historical rivers, symbolizing enduring heritage, wisdom, and resilience through time."}, {"front": "How does 'The Negro Speaks of Rivers' connect the past, present, and future?", "back": "The poem connects the speaker's soul to 'ancient as the world' rivers (past), signifies a deep present identity ('My soul has grown deep like the rivers'), and implicitly carries this heritage into the future."}, {"front": "What was the significance of the Crimean War in terms of war reporting?", "back": "The Crimean War (1853–1856) was one of the first wars to be covered by newspaper reporters and photographers on the scene, allowing the public to read about events like the charge at Balaclava and react with outrage."}, {"front": "Approximately how many people were living in New York City's tenements by 1890, according to Jacob Riis?", "back": "More than twelve hundred thousand persons (1.2 million) called the thirty-seven thousand tenements home by 1890, with three-fourths of the city's people living in them."}, {"front": "What was the 'yellow metal' that drew thousands of men to the Northland in 'The Call of the Wild'?", "back": "The 'yellow metal' refers to gold, discovered by men 'groping in the Arctic darkness,' which sparked the Klondike Gold Rush."}, {"front": "What is the meaning of 'sanitarian' as used in Jacob Riis's text?", "back": "A 'sanitarian' refers to a public health worker, indicating concern for sanitation and living conditions in the tenements."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
