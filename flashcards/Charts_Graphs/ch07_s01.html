    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading Charts, Graphs, and Diagrams &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Charts_Graphs">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a treemap?", "back": "A treemap displays data as a set of nested rectangles, where each rectangle's area (width times height) is proportional to the value it represents."}, {"front": "What type of data are treemaps especially useful for displaying?", "back": "Treemaps are especially useful for showing hierarchical data – data that has categories inside categories."}, {"front": "What is the primary limitation of pie charts that treemaps aim to solve?", "back": "Pie charts become confusing and unreadable with a large number of slices, and they cannot easily show hierarchical data (categories within categories), which treemaps handle well."}, {"front": "In a treemap, what visual property of a rectangle represents its value?", "back": "The area (width times height) of each rectangle is proportional to the value it represents, not just its height or width alone."}, {"front": "Define 'hierarchy' in the context of data visualization and treemaps.", "back": "A hierarchy is a structure where items are organized into levels, with larger groups containing smaller sub-groups (e.g., a school district containing schools, which contain grade levels). Treemaps can show multiple levels of this structure."}, {"front": "Describe the conceptual process of how a treemap is built.", "back": "Imagine a main rectangle representing a total. It's cut into large pieces proportional to major categories. Each large piece is then cut into smaller pieces proportional to sub-categories within it."}, {"front": "What is the key insight when interpreting rectangle sizes in a treemap?", "back": "The key insight is: bigger rectangle = bigger value. You compare sizes by eye to understand relative proportions, rather than reading numbers off an axis."}, {"front": "What is the first step when reading a treemap?", "back": "Read the title to understand what the whole rectangle represents and what the total value is."}, {"front": "How do you identify the top-level groups in a treemap?", "back": "Top-level groups are typically the large, bordered sections of the treemap, often labeled and color-coded."}, {"front": "How do you determine which sub-category has the largest value within a specific top-level group?", "back": "Within that top-level group's rectangle, identify the sub-rectangle with the largest area. That sub-category has the largest value within that specific group."}, {"front": "What does the color legend typically indicate in a treemap?", "back": "Color usually indicates which top-level group a sub-rectangle belongs to, often using shades of one color for one group and shades of another color for a different group."}, {"front": "What is a common misconception about comparing rectangles in a treemap across different parent categories?", "back": "It's common to try to compare rectangles across different parent categories without accounting for the fact that those parent categories have different totals. Comparison is most valid within one group."}, {"front": "True or False: Treemaps require the data to be sorted by size.", "back": "False. While many programs sort by size automatically, the key feature of a treemap is proportional area, not the order of the rectangles."}, {"front": "Who invented treemaps and when?", "back": "Treemaps were invented in 1990 by computer scientist Ben Shneiderman at the University of Maryland."}, {"front": "What problem was Ben Shneiderman trying to solve when he invented treemaps?", "back": "He was trying to visualize which files were taking up too much space on his computer's hard drive, realizing that seeing each file as a rectangle sized by storage use would help spot 'space hogs'."}, {"front": "Give an example of hierarchical data suitable for a treemap, different from the school budget example.", "back": "A company's sales data, broken down by region, then by product category within each region."}, {"front": "If a tall, narrow rectangle and a short, wide rectangle in a treemap represent the same value, what must be true about their dimensions?", "back": "Their areas (width multiplied by height) must be equal, even if their individual heights or widths differ significantly."}, {"front": "According to the Westview Middle School budget example, which main area consumed the largest portion of the budget and approximately what percentage?", "back": "Academics consumed the largest portion, taking up approximately 59% of the total budget (65,000 out of110,000)."}, {"front": "In the Westview Middle School budget treemap, what was the largest single line item across all categories, and what does this suggest about the school's priorities?", "back": "Teacher salaries ($45,000) was the largest single line item. This suggests the school spends most of its money on its instructional staff, indicating a high priority on teaching."}, {"front": "Why is it important to remember 'Area, Not Height!' when reading a treemap?", "back": "Because the value is encoded by the entire area of the rectangle, not just its vertical or horizontal dimension. Focusing only on height or width would lead to misinterpretations of the proportional values."}, {"front": "When comparing large groups to each other in a treemap, what should you look for?", "back": "Look for which top-level group takes up the most overall space (area) within the entire treemap, as this indicates the group with the highest total value."}, {"front": "How can an extension activity like drawing a hand-made treemap of a 24-hour day reinforce the concept of treemaps?", "back": "It reinforces the area-encoding concept by requiring students to estimate percentages and cut proportional rectangles, making the abstract concept of area representing value more concrete."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
