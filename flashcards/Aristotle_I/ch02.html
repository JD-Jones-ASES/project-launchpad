<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Man (Aristotle I) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a distinctive feature of Aristotle's ethical writing method?", "back": "He begins by gathering \"endoxa\" (reputable common opinions) and subjecting them to scrutiny, rather than deducing from a first principle."}, {"front": "What does Aristotle mean by \"endoxa\"?", "back": "Literally \"reputable opinions\"—views held by most people or the wise, which Aristotle treats as data containing genuine insight."}, {"front": "What is the \"dialectical approach\" in Aristotelian ethics?", "back": "Aristotle's method of starting from common opinions, refining them to make sense of human experience, identifying correct intuitions, and correcting confused ones."}, {"front": "According to Aristotle, what is the conclusion about human happiness derived from the Function Argument?", "back": "Human happiness (eudaimonia) is the active exercise of the soul's capacities in accordance with virtue, over a complete life."}, {"front": "What is Step 1 of Aristotle's Function Argument?", "back": "Every craft, art, and profession has a characteristic function (ergon)—what it is for."}, {"front": "What is Step 2 of Aristotle's Function Argument?", "back": "For things that have a function, being good at that thing means performing its function excellently."}, {"front": "What is Step 3 of Aristotle's Function Argument, concerning humans?", "back": "Humans, as humans, must have some characteristic function distinct from mere life or sensation (shared with plants and animals)."}, {"front": "What is Step 4 of Aristotle's Function Argument, identifying the distinctive human function?", "back": "The function distinctive to humans is the activity of the soul in accordance with reason—the life lived by a rational, choosing, reasoning being."}, {"front": "What is Step 5 of Aristotle's Function Argument, linking human function to happiness?", "back": "The good for a human being—happiness (eudaimonia)—is performing this distinctively human function excellently: activity of the soul in accordance with virtue (arete)."}, {"front": "Identify two philosophical challenges often raised about Aristotle's Function Argument.", "back": "(1) Whether it is true that humans have a single defining function, and (2) whether \"good\" for a thing necessarily means \"performing its function.\""}, {"front": "State the core principle of Aristotle's Doctrine of the Mean.", "back": "Virtue (hexis) is a stable disposition that aims at the mean between two vices: excess and deficiency, where the mean is relative to the person and situation."}, {"front": "Define \"hexis\" in Aristotle's ethics.", "back": "A stable state or disposition of character, a reliable tendency to act and feel in a certain way, suggesting something \"held\" or \"settled\" in the soul."}, {"front": "Give an example of a virtue and its two corresponding vices of excess and deficiency, as per Aristotle's Doctrine of the Mean.", "back": "Courage is the mean between cowardice (too much fear, too little confidence) and rashness (too little fear, too much confidence)."}, {"front": "How is the \"mean\" determined in Aristotle's ethics, and why is it not a mathematical average?", "back": "The mean is determined by practical wisdom (phronesis) and is relative to the person and situation, not a fixed arithmetic midpoint."}, {"front": "How does Aristotle believe a virtuous person experiences emotions?", "back": "The virtuous person feels the right emotions, at the right intensity, toward the right objects, at the right time, for the right reasons, not weakly or blandly."}, {"front": "Explain the difference between Aristotle's \"eudaimonia\" and \"hedone.\"", "back": "Eudaimonia means \"flourishing\" or \"living well\" in a full, objective sense, while hedone refers to sensory \"pleasure\" or a pleasant emotional state."}, {"front": "Does Aristotle's Doctrine of the Mean advocate for mediocrity?", "back": "No, it advocates for a demanding ideal of difficult, precise excellence, such as genuine courage or joyful giving, not the lukewarm middle ground."}, {"front": "How does Aristotle define virtue beyond mere restraint?", "back": "Virtue is a positive excellence, involving the development of genuine capacities for excellent human living and the reliable, pleasurable exercise of these capacities, including appropriate feelings."}, {"front": "What is a \"think deeper\" question posed about the application of the doctrine of the mean to justice?", "back": "Can the doctrine of the mean apply to justice, or is it a special case where there isn't such a thing as being \"too just\" or \"not just enough\"?"}, {"front": "How did Thomas Aquinas refer to Aristotle in his own philosophical works?", "back": "\"The Philosopher,\" a title of respect reflecting Aristotle's profound influence on medieval thought."}, {"front": "What was Aquinas's key distinction that built upon Aristotle's ethics?", "back": "The distinction between imperfect happiness and perfect happiness."}, {"front": "According to Aquinas, what is \"imperfect happiness\"?", "back": "Aristotle's account of eudaimonia—virtuous activity over a complete life—which is the best a human being can achieve through natural powers alone in this present life."}, {"front": "According to Aquinas, what is \"perfect happiness,\" and how does it differ from imperfect happiness?", "back": "Perfect happiness is a supernatural completion, oriented toward the universal good, not achievable through natural powers alone but dependent on revealed truth and God."}, {"front": "How did Aristotle treat ordinary beliefs about happiness (like identifying it with pleasure, wealth, or honor)?", "back": "He did not dismiss them but refined them, seeing them as containing genuine insight that needed philosophical analysis and clarification."}, {"front": "What is the underlying idea captured by Aristotle's Function Argument, even if not every step is airtight?", "back": "The kind of goodness appropriate to a being depends on what that being fundamentally is."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
