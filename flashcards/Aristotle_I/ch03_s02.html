    <script>

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what decade did Thomas Aquinas begin writing the \"Summa Theologica\"?", "back": "The 1260s."}, {"front": "What concern did some 13th-century theologians have regarding the recovery of Aristotle's works?", "back": "They worried pagan philosophy would corrupt Christian doctrine."}, {"front": "How did Aquinas characterize the relationship between faith and the truths Aristotle reached by reason?", "back": "Faith completes rather than contradicts reason."}, {"front": "What is the Latin equivalent of Aristotle's $\\textit{hexis}$ used by Aquinas?", "back": "$\\textit{Habitus}$."}, {"front": "Concept: $\\textit{Hexis}$", "back": "Definition: A stable state or settled disposition of character, rather than a fleeting mood."}, {"front": "According to Aquinas, what distinguishes the ultimate end of human life from Aristotle's view?", "back": "It is a supernatural end that transcends earthly life."}, {"front": "In the definition of virtue provided by Augustine and Aquinas, what is the \"genus\" of virtue?", "back": "Quality."}, {"front": "What does Aquinas identify as the \"proximate genus\" of virtue to improve its definition?", "back": "Habit."}, {"front": "Where does the \"subject\" of virtue reside according to Aquinas's general definition?", "back": "In the mind."}, {"front": "What is the \"end\" or purpose of an operative habit like virtue?", "back": "Operation."}, {"front": "How does virtue differ from habits like \"opinion\" regarding its reference to good or evil?", "back": "Virtue is always referred to the good, while opinion can be true or untrue."}, {"front": "In the definition of virtue, what is the significance of the phrase \"of which no one makes bad use\"?", "back": "It distinguishes virtue from habits that are sometimes directed toward evil."}, {"front": "Who is the \"efficient cause\" of infused virtue?", "back": "God."}, {"front": "The phrase \"which God works in us, without us\" refers specifically to _____ virtues.", "back": "Infused"}, {"front": "Why does Aquinas claim virtue is called \"good\"?", "back": "Because it is the means by which a thing or subject is made good."}, {"front": "From what Latin word is \"cardinal\" derived?", "back": "$\\textit{Cardo}$, meaning hinge."}, {"front": "List the four cardinal virtues recognized by the classical and Christian traditions.", "back": "Prudence, justice, fortitude, and temperance."}, {"front": "Which cardinal virtue is responsible for directing practical reasoning and discerning right action?", "back": "Prudence ($\\textit{phronesis}$)."}, {"front": "Which cardinal virtue orders our relationships and rendering to others what they are due?", "back": "Justice ($\\textit{dikaiosyne}$)."}, {"front": "Which cardinal virtue stabilizes the soul in the face of danger and difficulty?", "back": "Fortitude ($\\textit{andreia}$)."}, {"front": "Which cardinal virtue moderates the appetites and the pull of pleasure?", "back": "Temperance ($\\textit{sophrosyne}$)."}, {"front": "According to Aquinas, which virtue is the \"directing principle\" or principal of all virtues?", "back": "Prudence."}, {"front": "In the Thomistic scheme, what is the formal principle of virtue?", "back": "Good as defined by reason."}, {"front": "How does Temperance put the order of reason into the passions?", "back": "By acting as a curb on passions that incite a person against reason."}, {"front": "How does Fortitude put the order of reason into the passions?", "back": "By strengthening the soul against passions that withdraw a person from following reason."}, {"front": "What is the psychological subject of the virtue of Prudence?", "back": "The power which is rational in its essence."}, {"front": "What is the psychological subject of the virtue of Justice?", "back": "The will."}, {"front": "What is the psychological subject of the virtue of Temperance?", "back": "The concupiscible faculty."}, {"front": "What is the psychological subject of the virtue of Fortitude?", "back": "The irascible faculty."}, {"front": "List the three theological virtues introduced by Aquinas.", "back": "Faith, hope, and charity."}, {"front": "What is the primary difference in origin between cardinal and theological virtues?", "back": "Cardinal virtues are natural or acquired, while theological virtues are infused by grace."}, {"front": "How does Aquinas define the \"mean\" of virtue?", "back": "The point of reason determined by what right reason requires."}, {"front": "Why does Aquinas argue that justice and prudence have no \"excess\"?", "back": "They are defined by the requirement of reason rather than a scale of quantity."}, {"front": "Where does the \"good\" of a moral virtue come from?", "back": "Conformity with the rule of reason."}, {"front": "When moral virtue is compared to reason itself, it is considered a(n) _____.", "back": "Extreme (conformity)."}, {"front": "When moral virtue is considered in respect to its matter (passions), it is considered a _____.", "back": "Mean."}, {"front": "What is a \"real mean\" in the context of Thomistic ethics?", "back": "A mean in the thing itself, such as in arithmetic."}, {"front": "What is a \"rational mean\" in the context of Thomistic ethics?", "back": "A mean relative to the individual, determined by reason."}, {"front": "How did Aquinas's view of justice differ from Aristotle's social focus?", "back": "He framed justice as reflecting the order of charity within human relationships."}, {"front": "What is the classic definition of justice endorsed by Aquinas?", "back": "The perpetual and constant will to render to each his right."}, {"front": "Why is the word \"will\" used in the definition of justice?", "back": "To show that an act of justice must be voluntary."}, {"front": "In the definition of justice, what do \"constancy\" and \"perpetuity\" indicate?", "back": "The firmness and stability of the virtuous act."}, {"front": "According to Aquinas, why can one not be unjust to oneself in the strict sense?", "back": "Justice requires a relationship between distinct persons."}, {"front": "What is the difference between \"general justice\" and \"particular justice\"?", "back": "General justice concerns living virtuously for the community; particular justice concerns rendering specific dues to others."}, {"front": "What name does Aquinas frequently use to refer to Aristotle throughout the \"Summa\"?", "back": "The Philosopher."}, {"front": "According to the \"teacher notes,\" what do the theological virtues perfect in a human?", "back": "They perfect us as children of God."}, {"front": "Who authored the 1971 work \"A Theory of Justice\"?", "back": "John Rawls."}, {"front": "Concept: Veil of Ignorance", "back": "Definition: A thought experiment where principles are chosen without knowing one's social status, talents, or wealth."}, {"front": "Why would rational agents behind the \"veil of ignorance\" protect the least advantaged?", "back": "They might turn out to be among the least advantaged themselves."}, {"front": "Which 20th-century philosopher responded to Rawls from a libertarian perspective?", "back": "Robert Nozick."}, {"front": "What is the title of Robert Nozick's primary work on justice?", "back": "Anarchy, State, and Utopia."}, {"front": "According to Nozick's \"entitlement theory,\" what constitutes justice?", "back": "Respecting the rights of individuals and their justly acquired holdings."}, {"front": "In what way is Rawls's theory of justice \"un-Aristotelian\"?", "back": "It abstracts from the concrete community and is indifferent to individual merit."}, {"front": "In what way is Nozick's theory \"un-Aristotelian\"?", "back": "It abandons the teleological framework of the common flourishing of the community."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
