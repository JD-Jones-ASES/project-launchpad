    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "According to Aquinas, what is the 'eternal law'?", "back": "The rational governance of all creation by God's wisdom."}, {"front": "How does Aquinas define 'natural law'?", "back": "The rational creature's participation in the eternal law."}, {"front": "What is the relationship between temporal law and eternal law according to Augustine (cited by Aquinas)?", "back": "Temporal law is only just and lawful if it is drawn from the eternal law."}, {"front": "Under what condition is the 'fomes' considered to have the nature of law?", "back": "When it is viewed as a punishment resulting from Divine justice."}, {"front": "Why is the 'fomes' not considered law in the context of sin?", "back": "Because in that respect it denotes a proneness to sin, which is contrary to Divine law."}, {"front": "In Aquinas's framework, what determines the content of a school curriculum?", "back": "The nature of humans as rational creatures made for truth, beauty, and goodness."}, {"front": "Term: Phronesis (translated by Aquinas as prudentia)", "back": "Definition: The master intellectual virtue of practical wisdom used to discern the good and choose right means to achieve it."}, {"front": "How does phronesis (practical wisdom) differ from theoretical wisdom?", "back": "Phronesis is directed at action in particular cases rather than grasping universal truths."}, {"front": "According to Aquinas, what is the orientation of 'genuine' prudence?", "back": "It is oriented toward the common good rather than merely private benefit."}, {"front": "Why is the person who only reasons well about private affairs not fully prudent?", "back": "They have achieved only a partial form of prudence that lacks orientation toward the community."}, {"front": "Aquinas argues that seeking only one's own good is contrary to which theological virtue?", "back": "Charity."}, {"front": "What is 'monastic economy' in the context of medieval prudence?", "back": "Prudence concerned with things affecting the good of only one person."}, {"front": "What is 'domestic prudence' (or domestic economy)?", "back": "Prudence directed toward the common good of the household or family."}, {"front": "What is 'political prudence'?", "back": "Prudence directed toward the common good of the state or kingdom."}, {"front": "Term: Prudentia regnativa", "back": "Definition: 'Kingly' or 'regnative' prudence, the practical wisdom proper to those who govern a city or kingdom."}, {"front": "Why is regnative prudence considered the most perfect form of prudence?", "back": "It is more universal, extends to more matters, and attains a higher end than private governance."}, {"front": "According to Aristotle, which intellectual virtue is 'proper to the prince'?", "back": "Prudence."}, {"front": "How do prudence and justice relate in the office of a king?", "back": "Prudence is the directive guide, while justice is the executive action."}, {"front": "What must a ruler possess to govern well according to Aquinas?", "back": "Both moral virtue (to desire the right end) and intellectual virtue (to know how to achieve it)."}, {"front": "The medieval liberal arts were divided into which two groups?", "back": "The trivium and the quadrivium."}, {"front": "Which three disciplines comprise the 'trivium'?", "back": "Grammar, logic, and rhetoric."}, {"front": "What was the primary goal of the trivium?", "back": "To master the arts of discourse, including clear thought and communication."}, {"front": "Which four disciplines comprise the 'quadrivium'?", "back": "Arithmetic, geometry, music, and astronomy."}, {"front": "What is the collective focus of the quadrivium?", "back": "The arts of quantitative reasoning."}, {"front": "Within the quadrivium, how is music defined?", "back": "Number in time."}, {"front": "Within the quadrivium, how is astronomy defined?", "back": "Number in space and time."}, {"front": "Term: Artes liberales", "back": "Definition: The 'arts befitting a free person,' aimed at forming rational and moral capacities rather than vocational training."}, {"front": "What was the purpose of the seven liberal arts in the medieval university?", "back": "To equip the student with the necessary formation for all further study and wisdom."}, {"front": "According to Hugh of St. Victor, what is the ultimate purpose of all learning?", "back": "The restoration of the rational image of God in human nature, which was damaged by sin."}, {"front": "What is the name of Hugh of St. Victor's influential treatise on education?", "back": "The Didascalicon."}, {"front": "John Dewey argued that education should be fundamentally viewed as '_____ itself' rather than preparation for it.", "back": "life"}, {"front": "What was the central goal of education according to John Dewey?", "back": "Preparing students for democratic citizenship and productive participation in society."}, {"front": "What is the core concept of E. D. Hirsch's educational theory?", "back": "Cultural literacy."}, {"front": "How does E. D. Hirsch define 'cultural literacy'?", "back": "A shared fund of knowledge and references that enables communication and participation in society."}, {"front": "What is Hirsch's primary critique of progressive education?", "back": "By abandoning a shared curriculum, it leaves students without the common intellectual heritage necessary for literacy."}, {"front": "In the modern debate, what does Aristotle consider the fundamental goal of education?", "back": "The formation of character."}, {"front": "How would Aristotle critique John Dewey's focus on civic participation?", "back": "He would argue that education must form the soul, not just train the citizen."}, {"front": "How would Aristotle critique E. D. Hirsch's focus on cultural knowledge?", "back": "He would point out that cultural knowledge without moral formation produces cleverness rather than goodness."}, {"front": "The concept that law is a rational order built into human nature is known as _____ law.", "back": "natural"}, {"front": "Aquinas states that human law derives its legitimacy from _____ law.", "back": "natural"}, {"front": "Why does natural law give education a stable foundation that pragmatism lacks?", "back": "It bases education on the unchanging nature of human beings rather than shifting social preferences."}, {"front": "In the quadrivium, geometry is specifically described as number in _____.", "back": "space"}, {"front": "Which medieval scholar taught Albert the Great and was known for writing on all four mathematical arts?", "back": "No specific scholar is named as teaching Albert, but Albert himself is noted for writing on them."}, {"front": "According to Aquinas, a 'governor in chief' provides what to secondary governors?", "back": "The plan of government."}, {"front": "Aristotle's term for practical wisdom, used by Aquinas to develop the concept of prudence, is _____.", "back": "phronesis"}, {"front": "Which cardinal virtue is considered the 'first' and provides guidance to all moral virtues?", "back": "Prudence (prudentia)."}, {"front": "What does Aquinas mean by 'right reason applied to action'?", "back": "The common notion or definition of prudence."}, {"front": "Why does Aquinas believe that the common good is superior to the individual good?", "back": "Right reason judges the common good to be better than the good of one person."}, {"front": "In the trivium, which art focuses on the principles of valid reasoning?", "back": "Logic."}, {"front": "In the trivium, which art focuses on the structure of language?", "back": "Grammar."}, {"front": "In the trivium, which art focuses on the art of persuasion?", "back": "Rhetoric."}, {"front": "What is the primary difference between the trivium and the quadrivium?", "back": "The trivium focuses on language arts/discourse, while the quadrivium focuses on mathematical arts."}, {"front": "How does Hugh of St. Victor characterize the state of the human 'rational image of God'?", "back": "It has been obscured by sin."}, {"front": "Dewey's emphasis on learning through 'experience and problem-solving' is typical of what educational tradition?", "back": "Progressive education."}, {"front": "In the hierarchy of laws, which law serves as the 'plan of government in the Chief Governor'?", "back": "Eternal law."}, {"front": "Why is 'political prudence' called political?", "back": "Because it is specifically directed toward the common good."}, {"front": "Which intellectual virtue is required for a ruler to know 'how' to achieve a due end?", "back": "Prudence."}, {"front": "Which virtue ensures a ruler 'wants' the right thing for the community?", "back": "Moral virtue (or specifically justice)."}, {"front": "The quadrivium art defined simply as 'number' is _____.", "back": "arithmetic"}, {"front": "Hirsch's call for a 'knowledge-rich, content-focused curriculum' is a response to what?", "back": "The progressive tradition's focus on problem-solving over shared knowledge."}, {"front": "How does Aquinas describe the derivation of power from a first mover to a second mover?", "back": "The second mover only moves insofar as it is moved by the first."}, {"front": "According to Aquinas, what does 'law' denote in relation to acts?", "back": "A kind of plan directing acts towards an end."}, {"front": "What distinguishes 'prudence simply so called' from other species of prudence?", "back": "It is directed specifically toward one's own private good."}, {"front": "For Aquinas, what is the ultimate source of a legislator's authority to educate citizens?", "back": "The derivation of their laws from the eternal law."}, {"front": "Is natural law a written code of conduct?", "back": "No, it is an orientation of reason toward the good."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
