<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Man (Aristotle I) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Aristotle, how does the analysis of the good life for an individual compare to that of a city?", "back": "They are the same analysis approached from two different directions."}, {"front": "In Aristotle’s view, politics is the _____ application of the principles learned in ethics.", "back": "political"}, {"front": "Why does the state have a necessary interest in the moral character of its citizens?", "back": "The state's purpose is to make the good life possible, and the good life requires virtue."}, {"front": "According to Aristotle, what is the most fundamental of all political questions?", "back": "What kind of people are we raising?"}, {"front": "Why is the wealthiest or most powerful city not necessarily the best city?", "back": "A city's goodness consists in the activity of virtue rather than external goods."}, {"front": "What three elements constitute 'goodness' for a city according to Aristotle?", "back": "Just institutions, educated citizens, and leaders who govern for the common good."}, {"front": "A city that focuses solely on producing prosperous or powerful subjects has _____.", "back": "missed the point"}, {"front": "Why does Aristotle consider the care of youth to be the legislator's first concern?", "back": "Laws and institutions are only as good as the character of the people who uphold them."}, {"front": "What is the likely political outcome of a democracy whose citizens lack the virtues of self-governance?", "back": "It will slide into mob rule."}, {"front": "What is the likely political outcome of an aristocracy whose leading men are vicious?", "back": "It will become an oligarchy."}, {"front": "According to Aristotle, every constitution contains the seeds of its own _____.", "back": "destruction"}, {"front": "What is the only remedy for a constitution that is being 'hollowed out' from within?", "back": "Education"}, {"front": "Why is political reform, taken alone, insufficient for a healthy state?", "back": "Citizens must be educated to understand and love the principles of the constitution."}, {"front": "In Aristotle’s view, education is not a supplement to political life but its _____.", "back": "foundation"}, {"front": "Why does Aristotle insist on public rather than purely private education?", "back": "The community's survival depends on what the child becomes."}, {"front": "Term: Schole", "back": "Definition: Leisure, or purposeful activity chosen for its own sake and free from compulsion."}, {"front": "The English word 'school' is derived from which classical Greek concept?", "back": "Schole (Leisure)"}, {"front": "According to Aristotle's hierarchy, why is leisure more important than work?", "back": "We work as a means to achieve leisure, which is the end."}, {"front": "Aristotle argues that education for _____ is higher than education for work.", "back": "leisure"}, {"front": "What is the result of an education that focuses only on productive work and career preparation?", "back": "It prepares citizens for the lower half of life while neglecting the higher half."}, {"front": "Term: Liberal Education", "back": "Definition: Education for freedom that forms a person to use their freedom well."}, {"front": "What is the etymological origin of the word 'liberal' in liberal education?", "back": "The Latin word 'liberalis,' meaning 'befitting a free person.'"}, {"front": "How does liberal education differ from vocational education?", "back": "It cultivates the soul for intrinsic goods rather than training for useful tasks."}, {"front": "Name four examples of activities cultivated by liberal education.", "back": "Friendship, contemplation, civic engagement, and the enjoyment of beauty."}, {"front": "Contrast: While vocational education produces skilled workers, liberal education produces _____.", "back": "free human beings"}, {"front": "List the five traditional subjects of Greek education mentioned by Aristotle.", "back": "Reading, writing, gymnastics, drawing, and music."}, {"front": "What is the specific purpose of gymnastics in Greek education?", "back": "To develop the body and produce courage."}, {"front": "What is the specific purpose of drawing in Greek education?", "back": "To train the eye to perceive beauty accurately."}, {"front": "Why is music considered the paradigm case of liberal education?", "back": "It is a formative discipline that lacks the direct utility of subjects like reading."}, {"front": "How does music affect the human soul according to Aristotle?", "back": "It has the power to shape emotions and habituate the soul to feel correctly."}, {"front": "Virtue requires not just right action, but also _____ _____.", "back": "right feeling"}, {"front": "Why is a discipline that trains the emotions considered an education of the 'whole person'?", "back": "Happiness is an activity of the soul, which involves both intellect and feeling."}, {"front": "What is the 'noble leisure' context for the enjoyment of music?", "back": "It is an activity that a fully formed human being engages in for its own sake."}, {"front": "What danger does Aristotle see in making music education purely 'professional'?", "back": "It focuses on technical performance for audiences rather than cultivating the student's soul."}, {"front": "Aristotle argues that children should learn music to develop _____ and sensitivity rather than to become performers.", "back": "taste"}, {"front": "Does Aristotle believe vocational education is valueless?", "back": "No; he believes it is necessary but lower in purpose than liberal education."}, {"front": "According to the text, what is the result of practical training without liberal education?", "back": "Competent but unformed workers."}, {"front": "According to the text, what is the result of liberal education without practical formation?", "back": "Impractical dreamers."}, {"front": "In Aristotle’s educational theory, what provides the foundation for political life?", "back": "Education"}, {"front": "What is the literal meaning of 'schole' in the classical sense?", "back": "Time and activity free from compulsion."}, {"front": "How does Aristotle define 'happiness' in the context of the city?", "back": "The activity of virtue."}, {"front": "List the seven liberal arts of the medieval curriculum.", "back": "Grammar, logic, rhetoric, arithmetic, geometry, music, and astronomy."}, {"front": "Why does a democracy slide into mob rule if citizens lack virtue?", "back": "They lack the virtues necessary for self-governance."}, {"front": "Aristotle's Politics Book VII is primarily the political application of which other work?", "back": "The Ethics"}, {"front": "Under what condition will a just law be corrupted?", "back": "If it is in the hands of unjust citizens."}, {"front": "Why must private family preferences in education sometimes be subordinated to the common good?", "back": "The community’s survival depends on the moral character of the child."}, {"front": "What is the primary goal of vocational education?", "back": "To prepare a person for a career, trade, or useful function in society."}, {"front": "According to Aristotle, what is the relationship between work and leisure?", "back": "Work is a means to the end of leisure."}, {"front": "Education for 'schole' is education for _____.", "back": "free activity"}, {"front": "Why is drawing included in the traditional Greek curriculum?", "back": "To train the eye to perceive beauty accurately."}, {"front": "What capacity of the soul does liberal education aim to cultivate?", "back": "The capacity for what is intrinsically worth doing."}, {"front": "Aristotle believes music is a formative discipline because the soul is naturally responsive to _____ and _____.", "back": "rhythm; melody"}, {"front": "Why should a child learn music according to Aristotle's preferred model?", "back": "To develop taste, sensitivity, and the capacity for noble enjoyment."}, {"front": "What is the 'higher half of life' that purely vocational education neglects?", "back": "Learning how to enjoy good things in a fully human way."}, {"front": "In Aristotle’s view, the formal structure of a government matters less than the _____ of the people who inhabit it.", "back": "character"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
