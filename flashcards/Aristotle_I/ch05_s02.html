    <style>
        .fc-container {

            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);

        .fc-btn:disabled {

        }
        .fc-btn:disabled:hover {

        .fc-counter {
            font-family: 'Cinzel', serif;

        /* Progress bar */
        .fc-progress {
            width: 100%;

        .fc-progress-bar {

        /* Toolbar */
        .fc-toolbar {

        .fc-tool {

            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);

            border-color: var(--secondary-color);
        }

        /* Keyboard hint */

        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;

                min-height: 220px;
            }

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "Which philosopher provided the foundation for Aquinas's belief that political authority should direct citizens toward virtue?", "back": "Aristotle"}, {"front": "In which specific work and questions is Thomas Aquinas's \"Treatise on Law\" found?", "back": "The Summa Theologica, Prima Secundae, Questions 90 through 97."}, {"front": "What is Aquinas's formal four-part definition of law?", "back": "An ordinance of reason for the common good, made by him who has care of the community, and promulgated."}, {"front": "According to Aquinas, what does it mean for a law to be an \"ordinance of reason\"?", "back": "It means the law is rational rather than arbitrary."}, {"front": "What is the intended aim of a law if it satisfies the requirement of the \"common good\"?", "back": "The welfare of the entire community rather than the private interest of the ruler."}, {"front": "Who possesses the authority to make law according to Aquinas's definition?", "back": "He who has care of the community (legitimate authority)."}, {"front": "Why is \"promulgation\" considered essential for a law to obtain binding force?", "back": "A law must be notified to rational creatures so they can know and follow it."}, {"front": "How does Aquinas answer the objection that Natural Law is not a law because it requires no public declaration?", "back": "He argues that God promulgated it by instilling it into the human mind to be known naturally."}, {"front": "Under what condition are those not present during a law's declaration still bound to observe it?", "back": "They are bound if the law is notified or can be notified to them by others after promulgation."}, {"front": "What is the highest and most fundamental type of law in Aquinas's hierarchy?", "back": "Eternal Law"}, {"front": "How does Aquinas define \"Eternal Law\"?", "back": "God's rational governance of the entire created order or universe."}, {"front": "What is the relationship between Natural Law and Eternal Law?", "back": "Natural Law is the rational creature's participation in the Eternal Law."}, {"front": "According to Aquinas, \"Human Law\" is derived from which higher form of law?", "back": "Natural Law"}, {"front": "What is the purpose of \"Divine Law\" as revealed in Scripture?", "back": "To direct human beings toward their ultimate end (the beatific vision) which exceeds natural reason."}, {"front": "Why is Eternal Law called \"eternal\" rather than temporal?", "back": "Because the Divine Reason's conception of things is not subject to time."}, {"front": "According to Aquinas, in what two ways can a \"rule and measure\" exist in a person?", "back": "In the one who rules/measures and in the one who is being ruled/measured."}, {"front": "The light of natural reason, which allows us to discern good from evil, is described by Aquinas as an imprint of what?", "back": "The Divine light"}, {"front": "Term: First Precept of Natural Law", "back": "Definition: \"Good is to be done and pursued, and evil is to be avoided.\""}, {"front": "What determines the order of the secondary precepts of the natural law?", "back": "The order of natural inclinations in human beings."}, {"front": "To what does the first and most basic natural inclination of all substances relate?", "back": "Self-preservation (the preservation of its own being)."}, {"front": "What natural law inclinations does man share with other animals?", "back": "Sexual intercourse and the education of offspring."}, {"front": "What specific inclinations belong to man's rational nature uniquely?", "back": "To know the truth about God and to live in society."}, {"front": "In logic (speculative reason), what is the first indemonstrable principle based on \"being\"?", "back": "The principle that the same thing cannot be affirmed and denied at the same time."}, {"front": "What is the first thing that falls under the apprehension of the practical reason?", "back": "Good (since every agent acts for an end under the aspect of good)."}, {"front": "How does a proposition qualify as \"self-evident in itself\"?", "back": "When its predicate is contained in the notion of the subject."}, {"front": "Why might a self-evident proposition not be self-evident to a specific person?", "back": "The person may not know the definition of the subject."}, {"front": "According to Aquinas, what status does a human law have if it violates the natural law?", "back": "It is not a law at all, but a perversion of law."}, {"front": "Which church father did Aquinas quote to assert that \"that which is not just seems to be no law at all\"?", "back": "Augustine"}, {"front": "In the classical tradition, is the city-state considered natural or artificial?", "back": "Natural"}, {"front": "What contemporary 20th-century figure appealed to Aquinas and Augustine to justify civil disobedience against unjust laws?", "back": "Martin Luther King Jr."}, {"front": "The Declaration of Independence's reference to the \"laws of Nature and of Nature's God\" is an example of what intellectual tradition?", "back": "Natural Law theory"}, {"front": "What modern political theory views the state as an artificial construction based on the agreement of individuals?", "back": "Social Contract tradition"}, {"front": "In the Social Contract tradition, who or what is considered \"prior\" to the state?", "back": "The individual"}, {"front": "How does the \"classical view\" of the state's purpose differ from the \"liberal view\"?", "back": "The classical view focuses on cultivating human flourishing/common good, while the liberal view maximizes individual freedom."}, {"front": "According to Aquinas, what allows a law to have \"binding force\" in conscience?", "back": "Its derivation from natural law and its service to the common good."}, {"front": "What are the four types of law identified by Aquinas in order of the hierarchy (top to bottom)?", "back": "Eternal Law, Natural Law, Human Law, and Divine Law."}, {"front": "How does Aquinas justify the existence of Natural Law despite the sufficiency of Eternal Law?", "back": "Natural Law is not separate but is the way rational creatures participate in the Eternal Law."}, {"front": "Which faculty of the soul allows humans to grasp the first principles of the natural law?", "back": "Practical reason"}, {"front": "According to the natural law, why is \"shunning ignorance\" considered a moral obligation?", "back": "It belongs to the natural inclination of man's rational nature to know the truth about God."}, {"front": "Why is the common good superior to private interest in the classical tradition?", "back": "The common good is a goal that transcends any individual's private preferences."}, {"front": "According to Aquinas's reply to Objection 1 in Q. 91, how do non-existent things exist with God?", "back": "They are foreknown and preordained by Him."}, {"front": "What concept in speculative reason is analogous to \"Good\" in practical reason?", "back": "Being"}, {"front": "What is the primary difference between how the state is formed in Aristotle’s view versus Hobbes’s view?", "back": "Aristotle sees it as natural to humanity, while Hobbes sees it as an artificial agreement for security."}, {"front": "According to the \"Teacher Note,\" why is the natural law tradition more robust than contract theory for protecting children or the disabled?", "back": "It grounds rights in human nature itself rather than in the ability to negotiate a contract."}, {"front": "Concept: The \"State of Nature\"", "back": "Definition: A hypothetical condition of individuals before the creation of government, central to social contract theory."}, {"front": "In the hierarchy of law, what is the role of \"Human Law\"?", "back": "To apply the general principles of natural law to specific, local community circumstances."}, {"front": "Why is the natural law considered \"universal\"?", "back": "It is based on a rational moral order built into human nature, discoverable by reason by all people."}, {"front": "What specific part of the Summa Theologica deals with the \"Treatise on Law\"?", "back": "The Prima Secundae (I-II)."}, {"front": "Aquinas states that the precepts of natural law are to practical reason what _____ are to speculative reason.", "back": "First indemonstrable principles (axioms)"}, {"front": "According to Aquinas, why must law be made by someone who \"has care of the community\"?", "back": "Directing toward the common good belongs to the whole people or to someone acting on their behalf."}, {"front": "What does Aquinas quote from Boethius regarding axioms?", "back": "Certain propositions are universally self-evident to all, such as \"Every whole is greater than its part.\""}, {"front": "The inclination to \"avoid offending those among whom one has to live\" falls under which level of natural law?", "back": "The third level, pertaining to man's rational nature and social life."}, {"front": "According to Aquinas, \"Good is that which all things _____.\"", "back": "Seek after"}, {"front": "How does Aquinas explain the binding nature of law for people who were not present for its promulgation?", "back": "The law is notified to them by others or is available to be notified to them."}, {"front": "What is the relation of Human Law to Natural Law in terms of validity?", "back": "Human Law only has the force of law insofar as it derives from Natural Law."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
