<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Man (Aristotle I) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How many actual constitutions did Aristotle study to inform his political theories in the Politics?", "back": "158."}, {"front": "Unlike Plato's pursuit of an abstract \"Good,\" Aristotle insists the best constitution is the best _____.", "back": "Achievable."}, {"front": "What is the primary difference between Plato's Republic and Aristotle's Politics regarding the \"ideal city\"?", "back": "Plato focuses on an abstract philosophical vision, while Aristotle considers practical constraints like history and geography."}, {"front": "Aristotle's combination of normative seriousness with practical realism is often described as his _____ temperament.", "back": "Empirical."}, {"front": "What standard does Aristotle use to evaluate whether a constitution is a \"correct\" or \"deviant\" form?", "back": "The common good."}, {"front": "Term: Polity (politeia).", "back": "The best practically achievable constitution for most cities, combining elements of democracy and oligarchy."}, {"front": "In Aristotle's political theory, a polity is an application of the _____ to political life.", "back": "Doctrine of the mean."}, {"front": "What are the two extreme constitutional forms that a polity seeks to balance?", "back": "Extreme democracy and extreme oligarchy."}, {"front": "Why does Aristotle consider extreme democracy and extreme oligarchy inherently unstable?", "back": "Both represent the triumph of faction over the common good."}, {"front": "According to Aristotle, what social group serves as the foundation of a stable political mean?", "back": "The middle class."}, {"front": "Why does a large middle class promote political stability?", "back": "It moderates the extremes of wealth and poverty and weakens factionalism."}, {"front": "Aristotle defines extreme democracy as rule by the _____, for the _____.", "back": "Poor."}, {"front": "Aristotle defines extreme oligarchy as rule by the _____, for the _____.", "back": "Rich."}, {"front": "Which 19th-century thinker observed a similar connection between the middle class and American democratic stability?", "back": "Alexis de Tocqueville."}, {"front": "In a mixed constitution (polity), the democratic element provides broad participation and the _____.", "back": "Rule of law."}, {"front": "In a mixed constitution (polity), the oligarchic element provides respect for property and _____.", "back": "Merit."}, {"front": "Although polity is the best practical form, Aristotle acknowledges that _____ by a man of supreme virtue would be better in principle.", "back": "Monarchy."}, {"front": "Besides monarchy, what form of government does Aristotle consider superior to polity in principle?", "back": "Aristocracy by genuinely virtuous elites."}, {"front": "Term: stasis.", "back": "Civil strife, faction, or revolution viewed as a breakdown of political unity."}, {"front": "Aristotle metaphorically regards stasis as a form of political _____.", "back": "Disease."}, {"front": "Where does Aristotle locate the ultimate source of political instability?", "back": "Human psychology (passions such as envy, ambition, and resentment)."}, {"front": "How does \"too little inequality\" contribute to political instability?", "back": "It leads to the \"tyranny of the mediocre\" by failing to recognize differences in virtue and contribution."}, {"front": "How does \"too much inequality\" contribute to political instability?", "back": "It produces the resentment that drives a marginalized group to revolution."}, {"front": "According to the Ethics and Politics, stability requires _____ recognition of merit.", "back": "Proportionate."}, {"front": "What is the deepest cause of revolution identified in Aristotle's analysis?", "back": "A perception of injustice in the distribution of political power and honor."}, {"front": "Under what condition does a constitution begin to decay into a deviant form?", "back": "When those in power push its core principles to extremes."}, {"front": "A democracy becomes \"mob rule\" when it treats every individual preference as equally valid, regardless of _____.", "back": "Wisdom."}, {"front": "An aristocracy degenerates into an oligarchy when it treats distinctions between citizens as a license for _____.", "back": "Privilege."}, {"front": "In democracies, who typically inflames the poor against the wealthy to trigger revolution?", "back": "Demagogues."}, {"front": "What is a primary economic cause of revolution within democratic systems?", "back": "The poor seeking to confiscate the property of the wealthy."}, {"front": "What is a primary cause of revolution within oligarchic systems?", "back": "The rich becoming too greedy and exclusive."}, {"front": "Besides the resentment of those shut out from power, what internal factor destabilizes oligarchies?", "back": "Factional conflict among the wealthy themselves."}, {"front": "What is a primary psychological driver of revolution against a tyranny?", "back": "Hatred of the tyrant."}, {"front": "Why does a tyrant's own insecurity often lead to his downfall?", "back": "It drives further oppression, which eventually produces further resistance."}, {"front": "According to Aristotle, what is the common thread that leads to the destruction of deviant constitutions?", "back": "Those in power pursue their own interest rather than the common good."}, {"front": "Aristotle argues that deviant constitutions are inherently unstable because they are built on _____.", "back": "Injustice."}, {"front": "What is Aristotle's ultimate prescription for preserving constitutional health and longevity?", "back": "Education."}, {"front": "Why are laws and institutions alone insufficient to preserve a state?", "back": "A citizenry must be formed in the spirit of the constitution's principles."}, {"front": "How is political virtue formed in citizens, according to Aristotle's ethical and political works?", "back": "By habituating citizens to live under the law from their youth."}, {"front": "Education in the \"broadest sense\" for Aristotle refers to the total formation of _____.", "back": "Character."}, {"front": "Why are reasonable citizens in a middle-class dominated society less likely to seek class advantage?", "back": "They are more likely to seek the common good."}, {"front": "Why does Aristotle reject the idea of a single \"best imaginable\" constitution for all cities?", "back": "The theorist must prescribe for cities limited by their history, geography, and social composition."}, {"front": "What is the \"technical\" definition of a demagogue in Aristotle's analysis of democratic decay?", "back": "A leader who exploits popular passions rather than appealing to reason and the common good."}, {"front": "Aristotle observes that the same constitution can be stable or unstable depending on how its principles are _____.", "back": "Applied in practice."}, {"front": "How does the loss of fear specifically impact a tyranny?", "back": "It removes the primary deterrent preventing the populace from resisting or revolting."}, {"front": "Aristotle argues that a society with a thin middle class and large antagonistic extremes tends toward _____.", "back": "Instability and faction."}, {"front": "According to the Politics, what happens to a democracy that reduces all distinctions to a \"mere equality of numbers\"?", "back": "It becomes prone to revolution and demagoguery."}, {"front": "Why is polity considered the most useful model for practical political reform?", "back": "It is achievable for ordinary cities with ordinary people."}, {"front": "The perception of injustice that drives stasis usually relates to the distribution of political power and _____.", "back": "Honor."}, {"front": "In Aristotle's view, virtue is a mean between two extremes, which are not _____ bad or tempting.", "back": "Equally."}, {"front": "Aristotle's empirical temperament means he reasons from patterns observed in _____.", "back": "Real political history."}, {"front": "What must the political theorist be able to do for cities that cannot achieve the philosophical ideal?", "back": "Prescribe a constitution that is the best achievable given their circumstances."}, {"front": "In the context of preserving a constitution, education makes right actions become _____ to the citizens.", "back": "Second nature."}, {"front": "When a small elite monopolizes all honor and wealth, the resulting emotion that drives revolution is _____.", "back": "Resentment."}, {"front": "What is the relationship between political stability and a large middle class, according to modern social scientists?", "back": "They have repeatedly confirmed the correlation observed by Aristotle."}, {"front": "What allows a polity to genuinely serve the whole community?", "back": "Its mixed nature prevents any single class from possessing unlimited power."}, {"front": "Aristotle's analysis suggests that good political philosophy is not just normative, but also _____.", "back": "Predictive (or empirical)."}, {"front": "Why does the tyrant's insecurity often lead to further oppression?", "back": "It is an attempt to maintain control that ultimately backfires by increasing resistance."}, {"front": "For Aristotle, what makes the difference between a constitution that endures and one that degenerates?", "back": "The education and character formation of its citizens."}, {"front": "The core of Aristotle's \"mixed constitution\" combines elements of rule by the many with elements of rule by the _____.", "back": "Few (or merit-based elites)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
