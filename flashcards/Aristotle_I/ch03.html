    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Aristotle, why is the discussion of voluntary and involuntary action a necessary foundation for studying virtue?", "back": "It's foundational because we cannot evaluate someone's character or assign moral responsibility unless we understand when their actions are truly their own and a product of deliberate choice."}, {"front": "Define *proairesis* in Aristotle's philosophy.", "back": "*Proairesis* is deliberate choice, involving both rational deliberation (figuring out the best means to a given end) and a genuine act of will. It distinguishes a morally responsible agent from someone acting from impulse or compulsion."}, {"front": "How does Aristotle define a voluntary action?", "back": "An action is voluntary when it originates in the agent himself and the agent knows the particular circumstances of what he is doing."}, {"front": "What makes an action involuntary according to Aristotle?", "back": "An action is involuntary if it is done under compulsion (the moving principle is external, and the agent contributes nothing) or in ignorance of the relevant circumstances."}, {"front": "Why are only voluntary actions subject to praise or blame in Aristotle's ethics?", "back": "Only voluntary actions are expressions of a person's deliberate character, making them morally accountable and reflective of who the person truly is."}, {"front": "How do modern legal systems reflect Aristotle's ideas on moral responsibility?", "back": "Modern legal systems distinguish between intentional and negligent harm (e.g., murder vs. manslaughter) by asking if the defendant knew what they were doing and acted with deliberation, echoing Aristotle's criteria for responsibility."}, {"front": "Explain Aristotle's doctrine of the mean regarding virtue.", "back": "Virtue is a stable disposition to choose the intermediate point—the mean—between two extremes of feeling or action: excess and deficiency in a given sphere."}, {"front": "Name the three elements Aristotle identifies when analyzing every moral virtue.", "back": "1. A sphere (the domain of feeling or action). 2. Two vices (the excess and the deficiency in that sphere). 3. The mean (the virtuous disposition or appropriate response)."}, {"front": "Apply Aristotle's structure of virtue to 'courage,' identifying its sphere, vices, and mean.", "back": "Sphere: Fear (especially of death). Excess: Rashness/Recklessness. Deficiency: Cowardice. Mean: Courage (the disposition to face genuine dangers appropriately)."}, {"front": "What is the role of *phronesis* (practical wisdom) in Aristotle's ethics?", "back": "*Phronesis* is the intellectual virtue that enables individuals to identify the mean (the appropriate response) in particular cases, as the mean is relative to the person and situation, not a mathematical midpoint."}, {"front": "Why does Aristotle consider justice a 'master virtue' or 'complete virtue' that occupies a special place?", "back": "Justice is essentially relational, concerning what one gives to others and owes to the community in shared life. Other virtues are primarily about the agent's own soul, making justice uniquely about our common existence."}, {"front": "What problem does distributive justice address, and what is its criterion according to Aristotle?", "back": "Distributive justice asks: How should we divide goods (offices, honors, civic benefits) that belong to the community? Its answer is: proportionately, each person according to their contribution, worth, or need."}, {"front": "What problem does corrective justice address, and what is its criterion according to Aristotle?", "back": "Corrective justice asks: How should we restore fairness after one person has wronged another? Its answer is: arithmetically, by stripping the wrongdoer of their gain and compensating the victim for their loss, regardless of social standing."}, {"front": "How does Aristotle's concept of 'distributive justice' differ from modern 'redistributive justice'?", "back": "Aristotle's distributive justice is about allocating shared goods (like honors) based on merit or desert. Modern redistributive justice typically refers to taking resources from some groups to give to others (e.g., through taxation for welfare programs)."}, {"front": "What fundamental question does Aristotle's discussion of natural versus conventional justice raise?", "back": "It raises the question of whether there is a standard of justice that transcends what any particular community has enacted into law, or if all justice is merely conventional."}, {"front": "What is Aristotle's answer to the question of natural versus conventional justice?", "back": "Aristotle answers yes, there is natural justice. He believes human laws can be measured against this unchanging principle, even if its application admits of different interpretations in various circumstances."}, {"front": "Define *nomos* in the context of Greek political thought.", "back": "*Nomos* refers to law, custom, or convention—the established rules and customs of a particular community, distinct from universal nature."}, {"front": "Define *physis* in the context of Aristotle's ethics.", "back": "*Physis* refers to nature; the inherent character or tendency of a thing. In ethics, it refers to what is true of human beings as such, by virtue of their nature, independently of cultural arrangements."}, {"front": "How did Thomas Aquinas approach Aristotle's philosophy during the Middle Ages?", "back": "Aquinas 'baptized' Aristotle, showing that what Aristotle derived through reason was confirmed by faith, and that faith completed rather than contradicted what reason achieved. He integrated Aristotle's philosophy into Christian doctrine."}, {"front": "What is *hexis*, and what is its Latin equivalent used by Aquinas?", "back": "*Hexis* is a stable state or settled disposition of character (e.g., a virtue); it is a deep, reliable orientation of the soul. Its Latin equivalent used extensively by Aquinas is *habitus*."}, {"front": "According to Aristotle, can ignorance excuse an action and eliminate moral responsibility? If so, what kind of ignorance?", "back": "Yes, but only if it is ignorance of the particular circumstances of the action (e.g., mistaking a friend for an enemy), not ignorance of moral principles themselves (e.g., claiming 'I didn't know lying was wrong')."}, {"front": "Consider two students who cheat: one panicked and immediately regretted it, the other planned carefully and felt no remorse. How would Aristotle view their moral responsibility?", "back": "Aristotle would say their characters are not equally implicated. The first student's action was less the product of a settled *proairesis* (deliberate choice) than the second's, implying less moral responsibility for the first."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
