    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What two elements must be balanced when studying Aristotle's approach to virtue and justice?", "back": "One must hold together a systematic theory and a careful attention to the specific features of individual cases."}, {"front": "Why is the discussion of voluntary and involuntary action considered the foundation of the study of virtue?", "back": "Character cannot be evaluated unless it is clear when an agent is genuinely responsible for their actions."}, {"front": "How does Aristotle distinguish between two people performing the same outward act of cheating?", "back": "He evaluates the degree to which the action was a product of settled choice versus impulse or panic."}, {"front": "The Greek term for a deliberate choice involving both rational deliberation and a genuine act of will is $\\textit{proairesis}$.", "back": "True"}, {"front": "What is the function of $\\textit{proairesis}$ in Aristotle's ethics?", "back": "It distinguishes a morally responsible agent from someone acting solely from impulse or external compulsion."}, {"front": "According to Aristotle, how is a person's character primarily built and assessed?", "back": "Character is developed and judged through the exercise of deliberate choice."}, {"front": "Which modern legal distinction mirrors the Aristotelian question of whether a defendant knew what he was doing?", "back": "The distinction between intentional acts like murder and negligent acts like manslaughter."}, {"front": "Under what two conditions is an action defined as voluntary by Aristotle?", "back": "The action must originate in the agent and the agent must know the particular circumstances of the act."}, {"front": "An action is considered involuntary when it is performed under _____ or in ignorance of relevant circumstances.", "back": "compulsion"}, {"front": "What characterizes an action done under compulsion?", "back": "The moving principle is external to the agent and the agent contributes nothing to the action."}, {"front": "Why does Aristotle restrict praise and blame to voluntary actions only?", "back": "Only voluntary actions are considered true expressions of a person's deliberate character."}, {"front": "Aristotle's doctrine of the _____ defines virtue as a stable disposition to choose the intermediate point between extremes.", "back": "mean"}, {"front": "What are the three core elements present in every virtue Aristotle analyzes?", "back": "Every virtue consists of a sphere of action or feeling, two vices (excess and deficiency), and a mean."}, {"front": "In the sphere of fear, what is the vice of deficiency?", "back": "Cowardice"}, {"front": "In the sphere of fear, what is the vice of excess?", "back": "Rashness or recklessness"}, {"front": "How is the virtuous mean for courage defined?", "back": "It is the disposition to face dangers appropriately, neither fleeing what should be faced nor charging into what should be avoided."}, {"front": "Why is the Aristotelian mean not considered a mathematical midpoint?", "back": "The mean is relative to the specific person, the situation, and the purpose of the action."}, {"front": "Definition: $\\textit{Phronesis}$.", "back": "The intellectual virtue of practical wisdom that enables an individual to identify the mean in particular cases."}, {"front": "How does justice differ from other virtues like courage or temperance in terms of its focus?", "back": "While other virtues focus on the agent's own soul, justice is essentially relational and concerns how one treats others."}, {"front": "Why does Aristotle describe justice as \"complete virtue\"?", "back": "It is the virtue that governs our shared life and relations within the community."}, {"front": "Aristotle views the human being as a \"political _____\" par excellence, with justice as its primary virtue.", "back": "animal"}, {"front": "What is the primary question addressed by distributive justice?", "back": "How should goods belonging to the community be divided among its members?"}, {"front": "What is the primary question addressed by corrective justice?", "back": "How should fairness be restored after one person has wronged another?"}, {"front": "By what principle does distributive justice allocate communal goods?", "back": "Goods are allocated proportionately based on an individual's contribution, worth, or need."}, {"front": "By what principle does corrective justice function to restore fairness?", "back": "It functions arithmetically by stripping the wrongdoer of gain and compensating the victim for loss."}, {"front": "How does corrective justice treat the social standing of the individuals involved?", "back": "It treats the parties as equals, focusing solely on the harm done regardless of their status."}, {"front": "In the context of distributive justice, what are examples of \"communal goods\" Aristotle had in mind?", "back": "Offices, honors, and civic benefits are the primary goods divided by the community."}, {"front": "What distinguishes Aristotelian distributive justice from modern redistributive justice?", "back": "Aristotle focuses on the initial allocation of shared benefits by merit rather than taking from one group to give to another."}, {"front": "Why is the distinction between natural and conventional justice significant for political criticism?", "back": "Natural justice provides a transcendent standard to measure and criticize human laws that may be wanting."}, {"front": "Definition: $\\textit{Nomos}$.", "back": "Law, custom, or convention representing the established rules of a particular community."}, {"front": "Definition: $\\textit{Physis}$.", "back": "Nature; the inherent character of a thing that remains true independently of cultural arrangements."}, {"front": "In what sense can natural justice \"change\" according to Aristotle?", "back": "It can change in its specific applications to different circumstances, even though the principle itself remains constant."}, {"front": "Under what condition does Aristotle allow that ignorance eliminates moral responsibility?", "back": "Responsibility is reduced only if there is ignorance of particular circumstances, not ignorance of moral principles."}, {"front": "How does Aristotle view a person who claims they didn't know lying was wrong?", "back": "He does not excuse them, as ignorance of general moral principles does not eliminate responsibility."}, {"front": "Which historical event served as Aristotle's sharpest example of how democratic institutions can fail justice?", "back": "The trial and execution of Socrates."}, {"front": "What is the relationship between $\\textit{logos}$ and the political community in Aristotle's thought?", "back": "Rational speech ($\\textit{logos}$) is the fundamental basis for human beings to form a political community."}, {"front": "The intellectual virtue of _____ enables us to identify the mean in particular cases.", "back": "$\\textit{phronesis}$"}, {"front": "How does distributive justice vary its criteria depending on the context?", "back": "The criterion for allocation can shift between merit, contribution, or need depending on the specific situation."}, {"front": "Term: Conventional Justice.", "back": "Justice based on $\\textit{nomos}$ (law/custom) which varies from one community to another."}, {"front": "Term: Natural Justice.", "back": "Justice based on $\\textit{physis}$ (nature) which provides a universal standard of right and wrong."}, {"front": "What determines whether a student's cheating is a full expression of their character?", "back": "The degree to which the act was planned with knowledge and lack of remorse versus a panicked, split-second decision."}, {"front": "In Aristotle's framework, what is the 'sphere' of a virtue?", "back": "The specific domain of feeling or action, such as money or anger, in which the virtue operates."}, {"front": "Why is it impossible to evaluate character through involuntary actions?", "back": "Because involuntary actions do not originate in the agent's will and thus do not reflect their internal disposition."}, {"front": "How does Aristotle characterize a person who possesses courage but lacks justice?", "back": "They are considered morally deficient in the most important domain, which is the domain of common social life."}, {"front": "In corrective justice, what must happen to the wrongdoer's 'gain'?", "back": "The wrongdoer must be stripped of the gain to restore the arithmetic balance of fairness."}, {"front": "What role does rational deliberation play in $\\textit{proairesis}$?", "back": "It is the process of figuring out the best means to achieve a given end."}, {"front": "Under what condition is an action considered involuntary due to ignorance?", "back": "When the agent is unaware of the specific, relevant circumstances surrounding their action."}, {"front": "Why is justice uniquely identified as the virtue of the 'political animal'?", "back": "Because it specifically addresses the obligations and debts we owe to one another in a shared community."}, {"front": "How does the structure of virtue help apply Aristotle's theory to real-world cases?", "back": "It provides a repeatable pattern of identifying spheres, extremes, and the appropriate mean."}, {"front": "Aristotle's theory of natural justice later influenced the 'natural law' theory of which medieval philosopher?", "back": "Thomas Aquinas"}, {"front": "What distinguishes the 'moving principle' in a voluntary act?", "back": "The moving principle originates within the agent themselves."}, {"front": "According to the Teacher's Note, what is a modern application of Aristotelian distributive justice?", "back": "Debates over whether college admissions should favor the most academically qualified candidates."}, {"front": "What does 'arithmetical' fairness imply in the context of corrective justice?", "back": "It implies a direct restoration of balance where the victim's loss is exactly equalized by the wrongdoer's penalty."}, {"front": "Why is the distinction between $\\textit{nomos}$ and $\\textit{physis}$ considered a pivotal idea in ethics?", "back": "It creates a tension between what a specific culture permits and what is universally true of human nature."}, {"front": "In Aristotle's view, can a person be held morally responsible for an act done under external physical force?", "back": "No, because the action is involuntary as the agent contributes nothing and the moving principle is external."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
