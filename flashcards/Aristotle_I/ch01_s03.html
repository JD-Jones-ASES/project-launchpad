    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;

        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "How many years did Aristotle spend studying at Plato's Academy?", "back": "Twenty years."}, {"front": "In what specific aspects of Aristotle's work is Plato's influence most evident?", "back": "In his vocabulary, questions, method, and the points of his sharpest disagreements."}, {"front": "Who was Plato's primary teacher?", "back": "Socrates."}, {"front": "What was the name of the school founded by Plato in Athens?", "back": "The Academy."}, {"front": "Approximately how many Platonic dialogues have survived to the present day?", "back": "Thirty-five."}, {"front": "What are three of Plato's most famous works mentioned in the text?", "back": "The Republic, the Meno, and the Symposium (or the Phaedo)."}, {"front": "Term: Theory of Forms.", "back": "Definition: The Platonic claim that ultimate reality consists of eternal, immaterial archetypes rather than the physical world."}, {"front": "How did Alfred North Whitehead describe the history of European philosophy in relation to Plato?", "back": "As \"a series of footnotes to Plato.\""}, {"front": "Term: Philosophical Idealism (Platonic).", "back": "Definition: The view that ultimate reality is mental, spiritual, or ideal rather than material."}, {"front": "Term: Empiricism.", "back": "Definition: The view that knowledge originates in sensory experience and observation of the world."}, {"front": "How does Plato describe the physical world in relation to the Forms?", "back": "As a shadow or copy of a higher realm of eternal, unchanging Forms."}, {"front": "According to Plato, what is the only way to attain genuine knowledge?", "back": "By grasping the Forms through reason rather than the senses."}, {"front": "What are two of the specific Forms mentioned as archetypes in Platonic philosophy?", "back": "The Form of Justice and the Form of Beauty (or the Form of the Good)."}, {"front": "What Greek words did Plato use to refer to the Forms?", "back": "Eidos or idea."}, {"front": "Why did Aristotle reject the existence of a separate realm of Forms?", "back": "He believed it doubled the world unnecessarily to explain things that could be understood by observation."}, {"front": "Where did Aristotle believe \"form\" is located?", "back": "Inside individual things themselves, rather than floating above them."}, {"front": "Term: Substance (Aristotelian).", "back": "Definition: A concrete, individual thing, such as a specific horse, man, or tree, representing a primary unit of reality."}, {"front": "In Aristotle's view, what two components are joined in an individual substance and cannot exist apart?", "back": "Form and matter."}, {"front": "What was Aristotle's proposed method for understanding a concept like justice?", "back": "By examining just acts and just people in the real world."}, {"front": "What literary form did Plato use to convey his philosophical ideas?", "back": "Dialogues."}, {"front": "Why did Plato choose the dialogue form for his writings?", "back": "To enact his view that philosophy is a living conversation rather than a set of fixed doctrines."}, {"front": "What literary form is characteristic of Aristotle's writing?", "back": "Treatises."}, {"front": "How is an Aristotelian treatise typically organized?", "back": "Systematically and analytically, moving from definitions to premises to conclusions."}, {"front": "Term: Endoxa.", "back": "Definition: The reputable views or previous opinions that Aristotle surveyed before arguing for his own conclusions."}, {"front": "In Raphael's \"School of Athens,\" what is signified by Plato pointing upward?", "back": "The heavens and the realm of Forms."}, {"front": "In Raphael's \"School of Athens,\" what is signified by Aristotle gesturing outward and downward?", "back": "The earth and the world around us."}, {"front": "What was the name of the school founded by Aristotle in 335 BC?", "back": "The Lyceum (Lykeion)."}, {"front": "Why was Aristotle's school known as the \"Peripatetic\" school?", "back": "He taught in the covered walkways, known as the peripatos."}, {"front": "What two specific structures were revealed during the 1996 excavations of the Lyceum?", "back": "The palaestra and the gymnasium."}, {"front": "What shared belief do Plato and Aristotle hold regarding morality?", "back": "That there is an objective moral order and that good and bad are not merely matters of opinion."}, {"front": "What do both Plato and Aristotle consider to be the highest human capacity?", "back": "Reason."}, {"front": "Which specific type of life do both Plato and Aristotle agree is the only one worth living?", "back": "The examined life."}, {"front": "What concept is considered central to human flourishing by both philosophers?", "back": "Virtue."}, {"front": "How do both Plato and Aristotle relate the study of ethics to society?", "back": "By connecting ethics to politics, viewing the good person and the good city as part of the same inquiry."}, {"front": "Why did Aristotle reject the Platonic \"Form of the Good\" as a separate entity?", "back": "He believed that a concept of the good that floats free of actual human life is useless for ethics."}, {"front": "How does Aristotle's goal for ethics differ from Plato's theoretical approach?", "back": "Aristotle wants to know what goodness looks like when real people in real communities try to achieve it."}, {"front": "According to the \"thinkdeeper\" section, what does Aristotle look at to ground his ethical system?", "back": "People, human nature, and human function."}, {"front": "For Aristotle, what makes a human life go well or badly?", "back": "The fulfillment of human nature and function as observed in the world."}, {"front": "Does Aristotle believe that objective morality requires divine revelation?", "back": "No; he grounds it in observation of the world and human nature."}, {"front": "In the context of the text, what does it mean to be an \"empiricist\"?", "back": "To believe that knowledge is grounded in observation and how things actually work in practice."}, {"front": "What was the significance of the 1996 excavation of the Lyceum site?", "back": "It revealed the physical remains of the school that had been buried under modern Athens."}, {"front": "How does Aristotle's treatment of previous opinions (endoxa) demonstrate his intellectual method?", "back": "He methodically surveys reputable views before arguing for his own to ensure a thorough inquiry."}, {"front": "The signature idea of Plato is the _____, which claims reality exists in immaterial archetypes.", "back": "Theory of Forms"}, {"front": "Aristotle's school, the Lyceum, was founded in the year _____.", "back": "335 BC"}, {"front": "Plato's use of irony and wit is characteristic of which literary form?", "back": "The dialogue."}, {"front": "Which philosopher's orientation is described as focusing on how things \"ought to work in theory\"?", "back": "Plato."}, {"front": "According to Aristotle, can the \"form\" of an oak tree exist independently of a physical oak tree?", "back": "No, form and matter do not exist apart from the individual substance."}, {"front": "What is the highest Form in the Platonic hierarchy?", "back": "The Form of the Good."}, {"front": "Which city is associated with the birth and death of Plato?", "back": "Athens."}, {"front": "How does Aristotle's writing style handle objections?", "back": "He anticipates and refutes them systematically."}, {"front": "What is the primary difference in the reading experience between Plato and Aristotle?", "back": "Plato's work is dramatic and engaging on the surface, while Aristotle's is methodical and intellectually analytical."}, {"front": "What does Aristotle claim is the result of a concept of the good that exists independently of human life?", "back": "It is useless for ethics and cannot be achieved by man."}, {"front": "For Plato, the \"Form of Justice\" is what all _____ have in common.", "back": "Just things"}, {"front": "What term does the text use for the reputable views Aristotle surveys?", "back": "Endoxa."}, {"front": "Plato lived from approximately _____ to _____ BC.", "back": "428 to 348"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
