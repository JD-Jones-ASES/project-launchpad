<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Man (Aristotle I) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what year and city was Aristotle born?", "back": "Aristotle was born in 384 BC in Stagira."}, {"front": "What epithet is sometimes used for Aristotle in philosophical writing due to his place of birth?", "back": "The Stagirite."}, {"front": "What was the profession of Aristotle’s father, Nicomachus?", "back": "He was a physician attached to the royal court of Macedon."}, {"front": "How might Aristotle's medical household have influenced his intellectual development?", "back": "It likely planted the seeds for his lifelong passion for careful observation of the natural world."}, {"front": "At what age did Aristotle travel to Athens to enroll in Plato's Academy?", "back": "Seventeen."}, {"front": "Term: Plato's Academy", "back": "Definition: A school of philosophy founded by Plato around 387 BC in a grove outside Athens."}, {"front": "Which modern English word is derived from the name of the school founded by Plato?", "back": "Academic."}, {"front": "How long did Aristotle stay at the Academy, and in what roles?", "back": "He stayed for twenty years as a student, researcher, and teacher."}, {"front": "What event prompted Aristotle to leave the Academy in 348/347 BC?", "back": "The death of Plato."}, {"front": "Describe Aristotle’s intellectual attitude toward Plato’s teachings.", "back": "He absorbed Plato's teachings but eventually refined or rejected many of them."}, {"front": "Where did Aristotle conduct extensive biological research after leaving Athens?", "back": "In Asia Minor and the Aegean islands."}, {"front": "What kind of organisms did Aristotle study during his travels in the Aegean?", "back": "He dissected sea creatures and catalogued insects."}, {"front": "Define Aristotle's \"empirical habit of mind.\"", "back": "The practice of looking carefully at the world as it actually is."}, {"front": "Who invited Aristotle to tutor his son in 343 BC?", "back": "King Philip II of Macedon."}, {"front": "Who was Aristotle's most famous student during his time in Macedon?", "back": "Alexander the Great."}, {"front": "How old was Alexander the Great when he began his studies with Aristotle?", "back": "Thirteen years old."}, {"front": "In what year did Aristotle return to Athens to found his own school?", "back": "335 BC."}, {"front": "What was the name of the school founded by Aristotle in Athens?", "back": "The Lyceum."}, {"front": "The Lyceum was named after which Greek deity?", "back": "Apollo Lykeios."}, {"front": "Which modern French word for high school is derived from the name of Aristotle's school?", "back": "Lycée."}, {"front": "Why were Aristotle's followers called \"Peripatetics\"?", "back": "The name comes from the Greek *peripatein* (\"to walk about\"), as Aristotle supposedly walked while teaching."}, {"front": "What types of research projects were undertaken at the Lyceum?", "back": "Collecting city constitutions, cataloging animals, and mapping the night sky."}, {"front": "What event in 323 BC led to a surge of anti-Macedonian sentiment in Athens?", "back": "The unexpected death of Alexander the Great in Babylon."}, {"front": "Why did Aristotle feel endangered in Athens after 323 BC?", "back": "He was closely identified with Macedonian power."}, {"front": "Where did Aristotle withdraw to after leaving Athens for the final time?", "back": "Chalcis, on the island of Euboea."}, {"front": "To what historical event was Aristotle referring when he said he would not let Athens \"sin twice against philosophy\"?", "back": "The execution of Socrates in 399 BC."}, {"front": "In what year did Aristotle die?", "back": "322 BC."}, {"front": "Who was Aristotle's wife, and who was their daughter?", "back": "His wife was Pythias, and their daughter was also named Pythias."}, {"front": "Who was the mother of Aristotle's son, Nicomachus?", "back": "Herpyllis."}, {"front": "The *Nicomachean Ethics* is possibly named after which two people?", "back": "Aristotle's father or his son, both named Nicomachus."}, {"front": "Aristotle's work on the principles of valid reasoning is known as the field of _____.", "back": "Logic."}, {"front": "Which field of Aristotle's research focused on the study of the soul and mental processes?", "back": "Psychology."}, {"front": "Besides biology, name three other areas of natural inquiry Aristotle produced treatises on.", "back": "Natural philosophy, psychology, and mapping the night sky (astronomy)."}, {"front": "Aristotle's study of the fundamental nature of reality and being is called _____.", "back": "Metaphysics."}, {"front": "Which two of Aristotle's fields of study concern human conduct and the organization of society?", "back": "Ethics and Politics."}, {"front": "Which two of Aristotle's fields of study concern the arts of persuasion and literary theory?", "back": "Rhetoric and Poetics."}, {"front": "Aristotle compared the difference between the educated and uneducated to the difference between _____.", "back": "The living and the dead."}, {"front": "Aristotle's life occurred during the transition from the peak of Athenian culture to the rise of _____ power.", "back": "Macedonian."}, {"front": "According to the source, Aristotle's work reflects a conviction that _____ can grasp the good.", "back": "Reason."}, {"front": "What does Aristotle’s work highlight regarding the nature of political life?", "back": "Its fragility."}, {"front": "How long did Aristotle's tutoring of Alexander the Great last?", "back": "Three years (343–340 BC)."}, {"front": "The grove of Akademos, where the Academy was located, was situated just outside which city?", "back": "Athens."}, {"front": "During which years was Aristotle a member of Plato's Academy?", "back": "367–347 BC."}, {"front": "How many years did Aristotle head the Lyceum before leaving Athens?", "back": "Twelve years."}, {"front": "The Greek word *peripatein* literally means _____.", "back": "To walk about."}, {"front": "What was the name of Aristotle's birthplace in northern Greece?", "back": "Stagira."}, {"front": "Aristotle's father was a physician specifically to which royal court?", "back": "The royal court of Macedon."}, {"front": "After Plato died, what geographic region did Aristotle travel to for biological research?", "back": "Asia Minor."}, {"front": "In the context of the Lyceum, what were Aristotle and his associates collecting from various Greek cities?", "back": "Constitutions."}, {"front": "In which city did Alexander the Great die, triggering Aristotle's departure from Athens?", "back": "Babylon."}, {"front": "Aristotle's education at the Academy is described as leaving a _____ _____ on his thinking.", "back": "Permanent mark."}, {"front": "What was the name of the peninsula where Stagira was located?", "back": "The Chalcidice peninsula."}, {"front": "Aristotle's life spanned from _____ BC to _____ BC.", "back": "384 to 322 BC."}, {"front": "Who was Aristotle's primary teacher for twenty years?", "back": "Plato."}, {"front": "The Lyceum was a public space and _____ located just outside Athens.", "back": "Gymnasium."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
