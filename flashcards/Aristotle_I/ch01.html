<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Man (Aristotle I) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why was Aristotle often called 'The Philosopher' by the medieval world?", "back": "No single thinker shaped Western thought in so many fields for so long as Aristotle did."}, {"front": "How long did Aristotle spend in Plato's Academy, and what was the impact?", "back": "Aristotle spent twenty years in Plato's Academy, and Plato's influence is evident in his vocabulary, questions, method, and even in areas of strong disagreement."}, {"front": "Who was Plato?", "back": "Plato was an Athenian philosopher (c. 428–348 BC), a student of Socrates, and the founder of the Academy. His works, including the Republic and Phaedo, survive complete."}, {"front": "What is Plato's 'Theory of Forms'?", "back": "The Theory of Forms is Plato's signature idea, claiming that ultimate reality consists not in the physical world but in eternal, immaterial archetypes (Forms)."}, {"front": "What did Alfred North Whitehead famously say about Plato's influence?", "back": "Whitehead famously described the entire history of European philosophy as 'a series of footnotes to Plato'."}, {"front": "Define philosophical Idealism, as it applies to Plato.", "back": "Idealism is the view that ultimate reality is mental, spiritual, or ideal rather than material. Plato's idealism holds that the physical world is a shadow of a higher realm of Forms."}, {"front": "Define Empiricism, as it applies to Aristotle.", "back": "Empiricism is the view that knowledge originates in sensory experience and observation of the world, rather than in reason or innate ideas alone. Aristotle grounds arguments in observation."}, {"front": "According to Plato, what are 'Forms'?", "back": "Platonic Forms are eternal, immaterial archetypes (like the Form of Justice or Beauty) that Plato believed constitute true reality. They are grasped through reason."}, {"front": "How did Aristotle's view of reality differ from Plato's regarding 'Forms'?", "back": "Aristotle disagreed with Plato's separate realm of Forms, believing that 'form is in things, not floating above them.' For Aristotle, reality lives in the world itself."}, {"front": "What did Aristotle mean by 'substance'?", "back": "Aristotle's 'substance' refers to a concrete, individual thing (e.g., this horse, this man). He considered substances the primary units of reality, with form and matter existing within them."}, {"front": "Describe Plato's typical writing style and its philosophical significance.", "back": "Plato wrote dialogues, often featuring Socrates, which were dramatic, full of irony, and deliberately inconclusive, reflecting his view of philosophy as a living conversation."}, {"front": "Describe Aristotle's typical writing style and its characteristics.", "back": "Aristotle wrote treatises, which are systematic, analytical, and organized by topic. He moves methodically from definitions to premises and anticipates objections."}, {"front": "How does Raphael's 'School of Athens' visually represent the philosophical difference between Plato and Aristotle?", "back": "In 'School of Athens', Plato points upward toward the heavens (realm of Forms), while Aristotle extends his hand outward and downward toward the earth (the observable world)."}, {"front": "What was the Lyceum?", "back": "The Lyceum was the school founded by Aristotle in Athens in 335 BC. He taught in its covered walkways (peripatos), which gave rise to the 'Peripatetic' school."}, {"front": "Despite their disagreements, what key beliefs did Plato and Aristotle share?", "back": "Both believed in an objective moral order, that reason is the highest human capacity, that the examined life is worth living, and that virtue is central to human flourishing, connecting ethics and politics."}, {"front": "Why did Aristotle reject Plato's Form of the Good?", "back": "Aristotle explicitly rejected the Platonic Form of the Good as a separate entity, arguing that a concept of good 'capable of separate and independent existence' is useless for human ethics, which needs to consider how goodness is achieved by real people."}, {"front": "Can an empiricist believe in objective morality? What was Aristotle's position?", "back": "Aristotle believed yes. He grounded his ethics in observations about human nature, function, and what makes human lives go well or badly, without appealing to a separate realm of Forms or divine revelation."}, {"front": "What is the first piece of advice for reading Aristotle's dense prose?", "back": "Read slowly and carefully. Aristotle does not repeat himself for emphasis, expecting the reader to remember what he says once."}, {"front": "Why is it important to pay attention to definitions when reading Aristotle?", "back": "Aristotle almost always defines his terms before reasoning from them. Confusion often arises from letting a key definition slip, so looking back for definitions is crucial."}, {"front": "What should a reader try to identify early when approaching an Aristotelian argument?", "back": "Readers should try to identify the conclusion first by asking, 'what is he trying to prove here?' Knowing the destination makes following the individual steps easier."}, {"front": "Describe Aristotle's 'on the one hand' argumentative structure.", "back": "Aristotle characteristically surveys a range of previous or opposing views (endoxa) before settling on his own. He shows where others are right or wrong before presenting his position, demonstrating intellectual honesty."}, {"front": "What is a recommended study habit for understanding Aristotle?", "back": "Keeping a running outline while reading, noting main points, supporting arguments, objections considered, and conclusions, greatly aids in reviewing and understanding the material."}, {"front": "Where and when was Aristotle born, and what was his father's profession?", "back": "Aristotle was born in 384 BC in Stagira, a small town in northern Greece. His father, Nicomachus, was a physician attached to the royal court of Macedon."}, {"front": "What was the significance of Aristotle's father's profession?", "back": "Growing up in a household oriented toward medicine and natural inquiry may have influenced Aristotle's lifelong passion for careful observation of the natural world."}, {"front": "What is the origin of the word 'academic'?", "back": "The word 'academic' derives from Plato's Academy, one of the first institutions of higher learning in the Western world, named after the grove of Akademos."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
