    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;

        /* Card */
        .fc-card-wrapper {

            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;

            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {

            background: transparent;

            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);

        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;

        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;

            margin: 1rem 0 0.5rem;

        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;

        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>

    <main class="main-content">
        <div class="container">

                    <a href="../../courses.html#Aristotle_I">&larr; Back to Courses</a>

                <div class="fc-progress">

                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>

                        </div>

    <script>
    var CARDS = [{"front": "According to Aristotle, what is the primary instrument by which a state secures the best life for its citizens?", "back": "Education."}, {"front": "What Greek term describes the entire formation of a human being, including character, taste, and civic virtue?", "back": "$\\textit{paideia}$."}, {"front": "Aristotle argues that the best life for both a city and an individual is a life of active virtue and _____.", "back": "Reason."}, {"front": "According to the text, why can a city not be genuinely happy through wealth or military power alone?", "back": "Because happiness requires the exercise of virtue rather than just external goods."}, {"front": "Aristotle divides the 'goods' of human life into three categories: external goods, goods of the body, and goods of the _____.", "back": "Soul."}, {"front": "Why does Aristotle argue that external goods are less valuable than goods of the soul?", "back": "External goods have a limit and can be hurtful in excess, while spiritual goods are more useful the higher their degree."}, {"front": "According to Aristotle, does virtue produce external goods, or do external goods produce virtue?", "back": "Virtue produces external goods."}, {"front": "Aristotle claims that a city's happiness is exactly the same as the happiness of a(n) _____.", "back": "Individual."}, {"front": "What structural claim does Aristotle make regarding the duty of a legislator?", "back": "The legislator must greatly interest himself in the care and education of the youth."}, {"front": "How does education serve to preserve a specific form of government, such as an oligarchy?", "back": "It produces citizens with the manners and character peculiar to that specific government."}, {"front": "Aristotle argues that because every city has one shared 'end' or goal, education should be _____.", "back": "One and the same for all (a common care)."}, {"front": "Why does Aristotle believe education should be public rather than left to private choice?", "back": "Because children belong to the city and their development affects the city's overall health."}, {"front": "What are the four traditional subjects of Greek education identified by Aristotle?", "back": "Reading, gymnastic exercises, music, and painting."}, {"front": "What specific virtue is developed through the practice of gymnastic exercises?", "back": "Courage."}, {"front": "What Greek term refers to the arts of the Muses, including poetry, song, and emotional formation?", "back": "$\\textit{mousike}$."}, {"front": "How does Aristotle define a 'mean' art or discipline?", "back": "Any work that renders the body or mind of a freeman unfit for the practice of virtue."}, {"front": "Why does Aristotle label employments exercised for financial gain as 'sordid'?", "back": "They take away the freedom of the mind and render it unfit for virtue."}, {"front": "What is the danger of a freeman acquiring 'perfect skill' in professional arts?", "back": "It can lead to acting for the sake of others like a servant rather than for one's own virtue."}, {"front": "According to Aristotle, what is the 'principal' goal of all education?", "back": "To enable the citizen to enjoy leisure honorably."}, {"front": "How does Aristotle distinguish 'play' from 'leisure' ($\\textit{schole}$)?", "back": "Play is a medicine for the pain of labor, while leisure is an end in itself associated with happiness."}, {"front": "What is the primary purpose of teaching children painting beyond its practical utility?", "back": "To make them accurate judges of the beauties of the human form."}, {"front": "Aristotle argues that education must prepare citizens for both practical work and _____.", "back": "Noble leisure."}, {"front": "What is the defining characteristic of $\\textit{schole}$ (leisure) in Aristotelian philosophy?", "back": "It is free activity pursued for its own sake rather than for the sake of something else."}, {"front": "Why does Aristotle oppose the 'utilitarian' temptation to reduce education to job training?", "back": "He believes education should enable students to 'be' something rather than just 'do' something."}, {"front": "According to the text, music has the power to influence the 'manners' of students by accustoming them to _____.", "back": "Rejoice rightly."}, {"front": "Why does Aristotle suggest that learning a science or art is naturally 'troublesome'?", "back": "To explain why learning is a serious activity rather than a form of play."}, {"front": "What argument does Aristotle use to suggest that professional music performance might be 'mean'?", "back": "The poets never represent Jupiter himself as singing or playing an instrument."}, {"front": "According to Aristotle, what are the three properties attributed to music?", "back": "Amusement/refreshment, influence on manners/virtue, and assistant to prudence."}, {"front": "Why is music 'justly admitted' into every happy life according to Aristotle?", "back": "Because it has the power of inspiring joy and is one of the most pleasing things."}, {"front": "How does Aristotle explain why people often mistake amusement for the final end of life?", "back": "Amusement contains a likeness to the final end because it is sought for itself rather than a future result."}, {"front": "In Aristotle's view, how does the happiness of God differ from human 'good fortune'?", "back": "God is happy in Himself by nature, whereas good fortune is an external benefit of chance."}, {"front": "Aristotle claims that a city cannot be praiseworthy unless it possesses virtue and _____.", "back": "Wisdom."}, {"front": "What is the result of a state educating its citizens only for the purpose of war?", "back": "The state eventually becomes martial, unjust, and unable to handle peace."}, {"front": "What does Aristotle identify as the 'medicine' for the uneasiness caused by labor?", "back": "Play or relaxation."}, {"front": "Why does Aristotle value the 'liberal' arts over 'useful' arts?", "back": "Liberal arts focus on what is noble and excellent rather than what is merely necessary or profitable."}, {"front": "According to the text, the person who knows only how to be 'useful' has failed to achieve what?", "back": "The full life of a human being."}, {"front": "Aristotle argues that everything useful has a boundary, but the quality of the _____ has no such limit in its utility.", "back": "Soul."}, {"front": "What is the relationship between the 'best man' and 'pleasure' in Book VIII?", "back": "The best man proposes the best pleasure which arises from the noblest actions."}, {"front": "Why must the magistrate care for the manners of the government?", "back": "Because the manners of a government are what originally established and continue to preserve it."}, {"front": "Aristotle cites the Lacedaemonians to show that some believe one can judge music without _____.", "back": "Ever having learnt it."}, {"front": "Why does Aristotle believe reading and writing are 'singularly' useful?", "back": "They serve as the means for acquiring other different sorts of instruction."}, {"front": "What is the ethical requirement for an act to be considered 'noble' according to the text?", "back": "It must be performed for its own sake or for the cause of virtue."}, {"front": "According to Aristotle, a man lacking fortitude, temperance, or justice cannot be _____.", "back": "Happy."}, {"front": "Why does Aristotle argue that external goods should be desired for the sake of the soul?", "back": "Because the soul is more noble than any outward possession or the body."}, {"front": "What happens when a city's citizens possess no virtue despite having military power?", "back": "The city is not considered a 'good' city."}, {"front": "Aristotle defines happiness as an activity of the soul in accordance with _____.", "back": "Virtue."}, {"front": "What is the specific goal of $\\textit{mousike}$ in education beyond pleasure?", "back": "The education of the emotions and the cultivation of character."}, {"front": "In the context of Greek education, what were the two principal instruments taught?", "back": "The aulos (double pipe) and the kithara (lyre)."}, {"front": "Why is the legislator’s interest in education considered a 'structural claim' rather than a recommendation?", "back": "Because the character of the citizens is the very foundation of the constitution."}, {"front": "Aristotle states that 'all people do not agree' on whether education should focus on reason or _____.", "back": "Morals."}, {"front": "According to Book VII, what must be determined before we can know which government is best?", "back": "What manner of living is most desirable for all."}, {"front": "Why is 'hunting after the profitable' considered inappropriate for 'freeborn souls'?", "back": "It focuses on external utility rather than the nobility of the soul."}, {"front": "Aristotle believes that the 'accidents' of the soul follow the same analogy as the value of the _____.", "back": "Subjects themselves (soul vs body)."}, {"front": "What is the primary difference between education for 'labour' and education for 'leisure'?", "back": "Education for labour focuses on external ends, while education for leisure focuses on internal acquisition."}, {"front": "According to the text, what prevents a man who is 'wanting in his understanding' from being happy?", "back": "He lacks the prudence and reason necessary to exercise virtue."}, {"front": "Why does Aristotle claim that those with pure morals and cultivated understandings enjoy more happiness?", "back": "Because they possess the internal goods necessary for happiness regardless of moderate fortune."}, {"front": "What does Aristotle say is the most 'urgent political concern' for a state?", "back": "Education."}, {"front": "In Aristotle’s view, why does a democracy that neglects education eventually fail?", "back": "It produces citizens driven by appetite and faction instead of civic virtue."}, {"front": "According to Book VIII, why is it 'not illiberal' to engage in an art for a friend?", "back": "Because the action is done for the sake of a person or virtue rather than for hire."}, {"front": "Aristotle argues that music is a 'proper employment' for whom?", "back": "Freemen."}, {"front": "How does Aristotle use the quote from Homer about the 'bard' being called to a feast?", "back": "To support the idea that music is a noble employment for hours of rest."}, {"front": "What is the 'final end' of life that humans rarely attain according to Aristotle?", "back": "A state of perfect happiness and virtuous activity."}, {"front": "Why is it necessary to 'be made accustomed' to certain things before practicing virtue?", "back": "Because virtue, like any art or business, requires preliminary habits and learning."}, {"front": "Aristotle compares the relationship between external goods and the soul to the relationship between a _____ and its purpose.", "back": "Machine."}, {"front": "What is the 'controversial' question Aristotle identifies regarding the content of education?", "back": "Whether the object should be utility, virtue, or excellence."}, {"front": "How does Aristotle define the state of being 'sordid' in an educational context?", "back": "It is the condition of a mind that has lost its freedom due to work for gain."}, {"front": "According to Aristotle, why is leisure ($\\textit{schole}$) considered 'preferable' to labor?", "back": "Leisure is an end in itself, while labor is always a means to an end."}, {"front": "In the Ethics, happiness is described as an activity of the soul; how does this influence Aristotle's view of education?", "back": "It means education must form the soul rather than merely training the hands."}, {"front": "Why does Aristotle describe learning to read as more than just a 'useful' skill?", "back": "It is a foundational means for acquiring higher forms of liberal instruction."}, {"front": "According to Aristotle, why should we 'not always hunt after the profitable'?", "back": "Because focusing solely on profit is beneath the dignity of a free person."}, {"front": "Aristotle says that whatever is 'just, wise, or prudent' in a man is the same in a(n) _____.", "back": "City."}, {"front": "In Aristotle's view, how does a city perpetuate its own 'soul'?", "back": "Through a system of education that builds a reservoir of virtue across generations."}, {"front": "What is the relationship between 'pleasure' and 'happiness' in Aristotle's analysis of the best life?", "back": "A happy life must be a pleasant one, as happiness is an end that naturally includes pleasure."}, {"front": "Aristotle argues that music is used as 'refreshment' like sleep or _____.", "back": "Wine."}, {"front": "Why does Aristotle question whether we should follow the practice of kings and hear music performed by others?", "back": "He is examining whether the value of music comes from the pleasure of listening or the discipline of playing."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
