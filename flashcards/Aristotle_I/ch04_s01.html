    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "According to Aristotle, friendship is not just a personal matter but a stable _____ to relate to others in the right way.", "back": "disposition", "id": "fc01"}, {"front": "Aristotle argues that friendship is a philosophical topic because it is a _____, meaning it has better and worse forms.", "back": "virtue", "id": "fc02"}, {"front": "Why does Aristotle consider friendship a 'social necessity'?", "back": "Because no one would choose to live without friends, even if they had all other goods.", "id": "fc03"}, {"front": "According to the text, what does friendship reveal about a person?", "back": "What the person values and the kind of character they are developing.", "id": "fc04"}, {"front": "In a utility friendship, what do the parties value in one another?", "back": "What the other person provides (benefits or services).", "id": "fc05"}, {"front": "What group of people are utility friendships most common among?", "back": "Business partners, colleagues, and acquaintances.", "id": "fc06"}, {"front": "Under what condition does a utility friendship typically dissolve?", "back": "When the utility or benefit provided by the other person ceases.", "id": "fc07"}, {"front": "What is the primary value shared between parties in a pleasure friendship?", "back": "The enjoyment or pleasure the relationship brings.", "id": "fc08"}, {"front": "Pleasure friendships are noted by Aristotle to be particularly common among which demographic?", "back": "The young.", "id": "fc09"}, {"front": "What causes a pleasure friendship to end?", "back": "The fading of the pleasure derived from the relationship.", "id": "fc10"}, {"front": "In a character friendship, what is valued in the other person?", "back": "Their goodness of character or who they are as a person.", "id": "fc11"}, {"front": "Why is character friendship considered stable compared to utility or pleasure friendships?", "back": "The character of a good person does not change with circumstances.", "id": "fc12"}, {"front": "Why are character friendships rare in human experience?", "back": "They require genuine virtue in both parties and time to develop.", "id": "fc13"}, {"front": "Aristotle uses the Greek term _____ to describe character friendship as 'perfect.'", "back": "teleios", "id": "fc14"}, {"front": "What is the 'right reason' for a perfect friendship?", "back": "Love of the person as such, rather than for utility or feeling.", "id": "fc15"}, {"front": "According to Aristotle, what is missing from a good life if one lacks character friendships?", "back": "The experience of genuinely knowing and being known by another person.", "id": "fc16"}, {"front": "How does modern political theory generally view the state compared to Aristotle’s view?", "back": "As a mechanism for managing competing interests rather than a form of friendship.", "id": "fc17"}, {"front": "What is 'civic friendship' in an Aristotelian context?", "back": "Genuine goodwill and shared investment in welfare among citizens.", "id": "fc18"}, {"front": "What does a political structure become if civic friendship is absent?", "back": "A shell without substance.", "id": "fc19"}, {"front": "In Aristotle’s comparison of political and family structures, what is the familial equivalent of monarchy?", "back": "The father-child relationship.", "id": "fc20"}, {"front": "In Aristotle’s comparison of political and family structures, what is the familial equivalent of aristocracy?", "back": "The husband-wife relationship.", "id": "fc21"}, {"front": "In Aristotle’s comparison of political and family structures, what is the familial equivalent of a republic?", "back": "The brother-brother relationship.", "id": "fc22"}, {"front": "Aristotle suggests that the best political structures are extensions of what?", "back": "The natural bonds of affection found in families.", "id": "fc23"}, {"front": "How does Aristotle define 'good government' in terms of affection?", "back": "A form of love made institutional.", "id": "fc24"}, {"front": "Aristotle's 'corrupt' sense of self-love involves assigning oneself the greater share of money, pleasure, and _____.", "back": "honors", "id": "fc25"}, {"front": "What part of the person is actually being gratified in corrupt self-love?", "back": "The base appetites.", "id": "fc26"}, {"front": "What defines the 'proper' sense of self-love according to Aristotle?", "back": "Assigning to oneself nobler actions and the exercise of virtue.", "id": "fc27"}, {"front": "Proper self-love is the love of one's reason, virtue, and capacity for _____.", "back": "excellent action", "id": "fc28"}, {"front": "Why does the person with proper self-love act generously toward others?", "back": "Because benefiting others is acting nobly, and they love acting nobly.", "id": "fc29"}, {"front": "Which philosopher’s painting is used as a visual counterpart to the contemplative life?", "back": "Rembrandt (van Rijn).", "id": "fc30"}, {"front": "Aristotle’s term for the contemplative life is _____.", "back": "bios theoretikos", "id": "fc31"}, {"front": "What is the highest form of happiness (eudaimonia) according to Aristotle in Book X?", "back": "The contemplative life (bios theoretikos).", "id": "fc32"}, {"front": "What Greek term refers to the intellectual contemplation practiced in the highest life?", "back": "theoria", "id": "fc33"}, {"front": "Why is contemplation the highest form of activity?", "back": "It exercises the highest part of the human (the intellect).", "id": "fc34"}, {"front": "Aristotle describes the contemplative life as _____, meaning it is the most self-sufficient.", "back": "autarkes", "id": "fc35"}, {"front": "In terms of duration, why is contemplation superior to active life?", "back": "It is the most continuous and can be pursued uninterruptedly.", "id": "fc36"}, {"front": "How do the pleasures of philosophy compare to other pleasures in the Ethics?", "back": "They are the most stable and enduring.", "id": "fc37"}, {"front": "Why does Aristotle describe the contemplative life as 'godlike'?", "back": "It mimics the life of the gods, which consists of pure contemplation.", "id": "fc38"}, {"front": "What does Aristotle call the life of practical virtue in relation to contemplation?", "back": "A secondary happiness.", "id": "fc39"}, {"front": "Does Aristotle argue that the practical virtues of a statesman are worthless?", "back": "No; he argues that while genuine, they are lower than the contemplative life.", "id": "fc40"}, {"front": "According to Thomas Aquinas, the highest human good points toward what?", "back": "A contemplation of the divine that transcends natural capacity.", "id": "fc41"}, {"front": "The 'Justice objection' asks if a person who contemplates alone can be happier than one who practices _____, defined as 'complete virtue.'", "back": "justice", "id": "fc42"}, {"front": "What is the core concern of the 'Divine objection' regarding the contemplative life?", "back": "Whether humans should try to transcend their humanity or just be human beings.", "id": "fc43"}, {"front": "How does Aristotle’s concept of contemplation differ from simple laziness or passivity?", "back": "It is the active work of sustained philosophical inquiry and reasoning.", "id": "fc44"}, {"front": "What modern professional role is suggested as an analogy for Aristotle's contemplative life?", "back": "A great researcher or scholar devoted to the pursuit of truth.", "id": "fc45"}, {"front": "Which Christian concept from Augustine involves the 'ordered love of all things in their proper rank'?", "back": "ordo amoris", "id": "fc46"}, {"front": "In proper self-love, the person loves what is _____ in themselves.", "back": "best", "id": "fc47"}, {"front": "Why is 'time' specifically required for a character friendship?", "back": "It is necessary to develop and test the genuine virtue of both parties.", "id": "fc48"}, {"front": "How does proper self-love facilitate love of neighbor?", "back": "Loving what is best in oneself naturally leads to loving what is best in others.", "id": "fc49"}, {"front": "Aristotle claims that a healthy community requires citizens to recognize themselves as participants in a _____.", "back": "common life", "id": "fc50"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
