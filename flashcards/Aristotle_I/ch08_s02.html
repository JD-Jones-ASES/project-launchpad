<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Man (Aristotle I) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 8, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In the thirteenth-century scholastic tradition, whose authority in philosophy was considered second only to Scripture?", "back": "Aristotle"}, {"front": "Which two works did Aristotle consider the center of his \"philosophy of human affairs\"?", "back": "The Nicomachean Ethics and the Politics"}, {"front": "According to the text, which two works constitute the remaining pillars of Aristotle's practical philosophy alongside ethics and politics?", "back": "The Poetics and the Rhetoric"}, {"front": "What is the primary literary form analyzed in Aristotle's Poetics?", "back": "Tragedy"}, {"front": "Term: Mimesis", "back": "Definition: The representation or imitation of human action, character, and emotion in an artistic medium."}, {"front": "Why does Aristotle describe the pleasure of imitation as \"cognitive\"?", "back": "It allows us to recognize what is being represented and understand it more clearly."}, {"front": "How does art assist in understanding human action compared to real life?", "back": "It provides a controlled form that clarifies the human condition beyond the confusion of actual life."}, {"front": "Term: Catharsis", "back": "Definition: The purification or purgation of the audience's emotions, specifically pity and fear."}, {"front": "Which two specific emotions does Aristotle argue a good tragedy should evoke and purify?", "back": "Pity and fear"}, {"front": "How does the concept of catharsis connect the Poetics to Aristotle's Ethics?", "back": "It suggests that art is morally significant because it trains and educates our emotional responses."}, {"front": "Term: Hamartia", "back": "Definition: The error or flaw that brings about the downfall of a tragic protagonist."}, {"front": "Why is \"tragic flaw\" potentially a misleading translation for hamartia?", "back": "It may be a mistake of judgment or ignorance rather than a moral failing."}, {"front": "What type of character fall produces the best tragedy according to Aristotle?", "back": "A person of genuine nobility brought down by an error or misjudgment."}, {"front": "How does tragedy relate to the ethical concept of phronesis (practical wisdom)?", "back": "It demonstrates the vulnerability of the good person when practical wisdom fails or is insufficient."}, {"front": "The modern \"three-act structure\" used in Hollywood screenwriting is a legacy of which Aristotelian work?", "back": "The Poetics"}, {"front": "What is the primary subject of Aristotle's Rhetoric?", "back": "Persuasive speech in the public forum."}, {"front": "Term: Ethos", "back": "Definition: Persuasion based on the character, credibility, and trustworthiness of the speaker."}, {"front": "Aristotle regarded _____ as the most powerful of the three means of persuasion.", "back": "Ethos"}, {"front": "Term: Pathos", "back": "Definition: Persuasion that operates by putting the audience in an emotional state receptive to a conclusion."}, {"front": "Term: Logos", "back": "Definition: Persuasion through rational argument, logical structure, and evidence."}, {"front": "How does the Rhetoric connect to Aristotle's Politics?", "back": "It addresses the essential civic skill of making and evaluating arguments in a community ordered by speech."}, {"front": "How did Aristotle's approach to rhetoric differ from that of Plato?", "back": "He sought to reform rhetoric by grounding it in truth and virtue rather than dismissing it as manipulative."}, {"front": "Which Roman statesman and orator helped transmit Aristotelian rhetorical ideas to the Latin tradition?", "back": "Cicero"}, {"front": "What phrase from the Nicomachean Ethics describes the ultimate object of Aristotle's ethical and political inquiry?", "back": "The Life of Man"}, {"front": "According to the text, what is the ultimate purpose of philosophy?", "back": "The examined life, which involves thinking honestly about what we are and how to live well in community."}, {"front": "Who referred to Aristotle as \"the master of those who know\"?", "back": "Dante"}, {"front": "Which medieval theologian integrated Aristotle's philosophy into the intellectual framework of Christian theology?", "back": "Thomas Aquinas"}, {"front": "In the Christian tradition, how is the relationship between reason and grace described regarding Aristotle?", "back": "Grace does not destroy nature, but perfects it."}, {"front": "Aristotle is described as the traveler who went as far as _____ _____ can go.", "back": "Unaided reason"}, {"front": "Aristotle's Politics and Ethics shaped the foundations of Western political philosophy after their recovery in the _____ and _____ centuries.", "back": "Twelfth; thirteenth"}, {"front": "According to Aristotle, art is an act of imitation that allows us to contemplate emotions at a _____.", "back": "Distance"}, {"front": "In the context of the Rhetoric, what marks the \"political animal\"?", "back": "Logos (rational speech)"}, {"front": "True or False: Aristotle believed that emotions are morally significant and can be shaped by art.", "back": "True"}, {"front": "The character of the speaker in persuasion is known as _____.", "back": "Ethos"}, {"front": "The logical structure of a persuasive case is known as _____.", "back": "Logos"}, {"front": "The emotional state of the audience in persuasion is known as _____.", "back": "Pathos"}, {"front": "According to the Poetics, tragedy teaches us about the human condition more clearly than real life because it is presented in a _____ _____.", "back": "Controlled form"}, {"front": "Aristotle argues that virtue requires feeling the _____ things at the _____ times.", "back": "Right; right"}, {"front": "What does Aristotle suggest happens when phronesis (practical wisdom) fails in a tragedy?", "back": "A person of nobility suffers a tragic fall due to an error of judgment."}, {"front": "True or False: Aristotle intended the Rhetoric to be a manual for artificial emotional provocation.", "back": "False"}, {"front": "Which historical figure's oratory was a primary channel for Aristotelian ideas in the European cathedral schools?", "back": "Cicero"}, {"front": "Aristotle's Poetics provides the foundational concepts for what academic field?", "back": "Western literary criticism"}, {"front": "In a community ordered by logos, what is considered an essential civic skill?", "back": "The ability to make and evaluate arguments."}, {"front": "The Poetics suggests that we enjoy the cognitive process of _____ when viewing imitative art.", "back": "Recognition"}, {"front": "Aristotle describes a person who falls not because of malice, but because of a failure of wisdom, as a person of genuine _____.", "back": "Nobility"}, {"front": "According to the text, what is the length of the Poetics?", "back": "Roughly forty pages."}, {"front": "Why is the speaker’s character (ethos) persuasive according to Aristotle?", "back": "We trust people who appear knowledgeable, trustworthy, and concerned with our interests."}, {"front": "What three areas did the Rhetoric influence in the English-speaking world?", "back": "Legal traditions, parliamentary traditions, and modern argumentation courses."}, {"front": "The phrase \"master of those who know\" reflects Aristotle's status during which historical period?", "back": "The Middle Ages (or the medieval world)."}, {"front": "According to the text, what limits did Aristotle have despite his rigor and range?", "back": "He was limited by his specific time and place and was wrong about some important things."}, {"front": "In Aristotelian terms, a mistake of judgment or ignorance of facts is a form of _____.", "back": "Hamartia"}, {"front": "What is the intended result of an audience experiencing pity and fear in a tragedy?", "back": "An emotional education or purification (catharsis)."}, {"front": "How does Aristotle characterize political life in relation to speech?", "back": "It is a matter of speech and persuasion in assemblies, courts, and leadership."}, {"front": "Philosophy is not merely the accumulation of information, but thinking about what it means to live well in _____ with others.", "back": "Community"}, {"front": "What role does evidence and valid inference play in Aristotle's rhetorical theory?", "back": "They comprise logos, the appeal through the argument itself."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
