<html lang="en">
<head>

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">

    <script>
    var CARDS = [{"front": "According to Aristotle, what is the ultimate aim of every art, science, action, and moral choice?", "back": "Some good.", "id": "fc01"}, {"front": "How does Aristotle define the 'Chief Good'?", "back": "That which all things aim at and which is desired for its own sake.", "id": "fc02"}, {"front": "In Aristotle's hierarchy of ends, what is the relationship between 'master-arts' and the arts ranging under them?", "back": "The ends of master-arts are more choice-worthy because the lower arts are pursued for their sake.", "id": "fc03"}, {"front": "Why does Aristotle identify politics ($\\pi o\\lambda\\iota\\tau\\iota\\kappa\\acute{\\eta}$) as the 'master science' of the human good?", "back": "It orders and coordinates all other sciences and crafts toward the good of the whole community.", "id": "fc04"}, {"front": "Why is the good of the community considered 'greater and more perfect' than the good of an individual?", "back": "Achieving the good for a whole nation is more noble and 'godlike' than doing so for a single person.", "id": "fc05"}, {"front": "Term: Eudaimonia ($\\epsilon\\upsilon\\delta\\alpha\\iota\\mu o\nu\\acute{\\iota}\\alpha$)", "back": "Definition: A condition of genuine human flourishing or 'living well,' representing an objective state rather than a subjective feeling.", "id": "fc06"}, {"front": "What is the 'pretty general agreement' regarding the name of the highest of all goods?", "back": "Happiness (or eudaimonia).", "id": "fc07"}, {"front": "What do 'the multitude' typically mistake for happiness, according to Aristotle?", "back": "Palpable and apparent things like pleasure, wealth, or honor.", "id": "fc08"}, {"front": "According to Aristotle, why is a young man not a fit student of Moral Philosophy?", "back": "He lacks experience in the actions of life and tends to follow his passions instead of reason.", "id": "fc09"}, {"front": "In the study of ethics, what must a student already possess to profitably 'receive' the principles of nobleness and justice?", "back": "A background of being well-trained in good habits.", "id": "fc10"}, {"front": "What is the primary method of Aristotle's 'function argument'?", "back": "Identifying the characteristic work or purpose (ergon) of a human being to determine their excellence.", "id": "fc11"}, {"front": "Term: Ergon ($\\acute{\\epsilon}\rho\\gamma o\nu$)", "back": "Definition: The function, work, or characteristic activity that defines what a thing is and how it is judged as 'good.'", "id": "fc12"}, {"front": "Why does Aristotle reject 'mere life' (nutrition and growth) as the specific function of human beings?", "back": "It is a function shared with plants/vegetables and is not peculiar to humans.", "id": "fc13"}, {"front": "Why is the 'life of sensation' excluded as the characteristic human function?", "back": "It is shared with animals such as horses and oxen.", "id": "fc14"}, {"front": "What does Aristotle conclude is the unique work (ergon) of a human being?", "back": "A working of the soul in accordance with reason, or at least not independently of reason.", "id": "fc15"}, {"front": "How does Aristotle formally define the 'Good of Man' (Happiness)?", "back": "A working of the soul in the way of excellence (virtue) in a complete life.", "id": "fc16"}, {"front": "What is the significance of the phrase 'one swallow does not make a spring' in Aristotle's definition of happiness?", "back": "Happiness requires a complete life of virtue, not just a short time or a single day of excellence.", "id": "fc17"}, {"front": "Term: Arete ($\\acute{\\alpha}\rho\\epsilon\\tau\\acute{\\eta}$)", "back": "Definition: Virtue or excellence; the quality that makes a thing excellent at its specific function.", "id": "fc18"}, {"front": "How does Aristotle distinguish between the acquisition of Intellectual and Moral Virtue?", "back": "Intellectual virtue comes from teaching/instruction; moral virtue comes from habituation/custom.", "id": "fc19"}, {"front": "Aristotle argues that moral virtues are not in us by nature. What evidence does he provide using the example of a stone?", "back": "Natural properties (like a stone falling) cannot be changed by custom, but human habits can be trained.", "id": "fc20"}, {"front": "According to Aristotle, how do human beings acquire the capacity for moral virtue?", "back": "Nature furnishes the capacity, but we are perfected in them through custom (habit).", "id": "fc21"}, {"front": "In the 'learning by doing' model, how does one become just or brave?", "back": "By performing just actions or brave actions until they become a stable part of one's character.", "id": "fc22"}, {"front": "What is the primary intention of a good 'law-giver' in a community?", "back": "To make individual members of the community good by habituating them to virtuous acts.", "id": "fc23"}, {"front": "What determines whether a 'habit' becomes a virtue or a vice?", "back": "The quality of the acts performed (e.g., building well makes a good builder, building badly makes a bad one).", "id": "fc24"}, {"front": "Why is it important to be habituated correctly 'straight from childhood'?", "back": "Because it makes 'all the difference' in the formation of stable character habits.", "id": "fc25"}, {"front": "Concept: The Doctrine of the Mean", "back": "Definition: Virtue is a state that aims at the middle point between the extremes of excess and deficiency.", "id": "fc26"}, {"front": "What is the difference between an 'absolute mean' and a 'mean relative to us'?", "back": "An absolute mean is arithmetically equidistant for all; a relative mean is the right amount for a specific individual in a specific situation.", "id": "fc27"}, {"front": "Why would a trainer not give every athlete the same amount of food (the arithmetic mean)?", "back": "The proper amount depends on the individual's size and the intensity of their exercise (e.g., Milo vs. a beginner).", "id": "fc28"}, {"front": "To be virtuous, it is not enough to act correctly; one must also feel the right _____ in the right measure.", "back": "Emotions (or feelings).", "id": "fc29"}, {"front": "According to the Doctrine of the Mean, what are the two ways to 'go wrong' in feelings and actions?", "back": "Excess (too much) and defect (too little).", "id": "fc30"}, {"front": "Why does Aristotle say it is 'easy to miss the mark' but 'hard to hit it' in virtue?", "back": "There are many ways to be bad (excess/defect) but only one way to be right (the mean).", "id": "fc31"}, {"front": "Formal Definition: Virtue is a state apt to exercise _____, being in the relative mean, determined by reason.", "back": "Deliberate choice.", "id": "fc32"}, {"front": "Which specific actions or feelings does Aristotle claim are 'simply wrong' and have no 'mean'?", "back": "Malice, shamelessness, envy, adultery, theft, and homicide.", "id": "fc33"}, {"front": "In the context of fear and confidence, what is the mean state?", "back": "Courage.", "id": "fc34"}, {"front": "If a person exceeds in confidence to a faulty degree, they are described as _____.", "back": "Rash.", "id": "fc35"}, {"front": "What is the name for the defect of confidence and the excess of fear?", "back": "Cowardice.", "id": "fc36"}, {"front": "Regarding the pleasure of food and drink, what is the mean state?", "back": "Self-Mastery (or Temperance).", "id": "fc37"}, {"front": "What is the extreme of 'excess' in respect to pleasures?", "back": "Absence of self-control (or profligacy).", "id": "fc38"}, {"front": "In the sphere of giving and taking wealth, what is the mean state?", "back": "Liberality.", "id": "fc39"}, {"front": "A person who gives away too much money and takes in too little is called _____.", "back": "Prodigal.", "id": "fc40"}, {"front": "A person who takes in too much money and gives out too little is called _____.", "back": "Stingy.", "id": "fc41"}, {"front": "What is the mean state regarding 'Great Honor'?", "back": "Greatness of Soul.", "id": "fc42"}, {"front": "What is the mean state regarding anger?", "back": "Meekness.", "id": "fc43"}, {"front": "Someone who is deficient in the feeling of anger is termed _____.", "back": "Angerless.", "id": "fc44"}, {"front": "In social intercourse regarding truth, what is the mean state between 'Braggadocio' and 'Reserve'?", "back": "Truthfulness.", "id": "fc45"}, {"front": "In the context of 'amusement,' what is the mean state between Buffoonery and Clownishness?", "back": "Easy-pleasantry.", "id": "fc46"}, {"front": "Term: Phronesis ($\\phi\rho\\acute{o}\nu\\eta\\sigma\\iota\\varsigma$)", "back": "Definition: Practical wisdom; the intellectual virtue that enables a person to discern the right action in particular circumstances.", "id": "fc47"}, {"front": "Why do the extremes (excess and defect) both 'push away' the mean state?", "back": "The coward calls the brave man rash, while the rash man calls the brave man a coward; each sees the mean as the opposite extreme.", "id": "fc48"}, {"front": "Why might 'rashness' be more easily mistaken for 'courage' than 'cowardice' is?", "back": "Rashness bears a closer resemblance to the mean (courage) than cowardice does.", "id": "fc49"}, {"front": "According to Aristotle, how should we use our 'natural bias' to find the mean?", "back": "We must force ourselves in the contrary direction of our natural bias (like straightening bent timber).", "id": "fc50"}, {"front": "What is the 'safest plan' when hitting the exact mean is too difficult?", "back": "Taking the 'least of the evils' by staying away from the extreme that is more contrary to the mean.", "id": "fc51"}, {"front": "Why does Aristotle warn us to be especially 'on our guard' against pleasure?", "back": "We are not impartial judges of pleasure, and it easily leads us away from the mean.", "id": "fc52"}, {"front": "Where does the final 'decision' on moral details and specific instances rest, according to Aristotle?", "back": "With the 'Moral Sense' (or perception) rather than general rules.", "id": "fc53"}, {"front": "According to Solon, why should we 'call no man happy' while he is still alive?", "back": "Because fortune is unstable and can reverse a prosperous life into wretchedness at any moment.", "id": "fc54"}, {"front": "How does Aristotle's definition of happiness answer the problem of unstable fortune?", "back": "Happiness grounded in 'working of the soul in the way of excellence' is more stable and less at the mercy of chance.", "id": "fc55"}, {"front": "Why is 'exactness' (precision) not to be expected in a treatise on Moral Philosophy?", "back": "The subject matter involves variation and error, so we must be content with truth set forth 'roughly and in outline.'", "id": "fc56"}, {"front": "Why are children incapable of eudaimonia?", "back": "They are not yet of an age to perform the noble actions that constitute happiness; they can only be called happy by anticipation.", "id": "fc57"}, {"front": "Ethos ($\\acute{\\eta}\\theta o\\varsigma$) is the Greek root for ethics and literally means _____.", "back": "Custom (or habit).", "id": "fc58"}, {"front": "What is the relationship between the 'master science' and 'practical wisdom' in governing a community?", "back": "Politics uses practical wisdom to lay down rules on what members of a community should do and abstain from.", "id": "fc59"}, {"front": "How does Aristotle justify that happiness is 'widely participated'?", "back": "It can exist in all who are not 'maimed for virtue' through learning and diligence.", "id": "fc60"}, {"front": "In the comparison of ends, why is a 'work' (like a vessel) considered better than the 'act of working' (ship-building)?", "back": "The work exists as a tangible result beyond and beside the act of working itself.", "id": "fc61"}, {"front": "Why does Aristotle distinguish between 'reasoning from principles' and 'reasoning to principles'?", "back": "One must determine whether the path of inquiry begins with known facts (the 'that') or seeks to find them (the 'why').", "id": "fc62"}, {"front": "How does the 'man of general mental cultivation' differ from a specialist in judging matters?", "back": "The specialist judges well in a particular matter, while the cultivated man is a good judge in a general way.", "id": "fc63"}, {"front": "What is the 'Priam' example used to illustrate in Book I?", "back": "That great misfortunes in old age can prevent even a prosperous man from being called 'happy' in the popular sense.", "id": "fc64"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
