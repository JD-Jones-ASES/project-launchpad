    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did Aristotle view friendship and contemplation in relation to human good?", "back": "Aristotle considered friendship one of the highest goods available to human beings in this life, and contemplation the highest good of all."}, {"front": "According to Aristotle, could friendship exist between a human being and God? Why or why not?", "back": "No. Aristotle argued that friendship requires equality and reciprocity, which is impossible between a human and God due to radical inequality; a god needs nothing from humans."}, {"front": "How did Thomas Aquinas overturn Aristotle's conclusion about friendship with God?", "back": "Aquinas overturned it by appealing to the Incarnation and the gift of grace. God's choice to enter into a relationship with humans and share divine life makes reciprocity possible, not by humans rising to God's level, but by God condescending to ours."}, {"front": "Define 'caritas' (charity) in Aquinas's framework.", "back": "Caritas (charity) is the theological virtue of love directed toward God and toward others for God's sake. It is Aquinas's word for the Greek agape (selfless divine love), distinguishing it from philia (friendship) and eros (romantic love)."}, {"front": "What does Aquinas mean when he says charity is the 'form of all the virtues'?", "back": "He means that charity is the animating principle without which no other virtue is truly directed toward the final end (God)."}, {"front": "What two essential components, derived from Aristotle, does Aquinas identify for genuine friendship?", "back": "Genuine friendship requires benevolence (wishing good to the other) and mutual love (reciprocity), founded on some kind of communication."}, {"front": "How does Aquinas establish the 'communication' necessary for friendship between God and humanity?", "back": "Aquinas states that there is communication inasmuch as God communicates His happiness to us, calling us 'unto the fellowship of His Son' (1 Cor. 1:9)."}, {"front": "How does Aquinas address the objection that God does not 'dwell with men' in his argument for charity as friendship?", "back": "He distinguishes between man's outward (corporeal) life and his spiritual (mental) life. While there's no corporeal fellowship, there is spiritual fellowship, imperfectly in this life, but perfected in heaven."}, {"front": "How can charity extend to one's enemies, if friendship is usually with friends?", "back": "Friendship can extend to someone for the sake of another. In charity, we love our enemies 'in relation to God,' to Whom the friendship of charity is chiefly directed, because they belong to God."}, {"front": "What is the profound theological move Aquinas makes in applying Aristotle's friendship framework to God?", "back": "He argues that God's communication of divine beatitude and sharing of divine life through grace creates the conditions for genuine friendship—mutual goodwill, shared life, and reciprocal benefit—despite the radical inequality between Creator and creature."}, {"front": "How does Aquinas connect the love of God to the love of neighbor?", "back": "Aquinas states that the love of God necessarily overflows into the love of neighbor. If we love God, and God loves human beings, then we will love human beings too."}, {"front": "What is the key difference between Aristotelian character friendship and Christian charity in the motivation for loving a neighbor?", "back": "In Aristotelian character friendship, we love the other for their own genuine goodness. In Christian charity, we love the other because they are God's, bear the `imago Dei` (image of God), and because God's own love for them is the ground of our love."}, {"front": "According to Aquinas, what is the proper ordering of charity?", "back": "We should love God above all, our own souls second (as most directly partaking in divine good), and our neighbors third."}, {"front": "Why does Aquinas argue that a man ought to love himself more than his neighbor, out of charity?", "back": "Because loving oneself with regard to one's spiritual nature means loving oneself as a 'partaker of the divine good.' One's own direct participation is a more potent reason for love than a neighbor's 'fellowship' in that good."}, {"front": "Among neighbors, whom does Aquinas suggest should be loved most out of charity?", "back": "The neighbor most closely united to God (e.g., a saint, a fellow member of the Body of Christ), rather than one who is merely physically nearest or most useful."}, {"front": "How did Aquinas generally agree with Aristotle regarding the contemplative life?", "back": "Aquinas agreed with Aristotle's basic conclusion that contemplation is the highest human activity and the path to the highest human happiness."}, {"front": "How did Aquinas transform Aristotle's concept of the 'highest contemplation'?", "back": "Aquinas identified the highest contemplation not as philosophical inquiry, but as the Beatific Vision—the direct contemplation of God Himself, which is the ultimate end of human existence."}, {"front": "Define the Beatific Vision.", "back": "The Beatific Vision is the direct contemplation of God enjoyed by the blessed in heaven. Aquinas holds that it is the ultimate end of human existence and the only source of perfect happiness, attainable only through grace."}, {"front": "What key element does Aquinas add to Aristotle's contemplative life that allows for the Beatific Vision?", "back": "Grace. What Aristotle glimpsed as the highest natural possibility, Christianity identifies as something even greater, possible only through supernatural gift and the elevation of the intellect by grace."}, {"front": "What kind of life did Aquinas consider best for most people in this earthly life, regarding contemplation and action?", "back": "Aquinas insisted that the best life for most people in this life is not purely contemplative but a mixed life: a life of contemplation that overflows into action."}, {"front": "Explain the phrase 'contemplata aliis tradere' and its significance for Aquinas.", "back": "'Contemplata aliis tradere' means 'to pass on to others what one has contemplated.' It describes the specifically Christian form of the highest life, where the saint does not merely think beautiful thoughts but shares them through teaching and action."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
