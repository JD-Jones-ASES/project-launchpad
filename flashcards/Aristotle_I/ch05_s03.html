<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Man (Aristotle I) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Aristotle, what is the primary difference between the focus of the Ethics and the Politics?", "back": "The Ethics focuses on the good life for the individual, while the Politics identifies the community that makes that life possible."}, {"front": "In Aristotle's political theory, what is considered the natural home for rational and social beings?", "back": "The city-state, or polis."}, {"front": "How does Aristotle characterize the formation of the city-state in relation to human nature?", "back": "The city grows naturally from smaller communities and is not merely a conventional arrangement."}, {"front": "Aristotle argues that the city exists not just for the sake of living, but for what higher purpose?", "back": "The city exists for the sake of living well, or the pursuit of the highest human good."}, {"front": "In the progression of human associations, what is the first and most fundamental form of community established for daily needs?", "back": "The household, or oikos."}, {"front": "According to the Politics, what is a politikon zoon?", "back": "A political animal, or a creature whose nature is only fulfilled within the organized life of a city."}, {"front": "How does Aristotle define the 'nature' of any given being, such as a man or a horse?", "back": "The nature of a being is what it is in its most perfect or completed state."}, {"front": "Why does Aristotle conclude that the city is 'prior' to the individual in terms of nature?", "back": "The city is the final cause or end toward which the individual and smaller societies naturally tend for their perfection."}, {"front": "What is the intermediate stage of community between the household and the city-state?", "back": "The village, which is typically composed of many families for their lasting mutual advantage."}, {"front": "According to Aristotle, how is a human being characterized if they are naturally unfit for society?", "back": "They are considered either inferior to a human (a beast) or superior to one (a god)."}, {"front": "What is the specific role of a slave within the management of a household, according to Aristotle?", "back": "A slave is an 'animated instrument' used for the purpose of living."}, {"front": "How does Aristotle distinguish between a 'possession' and an 'efficient' instrument like a shuttle?", "back": "An efficient instrument is used to make something else, while a possession is something used directly for living."}, {"front": "On what basis does Aristotle defend the institution of 'natural slavery'?", "back": "He argues that some people lack the rational capacity for self-governance and are better off being ruled by a superior mind."}, {"front": "What is the primary difference between a Greek woman and a slave in Aristotle's framework?", "back": "Nature has distinguished them for different purposes: the woman for propagation and the slave for labor."}, {"front": "According to Aristotle's principles, what is the essential characteristic of a master?", "back": "A master possesses a mind capable of reflection and forethought, making him naturally superior."}, {"front": "Why does Aristotle argue that the relationship between master and slave is mutually advantageous?", "back": "The master provides the forethought and direction while the slave provides the physical labor necessary for their shared safety."}, {"front": "How does Aristotle describe the governing style of early cities?", "back": "They were originally governed by kings, as they grew out of families where the eldest member ruled."}, {"front": "In Aristotle's view, why do humans believe the gods are subject to kingly government?", "back": "Humans project their own early experiences of being ruled by kings onto the divine."}, {"front": "What distinguishes the power of a master from 'domestic government' over a wife and children?", "back": "Mastery is for the benefit of the ruler, while domestic government is for the benefit of the governed or the common interest."}, {"front": "Who was the famous Macedonian prince tutored by Aristotle for three years?", "back": "Alexander the Great."}, {"front": "What historical irony exists between Aristotle's political theory and the career of Alexander the Great?", "back": "Aristotle theorized the small city-state while Alexander created a massive empire that made the city-state obsolete."}, {"front": "According to Aristotle, what does not sufficiently define a citizen?", "back": "Mere residence or the privilege of using the legal system."}, {"front": "How does Aristotle define a citizen in the 'fullest sense'?", "back": "One who shares in the judicial and deliberative functions of the community."}, {"front": "Why is the definition of a citizen dependent on the form of government?", "back": "Different regimes allow for different levels and forms of participation in ruling."}, {"front": "What does Aristotle call the type of office held by a juryman or a member of a general assembly?", "back": "An indeterminate office."}, {"front": "In a democracy, how does the supreme power differ from that in an oligarchy?", "back": "In a democracy, supreme power is with the whole people; in an oligarchy, it is in the hands of a wealthy few."}, {"front": "What are the two fundamental questions Aristotle uses to classify forms of government?", "back": "How many people rule, and whether they rule for the common good or private interest."}, {"front": "What is the name for a government where one person rules for the common good?", "back": "Monarchy or Kingdom."}, {"front": "How does Aristotle define an 'aristocracy'?", "back": "Rule by a few virtuous individuals for the common good of the city."}, {"front": "In Aristotle’s classification, what is a 'polity' (or 'state')?", "back": "A government where the citizens at large rule for the public good."}, {"front": "What is the 'deviant' or corrupt form of monarchy?", "back": "Tyranny."}, {"front": "How does Aristotle describe 'oligarchy' as a deviant form?", "back": "Rule by the wealthy few for their own private gain."}, {"front": "What is Aristotle’s specific definition of 'democracy' in his six-fold classification?", "back": "A deviant form of government where the poor majority rule for their own interest."}, {"front": "Why is tyranny considered the worst deviant form of government by Aristotle?", "back": "It is characterized as a form of mastery over slaves applied to a community of free people."}, {"front": "According to Aristotle, which virtue is most commonly shared by a large population?", "back": "Valor (or military excellence)."}, {"front": "What is the primary reason individuals judge poorly when determining what is 'just' for their state?", "back": "Most people are the worst judges in their own cause."}, {"front": "How does Aristotle argue against the idea that a city exists merely for trade and mutual defense?", "back": "Nations with trade treaties do not share the same magistrates or concern themselves with each other's virtue."}, {"front": "In Aristotle's view, if a city's primary goal were the protection of property, which group would have the most valid claim to power?", "back": "The wealthy (an oligarchy)."}, {"front": "What is the necessary 'first care' of anyone seeking to found a city truly deserving of the name?", "back": "The virtue of the citizens."}, {"front": "According to the sophist Lycophron, what is the nature of 'law'?", "back": "An agreement and a pledge between citizens to do justice to each other."}, {"front": "How does Aristotle's view of 'law' differ from Lycophron's view?", "back": "Aristotle believes law must go beyond a mere pledge and actually make citizens just and good."}, {"front": "Why would enclosing two separate cities (like Megara and Corinth) with a single wall fail to make them one city?", "back": "A city is defined by a shared way of life and common government, not just physical proximity."}, {"front": "What social activities does Aristotle list as essential for promoting 'friendship' and sociability within a city?", "back": "Family meetings, clubs, sacrifices, and public entertainments."}, {"front": "How does Aristotle link the city to his concept of human happiness?", "back": "The city is a community of families and villages united for the sake of a perfect and independent life."}, {"front": "What is the core distinction between 'correct' and 'deviant' governments?", "back": "Correct governments seek the common good; deviant governments seek the private benefit of the rulers."}, {"front": "In an oligarchy, what is the 'mistaken' premise of justice held by the rulers?", "back": "That because they are unequal in wealth, they are unequal in everything else."}, {"front": "In a democracy, what is the 'mistaken' premise of justice held by the people?", "back": "That because they are equal in liberty, they are equal in everything else."}, {"front": "What distinguishes the rule of a 'polity' from other forms of government regarding military service?", "back": "The profession of arms has the greatest share in government because valor is the virtue of the many."}, {"front": "Why does Aristotle consider 'life itself' as something humans will endure calamities to preserve?", "back": "Because living is perceived as something naturally sweet and desirable."}, {"front": "According to Selection 3, who are excluded from the category of 'complete' citizens due to age?", "back": "Boys who are not yet enrolled and old men who are past service."}, {"front": "What term does Charondas use for members of a household sharing the same food?", "back": "homosipuoi."}, {"front": "What term does Epimenides the Cretan use to describe members of a household?", "back": "homokapnoi (sharing the same smoke)."}, {"front": "How does Aristotle describe the relationship between 'making' and 'using' in the context of tools?", "back": "Making and using are different species, requiring different types of instruments."}, {"front": "Why does Aristotle claim that nature creates separate 'instruments' for separate purposes?", "back": "To ensure that each function is brought to its highest perfection by a dedicated tool."}, {"front": "According to the personbox on Alexander, what did he keep beside his sword under his pillow?", "back": "A copy of the Iliad annotated by Aristotle."}, {"front": "What is the relationship between political science and the 'rules of art' in Aristotle’s method?", "back": "Political science uses the method of separating a compound into its first, most minute elements to understand the whole."}, {"front": "Why is the city-state considered 'self-sufficient' or 'complete' compared to the household?", "back": "The city contains the 'end' of government and provides everything needed for a happy, independent life."}, {"front": "What is the significance of 'ruling and being ruled in turn' for Aristotle?", "back": "It is the natural way to defend the equality of citizens in a political government."}, {"front": "In Aristotle's classification, which form of government is rule by 'the best'?", "back": "Aristocracy."}, {"front": "How does Aristotle characterize 'tyranny' relative to the household?", "back": "It is a government of the state conducted like the rule of a master over a slave."}, {"front": "What is the definition of homogalaktes?", "back": "The descendants of one family, literally meaning 'those who shared the same milk'."}, {"front": "What does Aristotle claim is the 'principle' upon which every society is founded?", "back": "The pursuit of some apparent good."}, {"front": "How does Aristotle refute the idea that different types of government are only different in the number of people they rule?", "back": "He argues they differ in their fundamental constitution and the specific 'rules of art' that govern them."}, {"front": "According to Aristotle, why is it natural for the male and female to join together?", "back": "The natural impulse for propagation and leaving behind others like themselves."}, {"front": "What does Aristotle identify as the 'final cause' of all subordinate societies?", "back": "The city-state, which is a government complete in itself."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
