    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "According to the outset of Nicomachean Ethics Book VIII, what is the value of friendship even for a person who possesses all other goods?", "back": "No one would choose to live without friends."}, {"front": "Why do those in positions of authority or wealth have a special need for friends according to Aristotle?", "back": "They need objects for doing kindnesses and a means to preserve their slippery prosperity."}, {"front": "In what specific way does friendship benefit the young according to Aristotle?", "back": "It helps keep them from committing errors."}, {"front": "What is the primary benefit of friendship for those in the prime of life?", "back": "It enables them to better devise and carry out noble deeds."}, {"front": "How does Aristotle characterize the relationship between friendship and justice in social communities?", "back": "Where people are friends, justice is not required; but just people still need friendship."}, {"front": "Term: Philia", "back": "Definition: A broad Greek term for friendship covering personal bonds, familial affection, civic ties, and general goodwill."}, {"front": "What are the three distinct objects of affection that serve as motives for friendship?", "back": "The good, the pleasurable, and the useful."}, {"front": "According to Aristotle, why is it 'ridiculous' to say one feels friendship for inanimate objects like wine?", "back": "There is no reciprocation of affection or wishing well for the object's own sake."}, {"front": "What three conditions must be met for a relationship to be formally called 'Friendship'?", "back": "Mutually known kindly feelings, wishing one another good, and a motive of utility, pleasure, or goodness."}, {"front": "Why are friendships based on utility considered 'accidental' or fragile?", "back": "They dissolve as soon as the parties cease to be useful to one another."}, {"front": "In which age group is friendship based on utility most commonly found?", "back": "The old."}, {"front": "What is the primary motive for friendship among the young according to Aristotle?", "back": "Pleasure."}, {"front": "Why do the friendships of the young form and dissolve so rapidly?", "back": "Their feelings are based on impulse and passion, which change as quickly as their age and tastes."}, {"front": "What defines 'perfect' friendship?", "back": "A bond between good men who are similar in their virtue and wish each other's good for the other's sake."}, {"front": "Why is the friendship of virtue (perfect friendship) permanent?", "back": "It is based on the character of the friends, and goodness is a permanent principle."}, {"front": "What requirement beyond virtue is necessary for two people to achieve 'perfect' friendship?", "back": "Time and intimacy to prove each other fit objects of friendship."}, {"front": "Aristotle uses the proverb 'eating a quantity of ____ together' to illustrate the time needed for friendship.", "back": "Salt"}, {"front": "What are the three primary forms of political constitutions according to Aristotle?", "back": "Kingship, Aristocracy, and Timocracy."}, {"front": "What is the 'corruption' or deflection of a Kingship?", "back": "Despotism (or Tyranny)."}, {"front": "What is the 'corruption' or deflection of an Aristocracy?", "back": "Oligarchy."}, {"front": "What is the 'corruption' or deflection of a Timocracy?", "back": "Democracy."}, {"front": "According to Aristotle, what is the main difference between a King and a Despot?", "back": "A King looks to the advantage of his subjects, while a Despot looks to his own advantage."}, {"front": "Domestic Analogies: Which family relationship models the 'Kingship' constitution?", "back": "The relation between a father and his sons."}, {"front": "Domestic Analogies: Which family relationship models 'Aristocracy'?", "back": "The relation between a husband and a wife."}, {"front": "Domestic Analogies: Which family relationship models 'Timocracy'?", "back": "The relation between brothers."}, {"front": "Under which political constitution is genuine friendship least possible?", "back": "Despotism (Tyranny)."}, {"front": "Concept: Kindly Feeling (Goodwill)", "back": "Definition: A starting point of friendship that lacks the intensity, yearning, and mutual awareness of a full friendship."}, {"front": "How does 'Unity of Sentiment' differ from 'Unity of Opinion'?", "back": "It involves agreement on matters of action and common interest rather than just factual or theoretical points."}, {"front": "Why do benefactors generally love the recipients of their kindness more than the recipients love the benefactors?", "back": "The recipient is the 'work' of the benefactor, and people love their own existence expressed through their work."}, {"front": "Why are mothers generally more fond of their children than fathers are?", "back": "Their part in producing them involves more labor and a more certain knowledge that the children are theirs."}, {"front": "Aristotle identifies the true 'Self' of a human being as the _____ principle.", "back": "Intellectual (or Reason)"}, {"front": "What distinguishes 'vulgar' self-love from the 'noble' self-love of a good man?", "back": "Vulgar self-love grasps for wealth and bodily pleasure; noble self-love seeks what is honorable and virtuous."}, {"front": "Why can bad men not truly be friends with themselves?", "back": "Their souls are 'rent by faction,' causing them to feel remorse and variance between their desires and reason."}, {"front": "In what sense is a good man 'Self-loving' when he dies for his friend?", "back": "He assigns to himself the greater good of a noble action while giving the friend money or life."}, {"front": "Term: Theoria", "back": "Definition: Intellectual contemplation; the activity of the intellect directed toward truth for its own sake."}, {"front": "What does Aristotle identify in Book X as the 'highest happiness' ($eudaimonia$)?", "back": "Contemplative activity in accordance with the excellence of the intellect."}, {"front": "Why is the contemplative life considered the most 'continuous' form of happiness?", "back": "Humans are able to contemplate more continuously than they can perform any physical action."}, {"front": "Term: Autarkeia", "back": "Definition: Self-sufficiency; the quality of needing nothing external to achieve the highest good."}, {"front": "Why is the contemplative man more self-sufficient than the just or brave man?", "back": "He can contemplate alone, whereas the just or brave man needs others toward whom to practice virtue."}, {"front": "Why does Aristotle describe the contemplative life as 'divine' rather than merely human?", "back": "It is the activity we attribute to the gods, who are above the need for moral actions like justice or courage."}, {"front": "According to Aristotle, what constitutes 'Secondary Happiness'?", "back": "A life lived in accordance with the moral virtues (justice, courage, temperance)."}, {"front": "Why is the life of moral virtue considered 'secondary' to the contemplative life?", "back": "It belongs to our composite nature (including passions) rather than the pure, separate intellect."}, {"front": "How does the requirement for external goods differ between the moral life and the contemplative life?", "back": "The moral life requires more external means (money, power) to perform virtuous acts than contemplation does."}, {"front": "What is the function of the transition at the very end of the Nicomachean Ethics?", "back": "It serves as a bridge to the 'Politics' to determine how to create a community that supports the virtuous life."}, {"front": "According to Aristotle, why is the study of legislation and politics necessary for the completion of ethics?", "back": "Moral arguments alone cannot turn the masses toward virtue; good laws and institutions are required for habituation."}, {"front": "What phrase does Aristotle use to describe the combined inquiry of the Ethics and the Politics?", "back": "The philosophy of human affairs."}, {"front": "Aristotle argues that we 'toil that we may _____, and war that we may be at peace.'", "back": "rest"}, {"front": "How does Aristotle characterize the activity of the gods in Book X?", "back": "As pure contemplative speculation, since moral actions (like contracts) would be 'ridiculous' for them."}, {"front": "Why are animals excluded from happiness according to Aristotle's definition in Book X?", "back": "They have no share in contemplative speculation."}, {"front": "Aristotle suggests that to reach the highest happiness, one must try to 'make ourselves like _____.'", "back": "immortals"}, {"front": "What is the primary motive of 'Timocracy'?", "back": "The principle of wealth or property."}, {"front": "Why does Aristotle consider Democracy to be the 'least vicious' of the corrupt constitutional forms?", "back": "The form of the constitution undergoes the least change from its original type (Timocracy)."}, {"front": "In an Aristocracy, how is rule distributed according to Aristotle?", "back": "The husband rules 'by right' only in points that befit him, giving the wife her proper sphere of authority."}, {"front": "What is the result when a husband 'lords it in everything' within a marriage?", "back": "The relationship changes into an Oligarchy."}, {"front": "According to Aristotle, what is the primary bond that holds social communities together?", "back": "Friendship (specifically civic or social friendship)."}, {"front": "Why is the friendship of utility common in 'hospitality' relationships?", "back": "It is based on the expectation of profit or mutual advantage rather than shared character."}, {"front": "What does Aristotle identify as the 'most truly Man' part of our nature?", "back": "The Pure Intellect."}, {"front": "How does Aristotle define 'Unity of Sentiment' in a political context?", "back": "When citizens agree on common interests and take the same line to carry out common consultations."}, {"front": "Why do the bad fail to achieve 'Unity of Sentiment'?", "back": "They seek unfair advantage, shirk common labor, and are jealous of their neighbors."}, {"front": "According to Aristotle, what provides the 'most pure and permanent' pleasures in life?", "back": "The pursuit and activity of science (intellectual inquiry)."}, {"front": "What level of external prosperity does Aristotle think is necessary for the happy life?", "back": "A moderate supply of external goods, as one can act nobly without ruling 'sea and land.'"}, {"front": "Aristotle notes that 'Friendship' and _____ are co-extensive principles in every political constitution.", "back": "Justice"}, {"front": "Which philosopher does Aristotle cite as viewing the 'Happy man' as one who might appear 'strange' to the multitude?", "back": "Anaxagoras"}, {"front": "Aristotle claims that a friend is, in fact, 'another _____.'", "back": "Self"}, {"front": "Why is 'Kindly Feeling' not considered 'Affection'?", "back": "It does not imply the intensity or yearning characteristic of affection."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
