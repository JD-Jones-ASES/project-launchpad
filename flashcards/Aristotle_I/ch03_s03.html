<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Man (Aristotle I) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Aristotle, what is the prerequisite for an action to be subject to praise or blame?", "back": "The action must be voluntary."}, {"front": "What are the two primary causes of involuntary actions in Aristotle's ethics?", "back": "Compulsion or ignorance."}, {"front": "How does Aristotle classify an action where a person is forced to choose between two evils, such as a man being extorted?", "back": "He classifies it as more like a voluntary act than an involuntary one."}, {"front": "Term: proairesis", "back": "Definition: Deliberate choice involving rational deliberation and a commitment to acting on that deliberation."}, {"front": "In Aristotelian ethics, what distinguishes a moral action from a mere impulse or a habit?", "back": "The presence of proairesis, or deliberate choice."}, {"front": "Virtue is not defined by isolated acts, but by a whole pattern of _____.", "back": "deliberate choice"}, {"front": "Which virtue does Aristotle use as his paradigm case for examining the mean between excess and deficiency?", "back": "Courage."}, {"front": "Between which two feelings or states of mind is Courage the mean?", "back": "Fear and boldness."}, {"front": "What is the common definition of fear mentioned by Aristotle?", "back": "The expectation of evil."}, {"front": "According to Aristotle, why is a man who fears disgrace considered 'good' and 'honourable'?", "back": "Because it is right and noble to fear disgrace."}, {"front": "Does Aristotle consider a person 'Brave' in the proper sense if they are merely fearless of poverty or disease?", "back": "No, because these fears do not proceed from one's own viciousness or fault."}, {"front": "What does Aristotle identify as the 'greatest dread' because it is the end of all things?", "back": "Death."}, {"front": "In what specific context does the Brave man most properly face death?", "back": "In war, because it is the most honourable danger."}, {"front": "Why are sailors often 'hopeful' in the face of death at sea compared to a Brave landsman?", "back": "They are light-hearted because of their professional experience, not necessarily virtue."}, {"front": "For what reason or end does the Brave man withstand fearful things?", "back": "For the sake of what is honourable."}, {"front": "What term does Aristotle use for the vice of exceeding in confidence regarding fearful things?", "back": "Rashness."}, {"front": "How does Aristotle describe the 'Rash' man's character in relation to the 'Brave' man?", "back": "The rash man is a braggart who wishes to appear brave but cannot withstand true fear."}, {"front": "What is the specific deficiency of the Coward regarding his feelings?", "back": "He is deficient in feeling confidence."}, {"front": "How do the Brave and the Rash differ in their behavior before and during danger?", "back": "The Brave are quiet before and sharp in action; the Rash are eager before and fall away during danger."}, {"front": "Why does Aristotle consider Justice to be the 'complete virtue'?", "back": "Because it is the virtue exercised in relation to others rather than for oneself."}, {"front": "In Aristotle's view, a 'State' of mind differs from a 'Science' because a State cannot produce _____.", "back": "contrary acts"}, {"front": "What are the two distinct senses in which a person is considered 'Unjust'?", "back": "The law-breaker and the grasping or unequal man."}, {"front": "What are the two distinct senses in which a person is considered 'Just'?", "back": "The lawful man and the equal man."}, {"front": "Concept: The Grasping Man", "back": "Definition: An unjust person who strives for more than his fair share of good things or less than his share of evils."}, {"front": "Why are 'lawful things' considered 'just' in a general sense?", "back": "Because they are defined by legislative power and aim at the common good."}, {"front": "Which species of justice deals with the allocation of honors, wealth, or community goods?", "back": "Distributive justice."}, {"front": "Which species of justice aims to restore a fair balance after one party has wronged another in a transaction?", "back": "Corrective justice."}, {"front": "What is the fundamental ethical goal of distributive justice?", "back": "To match the reward or share to the individual's merit."}, {"front": "In distributive justice, equality is not 'everyone gets the same' but rather _____ equality.", "back": "proportionate"}, {"front": "Unlike distributive justice, corrective justice treats the parties as equals and applies a(n) _____ proportion to restore balance.", "back": "arithmetic"}, {"front": "What are the two kinds of political justice identified by Aristotle?", "back": "Natural and conventional justice."}, {"front": "Concept: Natural Justice", "back": "Definition: A form of justice that has the same force everywhere and does not depend on human decree."}, {"front": "Concept: Conventional Justice", "back": "Definition: Justice concerning matters that could be decided one way or another until a specific law is enacted."}, {"front": "What is an example of conventional justice mentioned by Aristotle regarding currency?", "back": "Fixing the price of a ransom at one mina."}, {"front": "The legal theory grounded in human nature or reason, as opposed to human-enacted statutes, is known as _____.", "back": "Natural law"}, {"front": "What term describes laws enacted by human authority, such as statutes and decrees?", "back": "Positive law."}, {"front": "Why does Aristotle say that the end of an act determines the character of the act?", "back": "Because acts are defined by the motive or habit from which they proceed."}, {"front": "What character on the side of excess fear 'fears all things' and is called 'fainthearted'?", "back": "The Coward."}, {"front": "Aristotle notes that some people are called 'Brave' by _____ because they lack fear, even if their motive is wrong.", "back": "analogy"}, {"front": "What prevents a man from being truly 'Brave' if he only stands firm because of the fear of shame?", "back": "His reason for acting is external (social pressure) rather than internal virtue."}, {"front": "According to Aristotle, justice is the whole of virtue considered in relation to _____.", "back": "others"}, {"front": "In corrective justice, the judge's task is to strip away the _____ from the wrongdoer and repair the loss of the victim.", "back": "illegitimate gain"}, {"front": "Does natural justice change based on whether people accept it or not?", "back": "No, it has the same force regardless of being received or not."}, {"front": "What is an example of an indifferent matter that becomes a matter of justice only after a 'special decree'?", "back": "Sacrificing a goat instead of two sheep."}, {"front": "What distinguishes the 'madman' from the brave man in the face of earthquakes or floods?", "back": "The madman exceeds in utter absence of fear and is inaccessible to pain."}, {"front": "Aristotle argues that laws command the deeds of the 'perfectly self-mastering man,' such as abstinence from _____.", "back": "adultery and wantonness"}, {"front": "How does Aristotle characterize 'The Just' in terms of social community?", "back": "Those things which are apt to produce and preserve happiness for the social community."}, {"front": "Why is the 'grasping man' considered 'unequal'?", "back": "Because he takes more good or less evil than what fairly falls to his share."}, {"front": "According to Aristotle, what is the role of a legislator regarding honors and punishments?", "back": "To distinguish between voluntary and involuntary actions for the assigning of honours and punishments."}, {"front": "What kind of 'ignorant' acts does Aristotle exclude from being truly virtuous?", "back": "Acts done out of ignorance of relevant circumstances, making them involuntary."}, {"front": "Is a man 'Brave' if he is bold only when he is going to be scourged?", "back": "No, Aristotle says such a man is not Brave for being bold in that circumstance."}, {"front": "In the context of Courage, what happens to the 'Rash' man when he is actually in danger?", "back": "He falls away."}, {"front": "Aristotle states that the 'Unjust' man chooses the less evil because the less evil is thought to be a(n) _____.", "back": "good"}, {"front": "What makes a law 'right' or 'inferior' in Aristotle's view?", "back": "It is right if it is a good law and inferior if it is extemporised."}, {"front": "What is the primary difference between how a brave man and a seafaring man face danger at sea?", "back": "The brave man faces it as he ought, while the sailor is hopeful due to experience."}, {"front": "In corrective justice, does it matter to the judge if a 'good man' defrauded a 'bad man'?", "back": "No, the law looks only to the difference created by the injury."}, {"front": "Aristotle defines the 'Equal' as a mean, which implies that Justice is also a _____.", "back": "mean state"}, {"front": "What historical figure's 'Letter from Birmingham Jail' is cited as a modern extension of Aristotle's natural law tradition?", "back": "Martin Luther King Jr."}, {"front": "In Aristotle's schema, what is the vice of deficiency regarding boldness?", "back": "Cowardice."}, {"front": "If a child shares food because he is told to, why is this not yet 'Virtue' for Aristotle?", "back": "It is not a result of proairesis (the child's own deliberate choice for the right reasons)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
