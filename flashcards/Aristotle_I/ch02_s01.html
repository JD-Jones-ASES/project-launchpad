    <script>

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Greek term for the \"reputable opinions\" that Aristotle uses as the starting point for his ethical analysis?", "back": "$\\textit{endoxa}$"}, {"front": "How does Aristotle's method of starting with common opinion differ from a mathematician's approach?", "back": "He begins with received opinions rather than deducing from a first principle."}, {"front": "Aristotle treats common opinions as _____ rather than mere prejudice.", "back": "data"}, {"front": "What is the primary goal of Aristotle's \"dialectical\" approach in ethics?", "back": "To identify what is correct in ordinary intuitions and correct what is confused."}, {"front": "According to Aristotle, what is the \"highest good\" that everyone agrees upon?", "back": "Happiness"}, {"front": "Aristotle defines happiness as the \"activity of soul in accordance with _____.\"", "back": "virtue"}, {"front": "Concept: The Function Argument (Step 1)", "back": "Definition: Every craft, art, and profession has a characteristic function ($\\textit{ergon}$), or a purpose for which it exists."}, {"front": "In the function argument, what does it mean for a thing to be \"good\"?", "back": "It means performing its characteristic function ($\\textit{ergon}$) excellently."}, {"front": "Why does Aristotle conclude that the human function cannot be \"mere life\" (growth and nutrition)?", "back": "Because plants share this function, and the human function must be distinctive to humans."}, {"front": "Why does Aristotle exclude \"sensation\" as the characteristic function of human beings?", "back": "Because sensation is a function shared with animals."}, {"front": "What is the distinctive function of human beings according to the function argument?", "back": "The activity of the soul in accordance with reason."}, {"front": "The Greek term for excellence or virtue is _____.", "back": "$\\textit{arete}$"}, {"front": "According to the conclusion of the function argument, human happiness is the active exercise of the soul's capacities over a _____ _____.", "back": "complete life"}, {"front": "What is the Greek term for a stable disposition or settled character trait?", "back": "$\\textit{hexis}$"}, {"front": "Aristotelian virtue aims at the \"mean\" between the two vices of _____ and _____.", "back": "excess; deficiency"}, {"front": "How does the \"mean\" in Aristotelian ethics differ from an arithmetic midpoint?", "back": "The mean is relative to the specific person and the unique situation."}, {"front": "What example does Aristotle use to illustrate that the mean is relative to the individual?", "back": "The right portion of food for an Olympic athlete versus a beginner."}, {"front": "In the doctrine of the mean, courage is the middle ground between _____ and _____.", "back": "cowardice; rashness"}, {"front": "What are the two vices associated with the virtue of generosity?", "back": "Stinginess (deficiency) and prodigality (excess)."}, {"front": "Temperance is the mean between self-indulgence and _____.", "back": "insensibility"}, {"front": "What is the Greek term for the \"practical wisdom\" used to determine the mean?", "back": "$\\textit{phronesis}$"}, {"front": "Under the doctrine of the mean, what does it mean to feel the \"right\" emotions?", "back": "Feeling emotions at the right intensity, toward the right objects, for the right reasons."}, {"front": "True or False: A virtuous person avoids feeling strong emotions entirely.", "back": "False"}, {"front": "What is the Greek term for sensory pleasure?", "back": "$\\textit{hedone}$"}, {"front": "How does $\\textit{eudaimonia}$ differ from $\\textit{hedone}$?", "back": "$\\textit{eudaimonia}$ is objective flourishing or living well, whereas $\\textit{hedone}$ is a pleasant emotional state."}, {"front": "Aristotle argues that pleasure is a _____ of virtuous activity rather than its definition.", "back": "consequence"}, {"front": "Why is the doctrine of the mean not a counsel for mediocrity?", "back": "Because it requires finding a precise and difficult excellence, not a \"lukewarm\" middle ground."}, {"front": "In Aristotle's view, virtue is not just about restraint; it is a _____ _____ for excellent human living.", "back": "positive excellence"}, {"front": "How does the truly courageous person feel about acting bravely compared to someone who merely grits their teeth?", "back": "The truly courageous person has developed a character that finds bravery reliable and performs it with pleasure."}, {"front": "Which two specific actions does Aristotle identify as being \"simply wrong\" regardless of circumstances?", "back": "Murder and adultery."}, {"front": "According to the \"Teacher Note,\" why is a successful fraudster not truly happy ($\\textit{eudaimon}$)?", "back": "Because their condition is fragile, dependent on concealment, and involves self-betrayal."}, {"front": "What does the term $\\textit{ergon}$ literally translate to in the context of the function argument?", "back": "Characteristic function or \"work.\""}, {"front": "The virtue of courage involves balancing _____ and _____.", "back": "fear; confidence"}, {"front": "Define the vice of \"prodigality\" in relation to generosity.", "back": "Giving too much with no judgment (excess)."}, {"front": "Define the vice of \"insensibility\" in relation to temperance.", "back": "Excessive indifference to pleasure (deficiency)."}, {"front": "According to Aristotle, virtue is not a momentary impulse but a _____ _____.", "back": "settled character trait (or $\\textit{hexis}$)"}, {"front": "How does Aristotle characterize the \"mean\" of a general leading troops versus a student in class?", "back": "The courage required is different because the mean is relative to the person and the situation."}, {"front": "Aristotle views virtue as the _____ of human impulse rather than its suppression.", "back": "perfection"}, {"front": "In the function argument, what is the role of \"reason\" ($\\textit{logos}$)?", "back": "It is the core of the distinctive human function: the activity of the soul in accordance with reason."}, {"front": "What does Aristotle mean by a \"complete life\" when discussing happiness?", "back": "Happiness is a settled, stable condition of living well over time, not a fleeting feeling."}, {"front": "Step 4 of the function argument states that the function distinctive to humans is the activity of the soul in accordance with _____.", "back": "reason"}, {"front": "Concept: The Dialectical Approach", "back": "Definition: A method that starts from experienced reality and common opinion to clarify what we dimly understand about living well."}, {"front": "Why is the mean between cowardice and rashness described as \"difficult\"?", "back": "Because it is a precise excellence that must be found through practical wisdom rather than a formula."}, {"front": "A person can be $\\textit{eudaimon}$ while enduring real _____, unlike a person merely seeking $\\textit{hedone}$.", "back": "hardship"}, {"front": "Which group of people does Aristotle consider when gathering $\\textit{endoxa}$?", "back": "Most people, or the wise, or both."}, {"front": "Aristotle's function argument suggests that the kind of goodness appropriate to a being depends on what that being _____ _____.", "back": "fundamentally is"}, {"front": "Is it possible for a person to be in a pleasant emotional state while failing to achieve $\\textit{eudaimonia}$?", "back": "Yes."}, {"front": "What is the vice of deficiency for the virtue of courage?", "back": "Cowardice (too much fear, too little confidence)."}, {"front": "What is the vice of excess for the virtue of courage?", "back": "Rashness (too little fear, too much confidence)."}, {"front": "What is the relationship between virtue and feelings in Aristotle's account?", "back": "Virtue involves both acting rightly and feeling the right emotions in response to the situation."}, {"front": "Aristotle notes that most people mistakenly identify happiness with pleasure, honor, or _____.", "back": "wealth"}, {"front": "In the context of the doctrine of the mean, what determines the \"right reasons\" for an action?", "back": "Practical wisdom ($\\textit{phronesis}$)"}, {"front": "What phrase does the text use to describe a person who does not have virtue but acts correctly by \"gritting their teeth\"?", "back": "Forced performance (or lacking a stable disposition)."}, {"front": "The Greek word $\\textit{hexis}$ suggests something that is _____ in the soul.", "back": "held (or settled)"}, {"front": "In the function argument, the goodness of a harp-player is found in _____.", "back": "playing the harp beautifully (performing the function excellently)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
