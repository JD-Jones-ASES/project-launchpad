    <style>
        .fc-container {

        .fc-btn:hover {

        .fc-btn:disabled {

        .fc-btn:disabled:hover {

        .fc-counter {

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;

        .fc-progress-bar {

        /* Toolbar */
        .fc-toolbar {

        .fc-tool:hover {
            border-color: var(--secondary-color);

        .fc-tool.active {
            background: var(--secondary-color);

        /* Keyboard hint */

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">

                    <button class="fc-tool" onclick="resetDeck()">Reset</button>

    <script>
    var CARDS = [{"front": "According to Thomas Aquinas, when does a human law genuinely bind the conscience of a citizen?", "back": "When the law is just."}, {"front": "What are the four types of law identified by Thomas Aquinas?", "back": "Eternal, natural, human, and divine law."}, {"front": "In Aquinas's view, from what source does every human law derive its authority?", "back": "The natural law."}, {"front": "What is the status of a human law that deflects from the law of nature?", "back": "It is no longer a law but a perversion of law."}, {"front": "What are the two modes by which a human law can be derived from the natural law?", "back": "As a conclusion from premises and by way of determination of generalities."}, {"front": "How is a law derived 'as a conclusion from premises' similar to the sciences?", "back": "Demonstrated conclusions are drawn directly from established principles."}, {"front": "Provide an example of a human law derived as a conclusion from the natural law principle 'one should do harm to no man.'", "back": "The law stating that 'one must not kill.'"}, {"front": "Explain the 'determination of generalities' mode of law derivation using the analogy of a craftsman.", "back": "Just as a craftsman determines a general house form into a particular shape, a legislator determines general natural principles into specific rules."}, {"front": "How does the derivation of the law that 'an evil-doer should be punished' differ from the determination of 'how' he is punished?", "back": "The need for punishment is a general principle, while the specific method is a human determination."}, {"front": "Which mode of law derivation results in human laws that retain force from the natural law itself?", "back": "Derivation as a conclusion from premises."}, {"front": "Laws derived by way of _____ have no other force than that of human law.", "back": "Determination"}, {"front": "Why does a law against murder have a deeper moral gravity than a parking regulation in Aquinas's theory?", "back": "Laws against murder are derived as conclusions from natural law, whereas parking regulations are mere determinations."}, {"front": "According to Aquinas, just laws derive their power to bind in conscience from the _____ law.", "back": "Eternal"}, {"front": "What is the 'End' criterion for a just law according to Aquinas?", "back": "The law must be ordained to the common good rather than the private interest of the ruler."}, {"front": "What is the 'Author' criterion for a just law according to Aquinas?", "back": "The law must be made by a legislator who does not exceed their legitimate power."}, {"front": "What is the 'Form' criterion for a just law according to Aquinas?", "back": "Burdens must be laid upon subjects according to an equality of proportion."}, {"front": "How does Aquinas describe laws that are 'contrary to human good' in terms of their nature?", "back": "They are acts of violence rather than laws."}, {"front": "Under what condition does Aquinas suggest a person should obey an unjust human law?", "back": "To avoid scandal or social disturbance."}, {"front": "What is the rule for obeying human laws that are 'opposed to the Divine good'?", "back": "They must never be observed or obeyed."}, {"front": "Which famous philosopher stated 'that which is not just seems to be no law at all,' according to the text?", "back": "Augustine"}, {"front": "Why does Aquinas believe resisting a just human law is equivalent to resisting the ordinance of God?", "back": "Just laws are derived from the eternal law, which is God's rational governance of creation."}, {"front": "In Aquinas's theory, who bears the 'burden of proof' regarding civil disobedience?", "back": "The citizen who chooses to disobey, as the presumption is in favor of compliance."}, {"front": "When is a change to human law considered right or justified?", "back": "Only when the change is conducive to the common weal."}, {"front": "What is the primary negative consequence of changing a law, according to Aquinas?", "back": "It diminishes the binding power of the law by abolishing custom."}, {"front": "Why does Aquinas believe custom is important for the effectiveness of law?", "back": "The force of law depends heavily on the habits of obedience it forms in citizens."}, {"front": "Under what circumstance should human law remain unchanged even if a 'better' version is conceivable?", "back": "When the benefit of the new law does not clearly outweigh the harm caused by disrupting custom."}, {"front": "How do 'rules of art' differ from 'laws' regarding the speed of change?", "back": "Rules of art derive force from reason alone and change quickly, while laws derive force from custom and should change slowly."}, {"front": "Which three thinkers primarily transmitted Aristotelian political concepts to the American Founders?", "back": "Polybius, Cicero, and Montesquieu."}, {"front": "Which Aristotelian concept was reformulated by Montesquieu into the separation of powers?", "back": "Mixed government."}, {"front": "What was the core insight behind the Aristotelian doctrine of mixed government?", "back": "Stability requires that no single group exercises unchecked power."}, {"front": "In Federalist No. 10, where does James Madison argue the 'latent causes of faction' are located?", "back": "In the nature of man."}, {"front": "How did Madison's proposed solution to the problem of faction differ from Aristotle's?", "back": "Madison relied on structural constitutional mechanisms rather than a large middle class."}, {"front": "What was Tocqueville's version of Aristotle's concern about democracy degenerating into mob rule?", "back": "The tyranny of the majority."}, {"front": "According to Tocqueville, why is the absolute sovereignty of the majority's will dangerous?", "back": "Minorities have no protection against the majority's demands."}, {"front": "Term: Soft Despotism.", "back": "Definition: A state where citizens surrender civic responsibilities to an administrative state in exchange for private comfort."}, {"front": "How did Tocqueville describe the citizens living under 'soft despotism'?", "back": "As timid and industrious animals with the government as their shepherd."}, {"front": "How does Tocqueville's 'soft despotism' relate to Aristotle's view on the survival of a constitution?", "back": "Both believe a constitution fails when citizens are no longer formed in the virtues of citizenship."}, {"front": "According to the teacher note, what does a tax law that taxes the poor more heavily than the rich fail to meet?", "back": "The criterion of form (proportionate distribution of burdens)."}, {"front": "What is the 'common weal' in the context of Aquinas's discussion on changing laws?", "back": "The common good or public welfare."}, {"front": "Why did Madison argue for a large republic with representation?", "back": "To filter and moderate popular passions to prevent any one faction from dominating."}, {"front": "Concept: Equality of Proportion.", "back": "Definition: The requirement that legal burdens be distributed fairly across the community to maintain a just law."}, {"front": "Why is violating a traffic law generally considered less 'morally grave' than murder in Aquinas's framework?", "back": "Traffic laws are human determinations for order, while murder violates a direct conclusion of natural law."}, {"front": "True or False: Aquinas believes every citizen may disobey any law they personally find unjust.", "back": "False; the law must be objectively unjust and compliance is often favored to avoid disorder."}, {"front": "How does the 'Author' criterion prevent tyranny according to Aquinas?", "back": "It mandates that laws are only valid if the lawgiver has the legitimate authority to create them."}, {"front": "In Aquinas's view, a law that serves the ruler's 'cupidity or vainglory' violates which criterion?", "back": "The end (it does not serve the common good)."}, {"front": "What does Aquinas define as 'God's own rational governance of creation'?", "back": "Eternal law."}, {"front": "What is the 'first rule of reason' according to Aquinas?", "back": "The law of nature."}, {"front": "According to the text, why does the force of law depend partly on custom?", "back": "Custom creates a habit of observance, and going against it is seen as a grave matter even in small things."}, {"front": "What is the 'Aristotelian anxiety' shared by Tocqueville regarding modern democracy?", "back": "The enervation of civic virtue due to prosperity and equality."}, {"front": "In the context of American history, what is the unresolved question regarding Madison's departure from Aristotle?", "back": "Whether structural mechanisms alone can substitute for social and cultural foundations for stability."}, {"front": "What determines the extent of the 'force of law' in human affairs for Aquinas?", "back": "The extent of its justice."}, {"front": "According to Aquinas, a law is 'just' from being 'right' according to the _____.", "back": "Rule of reason"}, {"front": "What must occur before departing from a law 'which has long been considered just'?", "back": "There should be evident proof of the benefit to be derived from the new law."}, {"front": "What did Aristotle conclude regarding rule by the many for the many?", "back": "It is not justice, because justice requires serving the common good of all, including minorities."}, {"front": "Why does a law commanding idolatry lack the authority of law according to Aquinas?", "back": "It is opposed to the Divine good and violates Divine law."}, {"front": "How does the text define 'pedagogical content' in relation to Aquinas?", "back": "The direct instructional material regarding legal obligation, conscience, and the types of law."}, {"front": "What 'high' requirement does Aquinas set for justified civil disobedience?", "back": "A high burden of proof that the law is objectively unjust."}, {"front": "Madison's 'Federalist No. 10' is compared to which book of Aristotle's 'Politics'?", "back": "Book V."}, {"front": "Aquinas teaches that because man belongs to the community as a part to a whole, nature inflicts a loss on the part to _____.", "back": "Save the whole"}, {"front": "According to the Jurist cited by Aquinas, when establishing new laws, what must be present?", "back": "Evidence of the benefit to be derived."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
