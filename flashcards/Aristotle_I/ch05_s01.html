    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Aristotle's famous claim about human beings and society?", "back": "Aristotle claimed that human beings are by nature *politikon zoa* — political animals."}, {"front": "Define *telos* in Aristotle's philosophy.", "back": "Telos is the natural end, purpose, or goal toward which a thing develops. For Aristotle, understanding a thing means understanding what it is for, its perfect natural state."}, {"front": "How does Aristotle apply *teleological* logic to human society's development?", "back": "He argues that the household is naturally prior to the individual, the village develops naturally from the household, and the city is the natural development of the village, serving as the community where human nature finds completion."}, {"front": "What does Aristotle consider the 'proof' that the city is natural for humans?", "back": "The proof lies in *logos*, the distinctively human capacity for rational speech and moral discourse, which allows us to discuss justice and injustice, distinguishing us from other social animals."}, {"front": "According to Aristotle, what is the significance of the human capacity for *logos* in political life?", "back": "Logos is the instrument by which human communities are organized around shared norms of justice, rather than mere force, enabling political life."}, {"front": "What does Aristotle mean by 'Man as Political Animal' (politikon zoon)?", "back": "It means that political community is the natural fulfillment of human nature, the context where our rational and social capacities are properly expressed. A human outside this community is 'either a beast or a god.'"}, {"front": "What are the three key implications of Aristotle's 'Man as Political Animal' concept?", "back": "1) The state is a natural growth, not an artificial invention. 2) The state's purpose is virtue and the good life, not just security or prosperity. 3) People cannot achieve a fully good life in isolation; mutual interdependence is necessary."}, {"front": "What is Aristotle's most insightful recognition regarding the household, and what is its most troubling error?", "back": "His insight is that the household is the fundamental building block of political life and that justice begins at home. His most troubling error is his defense of natural slavery."}, {"front": "Why should students NOT skip Aristotle's passages on natural slavery?", "back": "1) It shows how good reasoning can go wrong. 2) It demonstrates how even great minds are shaped by societal assumptions. 3) Aristotle's own principles provide resources to refute him."}, {"front": "How does Aristotle define a 'natural slave,' and what are the two main problems with this definition?", "back": "A 'natural slave' possesses reason only to recognize it in others, not to exercise it themselves. The problems are: 1) Empirically, no human group fits this description. 2) Logically, it contradicts Aristotle's own argument that human good lies in rational activity."}, {"front": "How did the Christian tradition, specifically Thomas Aquinas, respond to Aristotle's natural slavery doctrine?", "back": "The Christian tradition rejected it, asserting that every human, made in the *imago Dei* (image of God), possesses irreducible dignity. Thomas Aquinas, a follower of Aristotle, did not adopt the natural slavery doctrine, demonstrating how philosophical frameworks can be corrected by better premises."}, {"front": "What is Aristotle's definition of a citizen?", "back": "A citizen is one who 'shares in the judicial and executive part of the government.'"}, {"front": "What is the first implication of Aristotle's definition of citizenship?", "back": "Citizenship is an activity, not just a status. It requires active participation in the common life of the community, not merely holding a document."}, {"front": "How do different forms of government affect the conception of citizenship, according to Aristotle?", "back": "Different forms produce different conceptions: a polity allows most free adult males, an oligarchy requires wealth, and an aristocracy requires virtue. The 'best' citizenship serves the common good by selecting qualities relevant to good governance."}, {"front": "What tension does Aristotle acknowledge regarding the 'best citizen' versus the 'good man'?", "back": "He notes that the 'best citizen' in a specific constitution (e.g., a loyal servant in a tyranny) may not align with the 'good man' in absolute moral terms, highlighting the tension between civic loyalty and moral principle."}, {"front": "What are the two axes Aristotle uses to classify the six constitutions (forms of government)?", "back": "1) How many rule (one, few, or many). 2) For whose benefit (the common good, or private interest of the rulers)."}, {"front": "Name the three 'correct' forms of government and their corresponding 'deviant' forms, according to Aristotle.", "back": "Correct forms (aiming at common good): Monarchy (rule by one), Aristocracy (rule by few), Polity (rule by many). Deviant forms (serving private interest): Tyranny, Oligarchy, Democracy (or Mob Rule)."}, {"front": "What does Aristotle identify as the best practically achievable form of government for most cities, and the worst?", "back": "Polity is the best practically achievable form for most cities, while tyranny is the worst form of government."}, {"front": "According to Aristotle, what is the city (state) NOT merely for?", "back": "It is not merely a mutual security arrangement, an economic cooperative, or an instrument of any particular class."}, {"front": "What is the ultimate purpose of the state, according to Aristotle?", "back": "The city exists for justice and the good life, meaning political authority is ordered toward the moral end of creating conditions where human beings can flourish as rational, social creatures."}, {"front": "What implication does Aristotle's view of the state's purpose have for natural law theory?", "back": "If the state exists for justice, then unjust laws are, in some sense, not truly laws at all. This insight was developed by Thomas Aquinas."}, {"front": "Compare Aristotle's view on the origin of the state with the social contract view.", "back": "Aristotle views the state as a natural growth, with a purpose built into human nature. The social contract view (Hobbes, Locke, Rousseau) sees the state as an artificial construction, a convention individuals agree to for mutual benefit."}, {"front": "What is an 'implicit premise' in philosophical arguments, and why is it important to identify?", "back": "An implicit premise is an unstated assumption that shapes even rigorous arguments. Identifying them helps us understand how cultural assumptions can influence philosophers and where arguments might go wrong, as seen with Aristotle and natural slavery."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
