<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Man (Aristotle I) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why might reading Aristotle for the first time feel like joining a conversation late?", "back": "The arguments often build upon concepts or discussions that started before the reader arrived."}, {"front": "What characterizes the sentence structure of Aristotle's writing?", "back": "The sentences are dense and arguments frequently loop back on themselves."}, {"front": "What does it mean for a point in Aristotle's text to be \"suddenly qualified\"?", "back": "A point that seemed settled is later limited or modified by further conditions."}, {"front": "According to the text, the difficulty of reading Aristotle is a sign of what?", "back": "Serious philosophical work."}, {"front": "What is the primary reason to read Aristotle slowly?", "back": "He does not repeat himself for emphasis, so each point must be captured on the first pass."}, {"front": "What is the reader expected to do with a point Aristotle makes only once?", "back": "The reader is expected to remember it throughout the reasoning process."}, {"front": "According to the reading guide, what is the comparative value of one page read carefully versus ten pages skimmed?", "back": "A single carefully read page is worth ten skimmed pages."}, {"front": "When does Aristotle typically provide definitions for his technical terms?", "back": "He almost always defines them before reasoning from them."}, {"front": "What are three examples of technical terms Aristotle uses?", "back": "$eudaimonia$, $arete$, and $telos$."}, {"front": "If a reader becomes confused during an argument, where should they look first?", "back": "Look back a few pages for the definition of the terms being used."}, {"front": "Confusion in Aristotle's text is often a symptom of what reading error?", "back": "Letting a key definition slip."}, {"front": "How are Aristotle's arguments described in terms of their structure?", "back": "They resemble long, windy paths that arrive at a specific destination."}, {"front": "What is the first thing a reader should identify to make the steps of an argument easier to follow?", "back": "The conclusion or what Aristotle is trying to prove."}, {"front": "The \"on the one hand\" structure is a method Aristotle uses to survey what?", "back": "A wide range of existing views before settling on his own."}, {"front": "Who are the two groups Aristotle typically surveys before presenting his own position?", "back": "Most people and \"the wise.\""}, {"front": "What does Aristotle identify when surveying the views of \"most people\" and \"the wise\"?", "back": "Where both groups are right and where both go wrong."}, {"front": "Why is the meandering structure of surveying multiple views considered a sign of \"intellectual honesty\"?", "back": "It demonstrates that Aristotle takes opposing views seriously before dismissing them."}, {"front": "What active reading habit is suggested to help review material and answer questions?", "back": "Keeping a running outline while reading."}, {"front": "In a philosophical outline, what component follows the main point?", "back": "The supporting argument."}, {"front": "In a philosophical outline, what component follows the supporting argument?", "back": "The objection considered."}, {"front": "In a philosophical outline, what is the final component listed for a section?", "back": "The conclusion."}, {"front": "Which translation is used for the *Nicomachean Ethics* in the source book?", "back": "The W. D. Ross translation from 1925."}, {"front": "Which translation is used for the *Politics* in the source book?", "back": "The William Ellis translation from 1912."}, {"front": "What is the scholarly reputation of the W. D. Ross translation?", "back": "It is a clear and faithful rendering that has served scholars for a century."}, {"front": "How are Greek transliterations like *polis* visually distinguished in the text?", "back": "They appear in italics."}, {"front": "Where can a reader find definitions for terms that are unfamiliar but not defined in the main text?", "back": "In the footnotes or the master glossary at the back of the book."}, {"front": "Cloze: Aristotle characteristically surveys a range of _____ before settling on his own.", "back": "views"}, {"front": "Cloze: A page of Aristotle read _____ is worth ten pages skimmed.", "back": "carefully"}, {"front": "Cloze: Aristotle almost always defines his _____ before he reasons from them.", "back": "terms"}, {"front": "What is the copyright status of the Ross and Ellis translations?", "back": "They are in the public domain."}, {"front": "Concept: *eudaimonia*", "back": "A Greek technical term often translated as happiness or flourishing, defined by Aristotle before use."}, {"front": "Concept: *arete*", "back": "A Greek technical term meaning virtue or excellence."}, {"front": "Concept: *telos*", "back": "A Greek technical term referring to an end, purpose, or goal."}, {"front": "Why might a reader need to \"look back\" while reading Aristotle?", "back": "To recall a key definition that was provided several pages earlier."}, {"front": "What is the benefit of knowing the conclusion of an Aristotelian argument before reading the details?", "back": "It makes the individual steps of the argument easier to follow."}, {"front": "Where did the author of the reading guide source the translations from?", "back": "Project Gutenberg."}, {"front": "How does Aristotle handle the opinions of \"the wise\" compared to those of \"most people\"?", "back": "He surveys both to find points of agreement and error."}, {"front": "What specific academic press published the W. D. Ross translation of *Nicomachean Ethics*?", "back": "Oxford University Press."}, {"front": "What library collection published the William Ellis translation of *Politics*?", "back": "Everyman's Library."}, {"front": "Which translation is noted for its careful preservation of Aristotle's distinctions?", "back": "Both the Ross and Ellis translations are described as faithful to his distinctions."}, {"front": "How does Aristotle approach a point he has already established three paragraphs ago?", "back": "He may suddenly qualify it."}, {"front": "Why does the text advise against being discouraged by the density of Aristotle's prose?", "back": "Because the difficulty is a hallmark of serious philosophical inquiry that rewards patience."}, {"front": "In an outline, what is the purpose of including the \"objection considered\"?", "back": "To track how Aristotle addresses opposing views before reaching a conclusion."}, {"front": "What is the specific instruction regarding the use of footnotes for Greek terms?", "back": "Terms like $eudaimonia$ are defined in a footnote on their first use."}, {"front": "According to the guide, when should a reader keep a running outline?", "back": "As they go through the reading."}, {"front": "What does the text suggest is the reward for patience when reading Aristotle?", "back": "The difficulty of the work is rewarded with philosophical insight."}, {"front": "Cloze: Aristotle does not repeat himself for _____ the way a popular writer might.", "back": "emphasis"}, {"front": "Cloze: A master _____ at the back of this book collects all the key terms with their definitions.", "back": "glossary"}, {"front": "True or False: Aristotle's arguments are usually aimless and without a specific destination.", "back": "False"}, {"front": "True or False: Aristotle considers the views of the wise to be purely correct without error.", "back": "False"}, {"front": "How many times does Aristotle typically state a point he expects you to remember?", "back": "Once."}, {"front": "What is the purpose of the \"gloss\" provided in the footnotes?", "back": "To define terms that may be unfamiliar to the reader."}, {"front": "Why is it important to \"hold the argument in your head\" while reading Aristotle?", "back": "Because he reasons from previous points without repeating them for emphasis."}, {"front": "What does the text mean by saying Aristotle \"characteristically surveys a range of views\"?", "back": "It is a standard part of his method to look at what others have said before him."}, {"front": "Which Aristotelian work is associated with the term $polis$ in the translation note?", "back": "The *Politics*."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
