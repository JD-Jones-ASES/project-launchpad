    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Aristotle_I.html">&larr; Back to The Life of Man (Aristotle I)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "Whom did Thomas Aquinas refer to simply as \"the Philosopher\"?", "back": "Aristotle", "id": "fc01"}, {"front": "What was the primary intellectual goal of Thomas Aquinas in his work *Summa Theologica*?", "back": "To receive and build on Aristotelian ethics and raise the framework toward supernatural completion.", "id": "fc02"}, {"front": "According to Aquinas, what is the key distinction between Aristotle's *eudaimonia* and Christian fulfillment?", "back": "The distinction between imperfect happiness and perfect happiness.", "id": "fc03"}, {"front": "How does Aquinas define \"imperfect happiness\"?", "back": "The best a human being can achieve through natural powers alone in the present life.", "id": "fc04"}, {"front": "According to Aquinas, why can no created thing fully satisfy the human will?", "back": "The human will is oriented toward the universal good and has an infinite capacity.", "id": "fc05"}, {"front": "In Christian theology, what is the \"beatific vision\"?", "back": "The direct knowledge or contemplation of God as he is in himself, enjoyed by the blessed in heaven.", "id": "fc06"}, {"front": "What must occur for a human action to be properly called \"human\" according to Aquinas?", "back": "The action must proceed from a deliberate will.", "id": "fc07"}, {"front": "Which two faculties make a human being the \"master\" of his actions?", "back": "Reason and will.", "id": "fc08"}, {"front": "How does Aquinas distinguish between \"human actions\" and \"actions of a man\"?", "back": "Human actions are proper to man as man, whereas other actions found in man are not mastered by reason and will.", "id": "fc09"}, {"front": "What is the primary object of the human will?", "back": "The end and the good.", "id": "fc10"}, {"front": "How can an \"end\" be considered a cause if it is the last thing in the order of execution?", "back": "It is a cause because it is first in the order of the agent's intention.", "id": "fc11"}, {"front": "What is the difference between an action that is \"commanded\" by the will and one that is \"elicited\"?", "back": "Commanded actions are external acts like walking, while elicited actions are internal acts like the very act of willing.", "id": "fc12"}, {"front": "Why can the internal act of willing itself never be the \"last end\" of man?", "back": "Every act of willing is directed toward an object, just as every act of seeing is directed toward a visible object.", "id": "fc13"}, {"front": "What is the defining characteristic of a \"perfect good\"?", "back": "It is a good that lulls the appetite altogether, leaving nothing yet to be desired.", "id": "fc14"}, {"front": "According to Aquinas, where is the \"universal good\" found?", "back": "In God alone.", "id": "fc15"}, {"front": "What does Bernard of Clairvaux mean by the term *capax Dei*?", "back": "The human heart has a capacity for God that nothing less than God can fill.", "id": "fc16"}, {"front": "Why is it impossible for any creature to satisfy the human will?", "back": "Every creature has goodness only by participation rather than being the universal fount of good.", "id": "fc17"}, {"front": "By what means can man acquire \"imperfect happiness\" in this life?", "back": "Through his natural powers and the operation of virtue.", "id": "fc18"}, {"front": "Why does the vision of God's essence surpass the natural capacity of any creature?", "back": "Natural knowledge is limited by the mode of a created substance, which falls short of the infinite divine essence.", "id": "fc19"}, {"front": "How does Aquinas define the theological concept of \"grace\"?", "back": "The free gift of God that elevates the soul beyond its natural capacity to participate in divine life.", "id": "fc20"}, {"front": "What is the meaning of the principle *gratia non tollit naturam, sed perficit*?", "back": "Grace does not destroy nature but perfects it.", "id": "fc21"}, {"front": "Why is a rational creature considered more noble than an irrational creature even if it requires help to reach its end?", "back": "It is more noble to be capable of attaining a perfect good with assistance than to reach a lesser, imperfect good alone.", "id": "fc22"}, {"front": "According to Aquinas, what is the relationship between natural happiness and perfect happiness?", "back": "Natural happiness is a real good that is ordered toward perfect happiness like a staircase is ordered to the room above it.", "id": "fc23"}, {"front": "Which ethical framework dominated the 18th and 19th centuries by focusing on the rational principle of duty?", "back": "Kantian deontology.", "id": "fc24"}, {"front": "How does utilitarianism define the \"right action\"?", "back": "The action that produces the greatest happiness for the greatest number.", "id": "fc25"}, {"front": "How do utilitarians define happiness compared to Aristotle?", "back": "Utilitarians define happiness as a mental state of pleasure, whereas Aristotle defines it as an objective condition of excellent living.", "id": "fc26"}, {"front": "What was the central argument of Elizabeth Anscombe's 1958 article \"Modern Moral Philosophy\"?", "back": "Kantian and utilitarian ethics are incoherent without the teleological framework provided by Aristotle.", "id": "fc27"}, {"front": "Which philosopher argued in *After Virtue* that modern culture needs to recover the Aristotelian framework?", "back": "Alasdair MacIntyre.", "id": "fc28"}, {"front": "What is Philippa Foot's concept of \"natural goodness\"?", "back": "The idea that what is good for a living thing is what enables it to flourish according to its nature.", "id": "fc29"}, {"front": "How has the \"positive psychology\" movement shifted the medical model of mental health?", "back": "It has moved away from merely eliminating disorders toward promoting human flourishing.", "id": "fc30"}, {"front": "In the context of modern psychology, what is the standard translation of Aristotle's *eudaimonia*?", "back": "Flourishing.", "id": "fc31"}, {"front": "According to positive psychology, what are some key conditions for genuine human flourishing?", "back": "Meaningful relationships, engaged activity, the exercise of strengths, and contribution to something larger than oneself.", "id": "fc32"}, {"front": "What empirical distinction does modern psychology share with Aristotle regarding happiness?", "back": "Feeling good is not the same as living well.", "id": "fc33"}, {"front": "According to the \"Where These Ideas Lead\" section, how is virtue acquired?", "back": "Virtue comes from habit and the moral weight of small, repeated choices.", "id": "fc34"}, {"front": "What is the object of the human intellect, according to Aquinas?", "back": "The universal true.", "id": "fc35"}, {"front": "In the Summa's structure, what are \"Objections\"?", "back": "Arguments against the position Aquinas intended to defend, presented before his own answer.", "id": "fc36"}, {"front": "How does Aquinas respond to the idea that man's last end could be an action like walking?", "back": "He argues that such an action must be voluntary and commanded by the will to serve a further end.", "id": "fc37"}, {"front": "What biblical quote does Aquinas use to argue that God alone satisfies human desire?", "back": "Psalm 102:5: \"Who satisfieth thy desire with good things.\"", "id": "fc38"}, {"front": "In Q. 5, Art. 5, how does Aquinas use the analogy of weapons and clothing to explain human nature?", "back": "Nature did not provide them directly but gave man reason and hands to acquire them, just as it gave free-will to turn to God for happiness.", "id": "fc39"}, {"front": "According to the teacher's note, what phrase is the \"key to everything\" in the relationship between Aquinas and Aristotle?", "back": "\"Grace perfects nature.\"", "id": "fc40"}, {"front": "Which philosopher is associated with the concept of \"flow\" or \"engaged activity\" in positive psychology?", "back": "Mihaly Csikszentmihalyi.", "id": "fc41"}, {"front": "What is the significance of Aquinas calling Aristotle \"the Philosopher\"?", "back": "It reflects the total respect and influence Aristotle had on medieval learned culture.", "id": "fc42"}, {"front": "Where was Thomas Aquinas born?", "back": "Near Aquino in southern Italy.", "id": "fc43"}, {"front": "Under which scholar did Thomas Aquinas study in Cologne and Paris?", "back": "Albert the Great.", "id": "fc44"}, {"front": "What religious order did Thomas Aquinas belong to?", "back": "The Dominican friars.", "id": "fc45"}, {"front": "In which part of the *Summa Theologica* does Aquinas treat the subject of ethics?", "back": "The First Part of the Second Part (I-II).", "id": "fc46"}, {"front": "What does Aquinas identify as the common object of happiness for all the blessed?", "back": "The universal fount of good, which is the infinite and perfect good of God.", "id": "fc47"}, {"front": "Why does Aquinas believe that the will is naturally ordered to the universal good?", "back": "The will's object is the good, just as the intellect's object is the truth.", "id": "fc48"}, {"front": "How does Aquinas define the \"faculty and will of reason\"?", "back": "He uses this phrase to define free-will.", "id": "fc49"}, {"front": "In the analogy of health, why is the person who needs medicine better off than one who doesn't but has imperfect health?", "back": "The person using medicine can attain perfect health, which is a superior state.", "id": "fc50"}, {"front": "What is the status of the *Summa Theologica* at the time of Aquinas's death?", "back": "It was left unfinished.", "id": "fc51"}, {"front": "Which medieval figure is cited for the idea that Divine wisdom unites the ends of lower things to the beginnings of higher things?", "back": "Dionysius.", "id": "fc52"}, {"front": "According to Augustine in *De Civitate Dei*, what is the relationship between God and the soul's happiness?", "back": "God is the soul's life of happiness, just as the soul is the life of the body.", "id": "fc53"}, {"front": "Why is it impossible for the act of seeing to be the \"first visible\"?", "back": "Every act of seeing is directed to a visible object outside the act itself.", "id": "fc54"}, {"front": "What determines the mode of knowledge for every creature, according to the *De Causis*?", "back": "The mode of its substance.", "id": "fc55"}, {"front": "Which branch of philosophy was transformed by Elizabeth Anscombe's 1958 article?", "back": "Virtue ethics.", "id": "fc56"}, {"front": "How does the \"function argument\" relate to Philippa Foot's work?", "back": "It provides the basis for her concept that goodness for a living thing is living according to its nature.", "id": "fc57"}, {"front": "What specific phrase does Aquinas use to signify he is moving beyond Aristotle to Christian revelation?", "back": "He often marks the shift from \"as the Philosopher says\" to citations of Scripture or theology.", "id": "fc58"}, {"front": "What is the primary difference between how man and irrational animals act for an end?", "back": "Man is master of his actions through reason and will, whereas animals act by natural instinct.", "id": "fc59"}, {"front": "According to Aquinas, the _____ is the principle in human operations.", "back": "End", "id": "fc60"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
