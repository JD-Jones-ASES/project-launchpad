    <style>
        .fc-container {
            max-width: 700px;

            text-align: center;

        .fc-breadcrumb {
            margin-bottom: 2rem;

        .fc-breadcrumb a {

        /* Card */

            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;

        .fc-card.flipped {

        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;

            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;

            font-size: 0.7rem;

        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }

            font-family: 'Crimson Text', serif;

            transition: all 0.3s ease;

        .fc-btn:hover {

        .fc-btn:disabled {

        }
        .fc-btn:disabled:hover {
            background: transparent;

        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;

        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;

        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {

            padding: 0.1rem 0.4rem;

            border: 1px solid var(--border-color);

        @media (max-width: 768px) {

                font-size: 1rem;

                min-height: 220px;
            }

                gap: 0.5rem;

        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">

    <script>
    var CARDS = [{"front": "How did Aristotle's approach to political science differ from pure ideal theory?", "back": "He reasoned from empirical data gathered from observing 158 different real-world constitutions."}, {"front": "Which of the 158 constitutions compiled by Aristotle and his students still survives today?", "back": "The Constitution of Athens."}, {"front": "Why does Aristotle compare a political theorist to a physician in Book IV?", "back": "Both must understand not only the ideal state of health/justice but also what is possible for actual subjects."}, {"front": "Term: $phronesis$", "back": "Definition: Practical wisdom, or the capacity of a statesman to judge the best course of action in specific circumstances."}, {"front": "According to Aristotle, what is the relationship between a city's laws and its constitution?", "back": "Laws must be framed to suit the constitution, rather than the constitution to the laws."}, {"front": "In Aristotle's definition, what is the primary function or 'office' of the laws?", "back": "To direct the conduct of magistrates and the punishment of offenders."}, {"front": "How does Aristotle define 'government' as distinct from 'laws'?", "back": "The ordering of a state regarding how magistrates are regulated, where supreme power is placed, and the community's final object."}, {"front": "What are the three 'regular' forms of government identified by Aristotle?", "back": "Kingly (monarchy), Aristocratical, and Free State (polity)."}, {"front": "According to Aristotle's classification, what is the 'excess' or perversion of a Kingly government?", "back": "Tyranny."}, {"front": "According to Aristotle's classification, what is the 'excess' or perversion of an Aristocracy?", "back": "Oligarchy."}, {"front": "According to Aristotle's classification, what is the 'excess' or perversion of a Free State (Polity)?", "back": "Democracy."}, {"front": "What ethical principle from Aristotle's 'treatise on Morals' serves as the foundation for his ideal practical constitution?", "back": "The doctrine of the mean, asserting that the middle life is the happiest and most virtuous."}, {"front": "Why does Aristotle argue that the very rich are often 'contemptuous of law'?", "back": "They are brought up in prosperity and arrogance, making them unaccustomed to and unwilling to obey others."}, {"front": "In Aristotle's view, why are the very poor often incapable of exercising political judgment?", "back": "Their 'mean' condition makes them accustomed only to being commanded like slaves and susceptible to demagogues."}, {"front": "According to the text, why is the middle class the 'naturally proper members' of a stable city?", "back": "They are equals who neither plot against the rich nor are envied by the poor."}, {"front": "What is the primary benefit of a city having a middle class larger than the rich and poor combined?", "back": "It prevents either extreme from outweighing the other and destabilizing the state."}, {"front": "How does Aristotle define a 'demagogue'?", "back": "A politician who inflames popular passions and prejudices to gain power rather than appealing to reason."}, {"front": "What is the fundamental root cause of sedition and revolution in Aristotle's analysis?", "back": "A perceived violation of justice ($dikaiosyne$) in the distribution of power, profit, or honor."}, {"front": "Under what psychological condition do equals begin a sedition against their government?", "back": "When they believe they are being treated as inferiors or possess less than those they esteem as equals."}, {"front": "Under what psychological condition do inferiors begin a sedition against their government?", "back": "When they aim for equality because they see others possessing more than they do."}, {"front": "Aristotle notes that revolutions can be triggered by 'disproportionate increase.' What does this mean?", "back": "When one part of the state grows too large or powerful relative to the others, upsetting the balance."}, {"front": "What 'small' factor does Aristotle warn states to guard against to prevent the gradual destruction of the constitution?", "back": "Small illegalities that creep in unnoticed, like small recurring expenses consuming a family's income."}, {"front": "Why does Aristotle recommend that magistrates in a democracy or oligarchy serve no longer than six months?", "back": "To ensure equality among the ruling rank and prevent the rise of a tyranny or entrenched dynasty."}, {"front": "How should a state adjust its census requirements if the quantity of money in the economy increases?", "back": "The census (property qualification) should be extended or increased to maintain the original intent of the constitution."}, {"front": "What is Aristotle's recommendation for handling individuals who acquire 'rank far superior to the rest'?", "back": "The law should ensure no one has too much power through fortune or friends, or compel them to leave the country."}, {"front": "In an oligarchy, why is it vital to prevent state officers from 'stealing the public money'?", "back": "The poor will be doubly aggrieved if they are both excluded from power and pillaged by those who hold it."}, {"front": "What is the 'greatest of all the means' for preserving a constitution, according to Aristotle?", "back": "Adapting the education of children to the specific form of the government."}, {"front": "What are the three necessary qualifications for those who fill high departments in government?", "back": "Affection for the constitution, high ability for the office, and virtue/justice suited to that state."}, {"front": "When choosing a general, which quality does Aristotle suggest prioritizing over general virtue?", "back": "Professional ability (courage and skill in conducting an army)."}, {"front": "When choosing a treasurer or financial officer, which quality is more essential than specialized knowledge?", "back": "Virtue and integrity, as these require more than the 'common knowledge' of the job."}, {"front": "What analogy does Aristotle use to explain why a constitution should not be pushed to its extreme form?", "back": "A nose that varies from straightness can still be beautiful, but if pushed to an extreme, it ceases to look like a nose at all."}, {"front": "How does Aristotle critique the definition of 'liberty' found in pure democracies?", "back": "He argues they wrongly define it as the freedom for every person to live exactly as they please."}, {"front": "Why is education considered the 'immune system' of the constitution?", "back": "It forms the habits and desires of citizens so they voluntarily embrace the justice the constitution embodies."}, {"front": "What is the danger of bringing up the children of magistrates 'too delicately' in an oligarchy?", "back": "They become unable to endure hardship or obey others, making them prone to causing innovation and instability."}, {"front": "How should an oligarchy treat the poor to ensure stability?", "back": "By allotting them gainful public employments and punishing rich citizens severely for insulting them."}, {"front": "In a democracy, what protection should be granted to the rich to prevent revolution?", "back": "Their lands and produce should not be divided, and they should be discouraged from wasteful public entertainments."}, {"front": "What is the psychological cause of oligarchic instability related to wealth?", "back": "The arrogance and contempt for law that excessive wealth tends to produce in the ruling class."}, {"front": "What method does Aristotle suggest for blending democracy and aristocracy in terms of public office?", "back": "Making offices bring no profit, so the poor prefer to work their own land while the rich serve for honor."}, {"front": "According to Aristotle, why is it useful for a state to make distant dangers appear near at hand?", "back": "To awaken the fears of the people so they keep a 'stricter hand' over the state and guard the constitution."}, {"front": "What does Aristotle identify as the 'genius' or defining characteristic of a city?", "back": "To be composed as much as possible of equals."}, {"front": "Term: $dikaiosyne$", "back": "Definition: Justice, or the virtue of rendering to each what is due."}, {"front": "Why is the middle class least likely to shrink from 'the different offices of the state'?", "back": "They lack the arrogance of the rich (who won't obey) and the meanness of the poor (who can't command)."}, {"front": "In Book V, Aristotle lists several causes of sedition. What is the role of 'contempt'?", "back": "It occurs when those excluded from power see the rulers are weak or disorganized and decide to strike."}, {"front": "According to Aristotle, how should copies of public accounts be handled to prevent fraud?", "back": "They should be deposited in different wards, tribes, and divisions for transparency."}, {"front": "What does Aristotle claim is the 'first and principal support' of any government's preservation?", "back": "Ensuring the number of those who desire to preserve the state is greater than those who wish to destroy it."}, {"front": "Why does Aristotle argue that pure equality of property would destroy a democracy or oligarchy?", "back": "Both forms inherently rely on the coexistence of rich and poor; removing this inequality changes the state's form entirely."}, {"front": "What mistake do demagogues typically make regarding the relationship between the people and the law?", "back": "They endeavor to make the common people superior to the laws."}, {"front": "How should the oaths taken by magistrates in an oligarchy be changed to promote stability?", "back": "They should swear not to injure the people, rather than swearing to be adverse to them."}, {"front": "According to the text, why should the poor be glad to be excluded from office in a non-venal government?", "back": "It allows them the leisure to attend to their own private affairs and increase their fortunes."}, {"front": "What is the 'moral' of Aristotle's methodological point about abstract ideals?", "back": "A legislator who insists on a perfectly just constitution in unsupportive conditions will produce suffering and instability."}, {"front": "Aristotle describes Book V as a treatise on 'political pathology.' What does this mean?", "back": "It is an analysis of the 'diseases' or things that go wrong within each type of constitution."}, {"front": "The _____ is the physical location in Athens where citizens met for political deliberation, embodying Aristotelian ideals.", "back": "Pnyx hill"}, {"front": "Aristotle argues that a city with a large middle class is most likely to be governed by _____ rather than passion.", "back": "reason"}, {"front": "In Aristotle's view, 'community' necessarily supposes _____, which is absent in cities divided into slaves and masters.", "back": "affection"}, {"front": "The Greek poet _____ is cited by Aristotle as wisely wishing for the 'middle state' for happiness.", "back": "Phocylides"}, {"front": "What happens to a government when the 'mean' is abolished and politics becomes a zero-sum struggle between factions?", "back": "It becomes a society of extremes characterized by instability."}, {"front": "Aristotle's analysis of revolution is described as 'deeply humanist' because it focuses on what people _____, feel, and desire.", "back": "believe"}, {"front": "What is the consequence of a 'too great dissimilarity of circumstances' within a state?", "back": "It serves as an occasion for revolution in government."}, {"front": "To preserve a state, Aristotle suggests appointing an officer to inspect 'manners' to ensure they align with the _____ of the state.", "back": "genius (or character)"}, {"front": "According to Aristotle, 'the principal part of the people will not be governed by the lower sort' if _____.", "back": "public employment is not attended with any profit (emolument)."}, {"front": "In an oligarchy, property should pass by _____ rather than gift to keep it more equally divided.", "back": "affinity (family relation)"}, {"front": "Aristotle warns that 'it is not every one who can bear _____' when discussing why honors should be conferred moderately.", "back": "prosperity"}, {"front": "A legislator must be like a craftsman, acquainted not only with the ideal but with the full range of what is _____.", "back": "possible"}, {"front": "According to Aristotle, which form of government is 'the worst of all' among the three excesses?", "back": "Tyranny."}, {"front": "True or False: Aristotle believed there was only one species of democracy and one species of oligarchy.", "back": "False (he identifies many different species of each)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
