    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 8, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Aristotle, what is the highest good for human beings?", "back": "Eudaimonia (happiness)."}, {"front": "How does the Ethics define happiness in terms of human soul activity?", "back": "An activity of the soul in accordance with virtue."}, {"front": "Why is external wealth insufficient for genuine happiness in Aristotle's account?", "back": "Happiness requires virtuous character rather than just pleasant circumstances."}, {"front": "Instead of a passive condition or a feeling, what does Aristotle equate with happiness?", "back": "A kind of living and acting well."}, {"front": "By what process is a virtuous character acquired?", "back": "Habitual practice (repeatedly performing virtuous acts)."}, {"front": "In Aristotle's theory of virtue, what is a \"stable disposition\"?", "back": "A character trait where the right response becomes second nature through habit."}, {"front": "To what extent does a single heroic act contribute to becoming virtuous?", "back": "It is insufficient; virtue is an achievement of sustained effort over time."}, {"front": "How does a single failure impact a character that has already been formed?", "back": "It does not destroy a character already established through habit."}, {"front": "What is the \"doctrine of the mean\"?", "back": "The principle that virtue is a disposition to act in the right measure, avoiding excess and deficiency."}, {"front": "Between which two extremes does the virtue of courage lie?", "back": "Cowardice (deficiency) and rashness (excess)."}, {"front": "Temperance is the mean between self-indulgence and _____.", "back": "Insensibility."}, {"front": "Term: Phronesis.", "back": "Definition: Practical wisdom, or the cultivated capacity for good judgment in particular situations."}, {"front": "What is the function of *phronesis* within the moral virtues?", "back": "It is the master intellectual virtue required to find the \"mean\" in practice."}, {"front": "Why does Aristotle describe the good life as \"irreducibly social\"?", "back": "No one would choose to live without friends, even if they had all other goods."}, {"front": "What are the three types of friendship identified by Aristotle?", "back": "Friendships of utility, pleasure, and character."}, {"front": "What defines a \"friendship of character\"?", "back": "The mutual recognition of two people who love what is genuinely good in each other."}, {"front": "Why is friendship of character the most enduring form of friendship?", "back": "It is rooted in stable virtue rather than fleeting utility or pleasure."}, {"front": "What did Aristotle identify in Book X as the most divine form of human happiness?", "back": "The contemplative life (the life of the mind directed at truth)."}, {"front": "Why is the contemplative life alone insufficient for a human being?", "back": "Humans are not pure intellects and must live in communities and exercise moral virtues."}, {"front": "The good life for human beings involves a balance between the contemplative life and the _____.", "back": "Active life of moral virtue."}, {"front": "What does the phrase \"political animal\" imply about human nature?", "back": "Human beings naturally seek and require a community to achieve their full potential."}, {"front": "According to the Politics, how would Aristotle categorize a person who genuinely needs no community?", "back": "Either a god or a beast."}, {"front": "How does the state differ from a \"contract for mutual protection\" in Aristotle's view?", "back": "It is the natural completion of the human social impulse intended for the full human life."}, {"front": "What are the stages of growth for a human community according to Aristotle?", "back": "Families and villages grow into a self-sufficient state (polis)."}, {"front": "What is the primary criterion for a \"correct\" form of government?", "back": "The rulers rule for the common good."}, {"front": "What is the primary criterion for a \"deviant\" form of government?", "back": "The rulers rule for their own private interest."}, {"front": "What is the correct form of government ruled by one person?", "back": "Monarchy."}, {"front": "What is the deviant form of government ruled by one person?", "back": "Tyranny."}, {"front": "What is the correct form of government ruled by a few people?", "back": "Aristocracy."}, {"front": "What is the deviant form of government ruled by a few people?", "back": "Oligarchy."}, {"front": "What is the correct form of government ruled by the many?", "back": "Polity."}, {"front": "What is the deviant form of government ruled by the many?", "back": "Democracy."}, {"front": "What is the \"mixed constitution\" (polity)?", "back": "A form of government that blends oligarchic order with democratic participation."}, {"front": "Why is the middle class essential to the stability of a polity?", "back": "It provides a stabilizing force between the extremes of the rich and the poor."}, {"front": "According to the Politics, where do the \"seeds of corruption\" for a constitution reside?", "back": "Within the constitution itself."}, {"front": "What specific vice typically leads to the fall of oligarchies?", "back": "The greed of the few."}, {"front": "What political figure is responsible for the collapse of democracies into deviant forms?", "back": "The demagogue who flatters the many."}, {"front": "Under what condition does a tyranny typically fall?", "back": "When fear no longer suffices to maintain control."}, {"front": "What is the primary remedy for constitutional corruption and political revolution?", "back": "Educating the people in the spirit of their constitution."}, {"front": "What is the highest priority of a state that aims at the \"good life\"?", "back": "The formation of good citizens."}, {"front": "How does Aristotle view the purpose of education in relation to the state's existence?", "back": "It is the project by which the state perpetuates its own soul."}, {"front": "What is the focus of \"liberal formation\" in education?", "back": "Cultivating the soul for virtue, wisdom, and noble leisure."}, {"front": "Why is Justice considered the most comprehensive of all moral virtues?", "back": "It is the social virtue that governs all dealings with others."}, {"front": "What was the core premise of Aristotle's defense of \"natural slavery\"?", "back": "Some people lack the deliberative reason required for self-governance."}, {"front": "How does Aristotle's concept of *logos* contradict his argument for natural slavery?", "back": "He claims all humans possess reason and speech, yet says natural slaves lack deliberative reason."}, {"front": "Which medieval philosopher retained Aristotle's framework but abandoned the doctrine of natural slavery?", "back": "Thomas Aquinas."}, {"front": "Upon what did Aristotle base his exclusion of women from full citizenship?", "back": "Unproven empirical assumptions about their rational capacity."}, {"front": "What limitation of historical horizon did Aristotle face regarding political forms?", "back": "He assumed the Greek city-state (polis) was the only viable political form."}, {"front": "What is the enduring lesson taught by Aristotle's philosophical errors?", "back": "Even great reasoning begins from assumptions that must be rigorously and continuously examined."}, {"front": "According to the text, what is the proper response to Aristotle's errors?", "back": "Apply his own principles more rigorously to correct what was wrong while preserving what was right."}, {"front": "What relationship does Aristotle establish between virtue and habit?", "back": "Character is formed by repeated action, not by knowledge or intentions alone."}, {"front": "According to Aristotle, what is the fundamental purpose of government?", "back": "To enable human flourishing and the good life."}, {"front": "What must rulers genuinely understand and love to ensure their political arrangements endure?", "back": "The common good."}, {"front": "Does Aristotle believe virtue can be a \"gift\" of nature?", "back": "No, it is an achievement resulting from sustained effort."}, {"front": "In Aristotle's classification, which form of government is the deviant counterpart to Aristocracy?", "back": "Oligarchy."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
