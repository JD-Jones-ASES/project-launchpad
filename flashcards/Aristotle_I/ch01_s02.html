    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did ancient writers describe the style of Aristotle's lost dialogues?", "back": "Elegant and conversational."}, {"front": "Whose conversational works served as the model for Aristotle's now-lost dialogues?", "back": "Plato's dialogues."}, {"front": "What specific phrase did Cicero use to describe Aristotle's prose style?", "back": "A river of gold."}, {"front": "What is the likely origin of Aristotle's surviving treatises according to most scholars?", "back": "Lecture notes belonging to Aristotle or his students."}, {"front": "In contrast to Plato's drama and wit, what does Aristotle require from the reader?", "back": "Close attention to his argument."}, {"front": "How does the textual density of Aristotle's treatises reflect their original purpose as working documents?", "back": "Every sentence tends to perform philosophical work without ornamental language."}, {"front": "What is the collective name given to Aristotle's six logical treatises?", "back": "The Organon."}, {"front": "What does the Greek word $Organon$ mean?", "back": "Instrument or tool."}, {"front": "Which philosopher is credited with effectively inventing formal logic?", "back": "Aristotle."}, {"front": "How long did Aristotle's approach to logic remain the standard in the Western tradition?", "back": "Until the nineteenth century."}, {"front": "Which specific work in the $Organon$ focuses on the study of syllogisms?", "back": "Prior Analytics."}, {"front": "Which work in the $Organon$ deals with scientific demonstration?", "back": "Posterior Analytics."}, {"front": "List three of Aristotle's works that form the foundation of natural philosophy.", "back": "The Physics, On the Heavens, and On Generation and Corruption."}, {"front": "On what methodology did Aristotle base his biological works, such as the 'History of Animals'?", "back": "Direct observation and dissection."}, {"front": "How many books comprise Aristotle's 'Metaphysics'?", "back": "Fourteen."}, {"front": "What are the four primary subjects explored in the 'Metaphysics'?", "back": "Substance, being, causation, and the nature of reality."}, {"front": "What is the primary focus of the work 'De Anima'?", "back": "What it means to be alive and to perceive, think, and feel."}, {"front": "What is the English translation of the title 'De Anima'?", "back": "On the Soul."}, {"front": "Which two specific ethical treatises are mentioned as part of Aristotle's corpus?", "back": "The Nicomachean Ethics and the Eudemian Ethics."}, {"front": "What is the subject of Aristotle's 'Rhetoric'?", "back": "The analysis of persuasive speech."}, {"front": "What is the subject of Aristotle's 'Poetics'?", "back": "The analysis of tragic drama."}, {"front": "What is considered the primary ethical treatise of the Western philosophical tradition?", "back": "The Nicomachean Ethics."}, {"front": "Who was Nicomachus the elder in relation to Aristotle?", "back": "Aristotle's father, who was a physician."}, {"front": "Who was Nicomachus the younger in relation to Aristotle?", "back": "Aristotle's son."}, {"front": "What is the fundamental question addressed in the 'Nicomachean Ethics'?", "back": "What is the best life for a human being?"}, {"front": "The 'Nicomachean Ethics' systematically explores happiness, virtue, and which other two major topics?", "back": "Friendship and the nature of the contemplative life."}, {"front": "How does the central question of the 'Politics' differ from that of the 'Ethics'?", "back": "It asks how communities should be organized rather than how individuals should live."}, {"front": "Why are the 'Ethics' and the 'Politics' read together in philosophical study?", "back": "Aristotle considers the Politics to be the continuation of the Ethics."}, {"front": "What term does Aristotle use to describe the single inquiry formed by the 'Ethics' and the 'Politics'?", "back": "The philosophy of human affairs."}, {"front": "In Aristotle's teleological method, what is the meaning of the Greek term $telos$?", "back": "End, purpose, or goal."}, {"front": "What is the plural form of the Greek word $telos$?", "back": "Teloi."}, {"front": "How does Aristotle define a natural thing through his teleological method?", "back": "By the state of completion or excellence toward which it naturally tends."}, {"front": "According to Aristotle's teleological view, what is the $telos$ of an acorn?", "back": "The oak tree."}, {"front": "According to Aristotle's teleological view, what is the $telos$ of a knife?", "back": "To cut well."}, {"front": "What constitutes the human $telos$ according to the 'Ethics'?", "back": "Happiness achieved through virtuous activity."}, {"front": "To understand the nature of a thing, what functional question does Aristotle ask?", "back": "What does it do well?"}, {"front": "Beyond animals and crafts, to what social entity does Aristotle apply his teleological inquiry?", "back": "Whole cities."}, {"front": "How does Aristotle's primary interest differ from an ethics based on rule-following?", "back": "He is interested in what excellent human living looks like rather than specific rules."}, {"front": "What is the goal of Aristotle's inquiry in the 'Ethics' and 'Politics'?", "back": "To determine what the human good is and how to produce it."}, {"front": "According to Aristotle, what does it mean for a thing to achieve its $telos$?", "back": "It has reached a state of flourishing or success."}, {"front": "Which logical treatise by Aristotle covers the study of propositions?", "back": "The Categories (or the related works within the Organon)."}, {"front": "The 'Ethics' asks how individuals live; the _____ asks how communities should be organized for people to live well.", "back": "Politics"}, {"front": "What did ancient sources suggest Nicomachus the younger might have done with his father's lectures?", "back": "Edited them after Aristotle's death."}, {"front": "Aristotle's method of understanding objects by what they are 'trying to become' is known as _____.", "back": "Teleology"}, {"front": "What type of documents were Aristotle's surviving treatises originally, before being refined over years of teaching?", "back": "Working documents."}, {"front": "Which specific work analyzes the foundations of tragedy?", "back": "The Poetics."}, {"front": "In the context of Aristotelian biology, what was 'Generation of Animals' based upon?", "back": "Direct observation."}, {"front": "Aristotle's logical treatises were collectively titled the $Organon$ by _____.", "back": "Later editors."}, {"front": "What distinguishes Aristotle's 'Natural Philosophy' from modern 'Natural Science'?", "back": "It provides the philosophical foundations for what we now call science."}, {"front": "What is the central question of the 'Ethics' in relation to human activity?", "back": "What is the human good?"}, {"front": "Aristotle's teleological method asks 'What would it mean for this thing to _____?'", "back": "Flourish"}, {"front": "Which work by Aristotle deals with the transformation and decay of physical matter?", "back": "On Generation and Corruption."}, {"front": "Instead of calculations of utility, Aristotle focuses on the production of _____.", "back": "Excellent human living."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
