    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Man (Aristotle I) &mdash; Chapter 8, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what year did Aristotle die?", "back": "322 BC"}, {"front": "What was the name of the school Aristotle founded in Athens?", "back": "The Lyceum"}, {"front": "What was the primary reason most of Aristotle's works were lost to Western Europe in the fifth and sixth centuries?", "back": "The knowledge of Greek was largely lost following the fragmentation of the Western Roman Empire."}, {"front": "Which Roman statesman and philosopher preserved a handful of Aristotle's logical texts for the Latin West before his execution in 524?", "back": "Boethius"}, {"front": "Name the two logical texts by Aristotle that survived in the Latin West during the early Middle Ages.", "back": "The Categories and On Interpretation"}, {"front": "Through which cultural and intellectual flowering were Aristotle's works preserved and translated into Arabic in the ninth and tenth centuries?", "back": "The Islamic world (specifically the courts of Baghdad and Muslim Spain)"}, {"front": "Who is known as the “Second Teacher” in the Arabic tradition for his synthesis of Aristotle and Plato?", "back": "Al-Farabi"}, {"front": "Concept: The Book of Healing (Kitab al-Shifa)", "back": "Definition: A comprehensive philosophical encyclopedia by Avicenna that drew heavily on Aristotle and Neoplatonism."}, {"front": "Which Andalusian philosopher was known simply as “The Commentator” in the Latin West?", "back": "Averroes (Ibn Rushd)"}, {"front": "The chain of transmission for Aristotle's recovery in Western Europe followed which sequence of languages?", "back": "Greek to Arabic to Latin"}, {"front": "During which century did Latin translations of Aristotle's works begin flooding into Western Europe from Arabic sources?", "back": "The twelfth century"}, {"front": "What Aristotelian doctrine regarding the origin of the universe contradicted the Christian teaching of creation?", "back": "The eternity of the world"}, {"front": "How did Aristotle describe the nature of God, a view that initially troubled Christian theologians?", "back": "As a being who thinks only of himself and is indifferent to the world."}, {"front": "In 1210 and 1215, which institution banned the teaching of Aristotle's natural philosophy?", "back": "The University of Paris"}, {"front": "Who issued the Condemnation of 1277, targeting 219 philosophical propositions?", "back": "Bishop Etienne Tempier of Paris"}, {"front": "What was a major target of the Condemnation of 1277 regarding the relationship between philosophy and theology?", "back": "The autonomy of philosophy from theology"}, {"front": "The Averroist doctrine of the \"unity of the intellect\" was a key target of the _____.", "back": "Condemnation of 1277"}, {"front": "Which religious order did Thomas Aquinas join, despite his noble family's objections?", "back": "The Dominican Order (Order of Preachers)"}, {"front": "Who was the teacher of Thomas Aquinas and one of the first to assert that philosophy and theology cannot genuinely conflict?", "back": "Albert the Great (Albertus Magnus)"}, {"front": "What title was conferred upon Thomas Aquinas in 1567, recognizing his exceptional importance to the Catholic Church?", "back": "Doctor of the Church"}, {"front": "What is the title of Thomas Aquinas’s massive, multi-million-word theological masterwork?", "back": "Summa Theologica"}, {"front": "According to Aquinas, what is the source of knowledge for philosophy?", "back": "The light of natural reason alone"}, {"front": "According to Aquinas, what is the source of knowledge for theology?", "back": "The light of divine revelation"}, {"front": "Why did Aquinas believe that philosophy and theology could not genuinely contradict each other?", "back": "Because both are directed at truth and both find their source in God."}, {"front": "In the Thomistic synthesis, what is the cause of apparent conflicts between faith and reason?", "back": "Bad philosophy or bad theology (poor reasoning)"}, {"front": "The principle $gratia\\ non\\ tollit\\ naturam,\\ sed\\ perficit$ translates to: _____.", "back": "Grace does not destroy nature, but perfects it"}, {"front": "How does Aquinas view the natural virtues described by Aristotle?", "back": "They are genuinely good and achievable by human effort, but incomplete."}, {"front": "In Aquinas's terminology, how is the natural happiness (eudaimonia) described in Aristotle’s Ethics classified?", "back": "Imperfect happiness"}, {"front": "What is required for 'perfect happiness' (the beatific vision) that natural virtue cannot achieve on its own?", "back": "The gift of grace"}, {"front": "Which 1879 papal encyclical established Aquinas's philosophy as the foundation of Catholic education?", "back": "Aeterni Patris"}, {"front": "Which Pope issued the encyclical Aeterni Patris?", "back": "Pope Leo XIII"}, {"front": "What honorific title does Dante Alighieri give Aristotle in the Divine Comedy?", "back": "The master of those who know (il maestro di color che sanno)"}, {"front": "In Dante's Divine Comedy, where does Aristotle reside in the afterlife?", "back": "Limbo"}, {"front": "Why is Aristotle placed in Limbo rather than Paradise in Dante's poem?", "back": "Because natural reason, however magnificent, cannot achieve the beatific vision without grace."}, {"front": "In medieval theology, what is the state of natural happiness without the beatific vision where righteous pagans dwell?", "back": "Limbo"}, {"front": "What is the Latin term for 'disordered desire' that Christian tradition uses to explain why achieving virtue is harder than Aristotle suggested?", "back": "Concupiscentia"}, {"front": "How does the Christian view of human nature 'after the fall' modify Aristotle's optimistic view of reason leading to virtue?", "back": "It claims human nature has been wounded by sin, making the prescriptions of reason harder to practice."}, {"front": "The Dominicans were a mendicant order, meaning they were committed to: _____.", "back": "Living without property"}, {"front": "What is the primary role of Albert the Great in the history of Aristotelianism?", "back": "He was an encyclopedic scholar who first asserted that philosophy and theology cannot genuinely conflict."}, {"front": "Which two major medieval universities were heavily staffed by the Dominican Order?", "back": "Paris and Oxford"}, {"front": "Term: Eudaimonia", "back": "Definition: The natural happiness or life in accordance with virtue described by Aristotle, which Aquinas called 'imperfect happiness.'"}, {"front": "What does the principle 'Grace does not destroy nature, but perfects it' imply about the value of the natural order?", "back": "Nature is genuinely good and is elevated and completed by grace rather than abolished."}, {"front": "When did Thomism become the dominant philosophy of the Dominican Order?", "back": "Within fifty years of Aquinas's death in 1274."}, {"front": "Who predicted that Aquinas's teaching would \"emit such a lowing... that it will resound through the whole world\"?", "back": "Albert the Great"}, {"front": "How did the Arabic commentators contribute to the 'Long Journey' of Aristotle's works?", "back": "They translated, commented upon, and built elaborate philosophical systems based on his texts while they were lost to the Latin West."}, {"front": "Which philosopher's works provided the standard reference for Latin scholastics through line-by-line commentaries?", "back": "Averroes"}, {"front": "What specific area of Aristotle's work did Al-Farabi focus on as a commentator?", "back": "Political philosophy (the Politics)"}, {"front": "In the context of Aquinas, what is the 'Beatific Vision'?", "back": "The perfect happiness of seeing God, which is the ultimate end of human existence."}, {"front": "The _____ of 1277 implicitly targeted some of Thomas Aquinas's own positions, even though he had died three years earlier.", "back": "Condemnation"}, {"front": "Where was Albert the Great from (and associated with in his teaching)?", "back": "Cologne"}, {"front": "What was the initial reaction of European scholars when Aristotle's Physics and Metaphysics arrived in the twelfth century?", "back": "They were stunned by how much richer and more challenging these works were than their previous texts."}, {"front": "What is the 'Angelic Doctor' a specific reference to?", "back": "Thomas Aquinas"}, {"front": "What did Aristotle argue was the basis for achieving all human goods?", "back": "Natural virtues achievable by unaided reason."}, {"front": "According to the text, what is the 'productive tension' that remains between Aristotelianism and Christianity?", "back": "The debate over whether nature is sufficient on its own or if the highest happiness always surpasses natural capabilities."}, {"front": "Albert the Great is recognized as the patron of which group?", "back": "Natural scientists"}, {"front": "In Dante's poem, Limbo is depicted as a _____ castle in the darkness.", "back": "Luminous"}, {"front": "What was the significance of Latin translations being 'translations of translations' in the twelfth century?", "back": "They were converted from Greek to Arabic and then finally to Latin."}, {"front": "Which Arabic philosopher's works on the soul deeply influenced both Islamic and Christian scholasticism?", "back": "Avicenna (Ibn Sina)"}, {"front": "Which title refers to Aquinas as the shared authority of the Church's intellectual life?", "back": "Doctor Communis (Common Doctor)"}, {"front": "How did Aquinas view the relationship between Greek reason and Christian faith?", "back": "As partners that illuminate what the other cannot reach alone, rather than rivals."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
