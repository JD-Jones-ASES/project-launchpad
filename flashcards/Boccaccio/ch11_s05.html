    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 11, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is the narrator of the tale of Messer Torello and Saladin in the Decameron?", "back": "Panfilo, the king of the Tenth Day."}, {"front": "What is the central theme of the stories told on the Tenth Day of the Decameron?", "back": "Magnanimity and virtue."}, {"front": "Which historical Kurdish Muslim sultan is portrayed as a figure of legendary chivalry in the tale?", "back": "Saladin (Salah ad-Din)."}, {"front": "What literary archetype does Saladin represent in Western medieval literature?", "back": "The noble pagan."}, {"front": "In what northern Italian city does the first movement of the tale take place?", "back": "Pavia."}, {"front": "What is the primary motivation for Saladin's journey through Christendom in disguise?", "back": "To observe the preparations made by Christian potentates for the Crusade."}, {"front": "What disguise do Saladin and his lords adopt while traveling through Lombardy?", "back": "The guise of merchants."}, {"front": "How does Messer Torello initially prevent the strangers from staying at a public inn?", "back": "He uses a ruse to guide them to his own estate instead of to the city."}, {"front": "What language do Saladin and his companions use to communicate with Messer Torello?", "back": "Latin."}, {"front": "Concept: Cortesia", "back": "Definition: The refined and generous behavior expected of the noble classes, crossing cultural and religious boundaries."}, {"front": "To what city do Saladin and his lords claim they are traveling from Cyprus?", "back": "Paris."}, {"front": "How does Torello's wife, Adalieta, show honor to the 'merchants' during their stay in Pavia?", "back": "She hosts a magnificent banquet and presents them with costly robes and vests."}, {"front": "What specific gifts does Adalieta give to the strangers to ensure they are 'neat and trim'?", "back": "Two pairs of robes lined with silk and vair, taffeta vests, and linen clothes."}, {"front": "What observation does Saladin make about the Christian kings after experiencing Torello's hospitality?", "back": "He doubts the Soldan of Babylon could withstand them if they are as knightly as Torello."}, {"front": "Messer Torello's hospitality is described as being 'without calculation,' meaning it is performed for what reason?", "back": "Because courtesy demands it, regardless of the guest's identity."}, {"front": "What does Torello request of his wife before departing for the Holy Land?", "back": "That she wait a year, a month, and a day before remarrying if he does not return."}, {"front": "What token does Adalieta give Torello as a parting gift?", "back": "A ring from her finger."}, {"front": "Where is Torello captured during the Crusades?", "back": "Acre."}, {"front": "To which city is Torello brought and imprisoned after his capture?", "back": "Alexandria."}, {"front": "What skill allows Torello to gain Saladin's notice while in captivity?", "back": "Training hawks (falconry)."}, {"front": "By what generic name does Saladin call Torello before recognizing him?", "back": "Christian."}, {"front": "What physical feature first alerts Saladin to Torello's true identity?", "back": "The specific fashion of Torello's mouth when he smiles."}, {"front": "How does Saladin confirm that his falconer is the same man who hosted him in Pavia?", "back": "He shows Torello the robes given to him by Torello's wife."}, {"front": "Why do the people of Pavia believe Messer Torello d'Istria is dead?", "back": "They confuse him with an obscure knight named Messer Torello de Dignes who died at the front."}, {"front": "What news regarding the Genoese ambassadors causes Torello to fall into a life-threatening despair?", "back": "The report that their galley was lost at sea, meaning his letter never reached home."}, {"front": "What supernatural element does Boccaccio borrow from the romance tradition to return Torello home?", "back": "Magical transport on a flying bed."}, {"front": "Who performs the magic that transports Torello from Alexandria to Pavia?", "back": "One of Saladin's necromancers."}, {"front": "What valuable gem is set in the ring Saladin places on Torello's finger before his departure?", "back": "A carbuncle."}, {"front": "In which specific church in Pavia is the sleeping Torello deposited?", "back": "San Piero in Ciel d'Oro."}, {"front": "Who is the first person to discover Torello upon his arrival in the church?", "back": "The sacristan."}, {"front": "What is the identity of the Abbot of San Pietro in Ciel d'Oro?", "back": "He is Messer Torello's uncle."}, {"front": "Under what guise does Torello attend his wife's new wedding feast?", "back": "As a Saracen ambassador sent by the Soldan."}, {"front": "How does Torello use a cup of wine to reveal his identity to Adalieta?", "back": "He drops the ring she gave him into the cup before she drinks the remains."}, {"front": "What is Adalieta's reaction upon recognizing the ring in the wine cup?", "back": "She oversets the table and flings herself upon Torello in an embrace."}, {"front": "How does the second husband react to Torello's return?", "back": "He responds in a frank and friendly manner, acknowledging Torello's right to his own wife."}, {"front": "What moral does the tale suggest about the nature of religious and cultural differences?", "back": "That virtue and courtesy transcend religion, and a Muslim can be the moral equal of a Christian."}, {"front": "What does the text identify as a failure of courtesy in modern times?", "back": "Performing offices of courtesy with an 'ill grace' that effectively sells the service."}, {"front": "Term: Christendom", "back": "Definition: The collective community of Christian peoples and nations in medieval Europe."}, {"front": "Term: Importune", "back": "Definition: To press or urge with persistent requests or urgent entreaties."}, {"front": "What earlier tale in the Decameron is echoed by Saladin's appearance in this story?", "back": "Tale I, 3 (The Three Rings)."}, {"front": "Which Holy Roman Emperor is mentioned as reigning during the time of the Crusade in the story?", "back": "Frederic I."}, {"front": "How many servants accompanied Saladin on his secret journey?", "back": "Three."}, {"front": "What was the occupation of the strangers according to the cover story they gave Torello?", "back": "Cypriote merchants."}, {"front": "At what time of day did Torello and the strangers arrive at the city of Pavia?", "back": "About tierce."}, {"front": "What does Saladin promise to eventually show Torello as a confirmation of their status as merchants?", "back": "Their merchandise."}, {"front": "Where did Torello embark on a galley for the Crusade?", "back": "Genoa."}, {"front": "Why did Torello's wife initially refuse to remarry despite the reports of his death?", "back": "Because of her deep grief and her promise to remain faithful."}, {"front": "What was the purpose of the crown Saladin placed on the magical bed?", "back": "It was a gift sent specifically for Messer Torello's wife."}, {"front": "What currency filled the two vast gold basins placed on Torello's bed?", "back": "Pistoles."}, {"front": "How did the Abbot explain Torello's presence to the wedding guests before the recognition?", "back": "He claimed Torello was a Saracen ambassador sent to the King of France."}, {"front": "What does Torello do with the rare jewels he brought back from the East?", "back": "He gives parts of them to the man who paid for the wedding, the abbot, and others."}, {"front": "According to the story, what is the 'reward' of cheerful and ready courtesies?", "back": "Eventual return of generosity and restoration of happiness."}, {"front": "Why did Torello choose to stay quiet when he first woke up in the church?", "back": "He realized the monks were terrified of him and wanted to call the abbot by name."}, {"front": "In Boccaccio's time, Pavia was one of the great cities of which domain?", "back": "The Visconti domains."}, {"front": "What was the 'viaticum' provided by the physician before Torello was put to sleep?", "back": "Provisions for his journey."}, {"front": "What was the specific duration of the deadline Torello set for his return?", "back": "A year, a month, and a day."}, {"front": "Why was Torello unable to escape Alexandria on his own?", "back": "His many attempts were unsuccessful."}, {"front": "What did Saladin entreat Torello to do before their final parting in Egypt?", "back": "To visit him again once his affairs in Lombardy were settled."}, {"front": "What did the monks think when they saw Torello sitting up on his bed in the church?", "back": "They were terrified and believed it was a supernatural occurrence."}, {"front": "How does Torello's wife's behavior at the wedding feast indicate her feelings about the marriage?", "back": "Her face showed that she was chagrined by the nuptials."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
