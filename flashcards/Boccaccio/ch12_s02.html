    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);

        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);

        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 12, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "Which 1903 translation of the Decameron is currently in the public domain?", "back": "The translation by J.M. Rigg."}, {"front": "What edition of the Decameron is noted for being fluent, accurate, and richly annotated?", "back": "The G.H. McWilliam translation (Penguin Classics, 1995)."}, {"front": "The 2013 translation of the Decameron featuring helpful introductions and notes was produced by _____.", "back": "Wayne A. Rebhorn"}, {"front": "Term: Trattatello in laude di Dante", "back": "Definition: Boccaccio's biography of Dante Alighieri, also known as The Life of Dante."}, {"front": "Which Boccaccio work provides a window into the literary culture of fourteenth-century Italy through a poet's biography?", "back": "The Life of Dante (Trattatello in laude di Dante)."}, {"front": "What is the subject of Boccaccio's De casibus virorum illustrium (The Fates of Illustrious Men)?", "back": "Biographical sketches tracing the falls of great men and women from Adam to Boccaccio's time."}, {"front": "Which work by Boccaccio was a primary influence on Chaucer's Monk's Tale?", "back": "The Fates of Illustrious Men (De casibus virorum illustrium)."}, {"front": "Term: De mulieribus claris", "back": "Definition: Boccaccio's On Famous Women, the first Western collection of biographies devoted exclusively to women."}, {"front": "What historical range of figures does Boccaccio cover in On Famous Women?", "back": "From Eve to Queen Joanna of Naples."}, {"front": "Boccaccio's massive encyclopedia of classical mythology is titled _____.", "back": "The Genealogy of the Pagan Gods (Genealogia deorum gentilium)"}, {"front": "Where in the Genealogia deorum gentilium does Boccaccio defend poetry and fiction?", "back": "In its final books."}, {"front": "Which English work is considered the \"English companion\" to the Decameron?", "back": "The Canterbury Tales by Geoffrey Chaucer."}, {"front": "How does Chaucer's General Prologue gallery of pilgrims differ from Boccaccio's brigata?", "back": "It is far more socially diverse."}, {"front": "Which of Chaucer's tales is a retelling of the story of Patient Griselda?", "back": "The Clerk's Tale."}, {"front": "What specific addition to Chaucer's Clerk's Tale complicates Boccaccio's original story of Griselda?", "back": "An ironic envoy."}, {"front": "Chaucer's Franklin's Tale is a retelling of which story from the Decameron?", "back": "The tale of competing generosities (X, 5)."}, {"front": "Which Chaucerian prologue and tale explore religious hypocrisy similarly to Boccaccio's Ser Ciappelletto?", "back": "The Pardoner's Prologue and Tale."}, {"front": "How do Boccaccio and Dante differ in their treatment of love and free will?", "back": "Dante applies theological seriousness, while Boccaccio deliberately avoids it."}, {"front": "Which specific Cantos of Dante's Inferno are most relevant to themes in the Decameron?", "back": "Canto V (Paolo and Francesca) and Canto X (the Epicurean heretics)."}, {"front": "Petrarch's sonnets to Laura represent an idealized lyric tradition, whereas Boccaccio's prose focuses on _____.", "back": "Messy, real love in earthy prose"}, {"front": "Who authored the narrative history A Distant Mirror: The Calamitous 14th Century?", "back": "Barbara W. Tuchman."}, {"front": "What major 14th-century events are covered in Tuchman's A Distant Mirror?", "back": "The Black Death, the Hundred Years' War, the Great Schism, and the collapse of feudalism."}, {"front": "Which historical work provides a concise introduction to Italian life from 1216 to 1380?", "back": "Italy in the Age of Dante and Petrarch by John Larner."}, {"front": "Gene Brucker's Florence: The Golden Age covers the history of the city during which time span?", "back": "From 1138 to 1737."}, {"front": "According to Gene Brucker, what type of society does the Decameron vividly portray?", "back": "A mercantile society."}, {"front": "John Kelly's book The Great Mortality focuses on which specific period of the plague pandemic?", "back": "The years 1347–1351."}, {"front": "Which scholar interprets the Decameron as a \"ludic\" masterpiece focused on the relationship between fiction and play?", "back": "Giuseppe Mazzotta."}, {"front": "What is the primary theme of Millicent Marcus's study An Allegory of Form?", "back": "Literary self-consciousness in the Decameron."}, {"front": "Which tale from the Decameron serves as a primary example of storytelling self-consciousness in Marcus's scholarship?", "back": "The tale of Madonna Oretta (VI, 1)."}, {"front": "In Boccaccio's Two Venuses, Robert Hollander explores the tension between which two types of love?", "back": "Sacred and profane love."}, {"front": "What does Robert Hollander argue exists beneath the comic surface of Boccaccio's works?", "back": "A moral seriousness."}, {"front": "The 2013 scholarly guide edited by Kirkham, Sherberg, and Smarr is unique for covering _____.", "back": "All of Boccaccio's writings (his complete works)"}, {"front": "Where can a researcher find Jonathan Usher's authoritative overview of Boccaccio’s life and critical reception?", "back": "The Oxford Companion to Italian Literature (2002)."}, {"front": "How many tales comprise the complete Decameron?", "back": "One hundred tales."}, {"front": "Concept: The Ludic Masterpiece", "back": "Definition: Giuseppe Mazzotta's reading of the Decameron as a meditation on the interplay between fiction, play, and the social order."}, {"front": "What geographical locations serve as the primary settings for Boccaccio's one hundred tales?", "back": "The gardens of Fiesole and the streets of Florence."}, {"front": "Which author is described as Boccaccio's \"great predecessor\" who treated love with theological seriousness?", "back": "Dante Alighieri."}, {"front": "What was the title of Boccaccio's biography of Dante?", "back": "Trattatello in laude di Dante (The Life of Dante)."}, {"front": "Boccaccio's work On Famous Women includes biographies ranging from Eve to which contemporary Neapolitan ruler?", "back": "Queen Joanna of Naples."}, {"front": "Which historical text focuses on the social and psychological effects of the plague pandemic of 1347–1351?", "back": "The Great Mortality by John Kelly."}, {"front": "What is the English title of Boccaccio's De casibus virorum illustrium?", "back": "The Fates of Illustrious Men."}, {"front": "Petrarch's lyric tradition, which Boccaccio departed from, is primarily found in his collection titled _____.", "back": "Canzoniere"}, {"front": "What is the primary focus of the scholarly work An Allegory of Form (1979)?", "back": "How the Decameron reflects on its own nature as a work of fiction."}, {"front": "Which historical work by Gene Brucker illuminates the mercantile society portrayed in the Decameron?", "back": "Florence: The Golden Age, 1138–1737."}, {"front": "Which Boccaccio work includes an important defense of fiction in its concluding sections?", "back": "The Genealogy of the Pagan Gods (Genealogia deorum gentilium)."}, {"front": "According to the guide, which Decameron translation is widely regarded as the best English version for its annotations and fluency?", "back": "The G.H. McWilliam translation."}, {"front": "Which work by Boccaccio is cited as the first Western biographical collection devoted exclusively to women?", "back": "On Famous Women (De mulieribus claris)."}, {"front": "In the context of comparative reading, which Chaucer tale mirrors Decameron X, 5 regarding \"competing generosities\"?", "back": "The Franklin's Tale."}, {"front": "Who wrote The World at Play in Boccaccio's Decameron (1986)?", "back": "Giuseppe Mazzotta."}, {"front": "In Chaucer's General Prologue, the group of pilgrims is comparable to Boccaccio's _____.", "back": "brigata"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
