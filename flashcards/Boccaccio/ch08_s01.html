    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 8, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">

    <script>
    var CARDS = [{"front": "What Italian term refers to the elaborate tricks, deceptions, or practical jokes that serve as the organizing principle of the Day VII tales?", "back": "Beffa"}, {"front": "In the context of a beffa, what quality does Boccaccio use to describe the intelligence and resourcefulness of a trickster?", "back": "Ingegno"}, {"front": "According to Boccaccio, what are the two great engines of comedy in the Decameron?", "back": "The beffa and the motto."}, {"front": "What term is used to identify the dupe who is deceived in a beffa?", "back": "Beffato"}, {"front": "What term is used to identify the trickster who exploits a dupe's weakness in a beffa?", "back": "Beffatore"}, {"front": "Which gendered pattern is predominantly observed among the tricksters and dupes of Day VII?", "back": "The tricksters are almost always wives, and the dupes are almost always husbands."}, {"front": "Which short, humorous verse tales from 12th and 13th-century France served as the most important literary antecedent for the beffa?", "back": "The French fabliaux."}, {"front": "What 12th-century French literary cycle celebrates the triumph of cunning over strength and influenced the beffa tradition?", "back": "The Roman de Renart (the Reynard cycle)."}, {"front": "What psychological depth does Boccaccio add to the tradition of clever wives outwitting their husbands?", "back": "He provides his characters with clear motivations, such as desire, economic necessity, or pride."}, {"front": "Why do the husbands in Day VII typically fall for their wives' tricks despite the tricks being elaborate?", "back": "They want to trust their wives and preserve the appearance of domestic order."}, {"front": "What was the primary function of marriage in 14th-century Florence?", "back": "It was a social and economic arrangement negotiated between families."}, {"front": "What financial element was central to marriage negotiations among the merchant and noble classes in Boccaccio's time?", "back": "The dowry."}, {"front": "In 14th-century Florentine society, whose interests were secondary to those of lineage and property in marriage arrangements?", "back": "The personal desires of the bride and groom."}, {"front": "What was the official Church teaching regarding the nature of marriage?", "back": "Marriage was a sacrament, and marital fidelity was a sacred obligation."}, {"front": "How did Boccaccio’s literary treatment of adultery differ from Dante’s approach in the Inferno?", "back": "Boccaccio treated adultery as a social fact to be understood rather than a sin to be punished."}, {"front": "What is the primary source of comedy in the best Day VII tales according to the commentary?", "back": "The pleasure of watching intelligence triumph over circumstances."}, {"front": "In Novel VII.1, what character trait of the husband Gianni Lotteringhi does his wife exploit?", "back": "His simple-minded religious gullibility."}, {"front": "What specific method does the wife in Novel VII.1 use to keep her husband occupied while she entertains her lover?", "back": "An elaborate system of signals and a ghost story."}, {"front": "What was a 'confraternita' in Boccaccio’s Florence?", "back": "A lay religious society dedicated to prayer, charity, and penitence."}, {"front": "In Novel VII.3, how does Fra Rinaldo justify his presence in the wife's room to her husband?", "back": "He claims to be performing a religious cure on their sick child."}, {"front": "What literary theme is emphasized by the figure of the lover-friar in Novel VII.3?", "back": "Anticlerical satire."}, {"front": "In Novel VII.4, how does Monna Ghita trick Tofano into leaving the house after he locks her out?", "back": "She pretends to throw herself down a well by dropping a large stone into it."}, {"front": "What is the ultimate fate of Tofano after he is locked out of his own house by his wife?", "back": "He is shamed before his neighbors as a drunkard."}, {"front": "What disguise does the jealous husband adopt in Novel VII.5 to discover his wife's infidelity?", "back": "A priest."}, {"front": "In Novel VII.5, how does the wife manage to entertain her lover while her husband is guarding the house?", "back": "She invents a fake lover for him to guard at one door while the real lover enters through another."}, {"front": "Where does Madonna Isabella hide one of her admirers when her husband arrives unexpectedly in Novel VII.6?", "back": "Under a chicken coop."}, {"front": "In Novel VII.7, how does Lodovico gain access to Madonna Beatrice's household?", "back": "He disguises himself as a servant."}, {"front": "Which previous Decameron tale shares the motif of a man using a disguise to gain access to a woman with Novel VII.7?", "back": "The story of Masetto da Lamporecchio (III.1)."}, {"front": "What physical device does the jealous merchant in Novel VII.8 use to monitor his wife's movements at night?", "back": "A string tied to her toe."}, {"front": "How does the wife in Novel VII.8 circumvent her husband's string-tracking device?", "back": "She detaches the string and ties it to a maid."}, {"front": "In Novel VII.10, what agreement do Tingoccio and Meuccio make before Tingoccio's death?", "back": "Whoever dies first must return to tell the other about the afterlife."}, {"front": "What is the meaning of the term 'comare' in the context of Novel VII.10?", "back": "A godmother of one's child."}, {"front": "What comic report does Tingoccio bring back from the afterlife in Novel VII.10?", "back": "That adultery with a comare carries no punishment in the afterlife."}, {"front": "Which of Chaucer’s Canterbury Tales is described as the closest English equivalent to the spirit of Day VII?", "back": "The Miller's Tale."}, {"front": "How does the role of the narrator differ between Boccaccio’s Decameron and Chaucer’s Canterbury Tales?", "back": "Chaucer’s narrators have specific personalities that shape the tales, whereas Boccaccio’s narrators are interchangeable."}, {"front": "In Novel VII.2, Peronella's success is cited as a demonstration of the power of _____.", "back": "Rhetoric."}, {"front": "In Novel VII.9, what does Nicostrato's reaction to Lydia’s tests demonstrate about human psychology?", "back": "The human capacity for self-deception."}, {"front": "What is the structural commonality between the tests Lydia performs in Novel VII.9?", "back": "They are organized in an escalating structure of outrageousness."}, {"front": "In Day VII, Boccaccio portrays the cleverness of wives as a reaction to what societal factor?", "back": "Being trapped in marital arrangements that do not serve their needs."}, {"front": "What was the legal requirement for marriage under Canon law, despite frequent family pressure to the contrary?", "back": "The free consent of both parties."}, {"front": "The beffa is described as a test of _____.", "back": "Ingegno."}, {"front": "What are the two essential elements required for a beffa to take place?", "back": "A dupe (beffato) and a trickster (beffatore)."}, {"front": "Boccaccio's refusal to moralize about adultery in Day VII suggests he views it as a _____ to be understood.", "back": "Social fact."}, {"front": "How does the husband in Novel VII.1 unwittingly assist in his own deception?", "back": "His devotion to religious rituals and superstitions provides the cover for his wife's lover."}, {"front": "What makes the 'beffa' in Novel VII.5 a 'double-bluff'?", "back": "The wife recognizes the husband's disguise and feeds him a false story that targets his own jealousy."}, {"front": "What is the specific tool the wives of Day VII use to navigate their social constraints?", "back": "Their wits."}, {"front": "According to the commentary, why did families negotiate marriages in 14th-century Florence?", "back": "To serve the interests of lineage, property, and social alliance."}, {"front": "The comedy of the 'cuckolded husband' in Boccaccio's work is rooted in which medieval literary tradition?", "back": "The French fabliaux."}, {"front": "In Novel VII.4, what does the wife use to rouse the neighbors against her husband?", "back": "The accusation that he is a drunkard who locked her out."}, {"front": "What is the significance of the husband's 'spiritual' gratitude in Novel VII.3?", "back": "It highlights the success of using religious piety as a tool of deception."}, {"front": "In Boccaccio's view, a successful beffatore must possess psychological insight and _____.", "back": "Verbal skill."}, {"front": "Which Day of the Decameron is the first to use the beffa as the organizing principle for the entire sequence of tales?", "back": "Day VII."}, {"front": "What does Tingoccio’s report in VII.10 cheerfuly undermine?", "back": "The Church's teaching on spiritual incest and the afterlife."}, {"front": "What was the secondary engine of comedy in the Decameron, alongside the beffa?", "back": "The motto (witty remark)."}, {"front": "In 14th-century Florence, what was the status of a bride’s wishes during marriage negotiations?", "back": "They were rarely consulted."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
