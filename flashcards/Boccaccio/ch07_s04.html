<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 7, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "In the context of the Decameron, what does the title 'Fra' signify?", "back": "An abbreviation for frate, used for members of mendicant religious orders."}, {"front": "What is the English translation of the name 'Fra Cipolla'?", "back": "Brother Onion."}, {"front": "In which small Tuscan town does Fra Cipolla set his annual collection of donations?", "back": "Certaldo."}, {"front": "Why is the setting of Certaldo considered a form of self-mockery by Boccaccio?", "back": "It was Boccaccio's own birthplace or ancestral home."}, {"front": "What sacred relic does Fra Cipolla promise to show the townspeople of Certaldo?", "back": "A feather from the wing of the Angel Gabriel."}, {"front": "Which character in Chaucer’s 'Canterbury Tales' is often compared to Fra Cipolla due to their trade in fake relics?", "back": "The Pardoner."}, {"front": "Who are the two 'wily young wags' that plot to prank Fra Cipolla?", "back": "Giovanni del Bragoniera and Biagio Pizzini."}, {"front": "What physical object do the pranksters use to replace the supposed Angel Gabriel feather?", "back": "Lumps of charcoal."}, {"front": "How is Fra Cipolla’s rhetorical skill described in comparison to famous Roman orators?", "back": "He is so excellent a speaker he could be mistaken for Tully (Cicero) or Quintilian."}, {"front": "What is the name of Fra Cipolla's famously negligent and 'rascallion' servant?", "back": "Guccio."}, {"front": "What three derogatory nicknames are commonly applied to the servant Guccio?", "back": "Balena (Whale), Imbratta (Filth), and Porco (Hog)."}, {"front": "How many specific negative qualities does Fra Cipolla claim his servant Guccio possesses?", "back": "Nine."}, {"front": "While the pranksters are stealing the feather, what is Guccio doing in the host's kitchen?", "back": "Flirting with a maid named Nuta."}, {"front": "What physical object did Fra Cipolla actually have in his casket that he intended to pass off as an angel's feather?", "back": "A tail-feather of a parrot."}, {"front": "Why were the people of Certaldo unlikely to recognize a parrot feather for what it was?", "back": "They were unfamiliar with parrots and the 'luxuries of Egypt' at that time."}, {"front": "Upon finding coals in his casket, how does Fra Cipolla’s outward demeanor change?", "back": "He does not change color and maintains complete confidence."}, {"front": "In his improvised travelogue, what does Fra Cipolla claim is the 'Privileges of Porcellana'?", "back": "Documents that cost nothing to seal but are highly useful."}, {"front": "Which Italian city does Cipolla claim as the starting point of his nonsensical journey to the East?", "back": "Venice."}, {"front": "In the nonsense geography of Cipolla, what is the 'land of Menzogna'?", "back": "The Land of Lies."}, {"front": "Where does Cipolla claim to have seen 'pruning-hooks fly'?", "back": "India Pastinaca."}, {"front": "Who is the merchant Cipolla mentions meeting in India to add a false sense of credibility to his story?", "back": "Maso del Saggio."}, {"front": "What is the name of the fictional Patriarch of Jerusalem Cipolla claims to have visited?", "back": "Nonmiblasmetesevoipiace (meaning 'Do not blame me if you please')."}, {"front": "Among the absurd relics Cipolla mentions, what did he claim was 'the finger of the Holy Spirit'?", "back": "A relic he claims was shown to him by the Patriarch, described as 'whole and entire'."}, {"front": "What absurd auditory relic does Cipolla claim to have received from the Patriarch?", "back": "A bit of the sound of the bells of Solomon's temple."}, {"front": "How does Cipolla explain the presence of the charcoal to his audience?", "back": "He claims he mistook the casket of the feather for the casket containing the coals used to roast St. Lawrence."}, {"front": "According to Cipolla's improvisation, why did God guide his hand to the charcoal instead of the feather?", "back": "Because the feast of St. Lawrence was approaching in two days."}, {"front": "What miraculous benefit does Cipolla claim for the charcoal of St. Lawrence?", "back": "Anyone marked with a cross by it will be secure from fire for the rest of the year."}, {"front": "What was the financial result of Fra Cipolla’s improvised speech about the charcoal?", "back": "He collected more offerings from the townspeople than ever before."}, {"front": "How do the two pranksters react after hearing Cipolla’s improvised sermon?", "back": "They laugh excessively and later return the original feather to him."}, {"front": "Who is the storyteller of the tale of Fra Cipolla and the tenth king/queen of Day VI?", "back": "Dioneo."}, {"front": "What theme does Dioneo establish for the stories to be told on Day VII?", "back": "Tricks that ladies have played on their husbands for love or deliverance from peril."}, {"front": "What justification does Dioneo give for choosing a potentially 'unseemly' theme for Day VII?", "back": "The social order has collapsed due to the plague, allowing more license in speech for the sake of solace."}, {"front": "What is the name of the secluded, circular valley the ladies visit at the end of Day VI?", "back": "The Vale of Ladies."}, {"front": "How many hills surround the Vale of Ladies?", "back": "Six."}, {"front": "What unique physical feature describes the center of the Vale of Ladies?", "back": "A small, circular lake with a clear gravel bottom and many fish."}, {"front": "What activity do the seven ladies perform in the lake of the Vale of Ladies?", "back": "They bathe and catch fish."}, {"front": "Who sings the final piteous song at the conclusion of Day VI?", "back": "Elisa."}, {"front": "What instrument does Tindaro play to accompany the group's dancing at the end of the day?", "back": "A cornemuse (bagpipe)."}, {"front": "In the nonsense geography, which place is described as where 'all the waters run downwards'?", "back": "The mountains of the Bachi."}, {"front": "What does the term 'lief' mean in the context of Dioneo's command to Elisa to sing?", "back": "Gladly or willingly."}, {"front": "What is the meaning of the name 'Imbratta' as applied to Guccio?", "back": "Filth."}, {"front": "What is the meaning of the name 'Balena' as applied to Guccio?", "back": "Whale."}, {"front": "What does 'Truffia' and 'Buffia' signify in Fra Cipolla's travelogue?", "back": "Lands of drollery, deceit, and trickery."}, {"front": "What is the 'Caldron of Altopascio' mentioned in the", "back": "An abbey famous for its large quantities of broth given to the poor."}, {"front": "How does Boccaccio describe the bottom of the lake in the Vale of Ladies?", "back": "It was made of the finest gravel and was so clear that the stones could be counted."}, {"front": "Why does Dioneo claim the right to speak last and choose his own subjects?", "back": "It is his established privilege throughout the Decameron."}, {"front": "In the nonsense geography, where is 'Baldacca' actually located in reality?", "back": "It was a famous tavern in Florence."}, {"front": "What is the 'vulgar' term Cipolla uses to describe the 'acclivities of Monte Morello'?", "back": "Pagine (pages), using a pun on 'piagge' (slopes)."}, {"front": "Who was the painter mentioned whose work could not compare to the 'rascallion' nature of Guccio?", "back": "Lippo Topo."}, {"front": "In Cipolla's speech, what was the 'Verbum Caro hie thee to the casement' a pun on?", "back": "The Latin 'Verbum Caro factum est' (The Word was made flesh)."}, {"front": "What was the 'land of Abruzzi' noted for in Cipolla's absurd travelogue?", "back": "Men and women who go in pattens on the mountains and clothe hogs with their own entrails."}, {"front": "According to the story, what has happened to the 'luxuries of Egypt' in Italy since the time of the tale?", "back": "They have been brought over in 'prodigious abundance' to the 'grave hurt' of Italy."}, {"front": "What physical appearance is attributed to Fra Cipolla?", "back": "Little of person, red-haired, and jolly-visaged."}, {"front": "What did the two pranksters replace the feather with once they entered the friar's room?", "back": "Pieces of coal found in a corner of the room."}, {"front": "What was the name of the 'coarse fat woman' Guccio was flirting with in the kitchen?", "back": "Nuta."}, {"front": "How does Dioneo refer to himself when taking the crown from Pampinea?", "back": "He compares himself to the kings in chess."}, {"front": "What does the 'geography of nonsense' in Fra Cipolla's speech primarily satirize?", "back": "The gullibility of rural people and the fraudulent nature of religious relic trade."}, {"front": "In the song by Elisa, what is the central theme of her lament?", "back": "Being a captive of Love and suffering under a harsh lord who does not pity her pain."}, {"front": "Which character serves as the 'seneschal' for the group in the Decameron?", "back": "The official responsible for organizing their domestic arrangements and siestas."}, {"front": "What is the 'India Pastinaca' a reference to in Boccaccio's humor?", "back": "A type of shapeless fish used as a symbol for something outlandish or nonsensical."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
