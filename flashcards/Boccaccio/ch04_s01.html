<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What Italian term refers to the intelligence, wit, and resourcefulness celebrated in Day III of the Decameron?", "back": "Ingegno"}, {"front": "In the structural progression of the Decameron, Day II focuses on the power of Fortune, while Day III focuses on _____.", "back": "Cleverness (or Ingegno)"}, {"front": "Why is the virtue of ingegno considered a \"Florentine\" value in the context of the 14th century?", "back": "It reflects a commercial city where wit and enterprise were more important than noble blood."}, {"front": "According to the text, what quality does Boccaccio value most consistently throughout the hundred tales?", "back": "Ingegno (intelligence and resourcefulness)"}, {"front": "How do the characters of Day III differ from those in Day II regarding their reaction to circumstances?", "back": "Instead of waiting for circumstances to change, they change circumstances through the power of their minds."}, {"front": "In the world of the Decameron, ingegno is valued above birth, wealth, physical strength, and _____.", "back": "Moral virtue"}, {"front": "How did medieval literary convention typically portray the role of women?", "back": "Women were usually passive roles, such as prizes to be won, damsels to be rescued, or temptresses."}, {"front": "Which female protagonist in Day III is cited as the most developed example of female agency?", "back": "Gillette of Narbonne"}, {"front": "What is unique about the way Gillette of Narbonne achieves her victory within the medieval social hierarchy?", "back": "She succeeds by understanding and using the rules of the system rather than rebelling against them."}, {"front": "The deceptive device by which Gillette consummates her marriage to Beltramo is known as the \"_____ trick.\"", "back": "Bed"}, {"front": "Which character from Chaucer’s Canterbury Tales is compared to Gillette of Narbonne for her persistence and intelligence?", "back": "The Wife of Bath"}, {"front": "How does the Wife of Bath's subversion of patriarchal authority differ from Gillette's?", "back": "The Wife of Bath is louder and more openly subversive, while Gillette is quieter and more indirect."}, {"front": "What is the primary satirical target of Novel III.1 (Masetto and the nuns)?", "back": "Institutional hypocrisy regarding vows of chastity."}, {"front": "In Novel III.2, how does the clever groom manage to visit the King’s wife without being caught immediately?", "back": "He disguises himself as King Agilulf and visits her at night."}, {"front": "In Novel III.3, a married woman uses a _____ as an unwitting go-between to communicate with her lover.", "back": "Naive friar"}, {"front": "How does the monk in Novel III.4 keep Fra Puccio distracted while he visits the man's wife?", "back": "He persuades him to perform a penance that requires standing motionless in his garden all night."}, {"front": "In Novel III.5, Zima seduces a woman using _____ as his primary instrument of ingegno.", "back": "Rhetoric (or persuasive speech)"}, {"front": "Novel III.6 involving Ricciardo and Catella is noted for raising \"uncomfortable questions\" about what two topics?", "back": "Deception and consent."}, {"front": "In Novel III.7, why does Tedaldo return to Florence disguised as a friar?", "back": "To reclaim his lover Ermellina and save an innocent man from execution."}, {"front": "How does the abbot in Novel III.8 convince Ferondo that he is in Purgatory?", "back": "He drugs him into a death-like sleep and imprisons him in a dark cell."}, {"front": "What is the famous sexual metaphor used in Boccaccio’s most bawdy tale, Novel III.10?", "back": "Putting the Devil in Hell."}, {"front": "In the summary of Novel III.10, who is the young woman seeking religious instruction?", "back": "Alibech"}, {"front": "What is the central ethical challenge students face when studying the characters of Day III?", "back": "The tension between their cleverness and their morality."}, {"front": "In the context of the Decameron, what is a \"beffa\"?", "back": "A prank or a trick."}, {"front": "Does Boccaccio suggest that ingegno is always an unqualified good?", "back": "No, he presents it as morally complex and leaves the judgment to the reader."}, {"front": "In Novel III.1, Masetto's ingenuity is portrayed as harmless because it gives the nuns what they _____.", "back": "Secretly want"}, {"front": "What does the text suggest is the goal of Boccaccio's anticlerical satire in the story of Masetto?", "back": "To target the suppression of natural desire by institutional vows."}, {"front": "Under what condition does Zima obtain permission to speak to Francesco Vergellesi’s wife in III.5?", "back": "That she must remain silent during the conversation."}, {"front": "In Novel III.8, the abbot's trick is described as blurring the line between a comedy and _____.", "back": "Genuine cruelty"}, {"front": "Term: Ingegno", "back": "Definition: The faculty of intelligence and quick wit that allows characters to overcome obstacles and achieve desires."}, {"front": "What is the outcome for Ferondo after he is \"resurrected\" from his fake Purgatory in III.8?", "back": "He becomes a changed man."}, {"front": "In Novel III.2, what specific social barrier does the groom's ingegno allow him to cross?", "back": "The enormous social divide between a servant and a queen."}, {"front": "Which figure does Gillette of Narbonne enlist to help her secure her marriage to Beltramo?", "back": "The King"}, {"front": "In Novel III.3, the lady tricks the friar into believing he is helping her resist temptation, when he is actually helping her _____.", "back": "Facilitate an affair"}, {"front": "What theological doctrine does Boccaccio use as a comedic device in the story of Ferondo?", "back": "Purgatory"}, {"front": "Why might modern readers find the ending of Gillette’s story in III.9 ambiguous?", "back": "It is unclear if Beltramo's acceptance is genuine or simply a result of being outmaneuvered."}, {"front": "According to the \"Think Deeper\" section, what is the moral difference between Masetto and Gillette’s use of ingegno?", "back": "Masetto uses it for personal pleasure, while Gillette uses it to claim a husband who rejected her."}, {"front": "Novel III.7 is noted for being one of the longest tales of Day III, combining adventure, romantic comedy, and _____.", "back": "Theological debate"}, {"front": "What instrument of ingegno is central to the \"sophisticated\" bed-trick tale of Ricciardo and Catella in III.6?", "back": "Deception (making Catella believe her husband is unfaithful)"}, {"front": "How does Boccaccio treat the religious language in the story of Alibech and Rustico (III.10)?", "back": "He treats it satirically through the use of sustained double entendre."}, {"front": "What is the primary difference between the friars in Novel III.3 and Novel III.4?", "back": "The friar in III.3 is a naive dupe, while the monk in III.4 is a trickster."}, {"front": "In Boccaccio's view, do characters in Day III succeed because they are good?", "back": "No, they triumph because they are smart."}, {"front": "How does the structure of the Decameron reinforce its themes?", "back": "Each Day develops and complicates the themes presented in the previous Day."}, {"front": "In Novel III.1, what is the role of the nuns in their encounters with Masetto?", "back": "They are depicted as actively choosing their encounters rather than being victims."}, {"front": "The ability to succeed within a system stacked against you is described as the \"_____ form\" of ingegno.", "back": "Purest"}, {"front": "What does the text suggest readers should look for beneath the entertaining surfaces of Boccaccio's stories?", "back": "Moral complexities"}, {"front": "In Novel III.2, what setting helps the groom save his life by preventing the king from identifying him?", "back": "A darkened dormitory"}, {"front": "Who is the hermit in Novel III.10 who misleads Alibech?", "back": "Rustico"}, {"front": "In Novel III.6, Catella mistakes Ricciardo for her husband in what specific location?", "back": "A bathhouse"}, {"front": "According to the \"Teacher Note,\" the central challenge of Day III is the tension between _____ and _____.", "back": "Cleverness; morality"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
