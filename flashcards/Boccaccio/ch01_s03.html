<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what year was Giovanni Boccaccio born?", "back": "1313"}, {"front": "What Tuscan hill town is the most likely birthplace and the final resting place of Boccaccio?", "back": "Certaldo"}, {"front": "What was the profession of Boccaccio's father, Boccaccino di Chellino?", "back": "Merchant and banker"}, {"front": "With which powerful Florentine banking house was Boccaccio's father associated?", "back": "The Bardi"}, {"front": "What event in the 1340s caused the collapse of the Bardi and Peruzzi banks?", "back": "King Edward III of England defaulted on his loans."}, {"front": "Why did Boccaccio's father send him to Naples around 1327?", "back": "To learn the banking trade"}, {"front": "Which royal house ruled the Kingdom of Naples during Boccaccio's youth?", "back": "The French House of Anjou"}, {"front": "What name did Boccaccio give to his beloved and muse in his early writings?", "back": "Fiammetta"}, {"front": "What is the literal English translation of the name 'Fiammetta'?", "back": "Little flame"}, {"front": "Who is the historical figure often debated as the real identity of Fiammetta?", "back": "Maria d'Aquino"}, {"front": "Boccaccio's 'Filostrato' is a retelling of the story of which two characters?", "back": "Troilus and Criseyde"}, {"front": "Which English poet adapted Boccaccio’s 'Filostrato' into a famous Middle English poem?", "back": "Geoffrey Chaucer"}, {"front": "Why was Boccaccio recalled to Florence in 1340?", "back": "Financial difficulties faced by his father"}, {"front": "What were the primary industries that made Florence a wealthy European center in the 14th century?", "back": "Banking, wool production, and international trade"}, {"front": "What was the estimated population of Florence before the Black Death?", "back": "90,000–120,000"}, {"front": "In the medieval context, what is a 'Humanist'?", "back": "A scholar devoted to the study of grammar, rhetoric, poetry, history, and moral philosophy through classical texts."}, {"front": "In what year did the pestilence reach Florence?", "back": "1348"}, {"front": "Where did the Black Death first arrive on the Italian peninsula in October 1347?", "back": "Sicily"}, {"front": "What bacterium is the biological cause of the Black Death?", "back": "Yersinia pestis"}, {"front": "Approximately how many people died in Florence between March and October of 1348?", "back": "50,000 to 80,000"}, {"front": "What literary work contains a powerful and harrowing eyewitness", "back": "The Decameron"}, {"front": "According to Boccaccio, how did the plague affect social and familial responsibilities?", "back": "It shattered them, leading families to refuse care for the sick and priests to abandon their flocks."}, {"front": "During what years was the 'Decameron' composed?", "back": "1349–1353"}, {"front": "The title 'Decameron' is derived from the Greek words for _____ and _____.", "back": "Ten and day"}, {"front": "How many total tales are contained in the 'Decameron'?", "back": "100"}, {"front": "Term: Fabliau", "back": "Definition: A short, humorous, and often bawdy verse tale popular in medieval France."}, {"front": "Whom did Boccaccio meet in 1350, sparking a lifelong intellectual friendship?", "back": "Francesco Petrarch"}, {"front": "Which language did Petrarch value over Italian for serious literature?", "back": "Latin"}, {"front": "Which literary form did Petrarch value over prose narrative?", "back": "Lyric poetry"}, {"front": "What action did Boccaccio supposedly consider regarding the 'Decameron' under Petrarch's influence?", "back": "Burning it"}, {"front": "What is the title of the final tale of the 'Decameron', which was the only one Petrarch translated into Latin?", "back": "Patient Griselda"}, {"front": "What subject did Boccaccio address in the first-ever public lectures of their kind in Florence?", "back": "Dante's Divine Comedy"}, {"front": "What is the title of Boccaccio's encyclopedic reference work on classical mythology?", "back": "Genealogy of the Pagan Gods"}, {"front": "What event in 1362 triggered a spiritual crisis in Boccaccio's later life?", "back": "A visit from a Carthusian monk warning him of damnation"}, {"front": "On what date did Giovanni Boccaccio die?", "back": "December 21, 1375"}, {"front": "What does the Latin phrase 'studium fuit alma poesis' from Boccaccio's epitaph mean?", "back": "His passion was nourishing poetry."}, {"front": "What is the Italian term for the 'three crowns' of literature: Dante, Petrarch, and Boccaccio?", "back": "Tre corone"}, {"front": "How did Boccaccio's father treat his illegitimate son's upbringing?", "back": "He acknowledged him and provided for his education."}, {"front": "What specific type of culture did the Angevin court in Naples represent?", "back": "A crossroads of French, Italian, and classical culture."}, {"front": "How did Boccaccio's view of Florence compare to his view of Naples in 1340?", "back": "He found Florence provincial and dull compared to the glamour of the Neapolitan court."}, {"front": "What was the population of Florence estimated to be after the Black Death?", "back": "40,000–50,000"}, {"front": "Which three forms of the plague are caused by the bacterium Yersinia pestis?", "back": "Bubonic, pneumonic, and septicemic"}, {"front": "Identify one of the major Arabic influences on Boccaccio's 'Decameron'.", "back": "Arabic story collections"}, {"front": "How many young people are depicted telling the tales in the 'Decameron'?", "back": "Ten"}, {"front": "What was the age difference between Petrarch and Boccaccio?", "back": "Petrarch was the elder by nine years."}, {"front": "In what church in Certaldo is Boccaccio buried?", "back": "The Church of Santi Jacopo e Filippo"}, {"front": "What was the impact of the Black Death on religious order in Europe?", "back": "It shattered it, as priests frequently abandoned their parishioners."}, {"front": "According to Boccaccio's", "back": "They abandoned morality and gave themselves over to pleasure."}, {"front": "Besides being a writer, what public roles did Boccaccio hold for the city of Florence?", "back": "Diplomat and ambassador"}, {"front": "Which literary tradition do Fiammetta, Beatrice, and Laura all belong to?", "back": "The tradition of the idealized beloved"}, {"front": "How did Boccaccio's literary focus change in his later years under Humanist influence?", "back": "He turned increasingly to Latin scholarly works."}, {"front": "What does the word 'Filocolo' represent in Boccaccio's bibliography?", "back": "An early work focused on the transformative power of love."}, {"front": "What was the geographical origin of the ships that brought the plague to Sicily?", "back": "Genoa"}, {"front": "How does the 'Decameron' treat the range of human experience?", "back": "It covers everything from the sacred to the profane, and tragedy to farce."}, {"front": "What was Boccaccio's age at the time of his death?", "back": "Sixty-two"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
