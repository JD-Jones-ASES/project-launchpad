<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what year was Giovanni Boccaccio born?", "back": "1313"}, {"front": "Although his birth may have occurred in Florence, which Tuscan hill town is Boccaccio’s most likely birthplace?", "back": "Certaldo"}, {"front": "What was the occupation of Boccaccio’s father, Boccaccino di Chellino?", "back": "Florentine merchant and banker"}, {"front": "Boccaccio’s father was professionally connected to which powerful Florentine banking house?", "back": "The Bardi"}, {"front": "What event in the 1340s caused the collapse of the Bardi and Peruzzi banks?", "back": "Edward III of England defaulted on his loans."}, {"front": "For what purpose did Boccaccio’s father send him to Naples around 1327?", "back": "To learn the banking trade"}, {"front": "Which French royal house ruled the Kingdom of Naples during Boccaccio's youth?", "back": "The House of Anjou (Angevin)"}, {"front": "What name did Boccaccio give to the woman who served as his muse in his early writings?", "back": "Fiammetta"}, {"front": "What is the literal English translation of the Italian name 'Fiammetta'?", "back": "Little flame"}, {"front": "In the literary tradition of the 'beloved,' Boccaccio’s Fiammetta is often compared to Dante’s Beatrice and Petrarch’s _____.", "back": "Laura"}, {"front": "Which early narrative poem by Boccaccio retells the story of Troilus and Criseyde?", "back": "Filostrato"}, {"front": "Which English poet later adapted Boccaccio’s Filostrato into his own famous poem about Troilus and Criseyde?", "back": "Geoffrey Chaucer"}, {"front": "What circumstances forced Boccaccio to return to Florence from Naples around 1340?", "back": "His father's financial difficulties"}, {"front": "What was the approximate population of Florence just before the Black Death?", "back": "90,000 to 120,000"}, {"front": "Term: Humanist", "back": "Definition: A scholar devoted to the study of grammar, rhetoric, poetry, history, and moral philosophy through classical texts."}, {"front": "In what year did the pestilence known as the Black Death reach Florence?", "back": "1348"}, {"front": "The Black Death arrived in Sicily in 1347 aboard trading ships from which Italian city?", "back": "Genoa"}, {"front": "What is the scientific name of the bacterium that causes the plague?", "back": "Yersinia pestis"}, {"front": "Approximately how many people in Florence died during the plague months of 1348?", "back": "50,000 to 80,000"}, {"front": "How did the Black Death affect the social behavior of families according to Boccaccio?", "back": "Many families refused to care for their own sick members."}, {"front": "In the wake of the plague, some people turned to extreme piety while others gave themselves over to _____.", "back": "Pleasure"}, {"front": "The title Decameron is derived from the Greek words for _____.", "back": "Ten days"}, {"front": "Over what approximate years was the Decameron composed?", "back": "1349 to 1353"}, {"front": "Term: Fabliau", "back": "Definition: A short, humorous, and often bawdy verse tale popular in medieval France."}, {"front": "How many total tales are contained within Boccaccio’s Decameron?", "back": "100"}, {"front": "In 1350, Boccaccio began a lifelong friendship with which famous European writer?", "back": "Francesco Petrarch"}, {"front": "Petrarch valued the Latin language and lyric poetry over Boccaccio's strength in _____.", "back": "Prose narrative"}, {"front": "According to an apocryphal story, what did Petrarch talk Boccaccio out of doing to the Decameron?", "back": "Burning the manuscript"}, {"front": "Which specific tale from the Decameron did Petrarch find worthy enough to translate into Latin?", "back": "Patient Griselda"}, {"front": "What role did Boccaccio perform for the city of Florence on several occasions in his later life?", "back": "Diplomat and ambassador"}, {"front": "Boccaccio established a lasting tradition in Florence by delivering the first public lectures on which literary work?", "back": "Dante’s Divine Comedy"}, {"front": "Which encyclopedic work on classical mythology did Boccaccio compile in his later years?", "back": "Genealogy of the Pagan Gods"}, {"front": "What event in 1362 triggered a spiritual crisis and increased Boccaccio's religious devotion?", "back": "A warning of damnation from a Carthusian monk"}, {"front": "On what date did Giovanni Boccaccio die?", "back": "December 21, 1375"}, {"front": "What phrase on Boccaccio’s tombstone reflects his life's passion?", "back": "Studium fuit alma poesis (his passion was nourishing poetry)"}, {"front": "Dante, Petrarch, and Boccaccio are collectively known in Italian literature as the _____.", "back": "Tre corone (three crowns)"}, {"front": "Which literary work provided the frame for the Decameron's one hundred tales?", "back": "The Black Death of 1348"}, {"front": "Where is Giovanni Boccaccio buried?", "back": "The Church of Santi Jacopo e Filippo in Certaldo"}, {"front": "What cultural environment in Naples provided Boccaccio with his deep knowledge of storytelling traditions?", "back": "The Angevin court"}, {"front": "Boccaccio's early work Filocolo focuses on his fascination with how _____ transforms human lives.", "back": "Love"}, {"front": "How did the population of Florence change as a result of the Black Death?", "back": "It fell from over 90,000 to as low as 40,000–50,000."}, {"front": "Boccaccio moved in intellectual circles that connected him to which 14th-century cultural movement?", "back": "Humanism"}, {"front": "According to Boccaccio's", "back": "They believed death was coming regardless of their actions."}, {"front": "Beyond Italian oral traditions and classical Latin, Boccaccio drew on story collections from which other culture for the Decameron?", "back": "Arabic"}, {"front": "Why did Boccaccio regard Petrarch with 'something close to reverence'?", "back": "Petrarch was the most famous living writer in Europe and Boccaccio’s senior."}, {"front": "What religious status did Boccaccio possibly take toward the end of his life?", "back": "Minor holy orders"}, {"front": "In which century did Boccaccio live and write?", "back": "The 14th century (Trecento)"}, {"front": "Which banking family partnered with the Bardi to finance European kings and popes?", "back": "The Peruzzi"}, {"front": "Why did Boccaccio find Florence 'provincial' upon his return in 1340?", "back": "He missed the glamour and courtly society of Naples."}, {"front": "What was the primary source of wealth for 14th-century Florence besides banking?", "back": "Wool production and international trade"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
