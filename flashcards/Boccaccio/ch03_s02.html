<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is appointed as the queen to rule over the company on Day II of the Decameron?", "back": "Filomena"}, {"front": "Which character does Filomena succeed as the ruler of the company?", "back": "Pampinea"}, {"front": "What is the prescribed theme for the stories told on Day II?", "back": "Fortune (Fortuna)"}, {"front": "In medieval thought, how was the goddess Fortune typically personified?", "back": "As a figure turning a great wheel"}, {"front": "Which 6th-century work is the primary source for the medieval image of Fortune’s wheel?", "back": "Boethius's Consolation of Philosophy"}, {"front": "According to the theme of Day II, what is the ultimate fate of characters after their misadventures?", "back": "A happy issue (ending) they had not hoped for"}, {"front": "What three factors allow characters in Day II to arrive at an unexpected happy ending?", "back": "Luck, wit, or simple endurance"}, {"front": "How does the length of the tales in Day II generally compare to those of Day I?", "back": "They are among the longest in the Decameron"}, {"front": "How does the plotting of Day II stories compare to those in Day I?", "back": "They are more elaborately plotted"}, {"front": "List three common plot elements found in the tales of Day II.", "back": "Shipwrecks, disguises, and mistaken identities"}, {"front": "What type of escapades are specifically mentioned as common in the Day II narratives?", "back": "Midnight escapades"}, {"front": "To what new location does Filomena lead the company at the start of Day II?", "back": "A new estate (villa)"}, {"front": "What does the company's movement between villas signify in the cornice of the Decameron?", "back": "The themes of movement and discovery in the tales"}, {"front": "What carries the tidings of the new day to the ears of the company at the start of Day II?", "back": "Birds chanting their lays"}, {"front": "What morning activity do the ladies and young men engage in within the dewy meads?", "back": "Culling flowers and weaving garlands"}, {"front": "Where does the company eat breakfast on Day II?", "back": "In the shade"}, {"front": "What activities does the company perform between breakfast and their noon rest?", "back": "Dancing and sleeping"}, {"front": "At what time of day does the company assemble to begin the storytelling session?", "back": "Noon"}, {"front": "In what specific formation does the company sit to listen to the queen's stories?", "back": "In a circle"}, {"front": "What symbolic item does Queen Filomena wear on her head during the assembly?", "back": "A laurel wreath"}, {"front": "Who is the first member of the company called upon by Filomena to tell a story on Day II?", "back": "Neifile"}, {"front": "What was the theme of Day I compared to Day II?", "back": "Day I had no prescribed theme"}, {"front": "In the medieval personification of Fortune, what happens to mortals when she turns her wheel?", "back": "Some are raised to prosperity and others are cast down"}, {"front": "What world do the Day II tales represent through their themes of reversal and surprise?", "back": "The world of adventure"}, {"front": "The image of Fortune's wheel was ubiquitous in what two medieval areas?", "back": "Art and literature"}, {"front": "According to the text, characters in Day II are tossed about by what specific type of forces?", "back": "Forces beyond their control"}, {"front": "What is the physical setting for the storytelling assembly on Day II?", "back": "A cool meadow"}, {"front": "How does the primary source describe Filomena’s appearance as she scans the company?", "back": "Fair and very debonair"}, {"front": "What is the approximate date of Boethius’s Consolation of Philosophy?", "back": "c. 524"}, {"front": "The movement of the company between villas is a subtle element of the _____ that mirrors story themes.", "back": "Cornice"}, {"front": "What is the reaction of Neifile when bidden to start the day's storytelling?", "back": "She made no excuse and gaily began"}, {"front": "Where did the company tell the stories of Day I?", "back": "The gardens of the first villa"}, {"front": "How does the text describe the sun's arrival at the start of Day II?", "back": "Trailing the new day in his wake of light"}, {"front": "The theme of Day II covers those who experience '_____ misadventures' before a happy ending.", "back": "Divers"}, {"front": "The image of Fortune's wheel raising or casting down mortals originates from the _____ period.", "back": "Medieval"}, {"front": "How many young men are included in the company of the Decameron?", "back": "Three"}, {"front": "Filomena chooses a subject that proves 'endlessly _____' for Boccaccio.", "back": "Fertile"}, {"front": "What reinforces the sense of 'movement and discovery' at the beginning of Day II?", "back": "The shift to a new estate"}, {"front": "What does the company 'cull' in the gardens during the morning of Day II?", "back": "Flowers"}, {"front": "What specific phrase describes the ending characters reach in Day II despite their lack of hope?", "back": "A happy issue"}, {"front": "According to the cornice, the company spent 'no little time' doing what in the morning?", "back": "Sauntering about the dewy meads"}, {"front": "Who does the crown of the queen pass to at the start of Day II?", "back": "Filomena"}, {"front": "What is the primary role of Fortune in medieval thought as described in the text?", "back": "To raise mortals to prosperity or cast them down"}, {"front": "Which specific literary device uses the physical movement of characters to mirror thematic shifts?", "back": "The cornice (or frame story)"}, {"front": "What is the character of the world described in Day II's tales?", "back": "Adventure, reversal, and surprise"}, {"front": "What type of narrative plots are a hallmark of the stories told under Filomena's rule?", "back": "Elaborately plotted stories"}, {"front": "What is Neifile's role at the start of Day II?", "back": "The first storyteller"}, {"front": "Where specifically did the company assemble to hear the stories at noon?", "back": "In a circle about the queen in the cool meadow"}, {"front": "What does 'Fortuna' refer to in the context of Boccaccio's Day II?", "back": "The personified goddess of Fortune and her unpredictable wheel"}, {"front": "In the primary source text, what are the birds chanting among the green boughs?", "back": "Their lays"}, {"front": "The company's morning routine involves weaving flowers into what?", "back": "Fair garlands"}, {"front": "What is the queen's title for Day II?", "back": "Filomena"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
