<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who succeeds Pampinea as the queen for the second day of storytelling?", "back": "Filomena"}, {"front": "What central theme does Filomena choose for the storytelling on Day II?", "back": "Fortune (or Fortuna)"}, {"front": "How was Fortune personified in medieval thought?", "back": "As a goddess who turned a great wheel."}, {"front": "Which 6th-century work is the primary source for the ubiquitous medieval image of the Wheel of Fortune?", "back": "The Consolation of Philosophy"}, {"front": "Who is the author of the medieval philosophical work 'The Consolation of Philosophy'?", "back": "Boethius"}, {"front": "In medieval philosophy, what happens to mortals when the goddess Fortune turns her wheel?", "back": "She raises some to prosperity and casts others down."}, {"front": "What is the general narrative focus of the tales told on Day II?", "back": "People who, after various misadventures, achieve an unexpected happy ending."}, {"front": "According to the text, the world of Day II is one of adventure, surprise, and _____.", "back": "Reversal"}, {"front": "Through what three means do characters in Day II arrive at an unexpected happy ending?", "back": "Luck, wit, or simple endurance."}, {"front": "In terms of narrative structure, how do Day II tales compare to the rest of the Decameron?", "back": "They are among the longest and most elaborately plotted."}, {"front": "List one frequent plot element mentioned that is characteristic of Day II stories.", "back": "Shipwrecks (or disguises, mistaken identities, or midnight escapades)."}, {"front": "Where does the company move to at the beginning of Day II?", "back": "A new estate (or villa)."}, {"front": "What does the company's movement to a new villa reinforce in Boccaccio's narrative?", "back": "A sense of movement and discovery."}, {"front": "In the cornice of the Decameron, what do the physical movements between villas mirror?", "back": "The themes of each Day."}, {"front": "Where were the stories of Day I told before the company moved?", "back": "In the gardens of the first villa."}, {"front": "At what time of day does the company reassemble to begin the stories on Day II?", "back": "Noon"}, {"front": "What physical symbol of authority does the queen of the day wear on her head?", "back": "A laurel wreath"}, {"front": "Who is the first person Filomena calls upon to tell a story on Day II?", "back": "Neifile"}, {"front": "What activity does the company engage in immediately after waking up on Day II?", "back": "Sauntering about the dewy meads and culling flowers."}, {"front": "What do the ladies and young men weave from the flowers they collect in the morning?", "back": "Fair garlands"}, {"front": "Where does the company take their breakfast on Day II?", "back": "In the shade"}, {"front": "What two activities occupy the company between breakfast and the noon assembly?", "back": "Dancing and sleeping."}, {"front": "In what specific setting does the circle of storytellers gather on Day II?", "back": "A cool meadow"}, {"front": "How does Neifile react when commanded to begin the first story of the day?", "back": "She makes no excuse and begins gaily."}, {"front": "What was the prescribed theme for Day I of the Decameron?", "back": "Day I had no prescribed theme."}, {"front": "What is the specific phrasing used to describe the happy endings in Day II?", "back": "A happy issue."}, {"front": "Concept: The Cornice", "back": "Definition: The framing narrative of the Decameron that details the lives and movements of the storytellers themselves."}, {"front": "Term: Fortuna", "back": "Definition: The personification of luck and fate, often depicted as a goddess with a wheel in medieval art."}, {"front": "What is the subtitle of Day II, reflecting its central theme?", "back": "Fortune's Reversals"}, {"front": "Around what year was Boethius's 'Consolation of Philosophy' written?", "back": "c. 524"}, {"front": "According to the introduction of Day II, characters are tossed about by forces _____ _____ _____.", "back": "Beyond their control."}, {"front": "How does Boccaccio describe the plotting of the tales in Day II?", "back": "Elaborately plotted."}, {"front": "What signals the arrival of the new day to the characters at the start of Day II?", "back": "Birds chanting their lays among the green boughs."}, {"front": "What adjective does Boccaccio use to describe the queen's appearance as she scans the company?", "back": "Debonair"}, {"front": "In the cornice, what subtle element is often overlooked by readers according to the text?", "back": "The movement between villas mirroring the themes of the stories."}, {"front": "The medieval image of the Wheel of Fortune was ubiquitous in both _____ and literature.", "back": "Art"}, {"front": "To whom did Pampinea pass the crown at the conclusion of the first day?", "back": "Filomena"}, {"front": "In the context of Day II, what is meant by a 'happy issue'?", "back": "An unexpected positive outcome to a series of misfortunes."}, {"front": "The introduction describes the birds' songs as being heard from the 'green _____'.", "back": "Boughs"}, {"front": "What time did the company finally rise to start their day?", "back": "When the sun trailed the new day (dawn)."}, {"front": "Who are the 'three young men' mentioned in the company?", "back": "The male members of the ten-person storytelling group."}, {"front": "What is the narrative function of the relocation from the first villa to a new estate?", "back": "To match the movement and discovery present in the Day's stories."}, {"front": "Which specific literary theme of Day II involves characters hiding their true selves?", "back": "Disguises"}, {"front": "The queen Filomena scans the company for a 'brief space' before doing what?", "back": "Bidding Neifile to tell the first story."}, {"front": "What does the text identify as 'endlessly fertile' for Boccaccio's storytelling?", "back": "Fortuna (Fortune)"}, {"front": "The company sauntered about the '_____ meads' in the early morning.", "back": "Dewy"}, {"front": "What phrase describes the characters' lack of anticipation for their eventual happy endings?", "back": "They had not hoped for them."}, {"front": "Is the theme of Day II focused on internal psychological shifts or external reversals?", "back": "External reversals (Fortuna)."}, {"front": "Who is credited with ubiquitous medieval depictions of Fortune's wheel?", "back": "Boethius"}, {"front": "According to the queen's behest, in what formation did the company sit in the meadow?", "back": "In a circle."}, {"front": "What element of the Day II tales makes them part of the 'world of adventure'?", "back": "The elaborate plotting involving shipwrecks and midnight escapades."}, {"front": "Who reigned as the first ruler of the Decameron before Filomena?", "back": "Pampinea"}, {"front": "What specific action did the company do with the flowers they culled?", "back": "Wove them into fair garlands."}, {"front": "What is the primary source of the 'tidings' of the day mentioned in the introduction?", "back": "Birds"}, {"front": "What adjective is used to describe the meadow where the company gathered at noon?", "back": "Cool"}, {"front": "How does Boccaccio characterize the 'world' of the stories told on Day II?", "back": "Adventure, reversal, and surprise."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
