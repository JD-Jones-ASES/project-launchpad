<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 9, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is the appointed queen for the eighth day of storytelling in The Decameron?", "back": "Lauretta."}, {"front": "What is the primary theme of the eighth day as established by Lauretta?", "back": "Tricks of every kind played between men and women."}, {"front": "How does the scope of trickery in Day VIII differ from that of Day VII?", "back": "Day VII focused only on wives tricking husbands, while Day VIII includes all gender combinations."}, {"front": "In Day VIII, trickery is no longer confined to the ______.", "back": "Marriage bed."}, {"front": "What narrative effect is created by the shift from marital tricks to universal tricks in Day VIII?", "back": "The symmetry of Day VII is deliberately broken."}, {"front": "How does the tone of the tales in Day VIII compare to the tone of Day VII?", "back": "Day VIII introduces darker themes and genuine cruelty, whereas Day VII was largely lighthearted."}, {"front": "What was typically the worst consequence for a victim in the tales of Day VII?", "back": "A bruised ego."}, {"front": "When a trick escalates beyond a harmless prank in Day VIII, cleverness is described as a ______.", "back": "Weapon."}, {"front": "Term: Beffa leggera", "back": "Definition: A light, harmless trick in the Italian critical tradition."}, {"front": "Term: Beffa crudele", "back": "Definition: A cruel trick that goes beyond a harmless prank into something genuinely harmful."}, {"front": "How does Boccaccio use the juxtaposition of light and cruel tricks in Day VIII?", "back": "To force the reader to confront the ethical limits of trickery."}, {"front": "Who is the recurring gullible painter introduced as a central dupe in Day VIII?", "back": "Calandrino."}, {"front": "Identify the two recurring witty pranksters who frequently torment Calandrino.", "back": "Bruno and Buffalmacco."}, {"front": "What was the historical profession of the real-life Bruno and Buffalmacco?", "back": "Painters."}, {"front": "Which historical author mentions Bruno and Buffalmacco in his 1550 work, 'Lives of the Artists'?", "back": "Vasari."}, {"front": "What was the real name of the historical person Boccaccio transformed into Calandrino?", "back": "Nozzo di Perino."}, {"front": "Boccaccio transforms historical acquaintances into ______ archetypes.", "back": "Comic."}, {"front": "How does the geographic origin of Day VIII's characters differ from other Decameron tales?", "back": "They are recognizable Florentines rather than anonymous characters from distant lands."}, {"front": "The Calandrino tales are described as having the texture of ______ raised to the level of art.", "back": "Urban gossip."}, {"front": "What allows the narrators of The Decameron to explore darker themes by the eighth day?", "back": "They have become comfortable enough with one another over the previous seven days."}, {"front": "In what environment does the company walk immediately after arising on the eighth day?", "back": "The dewy mead."}, {"front": "What religious event does the company attend before returning to the palace for breakfast?", "back": "Divine service."}, {"front": "At what approximate time of day does the company wend their way to the church?", "back": "Half tierce (mid-morning)."}, {"front": "What activities did the company engage in after breakfast but before their afternoon rest?", "back": "Singing and dancing."}, {"front": "Who musters the company to begin the afternoon storytelling sessions?", "back": "The queen (Lauretta)."}, {"front": "Where does the company sit to listen to the stories of Day VIII?", "back": "By the fair fountain."}, {"front": "Who is the first narrator to speak on the eighth day?", "back": "Neifile."}, {"front": "How does Lauretta's framing of the theme relate to the previous day?", "back": "It is an expansion of the human impulse toward trickery played on a larger stage."}, {"front": "What visual detail signifies the start of the eighth day in the introduction?", "back": "The summits of the loftiest mountains illumined by the rising sun."}, {"front": "What is the historical city of origin for Calandrino, Bruno, and Buffalmacco?", "back": "Florence."}, {"front": "What distinguishes a 'beffa' as a game versus a 'beffa' as a weapon?", "back": "The level of cruelty and the nature of the consequences for the victim."}, {"front": "In the context of the Eighth Day, what does the term 'beffa' refer to?", "back": "A trick or prank."}, {"front": "What emotional state characterizes the company's breakfast on Day VIII?", "back": "Gay and gladsome cheer."}, {"front": "How many days of storytelling have passed before the company begins exploring darker themes?", "back": "Seven days."}, {"front": "What is the primary significance of using real people as characters in Day VIII?", "back": "It grounds the comedy in the recognizable social reality of Boccaccio's audience."}, {"front": "Cloze: The Italian critical tradition distinguishes between beffa ______ and beffa ______.", "back": "leggera; crudele."}, {"front": "According to the introduction, when were the 'shades of night' fled?", "back": "When the sun rose and all things became plainly visible."}, {"front": "What specific time marks the start of the 'wonted pastime' of storytelling?", "back": "When the sun is past the meridian."}, {"front": "Who are the primary targets of trickery mentioned in the rubric of Day VIII?", "back": "Husbands, wives, and men tricking other men."}, {"front": "What does the broadening of the theme in Day VIII suggest about the 'human impulse toward trickery'?", "back": "It is a universal trait not limited to any specific relationship or gender."}, {"front": "Identify the archetype represented by Calandrino.", "back": "The eternal dupe."}, {"front": "Identify the archetype represented by Bruno and Buffalmacco.", "back": "The witty pranksters."}, {"front": "What specific consequence defines the 'cruel trick' in the Eighth Day?", "back": "Something genuinely cruel or harmful beyond simple foolishness."}, {"front": "How does the setting of Day VIII reflect the narrators' comfort level?", "back": "They feel secure enough in their company to transition from lighthearted to darker subject matter."}, {"front": "At what point in the day does the company return to the palace for breakfast?", "back": "After hearing Divine service."}, {"front": "What is the primary role of Neifile on Day VIII?", "back": "She begins the storytelling at the queen's command."}, {"front": "How does Boccaccio elevate 'urban gossip' in the Day VIII narratives?", "back": "By transforming historical anecdotes into structured literary art."}, {"front": "What is the historical significance of Nozzo di Perino?", "back": "He was the real-life inspiration for the character Calandrino."}, {"front": "Under whose rule does the company explore the ethical limits of trickery?", "back": "Lauretta."}, {"front": "What describes the state of the 'summits of the loftiest mountains' at the start of the day?", "back": "Illumined by the rays of the rising sun."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
