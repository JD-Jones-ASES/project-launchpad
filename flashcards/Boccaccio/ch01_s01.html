<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "To whom does Boccaccio dedicate the *Decameron* in the Proem?", "back": "Women in love."}, {"front": "Which ancient historian's account of the Plague of Athens is frequently compared to Boccaccio's", "back": "Thucydides."}, {"front": "In what year did the deadly pestilence reach the city of Florence?", "back": "1348."}, {"front": "What distinctive combination of perspectives characterizes Boccaccio's account of the plague?", "back": "Clinical observation and moral reflection."}, {"front": "What was the specific physical symptom of the plague that appeared first in the East but not in Florence?", "back": "An issue of blood from the nose."}, {"front": "What was the name given by common folk to the plague tumours that appeared in the groin or armpits?", "back": "Gavoccioli."}, {"front": "According to Boccaccio, what size could the plague tumours (gavoccioli) reach?", "back": "The size of a common apple or an egg."}, {"front": "Aside from tumours, what physical sign on the limbs was considered an \"infallible token of approaching death\"?", "back": "Black or livid spots."}, {"front": "Within how many days of the appearance of symptoms did most victims typically die?", "back": "Three days."}, {"front": "Boccaccio compares the spread of the plague through intercourse to what physical process?", "back": "Fire devouring dry or greasy objects brought close to it."}, {"front": "What animal experience did Boccaccio witness that demonstrated the energy of the contagion outside of humans?", "back": "Two hogs died almost immediately after touching the rags of a plague victim."}, {"front": "How did the \"temperate\" group of survivors attempt to avoid the plague?", "back": "By forming secluded communities, eating moderately, and avoiding all news of death."}, {"front": "How did the \"reckless\" group of survivors attempt to counter the fear of the plague?", "back": "By drinking freely, frequenting taverns, and satisfying every appetite."}, {"front": "What did the \"middle course\" group of survivors carry in their hands to \"comfort the brain\"?", "back": "Flowers, fragrant herbs, or spices."}, {"front": "What was the primary reason for the breakdown of the \"venerable authority of laws\" during the plague?", "back": "The ministers of the law were mostly dead, sick, or lacked servants to execute offices."}, {"front": "Boccaccio notes with horror that the plague caused parents to treat their children as if they were _____.", "back": "Strangers."}, {"front": "Term: Becchini", "back": "Definition: Corpse-carriers from the lower classes who buried the dead for hire during the plague."}, {"front": "How did the burial practices for the common people change due to the high volume of deaths?", "back": "Bodies were laid in huge trenches and piled tier upon tier like merchandise in a ship."}, {"front": "Why did the animals in the countryside, such as oxen and dogs, roam at large in the fields?", "back": "Husbandmen abandoned their industry and drove the animals out, expecting each day to be their last."}, {"front": "What is the estimated number of human lives lost within the walls of Florence between March and July 1348?", "back": "Upwards of 100,000."}, {"front": "In which church did the seven young ladies of the brigata meet?", "back": "Santa Maria Novella."}, {"front": "What was the age range of the seven ladies in the brigata?", "back": "Eighteen to twenty-eight years."}, {"front": "Which character is the eldest of the seven ladies and takes the lead in proposing their departure?", "back": "Pampinea."}, {"front": "List the names of the seven ladies who form the brigata.", "back": "Pampinea, Fiammetta, Filomena, Emilia, Lauretta, Neifile, and Elisa."}, {"front": "What argument does Pampinea use to justify the ladies leaving the city?", "back": "Natural reason dictates that everyone has the right to defend and preserve their own life."}, {"front": "Why does Filomena object to the ladies traveling alone to the country?", "back": "She argues that women are unable to rule themselves without the guidance of a man."}, {"front": "Who are the three young men who join the ladies in their retreat?", "back": "Pamfilo, Filostrato, and Dioneo."}, {"front": "What is the minimum age of the youngest man in the company?", "back": "Twenty-five years."}, {"front": "On what day of the week does the company depart from Florence?", "back": "Wednesday."}, {"front": "How far from the city was the estate where the brigata first stayed?", "back": "Two short miles."}, {"front": "Which character insists upon the company making merry, laughing, and singing as a condition of his stay?", "back": "Dioneo."}, {"front": "What system of governance does Pampinea propose for the group's stay?", "back": "A rotating sovereignty where one person is chosen as superior for a single day."}, {"front": "What is the visible sign of sovereignty worn by the reigning king or queen of the day?", "back": "A wreath of bay-tree (laurel) leaves."}, {"front": "Who is appointed as the seneschal to control the household and service of the hall?", "back": "Parmeno (Dioneo's man)."}, {"front": "Who is appointed as the treasurer and chancellor of the group's exchequer?", "back": "Sirisco (Pamfilo's man)."}, {"front": "What specific command does Pampinea give to all the servants regarding the news they bring?", "back": "They must bring no tidings but such as are cheerful."}, {"front": "At what canonical hour does the queen command the company to gather for breakfast?", "back": "Tierce."}, {"front": "Which two characters provide the music for the group's first dance?", "back": "Dioneo (lute) and Fiammetta (viol)."}, {"front": "According to the Introduction, what is the \"moral foundation\" of the *Decameron*?", "back": "The contrast between the plague's destruction of order and the brigata's creative response."}, {"front": "What literary term describes the structure where the story of the brigata contains the hundred tales?", "back": "Frame narrative."}, {"front": "Boccaccio describes the \"horrid beginning\" of his book as being like a _____ to a wayfarer.", "back": "Steep and rugged mountain."}, {"front": "Which virtue does Boccaccio claim prompted him to write the work for the solace of others?", "back": "Gratitude."}, {"front": "Why does Boccaccio argue that men have more relief from the \"dumps\" of love than women?", "back": "Men can hunt, fish, ride, or trade, while women are confined to their chambers."}, {"front": "According to Boccaccio, what are the two benefits ladies will derive from reading his stories?", "back": "Pleasure and good counsel (learning what to shun and what to pursue)."}, {"front": "What was the \"only\" thing the owners of houses became during the plague, according to the text?", "back": "As reckless of their property as of their lives."}, {"front": "What was the effect of the plague on the traditional wailing and funeral rites for the dead?", "back": "They were largely disused and replaced by laughter, jests, and festal gatherings."}, {"front": "How did the plague affect the modesty of women who recovered, according to Boccaccio?", "back": "They may have lost some modesty due to being tended by male servants during their illness."}, {"front": "Which three famous physicians does Boccaccio mention to emphasize the plague's deadliness?", "back": "Galen, Hippocrates, and Aesculapius."}, {"front": "Boccaccio refers to the plague as being sent by God for what reason?", "back": "In His just wrath by way of retribution for human iniquities."}, {"front": "What does the name \"Novella\" refer to in a literary context?", "back": "A short prose tale."}, {"front": "How does Boccaccio describe the physical environment of the palace where the brigata retreats?", "back": "It was on a hill with a spacious court, gladsome pictures, gardens, and vaults of fine wine."}, {"front": "Why did Boccaccio choose to give the ladies of the brigata pseudonyms rather than their real names?", "back": "To prevent future reproach or slur upon their honor due to the nature of the stories told."}, {"front": "What activity does the company engage in immediately before retiring to rest on the first day?", "back": "Treading measures (dancing) and singing ditties."}, {"front": "What does Boccaccio identify as the \"end to all things mundane\"?", "back": "The immutable law assigned by God."}, {"front": "What was the response of the clergy to the vast number of deaths?", "back": "They were reduced in number and performed offices hastily without long and solemn rites."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
