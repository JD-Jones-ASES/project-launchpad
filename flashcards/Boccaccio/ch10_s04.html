<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 10, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In literature, what is the 'bed-trick' plot device?", "back": "A comic or dramatic scenario based on darkness, confusion, and mistaken identity in a bedroom."}, {"front": "According to the text, which book of the Bible contains an early example of the bed-trick involving Jacob and Leah?", "back": "Genesis"}, {"front": "Where is the provincial inn in Panfilo's tale located?", "back": "The plain of Mugnone (near Forlì)."}, {"front": "What is the name of the young Florentine gentleman who is in love with the host's daughter?", "back": "Pinuccio"}, {"front": "Who is the 'trusty comrade' that accompanies Pinuccio to the inn?", "back": "Adriano"}, {"front": "What realistic detail about medieval inns explains why the hosts and guests slept in the same room?", "back": "Privacy was a luxury reserved only for the wealthy."}, {"front": "How many beds were located in the host's single small bedroom?", "back": "Three"}, {"front": "What is the name of the host's daughter?", "back": "Niccolosa"}, {"front": "How old is Niccolosa in the story?", "back": "Fifteen or sixteen years old."}, {"front": "Why did the host only give lodging to a few people he knew?", "back": "He was in poor circumstances and had a very small house."}, {"front": "What did Pinuccio and Adriano put in their valises to look like legitimate travelers?", "back": "Straw (or similar stuffing)."}, {"front": "From which direction did the two friends pretend to be arriving to deceive the host?", "back": "Romagna"}, {"front": "Describe the arrangement of the three beds in the host's room.", "back": "Two beds were on one side of the room and the third was on the opposite side."}, {"front": "In the initial sleeping arrangement, who occupied the two beds on one side of the room?", "back": "The host's daughter in one and the host with his wife and baby in the other."}, {"front": "Where was the baby's cradle placed at the start of the night?", "back": "Beside the bed occupied by the host and his wife."}, {"front": "What noise initially rouses the host's wife in the middle of the night?", "back": "A cat oversetting items."}, {"front": "Why does Adriano move the cradle during the night?", "back": "He needed to move it to get past and answer a call of nature."}, {"front": "Where does Adriano place the cradle after moving it?", "back": "Beside the bed he shares with Pinuccio."}, {"front": "Why does the wife accidentally get into bed with Adriano?", "back": "She uses the cradle's position to identify what she thinks is her husband's bed."}, {"front": "When the wife gets into Adriano's bed, how does he respond?", "back": "He receives her with benignity and engages with her several times."}, {"front": "Why does Pinuccio end up in the host's bed after leaving Niccolosa?", "back": "He finds the cradle near Adriano's bed and assumes that must be the host's bed."}, {"front": "What does Pinuccio boast about to the person he thinks is Adriano?", "back": "He claims he had great delight with Niccolosa six times."}, {"front": "How does the host react to Pinuccio's unintentional confession?", "back": "He becomes enraged and threatens Pinuccio for the affront."}, {"front": "How does the host's wife realize she is in the wrong bed?", "back": "She recognizes her husband's angry voice and hears Adriano's voice next to her."}, {"front": "What immediate action does the wife take after realizing she is with Adriano?", "back": "She moves the cradle to her daughter's bedside and gets into bed with her."}, {"front": "What excuse does the wife give her husband for Pinuccio's confession?", "back": "She claims Pinuccio is dreaming and often walks or talks in his sleep."}, {"front": "How does the wife prove to her husband that Pinuccio couldn't have been with Niccolosa?", "back": "She claims she was in bed with Niccolosa the entire time and stayed awake."}, {"front": "How does Adriano support the wife's lie about Pinuccio?", "back": "He scolds Pinuccio for his 'habit' of relating his dreams as truth."}, {"front": "What is the host's reaction once he is convinced Pinuccio was only dreaming?", "back": "He laughs and tells Pinuccio to go back to his own bed."}, {"front": "How does Pinuccio act when the host tries to wake him up from his 'dream'?", "back": "He talks wanderingly like a drowsy person before returning to Adriano's bed."}, {"front": "The wife's ability to avoid the scandal is described as her _____.", "back": "Quick apprehension"}, {"front": "According to the intro, what is the primary focus of this farce rather than a moral lesson?", "back": "The comedy of bodies in the dark."}, {"front": "What literary mastery does Boccaccio demonstrate through the movement of characters in the room?", "back": "Spatial choreography and timing."}, {"front": "Who did the host's wife think she was reproving when she first got up?", "back": "The cat"}, {"front": "What does the text call the gap between what characters know and what the audience sees?", "back": "Dramatic irony"}, {"front": "Why did Pinuccio initially hesitate to pursue his passion for Niccolosa?", "back": "He feared the disgrace it would bring upon both of them."}, {"front": "How did the story end the next morning at the inn?", "back": "The host made merry over Pinuccio's dreams while the guests departed for Florence."}, {"front": "Which character accounts themselves 'the only one that had watched' at the end of the story?", "back": "The host's wife"}, {"front": "Why does Adriano laugh when the host and Pinuccio begin to argue?", "back": "He attributes their loud words to drinking too much the night before."}, {"front": "Term: Spatial Choreography", "back": "Definition: The precise physical layout and movement of characters within a specific area to drive a plot."}, {"front": "What was the purpose of the two horses Pinuccio and Adriano hired?", "back": "To travel to the inn and maintain the appearance of being travelers from Romagna."}, {"front": "True or False: Niccolosa confirmed to her mother that Pinuccio had been dreaming.", "back": "True"}, {"front": "How does the text describe the physical space between the three beds?", "back": "There was scarce room enough to pass through."}, {"front": "Which character is described as 'not the most discreet of gallants' during the confrontation?", "back": "Pinuccio"}, {"front": "What is the primary catalyst that causes the sequence of bed-switches?", "back": "The movement of the baby's cradle."}, {"front": "What does the introduction say Boccaccio's tale depends on for realism?", "back": "The detail that travelers and hosts often shared a single room."}, {"front": "Why did Pinuccio decide to return to his own bed before morning?", "back": "He feared that sleep might overtake him while he was still with Niccolosa."}, {"front": "The host's wife 'divined rather than feeling her way' back to her daughter's bed because _____.", "back": "There was not a ray of light in the room."}, {"front": "Why does the host eventually laugh at Pinuccio?", "back": "He is amused by the absurdity of Pinuccio's supposed sleep-talking."}, {"front": "What does the text suggest about the host's intelligence compared to his wife's?", "back": "The wife is more 'discreet' and 'quick' to resolve the crisis than her husband."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
