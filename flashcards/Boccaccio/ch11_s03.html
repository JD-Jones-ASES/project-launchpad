    <script>

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 11, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

    <script>
    var CARDS = [{"front": "Who is the narrator of the hundredth and final tale of the Decameron?", "back": "Dioneo"}, {"front": "What is the general theme of the tenth day of the Decameron?", "back": "Magnanimity and Virtue"}, {"front": "Why is Dioneo's choice of the story of 'Patient Griselda' considered deeply ironic?", "back": "He is usually the most irreverent narrator, yet he tells the most moral tale."}, {"front": "Which privilege did Dioneo hold throughout the Decameron regarding story themes?", "back": "The right to tell any tale he pleased regardless of the day's theme."}, {"front": "What is the title held by Gualtieri, the male protagonist of the tale?", "back": "Marquis of Saluzzo"}, {"front": "Why did Gualtieri initially avoid taking a wife?", "back": "He believed it was too difficult to find a woman whose ways accorded with his own."}, {"front": "What did Gualtieri's vassals fear would happen if he died without an heir?", "back": "They would be left without a lord."}, {"front": "What condition did Gualtieri set for his vassals before agreeing to marry?", "back": "They must honor whomever he chose as a lady."}, {"front": "What is the name of Griselda's father?", "back": "Giannucolo"}, {"front": "What was Griselda's social status before her marriage?", "back": "A poor peasant girl/shepherdess."}, {"front": "What specific promise did Gualtieri demand from Griselda before their marriage?", "back": "To obey him absolutely and never complain or be wroth."}, {"front": "What ritual did Gualtieri force Griselda to undergo before the wedding guests?", "back": "He had her stripped naked and then reclothed in fine garments."}, {"front": "How did Griselda's appearance change in the eyes of the public after her marriage?", "back": "She was seen as having acquired the dignity and grace of a noble lord's daughter."}, {"front": "What was the sex of Griselda and Gualtieri's first child?", "back": "Female"}, {"front": "What reason did Gualtieri give Griselda for removing their first child?", "back": "He claimed his vassals were dissatisfied with her base condition and the birth of a daughter."}, {"front": "How did Griselda react when the servant came to take her daughter away?", "back": "She kissed and blessed the child and submitted without protest."}, {"front": "What specific request did Griselda make to the servant regarding her daughter's body?", "back": "To ensure beasts and birds did not devour her unless ordered by Gualtieri."}, {"front": "Where were Gualtieri's children actually sent to be raised?", "back": "Bologna"}, {"front": "Term: Certes", "back": "Definition: Certainly; assuredly."}, {"front": "What was the sex of the second child born to Griselda?", "back": "Male"}, {"front": "How did the vassals perceive Gualtieri during the years he claimed to have killed his children?", "back": "They blamed him for his cruelty and felt deep compassion for Griselda."}, {"front": "How many years passed after the girl's birth before Gualtieri put his wife to the 'final proof'?", "back": "Thirteen years or more."}, {"front": "What false claim did Gualtieri use to justify putting Griselda away?", "back": "He forged counterfeit letters from the Pope granting a dispensation for divorce."}, {"front": "What did Gualtieri tell Griselda she could take with her when she left his house?", "back": "The dowry she brought him."}, {"front": "Why did Griselda ask to keep a single 'shift' (chemise) when she was sent away?", "back": "To cover the body that had borne his children and as guerdon for her virginity."}, {"front": "In what state did Griselda leave Gualtieri's house after the divorce was announced?", "back": "Barefoot, bareheaded, and wearing only a shift."}, {"front": "Why was Giannucolo not surprised by his daughter's return?", "back": "He never believed the Marquis would keep a peasant girl as his wife forever."}, {"front": "What task did Gualtieri recall Griselda to perform while she lived at her father's cottage?", "back": "To set the chambers in order and prepare for his 'new bride'."}, {"front": "What was the actual identity of the 'new bride' Gualtieri brought from Bologna?", "back": "His and Griselda's daughter."}, {"front": "How old was the daughter when she was presented as the new bride?", "back": "Twelve years old."}, {"front": "How old was the son when he returned from Bologna?", "back": "About six years old."}, {"front": "What earnest entreaty did Griselda make to Gualtieri regarding the new bride?", "back": "Not to inflict the same tribulations on her because she was delicately nurtured."}, {"front": "According to Gualtieri, why did he subject Griselda to such harsh trials?", "back": "To teach her how to be a wife and to ensure his own perpetual peace."}, {"front": "Term: Dissemble", "back": "Definition: To conceal one's true feelings or intentions; to pretend."}, {"front": "What did Gualtieri do for Giannucolo at the end of the story?", "back": "He established him in honor as his father-in-law."}, {"front": "What was Dioneo's verdict on Gualtieri's behavior at the end of the tale?", "back": "He called it a 'piece of mad folly' and a pity it turned out well."}, {"front": "According to Dioneo, where do the heavens sometimes let fall 'spirits divine'?", "back": "Into the cots of the poor."}, {"front": "Which famous author translated this tale into Latin in 1374?", "back": "Petrarch"}, {"front": "Which English poet retold the story of Griselda in 'The Clerk's Tale'?", "back": "Chaucer"}, {"front": "How did the brigata react to the tale of Griselda compared to others?", "back": "They responded more strongly than to any other tale in the collection."}, {"front": "How many days had the brigata been away from Florence at the book's conclusion?", "back": "Fifteen days."}, {"front": "Why did the King decide it was time for the company to return to Florence?", "back": "To avoid weariness and prevent outsiders from joining and destroying their pleasure."}, {"front": "Where did the group set forth from, and eventually return to, in Florence?", "back": "Santa Maria Novella"}, {"front": "Which member of the brigata sang the final song of the book?", "back": "Fiammetta"}, {"front": "What was the primary emotional theme of Fiammetta's final song?", "back": "Fear of jealousy in love."}, {"front": "How many young men were part of the story-telling company?", "back": "Three"}, {"front": "How many ladies were part of the story-telling company?", "back": "Seven"}, {"front": "What activity did Gualtieri pass his time doing before he was married?", "back": "Hawking and hunting."}, {"front": "How did Griselda describe her rank and position during the divorce scene?", "back": "As a 'loan' from God and Gualtieri rather than a permanent gift."}, {"front": "What did the ladies do for Griselda after the children's identity was revealed?", "back": "They took her to a chamber to re-dress her in her robes of state."}, {"front": "What does Dioneo suggest the vassals' plan to find Gualtieri a wife was?", "back": "Folly, as daughters often resemble neither of their parents."}, {"front": "The character Gualtieri is described as being 'nought magnificent' but instead full of _____.", "back": "Mad folly"}, {"front": "What was Griselda doing when Gualtieri first called her by name on his wedding day?", "back": "Returning from a spring with a bucket of water."}, {"front": "How did Gualtieri's 'new bride' from Bologna arrive at Saluzzo?", "back": "With her brother and a noble company, appearing to be a bride."}, {"front": "What was the public's reaction to the appearance of the 'new bride'?", "back": "They said Gualtieri had made a good exchange and praised her beauty."}, {"front": "Why did Gualtieri refuse to provide Griselda a robe when she left for her father's house?", "back": "He set his 'face as a flint' and remained intentionally harsh to test her."}, {"front": "What was the name of the family Gualtieri's kinswoman married into?", "back": "Counts of Panago"}, {"front": "How did Griselda treat the 'new bride' upon her arrival?", "back": "She received her with 'hearty cheer' and joined in commending her."}, {"front": "What was the specific duration of the festivities after Griselda's restoration?", "back": "Several days."}, {"front": "Where did the three young men go after returning to Florence?", "back": "To find other diversions elsewhere."}, {"front": "What did the ladies of the group do after returning to Florence?", "back": "Repaired to their homes."}, {"front": "In Fiammetta's song, what would she be if Love brought no jealousy?", "back": "The blithest dame there were."}, {"front": "What was Gualtieri's reaction when he realized he was about to weep at Griselda's divorce?", "back": "He suppressed his emotion and set his face like a flint."}, {"front": "Whom did Gualtieri say he 'loves more dearly than aught else' at the conclusion?", "back": "Griselda"}, {"front": "How did the vassals respond to the revelation that the children were alive?", "back": "They were overjoyed but continued to censure Gualtieri's harshness."}, {"front": "What kind of clothing did Griselda wear while serving at the second wedding feast?", "back": "Sorry garments of coarse romagnole."}, {"front": "What was the reaction of the daughter and son when they learned Griselda was their mother?", "back": "They were 'all astonied'."}, {"front": "What hour was it when the King marked the sun was low on the final day?", "back": "Nigh the vesper hour."}, {"front": "How did Petrarch react to reading the story of Patient Griselda?", "back": "He wept."}, {"front": "What is the total number of tales told by the brigata in the Decameron?", "back": "One hundred"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
