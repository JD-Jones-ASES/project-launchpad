<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who are the three writers known as the \"tre corone\" (three crowns) of Italian literature?", "back": "Dante Alighieri, Francesco Petrarch, and Giovanni Boccaccio."}, {"front": "Which Italian dialect was established as the literary language of the nation by the Three Crowns?", "back": "The Tuscan dialect."}, {"front": "What is the supreme achievement of medieval literature written by Dante Alighieri?", "back": "The Divine Comedy (Commedia)."}, {"front": "Term: Allegory", "back": "Definition: A narrative where characters and events represent abstract ideas or moral principles."}, {"front": "What interlocking three-line rhyme scheme did Dante invent for his epic poem?", "back": "Terza rima."}, {"front": "Which three realms are described in Dante's journey during the Divine Comedy?", "back": "Hell (Inferno), Purgatory (Purgatorio), and Paradise (Paradiso)."}, {"front": "Dante proved that the _____ language could be used for the highest literary art instead of just Latin.", "back": "Italian"}, {"front": "Who are the two figures that guide Dante through the afterlife in his epic poem?", "back": "The Roman poet Virgil and his beloved Beatrice."}, {"front": "In which city did Dante Alighieri die in 1321 after being exiled from Florence?", "back": "Ravenna."}, {"front": "Which writer is celebrated as the \"poet of the inner life\" and the \"father of humanism\"?", "back": "Francesco Petrarch."}, {"front": "What is the title of Petrarch's collection of 366 poems, primarily sonnets?", "back": "The Canzoniere (or \"songbook\")."}, {"front": "Who was the idealized beloved to whom Petrarch addressed most of his poems?", "back": "Laura."}, {"front": "What was Petrarch's primary contribution to the intellectual foundations of the Renaissance?", "back": "Recovering, copying, and studying classical Latin texts."}, {"front": "In 1341, Petrarch became the first person since antiquity to be honored with what title in Rome?", "back": "Poet laureate."}, {"front": "What literary form did Boccaccio master that his predecessors Dante and Petrarch had not attempted?", "back": "Prose narrative."}, {"front": "Which work is regarded as the first great achievement of European prose fiction?", "back": "The Decameron."}, {"front": "What was the nature of the relationship between Petrarch and Boccaccio starting in 1350?", "back": "They were close friends until Petrarch's death in 1374."}, {"front": "Term: Exemplum", "back": "Definition: A short illustrative story used in medieval sermons to teach a moral lesson."}, {"front": "How does Boccaccio typically transform the traditional medieval exemplum in the Decameron?", "back": "He subverts it by making the stated moral ironic, ambiguous, or irrelevant."}, {"front": "Term: Fabliau", "back": "Definition: A short, humorous, and often bawdy French verse tale featuring tricksters and cuckolded husbands."}, {"front": "What qualities did Boccaccio add to the raw plots he adopted from the fabliau tradition?", "back": "Psychological depth, narrative elegance, and social commentary."}, {"front": "The _____ tradition consists of long narratives focused on chivalric adventure, courtly love, and the supernatural.", "back": "romance"}, {"front": "Unlike traditional romances that focus on the marvelous, Boccaccio's tales are typically grounded in _____.", "back": "the real (ordinary life)"}, {"front": "Which Roman comic playwrights influenced Boccaccio's literary craft?", "back": "Plautus and Terence."}, {"front": "Which classical author provided the rhetorical models that influenced Boccaccio's writing?", "back": "Cicero."}, {"front": "Term: Novella", "back": "Definition: A short prose tale, typically realistic and focused on a single incident or turning point."}, {"front": "What was the title of the anonymous 13th-century Italian collection of very short tales that preceded the Decameron?", "back": "The Novellino."}, {"front": "The Decameron is considered the birthplace of which modern literary tradition?", "back": "The European short story tradition."}, {"front": "Which English poet composed the Canterbury Tales a generation after Boccaccio?", "back": "Geoffrey Chaucer."}, {"front": "Term: Frame narrative", "back": "Definition: An outer narrative that contains and motivates a series of inner stories."}, {"front": "What is the specific frame narrative used in Chaucer's Canterbury Tales?", "back": "A group of pilgrims traveling to the shrine of Thomas Becket tell stories to pass the time."}, {"front": "Which story in the Canterbury Tales is a retelling of Boccaccio's tale of Patient Griselda?", "back": "The Clerk’s Tale."}, {"front": "Chaucer's Franklin's Tale echoes the themes of which specific Decameron story?", "back": "The Magic Garden (X.5)."}, {"front": "How do the narrators in Boccaccio's Decameron differ socially from those in Chaucer's Canterbury Tales?", "back": "Boccaccio's are refined aristocrats, while Chaucer's are a diverse cross-section of society."}, {"front": "While Boccaccio organizes his tales by daily themes, how does Chaucer let his stories emerge?", "back": "From the personalities and rivalries of the individual pilgrims."}, {"front": "In the Divine Comedy, what does Dante's journey represent allegorically?", "back": "The soul's journey toward God."}, {"front": "What was the primary source of exempla for medieval preachers?", "back": "The Bible, classical literature, and popular tradition."}, {"front": "Which city was the site of the first public lectures on the Divine Comedy, delivered by Boccaccio?", "back": "Florence."}, {"front": "Petrarch's Canzoniere established the conventions of _____ poetry that dominated Europe for three centuries.", "back": "love"}, {"front": "Why was Dante Alighieri permanently exiled from Florence in 1302?", "back": "For political reasons."}, {"front": "The word \"novella\" is derived from the Italian word for _____.", "back": "new (or news)"}, {"front": "What are two examples of modern short story practitioners who are considered successors to Boccaccio’s tradition?", "back": "Maupassant and Chekhov."}, {"front": "Name two of Chaucer's tales that rework plots also found in Boccaccio's work.", "back": "The Reeve’s Tale and the Miller’s Tale."}, {"front": "Which classical work by Ovid is cited as an influence on Boccaccio's writing?", "back": "Metamorphoses."}, {"front": "Where did Boccaccio spend his years absorbing French and Italian romances?", "back": "Naples."}, {"front": "What is the typical length of the stories found in the Novellino compared to Boccaccio's novellas?", "back": "The Novellino stories are very brief, often only a paragraph or two."}, {"front": "Which Renaissance Italian writers are mentioned as part of the lineage passing from Boccaccio to the modern short story?", "back": "Bandello and Straparola."}, {"front": "True or False: Geoffrey Chaucer explicitly mentions Boccaccio by name in the Canterbury Tales.", "back": "False."}, {"front": "What is the plural form of the term \"fabliau\"?", "back": "Fabliaux."}, {"front": "What is the plural form of the term \"exemplum\"?", "back": "Exempla."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
