<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What should be a reader's primary focus when first encountering the tales of the Decameron?", "back": "The stories themselves as works of entertainment designed to surprise and delight."}, {"front": "In the Decameron, who is responsible for narrating each individual tale?", "back": "A specific member of the brigata."}, {"front": "Which narrator is characterized as an irreverent joker who tells distinct types of tales?", "back": "Dioneo."}, {"front": "Filomena's tales typically focus on which two central themes?", "back": "Fortune and adventure."}, {"front": "Boccaccio's use of narrators is frequently compared to what other artistic role?", "back": "A playwright using characters."}, {"front": "Where does the \"real interest\" often lie regarding the Decameron's narrators?", "back": "In the gap between what a narrator says a tale means and its actual meaning."}, {"front": "What literary mode of expression involves the intended meaning being different from or opposite to the literal meaning?", "back": "Irony."}, {"front": "How does Boccaccio use irony when a narrator praises a character?", "back": "The reader is often meant to condemn the praised character."}, {"front": "What does a \"simple or too neat\" conclusion in a tale often suggest about Boccaccio’s intent?", "back": "Boccaccio is likely being ironic."}, {"front": "Why does the Decameron resist providing clear \"lessons\" or simple morals?", "back": "The tales are designed to be morally complex rather than providing easy answers."}, {"front": "Which character in Tale I.1 is described as both a monster and a brilliant performer?", "back": "Ser Ciappelletto."}, {"front": "What two conflicting qualities define the character of patient Griselda in Tale X.10?", "back": "She is both admirable and disturbing."}, {"front": "The clever wives of Day VII are described as being both sympathetic and _____.", "back": "Transgressive."}, {"front": "How did medieval audiences' perception of moral ambiguity differ from that of many modern readers?", "back": "They found moral ambiguities less troubling and expected to exercise their own judgment."}, {"front": "What was a common feature of medieval literature when presenting complex moral situations?", "back": "Leaving the situations unresolved for the audience to debate."}, {"front": "In the architecture of the Decameron, what elements are described as deliberate rather than accidental?", "back": "The themes of each Day, the order of tales, and the choice of narrator."}, {"front": "According to the book's architecture, what is the thematic starting point of the Decameron?", "back": "Comedy and satire."}, {"front": "What is the thematic destination of the Decameron’s overall narrative arc?", "back": "Nobility and virtue."}, {"front": "What does the Edwardian term \"whither\" mean in the J.M. Rigg translation?", "back": "Where."}, {"front": "What does the Edwardian term \"hath\" mean in the J.M. Rigg translation?", "back": "Has."}, {"front": "What is the meaning of the formal phrase \"prithee\"?", "back": "I pray you."}, {"front": "What term describes tales that deal frankly with sexual desire and physical appetites?", "back": "Bawdy."}, {"front": "How does Boccaccio typically portray members of the clergy, such as monks and friars?", "back": "As hypocrites."}, {"front": "What is the primary target of Boccaccio's satire throughout the Decameron?", "back": "Hypocrisy."}, {"front": "Term: Beffa.", "back": "Definition: A practical joke or elaborate trick that celebrates cleverness and punishes gullibility."}, {"front": "What is the name for the medieval literary tradition consisting of comic, often earthy, tales?", "back": "The fabliau."}, {"front": "What was the purpose of the earthy humor found in medieval literary traditions?", "back": "To illuminate truths about human nature."}, {"front": "Medieval satire of corrupt clergy was intended to attack hypocrisy rather than attacking _____.", "back": "Faith."}, {"front": "Why is Fra Cipolla (VI.10) considered a comic figure by the reader?", "back": "The reader sees through his performance while the internal audience takes him seriously."}, {"front": "When studying tales with sexual content like Masetto (III.1), what should the focus be on?", "back": "Literary and social implications rather than salacious details."}, {"front": "How does the narrator's interpretation sometimes relate to the actual meaning of a tale?", "back": "It may be deliberately wrong or incomplete."}, {"front": "In what way do the tales within a specific Day relate to one another?", "back": "They echo and contrast with each other."}, {"front": "What is the defining characteristic of a comic exemplum?", "back": "A humorous story used to illustrate a moral point or human truth."}, {"front": "What specific quality in characters is often celebrated by the beffa tradition?", "back": "Cleverness."}, {"front": "What specific quality in characters is often punished by the beffa tradition?", "back": "Gullibility."}, {"front": "What is the primary function of the brigata in the Decameron's structure?", "back": "They serve as the frame narrators who tell the stories."}, {"front": "The satire of the clergy in the Decameron is part of which broader tradition?", "back": "A Christian tradition of attacking hypocrisy."}, {"front": "How does the text describe Boccaccio’s status as a writer before any literary analysis is applied?", "back": "He was a supreme entertainer."}, {"front": "What is the effect of using narrators with distinct personalities in the Decameron?", "back": "It adds layers of perspective and potential unreliability to the tales."}, {"front": "A character's words meaning one thing to the story's audience and another to the reader is an example of _____.", "back": "Irony."}, {"front": "What is the likely ironic intent of a narrator who praises a character’s virtue while that character acts foolishly?", "back": "To expose the character's foolishness."}, {"front": "Which medieval tradition coexisted with deep religious devotion and utilized earthy humor?", "back": "The fabliau."}, {"front": "What do the tales of the Decameron invite from their audience instead of easy answers?", "back": "Discussion and debate."}, {"front": "How does Boccaccio's irony manifest in the \"moral\" stated at the end of a tale?", "back": "The stated moral may be the exact opposite of the lesson intended for the reader."}, {"front": "In what century was the Decameron produced?", "back": "The fourteenth century."}, {"front": "How are modern readers advised to engage with uncomfortable dimensions of the Decameron?", "back": "By reading them honestly as part of a serious work of literature."}, {"front": "What is the relationship between the themes of successive Days in the Decameron?", "back": "They build and develop upon each other."}, {"front": "What quality of the J.M. Rigg translation might be challenging for modern readers?", "back": "The formal and sometimes stiff Edwardian English."}, {"front": "Boccaccio's critique of a trickster can sometimes be hidden within a tale that appears to _____.", "back": "Celebrate a clever trick."}, {"front": "What should students understand about the \"internal audience\" in tales like Fra Cipolla?", "back": "They take the performance seriously, unlike the reader."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
