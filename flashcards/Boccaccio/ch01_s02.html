    <script>

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

    <script>
    var CARDS = [{"front": "According to the text, what should be a reader's primary focus when first encountering the tales of the Decameron?", "back": "Enjoying them as stories crafted to entertain, surprise, and delight."}, {"front": "What collective term refers to the group of ten narrators who tell the stories in the Decameron?", "back": "The brigata."}, {"front": "Which member of the brigata is characterized as an irreverent joker?", "back": "Dioneo."}, {"front": "What specific types of stories are favored by the narrator Filomena?", "back": "Stories of fortune and adventure."}, {"front": "How does Boccaccio use his narrators in a way that mirrors a playwright’s use of characters?", "back": "By making them characters who are not always reliable."}, {"front": "Where does the \"real interest\" often lie regarding the narrator's role in a tale?", "back": "In the gap between what the narrator says a tale means and its actual meaning."}, {"front": "Concept: Irony", "back": "Definition: A mode of expression where the intended meaning is different from or opposite to the literal meaning."}, {"front": "How might Boccaccio use irony when a narrator praises a character's virtue?", "back": "The praise may actually be exposing the character's foolishness."}, {"front": "Under what condition is Boccaccio likely being ironic at the end of a tale?", "back": "When a stated moral is the exact opposite of the lesson the reader is meant to draw."}, {"front": "What is a common sign that a situation in the Decameron is being treated ironically?", "back": "The situation or moral seems too simple or too neat."}, {"front": "Why does the text advise readers to resist looking for a clear \"lesson\" in the Decameron?", "back": "Because the tales are designed to be morally complex and ambiguous."}, {"front": "How did medieval audiences' reaction to moral ambiguity differ from that of modern readers?", "back": "Medieval audiences found ambiguity less troubling and trusted their own judgment."}, {"front": "In what way is the character Ser Ciappelletto (I.1) described as morally dualistic?", "back": "He is both a monster and a brilliant performer."}, {"front": "What conflicting traits define the character of the patient Griselda (X.10)?", "back": "She is described as both admirable and disturbing."}, {"front": "What two adjectives are used to describe the clever wives of Day VII?", "back": "Sympathetic and transgressive."}, {"front": "How do the tales invite the audience to interact with the text?", "back": "By encouraging discussion and debate rather than providing easy answers."}, {"front": "What three elements constitute the deliberate \"architecture\" of the Decameron?", "back": "The themes of each Day, the order of tales, and the choice of narrator."}, {"front": "Toward what themes does the overall arc of the Decameron move as it progresses?", "back": "Toward nobility and virtue."}, {"front": "The overall arc of the Decameron begins with which two literary modes?", "back": "Comedy and satire."}, {"front": "What is a stylistic characteristic of J.M. Rigg's English translation?", "back": "It uses formal Edwardian English which can feel stiff or old-fashioned."}, {"front": "In the context of the Rigg translation, what does the archaic word \"whither\" mean?", "back": "Where."}, {"front": "In the context of the Rigg translation, what does the archaic word \"hath\" mean?", "back": "Has."}, {"front": "In the context of the Rigg translation, what does the archaic word \"prithee\" mean?", "back": "I pray you."}, {"front": "How does the Decameron frequently portray members of the clergy?", "back": "As hypocrites or satirized figures."}, {"front": "What is the primary target of Boccaccio's satire in his anticlerical tales?", "back": "Hypocrisy, or the gap between what people profess and how they behave."}, {"front": "Term: Fabliau", "back": "Definition: A literary tradition of comic, often bawdy, tales used to illuminate truths about human nature."}, {"front": "Term: Beffa", "back": "Definition: A practical joke or elaborate trick that serves as a central motif in the Decameron."}, {"front": "What qualities does the \"beffa\" tradition celebrate?", "back": "Cleverness and the ability to pull off an elaborate trick."}, {"front": "What human trait is typically punished in the \"beffa\" tradition?", "back": "Gullibility."}, {"front": "With what tone is the punishment of gullibility often delivered in a beffa?", "back": "Comic cruelty."}, {"front": "Term: Comic exemplum", "back": "Definition: A humorous story used within a literary tradition to illustrate a point or moral lesson."}, {"front": "How should the \"bawdy\" tales be framed to understand their historical context?", "back": "As part of a medieval tolerance for earthy humor that coexisted with religious devotion."}, {"front": "What is the pedagogical goal of studying tales where sexual content is central, such as III.1 (Masetto)?", "back": "To understand the literary and social implications rather than salacious details."}, {"front": "Why is the character Fra Cipolla (VI.10) considered a comic figure for the reader?", "back": "The audience in the story takes him seriously while the reader sees through his performance."}, {"front": "How does the narrator's interpretation of a tale sometimes function ironically?", "back": "The interpretation may be deliberately wrong or incomplete to challenge the reader."}, {"front": "The Decameron's tales are crafted to work as _____ before they work on any other level.", "back": "entertainment"}, {"front": "Boccaccio's satire is directed not at _____ itself but at the hypocrisy of religious figures.", "back": "faith"}, {"front": "When a tale seems to celebrate a clever trick, what might Boccaccio actually be critiquing?", "back": "The trickster."}, {"front": "Medieval literature often presented complex situations without _____ them.", "back": "resolving"}, {"front": "The themes of successive Days in the Decameron are designed to build and _____.", "back": "develop"}, {"front": "What is the intended reader response to the characters Ser Ciappelletto and Fra Cipolla?", "back": "To see through their performances and recognize the irony."}, {"front": "Boccaccio is described as one of the great _____ in Western literature.", "back": "ironists"}, {"front": "What is the focus of the commentary for tales containing \"bawdy\" content?", "back": "What the tale reveals about Boccaccio's world and literary art."}, {"front": "According to the teacher note, medieval satire of corrupt clergy was actually part of a _____ tradition.", "back": "Christian"}, {"front": "How should a reader interpret a narrator's commentary that contradicts a tale's effect?", "back": "As a moment of irony where the reader is meant to draw their own lesson."}, {"front": "Boccaccio's irony is described as _____, meaning it is found throughout the entire work.", "back": "pervasive"}, {"front": "The patient _____ is a character noted for being both admirable and disturbing.", "back": "Griselda"}, {"front": "What specific human appetites do the \"bawdy\" tales frankly address?", "back": "Sexual desire and the appetites of the body."}, {"front": "How does the order of the tales relate to Boccaccio’s creative process?", "back": "It is deliberate and not accidental."}, {"front": "The narrator's interpretation of a tale is often where the real _____ lies.", "back": "interest"}, {"front": "What is the relationship between the narrator and the tale they tell in the Decameron?", "back": "The narrator matters because their personality influences the tale's type and meaning."}, {"front": "Boccaccio rarely says what he means _____.", "back": "directly"}, {"front": "What does a narrator praise when Boccaccio intends the reader to condemn a character?", "back": "The character's supposed virtues or cleverness."}, {"front": "Medieval audiences were trusted to exercise their own _____ when reading morally complex tales.", "back": "judgment"}, {"front": "The \"architecture\" of the book involves watching for _____ between tales within a Day.", "back": "patterns"}, {"front": "What is the primary function of footnotes in the J.M. Rigg translation?", "back": "To help with unfamiliar or archaic vocabulary."}, {"front": "Boccaccio portrays monks, friars, and nuns in many tales as _____.", "back": "hypocrites"}, {"front": "The beffa tradition often results in the _____ of the gullible.", "back": "punishment"}, {"front": "How does the text describe Boccaccio’s role as an author in terms of entertainment?", "back": "He was a supreme entertainer."}, {"front": "What is the effect of the \"gap\" between a character's words to their audience and their meaning to the reader?", "back": "It creates pervasive irony."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
