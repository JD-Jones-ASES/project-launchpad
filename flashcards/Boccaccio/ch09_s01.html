<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 9, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What central question regarding the 'beffa' (trick) is raised by the transition from Day VII to Day VIII in the Decameron?", "back": "When does a clever joke stop being funny and become an act of cruelty?"}, {"front": "What specific stone does Calandrino believe he has found in the Mugnone stream in Tale VIII.3?", "back": "The heliotrope (a stone of invisibility)."}, {"front": "How does the outcome for the victim in the Calandrino tale (VIII.3) differ from the victim in the Scholar and the Widow (VIII.7)?", "back": "Calandrino suffers no lasting harm, while Elena is physically and psychologically devastated."}, {"front": "What shared quality of mind does Boccaccio use to link harmless pranks and lethal revenge in Day VIII?", "back": "Ingegno (wit or intelligence)."}, {"front": "What literary style is defined by Boccaccio's use of real Florentine streets and everyday artisans as characters?", "back": "Comic realism."}, {"front": "In the context of Boccaccio's Florence, what does the term 'Oltrarno' literally mean?", "back": "Beyond the Arno."}, {"front": "Which district of Florence was historically home to the artisans and craftsmen featured in the Calandrino tales?", "back": "The Oltrarno."}, {"front": "What 16th-century improvisational theater tradition was anticipated by the stock characters and situations in Boccaccio’s Calandrino tales?", "back": "Commedia dell'arte."}, {"front": "In Tale VIII.7, how does the scholar punish Elena for making him wait in the cold?", "back": "He traps her on a tower roof in the scorching July sun."}, {"front": "Who is the narrator of Tale VIII.7, the story of the Scholar and the Widow?", "back": "Pampinea."}, {"front": "Why should a reader not assume that a narrator's approval in the Decameron reflects Boccaccio's own opinion?", "back": "The multiple narrators create a polyphony of perspectives that may differ from the author's."}, {"front": "What medieval Italian social institution acknowledged the right to personal vengeance under specific circumstances?", "back": "Vendetta."}, {"front": "The long-standing conflict between which two factions divided Florence and other Italian cities for centuries?", "back": "The Guelphs and Ghibellines."}, {"front": "In Tale VIII.1, how does Gulfardo recover the money he paid the merchant's wife for sex?", "back": "He tells the husband he returned the 'loan' to the wife in her presence."}, {"front": "In Tale VIII.2, what object does the Priest of Varlungo use as a pledge to the farmer's wife?", "back": "His cloak."}, {"front": "Who is the victim of the 'beffa' in Tale VIII.4, where a widow and her brothers use a bishop to catch a lecherous official?", "back": "The Provost of Fiesole."}, {"front": "In Tale VIII.5, what embarrassing event happens to the three judges from the Marches while they are in court?", "back": "Their breeches (trousers) are stolen."}, {"front": "What specific beverage is used in the fake divination ritual during the 'Calandrino and the Pig' tale (VIII.6)?", "back": "Vernaccia wine."}, {"front": "In Tale VIII.8, what unconventional resolution do Spinelloccio and Zeppa reach after discovering their mutual infidelities?", "back": "They agree to share their wives and arrangements openly."}, {"front": "What is the profession of Maestro Simone, the victim of Bruno and Buffalmacco in Tale VIII.9?", "back": "Physician (doctor)."}, {"front": "What character flaw makes the educated Maestro Simone vulnerable to the tricks of the painters?", "back": "Intellectual vanity."}, {"front": "In Tale VIII.10, which city serves as the setting for the 'commercial warfare' between Salabaetto and Jancofiore?", "back": "Palermo, Sicily."}, {"front": "Which of Chaucer’s Canterbury Tales is cited for sharing the same 'fabliau energy' as Boccaccio’s Day VIII?", "back": "The Reeve's Tale."}, {"front": "According to the comparison with Chaucer, what is the root cause of gullibility in characters like Calandrino and Chauntecleer?", "back": "A failure of self-knowledge (often driven by vanity)."}, {"front": "In Tale VIII.3, how does Calandrino’s wife unknowingly break the 'spell' of his invisibility?", "back": "She scolds and beats him when he returns home."}, {"front": "In Tale VIII.6, how do Bruno and Buffalmacco profit financially from the theft of Calandrino's pig?", "back": "They force Calandrino to bribe them with capons to keep his 'guilt' secret."}, {"front": "What geographic region did Boccaccio associate with 'rustic naivety' in his tales about stingy judges?", "back": "The Marches (Marche)."}, {"front": "How does the setting of Day VIII’s opening and closing tales (Milan and Sicily) serve to frame the day?", "back": "They provide a geographic frame for the Florentine tales at the center."}, {"front": "In Tale VIII.10, how does Salabaetto eventually defeat the courtesan Jancofiore?", "back": "He uses an elaborate counter-trick to recover his financial losses."}, {"front": "What specific town overlooking Florence is mentioned in Tale VIII.4 as the site of an ancient Etruscan settlement?", "back": "Fiesole."}, {"front": "Which two characters are the recurring tricksters in the Calandrino and Maestro Simone stories?", "back": "Bruno and Buffalmacco."}, {"front": "In the Scholar and the Widow (VIII.7), why does the scholar claim his revenge is a triumph for his class?", "back": "It asserts the superiority of a learned man's ingegno over a woman's beauty."}, {"front": "What is the primary difference between a 'fabliau' style tale and the dark revenge found in VIII.7?", "back": "Fabliaux are typically bawdy and morally neutral, whereas VIII.7 is physically cruel and disturbing."}, {"front": "What distinguishes Calandrino from other victims like Maestro Simone in terms of social class?", "back": "Calandrino is an uneducated painter/artisan, while Simone is an educated doctor."}, {"front": "The 'spectrum of cruelty' exercise in Day VIII ranks tales based on what primary criterion?", "back": "The severity and proportionality of the harm inflicted on the victim."}, {"front": "Why is the setting of Tale VIII.3 considered a move away from 'allegorical landscapes'?", "back": "It uses specific, recognizable landmarks like the Porta San Gallo and the Mugnone stream."}, {"front": "In Tale VIII.1, why is the wife of Gasparruolo unable to complain about not being paid by Gulfardo?", "back": "Doing so would reveal her adultery to her husband."}, {"front": "What role does the Bishop play in the 'Provost of Fiesole' (VIII.4) story?", "back": "He serves as the authority figure who catches the Provost in a shameful act."}, {"front": "True or False: Calandrino was a historical person living in Boccaccio's Florence.", "back": "True."}, {"front": "In Tale VIII.9, where do Bruno and Buffalmacco ultimately leave Maestro Simone after tricking him?", "back": "In a ditch full of filth."}, {"front": "What does the narrator Pampinea think of the scholar's actions in Tale VIII.7?", "back": "She appears to approve of his revenge."}, {"front": "Which of Chaucer's tales involves students taking revenge on a miller, paralleling the energy of Day VIII?", "back": "The Reeve's Tale."}, {"front": "What was the 'heliotrope' stone traditionally believed to do in medieval lore?", "back": "Render the wearer invisible."}, {"front": "In Tale VIII.2, how does the Priest of Varlungo eventually get his cloak back?", "back": "He tricks the farmer's wife into returning it without payment."}, {"front": "How does Tale VIII.8 (Two Friends) differ from most other revenge stories in Day VIII?", "back": "It ends in a peaceful and social equilibrium rather than humiliation or destruction."}, {"front": "What does the term 'beffa' refer to in the context of the Decameron?", "back": "A complex prank or practical joke driven by intelligence."}, {"front": "What does the presence of real historical figures like Bruno and Buffalmacco add to Boccaccio’s stories?", "back": "It grounds the comedy in the recognizable local culture of his audience."}, {"front": "Which tale in Day VIII is described as a 'tale of commercial warfare'?", "back": "The Merchant of Palermo (VIII.10)."}, {"front": "In Tale VIII.6, what is the supposed purpose of the ginger pills used by Bruno and Buffalmacco?", "back": "They are presented as part of a divination ritual to find a thief."}, {"front": "What is the primary ethical problem posed by the scholar’s retaliation in VIII.7?", "back": "The lack of proportionality between his one night of cold and her hours of physical torture."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
