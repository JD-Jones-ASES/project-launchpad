<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is the protagonist of the fifth tale of Day II in the Decameron?", "back": "Andreuccio di Pietro."}, {"front": "Andreuccio di Pietro is a naive young man from the city of _____.", "back": "Perugia"}, {"front": "What is Andreuccio's specific occupation?", "back": "Horse-dealer."}, {"front": "What is the primary reason Andreuccio travels to Naples?", "back": "To buy horses."}, {"front": "How many gold florins does Andreuccio bring with him to Naples?", "back": "Five hundred."}, {"front": "The gold coin of Florence, used as a trusted currency in medieval Europe, is called a _____.", "back": "Florin"}, {"front": "What reckless action does Andreuccio take in the Neapolitan market that attracts thieves?", "back": "He repeatedly shows his purse full of gold florins to show he means business."}, {"front": "How does the Sicilian girl obtain detailed information about Andreuccio’s family?", "back": "From an old Sicilian woman who formerly served Andreuccio's father."}, {"front": "In what city did Andreuccio's father, Pietro, live for a long time before returning to Perugia?", "back": "Palermo"}, {"front": "What specific familial relationship does the Sicilian girl claim to have with Andreuccio?", "back": "She claims to be his long-lost sister."}, {"front": "According to the girl's lie, why did Andreuccio's father leave her behind in Palermo?", "back": "He returned to Perugia and allegedly never bestowed another thought upon her or her mother."}, {"front": "What is the name of the disreputable quarter in Naples where the Sicilian girl lives?", "back": "Evil Hole (Malpertugio)."}, {"front": "What sensory details in the girl's chamber help convince Andreuccio she is a noblewoman?", "back": "The fragrance of roses and orange-blossoms and the presence of sumptuous furniture."}, {"front": "Why does Andreuccio agree to stay the night at the girl's house?", "back": "She warns him that Naples is dangerous to walk through after dark."}, {"front": "How does Andreuccio end up falling into the foul sewer alley?", "back": "He steps on a loose plank in the latrine that is detached from the joist."}, {"front": "What does the Sicilian girl steal from Andreuccio after his fall into the alley?", "back": "His clothes and all five hundred of his gold florins."}, {"front": "What is the name of the girl's 'bully' who threatens Andreuccio from the window?", "back": "Scarabone Buttafuoco."}, {"front": "Why does Andreuccio decide to go to the sea after being robbed?", "back": "To wash off the filth and stench from his fall into the sewer."}, {"front": "Where does Andreuccio hide when he sees two men with a lantern approaching him in the dark?", "back": "A dismantled house."}, {"front": "What warning do the two thieves give Andreuccio regarding the house he was robbed in?", "back": "They tell him he would have been murdered if he had not fallen into the alley."}, {"front": "What scheme do the two thieves invite Andreuccio to join?", "back": "Robbing the tomb of the recently deceased Archbishop of Naples."}, {"front": "Who was the Archbishop of Naples whose tomb the characters plan to despoil?", "back": "Messer Filippo Minutolo."}, {"front": "What specific valuable item is rumored to be on the Archbishop's finger?", "back": "A ruby ring worth over five hundred gold florins."}, {"front": "Why do the thieves lower Andreuccio into a well on their way to the cathedral?", "back": "To wash the sewer stench off him so he does not smell so 'shrewdly'."}, {"front": "Why do the thieves abandon Andreuccio while he is still at the bottom of the well?", "back": "They see a company of patrols approaching and flee to avoid capture."}, {"front": "How is Andreuccio unintentionally rescued from the well?", "back": "Thirsty patrols pull on the rope thinking they are hauling up a bucket of water."}, {"front": "Why do the patrols flee from the well after pulling up the rope?", "back": "They are terrified when Andreuccio suddenly appears and clutches the brink of the well."}, {"front": "Where is the Archbishop's marble tomb located?", "back": "The Cathedral of Naples."}, {"front": "How do the thieves compel Andreuccio to enter the tomb first?", "back": "They threaten to kill him with an iron crowbar if he refuses."}, {"front": "What is the first thing Andreuccio does upon entering the Archbishop's tomb?", "back": "He takes the ruby ring and puts it on his own finger."}, {"front": "Which items does Andreuccio hand out of the tomb to the thieves?", "back": "The crosier, mitre, gloves, and other valuable trappings."}, {"front": "How do the thieves trap Andreuccio inside the tomb?", "back": "They remove the prop holding up the heavy marble lid, locking him inside."}, {"front": "Who arrives at the tomb and attempts to enter it after the thieves have left?", "back": "A group of people, including a priest, who also intended to rob the tomb."}, {"front": "How does Andreuccio frighten away the priest and the second group of graverobbers?", "back": "He grabs the priest's leg as the man is climbing into the tomb."}, {"front": "What does the priest do when Andreuccio grabs his leg in the dark tomb?", "back": "He utters a 'prodigious yell' and flees in a panic with the others."}, {"front": "What is the value of the ruby ring Andreuccio recovers compared to his original capital?", "back": "It is worth more than the five hundred florins he originally lost."}, {"front": "Where does Andreuccio go immediately after escaping the cathedral at daybreak?", "back": "His inn."}, {"front": "What does Andreuccio's host advise him to do after hearing of his night's adventures?", "back": "To leave Naples at once and return to Perugia."}, {"front": "What is the central theme of Day II of the Decameron, as illustrated by Andreuccio's story?", "back": "Fortune's Reversals."}, {"front": "How many distinct dangerous episodes structure the narrative of Andreuccio's night in Naples?", "back": "Three."}, {"front": "Who is the narrator of the fifth tale of Day II?", "back": "Fiammetta."}, {"front": "How is Naples characterized as a 'character' within the story?", "back": "It is depicted as dark, labyrinthine, dangerous, and full of opportunistic people."}, {"front": "What character transformation does Andreuccio undergo during the single night in Naples?", "back": "He changes from a naive provincial to a quick-witted man who can think on his feet."}, {"front": "Term: Perforce", "back": "Definition: By necessity; inevitably."}, {"front": "Term: Contrive", "back": "Definition: To devise or plan cleverly; to bring about through ingenuity."}, {"front": "According to the girl's story, why was her family granted an ample pension by King Charles?", "back": "As compensation for losses sustained while acting as staunch Guelfs in Sicily."}, {"front": "Why does Andreuccio hide the ring and tell the thieves he cannot find it?", "back": "He suspects they will abandon him once they have all the valuables."}, {"front": "At what time of day does Andreuccio arrive at the coast before returning to his inn?", "back": "Daybreak."}, {"front": "Which street does Andreuccio take to move toward the city's 'steep' before encountering the thieves?", "back": "Ruga Catalana."}, {"front": "What does Andreuccio find lying by the well after the patrols flee?", "back": "The patrols' arms, bucklers, and surcoats."}, {"front": "What is the name of the Sicilian girl who swindles Andreuccio?", "back": "Fiordaliso."}, {"front": "How did Fiordaliso’s 'sisterly' narrative explain her husband's current absence?", "back": "She claimed he was away, though she did not specify where."}, {"front": "How does Boccaccio describe the physical state of Andreuccio after his fall into the alley?", "back": "He is 'soused' from head to foot in ordure."}, {"front": "What does Andreuccio do with his stockings and doublet before the fall?", "back": "He lays them on the bed's head."}, {"front": "What specific fear does Andreuccio have while trapped in the tomb with the corpse?", "back": "He fears perishing of hunger and fetid odors or being hanged as a thief."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
