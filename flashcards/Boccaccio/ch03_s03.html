    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "From which city did Andreuccio di Pietro originate?", "back": "Perugia."}, {"front": "What was Andreuccio's profession?", "back": "Horse-dealer."}, {"front": "How much gold did Andreuccio bring to Naples to purchase horses?", "back": "Five hundred gold florins."}, {"front": "What mistake did Andreuccio make in the Naples marketplace that attracted swindlers?", "back": "He repeatedly showed his purse of gold florins to prove he meant business."}, {"front": "How did the Sicilian girl obtain detailed information about Andreuccio's family?", "back": "She questioned an old woman who had served Andreuccio's father."}, {"front": "What was the name of Andreuccio's father?", "back": "Pietro."}, {"front": "In what Sicilian city did Andreuccio’s father live before returning to Perugia?", "back": "Palermo."}, {"front": "What was the name of the dangerous quarter where the Sicilian girl lived?", "back": "Evil Hole."}, {"front": "What relationship did the Sicilian girl claim to have with Andreuccio?", "back": "She claimed to be his long-lost sister."}, {"front": "According to the girl's story, why did her father leave her in Palermo?", "back": "He returned to Perugia and never bestowed another thought on her or her mother."}, {"front": "Why did the Sicilian girl claim she and her husband fled to Naples?", "back": "They were Guelfs whose correspondence with King Charles was discovered by King Frederic."}, {"front": "What sensory details in the girl's chamber convinced Andreuccio she was a 'great lady'?", "back": "The fragrance of roses and orange blossoms, a sumptuous bed, and many dresses."}, {"front": "How did the girl prevent Andreuccio from returning to his inn for supper?", "back": "She feigned offense at his lack of affection and claimed she sent word to the inn that he was staying."}, {"front": "How did Andreuccio fall into the alleyway?", "back": "He stepped on a floor plank that was detached from its joist in the latrine."}, {"front": "What was the immediate physical consequence of Andreuccio’s fall?", "back": "He was soused from head to foot in human waste (ordure)."}, {"front": "What did the Sicilian girl steal from the chamber while Andreuccio was trapped in the alley?", "back": "His clothes and his purse of gold florins."}, {"front": "What was the name of the girl's accomplice/bully who threatened Andreuccio from the window?", "back": "Scarabone Buttafuoco."}, {"front": "What", "back": "He had a black and matted beard and a savage, menacing tone."}, {"front": "How did the neighbors respond to Andreuccio's loud demands for his clothes?", "back": "They scolded him for disturbing their sleep and treated his story as fiction."}, {"front": "Why did Andreuccio resolve to go to the sea after being shut out of the girl's house?", "back": "He wanted to wash off the noisome stench of the sewer filth."}, {"front": "Where did Andreuccio hide to avoid the two men carrying a lantern?", "back": "In a dismantled house."}, {"front": "What did the two thieves tell Andreuccio would have happened if he hadn't fallen into the alley?", "back": "He would have been murdered in his sleep for his money."}, {"front": "Whose tomb did the two thieves plan to rob that night?", "back": "Archbishop Filippo Minutolo."}, {"front": "What specific item of great value was buried with the Archbishop?", "back": "A ruby ring worth over five hundred gold florins."}, {"front": "Why did the thieves take Andreuccio to a well before going to the cathedral?", "back": "They wanted him to wash off his rank odor so he would not stink so badly."}, {"front": "What happened to the thieves while Andreuccio was being washed in the well?", "back": "They fled when they saw a company of thirsty patrols approaching."}, {"front": "Why did the patrols at the well flee in terror?", "back": "They thought they were pulling up a bucket of water but saw a man clutching the brink instead."}, {"front": "How did the thieves convince Andreuccio to enter the Archbishop's tomb?", "back": "They threatened to kill him with an iron crowbar if he refused."}, {"front": "What was Andreuccio's private concern as he entered the tomb to help the thieves?", "back": "He feared they would abandon him once he handed over the treasures."}, {"front": "What did Andreuccio do with the ruby ring as soon as he entered the tomb?", "back": "He put it on his own finger and told the thieves he could not find it."}, {"front": "Which three items did Andreuccio hand up to the thieves from the tomb?", "back": "The crosier, the mitre, and the gloves."}, {"front": "How did the thieves trap Andreuccio inside the tomb?", "back": "They withdrew the prop supporting the heavy marble lid and ran away."}, {"front": "What did Andreuccio do immediately after the tomb was sealed shut?", "back": "He fell into a swoon on the corpse of the Archbishop due to anguish."}, {"front": "Who arrived at the tomb after the first set of thieves had fled?", "back": "A large company of people, including a priest, who also intended to rob it."}, {"front": "How did the priest enter the tomb?", "back": "He leaned over the edge and thrust his legs in to go down feet foremost."}, {"front": "How did Andreuccio escape the tomb when the second group arrived?", "back": "He grabbed the priest's leg, causing the entire group to flee in a panic."}, {"front": "What did Andreuccio do after escaping the cathedral?", "back": "He made his way to the coast and eventually found his inn at daybreak."}, {"front": "What was the final outcome of Andreuccio's trip to Naples?", "back": "He returned to Perugia with a ruby ring instead of the horses he intended to buy."}, {"front": "Term: Florin", "back": "Definition: The gold coin of Florence and a highly trusted currency in medieval Europe."}, {"front": "The neighborhood 'Evil Hole' is described by what characteristic?", "back": "Labyrinthine, dark, and dangerous."}, {"front": "What major lesson does Andreuccio learn during his night in Naples?", "back": "To think on his feet and be less naive in his dealings with strangers."}, {"front": "The narrator Fiammetta compares the frequency of perils in this story to which other character's tale?", "back": "Lauretta."}, {"front": "What was the name of the girl who swindled Andreuccio?", "back": "Fiordaliso."}, {"front": "Why did Andreuccio carry his money on his person at all times?", "back": "He foolishly thought it was the best way to secure himself against risk."}, {"front": "How does the story structure reflect the rising stakes of Andreuccio's adventure?", "back": "It is divided into three distinct episodes, each more dangerous than the last."}, {"front": "What was the estimated worth of the ruby ring compared to Andreuccio's original capital?", "back": "It was worth more than his original five hundred florins."}, {"front": "Why did Andreuccio first decide to stay for supper with the girl?", "back": "He believed her story entirely and felt a sense of 'brother's affection' for her."}, {"front": "What was the name of the street Andreuccio took toward the sea?", "back": "Ruga Catalana."}, {"front": "What was the primary theme of the tales told on Day II of the Decameron?", "back": "Fortune's Reversals."}, {"front": "How did the thieves realize the patrols had been at the well?", "back": "They found the patrols' arms and surcoats lying nearby."}, {"front": "What did the priest say to comfort his companions before entering the tomb?", "back": "He told them 'the dead eat not the living.'"}, {"front": "In what century is this story set?", "back": "The fourteenth century."}, {"front": "Which group does the text describe as 'running to bark at him' like a stranger dog?", "back": "The neighbors of the Sicilian girl."}, {"front": "What motivated Andreuccio to participate in the tomb robbery?", "back": "Cupidity (greed) getting the better of his caution."}, {"front": "The girl's house is described as being in a quarter with a name that implies what?", "back": "Poor or ill character ('Evil Hole')."}, {"front": "Cloze: Andreuccio is described as a young and _____ horse-dealer at the start of the story.", "back": "naive"}, {"front": "What was the date of the fair Andreuccio intended to attend?", "back": "Monday morning."}, {"front": "Which king provided a pension to the 'sister's' supposed husband?", "back": "King Charles."}, {"front": "How did Andreuccio feel after the bully threatened him?", "back": "Despairing and in the 'deepest of dumps.'"}, {"front": "What does the text suggest about the city of Naples as a setting?", "back": "It acts as a character itself—dangerous and full of both peril and opportunity."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
