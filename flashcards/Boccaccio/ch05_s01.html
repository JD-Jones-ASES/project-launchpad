<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to the commentary, what is the primary thematic shift that occurs in Day IV of the Decameron?", "back": "The shift from wit and comic triumph to the devastating reality of tragedy."}, {"front": "In Day IV, what force typically intervenes to separate lovers and cause tragedy?", "back": "The intervention of authority figures such as fathers, brothers, or husbands."}, {"front": "Why does Tancred kill Guiscardo in Novel IV.1?", "back": "Because Ghismonda chose to love him without her father's permission."}, {"front": "In the story of Lisabetta (IV.5), what specific motivation drives her brothers to murder Lorenzo?", "back": "Their commercial calculations regarding the family's interests."}, {"front": "How does Boccaccio characterize love in the context of Day IV's 'natural force' concept?", "back": "As an irresistible force of nature that no human authority can uproot without violence."}, {"front": "Term: Natural Law", "back": "Definition: The principle that certain moral truths are inherent in nature and discoverable by reason, independent of human decree."}, {"front": "In her central speech, what is Ghismonda's first argument in defense of her love?", "back": "That love is a natural force and is therefore blameless."}, {"front": "According to Ghismonda, where does true 'nobiltà' (nobility) originate?", "back": "In character and virtue rather than blood or lineage."}, {"front": "Which other famous Italian author argued that virtue determines nobility in the work 'Convivio'?", "back": "Dante Alighieri."}, {"front": "What is unique about the Author's Preface to Day IV compared to the rest of the Decameron?", "back": "It is the only moment the author speaks in his own voice rather than through the frame story characters."}, {"front": "List the three criticisms Boccaccio addresses in his Preface to Day IV.", "back": "He is too devoted to women, he writes too much of love, and he should seek bread among the wise."}, {"front": "What is the primary lesson of the parable of Filippo Balducci and the 'goslings'?", "back": "That love is inescapable even for those raised in total ignorance of it."}, {"front": "What artistic right does Boccaccio defend in his Preface to Day IV?", "back": "The right of literature to treat the full range of human experience, including desire."}, {"front": "In the context of Day IV, how does the Author's Preface serve a structural purpose?", "back": "It prepares readers for the emotional shift to tragedy by defending love as natural."}, {"front": "The story of Guillaume de Roussillon (IV.9) is derived from which medieval literary tradition?", "back": "The biographical sketches (vidas) of Provencal troubadours."}, {"front": "In medieval literature, what did the motif of the 'eaten heart' symbolize?", "back": "Absolute, all-consuming devotion where the lover is taken into the body of the beloved."}, {"front": "In Novel IV.9, how does the wife respond after eating her lover's heart?", "back": "She declares she will never eat again and commits suicide as an act of defiance."}, {"front": "Why did Boccaccio place the story of Guillaume de Roussillon (IV.9) near the end of Day IV?", "back": "It represents the furthest limit of the day's theme: love annihilated and jealousy pushed to its extreme."}, {"front": "What is the function of Novel IV.2 (Fra Alberto) within the structure of Day IV?", "back": "It serves as a comic counterpoint and ironic relief to the dominant tragic mood."}, {"front": "In Novel IV.3, what factor leads to the destruction of the three Florentine couples in Crete?", "back": "Jealousy and passion unchecked by prudence."}, {"front": "Why is Gerbino executed in Novel IV.4?", "back": "For breaking his grandfather's treaty by attacking a ship to rescue the princess he loved."}, {"front": "What causes the deaths of the lovers in Novel IV.6 (Andreuola and Gabriotto)?", "back": "A sudden, natural seizure (misfortune) rather than human malice."}, {"front": "In Novel IV.7, how does Simona accidentally die while trying to prove her innocence?", "back": "She rubs a poisonous sage leaf on her teeth, just as her lover Pasquino had done."}, {"front": "What is the tragic outcome for Girolamo and Salvestra in Novel IV.8?", "back": "Girolamo dies of grief beside her bed, and Salvestra dies of remorse upon finding him."}, {"front": "How does Day IV conclude in Novel IV.10?", "back": "With a comic escape involving a sleeping potion and a stolen chest, lightening the tone for Day V."}, {"front": "Which Boccaccio poem served as the source for Chaucer’s 'Troilus and Criseyde'?", "back": "Il Filostrato."}, {"front": "Contrast Boccaccio's tragic mode with Chaucer's according to the text.", "back": "Boccaccio is direct and emotionally intense; Chaucer is more meditative and philosophical."}, {"front": "What enduring symbol in Novel IV.5 represents Lisabetta's mourning for Lorenzo?", "back": "A pot of basil watered with her own tears."}, {"front": "What is the 'intellectual centerpiece' of Day IV?", "back": "Ghismonda's speech in defense of her love for Guiscardo."}, {"front": "Boccaccio's defense of the Muses in the Preface suggests they have always inspired _____.", "back": "Great poetry."}, {"front": "According to the 'Teacher Note', which Day IV tale is described as the most psychologically complex?", "back": "Novel IV.1 (Tancred and Ghismonda)."}, {"front": "According to the 'Teacher Note', which Day IV tale is the most emotionally affecting?", "back": "Novel IV.5 (Lisabetta)."}, {"front": "According to the 'Teacher Note', which Day IV tale is the most extreme?", "back": "Novel IV.9 (Guillaume de Roussillon)."}, {"front": "How does Boccaccio distinguish between 'natural desire' and 'moral order'?", "back": "He argues the capacity for love is natural and not inherently sinful, though tragedy arises when authority crushes it."}, {"front": "The Preface’s argument that love is hardwired into human nature supports what broader literary stance?", "back": "Artistic freedom and the right to write about desire without apology."}, {"front": "In the tale of the 'eaten heart', the wife's suicide is framed not as despair, but as _____.", "back": "Defiance against a world where love has been violated."}, {"front": "Which Day IV story is summarized as a 'tale of love thwarted by political obligation and honor'?", "back": "Novel IV.4 (Gerbino and the King of Tunis's Daughter)."}, {"front": "In the story of Fra Alberto (IV.2), who does the friar pretend to be to seduce Madonna Lisetta?", "back": "The Angel Gabriel."}, {"front": "According to Ghismonda, why did Tancred leave her in an 'impossible position' regarding her desires?", "back": "He failed to arrange a second marriage for her after she was widowed."}, {"front": "The theme of Day IV suggests that love is as powerful and irresistible as which force from Day II?", "back": "Fortuna (Fortune)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
