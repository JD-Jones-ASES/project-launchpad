<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Boccaccio.html">&larr; Back to Tales of the Decameron (Boccaccio)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What historical catastrophe provides the backdrop for Boccaccio's masterpiece, *The Decameron*?", "back": "The Black Death of 1348.", "id": "fc01"}, {"front": "What is the main subject matter of the one hundred tales in *The Decameron*?", "back": "Love, trickery, wit, and fortune.", "id": "fc02"}, {"front": "What are the two opening sections of *The Decameron* discussed in the text?", "back": "The Proem and the Introduction to I.", "id": "fc03"}, {"front": "To whom does Boccaccio dedicate his work in the Proem of *The Decameron*?", "back": "To women in love.", "id": "fc04"}, {"front": "What is the *brigata* in *The Decameron*?", "back": "The company of ten young people (seven ladies and three young men) who tell the hundred tales.", "id": "fc05"}, {"front": "Boccaccio's description of the Black Death has been compared to which other famous historical accounts of plagues?", "back": "Thucydides' account of the Plague of Athens (430 BC) and Daniel Defoe's *A Journal of the Plague Year* (1722).", "id": "fc06"}, {"front": "What makes Boccaccio's account of the plague distinctive compared to others like Thucydides'?", "back": "Its unique combination of clinical observation (symptoms, spread) and moral reflection (devastating effect on social bonds like family, friendship, religion, and civic life).", "id": "fc07"}, {"front": "According to the 'What to Watch For' section, how does Boccaccio structure his description of the plague?", "back": "He moves from the general (physical symptoms) to the particular (social and moral consequences).", "id": "fc08"}, {"front": "Provide examples of the breakdown of ordinary human duties during the plague, as described by Boccaccio.", "back": "Parents abandoning children, priests refusing to visit the sick, and the dead being left unburied.", "id": "fc09"}, {"front": "What is highlighted as the 'moral foundation' of *The Decameron*?", "back": "The contrast between the destruction caused by the plague and the *brigata*'s creative response of forming order through companionship and storytelling.", "id": "fc10"}, {"front": "What personal experience does Boccaccio cite as his motivation for writing and providing solace to others?", "back": "His own suffering from an 'aspiring and noble love' and the comfort he received from a friend's discourse.", "id": "fc11"}, {"front": "Why does Boccaccio specifically target 'gentle ladies' as the primary audience for *The Decameron*?", "back": "He believes they harbor secret fires of love, are more confined and restrained than men, have less power to support emotional burdens, and need diversion from melancholy.", "id": "fc12"}, {"front": "How does Boccaccio contrast the ways men and women cope with emotional distress and melancholy?", "back": "Men have many ways of relief and diversion (e.g., going out, hunting, playing), while women are often confined and lack such outlets.", "id": "fc13"}, {"front": "How many stories (novels) are recounted in *The Decameron*, and by how many people over how many days?", "back": "One hundred novels, recounted by an honorable company of seven ladies and three young men over ten days.", "id": "fc14"}, {"front": "What is Boccaccio's analogy for the 'horrid beginning' (the plague description) of *The Decameron*?", "back": "A steep and rugged mountain, beyond which stretches a fair and delectable plain of 'sweets and delights' (the stories).", "id": "fc15"}, {"front": "In what year and city does Boccaccio's description of the deadly pestilence primarily take place?", "back": "The year 1348, in the illustrious city of Florence.", "id": "fc16"}, {"front": "What were the initial physical symptoms of the plague in Florence, as described by Boccaccio, distinguishing it from symptoms in the East?", "back": "The emergence of certain tumors (gavoccioli) in the groin or armpits, some growing as large as an apple or an egg, rather than an issue of blood from the nose.", "id": "fc17"}, {"front": "What is a 'gavoccioli' in Boccaccio's account of the Black Death?", "back": "The common folk's name for the tumors that appeared in the groin or armpits as the first symptom of the plague in Florence.", "id": "fc18"}, {"front": "Besides human wisdom and forethought, what other measures did the people of Florence take to try and avert the plague?", "back": "Humble supplications addressed to God, often repeated both in public procession and otherwise, by the devout.", "id": "fc19"}, {"front": "What dual purpose does Boccaccio state the stories in *The Decameron* will serve for the ladies who read them?", "back": "They will derive both pleasure from the entertaining matters and good counsel on what to shun and what to pursue.", "id": "fc20"}, {"front": "What does Boccaccio mean by 'Fortune' in the context of his dedication to women?", "back": "Fate or chance, personified as a goddess (Fortuna) who raises and casts down mortals at will, implying an injustice to women that his work aims to compensate.", "id": "fc21"}, {"front": "What does 'Pestilence' specifically refer to in this section of the text?", "back": "The Black Death of 1348, which killed roughly a third of Europe's population.", "id": "fc22"}, {"front": "What is 'Discourse' as used in the Proem?", "back": "Conversation; a formal discussion or treatise on a subject.", "id": "fc23"}, {"front": "How does the narrative of *The Decameron* itself emerge from the chaos of the Black Death?", "back": "A small group (the *brigata*) chooses to create order, companionship, and diversion through storytelling in response to the surrounding destruction and moral breakdown.", "id": "fc24"}, {"front": "What does the word 'Wherefore' mean?", "back": "For what reason; why.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
