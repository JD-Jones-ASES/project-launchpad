<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 1, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the total number of tales included in Boccaccio's Decameron?", "back": "One hundred tales."}, {"front": "How many young people comprise the 'brigata' in the Decameron?", "back": "Ten."}, {"front": "What is the gender composition of the storytellers in the brigata?", "back": "Seven women and three men."}, {"front": "Term: Cornice", "back": "Definition: The Italian term for the frame narrative that holds the various tales of the Decameron together."}, {"front": "Why does the brigata leave Florence for the countryside?", "back": "To flee the plague-stricken city and escape despair."}, {"front": "In the context of the Decameron, what does the term 'brigata' suggest?", "back": "Companionship and a deliberate, organized group."}, {"front": "How is the 'king' or 'queen' of each day determined in the Decameron?", "back": "One member of the company is chosen daily to set the theme and rule."}, {"front": "Which two days in the Decameron have no set theme?", "back": "Day I and Day IX."}, {"front": "Which member of the brigata is allowed to tell whatever tale he pleases, regardless of the theme?", "back": "Dioneo."}, {"front": "What is the general theme of Day II of the Decameron?", "back": "Fortune's reversals (unexpected happiness after adversity)."}, {"front": "What is the general theme of Day III of the Decameron?", "back": "Cleverness triumphant (using wit to obtain desires)."}, {"front": "What is the general theme of Day IV of the Decameron?", "back": "Love with unhappy endings (tragedy)."}, {"front": "What is the general theme of Day V of the Decameron?", "back": "Love rewarded (happiness after terrible adventures)."}, {"front": "What is the general theme of Day VI of the Decameron?", "back": "Quick wit (escaping danger or mockery through clever remarks)."}, {"front": "What is the specific target of the tricks played in the tales of Day VII?", "back": "Husbands."}, {"front": "What is the general theme of the final day, Day X?", "back": "Magnanimity, virtue, and noble deeds."}, {"front": "The Decameron's structural movement progresses from earthly/comic themes toward _____ themes.", "back": "Noble and transcendent."}, {"front": "Who is the eldest woman of the brigata and the first elected queen?", "back": "Pampinea."}, {"front": "Which narrator tells both the first and the last tales of the Decameron?", "back": "Panfilo."}, {"front": "What does the name 'Panfilo' literally mean?", "back": "All-loving."}, {"front": "Who serves as king on the day dedicated to tragic love stories?", "back": "Filostrato."}, {"front": "What is the literal meaning of the name 'Filostrato'?", "back": "Vanquished by love."}, {"front": "From which mythological figure is the name 'Dioneo' derived?", "back": "Dione, the mother of Venus."}, {"front": "Term: Proem", "back": "Definition: An introduction or preface, specifically Boccaccio's dedication of his work to women."}, {"front": "To whom specifically does Boccaccio dedicate the Decameron?", "back": "Women who suffer the pangs of love."}, {"front": "According to the Proem, why do women need the Decameron more than men do?", "back": "They lack external distractions like hunting or business and are confined by social custom."}, {"front": "What is the historical significance of the Decameron in European literature?", "back": "It is the first great work of European prose fiction."}, {"front": "Before the Decameron, what were the primary artistic uses for literary verse?", "back": "Epic, romance, lyric poetry, and allegorical dream visions."}, {"front": "What were the traditional, non-artistic uses for prose before Boccaccio's work?", "back": "Sermons, chronicles, and legal documents."}, {"front": "Concept: Storytelling as Survival", "back": "Definition: The use of narrative to create order and meaning in the face of social chaos and death."}, {"front": "Which narrator is the rule-breaker who always tells the final tale of the day?", "back": "Dioneo."}, {"front": "What is the title of the final, highly debated story told by Dioneo in the Decameron?", "back": "Patient Griselda."}, {"front": "The names of the ten storytellers are not real names but literary _____.", "back": "Pseudonyms."}, {"front": "Which member of the brigata is described as Boccaccio's literary alter ego of his beloved?", "back": "Fiammetta."}, {"front": "In the frame narrative, what does the country retreat represent in contrast to the plague?", "back": "An ordered, civilized world set against chaos."}, {"front": "What types of traits does Boccaccio often assign to his female protagonists?", "back": "Clever, brave, eloquent, and resourceful."}, {"front": "What is the theme of Day VIII of the Decameron?", "back": "Tricks of all kinds (men on women, women on men, men on men)."}, {"front": "Which narrator tends to favor tales of cleverness and ingenuity?", "back": "Neifile."}, {"front": "Which narrator favors tales of fortune and adventure?", "back": "Filomena."}, {"front": "How does the act of storytelling help the brigata 'rebuild' civilization?", "back": "By establishing a structured environment with rules, themes, and daily rulers."}, {"front": "According to the text, what distinguishes Boccaccio's portrayal of women from his contemporaries?", "back": "He takes them seriously as an audience and as resourceful characters."}, {"front": "What primary question does the Decameron explore regarding human behavior?", "back": "What makes a good life?"}, {"front": "The Decameron demonstrated that _____ could be as artful and moving as poetry.", "back": "Prose."}, {"front": "Who is the character that proposed the retreat from Florence?", "back": "Pampinea."}, {"front": "What is the primary function of the tales for the brigata while in the countryside?", "back": "To pass the time and keep despair at bay."}, {"front": "Which narrator is considered the most important and complex in the Decameron?", "back": "Dioneo."}, {"front": "What literary tradition did Boccaccio open the door for by using prose for art?", "back": "The European novel and short story."}, {"front": "In the structural arc of the Decameron, Day I establishes the work's _____.", "back": "Tone and concerns."}, {"front": "How many tales are told by the entire group during a single day?", "back": "Ten."}, {"front": "Which narrator's name suggests a connection to sensual love?", "back": "Dioneo."}, {"front": "What quality does the Proem suggest men have that women lack for dealing with love's pain?", "back": "Outlets/distractions (such as hunting, riding, or business)."}, {"front": "The brigata's structured life in the villas asserts the value of _____ in a meaningless world.", "back": "Human experience."}, {"front": "The Decameron explores the relationship between individual desire and _____.", "back": "Social order."}, {"front": "Which day focuses on those who escape danger through a clever remark?", "back": "Day VI."}, {"front": "According to Boccaccio, what is the role of a storyteller in relation to moral questions?", "back": "To dramatize the questions rather than provide definitive answers."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
