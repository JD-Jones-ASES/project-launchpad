    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In the context of Boccaccio's Decameron, what is a 'motto'?", "back": "A clever, pointed verbal response delivered at exactly the right moment to rescue the speaker."}, {"front": "Boccaccio describes the motto as the audible form of what mental quality?", "back": "Verbal ingegno, or cleverness."}, {"front": "While earlier Days in the Decameron focus on fortune and love, what power does Day VI celebrate?", "back": "The power of words."}, {"front": "What is the framing purpose for the storytelling in the Decameron?", "back": "To preserve the sanity and humanity of ten young people during the plague."}, {"front": "Which social class does Madonna Oretta represent in her use of wit?", "back": "The Florentine upper class (gentildonna)."}, {"front": "What characterizes the wit of a 'gentildonna' like Madonna Oretta?", "back": "It is expected to be graceful, subtle, and indirect."}, {"front": "Whose wit is characterized as 'dense, allusive, and requiring intellectual effort to decode'?", "back": "Guido Cavalcanti."}, {"front": "Fra Cipolla represents wit as what type of social activity?", "back": "Popular performance or theatrical showmanship."}, {"front": "Which Renaissance term describes the art of performing difficult tasks with apparent ease and nonchalance?", "back": "Sprezzatura."}, {"front": "Who coined the term 'sprezzatura' in the 1528 work 'The Book of the Courtier'?", "back": "Baldassare Castiglione."}, {"front": "Why is Madonna Oretta's criticism of the knight considered an example of sprezzatura?", "back": "It is a devastating critique delivered with extreme lightness and tact."}, {"front": "In Tale VI.1, how does Madonna Oretta politely tell the knight his storytelling is poor?", "back": "She asks to be 'set down' from his story-horse."}, {"front": "Guido Cavalcanti's wit is said to transcend social conventions by speaking from what height?", "back": "The height of philosophical learning."}, {"front": "In Tale VI.9, what physical act of sprezzatura matches Cavalcanti's verbal brilliance?", "back": "Leaping over a tomb."}, {"front": "Why is Fra Cipolla's wit described as 'democratic'?", "back": "It works on everyone through the force of personality rather than intellectual subtlety."}, {"front": "What term is used for literature that reflects on its own nature, such as a story about storytelling?", "back": "Metaliterary."}, {"front": "In Tale VI.1, what narrative sin involves 'telling the same thing three and four times over'?", "back": "Repetition."}, {"front": "In Tale VI.1, what narrative sin involves 'getting the names wrong' or 'losing the thread'?", "back": "Confusion."}, {"front": "What are Boccaccio's three core narrative virtues as identified in the commentary?", "back": "Economy, clarity, and decorum."}, {"front": "The narrative virtue of fitting one's style to the subject matter is called _____.", "back": "Decorum."}, {"front": "Which Chaucerian character tells a deliberately terrible parody of romance to demonstrate bad narration?", "back": "Sir Thopas."}, {"front": "What is the relationship between eloquence and truth in the character of Fra Cipolla?", "back": "His eloquence is used to manipulate and deceive rather than to convey truth."}, {"front": "In Fra Cipolla's fake itinerary, the place-names 'Truffia' and 'Buffia' refer to what concepts?", "back": "Fraud and jokes."}, {"front": "When his 'angel feather' is stolen, what does Fra Cipolla claim the charcoal is?", "back": "Charcoal from the fire that roasted Saint Lawrence."}, {"front": "Who is the patron saint of cooks, famously martyred on a gridiron?", "back": "Saint Lawrence."}, {"front": "What does Fra Cipolla's ease of improvisation reveal about his audience?", "back": "They are more convinced by his confidence than by evidence."}, {"front": "What is the lesson of Cisti the Baker's motto 'The Arno has not yet run dry'?", "back": "Generosity must be offered freely as a gift, not demanded as an obligation."}, {"front": "Which character uses wit to silence the Bishop of Florence after a vulgar jest?", "back": "Monna Nonna de' Pulci."}, {"front": "In Tale VI.4, how does Chichibio the cook save himself from his master's anger?", "back": "He retorts that his master didn't shout at the crane the night before to make it show its second leg."}, {"front": "Boccaccio praised which painter for bringing the art of painting 'back to light'?", "back": "Giotto di Bondone."}, {"front": "What is the central point of the tale involving Giotto and Messer Forese (VI.5)?", "back": "True worth is found in genius and wit, not in outward appearances."}, {"front": "In Tale VI.6, why does Michele Scalza argue the Baronci are the noblest family in Florence?", "back": "They are so ugly they must have been made while God was still learning to draw."}, {"front": "On what ground does Madonna Filippa argue that the law against adultery is unjust?", "back": "It was created without the consultation or consent of women."}, {"front": "Which character is described as having a habit of making 'disgusted faces' at everyone she passes?", "back": "Cesca, the niece of Fresco da Celatico."}, {"front": "What does Fresco's motto tell Cesca to avoid if she dislikes disagreeable people?", "back": "Looking in a mirror."}, {"front": "What double meaning exists in Cavalcanti's remark that the young men are 'in their own house' among the tombs?", "back": "They are intellectually dead or too spiritually shallow to contemplate mortality."}, {"front": "Which Greek philosopher famously attacked rhetoric as a form of deception?", "back": "Plato."}, {"front": "According to the commentary, why is Day VI sometimes called the 'literary Day'?", "back": "It focuses on the mechanics of language, storytelling, and verbal skill."}, {"front": "What is the role of the 'podesta' mentioned in the tale of Madonna Filippa?", "back": "The chief magistrate of an Italian city-state."}, {"front": "Which specific literarysin is committed when a narrator 'mangles' a tale by failing to match style to subject?", "back": "Mismatch of style and subject (violation of decorum)."}, {"front": "What does the phrase 'verbal ingegno made audible' define?", "back": "A motto."}, {"front": "Who is the master of Chichibio in Tale VI.4?", "back": "Currado Gianfigliazzi."}, {"front": "How does Madonna Filippa's argument anticipate Enlightenment thinking?", "back": "Through its focus on the necessity of consent and representation in law."}, {"front": "In the context of Tale VI.2, what does the interaction between Cisti and Messer Geri Spini illustrate?", "back": "The art of social grace and the unspoken etiquette of giving."}, {"front": "What is the primary narrative goal of a speaker in Day VI when they use a motto?", "back": "To escape a social or physical predicament using only words."}, {"front": "Which character represents wit as a tool for enforcing self-knowledge?", "back": "Fresco da Celatico."}, {"front": "What is the 'negative image' of Boccaccio's narrative virtues as seen in the knight's storytelling?", "back": "Repetition, confusion, and the mangling of style."}, {"front": "How does Fra Cipolla's improvised travelogue use 'fake geography' to deceive his audience?", "back": "He uses exotic-sounding names that are actually puns for deceit to dazzle the ignorant."}, {"front": "In Boccaccio's social hierarchy, whose wit is expected to be 'subtle, indirect, and devastating in its politeness'?", "back": "The Florentine gentildonna."}, {"front": "What quality makes Fra Cipolla's rhetoric a masterpiece of 'moral emptiness'?", "back": "The disconnect between his magnificent eloquence and his fraudulent intent."}, {"front": "What commonality exists between the Host in Chaucer's work and Madonna Oretta in the Decameron?", "back": "Both serve as internal narrative judges who rebuke bad storytelling."}, {"front": "In the Baronci tale, what does the narrator use to make an absurd proposition sound plausible?", "back": "Mock-logical eloquence."}, {"front": "What does Cavalcanti's physical vault over a tomb symbolize in Tale VI.9?", "back": "Physical sprezzatura that matches his intellectual brilliance."}, {"front": "In Boccaccio's usage, what broader range does the word 'motto' cover compared to its English cognate?", "back": "It includes quips, retorts, and witticisms rather than just slogans or maxims."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
