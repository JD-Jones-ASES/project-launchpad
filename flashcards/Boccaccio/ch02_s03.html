<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In Boccaccio's Decameron, what does the name Panfilo mean in Greek?", "back": "All-loving."}, {"front": "Which narrator tells the first tale of the Decameron?", "back": "Panfilo."}, {"front": "What is the central theme introduced in the story of Ser Ciappelletto?", "back": "The gap between appearance and reality."}, {"front": "What is the actual Italian name of the character known as Ciappelletto?", "back": "Cepparello."}, {"front": "Why did the French call Cepparello \"Ciappelletto\"?", "back": "They mistook his name for \"garland\" (Chapelet) and used a diminutive for his small stature."}, {"front": "What was Ser Ciappelletto's professional occupation?", "back": "Notary."}, {"front": "For what criminal act did Ser Ciappelletto take the most pride?", "back": "Forging false documents."}, {"front": "How did Ser Ciappelletto feel about bearing false witness?", "back": "He did it with boundless delight, whether he was asked to or not."}, {"front": "What was Ciappelletto's attitude toward the sacraments of the Church?", "back": "He held them to be vile things and derided them with ribaldry."}, {"front": "Who was the wealthy merchant and knight who hired Ciappelletto to handle his affairs in Burgundy?", "back": "Musciatto Franzesi."}, {"front": "Why did Musciatto Franzesi choose Ciappelletto specifically to deal with the Burgundians?", "back": "He needed a man wicked enough to oppose his own guile to their faithless and violent nature."}, {"front": "Where did Ciappelletto go to recover money for Musciatto?", "back": "Burgundy."}, {"front": "In whose house did Ciappelletto fall terminally ill?", "back": "Two Florentine usurers."}, {"front": "Why were the usurers afraid of Ciappelletto dying in their home without a confession?", "back": "They feared the local people would riot and seize their property if he was denied a church burial."}, {"front": "What reason did the usurers give for why a priest might refuse Ciappelletto absolution?", "back": "His crimes were so horrible that no friar could or would absolve him."}, {"front": "How did Ciappelletto learn about the usurers' fears regarding his death?", "back": "He overheard them talking through a wooden partition next to his room."}, {"front": "What false claim did Ciappelletto make to the friar regarding his confession frequency?", "back": "He claimed to be confessed at least once a week."}, {"front": "What lie did Ciappelletto tell regarding his sexual history during his confession?", "back": "He claimed to be a virgin."}, {"front": "How did Ciappelletto describe his habits regarding fasting to the friar?", "back": "He claimed to fast three days a week on bread and water, even enjoying the water too much."}, {"front": "What did Ciappelletto claim he did with the majority of the fortune his father left him?", "back": "He claimed he dedicated the greater part of it to God."}, {"front": "According to his false confession, why did Ciappelletto often experience anger?", "back": "Because he saw young men breaking the commandments and avoiding church."}, {"front": "What was the friar's reaction to Ciappelletto's confession of \"righteous wrath\"?", "back": "He considered it a virtue and refused to impose a penance for it."}, {"front": "What \"sin\" did Ciappelletto confess regarding a neighbor?", "back": "He spoke evil of a man who was beating his wife."}, {"front": "What was the \"theft\" that Ciappelletto confessed regarding his merchant dealings?", "back": "He kept four extra farthings he found in a box and later gave them to charity."}, {"front": "Why did Ciappelletto pretend to weep during his final confession?", "back": "To deceive the friar into believing he was deeply contrite for minor sins."}, {"front": "What was the \"great sin\" Ciappelletto claimed to have committed as a child?", "back": "He cursed his mother."}, {"front": "Where did Ciappelletto request to be buried?", "back": "In the friar's convent."}, {"front": "Why did the usurers laugh while listening to Ciappelletto's confession?", "back": "They were amused by his ability to maintain his wicked deceptions even on his deathbed."}, {"front": "What did the friar preach to the townspeople about Ciappelletto after his death?", "back": "He preached of Ciappelletto's purity, fasts, and holiness."}, {"front": "What did the townspeople do to Ciappelletto's corpse during the vigil?", "back": "They kissed his hands and feet and tore off pieces of his burial clothes as relics."}, {"front": "By what name is the deceased Ciappelletto venerated as a saint?", "back": "San Ciappelletto."}, {"front": "According to Panfilo's prologue, why might God hear prayers addressed to a person who is actually in Hell?", "back": "God rewards the sincerity of the petitioner's faith rather than the merit of the intercessor."}, {"front": "What is the narrator's personal opinion on Ciappelletto's actual fate in the afterlife?", "back": "He believes Ciappelletto is more likely in the hands of the devil in Hell."}, {"front": "Term: Ser.", "back": "Definition: A title for a notary or man of professional standing below the rank of knight."}, {"front": "Term: Vernacular.", "back": "Definition: The native language of a region, such as the Tuscan Italian Boccaccio used."}, {"front": "Term: Penance.", "back": "Definition: A punishment imposed by a priest after confession to atone for sins."}, {"front": "Term: Avarice.", "back": "Definition: Extreme greed for wealth; one of the seven deadly sins."}, {"front": "What does Ciappelletto's fake confession reveal about Boccaccio's view of human judgment?", "back": "It suggests that human judgment is easily misled by outward appearances."}, {"front": "What minor \"sin\" did Ciappelletto confess regarding the holy temple?", "back": "He claimed he had once inadvertently spat in the church."}, {"front": "Why did Musciatto Franzesi go to Tuscany?", "back": "To accompany Charles Sansterre, the brother of the King of France."}, {"front": "What was Ciappelletto's reputation regarding gambling?", "back": "He was a practiced gamester who used false dice."}, {"front": "How did Ciappelletto behave in Burgundy before falling ill?", "back": "He acted in an amicable and considerate manner to hide his true severity."}, {"front": "What did the usurers fear the locals would call them if they cast out Ciappelletto's body?", "back": "\"Lombards whom the Church excludes from her pale.\""}, {"front": "The Italian word \"ceppo,\" from which Cepparello is derived, means _____.", "back": "Stump or log."}, {"front": "How did Ciappelletto treat the idea of instigating enmity between friends?", "back": "He took inordinate delight in it and was pleased by calamitous consequences."}, {"front": "What did Ciappelletto request from the friar to receive before he died?", "back": "The Host (Body of Christ) and extreme unction."}, {"front": "Why did the friar believe Ciappelletto's soul was in a state of grace?", "back": "Because Ciappelletto claimed he would rather suffer in the flesh than risk the perdition of his soul."}, {"front": "What did Ciappelletto claim was his practice regarding the money he earned in trade?", "back": "He claimed to share it with God's poor, reserving only half for himself."}, {"front": "Why did the friar smile when Ciappelletto confessed to spitting in church?", "back": "Because he felt it was a trivial matter that even religious men did constantly."}, {"front": "What was the public's reaction to Ciappelletto's burial in a marble tomb?", "back": "They lit tapers, prayed, and made vows to him as if he were a saint."}, {"front": "According to the story, who is the real fool in the encounter between the friar and Ciappelletto?", "back": "The friar, due to his extreme credulity and inability to see through the false confession."}, {"front": "What does the narrator say about the \"unnatural\" vices of Ciappelletto?", "back": "He had no match among the most abandoned in those practices."}, {"front": "How did Ciappelletto view the act of stealing?", "back": "He pilfered as a matter of conscience, as if it were a holy offering."}, {"front": "What did the usurers decide to do after seeing the success of Ciappelletto's false confession?", "back": "They troubled themselves no further and provided for his honorable burial."}, {"front": "What was Ciappelletto's excuse for \"working\" on a Saturday?", "back": "He claimed he had his servant sweep the house after none, which he viewed as a sin."}, {"front": "What does the narrator mean by saying Ciappelletto's sanctity is \"apparent according to the standard of man, not of God\"?", "back": "Humans see him as a saint because of the lies they heard, but God knows his true wicked nature."}, {"front": "What role does \"disguise\" play in Ciappelletto's name?", "back": "The name Ciappelletto (garland) masks his real name Cepparello (stump), mirroring his false identity as a saint."}, {"front": "How did the friar justify God's mercy to Ciappelletto regarding his curse against his mother?", "back": "He stated that God forgives even those who crucified Christ if they are truly contrite."}, {"front": "What was Musciatto Franzesi's social rank?", "back": "A wealthy merchant who had been made a knight."}, {"front": "What was the final outcome of the town's devotion to Ciappelletto?", "back": "He was credited with performing many miracles for those who craved his intercession."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
