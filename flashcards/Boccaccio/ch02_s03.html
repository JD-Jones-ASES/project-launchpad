<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is the narrator of the first tale in Boccaccio's Decameron?", "back": "Panfilo"}, {"front": "What is the literal meaning of the Greek name 'Panfilo'?", "back": "All-loving"}, {"front": "What central theme does Panfilo’s story about Ser Ciappelletto introduce?", "back": "The gap between appearance and reality, particularly in religion."}, {"front": "What is the actual Italian name of the character known as Ser Ciappelletto?", "back": "Cepparello"}, {"front": "Why did the French call the protagonist 'Ciappelletto' instead of his real name?", "back": "They mistook Cepparello for 'Cappello' (garland) and used the diminutive due to his short stature."}, {"front": "What was Ser Ciappelletto’s primary profession?", "back": "He was a notary."}, {"front": "What did Ser Ciappelletto take 'boundless delight' in doing, whether solicited or not?", "back": "Bearing false witness."}, {"front": "How did Ser Ciappelletto respond when asked to commit murder or other foul crimes?", "back": "He never hesitated and went about it with alacrity."}, {"front": "What was Ser Ciappelletto’s attitude toward the sacraments of the Church?", "back": "He held them as vile things and derided them with ribaldry."}, {"front": "Who was the wealthy merchant and knight that employed Ser Ciappelletto to go to Burgundy?", "back": "Musciatto Franzesi"}, {"front": "Why did Musciatto Franzesi believe Ciappelletto was the right choice for dealing with the Burgundians?", "back": "He needed a man wicked enough to match the guile of the faithless Burgundians."}, {"front": "While in Burgundy, at whose house did Ser Ciappelletto fall terminally ill?", "back": "The house of two Florentine usurers."}, {"front": "Why were the Florentine brothers worried about Ciappelletto dying in their home?", "back": "His refusal to confess would lead to a denial of church burial, potentially sparking a riot against them."}, {"front": "How did Ciappelletto discover the concerns of the two brothers regarding his death?", "back": "He overheard them talking in the room next to his sickbed."}, {"front": "What did Ciappelletto request from the brothers to solve their dilemma?", "back": "The worthiest and most holy friar they could find to hear his confession."}, {"front": "During the confession, how frequently did Ciappelletto claim he usually went to confession?", "back": "At least once a week."}, {"front": "What lie did Ciappelletto tell the friar regarding his sexual history?", "back": "He claimed to be a virgin as pure as the day he was born."}, {"front": "How did Ciappelletto frame his 'sin' of gluttony during his confession?", "back": "He claimed he enjoyed drinking water too much and craved dainty herb dishes during fasts."}, {"front": "What reason did Ciappelletto give for staying with the usurers?", "back": "He claimed he was there to admonish them and turn them away from their iniquitous trade."}, {"front": "According to his false confession, what did Ciappelletto do with his business profits?", "back": "He shared half with the poor and kept the other half for his own needs."}, {"front": "How did Ciappelletto justify his frequent displays of anger to the friar?", "back": "He called it 'righteous wrath' against young men who ignored God's commandments."}, {"front": "What was the 'evil' Ciappelletto confessed to regarding his neighbor?", "back": "He spoke ill of the man to his wife's kinsfolk because the man was beating his wife."}, {"front": "How did Ciappelletto describe his 'cheating' as a merchant?", "back": "He found four extra farthings in a payment, kept them for a year to return them, and then gave them as alms."}, {"front": "What minor 'sin' regarding Sunday did Ciappelletto tearfully confess?", "back": "He had his servant sweep the house on a Saturday after the hour of none."}, {"front": "What did Ciappelletto confess to doing inside a church that he claimed was a grave impurity?", "back": "He admitted to spitting in the church."}, {"front": "What was the 'greatest sin' that Ciappelletto claimed made him weep with uncontrollable shame?", "back": "Cursing his mother when he was a little child."}, {"front": "Definition: A title for a notary or professional man below the rank of knight.", "back": "Ser"}, {"front": "Definition: The native language of a region, as opposed to Latin.", "back": "Vernacular"}, {"front": "Term: A punishment imposed by a priest after confession to atone for sins.", "back": "Penance"}, {"front": "Term: Extreme greed for wealth; one of the seven deadly sins.", "back": "Avarice"}, {"front": "What was the friar's ultimate conclusion about Ciappelletto after hearing the confession?", "back": "He believed Ciappelletto was a most holy man and a saintly figure."}, {"front": "Who listened to the confession from behind a wooden partition and found it humorous?", "back": "The two Florentine usurers."}, {"front": "Where was Ser Ciappelletto buried after his death?", "back": "In the marble tomb of a chapel within the friary."}, {"front": "What did the townspeople do to the corpse of Ciappelletto during his vigil?", "back": "They kissed his hands and feet and tore off pieces of his burial clothes as relics."}, {"front": "By what name is the protagonist known and venerated after his death?", "back": "San Ciappelletto"}, {"front": "According to Panfilo, why might God answer prayers directed at a sinner like Ciappelletto?", "back": "God regards the sincerity of the requester's faith rather than the ignorance of the intercessor's status."}, {"front": "In Panfilo’s personal estimation, where is Ciappelletto’s soul most likely located?", "back": "In the hands of the devil in hell."}, {"front": "What 'miracles' are attributed to Ciappelletto at the end of the story?", "back": "The folk affirm that many miracles are daily wrought by God through his intercession."}, {"front": "Why does the friar believe Ciappelletto’s tears are significant?", "back": "He views them as proof of deep contrition and a soul in a state of grace."}, {"front": "What does the friar tell the congregation during Ciappelletto’s funeral sermon?", "back": "He praises Ciappelletto’s fasts, virginity, and guilelessness, using him to reprove the listeners' sins."}, {"front": "The character Ser Ciappelletto is described as a 'practised gamester' who used _____.", "back": "false dice"}, {"front": "Boccaccio notes that Ciappelletto was as 'fond of women as a dog is of _____.'", "back": "the stick"}, {"front": "What is the primary function of Musciatto Franzesi's rank and power in Ciappelletto's life?", "back": "It served as a mainstay that secured him considerate treatment despite his outrages."}, {"front": "In what way did Ciappelletto 'scruple not to forswear himself' in legal matters?", "back": "He corruptly won every case in which he was summoned to attest the truth through perjury."}, {"front": "What did the friars do to honor Ciappelletto's body upon hearing of his 'holy' life?", "back": "They formed a solemn procession with crosses and chanting to fetch the corpse with pomp."}, {"front": "What was the specific theological reason the brothers feared Ciappelletto being cast into a ditch?", "back": "It would signal to the town that he was excluded from the Church, inviting a raid on the brothers' assets."}, {"front": "How did Ciappelletto frame his theft or pilfering to the friar?", "back": "He compared it to a holy man making an oblation (though the narrator says he did it as a matter of conscience)."}, {"front": "What did Ciappelletto request to receive immediately after his confession to ensure his salvation?", "back": "The Host (Communion) and Extreme Unction."}, {"front": "According to Panfilo, why can humans not truly judge who is in heaven?", "back": "No keenness of mortal vision can penetrate the secret counsels of the Divine mind."}, {"front": "What was the friar’s response when Ciappelletto confessed to spitting in church?", "back": "He smiled and said that even the religious spit there all day long."}, {"front": "Why did Panfilo choose to tell this specific story first?", "back": "To begin the enterprise in God's name and show how His grace works through human error."}, {"front": "What does the narrator mean by calling Ciappelletto 'the worst man that ever was born'?", "back": "It highlights the extreme irony of his subsequent veneration as a saint."}, {"front": "Who is Charles Sansterre in the context of the story?", "back": "The brother of the King of France who came into Tuscany."}, {"front": "The townspeople in Burgundy believed they were blessed if they possessed a _____ of Ciappelletto’s cerements.", "back": "scrap"}, {"front": "Ciappelletto's profession as a notary allowed him to take pride in creating _____.", "back": "false documents"}, {"front": "What was the friar’s counter-argument when Ciappelletto claimed God would not forgive him for cursing his mother?", "back": "He said even those who set Christ on the Cross would be forgiven with such contrition."}, {"front": "According to the text, what is the 'standard' Panfilo uses to relate the story?", "back": "The standard of the judgment of man, not of God."}, {"front": "How does Ciappelletto’s illness affect his behavior toward the brothers' business affairs initially?", "back": "He acts in an 'amicable and considerate' manner, which is foreign to his nature."}, {"front": "What did Ciappelletto claim his father left him, which he then 'dedicated the greater part to God'?", "back": "A fortune."}, {"front": "The friar described Ciappelletto’s anger as _____ because it was directed at sinners.", "back": "righteous wrath"}, {"front": "What does Ciappelletto say is the reason Sunday should be 'had in honor'?", "back": "Because on that day our Lord rose from the dead."}, {"front": "What does the name Cepparello (or its variations) suggest about the character’s identity?", "back": "The instability of the name hints at the theme of false identity and disguise."}, {"front": "The narrator notes that Ciappelletto was 'of all men the most _____,' leading to his blasphemy.", "back": "irascible"}, {"front": "Why did the friar believe his labor of 'hearkening and questioning' would be slight?", "back": "Because Ciappelletto claimed to confess more than once a week regularly."}, {"front": "What is the 'manifest token' of God's goodness mentioned in the conclusion?", "back": "That He hears us even when we mistakenly use His enemies as advocates."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
