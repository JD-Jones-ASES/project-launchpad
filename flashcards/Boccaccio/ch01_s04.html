<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Which three writers are collectively known as the \"three crowns\" (tre corone) of Italian literature?", "back": "Dante Alighieri, Francesco Petrarch, and Giovanni Boccaccio."}, {"front": "What was the collective linguistic impact of the \"three crowns\" on the Italian language?", "back": "They established the Tuscan dialect as the literary language of Italy."}, {"front": "Which supreme achievement of medieval literature describes a journey through Hell, Purgatory, and Paradise?", "back": "Dante's Divine Comedy."}, {"front": "Dante's Divine Comedy was written in _____, an interlocking three-line rhyme scheme he invented.", "back": "terza rima"}, {"front": "In the context of the Divine Comedy, what does Dante's journey represent allegorically?", "back": "The soul's journey toward God."}, {"front": "Who served as Dante's guide through the afterlife in the Divine Comedy before Beatrice?", "back": "The Roman poet Virgil."}, {"front": "Which member of the tre corone is known as the \"poet of the inner life\" and the \"father of humanism\"?", "back": "Francesco Petrarch."}, {"front": "What is the title of Petrarch's collection of 366 poems, mostly sonnets, addressed to his beloved Laura?", "back": "The Canzoniere."}, {"front": "How did Petrarch contribute to the intellectual foundations of the Renaissance?", "back": "By seeking out, copying, and studying classical Latin texts."}, {"front": "In 1341, Petrarch became the first person since antiquity to be honored as _____ in Rome.", "back": "poet laureate"}, {"front": "Which literary form did Boccaccio master that his predecessors Dante and Petrarch had not attempted?", "back": "Prose narrative."}, {"front": "The Decameron is widely recognized as the first great work of _____.", "back": "European prose fiction"}, {"front": "What specific public service did Boccaccio perform in Florence regarding Dante's work?", "back": "He delivered the first public lectures on the Divine Comedy."}, {"front": "Concept: Exemplum", "back": "Definition: A short illustrative story used in medieval sermons to teach a moral lesson."}, {"front": "How does Boccaccio typically subvert the traditional medieval exemplum in the Decameron?", "back": "He makes the stated morals ironic, ambiguous, or deliberately beside the point."}, {"front": "Concept: Fabliau", "back": "Definition: A short, humorous, often bawdy verse tale popular in France featuring tricksters and cuckolded husbands."}, {"front": "What improvements did Boccaccio make to the plots he inherited from the fabliau tradition?", "back": "He gave characters psychological depth and added narrative elegance and social commentary."}, {"front": "How does the Decameron's approach to the romance tradition differ from typical medieval romances?", "back": "Boccaccio grounds his tales in real-life settings like Florence and Naples rather than the marvelous."}, {"front": "Which Roman authors of comedy served as classical models for Boccaccio?", "back": "Plautus and Terence."}, {"front": "Which classical work by Ovid influenced Boccaccio's storytelling?", "back": "The Metamorphoses."}, {"front": "The term \"novella\" is derived from the Italian word meaning _____.", "back": "\"new\" or \"news\""}, {"front": "Which anonymous 13th-century Italian collection served as a predecessor to the Decameron but lacked its narrative sophistication?", "back": "The Novellino."}, {"front": "How did Boccaccio's Decameron establish the novella as a distinct literary form?", "back": "By incorporating developed characters, complex plots, and vivid settings into short prose tales."}, {"front": "Which English poet composed the Canterbury Tales a generation after Boccaccio?", "back": "Geoffrey Chaucer."}, {"front": "Concept: Frame narrative", "back": "Definition: An outer narrative that contains and motivates a series of inner stories."}, {"front": "What is the specific frame narrative used in the Canterbury Tales?", "back": "A group of pilgrims traveling to the shrine of Thomas Becket telling tales to pass time."}, {"front": "Which Decameron story (X.10) did Chaucer retell as the Clerk's Tale?", "back": "The story of Patient Griselda."}, {"front": "Chaucer's Franklin's Tale echoes themes from which specific Decameron story?", "back": "The Magic Garden (X.5)."}, {"front": "How do the narrators in the Decameron differ socially from those in the Canterbury Tales?", "back": "Boccaccio's are refined young aristocrats, while Chaucer's are a cross-section of English society."}, {"front": "How does the organizational structure of the tales differ between Boccaccio and Chaucer?", "back": "Boccaccio organizes by daily themes, whereas Chaucer's emerge from pilgrim personalities and rivalries."}, {"front": "Which city did Dante never return to after being exiled for political reasons in 1302?", "back": "Florence."}, {"front": "Petrarch is credited with helping lay the intellectual foundations of the Renaissance through his passion for _____.", "back": "classical Latin texts"}, {"front": "What commonality exists between the frame of the Decameron and the Canterbury Tales regarding the reason for storytelling?", "back": "Both involve groups of people traveling or fleeing to pass time."}, {"front": "The Decameron is considered the ancestor of which modern literary genre?", "back": "The modern short story."}, {"front": "Where did Boccaccio absorb the influence of French and Italian romances?", "back": "During his years in Naples."}, {"front": "Which Roman historian and which rhetorical theorist provided models for Boccaccio's humanist craft?", "back": "Livy and Cicero."}, {"front": "What was the typical length of stories in the Novellino compared to Boccaccio's work?", "back": "They were brief anecdotes, rarely longer than a paragraph or two."}, {"front": "Which Renaissance Italian writers followed Boccaccio in the novella tradition?", "back": "Bandello and Straparola."}, {"front": "Which modern practitioners of the short story are cited as successors to the tradition Boccaccio began?", "back": "Maupassant and Chekhov."}, {"front": "In the Divine Comedy, who took over as Dante's guide after Virgil?", "back": "Beatrice."}, {"front": "How many poems are in Petrarch's Canzoniere?", "back": "366."}, {"front": "Which specific literary tradition dominated European love poetry for three centuries following Petrarch?", "back": "The Petrarchan lyric/sonnet tradition."}, {"front": "What did Boccaccio prove regarding the Italian language that built upon Dante's legacy?", "back": "He proved it could be a vehicle for sophisticated prose narrative."}, {"front": "Who were the primary targets of humor in the fabliau tradition?", "back": "Cuckolded husbands and lustful clergy."}, {"front": "Preachers drew on vast collections of _____ to hold the attention of their congregations.", "back": "exempla"}, {"front": "What happened to Dante and Petrarch's family in 1302?", "back": "They were exiled from Florence."}, {"front": "Why did Chaucer likely know Boccaccio's work despite never mentioning him by name?", "back": "Chaucer had traveled to Italy."}, {"front": "Boccaccio's tales are described as being grounded in which type of environment?", "back": "Ordinary life, including markets, bedrooms, and churches."}, {"front": "Which writer's work served as the model for the sonnet form across Europe?", "back": "Francesco Petrarch."}, {"front": "What literary element did Boccaccio add to the novella to make the narrator's presence felt?", "back": "Narrative voices that comment on the action."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
