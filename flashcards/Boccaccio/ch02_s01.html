<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What role do the ten tales of Day I play in the structure of the Decameron?", "back": "They function as an overture to the entire work."}, {"front": "What theme does Pampinea set for the narrators on the first day?", "back": "She sets no theme, allowing narrators to tell stories on any subject."}, {"front": "What is the primary characteristic of the 'motto' in Boccaccio's usage?", "back": "A cleverly turned phrase deployed at exactly the right moment to correct, shame, or delight."}, {"front": "Concept: Beffa", "back": "Definition: A sustained practical joke or deception, often involving elaborate planning."}, {"front": "Which quality does Boccaccio value above almost all others in his characters?", "back": "Ingegno (intelligence or resourcefulness)."}, {"front": "Which tale features a 'beffa' that leads a wicked man to be venerated as a saint?", "back": "Novel I.1 (The tale of Ciappelletto)."}, {"front": "What is the primary target of Boccaccio's religious satire?", "back": "Human institutions and the hypocrisy of the clergy, rather than God or faith itself."}, {"front": "According to the Fourth Lateran Council (1215), how often were Christians required to go to confession?", "back": "Once a year."}, {"front": "Who reportedly persuaded Boccaccio not to destroy the Decameron during his later period of religious anxiety?", "back": "His friend Petrarch."}, {"front": "In Tale I.3, what is the core lesson of Melchisedech's parable of the three rings?", "back": "The question of which faith is 'true' cannot be settled by human argument."}, {"front": "Which English author's treatment of corrupt clergy is compared to Boccaccio's in the text?", "back": "Geoffrey Chaucer."}, {"front": "How does Tale I.2 (Abraham the Jew) use 'ironic logic' to explain Abraham's conversion?", "back": "He reasons that a religion so corrupt at its center must have divine support to survive."}, {"front": "In Tale I.4, how does the young monk escape punishment for bringing a woman into his cell?", "back": "He discovers that the abbot is guilty of the exact same sin."}, {"front": "What is the 'motto' delivered by the Marchioness of Monferrato to the King of France in Tale I.5?", "back": "She states that women, like the hens she served, differ little from one another."}, {"front": "In Tale I.6, what specific remark triggers the Inquisition's interest in the 'worthy man'?", "back": "He claimed he found a wine so good that Christ himself would drink it."}, {"front": "What is the primary theme of Tale I.7, involving the storyteller Bergamino and a miserly lord?", "back": "The power of storytelling and the defense of the artist's role in society."}, {"front": "In Tale I.8, what subject does Guglielmo Borsiere suggest for a painting to shame Ermino de' Grimaldi?", "back": "Generosity."}, {"front": "What effect does the Gascon lady's motto have on the King of Cyprus in Tale I.9?", "back": "It transforms his character from cowardly to resolute."}, {"front": "In Tale I.10, how does Master Alberto of Bologna defend his love for a young woman?", "back": "He uses a parable about leeks to argue for the superiority of experience over youth."}, {"front": "According to Panfilo in I.1, how might God's grace operate through a wicked man like Ciappelletto?", "back": "God may choose to work through unlikely instruments, regardless of the instrument's intent."}, {"front": "What human quality does Ciappelletto exploit to make his false confession successful?", "back": "The assumption of sincerity that makes social life possible."}, {"front": "In the context of Tale I.1, why does the friar believe Ciappelletto's lies?", "back": "He cannot imagine a dying man would lie during the sacrament of confession."}, {"front": "What does Melchisedech's parable suggest is the proper response to religious diversity?", "back": "Wisdom, humility, and mutual respect."}, {"front": "Which character in Chaucer's Canterbury Tales parallels the moral paradox found in Ciappelletto?", "back": "The Pardoner."}, {"front": "What is the profession of Master Alberto in Tale I.10?", "back": "He is an elderly physician."}, {"front": "In Tale I.2, where does Abraham the Jew travel to observe the Christian Church?", "back": "Rome."}, {"front": "What specific vice is Ermino de' Grimaldi known for in Tale I.8?", "back": "Legendary avarice (greed)."}, {"front": "Why does the inquisitor drop the charges against the man in Tale I.6?", "back": "The inquisitor is himself a great lover of wine."}, {"front": "The Marchioness of Monferrato's banquet in I.5 consisted entirely of what food?", "back": "Chicken."}, {"front": "What is the engine of comedy throughout the Decameron, particularly in Days VII and VIII?", "back": "The beffa (sustained trick or deception)."}, {"front": "How does the 'motto' differ from the 'beffa' in terms of execution?", "back": "The motto is a single verbal stroke, while the beffa is a sustained action."}, {"front": "In Tale I.4, what is the abbot's reaction when confronted with his own hypocrisy?", "back": "He pardons the monk so they can both continue their secret pleasures."}, {"front": "According to the commentary, what does Day I provide for Boccaccio’s world?", "back": "A panoramic introduction to its religious, social, and courtly themes."}, {"front": "What historical event in 1362 influenced Boccaccio's later view of the Decameron?", "back": "A visit from a Carthusian monk."}, {"front": "In Tale I.7, how does Bergamino communicate his message to the miserly lord?", "back": "He tells an allegorical tale about a poet and a patron."}, {"front": "What character type is exemplified by Guglielmo Borsiere in Tale I.8?", "back": "A courtier of impeccable manners."}, {"front": "The lady's rebuke in Tale I.9 is described as a 'pure' example of which literary device?", "back": "The motto."}, {"front": "How does Boccaccio view the intelligence and social power of women in Day I?", "back": "He shows them using language with devastating effectiveness and intelligence."}, {"front": "Who is the Christian merchant who tries to convert Abraham in Tale I.2?", "back": "Jehannot de Chevigny."}, {"front": "What is the common realization shared by Boccaccio and Chaucer regarding narrative art?", "back": "The gap between what people profess and what they practice is a rich subject for art."}, {"front": "What does the monk's defense in Tale I.4 suggest about those who judge others?", "back": "They must first judge themselves."}, {"front": "In Tale I.6, wit is used as a tool to defeat what kind of power?", "back": "Institutional power (the Inquisition)."}, {"front": "Which tale provides Boccaccio's most explicit statement on religious tolerance?", "back": "Novel I.3 (The Three Rings)."}, {"front": "What is the 'governing virtue' displayed in the face of social challenges in Day I?", "back": "Quick wit."}, {"front": "Why is the portrait of religion in Day I described as 'unsettling'?", "back": "It highlights corruption, mockery of sacraments, and clerical sin."}, {"front": "In Tale I.1, what is the outcome for Ciappelletto after his death?", "back": "He is venerated as a saint."}, {"front": "What is the setting for the conversion efforts in Tale I.2?", "back": "Paris."}, {"front": "What literary form does Master Alberto use to answer the young women mocking him?", "back": "A parable."}, {"front": "In Tale I.5, why was the Marchioness's husband away?", "back": "He was traveling to the Crusades."}, {"front": "According to the Teacher Note, what is the 'target' of Tale I.1?", "back": "Human credulity (the tendency to believe others too easily)."}, {"front": "Which narrator tells the story of Ciappelletto?", "back": "Panfilo."}, {"front": "What do the tales of the Marchioness (I.5) and the Gascon lady (I.9) have in common?", "back": "They both feature women using clever speech to redirect the intentions of powerful men."}, {"front": "How does Tale I.10 close the first day of the Decameron?", "back": "With a defense of mature love and a display of quick wit."}, {"front": "What distinguishes the 'beffa' from other types of comedy in the Decameron?", "back": "It is the engine of the comedy and involves sustained deception."}, {"front": "Why does Boccaccio consider the 'motto' a form of wit?", "back": "It uses verbal cleverness in a single stroke to achieve a social or moral goal."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
