<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary theme decreed by Queen Fiammetta for the tales told on Day V?", "back": "Lovers who reach a happy ending after experiencing direful or disastrous adventures."}, {"front": "How does the thematic focus of Day V contrast with that of Day IV?", "back": "Day IV focuses on tragic love ending in sorrow and death, while Day V focuses on love that attains a happy issue."}, {"front": "What does the name 'Fiammetta' mean in Italian?", "back": "Little flame."}, {"front": "Who was the inspiration for the character name Fiammetta in Boccaccio's early romances?", "back": "The woman he loved during his time in Naples."}, {"front": "According to the text, the alternation between sorrow and happiness in the Decameron reflects the unpredictable turning of _____.", "back": "Fortuna"}, {"front": "What structural goal did Boccaccio aim for by having light-hearted days follow somber ones?", "back": "To create an ordered world of storytelling in the midst of the plague's chaos."}, {"front": "From which city's literary culture did Boccaccio draw the romance and adventure traditions for Day V?", "back": "Naples."}, {"front": "Concept: Courtly Love", "back": "Definition: A medieval literary convention of idealized and ennobling romantic love, typically involving a knight and a noble lady."}, {"front": "How does Boccaccio transform the traditional 'knight and lady' trope of courtly love in Day V?", "back": "He depicts lovers who are not always from noble birth."}, {"front": "According to Boccaccio, through what three means do the lovers in Day V earn their happy endings?", "back": "Suffering, sacrifice, and sometimes sheer luck."}, {"front": "What specific environmental sign at dawn induces Fiammetta to rouse the company?", "back": "The carolling of the birds among the boughs."}, {"front": "How many 'gallants' or men are part of the brigata mentioned in the Day V introduction?", "back": "Three."}, {"front": "Where does the brigata wander during the early morning hours of Day V?", "back": "Adown the hill and about the dewy meads of the broad champaign."}, {"front": "Why does the company return to the villa after their morning walk?", "back": "The rays of the sun were growing scorching."}, {"front": "Beside excellent wines, what specific treat do the members consume upon returning to the villa?", "back": "Comfits."}, {"front": "What musical genre, along with balladettes, is sung by the group before breakfast?", "back": "A stampita."}, {"front": "Which servant is described as 'discreet' while ordering the breakfast meal?", "back": "The seneschal."}, {"front": "What activity does the group engage in immediately following their 'gladsome' meal?", "back": "Dancing a few short measures to music and song."}, {"front": "At what specific time of day does the company reassemble by the fountain after their siesta?", "back": "Shortly after none (nones)."}, {"front": "Where is the queen seated when she calls for the storytelling to begin?", "back": "On her throne by the fountain."}, {"front": "Which member of the brigata is chosen by Fiammetta to lead off the stories of Day V?", "back": "Pamfilo."}, {"front": "What specific subject is Pamfilo requested to address in his story?", "back": "Stories of good fortune."}, {"front": "In Day IV, how did brothers typically react to their sisters' beloved according to the introduction?", "back": "They killed them."}, {"front": "What specific destructive act did fathers perform in the tragedies of Day IV?", "back": "They murdered their daughters' lovers."}, {"front": "Which specific literary tradition from Naples did Boccaccio read widely and later incorporate into his work?", "back": "French courtly love literature."}, {"front": "What does the text suggest is the relationship between 'fortuna' and the Decameron's structural rhythm?", "back": "The alternation between sorrow and happiness reflects the unpredictable turning of fortuna."}, {"front": "The brigata's morning conversation during their walk is described as being about _____.", "back": "divers matters"}, {"front": "The 'carolling of the birds' in the introduction is described as occurring in a '_____ chorus.'", "back": "gay"}, {"front": "Where do some members of the group go when they are 'dismissed by the queen' for their siesta?", "back": "To rest or to take pleasure in the fair garden."}, {"front": "How does Pamfilo react when the queen bids him to start the stories?", "back": "He gladly addresses himself to the task."}, {"front": "According to the introduction, the movement from Day IV to Day V mirrors the movement from _____ to comedy.", "back": "tragedy"}, {"front": "What color was 'all the east' described as being at the break of dawn on Day V?", "back": "White."}, {"front": "The phrase 'unillumined by the rising beams' refers to which part of the world at dawn?", "back": "The hemisphere."}, {"front": "How is the meal after the singing of balladettes described in terms of its order and mood?", "back": "It was meetly ordered and gladsome."}, {"front": "What rule of the group is specifically mentioned as being followed after the meal?", "back": "The rule of dancing."}, {"front": "In the context of Day V, what does Boccaccio prioritize over 'noble birth' as a way to earn a happy ending?", "back": "Suffering and sacrifice."}, {"front": "Fiammetta's role as queen of Day V is to balance the _____ of the preceding Day.", "back": "grief"}, {"front": "What was the result of love in the 'somber tragedies' of Day IV?", "back": "It brought only sorrow and death."}, {"front": "What does Fiammetta do to the other ladies and the three gallants at dawn?", "back": "She rises and rouses them."}, {"front": "In the garden pastime before breakfast, the group waited for what specific hour?", "back": "The breakfast hour."}, {"front": "The introduction states that Boccaccio both _____ and questions the tradition of courtly love.", "back": "celebrates"}, {"front": "Which force in the Decameron is characterized by 'unpredictable turning'?", "back": "Fortuna."}, {"front": "How many balladettes were sung before the breakfast meal?", "back": "One or two."}, {"front": "What does the queen do before speaking to Pamfilo at the fountain?", "back": "She glances towards him with a smile."}, {"front": "Where exactly did the birds salute the dawn among the foliage?", "back": "Among the boughs."}, {"front": "What was the 'slight fatigue' of the morning walk repaired with?", "back": "Excellent wines and comfits."}, {"front": "How did Fiammetta's theme for Day V differ from the 'destructive power of love' in Day IV?", "back": "It showed that love can overcome obstacles and arrive at joy."}, {"front": "In Boccaccio's view, the ordered world of storytelling was created to counter what contemporary event?", "back": "The chaos of the plague."}, {"front": "What is the location of the reassembly shortly after none?", "back": "By the fountain."}, {"front": "The 'rising beams' mentioned in the primary source are a reference to the _____.", "back": "sun"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
