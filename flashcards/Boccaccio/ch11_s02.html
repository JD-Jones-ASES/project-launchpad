<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 11, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Which day is considered the \"moral summit\" and grand finale of the Decameron?", "back": "Day the Tenth"}, {"front": "What does the deliberate structural arc of the Decameron mirror?", "back": "The movement from plague and disorder to courtesy and virtue."}, {"front": "Who serves as the king of the Tenth Day in the Decameron?", "back": "Panfilo"}, {"front": "What specific theme did Panfilo choose for the stories of Day X?", "back": "Generous or magnificent deeds."}, {"front": "Term: Magnificenza", "back": "Definition: Greatness of soul that expresses itself in generous action."}, {"front": "The term \"magnificenza\" is derived from the Latin magnificentia, which literally means _____.", "back": "great-doing"}, {"front": "According to Aristotle's Nicomachean Ethics, what is the \"crown virtue\" of the great-souled person?", "back": "Magnanimity (megalopsychia)."}, {"front": "How does the focus of Day X differ from the themes of earlier days like wit and fortune?", "back": "It celebrates virtue in its most active and selfless form."}, {"front": "Besides love, what other relationships are used to demonstrate generosity in Day X?", "back": "Generosity between enemies."}, {"front": "Which story is noted as the most discussed and debated tale in the entire Decameron?", "back": "The story of Patient Griselda."}, {"front": "Who is the narrator of the story of Patient Griselda?", "back": "Dioneo"}, {"front": "How does Boccaccio prevent the tone of Day X from being purely solemn?", "back": "By including warm, humorous tales and maintaining characteristic irony."}, {"front": "What color flush was visible in the western sky when Panfilo woke his comrades?", "back": "Vermeil"}, {"front": "What did the sun's rays do to the clouds in the eastern sky as the company awoke?", "back": "Fringed them as with lucent gold."}, {"front": "Which two characters accompanied Panfilo as he led the way for the morning walk?", "back": "Filomena and Fiammetta."}, {"front": "What was the primary topic of conversation during the company's morning walk on Day X?", "back": "Their future way of life."}, {"front": "What caused the company to return to the palace after their morning walk?", "back": "The sun gaining strength."}, {"front": "Where did the company gather to drink water upon returning from their walk?", "back": "Around the fountain."}, {"front": "How did the company spend their time in the garden after drinking from the fountain but before breakfast?", "back": "They hied hither and thither taking their pleasure in the shade."}, {"front": "What was the company's routine immediately following their morning meal?", "back": "They slept as they were wont."}, {"front": "Who was commanded by the king to lead the storytelling on Day X?", "back": "Neifile"}, {"front": "The movement from the \"open miscellany\" of Day I to the \"noble themes\" of Day X is described as an _____.", "back": "upward arc"}, {"front": "What specific virtue is demonstrated through the endurance of Griselda?", "back": "Patience"}, {"front": "What Aristotelian concept did Boccaccio inherit through the medieval tradition for Day X?", "back": "The great-souled person (megalopsychia)."}, {"front": "How is the pace of the company described as they set out for their morning walk?", "back": "A slow pace."}, {"front": "In the context of Day X, generosity is explored through love, enemies, and _____.", "back": "personal sacrifice"}, {"front": "What did those minded to drink water use to fetch it from the fountain?", "back": "Beakers rinsed in its pure waters."}, {"front": "Term: Megalopsychia", "back": "Definition: The crown virtue of the great-souled person in Aristotelian ethics."}, {"front": "What quality of action defines Boccaccio’s concept of magnificenza?", "back": "Generous action."}, {"front": "Where did the company reassemble to begin the storytelling session?", "back": "At a spot chosen by the king."}, {"front": "According to the text, what does the brigata save for the end of the ten days?", "back": "Its best (the most elevated themes)."}, {"front": "Which day focuses on the comic and tragic cycles leading up to the themes of Day X?", "back": "The middle Days."}, {"front": "How is Neifile's mood described as she begins her story on the Tenth Day?", "back": "Blithe"}, {"front": "What transition does the Decameron's structure make regarding the social order?", "back": "A movement from disorder (the plague) to courtesy."}, {"front": "What is the literal meaning of the Latin root of magnanimity?", "back": "Great-doing (magnificentia)."}, {"front": "What theme does Panfilo describe as the most elevated in the entire work?", "back": "Magnanimity / Magnificenza."}, {"front": "Which character told the final story in the Decameron?", "back": "Dioneo"}, {"front": "What aspect of virtue is specifically celebrated in Day X rather than passive goodness?", "back": "Active and selfless form."}, {"front": "How did the company beguile the time during their morning walk?", "back": "With talk of their future way of life."}, {"front": "What was the nature of the walk taken by the company before the sun gained strength?", "back": "Quite a long round."}, {"front": "Which storyteller did Panfilo rouse along with the ladies and the rest of the comrades?", "back": "The text implies he roused the entire company."}, {"front": "The Decameron’s structure moves from the disorder of the plague to the _____ of Day X.", "back": "virtue"}, {"front": "What virtue is described as the crown virtue of the great-souled person?", "back": "Magnanimity"}, {"front": "What does the Latin root \"magnificentia\" literally translate to?", "back": "Great-doing"}, {"front": "In addition to love, Day X includes tales of generosity between which unlikely parties?", "back": "Enemies"}, {"front": "What tone does the author describe as \"unmistakably elevated\"?", "back": "The tone of Day X."}, {"front": "Who was the ruler that commanded Neifile to begin the day's storytelling?", "back": "The king (Panfilo)."}, {"front": "Where was the \"vermeil flush\" located in the sky at the start of Day X?", "back": "In the West."}, {"front": "What did the company do in the garden until breakfast-time?", "back": "They hied them hither and thither taking their pleasure."}, {"front": "What is the relationship between megalopsychia and magnificenza in the text?", "back": "Magnificenza is the medieval tradition's inheritance of the Aristotelian megalopsychia."}, {"front": "Day X is the culmination of how many days of storytelling?", "back": "Ten days."}, {"front": "Which character reigned as king during the most elevated day of the Decameron?", "back": "Panfilo"}, {"front": "What does the text call the \"crown virtue\" in Aristotle's Nicomachean Ethics?", "back": "Magnanimity"}, {"front": "How long was the company's morning walk on the final day?", "back": "A long round."}, {"front": "What was the purpose of rinsing the beakers in the fountain?", "back": "To drink from its pure waters."}, {"front": "Which lady is mentioned as following Panfilo alongside Fiammetta?", "back": "Filomena"}, {"front": "What is the primary characteristic of the virtue celebrated in Day X?", "back": "Active and selfless."}, {"front": "What literary device does Boccaccio use to prevent Day X from becoming too solemn?", "back": "Irony"}, {"front": "What does the \"upward arc\" of the Decameron lead toward in its final day?", "back": "Noble themes."}, {"front": "What was the result of the sun gaining strength during the morning of Day X?", "back": "The company returned to the palace."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
