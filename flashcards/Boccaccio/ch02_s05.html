<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 2, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who narrates the story concerning the Lady of Gascony and the King of Cyprus?", "back": "Elissa"}, {"front": "What is notable about the length of the ninth tale of Day I in the Decameron?", "back": "It is among the shortest tales in the collection."}, {"front": "According to Elissa, how can men who are obdurate to censures sometimes be reclaimed?", "back": "By an unpremeditated, casual word."}, {"front": "What historical event provides the time setting for the tale of the King of Cyprus?", "back": "The conquest of the Holy Land by Godfrey de Bouillon."}, {"front": "In what region was Gascony located during the fourteenth century?", "back": "Southwestern France."}, {"front": "Gascony was part of which English-controlled territory in the 1300s?", "back": "The Duchy of Aquitaine."}, {"front": "Where was the lady of Gascony returning from when she arrived in Cyprus?", "back": "A pilgrimage to the Holy Sepulchre in Jerusalem."}, {"front": "What happened to the lady of Gascony upon her arrival in Cyprus?", "back": "She met with brutal outrage at the hands of certain ruffians."}, {"front": "Why was the lady initially told that complaining to the King of Cyprus would be in vain?", "back": "The king was notoriously spiritless, indolent, and faineant."}, {"front": "Term: Faineant", "back": "Definition: Idle or lazy; a person who is lacking in spirit or activity."}, {"front": "How did the King of Cyprus initially react to affronts put upon himself?", "back": "With a reprehensible tameness."}, {"front": "How did subjects with 'ill-humour to vent' treat the spiritless King of Cyprus?", "back": "They took occasions to vex or mortify him."}, {"front": "Instead of seeking redress, what did the lady determine to do when she met the king?", "back": "Make the king sensible of his own baseness."}, {"front": "What did the lady sarcastically ask the King of Cyprus to teach her?", "back": "How to suffer wrongs with patience."}, {"front": "Why did the lady say she wanted to learn the king's method of patience?", "back": "So she could endure her own wrongs, which she claimed he was well fitted to bear."}, {"front": "What effect did the lady's sarcastic remark have on the king's character?", "back": "It aroused him from his sluggishness and led him to reform his governance."}, {"front": "After the lady's remark, what kind of justice did the king begin to mete out?", "back": "The most rigorous justice to all who offended his crown."}, {"front": "In the Decameron, what is a 'motto'?", "back": "A pointed, witty remark or bon mot used as a social weapon."}, {"front": "What can a 'motto' accomplish that force and supplication cannot?", "back": "Shaming, correcting, or delighting others."}, {"front": "What literary genre does this tale echo by instructing a ruler in proper conduct?", "back": "Speculum principis (Mirror for princes)."}, {"front": "How does Boccaccio's version of a 'mirror for princes' differ from the traditional medieval genre?", "back": "He achieves the lesson in a single sentence rather than through lengthy moralizing."}, {"front": "What does the tale suggest about the relationship between language and power?", "back": "Language is a powerful tool capable of transforming authority and correcting injustice."}, {"front": "What is the significance of Boccaccio giving the power of the 'motto' to a woman in this tale?", "back": "It highlights a form of social power found in wit rather than physical force or status."}, {"front": "How does the lady's geographical origin broaden the scope of the Decameron?", "back": "It extends the work's reach beyond Italy to broader medieval Europe."}, {"front": "Elissa mentions that her story is meant to illustrate a point previously made by which other storyteller?", "back": "Lauretta"}, {"front": "What emotional state is the lady in when she presents herself to the king?", "back": "She is in tears and broken-hearted."}, {"front": "According to the text, why is the brevity of this tale considered part of its 'point'?", "back": "It mirrors the efficiency of the motto it celebrates."}, {"front": "How does the lady describe the king's reaction to wrongs done to himself before his transformation?", "back": "She notes that he suffers them patiently."}, {"front": "What did the lady wish she could do with her own wrongs if it were possible?", "back": "Transfer them to the king."}, {"front": "What was the result of the king's 'spiritless' nature on the general public of Cyprus?", "back": "He neglected to avenge affronts put upon others."}, {"front": "To what state does the narrator compare the king's awakening after the lady's words?", "back": "Being aroused from sleep."}, {"front": "Concept: The Motto", "back": "Definition: A well-aimed word used to shame or reform a person of higher status."}, {"front": "The ninth tale demonstrates that a single cutting remark can be a more effective _____ than pleading.", "back": "Weapon"}, {"front": "What was the lady's specific complaint at the beginning of the tale?", "back": "She had suffered a 'brutal outrage' by ruffians."}, {"front": "What does the word 'obdurate' mean in the context of Elissa's introduction?", "back": "Stubbornly resistant to change or moral influence."}, {"front": "Who was the 'first king of Cyprus' mentioned in the story?", "back": "The ruler who followed the conquest of the Holy Land by Godfrey de Bouillon."}, {"front": "The lady's remark is a 'miniature demonstration' of the power of the _____.", "back": "Motto"}, {"front": "How does the narrator describe the king's governance at the very end of the story?", "back": "He meted out rigorous justice to all who offended against the majesty of his crown."}, {"front": "What is the primary theme of Day I, Tale 9?", "back": "The transformative power of wit and language (the motto)."}, {"front": "Before his reform, the King of Cyprus was characterized by a 'reprehensible' lack of what?", "back": "Reaction to personal or public affronts."}, {"front": "In the lady's speech, the term 'schooled' refers to her request to learn _____ from the king.", "back": "Patience"}, {"front": "The King of Cyprus not only neglected others' justice but endured his own _____.", "back": "Mortification or vexation."}, {"front": "According to the 'What to Watch For' box, what does the king's transformation suggest about Boccaccio's view of words?", "back": "Words can accomplish what force and supplication cannot."}, {"front": "Where did the lady land in Cyprus on her way home?", "back": "The text states she landed at Cyprus after her pilgrimage to Jerusalem."}, {"front": "The lady's approach to the king is an example of using _____ to alleviate grief when redress seems impossible.", "back": "Wit (or shaming)"}, {"front": "In the tale, the king is described as 'hitherto sluggish and _____' before his encounter with the lady.", "back": "Apathetic"}, {"front": "What was the 'remedy' the lady found for her despair over the lack of justice?", "back": "Making the king sensible of his own baseness."}, {"front": "What specific phrase does the narrator use to describe the lady's mood when she begins the tale?", "back": "Gladsome alacrity."}, {"front": "The lady's pilgrimage was to the site known as the _____.", "back": "Holy Sepulchre"}, {"front": "By the end of the tale, the king's apathy is replaced by _____.", "back": "Rigorous justice."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
