<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 2, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is the narrator of the ninth tale told on the first day of the Decameron?", "back": "Elissa"}, {"front": "What is the primary geographical setting where the lady of Gascony seeks justice?", "back": "Cyprus"}, {"front": "In the context of the Decameron, what is a 'motto'?", "back": "A pointed, witty remark used as a social weapon to shame, correct, or delight."}, {"front": "What medieval literary genre is characterized by providing instruction to rulers on proper conduct?", "back": "Speculum principis (or \"mirror for princes\")"}, {"front": "What was the political status of the region of Gascony during the fourteenth century?", "back": "It was part of the English-controlled Duchy of Aquitaine."}, {"front": "According to the text, what is the effect of setting tales in regions like Gascony and Cyprus?", "back": "It broadens the geographical reach of the Decameron beyond Italy."}, {"front": "What specific personality trait defines the King of Cyprus at the beginning of the tale?", "back": "He was notoriously indolent (spiritless and faineant)."}, {"front": "Why did the King of Cyprus fail to avenge affronts put upon others?", "back": "He was so spiritless that he even endured affronts offered to himself with reprehensible tameness."}, {"front": "How did the people of Cyprus use the king's passivity to their advantage?", "back": "They would vex or mortify him as a way to vent their own ill-humour."}, {"front": "What historical event serves as the temporal backdrop for the ninth tale of Day I?", "back": "The conquest of the Holy Land by Godfrey de Bouillon."}, {"front": "Where was the lady of Gascony returning from when she was outraged by ruffians in Cyprus?", "back": "A pilgrimage to the Holy Sepulchre in Jerusalem."}, {"front": "Instead of seeking redress, what did the lady tell the king she wished to learn from him?", "back": "How he patiently suffered the wrongs done to him so she could learn to endure her own."}, {"front": "What did the lady suggest she would do with her own wrongs if it were possible?", "back": "Transfer them to the king, as he was well-fitted to bear them."}, {"front": "How did the king respond immediately after hearing the lady's witty remark?", "back": "He was aroused as if from sleep and redressed her wrong."}, {"front": "What long-term change occurred in the king's governance after his encounter with the lady?", "back": "He became a rigorous administrator of justice to all who offended his crown."}, {"front": "According to Elissa, what can often reclaim men who are 'obdurate to censures and chastisements'?", "back": "An unpremeditated casual word (a witty remark)."}, {"front": "How does Boccaccio's approach to the 'speculum principis' genre differ from traditional medieval literature?", "back": "He achieves the ruler's instruction in a single sentence rather than through lengthy moralizing."}, {"front": "What does the transformation of the king suggest about Boccaccio's view of language?", "back": "Witty and well-aimed words can accomplish what force and supplication cannot."}, {"front": "Term: Faineant", "back": "Definition: Lacking spirit or being idle and ineffective."}, {"front": "What was the lady’s emotional state after being wronged by ruffians?", "back": "Broken-hearted and disconsolate."}, {"front": "Why is the lady's success in reforming the king considered a significant use of gendered power?", "back": "Boccaccio gives the power to correct a monarch to a woman using only her intellect and language."}, {"front": "What phrase does the narrator use to describe the lady's goal in speaking to the king after losing hope for justice?", "back": "To make the king sensible of his baseness."}, {"front": "Elissa mentions that her story's _____ is part of its point, emphasizing the power of a single remark.", "back": "brevity"}, {"front": "Which previous storyteller's narrative did Elissa cite as an illustration of reclamation through words?", "back": "Lauretta"}, {"front": "The lady's remark is described as a 'pointed, witty remark,' also known as a _____.", "back": "bon mot"}, {"front": "What was the specific social consequence for the king due to his 'reprehensible tameness'?", "back": "He lost the respect of his subjects, who used him as a target for their frustration."}, {"front": "What was the result of the lady's landing at Cyprus on her way home?", "back": "She met with brutal outrage at the hands of certain ruffians."}, {"front": "How does the lady's speech turn the king's weakness (patience with insults) against him?", "back": "By mockingly asking for a 'lesson' in that weakness, she shames him into realizing his lack of dignity."}, {"front": "Who was the 'first king of Cyprus' mentioned in the tale's historical setting?", "back": "The ruler reigning after the conquest by Godfrey de Bouillon."}, {"front": "What does Elissa suggest about the value of 'good stories'?", "back": "They are always pleasurable and worth listening to regardless of who tells them."}, {"front": "The King's transformation led him to mete out 'rigorous justice' specifically to those who offended what?", "back": "The majesty of his crown."}, {"front": "In the phrase 'spiritless and faineant,' what does 'spiritless' imply about the King's ability to rule?", "back": "He lacked the courage or will to exercise his authority or defend his honor."}, {"front": "What action did the lady take immediately before speaking to the king?", "back": "She presented herself before him in tears."}, {"front": "Why does the lady state she did NOT come before the king?", "back": "To seek redress for the wrong done to her."}, {"front": "What is the primary focus of the 'What to Watch For' section regarding the lady's remark?", "back": "How every word counts in transforming the king."}, {"front": "What region of modern-day France was part of the English Duchy of Aquitaine in the 14th century?", "back": "Gascony"}, {"front": "The motto is described as a 'social _____' capable of shaming or correcting.", "back": "weapon"}, {"front": "How does the King's initial behavior reflect a lack of 'majesty'?", "back": "He allowed himself to be vexed and mortified by anyone with an 'ill-humour to vent.'"}, {"front": "According to the story, why did the lady decide to 'make the king sensible of his baseness'?", "back": "As a way to alleviate her own grief after despairing of legal redress."}, {"front": "What term does Elissa use to describe the king’s state of apathy before he was 'aroused' by the lady?", "back": "Sluggish"}, {"front": "To whom does Elissa address her story by saying 'Bethink you, damsels'?", "back": "The other women in the group of storytellers."}, {"front": "What is the specific meaning of 'obdurate' in the context of Elissa’s introduction?", "back": "Stubbornly resistant to change or moral correction."}, {"front": "What did the lady hope to gain by 'transferring' her wrongs to the king?", "back": "Nothing literally, as it was a sarcastic remark meant to highlight his inappropriate passivity."}, {"front": "Which historical figure is credited in the text with the conquest of the Holy Land?", "back": "Godfrey de Bouillon"}, {"front": "What was the lady’s ultimate goal in traveling to Jerusalem?", "back": "A pilgrimage to the Holy Sepulchre."}, {"front": "How does the tale illustrate the theme of 'social correction'?", "back": "A person of lower social standing (a foreign woman) corrects the highest authority (a king) through wit."}, {"front": "In the context of the story, what does it mean to be 'sensible of one's baseness'?", "back": "To become aware of one's own lack of dignity or honor."}, {"front": "What does the text identify as the 'point' of the tale's extreme brevity?", "back": "To demonstrate that a single sentence can be as powerful as a long moral treatise."}, {"front": "The king's initial tolerance of insults is described by the lady as a form of _____.", "back": "patience"}, {"front": "According to Elissa, good stories are always worth listening to 'no matter by _____ they may be told.'", "back": "whom"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
