<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is the narrator of the first tale of Day IV in Boccaccio's Decameron?", "back": "Fiammetta."}, {"front": "What is the specific geographical setting of the tale concerning Tancred and Ghismonda?", "back": "Salerno."}, {"front": "What is the primary theme assigned to the stories told on Day IV of the Decameron?", "back": "Tragic love (unhappy endings)."}, {"front": "What is Tancred’s royal title in the source material?", "back": "Prince of Salerno."}, {"front": "What is Ghismonda’s marital status at the beginning of the story's main conflict?", "back": "Widow."}, {"front": "Why does Tancred initially refuse to arrange a second marriage for his daughter?", "back": "He possesses a selfish devotion and wishes to keep her near him."}, {"front": "How would a medieval audience have viewed Tancred's reluctance to remarry his daughter?", "back": "As a failure of paternal duty."}, {"front": "What is Guiscardo’s social standing at the court of Salerno?", "back": "He is a page of humble birth."}, {"front": "Which quality of Guiscardo leads Ghismonda to choose him as her lover despite his low birth?", "back": "His noble character and native worth."}, {"front": "What physical object does Ghismonda use to deliver her first secret letter to Guiscardo?", "back": "A hollowed-out cane."}, {"front": "Where is the secret letter hidden within the cane given to Guiscardo?", "back": "In the space between two of the knots."}, {"front": "What specific location serves as the secret meeting place for the two lovers?", "back": "A disused grotto hewn in the solid rock."}, {"front": "How is the grotto connected to Ghismonda’s private suite in the palace?", "back": "By a long-disused secret stair behind a strong door."}, {"front": "What method does Guiscardo use to enter the grotto from the outside orifice?", "back": "A ladder of ropes."}, {"front": "What does Guiscardo wear to protect himself from the brambles around the grotto's opening?", "back": "A suit of leather."}, {"front": "How does Tancred accidentally discover the affair between Ghismonda and Guiscardo?", "back": "He falls asleep behind bed curtains in Ghismonda’s room while she is away."}, {"front": "Where does Tancred sit when he falls asleep in his daughter’s room?", "back": "A divan at one of the corners of the bed."}, {"front": "How does Tancred exit the room after witnessing the lovers without being seen by them?", "back": "He clambers out of a window and down into the garden."}, {"front": "When Guiscardo is captured, what is his response to Tancred's accusation of dishonor?", "back": "He states that love is more potent than either of them."}, {"front": "What is Tancred’s main grievance against Ghismonda's choice of lover during their confrontation?", "back": "That she chose a man of the lowest condition rather than a nobleman."}, {"front": "How does Ghismonda initially react to the news that her secret is discovered and Guiscardo is captured?", "back": "She composes her countenance and suppresses her cries and tears."}, {"front": "What 'natural' argument does Ghismonda use to justify her desire to her father?", "back": "She argues she is a creature of flesh and blood with natural appetites."}, {"front": "According to Ghismonda, what is the only thing that distinguishes individuals if all souls are created equal?", "back": "Merit."}, {"front": "How does Ghismonda redefine true nobility in her speech to Tancred?", "back": "She claims nobility lies in virtue and actions rather than birth or blood."}, {"front": "In Ghismonda's view, what is the relationship between poverty and nobility (gentilesse)?", "back": "Poverty does not deprive a man of nobility."}, {"front": "Which Renaissance movement is Ghismonda's argument on virtue and nobility said to anticipate?", "back": "Renaissance humanism."}, {"front": "Ghismonda’s philosophical speech echoes the treatment of nobility found in which work by Dante?", "back": "Convivio IV."}, {"front": "What does Ghismonda warn Tancred she will do if he harms Guiscardo?", "back": "She will take her own life as well."}, {"front": "How does Tancred eventually execute Guiscardo?", "back": "He orders his men to strangle him noiselessly at night."}, {"front": "What specific part of Guiscardo’s body does Tancred send to Ghismonda?", "back": "His heart."}, {"front": "In what vessel does Tancred deliver Guiscardo's heart to his daughter?", "back": "A large and beautiful cup of gold."}, {"front": "What message does Tancred send along with the heart in the cup?", "back": "That he is giving her joy of what she loved best as she gave him joy of what he loved best."}, {"front": "How does Ghismonda interpret the use of a gold cup for the heart's delivery?", "back": "As a fittingly honorable sepulcher for such a noble heart."}, {"front": "What does Ghismonda prepare in advance to use in case of Guiscardo’s death?", "back": "A poisonous water distilled from herbs and roots."}, {"front": "What does Ghismonda mix with the poison in the golden cup?", "back": "Her own tears."}, {"front": "Where does Ghismonda place the heart as she waits for the poison to take effect?", "back": "She lays it upon her own heart while lying on her bed."}, {"front": "What is Ghismonda’s final request to her father before she dies?", "back": "To be buried in a common tomb alongside Guiscardo."}, {"front": "What is Tancred’s final reaction to the death of his daughter?", "back": "He is tardily repentant and mourns her deeply."}, {"front": "Ghismonda's speech is identified as the intellectual and _____ center of the tale.", "back": "emotional"}, {"front": "Term: Paternal Duty (Medieval Context)", "back": "Definition: The social expectation that a father provides suitable marriages for his children, which Tancred fails to do."}, {"front": "Concept: True Nobility", "back": "Definition: A humanist ideal that status is earned through virtue and merit rather than inherited through bloodline."}, {"front": "Which philosopher's future arguments are foreshadowed by Ghismonda’s speech on human dignity?", "back": "Pico della Mirandola."}, {"front": "How does Ghismonda describe herself to emphasize her vulnerability to love's power?", "back": "She describes herself as a creature of flesh and blood, not stone or iron."}, {"front": "Why does Ghismonda believe she has a 'doubly' strong appetite for love?", "back": "Because she is young and has already experienced sexual pleasure in marriage."}, {"front": "What does Ghismonda claim is the 'prime cause' of the sin Tancred accuses her of?", "back": "Herself (she lured Guiscardo to her love)."}, {"front": "The _____ of the ending has made this tale one of the most retold stories of the Middle Ages.", "back": "emotional power"}, {"front": "What does Ghismonda do to the heart before adding the poison to the cup?", "back": "She kisses it and weeps over it."}, {"front": "Who brought up Guiscardo 'in charity' from his tender years?", "back": "Tancred."}, {"front": "How does Ghismonda view the role of 'Fortune' in her relationship?", "back": "As a force that initially favored them but then turned envious and dolorous."}, {"front": "According to the source, what is the 'natural force' that cannot be denied without violence to human nature?", "back": "Love."}, {"front": "Ghismonda states that if any man denotes a virtuous person as 'ignoble,' the default lies with _____.", "back": "the one who denotes him so (the accuser)."}, {"front": "How did Ghismonda manage to open the grotto door that had been barred for years?", "back": "She used tools and worked in secrecy for many days."}, {"front": "What was the purpose of the 'artificial orifice' in the grotto?", "back": "To provide a small amount of light to the cave."}, {"front": "When Tancred first confronts Ghismonda, he describes her choosing Guiscardo as a 'signal _____'.", "back": "folly"}, {"front": "What reason does Tancred give for not immediately punishing Ghismonda upon discovery?", "back": "He wanted to avoid discovery and maintain honor while planning his design."}, {"front": "Tancred’s internal struggle is between his love for his daughter and his _____.", "back": "just indignation"}, {"front": "What does Ghismonda say to Guiscardo's soul just before she drinks the poison?", "back": "She asks if there is other company than hers in which she might more joyfully fare to abodes unknown."}, {"front": "True or False: Ghismonda denies her affair when confronted by Tancred.", "back": "False."}, {"front": "How does the town of Salerno react to the death of the lovers?", "back": "They mourn the lamentable end and honor the lovers."}, {"front": "In Ghismonda's speech, she mentions that many kings and princes were once _____.", "back": "poor"}, {"front": "What does Ghismonda call her father's gift of the heart just before her death?", "back": "The last and most tender grace he has ever shown her."}, {"front": "What was Guiscardo’s specific role at court before he was promoted in Ghismonda’s affections?", "back": "The Prince's page."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
