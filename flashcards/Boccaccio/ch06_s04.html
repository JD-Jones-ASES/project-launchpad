<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 6, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is the narrator of the ninth tale on the Fifth Day of the Decameron?", "back": "Fiammetta"}, {"front": "According to the text, what is the literary significance of the ninth tale of Day V?", "back": "It is considered the most perfectly constructed tale in the Decameron."}, {"front": "To which historical Florentine noble family does the protagonist Federigo belong?", "back": "The Alberighi family"}, {"front": "What is the meaning of the medieval Italian title 'Monna'?", "back": "A contraction of Madonna, used as a respectful address for a married woman."}, {"front": "What primary reason is given for Federigo degli Alberighi losing his entire fortune?", "back": "He spent it courting Monna Giovanna through jousts, feasts, and largess."}, {"front": "What was Federigo's sole remaining possession after he was reduced to poverty?", "back": "A single magnificent falcon"}, {"front": "Where was the small estate located where Federigo retired in his poverty?", "back": "Campi"}, {"front": "Who does Fiammetta cite as the historical source for the story of Federigo?", "back": "Coppo di Borghese Domenichi"}, {"front": "How does the text describe Monna Giovanna's initial response to Federigo's advances?", "back": "She cared 'not a jot' for his actions or for him."}, {"front": "Under what condition was Monna Giovanna named the heir to her husband's estate?", "back": "In the event that their son died without a lawful heir."}, {"front": "What specific item did Monna Giovanna's sick son believe would cure him?", "back": "Federigo's falcon"}, {"front": "Why was Monna Giovanna initially hesitant to ask Federigo for his falcon?", "back": "She knew it was his only remaining solace and that she had previously ignored his love."}, {"front": "What promise did Monna Giovanna make to her son to help him 'mend' from his sickness?", "back": "That she would personally go and fetch Federigo's falcon the next morning."}, {"front": "What excuse did Monna Giovanna provide Federigo for her unexpected visit to his farm?", "back": "She claimed she wanted to make restitution for his past love by eating breakfast with him."}, {"front": "Who accompanied Monna Giovanna on her visit to Federigo's house?", "back": "Another lady"}, {"front": "What was Federigo's immediate reaction upon hearing Monna Giovanna was at his door?", "back": "He was surprised and pleased, and he hurried to meet her with speed."}, {"front": "Why was Federigo particularly distressed when he decided to host Monna Giovanna for breakfast?", "back": "He found absolutely nothing in his house to honor her with, having no money or goods to pledge."}, {"front": "What did Federigo do to provide a meal for Monna Giovanna?", "back": "He wrung the neck of his falcon and had it roasted for her."}, {"front": "Who kept Monna Giovanna company in the garden while Federigo prepared the meal?", "back": "The wife of his husbandman"}, {"front": "What did Monna Giovanna and her companion eat during their breakfast with Federigo?", "back": "Federigo's prized falcon"}, {"front": "How did Monna Giovanna justify her request for the falcon to Federigo?", "back": "She appealed to his 'nobleness of temper' and described her son's terminal desperation."}, {"front": "Why did Federigo begin to weep after Monna Giovanna asked for the falcon?", "back": "He was filled with grief because he had already killed and served the bird as her breakfast."}, {"front": "What physical evidence did Federigo show Monna Giovanna to prove the falcon was dead?", "back": "The feathers, feet, and beak of the bird."}, {"front": "What was Monna Giovanna's reaction to learning Federigo had killed the falcon for her meal?", "back": "She chided him for the sacrifice but privately commended his magnanimity."}, {"front": "What was the eventual fate of Monna Giovanna's son?", "back": "He died a few days after her visit to Federigo."}, {"front": "Why did Monna Giovanna's brothers eventually urge her to remarry?", "back": "She was still young and had inherited a vast fortune."}, {"front": "What was Monna Giovanna's response when her brothers pressured her to take a new husband?", "back": "She declared she would marry no one except Federigo degli Alberighi."}, {"front": "What reason did Monna Giovanna give her brothers for choosing the impoverished Federigo?", "back": "She stated she would rather have a man without wealth than wealth without a man."}, {"front": "How did Federigo's financial life change after marrying Monna Giovanna?", "back": "He became very wealthy and began keeping 'more exact accounts.'"}, {"front": "In Fiammetta's introduction, what does she say women should learn from this story?", "back": "How to bestow rewards (guerdons) of their own accord rather than relying on Fortune."}, {"front": "How does the falcon function symbolically in the tale?", "back": "It represents the sacrifice and refinement of courtly love and Federigo's noble spirit."}, {"front": "What trait of Coppo di Borghese Domenichi made him an excellent storyteller?", "back": "His matchless accuracy, memory, and concinnity of speech."}, {"front": "What phrase does the text use to describe Federigo's reputation in Tuscany before his poverty?", "back": "He had no peer for feats of arms and courtesy."}, {"front": "Why did Federigo deem the falcon a 'meet dish' for Monna Giovanna?", "back": "He judged it to be fare of a more excellent quality than common food, suitable for her high dignity."}, {"front": "What was the 'trick' of Fortune that Federigo claimed he would never forgive?", "back": "That Giovanna finally asked him for a favor when he was no longer able to grant it."}, {"front": "How did Federigo's brothers-in-law react to Giovanna's choice of husband?", "back": "They initially derided her because he was penniless."}, {"front": "What qualities of Federigo convinced the brothers to allow the marriage?", "back": "They knew him to be a 'good man and true' despite his poverty."}, {"front": "According to Fiammetta, how does Fortune usually scatter her gifts?", "back": "Without rule or measure, and most times not wisely."}, {"front": "What was Federigo's primary activity during his seclusion at Campi?", "back": "Hawking with his falcon"}, {"front": "How did the boy become interested in Federigo's falcon?", "back": "He saw it fly many times while visiting his mother's nearby estate."}, {"front": "What did Federigo do with his table linen when preparing for Giovanna's visit?", "back": "He used his last 'spotless table linen' to set the table with honor."}, {"front": "How does the narrator describe the construction of this tale in the context of European literature?", "back": "As one of the most perfectly constructed and finest short stories in existence."}, {"front": "Why did Monna Giovanna believe Federigo would forgive her for asking for the falcon?", "back": "She believed he would understand if he knew the 'full force of the love' a parent has for a child."}, {"front": "What is the primary moral lesson Fiammetta intends for her audience regarding 'guerdons'?", "back": "Ladies should choose to reward merit themselves rather than leaving it to chance."}, {"front": "What does Boccaccio achieve by using real historical family names like Alberighi?", "back": "He blurs the line between fiction and chronicle, giving the tale a texture of local history."}, {"front": "In the context of the story, what does it mean to live 'straitly'?", "back": "To live in a restricted or impoverished manner with very little money."}, {"front": "How did Federigo feel about the money he spent on Monna Giovanna in the past?", "back": "He felt he had not lost but profited, as her merit inspired his own virtues."}, {"front": "What was the 'main purpose' of Monna Giovanna's visit, which she called 'presumption'?", "back": "To beg Federigo for his falcon to save her son."}, {"front": "What was the 'last resource' Federigo turned to when he found no money or items to pledge for food?", "back": "His brave falcon perched in his parlor."}, {"front": "Describe the change in Federigo’s character at the very end of the tale.", "back": "He became a better manager of his wealth and lived happily with his wife."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
