<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 9, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is considered the Decameron's only true recurring protagonist?", "back": "The painter Calandrino."}, {"front": "What does the name \"Calandrino\" mean in modern Italian usage?", "back": "A simpleton or easy mark."}, {"front": "Which character in the tale is a notorious joker whose name ironically means \"the Wise\"?", "back": "Maso del Saggio."}, {"front": "According to Maso del Saggio, what is the primary magical power of the heliotrope stone?", "back": "It makes its possessor invisible."}, {"front": "What is the common name for the real semi-precious stone known as the heliotrope?", "back": "Bloodstone."}, {"front": "Which two real-life Florentine painters are depicted as Calandrino's prankish friends?", "back": "Bruno and Buffalmacco."}, {"front": "Which 16th-century author recorded real-life anecdotes about the painters Bruno and Buffalmacco?", "back": "Giorgio Vasari."}, {"front": "Where do Calandrino and his friends go to search for the heliotrope?", "back": "The Mugnone stream."}, {"front": "In the context of Boccaccio's tales, what is a \"beffa\"?", "back": "An elaborate trick or practical joke."}, {"front": "Where does Maso first encounter Calandrino to begin his trick?", "back": "The church of San Giovanni."}, {"front": "In Maso's tall tale, what is the name of the district in the land of the Basques where stones are found?", "back": "Bengodi."}, {"front": "What food item is used to bind vines in the fictional land of Bengodi?", "back": "Sausages."}, {"front": "What substance makes up the mountain in Bengodi where people make macaroni?", "back": "Grated Parmesan cheese."}, {"front": "In Maso's description of Bengodi, what liquid flows through the rivulets?", "back": "Vernaccia (wine)."}, {"front": "How many times does Maso claim to have visited the land of Bengodi?", "back": "A thousand times."}, {"front": "According to Maso, where are the sandstones found that are used to make millstones?", "back": "Settignano and Montisci."}, {"front": "What color does Maso claim all heliotrope stones are?", "back": "Nearly black."}, {"front": "Where were Bruno and Buffalmacco working when Calandrino rushed to find them?", "back": "The Faentine women's convent."}, {"front": "What is Calandrino's motive for wanting the invisibility stone?", "back": "To steal money from moneychangers and become rich."}, {"front": "Why does Bruno suggest waiting until Sunday to look for the stone?", "back": "To avoid being seen by working people on a working day."}, {"front": "Why does Bruno claim the morning is the best time to find the heliotrope?", "back": "The sun dries the stones in the afternoon, making black stones look white."}, {"front": "Which city gate do the three men use to exit Florence for their quest?", "back": "Porta a San Gallo."}, {"front": "How does Calandrino carry the large quantity of black stones he collects?", "back": "In the folds of his tunic and cloak."}, {"front": "How do Bruno and Buffalmacco convince Calandrino he is invisible while still at the stream?", "back": "They pretend they cannot see him and talk about him as if he had left."}, {"front": "What physical abuse does Calandrino endure to maintain the illusion of his invisibility?", "back": "His friends pelt him with stones."}, {"front": "Why did the customs officers at the city gate let Calandrino pass without challenge?", "back": "Bruno and Buffalmacco had previously instructed them to play along."}, {"front": "Who is the first person to speak to Calandrino when he arrives home, breaking the illusion?", "back": "His wife, Monna Tessa."}, {"front": "What is the name of Calandrino's wife?", "back": "Monna Tessa."}, {"front": "Why does Calandrino believe his wife was able to see him despite the stone?", "back": "He believes women cause magical items to lose their \"virtue\" or power."}, {"front": "How does Calandrino react to his wife when he realizes he is no longer invisible?", "back": "He brutally beats and kicks her."}, {"front": "What do Bruno and Buffalmacco pretend to be when they arrive at Calandrino's house?", "back": "Angry at him for \"ditching\" them at the stream."}, {"front": "According to the friends' fake explanation, why was Calandrino ultimately to blame for his bad luck?", "back": "He failed to tell his wife to stay away from him that day."}, {"front": "What is a medieval \"lapidary\"?", "back": "A book describing the physical and magical properties of stones."}, {"front": "What literary style is demonstrated by the specific Florentine settings and artisan details in this tale?", "back": "Comic realism."}, {"front": "What does Maso say happens to the capons that are boiled in Bengodi?", "back": "They are eaten by the Basques."}, {"front": "What landmark does Maso use to describe the size of emerald mountains in the land of millstones?", "back": "Monte Morello."}, {"front": "How does Calandrino first approach Maso in the church?", "back": "He overhears Maso talking about stones and joins the conversation."}, {"front": "What does Calandrino do with the load of stones after reaching his parlor?", "back": "He discharges them on the floor."}, {"front": "Why did Calandrino choose to stay silent when his friends were hitting him with stones?", "back": "He was overjoyed by his perceived invisibility and did not want to reveal himself."}, {"front": "The phrase \"blessings come from God and millstones from ____\" is a saying Maso attributes to his fictional regions.", "back": "Montisci."}, {"front": "What was the specific physical location of Calandrino's house in Florence?", "back": "Hard by the corner of the Macina."}, {"front": "How does the narrator Elisa describe the truthfulness of her story?", "back": "As \"no less true than entertaining.\""}, {"front": "What does Calandrino forget as soon as he leaves Maso to find his friends?", "back": "The name of the stone (the heliotrope)."}, {"front": "What was the intended use for the sandstones if taken to the Soldan?", "back": "Connecting them with a ring before drilling a hole to get a great reward."}, {"front": "Why were there few people on the streets for Calandrino to encounter on his way home?", "back": "It was breakfast time."}, {"front": "Term: Heliotrope", "back": "Definition: A semi-precious variety of chalcedony believed in medieval times to grant invisibility."}, {"front": "According to Maso, what is unique about the rivulet in Bengodi?", "back": "It contains the best Vernaccia and never a drop of water."}, {"front": "What does Calandrino compare the act of painting walls to when inviting his friends to search for the stone?", "back": "Besmearing walls like snails."}, {"front": "What does Bruno say he will do to Calandrino's heel while pretending he is not there?", "back": "Give him a reminder with a stone."}, {"front": "What is the primary psychological theme explored through Calandrino’s endurance of the stoning?", "back": "The absolute nature of belief and how it can lead to self-delusion."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
