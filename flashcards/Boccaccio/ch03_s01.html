<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In the context of the Decameron, what are the two simultaneous meanings of the Latin word 'fortuna'?", "back": "Wealth (fortune) and chance (fate)."}, {"front": "Which Roman philosopher's work is the source of the image of 'Fortune's wheel' used in the Decameron?", "back": "Boethius (Consolation of Philosophy)."}, {"front": "How is the force of Fortune personified in medieval Italian thought?", "back": "As a capricious, irresistible, and morally indifferent goddess."}, {"front": "What does the term 'ingegno' signify in the context of Boccaccio's work?", "back": "Intelligence, resourcefulness, and the ability to adapt to circumstances."}, {"front": "According to the commentary, what is the primary thematic relationship explored in the tales of Day II?", "back": "The relationship between external fortune and human resourcefulness (ingegno)."}, {"front": "How does Andreuccio’s character change from the beginning of the night to the end?", "back": "He transforms from a naive fool into a resourceful improviser."}, {"front": "In contrast to Andreuccio, how does Alatiel typically respond to the actions of Fortune?", "back": "She is entirely passive and lacks agency or response."}, {"front": "According to Boccaccio, what specific element makes a story about inescapable fortune worth telling?", "back": "The human response to that fortune."}, {"front": "Concept: Fortuna", "back": "Definition: A quasi-divine force governing the rise and fall of human affairs and creating narrative situations."}, {"front": "In the Decameron, who are considered the true 'heroes' in relation to Fortune's wheel?", "back": "Those who learn to 'ride' the wheel rather than trying to escape it."}, {"front": "Which literary genre is Andreuccio da Perugia (II.5) considered a forerunner of?", "back": "The picaresque tradition."}, {"front": "Term: Picaresque", "back": "Definition: Fiction featuring a resourceful, low-born protagonist navigating adventures in a corrupt social world."}, {"front": "In the picaresque tradition, how does the hero typically learn about human nature?", "back": "Through direct experience and living by their wits."}, {"front": "How many distinct episodes comprise the structure of the tale of Andreuccio (II.5)?", "back": "Three episodes."}, {"front": "In the first episode of II.5, what ruse does the Sicilian woman use to lure Andreuccio?", "back": "She claims to be his long-lost sister."}, {"front": "What is the primary lesson Andreuccio learns from his encounter with the Sicilian woman?", "back": "The duplicity of the world."}, {"front": "How does Andreuccio end up inside a well in the second episode of the tale?", "back": "He attempts to clean himself and is recruited by two men for a dangerous task."}, {"front": "What is Andreuccio's goal when he enters the archbishop's tomb in the final episode?", "back": "To steal a precious ruby ring."}, {"front": "How does Andreuccio escape the archbishop's tomb when his companions try to trap him?", "back": "He uses their own trick against them."}, {"front": "Why is the setting of Naples described with such vivid sensory detail in Andreuccio's tale?", "back": "Boccaccio lived there for years at the Angevin court and knew it intimately."}, {"front": "What does the extreme passivity of Alatiel (II.7) force readers to confront regarding women's roles?", "back": "The reduction of women to objects of exchange valued only for beauty and virginity."}, {"front": "What is the central irony of Alatiel's return to her father at the end of tale II.7?", "back": "She is married off 'as a virgin' despite her numerous sexual encounters."}, {"front": "The proverb 'kissing-lips lose no flavor, but renew themselves like the moon' suggests that social reality is determined by _____.", "back": "Appearances alone."}, {"front": "In Novel II.1, why does Martellino nearly get hanged by a crowd in Treviso?", "back": "He is caught feigning a miraculous cure after pretending to be a cripple."}, {"front": "What is the primary theme of the reversals found in the tale of Martellino (II.1)?", "back": "The dangers of playing tricks on the faithful and the rapidity of fortune's changes."}, {"front": "In Novel II.2, which saint does Rinaldo d'Asti believe provided him with warmth and shelter?", "back": "Saint Julian."}, {"front": "What humorous suggestion does the tale of Rinaldo d'Asti (II.2) make about providence?", "back": "That providence works in ways the pious might not expect."}, {"front": "In Novel II.3, what secret identity does the youngest brother discover about the wealthy abbot?", "back": "The abbot is the daughter of the King of England in disguise."}, {"front": "How many times does Fortune's wheel turn for Landolfo Rufolo in Novel II.4?", "back": "Twice (downward through shipwrecks, then upward with a chest of gems)."}, {"front": "What is the occupation of Landolfo Rufolo before he becomes the richest man in his region?", "back": "A merchant turned pirate."}, {"front": "What historical event causes the separation of Madam Beritola from her sons in Novel II.6?", "back": "The Sicilian Vespers (1282)."}, {"front": "Why is Madam Beritola given the nickname 'the she-goat'?", "back": "She ends up nursing two roe-deer while stranded on an island."}, {"front": "In Novel II.8, what false accusation is brought against the Count of Antwerp?", "back": "Assaulting the French queen."}, {"front": "How does the Count of Antwerp ensure the survival of his children during his exile?", "back": "He disguises himself as a servant and has them raised in humble circumstances."}, {"front": "Which tale in Day II is identified as a direct source for William Shakespeare's Cymbeline?", "back": "Novel II.9 (Bernabò of Genoa)."}, {"front": "In Novel II.9, how does Zinevra eventually expose the man who faked evidence of her infidelity?", "back": "She escapes her execution and disguises herself as a man to gain power in the sultan's court."}, {"front": "What is the central conflict in the marriage of the judge and his wife in Novel II.10?", "back": "The elderly judge attempts to control his young wife."}, {"front": "Why does the judge's wife refuse to return home after being abducted by the pirate Paganino?", "back": "She finds she prefers the pirate's company to her husband's."}, {"front": "How do the tales of Day II generally characterize the relationship between Fortune and morality?", "back": "Fortune is morally blind, rewarding or punishing the wicked and innocent with equal indifference."}, {"front": "Which town on the Amalfi Coast is the home of Landolfo Rufolo in II.4?", "back": "Ravello."}, {"front": "What does the narrator's use of a 'crude and philosophically suggestive' joke at the end of Alatiel's tale imply?", "back": "A satirical exposure of a system that commodifies women."}, {"front": "In the context of the Decameron, what is the 'supreme human quality'?", "back": "Ingegno (Intelligence/Wit)."}, {"front": "According to the commentary, which city functions as a 'character' in the tale of Andreuccio?", "back": "Naples."}, {"front": "In the tale of the Three Brothers (II.3), how is their fortune finally restored?", "back": "Through the discovery of the King of England's daughter's hidden identity."}, {"front": "What quality does the Count of Antwerp (II.8) exemplify in the face of his long exile?", "back": "Patience and innocence."}, {"front": "What note does Day II close on in Novel II.10?", "back": "Earthy comedy regarding marital desires."}, {"front": "How does the first episode of Andreuccio's night end physically for him?", "back": "He is robbed and thrown into a foul alley."}, {"front": "Who rescues Martellino from being hanged in Novel II.1?", "back": "His friends, using a second deception."}, {"front": "The character Alatiel (II.7) is described as being passed from man to man by 'the sheer force of _____' and desire.", "back": "Circumstances."}, {"front": "In the tale of Landolfo Rufolo, what object does he cling to after being shipwrecked?", "back": "A chest floating in the sea."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
