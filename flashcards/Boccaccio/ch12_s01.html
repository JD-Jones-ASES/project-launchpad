    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 12, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

        </div>

    <script>
    var CARDS = [{"front": "In what year was the Italian author Giovanni Boccaccio born?", "back": "1313."}, {"front": "Boccaccio is traditionally viewed as a bridge between the Middle Ages and what other cultural era?", "back": "The Renaissance."}, {"front": "Which medieval structures shaped Boccaccio's early worldview before he wrote the Decameron?", "back": "Feudal hierarchies and the authority of the Church."}, {"front": "What group of people governed the cities in the Decameron, replacing traditional hereditary lords?", "back": "Elected councils."}, {"front": "What term does Boccaccio use to describe the individual wit and resourcefulness of the merchant class?", "back": "Ingegno."}, {"front": "How did historian Gene Brucker describe fourteenth-century Florence?", "back": "A society in transition."}, {"front": "What revolutionary literary concept is demonstrated by Boccaccio's inclusion of horse-dealers and artisans?", "back": "The democratization of the literary subject."}, {"front": "Boccaccio argued that serious literature could be found in the marketplace and bedchamber, not just the court or the _____.", "back": "Cloister."}, {"front": "How do Boccaccio's characters differ from traditional medieval allegorical figures?", "back": "They are recognizable human types drawn with the specificity of a portrait."}, {"front": "Which two Florentine painters are noted for introducing bodies with weight and emotion into visual art?", "back": "Giotto and Cimabue."}, {"front": "What specific artistic tradition did Giotto and Cimabue move away from to embrace realism?", "back": "The flat, stylized Byzantine tradition."}, {"front": "Boccaccio's Florence is described as a real city because it features named streets and recognizable _____.", "back": "Neighborhoods."}, {"front": "The visceral", "back": "Realism."}, {"front": "By killing his falcon, the character Federigo demonstrates what quality in Boccaccio’s prose?", "back": "Emotional intensity."}, {"front": "Boccaccio’s work in prose fiction is credited with laying the foundations for which modern literary genre?", "back": "The novel."}, {"front": "When did Geoffrey Chaucer travel to Italy and encounter Boccaccio’s work?", "back": "The 1370s."}, {"front": "What narrative structure did Chaucer adopt from Boccaccio for The Canterbury Tales?", "back": "The frame-narrative."}, {"front": "Chaucer's 'The Clerk's Tale' is a retelling of the story of which Boccaccio character?", "back": "Patient Griselda."}, {"front": "Through whose Latin translation did Chaucer most likely access the story of Patient Griselda?", "back": "Petrarch."}, {"front": "The theme of 'competing generosities' in Chaucer's 'The Franklin's Tale' is derived from which Decameron story?", "back": "Tale X5 (The Magic Garden)."}, {"front": "Which earlier work by Boccaccio served as the source for Chaucer's 'The Knight's Tale'?", "back": "The Teseida."}, {"front": "How do Boccaccio's storytellers in the frame narrative differ socially from Chaucer's pilgrims?", "back": "Boccaccio's narrators are elegant aristocrats, while Chaucer's are a boisterous cross-section of society."}, {"front": "Which Shakespearean play is based on the tale of Gillette of Narbonne (III9)?", "back": "All's Well That Ends Well."}, {"front": "Shakespeare's Cymbeline draws its plot from which specific type of story in the Decameron?", "back": "The wager tale (II9)."}, {"front": "The casket scene in The Merchant of Venice echoes narrative structures found in which collection?", "back": "The Decameron."}, {"front": "Through which English translation did William Shakespeare likely encounter Boccaccio's tales?", "back": "William Painter's Palace of Pleasure."}, {"front": "Who authored the Trecentonovelle in conscious imitation of Boccaccio's style?", "back": "Franco Sacchetti."}, {"front": "Which Italian author's novelle served as a principal source for Elizabethan dramatists?", "back": "Matteo Bandello."}, {"front": "Giovan Francesco Straparola and Giambattista Basile extended the novella tradition into what genre?", "back": "Fairy tales and folk narrative."}, {"front": "Which French author wrote the Heptaméron (1558) in the tradition of Boccaccio?", "back": "Marguerite de Navarre."}, {"front": "What was the title of Miguel de Cervantes' 1613 collection of short stories?", "back": "Novelas ejemplares."}, {"front": "Which nineteenth-century French master of the short story is a direct literary descendant of Boccaccio?", "back": "Guy de Maupassant."}, {"front": "Which nineteenth-century Russian author is noted for using the 'telling detail' inherited from the Boccaccian tradition?", "back": "Anton Chekhov."}, {"front": "What is the primary target of Boccaccio's mockery regarding Christianity in the Decameron?", "back": "The gap between the Church's professions and the practices of its representatives."}, {"front": "How does the 'brigata' (the storytelling company) maintain a devout routine during the plague?", "back": "They attend Mass, pray, and observe feast days."}, {"front": "In the medieval understanding, what was the purpose of criticizing the clergy?", "back": "To call the Church back to its own ideals."}, {"front": "Which earlier medieval figures established a tradition of Christian self-criticism before Boccaccio?", "back": "St. Bernard of Clairvaux and Dante Alighieri."}, {"front": "In his later life, Boccaccio lectured publicly on which major literary work?", "back": "Dante's Divine Comedy."}, {"front": "Who talked Boccaccio out of destroying the Decameron during his late-life religious crisis?", "back": "Petrarch."}, {"front": "What moral argument did Petrarch use to justify the value of the Decameron?", "back": "It showed human nature in all its imperfection."}, {"front": "Concept: Ingegno.", "back": "Definition: Individual wit and resourcefulness used to navigate a changing society. Example: A servant outwitting a nobleman."}, {"front": "The Decameron is compared to medieval cathedrals because it finds room for both the sacred and the _____.", "back": "Gargoyles (the human and the profane)."}, {"front": "Which characteristic of Boccaccio's prose showed European writers that fiction could match the power of poetry?", "back": "Specificity."}, {"front": "Which character in the Decameron confronts her father with a dignity surpassing that of a prince?", "back": "Ghismonda."}, {"front": "Florence in the 1300s is described as modern in its economic dynamism but medieval in its _____.", "back": "Religious assumptions."}, {"front": "The shift from stylized figures to bodies with weight in art is a parallel to Boccaccio’s shift toward _____.", "back": "Human types."}, {"front": "Boccaccio's later life scholarship treated the Divine Comedy not just as a poem, but as a _____ poem.", "back": "Sacred."}, {"front": "The Decameron is described as a 'storehouse' of what three literary elements for later European writers?", "back": "Plots, characters, and situations."}, {"front": "In the Boccaccian tradition, what are the three key qualities of a powerful short prose tale?", "back": "Brevity, compression, and the telling detail."}, {"front": "According to the text, Boccaccio's humanity was not opposed to faith but _____ to it.", "back": "Complementary."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
