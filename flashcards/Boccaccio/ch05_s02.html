<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What unique narrative move does Boccaccio make at the start of Day IV of the Decameron?", "back": "He steps out from the frame narrative to address his readers directly in a personal preface."}, {"front": "The Preface to Day IV is noted by scholars for anticipating which modern literary technique?", "back": "Metafiction."}, {"front": "Against what specific force does Boccaccio defend his work in the Day IV preface?", "back": "Envy."}, {"front": "To what does Boccaccio compare the 'vehement and scorching blast of envy'?", "back": "A hurricane that vents itself on lofty towers or high tree-tops."}, {"front": "What language and style does Boccaccio claim to use to avoid the 'buffetings' of envy?", "back": "The vulgar Florentine prose in a homely and simple style."}, {"front": "According to the preface, who are the primary critics of Boccaccio's work?", "back": "Those who believe he is too fond of women and that his age makes his subject matter unseemly."}, {"front": "What is the 'bread' critique leveled against Boccaccio by his detractors?", "back": "That he should focus on earning his daily bread instead of writing idle fables."}, {"front": "Where do critics suggest Boccaccio should stay instead of 'dallying' with women?", "back": "On Parnassus with the Muses."}, {"front": "What does Boccaccio propose to tell his critics instead of a full story?", "back": "An incomplete part of a story to demonstrate it is not one of the hundred official tales."}, {"front": "In Boccaccio's parable, why does Filippo Balducci take his son to a cell on Monte Asinaio?", "back": "To raise him in isolation and devote him to the service of God after his wife's death."}, {"front": "At what age does Filippo Balducci's son first visit the city of Florence?", "back": "Eighteen."}, {"front": "How does Filippo Balducci describe the women his son sees in Florence to discourage interest?", "back": "He calls them 'goslings' (papere) and claims they are 'naughty things.'"}, {"front": "What is the son's reaction to seeing women for the first time in the parable?", "back": "He is instantly captivated and prefers them to all the palaces, horses, and painted angels he has seen."}, {"front": "What is the primary argument of the 'parable of the goslings' regarding the nature of love?", "back": "Love is an irresistible force of nature rather than a corruption of culture."}, {"front": "What does the son ask to do with one of the 'goslings' at the end of the parable?", "back": "He wants to take one back to the mountain cell and provide 'whereon to bill.'"}, {"front": "How does Boccaccio use the 'leek' metaphor to defend writing about love in his old age?", "back": "He notes that although the head of a leek is white, it still has a green tail."}, {"front": "Which three famous poets does Boccaccio cite as examples of men who honored women in their old age?", "back": "Dante Alighieri, Guido Cavalcanti, and Cino da Pistoia."}, {"front": "How does Boccaccio justify his interest in women by comparing them to the Muses?", "back": "He argues that women are ladies and possess the 'outward semblance' of the Muses."}, {"front": "According to Boccaccio, how many verses have ladies been the 'occasion' of him composing?", "back": "A thousand verses."}, {"front": "What is Boccaccio's rebuttal to critics who say poets should seek bread rather than fables?", "back": "He claims poets have found more 'bread' in fables than many rich men have in their treasures."}, {"front": "Which biblical figure does Boccaccio reference when discussing his ability to handle poverty or abundance?", "back": "The Apostle (St. Paul)."}, {"front": "How does Boccaccio respond to critics who claim his stories are factually inaccurate?", "back": "He challenges them to produce the original sources to prove their claims."}, {"front": "Who is the ruler (King) of Day IV in the Decameron?", "back": "Filostrato."}, {"front": "What is the etymological meaning of the name 'Filostrato'?", "back": "Vanquished by love (from Greek 'philos' and Latin/Italian 'strato')."}, {"front": "What is the decreed theme for the tales of Day IV?", "back": "Those whose love came to a tragic conclusion."}, {"front": "How does the tone of Day IV differ from the preceding Day III?", "back": "It shifts from celebrating clever triumphs to confronting the reality of destructive passion and unhappy endings."}, {"front": "Term: Vulgar Florentine.", "back": "Definition: The vernacular language of Florence used by Boccaccio for the prose of the Decameron."}, {"front": "Term: Alms.", "back": "Definition: Charitable gifts given to the poor as a religious duty."}, {"front": "Term: Messer.", "back": "Definition: A standard Italian title of respect for a gentleman or knight, meaning 'My lord' or 'Sir.'"}, {"front": "Concept: The 'Goslings' Parable.", "back": "The story of Filippo Balducci's son used to prove that natural attraction to women exists without education or social influence."}, {"front": "According to Boccaccio, what happens to those who attempt to withstand the laws of nature?", "back": "They labor in vain and often to their own most grievous disadvantage."}, {"front": "What does Boccaccio say to his detractors who 'cannot get heat' from his stories?", "back": "He tells them to 'shiver their life away.'"}, {"front": "Where is the storytelling company gathered to begin Day IV?", "back": "By a beautiful fountain in a fair garden."}, {"front": "Who is the first person bidden to tell a story on Day IV?", "back": "Fiammetta."}, {"front": "At what point in the day do the company members begin their storytelling sessions?", "back": "When the sun is in its zenith (noon)."}, {"front": "What metaphor does Boccaccio use to describe himself if he were to fall from the heights of his work?", "back": "Fine dust that cannot sink lower than the level from which it was raised."}, {"front": "Why did Filippo Balducci decide to 'have done with the world'?", "back": "He was disconsolate after the death of his beloved wife."}, {"front": "What was the only thing Filippo's son was taught while living on Monte Asinaio?", "back": "Holy orisons and matters concerning the glory of God and the saints."}, {"front": "Why did Filippo initially believe it was safe to take his son to Florence?", "back": "He thought the boy was so habituated to the service of God that he could not be seduced by the world."}, {"front": "What does Boccaccio confess regarding his feelings toward the ladies who read his work?", "back": "He frankly and fully confesses that he is fond of them and at pains to pleasure them."}, {"front": "Boccaccio argues that his soul has been dedicated to women since which stage of life?", "back": "Boyhood."}, {"front": "How does Boccaccio describe the physical constitution given to him by 'Heaven'?", "back": "A body fashioned 'all apt for love.'"}, {"front": "What does Boccaccio suggest his critics do if they are ignorant of noble men of old who pleasured ladies?", "back": "He tells them to 'go they and get them to school.'"}, {"front": "Boccaccio states that if he ever needs bread, he is minded to be beholden to whom?", "back": "None but himself."}, {"front": "What does the son in the parable compare women to when he first sees them?", "back": "Painted angels."}, {"front": "Why does Boccaccio conclude that his critics are 'witless' regarding the boy in the parable?", "back": "Because even a lad 'liker to an animal' found more delight in women than in anything else."}, {"front": "In the introduction, Filostrato is described as the protagonist of which earlier Boccaccio poem?", "back": "Il Filostrato."}, {"front": "The Retelling of which story is the subject of Boccaccio's poem Il Filostrato?", "back": "Troilus and Criseyde."}, {"front": "According to the preface, what is the only state exempt from envy in the present life?", "back": "Misery."}, {"front": "How does Boccaccio describe his intended relationship with his critics after the preface?", "back": "He intends to turn his back on them and continue his work with patience."}, {"front": "What specific physical attributes of women does Boccaccio list as justifying his fondness for them?", "back": "Debonair demeanour, bewitching beauty, exquisite grace, and modest womanliness."}, {"front": "In the 'goslings' parable, what does the father ask the son to do when they encounter the women?", "back": "To fix his gaze on the ground and regard them not at all."}, {"front": "What does the father tell the son the 'goslings' bill on?", "back": "He refuses to tell him, saying 'Thou knowest not whereon they bill.'"}, {"front": "What is the primary reason Boccaccio gives for not answering his critics at length?", "back": "To secure his ears some 'respite of their clamour.'"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
