<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "From which plague-stricken city do the ten young people flee at the start of the Decameron?", "back": "Florence."}, {"front": "In what specific geographic area do the young people find refuge from the plague?", "back": "The hills of Fiesole."}, {"front": "To what ancient civilization is the town of Fiesole historically linked?", "back": "The Etruscans."}, {"front": "Who is the first member of the brigata to be elected as queen?", "back": "Pampinea."}, {"front": "What social status or characteristic led to Pampinea's election as the first queen?", "back": "She was the eldest of the women."}, {"front": "Which specific character initially proposed the retreat from Florence to the country estate?", "back": "Pampinea."}, {"front": "What term is used to describe the collective company of ten storytellers?", "back": "The brigata."}, {"front": "What is unique about the storytelling themes of Day I and Day IX?", "back": "They have no prescribed theme, allowing for complete freedom of subject."}, {"front": "Which theme in Day I involves the criticism of religious figures?", "back": "Religious hypocrisy."}, {"front": "What kind of wisdom is specifically identified as a theme introduced in the first day's tales?", "back": "Interfaith wisdom."}, {"front": "The sharp wit of both men and women is an introductory theme of which Day?", "back": "Day I."}, {"front": "What literary role do the ten tales of Day I play for the entire Decameron?", "back": "They serve as an overture to the entire work."}, {"front": "What does the group's established \"civilized order\" at the estate deliberately contrast?", "back": "The chaos of the plague."}, {"front": "According to the narrative sequence, what act happens immediately before the election of the queen?", "back": "The agreement on the rules of storytelling."}, {"front": "At what specific canonical hour does the queen rouse the company to begin their afternoon activities?", "back": "Shortly after none."}, {"front": "Why does Pampinea argue against sleeping for a long time during the day?", "back": "She believes it is injurious to health."}, {"front": "Where does the brigata gather to tell their stories to escape the sun?", "back": "A meadow."}, {"front": "How is the meadow grass described in relation to the sun?", "back": "It is green, luxuriant, and nowhere scorched by the sun."}, {"front": "According to the queen, what is the only thing breaking the silence of the afternoon heat?", "back": "The cicalas among the olive trees."}, {"front": "What two indoor games are available at the estate as alternatives to storytelling?", "back": "Dice and chess."}, {"front": "Why does Pampinea believe that playing dice or chess is an inferior pastime?", "back": "The loser is vexed, and neither the winner nor the onlookers are much pleased."}, {"front": "According to Pampinea, what is the benefit of one person's storytelling invention for the group?", "back": "It affords solace to all the company of hearers."}, {"front": "At what specific time of day does the storytelling session conclude?", "back": "The vesper hour."}, {"front": "Which narrator is commanded by the queen to lead off the first day's storytelling?", "back": "Pamfilo."}, {"front": "Where was Pamfilo seated when the queen addressed him to begin the stories?", "back": "On her right hand."}, {"front": "What historical villa on the slope of Fiesole is traditionally identified as the setting?", "back": "Villa Palmieri (now Crawford)."}, {"front": "What is the primary rule for the storytelling on the first day?", "back": "To be free to discourse of such matters as most commend themselves to each."}, {"front": "How does the text describe the breeze in the meadow where the company ranges themselves?", "back": "It is a light breeze that gently fans them."}, {"front": "What was the \"first act of order\" performed by the group in their \"disordered world\"?", "back": "To elect a queen."}, {"front": "What theme in Day I involves a verbal correction or criticism directed at a monarch?", "back": "Royal rebuke."}, {"front": "According to Pampinea, why is it \"folly\" to leave the meadow during the afternoon?", "back": "The sun is high and the heat is intense."}, {"front": "In what direction from Florence is Fiesole located?", "back": "To the north."}, {"front": "What environmental quality does Pampinea highlight as a reason to stay in the meadow?", "back": "The air is cool and the prospect is fair."}, {"front": "What determines when the brigata will be able to take their pleasure \"where it may seem best to each\"?", "back": "When the sun is low and the heat has abated."}, {"front": "How many total tales are contained within the Decameron?", "back": "One hundred."}, {"front": "Which character is described as the promptest to follow the word of command to begin storytelling?", "back": "Pamfilo."}, {"front": "What term refers to the pronged implement used historically to drag corpses during the plague?", "back": "The text suggests this is the likely origin of a name mentioned in the narrative."}, {"front": "According to the Day I introduction, what determines the range of subjects in the first ten stories?", "back": "The narrators' complete freedom of subject."}, {"front": "What does the queen promise will happen before each member has told a story?", "back": "The sun will be low and the heat abated."}, {"front": "In the context of the story's setting, what type of trees are the cicalas located in?", "back": "Olive trees."}, {"front": "What is the first activity the company performs upon arrival, according to the brief narrative summary?", "back": "Their first meal."}, {"front": "How does the text characterize the audience's reaction as Pamfilo begins his story?", "back": "They all listened intently."}, {"front": "Under whose rule do the storytellers tell their first tales?", "back": "Pampinea's."}, {"front": "What is the primary motive for the group to establish rules upon arrival at the estate?", "back": "To establish civilized order."}, {"front": "Which day is mentioned alongside Day I as having no prescribed theme?", "back": "Day IX."}, {"front": "According to the queen, what is the specific downside of games where there is a winner and a loser?", "back": "The loser must needs be vexed."}, {"front": "What is the historical significance of Fiesole's location in relation to villas?", "back": "It has long been associated with villas and rural retreats."}, {"front": "What is the queen's stance on consulting the company's pleasure regarding her proposal?", "back": "She is disposed to consult their pleasure but offers her advice as a preferred path."}, {"front": "What visual evidence in the meadow suggests it is a cool refuge?", "back": "The grass is green and luxuriant, fanned by a light breeze."}, {"front": "What general subject does Boccaccio use the Day I tales to introduce for the rest of the book?", "back": "Themes that will be developed across all one hundred tales."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
