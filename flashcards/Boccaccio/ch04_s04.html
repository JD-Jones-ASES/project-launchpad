<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 4, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is the narrator of the ninth tale on the third day of the Decameron?", "back": "Neifile."}, {"front": "What is the primary theme of the tale of Gillette of Narbonne?", "back": "Cleverness triumphant and female agency."}, {"front": "Which Shakespearean play is based on the tale of Gillette and Beltramo?", "back": "All's Well That Ends Well."}, {"front": "What English work served as Shakespeare's likely source for this Decameron tale?", "back": "William Painter's Palace of Pleasure."}, {"front": "What was the professional occupation of Gillette's father, Gerard of Narbonne?", "back": "He was a famous physician."}, {"front": "Why does Beltramo, Count of Roussillon, initially reject Gillette as a wife?", "back": "He considers her of lower birth and lineage than himself."}, {"front": "In medieval society, what two conflicting reputations did medical knowledge possess?", "back": "It carried both prestige and suspicion, hovering between science and magic."}, {"front": "What specific medical ailment is the King of France suffering from in the story?", "back": "A fistula caused by an ill-tended tumour in the breast."}, {"front": "What reward does Gillette demand from the King in exchange for curing him?", "back": "The husband of her choice, excluding royalty."}, {"front": "What penalty does Gillette agree to if she fails to cure the King within eight days?", "back": "She agrees to be burned."}, {"front": "On what two sources of help does Gillette claim to rely for her medical treatment?", "back": "The help of God and the skill of her father."}, {"front": "Why does the King initially scoff at Gillette's offer to heal him?", "back": "He doubts a young woman could possess knowledge greater than the world's best physicians."}, {"front": "To what region does Beltramo flee to avoid his marriage with Gillette?", "back": "Tuscany."}, {"front": "With which city's forces does Beltramo take service upon arriving in Tuscany?", "back": "Florence."}, {"front": "How do the tenants of Roussillon feel about Gillette's management in Beltramo's absence?", "back": "They hold her in great esteem and love for rectifying the decay of the estate."}, {"front": "What is the first condition Beltramo sets for accepting Gillette as his wife?", "back": "She must obtain the prized ring from his finger."}, {"front": "What is the second condition Beltramo sets for accepting Gillette as his wife?", "back": "She must bear him a son."}, {"front": "What does Gillette tell her vassals is the reason for her departure from Roussillon?", "back": "She is going on a pilgrimage and performing pious works."}, {"front": "How does Gillette disguise herself when she travels to Florence?", "back": "She wears pilgrim's weeds."}, {"front": "Who informs Gillette of Beltramo's pursuit of a neighbor in Florence?", "back": "The widow who keeps the inn where Gillette stays."}, {"front": "What literary motif involves substituting one person for another in a sexual encounter?", "back": "The bed trick."}, {"front": "What does Gillette offer the poor gentlewoman in exchange for help with Beltramo?", "back": "A dowry for the gentlewoman's daughter."}, {"front": "Definition: Dowry", "back": "Money, property, or goods brought by a bride to her husband at marriage."}, {"front": "Why is the gentlewoman's daughter in Florence unable to marry despite her virtue?", "back": "She lives in poverty and lacks a dowry."}, {"front": "What does the Florentine daughter demand from Beltramo to prove his love?", "back": "The ring he wears on his finger."}, {"front": "How many sons does Gillette conceive as a result of the bed trick?", "back": "Two sons."}, {"front": "What does Beltramo give Gillette every morning, mistakenly thinking she is his mistress?", "back": "Fair and rare jewels."}, {"front": "How much money does Gillette ultimately provide the Florentine lady for her daughter's dowry?", "back": "Five hundred pounds plus jewels."}, {"front": "At what event in Roussillon does Gillette finally reveal her triumph to Beltramo?", "back": "A great reception on All Saints' Day."}, {"front": "How does Gillette prove that the two children she carries are Beltramo's sons?", "back": "The children bear his own lineaments and are as like him as possible."}, {"front": "How does Beltramo react when he realizes Gillette has fulfilled his conditions?", "back": "He lays aside his harsh obduracy and acknowledges her as his lawful wife."}, {"front": "What does the narrator suggest is a 'shadow' over the happy ending of the tale?", "back": "Beltramo's initial reluctance and harshness toward Gillette."}, {"front": "Where was Gillette of Narbonne brought up as a child?", "back": "In the household of Isnard, Comte de Roussillon."}, {"front": "What happened to Beltramo immediately after his father's death?", "back": "He became a ward of the King and went to Paris."}, {"front": "Why did Gillette stay in Narbonne after her father died instead of going to Paris?", "back": "She was a sole heiress and was closely guarded without a decent pretext to leave."}, {"front": "What was the significance of the ring Beltramo wore?", "back": "He prized it because of a virtue he believed it possessed."}, {"front": "In what French city does Gillette rest briefly before her final reveal at Roussillon?", "back": "Montpellier."}, {"front": "How does the King justify forcing Beltramo to marry a woman of lower status?", "back": "He must keep his pledged word for the restoration of his health."}, {"front": "How does Gillette describe her own medical art to the King?", "back": "She claims it is not her own skill, but relies on God and her father's knowledge."}, {"front": "What specific action does the Florentine lady take to stop Beltramo's visits after Gillette is pregnant?", "back": "She withdraws with her daughter to the house of kinsfolk in the country."}, {"front": "Who accompanies Gillette on her journey to Florence?", "back": "A male cousin and a chambermaid."}, {"front": "What is the outcome of the war between the Florentines and the Sienese for Beltramo?", "back": "He is made a commander and remains in their service for a long while."}, {"front": "Why did the King decide to stop seeking medical treatment before Gillette arrived?", "back": "He was in despair after many physicians had only made his condition worse."}, {"front": "What was the name of Beltramo's father?", "back": "Isnard."}, {"front": "How does the text describe Gillette's love for Beltramo during her childhood?", "back": "Boundless, ardent, and out of all keeping with her tender years."}, {"front": "What is the reaction of the honest men in Roussillon when Gillette says she is leaving forever?", "back": "They weep and beseech her to stay."}, {"front": "What does the widow in Florence say about the daughter Beltramo is pursuing?", "back": "She is a virtuous damsel who has not yielded due to her mother's discretion."}, {"front": "What is the primary obstacle Gillette faces in the first level of her cleverness?", "back": "Curing a disease that the greatest physicians in the world could not treat."}, {"front": "How does Gillette utilize her medical knowledge to obtain a husband?", "back": "She uses it as leverage to demand the husband of her choice from the King."}, {"front": "What does the Count do after he accepts Gillette at the end of the tale?", "back": "He causes her to be rearrayed in garments befitting her rank and holds a feast."}, {"front": "Why is Shakespeare's All's Well That Ends Well categorized as a 'problem comedy'?", "back": "It leaves audiences uncertain whether to celebrate the heroine's triumph or question its nature."}, {"front": "In the tale, what is the role of the 'bed trick' in fulfilling the Count's conditions?", "back": "It allows Gillette to conceive a child by her husband without his knowledge."}, {"front": "Concept: Female Agency", "back": "In this tale, it is represented by Gillette's refusal to accept her assigned social role and her active pursuit of her desires."}, {"front": "Which two characters are raised together as children in Narbonne?", "back": "Gillette and Beltramo."}, {"front": "What does Gillette do for the Roussillon estate during Beltramo's exile?", "back": "She rectifies everything that had fallen into decay and disorder."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
