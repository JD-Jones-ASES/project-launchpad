<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 2, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is the narrator of the third tale on the first day of the Decameron?", "back": "Filomena"}, {"front": "Which historical Muslim sultan is depicted as a model of chivalric virtue in Tale 3 of Day I?", "back": "Saladin (Salah ad-Din)"}, {"front": "What significant city did Saladin recapture in 1187?", "back": "Jerusalem"}, {"front": "What specific financial dilemma drives Saladin to seek out Melchisedech?", "back": "He exhausted his treasury through wars and lavish spending and needs money quickly."}, {"front": "In what city does the wealthy Jewish moneylender Melchisedech live and work?", "back": "Alexandria"}, {"front": "What character flaw does Saladin attribute to Melchisedech that prevents a direct request for a loan?", "back": "Miserliness"}, {"front": "What is the specific \"trap\" question Saladin asks Melchisedech?", "back": "Which of the three laws—Jewish, Saracen, or Christian—is the true law?"}, {"front": "Why is Saladin's question about the three religions considered a \"snare\"?", "back": "Choosing any one religion over the others would provide a pretext for Saladin to harass or extort Melchisedech."}, {"front": "How does Melchisedech physically respond to being seated by Saladin and questioned?", "back": "He concentrates his mind to shape an answer that avoids the snare."}, {"front": "In Melchisedech's parable, what object signifies the right to the father's inheritance?", "back": "A precious ring of extraordinary beauty and value."}, {"front": "According to the tradition in the parable, who is designated as the father's heir?", "back": "Whichever son is found in possession of the ring by the father's bequest."}, {"front": "Why does the father in the parable have two additional rings made?", "back": "He loves his three sons equally and cannot choose a sole heir."}, {"front": "How are the two copy rings described in relation to the original ring?", "back": "They are so similar that even the maker could hardly distinguish the true one."}, {"front": "At what point in his life does the father give the rings to his three sons?", "back": "Privately, just before his death."}, {"front": "What is the result of the legal suit between the three sons regarding the true ring?", "back": "It remains pendent, as no one can distinguish the original ring from the copies."}, {"front": "In the allegory of the rings, what do the three sons represent?", "back": "The three peoples/faiths (Jews, Saracens, and Christians)."}, {"front": "What does the father represent in the context of the three religions?", "back": "God the Father."}, {"front": "What is the primary moral of Melchisedech's parable regarding religious truth?", "back": "The question of which faith is the true one cannot be settled by human judgment."}, {"front": "How does Melchisedech's answer function as a solution to Saladin's trap?", "back": "He evades the question by showing that the \"true\" religion is indistinguishable to humans, just like the rings."}, {"front": "What is Saladin's reaction to Melchisedech’s adroitness in answering?", "back": "He feels admiration for the Jew's wit and decides to be honest about his needs."}, {"front": "What does Saladin do after hearing the parable of the three rings?", "back": "He confesses his financial need and his original intention to trap Melchisedech."}, {"front": "What is the ultimate status of the relationship between Saladin and Melchisedech?", "back": "They maintain a lifelong friendship, with Melchisedech holding an honorable position near Saladin."}, {"front": "What 18th-century play was later inspired by Boccaccio's version of the three rings story?", "back": "Nathan the Wise by Gotthold Ephraim Lessing."}, {"front": "According to Filomena's introduction, what human quality can extricate the wise from peril?", "back": "Good sense (wit)."}, {"front": "Term: Soldan", "back": "Definition: A Sultan; the ruler of a Muslim state."}, {"front": "Term: Saracen", "back": "Definition: A medieval European term for Muslims."}, {"front": "Term: Privily", "back": "Definition: Secretly or privately."}, {"front": "Cloze: Filomena's tale suggests that folk often forfeit a happy estate through their own _____.", "back": "folly"}, {"front": "How does Boccaccio describe Saladin's rise to power?", "back": "He made himself Sultan of Egypt from small beginnings through great valour."}, {"front": "What term does Boccaccio use for lending money at interest, as practiced by Melchisedech?", "back": "Lent at usance."}, {"front": "Why did the father in the parable promise the ring to each of his three sons individually?", "back": "Each son did all he could to persuade the father, and the father loved them all indifferently (equally)."}, {"front": "What happens to the money Melchisedech lends to Saladin?", "back": "Saladin later repays the loan in full."}, {"front": "What does Filomena say about the transition from good to evil fortune?", "back": "Instances of it are so conspicuous and numerous that reciting them is unnecessary."}, {"front": "What does Melchisedech gain from Saladin besides friendship?", "back": "Munificent gifts and a great and honorable position near Saladin's person."}, {"front": "How does Filomena characterize the shift in subject matter from the previous story told by Neifile?", "back": "Descending from divine matters and the truth of faith to mundane events and the actions of men."}, {"front": "In the parable, what did the original ring's ordinance require of the other brothers?", "back": "They were to show the holder of the ring the honour and homage due to a superior."}, {"front": "What word does Boccaccio use to describe Melchisedech's cleverness in evading the snare?", "back": "Adroitness."}, {"front": "How does the father's love for his sons affect his decision in the parable?", "back": "Because he loves them all equally, he cannot bear to choose one over the others."}, {"front": "In the context of the story, what does the term \"celerity\" mean regarding Saladin's need for money?", "back": "Speed or swiftness of action."}, {"front": "What were the three \"laws\" mentioned in the primary source?", "back": "The law of the Jews, the law of the Saracens, and the law of the Christians."}, {"front": "According to the story, why were the rings' claims disputed after the father died?", "back": "Each son produced his ring as witness of his right, but they were indistinguishable."}, {"front": "What does Melchisedech call the question Saladin propounds to him?", "back": "A \"pretty question.\""}, {"front": "What does the phrase \"remains pendent\" signify in the conclusion of the parable?", "back": "The issue is undecided or remains unresolved."}, {"front": "How does Saladin's response to the Jew's wit reflect Boccaccio's values?", "back": "It celebrates the triumph of intelligence and mutual respect over religious conflict and force."}, {"front": "Why does Melchisedech believe he cannot praise one law above another?", "back": "It would provide the pretext Saladin sought to harass him."}, {"front": "Which specific trait of the sons made the father love them \"indifferently\"?", "back": "They were goodly, virtuous, and very obedient to their father."}, {"front": "What is the \"narrow compass\" Filomena refers to when beginning her tale?", "back": "The short length or scope of the story she is about to tell."}, {"front": "To what end does Filomena tell the story of the Jew's perilous adventure?", "back": "To dispose the listeners to be more circumspect in answering questions."}, {"front": "How did the father in the parable ensure the rings were made secretly?", "back": "He had a cunning artificer make them \"secretly\" so that no one else would know."}, {"front": "What is the primary setting for the interaction between Saladin and Melchisedech?", "back": "Saladin's court (implied after Saladin sends for him)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
