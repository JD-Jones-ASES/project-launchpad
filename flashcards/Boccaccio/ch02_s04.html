<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 2, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who narrates the third tale of Day I in Boccaccio's Decameron?", "back": "Filomena."}, {"front": "In the third tale of Day I, which historical figure serves as the Sultan of Egypt?", "back": "Saladin (Salah ad-Din)."}, {"front": "What specific event in 1187 is associated with the historical Saladin in the text?", "back": "The recapture of Jerusalem."}, {"front": "How was Saladin generally characterized in medieval Western literature?", "back": "As a model of chivalric virtue."}, {"front": "What immediate problem causes Saladin to seek out Melchisedech?", "back": "He needs a large sum of money quickly to meet an emergency."}, {"front": "What is Melchisedech's profession in the city of Alexandria?", "back": "He is a wealthy Jewish moneylender."}, {"front": "Why does Saladin avoid simply demanding money from Melchisedech?", "back": "He is not disposed to use force and prefers a \"colorably reasonable pretext.\""}, {"front": "What character trait of Melchisedech makes Saladin believe he will not lend money voluntarily?", "back": "His extreme miserliness."}, {"front": "What is the specific \"trap\" question Saladin asks Melchisedech?", "back": "Which of the three laws—Jewish, Saracen, or Christian—is the true one?"}, {"front": "How does Melchisedech perceive Saladin's religious question?", "back": "He sees it as a snare meant to entangle him in his speech for harassment."}, {"front": "In Melchisedech's parable, what physical object designates the father's rightful heir?", "back": "A ring of extraordinary beauty and value."}, {"front": "Why does the father in the parable have two duplicate rings created?", "back": "He loves his three sons equally and cannot choose a sole legatee among them."}, {"front": "How does the father distribute the rings to his three sons?", "back": "He gives a ring to each son privily before his death."}, {"front": "What happens when the three sons attempt to prove their inheritance after the father's death?", "back": "They each produce a ring, but the true original is indistinguishable from the copies."}, {"front": "What is the final status of the \"suit\" to determine the true heir in the parable?", "back": "It remains pendent and undecided."}, {"front": "What does the unresolved status of the rings represent in Melchisedech's analogy?", "back": "The question of which of the three religions is the true law of God."}, {"front": "How does Saladin react to the cleverness of Melchisedech's parable?", "back": "He admires the Jew's adroitness and abandons his plan to trap him."}, {"front": "What does Saladin do after Melchisedech finishes his story?", "back": "He confesses his financial need and his original intention to extort money."}, {"front": "What is the ultimate outcome of the meeting between Saladin and Melchisedech?", "back": "Melchisedech lends the money and becomes Saladin's lifelong friend and advisor."}, {"front": "Which 1779 play by Gotthold Ephraim Lessing was inspired by Boccaccio's version of the ring story?", "back": "Nathan the Wise."}, {"front": "Term: Soldan", "back": "A medieval term used for a Sultan or the ruler of a Muslim state."}, {"front": "Term: Saracen", "back": "A medieval European term referring to Muslims, especially during the Crusades."}, {"front": "Term: Usance", "back": "The practice of lending money at interest."}, {"front": "Term: Privily", "back": "Secretly or privately, without others knowing."}, {"front": "According to Filomena, what quality can \"extricate the wise from extremity of peril\"?", "back": "Good sense."}, {"front": "What does Filomena claim is the result of folk's own \"folly\"?", "back": "They forfeit a happy estate and are plunged into misery."}, {"front": "Why does Filomena choose to tell a story about \"mundane events\" after Neifile's story?", "back": "She believes enough has already been said concerning God and the truth of faith."}, {"front": "In the parable, what honor was the son holding the true ring entitled to receive?", "back": "Homage and honor due to a superior from the other heirs."}, {"front": "How does the source describe the relationship between the three sons and their father?", "back": "They were goodly, virtuous, and very obedient to him."}, {"front": "Who is the \"cunning artificer\" in the parable?", "back": "The craftsman who made the duplicate rings so well that the original could not be identified."}, {"front": "What does Melchisedech conclude about the three peoples regarding their laws?", "back": "Each deems itself to have the true inheritance and commandments of God."}, {"front": "How did Saladin first attain his position as ruler of Egypt?", "back": "From small beginnings through his great valour."}, {"front": "Why did Saladin need money with \"celerity\"?", "back": "He had spent his treasure on wars and lavish displays of magnificence."}, {"front": "How did Saladin treat Melchisedech upon receiving him to set the trap?", "back": "He received him affably and seated him by his side."}, {"front": "What does the narrator Filomena suggest her story will teach the listeners?", "back": "To be more circumspect when answering questions addressed to them."}, {"front": "Why is Melchisedech's evasion of the question considered the actual answer?", "back": "It demonstrates that the \"true\" religion cannot be determined by human judgment."}, {"front": "Besides the loan repayment, what did Saladin give Melchisedech at the end of the story?", "back": "Munificent gifts and a great, honourable position near his person."}, {"front": "The parable's father represents which figure in Melchisedech's explanation?", "back": "God the Father."}, {"front": "What was the specific \"emergency\" that necessitated Saladin's loan?", "back": "The source states he needed it to meet a \"certain emergency\" after spending his treasure."}, {"front": "Cloze: Melchisedech \"saw plainly enough that Saladin meant to _____ him in his speech.\"", "back": "entangle"}, {"front": "Cloze: The suit to determine the true heir \"remained _____, and still so remains.\"", "back": "pendent"}, {"front": "According to the text, was the story of the three rings original to Boccaccio?", "back": "No, it circulated widely in medieval literature before his version."}, {"front": "How does Saladin respond to being outsmarted by Melchisedech's wit?", "back": "He reacts with admiration rather than anger."}, {"front": "What values does the interaction between Saladin and Melchisedech celebrate?", "back": "Wisdom, wit, and cross-cultural respect."}, {"front": "In the parable, how long was the ring meant to remain with the heirs?", "back": "For ever."}, {"front": "Melchisedech's story is described by the narrator as a \"_____ adventure.\"", "back": "perilous"}, {"front": "What did each of the three sons do to persuade the father to give them the ring?", "back": "They did all they could to persuade him as he grew old."}, {"front": "What was Saladin's intent if Melchisedech had answered \"less circumspectly\"?", "back": "He intended to harass him and extort the money."}, {"front": "To what city's moneylender did Saladin turn?", "back": "Alexandria."}, {"front": "What phrase does Filomena use to describe her audience?", "back": "Loving gossips."}, {"front": "The father in the parable is said to have loved his three sons \"_____.\"", "back": "indifferently (equally)"}, {"front": "What does Melchisedech use to shape his answer to Saladin?", "back": "All the force of his mind."}, {"front": "What happens when folk are \"plunged in most grievous misery\" due to folly?", "back": "They forfeit a happy estate."}, {"front": "How many generations did the ring pass through before reaching the father of three sons?", "back": "Many generations."}, {"front": "Why is Saladin's characterization remarkable for medieval Western literature?", "back": "He is portrayed as a virtuous Muslim sultan despite the religious conflicts of the time."}, {"front": "What does the \"true law\" refer to in the context of Saladin's question?", "back": "The religious commandments and faith of a specific people."}, {"front": "The ring parable concludes that the question of which law is true is currently _____.", "back": "unjustified in being settled by human judgment."}, {"front": "Which narrator brought her story to a close just before Filomena began?", "back": "Neifile."}, {"front": "What was the final status of the loan Saladin received from Melchisedech?", "back": "It was repaid in full."}, {"front": "How does the story demonstrate the transition from \"divine things\" to \"mundane events\"?", "back": "By moving from discussions of God to a story about human wit and financial necessity."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
