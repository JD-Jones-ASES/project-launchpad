    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">

    <script>
    var CARDS = [{"front": "Who is the narrator of the first tale told on the Third Day of the Decameron?", "back": "Filostrato"}, {"front": "What is the overarching theme of the stories told on the Third Day of the Decameron?", "back": "Cleverness (or *ingegno*)"}, {"front": "According to the analysis in the text, Boccaccio's primary target in his anticlerical satire is the gap between professed virtue and _____.", "back": "Actual behavior"}, {"front": "In the context of the Decameron, the term 'ingegno' refers to the ability to see an opportunity others miss and to _____.", "back": "Act on it decisively"}, {"front": "What is the name of the young gardener who is the protagonist of Day III, Tale 1?", "back": "Masetto da Lamporecchio"}, {"front": "Where does Masetto live before traveling to the convent?", "back": "Lamporecchio"}, {"front": "What was the name of the gardener who worked at the convent before Masetto?", "back": "Nuto"}, {"front": "Why did Nuto quit his job as the gardener for the nuns?", "back": "The wages were low and the nuns were constantly nagging and bothering him."}, {"front": "What physical handicap does Masetto decide to fake to gain employment at the convent?", "back": "Deaf-muteness"}, {"front": "Why does Masetto believe that being 'dumb' will help him succeed in his plan at the convent?", "back": "It ensures that no one will fear he might speak about any illicit activities that occur."}, {"front": "How does Masetto first prove his physical strength to the convent's steward?", "back": "By quickly splitting firewood that the previous gardener could not handle."}, {"front": "What reason does the steward give the abbess for why a mute gardener is a safe hire?", "back": "He will not be able to 'crack jokes' or flirt with the young women."}, {"front": "How many total women live in the convent described in the story?", "back": "Nine (eight nuns and one abbess)"}, {"front": "What common 14th-century belief about nuns does Boccaccio challenge in his introduction to the tale?", "back": "The belief that wearing a veil and cowl makes a woman lose her natural human desires."}, {"front": "Boccaccio criticizes the 'gross error' of believing that physical labor and coarse food eradicate _____ from peasants.", "back": "Carnal propensities (or sexual desire)"}, {"front": "How do the nuns initially treat Masetto because they believe he is a 'dumb' simpleton?", "back": "They tease him, make him their butt, and use 'bad language' around him."}, {"front": "Who is the first person to suggest testing 'the quality of the male human animal' with Masetto?", "back": "The bolder of two young nuns who find him sleeping in the garden."}, {"front": "What is the first nun's argument against the concern that they have vowed virginity to God?", "back": "She argues that many vows are made to God but never performed."}, {"front": "Why do the first two nuns feel safe bringing Masetto to the hut for a sexual encounter?", "back": "They believe he is a simpleton who cannot speak of the event."}, {"front": "How do the third, fourth, and fifth nuns eventually become involved with Masetto?", "back": "One saw the first two nuns from her window and told two others, and they agreed to join the 'partnership' rather than denounce them."}, {"front": "Under what tree is Masetto sleeping when the Abbess first notices his physical attractiveness?", "back": "An almond tree"}, {"front": "What environmental factor causes the Abbess to see Masetto's 'person quite exposed'?", "back": "The wind had disarranged his clothes while he slept."}, {"front": "Where does the Abbess take Masetto to satisfy her 'appetite'?", "back": "To her private chamber"}, {"front": "Why does Masetto eventually decide he must 'cut the tongue-string' and speak?", "back": "He is physically exhausted by the sexual demands of nine women and cannot keep up."}, {"front": "What metaphor does Masetto use to explain to the Abbess that he cannot satisfy all the women?", "back": "He says one cock can serve ten hens, but ten men are tasked to satisfy a single woman."}, {"front": "What explanation does Masetto give for his sudden ability to speak?", "back": "He claims an illness took his speech and he only recovered it that very night."}, {"front": "Why does the Abbess decide to arrange matters with the nuns rather than send Masetto away?", "back": "To protect the convent's reputation and prevent a scandal."}, {"front": "What miraculous story do the nuns tell the neighbors to explain Masetto's recovery of speech?", "back": "They claim he was cured by their prayers and the merits of their patron saint."}, {"front": "What official position is Masetto given at the convent after the death of the previous steward?", "back": "Steward"}, {"front": "What is the long-term outcome for Masetto at the end of the tale?", "back": "He returns home in his old age, rich and a father, having fathered many children with the nuns discreetly."}, {"front": "The tale of Masetto belongs to the tradition of _____ satire, focusing on institutional hypocrisy.", "back": "Anticlerical"}, {"front": "What does Boccaccio suggest is the 'key to opportunity' for Masetto's plan?", "back": "Silence"}, {"front": "Which character in the story serves as the 'foil' to Masetto's cleverness by failing to thrive at the convent?", "back": "Nuto"}, {"front": "How does the text describe Masetto's physical appearance in relation to his social class?", "back": "Stout, hardy, and handsome 'for a contadino' (peasant)."}, {"front": "What does the text identify as the two 'prepotent forces' that influence the behavior of the nuns?", "back": "Idleness and solitude"}, {"front": "How does Masetto first approach the steward to ask for help?", "back": "He enters the courtyard making signs like 'dumb folk do' to crave food."}, {"front": "What 'caution' or content note is provided for this specific tale?", "back": "It involves sexual situations presented as comedy and satire of institutional hypocrisy."}, {"front": "In the end, how does the tale complicate the idea of 'moral judgment'?", "back": "Masetto is rewarded with wealth and a comfortable old age despite his deception and sexual transgressions."}, {"front": "What was the final number of hens Masetto claimed a single cock could serve?", "back": "Ten"}, {"front": "What does Masetto claim Christ 'metes out' to the man who 'set horns on his cap'?", "back": "Wealth and lack of the pains/expenses of rearing children (ironically)."}, {"front": "According to the introduction, people often wrongly believe that a woman becomes as unfeeling as a _____ once she becomes a nun.", "back": "Stone"}, {"front": "True or False: The Abbess was unaware of the nuns' behavior until she herself yielded to the same desire.", "back": "True"}, {"front": "What tool does Masetto carry on his shoulder when he sets out for the convent?", "back": "A hatchet"}, {"front": "How does the story characterize the level of 'discretion' used by Masetto and the nuns regarding the children he fathered?", "back": "It was so discreet that 'no breath of scandal stirred' until after the Abbess's death."}, {"front": "The narrative states that Masetto was 'shrewder than he appears.' This is an example of which literary theme?", "back": "Ingegno (Cleverness)"}, {"front": "What specific labor does the steward have Masetto do with an ass?", "back": "Transport loppings from the wood back to the convent."}, {"front": "Why did the first nun believe Masetto would be 'meet' (suitable) for her plan above any other man in the world?", "back": "He could not 'blab' (speak) if he wanted to."}, {"front": "What is the narrator Filostrato's stated goal for telling this story?", "back": "To manifest the error of those who believe religious life or peasant labor eradicates human desire."}, {"front": "When Masetto returns to Lamporecchio, what has he avoided by being at the convent?", "back": "The pains and expense of rearing children."}, {"front": "What does the boldest nun suggest doing to ensure they aren't caught with Masetto?", "back": "One shall mount guard while the other is inside the hut with him."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
