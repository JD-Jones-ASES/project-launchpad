<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Which member of the brigata is elected as the first queen to rule Day I?", "back": "Pampinea."}, {"front": "What is the prescribed theme for the stories told on Day I?", "back": "There is no prescribed theme; narrators may speak on any subject they please."}, {"front": "How does the text characterize the role of Day I in relation to the entire Decameron?", "back": "It functions as an overture, introducing nearly all the work's major themes."}, {"front": "Define the Boccaccian concept of a 'motto'.", "back": "A cleverly turned, pointed remark deployed at a specific moment to correct, shame, or delight."}, {"front": "What is a 'beffa' in the context of the Decameron's comedy?", "back": "A sustained practical joke or elaborate deception."}, {"front": "Which quality, meaning intelligence or resourcefulness, is celebrated as a supreme virtue by Boccaccio?", "back": "Ingegno."}, {"front": "What is the primary target of Boccaccio's religious satire in Day I?", "back": "Human hypocrisy and the failure of clergy to live up to their vows, rather than faith itself."}, {"front": "According to the commentary, what caused Boccaccio to nearly destroy the Decameron in his later years?", "back": "A visit from a Carthusian monk in 1362 that triggered deep religious anxiety."}, {"front": "In Tale I.1, what is Ser Ciappelletto's actual profession?", "back": "A notary."}, {"front": "What is the irony of Ser Ciappelletto’s fate at the end of Tale I.1?", "back": "Despite being a wicked sinner, he is venerated as a saint due to his false deathbed confession."}, {"front": "Who is the narrator of the first tale of the Decameron?", "back": "Panfilo."}, {"front": "In Tale I.1, how does Ciappelletto deceive the holy friar regarding his 'sins' of the flesh?", "back": "He claims to be a virgin as pure as the day he was born."}, {"front": "Why do the two Florentine usurers in I.1 fear Ciappelletto dying in their home?", "back": "They fear a local riot and the confiscation of their goods if he dies unconfessed and is denied church burial."}, {"front": "What 'great sin' does Ciappelletto tearfully confess to the friar to cement his image of holiness?", "back": "Cursing his mother once when he was a small child."}, {"front": "In Tale I.2, why does Abraham the Jew decide to convert to Christianity after visiting Rome?", "back": "He reasons that a religion flourishing despite such central corruption must have divine support."}, {"front": "Who are the two protagonists in the tale of the three rings (I.3)?", "back": "Saladin (the Sultan) and Melchisedech (the Jewish moneylender)."}, {"front": "What is the core message of Melchisedech’s parable about the three rings?", "back": "The question of which religion is the 'true' one cannot be settled by human judgment."}, {"front": "In Tale I.4, how does a young monk escape punishment for bringing a woman into his cell?", "back": "He catches the abbot committing the same sin, forcing the abbot to pardon him to save his own reputation."}, {"front": "What is the central 'motto' in Tale I.5 involving the Marchioness of Monferrato?", "back": "The claim that women, like hens, differ little from one another regardless of status."}, {"front": "In Tale I.6, how does a man defeat the Inquisition's charge of heresy?", "back": "He uses a witty remark about Christ's love for wine to expose the inquisitor's own hypocrisy."}, {"front": "What is the moral of Tale I.7 regarding Bergamino and the miserly lord?", "back": "It serves as a defense of the power of storytelling and the artist's role in society."}, {"front": "What single word does Guglielmo Borsiere suggest as a subject for a painting to shame a miser (I.8)?", "back": "Generosity."}, {"front": "In Tale I.9, what is the effect of the Gascon lady’s remark to the King of Cyprus?", "back": "It shames the indolent king into reforming his character and administering justice."}, {"front": "How does Master Alberto defend his love for a young woman in Tale I.10?", "back": "He uses a parable about leeks to argue that maturity and experience are superior to youth."}, {"front": "Which two days of the Decameron allow the narrators complete freedom of subject?", "back": "Days I and IX."}, {"front": "Where is the country estate located to which the brigata flees?", "back": "In the hills of Fiesole, overlooking Florence."}, {"front": "What specific site is identified by tradition as the setting for the Decameron's stories?", "back": "Villa Palmieri."}, {"front": "According to the Proem, Boccaccio dedicated the Decameron to which group of people?", "back": "Women suffering from the pangs of love."}, {"front": "Define 'Cornice' in the context of medieval literature.", "back": "The Italian term for a frame narrative that encloses a collection of tales."}, {"front": "In Tale I.1, what does Panfilo suggest regarding Ciappelletto's final destination (Heaven or Hell)?", "back": "He likely resides in Hell, though God's grace could theoretically have intervened via a last-second act of contrition."}, {"front": "What is the 'Great Schism' or 'Papal Schism' mentioned in the context of Boccaccio's era?", "back": "A period of division in the Roman Catholic Church with competing claimants to the papal throne."}, {"front": "Term: Novella.", "back": "Definition: A short prose tale; the literary form Boccaccio perfected in the Decameron."}, {"front": "Term: Tre Corone.", "back": "Definition: The 'Three Crowns' of Italian literature: Dante, Petrarch, and Boccaccio."}, {"front": "Which character in the Decameron is compared to Chaucer's Pardoner?", "back": "Ser Ciappelletto."}, {"front": "In Melchisedech's parable (I.3), how did the father solve the problem of having three loved sons and only one true ring?", "back": "He had a cunning artificer make two perfect copies so that even he could not tell the original from the duplicates."}, {"front": "What is the historical significance of Saladin in medieval literature?", "back": "A Muslim sultan admired as a model of chivalric virtue by Western writers despite being a religious adversary."}, {"front": "The town of ____ was Boccaccio's family home and the place where he died in 1375.", "back": "Certaldo."}, {"front": "What is a 'Speculum Principis'?", "back": "A 'mirror for princes'; a genre of literature intended to instruct rulers on proper conduct."}, {"front": "Which tale illustrates the 'power of the motto' to transform a king's character in a single sentence?", "back": "Tale I.9 (The Lady of Gascony and the King of Cyprus)."}, {"front": "In Tale I.1, what was Ciappelletto's reaction to oaths and swearing?", "back": "He bore false witness with boundless delight and forswore himself corruptly in every case."}, {"front": "What is the purpose of the 'chapter' convened by the friars after Ciappelletto's death?", "back": "To arrange for his body to be received with veneration as a potential source of miracles."}, {"front": "How did the townspeople in I.1 react to the friar's sermon about Ciappelletto?", "back": "They conceived a great veneration for him, kissing his hands and feet and taking scraps of his burial clothes."}, {"front": "What does 'Sprezzatura' mean in a literary or social context?", "back": "The art of making difficult actions look effortless or nonchalant."}, {"front": "According to the frame story, what time of day was considered 'injurious to health' for sleeping?", "back": "The daytime (specifically the hot afternoon hours)."}, {"front": "What were the primary activities of the brigata before they decided to start telling stories?", "back": "Eating, walking in the meadow, and playing dice or chess."}, {"front": "How does the narrator Panfilo characterize the reliability of man's judgment versus God's in I.1?", "back": "Man can only judge by appearances, while the Divine mind's secret counsels are impenetrable to mortal vision."}, {"front": "In I.1, what was Ciappelletto's attitude toward the sacraments and the Church?", "back": "He held all sacraments to be vile things and derided them with ribaldry."}, {"front": "What region in southwestern France is the Lady in Tale I.9 from?", "back": "Gascony."}, {"front": "Why was the King of Cyprus mocked by his subjects in Tale I.9?", "back": "Because he was so spiritless that he neglected to avenge both his own affronts and those put upon others."}, {"front": "Which member of the brigata is described as 'the eldest of the women'?", "back": "Pampinea."}, {"front": "In the context of the Decameron, what is a 'podestà'?", "back": "The chief magistrate of an Italian city-state."}, {"front": "What does the term 'Angevin' refer to in Boccaccio's biography?", "back": "The House of Anjou, which ruled Naples while Boccaccio was at court there."}, {"front": "Define 'Anticlerical satire'.", "back": "Literary mockery of the clergy’s corruption, hypocrisy, or ignorance."}, {"front": "What is the 'Contado'?", "back": "The rural territory surrounding and dependent upon an Italian city-state."}, {"front": "What is the literary term for a short illustrative story used in sermons to teach a moral lesson?", "back": "Exemplum."}, {"front": "What is the 'Signoria' in the context of Florentine history?", "back": "The governing council of the city of Florence."}, {"front": "In Tale I.3, Melchisedech's use of a story to escape a trap is an example of what core Decameron value?", "back": "Intelligence or resourcefulness (Ingegno)."}, {"front": "According to the commentary, how do the tales of Day I function as an 'overture'?", "back": "They introduce the major settings, social types, and ethical conflicts that will reappear throughout the work."}, {"front": "What is 'Magnificenza' (magnanimity), the theme of Day X?", "back": "Extraordinary generosity, patience, or nobility of spirit."}, {"front": "In Tale I.1, why does Ciappelletto request the Holy Host and extreme unction?", "back": "To ensure he dies appearing to be a devout Christian, thereby completing his final deception."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
