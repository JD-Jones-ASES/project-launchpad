<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 8, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is the narrator of the second tale of Day VII in the Decameron?", "back": "Filostrato"}, {"front": "In which city is the story of Peronella and the mason set?", "back": "Naples"}, {"front": "What is the specific occupation of Peronella's husband?", "back": "A mason"}, {"front": "How does Peronella supplement the household's meager income?", "back": "By spinning"}, {"front": "What is the name of Peronella's lover?", "back": "Giannello Sirignario"}, {"front": "What is the name of the street where Peronella and her husband live?", "back": "Avorio"}, {"front": "At what time of day do Peronella and Giannello usually meet?", "back": "In the morning after the husband leaves for work"}, {"front": "Why did Peronella's husband return home early on the morning of the story?", "back": "It was the feast of San Galeone, a holiday."}, {"front": "What was the husband's reaction to finding his door locked upon his early return?", "back": "He praised God for having such a good and honest wife."}, {"front": "Where does Peronella hide Giannello when her husband knocks at the door?", "back": "Inside a large tun (jar)"}, {"front": "To what does Filostrato hope the stories of women's tricks will incite the ladies?", "back": "To publish them so that men may be aware of their ladies' wit."}, {"front": "What rhetorical strategy does Peronella use immediately after letting her husband into the house?", "back": "She goes on the attack, scolding him for being idle and poor."}, {"front": "Peronella claims she spins day and night to afford _____.", "back": "Oil to keep their lamp alight"}, {"front": "According to Peronella's fake complaint, what do the neighbors do when they see her laboring?", "back": "They marvel and mock her."}, {"front": "How many gigliats did the husband agree to sell the tun for?", "back": "Five"}, {"front": "What price does Peronella claim she has already secured from another buyer for the tun?", "back": "Seven gigliats"}, {"front": "How does Peronella explain the presence of a 'buyer' inside the tun when the husband arrives?", "back": "She says he got inside to see if it was sound."}, {"front": "Upon hearing Peronella's higher price, what does the husband do with the man he brought home?", "back": "He tells him Godspeed and sends him away."}, {"front": "What excuse does Giannello use for not immediately accepting the tun after climbing out?", "back": "He claims it is encrusted with dry lees and needs scouring."}, {"front": "Who performs the physical labor of cleaning the inside of the tun?", "back": "The husband"}, {"front": "What tools does the husband use to clean the tun?", "back": "A light and a rasp"}, {"front": "While the husband is inside the tun, what part of it does Peronella block with her head and arm?", "back": "The vent (bung-hole)"}, {"front": "To what animals does the narrator compare Giannello's actions while the husband is scouring the jar?", "back": "Lusty horses and the mares of Parthia"}, {"front": "How does the story conclude regarding the jar and the payment?", "back": "Giannello pays seven gigliats and the husband carries the jar to his house."}, {"front": "In Boccaccio's work, what is the term for a quick-witted trick or performance like Peronella's?", "back": "Beffa"}, {"front": "According to the analysis, what is the significance of the jar beyond being a comic prop?", "back": "It is a real economic object in a poor household."}, {"front": "What contrast in the tale creates humor regarding Peronella's performance?", "back": "The gap between her high verbal style and the low material reality of her life."}, {"front": "According to the commentary, why is Peronella's adultery partly motivated by economics?", "back": "Her husband is unable to provide for her adequately."}, {"front": "Where did Boccaccio spend his youth, giving him intimate knowledge of the setting for this tale?", "back": "The Angevin court in Naples"}, {"front": "What role does Peronella play while her husband is scraping the jar?", "back": "She acts as a director, telling him where to scrape."}, {"front": "What does Peronella claim she is 'too honest' to accept from other gallants?", "back": "Offers of money, dresses, or jewels"}, {"front": "According to the 'What to Watch For' note, what three roles does the jar simultaneously serve?", "back": "A hiding place, a commercial object, and a comic stage."}, {"front": "What does the husband say about his poverty that shows his contentment with Peronella?", "back": "He says that although he is poor, God gave him an honest wife."}, {"front": "Term: Gigliat", "back": "Definition: The currency mentioned in the story used for the transaction of the tun."}, {"front": "How does Peronella describe the physical toll of her spinning work?", "back": "She says the flesh is fallen away from her nails."}, {"front": "In her verbal attack, what does Peronella claim other women make their husbands believe?", "back": "That the moon is the sun."}, {"front": "What does Giannello pretend to be doing when the husband first sees him?", "back": "Checking if the tun is sound for purchase."}, {"front": "To what state does the husband strip before entering the jar to clean it?", "back": "To his vest"}, {"front": "What is the primary theme of the Seventh Day of the Decameron?", "back": "Tricks that wives play on their husbands"}, {"front": "Why is it important that the street Avorio is 'scarce inhabited'?", "back": "It allows the lover to enter the house unnoticed once the husband leaves."}, {"front": "The husband's belief that his wife is 'good and honest' is an example of what literary device?", "back": "Irony"}, {"front": "How does Peronella shift the blame for their poverty onto her husband?", "back": "She scolds him for returning home idle when he should be at work."}, {"front": "According to Filostrato, why should women share stories of their tricks?", "back": "To check the tricks men play on them by showing that women are also clever."}, {"front": "The phrase 'betimes of a morning' refers to what time?", "back": "Early in the morning"}, {"front": "How does Giannello react when he hears Peronella's husband is at the door?", "back": "He enters the tun as Peronella instructed."}, {"front": "What does Peronella tell her husband he must do to finalize the bargain with the 'buyer'?", "back": "He must scour the jar clean."}, {"front": "Who does the husband believe is the person he is selling the jar to for seven gigliats?", "back": "Giannello (the lover)"}, {"front": "What is the economic status of Peronella and her husband?", "back": "Working poor"}, {"front": "According to the text, what makes this tale 'one of the most perfectly crafted comic scenes'?", "back": "The audacity and verbal brilliance of Peronella's performance."}, {"front": "Peronella's performance transforms the situation so that her husband ends up _____.", "back": "Thanking her"}, {"front": "What does Peronella call Giannello when she realizes her husband is at the door?", "back": "Giannello mine"}, {"front": "Why does the mason return 'tools in hand'?", "back": "Because it is a holiday and no work is being done."}, {"front": "The commentary notes that the Decameron often sets stories among the _____ in Naples.", "back": "Urban poor"}, {"front": "How does Peronella describe the quality of her birth to justify her 'honesty'?", "back": "She says she was not born of 'a woman of that sort' who has amours."}, {"front": "What does Giannello do once the husband is safely inside the jar and Peronella is at the vent?", "back": "He sates his youthful appetite with her."}, {"front": "How much 'bread' does the husband claim five gigliats would provide?", "back": "More than a month's worth"}, {"front": "What does Peronella tell her husband to do with his tools when he returns?", "back": "She scolds him for bringing them home and having 'hands hanging idle'."}, {"front": "The mason’s prayer to God about his 'good and honest girl for wife' is triggered by what action?", "back": "The fact that the door was locked when he returned."}, {"front": "What is the ultimate 'triumph' of Peronella in the beffa?", "back": "She satisfies her lover and gets her husband to clean the jar and carry it away."}, {"front": "According to the analysis, hiding a lover is 'one of the _____ plots in comedy.'", "back": "Oldest"}, {"front": "What does Peronella tell the lover to do when the husband asks to speak to the buyer?", "back": "She tells her husband that the 'good man' (lover) is already in the jar."}, {"front": "Concept: The 'Low' Material Reality", "back": "In this tale, it refers to the gritty economic struggle and meager possessions of the poor mason's household."}, {"front": "What does Giannello say to the husband to hide the fact that he was already there?", "back": "He asks 'Where art thou, good dame?' as if just arriving."}, {"front": "Peronella's claim that she could have had many 'gallants' is intended to make her husband feel _____.", "back": "Grateful for her supposed fidelity."}, {"front": "The masonry tools are a symbol of what in Peronella's opening scolding?", "back": "Her husband's failure to earn a living that day."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
