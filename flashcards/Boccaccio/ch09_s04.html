<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Tales of the Decameron (Boccaccio) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Tales of the Decameron (Boccaccio) &mdash; Chapter 9, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Boccaccio">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is the narrator of the seventh tale of Day VIII in the Decameron?", "back": "Pampinea"}, {"front": "Which story is identified as the longest single tale in the entire Decameron?", "back": "Day VIII, Tale 7 (The Scholar and the Widow)"}, {"front": "What is the primary difference between the trick in Tale VIII, 3 (Calandrino) and the trick in Tale VIII, 7?", "back": "Tale VIII, 3 is lighthearted comedy, while Tale VIII, 7 involves extreme revenge and ethical limits."}, {"front": "According to the primary source text, what is the name of the Florentine scholar who studied at Paris?", "back": "Rinieri"}, {"front": "What is the name of the beautiful widow with whom the scholar falls in love?", "back": "Elena"}, {"front": "In the analysis section, why is the scholar's initial anonymity considered an unusual choice for Boccaccio?", "back": "Boccaccio typically names his characters, but here the scholar represents an intellectual \"type.\""}, {"front": "What is the specific seasonal setting of the trick Elena plays on the scholar?", "back": "A bitterly cold winter night"}, {"front": "How does Elena lure the scholar to wait in her courtyard for hours in the snow?", "back": "She promises him a rendezvous that never comes."}, {"front": "Why is the winter setting considered essential to the structure of Tale VIII, 7?", "back": "It makes the humiliation physical and genuinely dangerous rather than merely emotional."}, {"front": "What specific seasonal inversion does Boccaccio use to structure the scholar’s revenge?", "back": "The scholar is frozen in winter, so he burns Elena in the summer."}, {"front": "In the context of the Decameron, what is \"ingegno\"?", "back": "Intelligence, cleverness, or wit."}, {"front": "What ethical tension is raised by the narrator Pampinea’s endorsement of the scholar's revenge?", "back": "The revenge appears disproportionately cruel despite the narrator's claim that it is just."}, {"front": "Term: Vendetta", "back": "Definition: Just vengeance as distinguished from excessive cruelty in medieval moral thought."}, {"front": "Where did Rinieri spend time studying to learn the \"reasons and causes of things\"?", "back": "Paris"}, {"front": "What color was Elena wearing when Rinieri first fell in love with her at a festal gathering?", "back": "Black (as was the custom for Florentine widows)"}, {"front": "What false excuse does Elena’s maid give the scholar while he is freezing in the courtyard?", "back": "One of Elena's brothers has arrived and is staying late for supper."}, {"front": "How does the scholar discover that he was being mocked by Elena and her lover?", "back": "He hears them laughing and talking through a lattice while he is in the courtyard."}, {"front": "What physical sound does Boccaccio use to illustrate the scholar’s extreme cold?", "back": "The chattering of his teeth, compared to the music of a stork."}, {"front": "What happens to the scholar's health after his night in the snow?", "back": "He nearly loses the use of his limbs and requires physician care to restore his muscles."}, {"front": "What event provides the scholar with an opportunity for revenge?", "back": "Elena is deserted by her lover and seeks necromantic help to win him back."}, {"front": "What fake ritual does the scholar tell Elena she must perform to recover her lover?", "back": "She must bathe naked in a river and climb a tower to recite an orison."}, {"front": "How many times must Elena dip herself in the river according to the scholar's instructions?", "back": "Seven times"}, {"front": "What is the location of the tower Elena climbs for the \"ritual\"?", "back": "On an estate in upper Val d'Arno adjoining the river Arno."}, {"front": "What does the scholar do to trap Elena on top of the tower?", "back": "He removes the ladder after she has reached the roof."}, {"front": "What physical torments does Elena suffer on the tower besides the sun's heat?", "back": "Hunger, thirst, and stings from flies and gadflies."}, {"front": "How does the scholar respond when Elena begs for a cup of water on the tower?", "back": "He refuses, saying he will give her as much water as she gave him fire for his cold."}, {"front": "What does the scholar claim is the \"might of the pen\" in his speech to Elena?", "back": "The power to write things that would shame her so much she would put out her own eyes."}, {"front": "Why does the scholar claim he is no longer interested in Elena’s beauty or love?", "back": "He has found another lady with greater charms who understands him better."}, {"front": "What analogy does the scholar use to argue that mature men are better lovers than young gallants?", "back": "He says mature men know better \"where the fleas lurk\" when dusting a pelisse."}, {"front": "To what animal does the scholar compare Elena when she asks for mercy?", "back": "A venomous serpent"}, {"front": "Who finally hears Elena’s cries and helps her down from the tower?", "back": "One of her husbandmen who was looking for lost hogs."}, {"front": "What accident happens to Elena’s maid as she is helping her mistress off the tower?", "back": "She slips from the ladder and breaks her thigh."}, {"front": "How does Elena explain her injuries and her maid's broken leg to her family in Florence?", "back": "She invents a story blaming the enchantments of evil spirits."}, {"front": "At what point does the scholar consider his vengeance complete?", "back": "When he learns that the maid has broken her thigh."}, {"front": "What is the moral lesson Pampinea offers at the end of the tale?", "back": "Women should have a care how they flout men, and more especially scholars."}, {"front": "The scholar justifies his cruelty by stating that the \"punishment\" is actually _____", "back": "Just retribution"}, {"front": "How does the scholar view the worth of his own life compared to Elena's?", "back": "He believes a single day of his life is of more profit to the world than 100,000 like hers."}, {"front": "What is the primary motive for Elena's original trick according to her own words to her lover?", "back": "To prove she has no love for the scholar and to amuse her lover."}, {"front": "What does the scholar do during the afternoon while Elena is burning on the tower?", "back": "He returns to a friend's house, breakfasts, and takes a siesta."}, {"front": "What direction must Elena face while reciting the fake magic orison?", "back": "North"}, {"front": "Why does the scholar initially feel a moment of pity when watching Elena by the river at night?", "back": "He is struck by the whiteness and fairness of her flesh in the moonlight."}, {"front": "What is the specific month mentioned for the scholar's revenge?", "back": "July"}, {"front": "What object is Elena told to hold in her hand during the tower ritual?", "back": "A tin image of her lover"}, {"front": "According to the scholar, why do young gallants fail to be loyal?", "back": "They are never content with one woman and lust after everyone they see."}, {"front": "How does the scholar describe his change in heart toward Elena’s former lover?", "back": "He claims to love the man now because of the way he treated Elena."}, {"front": "What does the scholar mean when he says scholars \"know where the Devil keeps his tail\"?", "back": "Scholars possess deep and dangerous knowledge that makes them risky to offend."}, {"front": "The analysis warns readers to watch for the gap between the _____ and the tale’s deeper implications.", "back": "Narrator’s apparent approval"}, {"front": "What is the significance of the \"mirror\" structure in this tale?", "back": "Every detail of the revenge corresponds exactly to a detail of the original humiliation."}, {"front": "How does the text characterize the scholar's social nature before the trick?", "back": "Learned, proud, and socially awkward."}, {"front": "What does the scholar do with Elena's clothes while she is on the tower?", "back": "He has his servant take them and later returns them to Elena’s maid with a message."}, {"front": "What does the scholar tell the maid will happen to her before she \"escapes his hands\"?", "back": "She will receive such a \"wage of her labor\" that she will never flout a man again."}, {"front": "In the scholar's view, why is it no glory for an eagle to vanquish a dove?", "back": "He uses this to explain why he is treating Elena like a venomous serpent instead of a dove."}, {"front": "What happens to Elena's skin as a result of the sun's \"exorbitant heat\"?", "back": "It becomes red as madder, scorched, and sheds like a snake sloughing its skin."}, {"front": "Where did Elena and the scholar meet to plan the \"magic ritual\"?", "back": "The church of Santa Lucia of Prato"}, {"front": "How does the scholar's anger transform his love for Elena after the night in the snow?", "back": "It converts his love into \"bitter and remorseless enmity.\""}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
