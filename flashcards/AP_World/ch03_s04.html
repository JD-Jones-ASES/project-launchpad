<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 3, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Monumental architecture as political argument", "back": "The concept that early modern rulers' large-scale building projects were political statements — announcing divine favor, command of resources, connection to revered predecessors, and ambition for historical memory. 'The ruler who builds magnificently governs legitimately.'", "id": "fc01"}, {"front": "Four reasons rulers build monumentally", "back": "(1) Scale intimidates rivals and subjects. (2) Permanence embeds the ruler's memory in the landscape across generations. (3) Aesthetic magnificence attracts scholars, artisans, and diplomats. (4) Religious symbolism makes authority appear divinely sanctioned.", "id": "fc02"}, {"front": "Court Culture", "back": "The elaborate system of rituals, protocols, ceremonies, and artistic patronage surrounding a ruler in his palace. Regulated access, dress, posture, and speech. Organized the nobility around the monarch — making attendance a mark of status while making nobles dependent on royal favor. Court culture was politics conducted through ritual.", "id": "fc03"}, {"front": "Topkapi Palace", "back": "Built on Istanbul's Bosphorus promontory (1459–1465, with later expansions). Not a single building but an enclosed city — series of courtyards housing the sultan's household, administration, treasury, and palace school. Site of the famous graduated-access political system.", "id": "fc04"}, {"front": "Topkapi's graduated access system", "back": "Ordinary subjects reached the outer courtyard only; high officials the second (where the divan met); only the sultan's most intimate servants entered the third (where the sultan lived). This hierarchy made proximity to the ruler the supreme prize of political life — drawing officials into perpetual competition for royal favor.", "id": "fc05"}, {"front": "Divan (Ottoman)", "back": "The imperial council that met in Topkapi Palace's second courtyard. High officials debated and administered state affairs there — a key site of Ottoman governance, but still at one remove from the sultan's inner court.", "id": "fc06"}, {"front": "Sultanate of Women", "back": "The informal political influence exercised by the mothers, sisters, and consorts of Ottoman sultans in the late 16th–17th centuries. The harem was not merely domestic but a political institution; court records document women shaping succession and policy through this network.", "id": "fc07"}, {"front": "Taj Mahal — basic facts", "back": "Built by Mughal emperor Shah Jahan (1632–1653) as a mausoleum for his wife Mumtaz Mahal. Employed roughly 20,000 workers over two decades; used white Makrana marble and precious stones from across Asia. Designed as a paradise garden (charbagh) with Quranic calligraphy throughout.", "id": "fc08"}, {"front": "Taj Mahal as political statement", "back": "Beyond a memorial, the Taj Mahal announced Mughal supremacy by spending on an unmatched scale. Its Quranic calligraphy asserted piety and legitimacy. Its Timurid chahar bagh garden plan connected Shah Jahan genealogically to Timur — 'architecture was genealogy made visible.'", "id": "fc09"}, {"front": "Charbagh / Chahar bagh", "back": "The four-quartered Persian garden design referencing Islamic visions of paradise (with four rivers). Used in the Taj Mahal; the Timurid origin of the design connected Shah Jahan to his Central Asian imperial ancestors — architecture as genealogical claim.", "id": "fc10"}, {"front": "Shah Jahan (r. 1628–1658)", "back": "Mughal emperor who built the Taj Mahal as a mausoleum for his wife Mumtaz Mahal. His reign is associated with the height of Mughal architectural achievement; the Taj Mahal asserted supremacy through scale, religious symbolism, and dynastic genealogy.", "id": "fc11"}, {"front": "Forbidden City (Gugong)", "back": "Built under early Ming emperors (c. 1406–1420) in Beijing; 980 buildings on 72 hectares. The ritual and administrative center of both Ming and Qing dynasties. Its vermillion walls and ceremonial layout encoded the emperor's position at the center of the Chinese world order.", "id": "fc12"}, {"front": "Versailles — construction and political purpose", "back": "Louis XIV began construction in 1661; the court moved there in 1682. Designed to overawe French nobles and foreign ambassadors. By requiring powerful nobles to reside at Versailles, Louis kept rivals under surveillance and deprived them of their independent power bases.", "id": "fc13"}, {"front": "Louis XIV of France (r. 1643–1715)", "back": "The most studied example of European absolutism. Built Versailles as an instrument of political control over the French nobility. The source notes he was 'neither exceptional nor uniquely powerful' compared to Qing, Mughal, and Ottoman contemporaries — his treasury was often bankrupt and his military inferior to the Mughal Empire.", "id": "fc14"}, {"front": "European absolutism — definition and context", "back": "Royal rule in which the king claimed sovereignty unchecked by parliament, nobles, or church. Louis XIV is the defining example. The source frames European absolutism as one variant of a global pattern — rulers across early modern Eurasia all used architecture and ceremony as governance tools.", "id": "fc15"}, {"front": "Hall of Mirrors (Galerie des Glaces)", "back": "The most famous ceremonial space at Versailles (completed 1684). Designed to overawe ambassadors and nobles through reflected light and royal imagery, demonstrating Bourbon supremacy. An example of architecture as political performance.", "id": "fc16"}, {"front": "Mimar Sinan", "back": "Chief Ottoman architect under Süleyman, who designed the Suleymaniye Mosque in Istanbul — mentioned in both the Gunpowder Empires section and the Architecture section as one of the great monuments of Islamic architecture, commissioned by Süleyman to demonstrate Ottoman cultural supremacy.", "id": "fc17"}, {"front": "'Power is performed as much as it is exercised' — meaning", "back": "The source's central analytical insight about early modern court culture: ritual, architecture, and ceremony were not decorations on power but instruments of governance. All major land-based empires — Ottoman, Mughal, Qing, and French Bourbon — shared this understanding and used it to control elites.", "id": "fc18"}, {"front": "How did Versailles and Topkapi serve the same political function despite different ceremonies?", "back": "Both concentrated elite attention on the ruler by making proximity to the sovereign the supreme marker of status. At Versailles, attending court and performing ceremonial service made nobles dependent on royal favor. At Topkapi, graduated courtyard access made closeness to the sultan the political prize. Different rituals, same logic.", "id": "fc19"}, {"front": "What SPICE-T theme is MOST central to the architecture-and-court-culture section?", "back": "Cultural + Political: Monumental architecture and court ceremony were cultural productions with explicitly political functions. They encoded hierarchy, divine favor, and dynastic genealogy — making the Cultural and Political SPICE-T themes inseparable in this section.", "id": "fc20"}, {"front": "Compare the Taj Mahal and Versailles as political statements.", "back": "Both announced their ruler's supremacy through unmatched expenditure on architectural scale. Both organized elite life around the ruler — the Taj Mahal through pilgrimage to a sacred dynastic monument, Versailles through mandatory noble residence. Both connected the ruler to a legitimating tradition: Shah Jahan to Timurid ancestors, Louis XIV to a long French royal line. Different contexts, common political logic.", "id": "fc21"}, {"front": "Why could Louis XIV build Versailles despite a treasury 'often near bankruptcy'?", "back": "The source does not explain this as financial capacity but as political necessity: the political return on Versailles — controlling the nobility, overawing rivals, projecting French grandeur — was worth the fiscal cost. This illustrates that monumental architecture was not surplus spending but a form of political investment.", "id": "fc22"}, {"front": "Naqsh-e Jahan (Isfahan) — architectural significance", "back": "The great royal square of Shah Abbas I's rebuilt Isfahan capital. One of the largest public squares in the world; surrounded by royal mosque, bazaar, and palace. Demonstrated Safavid state capacity and architectural achievement — a monumental statement of Safavid power analogous to Versailles or the Forbidden City.", "id": "fc23"}, {"front": "Why does the source treat monumental architecture in a global comparative chapter?", "back": "Because the AP World framework emphasizes thematic comparison across cultures. By reading Versailles, the Taj Mahal, the Forbidden City, and Topkapi alongside each other — not in isolation — the common logic of architectural legitimacy emerges: rulers across cultures independently discovered that building magnificently was a form of governing.", "id": "fc24"}, {"front": "What is the significance of the Taj Mahal's Quranic calligraphy?", "back": "The Quranic inscriptions throughout the Taj Mahal asserted Shah Jahan's Islamic piety and divine sanction — making the building a statement of religious legitimacy before God and subjects alike. Combining this with Timurid genealogy and unmatched scale, the building made multiple legitimacy claims simultaneously.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
