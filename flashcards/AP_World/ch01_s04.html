<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Mexica (Aztec)", "back": "The people who, guided by their patron deity Huitzilopochtli, settled in the Valley of Mexico and founded Tenochtitlán in 1325. They built a tribute empire through the Triple Alliance (Tenochtitlán, Texcoco, Tlacopan) that controlled approximately 200,000 sq km and 5–6 million people.", "id": "fc01"}, {"front": "Tenochtitlán", "back": "Aztec capital founded 1325 on an island in Lake Texcoco; grew to 200,000–300,000 inhabitants by the 15th century — one of the largest cities in the world and larger than any contemporary European capital. Connected to the mainland by causeways; supplied by a double aqueduct; surrounded by chinampas.", "id": "fc02"}, {"front": "Chinampa", "back": "Agricultural plots constructed in the shallow lakes of the Valley of Mexico by layering mud, vegetation, and soil to create raised, highly fertile growing platforms. Often called 'floating gardens' though they were anchored. Produced multiple harvests per year, supplying the food surplus that supported Tenochtitlán's large non-agricultural population.", "id": "fc03"}, {"front": "Triple Alliance", "back": "The political-military coalition of Tenochtitlán, Texcoco, and Tlacopan that organized Aztec military campaigns and administered the tribute empire. Conquered peoples retained local authority as long as tribute flowed; rebellion was met with devastating military punishment.", "id": "fc04"}, {"front": "Aztec tribute system", "back": "The economic foundation of Aztec imperial power: conquered peoples delivered periodic tribute — cotton, cacao, jade, feathers, textiles, food — to the capital. Documented in sources like the Codex Mendoza. Conquered lords retained local authority in exchange for reliable tribute payments.", "id": "fc05"}, {"front": "Codex Mendoza", "back": "A colonial-era document (c. 1541) recording pre-contact Aztec tribute obligations. Each symbol represents a specific commodity required from conquered peoples, making it a primary source for understanding the economic operations of the Aztec empire.", "id": "fc06"}, {"front": "Flower Wars (guerras floridas)", "back": "Ritualized conflicts between the Aztec and neighboring polities fought specifically to obtain sacrificial captives. Served dual purposes: maintaining military readiness and reinforcing the theological framework that required human blood to sustain the sun's movement.", "id": "fc07"}, {"front": "Aztec cosmological framework", "back": "The belief system in which regular offerings of human blood — including human sacrifice — were required to sustain the sun's movement and prevent cosmic collapse. Within this worldview, warfare was doubly justified: it generated tribute AND provided sacrificial captives for cosmic maintenance.", "id": "fc08"}, {"front": "Huitzilopochtli", "back": "The Mexica patron deity — a solar and war god — whose instructions (according to Mexica tradition) guided the people to found Tenochtitlán. Central to the Aztec cosmological framework requiring human sacrifice to sustain solar movement.", "id": "fc09"}, {"front": "Inca Empire (Tawantinsuyu)", "back": "The 'Land of the Four Quarters' — the Andean empire spanning approximately 4,000 km along the western coast of South America from Ecuador to Chile by 1450. Built without alphabetic writing, iron tools, or wheeled vehicles. Governed through the mit'a labor system, quipu records, and an extensive road network.", "id": "fc10"}, {"front": "Mit'a", "back": "The Inca labor-tax system in which subject communities owed the state a fixed period of labor service each year. Mit'a laborers built roads, temples, irrigation, and storage facilities; served in armies; worked state fields. In exchange, the state provided food, clothing, and tools and redistributed stored surplus during famines.", "id": "fc11"}, {"front": "Quipu", "back": "Inca administrative information technology: knotted strings of different colors, sizes, and arrangements whose combinations encoded numerical data, tribute records, census figures, and possibly narrative information. Specialists called quipucamayoc were trained to read them. Their destruction by Spanish colonizers was a major cultural loss.", "id": "fc12"}, {"front": "Quipucamayoc", "back": "Trained quipu specialists in the Inca Empire who encoded and decoded administrative data from knotted strings. The Spanish colonial government initially found their knowledge essential, then suppressed it as subversive. Their elimination represents a significant loss of indigenous knowledge.", "id": "fc13"}, {"front": "Chasquis", "back": "Trained relay runners in the Inca road network capable of transmitting messages or delivering fresh fish from the Pacific coast to the highland capital at Cuzco in days. They were the communication system of the empire, moving along the 40,000-km road network.", "id": "fc14"}, {"front": "Inca road network", "back": "Over 40,000 km of roads connecting the Inca Empire's diverse regions, including suspension bridges of twisted fiber spanning Andean gorges. Served logistical (armies, goods, officials), communicative (chasquis relay), and symbolic (assertion of imperial power) functions simultaneously.", "id": "fc15"}, {"front": "Machu Picchu", "back": "An Inca royal estate and ritual center in the Peruvian highlands (c. 1450 CE), approximately 2,430 m above sea level. Built through mit'a labor, it demonstrates Inca mastery of ashlar (precisely fitted) stonework without mortar — an architectural achievement without iron tools.", "id": "fc16"}, {"front": "Qollqa", "back": "Inca state warehouses distributed across the empire storing vast quantities of food, textiles, and other goods for redistribution during droughts, famines, or military campaigns. Central to the reciprocal logic of the mit'a system — labor in exchange for state redistribution.", "id": "fc17"}, {"front": "Comparison: Aztec tribute vs. Inca mit'a", "back": "Aztec tribute extracted goods (cotton, cacao, jade) from conquered peoples. Inca mit'a extracted labor. The mit'a included reciprocal state obligations (food, tools, famine relief) that gave it a degree of popular legitimacy; the Aztec tribute system was more extractive without equivalent reciprocity.", "id": "fc18"}, {"front": "SPICE-T: What Environmental/Interaction theme do chinampas illustrate?", "back": "Chinampas illustrate the Interaction with Environment theme — the Mexica transformed a lake environment through intensive human engineering (raised agricultural plots in shallow water) to create extraordinary food surplus, demonstrating how complex states adapted challenging environments to support large, specialized populations.", "id": "fc19"}, {"front": "SPICE-T: What Economic theme does the Aztec tribute system illustrate?", "back": "The Aztec tribute system illustrates the Economic theme — it was a non-market mechanism of resource accumulation that concentrated wealth at the capital through military coercion, funding armies, priests, and administrators. Tribute lists (Codex Mendoza) document the material scale of extraction from a multi-million person subject population.", "id": "fc20"}, {"front": "'State-building is a human capacity, not a cultural inheritance'", "back": "The section's core historiographical argument: the Aztec and Inca empires independently developed complex governance, taxation, communication, and architectural systems without contact with Afro-Eurasia. This demonstrates that complex state formation is a human universal, refuting any Eurocentric claim that state-building required specific cultural transmission from a single source.", "id": "fc21"}, {"front": "Colonial transformation of the mit'a", "back": "The Spanish colonial government adapted the Inca mit'a to compel indigenous labor in silver mines (notably Potosí), stripping away the reciprocal obligations that had given the system legitimacy and transforming it into brutal forced labor — a major cause of indigenous population collapse in colonial Peru.", "id": "fc22"}, {"front": "Causation: Why was warfare doubly important in Aztec society?", "back": "Warfare served two simultaneous functions in the Aztec political-religious system: (1) economic — it extended territorial control and generated tribute; (2) cosmological — it provided sacrificial captives required to sustain the sun's movement. The political and religious systems were genuinely interdependent in the Aztec worldview.", "id": "fc23"}, {"front": "Contextualization: Americas in the Global Tapestry 1200–1450", "back": "The Americas had no contact with Afro-Eurasia before the 15th century, making Aztec and Inca achievements a control case for human state-building capacity. By 1450 Tenochtitlán was larger than any European capital; the Inca Empire stretched 4,000 km; both administered complex tax, road, and communication systems.", "id": "fc24"}, {"front": "Cuzco", "back": "The highland capital of the Inca Empire, the destination of chasqui relay runners and the administrative center of Tawantinsuyu. Home to the temple complex of Coricancha (Temple of the Sun) and the fortress of Sacsayhuamán, both built through mit'a labor using precisely fitted stone without mortar.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
