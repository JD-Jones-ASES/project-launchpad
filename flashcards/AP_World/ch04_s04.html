<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>AP World History: Modern &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 4, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "encomienda", "back": "A Spanish colonial labor institution granting a colonizer (encomendero) the right to extract tribute and labor from an indigenous community, in exchange for obligations to provide Christian instruction and protection. In practice, the protections were largely theoretical and the extraction was brutal — accelerating indigenous population collapse. Partially restricted by the New Laws of 1542.", "id": "fc01"}, {"front": "encomendero", "back": "The Spanish colonizer who held encomienda rights — the right to extract tribute and labor from a specific indigenous community. Encomenderos used these rights to force indigenous labor in mines, on plantations, and in domestic service. The class of powerful encomenderos posed a political threat to the Spanish crown that motivated the New Laws of 1542.", "id": "fc02"}, {"front": "New Laws of 1542", "back": "Spanish crown legislation that attempted to phase out the encomienda and prohibit indigenous slavery. Motivated by Las Casas's advocacy and the crown's desire to limit the power of colonial elites. Faced intense encomendero resistance; enforcement was partial and inconsistent. The encomienda lingered in weakened form for another century.", "id": "fc03"}, {"front": "mita (colonial)", "back": "A Spanish colonial labor draft requiring indigenous communities to supply a fixed percentage of adult men on a rotating basis for mines, public works, and textile workshops (obrajes). Distinct from (though named after) the Inca mit'a rotational labor system. Most notorious at the Potosí silver mines, where hundreds of thousands died.", "id": "fc04"}, {"front": "Potosí", "back": "Silver mining city in present-day Bolivia. By the early seventeenth century, it was producing more than half the world's silver supply. Its mita labor draft killed hundreds of thousands of indigenous workers through cave-ins, mine gases, and mercury poisoning. At its peak in the 1590s, it was one of the largest cities in the world.", "id": "fc05"}, {"front": "mercury poisoning at Potosí", "back": "Mercury (quicksilver) was used in the amalgamation process to separate silver from ore. Workers absorbed mercury through skin contact and inhalation during the refining process, causing neurological damage and death. This made Potosí's mita not just physically dangerous (cave-ins, gases) but chemically toxic.", "id": "fc06"}, {"front": "hacienda", "back": "A large landed estate in Spanish colonial America producing agricultural goods using bound indigenous and mestizo labor. Workers were tied to the estate through debt peonage — the owner advanced wages or goods, and workers whose debts exceeded their earnings were effectively bound. The dominant labor institution of the colonial countryside after the encomienda declined; persisted into the twentieth century.", "id": "fc07"}, {"front": "debt peonage", "back": "The mechanism binding hacienda workers to the estate: owners advanced wages or goods; when worker debts grew faster than earnings, they could not leave. A form of coerced labor that was technically not slavery (workers were not owned as chattel) but was functionally bound labor. Persisted in parts of Latin America into the twentieth century.", "id": "fc08"}, {"front": "casta system", "back": "A system of racial classification in Spanish colonial America assigning legal status, tax obligations, and social privileges based on ancestry. Categories included peninsular, criollo, mestizo, mulato, zambo, and sixteen (or more) named combinations. Presented as natural; in fact an administrative construction that could be contested and negotiated.", "id": "fc09"}, {"front": "peninsular", "back": "A person born in Spain (the Iberian Peninsula) living in the Spanish American colonies. Occupied the highest casta status and monopolized the most powerful political and administrative offices. The crown reserved top positions for peninsulares to ensure loyalty to metropolitan authority over colonial landed interests.", "id": "fc10"}, {"front": "criollo", "back": "A person of full Spanish descent born in the Americas rather than Spain. Ranked below peninsulares in the casta hierarchy. Despite being Spanish by ancestry, criollos were excluded from the most powerful colonial offices. Their resentment of this exclusion became a driver of independence movements in the late eighteenth and early nineteenth centuries.", "id": "fc11"}, {"front": "mestizo", "back": "In the casta system, a person with one Spanish and one indigenous parent. Subject to restrictions on professions, weapons, and clothing, and to different tax obligations than peninsulares or criollos. The mestizo population grew rapidly as colonial society developed, making the casta system increasingly complex to administer.", "id": "fc12"}, {"front": "mulato", "back": "In the casta system, a person with one Spanish and one African parent. Like other mixed-race categories, subject to legal restrictions on professions, clothing, and weapons. The category was constructed through official records and could be contested — illustrating that casta categories were administrative, not biological.", "id": "fc13"}, {"front": "zambo", "back": "In the casta system, a person of indigenous and African ancestry. Like other mixed-race categories, subject to specific legal obligations and restrictions. The existence of zambo as a named category reflects the complexity of colonial society produced by the overlapping populations of Spanish, indigenous, and African origin.", "id": "fc14"}, {"front": "casta paintings", "back": "A genre of colonial-era paintings depicting the sixteen (or more) racial combinations of the casta system with their named offspring. Commissioned primarily for European audiences as ethnographic displays of Spanish colonial order. Their artistic beauty coexisted with their administrative function: codifying and naturalizing racial hierarchy.", "id": "fc15"}, {"front": "obrajes", "back": "Colonial textile workshops in Spanish America, particularly in the Andean region and Mexico. Indigenous mita workers were assigned to obrajes under conditions that were often as brutal as mine labor — poor ventilation, locked premises, corporal punishment. Produced cloth for colonial markets.", "id": "fc16"}, {"front": "casta as 'administrative technology' — AP framing", "back": "The AP-exam-critical framing: the casta system was not a reflection of biological reality but a legal-administrative instrument designed to assign differential rights, duties, and taxes across a diverse colonial population. Categories were contested and negotiable through social performance and church records — proving they were constructed, not natural.", "id": "fc17"}, {"front": "SPICE-T: Political — coerced labor as state power", "back": "The encomienda, mita, and casta system were all instruments of the colonial state. The encomienda and mita extracted labor and resources to fund imperial expansion (silver for Habsburg wars). The casta system assigned rights and duties to manage a diverse population. All three represent the use of political-administrative power to structure economic extraction.", "id": "fc18"}, {"front": "why did the encomienda persist after the New Laws of 1542?", "back": "Encomenderos resisted the New Laws intensely because the encomienda was the foundation of their economic and social power. Enforcement was partial and inconsistent; in many regions the crown lacked the administrative apparatus to override local elites. The encomienda lingered in weakened form for another century, gradually replaced by hacienda debt peonage.", "id": "fc19"}, {"front": "CONTINUITY: Inca mit'a vs. colonial mita", "back": "The Spanish colonial mita was named after — and partially derived from — the Inca mit'a, a rotational labor obligation in which Andean communities provided labor to the state in exchange for redistribution of goods. The Spanish system adapted this pre-existing Andean institution but redirected its labor extraction toward mining for export, stripping the reciprocal redistribution that had characterized the Inca version.", "id": "fc20"}, {"front": "How did the casta system connect to colonial economic interests?", "back": "The casta system assigned differential tax obligations: indigenous people paid tribute; different mixed-race categories paid different taxes; peninsulares and criollos were exempt. It also restricted which professions each category could enter, protecting Spanish-born elites from competition. The economic and social hierarchy were mutually reinforcing.", "id": "fc21"}, {"front": "COMPARE: encomienda vs. mita as labor systems", "back": "Encomienda: crown-granted rights to a specific indigenous community's tribute and labor, held by an individual encomendero. Mita: state-mandated rotational draft of a percentage of adult men from indigenous communities for mines, public works, and textile production. Both were coerced; the mita was more directly state-controlled and was tied to specific industrial (mining) purposes.", "id": "fc22"}, {"front": "What distinguished coerced labor systems from chattel slavery?", "back": "In both the encomienda and the mita, the state held rights to community labor or tribute — the workers were not owned as personal property. In chattel slavery, the enslaved person was legally movable property owned by an individual. In practice, coerced labor could be as brutal as chattel slavery; the legal distinction shaped how colonial authorities could reform or restrict each system.", "id": "fc23"}, {"front": "Las Casas and the encomienda — connection to Section 4.3", "back": "Las Casas was himself a former encomendero whose religious conversion led him to advocate against the encomienda system. His Brevísima relación (1542) was part of the moral pressure that contributed to the New Laws of 1542. His advocacy illustrates how the encomienda's violence attracted internal colonial criticism, not just indigenous resistance.", "id": "fc24"}, {"front": "Why is the colonial labor system significant for understanding global silver flows?", "back": "Potosí's coerced mita labor produced more than half the world's silver supply by the early seventeenth century. This silver flowed into global circuits: through Spain to pay for northern European manufactured goods; through the Philippines to China (which used silver as currency). Coerced indigenous labor at Potosí was therefore the human cost underlying the price revolution and global monetary integration described in Section 4.5.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
