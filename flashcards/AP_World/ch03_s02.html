<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Ming Dynasty — dates and founding context", "back": "1368–1644. Founded after the expulsion of the Mongol Yuan dynasty; pursued Confucian cultural restoration, the Grand Canal, the Great Wall, and (briefly) extraordinary maritime expansion under Zheng He.", "id": "fc01"}, {"front": "Zheng He", "back": "Court eunuch and admiral who led seven massive naval expeditions into the Indian Ocean world (1405–1433) for the Ming dynasty. His fleets — the largest wooden vessels ever built — visited Southeast Asia, India, the Persian Gulf, and East Africa. The voyages were tributary, not primarily commercial.", "id": "fc02"}, {"front": "Ming tributary expeditions — purpose and scope", "back": "Seven voyages between 1405 and 1433. Purpose: bring foreign rulers into the Chinese world order through gift-exchange and acknowledgment of Ming overlordship, not commercial conquest. Reached as far as Malindi (modern Kenya).", "id": "fc03"}, {"front": "Tributary System", "back": "The Chinese diplomatic framework in which neighboring states recognized the emperor's nominal supremacy by sending tribute missions, performing the kowtow, and receiving gifts, trading privileges, and imperial recognition in return. More symbolic than coercive; structured China's relationships with Korea, Vietnam, Japan, and Southeast Asian states.", "id": "fc04"}, {"front": "Kowtow", "back": "Ritual prostration performed before the Chinese emperor by foreign tribute missions, acknowledging the hierarchical world order centered on China. Became a point of diplomatic friction with European missions (notably Britain in 1793) who objected to the symbolic submission it implied.", "id": "fc05"}, {"front": "Why did the Ming abandon maritime expansion after 1433?", "back": "A combination of: (1) Confucian official hostility to maritime trade as beneath a scholarly empire's dignity; (2) fiscal conservatism viewing the voyages as expensive vanity; (3) increasing Mongol pressure on the northern frontier demanding military resources. The fleet was dismantled and large-ship construction prohibited.", "id": "fc06"}, {"front": "Grand Canal (Ming restoration)", "back": "The major north–south waterway linking northern and southern China, restored and expanded during the Ming dynasty. Critical to integrating China's economy by moving grain from the productive south to the administrative and military north.", "id": "fc07"}, {"front": "Forbidden City", "back": "The imperial palace complex built in Beijing under the early Ming (c. 1406–1420); 980 buildings, 72 hectares. Served as the ritual and administrative center of Chinese imperial power through both Ming and Qing dynasties. Symbol of dynastic authority and Confucian cosmological order.", "id": "fc08"}, {"front": "Ming silver demand and global trade", "back": "The Ming government converted its tax system to silver payments. Spanish silver mined in the Americas flowed across the Pacific to Manila, then into China. This Chinese demand was one of the most powerful forces driving transoceanic trade in the 16th–17th centuries — a key pillar of early modern globalization.", "id": "fc09"}, {"front": "Manila Galleon trade", "back": "The trans-Pacific trade route connecting Acapulco (New Spain) to Manila (Philippines), primarily carrying American silver eastward to China in exchange for Chinese goods (silk, porcelain). Operated 1565–1815; driven by China's enormous demand for silver.", "id": "fc10"}, {"front": "Qing Dynasty — origins and dates", "back": "1644–1912. Founded by Manchu (formerly Jurchen) peoples from northeast China under Nurhaci and his successors. Seized Beijing in 1644 as the Ming collapsed; ruled China for nearly three centuries — the longest since the Han dynasty.", "id": "fc11"}, {"front": "Nurhaci", "back": "Manchu leader who unified the Jurchen confederation and laid the foundations of the Qing state in the early 17th century. His successors completed the conquest of China in 1644.", "id": "fc12"}, {"front": "Queue (hair requirement)", "back": "The Qing requirement that Han Chinese men shave the front of their heads and wear a long braid at the back — enforced on pain of death. A mark of Han submission to Manchu rule; deeply resented as it violated Confucian norms of bodily integrity inherited from parents.", "id": "fc13"}, {"front": "Eight Banners (Ba Qi)", "back": "The Qing military organization dividing Manchu, Mongol, and Han Chinese soldiers into hereditary military units that served as the backbone of imperial power. Also a system of ethnic segregation within cities and the military.", "id": "fc14"}, {"front": "Qing dual strategy for governing Han China", "back": "Ethnic distinction (queue requirement, segregated Eight Banners, restricted intermarriage) combined with Confucian accommodation (retained Ming bureaucratic structures, civil service examinations, Confucian ritual, patronage of Chinese art). Allowed a small Manchu minority to govern a vast Han majority effectively.", "id": "fc15"}, {"front": "Kangxi Emperor (r. 1661–1722)", "back": "One of China's longest-reigning and most capable rulers. Suppressed the Three Feudatories Rebellion, brought Taiwan under Qing control, signed the Treaty of Nerchinsk with Russia (1689), sponsored the Kangxi Dictionary, and engaged with Jesuit missionaries while rejecting Christianity as incompatible with Confucian ritual.", "id": "fc16"}, {"front": "Treaty of Nerchinsk (1689)", "back": "The first formal treaty between China and a European power. Signed between the Qing Empire and Russia, it halted Russian expansion into Manchuria and established a diplomatic boundary. Demonstrated Qing diplomatic confidence and capability.", "id": "fc17"}, {"front": "Qianlong Emperor (r. 1735–1796)", "back": "Qing emperor under whom the empire dramatically expanded into Xinjiang (1759), Tibet, and Outer Mongolia. His reign marked the Qing Empire's greatest territorial extent and, together with Kangxi, is regarded as the era of greatest Qing strength.", "id": "fc18"}, {"front": "Xinjiang — Qing conquest and significance", "back": "Incorporated into the Qing Empire in 1759. Part of the strategic expansion to control steppe nomads who had historically threatened northern China, enabled by Manchu military identity and Inner Asian frontier experience.", "id": "fc19"}, {"front": "Canton System", "back": "The Qing restriction (formalized 1757) limiting European merchants to trading only in the port of Guangzhou (Canton). Reflected China's prioritization of political stability and Confucian social hierarchy over commercial expansion — a consistent policy across Ming and Qing dynasties.", "id": "fc20"}, {"front": "China's GDP in 1750", "back": "The Qing Empire in 1750 was the world's largest economy and most populous state, producing roughly a quarter to a third of global GDP. This fact challenges narratives that frame early modern globalization as primarily a European-driven process.", "id": "fc21"}, {"front": "How did Qing emperors perform legitimacy for different subject populations?", "back": "Qing emperors presented themselves as Confucian scholars to Han Chinese subjects, Buddhist patrons to Tibetan and Mongolian subjects, and Manchu warrior-hunters in their northeastern homeland — a strategic use of different cultural identities to maximize loyalty across the empire's diverse peoples.", "id": "fc22"}, {"front": "What SPICE-T theme connects Ming silver demand to the growth of Atlantic and Pacific trade?", "back": "Economic and Political Interaction: Chinese silver demand (driven by Ming tax-system conversion) structured global trade from Potosí (Bolivia) to Manila to Guangzhou. This demonstrates that early modern globalization was multi-centered — Chinese institutional choices shaped commerce across three oceans, not just European exploration.", "id": "fc23"}, {"front": "Compare the Ming inward turn with the Qing Canton System as political choices.", "back": "Both reflect a consistent Chinese state priority: political stability and Confucian social hierarchy over commercial expansion. The Ming dismantled the ocean fleet (1430s) for fiscal and ideological reasons; the Qing restricted European trade to one port (1757) from a position of confident self-sufficiency. Neither was weakness — both were rational choices whose costs emerged only later.", "id": "fc24"}, {"front": "Why is China's centrality to early modern globalization often underappreciated in standard histories?", "back": "Because standard narratives focus on European maritime expansion as the engine of early modern globalization. In fact, Chinese demand for silver structured trade networks across the Pacific and Indian Oceans; Chinese administrative models were emulated across East and Southeast Asia; and the Qing Empire in 1750 was the world's largest economy.", "id": "fc25"}, {"front": "Confucian civil service examination system (Qing continuity)", "back": "The Qing retained the Ming Confucian examination system — competitive written tests on classical texts used to select government officials. By maintaining this institution, the Qing signaled respect for Han cultural norms and ensured a trained bureaucracy, a key element of their accommodation strategy.", "id": "fc26"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
