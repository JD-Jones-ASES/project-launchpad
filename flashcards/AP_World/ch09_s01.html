<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 9, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Digital Revolution", "back": "The late-20th-century transformation from an economy built on physical production to one organized around generating, processing, and transmitting information. Began with programmable computers in the 1940s and accelerated through the transistor, integrated circuit, personal computer, and World Wide Web.", "id": "fc01"}, {"front": "ENIAC (1945)", "back": "The first large-scale programmable electronic computer, built at the University of Pennsylvania. Occupied 1,800 square feet and consumed 150 kilowatts of electricity — a benchmark against which Moore's Law miniaturization is measured.", "id": "fc02"}, {"front": "Transistor", "back": "An electronic switch invented at Bell Laboratories in 1947. It miniaturized the core component of computing hardware, making possible the subsequent development of integrated circuits and the exponential reduction in the size and cost of computers.", "id": "fc03"}, {"front": "Integrated circuit", "back": "Developed in the late 1950s, it allowed thousands — then millions — of transistors to be printed onto a sliver of silicon. Enabled the continued miniaturization predicted by Moore's Law and made personal computers and smartphones possible.", "id": "fc04"}, {"front": "Moore's Law", "back": "An observation by Intel co-founder Gordon Moore (1965) that the number of transistors on a microchip doubles approximately every two years while costs fall correspondingly. Correctly predicted exponential computing-power growth for over five decades; began slowing in the 2020s as transistors approach atomic size.", "id": "fc05"}, {"front": "ARPANET (1969)", "back": "The U.S. Defense Department research network that connected universities by routing data in packets across multiple pathways. Its decentralized architecture — designed to survive a nuclear first strike — became the technical foundation of the modern Internet.", "id": "fc06"}, {"front": "World Wide Web", "back": "A system of hyperlinked documents accessible over the Internet, proposed by Tim Berners-Lee at CERN in 1989. The first graphical browser (Mosaic, 1993) made it accessible to non-specialists; by 2024, more than five billion people — ~65% of humanity — were online.", "id": "fc07"}, {"front": "Tim Berners-Lee", "back": "British physicist working at CERN (Geneva) who proposed the World Wide Web in 1989. His invention quickly became global infrastructure with its largest user base in Asia — illustrating that the Digital Revolution belongs to no single civilization.", "id": "fc08"}, {"front": "Mosaic (1993)", "back": "The first graphical web browser, which made the World Wide Web accessible to non-specialists and triggered exponential growth in Internet users — roughly doubling every year through the rest of the 1990s.", "id": "fc09"}, {"front": "Digital divide", "back": "The gap between populations with reliable high-speed digital access and those with limited or no access. Operates at global (wealthy vs. poor nations), national (urban vs. rural), and local (high-income vs. low-income) scales. Gender intersects the divide: women in South Asia and sub-Saharan Africa are significantly less likely than men to own smartphones.", "id": "fc10"}, {"front": "Leapfrogging", "back": "The process by which Global South regions bypassed earlier stages of infrastructure development. Example: rural villages in sub-Saharan Africa and South Asia gained Internet access through mobile networks before having landline telephones or reliable electricity grids.", "id": "fc11"}, {"front": "M-Pesa", "back": "Kenya's mobile payment platform, by 2020 the dominant form of banking for millions of Kenyans who had never held a traditional bank account. A leading example of how mobile technology enabled financial inclusion in sub-Saharan Africa.", "id": "fc12"}, {"front": "Unified Payments Interface (UPI)", "back": "India's mobile payment system, processing over twelve billion transactions per month by 2024 — more than any comparable system in the United States or Europe. Illustrates that major digital financial innovations can originate in and lead from the Global South.", "id": "fc13"}, {"front": "Social media", "back": "The third phase of the Digital Revolution, beginning with Friendster and MySpace (early 2000s) and dominated by Facebook (2004), YouTube (2005), Twitter (2006), and Instagram (2010). Provided tools for organizing, communication, and self-expression, while also introducing vulnerabilities including misinformation and surveillance capitalism.", "id": "fc14"}, {"front": "Surveillance capitalism", "back": "Term coined by scholar Shoshana Zuboff for the business model in which user behavior (clicks, searches, locations, social connections) is harvested as data, used to build predictive profiles, and sold to advertisers seeking to influence behavior. Critics argue it also amplified misinformation.", "id": "fc15"}, {"front": "Shoshana Zuboff", "back": "Scholar who coined the concept of 'surveillance capitalism' to describe how social media platforms monetize user behavioral data by selling predictive profiles to advertisers — a new form of capital accumulation distinct from industrial-era commodity production.", "id": "fc16"}, {"front": "Arab Spring (2010–2012)", "back": "A wave of civil-society uprisings across the Arab world in which social media was used to coordinate protest movements. An example of how digital tools enabled transnational political organizing, though social media amplified existing grievances rather than creating them.", "id": "fc17"}, {"front": "Internet as global infrastructure (SPICE-T connection)", "back": "The Internet functions analogously to earlier exchange networks (Silk Roads, Atlantic shipping lanes): it integrates global exchange, concentrates wealth at chokepoints (platform companies, undersea cable operators), generates cultural diffusion, and distributes access unevenly — reflecting existing inequalities of income and geography.", "id": "fc18"}, {"front": "China's parallel digital ecosystem", "back": "China developed its own state-supervised digital economy — WeChat, Alibaba, Baidu, ByteDance/TikTok — without American platforms, rejecting Western laissez-faire governance. This model provided an alternative that other governments seeking digital sovereignty have studied.", "id": "fc19"}, {"front": "Why does the Digital Revolution 'belong to no single civilization'?", "back": "Although foundational technologies were developed in the United States and Western Europe, the largest Internet user base today lives in Asia — China alone has more Internet users than the entire population of North America and Europe combined.", "id": "fc20"}, {"front": "How did the Internet's military origin shape its civilian architecture?", "back": "ARPANET was designed to route data packets across multiple independent pathways so the network could survive a nuclear first strike. This decentralized packet-routing architecture became the technical foundation of the modern Internet, making censorship and single-point failure difficult.", "id": "fc21"}, {"front": "What SPICE-T theme links surveillance capitalism to earlier forms of economic extraction?", "back": "Economic (E): surveillance capitalism represents a new form of capital accumulation in which behavioral data replaces physical commodities as the extracted resource. Like earlier extractive economies, profits concentrate among those who control the infrastructure (platform companies).", "id": "fc22"}, {"front": "How does the gender digital divide illustrate the Social (S) theme in SPICE-T?", "back": "Unequal smartphone and Internet access for women in South Asia and sub-Saharan Africa both reflects and reinforces existing gender hierarchies — limiting women's access to economic opportunities and civic information, perpetuating social inequality.", "id": "fc23"}, {"front": "Compare the Internet's role in the Arab Spring and in the Indian farmers' protest (2020–2021).", "back": "In both cases, social media (Twitter/Facebook in Arab Spring; WhatsApp in India) served as a coordination tool for movements with deeper structural grievances. The Indian protest reversed federal agricultural legislation — showing that digitally-coordinated mobilization can achieve concrete policy outcomes.", "id": "fc24"}, {"front": "What was the significance of CERN's role in Web development?", "back": "CERN is a European multinational particle-physics institution — Tim Berners-Lee, a British physicist, proposed the Web there in 1989. The Web's origins at an international scientific institution (rather than a U.S. company or government) prefigured its status as a global, multi-civilizational infrastructure.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
