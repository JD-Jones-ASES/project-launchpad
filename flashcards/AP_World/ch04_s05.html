<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 4, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "mercantilism", "back": "An economic theory dominant in Europe from roughly 1500 to 1750 holding that national wealth consisted of accumulated bullion (gold and silver), that global trade was zero-sum, and that colonies existed to supply raw materials and markets for the mother country. Critiqued and largely replaced by Adam Smith's free-trade liberalism in the late eighteenth century.", "id": "fc01"}, {"front": "bullion", "back": "Gold and silver in bulk form, especially as bars or ingots. In mercantilist theory, the accumulation of bullion was the primary measure of national wealth. American silver from Potosí and other mines was the core bullion resource driving Spanish imperial finance.", "id": "fc02"}, {"front": "balance of trade", "back": "In mercantilist theory, the difference between a nation's exports and imports. A 'favorable' balance of trade meant exporting more than importing — keeping bullion at home rather than sending it abroad. Colonial policy was designed to enforce favorable trade balances for the mother country.", "id": "fc03"}, {"front": "price revolution", "back": "The severe inflation experienced in Spain and Europe during the late sixteenth and seventeenth centuries, caused by the massive influx of American silver increasing the money supply faster than goods production. Paradoxically self-defeating: silver flowed through Spain to pay for Dutch, English, and French manufactured goods, enriching Spain's commercial rivals.", "id": "fc04"}, {"front": "joint-stock company", "back": "A corporate entity in which multiple investors pooled capital in exchange for profit shares. Received a crown charter granting monopoly trading rights over a defined geographic area. Solved the problems of capital accumulation (risk-sharing), governance (delegating sovereign powers), and political-economic alignment simultaneously.", "id": "fc05"}, {"front": "VOC (Dutch East India Company, est. 1602)", "back": "The Vereenigde Oost-Indische Compagnie — the most powerful joint-stock company of the early modern period. Its charter granted monopoly over all Dutch trade east of the Cape of Good Hope and empowered it to negotiate treaties, maintain armies and navies, build forts, and govern territories. At its peak, it operated more ships than any European government.", "id": "fc06"}, {"front": "EIC (English East India Company, est. 1600)", "back": "The English East India Company, chartered in 1600 with monopoly rights over English trade with Asia. Eventually governed much of the Indian subcontinent under company rule. One of the primary institutional vehicles through which Britain built its Indian empire, illustrating the hybrid state-corporate nature of early modern colonial expansion.", "id": "fc07"}, {"front": "Virginia Company (est. 1606)", "back": "An English joint-stock company chartered in 1606 that established Jamestown (1607) — the first permanent English settlement in North America. Illustrates the joint-stock form applied to colonial settlement rather than Asian trade; failed commercially but established the English North American colonial presence.", "id": "fc08"}, {"front": "Jan Pieterszoon Coen (1587–1629)", "back": "Fourth Governor-General of the VOC's Asian operations; founded Batavia (Jakarta) as the company's Asian headquarters. In 1621 oversaw the massacre and enslavement of the Banda Islands population (~15,000 reduced to <600) to enforce the VOC's nutmeg monopoly. Represents the combination of commercial genius and systematic colonial violence.", "id": "fc09"}, {"front": "Banda Islands massacre (1621)", "back": "Jan Pieterszoon Coen's destruction of the Banda Islands population (from ~15,000 to fewer than 600) to enforce the VOC's monopoly on nutmeg — the world's only source. Illustrates how joint-stock companies combined capitalist profit motive with state-level military violence, a combination that characterized European colonialism for the next three centuries.", "id": "fc10"}, {"front": "Treaty of Tordesillas (1494)", "back": "A papal-brokered agreement that drew an imaginary line 370 leagues west of the Cape Verde Islands: everything west to Spain, everything east to Portugal. A 'legal fiction' from the beginning — negotiated without indigenous consent, ignored by the Dutch, English, and French. Established the precedent that European powers could negotiate division of the non-European world.", "id": "fc11"}, {"front": "Batavia (present-day Jakarta)", "back": "Founded by Jan Pieterszoon Coen as the VOC's Asian headquarters in 1619. Located in present-day Indonesia, it served as the nerve center of Dutch commercial empire in Asia, controlling trade routes between the Indian Ocean spice islands and European markets.", "id": "fc12"}, {"front": "quinto real — connection to mercantilism", "back": "The Spanish crown's 20% tax on colonial precious metals was the primary mechanism of mercantilist bullion accumulation. But the price revolution meant this bullion flowed through Spain as payment for manufactured goods, enriching northern European rivals. The quinto real was less an accumulation engine than a transit station for silver flowing to the Dutch Republic, England, and France.", "id": "fc13"}, {"front": "why was mercantilist bullion accumulation self-defeating?", "back": "Spanish silver inflows caused inflation (price revolution), making Spanish goods more expensive relative to Dutch, English, and French goods. Spain then imported manufactured goods from rivals, sending silver abroad. By the mid-17th century Spain was deeply in debt to northern European banking houses — the silver that was supposed to enrich Spain had diffused to its competitors.", "id": "fc14"}, {"front": "Casa de Contratación — mercantilist function", "back": "Established 1503; the institutional mechanism of Spanish mercantilist colonial policy. Required all trade with American colonies to flow through designated ports (Seville, later Cádiz) and licensed Spanish ships. Extracted the quinto real. Made smuggling both illegal and enormously profitable — an unintended consequence of strict mercantilist controls.", "id": "fc15"}, {"front": "SPICE-T: Economic — mercantilism and global trade", "back": "Mercantilism is the defining economic theme of Unit 4. Its logic shaped colonial policy (port controls, trade monopolies, the quinto real), structured the Atlantic economy (plantation goods → Europe → bullion), and paradoxically funded rivals by diffusing silver through trade. Adam Smith's critique of mercantilism (Wealth of Nations, 1776) marks the conceptual boundary between this period and the next.", "id": "fc16"}, {"front": "SPICE-T: Political — joint-stock companies as hybrid state-corporate entities", "back": "Joint-stock companies blurred the boundary between state power and private commerce. They held sovereign powers (war, treaty, jurisdiction) delegated by crown charter while being organized around private investor profit. This hybrid form solved the problem of how small European states could project power across hemispheres — by outsourcing empire to private capital.", "id": "fc17"}, {"front": "Amsterdam Stock Exchange — first publicly traded shares", "back": "The VOC was the first company to issue publicly traded shares, making it a pioneer of modern corporate capitalism. The Amsterdam Stock Exchange (est. 1602) enabled secondary trading of VOC shares, creating a market for corporate ownership that is the direct ancestor of modern financial markets.", "id": "fc18"}, {"front": "zero-sum trade logic in mercantilism", "back": "Mercantilism assumed global trade was a zero-sum game: one nation's gain was necessarily another's loss. This drove the competition for exclusive colonial markets and trade monopolies. It contrasts with Adam Smith's free-trade theory that trade could be mutually beneficial, increasing total wealth rather than merely redistributing a fixed sum.", "id": "fc19"}, {"front": "Tordesillas as precedent for the Berlin Conference (1884–85)", "back": "The source explicitly connects the Treaty of Tordesillas to the Berlin Conference: Tordesillas 'established a precedent: that European powers could negotiate the ownership of the non-European world among themselves, a logic that would culminate in the Berlin Conference of 1884–1885.' Both events involved European states dividing non-European territories without indigenous consent.", "id": "fc20"}, {"front": "what problems did the joint-stock company solve?", "back": "Three interlocking problems: (1) Capital accumulation — spreading risk across multiple investors made costly expeditions financially viable; (2) Governance — delegating sovereign powers (war, treaties, courts) to a corporate entity solved the problem of governing distant territories; (3) Alignment — linking private profit to state geopolitical interests ensured private investment served imperial goals.", "id": "fc21"}, {"front": "Jamestown (1607)", "back": "The first permanent English settlement in North America, established by the Virginia Company (chartered 1606). Its establishment illustrates the joint-stock company model applied to colonial settlement: private investors bore the cost of exploration and settlement in exchange for potential profit, while the crown granted the charter and claimed sovereignty over the territory.", "id": "fc22"}, {"front": "COMPARE: Spanish colonial model vs. Dutch VOC model (introduction)", "back": "Spanish empire: state enterprise with explicit Catholic ideological justification; crown controlled trade through Casa de Contratación; coerced indigenous labor through encomienda and mita. Dutch VOC: private corporate enterprise chartered by the state; profits distributed to shareholders; used military force to enforce trade monopolies. Both predicated on violence and extraction; different institutional organization.", "id": "fc23"}, {"front": "silver's global circuit — Spain to China", "back": "American silver flowed through Spain to northern Europe (payment for manufactured goods), and from Europe eastward to China (which used silver as currency and had insatiable demand). Chinese demand for silver was a key driver of the global silver circuit: American silver flowed west to Europe and then east to China, paying for silks, porcelain, and tea. Section 4.5 establishes this global monetary integration.", "id": "fc24"}, {"front": "Adam Smith's critique of mercantilism", "back": "Adam Smith's Wealth of Nations (1776) critiqued mercantilism by arguing that free trade (not bullion accumulation or trade monopolies) generated national wealth. His theory of comparative advantage suggested that nations should specialize in what they produce most efficiently and trade freely — the intellectual framework that replaced mercantilist colonial policy in the nineteenth century.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
