<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 9, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Universal Declaration of Human Rights (UDHR)", "back": "Adopted by the UN General Assembly on 10 December 1948 (48 in favor, 0 against, 8 abstentions). The first international attempt to define a common standard of treatment for every human being, independent of nationality, religion, race, or sex. Not a binding treaty but became a foundational reference in international law.", "id": "fc01"}, {"front": "Universal human rights", "back": "The doctrine that all human beings possess certain fundamental rights that no government may legitimately deny, regardless of culture, religion, or political system. Contested: some argue rights are culturally particular and universalism can be neo-imperialist; others argue universality is precisely the point.", "id": "fc02"}, {"front": "Eleanor Roosevelt", "back": "U.S. delegate who chaired the drafting committee of the UDHR. Her role reflects U.S. influence in the post-war order, but the drafting committee was genuinely multinational — making the common misconception of the UDHR as 'a Western document imposed on the rest of the world' historically inaccurate.", "id": "fc03"}, {"front": "Peng Chun Chang", "back": "Chinese delegate who served as vice-chair of the UDHR drafting committee. His participation illustrates the multinational character of the UDHR's authorship and challenges the characterization of the document as exclusively a product of Western Enlightenment thought.", "id": "fc04"}, {"front": "Charles Malik", "back": "Lebanese delegate to the UDHR drafting committee who drafted much of the document's philosophical foundation. His contributions drew on Arab and Christian intellectual traditions, further complicating the 'Western imposition' narrative.", "id": "fc05"}, {"front": "Hernan Santa Cruz", "back": "Chilean delegate who argued forcefully for the inclusion of economic and social rights in the UDHR, reflected in Article 25 (right to a standard of living adequate for health and well-being, including food, housing, and healthcare).", "id": "fc06"}, {"front": "UDHR abstentions (1948)", "back": "Soviet Union: individual rights reflect bourgeois Western ideology over collective rights. Saudi Arabia: Article 18 (right to change religion) incompatible with Islamic law. South Africa: apartheid system directly contradicted Articles 1–2 (universal equality). None voted against; 8 abstentions total.", "id": "fc07"}, {"front": "UDHR Article 18", "back": "Asserts the right to freedom of thought, conscience, and religion — including the right to change one's religion. The provision that caused Saudi Arabia to abstain, because it was incompatible with traditional Islamic law as interpreted by the Saudi government.", "id": "fc08"}, {"front": "UDHR Article 25", "back": "Asserts the right to a standard of living adequate for health and well-being, including food, clothing, housing, medical care, and necessary social services. Reflects the economic and social rights advocated by Hernan Santa Cruz (Chile). Represents the positive-obligation dimension of human rights — not just freedom from state abuse but provision of basic needs.", "id": "fc09"}, {"front": "Why was 1948 the 'right moment' for the UDHR?", "back": "The Holocaust demonstrated that states themselves could systematically perpetrate genocide with bureaucratic efficiency. This convinced post-war founders that rights could not be left entirely to individual states for protection, because states were often the perpetrators of the worst abuses.", "id": "fc10"}, {"front": "Boomerang effect (Keck and Sikkink)", "back": "The transnational advocacy pattern in which: local activists document abuses → international NGO publicizes them globally → international pressure creates diplomatic costs for the offending government → global attention strengthens local movements. Enables small, resource-poor movements to achieve outcomes against powerful states.", "id": "fc11"}, {"front": "Amnesty International (founded 1961)", "back": "An international NGO that publicizes human rights abuses globally, creating diplomatic costs for offending governments. A key institutional actor in the boomerang effect — the international amplifier that enables local movements to leverage global pressure.", "id": "fc12"}, {"front": "American Civil Rights Movement and global context", "back": "The Civil Rights Movement (NAACP legal strategy, King's SCLC nonviolent direct action, SNCC student sit-ins) explicitly connected racial segregation in the American South to colonialism in Africa and Asia. King framed domestic racism as part of a global racial hierarchy; the 1955 Bandung Conference provided an international audience.", "id": "fc13"}, {"front": "Civil Rights Act (1964) and Voting Rights Act (1965)", "back": "Major legislative achievements of the American Civil Rights Movement — but movement leaders noted that formal legal equality did not automatically produce economic equality. The limits of formal rights-based victories without structural economic change.", "id": "fc14"}, {"front": "Bandung Conference (1955)", "back": "Conference of newly independent nations from Asia and Africa. Provided an international platform for anti-racism arguments that connected with the American Civil Rights Movement's framing of racial segregation as part of global colonialism.", "id": "fc15"}, {"front": "Beijing Platform for Action (1995)", "back": "Adopted at the UN Fourth World Conference on Women (Beijing), attended by 189 governments and ~30,000 NGO activists. A comprehensive framework addressing women's political participation, reproductive rights, education, healthcare, and protection from gender-based violence. No enforcement mechanism — operated through normative influence.", "id": "fc16"}, {"front": "Transnational human rights movements: structure", "back": "Since 1945, human rights movements simultaneously operate at local, national, and international levels — using each level to leverage the others. This multi-level structure is the key to understanding why movements can achieve outcomes against powerful states despite limited resources.", "id": "fc17"}, {"front": "Stonewall uprising (1969)", "back": "Uprising in New York City often cited as a catalyst for the LGBTQ+ rights movement in the United States. The movement it helped spark expanded significantly in the 1990s and 2000s; by 2024, same-sex marriage was legally recognized in over 35 countries.", "id": "fc18"}, {"front": "LGBTQ+ rights: global distribution by 2024", "back": "Same-sex marriage legally recognized in 35+ countries (most of Western Europe, much of Latin America, several nations in Asia and Africa); over 60 countries retained laws criminalizing same-sex conduct. This distributional pattern illustrates how human rights progress is uneven across regions.", "id": "fc19"}, {"front": "UDHR: 'standard' not 'law' — what does this language reveal?", "back": "The drafters used 'common standard of achievement' rather than 'law' because they could not actually enforce compliance. The UDHR is a declaration — a normative aspiration — not a binding treaty. Its influence operates through advocacy legitimacy and diplomatic pressure, not legal enforcement.", "id": "fc20"}, {"front": "How does the UDHR's multinational authorship change its interpretation?", "back": "It means the UDHR cannot be dismissed as Western cultural imperialism. Contributions from China (Peng Chun Chang), Lebanon (Charles Malik), and Chile (Hernan Santa Cruz) shaped core provisions — including the philosophical framework and economic/social rights. The document reflects genuine global negotiation.", "id": "fc21"}, {"front": "SPICE-T: Political theme in human rights", "back": "The UDHR and subsequent conventions represent a new form of international political architecture — the idea that states' treatment of their own citizens is a legitimate international concern. This challenged the Westphalian principle of absolute state sovereignty in domestic affairs.", "id": "fc22"}, {"front": "SPICE-T: Social theme in human rights movements", "back": "The section's Social theme is most visible in the Civil Rights, women's rights, and LGBTQ+ movements — all challenging social hierarchies (racial, gender, sexual orientation) through transnational advocacy. Each movement linked local social conditions to global norms and international legitimacy.", "id": "fc23"}, {"front": "Compare UDHR and Beijing Platform on enforceability", "back": "Both operated through normative influence rather than legal enforcement: the UDHR was a 'standard,' not law; the Beijing Platform had no enforcement mechanism. Both became foundational reference points for advocacy movements globally, demonstrating that normative documents can have real-world political effects without coercive enforcement.", "id": "fc24"}, {"front": "Why did the Holocaust make the UDHR necessary in 1948 rather than earlier?", "back": "The Holocaust showed that the most systematic violation of human dignity came from states themselves — not external enemies. Earlier rights frameworks assumed states would protect their citizens. The Holocaust proved states could systematically murder their own citizens, making international standards that transcend state authority logically necessary.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
